body:
  text: 清史稿卷一本紀一太祖本紀太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安弘文定業高皇帝姓愛新覺羅氏諱努爾哈齊其先蓋金遺部始祖布庫里雍順母曰佛庫倫相傳感朱果而孕稍長定三姓之亂衆奉為貝勒居長白山東俄漠惠之野俄𩽆里城號其部族曰滿洲滿洲自此始元於其地置軍民萬戶府明初置建州衛越數世布庫里雍順之族不善撫其衆衆叛族被戕幼子范察走免又數世至都督孟特穆是為肇祖原皇帝有智略謀恢復殲其仇且責地焉於是肇祖移居蘇克蘇滸河赫圖阿喇有子二長充善次褚宴充善子三長妥羅次妥義謨次錫寶齊篇古錫寶齊篇古子一都督福滿是為興祖直皇帝興祖有子六長德世庫次劉闡次索長阿次覺昌安是為景祖翼皇帝次包朗阿次寶實景祖承祖業居赫圖阿喇諸兄弟各築城近者五里遠者二十里環衛而居通稱寧古塔貝勒是為六祖景祖有子五長禮敦次額爾袞次界堪次塔克世是為顯祖宣皇帝次塔察篇古時有碩色納加虎二族為暴於諸部景祖率禮敦及諸貝勒攻破之盡收五嶺東蘇克蘇滸河西二百里諸部由此遂盛顯祖有子五太祖其長也母喜塔喇氏是為宣皇后孕十三月而生是歲己未明嘉靖三十八年也太祖儀表雄偉志意闊大沈幾內蘊發聲若鐘睹記不忘延攬大度鄰部古勒城主阿太為明總兵李成梁所攻阿太王杲之子禮敦之女夫也景祖挈子若孫往視有尼堪外蘭者誘阿太開城明兵入殲之二祖皆及於難太祖及弟舒爾哈齊沒於兵間成梁妻奇其貌陰縱之歸途遇額亦都以其徒九人從太祖既歸有甲十三五城族人龍敦等忌之以畏明為辭屢謀侵害遣人中夜狙擊侍衛帕海死焉額亦都安費揚古備禦甚謹嘗夜獲一人太祖曰縱之毋植怨也使人訴於明曰我先人何罪而殲於兵明人歸其喪又曰尼堪外蘭吾仇也願得而執之明人不許會薩爾虎城主諾米納嘉木瑚城主噶哈善哈思虎沾河城主常書率其屬來歸太祖與之盟並妻以女於是有用兵之志焉是歲癸未明萬曆十一年也太祖年二十五癸未夏五月太祖起兵討尼堪外蘭諾米納兵不至尼堪外蘭遁之甲版太祖兵克圖倫城尼堪外蘭遁之河口臺兵逐之近明邊明兵出尼堪外蘭遁之鵝爾渾兵出無功由於諾米納之背約且泄師期也殺諾米納及其弟奈喀達五城族人康嘉李岱等糾哈達兵來劫瑚濟寨太祖使安費揚古巴遜率十二人追之盡奪所掠而返甲申春正月攻兆佳城報瑚濟寨之役也途遇大雪衆請還太祖曰城主李岱我同姓兄弟乃為哈達導豈可恕耶進之卒下其城先是龍敦唆諾米納背約又使人殺噶哈善哈思虎太祖收其骨歸葬六月討薩木占為噶哈善哈思虎復仇也又攻其黨訥申於馬兒墩寨攻四日殲之九月伐董鄂部大雪師還城中師出以十二騎敗之王甲部乞師攻翁克洛城中道赴之焚其外郭太祖乘屋而射敵兵鄂爾果尼射太祖貫胄中首拔箭反射殪其一人羅科射太祖穿甲中項拔箭鏃卷血肉迸落拄弓徐下飲水數斗創甚馳歸既愈復往攻克之求得鄂爾果尼羅科太祖曰壯士也授之佐領戶三百乙酉春二月太祖略界凡將還界凡薩爾滸東佳把爾達四城合兵四百人來追至太蘭岡城主訥申巴穆尼策馬併進垂及太祖返騎迎敵訥申刃斷太祖鞭太祖揮刀斫其背墜馬回射巴穆尼皆殪之敵不敢逼徐行而去夏四月征哲陳部大水令諸軍還以八十騎前進至渾河遙見敵軍八百憑河而陳包朗阿之孫扎親桑古里懼解甲與人太祖斥之曰爾平日雄族黨間今乃畏葸如是耶去之獨與弟穆爾哈齊近侍顏布祿武陵噶直前衝擊殺二十餘人敵爭遁追至吉林岡而還太祖曰今日之戰以四人敗八百乃天祐也秋九月攻安土瓜爾佳城克之斬其城主諾一莫渾丙戌夏五月征渾河部播一混寨下之秋七月征服哲陳部托漠河城聞尼堪外蘭在鵝爾渾疾進兵攻下其城求之弗獲登城遙望一人氈笠青棉甲以為尼堪外蘭也單騎逐之為土人所圍被創力戰射殺八人斬一人乃出既知尼堪外蘭入明邊使人向邊吏求之使齊薩就斬之以罪人斯得始與明通貢焉明歲犒銀幣有差丁亥春正月城虎闌哈達南岡始建宮室布教令於部中禁暴亂戢盜竊立法制六月攻哲陳部克山寨殺寨主阿爾太命額亦都帥師取把爾達城太祖攻洞城城主扎海降戊子夏四月哈達貝勒扈爾干以女來歸蘇完部索爾果率其子費英東等雅爾古寨扈拉虎率子扈爾漢董鄂部何和禮俱率所部來歸皆厚撫之秋九月取完顏部王甲城葉赫貝勒納林布祿以女弟那拉氏來歸宴饗成禮是為孝慈高皇后己丑春正月取兆佳城斬其城主寧古親冬十月明以太祖為建州衛都督僉事辛卯春正月遣師略長白山諸路盡收其衆葉赫求地弗與葉赫以兵劫我東界洞寨壬辰冬十月二十五日第八子皇太極生高皇后出也是為太宗癸巳夏六月葉赫哈達輝發烏拉四部合兵侵戶布察遣兵擊敗之秋九月葉赫以不得志於我也乃糾約扈倫三部烏拉哈達輝發蒙古三部科爾沁錫伯卦爾察長白二部訥殷朱舍里凡九部之兵三萬來犯太祖使武里堪偵敵至渾河將以夜渡河踰嶺馳以告太祖曰葉赫兵果至耶其語諸將以旦日戰及旦引兵出諭於衆曰解爾蔽手去爾護項毋自拘縶不便於奮擊又申令曰烏合之衆其志不一敗其前軍軍必反走我師乘之靡弗勝矣衆皆奮太祖令額亦都以百人挑戰葉赫貝勒布齊策馬拒戰馬觸木而踣我兵吳談斬之科爾沁貝勒明安馬陷淖中易驏馬而遁敵大潰我軍逐北俘獲無算擒烏拉貝勒之弟布占泰以歸冬十月遣兵征朱舍里路執其路長舒楞格遣額亦都等攻訥殷路斬其路長搜穩塞克什以二路之助敵也甲午春正月蒙古科爾沁貝勒明安喀爾喀貝勒老薩遣使來通好自是蒙古通使不絶乙未夏六月征輝發取多壁城斬其城主丙申春二月明使至從朝鮮官二人待之如禮秋七月遣布占泰歸烏拉會其貝勒為部人所殺遂立布占泰為貝勒丁酉春正月葉赫四部請修好許之與盟九月使弟舒爾哈齊貢於明戊戌春正月命弟巴雅拉長子褚英率師伐安褚拉庫以其二於葉赫也冬十月太祖入貢於明十一月布占泰來會以弟之女妻之己亥春正月東海渥集部虎爾哈路路長王格張格來歸獻貂狐皮歲貢以為常二月始製國書三月開礦采金銀置鐵冶哈達與葉赫搆兵送質乞援遣費英東噶蓋戍之哈達又私於葉赫戍將以告秋九月太祖伐哈達攻城克之以其貝勒孟格布祿歸孟格布祿有逆謀噶蓋未以告並誅之辛丑春正月明以滅哈達來責乃遣孟格布祿之子吳爾古岱歸主哈達哈達為葉赫及蒙古所侵使訴於明明不應又使哈達以饑告於明亦不應太祖乃以吳爾古岱歸收其部衆哈達亡十二月太祖復入貢於明是歲定兵制令民間養蠶癸卯春正月遷於赫圖阿喇肇祖以來舊所居也九月妃那拉氏卒即孝慈高皇后也始妃有病求見其母其兄葉赫貝勒不許來遂卒甲辰春正月太祖伐葉赫克二城取其寨七明授我龍虎將軍乙巳築外城蒙古喀爾喀巴約忒部恩格德爾來歸丙午冬十二月恩格德爾蒙古五部使來朝貢尊太祖為神武皇帝是歲限民田丁未春正月瓦爾喀斐悠城長穆特黑來以烏拉侵暴求內附命舒爾哈齊褚英代善及費英東揚古利率兵徙其戶五百烏拉發兵一萬遮擊擊敗之斬首三千獲馬五千匹師還優賚褚英等夏五月命弟巴雅拉額亦都費英東扈爾漢征渥集部取二千人還秋九月太祖以輝發屢負約親征克之遂滅輝發戊申春三月命褚英阿敏等伐烏拉克宜罕阿林城布占泰懼復通好執葉赫五十人以來並請婚許之是歲與明將盟各守境立石於界己酉春二月遺明書謂鄰朝鮮而居瓦爾喀者乃吾屬也其諭令豫我明使朝鮮歸千餘戶冬十月命扈爾漢征渥集呼野路盡取之庚戌冬十一月命額亦都率師招渥集部那木都魯諸路路長來歸還擊雅攬路為其不附又劫我屬人也取之辛亥春二月賜國中無妻者二千人給配與金有差秋七月命子阿巴泰及費英東安費揚古取渥集部烏爾古宸木倫二路八月弟舒爾哈齊卒冬十月命額亦都何和里扈爾漢率師征渥集部虎爾哈俘二千人並招旁近各路得五百戶壬子秋九月太祖親征烏拉為其屢背盟約又以鳴鏑射帝女也布占泰禦於河駐師河東克六城焚積聚布占泰親出乞和太祖切責之許其納質行成而戍以師師還癸丑春正月布占泰復二於葉赫率師往征布占泰以兵三萬來迎太祖躬先陷陳諸將奮擊大敗之遂入其城布占泰至城不得入代善追擊之單騎奔葉赫遂滅烏拉使人索布占泰葉赫不與秋九月起兵攻葉赫使告明降兀蘇城焚其十九城寨葉赫告急於明明遣使為解師還經撫順明游擊李永芳來迎與之書曰與明無嫌也甲寅夏四月帝八子皇太極娶於蒙古科爾沁部莽古思之女也行親迎禮明使來稱都督上語之曰吾識爾爾遼陽無賴蕭子玉也吾非不能殺爾恐貽大國羞語爾巡撫勿復相詐冬十一月遣兵征渥集部雅攬西臨二路得千人乙卯夏四月明總兵張承胤使人來求地拒之令各佐領屯田積穀秋閏八月帝長子褚英卒先是太祖將授政於褚英褚英暴伉衆心不附遂止褚英怨望焚表告天為人所告自縊死冬十月遣將征渥集部東格里庫路得萬人是歲釐定兵制初以黃紅白黑四旗統兵至是增四鑲旗易黑為藍置理政聽訟大臣五以扎爾固齊十人副之於是歸徠日衆疆域益廣諸貝勒大臣乃再三勸進焉天命元年丙辰春正月壬申朔上即位建元天命定國號曰金諸貝勒大臣上尊號曰覆育列國英明皇帝命次子代善為大貝勒弟子阿敏為二貝勒五子莽古爾泰為三貝勒八子皇太極為四貝勒命額亦都費英東何和里扈爾漢安費揚古為五大臣同聽國政諭以秉志公誠勵精圖治扈爾漢巡邊執殺盜參者五十餘人明巡撫李維翰止我使者綱古里方吉訥乃取獄俘十人戮於境上綱古里等得歸秋七月禁五大臣私家聽訟命扈爾漢安費揚古伐東海薩哈連部取三十六寨八月渡黑龍江江冰已合取十一寨徇使犬路諾洛路石拉欣路並取其人以歸二年丁巳春正月蒙古科爾沁貝勒明安來朝待之有加禮是歲遣兵取東海散居諸部負險諸島各取其人以歸三年戊午二月詔將士簡軍實頒兵法壬寅上伐明以七大恨告天祭堂子而行分兵左四旗趨東州馬根單二城下之上帥右四旗兵趨撫順明撫順游擊李永芳降以為總兵官轄輯降人毀其城明總兵張承胤等來追回軍擊斬承胤等班師五月復伐明克撫安等五堡毀城以其粟歸七月入雅鶻關明將鄒儲賢等戰死冬十月東海虎爾哈部部長納哈哈來歸賜賚有差使犬各部路長四十人來歸賜宴賞賚並授以官四年己未春正月伐葉赫取二十餘寨聞有明師乃還明經略楊鎬遣使來議罷兵覆書拒之楊鎬督師二十萬來伐並徵葉赫朝鮮之兵分四路進杜松軍由東路渡渾河出撫順薩爾滸劉綎軍由南路入董鄂偵者以告上曰明兵由南來者誘我南也其北必有重兵宜先破之命諸貝勒先行三月甲申朔清旦師行大貝勒代善議師行所向四貝勒皇太極言宜趨界凡我有築城萬五千人役夫多而兵少慮為所乘額亦都曰四貝勒之言是也遂趨界凡向午至太蘭岡望見明兵分千人援界凡界凡之騎兵已乘明師半渡谷口擊其尾回守吉林崖杜松留師壁薩爾滸而自攻吉林崖我軍至役夫亦下擊薄明軍是時上至太蘭察兵勢命大軍攻薩爾滸垂暮墮其壘入夜夾攻松軍松不支及其副王宣趙夢麟等皆死追北至勺琴山西路軍破是日馬林軍由東北清河三岔至尚間崖乙酉代善聞報以三百騎赴之馬林斂軍入壕外列火器護以騎兵別將潘宗顏屯飛芬山相犄角上率四貝勒逐杜松後隊殲其軍聞馬林軍馳至上趨登山下擊代善陷陳阿敏莽古爾泰麾兵繼進上下交擊馬林遁副將麻岩戰死全軍奔潰移攻飛芬上率騎突入斬宗顏西北路軍破葉赫兵遁是時劉綎南路之軍由寬甸間道敗我戍將五百人乘勢深入上命扈爾漢將千兵往援戍將托保以餘兵會之丙戌復命阿敏將二千人繼往上至界凡刲八牛祭纛丁亥命大貝勒代善四貝勒皇太極南禦遇綎精騎萬餘前進四貝勒以突騎三十奪阿布達里岡代善冒杜松衣幟入其軍軍亂四貝勒馳下會戰斬綎又敗其後軍乘勝至富察綎監軍道康應乾以火器迎戰大風起烟焰返射復大破之應乾遁朝鮮兵降凡四日而破三路明兵其北路李如柏之軍為楊鎬急檄引還至虎欄遇我游騎二十人登山鳴螺呼噪逐之如柏軍奔迸踐斃又千餘人甲辰釋朝鮮降將姜弘立歸以書諭其國主四月遂築界凡遣兵徇鐵嶺略千人五月朝鮮使來報謝六月先是遣穆哈連收撫虎爾哈部遺民至是得千戶上出城撫之賜以田廬牛馬上率兵攻開原克之斬馬林等殲其軍還駐界凡秋七月明千總王一屏等五人來降暨前降守備阿布圖各豫之官上攻鐵嶺克之是夕蒙古喀爾喀部來援葉赫敗之追至遼河擒其貝勒介賽八月己巳征葉赫葉赫有二城貝勒金台什守東城其弟布揚古布爾杭古守西城分軍圍之隳其郛穴城城摧我軍入城命四貝勒領金台什之子德爾格勒諭降再四金台什終不從乃執而縊之布爾杭古降布揚古不遜殺之葉赫亡師還駐界凡冬十月蒙古察哈爾林丹汗使來書辭多嫚執其使喀爾喀五部來使約伐明上使大臣希福等五人蒞盟旋有五部下屬人來歸上卻之是歲明以熊廷弼為經略五年庚申春正月上報書林丹汗斥其嫚執我使臣上亦殺其使二月賜介賽子克什克圖色特希爾裘馬令其更代為質三月論功更定武爵丙戌左翼都統總兵官一等大臣費英東卒上臨哭之夏六月諭樹二木於門欲訴者懸其辭於木民情盡達秋八月上伐明略瀋陽明兵不戰而退乃還九月甲申皇弟穆爾哈齊卒車駕臨奠因過費英東墓賜奠冬十月自界凡遷於薩爾滸是歲明神宗崩光宗立復崩熹宗立罷經略熊廷弼以袁應泰代之六年辛酉春二月上伐明略奉集堡至武靖營三月壬子上大舉攻明瀋陽以舟載攻具自渾河下瀋陽守禦甚備環濠植籤我軍拔籤猛進明軍殊死戰陳斬總兵賀世賢以下乙卯入瀋陽敗其援軍總兵陳策等於渾河敗總兵李秉誠於白塔鋪援軍盡走庚申乘勝趨遼陽袁應泰引水注濠環城列炮督軍出戰不支而退守城樓壬戌我右翼軍毀閘左翼軍毀橋右翼傅西城升陴左翼聞之畢登明軍猶列炬巷戰達旦皆潰袁應泰自焚死御史張銓被執不屈死癸亥入遼陽遼人具乘輿鼓樂迎上夾道呼萬歲命皇子德格類徇遼以南所至迎降兵宿城上不入民舍六月左翼總兵官一等大臣額亦都卒上臨奠哭之慟秋七月壬寅宴有功將士酌酒賜衣鎮江城人殺守將佟養真降於明將毛文龍十一月乙卯命阿敏擊毛文龍敗之喀爾喀部台吉古爾布什來降明復以熊廷弼為經略七年壬戌春正月甲寅上伐明攻廣寧丙辰克西平堡明軍三萬來禦擊敗之斬其總兵劉渠祁秉忠巡撫王化貞遁游擊孫得功以城降庚申上入廣寧降其城堡四十進兵山海關熊廷弼盡焚沿塗村堡而走乃移軍北攻義州克之還駐廣寧蒙古厄魯特部十七貝勒來附上宴勞之授職有差喀爾喀五部同來歸二月癸未上還遼陽遼陽城圮遷於太子河濱秋七月乙未朔一等大臣安費揚古卒八年癸亥春正月壬辰朔蒙古扎魯特部巴克來朝遣與質子俱還夏四月癸酉遣皇子阿巴泰德格類皇孫嶽託率師討扎魯特貝勒昂安以其殺我使人也昂安攜孥遁達穆布逐之中槍卒我軍憤進殺昂安父子並以別部桑土妻子歸六月戒諸女已嫁毋凌其夫違者必以罪冬十月丁丑一等大臣扈爾漢卒上臨哭之九年甲子春正月喀爾喀貝勒恩克格爾來朝求內遷許之以兵遷其民二月庚子皇弟貝勒巴雅拉卒上遣庫爾等與科爾沁台吉奧巴盟勿與察哈爾通四月營山陵於東京城東北陽魯山奉景祖顯祖遷葬焉是曰永陵五月毛文龍寇輝發戍將楞格禮蘇爾東安追擊殲之秋八月壬辰總兵官一等大臣何和里卒上聞之慟曰天何不遺一人送朕老耶毛文龍之衆屯田於鴨緑島使楞格禮襲其衆殲之十年乙丑春正月癸亥命皇子莽古爾泰率師至旅順擊明戍兵隳其城二月科爾沁貝勒寨桑以女來歸四貝勒皇太極為妃大宴成禮三月庚午遷都瀋陽凡五遷乃定都焉是曰盛京遣喀爾達等征瓦爾喀歸降其衆三百夏四月己卯宗室王善副將達朱戶車爾格征瓦爾喀凱旋宴勞備至六月癸卯毛文龍兵襲耀州戍將揚古利擊敗之秋八月遣土穆布城耀州明師來攻擊走之獲馬七百命博爾晉征虎爾哈降其戶五百雅護征卦爾察部獲其衆二千毛文龍襲海州張屯寨戍將戒沙擊走之上著酒戒頒於國中十年己卯皇子阿拜塔拜巴布泰征虎爾哈以千五百人歸十一月庚戌科爾沁奧巴告有察哈爾之師遣四貝勒皇太極及阿巴泰以精騎五千赴之林丹汗遁是年明使高第為經略驅錦西人民入山海關寧前道袁崇煥誓守不去十一年丙寅春正月戊午上起兵伐明寧遠至右屯守將遁收其積穀至錦州戍將俱先遁丁卯至寧遠寧前道袁崇煥偕總兵滿桂副將祖大壽嬰城固守天寒土凍鑿城不隳城上放西洋炮頗傷士卒乃罷攻遣武訥格將蒙古兵攻覺華島奪舟二千盡焚其軍儲班師二月壬午上還瀋陽語諸貝勒曰朕用兵以來未有抗顏行者袁崇煥何人乃能爾耶夏四月丙子征喀爾喀五部為其背盟也殺其貝勒囊奴克進略西拉木輪獲其牲畜五月毛文龍兵襲鞍山驛及薩爾滸戍將巴布泰巴篤禮敗之擒其將李良美丁巳科爾沁貝勒奧巴來朝謝援師也上優禮之封為土謝圖汗六月上書訓辭與諸貝勒秋七月上不豫幸清河湯泉八月丙午上大漸乘舟回庚戌至愛雞堡上崩入宮發喪在位十一年年六十有八天聰三年葬福陵初諡武皇帝廟號太祖改諡高皇帝纍諡承天廣運聖德神功肇紀立極仁孝睿武端毅欽安弘文定業高皇帝論曰太祖天錫智勇神武絶倫蒙難艱貞明夷用晦逮歸附日衆阻二潛消自摧九部之師境宇日拓用兵三十餘年建國踐祚薩爾滸一役翦商業定遷都瀋陽規模遠矣比於岐豐無多讓焉
