body:
  text: 清史稿卷二本紀二太宗本紀一太宗應天興國弘德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝諱皇太極太祖第八子母孝慈高皇后上儀表奇偉聰睿絕倫顏如渥丹嚴寒不栗長益神勇善騎射性耽典籍諮覽弗倦仁孝寬惠廓然有大度天命元年太祖以上為和碩貝勒與大貝勒代善二貝勒阿敏三貝勒莽古爾泰為四大貝勒上居四稱四貝勒太祖崩儲嗣未定代善與其子岳託薩哈廉以上才德冠世與諸貝勒議請嗣位上辭再三久之乃許天命十一年丙寅九月庚午朔即位於瀋陽詔以明年為天聰元年初太祖命上名臆制之後知漢稱儲君曰皇太子蒙古嗣位者曰黃台吉音並闇合及即位咸以為有天意焉辛未誓告天地以行正道循禮義敦友愛盡公忠勗諸大貝勒等甲戌諭漢官民有私計遁逃及令奸細往來者雖首告勿論後惟已逃被獲者論死丙子諭曰工築之興有妨農務前以城郭邊牆事關守禦有勞民力良非得已茲後止葺頹壞不復興築俾民專勤南畝滿洲漢人毋或異視訟獄差徭務使均一貝勒屬下人毋許邊外行獵市稅為國費所出聽其通商貿易私往外國及漏稅者罪之丁丑令漢人與滿洲分屯別居先是漢人十三壯丁為一莊給滿官為奴至是每備禦止留八人餘悉編為民戶處以別屯擇漢官廉正者理之設八固山額真分領八旗以納穆泰為正黃旗固山額真額駙達爾漢為鑲黃旗固山額真額駙和碩圖為正紅旗固山額真博爾晉為鑲紅旗固山額真額駙顧三泰為鑲藍旗固山額真托博輝為正藍旗固山額真徹爾格為鑲白旗固山額真喀克篤禮為正白旗固山額真又設十六大臣贊理庶政聽八旗訟獄又設十六大臣參理訟獄行軍駐防則遣之乙未蒙古科爾沁土謝圖汗奧巴遣使來弔冬十月己酉以蒙古喀爾喀札魯特部敗盟殺掠私通於明命大貝勒代善等率精兵萬人討之先貽書聲其罪上送至蒲河山而還癸丑別遣楞額禮阿山率輕兵六百入喀爾喀巴林地以張軍勢丙辰科爾沁土謝圖汗奧巴及代達爾漢等十四貝勒各遣使來弔達朱戶征卦爾察部獲其人口牲畜以歸明寧遠巡撫袁崇煥遣李喇嘛及都司傅有爵等來弔並賀即位甲子大貝勒代善等大破札魯特斬其貝勒鄂爾齋圖獲貝勒巴克及其二子並拉什希布等十四貝勒而還十一月辛未上發瀋陽迎大貝勒代善師次鐵嶺樊河界癸酉行飲至禮論功頒賚將士戊寅上還瀋陽察哈爾阿喇克綽忒部貝勒圖爾濟率百戶來歸乙酉遣方吉納溫塔石偕李喇嘛往報袁崇煥且遺書曰頃停息干戈遣使弔賀來者以禮故遣官陳謝昔皇考往寧遠時曾致璽書言和未獲回答如其修好答書以實勿事文飾崇煥不以聞而令我使齎還卓禮克圖貝勒之子衞徵巴拜攜其家屬來歸科爾沁貝勒青巴圖魯桑阿爾齋台吉滿珠什哩各齎鞍馬牛羊來弔十二月庚子禁與蒙古諸藩售賣兵仗壬戌黑龍江人來朝貢天聰元年春正月丙子命二貝勒阿敏貝勒濟爾哈朗阿濟格杜度岳託碩托率兵征朝鮮上曰朝鮮累世得罪今明毛文龍近彼海島納我叛民宜兩圖之復遣方吉納溫塔石遺書明袁崇煥言興師由七大恨並約其議和及每歲餽報之數二月己亥以書招諭蒙古奈曼部袞出斯巴圖魯三月壬申阿敏等克朝鮮義州別遣兵搗鐵山明守將毛文龍遁走又克安州進至平壤城渡大同江朝鮮國王李倧遣使迎師阿敏等數其七罪仍遣使趣和倧懼率妻子遁江華島其長子李遁全州阿敏復遣副將劉興祚入島面諭倧倧遣其族弟原昌君李覺獻馬百匹虎豹皮百錦苧各四百布一萬五千庚子與朝鮮盟定議罷兵壬申明袁崇煥遣杜明忠偕方吉納等以書來並李喇嘛書欲釋恨修好惟請減金幣之數而以我稱兵朝鮮為疑辛巳阿敏等遣使奏捷乙酉命留滿洲兵一千蒙古兵二千防義州滿洲兵三百蒙古兵一千防鎮江城並諭李倧曰我留兵義州者防毛文龍耳阿敏等旋師以李覺歸夏四月甲辰遺袁崇煥書曰釋恨修好固所願也朝鮮自尊輕我納我叛亡我遲之數年彼不知悔是以興討天誘其衷我軍克捷今已和矣而爾詭言修好仍遣哨卒偵視修葺城堡我國將帥實以此致疑夫講信修睦必藉物以成禮我豈貪而利此使爾國力不支可減其半歲時餽答當如前議則兩國之福也書成聞崇煥方築塔山大凌河錦州等城遂罷遣使而以書付杜明忠還更責崇煥曰兩國修好當分定疆域今又修葺域垣潛圖侵逼倘戰爭不息天以燕雲畀我爾主不幸奔竄身敗名裂為何如也自古文臣不更事者徒為大言每喪師殃民社稷傾覆前者遼左任用非人而河東西土地盡失今尚謂不足戒而謀動干戈耶癸丑阿敏等自朝鮮凱旋上迎於武靖營賜阿敏御衣一襲餘各賜馬一匹乙卯論征朝鮮將士功擢賞有差戊辰上還瀋陽乙丑以書諭察哈爾台吉濟農及奈曼袞出斯巴圖魯來和五月戊辰遣朝鮮國王弟李覺歸國設宴餞之並賜鞍馬裘帶等物辛未上聞明人於錦州大凌河小凌河築城屯田而崇煥無報書親率師往攻之乙亥至廣寧乘夜進兵丙子明大凌河小凌河兵棄城遁遂圍錦州明臺堡兵二千餘人來降悉縱之歸丁丑明鎮守遼東太監紀用總兵趙率教遣人詣師請命上開誠諭之幷許紀用親來定議用不答遂攻錦州垂克明援兵至退五里而營遣人調瀋陽兵益師庚寅固山額真博爾晉等以兵至癸巳攻寧遠城殲其步卒千餘人既明總兵滿桂出城而陣上欲擊之三大貝勒均諫止上怒趣諸將戴兜鍪率阿濟格疾馳而進敗其前隊追至寧遠城下盡殪之諸貝勒不及冑而從濟爾哈朗薩哈廉瓦克達俱被創錦州守兵亦出城合戰我軍復迎擊之游擊覺羅拜山備禦巴希陣歿上臨其喪哭而酹之我軍還駐雙樹鋪乙未復至錦州六月己亥攻錦州值天溽暑士卒死傷甚衆庚子班師丁未上還瀋陽是歲大饑斗米值銀八兩銀賤物貴盜賊繁興上惻然曰民饑為盜可盡殺乎令鞭而釋之仍發帑賑民秋七月己巳蒙古敖漢瑣諾木杜稜塞臣卓禮克圖奈曼袞出斯巴圖魯舉國來附朝鮮國王李倧遣使報謝並獻方物命阿什達爾漢等往報之尋以義州歸朝鮮是月明袁崇煥罷歸八月辛亥察哈爾阿喇克綽忒部貝勒巴爾巴圖魯諾門達賚吹爾扎木蘇率衆來歸是月明熹宗崩其弟信王嗣位是為莊烈帝九月甲子朔諭國家大祀大宴用牛外其屠宰馬騾牛驢者悉禁之冬十一月庚午察哈爾大貝勒昂坤杜稜來降辛巳薩哈爾察部來朝貢十二月甲午朔察哈爾阿喇克綽忒貝勒圖爾濟伊爾登來降二年春正月戊子格伊克里部長四人率其屬來朝二月癸巳朔以額亦都子圖爾格費英東子察哈尼俱為總兵官朝鮮國王李倧遣其總兵官李蘭等來獻方物並米二千石更以一千石在中江平糶庚子以往喀喇沁使臣屢為察哈爾多羅特部所殺上率師親征丁未進擊多羅特部敗之多爾濟哈談巴圖魯被創遁獲其妻子殺台吉古魯俘萬一千二百人還丁巳以戰勝用八牛祭天三月戊辰上還瀋陽貝勒阿敏等率羣臣郊迎行抱見禮以弟多爾袞多鐸從征有功賜多爾袞號墨爾根戴青多鐸號額爾克楚虎爾庚寅以賜名之禮宴之戊子給國人無妻者金使娶以貝勒多爾袞為固山貝勒夏四月丙辰巴林貝勒塞特爾台吉塞冷阿玉石滿朱習禮率衆來歸明復以袁崇煥督師薊遼崇煥素弗善毛文龍時文龍據皮島招集遼民有逃亡則殺以冒功遂得擢總兵便宜行事後更致書與我通好上遣科廓等賫書往報既文龍執科廓等送燕京崇煥以文龍私通罪紿殺之五月辛未明人棄錦州貝勒阿巴泰等率兵三千略其地隳錦州杏山高橋三城毀十三站以東墩台二十一先是顧特塔布囊以其衆自察哈爾逃匿蒙古地遇歸附者輒殺之辛巳命貝勒濟爾哈朗豪格率兵討顧特塔布囊乙酉顧特伏誅俘其人口牲畜以萬計長白山迤東濱海虎爾哈部頭目里佛塔等來朝八月辛卯與喀喇沁部議和定盟乙未賜奈曼貝勒袞出斯號達爾漢札魯特喀巴海號衞徵乙卯朝鮮來貢九月庚申徵外藩兵共征蒙古察哈爾癸亥上率大軍西發丙寅次遼陽敖漢奈曼喀爾喀札魯特喀喇沁諸貝勒台吉各以兵來會己巳駐師綽洛郭爾甲戌宴來會諸貝勒科爾沁諸貝勒不至土謝圖汗額駙奧巴哈談巴圖魯滿朱習禮如約請先侵掠而後合軍上怒遣使趣之時奧巴違命徑歸滿朱習禮及台吉巴敦以所俘來獻上賜滿朱習禮號達爾漢巴圖魯巴敦號達爾漢卓禮克圖厚賚之丙子進兵擊席爾哈席伯圖英湯圖諸處克之獲人畜無算冬十月辛卯還師丙申諭敖漢奈曼巴林札魯特諸貝勒毋得要殺降人違者科罸壬寅上還瀋陽以劉興祚詐稱縊死逃歸明繫其母及妻子於獄十二月丁亥朔遺土謝圖汗額駙奧巴書數其罪巴牙喇部長伊爾彪等來朝貢蒙古郭畀爾圖札魯特貝勒塞本及其弟馬尼各率部來歸三年春正月庚申土謝圖汗奧巴來請罪宥而遣之辛未敕科爾沁敖漢奈曼喀爾喀喀喇沁諸部悉遵國制丁丑諭諸貝勒代理三大貝勒直月機務二月戊子諭三大貝勒諸貝勒大臣毋得科斂民間財物犯者治罪己亥合葬太祖高皇帝孝慈高皇后於瀋陽之石嘴頭山妃富察氏祔喀爾喀札魯特貝勒戴青桑土桑古爾桑噶爾寨等率衆來附甲辰上南巡閱邊境城堡圮薄者修築之戊申次海州有老人年一百三歲妻一百五歲子七十三歲召見賜牛種辛亥上還瀋陽三月戊午申蒙古諸部軍令夏四月丙戌朔設文館命巴克什達海及剛林等繙譯漢字書籍庫爾䗿及吳巴什等記注本朝政事五月丁未奈曼札魯特諸貝勒越界駐牧自請議罰上宥之六月乙丑議伐明令科爾沁喀爾喀札魯特敖漢奈曼諸部會兵並令預採木造船以備轉餉丁卯喀喇沁布爾噶都戴青台吉卓爾畢土默特台吉阿玉石等遣使朝貢辛巳土默特台吉卓爾畢泰等來朝貢秋七月辛卯喀爾喀台吉拜渾岱喇巴泰滿朱習禮自科爾沁來朝甲午孟阿圖率兵征瓦爾喀乙未庫爾喀部來朝貢八月庚午頒八旗臨陣賞罰令乙亥諭曰自古及今文武並用以文治世以武克敵今欲振興文教試錄生員諸貝勒府及滿漢蒙古所有生員俱令赴試中式者以他丁償之九月壬午朔初試生員拔二百人賞緞布有差免其差徭癸未貝勒濟爾哈朗等略明錦州寧遠諸路還俘獲以三千計丙戌阿魯部杜思噶爾濟農始遣使來通好癸卯喀喇沁布爾噶都來朝貢冬十月癸丑上親征明徵蒙古諸部兵以次來會庚申次納里特河察哈爾五千人來歸壬戌次遼河丙寅科爾沁奧巴以二十三貝勒來會上集諸貝勒大臣議征明與征察哈爾孰利皆言察哈爾遠於是征明辛未次喀喇沁之青城大貝勒代善三貝勒莽古爾泰止諸貝勒帳外入見密議班師既退岳託等入白諸將在外候進取上不懌因曰兩兄謂我兵深入勞師襲遠若糧匱馬疲敵人環攻無為歸計若等見及此而初不言朕既遠涉乃以此為辭我謀且隳何候為岳託堅請進師八固山額真詣代善莽古爾泰議夜半議定諭曰朕承天命興師伐明拒者戮降者勿擾俘獲之人父母妻子勿使離散勿淫人婦女勿褫人衣服勿毀廬舍器皿勿伐果木勿酗酒違者罪無赦固山額真等不禁罪如之乙亥次老河命濟爾哈朗岳託率右翼兵攻大安口阿巴泰阿濟格率左翼兵攻龍井關上與大貝勒代善三貝勒莽古爾泰率大兵繼之丁丑左翼兵克龍井關明副將易愛參將王遵臣來援皆敗死漢兒莊潘家口守將俱降戊寅上督兵克洪山口辛巳上至遵化莽古爾泰率左翼兵自漢兒莊來會遺書明巡撫王元雅勸降十一月壬午朔右翼諸貝勒率師來會先是濟爾哈朗等克大安口五戰皆捷降馬蘭營馬蘭口大安營三城明羅文峪守將李思禮降山海關總兵趙率教以兵四千來援阿濟格迎擊斬之甲申諸貝勒攻遵化正白旗小校薩木哈圖先登大兵繼之遂克其城明巡撫王元雅自經死上親酌金巵賜薩木哈圖擢備禦世襲罔替賜號巴圖魯有過赦免家固貧恤之蒙古兵擾害羅文峪民令曰凡貝勒大臣有掠歸降城堡財物者斬擅殺降民者抵罪強取民物計所取倍償之己丑克城功將士賞賚有差壬辰參將英俄爾岱文館范文程留守遵化大軍進逼燕京有蒙古兵殺人而褫其衣上命射殺之甲午徇薊州乙未徇三河丙申左翼貝勒赴通州視渡口明大同宣府二鎮援兵至順義貝勒阿巴泰岳託擊敗之順義降上至通州諭明士民曰我國夙以忠順守邊葉赫與我同一國耳明主庇葉赫而陵我大恨有七我知終不相容故告天興師天直我國賜我河東地我太祖皇帝猶願和好與民休息爾國不從天又賜我河西地及朕即位復徇爾國之請遂欲去帝稱汗趣製國印而爾國不從今我興師而來順者撫逆者誅是爾君好逞干戈猶爾之君殺爾也天運循環無往不復有天子而為匹夫亦有匹夫而為天子者天既佑我乃使我去帝號天其鑒之辛丑大軍逼燕京上營於城北土城關之東兩翼營於東北明大同總兵滿桂宣府總兵侯世祿屯德勝門寧遠巡撫袁崇煥錦州總兵祖大壽屯沙窩門上率右翼大貝勒代善貝勒濟爾哈朗岳託杜度薩哈廉等領白甲護軍蒙古兵進擊桂世祿遣左翼大貝勒莽古爾泰阿巴泰阿濟格多爾袞多鐸豪格等領白甲護軍蒙古兵迎擊崇煥大壽俱敗之癸卯遣明歸順王太監賫書與明議和乙巳屯南海子戊申袁崇煥祖大壽營於城東南隅樹柵為衞我軍偪之而營上率輕騎往視諸貝勒請攻城諭曰路隘且險若傷我士卒雖得百城不足多也因止弗攻初獲明太監二人令副將高鴻中參將鮑承先寧完我等受密計至是鴻中承先坐近二太監耳語云今日撤兵乃上計也頃上單騎向敵敵二人見上語良久乃去意袁都堂有約此事就矣時楊太監佯臥竊聽翌日縱之歸以所聞語明帝遂下崇煥於獄大壽懼率所部奔錦州毀山海關而出諸貝勒大臣請攻城上曰攻則可克但恐傷我良將勁卒余不忍也遂止十二月辛亥朔大軍經海子而南且獵且行趣良鄉克其城壬子總兵吳訥格克固安辛酉遣貝勒阿巴泰薩哈廉以太牢祀金太祖世宗陵丙寅復趨燕京敗明兵於盧溝橋殲其衆明總兵滿桂孫祖壽黑雲龍麻登雲以兵四萬柵永定門之南丁卯黎明師毀柵入斬桂祖壽及副將以下三十餘人擒黑雲龍麻登雲獲馬六千分賜將士戊辰遣達海賫書與明議和壬申貝勒阿巴泰濟爾哈朗略通州焚其舟攻張家灣克之達海賫議和書二分置安定德勝門外乙亥復遣人賫書赴安定門俱不報丙子駐師通州丁丑岳託薩哈廉豪格率兵四千圍永平遂克香河馬蘭峪諸城復叛去己卯大軍趣永平四年春正月辛巳朔大軍至榛子鎮沙河驛俱降壬午至永平先是劉興祚自我國逃歸匿崇煥所至是率所攜滿洲兵十五人蒙古兵五百欲往守沙河聞大兵至改趣永平之太平寨襲殺喀喇沁兵於途上怒其負恩遣貝勒阿巴泰等禽斬之裂其屍以徇癸丑上授諸將方略乘夜攻城城中火藥自發敵軍大亂黎明克之貝勒濟爾哈朗等入城安撫丙戌上率諸將入城官民夾道呼萬歲貝勒濟爾哈朗薩哈廉守永平以降官白養粹為永平巡撫孟喬芳楊文魁為副將縱鄉民還其家是日上率大軍趣山海關敖漢奈曼巴林札魯特諸部兵攻昌黎不克臺頭營鞍山堡遷安灤州以次降建昌參將馬光遠來歸丁酉明兵攻遵化貝勒杜度擊敗之明兵入三屯營先所下漢兒莊喜峰口潘家口洪家口復叛庚子達海等復漢兒莊貝勒阿巴泰守之辛丑喀喇沁布爾噶都為明兵所圍遣軍往救未至布爾噶都自擊敗之其帥明兵部尚書劉之綸領兵至樹柵我軍礮毀其柵之綸屯山中大貝勒代善圍之勸之綸降不從破其營之綸被箭死壬寅移師馬蘭峪毀其近城屯堡丙午喀喇沁蘇布地上書明帝論和好之利且勸以愛養邊民優恤屬國之道不報樂亭復叛二月辛亥朔諭貝勒諸臣凡將士驍勇立功者勿與攻城之役甲寅宴明降將麻登雲等於御幄謂之曰明主視爾等將士之命如草芥驅之死地朕屢遣使議和竟無一言相報何也登雲對曰明帝幼冲大臣各圖自保議和之事儻不見聽罪且不測故懼不敢奏上曰若然是天贊我也豈可棄之而歸但駐兵屯守妨農時為可憫耳且彼山海關錦州防守尚堅今但取其無備城邑可也己未遺書明帝仍申和好並致書明諸臣勸其急定和議至是凡七致書矣甲子明榆林副將王世選來降上班師貝勒阿巴泰濟爾哈朗薩哈廉及文臣索尼寧完我等守永平鮑承先守遷安固山額真圖爾格那木泰等守灤州察喀喇范文程等守遵化駐灤三日論功行賞壬申諭曰天以明土地人民予我其民即吾民宜飭軍士勿加侵害違者治罪上至永平降官郎中陳此心謀遁事覺論斬上赦之聽其所往三月壬午上還瀋陽庚寅遣二貝勒阿敏貝勒碩託率兵五千往守永平四城貝勒阿巴泰等還庚子阿魯四子部遣使來盟夏四月壬子明兵攻灤州不克己卯貝勒阿巴泰濟爾哈朗等自永平還上問是役俘獲較前孰多對曰此行所獲人口甚多上曰財帛不足喜惟多得人為可喜耳五月己丑諭諸臣厚撫俘衆壬辰阿敏碩託等棄永平四城歸時明監軍道張春錦州總兵祖大壽等合兵攻灤州那穆泰圖爾格湯古代等出戰屢敗明兵然兵少阿敏碩託畏不往援明兵用礮攻灤州那穆泰等不能支棄城奔永平會天雨我軍潰圍出無馬被創者死四百餘人阿敏碩託聞之恐遂殺降官白養粹等盡屠城中士民收其金幣乘夜出冷口察哈喇等亦棄遵化歸上方命貝勒杜度趨永平協守且敕阿敏善撫官民無侵暴將整兵親往庚子聞阿敏棄城且大肆屠戮乃止六月甲寅收繫棄城諸將數其罪乙卯御殿宣阿敏十六罪衆議當誅上不忍致法幽之碩託湯古代那穆泰巴布泰圖爾格等各奪爵革職有差諸將中有力戰殺敵者釋之先是阿敏既屠永平官民以其妻子分給士卒上曰彼既屠我歸順良民又奴其妻子耶命編為民戶以房舍衣食給之秋九月戊戌申諭諸大臣滿漢官各勤職業冬十月辛酉諭編審各旗壯丁隱匿者罰之十一月甲午那堪泰部虎爾噶率家屬來歸阿魯四子部諸貝勒來歸壬寅阿魯伊蘇忒部聞上善養民留所部於西拉木輪河而偕我使臣察漢喇嘛來朝十二月戊辰科爾沁貝勒圖美衞徵來朝五年春正月庚辰諭已故功臣無後者家產給其妻自贍壬午鑄紅衣大礮成鐫曰天祐助威大將軍軍中造礮自此始乙未以額駙佟養性總理漢人軍民事漢官聽其節制己亥幸文館入庫爾䗿直房問所修何書對曰記註所行政事上曰如此朕不宜觀又覽達海所譯武銓見投醪飲河事曰古良將體恤士卒三軍之士樂為致死若額駙顧三台對敵時見戰士歿者以繩曳之歸安能得人死力乎庚子朝鮮貢物不及額却之以書責其罪二月庚申敕邊臣謹斥堠甲戌孟阿圖征瓦爾喀奏捷三月乙亥朔鑲藍旗固山額真額駙顧三台罷以太祖弟之子篇古代之書諭大貝勒代善三貝勒莽古爾泰及貝勒諸大臣求直言過失丁亥閱漢兵甲午誅劉興祚興治家屬赦其母丁酉朝鮮復遣使來貢辛丑遣滿達爾漢董訥密遺朝鮮王書索戰船助攻明不許六月癸亥定功臣襲職例黑龍江伊札訥薩克提伽期訥俄力喀康柱等五頭目來朝秋七月甲戌黑龍江虎爾哈部四頭目來朝貢庚辰始設六部以墨勒根戴青貝勒多爾袞貝勒德格類薩哈廉岳託濟爾哈朗阿巴泰等管六部事每部滿漢蒙古分設承政官其下設參政各八員啟心郎各一員改巴克什為筆帖式其尚稱巴克什者仍其舊更定訐告諸貝勒者准其離主例其以細事訐訴者禁之諭貝勒審事寃抑不公者坐罪除職官有罪概行削職律嗣後有罪者分別輕重降罰有差並禁官民同族嫁娶犯者男婦以姦論又諭貝勒諸大臣省過改行求極諫甲申鬧雷虎爾哈部四頭目來朝貢癸巳定小事賞罰例令牛彔額真審理大者送部明總兵祖大壽等築大凌河檄諸蒙古各率所部來會征之己亥大軍西發命貝勒杜度薩哈廉豪格留守庚子渡遼河申誡諸將恤士卒八月壬寅朔次舊遼河而營蒙古諸部率兵來會癸卯集蒙古諸貝勒申前令無擅殺掠於是分兵兩路貝勒德格類岳託阿濟格以兵二萬由義州入屯錦州大凌河之間上自白土場入廣寧丁未會於大凌河乘夜攻城令曰攻城恐傷士卒當掘壕築壘困之彼若出與之戰外援至迎擊之乃分八旗兵合圍令蒙古兵承其隙辛亥明馬步兵五百人出城達爾哈擊敗之壬子射書城中招蒙古人出降癸丑明兵出城誘戰圖賴先入達爾哈繼之四面環攻貝勒多爾袞亦率兵入城內礮矢俱發圖賴被創副將孟坦屯布祿備禦多貝侍衞戈里戰歿上以圖賴等輕進切責之以紅衣礮攻明臺兵降者相繼乙卯遺祖大壽書曰往者我欲和爾國君臣以宋為鑑不我應爾國非宋我亦非金何不達若此朕今厭兵革更以書往惟將軍裁之大壽不答丁巳明松山兵二千來援阿山勞薩土魯什擊敗之甲子貝勒阿濟格碩托遮擊明援兵丁卯明錦州兵六千來攻阿濟格營會大霧覿面不相識忽有青氣衝敵營闢若門我軍乘霧進大戰敗之擒游擊一盡獲其甲仗馬匹辛未上詣貝勒阿濟格營酌金卮勞諸將明兵突出師夾擊又大敗之九月丁亥上以兵趨錦州見塵起上命諸軍勿行自率擺牙喇兵二百與貝勒多鐸緣山潛進明錦州兵七千突出進上前上甫擐甲從者不及二百人渡河衝敵軍敵不能當潰走諸軍繼至又大敗之斬一副將而還己丑復以書招祖大壽庚寅上設伏山內誘大壽出將擒之大壽驚遁自是閉城不出時城中穀止百石馬死盡煮馬肉為食以鞍代爨乙未明太僕寺卿監軍道張春總兵吳襄鍾緯等以馬步兵四萬來援壁小凌河戊戌明援兵趨大凌河距城十五里上率兩翼騎兵衝擊之不動右翼兵猝入張春營敵遂敗吳襄及副將桑阿爾寨先奔張春等復集潰兵立營會大風敵乘風縱火將及我軍天忽雨反風復戰遂大破之生擒張春及副將三十三人春不屈乞死上赦不殺是役也祖大壽仍以我為誘敵故城中無應者是夕黑雲龍遁去冬十月丁未以書招祖大壽何可剛張存仁己酉再遺大壽書壬子以紅衣礮攻于子章臺臺最固三日臺毀守臺將王景降於是遠近百餘臺俱下甲寅遣降將姜新招祖大壽大壽亦遣游擊韓棟來會癸亥議三貝勒莽古爾泰上前持刃罪降貝勒奪所屬五牛彔乙丑祖大壽約我副將石廷柱議降丙寅大壽遣其子可法為質戊辰大凌河舉城降獨副將何可剛不從大壽掖可剛至軍前殺之夜至御營上優遇之大壽遂獻取錦州策己巳遣兵隨大壽夜襲錦州會大霧失伍還十一月庚午朔縱大壽還錦州戊寅毀大凌河城己卯班師乙酉上還瀋陽丙戌察哈爾侵阿魯西拉木輪地貝勒薩哈廉豪格移師征之會察哈爾已去乃還閏十一月庚子朔諭曰我兵之棄永平四城皆貝勒等不學無術所致頃大凌河之役城中人相食明人猶死守及援盡城降而錦州松杏猶不下豈非其人讀書明理盡忠其主乎自今凡子弟年十五歲以下八歲以上皆令讀書遣庫爾纏等責朝鮮違約罪庚戌禁國中不得私立廟寺喇嘛僧違律者還俗巫覡星士並禁止之十二月壬辰參將寧完我請設言官定服制上嘉納之丙申用禮部參政李伯龍言更定元旦朝賀行禮班次六年春正月癸亥閱漢兵二月壬申定儀仗制丁丑謁太祖陵行時享禮戊子諭海州等處城守官三年一赴瀋陽考察丁酉諭戶部貝勒德格類以大凌河漢人分隸副將以下給配撫養給還貝勒莽古爾泰所罰人口三月戊戌賚大凌河諸降將有差命達海分析國書音義庚戌定訐告諸貝勒者輕重虛實坐罪例禁子弟告父兄妻告夫者定貝勒大臣賜祭葬例丁巳征察哈爾徵蒙古兵頒軍令夏四月戊辰朔上率大軍西發阿巴泰杜度揚古利伊爾登佟養性留守己巳次遼河丙子次西拉木輪河己卯次札滾烏達諸蒙古部兵以次來會乙酉次哈納崖察哈爾汗林丹聞我師至大懼驅歸化城富民牲畜渡河西奔盡委輜重而去庚寅次都勒河聞察哈爾林丹遠遁上趨歸化城丙申大軍自阿濟格和爾戈還趨察哈爾五月癸卯諭諸部貝勒大臣勿輕進勿退縮勿殺降勿分散人妻子勿奪人衣服財物甲辰次布龍圖布喇克丁未勞薩奏報察哈爾遁去已久逐北三日無所見上自布龍圖旋師戊申定議征明丙辰次朱兒格土時糧盡忽逢黃羊徧野遂合圍殺數萬脯而食之無水以一羊易杯水而飲上命各牛彔持水迎給之庚申次木魯哈喇克沁貝勒阿濟格率左翼略宣府大同貝勒濟爾哈朗率右翼略歸化城上與大貝勒代善貝勒莽古爾泰統大軍繼進甲子上至歸化城兩翼兵來會是日大軍馳七百里西至黃河木納漢山東至宣府自歸化城南至明邊境所在察哈爾部民悉俘之六月丁卯朔蒙古部民竄沙河堡上以書諭明守臣索之明歸我男婦三百二十牲畜千四百有辛未寧完我范文程馬國柱合疏言伐明之策宜先以書議和俟彼不從執以為辭乘釁深入可以得志上嘉納之甲戌大軍發歸化城趨明邊丁丑明沙河堡守臣使賫牲幣來獻己卯庫爾纏等自得勝堡愛巴禮等由張家口分詣大同宣府議和書曰我之興兵非必欲取明天下也遼東守臣貪黷昏罔勸葉赫陵我遂嬰七恨屢愬爾主而遼東壅不上聞我兵至此欲爾主察之也及攻撫順又因十三省商賈各遺以書慮其不克徑達則各以書進其省官吏冀有一聞乃縱之使去寂焉不復語云下情上達天下罔不治下情上壅天下罔不亂今所在征討爭戰不息民死鋒鏑雖下情不達之故抑豈天意乎我今聞誠相告國雖褊小惟欲兩國和好互為貿易各安畊獵以享太平若言不由衷天其鑒我前者屢致書問憤疾之詞固所不免此兵家之常不足道也幸速裁斷實國之福我駐兵十日以待庚辰駐大同邊外庫爾纏偕明得勝堡千總賫牲幣來獻上不納復遺書明守臣曰我仰體天意願申和好爾果愛民宜速定議若延時不報縱欲相待如軍中糧盡何至書中稱謂姑勿論我遜爾國我居察哈爾之上可耳癸未趨宣府守臣以明主所給察哈爾緞布皮幣一萬二千五百歸我庚寅駐張家口外列營四十里癸巳明巡撫沈棨總兵董繼舒遣人賫牛羊食物來獻上宴之遂定和議大市於張家口科爾沁部兵三人潛入明邊盜牛驢斬其首者鞭二人貫耳以徇甲午明巡撫沈棨遣使來請盟命大臣阿什達爾哈等蒞之刑白馬烏牛誓告天地禮成遣啟心郎祁充格送明使歸明以金幣來獻晉封皇子豪格為和碩貝勒是月遼東大水秋七月丁酉朔復以書約明張家口守臣信誓敦好善保始終且謂和議遼東地方在內爾須遣官往告上率大軍還庚子至上都河明以和議成來餽禮物酌納之辛丑蒙古諸貝勒辭歸庚戌次擺斯哈兒游擊巴克什達海卒庚申上還瀋陽八月丁卯召明諸生王文奎孫應時江雲入宮問以和事成否三人皆言明政日紊和議難必且中原盜賊蜂起人民離亂勸上宣布仁義用賢養民乘時弔伐以應天心癸酉六部署成頒銀印各一甲午命固山額真察民疾苦清理刑獄察哈爾檮納楚虎爾來歸九月癸卯修復蓋州城移民實之甲寅命戶部貝勒德格類兵部貝勒岳託展耀州舊界至蓋州迤南冬十月乙丑朔幸開原甲戌還瀋陽遣衞徵囊蘇喇嘛赴寧遠賫書致明帝曰我國稱兵非不知足而冀大位因邊臣欺侮致啟兵釁往征察哈爾時過宣府定和議我遂執越境盜竊之人戮之塞下我之誠心可謂至矣前邊臣未能細述今欲備言又恐疑我不忘舊怨如遣信使來將盡告之若謂已和不必語及往事亦惟命又與明諸臣書曰宣府守臣與我盟時約我毋侵遼東誓諸天地今爾乃有異議天可欺乎執政大臣宜通權變慎勿徒事大言坐失事機若堅執不從惟尋師旅生靈荼毒咎將誰歸十一月壬寅明寧遠守臣以我所遺書封固不敢以陳請露封許之辛亥阿祿部都思噶爾濟農所屬祁他特吹虎爾台吉來附壬子遣使往朝鮮定歲貢額十二月乙丑定朝服及官民常服制三貝勒莽古爾泰卒乙亥吳巴海征兀札喇遣使告捷七年春正月庚子諭各牛彔額真以恤貧訓農習射辛丑朝鮮來貢不及額丁未復書責之戊申皇長女下嫁敖漢部貝勒都喇爾巴圖魯子台吉班第乙卯征兀札喇師還二月癸亥朔阿魯科爾沁汗車根率固木巴圖魯達爾馬代袞等舉國來附己卯庫爾纏有罪誅癸未土魯什勞薩等略寧遠三月丁酉築場攬盤通遠堡岫巖四城辛丑郭爾羅斯部台吉固木來朝丙辰明故總兵毛文龍部將孔有德耿仲明遣使來約降夏四月乙丑察哈爾兩翼大總管塔什海虎魯克寨桑來附乙亥使參將英俄爾岱等借糧朝鮮濟孔有德軍不從五月乙未吳喇忒台吉土門達爾漢等來朝壬子貝勒濟爾哈朗阿濟格杜度率兵迎孔有德耿仲明於鎮江命率所部駐東京六月壬戌諭將士毋侵擾遼東新附人民違者孥戮之癸亥召孔有德耿仲明入覲厚賚之丙寅遣英俄爾岱遺朝鮮王書曰往之借糧貴國王以孔有德等昔隸毛氏無輸糧養敵之理今有德歸我糧已足給惟兵卒守船輓運維艱近距貴國以糧給之甚便朕思王視明為父視朕為兄父兄相爭數年而王坐觀成敗是外有父兄之名而內懷幸禍之意若力為解勸息兵成好不惟我兩國樂見太平即貴國亦受其福若仍以兵助明合而禦我則搆兵實自王始己巳諭官民冠服遵制畫一癸酉以孔有德為都元帥耿仲明為總兵官並賜敕印戊寅英俄爾岱奏報朝鮮用明人計借兵倭國又於義州南嶺築城備我集諸貝勒大臣議之皆言宜置朝鮮而伐明己卯貝勒岳託德格類率右翼楞額禮葉臣左翼伊爾登昂阿喇及石廷柱孔有德耿仲明將兵取明旅順口甲申東海使犬部額駙僧格來朝貢丁亥諭曰凡進言者如朕所行未協於義宜直言勿諱政事或有愆忌宜開陳無隱六部諸臣奸偽貪邪行事不公宜行糾劾諸臣有艱苦之情亦據實奏聞苟不務直言遠引曲喻勦襲紛然何益於事秋七月辛卯朔諭滿洲各戶有漢人十丁者授棉甲一以舊漢軍額真馬光遠統之壬辰阿祿部孫杜稜子台吉古木思轄布寨桑吳巴什阿什圖巴達爾和碩齊等吳喇忒部台吉阿巴噶爾代皆來朝貢甲辰貝勒岳託等奏克旅順口八月庚申朔英俄爾岱等自朝鮮還以復書允糧濟我守船軍士壬戌貝勒阿巴泰阿濟格薩哈廉豪格等略明山海關外庚辰貝勒德格類岳託師還丁亥以副將石廷柱為總兵官九月庚子貝勒阿巴泰等師還上以其不深入責之癸卯英俄爾岱等往朝鮮互市庚戌明登州都司蔡賓等來降冬十月壬戌遣使外藩蒙古各部宣布法令丙寅大閱丁卯發帑賚八旗步兵己巳諭曰置官以來吏戶兵三部辦事盡善刑部訊獄稽延罔得實情禮部工部皆有缺失夫啟心郎之設欲其隨事規諫啟乃心也乃有差謬而不聞開導何耶又曰爾等動以航海取山東攻山海關為言航海多險攻堅易傷是以空言相賺不啻為敵計耳兵事無藉爾言惟朕與諸貝勒有過當極言耳又諭文館諸儒臣曰太祖始命巴克什額爾德尼造國書後庫爾纏增之慮有未合爾等職司紀載宜悉心訂正朕嗣大位凡皇考行政用兵之大不一一詳載後世子孫何由而知豈朕所以盡孝道乎丙子授明降將馬光遠為總兵官王世選麻登雲為三等總兵官馬光先孟喬芳等各授職有差癸未明廣鹿島副將尚可喜遣使來約降十一月甲辰英俄爾岱復賫書往朝鮮責以違約十事戊申遣季思哈吳巴海往征朝鮮接壤之虎爾哈部辛亥上獵於葉赫十二月辛未上還瀋陽八年春正月庚寅諭蒙古諸貝勒令遵我國定制黑龍江羌圖里嘛爾干率六姓來朝貢癸巳詔宗人自興祖直皇帝出者為六祖後免其徭役乙未正黃旗都統一等總兵官楞額禮卒癸卯漢備禦訴漢人徭役重於滿洲戶部貝勒德格類以聞上命禮部貝勒薩哈廉集衆諭其妄漢總兵官石廷柱等執備禦八人請罪上曰若加以罪則後無復言者並釋之戊申塔布囊等征察哈爾潰衆於席爾哈席伯圖己酉蒿齊忒部台吉額林臣來歸丁巳免功臣身故無嗣者丁之半妻故始應役著為令二月壬戌定喪祭例妻殉夫者聽仍予旌表逼妾殉者妻坐死遣貝勒多爾袞薩哈廉往迎降將尚可喜使駐海州丁卯都元帥孔有德劾耿仲明不法狀諭解之戊辰遣阿山等略錦州三月丁亥朔日有食之綠虹見辛卯命譚泰圖爾格略錦州壬辰副將尚可喜率三島官民降駐海州己亥大閱甲辰遣英俄爾岱往朝鮮互市令孔有德耿仲明尚可喜幟用白鑲皂以別八旗壬子考試漢生員夏四月辛酉升授太祖諸子湯古代等副將參將備禦有差又以哈達烏喇二部之後無顯職授哈達克什內為副將烏喇巴彥為三等副將詔以瀋陽為天眷盛京赫圖阿喇城為天眷興京改定總兵副將參將游擊備禦滿字官名丁丑尚可喜來朝命為總兵官乙亥以太祖弟之子拜尹圖為總管辛巳初命禮部考試滿洲漢人通滿漢蒙古書義者取剛林等十六人為舉人賜衣一襲免四丁乙酉金繼孟等自明石城島來降以隸尚可喜五月丙戌朔黑龍江巴爾達齊來貢庚寅察哈爾台吉毛祁他特來朝定滿漢馬步軍名丙申議征明諸貝勒請從山海關入上曰不然察哈爾為我軍所敗其貝勒大臣將歸我宜直趨宣大以逆之乃集各都統部署軍政遣國舅阿什達爾哈徵科爾沁兵以書招撫遺衆之在明境者壬寅定百官功次賜敕書其世襲及官止本身者分別開載有差甲辰季思哈吳巴海征虎爾哈部奏捷命貝勒濟爾哈朗留守盛京貝勒杜度守海州吏部承政圖爾格等渡遼河沿張古臺河駐防並扼敵兵俱授方略畢上率大軍前發己酉次都爾鼻諸蒙古外藩兵以次來會甲寅次訥里特河六月辛酉頒軍令於蒙古諸貝勒及孔有德耿仲明尚可喜曰行軍時勿離纛勿諠譁勿私出劫掠抗拒者誅之歸順者字之勿毀廟宇勿殺行人勿奪人衣服勿離人夫婦勿淫人婦女違者治罪先是察哈爾林丹西奔圖白特其部衆苦林丹暴虐逗遛者什七八食盡殺人相食屠劫不已潰散四出至是絡繹來附者前後數千戶辛未次庫黑布里都議覺羅布爾吉英俄爾岱擅殺察哈爾布顏圖部衆罪並奪其賜甲戌次喀喇拖落木命貝勒德格類率兵入獨石口偵居庸關期會師於朔州戊寅諭蒙古諸貝勒曰科爾沁噶爾珠塞特爾等叛往索倫為其族兄弟等追獲被殺朕心惻然朕欲宣布德化使人民共登安樂今諸貝勒雖以罪誅亦朕教化所未洽也又命減阿魯部達喇海等越界駐牧罪壬午察哈爾土巴濟農率其民千戶來歸喀爾喀部巴噶達爾漢來歸甲申命大貝勒代善等率兵入得勝堡略大同西至黃河副都統土魯什吳拜等逕歸化撫察哈爾逃民俱會師朔州秋七月己丑命貝勒阿濟格多爾袞多鐸等入龍門會宣府上親統大軍自宣府趨朔州期四路兵剋期並進辛卯毀邊牆壬辰入上方堡至宣府右衞以書責明守臣負盟之罪仍諭其遣使議和癸巳駐城東南時阿濟格攻龍門未下令略保安丁酉營東城遺明代王書復約其遣使議和代善攻得勝堡克之明參將李全自縊死進攻懷仁井坪皆不克遂駐朔州丙午上圍應州令代善等趣馬邑土魯什至歸化城察哈爾林丹之妻率其八寨桑以一千二百戶來降庚戌阿濟格等攻保安州克之壬子德格類入獨石口取長安嶺攻赤城不克俱會師於應州八月乙卯命諸將略代州薩哈廉襲崞縣拔之丙辰碩托入圓平驛甲子阿巴泰等取靈丘縣之王家莊克之禮部承政巴都禮戰歿又攻應州之石家村堡克之丙寅上發應州聞明陽和總督張宗衡大同總兵曹文詔駐懷仁度是夜必奔大同令土魯什吳拜伏兵邀之師行遲宗衡等逸去上怒責之戊辰上至大同遺書文詔令贊和議又遺書衆官索察哈爾餘孽之在明者文詔挑戰擊敗之貝勒阿巴泰等拔靈丘明代王母楊氏與張宗衡曹文詔以書來請和辛未遣使以書報之壬申代善率師來會癸酉駐師大同遣明宗室朱乃廷及俘獲僧人入城三索報書俱不答縱乃廷妻子及朱乃振還丁丑營四十里鋪得明間諜書北樓口為書報之曰來書以滿洲為屬國即予亦未嘗以為非也惟遼東之官欺凌我國皇帝惑於臣下之誑雖干戈十數年來無一言詢及使我國之情不達若遣一信使判白是非則兵戈早息矣欲享太平只旦暮間事不然爾國臣僚壅蔽欺罔虛報斬伐以吾小國果受傷夷詎能數侵豈皇帝之聰明獨不能一忖度耶願和之誠黑雲龍自知之慮其恐結怨於大臣不盡告耳己卯大軍至陽和明總兵曹文詔詭以書誑張宗衡偽言礮傷我兵得纛一桿等語為我邏者所獲上乃遺宗衡書曰予謂爾明當有忠臣義士實心謀國者乃一旦虛誑至此豈不愧於心乎今與公等約我兵以一當十能約期出戰當勒兵以俟若誑言欺君貽害生靈禍櫱將無窮矣壬午次懷遠癸未駐左衞閏八月丙戌以書責明宣府太監欺君誤國罪丁亥副都統土魯什被創卒攻萬全左衞克之庚寅班師察哈爾噶爾馬濟農等遣使乞降言其汗林丹病殂汗子及國人皆欲來歸於是命阿什達爾哈等往偵之丁酉移軍舊上都城庚戌移軍克蚌辛亥察哈爾寨桑噶爾馬濟農等率其國人六千奉豆土門福金來歸九月戊辰留守貝勒濟爾哈朗疏報季思哈吳巴海征虎爾哈俘一千三百餘人阿魯部毛明安舉國來附辛未渡遼河壬申上還盛京冬十月己丑建太祖陵寢殿樹松立石獸壬辰論征宣大將士功罪己亥科爾沁台吉吳克善來歸其妹納之庚戌以八年征討克捷為文告太祖壬子朝鮮國王李倧遣使以書來上以其言不遜復書切責之十一月乙丑六部官考績陞授有差十二月癸未朔朝鮮國王以書來謝罪壬辰命副都統霸奇蘭參領薩木什喀征黑龍江未服之地丙申分定宗室額駙等專管佐領有差丁酉墨勒根喇嘛以嘛哈噶喇金像來貢遣使迎至盛京癸卯察哈爾祁他特車爾貝塞冷布都馬爾等各率所部人民來歸遣吳巴海荊古爾代征瓦爾喀甲辰佐領劉學誠疏請立郊壇勤視朝上曰疏中欲朕視朝勤政是也至建立郊壇未知天意所在何敢遽行果成大業彼時議之未晚也九年春正月丁卯上親送科爾沁土謝圖濟農等歸國癸酉免功臣徭役丁丑詔太祖庶子稱阿格六祖子孫稱覺羅覺羅繫紅帶以別之有詈其祖父者罪至死二月壬午令諸臣薦舉居心公正及通曉文藝可任使者丁亥編喀喇沁部蒙古壯丁為十一旗每旗設都統一員下以副都統參領二員統之戊子諭曰邇來進言者皆請伐明朕豈不以為念然亦須相機而行今察哈爾新附人心未輯城郭未修而輕於出師何以成大業且大兵一舉明主或棄而走或懼而請和攻拒之策何者為宜其令高鴻中鮑承先寧完我范文程等酌議以聞己丑沈佩瑞請屯田廣寧閭陽造舟輓粟為進取計上嘉納之乙未范文程寧完我請薦舉不實宜行連坐法丁未命多爾袞岳託豪格薩哈廉將精騎一萬收察哈爾林丹之子額爾克孔果爾額哲三月戊辰諭曰頃民耕耨愆期蓋由佐領有事築城民苦煩役所致嗣有濫役妨農者治其罪庚午察哈爾寨桑巴賴都爾等一千四百餘人來歸五月乙卯霸奇蘭薩木什喀征黑龍江虎爾哈部盡克其地編所獲人口以歸論功陞賞有差癸亥上以西征諸貝勒經宣大境度明必調寧錦兵往援遣貝勒多鐸率師入寧錦撓之己巳命文館譯宋遼金元四史壬申貝勒多鐸奏報殲明兵五百人於錦州松山城外殺其副將劉應選丙子貝勒多爾袞岳託薩哈廉豪格等奏報兵至西喇朱爾格遇察哈爾囊囊太妃暨台吉瑣諾木等以一千五百戶降遂抵額爾克孔果爾額哲所居其母率額哲迎降六月乙酉貝勒多鐸凱旋賜良馬五賞從征將士有差丁酉吳巴海荊古爾代師還論功亦如之明登州黃城島千總李進功來降辛丑諭曰太祖以人民付朕當愛養之諸貝勒非時修繕勞苦百姓民不得所寖以逃亡是違先志而長敵寇也今朝鮮賓服察哈爾舉國來附苟不能撫輯其衆後雖拓地何以處之貝勒大臣其各戢驕縱以副朕意壬寅察哈爾台吉瑣諾木率其屬六千八百人來歸癸卯諭曰太祖禁貝勒子弟郊外放鷹慮其踐田園擾牲畜也今違者日衆語曰涓涓不塞將成江河其嚴禁之秋七月癸酉論漢人丁戶增減擢參領李思忠等六員官高鴻中等十一員黜罰有差八月庚辰貝勒多爾袞岳託薩哈廉豪格以獲傳國玉璽聞先是元順帝北狩以璽從後失之越二百餘年為牧羊者所獲後歸於察哈爾林丹汗林丹亦元裔也璽在蘇泰太妃所至是獻之時岳託以疾留歸化城多爾袞等率兵略明山西自平虜衞入邊毀長城略忻州代州至崞縣甲申繪太祖實錄圖成乙巳上率大貝勒代善及諸貝勒多爾袞等師次平虜堡丁未渡遼河閱巨流河城堡九月癸丑貝勒多爾袞等師還獻玉璽告天受之額爾克孔果爾額哲及其母來朝庚午上還宮壬申召諸貝勒大臣數代善罪衆議削大貝勒號及和碩貝勒奪十佐領其子薩哈廉奪二佐領哈達公主降庶人褫其夫瑣諾木濟農爵號上皆免之冬十月己卯以明議和不成將進兵遣使賫書諭明喜峯口董家口諸邊將管戶部事和碩貝勒德格類卒癸未命吳巴海多濟里札福尼吳什塔分將四路兵征瓦爾喀十一月丁未朔命額爾克孔果爾額哲奉母居孫島習爾哈十二月辛巳哈達公主莽古濟之僕冷僧機首告貝勒莽古爾泰生時與女弟莽古濟弟德格類謀逆公主之夫瑣諾木及屯布祿愛巴禮與其事會瑣諾木亦自首訊得實莽古濟莽古爾泰子額必倫及屯布祿愛巴禮皆伏誅莽古爾泰餘子德格類子俱為庶人瑣諾木自首免罪授冷僧機三等副將丁酉謁太祖陵甲辰貝勒薩哈廉與諸貝勒及大貝勒代善盟誓請上尊號上不許會蒙古貝勒復來請上曰朝鮮兄弟國宜告之十年春正月壬戌皇次女下嫁額爾克孔果爾額哲二月丁丑八和碩貝勒與外藩四十九貝勒各遺書朝鮮約其國王勸進尊號戊子遣使至明邊松棚路潘家口董家口喜峯口賫書致明帝索其報書定諸臣帽頂飾庚寅寧完我以罪免三月丙午朔清明節謁太祖陵辛亥改文館為內國史內祕書內弘文三院乙卯遣貝勒阿濟格阿巴泰築噶海城庚申吳什塔等征瓦爾喀遣使奏捷諭曰蒙古深信喇嘛實乃妄人嗣後有懸轉輪結布旛者宜禁止之乙丑英俄爾岱等自朝鮮還言國王李倧不接見亦不納書以其報書及所獲倧諭邊臣書進諸貝勒怒欲加兵上曰姑遣人諭以利害質其子弟不從興兵未晚也丁卯外藩蒙古十六國四十九貝勒及孔有德耿仲明尚可喜俱以請上尊號至盛京夏四月己卯大貝勒代善和碩貝勒濟爾哈朗多爾袞多鐸岳託豪格阿巴泰阿濟格杜度率滿漢蒙古大臣及蒙古十六國四十九貝勒以三體表文詣闕請上尊號曰恭維我皇上承天眷祐應運而興當天下昏亂修德體天逆者威順者撫寬溫之譽施及萬姓征服朝鮮混一蒙古遂獲玉璽受命之符昭然可見上揆天意下協輿情臣等謹上尊號儀物俱備伏願俞允上曰爾貝勒大臣勸上尊號歷二年所今再三固請朕重違爾諸臣意弗獲辭朕既受命國政恐有未逮爾等宜恪恭贊襄羣臣頓首謝庚辰禮部進儀注壬午齋戒設壇德盛門外
