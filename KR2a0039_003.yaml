body:
  text: 清史稿卷三本紀三太宗本紀二崇德元年夏四月乙酉祭告天地行受尊號禮定有天下之號曰大清改元崇德羣臣上尊號曰寬溫仁聖皇帝受朝賀始定祀天太牢用熟薦遣官以建太廟追尊列祖祭告山陵丙戌追尊始祖為澤王高祖為慶王曾祖為昌王祖為福王考諡曰承天廣運聖德神功肇紀立極仁孝武皇帝廟號太祖陵曰福陵妣諡曰孝慈昭憲純德貞順成天育聖武皇后追贈族祖禮敦巴圖魯為武功郡王追封功臣費英東為直義公額亦都為弘毅公配享丁亥羣臣上表賀諭曰朕以涼德恐負衆望爾諸臣宜同心匡輔各共厥職正己率屬克殫忠誠立綱陳紀撫民恤衆使君明臣良政治咸熙庶克荷天之休命羣臣頓首曰聖諭及此國家之福也以受尊號禮成大赦己丑多濟里扈習征瓦爾喀師還賞賚有差朝鮮使臣歸國初上受尊號朝鮮使臣羅德憲李廓獨不拜上曰彼國王將搆怨欲朕殺其使臣以為詞耳其釋之至是遣歸以書諭朝鮮國王責之命送子弟為質丁酉功封大貝勒代善為和碩兄禮親王貝勒濟爾哈朗為和碩鄭親王多爾袞為和碩睿親王多鐸為和碩豫親王豪格為和碩肅親王岳託為和碩成親王阿濟格為多羅武英郡王杜度為多羅安平貝勒阿巴泰為多羅饒餘貝勒諸蒙古貝勒巴達禮為和碩土謝圖親王吳克善為和碩卓禮克圖親王固倫額駙額哲為和碩親王布塔齊為多羅札薩克圖郡王滿朱習禮為多羅巴圖魯郡王袞出斯巴圖魯為多羅達爾漢郡王孫杜稜為多羅杜稜郡王固倫額駙班第為多羅郡王孔果爾為冰圖王東為多羅達爾漢戴青俄木布為多羅達爾漢卓禮克圖古魯思轄布為多羅杜稜單把為達爾漢耿格爾為多羅貝勒孔有德為恭順王耿仲明為懷順王尚可喜為智順王辛丑朝鮮使臣置我書於通遠堡不以歸札福尼征瓦爾喀師還五月丙午以希福為內弘文院大學士范文程鮑承先俱為內秘書院大學士剛林為內國史院大學士壬子貝勒薩哈廉卒輟朝三日癸丑始薦櫻桃於太廟丁巳設都察院諭曰朕或奢侈無度誤誅功臣或畋獵逸樂不理政事或棄忠任奸黜陟未當爾其直陳無隱諸貝勒或廢職業黷貨偷安爾其指參六部或斷事偏謬審讞淹遲爾其察奏明國陋習此衙門亦賄賂之府也宜相防檢挾讐劾人例當加罪餘所言是即行所言非不問壬戌追封薩哈廉為和碩穎親王己巳以張存仁為都察院承政祖澤洪為吏部承政韓大勳為戶部承政姜新為禮部承政祖澤潤為兵部承政李雲為刑部承政裴國珍為工部承政都統伊爾登罷以圖爾格為鑲白旗都統庚午武英郡王阿濟格饒餘貝勒阿巴泰公揚古利等率師征明上御翔鳳閣面授方略且誡諭之癸酉師行六月甲戌朔授蒙古降人布爾噶都等世職有差己卯命豫親王多鐸管禮部事肅親王豪格管戶部事甲申封薩哈廉子阿達禮為多羅郡王丙戌以國舅阿什達爾漢為都察院承政尼堪為蒙古承政秋七月己未檄外藩蒙古兵征明辛酉阿濟格等會師出延慶州俘人畜一萬五千有奇八月丁丑遣官祭孔子辛巳成親王岳託肅親王豪格以罪降多羅貝勒癸未睿親王多爾袞豫親王多鐸貝勒岳託豪格舉師征明九月戊申明兵入場命吳善季思哈率兵禦之己酉阿濟格等奏我軍經保定至安州克十二城五十六戰皆捷生擒總兵巢丕昌等人畜十八萬庚申伊勒慎等追明兵至娘娘宮渡口見敵船甚衆不敢進奏聞命宜蓀往援復遣杜度率師助之辛酉蒙古達賴拜賀拜音代等自塔山來降己巳阿濟格等師還冬十月癸酉多爾袞等師還丁亥遣大學士希福等往察哈爾喀爾喀科爾沁諸部稽戶口編佐領讞庶獄頒法律禁奸盜戊戌朝鮮國王李倧以書來卻之十一月戊申復命岳託管兵部事豪格管戶部事己酉衞寨桑等自蒙古喀爾喀部還偕其使衞徵喇嘛等來貢辛亥徵兵外藩癸丑諭曰朕讀史知金世宗真賢君也當熙宗及完顏亮時盡廢太祖太宗舊制盤樂無度世宗即位恐子孫效法漢人諭以無忘祖法練習騎射後世一不遵守以訖於亡我國嫻騎射以戰則克以攻則取往者巴克什達海等屢勸朕易滿洲衣服以從漢制朕惟寬衣博必廢騎射當朕之身豈有變更恐後世子孫忘之廢騎射而效漢人滋足慮焉爾等謹識之乙卯太祖實錄成乙丑冬至大祀天於圜丘以將征朝鮮告祭天地太廟己巳頒軍令傳檄朝鮮十二月辛未朔外藩蒙古諸王貝勒率兵會於盛京鄭親王濟爾哈朗留守武英郡王阿濟格駐牛莊備邊饒餘貝勒阿巴泰駐噶海城收集邊民防敵壬申上率禮親王代善等征朝鮮大軍次沙河堡睿親王多爾袞貝勒豪格分兵自寬甸入長山口癸酉遣馬福塔等率兵三百為商賈裝潛往圍朝鮮國都多鐸及貝子碩託尼堪以兵千人繼之郡王滿朱習禮布塔齊引兵來會己卯貝勒岳託公揚古利以兵三千助多鐸軍上率大軍距鎮江三十里為營令安平貝勒杜度恭順王孔有德等護輜重居後庚辰渡鎮江至義州壬午上至郭山城其定州遊擊來援度不敵自刎死郭山降癸未至定州定州亦降乙酉至安州以書諭朝鮮守臣勸降己丑多鐸等進圍朝鮮國都朝鮮國王李倧遁南漢山城多鐸等復圍之並敗其諸道援兵辛卯瓦爾喀葉辰麻福塔居朝鮮聞大軍至以其衆來歸丁酉上至臨津江會天暖冰泮不可渡忽驟雨冰結大軍畢渡己亥命都統譚泰等搜剿朝鮮國都留蒙古兵與俱上以大軍合圍南漢城是歲土默特部古祿格楚虎爾鄂爾多斯部額林臣濟農台吉土巴等俱來朝二年春正月壬寅朝鮮全羅道總兵來援岳託擊走之遣英俄爾岱馬福塔齎敕諭朝鮮閣臣數其前後敗盟之罪甲辰大軍渡漢江營於江滸丁未朝鮮全羅忠清二道合兵來援多鐸揚古利擊走之揚古利被創卒庚戌多爾袞豪格軍克長山連戰皆捷以兵來會杜度等運礮車亦至朝鮮勢益蹙李倧以書數乞和上許其出降倧上書稱臣逡巡不敢出壬戌多爾袞軍入江華島得倧妻子護至軍前復諭倧曰來則室家可完社稷可保朕不食言否則不能久待倧聞江華島陷妻子被俘南漢城旦夕且下乃請降庚午朝鮮國王李倧率其子及羣臣朝服出降於漢江東岸三田渡獻明所給敕印上慰諭賜坐還其妻子及羣臣家屬仍厚賜之命英俄爾岱馬福塔送倧返其國都留其子淏為質二月壬申班師貝子碩託恭順王孔有德等率朝鮮舟師取明皮島朝鮮國王李倧表請減貢額詔免丁丑戊寅兩年貢物自己卯秋季始仍貢如額甲戌諭多爾袞等禁掠降民違者該管官同罪辛卯上還盛京癸巳諭戶部平糶勸農三月甲辰殺朝鮮臺諫官洪翼漢校理尹集修撰吳達濟以敗盟故丁未武英郡王阿濟格率師助攻皮島戊午罷蓋州城工夏四月己卯睿親王多爾袞以朝鮮質子李李淏及朝鮮諸大臣子至盛京辛巳阿濟格師克皮島斬明總兵沈世魁金日觀甲申安平貝勒杜度率大軍後隊還丁酉命固山貝子尼堪羅託博洛等預議國政增置每旗議政大臣三人集羣臣諭之曰向者議政大臣額少或出師奉使而朕左右無人卑微之臣又不可使參國議今特擇爾等置之議政之列當以民生休戚為念慎毋怠惰有負朝廷前蒙古察哈爾林丹悖謬不道其臣不諫以至失國朕有過失爾諸臣即當面諍使面從而退有後言委過於上非純臣也又諭曰昔金熙宗循漢俗服漢衣冠盡忘本國言語太祖太宗之業遂衰夫弓矢我之長技今不親騎射惟耽宴樂則武備寖弛朕每出獵冀不忘騎射勤練士卒諸王貝勒務轉相告誡使後世無變祖宗之制閏四月癸卯蒙古貢異獸名齊赫特壬子武英郡王阿濟格師還五月庚午朝鮮國王李倧遣使奉表謝恩贖俘獲丁亥遣朝鮮從征皮島總兵林慶業歸國以敕奬朝鮮王丁酉章京尼堪等征瓦爾喀降之師行逕朝鮮咸鏡道凡兩月始達至是還六月辛丑授喀喇沁歸附人阿玉石等官明千總王國亮都司胡應登百總李忠國等自海島來降莽古爾泰子光袞獲罪伏誅乙卯諭曰頃朝鮮之役兵行無紀見利即前竟忘國憲自今宜思所以宣布法紀修明典制者丙辰以臣朝鮮克皮島祭告太廟福陵丁巳朝鮮國王李倧請平值贖俘不許甲子論諸將征朝鮮及皮島違律罪禮親王代善論革爵宥之鄭親王濟爾哈朗以下論罰有差秋七月己巳遣喀凱等分道征瓦爾喀癸酉戶部參政恩克有罪伏誅辛巳誡諭漢官以空言欺飾者智順王尚可喜自皮島師還壬午大赦癸未優恤朝鮮皮島陣亡將士揚古利等贈官襲職有差乙酉明都司高繼功等自石城島來降庚寅追封皇后父科爾沁貝勒莽古思為和碩福親王壬辰以朝鮮及皮島之捷宣諭祖大壽乙未分漢軍為兩旗以總兵官石廷柱馬光遠為都統分理左右翼八月丙申朔再恤攻皮島朝鮮陣亡將士洪文魁等贈官襲職有差癸丑貝勒岳託以罪降貝子罰金解兵部任丙辰命睿親王多爾袞饒餘貝勒阿巴泰築都爾鼻城己未遣阿什達爾漢等往蒙古巴林札魯特喀喇沁土默特阿魯諸部會理刑獄九月辛未出獵撫安堡以書招明石城島守將沈志祥己丑兵部參政穆爾泰以罪褫職貝勒豪格以逼勒蒙古台吉博洛罪罰金罷管部務冬十月乙未朔初頒滿洲蒙古漢字曆丙午厄魯特顧實車臣綽爾濟遣使來貢厄魯特道遠以元年遣使是年冬始至庚申遣英俄爾岱馬福塔達雲齎敕冊封李倧為朝鮮國王十一月庚午祀天於圜丘朝鮮國王李倧遣使來貢復表請歸其世子並陳國中灾變困窮狀上不許敕諭賜賚之丁丑烏朱穆秦濟農聞上善養民率貝勒等舉國來附癸未追封揚古利為武勳王庚寅出獵打草灘十二月甲辰葉克書星訥率師征卦爾察癸丑征瓦爾喀諸將奏捷戊午蒿齊忒部貝勒博羅特托尼洛率屬來歸阿濟格遣丹岱等敗明兵於清河是歲虎爾哈部托科羅氏克益克勒氏耨野勒氏黑龍江索倫部博穆博果爾黑龍江巴爾達齊精格里河扈育布祿俱來朝三年春正月辛未命貝子岳託仍為多羅貝勒管領旗務丁亥以德穆圖為戶部承政甲午皇第九子生是為世祖章皇帝二月丁酉親征喀爾喀豫親王多鐸武英郡王阿濟格從禮親王代善鄭親王濟爾哈朗睿親王多爾袞安平貝勒杜度居守丁未次喀爾占外藩諸王貝勒等以師來會喀爾喀聞之遁去上行獵達爾那洛湖西駐蹕乙卯次奎屯布喇克庚申明東江總兵沈志祥率石城島將佐軍民來降壬戌遣勞薩以書告明宣府守臣趣互市且以歲幣歸我三月甲子朔次博碩堆命留守諸王築遼陽城甲戌次義奚里庚辰至登努蘇特而還壬午次上都河源河西平地湧泉高五尺夏四月甲午朔次布克圖里葉克書等征黑龍江告捷乙未至遼河丁酉次杜稜城明山海關太監高起潛遣人詭議和戊戌次札哈納里忒己亥次察木哈庚子次俄岳博洛都爾鼻城工竣改名屏城辛丑杜爾伯特部卦爾察札馬柰等來朝貢壬寅至遼陽閱新城乙巳上還盛京葉克書星征黑龍江師還癸丑命明降將沈志祥以其衆居撫順甲寅尼噶里等征虎爾哈師還五月癸酉修盛京至遼河道路以睿親王多爾袞饒餘貝勒阿巴泰董其役乙亥禮親王代善屬下人覺善有罪鄭親王濟爾哈朗等請誅之議削代善爵以細故不許並貸覺善六月庚申始設理藩院專治蒙古諸部事秋七月壬戌朔諭諸王大臣曰自古建國皆立制度辨等威今親王郡王貝勒貝子公主額駙名號等級均有定制乃皆不遵行違棄成憲誠何心耶昔金太祖太宗兄弟一心克成大統朕當創業之時爾等顧不能同心體國恪守典常乎諸王皆引罪丁卯喀爾喀使臣達爾漢囊蘇喇嘛歸諭之曰朕以兵討不庭以德撫有衆天以蒙古諸部與朕爾喀爾喀乃興兵犯歸化甚非分也爾不獲已有逃竄偷生耳爾所能至我軍豈不能至其速悔罪來歸否則不爾宥也壬申達雅齊等往明張家口議歲幣及互市丁丑諭禮部曰凡有不遵定制變亂法紀者王貝勒貝子議罰官繫三日民枷責乃釋之出入坐起違式及官階名號已定而仍稱舊名者戒飭之有效他國衣冠束髮裹足者治重罪又諭大學士希福等曰朕不尚虛文惟務實政今國家殷富政在養民凡新舊人內窮困無妻孥馬匹者或勇敢可充伍以貧不能披甲者許各陳訴驗實給與禁以陣獲良家子女鬻為樂戶者丙戌更定部院官制專設滿洲承政以阿拜為吏部承政英俄爾岱為戶部承政滿達爾漢為禮部承政宜蓀為兵部承政郎球為刑部承政薩木什喀為工部承政貝子博洛為理藩院承政阿什達爾漢為都察院承政命布顏為議政大臣八月甲午禮部承政祝世昌以罪褫職謫戍邊外丙申吳拜沙爾虎達連擊敗明兵於紅山口羅文峪又敗其密雲兵殲之丁酉地震戊申授中式舉人羅碩等十名佐領品級免四丁一等至三等秀才授護軍校品級免二丁各賜朝衣綢布有差未入部者免一丁庚戌阿魯阿霸垓部額齊格諾顏等蒿齊忒部博洛特諾木齊等並來朝貢癸丑以睿親王多爾袞為奉命大將軍統左翼兵貝勒豪格阿巴泰副之貝勒岳託為揚武大將軍統右翼兵貝勒杜度副之分道伐明諭之曰主帥為衆所瞻自處以禮而濟之以和則蒙古朝鮮漢人之來附者自心悅而誠服若計一己之功而不恤國之名譽非所望焉丁巳岳託杜度師行己未以巴圖魯準塔為蒙古都統九月癸亥多爾袞豪格阿巴泰師行壬申上親向山海關以撓明師徵孔有德耿仲明尚可喜兵丁丑定優免人丁例丁亥幸演武場閱兵較射冬十月丁酉岳託師自牆子嶺入遇明兵明總兵官吳國俊敗走戊戌多爾袞軍入青山關己亥上統大軍發盛京甲辰次渾河科爾沁喀喇沁各率兵來會丙午遣沙爾虎達等率師趣義州己酉命濟爾哈朗多鐸各率師分趣前屯衞寧遠錦州上親向義州辛亥索海率師圍大凌河兩岸十四屯堡壬子上次義州遣孔有德耿仲明尚可喜石廷柱馬光遠以礮克其五臺乙卯次錦州丙辰多鐸克桑噶爾寨堡殺其守將孔有德等攻石家堡戚家堡並克之戊午孔有德等攻錦州西臺臺中礮藥自發臺壞克之十一月己未朔多鐸將與濟爾哈朗合師徑中後所會祖大壽往援北京乘夜襲我師庚申多鐸濟爾哈朗還至中後所大壽懼不敢出石廷柱馬光遠攻李雲屯柏士屯郭家堡開州井家堡俱克之孔有德招降大福堡又攻大臺克之辛酉大軍入山海關壬戌上次連山癸亥攻五里河臺明守備李計友等率衆降丁卯上至中後所遇祖大壽收兵入城使告之曰別將軍數載甚思一見至於去留終不相強將軍與我角勝為將之道應爾朕不以此介意亦願將軍勿疑戊辰再遣使諭大壽皆不答己巳濟爾哈朗克摸龍關及五里堡屯臺庚午班師庚辰次圖爾根河遣蒙古軍各歸其部丙戌上還京丁亥地震十二月戊戌刑部承政郎球有罪解任以都察院參政索海代之是歲土默特部古祿格杜爾伯特部卦爾察札馬奈席北部阿拜阿閔兀札喇部井瑙馬考札柰桑吉察鄂爾多斯部額林臣濟農阿魯阿霸垓部額齊格諾顏蒿齊忒部博洛特諾木齊黑龍江博穆博果爾瓦代噶凌阿均來朝貢四年春正月乙丑貝子碩託以罪降輔國公甲戌皇第三女固倫公主下嫁科爾沁額駙祁他特己卯封沈志祥為續順公蒙古喇克等自錦州來歸丁亥蘇尼特部台吉噶布褚等率部人來歸是月明以洪承疇總督薊遼二月丁酉命武英郡王阿濟格率師征明壬寅上親統大軍繼之丙午次翁啟爾渾阿濟格遣使奏捷蒙古奈曼等部率十三旗兵來會庚戌營松山孔有德耿仲明尚可喜石廷柱馬光遠以礮擊城外諸臺克之遣塔布囊布顏率師防烏欣河口壬子上登松山南岡授諸將方略癸丑列礮攻城雉堞悉毀明副將金國鳳拒守不下上命豎雲梯急攻之代善請俟明日上從之明人復完城堞我軍不得入乙卯命阿濟格尼堪羅托等師圍塔山連山三月戊午朔明軍援杏山我兵邀擊之斬五十人己未穿地道攻松山城乙丑命納海等馳略杏山石廷柱馬光遠攻觀民山臺降之丙寅多爾袞杜度等疏報自北京至山西界復至山東攻濟南府破之蹂躪數千里明兵望風披靡克府一州三縣五十七總督宣大盧象昇戰死擒德王朱由郡王朱慈奉國將軍朱慈黨總督太監馮允昇等俘獲人口五十餘萬他物稱是是役也揚武大將軍貝勒岳託輔國公瑪瞻卒於軍上聞震悼輟飲食三日乙亥多爾袞杜度又報自遷安縣出青山關遇明兵二十四戰皆勝己卯復攻松山城明太監高起潛總兵祖大壽自寧遠遣副將祖克勇徐昌永等率兵趨錦州阿爾薩蘭等擊敗之上聞馳赴錦州督師斬徐昌永於陣擒祖克勇甲申解松山圍乙酉駐錦州多爾袞等師還盛京夏四月戊子朔阿濟格略連山壬辰會於錦州癸巳渡大凌河駐蹕己亥杜度等師還辛丑上還盛京哭岳託而後入輟朝三日戊申以庫魯克達爾漢阿賴馬喇希為蒙古都統甲寅以索渾薩璧翰為議政大臣丙辰追封多羅貝勒岳託為多羅克勤郡王五月戊午以貝子篇古有罪削爵己未鄭親王濟爾哈朗率兵略錦州松山杏山辛酉蘇尼特台吉莽古斯俄爾寨率衆來歸丁卯席特庫沙爾虎達等敗明兵於錦州辛未濟爾哈朗奏入明邊九戰皆捷丙子濟爾哈朗師還庚辰以鎮國公艾度禮為都統辛巳召豫親王多鐸數其罪宥之惟坐其征明失利及不親送睿親王出師降多羅貝勒六月戊子蒙古阿蘭柴桑噶爾寨等告岳託生前與其妻父瑣諾木謀不軌代善濟爾哈朗多爾袞皆請窮治上以岳託已死不問並貸瑣諾木勿治庚寅遣馬福塔巴哈納冊封朝鮮國王李倧妻趙氏為朝鮮王妃其長子為世子丙申分漢軍為四旗以石廷柱馬光遠王世選巴顏為都統改纛色辛亥焚哈達葉赫烏喇輝發前所受明敕書於篤恭殿壬子以伊爾登噶爾馬為議政大臣星訥兼議政大臣秋七月丁巳遣官賫書與明帝議和並令朱由等各具疏進許其議成釋還辛未朝鮮國王李倧克熊島執加哈禪來獻乙亥諭滿漢蒙古有能衝鋒陷陣先登拔城者以馬給之八月己丑授宗室固山貝子鎮國公輔國公鎮國將軍奉國將軍等爵有差甲午命貝勒豪格管戶部事杜度管禮部事多鐸管兵部事薩爾糾等率兵征庫爾喀部乙巳歸化城土默特諸章京以所得明歲幣來獻九月乙卯朔以孫達理等八十三人從睿親王入關有功各授官有差賜號巴圖魯乙丑都統杜雷有罪褫職己巳復封貝勒豪格為和碩肅親王癸酉阿濟格阿巴泰杜度率兵略錦州寧遠甲戌封岳託子羅洛宏為多羅貝勒丙子以宗室賴慕布杜沙為議政大臣英俄爾岱為都統馬福塔為戶部承政冬十月丙戌豪格多鐸率兵復略錦州寧遠庚寅蘇尼特部墨爾根台吉騰機思等率諸貝勒阿霸垓部額齊格諾顏等各率部衆自喀爾喀來歸辛卯出獵哈達癸丑以劉之源為都統喀濟海為議政大臣十一月甲寅朔豪格疏報參領阿藍泰率蒙古人來歸遇明兵於寧遠北岡擊敗之斬明總兵金國鳳辛酉遣索海薩木什喀等征索倫部丁卯出獵葉赫十二月甲午上還京是歲黑龍江額納布墨音額爾盆等喀爾喀部土謝圖俄木布額爾德尼等喀爾喀蘇尼特烏朱穆秦科爾沁克西克騰土默特諸部遣使俱來朝貢五年春正月甲子命朝鮮質子李歸省父疾仍令遣別子及子來質遣翁阿岱多濟里等戍錦州閏正月癸未朔令各旗都統分巡所屬屯堡察窮民理寃獄二月丙辰遣多濟里以寧古塔兵三百往征兀札喇部丁巳戶部承政馬福塔卒以車爾格代之覺羅錫翰為工部承政丙寅朝鮮國王第三子來質三月丙戌遣勞薩吳拜等略廣寧己丑勞薩吳拜以逗遛議罰有差薩木什喀等征虎爾哈部克雅克薩城己亥命濟爾哈朗多鐸築義州城駐兵屯田進逼山海關辛丑戶部參政碩詹徵朝鮮水師糧米赴大凌小凌二河乙巳索海薩木什喀征索倫部奏捷夏四月壬子朔罷元旦萬壽諸王貝勒獻物乙亥索海薩木什喀征索倫師還上宴勞於實勝寺庚辰上視師義州五月癸未渡遼河乙酉碩詹以朝鮮水師至癸巳上至義州丁酉蒙古多羅特部人蘇班代等自杏山遣人約降上命濟爾哈朗等率軍迎之戒曰此行勿領多人敵見我兵少必來拒戰我分兵為三以前隊拒戰後二隊為援至杏山祖大壽果遣劉周智吳三桂列陣逼我濟爾哈朗等偽卻縱兵反擊大敗之戊戌命勞薩吳拜等略海邊索倫部三百三十七戶續來降壬寅上率師攻克五里臺乙巳以紅衣礮攻錦州丁未刈其禾而還庚戌駕還京六月乙丑多爾袞豪格杜度阿巴泰濟爾哈朗等屯田義州戊辰朝鮮世子李至先是朝鮮遣總兵官林慶業等載米同我使洪尼喀等自大凌河運三山島遇風覆沒者半與明兵戰又失利乃命陵輓至蓋州耀州留其兵千五百人於海州癸酉多濟里喀柱征兀札喇部師還遣朝鮮王次子李淏歸省秋七月庚辰朔征索倫功索海等賞賚進秩有差癸未定征索倫違律罪薩木什喀等黜罰有差乙酉多爾袞等奏克錦州十一臺請分兵為兩翼屯駐癸巳明總督洪承疇以兵四萬壁杏山遣騎挑戰多爾袞等擊敗之乙未遣吳拜往助多爾袞軍丙午席特庫濟席哈等率師征索倫部上幸安山溫泉己酉多爾袞奏敗明兵於錦州杜度又敗之寧遠八月己未遣希福等至張家口互市乙亥多爾袞奏敗明兵於錦州又敗之大凌河九月乙酉上還宮丙戌命濟爾哈朗阿濟格阿達禮多鐸羅洛宏代圍錦州松山辛卯多爾袞奏敗明兵於松山癸卯重修鳳凰城冬十月壬戌遣英俄爾岱等往朝鮮責罪壬申萬壽節大赦十一月戊寅朔詔免朝鮮歲貢米十之九乙酉濟爾哈朗奏敗明兵於塔山杏山及錦州城下癸巳阿敏卒於幽所戊戌朝鮮國王次子李淏來質十二月庚戌命多爾袞豪格杜度阿巴泰代圍錦州己未遣朝鮮國王三子李歸席特庫濟席哈征索倫部擒博穆博果爾俘九百餘人壬申英俄爾岱等至自朝鮮械繫其尚書金聲黑尼等四人以歸是歲喀爾喀部查薩克圖遣使來朝貢六年春正月庚辰朝鮮國王李倧上表謝罪壬辰席特庫濟席哈等師還癸巳晉席特庫為三等總兵官甲午皇四女固倫公主雅圖下嫁科爾沁卓禮克圖親王吳克善子弼爾塔噶爾額駙丁酉二等副將勞薩有罪革碩翁科羅巴圖魯號降一等參將二月己未以八旗佐領下人多貧乏令戶部察明奏聞諭佐領毋沉湎失職其有因飲酒失業者四十八人並解任諭諸王大臣教子弟習射丙寅多爾袞等奏敗明兵三月己卯濟爾哈朗等代圍錦州丁酉降和碩睿親王多爾袞肅親王豪格為多羅郡王多羅貝勒阿巴泰杜度以下罰銀有差是時祖大壽為明守錦州屢招之不應上令諸王迭出困之而多爾袞等駐營錦州三十里外又時遣軍士還家故有是命己亥遣朝鮮總兵柳琳等率兵助濟爾哈朗軍壬寅濟爾哈朗奏克錦州外城初我軍環錦州而營深溝高壘絕明兵出入城中大懼蒙古貝勒諾木齊台吉吳巴什等請降且約獻東關為內應祖大壽覺之謀執吳巴什等於是諸蒙古大譟與明兵搏戰我軍自外應之遂克其外城大壽退保內城甲辰諾木齊吳巴什等以蒙古六千餘人來歸至盛京夏四月丁未遣阿哈尼堪等率兵詣錦州助濟爾哈朗軍濟爾哈朗奏敗明援兵於松山庚戌遣孔有德尚可喜助圍錦州多爾袞等聞錦州蒙古降請効力贖罪不許五月丁丑明總督洪承疇以兵六萬援錦州屯松山北崗濟爾哈朗等擊走之斬首二千級丁亥索倫部巴爾達齊降己丑遣希福等閱錦州屯營濠塹壬寅諭駐防歸化城都統古祿格等增築外城建敵樓浚深濠以備守禦六月丁未命多爾袞豪格代圍錦州辛酉濟爾哈朗多爾袞等合軍敗明援兵於松山丙寅遣學士羅碩以祖澤潤書招祖大壽庚午多爾袞等又奏敗明援兵於松山秋七月戊寅賜中式舉人滿洲鄂謨克圖蒙古杜當漢人崔光前等朝衣各一襲一二三等生員緞布有差甲申遣孔有德耿仲明尚可喜下副都統率兵助圍錦州乙酉議圍錦州功罪親王以下賞罰有差八月甲辰朔克錦州外城諸將功晉鼇拜勞薩伊爾登等秩復勞薩碩翁科羅巴圖魯號乙巳我軍與明合戰明陽和總兵楊國柱敗死祖大壽自錦州分所部為三突圍不得出丁未封烏朱穆秦部多爾濟濟農為和碩蘇勒親王阿霸垓部多爾濟額齊格諾顏為卓禮克圖郡王丁巳上以明洪承疇巡撫邱民仰等援錦州兵號十三萬壁松山上親率大軍禦之濟爾哈朗留守諸王貝勒大臣以明兵勢衆勸上緩行上笑曰但恐彼聞朕至潛師遁耳若不去朕破之如摧枯拉朽也遂疾馳而進戊午渡遼河洪承疇以兵犯我右翼豪格擊敗之壬戌上至戚家堡將赴高橋召多爾袞以兵來會多爾袞請駐蹕松杏間上從之幸松山明以一軍駐乳峯山由乳峯至松山列步軍七營騎兵則環城東西北壁壘甚堅我師自烏欣河南山至海橫截大路而軍上謂諸將曰敵衆食必不足見我斷其餉道必無固志設伏待之全師可覆也癸亥明兵來犯擊卻之又敗之塔山獲其積粟十二屯甲子明兵再犯又卻之時承疇以餉乏欲就食寧遠上知其將遁分路設伏戒諸將嚴陣以待扼其歸寧遠及奔塔山錦州路是夜明吳三桂等六總兵果潛師先奔昏黑中為我伏兵所截大潰惟曹變蛟王廷臣返松山乙丑又克其四臺王樸吳三桂奔杏山曹變蛟棄乳峯山乘夜襲上營力戰變蛟中創走己巳吳三桂王樸自杏山奔寧遠遇我伏兵又大敗之三桂樸僅以身免是役也斬首五萬獲馬七千軍資器械稱是承疇收敗兵萬餘人入松山嬰城守不能戰我軍遂掘壕圍之是日札魯特部桑噶爾以兵至九月乙亥科爾沁卓禮克圖親王吳克善以兵至命多爾袞豪格分兵還守盛京戊寅略寧遠乙酉關雎宮宸妃疾上將還京留杜度阿巴泰等圍錦州多鐸阿達禮等圍松山阿濟格等圍杏山丙戌駕還庚寅宸妃薨辛卯上還京冬十月癸卯朔日有食之甲辰遣阿拜駐錦州南乳峯山丁未遣孔有德耿仲明尚可喜等助圍錦州己巳追封宸妃為元妃諡敏惠恭和壬申封蘇尼特墨爾根台吉騰機思為多羅墨爾根郡王十一月乙亥命多爾袞羅託屯齊駐錦州豪格滿達海等駐松山十二月甲寅濟爾哈朗多爾袞奏敗洪承疇於松山七年春二月癸卯上出獵葉赫戊申明德王朱由卒以禮葬之戊午阿濟格奏敗明兵於寧遠辛酉豪格阿達禮多鐸羅洛宏奏拔松山擒明總督洪承疇巡撫邱民仰總兵王廷臣曹變蛟祖大樂遊擊祖大名大成等先是承疇援絕屢突圍不得出其副將夏承德約降且請為內應以子夏舒為質戊午夜半豪格等梯城破之捷聞上以所俘獲分賚官軍收軍器貯松山城壬戌上還宮三月癸酉殺邱民仰王廷臣曹變蛟諭洪承疇祖大樂來京而縱大名大成入錦州己卯克錦州祖大壽以所部七千餘人出降乙酉阿濟格等奏明遣職方郎中馬紹愉來乞和出明帝敕兵部尚書陳新甲書為驗上曰明之筆札多不實且詞意夸大非有欲和之誠然彼真偽不可知而和好固朕夙願朕為百萬生靈計若事果成各君其國使民安業則兩國俱享太平之福爾等以朕意傳示之乙未諭多爾袞豪格駐杏山塔山濟爾哈朗阿濟格阿達禮等還京夏四月丁未敕諭吳三桂等降庚戌大小二日並出大者旋沒辛亥濟爾哈朗多爾袞豪格等奏克塔山甲子奏克杏山毀松山杏山塔山三城濟爾哈朗等班師以阿巴泰守錦州五月己巳朔濟爾哈朗等奏明遣馬紹愉來議和遣使迓之癸酉洪承疇祖大壽等至入見請死上赦之諭以盡忠報効承疇等泣謝上問承疇曰明帝視宗室被俘置若罔聞陣亡將帥及窮蹙降我者皆孥戮之舊規乎抑新例乎承疇對曰昔無此例近因文臣妄奏故然上曰君暗臣蔽枉殺至此夫將士被擒乞降使其可贖猶當贖之奈何戮其妻子承疇曰皇上真仁主也戊寅禁善友邪教誅黨首李國梁等十六人壬午明使馬紹愉等始至六月辛丑都察院參政祖可法張存仁言明寇盜日起兵力竭而倉廩虛征調不前勢如瓦解守遼將帥喪失八九今不得已乞和計必南遷宜要其納貢稱臣以黃河為界上不納以書報明帝曰向屢致書修好貴國不從事屬既往其又何言予承天眷自東北海濱以訖西北其間使犬使鹿產狐產貂之地暨厄魯特部斡難河源皆我臣服蒙古朝鮮盡入版圖用是昭告天地正位改元邇者兵入爾境克城陷陣乘勝長驅亦復何畏余特惓惓為百萬生靈計若能各審禍福誠心和好自茲以往盡釋宿怨尊卑之分又奚較焉古云情通則明情蔽則暗使者往來期以面見情不壅蔽吉凶大事交相慶弔歲各以地所產互為餽遺兩國逃亡亦互歸之以寧遠雙樹堡為貴國界塔山為我國界而互市於連山適中之地其自海中往來者則以黃城島之東西為界越者各罪其下貴國如用此言兩君或親誓天地或遣大臣蒞盟唯命之從否則後勿復使矣遂厚賚明使臣及從者遣之後明議中變和事竟不成癸卯諭諸王貝勒凡行兵出獵踐田禾者罪之甲辰設漢軍八旗以祖澤潤等八人為都統以貝子羅託為都察院承政吳達海為刑部承政郎球為禮部承政乙巳多羅安平貝勒杜度卒秋七月庚午諭諸王貝勒大臣曰爾等於所屬賢否當已詳悉知而不舉何以示勸太祖時蘇完札爾固齊費英東等見人有善先自奬勵然後舉之見人不善先自斥責然後劾之故人無矜色無怨言今未有若斯之公直者矣王貝勒等皆謝罪辛未承攻索海以罪褫職壬申以紐黑為議政大臣丙子功晉多羅睿郡王多爾袞肅郡王豪格復為和碩親王多羅貝勒多鐸為多羅郡王鄭親王濟爾哈朗以下賞賚有差戊寅遣輔國公博和託代戍錦州乙酉議濟爾哈朗以下諸將征錦州違律罪上念其久勞悉宥之諭刑部慎讞獄己丑命多羅郡王阿達禮管禮部事八月己亥鑄礮於錦州癸卯鎮國將軍巴布海有罪廢為庶人癸丑論克錦州松山杏山塔山諸將功晉秩有差九月外藩諸王貝勒大臣從征錦州功賞賚有差丁丑遣貝子羅託等代戍錦州壬午命沙爾虎達等征虎爾哈部冬十月癸卯遣英俄爾岱等鞫朝鮮閣臣崔鳴吉等罪辛亥以阿巴泰為奉命大將軍與圖爾格率師伐明壬子師行丁巳上不豫赦殊死以下己未令多鐸阿達禮駐兵寧遠以敕諭吳三桂降又命祖大壽以書招之三桂大壽甥也甲子命鄭親王濟爾哈朗睿親王多爾袞肅親王豪格武英郡王阿濟格裁決庶政其不能決者奏聞十一月丁丑多鐸奏擊敗吳三桂兵丙申阿巴泰奏自牆子嶺入克長城敗明兵於薊州閏十一月甲辰上還京己酉沙爾虎達等降虎爾哈部一千四百餘人丙辰遣巴布泰等更戍錦州己未以宗室韓岱為兵部承政定圍獵誤射人馬處分例十二月丁卯上出獵葉赫乙亥遣金維城率師戍錦州丁丑駐蹕開庫爾上不豫諸王貝子請罷獵不許丙戌月暈生三珥丁亥日暈生三珥癸巳上還京是歲杜爾伯特部札薩克塞冷來朝八年春正月丙申朔上不豫命和碩親王以下副都統以上詣堂子行禮辛亥沙爾虎達等師還論功賞賚有差甲寅明寧遠總兵吳三桂答祖大壽書猶豫未決於是復降敕諭之乙卯遣譚布等更戍錦州辛酉多羅貝勒羅洛宏以罪削爵二月乙丑朔日有食之甲戌葬敏惠恭和元妃庚寅禁建寺廟三月丙申敕朝鮮臣民毋與明通丙午地震自西隅至東南有聲庚戌上不豫赦死罪以下遣阿爾津等征黑龍江虎爾哈部葉臣等更戍錦州辛酉更定六部處分例夏四月癸酉遣金維城等更戍錦州甲戌多鐸請暫息軍興輟工作務農業以足民用五月丙申復封羅洛宏為多羅貝勒先是圖白忒部達賴喇嘛遣使修聘問禮留京八月至是遣還並賚其來使庚子努山敗明兵界嶺口癸卯阿巴泰奏我軍入明克河間順德兗州三府州十八縣六十七降州一縣五與明大小三十九戰殺魯王朱衣珮及樂陵陽信東原安丘滋陽五郡王暨宗室文武凡千餘員俘獲人民牲畜金幣以數十萬計籍數以聞丁巳阿爾津征虎爾哈奏捷六月癸酉多羅饒餘貝勒阿巴泰師還鄭親王濟爾哈朗睿親王多爾袞武英郡王阿濟格郊迎之甲戌賜阿巴泰及從征將士銀緞有差己卯諭諸王貝勒曰治生者務在節用治國者重在土地人民爾等勿專事俘獲以私其親其各勤農桑以敦本計艾度禮代戍錦州丁亥朝鮮國王李倧請戍錦州兵歲一更庚寅諭戶兵二部清察蒙古人丁編入佐領俱令披甲秋七月戊戌阿爾津等師還論功賞賚有差諭諸王勿以黃金飾鞍勒定諸王貝勒貝子公第宅制壬寅定諸王貝勒失誤朝會處分例丙辰定外藩王貝勒貝子公等與諸王貝勒貝子公相見禮丁巳以征明大捷宣諭朝鮮辛酉命滿達海掌都察院事八月丙寅貝子羅託有罪論辟免死幽之戊辰以宗室鞏阿岱為吏部承政郎球為禮部承政星訥為工部承政庚午上御崇政殿是夕亥時無疾崩年五十有二在位十七年九月壬子葬昭陵冬十月丁卯上尊諡曰應天興國弘德彰武寬溫仁聖睿孝文皇帝廟號太宗累上尊諡曰應天興國弘德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝論曰太宗允文允武內修政事外勤討伐用兵如神所向有功雖大勛未集而世祖即位朞年中外即歸於統一蓋帝之詒謀遠矣明政不綱盜賊憑陵帝固知明之可取然不欲亟戰以勦民命七致書於明之將帥屈意請和明人不量強弱自亡其國無足論者然帝交鄰之道實與湯事葛文王事昆夷無以異嗚呼聖矣哉
