body:
  text: 清史稿卷四本紀四世祖本紀一世祖體天隆運定統建極英睿欽文顯武大德弘功至仁純孝章皇帝諱福臨太宗第九子母孝莊文皇后方娠紅光繞身盤旋如龍形誕之前夕夢神人抱子納后懷曰此統一天下之主也寤以語太宗太宗喜甚曰奇祥也生子必建大業翌日上生紅光燭宮中香氣經日不散上生有異稟頂髮聳起龍章鳳姿神智天授八年秋八月庚午太宗崩儲嗣未定和碩禮親王代善會諸王貝勒貝子文武羣臣定議奉上嗣大位誓告天地以和碩鄭親王濟爾哈朗和碩睿親王多爾袞輔政丙子阿濟格尼堪等率師防錦州丁丑多羅郡王阿達禮固山貝子碩託謀立和碩睿親王多爾袞禮親王代善與多爾袞發其謀阿達禮碩託伏誅乙酉諸王貝勒貝子羣臣以上嗣位期祭告太宗丙戌以即位期祭告郊廟丁亥上即皇帝位於篤恭殿詔以明年為順治元年肆赦常所不原者頒哀詔於朝鮮蒙古九月辛丑地震自西北而南有聲壬寅濟爾哈朗阿濟格征明攻寧遠衞丙午頒即位詔於朝鮮蒙古以太宗遺詔減朝鮮歲貢辛亥昭陵成乙卯大軍攻明中後所丁巳拔之庚申攻前屯衞冬十月辛酉朔克之阿濟格尼堪等率師至中前所明總兵官黃色棄城遁丁丑濟爾哈朗阿濟格師還壬午篇古博和託伊拜杜雷代戍錦州十二月壬戌明守備孫友白自寧遠來降辛未朝鮮來賀即位乙亥罷諸王貝勒貝子管部院事鄂羅塞臣巴都禮率師征黑龍江壬午譚泰準塔代戍錦州是歲朝鮮暨土默特部章京古祿格庫爾喀部賴達庫及炎楮庫牙喇氏二十六戶索倫部章京崇內喀爾喀部土謝圖汗馬哈撒嘛諦塞臣汗查薩克圖汗圖白忒部甸齊喇嘛俱來貢順治元年春正月庚寅朔御殿受賀命禮親王代善勿拜甲午沙爾虎達率師征庫爾喀己亥來達哈巴圖魯等代戍錦州鄭親王濟爾哈朗諭部院各官凡白事先啟睿親王而自居其次二月辛巳艾度禮戍錦州戊子祔葬太妃博爾濟錦氏於福陵改葬妃富察氏於陵外富察氏太祖時以罪賜死者三月丙申地震戊戌復震甲寅大學士希福等進刪譯遼金元史是月流賊李自成陷燕京明帝自經自成僭稱帝國號大順改元永昌夏四月戊午朔固山額真何洛會等訐告肅親王豪格悖妄罪廢豪格為庶人其黨俄莫克圖等皆論死己未晉封多羅饒餘貝勒阿巴泰為多羅饒餘郡王辛酉大學士范文程啟睿親王入定中原甲子以大軍南伐祭告太祖太宗乙丑上御篤恭殿命和碩睿親王多爾袞為奉命大將軍賜敕印便宜行事幷賜王及從征諸王貝勒貝子等服物有差丙寅師行壬申睿親王多爾袞師次翁後明山海關守將吳三桂遣使致書乞師討賊丁丑師次連山三桂復致書告急大軍疾馳赴之戊寅李自成率衆圍山海關我軍逆擊之敗賊將唐通於一片石己卯師至山海關三桂開關出迎大軍入關自成率衆二十餘萬自北山橫亙至海嚴陣以待是日大風塵沙蔽天睿親王多爾袞命擊賊陣尾以三桂居右翼大呼薄之風旋定賊兵大潰追奔四十餘里自成遁還燕京封三桂為平西王以馬步軍一萬隸之直趨燕京誓諸將勿殺不辜掠財物焚廬舍不如約者罪之諭官民以取殘不殺之意民大悅竄匿山谷者爭還鄉里迎降大軍所過州縣及沿邊將吏皆開門款附乙酉自成棄燕京西走我軍疾追之五月戊子朔以捷書宣示朝鮮蒙古己丑大軍抵燕京故明文武諸臣士庶郊迎五里外睿親王多爾袞入居武英殿令諸將士乘城厮養人等毋入民家百姓安堵如故庚寅令兵部傳檄直省郡縣歸順者官吏進秩軍民免遷徙文武大吏籍戶口錢糧兵馬親賫至京觀望者討之故明諸王來歸者不奪其爵在京職官及避賊隱匿者各以名聞錄用卒伍欲歸農者聽之辛卯令官吏軍民為明帝發喪三日後服除禮部太常寺具帝禮以葬壬辰俄羅塞臣巴都禮沙爾虎達等征黑龍江師還故明山海關總兵官高第來降癸巳令故明內閣部院諸臣以原官同滿洲官一體辦理乙未阿濟格等追擊李自成於慶都敗之譚泰準塔等追至真定又破走之燕京迤北各城及天津真定諸郡縣皆降辛丑徵故明大學士馮銓至京己酉葬故明莊烈帝后周氏妃袁氏熹宗后張氏神宗妃劉氏並如制六月丁巳朔令洪承疇仍以兵部尚書同內院官佐理機務己未以駱養性為天津總督庚申遣戶部右侍郎王鰲永招撫山東河南壬戌故明大同總兵官姜瓖斬賊首柯天相等以大同來降丙寅遣巴哈納石廷柱率師定山東免京城官用廬舍賦稅三年與同居者一年大軍所過州縣田畝稅之半河北府州縣三之一丁卯睿親王多爾袞及諸王貝勒貝子大臣定議建都燕京遣輔國公屯齊喀和託固山額真何洛會奉迎車駕庚午遣固山額真葉臣率師定山西甲戌故明三邊總督李化熙降壬午上遣使勞軍癸未艾度禮有罪伏誅甲申遷故明太祖神主於歷代帝王廟乙酉鑄各官印兼用國書秋七月丁亥考定曆法為時憲曆戊子巴哈納石廷柱會葉臣軍定山西壬辰以吳孳昌為宣大山西總督方大猷為山東巡撫癸巳以遷都祭告上帝陵廟丁酉故明德王朱由降時故明福王朱由崧即位江南改元弘光以史可法為大學士駐揚州督師總兵劉澤清劉良佐黃得功高傑分守江北己亥山東巡按朱朗鑅啟新補官吏仍以紗帽圓領臨民蒞事睿親王多爾袞諭軍事方殷衣冠禮樂未遑制定近簡各官姑依明式庚子設故明長陵以下十四陵官吏辛丑免盛京滿漢額輸糧草布疋壬寅大赦除正額外一切加派癸卯罷內監徵收涿州寶坻皇莊稅糧甲辰以楊方興為河南總督馬國柱為山西巡撫陳錦為登萊巡撫免山東稅如河北例壬子睿親王以書致史可法勸其主削號歸藩可法答書不屈以王文奎為保定巡撫羅繡錦為河南巡撫裁六部蒙古侍郎癸丑雨雹是月建乾清宮八月丙辰朔日有食之丁巳以何洛會為盛京總管尼堪碩詹統左右翼鎮守盛京辛酉大學士希福有罪免癸亥行總甲法戊辰免景州河間阜城青縣本年額賦己巳定在京文武官薪俸乙亥車駕發盛京庚辰次蘇爾濟察哈爾固倫公主及蒙古王貝勒等朝行在壬午徵故明大學士謝陞入內院辦事癸未次廣寧給故明十三陵陵戶祭田禁樵牧九月甲午車駕入山海關丁酉次永平始嚴稽察逃人之令己亥建堂子於燕京庚子賊將唐通殺李自成親族乞降辛丑遣和託李率泰額孟格等率師定山東河南癸卯車駕至通州睿親王多爾袞率諸王貝勒貝子文武羣臣朝上於行殿甲辰上自正陽門入宮己酉太白晝見庚戌初定郊廟樂章睿親王多爾袞率諸王及滿漢官上表勸進故明福王遣其臣左懋第馬紹愉陳洪範齎白金十餘萬兩黃金千兩幣萬匹求成壬子奉安太祖武皇帝孝慈武皇后太宗文皇帝神主於太廟冬十月乙卯朔上親詣南郊告祭天地即皇帝位遣官告祭太廟社稷初頒時憲曆丙辰以孔子六十五代孫允植襲封衍聖公其五經博士等官襲封如故丁巳以睿親王多爾袞功最高命禮部建碑紀績辛酉上太宗尊諡告祭郊廟社稷壬戌流賊餘黨趙應元偽降入青州殺招撫侍郎王鰲永和託等討斬之甲子上御皇極門頒詔天下大赦詔曰我國家受天眷佑肇造東土列祖創興宏業皇考式廓前猷遂舉舊邦誕膺新命迨朕嗣服越在冲齡敬念紹庭永綏厥位頃緣賊氛洊熾極禍中原是用倚任親賢救民塗炭方馳金鼓旋奏澄清用解倒懸非富天下而王公列辟文武羣臣暨軍民耆老合詞勸進懇請再三乃以今年十月乙卯朔祗告天地宗廟社稷定鼎燕京仍建有天下之號曰大清紀元順治緬維峻命不易創業尤艱況當改革之初爰沛維新之澤親王佐命開國濟世安民有大勳勞宜加殊禮郡王子孫弟姪應得封爵所司損益前典以聞滿洲開國諸臣運籌帷幄決勝廟堂汗馬著勳開疆拓土應加公侯伯世爵錫以誥券大軍入關以來文武官紳倡先慕義殺賊歸降亦予通行察自順治元年五月朔昧爽以前官吏軍民罪犯非叛逆十惡死在不赦者罪無大小咸赦除之官吏貪賄枉法剝削小民犯在五月朔以後不在此例地畝錢糧悉照前明會計錄自順治元年五月朔起如額徵解凡加派遼餉新餉練餉召買等項俱行蠲免大軍經過地方仍免正糧一半歸順州縣非經過者免本年三分之一直省起存拖欠本折錢糧如金花夏稅秋糧馬草人丁鹽鈔民屯牧地竈課富戶門攤商稅魚課馬價柴直棗株鈔貫果品及內供顏料蠟茶芝蔴棉花絹布絲緜等項念小民困苦已極自順治元年五月朔以前凡屬逋征概予豁除兵民散居京城實不獲已其東中西三城已遷徙者准免租賦三年南北二城雖未遷徙亦免一年丁銀原有定額年來生齒凋耗版籍日削孤貧老弱盡苦追呼有司查覈老幼廢疾並與豁免軍民年七十以上者許一丁侍養免其徭役八十以上者給與絹緜米肉有德行著聞者給與冠帶魚眾寡孤獨廢疾不能自存者官與給養孝子順孫義夫節婦有司諮訪以聞故明建言罷謫諸臣及山林隱逸懷才抱德堪為世用者撫按薦舉來京擢用文武制科仍於辰戌丑未年舉行試子午卯酉年舉行鄉試前明宗室首倡投誠者仍予祿養明國諸陵春秋致祭仍用守陵員戶帝王陵寢及名臣賢士墳墓毀者修之仍禁樵牧京外文武職官應得封誥廕一體頒給北直河南山東節裁銀山西太原平陽二府新裁銀前明已經免解其二府舊裁銀與各府新舊節裁銀兩又會同館馬站驢站館夫及遞運所車站夫價等銀又直省額解工部四司料銀匠價銀甎料銀蔴銀車價銀葦夫銀葦課銀漁課銀野味銀翎毛銀活鹿銀大鹿銀小鹿銀羊皮銀弓箭撒袋折銀扣剩水腳銀牛角牛筋銀鵝翎銀天鵝銀民夫銀樁草子粒銀狀元袍服銀衣糧銀砍柴夫銀搬運木柴銀撎柴夫銀蘆課等折色銀盔甲腰刀弓箭弦條胖襖褲鞋狐麂兔狸皮山羊毛課鐵黃櫨榔桑胭脂花梨南棗紫榆杉條等木椴木桐木板枋冰窖物料蘆席蒲草榜紙甆罈槐花烏梅梔子筆管芒箒竹掃箒蓆草粗細銅絲鐵綫鍍白銅絲鐵條碌子青花棉松香光葉書籍紙嚴漆罩漆桐油毛筀紫水斑等竹實心竹棕毛白圓藤翠毛石磨川二硃生漆沙葉廣膠焰硝螺殼等本色錢糧自順治元年五月朔以前逋欠在民盡予蠲免以甦民困後照現行事例分別蠲除京師行商車戶等役每遇僉役頓至流離嗣後永行豁除運司鹽法遞年增加有新餉練餉雜項加派等銀深為厲商盡行豁免本年仍免額引三分之一關津抽稅非欲困商准免一年明末所增並行豁免直省州縣零星稅目概行嚴禁曾經兵災地方應納錢糧已經前明全免者仍與全免不在免半免一之例直省報解屯田司助工銀兩亦出加派准予豁除直省領解錢糧被賊劫失在順治元年五月朔以前一併豁免山陝軍民被流寇要挾悔過自新概從赦宥脅從自首者前罪勿論巡按以訪拿為名聽信衙蠹誣罰良民最為弊政今後悉行禁革勢家土豪重利放債致民傾家蕩產深可痛恨今後有司勿許追比越訴誣告敗俗傷財大赦以後戶婚小事俱就有司歸結如有訟師誘陷愚民入京越訴者加等反坐贖鍰之設勸人自新追比傷生轉為民害今後並行禁止不能納者速予免追惟爾萬方與朕一德播告遐邇咸使聞知加封和碩睿親王多爾袞為叔父攝政王乙丑以雷興為天津巡撫丁卯加封和碩鄭親王濟爾哈朗為信義輔政叔王復封豪格為和碩肅親王進封多羅武英郡王阿濟格為和碩英親王多羅豫郡王多鐸為和碩豫親王貝勒羅洛宏為多羅衍禧郡王封碩塞為多羅承澤郡王葉臣等克太原故明副將劉大受自江南來降辛未封貝子尼堪博洛為多羅貝勒輔國公滿達海吞齊博和託吞齊喀和託