以馬之先為陝西巡撫辛未免西寧各堡寨五年災賦八月丁亥降和碩端重親王博洛和碩敬謹親王尼堪為多羅郡王己丑封巴林部塞卜騰蒿齊忒部孛羅特為多羅郡王科爾沁國顧穆喀喇沁部古祿思喜布為多羅貝勒改承澤親王碩塞親王勞親為多羅郡王九月甲寅故明將鄭成功寇潮州總兵官王邦俊擊走之丙子免蘄麻城等七州縣五六兩年荒賦冬十月辛巳朔日有食之己亥定陝西茶馬例庚子官軍克邵武獲故明閣部揭重熙等斬之己酉免桐城等六縣荒賦十一月甲寅免甘肅去年災賦乙卯吳三桂復府谷斬故明經略高友才等餘衆降壬戌攝政王多爾袞有疾獵於邊外乙丑尚可喜復廣州餘衆降戊寅祀天於圜丘十二月戊子攝政和碩睿親王多爾袞薨於喀喇城壬辰赴聞上震悼臣民為制服丙申喪至上親奠於郊己亥詔曰太宗文皇帝升遐諸王大臣籲戴攝政王王固懷撝讓扶立朕躬平定中原至德豐功千古無二不幸薨逝朕心摧痛中外喪儀合依帝禮庚子收故攝政王信符貯內庫甲辰尊故攝政王為懋德修道廣業定功安民立政誠敬義皇帝廟號成宗乙巳諭曰國家政務悉以奏聞朕年尚幼闇於賢否尚書缺員其會推賢能以進若諸細務理政三王理之是年喀爾喀厄魯特烏斯藏諸部巴郎和羅齊達爾汗囊素盆挫堅挫等來朝朝鮮喀爾喀部碩雷汗札薩克圖汗土謝圖汗綽克圖魏正諾顏戴青諾顏那穆齊魏正諾顏察哈爾墨爾根台吉索那穆厄魯特部巴圖魯貝勒台吉鄂齊爾圖干布胡土克圖噶木布胡土克圖舒虎兒戴青烏斯藏部闡化王索倫使鹿諸部歸化城土默特部古祿格俱來貢朝鮮再至
