洛會等擊敗之金聲桓遣將攻故明永寧王於撫州獲之並獲其子朱孳榮等遂平建昌丙寅故明潞安王瑞昌王率衆犯江寧侍郎巴山等擊敗之戊辰以宋權為國史院大學士己巳以肅親王豪格為靖遠大將軍暨多羅衍禧郡王羅洛宏貝勒尼堪貝子屯齊喀滿達海等帥師征四川故明唐王朱聿釗兵犯徽州洪承疇遣張天祿等擊敗之獲其閣部黃道周殺之進克化二月己卯貝勒勒克德渾破流賊於荊州奉國將軍巴布泰等追至襄陽斬獲殆盡大軍進次夷陵李自成弟李孜等以其衆來降辛巳免密雲荒賦甲申罷江南舊設部院差在京戶兵工三部滿漢侍郎各一人駐江寧分理部務乙酉明魯王將劉福援撫州梅勒章京屯泰擊敗之何洛會遣將破流賊劉文炳於蒲城賊渠賀珍奔武功戊子以柳寅東為順天巡撫命肅親王豪格分兵赴南陽討流賊二隻虎郝如海等丙申遣侍郎巴山梅勒章京張大猷率師鎮守江寧甲喇章京傅夸蟾梅勒章京李思忠率師鎮守西安潛山太湖賊首石應璉擁故明樊山王朱常為亂洪承疇遣將擊斬之丙午命貝勒博洛為征南大將軍同圖賴率師征福建浙江三月辛亥譯洪武寶訓成頒行中外乙卯免近京居民田宅圈給旗人別行撥補者租賦一年丁巳何洛會敗賊劉體純於山陽己未以王來用總督山陝四川糧餉馬鳴佩總督江南諸省糧儲乙丑賜傅以漸等進士及第出身有差己巳何洛會擊賊二隻虎於商州大敗之昌平民王科等盜發明帝陵伏誅壬申多羅饒餘郡王阿巴泰薨癸酉封烏朱穆秦部塞冷蒿齊忒部薄羅特為貝勒阿霸垓部多爾濟為貝子豪格師抵西安遣工部尚書興能敗賊於邠州固山額真杜雷敗賊於慶陽故明大學士張四知自江南來降夏四月己卯詔貝勒勒克德渾班師孔有德耿仲明尚可喜沈志祥各統所部來京甲申免錢塘仁和間架稅乙酉命今年八月再行鄉試明年二月再行會試丁亥免睢州祥符等四州縣災賦戊子除貫耳穿鼻之刑癸巳除明季加征太平府姑溪橋米稅金柱山商稅安慶府鹽稅乙未免靜海興濟青縣荒賦丙申江西浮梁餘干賊合閩賊犯饒州副將鄧雲龍等擊敗之戊戌攝政王多爾袞諭停諸王大臣啟本己亥以張尚為寧夏巡撫罷織造太監辛丑諭曰比者蠲除明季橫征苛稅與民休息而貪墨之吏惡其害己而去其籍是使朝廷德意不下究而明季弊政不終釐也茲命大臣嚴加察核並飭所司詳定賦役全書頒行天下諭汰府縣冗員甲辰修盛京孔子廟五月丁未蘇尼特部騰機思騰機特吳班代多爾濟思喀布蟒悟思額爾密克石達等各率所部叛奔喀爾喀部碩雷命德豫親王多鐸為揚威大將軍同承澤郡王碩塞等率師會外藩蒙古兵討之四子部溫卜達爾漢卓禮克圖多克新等追斬吳班代等五台吉庚戌申隱匿逃人律戊午金聲桓克南贛獲其帥劉廣胤辛酉豪格遣巴顏李國翰敗賊於延安壬戌故明魯王荊王衡王世子等十一人謀亂伏誅癸亥以葉克書為昂邦章京鎮守盛京豪格遣貝勒尼堪等敗賊賀珍於雞頭關遂克漢中珍走西鄉乙丑貝勒博洛遣圖賴等擊敗故明魯王將方國安於錢塘魯王朱彝垓遁保台州庚午官軍至漢陰流賊二隻虎奔四川孫守法奔岳科寨巴顏李國翰追延安賊至張果老崖敗之辛未免沛蕭二縣元二年荒賦之半六月戊寅免懷柔縣荒賦丙戌禁白蓮大成混元無為等教壬辰以高士俊為湖廣巡撫乙未張存仁遣將擒故明大學士馬士英及長興伯吳日生等斬之秋七月甲寅貝勒勒克德渾師還丁巳多鐸破騰機思等於毆特克山斬其台吉毛害渡土喇河擊斬騰機思子多爾濟等盡獲其家口輜重又敗喀爾喀部土謝圖汗二子於查濟布喇克上游戊午碩雷子陣查濟布喇克道口貝子博和託等復大敗之碩雷以餘衆走塞冷格庚申李國翰圖賴等拔張果老崖壬戌江西巡撫李翔鳳進正一真人符四十幅諭曰致福之道在敬天勤民安所事此其置之戊辰豪格遣貝子滿達海輔國公哈爾楚渾固山額真準塔趨徽州階州分討流賊武大定高如礪蔣登雷石國璽王可臣等破之如礪遁登雷國璽可臣俱降八月丙子多羅衍禧郡王羅洛宏薨於軍丁丑豪格遣纛章京哈寧阿攻武大定於三台山拔之丁亥博洛克金華衢州殺故明蜀王朱盛濃樂安王朱誼石及其將吳凱項鳴斯等其大學士謝三賓閣部宋之普兵部尚書阮大鋮刑部尚書蘇壯等降浙江平戊子以孔有德為平南大將軍同耿仲明沈志祥金礪佟代率師征湖廣廣東廣西免太湖潛山二年及今年荒賦癸巳命尚可喜率師從孔有德南討九月己酉故明瑞昌王朱誼氻謀攻江寧官兵討斬之甲子免夷陵石首等十三州縣荒賦十之七荊門江陵等四州縣十之五興國廣濟等十六州縣十之三丙寅故明崇陽王攻歙縣副將張成功等敗之丁卯故明督師何騰蛟等攻岳州官軍擊敗之冬十月丙子鄭四維等克夷陵枝江宜都改湖廣承天府為安陸府己卯和碩德豫親王多鐸師還上郊勞之辛巳金聲桓遣將擒故明王朱常洊及其黨了悟等誅之甲申以胡全才為寧夏巡撫章于天為江西巡撫金聲桓遣將克贛州獲故明閣部楊廷麟殺之癸巳以李棲鳳為安徽巡撫丁酉免懷寧等四縣災賦己亥免延綏莊浪災賦壬寅太和宮中和宮成十一月癸卯朔貝勒博洛自浙江分軍進取福建圖賴等敗故明閣部黃鳴駿於仙霞關遂克浦城建寧延平故明唐王朱聿釗走汀州阿濟格尼堪等追斬之遂定汀州漳州泉州興化進克福州悉降其衆福建平癸丑免河間任丘及大同災賦丁巳祀天於圜丘己巳豪格師至南部時張獻忠列寨西充鼇拜等兼程進擊大破之斬獻忠於陣復分兵擊餘賊破一百三十餘營四川平十二月癸酉朔故明遂平王朱紹鯤及其黨楊權等擁兵太湖結海寇為亂副將詹世勳等討斬之庚戌山東賊謝遷攻陷高苑總兵官海時行討平之壬午故明高安王朱常淇及其黨江於東等起兵婺源張天祿討平之丙戌以于清廉為保定巡撫劉武元為南贛巡撫免薊豐潤等五州縣災賦甲午位育宮成庚子明金華王朱由起兵饒州官軍擊斬之是歲朝鮮蒙古及歸化城土默特部古祿格厄魯特部多爾濟達來巴圖魯顧實汗喀爾喀部買達里胡土克圖額爾德尼哈談巴圖魯戴青哈談巴圖魯青台吉科爾沁部多羅冰圖郡王塞冷蒿齊忒部多羅貝勒額爾德尼索倫部使鹿部喇巴奇鄂爾多斯部濟農台吉查木蘇庫爾喀部賴達庫及達賴喇嘛吐魯番俱來貢朝鮮厄魯特顧實汗達賴喇嘛皆再至四年春正月戊申輔國公鞏阿岱內大臣吳拜等征宣府壬子命副都統董阿賴率師駐防杭州興國州賊柯抱冲結故明總督何騰蛟攻陷興國總兵官柯永盛遣將擒抱冲及其黨陳珩玉斬之乙卯以楊聲遠為淮揚總督黃爾性為陝西巡撫辛酉以朱國柱為登萊巡撫壬戌陝西官軍擊延慶賊郭君鎮終南賊孫守法敗之洪承疇遣將擊賊帥趙正大破之二月癸酉以張儒秀為山東巡撫乙亥佟養甲平梧州丁丑副將王平等擊賀珍劉二虎賊黨於興安敗之癸未詔曰朕平定中原惟浙東全閩尚阻聲教百姓辛苦墊隘無所控訴爰命征南大將軍貝勒博洛振旅而前既定浙東遂取閩越先聲所至窮寇潛逋大軍掩追及於汀水聿釗授首列郡悉平顧惟僭號阻兵其民何罪用昭大賚嘉與維新一切官民罪犯咸赦除之橫征逋賦概予豁免山林隱逸各以名聞錄用民年七十以上給絹米有差己丑洪承疇擒故明瑞昌王朱議貴及湖賊趙正斬之乙未朱聿釗弟聿僭號紹武據廣州佟養甲李成棟率師討之斬聿及周王肅益王思遼王術雅鄧王器鉅野王壽通山王蘊越高密王弘椅仁化王慈魶鄢陵王肅汭南安王企壟等廣州平戊戌以佟國鼏為福建巡撫三月戊午賜呂宮等進士及第出身有差己未以耿焞為順天巡撫周伯達為江寧巡撫趙兆麟撫治鄖陽庚申諭京官三品以上及督撫提鎮各送一子入朝侍衞察才任使無子者以弟及從子代之壬戌免崇明縣鹽課馬役銀乙丑大清律成丙寅佟養甲克高雷廉三府丁卯命祀郊社太牢仍用腥己巳禁漢人投充滿洲庚午罷圈撥民間田宅已圈者補給夏四月丁丑田仰率所部降己卯高士俊克長沙昂邦章京傅喀蟾討劉文炳郭君鎮殲之乙酉貝勒博洛班師是役也貝子和託固山額真公圖賴皆卒於軍甲午陝西官軍斬孫守法五月壬寅舟山海賊沈廷揚等犯崇明官軍討擒之己酉故明在籍通政使侯峒曾遣諜致書魯王偽許洪承疇土國寶以公侯共定江南為反間計柘林游擊獲之以聞上覺其詐命江寧昂邦章京巴山等同承疇窮治其事庚戌免興國江夏等十州縣上年災賦癸丑以佟養甲為兩廣總督兼廣東巡撫辛酉投誠伯常應俊總兵李際遇等坐通賊伏誅癸亥上幸南苑乙丑班代峨齊爾胡巴津自蘇尼特來降六月壬申免成安等七縣上年災賦丙子朝鮮國王李倧遣其子來朝庚辰故明趙王朱由棪來降戊子免綏德衞上年災賦己丑封貝勒博洛為多羅郡王癸巳陝西賊武大定陷紫陽總兵官任珍擊敗之湖廣官軍克衡州常德及安化新化等縣甲午蘇松提督吳勝兆謀叛伏誅丁酉免山東上年荒賦秋七月辛丑加封和碩德豫親王多鐸為輔政叔德豫親王癸卯建射殿於左翼門外甲辰免徐州上年荒賦己酉封敖漢部額駙班第子墨爾根巴圖魯為多羅郡王癸丑以申朝紀為宣大總督丁巳鄖陽賊王光代用永曆年號聚衆作亂命侍郎喀喀木等剿之戊午改馬國柱為江南江西河南總督甲子詔曰中原底定聲教遐敷惟粵東尚為唐藩所阻嶺海怨咨已非一日用移南伐之師席卷惠潮遂達省會念爾官民初非後至一切罪犯咸赦除之逋賦橫征概與豁免民年七十以上加錫粟帛所在節孝者旌山林有才德者錄用南海諸國能嚮化者待之如朝鮮丙寅以祝世昌為山西巡撫丁卯上幸邊外閱武是日駐沙河八月庚午金聲桓擒故明宗室麟伯王靄伯王於瀘溪山誅之甲戌次西巴爾台丙子次海流土河口壬午次察漢諾爾乙酉豪格遣貝勒尼堪等先後克遵義夔州茂州內江榮昌富順等縣斬故明王及其黨千餘人四川平丙戌次胡蘇台辛卯以張文衡為甘肅巡撫丙申上還宮九月辛丑京師地震辛亥淮安賊張華山等用隆武年號嘯聚廟灣丁巳以李猶龍為天津巡撫辛酉官軍討廟灣賊破之冬十月庚午以王懩為安徽巡撫壬申喀喇沁部卓爾弼等率所部來降癸未以吳惟華為淮揚總督線縉為偏沅巡撫戊子定直省官三年大計壬辰以廣東採珠病民罷之十一月庚戌以陳泰為靖南將軍同梅勒章京董阿賴征福建餘寇辛亥免山西代靜樂等十四州縣寧化等六所堡山東德歷城等十五州縣災賦裁山東明季牙雜二稅戊午五鳳樓成癸亥祀天於圜丘十二月戊辰免保定河間真定順德災賦壬申以陳錦為閩浙總督己卯以太宗十一女固倫公主下嫁喀爾嗎索納木甲申蘇尼特部台吉吳巴什等來歸丙戌大軍自岳州收長沙故明總督何騰蛟等先期遁次湘潭敗桂王將黃朝選衆十三萬於燕子窩又敗之於衡州斬之遂克寶慶斬魯王朱鼎兆等進擊武岡桂王由榔走追至靖州下其城復克沅州岷王朱埏峻以黎平降湖南平庚寅故明將鄭彩犯福州副將鄒必科等敗走之是歲科爾沁喀喇沁烏朱穆秦敖漢翁牛特蘇尼特札魯特郭爾羅斯蒿齊忒阿霸垓諸部來朝朝鮮暨喀爾喀部札薩克圖汗墨爾根綽爾濟額爾德尼綽爾濟邁達禮胡土克圖額爾德尼顧錫伊拉古克三胡土克圖嘛哈撒馬諦塞臣汗俄木布額爾德尼塞勒胡土克圖滿朱習禮胡土克圖札薩克圖汗下俄木布額爾德尼巴顏護衞舍晉班第邁達禮胡土克圖諾門汗下丹津胡土克圖