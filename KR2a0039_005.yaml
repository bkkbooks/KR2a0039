倪元璐等及太監王承恩十六人諡並給祭田所在有司致祭改折天下本色錢糧行一條鞭法癸丑貝勒吞齊等敗孫可望於寶慶庚申以李率泰為兩廣總督慈寧宮成辛酉增置內三院漢大學士院各二人癸亥諭曰唐虞夏商未用寺人至周僅具其職司閽闥灑掃給令而已秦漢以來始假事權加之爵祿典兵干政貽禍後代小忠小信固結主心大憝大奸潛持國柄宮庭邃密深居燕閒淆是非以溷賢奸刺喜怒而張威福變多中發權乃下移歷覽覆車可為鑒戒朕酌古準今量為設置級不過四品非奉差遣不許擅出皇城外官有與交結者發覺一並論死閏六月丙寅以成克鞏為祕書院大學士張端為國史院大學士劉正宗為弘文院大學士乙亥以金之俊為吏部尚書庚辰諭曰考之洪範作肅為時雨之徵天人感應理本不爽朕朝乾夕惕冀迓天休乃者都城霖雨匝月積水成渠壞民廬舍窮黎墊居艱食皆朕不德有以致之今一意修省祗懼天戒大小臣工宜相警息秋七月甲午朔上以皇太后諭發節省銀八萬兩賑兵民潦災辛丑以宜永貴為南贛巡撫庚戌皇第二子福全生辛酉以安郡王嶽樂為宣威大將軍率師駐防歸化城八月壬午以太宗十四女和碩公主下嫁平西王吳三桂子應熊尚可喜克化州吳川甲申定武職品級丙戌以雷興為河南巡撫己丑廢皇后為靜妃辛卯李定國犯平樂府江道周永緒知府尹明廷知縣涂起鵬華鍾死之九月壬子復刑部三覆奏例丙辰耿繼茂喀喀木克潮州丁巳孟喬芳討故明宜川王朱敬於紫陽平之冬十月癸亥朔命田雄移駐定海乙丑馬光輝等討叛將海時行於永城時行伏誅丙寅遣濟席哈討山東土寇乙酉設粥廠賑京師饑民免通密雲等七州縣災賦戊子命大學士學士於太和門內更番入直十一月甲午祀天於圜丘戊戌鄭成功不受爵優諭答之戊申以亢得時為河南巡撫己酉官軍討西寧叛回平之乙卯朱瑪喇金之俊免丙辰免江南災賦戊午劉清泰勦九仙山賊平之己未免江西五十四州縣災賦十二月丙寅以陳泰為寧南靖寇大將軍同藍拜鎮湖南丁卯以呂宮為弘文院大學士博博爾代為議政大臣馮聖兆為偏沅巡撫辛未幸南苑甲戌免金華八縣九年災賦癸未設兵部督捕官以羅畢為議政大臣甲申免開封彰德衛輝懷慶汝寧九年十年災賦丙戌鄭成功犯吳淞官軍擊走之丁亥還宮是夜地震有聲是年朝鮮琉球喀爾喀部土謝圖汗下索諾額爾德尼額爾德尼哈談巴圖魯厄魯特部顧實汗顧實汗下台吉諾穆齊索倫部巴達克圖富喇村宜庫達黑龍江烏默忒額爾多科烏思藏達賴喇嘛俱來貢朝鮮再至十一年春正月辛丑罷織造官戊申免江寧安徽蘇松常鎮廬鳳淮徐滁上年災賦己酉以袁廓宇為偏沅巡撫胡全才撫治鄖陽庚戌廣東仁化月峒賊平癸丑鄭成功犯崇明靖江泰興官軍擊走之甲寅以金礪為川陝三邊總督乙卯鄭成功犯金山丁巳免順德廣平大名天津薊州上年災賦辛酉官軍擊賊於桃源誅僞總兵李陽春等二月癸亥朝日於東郊丙寅諭曰言官為耳目之司朕屢求直言期遇綦切乃每閲章奏實心為國者少比黨徇私者多朕甚不取其滌肺腸以新政治以金之俊為國史院大學士庚午甄別直省督撫黜陟有差丙子始耕藉田戊寅免江西缺額丁賦辛巳命尚可喜專鎮廣東耿繼茂移駐桂林壬午以馬鳴珮為宣大山西總督耿焞為山東巡撫陳應泰為山西巡撫林天擎為湖廣巡撫黃圖安為寧夏巡撫癸未官軍復平遠縣甲申諭曰比年以來軍興未息供億孔殷益以水旱小民艱食有司失於拊循流離載道朕心惻然不遑寢處即核庫儲亟圖賑撫己丑免河南州縣衛所十年災賦庚寅以李廕祖為直隸山東河南總督三月壬辰官軍擊桂東賊擒其渠賴龍戊戌免湖廣襄陽黃州常德嶽州永州荊州德安及辰常襄三衛山東濟南東昌十年災賦辛丑寧完我劾陳名夏罪鞫實伏誅乙巳以王永吉為左都御史戊申皇第三子玄燁生是為聖祖以蔣赫德為國史院大學士乙卯以多羅慧哲郡王額爾袞多羅宣獻郡王界堪多羅通達郡王雅爾哈齊配享太廟以孟明輔為兵部尚書夏四月壬戌賊渠曹志攀犯饒州官軍擊敗之志攀降庚午四川賊魏勇犯順慶官軍擊敗之壬申地震官軍擊故明將張名振等於崇明敗之癸酉免洛南上年災賦三之一己卯幸南苑賚所過農民金乙酉免保康等四縣上年被寇災賦丁亥以王永吉為祕書院大學士秦世楨為浙江巡撫戊子江南寇徐可進朱元等降五月壬辰上還宮甲午幸西苑賜大臣宴庚子以胡圖為議政大臣甲辰免平涼衛上年災賦丙午起党崇雅為國史院大學士以龔鼎孳為左都御史丁未遣官録直省囚庚戌免興安漢陰平利等州縣上年災賦辛亥太白晝見丙辰以楊麒祥為平南將軍駐防杭州六月己未朔河決大王廟丙寅陝西地震丁卯以朱瑪喇為靖南將軍征廣東餘寇甲戌立科爾沁鎮國公綽爾濟女博爾濟錦氏為皇后庚辰大赦秋七月戊子朔封琉球世子尚質為中山王壬辰免秦州朝邑安定災賦戊申免鎮原廣寧二縣災賦丙辰以佟代為浙閩總督八月戊午朔免延安府荒賦己未官軍勦瑞金餘寇誅僞都督許勝可等庚申罷直省恤刑官命巡撫慮囚辛酉免真寧縣十年災賦壬戌山東濮州陽穀等縣地震有聲甲戌以張中元為江寧巡撫丙子以張秉貞為兵部尚書庚辰以傅以漸為祕書院大學士任濬為刑部尚書壬午故明樂安王朱議淜謀反伏誅九月己丑范文程以病罷免西安平涼鳳翔三府十年災賦庚寅封線國安為三等伯壬辰申嚴隱匿逃人之禁癸巳免宣府萬全右衛災賦丙申以董天機為直隸巡撫壬子以馮聖兆為延綏巡撫冬十月丁巳朔享太廟辛未免廬鳳淮揚四府徐滁和三州災賦丁丑命重囚犯罪三法司進擬仍令議政王貝勒大臣詳議壬午賑畿輔被水州縣免祁陽等七縣逋賦李定國陷高明圍新會耿繼茂請益師十一月丁亥以陳泰為吏部尚書阿爾津為正藍旗滿洲固山額真尚可喜遣子入侍壬寅詔曰朕纘承鴻緒十有一年治效未臻疆圉多故水旱疊見地震屢聞皆朕不德之所致也朕以眇躬託於王公臣庶之上政教不修瘡痍未復而內外章奏輒以聖稱是重朕之不德也朕方內自省抑大小臣工亦宜恪守職事共弭災患凡章奏文移不得稱聖大赦天下咸與更始癸卯幸南苑甲辰耿繼茂遣子入侍十二月辛酉和碩承澤親王碩塞薨戊辰免荊門鍾祥等六州縣災賦己巳免磁祥符等三十六州縣災賦壬申以濟度為定遠大將軍征鄭成功尚可喜耿繼茂朱瑪喇敗李定國於新會定國遁走乙亥鄭成功陷漳州圍泉州丁丑命明安達禮征羅剎免西安五衛荒賦江西賊霍武等率衆降是年朝鮮琉球厄魯特部阿巴賴諾顏諾門汗額爾德尼達雲綽爾濟索倫部索朗噶達爾漢湯古忒部達賴喇嘛諦巴班禪胡土克圖均來貢十二年春正月戊子官軍敗賊於玉版巢又擊藤縣賊破之庚寅免東平濟陽等十八州縣上年災賦乙未免直隸八府河南彰德衛輝懷慶上年災賦戊戌詔曰親政以來五年於茲焦心勞思以求治理日望諸臣以嘉謨入告匡救不逮乃疆圉未靖水旱頻仍吏治墮汙民生憔悴保邦制治其要莫聞諸王大臣皆親見祖宗創業艱難豈無長策而未有直陳得失者豈朕聽之不聰虛懷納諫有未盡歟天下之大幾務之繁責在一人而失所輔導朕雖不德獨不念祖宗培養之澤乎其抒忠藎以慰朕懷辛丑以韓岱為吏部尚書伊爾德阿喇善為都統癸卯以于時躍為廣西巡撫甲辰命在京七品以上在外文官知府武官副將以上各舉職事及兵民疾苦極言無隱辛亥修順治大訓二月庚申復遣御史巡按直省壬戌大學士呂宮以疾免癸亥免成安等六縣上年災賦己巳賑旗丁免平涼漢陰二縣上年災賦丙子封博穆博果爾為和碩襄親王免濱寧陽等二十一州縣上年災賦己卯免滁和二州上年災賦庚辰以陳之遴為弘文院大學士王永吉為國史院大學士癸未耿繼茂尚可喜敗李定國於興業廣東高雷廉三府廣西橫州平三月戊子免湖廣石門縣上年災賦以戴明說為戶部尚書庚子以佟國器為南贛巡撫宜永貴為福建巡撫壬寅免鄖陽襄陽二府上年被寇荒賦甲辰賜圖爾宸史大成等進士及第出身有差丁未削續順公沈永忠爵壬子諭曰自明末擾亂日尋干戈學問之道闕焉弗講今天下漸定朕將興文教崇儒術以開太平直省學臣其訓督士子博通古今明體達用諸臣政事之暇亦宜留心學問佐朕右文之治癸丑設日講官夏四月乙丑免沈丘及懷慶衛上年災賦丁丑進封尼思哈為和碩敬謹親王齊克新為和碩端重親王癸未詔修太祖太宗聖訓五月乙酉以圖海兼刑部尚書辛卯和碩鄭親王濟爾哈朗薨輟朝七日丁酉以石廷柱為鎮海將軍駐防京口戊戌以胡沙為鑲黃旗固山額真庚子以覺羅巴哈納為弘文院大學士辛丑靈丘縣地震有聲乙巳以覺羅郎球為戶部尚書丙午以李際期為兵部尚書丁未以恩格德為禮部尚書己酉以衛周祚為工部尚書六月甲寅免杭州寧波金華衢州台州災賦丁卯諭曰朕覽法司章奏決囚日五六人或十餘人念此愚氓兵戈災祲之後復罹法網深可憫惻有虞之世民不犯於有司漢文帝唐太宗亦幾致刑措今犯法日衆豈風俗日偷歟抑朝廷德教未敷或讞獄者有失入歟嗣後法司其明慎用刑務求平允戊辰免房山縣上年災賦桂王將劉文秀寇常德遣其黨犯嶽州武昌官軍擊走之己卯封博果鐸為和碩莊親王辛巳命內十三衙門立鐵牌諭曰中官之設自古不廢任使失宜即貽禍亂如明之王振汪直曹吉祥劉瑾魏忠賢輩專權擅政陷害忠良出鎮典兵流毒邊境煽黨頌功謀為不軌覆敗相尋深可鑒戒朕裁定內官職掌法制甚明如有竊權納賄交結官員越分奏事者凌遲處死特立鐵牌俾世遵守秋七月癸未朔日有食之壬辰復遣廷臣恤刑辛亥命直省繪進輿圖八月丙辰免靈丘縣災賦癸亥以阿爾津為寧南靖寇大將軍同卓羅駐防荊州祖澤潤防長沙乙丑以多羅安郡王嶽樂為左宗正貝勒杜蘭為右宗正癸酉諭曰畿輔天下根本部臣以運河決口議徵逋賦朕念畿內水旱相仍人民荼苦復供舊稅其何以堪今悉與蠲免工築之費別事籌畫免曹城武等七州縣及臨清衛齊河屯上年災賦九月癸未免鳳陽災賦壬寅定武會試中式殿試如文進士朱瑪喇敦拜師還丙午頒御製資政要覽範行言勸善要言警心録異姓公以下文三品以上各一部戊申免兩當寧遠二縣災賦冬十月辛亥朔設尚寶司官壬子免蔚州及陽和陽高二衛災賦己未免甘州肅州涼州西寧災賦辛酉命每年六月慮囚七月覆奏著為令癸亥免磁獲嘉等八州縣災賦甲子免隆平十一年以前逋賦淄川等八縣災賦丙寅免宣府大同災賦戊辰詔曰帝王以德化民以刑輔治苟律例輕重失宜官吏舞文出入政平訟理其道曷由朕覽讞獄本章引用每多未愜其以現行律例繕呈朕將親覽更定之辛未以祝世允為鑲紅旗滿洲固山額真癸酉以孫廷銓為兵部尚書乙亥修玉牒丙子龔鼎孳以罪免十一月壬午免濱堂邑等十三州縣災賦癸未鄭成功將犯舟山乙酉巡按御史顧仁坐納賄棄市丁亥諭曰國家設督撫巡按振綱立紀剔弊發奸將令互為監察近來積習乃彼此容隱凡所糾劾止末員豈稱設官之意嗣有瞻顧狥私者併坐其罪鄭成功將陷舟山副將把成功降於賊戊子幸南苑免鄖陽襄陽逋賦汲淇胙城等縣災賦戊申免臨漳災賦十二月丙辰免耀州同官雒南災賦癸亥免安吉仁和等十州縣宣化八衛災賦乙丑頒大清滿字律免臨清齊河等十州縣東昌衛災賦丙寅于時躍祖澤遠平九團兩都瑤僮一百九十二寨己巳多羅敏郡王勒度薨癸酉免涿慶雲等三十三州縣永平衛災賦甲戌以宜爾德為寧海大將軍討舟山寇以秦世禎為安徽巡撫提督操江陳應泰為浙江巡撫白如梅為山西巡撫免臨海等十八縣祥符蘭陽二縣懷慶羣牧二衛災賦是年喀爾喀部額爾德尼諾穆齊台吉門章墨爾根楚虎爾台吉伊世希布額爾德尼台吉額爾克戴青台吉來朝朝鮮喀爾喀部畢席勒爾圖汗俄木布額爾德尼澤卜尊丹巴胡土克圖丹津喇嘛車臣汗土謝圖汗土謝圖汗下喇嘛塔爾達爾漢諾顏厄魯特部杜喇爾渾津台吉都喇爾渾津阿里彔克三拖因阿巴賴諾顏鄂齊爾圖台吉噶爾丹霸索倫部馬魯凱訥墨禮河頭目伊庫達黑龍江頭目庫拜班禪胡土克圖俄羅斯察幹汗遣使均來貢朝鮮三至厄魯特阿巴賴鄂齊爾圖台吉再至十三年春正月庚辰朔幸南苑癸未諭修通鑑全書孝經衍義丙申免漢中鳳翔西安上年災賦己亥鄭成功將犯台州副將馬信以城叛降於賊庚子免廣德上年災賦十之一甲辰免富陽等六縣上年災賦乙巳免江西八年逋賦二月戊午免荊州安陸常德武昌黃州上年災賦庚申免廣平上年災賦丙寅免岢嵐五臺上年災賦戊辰命兩廣總督移駐梧州官軍敗李定國於南寧庚午定部院滿官三年考滿六年京察例以李率泰為浙閩總督王國光為兩廣總督甲戌以趙布泰為鑲黃旗固山額真丙子幸南苑較射免東平濮長山上年災賦己卯大學士馮銓致仕三月庚辰幸瀛臺癸未免景陵等九縣上年災賦癸巳以費雅思哈為議政大臣馬之先為川陝三邊總督乙未陳之遴有罪以原官發盛京閒住癸卯諭曰朝廷立賢無方比來罷譴雖多南人皆以事論斥非有所左右也諸臣毋歧方隅毋立門戶毋挾忿肆誣毋托嫌苛訐庶還蕩平之治丙午諭曰朕親政以來夙夜兢業每期光昭祖德蚤底治平克當天心以康民物方睿王攝政斥忠任奸百姓怨嗟望朕親政乃者冬雷春雪隕石雨土所在見告六載之中康乂未奏災祲時聞是朕有負於百姓也用是恐懼靡寧冀昭告於上帝祖宗實圖省戒有司其涓日以聞夏四月辛亥廣西故明永安王朱華堧及土司等來降乙卯以災變祭告郊廟辛酉官軍破賊姚黃於夷陵壬戌太原陽曲地震丁卯以覺羅科爾坤為吏部尚書庚午免麟遊荒賦壬申以梁清標為兵部尚書丁丑尚可喜復揭陽普寧澄海三縣五月辛卯免大寧荒賦癸巳幸南苑己亥以羅託為鑲藍旗滿洲固山額真覺羅郎球免命明安達禮為理藩院尚書以張懸錫為宣大總督免荊門京山等十一州縣襄陽衛上年災賦閏五月戊申幸瀛臺丙辰廣西都康等府土官來降己未乾清宮坤寧宮交泰殿及景仁永壽承乾翊坤鍾粹儲秀宮成以郎廷佐為江南江西總督劉漢祚為福建巡撫丙寅以張朝璘為江西巡撫六月己丑諭曰滿洲家人皆征戰所得故立嚴法以警逋逃比年株連無已朕心惻焉念此僕隸亦皆人子苟以恩結寧不知感若任情因辱雖嚴何益嗣後宜體朕意壬辰莒州地震有聲庚子免桃源上年荒賦辛丑容美土司田吉麟降癸卯命固山額真郎賽駐防福建撤直省督催稅糧滿官寧化賊帥黃素禾來降秋七月丁未朔享太廟戊申官軍敗明桂王將龍韜於廣西斬之己酉和碩襄親王博穆博果爾薨庚戌鄭成功將黃梧等以海澄來降壬子上初御乾清宮癸丑大赦戊午以佟延年為甘肅巡撫八月戊寅免廣信饒州吉安上年災賦己丑免莆田仙遊興平衛十一十二兩年災賦辛卯賑畿輔壬辰封黃梧為海澄公停滿官榷關癸巳鄭成功軍陷閩安鎮進圍福州官軍擊却之丁酉免順天比年災賦己亥免靖遠洮岷等衛災賦辛丑命三年大閲著為令乙巳免大同上年災賦九月丙午官軍敗鄭成功將於夏關又敗之於衡水洋遂復舟山癸亥鄭成功將官顧忠來降壬申追封和碩肅親王豪格為和碩武肅親王冬十月丁丑以蔣國柱為安徽巡撫提督操江戊寅設登聞鼓己卯免宣府災賦延綏鎮神木縣十之三庚辰四川賊帥鄧希明張元凱率衆降甲午以胡全才為湖廣總督乙未幸南苑丙申以張尚撫治鄖陽辛丑官軍復辰州壬寅免和順縣災賦十之三永順土司彭弘澍率所屬三州六司三百八十峒來降癸卯命陳之遴還京十一月丙午還宮丁未興京陵工成庚戌祀天於圜丘辛亥幸南苑申嚴左道之禁戊午免清水縣鳳翔所災賦丙寅以張長庚為湖廣巡撫免海州荒賦辛未免洛川災賦十二月己卯冊內大臣鄂碩女董鄂氏為皇貴妃頒恩赦戊子還宮己丑封盆挫監挫為闡化王乙未以李廕祖為湖廣總督丁酉加上皇太后尊號曰昭聖慈壽恭簡安懿章慶皇太后戊戌頒恩赦是年土謝圖親王巴達禮卓禮克圖親王吳克善達爾漢巴圖魯郡王滿朱習禮固倫額駙阿布鼐親王來朝朝鮮荷蘭吐魯番烏斯藏闡化王喀爾喀部索特拔宜爾登諾顏喇嘛塔爾多爾濟達爾漢諾顏車臣汗土謝圖汗土謝圖汗下丹津喇嘛戴青額爾德尼喇嘛厄魯特部達賴吳巴什台吉訥穆齊台吉阿巴賴諾顏察罕台吉馬賴台吉什虎兒戴青額爾德尼台吉顧實汗下色稜諾顏索倫部達爾巴均來貢喀爾喀土謝圖汗宜爾登諾顏再至十四年春正月辛亥祈穀於上帝以太祖武皇帝配癸丑以魏裔介為左都御史甲寅宜爾德師還乙卯以張懸錫為直隸山東河南總督官軍敗鄭成功將於烏龍江又敗之於惠安縣戊午諭曰制科取士計吏薦賢皆朝廷公典臣子乃以市恩甚無謂也師生之稱必道德相成授受有自方足當之豈可攀援權勢無端親昵考官所得及薦舉屬吏輒號門生賄賂公行徑竇百出鑽營黨附相煽成風朕欲大小臣工杜絶弊私恪守職事犯者論罪修金陵寢庚申以盧崇峻為宣大總督甲子諭曰我國家之興治兵有法今八旗人民怠於武事遂至軍旅隳敝