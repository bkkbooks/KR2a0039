洱征南將軍趙布泰師還壬辰尚書劉昌自陳年老致仕癸巳免貴陽等六府及土司上年災賦復設鳳陽巡撫駐泰州戊戌甄察直省督撫及京職三品以上漢官石申馮溥等録黜降有差壬寅以林起龍為鳳陽巡撫免淮揚鳳三府徐州上年災賦定每年孟春合祭天地日月及諸神於大享殿癸卯諭禮部向來孟春祈穀禮於大享殿舉行今既行合祭禮於大享殿以後祈穀禮於圜丘舉行壬子免梁城所上年災賦三月癸亥定平西靖南二藩兵制甲子以史紀功為浙江巡撫辛未諭禮部朕載稽舊制歲終祫祭之外有奉先殿合祭之禮自後元旦皇太后萬壽及朕壽節合祀於奉先殿其詳議禮儀以聞論陷鎮江罪革巡撫蔣國柱提督管效忠職免死為奴協領費雅柱等棄市甲戌定固山額真漢稱曰都統梅勒章京曰副都統甲喇章京曰參領牛彔章京曰佐領昂邦章京曰總管滿仍其舊以袁懋功為雲南巡撫丙子御經筵癸未定王貝勒貝子公妻女封號甲申更定民公侯伯以下章京以上盔纓制夏四月丙戌免寶坻豐潤武清上年災賦甲午以張長庚為湖廣總督丙申以劉祚遠為保定巡撫張椿為陝西巡撫辛丑詔定匿災不報罪癸卯以白秉貞撫治鄖陽丙午皇第七子隆禧生己酉合祀天地於大享殿五月乙卯朔以覺羅伊圖為吏部尚書庚申免綏德膚施五州縣上年災賦甲子以阿思哈為兵部尚書蘇納海為工部尚書甲戌以佟壯年為正藍旗漢軍都統郭爾泰為鑲白旗蒙古都統免沅州鎮遠二衛上年災賦己卯詔曰前者屢詔引咎責躬由今思之皆具文而鮮實益且十二十三年間時有過舉經言官指陳雖加處分而此心介然未釋今上天示警亢旱癘疫災眚疊至寇盜未息民生困悴用是深自刻責夙夜靡寧從前以言獲罪者吏部列名具奏凡國計民生利害及朕躬闕失各直言無隱庚辰以張天福為正黃旗漢軍都統壬午覺羅巴哈納等以旱引罪自陳上曰朕以旱災迭見下詔責躬卿等合辭引罪是仍視為具文非朕實圖改過意也卿等職司票擬僅守成規未能各出所見佐朕不逮是皆朕不能委任大臣之咎自後專加委任其殫力贊襄秉公持正以副朕懷多羅信郡王多尼師還癸未雲南土司那崙來降六月乙酉始命翰林官於景運門入直以阿思哈兼攝左都御史事戊子遣官省獄以楊茂勳為湖廣巡撫免澧巴陵十二州縣及嶽州等衛上年災賦己丑增祀商中宗高宗周成王康王漢文帝宋仁宗明孝宗於歷代帝王廟罷遼太祖金太祖元太祖廟祀及宋臣潘美張浚從祀以蘇納海為兵部尚書癸巳以穆里瑪為工部尚書白色純署河道總督丙申上以禱雨步至南郊齊宿是日大雨戊戌祀天於圜丘又雨己亥大學士劉正宗成克鞏魏裔介以罪免辛丑命修舉天下名山大川古帝王聖賢祀典秋七月甲寅朔以霍達兼攝左都御史事和碩簡親王濟度薨戊午編降兵為忠勇義勇等十營隸吳三桂以降將馬寶等統之丁卯移祀北嶽於渾源州己巳免荊州祁陽十三州縣及衡州等衛上年災賦庚午免均保康七州縣及鄖襄二衛上年荒賦以楊義為工部尚書丁丑命耿繼茂移駐福建寧古塔總管巴海敗羅剎於使犬部地招撫費牙喀十五村一百二十餘戶改徙席北流犯於寧古塔庚辰停遣御史巡按直省壬午以羅託為安南將軍率師征鄭成功癸未能圖免八月丁亥以彭有義為河南巡撫己丑免化茂名四州縣及高州所上年災賦庚寅免武岡上年災賦丙申雲南車里土司刀木禱來降戊戌以沈永忠為掛印將軍鎮守廣東辛丑以愛星阿為定西將軍征李定國壬寅皇貴妃董鄂氏薨輟朝五日甲辰追封董鄂氏為皇后己酉降將郝承裔叛陷邛州圍嘉定官軍擊敗之辛亥以穆里瑪為鑲黃旗滿洲都統九月癸丑朔安南國王黎維祺奉表來降甲子以佟鳳彩為四川巡撫丁卯僞將鄧耀據海康官軍擊走之壬申以王登聯為保定巡撫甲戌免保昌六縣及南韶二所十四年災賦戊寅幸昌平觀故明諸陵己卯還宮冬十月丁亥以覺羅雅布蘭為刑部尚書戊子罷朝鮮貢鷹辛卯幸近郊甲午還宮己亥以郭科為工部尚書丁未免睢商丘十一州縣及歸德睢陽二衛上年災賦十一月甲寅免趙柏鄉四州縣及真定衛上年災賦乙卯免寧上饒四十六州縣上年災賦丁巳撤直省恤刑官安南將軍明安達禮師還辛酉大學士劉正宗以罪免壬戌復遣御史巡按直省乙丑敬謹親王尼思哈薨戊寅免睢虞城六州縣災賦庚辰免五河安東上年災賦十二月癸巳免邳宿遷四州縣災賦戊戌免慶都災賦甲辰皇第八子永幹生是歲朝鮮喀爾喀部丹津喇嘛土謝圖汗下萬舒克諾顏七旗厄魯特部鄂齊里汗達賴喇嘛班禪胡土克圖阿里祿克山托因虎爾哈部宜訥克俄羅斯部察罕汗使鹿索倫部頭目布勒蘇定噶索朗阿達爾漢子查木蘇來貢朝鮮再至十八年春正月壬子上不豫丙辰大漸赦死罪以下丁巳崩於養心殿年二十四遺詔曰朕以涼德承嗣丕基十八年於茲矣自親政以來紀綱法度用人行政不能仰法太祖太宗謨烈因循悠忽苟且目前且漸習漢俗於淳朴舊制日有更張以致國治未臻民生未遂是朕之罪一也朕自弱齡即遇皇考太宗皇帝上賓教訓撫養惟聖母皇太后慈育是依隆恩罔極高厚莫酬朝夕趨承冀盡孝養今不幸子道不終誠悃未遂是朕之罪一也皇考賓天朕止六歲不能服衰絰行三年喪終天抱憾惟侍奉皇太后順志承顏且冀萬年之後庶盡子職少抒前憾今永違膝下反上厪聖母哀痛是朕之罪一也宗室諸王貝勒等皆太祖太宗子孫為國藩翰理宜優遇以示展親朕於諸王貝勒晉接既疏恩惠復鮮情誼暌隔友愛之道未周是朕之罪一也滿洲諸臣或歷世竭忠或纍年效力宜加倚託盡厥猷為朕不能信任有才莫展且明季失國多由偏用文臣朕不以為戒委任漢官即部院印信間亦令漢官掌管致滿臣無心任事精力懈弛是朕之罪一也朕夙性好高不能虛己延納於用人之際務求其德與己侔未能隨才器使致每歎乏人若舍短録長則人有微技亦獲見用豈遂至於舉世無才是朕之罪一也設官分職惟德是用進退黜陟不可忽視朕於廷臣明知其不肖不即罷斥仍復優容姑息如劉正宗者偏私躁忌朕已洞悉於心乃容其久任政地可謂見賢而不能舉見不肖而不能退是朕之罪一也國用浩繁兵餉不足而金花錢糧盡給宮中之費未嘗節省發施及度支告匱每令諸王大臣會議未能別有奇策止議裁減俸祿以贍軍餉厚己薄人益上損下是朕之罪一也經營殿宇造作器具務極精工無益之地糜費甚多乃不自省察罔體民艱是朕之罪一也端敬皇后於皇太后克盡孝道輔佐朕躬內政聿修朕仰奉慈綸追念賢淑喪祭典禮過從優厚不能以禮止情諸事太過踰濫不經是朕之罪一也祖宗創業未嘗任用中官且明朝亡國亦因委用宦寺朕明知其弊不以為戒設立內十三衙門委用任使與明無異致營私作弊更踰往時是朕之罪一也朕性耽閒靜常圖安逸燕處深宮御朝絶少致與廷臣接見稀疏上下情誼否塞是朕之罪一也人之行事孰能無過在朕日理萬幾豈能一無違錯惟聽言納諫則有過必知朕每自恃聰明不能聽納古云良賈深藏若虛君子盛德容貌若愚朕於斯言大相違背以致臣工緘默不肯進言是朕之罪一也朕既知有過每自刻責生悔乃徒尚虛文未能省改過端日積愆戾愈多是朕之罪一也太祖太宗創垂基業所關至重元良儲嗣不可久虛朕子玄燁佟氏妃所生岐嶷穎慧克承宗祧茲立為皇太子即遵典制持服二十七日釋服即皇帝位特命內大臣索尼蘇克薩哈遏必隆鼇拜為輔臣伊等皆勳舊重臣朕以腹心寄託其勉矢忠藎保翊沖主佐理政務布告中外咸使聞知三月癸酉上尊諡曰體天隆運英睿欽文大德弘功至仁純孝章皇帝廟號世祖葬孝陵纍上尊諡曰體天隆運定統建極英睿欽文顯武大德弘功至仁純孝章皇帝論曰順治之初睿王攝政入關定鼎奄宅區夏然兵事方殷休養生息未遑及之也逮帝親總萬幾勤政愛民孜孜求治清賦役以革橫征定律令以滌寃濫蠲租貸賦史不絶書踐阼十有八年登水火之民於袵席雖景命不融而丕基已鞏至於彌留之際省躬自責布告臣民禹湯罪己不啻過之書曰亶聰明作元后元后為民父母其世祖之謂矣
