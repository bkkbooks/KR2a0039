body:
  text: 清史稿卷五本紀五世祖本紀二八年春正月己酉朔蒿齊忒部台吉噶爾馬撒望儲護爾率所部來歸辛亥以布丹為議政大臣甲寅和碩英親王阿濟格謀亂幽之其黨郡王勞親降貝子席特庫等論死乙卯以蘇克薩哈詹岱為議政大臣丙辰罷漢中歲貢柑及江南橘河南石榴戊午罷諸處織造督進官役及陝西歲貢絨褐皮革命和碩睿親王多爾袞子多爾博襲爵己未罷臨清歲造城甎庚申上親政御殿受賀大赦詔曰朕躬親大政總理萬幾天地祖宗付託甚重海內臣庶望治甚殷自惟涼德夙夜祗懼天下至大政務至繁非朕躬所能獨理凡我諸王貝勒及文武羣臣其各殫忠盡職潔己愛人利弊悉以上聞德意期於下究百姓亦宜咸體朕心務本樂業共享泰寧之慶孔有德克桂林斬故明靖江王及文武官四百七十三人餘黨悉降壬戌罷江西歲進龍碗丙寅以夏一鶚為江西巡撫丁卯升祔孝端文皇后於太廟追尊故攝政王多爾袞為成宗義皇帝祔於太廟移內三院於禁城己巳以伊圖為議政大臣免安州芝棉稅丁丑復封端重郡王博洛敬謹郡王尼堪為和碩親王以鞏阿岱鼇拜為議政大臣戊寅以巴圖魯詹杜爾瑪為議政大臣二月庚辰進封滿達海為和碩巽親王多尼為和碩信親王羅可鐸為多羅平郡王瓦克達為多羅謙郡王傑書為多羅康郡王更定錢制每百文準銀一錢辛巳免朔州渾源大同荒賦癸未羅什博爾惠有罪論死上欲宥其死羣臣執奏不可遂伏誅戊子上昭聖慈壽皇太后尊號己丑大赦免汶上等五縣六七兩年災賦辛卯罷邊外築城之役加派錢糧准抵八年正賦官吏捐輸酌給議併免之癸巳蘇克薩哈詹岱穆濟倫首告故攝政王多爾袞逆節皆實籍其家誅其黨何洛會胡錫甲午免山西荒賦戊戌封貝勒嶽樂為多羅安郡王己亥暴多爾袞罪於中外削其尊號及母妻追封撤廟享庚子調陳泰為吏部尚書以韓岱為刑部尚書辛丑上幸南苑壬寅命孔有德移駐桂林癸卯上還宮乙巳封和碩肅親王豪格子富壽為和碩顯親王閏二月戊申朔湖南餘寇牛萬才率所部降庚戌封和碩鄭親王濟爾哈朗子濟度為多羅簡郡王勒度為多羅敏郡王甲寅諭曰國家紀綱首重廉吏邇來有司貪污成習百姓失所殊違朕心總督巡撫任大責重全在舉劾得當使有司知所勸懲今所舉多冒濫所劾多微員大貪大惡乃徇縱之何補吏治吏部其詳察以聞調党崇雅為戶部尚書金之俊為兵部尚書劉餘祐為刑部尚書謝啓光為工部尚書免祥符等六縣七年災賦乙卯進封碩塞為和碩承澤親王諭曰榷關之設國家藉以通商非苦之也稅關官吏擾民行私無異劫奪朕灼知商民之苦今後每關設官一員悉裁冗濫並不得妄咨勤勞更與銓補丙辰諭督撫甄別有司才德並優兼通文義者擢之不識文義任役作奸者黜之吏部授官校試文義不通者除名己未總兵官許爾顯克肇慶羅定徐成功克高州禁喇嘛貢佛像銅塔及番犬壬戌幽阿濟格於別室籍其家削貝子勞親爵為庶人乙丑大學士馮銓尚書謝啓光等以罪免諭曰國家設官必公忠自矢方能裨益生民共襄盛治朕親政以來屢下詔令嘉與更始乃部院諸臣因仍前弊持祿養交朕親行黜陟與天下見之自今以後其淬礪前非各盡厥職若仍上下交欺法必不貸丙寅諭曰各省土寇本皆吾民迫於饑寒因而為亂年來屢經撲勦而管兵將領殺良冒功真盜未殲民乃荼毒朕深痛之嗣後各督撫宜勦撫並施勿藉捕擾民以稱朕意丁卯孔有德克梧州柳州戊辰大學士洪承疇兼都察院左都御史陳之遴為禮部尚書張鳳翔為工部尚書己巳裁江南陝西督餉侍郎淮安總理漕運侍郎庚午固山額真阿喇善等勦山東賊壬申免涿良鄉等十三州縣圈地乙亥定阿附多爾袞諸臣罪剛林祁充格俱坐罪丁丑諭曰故明宗藩前以恣行不軌多被誅戮朕甚憫焉自後有流移失所甘心投誠者有司禮送京師加恩畜養鎮國將軍以下即其地占籍為民各安厥業免宛平災賦三月壬午端重親王博洛敬謹親王尼堪以罪降郡王癸未命諸王貝勒貝子分管六部理藩院都察院事乙酉湖南保靖永順等土司來歸丙戌免武強上年災賦己丑以希福為弘文院大學士陳泰為國史院大學士改李率泰為弘文院大學士寧完我為國史院大學士以噶達渾為都察院承政朱瑪喇為吏部尚書雅賴為戶部尚書談布為工部尚書藍拜為鑲藍旗滿洲固山額真辛卯定王公朝集例壬辰定襲爵例癸巳諭曰御史巡方職在安民察吏向來所差御史苞苴請託身已失檢何由察吏吏不能察民何以安今後各宜洗濯自新務盡職事並許督撫糾舉都察院考核以聞癸卯定齊戒例丙午許滿洲蒙古漢軍子弟科舉依甲第除授夏四月庚戌詔行幸所過有司不得進獻遣官祭嶽鎮海瀆帝王陵寢先師孔子闕里土賊羅榮等犯虔州副將楊遇明討擒之乙卯幸沙河辛酉次赤城以王文奎總督漕運甲子次上都丙寅翁牛特部杜稜郡王等來朝己巳次俄爾峒庚午免朝鮮歲貢柑柚石榴巴林部固倫額駙色布騰郡王等來朝命故靖南王耿仲明子繼茂襲爵辛未還次上都河壬申次俄爾峒河五月丁丑朔次謨護里伊札里河夏一鶚擊明唐王故將傅鼎銓等追入福建擒鼎銓等斬之辛巳次庫爾奇勒河壬午烏朱穆秦部貝勒塞稜額爾德尼等來朝乙酉次西喇塔調噶達渾為戶部尚書以覺善為都察院承政綽貝為鑲白旗蒙古固山額真壬辰次孫河癸巳還宮丙申免英山五年至七年荒逋賦庚子復博洛尼堪親王爵甲辰御史張煊以奏劾尚書陳名夏論死六月丙午朔幸南苑官軍破陝西賊何柴山等於雒南丁巳阿喇善擊山東盈河山賊平之壬戌罷太和山貢符篆黃精乙丑定諸陵壇廟祀典庚午諭曰朕以有司貪虐命督撫察劾乃閲四五月之久而未奏聞毋乃受賕徇私為有司所制或勢要挾持不敢彈劾歟此盜賊所由滋而黎民無起色也其即奉行前詔直陳無隱辛未詔故明神宗陵如十二陵以時致祭仍設守陵戶廣東官軍復廉州及永安等十二縣壬申命修繕祖陵設守戶定祭禮復朝日夕月禮秋七月丙子朔諭曰比者投充漢人生事害民朕甚恨之夫供賦役者編氓也投充者奴隸也今反厚奴隸而薄編氓如國家元氣及法紀何其自朕包衣牛彔下至王公諸臣投充人有犯法者嚴治其罪知情者連坐前有司責治投充人至獲罪譴今後與齊民同罰庶無異視使天下咸知朕意又諭曰大小臣工皆朝廷職官待之以禮則朝廷益尊今在京滿漢諸臣犯罪有未奉旨革職輒提取審問者殊乖大體嗣後各衙門遇官員有犯或被告訐皆先請旨革職然後送刑部審問毋得徑行提審著為令戊子大學士陳泰李率泰以罪免以雅秦為內國史院大學士杜爾德為議政大臣乙未幸南苑己亥以陳名夏為內弘文院大學士八月丙午朔上還宮丁未科爾沁卓禮克圖親王吳克善來朝己酉副將許武光請括天下藏金充餉上曰帝王生財之道在節用愛民掘地求金自古未有命逐去之乙卯以趙開心為左都御史定順天鄉試滿洲蒙古為一榜漢軍漢人為一榜會試殿試如之戊午冊立科爾沁卓禮克圖親王吳克善女博爾濟錦氏為皇后壬戌更定馬步軍經制吏部尚書談泰有罪伏誅籍其家乙酉大婚禮成加上太后尊號為昭聖慈壽恭簡皇太后丙寅御殿受賀頒恩赦戊辰追復肅親王豪格爵己巳詔天下歲貢物産不便於民者悉罷之癸酉陳錦金礪等追故明魯王於舟山獲其將阮進九月庚辰定朝儀壬午命平西王吳三桂征四川陳錦金礪克舟山故明魯王遁走丙戌雅賴談布覺善免以卓羅為吏部尚書車克為戶部尚書藍拜為工部尚書俄羅塞臣為都察院左都御史趙國祚為鑲紅旗漢軍固山額真封阿霸垓部都司噶爾為郡王固山額真噶達渾征鄂爾多斯部多爾濟丁亥除永平四關荒屯賦壬辰改承天門為天安門癸巳上獵於近郊辛丑還宮癸卯喀爾喀部土謝圖汗車臣汗塞臣汗等來貢冬十月己酉以和碩承澤親王碩塞多羅謙郡王瓦克達為議政王辛亥免宣府災賦丁巳以額色黑為國史院大學士庚申賜阿濟格死辛酉李國翰會吳三桂征四川以馬光輝為直隸山東河南總督甲子免諸王三大節進珠貂鞍馬及衍聖公宣大各鎮歲進馬乙丑封肇祖興祖陵山曰啓運山景祖顯祖陵山曰積慶山福陵山曰天柱山昭陵山曰隆業山是日啓運山慶雲見十一月乙亥朔皇第一子牛鈕生丙子于大海率所部至夷陵請降丙戌尚可喜克雷州乙未免平陽潞安二府澤遼沁三州上年災賦戊戌以伊爾德為正黃旗滿洲固山額真佟圖賴為正藍旗漢軍固山額真庚子免陽曲等四縣上年災賦壬寅免寧晉荒賦十二月丙午免桐城等四縣上年荒賦丁卯以周國佐為江寧巡撫是年朝鮮厄魯特部額爾德尼台吉昆都倫吳巴什阿巴賴喀爾喀部土謝圖汗車臣汗塞臣汗顧實汗台吉吳巴什達賴喇嘛俱來貢九年春正月癸酉朔上幸南苑辛巳以陳泰為禮部尚書壬午大學士陳名夏以罪免雪張煊寃命禮部議恤京師地震乙酉以陳維新為廣西巡撫壬寅皇第一子牛鈕薨二月丁未以祜錫布為鑲紅旗滿洲固山額真噶達渾等討鄂爾多斯部多爾濟等於賀蘭山殲之戊申和碩巽親王滿達海薨追封和碩簡親王庚戌頒六諭臥碑文於天下庚申封鄭親王濟爾哈朗為叔和碩鄭親王辛酉以陳之遴為弘文院大學士孫茂蘭為寧夏巡撫三月乙亥以王鐸為禮部尚書房可壯為左都御史贈張煊太常寺卿仍録其子如父官庚辰定官員封贈例丙戌罷諸王貝勒貝子管理部務追降和碩豫親王多鐸為多羅郡王丁亥和碩端重親王博洛薨追封和碩定親王己丑以陳泰為鑲黃旗滿洲固山額真癸巳以遏必隆額爾克戴青趙布泰賴塔庫索洪為議政大臣覺羅郎球胡世安為禮部尚書鞏阿岱錫翰西訥布庫冷僧機以罪伏誅籍其産拜尹圖免死幽繫戊戌多羅順承郡王勒克德渾薨追封多羅恭惠郡王己亥賜滿洲蒙古貢士麻勒吉漢軍及漢貢士鄒忠倚等進士及第出身有差夏四月丙午以蔡士英為江西巡撫丁未裁登萊宣府巡撫乙卯以韓岱為吏部尚書藍拜為刑部尚書星訥為工部尚書阿喇善為都察院左都御史戊午孔有德克廣西南寧慶遠思恩故明將陳邦傅以潯州降己未免府州縣官入覲庚申定諸王以下官名輿服之制乙丑允禮部議一月三朝春秋一舉經筵設宗人府官五月丁丑詔京察六年一舉行己卯免江陰青浦牛稅壬午以喀喀木為昂邦章京鎮守江寧庚子幸南苑六月丁未裁併直隸諸衛所戊申上還宮庚戌以和碩敬謹親王尼堪掌宗人府事貝勒尚善貝子吳達海為左右宗正官軍討肇慶高州賊平之丁巳詔軍政六年一舉行丙寅設詹事府官追諡圖爾格為忠義公圖賴為昭勳公配享太廟秋七月癸酉故明將孫可望陷桂林定南王孔有德死之丙子名皇城北門為地安門浙閩總督陳錦征鄭成功至漳州為其下所殺庚辰免淮安六年七年牙行逋稅甲申以和碩敬謹親王尼堪為定遠大將軍征湖南貴州定滿官喪制丁亥以巴爾處渾為鑲紅旗滿洲固山額真免磁祥符等八州縣及懷慶衛上年災賦吳三桂李國翰定漳臘松潘重慶遣梅勒章京戴都圍成都故明帥劉文秀舉城降己丑免臨邑四縣荒徭賦辛卯天全六番烏思藏等土司來降戊戌以祖澤遠為湖廣四川總督八月乙巳更定王公以下婚娶禮丙午多羅謙郡王瓦克達薨丁巳命尼堪移師討廣西餘寇九月庚午朔以朱孔格阿濟賴伊拜為議政大臣辛巳更定王以下祭葬禮癸未以纛章京阿爾津為定南將軍同馬喇希征廣東餘寇甲申以劉清泰為浙江福建總督王來