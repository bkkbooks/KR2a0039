body:
  text: 清史稿卷六本紀六聖祖本紀一聖祖合天弘運文武睿哲恭儉寬裕孝敬誠信功德大成仁皇帝諱玄燁世祖第三子也母孝康章皇后佟佳氏順治十一年三月戊申誕上於景仁宮天表英俊岳立聲洪六齡偕兄弟問安世祖問所欲皇二子福全言願為賢王帝言願效法父皇世祖異焉順治十八年正月丙辰世祖崩帝即位年八歲改元康熙遺詔索尼蘇克薩哈遏必隆鰲拜四大臣輔政二月癸未上釋服乙未誅有罪內監吳良輔罷內官丙申以嗣簡親王濟度子德塞襲爵三月丙寅詔曰國家法度代有不同太祖太宗創制定法垂裕後昆今或滿漢參差或前後更易其詳考成憲勒為典章集議以聞四月予殉葬侍衞傅達理祭葬甲申命湖廣總督駐荊州乙酉命將軍線國安統定南部軍鎮廣西丙戌以拉哈達為工部尚書癸卯安南國王黎維祺遣使入貢丙午大學士洪承疇乞休允之予三等輕車都尉世職戊申賜馬世俊等三百八十三人進士及第出身有差五月罷各省巡按官己巳以高景為工部尚書劉良佐為江安提督乙亥安南叛臣莫敬耀來歸封歸化將軍六月己卯江蘇巡撫朱國治疏言蘇省逋賦紳衿一萬三千五百十七人下部斥黜有差辛巳黑龍江飛牙喀部十屯來歸庚寅以嗣信郡王鐸尼子鄂扎襲爵癸巳大學士傅以漸乞休允之丁酉罷內閣復內三院戊戌吳三桂進馴象五却之詔停直省進獻閏七月庚辰以車克為吏部尚書阿思哈為戶部尚書甲午以傅維鱗為工部尚書壬寅予蘇松提督梁化鳳男爵八月甲寅達賴喇麻請通市許之九月丁未以卞三元為雲南總督李棲鳳為廣東總督郎廷佐為江南總督梁化鳳為江南提督十月己酉以林起龍為漕運總督誅降將鄭芝龍及其子世恩世廕辛酉裁順天巡撫山東民于七作亂逮問巡撫許文秀總兵李永盛范承宗命靖東將軍濟世哈討平之十一月丙子朔上親祀天於圜丘己亥世祖章皇帝升祔太廟甲辰湖南巡按御史仵劭昕坐贓棄市十二月丙午平西王吳三桂定西將軍愛星阿會報大軍入緬緬人執明永曆帝朱由榔以獻明將白文選降班師丁卯宗人府進玉牒是歲免直隸江南河南浙江湖廣陝西各州縣被災額賦有差朝鮮遣使進香入貢康熙元年壬寅春正月乙亥朔乙酉享太廟庚寅錄大學士范文程等佐命功官其子承謨等俱內院學士二月壬子太皇太后萬壽節上率羣臣朝賀三月以滇南平告廟祭陵赦天下辛卯萬壽節己亥遣官安輯浙江福建廣東新附官民夏四月丙辰上太祖太宗尊諡五月戊寅夏至上親祭地於方澤六月丁未命禮部考定貴賤等威秋七月壬申朔以車克為大學士寧古禮為戶部尚書張杰為浙江提督施琅為福建提督八月辛丑朔大學士金之俊罷九月裁延綏巡撫冬十月壬寅以成克鞏為大學士癸卯尊皇太后為太皇太后尊皇后為仁憲皇太后母后為慈和皇太后十一月辛巳冬至祀天於圜丘免朝賀十二月辛酉命吳三桂總管雲南貴州兩省是歲天下戶丁一千九百一十三萬七千六百五十二徵銀二千五百七十二萬四千一百二十四兩零鹽課銀二百七十二萬一千二百一十二兩零鑄錢二萬九千萬有奇免直隸江南各州縣災賦有差朝鮮入貢二年癸卯春正月己亥廣東總督盧崇峻請封民船濟師斥之二月庚戌慈和皇太后佟佳氏崩三月荷蘭國遣使入貢請助師討臺灣優賚之五月丙子以孫廷銓為大學士乙酉雲南開局鑄錢丙戌詔天下錢糧統歸戶部部寺應用俱向戶部關領著為令戊子以魏裔介為吏部尚書甲午恭上大行慈和皇太后尊諡曰孝康慈和莊懿恭惠崇天育聖皇后六月葬世祖章皇帝於孝陵孝康皇后端敬皇后祔焉戊申以龔鼎孳為左都御史乙卯故明將李定國子嗣興來降乙丑以哈爾庫為浙江提督八月癸卯詔鄉會試停制義改用策論復八旗繙譯鄉試甲寅命穆里瑪為靖西將軍圖海為定西將軍率禁旅會四川湖廣陝西總督討鄖陽逋賊李來亨郝搖旗等冬十月壬寅耿繼茂施琅會荷蘭師船勦海寇克厦門取浯嶼金門二島鄭錦遁於臺灣十一月詔免諸國貢使土物稅乙酉冬至祀天於圜丘十二月壬戌祫祭太廟是歲免直隸江南江西河南陝西浙江湖廣四川雲南貴州等省二百七十餘州縣災賦朝鮮入貢進香三年甲辰春正月賜朝正外藩銀幣鞍馬二月壬寅巡鹽御史張吉午請增長蘆鹽引斥之三月丙子耿繼茂等拔銅山丙戌賜嚴我斯等一百九十九人進士及第出身有差夏四月己亥輔臣等誣奏內大臣飛揚古子侍衞倭赫擅騎御馬飛揚古怨望幷棄市籍其家鰲拜以予其弟穆里瑪遣尚書喀蘭圖赴科爾沁四十七旗涖盟戊申裁鄖陽撫治五月甲子詔州縣私派累民上官容隱者併罪之六月庚申詔免順治十五年以前逋賦閏六月乙酉以王弘祚為刑部尚書丙戌以漢軍京官歸入漢缺升轉秋七月丁未以施琅為靖海將軍征臺灣八月甲戌浙江總督趙廷臣疏報擒獲明臣張煌言己卯穆里瑪圖海疏報進勦鄖陽茅麓山李來亨郝搖旗俱自焚賊平九月癸丑發倉粟賑給八旗莊田乙卯以查克旦為領侍衞內大臣十一月壬辰冬至祀天於圜丘丁未以魏裔介為大學士杜立德為吏部尚書王弘祚為戶部尚書龔鼎孳為刑部尚書十二月戊午朔日有食之丙戌祫祭太廟是月彗星見張宿井宿胃宿奎宿金星見給事中楊雍建請修省是歲免直隸江南江西山東陝西浙江福建湖廣貴州等省一百二十一州縣被災額賦有差朝鮮入貢四年乙巳春正月壬辰以郝惟訥為左都御史己亥停榷關溢額奬辛丑封承澤親王碩色子博翁果諾為惠郡王致仕大學士洪承疇卒予祭葬諡文襄二月乙丑太皇太后聖壽免朝賀己巳吳三桂疏報勦平水西烏撒土司擒其酋安坤安重聖丙戌以星變詔臣工上言闕失御史董文驥疏言大臣更易先皇帝制度非是宜一切復舊三月戊子京師地震有聲辛卯金星晝見以星變地震肆赦免逋賦山西旱有司不以聞下吏部議罪免其積逋及本年額賦壬辰詔禁州縣預徵隔年稅糧丙申詔曰郡縣災荒有司奏請蠲賦而小民先期已完是澤不下逮也自今被災者預緩徵額賦十之三甲辰萬壽節免朝賀丙午修歷代帝王廟太常寺少卿錢綎請簡老成耆德博通經史者數人出入侍從以備顧問夏四月丙寅詔凡災傷免賦者並免丁徭戊辰詔卿貳督撫員缺仍廷推五月丁未置直隸總督兼轄山東河南裁貴州總督歸雲南廣西總督歸廣東江西總督歸江南山西總督歸陝西鳳陽寧夏南贛巡撫悉裁之六月乙丑詔父子兄弟同役給復一年秋七月己酉吏部以山西徵糧如額請議詔曰曩以太原諸處旱災饑饉督撫不以聞議罪會赦得原豈可仍以催科報最惟未被災之地方官仍予紀錄八月庚午詔贓官遇赦免罪者不許復職九月辛卯冊赫舍里氏為皇后輔臣索尼之孫女也上太皇太后皇太后尊號加恩中外冬十月癸亥上幸南苑校射行圍甲戌還宮十一月丁酉祀天於圜丘十二月庚辰祫祭太廟是歲免直隸江南江西山東河南浙江廣東貴州等省一百二十一州縣衞災賦有差朝鮮琉球暹羅入貢索倫飛牙喀人來歸五年丙午春正月庚寅以廣東旱發倉穀七萬石賑之以承澤親王碩色子恩克布嗣爵二月壬子朔置平遠大定黔西三府丁巳以十二月中氣不應詔求明曆法者乙丑詔自今漢軍官丁憂准解任持三年喪三月以胡拜為直隸總督五月丙午以孫延齡為廣西將軍接統定南部軍駐桂林六月庚戌朔日有食之癸酉傅維麟病免以郝惟訥為工部尚書辛未詔崇文門凡貨物出京者弛其稅秋七月庚辰朔以朱之弼為左都御史辛巳琉球來貢並補進漂失前貢上嘉其恭順命還之自今非其國產勿以貢八月己酉給事中張維赤疏請親政九月丁亥上行圍南苑癸卯還宮禮部尚書沙澄免以梁清標為禮部尚書龔鼎孳為兵部尚書郝惟訥為刑部尚書朱之弼為工部尚書冬十月詔起范承謨為秘書院學士十一月丙申輔臣鰲拜以改撥圈地誣奏大學士管戶部尚書蘇納海直隸總督朱昌祚巡撫王登聯等罪逮下獄四大臣之輔政也皆以勳舊索尼年老遏必隆闇弱蘇克薩哈望淺心非鰲拜所為而不能爭鰲拜橫暴又宿將多戰功名在末而遇事專橫屢興大獄雖同列亦側目焉十二月丙寅鰲拜矯旨殺蘇納海朱昌祚王登聯甲戌祫祭太廟是歲免直隸江南江西河南陝西浙江湖廣等省八十六州縣災賦有差朝鮮琉球入貢六年丁未春正月己丑封世祖第二子福全為裕親王丁酉上幸南苑行圍以明安達禮為禮部尚書二月癸亥晉封故親王尼堪子貝勒蘭布為郡王丁卯以宗室公班布爾善為大學士起圖海復為大學士錫故總督李率泰一等男爵三月己亥賜繆彤等一百五十人進士及第出身有差夏四月甲戌加索尼一等公甲子江南民人沈天甫撰逆詩誣告人誅之被誣者皆不論御史田六善言奸民告訐於南人不曰通海則曰逆書北人不曰于七黨則曰逃人請鞫誣反坐從之五月辛酉吳三桂疏辭總理雲南貴州兩省事從之六月己亥禁採辦楠木官役生事累民秋七月己酉上親政御太和殿受賀加恩中外罪非殊死咸赦除之是日始御乾清門聽政甲寅命武職官一體引見己未輔臣鰲拜擅殺輔臣蘇克薩哈及其子姓癸亥賜輔臣遏必隆鰲拜加一等公九月丙午命修世祖實錄冬十月己卯盛京地震有聲十一月丁未冬至祀天於圜丘奉世祖章皇帝配饗丁巳加上太皇太后皇太后徽號十二月丙戌以塞白理為廣東水師提督戊子以馬爾賽為戶部增設尚書戊戌祫祭太廟是歲免直隸江南江西山東山西陝西甘肅浙江福建湖廣等省一百六十州縣災賦有差朝鮮荷蘭入貢七年戊申春正月戊申以莫洛為山西陝西總督劉兆麒為四川總督戊午加鰲拜遏必隆太師二月辛卯上幸南苑三月丁未詔部院官才能卓越升轉毋拘常調夏四月庚辰浙江嘉善民郁之章有罪遣戍其子褒廣叩閽請代上並宥之五月壬子以星變地震下詔修省諭戒臣工六月癸酉金星晝見丁亥平南王尚可喜遣子之信入侍秋七月戊午前漕運總督吳維華請徵市鎮間架錢洲田招民出錢佃種上惡其言利下刑部議罪庚申以夸岱為滿洲都統八月壬申戶部尚書王弘祚坐失察書吏偽印盜帑免九月庚子以吳瑪護為奉天將軍額楚為江寧將軍瓦爾喀為西安將軍壬寅上將巡邊侍讀學士熊賜履給事中趙之符疏諫上為止行仍令遇事直陳冬十月定八旗武職人員居喪百日釋縞任事仍持服三年庚午上幸南苑十一月癸丑冬至祀天於圜丘十二月癸酉以麻勒吉為江南總督甘文焜為雲南貴州總督范承謨為浙江巡撫癸巳祫祭太廟是歲免奉天直隸江南山東河南浙江陝西甘肅等省二百十六州縣災賦有差朝鮮安南暹羅入貢八年己酉春正月戊申修乾清宮上移御武英殿二月庚午命行南懷仁推算曆法庚午上巡近畿三月辛丑以直隸廢藩田地予民夏四月癸酉衞周祚免以杜立德為大學士丁丑上幸太學釋奠先師孔子講周易尚書丁巳給事中劉如漢請舉行經筵上嘉納之五月乙未以黃機為吏部尚書郝惟訥為戶部尚書龔鼎孳為禮部尚書起王弘祚為兵部尚書戊申詔逮輔臣鰲拜交廷鞫上久悉鰲拜專橫亂政特慮其多力難制乃選侍衞拜唐阿年少有力者為撲擊之戲是日鰲拜入見即令侍衞等掊而縶之於是有善撲營之制以近臣領之庚申王大臣議鰲拜獄上列陳大罪三十請族誅詔曰鰲拜愚悖無知誠合夷族特念效力年久迭立戰功貸其死籍沒拘禁其弟穆里瑪塞本得從子訥莫其黨大學士班布爾善尚書阿思哈噶褚哈濟世侍郎泰璧圖學士吳格塞皆誅死餘坐譴黜其弟巴哈宿衞淳謹卓布泰有軍功免從坐嗣敬謹親王蘭布降鎮國公褫遏必隆太師一等公六月丁卯詔曰朕夙夜求治念切民依邇年水旱頻仍盜賊未息兼以貪吏朘削民力益殫朕甚憫焉部院科道諸臣其以民間疾苦作何裨益各抒所見以聞戊辰敕改造觀象臺儀器壬申詔復輔臣蘇克薩哈官及世職其從子白爾圖立功邊徼被枉尤酷復其世職均令其子承襲戊寅詔滿兵有規占民間房地者永行禁止仍還諸民以米思翰為戶部尚書戊子詔宗人有罪遽絕屬籍心有不忍自順治十八年以來宗人削籍者宗人府詳察以聞秋七月壬辰朔裁直隸山東河南總督壬寅詔復大學士蘇納海總督朱昌祚巡撫王登聯原官並予諡八月甲申以索額圖為大學士明珠為左都御史九月甲午京師地震有聲丁未以勒貝為滿洲都統塞白理為浙江提督畢力克圖為蒙古都統冬十月甲子上幸南苑詔行在勿得借用民物盧溝橋成上為文勒之石十一月己亥先是山西陝西總督莫洛陝西巡撫白清額均坐鰲拜黨罷至是西安百姓叩閽稱其清廉乞還任詔特許之壬子太和殿乾清宮成上御太和殿受賀入居乾清宮十二月己卯顯親王福壽薨丁亥祫祭太廟是歲免直隸江南河南山西陝西湖廣等省四十五州縣災賦有差朝鮮琉球入貢九年庚戌春正月丙申予宋儒程顥程頤後裔五經博士丁酉饗太廟辛丑祈穀於上帝奉太祖高皇帝太宗文皇帝世祖章皇帝配饗起遏必隆公爵宿衞內廷己酉詔明藩田賦視民田輸納壬子上幸南苑二月癸酉以金光祖為廣東廣西總督馬雄鎮為廣西巡撫癸未詔尚陽堡寧古塔流徙人犯值十月至正月俱停發三月辛酉賜蔡啟僔等二百九十二人進士及第出身有差夏四月己丑以蔡毓榮為四川湖廣總督己亥上幸南苑五月丙辰朔加上孝康章皇后尊諡升祔太廟頒發恩詔訪隱逸賜高年赦殊死以下丙子纂修會典六月丙戌朔以席卜臣為蒙古都統丁酉以故顯親王福壽子丹臻襲爵己酉命大學士會刑部錄囚秋七月丁巳以王輔臣為陝西提督丁巳奉祀孝康章皇后於奉先殿八月戊子祭社稷壇詔都察院糾察陪祀王大臣班行不肅者乙未復內閣復翰林院丁酉上奉太皇太后皇太后有事於孝陵壬子車駕還宮九月庚申以簡親王濟度子喇布襲爵冬十月庚巳頒聖諭十六條甲午改內三院復中和殿保和殿文華殿大學士丁酉諭禮部舉經筵十一月癸酉以艾元徵為左都御史壬午以中和殿大學士魏裔介兼禮部尚書十二月癸卯以莫洛為刑部尚書辛亥祫祭太廟是歲免河南湖廣江南福建廣東雲南等省二百五十三州縣衞災賦有差朝鮮入貢十年辛亥春正月丁卯蒙古蘇尼特部四子部大雪饑寒遣官賑之癸酉封世祖第五子常寧為恭親王庚辰大學士魏裔介罷以曹申吉為貴州巡撫二月丁酉以馮溥為大學士以梁清標為刑部尚書乙巳召宗人覺羅年七十以上趙班等四人入見賜朝服銀幣戊申命編纂孝經衍義庚戌以尼雅翰為滿洲都統三月壬子朔誥誡年幼諸王讀書習騎射勿恃貴縱恣癸丑置日講官庚午以無雨風霾下詔修省夏四月乙酉命纂修太祖太宗聖訓詔宗人閒散及幼孤者量予養贍著為令丙戌詔清理庶獄減矜疑一等辛卯始開日講壬辰上詣天壇禱雨甲午雨五月庚申理藩院尚書喀蘭圖乞休加太子太保以內大臣奉朝請癸酉上幸南苑六月丁亥以靳輔為安徽巡撫甲午金星晝見是月靖南王耿繼茂卒子精忠襲封仍鎮福建八月己卯朔日有食之丁未上御經筵戊申以王之鼎為江南提督九月庚戌上以寰宇一統告成於二陵辛亥上奉太皇太后皇太后啟鑾蒙古科爾沁喀喇沁土默特敖漢諸部王貝勒公朝行在丁卯謁福陵昭陵戊辰祭福陵行告成禮庚午祭昭陵行告成禮辛未上幸盛京御清寧宮賜百官宴八十以上召前賜酒大賚奉天寧古塔甲士及於傷廢老病者白金民間高年亦如之曲赦死罪減一等軍流以下釋之山海關外蹕路所經勿出今年明年租賦遣官祭諸王諸大臣墓壬申上自盛京東巡冬十月辛巳駐蹕愛新召寧古塔將軍巴海諭以新附瓦爾喀虎爾哈宜善撫之己丑上迴蹕盛京再賜老人金辛卯謁福陵昭陵命文武官較射命來朝外藩較射壬辰上奉太皇太后皇太后迴鑾十一月庚戌還京壬申以明珠為兵部尚書十二月丙午祫祭太廟是歲免直隸江南江西浙江山東河南陝西湖廣等省三百二州縣衞災賦逋賦有差朝鮮琉球入貢十一年壬子春正月辛未上奉太皇太后幸赤城湯泉過八達嶺親扶慈輦步行下山二月戊寅奉太皇太后至湯泉辛卯上迴京丙申親耕耤田丁酉朝日於東郊戊戌上詣赤城三月戊辰上奉太皇太后還宮夏四月乙巳命侍衞吳丹學士郭廷祚巡視河工五月乙丑世祖實錄成丙寅上出德勝門觀麥六月庚寅命更定賦役全書秋七月己酉論征緬甸雲南貴州功予何建忠等一百二十七人世職丙辰上觀禾御史孟雄飛疏言孫可望窮蹙來歸濫膺王封及伊身死已襲二次今孫徵淳死宜令降襲詔降襲慕義公閏七月復封尚善為貝勒丁亥詔治獄勿用嚴刑輕斃人命違者罪之八月壬子上幸南苑行圍癸丑詔曰帝王致治在維持風化辨別等威比來官員服用奢僭競相效尤其議禁之庚申上御經筵壬戌上奉太皇太后幸遵化湯泉甲子閱薊州官兵較射丁卯上謁孝陵九月丁丑閱遵化兵三屯營兵冬十月甲辰上奉太皇太后還宮壬子命范承謨為福建總督十一月辛丑上幸南苑建行宮十二月丁未裕親王福全莊親王博果鐸惠郡王博翁果諾溫郡王孟峨疏辭議政允之戊午上召講官諭曰有人請令言官風聞言事朕思切中事理之言患其不多若借端生事傾陷擾亂深足害政與民休息道在不擾虛耗元氣則民生蹙矣己未康親王傑書安親王岳樂疏辭議政不許庚午祫祭太廟是歲免直隸江南浙江山東山西河南湖廣等省一百四十一州縣衞災賦有差朝鮮入貢十二年癸丑春正月庚寅上幸南苑大閱二月辛亥以吳正治為左都御史壬子上御經筵命講官日直戊辰賜八旗官學繙譯大學衍義三月丁丑上視麥壬午平南王尚可喜請老許之請以其子之信嗣封鎮粵不許令其撤藩還駐遼東癸巳賜韓菼等一百六十六人進士及第出身有差夏四月丁巳遣官封暹羅國王五月壬申學士傅達禮等請以夏至輟講上曰學問之道宜無間斷其勿輟六月壬寅起張朝珍為湖廣巡撫李之芳為浙江總督丁未上御瀛臺召羣臣觀荷賜宴乙卯禁八旗以奴僕殉葬秋七月庚午平西王吳三桂疏請撤藩許之丙子嗣靖南王耿精忠疏請撤藩許之壬午命重修太宗實錄八月丁未試漢科道官於保和殿不稱職者罷壬子遣侍郎折爾肯學士傅達禮往雲南尚書梁清標往廣東侍郎陳一炳往福建經理撤藩丁巳諭禮部祭祀大典必儀文詳備乃可昭格其稽古典禮酌議以聞九月戊辰禮部尚書龔鼎孳乞休允之乙亥京師地震詔修省冬十月壬寅以王之鼎為京口將軍己酉上幸南苑行圍十一月丁卯故明宗室朱議潀以蓄髮論死得旨免死入旗給與妻室房地庚午詔民間墾荒田畝以十年起科十二月壬子以姚文然為左都御史吳三桂反殺雲南巡撫朱國治貴州提督李本深巡撫曹申吉俱降賊總督甘文焜死之丙辰反問至命前鋒統領碩岱率禁旅守荊州丁巳召梁清標陳一炳還停撤二藩命加孫延齡撫蠻將軍線國安為都統鎮廣西命西安將軍瓦爾喀進守四川京師民楊起隆偽稱朱三太子圖起事事發覺起隆逸去捕誅其黨詔奸民作亂已平勿株連民勿驚避己未命順承郡王勒爾錦為寧南靖寇大將軍討吳三桂執三桂子額駙吳應熊下之獄庚申命副都統馬哈達帥師駐兗州擴爾坤駐太原備調遣辛酉命直省巡撫仍管軍務壬戌詔削吳三桂爵宣示中外命都統赫業為安西將軍會瓦爾喀守漢中以倭內為奉天將軍吳三桂陷辰州甲子祫祭太廟是歲免直隸山東安徽浙江湖廣等省二十六州縣衞災賦有差朝鮮安南入貢十三年甲寅春正月乙亥勒爾錦師行庚辰吳三桂陷沅州丁亥偏沅巡撫盧震棄長沙遁己丑以提督佟國瑤守鄖陽總兵吳之茂以四川叛巡撫羅森提督鄭蛟麟降之命總兵徐治都還守夷陵庚寅封世祖第七子隆禧為純親王以席卜臣為鎮西將軍守西安二月乙未朔太皇太后頒內帑犒軍丁酉欽天監新造儀象成壬寅賊犯澧州守卒以城叛提督桑峨退荊州陷常德命鎮南將軍尼雅翰率師守武昌癸丑上御經筵以趙賴為貴州提督甲寅吳三桂陷長沙副將黃正卿叛應之旁陷衡州命都統覺羅朱滿守岳州未至岳州失辛酉命刑部尚書莫洛加大學士銜經略陝西孫延齡以廣西叛殺都統王永年執巡撫馬雄鎮幽之三月乙丑命整飭驛站每四百里置一筆帖式接遞軍報探發塘報命左都御史多諾等軍前督餉戊辰吳三桂將犯夷陵勒爾錦遣兵擊敗之庚午以額駙華善為安南將軍鎮京口庚辰耿精忠反執福建總督范承謨幽之巡撫劉秉政降賊癸未鄖陽副將洪福叛提督佟國瑤擊敗之壬辰襄陽總兵楊來嘉以穀城叛命希爾根為定南將軍尚書哈爾哈齊副之命舒恕桑遏根特席布率師赴江西甲午西安將軍瓦爾喀克陽平關夏四月癸卯調西安副都統德業立守襄陽丁未吳三桂子應熊孫世霖伏誅初三桂倉卒起兵而名義不揚中悔至澧州頗前却至是方食聞報驚曰上少年乃能是耶事決矣推食而起詔削孫延齡職以阿密達為揚威將軍駐江寧賴塔為平南將軍赴杭州甲寅潮州總兵劉進忠以城叛戊午以根特為平寇將軍赴廣西討孫延齡河北總兵蔡祿謀叛命阿密達襲誅之辛酉詔削耿精忠爵癸亥詔以分調禁旅遣將分防情形寄示平南王尚可喜五月丙寅皇子胤礽生皇后赫舍里氏崩戊寅安西將軍赫業等敗吳之茂於劄閣堡復朝天關壬午浙江平陽兵變執總兵蔡朝佐應耿精忠將曾養性圍瑞安命賴塔進兵討之壬辰副都統德業立敗洪福於武當六月丙午命貝勒尚善為安遠靖寇大將軍率師赴岳州貝子準達赴荊州庚戌總兵祖弘勳以溫州叛金華副將牟大寅敗耿精忠將於常山壬子命將軍喇哈達守杭州乙卯命康親王傑書為奉命大將軍赴浙江貝勒洞鄂為定西大將軍赴四川浙江溫州黃岩太平諸營相繼叛命喇哈達守台寧七月辛未以郎廷佐為福建總督段應舉為提督癸酉賴塔敗耿精忠將於金華是時精忠遣其大將馬九玉曾養性犯浙江白顯忠犯江西所至土匪𧔧應江西尤甚南瑞總兵楊富應賊董衞國誅之丁亥貝勒察尼大戰賊將吳應麒於岳州七里山敗之八月壬寅平寇將軍根特卒於軍以哈爾哈齊代之海澄公黃梧卒子芳度襲爵守漳州乙巳金光祖報孫延齡陷梧州督兵復之丙午上幸南苑九月壬戌上御經筵命每日進講如常耿精忠將以土寇陷清谿徽州江寧將軍額楚統領巴爾堪擊走之連戰入江西復樂平等縣命碩塔等駐安慶辛未麻城土寇鄒君升等作亂知府于成龍討平之命簡親王喇布為揚威大將軍率師赴江西侍衞坤為振武將軍副之廣西提督馬雄叛命安親王岳樂為定遠平寇大將軍率師赴廣東宗室瓦山覺羅畫特副之冬十月壬辰喇布師行丙申岳樂師行壬寅上奉太皇太后幸南苑辛亥還宮十一月庚申朔莫洛報吳之茂兵入朝天關饟路中阻洞鄂退守西安命移西安軍守漢中河南軍守西安十二月庚寅朔傑書大敗曾養性於衢州又敗之於台州王輔臣叛經略莫洛死之上議親征王大臣以京師根本重地太皇太后年高力諫乃止徵盛京兵蒙古兵分詣軍前丁未命尚可喜節制廣東軍事戊午祫祭太廟是歲免直隸江南山東河南陝西等省七十八州縣災賦有差朝鮮琉球入貢十四年乙卯春正月辛酉尚可喜報賊犯連州官兵擊敗之戊辰晉封尚可喜平南親王命其子之孝佩大將軍印討賊二月癸巳下詔切責貝勒洞鄂退縮失機飭令速定平涼秦州以通棧道乙巳康親王傑書遣兵復處州進復仙居王輔臣陷蘭州西寧總兵王進寶大戰於新城圍蘭州洞鄂復隴州關山關三月己未朔叛將楊來嘉犯南漳總兵劉成龍擊走之戊辰饒州賊犯祁門巡檢張行健被執不屈死之丁丑命張勇為靖逆將軍會總兵孫思克等討王輔臣賊陷定邊城命提督陳福駐寧夏討賊丁亥蒙古布爾尼反命信郡王鄂扎為撫遠大將軍大學士圖海為副將軍討平之戊子以熊賜履為大學士夏四月己丑以勒德洪為戶部尚書署護軍統領郎肅等勦耿寇於五桂寨斬級二萬復餘干乙未封張勇靖逆侯王進寶一等男戊戌以左都督許貞鎮撫州建昌廣信戊申王輔臣遣兵援秦州官兵迎擊敗之辛亥上諭侍臣進講朕乃覆講互相討論庶有發明癸丑王進寶復臨洮孫思克復靖遠戊午紹興知府許弘勳招撫降衆五萬人五月庚午察哈爾左翼四旗來歸庚辰命畢力克圖援榆林王輔臣兵陷延安綏德甲申張勇復洮河二州閏五月癸巳上幸玉泉山觀禾楊來嘉洪福陷穀城斬守城不力之副將馬郎阿以徇削總兵金世需職隨軍效力壬子額楚復廣信樂平土寇復陷饒州將軍希爾根擊之復饒州六月畢力克圖復吳堡復綏德丁丑命將軍舒恕援廣東己卯命振武將軍佛尼勒開棧道援漢中庚辰上幸南苑行圍壬午張勇攻鞏昌江西官軍攻石峽失利副都統雅賴戰死甲申克蘭州畢力克圖復延安以軍興停陝西湖廣鄉試七月乙巳陳福勦定邊斬賊將朱龍庚戌江西官兵復浮梁樂平宜黃崇仁樂安諸縣八月戊午上幸南苑行圍洞鄂畢力克圖阿密達會攻王輔臣斬賊將郝天祥傅喇塔復黃岩壬申上奉太皇太后幸湯泉甲申上還京御經筵九月上次昌平詣明陵致奠長陵遣官分奠諸陵丙申上奉太皇太后還宮辛丑詔每歲正月停刑著為令冬十月癸亥康親王兵復太平樂清諸縣丙寅上謁孝陵戊辰祭孝陵乙亥還宮陳福及王輔臣戰於固原不利副將太必圖戰沒論平布爾尼功封賞有差及助順蒙古王貝勒沙津以次各晉爵罰助逆奈曼等部十一月癸巳貝勒察尼復興山丁酉復設詹事府官壬寅叛將馬雄糾吳三桂兵犯高州連陷廉州命簡親王喇布自江西援廣東是月鄭錦攻陷漳州海澄公黃芳度死之戕其家十二月丙寅立皇子胤礽為皇太子頒詔中外加恩肆赦乙亥以勒爾錦師久無功奪其參贊巴爾布以下職寧夏兵變提督陳福死之壬午祫祭太廟是歲免湖廣河南七府五州縣災賦有差朝鮮入貢十五年丙辰春正月丁亥以王進寶為陝西提督駐秦州甲午以建儲恭上太皇太后皇太后徽號乙未升寧夏總兵官為提督以趙良棟為之辛丑上幸南苑行圍二月丁巳詔軍中克城禁殺掠壬戌命大學士圖海為撫遠大將軍統轄全秦自貝勒洞鄂以下咸受節制癸酉上如鞏華城諭扈從勿踐春田乙亥吳三桂將高大傑陷吉安戊寅安親王岳樂擊三桂將於萍鄉敗之復萍鄉辛巳上御經筵贈死事副將張國彥太子太保予世職三月癸未贈海澄公黃芳度郡王丙戌王進寶佛尼勒大敗吳之茂於北山庚寅傅喇塔圍溫州曾養性祖弘勳悉衆來犯副都統紀爾他布擊走之辛卯岳州水師克君山庚子勒爾錦渡江與三桂之衆戰迭敗之乙巳賜彭定求等二百九人進士及第出身有差己酉勒爾錦與三桂之衆戰於太平街不利退守荊州壬子移趙賴提督江西夏四月辛丑馬雄祖澤清糾滇賊犯廣東尚可喜老病不能軍屢疏告急援兵不時至至是賊逼廣州尚之信劫其父以降賊總督金光祖巡撫佟養鉅陳洪明提督嚴自明俱從降福建巡撫楊熙總兵拜音達奪門出舒恕莽依圖退至江西上聞廣東變作命移兵益江西五月壬午朔日有食之乙酉復設鄖陽撫治以楊茂勳任之丙戌鄂羅斯察漢汗使人來貢己亥撫遠大將軍圖海敗王輔臣於平涼六月壬子朔王輔臣降圖海以聞詔復其官授靖寇將軍立功自効諸將弁皆原之己卯耿繼善棄建昌遁上諭傑書曰耿精忠自撤其兵顯為海寇所逼其乘機速進七月辛巳朔賜鄂羅斯使臣鞍馬服物大學士熊賜履免以慕天顏為江蘇巡撫庚子以姚文然為刑部尚書郎廷相為福建總督振武將軍佛尼勒會張勇王進寶擊吳之茂於秦州大敗之賊衆宵遁八月甲寅穆占復禮縣壬戌上奉太皇太后幸湯泉乙亥賴塔擊馬九玉於衢州復江山九玉棄軍遁九月庚辰朔賴塔進擊馬九玉破之復常山進攻仙霞關賊將金應虎迎降復浦城連下建寧癸未張勇復階州乙未耿精忠戕前總督范承謨山西巡撫達爾布有罪免丙午命穆占為征南將軍移軍湖廣冬十月辛酉上奉太皇太后還宮乙丑康親王傑書師次延平賊將耿繼美以城降耿精忠遣子顯祚獻偽印乞降傑書入福州疏聞上命復其爵從征海寇自効其將曾養性叛將祖弘勳俱降浙江官兵復溫處二府撤兗州屯兵癸酉命講官進講通鑑十一月丙戌海寇犯福州都統喇哈達擊敗之丙申官兵圍長沙寧海將軍貝子傅拉塔卒於軍十二月壬子遣耿昭忠為鎮平將軍駐福州分統靖南藩軍叛將嚴自明犯南康舒恕擊走之丁巳尚之信使人詣簡親王軍前乞降且乞師疏聞許之吳三桂將吳世琮殺孫延齡踞桂林庚申海澄公黃芳世自賊中脫歸上嘉之加太子太保與其弟黃藍並赴康親王大軍討賊建威將軍吳丹復山陽辛未頒賞諸軍軍士金帛丙子祫祭太廟耿繼善棄邵武海寇據之副都統穆赫林擊之賊將彭世勳以城降是歲免直隸江南江西陝西各省三十四州縣災賦有差朝鮮入貢十六年丁巳春正月丙申將軍額楚攻吉安失利命侍郎班迪馳勘軍狀二月己未上幸南苑行圍甲子大閱於南苑免福建今年租賦招集流亡丙寅以鄂內為討逆將軍赴岳州丁卯康親王傑書敗鄭錦於興泉賊棄漳州遁復海澄遣郎中色度勞軍岳州察軍狀辛未以靳輔為河道總督癸酉論花馬池勦寇功蒙古鄂爾多斯貝勒索諾木等晉爵有差乙亥上御經筵是月江西官軍復瑞金鉛山三月甲申以莽依圖為鎮南將軍督兵廣東己丑諭禮部帝王克謹天戒凡有垂象皆關治理設立專官謹司占候今星辰凌犯霜露非時欽天監不以實告有辜職掌其察議以聞庚寅命翰林長於詞賦書法者以所業進呈乙未原任總兵劉進忠苗之秀詣康親王軍降命隨大軍勦賊癸未詔軍興以來文武官身殉封疆克全忠節其有旅櫬不能歸妻子不得養者深堪軫惻所在疆吏察明妥為資送以昭褒忠至意甲辰含譽星見慶雲見乙巳吳三桂聚兵守長沙命勒爾錦進臨江圖海守漢中喇布鎮吉安莽依圖進韶州額楚駐袁州舒恕防贛州夏四月己未康親王傑書疏言處州府慶元縣民人吳臣任等不肯從賊結寨自固守義殺賊實為可嘉已交浙江督撫效力者錄用歸農者奬賞其陣亡札委守備吳受南等並請恩卹從之辛酉上幸霸州行圍以伊桑阿為工部尚書宋德宜為左都御史丁卯提督趙賴敗土寇於泰和擒賊目蕭元戊辰予死事溫處道陳丹赤等官廕辛未上製大德景福頌書屏上太皇太后乙亥莽依圖師至南安嚴自明以城降遂克南雄入韶州五月己卯尚之信降命復其爵隨大軍討賊特擢謫戍知府傅弘烈為廣西巡撫先是弘烈以首吳三桂反狀謫梧州及兵起弘烈上書陳方略故有是命旋加授撫蠻滅寇將軍與莽依圖規取廣西甲午額魯特噶爾丹攻敗喀爾喀車臣汗來獻軍實却之六月丁巳祖澤清以高州降秋七月庚子鄭錦將劉國軒自惠州犯東莞尚之信大敗之賊將陳璉以惠州降甲辰上御便殿召大學士等賜坐論經史因及前代朋黨之弊諭加警戒以明珠覺羅勒德洪為大學士八月丁未明宗人朱統錩起兵陷貴溪瀘溪己未上御經筵丙寅冊立貴妃鈕祜祿氏為皇后佟佳氏為貴妃戊辰傅弘烈等復梧州九月丙子命宗室公溫齊提督周卜世赴湖廣協勦癸未命額駙華善率師益簡親王軍科爾科代接駐江寧丁亥上發京師謁孝陵巡近邊丙申次喀拉河屯庚子次達希喀布秦昂阿近邊蒙古敖漢部札穆蘇等朝行在敵駝馬賜金幣吳三桂將胡國柱馬寶寇韶州將軍莽依圖額楚夾擊破之賊遁追之過樂昌復仁化冬十月甲辰上次湯泉癸丑還宮傅弘烈敗吳世琮於昭平復潯州福建按察使吳興祚敗朱統錩於光澤其黨執統錩降癸亥始設南書房命侍講學士張英中書高士奇入直十一月己卯吳三桂將韓大任陷萬安護軍統領哈克山擊敗之庚子封長白山神遣官望祭是月官兵復茶陵攸縣十二月乙巳海寇犯泉州提督段應舉等禦之辛亥海寇犯欽州游擊劉士貴擊敗之命參贊勒貝將軍額楚進取郴永己巳以馮甦為刑部侍郎辛酉金星晝見辛未祫祭太廟是歲免直隸江南江西陝西湖廣等省七十州縣災賦有差朝鮮入貢十七年戊午春正月己丑副都統哈當總兵許貞擊韓大任於寧都大任遁之汀州詣康親王軍前降命執送京師壬辰以郭四海為左都御史乙未詔曰一代之興必有博學鴻儒振起文運闡發經史以備顧問朕萬幾餘暇思得博通之士用資典學其有學行兼優文詞卓越之士勿論已仕未仕中外臣工各舉所知朕將親試焉於是大學士李霨等荐曹溶等七十一人命赴京齊集請旨二月甲辰傅弘烈疏言吳三桂兵犯廣西詔額楚勒貝守梧州己未上御經筵製四書講疏義序丁卯皇后鈕祜祿氏崩諡曰孝昭皇后辛未莽依圖及吳世琮戰於平樂失利退守梧州命尚之信及都統馬九玉會師守梧州三月丙子湖廣官兵擊楊來嘉洪福敗之復房縣丁丑海寇犯石門黃芳世擊敗之癸巳祖澤清復叛應吳三桂閏三月癸卯上巡近畿乙丑命內大臣喀代尚書馬喇往科爾沁四十九旗涖盟丁卯吳三桂將林興珠詣安親王軍前降詔封建義侯隨軍勦賊逮問副都統甘度海阿進泰以在江西勦賊失機也夏四月庚午海寇蔡寅陷平和進逼潮州甲戌祖澤清犯電白尚之信額楚擊之澤清遁庚寅慶陽土賊袁本秀作亂官兵擊斬之五月庚子朔海澄公黃芳世卒於軍命其弟芳泰襲爵戊申福建總督郎廷相巡撫楊熙提督段應舉俱免以姚啟聖為福建總督吳興祚為福建巡撫楊捷為福建水陸提督甲寅上幸西郊觀禾額魯特部濟農為噶爾丹所逼入邊張勇逐出之六月壬申尚善遣林興珠敗三桂舟師於君山丁亥上以盛夏亢旱步禱於天壇是日大雨壬辰吳三桂將犯永興都統伯宜理布統領哈克山與戰敗歿海寇犯廉州總兵班紹明等擊走之吳三桂兵犯郴州副都統碩岱與戰不利奔永興丁酉詔曰軍興以來將士披堅執銳盛暑祁寒備極勞苦朕甚憫焉其令兵部察軍中有負債責者官為償之戰歿及被創者恤其家秋七月鄭錦陷海澄前鋒統領希佛副都統穆赫林提督段應舉死之甲辰鄭錦犯泉州甲寅以安珠護為奉天將軍壬戌以魏象樞為左都御史丙寅召翰林院學士陳廷敬侍讀學士葉方藹入直南書房是月吳三桂僭號於衡州八月己卯安遠靖寇大將軍貝勒尚善卒於軍命貝勒察尼代之庚午西洋國王阿豐肅使臣入貢癸未上御經筵以御製詩集賜陳廷敬等乙未吳三桂死永興圍解頒行康熙永年曆丙申詔曰逆賊倡亂仰服天誅絓誤之徒宜從寬典其有悔悟來歸者咸與勿治九月上奉太皇太后幸湯泉晉謁孝陵姚啟聖拉哈達大敗海寇於蜈蚣山劉國軒遁泉州圍解冬十月癸未上巡近邊次灤河閱三屯營兵己丑將軍鄂內敗吳應麒於石口丁酉皇四子胤禛生是為世宗母曰吳雅氏十一月己亥拉哈達疏言海賊斷江東橋兵援泉州難進在籍侍讀學士李光地為大軍嚮導修通險路接濟軍需請議得旨李光地前當變亂之初密疏機宜茲又迎接大兵備辦糧米深為可嘉即升授學士辛酉上奉太皇太后還宮癸亥命福建陸路提督楊捷加昭武將軍王之鼎為福建水師提督十二月丁亥額楚傅弘烈及吳世琮戰於藤縣不利退守梧州乙未祫祭太廟是歲免直隸江南江西湖廣等省七十州縣災賦有差朝鮮西洋入貢十八年己未春正月戊申遣官分賑山東河南甲寅貝勒察尼督水師圍岳州賊將吳應麒遁復岳州上御午門宣捷設隨征總兵官以處降將旋裁之壬戌劉國軒犯長樂總督姚啟聖偕紀爾他布吳興祚擊敗之甲子岳樂復長沙二月丙寅傅弘烈戰吳世琮於梧州賊遁己巳詔數江西奸民從逆之罪仍免其逋賦甲戌順承郡王勒爾錦督兵過江分復松滋枝江宜都澧州叛將洪福以舟師降戊寅簡親王喇布遣前鋒統領希佛復衡州賊將吳國貴夏國相遁庚辰詔軍前王大臣議進取雲貴事宜以周有德為雲貴總督桑峨為雲南提督趙賴為貴州提督並隨王師進討以楊雍建為貴州巡撫癸未以夸扎為蒙古都統三月丙申朔御試博學鴻詞於保和殿授彭孫遹等五十人侍讀侍講編修檢討等官修明史以學士徐元文葉方藹庶子張玉書為總裁丁酉上幸保定縣行圍甲辰以徐治都為湖廣提督將軍穆占擊吳國貴於永州敗之復永州道州永明己酉上還宮戊午賜歸允肅等百五十一人進士及第出身有差庚申岳州陣歿諸將喪至遣侍衞迎奠福建陣沒將士喪至亦如之夏四月丙寅以楊茂勳為四川總督駐鄖陽戊辰以萬正色為福建水師提督己卯旱甚上步禱於天壇是日大雨莽依圖擊吳世琮於潯州敗走之壬寅上出阜成門觀禾五月庚戌劉國軒犯江東橋賴塔大戰敗之六月辛未詔曰盛治之世餘一餘三蓋倉廩足而禮教興水旱乃可無虞比聞小民不知積蓄一逢歉歲率致流移夫興儉化民食時用禮惟良有司是賴督撫等其選吏教民用副朕意己卯以希佛為蒙古都統秋七月甲午靳輔疏報淮揚壩工成涸出田地招民種之丁未上視純親王隆禧疾隆禧薨乙卯額楚敗吳世琮於南寧世琮遁庚申京師地震詔發內帑十萬賑卹被震廬舍官修之壬戌召廷臣諭曰朕躬不德政治未協致茲地震示警悚息靡寧勤求致災之由豈牧民之官苛取以行媚歟大臣或朋黨比周引用私人歟領兵官焚掠勿禁歟蠲租給復不以實歟問刑官聽訟或枉平民歟王公大臣未能束其下致侵小民歟有一於此皆足致災惟在大法而小廉政平而訟理庶幾仰格穹蒼弭消沴戾用是昭布朕心願與中外大小臣工共勉之八月癸亥朔將軍穆占復新寧甲子傅弘烈復柳城融縣庚辰提督趙國祚將軍林興珠大破吳國貴於武岡國貴死復武岡州九月庚戌以地震禱於天壇辛亥命簡親王喇布守桂林甲寅金光祖執叛鎮祖澤清送京及其子良楩磔誅之冬十月辛未詔將軍張勇王進寶提督趙良棟孫思克取四川王進寶趙良棟行癸未王進寶克武關復鳳縣趙良棟復兩當十一月戊戌王進寶擊叛將王屏藩遁之廣元復漢中庚子趙良棟復略陽進克陽平關丁酉以許貞為江西提督十二月壬戌以蔡毓榮為綏遠將軍進定雲貴將軍佛尼勒吳丹克梁河關賊將韓晉卿遁復興安平利紫陽石泉漢陰洵陽白河及鄖陽之竹山竹溪丁卯上幸南苑辛未詔安親王岳樂率林興珠班師壬午授趙良棟勇略將軍乙丑祫祭太廟是歲免順天江南山東山西河南浙江湖廣等省二百六十一州縣災賦有差朝鮮琉球安南入貢十九年庚申春正月甲午趙良棟復龍安府進至綿竹偽巡撫張文等迎降遂入成都詔以良棟為雲貴總督王進寶克朝天關復廣元王屏藩縊死生擒吳之茂壬子上幸鞏華城遣內大臣賜奠昭勳公圖賴墓二月辛酉朔詔吳丹會趙良棟進取雲南王進寶鎮四川勒爾錦取重慶徐治都守荊州乙丑佛尼勒收順慶府潼川中江南部蓬縣廣安西充諸縣悉下丁卯詔莽依圖督馬九玉金光祖高承蔭進兵雲南己巳上幸南苑丙子大閱以于成龍為直隸巡撫徐治都大敗叛將楊來嘉復巫山進取夔州楊茂勳復大昌大寧癸未萬正色敗海寇於海壇三月辛卯吳丹復重慶達州奉鄉諸州縣悉定楊來嘉降送京乙未以伊闢為雲南巡撫丁酉安親王岳樂師旋上勞於蘆溝橋辛丑馬承蔭誘執傅弘烈先是馬雄踞柳州死其子承蔭以柳州降至是復叛執弘烈送貴陽不屈死之平南將軍賴塔復銅山命守潮州備承蔭萬正色擊海寇於平海𢕑克之進克湄州南日崇武諸𢕑朱天貴降拉哈達擊劉國軒敗之遁厦門偽將蘇堪迎降進平玉洲石馬海澄馬州等十九寨復偕吳興祚取金門己酉察尼下辰龍關蔡毓榮復銅仁夏四月庚申朔以賴塔為滿洲都統癸亥穆占董衞國敗吳應麒復沅州靖州進復黎平丁卯上以學士張英等供奉內廷日備顧問下部優高士奇杜訥均授翰林官己巳命南書房翰林每日晚講通鑑丙子上祈雨天壇翌日雨己卯頒行尚書講義王進寶以病回固原以其子總兵用予統軍駐保寧庚辰宗人府進玉牒五月壬辰命甘肅巡撫治蘭州乙巳莽依圖會軍討馬承蔭復降命執送京師己酉山海關設關收稅六月甲子蔡毓榮復思南丁丑命五城粥廠再展三月遣太醫官三十員分治飢民疾疫壬午副都統馬爾哈齊營總馬順德以縱兵殺人論罪秋七月甲午停捐納官考選科道褒卹福建總督范承謨廣西巡撫馬雄鎮贈官予諡廕乙巳以折爾肯為左都御史己酉解順承郡王勒爾錦大將軍撤還京八月戊辰上御經筵己巳命賴塔移駐廣州以博濟軍益之戊寅大學士索額圖免壬午將軍莽依圖卒於軍以勒貝代之甲申尚之信以屬人王國光訐告其罪擅殺之詔賜之信死其弟之節其黨李天植皆伏誅家口護還京師閏八月乙未命各將帥善撫綠旗軍士壬子以王永譽為廣東將軍九月癸亥吳世璠使其將夏國柱馬寶潛寇四川譚弘復叛應之連陷瀘州永寧夔州土匪應之命將軍吳丹噶爾漢提督范達理徐治都分道討之乙丑以賴塔為平南大將軍率師進雲南戊寅吳丹復瀘州冬十月仁懷失守罷吳丹以鄂克濟哈領其軍戊戌以阿密達為蒙古都統噶爾漢復巫山壬寅大將軍康親王傑書師旋上郊勞之戊申彰泰穆占敗吳世璠於鎮遠噶爾漢擊譚弘於鐵開峽敗之是月王大臣議上師行玩誤之王貝勒大臣罪得旨勒爾錦革去王爵籍沒覊禁尚善察尼均革去貝勒蘭布革去鎮國公朱滿革去都統立絞餘各褫官奪世職鞭責籍沒有差十一月丙辰朔冬至祀天於圜丘彗星見詔求直言甲子貝子彰泰進復平越遂入貴陽逆渠吳世璠及吳應麒等夜遁安順石阡都勻三府皆下庚午以達哈里為蒙古都統丙子川北總兵高孟敗彭時亨於南溪橋復營山進圍靈鷲寨斬偽將魏卿武甲申提督周卜世復思南十二月壬辰以徐元文為左都御史甲午高孟復渠縣乙未提督桑峨大敗吳世璠於永寧追至鐵索橋賊焚橋遁土官龍天祐沙起龍造盤江浮橋濟大軍壬寅高孟復廣安州庚戌以郝浴為廣西巡撫癸丑祫祭太廟是歲免直隸江南山東山西陝西江西福建湖廣等省一百八十六州縣災賦有差朝鮮琉球入貢二十年辛酉春正月壬申叛將李本深降械送京師癸酉總兵高孟復達州甲戌將軍噶爾漢復雲陽譚弘死進復忠州萬縣開縣乙亥命侍郎溫代治通州運河丙子將軍穆占提督趙賴擊夏國相等走之復平遠辛巳增置講官詔法司慎刑是月鄭錦死其子克塽繼領所部二月己丑貝子彰泰師至安南衞擊賊將線緎於江西坡賊列象陣拒戰官兵分三隊奮擊大破之賊遁公圖達漢泰追擊復敗之復普安州新興所壬辰副都統莽奕祿敗賊張足法等於三山甲午詔凡三藩往事為民害者悉除之蠲奉天鹽引大將軍賴塔師至廣西大破賊於黃草壩復安籠入曲靖高孟復東鄉敗彭時亨於月城寨戊戌增欽天監滿監副一員都統希福馬緝碩塔復馬龍州楊林城入嵩明州賊遁穆占復黔西大定斬其偽將張維堅乙巳貝子彰泰大將軍賴塔將軍蔡毓榮先後入滇賊將胡國柄劉起龍迎拒官軍分擊敗之斬國柄起龍辛亥謁孝陵三月甲辰宣威將軍鄂克濟哈以失援建昌自劾詔以覺羅紀哈里代之辛酉葬仁孝皇后孝昭皇后於昌瑞山陵詔行在批閱章奏令大學士審校壬戌胡國柱犯建昌將軍佛尼勒擊走之復馬湖癸亥馬寶棄遵義犯瀘詔佛尼勒趙良棟急擊滇賊勿令回援丙寅贈卹福建死事運使高天爵知府張瑞午等官廕戊辰土官陸道清以永寧降癸酉上奉太皇太后幸遵化湯泉夏四月甲辰朔王用予復納谿江安仁懷合江己酉貝子彰泰遣使招撫諸路武定大理臨安永順姚安皆降壬子上奉太皇太后還宮五月癸丑朔提督周卜世取遵義降偽官金仕俊等復真安州仁懷桐梓綏陽等縣己未遣官察閱蒙古蘇尼特等旗被旱災狀乙丑詔行取州縣曾陷賊中者勿選科道辛巳大將軍貝子彰泰報抵雲南省城偽將李發美以鶴慶麗江二府降六月戊子除山西陝西房號銀秋七月丁巳以禮部尚書郭四海兼管刑部庚申詔四川民田為弁兵所占者察還之辛酉都統希福提督桑峨擊馬寶於烏木山大敗之馬寶降械送京師誅之乙丑趙良棟遣總兵李芳述擊敗胡國柱復建昌入雲南戊辰詔圖海率王輔臣還京壬申賜宴瀛臺員外郎以上皆與焉賜綵幣己卯以施琅為福建水師提督規取臺灣改萬正色陸路提督八月辛巳朔日有食之乙巳上御經筵九月辛亥上巡幸畿甸故平南王尚可喜喪至通州賜銀八千兩遣官奠茶果戊午上次雄縣召見知州吳鑑問渾河水決居民被災狀丙寅上還京詔停本年秋決壬申復運丁工銀冬十月癸未偏沅巡撫韓世琦敗賊將黃明於古州甲申額魯特噶爾丹入貢乙酉大學士圖海師旋上嘉勞之壬辰詔撤平南靖南兩藩弁兵還京癸卯詔免吐魯番貢犬馬十一月辛亥詔從賊諸人除顯抗王師外餘俱削官放還以諾邁為漢軍都統癸亥定遠平寇大將軍貝子彰泰平南大將軍都統賴塔勇略將軍總督趙良棟綏遠將軍總督蔡毓榮疏報王師於十月二十八日入雲南城吳世璠自殺傳首吳三桂析骸示中外誅偽相方光琛餘黨降雲南平是日以昭告孝陵車駕次薊州丁卯祭孝陵辛未召貝子彰泰將軍趙良棟還京乙亥上獵於南山發矢殪三虎己卯迴鑾十二月戊子設滿洲將軍駐荊州漢軍將軍駐漢中癸巳羣臣請上尊號敕曰自逆賊倡亂莠民響應師旅疲於征調閭閻敝於轉輸加以水旱頻仍災異見此皆朕躬不德所致賴宗社之靈削平庶孽方當登進賢良與民休息而乃侈然自足為無謂之潤色能勿恧乎其勿行補廣西鄉試戊戌大學士圖海卒己亥上御太和門受賀宣捷中外癸卯加上太皇太后皇太后徽號頒發恩詔賜宗室賚外藩予封贈廣解額舉隱逸旌節孝恤孤獨罪非常赦不原者悉赦除之以于成龍為江南江西總督吳興祚為廣東廣西總督丁未祫祭太廟是歲免直隸江南江西山東山西浙江福建等省七十五州縣災賦有差丁戶一千七百二十三萬徵銀二千二百一十八萬三千七百六十兩有奇鹽茶課銀二百三十九萬九千四百六十八兩鑄錢二萬三千一百三十九萬朝鮮厄魯特入貢
