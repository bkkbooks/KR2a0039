body:
  text: 清史稿卷九本紀九世宗本紀世宗敬天昌運建中表正文武英明寬仁信毅睿聖大孝至誠憲皇帝諱胤禛聖祖第四子也母孝恭仁皇后烏雅氏生有異徵天表魁偉舉止端凝康熙三十七年封貝勒四十八年封雍親王六十一年十一月聖祖在暢春園不豫命代祀圜丘甲午聖祖大漸召於齊宮宣詔嗣位聖祖崩辛丑上即位以明年為雍正元年命貝勒胤祀皇十三弟胤祥大學士馬齊尚書隆科多總理事務召撫遠大將軍胤禵來京命兵部尚書白潢協理大學士以楊宗仁為湖廣總督年希堯署廣東巡撫十二月戊午停止直省貢獻方物壬戌封貝勒胤祀為廉親王胤祥為怡親王胤祹為履郡王廢太子胤礽之子弘為理郡王更定歷代帝王廟祀典癸亥詔古今圖書集成一書尚未竣事宜速舉淵通之士編輯成書以輔國公延信為西安將軍署撫遠大將軍事甲子詔直省倉庫虧空限三年補足逾限治罪命富寧安為大學士隆科多為吏部尚書廉親王胤祀管理藩院尚書事壬申以張廷玉為禮部尚書豫大學士馬齊二等伯爵賜名敦惠雍正元年癸卯春正月辛巳朔頒詔訓飭督撫提鎮文吏至於守令武將至於參游凡十一道丙戌時享太廟辛卯祈穀於上帝壬寅頒賜提鎮副將大行遺念弓矢槖鞬刑部尚書陶賴張廷樞坐審訊陳夢雷一案釋其二子降官甲辰封淳郡王子弘曙為長子弘春為貝子乙巳大學士王掞乞休允之二月辛亥朔以佛格勵廷儀為刑部尚書壬子以張鵬翮為大學士乙卯以皇十六弟胤祿出嗣莊親王博果鐸襲其爵以博果鐸之姪球琳為貝勒庚申訓飭貝子胤禟乙丑封輔國公延信為貝子定部院書吏考滿回籍聽選例敕科道官每日一人具摺奏事辛未以宜兆熊為福州將軍趙之垣免以李維鈞為直隸巡撫己卯副將軍阿喇衲奏羅卜腦兒回人投順三月甲申罷西藏防兵戍察木多加隆科多馬齊年羹堯太保命督撫疏薦幕賓封年羹堯三等公壬辰命故安和親王嶽樂之孫吳爾占色亨圖經希及其子移居盛京除屬籍夏四月辛亥大行梓宮奉安饗殿命貝子胤禵留護丙辰命怡親王胤祥總理戶部封其子弘昌為貝子設鄉會試翻譯科乙丑復置起居注官封皇十七弟胤禮為果郡王丁卯初御乾清門聽政制詔訓飭大學士領侍衛內大臣文武大臣凡三道丙子晉封淳郡王胤祐為親王敕總兵官具摺言事五月庚辰詔免雲南入藏兵丁應補倒斃馬匹癸卯御太和殿視朝李維鈞請以州縣歲入彌補積虧上曰州縣官令少從容方可責之盡心興舉豈可勒為他人補虧缺耶乙酉敕理郡王弘移住鄭家莊丁酉命尚書徐元夢署大學士辛丑仁壽皇太后崩帝之生母也奉安梓宮於寧壽宮封貝子胤禵為恂郡王六月丁巳以左世永為漢軍都統己未加封孔子五世王爵辛酉命八旗無恆産者移居熱河墾田壬戌青海郡王額爾得尼為羅卜藏丹津所破率屬來投遣官撫之其姪噶爾丹達錫續來歸附命同居於蘇油壬申敕李維鈞畿甸之內旗民雜處旗人暴橫頗苦小民爾當整飭不必避忌旗漢形迹畏懼王公勳戚皆密奏以聞丙子敕八旗人員有為本旗都統本管王公刁難苛索者許其控訴秋七月己卯命侍郎常壽諭和羅卜藏丹津乙酉遣官赴盛京江西湖廣糶米運京己丑詔免江西漕糧腳耗運費誤追者壬辰改國語固山額真為固山昂邦伊都額真為伊都章京辛巳停本年秋決除紹興惰民丐籍頒行孝經衍義壬寅命隆科多王頊齡監修明史徐元夢張廷玉為總裁八月丁巳以楊琳為廣東總督孔育珣為廣西總督甲子召王大臣九卿面諭之曰建儲一事理宜夙定去年十一月之事倉卒之間一言而定聖祖神聖非朕所及今朕親寫密封緘置錦匣藏於正大光明匾額之後諸卿其識之庚午常壽疏報行抵青海諭和羅卜藏丹津不從詔年羹堯備兵辛未上謁陵九月丁丑朔葬聖祖仁皇帝於景陵孝恭皇后祔焉是日五色雲見己卯上還京辛巳以郝玉麟為雲南提督壬午以張廷玉為戶部尚書張伯行為禮部尚書癸巳以裕親王保泰管鑲黃旗事務命纂修律例丙申以阿喇衲為蒙古都統冬十月戊申敕授年羹堯撫遠大將軍改延信為平逆將軍癸亥羅卜藏丹津執我使臣常壽筆帖式多爾濟死之癸酉以阿爾松阿為禮部尚書尹泰為左都御史十一月丁丑賜于振等二百四十六人進士及第出身有差戊寅羅卜藏丹津入寇西寧守備馬有仁參將宋可進敗之於申中堡賊遁丙戌年羹堯奏總兵楊盡信進勦番賊於莊浪椅子山斬賊數百得旨嘉奬辛丑冬至祀天於圜丘奉聖祖仁皇帝配享十二月丙午朔以吳爾占等怨望不准承襲安郡王並撤所屬佐領辛酉年羹堯奏賊人來犯參將孫繼宗擊敗之安插洋人於澳門改天主堂為公所嚴禁入教丁卯冊嫡妃那拉氏為皇后封年氏為貴妃鈕祜祿氏為熹妃耿氏為裕嬪甲戌祫祭太廟是歲免直隸江南等省四十九州縣災賦有差朝鮮琉球入貢丁戶二千五百三十二萬六千二百七十又永不加賦後滋生人丁四十八萬五百五十七田賦徵銀三千二十二萬三千九百四十三兩有奇鹽課銀四百二十六萬一千九百三十三兩有奇鑄錢四十九萬九千二百有奇二年甲辰春正月辛巳祈穀於上帝奉聖祖仁皇帝配享詔大學士圖海配享太廟常壽自羅卜藏丹津處回命監禁西安丁亥命嶽鍾琪為奮威將軍專征青海丁酉以高其佩為漢軍都統庚子建孔子廟於歸化城二月丙午御製聖諭廣訓頒行天下戊午嶽鍾琪兵至青海擒阿爾布坦溫布等三虜收撫逃散部落詔以青海軍事將竣策旺阿拉布坦恭順罷阿爾泰及烏蘭古木兵辛酉詔臨雍大典改幸學為詣學癸亥上耕藉田三推畢復加一推甲子敕州縣舉老農豫頂戴年羹堯奏涼莊道蔣泂勦平阿岡部落加按察使銜丙寅高其倬奏中甸番夷就撫庚午上祈雨於黑龍潭三月乙亥朔上詣太學釋奠御彝倫堂講尚書大學廣太學鄉試中額丁丑祭歷代帝王廟庚辰上謁陵嶽鍾琪師抵賊巢羅卜藏丹津遁獲其母阿爾泰喀屯青海平封年羹堯一等公嶽鍾琪三等公發帑金二十萬犒軍乙酉清明節上詣景陵行敷土禮丁亥還宮夏四月丁未以孔育珣為兩廣總督李紱為廣西巡撫庚戌召王大臣訓飭廉親王胤祀令其改行並令王大臣察其善惡據實奏聞己巳敦郡王胤有罪削爵拘禁閏四月丁丑續修會典丙戌以嵇曾筠為河道副總督丁酉以蘇丹為蒙古都統癸未青海叛虜阿爾布坦溫布吹拉克諾木齊藏巴扎布械繫至京上御午門受俘五月癸卯朔夏至祭地於方澤奉聖祖仁皇帝配享貝勒阿布蘭復降為輔國公丙辰貝子蘇努坐廉親王黨削爵並其子俱發右衛辛酉詔川陝湖廣雲貴督撫提鎮朕聞各處土司鮮知法紀苛待屬人生殺任性方今海宇樂利而土民獨切向隅朕心不忍宜嚴飭土司勿得肆為殘暴以副朕子惠元元至意壬戌以那敏為滿洲都統戊辰貝子弘春削爵六月癸未敕八旗勿擅毆死家人乙酉以青海平定勒石太學戊戌上以闕里廟災致祭先師遣官監修降貝子胤祹為鎮國公李光復罷以李永紹為工部尚書秋七月丁巳御製朋黨論頒示諸臣壬戌以丁壽為阿爾泰駐防將軍癸亥副將軍阿喇衲卒於軍上念其久勞於外加豫世職八月甲戌命鄉會試回避士子一體考試別派大臣閲取壬午停本年秋決庚寅以田文鏡署河南巡撫九月辛丑朔以阿爾泰軍功豫丁壽世職停戶部捐納事例甲寅命山西丁銀攤入地糧徵收其後各省以漸行之冬十月乙亥賜陳德華等二百九十九人進士及第出身有差戊寅封明裔朱之璉為一等侯世奉明祀癸未詔京師建忠義祠乙未詔厄魯特郡王額駙阿寶賜往青海遊牧設寧夏駐防丙申刑部尚書阿爾松阿以無心效力奪職削爵發往盛京以其伯音德襲果毅公暹羅國貢稻種果樹設直隸布政司按察司以巡撫李維鈞為總督庚子以音德夸岱俱為領侍衛內大臣丁未以蘇丹為寧夏將軍十一月庚戌弘晟有罪削爵乙卯以綽奇為蒙古都統噶爾弼為漢軍都統丁巳高其倬奏官兵進勦仲苗平之辛酉定稱孝莊文皇后山陵為昭西陵十二月癸酉命太學立進士題名碑癸未廢太子胤礽薨封理親王諡曰密以綽奇為奉天將軍己丑裕親王保泰有罪削爵以其弟子廣寧襲封裕親王設湖南學政戊戌祫祭太廟是歲免江南浙江等省五十七州縣衛災賦有差朝鮮安南暹羅入貢三年乙巳春正月癸丑詔以固安官地二百頃為井田遣八旗間散受耕壬戌以蔡珽為左都御史癸亥以阿齊圖為步軍統領二月庚午日月合璧五星聯珠庚辰上以三年服闋行祫祭禮丁亥詔責年羹堯未能撫恤青海殘部倘有一二人逃入準噶爾者必重罪之乙未鄂倫岱坐廉親王黨奪職削爵發往盛京以其弟夸岱襲一等公丁酉召廷臣宣示胤禟罪狀並及胤祀胤胤禵三月丁未以馬會伯為貴州提督策旺阿拉布坦遣使入貢設安徽學政癸丑大學士張鵬翮卒禮部尚書張伯行卒丁巳蠲蘇松浮糧四十五萬兩滿保奏臺灣生番七十四社歸化辛酉年羹堯表賀日月合璧五星聯珠將朝乾夕惕寫作夕惕朝乾詔切責之曰年羹堯非粗心者是直不以朝乾夕惕許朕耳則年羹堯青海之功亦在朕許與不許之間未可知也顯係不敬其明白回奏乙丑總理王大臣怡親王胤祥豫一子郡王隆科多馬齊加豫世職廉親王胤祀不與並嚴詔訓責之夏四月己卯調年羹堯為杭州將軍以嶽鍾琪為川陝總督遣學士衆佛保副都統查史往準噶爾定界以董吉那為江寧將軍辛卯以田從典為大學士五月癸亥以左都御史尹泰為盛京禮部侍郎兼理奉天府尹六月癸酉詔年羹堯之子年富年興隆科多之子玉柱俱褫職乙亥命上三旗世職及登城巴圖魯之子二十以下十四以上揀選引見録用削年羹堯太保尋褫其一等公秋七月丁未削隆科多太保壬戌大學士白潢罷以高其位為大學士張廷玉署大學士命隆科多往阿蘭善山修城壬戌杭州將軍年羹堯黜為間散旗員癸亥貝子胤禟有罪削爵八月辛未李維鈞以黨年羹堯逮鞫以李紱為直隸總督壬辰上駐圓明園加怡親王胤祥俸果郡王胤禮護衛九月甲寅以朱軾為大學士改蔡珽為吏部尚書仍管兵部都察院事丙辰逮繫年羹堯下刑部冬十月戊辰命巡撫不與總督同城者參劾屬員自行審結丙子封恆親王胤祺子弘晊輔國公庚寅以楊名時為雲貴總督管巡撫事鄂爾泰為雲南巡撫管總督事十一月庚子上謁陵戊申還宮癸亥以噶爾弼為奉天將軍十二月丁卯降郡王胤禵為貝子甲戌廷臣議上年羹堯罪九十二發得旨年羹堯賜死其子年富立斬餘子充軍免其父兄緣坐辛巳汪景祺以謗訕處斬癸未以覺羅巴延德為天津水師營都統壬辰祫祭太廟是歲免直隸江蘇河南浙江廣東等省二十七州縣災賦有差朝鮮琉球西洋國入貢四年丙午春正月甲午上御太和殿受朝賀朝正外藩依先朝例賚豫銀幣丁酉宣詔罪狀皇九弟胤禟戊戌集廷臣宣詔罪狀皇八弟胤祀易親王為民王褫黃帶絶屬籍革其婦烏雅氏福晉逐回母家復革民王拘禁宗人府敕令易名名曰阿其那名其子弘旺曰菩薩保甲寅削隆科多職仍令赴鄂羅斯議界乙卯贈故尚書顧八代太傅諡文端上之授讀師也二月甲子以孫柱為吏部尚書兼管兵部以法海為兵部尚書福敏為左都御史貝子魯賓鎮國公永謙俱以議胤祀獄依違削爵尋起魯賓為輔國公大學士朱軾有母喪賜白金四千庀葬事乙酉簡親王雅爾江阿削爵以其弟神保住襲封庚寅以張廷玉為大學士蔣廷錫為戶部尚書以申穆德為右衛將軍三月丁丑命丁壽屯兵特斯備策旺阿拉布坦壬戌侍講錢名世投詩年羹堯事發革去職銜上親書名教罪人四字懸其門並令文臣作為文詩刺惡之夏四月己卯以范時繹為兩江總督五月癸巳禁錮皇十四弟胤禵及其子白起於壽皇殿側以子白敦為鎮國公誅鄂倫岱阿爾松阿於戍所乙巳改胤禟名為塞思黑拘於保定己酉命順承郡王錫保食親王俸封皇十五弟胤為貝勒皇二十弟胤禕為貝子六月癸亥以輔國公巴賽為振武將軍備邊乙丑以查弼納為兵部尚書秋七月癸巳釋回軍前御史陶彝等十三人辛亥命蔡珽專管都統以查弼納楊名時為吏部尚書平郡王納爾素有罪削爵以其子福彭襲封八月丙寅停本年秋決丁亥李紱奏塞思黑卒於保定九月壬辰以宜兆熊為湖廣總督尋命福敏代之以蔡良為福州將軍貝子滿都護降為輔國公撤出佐領丁酉輔國公阿布蘭以違例謝恩削爵撤出佐領戊戌重九節上御乾清宮賜宴廷臣賦柏梁體詩己亥錫保奏阿其那卒於禁所癸丑起復大學士朱軾在內閣行走乙卯侍郎查嗣庭以謗訕下獄冬十月甲子設浙江觀風整俗使命鄉試五經取中之副榜及兩次取中副榜准作舉人戊辰詔廷臣皇考臨御六十餘年躬節行儉宮廷地毯用至三四十年猶然整潔服御之物一惟質朴絶少珍奇昨檢點舊器及取回避暑山莊陳設思慕盛德實無終已用特書此以詔我子孫辛巳裕親王廣寧削爵永錮宗人府甲申以普雄苗地界連川滇命川陝總督移駐成都以鄂爾泰為雲貴總督憲德為湖北巡撫丙戌琉球國謝賜匾額貢方物十一月己亥大學士高其位罷壬子富寧安久戍功封一等侯乙卯詔浙江士習敝壞工為懷挾停其鄉會試十二月庚申王大臣請將阿其那塞思黑妻子正法諭曰阿其那塞思黑雖大逆不道而反叛事蹟未彰免其緣坐塞思黑之妻逐回母家禁錮其餘眷屬交內務府養贍辛酉命河南陝西四川均攤丁銀入地併徵乙丑御史謝濟世疏劾田文鏡十罪詔褫職遣戍壬申鄂爾泰奏勦辦仲苗就撫者二十一寨查出熟地荒地三萬餘畝壬午以李紱為工部右侍郎以宜兆熊為直隸總督劉師恕協辦以毛文銓為京口將軍丙戌祫祭太廟是歲免直隸山東安徽江西湖廣等省六十三州縣衛災賦有差朝鮮琉球蘇祿入貢五年丁未春正月戊子朔時享太廟壬寅赦年羹堯之子之戍邊者甲辰王大臣奏黃河清請朝賀上不許加文武官一級敕八旗交納銅器三年限滿隱匿者罪之乙巳以孫柱署大學士丙辰以沈近思為左都御史兼吏部侍郎二月丁卯上謁陵甲辰廣州駐防兵丁滋事將軍李杕以徇庇論死甲戌上還京甲申上御經筵丙戌命李紱往廣西擒捕逸犯羅文綱文綱自投來歸三月庚寅敕本年會試於三月舉行給與薑湯木炭以廣祿襲裕親王戊戌上宣示蔡珽罪狀下刑部拘訊辛丑開閩省洋禁丙午鄂羅斯察汗遣使臣薩瓦表賀登極進貢方物賞賚如例內大臣馬武卒大學士高其位卒閏三月乙丑揀選下第舉人分發直省以州縣用戊辰以宜兆熊為吏部尚書邁柱為湖廣總督癸酉烏蒙鎮雄兩土府改設流官己卯以覺羅伊禮布為奉天將軍常壽為江寧將軍丙戌弘升有罪削爵夏四月戊子吐魯番回酋請進貢不許為已撤兵又以其地許策旺阿拉布坦也以福敏為吏部尚書黃國材署兵部尚書辛卯賜彭啓豐等二百二十六人進士及第出身有差癸巳命州縣會學官舉優行生乙巳設宗室御史二員五月戊午以拉錫為滿洲都統查嗣庭死於獄戮其尸乙亥烏蒙鎮雄功豫鄂爾泰世職六月庚子移盛京副都統一員駐錦州設熊嶽副都統封誠親王胤祉子弘景為鎮國公隆科多以罪削爵以其弟慶復襲一等公秋七月乙卯以富寧安為漢軍都統己未李永紹罷以黃國材為工部尚書加田文鏡尚書為河南總督己巳以夸岱為工部尚書丙子晉封輔國公弘晊鄂齊熙良為鎮國公已革貝勒蘇努涂抹聖祖硃諭經王大臣刑部參奏得旨蘇努怙惡不悛竟令其子蘇爾金庫爾陳烏爾陳信從西洋之教諭令悛改伊竟抗稱願甘正法不能改教今又查出昔年聖祖硃批奏摺敢於狂書涂抹見者髮指即應照大逆律概行正法但伊子孫多至四十人悉行正法則有所不忍倘分別去留又何從分別暫免其死仍照前禁錮八月己丑上御經筵庚寅賴都罷以常壽為禮部尚書癸卯追封故平南大將軍賴塔為一等公其孫博爾屯襲乙巳喀爾喀郡王額駙策淩與鄂羅斯使臣薩瓦定界以恰克圖為貿易之所理藩院派員管理九月丙寅定官員頂戴之制以孫柱為大學士查弼納為兵部尚書己巳鄂爾泰奏花苗內附勦辦蒗蕖平之威遠倮苗內附戊寅刑部議上蔡珽獄大罪十八應立斬妻子入辛者庫得旨改監候冬十月乙酉命科道及吏部司官不必專用科目丁亥王大臣會審隆科多獄上大罪五十應斬立決妻子入辛者庫財産入官得旨隆科多著禁錮以博爾屯為蒙古都統十一月癸丑命查郎阿邁祿備邊丁巳加浙江巡撫李衛為總督丁卯復鰲拜一等公令其孫達福襲敕修執中成憲戊辰鄂爾泰奏貴州長寨後路克猛等一百八十四寨生苗內附乙亥守護景陵大學士蕭永藻坐失察公銜廣善越分請安褫職仍依前守陵庚辰遣官清丈四川地畝順承郡王錫保以徇庇延信奪親王俸仍停郡王俸三年十二月壬午朔以那蘇圖為黑龍江將軍乙酉命直省學政每六年拔取生員一次王大臣審擬貝勒延信大罪二十應斬決得旨延信免死與隆科多一處監禁辛丑范時繹奏太倉州屬之七浦士民願自行修濬上不許曰民間之生計即國計也國用不敷之時不得不藉資民力方今國用充裕仍發帑銀給之戊戌左都御史沈近思卒壬寅以唐執玉為左都御史庚戌祫祭太廟是歲免直隸江蘇江西浙江福建湖廣廣東等省三十四州縣災賦有差朝鮮鄂羅斯入貢六年戊申春正月己未高其倬疏陳閩省械鬬情形得旨此等處須鼓舞屬員實心盡力方能有濟設遇一二有為者甫欲整理輒目為多事屬員窺見其隱誰肯任怨向前須知其難而終任之二三年後始有成效也乙丑晉封貝勒球琳為惠郡王鎮國公弘春為貝子己卯命杭奕祿任蘭枝使安南二月丙戌晉封果郡王胤禮為親王癸巳上御經筵庚子以來文為江寧將軍壬寅賜歸流永順土司彭肇槐世職並白金萬兩庚戌以嵇曾筠為兵部尚書仍辦河工三月丁巳大學士田從典罷以蔣廷錫為大學士庚午以進藏官兵駐劄西寧命巡撫杭奕祿督之夏四月甲申以陳泰為滿洲都統豫告大學士田從典卒癸卯以查郎阿稽曾筠為吏部尚書壬寅詔地方官私徵耗羡難以裁革惟在督撫審慎用之不可以歸公若歸公則地方官又重復取民矣五月癸丑以郭鉷為廣西巡撫鄂爾泰奏勦辦東川逆苗祿天祐祿世豪平之壬戌詔八法內年老一條義有未盡凡年老而能辦事者勿入八法丁卯削富寧安侯爵仍為大學士命馬爾賽在大學士內辦事乙亥以田文鏡為河東總督兼轄山東以耿化祚為漢軍都統六月庚辰詔六部員外郎主事作為公缺勿庸按旗升轉癸未置先賢仲弓後裔五經博士丙戌以蔡良為廣州將軍石禮哈為福州將軍尹繼善協辦江南河工癸巳以張廣泗為貴州巡撫嶽濬署山東巡撫己亥誠親王胤祉有罪降郡王拘其子弘晟於宗人府封理密親王子弘曣為輔國公秋七月辛亥命李衛兼理江蘇緝捕戊午鄂爾泰奏遣兵勦平川境米貼逆苗命以其事屬四川提督黃廷桂辛酉嶽鍾琪奏頗羅鼐兵至西藏喇嘛擒獻阿爾布巴隆布奈扎爾鼐等西藏平戊辰以紀成斌為固原提督壬申大學士富寧安卒賜故大學士寧完我三世孫寧蘭驍騎校房一所銀五百四世孫寧邦璽拜唐阿八月甲申上御經筵以尹繼善署江蘇巡撫乙酉改湖廣桑植保靖二土司為流官以馬爾賽為大學士甲午以祖秉衡為京口將軍丁未詔復浙江鄉會試九月癸丑命八旗勳舊子孫有犯法虧帑者察實以聞漢員中陳亡盡節及居官清正之子孫同此察報天津水師營都統公鄂齊以失察兵丁傷官削爵降三等侍衛丁卯查郎阿奏領兵至藏會同副都統馬喇學士僧格訊明逆首阿爾布巴等立時正法餘衆處置訖冬十月丁亥以鄂爾泰勦平廣西八達寨逆苗兼督雲貴廣西三省發帑銀十萬犒滇黔兵辛卯發內帑九十四萬代西征軍士賠償追款以石文焯為禮部尚書路振揚為兵部尚書乙未嶽鍾琪奏建昌喇汝窩番賊作亂討平之詔湖廣土司甚多供職輸將與流官無異該督撫勿得輕議改流以蔡仕舢為浙江觀風整俗使癸巳諭停諸王管理旗務十一月丙辰設咸安宮官學包衣子弟肄業庚申停本年決囚戊辰江西巡撫布蘭泰以不職免添設欽天監西洋人監副一十二月甲午免四川崇慶州七年額賦丙申大清律集解附例成丁酉以定藏功封頗羅鼐為貝子理後藏事揀選噶隆二人理前藏事賞其兵丁銀三萬兩庚子命侍郎王璣彭維新往江南清查逋賦甲辰祫祭太廟是歲免直隸江南陝西四川等省二十六州縣災賦有差朝鮮入貢七年己酉春正月辛亥鄂爾泰奏萬壽節日雲南慶雲見命宣付史館丁巳命陳元龍尹泰為大學士壬申復蒙古恩格德爾侯爵為三等公以其曾孫噶爾薩襲蒙古二等伯明安晉封一等侯令其孫馬蘭泰襲都統伯四格有罪監禁上念其祖莽固爾岱之功釋之癸酉命侍郎法保等察修直隸至江南大道二月丁丑命出征官兵行糧外仍給坐糧以尹繼善為河道總督戊寅以多索禮為奉天將軍甲申上謁陵庚寅還京設直隸巡農御史己亥命怡親王等查八旗世職有以絶嗣除爵者許以族人紹封乙未上御經筵以李杕為漢軍都統蠲浙江本年額賦六十萬兩三月乙巳朔以孔育珂為江南河道總督郝玉麟為廣東總督嶽鍾琪奏勦平雷波叛苗一百餘寨戊申鄂爾泰奏勦平丹江九股等處生苗蠲河南本年額賦四十萬兩辛亥以嵇曾筠為河南山東總督丙申上以準噶爾噶爾丹策零稔惡藏奸終為邊患命傅爾丹為靖邊大將軍北路出師嶽鍾琪為寧遠大將軍西路出師征討準噶爾甲子以鄂善莽鵠立俱為蒙古都統辛酉詔公巴賽為副將軍順承郡王錫保為振武將軍陳泰袞泰石禮哈岱豪達福海蘭為參贊旗兵六千三省兵八千蒙古兵八百歸北路駐扎阿爾泰總兵官魏麟閃文繡領車騎營兵八千赴西路布爾庫夏四月甲午以查郎阿署川陝總督史貽直署福建總督敕建雲雨風雷壇廟四川天全土司改流設州高其倬劾海澄公黃應纘行賄承襲應革職銜詔寬免之五月戊午湖南保靖桑植永順三土司改流設府縣甲子令漕船順帶商貨於舊例六十石外許至百石乙丑先是嶽鍾琪疏言有湖南人張熙投遞逆書訊由其師曾靜所使命提曾靜張熙至京九卿會訊曾靜供因讀已故呂留良所著書陷溺狂悖至是明詔斥責呂留良並令中外臣工議罪六月己卯以唐執玉署直隸總督乙酉以甘肅四川雲南貴州廣西轉輸勞費免庚戌全年額賦陝西免十分之三秋七月丙午貴州都勻生苗及儂仲生苗內附甲寅以果親王胤禮管工部莊親王胤祿管滿洲都統己巳減暹羅國貢賦閏七月乙酉以阿里袞為杭州將軍八月癸卯以王釴為京口將軍己酉上御經筵九月戊子改廣西鎮安為流冬十月庚戌賜漢大臣子蔣溥等十三人舉人甲子詔曰江南清查逋賦一案歷降諭旨甚明重在分別官侵民缺乃派往之員辦理不善有以紳襟帶徵之項指為官侵者有吏書侵蝕之項議令富戶攤賠者又有將帶徵錢糧加增火耗者甚且以停徵之項概令徵收者惠民之政轉而擾民豈非司其事者之咎乎其恪遵前旨妥辦倘再犯諸弊從重治罪戊辰以內外諸臣勤慎奉職加怡親王儀仗一倍張廷玉少保蔣廷錫太子太傅勵廷儀太子少