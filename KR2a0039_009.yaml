為左都御史十二月庚寅朔日有食之己酉聖祖實録聖訓告成甲寅以馬士傑署廣州將軍準泰署福州將軍丁巳祫祭太廟是歲免直隸江南河南福建陝西湖南廣西甘肅等省九十三州縣衛災賦有差朝鮮琉球入貢十年壬寅春正月癸亥孟春享太廟皇四子弘曆行禮壬午命鄂爾泰為大學士甲申以軍前統領達爾濟為建勳將軍駐兵白格爾二月以王朝恩為直隸河道總督魏廷珍為漕運總督己亥封鄂爾泰一等伯世襲庚子嶽鍾琪奏準噶爾犯哈密遣總兵曹勷往援敗之賊由無克克嶺遁副將軍石雲倬坐不遮擊逮問癸丑以張廣泗為西路副將軍劉世明參軍事三月丁丑大學士等疏劾嶽鍾琪奏報不實情詞互異下部嚴議夏四月辛卯置貴州古州鎮清江鎮總兵各一員乙巳以海壽為戶部尚書性桂為刑部尚書降三等公嶽鍾琪為三等侯仍護大將軍丙午以張大有為禮部尚書范時繹為工部尚書乙卯詔修雲南嵩明州尋甸州水利五月戊辰以武格為揚武將軍劉世明副之閏五月甲辰恆親王胤祺薨諡曰溫子弘晊襲恆親王原誠親王胤祉卒於景山禁所賜銀五千兩照郡王例殯葬吏部尚書勵廷儀卒庚戌臺灣北路西番滋事官兵討平之癸丑以李衛署刑部尚書六月丙辰以莽鵠立為漢軍都統壬申高其倬奏雲南思茅土夷勾結元江夷人寇普洱郡城遣總兵董芳率兵勦之辛巳辦理軍機大臣議奏恤贈戰歿喀爾喀台吉策勒克輔國公其子密什克襲軍機大臣之設始於此秋七月丙戌馬喇免以武格為工部尚書丁亥山東巨野牛産瑞麟己丑賜顧八代子孫銀一萬兩丁酉命鄂爾泰經略軍務召嶽鍾琪來京以劉於義為陝西總督李衛為直隸總督辛丑準噶爾入犯烏孫珠爾傅爾丹迎擊失利下大將軍錫保核敗狀以聞乙巳大學士蔣廷錫卒己酉以福敏協理大學士唐執玉兼理刑部尚書八月丙辰復恭親王之子海善貝勒原銜庚午西藏邊外巴爾布國雅木布葉楞庫庫穆三汗遣使進貢優敕答之壬申北路副將軍親王丹津多爾濟額駙親王策淩奏追擊準夷至額爾得尼招殺賊萬餘賊向推河遁去甲申撥帑銀二百萬兩解赴北路軍前備賞九月乙酉朔論擊準夷功加丹津多爾濟智勇名號加策淩超勇名號封其子車布登扎布為輔國公餘升授有差以馬爾賽縱賊失機褫爵職處斬己酉削傅爾丹爵職冬十月壬戌停本年決囚削嶽鍾琪爵職逮京交兵部拘禁十一月丙戌以常德為靖邊左副將軍乙未封吐魯番額敏和卓為輔國公賜七世同居湖南沅江縣生員譙襟御書匾額十二月乙卯賜恤北路陳亡諸臣查弼納馬爾薩海蘭達福等有差侍郎孫嘉淦有罪論死命在銀庫處行走乙丑治呂留良罪與呂葆中嚴鴻逵俱戮尸斬呂毅中沈在寬其孫發邊遠為奴朱羽采等釋放丙寅武格以造言撤兵逮問辛巳祫祭太廟是歲免直隸江南山東湖南等省七十五州縣災賦有差丁戶二千五百四十一萬二千二百八十九永不加賦後滋生人丁九十三萬六千四百八十六田地八十九萬四百十六頃四十畝徵銀二千九百八十七萬二千三百三十二兩六錢茶三十四萬二千三百五十一引鹽課銀三百九十八萬八千八百五十一兩鑄錢六萬八千四百三十六萬二千有奇朝鮮巴爾布國入貢十一年癸丑春正月戊子命海望李衛察勘浙江海塘修范公隄壬辰頒直省書院膏火銀各千兩以高其倬為兩江總督尹繼善為雲貴總督庚子命鄂爾泰巡閲北路軍務丁未上謁陵二月壬子上見沿道安設水缸蓄水灑道上諭之曰蹕路所經雖有微塵何礙地方官當以牧養生民為重若移奉上之心以撫百姓豈不善乎癸丑上還京丙辰以保明查爾泰伊勒慎俱為滿洲都統己未上御經筵封皇二十四弟胤祕為諴親王皇四子弘曆為寶親王皇五子弘晝為和親王貝勒弘春晉封泰郡王壬戌命彭維新協辦內閣以吳士玉為禮部尚書涂天相為左都御史夏四月壬子特賜任啓運翰林在阿哥書房行走癸丑賜陳倓等三百二十八人進士及第出身有差乙卯以嵇曾筠為大學士仍管河督以劉於義為吏部尚書涂天相為刑部尚書張照為左都御史己未徵舉博學鴻詞五月甲申高其倬奏普思苗人刁興國叛討平之命編修張若靄庶吉士鄂容安鄂倫俱在辦理軍機處行走乙未命額駙策凌為靖邊左副將軍常德副之塔爾岱為靖邊右副將軍永福副之同戍科布多續修會典成壬寅黑龍江將軍杜賚奏海島特門奇圖山等處綽敏六姓內附歲貢貂皮己酉誅前提督紀成斌六月戊午蘇祿國王臣毋漢未毋拉律林奏伊遠祖東王於明永樂年間來朝歸至山東德州病歿長子歸國嗣王次子安都祿三子溫哈喇留守墳墓其子孫分為安溫二姓歲領額設祭祀銀八兩請以其後裔為奉祀生從之戊寅哈元生奏討平九股逆苗秋七月乙酉大學士陳元龍以年逾八旬乞休加太子太傅致仕李徽以越職言事褫職裁湖南觀風整俗使戊子順承親王錫保削爵子熙良仍襲郡王以平郡王福彭為定邊大將軍降親王丹津多爾濟為郡王撤去勇號八月丁卯以顧琮為直隸河道總督趙弘恩為兩江總督高其倬為江蘇巡撫己巳置順天府四路捕盜同知九月辛丑鄂爾奇革職查訊以慶復為戶部尚書鄂長署步軍統領冬十月辛酉以扣婁為蒙古都統忠達公馬禮善為刑部尚書十一月甲辰命果毅公訥親在辦理軍機處行走十二月戊午詔曰前鄂彌達條奏臺灣建城郝玉麟奏稱臺灣茨竹栽植可以成城臺灣變亂率自內生賊匪無城可踞乃易蕩平惟鹿耳門為臺郡門戶於此建築炮臺足資備禦栽植茨竹相為藩籬其淡水等處炮臺並應建造以時增修己未以史貽直為戶部尚書張照為刑部尚書徐本為左都御史壬戌以高斌為江南河道總督丙子祫祭太廟是歲免直隸江蘇安徽江西山東等省二十九州縣衛災賦又免江蘇鹽場二十五引鹽課各有差朝鮮安南蘇祿入貢十二年甲寅春正月辛丑平郡王福彭進馬五百匹解軍備用壬寅侍郎查克旦辦理車臣汗部落諸務得宜加尚書銜賜銀五千兩入官房地人口給還二月癸丑上御經筵己未晉封貝子胤祜為貝勒乙丑命侍讀春山給事中李學裕冊封安南國王壬申命額駙策淩總理前敵軍務癸酉元展成奏坡東坡西苗寨一百六十內附旌廣東興寧縣老民幸登運年一百二歲其子五人各七八十歲一門眉壽加賜上用緞一匹三月丁丑工部尚書范時繹免戊戌河南學政俞鴻圖以婪贓處斬其父侍郎俞兆晟褫職尹繼善奏勦平普思叛苗招撫投誠人衆得旨凡事懈於垂成忽於既定勉之夏四月丁未湖廣容美土司田民如有罪革退改土歸流康親王崇安薨以伊叔巴爾圖襲爵封其子永恩為貝勒庚午禁廣東象牙席並禁民間購用五月己卯施南宣撫司改設流官癸巳以李禧為漢軍都統乙未以準噶爾使來停止進兵己亥命內務府總管來保前赴車臣汗部協同查克旦辦事六月丁未湖廣忠峝等十五土司改設流官秋七月癸巳命果親王胤禮經理達賴喇嘛駐藏並至直隸山西陝西四川閲兵詔西北二路用兵年久或乘此兵力直進賊境或遣使往彼諭以利害廷臣集議以聞康親王巴爾圖等一議進兵大學士張廷玉等一議遣使上乃宣示用兵始末從後議遣使八月丙午遣傅鼐阿克敦往準噶爾宣諭壬戌降貝子胤禕為公泰郡王弘春降為貝子九月甲申命侍郎呂耀曾卿德福往貴州宣諭苗蠻命雲南開爐鼓鑄冬十月丙午果親王胤禮疏言臣工條奏宜據實敷陳不當托拾塞責得旨所言甚是曉諭輪班條奏官知之丁未以鄂彌達署天津都統阿里袞為青州將軍傅森為杭州將軍戊午以郝玉麟為浙閩總督以三泰徐本俱協辦內閣事己巳景陵瑞芝生十一月壬申朔前直郡王胤禔卒命照貝子治喪封其子弘昉為鎮國公丙寅敕續修皇清文穎壬午特詔福建漳泉二府化其強悍勿再聚族械鬬戊子封理密親王子弘為輔國公十二月癸丑朔敕廣西仍歸廣東總督兼轄丁巳以魏廷珍為兵部尚書顧琮為漕運總督朱藻為直隸河道總督白鍾山為河東河道總督高斌為江南河道總督庚午祫祭太廟是歲免直隸安徽等省十四州縣災賦又直隸鹽場十四引鹽課各有差朝鮮琉球入貢十三年乙卯春正月己丑以覺羅柏修為盛京將軍那蘇圖為黑龍江將軍赫星為寧夏將軍二月己酉上御經筵庚戌以魏廷珍為禮部尚書癸丑上謁陵己未還京甲子以巴泰協辦大學士三月丁巳上親耕藉田戊子詔曰地方編立保甲必須俯順輿情徐為勸導若過於嚴急則善良受纍矣為政以得人為要不得其人雖良法美意徒美觀聽於民無濟也夏四月乙巳聖祖文集刊成頒賜廷臣丁巳停止廣東開採閏四月丁酉準噶爾遣使臣納木喀賫表進貢敕令定界己亥建先蠶壇於北郊五月戊申給三姓八旗兵丁餉銀丁巳以貴州古州台拱逆苗滋事命哈元生為揚威將軍統領四省官兵討之甲子命果親王皇四子皇五子大學士鄂爾泰張廷玉等辦苗疆事務工部尚書巴泰褫職命刑部尚書張照副都御史德希壽稽勘苗疆事務丁卯哈元生奏勦辦逆苗黃平施秉悉平六月乙亥敕戶部清查各省耗羡癸未以查克旦為工部尚書甲申准土司由生員出身者一體應試辛卯減各省進獻方物呂宋國饑請糴許之丙申命董芳為副將軍協勦苗匪秋七月乙卯鄂爾泰請辭伯爵大學士許之給假養病仍食俸署甘州提督劉世明以失察兵丁搶劫論斬丙辰命朱軾往勘浙江海塘辛酉以邁柱查郎阿為大學士張廣泗為湖廣總督八月己巳詔曰從前經理苗疆本為乂安民生乃經理不善以致逆苗肆出勾結熟苗搶劫居民是以安民之心成虐民之政返之初心能勿愧乎所有貴州本年錢糧通行蠲免其被賊州縣蠲免三年以示撫綏救恤之意丁亥上不豫戊子上大漸宣旨傳位皇四子寶親王弘曆己丑上崩年五十八是歲十一月丁未恭上尊諡曰敬天昌運建中表正文武英明寬仁信毅睿聖大孝至誠憲皇帝廟號世宗乾隆二年三月葬泰陵論曰聖祖政尚寬仁世宗以嚴明繼之論者比於漢之文景獨孔懷之誼疑於未篤然淮南暴伉有自取之咎不盡出於文帝之寡恩也帝研求治道尤患下吏之疲困有近臣言州縣所入多宜釐剔斥之曰爾未為州縣惡知州縣之難至哉言乎可謂知政要矣
