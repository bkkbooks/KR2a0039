下部嚴議德正褫職鞫治丁卯以星變示警詔修省九年春正月辛巳以徐本病命史貽直為大學士以劉於義為吏部尚書協辦大學士張楷為戶部尚書陳德華罷以王安國為兵部尚書壬午幸瀛臺御大幄次賜準噶爾使圖爾都宴命立首班大臣末以噶爾丹策零恭順圖爾都誠敬可嘉召圖爾都近前賜飲三爵錫賚有加訓飭各省州縣教養兼施丁亥賑直隸天津等十一州縣災庚子王安國憂免以彭維新為兵部尚書以許容署湖北巡撫授史貽直文淵閣大學士朝鮮入貢給訥親欽差大臣關防癸卯上奉皇太后詣泰陵丙午上詣泰陵是日奉皇太后回蹕二月上奉皇太后幸南苑丙辰以給事中陳大玠等奏寢許容署湖北巡撫之命留晏斯盛任仍申誡言官扶同糾論免安徽桐城等九州縣上年水災額賦免福建臺灣等三縣旱災額賦並賑之甲子陳德華降調丁卯賑雲南霑益二州縣水災丁丑戶部尚書張楷卒以阿爾賽代之鄂彌達為湖廣總督三月癸未以汪由敦為工部尚書丁亥免江蘇沛縣河南中牟等六縣旱災額賦丁酉調博第為西安將軍以巴靈阿為寧古塔將軍乙巳賑山東德州等五州縣衛旱災以訥親奏查閲河南江南營伍廢弛上曰可見外省大吏無一不欺朕者不可不懲一警百四月戊申朔始建先蠶壇成乙卯上詣圜丘行大雩禮特詔貶損儀節以示虔禱以旱命省刑寬禁辛未賑山東德平等八州縣旱災己卯諭曰一春以來雨澤稀少皇太后以天時久旱憂形於色今日從寢宮步行至園內龍神廟虔禱朕惶恐戰栗即刻前往請安諄懇謝罪特諭內外臣工知之戊子祭地於方澤不乘輦不設鹵簿庚寅雨壬寅大學士九卿議覆御史柴潮生請修直隸水利命協辦大學士劉於義往保定會同高斌籌畫六月己酉大學士徐本以病乞休允之癸丑賑山東歷城等三十二州縣旱災蘭山等六州縣雹災秋七月丙子朔諭直隸災重之天津等十六州縣本年停征新舊錢糧丙戌免江蘇安徽雍正十三年逋賦壬辰額爾圖以不職免以達勒黨阿為奉天將軍八月己酉撫恤安徽歙縣等二十州縣水災戊申免江蘇淮安安徽鳳陽二府雍正十三年逋賦癸丑賑四川成都等州縣水災乙丑豫告大學士徐本回籍上賜詩寵行賞賚有加並諭行幸南苑之日親臨慰問丙寅免直隸天津等三十一州縣上年逋賦己巳上奉皇太后幸南苑上行圍九月己亥朔以翰林院編修黃體明進呈講章牽及搜檢太嚴隱含諷刺下部嚴議褫職乙未免山西清水河本年雹災額賦癸卯賑山東博興等縣旱災丁未改明年會試於三月舉行己酉以陳世倌假滿命入閣辦事賑山西文水等縣水災庚戌以四川學政蔣蔚實心教士命留任乙卯上奉皇太后幸湯山江南河南山東蝗癸亥上幸盤山丁卯上奉皇太后還宮庚午重修翰林院工竣上幸翰林院賜宴分韻賦詩復御製柏梁體詩首句羣臣以次賡續賜掌院大學士鄂爾泰張廷玉御書扁額及翰林詹事諸臣書幣有差是日幸貢院賜御書聯額復幸紫微殿觀象臺賑直隸保定等十八州縣水蟲雹等災賑江蘇靖江等十二州縣衛潮災安徽歙縣二十一州縣衛水災庚辰起孫嘉淦為宗人府府丞辛巳除直隸涿州等三州縣水衝地賦丙戌山東登州鎮總兵馬世龍以科派兵丁鞫實論絞賑甘肅河州等三十五州縣衛雹水各災辛卯以江西學政金德瑛取士公明命留任己亥以貴州學政佟保守潔士服命留任丙午鄂爾泰議覆劉於義奏勘直隸水利命撥銀五十萬兩興修丁未免浙江仁和等三十一州縣所旱災額賦並賑之辛亥賑成都等三十州縣水災壬子允準噶爾貢使哈柳等隨帶牛羊等物在肅州貿易甲子免山東歷城等三十二州縣衛本年旱雹等災額賦乙丑免直隸保定等十一州縣廳本年水旱蟲雹災額賦丙寅賞雷鋐額外諭德食俸戊辰張照丁憂調汪由敦為刑部尚書以趙弘恩為工部尚書免安徽歙縣等二十一州縣衛水災額賦辛未以福建閩縣等縣火災諭責疆吏不嚴火備羅卜藏丹怎就獲十年春正月丙子召大學士內廷翰林於重華宮聯句改會試於三月著為令乙未大學士鄂爾泰以病乞解任溫諭慰留己亥準噶爾遣使哈柳貢方物庚子召高斌來京以劉於義署直隸總督己酉賑浙江淳安等四縣上年水災朝鮮入貢辛亥上幸內右門直廬視鄂爾泰疾己未上謁昭西陵孝陵孝東陵景陵庚申免廣東海陽等二縣上年水災額賦甲子免江蘇丹徒等十州縣衛上年水災額賦丁卯上還京師己巳免山東博興等二縣乾隆九年旱災額賦庚午高斌回直隸總督三月癸酉朔日食乙亥改殿試於四月著為令賑雲南白鹽井水災庚辰上幸鄂爾泰第視疾辛巳加鄂爾泰太傅己丑協辦大學士禮部尚書三泰乞休允之庚寅命訥親協辦大學士調來保為禮部尚書以盛安為刑部尚書癸巳免浙江仁和等三十州縣上年旱災額賦甲午以安南莫康武作亂攻陷太原高平等處命那蘇圖等嚴防邊隘乙未加史貽直陳世倌來保高斌太子太保劉於義張允隨張廣泗太子少保夏四月癸卯朔發江南帑銀五十六萬兩濬河道己巳免山東海豐等二縣被旱額徵竈課乙卯大學士鄂爾泰卒上臨奠輟朝二日命遵世宗遺詔配饗太廟召那蘇圖來京以策楞為兩廣總督調準泰為廣東巡撫以魏定國為安徽巡撫庚申召蔣溥來京以楊錫紱為湖南巡撫壬戌飭沿海各省訓練水師癸亥以旱命刑部清理庶獄戊辰策試貢士詔能深悉時政直言極諫者聽己巳慶復紀山奏進勦瞻對番五月壬申朔賜錢維城等三百三十三人進士及第出身有差丁亥除江蘇蘇州等九府坍沒蘆課頒御製太學訓飭士子文於各省學宮同世祖臥碑文聖祖聖諭廣訓世宗朋黨論朔望宣講命訥親為保和殿大學士辛卯戶部尚書阿爾賽為家奴所害磔家奴於市以高斌為吏部尚書那蘇圖為直隸總督命高斌劉於義仍辦直隸水利河道以梁詩正為戶部尚書己亥命劉於義兼管戶部事務六月丁未普免全國錢糧諭曰朕臨御天下十年於茲撫育蒸黎躬行儉約薄賦輕徭孜孜保治不敢稍有暇逸今寰宇敉寧左藏有餘持盈保泰莫先足民天下之財止有此數不聚于上即散于下我皇祖在位六十一年蠲租賜復之詔史不絶書普免天下錢糧一次我皇考無日不下減賦寬徵之令如甘肅一省正賦全行豁免者十有餘年朕以繼志述事之心際重熙纍洽之後欲使海澨山陬俱沾大澤為是特頒諭旨丙寅年直省應徵錢糧其通蠲之庚戌免安徽鳳陽等州府連年被災地方耗羡命戶部侍郎傅恆在軍機處行走辛酉御史赫泰請收回普免錢糧成命上斥其悖謬褫職癸亥上詣黑龍潭祈雨秋七月辛未朔免甘肅寧夏等三縣逋賦癸酉以順直宛平等六十四廳州縣缺雨命停征錢糧乙酉命高斌仍兼直隸河道總督戊子賑安徽壽州等十八州縣衛水災雹災壬辰上奉皇太后幸多倫諾爾免經過州縣額賦十分之四戊戌上奉皇太后駐避暑山莊賑安徽宿州等州縣衛水災八月癸卯賑兩淮莞瀆等三場水災停征湖北漢川等十七州縣水災光化等二縣雹災額賦並賑之上奉皇太后幸木蘭行圍甲辰上駐波羅河屯賜青海蒙古王公宴並賚之丁未上行圍永安莽喀戊申上行圍畢雅喀拉己酉上行圍溫都里華辛亥上行圍額爾袞郭賜蒙古王額駙台吉等宴癸丑上行圍布爾噶蘇台甲寅上行圍巴彥溝乙卯上行圍烏里雅蘇台賜王大臣蒙古王額駙台吉等宴丙辰上行圍畢圖舍爾賑直隸宣化府屬旱災丁巳上行圍阿濟格鳩和洛戊午上行圍僧機圖己未上行圍永安湃庚申上行圍英圖和洛辛酉上行圍薩達克圖口壬戌賑湖北宜城等三州縣衛水災癸亥上行圍老圖博勒齊爾乙丑上行圍庫爾奇勒丙寅賑甘肅安定等三縣廣東電白等二縣旱災海豐蟲災南澳風災上駐多倫諾爾丁卯賜王大臣蒙古王額駙台吉等宴賑山西曲沃等十二州縣水災九月庚午朔上行圍額爾托昂色欽辛未上行圍多倫鄂博圖壬申遣祭明陵上行圍古哲諾爾癸酉張允隨以猛緬土司奉廷徵等通緬莽請改土歸流命詳議上行圍塔奔陀羅海乙亥賑河南永城等五縣水災上行圍札瑪克圖丙子上行圍爾呼丁丑賑直隸故城等十五州縣衛旱災癸未上駐宣化府甲申上閲宣化鎮兵丁亥賑山東濟寧等六州縣衛水災海豐旱災癸巳上奉皇太后還京師甲午授鄂彌達湖廣總督賑兩淮廟灣場水災丁酉以普免錢糧命查各省歷年存餘銀以抵歲需戊戌授尹繼善兩江總督命修明愍帝陵賑江蘇淮徐海被災州縣慶復奏收撫上瞻對進剿下瞻對班滾克加社丫等卡及南路各寨賑陝西長安等六縣水災冬十月丁未以甘肅甘山道歸併肅州道戊申賑河南商丘等五縣水災辛亥裁通政使司漢右通政一丙辰命塞陳家浦決口戊午命四川嚴查嘓匪禮部尚書任蘭枝乞休允之癸亥免江蘇海州等七州縣漕糧甲子給江南災民葺屋銀賑江蘇江浦等二十一州縣衛水災乙丑賑湖南湘陰等三縣湖北漢川等二十一州縣衛旱災丙寅除湖北當陽等二縣衛水衝地賦十一月庚午賑順直香河等四十八州廳縣旱災陝西興平等六縣水災辛未賑山東滕縣等七州縣衛水災壬申以王安國為禮部尚書甲戌賑兩淮廟灣等場水災乙亥傅清奏準噶爾台吉噶爾丹策零與阿卜都爾噶里木汗搆兵丁丑賑山西大同等十八州縣旱霜雹災湖北巡撫晏斯盛乞養以開泰代之辛巳賑廣西思恩等縣旱災壬午準噶爾台吉噶爾丹策零卒命西北兩路籌備邊防乙酉賑廣東海矬等四場風災戊子免安徽宿州等五州縣水災地方漕糧庚寅陳家浦決口合龍癸巳賑直隸宣化府屬及慶雲縣旱災十二月辛亥大學士福敏乞休優詔允之加太傅壬子命慶復為文華殿大學士留川陝總督任命高斌協辦大學士賑陝西隴西等州縣旱災賑淮北板浦等場水災乙卯命協辦大學士高斌侍郎蔣溥均在軍機處行走
