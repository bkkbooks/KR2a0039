body:
  text: 清史稿卷十本紀十高宗本紀一高宗法天隆運至誠先覺體元立極敷文奮武欽明孝慈神聖純皇帝諱弘曆世宗第四子母孝聖憲皇后康熙五十年八月十三日生於雍親王府邸隆準頎身聖祖見而鍾愛令讀書宮中受學於庶吉士福敏過目成誦復學射於貝勒允禧學火器於莊親王允祿木蘭從獮命侍衛引射熊甫上馬熊突起上控轡自若聖祖御鎗殪熊入武帳顧語溫惠皇太妃曰是命貴重福將過豫雍正元年八月世宗御乾清宮密書上名緘藏世祖所書正大光明扁額上五年娶孝賢皇后富察氏十一年封和碩寶親王時準噶爾役未竟又有黔苗兵事命上綜理軍機咨決大計十三年八月丁亥世宗不豫時駐蹕圓明園上與和親王弘晝朝夕謹侍戊子世宗疾大漸召莊親王允祿果親王允禮大學士鄂爾泰張廷玉領侍衛內大臣豐盛額訥親內大臣戶部侍郎海望入受顧命己丑崩王大臣請奉大行皇帝還宮莊親王允祿等啓雍正元年立皇太子密封宣詔即皇帝位尋諭奉大行皇帝遺命莊親王允祿果親王允禮鄂爾泰張廷玉輔政並令鄂爾泰復任以鄂爾泰因病請假也以遺命尊奉妃母為皇太后復奉懿旨以上元妃為皇后召大學士朱軾回京命大學士嵇曾筠總理浙江海塘工趙弘恩署江南河道總督大行皇帝大殮命以乾清宮南廡為倚廬庚寅命總理事務王大臣議行三年喪命履郡王允祹暫管禮部事務召張照回京以張廣泗總理苗疆事務大學士邁柱署湖廣總督諭大將軍查郎阿駐肅州與劉於義同掌軍務北路大將軍平郡王福彭堅守飭揚威將軍哈元生等勦撫苗疆癸巳頒大行皇帝遺詔九月丁酉朔日食高起憲德俱罷仍帶尚書銜以鄂爾泰總理兵部事果親王允禮總理刑部事莊親王允祿總理工部事甘汝來為漢兵部尚書傅鼐署滿兵部尚書己亥上即位於太和殿以明年為乾隆元年庚子定三年喪制却羣臣以日易月之請命大學士朱軾協同總理事務王大臣辦事辛酉召史貽直來京壬寅止進獻方物禁內廷行走僧人招搖頒乾隆元年時憲書鑄乾隆通寶遣官頒詔朝鮮丙辰賑甘肅蘭州平涼等處旱災丙午命慶復往北路軍營代回福彭手敕額駙策淩勿離軍營丁未大行皇帝梓宮安奉雍和宮戊申上詣雍和宮行禮自是日至乙卯以為常己酉賞莊親王允祿果親王允禮雙俸鄂爾泰張廷玉世襲一等輕車都尉朱軾世襲騎都尉庚戌召楊名時來京辛亥命海望署戶部尚書傅鼐署刑部尚書乙卯上詣雍和宮行大祭禮奉皇太后居永仁宮是日上移居養心殿命廷臣輪班條奏各舉所知戊午賞李紱侍郎銜命管戶部三庫事己未上詣雍和宮梓宮前行月祭禮自是迄奉移每月如之再免民欠丁賦並諭官吏侵蝕者亦免之逮傅爾丹下獄庚申開鄉會試恩科免貴州被擾州縣之額賦未擾者停征辛酉上詣田村孝敬皇后梓宮前致祭以本年鄉試弊多逮治考官顧祖鎮戴瀚大學士馬齊乞休允之癸亥召署河東鹽政孫家淦來京以侍郎用冬十月丙寅朔饗太廟遣裕親王廣保代行命副將軍常德赴北路軍營丁卯申禁各省貢獻以張廣泗為征苗經略揚威將軍哈元生副將軍董芳以下俱聽節制庚午命履郡王允祹管禮部召原任尚書塗天相來京辛未以任蘭枝為禮部尚書壬申免江南等省漕糧蘆課及學租雜稅命治曾靜張熙罪加左都御史福敏太子太保以王大臣辦事遲延疏縱申諭嚴明振作毋與用寬之意相左調徐本為刑部尚書塗天相為工部尚書丙子以劉勷為直隸河道總督丁丑起彭維新為左都御史命徐本軍機處行走癸未停諸王兼管部院事甲申授海望戶部尚書己丑命來保署工部尚書兼管內務府癸巳傅爾丹嶽鍾琪石雲倬馬蘭泰論斬甲午改訥親海望徐本為協辦總理事務納延泰行走如班第等例豐盛額莽鵠立罷庚子張照下獄鞫治壬寅湖北忠洞等十五土司改土歸流分置一府五縣於恩施縣建府治名曰施南府分設縣治名曰宣恩來鳳咸豐利川乙巳申諭薦舉博學鴻詞丁未上大行皇帝尊諡曰敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝廟號世宗次日頒詔覃恩有差免四川巴縣等旱災額賦戊申召邁柱來京以史貽直署湖廣總督庚戌以孫嘉淦為左都御史癸丑命慶復為定邊大將軍赴北路軍營命孫嘉淦仍兼管吏部諭赦降苗罪免貴州三年內耗羡丙辰上詣田村上孝敬憲皇后尊諡曰孝敬恭和懿順昭惠佑天翊聖憲皇后次日頒詔覃恩有差改河東總督仍為河南巡撫以傅德為之丁巳授鍾保湖南巡撫俞兆嶽江西巡撫命岱林布為右衛將軍己未以平郡王福彭協辦總理事務董芳元展成德希壽褫職逮問奪哈元生揚威將軍命經略張廣泗兼貴州巡撫癸亥賞阿其那塞思黑子孫紅帶收入玉牒甲子以王大臣會刑部夾訊李禧耿韜命審訊大臣宜存大體十二月丙寅朔以博第為吉林將軍吳禮布為黑龍江將軍復設川陝總督裁四川總督戊辰賑安徽泗州湖北潛江水災癸酉免浙江山東福建廣東鹽場欠課戊寅上皇太后徽號曰崇慶皇太后次日頒詔覃恩有差己卯以準噶爾遣使請和命喀爾喀扎薩克等詳議定界事宜庚辰調傅鼐為刑部尚書仍兼管兵部甲申磔曾靜張熙於巿都統李禧以贓尚書高起以欺罔俱論斬丙戌命嵇曾筠兼管浙江巡撫以高斌為江南河道總督設歸化城將軍及副都統辛卯晉封訥親一等公世襲乾隆元年春正月丙申朔上詣堂子行禮至觀德殿更素服詣雍和門行禮畢率諸王大臣詣慈寧宮行禮御太和殿受朝不作樂不宣表戊戌命北路參贊大臣薩木哈回京辛丑祈穀於上帝親詣行禮自是每年如之癸卯建京師先蠶壇準噶爾台吉噶爾丹策零遣使貢方物丁未準噶爾貢使吹納木喀入覲召大將軍慶復回京命伊勒慎阿成阿哈岱為參贊大臣協同額駙策淩辦事駐鄂爾坤命都統王常侍郎柏修往鄂爾坤勘屯田丙辰以顧琮署江蘇巡撫己未署湖南永州鎮總兵崔起潛妄劾鄂爾泰張廣泗褫職逮治南掌入貢庚辰上啓蹕謁陵癸亥上謁昭西陵孝陵孝東陵景陵賑臺灣諸羅縣地震災民賑甘肅固原四川忠州等州縣旱災二月丙寅上還京師戊辰祭大社大稷上親詣行禮自是每年如之以補熙署漕運總督甲戌遣準噶爾來使歸詔以遵皇考諭旨酌定疆界齎示噶爾丹策零乙卯賜準噶爾台吉噶爾丹策零敕書斥所請以哲爾格西喇呼魯蘇為界及專令喀爾喀內徙庚辰命邁柱兼管工部申飭陳奏謬妄之謝濟世李徽陳世倌等加楊名時禮部尚書銜管國子監祭酒事辛酉朝鮮國王李昑遣使進香賞賚如例甲申命改嵇曾筠為浙江總督兼管兩浙鹽政郝玉麟以閩浙總督專管福建事戊子定世宗山陵名曰泰陵己丑達賴喇嘛及貝勒頗羅鼐遣使貢方物辛卯以程元章為漕運總督癸巳尹繼善奏克空稗台雄等寨張廣泗奏克大小丹江等處三月庚子釋汪景琪查嗣庭親族回籍乙巳加上太祖尊諡曰太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安弘文定業高皇帝孝慈皇后尊諡曰孝慈昭憲敬順仁徽懿德慶顯承天輔聖高皇后太宗尊諡曰太宗應天興國弘德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝孝端皇后尊諡曰孝端正敬仁懿哲順慈僖莊敏輔天協聖文皇后孝莊皇后尊諡曰孝莊仁宣誠憲恭懿至德純徽翊天啓聖文皇后世祖尊諡曰世祖體天隆運定統建極英睿欽文顯武大德弘功至仁純孝章皇帝孝惠皇后尊諡曰孝惠仁憲端懿慈淑恭安純德順天翼聖章皇后孝康皇后尊諡曰孝康慈和莊懿恭惠溫穆端靖崇天育聖章皇后聖祖尊諡曰聖祖合天弘運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝孝誠皇后尊諡曰孝誠恭肅正惠安和淑懿儷天襄聖仁皇后孝昭皇后尊諡曰孝昭靜淑明惠正和安裕欽天順聖仁皇后孝恭皇后尊諡曰孝恭宣惠溫肅定裕慈純贊天承聖仁皇后丁未免四川涼山等處番民額賦己酉免肅州威魯堡回民舊欠庚戌以固原提督樊廷為駐哈密總督乙卯免廣東歸善等四縣加增漁稅及通省逋賦夏四月丙寅免江南阜寧等州縣緩征漕糧壬申命王常海瀾為參贊大臣協同額駙策淩辦事以高其倬為湖北巡撫暫署湖南巡撫戊寅以王士俊為四川巡撫辛巳貴州提督哈元生褫職逮問裁直隸副總河以總督兼管河務戊子賜金德瑛等三百三十四名進士及第出身有差壬辰布魯克巴部諾顏林沁齊壘喇布濟至西藏請上安並貢方物五月丁未賑河南永城縣水災壬子命江南副總河移駐徐州甲寅免四川南溪等州縣被風雹額賦乙卯朝鮮國王李昑表賀登極及尊崇皇太后並進方物乙巳暹羅國王參立拍照廣拍馬呼六坤司尤提雅菩挨表謝賜扁並貢方物庚辰免甘肅伏羌等州縣地震傷亡缺額丁銀六月戊辰賑江蘇蕭縣等州縣水災己巳以慶復署吏部尚書仍兼署戶部事癸酉授張廣泗貴州總督兼管巡撫事以尹繼善為雲南總督秋七月癸巳朔以貴州流民多就食沅州免沅州額賦甲午召總理事務王大臣九卿等宣諭密書建儲諭旨收藏於乾清宮正大光明扁額上己亥免貴州通省本年額賦辛丑除古州等處苗賦甲辰免崔起潛罪丙午賑江西安福水災辛亥追諡明建文皇帝為恭閔惠皇帝賑江南蕭碭等州縣衛水災丁巳賑甘肅隴西等州縣水雹災戊午調鍾保為湖北巡撫高其倬為湖南巡撫賑湖北漢川等五州縣衛水災癸酉逮問王士俊尋論斬賑廣東南海潮陽等縣水災八月戊辰祭大稷大社上親詣行禮自是每歲如之準噶爾部人孟克來降庚午尚書傅鼐有罪免乙卯賑河南南陽等五縣水災乙酉賑喀喇沁飢丁亥兵部尚書通智免以奉天將軍那蘇圖代之調博第為奉天將軍以吉爾黨阿為寧古塔將軍賑陝西神木府谷雹災辛卯賑浙江蘭溪等六縣江南溧水等二十四州縣湖北潛江等九州縣衛水災九月丙申免張照哈元生董芳元展成德希壽貽誤苗疆罪丁酉禮部尚書楊名時卒戊戌以慶復為刑部尚書兼管吏部命傅鼐暫署兵部尚書庚子停本年秋決癸卯賑浙江安吉等四縣水災丙午上臨大學士朱軾第視疾免江西安福水災額賦庚戌大學士朱軾卒上親臨賜奠壬子賑安徽宿州等二十州縣衛水災致仕大學士陳元龍卒乙卯賑江蘇蕭縣等三州縣水災己未御試博學鴻詞一百七十六人於保和殿授劉綸等官賑江蘇無錫等十三州衛水災準噶爾台吉車林等來降冬十月壬戌以邵基為江蘇巡撫乙丑除浙江仁和等州縣水災額賦庚午調嶽濬為江西巡撫以法敏為山東巡撫辛未上奉皇太后送世宗梓宮至泰陵庚辰上奉皇太后還京師十一月甲午上始御乾清門聽政加嵇曾筠太子太傅命徐本為東閣大學士仍兼管刑部以孫家淦為刑部尚書楊汝穀為左都御史以額爾圖為黑龍江將軍丙申免雲南楚雄等四府州縣額賦丁酉賑安徽霍丘等三縣衛湖北漢川等十三縣衛水災己酉冬至祀天於圜丘上親詣行禮自是每年如之己未賑陝西定邊雹災江南長洲等十二州縣衛水災十二月辛酉賑巴林郡王等四旗旱災甲子賑江蘇婁溧水等十三州縣水災乙丑改江南壽春協為鎮設總兵己巳免陝西府谷神木本年雹災額賦移南河副總河駐徐州丁丑免安徽泗州衛屯田長蘆廣雲竈地水災額賦丁亥岱林布改江寧將軍以王常為建威將軍雅爾圖為參贊大臣免兩淮莞瀆等三場水災額賦是歲朝鮮南掌暹羅安南來貢二年春正月庚寅朔免朝賀庚子召趙弘恩來京以慶復為兩江總督調那蘇圖為刑部尚書以訥親為兵部尚書乙巳以楊超曾為廣西巡撫丙午釋王士俊戊子李衛劾治誠親王府護衛囑