body:
  text: 清史稿卷十三本紀十三高宗本紀四三十一年春正月壬申朔詔以御宇三十年函夏謐寧寰宇式闢自本年始普免各省漕糧一次甲戌免甘肅靖遠等十四廳州縣陝西延安等三府州屬積年逋賦丙戌雲南官軍勦莽匪于猛住失利調楊應琚為雲貴總督吳達善為陝甘總督以和其衷護之調劉藻為湖廣總督湯聘署陝西巡撫癸巳刑部尚書莊有恭以讞段成功劾案不實褫職下獄籍産調李侍堯為刑部尚書以張泰開為禮部尚書范時綬為左都御史二月壬寅劉藻降湖北巡撫仍與雲南提督達啓下部嚴議以定長為湖廣總督調李因培為福建巡撫常鈞為湖南巡撫湯聘為雲南巡撫庚戌上謁東陵辛亥和其衷以彌補段成功虧空褫職逮問以舒赫德署陝甘總督命四達赴陝西會彰寶審辦段成功虧空一案調明山為陝西巡撫以吳紹詩為江西巡撫庚申上還京師辛酉莊有恭論斬壬戌上謁泰陵癸亥劉藻褫職留滇效力甲子以鄂寧為湖北巡撫戊辰上還京師三月丁亥劉藻畏罪自殺己丑楊應琚以復猛籠等土司內附奏聞夏四月辛丑楊應琚奏大猛養頭人內附官軍進取整缺孟艮壬寅以莽匪整缺平宣諭中外丙午和其衷論斬段成功處斬丁未免雲南普藤等十三土司本年額賦及猛籠逋賦甲子賜張書勳等二百一十三人進士及第出身有差五月甲戌上詣黑龍潭祈雨戊寅命正一真人視三品秩丙戌上詣黑龍潭祈雨六月丙午楊應琚奏猛勇頭目召齊及猛龍沙頭目叭護猛等內附戊申豫故三品銜西洋人郎世寧侍郎銜秋七月丙子上奉皇太后秋獮木蘭己卯以阿里袞于敏中扈從命舒赫德兼署戶部尚書壬午上奉皇太后駐蹕避暑山莊是日皇后崩癸未諭以皇后上年從幸江浙不能恪盡孝道喪儀照皇貴妃例癸巳御史李玉鳴奏皇后喪儀未能如例忤旨戍伊犁丁酉楊應琚奏補哈大頭目噶第牙翁猛撒頭目喇鮓細利內附八月己亥賑湖南湘陰等十三縣衛水災癸丑上幸木蘭行圍宥莊有恭罪起為福建巡撫甲寅伊犁蝗乙卯江蘇銅山縣韓家堂河決癸亥裁察哈爾副都統留一員駐張家口九月壬申免甘肅靖遠等九縣紅水東樂二縣被旱額賦己卯賑山東歷城等五十五縣東昌等五衛所水災並蠲新舊額賦乙未楊應琚赴永昌受木邦降冬十月己亥上奉皇太后還京師戊申楊應琚奏整賣景線景海各部頭人內附辛亥韓家堂決口合龍兵部尚書彭啓豐降補侍郎甲寅以陸宗楷為兵部尚書壬戌增設雲南迤南道十一月乙亥楊應琚奏緬甸大山猛育猛答各部頭人內附戊寅以楊應琚病命楊廷璋赴永昌接辦緬匪癸巳命侍衛福靈安帶御醫往視楊應琚病十二月乙巳調鄂寧為湖南巡撫以鄂寶為湖北巡撫癸丑以巴祿為綏遠城將軍是歲朝鮮琉球入貢三十二年春正月乙亥雲南官軍勦緬匪於新街失利諭楊廷璋回廣東二月乙未以楊應琚病命其子江蘇按察使楊重英赴永昌襄理軍務丙午雲南官軍與緬匪戰于底麻江失利逮提督李時升下獄戊申調鄂寧為雲南巡撫甲寅莊親王允祿卒丙辰上臨奠己未上巡幸天津癸亥賑奉天承德等五州縣及興京鳳凰城災民三月乙丑朔上閲子牙河堤召楊應琚入閣辦事以明瑞為雲貴總督丙寅調託庸為工部尚書以明瑞為兵部尚書己巳免直隸全省逋賦庚午上閲天津駐防滿洲兵以阿桂為伊犁將軍壬申上閲緑營兵庚辰上還京師辛巳大學士楊應琚褫職壬午以緬匪入寇盞達隴川宣示楊應琚貽誤罪狀癸未命鄂寧赴普洱辦軍務庚寅以李侍堯為兩廣總督召楊廷璋為刑部尚書癸巳以鄂寧署雲貴總督夏四月己酉上詣黑龍潭祈雨庚戌以雲南邊境瘴盛命暫停進兵庚申命張泰開以禮部尚書管左都御史事嵇璜署禮部尚書五月己巳以鄂寶為貴州巡撫定長兼署湖北巡撫庚午以范時綬為湖北巡撫調張泰開為左都御史嵇璜為禮部尚書壬申命陳宏謀管工部丙子雲南官軍失利于木邦楊寧等退師龍陵庚寅李時升朱崙處斬六月辛酉以額爾景額為參贊大臣遣赴雲南秋七月福建巡撫莊有恭卒調崔應階代之以李清時為山東巡撫裘曰修為禮部尚書壬午上奉皇太后秋獮木蘭戊子上奉皇太后駐避暑山莊己丑盛京將軍舍圖肯免以新柱代之閏七月甲寅賜楊應琚自盡丙辰緬匪渡小猛崙江入寇雲南茨通八月癸酉調裘曰修為工部尚書董邦達為禮部尚書丁丑上幸木蘭乙酉以鍾音為廣東巡撫乙丑諭明瑞以額勒登額代談五格分路進兵九月庚子賑湖北江夏等二十七縣武昌等七衛水災甲寅命託恩多署兵部尚書冬十月壬戌賜李因培自盡己卯諭明瑞以將軍管總督十一月壬寅賑甘肅平涼等三十四廳州縣被雹災民壬子調鄂寶為湖北巡撫丁巳密諭明瑞以阿瓦不能遽下退師木邦十二月甲戌楊寧褫職戍伊犁戊寅明瑞奏渡大疊江進軍錫箔波龍等處土司頭人羅外耀特等內附三十三年春正月辛卯明瑞奏克蠻結壬辰封明瑞一等誠毅嘉勇公賜黃帶紅寶石頂四團龍補服丁酉明瑞進軍宋賽庚子調彰寶為山東巡撫以蘇爾德為山西巡撫丙午盛京將軍新柱卒調明福代之閩浙總督蘇昌卒丁未命阿里袞為參贊大臣往雲南軍營以崔應階為閩浙總督富尼漢為福建巡撫甲寅緬人圍木邦二月丙寅諭用兵緬甸輕敵致衄引為己過令明瑞等班師額勒登額談五格褫職逮問命鄂寧回雲南阿里袞署雲貴總督駐永昌緬人陷木邦珠魯訥死之戊寅上還圓明園丙戌明瑞等敗績於猛育死之召阿桂來京以伊勒圖署伊犁將軍命傅恆為經略阿里袞阿桂為副將軍舒赫德為參贊大臣赴雲南以鄂寧為雲貴總督調明德為雲南巡撫以福隆安為兵部尚書命在軍機處學習行走以永德為浙江巡撫調彰寶為江蘇巡撫富尼漢為山東巡撫鄂寶為福建巡撫程燾為湖北巡撫三月癸巳免山東高苑等三縣三十二年被水額賦乙巳調鄂寶為廣西巡撫鍾音為福建巡撫良卿為廣東巡撫錢度為貴州巡撫巴祿為察哈爾都統傅良為綏遠城將軍癸丑免江西南昌等十三縣三十二年被水額賦夏四月丁卯調錢度為廣東巡撫己巳免安徽安慶等七府州屬三十二年被水額賦壬申御試翰林詹事等官擢吳省欽等三員為一等餘升黜有差試由部院入翰林等官擢覺羅巴彥學為一等餘升擢有差甲申磔額勒登額於市談五格處斬乙酉上臨奠明瑞扎拉豐阿觀音保五月庚申命明德赴永昌乙丑色布騰巴勒珠爾病免以伊勒圖為理藩院尚書庚午改命官保署理藩院尚書辛巳以范時綬為左都御史壬午以阿桂為雲貴總督尹繼善高晉以兩淮鹽務積弊匿不以聞均下部嚴議秋七月癸巳上奉皇太后秋獮木蘭甲午調託庸為兵部尚書以官保為刑部尚書仍兼署理藩院尚書己亥上奉皇太后駐避暑山莊辛丑以尹勒圖為伊犁將軍仍兼理藩院尚書壬子紀昀以漏泄籍沒前運使盧見曾諭旨褫職戍烏魯木齊八月丁卯允俄羅斯于恰克圖通商辛未上幸木蘭行圍壬申直隸總督方觀承卒以楊廷璋代之調裘曰修為刑部尚書以蔡新為工部尚書甲戌李侍堯奏暹羅為緬人所破其國王之孫詔萃奔安南河仙鎮土官莫士麟留養之內地人甘恩敕據暹羅乞封敕嘉奬莫士麟命甘恩敕求其主近支立之不得自王乞封號己卯加託恩多于敏中崔應階太子太保託庸楊廷璋太子少保九月戊子以嵩椿署伊犁將軍乙未上回駐避暑山莊戊戌高恆普福論斬丁未上奉皇太后還京師以鄂寶為山西巡撫黑龍江將軍富僧阿改西安將軍以傅玉代之冬十月己未免甘肅平涼等十二州縣三十二年被災額賦辛未以宮兆麟為廣西巡撫辛巳高恆普福達色處斬改海明等緩決十一月戊戌以緬人來書不遜諭阿里袞籌進勦十二月己未以富明安為山東巡撫揆義署湖北巡撫漕運總督楊錫紱卒以梁翥鴻署之乙丑湖廣總督定長卒調吳達善代之彰寶兼署兩江總督明山為陝甘總督調阿思哈為陝西巡撫以文綬為河南巡撫丁卯召明福來京以額爾德蒙額署盛京將軍甲戌賑奉天承德等四州縣水災壬午留阿思哈為河南巡撫改文綬為陝西巡撫三十四年春正月丙戌免雲南官兵所過地方及永昌等三府州本年額賦其非經過地方免十分之五並免湖北湖南貴州三省官兵經過地方本年額賦十分之三庚寅以緬人書詞桀驁命副將軍阿桂與副將軍阿里袞協助傅恆征勦辛卯命明德為雲貴總督駐永昌喀寧阿為雲南巡撫壬辰阿里袞等敗緬人於南底壩撥運通倉米二十萬石賑霸州等十二州縣災甲午右部哈薩克阿勒比斯子卓勒齊等來朝乙未調恆祿為盛京將軍傅良為吉林將軍常在為綏遠城將軍辛丑傅恆赴雲南命官保署戶部尚書裁寧夏右翼副都統吉林拉林副都統命常青署綏遠城將軍癸卯賜傅恆御用盔甲戊申命官保協辦大學士以福隆安署刑部尚書癸丑以南掌國王之弟召翁遣使請兵復仇諭阿桂等預備由南掌分路進兵二月甲寅朔嵇璜緣事降調以程景伊為工部尚書乙丑以富尼漢為安徽巡撫癸未命傅恆整飭雲南馬政以諾倫為綏遠城將軍三月乙酉命伊犁將軍伊勒圖往雲南軍營己丑命伊爾圖為烏里雅蘇台參贊大臣辛丑正白旗領侍衛內大臣福祿罷以阿桂代之丙午命阿桂署雲貴總督丁未右部哈薩克斡里蘇勒統等入覲命坐賜茶賚冠服有差戊申賑甘肅臯蘭等二十九州縣廳上年災民蠲安徽合肥等十六州縣及廬州等五衛上年額賦夏四月己未以溫福為福建巡撫壬申傅恆進兵老官屯阿桂進兵猛密丁丑賜陳初哲等一百五十一人進士及第出身有差五月己丑裁江寧副都統一六月丙辰以阿思哈為雲貴總督喀寧阿為河南巡撫丁巳傅恆奏猛拱土司內附戊寅湖北黃梅江堤決命湖廣總督吳達善湖北巡撫揆義勘之秋七月丁亥以明德署雲貴總督移駐騰越經理軍務辛卯設伊犁巴彥岱城領隊大臣一傅恆奏猛密土司內附甲午李侍堯奏暹羅仍為甘恩敕所踞丁酉禮部尚書董邦達卒己亥調陸宗楷為禮部尚書蔡新為兵部尚書以吳紹詩為刑部尚書海明為江西巡撫梁國治為湖北巡撫己酉李侍堯檄莫士麟會暹羅土目討甘恩敕八月乙丑上幸木蘭行圍己巳以蔡琛自縊獄中褫福建按察使孫孝愈職發軍台九月丙戌阿桂進抵蠻暮己丑上回駐避暑山莊乙未上奉皇太后回鑾己亥命阿桂伊勒圖自蠻暮迓傅恆會師壬寅命劉統勳會勘山東運河癸卯傅恆奏猛拱土司渾覺率衆來降上嘉之特賞三眼孔雀翎戊申傅恆進抵猛養阿桂奏克哈坎渡江命阿桂據新街勦賊冬十月乙卯命彰寶署雲貴總督明德署雲南巡撫調永德為江蘇巡撫起熊學鵬署浙江巡撫以增海署伊犁將軍丁巳傅恆奏攻克猛養癸亥梁國治兼署湖廣總督甲子以阿桂不能克老官屯奪副將軍為參贊大臣命伊勒圖為副將軍調喀寧阿為貴州巡撫富尼漢為河南巡撫以胡文伯為安徽巡撫乙丑傅恆奏進抵新街命彰寶駐老官屯壬申調永貴為禮部尚書託庸為吏部尚書伊勒圖為兵部尚書以託庸兼署調吳紹詩為禮部尚書以裘曰修為刑部尚書十一月乙酉副將軍戶部尚書阿里袞卒於軍命阿桂仍在副將軍上行走並以尹勒圖為副將軍烏三泰長青為參贊大臣調官保為戶部尚書以素爾納為刑部尚書託恩多署左都御史戊子傅恆等進攻老官屯癸巳以黃登賢為漕運總督丙申以緬地烟瘴官軍損失大半命班師屯野牛壩召經略傅恆還阿桂留辦善後己亥起觀保署左都御史丁未傅恆等攻老官屯不克其土官以緬酋猛駮蒲葉書詣軍營乞降上命班師十二月辛亥