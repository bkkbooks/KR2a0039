侗等赴貴州讞知府蘇墧禀揭總督藩臬袒護同知席纘一案九月庚戌蠲湖北鍾祥等十二州縣並武昌等七衛三十九年旱災額賦癸丑上回駐避暑山莊丁巳上送皇太后回鑾辛酉以圖思德劾蘇墧浮收勒索命袁守侗等嚴鞫之丙寅以明亮請赴西路失機嚴斥之仍奪廣州將軍丁卯上奉皇太后還京師阿桂等克當噶克底等處碉寨冬十月己卯召駐藏辦事伍彌泰以留保住代之己丑以霸州等六州縣被災較重命即於閏十月放賑庚寅蠲甘肅臯蘭等十七州縣廳水雹霜災額賦壬辰上還宮丙申調裴宗錫為貴州巡撫命袁守侗暫署圖思德署雲南巡撫李質穎為安徽巡撫閏十月壬子蘇墧以侵稅誣訐處斬壬戌明亮等奏克扎烏古山梁甲子阿桂等奏克西里山黃草坪等處碉卡總兵曹順死之命袁守侗赴四川同阿揚阿讞冀國勳一案復封慶恆為克勤郡王壬申明亮等克耳得谷寨十一月明亮等克甲索諸處碉卡乙酉福祿以立塔爾一案未能鞫實革戍伊犁己丑阿桂克西里第二山峯並進圍鴉瑪朋寨落壬辰明亮等奏攻得克爾甲爾古等處碉卡壬寅阿桂等奏克舍勒固租魯科思果木阿爾古等處碉寨十二月甲辰朔日食丁未工部尚書閻循琦卒調嵇璜為工部尚書蔡新為兵部尚書以曹秀先為禮部尚書阿桂等克薩爾歪等寨落丙辰以阿桂為鑲黃旗領侍衛內大臣調熊學鵬為廣東巡撫以吳虎炳為廣西巡撫甲子明亮等由達撒谷進兵連克險要山梁及沿河格爾則寨落丙寅阿桂等克格隆古等處寨落庚午阿桂等由索隆古進據噶占山梁直搗噶喇依其頭人色木里雍中及布籠普阿納木來降壬申明亮等克甲雜等隘口並後路巴布里日蓋古洛進抵獨松隘口剋日會搗噶喇依其頭人達固拉得爾瓦等來降
