body:
  text: 清史稿卷十四本紀十四高宗本紀五四十一年春正月癸酉朔富德克打噶咱普德爾窩馬爾邦等碉卡明亮等克獨松等碉卡甲戌定郡王綿德以交結禮部司員削爵命綿恩承襲阿桂克喇烏喇等碉卡及舍齊等寺己卯阿桂率諸軍進圍噶喇依索諾木之母及其姑姊妹出降命封阿桂一等誠謀英勇公予四團龍補服金黃帶加賞果毅繼勇公豐昇額一等子封明亮一等襄勇伯海蘭察一等超勇侯額森特一等男和隆武三等果勇侯福康安普爾普三等男加賞奎林一等男豐昇額明亮海蘭察奎林和隆武仍各予雙眼花翎賞于敏中一等輕車都尉均世襲阿桂請安插降衆於綽斯甲布十二土司地方從之壬午賞阿桂紫韁甲申調明善為科布多參贊大臣以法福里為烏里雅蘇臺參贊大臣己丑吏部尚書協辦大學士官保以病乞休允之以阿桂為吏部尚書協辦大學士調豐昇額為戶部尚書福隆安為兵部尚書以綽克托為工部尚書庚寅嘉謨遷倉場侍郎命阿思哈署漕運總督永貴署吏部尚書英廉署戶部尚書二月己酉授文綬四川總督調富勒渾為湖廣總督庚戌命嗣後社稷壇祭時或值風雨於殿內致祭蠲江蘇上元等三十九州縣鎮江等五衞四十年旱災額賦辛亥上謁東陵以祇謁兩陵並巡幸山東免經過州縣本年額賦十分之三甲寅上謁昭西陵孝陵孝東陵景陵詣孝賢皇后陵奠酒阿桂等奏索諾木等出降檻送京師兩金川平乙卯命永貴回禮部尚書仍兼署吏部事丙辰命圖平定金川前後五十功臣像於紫光閣命新設將軍駐雅州四川提督桂林駐金川丁巳上還京師戊午上謁泰陵命袁守侗赴四川會同阿桂查辦參贊大臣富德壬戌上謁泰陵設雲南騰越鎮總兵官丁卯上奉皇太后巡幸山東己巳免順天直隸通州等二十八州縣未完地糧倉穀庚午停湖北勘丈湖地免直隸霸州等二十一州縣未完地糧倉穀辛未減直隸軍流以下人犯罪三月丁丑免山東泰安曲阜二縣本年額賦戊寅免山東鄒平等三十九州縣衛各項民欠額賦己卯增設成都將軍以明亮為之辛巳減山東軍流以下人犯罪壬午免山東德州等十一州縣緩徵漕米漕項癸未以薩載為江南河道總督楊魁為江蘇巡撫甲申勒爾謹陛見命畢沅署陝甘總督丙戌上駐蹕泰安謁岱廟命還督撫貢物仍嚴飭之設金川勒烏圍總兵丁亥上登泰山辛卯戶部尚書王際華卒以袁守侗代之免四川通省上年額賦及本年夷賦有差蠲河南武陟縣四十年水災額賦乙未上至曲阜謁孔子廟蠲安徽懷寧等三十二州縣建陽等七衛四十年水旱額賦丙申釋奠先師孔子告平兩金川功丁酉上謁孔林調李質穎為廣東巡撫以閔鶚元為安徽巡撫戊戌富德褫職逮治己亥雲南車里逃夷刀維屏等悔罪自歸諭免死錮之庚子命戶部侍郎和珅軍機處行走辛丑上奉皇太后自濟寧登舟夏四月癸卯以平定金川遣官祭告天地太廟社稷以英廉兼署戶部尚書命劉墉會同陳輝祖查勘湖北沔陽州衝潰隄工甲辰予告協辦大學士吏部尚書官保卒丁未上閱臨清州舊城辛亥命阿桂仍在軍機處行走癸丑蠲直隸霸州等五十二州縣四十年水災額賦有差乙卯以平定金川遣官告祭昭西陵孝陵孝東陵景陵泰陵孝賢皇后陵丙辰遣官告祭孔子闕里壬戌遣官告祭永陵福陵昭陵甲子以阿思哈為漕運總督素爾訥為左都御史索琳為理藩院尚書仍留庫倫辦事命豐昇額署理藩院尚書乙丑上送皇太后自寶稼營還京師丙寅獻金川俘馘於廟社丁卯定西將軍阿桂等凱旋戊辰上幸良鄉城南行郊勞禮賜將軍及隨征將士等宴幷賞阿桂等御用鞍馬各一上還京師己巳受俘上御瀛臺親鞫俘囚索諾木等皆磔於市上御紫光閣行飲至禮賜凱旋將士及王大臣等宴賜將軍阿桂以下銀幣有差庚午斬番目布籠普占巴雅瑪朋阿庫魯等於市五月辛未朔上奉皇太后御慈寧宮上徽號曰崇慶慈宣康惠敦和裕壽純禧恭懿安祺寧豫皇太后頒詔覃恩有差戊寅富德以誣訐阿桂悖逆處斬辛巳豁山西石樓等三縣丁徭虛額銀癸未上奉皇太后啟鑾秋獮木蘭己丑上駐蹕避暑山莊六月庚子朔定文淵閣官制壬子以甘肅皐蘭等二十九州縣廳旱災命多留市米以供民食庚申黃邦寧論斬逮治前護廣西巡撫蘇爾德署按察使廣德秋七月庚申索琳以不職鐫級以伍彌泰為理藩院尚書丁亥授巴延三山西巡撫調鄂寶為湖南巡撫八月丁未召瑚圖靈阿以巴林王巴圖為定邊左副將軍以額駙拉旺多爾濟為伊犁參贊大臣乙卯上幸木蘭行圍九月丙子上回駐避暑山莊庚辰上送皇太后回鑾庚寅上奉皇太后還京師冬十月己亥朔命豐昇額為步軍統領福隆安仍兼管壬寅綏遠城將軍容保罷以伍彌泰代之甲辰命英誠公阿克棟阿在領侍衞內大臣上行走以奎林為理藩院尚書戊申左都御史張若溎病免辛亥調崔應階為左都御史以余文儀為刑部尚書壬子阿思哈病免以鄂寶為漕運總督癸丑以敦福為湖南巡撫丙辰命三寶查浙江漕糧積弊甲子以甘肅皐蘭等二十九廳州縣旱災豁歷年積欠倉糧四百萬有奇十一月甲申命四庫全書館詳覈違禁各書分別改燬諭曰明季諸人書集詞意抵觸本朝者如錢謙益等均不能死節妄肆狂狺自應查明燬棄劉宗周黃道周立朝守正熊廷弼材優幹濟諸人所言若當時採用敗亡未必若彼其速惟當改易字句無庸銷燬又直臣如楊漣等即有一二語傷觸亦止須酌改實不忍並從焚棄十二月庚子命戊戌年八月舉行繙譯鄉試次年三月舉行會試丙午命明亮軍機處行走伍彌泰遷西安將軍博成署綏遠城將軍戊申以雅朗阿為綏遠城將軍甲寅蠲山東德州等三十州縣衛所本年被災額賦丙辰緬目得魯蘊請送還內地官人准其入貢諭令進京乞恩戊午上幸瀛臺庫車阿奇木伯克哈薩克使人及四川明正土司等瞻覲各賜冠服有差四十二年春正月戊辰朔蠲甘肅乾隆二十三年至三十五年民欠銀八十四萬兩有奇丙子上御閱武樓閱兵命諸王大臣外藩蒙古及回部庫車哈薩克使臣金川土司等從觀辛巳以皇太后不豫詣長春仙館問安奉皇太后幸同樂園侍晚饍自是每日詣長春仙館請安乙酉以圖思德奏緬番內附命阿桂往雲南籌辦調李侍堯為雲貴總督以楊景素為兩度總督郝碩為山東巡撫圖思德回貴州巡撫裴宗錫回雲南巡撫己丑宥熊學鵬罪蘇爾德廣德論斬庚寅皇太后崩奉安於慈寧宮正殿上以含清齋為倚廬頒大行皇太后遺詔諭穿孝百日王大臣官員等二十七日除服辛卯尊大行皇太后諡號為孝聖憲皇后推恩普免錢糧一次壬辰定二十七日內郊廟社稷遣官致祭用樂之制乙未尊大行皇太后陵曰泰東陵丙申移大行皇太后梓宮於暢春園奉安於九經三事殿上居圓明園二月丁酉朔上詣安佑宮行告哀禮上居無逸齋苫次己亥上還居圓明園庚子上詣九經三事殿大行皇太后梓宮前供奠諸王大臣請間一二日行禮不允甲辰諭二十七月內停止元旦朝賀其百日後尋常御殿視朝屆日請旨乙巳定百日內與二十七月內御用服色及臣下服色制甲寅高晉會同阿揚阿赴安徽查案楊魁兼署兩江總督蠲安徽宿州等八州縣鳳陽等三衛四十一年水災額賦丁巳上詣九經三事殿大行皇太后梓宮前行月祭禮以顏希深為湖南巡撫三月辛未左都御史素爾訥大理寺卿尹嘉銓休致壬申以薩載赴京命德保兼署江南河道總督戊寅以邁拉遜為左都御史壬午上大行皇太后尊諡曰孝聖慈宣康惠敦和敬天光聖憲皇后戊子以恆山保為烏里雅蘇臺參贊大臣夏四月戊戌以緬番投誠反覆召阿桂回京留緬目所遣孟幹等戊申上詣九經三事殿孝聖憲皇后梓宮前行祖奠禮己酉孝聖憲皇后發引上送往泰東陵免經過州縣本年額賦十分之七癸丑上謁泰陵是日孝聖憲皇后梓宮至泰東陵奉安於隆恩殿丙辰上詣泰東陵孝聖憲皇后梓宮前行百日祭禮丁巳大學士舒赫德卒戊午命永貴署大學士兼吏部尚書辛酉蠲安徽宿州等八州縣長河等三衛四十一年水災額賦壬戌命福隆安兼署吏部尚書甲子上還京師五月乙丑朔孝聖憲皇后神牌升祔太廟翌日頒詔覃恩有差戊辰上臨舒赫德喪次賜奠壬申蠲直隸清苑等十州縣逋賦戊寅以普蠲全國錢糧免福建臺灣府屬官莊租息十分之三甲申馬蘭鎮總兵滿斗於東陵掘牆通路論斬丁亥命阿桂為武英殿大學士兼管吏部事英廉協辦大學士命尚書果毅繼勇公豐昇額之父阿里袞原襲果毅公爵號亦加繼勇二字調永貴為吏部尚書以富勒渾為禮部尚書三寶為湖廣總督王亶望為浙江巡撫蠲順天直隸大興等三十三廳州縣被災額賦六月乙卯以吉林將軍富椿調杭州將軍命福康安代之己未上詣黑龍潭祈雨秋七月蠲甘肅皐蘭等二十九廳州縣四十一年被災額賦丙戌命甘肅應徵各屬番糧草束免十分之三暹羅頭目鄭昭進貢送所獲緬番諭楊景素以請封檄諭之八月庚子免烏魯木齊各州縣戶民額糧十分之三庚申命侍郎金簡赴吉林會同福康安查辦事件九月丙子上謁泰陵泰東陵壬午上還京師冬十月戊戌戶部尚書果毅繼勇公豐昇額卒調英廉為戶部尚書仍兼管刑部命德福為刑部尚書乙巳詔陝西民屯租糧草束屆輪免錢糧之年一體蠲免庚申設密雲副都統一駐防兵二千辛酉命袁守侗赴浙江查審歸安縣知縣劉均被控案命侍郎周煌阿揚阿赴四川查審大足縣知縣趙憲高被控案十一月丙寅廣德處斬戊辰海成以縱庇王錫侯褫職以郝碩為江西巡撫國泰為山東巡撫壬申刑部尚書余文儀乞休允之甲戌調袁守侗為刑部尚書梁國治為戶部尚書乙酉蠲甘肅寧夏等七廳縣本年被災額賦十二月丁酉蠲甘肅皐蘭等十七州縣四十一年被災額賦癸丑賑甘肅皐蘭等三十二廳州縣被旱災民四十三年春正月壬戌朔免朝賀癸亥以鄭大進為河南巡撫辛未追復睿親王封爵及豫親王多鐸禮親王代善鄭親王濟爾哈朗肅親王豪格克勤郡王岳託原爵並配享太廟己卯上謁西陵免經過地方本年額賦十分之三癸未上謁泰陵泰東陵甲申上謁泰東陵行期年禮二月丁酉朝鮮琉球入貢己酉以特成額為禮部尚書調綽克托為吏部尚書富勒渾為工部尚書特成額遷成都將軍以鍾音為禮部尚書調楊景素為閩浙總督桂林為兩廣總督李質穎護之戊午以諴親王弘暢為正白旗領侍衛內大臣三月甲子上詣西陵戊辰上謁泰陵泰東陵己巳上親祭泰東陵乙亥上閱健銳營兵己丑以李湖為湖南巡撫夏四月辛卯以河南旱命減開封等五府軍流以下罪壬寅命先免河南四十五年田賦癸卯肅親王蘊著卒乙巳上詣黑龍潭祈雨辛亥命減河南軍流以下罪乙卯賜戴衢亨等一百五十七人進士及第出身有差五月庚申朔以山東荒歉命預免四十五年錢糧丁卯命山西巡撫兼理河東鹽政戊辰怡親王弘曉卒六月乙未以九江關監督全德浮收逮治之閏六月癸亥河南祥符河決秋七月癸巳河南儀封考城河決乙未命袁守侗往河南會同河督姚立德巡撫鄭大進查辦河工戊戌命高晉督辦隄工丁未上詣盛京謁陵免經過直隸奉天各州縣本年額賦十分之三八月癸酉以儀封決河下注安徽鳳陽各州縣諭薩載等賑災民甲戌上謁永陵乙亥行大饗禮己卯上謁福陵免奉天所屬府州縣明年丁賦庚辰行大饗禮上謁昭陵辛巳行大饗禮命奉天吉林黑龍江各屬已結未結死罪均減等軍流以下悉宥之癸未上臨奠克勤郡王岳託墓甲申上臨奠武勳王揚古利弘毅公額亦都直義公費英東墓乙酉上詣文廟