之三以永保為貴州巡撫賚江南浙江耆民戊寅祭河神上渡河減江蘇安徽浙江三省軍流以下罪壬午免江南江寧蘇州浙江杭州等附郭諸縣額賦甲申免兩淮竈戶四十五六兩年逋賦三月丙戌朔祭江神上渡江幸金山丁亥上幸焦山調周煌為左都御史己丑以王杰為兵部尚書俟服闋後供職辛卯上幸蘇州府壬辰免湖北江夏等二十四州縣衞三十年至四十四年逋賦乙未上詣文廟行禮丁酉再免浙江杭州嘉興湖州三府屬額賦十分之三己亥上幸海寧州祭海神以福建欽賜進士郭鍾岳年屆一百四歲來浙迎鑾賞國子監司業庚子上幸尖山觀潮閱視塘工辛丑上幸杭州府癸卯上詣聖因寺祭聖祖神御戊申上閱福建水師庚戌上自杭州回鑾改慶桂為福州將軍以都爾嘉為吉林將軍增西安副都統一甲寅上駐蹕蘇州府巴延三褫職閏三月丙辰朔兵部尚書福隆安卒以福康安為兵部尚書復興署工部尚書壬戌上幸江寧府甲子祭明太祖陵乙丑上閱江寧府駐防兵戊辰上渡江丙子上祭河神渡河以伊齡阿為總管內務府大臣是月免江蘇上元等八州縣衞安徽懷寧等十州縣安慶等三衞上年水旱災額賦夏四月丙戌免直隸宛平等五州縣上年水災額賦庚寅上祭禹廟壬寅以李綬為江西巡撫甲辰以河南衞輝等屬旱免汲縣等十六縣逋賦乙巳免直隸大名等七州縣逋賦丙午甘肅新教回人田五等作亂命李侍堯剛塔剿之丁未上還京師以海祿為烏什參贊大臣庚戌免陝西甘肅三十八年至四十六年逋賦辛亥調李綬為湖南巡撫以伊星阿為江西巡撫甲寅賜茹棻等一百十二人進士及第出身有差是月免湖北黃梅等四縣武昌等三衞上年水災額賦五月丙辰綽克托以緣事褫職逮問以慶桂為工部尚書調常青為福州將軍以永鐸為杭州將軍己未命慶桂在軍機處行走壬戌上秋獮木蘭癸亥免陝西延安等三府州逋賦戊辰上駐蹕避暑山莊己巳命福康安海蘭察赴甘肅勦捕回匪甲戌命阿桂領火器健銳兩營兵往甘肅勦叛回以阿桂為將軍福康安海蘭察伍岱並為參贊大臣乙亥甘肅回匪陷通渭縣尋復之以舒亮為領隊大臣庚辰李侍堯坐玩誤褫職以福康安為陝甘總督剛塔以失機褫職逮問辛巳調慶桂為兵部尚書復興為工部尚書以阿揚阿為左都御史癸未江南巡撫郝碩坐貪婪逮問是月免山東兗州等三府州屬上年水災額賦六月庚寅免甘肅本年額賦甲午賑湖南茶陵攸縣水災壬寅東閣大學士三寶卒戊申以書麟為安徽巡撫是月免安徽懷寧等十三州縣衞上年水旱額賦秋七月甲寅朔日食丁巳禮部尚書曹秀先卒以姚成烈為禮部尚書調李綬為湖北巡撫以陸燿為湖南巡撫己未賜郝碩自裁甲子甘肅石峯堡回匪平俘賊首張文慶等予阿桂輕車都尉晉封福康安嘉勇侯擢海蘭察子安祿二等侍衞授伍岱都統俱給騎都尉和珅再給輕車都尉餘各甄有差丙寅以常青為烏魯木齊都統癸酉以伍彌泰為東閣大學士調和珅為吏部尚書協辦大學士兼管戶部以福康安為戶部尚書仍留陝西總督任戊寅命頒行軍紀律癸未李侍堯論斬宥剛塔罪戍伊犁是月免陝西榆林等八州縣上年旱災額賦八月己丑河南睢州河決命阿桂督治之癸巳免甘肅積年逋賦銀三十五萬兩糧四十七萬石各有差乙未以河南偃師縣任天篤九世同居賜御製詩御書扁額己亥上幸木蘭行圍辛丑張文慶等伏誅甲辰暹羅國長鄭華遣陪臣貢方物乞封九月癸丑朔賑安徽宿州等處水災乙卯以回匪平封和珅一等男庚申上駐蹕避暑山莊甲子調烏爾圖納遜為察哈爾都統積福為綏遠城將軍甲戌上還京師丙子宥綽克托罪庚辰命內大臣西明翰林院侍讀學士阿肅使朝鮮冊封世子是月賑陝西華州等三州縣水災冬十月辛卯命重舉千叟宴戊戌賑江西南昌等六縣水災己酉減京師朝審情實句到逾三次人犯罪十一月乙丑諭秋審朝審各犯緩決至三次者分別減等壬申睢州河工合龍庚辰命留保住為駐藏大臣以福祿為西寧辦事大臣十二月甲辰諭預千叟宴官民年九十以上者許其子孫一人扶掖大臣年逾七十者如步履稍艱亦許其子孫一人扶掖是歲朝鮮琉球暹羅安南來貢五十年春正月辛亥朔上以五十年國慶頒詔覃恩有差丙辰舉千叟宴禮宴親王以下三千人於乾清宮賞賚有差丁巳左都御史周煌致仕以紀昀為左都御史調吳垣為湖北巡撫以孫永清為廣西巡撫戊辰召奎林來京以拉旺多爾濟署烏里雅蘇台將軍甲戌喀什噶爾阿奇木伯克阿里木以潛與薩木薩克交通事覺處斬乙酉賑江西萍鄉等三縣水災丁亥上釋奠先師臨辟雍講學戊子免河南汲縣等十四縣逋賦己丑御試翰林院詹事府官擢陸伯焜吳璥為一等餘陞黜有差試六部陞用翰詹等官擢慶齡為一等餘陞黜有差辛卯調畢沅為河南巡撫何裕城為陝西巡撫甲辰免江南江寧等六府州逋賦是月賑江西萍鄉等三縣福建建安等二縣水災河南汲縣等十四縣旱災三月壬子上幸盤山甲寅上詣明長陵奠酒丁巳上駐蹕盤山辛酉截河南山東漕糧三十萬石賑河南衞輝旱災甲子免江蘇安東阜寧逋賦丙寅上還京師丁卯以永鐸為伊犁參贊大臣常青為西安將軍奎林為烏魯木齊都統復興為烏里雅蘇臺將軍以舒常為工部尚書孫士毅兼署兩廣總督乙亥免直隸霸州等四十九州縣逋賦丙子免河南商丘等六州縣上年水災額賦夏四月甲申甘肅肅州等處地震賑恤之壬辰上閱健銳營兵丁酉刑部尚書喀寧阿胡季堂侍郎穆精阿姜晟以檢驗失實降四品頂戴戊戌大學士蔡新致仕是月免河南汲縣等旱災額賦賑祥符等州縣旱災五月壬子免河南祥符等十六州縣鄭州等三十二州縣新舊額賦積欠甲寅調永保為江西巡撫陳用敷為貴州巡撫己未撥兩淮運庫銀一百萬兩交河南備賑丙寅上秋獮木蘭丁卯山西平陽等屬饑給貧民兩月糧壬申上駐蹕避暑山莊丙子命梁國治為東閣大學士兼戶部尚書劉墉協辦大學士以曹文埴為戶部尚書丁丑柘城盜匪平是月賑江蘇銅山等十六州縣山東陵縣等四十州縣旱災六月壬午以漕運遲誤薩載等下部嚴議分別賠償乙酉理藩院尚書博清阿卒丙戌以留保住為理藩院尚書辛丑以奎林署伊犁將軍永鐸署烏魯木齊都統乙巳命再截留江西漕糧十萬石於安徽備賑是月賑安徽亳州等八州縣旱災秋七月己酉調富勒渾為兩廣總督以雅德為閩浙總督浦霖為福建巡撫庚戌調浦霖為湖南巡撫以徐嗣曾為福建巡撫辛酉以李慶棻為貴州巡撫乙丑撥戶部銀一百萬兩交河南備賑辛未賑山西代州等六州縣水災乙亥以奎林為伊犁將軍永鐸為烏魯木齊都統八月乙酉命阿桂赴河南勘災兼赴江南山東查辦河運癸巳上幸木蘭行圍庚子賑陝西朝邑縣水災癸卯以伊桑阿為山西巡撫九月己酉命福康安赴阿克蘇安輯回衆以慶桂為烏什參贊大臣署陝甘總督降海祿為伊犁領隊大臣命明亮以伊犁參贊大臣署烏什參贊大臣甲寅上駐蹕避暑山莊戊午調永保為陝西巡撫何裕城為江西巡撫戊辰上還京師壬申賑江蘇長洲等五十六州縣衞旱災冬十月丁丑朔召勒保松筠回京命佛住駐庫倫會同蘊端多爾濟辦事庚辰賑湖南巴陵等十州縣旱災辛丑賑安徽亳州五十一州縣並鳳陽等九衞旱災是月免甘肅皐蘭等十二廳州縣衞本年雹水災額賦賑直隸平鄉等十六州縣水旱災河南永城等十二州縣旱災十一月乙亥以乾隆六十年乙卯正旦推算日食宣諭定次年歸政是月賑山東嶧縣等九州縣旱災甘肅河州等七州縣水雹災十二月丁丑以御史富森阿條陳地丁錢糧請收本色諭斥為斷不可行罷之丙戌以明亮為烏什參贊大臣慶桂為塔爾巴哈台參贊大臣壬寅禁廣東洋商及粵海關監督貢獻是月賑陝西朝邑等三縣水災是歲朝鮮來貢
