body:
  text: 清史稿卷十五本紀十五高宗本紀六五十一年春正月丙午朔日食免朝賀戊申命戶部撥銀一百萬兩解往安徽備賑辛酉禮部尚書姚成烈卒以彭元瑞代之丙寅以普福為駐藏大臣庚午江西巡撫何裕城奏糧價日昂由江楚販運過多所致上以意存遏糴切責之命范建中往哈密辦事二月庚辰上御經筵賜宴命工歌新譜抑戒詩歲為例加福建水師提督黃仕簡太子太保乙酉上幸南苑行圍辛卯命尚書曹文埴侍郎薑晟伊齡阿往浙省盤查倉庫壬辰上詣西陵巡幸五臺山免經過地方額賦十分之三丙申上謁泰陵泰東陵丁酉免直隸順德廣平大名三府屬上年災欠銀米己亥以圖薩布為湖北巡撫癸卯免山西欣州等六州縣逋賦三月丙午上駐蹕五臺山丙辰兩江總督薩載卒調李世傑代之以保寧為四川總督鄂輝為成都將軍己未上閲滹沱河閲正定鎮兵壬戌上祭帝堯廟癸亥命李侍堯署戶部尚書甲子賑陝西朝邑等三縣災民庚午上還京師辛未以伊齡阿為浙江巡撫夏四月己卯命大學士阿桂往江南籌辦河工乙酉浙江學政竇光鼐奏嘉興海鹽平陽三縣空各逾十萬郡縣採買倉儲俱折收銀兩以便挪移命曹文埴等嚴查覆奏賑山西代州等六州縣水災己丑命竇光鼐會同曹文埴等查辦浙江空五月丙午命阿桂赴浙會同曹文埴等查辦空並勘海塘丙辰富勒渾褫職交阿桂等審訊丁巳以孫士毅為兩廣總督調圖薩布為廣東巡撫以李封為湖北巡撫己未以李侍堯署湖廣總督辛未上秋獮木蘭賑四川打箭爐等地震災是月免江蘇上元等五十六州縣衛上年旱災額賦六月丁丑上駐蹕避暑山莊乙酉以福嵩署山西巡撫丁亥湖南常德府沅江溢辛丑調富綱為閩浙總督以特成額為雲貴總督以畢沅為湖廣總督江蘭為河南巡撫秋七月戊申免河南商丘等十二州縣上年旱災額賦壬子江蘇清河李家莊河溢丁巳命阿桂由浙江赴清口會同李世傑等辦理堵築事宜己巳曹錫寶劾和珅家人劉全不能指實加恩革職留任閏七月庚辰大學士伯伍彌泰卒召劉秉恬來京以談尚忠為雲南巡撫己丑浙江學政吏部右侍郎竇光鼐褫職庚寅富勒渾論斬乙未命和珅為文華殿大學士管理戶部事福康安為吏部尚書協辦大學士仍留陝甘總督任福長安為戶部尚書綽克托署兵部尚書戊戌賑湖南武陵龍陽水災八月丙辰上幸木蘭行圍庚申調嵩椿為綏遠城將軍積福為寧夏將軍九月戊寅上駐蹕避暑山莊丁亥以勒保為山西巡撫戊子以永保為塔爾巴哈臺參贊大臣以巴延三為陝西巡撫壬辰上還京師甲午調福長安署兵部尚書以綽克托署戶部尚書乙未以琅玕為浙江巡撫己亥皇長孫貝勒綿德卒賑安徽五河等十七州縣並鳳陽等五衛水災冬十月辛丑朔調富綱為雲貴總督以常青為閩浙總督丁未降畢沅仍為河南巡撫江蘭仍為河南布政使授李侍堯湖廣總督丁巳免直隸安州等四州縣被災額賦有差十一月賑安徽合肥等十七州縣水災十二月辛丑福建南靖縣匪徒陳薦等作亂捕治之壬子大學士梁國治卒命兵部尚書王杰在軍機處行走戊午封鄭華為暹羅國王丙寅福建彰化縣賊匪林爽文作亂陷縣城知縣俞峻死之命常青徐嗣曾等勦辦是歲朝鮮琉球暹羅來貢五十二年春正月辛未林爽文陷諸羅竹塹癸酉命鄂輝署四川總督乙亥宥富勒渾罪丁丑調李侍堯為閩浙總督常青為湖廣總督仍留福建督辦軍務命舒常署之癸未林爽文陷鳳山知縣湯大全死之甲申常青以守備陳邦光督義民守鹿仔港收復彰化奏聞丁亥命王杰為東閣大學士管禮部事調彭元瑞為兵部尚書以紀昀為禮部尚書庚寅允戶部尚書曹文埴終養以董誥代之辛卯命松筠往庫倫辦事丁酉命常青渡臺勦匪二月壬寅林爽文復陷鳳山犯臺灣府柴大紀督兵民禦之癸卯以李綬為左都御史乙巳以長麟為山東巡撫壬子免臺灣府屬本年額賦丙辰復諸羅甲子上詣東陵丁卯上謁昭西陵孝陵孝東陵景陵三月癸酉上回蹕丙子以重修明陵成上臨閲申禁樵採辛巳復鳳山辛卯以薑晟為湖北巡撫黃仕簡以貽誤軍機褫職令其長孫嘉謨襲公爵乙未逮黃仕簡下獄夏四月辛丑以常青為將軍恆瑞藍元枚為參贊調藍元枚為福建水師提督柴大紀署陸路提督戊午上詣黑龍潭祈雨壬戌賜史致光等一百三十七人進士及第出身有差甲子上閲火器營兵五月丁卯朔烏里雅蘇台參贊大臣貢楚克扎布病免以三丕勒多爾濟代之戊辰授蘭第錫河東河道總督甲戌上秋獮木蘭庚辰上駐蹕避暑山莊湖南鳳凰廳苗作亂總兵尹德禧討平之六月庚戌免浙江仁和場潮衝蕩地額課壬子授柴大紀福建陸路提督兼管臺灣總兵事丙辰召福康安赴行在以勒保署陝甘總督秋七月壬辰以海蘭察為參贊大臣舒亮普爾普為領隊大臣率侍衛章京等赴臺灣勦賊癸巳賑安徽懷遠鳳陽等州縣水災賑山西豐鎮等九廳州縣旱災八月常青免命福康安為將軍赴臺灣督辦軍務辛亥上幸木蘭行圍九月壬申上回駐避暑山莊庚辰上回蹕壬午調柴大紀為福建水師提督以蔡攀龍為福建陸路提督並授參贊辛卯以諸羅仍未解圍催福康安徑勦大里杙賊並分兵進大甲溪冬十月丁未命福長安署工部尚書戊申修福陵丁未睢州下汛決口合龍丙辰命阿桂赴江南勘高堰等處堤工戊午免江蘇清河等二十三州縣及淮安等五衛本年水災漕項漕米有差辛酉以福州將軍恆瑞勦賊怯懦召來京調鄂輝代之賑直隸保安等七州縣旱災壬戌命江蘇浙江撥濟福建軍需錢各五萬貫十一月甲子朔加李侍堯孫士毅太子太保柴大紀太子少保賜臺灣廣東莊泉州莊義民御書扁額壬申以柴大紀固守嘉義封一等義勇伯世襲免臺灣嘉義縣五十四年額賦以巴延三奏達賴喇嘛遣使稱夷使申飭之乙酉奎林以婪贓褫職逮問以保寧為伊犁將軍調李世傑為四川總督以書麟為兩江總督陳用敷為安徽巡撫十二月丁未福康安等敗賊於崙仔頂莊等處解嘉義圍晉封福康安海蘭察公爵各賞紅寶石頂四團龍補褂己酉遷常青福州將軍以舒常為湖廣總督福長安為工部尚書以福康安劾柴大紀蔡攀龍戰守之功多不確實諭柴大紀堅持定見竭力固守蔡攀龍奮勇殺賊竟抵縣城或在福康安前禮節不謹致為所憎豈可轉沒其功遽加無名之罪以孫士毅調兵運械不分畛域賞雙眼花翎戊午以德成奏稱柴大紀貪縱廢弛命福康安李侍堯據實參奏並以喀什噶爾辦事大臣雅德在福建時徇隱逮之庚申伍拉納護福建巡撫以永鐸為盛京將軍尚安為烏魯木齊都統五十三年春正月丁卯免兵差經過之福建晉江等二十縣本年額賦有差辛未明興奏山西永寧等處河清丙戌柴大紀褫職逮問福州將軍常青以徇隱柴大紀褫職二月甲午朔獲林爽文賞福康安海蘭察御用佩囊議將辨有差晉封大學士和珅三等伯爵大學士阿桂王杰尚書福長安董誥議豫孫士毅輕車都尉世職乙未釋黃仕簡任承恩壬寅伊犁參贊大臣海祿以劾奎林失實褫職與奎林俱罰在拜唐阿上效力乙巳立先賢有子後裔五經博士辛亥上巡幸天津庚申獲臺灣賊首莊大田議提督許世亨等有差辛酉免天津府屬逋賦壬戌上御閲武樓閲兵三月戊辰命侍郎穆精阿赴湖北會同舒常查案壬申林爽文伏誅癸未再賞福康安海蘭察紫韁金黃辮珊瑚朝珠及福康安金黃腰帶夏四月辛丑以旱命刑部減徒以下罪丙午上閲健鋭營兵庚戌免江蘇清河等十八州縣淮安等五衛上年水災額賦有差己未富勒渾雅德以失察柴大紀論絞五月丁卯蠲河南商丘等六州縣上年水災額賦有差癸酉蠲直隸保安等七州縣上年水災民田旗地額賦庚辰上秋獮木蘭癸未宥常青罪庚寅賑臺灣難民六月丙申富綱奏緬甸孟隕差頭目業渺瑞洞等齎金葉表文進貢諭護送迅來行在戊戌賑湖南蝄浦縣水災免安徽鳳陽等四府州衛上年水災額賦有差辛丑賑湖北長陽縣水災丁未免陝西華州等三州縣五十一年水災額賦戊申安南人阮惠等叛逐其國王黎維祁維祁來求援命孫士毅赴廣西撫諭之免山西大同等九州縣上年旱災額賦秋七月辛酉朔以安南牧馬官阮輝宿奉黎維祁之母及子來奔諭孫士毅等撫恤之壬戌賑山東膠州壽光水災湖北荊州江溢府城及滿城均浸沒諭舒常等查勘撫恤丁丑賞還閩浙總督李侍堯伯爵豫現襲之李奉堯提督銜戊寅湖北武昌漢陽江溢以畢沅為湖廣總督伍拉納為河南巡撫明興為烏什辦事大臣賑安徽懷寧等州縣水災柴大紀處斬召薑晟來京以惠齡為湖北巡撫戊子廓爾喀據後藏濟嚨聶拉木命成德與穆克登阿勦之八月甲辰賑湖北監利石首水災丙午上幸木蘭庚戌以木蘭大水停行圍癸丑廓爾喀復陷宗喀以鄂輝為將軍成德為參贊大臣剿之丙辰安南阮嶽等遁命孫士毅督許世亨進剿命富綱統兵進駐蒙自戊午上回駐避暑山莊九月壬戌緬甸番目細哈覺控等入覲諭暹羅緬甸現均內附二國應修好不得仍前搆兵戊辰賑湖北沔陽黃岡水災癸酉免安徽宿州等二十一州縣衛上年水災額賦冬十月庚寅廓爾喀侵後藏薩喀命孫士毅出關督剿甲午賑湖北潛江水災丙申賑湖北江夏等三十六州縣水災己亥以黎維祁暗弱諭孫士毅選擇黎裔入京朝貢庚子命雲南提督烏大經統兵出關檄諭阮惠等來歸癸卯調舒濂為駐藏大臣以恆瑞為伊犁參贊大臣調都爾嘉為盛京將軍恆秀為吉林將軍改嵩椿為西安將軍以興兆代之琳寧為黑龍江將軍乙卯李侍堯病命福康安署閩浙總督十一月辛酉免安徽望江等二十六州縣衛本年被水額賦有差癸亥李侍堯卒以福康安代之以勒保為陝甘總督海寧為山西巡撫丙子修湖北江陵公安各隄免湖北江陵等三十六州縣本年水災額賦有差十二月己丑釋富勒渾雅德孫士毅奏敗賊於壽昌江癸巳又敗賊於市球江丙申收復黎城復封黎維祁安南國王封孫士毅為一等謀勇公許世亨為一等子戊申命孫士毅班師五十四年春正月己未以元旦受賀朝班不肅褫糾儀御史等職尚書德保摘翎頂都察院鴻臚寺堂官均下部嚴議庚申成德以收復宗喀濟嚨克聶拉木奏聞癸酉禮部尚書德保卒以常青代之甲戌以緬甸孟隕悔罪投誠諭令睦鄰修好並賜暹羅國王鄭華綵幣令其解仇消釁免福建淡水等六廳縣災欠額賦癸未阮惠復陷黎城廣西提督許世亨等死之召孫士毅來京削公爵調福康安為兩廣總督以伍拉納為閩浙總督梁肯堂為河南巡撫以海祿為廣西提督甲申安南國王黎維祁復來奔命安插廣西丙戌褫孫士毅職命仍以總督頂戴在鎮南關辦事二月庚寅以京察屆期豫大學士阿桂等議內閣學士謝墉等下部議處理藩院侍郎福祿原品休致豫總督福康安等議丁酉勒保陛見以巴延三署陝甘總督和闐領隊大臣格綳額以婪索鞫實處斬甲寅調蘭第錫為江南河道總督李奉翰為河東河道總督乙卯以安南瘴癘炎荒不值用兵詳諭福康安三月甲子免甘肅積年逋賦及未完籽種口糧免陝西延安等三府州未完倉穀諭福康安檄阮惠縛獻戕害提鎮之匪乙丑劉墉以上書房師傅曠職降侍郎銜以彭元瑞為吏部尚書孫士毅為兵部尚書丁卯上幸盤山夏四月戊子免奉天廣寧鳳凰二城屬上年水災額賦仍賑恤有差丙申晉贈許世亨伯爵令其子承謨襲召孫士毅回京庚子以恆瑞為烏里雅蘇台將軍福長安署兵部尚書諭福康安安插安南黎氏宗族舊臣豫從軍出力之諒山都督潘啓德以都司用壬寅命阿桂覆勘荊州堤工丁未宣