巳命馮光熊署雲貴總督大學士嵇璜卒召孫士毅入閣辦事癸丑停本年及明年木蘭行圍免直隸保定等府屬河南衛輝等府屬山東臨清等五州縣山西代州等三州縣被水額賦八月丁巳以直隸天津河間二府水災重免因災緩徵額賦戊午永定河南工決口合龍己巳以明歲御宇屆六十年普免各省漕糧一次甲戌上回蹕調福寧為河南巡撫穆和藺為山東巡撫江蘭護之福康安奏四川大寧教匪謝添秀等傳習邪教蔓延陝西湖北河南諭嚴為捕治丁丑免直隸通州等二十三州縣逋賦甲申畢沅降山東巡撫罰繳湖廣總督養廉五年以福寧為湖廣總督穆和藺留為河南巡撫九月己丑賑湖北沔陽等州縣水災丙申以秀林為吉林將軍己亥賑福建漳泉二府水災減直隸遵化內務府官地租命福寧駐襄陽督緝邪教案犯辛丑以校正石經加彭元瑞太子少保銜癸卯賑廣東高要等縣水災以湖北來鳳縣教匪段漢榮等糾衆拒捕諭責畢沅廢弛戊申免齊齊哈爾等三城水災逋賦冬十月丙辰免河南汲縣等九縣山東臨清等十州縣逋賦壬戌勒保奏獲邪教首犯劉松命安徽嚴緝其徒劉之協癸亥荷蘭入貢乙丑免福建漳州府屬四廳州縣本年水災額賦戊辰命將科布多威豁爾等七卡移駐原處北界餘地賞杜爾伯特汗瑪克素爾札布等遊牧己卯調陳用敷為湖北巡撫惠齡為安徽巡撫辛巳釋恆秀罪十一月丙戌以河南扶溝縣知縣劉清鼐疏防劉之協潛逃革逮穆和藺下部嚴議壬辰免山東臨清等州縣本年漕賦壬寅命富綱署刑部尚書甲辰穆和藺褫職發烏魯木齊效力以阿精阿為河南巡撫十二月丙辰普免各省積年逋賦丙子吏部尚書金簡卒以保寧代之以明亮為伊犁將軍戊寅命舒亮為黑龍江將軍改綏遠城將軍圖桑阿為西安將軍以永琨代之六十年春正月甲申朔日食免朝賀乙酉賑直隸天津等二十州縣河南汲縣等十四縣山東臨清等十州縣上年被水貧民有差丙戌召蘇凌阿來京調福寧為兩江總督復以畢沅為湖廣總督玉德為山東巡撫戊子調陳用敷為貴州巡撫英善為湖北巡撫畢沅兼署乙未以固倫額駙豐紳殷德為內務府大臣辛丑免山東積年逋賦庚戌免江蘇積年逋賦免江西應緩徵銀穀二月癸丑朔免廣東積年逋賦陳用敷以查拏要犯劉之協辦理錯謬褫職逮問調姚棻為貴州巡撫以成林為廣西巡撫丙辰免陝西積年逋賦貴州松桃廳苗匪石柳鄧等湖南永綏苗匪石三保等作亂戊午湖南苗匪陷乾州廳同知宋如椿等死之命福康安往勦畢沅駐常德籌辦糧餉庚申以大學士阿桂等書上諭不能稱旨停甄侍郎成策等下部議處豫總督福康安等議辛酉貴州苗匪圍鎮遠鎮總兵珠隆阿於正大營免奉天廣寧錦州旗地逋賦免甘肅皋蘭等四十五州縣積年逋賦丙寅命四川總督和琳赴酉陽州備苗孫士毅仍留四川辦理報銷丁卯免浙江積年民地竈地逋賦己巳苗匪陷永綏廳鴉酉寨鎮筸鎮總兵明安圖等死之辛未湖南永順苗匪張廷仲等作亂擾保靖瀘溪丙子免安徽積年逋賦壬午貴州苗匪擾思南印江一帶竄入四川秀山福康安赴銅仁督勦命德楞泰領巴圖魯侍衛等赴貴州軍營閏二月乙酉福康安奏解正大營之圍壬辰馮光熊留為貴州巡撫調姚棻為雲南巡撫以苗匪亂免貴州銅仁府屬松桃正大等處額賦乙未上詣東陵免經過地方錢糧十分之三戊戌上謁昭西陵孝陵孝東陵景陵己亥福康安奏解嗅腦圍乙巳福康安奏攻克石城勦除巖洞苗匪丁未上謁泰陵泰東陵尊孝賢皇后陵免兩淮場竈積欠戊申福康安奏解松桃之圍三月乙卯和琳奏肅清秀山後路命往松桃與福康安會剿以孫士毅署四川總督己未福康安奏殄除長沖卡落苗匪進兵楚境命額勒登保迅赴福康安軍營己卯福康安奏解湖南永綏匪圍夏四月辛卯臺灣彰化匪徒陳周全等作亂陷縣城尋復之癸巳竇光鼐以會試衡文失當降調以朱圭為左都御史仍留廣東巡撫任己亥以魁倫劾洋盜肆行命浦霖來京候旨調姚棻為福建巡撫以魁倫署之江蘭為雲南巡撫庚子賜王以銜等一百十一人進士及第出身有差癸卯賞會試薦卷文理較優之舉人徐炘傅淦李端內閣中書戊申上詣廣潤祠祈雨是夜雨丁未免貴州官兵經過地方本年額賦有差福康安等奏克黃瓜寨己酉以福寧惠齡經理湖南軍務未竣命蘇凌阿仍署兩江總督費淳為安徽巡撫庚戌免福建龍溪等四縣上年水災額賦有差匪首陳周全等伏誅五月丙辰上幸避暑山莊伍拉納浦霖以辦理災賑不善褫職鞫治命魁倫兼署閩浙總督免經過地方本年錢糧十分之三丁巳調費淳為江蘇巡撫仍留惠齡為安徽巡撫福康安等奏克構皮寨及蘇皮寨等處調福康安為閩浙總督勒保為四川總督以宜綿為陝甘總督壬戌上駐蹕避暑山莊甲子以福建倉庫虧缺查實申飭科道無人奏及並命嗣後陳奏地方重大事件毋忝言責召阿精阿來京以景安為河南巡撫丁卯召惠齡來京以汪新為安徽巡撫戊辰命蘇凌阿駐清江浦兼署江蘇巡撫辛未以于敏中營私玷職褫輕車都尉世職六月壬午以湖南苗匪擾鎮筸後路諭責福寧怯懦劉君輔株守命惠齡仍署湖北巡撫戊子以旱命刑部清理庶獄減徒以下罪承德府如之庚寅福康安等奏克沙兜多喜等處苗寨乙未賑廣東南海等縣水災戊申姚棻以質訊解任命魁倫兼署福建巡撫長麟署閩浙總督秋七月庚申德明以罣纍滋陽縣知縣陳照自縊論絞乙丑免湖北江陵等十二州縣衛上年水災額賦丙寅以福康安等奏連克苗寨渡大烏草河賚珍物壬申哲布尊丹巴呼圖克圖等入覲召見賜茶八月壬午調永琨為烏里雅蘇台將軍恆瑞為綏遠城將軍癸未賜南掌國王召溫猛緬甸國王孟隕敕諭均賚文綺丙申允兵部尚書劉乞休以朱圭代之仍留廣東巡撫任以金士松為左都御史丁未免直隸通州等五十二州縣積欠旗租福康安等進駐楊柳坪九月辛亥上御勤政殿召皇子皇孫王公大臣等入見宣示立皇十五子嘉親王為皇太子明年為嗣皇帝嘉慶元年撫恤江蘇海州等七州縣水災壬子皇太子及王公內外文武大臣蒙古王公等各奏籲請俟壽躋期頤再舉行歸政典禮不允丙辰富勒渾雅德以前總督婪贓均褫職分別發熱河伊犁效力己未上閲健鋭營兵晉封福康安忠鋭嘉勇貝子和琳一等宣勇伯庚申上命皇太子謁東陵西陵乙丑黑龍江將軍舒亮以婪索褫職鞫治調永琨代之命圖桑阿為烏里雅蘇臺將軍改恆瑞為西安將軍以烏爾圖納遜代之命博興為察哈爾都統調特克慎為庫倫辦事大臣策巴克為西寧辦事大臣丙寅明亮以任黑龍江將軍時侵漁貂皮褫職命保寧為伊犂將軍己巳舒亮論絞明亮留烏魯木齊效力癸酉以奉天山西四川湖南貴州廣西賦無逋欠免明年正賦十分之二乙亥免福建龍溪等六縣華封羅溪二縣上年被水額賦冬十月戊寅朔頒嘉慶元年時憲書庚辰福康安等奏擒匪首吳半生賞福康安之子德麟副都統銜和琳黃帶餘議賞賚有差甲申以伍拉納等貪黷敗檢戍其子於伊犁長麟以徇庇伍拉納浦霖褫職命來京以魁倫署閩浙總督姚棻署福建巡撫乙酉普免天下嘉慶元年地丁錢糧丙戌伍拉納浦霖處斬壬辰以額勒登保德楞泰勦捕苗匪奮勇授內大臣乙未命定丙辰年傳位典禮癸卯命明年正月初吉重舉千叟宴十一月丁巳福康安等奏克天星寨等處加和琳太子少保銜賞福康安和琳上用黃𩹉玄狐端罩各一庚申賑奉天金州熊嶽錦州三城寧海等三州縣旱災旗民免額賦有差乙丑上命皇太子居育慶宮十二月戊寅朔諭曰朕於明年歸政後凡有繕奏事件俱書太上皇帝其奏對稱太上皇戊子賑貴州銅仁被擾難民福康安等奏克天星等苗寨壬寅允朱圭收英吉利國王表貢賜敕嘉賚交英商波郎齎回並以其表言勸廓爾喀投順于賜敕內以無須英國兵力告之甲辰賜琉球國王尚溫敕諭丁未以來歲元旦傳位皇太子為嗣皇帝前期遣官告祭天地宗社是歲緬甸南掌暹羅安南英吉利琉球廓爾喀來貢嘉慶元年正月戊申朔舉行授受大典立皇太子為皇帝尊上為太上皇帝軍國重務仍奏聞秉訓裁決大事降旨敕宮中時憲書用乾隆年號三年冬上不豫四年正月壬戌崩壽八十有九是年四月乙未上尊諡曰法天隆運至誠先覺體元立極敷文奮武孝慈神聖純皇帝廟號高宗九月庚午葬裕陵論曰高宗運際郅隆勵精圖治開疆拓宇四征不庭揆文奮武於斯為盛享祚之久同符聖祖而壽考則逾之自三代以後未嘗有也惟耄期倦勤蔽於權幸上纍日月之明為之歎息焉
