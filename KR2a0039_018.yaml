縣甘肅固原等五州縣水旱災雹災口糧籽種二月壬午御試翰林詹事等官擢李國嵵四員為一等餘升黜有差丙戌以謁東陵命肅親王敬敏等留京辦事命林則徐赴虎門澳門防外海洋船進口及內匪出洋三月庚子上謁東陵免經過地方額賦十分之三辛丑吳椿病免調何淩漢為戶部尚書以陳官俊為工部尚書龔守正為禮部尚書廖鴻荃為左都御史癸卯上謁昭西陵孝陵孝東陵景陵裕陵詣端慧太子園寢奠酒乙巳陶澍病免調林則徐為兩江總督以陳鑾署之裕謙署江蘇巡撫以桂良為湖廣總督朱樹為河南巡撫丙午上幸南苑行圍辛亥上還京師乙卯林則徐等奏躉船呈繳煙土諭嘉之豫奬准林則徐等奏暫緩議斷互市烏魯木齊都統廉敬遷成都將軍以惠吉代之以恩銘為熱河都統隆文為刑部尚書丙辰以鐵麟為左都御史夏四月辛未以吳文鎔為福建巡撫丁丑調周天爵為河南巡撫朱樹為漕運總督戊子上詣萬壽山殿祈雨丁酉以直隸旱免奉天山東河南來直米稅五月辛丑雨豫告大學士盧蔭溥卒是月賑雲南浪穹鄧川二州縣地震災額賦六月丙寅閩浙總督鍾祥以關防被竊褫職以周天爵代之以牛鑑為河南巡撫丁亥太子少保前兩江總督陶澍卒辛卯調周天爵為湖廣總督秋七月壬子命林則徐以禁販鴉片檄諭英吉利國及各國在粵洋商是月給湖南華容縣水災口糧八月庚午經額布遷成都將軍以托渾布為山東巡撫召烏里雅蘇台將軍保昌來京以廉敬代之是月給陝西葭州等三州縣被災口糧九月庚子命托渾布查辦山東登州海賊整頓水師辛丑上閲健鋭營兵己酉哈豐阿遷廣州將軍調棍楚克策楞為黑龍江將軍德克金布為綏遠城將軍冬十月山西巡撫申啓賢卒賜恤如尚書例以楊國楨為山西巡撫是月賑安徽無為等十一州縣及屯坐各衛水災賑湖北黃梅等三縣災民給湖北沔陽等九州縣山東蒙陰縣陝西府谷神木二縣湖南華容縣九州衛水災旱災口糧蠲緩安徽無為等三十二州縣湖北沔陽等二十六州縣河南睢州等二十一州縣湖南澧州等九州縣衛水災新舊額賦十一月庚子英船入廣東海港林則徐督官軍擊走之停其貿易以程懋來為安徽巡撫戊申德克金布遷廣州將軍以松溥為綏遠城將軍舒倫保為黑龍江將軍庚戌命濟克默特赴庫倫迎哲布尊丹巴呼圖克圖來覲是月給江西德化等七縣山西應州等四州縣災民口糧蠲免江西南昌等二十三縣山西應州等八州縣直隸安州等五州縣被災新舊額賦十二月癸亥署兩江總督陳鑾卒調鄧廷楨為兩江總督林則徐為兩廣總督裕謙為江蘇巡撫癸酉哲布尊丹巴呼圖克圖等覲見調伊里布為兩江總督鄧廷楨為雲貴總督癸未命刑部尚書隆文在軍機大臣上行走調鄧廷楨為閩浙總督桂良為雲貴總督戊子陳官俊免以廖鴻荃為工部尚書軍機大臣文慶免是歲朝鮮琉球入貢二十年春正月壬辰朔加王鼎太子太保戊戌以阿勒精阿為熱河都統己亥理藩院禁哲布尊丹巴呼圖克圖用旗繖並未奏明奕紀褫御前大臣戶部尚書總管內務府大臣並紫韁免管理藩院賽尚阿降二品頂戴調隆文為戶部尚書壬寅皇后鈕祜祿氏崩戊申諡大行皇后為孝全皇后庚戌奕紀逮問庚申以奕紀收沙布朗餽送銀遣戍黑龍江賽尚阿等均下部嚴議二月癸亥以阿勒精阿為刑部尚書訥爾經額為熱河都統哈豐阿為西寧辦事大臣丁卯戶部尚書何淩漢卒以卓秉恬代之以祁寯藻為兵部尚書沈岐為左都御史丁丑河東河道總督栗育美卒以文沖為河東河道總督是月給安徽桐城縣貧民口糧貸山西河保等營兵丁穀石三月命何汝霖在軍機大臣上學習行走召奕山來京以布彥泰為伊犁將軍辛亥以壁昌為察哈爾都統是月貸山西吉州等九州廳縣倉穀夏四月辛酉朔冊諡孝全皇后翼日頒詔己巳調經額布為吉林將軍丙子以祥康為庫倫辦事大臣戊寅上詣黑龍潭祈雨乙酉賜李承霖等一百八十人進士及第出身有差戊子上詣廣潤祠祈雨是月貸直隸紫金關及所屬浮圖峪等三營辨兵倉穀六月丁卯以色克津阿為綏遠城將軍丁丑林則徐等奏擊燬載煙洋艇庚辰英船入浙洋圍定海縣城命余步雲會烏爾恭額等援之甲申英人陷定海縣知縣姚懷祥等死之褫烏爾恭額及浙江提督祝廷彪職仍留任調瑚松額為熱河都統訥爾經額為陝甘總督秋七月癸巳英船犯浙江乍浦海口命奇明保率兵禦之英師犯福建厦門炮台參將陳勝元等擊卻之丙申褫浙江巡撫烏爾恭額職以劉韻珂代之丁酉命伊里布為欽差大臣赴浙江勦辦以裕謙兼署兩江總督以湍多布為伊犁參贊大臣花山太為塔爾巴哈台參贊大臣甲辰英船泊天津口外遞信與琦善訴屈命琦善接收仍飭勿進口丙午花山太遷喀什噶爾辦事領隊大臣調湍多布為塔爾巴哈台參贊大臣以福興阿為伊犁參贊大臣庚戌林則徐等奏續獲販煙人犯諭以空言搪塞切責之乙卯英船至山海關等處丙辰命伊里布等英人如有投遞書信即接受馳奏是月賑湖北沔陽等三州縣水災八月甲子以邵甲名署浙江巡撫丙子英人復侵福建厦門提督陳階平等擊走之己卯命琦善為欽差大臣赴廣東查辦並諭伊里布及沿海督撫防守耍隘洋船停泊外洋勿問調訥爾經額署直隸總督以瑚松額署陝甘總督庚辰廉敬遷成都將軍以德楞額為烏里雅蘇台將軍辛巳裕謙奏英人呈遞原書不敢上聞諭切責之是月給江蘇上元等十四縣水災口糧並修屋費九月庚寅林則徐鄧廷楨命交部嚴加議處以琦善署兩廣總督辛卯以托渾布奏英船南去命耆英托渾布酌撤防兵召鄧廷楨來京以顏伯燾為閩浙總督張澧中為雲南巡撫甲午諭周天爵等恤湖北各州縣水災乙未褫林則徐鄧廷楨職命赴廣東候查問己亥英船入浙江慈溪餘姚二縣內洋伊里布等擊走之以烏爾恭額不代奏英人書信逮問是月給江蘇泰興縣水災口糧十月壬申以謁陵命莊親王等留京辦事壬午以孝全皇后梓宮奉安龍泉峪上詣觀德殿行祖奠禮乙酉調祿普為烏里雅蘇台將軍是月賑直隸滄州等三州縣災民給安徽東流含山二縣軍民口糧貸奉天白旗堡小黑山水災口糧蠲緩直隸滄州等三十三州縣湖北沔陽等八州縣衛水災新舊正雜額賦十一月庚寅上謁西陵免經過地方額賦十分之五甲午上謁泰陵泰東陵昌陵並詣孝穆皇后孝慎皇后陵寢奠酒孝全皇后梓宮前行遷奠禮乙未孝全皇后梓宮奉安地宮上臨視命皇子行禮己亥上還京師癸卯祿普改荊州將軍調奕湘為烏里雅蘇台將軍英人陷定海戊申烏爾恭額論絞壬子伊里布奏英人要求澳門定海貿易諭琦善令英人退還定海癸丑以周天爵擅用非刑褫職遣戍伊犁以裕泰為湖廣總督以吳其濬為湖南巡撫是月賑江蘇上元等十六縣直隸天津縣水旱災貸江蘇江寧駐防及督協各營駐扎災區兵餉黑龍江墨爾根城水災屯丁口糧屋費蠲緩江蘇泰州等七十二州縣衛直隸天津縣山西河曲縣新舊額賦十二月以孝全皇后升祔奉先殿上親詣告祭翼日命皇四子行禮戊辰調余步雲為浙江提督以鐵麟為察哈爾都統恩桂為左都御史以壁昌為伊犁參贊大臣己卯調吳文鎔為湖北巡撫以劉鴻翱為福建巡撫癸未召瑚松額來京以恩特亨額署陝甘總督是月給福建龍溪南靖二縣水災口糧屋費貸江蘇江陰等三營兵餉蠲緩浙江長興等四縣水旱災新舊正雜額賦是歲朝鮮入貢
