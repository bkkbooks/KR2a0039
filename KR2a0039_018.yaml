body:
  text: 清史稿卷十八本紀十八宣宗本紀二十一年春正月辛酉扎隆阿免以哈喨阿楊芳護理喀什噶爾參贊大臣乙丑容安論斬丙子以魏元烺為福建巡撫朝鮮國王李玜請封其孫奐為世孫貢方物是月給江蘇沛縣安徽蕪湖等八州縣衛浙江富陽縣被災口糧貸三姓雙城堡兵民直隸磁州等九州縣湖南安鄉華容二縣河南武安縣甘肅會寧等五縣被災口糧屋費籽種蠲緩吉林等四處兵民新舊額賦二月己丑御經筵辛卯以謁西陵命奕紹等留京辦事那彥成以驅逐安集延回民啓釁褫太子太保並褫其子容照侍郎乙未褫那彥成職調琦善為直隸總督王鼎署以鄂山為四川總督那彥寶署史譜為陝西巡撫戊戌申禁各省種鬻鴉片辛丑上謁西陵乙巳謁泰陵泰東陵昌陵上閲視萬年吉地賜名龍泉峪丙午上再謁昌陵行敷土禮御隆恩殿行大饗禮是月貸湖北荊門營上年被水兵丁倉穀三月癸丑朔釋英和並其子奎照奎耀回京廣東黎匪作亂命李鴻賓勦之辛酉以廣東貿易英吉利人違禁令命李鴻賓等查覆是月貸湖北督標撫標暨武昌黃州各營兵丁倉穀夏四月戊子上閲健鋭營兵癸卯上詣黑龍潭神祠祈雨廣東黎匪平五月丙寅湯金釗緣事降並罷上書房總師傅調潘世恩為吏部尚書朱士彥工部尚書白鎔都察院左都御史戊辰命長齡赴喀什噶爾商辦勦撫及善後事宜辛未雨六月丙申申定官民買食鴉片煙罪例己亥賑安徽泗州等二十五州縣水災庚戌以湖北沔陽等二十州縣水災命平糶倉穀免湖北關津米稅是月給江蘇上元等九縣衛水災口糧貸江蘇淮安衛災屯籽種秋七月戊午命陶澍偕程祖洛辦江蘇災賑以安徽水災准鄧廷楨買鄰省米麥平糶並備兵糈癸酉以誣陷回王伊薩克叛逆扎隆阿論斬辛未移回疆參贊大臣及和闐領隊大臣駐葉爾羌添設總兵駐巴爾楚克己卯命穆彰阿朱士彥往江南查辦賑務是月給湖南武陵等五州縣貴州桐梓縣石峴衛水災口糧貸江蘇江寧等六營災區兵餉八月己丑萬壽節上詣皇太后宮行禮御正大光明殿王以下文武各官蒙古王公外藩使臣等行慶賀禮停筵宴辛卯晉長齡太傅乙未松筠病免調穆彰阿兵部尚書富俊工部尚書以博啓圖為理藩院尚書辛丑暹羅國王遣貢使載內地遭風官民回廣東溫諭奬賚之癸卯以保昌為熱河都統以吳榮光為湖南巡撫是月給江蘇甘泉等十一州縣湖北江夏等十六州縣江西德化等二十縣水災口糧籽種貸江南江寧駐防及溧陽營兵米九月甲子福克精阿緣事褫職以寶興為吉林將軍丁丑越南國王遣使送遭風難民回福建溫諭奬賚之冬十月嚴烺病免以林則徐為河東河道總督己丑改喀什噶爾幫辦大臣為領隊大臣乙未命截留江西漕米八萬石賑南昌九江飢民是月賑安徽無為等二十三州縣衛江蘇上元等二十六州縣浙江仁和等七縣衛兩淮丁溪等六場水災給安徽桐城等十州縣湖南武陵等五縣江西德化縣口糧修屋費貸甘肅皋蘭等十八州廳縣口糧湖南武陵龍陽二縣民隄修費十一月丙辰大學士托津病免授吳邦慶漕運總督己巳松筠罷內大臣降三品頂戴休致是月貸奉天鐵嶺等五州廳及巨流河四處口糧江西南昌等六縣修隄費蠲緩寧古塔雙城堡雹災霜災新舊額賦十二月乙酉以富俊為大學士管兵部文孚協辦大學士調穆彰阿為工部尚書以那清安為兵部尚書升寅為都察院左都御史彥德為綏遠城將軍乙巳以吳邦慶為江西巡撫蘇成額為漕運總督是月展賑湖北江夏等十六州縣水災給江蘇上元等二十五州縣衛及丁溪十五場水災口糧貸江蘇鎮江等二十七營湖南常德澧州各營水災兵餉十二年春正月辛酉免浙江杭州等三府商船米稅丁卯陳若霖免以戴敦元署刑部書癸酉王引之丁憂以汪守和為禮部尚書是月賑安徽懷寧等二十一州縣水災旱災並給懷寧等十七縣衛貧民口糧貸直隸大名等四州縣河南商丘等三縣災民米穀陝西葭州等四州縣江西南昌等十六縣湖北江夏等二十州縣衛湖南武陵等十州廳縣衛甘肅渭源等七州縣貴州桐梓縣災民口糧籽種二月戊寅湖南江華縣瑤賊趙金龍作亂命盧坤等勦之己卯御經筵甲申梁中靖奏查辦邪教株連冤抑諭斥之辛卯鍾昌降調授戴敦元刑部尚書乙未閩浙總督孫爾準卒以程祖洛為閩浙總督林則徐為江蘇巡撫吳邦慶為河東河道總督周之琦為江西巡撫丙申命李鴻賓勦瑤賊壬寅以謁東陵命奕紹等留京辦事三月己酉湖南提督海陵阿副將馬韜等勦瑤賊于寧遠失利死之壬子上謁東陵免經過地方額賦十分之三乙卯上謁昭西陵孝陵孝東陵景陵裕陵丙辰召瑚松額以奕皓署盛京將軍己未上幸南苑行圍庚申召長齡癸亥上還京師庚午命戶部尚書禧恩赴湖南勦瑤賊以文孚署戶部尚書是月展賑湖北江夏漢川二縣水災給安徽青陽縣災民口糧貸甘肅皋蘭等七州縣災民湖南乾州等五州縣屯丁口糧籽種湖北督標提標及武昌城守營被災兵丁倉穀夏四月癸巳祈雨戊戌雨辛丑賜吳鍾駿等二百六人進士及第出身有差乙巳盧坤等敗瑤賊於羊泉盡殲之獲趙金龍子及賊首五十餘人是月再給江蘇揚州水災倉穀五月丁未減福建水陸各營及浙江馬步兵有差壬子以趙金龍已斃餘賊悉平賞盧坤羅思舉雙眼花翎一等輕車都尉世職加湖南提督余步雲太子少保乙卯教匪尹老須等伏誅庚申上祈雨於黑龍潭戊辰上詣天神壇祈雨己巳詔刑部清釐庶獄是月貸山西大同等三縣被災兵民倉穀六月庚辰上步詣社稷壇祈雨壬午求直言丁亥上詣黑龍潭祈雨壬辰以廣東提督劉榮慶勦連州瑤賊失利褫職李鴻賓褫職留任癸巳上步詣方澤祈雨乙未富俊以旱乞罷不允丙申霍罕遣使進表歸所虜喀什噶爾回民丁酉復松筠頭品頂戴癸卯上自齊宮步詣圜丘行大雩禮是日雨甲辰命禧恩瑚松額自湖南赴廣東勦瑤賊是月貸江蘇淮安衛水災屯田籽種秋七月丁未宥容安遣戍吉林戊申以鍾昌為科布多參贊大臣命程祖洛清理浙江鹽政和闐回塔瓦克等糾衆作亂捕誅之乙丑廣西賀縣瑤盤均華等作亂祁勦平之是月賑福建澎湖廳風災給湖北天門縣水災口糧八月陶澍奏英船再入內洋或不遵約束當嚴懲諭以啓釁斥之甲午李鴻賓褫職並提督劉榮慶逮問調盧坤為兩廣總督命阮元協辦大學士仍留雲貴總督任以訥爾經額為湖廣總督鍾祥為山東巡撫是月賑山西朔州水災蠲緩安徽懷寧等二十九州縣衛上年水災旱災額賦九月甲辰朔以尹濟源為山西巡撫丙午南河龍窩汛隄盜決命穆彰阿會同陶澍查辦張井褫職留任丁未以英吉利船闌入內洋命沿海整飭水師甲寅以特依順保為伊犁將軍戊午廣東連州瑤平湖南瑤趙幅金等伏誅是月給江蘇桃源縣湖北天門縣等七縣衛水災口糧貸山西山陰縣歉收倉穀閏九月丁亥上簡閲健鋭營兵壬寅以朝鮮國王李玜卻英吉利貿易下詔褒奬之是月賑直隸阜平等十州縣災民貸河南祥符等七州縣陝西興安府水災口糧貸齊齊哈爾等處被旱兵丁銀穀冬十月乙巳廣東曲江乳源兩縣盜匪作亂勦平之丙午命朱士彥敬徵往江南查辦事件乙丑命穆彰阿至湖北會同訥爾經額查辦事件是月賑直隸吳橋東光二縣江蘇桃源等三州縣湖北漢川等四縣衛安徽五河縣兩淮板浦等三場水災旱災給江蘇海州等四州縣安徽五河等十一縣衛湖南安鄉華容二縣奉天錦州府屬旗民口糧貸山西大同鎮災區駐防倉穀蠲緩直隸吳橋等十七州縣江蘇桃源等六十三州廳縣衛安徽五河等三十九州縣衛浙江海寧等二十二州縣衛仁和場兩淮富安等十四場湖南安鄉等七州縣衛山西隰州等六州縣湖北漢川等二十六州縣衛水災旱災雹災新舊額賦十一月戊寅命署福州將軍瑚松額為欽差大臣都統哈喨阿為參贊大臣赴臺灣勦匪丙申撥京倉米一萬石賑順天府武清等八州縣災民丁酉李鴻賓遣戍烏魯木齊劉榮慶遣戍伊犁是月貸陝西漢中等五府州廳屬甘肅宜禾縣被災口糧吉林等七處籽種蠲緩甘肅宜禾縣逋租十二月甲辰撥浙江江西倉穀二十萬石濟福建民食丙午盧蔭溥豫假命王鼎管刑部己巳以孝順岱為科布多參贊大臣是月貸直隸災區各營兵餉山西豐鎮等六州廳縣災民倉穀是歲朝鮮南掌琉球暹羅入貢十三年春正月丁丑臺灣嘉義匪首陳辦伏誅己卯升寅等查覆西安將軍徐錕贓款屬實褫職丁酉以麟慶為湖北巡撫桃南廳決口合龍二月甲辰上御經筵己未四川越嶲等處夷匪作亂命那彥寶桂涵剿之庚申賑被災多倫諾爾租種蒙古地貧民並諭此後口外偏災不得援請壬戌以汪守和兼署吏部尚書是月賑直隸薊州等七州縣災民貸陝西漢中等五府州廳貧民倉穀三月丙子大學士盧蔭溥致仕辛巳上閲火器營兵丙申盧坤奏獲越南盜陳加海等洋面肅清戊戌以麟慶為江南河道總督以鄂順安為湖北巡撫庚子雨是月貸直隸紫荊關營兵奉天錦州府屬兵丁湖南乾州等五廳縣屯丁苗佃倉穀夏四月壬寅調鄂順安為山西巡撫尹濟源為湖北巡撫樂善遷福州將軍調慶山為烏里雅蘇台將軍丁未雨戊申瑚松額遷成都將軍調寶興為盛京將軍保昌為吉林將軍以蘇成額為熱河都統貴慶為漕運總督己酉命潘世恩為體仁閣大學士管戶部調朱士彥為吏部尚書以白鎔為工部尚書湯金釗為左都御史乙卯免道光十一年十二年喀什噶爾葉爾羌額貢己巳皇后佟佳氏崩是月貸盛京義州兵米湖南新田縣民瑤籽種五月辛未朔賜汪鳴相等二百二十人進士及第出身有差丁丑楊芳勦越嶲夷匪大敗之進勦邊夷匪己丑邊匪首桑樹格等伏誅丁酉禧恩免御前大臣戶部尚書改為理藩院尚書命大學士長齡管戶部潘世恩管工部調穆彰阿為戶部尚書博啓圖為工部尚書己亥四川邊夷匪平六月庚子朔日食是月貸直隸博野等三縣雹災籽種七月甲申御試翰林詹事官擢田嵩年三員為一等餘升黜有差壬辰冊諡大行皇后為孝慎皇后調祁廣東巡撫以惠吉為廣西巡撫是月賑貴州古州等四廳縣水災八月是月賑貴州都江等二廳水災九月庚午移孝慎皇后梓宮于田村上臨送乙亥晉楊芳一等侯壬辰以貴慶為熱河都統調嵩溥為漕運總督調史譜為貴州巡撫以楊名揚為陝西巡撫甲午免雲南昆明等十州縣地震災本年額賦並賑之是月賑江蘇上元等六縣水災十月戊午調布彥泰為伊犁參贊大臣常德為塔爾巴哈台參贊大臣己未以湯金釗為工部尚書史致儼為左都御史是月賑江蘇上元等十二縣衛湖南安鄉華容二縣直隸曲陽縣黑龍江三處災民賑湖北武昌等六縣水災給安徽懷遠等六縣災民口糧十一月丙戌上詣大高殿祈雪以裕泰為貴州巡撫丁亥以武忠額為熱河都統以凱音布署察哈爾都統十二月丁巳減免直隸河間等五縣水淹地賦是月賑江蘇上元等十二縣衛水災是歲朝鮮越南琉球緬甸入貢十四年春正月丁卯朔辛未文孚免正黃旗領侍衛內大臣以載銓代之丁丑緬甸貢使聶紐耶公那牙卒於京師庚辰廣東儋州黎匪作亂飭盧坤勦之甲申以浙江杭州等府災免外商及浙民運米關稅福建永安等縣土匪虜人勒贖捕治之允浙江杭州湖州兩府所屬漕糧紅白兼收秈竹敕並納丁亥命潘世恩在軍機大臣上行走戊子以三載考績豫長齡等議命松筠以都統銜休致祁奏越南諒山解圍七泉夷州知州阮文泉等求入關拒之是月賑直隸曲陽縣貧民給江蘇上元等八縣浙江海寧等四州縣江西南昌等二十二縣上