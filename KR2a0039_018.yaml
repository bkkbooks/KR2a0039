齡管理藩院文孚管戶部潘世恩管工部阮元改管兵部王鼎管刑部以朝鮮世孫李奐襲封朝鮮國王戊午吉林將軍蘇清阿卒調保昌代之以祥康為黑龍江將軍三月山西趙城縣匪曹順作亂知事楊延亮死之遂圍霍州命鄂順安勦辦乙亥上親耕藉田幸南苑行圍庚辰上還京師是月給甘肅皋蘭等五州縣廳災歉口糧夏四月四川邊支夷平晉鄂山太子太保賞雙眼花翎甲寅賜劉繹等二百七十六人進士及第出身有差丁巳上詣黑龍潭神祠祈雨五月丁卯致仕陝甘總督楊遇春晉封一等侯豫食全俸辛未趙城縣匪首曹順等伏誅丁丑上復詣黑龍潭神祠祈雨以栗育美為河東河道總督庚辰雨是月貸山西鳳台沁水二縣被旱倉穀六月丙午減江蘇丹徒被水蘆田額賦閏六月丁卯敬徵降調以載銓為工部尚書恩銘為禮部尚書武忠額為左都御史調保昌為烏里雅蘇台將軍祥康為吉林將軍哈豐阿為黑龍江將軍己巳停本年秋決秋七月甲辰文孚免軍機大臣仍命以大學士管吏部改潘世恩管戶部穆彰阿管工部命刑部右侍郎趙盛奎工部右侍郎賽尚阿在軍機大臣上學習行走是月給陝西沔縣洛川縣被水湖南華容等三縣衛被旱口糧八月甲子以皇太后六旬萬壽普免各省逋賦庚辰諭科道中馮贊勳金應麟黃爵滋曾望顏擢任京卿所以廣開忠諫務當不避嫌怨於民生國計用人行政闕失仍隨時據實直陳以資採納兩廣總督盧坤卒以鄧廷楨為兩廣總督祁署色卜星額為安徽巡撫甲申上謁西陵是日移孝慎皇后梓宮由田村啓行免經過地方額賦十之五是月給陝西府谷縣雹災口糧九月己丑孝穆皇后孝慎皇后梓宮至龍泉峪上臨奠庚寅上回鑾戊戌授麟慶江南河道總督丙午朱為弼病免以恩特亨額為漕運總督是月給兩淮板浦中正二場被水竈丁口糧緩徵陝西榆林縣葭州雹災江西金溪等九縣旱災額賦冬十月戊午以育書為科布多參贊大臣甲子以皇太后六旬聖壽上徽號曰恭慈康豫安成莊惠壽禧皇太后乙丑皇太后六旬聖壽節上率王公大臣詣壽康宮行慶賀禮上御太和殿羣臣進表行慶賀禮詔天下覃恩有差以富呢揚阿為烏魯木齊都統癸未御史湯鵬以劾載銓忤旨罷豫告大學士托津卒是月給山西陽曲等五州縣湖南嶽州衛浙江海寧等十三州縣被災口糧貸奉天金州水師營兵穀蠲緩湖南華容等十四州縣衛浙江海寧等三十一州縣衛被災新舊額賦雜款十一月戊戌臨大學士托津第賜奠是月給吉林等三處歉區口糧十二月己未上再詣大高殿祈雪乙丑孝穆皇后孝慎皇后梓宮奉安地宮乙亥以樂善為吉林將軍是月貸江蘇撫標及城守劉河二營災區兵餉蠲緩貴州松桃廳被水額賦是歲朝鮮琉球入貢十六年春正月乙未以車倫多爾濟為庫倫蒙古辦事大臣壬寅撥山東司庫銀五萬兩賑登萊青三府飢乙巳調裕泰為湖南巡撫以賀長齡為貴州巡撫是月賑浙江義烏等三縣水旱災給奉天廣寧等處水災旗民口糧貸甘肅金州等十四州縣江西蓮花等五十一廳縣陝西葭州等九州廳縣湖南澧州等四州縣山西保德等十五州縣水旱雹災口糧籽種倉穀二月丙辰調周之琦為湖北巡撫以陳鑾為江西巡撫己未以謁東陵命肅親王等留京辦事己巳上閲火器營兵癸酉上謁東陵免經過地方額賦十分之三丙子上謁昭西陵孝陵孝東陵景陵裕陵湖南武岡州匪藍正樽等作亂命吳榮光會同訥爾經額勦之戊寅免四川邊廳逋賦己卯上還京師夏四月癸亥以梁章巨為廣西巡撫丁丑賜林鴻年等一百七十二人進士及第出身有差是月貸甘肅秦州等八州縣被災口糧五月丙申上詣黑龍潭祈雨戊戌禮部尚書汪守和卒以吳椿為禮部尚書李宗昉為左都御史丁未上詣靜明園龍王廟祈雨是月貸直隸寶坻縣歉收口糧秋七月癸未以鍾祥為閩浙總督經額布為山東巡撫乙酉以哈豐阿舉發都統高喀鼐干預公事書信加太子太保己丑高喀鼐褫職遣戍熱河丙申大學士文孚致仕庚子命穆彰阿為大學士管工部琦善協辦大學士仍留直隸總督任調耆英為吏部尚書奕皓為戶部尚書禧恩為兵部尚書武忠額為理藩院尚書凱音布為左都御史樂善為察哈爾都統壬寅恩銘免尚書都統趙盛奎免軍機大臣及侍郎以貴慶為禮部尚書九月壬辰以富呢揚阿為陝西巡撫廉敬為烏魯木齊都統庚子上閲健鋭營兵戊申圓明園三殿災己酉以耆英受太監屬託褫尚書都統內務府大臣以奕經為吏部尚書寶興為盛京將軍左都御史凱音布遷成都將軍以敬徵代之是月賑盛京白旗堡等處山西朔州等十一州廳縣貴州松桃廳災民展賑陝西神木縣災民蠲免山西朔州等十一州廳縣陝西榆林府屬被災新舊額賦冬十月丙辰加長清太子太保貸甘肅涇州等八州縣山西山陰縣災歉口糧倉穀籽種蠲緩直隸景州等十二州縣水旱災新舊額賦十一月壬午以敬徵為工部尚書調武忠額為左都御史以奕紀為理藩院尚書癸卯上詣大高殿祈雪是月給陝西府谷等四縣霜雹災口糧蠲緩直隸安州等三州縣水災額賦十二月丁巳上再詣大高殿祈雪癸亥雪是歲朝鮮暹羅來貢十七年春正月己卯朔命奕紀為御前大臣賞長齡四開褉袍加潘世恩太子太保壬辰兵部尚書王宗誠卒以朱士彥代之丁酉山東濰縣教匪馬剛等作亂捕獲之庚子降訥爾經額湖南巡撫以林則徐為湖廣總督調陳鑾為江蘇巡撫裕泰為江西巡撫是月貸山西朔州等十一州廳縣陝西葭州等九州縣甘肅金州等十三州縣水災旱災蝗災雹災霜災倉穀口糧籽種二月乙卯福建嘉義縣教匪沈知等作亂捕誅之是月貸山西吉州等七州縣倉穀三月戊寅朔以詣髻山命惇親王綿愷等留京辦事庚寅上奉皇太后幸髻山免經過地方本年額賦十分之三