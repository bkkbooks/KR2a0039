西欣州等十七州縣廳歉收倉穀夏四月癸卯桂良留京以賀長齡為雲貴總督甲辰調吳其濬為福建巡撫惠吉為雲南巡撫以喬用遷為貴州巡撫丙午上詣黑龍潭祈雨壬子富呢揚阿卒以惠吉為陝西巡撫鄧廷楨署之以鄭祖琛為雲南巡撫乙卯賜蕭錦忠等二百十七人進士及第出身有差丙辰裕誠許乃普降調以敬徵為工部尚書何汝霖為兵部尚書五月丙戌雨丁亥上再詣黑龍潭祈雨是月給山東樂安等六縣水災口糧六月甲午允比利時國通商詔停本年秋決丙申命崇恩勦捕濮州鄆城等處捻匪辛丑賑臺灣彰化縣地震災民癸丑阿克蘇辦事大臣輯瑞以墾荒未奏率即興工褫職己未江蘇中河廳桃源汛河決甘肅西寧鎮總兵慶和遇番賊於金羊嶺死之命惠吉勦捕番賊是月緩徵山東濱州等四十二州縣衛被災逋賦秋七月辛未允丹麻爾國通商命大學士卓秉恬管兵部丙戌命達洪阿赴甘肅查辦番賊八月壬辰詔皇太后七旬萬壽免道光二十年以前實缺正雜田賦辛丑調鄭祖琛為福建巡撫梁萼涵為雲南巡撫吳其濬為山西巡撫敬徵病免調特登額為工部尚書以保昌為禮部尚書丙戌召林則徐回京以四五品京堂候補禧恩病免調奕湘為盛京將軍冬十月甲午加上皇太后徽號曰恭慈康裕安成莊惠壽禧崇祺皇太后上進冊寶率皇子及王公大臣等行慶賀禮戊戌皇太后七旬聖壽上率皇子王公大臣行慶賀禮辛丑李宗昉病免以祝慶蕃為禮部尚書魏元烺為左都御史癸卯以上皇太后徽號禮成頒詔覃恩有差丙午免直隸道光二十年以前民缺各項旗租是月賑直隸寶坻等四縣災民十一月辛酉陝甘總督惠吉卒以布彥泰為陝甘總督林則徐署之薩迎阿為伊犁將軍桂良為熱河都統癸亥御史陳慶鏞降調是月貸熱河圍場歉收兵丁銀十二月辛卯上詣大高殿祈雪戊戌免臺灣道光二十年以前民缺租穀糧米癸卯上再詣大高殿祈雪癸丑上復詣大高殿祈雪是歲朝鮮越南入貢二十六年春正月庚辰命賽尚阿周祖培查勘江防辛巳弛天主教禁以陸建瀛為雲南巡撫是月給奉天鳳凰城岫巖廳旗民直隸寶坻等四縣口糧貸甘肅靜寧等十三縣災民籽種二月己丑雲南永昌回匪作亂命提督張必祿勦之乙卯以謁陵命定郡堊載銓等留京辦事三月癸亥上謁西陵免經過地方額賦十分之三丁卯上謁泰陵泰東陵昌陵至孝穆皇后孝慎皇后孝全皇后陵奠酒庚午上幸南苑行圍辛未上行圍翌日如之乙亥上還京師興平倉火乙酉上詣黑龍潭祈雨以林則徐為陝西巡撫是月貸山西平定等九州縣歉收倉穀夏四月辛丑以雲南永昌回民藉端尋釁命賀長齡查辦丙午上詣黑龍潭祈雨庚戌以瑞元為科布多參贊大臣五月壬戌上詣黑龍潭祈雨乙丑張必祿敗回匪於永昌以上年殺永昌內應回民過多賀長齡下部議處丁卯上復詣黑龍潭祈雨英人退出舟山閏五月乙酉朔青海黑錯四溝番作亂命布彥泰剿之癸巳永昌回匪遁入猛庭賀長齡督兵剿之戊申以麟魁為烏里雅蘇台參贊大臣六月戊午命祁寯藻文慶查辦天津鹽務壬午以豫告大學士阮元重逢鄉舉晉太傅食全俸癸未達洪阿勦竄匿果岔番賊敗之秋七月辛卯禧恩以失察奸民褫公爵降鎮國將軍壬寅上閲吉林黑龍江官兵馬步射癸卯以雲南漢回積嫌未釋命賀長齡持平辦理勿分畛域辛亥申嚴門禁是月賑三姓及寧古塔等處水災八月壬申命盛京直隸江南浙江福建山東廣東七省將軍督撫籌辦練兵儲餉癸酉上閲火器營兵乙亥賀長齡以防勦無功降河南布政使命李星沅為雲貴總督調陸建瀛為江蘇巡撫以張日晸為雲南巡撫丙子布魯特匪入喀什噶爾卡倫命賽什雅勒泰勦之九月己亥湖南新田縣匪王棕獻等作亂捕誅之戊申以楊殿邦署漕運總督辛亥江蘇昭文縣匪金得順等作亂捕誅之是月賑山東東平萊蕪二州縣災民賑三姓琿春水災旗民給山東汶上等四縣災民口糧蠲緩奉天遼陽等十三州廳縣直隸霸州等三十五州縣山東東平等四州縣災歉新舊額賦十月丁巳免黑錯四溝番民額賦丙寅以徐繼畬為廣西巡撫是月給河南汲縣等八縣陝西府谷神木二縣災民口糧蠲緩湖南澧州等五州縣暨嶽州衛被災額賦十一月乙酉桂輪改荊州將軍以特依順為烏里雅蘇台將軍乙未上詣大高殿祈雪丙午命壁昌等籌議江蘇漕糧酌分海運己酉黃恩彤以奏請賜應試年老武生職銜下部嚴議辛亥命山東嚴緝虜人勒贖匪是月賑山西垣曲縣災民蠲緩山西保德等六州縣暨歸化城等三處浙江餘杭等四十四縣衛直隸安州等六州縣被災新舊額賦十二月癸丑黃恩彤褫職調徐廣縉為廣東巡撫以程矞采為雲南巡撫楊殿邦為漕運總督癸亥雲南猛統回匪竄入緬寧命陸建瀛查辦甲子西寧辦事大臣達洪阿病免以哈勒吉那代之戊辰以王兆琛為山西巡撫庚午命清釐刑部及直隸山東山西河南陝西甘肅各省庶獄命寶興留京管刑部賞琦善二品頂戴為四州總督丙子調鄭祖琛為廣西巡撫徐繼畬為福建巡撫是月給浙江縉雲宣平二縣水災口糧是歲朝鮮琉球入貢二十七年春正月癸未調成凱為塔爾巴哈台參贊大臣乙酉鐵麟遷荊州將軍以裕誠為察哈爾都統是月給浙江富陽等六縣衛安徽五河等三縣江蘇桃源等五縣衛上年災歉口糧河南河內等十三縣水旱災口糧籽種並貸輝縣等八縣倉穀貸陝西葭州等三州縣直隸霸州等三十九州縣災歉籽種口糧倉穀二月己未雲南雲州回匪作亂命李星沅勦之癸亥以謁陵命載銓等留京辦事丙子以福建海盜劫殺洋商命劉韻珂等搜捕戊寅上謁東陵免經過地方額賦十分之三是月給河南汲縣等五縣被災口糧乙未壁昌遷內大臣調李星沅為兩江總督以林則徐為雲貴總督楊以增為陝西巡撫戊戌英船退出虎門乙巳以魏元烺為禮部尚書賈楨為左都御史夏四月戊午布魯特匪復攻色埒庫勒伯克巴什等擊走之賽什雅勒泰等奏英人據音底努普爾各部咸附之丙寅免熱河豐寧縣逋賦及旗租銀癸酉賜張之萬等二百三十一人進士及第出身有差是月貸江西上高新昌二縣湖南鳳凰等五廳縣屯丁苗佃籽種口糧五月丙戌御試翰林詹事等官擢王慶雲四員為一等餘升黜有差何汝霖憂免調魏元烺為兵部尚書以賈楨為禮部尚書孫瑞珍為左都御史丁亥命文慶陳孚恩在軍機大臣上行走辛卯以廣東民情與洋人易啓釁端命擇紳士襄辦交涉事宜丁未擢曾國藩為內閣學士六月理藩院奏俄羅斯達喇嘛請在塔爾巴哈台伊犁喀什噶爾通商不許秋七月己卯命林則徐讞雲南回民控訴香匪殺無辜一萬餘人之獄乙未命林則徐讞雲南回民杜文秀控訴被誣從逆之獄癸卯以河南旱災發庫銀十萬兩並撥鄰省銀二十萬兩賑之八月己酉安集延匪犯喀什噶爾吉明等擊走之賽什雅勒泰自殺調奕山為葉爾羌參贊大臣癸亥以布彥泰赴肅州調度命楊以增署陝甘總督恆春署陝西巡撫甲子以喀什噶爾卡外布魯特安集延匪作亂命布彥泰為定西將軍奕山為參贊大臣討之以善燾為烏里雅蘇台參贊大臣以吉明署葉爾羌參贊大臣戊辰奕湘改杭州將軍調奕興為盛京將軍以英隆為綏遠城將軍以河南災廣再撥內帑銀三十萬兩並命戶部撥銀三十萬兩賑之丙子安集延匪圍英吉沙爾城命布彥泰駐肅州遣兵討之是月賑甘肅西寧縣水災緩徵山東樂安等六縣被水額賦並永利等四場竈課九月丁丑朔日食戊寅命文慶張澧中赴河南查賑辛巳吉明等遣兵援喀什噶爾擊安集延匪大敗之乙巳以法蘭西兵船入朝鮮命耆英言於法使令其退兵是月給河南禹州等四十一州縣旱災口糧蠲緩直隸安州等三十六州縣水旱災雹災新舊額賦冬十月辛酉湖南新寧縣瑤人雷再浩等作亂陸費瑔等捕討之乙丑上閲健鋭營兵戊辰奕山等勦安集延匪于葉爾羌之科科熱依瓦特大敗之庚午又敗之於英吉沙爾壬申安集延匪遁走喀什噶爾辦事領隊大臣開明阿等褫職逮問是月蠲緩安徽泗州等三十九州縣水旱災新舊額賦十一月甲申調英隆為黑龍江將軍成玉為綏遠城將軍壬辰以張澧中為山東巡撫乙未湖南新寧賊平庚子湖南道州匪竄廣西灌陽縣命鄭祖琛勦捕之是月給山西絳州等十一州廳縣口糧蠲緩直隸安州等三州縣山西絳州等十一州廳縣河南禹州等六十四州縣被災新舊正雜額賦十二月戊午湖南乾州廳苗匪作亂命裕泰等勦捕之甲戌召耆英還以徐廣縉署兩廣總督及欽差大臣辦理通商是月給河南祥符等十七縣水災口糧並貸鄭州等倉穀是歲朝鮮琉球來貢二十八年春正月丁丑加潘世恩太傅寶興太保保昌阿勒清阿李振祜成剛太子太保甲申湖南乾州廳苗匪降命裕泰分別懲辦仍搜餘匪辛卯命廓爾喀使附朝鮮暹羅使筵宴戊戌越南國王阮福卒停本年例貢免喀什噶爾民回各戶正雜逋賦是月展賑直隸鹽山等五縣災民給安徽鳳陽等三縣水旱災口糧貸湖南安鄉縣山西寧遠等四廳縣甘肅臯蘭等七縣災民口糧籽種二月壬子吏部尚書恩桂卒文慶罷軍機大臣調為吏部尚書以麟魁為禮部尚書桂良改正白旗漢軍都統以惠豐代為熱河都統以保昌為兵部尚書壬戌江西長寧崇義兩縣匪作亂命吳文鎔勦捕之甲子以謁陵命睿親王仁壽等留京辦事三月戊寅雲南趙州匪作亂命林則徐勦捕之以奕山為伊犁參贊大臣吉明為葉爾羌參贊大臣壬午上謁西陵免經過地方額賦十分之三丙戌上謁泰陵泰東陵昌陵詣孝穆皇后孝慎皇后孝全皇后陵寢奠酒庚寅上還京師癸卯裕誠遷荊州將軍以雙德為察哈爾都統是月貸山西吉州等七州縣歉收倉穀夏四月戊辰雲南保山匪平辛未廣西灌陽平樂陽朔等縣匪平六月癸卯朔以徐澤醇為山東巡撫丙午命耆英留京管禮部授徐廣縉兩廣總督欽差大臣辦理通商以葉名琛為廣東巡撫癸丑調耆英管兵部甲寅上詣黑龍潭祈雨戊辰以傅繩勛為江西巡撫庚午調吳文鎔為浙江巡撫秋七月庚寅加林則徐太子太保賞花翎八月丁巳河南巡撫鄂順安褫職以潘鐸代之辛酉俄羅斯商船請在上海貿易却之九月甲戌潘錫恩免以楊以增為江南河道總督陳士枚為陝西巡撫召成玉來京以盛塤署綏遠城將軍賑江寧等三府水災乙酉賑湖北水災癸巳召喬用遷來京以羅繞典署貴州巡撫是月給湖南武陵等四縣水災口糧屋費冬十月甲寅文華殿大學士寶興卒丁卯修巴爾楚克城是月賑直隸通州等七州縣安徽無為等十六州縣水災給安徽和州等十四州縣湖南華容縣嶽州衛災民口糧貸湖南安鄉縣澧州災民籽種蠲緩直隸通州等五十二州縣湖北沔陽等三十九州縣衛湖南澧州等九州縣安徽泗州等二十四州縣被災新舊額賦十一月乙亥封故越南國王阮福子福時為越南國王己卯命耆英為大學士管兵部以琦善為協辦大學士仍留四川總督任召瑞元來京以慧成為科布多參贊大臣御史張鴻升請鑄大錢下部議辛巳命定郡王載銓侍郎季芝昌查辦直隸鹽務大學士耆英侍郎朱鳳標查辦山東鹽務丁亥授耆英文淵閣大學士丁酉以托明阿為綏遠城將軍是月給江西德化等二十縣水災口糧貸湖南提標及常德等協營災區兵餉蠲緩江蘇泰州等七十七州廳縣衛兩淮呂泗等二十場江西德化等二十二縣直隸安州等六州縣水災新舊額賦十二月丙午上詣大高殿祈雪甲寅上詣大高殿祈雪辛酉上詣天壇祈雪壬戌以侍郎陳孚恩前署山東巡撫不收公費賞一品頂戴並御書扁額乙丑以倭什訥為吉林將軍成剛為禮部尚書柏葰為左都御史丙寅以張祥河為陝西巡撫是月賑直隸通州等十四州縣災民是歲朝鮮琉球暹羅越南入貢二十九年春正月癸未以奕格為烏里雅蘇台將軍辛卯命耆英季芝昌查閲浙江營伍及倉庫是月加賑安徽無為等十四州縣衛水災給湖南澧州等六州縣安徽和州等十三州縣水災口糧貸江西南昌等十二縣湖南澧州等六州縣水災籽種二月庚子朔日食辛丑命劉韻珂撫恤臺灣北路水災震災丙午諭李星沅辦江蘇賑務辛亥穆彰阿潘世恩陳官俊免上書房總師傅命祈寯藻杜受田為上書房總師傅受田仍授皇四子讀丙辰四川中瞻對番工布朗結作亂命琦善勦之以裕誠兼署四川總督是月貸江蘇災區京左等八營一季兵餉三月庚寅徐廣縉等奏兵民互相保衛內河外海現飭嚴防英人進省城一事萬不可行諭嘉納之夏四月壬寅李星沅病免以陸建瀛為兩江總督調傅繩勛為江蘇巡撫以費開綬為江西巡撫丙午陸建瀛等奏南漕毋庸改折從之丁未徐廣縉奏英人罷議進城封徐廣縉子爵葉名琛男爵均一等世襲諭嘉奬粵人深明大義閏四月辛未以顏以燠署河東河道總督癸酉調趙炳言為湖南巡撫以羅繞典為湖北巡撫辛巳琦善勦中瞻對番敗之壬午以德齡為葉爾羌參贊大臣五月乙巳移廣東澳門稅口於黃埔己酉雲南騰越廳野夷作亂林則徐討平之己未山西巡撫王兆琛以受賕褫職逮問以季芝昌為山西巡撫是月貸山東滕縣雹災倉穀六月丙子廣東陽山英德等縣匪平己丑禮部尚書成剛卒庚寅調育書為烏魯木齊都統以惟勤為熱河都統秋七月丙申朔福建閩縣匪林仕等作亂捕誅之戊戌協辦大學士吏部尚書陳官俊卒調賈楨為吏部尚書以孫瑞珍為禮部尚書王廣蔭為左都御史以馮德馨為湖南巡撫己亥命祁寯藻協辦大學士辛亥命湖南布政使萬貢珍賑武陵等縣被水災民丙辰王兆琛遣戍新疆己未林則徐病免以程矞采為雲貴總督張日晸為雲南巡撫降侍郎戴熙三品頂戴休致是月給江西德化等五縣湖南澧州等九州縣衛水災口糧蠲緩江蘇川沙等二十二廳縣新舊額賦八月丁丑陸建瀛奏辦賑及水退情形諭臣民之福即朕之福丙戌召季芝昌來京以龔裕署山西巡撫是月給奉天錦州旗民江西鄱陽等九縣湖南澧州等十州縣衛水災口糧九月甲辰布彥泰病免以琦善署陝甘總督裕誠署四川總督丙午授顏以燠河東河道總督戊申命署吏部右侍郎季芝昌在軍機大臣上行走己酉授琦善陝甘總督以徐澤醇為四川總督陳慶偕為山東巡撫癸丑雲南保山界外小宇江等處野夷作亂程矞采勦平之戊午命服闋尚書何汝霖仍在軍機大臣上行走是月給貴州桐梓縣水災口糧並蠲緩額賦冬十月庚午以故朝鮮國王李子襲爵命瑞常和色本往冊封甲申大學士潘世恩請開缺命免軍機大臣庚寅以賡福署熱河都統是月給湖南澧州等七州縣山西徐溝縣被災口糧蠲緩直隸薊州等三十七州縣浙江富陽等二十一縣山西薩拉齊等三廳縣被災新舊額賦十一月甲午朔湖南新寧縣匪李沅發作亂命馮德馨勦之丙申太傅豫告大學士阮元卒甲辰調龔裕為湖北巡撫以兆那蘇圖為山西巡撫乙巳阿哥所火庚戌臺灣嘉義縣匪徒吳吮等作亂捕誅之是月賑江西德化等十四縣水災給齊齊哈爾等六城旗民浙江仁和等八場竈丁口糧蠲緩江蘇泰州等七十三州廳縣衛江西德化等二十一縣被災新舊額賦浙江海沙等十四場竈課十二月庚午湖南道州匪黃三等作亂命裕泰勦之以扎拉芬泰為塔爾巴哈台參贊大臣辛未皇太后不豫上詣慈寧宮問安自是每日如之甲戌皇太后崩乙亥奉安大行皇太后梓宮於慈寧宮上居倚廬席地寢苫諸王大臣請還宮不允甲申移皇太后梓宮於綺春園迎暉殿自是上居慎德堂苫次乙酉李振祜病免以陳孚恩為刑部尚書丁亥湖南新寧賊分竄廣西鄭祖琛遣兵防勦是歲朝鮮琉球越南入貢三十年春正月甲午朔日食丙申以祁寯藻等查覆陝甘總督布彥泰清查關防不密下部嚴議丁酉以王大臣再請停止親送大行皇太后梓宮諭從之戊戌上大行皇太后尊諡曰孝和恭慈康豫安成熙聖睿皇后庚子上詣迎暉殿孝和睿皇后梓宮前行大祭禮甲辰上詣梓宮前行周月祭禮乙巳尊孝和睿皇后陵曰昌西陵丙午上不豫丁未上疾大漸召宗人府宗令載銓御前大臣載垣端華僧格林沁軍機大臣穆彰阿賽尚阿何汝霖陳孚恩季芝昌總管內務府大臣文慶公啓鐍匣宣示御書皇四子立為皇太子是日上崩於圓明園慎德堂苫次硃諭封皇六子奕欣為親王四月甲戌上尊諡曰效天符運立中體正至文聖武智勇仁慈儉勤孝敏成皇帝廟號宣宗咸豐二年二月壬子葬慕陵論曰宣宗恭儉之德寬仁之量守成之令辟也遠人貿易搆釁興戎其視前代戎狄之患蓋不侔矣當事大臣先之以操切繼之以畏葸遂遺宵旰之憂所謂有君而無臣能將順而不能匡救國步之瀕肇端於此嗚呼悕矣
