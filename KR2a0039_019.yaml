body:
  text: 清史稿卷十九本紀十九宣宗本紀三二十一年春正月己丑英人寇廣東虎門副將陳連陛及其子舉鵬死之庚寅以奕山為御前大臣辛卯琦善以虎門陷下部嚴議褫提督關天培頂戴命奕山為靖逆將軍隆文楊芳為參贊大臣督辦廣東海防命賽尚阿在軍機大臣上行走庚子命訥爾經額駐天津督辦海防命哈喨阿赴山海關督辦海防命耆英等勤哨探己巳命伊里布回兩江總督任以裕謙為欽差大臣辦浙江軍務辛亥琦善褫大學士仍下部嚴議是月賑奉天白旗堡水災旗戶給江蘇江都丹徒二縣水災倉穀奉天小黑山站丁江蘇廟灣場竈丁安徽東流繁昌二縣水旱災口糧貸湖北沔陽等八州縣衛湖南武陵縣甘肅金州等五州廳縣水災籽種江蘇上元等十一縣甘肅皋蘭縣水災口糧山西河曲縣雹災倉穀二月庚申以伊里布遷延不進下部嚴議辛酉琦善逮問仍籍其家以祁為兩廣總督怡良兼署李振祜署刑部尚書授訥爾經額直隸總督恩特亨額陝甘總督丙寅越南國王阮福畑卒詔停貢方物戊辰英人去定海以伊里布庸懦褫協辦大學士留兩江總督任命寶興為大學士仍留四川總督以奕經協辦大學士戊寅命齊慎為參贊大臣赴廣東會勦壬午英人陷廣東虎門炮台及烏涌卡座廣東水師提督關天培署湖南提督祥福等死之是月展賑江蘇江寧通州二府州災民三月丙戌朔釋周天爵赴廣東軍營甲午上謁西陵免經過地方額賦十分之三乙未致仕大學士文孚卒丙申英人兵船入廣東內港楊芳等擊走之戊戌上謁泰陵泰東陵昌陵至龍泉峪孝穆皇后孝慎皇后孝全皇后陵寢奠酒己亥上再謁昌陵行敷土禮詣隆恩殿行大饗禮壬寅上還京師丙午上臨故大學士文孚第賜奠戊申准米里堅等國通商庚戌以裕謙奏命沿海通商口岸照舊准商民貿易壬子楊芳等請仍准英國商船在廣東貿易不許命將楊芳怡良嚴議閏三月乙卯朔褫楊芳怡良職仍留任丙寅湯金釗降調調卓秉恬為吏部尚書協辦大學士祁寯藻為戶部尚書以許乃普為兵部尚書丁卯召伊里布來京以裕謙為兩江總督命定海防務交劉韻珂辦理調梁章巨為江蘇巡撫以周之琦為廣西巡撫乙亥諭奕山等撫恤各國洋商是月貸山西吉州等十州縣暨和林格爾廳上年歉收倉穀蠲緩江蘇宿遷縣被水灘租夏四月己丑命裕謙仍為欽差大臣督辦浙江海防英人陷廣東城外炮台甲辰禮部尚書奎照病免以色克精額為禮部尚書賜龍啓瑞等二百二人進士及第出身有差辛亥命睿親王等大學士軍機大臣各部尚書會同刑部訊伊里布癸丑以廣東省城圍急准奕山等奏令英人通商是月緩徵山西朔州等六州廳縣逋賦五月丙辰英船入浙洋命裕謙申嚴各海口兵備癸亥鄧廷楨林則徐遣戍伊犁癸酉英船去廣東虎門穆彰阿免管理藩院命賽尚阿代之參贊大臣戶部尚書隆文卒于軍庚辰調敬徵為戶部尚書賽尚阿為工部尚書恩桂為理藩院尚書壬午調吳文鎔為江西巡撫錢寶琛為湖南巡撫以奕興為綏遠城將軍六月准祁等奏定商船赴天津等處章程庚寅褫伊里布職發軍台效力贖罪准奕山等奏分期撤兵戊戌琦善論斬癸卯河南下南廳河決辛卯褫文沖職仍留河東河道總督任牛鑑下部嚴議七月丙辰命王鼎等赴東河督工壬戌以李振祜為刑部尚書丁卯以達賴喇嘛于四月坐床頒敕書戊辰命前寧夏將軍特依順為參贊大臣赴廣東辛未以河水泛濫命牛鑑移民賑恤己卯南掌入貢庚辰英人陷福建厦門總兵江繼藝等死之以故越南國王阮福畑子阮福畑為越南國王命廣西按察使寶清往冊封八月癸未以桂輪為熱河都統丁亥英人寇浙江庚寅以朱襄為河東河道總督辛卯萬壽節上詣皇太后宮行禮御正大光明殿皇子及王以下文武大臣蒙古使臣外藩王公行慶賀禮褫文沖職枷號河干以王鼎署河東河道總督英人去厦門丁酉英人寇浙江雙澳石浦等處裕謙督兵擊走之命怡良赴福建查辦軍務以梁寶常署廣東巡撫庚子以趙炳言為湖北巡撫辛丑英人復大舉寇浙江戊申英人再陷定海總兵王錫朋鄭國鴻葛雲飛等死之裕謙余步雲下部嚴議是月免陝西華州大二州縣河南睢州等八州廳縣水災額賦九月乙卯英人陷鎮海欽差大臣裕謙死之提督余步雲遁命奕經為揚威將軍哈喨阿胡超為參贊大臣督辦浙江海防命怡良為欽差大臣會同顏伯燾劉鴻翱督辦浙江海防以牛鑑署兩江總督鄂順安署河南巡撫丁巳命文蔚為參贊大臣赴浙江胡超仍駐天津命特依順為參贊大臣赴浙江哈喨阿仍駐山海關命祁寯藻在軍機大臣上行走授牛鑑兩江總督辛酉英人陷浙江寧波府己巳上閲火器營兵是月賑奉天遼陽等六州縣水災冬十月戊子命僧格林沁等巡視天津海口辛卯英船入臺灣海口達洪阿等擊退之命王得祿赴臺灣協勦是月賑湖南華容縣嶽州衛江西德化等十縣水災加賑湖北沔陽等九州縣山西薩拉齊廳災民江蘇上元等十五縣衛災民並免額賦給安徽無為等十二州縣水災口糧屋費並免額賦十一月庚午以程矞采署江蘇巡撫以青海玉樹番族雪災免應徵銀二年戊寅英人陷浙江餘姚縣復入慈溪是月賑江蘇上元江寧二縣災民十二月戊子褫顏伯燾職以楊國楨為閩浙總督己丑以梁萼涵為山西巡撫癸巳英人陷浙江奉化縣壬寅湖北崇陽縣匪鍾人杰作亂攻陷縣城命裕泰等督兵討之以程矞采為江蘇巡撫丙午英船寇浙江乍浦戊申英船寇臺灣淡水雞籠達洪阿等擊退之是月賑江蘇新陽縣災民展賑河南祥符等六縣江蘇上元等十縣災民貸河南睢州柘城縣貧民籽種口糧並平糶淮寧縣倉穀緩徵江西南昌等二十二縣逋賦浙江橫浦浦東二場竈課是歲朝鮮琉球南掌入貢二十二年春正月丙辰楊國楨病免以怡良為閩浙總督梁寶常為廣東巡撫甲子盛京將軍耆英改廣州將軍以禧恩署之己巳湖北崇陽賊匪陷通山裕泰遣兵擊敗之丁丑克復湖北崇陽縣獲匪首鍾人杰是月賑安徽無為等十二州縣衛奉天遼陽等六處新民等四廳縣災民給安徽泗州等二十二州縣衛浙江海寧等七州縣水災口糧貸江西德化等七縣湖南武陵縣湖北嘉魚等九縣衛陝西葭州等五州縣水災籽種口糧山西薩拉齊廳歉收倉穀江蘇災區京右等營兵餉蠲緩浙江海寧等九州縣衛水災新舊額賦二月丙戌命林則徐仍戍伊犁丙申奕經等進攻寧波失利釋伊里布赴浙江軍營命耆英署杭州將軍王鼎乞假命齊慎仍為參贊大臣辦理浙江軍務丙午命耆為欽差大臣會同特依順守浙江省城並命劉韻珂會辦防務責成奕經等守沿海各口岸是月賑盛京遼陽等處江蘇上元等八縣災民三月壬子上幸南苑癸丑上行圍翼日如之丁巳上還圓明園恩特亨額卒以富呢揚阿為陝甘總督壁昌為陝西巡撫以慶昌為伊犁參贊大臣是月蠲緩河南鄭州積潦地畝逋賦夏四月癸未英人復寇臺灣達洪阿等擊走之加達洪阿太子太保己丑英人去寧波府甲午上詣黑龍潭神祠祈雨乙未英人陷浙江乍浦同知韋逢甲死之庚子褫余步雲職逮問丙午鍾人杰伏誅是月貸湖南鳳凰等五廳縣屯丁苗佃籽種口糧山西吉州等十四州縣倉穀緩徵山西陽曲縣薩拉齊廳逋穀五月己酉大學士王鼎暴卒丙辰降湯金釗為光祿寺卿丁巳湯金釗乞休允之戊午奕山以查奏不實褫左都御史並祁梁寶常褫職留任己未禮部尚書色克精額卒以恩桂代之以吉倫泰為理藩院尚書以奎照為左都御史壬戌英人陷江蘇寶山縣提督陳化成死之命耆英伊里布赴江蘇會同牛鑑防勦丁卯英人陷上海縣典史楊慶恩死之命賽尚阿為欽差大臣會同訥爾經額防勦是月貸江蘇山陽縣及淮安等二縣衛歉收籽種六月戊寅朔日食蠲緩湖北被匪滋擾之崇陽等五縣衛新舊額賦辛卯以文慶為庫倫辦事大臣壬辰蠲緩浙江被擾之定海等十二縣新舊額賦癸巳英船寇京口丙申英船寇鎮江齊慎等遁丁酉英人陷鎮江副都統海齡死之秋七月甲寅英船寇江寧省城命伊里布等議款命奕經進駐常州己未耆英奏與英兵官瑪禮遜等議罷兵諭朕以民命為重令妥行定議癸亥耆英等請與英兵官定約鈐御寶諭朕因億萬生靈所繫允所請庚午江南桃北廳河决是月賑巴里坤地震災八月戊寅耆英奏廣州福州厦門寧波上海各海口與英國定議通商戊子麟慶以貽誤河防褫職留任命敬徵廖鴻荃赴江南查勘河工是月貸巴里坤地震災修屋費九月丁未沈岐乞終養允之以李宗昉為左都御史己酉授禧恩盛京將軍戊午朱樹乞終養允之命周天爵以二品頂戴署漕運總督己未兩江總督牛鑑褫職逮問命耆英代之召奕山來京以伊里布為欽差大臣廣州將軍辦理善後事宜辛酉河東河道總督朱襄卒以慧成署之癸亥召奕經文蔚來京命齊慎回四川提督甲戌命伊里布議通商稅課事宜乙亥壁昌遷福州將軍以李星沅為陝西巡撫冬十月庚辰上閲圓明園八旗槍兵丙戌奕山奕經文蔚交刑部治罪特依順齊慎下部嚴議庚寅減免江蘇濱海被兵太倉等四十廳州縣衛新舊額賦有差甲午奕山奕經文蔚均奪職論斬特依順齊慎褫職留任乙未命戶部尚書敬徵協辦大學士調恩桂為吏部尚書以麟魁署禮部尚書戊戌慶郡王奕綵緣事奪爵不入八分輔國公綿性奪爵發盛京是月賑江蘇桃源沭陽二縣水災給湖北江陵等四縣山西保德等三州廳縣災民口糧貸奉天牛莊等處災民口糧蠲緩江蘇海州等五州縣湖南澧州等八州縣衛新舊額賦十一月丁未召科布多參贊大臣固慶來京以果勒明阿代之召烏里雅蘇台參贊大臣盛貴來京以樂斌代之召駐藏大臣孟保來京以海朴代之以潘錫恩為江南河道總督授慧成河東河道總督丙辰允周天爵回籍守制以廖鴻荃署漕運總督甲子命怡良查辦達洪阿等妄殺被難洋人丁卯牛鑑論斬甲戌給江蘇濱江被兵等丹徒六縣貧民口糧屋費並免通州等十三州縣廳額賦有差是月給江蘇蕭縣徐州衛水災口糧蠲緩浙江淳安等三縣新舊額賦十二月辛巳召廖鴻荃來京以李湘棻署漕運總督己丑設通永鎮總兵駐蘆台以向榮為通永鎮總兵庚寅召程矞采來京以孫善寶為江蘇巡撫乙未托渾布病免以程矞采為山東巡撫戊戌申命大學士九卿科道議余步雲罪處斬己亥調梁寶常為山東巡撫程矞采為廣東巡撫是月給福建峯市等三縣廳水災口糧屋費是歲廓爾喀朝鮮琉球來貢二十三年春正月辛亥命李僡成剛赴南河會同潘錫恩督工壬子英兵官朴鼎查回香港留馬禮遜等候議約命伊里布等籌辦通商事宜命李湘棻會同耆英籌辦江北善後事宜是月賑江蘇蕭縣桃源縣災並給沭陽等六縣衛口糧貸湖北江陵等三縣衛湖南澧州洞庭二營水災籽種口糧二月乙未欽差大臣廣州將軍伊里布卒命祁接辦通商稅則丁酉烏里雅蘇台將軍奕湘改廣州將軍以祿普代之辛丑調奕興為烏里雅蘇台將軍祿普為綏遠城將軍是月貸湖北荊州被水駐防倉穀三月庚戌命耆英為欽差大臣辦理江浙通商事宜壁昌署兩江總督丁巳御試翰林詹事等官擢萬青藜五員為一等餘升黜有差乙丑祿普遷鑲紅旗蒙古都統調奕興為綏遠城將軍以桂輪為烏里雅蘇台將軍起琦善為熱河都統丙寅起文蔚為古城領隊大臣起奕經為葉爾羌幫辦大臣丁卯怡良奏達洪阿姚瑩並無戰功命褫職逮問尋免達洪阿姚瑩治罪是月貸山西絳州等六州縣湖北荊州駐防被災倉穀江寧駐防暨督協各營災歉兵丁銀湖南鳳凰等五廳縣苗佃屯丁籽種口糧夏四月甲