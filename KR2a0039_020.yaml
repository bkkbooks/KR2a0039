body:
  text: 清史稿卷二十本紀二十文宗本紀文宗協天翊運執中垂謨懋德振武聖孝淵恭端仁寬敏顯皇帝諱奕宣宗第四子也母孝全成皇后鈕祜祿氏道光十一年六月初九日生二十六年用立儲家法書名緘藏三十年正月丁未宣宗不豫宣召大臣示硃筆立為皇太子宣宗崩己未上即位頒詔覃恩以明年為咸豐元年尊皇貴妃為孝慈皇貴妃追封兄貝勒奕緯奕綱奕繹為郡王封弟奕欣恭親王奕醇郡王奕詥鍾郡王奕譓孚郡王定縞素百日素服二十七月二月戊辰命左都御史柏葰內務府大臣基溥營建昌西陵為孝和皇后山陵初宣宗遺詔毋庸升配升祔交廷臣議議上詔曰先帝謙讓所不敢從曲體先懷宜定限制即以三祖五宗為斷嗣後不復舉行湖南土匪李沅發作亂詔惠親王係朕之叔免叩拜禮示敬長親親庚辰敕沿海整頓水師認真巡緝壬辰大理寺卿倭仁應詔陳言上嘉其直諫三月癸巳朔保昌卒以柏葰為兵部尚書花沙納為左都御史壬寅通政使羅惇衍應詔陳言上優詔答之癸卯左副都御史文瑞疏陳四事並録進乾隆元年故大學士孫嘉淦三習一弊疏禮部侍郎曾國藩疏陳用人三事均嘉納之辛亥濬江蘇白茅河移建海口石閘於老閘橋壬戌禮親王全齡薨子世鐸襲夏四月乙丑俄羅斯請於塔爾巴哈台通商允之己巳內閣學士車克慎疏陳敬天繼志用人行政凡十條優詔答之癸酉戶部疏陳整頓財政臚陳各弊得旨實力革除庚辰英吉利國船至江蘇海口遞公文卻之乙酉船至天津五月丙申起碇南旋丁酉詔曰州縣親民之官責任綦重近年登進冒濫流品猥雜多倚胥吏而朘閭閻民生何賴焉督撫大吏其加意考察荐進廉平鋤斥貪茸庶民困漸蘇以副朕望獲湖南逆首李沅發解京誅之詔鄭祖廣西會匪四起應時捕勦疏報勿得諱飾辛亥改山東登州鎮為水師總兵兼轄陸路癸丑詔東南兩河勘籌民堰甲寅以固慶為吉林將軍六月癸亥永定河溢大學士潘世恩致仕食全俸以祁寯藻為大學士杜受田協辦大學士孫瑞珍為戶部尚書王廣蔭為兵部尚書季芝昌為左都御史甲戌除甘肅民番升科畸零地銀甲申敕督撫舉劾屬員臚列事實勿以空言是月廣東花縣人洪秀全在廣西桂平縣金田起事秋七月辛卯敕沿海督撫籌防海口丙辰尚書文慶坐延請妖人薛執中治病免八月丁卯洪秀全竄修仁荔浦敕鄭祖琛勦之調向榮為廣西提督勦賊甲申詔曰各省糾衆滋事重案層見疊出該地方官所司何事即如河南捻匪結黨成羣甚至擾及鄰省橫行劫掠自應合力捕治淨絶根株若封疆大吏玩縱於前復諱飾於後以致釀成巨患朕必將該督撫從重治罪凜之九月丙申以廣西賊勢蔓延調湖南雲南貴州兵各二千赴勦並勸諭紳民舉辦團練辛丑命林則徐為欽差大臣勦賊廣西甲辰以廣東遊匪滋事命徐廣縉勦之丙午大行梓宮發引辛亥暫安宣宗成皇帝於隆恩殿冬十月壬午以彌縫釀患奪鄭祖琛職林則徐署廣西巡撫甲子永定河漫口合龍丙戌詔曰大學士穆彰阿柔佞竊位傾排異己沮格戎機罔恤國是即行褫職協辦大學士耆英無恥無能降員外郎頒示中外以賽尚阿協辦大學士十一月戊戌以奕山為伊犁將軍庚子欽差大臣林則徐道卒以周天爵署廣西巡撫命前兩江總督李星沅為欽差大臣赴廣西勦賊乙巳敕各省藩庫積存雜款撥充軍需暫緩開捐劉韻珂免以裕泰為閩浙總督程矞采為湖廣總督吳文鎔為雲貴總督獲廣西匪首鍾亞春誅之十二月己巳孝德皇后册諡禮成追封后父富泰為三等公敕奕山酌定俄羅斯通商條例以聞庚午敕江蘇四府漕糧暫行海運甲戌向榮勦賊橫州敗之己卯恤廣西陳亡副將伊克坦布等世職丙戌祫祭太廟是歲免直隸浙江湖南等省六十七州縣災賦有差朝鮮琉球入貢咸豐元年辛亥春正月戊子朔御太和殿受朝賀詔直省查明道光三十年以前正耗錢糧實欠在民者開單請旨命賽尚阿為大學士壬寅上謁慕陵行周年大祭禮庚戌還京辛亥詔翰詹諸臣分撰講義進呈給事中蘇廷魁疏請推誠任賢慎始圖終上嘉納之二月乙丑詔免直省民欠錢糧巳入奏銷者及於江蘇民欠漕糧悉豫蠲免杜受田疏陳整軍威募精勇勸鄉團察地形四事發軍前大臣庚午李星沅奏勦賊金田獲勝己卯詔曰今年節過春分寒威未解朕返躬內省未能上感天和因思去冬禮部彙題烈婦一本內閣票擬雙籤遂用不必旌表之籤發下該烈婦等舍生取義足激薄俗而重綱常所有烈婦彭氏等三十七口準其一體旌表以慰貞魂命廣州副都統烏蘭泰帶所製軍械赴廣西勦賊三月丙申命大學士賽尚阿佩欽差大臣關防馳往湖南辦理防堵都統巴清德副都統達洪阿隨往庚子上御紫光閣閲射辛丑御拱辰殿步射閲大臣侍衛射己酉河南巡撫潘鐸奏拿獲捻匪姚經年二百餘名庚戌調廣東湖南四川兵赴廣西助勦壬子發內帑銀一百萬兩備廣西軍儲發四川倉穀碾運湖南夏四月戊午命賽尚阿馳赴廣西接辦軍務己未命戶部左侍郎舒興阿為軍機大臣庚申上御乾清門聽政恤廣西中伏陳亡副將齊清阿等世職詔以李星沅等毫無成算中賊姦計切責之以鄭祖琛養癰貽患遣戍伊犁丙寅周天爵奏洪秀全等衆皆散處山險路熟伺間衝突即敗不足以大創此時兵力不足專飭防守須兵有餘力乃可連營逼勦得旨務當嚴防勿令竄逸賽尚阿師行賜遏必隆刀命天津鎮總兵長瑞涼州鎮總兵長壽從征庚午免直隸道光三十年民欠錢糧周天爵奏劾右江鎮總兵惠慶右江道慶吉勦賊不力均奪職丙子李星沅奏勦滅上林墟會匪癸未李星沅卒烏蘭泰奏四月初三日抵武宣軍營查詢賊勢類皆烏合惟武宣東鄉會匪有衆萬餘蓄髮易服有偽王偽官名目實廣西腹心之患得旨賊情狡獪務當持重五月戊子周天爵奏武宣東鄉逸賊竄入象州詔切責之各豫薄譴詔湖南提督余萬清協同堵勦庚寅卓秉恬奏請行堅壁清野之法下賽尚阿及督撫知之甲午周天爵奏勦平泗城股匪陳亞等投誠追賊入合浦丁酉烏蘭泰奏四月十七日馳至象州堵截逸賊甲辰陝甘總督琦善以勦辦番族率意妄殺奪職逮問乙巳以季芝昌為閩浙總督以戶部尚書裕誠協辦大學士己酉詔停中外一切工程命工部右侍郎彭蘊章為軍機大臣乙卯上詣大高殿祈雨六月丁巳賽尚阿報抵長沙詔曰象州之賊宜重兵合圍分竄南寧太平之賊應分兵追勦其尚審度地勢人材聯絡布置糧台尤關緊要並宜分置以利轉輸丙寅烏蘭泰奏五月初十日賊陷貴州兵營當日奪回其南山屯集之賊亦經迎擊南竄陳亡官十五員兵二百餘名附單請恤首先敗退之貴州參將佟攀梅等褫職辛未撥江海關稅銀十五萬兩解備湖北過境兵差乙亥賽尚阿奏六月初四日馳抵桂林通籌全局上嘉其均合機宜丁丑河南南陽捻匪四出滋擾詔所司捕之辛巳西寧番匪搶掠敕薩迎阿遣將勦捕秋七月丙戌賽尚阿奏賊由象州回竄東鄉派兵堵勦庚寅御史焦友瀛疏言吏治因循宜綜核名實得旨如果牧令得人何至姦宄潛聚釀成巨患嗣後有似此者惟督撫是問庚子賽尚阿奏進勦新墟賊匪七戰皆捷賞還烏蘭泰秦定三花翎命湖廣四川督撫嚴查會匪教匪丁未敕南河歲修工程以三百萬為率己酉賽尚阿奏查明軍將功過烏蘭泰先勝後敗由於猛追中伏賊人壅流設伏後軍死流湍者百餘向榮初到桂時連獲勝仗每勝賞兵銀人各一兩李星沅既至減為三錢衆兵譁然誓不出戰現巳分別汰除務知持重安徽巡撫蔣文慶奏壽州匪犯程六麻與合肥捻匪高四八作亂庚戌調鮑起豹為湖南提督榮玉材為雲南提督重綸為貴州提督八月乙卯賽尚阿奏進勦新墟賊巢奪占豬峽雙髻山得旨嘉奬乙丑山東巡撫陳慶偕奏登州水師船被賊虜副將落水得旨速往追勦並敕奕興訥爾經額嚴防海口禮部尚書惠豐卒閏八月甲申朔新墟衆首洪秀全陷永安州踞之僭號太平天國陸建瀛奏請禁天主教得旨與外夷交涉當慎之於始原約所有者仍應循守舊章戊子程矞采奏陽山賊匪竄撲宜章乳源飭總兵孫應照往勦豫廣西殉難巡檢馮元吉世職建祠其子澍溥附祀甲午南河豐北三堡河決庚子定考試軍機章京例壬寅賽尚阿奏新墟賊翻山竄出陷永安州詔切責之下部議處己酉命河北鎮總兵董光甲鄖陽鎮總兵邵鶴齡馳赴廣西勦賊庚戌常大淳奏盜船在石浦肆劫知府羅鏞擊走之辛亥以舒興阿為陝甘總督九月庚午賽尚阿奏巴清德向榮託病諉卸進兵遲延得旨均奪職自效丙子詔議河海並運漕米章程冬十月戊戌敕建定海陳亡總兵葛雲飛鄭國鴻專祠十一月己卯葉名琛奏勦辦英德賊匪淨盡加太子少保十二月丁酉賽尚阿奏向榮進扎龍眼塘己酉陸建瀛奏海盜布興有繳械投誠撥營安插庚戌祫祭太廟是歲普免道光三十年以前民欠錢糧又免直隸六十一州縣民欠旗租浙江五十一州縣帶徵銀米又免奉天十五廳州縣吉林四城黑龍江一城湖南七廳州縣災賦又免浙江福建鹽場欠課又免廣西被賊八十六州縣額賦朝鮮琉球入貢二年壬子春正月壬子朔封奕劻貝子奉慶親王永璘祀乙卯以裕誠為大學士訥爾經額協辦大學士禧恩為戶部尚書壬戌賽尚阿奏距永安州城三里安營督戰辛未命侍郎全慶副都統隆慶册封朝鮮國王妃二月丁亥陳慶偕病免以李僡為山東巡撫辛丑上詣西陵三月壬子大葬宣宗成皇帝於慕陵丁巳上還京恭奉宣宗成皇帝孝穆孝慎孝全三皇后神牌升祔太廟頒詔覃恩庚申鄒鳴鶴奏永安踞匪全數東竄烏蘭泰追賊不利總兵長瑞長壽董光甲邵鶴齡均死之得旨賽尚阿等下部議處敕程矞采派兵在湖南防堵恤長瑞等四總兵世職建祠廣州副都統烏蘭泰卒於軍贈都統照陳亡例賜恤丙子恤廣西死事副將阿爾精阿等世職庚辰內閣學士勝保疏言遊觀之所煥然一新小民竊議有纍主德上優容之夏四月壬午常雩祀天於圜丘恭奉宣宗成皇帝配享甲申府尹王慶雲疏陳河東鹽務永禁簽商可募巨款下部議行丙戌上謁慕陵行釋服禮命徐廣縉為欽差大臣接辦廣西軍務辛卯程矞采奏郴州匪徒劉代偉作亂參將積拉明捕誅之癸巳常大淳奏鹽梟拒捕戕斃副將張蕙知縣德成經提督善祿知府畢承昭派兵攻擊斬擒百餘餘匪逃散豫張蕙德成世職太僕寺少卿徐繼畬疏陳釋服之後宜防三漸一土木之漸一宴安之漸一壅蔽之漸得旨置諸座右時時省覽己亥減乾隆朝所增名糧兵六萬六千餘名庚子程矞采奏洪秀全撲全州進撲永州分股竄永福義寧檄提督鮑起豹劉長清分禦之並咨照賽尚阿一同堵禦辛丑特登額免以桂良為兵部尚書乙巳賜章鋆等二百三十九人進士及第出身有差琦善遣戍吉林丙午鄒鳴鶴以留兵守城不令追賊奪職以勞崇光為廣西巡撫己酉命截留漕米六十萬石分運江蘇山東備賑五月辛亥布彥泰奏庫存回布四十萬匹請變通折征允之甲寅夏至祭地於方澤恭奉宣宗成皇帝配享庚申賊陷湖南道州賽尚阿留守桂林檄江忠源張國梁移兵湖南六月甲申查辦山東賑務杜受田怡良疏言漕船入東先行起卸以資散放丙戌命賽尚阿赴湖南督辦軍務徐廣縉接辦廣西軍務丁亥策立皇后鈕祜祿氏癸巳僧格林沁奏劾御前大臣鄭親王端華修改大考侍講學士保清試卷阻止不聽驕矜亢愎難與共事詔端華退出御前大臣保清褫職戊戌以慧成為河東河道總督秋七月己未廣東羅鏡凌十八股匪勦平上嘉奬之烏什辦事大臣春熙奏回匪鐵完庫里霍卓竄擾烏什官兵擊退詔參贊詳查以聞甲