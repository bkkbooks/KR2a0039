失守提督樂善死之優恤建祠庚子僧格林沁退守通州辛丑英人陷天津浙江賊陷臨安餘杭四川賊陷邛蒲新津甲辰江蘇賊復陷松江丁未以崇實署四川總督己酉裕瑞奏浩罕請依前通商許之以常清為伊犁將軍辛酉金壇陷知縣李淮守三年援兵不至力竭死之紳民從死者逾千人命勝保督馬隊守通州八月癸亥洋兵至通州載垣誘擒英使巴夏禮解京戊辰瑞麟等與洋兵戰於八里橋不利命恭親王奕欣為欽差大臣辦理撫局己巳上幸木蘭自圓明園啓鑾丁丑上駐蹕避暑山莊李世忠以擒叛將薛成良擢授江南提督戊寅詔曰江南提督張國梁謀勇兼優忠義奮發在軍十年戰功卓著東南半壁倚為長城本年大營潰散回援擊賊受傷沒水先後奏報朕猶冀其不確迄今數月其為效死捐軀無疑若使張國梁尚在蘇常一帶何至糜爛若此追念藎勞益深愴惻贈太子太保入祀昭忠祠分建專祠子孫幾人送部録用己卯命都興阿帶兵入衛從官文請也命玉明成凱樂斌文煜英桂督兵入衛辛巳命恆福駐古北口備防吳廷棟接轉文報壬午浙江官軍克復平湖嘉善廣東官軍克復樂昌仁化癸未江蘇賊陷常熟圓明園災常嬪薨內務府大臣尚書文豐死之庚寅恭親王奏請還巴夏禮於英軍薛煥奏劾馮子材赴援金壇擁兵不進致令城陷詔薄譴之九月壬辰命勝保為欽差大臣總統援軍敕恭親王奕欣照會英人勿修城北炮臺速行議約甲午英使法使入城大學士彭蘊章尚書許乃普以病乞免許之己亥命慶廉英桂兵駐直備調辛丑賊陷寧國周天受死之甲辰命左宗棠督辦浙江軍務乙巳撫局成恭親王奕欣奏請宣示中外如約遵行許俄人駐烏蘇里綏芬停各省援兵敕英桂來京議西巡戊申李若珠奏克復江陰辛亥賊陷徽州守城道員李元度棄城走癸丑直隸山東河南賊匪並起命僧格林沁討之庚申恭親王奕欣奏洋人退至天津籲請回鑾冬十月辛酉朔詔天氣漸寒暫緩回鑾以田興恕為貴州提督豫陳亡提督周天受周天培世職建祠豫諡附祀道員福咸等壬戌以劉源灝為雲貴總督鄧爾恆為貴州巡撫甲子敕文謙恆祺辦理通商事宜吳廷棟督辦防務以文安為湖南提督以馮子材督辦鎮江軍務丙寅恭親王奕欣奏換俄人和約請用御寶從之辛未俄羅斯致槍炮癸酉敕樂斌英桂回任庚辰以嚴樹森為河南巡撫毛昶熙督辦河南捻匪辛巳命都興阿督辦江北軍務李若珠副之以總兵田在田接辦徐宿勦匪淮徐道吳棠幫同辦理十一月辛卯勝保奏以大順廣道聯英專辦河防準其奏報從之癸巳翁同書奏陳謹天戒固邦本收人才練京營爭形勢得旨收人才一條利少弊多餘留覽甲午浙江賊陷新城臨安富陽乙未王夢齡奏勦賊獲勝三河肅清並請節制黃開榜水師從之庚子曾國藩奏鮑超等克復黟縣辛丑李若珠乞養親以曾秉忠代之癸卯以杭州解嚴優賚瑞昌王有齡等瑞昌奏陳慶端力保浙疆請加優奬得旨不分畛域皆爾大吏分內之事甄督撫出自朝旨非汝所得擅請戊申命成琦會景惇查勘俄羅斯東界癸卯浙軍張玉良攻復嚴州甲寅官文胡林翼奏陳玉成圖犯懷桐多隆阿會合李續宜迎勦大敗之殺賊萬餘多隆阿賜黃馬褂李續宜加二品銜十二月辛酉命西凌阿國瑞幫辦僧格林沁軍務丙寅命張亮基留辦雲南軍務己巳始置總理各國通商事務衙門命恭親王奕欣桂良文祥管理以崇厚充三口通商大臣薛煥兼辦上海等處通商事務準旗人學習外國語言文字己巳以田興恕為欽差大臣督辦貴州軍務丙子左宗棠奏督軍克復江西德興安徽婺源豫三品京卿乙酉以官文周祖培為大學士肅順協辦大學士沈兆霖為戶部尚書朱鳳標為兵部尚書戊子祫祭太廟是歲免江蘇浙江安徽三省額賦逋賦又直隸山東河南江西湖北湖南福建廣西等省四百一州縣衛被災被賊額賦有差會計天下民數二萬六千零九十二萬四千六百七十五名口存倉穀數五百二十三萬一千九百二十石四斗六升五合一勺朝鮮入貢十一年辛酉上在木蘭春正月庚寅朔上御綏成殿受賀辛酉詔二月十三日回鑾乙未曾國藩奏楊載福勦賊克都昌解南陵圍田在田奏捻匪犯碭山擊走之加提督銜丙申召翁同書來京以李續宜為安徽巡撫丁酉以福濟為成都將軍辛丑賊陷孝豐杭州戒嚴壬寅詔紀年開秩應豫特赦非常赦所不原者咸減除之癸卯左宗棠兵復饒州暨都梁乙巳恆福以病免以文煜為直隸總督談廷襄為山東巡撫鄧爾恆為陝西巡撫何冠英署貴州巡撫丁未僧格林沁奏捻匪竄入山東派隊追勦及於菏澤失利得旨僧格林沁督帶重兵北地倚為屏障乃以飢疲之卒追方張之寇旁無援應宜其敗也勇往有餘未能持重尚其汰兵選將扼要嚴防謀定後動勿再輕進戊申詔袁甲三等捻匪裹脅良民未便概行誅戮可剴切曉諭設法解散投誠者免罪殺賊者功並傳知李世忠一體招撫辛亥貴州官軍克復獨山壬子翁同書奏陳撫練苗沛霖劫擾壽州跋扈異常詔李續宜酌辦河南捻匪竄擾東明長垣二月己未朔雲南官軍克復晉寧壬戌復置奉天金州水師營丙寅詔準山東抵還法國教堂地基並敕直省遇有交涉即行酌辦請旨勿許推諉丁卯張玉良軍克復江山常山庚午曾國藩奏左宗棠敗賊於景德鎮鮑超敗賊於石門洋塘壬申浙軍克復富陽熱河朝陽盜匪陷城命克興阿勦之命明誼明緒會勘俄界英蘊奎英辦理俄人通商捻匪撲汶河副都統伊興阿總兵滕家勝逆戰陳歿乙亥陳玉成糾合捻匪由英山犯湖北蘄水詔胡林翼回兵擊之庚辰詔曰前經降旨訂日回鑾旬日以來體氣未復綏俟秋間再降諭旨壬午朝鮮國王遣使朝覲行在溫諭止之頒賜文綺珍器及其使臣癸未詔挑選兵丁演習俄國送到槍炮甲申裁撤黑龍江團丁歸農三月己丑朔詔派辦約大臣崇綸崇厚給與全權便宜行事敕侍郎成琦赴興凱湖會勘俄人分界事宜豫道員聯捷四品京卿辦理河防壬辰恭親王奕欣請赴行在祗叩起居上手詔答之曰別經半載時思握手而談惟近日咳嗽不止時有紅痰尚須靜攝未宜多言且俟秋間再為面話丙申詔皇長子於四月七日入學以李鴻藻充師傅戊戌都興阿奏鎮揚水師船隻年久損壞請飭廣東購運紅單船應用從之庚子命勝保督辦直隸山東勦匪以賈臻署安徽巡撫庚戌英法兩國兵退出廣東省城辛亥以前大學士彭蘊章署兵部尚書甲寅浙江賊陷海鹽平湖乍浦副都統錫齡阿死之丙辰廣西土匪陷太平府養利州夏四月己未朔嚴樹森奏賊犯汝寧道員張曜擊走之戊辰山東捻匪教匪連陷館陶七縣僧格林沁入滕縣固守詔勝保分兵援之甲戌詔曰朕聞各處辦捐有指捐借捐炮船捐畝捐米捐餉捐隄工捐船捐房捐鹽捐板捐活捐名目滋多員司猥雜其實取民者多歸公者寡近年軍浩繁不得已而借資民力商力然必涓滴歸公撙節動用始得實濟若似此徵求無藝朘薄民生尚復成何政體各大臣督撫尚其嚴密稽查剔除姦蠹以副朕意乙亥左宗棠敗賊於樂平庚辰山東教匪撲圍大名聯捷擊走之癸未皖賊復竄浙江陷常山江山進逼衢州五月癸巳田在田奏苗練犯符離敕僧格林沁分兵援之甲午鄧爾恆被戕於曲靖飭劉源灝查辦以瑛棨為陝西巡撫庚子勝保奏克復館陶辛丑命賈臻李世忠幫辦袁甲三軍務甲辰命多隆阿幫辦官文胡林翼軍務乙巳賊陷浙江壽昌金華龍遊湯溪長興進陷蘭溪武義詔催左宗棠赴援六月戊午朔日有食之庚申曾國藩胡林翼奏安慶省城自我軍長圍逆酋陳玉成率黨回援安慶於集賢關外赤岡嶺堅築四壘經鮑超成大吉會合多隆阿馬隊奮力進勦晝夜轟擊五月初一日三壘俱降釋去脅從將長髮老賊概行正法其踞第一壘之賊劉滄琳乘夜潛遁經鮑超殲於馬踏石餘為水師斬戮殆盡並將劉滄琳驗明支解梟示得旨嘉奬布魯斯亞國換約通商辛酉許俄人在庫倫恰克圖通商乙丑欽天監奏八月初一日日月合璧五星聯珠得旨不必宣付史館甲戌賊陷浙江遂昌松陽永康丙子回匪撲擾喀什噶爾詔景廉赴阿克蘇防勦丙戌浙江官軍克復長興秋七月丁亥詔每年秋間王公致祭兩陵如遇山水漲發可在途守候道路通時即行前往屆期不到由守護之貝勒公等行禮甲午曾國藩奏收復安徽徽州戊戌豫四川陳亡侍衛昭勇侯楊炘建祠辛丑上不豫壬寅上大漸召王大臣承寫硃諭立皇長子為皇太子癸卯上崩於行宮年三十一十月奉移梓宮至京十二月恭上尊諡同治四年九月葬定陵論曰文宗遭陽九之運躬明夷之會外強要盟內孽競作奄忽一紀遂無一日之安而能任賢擢材洞觀肆應賦民首杜煩苛治軍慎持馭索輔弼充位悉出廟算嚮使假年御宇安有後來之伏患哉
