侍衛隸成祿軍己亥黎獻軍潰於肅州辛丑馬賊回竄昌圖允戶部請撥鹽課諸款增內廷用費三十萬壬寅熱河軍復朝陽癸卯命伯彥訥謨祜回旗會各盟長檄蒙兵協剿馬賊以文麟為哈密辦事大臣乙巳瞻對逆酋工布朗結等伏誅三瞻均歸達賴管理丙午金州匪僞降竄鐵嶺命文祥等辦奉天防守事宜壬子以雪澤愆期詔清理庶獄瘞暴露骸骨乙卯恩合以貽誤軍事褫職提督成大吉軍潰於麻城丙辰粵軍會復越南寧海府城調都興阿為盛京將軍命穆圖善督辦甘肅軍務接統都興阿所部各軍庚申上御保和殿賜朝正外藩等宴自是每歲皆如之滇軍復麗江鶴慶是冬免四川松潘湖南茶陵等廳州縣被擾逋賦五年丙寅春正月辛酉朔停筵宴甲子捻匪擾鄂曾國藩檄劉銘傳援黃州馬化龍乞撫獻寧夏漢城乙丑桂軍復那檀免福建例貢己巳命穆圖善辦撫回善後事宜庚午雲南巡撫林鴻年赴昭通乙亥馬賊入踞伯都訥旋及雙城堡吉林危急文祥寶善檄黑龍江兵暨馬隊援之己卯黃巖總兵剛安泰巡洋遇艇匪死之癸未林鴻年坐畏葸貽誤褫職劉嶽昭代之左宗棠督諸軍復嘉應粵匪平左宗棠以次論功賞丙戌馬賊竄陷阿勒楚喀及拉林城富明阿往吉林剿之命特普欽回黑龍江布防守吳昌壽降調調李鶴年為河南巡撫以曾國荃為湖北巡撫戊子奉軍復八面城己丑諭嚴緝軍營哥老會匪二月辛卯朔詔左宗棠等緩撤江閩各軍備調北路助剿捻回諸匪黔回陷永寧旋復之壬辰命兆琛赴鎮遠辦軍務辛丑官軍復黃陂丁未都興阿坐部勇肆殺褫職留任戊申命廣東陸路提督高連升赴任剿辦土匪伯彥訥謨祜剿馬賊于鄭家屯大捷諭馬新貽籌辦海塘辛亥定安軍剿馬賊于長春勝之詔復副都統壬子德英憂免以富明阿為吉林將軍丙辰召郭嵩燾來京以蔣益澧署廣東巡撫己未湖南軍擊退黔苗三月壬戌曾國藩移軍濟寧督剿張總愚乙丑復阿勒楚喀伯都訥雙城堡三城己巳奉軍剿南北路馬賊大敗之蠲奉天吉林被擾諸地銀米庚午明誼乞病命麟興統蒙兵援伊犁乙亥賴文光等竄逼開封戊寅免隨征黑龍江牲丁貢貂諭內外臣工講求律例己卯馬賊竄擾熱河庚辰允馬化龍等投誠甲申張總愚竄濮范賴文光等由豫竄鄆城巨野諭曾國藩等守運河喬松年軍截剿乙酉馬賊陷牛莊丙戌曹育瑛卒丁亥閩軍復崇安建陽戊子命李鴻藻為軍機大臣胡家玉在軍機學習是春免河南積缺錢糧直隸安州奉天新民等州縣被水被擾額賦夏四月己丑朔奉天北路匪首馬儍子伏誅降其餘衆官軍復牛莊粵捻犯直隸河岸擊退之辛卯允曾國荃請裁兵併餉並調劉聯捷彭育橘朱南桂郭松林赴湖北丙申回目以洮州降曹克忠軍戊戌命馬如龍署雲南提督庚子召文祥福興回京命都興阿接辦奉天軍務節制各軍辛丑訥爾濟復木壘奇台古城招募民勇防守癸卯官軍復綏陽甲辰回匪陷靖遠戊申諭奉天吉林會剿山內外賊匪己酉談玉龍軍潰命曹克忠兼統其軍壬子回匪回竄慶陽披楞大舉悉兵衆迫布魯克巴命景紋赴邊隘查辦甲寅武緣匪平丙辰粵捻擾銅沛及泗州靈壁勞崇光進駐昆明杜文秀復陷麗江鶴慶劍川戊午回匪犯蘭州官軍擊退之五月壬戌黔匪復陷興義貞豐永寧俄使堅請黑龍江內地通商諭特普欽整頓營伍乙丑大考翰詹擢孫育汶四人一等餘升黜有差戊辰馬朝清降靈州復辛未回匪霍三等回竄鳳岐官軍擊退之諭楊嶽斌劉蓉合擊毋再任入陝甲戌回匪陷塔爾巴哈台武隆額死之以德興阿為參贊大臣奎昌署科布多參贊嚴諭成祿迅速出關乙亥回匪陷伊犁明緒等死之以榮全署伊犁將軍命庫克吉泰督辦新疆軍務丁丑詔清庶獄壬午以久不雨詔求直言禁凌虐罪囚甲申諭保舉盡心民事官吏丁亥官軍復荔波是月免廣東嘉應等處被擾逋賦六月庚寅雨允左宗棠請在閩建廠試造輪船壬辰諭內外大臣勤職辛丑成祿軍進圍肅州壬寅諭富明阿搜捕山場餘匪甲辰靈山匪平戊申烏里雅蘇臺將軍明誼病免己酉以德勒克多爾濟為烏里雅蘇臺將軍福興為綏遠城將軍庚戌鹽固回匪投誠辛亥凌雲陽萬土匪平乙卯諭楊嶽斌剿狄河回匪秋七月庚申褫廣鳳圖爾庫職逮訊命侍郎魁齡等使朝鮮冊封王妃壬戌官軍復哈密甲子諭整頓廣東吏治軍務釐稅乙丑李鴻藻丁母憂懿旨令百日後仍直弘德殿軍機處庚午湘軍克思南賊巢壬申李鴻藻請終制不許癸酉減蘇松常太浮收米三十七萬餘石浮收錢百六十七萬餘貫丙子崇厚會日斯巴尼亞使換約己卯黔匪陷石阡旋復之庚辰免烏梁海七旗應納半貢乙酉河南河決胡家屯八月戊子劉蓉病免調喬松年為陝西巡撫以英翰為安徽巡撫己丑濮州河決庚寅潯鬱匪平裁山海關監督改設奉錦山海關道辛丑賞李雲麟頭等侍衛幫辦新疆軍務癸卯楊嶽斌病免調左宗棠為陝甘總督吳棠為閩浙總督張之萬為漕運總督實授瑞麟兩廣總督甲辰官軍克大孤山賊巢徐宗禮伏誅乙巳官軍剿敗張牛諸捻以月食示警飭廷臣修省丁未從御史慶福請積粟張家口綏遠城轉運新疆以濟民食九月丁巳朔命談廷襄會崇厚辦義國商約事務癸亥福建興化土匪平甲子諭李雲麟與麟興等整頓北路防軍命皂保赴歸化督運新疆餉款回匪陷阜康祁寯藻卒辛未滇回陷安寧等州縣癸未左宗棠請將閩浙緑營減兵加餉就餉練兵允之是秋免貴州廣東山東福建被擾江西被災等處額賦浙江等縣逋賦冬十月辛卯命劉長佑嚴核畿輔兵額癸巳張總愚由陝州竄平陸官軍擊退之乙未命沈葆楨總司福建船政事務命劉典幫辦左宗棠軍務己亥張總愚西竄陷華陰渭南甘回竄宜君三水詔責曾國藩任賊蔓延辛丑允李鴻藻病假命富明阿辦吉林善後事宜汪元方為軍機大臣壬寅黔回陷興義旋復之並復安平鎮寧乙巳曾國藩乞病請開各缺在營效力並注銷侯爵諭慰之命病痊陛見諭穆圖善援應陝西丙午修海寧石塘是月免安徽壽州等州縣被水新舊額賦十一月丙辰命曾國藩回兩江總督署通商大臣授李鴻章欽差大臣節制湘淮各軍專任勦匪戊午豫山東巡撫閻敬銘假以丁寶楨署之庚申劉銘傳等剿任賴各匪於金鄉大捷乙丑三札兩盟西征蒙兵潰李雲麟回烏城諭庫克吉泰統吉黑軍速進丁卯川軍克桐梓賊巢丁酉曾國荃劾官文貪庸驕蹇命撤任查辦己卯定福建船政章程十二月丁亥以給事中尋鑾煒參劾失實切責之因諭科道慎重言事己丑郭松林等大破任賴諸匪於德安庚寅以黃河趨北諭蘇廷魁周歷履勘並會同直魯豫三省籌辦堤工甘回復陷哈密罷胡家玉軍機褫職留任以受官文賄也甲午曾國藩復疏請開缺溫旨慰留己亥雷正綰軍復平涼呼蘭匪平庚子援黔湘軍勦苗匪於銅仁大捷己酉回匪圍慶陽提督周顯承等力戰死之甲寅陝軍勦張總愚失利於灞橋總兵蕭德陽等死之以捻勢披猖命曾國藩等廣籌方略是歲朝鮮琉球入貢
