停福建本年例貢乙丑命王大臣覆核勝保情罪寧國粵匪竄東流建德豫秦儒毛亨明儒呂楠從祀文廟丙寅蒙城捻首賈文彬伏誅陝南粵匪陷沔縣貴州總兵羅孝連軍復定番長寨獨山荔波丁卯曾國藩以失守江浦等城鐫級褫李世忠幫辦實授吳棠漕運總督仍節制江北軍務諭拊循江北難民己巳萬壽節停受賀庚午苗沛霖復叛官文等截剿蘄州竄賊癸酉褫徐之銘職逮問豫潘鐸世職以雨澤稀少詔清理庶獄甲戌命福濟景紋查辦西藏啓釁事乙亥李鴻章軍復太倉隆德回匪亂黃國瑞軍平沂州棍匪丙子詔察恤陝甘殉難被害良善回衆尋詔雲南亦如之是月上連詣大高殿祈雨夏四月戊寅御史吳台壽以疏奏袒勝保褫職苗沛霖陷懷遠山東匪劉得培踞淄川己卯官軍剿畿南匪張錫珠等竄高唐尋伏誅庚辰粵捻各匪竄擾廬江桐舒及黃州諭曾國藩駐守安慶勿撤金陵之圍壬午多隆阿軍克孝義匪巢飭劉蓉統軍援陝免浙江被陷各地額糧甲申苗沛霖圍壽州六安趣僧格林沁討之粵匪踞太平石埭左宗棠沈葆楨會防多隆阿軍克倉頭匪巢陝東肅清苗沛霖陷潁上犯蒙城命劉長佑督辦直魯豫交界剿匪事務乙酉劉典軍復黟縣命侍郎薛煥在總理各國事務衙門辦事戊子允英桂回駐太原庚寅劉長佑言匪首楊明嶺等投誠甘肅回匪陷鹽茶犯靜寧馬德昭赴慶陽進勦壬辰贛軍敗賊祁門逆酋胡鼎文伏誅癸巳李續宜請開署缺允之以唐訓方為安徽巡撫李鴻章遣程學啓等軍薄崑山涇州軍擊回匪勝之甲午禮部議定先賢先儒祀典位次頒行各省乙未開墾直隸新城一帶稻田閻敬銘赴淄川督勦捻匪回竄河南總兵余際昌等死之命張曜接統其軍丁酉以皖匪紛竄江鄂安慶可虞詔曾國藩搘拄艱難倍加謹慎左宗棠軍復黟縣以勞崇光為雲貴總督逮治田興恕以謝法人庚子粵捻各匪犯鳳台定遠官軍擊退之辛丑賜翁曾源等二百人進士及第出身有差停四川畝捐癸卯程學啓等軍復崑山新陽官軍敗賊酋李秀成於石澗埠乙巳回匪復犯西安擊退之是月連祈雨免太倉等州縣額賦五月戊申苗沛霖圍蒙城己酉鮑超軍復巢縣庚戌賞郎中李雲麟京卿節制漢南防兵及川省援兵壬子粵捻合犯天長官軍擊敗之甲寅命江忠義統軍援江西丁巳鄒縣教匪平獲匪首劉雙印粵匪陷古州戊午俄兵入科布多境執台吉壬戌雨癸亥粵匪擾富陽官軍擊退之總兵熊建益等陳沒官軍援平涼失利趣多隆阿分軍速援乙丑寧夏撫回再叛鮑超軍復克巢和含山召晏端書來京以毛鴻賓為兩廣總督惲世臨為湖南巡撫豫明臣方孝孺從祀文廟戊辰諭購置輪船歸曾國藩李鴻章節制己巳曾國藩為弟國荃辭浙江巡撫上褒勉不允所辭西寧回句結撒匪攻丹噶爾廳惠遠回匪亂官軍捕誅之定丹國通商條約壬申彭玉麟等軍復江浦浦口及九洑洲乙亥廣西軍復潯州六月丙子朔黔軍復普安安南丁丑命明誼赴塔城會明緒等辦分界事戊寅詔曾國藩左宗棠等議減江蘇常鎮浙江杭嘉湖屬漕糧庚辰以復城池功賞李朝斌等及宋國永等黃馬褂停陝西例貢丁亥川軍勦賊於大渡河獲石達開誅之晉駱秉章太子太保銜擢總兵唐友耕提督辛卯平羅回衆復叛瓦亭回匪圍隆德擊退之河決開州考城菏澤甲午苗沛霖陷壽州知州毛維翼死之乙未陝軍復寧羌己亥以俄人強占住牧趣常清等定界勸俄兵撤回撫綏求內附之哈薩克布魯特壬寅官軍復淄川獲劉得培等誅之甲辰寶慶土匪平命四川布政使劉蓉督辦漢南軍務是月免福建順昌等縣屬被擾額賦江西義寧等州縣屬逋賦雜課秋七月乙巳苗沛霖逼臨淮唐訓方擊之丙午李鴻章軍復吳江震澤豫軍克張岡匪巢瑛棨有罪褫職命劉蓉為陝西巡撫張集馨署之甲寅命李鴻章暫兼南洋通商大臣戊午黔軍復古州辛酉袁甲三卒於軍壬戌賜勝保自盡甲子官軍克沙窩等處匪巢允江北漕米仍徵折色乙丑命劉蓉並節制湖北援軍丁卯官軍擊退狼山苗衆蒙城路通命崇厚為全權大臣辦理荷蘭通商條約滇回陷平彝岑育英軍復之癸酉命明誼等會同俄使辦分界諸務山東白蓮池教匪平文煜豫釋捻匪逼開封是月免都勻等府廳州縣屬被擾新舊額賦並鳳凰等廳縣灘地積缺租銀八月丙子程學啓等軍大破賊於太湖楓涇等處進逼蘇州丁丑陝西曹克忠軍克附省等處賊巢戊寅西寧狄道河州漢回互鬬哈薩克句結俄兵擾伊犁趣四川何勝必軍援甘庚辰皖軍克長淮衛辛巳以畏葸褫馬德昭職多隆阿軍抵西安渭南肅清命陳國瑞幫辦吳棠軍務丙戌蘇軍克江陰丁亥戍瑛棨新疆都興阿遣軍援臨淮己丑以勦辦臺灣賊匪調度乖方褫吳鴻源職逮問辛卯李鴻章赴江陰督勦諭陳國瑞援蒙城調善慶部馬隊援臨淮熙麟遣軍援平涼乙未允多隆阿請以曹克忠補河州總兵並令嗣後提鎮缺勿擅請簡宋景詩竄開州命張集馨會穆騰阿籌辦西安防守丁酉黔軍克桐梓賊巢普安陷旋復之命劉蓉節制毛震壽李雲麟各軍調烏魯木齊阿克蘇兵助伊犁軍禦俄允哈薩克綽坦承襲汗爵己亥趣林文察渡臺剿匪庚子回匪陷平涼辛丑閻敬銘移軍東昌定荷蘭換約劉長佑赴景州督勦是月免沁州等州廳縣屬逋賦九月乙巳朔命馬德昭赴慶陽營沈葆楨乞病慰留給假戊申允李鴻章調知縣丁日昌來滬督製火器石泉知縣陸坤聯團勦賊詔嘉之庚戌浙軍克富陽辛亥粵軍克廣海寨城癸丑諭僧格林沁以炮隊赴蒙城助勦甲寅粵匪陷城固捻首張總愚等由汝州南竄乙卯多隆阿軍復高陵丙辰穆隆阿以覆奏失實褫職調多隆阿為西安將軍以富明阿為荊州將軍辛酉多隆阿軍克蘇家溝渭城賊巢甲子粵匪陷會同綏寧旋復之陝西兵團復沔縣乙丑李秀成援無錫程學啓等擊退之己巳僧格林沁勦宋景詩股匪悉平景詩遁以援陝川軍敗褫提督蕭慶高職留營以漢中失事褫布政使毛震壽職諭劉長佑閻敬銘辦直魯善後庚午御史馬元瑞條陳薄賦稅慎訟獄善拊循勤曉諭四事如所請行是月免直隸滄州等州縣山東海豐等場未完竈課冬十月乙亥閻敬銘請終制不許官軍獲直東股匪朱登峯等悉誅之丙子捻首張總愚由魯山南召南竄己卯陶茂林軍解鳳翔圍實授茂林甘肅提督命丁憂總兵成祿留營撤退李泰國以赫德辦理總稅務司辛巳粵匪竄龍勝總兵胡元昌死之甲申諭駱秉章分軍剿瞻對疏通藏路諭阻法教士入藏傳教丁亥朝陽餘匪竄擾昌圖詔臣工力求節儉趣賈洪詔赴昭通以捐備馬匹賞扎薩克台吉明珠爾多爾濟貝子銜戊子李雲麟軍失利粵匪陷陝西山陽張總愚竄鄧州賴曹諸酋竄鳳縣兩當庚寅左宗棠軍擊敗杭州餘杭踞賊壬辰藍逆陷盩厔癸巳上釋服逾期祁寯藻倭仁李鴻藻請黜浮靡以固聖德懿旨屏斥玩好遊觀興作諸務祁寯藻等其各朝夕納誨養成令德以端治本而懋躬行逆酋古隆賢就撫收復石埭太平旌德曾國荃等軍復秣陵關丙申桂軍復容縣丁酉程學啓等軍攻克滸墅關己亥官軍剿昌圖匪失機諭責玉明諱飾辛丑英桂遷福州將軍以沈桂芬署山西巡撫癸卯李秀成援蘇州李鶴章等軍擊敗之命富明阿幫辦僧格林沁軍務是月免廣西永安等州廳縣被擾新舊額賦十一月丙午奉天匪竄吉林玉明等會剿皖軍復懷遠及蚌埠丁未僧格林沁督諸軍攻剿苗沛霖誅之李鴻章督軍復蘇州粵酋郜雲官等降加鴻章太子少保銜程學啓世職並賞黃馬褂戊申逆酋楊友清等以高淳寧國建平溧水降李雲麟等復山陽粵軍復信宜己酉劉典等軍復昌化庚戌藍逆竄商南癸丑張總愚竄淅川甲寅僧格林沁軍復下蔡壽州丙辰李鴻章誅郜雲官等遣散降衆丁巳李鶴章軍克無錫金匱庚申李續宜卒丘縣匪張本功等糾衆抗糧捕誅之實授閻敬銘山東巡撫汧陽回衆降壬戌官軍復潁上正陽癸亥馬化龍陷寧夏靈州論平苗逆功復李世忠職曾國荃軍克淳化等隘進駐孝陵丙寅官軍克嘉善張涇匯丁卯逆回圍寧夏滿城庚午蘇軍復平湖賊目以乍浦嘉善降是月免山東泗水等州縣災擾錢糧直隸武清等州縣被災額賦賑吉林打牲烏拉災十二月丁丑提督江忠義卒於江西軍次庚辰蘇軍克平望辛巳唐訓方罷以喬松年為安徽巡撫戊子以唐友耕為雲南提督令赴昭通辛卯談廷襄言統籌黃河下游地勢請濬支渠以減漲水培土埝以衛民田諭劉長佑閻敬銘會同籌辦癸巳陝回粵匪紛竄甘境甲午允蘇松太漕糧減價折徵乙未上御撫辰殿大幄賜蒙古王公宴賞賚有差每歲皆如之復彰化臺灣兩路賊平丙申翁同書加恩遣戍命左宗棠剔除浙東地丁積弊飭陝鄂川會勦漢南逆匪是月免山東陝西被擾州縣新舊額賦並孝義等廳縣倉糧是歲朝鮮入貢三年甲子春正月癸卯朔上率王大臣慶賀兩宮皇太后禮成御太和殿受朝自是每歲皆如之甲辰李鴻章軍擊常州援賊於奔牛鎮大捷丙午鳳翔回民乞撫許之商南匪竄鄖西調湖北石清吉軍赴陝援陝川軍失利於青石關庚戌河南捻匪竄隨州癸丑豫軍勦張總愚於趙莊山口失利己未官軍復修文及冊亨庚申調直晋兵援寧夏諭阿拉善旗禁蒙民與回匪勾結甲子李世賢竄績溪丙寅命都興阿赴綏遠會辦防務富明阿赴揚州接辦軍務己巳浙軍復海寧彰化匪首戴萬生伏誅粵匪竄石泉漢陰寧陝是月免安州等處歉收逋賦二月壬申朔官軍復漢中留壩黔軍復龍里乙亥粵匪竄廣信建昌庚辰寧夏回匪犯中衛等處熙麟分兵援之壬午廣東三山土匪平癸未粵匪陷鎮安旋復之丁亥多隆阿圍盩厔久未下切責之停山東畝捐從閻敬銘請也戊子桂軍克蒼梧等縣庚寅曾國荃等軍克鍾山石壘合圍金陵蔣益澧軍復桐鄉粵匪逼閩境張運蘭軍援之壬辰豫軍克息縣光州賊寨甲午粵匪竄廣豐弋陽庚子陝南匪竄內鄉三月壬寅程學啓等軍克嘉興贛軍金溪江南軍復溧陽陝軍克盩厔多隆阿以傷賜假穆圖善暫督軍務雷正綰等軍進剿逆回川匪藍二順竄洵陽丙午僧格林沁統全軍赴豫進至許州江南軍復廣德嘉義匪首林贛晟伏誅己酉戈登攻金壇受創命慰問岑育英等軍克他郎鎮沅庚戌命多隆阿督辦陝甘軍務壬子蔣益澧各軍克復杭州及餘杭加左宗棠太子少保銜賞益澧黃馬褂尋豫世職甲寅免杭嘉新復各地錢糧二年命穆圖善幫辦多隆阿軍務暫署欽差大臣川軍攻松潘匪復疊溪營城丁巳滇軍復景東元謀及楚雄癸亥贛匪竄福建乙丑逆首藍大順伏誅丙寅浙軍復武康德清石門諭左宗棠收養杭州難民己巳提督程學啓卒於軍庚午張總愚竄鎮平甘肅回匪馬三娃陷赤金堡官軍剿平之是月免貴州各府廳州縣被擾逋賦夏四月辛未朔日有食之壬申鮑超軍復句容丙子命都興阿赴定邊接統訥欽所部各軍進剿寧靈踞匪丁丑李世賢等竄江西鮑超軍復金壇捻粵各匪合竄棗陽陝南匪竄河南陷荊子關戊寅湘軍會復古州辛巳核減紹興浮收錢糧著為永例甲申李鴻章督軍克常州馮子材等軍復丹陽以故朝鮮王李世子襲爵命侍郎皂保副都統文謙往封丙戌以侍郎薛煥通政使王拯互訐均豫降調並申誡臣工官文赴安陸督師嚴樹森辦省城防守庚寅多隆阿卒於軍命都興阿督辦甘肅軍務雷正綰幫辦之辛卯贛軍解玉山圍癸巳嚴樹森以官文劾降以吳昌壽為湖北巡撫唐訓方署之命楊嶽斌督辦江西皖南軍務辛卯僧格林沁會楚軍剿粵捻於隨州大敗之丁酉以江防下游肅清裁汰師船並弛封江之禁戊戌粵匪陷弋陽陝南粵逆竄德安府僧格林沁軍追剿之己亥申誡統兵大臣奏報粉飾是月免武進陽湖本年額賦五月庚子