body:
  text: 清史稿卷二十一本紀二十一穆宗本紀一穆宗繼天開運受中居正保大定功聖智誠孝信敏恭寬毅皇帝諱載淳文宗長子母孝欽顯皇后那拉氏咸豐六年三月二十三日生於儲秀宮十一年就學編修李鴻藻授讀七月文宗不豫壬寅疾大漸召御前大臣載垣端華景壽肅順軍機大臣穆蔭匡源杜翰焦佑瀛宣諭立為皇太子命載垣端華景壽肅順穆蔭匡源杜翰焦佑瀛贊襄政務癸卯文宗崩召陳孚恩文煜赴行在甲辰尊皇后及聖母並為皇太后諭軍機處於各摺片後署贊襄政務王大臣乙巳免惇親王恭親王醇郡王鍾郡王孚郡王尋常召對及宴賚叩拜停各省貢獻方物丙午展順天文鄉試於九月舉行恩科武會試於十月順天武鄉試於十一月授駱秉章四川總督督辦軍務召雲貴總督劉源灝來京以福濟代之以崇實為成都將軍旋命協辦四川軍務湖北官軍復武昌咸寧通城等縣及江西義寧州戊申以景紋為駐藏辦事大臣己酉允恭親王赴行在叩謁梓宮庚戌薛煥請招商試運淮鹽濟餉議行辛亥粵匪陷吉安廣西官軍復賓州癸丑加上宣宗帝后尊諡甲寅粵匪陷靖安武寧義寧各州縣乙卯定年號祺祥八月丁巳朔日月合璧五星聯珠粵匪陷嚴州旋復之戊午官軍復新昌奉新瑞州上高己未命景廉赴葉爾羌查辦英蘊斂錢擅殺事允曾國藩請以上海現舶輪船駛往皖江歸其軍練習辛酉湖北官軍復德安壬戌江西官軍復武寧靖安癸亥頒大行皇帝遺詔勝保軍復濮州丁卯捻匪渡運河諭勝保與僧格林沁等截剿毋任北竄戊辰胡林翼以疾乞假命李續宜暫署湖北巡撫庚午御史董元醇請皇太后權理朝政簡親王一二人輔弼載垣等擬旨駁飭甲戌曾國荃軍復安慶戊寅廣西官軍復潯州庚辰四川番賊陷松潘辛巳論復安慶功加官文曾國藩太子少保胡林翼太子太保並豫騎都尉世職賞李續宜黃馬褂楊載福多隆阿雲騎尉世職癸未上大行皇帝尊諡曰協天翊運執中垂謨懋德振武聖孝淵恭謙仁寬敏顯皇帝廟號文宗苗沛霖陷正陽霍丘圍壽州九月丙戌朔上母后皇太后徽號曰慈安聖母皇太后徽號曰慈禧辛卯楊載福軍復池州壬辰捻匪竄汜水鞏縣官軍擊退之召張亮基來京金州地震甲午川軍剿平會理回匪丁酉允樂斌等奏撒拉回匪降撤回官軍庚子川軍復名山壬寅多隆阿曾國荃等復桐城宿松蘄州黃梅廣濟彭玉麟成大吉等復黃州湖北巡撫胡林翼卒調李續宜為湖北巡撫仍駐鄂皖交界督辦軍務擢彭玉麟為安徽巡撫癸卯浙江官軍復於潛昌化粵匪竄嚴州張玉良等軍潰甲辰英法撤廣州駐兵英撤駐天津馬隊乙巳僧格林沁剿平青州等處竄捻賞還御前大臣並黃韁戊申上奉大行皇帝梓宮返京師免承德及宛平各府縣田賦己酉苗沛霖反命袁甲三會賈臻諸軍討之甲寅上奉母后皇太后聖母皇太后還宮乙卯以擅改諭旨力阻垂簾解載垣端華肅順任罷景壽穆蔭匡源杜翰焦佑瀛軍機命恭親王會同大學士六部九卿翰詹科道按律核奏賈楨周祖培沈兆霖趙光疏請政權操之自上並議皇太后召見臣工禮節及辦事章程勝保疏請皇太后親理大政並簡親王輔政命王大臣大學士等定議以聞召醇郡王奕來京是日奪載垣端華肅順爵職逮問議罪命睿親王仁壽醇郡王奕逮肅順解京詔文武各衙門自十月十六日以後輪班值日鮑超軍復鉛山是月免西寧碾伯被擾額賦冬十月丙辰朔命恭親王奕欣為議政王在軍機處行走大學士桂良戶部尚書沈兆霖侍郎寶鋆文祥並為軍機大臣鴻臚寺少卿曹育瑛在軍機大臣上學習行走召盛京戶部侍郎倭仁來京丁巳諭求言申嚴門禁戊午大行皇帝梓宮至京奉安於乾清宮庚申詔改祺祥為同治辛酉恭親王等擬請載垣端華肅順照大逆律凌遲詔賜載垣端華自盡肅順處斬褫景壽穆蔭匡源杜翰焦佑瀛職穆蔭遣戍軍臺壬戌褫陳孚恩黃宗漢劉昆成琦德克津太富績職諭不究既往諸臣毋再請察辦黨援申誡王公內外文武大臣招權納賄甲子上御太和殿即皇帝位受朝頒詔天下以明年為同治元年加恩中外罪非常赦所不原者咸赦除之免惇親王恭親王醇郡王鍾郡王孚郡王諭旨及奏疏稱名乙丑懿旨以物力維艱誡內務府宮闈器用力行節儉賞還僧格林沁博多勒噶台親王命刑部核結五宇鈔票案通諭中外清理庶獄丙寅苗沛霖陷壽州東南方有聲如雷諭熱河未竟工程即時停止丁卯申誡各路統將粉飾遷延縱寇殃民補行咸豐十年恩科武會試己巳命總兵馮子材督辦鎮江軍務庚午諭議政王等贊理庶務毋避小嫌壬申諭統兵大臣實核功罪信賞必罰癸酉粵匪陷嚴州餘杭命曾國藩統轄蘇皖贛浙軍務節制巡撫提督以下各官瑞昌幫辦浙江軍務太常寺少卿左宗棠赴浙江剿賊調遣提鎮以下官丙子申諭郊配仍以三祖五宗為定皇考祔廟稱宗起用豫告大學士祁寯藻翁心存前太常寺卿李棠階籍陳孚恩家下獄治罪官軍復無為及隨州丁丑申誡廷臣遇事因循諭官文曾國藩等妥籌剿撫苗練粵匪陷蕭山紹興及江山常山趣左宗棠軍速援己卯釋貝子德勒克色楞於獄辛巳廷臣議上垂簾章程懿旨依議詔開恩科初烏拉停捕珠八年至是諭仍停辦壬午陳孚恩戍新疆命侍郎寶鋆董恂在總理各國事務衙門辦事甲申法兵去天津十一月乙酉朔上奉慈安皇太后慈禧皇太后御養心殿垂簾聽政丙戌諭各省習教交涉分別良莠持平辦理丁亥諭定戶部五宇鈔票侵款者罪復熙麟等官庚寅命各軍保薦將才壬辰山東教匪作亂成祿等剿平之匪首延秀輪伏誅甲午先是張亮基言雲南副將何有保戕鄧爾恆疑徐之銘主使至是之銘飾奏軍功為有保請奬諭福濟察辦撤任嚴參乙未石達開竄綏寧庚子諭中外舉人才以曾國藩胡林翼駱秉章為法辛丑粵匪陷紹興諸暨褫王履謙職逮問壬寅福濟以畏葸取巧褫職賞潘鐸二品頂戴署雲貴總督僧格林沁剿壽張等處會匪大捷癸卯命彭玉麟幫辦袁甲三軍務官軍復來安乙巳給事中高延祜劾徐之銘貪淫荒謬及滇省練黨縱恣諭潘鐸查辦丁未詔各省察舉循良並訪學行該備之士庚戌以吳棠為江寧布政使兼署漕運總督督辦江北糧台癸丑粵匪陷處州十二月甲寅朔諭曾國藩通籌進剿機宜乙卯諭談廷襄赴東昌籌河防濮范教匪平丁巳勝保奏收撫匪首劉占考宋景詩戊午國瑞軍復范縣粵匪陷寧波鎮海暨紹興各屬己未諭整頓鹽務辛酉命左宗棠迅速援杭張運蘭歸調遣得專奏軍事壬戌命江寧副都統魁玉幫辦鎮江軍務以毛鴻賓言諭督撫及統兵大臣因地選將毋專恃楚勇袁甲三軍復定遠允廓爾喀例貢改丁卯年呈進乙丑福建會匪陷福鼎尋復之河南捻匪竄棗陽丁卯曾國藩辭節制四省軍務不允己巳上孝德皇后尊諡曰孝德溫惠誠順慈莊恭天贊聖顯皇后兵部侍郎慶英有罪褫職戍新疆以青海札薩克貝勒綱僧却多布為左翼盟長辛未褫育科職擢沈葆楨為江西巡撫命恭親王醇親王督瑞麟文祥等管理神機營曾國藩奏派道員李鴻章統水陸軍赴鎮江規復蘇常允之定登萊青道駐烟台監督東海關稅務壬申降端華載垣世爵為不入八分輔國公甲戌免安徽江蘇浙江被賊來年額賦乙亥允江忠義終制田興恕兼署貴州巡撫旋以韓超署任命張亮基督辦雲南軍務徐之銘免雲南巡撫以亮基署之丁丑多隆阿軍進攻廬州石達開竄沅江黔陽逼川境諭駱秉章田興恕合擊之兩淮粵匪陷杭州瑞昌王有齡死之褫閩浙總督慶端職留任以左宗棠為浙江巡撫彭玉麟辭巡撫請專辦賊許之以為水師提督調李續宜為安徽巡撫嚴樹森為湖北巡撫以鄭元善為河南巡撫戊寅祁寯藻以大學士銜為禮部尚書改彭玉麟以兵部侍郎候補庚辰捻匪圍潁州勝保論劾嚴樹森諭令反躬自責保全名節副皇考委任之意以薛煥言諭總理各國事務衙門與英法籌商借兵剿賊壬午追封皇弟二阿哥為憫郡王趣左宗棠進取浙江命勝保率部赴潁州癸未僧格林沁擊竄匪於曹州河南岸殄之同治元年壬戌春正月甲申朔慈安皇太后慈禧皇太后御慈寧宮上率王大臣行禮御乾清宮受賀自是每歲皆如之命麟魁曾國藩協辦大學士乙酉詔酌撤畝捐釐捐拊循從征將士家室撫慰傷亡兵勇子孫以江西肅清賞鮑超黃馬褂李世忠復六合賞亦如之丙戌諭曾國藩左宗棠保衢州進解徽州圍命曾國藩選將保上海調蔣益澧部赴左宗棠軍庚寅勝保移軍潁州命副都統遮克敦布道員王榕吉接辦防務辛卯川軍復丹棱匪首藍潮鼎伏誅官軍復平越壬辰李世忠軍復天長癸巳粵匪李秀成陷奉賢南匯川沙命都興阿以艇師厄吳淞口丙申樂斌以縱匪殃民解任訊辦命麟魁署陝甘總督與沈兆霖剿撫撒回粵匪竄逼上海薛煥言英法各員協同防剿上嘉之丁酉初綿性請改徵回賦景廉赴阿克蘇勘辦之及是景廉覆劾綿性坐褫職尋戍吉林回子郡王愛瑪特解回庫車管束申誡回疆各大臣勿再攤徵命英蘊察禁私典阿克蘇各城回地戊戌粵匪犯鎮江馮子材軍擊退之捻匪竄沭陽諭僧格林沁南北兼顧官軍復莘縣己亥麟魁卒李世忠軍克江浦浦口撤慶端任命耆齡赴閩接辦援浙軍務庚子擢鮑超為浙江提督馮子材為廣西提督癸卯命喬松年督辦沿江團練丙午前安徽巡撫翁同書以失壽州定遠褫職逮問尋論斬丁未加鑄阿克蘇錢戊申文煜等上北塘防守事務允行英法留兵駐大沽炮臺雲南官軍復麗江回匪竄昆明庚戌粵匪竄松江官軍合外兵迎剿大敗之洋將美人華爾願隸中國籍賞四品頂戴花翎壬子命張亮基募軍赴滇癸丑諭遮克敦布等會剿河套捻匪二月甲寅朔官軍復來鳳乙卯懿旨皇帝在弘德殿入學讀書祁寯藻翁心存授讀丙辰擢曾國荃江蘇布政使並令辦理軍務毋庸回避丁巳粵匪陷黃巖官軍解鎮江徽州圍辛酉西寧辦事大臣多慧提督成瑞以飾言撒匪投誠並褫職議罪尋論斬樂斌以庇護褫職戍新疆壬戌命都興阿遣兵駐天長六合李世忠移軍江浦浦口和衷共濟粵匪陷安義旋復之癸亥捻匪圍嵵縣甲子以倭仁所進古帝王事蹟及古今臣工奏議陳弘德殿講肄乙丑僧格林沁軍擊捻匪大捷賊由嵵縣竄通許追剿之戊辰石達開竄酆都允田興恕請解欽差大臣率部赴川歸駱秉章節制命韓超籌貴州防剿事己巳薛煥言會英法軍剿高橋賊壘克之美人白齊文願入華籍賞四品頂戴花翎壬申金陵粵匪渡江擾江浦等處諭曾國藩都興阿抽調師船截擊之癸酉多隆阿軍進攻廬州丙子以上海洙涇陷褫提督曾秉忠職上海官軍會英法軍剿除蕭塘賊壘命崇厚成明督辦天津海防丁丑復鄭親王怡親王世爵諭李續宜安集皖北流亡是月免汀州等處被擾額賦三月癸未朔捻匪竄太和甲申允英法派師船往長江協同防剿丙戌粵匪竄上海薛煥軍擊敗之戊子賊陷青田允鄭元善請以丁憂布政使張曜專辦剿匪庚寅自正月以來不雨詔修省求直言左宗棠復遂安宋景詩降衆叛於蘭儀壬辰粵匪犯廬和及江浦甲午勝保軍進援潁州大捷丙申鄭元善言招回宋景詩令帶罪圖效允之戊戌命李續宜鄭元善幫辦勝保軍務辛丑前府尹莊琦齡應召陳崇正學疏通正途限制津貼抽釐籌軍實等十二策議行惟停養廉查陋規以妨政體不許詔各省舉孝廉方正務求真儒癸卯命沈兆霖督軍赴西寧剿撒匪乙巳萬壽節停受賀丙午趣曾國藩分軍援湖州丁未彙纂帝王政治及前史垂簾事跡書成名治平寶鑑己酉命副都御史晏端書赴廣東督辦釐金吳棠督辦江北團練命薛煥以頭品頂戴充通商大臣以