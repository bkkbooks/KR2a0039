body:
  text: 清史稿卷二十二本紀二十二穆宗本紀二六年丁卯春正月己未任賴諸匪竄孝感德安官軍失利總兵張樹珊死之壬戌復靖遠丙寅革官文總督召來京以李鴻章為湖廣總督調李瀚章為江蘇巡撫以劉昆為湖南巡撫己巳張錫嶸剿捻匪於西安魚化鎮死之劉松山軍大捷命喬松年專辦陝西軍務辛未命左宗棠為欽差大臣督辦陝甘軍務賞劉典三品卿銜幫辦軍務乙亥哈密回匪竄巴里坤官軍擊退之訥爾濟病免以伊勒屯為巴里坤領隊大臣丙子命徐繼畬仍在總理各國事務衙門行走管新設同文館事務己卯官軍復鎮雄二月乙酉朔劉銘傳追剿任賴于鍾祥失利鮑超進擊大敗之庚寅命李鴻章督軍赴豫壬辰京師疫甲午擢劉松山為廣東陸路提督丁酉陝回馬生彥等降減廣州屬徵收米折銀十九萬有奇著為令乙巳桂軍復泗城庚戌以丁寶楨為山東巡撫辛亥洮州復陷壬子雲貴總督勞崇光卒以張凱嵩代之三月丁巳鄂軍剿賊于蘄水失利道員彭育橘等死之癸亥總兵段步雲軍潰於鄜州戊辰鮑超纍乞病諭仍赴黃州乙亥命倭仁在總理各國事務衙門行走辭不允丁丑諭李雲麟等安頓新疆難民辛巳曹克忠軍復洮州壬午回匪馬占鼇等犯西寧是春免浙江仁和等場被擾逋課山西平定等處民缺倉穀夏四月丁亥允琉球國子弟入監讀書豫鮑超病假戊子何琯軍復哈密己丑周祖培卒癸巳吉林馬賊平丙申日斯巴尼亞使來換約壬寅劉松山大破捻回於同州丙午贈哈密殉難扎薩克郡王伯錫爾親王建祠德勒克多爾濟病免命麟興為烏里雅蘇台將軍調榮全為參贊丁未瞻對番目大蓋折布伏誅庚戌貴德回匪叛陷廳城五月甲寅哈密回匪竄玉門官軍擊退之以旱命恤難民育嬰孩掩暴露贍陳亡者家屬戊午諭廣購書籍並重刊御纂欽定經史頒發各學己未郭寶昌劉松山兩軍破張總愚於朝邑免郭寶昌遣戍辛酉命曾國藩為大學士駱秉章協辦大學士丙寅詔清理庶獄丁卯桂軍復荔波義寧戊辰詔求直言核減宮廷用款己巳捻匪渡運河豫丁寶楨嚴議庚午賊竄長垣官軍擊退之癸酉以剿賊無功褫曾國荃頂戴與李鶴年下部嚴議諭李鴻章戴罪圖功京師地震庚辰董福祥陷陝西甘泉六月甲申總理各國事務衙門言俄人窺伺新疆下大學士尚書左都御史會總理王大臣妥議丙戌申禁州縣浮收漕糧甲午倭仁乞病罷職務仍以大學士直弘德殿乙未官軍敗捻匪於即墨庚子順直久旱饑賑恤之允鮑超回籍辛丑李鴻章檄劉銘傳潘鼎新等軍防運河扼膠萊命成祿節制黃祖淦王仁和兩軍以畿內亢旱撥閩廣贛釐捐三十萬浙閩海關洋稅三十五萬備賑需癸卯甘回陷陝西華亭旋復之丁未免昌平例貢果品己酉自三月不雨以來上頻祈雨至是日雨是月免陝西乾州等屬災擾額賦秋七月己未雨陝軍復甘泉庚午永定河決己卯以捻匪過膠萊河諭各路扼守河運兩防奪丁寶楨職仍留任是月免湖南晃州被擾逋賦八月丙戌停奉天冬圍戊子湖北匪首劉漢忠伏誅庚寅命黎培敬會辦貴州剿撫及屯田事宜壬辰奉軍剿平孤山法庫等處賊匪辛卯署貴州提督趙德光剿賊於安平死之丙申穆隆阿等軍剿梟匪於文安失利濟陽土匪作亂剿平之丁酉迤西回犯姚州戊戌貴州巡撫張亮基開缺嚴議命曾璧光署之布政使嚴樹森以逗遛褫職壬寅召陳國瑞來京丙午以淮楚各軍所至騷擾諭李鴻章嚴申軍律己酉裁熱河木稅庚戌創建福建船塢九月壬子允左宗棠調曹克忠赴陝丙辰賴任諸匪犯運河牛師韓軍擊退之丁巳河狄西寧回衆投誠庚申停山東例貢辛酉安置額魯特游牧於額爾齊斯河甲子總理各國事務衙門言預籌修約事諭曾國藩等各抒所見以聞己巳命丁日昌赴上海辦理義國換約壬申撫恤巫山被水災民丁丑命榮全與棍噶札拉參籌辦哈薩克剿撫機宜己卯命馮子材赴左江專辦南太軍務賑襄陽等府災民冬十月癸未諭各路統兵大臣及各督撫嚴申軍律甲申察哈爾都統色爾固善卒以庫倫辦事大臣文盛代之乙酉以張廷嶽為庫倫辦事大臣丙戌陝軍復寧條梁及宜君飭席寶田軍赴沅州統援黔軍務壬辰迤西回陷定遠大姚癸巳汪元方卒命沈桂芬在軍機大臣上學習行走丙申曾國荃病免以郭柏蔭為湖北巡撫蘇鳳文為廣西巡撫賑山東被水災民乙巳派美前使蒲安臣往有約各國辦理中外交涉己酉回匪陷寶雞正寧旋復之十一月庚戌朔命道員志剛郎中孫家穀往有約各國充辦理交涉事務大臣壬子劉銘傳等軍剿賊贛榆大捷任柱伏誅癸丑以梟匪蔓延褫劉長佑職仍責自效命官文署直隸總督丙辰陝軍剿捻洛川遇回匪失利提督李祥和死之癸亥張總愚陷延川綏德甲子增設布倫托海辦事大臣以李雲麟為之明瑤為幫辦福濟為科布多幫辦甲寅劉銘傳軍剿賊於諸城大捷丁丑陝軍復延川綏德十二月壬午張總愚竄吉州左宗棠趙長齡均褫職留任成祿剿回匪於肅州失利總兵黃祖淦死之癸未賞陳國瑞頭等侍衛隸左宗棠軍劉銘傳等剿賊於壽光大捷迤西回陷祿豐廣通元謀己丑官軍復吉州壬辰直隸梟匪平甲午賞劉長佑三品頂戴命率所部回籍永定河隄工合龍丙申命蔣益澧以按察使候補隸左宗棠軍率楚勇回籍丁酉駱秉章卒劉松山等敗張總愚於洪洞調吳棠為四川總督以馬新貽為閩浙總督李瀚章調浙江巡撫丁日昌為江蘇巡撫戊戌淮軍勦賊高郵大捷獲賴文光等誅之辛丑東捻平加賚李鴻章曾國藩世職賞劉銘傳英翰及郭松林楊鼎勳善慶世職有差復曾國荃頂戴壬寅以左宗棠督師入晉命庫克吉泰喬松年劉典督辦陝西軍務甲辰命楊占鼇署甘肅提督接辦西路軍務戊申左宗棠檄喜昌劉松山等赴磁州迎剿諭張曜劉銘傳等會剿己酉命鄭敦謹往山西查辦事件是月免浙江仁和等場未墾竈課雲南嵩明等屬歉收額糧是歲朝鮮琉球入貢七年戊辰春正月庚戌朔捻首李允等率衆降於盱眙詔誅之遣散餘衆命朱鳳標協辦大學士乙卯回匪復陷正寧丙辰喜昌等擊張總愚於河內大捷西寧回陷北川李雲麟乞病不許以錫綸為布倫托海幫辦大臣辛酉張總愚北竄定州保定戒嚴官文左宗棠均褫職留任諭玉亮統神機營兵剿賊壬戌張總愚犯清苑劉松山郭寶昌等軍繞賊前剿之豫優陳國瑞宋慶張曜均以軍至保定達賴請宥𩹉塘犯東登工布死罪允之命賈楨等設團防總局癸亥諭令天津洋槍練軍各隊赴河間與山東軍聯絡防剿甲子李鴻章遣周盛波等軍北援趣左宗棠赴保定北方督剿命恭親王會同神機營王大臣辦巡防壬申允英翰入衛畿疆命統牛師韓軍駐黃河以南飭程文炳軍赴河間會剿癸酉張總愚陷饒陽旋復之賈楨以病致仕乙亥命左宗棠總統各路官軍二月辛巳官軍復渭源癸未命恭親王節制各路統兵大臣戊子回匪復陷寧條梁己丑回匪竄伊克沙巴爾官軍擊退之褫趙長齡陳湜職遣戍壬辰陝軍復寶雞癸巳滇軍解鎮雄圍迤西回陷楚雄乙未豫皖各軍敗張總愚于束鹿庚子左宗棠李鴻章等軍剿賊迭破之回匪陷懷遠神木壬寅白泥苗匪降乙巳以朝鮮請嚴邊禁命延煦奕榕赴奉天會都興阿勘展邊事宜三月壬子張凱嵩乞病諭責其逗留規避褫職回匪陷鄜州劉典駐三原督勦癸丑以劉嶽昭為雲貴總督岑育英為雲南巡撫乙卯陝軍復鄜州癸亥諭庶吉士散館仍試詩賦戊辰張總愚竄延津封丘劉松山郭寶昌擊敗之辛未命沈桂芬為軍機大臣乙亥命朱鳳標為大學士丙子迤西回陷易門丁丑張總愚竄滑縣擊敗之是月免直隸安州等處潦地逋賦夏四月己卯朔哈密回陷五堡官軍擊退之甲申張總愚陷南皮丁亥諭左宗棠李鴻章丁寶楨等督各軍於運河東西分路防剿己丑苗匪何正觀降庚寅陝軍剿回匪於邠州失利談玉龍死之己巳永定河決乙未召都興阿來京戊戌黎平苗犯晃沅各境官軍擊退之辛丑寧條梁回擾鄂爾多斯游牧貝子札那格爾濟擊退之回匪犯哈密伊勒屯等會擊退之癸卯賜洪鈞等二百七十人進士及第出身有差是月免四川各土司三年租賦閏四月戊申朔迤西回竄陷昆陽新興晉寧呈貢嵩明戊午回匪復陷神木癸亥陝軍復延長甲子董福祥投誠諭立功自贖乙丑回匪踞烏紳旗分擾準噶爾旗逼托克托城丁卯程文炳陳國瑞劉松山等軍擊張總愚于高唐茌平博平大捷賊竄東光己巳回匪再陷慶陽及寧州合水知縣楊炳華死之辛未命都興阿為欽差大臣會同左宗棠李鴻章剿捻調遣春喜陳國瑞張曜宋慶四軍崇厚幫辦軍務五月戊寅劉松山等軍剿張總愚於鹽山海豐大捷己卯創設長江水師置嶽州漢陽湖口瓜州四鎮總兵官癸未陝軍擊退竄邠鳳回匪壬辰北山土匪犯延安官軍失利副將劉文華等陳沒庚子滇軍復元謀武定祿勸羅次是月免湖南晃州被擾逋賦六月己未郭松林等剿捻於臨邑濱州陽信大捷諭水師嚴扼運防辛酉桂軍復歸順癸亥金匪竄寧古塔界官軍勦平之甲子陝軍克宜川丙寅張總愚犯運河岸官軍擊敗之捻衆多降戊辰又擊之於商河大捷乙亥李雲麟褫職查辦命明瑤為布倫托海辦事大臣浙江海塘工竣秋七月丁丑蠲直魯豫被擾各州縣田賦己卯春壽以欺飾褫職壬午撫恤滄州等處被擾難民乙酉張總愚赴水死捻匪平加李鴻章左宗棠太子太保銜鴻章以湖廣總督協辦大學士丁寶楨英翰崇厚並加太子少保銜復官文銜翎晉劉銘傳一等男郭松林一等輕車都尉賞宋慶善慶二等輕車都尉劉松山黃馬褂三等輕車都尉郭寶昌張曜溫德勒克西騎都尉黃翼升加一雲騎尉復陳國瑞提督世職餘升有差命惇親王祭告定陵允彭玉麟回籍終制丙戌召左宗棠李鴻章入覲丁亥滎澤河決辛卯毛昶熙言軍務漸平宜益思寅畏旋御史張緒楷疏請保泰持盈及時講學並嘉納之壬辰允左宗棠請資遣降衆回籍癸巳武陟沁河堤決乙未調曾國藩為直隸總督馬新貽為兩江總督以英桂為閩浙總督命彭玉麟赴江皖會籌長江水師事宜戊戌諭蘇皖豫魯各屬修墟寨飭鄉團庚子豫宋儒袁燮從祀文廟援黔川軍復龍里貴定川軍剿越嶲夷匪勝之俘其酋勒烏立授曾璧光貴州巡撫辛丑布倫托海變民竄烏隴古河德勒克多爾濟卒癸卯撫恤滎鄭災民甘回擾白水郃陽陝軍擊退之甲辰援黔湘軍復甕安八月乙巳朔褫御史德泰職以奏請修理園庭也庫守貴祥妄陳希利發黑龍江為奴永定河決己酉諭明瑤等規復布倫托海舊制命馬新眙兼辦理通商事務大臣壬子延安土匪扈彰降癸亥諭左宗棠兼顧山西軍務戊辰諭吉林嚴定開墾圍荒界限辛未諭金順專辦援陝軍務是月免皖蘇魯豫鄂被擾積年逋賦九月壬午官軍復慶陽甲申肅州回攻敦煌官軍擊退之諭伊勒屯等籌辦巴里坤屯田乙酉援黔川軍會復平越辛卯命延煦出關查辦奉天展邊事宜癸巳滇軍復晉寧呈貢是月免浙江橫浦等場歉收竈課冬十月丁未回匪犯涇州靈臺擊退之乙卯文麟抵哈密諭興辦蔡巴什湖等處屯田丙辰穆圖善克河州賑濟南武定水災丁巳戍李雲麟黑龍江戊午命李鴻藻仍直弘德殿及軍機庚申以守科布多功加土爾扈特郡王凌札棟魯布親王銜己巳黔苗復陷興義旋復之十一月甲戌援黔川軍復麻哈丁亥涼州總兵周盛波以不戢所部褫職回匪擾鄂爾多斯等旗竄榆林諭定安等截勦壬辰諭除吏胥積弊己亥黔軍克都勻賞張文德黃馬褂庚子臺灣英領事縱洋將掠船踞營署焚局庫勒兵費諭總署詰辦飭英桂等遴員交涉壬寅熱河匪平免吉林雙城堡被水屯田租賦十二月甲辰朔川軍勦西昌夷匪連捷各夷部降援黔湘軍復天柱丙午回匪犯包頭蒙軍失利丁未熱河匪首彌勒僧格伏誅甲寅以曾國藩言川私病楚諭籌止川鹽濟楚章程撤局停稅丁巳滇軍復澄江庚申申諭各省禁種罌粟壬戌黔苗竄擾河池官軍擊退之乙丑諭朝審緩決三次以上者並減等永定河工竣戊辰麒慶罷以慶春為熱河都統庚午劉松山剿賊大理川大捷壬申截鄂餉二十一萬賑河南災是月免江蘇荒地糧賦山東泰安河南汝寧等屬被擾逋糧是歲朝鮮入貢八年己巳春正月癸酉朔停筵宴丁丑川湘黔桂各軍勦苗匪黔軍復長寨戊寅滇軍克富民己丑劉松山等軍擊土回各匪敗之於清澗成祿克肅州與楊占鼇並賞黃馬褂甲午滎工合龍丙申劉松山軍敗賊于靖邊董侍有等以鎮靜堡及靖邊降迤西回犯昆明岑育英等擊退之辛丑雷正綰克涇州董家堡二月戊申命袁保恆督辦西征糧餉三月癸酉朔林自清戕興義知縣提督陳希祥誘誅之賞希祥黃馬褂甲戌援黔湘軍復鎮遠府衛兩城己卯甘肅提督高連升部兵變戕連升部將周紹濂擊逆黨於同官殄之乙酉諭督撫於克復州縣慎選牧令拊循流亡庚寅回匪陷磴口甲午吐魯番回匪犯哈密官軍迭敗之乙未桂軍克憑祥己亥懿旨大婚典禮力崇節儉是春免江蘇山陽直隸安州等屬災擾額賦兩淮富安等場逋缺竈課夏四月癸卯朔迤西回陷楊林營劉嶽昭退守曲靖嚴責之乙巳麟興以畏事褫職以福濟為烏里雅蘇臺將軍文碩為布倫托海辦事大臣己酉雷正綰黃鼎軍復鎮原慶陽援黔川軍復甕安己未援黔湘軍會復清江庚申允劉銘傳乞病辛酉免陳湜遣戍是月免山東東昌等屬逋賦五月庚辰援黔湘軍復施秉進攻黃飄賊壘失利按察使黃潤昌道員鄧子垣提督劉長槐死之壬午回匪陷澄江甲申杜爾等軍大破賊於杭錦旗辛卯命李鴻章赴四川察辦吳棠劾案申誡岑育英任用通賊練目苛斂民捐以馬如龍為雲南提督丙申官軍剿匪於保安大捷匪首袁大魁等伏誅自春正月不雨至於是月上頻禱祈丁酉雨六月辛亥援軍會克尋甸壬子命董恂崇厚辦理奧斯馬加換約甲寅永定河決戊午豫黃飄死事提督榮惟善總兵羅志宏等世職加等辛酉武英殿災癸亥倭仁徐桐翁同和請勤修聖德以弭災變上嘉納之丙寅諭督撫考課農桑庚午回匪犯阿拉善定遠營蒙兵失利秋七月辛未朔日有食之癸酉張曜等軍敗回匪於察漢淖爾命吳坤修赴沿江各屬撫恤災民甲戌滇軍復嵩明克白鹽井甲申桂軍會越南軍克九葑洛陽等隘乙酉諭錫綸賑恤額魯特人衆丙戌朝鮮請鴨緑江北禁游民建屋墾田趣都興阿等妥辦壬辰何琯軍敗賊于木壘河等處是月免晃州被擾逋賦八月庚子朔俄商船泊呼蘭河口求吉黑內地通商諭總署按約止之禁軍民私與貿易癸卯內監安得海出京丁寶楨奏誅之黔匪復陷都勻丙午桂軍會復越南高平庚戌申諭約束太監壬子官軍勦平杭錦旗屬竄回癸丑寧夏官軍勦賊失利副將方大順陳亡戊午棍噶札拉參軍復布倫托海賊首張等伏誅己未官軍勦達拉特旗竄匪殄之是月賑浙江杭湖各屬湖南安鄉等縣水災九月庚午高臺勇潰褫成祿職留任壬申撥京餉三十萬濟武漢等屬工賑甲戌馬化龍復叛襲陷靈州官軍復威戎堡水洛城戊寅滇軍復易門壬午免暹羅補歷年貢品庚寅烏魯木齊匪竄哈密何琯等擊敗之乙未福建新造第一輪船成命崇厚勘驗戊戌諭福濟等額魯特各安舊居僧衆居阿爾泰山南俗衆居青格里河冬十月庚子劉松山敗回匪於吳忠堡等處辛丑金順又敗之於納家閘命楊占鼇署甘肅提督辦肅州善後事宜法使羅淑亞與其水師提督以兵船赴贛鄂川省查教案諭所在按約待之乙巳雷正綰黃鼎敗回匪於固原鹽茶丁未命毛昶熙沈桂芬在總理各國事務衙門行走辛丑命文碩等會勘布倫托海分界事宜董恂辦理美國換約甲寅滇軍復楚雄南安定遠劉嶽昭移軍昆明己未哈密官軍剿西路回匪大捷甲子鳳凰城匪首王慶等伏誅乙丑劉松山軍復靈州是月賑雲南水災直隸旱災十一月丙子茌平教匪孫上汶等謀逆捕誅之丁丑裁新設布倫托海辦事大臣庚辰賑江寧水災癸未免科布多屬貢貂甲申滇軍復昆陽丙戌甘軍復靖遠庚寅永定河口合龍乙未命文碩來京改奎昌辦理分界是月免直隸東明被淹被擾安徽無為等州縣衛被水逋賦十二月庚子援滇川軍克魯甸乙巳劉松山軍攻金積堡總兵簡敬臨等死之乙卯披楞侵占哲孟雄各地廓爾喀與唐古特搆嫌諭恩麟防維開導布魯克巴內鬨並諭恩麟解釋撫綏丁巳越南匪平諭蘇鳳文嚴申邊禁癸亥賑畿南災是歲朝鮮越南琉球入貢九年庚午春正月丁卯朔停筵宴癸酉滇軍復祿豐甲戌甘軍擊敗援賊於王家疃己卯回匪陷定邊癸未神武門木庫火詔修省庚寅回匪陷安定陝軍復定邊甲午馬德昭留辦潼關防務二月辛丑劉松山督勦金積堡回匪中炮卒賞道員劉錦棠三品卿銜接統其軍以俄官往齊齊哈爾吉林商界務諭富明阿德英據約待之毋遷就乙巳回匪分竄安邊清澗陝軍擊走之丙午又分竄花馬池榆林宋慶軍勦之戊申官軍擊敗米脂竄匪壬子命李鴻章赴陝西督辦軍務甲寅回匪竄同官宜君陝軍剿敗之丙辰法使因教案藉兵要挾諭各疆吏通商大臣迅結交涉事宜辛酉寧夏各堡降回復叛三月丁卯朔回匪竄準噶爾旗馬玉崑擊敗之辛巳雷正綰以疏防峽口褫職留營諭誡西征各軍貪功鋭進乙酉滇軍復彌渡賓川麗川緬寧辛卯回匪分擾岐鳳李輝武擊敗之夏四月甲辰談廷襄卒五月庚午命崇實赴貴州會同曾璧光查辦教案癸酉始允英國設置沿海各口電線甲戌援黔川軍克黃飄白堡等苗寨庚寅天津人與天主教啓釁焚毀教堂毆斃法領事命曾國藩與崇厚會商辦理乙未諭疆吏飭禁播謠惑衆保護通商傳教各區李鴻章督軍入關請調郭寶昌軍允之命崇厚為出使法國大臣以成林署三口通商大臣是月免直隸安州等屬逋賦六月戊戌奎昌赴塔爾巴哈台與俄使勘辦立界壬寅賽音諾顏部蒙兵剿回匪失利丁未滇軍復威遠己酉命彭玉麟赴江南會同沿江督撫整頓長江水師庚戌甘軍敗回匪於鞏昌乙卯永定河決庚申以疏防民教啓釁褫天津知府張光藻知縣劉傑職下部治罪辛酉滇軍復姚州癸亥命毛昶熙會同曾國藩查辦教案曾國藩言善全和局為保民之道備禦不虞為立國之基諭旨嘉勉命丁日昌赴天津幫辦洋務秋七月戊辰以琿春邊務事繁加協領副都統銜為定制丙子法使羅淑亞以曾國藩不允府縣論抵回京諭國藩迅緝原凶從速辦結丁丑召崇厚還命毛昶熙署三口通商大臣甲申周盛傳等勦散北山餘匪丙戌諭曰海上水師與江上水師截然不同欲捍外侮圖自強非二十年之久未易收效然因事端艱巨畏縮不為則永無自強之日近年內外臣工值事急時徒事張皇禍患略平又為苟安之計即創立戰守章程而奉行不力使朝廷謀議均屬具文積習因循焦憂曷釋茲閩滬兩廠輪船告成馬新貽丁日昌英桂沈葆楨各擇統將出洋窮年練習以備不虞廣東亦應籌備輪船瑞麟李福泰務切實辦理將校有熟諳風濤沙線者隨時擇保即山野中或長於海戰亦當隨時物色量材超擢各督撫其統籌全局以副委任庚寅南路甘軍復渭源狄道是月免晃州被擾逋賦八月丁酉汝陽人張汶祥刺殺馬新貽命曾國藩為兩江總督李鴻章調直隸總督李瀚章為湖廣總督戊戌設黃河水師庚子北山匪首李凡覺伏誅壬寅命張之萬會同魁玉訊張汶祥己酉召毛昶熙還命李鴻章會曾國藩查辦天津教案癸丑桂軍剿平安邊河陽賊匪梁添錫伏誅允越南進方物及馴象己未命李成謀為新設輪船統領九月戊辰滇軍復新興庚午諭崇實仍赴遵義辦教案甲戌治天津民教啓釁罪張光藻劉傑遣戍誅逞凶殺害之犯十五人是秋川東荊州熱河被水賑撫之冬十月乙未沈葆楨丁憂命百日後仍經理船政丙申命劉銘傳督辦陝西軍務諭嚴禁四川州縣苛派撥發續賑北山難民辛丑以江北漕船阻淺由陸路轉運臨清甲辰天津製造局成庚戌日本請立約通商允總署遴員議約辛亥免科布多貢貂壬子裁三口通商大臣命直隸總督經理如南洋大臣例給欽差大臣關防嚴諭疆吏慎密交涉有漏泄者立誅之丙辰以水旱疊見詔修省戊午移周盛傳軍衛畿輔陝回禹生彥等竄平番官軍失利提督張萬美等死之庚申設直隸津海關道劉錦棠各軍克漢伯等堡合圍金積堡閏十月乙丑俄使倭良哩來京庚午湘潭會匪平乙亥滇軍復永北鶴慶鎮南楚雄回匪陷烏里雅蘇台丙子永定河合龍諭曾國藩籌河運戊寅越南吳亞終等伏誅十一月癸巳命鄭敦謹會鞫張汶祥獄尋定讞磔張汶祥于江寧丁酉回匪竄涼州副將謝元興陳沒王仁和擊退之辛丑援黔湘軍復台拱戊申福濟榮全以匪入烏里雅蘇台褫職留任命曾國藩兼通商大臣庚戌甘肅總兵周東興侵賑命斬於軍前庚申劉坤一以漏泄密諭褫職留任十二月甲子諭嚴禁河工偷減侵蝕諸弊辛未滇軍復鄧川浪穹回目馬源發戕提督丁賢發等捕誅之是冬免貴州興義等州縣衛陝西綏德等州縣災擾逋賦是歲朝鮮入貢十年辛未春正月辛卯朔停筵宴壬辰官軍克河西王疃賊壘賞金順黃馬褂加張曜一雲騎尉乙未黔軍平貴定等處賊壘克都勻賞提督林從泰總兵何雄輝黃馬褂己亥諭馮子材赴太平進勦牧馬諒山匪壬寅官文卒是月免直隸安州等屬被水額賦二月壬戌劉錦棠等軍克金積堡匪首馬化龍等伏誅加左宗棠一騎都尉賞劉錦棠雲騎尉黃馬褂開復雷正綰處分及陳湜原官賞黃鼎金運昌黃馬褂置就撫陝回於華亭之化平川設通判都司以綏靖之前知靈州彭慶章坐為賊主謀處斬壬午獲叛將宋景詩誅之丁亥調江蘇按察使應寶時赴津籌辦日本通商事命瑞常為大學士文祥協辦大學士三月癸巳金順等軍克寧夏匪首馬萬選伏誅己丑滇軍復澄江克江那土城匪首馬和等伏誅辛丑普使李福斯致國書以德意志各國及自主之三漢謝城共復一統受尊稱為德意志皇帝復書賀之丁未以倭仁為文華殿大學士瑞常為文淵閣大學士自春初至於是月上連祈雨庚戌雨夏四月丙寅援黔湘軍復新城巖門司等城克高坡等苗寨己巳寧夏納家閘回衆降己卯陝回竄擾平番碾伯官軍擊退之辛巳倭仁卒甲申賜梁耀樞等三百二十三人進士及第出身有差築大沽北塘炮臺乙酉福濟革職以金順為烏里雅蘇台將軍丙戌回匪復竄擾賽音諾顏部焚掠固爾班賽汗等處五月庚寅朔雨乙未左宗棠請禁絶回民新教不許戊戌苗酋聞國興等降八寨等城俱復壬寅回匪擾烏拉特杜爾薩薩布軍合擊之丙午援黔湘軍復丹江凱里等城賞蘇元春黃馬褂己酉以李世忠尋仇鬬很陳國瑞演劇生事褫世忠職降國瑞都司併勒回籍畀有司管束辛亥鄭親王承志有罪褫爵逮訊命李鴻章辦日本商約應寶時陳欽為幫辦乙卯金順乞假守制葬親不許己未滇軍復雲龍六月壬戌太白晝見益陽等處會匪平己巳陝回白彥虎結西寧回衆擾河州庚午黔軍克永寧鎮寧歸化苗寨破郎岱水城各峝寨乙亥命瑞麟為大學士仍留兩廣總督任己卯阜陽匪擾沈丘汝陽官軍捕誅之辛巳以廣東盜賊橫行諭飭嚴緝丁亥德宗生於醇邸戊子賑天津災秋七月己丑朔桂軍勦越南竄匪克長慶斬匪首趙雄才壬辰杜爾軍勦賊於布拉特勝之甲午永定河復決丙申穆圖善赴北山勦賊金運昌軍剿烏拉特竄匪勝之丁未河內沁河決乙卯昌圖賊匪竄擾都興阿遣軍剿平之八月壬申以副都統慶至襲封鄭親王甲戌桂軍克安世賊寨追剿太原竄匪蘇國漢赴廣東乞降丁丑詔各省設局收養流寓孤寡九月丙申革高郵徵糧弊習丁酉甘軍克康家崖要隘趣榮全赴伊犁給劉銘傳假三月壬寅諭奉吉整頓吏治嚴緝盜賊命恩錫往上海辦奧國換約丁未喬松年等會堵侯家林決口是秋賑順直各屬及菏澤等州縣災免濮州被水晃州被擾逋賦冬十月戊午朔達爾濟以撤營縱賊褫職逮治命曹克忠接統劉銘傳軍赴肅州防剿庚申以湖南匪變命李鴻章查辦壬辰命景廉為烏魯木齊都統癸未詔免伊犁被脅官吏軍民等罪以參領貢果爾接統達爾濟軍十一月癸巳甘軍克河州禹得彥等降丁未西寧回匪竄烏拉特及中衛張曜軍擊退之乙卯肅州回匪復犯敦煌文麟援剿之十二月辛未豫先儒張履祥從祀文廟丁丑香山匪徒曾大鵝幅等作亂捕誅之是歲朝鮮琉球越南入貢十一年壬申春正月丙戌朔停筵宴己丑以紀年開秩諭減刑文碩以乞病褫職辛卯桂軍復越南從化克鎮山癸巳甘軍連破甘坪大貝坪等處賊壘進攻太子寺庚子黔軍克清平黃平重安辛丑援黔湘軍克黃飄白堡苗寨辛亥命侍郎崇厚太常寺少卿夏家鎬在總理各國事務衙門行走二月庚申允江蘇辦米試行河運漕白二糧仍由海運丙寅曾國藩卒贈太傅戊辰褫劉銘傳職以前功仍留一等男爵庚午起彭玉麟巡閲長江水師甲申侯家林決口合龍越南匪首蘇國漢等伏誅是月賑四川各屬災三月乙酉朔黔軍復貞豐丙戌甘軍剿太子寺回匪失利提督傅先榮徐文秀死之褫提督楊世俊黃馬褂降參將甲午免達爾濟等罪仍褫職效力丁酉以奉匪擾朝鮮境嚴緝之辛丑瑞常卒是春免湖北黃陂直隸安州甘肅河州等處被擾逋賦夏四月丙辰回匪竄定邊靖邊陝軍擊退之己未西寧回目馬占鼇陝回崔三米拉溝回目治成林等先後乞降丙寅停淮關傳辦活計諭內務府力求撙節己卯通政司副使王維珍疏陳先意承志孝思維則豫嚴議尋褫職是月免貴州興義等屬被擾逋賦五月甲申朔日有食之免熱河騰圍旗民租課三年乙酉自三月初旬慈禧太后弗豫月餘不視朝至是御史李宏謨請勤召對諭責其冒昧嚴飭之癸巳徐占彪軍剿肅回屢捷左宗棠劾成祿糜帑遷延命穆圖善查辦乙未貴州苗匪平賞席寶田騎都尉丙申陝回宋全德等降豫伊犁殉難已革尚書陳孚恩暨其眷屬旌恤加等庚子命李鴻章為大學士仍留直隸總督任乙巳滇軍克永平及雲南六月甲午朱鳳標致仕命文祥為大學士全慶協辦大學士丁卯諭停本年秋審朝審句決以單懋謙協辦大學士秋七月癸未朔滇軍會克興義己丑免廓爾喀例貢賑達木蒙古及三十九族被災兵民戊戌回匪竄擾寧夏西路及阿拉善旗官軍擊退之己亥直隸呈進瑞麥御史邊寶泉疏論之諭李鴻章勤恤民隱補救偏災毋鋪張瑞應庚子永定河北下汛溢是月免湖南晃州被擾逋賦八月庚午截江北漕米十萬餘石賑畿輔被水災民癸酉金順以遷延罷常順署烏里雅蘇臺將軍辛巳以單懋謙為大學士九月癸未滇軍克趙州蒙化並大理上下關賞楊玉科李維述黃馬褂左宗棠言地産瑞麥瑞穀諭却之乙未冊立皇后阿魯特氏自王大臣以次推恩加賚頒詔天下覃恩有差永定河工合龍丙午允彭玉麟乞病回籍仍命每年巡閲長江水師庚戌榮全請令慶符招撫纏民英廉等馬隊駐庫爾喀喇烏蘇酌募民勇允之十月丁巳甘肅潰勇首犯馮高山等伏誅己未加上兩宮皇太后徽號戊辰廣西隆安岑溪土匪西隆苗匪平壬寅諭統兵大臣約束委員治騷擾逾限者罪允恭親王請復軍機處舊制丙子何璟憂免以張樹聲署兩江總督十一月乙酉朝鮮匪船越境侵擾都興阿等水師緝剿之回匪擾哈密東山官軍剿勝之禁殿廷鄉會考試請託冒替己卯瓊州土匪平誅匪首何亞萬等辛卯滇軍剿館驛等踞匪迤東迤南肅清乙未肅回竄扎薩克汗各旗官軍擊走之黔軍會克新城下江苗匪亂張文德軍剿除之全黔底定丙申捻匪竄擾太湖水師剿平之允軍民入哥老會者自首免罪丁酉申禁各省種罌粟辛丑劉錦棠等軍剿回匪大捷丁未陝軍剿陝北二道河等處竄匪殄之李鴻章奏設招商局試辦輪船分運江浙漕糧十二月己未駐藏幫辦德泰坐事褫職回旗丙辰諭吏部兵部理藩院親政後各署有請旨及軍務摺片均用漢文丁卯釋田興恕回丙子左宗棠乞病溫旨不許己卯祫祭太廟是歲朝鮮入貢十二年癸酉春正月辛巳朔癸未官軍擊回匪於那瑪特吉幹昭敗之丙戌以李宗羲為兩江總督兼通商大臣辛丑成祿以苛捐誣叛褫職逮問趣金順接統其軍甲辰滇軍克大理回酋杜文秀楊榮蔡廷棟等伏誅賞岑育英黃馬褂騎都尉世職開復劉嶽昭處分賞楊玉科騎都尉乙巳兩宮皇太后以親政屆期懿旨勉上祇承家法講求用人行政毋荒典學勗廷臣及中外臣工公忠盡職宏濟艱難丙午上親政詔恪遵慈訓敬天法祖勤政愛民己酉諭內務府核實撙節於歲費六十萬外不得借支二月庚戌朔軍機大臣六部九卿會議黃運兩河辦法諭李鴻章悉心籌辦奏聞下詔修省求直言諭直省舉賢才杜侵蠹戊午加上兩宮皇太后徽號翌日頒詔覃恩有差劉錦棠軍克大通向陽堡庚午以謁東陵命惇親王等留京辦事乙亥金順軍抵肅州剿回匪敗之三月癸未上奉兩宮皇太后謁東陵丁亥回鑾免蹕路經過本年額賦己丑大通巴燕戎格及五工撒拉各回衆降西寧匪首馬桂源等伏誅庚寅上奉兩宮皇太后還宮丙申回匪白彥虎等竄甘州命議定各國公使覲見禮節榮全乞病不許庚子以英廉為塔爾巴哈台參贊大臣丁未滇軍克順寧是春免江蘇邳州陝西鄜州等屬被擾逋賦夏四月乙卯設廉州北海關丙辰日本換約成乙丑回匪竄阿拉善旗及阿畢爾米特諭定安遣軍會防兵夾擊己巳官軍克肅州塔爾灣賊巢五月庚寅滇軍克雲州丁酉允各國公使覲見癸卯成祿交刑部治罪丙午命成瑞署烏魯木齊提督六月壬子上幸瀛臺日使副島種臣俄使倭良哩美使鏤斐迪英使威妥瑪法使熱福哩荷使費果蓀覲見於紫光閣呈遞國書庚申嚴趣金順出關丁卯甘軍復循化匪目馬玉連等伏誅閏六月甲申李鴻章覆陳黃運兩河淮徐故道難復請仍海運其舊河涸地酌量升課議行丙戌朱鳳標卒滇軍克騰越豫岑育英一等輕車都尉賞劉嶽昭黃馬褂楊玉科一等輕車都尉以雲南軍興十有八年郡縣多為賊蹂躪詔免十一年以前積缺糧賦並永遠停徵濟軍釐穀諭劉嶽昭慎選牧令察吏安民甲午京畿久雨上祈晴丙申詔查各省畝捐釐捐及丁漕違制者次第豁除庚子甘軍剿白彥虎等于敦煌失利副將李天和等死之永定河決免阿爾泰烏梁海七旗貢貂秋七月辛亥桂軍剿西林西隆匪平之甲子賑順天災是月免山東青城被水新舊額賦八月丁丑朔都興阿乞病慰留之辛巳直隸運河隄決榮全復以病乞免不許富和有罪褫職戊子白彥虎等陷馬蓮井營堡召劉嶽昭入覲以岑育英兼署雲貴總督壬辰白彥虎等圍哈密犯巴里坤官軍失利乙未諭景廉督軍赴援調錫綸為烏魯木齊領隊大臣以明春為哈密幫辦大臣是月賑直隸各屬永順府屬暨公安水災九月丙寅命軍機大臣會刑部審擬成祿罪癸酉永定河合龍冬十月丙子朔御史沈淮疏請緩修圓明園諭令內務府僅治安佑宮為駐蹕殿宇餘免興修己亥官軍克肅州匪逆馬文祿伏誅上詣兩宮皇太后賀捷庚子論功命左宗棠以陝甘總督協辦大學士加一等輕車都尉復金順職賞還黃馬褂豫徐占彪穆圖善雲騎尉十一月己未越南王疏請會剿河陽興化山西宣光邊地諸匪諭劉長佑馮子材議奏辛酉法越搆釁法兵破河內省城越匪擾北寧越人求援諭瑞麟飭軍由欽州出關會桂軍援剿之甲子御史吳可讀請將成祿明正典刑己巳岑育英奏整頓吏治營伍並請撤勇停捐自雲南始詔嘉之庚午疏濬運河壬申成祿論斬吳可讀坐刺聽朝政降調十二月甲申回匪竄擾烏梁海等部錫綸軍追剿敗之戊子以磨勘順天舉人徐景春試卷荒謬考官尚書全慶都御史胡家玉等降黜有差辛卯命額勒和布赴烏里雅蘇台查辦事件丙申賞故提督劉松山一等輕車都尉命張曜金順分軍西進壬寅以慈禧皇太后四旬慶典推恩近支王公及中外大臣賚有差是歲朝鮮入貢十三年甲戌春正月乙巳朔停筵宴甲寅湘軍剿古州苗匪平之丙辰命編修張英麟檢討王慶祺直弘德殿辛酉以劉坤一胡家玉互參降坤一三品頂帶褫職留任家玉鐫五級調用癸亥諭築東明長隄己巳官軍援沙山子擊回匪勝之賞福珠哩黃馬褂二月己卯回匪擾巴里坤境明春等會剿之丙申以法取越南地越匪擾山西逼滇疆諭岑育英部署邊防禁京師私鑄丁酉上奉兩宮謁西陵三月甲辰還宮乙巳賑奉天災民丙午命寶鋆協辦大學士己酉修海寧石塘辛酉論肅清貴州功復陶茂林提督賞提督何世華等世職辛未日本兵艦泊厦門諭沈葆楨統兵輪往相機籌辦命李鴻章與祕魯公使會議華工事宜夏四月甲戌詔撥帑十萬撫恤烏里雅蘇臺災擾部落丁丑上幸瀛臺單懋謙因病乞休允之覲見俄使布策等於紫光閣辛巳上幸圓明園還宮癸未瑪那斯回匪犯奎屯等處官軍進剿失利景廉兵援之丙戌日本兵船抵臺灣登岸與生番尋釁命沈葆楨辦海防兼理各國事務大臣江廣沿海各口輪船以時調遣辛卯常順緣事褫職命額勒和布為烏里雅蘇台將軍慶春為察哈爾都統托倫布為科布多參贊大臣丁酉賜陸潤庠等三百三十七人進士及第出身有差辛丑景廉再乞病不許五月壬寅朔法越和議定諭邊將安輯內遷難民壬子上幸圓明園還宮日本攻臺灣番社丁巳以慈禧太后聖節豫在京旗官六十以上者恩賞停本年秋審朝審人犯句決己未彗星見乙丑詔賑奉天災民丙辰允沈葆楨請建臺灣海口炮臺撫番社撤疲兵戊辰日本師船游弋福建各海口日使柳原前光與總署王大臣商臺灣兵事六月乙亥諭飭總兵孫開華接辦厦門防務己卯召楊嶽斌曾國荃閻敬銘趙德轍丁日昌鮑超蔣益澧郭嵩燾來京壬午烏索寨降衆復叛滇軍剿平之癸未允李鴻章請以徐州唐定奎軍渡海赴臺乙酉諭戶部撙節不急之需豫籌海防經費諭沈葆楨部署南北路防守丁酉命翁同和仍直弘德殿秋七月丁未李鶴年請閩省陸路選立練軍議行庚戌瑪納斯回匪犯西湖官軍擊退之壬子命左宗棠為大學士仍留陝甘總督任景廉為欽差大臣督辦新疆軍務金順幫辦軍務庚申覲見比使謝恩施等於紫光閣甲子內務府大臣貴寶以任郎中時於知府李光昭報效木植欺罔奏陳嚴議褫職乙丑馬賊陷寧古塔旋復之允福建軍餉借用洋發二百萬由海關稅分年抵還己巳停修圓明園工程庚午諭責恭親王召對失儀奪親王世襲降郡王仍為軍機大臣並革載澄貝勒郡王銜白彥虎等犯濟木薩官軍擊敗之八月辛未朔懿旨復恭親王世襲及載澄爵銜訓勉之諭修葺三海工程力求撙節丙戌河南蝗戊子李光昭論斬庚寅諭各省整頓捕務乙未命左宗棠督辦西征糧臺轉運事宜以內閣學士袁保恆為幫辦詔各省酌裁釐局禁種罌粟丁酉上幸南苑戊戌閲御前王大臣乾清門侍衛射己亥上行圍九月庚子朔上幸晾鷹臺撒圍辛丑上幸晾鷹臺閲神機營兵壬寅閲王大臣侍衛等射丁未瑞麟卒以英翰為兩廣總督庚戌日本續遣大久保利通來與總署王大臣論臺灣番社兵事丙辰寧古塔匪首王文拴伏誅辛酉王大臣與日使成議退兵回國給日本難民恤金及臺灣軍費共五十萬乙丑賈楨卒丙寅諭李鴻章等於總署條奏海防練兵簡器造船籌餉用人持久諸事詳議以聞十月辛未以慈禧皇太后四旬萬壽復劉銘傳提督己卯上慶賀禮成賞廢員職銜免王公文武官處分餘進有差庚辰恤廣東颶災癸巳命廣壽夏同善赴陝西查事己亥上不豫命李鴻藻代閲章奏十一月甲辰命恭親王代繕批答清文摺件丁未賑徐海水災己酉命內外奏牘呈兩宮披覽以寶鋆為大學士壬子日本退兵癸丑冬至祀天圜丘遣醇親王代頒部帑百五十萬築石莊戶隄工甲寅上以兩宮調護康吉崇上徽號詔刑部及各省罪犯分別減等庚申議行河南練軍甲子以石莊戶隄難就允丁寶楨請於賈莊一帶建壩築隄十二月辛未詔蠲免雲南被擾荒地錢糧十年甲戌李宗羲病免以劉坤一署兩江總督上疾大漸崩於養心殿年十九慈安皇太后慈禧皇太后召惇親王奕誴恭親王奕欣醇親王奕孚郡王奕譓惠郡王奕詳貝勒載治載澄公奕謨御前大臣伯彥訥謨祜奕劻景壽軍機大臣寶鋆沈桂芬李鴻藻內務府大臣英桂崇綸魁齡榮祿明善貴寶文錫直弘德殿徐桐翁同和王慶祺南書房黃鈺潘祖蔭孫詒經徐郙張家驤入奉懿旨以醇親王之子承繼文宗為嗣皇帝光緒元年二月戊子皇后阿魯特氏崩三月己亥上尊諡曰繼天開運受中居正保大定功聖智誠孝信敏恭寬毅皇帝廟號穆宗五年三月庚午葬惠陵論曰穆宗沖齡即阼母后垂簾國運中興十年之間盜賊剗平中外乂安非夫宮府一體將相協和何以臻茲泊帝親裁大政不自暇逸遇變修省至勤也聞災蠲恤至仁也不言符瑞至明也藉使蘄至中壽日新而光大之庸詎不與前古媲隆顧乃奄棄臣民未竟所施惜哉
