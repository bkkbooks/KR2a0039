餉十一月辛巳命署左副都御史張佩綸在總理各國事務衙門行走壬午趣徐延旭出關策應辛卯嚴內外城門禁壬辰越南民變殺嗣王阮福時命張樹聲戡定之尋改命岑育英往平亂庚子懿旨清江設廠收養災民命戶部發帑一萬接濟並給順直山東各四萬湖北三萬安徽二萬壬寅法人陷山西劉永福退走癸卯詔以尚書文煜被劾回奏積俸至三十六萬命捐銀十萬充公林肇元坐庫儲空虛奪職十二月戊申祈雪庚戌法人進攻北寧圖犯瓊州命彭玉麟檄湘楚軍會合吳全美師船嚴防起楊嶽斌往福建會辦海防官軍大敗法人於諒山己未以山東淮徐災民聚集清江等處命所司撫恤並隨時資遣庚申諭江西籌餉二萬濟王德榜軍丁丑追復故總兵陳國瑞世職是冬免順天直隸等州縣秋賦浙江被災州縣衛所額賦除山西鳳台等州縣荒地租糧是歲朝鮮越南入貢十年甲申春正月庚寅岑育英出鎮南關赴興化節制邊外諸軍二月丁未朔法人攻興化官軍擊卻之岑育英與徐延旭進圖山西諭嚴約束勿擾越境留江浙漕米各五萬石賑通州天津水災尋撥京倉粟米三萬石賑順天災丁丑法人陷北寧官軍退守太原戊辰命湖南巡撫潘鼎新赴廣西籌防乙亥法人陷太原徐延旭唐炯褫職逮問三月丁亥岑育英請免節制楚粵諸軍不許以太原陷提督黃桂蘭道員趙沃並褫職逮問戊子懿旨以因循貽誤罷軍機大臣恭親王奕欣家居養疾大學士寶鋆原品休致協辦大學士李鴻藻景廉俱降二級工部尚書翁同和褫職仍留任命禮親王世鐸戶部尚書額勒和布閻敬銘刑部尚書張之萬並為軍機大臣工部侍郎孫育汶在軍機學習己丑懿旨軍機處遇重要事會同醇親王商榷行之壬辰授潘鼎新廣西巡撫張凱嵩雲南巡撫總兵陳得貴失守炮臺副將黨敏宣臨陳退縮詔並斬於軍前以怡親王載敦為閲兵大臣命貝勒奕劻管總理各國事務衙門事內閣學士周德潤在總理各國事務衙門行走癸巳左庶子盛昱右庶子錫鈞御史趙爾巽各疏陳醇親王不宜與聞機務不報命刑部侍郎許庚身在軍機學習甲午詔李鴻章左宗棠曾國荃岑育英舉部將中沈毅勇敢有謀略者己亥閻敬銘許庚身並在總理各國事務衙門行走命潘鼎新赴鎮南關接統徐延旭軍庚子法人進據興化是春免仁和荒蕪竈蕩上年逋課陝西咸寧等處逋賦及雜缺免穆坪土司馬匹糧草十年夏四月丙午勘分新疆南界事竣以侍講許景澄充出使法德義和奧大臣庚戌先是法越戰事亟法水師將福祿諾屬稅務司德璀琳獻議媾和息兵李鴻章以聞許之敕其籌定至是覆陳當審勢量力持重待時詔集廷議懿旨醇親王並與議允吳長慶兵還辛亥利津等決口合龍癸丑罷開馬頰河濬宣惠河修德州運河隄戊午命通政使吳大澄會辦北洋事宜內閣學士陳寶琛會辦南洋事宜侍講學士張佩綸會辦福建海疆事宜皆許專奏尋加佩綸三品卿銜福祿諾出私議五條因李鴻章上聞敕鴻章力杜狡謀常存戒懼詔戶部裁冗費庚申授李鴻章全權大臣與法使議約癸亥免褒城瀕江地畝額賦乙丑祈雨丙寅再發倉米賑順天戊辰吳大澄辭北洋會辦上責其飾詞不許壬申張樹聲以疾請免本職專治軍事許之五月丙子命李成謀總統江南兵輪己卯岑育英辭節制粵楚各軍許之丁亥授文煜武英殿大學士戊子額勒和布閻敬銘並以戶部尚書協辦大學士己丑京師久旱諭有司平糶賞徽寧太廣道張蔭桓三品卿銜在總理各國事務衙門學習行走辛卯詔中外保薦文武人才甲午詔皇太后五旬萬壽停秋決丁酉詔中外大臣率屬盡職勿耽逸樂尚浮華戊戌詔左宗棠仍為軍機大臣毋庸常川入直並管理神機營免武昌黃州二衛額糧壬寅詔舉宗室及旗漢世職人才閏五月乙巳命工部尚書福錕理藩院尚書崑岡左都御史錫珍工部侍郎徐用儀內閣學士廖壽恆並在總理各國事務衙門行走丁未命前提督劉銘傳督辦臺灣事務錫珍廖壽恆陳寶琛吳大澄往天津會商法約庚戌命太常卿徐樹銘勘獻縣新開橫河法人犯觀音橋潘鼎新擊敗之辛亥山東河隄工成甲寅以法使言和調潘鼎新諸軍回諒山岑育英軍仍駐保勝乙卯自四月不雨至於是日始雨頒定蠲緩錢糧章程庚申思恩匪首莫夢弼伏誅丙寅法艦犯閩海丁卯諭曰法使延不議約孤拔要求無理我軍當嚴陳以待彼如犯我併力擊之敢退縮者立置軍法庚午授曾國荃為全權大臣與法使於上海議約命陳寶琛會辦六月癸酉朔以鄖西余瓊芳獄事讞不實下總督卞寶第巡撫彭祖賢部議承審各官貶斥有差甲戌河決歷城等縣以乞援守城追豫沈葆楨妻林氏附祀廣信葆楨專祠丙子建昌多倫匪首楊長清伏誅丁丑吳長慶卒旌其子主事保初孝行己卯諭直省考察州縣官壬辰法人陷基隆詔集廷臣議和戰乙未劉銘傳復基隆己亥懿旨神機營選馬步軍三千巡捕五營選練軍二千以都統善慶為總統前鋒統領托倫布為幫統分防畿東並抽調直隸練軍協守命曾國荃陳寶琛回江寧布防是月賑順德青浦風災葉縣水災秋七月乙巳命吳元炳勘山東河工海防授張之洞兩廣總督丙午法人襲馬尾炮臺及船廠陸軍擊退之戊申醇親王奏延煦劾左宗棠斥為蔑禮不臣肆口妄陳任情顛倒懿旨坐延煦奪職留任罰俸一年詔與法人宣戰楊昌濬赴福建督師癸丑法人毀長門炮臺丁巳諭穆圖善張佩綸毋退駐省城詔授左宗棠為欽差大臣督辦福建軍務福州將軍穆圖善漕運總督楊昌濬副之張佩綸以會辦大臣兼署船政大臣授曾國荃兩江總督兼南洋大臣丙寅論北寧失守罪已革道員趙沃提督陳朝綱並論斬戊辰以楊昌濬為閩浙總督普賑歷城等縣災民是月賑浮梁及齊河長安等處水災八月壬申命鴻臚寺卿鄧承修在總理各國事務衙門行走論馬尾戰事功罪褫何璟職及張佩綸卿銜下部議提督黃超羣等頒賞進秩有差建邵匪首張廷源等伏誅甲戌河決東明賑南海等縣水災丙子授李鴻章直隸總督北洋大臣戊寅懿旨賞醇親王子載灃不入八分輔國公文煜以病免命崇厚崇禮文錫文銛輸財助餉庚辰賑臺灣風災丁亥法人復陷基隆戊子命道員徐承祖充出使日本大臣己丑詔刑部本年情重各案及秋朝審官犯並停查辦癸巳蘇元春及法人戰於陸岸敗之命楊嶽斌幫辦左宗棠軍務賑星子水災戊戌法人犯滬尾提督孫開華擊敗之九月癸卯逮唐炯下獄廷訊乙巳出帑金五萬賚劉永福軍辛亥嚴諭南北洋輪船悉援臺灣壬子劉銘傳為福建巡撫駐臺灣督防蘇元春幫辦潘鼎新軍務楊昌濬等分防澎湖張兆棟何如璋並褫職詔免雲南田稅暫荒緩三年永荒蠲十年甲寅劉銘傳自請治罪詔原之戊午留新漕十萬備山東冬賑庚申以滬尾戰勝豫總兵孫開華世職發帑銀一萬犒軍授額勒和布體仁閣大學士乙丑以刑部尚書恩承協辦大學士丙寅賑鳳凰城潦災庚午官軍及法人戰於陸岸又敗之豫蘇元春世職辛未新疆改建行省置巡撫布政使各一裁南北路都統參贊辦事領隊諸職冬十月壬申朔懿旨晉封奕劻慶郡王奕謨固山貝子癸酉以劉錦棠為甘肅新疆巡撫戊寅賑江北廳等處水災雹災辛巳皇太后五旬聖壽上率王以下文武大臣等詣慈寧宮慶賀辛卯鮑超屢誤師期切責之癸巳以託疾規避奪提督王洪順職甲午張樹聲卒乙未朝鮮復亂吳大澄往察辦續昌副之文煜卒庚子劉永福及法人戰於宣光敗績十一月丁未命提督孫開華幫辦臺灣軍務戊申逮徐延旭下獄廷訊壬子李鴻章調軍發朝鮮癸丑普洱地震丙辰禁州縣報災荒丁巳東明決口合龍戊午李秉衡赴龍州部署防軍己未祈雪雲南巴蠻降戊辰諭各省積穀十二月戊寅官軍敗法人於紙作社壬午唐炯徐延旭並論斬乙酉官軍復宣光興化山西三省安平府暨二州五縣壬辰祿勸夷匪平丙申雨雪張佩綸何如璋並褫職遣戍是歲免鎮西廳荒地逋賦文安四州縣潦地額賦朝鮮入貢越南國王阮膺登自殺法人立其弟為國王十一年乙酉春正月癸卯命馮子材襄辦廣西關外軍務乙巳法人陷諒山丙午官軍圍宣光復美良城甲寅法人犯鎮南關總兵楊玉科死之乙卯賜英將戈登恤金甲子法艦去臺灣左宗棠等兵援浙江乙丑命李鴻章為全權大臣偕吳大澄與日使議朝鮮事庚午朝鮮亂平使來表謝賚之二月甲戌浙江提督歐陽利見敗法人於鎮海口戊寅褫潘鼎新職以李秉衡署廣西巡撫蘇元春督辦廣西軍務辛巳秦州地震癸未馮子材王孝祺大敗法人於鎮南關外遂復諒山豫楊玉科等世職辛卯法人請和允之壬辰詔停戰撤兵緬匪平戊戌岑育英奏官軍大捷於臨洮三月乙巳命李鴻章為全權大臣與法使議約刑部尚書錫珍鴻臚卿鄧承修往津會商丙午朝鮮訂約成庚戌岑育英復緬旺與清水清山諸寨獲越南叛臣黃協等誅之癸丑命吳大澄依克唐阿會勘吉林東界丙辰免永平張家口順天等十府州積年民缺租賦癸亥命馮子材督辦欽廉防務乙丑免陝西咸寧等處前歲逋糧夏四月己卯祈雨丙戌趣岑育英撤軍毋爽約開釁辛卯諭除江西丁漕積弊壬辰趣劉永福撤回保勝軍天津會訂中法新約成五月丁未懿旨勘修南北海工程詔整海軍大治水師下南北洋大臣等籌議基隆法兵退命楊嶽斌等部署全臺事宜除福建光緒初年逋賦辛亥許乍丫隨察木多入貢癸丑豫蘇元春馮子材三等輕車都尉王孝祺岑育英雲騎尉復王德榜原官優叙辛酉復祈雨壬戌雨丁卯以張曜為廣西巡撫是月賑基隆兵災桐城等縣及鎮筸水災六月己巳詔停秋決庚午懿旨命文銛崇禮崇厚文錫修建三海工程許景澄兼出使比利時大臣辛未定內附越南民籍甲戌曾紀澤訂煙台約成丁丑諭岑育英察雲南銅礦通諭曾國荃等勘東南各礦賑裕州水災癸未命工部侍郎孫育汶順天府尹沈秉成湖南按察使續昌均在總理各國事務衙門行走召曾紀澤來京命江西布政使劉瑞芬充出使英俄大臣張蔭桓充出使美日祕大臣法兵去澎湖命左宗棠等選將吏調輪船策應辛卯越南新約成宣諭中外詔誡建言諸臣挾私攻訐追論御史吳峋劾閻敬銘編修梁鼎芬劾李鴻章俱誣謗大臣豫嚴議尋各降五級甲午授孫育汶軍機大臣是月賑河南廣東廣西江南安徽江西水災秋七月丁酉朔設廣西南寧電線達雲南己亥懿旨發帑銀六萬賑兩廣水災庚子左宗棠連乞病許之丙辰命周德潤往雲南鄧承修往廣西會同岑育英張凱嵩勘中越界壬戌河決山東長清甲子開川滇銅鐵礦是月賑黔陽湘潭輝縣清江當塗汾陽等處水災八月丁卯朔賑奉天水災己巳截漕糧十萬石充順直賑需賑皋蘭等處雹災水災乙亥賑長沙等處水災丁丑山東歷城章丘等處水發帑五萬賑之以水災故停三海工作李鴻章與法使議滇粵陸路通商戊寅釋李是應歸朝鮮辛巳命蘇元春存撫越南入關流民賑襄城水災乙酉左宗棠卒贈太傅辛卯賑福建風災九月庚子懿旨醇親王總理海軍事務奕劻李鴻章會辦漢軍都統善慶兵部侍郎曾紀澤幫辦改福建巡撫為臺灣巡撫歸福建巡撫事於閩浙總督英使來議印度西藏通商諭丁寶楨色楞額等開導藏番毋生事壬寅靈桂卒甲辰裁伊犂參贊大臣改設副都統二裁塔爾巴哈台滿洲領隊大臣仍留額魯特領隊大臣甲寅賑賓川恩安等處雹災冬十月丙寅朔朝鮮王李熙以伏莽未除來請鎮撫李鴻章遣軍防衛之戊辰賑朝陽災庚辰截來年京餉銀五萬充山東冬賑辛巳命奕劻許庚身與法使互換條約劉瑞芬於英京互換烟台條約並議洋藥專條丁亥授穆圖善為欽差大臣會同東三省將軍辦理