至祀天於圜丘壬戌諭文碩訪呼畢勒罕依制掣定壬申祈雪十二月丁亥命李鴻藻督辦鄭州河工己丑除恩隆百色等處荒田額賦賑桂林等處火災壬辰免陽城等縣災緩稅租丁酉雨雪戊戌懿旨復閻敬銘福錕翁同和嵩申孫詒經景善孫家鼐處分庚子以皖北被災撥安徽漕折蕪湖關常稅共銀十萬備來年春賑辛丑置新疆伊塔道伊犁府霍爾果斯廳塔城廳設道府撫民通判同知等官壬寅石屏建水地震己酉撥山東冬漕五萬石備河南來年冬賑是歲朝鮮入貢十四年戊子春正月癸丑朔上親詣堂子行禮丙辰雪免安徽被淹太和等州縣夏糧己未開黑龍江漠河金礦庚申開廣東昌化石緑銅礦辛酉展接騰越至雲南省垣電線乙亥劉錦棠乞疾慰留再給假四月壬午諭官鑄當十大錢每文重至二錢以上者一律行用是月撥留京倉及海運漕米凡十三萬石賑順直災二月乙酉賑梧州火災丙戌賞裴蔭森三品京堂督辦福建船政庚寅文碩以擅行密疏稿於都察院褫職辛亥祀先農親耕藉田是月詔修葺頤和園備皇太后臨幸三月丙辰免浙江光緒五年以前逋賦丙寅賚班禪額爾德尼轉世呼畢勒罕哈達念珠如意夏四月庚寅永定河決口合龍辛卯上奉皇太后始幸西苑甲午展接廣東電線自九江至大庾嶺丁酉雨雹辛亥命張曜幫辦海軍事務賑惠州等屬水災五月乙卯京師奉天山東地震癸亥夏至祀地於方澤丁卯祈雨六月癸巳雨己亥懿旨皇帝大婚典禮明年正月舉行甲辰彭玉麟以疾免兵部尚書巡閲長江水師如故壬寅懿旨明年二月初三日歸政七月庚申以河工貽誤褫李鴻藻倪文蔚職仍留任李鶴年成孚並戍軍臺甲子永定河復決丙寅閻敬銘罷丁丑諭吳大澄察核河工是月津沽鐵路成八月丁亥賑奉天各廳州縣安徽懷寧等縣水災己丑詔直省清庶獄壬辰賑蒼梧等處水災丁酉截留江北漕米備蘇皖賑乙巳醇親王以歸政有日請解職務懿旨海軍署神機營依前管理歸政後奏事勿列銜九月丙辰除陝西去年逋賦甲戌永定河決口合龍冬十月己卯朔享太廟癸未懿旨立葉赫那拉氏為皇后癸巳撥京漕二萬石備順天冬賑甲午免水城等處丁糧賑丹徒旱災南昌等縣水災庚子免朝鮮紅參釐稅十一月壬戌滇越邊界聯接中法電線成初置北洋海軍提督以丁汝昌任之丙寅冬至祀天於圜丘丁卯免朝賀戊辰免靜海積水淀地租十二月壬午賑阿迷蒙自等處疫災乙酉詔光緒十五年舉行恩科鄉試十六年恩科會試辛卯增設吉林水師營總管各官癸巳太和門災甲午詔修省敕臣工勤職乙未免陝西前歲民缺錢糧丁酉懿旨以水災停減頤和園工作御史余聯沅屠仁守洪良品各疏請罷鐵路徐會灃等條奏同下海軍署與軍機大臣議旋翁同和奎潤游百川文治等並言鐵路不當修亦並下議命太僕少卿林維垣襄辦臺灣開墾撫番事庚子賑威遠廳水災辛丑道員徐承祖前使日本坐浮冒褫職聽勘籍其家丙午鄭州決口合龍授吳大澄河東河道總督復李鴻藻倪文蔚原官並優叙釋成孚李鶴年還十五年己丑春正月丁未朔停筵宴庚申靖遠皋蘭地震辛酉以張之萬為東閣大學士徐桐以吏部尚書協辦大學士海軍署會同軍機議駮停鐵路諸疏覆請詳議懿旨慶裕定安曾國荃張之洞黃彭年等按切時勢各抒所見以聞乙丑惇親王薨上奉皇太后臨奠丁卯御史屠仁守上言歸政伊邇時事孔殷密摺封奏請仍書皇太后聖鑒披覽後施行懿旨斥其乖謬罷御史下部議原摺擲還戊辰御史林紹年請禁督撫報效懿旨斥之癸酉大婚禮成二月戊寅吳大澄請敕議尊崇醇親王典禮懿旨斥之通諭中外臣民己卯皇太后歸政上御太和殿受賀頒詔天下丙戌免江淮光緒初年災熟各項稅糧己丑以齊東等州縣水災撥山東庫帑五萬備賑壬辰加上皇太后徽號頒詔覃恩有差甲午朝鮮慶賀歸政進方物賚其國王及王妃緞匹三月丙午朔命侍講崔國因充出使美日祕大臣丁未彭玉麟辭巡閲職溫諭慰留濮州河決癸丑以布魯克巴部長歸化豫封號印敕甲寅撥黑龍江庫帑二萬加賑呼蘭屬災民丁巳皇后祀先蠶己未再加上皇太后徽號庚午免雲南被匪村寨錢糧戊辰上奉皇太后幸頤和園閲水陸操允閻敬銘回籍養病夏四月戊寅撥南漕十萬石備山東賑己卯賑奉天吉林災民辛卯賞湖南按察使薛福成三品京堂充出使英法義比大臣懿旨發內帑銀十萬備山東賑庚子賜張建勳等三百三十一人進士及第出身有差五月癸丑停秋決庚申賑瀘州火災六月丙子岑育英卒丁丑以王文韶為雲貴總督己卯重修太和門丁亥賑周家口火災壬辰永定河道缺李鴻章舉堪任之員上疑於魁柄下移豫申斥秋七月丁未章丘河決己酉除貴州西良山額課庚午齊河決辛未沁河決是月賑莒州沂水雹災周家口水災長安西鄉鄜州水災雹災賑雲南昆陽太和安徽霍丘等州縣水災八月乙亥命李鴻章張之洞會同海軍署籌辦蘆漢鐵路丁亥留新漕十萬石備山東賑壬辰以四川水災捐款五萬賑災民丁酉天壇祈年殿災庚子賑伊犁綏定等處地震災辛丑免貴州被賊府廳州縣衛未徵並民缺稅糧九月壬子重修祈年殿賑溫州等處風災水災癸丑免陝西各屬前歲逋賦賑咸寧等處水災雹災乙卯賑皋蘭等處水災壬辰長垣隄決黃水浸入滑縣丙寅諭定安等除東三省練兵弊習丁卯定明年祈穀暫於圜丘舉行冬十月乙亥賑陽曲等處雹災水災戊寅設西安至嘉峪關電線賑杭嘉湖屬水災丁亥以江浙雨水為災各撥庫儲五萬並發內帑五萬賑濟以張之洞訂購機器遽立契約詔切責之嗣後凡創設之事未先奏明毋輕舉己丑撥武昌庫儲十萬備湖北賑需壬辰詔各省兩司仍專摺奏事臺灣社番亂副將劉朝帶等陳沒敕劉銘傳剿辦之甲午再撥浙江庫儲十五萬賑杭嘉湖災己亥山東大寨河工合龍壬寅撥蘇皖賑捐餘款修運河賑綏德等屬雹災水災十一月丙辰允海軍署請戶部歲撥二百萬開辦鐵路丁巳詔汰冗員刪浮費戊午撥安徽漕折銀三萬備安慶寧國泗州賑需丙寅浙江發常平倉穀賑天台仙居等處難民十二月壬申朔免杭嘉湖應徵漕白糧並地丁稅甲戌留山東漕米四萬石備賑丁丑再撥武昌庫儲五萬備湖北賑需丁亥山東西紙坊漫口合龍癸巳申禁辦理蠲緩積弊免雲南匪擾村寨錢糧丁酉免鄭州淮寧尉氏等州縣稅糧免仁和等縣杭嚴衛所糧課是歲朝鮮入貢十六年庚寅春正月壬寅朔停筵宴辛酉免直隸十三年以前竈課丁卯諭本年萬壽毋庸告祭停升殿禮免各省文武大員來京祝嘏二月乙酉張曜言統核山東河工需費二百八十八萬有奇命所司籌給壬辰臺灣內山番社酋有敏等伏誅是月免榆林等州縣十三年逋賦除東川被水官田稅糧免文安靜海霸州淀泊逋租及伯都訥地課閏二月壬寅賑桂林各屬火災己酉命太僕寺卿張蔭桓在總理各國事務衙門行走乙卯上奉皇太后謁東陵免所過地額賦十分之三庚申上臨奠端慧皇太子園寢癸亥至自東陵乙丑曾紀澤卒尋豫特諡諭李鴻章整頓北洋水陸軍定安等訓練東三省兵三月辛未懿旨劉銘傳幫辦海軍事務西寧地震賑恤之辛卯以二旬萬壽頒詔天下覃恩有差乙未濬餘杭南湖瞻對番目撒拉雍珠與巴宗喇嘛結野番作亂官軍剿平之夏四月庚寅彭玉麟卒庚戌諭整頓土藥稅釐命剛毅詳察徐州土藥出産及徵稅實額嚴定整理章程丁卯賜吳魯等三百三十六人進士及第出身有差五月己巳朔日有食之辛未色楞額卒以長庚為伊犁將軍丙子以升泰為駐藏大臣己卯上詣大高殿祈雨乙酉御畫舫齊閲侍衛步射至壬辰皆如之己丑雨築閿鄉沿河石壩賑淮寧等縣風災六月己亥朔徙齊東各州縣瀕河村民二千餘戶丁未開三姓金礦戊申以藏事平頒給布魯克巴部長敕印自癸卯至己酉連祈晴辛亥近畿霪雨成災京師六門外增設粥廠命撥京倉米萬五千石煮賑並發內帑五萬充賑需壬子永定河決口癸丑永北屬土司章天錫謀逆官軍討斬之丁巳撥奉天運京粟米並留江北漕米備天津災賑甲子萬壽節御乾清宮受賀秋七月乙亥鎮康土族亂剿平之詔責李鴻章堵合永定河決口己卯發帑五萬兩大錢五十萬貫米十萬石賑順天各屬災壬午諭嚴懲領放賑款侵冒剋扣庚寅分撥部庫及海關銀凡三十萬濟永定河工癸巳命翰林院侍讀許景澄充出使俄德和奧大臣道員李經方充出使日本大臣賑湖北廣西陝西雲南水災八月壬寅再撥京倉米十萬石備順天賑需乙巳上詣醇親王邸視疾己酉劉錦棠乞歸仍豫假壬子以劉銘傳擅興商礦章程紕繆諭止之豫部議丁巳留漕米五萬石撥庫帑十萬備山東賑壬戌以順直水患諭王公各府京旗莊田並減租是月免陝西江西逋賦賑陝西水災雹災雲南水災臺灣風災九月乙亥戶部言祿米倉虧十五萬石倉場侍郎興廉游百川下部議尋並奪職丙子賑琿春寧古塔潦災壬午御史吳兆泰請停頤和園工程豫嚴議永定河決口合龍甲申賑甘肅雹災壬辰石埭會匪亂剿定之癸巳撥部帑及倉米於順天備賑冬十月丁未以劉坤一為兩江總督兼南洋大臣庚戌曾國荃卒贈太傅辛亥再撥京倉米五萬石備順天賑免奉直魯豫商販雜糧稅捐十一月乙亥賑湖南被水州縣災乙酉上奉皇太后臨醇親王邸視疾丁亥醇親王薨輟朝七日上奉皇太后臨邸視殮皇太后賜奠命王子鎮國公載灃即日襲王爵上成服懿旨定稱號曰皇帝本生考己丑懿旨賜諡曰賢皇帝持服一年十二月壬子懿旨晉封輔國公載洵入八分鎮國公鎮國將軍載濤不入八分輔國公乙卯醇賢親王金棺奉移園寓上送至適園壬戌緩南苑工程甲子免浙江各廳州縣場光緒初年逋賦十七年辛卯春正月癸巳四川雷波夷匪就撫二月癸卯留海運漕米十六萬石備順直春撫己巳御史高燮曾請舉行日講詔以有名無實不納辛亥命李鴻章張曜會閲北洋海軍劉錦棠以憂去以陶模為新疆巡撫雲南匪亂陷富民祿勸縣城討平之是月免湖北山西十三年以前逋賦三月丁卯諭資遣難民歸籍己巳皇后祀先蠶壬申修寶坻通薊諸州縣河工丁丑命李鴻章督修關東鐵路庚寅命沙克都林札布會額爾慶額勘察哈巴河辛卯劉銘傳以疾免夏四月丁酉立醇賢親王廟丙午復建祠辛酉頤和園蕆工上奉皇太后臨幸自此始五月丁卯至庚午連雨辛未皇后躬桑壬午賑清江等處風災是月京畿蝗總署以各省教案迭出請飭辦諭曰各國傳教載在條約商民教士各省當力衛其身家乃者焚毀教堂同時並起顯有匪徒布謠生事各督撫其緝治之俾勿有所擾害六月戊戌諭嚴緝會匪戊申詔會匪自首與密報匪首因而緝獲者原免之辛亥王文韶奏誅附亂參將鮑虎巧家廳披沙蠻酋祿汶芢伏誅滇支夷二十一寨就撫秋七月癸未以王文韶言雲南猛參猛角猛董土司劃界息爭豫孟定土知府罕忠邦宣撫使銜土目罕榮高管理猛角猛董豫土千總准世襲乙酉張曜卒八月壬辰朔豫樂亭耆儒史夢蘭四品卿銜癸巳命奕劻總理海軍事務定安劉坤一襄辦己亥世祖御製勸善要言譯漢書成頒行直省學官朔望與聖諭廣訓一體宣講寶鋆卒癸丑諭疆吏飭營伍除積習嚴禁句結包庇九月癸未免陝西前歲逋課丙戌初與國來使自同治十二年以來皆見於紫光閣是月德使巴蘭德謂視如藩屬屢以易地為言至是奧使畢格哩本來遂於承光殿覲見戊子雲南北勝土州同改土歸流十月丁酉免隰榆次等處逋賦及旗租癸丑詔班禪額爾德尼呼畢勒罕明年正月坐升泰蘇呼諾門罕往視頒寄敕書珍物甲寅豫宋儒游酢從祀文廟戊午熱河朝陽匪亂提督葉志超聶士成剿平之十一月丁卯以熱河匪首擒戮諭民間無論入會否並許自新其自拔來歸者宥之乙亥命戶部侍郎崇禮兵部侍郎洪鈞並在總理各國事務衙門行走己卯海運倉火甲申以喀喇沁旗匪亂撥庫帑三萬賑撫之賑漢口火災十二月丙申免河南光緒初年逋賦乙巳賑熱河被匪災區戊申申諭內務府撙節用費是冬免浙江陝西本年民缺稅糧十八年壬辰春正月丁亥濬運河辛卯撥庫帑五萬於熱河賑敖罕奈曼兩旗蒙古癸丑英兵入坎巨提回部頭目逃避色勒庫爾賑撫之三月庚申閻敬銘卒夏四月己酉葬醇賢親王是月臺灣內山番社作亂剿平之五月甲子陽江匪亂首逆談運青伏誅庚午祈雨辛未賜劉福姚等三百一十七人進士及第出身有差乙亥合肥等州縣旱蝗賑之是月上林賓州匪首莫自間等伏誅六月庚寅祈雨丙申雨壬寅命編修汪鳳藻充出使日本大臣閏六月己未永定河決庚申賑汾州及歸綏七廳旱災甲子留江蘇江北河漕各五萬石於順直備賑丙寅阿克達春以奏對失辭罷山西巡撫丁丑以近畿水災撥部帑十萬備賑庚辰恩承卒是月京畿蝗秋七月辛丑發庫帑十萬備雲南各屬賑壬寅河南蝗癸丑諭唐炯整頓銅運八月丙寅命奎煥與英使保爾議印藏商約甲寅命福錕為體仁閣大學士麟書協辦大學士留山東新漕備賑九月庚寅撥江北漕米五萬石備鎮江各屬賑己亥福建德化匪首陳拱伏誅壬寅免陝西前歲民缺錢糧十月乙卯朔留江南漕米三萬石備江寧諸縣賑庚申醴陵匪首鄧海山伏誅己巳賑莎車水災免直隸通州等處糧租雜課十一月乙酉朔免直隸通州等處逋賦辛卯賑臺灣等處潦災辛丑諭李鴻章孫家鼐等察賑被災州縣有玩視民瘼者嚴劾以聞壬寅免江蘇各廳州縣衛逋賦庚戌發庫帑十萬賑太原等屬水旱霜雹災癸丑發內帑二萬賑順直各屬災民十二月乙卯朔詔王大臣承辦皇太后六旬慶典會同戶禮工部內務府博稽舊典詳議以聞丙寅召劉錦棠來京丁卯再發京倉米四萬石賑順天災民乙巳懿旨辦理慶典一切撙節內外臣工例貢免進獻特頒內帑賑濟順直災區每歲準此畀順天府直隸總督永濟窮黎每省各賞銀二萬自明年甲午始俱發內帑畀各省疆吏散給之諭已故貝勒那爾蘇為僧格林沁孫惓念前勞追封親王後不得援例丙子賞徽寧池太廣道楊儒四品京堂充出使美日祕大臣是歲朝鮮入貢十九年癸巳春正月乙酉朔詔以明歲皇太后六旬聖壽今年舉行恩科鄉試翌年舉行甲午恩科會試丙戌免長洲等州縣冬漕米石己亥免長沙等州縣逋賦甲辰詔明年應來京祝嘏蒙古與內札薩克王公台吉等除有年班外俱止來京癸丑以口外七廳及大同等府災命直晉免收運商糧稅撥部帑十萬賑之二月戊午留江蘇漕米五萬石備賑安州等處戊辰見德使巴蘭德於承光殿癸酉留京餉五萬賑陝西北山等處災民三月辛卯命以兩湖漕米六萬餘石變價賑山西災夏四月丙子祈晴己卯以阿拉善札薩克和碩親王多羅特色楞游牧連年荒旱頒帑三萬賑之五月乙酉北新倉火乙未以伊克昭盟長札薩克固山貝子札那吉爾第游牧連年荒旱頒帑一萬賑之六月乙卯命直省擇保精曉天文醫理卜筮數學及嫻於堪輿者上之內務府戊午撥部帑三萬備賑醴陵等處災庚申見德使紳珂於承光殿癸亥祈晴丁卯普安匪首劉燕飛等伏誅癸酉京師雨災詔於六門外等六處各設粥廠撥京倉米萬石充賑乙亥再撥奉天粟米江南北漕米備順直賑需永定河決南北汛並溢丙子免安徽積年逋賦暨潛山等縣衛前缺夏糧秋七月甲申諭順天府平糶甲辰近畿積潦漸消諭遣就食貧民歸籍八月辛亥賜故總督曾國荃孫廣漢四五品京堂除華僑海禁自今商民在外洋無問久暫概許回國治生置業其經商出洋亦聽之丁卯採購奉豫魯省雜糧分備順直賑九月癸未山東截留新漕六萬石賑瀕河州縣災民再撥江南北漕米十萬石改折復留江蘇漕米八萬石充賑順直分半給之癸卯發京倉米三萬石賑順天是月免陝西各屬逋賦及額賦冬十月己酉朔修太倉四州縣海塘壬子賞四川布政使龔照瑗三品京堂充出使英法義比大臣己未命戶部歲納內務府銀五十萬乙丑免通州等處糧賦十一月己丑申私錢之禁有銷毀改鑄或載運者所司訪緝嚴治之戊子甘肅新疆地震辛卯命許振禕與李鴻章會勘永定河甲午免大興等縣秋稅十二月辛亥命吏部侍郎徐用儀在軍機大臣上學習行走壬子詔京察嚴考核戊午除內地人民出海禁辛酉賑安仁疫災壬戌免歸化等七廳租賦丁卯免烏拉捕東珠壬申撥京東倉米五萬石備順天春賑癸酉刑部奏革員周福清於考官途次函通關節擬杖流改斬監候二十年甲午春正月己卯朔懿旨六旬慶辰晉封妃嬪名號增恭親王護衛奕劻晉封親王醇親王載灃等賞賚有差自中外大臣文武大員蒙古王公等以次恩錫丙申許振禕會勘永定河工程命與李鴻章會籌允歲增修費四萬並撥部帑三十萬充經費己亥庫車地震免鎮迪各屬逋賦庚子重申科場禁例辛丑免鄂倫春貢貂壬寅滇緬續約成二月辛亥詔殿廷考試閲卷大臣公慎校取勿濫濬通惠河築閘壩甲子命李鴻章閲海軍甲戌禁州縣非時預徵及濫用非刑允許振禕請盧溝橋置河防局倣裘曰修成法設浚船百二十艘三月戊寅朔日有食之諭疆吏毋濫保屬官戊子詔停秋決是春免新疆各屬逋賦雲南各屬額賦雜課夏四月戊申韶州南雄匪亂剿平之己酉蝄浦匪首諶北海伏誅甲寅大考翰詹擢文廷式等六人一等餘升黜有差辛酉見義使巴爾迪等於承光殿辛未賜張謇等三百十一人進士及第出身有差壬申諭直省清理京控積案五月丁亥以畿輔多盜諭嚴捕務戊子詔駐藏辦事大臣幫辦大臣三年任滿得請覲著為令丁酉初朝鮮以匪亂乞師李鴻章檄提督葉志超總兵聶士成統兵往上慮兵力不足因諭綏靖藩服宜圖萬全尚須增調續發以期必勝壬寅除免江蘇海運漂沒漕糧乙巳召劉銘傳來京裁鄂倫春總管升布特哈總管為副都統六月己酉詔停道府捐癸丑京師霪雨祈晴乙卯見日使小村壽太郎於承光殿戊午命翁同和李鴻藻與軍機總署集議朝鮮事壬戌停海軍報效乙丑諭湖南京漕折價備順天賑向有濟荒經費亦報解存儲皆自今歲始歲以為常丁卯命南澳鎮總兵劉永福赴臺灣戊辰召劉錦棠來京辛未上二旬萬壽御殿受賀筵宴命徐用儀為軍機大臣壬申召免出使日本大臣汪鳳藻回國秋七月乙亥朔日本侵朝鮮下詔宣戰戊寅命李瀚章毀南海舉人康祖詒所著書己卯諭遣道員袁世凱往平壤撫輯丙辰命臺灣布政使唐景嵩南澳鎮總兵劉永福助邵友濂籌防辛巳諭李鴻章擴充海軍慎選將才精求訓練通籌熟計以聞乙酉免賓川等州縣田租丙戌敕神機營兵防近畿駐通州旋移南苑戊子命端郡王載漪敬信練旗兵以滿洲火器營健鋭營圓明園八旗槍營暨漢軍槍隊充選載漪尋管神機營諭停不急工程允吳大澄請統湘軍赴朝鮮督戰丁酉賑會同會樂二縣災己亥命葉志超總統駐平壤諸軍敬信汪鳴鑾均在總理各國事務衙門行走癸卯重訂中外保護華工約八月丙午吳大澄督軍出關自請幫辦海軍不許丁未始釋奠於先師己酉劉錦棠卒戊午上皇太后徽號頒詔覃恩有差壬戌李鴻章以師久無功褫三眼孔雀翎黃馬褂丙寅懿旨發內帑三百萬備軍需命四川提督宋慶幫辦北洋軍務丁卯命承恩公桂祥統率馬步各營往駐山海關戊辰奉天援軍統領高州鎮總兵左寶貴及日人戰於平壤敗績死之己巳命吳大澄軍駐樂亭庚午懿旨六旬慶辰停止頤和園受賀撥京倉米三萬石賑順天各屬水災九月甲戌朔懿旨起恭親王奕欣直內廷管總署海軍署事並會同措理軍務乙亥命宋慶節制直奉諸軍罷葉志超總統丁丑諭在籍提督曹克忠募津勇駐山海關召王文韶來京調黃少春為長江水師提督庚辰命兵部侍郎王文錦等辦理團練辛巳免陝西咸寧等處旱荒田賦壬午海軍副將鄧世昌及日人戰於大東溝死之癸未召張之洞來京丁亥賑瑞昌等縣潦災戊子以臨敵潰散罷葉志超衛汝貴統領以聶士成統兩軍庚子日兵渡鴨緑江辛丑陷九連城壬寅命長順率吉林軍往奉天助剿豐紳統三省練軍防東邊冬十月甲辰朔諭裕祿飭金州戰備乙巳命提督唐仁廉募勇二十營會定安裕祿防剿丁未詔山西各省入衛戊申詔恭親王督辦軍務各路統帥聽節制命王大臣等分辦巡防團防廣西按察使胡燏棻駐天津督糧餉許專奏召劉坤一來京以張之洞署兩江總督兼南洋大臣寧夏鎮總兵衛汝貴以臨敵退縮褫職逮問己酉命翁同和李鴻藻剛毅並為軍機大臣壬子日人陷金州副都統連順棄城遁徐邦道及日人戰敗績丙辰賑東省瀕河貧民並撥帑撫恤丁酉各國使臣呈遞國書賀皇太后六旬萬壽上見之於文華殿壬戌日人陷岫巖州豐升阿聶桂林皆棄城走額勒和布張之萬罷軍機定安以臨敵無功奪欽差大臣漢軍都統暫留辦東三省練兵依克唐阿以督兵畏葸褫職戴罪圖功丁卯日人襲旅順船塢總辦龔照璵遁煙台黃仕林趙懷業衛汝成繼之徐邦道與張光前姜桂題程允和奔復州依宋慶諭李秉衡嚴防威海吳大澄請自任山海關防務並俟各軍會合規復朝鮮諭曰臨事而懼古有明訓切勿掉以輕心致他日言行不相顧以旅順失守責李鴻章調度乖方褫職留任壬申奪丁汝昌海軍提督暫留任宋慶自請治罪特原之詔各路將帥嚴約束禁擾纍民間犯者立正軍法褫葉志超職十一月癸酉朔褫龔照璵職尋逮問己卯以金州陷褫副都統連順職程之偉並褫職趙懷業逮京治罪庚辰懿旨恭親王奕欣復為軍機大臣辛巳免順直被水州縣額賦丙戌日本陷復州戊子日本兵集金復二州諭宋慶率諸軍決戰豐升阿聶桂林自岫巖奔析木城聞敵至師復潰日人取析木城以程文炳為陸路提督己丑宋慶及日人戰於海城敗績退保田莊台庚寅依克唐阿及日人戰於鳳凰城侍衛永山死之命榮祿在總理各國事務衙門行走壬辰豐升阿聶桂林逮問癸巳逮葉志超丁汝昌治罪戊戌褫提督程允和張光前總兵姜桂題職俱留營效力十二月癸卯停是月紫光閣保和殿筵宴褫提督衛汝成職逮問甲辰御史安維峻以論李鴻章坐妄言褫職戍軍台命劉坤一為欽差大臣關內外各軍均歸節制褫提督黃仕林職逮問壬子命張蔭桓邵友濂以全權大臣往日本議和尋召還丙辰撥江蘇漕米十二萬石備順直春賑丁巳章高元及日人戰於蓋平敗績奉軍復戰提督楊壽山死之城陷辛酉懿旨劉坤一駐山海關籌進止趣吳大澄率師出關會宋慶進勦以近畿米貴運豫魯雜糧平糶癸亥衛汝貴處斬甲子命宋慶吳大澄襄辦劉坤一軍務乙丑再撥京倉米三萬石備順天春賑己卯日本陷榮成庚午命王文韶襄辦北洋軍務是歲朝鮮入貢
