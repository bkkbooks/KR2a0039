body:
  text: 清史稿卷二十三本紀二十三德宗本紀一德宗同天崇運大中至正經文緯武仁孝睿智端儉寬勤景皇帝諱載湉文宗嗣子穆宗從弟也本生父醇賢親王奕宣宗第七子本生母葉赫那拉氏孝欽皇后女弟同治十年六月誕於太平湖邸第十三年食輔國公俸十二月癸酉穆宗崩無嗣慈安皇太后慈禧皇太后召惇親王奕誴恭親王奕欣醇親王奕孚郡王奕譓惠郡王奕詳貝勒載澄鎮國公奕謨暨御前大臣軍機大臣內務府大臣弘德殿南書房諸臣等定議傳懿旨以上繼文宗為子入承大統為嗣皇帝俟嗣皇帝有子即承繼大行皇帝乙亥王大臣等以遺詔迎上於潛邸謁大行皇帝几筵丙子上奉慈安皇太后居鍾粹宮慈禧皇太后居長春宮從王大臣請兩宮皇太后垂簾聽政皇太后訓敕稱懿旨皇帝稱諭旨詔停三海工程乙卯停各省貢方物壬午頒大行皇帝遺詔懿旨醇親王奕以親王世襲罔替翰林院侍講王慶祺有罪褫職定服制縞素百日仍素服二十七月伯彥訥謨祜景壽俱管理神機營癸未詔惇親王恭親王孚郡王諭旨章奏勿書名召對宴賚免叩拜甲辰詔以明年為光緒元年丁亥上大行皇帝尊諡曰繼天開運受中居正保大定功聖智誠孝信敏恭寬毅皇帝廟號曰穆宗戊子懿旨封皇后為嘉順皇后皇貴妃為敦宜皇貴妃諭中外臣工於用人行政據實直陳飭臣民去奢崇實敕各督撫求民疾苦慎選牧令考核屬吏並修明武備壬辰頒遺詔於朝鮮甲午禁內務府官結納太監乙未內務府大臣貴寶文錫褫職丙申諭左宗棠督剿河州叛回丁酉祫祭太廟是月免浙江被災鹽場竈課光緒元年乙亥春正月己亥朔免朝賀命吏部尚書英桂兵部尚書沈桂芬並協辦大學士戊申豫明故藩朱成功建祠臺灣追諡忠節庚戌敕沈葆楨勘辦琅𤩝築城建邑籌開山撫番事宜辛亥祈穀於上帝清江設廠收養徐海被水飢民內閣侍讀學士廣安疏請廷臣會議大行繼嗣頒鐵券斥之丙辰越南匪黨竄滇邊巡撫岑育英勦平之戊午上御太和殿即皇帝位頒赦詔開恩科辛酉申諭督撫進賢懲貪除夤緣奔競二月丁丑諭刑部清釐積案戊寅祭大社大稷豫親王本格攝行由是大祀皆遣代至十二年冬至圜丘祀天始親詣壬午英翻譯官馬嘉禮被戕於雲南劉錦棠等復河州甲申臺灣生番亂提督唐定奎剿之丙戌賜琉球國王緞匹文綺及貢使緞匹戊子嘉順皇后崩三月戊戌朔日有食之己亥上大行皇帝尊諡廟號壬子山東賈莊河工合龍丙辰越南匪黨蘇亞鄧等伏誅乙丑召景廉回京授左宗棠欽差大臣督辦新疆軍務以金順為烏魯木齊都統副之是月普免各省缺糧免江西山西同治六年以前逋賦夏四月丁卯朔享太廟庚午命穆圖善調所部馬隊來京隸神機營駐南苑己卯唐定奎克臺灣南路番社壬辰以沈葆楨為兩江總督兼通商大臣督南洋海防李鴻章督北洋海防五月戊戌興直隸水利防軍墾鹹水沽稻田庚子大考翰詹擢吳寶恕瞿鴻禨鈕玉庚孫詒經一等餘升黜有差甲辰停浙江貢緑玉簪鐲並停各織造傳製諸品劉嶽昭督攻越南復同文土州等城戊申上嘉順皇后尊諡曰孝哲嘉順淑慎賢明憲天彰聖毅皇后辛亥工部神庫火壬子刑部科房火命李瀚章往雲南查馬嘉禮案薛煥繼往會按之乙卯夏至祭地於方澤六月戊辰吉林將軍奕榕褫職遣戍庚午奉天匪據大東溝作亂崇實討平之停甘肅例貢甲午免直隸同治十年以前民缺旗租並補徵稅懿旨命醇親王與御前大臣舉各署諳緑營勇營紀律及侍衛可任統兵者壬午以穆宗帝后梓宮奉移山陵預戒有司毋備御道旋禁苛擾秋七月戊戌免直隸同治六年以前逋賦並稅糧庚子永定河決諭各省詳理京控諸獄貸太原等縣倉穀濟民食癸卯賞劉典三品京堂幫辦陝甘軍務免湖北米穀釐金甲辰祕魯換約成諭總署會籌保護華工丙午慈安皇太后聖壽節停筵宴壬戌命李鴻章丁日昌與英使威妥瑪就商馬嘉禮案候補侍郎郭嵩燾候補道許鈐身充出使英國大臣八月戊寅免陝西被兵額賦庚辰免長蘆兩淮鹽政應進物品庚寅命丁日昌督福建船政九月丁酉諭穆圖善整飭吉林吏治旗營甲辰申定外人遊歷內地條約吳棠督勦永廳竄匪辛亥免梓宮經過大興等州縣額賦十之五遵化十之七賞平毀麥田籽種銀並免蠲賸錢糧及旗租甲寅奉安梓宮於隆福寺乙卯上謁諸陵閲普祥峪菩陀峪工程丙辰閲惠陵工程丁巳奉兩宮皇太后還宮庚申至自隆福寺辛酉諭王凱泰區處臺灣生番癸亥劉長佑剿敗越南匪匪首黃崇英周建新伏誅冬十月甲子朔享太廟癸酉慈禧皇太后聖壽停筵宴甲戌允丁寶楨請於煙台威海衛登州府築炮臺設機器局己卯弛浙江南田島禁聽民耕作庚辰賞京師貧民棉衣銀每歲皆如之永匪李增元等為亂提督李有恆剿平之癸未賞八旗各營一月錢糧歲以為常湖南新化衡永匪亂總兵謝晉鈞提督趙聯升剿平之丁亥委散秩大臣吉和內閣學士烏拉喜崇阿使朝鮮封李子拓為世子十一月戊戌岑育英克鎮雄大寨匪首鞠占能伏誅劉嶽昭以玩泄褫職丁未豫郎中陳蘭彬以京堂候補充出使美日祕大臣乙卯奉天大通溝匪平戊午冬至祀天於圜丘己未免朝賀庚申祔穆宗帝后神牌於奉先殿十二月丙寅奉安神御於壽皇殿丁卯除盛京養息牧地額賦甲戌懿旨皇帝典學內閣學士翁同和侍郎夏同善授讀於育慶宮御前大臣教習國語滿蒙語言文字及騎射大學士文祥請解機務慰留之戊寅免浙江被災新舊賦課甲申祈雪壇廟辛卯祫祭太廟是歲朝鮮琉球緬甸入貢二年丙子春正月癸巳朔免朝賀戊戌諭各省宣講聖諭廣訓癸卯免仁和等場未墾竈蕩課糧癸丑黔匪陷下江尋復之丙辰祈雨自是頻祈雨辛酉四川蠻匪平二月乙丑詔自本年孟夏始未親政以前太廟時享及祫祭大祀俱前一日親詣行禮己卯免海沙蘆瀝等場竈額課壬午鄧川匪首羅洪昌項和伏誅免浙江逋賦庚寅陽萬土州判岑潤清作亂嚴樹森剿平之壬辰東鄉匪聚衆抗官三月丙申以旱故詔清庶獄己亥豫吳贊誠三品京堂督辦福建船政甲寅已革都司陳國瑞遣戍黑龍江丙午免陝西六十六州縣逋賦丁未詔以慈安皇太后四旬萬壽停本年秋決貴州四腳牛賊巢及六峒匪平戊申以雨澤愆期諭內外臣工直言闕失夏四月乙亥停陝西進方物免淮揚等屬同治六年以前逋賦壬午上始御育慶宮讀書丙戌賜曹鴻勛等三百二十四人進士及第出身有差戊子蘇熱達熱畢噶爾瑪薩哈進哀表頒敕答之並賜緞匹五月乙未文祥卒乙巳以近畿亢旱直隸山東暨河南河北等府小民艱食諭長官撫恤並捕蝗蝻丙辰御史潘敦儼請更上孝哲皇后諡號豫嚴議尋褫職閏五月辛酉朔賑近畿旱災庚午賑福建水災辛未以旱敕修省壬申孝陵大碑樓災自春正月不雨至於是日雨甲申階州齊匪平乙酉諭劉坤一防海練兵亟圖整頓六月庚寅朔諭文焜等嚴懲傳習邪術壬辰騰越練軍踞城作亂並陷順寧雲州丁酉以李鴻章為全權大臣赴烟台與英使威妥瑪議結馬嘉禮案庚子安徽蝗戊申開雲南實官捐例辛亥以江皖魯豫匪擾諭沈葆楨等分兵搜剿解散脅從丁巳總兵孔才進攻瑪納斯斬匪首馬得明等是月賑南豐南昌福建水災是夏免淮揚等屬逋賦盛京同治六年以前逋賦長蘆各場同治十年以前竈課直隸同治十年以來逋賦秋七月辛酉上兩宮皇太后徽號辛未復淮鹽楚岸引地甲戌東鄉匪首袁廷蛟伏誅辛巳劉長佑潘鼎新復騰越各城匪首蘇開先伏誅戊子馬嘉禮案議結免案內官所坐罪八月辛卯劉錦棠金順擊敗回酋白彥虎復烏魯木齊迪化城尋復昌吉呼圖壁景化各城辛丑許鈐身改出使日本大臣丁未賑浙江水災辛亥賑江西水災孔才等復瑪納斯北城九月戊午朔豫上元江寧兩縣一門殉難三十五家百九十五人旌恤建坊壬戌順天增設粥廠己巳定出使各國章程以四川州縣民教訟鬩諭魁玉等持平訊斷壬申諭文煜等嚴緝福建江西安徽等省邪教匪黨冬十月丙午賑皖北旱災命景廉李鴻藻在總理各國事務衙門行走甲寅召榮全來京以金順為伊犁將軍丁巳賑口北山東安徽江北饑十一月丁卯金順錫綸克瑪納斯南城匪首何碌馬有財伏誅壬午以新疆北路平發帑汰遣金順軍甲申截漕一萬石並提倉穀濟蘇常留養災民十二月戊子命侍講何如璋充出使日本大臣甲辰命督撫嚴查州縣毋匿災各省民教案持平審理戊申賑江北淮海災己酉回匪竄擾科布多參贊大臣保英派兵遲緩切責之乙卯免杭嘉松各場未墾地竈課三年丁丑春正月丁巳朔免朝賀戊午命以左都御史景廉為軍機大臣庚申命前藏濟嚨呼圖克圖於達賴未出世以前掌商上事務給達善名號癸亥以英桂為體仁閣大學士載齡以吏部尚書協辦大學士丙寅免洪澤湖灘缺租二月戊子穆坪夷匪伏誅己丑申諭各省墾荒田禁械鬬慎舉劾整營規賑直隸山東山西河南安徽江西福建還籍飢民巳亥免湖北逋賦庚子懿旨梓宮在殯皇帝沖齡除朝賀大典外其頒慶賞宴外賓典禮暫緩舉行辛丑復淮鹽引地壬寅刑部平反浙江民人葛品連獄巡撫楊昌濬侍郎胡瑞瀾褫職知府以下論罪有差申諭各省理刑期情真罪當毋輕率三月丁巳朔上釋服以山陵未安仍禁官中宴會演劇辛未免華陰被水糧課三年癸酉以劉錫鴻充出使德國大臣賑沭陽災民辛巳除臺灣府屬雜餉賑內山饑番夏四月辛卯常雩祀天於圜丘甲午馬邊倮夷結野番黑夷出擾魁玉等剿之乙未免酃縣被水逋賦戊戌劉錦棠等克七克騰木闢展復吐魯番滿漢兩城尋攻克達坂及託克遜賊壘安集延酋帕夏自殺己亥總兵張其光攻臺灣率芒番社克之庚子貸義州旗戶籽種銀辛丑賑貴陽地震災壬寅昭通廣南匪作亂官軍討平之癸卯以災區緩徵吏胥舞弊諭各省整頓旌安貧樂道高郵增生韋弼諧甲辰越南遣使進方物賚其國王緞匹庚戌賜王仁堪等三百二十九人進士及第出身有差是月江蘇安徽蝗五月戊辰日本阻琉球入貢遣來使歸國癸酉山西旱留京餉二十萬賑之甲戌監利會匪王澕漳等作亂伏誅撥帑銀一百二十萬解西征糧臺戊寅賑福州水災壬午懿旨以皇上萬壽值齊戒期更定六月二十六日行慶賀禮著為令山西大旱巡撫曾國荃請頒扁額為禱以非故事不許諭曰禱惟其誠當勤求吏治清理庶獄以迓和甘六月戊子詔工噶仁青之子羅布藏塔布克甲木錯即作為達賴喇嘛之呼畢勒罕毋庸掣瓶辛卯廣東北江堤決連州大水詔賑撫災民戊戌先是穆宗祔廟位次懿旨命大臣會議醇親王復請定久遠至計少詹事文治鴻臚寺卿徐樹銘少卿文碩內閣侍讀學士鍾佩賢司業寶廷並有陳奏至是仍命王大臣等詳議以聞並命李鴻章妥議丙午以災祲疊見誡臣工修省庚戌上萬壽御乾清宮受賀秋七月丁巳撥海防經費助山西賑己未惇親王等議上穆宗帝后神牌位次請于太廟中殿東西各四楹遵道光初增奉先殿後殿龕座修葺改飾並從醇親王請自今以往不援百世不祧之例戊辰免江寧上元等縣被災額賦十之三己巳留京餉漕折銀賑河南饑八月丁亥諭各省修農田水利壬辰撥天津練餉十萬濟山西賑甲午免臺灣同治十年供粟及糯米易穀庚子諭劉坤一等整頓廣東捕務戊申撥銀四十萬賑山西河南災並留江安漕糧輸山西河南各四萬石備賑九月甲寅羅田匪首陳子鼇伏誅戊午命前侍郎閻敬銘往山西查賑己未申禁山西種罌粟改植桑棉辛酉撥山東冬漕各八萬石續賑山西河南災甲子豫漢儒河間獻王劉德從祀文廟乙丑詔求直言丁卯命李鶴年往河南查賑戊辰減緩山西河南應協西征軍餉庚辰加賑祥符等縣災民口糧辛巳賑興化府屬風災冬十月壬辰賑三姓雹災庚子諭各省安撫轉徙饑民甲辰免三姓被災銀穀加賑陽曲等縣災民口糧乙巳增設內城粥廠庚戌劉錦棠進復喀喇沙爾庫車兩城尋復阿克蘇及烏什城十一月癸丑詔戒各部院玩愒因循乙卯開山東運漕新河丁巳諭督撫府尹講求吏治十二月辛卯緩赫哲貢貂庚子豫免山西河南被災州縣來歲糧是冬連祈雪撥來年江鄂漕米凡十二萬石賑山西發帑金賑陝西是歲山陝大旱人相食四年戊寅春正月辛未賑河南饑命郭嵩燾兼出使法國大臣西軍復葉爾羌喀什噶爾和闐回衆降己卯諭各省清理詞訟二月辛巳朔修成都都江堰壬午諭興北方水利乙酉命署兵部左侍郎王文韶為軍機大臣庚寅諭舉州縣能實行荒政者壬辰新疆平匪首白彥虎遁入俄羅斯論功進左宗棠二等侯劉錦棠二等男豫提督余虎恩等世職有差甲午諭清庶獄丁酉賑呼蘭災己亥下詔罪己賑山西河南饑丙午瘞災地遺骸庚戌免侯官被水丁糧三月甲寅諭被災各省試行區田法壬申賑直隸饑撥察哈爾牧羣馬三千匹給貧民耕作甲戌諭內務府減經費除浮冒戊寅英桂致仕是月河南雨四月壬午沈葆楨請罷武科斥之壬辰賑廣東風災五月庚戌朔諭直省廣植桑茶命載齡為體仁閣大學士管工部事全慶以刑部尚書協辦大學士辛未以崇厚為出使俄國大臣六月丙戌免陝西逋賦庚寅嚴私鑄禁甲午賑臺灣風災庚子諭刑部嚴定州縣侵賑罪秋七月乙卯雲南官軍復耿馬土城辛未命禮部右侍郎王文韶順天府府尹周家楣在總理各國事務衙門行走壬申嚴命案延玩處分甲戌以曾紀澤為出使英法大臣丁丑免平陽蒲解絳今歲秋賦是月賑金衢嚴等府浮梁等縣水災八月己卯永定河決丙戌沁河決戊子賑崇安浦城水災九月丁巳諭東南疆吏豫救水患清釐保甲防會匪煽惑災民癸亥賑山西旱免陽曲等縣逋賦及徐溝等縣秋糧戊辰賑藍田水災丙子修樊口江堤冬十月壬午廣西在籍總兵李揚才叛命馮子材勦之免通海各處淮安四衛逋賦並雜課丁亥賑濮范壽陽水災癸巳沁河復決賑奉天水災乙未北新倉火戊戌臺灣後山加禮宛等社就撫縛獻番目誅之免貴州被兵新舊額賦十一月丙辰修北運河隄辛酉白彥虎寇邊劉錦棠擊敗之癸亥李揚才踞越南長慶楊重雅剿之己巳詔督撫整躬率屬責軍機大臣勿避嫌怨院部大臣力戒因循甲戌冬至祀天於圜丘乙亥停朝賀十二月己丑詔永罷捐輸事例是歲免仁和鹽場逋課者二朝鮮廓爾喀入貢五年己卯春正月乙巳朔停筵宴乙丑申諭停籌餉捐例修高淳隄辛未賑山西饑二月壬午吉州知州段鼎耀以吞賑處斬癸未詔復河運甲午諭山西清理荒田編審丁口均差徭己亥梓宮奉安山陵禁有司科派擾纍賑文安等州縣水災三月丙午賊目鍾萬新與李揚才合犯宣光馮子材會師越南擊之壬子免梓宮所過大興通三河薊遵化額賦庚申頒吉嚨呼圖克圖敕書并賚哈達蟒緞布魯特回酋合安集延賊酋寇邊劉錦棠敗之乙丑奉兩宮皇太后謁東陵己巳謁昭西孝東諸陵庚午葬穆宗於惠陵孝哲后祔癸酋至自東陵閏三月乙亥穆宗神主祔太廟頒詔天下丁亥李揚才踞者巖己丑修襄陽沔陽天門江隄庚寅吏部主事吳可讀於東陵仰藥自盡遺疏請豫定大統懿旨王大臣等集議以聞乙未命三品卿銜李鳳苞為出使德國大臣夏四月戊申修通州北運河癸丑豫吳可讀恤典懿旨以可讀原疏及會議摺徐桐寶廷張之洞等摺並前後諭旨均録存育慶宮免河南被災州縣漕銀及逋課己巳先是嶧縣知縣朱永康以謀殺委員高文保論戍尋下廷議至是奏上詔以罪浮於法改論死五月丙子夏至祭地於方澤己卯免兩淮泰海各場逋課壬午河南蝗己亥官軍剿平者巖賊是月賑清河安東風災山西雨階文西和地震歷十有三日六月壬子刑部言東鄉獄事誣叛妄殺已革知縣孫定揚提督李有恆論死尋文格丁寶楨並坐奪職命發帑二十萬撥丁釐銀三十萬濟山西賑需己未諭言事諸臣交部議奏之事不得攙越陳奏亦不得雷同附和相率瀆陳普免山西積年民缺倉穀烏拉特阿拉善等旗蝗甲子懿旨允醇親王奕家居養疾解職務賑邠乾漢鳳地震災七月庚辰賑直隸水災戊子以星變地震求直言諭各省積穀免絳蒲陽城被災夏課鹽稅庚寅復海運八月戊申祭大社大稷詔各省舉文武堪備任使者壬子致仕大學士單懋謙卒癸丑賑博山等州縣水災乙卯江皖各屬蝗乙丑賑階文西和地震及水災九月甲戌賑直隸水災壬辰加上文宗穆宗尊諡己亥重慶等府縣地震賑之冬十月辛丑朔免曲沃等州縣歉收額賦乙卯免奉天旗民站丁地課抵例賑口糧丁巳諭水師並習陸戰癸亥賑秀山等處水災己巳英桂卒免齊齊哈爾黑龍江墨爾根屯糧並原貸籽種十一月乙亥李揚才伏誅己卯冬至祀天於圜丘庚辰停朝賀壬午沈葆楨卒甲申以劉坤一為兩江總督兼南洋大臣庚寅詔責崇厚與俄人定伊犂約擅自回京所議條約廷臣集議壬辰免山西災重州縣稅契銀十二月己酉懿旨廷議俄約覆奏下王大臣等再議醇親王並預議以聞乙卯褫崇厚職下獄辛酉諭修社倉興社學己未免永濟等州縣秋糧丙寅祫祭太廟詔洗馬張之洞會商俄約戊辰修山東運河是歲朝鮮廓爾喀入貢六年庚辰春正月己巳朔停筵宴辛未命曾紀澤為出使俄國大臣改議條約甲戌諭查營伍虛額占役乙亥西林苗匪平丙子命前工部尚書李鴻藻仍為軍機大臣壬午尋甸匪亂官軍討平之己丑詔中外舉人才疆吏飭邊備海防命河北道吳大澄幫辦吉林軍務通政使劉錦棠幫辦新疆軍務辛卯定崇厚罪論斬癸巳戶部奏籌餉十條詔各省推行是月除山西各屬荒地丁銀免仁和等場荒蕩夏稅二月乙巳永免榆次貢瓜壬戌甘肅總兵蕭兆元侵蝕軍糧論斬三月甲戌賑順直水災乙亥左宗棠出屯哈密金順扼精河張曜劉錦棠分進伊犁己卯免山西洪洞欣州各屬荒賦三年或四年四月庚子祀天於圜丘復設科布多昌吉斯臺霍呢邁拉扈等八卡倫官兵丙午三姓設廠造輪船甲寅階州番匪哈力等作亂伏誅壬戌賜黃思永等三百三十三人進士及第出身有差乙丑調李長樂為直隸提督統武毅四營鮑超為湖南提督召來京五月丙子賑洛陽等縣雹災乙酉階州番匪古旦巴等伏誅丙戌以徇俄人請貸崇厚死仍繫獄六月丁酉朔賑福建水災癸卯畀李鴻章全權大臣與巴西議約甲辰禁徵糧浮收勒折丙辰賑廣州等處水災丁巳免交城等縣荒地缺課命曾國荃督辦山海關防務七月壬申召左宗棠來京督辦關外事宜癸酉出崇厚於獄癸未賑揚州風災甲申命前浙江提督黃少春辦理浙江防務八月己亥巴西商約成戊申召劉銘傳來京庚戌南北洋初置電線壬子江蘇捕蝗癸亥朝鮮來告與日本交聘九月己巳命浙江提督吳長慶幫辦山東防務節制防軍庚午免永濟貢柿霜辛未允朝鮮派工匠來天津學造器械壬申賑蒲城等處災壬午給曾國荃病假命岐元節制各軍癸未減涼肅番族馬貢己丑賑資陽清溪災庚寅印度進樂器並所撰樂記賚以金寶星癸巳除拉林旗佃租賦冬十月丙午察木多帕克巴拉胡圖克圖進貢物以哈達大緞賜之己酉東明河決辛亥命前吏部尚書毛昶熙在總理各國事務衙門行走甲寅賑圍場海龍城及渮澤水災甲子懿旨醇親王管理神機營事務十一月乙丑朔命侍講許景澄為出使日本大臣己巳以全慶為體仁閣大學士靈桂以吏部尚書協辦大學士甲申冬至祀天於圜丘丙戌江華瑤匪平癸巳免永平等屬逋賦十二月丙午命楊昌濬會辦新疆善後丙辰免文安被水額賦庚申懿旨神機營選辨兵赴天津學製外洋火器辛酉濬漕運河道是冬數祈雪是歲朝鮮廓爾喀入貢七年辛巳春正月甲子朔停筵宴沈桂芬卒癸酉敕各省慎舉孝廉方正乙亥達賴喇嘛遣人進哈達佛香命獻惠陵賚以哈達緞匹戊寅免浙江仁和等場荒坍竈蕩各府州縣衛荒地新墾地六年逋課及額糧辛卯越南請官兵助勦積匪不許免海陽六年逋賦壬辰命左宗棠為軍機大臣管兵部兼總理各國事務衙門行走除貴筑興義八寨水銀等廠逋課二月癸巳朔命李鴻章籌山海關防務節制諸軍以曾國荃為陝甘總督戊戌日本使臣戶璣來議琉球條款不協敕海疆戒備己酉修襄陽老龍石堤辛亥修濟陽壩工甲寅通政司參議劉錫鴻以誣劾李鴻章裭職三月甲子除錦州官田租賦丁卯改築焦山都天廟炮臺己巳命李鳳苞兼出使義和奧大臣黎庶昌為出使日本大臣辛未慈安皇太后不豫壬申崩於鍾粹宮癸未上大行皇太后尊諡曰孝貞慈安裕慶和敬儀天祚聖顯皇后夏四月癸巳雷波夷匪平己亥命吳大澄督辦吉林三姓寧古塔琿春防務兼屯墾免陝西咸寧等六十二廳州縣逋賦辛丑頒孝貞顯皇后遺誥於朝鮮己酉曾紀澤與俄國改訂新約成丙辰永禁明陵私墾己未懿旨恭親王醇親王會同左宗棠李鴻章議興畿輔水利初置琿春副都統庚申賑臺北地震災五月壬戌朔日有食之官軍擊散越南積匪丁卯詔疆臣於命盜重獄按月冊報遲逾者罪之戊寅罷烏里雅蘇臺屯田己丑賑鹽源水災賞鄭藻如三品卿銜為出使美日祕大臣六月己亥彗星見詔修省丙辰萬壽節停朝賀己未命李鴻藻協辦大學士秋七月癸亥賞學行純篤廣東在籍知縣朱次琦舉人陳澧並五品卿銜戊子召劉坤一來京以彭玉麟署兩江總督兼南洋大臣賑階州等處地震災閏七月壬辰諭各省統核釐卡出入酌定撤留癸巳賑兩淮泰州各場竈災甲午免榆社等縣五年逋賦己亥命金順督辦交收伊犂事宜錫綸為特派大臣與俄人會商界務尋命升泰並為特派大臣甲辰命鮑超復裁所部營伍乙巳初置呼倫貝爾副都統庚戌禁州縣諱飾重獄是月賑江蘇福建四川水災陝西雹災八月甲子頒帑金二萬給養霍碩特流民辛巳以皇太后疾愈命刑部停秋決其緩決屆三次與未屆三次分別差減之癸未孝貞顯皇后奉安免所過州縣租賦命劉錦棠為欽差大臣督辦新疆軍務張曜副之丙戌除伯都訥磽地賦額全慶致仕九月甲午賑寧海等縣水災乙未允彭玉麟解職仍巡閲長江劉坤一罷以左宗棠為兩江總督兼南洋大臣丙午葬孝貞顯皇后於定東陵丁未汝寧光州捻匪平己酉再減金壇漕額十分之一分四釐賞附居青海番衆八族青稞歲八百餘石辛未孝貞顯皇后神牌祔太廟丙辰賑臺灣颶風災是月甘肅臺灣地震冬十月己巳皇太后聖壽節停筵宴庚午昭通匪陸松山等作亂官軍討斬之癸酉以靈桂為體仁閣大學士以刑部尚書文煜協辦大學士甲戌法人踞越南北境諭滇粵合籌弭釁甲申詔舉行察典勿有舉無劾賑泰和等縣水災丁亥安徽已革提督李世忠擅縶貢生吳廷鑑等裕祿上其狀詔處斬十一月庚寅免吉林被水官莊及伯都訥地租丙申施南會匪楊登峻伏誅丁酉濬吳淞淤沙戊戌廣西果化土州匪首趙蘇奇伏誅賑貴縣等處水災甲辰賑臺灣澎湖災十二月乙亥賞恭親王子載潢不入八分公醇親王子載洸奉恩輔國公是月免浙江各府州縣衛荒廢及新種賦課仁和等場竈課免安州任縣文安潦地額糧除吉林荒地租賦是冬頻祈雪是歲朝鮮越南入貢八年壬午春正月戊子朔免朝賀辛卯修洞庭西湖隄自去年十一月不雨至於是月己亥雪庚戌修滹沱新河及子牙河隄二月己未江蘇文廟火壬戌以朝鮮占種吉林邊地開墾歷年令其領照納租隸籍癸丑申嚴門禁更定稽