林等屬逋賦雲南旱災等州縣逋糧及額賦四月甲子裁各省民壯捕役改設巡警綏來地震乙丑御史趙啓霖坐樜衊親貴褫職辛未更定東三省官制奉天吉林黑龍江各設行省公署以總督為長官巡撫為次官置左右參贊分領承宣咨議兩廳分設交涉旗務民政提學度支勸業蒙務七司各置司使及提法使督練處等官己卯祈雨辛巳以江北水災嚴米糧出口禁丁亥定陸海軍官制陸軍部設兩廳十司軍咨處五司海軍部六司戊子命衍聖公孔令貽稽察山東學務五月癸巳巴塘等屬喇嘛脅河西蠻作亂官軍討平之乙未命王士珍以侍郎銜署江北提督丙申西陵禁山火丁酉瞿鴻禨罷己亥授鹿傳霖軍機大臣命醇親王直軍機辛丑王文詔罷命張之洞協辦大學士癸卯崇禮卒丁巳改按察使為提法使置巡警勸業道裁分守分巡各道酌留兵備道及分設審判廳備司法獨立增易佐治員備地方自治期十五年內通行戊午詔憲法官民均有責任凡知所以預備之方施行之序者許各條舉主者甄採以聞安徽候補道徐錫麟刺殺巡撫恩銘錫麟捕得伏誅六月辛酉命李家駒充出使日本大臣丙寅復御史趙啓霖官壬申自四月不雨至於是日雨授張之洞體仁閣大學士鹿傳霖協辦大學士乙酉停萬壽筵宴永定河決是夏免新化被水額賦伊通被賊逋課雲南旱災等州縣銀米賑雲南飢及直隸水災秋七月辛卯詔中外臣工議化除滿漢甲午改考查政治館為憲政編查館其軍機大臣大學士參預政務大臣會議事於內閣行之壬寅懿旨遣楊士琦赴南洋各埠考察奬勵華僑免趙州祿豐被災額賦賑順天等屬災民及瀏陽邵陽蛟災甲辰詔以匪徒謀逆往往假革命名詞巧為煽誘各督撫當設法解散獲犯擬罪分別叛逆盜匪科論被脅及家屬不知情者勿株連命張蔭棠為全權大臣與英人議藏約敬信卒己酉定限年編練陸軍三十六鎮丙辰命張之洞袁世凱並為軍機大臣以袁世凱為外務部尚書丁巳命楊士驤署直隸總督兼北洋大臣戊午李經邁以母病免命雷補同充出使奧國大臣己未河決孟縣八月辛酉上不豫詔各省薦精通醫理者命汪大燮使英國達壽使日本于式枚使德國俱充考察憲政大臣壬戌置京師高等審判廳己巳置總檢察廳庚申立資政院以貝子溥倫孫家鼐為總裁乙亥命伍廷芳充出使美國大臣薩蔭圖充出使俄國大臣己卯詔以各省駐防習為遊惰命各將軍等授田督耕歸農後一切歸有司治理庚辰裁奉天驛站設文報局壬午詔中外臣工研究君主立憲政體諭定自治章程甲辰見德使雷克司日使阿部守太郎於仁壽殿諭神機營衛隊及官兵歸陸軍部管轄九月辛卯詔議定滿漢禮制刑律考定度量權衡畫一制度章程是日以煙習未除敕責莊親王載功睿親王魁斌都御史陸寶忠副都御史陳名侃解職迅速戒斷並諭內外文武限三月淨盡否即嚴懲癸巳命沈家本俞廉三英瑞充修訂法律大臣己亥命各省立咨議局公舉議員並籌設州縣議事會壬寅日本以水災來告糴輸江皖浙鄂諸省米糧六十萬石濟之甲辰命各省立調查局各部院設統計處豫遊學畢業生章宗元等進士舉人出身有差戊申湖北按察使梁鼎芬言挽回時局莫亟於禁賄賂絶請託劾奕劻袁世凱等夤緣比附貪私誤國廷旨以有意沽名斥之是月免雲南旱傷等州縣稅糧賑懷寧等縣水災冬十月乙丑命派孫家鼐榮慶陸潤庠張英麟唐景崇寶熙朱益藩進講經史及國朝掌故永定河合龍戊辰皇太后聖壽節停筵宴壬申見日使林權助等於勤政殿丙戌哲布尊巴丹胡圖克圖進方物十一月庚寅廣西匪踞南關炮臺責張鳴岐督剿尋復之戊申嚴聚衆開會演説之禁諭各省整頓學堂增訂考核勸戒法壬子見俄使璞科第等於乾清宮以內外臣工條議幣制用兩用元互有利害諭各督撫體察籌議以聞發帑五十萬濟廣西軍十二月戊午朔復分置廣東陸路提督水師提督癸亥裁吉林副都統置交涉民政度支三司使暨提法使勸業道豫進士館遊學畢業學員楊兆麟等進有差壬申裁山東糧道置巡警勸業二道甲戌諭熱河圍場辦屯墾裁駐防官兵乙亥命呂海寰充督辦津浦鐵路大臣丙子那桐兼督辦稅務大臣辛巳賞總稅務司赫德尚書銜丙戌再停布特哈貢貂一年是冬免雲南被旱直隸被潦暨陝西逋賦賑雲南等屬蛟災四川水災廣東風災水災三十四年戊申春正月丁亥朔授醇親王載灃為軍機大臣庚寅見各國公使於乾清宮己亥以京師銀價驟高物直踊貴發帑五十萬命順天府尹貶價收錢並令各省廠鑄當十銅元定額外加鑄三成一文新錢以資補救甲寅建蘭州黃河鐵橋丙午見奧使顧新斯基於勤政殿是月免雲南昆明等縣逋賦浙江仁和等場竈課湖南邵陽額賦二月戊午祭大社大稷是後祀典不克親行皆遣代庚申賞趙爾豐尚書銜為駐藏大臣仍兼邊務大臣癸亥詔增給滿大臣暨各旗官十成養廉更定御前大臣以下等員津貼丙寅諭京外清庶獄甲戌京師勸工陳列所災丙子諭以禁煙議成英人許分年減運見已實行遞減相約試行三年限滿再為推減轉瞬期至其何以答友邦民政度支二部迅訂稽核章程責成督撫飭屬將減種減食切實舉辦以聞丁丑召達壽還命李家駒為考察憲政大臣胡惟德充出使日本大臣壬午黃誥罷調錢恂為出使義國大臣以陸徵祥為出使荷國大臣三月壬辰命恭親王溥偉鹿傳霖景星丁振鐸充禁煙大臣立戒煙所專司查驗丙午廓爾喀貢方物甲寅以湛深經術賜湘潭舉人王闓運檢討是月免雲南被災新舊額賦夏四月丙辰見日使林權助等於勤政殿綏遠城將軍貽穀有罪褫職逮下刑部獄尋籍其家命信勤充墾務大臣兼署綏遠城將軍丁巳裁安徽安廬滁和道己未越匪陷河口命劉春霖以三品京堂幫辦雲南邊防前敵諸軍歸節制戊辰裁貴州糧道貴西道己巳見各國公使希特斯等於仁壽殿賜宴庚辰雲南官軍敗匪於田房復四隘旋克大小南溪及河口發帑犒軍五月乙酉朔滇匪平丁亥裁巴塘𩹉塘土司置流官壬辰上疾復作命直省薦精通醫理者癸巳録中興功臣多隆阿向榮江忠源羅澤南駱秉章張國梁李續賓彭玉麟楊嶽斌鮑超李孟羣程學啓劉松山馮子材等後升有差甲午修曲阜孔子廟癸卯襄河決颶風為災庚戌郎中曹元弼進所著禮經校釋賞編修癸丑廣東大雨東西北三江並溢衝決圍隄六月丁巳前祭酒王先謙進所著尚書孔傳參正漢書補注荀子集解日本源流考賞內閣學士銜甲子免廣西礦地出井出口兩稅五年庚午豫進士館遊學畢業學員黎湛枝等進有差甲戌命張之洞兼督辦粵漢鐵路乙亥允達賴喇嘛入覲丙子以美國減收賠款命唐紹儀充專使致謝兼赴東西洋考察財政議免釐加稅乙卯授楊士驤直隸總督兼北洋大臣辛巳法部主事陳景仁等請三年後開國會詔以景仁倡率生事褫職交管束是夏免雲南水旱雹災奉天水災荒地額賦賑江蘇風雹災湖北水災發部帑五萬賑察哈爾蒙旗及兩翼牧羣災又部帑十萬賑廣東廣州肇慶陽江各屬水災秋七月壬辰裁黑龍江愛琿等三副都統增置璦琿道呼倫貝爾道丙申釋蘇元春回己亥免鐵路公私稅三年庚子以各省設政聞社斂財結黨陰擾治安諭所在嚴禁辛丑修浙江海塘癸卯廣西巡勇叛變戕殺統將張人駿督剿之丙午命三品卿銜胡國廉總理瓊崖墾礦事庚戌置雲南交涉使是月山東安徽蝗八月甲寅朔憲政編查館資政院上憲法議院選舉各綱要暨逐年籌備事宜詔頒行京外官署依限舉辦每六閲月臚列成績以聞辛未命薑桂題總統武衛左軍戊寅見俄使廓索維慈荷使希特斯等於仁壽殿己卯命廕昌端方校閲秋操庚辰馬玉崑卒晉二等輕車都尉辛巳命廕昌充出使德國大臣壬午遣御前大臣博迪蘇往保定迎勞達賴喇嘛九月癸未朔豫先儒顧炎武王夫之黃宗羲從祀文廟乙酉美軍艦遊歷至厦門遣貝勒育朗梁敦彥往勞問己丑開寧夏渠墾田庚寅達賴喇嘛至京尋於仁壽殿覲見癸巳頒畫一幣制丙申允郵傳部請試辦本國公債戊戌豫進士館畢業陳雲誥等進有差庚子見英使朱邇典等於仁壽殿癸卯豫遊學畢業陳振先等出身進士館畢業葉光圻等進各有差己酉裁四川成綿龍茂道增置巡警勸業兩道辛亥詔以前籌備憲政事宜尚有未盡諭各部院依前格式各就職司所繫分期臚列奏明交編查館覆核取旨遵行是秋免雲南會澤被水逋賦楚雄等縣及湖南蝄浦被水額糧發帑十萬賑湖北湖南災民復賑甘肅災廣東風災水災廣西浙江黑龍江福建水災冬十月甲寅見日使伊集院彥吉於勤政殿廣州肇慶等屬颶風為災諭施急賑戊午賜達賴宴於紫光閣壬戌皇太后聖壽節停筵宴達賴祝嘏進方物懿旨加封誠順贊化西天大善自在佛歲賜廩餼萬金遣歸藏壬申上疾甚懿旨醇親王載灃之子溥儀在宮中教養復命載灃監國為攝政王癸酉上疾大漸崩於瀛臺涵元殿年三十有八遺詔攝政王載灃子溥儀入承大統為嗣皇帝皇太后懿旨命嗣皇帝承繼穆宗為嗣兼承大行皇帝之祧宣統元年正月己酉上尊諡曰同天崇運大中至正經文緯武仁孝睿智端儉寬勤景皇帝廟號德宗葬崇陵論曰德宗親政之時春秋方富抱大有為之志欲張撻伐以湔國恥已而師徒撓敗割地輸平遂引新進小臣鋭意更張為發奮自強之計然功名之士險躁自矜忘投鼠之忌而弗恤其罔濟言之可為於邑洎垂廉再出韜晦瀛臺外侮之來釁自內作卒使八國連兵六龍西狩庚子以後怫鬱摧傷奄致殂落而國運亦因此而傾矣嗚呼豈非天哉
