body:
  text: 清史稿卷二十四本紀二十四德宗本紀二二十一年乙未春正月癸酉朔停筵宴乙亥日兵寇威海丁丑我海軍與戰於南岸敗績己卯吳大澄始出關視師辛巳威海陷守將戴宗騫死之改命聶士成統兵入關丁亥詔責李鴻章庚寅劉公島陷水師熸丁汝昌及總兵劉步蟾死之諭張之洞松椿防海贛清江水陸要衝保清淮通運辛卯授李鴻章為頭等全權大臣使日本壬辰見各國使臣於文華殿陶模言喀什噶爾莎車和闐等屬戶民英印度部收買為奴應由公家贖放從之丙申葉志超龔照璵俱論斬己亥日本陷文登寧海逼煙台宋慶等及日人戰於太平山敗績走二月乙巳宋慶吳大澄敗日人於亮甲山參將劉雲桂守備趙雲奇戰死賑錦州寧遠災民丁未命聶士成總統津沽海口防軍乙酉日兵薄遼陽長順唐仁廉擊卻之庚戌日兵陷牛莊吳大澄退走日人遂襲營口癸丑馬玉崑敗日人於田莊台甲寅復戰敗績丙辰日兵陷田莊台吳大澄奔錦州宋慶退雙台丁巳以吳大澄師徒撓敗切責之戊午恭親王等奏撤海軍署免上元江寧等處淮安等衛賦課賑直隸水災庚申分神機營兵駐喜峯口癸亥命吳大澄解軍務幫辦來京湘鄂諸軍以魏光燾領之乙丑撥庫帑十萬加賑薊州等處災民戊辰知州徐慶璋集民團固守遼陽命裕祿濟餉械己巳賑玉田灤州樂亭水災日人狙擊李鴻章彈傷其頰庚午日人犯澎湖三月壬申朔命吳大澄回湖南巡撫任癸酉濟陽高家紙坊河決乙亥日兵陷澎湖戊子褫提督蔣希夷職逮問癸巳命郭寶昌隨同劉坤一辦防務己亥李鴻章與日本全權伊藤博文陸奧宗光馬關會議和約成定朝鮮為獨立自主國割遼南地臺灣澎湖各島償軍費二萬萬增通商口岸任日本商民從事工藝製造暫行駐兵威海夏四月戊申撥京倉米石備順天平糶己酉天津海溢王文韶自請罷斥不許諭曰非常災異我君臣惟當修省惕厲以弭天災甘肅撒回叛陷循化廳雷正綰剿之庚戌命道員聯芳伍廷芳赴煙台與日本換約乙卯諭曰和約定議廷臣交章謂地不可棄費不可償當仍廢約決戰其言固出忠憤而未悉朝廷苦衷自倉卒開釁戰無一勝近者情事益迫北可逼遼瀋南可犯畿疆瀋陽為陵寢重地京師則宗社攸關況慈闈頤養草餘年使徒御有驚藐躬何堪自問加以天心示警海嘯成災戰守更難措手一和一戰兩害兼權而後幡然定計其萬難情事言者所未及詳而天下臣民皆當共諒者也茲將批準定約特宣示前後辦理緣由我君臣惟期堅苦一心痛除積弊戊午諭軍機大臣及諸臣工和局已成勿再論奏留山東運糧十萬石備寧河等處賑命裕祿接濟寧錦等屬賑需己未賞前宿松縣知縣孫葆田五品卿銜辛酉達賴喇嘛受戒畢賚哈達念珠等物癸亥撥湖北漕米三萬石備寧錦等屬賑乙丑京師平糶命李經方為臺灣交地全權委員丙寅賜駱成驤等二百八十二人進士及第出身有差丁卯召唐景嵩來京五月辛未朔賑臨漳等縣水災庚辰蔣希夷論斬乙酉見俄使喀希尼法使施阿蘭於文華殿壬辰日本歸我遼南地丁酉免湖南新化雲南阿迷保山昆明上年被災田賦賑長武等縣水災雹災庚子唐景嵩休致閏五月辛丑朔撥山東庫帑二萬助賑奉天壬寅撫恤江浙運漕稽候船戶萬餘人甲辰大學士福錕致仕乙巳命直隸提督聶士成總統淮軍駐津沽江西布政使魏光燾總統浙軍駐山海關四川提督宋慶總統毅軍駐錦州俱聽北洋大臣調度癸丑吳大澄罷戊午豫惠潮嘉道裕庚四品京堂充出使日本大臣丁卯諭曰近中外臣工條陳時務如修鐵路鑄鈔幣造機器開礦産折南漕減兵額創郵政練陸軍整海軍立學堂大抵以籌餉練兵為急務以恤商惠工為本源皆應及時興舉至整頓釐金嚴核關稅稽察荒田汰除冗員皆於國計民生多所裨補直省疆吏應各就情勢籌酌辦法以聞六月甲戌孫育汶以疾免丁丑賑熱河飢民乙酉軍機大臣徐用儀罷以麟書為武英殿大學士崑岡以禮部尚書協辦大學士命錢應溥為軍機大臣翁同和李鴻藻均兼總理各國事務衙門行走戊子賑鍾祥等處水災秋七月甲辰沁河決乙巳滎澤河決丁未詔李鴻章入閣辦事授王文韶直隸總督兼北洋大臣戊申賑商州清澗等處水災雹災己酉豫宋儒呂大臨從祀文廟壽張齊東河決豐升阿遣戍軍台戊午賑鎮安等縣水災辛酉江西巡撫德馨有罪褫職色勒庫爾地震壬戌以回衆猖獗褫總兵湯彥和職楊昌濬雷正綰並褫職留任丁卯已革提督黃仕林論斬八月壬申賑富川容縣水災丙子賑階文西寧等州縣水災己卯四川總督劉秉璋以不能保護教堂褫職丙戌命工部郎中慶常以五品京堂充出使法國大臣癸巳免雲南威遠被災田賦九月庚子賑梧州府屬火災留山東新漕備瀕河諸縣災賑乙巳留湖北冬漕三萬石備鍾祥等縣賑需丁未命魏光燾統軍援甘肅戊申免望都差徭及退出圈地額賦五成著為令己酉免陝西前歲民欠暨華州開渠占地錢糧壬子見英使歐格訥於文華殿乙卯賑甘肅被擾各地難民戊午賑臨湘蛟災撥帑三萬購倉穀備常德衡州旱災壬戌見和使克羅伯於文華殿癸亥命宗人府府丞吳廷芬兼總理各國事務衙門行走丙寅後藏班禪額爾德尼來京謁陵進方物揭陽潮陽普寧等縣地震十月辛未楊昌濬罷以陶模署陝甘總督辛巳李鴻章與日使互換歸遼條約甲申長麟汪鳴鑾並以召對妄言褫職己丑初設新建陸軍命溫處道袁世凱督練丙申免江川被災田賦二年賑鶴慶等州縣水旱災十一月乙酉朔山東趙家口合龍丁未免盛京被淹官莊額賦戊申留河南漕折八萬備內黃等縣工賑己酉以湖北布政使王之春充俄皇加冕賀使庚戌免奉天被兵各屬旗民兩年田賦並積年逋賦癸丑劉永福免癸亥甘肅提督李培榮以赴援西寧逗留褫職乙丑調董福祥為甘肅提督仍總統甘軍前敵諸將均歸節制賑保山蛟災十二月戊寅壽張決口合龍庚辰撥庫帑六萬備湖北春賑癸巳改命李鴻章使俄邵友濂副之是月免陝西前歲逋賦奉天上年葦稅及官莊稅糧賑盛京萍鄉災發帑各十萬賑湖南雲南陝西各屬災二十二年丙申春正月丙申朔停筵宴丁酉以特遣李鴻章使俄諭止邵友濂王之春毋往己亥賑長沙各府水旱災乙卯見各國公使於文華殿庚申命馮子材仍回廣東督辦欽廉防務二月庚午移塔爾巴哈台額魯特領隊大臣駐布倫布拉克伊犂察哈爾營領隊大臣駐博羅塔拉壬申始議郵政與各國聯會開龍州鐵路劉銘傳卒丁亥戶部火三月戊戌額勒和布致仕癸卯開杭州商埠丁未命王文韶張之洞督辦蘆漢鐵路辛酉回匪窺珠勒都斯癸亥命董福祥駐西寧專任剿撫魏光燾還駐河州尋命回陝西巡撫任夏四月壬申五台山菩薩頂災乙亥免昆明丘北被災夏糧辛巳命榮祿往天津閲新建陸軍戊子授崑岡體仁閣大學士榮祿以兵部尚書協辦大學士五月丁酉諭李秉衡查州縣糧賦浮收者核減之免恩安被災額賦辛丑鄭州文廟災是月上數奉皇太后臨醇王邸視福晉疾癸卯醇賢親王福晉葉赫那拉氏薨輟朝十一日上奉皇太后臨邸視殮越日復往奠祭懿旨醇賢親王福晉薨逝應稱曰皇帝本生妣乙巳上成服壬子免安徽歷年逋賦甲子緩鄂倫春牲丁進貂貢六月丙寅諭奎順撫恤青海蒙民丁卯河決利津戊辰免浙江歷年各場積欠竈課鹽課庚午賑浙江風災壬申醇賢親王福晉金棺奉移上躬詣臨送甲戌上奉皇太后如醇王園寓臨奠福晉金棺己卯諭整頓長江水師壬午命裕祿兼充船政大臣丙戌松潘番亂官軍剿平之丁亥允王大臣請神機營練兵處倣西制練兵辛卯永定河溢是月賑大東溝海溢災安徽湖北蛟災秋七月甲午朔日有食之丁酉順天東南各屬水命孫家鼐等速籌賑需乙巳留南漕十萬石於天津備賑八月乙丑以關內外回匪漸平諭陶模董福祥安輯降衆搜捕餘匪己巳川軍剿瞻對疊克要隘進逼中瞻庚辰諭鹿傳霖瞻對用兵乃暫時辦法事定後仍設番官否當再審詳不得因此苛責喇嘛轉生他釁慎勿鹵莽而行己丑諭刑部訊獄應速結毋任延宕壬辰禁各省濫用非刑九月丙申福錕卒免陝西前歲逋賦己亥東陵蟲災丙午賞盛宣懷四品京堂先是王文韶張之洞請立招商輪船總公司舉盛宣懷督辦至是旨下並準專奏大學士張之萬致仕丁未見德使海靖比使費葛於文華殿庚戌命李鴻章在總理各國事務衙門行走癸丑李秉衡言勘明黃河尾閭擬由舊黃河東岸挑濬新河仍導歸舊河入海諭以大舉興辦務期一勞永逸以副委任是秋賑河南奉天湖北安徽山東山西吉林黑龍江水災湖南蛟災及陝甘水災雹災新疆蝗災雹災廣東洋面風災冬十月壬戌朔賑湖北江漢水災癸亥辦河州冬賑甲子增設蘇州杭州沙市思茅四關丙寅諭陶模選廉明賢吏和輯漢回偶有爭執專論是非準情理以劑其平並分別撫恤被兵區域論平回功豫董福祥騎都尉世職授陶模陝甘總督饒應祺新疆巡撫豫奎順魏光燾優其餘甄有差甲戌永定河決口合龍戊寅定朝鮮設領事不立條約不遣使不遞國書以總領事一人駐其都城庚辰命左都御史楊儒充出使俄奧荷大臣道員羅豐祿充出使英義比大臣黃遵憲充出使德國大臣伍廷芳充出使美日祕大臣癸未免武清等州縣秋賦雜課乙酉賑華州等處水災己丑以徐桐為體仁閣大學士李鴻藻以禮部尚書協辦大學士十一月戊申冬至祀天於圜丘己酉免朝賀辛亥免河洮等處被災賦課丁巳命工部侍郎許景澄充出使德國大臣是月賑山東四川水災十二月乙丑初鹿傳霖屢奏瞻對宜剿擬收回後改設漢官上慮失達賴心命鹿傳霖文海等詳議至是疏陳瞻民向化藏番震懾各情因諭剴切勸導達賴期於保藏保川兩無窒礙賑四川東鄉等屬災丙子免遼陽各村屯糧賦綏德等州縣逋糧二十三年丁酉春正月辛卯朔停筵宴丁酉免山東光緒初年逋賦辛亥留湖北漕米充工賑乙卯見美法英德荷比俄義日本及日奧諸國公使於文華殿二月壬戌命戶部侍郎張蔭桓使英庚午河決歷城章丘己卯命崇禮許應騤在總理各國事務衙門行走三月癸巳詔汰冗兵甲辰懿旨發內帑十萬賑四川五萬賑湖北並以庫帑十萬加賑四川夔綏忠三屬辛亥免銅仁青溪被水田賦丁巳初設海參葳委員夏四月乙亥李秉衡奏減山東錢漕五月丙申詔棍噶札拉參胡圖克圖嘉穆巴圖多普準轉世為八音溝承化寺胡圖克圖甲辰張之萬卒贈太保丁未上詣本生妣醇賢親王福晉園寢周年釋服壬子豫呂海寰四品京堂充出使德荷二國大臣六月己卯賑崇陽等縣水災是夏見奧使齊幹俄使烏爾他木斯科英使竇納樂日使矢野文雄於文華殿秋七月庚寅李鴻藻卒丙申命廖壽恆在總理各國事務衙門行走辛丑復故陝西固原提督雷正綰原官甲辰免岷州衛二十四寺進吂月馬凡並展緩馬貢甲寅平遙普洞村山陷入地中八月己巳靖西地震壬申命翁同和以戶部尚書協辦大學士癸未弛科布多札哈沁寶爾吉礦禁許蒙漢民人開採乙酉以鹿傳霖於德爾格忒土司措理失宜罷改土歸流議釋土司昂翁降白仁青暨其家屬仍回德爾格忒管土司事九月戊子鹿傳霖罷己丑命德爾格忒撤兵戊戌見挪威使柏固於文華殿甲辰達賴喇嘛請還瞻對地諭恭壽等會商以聞丙午利津決口合龍乙卯復故陝甘總督楊昌濬官是秋賑陝西雹災水災湖南北江西廣東安徽雲貴水災新疆蝗災十月戊午廣西巡撫史念祖坐事褫職壬申曹州匪戕害德國教士命李秉衡察勘之戊寅德以兵輪入膠澳壬午免樂亭等州縣被災額賦是月賑廣東風災