body:
  text: 清史稿卷二十五本紀二十五宣統皇帝本紀宣統皇帝名溥儀宣宗之曾孫醇賢親王奕之孫監國攝政王載灃之子也於德宗為本生弟子母攝政王嫡福晉蘇完瓜爾佳氏光緒三十二年春正月十四日誕於醇邸三十四年冬十月壬申德宗疾大漸太皇太后命教養宮內癸酉德宗崩奉太皇太后懿旨入承大統為嗣皇帝嗣穆宗兼承大行皇帝之祧時年三歲攝政王載灃奉太皇太后懿旨監國軍國機務中外章奏悉取攝政王處分稱詔行之大事並請皇太后懿旨詔行三年喪甲戌尊聖祖母慈禧端佑康頤昭豫莊誠壽恭欽獻崇熙皇太后為太皇太后兼祧母后皇后為皇太后先是太皇太后並亦違豫是日崩乙亥申嚴門禁丁丑尊封文宗祺貴妃為祺皇貴太妃穆宗瑜貴妃為瑜皇貴妃珣貴妃為珣皇貴妃妃為貴妃大行皇帝瑾妃為瑾貴妃戊寅停各省進方物己卯誥誡羣臣詔曰軍國政事由監國攝政王裁定為大行太皇太后懿旨自朕以下一體服從嗣後王公百官儻有觀望玩違或越禮犯分變更典章淆亂國是定即治以國法庶無負大行太皇太后委寄之重而慰天下臣民之望庚辰頒大行皇帝遺詔安慶兵變剿定之十一月乙酉頒大行太皇太后遺誥詔四時祭饗祝版醇賢親王稱曰本生祖考醇賢親王嫡福晉稱曰本生祖妣醇賢親王嫡福晉賑湖南澧州等屬水災戊子皇太后懿旨皇帝萬壽節俟釋服後改於每年正月十三日舉行慶賀禮庚寅以即位前期告祭天地宗廟社稷先師孔子告祭大行太皇太后大行皇帝几筵辛卯帝即位於太和殿以明年為宣統元年頒詔天下罪非常所不原者咸赦除之詔遵大行太皇太后懿旨仍定於第九年內宣統八年頒布憲法召集議員鑄宣統錢己亥頒中和位育扁額於文廟壬寅內閣等衙門會奏監國攝政王禮節總目詔宣布之定守衛門禁章程命貝勒載濤育朗尚書鐵良總司稽察以副都統崑源管理察哈爾牧羣定軍機處領班章京為從三品官幫領班章京為從四品官福建龍溪南靖等縣水災發帑銀四萬兩賑之乙巳詔各省督撫督率司道考察屬吏秉公甄別不肖守令罔恤民瘼者重治之立變通旗制處命貝子溥倫鎮國公載澤那桐寶熙熙彥達壽總其事諭內外臣工尚節儉戒浮華丙午遣官告祭孔子闕里歷代帝王陵寢五嶽四瀆戊申皇太后懿旨罷頤和園臨幸加恩慶親王奕劻以親王世襲罔替貝勒載洵載濤加郡王銜皇太后父公桂祥食雙俸大學士以次錫賚有差辛亥冬至祀天於圜丘莊親王載功代行禮自是壇廟大祀皆攝十二月壬子朔加上穆宗毅皇帝孝靜成皇后孝德顯皇后孝貞顯皇后孝哲毅皇后尊諡頒宣統元年時憲書甲寅立禁衛軍命貝勒載濤育朗尚書鐵良專司訓練裁湖南鎮溪營游擊乾州協守備減留乾州協各營兵旌殉節故直隸提督馬玉崑妾于氏賑黑龍江墨爾根布特哈黑水大賚等城廳水災免直隸河間等八州縣被災地畝糧租丁巳祈雪命張之洞兼督辦川漢鐵路大臣庚申致仕大學士王文韶卒贈太保追豫故雲貴總督張亮基諡民政部上調查戶口章程表式壬戌袁世凱罷命大學士那桐為軍機大臣癸亥以梁敦彥為外務部尚書兼會辦大臣那桐免步軍統領以育朗代之乙丑詔定西陵金龍峪為德宗景皇帝山陵稱曰崇陵丁卯復祈雪己巳度支部上清理財政章程壬申命張勳所部淮軍仍駐東三省辦理剿撫事宜癸酉義大利地震災出帑銀五萬兩助賑憲政編查館奏京旗初選復選事宜應歸順天府辦理乙亥諭各省清蠲緩錢糧積弊丁丑復祈雪是日雪免陝西各州縣光緒三十二年逋賦戊寅又雪憲政編查館上核覆城鄉地方自治並另擬選舉章程詔頒行之始製寶星賜外務部總理會辦大臣及出使各國大臣庚辰設奉天各級審判廳檢察廳辛巳裁江西督糧道設巡警勸業兩道宣統元年己酉春正月壬午朔以大行在殯不受朝賀癸未免江蘇長洲等二十八廳州縣荒廢田地暨昭文金壇丹徒崑山新陽靖江溧陽等七縣漕屯銀米戊子置呼倫貝爾沿邊卡倫庚寅欽差大臣東三省總督徐世昌以病請免不許辛卯皇太后聖壽節停筵宴不受賀甲午免雲南阿迷州被災逋賦乙未度支部奏改定幣制請仍飭會議下政務處覆議開廣西富川縣錫礦丁酉禁置買奴婢戊戌以近年新設衙門新建省分調用人員請加經費不能綜核名實命中外切實考核裁汰毋漫無限制美利堅國開萬國禁煙會議於江蘇上海端方蒞會乙亥陳璧被劾罷以徐世昌為郵傳部尚書調錫良為欽差大臣東三省總督兼管三省將軍事以李經羲為雲貴總督壬寅命雲南交涉使高而謙赴澳門勘界民政部上整頓京師內外警政酌改廳區章程癸卯上大行太皇太后尊諡翼日頒詔天下戊申詔籌備立憲事宜本年各省應行各節依限成立不得延誤諭核定新刑律來年頒行復已革廣西提督蘇元春原官罷福建厦門貢燕己酉上大行皇帝尊諡廟號翼日頒詔天下庚戌重整海軍命肅親王善耆鎮國公載澤尚書鐵良提督薩鎮冰籌畫慶親王奕劻總司稽查罷鐵良專司訓練禁衛軍大臣二月壬子修德宗實録癸丑諭京外問刑衙門清訟獄釐剔弊端戊午農工商部奏和蘭將訂新律收華僑入籍請定國籍法下修訂法律大臣會外務部議庚申免浙江仁和等場竈課錢糧乙丑宣示實行預備立憲宗旨詔曰國是已定期在必成內外大小臣工皆當共體此意翊贊新猷言責諸臣亦應於一切新政得失利病剴切敷陳丁卯命熙彥喬樹楠劉廷琛吳士鑑周自齊勞乃宣趙炳麟談學衡與榮慶陸潤庠張英麟唐景崇寶熙朱益藩分日進講講義令孫家鼐張之洞核定庚午憲政編查館上統計表式甲戌申鴉片烟禁丙子免雲南宣威州被災村莊銀米閏二月甲申詔嚴預備立憲責成戒部臣疆臣因循敷衍放棄責任以服制倫紀攸關詔自今內外遭父母喪者滿漢皆離任聽終制命前內閣學士陳寶琛總理禮學館免浙江仁和等三十二州縣並杭嚴二衛杭衢嚴三所荒廢田地山塘丁漕銀米丙戌軍機大臣大學士那桐丁母憂詔奪情百日孝滿改署任仍入直戊子置庫倫理刑司員免廣東新礦井口稅豫死事安徽炮營管帶官陳昌鏞優恤辛卯監國攝政王班見王公百官於文華殿增設海參崴總領事頒行度支部印花票稅置直省財政監理官丙申裁湖北黃州荊門鄖陽宜昌施南德安副將參將游擊都司中軍守備各官出使大臣伍廷芳與美國訂立公斷專約成丁酉修崇陵戊戌立法政貴胄學堂命貝勒育朗總理乙巳旌賞年逾百歲甘肅固原州回民李生潮賜御書匾額己酉以大行在殯止年班內外札薩克蒙古汗王貝勒貝子公台吉塔布囊等及呼圖克圖喇嘛西藏堪布察木多帕克巴拉回子伯克土司土舍廓爾喀等毋來京三月辛亥增設浙江巡警道勸業道甲寅復前河南巡撫李鶴年原官庚申皇太后懿旨度支部每歲交進年節另款銀二十八萬兩自今停進辛酉奉移德宗景皇帝梓宮於西陵梁格莊行宮甲子以輪船招商局歸郵傳部管轄乙丑復裁奉天巡警道增設洮昌等處兵備道臨長海等處分巡兵備道改奉錦山海關道為錦新等處兵備道兼山海關監督東邊道為興鳳等處兵備道升興京廳為興京府丙寅免梓宮經過宛平良鄉涿州房山淶水五州縣本年額賦十分之五易州十分之七並賞民間平毀麥田銀每畝一錢己巳詔復前戶部尚書立山兵部尚書徐用儀吏部左侍郎許景澄內閣學士聯元太常寺卿袁昶原官並賜諡命陸軍協都統吳祿貞督辦吉林邊務裁山西雁平道辛未以前外務部左參議楊樞充出使比國大臣亞東江孜噶大克開埠設關丙子增置奉天輝南直隸廳戊寅四川總督趙爾巽駐藏大臣趙爾豐助發興學下部優趙爾巽捐廉贍族賞御書誼篤宗親匾額夏四月庚辰以各國遣使來弔命貝子銜鎮國將軍載振使日本法部尚書戴鴻慈使俄羅斯報謝他國命駐使將事甲申度支部立幣制調查局鑄通行銀幣乙酉普免光緒十四年訖光緒三十三年直省逋賦癸巳裁吉林琿春三姓寧古塔伯都訥阿勒楚喀各城副都統置琿春兵備道三姓兵備道升改增置綏芬延吉五常雙城賓州臨江諸府伊通直隸州榆樹直隸廳寶清綏遠二州琿春濱江東寧三廳富錦穆稜和龍樺川臨湖汪清額穆諸縣尋復設舒蘭阿城勃利饒河四縣甲午命內閣部院翰林科道會議德宗升祔大禮乙未祈雨丙申甘肅蘭州涼州鞏昌碾伯會寧各屬災發帑銀六萬兩賑之壬寅裁奉天左右參贊承宣咨議兩廳甲辰復祈雨戊申諭禁烟大臣切實考驗毋許瞻徇敷衍外省文武職官學堂責成督撫將軍都統等嚴查禁五月己酉朔日有食之辛亥廷試游學畢業生進士黃德章等一百二十人授官有差壬子于式枚言各省咨議局章程與普魯士國地方議會制度不符下憲政編查館妥議癸丑陳啓泰卒以瑞澄為江蘇巡撫允浙江紳士為故兵部尚書徐用儀吏部右侍郎許景澄太常寺卿袁昶於浙江西湖立祠甲寅復祈雨陝甘總督升允以疏陳立憲利弊罷以長庚代之乙卯命廣福署伊犁將軍丁巳聯豫溫宗堯奏陳西藏籌辦練兵興學事宜己未命世續署外務部會辦大臣楊士驤卒以端方為直隸總督兼辦理通商事務大臣張人駿為兩江總督兼辦理通商事務大臣孫寶琦署山東巡撫辛酉以乍丫地方曩屬四川命畫歸邊務大臣管轄甲子諭農工商部趣各省興舉農林工藝各政乙丑復祈雨是日雨戊辰復前協辦大學士戶部尚書翁同和原官己巳唐紹儀免奉天巡撫以侍郎候補辛未立游美學務處癸酉河南省改編營制甲戌賑雲南南寧州地震災丙子詔立軍咨處以貝勒育朗領之攝政王代為統率陸海軍大元帥貝勒載洵提督薩鎮冰俱充籌辦海軍大臣賑湖南澧州水災丁丑命貝勒載濤管理軍咨處事務六月甲申慶親王奕劻免管理陸軍部事賑湖北漢陽等府水災乙酉伊犁始編練陸軍丙戌授程德全奉天巡撫陳昭常吉林巡撫周樹模黑龍江巡撫丁亥開甘肅皋蘭縣新城西固城渠以工代賑己丑賑雲南彌勒縣洱等處地震災免雲南太和縣屬上年被災田糧庚寅復已故降調兩廣總督毛鴻賓原官追豫禦賊殉難已故江蘇常州府通判嶽昌於常州府建祠賑奉天安東水災甲午呂海寰罷以徐世昌充督辦津浦鐵路大臣沈雲沛副之更奉天錦新道名錦新營口等處分巡兵備道乙未吉林大水發帑銀六萬兩賑之賑湖南澧州安鄉常德嶽州等廳州縣水災丁酉湖北荊州漢陽兩府潦發帑銀六萬兩並命籌銀二十萬兩急賑之辛丑除熱河新軍營房占用圈地額租壬寅賑浙江錢塘等十一縣水災癸卯罷張勳東三省行營翼長命赴甘肅提督任甲辰命伍廷芳錢恂俱來京以署外務部右丞張蔭棠為出使美墨祕古四國大臣署外務部右參議吳宗濂為出使義國大臣趙爾巽奏平四川寧遠淺水倮夷乙巳賞京師貧民棉衣銀後以為常丙午命李準為廣東水師提督秋七月戊申朔裁湖南常德寶慶永順嶽州澧州臨武桂陽宣奉永州武岡沅州綏靖辰州嶺東各協營暨撫標提標副將參將游擊都司守備等官癸丑浚遼河丙辰籌辦海軍大臣上擬訂海軍長官旗式章服圖說管理軍咨處上酌擬軍咨處暫行章程賑江西萍鄉等縣水災丁巳停秋決法部上補訂高等各級審判廳試辦章程及擬定外省審判廳編制大綱開四川重慶江北廳龍王洞煤鐵礦戊午免雲南魯甸鎮雄二廳被災田畝銀米甲申南洋籌設勸業會命南洋大臣兩江總督張人駿為會長各省籌辦協會出品免稅釐辛酉德宗景皇帝梓宮奉移山陵免所過各州縣旗租並賞籽種銀甲子裁河南糧鹽道增置巡警勸業