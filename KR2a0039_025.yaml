詔特命袁世凱為內閣總理大臣從資政院奏依憲法信條公舉故有是命呂海寰請依紅十字會法推廣慈善救濟會從之廣東獨立舉都督總督張鳴岐遁福建新軍變將軍朴壽總督松壽死之甲申皇太后懿旨罷繼祿起世續復為總管內務府大臣召錫良入覲以朝廷於滿漢軍民初無歧視命統兵大員曉諭之乙酉山東巡撫孫寶琦宣告獨立順天府奏立臨時慈善普濟赤十字總會於京師罷貝勒育朗軍咨大臣以徐世昌代之丙戌賞恤江寧戰守將士命呂海寰充中國紅十字會會長兼慈善救濟會事東三省咨議局及新軍要求獨立總督趙爾巽不從寢其議仍令解勸之丁亥命近畿各鎮及各路軍隊並姜桂題所部俱聽袁世凱節制戊子分遣被兵各省宣慰使徵國民意見命各省督撫舉足為代表者來京與會議趙爾巽以川事引咎請罷詔不許吳祿貞以兵至石家莊為其下所殺御史溫肅劾祿貞包藏禍心反形顯著詔陳夔龍按查王士珍以疾免命段芝貴護湖廣總督永定河合龍袁世凱來京己丑以張錫鑾為山西巡撫溥頲免以錫良為熱河都統庚寅袁世凱舉國務大臣詔命梁敦彥為外務大臣趙秉鈞為民政大臣嚴修為度支大臣唐景崇為學務大臣王士珍為陸軍大臣薩鎮冰為海軍大臣沈家本為司法大臣張謇為農工商大臣楊士琦為郵傳大臣達壽為理藩大臣俱置副大臣佐之于式枚寶熙充修律大臣紹昌林紹年陳邦瑞王垿吳郁生恩順俱充弼德院顧問大臣辛卯命段祺瑞署湖廣總督起升允署陝西巡撫督辦軍務壬辰浙江巡撫增韞坐擅離職守奪職癸巳以督攻秣陵關餘黨將士奮勇賞張勳二等輕車都尉世職甲午資政院上改訂院章頒布之冬十月丙申內閣奏立憲抵觸事項停召對奏事弼德院軍咨府並限制之廢各衙門直日舊章更命世續復為文淵閣大學士戊戌伍廷芳張謇唐文治溫宗堯勸告攝政王請贊共和政體庚子以憲法信條十九事誓告太廟攝政王代行祀事以勞乃宣為大學堂總監督溥良免命直隸宣化鎮總兵黃懋澄兼署察哈爾都統辛丑命甘肅提督張懷芝幫辦直隸防務四川成都獨立舉都督壬寅督辦鐵路大臣候補侍郎署四川總督端方率兵入川次資州為其下所殺其弟端錦從並遇害復漢陽功封馮國璋二等男爵命科爾沁親王阿穆爾靈圭往奉天會趙爾巽籌畫蒙古事宜變軍犯金陵副將王有宏戰死甲辰孫寶琦罷獨立自劾待罪詔原之褒奬山東官商不附和者發帑犒張勳軍賞梁鼎芬三品京堂會李準規復廣東丙午革命軍陷江寧將軍鐵良總督張人駿走上海張勳以其餘衆退保徐州袁世凱與民軍訂暫時息戰條款停戰三日自是展期再三至決定國體日乃已命徐世昌充專司訓練禁衛軍大臣丁未寶棻免以齊耀琳為河南巡撫命壽勳會袁世凱徐世昌籌辦軍務戊申哲布尊丹巴胡圖克圖自立逐庫倫辦事大臣三多詔奪三多職己酉贈恤殉難江西巡撫馮汝騤庚戌監國攝政王載灃奏皇太后繳監國攝政王章退歸藩邸皇太后懿旨晉世續徐世昌俱為太保衛護皇帝諭段祺瑞剿當陽天門諸路土匪辛亥詔授袁世凱全權大臣委代表人赴南方討論大局以馮國璋為察哈爾都統資政院請改用陽曆並臣民自由剪髮詔俱行之壬子改訓練禁衛軍大臣為總統官以馮國璋為之以良弼為軍咨府軍咨使贈恤殉難閩浙總督松壽丙辰開黑龍江省太平山察漢敖拉煤礦丁巳革命軍至荊州署左翼副都統恆齡死之戊午內閣奏行愛國公債票辛酉孫寶琦免以胡建樞為山東巡撫十一月甲子朔袁世凱請廢臣工封奏舊制乙丑命前署湖北提法使施紀雲前光祿寺少卿陳鍾信四川團練丙寅成都尹昌衡羅綸以同志軍入總督衙劫前署四川總督川滇邊務大臣趙爾豐執之不屈死戊辰贈恤死事廣東潮州鎮總兵趙國賢壬申皇太后命召集臨時國會以共和立憲國體付公決初袁世凱遣唐紹儀南下與民軍代表伍廷芳討論大局以上海為議和地一再會議廷芳力持廢帝制建共和國紹儀不能折以當先奏聞取上裁遂以入告世凱奏請召集王公大臣開御前會議終從其言至是乃定期開國民會議於上海解決國體甲戌各省代表十七人開選舉臨時大總統選舉會於上海舉臨時大總統立政府於南京定號曰中華民國戊寅勸親貴王公等輸贍軍大理院正卿定成免以劉若曾代之己卯楊士琦免命梁士詒署郵傳大臣辛巳贈恤署四川總督督辦粵漢川漢鐵路大臣候補侍郎端方及其弟知府端錦罷鹽政院灤州兵變撫定之伊犂新軍協統領官楊纘緒軍變將軍志鋭死之丁亥告諭哲布尊丹巴胡圖克圖並賚先朝珍物庚寅贈恤殉難署荊州左翼副都統恆齡辛卯袁世凱道遇炸彈不中壬辰命張懷芝兼幫辦山東防務大臣癸巳命所司保護外人生命財産命舒清阿幫辦湖北防務以烏珍為步軍統領京師戒嚴十二月甲午朔賞張懷芝巡撫銜己未再豫前山西巡撫陸鍾琦二等輕車都尉世職追贈同時遇害其子翰林院侍講陸光熙三品京堂優恤賜諡並旌恤鍾琦妻唐氏丁酉張人駿罷命張勳護兩江總督胡建樞罷命張廣建署山東巡撫吳鼎元會辦山東防務己亥贈恤殉難伊犂將軍志鋭辛丑皇太后懿旨以袁世凱公忠體國封一等侯爵命額勒渾署伊犂將軍文琦辦塔爾巴哈台參贊大臣事李家駒免以許鼎霖為資政院總裁革命黨以藥彈擊良弼傷股越二日死壬寅袁世凱辭侯爵固讓再三乃受癸卯以復潼關賞銀一萬兩犒軍甲辰以漢陽功復張彪提督乙巳以張懷芝為安徽巡撫贈恤死事福州將軍朴壽丁未命張錫鑾往奉天會辦防務李盛鐸署山西巡撫盧永祥會辦山西軍務贈恤遇害軍咨府軍咨使良弼戊申以王賡為軍咨府軍咨使己酉皇太后懿旨授袁世凱全權與民軍商酌條件奏聞時岑春煊袁樹勳陸徵祥段祺瑞等請速定共和國體以免生靈塗炭故不俟國會召集決定自讓政權遂有是命庚戌命崑源會辦熱河防務辛亥命宋小濂署黑龍江巡撫壬子徐世昌免軍咨大臣贈恤雲南殉難甘肅布政使世增乙卯錫良免命崑源署熱河都統丁巳免江南徐州府未完丁漕銀糧戊午袁世凱奏與南方代表伍廷芳議贊成共和並進皇室優待條件八皇族待遇條件四滿蒙回藏待遇條件七凡十九條皇太后命袁世凱以全權立臨時共和政府與民軍商統一辦法袁世凱遂承皇太后懿旨宣示中外曰前因民軍起義各省響應九夏沸騰生靈塗炭特命袁世凱遣員與民軍代表討論大局議開國會公決政體兩月以來尚無確當辦法南北暌隔彼此相持商輟於塗士露於野國體一日不決民生一日不安今全國人民心理多傾向共和南中各省既倡義於前北方將領亦主張於後人心所向天命可知豫亦何忍因一姓之尊榮拂兆民之好惡是用外觀大勢內審輿情特率皇帝將統治權公諸全國定為立憲共和國體近慰海內厭亂望治之心遠協古聖天下為公之義袁世凱前經資政院選為總理大臣當茲新舊代謝之際宜為南北統一之方即由袁世凱以全權組織臨時共和政府與民軍協商統一辦法總期人民安堵海宇乂安仍合滿蒙漢回藏五族完全領土為一大中華民國豫與皇帝得以退處安閒優遊歲月受國民之優禮親見郅治之告成豈不懿歟又曰古之君天下者重在保全民命不忍以養人者害人現將新定國體無非欲先弭大亂期保乂安若拂逆多數之民心重啓無窮之戰禍則大局決裂殘殺相尋必演成種族之慘痛將至九廟震驚兆民荼毒後禍何忍復言兩害相形取其輕者此正朝廷審時觀變痌吾民之苦衷凡爾京外臣民務當善體此意為全局熟權利害勿得挾虛矯之意氣逞偏激之空言致國與民兩受其害著民政部步軍統領姜桂題馮國璋等嚴密防範剴切開導俾皆曉然於朝廷應天順人大公無私之意至國家設官分職以為民極內列閣府部院外建督撫司道所以康保羣黎非為一人一家而設爾京外大小各官均宜慨念時艱慎供職守應即責成各長官敦切誡勸勿曠厥官用副豫夙昔愛撫庶民之至意又曰前以大局阽危兆民困苦特飭內閣與民軍商酌優待皇室各條件以期和平解決茲據覆奏民軍所開優禮條件於宗廟陵寢永遠奉祀先皇陵制如舊妥修各節均已一律擔承皇帝但卸政權不廢尊號並議定優待皇室八條待遇皇族四條待遇滿蒙回藏七條覽奏尚為周至特行宣示皇族暨滿蒙回藏人等此後務當化除畛域共保治安重覩世界之升平胥享共和之幸福豫有厚望焉遂遜位論曰帝沖齡嗣服監國攝政軍國機務悉由處分大事並白太后取進止大變既起遽謝政權天下為公永存優待遂開千古未有之奇虞賓在位文物猶新是非論定修史者每難之然孔子作春秋筆則筆削則削所見之世且詳于所聞一朝掌故烏可從闕儻亦為天下後世所共鑒歟
