body:
  text: 清史稿卷二十六志一天文一歷代天文志自史記天官書後唯晉隋兩志備述天體儀象星占唐宋加詳皆未盡也至元景測益精明占候較密然疆宇所囿聲教未宏齊政窺璣尚多略焉有清統一區夏聖聖相承聖祖親釐象數究極精微前後製新儀七測日月星辰則窮極分秒度輿圖經緯則遍歷幅隕世宗復以歲久積差准監臣改用橢圓術高宗又以舊記星紀間有疏漏御製璣衡撫辰儀重加測候逮平定回疆及兩金川復令重度里差增入時憲理明數確器精法密自古以來所未有也今為天文志備載推驗之法其天象昭垂見於歷朝實録及所司載記者亦悉書之乾隆六十年以後國史無徵則從闕焉天象地體里差天象曆象考成天象篇云楚辭天問曰圜則九重孰營度之後世曆家謂天有十二重非天實有如許重數蓋言日月星辰運轉於天各有所行之道即楚辭所謂圜也欲明諸圜之理必詳諸圜之動欲考諸圜之動必以至靜不動者準之然後得其盈縮蓋天道靜專者也天行動直者也至靜者自有一天與地相為表𩹉故羣動者運於其間而不息若無至靜者以驗至動則聖人亦無所成其能矣人恆在地面測天而七政之行無不可得者正為以靜驗動故也十二重天最外者為至靜不動次為宗動南北極赤道所由分也次為南北歲差次為東西歲差此二重天其動甚微曆家姑置之而不論焉次為三垣二十八宿經星行焉次為填星所行次為歲星所行次為熒惑所行次則太陽所行黃道是也次為太白所行次為辰星所行最內者則太陰所行白道是也要以去地之遠近而為諸天之內外然所以知去地之遠近者則又從諸曜之掩食及行度之遲疾而得之蓋凡為所掩食者必在上而掩之食之者必在下月體能蔽日光而日為之食是日遠月近之徵也月能掩食五星而月與五星又能掩食恆星是五星高於月而卑於恆星也五星又能互相掩食是五星各有遠近也又宗動天以渾灝之氣挈諸天左旋其行甚速故近宗動天者左旋速而右移之度遲漸遠宗動天則左旋較遲而右移之度轉速今右移之度惟恆星最遲土木次之火又次之日金水較速而月最速是又以次而近之證也考成後編日躔曆理云西法自多祿某以至第谷立為本天高卑本輪均輪諸說近世刻白爾噶西尼等又以本天為橢圓月離曆理云自西人創為橢圓之法日距月天最高有遠近則太陰本天心有進退地心與天心相距兩心差有大小合觀諸論天象備矣恆星天無地半徑差及次輪消息故志土星以下七天距地心數著考測之詳焉諸天距地心數土星最高一十一又一百零四萬二千六百分之三十五萬二千六百日天半徑木星最高六又一百九十二萬九千四百八十分之一百三十萬五千九百日天半徑火星最高二又六百三十萬二千七百五十分之五百五十五萬二千二百五十日天半徑日均輪術最高一千一百六十二地半徑橢圓術最高二萬零九百七十五地半徑金星最高高於日一千萬分日天半徑之七百五十四萬五千六百四十四最下下於日如之水星最高高於日一千萬分日天半徑之四百五十三萬二千一百五十五最下下於日如之月均輪術最高朔望時五十八又百分之一十六地半徑橢圓術最高六十三又百分之七十七地半徑地體渾天家謂天包地如卵裹黃內經黃帝曰地之為下否乎岐伯曰地為人之下太虛之中也曰憑乎曰大義舉之也大戴禮單居離問於曾子曰天圓而地方誠有之乎曾子曰如誠天圓而地方則是四角之不掩也參嘗聞諸夫子曰天道曰圓地道曰方宋儒邵子曰天何依依乎地地何附附乎天天地何所依附自相依附自相依附天依形地附氣程子曰據日景以三萬里為中若有窮然有至一邊已及一萬五千里而天地之運蓋如初然則中者亦時中耳又曰今人所定天體只是且以眼定視所極處不見遂以為盡然向曾有於海上見南極下有大星十則今所見天體蓋未定日月升降不過三萬里中然而中國只到鄯善沙車已是一萬五千里若就彼觀日尚只是三萬里中也伯淳在澤州嘗三次食韭黃始食懷州韭次食澤州次食並州則知數百里間氣候已爭三月矣若都以此差之則須爭半歲如是則有在此冬至在彼夏至者只是一般為冬夏而已朱子天問注云天之形圓如彈丸其運轉者亦無形質但如徑風之旋地則氣之渣滓聚成形質者但以其束於徑風旋轉之中故得以兀然浮空甚久而不墮耳西人謂地體渾圓四面皆有人冬夏互異晝夜相反與內經戴記及宋儒之言若合符節今以天周三百六十度徵之南行二百里則北極低一度北行二百里則北極高一度東西當赤道下行二百里則見月食之早晚亦差一度其在赤道南北緯圈下行雖廣狹不同然莫不應乎渾象則知地之大周皆三百六十度東西南北皆周七萬二千里以古尺八寸計之則周九萬里以圍三徑一率之則徑三萬里亦與古三萬里為中之說相符然則地體渾圓無疑義矣距緯應大周里數不同為志其要赤道南北距緯東西每度相距里數距緯一度一百九十九里三百四十步距緯五度一百九十九里八十步距緯十度一百九十六里三百四十步距緯十五度一百九十三里六十步距緯二十度一百八十七里三百二十步距緯二十五度一百八十一里八十步距緯三十度一百七十三里六十步距緯三十五度一百六十三里二百八十步距緯四十度一百五十三里八十步距緯四十五度一百四十一里一百二十步距緯五十度一百二十八里二百步距緯五十五度一百一十四里二百四十步距緯六十度九十九里三百四十步距緯六十五度八十四里二百步距緯七十度六十八里一百四十步距緯七十五度五十一里二百四十步距緯八十度三十四里一百六十步距緯八十