body:
  text: 清史稿卷二十七志二天文二儀象漢創渾天儀謂即璣衡遺制唐宋皆倣為之至元始有簡儀仰儀窺几景符等器視古加詳焉明於北京齊化門內倚城築觀象臺倣元制作渾儀簡儀天體三儀置於臺上臺下有晷景堂圭表壺漏清初因之康熙八年聖祖用監臣南懷仁言改造六儀曰黃道經緯儀赤道經緯儀地平經儀地平緯儀紀限儀天體儀五十二年復將地平經緯合為一儀乾隆九年高宗御製璣衡撫辰儀並安置臺上今考各形製用法悉著於篇黃道經緯儀儀之圈有四各分四象限限各九十度其外大圈恆定而不移者名天元子午規外徑六尺規面厚一寸三分側面寬二寸五分規之下半夾入於雲座仰載之半圈前後正直子午上直天頂中直地平從地平上下按京師南北兩極出入度分定赤道兩極次內為過極至圈圈周平分處各以鋼樞貫於赤道二極又依黃赤大距度於過極至圈上定黃道南北極距黃極九十度安黃道圈與過極至圈十字相交各陷其中以相入令兩圈為一體旋轉相從黃道圈之兩側面一為十二宮一為二十四節氣其兩交一當冬至一當夏至次內為黃道經圈則以鋼樞貫於黃極焉圈之徑為圓軸圍三寸軸之中心立圓柱為緯表與經圈側面成直角而黃道圈經圈上各設遊表儀頂更設銅絲為垂線全儀以雙龍擎之復為交梁以立龍足梁之四端各承以獅仍置螺柱以取平垂線有偏側則轉螺柱垂線正則儀正矣用法欲求某星黃道經緯度須一人於黃道圈上查先所得某星之經緯度分其上加遊表而過南北軸中柱表對星定儀又一人用遊表於經圈上過柱表對所測之星遊移取置則經圈上遊表之指線定某星緯度又定儀查黃道圈兩表相距之度分即某星之經度差或測日月以距星為比亦如之赤道經緯儀儀有三圈外大圈者天元子午規也以一龍南向而負之規之分度定極皆與黃道儀同去極九十度安赤道圈與子午規十字相交恆定不動圈內規面及上側面皆鋟二十四時時各四刻外規面分三百六十度內安赤道經圈以南北極為樞而可東西遊轉與赤道圈內規面相切經圈徑為圓軸軸中心立圓柱以及遊表垂線交梁螺柱等法皆同黃道儀用法若測日時刻則赤道圈上用時刻遊表即通光耳對於南北軸表視赤道圈內遊表所指即時刻分秒若諸曜經度用兩通光耳即兩徑表在赤道圈上一定一遊一人從定耳窺南北軸表與先得星相參測之一人以遊耳轉移遷就而窺本軸表與所測參相直視兩耳間應赤道圈上之度分即兩經度之差也緯度亦以通光耳於經圈上轉移而遷就焉務欲令目與表與所測相參直視本耳下經圈在赤道或南或北之度分即所測距赤道南北之度分也地平經儀儀只一地平圈全徑六尺其平面寬二寸五分厚一寸二分分四象限各九十度以四龍立於交梁以承之梁之四端各施取平之螺柱梁之交處安立柱高與地平圈等適當地平圈之中心又於地平圈上東西各立一軸約高四尺柱各一龍盤旋而上從柱端各伸一爪互捧圓珠下有立軸其形扁方空其中如窗櫺以安直線軸之上端入於珠下端入立柱中心令可旋轉而軸中之線恆為天頂之垂線焉又為長方橫表長如地平圈全徑厚一寸寬一寸五分中心開方孔管於立軸下端使隨立軸旋轉復剡其兩端令鋭以指地平圈之度分又自兩端各出一線而上會於立軸中直線之頂成兩三角形凡有所測則旋轉遊表使三線與所測參相直乃視表端所指即所測之地平經度也地平緯儀即象限儀蓋取全圓四分之一以測高度者也其弧九十度其兩邊皆圓半徑長六尺兩半徑交處為儀心儀架東西立柱各以二龍拱之上架橫梁又立中柱上管於橫梁令可轉動儀心上指儀之兩邊一與中柱平行一與橫梁平行又於儀心立短圓柱以為表又加窺衡長與半徑等上端安於儀心剡其下端以指弧面度分更安表耳有所測乃以窺衡上下遊移從表耳縫中窺圓柱令與所測相參直其衡端所指度分即所測之地平緯度也紀限儀弧面為全圓六分之一分六十度一弧一幹幹長六尺即全圓之半徑弧之寬二寸五分幹之左右細雲糾縵䗿連所以固之幹之上端有小衡與幹成十字儀心與衡兩端皆立圓柱為表弧面設遊表承儀之臺約高四尺中植立柱以繫儀之重心則左右旋轉高低斜側無所不可故又名百遊儀焉用法測兩曜不論黃赤經緯而求大圈相距之度一人從衡端耳表窺中心柱表對定此曜又一人從遊耳表向中心柱表窺彼曜相參直視衡端至遊耳表下度分即兩曜相距度分也天體儀儀為圓球徑六尺宛然穹象故以天體名之中貫鋼軸露其兩端以屬於子午規之南北極令可轉運座高四尺七寸座上為地平圈寬八寸當子午處各為闕以入子午規闕之度與子午規之寬厚等則兩圈十字相交內規面恰平而左右上下環抱乎儀周圍皆空五分以便高弧遊表進退又安時盤於子午規外徑二尺分二十四時以北極為心其指時刻之表亦定於北極令能隨天體轉移又能自轉焉座下復設機輪運轉子午規使北極隨各方出地升降各方天象隱見之限皆可究觀矣地平經緯合儀經儀中心立柱安緯儀用法旋轉緯儀對定所測遊表於緯儀上得緯度視緯儀邊切經儀之處即得經度一測而兩得焉璣衡撫辰儀儀制三重其在外者即古六合儀而不用地平圈其正立雙環為子午圈兩面皆刻周天三百六十度自南北極起初度至中要九十度是為天經斜倚單環為天常赤道圈兩面皆刻周日十二時以子正午正當子午雙環中空之半而結於其中要是為天緯其南北二極皆設圓軸軸本實於子午雙環中空之間而軸內向以貫內二重之環其下承以雲座仰面正中開雙槽以受雙環東面正中開雲窩以受垂線下面置十字架施螺旋以取平架之東西兩端各植龍柱龍口銜珠開孔以承天常赤道卯酉之兩軸依觀象臺測定南北正線將座架安定則平面之四方正又依京師北極出地度分上數至成一象限即天頂依南極入地度分下數成一象限即地心於天頂施小釘懸垂線而垂適當地心又適切於雙環之面線末垂球又適當雲窩不即不離則上下正立面之四方亦正而地平已在其中次其內即古三辰儀而不用黃道圈其貫於二極之雙環為赤極經圈兩極各設軸孔以受天經之軸兩面皆刻周天三百六十度結於赤極圈之中要與天常赤道平運者為遊旋赤道圈兩面皆刻周天三百六十度與宗動天赤道旋轉相應自經圈之南極作兩象限弧以承之使不傾墊次最內即古四遊儀貫於二極之雙環為四遊圈兩面皆刻三百六十度定於遊圈之兩極者為直距綰於直距之中心者為窺衡遊圈中要設直表以指經度及時窺衡右旁設直表以指緯度別設借弧指時度表立表平行立表平行借弧表以濟所測之窮又設綰經度表綰時度表平行線測經度表以期兩測之合其數子午圈外徑六尺三寸內徑五尺六寸六分環面闊三寸二分厚九分中空一寸天常赤道外徑六尺一寸二分內徑五尺六寸四分環面闊二寸四分厚一寸四分赤極經圈外徑五尺五寸六分內徑五尺一寸二分環面闊二寸八分厚八分中空一寸二分遊旋赤道外徑五尺五寸六分內徑五尺一寸二分環面闊二寸二分厚一寸二分四遊圈外徑五尺內徑四尺六寸八分環面闊一寸六分厚七分中空一寸四分直距長如圓之通徑闊一寸六分厚七分中空一寸四分窺衡長四尺七寸二分方一寸二分中空一寸上下兩端施方銅蓋厚五分內三分方一寸入於管中外二分方一寸二分齊於管面中心開圓孔指時度表通長七寸三分本長一寸六分形如方筒入於四遊雙環中空之間闊一寸四分橫帶長三寸二分闊五分兩端各鉤回二分扣於環面之外表長五寸二分闊一寸其指時度之邊線對方筒之正中下端二寸四分厚三分切於遊旋赤道之面以指度分上端二寸八分厚二分切於天常赤道之面以指時刻指緯度表其形兩曲安於窺衡之右面底長三寸闊九分曲橫七分與四遊環之厚等又曲長一寸七分切於四遊環之外面從中線減闊之半所以指緯度也借弧指時度表其本方筒及橫帶長闊並與前指時度表同橫帶之下自左向右立安弧背一道長九寸三分闊一寸二分厚一分六釐弧背之末平安指時度表除弧背之厚長五寸二分闊一寸計自表本方筒之中線至指時度表之內邊長六寸七分當遊旋赤道之十五度當天常赤道之一小時立表二座形直底平表高底長各三寸二分闊九分厚一分一表向上開長方孔長一寸中留直線又上五分開圓孔徑四分中留十字線安於窺衡之上端一表依前度下開直縫上開小圓孔安於窺衡下端各對衡面中線以螺旋結之平行立表二座形曲底平底盤長四寸闊一寸二分厚一分中空三寸二分闊九分表曲如勾股股直如立表高三寸二分闊九分勾橫連於股末長五寸闊九分橫植於底盤之末底盤中空冒於立表底盤之外以掐表固之平行借弧表制如平行立表而倒正異一表上植於衡面高四寸一分零八毫一表自衡面下垂長六寸二分零八毫距表端下六分開圓孔又下五分開長方孔皆與立表制同綰經度表通長四寸闊一寸四分其本方筒長一寸六分高一寸八分入於四遊雙環之間以左右螺旋固之其末上下二面以夾遊旋赤道上面闊七分減本之半與窺衡中線相直下面以螺旋固之綰時度表內外二截內截上下內三面綰於遊旋赤道之內規上面之末承於外截之下開二方孔以受外截之方足下面以螺旋固之外截上下外三面綰於天常赤道之外規上面之末覆於內截之上下面以螺旋固之平行線測經度表於直距南北極之兩端各安銅版如工字形正方二寸八分與直距二面之分等兩要各缺一長方長一寸六分闊七分扣於直距中空之間中心開圓孔貫於天經之軸四隅距中心一寸九分各安立柱圓頂開孔以穿直線與直距中徑平行下安小環以為結赤經平行線之用又按距星宮度於遊旋赤道安赤經平行線表其制上畫半圓內容半方自對角斜線起初度至橫徑為四十五度其中直徑與指度表之邊線相參直半圓中心安二遊表各長二寸距中心一寸九分邊留小臍中開小圓孔以線穿之上端繫於北極銅版對角之兩環下端貫於南極銅版對角之兩環各以垂球墜之用法測日時刻以四遊圈東西推轉窺衡南北低昂令日光透孔圓正視四遊圈下指時度表臨天常赤道某時刻即得若日景為赤道所礙則用窺衡上立表測之令表兩孔正透仍於指時度表視時刻或為龍柱所礙則用平行立表測之亦於指時度視時刻若指時度表為子午圈所礙則易用借弧指時度表次用平行立表測定日景視借弧指時度表所指時刻加一小時即得測經度取所知正午前後一恆星以其赤道經度之對沖用綰經度表於遊旋赤道綰定四遊圈又任設一時用綰時度表於其時之對沖綰天常赤道乃將四遊圈帶定遊旋赤道用窺衡測準距星隨之左旋候至所設時刻視綰時度表對遊旋赤道某宮度分即日赤道經度或以本時太陽赤道經度用綰時度表於遊旋赤道綰定又以所設時刻之對沖於天常赤道綰定候至所設時刻用四遊窺測月星乃視指時度表所指遊旋赤道宮度加半周即得所測月星赤道經度測兩曜相距經度用平行線測經度表於遊旋赤道初宮初度安定令一人用此平行線表左兩線右兩線並窺定距西之曜隨之左旋一人用四遊窺衡測距東之曜視指時度表所指遊旋赤道之度分即所測兩曜相距赤道經度也測緯度凡得經度時隨察指緯度表所指四遊圈之度分即得所測赤道緯度其有所礙皆如測時刻法易之其近北極之星則以平行借弧表測之
