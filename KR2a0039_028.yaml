body:
  text: 清史稿卷二十八志三天文三日月五星恆星黃赤道十二次值宿昏旦中星日月五星自古言天之精者知日月五星為渾象而已近代西人製大遠鏡測得諸曜形體及附近小星暈氣各種古今不同就其著者録焉日之面有小黑形常運行二十八日滿一周月之面以日光正照顯明景偏照顯黑景其面有凹凸故雖全明之中亦有淡黑雜景土星之體倣佛卵形舊測謂旁有兩耳今測近於赤道星面相逼甚窄於遠赤道所宕甚寬旁有排定小星五點最近第一星約行二日弱第二星行三日弱第三星行四日半強第四星略大行十六日第五星行八十日俱旋行土星一周木星之面常有平行暗景外有小星四點第一星行一日七十三刻第二星行三日五十三刻第三星略大行七日十六刻第四星行十六日七十二刻俱旋行木星一周火星之面內有無定黑景金水星俱借日為光合朔弦望如月恆星曆象考成云恆星之名見於春秋而四仲中星及斗牽牛織女參昴箕畢大火農祥龍尾鳥帑元駟元黿之屬散見於尚書易詩左傳國語至周禮春官馮相氏掌二十八星之位而禮記月令大戴禮夏小正稍具諸星見伏之節蓋古者敬天勤民因時出政皆以星為紀秦炬之後羲和舊術無復可稽其傳者惟史記天官書而所載簡略後漢張衡云中外之官常明者百有二十四可名者三百二十為星二千五百而其書不傳至三國時太史令陳卓始列巫咸甘石三家所著星圖總二百八十三官一千四百六十四星隋丹元子作步天歌三垣二十八宿共一千四百六十七星為觀象之津梁然尚未有各星經緯度數自唐宋而後諸家以儀象考測始有各星入宿去極度分視古加密新法算書恆星圖表共星一千二百六十六分為六等第一等星一十七第二等星五十七第三等星一百八十五第四等星三百八十九第五等星三百二十三第六等星二百九十五外無名不入等者四百五十九康熙壬子年欽天監新修儀象志恆星亦分六等而其數微異第一等星一十六第二等星六十八第三等星二百零八第四等星五百一十二第五等星三百四十二第六等星七百三十二共計一千八百七十八蓋觀星者以目之所能辨因其相近聯綴成象而命之名其微茫昏暗者多不可考故各家星官之數多少不能畫一然列宿及諸大星則古今中西如一轍也又云恆星行即古歲差也古法俱謂恆星不動而黃道西移今謂黃道不動而恆星東行蓋使恆星不動而黃道西移則恆星之黃道經緯度宜每歲不同而赤道經緯度宜終古不變今測恆星之黃道經度每歲東行而緯度不變至於赤道經度則逐歲不同而緯度尤甚自星紀至鶉首六宮之星在赤道南者緯度古多而今漸少在赤道北者反是自鶉首至星紀六宮之星在赤道南者緯度古少而今漸多在赤道北者反是凡距赤道二十三度半以內之星在赤道北者可以過赤道南在赤道南者亦可以過赤道北則恆星循黃道東行而非黃道之西移明矣新法算書載西人第谷以前或云恆星百年而東行一度或云七十餘年而東行一度或云六十餘年而東行一度隨時修改訖無定數與古人屢改歲差相同逮至第谷方定恆星每歲東行五十一秒約七十年有餘而行一度而元郭守敬所定歲差之數亦為近之至今一百四十餘年驗之於天雖無差忒但星行微渺必歷多年其差乃見然則第谷所定之數亦未可泥為定率惟隨時測驗依天行以推其數可也儀象考成云康熙十三年監臣南懷仁修儀象志星名與古同者總二百五十九座一千一百二十九星比步天歌少二十四座三百三十五星又於有名常數之外增五百九十七星又多近南極星二十三座一百五十星近年以來纍加測驗星官度數儀象志尚多未合又星之次第多不序順亦宜釐正於是逐星測量推其度數觀其形象序其次第著之於圖計三垣二十八宿星名與古同者總二百七十七座一千三百一十九星比儀象志多十八座一百九十星與步天歌為近其尤與古合者二十八宿次舍自古皆觜宿在前參宿在後其以何星作距古無明文唐書云古以參右肩為距失之太遠文獻通考載宋兩朝天文志云觜三星距西南星參十星距中星西一星西法觜宿距中上星參宿亦距中西一星今按觜宿中上星在西南星前僅六分餘而西南星小中上星大則以中上星作距可也若參宿以中西一星作距星則觜宿之黃道度已在參宿後一度餘即赤道度亦在參宿後三十一分餘今依次順序以參宿中三星之東一星作距星則觜宿黃道度恆在參前一度弱與觜前參後之序合其餘諸座之星皆以次順序無淩躐顛倒之弊又於有名常數之外增一千六百一十四星近某座者即名某座增星依次分注方位以備稽考其近南極星二十三座一百五十星中國所不見仍依西測之舊共計恆星三百座三千八十三星黃赤道十二次值宿古者分十二次即節氣故冬至為丑中春分為戌中夏至為未中秋分為辰中後人則以中氣而冬至在星紀之初古不知列宿循黃道東行且不見有歲差即以所在星象名其次故奎婁為降婁房心尾為大火後人悉仍其名而星象之更則不論積數千年將所謂蒼龍玄武白虎朱雀之四象且易其方然則十二次之名存古意爾今以康熙甲子年推定十二次初度所值宿及乾隆甲子年改定十二次初度所值宿並紀於左康熙甲子年黃道十二次初度值宿星紀箕三度一十分元枵牽牛初度二十三分娵訾危一度降婁營室一十度五十七分大梁婁初度二十七分實沈昴五度一十二分鶉首觜觿一十度三十八分鶉火東井二十九度零五分鶉尾七星七度零四分壽星翼一十度三十七分大火角一十度三十四分析木房一度三十九分康熙甲子年赤道十二次初度值宿星紀箕三度三十九分元枵南斗二十三度二十七分娵訾危二度三十四分降婁東壁初度四十二分大梁婁五度四十二分實沈昴八度四十分鶉首觜觿一十度二十九分鶉火東井二十九度鶉尾張五度五十七分壽星軫初度零二分大火亢一度析木房五度零三分乾隆甲子年黃道十二次初度值宿星紀箕二度一十九分一十三秒元枵南斗二十三度二十四分一十八秒娵訾危初度一十二分四十四秒降婁營室一十度五分四十七秒大梁奎一十一度八分五十二秒實沈昴四度九分三十九秒鶉首參八度五十五分一十五秒鶉火東井二十八度一十六分五十秒鶉尾七星六度一十七分一秒壽星翼九度四十八分一十七秒大火角九度四十三分三十九秒析木房初度三十七分三十五秒乾隆甲子年赤道十二次初度值宿星紀箕二度四十分一十四秒元枵南斗二十二度三十五分四十七秒娵訾危一度五十分二十七秒降婁營室一十七度零三十八秒大梁婁四度五十二分三十三秒實沈昴七度三十四分三秒鶉首參八度一分五十五秒鶉火井二十八度八分一十五秒鶉尾張五度一十二分一秒壽星翼一十八度八分三十一秒大火亢初度一十分三十秒析木房四度八分一十七秒昏旦中星自虞書紀四仲昏中之星而月令並舉逐月昏旦然虞書仲冬星昴月令則昏中東壁相去約二千年中星相差四宿雖由歲差之故而古法疏略無度分固難深論也今以康熙壬子年所定恆星經緯度推得雍正元年癸卯各節氣昏旦中星列於志若求乾隆九年甲子以後各節氣昏旦中星則當按乾隆甲子年改定恆星經緯度備推焉春分係交節初日後同昏北河二中偏西四度三十四分旦尾中偏東一度七分因無當中之星故用近中之星而紀其偏度又星宿並用第一星間有第一星距中太遠而用餘星者則紀其數如北河二及參四氐四之類清明昏七中星偏東五度十四分旦帝座中偏東一度五十九分穀雨昏軒轅十四中偏西四度五十九分旦箕中偏東四度十三分立夏昏五帝座中偏西三十二分旦箕中偏西四度九分小滿昏角中偏東二度二十三分旦南斗中偏西三度八分芒種昏氐中偏東三度二十九分旦河鼓二中偏東二度二十一分夏至昏房中偏東二度八分旦須女中偏東一度四十三分小暑昏尾中偏西四十分旦尾中偏東三度二十五分大暑昏帝座中偏西三度二十五分旦營室中偏西一度五十六分立秋昏箕中偏西二度三十七分旦土司空中偏東一度四十分處暑昏南斗中偏西二十六分旦婁中偏西一度四十六分白露昏南斗中偏西八度三十二分旦天囷中偏西四度四十一分秋分昏河鼓二中偏東三十四分旦畢中偏西三度七分寒露昏牽牛中偏西五十三分旦參四中偏西十三分霜降昏須女中偏西三度四十一分旦天狼中偏西五度三十七分立冬昏虛中偏西三度二十分旦輿鬼中偏東一度二十七分小雪昏北落師門中偏東五度四十一分旦七星中偏西二度十六分大雪昏營室中偏西五度五十七分旦翼中偏東二度五十五分冬至昏東壁中偏西四度二十六分旦五帝座中偏西二度一分小寒昏婁中偏東三度三十三分旦角中偏東六度二十四分大寒昏胃中偏西二度二十分旦亢中偏東四度十八分立春昏昴中偏西五度三十四分旦氐中偏東一度二十八分雨水昏參七中偏西四十五分旦氐四中偏西二度三十二分驚蟄昏東井中偏西三度六分旦房中偏西二度四分
