  text: 清史稿卷二十九志四天文四康熙壬子年恆星黃道經緯度表一揆日所以正時候星所以紀日日行黃道故推測恆星必求黃道經緯度分且恆星循黃道東行上考下求每年祗加減經度五十一秒今依康熙壬子舊測恆星黃道經緯度分及南北之向大小之等為二卷先列降婁戌宮至鶉尾巳宮凡一百八十度之名星及附近星如左黃道經度緯度黃道經度緯度星名宮十度十分向十度十分等星名宮十度十分向十度十分等天鈎二戌二一北七一四九四天鈎一戌五四北七四四黃道經度緯度黃道經度緯度星名宮十度十分向十度十分等星名宮十度十分向十度十分等天溷四戌五七南一四五天溷三戌一一七南一三五天園四戌二南五七五三天廚南六戌二四北七七三二五天溷二戌二三七南一三四五車府一戌二四五北四八二四土公二戌三二九北五二八六螣蛇南十一戌三三七北四四三天溷一戌三三七南一一四五壁宿一戌四三八北一二三五二造父六戌五四七北六四五天倉二戌七一二南一六五五三天鈎三戌八一三北六八五四三造父三戌八五三北五九五九四造父四戌九二九北六一三四外屏一戌九三六北二一一四天園五戌九四南五四二五三壁宿二戌九四七北二五四二二螣蛇七戌一二七北四五七四造父二戌一五七北六一三五天倉三戌一一四三南一五四七三造父五戌一二三北六五一五螣蛇八戌一二四六北四一四四四外屏二戌一二五八北一六四天倉五戌一三二五南二五一四外屏南八戌一三二五南一三一六天廚一戌一三二七北八二四九三螣蛇十戌一三四七北四三五四造父一戌一四三九北五八四六四外屏南九戌一四四六南四二六天倉六戌一四五南三一四四外屏三戌一五一九北五八四螣蛇九戌一五二三北四二八五天三戌一五五八北三一三三五天倉內七戌一六五南二一五五五奎宿二戌一六九北一七四八四黃道經度緯度黃道經度緯度星名宮十度十分向十度十分等星名宮十度十分向十度十分等天廚五戌一六二一北七八一四奎宿四戌一六二五北二三四四天園六戌一六二五南五四四三天一戌一六四六北三三二一四天二戌一七七北三二一五五奎宿五戌一七二北二四二三天倉四戌一七二五南二一九三奎宿一戌一七五四北一五五八五奎宿三戌一八四北二二四六奎宿六戌一八七北二七七五外屏四戌一八三三南三三五奎宿十五戌一九三北一二二二六奎宿十六戌一九七北一三二一五奎宿內十九戌一九七北一九二四六奎宿南二十一戌一九九北一一二一六天鈎四戌一九四六北六五四二五奎宿南二十戌二北一二二八五奎宿內十八戌二二三北二五五六外屏五戌二五六南四四一五奎宿十四戌二一五九北一五三五右更三戌二二六北一五二五右更二戌二二一六北五二一四右更一戌二二三七北九二四五奎宿內十七戌二二四一北二三三六外屏六戌二二五八南七五六五右更四戌二三一二北一三九五奎宿十一戌二三五北二四三五右更五戌二四一南三五奎宿十戌二四一五北二二六奎宿十三戌二四一八北一七二六五奎宿七戌二四三六北三二三一四外屏七戌二四四八南九五三奎宿八戌二五七北三三四四天苑西十七戌二五九南二五一七四奎宿十二戌二五一一北一八三一六天苑西十八戌二五三二南二八三一四黃道經度緯度黃道經度緯度星名宮十度十分向十度十分等星名宮十度十分向十度十分等螣蛇六戌二五三九北四九二五六奎宿九戌二五四九北二五五九二螣蛇四戌二六三二北五二三九六螣蛇五戌二六三四北五一八六閣道十一戌二六五五北三八九六天苑八戌二七七南三二四七四天囷十戌二七二南一四四四天廚二戌二七四四北八五四四閣道六戌二七五六北三九一六六天苑九戌二七五七南三四五四婁宿二戌二八三七北七九四天廚三戌二八四七北七九二五三天苑西十九戌二八四八南二五五八三天鈎五戌二八五四北六二三五四婁宿南七戌二八五七北五二四五閣道西十戌二八五七北四一二六六天苑七戌二九一二南二八一七四婁宿一戌二九二三北八二九四天囷五戌二九三南四一九四王良五酉一北四五三八五王良一酉二六北五一一五三閣道五酉三二北四一一五六附路酉三五北四四四一四天苑十酉四七南三八三四天廚南七酉一一三北七一七三軍南門酉一五六北三六二五天大將軍西十二酉二一九北一六五四天苑二十一酉二二七南二三一五四婁宿南四酉二四一北九一三六天囷六酉二五四南五三二四天囷九酉三二南一四三二三婁宿三酉三六北九五七三王良四酉三一八北四六三六三婁宿五酉三三四北七二三六天園七酉三四七南五二四天囷七酉三五南五一三四黃道經度緯度黃道經度緯度星名宮十度十分向十度十分等星名宮十度十分向十度十分等天苑六酉四一南二四三四三婁宿六酉四二北五四三六天大將軍六酉四二三北二七五五五天大將軍西十一酉四三七北三四三五天囷八酉四五四南一二三三王良三酉五三八北四七五四天大將軍七酉五四北二三三五五天苑十一酉五四七南三八一四天鈎六酉六北六一四五五天大將軍五酉六六北二八五九五天大將軍四酉六七北三二三五閣道中七酉六一六北四三二八五天苑北二十酉六三六南二三五八四天園八酉六四七南五三三四金魚一酉七南七六四天囷四酉七七南五三六四閣道四酉七一五北四三七四天大將軍八酉七五北二三三四天大將軍三酉七五二北三五二二四策西一酉七五二北四