  text: 清史稿卷三十志五天文五康熙壬子年恆星黃道經緯度表二列壽星辰宮至娵訾亥宮一百八十度之名星及附近星並增定最小名星及附近星如左黃道經度緯度黃道經度緯度星名宮十度十分向十度十分等星名宮十度十分向十度十分等左執法辰一六北一二五四左樞辰二二北七一四三九卿一辰五三北一三三七五翼宿九辰一三三南一六二四黃道經度緯度黃道經度緯度星名宮十度十分向十度十分等星名宮十度十分向十度十分等海石二辰一四南六六四三元戈辰二一八北五四四四九卿三辰二二一北一二六六九卿二辰二五二北一一三七六青丘一辰四七南三一二四東上將辰四三北二三五東次將辰五二四北一六一六三東上相辰五三六北二五三軫宿一辰六一三南一四二五三青丘二辰六二七南三四一四東次相辰六五五北八四一三軫宿二辰七八南一九三九四進賢南二辰七三八南三二五五右轄五辰七三八南二一四六四青丘三辰八七南三一四三海石三辰八三南六五二五軫宿三辰八五五南一二七三少宰辰八五五北七八三二三長沙辰九一三南一八一四五左轄辰九二一南一一二八五次將東六辰九二五北一六一四六進賢一辰一二九北二二四六次將東七辰一一一一北一二四一五飛魚二辰一一一二南七五四六進賢三辰一一三九南三二二五海石四辰一二一五南六六五五軫宿四辰一二四九南一七五九三元戈北二辰一二四九北六四六馬尾西五辰一三南四八二四右攝提二辰一三二五北二六三三四上宰辰一三二九北七四一二三元戈三辰一三三三北六五七六平道一辰一三三七北一四五四招搖一辰一四六北四九三四三右攝提三辰一四三七北二五一四四右攝提一辰一四四二北二八九三黃道經度緯度黃道經度緯度星名宮十度十分向十度十分等星名宮十度十分向十度十分等進賢四辰一五八南三一三五海山三辰一五三南五八四五五天田一辰一五四六北一二三五六南船二辰一六二南六一四五四角宿二辰一六二三北八一三飛魚一辰一八南七二三五天門一辰一八一三南七五一五梗河三辰一八一八北四二三六四角宿東五辰一八五七北一六角宿東三辰一八五九北三一一六角宿一辰一九一六南一五九一梗河二辰一九一六北四二一一四南船一辰一九三五南六四四大角辰一九四北三一三一七公西八辰一九四四北五四一六三天田南四辰一九五七北八三五海山二辰二二南五八一四平星西三辰二二四南一四三七六天門南三辰二三五南九一六五角宿東四辰二四四南一六馬尾四辰二一南五四海山一辰二一一南五六三五天門二辰二一三五南六一六五平道二辰二二一北一四六六平星一辰二二二四南一三四三三海石五辰二二三南六八四天田南三辰二二三八北九四一六馬尾三辰二三南四九三二飛魚三辰二三南七七三五六天田二辰二三一一北一三八五梗河一辰二三三北四四三庫樓八辰二四三七南四一五馬尾一辰二四三七南四六一二馬尾二辰二五一七南四六四五四亢宿西五辰二五四四北二二五六庫樓七辰二六五七南四二三黃道經度緯度黃道經度緯度星名宮十度十分向十度十分等星名宮十度十分向十度十分等七公五辰二七六北五七一六四南船三辰二七一南六一五四四左攝提二辰二七一四北三二八四南船五辰二七一五南七一六三金魚四辰二七四五南八七五庫樓六辰二七四七南四三庫樓西九辰二八七南二五四三左攝提三辰二八一一北三一二二四海山四辰二八一七南五五一四左攝提一辰二八二七北二七五七三七公七辰二八三北四九一三七公六辰二八三二北五三二七四亢宿二辰二八四九北一一三五左攝提北四辰二五二北三三五二四梗河六辰二八五三北四二一六五亢宿三辰二九九北七一九四梗河東四辰二九一一北四一四五梗河九辰二九三七北四六一四亢宿一辰二九五一北二五八四梗河東七卯一六北四一五五六梗河東八卯三四北四五六五梗河東五卯四北四三一五亢宿東五卯五二北一一四八四海山五卯五五南五六三四柱二卯一七南二三四庫樓四卯一七南二七三四柱三卯一五七南二五庫樓五卯一五七南三七三五十字二卯一五七南五一一二柱四卯二一五南一八五五亢宿四卯二二二北三二四柱一卯二二七南二一四五十字四卯三七南五五四二七公四卯三二九北六一六四貫索北十卯三三五北五四四七公西九卯三四三北六四二三四黃道經度緯度黃道經度緯度星名宮十度十分向十度十分等星名宮十度十分向十度十分等柱十卯四七南三三五五貫索三卯四一北四八二五五南船四卯四三五南六六五四貫索二卯四三七北四六八四衡一卯五一七南二八二四平星二卯五二七南一七四四亢宿東六卯五三北九四九四衡二卯五五七南二九二四飛魚四卯六一南七六四五六飛魚五卯六三南八三二五十字一卯六三七南四九一四貫索四卯六五六北五六七公三卯六五七北六三五一四衡三卯七七南二八四十字三卯七一七南五一四二海山六卯七三南五七四四庫樓三卯七三七南二二三三貫索一卯七三九北四四二三二衡四卯八一七南二六三四馬腹一卯八一七南四三二柱八卯八二七南三二五柱七卯九三七南三一五馬腹二卯九三七南四三四五三氐宿內八卯九四二北一五五五七公二卯九四四北六五五五四庫樓一卯九五七南三三三三柱五卯一七南二二二四貫索五卯一一五北四四三三二南門一卯一一七南四四五四氐宿一卯一三一北二六二