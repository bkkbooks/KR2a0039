  text: 清史稿卷三十五志十天文十天漢黃道經緯度表天漢在中國所見起箕尾沒七星而已過赤道南視之繞南船海山如循環然由人目所測淡淡浮空而已製大遠鏡窺之現無數小星若積雪然蓋與恆星為一體即隨恆星天運行康熙壬子乾隆甲子所紀不同備列於表黃道北康熙壬子年測定戌宮經南界緯北界緯戌宮經南界緯北界緯度度度度度度十度十十度十十度十十度十十度十十度十分分分分分分五三六七二二五三二六七二四五三六六三六五二三六六一八五二一六五四一五一一六五一二五六四四一四四九三六四二一六四九六四一八四八一六三五二四八六三二二四七一六三二四四六四六二一二六四五五六一三二八四五六三酉宮經南界緯北界緯度度度酉宮經南界緯北界緯十度十十度十十度十度度度分分分十度十十度十十度十四四五九三分分分二四二五九四四一四五八二六四三五七一八三九三五六三一三八五六一二三六三五五二一四三五三五四二一六二四五二四一八三二二五五二二九五四八五酉宮經南界緯北界緯酉宮經南界緯北界緯度度度度度度十度十十度十十度十十度十十度十十度十分分分分分分二二二八四六三二四二六三四五二六二五四三二八二三四三申宮經南界緯北界緯申宮經南界緯北界緯度度度度度度十度十十度十十度十十度十十度十十度十分分分分分分二三三八二一八五三六二四一七二三四一六一五四三二二五八一四三二一一三二九一二一五二七二一四九二五二一六七二三一一八五二三二一九二二一六二四一三二六一二八五未宮初度寅宮經北界緯寅宮經北界緯度度度度十度十十度十十度十十度十分分分分一一二一二一二一四六一六九三寅宮經十七度北河中南河中北河中北寅宮經河中南河中北河中北度界緯初度上界緯上界緯上界緯度上界緯下界緯上界緯十度十十度十十度十十度十十度十十度十十度十十度十分分分分分分分分一八一二一三二六一七二二九五二三二三一一三二五二四一四一三三二六二二六四二一七三二九二八七二三三二丑宮經河中南河中南河中北河中北度下界緯上界緯下界緯上界緯丑宮經河中南河中南河中北河中北十度十度下界緯上界緯下界緯上界緯分十度十十度十十度十十度十分分分分十度十十度十十度十十度十十度十分分分分分一一二三三三四三二一三二二六二三七三四一七二九三九三四一七三三四三六三一一九二三一四三八六四二三三三二四四五五一九三二五三三五四六五一二一二二六四三六四七二一四一五二二九一三七四八一六一九三一三九四九一八二二三四四三五二二三三三六四二五一二二二四四三七二四四五二二四二五四三九四四二五三二六二七三四四五三五三三二八二八四四五四七五四五子宮初三四二三四九五五三度子宮二三一五四三二五五七子宮四三三四四三五一二五九度度子宮六三四五四五二五二三六子宮八三六三四七五三二六一二度度子宮經河中南河中南河中北河中北子宮經河中南河中南河中北河中北度下界緯上界緯下界緯上界緯度下界緯上界緯下界緯上界緯十度十十度十十度十十度十十度十十度十十度十十度十十度十十度十分分分分分分分分分分一三九四八四五四四六二一一二四一四八三五五六三一一四四二四四九二五五二六三四一六四三二五一五五二六四一八四四四五四五五三六四五二四五五一五六三六五一二二四五五五一三五八六六二四四六四五二三五八五六六一二六四七一五二三六三六六四二八四七五五三六一二六七亥宮經河中南河中南河中北河中北亥宮經河中南河中南河中北河中北度下界緯上界緯下界緯上界緯度下界緯上界緯下界緯上界緯十度十十度十十度十十度十十度十十度十十度十十度十十度十十度十分分分分分分分分分分四八三五三三六二六七二四九二五四四六一五六六二四四九三五五六二六七六五三五五二六一五六七八五一五五三六一三六七一一五一三五七一六一六七三亥宮經南界緯北界緯亥宮經南界緯北界緯度度度度度度十度十十度十十度十十度十十度十十度十分分分分分分一二五一五六七三一四五二六七三一六五二二六七四一八五二三六八二五二四六七五二二五三六七三二四五二五六七二二六五三六七二亥宮經南界緯北界緯度度度十度十十度十十度十分分分二八五三一六七二黃道南康熙壬子年測定申宮經南界緯申宮經南界緯度度度度十度十十度十十度十十度十分分分分二二二六一二四九三二六一五二八二三未宮經北界緯南界緯度度度未宮經北界緯南界緯十度十十度十十度十度度界分分分十度十十度十十度十二五一分分分二三二二七四六三二八三六九四三一八一二五三三三一一七二三五一一二二二三七一一四二四三九三一六二六二四一一一八二八四三二三四四一二二三一一四六二四三二四四八二六三四五二二八三五二五二五午宮經北界緯南界緯午宮經北界緯南界緯度度度度度度十度十十度十十度十十度十十度十十度十分分分分分分三七五八二三八一六四三九六一六四六二八四一六二二一四三六三一一二四四一六四一一四四六六五一六四七三六六一一八四九六七二五四六八二二五一三六八三二四五二一六九二六五二五六九二二八五三七一巳宮經北界緯南界緯度度度巳宮經北界緯南界緯十度十十度十十度