body:
  text: 清史稿卷三十六志十一天文十一五星合聚天官書言同舍為合於兩星三星四星五星之合各有占而以五星合為最吉謂經度之同如合朔也茲就三星以上同宮同宿及兩星以上同度者著于篇順治元年正月庚戌土木金聚於降婁兩旬餘丙辰土金同躔壁三度三月乙巳土水同躔壁八度二年二月乙亥金水同躔危一度三月庚子土金水聚於降婁旬餘己酉土水同躔奎七度四月壬戌土金同躔奎九度癸酉木水同躔畢五度閏六月己酉火金水聚於鶉尾七月庚申聚於翼丁卯聚於壽星兩旬壬申聚於軫八月癸未聚於角丁酉聚於亢戊戌聚於大火三年三月庚戌土金水聚於大梁旬餘壬子土水同躔婁七度四月丁酉土火金聚於大梁月餘五月癸丑聚於胃旬餘六月甲申木水同躔井十九度七月乙丑木火金聚於鶉首聚於井丙寅木金同躔井二十八度四年二月庚子木火同躔井二十八度三月丁未土金水聚於大梁兩旬丙辰聚於胃金水同躔胃二度戊午土水同躔胃六度庚申土金同躔胃七度六月乙未木水同躔柳十度七月庚申火金同躔軫五度八月己巳火金水聚於壽星十月戊子聚於析木旬有九日癸巳聚於尾五年四月甲午火金水聚於大梁旬餘聚於婁閏四月乙巳聚於胃丙午火金同躔胃二度丙辰土水同躔畢四度五月丁卯土火金水聚於實沈土金同躔畢五度七月甲戌木金水聚於鶉尾兩旬餘聚於張浹旬六年三月丙寅土金同躔畢八度五月庚申土水同躔觜一度六月辛卯木火同躔翼十三度九月戊午木水同躔軫十二度七年三月壬申火金水聚於降婁四月辛卯聚於大梁五月丁巳聚於實沈癸亥土水同躔井初度乙丑土金水聚於鶉首旬餘乙亥聚於井旬餘六月庚戌土火水聚於井旬餘辛亥聚於鶉首旬餘七月癸丑土火同躔井七度九月辛未木水同躔氐三度八年正月甲子金水同躔危二度四月辛未土水同躔井十四度六月甲寅土金水聚於鶉首旬餘乙卯聚於井旬餘癸酉土金同躔井二十二度八月乙卯木火同躔心二度十月戊辰木金水聚於析木旬餘壬申木金同躔尾十度十一月乙亥朔木金水聚於尾癸卯火金水聚於元枵十二月丁卯聚於危九年正月己亥火金同躔壁五度四月癸亥土金水聚於鶉首聚於井旬餘庚午土金同躔井二十六度六月丁卯土水同躔鬼二度七月丁丑土火水聚於鶉火丁亥土火同躔柳初度十年正月壬午木水同躔牛二度壬辰木金水聚於牛癸巳聚於元枵兩旬餘六月癸亥土金水聚於鶉火旬餘閏六月丙寅聚於柳辛未土水同躔柳九度壬申土金同躔柳九度十月丙戌木火金聚於元枵十一月庚子木金同躔女十度十一年正月己酉木水同躔危四度二月辛巳火金水聚於大梁旬餘己丑聚於胃六月庚午土火水聚於鶉火乙亥土水同躔星四度八月壬戌土火同躔張二度癸酉土火金水聚於鶉尾旬餘丁丑土金同躔張三度乙亥土火金水聚於張九月辛卯火金同躔翼二度十二年正月乙巳木金水聚於娵訾乙卯聚於室浹旬二月甲子木金同躔室十四度乙丑木金水聚於降婁兩旬戊辰聚於壁六月癸酉土金同躔張七度丙子土金水聚於鶉尾旬餘丁丑聚於張八月乙亥土水同躔張十四度十三年七月癸亥土火金水聚於鶉尾旬餘八月丙子朔土金同躔翼七度壬辰土火同躔翼九度十四年二月庚子木金同躔畢一度六月癸巳木金水聚於鶉首丙申聚於井十月己卯土金同躔軫八度十五年四月丁丑木火同躔井八度五月乙巳木火金水聚於鶉首丁未聚於井七月己亥木水同躔井二十五度己未火金水聚於鶉尾旬餘八月乙亥土金水聚於壽星浹旬丙戌土火水聚於壽星浹旬九月己未如之庚申聚於角旬餘辛酉土火同躔角三度十六年二月甲戌金水同躔女八度丁丑火金水聚於元枵九月辛巳土金水聚於大火兩旬十七年六月癸巳木火金聚於張旬餘戊戌木金同躔張十一度癸丑木火金水聚於鶉尾兩旬木火水聚於張七月乙卯木火同躔張十四度癸亥木水同躔張十六度壬申木火金水聚於翼旬餘九月己卯土火水聚於大火旬餘十月乙酉土火同躔氐四度丙戌土火水聚於氐浹旬十一月丙子土金同躔氐十六度十二月庚戌火金水聚於星紀旬餘十八年正月甲寅聚於斗庚申火水同躔斗十九度乙亥火金水聚於元枵六月己卯金水同躔井二度閏七月乙巳木金同躔軫十二度八月壬申土金同躔氐十二度九月丁丑朔土金水聚於大火康熙元年三月己亥金水同躔奎八度九月甲戌木火水聚於大火旬餘庚辰聚於氐旬餘辛巳木火同躔氐八度乙酉木水同躔氐九度戊子火水同躔氐十三度十月丙午土火同躔心三度十一月辛未朔五星聚於析木土金水聚於心乙亥土金同躔心六度乙酉土水同躔尾初度十二月庚子朔火金水聚於星紀旬餘甲辰聚於斗戊申聚於牛甲寅火金同躔斗二十二度戊午火金水聚於元枵旬餘二年二月辛亥金水同躔壁五度戊辰火水同躔室七度九月丙戌土木同躔尾三度甲午土木金水聚於析木旬餘十月乙未朔土木金聚於尾旬餘十一月癸巳土水同躔尾十度十二月戊戌木水同躔箕三度三年正月壬午木金同躔斗三度六月丙辰金水同躔井十度八月甲申火金水聚於大火九月戊申土火金聚於析木兩旬十月乙丑土火同躔箕一度庚午土火金聚於箕壬申木火金聚於星紀兩旬餘丁丑聚於斗兩旬十一月庚寅木金同躔斗十六度丁酉土木火水聚於星紀浹旬己亥木火水聚於斗木火同躔斗十八度壬子火金水聚於元枵丁巳火水同躔女一度十二月丁卯木火水聚於元枵四年六月丁卯火金水聚於鶉首己巳聚於井七月癸丑火金同躔井二十八度五年二月己未木金水聚於娵訾聚於危乙丑木水同躔