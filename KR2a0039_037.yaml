  text: 清史稿卷三十七志十二天文十二日食月五星凌犯掩距太白晝見日變月變日食三統四分皆有推月食術而無推日食術由日食或見或否或淺或深隨地而變不詳其數立術綦難故自古以為尤異每食史冊必書後人推日食之術密矣猶必書者從其朔也其見於本紀無食分及所次宿備以入志言推步者考焉順治元年八月丙辰朔午時日食二分太次於張五年五月乙丑朔卯時日食九分強次於觜觿七年十月辛巳朔巳時日食七分太次於亢十四年五月癸卯朔寅時日食六分半強次於觜觿十五年五月丁酉朔辰時日食四分少次於畢康熙三年十二月戊午朔申時日食九分弱次於南斗五年六月庚戌朔申時日食九分太強次於東井八年四月癸亥朔未時日食五分半次於胃十年八月己卯朔申時日食二分次於翼二十年八月辛巳朔辰時日食三分太強次於翼二十四年十一月丁巳朔申時日食二分少強次於心二十七年四月癸卯朔辰時日食九分太強次於胃二十九年八月己未朔卯時日食二分太次於翼三十年二月丁巳朔午時日食三分少強次於危三十一年正月辛亥朔午時日食五分少強次於危三十四年十一月己未朔申時日食八分半強次於尾三十六年閏三月辛巳朔辰時日食既次於婁四十三年十一月丁酉朔午時日食四分半強次於心四十五年四月戊子朔酉時日食六分半弱次於胃四十七年八月甲辰朔申時日食五分少強次於翼四十八年八月己亥朔卯時日食五分弱次於翼五十一年六月癸丑朔寅時日食五分太弱次於東井五十四年四月丙寅朔酉時日食六分少弱次於胃五十八年正月甲戌朔申時日食七分次於危五十九年七月丙寅朔巳時日食七分次於柳六十年閏六月庚申朔酉時日食四分次於東井雍正八年六月戊戌朔巳時日食九分次於東井九年十二月庚寅朔卯時日食八分太次於南斗十三年九月丁酉朔辰時日食八分少強次於角乾隆七年五月己未朔辰時日食七分強次於畢十年三月癸酉朔巳時日食一分少弱次於東壁十一年三月丁卯朔午時日食七分弱次於營室十二年七月己丑朔申時日食二分少強次於柳十六年五月丁酉朔辰時日食四分太弱次於昴二十三年十二月癸丑朔申時日食八分太強次於南斗二十五年五月甲辰朔酉時日食九分太弱次於參二十七年九月庚申朔酉時日食五分太弱次於角二十八年九月乙卯朔辰時日食七分次於軫三十四年五月壬午朔酉時日食三分半強次於畢三十五年五月丁丑朔辰時日食四分弱次於昴三十八年三月庚寅朔未時日食四分少弱次於營室三十九年八月壬午朔辰時日食三分太強次於張四十年八月丙子朔午時日食四分半強次於七星十二月甲辰朔巳時日食一分太強次於南斗四十九年七月甲寅朔卯時日食二分弱次於柳五十年七月戊申朔辰時日食四分少強次於柳五十一年正月丙午朔巳時日食七分少弱次於婺女五十三年五月壬戌朔酉時日食三分半弱次於畢五十四年十月癸丑朔巳時日食五分太弱次於氐六十年正月甲申朔卯時日食九分弱次於南斗月五星凌犯掩距天官書言相凌為鬬又云七寸以內必之謂緯度相迫如交食也今法兩星相距三分以內為凌月與星相距十七分以內為凌俱以相距一度以內為犯相襲為掩欽天監每年預推月五星入此限者繕冊進呈本名凌犯書雍正初年改名相距書既憑占候即課推步各循本稱幷志所在之宿順治元年七月庚寅熒惑犯歲星於昴三年十一月辛酉月犯歲星於柳四年二月壬午掩歲星於觜六年六月癸巳熒惑犯歲星於翼七年五月甲子月犯歲星於亢十年十月庚午熒惑犯歲星於女十一月己亥太白犯歲星於女十二月甲申熒惑犯歲星於壁十七年五月壬申熒惑犯太白於柳十月甲午太白犯歲星於軫康熙四年六月丁卯月犯填星於箕八年十二月丁卯太白犯填星於虛十二年三月甲戌月犯太白於壁十三年六月戊申熒惑犯填星於奎十八年五月己未月犯歲星於婁二十一年八月丙申熒惑犯填星於柳九月己巳歲星掩填星於柳三十年六月戊寅熒惑犯歲星於婁三十一年五月丁卯太白犯熒惑於星三十三年十一月癸未犯填星於斗三十八年十二月丁丑犯填星於危四十年二月庚申犯歲星於虛五十五年十月戊戌犯填星於軫五十七年九月丙申辰星犯填星於亢雍正二年十二月丙申太白距填星於斗三年二月壬申距歲星於危九年十月癸丑熒惑距歲星於翼十二年正月甲申距歲星於心乾隆元年三月乙巳距歲星於女壬戌月距太白於奎五月己亥太白距填星於昴八月戊辰辰星距太白於翼十二月乙丑太白距歲星於女丁亥辰星距歲星於虛二年正月癸巳月距太白於室二月乙酉辰星距歲星於危五月己丑距太白於觜八月癸亥距熒惑於張閏九月乙丑月距歲星於危十月癸巳如之三年二月壬辰太白距歲星於壁辛丑辰星距歲星於壁三月乙卯距太白於婁四月乙未太白距辰星於觜五月丙寅熒惑距歲星於奎丁丑辰星距填星於井七月壬子月距辰星於張四年五月庚申太白距歲星於胃六月壬午辰星距填星於井七月乙巳朔太白距填星於井丁未月距辰星於虛壬戌辰星距熒惑於翼十月癸未太白距熒惑於氐乙酉辰星距熒惑於氐癸巳月距填星於井丙戌辰星距太白於氐十一月庚申月距填星於井十二月戊子五年正月乙卯四月丁丑如之五月丙寅辰星距歲星於觜六月壬申月距填星於井閏六月甲子距歲星於井七月壬辰距熒惑於井八月壬寅熒惑距歲星於井庚申月掩歲星於井距熒惑於井九月戊子復距十月甲寅距歲星於井丙辰距熒惑於鬼十一月辛巳距歲星於井甲午距太白