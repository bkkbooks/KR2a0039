  text: 清史稿卷三十八志十三天文十三虹霓暈珥虹霓異色者天聰八年三月丁亥朔天霽無雲色緑崇德六年九月己亥陰氣蔽日色白自巽至乾是晚天霽色黑自艮兌形如煙康熙十六年八月庚申東北三十六年六月丁巳東南四十六年二月癸卯五十二年八月丙戌五十五年七月癸酉俱東北俱色白乾隆三十八年八月丁未東方二道己酉西南戊辰東方二道三十一年三月庚寅東方五月丁亥東北辛卯東北至東南甲午西方戊戌東北六月庚子東南壬寅東北癸亥東方乙丑東北丙寅東南又東方二道七月辛未東南戊子東北八月己酉西北三十六年四月辛巳東北至東南二道五月甲辰東南至東北二道丁未庚申俱東北至東南壬戌乙丑俱東北至東南二道六月庚午朔東北辛未東南至東北丙子東北乙酉東南二道戊戌七月辛丑俱東南至東北甲辰東北至東南二道己酉東北四十一年四月丙寅東北至東南二道丁卯東南五月戊子西北至東南丙申西北丁酉東北六月乙巳東南丙辰東北丁巳東南二道七月辛未壬申丁丑俱東北甲申東南庚寅東北八月壬寅四十六年三月丙申俱東方四月癸丑東南至東北二道五月癸未東北乙酉東北至東南二道己亥閏五月丙午俱東北己酉酉戌二時俱東南至東北二道丙辰西方庚申東北至東南二道壬戌東方二道甲子東北至東南丙寅丁卯申酉二時俱東南戊庚己巳俱東北庚午東南六月己亥東方二道庚寅東方癸巳東南至東北七月丁未東方二道辛亥東南二道丙辰東南壬戌卯未二時西方申酉二時東北二道乙丑丙寅八月辛未朔俱東北五十一年五月壬戌東方戊辰東南六月丁丑東南至東北二道戊寅酉時東南二道戌時東方庚辰庚寅壬辰俱東南癸巳西南七月甲辰東南閏七月丙戌東北己丑東方五十六年五月丙申東南二道壬寅東南六月癸丑西南乙卯丙辰俱東南戊午東南二道庚申東南丙寅壬申俱東南二道八月壬子西方二道戊午東方二道俱五色虹霓多道者康熙六年五月壬子申時正東四道酉時東北乾隆元年五月甲午朔八月乙丑二年四月乙酉七月辛丑俱東方壬寅東南壬子西北至西南三年六月庚寅東南五年五月丙辰東方六月癸巳閏六月丙午俱東南六年三月丙戌東北至東南四月戊午東南己未東北至東南俱二道六月甲午朔東北至東南四道乙未壬寅七年五月丁亥俱東南二道八年閏四月丁巳東南至東北四道五月甲申六月庚戌七月癸未九年五月丁酉六月癸丑七月甲午十年五月庚子六月丙寅七月乙亥丙子十一年四月庚寅七月癸丑俱東南己未東方十二年五月庚戌丁巳俱東南六月己巳東方庚午西北俱二道八月丙寅東南至東北四道辛未東方十三年六月丁丑東南十四年六月甲午西南壬寅東南七月丙辰東北八月庚辰東方九月辛亥東北十五年六月甲戌乙亥乙酉十六年四月甲申六月壬寅庚申十七年六月己亥俱東南八月庚戌未時東北酉時十八年四月乙未俱東方十九年五月戊子東南丙午東方六月丙辰東南二十年四月辛未東方六月乙巳東北辛未二十一年五月乙亥俱東南七月甲午西方二十二年四月己丑二十三年六月癸未俱東南二十四年六月辛未西南至西北二十五年五月甲子丁卯戊辰俱東北至東南六月壬午東南甲申二十六年六月丙子俱東方七月甲寅東南八月甲戌東南至東北庚辰二十七年四月壬午俱東南丁亥西方五月丁酉閏五月庚寅六月甲辰俱東南戊午西南至西北庚申東北至東南八月庚子東南至東北二十八年五月辛未六月己亥俱東南七月戊寅東方二十九年五月甲戌乙亥俱東南六月壬寅癸卯七月己卯俱東方三十年四月辛酉東南五月丁酉東方三十一年六月己亥朔三十二年五月壬辰俱東南六月己未東方七月丁卯己巳俱東北己卯東南三十三年六月辛未東方壬申東北至東南三十四年六月庚申西南至西北己巳東北至東南三十五年閏五月癸丑東北六月丙子東北至東南己丑東南至東北庚寅東北至東南壬辰七月庚午三十七年五月辛亥俱東南至東北壬子東北至東南六月庚午東南至東北乙酉七月癸卯俱東北至東南九月辛酉東北至東南三十九年六月辛卯東南四十年五月己未東北至東南六月乙酉東南七月壬午東方俱二道四十二年八月丁未東南至東北四道四十三年七月壬辰東北至東南四十四年三月庚子東方五月甲申朔東南庚子東方乙巳東南六月甲寅東方七月甲申東南四十五年五月辛丑東北至東南七月丁丑西北庚子東方八月壬子申時東北酉時己巳四十七年五月庚申俱東方六月乙亥東南至東北壬辰東南五十年五月丁卯七月丁丑俱東方五十二年六月戊申東南七月戊子東方壬辰東南至東北癸巳東南八月丁未西南至西北五十三年四月庚申五月己巳俱東南五十四年閏五月辛丑西南六月戊午壬戌俱東南五十五年五月庚子五十六年三月庚子俱東北俱二道五十八年六月癸亥東南至東北四道癸酉七月癸卯俱東北至東南五十九年六月戊辰東北至東南七月甲辰東南俱二道日生暈者順治元年九月癸巳二年三月戊戌三年三月丙子四年三月甲辰辛酉五年閏四月壬子六年正月壬申四月丙午八月丁未八年閏二月乙丑丁丑四月戊辰七月丁亥九年正月壬午二月庚午十年三月癸未四月己未五月甲午兼兩珥六月乙卯閏六月甲子庚辰辛卯七月己亥癸卯十一年二月壬午三月丁丑庚辰己丑五月癸卯七月丙午十二年正月乙未二月戊午乙丑癸未三月丁亥乙未四月癸亥庚午丙子十月戊午十三年二月丙辰兼兩珥四月甲戌五月甲申戊戌十月甲午十五年三月癸亥四月癸未十