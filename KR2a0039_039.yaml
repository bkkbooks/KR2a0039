body:
  text: 清史稿卷三十九志十四天文十四客星流隕雲氣客星太祖丁未年九月丙申彗星見東方天命三年十月丙寅彗星見東方尾長五丈每夜漸移向北斗十九日而沒順治九年十一月庚寅異星蒼白氣見於參西北行入畢康熙三年十月己未朔有星茀於軫見東方丁卯尾長七八寸蒼色指西南丁亥尾長三尺餘指西北逆行至翼十一月戊戌尾長五尺餘指北方至張庚子至井癸卯往西北行至昴乙巳尾指東北至胃庚戌至婁尾指東青色十二月壬戌至奎體小尾長二尺餘四年二月己巳東南方有異星見於女甲戌尾長七寸指西南蒼白色丁丑尾長尺餘往東北順行至虛辛巳至室體漸大尾長八尺餘乙酉至壁尾長五尺餘七年正月甲子西南白光長六尺餘尾指東南占曰天槍二月乙亥漸長至四丈餘尾掃天苑九斿軍井丁亥沒十二年二月癸巳異星見於婁大如核桃色白尾長尺餘指東方甲午仍見十五年正月戊子異星見於天苑東北色白十六年三月癸卯東北方有異星見於婁體色光明潤澤尾長尺餘指西南占曰含譽十九年十月戊子彗星見右執法色白尾長尺餘指西方東行甚速壬寅近太陽不見十一月丙辰朔尾跡夕見西方壬戌見星體色蒼白尾長六丈餘寬二尺餘指東北二十一年七月己巳彗星見北河之北色白尾長二尺餘指西南往東北行甚速壬申入午宮尾長六尺餘二十二年閏六月庚戌異星見於五車北八穀東色白往西南逆行戊辰入五車二十三年五月甲申異星見太微垣東屬軫色白明大往東北順行乙酉行四度餘至右攝提下二十五年七月庚寅異星見東方近地平色白東行不急丁酉凡行十六度至柳微有尾跡壬寅至星漸沒二十七年十月己酉異星見奎色白凡三夜二十九年八月己酉異星見箕色黃凡二夜雍正元年九月己丑異星見弧矢下色白體微芒長尺餘指西北逆行至井乾隆二年六月丁卯異星出右更東色白屬婁向西南行丙子仍見七年正月丁亥異星見東南方戊子出地二十七度餘大如彈丸色黃尾長四尺餘指西南屬丑宮在天市垣徐星外逆行四旬餘不見八年十一月己亥彗星見奎壁之間大如彈丸色黃白尾長尺餘向東指屬戌宮逆行至九年正月辛卯凡五十三日行二十九度餘十三年三月癸丑異星見東方大如榛子色黃尾長二尺餘向西南指在離宮第三星南順行至四月甲寅朔行三度尾長尺餘體小光微壬戌至螣蛇乙丑至王良丙寅不見十四年五月甲寅瑞星見東方大如雞卵形長圓色黃白光瑩潤澤行不急出天津入芻藁占曰含譽二十四年三月壬辰彗星見東南方甲午出虛第一星下大如榛子色蒼白尾長尺餘指西南順行癸卯體小光微尾餘三四寸戊申全消四月戊辰彗星見西南方在張第二星上己巳離張六度大如榛子色蒼黃尾光散漫長二尺餘指東南順行壬申形跡微小丁丑更微己卯漸散五月壬午全消十一月戊辰異星見東南方在井第四星下大如榛子色蒼黃向西北行癸酉行四度在胃微有尾跡十二月丁丑朔全消三十四年七月甲辰彗星見東南方在昴下丁未大如彈丸色蒼白尾長三尺指西南順行甚速八月丁卯與太陽同宮不見十月辛亥見西方在列肆第二星下體勢微小尾長一尺丙子全消三十五年閏五月己酉異星見東南方在天辨第一星西大如彈丸色蒼黃癸丑向北行三十二度乙丑不見十一月乙丑彗星見東南方長尺餘丙寅在柳第二星下戊辰色蒼白尾指東南每日向西北行十餘度庚午微暗辛未全消流隕隕星如斗者太祖戊子年九月辛亥朔夜時征王甲城士馬皆驚流星如盆者乾隆十四年九月壬申出婁宿色赤入天苑有光有尾跡流星如碗者順治四年十一月庚辰自天中西北行入蜀有聲色赤光燭地雞犬皆驚五年九月辛巳如之聲如雷十五年六月辛未自西北至東南有聲色赤不著光尾跡流星如盞者順治四年五月戊午寅時自西北至西南色青白有光七年八月甲午自東南至東北色赤黃入斗不著光尾跡八年四月己酉自氐宿南行色青白五月戊寅自亢宿西南行色白衆小星隨之入翼九年三月丙子自中天西南行色赤入畢俱有光有尾跡九月丙申自中天入紫微垣色赤十年八月丙寅自中天入天市垣色青赤俱有光十二年四月甲子自亢宿入危色赤黃有光有尾跡癸酉出房宿色青黃入尾十六年七月甲申出牛宿東北行色赤黃至蜀沒俱不著光跡康熙二年八月丁巳自虛宿入紫微垣小星隨之三年九月戊申自中天入奎俱色赤六年正月戊寅出鬼宿色青隨後有聲入土司空七年二月戊子出大角色赤黃入箕十二年九月甲午出勾陳色青白至蜀沒俱有光有尾跡十六年九月己亥酉時自正北下行色赤白尾跡如蛇有光十九年六月癸酉酉時自西南向東北聲如雷尾跡如匹布二十五年十一月壬午出左樞色白至蜀沒尾長竟天十二月戊寅出軫宿色青黃入騎官二十九年二月丁亥出河鼓色黃入尾乾隆十九年正月丁巳一更出奎宿西北行二十二年三月戊申一更出西北方下行俱色青二十四年閏六月甲申五更出土司空下行三十五年九月戊辰三更出室宿西北行俱色赤俱入雲三十六年二月己丑昏出上弼下行色黃不著入三十九年十月丙戌二更出天廩西行四十年九月丁未一更出壘壁陳西下行四十一年三月丁丑昏出翼宿西南行十月丁卯曉出平道下行俱色赤十二月癸丑出天苑下行四十二年八月壬戌一更出右旗西行俱色白五十四年十二月己卯昏出參宿下行五十五年九月壬寅一更出五車西行五十六年三月庚寅五更出天津下行五十七年五月丙辰一更出天棓東北行五十八年九月己亥五更出婁宿西南行五十九年十月丙寅曉出張宿下行六十年閏二月戊戌三更出大角西北行俱