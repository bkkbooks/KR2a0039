body:
  text: 清史稿卷四十志十五災異一傳曰天有三辰地有五行五行之沴地氣為之也水不潤下火不炎上木不曲直金不從革土爰稼穡稼穡不熟是之謂失其性五行之性本乎地人附於地人之五事又應於地之五行其洪範最初之義乎明史五行志著其祥異而削事應之附會其言誠韙矣今準明史之例並折衷古義以補前史之闕焉洪範曰水曰潤下水不潤下則為咎徵凡恆寒恆陰雪霜冰雹魚孽蝗蝻豕禍龍蛇之孽馬異人痾疾疫鼓妖隕石水潦水變黑眚黑祥皆屬之於水順治九年冬武清大雪人民凍餒遵化州大雪人畜多凍死十年冬保安大雪帀月人有凍死者西寧大雪四十餘日人多凍死十一年冬灤河大雪凍死人畜無算十三年冬武強大雪四十日凍死者相繼於塗昌黎灤州大雪五十餘日人有陷雪死者康熙三年三月晉州驟寒人有凍死者萊陽雨奇寒花木多凍死十二月朔玉田邢台大寒人有凍死者解州芮城大寒益都壽光昌樂安丘諸城大寒人多凍死大冶大雪四十餘日民多凍餒萊州奇寒樹凍折殆盡石埭大雪連緜深積數尺至次年正月方消南陵大雪深數尺民多凍餒茌平大雪株木凍折十一年三月文水大雪嚴寒人多凍死冬昌化大雪平地深三尺十五年十一月咸陽大雪深數尺樹裂井凍十六年九月臨淄大雪深數尺樹木凍死武鄉大雨雪禾稼凍死沙河大雪平地深三尺凍折樹木無算二十二年十一月巫山大雪樹多凍死太湖大雪嚴寒人有凍死者二十四年四月定陶烈風寒雨人有凍死者二十七年郝昌大雪寒異常江水凍合二十八年冬衢州大雪寒異常二十九年十一月高淳大雪樹多凍死武進大寒木枝凍死十二月廬江大寒竹木多凍死當塗大雪橘橙凍死阜陽大雪江河凍舟楫不通三月始消宜都大雪囗樹飛鳥墜地死竹谿大雪平地四五尺河水凍三水大雪樹俱枯海陽大寒凍斃人畜揭陽大雪殺樹澄海大雨雪牛馬凍斃三十年冬房縣酷寒人多凍死四十二年春房縣雨雪大寒五十五年冬高淳大雪盈丈五十七年七月通州大雪盈丈十二月太湖潛山大雪深數尺五十八年正月嘉定嚴寒太湖潛山大雪四十餘日大寒雍正五年冬屯留大雪嚴寒井凍乾隆五年正月嵊縣大雨雪奇寒福山大寒九年正月曲沃大寒井中有冰十三年十二月上海大寒雨雪十六年三月武強大雪平地深尺許人畜多凍死二十二年正月豐順雨雪大寒人畜凍斃二十四年冬永年大寒二十六年冬福山大寒樹多凍死文登榮成大雪寒甚婁縣大寒河冰塞路臨朐大寒井水凍餘姚大寒江水皆冰五十七年六月房縣大寒如冬五十九年七月湖州寒如冬嘉慶元年正月青浦雨雪大寒傷果植灤州大寒井凍花木多萎永嘉大風寒甚冰凍不解湖州大雪苦寒殺麥義烏奇寒如冬桐鄉大風雪寒十二月金華大雪麥幾凍死三年五月初五日青浦大寒廚竈皆冰十年十二月棗陽大雪結寒冰厚五尺十九年秋招遠黃縣大寒海凍百餘里兩月始解二十四年十二月南樂大雪平地深數尺人畜多凍死道光十一年冬元氏南樂大雪井凍冰深四五尺十一年十二月朔撫寧大雪平地深三尺飛鳥多凍死二十一年正月登州府各屬大雪深數尺人畜多凍死冬高淳大雪深五尺人畜多凍死黃川大雪深數尺經兩月始消民多凍餒羅田大雪深丈餘民多凍餒咸豐八年七月大通大雪厚二尺壓折樹枝穀皆凍秕不收九年六月青浦夜雪大寒黃巖奇寒如冬有衣裘者十一年十二月臨江府及貴溪大寒樹多凍折蒲圻大雪平地深五六尺凍斃人畜甚多河水皆冰同治元年六月崇陽大寒冬咸寧冰凍奇寒四年正月十四日三原大風雪人多凍死棗陽雨雪連旬樹多凍死十六日鍾祥鄖陽大雪漢水冰樹木牲畜多凍死十二年十一月三原大雪六十餘日樹多凍死光緒二年五月遂昌奇寒人皆重棉順治四年三月獻縣肅寧昏霧四晝晦十四年十月二十八日東陽大霧竟日不散十五年正月朔潛江大霧晝晦康熙元年三月初八日臨榆昏霧竟日十六年清河陰霧四十餘日二十年三月桐鄉恆陰二十二年三月蕭縣重霧傷麥三十年正月江浦大霧蔽天四十三年八月慶雲昏霧障天六十一年六月濰縣濃霧如煙雍正二年十二月十五日掖縣大霧乾隆元年十一月二十一日海陽大霧二十六年八月初四日獨山州宿霧冥濛近午始霽三十三年二月十六日梧州大霧嘉慶元年三月二十六日宜城昏霧晝晦四年十二月朔蓬萊大霧竟日氣如硫磺十五年正月榮成大霧道光六年五月肅州大霧二十九年正月雲夢晝晦六閱月天氣陰霾三十年正月朔登州陰霧咸豐元年十二月除夕泰安通渭大霧二年正月二十四日陵川大霧晝晦同治元年正月庚寅青浦大霧著草如棉日午始散二年正月二十四日陵縣大霧晝晦三月十六日涇州大霧通渭泰安大霧至四日乃止六年二月日照大霧光緒十一年邢台大霧順治元年四月棲霞隕霜殺麥二年八月垣曲隕霜六年四月莊浪隕霜殺麥七年四月靈台隕霜殺麥十五年四月東昌隕霜殺麥六月高唐隕霜十六年三月榮河隕霜殺麥十七年春穀雨後岳陽霜屢降萬全隕霜殺麥康熙二年四月二十三日高苑隕霜殺麥六月雒南商南隕霜三次三年四月二十一日夜清河風霜幷作二十三日新城鄒平陽信長清章丘德平隕霜殺麥二十四日益都博興高苑寧津東昌慶雲雞澤隕霜殺麥十一年四月樂安隕霜殺麥五月通州隕霜殺麥七月岢嵐州吉州隕霜殺禾十二年正月四日壽光隕霜殺麥十四年四月平度掖縣萊陽昌樂安丘館陶濱州蒲台隕霜殺麥五月冠縣隕霜殺麥十五年四月武強隕霜殺麥十七年春碭山潁上銅山隕霜殺麥十八年三月無極隕霜殺麥十九年四月榆社隕霜殺菽六月沂州隕霜八月高州大