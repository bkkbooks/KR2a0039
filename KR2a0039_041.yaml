body:
  text: 清史稿卷四十一志十六災異二洪範曰火曰炎上火不炎上則為咎徵凡恆燠草異羽蟲之孼羊禍其災火赤眚赤祥皆屬之於火順治十三年冬莊浪燠無雪十八年冬龍門無雪康熙二十一年冬西寧無雪二十七年冬天鎮無雪三十五年冬臨縣無雪四十一年冬平原燠如夏四十二年冬咸陽燠無雪五十九年冬浮山無雪乾隆四年冬彭澤元昌燠如夏人有衣單衣者四十九年冬菏澤無雪五十七年冬蘇州無冰雪嘉慶三年冬桐鄉燠十三年冬昌黎無雪十八年冬鄖縣無雪二十年二月湖州大燠咸豐十年冬皋蘭無雪同治元年冬黃縣大燠光緒元年冬望都撫寧無雪十四年冬皋蘭燠順治三年五月丘縣雨麥六月潮陽雨豆十一年六月商州一蒂兩瓜大如斗十二年二月渭南天雨粟平樂天雨蕎麥三月鳳陽安西天雨麥豌豆五月臨潼咸陽雨麥豌豆十四年二月婺源雨黍十五年冬昌化竹生實十八年十月高要竹生實康熙二年十月阜陽雨粟粒若蕎麥圓小而堅味辛厚處盈寸三年七月婺源大鄣山竹生實形如麰民採而舂食之厥味甘二十一年三月溫州雨豆二十二年四月寧都天雨豆又雨黑黍二十六年二月合肥雨黑豆二十八年正月含山雨小豆四十一年二月湖南竹生實四十四年三月葭州雨黑豆四十五年春橫州竹生實六十年夏安化天雨蕎麥六十一年正月大埔竹結實十一月岑溪枯竹開花雍正五年五月鍾祥竹開花十月當塗雨紅綠豆形如小麥無蒂十年什邡縣雨蕎麥十一年二月山陽清河雨黑豆啖之味苦十二年三月宜昌竹結實民採食之十三年七月夷陵竹生實如麥民競採食之乾隆二年二月昌化雨豆六年十一月成縣竹生實十八年九月陽春竹皆結實枯死二十二年正月永嘉東山竹結實如麥二十三年池州雨豆二十六年安化雨蕎麥形似而小四十一年六月餘姚雨小麥黃豆嘉慶十二年春黃陂雨豆道光二年夏黃巖天雨菽四年十月黃梅雨豆麥穀米十六年十二月武寧雨豆二十年十一月鍾祥竹開花二十五年七月竹生米可食咸豐元年六月孝義廳山竹結實人採食青浦竹生花二年十一月太平雨豆四年二月隨州天雨豆四月黃岡雨黑豆食之味苦冬武昌縣雨黑豆五年正月初三日孝感天雨小豆二月又雨豆三月武昌天雨黑豆如槐實黃安雨豆夏黃州蘄水雨豆如槐實十一月黃岡天雨豆如槐實歸州竹結實人採食之六年八月隨州雨豆八年二月興國雨豆色赤秋興山竹結實九年春麻城民間番瓜成人形十年龍泉雨豆色赤十一年三月麻城雨豆十二月溪梁雨豆色赤同治元年八月西寧丹噶爾廳竹開紅花灤州瓜窳剖之有血食者立病三年正月永豐天雨豆五色斑爛三月景寧嵊縣雨豆五月京山縣雨豆其色黑光六年二月棲霞雨草子如蕎麥夏嵊縣雨豆七年藁城生豆如人面五官俱備九年十月遂昌雨穀外黑內紅德興雨豆內黑外白十一年三月即墨天雨紅豆蕎麥光緒二年四月青田雨豆九年三月咸寧雨紅麥十年八月孝義廳竹結實十一月洮州山竹開花結實順治十四年武昌鴉啣火集人廬輒災一月始息康熙十六年海豐有異鳥集林中三日高六七尺舒吭丈餘啄雞鳧以食居民奮擊之分啖其肉輒病死順治元年七月商州郊外見大羊色黃長丈餘百姓搏而殺之肉重五百斤四年五月山陰民家羊生羔三足前二後一五年杭州民家羊生羔三足康熙十二年北山民家產一羊一角一目隨斃二十四年順德羊生羔三足前一後二乾隆元年四月連州山羊入城蹄角甚巨人逐獲之五十五年雲夢見三足羊道光十七年八月武進民家產羊人首羊足墮地即斃咸豐十年八月江山西山白羊成羣不見同治三年寧州民家羊產一羔五角光緒九年九月孝義廳民家羊產羔人面羊身二十五年寧州民家羊產一羔兩首二十七年三月丹噶爾有一羊兩頭一羔三足三十三年寧州民家羊生羔人面順治元年七月西鄉文廟火六年正月初六日無為州城門大火八年七月嵐縣火焚民房十二年五月十八日梧州府城外大火十二月又大火十四年十月蘄水火十五年連州大火十八年五月宜昌大火延燒民舍千餘間八月嵊縣城中大火康熙元年五月黃岡大火焚民房十之八九秋荊州大火燒民房殆盡十月興國火起自大西門延燒城中至大東門男婦死者以千計二年二月初三日海陽西郊火起延燒民房千餘家七月十五日黃岡大火燒民舍殆盡三年四月梧州府城外大火焚八百餘家五月海陽大火六月含山鼓樓火四年正月京山火焚一百八十餘家十月懷遠大火自西城外至驛前延燒一百五十餘家十一月高州府城火合浦火焚民舍十二月廣州府城火五年正月海陽南北二廂火起延燒民房千餘間二月十三日鍾祥火燬數百家延及府署焚死人畜甚多二十八日城內外又燔數百家秋靈川北廂火起延燒民房殆盡十二月嚴州大火民房盡燬延燒城樓六年正月海陽城外四廂火起延燒民房千餘間死於火者二百餘人七年三月鄖陽府火民舍盡燬七月大冶西市火延燒百餘家八月宣化城內火焚千餘家次日城外又焚百餘家八年二月海陽西北二廂火焚民房數百間三月鄖縣火十月獨山州大火仙居黃巖二縣火九年平樂南關火延燒四十餘家是年十二月至次年四月火災凡四見十年五月錢塘大火七月大冶西市火九月初七日浦江太極宮大火十一年三月縉雲大火延燒縣署十二年九月宣縣西門外沙市被火災四次燬數百家十三年五月靜樂火燬民舍興國唐村火焚死二百三十七人十五年七月太平城內火燬民房過半十八年正月初三日望江吉水鎮火災燔百餘家六月順慶府治火十九年正月十五日平陽火燬民居過半三月初四日海陽火延燒百餘家死者四十餘人七月和平城外火延燒百餘家二十年二月東湖縣署火五月蒼梧東廊火八月濟寧州大堂火溫州火燎民舍五千餘間九月永嘉城中大火燎民舍千餘間十月思州府火延燒五十餘家二十一年春濟寧州城內東偏大火延及西隅民舍皆盡關壯繆侯祠亦燬獨神像香案無恙八月池州天火燬田禾芋苗葉盡生煙十月萬載火延燒城隍廟連山西郊火二十二年四月囗陽西門火二十三年七月長寧城隍廟火冬忠州石寶寨火二十五年四月萬載火延燒城隍廟六合南門火焚市廛數百間二十六年十月初一日平陽城樓火燔百餘家忠州石寶寨又火二十七年八月婺源火延燒五十餘家十二月合浦西橋火郡城火二十八年九月己卯蒼梧西關火十二月松陽火二十九年七月二十八日酆都城內大火民居盡燬三十年十月平樂火延燒二百餘家獨山州大火三十一年九月平陽城樓火三十二年夏鎮安府署火延燒民居數十間九月平陽東門外火燔數十家三十四年正月馬平南川河下火延燒大南門城樓三十五年七月江夏火起自火藥庫死者無算八月陽高南街火三十七年二月漢陽漢口鎮火延燒數千家四十年九月陽山火延燒二百餘家四十一年二月崖州火傷四人四十二年七月十六日桐鄉青鎮火燔民舍一百七十餘家四十三年正月二十九日夜灌陽火焚東門外民舍殆盡四十四年三月婺源太平坊火十一月武寧火四十五年四月竹溪火官署民房俱燼四十六年正月初四日荔浦火初囗又火巴縣太平門大火四十八年三月獨山州城內大火居民無得免者四十九年八月二十五日嘉定火延燒七十餘家五十年正月大埔白堠墟火燬民舍數百家五月萬載潭埠火市店民房蕩然無存五十二年十一月宣平火五十三年九月初八日宣化沙市火焚千餘家獨山州大火五十四年九月江陵火延燒二千餘家五十五年九月江陵又火延燒二十餘家死十一人思州府城大火延燒四十餘家五十六年五月初三日丹稜縣大火延燒數百家五十七年三月合肥城內大火延燒四十餘家八月初一日鍾祥城內火延燒城外民房數百間五十九年十月蒼梧西門外大火六十年四月十八日鹽山縣城火自學宮延燒東南北三門燬民居數千家六十一年二月無為州小西門內火延燒三十餘家七月獨山州東門火冬麗水縣火雍正二年正月沔陽仙桃鎮大火焚百餘家死者甚衆七月梧州梧城驛火十月城內火十一月戎墟火十二月初一日開化城內火延燒百餘家三年六月梓潼縣文昌廟火七月馬平小南門火延燒三百餘家四年十二月初四日平陽西門外火燔百餘家五年十二月北流民舍失火延燒縣署案牘皆盡六年正月十六日夜蒼梧火延燒民居一百七十餘間高州城東火十月崑山火焚朝陽門譙樓七年九月蒼梧戎墟火九年正月荊州大火十年五月初三日阜陽西城火延燒民舍四千六百十一間十一年七月初七日玉屏聞空中有呼救火聲越半月鼓樓街災燒民居數百家十三年冬婺源城隍廟災乾隆元年四月通州北郭火延燒百餘家十一月玉屏南門火二年二月十八日鎮安府城火燔數百家三月乙丑同官明倫堂大火五月沁州大街火九月北流典史署火延燒民舍三年十月初七日潮陽南門火四年正月十七日瑞安大火燔百餘家四月十八日鎮安城內火延燒八十餘家五年二月嵊縣火延燒二百餘家六年正月初六日梧州府南門外火延燒民房三百餘家七年二月十四夜饒平縣城火延燒大樓房三十餘間小屋無數八年十一月饒平縣又火十年二月庚午泰安縣署火延燒百餘家十一年六月海豐龍津橋火延燒蓬舖四十餘間十二年八月化州南街火九月豐順縣城火十一月初十日崖州東街火延燒七十餘家傷二人十五年四月泰安火十七年正月朔漢陽糧船火焚數十艘四月桐鄉南柵大火燬市廛三百餘家五月二十二日保昌孝悌街火延燒三十餘家十八年七月陸川大火燬民居十月梧州府城外大火傷二十餘人十九年八月蒼梧府城外又火二十年三月高州府城火五月又火二十二年十月宜昌東湖火燔民居無數二十三年三月初一日重慶太平門外大火四月獨山州大火二十四年十二月初八日惠來縣署火二十五年八月二十八日朝天千斯門內大火二十七年十月石門玉溪鎮火延燒百餘家二十八年十二月初五日慶元火延燒五十餘家二十九年五月沂水縣城南綢市街火延燒數百家十月婺源西關外居民失火延燒數百家三十年十月梧州府城外火三十一年十一月蒼梧戎墟大火三次共燒民房六百餘家三十三年正月二十八日梧州府城外火延燒三百餘家三十八年七月金華府署火四十二年十二月青田城大火四十四年十一月初四日桐鄉大火燔市廛四十餘家四十六年夏陸川城南失火延燒縣署四十七年六月寧波府城火燬鼓樓四十八年五月庚子慶元火延燒百餘家四十九年四月朔成都大火延燒官署民舍殆盡五十年夏潛江城外火五十二年三月江陵城隍廟火五十五年三月義烏縣署火五十六年十二月南昌火延燒千餘家嘉慶三年二月丙子京師乾清宮火九年七月初三日定海城中大火延燒二百餘家十三年五月十二夜濟南府西門大火延燒四百餘家十六年三月二十九日石門城西火十七年春齊東火燒死數百人十八年三月貴陽城大火二十年四月尚山火十二月二十日蘭州西門火藥局焚軒轅城樓民舍死者數十人二十二年八月黃陽火燒民舍一百餘家二十四年閏四月青田火延燒二百餘家五月青浦城火延燒七十餘家道光二年六月十一日大埔南門外火延燒兩晝夜九年七月十三日江山江郎山火延燒兩晝夜十年八月鉛山石塘火延燒五百餘家次年又火十六年十二月十九日雲和火燬民舍八十餘家十九年正月初二日貴陽府道德橋火延及貢院頭門三月二十日貴陽府學大成殿災江陵沙市大火燔數百家四月定海道頭港營船火二十二年十月初三日麗水火燔一百四十七家二十五年冬黃巖蒼頭街火二十六年五月貴陽火燒民房八百餘家二十九年十二月初三日太平城隍廟火災咸豐元年十月太平火燔百餘家二年八月通州西庫火十月武昌縣署火十一月漢陽火六年十一月枝江火燔市廛八百餘家七年五月皋蘭西關火延燒市廛二百餘間八年秋武昌縣左市火十年二月青浦火麗水火同治元年冬黃山石路橋大火三年十月黃巖火五年十一月漢口火餘干瑞洪鎮火延燒四百餘家六年三月江夏火藥局災斃者以千計五月二十五日漢陽鮑家巷火燔船隻傷人口甚衆七年十月太平縣城火燔四百餘家九年冬黃巖火十一年四月烏程火延燒十餘里十三年五月武昌縣小西門火光緒二年七月壬午青浦城火延燒三十餘家九月庚寅又火東碼頭上下岸俱燼六年十一月武昌縣北市火二十八年二月皋蘭南街大火二十九年十月西寧火三十一年七月西寧大街火十一月孔子文廟災宣統元年正月初四日皋蘭縣災延燒官舍六十餘間二月二十六日蘭州省城院門南街大火延燒房屋二百零九間順治十年二月曹縣夜間火光遍野五月渭南四野火災見持炬人三尺許羣繞火際次日焚處拾一折簡字數行如人書其語曰土地不寧天降凶神三位一收牛一收馬一收人十四年十月二十七日清豐空中起火燒民房數百間康熙十二年三月縉雲曉見黧面人從空中放火捕之不見五月寧波仙鎮廟井中有火光上騰十四年八月十五日海豐火光遍野二十五年二月兩廣總督衙門兩旗竿忽白晝飛火焚其右焦灼過半三十一年秋南樂空中有火著鐵皆明自申至亥乃止五十年二月丙寅東平烈風中有火光乾隆十七年四月二十九日岐山有火光自西而東七月芮城有火光如電二十年十一月彭澤江心洲有穴出火投葦輒燃久而不息二十二年二月二日高平有火毬大如斗其色黃紅綠相間就地行走不知所終二十七年九月臨縣空中有火光大如斗墜城南隅三十三年三月即墨日夕有火毬經天五十年冬棗陽有火毬如斗飛半里外嘉慶九年二月十二日滕縣城東石溝見火毬飛落十二年四月黃安有火大如毬自東而西落于泮池十六年夏撫寧夜遍地起火道光三年三月蘄州清江水中出火二十年五月均州夜見火光二十二年十一月鄖西地中出火二十四年七月光化遍地綠火二十六年正月平鄉火光遍野咸豐元年八月二十八日隨州有天火自西南流東北其光觸地有聲如鼓三年正月通州有火如星如燐以千百計自西南趨東北凡四五夜始熄十年冬肥城既昏有火從地中起如燐而火色赤而青作二流光遍地皆燃同治二年九月曲陽有火毬自西南飛向東北或散四方或聚為一其象無常四年通渭泰安火光西現如隕星光緒元年正月十四日灤州五聖祠突有火光俄而火起高矗雲霄祠竟無恙五年冬玉田見火毬飛向東北其聲如雷二十二年四月戊子南樂有火光徑尺明如月自西南往東北尾長丈許忽炸為火星四散二十三年五月戊午夕南樂有火光圓可徑尺飛向西南二十五年十一月乙未夜南樂有火光流空中其明如月二十六年七月壬戌夜南樂有火光流空中順治三年六月初四日鎮洋新安鎮李明家地出血初五日俞二家地出血尤甚五年夏嘉定見赤氣亙東方七年冬鶴王鎮鄉民見血從地湧出九年正月東昌有赤光聲如水鴨往東南而沒十六年永年南關外地中湧血嘶嘶有聲康熙十四年四月萊陽地湧血丈餘氣腥久不敢近五十九年七月十六日榮成萊陽有赤氣自東而起如匹練亙向西北去有聲如雷雍正七年十二月二十八日夜分福山見紅光滿野乾隆三十五年七月二十八日肥城有赤光自北方起夜半漸退長山西北見赤氣彌天中有白氣如縷間之四更後始散二十九日夜榮成夜見紅光燭天東光有氣如火橫蔽西北亙數十丈中含紅光森如劍戟上射嘉慶九年正月歷城天雨血道光十一年冬太平雨血著人衣皆赤十七年六月二十八日嵊縣有赤光如球高數丈三日乃滅二十八年正月松滋天雨血以盌盛之作桃花色咸豐三年正月十四日西鄉雨血如注五年八月曹縣東方有赤氣如旗桿形六年七月武進地出血同治五年秋崇陽雨血七年正月二十日光化雨血光緒二年二月初四日曹縣見紅光自天降於八里灣水中七年四月襄陽雨血
