body:
  text: 清史稿卷四十二志十七災異三洪範曰木曰曲直木不曲直則為咎徵凡恆雨狂人服妖雞禍鼠妖木冰木怪青眚青祥皆屬之於木順治二年二月河源霪雨三年二月當塗恆雨四月南雄霪雨四年四月章丘霪雨四十餘日六月高郵大雨數晝夜丘縣霪雨平地水深二尺蕭縣暴雨三閲月永安州安邑大雨秋壽元霪雨四十餘日即墨暴雨連綿水與城齊民舍傾頽無算五年春新城霪雨六十餘日水沒城及半莒州大雨兩月武城霪雨一百日東平大雨淹禾五月衡水霪雨數旬咸陽大雨四十餘日八月句容大雨屋舍傾圮無算陵川霪雨害稼沁水霪雨兩月餘六年五月鳳陽霪雨八晝夜阜陽淮河霪雨晝夜不息秋沁水霪雨兩月餘民舍傾倒七年二月全椒大雨四月射洪大雨三晝夜城內水深丈許人畜淹沒殆盡五月平陽霪雨四十餘日六月桐鄉霪雨七月解州萊陽萬泉霪雨安邑大雨二十餘日傾圮民舍八年春嘉興海鹽桐鄉霪雨五月潞安霪雨八十餘日傷禾稼房舍傾倒甚多六月江陰霪雨六晝夜禾苗爛死吳平大雨傾盆一晝夜方息當塗大雨秋沁水大雨東阿霪雨青浦大雨彌日九年五月陽信霑化霪雨四十餘日平地水深二尺合浦大雨城淹四尺六月壽陽霪雨四十餘日襄陵霪雨兩匝月民舍漂沒甚多稷山霪雨博興大雨傾盆四十七晝夜七月濟寧東平霪雨害稼九月遵化州霪雨彌月十年五月文安大城保定大雨如注十晝夜平地水深二丈六月文登大雨三日昌平霪雨蓬萊霪雨四十餘日十一年二月蘭州大雨二十餘日六月亳州霪雨壞民廬舍七月澄邁大雨三日方止十二年八月鶴峯州霪雨不止田中水深三四尺十三年五月常山大雨十五年二月濟寧州霪雨傷麥萬泉霪雨傷麥秋垣曲霪雨儋州霪雨七晝夜田禾多沒城垣傾圮興安白河洵陽霪雨四十餘日平湖大雨數晝夜平地水深二尺許十六年正月震澤嘉定霪雨六十日方霽二月儀徵大雨彌月平地水深丈餘三月蕭縣霪雨二十餘晝夜秋銅山霪雨三月餘禾盡爛死宿州大雨二十餘日田廬漂沒殆盡虹縣霪雨六十餘日平地水深丈餘淹沒田廬梧州霪雨四十餘日成都霪雨城圮十七年五月崇明大雨一晝夜和平大雨平地水深丈餘漂沒田廬無算十八年六月貴陽大雨武寧霪雨二月未止閏七月孝感霪雨三日殺麥康熙元年八月朝城霪雨七晝夜曲沃霪雨二十日壞城垣廬舍無算成安霪雨五晝夜永年霪雨匝月吉州大雨壞城垣廬舍蕭州大雨彌月城垣傾圮解州大雨四十日猗氏大雨二十餘日民舍傾圮四年春蠡縣霪雨二十餘日六月府谷大雨閏六月延安霪雨彌月壞廬舍七月初七日大城霪雨五晝夜城垣倒壞十之六七民房坍塌不下數萬間東陽大雨壞民舍五年六月福山霪雨兩月禾稼盡傷十一月襄垣武鄉大雨六年六月惠來大雨平地水深三尺房縣霪雨傷禾七月溫州大風雨壞城垣廬舍瑞安大風雨壞城垣廬舍七年四月太平大雨如注五月太平積雨旬餘六月龍門大雨七日武強霪雨井陘大雨如注七月靈壽霪雨兩晝夜不止元氏大雨七晝夜城外水高數丈真定府懷來大雨七晝夜內丘霪雨淹沒民舍房縣霪雨傷禾八年六月嘉興霪雨晝夜不息九年五月湖州霪雨連旬德清霪雨連旬田疇盡沒六月東陽大雨如注十年八月嘉興大雨十一年秋寧波霪雨十二年正月海寧霪雨至四月止六月高要霪雨四日平地水深數尺民舍傾圮宿州大雨連綿兩日陽江大雨十三年正月桐廬霪雨至二月方止四月海豐霪雨十六日平地水深數尺六月開平霪雨陷民居高明霪雨傷損禾稼十五年五月海寧霪雨匝月傷禾大冶霪雨十六年七月高密霪雨二十餘日田禾淹沒十七年正月永年霪雨匝月四月平湖霪雨匝月五月金華霪雨傷稼七月太平霪雨民舍傾圮萊州膠州大雨傷稼萬載霪雨數晝夜十八年八月曲沃霪雨二十五日城垣廬舍傾倒無算太平霪雨臨晉雨二十餘日民舍盡圮猗氏霪雨彌月不止解州安邑霪雨連旬夏縣霪雨月餘城垣傾倒民居損壞田禾淹沒廣靈霪雨匝月不止漢中霪雨四十日如傾盆者一晝夜淹沒民居定遠廳霪雨四十日甘泉霪雨彌月興安大雨田禾盡淹十九年二月襄垣大雨四十餘日六月高郵霪雨連旬壞民舍無算七月龍門大雨平地水深尺許鎮洋霪雨纍月長子大雨四十日不止城垣傾圮蒲縣霪雨四旬傷禾八月上海驟雨城內水高五尺咸陽大雨四十餘日十一月震澤霪雨三日二十年三月處州大雨至五月始止四月寧波霪雨一月七月階州大雨月餘傾倒民房千餘間二十一年三月平遠州霪雨紹興霪雨九旬禾苗盡淹五月金華大雨五十餘日二十二年春蘇州霪雨十二日殺麥青浦霪雨傷麥陽湖恆雨殺麥海寧大雨至四月始止桐鄉恆雨至四月始止平湖自二月至四月大雨不止湖州恆雨石門恆雨傷麥天台霪雨至四月不止二麥無收太平霪雨麥無收浦江霪雨衢州恆雨至四月無麥嚴州自春徂夏陰雨連綿二麥無收五月靈川大雨通州霪雨台州霪雨麥無收六月兗州大雨平地水深三尺田廬苗稼盡淹二十三年春恩縣霪雨剡城霪雨兩月不止夏昌樂霪雨害稼七月十三日臨縣大雨至八月初八日止平地水溢太平霪雨四十餘日八月遂安霪雨兩月隰州霪雨五十餘日壞民舍甚多二十四年四月湖州大雨六月靈壽霪雨害稼固安大雨壞民舍十月福州大雨數晝夜十二月歙縣霪雨四十餘日和順大雨連月二十五年四月宣平大雨五日漂沒田廬溺者無算麗水大雨四晝夜漂沒廬舍無算閏四月處州大雨水高於城丈餘松陽大雨四晝夜景寧大雨三晝夜六月青州霪雨傷稼壽光大雨兼旬十一月瓊州大雨連日如注民舍多圮二十六年六月新城霪雨害稼七月章丘霪雨四十日民舍傾圮