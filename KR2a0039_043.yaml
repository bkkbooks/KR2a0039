body:
  text: 清史稿卷四十三志十八災異四洪範曰金曰從革金不從革則為咎徵凡恆暘詩妖毛蟲之孽犬禍金石之妖白眚白祥皆屬之於金順治元年八月蒼梧旱三年平樂永安州大旱二月至八月始雨台州自三月不雨至於五月紹興府自四月至八月不雨金華府屬旱東陽自四月至九月不雨浦江旱南昌各府自五月至十月不雨大旱秋萍鄉萬載大旱四年夏通州旱秋開化江山旱五年夏饒平旱六年吉州自春徂夏旱七年夏萬泉旱八年甘泉延長安定自四月至九月不雨崖州不雨逾年三月乃雨九年春銅陵無為廬江蕪湖當塗旱五月上海亢旱九月武強旱十年夏樂亭旱秋海寧高郵旱十一年四月天台大旱七月襄垣沁州旱十一月武強旱十二年正月順德大旱四月金華屬五州旱五月鄒平旱遂安自夏徂秋不雨八月昌樂曲江湖州衢州龍門開化江山大旱禾盡枯十月揭陽全椒旱十三年春章丘潞城高平沁水旱九月揭陽大旱深潭俱竭十四年五月蕭縣太湖旱湖井盡涸八月涇陽商南旱十五年八月昌樂大旱十一月龍州旱逾年四月乃雨十六年五月惠來思州玉屏安南旱十七年三水春旱不雨至小滿乃雨秋鎮海惠州天台旱十八年寧波東陽自夏徂秋不雨南籠府海鹽壽昌江陰東阿蒲州旱八月餘姚臨安嚴州桐鄉旱康熙元年九月昌黎旱二年二月東莞鄆城旱六月始雨四月江陰旱五月萬載黃州旱六月懷來旱八月保安羅田蕭縣旱三年春交河邢台內丘揭陽旱夏長山平原禹城臨道武定阜陽鄒縣費縣定陶莘縣華陽寧海旱四年春朝城城武恩縣堂邑夏津萊州東明靈壽武邑大旱高密自三月至次年四月不雨大旱夏登州府屬大旱七月文水平定壽陽孟縣代州蒲縣旱八月兗州府濟寧州旱五年二月揭陽旱三月三水旱五月鍾祥大冶旱六月寧海衡州旱秋宣平松陽大旱至次年四月始雨六年春廣州惠州海豐惠來旱四月黃州府屬旱五月應山黃安蘄水羅田大旱萬載自夏徂秋不雨七年六月黃安羅田懷安西寧龍門旱七月靜海旱八年七月臨海旱九年春開州東明蠡縣廣平任縣武清大城景州慶雲靈壽沙河磁州元城大旱無麥夏東陽羅田旱冬棗陽安陸德安大旱十年春霸州公安石首旱四月龍山黃安麻城廣濟大旱金華府屬六縣五月不雨至於九月湖州大旱自五月至九月不雨溪水盡涸桐鄉大旱地赤千里六月鄞縣象山寧海天台仙居烏程蘭溪旱七月齊河東明邢台廣平江浦蘇州鎮洋任縣成安旱八月太湖新城唐山西寧懷安旱九月紹興屬八縣大旱十一年春芮城解州旱四月福山旱五月高密大旱八月臨朐旱十二年揭陽春秋旱惠來春旱夏陽信旱九月高明興寧大旱十三年春樂陵許州剡城費縣旱四月濟南府屬旱六月高郵館陶恩縣旱七月鄖陽黃安麻城羅田旱十四年六月海寧旱七月黃安羅田旱十五年春興寧旱十六年湖州萬載自五月至七月不雨大旱十七年春東流壽州全椒五河泰安旱夏桐鄉嘉定黃岡旱八月金華寧州高淳旱十八年春滿城旱四月杭州旱萬安羅田宜都麻城公安自五月至八月不雨大旱蘇州崑山上海青浦陽湖宜興大旱溪水涸六月萊州平度旱七月合肥廬江巢縣無為舒城當塗大旱九月臨縣大旱十九年夏蠡縣旱秋開建連州翁源旱十一月萬全大旱二十年春安丘旱夏溫州寧波旱井泉涸奉化秋冬無雨井竭黃巖仙居太平義烏旱井泉涸二十一年五月連平旱九月博田北流旱二十二年揭陽自正月至四月不雨三月黃縣惠來普寧旱夏汶上鄒縣兗州曲沃旱七月太平旱二十三年彭水壁山自五月至八月不雨六月蓬州鄰水興安漢陽安邑洵陽綏德州秦州旱秋邢台棗強獲鹿井陘酆都遂寧巫山旱井涸二十四年春安定旱瑞安曲江樂昌春夏不雨井泉竭二十五年恭城自五月至八月不雨六月沁州普州城饒陽旱七月孝感黃安麻城旱二十六年四月樂昌旱嚴州自五月至八月不雨禾苗盡稿鄞陽夏秋大旱七月開建鶴慶海豐旱二十七年瑞安自夏徂秋不雨湖州寧州旱二十八年羅田石首枝江旱自五月至九月不雨宣平自夏徂秋旱井泉涸六月萬全景州清苑新安獻縣東光普州曲陽武強沙河旱秋開建應城旱河水涸二十九年四月湖北全境旱六月樂平旱竹溪自夏徂秋旱三十年春開平揭陽化州旱陽春自正月至四月不雨五月介休旱七月邢台懷安旱三十一年三月臨潼旱夏孝感旱九月青浦旱三十二年杭州嘉興海鹽自春徂夏大旱禾盡稿六月桐鄉旱七月震澤崑山嘉定青浦丹陽大旱河水涸三十三年秋黃岡蘄水黃安廣濟江夏武昌興國大冶旱三十四年夏長寧馬邑旱秋永寧州臨縣旱三十五年四月台州旱五月靜樂衢州旱秋永安州平樂蒼梧旱三十六年春陽江陽春永安州平樂旱六月順德旱八月桐廬松陽旱三十七年四月豐樂旱五月銅陵旱三十八年三月黃陂旱夏杭州桐鄉旱秋武昌陽湖旱三十九年二月湖州旱五月沙河旱秋常山旱四十年五月堂邑旱六月蘭州河州旱九月瓊州旱四十一年高郵大旱四十二年三月宣平旱五月橫州旱六月連州旱四十三年春青浦沛縣沂州樂安臨胊旱五月靜寧州衢州旱六月絳縣旱八月永平旱四十四年春朝陽旱四月羅田上海旱九月巨鹿旱四十五年春瓊州旱五月黃巖旱四十六年夏池州石門湖州海鹽桐鄉旱河港皆涸秋臨江府屬當塗蕪湖東流含山歷城旱四十七年夏東平平原霑化臨朐旱秋黃岡恩縣茌平臨清旱四十八年四月溧水旱秋武進滿城旱冬湖州旱四十九年二月揭陽澄海旱五月臨朐新城武強旱秋湖州台州仙居旱五十年七月應城枝江德安羅田旱五十一年五月固安定州井陘清苑旱九月崖州旱五十二年夏台州常山旱至十月不雨秋五河大旱五十三年春臨朐旱五月宣平東明元氏旱六月台州蘇州震澤陽湖旱景州夏秋旱五十四年春翼城陽江解州旱六月銅陵合肥旱七月鶴慶旱惠來自八月歷冬不雨五十五年二月海豐朝陽旱五月揭陽福山密雲懷柔旱常山夏秋旱五十六年福山旱五十七年春南昌旱四月臨朐旱秋崇陽寧陽旱五十八年二月曲阜旱夏福山常山縉雲峽江旱八月義烏旱五十九年夏東平嶽陽曲沃臨汾湖州桐鄉石門旱秋臨朐沁州旱六十年春興寧全州安州臨安登州西安延安鳳翔旱懷柔自春不雨至五月二麥無收鶴慶春秋旱慶遠府大旱自正月至七月不雨田禾盡稿桐廬自五月至七月不雨禾盡枯橫州自六月至九月不雨昌化桐鄉海寧旱河涸七月宣平嵊縣寧都黃岡房縣旱八月夏津旱六十一年二月濟南旱六月武進無為含山青城海寧湖州寧津旱祁州夏秋旱松陽鍾祥江陵荊門旱雍正元年春元氏旱夏海寧湖州桐鄉井陘武進祁州莒州蒙陰東昌旱秋雞澤嘉興蘇州高淳崑山大旱河水涸二年鶴慶自二月至八月不雨夏海寧嘉興旱七月景州景津全州旱井泉涸三年春霑化莒州旱河涸夏津春夏旱七月全州丘縣旱四年春壽光旱五月英山旱五年六月慶陽府屬旱六年五月洛川旱興安自七月旱至次年二月始雨竹木盡枯七年春元氏旱八年八月東光滄州旱九月邢台平鄉沙河揭陽長治旱十年春平原曲阜莒州北鄉旱沂州自正月至六月不雨六月臨清福山旱十一年春同官常山旱八月濟南府屬旱十二年春膠州旱六月同官甘泉旱十三年五月夏津壁山池州旱湖水涸七月蒲圻鍾祥當陽宜都江夏崇陽蘄水旱乾隆元年潮陽旱二年三月會寧東安旱無麥玉田春夏大旱六月漢陽黃陂孝感黃岡麻城旱九月獲鹿欒城平山旱三年鹽城自二月至六月不雨大旱赤地千里夏震澤清河旱九月武進鹽城旱四年春蘄水高郵旱夏通州潛山銅陵合肥廬江青浦無為東流旱秋漢陽黃陂孝感鍾祥京山天門武昌旱五年六月全州旱六年嘉應崖州春夏旱七年春廣寧鶴慶龍川潮陽饒平普寧旱陽江春夏旱八年春壽州旱新安自春徂夏不雨四月銅陵旱閏四月藁城旱六月德州武強正定河間寧津衡水旱冬武昌府屬旱九年四月西清慶平高邑寧河旱七月武定府屬旱十年五月三河旱秋元氏邢台棗強懷來正定無極藁城樂平代州旱晚禾皆粃十一年雲都自五月至七月不雨十二年春即墨平度旱夏文登旱秋高密安邑垣曲旱十三年三月臨安旱五月嘉興石門旱六月芮城懷來旱十四年十月大同府屬旱十五年春惠來旱五月交河蘄城旱秋連州旱十六年七月溧水連州惠來旱建德遂安淳安壽昌桐廬分水夏秋不雨禾苗盡稿十七年春房縣旱解州自五月至七月不雨秋海寧富陽餘杭臨安杭州雷州諸城寧鄉旱十八年桐廬春夏旱禾苗枯井泉涸廣靈自五月至九月不雨秋唐山樂清平陽旱十九年荊門州大旱至二十一年始雨二十年三月普寧旱五月梧州旱七月黃縣旱十一月武進旱二十一年金華春夏旱五月桐鄉天門旱二十二年春龍川大旱惠來自春徂秋不雨夏石門梧州桐鄉旱二十三年三月東平旱六月慶陽旱二十四年平定樂平盂縣春夏大旱六月枝江高郵太原旱秋代州翼城寧州寧鄉安邑絳縣垣曲潞安河津應州大同懷仁山陰靈丘豐鎮甘泉新樂旱二十七年夏會寧湖州旱二十八年武昌旱二十九年夏寧津東光旱三十年夏洛川旱三十一年秋文登榮成旱三十二年湖州旱三十三年四月陽湖高郵旱六月日照石門嘉善旱連州夏秋大旱七月孝感安陸雲夢應城應山武昌鍾祥棗陽旱八月泰州大旱河竭三十四年六月高淳旱三十五年夏臨潼珙縣旱七月常山旱三十六年二月即墨旱夏五河旱冬瑞安當陽宜城旱三十七年春文登旱秋宣平旱三十八年夏洛川旱七月壽光宣平天津青縣靜海武清東光寧津旱三十九年七月鍾祥荊門州應城黃安旱八月秦州鎮番慶雲南樂霸州旱四十年六月杭州旱九月兼旬不雨房縣溧水武進高郵文登榮成旱四十一年秋平定樂平旱四十二年夏洛川穀城歸州旱八月吳川武寧宣平旱四十三年太原自正月至五月不雨諸城旱夏嘉興石門東平旱河涸秋江夏武昌崇陽黃陂漢陽鍾祥潛江保康枝江旱冬九江武寧旱四十四年六月湖州武城安丘泰安潛山旱四十五年五月應城旱四十六年四月宣平旱六月金華新城旱四十七年春文登旱五月黃縣旱六月羅田旱秋綏德州旱四十八年二月文登榮成綏德州旱秋菏澤旱四十九年二月寧陽菏澤旱三月大名府屬七州縣旱五月應城旱秋寧陝廳大旱長安河涸五十年二月江夏武昌旱濟南菏澤自春徂夏不雨夏鄒平臨邑東阿肥城滕縣寧陽日照嘉善桐鄉宣平蘇州高淳武進甘泉皆大旱河涸秋太平觀城沂水壽光安丘諸城博興昌樂黃縣旱五十一年春東平旱五月洮州旱七月荊門州松滋旱五十二年三月黃縣博興旱夏滕縣大旱微山湖涸五十三年三月黃縣復旱五十四年宜都大旱自三月至五月不雨五十六年五月應山大旱五十七年歷城霑化黃縣春早秋順德武強南宮慶雲靜海望都蠡縣樂亭旱五十八年陵川自二月至三月不雨保定大名元城東光春旱七月德平旱五十九年三月文登榮成旱秋黃縣不雨至冬六十年春鄒平壽光昌樂諸城旱五月蓬萊黃縣棲霞江山溪陽旱秋文登不雨嘉慶元年春浦江旱五月穀城麻城旱夏洛州懷遠旱秋漁陽旱二年五月江陵旱三年四月黃安旱五月青浦旱六月文登榮成旱四年夏江山大旱五年春枝江旱夏安康旱六年春章丘旱榮成夏秋大旱草木盡枯七年四月京師旱五月金華江山常山旱六月武昌漢陽黃川德安咸寧黃岡安陸旱八月宣平嵊縣南昌臨江旱八年江山自春