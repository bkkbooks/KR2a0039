body:
  text: 清史稿卷四十四志十九災異五洪範曰土爰稼穡不成則為咎徵凡恆風霾晦冥花妖蟲孽牛禍地震山頹雨毛地生毛年饑黃眚黃祥皆屬之於土順治二年七月湖州大風拔木三年二月孝感大風拔木五年六月無為州大風壞屋拔木八月海豐颶風毀廬舍無算六年正月潞安飆風大作五月五河狂風晝夜不息大木盡拔八月惠來颶風大作四晝夜不息毀官署民舍七年二月阜陽襄陽漳南大風拔木覆屋九年五月東陽大風拔木十年八月澄海颶風大作舟吹陸地屋飛空中官署民房盡毀壓斃男婦不計其數從來颶風未有如此甚者十一年二月太湖大風毀城內牌坊六月全椒颶風大作屋瓦皆飛十二年六月石門大風拔木十三年五月章丘大風拔木十四年三月平樂颶風大作飛石拔木民房多傾頹六月石門大風毀民居十六年正月二十八日嘉應州大風拔木十七年五月慶元颶風拔木康熙元年八月初三日寧海颶風三晝夜宜興大風雨拔木二年遂溪颶風拔木三年四月臨城大風傷人七月清河颶風壞廬舍無算慈谿大風雨大木盡拔八月嘉興颶風大作拔木飛瓦四年二月江陰大風拔木五月東陽大風雷雨幷至拔木壞屋七月嘉應州大風拔木八月長樂大風拔木五年五月海陽颶風拔木八月澄海颶風傷稼六年四月信宜大風牆垣皆頹七年四月東陽大風雨壓倒民居七所拔木無算六月太平大風拔木七月瑞安大風毀城垣廬舍八年四月大冶大風拔木六月海寧大風拔木九年春崇陽大風拔木五月全椒大風拔木六月安縣大風拔木三晝夜乃息七月武定大風拔木十年正月平遠大風拔木十一年七月榆社大風殺稼瓊州颶風大作官署民房悉圮無存毀城垣十五丈九月吳川颶風壞城垣廬舍十二年正月海陽颶風拔木壞屋八月十六日澄海颶風大作十三年二月桐廬大風拔木十四年二月武強大風殺稼三月玉田大風揚沙拔木六月新城大風拔木十五年四月至六月澄海颶風屢作壞屋拔木十六年四月宜城大風拔木六月東陽大風屋瓦皆飛十七年六月武強大風拔木十八年六月惠州大風壞文星塔頂十九年秋瓊州大風拔木二十一年三月望江大風拔木七月信宜大風拔木二十二年二月初五日單縣大風揚塵蔽天焂忽變幻五色二十三年正月清河大風拔木二十四年三月文登大風拔木二十五年四月漢中定遠大風拔木五月西充南充大風拔木六月岳陽大風拔木二十六年三月太湖大風拔木六月平樂蒼梧大風拔木壞屋七月蘇州崑山武進大風傷禾二十七年五月昌樂壽光大風拔木六月沁水大風拔木二十八年五月恩縣異風損壞城樓吹倒石坊二十九年四月鄖陽大風拔木五月二十六日夜六安狂風暴起屋瓦皆飛大木盡拔八月黃巖大風拔木三十年三月寧陽大風拔木四月江浦大風屋瓦皆飛三十一年正月蓬萊大風拔木毀屋二月沛縣大風拔木毀屋五月東昌丘縣大風拔木六月高密大風拔木三十二年六月營山大風拔木風過草木如焚三十三年十月十六日鄒平怪風吹倒城𣛀六座三十四年秋長寧大風拔木三十五年七月二十二日青浦澤州大風拔木二十三日桐鄉石門嘉興湖州颶風大作民居傾覆壓傷人畜甚多八月十一日海州大風雨民舍盡傾三十七年四月濟南大風拔木七月蘇州大風拔木三十八年春青州大風拔木六月南樂大風拔木四十一年八月開平颶風拔木倒牆十月乙酉東明大風拔木四十二年五月枝江大風拔木六月潮陽颶風傷稼四十四年四月崇陽大風拔木五月歷城霑化丘縣大風拔木四十五年六月二十夜什邡大風自東北來飛瓦拔木四十六年三月鄒平長山大風拔木四十七年五月惠民颶風大作毀民舍七月台州大風拔木四十八年四月太原大風毀牌坊八月定海大風雨孔子廟及御書樓皆圮四十九年三月中衞大風拔木五十年三月祁州大風毀南城樓五月安丘諸城大風拔木五十一年四月香山颶風拔木八月寨城富川大風拔木九月北流大風拔木五十二年三月全州大風雨雹屋瓦皆飛大木盡拔六月潮陽大風壞北橋五十三年五月固安大風拔木六月順義大風樹木盡拔五十四年六月初一日潮陽颶風拔木五十五年閏三月朔解州大風拔木四月辛亥靜寧州大風拔木五十六年七月十九日掖縣暴風雨一晝夜大木盡拔五十七年五月澄海颶風拔木六月湯溪大風拔巨木壞廬舍七月日照黃縣大風雨一晝夜大木盡拔五十八年五月乾州大風拔木六月寶坻大風拔木八月十九日夜揭陽颶風大作風中如燐火樹木皆枯澄海颶風大作民房傾覆壓倒男婦無算五十九年正月陽春颶風傷稼六十年八月澄海颶風大作如燐火毀城垣六十一年四月甘泉大風拔木五月慶雲大風拔木十二月欽州大風雨吹塌城垣二十餘丈雍正元年四月平鄉大風拔木六月岑溪大風拔木冬武寧大風拔木二年二月陽信霑化大風風中帶火四年五月高淳當塗大風拔木六月濰縣大風雨壞民舍十二家五年七月鎮海颶風大作毀縣署大堂九年二月連州大風雨拔木壞屋六月陽信大風拔木十年七月南匯大風拔木八月海陽大風拔木十月泰州大風拔木十一年八月沂州大風四晝夜十二年七月泰州大風拔木壞屋十三年八月高淳大風三晝夜乾隆元年五月翼城大風拔木二年八月十五日平陽大風三年七月鍾祥大風拔木五年三月通州大風拔木六月掖縣大風拔木六年四月平定樂平孟縣大風拔木八年五月光化大風拔木十年三月棲霞大風拔木十一年七月十五日高郵大風拔木十二年七月崑山鹽城清河福山棲霞文登大風拔木覆屋十三年三月鶴慶大風拔木四月清河大風雨民舍傾圮無算五月泰州通州大風拔木十四年四月池州