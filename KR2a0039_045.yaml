body:
  text: 清史稿卷四十五志二十時憲一明之大統術本於元之授時成化以後交食往往不驗萬曆末徐光啓李之藻等譯西人之書為新法推交食淩犯皆密合然未及施用世祖定鼎以後始絀明之舊曆依新法推算即承用二百六十餘年之時憲術也光啓等齗齗辨論當時格而不行乃為新朝改憲之資豈非天意哉聖祖邃於曆學定用均輪法以齊七政以康熙甲子為元雍正中從監臣之請推步改橢圓法以雍正癸卯為元道光中監臣以交食分秒不合據實測之數損益原用數以道光甲午為元自康熙至於道光推步之術凡三改而道光甲午元曆僅有恆星表至於推日月交食步五星均未及成書云西人湯若望與徐光啓共譯新法者也以四十二事證西人之密中術之疏疇人子弟翕然信之宣城人梅文鼎研精天算由授時以溯三統四分以來諸家之術又博考九執回回術而折衷於新法皆洞其原本究其異同卒以績學受知聖祖於是為推步之學者始知中西之學之一貫不至眩晃於新法矣與湯若望同時入中國者為穆尼閣傳其學於淄川薛鳳祚而吳江人王錫闡自創新法用以推日月食不爽秒忽兩家之學皆不列於臺官然其精密或為臺臣所不及焉今為時憲志詳考其推步七政四餘根理法數著於篇諸家論説有裨數理者亦撮其大要載之明大統術回回術康熙初用之以詳於明史不具論推步因革順治元年六月湯若望言臣於明崇禎二年來京曾依西洋新法釐訂舊曆今將新法所推本年八月初一日日食京師及各省所見食限分秒並起復方位圖象進呈乞屆期遣官測驗從之七月若望又推天象進呈是月禮部言欽天監改用新法推注已成請易新名頒行天下睿親王言宜名時憲以稱朝廷憲天乂民至意從之八月丙辰朔午時日食二分四十八秒大學士馮銓同若望赴觀象臺測驗覆奏惟新法一一吻合大統回回二曆俱差時刻敕舊法歲久自差非官生推算之誤新法既密合天行監局宜學習勿怠玩十月頒順治二年時憲書若望又言敬授人時全以節氣交宮與太陽出入晝刻為重今節氣之日時刻分與太陽出入晝夜時刻俱照道里遠近推算請刊入時憲書從之十一月以若望掌欽天監事若望等言臣等按新法推算月食時刻分秒復定每年進呈書目刪其復重以免混淆二年六月若望等言舊法推算本年十二月己卯朔辰時日食三分強回回科算見食一分弱依新法推之止應食半分強且在日出之前地平上不見請臨期遣官測驗從之至期天陰雨推驗事遂輟十一月若望以明大學士徐光啓所譯崇禎曆書改名新法曆書進呈上命發監局官生肄習仍宣付史館加若望太常寺卿銜十年賜若望通玄教師以奬其勤勞若望之法以天聰戊辰為元分周天為三百六十度太陽一日平行五十九分八秒十九微四十九纖三十六芒最高一年行四十五秒戊辰年平行距冬至五十三分三十五秒三十九微最高距冬至五度五十九分五十九秒太陰一日平行一十三度一十分三十五秒一微自行一十三度三分五十三秒五十六微正交行三分一十秒月孛行六分四十一秒戊辰年平行距冬至六宮一度五十分五十四秒四十六微自行距冬至六宮二十五度三十二分一十五秒三十四微正交行距冬至一宮一十四秒月孛行距冬至十一宮六度一十九分土星諸行應平行距冬至為十一宮十八度五十一分五十一秒本年最高行距冬至為九宮八度五十七分五十九秒平行距最高即引數為二宮九度五十三分五十二秒正交行距冬至為六宮七度九分八秒一平年平行為十二度十三分三十一秒最高行一分二十秒十二微以最高行減平行得十二度十二分十五秒乃一年之引數也一閏年平行為十二度十五分三十五秒引數為十二度十四分十五秒正交行一年為四十二秒木星諸行應平行距冬至為八宮二十八度八分三十一秒本天最高行為十一宮二十七度十一分十五秒平行距最高即引數為九宮初度五十七分十六秒正交行為六宮二十四度四十一分五十二秒一平年距冬至平行為一宮零二十分三十二秒最高行為五十七秒五十二微兩數相減得一宮零十九分三十四秒乃一平年之引數也一閏年距冬至平行為一宮零二十五分三十一秒引數為一宮零二十四分三十三秒正交行一年為一十四秒火星諸行應平行距冬至為五宮四度五十四分三十秒本天最高在七宮二十九度三十分四十秒平行距最高即引數為九宮五度二十三分五十秒正交行為三宮十七度二分二十九秒一平年距冬至平行為六宮十一度十七分一十秒最高行一分十四秒兩數相減得六宮十一度十五分五十五秒一閏年距冬至平行為六宮十一度四十八分三十六秒引數為六宮十一度四十七分二十一秒正交行一年為五十三秒金星諸行應平行距冬至與太陽同度為初宮初度五十三分三十五秒三十九微平行距最高即引數為六宮零五十六分五十五秒伏見行從極遠處起為初宮九度十一分七秒最高行在六宮零十六分六秒一平年距冬至為十一宮二十九度四十五分四十秒三十八微自行引數為十一宮二十九度四十四分十七秒伏見行為七宮十五度一分五十秒最高行為一分二十一秒一閏年距冬至及自行加五十九分八秒伏見行加三度六分二十四秒乃一日之行也金星正交在最高前十六度即五宮十四度十六分其行極微故未定其率然於最高行無大差水星諸行應平行距冬至與太陽同度平行距最高即引數為二十九度二十分二秒伏見行從極遠處起為三宮二十九度五十四分一十六秒最高在十一宮零五十二分四十二秒一平年距冬至亦與太陽同度自行引數為十一宮二十九度四十三分五十一秒伏見行滿三周外有一宮二十三度五十七分二十六秒一閏年引數為十二宮零四十二分五十九秒伏見行全周外為一宮二十七度三分五十二秒正交行或曰與最高同度難測故不敢定云若望論新法大要凡四十二事曰天地經緯天有經緯地亦有之以二百五十里當天之一度經緯皆然曰諸曜異天諸曜高卑相距遠甚駁舊曆認為同心之誤曰圓心不同太陽本圈與地不同心二心相距古今不等曰蒙氣差地有蒙氣非先定蒙氣差不能密合曰測算異古法測天以弧三角形算以割圜八線表曰測算皆以黃道測天用赤道儀所得經度不合新法就黃道經度通以黃赤通率表乃與天行密合曰改定諸應從天聰二年戊辰前冬至後己卯日子正為始曰求真節氣舊法平節氣非真節氣今改定曰盈縮真限用授時消分為平歲更以最高最卑差加減之為定歲曰表測二分舊法以圭表測冬至非法之善者今用春秋二分較二至為密曰太陽出入及晨昏限從京師起算各處有加減曰晝夜不等其差較一刻有奇一緣黃道夏遲冬疾一緣黃赤二道廣狹不同距則率度不同分曰改定時刻定晝夜為九十六刻曰置閏不同舊法用平節氣置閏非也改用太陽所躔天度以定節氣曰太陰加減朔望止一加減餘日另有二三均數多寡不等曰月行高卑遲疾月行轉周之最高極遲最卑極疾五星準此曰朔後月見遲疾一因自行度遲疾一因黃道升降斜正一因白道在緯南緯北曰交行加減月在交上以平求之必不合因設一加減為交行均數曰月緯距度舊法黃白二道相距五度不知朔望外尚有損益其至大之距五度三分之一曰交食有無月食以距黃道緯度較月與地景兩半徑並日食則以距度較日月兩半徑並距度為小則食大則不食曰日月食限不同月食則太陰與地景兩周相切以其兩視半徑較白道距黃道度又以距度推交周度定食限日食必加入視差而後得距度曰日月食分異同距度在月食為太陰心實距地景之心在日食為日月兩心之距但日食不據實距而據視距曰實食中食以地心之直線上至黃道者為主日月五星兩居此線之上則實食也月與五星各居本輪之周地心直線上至黃道而兩本輪之心俱當線上則中食也曰視食日食有天上之實食有人所見之視食視食依人目與地面為準曰黃道九十度為東西差之中限論天頂則高卑差為正下南北差為斜下而東西差獨中限之一線為正下以外皆斜下論其道則南北差為股東西差恆為勾高卑差恆為弦至中限則股弦為一線無勾矣曰三視差以地半徑為一邊以太陽太陰各距地之遠為一邊以二曜高度為一邊成三角形用以得高卑差又偏南而變緯度得南北差以黃道九十度限偏左偏右而變緯度得東西差曰外三差東西南北高卑之差皆生於地徑外三差不生於地徑而生於氣一清蒙氣差二清蒙徑差三本輪徑差曰虧復不一非二時折半之説新法以視行推變時刻則瞭然於虧復時刻不一之故曰交食異算諸方各以地徑推算交食時刻及日食分曰日食變差據法應食而實不見食必此日此地之南北差變為東西差此千百年偶遇一二次非無有者曰推前驗後新法諸表上溯下沿開卷瞭然不費功力曰五星準日舊法於合伏日數時多時寡徒以段目定之不免有差今改正曰伏見密合舊法五星伏見惟用黃道距度非也今改正曰五星緯度太陰本道斜交黃道因生距度與陰陽二曆五星亦然新法一一詳求舊未能也曰金水伏見金星或合太陽而不伏水星離太陽而不見用渾儀一測便知非舊法所能曰五星測法測五星須用恆星為準曰恆星東移恆星以黃道極為極各宿距星時近赤極亦或時遠赤極由黃赤二道各極不同非距星有異行或易位曰定恆星大小有六等之別前此未聞曰天漢釋疑新法測以遠鏡天漢乃無算小星攢聚而成曰四餘刪改羅即白道之正交計都即中交月孛乃月行極高之點至紫愛一餘無數可定明史附會今俱改刪曰測器新法增置者曰象限儀百遊儀地平儀弩儀天環天球紀限儀渾蓋簡平儀黃赤全儀而新製之遠鏡尤為測星要器曰日晷為地平晷三晷百遊晷通光晷此外更有星晷月晷以備夜測之用若望所言大抵據新法以詆舊術之疏然新法之精蘊亦盡於此矣十四年四月前回回科秋官正吳明炫言臣祖默河亦里等十八姓本西域人自隋開皇己未抱其學重譯來朝授為日官一千五十九年專司星宿行度吉凶每年推算太陰五星凌犯天象占驗日月交食即以臣科白本進呈為定例順治三年本監掌印湯若望令臣科凡日月交食及太陰五星凌犯天象占驗俱不必奏進臣查若望所推七政水星二八月皆伏不見今水星二月二十九日仍見東方又八月二十四日夕見關係象占不敢不據實上聞乞復立回回科以存絶學奏下所司時新安衛官生楊光先叩閽進摘謬論糾湯若望新法之謬且言時憲書有依西洋新法五字尤不合又進選擇議糾若望選榮親王葬期用洪範五行山向日月俱犯忌殺康熙三年十二月禮部議時憲書面依西洋新法五字擬改奏準二字從之四年議政王等言每日百刻新法改為九十六刻二十八宿次序湯若望將觜參二宿改易前後又將四餘刪去紫愛俱不合其選擇不用正五行用洪範五行以致山向日月俱犯忌殺事犯重大將湯若望及科官等分別擬凌遲斬決敕湯若望從寬免死時憲科李祖白等五人俱處斬於是復用大統舊術以楊光先掌監務光先抗疏屢辭不允光先於推步之學本不深唐熙七年謂明年當閏十二月尋知其誤自行檢舉而時憲書已頒行乃諭天下停止閏月云是年監副吳明烜言古法差謬五官正暨回回科所進各不同立加校正下禮部議禮部覆奏五官正戈繼文等所算七政金水二星差錯太甚主簿陳聿新所推七政未經測驗亦有差錯監副吳明烜所推七政與天象相近理應頒行仍令監臣同四科官每日晝測晷景以定節氣夜測月五星以定行度從之十一月西人南懷仁言所頒各法不合天象乃召南懷仁利類思安文思及監官馬祐楊光先吳明烜等至東華門大學士李霨傳諭授時乃國家要政爾等勿挾宿仇以己為是以彼為非是者當遵用非者當更改務期歸於至善十二月南懷仁劾吳明烜所造康熙八年七政時憲書糾謬下王大臣九卿科道會議議政王等言乞派大臣同南懷仁等測驗乃遣圖海李霨等二十人赴觀象臺測驗八年二月議政王等議覆圖海等赴觀象臺測驗南懷仁所言皆合吳明烜所言皆謬問監正馬祐等亦言南懷仁所算實與天象合竊思百刻雖行之已久但南懷仁九十六刻之法既合天象自應頒用又南懷仁言羅計都月孛係推算所用故載於七政之後其紫愛星無用處不應造入應自康熙九年為始用九十六刻之曆時明烜言臣祗知天文不知曆法光先言臣不知曆法惟知曆理光先語尤不遜褫職三月授南懷仁欽天監監副先是監官依古法推算康熙八年十二月應置閏南懷仁言雨水為正月中氣是月二十九日值雨水即為康熙九年正月不應置閏置閏當在明年二月監官多直懷仁從其言改閏九年二月於是大統回回兩法俱廢專用西洋法如順治之初八月南懷仁劾楊光先誣陷湯若望叛逆議政王等議湯若望應復通微教師照原品賜恤楊光先應反坐敕免議十三年二月新造儀象志告成南懷仁加太常寺卿銜十四年二月諭監副安泰從何君錫學古曆法十五年二月欽天監奏五月朔日食監副安泰依古法算應食五分六十秒南懷仁新法只應食二十微三分秒之一至期登臺測驗酉正食甚將及一分戌初刻復圓古法所推分數失之甚遠而新法亦不甚合南懷仁曰此清蒙氣之所為蒙氣能映小為大故也十七年七月欽天監進呈康熙永年表三十二卷二十二年十月監臣推算盛京九十度表告成初南懷仁奏各省北極高度不同其交合之時刻食分俱不等全憑各省之九十度表推算向來不知盛京北極高度即用京師之九十度表今測得盛京北極比京師高二度請依其高度推算九十度表從之至是以盛京九十度表進呈諭永遠遵守云四十一年十月大學士李光地以宣城貢生梅文鼎曆學疑問三卷進呈上曰朕留心曆算多年此事朕能決其是非乃親加批點還之事具梅文鼎傳文鼎論中西二法之同異曰今之用新曆也乃兼用其長以補舊法之未備非盡廢古法而從新法術也夫西曆之同乎中法者不止一端其言五星之最高加減也即中法之盈縮曆也在太陰則遲疾曆也其言五星之歲輪也即中法之段目也其言恆星東行也即中法之歲差也其言節氣之以日躔過宮也即中法之定氣也其言各省真節氣不同也即中法之里差也但中法言盈縮遲疾而西説以最高最卑明其故中法言段目而西説以歲輪明其故中法言歲差而西説以恆星東行明其故是則中曆所言者當然之運而西曆所推者其所以然之理此其可取者也若夫定氣里差中曆原有其法但不以法曆耳非古無而今始有也西曆始有者則五星之緯度是也中曆之緯度惟太陽太陰有之而五星則未有及之者今西曆之五星有交點有緯行亦如太陽太陰之詳明是則中曆缺陷之大端得西法以補其未備矣夫於中法之同亦既有以明其所以然之故而於中法之未備者又有以補其缺於是吾之積候者得彼説而益信而彼説之若難信者亦因吾之積候而有以知其不誣雖聖人復起亦在所兼收而並取矣五十年十月上諭大學士等天文曆法朕素留心西法大端不誤但分刻度數之間積久不能無差今年夏至欽天監奏午正三刻朕細測日景是午初三刻九分此時稍有舛錯恐數十年後所差愈甚猶之錢糧微塵秒忽雖屬無幾而總計之便積少成多此事實有證驗非比書生論説可以虛詞塞責也又諭禮部考取效力算法人員臨軒親試取顧琮等四十二人五十一年五月駕幸避暑山莊徵梅文鼎之孫梅瑴成詣行在先是命蘇州府教授陳厚耀欽天監五官正何君錫之子何國柱國宗官學生明安圖原任欽天監監副成德皆扈從侍直上親臨提命許其問難如師弟子及徵瑴成至奏對稱旨遂與厚耀等同直內廷五十二年五月修律呂算法諸書以誠親王允祉皇十五子允皇十六子允祿充承旨纂修何國宗梅瑴成充彙編陳厚耀魏廷珍王蘭生方苞等充分校所纂之書每日進呈上親加改正焉五十三年四月諭誠親王允祉等古曆規模甚好但其數目歲久不合今修書宜依古曆規模用今之數目算之十月又諭北極高度黃赤距度最為緊要著於淡寧居後逐日測量乃製象限儀儀徑五尺範銅為之晝測日度夜測勾陳帝星又製中表正表倒表各二俱高四尺中表測日中心正表倒表測日上下邊之景惟六表所得日景尾數多參差不合海瑴成言表高景淡尾數難真自古患之昔郭守敬為銅表端挾二龍舉橫梁至四十尺因其景虛淡創為景符以取實影其製以銅葉博二寸長加博之二中穿一竅若針芥然以方木為趺一端設機軸令可開闔稽其一端使其針斜倚北高南下往來遷就於虛影之中竅達日光僅如黍米隱然見橫梁於其中乃倣元史郭守敬製造景符六如法用之影尾數始毫末不爽測得暢春園北極高三十九度五十九分三十秒比京師觀象臺高四分三十秒黃赤大距二十三度二十九分比舊測減二分云十一月誠親王允祉等言郭守敬造授時術遣人二十七處分測故能密合今除暢春園及觀象臺逐日測驗外如福建廣東雲南四川陝西河南江南浙江八省於里差尤為較著請遣人逐日測量得其真數庶幾東西南北里差及日天半徑皆有實據從之五十八年二月以推算人不敷用敕禮部録送蒙養齋考試取傅明安等二十八人命在修書處行走六十年御製算法書成賜名數理精蘊諭此書賜梅文鼎一部命悉心校對遣其孫梅瑴成齎書賜之六十一年六月曆書稿成並律呂算法共為律曆淵源一百卷一曰曆象考成上下編一曰律呂精義上下編續編一曰數理精蘊上下編雍正元年頒曆象考成於欽天監是為康熙甲子元法自雍正四年為始造時憲書一遵曆象考成之法又議準其御製之書無庸欽天監治理其治曆法之西洋人授為監正八年六月監正明安圖言日月行度積久漸差法須旋改始能密合臣等遵御製曆象考成推算時憲據監正戴進賢監副徐懋德推測覺有微差於本月初一日日食臣等公同測驗實測與推算分數不合乞敕下戴進賢徐懋德詳加校定修理從之十年四月修日躔月離表成乾隆二年四月協辦吏部尚書事顧琮言世宗皇帝允監臣言請纂修日躔月離二表以推日月交合並交宮過度晦朔弦望晝夜永短以及凌犯共三十九頁續於曆象考成諸表之末查造此表者監正西洋人戴進賢能用此表者監副西洋人徐懋德與五官正明安圖擬令戴進賢為總裁徐懋德明安圖為副總裁盡心考驗增補圖説曆象考成內倘有酌改之處亦令其悉心改正敕即著顧琮專管五月琮復言乞命梅瑴成為總裁何國宗協同總裁從之十一月命莊親王允祿為總理三年四月莊親王允祿等言曆象考成一書其數惟黃赤大距減少二分餘皆仍新法算書西人第谷之舊康熙中西人有噶西尼法蘭德等發第谷未盡之義其大端有三其一謂太陽地半徑差舊定為三分今測祗有十秒其一謂清蒙氣差舊定地平上為三十四分高四十五度祗有五秒今測地平上止三十二分高四十五度尚有五十九秒其一謂日月五星之本天非平圓皆為橢圓兩端徑長兩腰徑短以是三者經緯度俱有微差戴進賢等習知其説因未經徵驗不敢遽以為是雍正八年六月朔日食舊法推得九分二十二秒今法推得八分十秒驗諸實測今法為近故奏準重修日躔月離新表二差以續於曆象考成之後臣等奉命增修表解圖説以日躔新表推算春分比前遲十三刻許秋分比前早九刻許冬夏至皆遲二刻許然以測午正日高惟冬至比前高二分餘夏至秋分僅差二三十秒蓋測量在地面而推算則以地心今所定地半徑差與蒙氣差皆與前不同故推算每差數刻而測量終不甚相遠也至其立法以本天為橢圓雖推算較繁而損益舊數以合天行頗為新巧臣等闡明理數著日躔九篇並表數乞親加裁定附曆象考成之後顏曰御製後編凡前書已發明者不復贅述報聞七年莊親王允祿等奏進日躔月離交宮共書十卷是為雍正癸卯元法九年十月監正戴進賢等言靈臺儀象志原載星辰約七十年差一度為時已久宜改定康熙十三年修志之時黃赤大距與今測不同所列諸表當逐一增修三垣二十八宿以及諸星今昔多寡不同亦應釐訂敕莊親王鄂爾泰張照議奏十一月議準仍以三人兼管是年更定羅計都名目又增入紫愛為四餘十七年莊親王允祿等言儀象志所載之星多不順序今依次改正共成書三十卷賜名儀象考成是月莊親王等復奏改正恆星經緯度表并更定二十八宿值日觜參之前後敕大學士會同九卿議奏十二月大學士傅恆等言請以乾隆十九年為始時憲書之值宿改觜前參後從之既而欽天監又以推算土星有差減平行三十分自乾隆以後至道光初交食分秒漸與原推不合道光十八年八月管理欽天監事務工部尚書敬徵言自道光四年臣管理監務查觀象臺儀器康熙十三年所製黃赤大距皆為二十三度三十二分至乾隆九年重製璣衡撫辰儀所測黃赤大距則為二十三度二十九分是原設諸儀已與天行不合今又將百年即撫辰儀亦有差失臣將撫辰儀更換軸心諸儀亦量為安置另製小象限儀一令官生晝測日行夜測月星每逢節氣交食所測實數有與推算不合者詳加考驗知由太陽緯度不合之數測得黃赤大距較前稍小其數僅二十三度二十七分由交節時刻之早晚考知太陽行度有進退不齊之分夫太陽行度為推測之本諸曜宗之而推日行又以歲實氣應兩心差曰本天最卑行度為據擬自道光十四年甲午為年根按實測之數將原用數稍為損益推得日行交節時刻似與實測之數較近至太陰行度以交食為考驗之大端近年測過之月食較原推早者多遲者少故於月之平行自行交行內量為損益按現擬之平行仍用諸均之舊數推得道光十四年後月食三次除十七年三月祗見初虧九月天陰未測僅測得道光十六年九月十五日月食與新數所推相近然僅食一次尚未可憑仍須隨時考驗現屆本年八月十五日月食謹將新擬用數推算得時刻食分方位比較原推早見分秒另繕清單進呈至期臣等逐時測驗再行據實具奏報聞二十二年六月敬徵等又言每屆日月交食按新擬用數推算俱與實測相近至本年六月朔日食新推較之實測僅差數秒是新擬之數於日行已無疑義月行亦屬近合今擬先測恆星以符運度繼考日躔月離務合天行請以道光十四年甲午為元按新數日行黃赤大距修恆星黃赤道經緯度表即於測算時詳考五緯月行俾恆星五緯日月交食等書得以次第竣事從之是年七月以敬徵為修曆總裁監正周餘慶左監副高煜為副總裁二十五年七月進呈黃道經緯度表赤道經緯度表各十三卷月五星相距表一卷天漢界度表四卷經星彙考星首步天歌恆星總紀各一卷為儀象考成續編至日月交食五星行度俱闕而未備云時冬官正司廷棟撰凌犯視差新法用弧三角布算以限距地高及星距黃極以求黃經高弧三角較舊法為簡捷乾隆以後曆官能損益舊法廷棟一人而已其不為曆官而知曆者梅文鼎薛鳳祚王錫闡以下江永戴震錢大昕李善蘭為尤著其闡明中西曆理實遠出徐光啓李之藻等之上焉
