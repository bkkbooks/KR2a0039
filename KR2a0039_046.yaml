body:
  text: 清史稿卷四十六志二十一時憲二推步算術推步新法所用者曰平三角形曰弧三角形曰橢圓形今撮其大旨證立法之原驗用數之實都為一十六術著於篇平三角形者三直線相遇而成其線為邊兩線所夾空處為角有正角當全圓四分之一如甲乙丙形之甲角有鋭角不足四分之一如乙丙兩角有鈍角過四分之一如丁戊己形之戊角圖形尚無資料角之度無論多寡皆有其相當之八線曰正弦正矢正割正切所有度與九十度相減餘度之四線也如甲乙為本度則丙乙為餘度正弦乙戊正矢甲戊正割庚丁正切庚甲餘弦乙己餘矢丙己餘割辛丁餘切辛丙若壬癸為本度則丑癸為餘度正弦癸辰正矢壬辰餘弦癸卯餘矢丑卯餘割子寅餘切丑寅以壬癸過九十度無正割正切借癸午之子未為正割午未為正切若正九十度丑壬為本度則無餘度丑子半徑為正弦壬子半徑為正矢亦無正割正切並無餘弦餘矢餘割餘切古定全圓周為三百六十度四分之一稱一象限為九十度每度六十分每分六十秒圖形尚無資料每秒六十微圓半徑為十萬後改千萬逐度逐分求其八線備列於表推算三角在九十度內欲用某度某線就表取之算得某線欲知某度就表對之過九十度者欲用正弦正割正切及四餘以其度與半周相減餘就表取之欲用正矢取餘弦加半徑為之既得某線欲知某度就表對得其度與半周相減餘命之算平三角凡五術一曰對邊求對角以所知邊為一率對角正弦為二率所知又一邊為三率二三相乘一率除之求得四率為所不知之對角正弦如圖甲乙為所知邊丁角為所知對角乙丁為所知又一邊甲角為所不知對角也此其理係兩次比例省為一次如圖乙丁為半徑之比乙丙為丁角正弦之比法當先以半徑為一率丁角正弦為二率乙丁為三率求得四率中垂線乙丙既得乙丙甲乙為半徑之比乙丙又為甲角正弦之比乃以甲乙為一率乙丙為二率半徑為三率求得四率自為甲角正弦然後合而算之以先之一率半徑與後之一率甲乙相乘為共一率先之二率丁角正弦與後之二率乙丙相乘為共二率先之三率乙丁與後之三率半徑相乘為共三率求得四率自為先之四率乙丙與後之四率甲角正弦相乘數仍當以乙丙除之乃得甲角正弦後既當除不如先之勿乘共二率內之乙丙與三率相乘者也乘除相報乙丙宜省又共三率內之半徑與二率相乘者也共一率內之半徑又主除之乘除相報半徑又宜省故徑以甲乙為一率丁角正弦為二率乙丁為三率求得四率為甲角正弦二曰對角求對邊以所知角正弦為一率對邊為二率所知又一角正弦為三率求得四率為所不知對邊此其理具對邊求對角反觀自明三曰兩邊夾一角求不知之二角以所知角旁兩邊相加為一率相減餘為二率所知角與半周相減餘為外角半之取其正切為三率求得四率為半較角正切對表得度與半外角相加為對所知角旁略大邊之角相減餘為對所知角旁略小邊之角此其理一在平三角形三角相併必共成半周如圖甲乙丙形中垂線甲丁分為兩正角形正角為長方之半長方四角皆正九十度正角形兩鋭角斜剖長方此角過九十度之半幾何彼角不足九十度之半亦幾何一線徑過其勢然也故甲右邊分角必與乙角合為九十度甲左邊分角必與丙角合為九十度論正角形各加丁角皆成半周合為鋭角形除去丁角三角合亦自為半周故既知一角之外其餘二角雖不知各得幾何度分必知其共得此角減半周之餘也一在三角同式形比例如圖丙庚戊形知丙庚丙戊兩邊及丙角展丙庚為丙甲連丙戊為甲戊兩邊相加截丙戊於丙丁為戊丁兩邊相減餘作庚丁虛線丙庚丙丁同長庚丁向圓內二角必同度是皆為丙角之半外角與甲辛辛庚之度等而庚向圓外之角即本形庚角大於戊角之半是為半外角以庚丁為半徑之比則甲庚即為丁半外角正切之比半徑與正切恆為正角甲庚與庚丁圓內作兩通弦亦無不成正角故也又作丁己線與甲庚平行庚丁仍為半徑之比丁己又為庚向圓外半較角正切之比而戊甲庚大形與戊丁己小形戊甲戊丁既在一線甲庚丁己又係平行自然同式故甲戊兩邊相加為一率戊丁兩邊相減餘為二率甲庚半外角正切為三率求得四率自當丁己半較角正切也四曰兩角夾一邊求不知之一角以所知兩角相併與半周相減餘即得此其理具兩邊夾一角五曰三邊求角以大邊為底中小二邊相併相減兩數相乘大邊除之得數與大邊相加折半為分底大邊相減餘折半為分底小邊乃以中邊為一率分底大邊為二率半徑為三率求得四率為對小邊角餘弦或以小邊為一率分底小邊為二率半徑為三率求得四率為對中邊角餘弦此其理在勾股弦冪相求及兩方冪相較如圖甲丙中邊甲乙小邊皆為弦乙丙大邊由丁分之丁丙丁乙皆為勾中垂線甲丁為股勾股冪相併恆為弦冪今甲丁股既兩形所同則甲丙大弦冪多於甲乙小弦冪即同丙丁大勾冪多於乙丁小勾冪又兩方冪相較恆如兩方根和較相乘之數如圖戊寅壬庚為大方冪減去己卯辛庚小方冪餘戊己卯辛壬寅曲矩形移卯癸壬辛為癸寅丑子成一直方形其長戊丑自為大方根戊寅小方根卯辛之和其闊戊己自為大方根戊庚小方根己庚之較故甲乙丙形甲丙甲乙相加為和相減為較兩數相乘即如丙丁丁乙和較相乘之數丙乙除之自得其較丙午相加相減各折半自得丙丁及乙丁既得丙丁乙丁各以丙甲乙甲為半徑之比丙丁乙丁自為餘弦之比矣此五術者有四不待算一不可算對邊求對角令所知兩邊相等則所求角與所知角必相等對角求對邊令所知兩角相等則所求邊與所知邊必相等兩邊夾一角令所知兩邊相等則所求二角必正得所知外角之半三邊求角令二邊相等即分不等者之半為底邊三邊相等即平分半周三角皆六十度皆不待算也若對邊求對角所知一邊數少對所知一角鋭又所知一邊數多求所對之角不能知其為鋭為鈍是不可算也諸題求邊角未盡者互按得之弧三角形者三圓周相遇而成其邊亦以度計九十度為足少於九十度為小過九十度為大其角鋭鈍正與平三角等算術有七一曰對邊求對角以所知邊正弦為一率對角正弦為二率所知又一邊正弦為三率求得四率為所求對角正弦此其理亦係兩次比例省為一次如圖甲乙丙形知甲乙丙乙二邊及丙角求甲角作乙辛垂弧半徑與丙角正弦之比同於乙丙正弦與乙辛正弦之比法當以半徑為一率丙角正弦為二率乙丙正弦為三率求得四率為乙辛正弦既得乙辛正弦甲乙正弦與乙辛正弦之比同於半徑與甲角正弦之比乃以甲乙正弦為一率乙辛正弦為二率半徑為三率求得四率為甲角正弦然乘除相報可省省之二曰對角求對邊以所知角正弦為一率對邊正弦為二率所知又一角正弦為三率求得四率為所求對邊正弦此其理反觀自明三曰兩邊夾一角或鋭或鈍求不知之一邊以半徑為一率所知角餘弦為二率任以所知一邊正切為三率求得四率命為正切對表得度與所知又一邊相減餘為分邊乃以前得度餘弦為一率先用邊餘弦為二率分邊餘弦為三率求得四率為不知之邊餘弦原角鈍分邊大此邊小分邊小此邊大原角鋭分邊小此邊小分邊大此邊大此其理係三次比例省為二次如圖甲丙丁形知甲丙甲丁二邊及甲角中作垂弧丙乙半徑與甲角餘弦之比同於甲丙正切與甲乙正切之比先一算為易明既分甲丁於乙而得丁乙分邊甲乙餘弦與半徑之比同於甲丙餘弦與丙乙餘弦之比法當先以甲乙餘弦為一率半徑為二率甲丙餘弦為三率求得四率為丙乙餘弦既得丙乙餘弦半徑與乙丁餘弦之比同於丙乙餘弦與丁丙餘弦之比乃以半徑為一率乙丁餘弦為二率丙乙餘弦為三率求得四率為丁丙餘弦然而乘除相報故從省兩邊夾一角若正則徑以所知兩邊餘弦相乘半徑除之即得不知邊之餘弦理自明也所知兩邊俱大俱小此邊小所知兩邊一小一大此邊大四曰兩角夾一邊求不知之一角以角為邊以邊為角反求之得度反取之求取皆與半周相減五曰所知兩邊對所知兩角或鋭或鈍求不知之邊角以半徑為一率任以所知一角之餘弦為二率對所知又一角之邊正切為三率求得四率命為正切對表得度復以所知又一角一邊如法求之復得度視原所知兩角鋭鈍相同則兩得度相加不同則兩得度相減皆加減為不知之邊乃按第一術對邊求對角即得不知之角原又一角鈍對先用角之邊大於後得度此角鈍對先用角之邊小於後得度此角鋭原又一角鋭對先用角之邊小於後得度此角鈍對先用角之邊大於後得度此角鋭此其理係垂弧在形內與在形外之不同及角分鋭鈍邊殊大小前後左右俯仰向背之相應如圖甲乙丙形甲乙二角俱鋭兩鋭相向故垂弧丙丁從中取正而在形內己丙庚形己庚二角俱鈍兩鈍相向故垂弧戊丙亦在形內庚丙乙形庚乙兩角一鋭一鈍相違垂弧丙丁從外補正自在形外在形內者判底邊為二兩得分邊之度如乙丁丁甲合而成一底邊如乙甲故宜相加在形外者引底邊之餘兩得分邊之度如庚丁乙丁重而不掩底邊如庚乙故宜相減鋭鈍大小之相應亦如右圖審之所知兩邊對所知兩角有一正則一得度即為不知之邊理亦自明六曰三邊求角以所求角旁兩邊正弦相乘為一率半徑自乘為二率兩邊相減餘為較弧取其正矢與對邊之正矢相減餘為三率求得四率為所求角正矢此其理在兩次比例省為一次如圖甲壬乙形求甲角其正矢為丑丁法當以甲乙邊正弦乙丙為一率半徑乙己為二率兩邊較弧正矢乙癸與對邊正矢乙卯相減餘癸卯同辛子為三率求得四率為壬辛乃以甲壬邊正弦戊辛為一率壬辛為二率半徑己丁為三率求得四率為丑丁甲角正矢亦以乘除相報故從省焉七曰三角或鋭或鈍求邊以角為邊反求其角既得角復取為邊求取皆與半周相減此其理在次形如圖甲乙丙形甲角之度為丁戊與半周相減為戊己其度必同於次形子辛午之子辛邊蓋丑卯為乙之角度丑點之交甲乙弧必為正角丁戊為甲之角度戊點之交甲乙弧亦必為正角以一甲乙而交丑辛戊辛二弧皆成正角則二弧必皆九十度弧三角之勢如此也戊辛既九十度子己亦九十度去相覆之戊子己戊自同子辛於是庚癸必同子午卯未必同午辛理皆如是矣而此形之餘角既皆為彼形之邊彼形餘角不得不為此形之邊故反取之而得焉若三角有一正除正角外以一角之正弦為一率又一角之餘弦為二率半徑為三率求得四率為對又一角之邊餘弦此其理亦係次形而以正角及一角為次形之角以又一角加減象限為次形對角之邊取象稍異凡茲七術惟邊角相求有鋭鈍大小不能定者然推步無其題不備列此七題中求邊角有未盡者互按得之橢圓形者兩端徑長兩腰徑短之圓面然必其應規乃可推算作之之術任以兩點各為心一點為界各用一針釘之圍以絲線末以鉛筆代為界之針引而旋轉即成橢圓形如圖甲己午三點如法作之為丑午巳未橢圓寅丑寅巳為大半徑寅午寅未為小半徑寅甲為兩心差己甲為倍兩心差甲午數如寅巳亦同寅丑己午如之二數相和恆與丑巳同令午針引至申甲申申己長短雖殊共數不易甲午同大半徑之數如弦兩心差如勾小半徑如股但知兩數即可以勾股術得不知之一數若求面積以平方面率四為一率平圓面率三一四一五九二六五為二率大小徑相乘成長方面為三率求得四率為橢圓面積若求中率半徑大小半徑相乘平方開之即得然自甲心出線離丑右旋如圖至戌甲丑甲戌之間有所割之面積亦有所當之角度角積相求爰有四術一曰以角求積以半徑為一率所知角度正弦為二率倍兩心差為三率求得四率為倍兩心差之端垂線如己酉又以半徑為一率所知角度餘弦為二率倍兩心差為三率求得四率為界度積線引出之線如甲酉倍兩心差之端垂線為勾自乘以引出之線與甲戌己戌和如巳丑大徑者相加為股弦和除之得較和較相加折半為己戌弦與大徑相減為甲戌線又以半徑為一率所知角正弦為二率甲戌線為三率求得四率為戌亥邊又以小徑為一率大徑為二率戌亥邊為三率求得四率為辰亥邊又以大半徑寅辰同寅丑為一率半徑為二率辰亥邊為三率求得四率為正弦對表得度又以半周天一百八十度化秒為一率半圓周三一四一五九二六為二率所得度化秒為三率求得四率為比例弧線又以半徑為一率大半徑為二率比例弧線為三率求得四率為辰丑弧線與大半徑相乘折半為寅辰丑分平圓面積又以大半徑為一率小半徑為二率分平圓面積為三率求得四率為寅戌丑分橢圓面積乃以寅甲兩心差與戌亥邊相乘折半與寅戌丑相減為甲戌甲丑之間所割面積此其理具本圖及平三角弧三角其法至密二曰以積求角以兩心差減大半徑餘得甲丑線自乘為一率中率半徑自乘為二率甲戌甲丑之間面積為三率求得四率為中率面積如甲氐亢分橢圓面積為三百六十度取一度之面積為法除之即得甲戌甲丑之間所夾角度此其理為同式形比例然甲亢與甲氐同長甲戌則長於甲丑以所差不多借為同數若引戌至心甲丑甲心所差實多仍須用前法求甲戌線借甲戌甲心相近為同數求之三曰借積求積以所知面積如圖之辛甲丑用一度之面積為法除之得面積之度設其度為角度於倍兩心差之端如庚己丑以半徑為一率己角正弦為二率倍兩心差為三率求得四率為甲子垂線又以半徑為一率己角餘弦為二率倍兩心差為三率求得四率為己子分邊甲子為勾自乘己子與大徑相減餘為股弦和除之得股弦較和較相加折半得甲庚線又以甲庚線為一率甲子垂線為二率半徑為三率求得四率為庚角正弦得度與己角相加為庚甲丑角乃用以角求積法求得庚甲丑面積與辛甲丑面積相減餘如庚甲辛又用以積求角法求得度與庚甲丑角相加即得辛甲丑角四曰借角求角以所知面積如前法取為積度如丑甲丁設其度為角度於橢圓心如丁乙辛以小半徑為一率大半徑為二率所設角度正切為三率求得四率為丁乙癸角正切對表得度乃於倍兩心差之端丙作丙丑線即命丑丙甲角如癸乙丁之角度乃將丙丑線引長至寅使丑寅與甲丑等則丙寅同大徑又作甲寅線成甲寅丙三角形用切線分外角法求得寅角倍之為甲丙丑形之丑角與丙角相加為丑甲丁角此其理癸乙甲角度多於丑甲丁積度為子乙癸角度即以此度當前之補算辛甲庚者蓋所差無多也此四術內凡單言半徑者皆八線表一千萬之數圖形尚無資料
