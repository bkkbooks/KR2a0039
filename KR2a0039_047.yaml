body:
  text: 清史稿卷四十七志二十二時憲三康熙甲子元法上上卷述立法之原中卷志七政恆星之順軌下卷志諸曜相距之數日躔立法之原一求南北真線以正面位用方案極平作圜數層植表於圜心取日影識表末影切圜上者視左右兩點同在一圜聯為直線即正東西取東西線正中向圜心作垂線即正南北於京師以羅針較之偏東四度餘乾隆十七年改為二度三十分一測北極高度以定天體於冬至前後用儀器測勾陳大星出地之度酉時此星在北極之上候其漸轉而高至不復高而止卯時此星在北極之下候其漸轉而低至不復低而止以最高最低之度折中取之為北極高度恆星無地半徑差勾陳距地又高蒙氣差亦微其數確準以此測得暢春園北極高三十九度五十九分三十秒一求地半徑差以驗地心實高地面視高之不同康熙五十四年五月甲子午正在暢春園測得太陽高七十三度一十六分零二十三微同時於廣東廣州府測得太陽高九十度零六分二十一秒四十八微暢春園赤道距天頂三十九度五十九分三十秒廣州府赤道距天頂二十三度十分偏西三度三十三分時夏至後八日日躔最高用平三角形推得地半徑與太陽距地心比例如一與一千一百六十二又康熙五十五年三月丙申午正在暢春園測得太陽高五十三度零三分三十八秒一十微同時於廣東廣州府測得太陽高六十九度五十四分零八秒三十六微時春分後八日日躔中距推得地半徑與太陽距地心比例如一與一千一百四十二乃以太陽最高與本天半徑比例數一一七九二八與地半徑比例數一一六二之比為太陽最卑與本天半徑比例數九八二七九二與地半徑比例之比得一千一百二十一既得三限距地心之遠用平三角形逐度皆推得地半徑差一求黃赤距緯以正黃道康熙五十三年於暢春園纍測夏至午正太陽高度得視高七十三度二十九分十餘秒加地半徑差五十秒得實高七十三度三十分減去本地赤道高五十度零三十秒餘二十三度二十九分三十秒為黃赤大距用弧三角形逐度皆推得距緯一求清蒙氣差以驗地中遊氣映小為大升卑為高之數明萬曆間西人第谷於其國北極出地五十五度有奇測得地平上最大差三十四分自地平以上其差漸少至四十五度其差五秒更高無差其測算之法如太陽視高十度三十四分四十二秒距正午八十三度於時日躔降婁宮三度三十六分距赤道北一度二十六分北極距天頂五十度零三十秒用距正午距赤道北北極距天頂三度作弧三角形求得太陽實高十度二十七分五十三秒與視高相減又加地半徑差二分五十七秒得九分四十六秒為地平上十度三十五分之蒙氣差本法仍之一測歲實以定平行康熙五十四年二月癸未午正於暢春園測得太陽高五十度零三十二秒三十五微加地半徑差一分五十六秒零五微得實高五十度零二分二十八秒四十微此所加地半徑差仍新法算書舊數加之其實地半徑與太陽距地心比例高卑中距三限次年始定覆推無異故不改也至求地半徑差取春分及夏至後八日亦仍舊算其實最高之限纍日測得不在預定夏至中距之限既未定歲實亦轉由最卑而得其準最高最卑之比例則在交食也其廣州府偏西度蓋先測月食時刻得之與赤道高五十度零三十秒相減餘一分五十八秒四十微為太陽在赤道北之緯度知春分時在午正前以此緯度及黃赤大距作弧三角形推得黃道度四分五十七秒四十三微為太陽過春分經度次日午正復測得緯度推得太陽過春分一度零四分零六秒零三微兩過春分度相減餘為一日之行五十九分零八秒二十微比例得本日春分在巳初三刻十四分十秒四十八微又康熙五十五年二月戊子午正於暢春園測得太陽高四十九度五十四分四十九秒五十一微依法求之得本日春分在申初三刻二分五十五秒四十八微總計兩春分相距三百六十五日五時三刻三分四十五秒為歲實為法除天周得每日平行一求兩心差及最高所在以考盈縮康熙五十六年二至後暢春園逐日測午正太陽高度求其經度各用本日次日比測之實行推得五月甲戌辰正一刻零四十秒四十五微交未宮七度乙亥巳初一刻十四分五十七秒二十七微交未宮八度十一月丁丑子正一刻一十二分五十七秒四十一微交丑宮七度本日夜子初三刻十二分二十七秒四十七微交丑宮八度用此兩數以立法如圖甲為地心即宗動天心乙丙丁戊為黃道與宗動天同心乙為夏至丙為秋分丁為冬至戊為春分又設己點為心作庚辛壬癸圈為不同心天庚為最高當黃道子壬為最卑當黃道丑寅卯為中距過己甲兩心作庚丑線則平分本天與黃道各為兩半周夏至乙至冬至丁引出乙丁線割不同心天之左半大於半周歲秋分丙至春分戊引出丙戊線割不同心天之下半小於半周歲今測未宮七度至丑宮七度歷一百八十二日一十六時一十二分一十六秒五十六微大於半周歲一時一十七分五十四秒二十六微未宮八度至丑宮八度歷一百八十二日一十四時二十七分三十秒二十微小於半周歲二十六分五十二秒一十微即知未宮七度在最高前如辰八度在最高後如巳丑宮七度在最卑前如午八度在最卑後如未以大小兩數相併與辰巳或午未一度之比同於大於半周歲之數與辰子或午丑之比得四十四分三十六秒四十八微與乙辰或丁午之七度相加為高卑過二至之度以最高卑每歲有行分今合高卑以立算定為本年中距過秋分之度又用比例法推得秋分後丙午日巳正一刻十三分四十九秒過中距若在黃道應從最高子行九十度至寅為辰宮七度四十四分三十六秒四十八微以實測求之在申不及二度零三分零九秒四十微檢其正切得三五八四一六為設本天半徑一千萬之己甲兩心差又本年暢春園測得春分為二月癸巳亥初二刻六分四十七秒立夏為三月己卯亥正二刻一分三十六秒秋分為八月庚子申初二刻四分三秒各計其相距之日推得平行度以立算如圖甲為地心乙丙丁戊為黃道戊為春分巳為夏至丙為秋分庚為冬至辛為立夏子丑寅卯為不同心天壬為天心春分時太陽在子立夏在癸秋分在寅丑為最高卯為最卑求壬甲兩心差並求辛甲乙角為最高距立夏取甲辰子平三角形及壬己甲勾股形求得壬甲為三五八九七七比前數多一千萬分之五百六十一又求得甲角五十三度三十八分二十五秒五十五微為最高距立夏內減夏至距立夏四十五度得最高過夏至後八度三十八分二十五秒五十五微皆與前數不合於是定用於兩心差分設本輪均輪之法一求最高行及本輪均輪半徑以定盈縮康熙十七年測得最高在夏至後七度零四分零四秒五十六年測得最高在夏至後七度四十三分四十九秒約得每年東行一分一秒十微又定本天半徑為一千萬用兩心差四分之三為本輪半徑其一為均輪半徑如圖甲為地心即本天心乙丙丁戊為本天注左右上下為本輪最小圈為均輪寅為太陽最高辰為最卑本輪心循本天周起冬至右旋為平行均輪心循本輪周起最卑左旋為引數二輪之行相較即最卑行太陽循均輪周右旋均輪在最高最卑則最近於本輪心如寅辰均輪在中距則最遠於本輪心如卯己其行倍於均輪積點者舊設不同心天數與均輪不合一立矇影刻分限以定晨昏測得在太陽未出之先已入之後距地平一十八度內月離立法之原一求平行度依西人依巴谷法定為一十二萬六千零七日四刻為兩月食各率齊同之距會望轉終皆復其始計其中積凡為會望者四千二百六十七為轉終者四千五百七十三置中積日刻為實會望數除之得會望策乃以天周為實會望策除之為每日太陰平行距太陽之度加太陽每日平行為每日太陰平行白道經度又置中積日刻為實轉終數除之得轉終分置天周為實轉終分除之為每日太陰自行度每日白道經度與自行度相減為每日最高行一推本輪半徑及最高以考遲疾西人第谷測三月食如第一食日躔鶉首宮七度三十五分四十七秒五十三微月離星紀宮度分秒同月行遲末限之初第二食日躔壽星宮初度月離降婁宮度同月行遲初限將半第三食日躔星紀宮二度五十四分零二秒四十九微月離鶉首宮度分秒同月行疾末限之初第一食距第二食一千一百八十日二十二時一十四分零四秒實行相距八十二度二十四分一十二秒零七微平行相距八十度二十一分一十秒自行相距三百零八度四十七分零七秒二十七微第二食距第三食一千九百一十八日二十三時零五分五十七秒實行相距九十二度五十四分零二秒四十九微平行相距八十五度零二十五秒自行相距二百三十一度一十二分五十二秒三十三微用平三角形推得本輪半徑為本天半徑十萬分之八千七百又推得最高行度計至崇禎元年首朔月過最高三十七度三十四分三十四秒然泛以三月食推之本輪半徑之數不合故設均輪一立四輪之行以定遲疾西人第谷徵諸實測將本輪半徑三分之存其二為本輪半徑其一為均輪半徑本法仍之定本輪心起本天冬至右旋為平行度增一負均輪之圈其半徑為新本輪半徑加一次輪半徑之數其心同本輪之心本輪負而行不自行移均輪心從最高左旋行於此圈之周為自行引數第谷又將次輪設於地心而增次均輪本法易之定次輪心行均輪周從最近右旋為倍引數其半徑為本天半徑千萬分之二十一萬七千次均輪心行次輪周起於朔望從次輪最近地心點右旋行太陰距太陽之倍度為倍離其半徑為本天半徑千萬分之一十一萬七千五百太陰行次均輪之周從次均輪最下左旋亦行倍離如圖甲為地心即本天心乙丙丁為本天之一弧丙甲為半徑戊為半輪最高癸為最卑酉為負圈最高丑為最卑壬為均輪最遠辛為最近寅為次輪最遠亥為最近土為次均輪最上木為最下即均輪心在最高又當朔望之象又圖太陰在戌是均輪既左旋又當朔望之象其得次輪次均輪半徑於上下弦當自行三宮或九宮時纍測之得極圖形尚無資料大均數七度二十五分四十六秒其切線一百三十萬四千內減本輪均輪並半徑餘半之即次輪半徑於兩弦及朔望之間當自行三宮或九宮時纍測之均數常與推算不合差至四十一分零二秒依法求其半徑得次均輪半徑一以兩月食定交周順治十三年十一月庚申望子正後十八時四十四分十五秒月食十五分四十七秒在黃道南日纏星紀宮十度三十九分在最卑後三度四十九分月自行為三宮二十七度四十六分康熙十三年十二月丙午望子正後三時二十三分二十六秒月食十五分五十秒在黃道南日纏星紀宮二十一度五十二分在最卑後十四度二十一分月自行為三宮二十五度二十四分相距中積二百二十三月用西人依巴谷朔策定數五千四百五十八為一率交終定數五千九百二十三為二率二百二十三月為三率得四率二百四十一又五千四百五十八分之五千四百五十一為兩次月食相距之交終數又以兩次月食相距中積六千五百八十五日零八時三十九分十秒與每日太陰平行經度相乘以交終數除之得一百二十九萬零八百一十二秒小餘八七九五九八為每一交行度與周天秒數相減餘五千一百八十七秒小餘一二四二為每一交退行度又以交終數除兩次月食相距中積日分得二十七日二一二二三三為交周日分乃以交周日分除每一交退行度得三分十秒三十七