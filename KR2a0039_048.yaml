body:
  text: 清史稿卷四十八志二十三時憲四康熙甲子元法中日躔用數康熙二十三年甲子天正冬至為法元癸亥年十一月冬至周天三百六十度平分之為半周四分之為象限十二分之為宮每度六十分秒微纖以下皆以六十遞析周天入算化作一百二十九萬六千秒周日一萬分時則二十四刻則九十六刻下分則一千四百四十秒則八萬六千四百周歲三百六十五日二四二一八七五紀法六十宿法二十八太陽每日平行三千五百四十八秒小餘三三五一六九最卑歲行六十一秒小餘一六六六六最卑日行十分秒之一又六七四六九本天半徑一千萬本輪半徑二十六萬八千八百一十二均輪半徑八萬九千六百零四宿度見天文志歲差五十一秒各省及蒙古北極高度東西偏度見天文志黃赤大距二十三度二十九分三十秒最卑應七度十分十一秒十微氣應七日六五六三七四九二六宿應五日六五六三七四九二六日干甲乙丙丁戊己庚辛壬癸支子丑寅卯辰巳午未申酉戌亥宿名角亢氐房心尾箕斗牛女虛危室壁奎婁胃昂畢參觜井鬼柳星張翼軫時名從十二支各分初正起子正盡夜子初推日躔法求天正冬至置周歲以距元年數減一得積年乘之得中積分加氣應得通積分上考往古則減氣應得通積分其日滿紀法去之餘為天正冬至日分上考往古則以所餘轉與紀法相減餘為天正冬至日分自初日起甲子其小餘以刻下分通之如法收為時刻周日一萬分為一率小餘為二率刻下分為三率求得四率為時分滿六十分收為一時十五分收為一刻初時起子正中積分加宿應滿宿法去之為天正冬至值宿日分初日起角宿求平行以周日為一率太陽每日平行為二率天正冬至小餘與周日相減餘為三率求得四率為年根秒數又置太陽每日平行以本日距冬至次日數乘之得數為秒與年根相併以宮度分收之得平行求實行置最卑歲行以積年乘之又置最卑日行以距冬至次日數乘之兩數相併加最卑應上考則減最卑應以減平行為引數用平三角形以本輪半徑三分之二為對正角之邊以引數為一角求得對角之邊倍之又求得對又一角之邊與本天半徑相加減引數三宮至八宮則相加九宮至二宮則相減復用平三角形以加倍之數為小邊加減本天半徑之數為大邊正角在兩邊之中求得對小邊之角為均數置平行以均數加減之引數初宮至五宮為加六宮至十一宮為減得實行求宿度以積年乘歲差得數加甲子法元黃道宿度為本年宿鈐以減實行餘為日躔宿度若實行不及減宿鈐退一宿減之求紀日值宿置距冬至次日數加冬至日滿紀法去之初日起甲子加冬至值宿日滿宿法去之初日起角宿得紀日值宿求節氣時刻日躔初宮丑星紀初度為冬至十五度為小寒一宮子元枵初度為大寒十五度為立春二宮亥娵訾初度為雨水十五度為驚蟄三宮戌降婁初度為春分十五度為清明四宮酉大梁初度為穀雨十五度為立夏五宮申實沈初度為小滿十五度為芒種六宮未鶉首初度為夏至十五度為小暑七宮午鶉火初度為大暑十五度為立秋八宮巳鶉尾初度為處暑十五度為白露九宮辰壽星初度為秋分十五度為寒露十宮卯大火初度為霜降十五度為立冬十一宮寅析木初度為小雪十五度為大雪皆以子正日躔未交節氣宮度者為交節氣本日已過節氣宮度者為交節氣次日乃以本日實行與次日實行相減為一率每日刻下分為二率本日子正實行與節氣宮度相減為三率求得四率為距子正後之分數乃以時刻收之即得節氣初正時刻如實行適與節氣宮度相符而無餘分即為子正初刻求各省節氣時刻皆以京師為主視偏度加減之每偏一度加減時之四分偏東則加偏西則減推節氣用時法以交節氣本日均數變時為均數時差反其加減又以半徑為一率黃赤大距餘弦為二率本節氣黃道度正切為三率求得四率為赤道正切檢表得度與黃道相減餘變時為升度時差二分後為加二至後為減皆加減節氣時刻為節氣用時求距緯度以本天半徑為一率黃赤大距度之正弦為二率實行距春秋分前後度之正弦為三率實行初宮初度至二宮末度與三宮相減餘為春分前三宮初度至五宮末度則減去三宮為春分後六宮初度至八宮末度與九宮相減餘為秋分前九宮初度至十一宮末度則減去九宮為秋分後求得四率為正弦檢表得距緯度實行三宮至八宮其緯在赤道北九宮至二宮其緯在赤道南求日出入晝夜時刻以本天半徑為一率北極高度之正切為二率本日距緯度之正切為三率求得四率為正弦檢表得日出入在卯酉前後赤道度變時一度變時之四分凡言變時皆倣此為距卯酉分以加減卯酉時即得日出入時刻春分前秋分後以加卯正為日出減酉正為日入春分後秋分前以減卯正為日出加酉正為日入又倍距卯酉分以加減半晝分得晝夜時刻春分後以加得晝刻以減得夜刻秋分後反是月離用數太陰每日平行四萬七千四百三十五秒小餘二一一七七太陰每時四刻平行一千九百七十六秒小餘四五九二一五七月孛即最高每日行四百一秒小餘七七四七七正交每日平行一百九十秒小餘六四本輪半徑五十八萬均輪半徑二十九萬負圈半徑七十九萬七千次輪半徑二十一萬七千次均輪半徑一十一萬七千五百朔望黃白大距四度五十八分三十秒兩弦黃白大距五度一十七分三十秒黃白大距中數五度八分黃白大距半較九分三十秒太陰平行應一宮八度四十分五十七秒十六微月孛應三宮四度四十九分五十四秒九微正交應六宮二十七度十三分三十七秒四十八微推月離法求天正冬至同日躔求太陰平行置中積分加氣應詳日躔小餘不用日下同減天正冬至小餘得積日上考則減氣應小餘加天正冬至小餘與太陰每日平行相乘滿周天秒數去之餘數收為宮度分以加太陰平行應得太陰年根上考則減又置太陰每日平行以距天正冬至次日數乘之得數為秒以宮度分收之與年根相併滿十二宮去之為太陰平行求月孛行以積日見前條下同與月孛每日行相乘滿周天秒數去之餘數收為宮度分以加月孛應得月孛年根上考則減又置月孛每日行以距天正冬至次日數乘之得數為秒以宮度分收之與年根相併滿十二宮去之為月孛行求正交平行以積日與正交每日平行相乘滿周天秒數去之餘數收為宮度分以減正交應正交應不足減者加十二宮減之得正交年根上考則加又置正交每日平行以距天正冬至次日數乘之得數為秒以宮度分收之以減年根年根不足減者加十二宮減之為正交平行求用時太陰平行以本日太陽均數變時詳日躔得均數時差均數加者時差為減均數減者時差為加又以本日太陽黃赤經度詳日躔相減餘數變時得升度時差二分後為加二至後為減乃以兩時差相加減為時差總兩時差加減同號者則相加為總加者仍為加減者仍為減加減異號者則相減為總加數大者為加減數大者為減化秒與太陰每時平行相乘為實以一度化秒為法除之得數為秒以度分收之得時差行以加減太陰平行時差總為加者則減減者則加為用時太陰平行求初實行置用時太陰平行減去月孛行得引數用平三角形以本輪半徑之半為對正角之邊以引數為一角求得對角之邊三因之又求得對又一角之邊與本天半徑相加減引數九宮至二宮相加三宮至八宮相減復用平三角形以三因數為小邊加減本天半徑數為大邊正角在兩邊之中求得對小邊之角為初均數幷求得對正角之邊即次輪最近點距地心之線乃置用時太陰平行以初均數加減之引數初宮至五宮為減六宮以後為加為初實行求白道實行置初實行減本日太陽實行得次引即距日度用平三角形以次輪最近點距地心線為一邊倍次引之通弦本天半徑為一率次引之正弦為二率次輪半徑為三率求得四率倍之即通弦為一邊以初均數與引數減半周之度引數不及半周則與半周相減如過半周則減去半周相加又以次引距象限度次引不及象限則與象限相減如過象限及過三象限則減去象限及三象限用其餘如過二象限則減去二象限餘數仍與象限相減為次引距象限度加減之初均數減者次引過象限或過三象限則相加不過象限或過二象限則相減初均數加者反是為所夾之角若相加過半周則與全周相減用其餘為所夾之角若相加適足半周或相減無餘則無二均數若次引為初度或適足半周亦無二均數求得對通弦之角為二均數如無初均數以次輪心距地心為一邊次輪半徑為一邊次引倍數為所夾之角次引過半周者與全周相減用其餘在最高為所夾之內角在最卑為所夾之外角求得對次輪半徑之角為二均數隨定其加減號以初均數與均輪心距最卑之度相加為加減泛限泛限適足九十度則二均加減與初均同如泛限不足九十度則與九十度相減餘數倍之為加減定限初均減者以次引倍度初均加者以次引倍度減全周之餘數皆與定限較如泛限過九十度者減去九十度餘數倍之為加減定限初均加者以次引倍度初均減者以次引倍度減全周之餘數皆與定限較並以大於定限則二均之加減與初均同小於定限者反是幷求得對角之邊為次均輪心距地心線又以此線及次引用平三角形以次均輪心距地為一邊次均輪半徑為一邊次引倍度為所夾之角次引過半周者與全周相減用其餘求得對次均輪半徑之角為三均數隨定其加減號次引倍度不及半周為加過半周為減乃以二均數與三均數相加減為二三均數兩均數同號則相加異號則相減以加減初實行兩均數同為加者仍為加同為減者仍為減一為加一為減者加數大為加減數大為減為白道實行求黃道實行用弧三角形以黃白大距中數為一邊大距半較為一邊次引倍度為所夾之角次引過半周與全周相減用其餘求得對角之邊為黃白大距並求得對半較之角為交均以交均加減正交平行次引倍度不及半周為減過半周為加得正交實行又加減六宮為中交實行置白道實行減正交實行得距交實行以本天半徑為一率黃白大距之餘弦為二率距交實行之正切為三率求得四率為黃道之正切檢表得度分與距交實行相減餘為升度差以加減白道實行距交實行不過象限或過二象限為減過象限及過三象限為加為黃道實行求黃道緯度以本天半徑為一率黃白大距之正弦為二率距交實行之正弦為三率求得四率為正弦檢表得黃道緯度距交實行初宮至五宮為黃道北六宮至十一宮為黃道南求四種宿度依日躔求宿度法求得本年黃道宿鈐以黃道實行月孛行及正交中交實行各度分視其足減宿鈐內某宿則減之餘為四種宿度求紀日值宿同日躔求交宮時刻以太陰本日實行與次日實行相減未過宮為本日已過宮為次日餘為一率刻下分為二率太陰本日實行不用宮與三十度相減餘為三率求得四率為距子正分數如法收之得交宮時刻求太陰出入時刻以本日太陽黃道經度求其相當赤道經度又用弧三角形以太陰距黃極為一邊黃極距北極為一邊即黃赤大距太陰距冬至黃道經度為所夾之外角過半周者與全周相減用其餘求得對邊為太陰距北極度與九十度相減得赤道緯度不及九十度者與九十度相減餘為北緯過九十度者減去九十度餘為南緯又求得近北極之角為太陰距冬至赤道經度乃以本天半徑為一率北極高度之正切為二率太陰赤道緯度之正切