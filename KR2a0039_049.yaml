body:
  text: 清史稿卷四十九志二十四時憲五康熙甲子元法下月食用數朔策二十九日五三五九三望策十四日七六五二九六五太陽平行朔策一十萬四千七百八十四秒小餘三四三二四太陽引數朔策一十萬四千七百七十九秒小餘三五八八六五太陰引數朔策九萬二千九百四十秒小餘二四八五九太陰交周朔策十一萬四百十四秒小餘一六五七四太陽平行望策十四度三十三分十二秒九微太陽引數望策十四度三十三分九秒四十一微太陰引數望策六宮十二度五十四分三十秒七微太陰交周望策六宮十五度二十分七秒太陽一小時平行一百四十七秒小餘八四七一四九太陽一小時引數一百四十七秒小餘八四一二七太陰一小時引數一千九百五十九秒小餘七四七六五四二太陰一小時交周一千九百八十四秒小餘四二五四九月距日一小時平行一千八百二十八秒小餘六一二一一八太陽光分半徑六百三十七太陰實半徑二十七地半徑一百太陽最高距地一千十七萬九千二百八與地半徑之比例為十一萬六千二百太陰最高距地一千十七萬二千五百與地半徑之比例為五千八百一十六朔應二十六日三八五二六六六首朔太陽平行應初宮二十六度二十分四十二秒五十七微首朔太陽引數應初宮十九度一十分二十七秒二十一微首朔太陰引數應九宮十八度三十四分二十六秒十六微首朔太陰交周應六宮初度三十分五十五秒十四微餘見日躔月離推月食法求天正冬至同日躔求紀日以天正冬至日數加一日得紀日求首朔先求得積日同月離置積日減朔應得通朔上考則加以朔策除之得數加一為積朔餘數轉減朔策為首朔上考則除得之數即積朔不用加一餘數即首朔不用轉減求太陰入食限置積朔以太陰交周朔策乘之滿周天秒數去之餘為積朔太陰交周加首朔太陰交周應得首朔太陰交周上考則置首朔交周應減積朔交周又加太陰交周望策再以交周朔策遞加十三次得逐月望太陰平交周視某月交周入可食之限即為有食之月交周自五宮十五度六分至六宮十四度五十四分自十一宮十五度六分至初宮十四度五十四分皆可食之限再於實交周詳之求平望以太陰入食限月數與朔策相乘加望策再加首朔日分及紀日滿紀法去之餘為平望日分自初日起甲子得平望干支以刻下分通其小餘如法收之初時起子正得時刻分秒求太陽平行置積朔加太陰入食限之月數為通月以太陽平行朔策乘之滿周天秒數去之加首朔太陽平行應上考則減又加太陽平行望策即得求太陽平引置通月以太陽引數朔策乘之去周天秒數加首朔太陽引數應上考則減又加太陽引數望策即得求太陰平引置通月以太陰引數朔策乘之去周天秒數加首朔太陰引數應上考則減又加太陰引數望策即得求太陽實引以太陽平引依日躔法求得太陽均數以太陰平引依月離法求得太陰初均數兩均數相加減為距弧兩均同號相減異號相加以月距日一小時平行為一率一小時化秒為二率距弧化秒為三率求得四率為距時秒隨定其加減號兩均同號日大仍之日小反之兩均一加一減其加減從日又以一小時化秒為一率太陽一小時引數為二率距時秒為三率求得四率為秒以度分收之為太陽引弧依距時加減號以加減太陽平引得實引求太陰實引以一小時化秒為一率太陰一小時引數為二率距時秒為三率求得四率為秒以度分收之為太陰引弧依距時加減號以加減太陰平引得實引求實望以太陽實引復求均數為日實均並求得太陽距地心線即實均第二平三角形對正角之邊以太陰實引復求均數為月實均並求得太陰距地心線法同太陽兩均相加減為實距弧加減與距弧同依前求距時法求得時分為實距時以加減平望加減與距時同得實望加滿二十四時則實望進一日不足減者借一日作二十四時減之則實望退一日求實交周以一小時化秒為一率太陰一小時交周為二率實距時化秒為三率求得四率為秒以度分收之為交周距弧以加減太陰交周依實距時加減號又以月實均加減之為實交周若實交周入必食之限為有食自五宮十七度四十三分五秒至六宮十二度十六分五十五秒自十一宮十七度四十三分五秒至初宮十二度十六分五十五秒為必食之限不入此限者不必布算求太陽黃赤道實經度以一小時化秒為一率太陽一小時平行為二率實距時化秒為三率求得四率為秒以度分收之為太陽距弧依時距時加減號以加減太陽平行又以日實均加減之即黃道經度又用弧三角形求得赤道經度詳月離求太陰出入時刻條求實望用時以日實均變時為均數時差以升度差黃赤道經度之較變時為升度時差兩時差相加減為時差總加減之法詳月離求用時平行條以加減實望為實望用時距日出後日入前九刻以內者可以見食九刻以外者全在晝不必算求食甚時刻以本天半徑為一率黃白大距之餘弦為二率實交周之正切為三率求得四率為正切檢表得食甚交周與實交周相減為交周升度差又以太陰一小時引數與太陰實引相加依月離求初均法算之為後均以後均與月實均相加減兩均同號相減異號相加得數又與一小時月距日平行相加減兩均同加後均大則加小則減兩均同減後均大則減小則加兩均一加一減其加減從後均為月距日實行乃以月距日實行化秒為一率一小時化秒為二率交周升度差化秒為三率求得四率為秒以時分收之得食甚距時以加減實望用時實交周初宮六宮為減五宮十一宮為加為食甚時刻求食甚距緯以本天半徑為一率黃白大距之正弦為二率實交周之正弦為三率求得四率為正弦檢表得食甚距緯實交周初宮五宮為北六宮十一宮為南求太陰半徑以太陰最高距地為一率地半徑比例數為二率太陰距地心線內減去次均輪半徑為三率求得四率為太陰距地又以太陰距地為一率太陰實半徑為二率本天半徑為三率求得四率為正弦檢表得太陰半徑求地影半徑以太陽最高距地為一率地半徑比例數為二率太陽距地心線為三率求得四率為太陽距地又以太陽光分半徑內減地半徑為一率太陽距地為二率地半徑為三率求得四率為地影之長又以地影長為一率地半徑為二率本天半徑為三率求得四率為正弦檢表得地影角又以本天半徑為一率地影角之正切為二率地影長內減太陰距地為三率求得四率為太陰所入地影之闊乃以太陰距地為一率地影之闊為二率本天半徑為三率求得四率為正切檢表得地影半徑求食分以太陰全徑為一率十分為二率併徑太陰地影兩半徑相併內減食甚距緯之較併徑不及減距緯即不食為三率求得四率即食分求初虧復圓時刻以食甚距緯之餘弦為一率併徑之餘弦為二率半徑千萬為三率求得四率為餘弦檢表得初虧復圓距弧又以月距日實行化秒為一率一小時化秒為二率初虧復圓距弧化秒為三率求得四率為秒以時分收之為初虧復圓距時以加減食甚時刻得初虧復圓時刻減得初虧加得復圓求食既生光時刻以食甚距緯之餘弦為一率兩半徑較之餘弦為二率半徑千萬為三率求得四率為餘弦檢表得食既生光距弧又以月距日實行化秒為一率一小時化秒為二率食既生光距弧化秒為三率求得四率為秒以時分收之為食既生光距時以加減食甚時刻得食既生光時刻減得食既加得生光求食限總時以初虧復圓距時倍之即得求太陰黃道經緯度置太陽黃道經度加減六宮過六宮則減去六宮不及六宮則加六宮再加減食甚距弧又加減黃白升度差求升度差法詳月離求黃道實行條得太陰黃道經度求緯度詳月離求太陰赤道經緯度詳月離求太陰出入時刻條求宿度同日躔求黃道地平交角以食甚時刻變赤道度每時之四分變一度又於太陽赤道經度內減三宮不及減者加十二宮減之餘為太陽距春分赤道度兩數相加滿全周去之為春分距子正赤道度與半周相減得春分距午正東西赤道度過半周者減去半周為午正西不及半周者去減半周為午正東春分距午正東西度過象限者與半周相減餘為秋分距午正東西赤道度秋分距午東西與春分相反以春秋分距午正東西度與九十度相減餘為春秋分距地平赤道度乃用為弧三角形之一邊以黃赤大距及赤道地平交角即赤道地平上高度春分午西秋分午東者用此若春分午東秋分午西者則以此度與半周相減用其餘為邊傍之兩角求得對邊之角為黃道地平交角春分午東秋分午西者得數即為黃道地平交角春分午西秋分午東者則以得數與半周相減餘為黃道地平交角求黃道高弧交角以黃道地平交角之正弦為一率赤道地平交角之正弦為二率春秋分距地平赤道度之正弦為三率求得四率為正弦檢表得春秋分距地平黃道度又視春秋分在地平上者以太陰黃道經度與三宮九宮相減春分與三宮相減秋分與九宮相減餘為太陰距春秋分黃道度春秋分宮度大於太陰宮度為距春秋分前反此則在後又以春秋分距地平黃道度與太陰距春秋分黃道度相加減為太陰距地平黃道度春秋分在午正西者太陰在分後則加在分前則減春秋分在午正東者反是隨視其距限之東西春秋分在午正西者太陰距地平黃道度不及九十度為限西過九十度為限東春秋分在午正東者反是乃以太陰距地平黃道度之餘弦為一率本天半徑為二率黃道地平交角之餘切為三率求得四率為正切檢表得黃道高弧交角求初虧復圓定交角置食甚交周以初虧復圓距弧加減之得初虧復圓交周減得初虧加得復圓乃以本天半徑為一率黃白大距之正弦為二率初虧交周之正弦為三率求得四率為正弦檢表得初虧距緯又以復圓交周之正弦為三率一率二率同前求得四率為正弦檢表得復圓距緯交周初宮五宮為緯北六宮十一宮為緯南又以併徑之正弦為一率初虧復圓距緯之正弦各為二率半徑千萬為三率各求得四率為正弦檢表得初虧復圓兩緯差角以兩緯差角各與黃道高弧交角相加減得初虧復圓定交角初虧限東緯南則加緯北則減限西緯南則減緯北則加復圓反是若初虧復圓無緯差角即以黃道高弧交角為定交角求初虧復圓方位食在限東者定交角在四十五度以內初虧下偏左復圓上偏右四十五度以外初虧左偏下復圓右偏上適足九十度初虧正左復圓正右過九十度初虧左偏上復圓右偏下食在限西者定交角四十五度以內初虧上偏左復圓下偏右四十五度以外初虧左偏上復圓右偏下適足九十度初虧正左復圓正右過九十度初虧左偏下復圓右偏上京師黃平象限恆在天頂南定方位如此在天頂北反是求帶食分秒以本日日出或日入時分初虧或食甚在日入前者為帶食出地用日入分食甚或復圓在日出後者為帶食入地用日出分與食甚時分相減餘為帶食距時以一小時化秒為一率一小時月距日實行化秒為二率帶食距時化秒為三率求得四率為秒以度分收之為帶食距弧又以半徑千萬為一率帶食距弧之餘切為二率食甚距緯之餘弦為三率求得四率為餘切檢表得帶食兩心相距之弧乃以太陰全徑為一率十分為二率併徑內減帶食兩心相距之餘為三率求得四率即帶食分秒求各省月食時刻以各省距京師東西偏度變時每偏一度變時之四分加減京師月食時刻即得東加西減求各省月食方位以各省赤道高度及月食時