body:
  text: 清史稿卷五十志二十五時憲六雍正癸卯元法上日躔改法之原一更定歲實以衡消長歲實古多而今少故授時有消長之術西人第谷所定減郭守敬萬分之三至奈端等屢加測驗謂第谷所減太過定為三百六十五日二四二三三四四二一四一五比第谷所定多萬分之一有奇以除周天三百六十度得每日平行比第谷所定少五纖有奇本法用之一更定黃赤距緯以徵翕闢黃赤大距古闊而今狹恆有減而無增西人利酌理噶西尼測定黃赤大距二十三度二十九分比第谷所定少二分三十秒比刻白爾所定少一分本法用之一細考清蒙氣差以祛歧視西人第谷悟得蒙氣繞地球之周日月星照蒙氣之外人在地面為蒙氣所映必能視之使高而日月星之光線入蒙氣之中必反折之使下故光線與視線蒙氣之內合而為一蒙氣之外歧而為二二線所交即為蒙氣差角然未有算術噶西尼反覆精求謂視線光線所歧雖有不同相合則有定處自地心過所合處作線抵圓周即為蒙氣割線視線與割線成一角光線與割線亦成一角二角相減得蒙氣差角爰在北極出地高四十四度處屢加精測得地平上最大差為三十二分一十九秒蒙氣之厚為地半徑千萬分之六千零九十五視線角與光線角正弦之比例常如一千萬與一千萬零二千八百四十一用是推得逐度蒙氣差本法用之如圖甲為地心乙為地面丙乙為蒙氣之厚丑甲為割線癸乙為視線子戊為光線癸戊子為蒙氣差角癸寅子卯為兩正弦一細考地半徑差以辨蒙雜康熙十一年壬子秒分前十四日夜半火星與太陽衝西人噶西尼於富郎濟亞國測得火星距天頂五十九度四十分一十五秒利實爾於同一子午線之噶耶那島測得火星距天頂一十五度四十七分五秒同時用有千里鏡能測秒微之儀器與子午線上最近一恆星測其相距噶西尼所得火星較低一十五秒因恆星無地半徑差以之立法用平三角形推得火星在地平上最大地半徑差二十五秒小餘三七又據歌白尼第谷測得火星距地與太陽距地之比如一百與二百六十六用轉比例法求得太陽在中距時地平上最大地半徑差一十秒其逐度之差以半徑與正弦為比例本法用之以求地半徑與日天半徑之比例中距為一與二萬零六百二十六最高為一與二萬零九百七十五最卑為一與二萬零二百七十七地平上最大地半徑差最高為九秒五十微最卑為一十秒一十微一用橢圓面積為平行以酌中數西人刻白爾以來屢加精測盈縮之最大差止一度五十六分一十二秒以推逐度盈縮差最高前後本輪失之小均輪失之大最卑前後本輪失之大均輪失之小乃以盈縮最大差折半檢其正弦得一六九為兩心差以本天心距最高卑為一千萬作橢圓自地心出線均分其面積為平行度以所夾之角為實行度以推盈縮在本輪均輪所得數之間而逐度推求苦無算術噶西尼等乃立角積相求諸法驗諸實測斯為吻合本法用之如圖甲為地心乙為本天心丁為最高丙為最卑戊己為中距瓜分之面積為平行所對之平圓周角度為黃道實行一更定最卑行以正引數西人噶西尼等測得每歲平行一分二秒五十九微五十一纖零八忽比甲子元法多一秒四十九微有奇本法用之一更定平行所在以正歲首用西人噶西尼所定推得雍正癸卯年天正冬至為丙申日丑正三刻十一分有奇比甲子元法遲二刻次日子正初刻最卑過冬至八度七分三十二秒二十二微比甲子元法多十七分三十五秒四十二微月離改法之原一求太陰本天心距地及最高行隨時不同以期通變自西人刻白爾創橢圓之法奈端等纍測月離得日當月天中距時最大遲疾差為四度五十七分五十七秒兩心差為四三三一九日當月天最高或當月天最卑則最大遲疾差為七度三十九分三十三秒兩心差為六六七八二日歷月天高卑而後兩心差漸小中距而後兩心差漸大日距月天高卑前後四十五度兩心差適中又日當月天高卑時最高之行常速至高卑後四十五度而止日當月天中距時最高之行常遲至中距後四十五度而止與日月之盈縮遲疾相似而周轉之數倍之因以地心為心以兩心差最大最小兩數相加折半得五五五五為最高本輪半徑相減折半得一一七三一五為最高均輪半徑均輪心循本輪周右旋行最高平行度本天心循均輪周起最遠點右旋行日距月天最高之倍度用平三角形推得最高實均又推得逐時兩心差以求面積如日躔求盈縮法以求遲疾名曰初均本法用之如圖戊為地心甲壬癸子為本輪乙丁丑丙為均輪丙丁皆本天心丙為最遠丁為最近戊丙兩心差大己庚橢圓面積少戊丁兩心差小辛申橢圓面積多一增立一平均數以合時差西人刻白爾以來奈端等屢加測驗得日在最卑後太陰平行常遲最高平行正交平行常速日在最高後反是因定日在中距太陰平行差一十一分五十秒最高平行差一十九分五十六秒正交平行差九分三十秒其間逐度之差皆以太陽中距之均數與太陽逐度之均數為比例名曰一平均本法用之一增立二平均數以均面積西人奈端以來屢加精測得太陽在月天高卑前後太陰平行常遲至高卑後四十五度而止在月天中距前後反是然積遲積速之多正在四十五度而太陽在最高與在最卑其差又有不同因定太陽在最高距月天高卑中距後四十五度之最大差為三分三十四秒太陽在最卑距月天高卑中距後四十五度之最大差為三分五十六秒高卑後為減中距後為加其間日距月最高逐度之差皆以半徑與日距月最高倍度之正弦為比例太陽距地逐度之差又以太陽高卑距地之立方較與太陽本日距地同太陽最高距地之立方較為比例名曰二平均本法用之一增立三平均數以合交差西人奈端以來定白極在正交均輪周行日距正交之倍度因定太陽在黃白兩交後則太陰平行又稍遲在黃白大距後則太陰平行又稍速其最大差為四十七秒兩交後為減大距後為加其逐度之差皆以半徑與日距正交倍度之正弦為比例名曰三平均本法用之一更定二均數以正倍離西人噶西尼以來屢加測驗定日在最高朔望前後四十五度最大差為三十三分一十四秒日在最卑朔望前後四十五度最大差為三十七分一十一秒朔望後為加兩弦後為減其間月距日逐度之二均則以半徑與月距日倍度之正弦為比例其太陽距最高逐度二均之差又以日天高卑距地之立方較與本日太陽距地同太陽最高距地之立方較為比例與二平均同本法用之一更定三均數以合總數西人噶西尼以來取月距日與月高距日高共為九十度時測之除末均之差外其差與月距日或月高距日高之獨為九十度者等又取月距日與月高距日高共為四十五度時測之亦除末均差外其差與月距日或月高距日高之獨為四十五度者等乃定太陰三均之差在月距日與月高距日高之總度半周內為加半周外為減其九十度與二百七十度之最大差為二分二十五秒其間逐度之差以半徑與總度之正弦為比例本法用之一增立末均數以合距度西人噶西尼以來測日月最高同度或日月同度兩者只有一相距之差則止有三均若兩高有距度日月又有距度則三均之外朔後又差而遲望後又差而速及至月高距日高九十度月距日亦九十度時無三均而其差反最大故知三均之外又有末均乃將月高距日高九十度分為九限各於月距日九十度時測之兩高相距九十度其差三分八十度其差二分三十九秒七十度其差二分一十九秒六十度其差二分五十度其差一分四十三秒四十度其差一分二十八秒三十度其差一分一十六秒二十度其差一分七秒一十度其差一分一秒其間逐度之差用中比例求之其間月距日逐度之差皆以半徑與月距日之正弦為比例朔後為減望後為加本法用之一更定交均及黃白大距以合差分西人奈端噶西尼以來測得日在兩交時交角最大為五度一十七分二十秒日距交九十度時交角最小為四度五十九分三十五秒朔望而後交角又有加分因日距交與月距日之漸遠以漸而大至日距交九十度月距日亦九十度時加二分四十三秒交均之最大者為一度二十九分四十二秒乃以最大最小兩交角相加折半為繞黃極本輪相減折半為負白極均輪分均輪全徑為五取其一內去朔望後加分為最大加分小輪全徑設於白道餘為交均小輪全徑與均輪全徑相減餘為負小輪全徑與均輪同心均輪負而行不自行均輪心行於本輪周左旋為正交平行交均小輪心在負小輪周起最遠點右旋行日距正交之倍度白極在交均小輪周起最遠點左旋行度又倍之而白道上之加分小輪其周最近黃道之點與朔望之白道相切其全徑按日距正交倍度為大小常與最大加分小輪內所當之正矢等又按本時全徑內取月距日倍度所當之正矢為所張之度驗諸實測無不吻合本法用之如圖甲為黃極乙為本輪丙為均輪丁為負小輪戊己皆為交均小輪庚辛皆為白極壬為黃道丑癸皆為朔望時白道寅子皆為兩弦時白道卯辰皆為白道上加分小輪一更定地半徑差以合高均求得兩心差最大時最高距地心一六六七八二為六十三倍地半徑又百分之七十七最卑距地心九三三二一八為五十五倍地半徑又百分之七十九兩心差最小時最高距地心一四三三一九為六十二倍地半徑又百分之三十七最卑距地心九五六六八一為五十七倍地半徑又百分之一十九中距距地心一千萬為五十九倍地半徑又百分之七十八又用平三角形求得太陰自高至卑逐度距地心線及地平上最大差其實高逐度之差皆以半徑與正弦為比例一更定三種平行及平行所在太陰每日平行比甲子元法多千萬分秒之二萬二千三百一十六最高每日平行比甲子元法少百萬分秒之七千二百五十一正交每日平行比甲子元法少十萬分秒之一百三十七雍正癸卯天正冬至次日子正太陰平行所在比甲子元法多二分一十四秒五十七微最高平行所在比甲子元法少三十六分三十七秒一十微正交平行所在比甲子元法多五分六秒三十三微交食改法之原一用兩時日躔月離黃道度求實朔望先推平朔望以求其入交之月次推本日次日兩子正之日躔月離黃道經度以求其實朔望之時又推本時次時兩日躔月離以比例其時刻與甲子元法止用兩日及用黃白同經者不同一用兩經斜距求日月食甚時刻及兩心實相距以黃白二道原非平行而日月兩經常相斜距若以太陽為不動則太陰如由斜距線行故求兩心相距最近之線不與白道成正角而與斜距線成正角其距弧變時亦不以月距日實行度為比例而以斜距度為比例如圖甲乙為黃道戊乙為白道甲戊為實朔望距緯甲癸為太陽一小時實行戊丑為太陰一小時實行設太陽不動而合癸與甲則太陰不在丑而在寅戊寅為一小時兩經斜距線甲卯與戊寅成正角即為兩心相距最近之線戊卯為食甚距弧皆借弧線為直線用平三角形求之初虧復圓則以併徑為弦作勾股一更定日月實徑與地徑之比例西人默爵製造鏡儀測得日視徑最高為三十一分四十秒中距為三十二分一十二秒最卑為三十二分四十五秒月視徑最高為二十九分二十三秒中距為三十一分二十一秒最卑為三十三分三十六秒用此數推算日實徑為地徑之九十六倍又十分之六月實徑為地徑百分之二十七小餘二六強太陽光分一十五秒本法用之一更定求影半徑法及影差以日月兩地半徑差