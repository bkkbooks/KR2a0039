二時得九小時三十九分五十九秒即壬戊弧本時春分距午時分次用甲戊辛正弧三角形因壬戊春分距午後之度已過象限故用申戊辛正弧形求辛角及辛戊辛申二弧此形戊為直角有申角黃赤交角有申戊弧秋分距午前時分所變之赤道度三十五度零十五秒求得戊辛弧十三度五十九分四十秒為本時正午之黃赤距度求得申辛戊角七十度五十六分五十八秒為黃道交子午圈角即黃道赤經交角與甲辛辰角為對角其度等求得申辛弧三十七度二十一分五十秒為秋分距午正前黃道度與申點秋分九宮相減得七宮二十二度三十八分一十秒即辛點正午黃道經度次用甲辰辛正弧三角形求辛辰甲辰二弧此形辰為直角有辛角黃道赤經交角以甲戊弧京師赤道距天頂三十九度五十五分內減辛戊正午黃赤距度得甲辛弧二十五度五十五分二十秒為本時正午黃道距天頂度求得辛辰弧九度零五十三秒為黃平象限距午西之黃道度與辛點正午黃道經度相減得辰點七宮十三度三十七分十七秒即本時黃平象限之經度並求得甲辰弧二十四度二十四分二十四秒為黃平象限距天頂之度與甲卯象限相減得辰卯弧六十五度三十五分三十六秒為本時黃平象限距地平之高度即當辰寅卯角之度也求距限差距限差者乃月距黃平象限之差度也蓋舊法月距限以九十度為率因黃道麗天其向隨時不同而出於地平之上者恆為半周其適中之點距地平東西皆九十度故以九十度之限以察月在地平之上下若月距限逾九十度者為在地平下遂不入算然此以黃道為立算之端也顧白道與黃道斜交月行白道不無距黃道南北之緯度緯南者早入遲出月當地平時其距黃平象限不及九十度緯北者早出遲入月當地平時其距黃平象限已過九十度是則九十度之率未足為據也於是立法以求其差猶五星伏見距日限度有距日加減差之義也其法以限距地平之高及月距黃道之緯依正弧三角形法求之蓋黃道之勢隨天左旋其升降正斜時時不同正升正降者京師限距地高至七十三度餘高度大則月緯所當之距限差轉小斜升斜降者京師限距地高只二十六度餘高度小則月緯所當之距限差轉大若值月緯最大其差可至十度有奇此距限差之不可不立也故依京師黃平象限距地平高度逐度求其太陰黃道實緯度所當距限差以立表設京師限距地平高度三十四度太陰距黃道實緯度南北各五度求距限差如圖甲為天頂乙丙為地平丁為黃極甲丁乙丙為黃道經圈戊己庚為黃道交地平於己點其戊點即黃平象限戊丙為限距地高三十四度與甲丁黃極距天頂之度等而當戊己丙角與乙己庚角為對角其度亦等如月恰在正交或中交合於黃道之己點正當地平則戊己為月距限九十度若過九十度自必在地平之下今設圖形尚無資料月在黃道南五度則辛壬癸為黃道距等圈月在地平時為壬點當於黃道之卯其戊卯月距限乃不及九十度又設月距黃道北五度則子丑寅為黃道距等圈月在地平時為丑點圖形尚無資料當於黃道之辰其戊辰月距限乃已過九十度故必求其差數以加減之法用己卯壬正弧三角形求己卯弧此形有卯直角有己角當限距地高有卯壬弧月距黃道緯度一率己角正切乃以己角之正切為一率半徑為二率卯壬弧之正切為二率半徑三率求得四率為距限差度之正弦檢表得七度四十二三率卯壬弧正切分即己卯弧為所求之距限差而與己辰弧之度分等蓋四率己卯弧正弦己辰丑正弧三角形與己卯壬形同用己角而辰丑弧月距黃道緯度亦與卯壬等是兩正弧形為相等形故所得之己卯弧必與己辰弧相等無疑矣既得己卯距限差與戊己九十度相減得八十二度十八分即戊卯距限而與距等圈辛壬之度相應為月在緯南之地平限度以己辰距限差與戊己九十度相加得九十七度四十二分即戊辰距限而與距等圈子丑之度相應為月在緯北之地平限度也求黃經高弧交角及月距天頂舊法推日食三差原以黃平象限為本自考成前編謂三差並生於太陰而太陰之經緯度為白道經緯度用白道較之用黃道為密故求三差則按月距白平象限之度以白道高弧交角及太陰高弧為據後編變通其法乃以白經高弧交角及日距天頂以求三差而求白經高弧交角係赤經高弧交角加減赤白二經交角而得並不求月距白平象限之度是法較前頗為省算今推視差者乃求其星月黃道同經之視距視時故三差應由黃平象限而定也是則其法原可倣於後編不求黃平象限而竟求黃經高弧交角之術即黃道高弧交角之餘度然非月距黃平象限度與地平限度相較其月在地平之上下無由可知故今求交角乃先求得月距黃平象限之東西黃平象限去地之高下太陰距黃極之遠近然後按後編用斜弧形求赤經高弧交角日距天頂之法則黃經高弧交角及月距天頂之度可得矣設星月黃道經度同為申宮二十六度二十二分十一秒月距正交前四十三度四十八分五十六秒黃白交角五度四分一十秒黃平象限七宮十三度三十七分十七秒限距地高六十五度三十五分三十六秒求太陰實緯黃經高弧交角月距天頂如圖甲為天頂甲乙丙丁為子午圈丙丁為地平乙為北極戊己庚為赤道戊為午正己為酉正庚為子正卯為黃極辛壬癸子為黃道壬為春分癸為夏至午為黃道交地平之點午未弧為九十度其未點即黃平象限宮度為七宮十三度三十七分十七秒未辰弧當午角為六十五度三十五分三十六秒即限距地高度而與甲卯黃極距天頂之度等巳寅丑為白道寅為正交寅角為黃白交角五度四分一十秒申為太陰當黃道於酉申寅為月距正交前白道度四十三度四十八分五十六秒申酉為月距黃道緯度其酉點為星月所當之黃道經度五宮二十六度二十二分圖形尚無資料十一秒與未點黃平象限宮度相減得未酉弧四十七度十五分六秒為月距黃平象限西之度乃當未卯酉角甲申戌為高弧卯申甲角為黃經高弧交角甲申為月距天頂求法先用寅酉申正弧三角形此形酉為直角有寅角黃白交角有寅申弧月距正交前白道度求圖形尚無資料得申酉弧三度三十分二十七秒即太陰距黃道南實緯度與卯酉象限相加得卯申弧九十三度三十分二十七秒為月距黃極次用甲卯申斜弧三角形此形有甲卯邊黃極距天頂有申卯邊月距黃極有申卯甲角當酉未弧月距限度為所夾之角求申角及甲申邊乃自天圖形尚無資料頂作甲亥垂弧分為甲亥卯甲亥申兩正弧三角形先用甲亥卯正弧三角形此形亥為直角有卯角有甲卯邊求得卯亥弧五十六度十四分十五秒為距極分邊與申卯弧月距黃極相減得申亥弧三十七度十六分十二秒為距月分邊次用甲亥申正弧三角形此形亥為直角有申亥邊兼甲亥卯正弧三角形之亥卯邊及卯角用合率比例法求得申角五十六度二分五十一秒即黃經高弧交角仍以甲卯申斜弧形用對邊對角法求得甲申弧五十三度四十三分二十四秒即月距天頂之度也求太陰距星及凌犯視時太陰距地平上之高弧自地心立算者為實高在地面所見者為視高其相差之分即地半徑差也月當地平時距天頂為九十度其相差之數最大而角之正弦即當地之半徑逮月上升則距地漸高距地愈高則差數愈小其所差之分皆與本時月距天頂之正弦相應故用比例法而得本時高下差也夫高下既差則有視經視緯之別其視經實經之差者東西差也視緯實緯之差者南北差也今求三差乃依後編日食求三差法用直線三角形算之然後編三差圖乃寫渾於平今則用以渾測渾之圖求其三差其所得之南北差與本時太陰實緯之度相較而得視緯得以視緯與星緯相較觀其緯之南北而定相距之上下也其所得之東西差與一小時之太陰實行為比例而得用時距視時之距分辨其月距限之東西加減凌犯用時而得凌犯之視時也前求得道光十二年壬辰三月初六日癸丑月距司怪第四星凌犯用時戌正二刻八分十九秒黃經高弧交角五十六度二分五十一秒月距天頂五十三度四十三分二十四秒本日太陰最大地半徑差六十分七秒太陰黃道實緯度南三度三十分二十七秒司怪第四星黃道緯度南三度十一分四十四秒一小時太陰實行三十六分三十三秒求星月相距分秒凌犯視時如圖甲為天頂甲未辰巳為黃道經圈辰午巳為地平卯為黃極未午辛為黃道未點即黃平象限宮度未辰弧即限距地高與卯甲黃極距天頂之度等申點為太陰子點為司怪第四星同當黃道於酉其酉點即月與星之黃道經度酉未弧即月距限西之度子酉為星距黃道南緯度三度十一分四十四秒申酉為太陰距黃道南實緯度三度三十分二十七秒申卯弧即月距黃極甲申戌為高弧申甲為月距天頂度五十三度四十三分二十四秒卯申甲角為黃經高弧交角五十六度二分五十一秒而與戌申亥角為對角其度等此皆自地心圖形尚無資料立算之實度也然人居地面高於地心故視高常低於實高而月當地平時其地半徑差為最大今乃六十分七秒於是依後編求本時高下差之法以半徑與甲申弧正弦之比同於最大地半徑差與本時高下差之比得本時高下差四十八分二十八秒如申火之分其火點即太陰之視高自火點與黃道平行作火木線遂成申木火直角三角形因弧度甚小乃作直線算與後編求日食三差之理同此形木為直角有申角黃經高弧交角有申火邊本時高下差求得木火邊四十分十二秒為東西差求得申木邊二十七分四秒為南北差加於申酉太陰實緯得木酉太陰視緯三度五十七分三十一秒內減子酉星緯得子木弧四十五分四十七秒為人目仰視太陰距司怪第四星月在星下之分也夫星月同當酉點之經度固為相距今太陰視高在火其視緯雖差至木而距星之子點尚在一度內其火點當黃道之視經度則差至土是用時時星經度雖在酉而太陰視經度之土點乃在其西是為未及然土酉之分與火木等故以一小時太陰實行與火木東西差為比例得距分一時六分為月行火木之時分加於月視高臨火點之用時得亥初二刻十四分十九秒即人目視太陰臨於木點與星同當酉點經度之視時也求視時月距限視時月距限必大於用時月距限因其視經差所當之距分既有加減則太陰與星隨天西移自有進退也蓋太陰以地半徑差由高而變下則視經之差於實經視緯之差於實緯必矣茲據黃平象限在天頂南之地面而言之視緯恆差而南如實緯北者視緯常小於實緯其差為減實緯南者視緯常大於實緯其差為加故緯南之星月實距雖在一度內而視距轉在一度外者有之緯北之星月實距雖在一度外而視距轉在一度內者有之南北相距一度外者不入凌犯之限故不取用至若視經之差所當月行距分之最大者或至二小時而二小時之際諸曜隨天左旋幾至一宮故視經之差關於月行之進退矣如月在黃平象限西者視經度差之而西視時必遲於用時月在黃平象限東者視經度差之而東視時必早於用時以致用時星月未入地平而視時星月已入地平者有之或用時星月已出地平而視時星月未出地平者有之是故於求用時之後即以月距黃平象限與地平限度相較可知斯時月在地平之上下月距限小於地平限度者為月在地平上大於地平限度者為月在地平下如遇月距限微小於地平限度者用時星月必在地平上視時星月或在地平下其所差者即視經之差當月行距分之諸曜左旋度今取最小實經視經之差所當左旋之度為視經差法見下卷求地平限度節下減於地平限度所得視地平限度而與月距限度考之如月距限小於地平限度而大於視地平限度者則為用時月雖在地平上視時月必在地平下矣既知月必在地平下故遇此者去之如月距限小於視地平限度者則為視時月在地平之上夫猶有不然者以視經差所取皆最小之數也若知月行實跡非由視時再推月距限度則其時月果在地平之上下未可得其確準故今於既得視時之後必詳察太陰實緯及用時月距限度如實緯南月距限過六十度或實緯北月距限過七十度者用時月距限在此限度內者視時月必在地平之上皆以視時復求月距黃平象限之度如其度大於地平限度者乃視時月在地平之下仍不取用必其度小於地平限度始為視時月必在地平之上而可證諸實測此視差之所以必逐細詳推然後可得而取用也
