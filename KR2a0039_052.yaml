body:
  text: 清史稿卷五十二志二十七時憲八凌犯視差新法上道光中欽天監秋官正司廷棟所撰較舊法加密附著卷末以備參考求用時推諸曜之行度皆以太陽為本而太陽之實行又以平行為根其推步之法總以每日子正為始此言子正者乃為平子正即太陽平行之點臨於子正初刻之位也今之推步時刻雖以兩子正之實行為比例而所得者亦皆平行所臨之點則實行所臨之點自有進退之殊設太陽在最卑後實行大於平行則太陽所臨之點必在平行之東以時刻而言乃為未及若太陽過最高後實行小於平行則太陽所臨之點必在平行之西以時刻而言乃為已過故以應加之均數變時為應減之時差應減之均數變時為應加之時差此因太陽有平行實行之別以生均數時差也然太陽所行者黃道時刻所據者赤道因黃道與赤道斜交則同升必有差度如二分後赤道小於黃道其差應減在時刻為未及二至後赤道大於黃道其差應加在時刻為已過故以正弧三角形法求得黃赤升度差變為時分二分後為加二至後為減此因經度有黃道赤道之分以生升度時差也按本時之日行自行所生之二差各加減於平時而得用時由用時方可以推算他數故交食亦必以推用時為首務即日月食之第一求也其法理圖說已載於考成前編講解最詳其圖分而為二且均數時差圖係用小輪至考成後編求均數改為橢圓法其法理亦備悉於求均數篇內然未言及時差今依太陽實行所臨黃道之點以均數之分取得黃道上平行點即以平實二點依過二極二至經圈作距等圈法引於赤道可使二差合為一圖其太陽之經度所臨之時刻及二時差之加減皆可按圖而稽矣如道光十二年壬辰三月初六日癸丑戌正二刻十一分月與司怪第四星同黃道經度是為凌犯時刻本日太陽引數三宮三度五十五分太陽黃道經度三宮十五度五十三分求用時如圖甲為北極乙丙丁戊為赤道乙甲丁為子午圈乙為子正丁為午正己庚辛壬為黃道丙甲戊為過二極二至經圈己為冬至辛為夏至庚為春分壬為秋分子為太陽實行之點當赤道於丑則丑點即太陽實臨之用時卯為太陽平行之點而當赤道於辰其圖形尚無資料卯子之分即應加之均數一度五十五分四十五秒試自卯子二點與丙甲戊過極至經圈平行作卯午子未二線即如距等圈將太陽平行實行之度皆引於赤道則庚午必與庚卯等庚未必與庚子等其赤道之午未亦必與卯子均數等變時得七分四十三秒為赤道午未之分即均數時差也次用庚丑子正弧三角形求庚丑弧此形有丑直角有庚角黃赤交角二十三度二十九分有庚子弧太陽距春分後黃道度十五度五十三分乃以半徑為一率庚角之餘弦為二率庚子弧之正切為三率求得四率為庚丑弧之正切檢表得庚丑弧十四度三十七分三十六秒為太陽距春分後赤道度乃與庚子黃道弧相等之庚未弧相減得丑未弧一度十五分二十四秒為應減之黃赤升度差變時得五分二秒即升度時差也蓋太陽平行卯點距春分之庚卯弧與庚午弧等則午點乃為平時即今之凌犯時刻而太陽實行子點距春分之庚子與庚未弧等則午未為平行與實行之差如以太陽右旋而言之為實行已過平行然以隨天左旋而計之為實行未及平行是未點轉早於午點故必減午未均數時差乃得未點時刻此太陽在黃道虛映於赤道之時刻也然子點太陽實當赤道之丑則丑未為黃道與赤道之差若以經度東行而言之為赤道未及黃道茲以時刻西行而計之為赤道已過黃道是丑點復遲於未點故必加丑未升度時差方得丑點時刻即太陽在黃道實當於赤道之時刻也其兩時差既為一加一減而所減者又大於應加之分一率半徑故先以兩時差相減得丑午時分二分四十一秒而為時差二率庚角餘弦此因兩時差加減異號故相減若同號則相加所謂兩數通為一數也三率庚子弧正切又因減數大於加數故仍從減若加數大者則從加矣乃減於午點凌四率庚丑弧正切犯時刻戌正二刻十一分即得丑點戌正二刻八分十九秒為凌犯用時也又設凌犯時刻丑正一刻太陽引數三宮十三度二十九分黃道實行三宮二十五度三十四分求用時如子為太陽實行之點當赤道於丑其丑點即所臨之用時卯為太陽平行之點當赤道於辰其子卯為應加之均數一度五十二分二十五秒亦自卯子二點與過極至經圈平行作卯圖形尚無資料丑子未二距等圈其平行卯點映於赤道恰與實行當赤道之丑點合是由平行所得之時刻已合實行實臨赤道之用時遇此可無庸求其時差也然何以知之蓋兩時差之數相等必減盡無餘即無時差之總數矣今試按法求之既作卯丑子未二線其庚丑與庚卯等庚未與庚子等則丑未必與卯子均數等變時得七分三十秒即赤道上應減之均數時差次用庚丑子正弧三角形求得庚丑弧赤道度與庚子弧黃道度相等之庚未弧相減得丑未弧黃赤升度差恰與均數等變時亦得七分三十秒即赤道上應加之升度時差其時差一為加一為減而兩數相等乃減盡無餘既無時差之總數則其凌犯時刻即為用時可知矣此法以丑點凌犯時刻減去均數時差得未點實行虛映之時刻而復加相等之升度時差所得用時固仍在丑點之位蓋因太陽平行距春分後黃道度等於太陽實行距春分後赤道度故也又如太陽正當本天之最卑或最高乃無平行實行之差自無均數時差止加減升度時差一數設太陽當本天最卑又當子正如太陽在黃道之子點則庚乙與庚子等以庚丑子正弧形求得丑乙黃赤升度差變時減於乙點時刻即得丑點用時乃在乙點子正之前也若太陽當本天最高又當午正如太陽在黃道之午點則壬丁與壬午等以壬寅午正弧形求得寅丁黃赤升度差變時減於丁點時刻即得寅點用時乃在丁點午正之前也又如太陽實行正當冬夏至或正當春秋分此四點皆無黃道圖形尚無資料赤道之差自無升度時差止加減均數時差一數設太陽實行六宮初度為正當夏至在黃道之辛點當赤道於戊而平行卯點當赤道於辰自卯點與丙甲戊過極至經圈平行作卯午距等圈則午點為凌犯時刻其戊午與辛卯均數等變時得均數時差減於午點而得戊點即用時也求春分距午時分黃平象限宮度及限距地高推算太陰凌犯視差固依後編求日食三差之法而其為用不同蓋日食之東西差為求視距弧而南北差為求視緯其視距弧視緯則為求視相距及視行之用緣太陰行於白道是必以白平象限為準焉若五星之距恆星五星之互相距皆以黃道同經度之時為相距時刻而較黃緯南北相距之數為其上下之分也至月距五星月距恆星亦皆以黃道經度相同之時為凌犯時刻不更問白道經度其於白平象限又何與焉然其以東西差定視時之進退以南北差判視緯之大小以定視距之遠近者其差皆黃道經緯之差故必以黃平象限之宮度為準黃平象限者地平上黃道半周適中之點也顧黃道與赤道斜交地平上赤道半周適中之點恆當子午圈而地平上黃道半周適中之點則時有更易蓋黃極由負黃極圈每日隨天左旋繞赤極一周如黃極在赤極之南則冬至當午正其黃道斜升斜降若黃極在赤極之北則夏至當午正其黃道正升正降而黃平象限亦皆恰當子午圈設黃極在赤極之西則春分當午正其黃道之勢斜倚出自東北而入西南黃平象限乃在午正之東設黃極在赤極之東則秋分當午正其黃道出自東南而入西北黃平象限乃在午正之西是則黃道之向隨時不同故以黃道之逐度推求黃平象限及限距地高以立表先設太陽正當春分點黃道實行為三宮初度求午正初刻黃平象限宮度及限距地高度分如圖甲乙丙丁為子午圈甲為天頂丙丁為地平乙為北極乙丙為京師北極出地高三十九度五十五分戊己庚為赤道交於地平之己點其戊點當午正為地平上赤道半周適中之點戊丁為赤道距地高五十度五分當戊己丁角辛子壬為負黃極圈子為黃極乙子己丑為過極至經圈戊丑庚為黃道而交地平於寅點庚為秋分丑為冬至戊為春分即太陽之所在臨於午正乃無春分距午之時分試自黃極子點出弧線過天頂作子甲卯黃道經圈為本時黃平象限其圖形尚無資料辰點為地平上黃道半周適中之點而在正午之東即黃平象限宮度也辰寅卯角為黃道與地平相交之角而當辰卯弧即本時限距地高之度也法用戊辰甲正弧三角形求戊辰甲辰二弧此形有辰直角有戊甲弧赤道距天頂與乙丙北極高一率半徑度等以赤道交子午圈之戊直角九十度內減己戊丑角黃二率戊角餘弦赤交角二十三度二十九分得寅戊丁角六十六度三十一三率戊甲弧正切為黃道交子午圈角亦名黃道赤經交角與辰戊甲角為對四率戊辰弧正切角其度等乃以半徑為一率戊角黃道赤經交角之餘弦為二率戊甲弧赤道距天頂亦即太陽距天頂其正切為三率求得四率為黃平象限距午之正切檢表得十八度二十六分十四秒為戊辰弧黃平象限距午正之黃道度與一率半徑戊點春分三宮相加因黃平象限在午東故加得辰點三宮十二率戊角正弦八度二十六分十四秒即本時黃平象限之經度也又以三率戊甲弧正弦半徑為一率戊角黃道赤經交角之正弦為二率戊甲弧太四率甲辰弧正弦陽距天頂之正弦為三率求得四率為黃平象限距天頂之正弦檢表得三十六度三分九秒為甲辰弧黃平象限距天頂與甲卯象限九十度相減得辰卯弧五十三度五十六分五十一秒即本時限距地高而當辰寅卯角之度也又設太陽正當秋分點黃道實行為九宮初度求午正初刻春分距午時分並黃平象限及限距地高即以秋分當於正午之戊則庚未戊為黃道交地平於寅庚為春分未為夏至子乙未己為過極至經圈亦自黃極子點出弧線過天頂作子甲卯弧黃平象限而地平上黃道適中之辰點在正午之西先以春分距午西之庚戊赤道半周變十二時為春分距午之時分次仍用戊辰甲正弧三角形求戊辰甲弧二弧此形有辰直角有戊甲赤道距天頂以戊直角內減己戊未角黃赤交角得辰戊甲角黃道赤經交角亦六十六度三十一分求得戊辰弧黃平象限距午正之黃道度亦十八度二十六分十四秒與戊點秋分九宮相減因黃平象限在午西故減得辰點八宮十一度三十三分四十六秒即本時黃平象限之經度又求得甲辰弧與甲卯象限相減得辰卯弧亦為五十三度五十六分五十一秒即本時限距地高而當辰寅卯角之度也又設太陽距春分後三十度黃道實行為四宮初度求午正初刻黃平象限諸數乃以黃道經度四宮初度當午正如辛點即太陽之所在辛壬癸為黃道交地平於寅丑為冬至壬為春分乙子丑為過極至經圈仍自黃極子點過天頂甲點作子甲卯弧黃平象限其黃道適中之辰點在午正之東求法先用辛戊壬正弧三角形求壬戊辛戊二弧及壬辛戊角此形有戊直角有壬角黃赤交角有壬辛太陽距春分後黃道弧一率半徑三十度乃以半徑為一率黃赤交角之餘弦為二率二率壬角餘弦黃道弧之正切為三率求得四率為赤道弧之正切三率壬角弧正切檢表得二十七度五十四分一十秒為壬戊弧赤道同四率壬戊弧正切升度亦即本時春分距午後赤道度變時得一時五十一分三十七秒即本時春分距午時分又以半徑一率半徑為一率黃赤交角之正弦為二率黃道弧之正弦為三二率壬角正弦率求得四率為黃赤距度之正弦檢表得十一度二三率壬