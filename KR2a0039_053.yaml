body:
  text: 清史稿卷五十三志二十八時憲九凌犯視差新法下求均數時差以本日太陽引數宮度分滿三十秒進一分用用後編日躔均數時差表察其所對之數得均數時差記加減號引數有零分者用中比例求之求升度時差以本日太陽黃道實行宮度分滿三十秒進一分用用後編日躔升度時差表察其所對之數得升度時差記加減號實行有零分者用中比例求之求時差總以均數時差與升度時差相加減得時差總兩時差同為加或同為減者則相加得時差總加亦為加減亦為減兩時差一為加一為減者則相減得時差總加數大為加減數大為減求凌犯用時置凌犯時刻加減時差總得凌犯用時求本時太陽黃道經度以周日一千四百四十分為一率本次日兩太陽實行相減帶秒減足三十秒進一分用有度化分為二率凌犯時刻化分為三率求得四率與本日太陽實行相加得本時太陽黃道經度求本時春分距午時分以本時太陽黃道經度滿三十分進一度用察黃平象限表內右邊所列春分距午時分與淩犯用時相加內減十二時不足減加二十四時減之得本時春分距午時分滿二十四時去之求本時黃白大距以周日一千四百四十分為一率本次日兩黃白大距相減為二率淩犯時刻化分為三率求得四率加減本日黃白大距本日黃白大距大相減小相加得本時黃白大距求本時月距正交以周日一千四百四十分為一率本次日兩月距正交相減化秒為二率凌犯時刻化分為三率求得四率收作度分秒與本日月距正交相加得本時月距正交求太陰實緯以半徑為一率本時黃白大距正弦為二率本時月距正交正弦為三率如本時月距正交過三宮者與六宮減過六宮者減六宮過九宮者與十二宮減用其餘求得四率為太陰實緯正弦檢表得太陰實緯記南北號本時月距正交初宮至五宮為北六宮至十一宮為南如本時月距正交恰在初宮六宮者則無實緯恰在三宮九宮者則本時黃白大距即實緯度三宮為北九宮為南求黃平象限及限距地高以本時春分距午時分察黃平象限表內取其與時分相近者所對之數録之得黃平象限隨看左邊之限距地高録之得限距地高求星經度按所取之星察儀象考成卷二十六表內所載本星之黃道經度加入歲差表以乾隆九年甲子為元至道光十四年甲午計九十年應加歲差一度十六分三十秒以後每年遞加歲差五十一秒得本年星經度如求五星經度則以周日一千四百四十分為一率凌犯時刻化分為二率一日星實行為三率以本次日兩實行相減得一日星實行求得四率為距時星實行與本日星經度相加減順行加退行減得本時星經度求星緯度按所取之星察儀象考成卷二十六表內所載本星之黃道緯度録之無歲差記南北號如求五星緯度則以周日一千四百四十分為一率凌犯時刻化分為二率一日星緯較為三率本次日兩緯度同為南或同為北者則相減得星緯較一為南一為北者則相加得星緯較求得四率與本日星緯度相加減本日緯度大相減本日緯度小相加若相加為三率者所得四率必與本日緯度相減仍依本日南北號如所得四率大於本日星緯則以所得四率轉減本日星緯其南北號應與次日同得本時星緯度記南北號求月距限以星經度與黃平象限相減得月距限記東西號星經度大為限東小為限西如星經度與黃平象限一在三宮內一在九宮外應將三宮內者加十二宮減之所得月距限太陰實緯南在六十度內實緯北在八十度內者不必求地平限度如緯南過六十度緯北過八十度則求地平限度求距限差以限距地高及太陰實緯度分察距限差表內縱橫所對之數録之得距限差記加減號太陰實緯南減北加求地平限度置九十度加減距限差得地平限度以地平限度內減最小視經差八度五十五分一十七秒得視地平限度如月距限大於視地平限度者為月在地平下即不必算因太陰距地最近其視行隨時不同故取最小視經差以定視限乃按最小限距地高月在黃道極南求得最小黃經高弧交角二十六度六分二十四秒以最小太陰地半徑差及最速月實行求得最小距分三十七分八秒變赤道度得九度一十七分求其相當最小黃道度為八度三十一分三十四秒再加最小東西差二十三分四十三秒得最小視經差八度五十五分一十七秒然月在最高時地半徑差最小而其月實行必遲則距分轉大今俱取其最小者恐有遺漏耳求距極分邊以半徑為一率月距限餘弦為二率限距地高正切為三率求得四率為距極分邊正切檢表得距極分邊求月距黃極置九十度加減太陰實緯南加北減得月距黃極求距月分邊以月距黃極內減距極分邊得距月分邊求黃經高弧交角以距月分邊正弦為一率距極分邊正弦為二率月距限正切為三率求得四率為黃經高弧交角正切檢表得黃經高弧交角若月距限為初度是太陰正當黃平象限則黃經與高弧合無黃經高弧交角求本次日月實引以本日月引數加減本日初均得本日月實引以次日月引數加減次日初均得次日月實引求本時月實引以周日一千四百四十分為一率凌犯時刻化分為二率本次日兩實引相減帶秒減足三十秒進一分用度化分為三率求得四率收為度分與本日月實引相加得本時月實引求本時本天心距地以周日一千四百四十分為一率凌犯時刻化分為二率本次日兩本天心距地數相減為三率求得四率與本日本天心距地數相加減本日本天心距地數大相減小相加得本時本天心距地求距地較以本時本天心距地內減距地小數得距地較求月距天頂以黃經高弧交角正弦為一率限距地高正弦為二率月距限正弦為三率求得四率為月距天頂正弦檢表得月距天頂若無黃經高弧交角則以月距黃極內減限距地高即得求太陰地半徑差以本時月實引滿三十分進一度用及本時本天心距地察後編交食太陰地半徑差表內所對之數即太陰地半徑差如本時本天心距地有遠近者以距地較比例求之求本時高下差以半徑為一率月距天頂正弦為二率太陰地半徑差為三率若推凌犯五星除土木二星無地半徑差外火金水三星皆有地半徑差乃看星引數自十宮十五度至一宮十五度為最高限自一宮十五度至四宮十五度自七宮十五度至十宮十五度為中距限自四宮十五度至七宮十五度為最卑限以星引數所當之限察其本星最大地半徑差與太陰地半徑差相減得星月地平高下差為三率求得四率即本時高下差求東西差以半徑為一率黃經高弧交角正弦為二率本時高下差為三率求得四率即東西差如無交角則無東西差高下差即南北差凌犯用時即凌犯視時求南北差以半徑為一率黃經高弧交角餘弦為二率本時高下差為三率求得四率即南北差求太陰視緯以太陰實緯與南北差相加減得太陰視緯記南北號緯南相加仍為南緯北相減仍為北如南北差大則反減變北為南求太陰距星以太陰視緯與星緯相加減得太陰距星記月在上下號如兩緯度同為北或同為南者則相減月緯大北為在上南為在下月緯小北為在下南為在上兩緯度一為南一為北者則相加月緯北為在上月緯南為在下若兩緯度相同減盡無餘為月掩星凡相距在一度以內者用過一度外者為緯大不用即不必算求太陰實行以本時月實引滿三十分進一度用及本時本天心距地察後編交食太陰實行表內所對之數得太陰實行如本時本天心距地有遠近者以距地較比例求之求距分以太陰實行為一率東西差為二率一小時化作三千六百秒為三率求得四率即距分記加減號月距限東為減月距限西為加求凌犯視時置凌犯用時加減距分得凌犯視時如凌犯用時不足減距分加二十四時減之所得凌犯視時為在前一日如加滿二十四時去之所得凌犯視時為在次日時刻在日出前日入後者用在日出後日入前者即為在晝不用如月在緯南月距限過六十度及月在緯北月距限過七十度者須用下法求之求視時春分距午時分置本時春分距午加減距分得視時春分距午如本時春分距午不足減距分者加二十四時減之若相加過二十四時者去之求視時黃平象限以視時春分距午時分察黃平象限表內取其與時分相近者所對之數録之即得視時黃平象限求視時月距限置星經度與視時黃平象限相減得視時月距限其度小於地平限度者用若大於地平限度者為月在地平下不用黃平象限表黃平象限表按京師北極高度三十九度五十五分黃赤大距二十三度二十九分依黃道經度逐度推得春分距午時分黃平象限宮度限距地高度分三段列之表名春分距午者乃春分距午正赤道度所變之時分也黃平象限者乃本時黃平象限之宮度也限距地高者乃本時黃平象限距地平之高度也表自三宮初度列起者因太陽黃道經度三宮初度為春分即春分距午之初也用表之法以本時太陽黃道經度之宮度察其所對之春分距午時分加淩犯用時得數內減十二時不足減者加二十四時減之得本時春分距午時分依此時分取其相近之春分距午時分所對之黃平象限宮度及限距地高度分即得所求之黃平象限及限距地高也設本時太陽經度一宮十五度淩犯用時十九時四十五分求春分距午及黃平象限並限距地高則察本表黃道經度一宮十五度所對之春分距午為二十一時九分五十四秒加淩犯用時十九時四十五分內減十二時餘過二十四時去之得四時五十四分五十四秒為所求之春分距午時分乃以此時分察相近者得四時五十四分五十一秒其所對之黃平象限為五宮十六度五十九分二十七秒即所求之黃平象限宮度其所對之限距地高為七十二度四十九分五十八秒即所求之限距地高也若黃道經度有零分者滿三十分以上則進為一度不用中比例因逐度所差甚微故也黃道度一二三四五六七八九一二三四五六七八九一二三四五六七八九一一一一一一一一一一二二二二二二二二二二三經度宮三三三三三三三三三三三三三三三三三三三三三三三三三三三三三三三春分秒一一一二三四五六八九一四六九三六五五一七四一九八七四二四二四二四二四三一五三二五三二五三二一五四三分三七一四八二五九三六四七一五八二六三七一五八二六三七一一一一二二二三三四四四五五五一一一二二二三三四四四五距午時一一一一一一一一一一一一一一黃平秒四七七七二二六七四五九八五二七三七四二一四九八一七八三三八一三五五五五四二四一四一四一三二五二五二五二五三二二二二分六一六一六一六一六五九四八三七二六五九四八三八二七二七二七二一五四二一五四二一五三二五三二五三一四三一四三一四度八九九一二二三四五五六七八八九一一二三四四五六七七八九一一一二二二二二二二二二二二二二一一象限宮三三三三三三三三三三三三三三三三四四四四四四四四四四四四四四四限距秒一六六八一八九三二四九二八八六五六九六五六八四八八八五三一五一四四一一五二二四五三一四一二二四一四分六七八八九九九九九九八七七六五三二一九八六四二七五二五一三五一三五二四二三五一三五一三五一三五二四二四五一三地高度三四四四五五五六六七七七七八八八九九九一一一二二二二三三五五五五五五五五五五五五五五五五五五五六六六六