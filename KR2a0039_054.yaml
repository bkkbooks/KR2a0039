body:
  text: 清史稿卷五十四志二十九地理一有清崛起東方歷世五六太祖太宗力征經營奄有東土首定哈達輝發烏拉葉赫及寧古塔諸地於是舊藩札薩克二十五部五十一旗悉入版圖世祖入關翦寇定鼎燕都悉有中國一十八省之地統御九有以定一尊聖祖世宗長驅遠馭拓土開疆又有新藩喀爾喀四部八十二旗青海四部二十九旗及賀蘭山厄魯特迄於兩藏四譯之國同我皇風逮於高宗定大小金川收準噶爾回部天山南北二萬餘里氈裘湩酪之倫樹頷蛾服倚漢如天自茲以來東極三姓所屬庫頁島西極新疆疏勒至於葱嶺北極外興安嶺南極廣東瓊州之崖山莫不稽顙內鄉誠係本朝於皇鑠哉漢唐以來未之有也穆宗中興以後臺灣新疆改列行省德宗嗣位復將奉天吉林黑龍江改為東三省與腹地同風凡府廳州縣一千七百有奇自唐三受降城以東南衞邊門東湊松花江北緣大漠為內蒙古其外涉瀚海阻興安東濱黑龍江西越阿爾泰山為外蒙古重之以屏翰聯之以昏姻此皆列帝之所懷柔安輯故歷世二百餘年無敢生異志者太宗之四征不庭也朝鮮首先降服賜號封王順治六年琉球奉表納款永藩東土繼是安南暹羅緬甸南掌蘇祿諸國請貢稱臣列為南服高宗之世削平西域巴勒提痕都斯坦愛烏罕拔達克山布哈爾博洛爾塔什干安集延浩罕東西布魯特左右哈薩克及坎車提諸回部聯翩內附來享來王東西朔南闢地至數萬里幅員之廣可謂極矣洎乎末世列強環起虎睨鯨吞凡重譯貢市之國四分五裂悉為有力者負之走矣清初畫土分疆多沿明制歷年損益代有不同其川瀆之變易郡邑之省增疆界之分合悉詳稽圖志並測斗極定高偏度以畫中外封域廣輪曲折之數用備一朝之掌焉直隸直隸禹貢冀兗二州之域明為北京置北平布政使司萬全都指揮使司清順治初定鼎京師為直隸省置總督一曰宣大駐山西大同轄宣府順治十三年裁巡撫三曰順天駐遵化轄順天永平二府康熙初裁曰保定駐真定轄保定真定順德廣平大名河間六府順治十六年裁曰宣府駐宣府鎮轄延慶保安二州順治八年裁五年置直隸山東河南三省總督駐大名十六年改為直隸巡撫明年移駐真定康熙八年復移駐保定雍正二年復改總督而府尹舊治順天為定制先是順治十八年增置直隸總督亦駐大名康熙五年改三省總督八年裁唐熙三十二年改宣府鎮為宣化府降延慶保安二州隸之雍正元年置熱河廳改真定為正定二年增置定冀晉趙深五直隸州張家口廳三年升天津衞為直隸州九年為府十年置多倫諾爾廳十一年熱河廳易州並為直隸州十二年置獨石口廳降晉州隸正定乾隆七年承德仍為熱河廳八年遵化升直隸州四十三年復升熱河廳為承德府光緒二年置圍場廳隸承德三十年置朝陽府明年置建平隸之三十三年升赤峰縣為直隸州置開魯等二縣隸之今京尹而外領府十一直隸州七直隸廳三散州九散廳一縣百有四北至內蒙古阿巴噶右翼旗界一千二百里東至奉天寧遠州界六百八十里南至河南蘭封縣界一千四百三十里西至山西廣寧縣界五百五十里廣一千二百三十里袤二千六百三十里宣統三年編戶共四百九十九萬五千四百九十五口二千三百六十一萬三千一百七十一其山恆山太行其川桑乾即永定滹沱即子牙衞易漳白灤其重險井陘山海居庸紫荊倒馬諸關喜峰古北獨石張家諸口交通則航路自天津東南通之罘上海東北營口東朝鮮仁川日本長崎鐵路京津津榆京漢正太京張郵道東出山海關達盛京綏中西出紫荊關達山西靈丘南涉平原達山東德州北出古北口達熱河電線西北通庫倫西南通太原由天津東北通奉天海線自大沽東通之罘順天府明初曰北平府後建北京復改自遼以來皆都此正統六年始定曰京師領州六縣二十五順治初京師置府尹府丞治中其順天巡撫駐遵化康熙初裁十五年升遵化為州二十七年置四路同知分轄所屬州縣分隸通永霸昌二道並兼統於直隸總督雍正元年復以部院大臣兼管府事特簡無定員九年置寧河乾隆八年遵化復升直隸州以玉田豐潤屬之廣四百四十里袤五百里北極高三十九度五十五分領州五縣十九遼南京今城西南唐幽州藩鎮城也金增拓之至元而故址漸湮元之大都則奄有今安定德勝門外地明初縮城之北面元制亦改永樂初重拓南城又非復洪武之故矣今皇城周十八里自正陽門之內曰大清門東南曰長安左門西南曰長安右門東曰東安門西曰西安門正北曰地安門舊曰北安門順治九年更名大清門之內曰天安門舊曰承天門順治八年改左太廟右社稷壇嚮明而治於茲宅中焉其內端門左闕左門右闕右門其內紫禁城在焉北枕景山西衽西苑苑有瀛台太液池環之南與端門屬者曰午門北神武門東東華門西西華門午門之內東協和門東出為文華殿西熙和門西出為武英殿舊曰雍和門乾隆元年更名其正中太和門左昭德門體仁閣右貞度門宏義閣其內則太和中和保和三殿至乾清門止東景運門西隆宗門凡此皆曰外朝制也外則京城周四十里為門九南為正陽門南之東崇文門南之西宣武門東之南朝陽門東之北東直門西之南阜成門西之北西直門北之東安定門北之西德勝門皆沿明舊而八旗所居鑲黃安定門內正黃德勝門內正白東直門內鑲白朝陽門內正紅西直門內鑲紅阜成門內正藍崇文門內鑲藍宣武門內星羅峙不雜厠也外城長二十八里為門七南為永定門左左安門右右安門東廣渠門西廣寧門在東西隅而北向者東東便門西西便門並明嘉靖中築鼓樓在地安門外明永樂中燬乾隆十二年重建大興衝繁疲難倚府東偏隸西路廳北有榆河自昌平入納清河西北玉河自宛平入歧為二一護城河至崇文門外合泡子河一入德勝門為積水潭即北海子流為太液池分為御溝又合德勝橋東南支津復合又東為通會河涼水河亦自宛平入逕南苑即南海子龍鳳二河出焉龍河淤南路廳駐黃村縣丞駐禮賢莊有青雲店鳳河營白塔村三鎮有采育營巡司有驛鐵路宛平衝繁疲難倚隸西路廳西山脉自太行為神京右臂西北二十里甕山其湖西海乾隆十五年賜山名曰萬壽湖曰昆明有清漪園光緒十五年改曰頤和相近玉泉山清河玉河源此玉河逕高梁橋一曰高梁河永定河自懷來入至盧師山西亦曰盧溝河錯出復入有灰壩減河汛十二石景山有南北岸同知全轄者七石景山盧溝橋二北頭工上北頭工中南頭工上北二工下分轄者五南頭工下北頭工下北二工上南三工北三工自順治八年至同治三年改道十有六截北流歸中泓逕魚壩口三鳳眼入海蓋道光二十二年以來雖小潰徙無害又涼水牛龍泉三河兼出西南西有海淀有暢春圓明二園咸豐末燬西路廳駐盧溝橋有巡司縣丞駐門頭溝又龐各莊青白口東齋堂巡司三沿河口磨石口榆平羅營五里坨趙村王平口天津關鎮八鐵路良鄉衝繁難府西南七十里隸西路廳永定河自宛平入汛四並分轄隸石景山南岸同知北頭工下北二工上南頭工下南二工康熙四十六年建金門石閘後廢乾隆三年移建南二汛改減水石壩仍曰金門閘永定減水壩十有七公村河自房山入為牛河復合茨尾河盧河自房山入逕琉璃鎮曰琉璃河納挾活河北有黃新莊行宮南有郊勞臺縣丞駐趙村固節長辛店二驛鐵路固安繁難府西百二十里隸南路廳永定河道南北岸同知石景山同知駐永定河自宛平入汛六隸南北岸同知三角淀通判全轄者二南四工北四工上分轄者四南三工北三工北四工下南五工拒馬岔河自涿入舊有金門閘減河亦自涿入納太平河曰牛河歧為黃家河其西蜈蚣河並淤東南十八里韓城南七十里四鋪頭有牛坨鎮縣驛一永清簡府南少東百四十里隸南路廳三角淀通判駐永定河自固安入汛七隸北岸同知其通判全轄者三南六工北五工北六工分轄者四北四工下南五工南七工北七工有信安鎮巡司兼隸霸東安簡府東南百四十里隸南路廳永定河自永清入汛三並分轄隸三角淀北通判南七工南八工上北七工其故道淤鳳河自大興入有舊州鎮縣驛一香河簡府東南百二十里隸東路廳西有北運河自通入有王家務減河雍正九年濬長百四十里北窩頭河亦自通入縣驛一通州衝繁疲難府東四十里隸東路廳通永道倉場總督駐順治十六年省漷縣入之管河州判駐白榆漒漒三河並自順義入榆納通惠河與白會是為北運河納涼水河漒漒逕窩頭村曰窩頭河鳳河自東安入北門外石壩州判掌之十五京倉所漕其東土壩州同掌之州西中二倉所漕馬頭店永樂店馬駒橋三鎮潞河和合二驛鐵路三河衝繁難府東少北百十里隸東路廳西北盤龍山有行宮乾隆十九年移大新莊北有泃河自平谷入側城東南西南窩頭河自通緣界入鮑丘河古巨浸源自塞外淤今出西北田各莊晴為枯渠雨則洶注俗曰瀉肚河有馬坊鎮縣驛一武清衝繁疲府東南九十里隸東路廳西南永定河自東安入汛三隸三角淀北岸通判南八工上南八工下北七工東北北運河自香河入康熙三十八年決筐兒港明年濬為減河後淤同治末復濬新減河寶坻北有鳳河自通入雍正四年改自堠上村折南下至天津雙口入淀三角淀一曰東淀古雍奴藪亙霸文東武靜文大七州縣境雍正四年放永定於淀塞且半僅王慶坨一角耳乾隆十六年後導河支貫淀而東平蕪彌望管河同知駐河西務通判楊村並有驛八鎮王慶坨安平桐柏崔黃口三里淺南蔡村筐兒港黃花店寶坻繁疲難府東少南百八十里隸東路廳北薊運河自薊右會泃河緣界入逕江寬村鮑丘河自三河入納窩頭河襃鍼河注之又南有筐兒港新減河其北王家務減河淤知縣劉枝彥濬自大白莊至俵口並修窩頭襃鍼隄有玉甫營鎮縣驛一寧河衝繁難府東南三百里隸東路廳雍正九年改明寶坻之梁城千戶所置海東南九十里為北塘口薊運河自寶坻入屈曲環城而南有七里海匯王家務筐兒港二減河播為口寧車沽二河分注之復納金鐘河東南大沽口界天津海沙緣界入其北北塘口東南盧臺鎮天津河捕通判通永鎮總兵駐有巡司鹽大使北塘口新河莊營城三鎮昌平州衝繁難府北九十里霸昌道駐北路廳駐鞏華城州隸之北天壽山明十三陵在焉西北榆河自延慶入伏而復出左合山水右納南沙河又東龍泉河會絳州營河注之七渡河亦自延慶入其南九渡河牛河並出東北邊牆西首廟兒港口東至糜子峪口汛四橫嶺路鎮邊城常峪城白羊口又訖慕田峪口汛一黃花路湯山藺溝行宮二港泉營牛房屯沙屯高麗營藺溝前營前屯皂角屯凡九鎮榆河驛州治及迴龍觀二順義衝難府東北六十里隸北路廳北牛欄山白河自懷柔入逕東麓合懷河其東狐奴山漒漒河出焉一名箭桿河絳州營河出縣西納牛河又榆河自大興入三家店南石槽行宮二二鎮漕河營楊各莊縣驛一密雲衝繁難府東北百三十里隸北路廳縣南密雲山東九松山舊曰九莊嶺西有沽河自灤平入合白馬關河是為白河右出一支津潮河亦自灤平入合湯河又納乾塔河側城西南來會俗亦曰潮白河潮河營提督駐古北口關副都統巡司駐西營二石塘路石匣城汛二潮河川白馬關口東營二曹家路牆子路汛五司馬台黑峪關吉家營楊家堡鎮羅關有劉家莊羅家橋要亭莊三行宮鳳皇石匣二驛懷柔衝繁府東北百里隸北路廳髻山祗園寺行宮二石河出其東下流為洳河白河自密雲入其支津亦自縣入納