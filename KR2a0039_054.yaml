水自十字河來會錯出復入邑故澤國康熙末漳南徙雍正初滹東徙怡賢親王復濬各水口築隄設斗門閼內外水出入積潦始消光緒中滹沱復淤塞半為平陸有百尺口廢巡司縣驛一深州直隸州簡隸清河道明屬真定領縣一雍正二年升以正定之武強饒陽安平來隸衡水還屬正定北距省治二百八十里廣百四十里袤百六十里北極高三十八度三分四十秒京師偏西初度四十七分領縣三州境自古病河漳二水河漳先後他徙滏滋亦不甚橫惟滹沱於乾隆十九年自束鹿分支潰入同治七年復北徙自安平入諸故道並淤有驛武強簡府東五十里南武強山下有淵滏陽自武邑入至小范鎮北奪滹沱故道道光初滏滹同溢有廢亭子龍冶二河有驛驍陽疲繁難州東北六十里乾隆初知縣侯王玉以滹為患濬新溝七同治中唐世祿復疏經流三支渠八並注獻之古洋河逾年復決安平知縣吳恩慶築堤首郭村訖秦王莊滹滋始分今滹沱中南二支自州入而古唐河自蠡入半淤有驛安平簡州西北五十里滹沱中南二支並自深澤入豬龍河自祁入其支津石河湮有驛定州直隸州衝繁疲難隸清河道明領二縣雍正二年升十二年以保定祁州之深澤來隸新樂還屬正定東北距省治百五十里廣百四十里袤二百里北極高三十八度三十二分三十秒京師偏西一度二十一分領縣二中山城內今設鐘鼓樓北有唐河自唐入始為患乾隆中南奪小清河嘉慶中復北奪小清河為今瀆南有嘉河自曲陽入沙河自新樂入資河同治十年南徙錯出復入會資河自深澤緣界唐沙各故道及木刀溝並涸有永定驛鐵路曲陽簡州西北六十里西北恆山古北嶽順治末改祀於山西渾源恆水出其北谷合三會河唐河納縣北馬泥河錯入西北沙河自阜平入合平陽河左得圓覺泉諸水長星溝出西北孔山側城東南合曲逆溪靈河自是曰孟良河縣驛一深澤簡州東南九十里雍正十二年自祁州來隸滹沱滋並自無極入滹歧為三北為經流滋舊納支津木道溝涸乾隆初決趙八莊尋塞復濬官道溝導城西瀝水東注安平縣驛一
