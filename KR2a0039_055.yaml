body:
  text: 清史稿卷五十五志三十地理二奉天奉天禹貢青冀二州之域舜析其東北為幽營夏仍青冀商改營州周幽州明遼東都指揮使司清天命十年三月定都瀋陽天聰八年尊為盛京順治元年悉裁明諸衛所設內大臣副都統及八旗駐防三年改內大臣為昂邦章京給鎮守總管印康熙元年改昂邦章京為鎮守遼東等處地方將軍四年改鎮守奉天等處地方將軍光緒三十三年三月罷將軍置東三省總督奉天巡撫改為行省北至洮南與黑龍江界南至旅順口海界東南以鴨緑江與朝鮮界西至山海關與直隸界東至安圖與吉林界廣一千八百里袤一千七百五十里北極高三十九度四十分至四十四度十五分京師偏東四度至十二度宣統三年編戶一百六十五萬五百七十三口一千六十九萬六千零四共領府八直隸廳五廳三州六縣三十三案盛京天聰五年因明瀋陽衛城增修城周九里三百三十二步高三丈五尺厚一丈女牆高七尺五寸𣛀口凡六百五十一門八東之左曰撫近右曰內治南之左曰德盛右曰天祐西之左曰懷遠右曰外攘北之左曰地載右曰福勝門各有樓闉加之角樓四城之中為大政殿太宗聽政之所也殿西為大內南向曰大清門門內曰崇政殿殿前東飛龍閣西翔鳳閣崇政殿直北為鳳凰樓樓北清寧宮宮之東曰衍慶宮關睢宮西曰永福宮麟趾宮鳳凰樓之前東為師善齊齊南日華樓西協中齊齊南霞綺樓崇政殿東頤和殿殿後介祉宮宮後為敬典閣崇政殿西為迪光殿殿後保極宮宮後繼思齊齊後崇謨閣大內之西文溯閣藏書之所也東南太廟銀庫在大政殿南織造庫在大內南戶部禮部工部在銀庫東刑部兵部在織造庫西御史公署在城東北隅其外關城則康熙十九年建高七尺五寸周三十二里四十八步門八東之左曰小東關右曰大東關南之左曰大南關右曰小南關西之左曰大西關右曰小西關北之左曰小北關右曰大北關關城內南為天壇東為地壇為堂子西南隅為社稷壇為雷雨壇東南隅為先農祠為藉田藉田西南隅設水門二導小瀋水自門出焉下流注於渾河其名山為醫巫閭松嶺其巨川為遼河渾河其重險山海關鳳凰城威遠堡其船路自營口西南通天津南通之罘東南通朝鮮仁川其鐵路內屬者營榆屬日者俄築東清枝路其電線西通天津西南旅順東南鳳凰安東東北吉林奉天府衝繁疲難總督兼將軍民政提法交涉度支鹽運司勸業道副都統駐順治十四年四月於盛京城內置府設府尹光緒三十一年八月裁府尹設知府為奉天省治西南至京師一千四百七十里廣八百七十里袤九百九十里北極高四十一度五十一分五十秒京師偏東七度十五分領廳一州二縣八承德衝繁疲難倚明瀋陽中衛康熙三年置縣附府福陵在東二十里天柱山昭陵在西北十里隆業山有副都統兼二陵守衛大臣渾河在南即瀋水自撫順入西南入遼中左受高素屯白塔鋪于家臺河右受馬官橋萬泉河萬泉亦稱小瀋水東北大清山蒲河所出西南流徑永安橋入新民境永安橋崇德六年建初太祖定瀋陽以西路沮洳命旗丁修疊道百二十里直抵遼陽太宗復建此橋行旅便之舊設驛四西老邊通新民北懿路通鐵嶺東噶布拉村通興京南十里河即明虎皮驛通遼陽鐵路三京奉東清安奉京奉鐵路行境內六十里車站二曰馬三家曰瀋陽在小西關外即京奉全路尾站商埠光緒二十九年八月中美約開遼陽州繁疲難府南百二十里明定遼中衛兼置自在州天命六年三月克遼陽四月遷都於此十年移瀋陽順治十年設遼陽府遼陽縣附郭十四年府移縣來隸康熙三年六月縣升為州仍隸府有城守尉南千山山脈東自懷仁老嶺入為遼東半島之脊山南之水獨行入海遼東山脈主峰也北太子河自本溪入西流至遼中境迤南入海城左受細河藍河湯河沙河鞍山河右受十里河渾河枝水國語曰塔思哈河舊設驛三曰迎水寺浪子山甜水站商埠光緒三十一年中日約開有東清鐵路復州繁疲府南五百四十里明為復州衛天命七年三月復州降康熙三年併入蓋平雍正四年分蓋平地置復州廳十一年改為州隸府有城守尉州境多山西與西南皆海其海曰復州灣北浮渡河南復州河左受欒古河皆西入海東沙河清水贊子碧流右受弔橋河皆南入金州長興島州判在西南百四十里海中光緒三十四年置其東北娘娘宮港岸曰東崖西崖商船出入海道咽喉也水門子巡檢光緒三十二年置舊設鋪司四北核桃哨李官墳通蓋平南麻河鋪欒古城通金州有東清鐵路撫順衝繁疲難府東八十里明撫順千戶所天命四年克撫順光緒二十八年分承德縣地設興仁縣附府三十三年移治撫順城劃興京西北地入之更名仍隸府東薩爾滸山鐵背山皆天命四年破明兵處南渾河南北二源自興京入合流西左受章黨馬郡丹塔兒峪拉古河右受溫道柳林金花樓河入承德東有營盤市鎮舊設驛一薩爾滸南奉撫運煤鐵路西南姚千戶屯安奉鐵路開原繁疲府東北三百里明洪武二十年置三萬衛於元開元路故城西二十一年徙此改開元為開原永樂七年兼置安樂州天命四年六月克開原康熙三年六月置縣隸府有城守尉東北黃龍山西北遼河自康平入左納馬鬃亮子河南清河右受碾盤河扣河又南沙河皆西入遼河東南柴河西入鐵嶺境又東南英額河西南入興京邊門三北馬千總臺東北威遠堡東南英額舊設驛一又有道東南經石人溝至山城子西經英城子達法庫門東經威遠堡門至西豐號四達通衢有東清鐵路鐵嶺衝疲府北一百三十里明置鐵嶺衛天命四年七月克鐵嶺康熙三年六置縣隸府有防守尉遼河在西自開原東南流入屈西南流入法庫境其旁多水泊曰蓮花泡葦子五角蓮子樂子諸湖瀰漫十里土人呼遼海有遼海屯北柴河南范河又南懿路河皆西入遼河舊設驛一商埠中日約開有東清鐵路海城繁疲難府南二百四十里明置海州衛天命六年海州降順治十年十一月置海城縣隸遼陽府十四年四月改隸西六十里有牛莊防守尉西南唐王山遼河在西渾河自遼中入曰蛤蜊河左匯太子河西流入之名三岔河北土河鞍山河西入太子河南入海州河西入遼河三岔巡司康熙二十一年置駐牛莊西鄉三家子石佛寺等處舊有河道繞流入遼後淤塞光緒三十四年開濬故河涸出良田三十六七萬畝東南有析木城市鎮舊設鋪司四西南營口南大石橋接蓋平北鞍山站接遼陽東二道河入岫巖有東清鐵路蓋平繁疲府西南三百六十里明置蓋州衛天命六年三月蓋州降康熙三年六月置縣隸府有城守尉又西南六十里有熊嶽防守尉故遼城也舊駐副都統後裁東棉羊山縣東南諸山皆發脈於此西瀕海曰蓋州灣北淤泥河南蓋州熊嶽河浮渡諸河皆西流入海東南碧流河即畢利河出布霧山南流入復州舊設鋪司三西北沒溝營北大石橋南熊嶽城有紅旗廠藍旗廠吳家屯三鹽場有東清鐵路遼中繁難府西南一百四十里明定遼中衛右衛地光緒三十二年七月分新民遼陽海城地設治阿司牛彔鎮尋劃承德西南境增入置縣隸府遼河在西有冷家口支流西南入盤山曰分遼水亦曰減河正流南入縣境又西柳河南入分遼水又西鷂鷹河支津南入柳河東蒲河自新民入南入渾河又東南太子河支津二入之西南遼河西達都牛彔縣丞駐光緒三十三年置本溪府東南一百二十里明為清河城光緒三十二年分遼陽興京鳳凰地設治本溪湖置縣隸府南摩天嶺一名太高嶺山脈東連老嶺西接千山其北細河即萬流河北流入遼陽其南草河賽馬集河南流入鳳凰南太子河南北二源自懷仁興京入合流西入遼陽東清河南入太子河賽馬集巡檢光緒三年置屬鳳凰廳三十二年來屬舊設連山關驛有安奉鐵路金州廳衝繁疲難府南七百二十里明置金州衛雍正十二年置寧海縣隸府道光二十三年改金州廳仍隸府有副都統寄治承德廳境萬山環抱東西南北皆海惟東南一隅陸地連復州成半島形沙河清水贊子碧流諸河在東北入海有貔子窩市鎮旅順口在西南自旅順循半島以西歷遼河口大小凌河口至山海關為渤海岸以東歷碧流河口莊河口大洋河口至鴨緑江為黃海岸旅順鐵山角與山東登州頭對峙為渤海口門有舊水師營城舊設鋪司一石河驛商埠光緒二十三年中俄約開海關在大連灣有東清鐵路法庫直隸廳衝繁難省西北一百六十里明三萬衛地康熙元年設法庫邊門防禦光緒三十二年分新民府及開原鐵嶺康平三縣地設治法庫門置廳直隸行省法庫山在南遼河自鐵嶺入北流屈西流徑廳南入新民其津渡處有三面船市鎮西沙河南入遼河又西秀水河南入新民有秀水河市鎮廳城北門仍舊邊門邊門外道路作三叉形西行至彰武北行由桃兒山馬奇溝赴康平可至吉林伯都訥東北行由齊家店公主屯赴昌圖可至吉林長春北邊衝要也商埠中日約開錦州府繁難明置廣寧中左右屯三衛隸遼東都指揮使司崇德七年三月克錦州康熙三年置廣寧府並縣為治四年改置徙治錦省西南四百九十里廣五百三十里袤百七十里北極高四十度九分京師偏東四度三十九分領州二廳二縣三錦衝繁疲難倚明置廣寧中屯衛及左屯右屯衛康熙元年七月改錦州為錦縣隸奉天府三年六月改隸廣寧府十二月罷廣寧置錦州縣附府舊駐副都統光緒三十四年裁有協領松山杏山塔山在南皆崇德七年破明兵處紫荊山在東為縣境諸山冠南瀕海東大凌河西小凌河右受女兒河皆南入海西南天橋廠巡檢雍正元年置又西南海濱有地伸出海中如三角形曰葫蘆島島勢向西環抱成一海灣光緒三十四年勘為通商港舊設驛二小凌河十三山京奉鐵路行境內一百一十里車站四錦州雙陽甸大凌河石山站鹽場八上坎天橋廠大東山白馬石邰子屯頭溝四溝沙溝卡倫二高家屯天橋廠錦西廳繁難府西九十五里明廣寧中屯衛地光緒三十二年分錦縣西境置江家屯廳尋更名三十三年隸府東大虹螺小虹螺山山東七里河南入海女兒河導源直隸朝陽東流入邊徑廳北迤東北流又東流入錦縣北松嶺邊門東北虹螺峴市鎮舊設高橋驛京奉鐵路車站三連山高橋女兒河盤山廳衝疲難府東一百七十里明廣寧盤山驛光緒三十二年分廣寧縣地及盤蛇驛牧廠地置廳隸府南瀕海分遼水自遼中冷家口西南入徑廳南入海西南沙河東沙河西沙河皆南入海錦營鐵路自廣寧溝幫子站分支入境東南入營口長百二十餘里車站三胡家窩棚雙台子大窪鹽場五藍石鰲西夾信南夾信二道磧二龍江義州繁疲難府北九十里明義州衛天命七年正月克義州崇德元年以封察哈爾康熙十四年察哈爾叛討平之六十一年設通判雍正十一年置州隸府有城守尉東北英歌龍灣山東南望海山西北崑崙山西南大嶺小嶺大凌河導源直隸朝陽東流入邊徑州北屈南流入錦縣細河清河導源直隸阜新合流南入大凌河小凌河亦導源朝陽東流入邊徑州西南迤南流入錦縣楊樹溝河南入小凌河北有九官台清河白土廠三邊門舊設鋪司四南大嶺關隆祉七里河東大榆樹皆通錦縣寧遠州衝繁疲難府西南一百里明置寧遠衛順治元年克寧遠康熙三年置州隸廣寧府尋改隸府有城守尉西北青山西南望夫東首山南瀕海寧遠西河寧遠東河在城南合流南入海又西東沙煙台東關站六股諸河皆南入海有釣魚台海口海中島有桃花菊花即覺華島島西南小島二曰小張山大張山相距間水勢深闊足容大戰艦島岸山可建炮台光