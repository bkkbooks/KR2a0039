body:
  text: 清史稿卷五十六志三十一地理三吉林吉林古肅慎國之域明初奴兒干都司地領衛百八十四所二十後為長白山三部扈倫四部所屬輝發烏拉葉赫兼有哈達北境及東海部地清初建滿洲城於俄漠惠之野鄂多理城順治十年置昂邦章京及副都統二人鎮守寧古塔康熙元年改寧古塔將軍十五年徙改吉林將軍先是十年徙副都統一人駐吉林三十三年徙伯都訥雍正三年復置吉林阿勒楚喀副都統五年增三姓副都統光緒七年置琿春副都統吉林賓州五常三廳八年吉林廳升府後增長春新城依蘭各領縣有差三十三年建行省改將軍為巡撫盡裁副都統等宣統三年定西南西北東南東北四路為四道凡轄府十有一州一廳五縣十八西至伊通州界盛京東至烏蘇里江界俄領東海濱省北至松花江界黑龍江南至圖們鴨緑江界朝鮮廣二千四百餘里袤千五百餘里北極高四十一度三十分至四十五度四十分京師偏東九度八分至十三度十分宣統三年編戶七十三萬九千四百六十一口三百七十三萬五千一百六十七案吉之舊界東至寧古塔八百餘里又烏扎庫邊卡七百餘里又松阿察河三百里又千餘里至海凡三千里有奇其東北至三姓千二百里又五百餘里富克錦又七百餘里烏蘇里江口又二千餘里至廟爾實四千四百里有奇又自富克錦逾混同循黑龍江東界北至外興安嶺二千里有奇又自琿春而東至海參崴又東七百里有奇錫林河其中部落若費雅居圖庫魯鄂古二河之間在混同江北海濱若費雅喀居額濟第河西若貢豹居約色河北若奇雅喀喇居約色河南並混同江東南海濱其自混同江口西至黑勒爾則濟勒彌部居之即金史之濟勒敏自黑勒爾西至阿吉大山沿混同江兩岸則額登喀喇部居之即不剃髮黑斤自阿吉大山西至伯利則赫哲喀喇居之即剃髮黑斤並久隸版圖比於編戶咸豐八年愛琿之約以烏蘇里江口為新界失地二千餘里然於吉只東北一隅十一年北京之約自烏蘇里江口泝流至松阿察河逾興凱湖西至白棱河口又逾大綏芬河而南至瑚布圖河口又南而西至圖們江口以東舊界屬俄以烏札庫邊卡瑚布圖河口為新界又失數千里遂無復有江口入海為吉轄境者光緒十二年黑頂子勘界定琿春之海口屬俄則圖們江口內去海三十里土字界碑為中俄新界矣又東北海中庫葉島一曰黑龍嶼廣三四百里袤二千餘里西北圖克蘇圖山山陰社瓦狼陽費雅喀部南有阿當吉山山東嵩闊洛南俄倫春部又南雅丹部並天命中內附遼遠不克時至歲以夏六月遣使至寧古塔東北三千里普魯鄉貢獻頒賚有差後屬三姓今亦為俄有矣又東南海中蝦夷康熙中屢偕庫葉人至混同江境內貢貂受賞後亦隸日其名山長白北迤者黑山平頂歧為二西支西北迤為色齊窩集張廣才嶺至拉林東支東北迤為哈爾巴嶺老松嶺至綏芬河源復歧一東訖俄東海濱省一東北為察庫蘭嶺哈達嶺阿爾哈山其巨川松花混同嫩江牡丹烏蘇里圖們諸江其驛路西達盛京開原北齊齊哈爾西南達琿春電線東達海參崴北齊齊哈爾西南達奉天吉林府繁疲難總督駐奉天巡撫兼副都統民政交涉提學提法度支司勸業道駐明烏拉等衛後屬扈倫族之烏拉部本吉林烏拉一曰烏拉雞林又名船廠清初隸寧古塔將軍康熙十五年徙駐雍正五年置永吉州隸奉天乾隆十二年改吉林廳仍隸將軍光緒八年升為吉林省治領伊通敦化後削西南至京師二千三百里距盛京八百二十餘里隸西南路道廣四百九十里袤五百餘里北極高四十五度四十九分京師偏東十度二十七分東團山尼什哈龍潭西南溫德亨亦望祭山有殿祀長白雍正十一年建壽山東南松花江自額穆入右合海青溝左溫德亨河東北徑城東又北右合莽牛四家子左鼇龍興隆河緣舒蘭界入德惠西南驛馬河即伊勒們自磐石緣界合岔路河又北緣雙陽界西北木石河並從之打牲烏拉城北七十里本烏拉國舊曰布特哈烏拉太祖先後克其宜罕山臨河金州遜扎塔諸城遂平之柳邊四圍長六百二十二里柵高四尺五寸壕寬深各一丈插柳結繩以定內外曰柳條邊亦新邊東北接舒蘭西南至雙陽農事試驗場桑蠶山蠶林業土山分局松花江官輪局歡喜嶺稽查所商埠光緒三十一年中日約開舊設站五東尼什哈額赫北金珠鄂佛羅西搜登伊勒們官商路四南並溫德河達樺甸官街東南歷大小風門達敦化西南雙河鎮磐石北渡鼇龍達德惠吉長鐵路站九吉林孤店子樺皮廠趙家店土門嶺馬鞍山營城子下九台驛馬河長春府繁疲難省西二百四十里古扶餘國地明初三萬衛後屬蒙古科爾沁部清初屬蒙古郭爾羅斯前旗曰寬城子嘉慶五年於長春堡置長春廳道光五年徙治仍舊名光緒十五年升宣統元年設西南路分巡兵備道駐府廣三百二十里袤一百七十里北極高四十三度四十一分京師偏東八度三十三分西南白龍駒山俄築東清鐵路採石光緒三十四年與日本交涉封禁西人謂世界最古石山與英阿爾蘭為二西龍泉大青對龍南伊通河自其州邊門入徑城東又北左會新開河東北緣農安界徑潘家嶺入德惠東驛馬河自雙陽緣界右岸及霧海河並北從之朱家城照磨光緒十六年由農安徙官商路四南入伊通門達其州東南十里堡達雙陽西萬家橋達奉天懷德北萬寶山鎮達農安吉長鐵路自吉林歷德惠入站四飲馬河卡倫長春頭道溝在府西北與東清接日俄戰後長春以北屬俄之東清以南屬日本南滿鐵道會社俄站寬城子曰長春驛商埠光緒三十一年中日約開伊通州衝繁難省西偏南二百八十里渤海長嶺府地明初塔山雅哈河伊敦拉克山發河等衛後屬扈倫族之葉赫部雍正六年由吉林鑲黃正黃二旗各撥一旗駐之嘉慶十九年置伊通河巡司光緒八年為州屬吉林宣統元年直隸二年降隸西南路道北極高四十三度四十分京師偏東八度五十分西南龍潭山西摩里青馬鞍北勒克東尖山東南大星嶺其東板石屯伊通河出西北徑城東右合伊巴丹河出邊入長春西小伊通河自奉天東平錯入為新開河入懷德太平河從之又西東遼河自西豐入右合大小雅哈河入奉化昭蘇太及條子河亦入焉左納陽斯河一曰赫爾蘇河又西清河入為葉赫河入開原其瞻河錯入從之赫爾蘇州同光緒二十八年由磨盤山徙舊設站五東自雙陽蘇瓦延入境六十里伊巴丹又西百里阿勒坦額墨勒即大孤山站又西六十里赫爾蘇又八十里葉赫又五十里蒙古霍羅即蓮花街站官商路四北達長春東南營城子達磐石西赫爾蘇站達奉天奉化西南蓮花街達昌圖濛江州省南四百六十里明鄂爾琿山所後屬訥音部光緒三十四年析吉林極南地置宣統元年隸西南路道北那爾轟嶺南長半城山五金頂子東南頭道江自奉天撫松緣界為湯河口屈北合花園河其西裴德里山頭道濛江出州以此得名右合二道三道水左珠子河來會又東北合那爾轟河其右岸會二道江是為松花江入樺甸官商路四北達樺甸官街至省東北至夾皮溝西達奉天輝南東南湯河口入長白農安縣疲難省西北三百六十里古扶餘國都明置三萬衛清初郭爾羅斯前旗地光緒八年置照磨十五年改仍隸長春宣統元年隸西南路道東臥牛石山紅石砑西太平嶺伏山大青東松花江自德惠入城南伊通河自長春緣界注之西北入蒙古郭爾羅斯前旗舊有蒙古站路共十一站三百九十里長嶺縣省西北五百二十里蒙古郭爾羅斯前旗地曰長嶺子光緒三十三年析農安之農家農齊農國三區置隸西南路道南朱克山團山境無河流北有大漠如瀚海俗呼北海冬夏恆苦風沙惟東南二鄉繁盛新安鎮主簿官商路四東南至長春西北至奉天開通北歷郭爾羅斯前旗達安廣南歷科爾沁達爾罕旗達遼源樺甸縣省南偏東二百七十里明法河衛末屬長白山之訥音部清初禁地光緒三十四年置治樺皮甸子徙樺樹林子宣統元年隸西南路道西北趙大吉山慶嶺西杉松天平南帽山猴嶺東南金銀壁嶺二道江自奉天安圖緣界富爾河合古洞黃泥蒲岑諸水注之為上兩江口又西仍緣安圖及撫松界至下兩江口左岸合頭道江是為松花江合境內柳河五又葦沙色勒河復緣濛江界入右合穆奇河徑城西左會輝發河為大渡口又北右合漂河徑樺皮甸子入額穆側有常山屯扼琿春敦化西至奉天孔道官商路五西至官街折北入吉林北出大鷹溝並達省西南至濛江東至敦化東南延吉洞河入延吉磐石縣省南偏西三百里明扈倫族輝發部清初北境屬吉林南奉天圍場光緒八年置磨盤山巡司隸伊通十三年改州同二十八年為縣隸吉林宣統元年隸西南路道磨盤山東北二里北雞冠東北老茅西大紅石庫勒嶺東南輝發江自奉天海龍亮子河入東北左合石頭富大都嶺右蝦蟆獨木河徑黑石鎮左合朱其呼蘭右大小色力河五道至頭道荒溝入樺甸東北呼蘭嶺驛馬河出西北左合黃河入吉林岔路河從之官商路三北小城子達省城西由朝陽山達伊通東南黑石鎮西達海龍南濛江舒蘭縣省北偏東百六十里明阿林衛地康熙二十年置巴彥鄂佛羅防禦旗員屬烏拉總管宣統元年置於舒蘭站二年徙治朝陽川南隸西南路道南北慶嶺東南玲璫嶺西松花江自吉林緣界西北入德惠卡岔河北入榆樹達之東蘭陵河自額穆緣界入五常東南馬鞍山溪浪河出東北徑鞦韆嶺合呼蘭河從之有巴彥鄂佛羅邊門即法特哈康熙中更名舊設站二舒蘭法特哈南接吉林金珠鄂佛羅北達榆樹盟溫官商路三西南達烏拉街東北水曲達五常東南小城子鎮達額穆德惠縣省北偏西百四十里蒙古郭爾羅斯前旗地舊屬長春宣統二年析長春沐德懷惠二鄉置治大房身隸西南路道南狼洞嶺西團山雙山西南土牛東南松花江自吉林緣界合木石河入新城西北伊通河自長春緣界納驛馬及霧海河從之官商路三南五台達省東岔路口達榆樹西雙山崖鎮達農安吉長東清鐵路雙陽縣省西百九十五里明依爾們蘇完河二衛宣統二年析吉林西界長春東界伊通北界置治蘇斡延隸西南路道西南黑頂子南土頂子將軍嶺光僻山雙陽河出焉東南驛馬河自磐石緣界合杜帶雙陽放牛溝河入長春西北霧海河從之舊設站一蘇斡延官商路三南皇營東南五家子鎮並達磐石北奢嶺口達長春新城府繁疲難省西北省六百里即伯都訥副都統城古扶餘國地明三岔河衛後屬烏拉部嘉慶十五年置伯都訥廳光緒三十二年改隸西北路道廣四百二十里袤一百七十里北極高四十五度十五分京師偏東八度三十七分南大青山鷹山東南松花江自德惠緣界農安又西左岸徑城南又西北左岸蒙古郭爾羅斯前旗界至三岔口會嫩江折東緣黑龍江界右會拉林河自榆樹緣界復緣雙城合灰塘薛家窩鋪河入雙城府境松花環其南北西三面拉林流其東川原廣衍水陸輻輳富庶甲全省舊設站五自榆樹盟溫西北五十里入陶賴昭又西五十里遜札保又四十里伯都又五十里社哩又北八十里伯都訥至松花渡口出境官商路四東北長春嶺達雙城東南集廠達榆樹西渡江歷郭爾羅斯前旗達奉天洮南一由社哩渡江至郭爾羅斯鎮國公府有輪船埠東清鐵路站三蔡家溝石頭城陶賴昭有通松花鐵橋雙城府衝繁難省北五百里明拉林河衛有古城二舊曰雙城子嘉慶十九年置委協領隸阿勒楚喀副都統光緒八年置雙城廳宣統元年改隸西北路道廣二百四十里袤一百四十里北極高四十五度四十分京師偏東九度二十分東南砍戶