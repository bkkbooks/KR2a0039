body:
  text: 清史稿卷五十七志三十二地理四黑龍江黑龍江古肅慎國北境明領于奴兒干都司清初有索倫達呼爾諸部散居黑龍江內外額爾古納河及精奇里江之地天聰崇德中次第征服康熙二十二年征羅剎始設鎮守黑龍江等處將軍及副都統駐江東岸之愛渾城尋並移駐墨爾根三十七年副都統移駐齊齊哈爾三十八年將軍亦移駐遂為省治後增設墨爾根黑龍江呼蘭呼倫貝爾布特哈各副都統光緒末裁省其半改置廳府縣有差三十三年罷將軍設黑龍江巡撫改為行省悉裁副都統各缺變置地方官制宣統三年為道三府七廳六州一縣七擬設之府一直隸廳十一縣五南至松花江與吉林界西至額爾古訥河與俄領薩拜哈勒省及外蒙古車臣汗旗界西南接內蒙古之烏珠穆沁左翼科爾沁右翼中前後各旗界東至松花黑龍兩江合流處仍界吉林北及東北皆與俄領阿穆爾省界廣二千八百餘里袤一千五百餘里北極高四十五度五十分至五十二度五十分京師偏東三度四十分至十六度二十分案黑龍江舊界楊賓柳邊紀略云艾渾將軍所屬東至海西至你不楮俄羅斯界你不楮即尼布楚今俄名捏爾臣斯克艾渾將軍即黑龍江將軍此清初界也自安巴格爾必齊河口即循此河上流之外興安嶺東至于海凡嶺以南流入黑龍江之溪河屬中國嶺以北屬俄羅斯中俄分嶺此康熙二十八年尼布楚條約界也自額爾古訥河入黑龍江處起至黑龍江與松花江會流處止以南以西屬黑龍江省以北以東屬俄羅斯中俄分江此咸豐八年璦琿條約界也尼布楚在安巴格爾必齊河西五百餘里本中國茂明安布拉特烏梁海諸部落地崇德中即為俄羅斯人竊據築城居之以侵掠索倫達呼爾諸部為邊患者三十餘年康熙二十八年定界遂捐以畀俄已蹙舊界地五百餘里矣若外興安嶺以南黑龍江以北以東舊界地殆三千七百里有奇其境內山川部落城屯雖為俄有亦並志之不忘其朔焉外興安嶺為崑崙北出之大幹蓋崑崙山脉南幹為涼州南山為賀蘭山為陰山為內興安嶺北幹為葱嶺為天山為阿爾泰山為墾特山為外興安嶺內外者據黑龍江言之餘若斗色山若楊山若珠德赫山若訥丹哈達拉山若達勒替沙山若阿喇拉山若道斯哈達若察哈彥哈達若茂哈達皆外興安嶺支絡並在江東北水以安巴格爾必齊河為康熙舊界入江之始由此而東曰卓魯克齊河曰烏魯穆河曰格爾必齊河曰呼吉河曰張他拉河曰鄂爾多昆河曰烏爾蘇河曰波羅穆達河曰額爾格河曰巴爾坦河又東少南曰託羅河曰臥諾河曰巴里彥河曰阿蘇河曰淘斯河曰凱蘭河曰阿喇拉河曰大蘭河曰庫哷恩河曰額蘇里河曰多普塔拉河又南曰精奇里江為諸河最源出外興安嶺極北之地東南流轉西南流江形如弓有烏爾格河託克吉魯河烏爾替河克德畢河自西北來注之有阿爾吉河巴里木河塔烏爾堪河畢奇勒圖河欽都河寧尼河額勒格河牒葉普河鐵牛河西里木迪河察勒布克爾河英肯河們臥勒河莫昆河巴沙河楊奇尼河密奇訥河翁額納拉河巴里木邁庫里河託莫臥河伊羅河昆貝河屯布河迪音河自東北來注之黑龍江水色微黑精奇里江獨黃又稱黃河又南而東曰謨里爾克河曰博屯河又南而東曰牛滿河源出外興安嶺嶺東舊界吉林西南流東合烏旺那河烏莫勒德河攸瓦爾奇河敖拉河塔拉耐河塔里木河薩公那河吉克河西合臥爾喜河卓羅奇河木爾木河楊奇里河珠奇河寧那河伊莫勒河楚克河牛滿河亦稱斗滿河又南而東曰哈拉河曰阿拉河曰塔拉木河曰庫勒圖爾河曰庫木弩河曰珠春河曰格林河曰胡裕魯河曰蘇魯河曰伊圖里河曰畢占河以上諸河並南入黑龍江畢占河以南舊為吉林境其部落則精奇里江東西為索倫部達呼爾部有索倫村在精奇里江額爾格河之間南距黑龍江城五六日程欽都河西及巴爾坦河東為使鹿鄂倫春部自額蘇里河口溯江而西至額爾格河口為庫爾喀部其城屯有曰鐸辰城阿薩津城多金城烏魯蘇穆丹城郭博勒屯博和哩屯噶勒達遜屯穆丹屯都孫屯烏爾堪屯德篤勒屯額蘇哩屯額爾圖屯並在江北岸東岸雅克薩城在黑龍江城西北一千三百餘里城東即提咸河灣城本索倫部築嗣因博木博果爾等據城以叛崇德四年討平之墟其城順治初年羅剎竊據又築之康熙二十五年復克其城二十八年界約雅克薩之地俄羅斯所治之城盡行毀除今其地俄名阿勒巴沁云宣統三年編戶二十四萬一千零一十一口一百四十五萬三千三百八十二其名山特爾根佛思亨興安嶺黑省之山皆脈自車臣汗部肯特山入境則特爾根折而東而南綿亙嫩江黑龍間者以興安嶺目之至混同黑龍兩江將會處乃起佛思亨內興安嶺自索嶽爾濟山入境為哈瑪爾為室韋為雅克為西興安嶺為伊勒呼里分支西北迤為治吉察正支又東北為嫩江源又東南為庫穆爾為東興安嶺西出一支為和羅爾又西曰烏雲和爾冬吉正支又東迤為小興安嶺又分支東北為老爺嶺正支東盡於佛思亨其巨川黑龍精奇里松花烏蘇諸江其驛路東北逾興安嶺達海蘭泡電線自齊齊哈爾至海蘭泡南達吉林鐵路齊昂其屬俄者東清北段龍江府衝繁疲難巡撫民政提學提法司駐即齊齊哈爾舊曰卜魁明朵顏衛地光緒三十一年設黑水廳三十四年改置府為黑龍江省治西南至京師三千三百餘里廣六百六十餘里袤六百六十餘里北極高四十七度二十七分京師偏東七度三十二分北敖寶山西五道梁子碾子山廉家大岡東北嫩江自訥河入南流至府城東北東分一支為塔哈爾河西南受阿倫河音河徑城西南距城約五里曰船套康熙中嫩江水師戰船泊此光緒三十三年闢為商埠由西南江口斜開引河縈泗城西沿江築長隄一小隄二嫩江又西南納雅爾河入安達東胡裕爾河自拜泉入西流入塔哈爾河一支南出歧為九道溝西南入安達舊設站十在府境四卜魁特穆德赫塔拉爾寧年西路台十七在府境三七家甘井子那奇希官商路二東南東官地屯達海倫小五明馬屯達景星鎮卡倫三曰莽鼐曰綽羅曰博爾齊勒又和倫部卡倫三曰拉哈鄂佛羅曰溫德亨曰蘇克台蘇蘇鐵路二齊昂東清商埠光緒三十一年中日約開呼蘭府衝繁難省東南八百四十里即呼蘭副都統城明為呼蘭山衛光緒三十年移呼蘭廳治呼蘭城升為府廣一千二百餘里袤四百二十餘里北極高四十六度十二分京師偏東九度五十九分領州一縣二西南松花江自肇州入東流入巴彥呼蘭河自蘭西入南流大堿溝自西來注之屈東南徑府城南入松花江東漂河自巴彥入又東少陵河則綽羅河亦自巴彥入右受韓溝河南流同入松花江北濠河自綏化入左受大荒溝河西流入呼蘭河府境據呼蘭河下游水域松花襟其南長河支港足資灌溉土味膏沃號為産糧之區雍正十三年後移屯設莊日事開闢咸豐同治之際直隸山東遊民流徙關外者競赴屯莊傭工積日既久私相售賣占地日廣聚徒日繁歷任將軍乃奏辦民墾增改民官行省規模府為先導焉舊設台三察哈和碩呼蘭城即府城新安官商路二西北經蘭西赴省城東北經巴彥赴綏化有康家井朝陽堡文報局舊設卡倫四曰珊延富勒曰綽羅河口曰諾敏河曰布勒嘎哩西南東清鐵路對青山車站南六十里至哈爾濱呼蘭河口有輪船埠巴彥州繁難府東一百五十里原名巴彥蘇蘇光緒元年設呼蘭廳三十年改隸府北青頂山雙牙西少陵泥馬爾東北黑山綿亙百餘里與木蘭青山接故布特哈人虞獵場也又名蒙古爾山呼蘭民屯自山前後始南松花江自府境入東入木蘭北少陵河自東興鎮入西流納布爾嘎里河小柳樹河朱克特河屈西南漂河分支曰韓溝東流注之為綽羅河口又東五嶽河出棗拉拉屯西流屈南徑府城西入松花江東大黃泥河左會小黃泥又東小石頭河皆南入松花江北濠河由餘慶入合拉三太河大荒溝入府境西北興隆鎮州判舊設台一呼蘭廳即州城官商路三東至木蘭北至餘慶北由小猪蹄山屯西行經興隆鎮達綏化五嶽河口有輪船埠蘭西縣衝繁難府西北一百里原名雙廟子光緒三十年置隸府東呼蘭河自綏化緣海倫界會通肯河入屈南右大堿溝河左濠河入府境官商路四東榆樹林達府北至青岡西達肇州西北至安達有小榆樹鎮木蘭縣疲難府東二百五十四里明木蘭河衛光緒三十年置隸府北青山山勢與巴彥黑山接舊稱呼蘭青黑二山西北駱駝子硯台蒙古山東北有玉皇閣山皆在縣北境南松花江自巴彥入東入大通西白楊木河又西大小木蘭達河左會鎮陽河又西萬寶柳樹楊樹大小石頭諸河皆南入松花江東頭道河左會二道河南入大通北木蘭鎮巡檢協領駐官商路三西至巴彥東至大通有五站文報局一循大木蘭達河北東興鎮達綏化綏化府衝繁難省東南七百六十里原名北團林子隸呼蘭副都統光緒十一年設綏化廳是時副都統治所號中路呼蘭廳號南路廳城號北路名為呼蘭三城三十年升廳為府廣三百餘里袤一百餘里北極高四十七度三十八分京師偏東十度五十六分領縣一東北綏額楞山尼爾吉克音二河出呼蘭河自餘慶入各緣界右注之西流右受尼爾吉克音河左受津河入蘭西南濠河亦緣界從之東北上集廠駐經歷官商路五北赴海倫南出巴彥西至蘭西東津河鎮赴餘慶東北雙河鎮達鐵山包餘慶縣繁難府東一百里原名餘慶街光緒十一年設分防經歷屬綏化廳三十年改置隸府南青山黑山山脉跨木蘭巴彥兩州縣界北呼蘭河導源鐵山包達里代嶺西麓西流入境又西入府濠河導源極南沈萬合屯西流入府南格木克河出上窖子北至郭吳屯屈西徑縣治南又西北入呼蘭河東拉列罕安拜穩水鐵山包尼爾吉諸河皆北入呼蘭河又東北額伊琿河西南流至王家堡合歐肯河大伊吉密合小伊吉密河皆入呼蘭河官商路四西赴府東赴鐵山包北出五道岡西行達海倫東行達鐵山包一東南黎家屯南行至東興鎮又便道南渡格木克河雙銀河濠河達巴彥民船可溯呼蘭河至鐵山包運煤海倫府繁疲難省東南六百里即通肯副都統城光緒三十年以通肯海倫河新墾地置海倫廳三十四年升府領縣二東北內興安嶺通肯河出西麓西流右受十一道至八道溝屈南流札克河東來注西南七道溝自胡裕爾河分出南流來注南海倫河自東來注三道二道頭道污窿河自西來注又南會呼蘭河呼蘭河南自綏化入合通肯河克音河來會入呼蘭境北胡裕爾河緣訥河界入之府境居海倫河北有通肯協領官商路三西至拜泉西南至青岡南至綏化東南行經綏化上集廠達餘慶又西北海布道至布特哈北海畢道至畢拉爾協領地二道皆宣統中開商船由呼蘭河入通肯河至女兒城青岡縣疲難府西南二百六十里原名柞樹岡柞樹一名青岡柳縣以此名光緒三十年置隸廳東通肯河自拜泉入南流與府分界入呼蘭河呼蘭河自府會通肯河入西南流與呼蘭分界入呼蘭境官商路四東北駱家窩棚赴府西大林家店赴省城西南白家店至安達南李春芳屯達蘭西又縣南呂馬店東南何小懷屯為省城東路站道由此赴興京拜泉縣繁難府西北一百六十里原名巴拜泉即那吉泊土名大泡子縣以此名光緒三十二年置隸廳三十四年改府仍隸東通肯河自府境入南流與府分界右受七道六道五道四道三道二道頭道溝入青岡北胡裕爾河自訥河入受印京河西入龍江南雙陽河東徑縣南又東瀦為松津泊巴拜泉在雙陽河南其東南白水泉西南馬鞍泊白華泊皆平地