霍托又東入呼倫境廳境少平原森林之利獨饒有土城因起伏西去數千里直至木蘭圍場又西至歸化城往時流人亡去不識途多循此入關蓋即金源時長城汪古部所居者也東清鐵路自呼倫鑿興安嶺入境橫貫中部入龍江有興安嶺博爾多雅魯巴里木哈拉蘇札蘭屯成吉思汗七車站甘南直隸廳光緒三十四年擬設治富拉爾基在省城西南嫩江西有雅爾河支津北有東清鐵路庫勒站由此渡嫩江達昂昂溪富拉爾基屯開闢最先生聚日繁蓋鐵路交通之效武興直隸廳光緒三十四年擬設治多耐站在省城南二百零五里嫩江東路四五里與溫托歡他拉哈兩站首尾相接南北長東西窄成一半規長梭形向為杜爾伯特旗境光緒三十二年設局放荒五萬六千四百餘晌呼瑪直隸廳光緒三十四年擬設治西爾根卡倫宣統二年試辦設治移呼瑪爾河口北岸隸璦琿道在道治北五百餘里東黑龍江呼瑪爾河出伊勒呼里山內興安山脈向北行者也東行者伊勒呼里阿林四源合東窩集倭勒克庫勒都里綽羅呼爾吉布列斯屈南右受札克達奇河又東入黑龍江黑龍江東流徑安羅卡倫北屈南流下至呼瑪爾河口沿西岸設卡倫六曰依西肯曰倭西們曰安干曰察哈彥曰望哈達曰呼瑪爾下游接西爾根卡倫屬黑河府瀕臨河口駐協領統鄂倫春人漠河直隸廳光緒三十四年擬設治漠河隸璦琿道在道治西北千餘里漠河出治雞察山東北入黑龍江南額穆爾河東北流左受吉里瑪那里多什都克河屈東流右受大札丹庫爾小札丹庫爾入黑龍江又南旁烏河東南流左受巴達吉察右受札克達奇屈東北右受布爾里河沽里干河入黑龍江又南有呼瑪爾河上源其南為伊勒呼里阿林乃內興安嶺自西轉東橫幹脈也山南即嫩江源西有額爾古訥河入黑龍江口為璦琿與呼倫兩屬交界即中俄以江為界之起處沿黑龍江南岸設卡倫八曰洛古河曰訥欽哈達曰漠河即廳治曰額蘇里曰巴爾力曰額穆爾曰開庫康曰安羅有木廠一處黑龍江由此轉南流安羅卡倫下游接西岸之依西肯卡倫屬呼瑪廳漠河金礦光緒十四年經始開採庚子入於俄光緒三十二年始行收復漠河為省北屏障黑龍江轉運專落俄人之手光緒三十四年議由嫩江之源開闢山道卒以工費浩繁中止故礦業衰歇而設治亦難也室韋直隸廳光緒三十四年擬設治吉拉林隸呼倫道在道治北四百餘里額爾古訥河右岸對岸為俄臥牛槐敖洛氣等屯疆域額爾古訥河自臚濱之阿巴該圖北流至呼倫之庫克多博東北流合根河特勒布爾胡裕爾和奇珠魯克圖即約羅珠爾格特依布魯色木特勒克諸河皆自東南山來注此在吉拉林以南者也中根河最大出內興安嶺西北流兩岸沃野膏原為殖民善地額爾古訥河徑廳治西又東北流有哈拉爾即吉拉林河眉勒喀即尼布楚約內之河遜河額爾奇木畢拉爾畢拉克産古爾布奇吉林子阿木毗牛爾珠爾干溫諸河皆自東南山來注額爾古訥河至是屈西北流有烏瑪大吉達小吉達復有小河入皆自東南來注再折而東北流有伊穆河復有小河二十餘皆自東南來注此在吉拉林以北者也中牛爾河最大出內興安嶺河口左右有平地兩區田土肥美額爾古訥河自受根河牛爾河水大而急直注黑龍江而吉拉林為適中地故廳治在焉新設防邊卡倫在境內者十有五自庫克多博總卡倫以北曰巴圖爾和碩曰巴雅斯胡郎圖溫都爾曰胡裕爾和奇曰巴彥珠魯克曰珠爾格特依曰莫里勒克曰畢拉爾河曰牛爾河曰珠爾干河總卡倫曰溫河曰伊穆河曰奇乾河曰永安山曰額勒哈達珠爾干額勒哈達為鄂倫春與俄人交易之所尤要道路自吉拉林南至塔爾巴幹達呼山七百餘里其北至珠爾干河三百五十餘里則小徑不通車馬自珠爾干至額爾古訥河口五百五十餘里則懸崖壁立非假道於俄不能飛越根河口新立官渡為華俄商旅必趨之路根河上源有道出西布特哈達墨爾根額爾古訥民船祗達吉拉林以下溜急民船可順流而下不能溯流而上非輪船不為功冬令河上可駕駛冰橇每一日夜行三四百里舒都直隸廳光緒三十四年擬設治免渡河隸呼倫道在道治東二百八十餘里河出阿爾奇山北合札郭河入海拉爾河廳東即內興安嶺東清鐵路經廳南有免渡河車站由廳境鑿興安山洞入西布特哈境佛山府光緒三十四年擬設治觀音山隸興東道在道治北瀕黑龍江岸對岸為俄吉春屯北有輔河南有嘉蔭河附府治有小水曰十里河皆東入黑龍江蘿北直隸廳光緒三十四年擬設治托蘿山北隸興東道附郭如璦琿呼倫兩直隸廳之比烏雲直隸廳光緒三十四年擬設治烏雲河隸興東道在道治西北瀕黑龍江岸對岸為俄嘎薩得報屯烏雲河在廳西北入黑龍江車陸直隸廳光緒三十四年擬設治車陸隸興東道在道治西北遜河南原為車勒山卡倫音轉為車陸東臨黑龍江對岸為俄吉滿屯南科爾芬河東北流入黑龍江春源直隸廳光緒三十四年擬設治伊春呼蘭河源隸興東道在道治西南西有布倫山伊春河出東流入湯旺河布倫山西麓即呼蘭河源南札里河東流左合黃泥河報達河入湯旺河又南巴蘭河源在焉鶴岡縣光緒三十四年擬設治鶴立岡隸興東道在湯原縣北鶴立河西有興東墾務公司宣統中擬移駐黑龍松花兩江匯流處額勒密河東地尤沃饒為全省冠
