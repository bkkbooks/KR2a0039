body:
  text: 清史稿卷五十九志三十四地理六安徽安徽禹貢揚及徐豫三州之域明屬南京清順治二年改江南省置鳳陽巡撫及安廬池太巡撫兼理操江軍務並統于淮陽總督六年俱罷十八年設江南左右布政使以左布政轄安慶徽州寧國池州太平廬州鳳陽淮安揚州九府暨徐滁和廣德四直隸州駐江寧康熙元年始分建安徽為省治復置巡撫駐安慶三年江南分一按察使來治五年割揚州淮安徐州還隸江寧右布政六年改左布政為安徽布政使司雍正元年以兩江總督統治安徽江蘇江西三省二年升鳳陽府屬之潁亳泗三州廬州府屬之六安州為直隸州十三年潁州升府亳州復降屬潁乾隆二十五年安徽布政使亦自江寧來駐東至江蘇溧水西至湖北麻城南至江西彭澤浙江遂安北至河南鹿邑廣七百三十五里袤六百六十六里宣統三年編戶三百一十四萬二千一百八十四口一千六百二十二萬九百五十二領府八直隸州五屬州四縣五十一其名山霍皖黃九華陵陽敬亭其大川大江皖涇樅陽巢湖淮潁渦滁澮西肥北肥洪澤湖航路東達江蘇西達江西湖北驛路自安慶北逾北峽關渡淮達江蘇徐州自江心驛東南出清流關達江浦自桐城西南達湖北黃梅鐵路擬設蕪寧路電線安慶府衝繁難安廬滁和道治所巡撫布政提學提法三使巡警勸業道同駐順治初因明制屬江南左布政使司康熙六年始分建安徽省十四年設提督轄上江營汛十八年省提督併入江南乾隆二十五年移左布政使來治嘉慶八年以巡撫兼提督轄二鎮各標西北距京師二千七百里廣四百五十里袤二百七十五里北極高三十度三十七分京師偏東三十四分領縣六懷寧衝繁難倚東北大龍山西皖山百子西北獨秀山大江自望江入徑城南而東北出趨池口又東北入無為皖水自潛山入會長河徑石牌港入江北黃麻河一名黃馬河自潛山入會沙河高河達桐城為練潭河西北井田河上達練潭西冶塘湖由皖口入江東北長楓港引蓮湖槐湖水入江即古之長風沙也碎石嶺汛二石牌市汛一長楓三橋二鎮巡司各一一驛練潭商埠濱江桐城衝繁難府東北百二十里東北浮度山北峽山一名北峽關與舒城界西挂車北龍眠山有水流為龍眠河入松山鴨子諸湖東南大江自懷寧入東流徑縣西南練潭驛為練潭河雙河出縣東二派合流為孔城河與東南長河白兔河俱入練潭河至樅陽入江三道巖關縣西咸豐十年重築六百丈北峽關練潭鎮馬踏石巡司四驛二陶沖呂亭潛山衝繁府西北百二十里北山一曰皖山又名天柱漢武帝登禮天柱號為南嶽即此道書所謂第十四洞天也潛水今名前河源出公蓋山西流為開源澗東南流徑城北東合皖水出公蓋山東徑烏石波至城東崩河合潛水南至石牌市與太湖東諸水會徑懷寧入江東北昆侖山沙河出會黃馬河入懷寧吳塘堰歷代開以灌田康熙十一年修治天堂寨後部河所出有巡司一一驛青口太湖衝難府西北二百二十里東馬頭山南新寨香茗西北龍山北珠子山有關西與英山界太湖舊與小湖五並堙東北銀河自潛山入為後部河右合羊角河為龍灣河匯南陽青石棠梨羅溪諸河為馬路河環城而東折東北仍之後部白沙巡司各一一驛小池宿松衝難府西南百六十里東北嚴恭烽火東南汙池西南得勝山大江自湖北黃梅入流徑小孤山元立鐵柱于上名海門第一關分流東下入望江二郎河一名揚溪河承雷水南流入望江北三溪河自湖北蘄州黃梅分入合於隘口南流入江東北舊縣河出白崖諸山合荊橋河入望江之泊湖東張富池會大小泊潦湖龍南蓮若湖白湖棠梨小黃三湖趨於泊湖又南龍宮湖大官湖均東連泊湖成巨浸有便民倉鎮南北糧倉貯此有歸林灘鎮舊置巡司裁其復興涇江口二鎮有巡司二一驛楓香望江簡府西南百二十里西北大茗小茗對峙東周河山西麒麟山北寶珠山南大江自宿松入濱城緣娥眉洲東北流至華陽口納泊湖泊湖受宿松浮湖茅湖諸水合流為揚溪河即雷水也雷港明時湮今從華陽鎮入江鎮四蘇家吉水香新溝又華陽雷港遊擊駐有巡司雍正中自楊灣改一驛雷港廬州府衝難隸安廬滁和道明廬州府屬江南順治初因明制改二州六縣屬江南左布政使司康熙六年分隸安徽省雍正二年升六安為直隸州以英山霍山二縣改屬餘仍舊南距省治四百六十里廣二百二十里袤二百一十里北極高三十一度五十六分京師偏東四十七分領州一縣四合肥衝繁疲難倚東龍泉青陽東北大小峴山西南紫蓬東浮槎東南四鼎山一名四頂山東巢湖一名焦湖延袤四百餘里中有三小山曰鞋曰姥曰孤港汊凡三百六十納衆水而南注之江東店阜河南派河三汊河皆入焉肥水徑雞鳴山淮水來與之合縣名昉此東逍遙津梁園鎮西廬鎮關梁園青陽官亭巡司三督糧通判一縣丞一驛五護城金斗店埠派河吳山廟舒城衝繁府西南百二十里南春秋山華蓋鼓樂西南龍眠七門山東巢湖與合肥廬江巢分界縣境諸水畢匯於此龍舒河源出縣西孤井東流會石塞河流徑七門堰又徑城南入巢湖上七里河在縣西九里西山諸水所匯徑南溪入巢湖其在縣七里者為下七里河上接南溪下達巢湖七門堰在西南七門山下有三堰一烏羊二千功三槽櫝也南北峽關西陽山寨上陽鎮有汛曉天鎮巡司一驛二三溝梅心廬江簡府南百八十里東北冶父山西北冷水關兩山夾立如門東梅山西孺山郎家東南礬山東北巢湖西納三河迤東金牛清野諸水匯焉其南白湖南迤為後湖西播為黃陂湖匯縣河及作枋河東出為青簾河由無為入江西南高子水南羅昌河並入桐城冷水關有汛一巡司一驛一廬江巢簡府東北百八十里東東山濱江為險東南七寶山西北萬家山西南巢湖舊居巢地後陷為湖因名縣境諸川多自此導流濡須水自湖東口流徑城南一名天河水東流徑東北亞父山南又東南徑七寶濡須兩山間亦曰東關水入無為清溪河自巢湖導流徑縣東合芙蓉水下流會濡須水西柘皋白露巧溪花塘諸河皆入巢湖柘皋有汛巡司典史各一二驛高井鎮巢無為州繁疲難府東南二百六十里界城內紫芝山東北偃月即濡須塢東西有二關西南三公九卿西孤避北青檀南大江自桐城入為石炭河口又東北青簾水自廬江入為西河合鵝毛永安直皂是為泥汊河口又北神塘河口又東徑北蟂蟣山其西獺浦入和北有濡須水自巢湖緣界徑七寶山又東為黃洛河合州河運河及馬腸奧龍河入含山為裕溪有汛黃洛泥汊奧龍土橋巡司四鳳陽府衝繁疲難分巡鳳潁六泗道治所元濠州明初升府曰臨濠洪武二年為中都六年改中立府七年更名鳳陽屬江南順治初因明制領五州十三縣屬江南左布政使司康熙六年分隸安徽省雍正三年升潁亳泗三州為直隸州分潁上霍丘屬潁太和蒙城屬亳盱眙天長五河屬泗十一年分壽州置鳳臺縣十三年潁州府以亳州及所隸二縣屬之乾隆二十年省臨淮入鳳陽四十二年省虹縣入泗州南距省治六百七十里廣四百二十八里袤四百八十里北極高三十二度五十五分京師偏東一度十二分領州二縣五鳳陽衝繁疲倚明始析臨淮置尋又割虹縣地益之為府治國初廢臨淮縣省入北鳳凰山府以此名東北烏雲山出鍾乳淮水自壽州入徑城東北流入泗州濠水出城南有二源至升高東有巨石絶水即古濠梁一名石梁河東北入淮渦水自蒙城入徑城西北入懷遠西龍子河源出南山匯為湖徑長淮關入淮北沫河上承諸湖徑城東北入淮曰沫河口東溪河一名大溪河即古黃溪也東月明湖北流入淮東北花園湖東北洪塘湖東南明孝陵在縣西南有城衛順治七年改設左衛守備一西北長淮關東北臨淮關鐵路所經臨淮鄉徐家橋溪河集蚌埠小溪有溪河集縣丞一蚌埠鎮主簿一臨淮鎮巡司一驛三王莊濠梁紅心縣東南有鐵路懷遠疲難府西北七十里北荊山東南塗山南平阿山淮水自鳳臺入徑縣東過荊塗兩山間會渦濠沙淝諸水合流入泗州北淝水自蒙城入至縣正義村匯為巨浸下流入靈壁清溝自渦陽龍山湖東南流合十湖天堰諸水至縣北會淝水而水始大舊自靈壁南至沫河口入淮渦水自鳳陽入徑城北東入淮謂之渦口南洛水北流入淮亦名洛澗沙水自潁州入經荊山南入淮上窰龍元集有主簿一洛河巡司一定遠衝繁府南九十里西北橫澗山東銀嶺南池河自巢入東北徑盱眙入淮謂之池口西洛河上承苑馬塘即淝水支流二河俱入於淮芡河從西至徑城南會淮水岱山鋪有汛瀘橋主簿一池河巡檢一驛三定遠張橋永康鎮縣東有鐵路鳳臺繁疲難府西南百八十里明省入壽州治雍正十一年分壽州城東北隅增置西北八公山東北紫金山南淝水自渦陽入歷潁上由峽口西入淮西淝河一名夏肥水自合肥入至肥口入淮白龍潭顧家橋石頭埠劉家集闞疃集有汛闞疃集巡司一驛二太行丁家集壽州繁疲難府西百八十里壽春鎮總兵駐城北八公山在淝北淮南亦名北山峽石山西北夾淮為險在西岸為峽石在東岸為壽陽山西北淮水自霍丘東徑正陽鎮潁水流合焉謂之潁口又東至城北淝水流合焉謂之淝口亦謂之淮口又東北流入懷遠淝水凡三在州境者曰東淝河在州東北源出合肥雞鳴山北流分為二一東南入巢湖一西北流至州入淮乃淮南之淝水也西北潁水自潁州入入淮處名潁尾西卑水自潁州入北流達於淮即沘水也正陽關瓦搗汛有汛鳳陽通判駐有稅關正陽鎮巡司一驛四正陽關安豐姚皋店瓦埠宿州衝繁疲難府西北二百三十里西北相山石山土山又諸陽山一名睢陽山在睢水之陽睢水自河南永城入南澳水一名濊水今名澮河亦自河南永城入經靈壁東南入泗州五河東南沱水出州東南紫蘆河東流入靈壁分二派至泗州復合由五河入淮即洨水也又北淝水出州西龍山湖本入渦今入淮西南泡水源出亳州舒安湖流徑廢臨渙城與澮水合東南澥河亦東流入澮河一名蟹河睢水州北自河南入徑相城故城合瀆水及卑湖水過陵子湖崔家湖入泗州宿州營原設都司一員乾隆初改守備嘉慶十一年又改都司龍山百善有分防營汛二有衛南平集鳳潁捕盜同知一州判一時村集巡司一驛四大店夾溝睢陽百善城外有鐵路靈壁衝繁疲難府西北百八十里本虹縣靈壁鎮宋始置縣明屬宿州清初降宿州同隸鳳陽治西南齊眉北磬石西鳳凰山北黃河自江蘇徐州入東南入睢寧即古泗水北淝水自懷遠入徑城南至鳳陽沫河口入睢澮河汴水沱河皆自宿州入徑縣境下流入泗州北小河上流即睢水亦自宿州入又東入江蘇睢寧東有石湖北有穆家湖土山湖雙興鎮州同一固鎮有汛巡司一驛一靈壁潁州府繁疲難隸鳳潁六泗道明潁州屬鳳陽府順治初因明制與潁上太和二縣俱屬鳳陽雍正二年升直隸州改隸安徽省以潁上暨霍丘來屬分太和屬亳州十三年升府增設阜陽縣降亳州及所隸太和蒙城二縣來屬隸東南距省治八百四十里廣二百一十里袤二百二十里北極高三十二度五十八分京師偏西三十二分領州一縣六阜陽繁疲難倚西七旗嶺金牛嶺縣西南仁勝岡南安舟岡淮水自河南固始入徑城南三河尖入鳳陽潁水自河南登封入徑城北東流茨河谷河來入之北沙河承太和諸湖水亦來會西柳河承小汝河白洋湖諸水並納於潁東南流至沫河口達於淮西舊黃河原經城北合潁水自河徙鹿邑黃流遂絶西北沈丘鎮即古寢丘巡檢一包家寨永安鎮西洋集驛口橋有汛王家集通判一縣丞一一驛橋口