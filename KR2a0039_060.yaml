body:
  text: 清史稿卷六十志三十五地理七山西山西禹貢冀州之域清初沿明制為省置總督巡撫順治末總督裁康熙四年並冀南冀北置雁平道雍正元年置歸化廳二年增直隸州八平定欣代保解絳吉隰三年增府二寧武朔平六年升蒲澤二州並為府置歸綏道乾隆四年增置綏遠廳同知二十五年又以歸綏所屬地增置五通判歸化城清水河薩拉齊和林格爾托克托城與歸綏二廳並屬歸綏道二十九年裁歸化城通判三十七年吉州改屬平陽府霍州為直隸州今領府九直隸州十廳十二州六縣八十五東界直隸井陘三百七十五里西界陝西吳堡五百五里南界河南濟源七百三十里北界內蒙古四子部落草地一千一百里廣八百八十里袤一千六百二十里北極高三十四度五十七分至四十一度五十分京師偏西三度四分至五度四十五分東北距京師一千二百里宣統三年編戶一百九十九萬三十五口九百二十一萬九千九百八十七其名山管涔太行王屋雷首底柱析城恆霍句注五臺其巨川汾沁涑桑乾滹沱清漳濁漳鐵路正太驛道西達蒙古陝西潼關東北至京師電線達京師西南西安太原府衝繁難隸冀寧道巡撫布政提學提法司巡警勸業道駐初沿明制領州五縣二十雍正中平定欣代保德直隸割十縣分入之尋興還隸乾隆二十八年省清源入徐溝距京師千二百里為省治廣六百里袤七百里北極高三十七度五十四分京師偏西三度五十六分領州一縣十陽曲衝繁難倚東北阪泉山西北崛北梁鴻西南汾水自交城入徑冽石口左合掃谷水折東南左合洛陰及石橋真谷水水經注徑盂縣狼孟故城南者至城西北左合石河南社河又南入太原天門關石嶺關二巡司駐王封鎮同知駐掃峪村楊興寨城晉陵井驛太原衝繁府西南四十里西南尖山西北蒙山其南風峪懸甕晉水出焉東北駝山汾水自陽曲入左納澗河徑城東至南張村與合又西南入徐溝東洞渦水自徐溝來西南流徑縣南仍入徐溝界榆次衝繁難府東南六十里北罕山東南麓臺東北小五臺洞渦水自壽陽入左納金水河古涂水即水經注蒲水合八賦嶺鷹山水今所謂大小涂即水經注蒲谷水注之右合原過水四派唐貞觀中令孫淇引以溉田徑城南西南入徐溝其澗水入蒜谷又西入太原源渦什帖二鎮鳴謙王胡二驛太谷繁府東南百二十里南鳳皇山北壁谷東南鳳巢大大涂水出焉西北流入榆次西烏馬河自榆社入右合奄谷水左咸陽谷水徑城北入祁象谷水即古蔣谷水入徐溝有馬嶺關杏林寨主簿駐范村鎮祁衝繁府西南百四十里東南竭方幘山侯甲水自武鄉入徑龍舟峪為龍舟水又盤陀水西北為昌源渠徑城北入平遙東北烏馬河自太谷入又西入徐溝子洪盤陀團柏賈令四鎮安寨盤陀二驛徐溝衝繁難府南八十里乾隆二十八年省清源為鄉入訓導及巡司駐西壺屏山其北白石中隱汾水自太原入徑孔村至西堡東北洞渦水自榆次入錯太原復入縣西左納烏馬及象河入焉故驛鎮同戈驛交城簡府西南百二十里交城山北百二十五里相近羊腸西北狐突汾水自靜樂入徑火山村右合孔河折東入陽曲西北孝文山文水出會渾谷西谷屈東南左合酸水為文谷水入文水界從之下流並達之故交村巡司駐文水繁難府西南百六十里西陶山西北熊耳西南隱泉東有汾水自徐溝入西南入平遙西北文谷河自交城入徑文谷口唐柵城廢渠在焉至城北又東南左合磁窰河步渾水折西南入汾陽有孝義鎮岢嵐州簡府西北三百二十里岢嵐山東北百里一曰管涔迤西南蘆芽荷葉坪雪山東南直道村嵐漪水出東北右合黃道川三角城二水折西北徑城南又西徑大澗河左合砂河又西南徑巨麓山入興水峪關嵐簡府西北二百六十里西南黃嶮山西野雞山蔚汾水出入興南赤堅嶺嵐水出東北徑桃尖山左合乏馬嶺雙松山水折東南入靜樂有東村鎮興簡府西北四百里雍正二年隸保德州八年仍來隸東桃花山西南採林西北黃河自保德入東北嵐漪水自岢嵐入徑石樓山東南蔚汾水自嵐入徑合查山至縣西合南川水並入焉又南合紫荊山水入臨蔚汾合河二關皆要隘汾州府衝繁難隸冀寧道康熙六年省明冀南道入東北距省治二百二十里至京師千三百八十里廣三百五十里斜袤三百二十里沿明制北極高三十七度十九分京師偏西四度四十五分領州一縣七汾陽繁疲難倚西將軍山黃蘆嶺北謁泉東北文谷水自文水入循汾水故道右合原公金鎖關水至府治東為文湖又南右納義水入孝義郭柵陽城二鎮冀村巡司駐有驛孝義繁府南少東三十五里西上殿山西北龍門薛頡嶺古狐岐山禹貢治梁及岐其南盤重原勝水出焉俗名孝河會南川陽泉水徑城南而東東北文谷河自汾陽合義水入徑鹽鍋頭入介休溫泉鳳尾二鎮平遙繁衝難府東八十里西北汾水自文水入徑長壽村東北侯甲水自祁入左合謁戾山嬰澗過嶺魯澗超山中都及亭岡水入焉又南入介休上殿鎮洪善驛介休衝繁難府東南七十里南介山一曰綿山綿水出東天峻石河出又東石桐水出東北汾水自平遙入後先合之入靈石張蘭鎮同知駐義棠驛石樓簡府西少南百八十里東南石樓山西九重西北團圓山黃河自寧鄉入合屈産泉古牧馬川復合溫泉即石羊水入永和臨簡府西北三百二十里東南漢高山西南招賢馬頭河水左瀆自興入合紫金山水又南徑曲峪鎮入永寧其湫水亦自興入徑赤壁山合連枝積翠黃龍漢高雲山凡十六水入焉又南入永寧有三交鎮永寧州衝繁難府西北百七十里東九鳳東北呂梁西匾斗南山西北馬頭河水左瀆自臨入東北赤堅嶺離石水出曰北川南步佛山合蘆子山水徑城西合東川納南川清水河入焉又南入寧鄉吳城柳林永