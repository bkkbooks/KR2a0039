body:
  text: 清史稿卷六十一志三十六地理八山東山東禹貢青徐及兗豫四州之域明置山東承宣布政使司清初因之雍正二年升濟南府之泰安武定濱兗州府之濟寧曹沂等六州為直隸州八年濟寧州仍屬兗州府十二年升武定沂二州為府濱州改屬武定十三年升泰安曹二州為府乾隆四十一年仍升濟寧臨清為直隸州凡領府十州二散州八縣九十六在京師之南八百里東至大海一千三百里西至直隸元城縣界三百四十里南至江南沛縣界五百七十里北至直隸寧津縣界二百四十里廣一千六百四十里袤八百里北極高三十四度三十五分至三十八度二十分京師偏西一度二十五分至偏東六度四十分宣統三年編戶五百三十七萬七千八百七十二口三千一百三萬六千九百四十四濟南府衝繁難巡撫布政提學提法鹽運司濟東泰武臨巡警勸業道駐初沿明制為省治領州四縣二十六雍正中武定泰安濱直隸割陽信萊蕪利津等九縣屬之北至京師八百里廣三百六十里袤二百八十里北極高三十六度四十五分京師偏東四十一分領州一縣十五歷城衝繁難倚城南歷山東華不注東南長城嶺玉水出焉錦雲川水入長清注黃河河即大清濟水故道其右瀆入西北逕藥山北至濼口鎮又東北逕鵲山其南新小清河入逕城北右受大明湖東逕虞山納巨合及關盧武原水並入章丘今大明湖在城內惟匯珍珠濯纓諸泉乃宋西湖非唐以前遺址矣有巡司申公集主簿譚城龍山驛津浦膠濟鐵路章丘繁疲難府東百十里南長白山東陵平頂西南危山雞山水經注巨合水出西北逕榆科泉莊及武原關盧水入歷城注新小清河新小清復入西北右合繡江即溝河注百脈水出土鼓故城逕陽丘故城黃巾固小清河又東北逕賈莊入齊東其北黃河右瀆自歷城入緣濟陽界小清昔源濼水今源獺河別源出東南野狐嶺西北逕青龍山土鼓寧戚故城折東入鄒平即小清故道有普濟鎮鄒平疲府東北百六十五里南長白山東南黃山西南九龍北新小清河自齊東入東入長山西北獺河自章丘入逕滸山濼東北為清河溝並入長山東南孝婦河即瀧水自長山錯入左合白條溝沙河逕伏生墓屈東北仍入之其故道逕梁鄒故城有孫家鎮淄川簡府東少南二百二十里東南原山淄水出焉南有豬龍河俗呼孝婦即瀧水自博山入逕城西南右合般水又北逕浮山獺水河出黌山逕昌國故城會浸泗河自左注之乃古德會水左得萌水口入長山鐵路長山簡府東百九十里西南長白山南鳳山西北新山清河自鄒平入折北入高苑清河溝東入新城東南孝婦河自淄川入左得魚子溝錯鄒平仍入有周邨鎮新城簡府東北二百十六里東南商山西北清河溝自長山入右迤為青沙泊淤東有烏河即時水逕西安故城左納澇淄河折北逕會城湖入博興西通麻大湖西北孝婦河自長山入右會鄭黃溝及系水時枝津匯焉齊河衝繁難府西五十里西南黃河左瀆自長清入逕城南又東入歷城北徒駭自禹城入西南趙牛河自長清入歧為岔河並入禹城而經流復入合倪倫河自右注之又東逕梁家莊入臨邑劉宏鎮有驛曰晏城齊東疲難府東北百五十里西北黃河右瀆自濟陽入逕延安鎮又東緣惠民界入青城南新小清自章丘入逕臨濟故城又東入鄒平減水河壩河堙臨河鎮濟陽疲難府東北七十里黃河左瀆自禹城入逕城南又東北緣齊東界入之西北徒駭及商河並自臨邑入屈北入商河鎮鎮二回河新市禹城衝府西北百十里西南徒駭河自高唐入少淤逕三岔口右會漯河及管氏趙牛岔河逕城西北又東北入齊河趙牛河錯入右合溫聰刁強河仍入注之禹城橋縣丞駐新安鎮劉普驛鐵路臨邑簡府北百四十里南徒駭河自禹城東南商河自齊河入並東入濟陽西鈎盤自陵緣界東北仍入之並淤長清衝繁疲難府西南七十里南磧湑山東南方山有行宮東北眉西南孝堂古巫山黃河自肥城入逕城西北右合南沙河水經注出南格馬山賓谿谷北逕盧縣故城北與中川水合者又東北緣齊河界納玉水其南新小清並入歷城西南趙牛河自茌平入右納趙王河北入齊河張夏鎮縣丞駐二驛崮山長城陵簡府西北二百里故城與德互徙明永樂七年西新鬲津河自德入環城又東右合篤馬趙王又東鈎盤自禹城入並入德平並涸滋博鎮德州衝繁難府西北二百六十里糧道駐南有運河自恩入北逕城西其南支四女寺減河入檀老黃河故道逕城東北哨馬營是為北支並入直隸東南馬頰河即篤馬自平原入水經注逕臨齊城南今邊臨鎮州判駐東北入德平其新鬲津東北入陵淤有鬲故城古瀆在焉老黃河故屯氏瀆篤馬其別河南瀆桑園安德驛又良店梁家莊水驛二鐵路德平難府北二百五十里西馬頰河自德入右會小河東北入樂陵及直隸寧津下至海豐月河口入海自直隸元城入凡行山東境六百四十八里南有鈎盤自陵入東北入商河涸有懷仁鎮平原衝府西北百八十里西馬頰河自夏津緣界合蒲河其東新鬲津故道並北入德東篤馬溝舊合趙王河入陵涸有水務鎮桃源驛鐵路東昌府衝繁隸濟東泰武臨道初沿明制領州三縣五雍乾間濮臨清直隸割范觀城朝城夏津丘東距省治二百二十里廣二百二十里袤二百八十里北極高三十六度三十三分京師偏西十八分領州一縣九聊城衝繁難倚南有運河即會通自陽穀入右播為趙牛湄河入茌平王官鎮崇武水驛堂邑衝疲府西四十里東北運河自聊城入逕梁鄉閘西南馬頰自冠入逕張家堂絕運並入博平侯固鎮有城博平衝繁府東北四十里西南運河自堂邑入逕土橋閘西北至田家口其西馬頰自堂邑入西北復絕西徒駭自聊城入逕鄧家橋右納湄河東北擅溼故瀆入茌平涸茌平衝繁難府東北六十