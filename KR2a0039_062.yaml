body:
  text: 清史稿卷六十二志三十七地理九河南河南禹貢豫及冀揚三州之域明置河南布政使司清初為河南省置巡撫雍正二年升陳許禹鄭陝光六州為直隸州十二年升陳許為府鄭禹仍屬州乾隆九年許復直隸光緒末鄭復直隸宣統初淅川廳直隸領府九直隸州五直隸廳一州五縣九十六東至江蘇蕭縣六百五里西至陝西潼關縣一千三十里南至湖北黃陂縣一千一十里北至直隸磁州五百八十里廣千六百三十里袤千三百九十里宣統三年編戶四百六十六萬一千五百六十六口二千六百八十九萬四千九百四十五其名山嵩高三崤熊耳太行其大川河水淮汴洛潁汝白丹衛漳其鐵路京漢開鄭道澤其電線東北達濟南京師西長安開封府衝繁疲難巡撫布政提學提法司鹽糧開歸陳許鄭兵備巡警勸業道駐明洪武元年以元汴梁路改清初河南省治仍領州四縣三十雍正二年陳許鄭禹直隸割縣十四隸之延津原武屬衛輝懷慶乾隆中禹及密新鄭還隸河陰省陽武封丘屬懷慶衛輝儀封為廳後亦省北至京師千五百八十里廣三百七十里袤三百六十里北極高三十四度五十一分京師偏西一度五十五分領州一縣十一祥符衝繁難倚城東北隅夷山東北赤岡河水自元至元中始盡歷府境自中牟緣封丘界徑黑岡柳園口入東入陳留其賈魯河入徑朱仙鎮入尉氏即蔡故瀆上游一曰沙水水經注渠水實鴻溝而浚水堙其惠濟河入徑府治南亦入陳留宋都四渠及五丈白溝河亦堙吹臺縣丞駐陳橋鎮大梁驛鄭汴鐵路陳留衝府東少南五十里東北潘岡河水自祥符入徑小黃故城北又東入蘭儀北惠濟河自祥符入徑城北水經注沙水徑牛首亭東魯渠出焉者其東桃河古渙水又東睢水並汴支津東南入杞觀省陂在焉縣驛一杞衝繁難府東百里西北惠濟河自陳留入水經注徑陽樂城南鳴雁亭北睢水亦自陳留入徑高陽城合桃河為橫河實古澮水並東南入睢西南青岡河自通許緣界入太康河水舊徑縣北故有漢堤隋堤自大梁至灌口即老鸛河也雍丘驛通許簡府東南九十里吳召岡李大岡諸岡綿亙縣境河流環之東南青岡河出縣西北下流為燕城河入太康北雙溝蔡故渠水經注沙水徑裘氏亭西淡臺子羽冢東者半截河出焉西南入尉氏縣驛一尉氏衝府西南九十里城內尉繚子臺東錦被岡西南三亭岡城南五鳳山東北賈魯河自祥符入右合康溝及大溝新河水經注長明溝徑向城北尉氏故城南三分者至白潭鎮左納半截河東南入扶溝縣驛一洧川簡府西南百五十里東東里東南赤坂岡西雙洎河即洧水自長葛入左合蟄龍復受清河大沼水徑新汲故城考升廟北大隧澗在焉迤東入鄢陵縣驛一鄢陵難府西南百九十里北彭祖岡東北彪岡雙洎河自洧川入徑彭祖岡東南入扶溝南艾城河自臨潁緣界右會石梁為流潁河徑陶城入西華城南文水又南三道河達太丘城縣驛一中牟衝繁府西七十里北牟山西南馬陵西北圃田澤河水自鄭入徑楊橋口又東黃練集賈魯河入合龍鬚溝隋志鄭水又東右合鴨陂水至縣西乾隆六年濬為惠濟河正渠又東徑官渡城又東南右合糞陂古末水丈八溝焦城在焉古清池水並入祥符自周定王五年河南徙邑沮洳明萬曆中令陳幼學濬渠百九十有六縣境瀕河有管河上汛縣丞下汛縣丞駐曲遇聚白沙東張楊橋四鎮城驛一鄭汴鐵路蘭封衝繁府東北九十里明蘭陽道光四年改蘭儀同治二年省儀封廳入宣統元年復諱改東北黃陵岡西北河水自陳留入舊入考城咸豐五年決銅瓦廂改東北徑龍門口入直隸長垣舊賈魯七河堙陽封管河縣丞駐管城驛禹州衝繁府西南二百九十里明初鈞州後改雍正二年升十二年降屬許州府乾隆六年還隸北大騩山西南九山西北荊山小洪河出入長葛崆峒鐵母潁水自登封入徑康城陽關聚左合書堂麻地川右湧水徑城南一曰褚河入襄城其西土爐河下流並達之水經注故瀆徑三封山有嵎水今泉二上棘小韓清潁一驛密簡府南二百八十里清初自禹來隸雍正二年復屬禹乾隆六年復南密岵山西北開陽東南洧水源出登封馬嶺東北流徑縣東南綏水注之又東流溱水注之又東入新鄭東南大騩山潩水出其玉女陂從之東北聖水峪聖水出入鄭鄶城縣驛一新鄭衝府西二百里清初自禹來隸雍正二年復屬禹乾隆六年復東南大騩潩水自密出山徑風后頂又東南徑陘山入長葛其北洧水自密會溱入曰雙洎河至城南為洧淵又東南徑土城左合黃水右梨園河亦入長葛梅從之水經注長明溝水出苑陵故城西北東即古制澤西瑣澤合龍淵泉白雁陂者永新郭店二驛鄭汴鐵路歸德府衝繁難隸開歸陳許鄭道總兵駐西距省治二百八十里廣四百七十里袤三百二十里北極高三十四度三十二分京師偏西三十五分沿明制領州一縣八商丘衝繁難倚商丘城西南三里又城南四十里穀丘河水自宋開寶四年至康熙四年決入郡境者以十數府治與為轉徙南北不恆咸豐五年後故道淤豐樂河出焉東南入夏邑古汴水一曰護水其支津澮河即睢水上源湮今首縣西北俗名沙河歧為三北岔入永城正渠及南岔與其支苞河其西陳兩河自寧陵入右合沙家窪冀家河左合古宋河並入安徽亳州沙為馬尚南岔為武家而陳兩為清河大蒙古景亳小蒙側有漆溝孟諸澤濟陽葛驛二鎮縣驛一寧陵衝府西六十里西甘露嶺東北河水故道淤其自睢入西南者曰張公河徑漢已吾故城東入柘城西北陳梁沙河俗名陳兩河長安一鎮寧城一驛鹿邑繁疲難府南百二十里故城縣西古鳴鹿縣丞駐東陰靈山隱山西南橫嶺西北惠濟河自柘城入徑賈灘南渦水自太康入錯淮寧復入南清水河渦支津舊自淮寧入今首虞詡墓北徑彙城東南為練溝並入安徽亳州其清水南出偃王陂者茨刺河右合瀖水會西明河水經注自陳城百尺溝東徑寧平故城南者入太和東明河亦入之谷陽一鎮縣驛一夏邑衝難府東百二十里清河自虞城入左合橫河西北豐樂河自商丘入為響河及虬龍河歧河並東南入永城分防夏商永縣丞駐會亭一驛永城衝繁難府東南百八十里北碭山巴清河即減水溝自夏邑入東南入江蘇蕭縣東洪溝自蕭入仍從之響河徑太丘故城合虬龍溝歧河為巴溝河徑城北東南入安徽宿州南澮河自商丘入徑建平酇費故城北右合北岔沙河又東包河自安徽亳州入並從之新興保安二鎮太丘一驛虞城衝繁府東北七十里東北柱岡黎丘河水故道自商丘入東入江蘇碭山即古汴渠水經注徑周塢側者橫河出焉南惠民溝並入夏邑治平一鎮石榴堌一驛睢州衝繁府西百里城西駱駝岡北黃河故道自考城入明嘉靖十九年決野雞岡南流者為張弓河入寧陵西惠濟河自杞入左合橫河即擅其故道東南入柘城橫即睢睢即渙水經注徑承匡城又東徑襄邑故城南者歸化重華二鎮五橋集州判駐葵丘一驛考城簡府西北百二十里乾隆四十九年改隸衛輝光緒元年復南葛岡河水故道舊自蘭封入東入山東曹縣咸豐五年北徙舊有戴水並堙斜城葵丘有驛柘城簡府西南九十里城東北隅廓山河水故道二西北惠濟河自睢入徑心悶寺水經注睢水歷傿縣北者舊納渦支津北張弓河自寧陵入徑牛鬬城會於東南甎橋東南入鹿邑又東劉家河古谷水即渙水水經注徑鄫城北者又古泓水縣西並堙八橋一鎮縣驛一陳州府繁難隸開歸陳許鄭道清初沿明制為開封屬州領縣四雍正二年升直隸州十二年升府並割太康扶溝來隸增附郭西北距省治三百里廣一百九十里袤二百十五里北極高三十度四十七分京師偏西一度二十六分領縣七淮寧繁疲難倚明省宛丘入州雍正十二年析改為府治西北西銘山杏岡北鞍子嶺西明河出徑漢新平故城北東北渦水自太康入並入鹿邑西南沙河自商水緣界會賈魯河入徑趙牛口納柳涉河徑新站集又東南左納西蔡河又東南入項城汾河自商水流入縣西南又東入項城東南東蔡河入沈丘周家口在縣西南賈魯河沙河交匯於此縣驛一商水簡府西南七十里西北沙河古渡水自西華入徑鄧城又東右會潁水徑叢臺至周家口南綰汝蔡北轂陳汴通判駐左會賈魯河徑灌溉城潁歧渡緣淮寧界入之西有汾河舊自西華入徑扶蘇城左合枯河東徑范臺右納界溝河入淮寧谷陽一鎮縣驛一西華難府西北百八十里南宜山西廟陵岡西南沙河自郾城入東徑小陶夏亭城入商水渚河即潁右合土爐河又東北左納其支津流潁為合河口徑叢桑村又東左納大浪溝從之西南洪河自上蔡錯入仍入之又賈魯河西北自扶溝入徑護當城側城東南入淮寧柳涉河源自縣東東南入淮寧常社一鎮縣驛一項城簡府南百二十里河水故道即今沙河自淮寧入徑公路城入沈丘汾河西北入徑後魏平鄉諸陂水經注徑南頓故城南者西有泥河即蔡河自上蔡入錯汝南復入徑石橋並東入沈丘縣驛一沈丘難府東南百三十里北大沙河自項城入左納東蔡河徑其北汾河入為小沙左右合谷河泥河徑城南入安徽太和紙店一鎮縣驛一太康繁疲難府北五十里北石山東北長白西北青岡河自通許入為燕城河渦水冒為源匯白洋諸溝徑城南又東南左合河水故渠徑馬廠集入鹿邑槐店縣丞駐崔橋一鎮縣驛一扶溝簡府西北百二十里西北雕陵岡賈魯河自尉氏入至張單口左會雙洎河水經注洧水徑桐丘城西其孟亭故道堙所謂小扶亭洧溝縣氏焉側城東南徑大扶城古渦水出焉又東南入西華其西文水河自鄢陵入右合三道河為大浪溝徑鴨岡洧西南故道徑新汲故城西匡城南左迤為鴨子陂者亦入之白亭洧陽固城呂潭四鎮縣驛一許州直隸州衝繁隸開歸陳許鄭道清初沿明制為開封屬州雍正二年升仍所領十二年為府乾隆六年復東北距省治二百五十里廣九十里袤百二十里北極高三十四度五分京師偏西二度二十五分領縣四西南熊耳山渚河今潁水自襄城緣界入徑潁陽故城古許國東南入臨潁其古潁水支津石梁河西北自禹入左納暖泉河徑城西又東南右合椹澗其東澮河即潩水水經注徑射犬城自長葛入東至秋湖曰艾城河其東洧倉城其西岸亭並從之椹澗石固二鎮縣驛一鐵路臨潁衝府東南六十里潁水自州入水經注徑繁昌故城北有鍋壅口東則棗祇河故瀆出焉又東南徑澤城北古皋鼬緣郾城界錯西華復入入西華其東支津石梁河亦自州入徑大陵城南御龍城南左會艾城河右合五里河左瀆入鄢陵西南土爐河自襄城緣界並達之繁城一鎮縣驛一襄城衝繁府西南九十里城南首山汝水西自郟入左合河水經注徑西不羹城南右納湛河輝河入舞陽東北潁水自禹入徑汾丘城緣州界入之東北土爐河自禹州入徑李膺墓白草原匯為朱湖潭一曰勒河左瀆入臨潁其南瑪瑙河出縣東東南入郾城襄城一驛郾城衝州東南百二十里東召陵岡城南陘亭西北潁水自臨潁緣界徑青陵城東入西華其土爐河入徑襄城時曲柵右合瑪瑙河出勒橋從之西有沙河即汝水自舞陽入徑道州城至城南右合澧河唐河曰大河東南歧為洄曲河徑沱口鎮五溝營其故渠自西平入左合淤泥河來會入上蔡正渠折東北一曰螺灣河亦入西華縣驛一長葛簡府西北五十里西北延秀岡雙洎河即洧水自新鄭入左合梅河屈東北入洧川澮河在縣西上游曰潩水自新鄭入后河自西注之又東南入許州曰艾城河暖泉河自禹入徑城西南隅東南入州鎮五董村石相和尚橋會河後河縣驛一鄭州直隸州衝繁疲難隸開歸陳許鄭道明屬開