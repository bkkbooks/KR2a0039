body:
  text: 清史稿卷六十三志三十八地理十陝西陝西省禹貢雍梁二州之域明置陝西等處左右承宣布政使司並治西安清初因之置巡撫治西安並置總督兼轄四川尋改轄山陝雍正九年專轄陝甘治西安十三年復轄四川乾隆十三年罷兼轄十九年兼甘肅巡撫事二十四年改陝甘總督二十九年移駐甘肅蘭州遂為定制康熙二年析臨洮鞏昌平涼慶陽四府置甘肅省移右布政使治之雍正三年升西安府之商同華耀乾邠六州延安府之鄜綏德葭三州為直隸州九年改榆林衛為府十三年同州升府華仍降州隸焉耀並降州還舊隸乾隆元年葭仍降州隸榆林四十八年升興安州為府東界河南閿鄉三百五里西界甘肅清水六百三十里南界四川太平一千三十里北界邊牆一千三百九十六里廣九百三十五里袤二千四百二十六里宣統三年編戶一百六十萬一千四百四十四口八百五萬四千四百七領府七直隸州五廳七州五縣七十三西安府衝繁疲難巡撫布政提學提法三司鹽法巡警勸業三道提督將軍副都統駐明領州六縣三十一雍正三年升商同華耀乾邠為直隸州割縣十七他屬十三年耀及同官還舊屬白水改隸同州乾隆四十七年置孝義廳嘉慶五年置寧陝廳東北距京師二千六百五十里廣三百五里袤四百三十八里北極高三十四度十六分京師偏西七度三十二分領廳二州一縣十五長安衝繁疲難倚府西偏西北龍首山西南清華圭峰南終南山橫亙長安咸寧鄠盩厔四縣境渭水自西徑縣北東入咸寧西南潏水歧為二一西南合鎬水為東交河灃水東北流來會又北經咸陽入渭一北流為皂河折東經咸寧入渭南有漕渠又西南有通濟渠鎮三杜角秦杜三橋主簿駐斗門行宮城內光緒二十六年德宗西幸改舊撫署駐焉咸寧衝繁疲難倚府東偏南樂遊少陵原渭水徑縣北而東灞水滻水自東北合注之又東徑高陵入臨潼潏水即漕水一名皂水出東南石鱉谷其西鎬水自寧陝入右合白石小庫諸水左合梗梓水入長安明秦藩城在府城東北隅縣治北順治六年改建滿城將軍都統駐縣丞舊自灞橋移尹家衛改駐縣北草灘灞橋渭橋鳴犢三鎮驛一京兆咸陽衝繁難府西北五十五里北畢原東鮮原東南高陽西南短陰南渭水自興平入納泥渠水東北會二灃水為雞心灘東入長安東北涇水東入涇陽鎮四高橋窰店北賀馬莊驛一渭水興平衝繁府西百里西馬嵬坡北黃山渭水自武功入左納清黑夾逮諸水合新開河東入咸陽縣丞駐張店鎮二馬村桑家驛一白渠臨潼衝繁難府東北六十里東南驪山有溫泉北普陀原東鴻門坂西南坑儒谷渭水自咸寧入徑縣北石川河合清谷水南流注之西有潼水東有戲水零水均北流注之東入渭南縣丞駐關山鎮鎮五新豐零口交口廣陽櫟陽驛一新豐高陵簡府東北七十里西降鶴山南奉政原西南渭自咸寧緣界徑鹿苑原左合涇水又東緣臨潼界入之西北白渠自涇陽入播為二曰昌運曰高望西南有毗沙鎮鄠繁難府西南七十里東南紫閣峰南圭峰東南終南山北有渭水自興平入入咸陽東南灃水自長安緣界入會潦水潦水出縣南合渼波水東北入咸陽注渭鎮四秦渡趙王潦店大王藍田簡府東南九十里北橫嶺南秦嶺七盤嶢山蕢山東藍田山有關灞水出縣東倒回谷即藍田谷徑南境納藍水輞水徑城南又西北合土膠河猗水注水入咸寧滻水出南山土門谷西北流為焦戴河合湯谷水均入咸寧鎮三藍橋焦戴新街涇陽衝繁難府西北七十里北嵯山西北甘泉仲山涇水自醴泉緣界入徑城南東南入高陵北冶谷水自淳化入會清水入三原西北龍洞渠徑縣北歧為三曰北白渠入三原中白渠入高陵下白渠流數里伏又有冶清渠冶峪縣丞駐鎮六永樂臨涇石橋雲陽孟店王橋三原衝繁難府北九十里北浮山西北嵯堯山濁谷水自耀入曰樓底河東流散入各渠趙氏河即澗谷水自富平錯入仍入富平清谷水自耀入西北入涇陽復經西境合冶谷水貫流南北二城中東南入高陵鎮四陂西王店樓底西陽學政駐所驛一建忠盩厔繁難府西南百六十里南秦嶺東南石樓西南安樂山西駱谷竹谷水北緣郿界仍徑清化入一曰西清水河合車谷稻谷諸水入武功注渭渭水徑縣北而東西南有黑水即芒水北流注之又東入興平東南甘水亦北入興平縣丞駐祖菴鎮五終南尚村啞柏清化臨川渭南衝繁難府東北百四十里西南石鼓南倒虎山西馬峪泠水出合駒兒嶺水西北入臨潼注渭渭水合杜化谷水徑城北古白渠在焉西水東赤水俱北注之又東入華州縣丞駐下邽鎮二赤水田市驛一豐原富平繁疲難府東北百二十里西北檀山天乳土門西南荊山東北頻山石川河即漆沮自耀入下流自西北受金定河一名趙氏河即澗谷水東南入臨潼縣丞駐美原鎮又東北道賢鎮醴泉衝府西北百二十里北武將山東北九嵕山芳山涇水自永壽入東北甘河自縣北東流注之東南入涇陽鎮二叱千甘北驛一張店同官簡府東北百八十里明屬西安府雍正三年改屬耀州十三年還屬西南白馬鐵龍北女回又神女峽內有金鎖關東漆水出北高山至城北合同官川及雄同雷平川西南流西有沮水南流俱入耀州東北大小石磐山水合北入宜君其南烏泥川東入蒲城驛一漆水耀州簡府東北百三十三里明屬西安府雍正三年升直隸州十三年仍為州還屬東北五臺山磬玉北木門大唐西北牛耳山沮水上源姚渠川自宜君入合銀耳坪太子石水楊秀川為宜君水南合胡思泉為沮水東南徑城西又東左會漆水入富平澗谷山清谷水濁谷水均出西北南入三原鎮四小丘柳林照金廟灣驛一順義孝義廳繁難府東南二百四十里乾隆四十七年析咸寧藍田鎮安三縣地置設同知駐孝義川嘉慶七年