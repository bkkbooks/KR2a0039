body:
  text: 清史稿卷六十五志四十地理十二浙江浙江禹貢揚州之域明設布政使司清初為浙江省置巡撫福建置總督兼轄之駐福州順治十五年置浙江總督駐溫州康熙元年移駐杭州八年裁尋復二十五年復裁兼轄如故雍正五年改巡撫為總督十二年仍為巡撫乾隆元年復置浙江總督三年改閩浙總督自是為定制順治五年遣固山額真金礪來杭駐防掌平南將軍印康熙初年改將軍總督駐福州將軍巡撫駐杭州三十六年舟山置定海縣以舊縣改置鎮海雍正六年增置溫台玉環廳道光二十一年升定海為直隸廳乾隆三十八年升海寧縣為州降安吉州為縣領府十一直隸廳一州一廳一縣七十五東至海中普陀山四百九十里西至安徽歙縣界三百七十里南至福建壽寧界七百八十四里北至江蘇吳縣界二百里廣八百八十里袤一千二百八十里北極高二十七度三十五分至三十度五十八分京師偏東一度五十五分至五度四十分宣統三年編戶三百八十八萬八千三百一十一口一千六百一十四萬九千四百五其名山會稽天目四明天台括蒼金華其大川浙江浦陽江苕溪天目自餘杭飛翥而入為黃山三天都之一杭州府衝繁難杭嘉湖道治所初治嘉興府今改駐巡撫布政交涉提學提法鹽運各司糧儲巡警勸業各道及將軍副都統織造同駐明為浙江布政使司領縣九順治初因明制乾隆三十八年升海寧縣為州東北距京師四千二百里廣百九十五里袤百三十里北極高三十度十七分京師偏東三度三十九分領州一縣八錢塘衝繁難倚西靈隱山古武林山西湖源此北為南北二高峰西南天竺山其東丁家山瀕湖周三十里唐刺史白居易宋守蘇軾導厥後水淺葑橫縱成蘇堤橫成白隄迤西為孤嶼有行宮與城內吳山為二其北聖塘澗水石函三閘以時防洩其東涌金閘導之入城曰城河浙江古淛河東南自富陽入城河出武林門會西谿入下塘河一名宦塘河逕江漲橋有鹽場司兼管吳山驛出北新關有橋曰拱宸光緒二十一年與日本約定為通商埠抵奉口陡門左會苕溪有西谿瓶窰二鎮宣統元年移府同知駐瓶窰有武林驛城南鹽場司浙江驛仁和衝繁難倚南鳳凰山西北皋亭山浙江西南自蕭山錢塘入東北流入海捍海石塘自錢塘烏龍廟一堡至戚井村十二堡西防同知治又東至翁家埠十七堡中防同知治城河出候潮門入上塘河舊名運河一曰夾官河北流右出枝津為備塘河入海寧下塘河西自錢塘入西北流者宦塘河與苕溪會其北流者為新開運河逕塘棲歧為二一入德清一入海寧苕溪自錢塘緣西北界入德清武康為界水有鹽場司湯鎮塘棲鎮巡司二又德勝臨平二鎮海寧州疲繁難府東北百七十里東黃灣山臨黃灣浦入石墩山迤東鳳凰山並建礮臺浙江西南自仁和入出鼈子亹為大海自海鹽至此潮流倒灌與江水相薄此為浙西第一門戶南北二大亹扼其中潮昔趨南後改徙北一綫危隄屢受衝激自仁和十七堡至南門外三十三堡東防同知治又自一堡至十八堡界海鹽累朝修築下塘河西北自石門德清界入逕永安橋歧為二北支為運河入石門為長安塘東支復歧為二一周王廟塘河一許公塘河入海鹽左出枝津為硤石河入海鹽桐鄉為界水上塘河自仁和入流為二十五里塘河合備塘河會袁花塘河入海鹽為招寶塘有袁花郭店硤石石墩長安馬牧港六鎮長安州判駐戴家橋有行宮有汛有巡司許村西路鹽場二富陽衝繁府西南九十里東五泄水下二泄屬諸暨泄或作洩洩溪源此西貝山北桐嶺富春江浙江上流西南自桐廬入納浦江湖洑水即壺源江右合剡浦左納莧浦自天目山伏流入縣西北始出山錯出復入流為白洋溪逕城南合安吳川抵漁山埠北入錢塘南入蕭山城河即慶春河起觀山訖莧浦陡門二有漁山靈橋場口湯家洋波場五鎮會江驛餘杭繁難府西北七十里南由拳山西北禹航山北獨松嶺並百丈幽嶺為三關南苕溪中苕溪西自臨安分入而合會北苕溪為瓶窰大河又一支出武康界孔井山入焉南苕性悍逼臨城東厮二以引之自滾壩洩流為餘杭塘河其南南湖北流為黃母港會苕溪分上湖下湖鎮三雙溪石瀨閑林臨安簡府西北百里西南臨安山縣以此名西楓樹嶺天目山即山海經浮玉之山苕水出其陰合董平鵠三溪又東南右合潘溪左合馬跑泉側城北而東錦溪合南溪入焉又東為南苕溪西北為中苕溪松溪出南黃嶺其西婁塘當苕之衝乾隆五年圮有青山亭川板橋化龍橫坂三口鶴山七鎮青山近城公姥二山夾鎖苕源最險要於潛簡府西北百七十里東石柱山西北龍翔嶺西天目上有兩池若左右目左屬臨安曰東溪右曰西溪出尖頂合流逕白鶴橋雙溪口合虞溪為浮溪至寮車橋左合藻溪右合交溪紫溪西南自昌化入合之其上流柳溪有千秋白沙桐嶺豪千孔夫諸關新城簡府西南百二十里西大雷山西北青牛嶺並天目支阜南百丈嶺界餘杭葛溪出合武源里仁二水出大源橋右合菖溪左納槎溪上承分水廣陵溪為三溪口逕練頭莊為練頭溪合松溪為雙港口曰鼉江北有塔山堰有東安鎮昌化簡府西二百十里西南福泉山其東蘆嶺南楊嶺西昱嶺北嶠嶺黃花嶺並置關又馬頭嶺上溪出合高溪仁里溪東流為無他溪合雲溪右納頰口溪逕晚山下為西晚溪逕城南為雙溪又南為下阮溪三溪伽溪南峽川上博溪東南納分水青坑溪覽溪西南承蕭浦二水以達柳溪其中柯相公潭與於潛為界水有手頰口柯橋三鎮嘉興府衝繁疲難隸杭嘉湖道副將駐乾隆十五年裁所併海寧衛為嘉興府西南距省治百八十里廣百五十里袤百里北極高三十度五十二分京師偏東四度三分領縣七嘉興衝繁疲難倚府境之水二派曰武林天目而天目派由石門秀水