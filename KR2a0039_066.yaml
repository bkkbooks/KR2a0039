body:
  text: 清史稿卷六十六志四十一地理十三江西江西省禹貢揚州之域明置江西巡撫承宣布政使司南贛巡撫清初因之順治四年置江南河南江西總督治江寧六年罷河南不轄九年移治南昌尋還舊治十八年置江西總督康熙四年復故先於三年裁南贛巡撫為永制乾隆八年吉安增置蓮花廳十九年升贛州寧都縣為直隸州三十八年升贛州定南縣為廳光緒二十九年改贛州觀音閣通判為虔南廳三十三年改銅鼓營為廳屬瑞州東至安徽婺源縣六百五十八里南至廣東連平州一千三百里西至湖南瀏陽縣四百二十里北至湖北黃梅縣三百四十里廣九百七十七里袤一千八百二十里北極高二十四度十七分至二十九度五十八分京師偏東一度五十五分至偏西二度二十四分宣統三年編戶三百四十三萬九千八百七十三口一千三百五十二萬七千二十九凡領府十三直隸州一廳四州一縣七十四驛道達各省者五一北渡江達湖北黃梅一東南逾杉關達福建光澤一東逾懷玉山達浙江常山一南逾大庾嶺達廣東南雄一西出插嶺達湖南醴陵鐵路擬築者四曰南潯鐵路自九江而南昌而吉安而贛南凡三段備與廣東接此外道瑞袁通湘道撫建通閩道廣信通浙為支路亦三航路則九江為江輪停泊之埠電線自南昌北通九江南通廣州又自九江東通蕪湖西通漢口南昌府衝繁難隸糧儲道江西巡撫布政提學提法三司糧儲巡警勸業三道駐東北距京師三千二百四十五里廣四百四十里袤四百二十五里北極高二十八度三十七分京師偏西三十七分領州一縣七南昌衝繁難倚東南麥山漸山南斜山虎山西贛江一曰章江自豐城入經巿汊汛歧為二一東北行會撫河仍合經流與東湖通東北徑蛟溪入新建東武陽水即旴水西北行入進賢萬公堤竿韶鎮三江口巿汊二巡司一驛巿汊新建衝繁難倚西西山古曰散原亙奉新建昌諸縣境西南逍遙北松門西北銅山西南贛江上承劍江自豐城入流徑瑞河口蜀江自高安來會東北行徑吳城修水自建昌來會流合鄱陽湖經星子出湖口入大江湖即彭蠡也全湖跨南昌饒州南康九江四府境為省境諸水所匯南潯鐵路起沙井巡司駐生米鎮同知駐吳城鎮樵舍海口吉山望湖亭後河白馬六汛新興廢驛豐城衝繁難府南一百三十里西南豐城山縣以此名道書三十七福地之一東鍾山西南澄山西北馬鞍山南羅山富水出杯山豐水出贛江自清江入流徑縣西東北行豐水南來合富水會焉又東北入南昌新建東雩韶水來自臨川西北行入贛江松湖港口曲江三鎮大江口巡司一驛劍江進賢衝府東南一百二十里城內三臺山西南麻山東棲賢西英山金山旴水自南昌入東北行徑縣西抵八字入鄱陽湖西有軍山湖日月湖青嵐湖俱流會三陽水入鄱陽湖巡司駐梅莊有塢子廢司奉新衝府西北一百十五里北登高山西南華林東南岐山西北藥王山西百丈山馮水出左合側潭水右合金港源又東南至九梓鋪納龍頭溪白水華林水至城南又東納鳴溪三溪入安義界巡司駐羅坊靖安簡府西北一百五十五里北吳山西北金城葛仙山桃源山桃源水所出流合雙溪雙溪一曰南河源出義寧毛竹山合龍頭坳管家坳委源諸水徑高湖歧為二環城南北至鴨婆潭復合一曰北河出雙坑洞合爛草湖大橫溪徑象湖入安義會馮水龍頭坳鎮武寧繁難府西北三百五十里西北遼山西南大孤東遼東山修水自義寧入右合洋湖水左合青坪水至城南納楊浦鳳口水又西合磧溪箬溪魯溪中黃三硔水入建昌縣丞駐木高箬溪水汛太平陸汛高坪巿巡司義寧州繁疲難府西北三百五十五里原名寧州嘉慶三年改東南毛竹山東旌陽西九龍西北黃龍幕阜二山修水出東南左合百菖水杭口水右東津水至城西武寧鄉水出大溈山合東鄉水及鹿源水自南來會又西折北至城東合安平水鶴源水入武寧查津同知駐八疊嶺鎮有巡司與排埠塘杉巿為三饒州府衝繁疲難隸饒九道西南距省治三百六十里廣四百八十七里袤三百四十里北極高二十八度五十九分京師偏東一十一分沿明制領縣七鄱陽衝繁難倚北芝山東郭璞山西堯山南關山鄱陽湖西南鄱江匯焉有二源一自安徽祁門來歷浮梁為昌江一自安徽婺源來歷德興樂平為樂安江流會城東環城北出歧為雙港分注鄱陽湖東有東湖一名督軍流合鄱江汛八八字團轉強山館驛前黃龍廟樂安河螺螄嘴棠陰石門巡司芝山驛餘干衝難府東南一百十里西藏山東北萬重武陵西南李梅東南黃蘗山西北有康郎山在鄱陽湖中湖因名康郎龍窟河一曰安仁江自安仁入流經潼口灘歧為二西北行三餘諸水入焉流抵饒河口俱入鄱陽湖康山黃丘埠瑞洪三鎮康山梅溪表恩高溪四汛瑞洪縣丞駐一驛龍津裁樂平繁難府東一百十七里東康山北鳳遊西吳溪東南石城山婺江自德興入為樂安江合長樂水建節水吳溪殷河流徑縣南樂安鄉因名西南流入萬年界仙鶴八澗二鎮康山驛浮梁衝繁難府東北一百八十七里北孔阜山東芭蕉西金魚西南陽麻山東南大遊小遊山昌江自安徽祁門入合小北港苦竹坑水磨刀港流徑城南西南行會歷降水柳家灣水入鄱陽景德桃樹二鎮巡司駐景德德興衝繁府東二百三十七里東銀山銅山西北洪雅東南大茅山大溪自安徽婺源入建節水自弋陽入合樂平之桐山港洎山之洎水為樂安江並入樂平白沙巡司銀峰驛安仁衝府東南一百八十里東張古山北蟠象山東北青山西南積煙西北華山安仁江上源為上饒江自貴溪入合玉石澗徑城南西北行與白塔河會至城西北合藍溪入餘干萬年難府東南一百二十里城北萬年山縣以此名西南團湖西託𩹉西北軸山東南百丈嶺殷河出合文溪