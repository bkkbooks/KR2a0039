body:
  text: 清史稿卷六十八志四十三地理十五湖南湖南禹貢荊州之域明屬湖廣布政使司置偏沅巡撫清初因之康熙三年析置湖南布政使司為湖南省移偏沅巡撫駐長沙雍正二年改偏沅巡撫為湖南巡撫並歸湖廣總督兼轄七年置永順府升嶽州之澧州十年升衡州之桂陽州乾隆元年升辰州之沅州為府嘉慶二年升辰州之乾州鳳凰永綏三廳二十二年置晃州廳光緒十八年置南州廳領府九直隸廳五直隸州四屬州三縣六十四東至江西義寧三百五十里西至貴州銅仁一千七百三十五里南至廣東連州八百二十里北至湖北監利三百五十里廣一千四百二十里袤一千一百五十里北極高二十四度四十九分至二十九度三十七分京師偏西二度十四分至七度四十三分宣統三年編戶四百二十八萬八千一百六十四口二千二百五萬二千一百五十九其名山衡嶽九疑都龐騎田萌渚幕阜其巨川湘沅資澧其澤洞庭驛道自長沙北達湖北蒲圻東南出插嶺關達江西萍鄉南達廣西全州西達貴州玉屏鐵路幹粵漢中段支萍株航路自長沙南達湘潭北達漢口電線自長沙北達漢口南通桂林西通洪江東通江西萍鄉安源長沙府衝繁難巡撫治布政提學提法三司巡警勸業鹽法長寶四道同治府隸之明隸湖廣布政使司康熙中偏沅巡撫自沅州徙駐為省治雍正二年改湖南巡撫東北至京師三千五百八十五里廣一千里袤五百九十里北極高二十八度十三分京師偏西三度四十分領州一縣十一長沙衝繁難倚東天井西谷山北羅洋石寶麻潭智度銅山巨川則大江洞庭湖匯湘沅資澧入焉湘江自湘潭善化入納潦滸河及白沙河又西北右合下泥港左桐樹港納八曲河徑銅官山至靖港為古新康江口又西北會喬口河入湘陰瀏陽河在縣南源出大圍山西北流經縣界入湘陶關在縣西南有喬頭鎮巡司喬頭長沙二驛長株鐵路善化衝繁難倚南昭山西嶽麓西北金盤東南錫山湘水在西自湘潭入西北流左納觀音港至瓦官口靳江水從西南來注之北過水陸洲入於長沙東瀏渭水自瀏陽入北合金塘港至長沙入湘水又西卯江水一名滿官江源出寧鄉嵇架山東北與螺陂河水合入長沙是為八曲河南有暮雲市廢巡司有驛長株鐵路湘潭衝繁難府西南一百里西烏臺東石潭南曉霞東北昭山其下有昭潭西北韶山西南隱山東南鳳凰山湘水自衡山入東南流過晚洲屈而北朱亭港水注之又東北過淦田市東與醴陵縣界又北過空冷峽又東北至於鑿石浦屈而西涓水自西南來會水徑縣西易俗鄉又名曰易俗河又北至湘河口左合漣水又東北過縣治南又西北為峨洲入於善化其西靳江水自寧鄉入迤東至善化入湘水二鎮朱亭縣丞駐下灄舊有巡司廢又永寧巡司亦廢黃茅巡司乾隆二十六年置後遷縣東株洲市更名有南岸驛有商埠光緒三十一年奏開有長株株萍鐵路湘陰衝繁難府北一百二十里北黃陵東神鼎東南玉池東北汨羅山玉笥山西北錫山湘水在西自長沙入北合門涇江又北流西別出為濠河水西北與資水分流其合處曰臨資口其正渠又北至縣治西南白水江注之又北過蘆林潭錫江水合濠河水自西來會又北合汨水西與湄水合又西北會羅水為汨羅江西北流歧為二至屈潭復合西北過屈羅戍南分流注湘水湘水西北至磊石山入於洞庭湖鎮三營田蕭婆大荊縣丞治林子口西北有營田巡司後廢新市大荊鎮二巡司湘陰歸義二驛寧鄉衝府西北一百里南石鼓北香林東天馬東南嵇山西大溈山溈水出東南流右納黃絹水左瑕溪至雙江口流沙河水自西南來注之又東北左合玉堂江水右烏江水又東北至縣治南屈而東會平江水又東北入於長沙為新康江又有靳江水在縣南源出湘鄉迤東至湘潭入湘有唐市鎮有驛瀏陽繁疲難府東一百五十里西洞陽山北道吾東北大光山又大圍山瀏水出西南至雙江口小溪水自東來會又過縣治西南瀏渭水北流入焉又西與小河水合西北入於長沙北石柱峯潦滸河出西南流屈西北至長沙為潦塘水又南川水即澄潭江自江西萬載入西南過江口入於醴陵其下流是為淥水也永興居仁二鎮梅子園一巡司澄潭江後遷縣西永安市醴陵簡府東南一百八十里北小溈山東王喬東南大屏西南君子山湘水瀆自湘潭入又南淥江水有二源北源曰南川水自瀏陽入西南至雙江口萍水自南來會水出江西萍鄉縣是為南源又西過縣治南右納姜灣水又西與鐵江水合水一名北江自攸縣入北合清水江又北流為泗汾河水又北入淥水至淥口入於湘有插嶺關淥口鎮巡司及驛與醴陵驛為二株萍鐵路益陽衝難府西北二百里北五溪山南小廬西修山西北紫雲西南浮丘山益陽江在南一名茱萸江即資水自安化入東合泥溪沾溪桃花江志溪諸水過縣治南別出為蘭溪水合喬江東北流北別出為甘溪入沅江東有喬江水首受資水自沅江入西西林港歧為二一東北入湘陰一東南入長沙皆合湘水北有益水出五溪山東與甘溪水合至沅江入資有瓦湖鎮有驛湘鄉衝疲難府西南二百一十里北仙女山東東台西石佛西北靈羊西南有大禹山漣水一名湘鄉河自邵陽入北合金竹水又北與藍田水會東北流左納西陽水屈東南至大江口側水合崖源水自西南來注又東北過石魚山東青陂水南流合焉東北至湘潭入湘水虞塘定勝二鎮縣丞治永豐市婁底巡司明置武障乾隆三年徙改攸繁疲難府東南二百八十里東司空東北羅浮西北明月山攸水在東源出江西萍鄉縣西合陽升江水西南至縣治東南入洣水水自茶陵入亦名曰茶陵江也洣水又西與陰山江合入衡山東北有鳳嶺巡司雍正十一年置安化簡府西二百六十里東移風南浮青北大峰西北小辰西南大熊山山與新化接界資水在西一名邵河自新化入西北合渠水屈東北流過縣治北屈而東敷溪水自南來注又東納善溪水入於益陽東南有藍田水亦自新化入東北至湘鄉入漣水又歸溪水源出縣西司徒嶺西南流與湄江合屈東南至湘鄉合藍田水茶陵州繁難府東南四百八十里西雲陽東皇雩東北景陽山即茶山洣水自酃入亦曰茶陵江西北流右納洮水北過州治東茶水自東北來注又西北入攸有視渡口巡司治州南視渡關後遷高岡南關寶慶府難隸長寶道舊隸湖廣布政使司康熙三年來屬東北距省治五百里廣六百六十里袤六百三十里北極高二十七度四分京師偏西五度六分領州一縣四邵陽繁難倚南四望東大雲東北有龍山西北首望資水自武岡入東納辰溪水東北過府治北邵水出龍山南合桐江檀江屈西北流注之北與漁溪合西北會高平水入新化又漣水亦出龍山東北入湘鄉又蒸水源出邪薑山合大雲水至衡陽入湘又西洋江出西北隆回鄉南至武岡流合洞口水有隆回巡司其黑田鋪巡司乾隆二十五年置後廢通判駐桃花坪新化繁難府西北一百八十里北大熊山東北有黃柏界山皆與安化接界南梅山長龍西南文仙西北清虛一名大西山資水在東自邵陽入西北過縣治北雲溪水合洋溪自西南來注之又北與油溪水合入安化西有渠江水源出冷溪山北至安化入資水東有藍田水上源曰墨溪出邵陽亦入安化高平水出西南首望山東南流入邵陽注資水西北有蘇溪鎮巡司乾隆四十年廢城步難府西南四百二十里乾隆三年改隸靖州七年復東羅漢山東南金紫山與廣西全州接界西南金童又有藍山西北楓門山東北青角山即古路山資水所出一名都梁水又名濟水北流屈東左會發溪水入武岡又有巫水源出東北巫山南屈而西為漁渡江縣東南諸水皆入焉至縣治西南左納界背水西北與清溪水合入綏寧西南有長平水又曰藍山水亦入綏寧為臨川水又有長灘水出縣南南至廣西龍勝廳曰貝子溪其下流是為潯江同官水亦南入龍勝為太平溪流合貝子溪有橫嶺峝巡司本寨頭司乾隆元年置後遷橫嶺更名江頭汛巡司治莫宜峝乾隆六十年置長安營同知駐轄瑤峝五曰蓬峝牛欄莫宜扶城橫嶺為寨四十有八武岡州繁疲難府西南二百八十里西北有武岡山州以是名又西北天尊山山與綏寧接界南雲山東南寶方又名資勝山資水在南自城步入東合威溪又東過州治南左合渠水右納石門水又東北流蓼溪水自西來會蓼溪一曰高沙市水出綏寧又北合洞口水水上源曰平溪出黔陽東南流右納嶽溪水東合西洋江至平溪口入資水資水又北屈而東徑紫陽山曰紫陽河龍江水北流入焉又東南與夫夷水會入邵陽西北草那溪自綏寧入至黔陽入沅水州同駐高沙市峽口石門司二巡司紫陽蓼溪二廢司新寧繁難府西南三百里西花溪南金城西南峎山東南大雲東北高桂又有紫雲山山與武岡東安接界夫夷水在南一名羅江水其上源曰西延水自廣西全州入東北流左納深沖水又北至縣治西南新寨水自西來注之屈東過筆架山合水頭水又東北納涷江水合小溪水入武岡為資水別源東有靖位鎮巡司康熙二十三年廢嶽州府衝繁疲難隸嶽常澧道舊隸湖廣布政使司康熙三年來屬初沿明制領州一縣七雍正七年澧升直隸州石門安鄉慈利割隸西南距省治三百里廣三百八十里袤三百四十里北極高二十九度二十四分京師偏西三度三十四分領縣四同知一道光元年移治君山後廢有嶽州商埠光緒二十四年奏開巴陵衝繁疲難倚城內巴丘山東大雲銅鼓皆與臨湘縣接界東南靈屋五龍大江在西北洞庭湖在西南君山扁山石城山皆在湖中湖周八百餘里南連青草西接赤沙謂之三湖湘沅資澧諸水咸匯焉東北至三江口合大江古謂之五渚大江又東北入臨湘有城陵磯天險也南有新牆河即微水自臨湘入西南流左納沙港迤西至灌口入洞庭湖水出東南清水嶺西南至湘陰合汨水湖在東南一名翁湖又東為角子湖楊林街縣丞鹿角鎮主簿東嶽陽驛舊有青岡驛順治十六年置有丞乾隆十六年裁臨湘衝繁府東北九十里東黃西南微落東南大雲又龍窖山跨湖北通城蒲圻諸縣微水所出迤西徑土城左納馬港西南入巴陵大江在縣西自巴陵入東北過彭城山松陽湖水自東南來注之又東北與白泥湖水合過鴨欄磯入湖北嘉魚黃蓋湖在東北縣東諸水皆匯焉北注清江口入大江東南有桃林長安巡司城陵磯乾隆二十六年徙長安鎮更名尋復故雲溪長安二驛鴨欄磯長安二鎮華容疲難府西北一百八十里北黃湖東石門墨山東北東山東南鼓樓山大江右瀆自湖北監利入東屈而南入巴陵北華容河西涌水皆首受大江水自湖北石首入東南流入洞庭湖澧水在縣南自安鄉入合赤沙湖亦注洞庭東北大荊湖及團湖合流入大江黃家穴司巡司黃家鼓樓二鎮平江疲難府東南二百四十里北永寧西湖源東道岩東南連雲東北幕阜山一名天嶽山下有天嶽關又有汨水自江西義寧入西南流右納紅橋水左納白鉛諸水又西南至白湖口屈而北鍾洞水南流西屈注之又西合盧水又西北與暹江水合屈西南過縣治南左納晉坑水又西北至將軍山昌山自東來會迤西入於湘陰東有長壽巡司常德府衝繁難隸嶽常澧道舊隸湖廣布政使司康熙三年來屬東南距省治四百十五里廣四百二十里袤六百二十里北極高二十九度一分京師偏西五度十分領縣四商埠光緒三十二年奏開武陵衝繁疲難倚西有平山即武陵山亦名河洑北有陽山東北藥山東南善德山沅水自桃源入南徑河洑洲屈而東至府治東南歧為馬家吉河水又東南流枉水自西南來注之又東過牛鼻灘