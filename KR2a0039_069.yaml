body:
  text: 清史稿卷六十九志四十四地理十六四川四川禹貢梁州之域明置四川等處承宣布政使司清初因之順治二年置四川省設巡撫治成都十四年增設四川總督康熙四年改烏撒隸貴州七年改設川湖總督駐湖北荊州九年移駐重慶十九年又改為川陝甘總督駐陝西西安雍正六年改東川烏蒙鎮雄隸雲南遵義隸貴州省馬湖入州改建寧衛為寧遠府升錦茂達三州及資縣並為直隸州七年升雅州為府十二年升嘉定潼川二州為府升忠州為直隸州置黔彭直隸廳乾隆元年裁改酉陽土司為酉陽直隸州升永廳為直隸廳十四年復專設四川總督裁巡撫以總督兼理巡撫事治成都二十五年改松潘衛為松潘直隸廳改雜古腦為理番直隸廳二十六年改石砫土司為石砫直隸廳嘉慶七年升達州為綏定府光緒三十年升打箭爐廳為直隸廳三十二年設督辦川滇邊務大臣駐巴塘三十四年改永廳為永寧直隸州升打箭爐廳為康定府升巴安縣為巴安府宣統元年改德爾格忒土司為登科府東至湖北巴東縣一千七百六十里西至甘肅西寧番界一千二百四十里南至雲南元謀縣二千三十里北至陝西寧羌州一千一百八十里廣三千里袤三千二百里由康定府至前藏拉薩駐藏辦事大臣駐四千七百一十里北極高二十七度五十四分至三十二度二十二分京師偏西六度五十三分至十四度十二分宣統三年編戶五百四萬一千七百八十口五千二百八十四萬四百四十六都領府十五直隸州九直隸廳三州十一廳十一縣百十八土司二十九其名山東北有嶓冢蜿蜒川陝界者巴山西北自岷分二支南迤於大金川東西者青城蒙眉在西者噶察克拉嶺折多山其在岷東南迤者摩天嶺劍門山碩古里自青海東巴顏喀喇分支其大川金沙鴉龍岷嘉陵渠涪江大渡河航路東境自夔至驛路自成都東北逾劍閣達陝西沔縣西渡瀘定橋逾大雪山達西藏江卡鐵路川漢未竣工電線自成都東達漢口西達打箭爐成都府衝繁難明府成綿龍茂道治所光緒三十四年裁總督布政使提學使提法使鹽運使巡警道勸業道將軍副都統提督駐舊領州六縣二十五順治十六年省羅江入德陽省彰明入綿康熙元年省崇寧入郫省彭入新繁九年省華陽入成都雍正六年復設華陽升綿茂二州及資縣並為直隸州以德陽綿竹安隸綿汶川保隸茂資陽仁壽井研隸資又省威入保六年復設崇寧雙流彭彰明四縣屬府七年以彰明改屬龍安東北距京師五千七百十里廣二百四十里袤二百七十里北極高三十度四十二分京師偏西十二度十六分領州三縣十三成都衝繁難倚武擔山在城西北隅西龍華山北天回山郫江自郫縣入繞城東而南入華陽與錦江合名二江亦曰都江沱江自新繁入徑縣北又東流入新都金水河自城西穿城東出入江摩柯池在城內有天迥沱江二鎮一驛錦官華陽衝繁難倚康熙九年併入成都雍正五年復置東大面山西西山亦名雪嶺南六對鐵爐錦江一名汶江自郫縣入徑城南折而東會成都之郫江又折而西新開河自雙流來會下流入彭山浣花溪在城東南一名百花潭驛同成都雙流衝府西南四十里康熙元年併入新津雍正六年復置南應天宜城東南普賢山新開河自溫江入徑城南東流入華陽石魚河楊柳河亦自溫江入徑城西南合流入新津注大江溫江繁府西少南五十里北女郎大墓二山岷江俗名溫江即金馬河自灌縣入西南入新津石魚河在城西自金馬河分流楊柳河自石魚河分流又酸棗河自郫縣入東流徑城北俱入雙流新繁繁府西北五十六里西北五龍平陽北曲尺山沱江即北江自郫縣入徑城南入成都北清白江即古湔水自彭縣入東入新都錦水河亦自彭縣入東流徑城南都橋河自彭縣西南分清白江東流徑城北俱入新都金堂繁難府東北七十里西金堂山縣以此名南雲頂山亦名百城山東三學山綿陽河即綿水自漢州合雒水入右納馬木河又南至焦山陂西有清白江及其枝津督橋河自新都入合於城東其昆橋河即沱江先後來會是為中江又南入簡州有古城下市柏茂三鎮新都衝難府北五十里南龍門赤岸北麗元山沱江即毗橋河下流自成都入督橋河錦水河俱自新繁入錦水又歧為利水河並入金堂其正流至城東南入湔水在縣北亦自新繁入合彌牟水東入金堂有彌牟軍屯二鎮一驛廣漢郫衝府西四十五里西平樂山北郫江自崇寧入東流入新繁郫江俗名油子河自走馬河分流徑城西又東入成都沱江自崇寧入東流入新繁西九曲江分走馬河小支繞城西北下流入油子河雙清河即走馬河亦自崇寧入東流入華陽為錦江有馬街一鎮灌衝繁府西北百二十五里西北灌口玉壘南趙公山西南青城山縣西南一里離堆秦李冰鑿江處大江徑此分二大支曰南江曰北江南江分三派正派南流入崇慶為西河東派為白馬河又分為里石溪河亦入崇寧西派西南流又分二支俱入新津北江分南北二大派南派又分為三曰龍安江入崇慶曰金馬河入溫江曰酸棗河入郫縣北大派之南派曰沱江北派曰湔水俱入崇寧西南僚澤西北玉壘蠶崖三關彭繁疲難府北九十里康熙元年併入新繁雍正六年復置西北彭門山與牛心山隔江對峙又有大隋中隋二山南清白江自崇寧入歧為督橋河東入新繁西北王村河源出五峰山南流折東入漢川為馬水河錦水河亦自崇寧入徑城南東流入新繁瀰濛水源出琅邪山即彌牟水上游東流至新津入湔江北靜塞關崇寧簡府西北八十里康熙元年省入郫雍正七年復置西鐵砧山北金馬山沱江自灌縣入徑城南東入郫縣湔水自灌縣分沱江東流四十里徑城北又東入彭縣為清白江郫江自灌縣入徑城南歧為走馬河又一支為油子河俱南東入郫