body:
  text: 清史稿卷七十志四十五地理十七福建福建禹貢揚州南境明置福建行中書省改承宣布政使司清初為福建省置閩浙總督康熙二十三年海島平以其地置臺灣府雍正十二年升福寧州為府永春龍巖為直隸州增置霞浦屏南福鼎光緒十三年升臺灣府為行省與福建分治後入日本東至海百九十里西至江西石城千五百五十五里南至海二百七十里北至浙江景寧四百六十里廣九百一十里袤九百七十五里南至詔南縣南境北極高二十三度四十四分北至浦城縣北境北極高二十八度東至長樂縣東境京師偏東三度一十七分西至武平縣西境偏西二十二分宣統三年編戶二百三十七萬六千八百五十五口一千四百二十二萬九千九百六十三領府九直隸州二廳一縣五十七福州府衝繁疲難清為省治閩浙總督兼巡撫布政提法交涉提學四司鹽糧巡警勸業四道福州將軍副都統駐道光二十三年與英訂約五口通商之一租界在閩江北岸曰南臺與府城對航路厦門福州三都澳驛路北逾仙霞嶺達浙江江山西南達廣東黃岡電線由福州北通杭州西南通廣州東通馬尾川石山東北通三都澳海線由川石山東通臺灣淡水由厦門東北通上海西南通香港北至京師六千一百三十四里廣三百七十七里袤四百十二里北極高二十六度三分京師偏東三度領縣十閩衝繁疲難倚府東偏東鼓山為郡之鎮東南九仙大象南臺南方山海自浙江溫州迤西南入福寧環府之羅源連江至縣東百九十里為五虎門其外大洋其內閩江口閩江閩大川上匯富屯沙建三溪至侯官分二派入北派承洪山江東逕中洲為南臺江至中岐為馬頭江合大定江演江亦曰東峽江至羅星塔南派澤苗江入為陶江逕螺洲左合黃山水又東南為陰崎江又東為烏龍江右合榕溪又東亦曰西峽江又東來會又東過青洲右納太平港水逕員山又北支津北抵亭頭鄉又東為琅琦江復歧為二一西北出五虎門一東南與長樂分岸為來力鳥石江梅花江出白猴嶼並入焉其下歷興化泉漳至粵水程二千里陸千二百里閩海關總口二一駐南臺海防同知同一駐閩安鎮副將同順治十五年築城置戰船南北岸礮臺縣丞駐營前雍正十二年徙三水部關外鎮口中洲三鎮巡司三閩安五虎門永慶三山大田二驛侯官衝繁疲難倚府西偏西南隅閩山北隅越王東北隅冶山南方山西南怡山西清泉西北雪峰北蓮花壽山西北梧桐嶺城南閩江西北上承閩清大溪入逕大竺左合陳溪至小箬仍錯出復入右合黿溪左大目溪又東南左合黃石溪至過山洲合陳塘溪為馬瀆江又東過懷安洲歧為二北派東南左合五峰山水為石岊江又為螺江金鎖江至城西為洪山江分流復合左合西湖水南派右納樓梯嶺水又南大樟溪自永福入合浯溪潢溪喆溪印溪歧為澤苗港先後來會為澤苗江又東南並入閩北宦溪出蓮花山北會板橋塘水折西右合長箕嶺水逕下密折東北為日溪為密溪入連江西湖東湖南湖並堙西河場縣西西江口大使駐閩畫地為埕漉海水曝之與江淮浙鹽異縣丞駐大湖梅嶺大穆芋原遼沙四鎮竹崎五縣寨二巡司白沙芋原二驛長樂疲難府東南百里東壺井山東南龍泉西南岱遇東北越遷北東南際海北界閩之馬江口太平港自七巖山循界西北分入一入其營前一合資聖溪及文洽浦自東水關貫城東出又北合考溪入洋嶼又東至籌港為來力鳥石江梅花江陳塘港入猫嶼其外東沙北犬南犬南為磁澳江西有仙岐寨蕉山寨西至漳港為漳江又南至壺井澳為壺井江又南至鐵鑪嶼為巴頭港三溪入其外雙帆石東洛嶼西洛嶼又南逕御國山小祉大祉為松下江口至福清界宋建炎初陳可大始興水利乾道四年徐為斗門及湖塘陂堰溉田都二千八十三頃磁澳鎮來力鳥石籌港澤里厚福四汛猫嶼蕉山小祉廢巡司福清衝繁疲難府南少東百三十五里城北隅靈鷲山東瑞巖東南郭廬海壇南日東南際海自長樂迤西南為鼓嶼猫嶼嶼頭龍江口海口江上源崔溪出西北百丈嶺東匯龍潭山水無患溪曰西溪至城南左合東皋山水為龍首河瀦為琵琶洋入又東南三山高山天馬山至蓮盤北際御國山有大扁嶼東沙自鼓嶼迤東南為大練門海壇南有三十六派湖其北軍山鐘山西水馬山南南茭山草嶼東甲西甲又西南日山迤北大小至逕江口南日江上游逕江上承蘇漁溪入西南江口橋至莆田界牛頭門薛峯頭上逕諸汛錦屏江口二廢巡司宏路蒜嶺二驛連江疲難府東北百里城北龍漈山西北白巖雲居城南金鼇東南定岐東北馬鞍東際海自羅源迤南為北茭其南北竿塘山與閩南竿塘直連江口江即鼇江上匯羅源羅溪長潭溪及鳳板溪閩清雪峰水寧德排樓溪於五縣寨口又東至羅崙渡為寶溪又東為鼇江左合財溪利安溪及雪溪又東逕東岱為岱江右合蟾步江左珠浦又東與東北鯉溪逕燕窩並入焉東湖溉田四萬餘畝定海北茭小埕三鎮東岱巡司羅源衝府東北百六十里治鳳山南麓城北文殊山席帽西四明西北洪福東南松崎東北際海自寧德迤南為鑑江口東與東沖口直循東洛西洛又西可門濂澳門松崎江口城西羅川出蔣山合九溪四明溪歧為南北溪復合東逕禹步跡縣北九龍溪合起步溪來會與白水溪小護溪大護溪並達於松崎江其東南至連江界西南鳳板溪長潭溪西霍口溪上承侯官密溪左納蘇洋溪屈東南為羅溪左納老人山水又東南入連江西北楊溪入寧德鑑江濂澳松山上地四鎮古田衝疲府西北二百七十里城北翠屏山城西北臺西南九龍東蓋竹大溪二源東溪出杉洋鎮黃居嶺西南右會太平山水左納甘棠溪又西南左合石馬山水右納富洋溪又東逕城東為東溪屈南西溪自其右來會南逕鳴玉灘錯閩清復