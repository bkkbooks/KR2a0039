body:
  text: 清史稿卷七十二志四十七地理十九廣東廣東禹貢揚州之南裔明置布政使司治廣州清初因明制定為省雍正中升連州及程鄉為嘉應州並直隸嘉慶中南雄降直隸州尋並復故增佛岡南雄仍降州增連山同治中陽江升廳增赤溪光緒中升欽州崖州降萬州為道六為府九直隸州七直隸廳三散州四散廳一縣七十九東至福建詔南千里西至廣西宣化千五百里南至海三百里北至湖南桂陽七百八十里東南至海二百八十里西南至崖州海二千四百里東北至江西長寧八百里西北至廣西賀七百三十里廣二千五百里袤一千八百里東北距京師七千五百七十里宣統三年編戶五百四萬一千七百八十口二千八百一萬五百六十四其名山靈洲黃嶺羅浮其巨川西江北江東江鐵路粵漢南段自廣州西徑三水又北清遠英德曲江至樂昌與湖南興寧路接廣州府衝繁疲難隸廣肇羅道兩廣總督舊駐肇慶乾隆十一年徙光緒二十四年裁巡撫尋復三十一年仍與粵海關監督糧道同裁布政提學提法鹽運四司巡警勸業二道廣州將軍滿洲漢軍副都統廣東水師提督駐明領縣十三康熙中增置花縣廣四百二十里袤五百二十二里北極高二十三度十一分京師偏西三度三十三分領縣十四有廳三曰佛山雍正十一年置曰前山乾隆八年置曰虎門道光二十五年置有粵海關康熙二十四年置廣州商埠道光二十二年英南京條約訂開南海衝繁疲難倚府西偏粵之山五嶺據其三北越秀西北靈洲西南西樵山北江自三水入東南流東別出為紫洞水至番禺合珠江入順德西江自三水入東南過九江亦入順德西北馬徑水首受蘆包水南與三江水會屈東北流左合黃洞水南流溪水自番禺西南注之南出石門山為石門水過府治西南屈東為珠江入番禺有九江浦主簿三江金利神安黃鼎江浦五斗口六巡司西粵漢西南三佛鐵路番禺衝繁難倚在城有番禺二山縣以是名北白雲東南浮練一名浮蓮岡東南濱海南有珠江上承南海石門水東南流歧為二至長洲復合又東南為波羅江左合東江為三江口又東南獅子洋合沙灣水入於海有獅子營西永靖營有慕德鹿步沙灣茭塘四巡司魚雷營有船塢在黃埔番禺五羊二驛東廣九西北粵漢鐵路順德繁疲難府南百里北都寧西天湖西北西淋山北江自南海入為河澎海東南流屈北為扶閭海又東石海東別為沙灣水合珠江至半江為板沙海入香山西江自南海入東別出為甘竹灘水與板沙海合過仰船岡別出為仰船海至新會入海縣丞一治容奇有紫泥江村馬寧又北都寧四巡司有甘竹商埠光緒二十三年中英緬甸條約開東莞衝繁疲難府東南百八十里南黃嶺東南寶山西南濱海海中秀山東西峙若門然曰虎頭門珠江出其中又謂之珠江口有炮臺五曰威遠上橫檔下橫檔大角沙角東江自博羅入合瀝林水九江水西過黃家山南別出為到涌水會珠江皆入海石龍鎮縣丞一京山缺口中堂巡司三鐵岡驛一廣九鐵路從化簡府北百三十里東北五指山又十八山流溪水出焉南合陳峝水玉溪合過縣治東南左納曲江右納黎塘至番禺入石門有流溪巡司石岐驛龍門簡府東北二百一十里西藍糞山西北分水凹山山西之水匯流溪入北江山東之水匯西林水入東江西林水一名九淋水出西北三角山合高明白沙屈西南納羣溪水永清水入增城為增江有熱水湖在西北有廟子角巡司後遷永清墟新寧疲難府西南三百六十里北三台東百峰山西南大隆山南濱海海中有上川洲下川洲北長沙河即恩平江自開平入東南流合南門河西北合紫霞河入新會東南泥涌河南合牛角水至烽火角入海西那扶水亦南至獅子洲入海又有潭滘河康熙二十六年總督吳在南鑿西引泥涌河東北達新會崖門以通舟楫溫泉醴泉在西南廣海寨縣丞駐有上川鹽巡司有公益商埠寧陽鐵路增城簡府東百六十二里西雲母西南南樵東北羅浮山東江自博羅入西流屈南至番禺合珠江增江上流為龍門水南與派潭水合又南至三江口右納澄溪水左納九曲水過縣治東南分流入東江綏福水出西北青幽山亦東南入於東江有茅田巡司新塘墟主簿香山疲繁難府東南二百草里北浮虛東南五桂又濠鏡澳山山突出海中成半島形曰澳門光緒十三年入於葡萄牙其北濠鏡澳關又西拱北灣有關東南濱海海中有東澳山九星山下曰九星洋又有老萬九澳橫琴三竈浪白諸山在海中西北板沙海自順德入東南至潭洲木頭海首受仰船水東南分流入海古鎮海首受西江亦自順德入東南至螺洲與石岐水合南出磨刀門入海前山寨城縣丞駐黃梁都城都司巡檢駐又淇澳香山黃圃三巡司有香洲商埠宣統元年奏開新會繁疲難府西南二百三十里北黃雲圭峯東南崖山與西南湯瓶嘴山對峙熊海出其中曰崖門南濱海西江自南海入為天河海東屈而南過豬頭山歧為二東南出者曰荷塘水合古鎮海東南入香山又西別為外海水西南至虎跳門入海西南出者曰分水江合水南過江門注熊海又西恩平江自開平入與潭江合東北流為青膽洋左納橋亭水東南合分水江出崖門入海江門縣丞駐潮連牛肚灣沙村三巡司大瓦司廢蜆岡東亭二驛江門商埠光緒二十八年中英商約訂開有寧陽鐵路三水衝難府西北二百七十里南崑都北龍坡山北江西南流至胥江口東別出為蘆包水又西南至四會合綏江別為思賢滘水會西江東過縣治南為肄江至於西南潭入南海北江自西南潭別出為三江水與蘆包水合至南海出石門其下流為珠江西有西江自高要入青岐水首受綏江東南過金洲山亦入南海西南鎮縣丞駐有胥江三水二巡司三水口亦名河口有商埠光緒二十三年中英緬甸條約訂開有