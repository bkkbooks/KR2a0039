body:
  text: 清史稿卷七十三志四十八地理二十廣西廣西禹貢荊州南徼之域元置廣西等處行中書省明改承宣布政使司清初建省置巡撫布政共治焉置兩廣總督康熙二年廣東西分設總督四年復故雍正元年復分設明年復合六年以雲貴總督兼轄廣西十二年仍復故駐廣東肇慶府後移治廣州府初領府九桂林柳州慶遠思恩平樂梧州潯州南寧太平順治十五年升泗城土州為府尋改為軍民府雍正三年升鬱林賓州為直隸州五年泗城復為府七年置鎮安府十二年降賓州隸思恩府升西隆州為直隸州乾隆七年降西隆州隸泗城府光緒元年升百色廳為直隸廳十二年升歸順州為直隸州十八年升上思州為直隸廳東北距京師七千四百六十里東至湖南道州三百七十里西至貴州普安二千五百五十里南至廣東信宜九百四十里北至湖南城步縣三百二十里廣二千八百十里袤二千九百六十里宣統三年編戶百二十七萬四千五百四十四口八百七十四萬六千七百四十七領府十一直隸廳二直隸州二廳八州十五縣四十九土州二十四土縣四土司十三在慶遠者曰長官司其名山越城臨賀句漏陽海大容其巨川灕江黔江鬱江湘江驛道東北踰越城嶠達湖南永州西南踰崑崙關達龍州東南達廣東封川電線東北達長沙東南達廣州西通慶遠鐵路自龍州出鎮南關達安南諒山桂林府衝繁難隸桂平梧鬱道巡撫布政提學提法勸業巡警道駐光緒三十二年桂平梧鬱兼管鹽法道徙駐梧州提督徙駐南寧明洪武五年改靜江府為桂林府領州二縣七順治初因明舊為省治乾隆六年析義寧縣地置龍勝廳光緒三十二年析永寧州永福融柳城雒容四縣地置中渡廳廣二百五十里袤三百里北極高二十五度十三分京師偏西六度十四分領廳一州二縣七臨桂衝繁難倚明府治因之內桂山獨秀城東七星南南溪西隱山東北駮鹿灕水一曰桂江省境西江北岸第二大受渠也自靈川入西南流經府治合陽江屈而東南右受靈建水又東與秋陂江合屈東南流乖水西流注之南入陽朔西白石江上源曰義江自義寧入經縣西南入永福相思江出縣南臥石山南注分水塘歧為二東出者與浪石江合入灕江西出者與繞江合入白石江南六塘堡有汛同知駐大墟光緒三十二年徙中渡西南蘇橋巡司南六塘巡司驛一東江興安衝繁府東北百三十四里東北越城嶺一曰始安嶠五嶺在廣西北境者二此其最西嶺也東南龍蟠山西南鬱金山海陽江即湘灕二水源也出靈川右受石梯山水左受太平堡水又東北經治東分水塘歧為二西南流者為灕水東北流者為湘水湘水自治東東北流右受莫川入全州灕水經治北曰陡河西流折南至興隆市六峒江合黃柏江華江川江反璧江為大融江自西北來注西南入靈川西北小融江出戴雲山東南流亦入靈川全州營分防汛駐城西北有泍水汛社水巡司鹽砂唐家二寨廢司驛一白雲靈川衝難府東北五十里北北障山東南堯山西呂仙北鳳皇東南陽海山海陽江出繞興安城西南流為灕水復經縣東北曰靈江合小融江又西南至治東右受潞江左受淦水西南合甘棠江入臨桂甘棠江自興安入經縣西北曰東江東南流合西江又南松木江合流風江東流注之經龍巖諸水匯巖下伏流而南左受社江曲流入靈江有帶融南北二堰引潞江溉田二千餘頃西塘下有鎮全州營分防汛駐驛一大龍陽朔衝府南少東百五十四里北陽朔山西北雲源西都利南古羅灕水自臨桂入東南流興平熙平二水西流注之屈曲南流至治東折東安樂歸義二水東北流注之左受白鶴山水東南入平樂西金寶堡明置戍康熙八年遊擊駐防後廢桂林營分防汛駐城東北有鉛寶塘汛有水汛驛一古祚永寧州簡府西百四十里東百壽巖東北都狼北銀瓶山白馬江經其下東江一曰黃源水出龍勝西南經州北東南流至江口村白馬江合大巖江風門隘茫洞江諸水東北流經治東注之東南入臨桂境折入永福會白石江富河江出州西南古河山東南流經高坡伏流至蒲台寨西復出合大洋江西南錯入中渡曰中渡江即雒容水也西南桐木富祿南常安三鎮永寧營駐城西南安良屯秋南常安有汛南喇峒巡司永福衝府西南百里明初屬府後屬永寧州順治初改屬府西南金山與馬芒山對峙江流經其中又太和山濱江西白石江自臨桂入北經治東曰永福江毛江合泗定河西北流注之東江亦自臨桂入合西江東流注之西南流受容水入雒容為洛清江石流江上源曰四牌溪自修仁流經縣東南折而西亦入雒容西南蘭麻山俗呼攔馬山攔馬水所出東入永福江山路險絶有蘭麻鎮桂林營左哨駐城南寨沙西南理定黃冕鹿寨有汛縣丞駐鹿寨驛二三里橫塘義寧難府西北八十二里明初屬府後屬永寧州順治初改屬西南華嚴山靈鷟西北智慧北丁嶺義江出南流右受觀音田山江頭嶺北諸山溪水又南智慧江合高家山水東南流注之經治西左受石豪江南入臨桂為白石江西北舊有桑江口廢司乾隆六年以所屬置龍勝通判東楊梅關義寧協左營分防汛駐城南有大嶺汛全州衝繁難府東北二百五十四里東黃華山西覆釜湘山禮山西北有七十二峰州西諸水多濫觴山麓湘水自興安入右受建安鄉水又東北四溪源大朝源水合為長亭江北流注之經治南灌江自灌陽北流注之羅水承萬鄉寨墟大會三水東南流注之又東北宜湘河合橫溪梓溪鍋頭玉升諸源水西北入湖南零陵西延水出州西東北合衆小水入湖南新寧西延鎮州同駐有山角山棗二巡司康熙二十五年改置全州營駐城黃沙西延並有汛驛一零陵灌陽難府東北三百六十四里明屬全州順治初改屬東北麒麟山東南三峰山西南賚子山灌江古觀水出縣西南仙人掌諸山合牛江至黃牛市鹽川承賚子諸山水東南流注之又東北右受澥江水經治東左受龍川水馬渡江承烏石江黑巖水東南流注之北入全州合於湘水東北石匱永安北昭義有關全州營分防汛駐城北巨巖堡汛西南崇順里巡司龍勝廳要府西北二百十七里明義寧縣地乾隆六年析義寧西北地置改龍勝理苗通判東南龍脊山西南大羅山貝子溪自湖南城步入西南流右合芙蓉溪經治北左受牛脛溪平水江又西北南平江合西南諸水北流注之太平溪亦自城步入合獨車溪西南流注之西入懷遠是為潯江有義寧協左營駐防副將駐右營分防西北廣南城北小江獨車東北龍甸芙蓉貝子西瓢里西北石村有汛西廣南巡司又有龍勝巡司本桑江改駐城中渡廳要府西南百二十里光緒三十年勦平四十八峒匪以桂林同知帶兵移駐峒內三十二年析永寧永福融柳城容地置四十八峒俱入轄境改桂林同知為中渡撫民同知仍屬府中渡江上源即富河江自永寧入東北受北來一水折東南經治東受西來一水東至永福曰雒容水入永福江有保安營駐防西平山巡司光緒三十二年以原駐中渡平樂司改置移駐峒內平山墟柳州府衝難右江道駐府隸焉明洪武元年為府領州二領縣十順治初因明舊為府雍正三年升賓州為直隸州以府屬之來賓武宣遷江上林四縣隸之十二年降賓州隸思恩府來賓還屬有柳慶鎮標左右營柳州城守營駐防提督舊駐府光緒十二年移駐龍州置柳慶鎮總兵官駐光緒末年廢東北距省治三百六十里廣百五十里袤五百里北極高二十四度二十一分京師偏西六度五十七分領州一縣七馬平衝繁難倚明府治因之城東北隅鵲山南仙奕石魚東南甑山東北龍壁山柳江即黔江省境西江北岸第一大受渠也自柳城入南與五都水合屈東南繞府治西南東三面東北經橫瀨山麓左界雒容復西南三江出縣西伏流至雞公山北復出東北流注之東流左受洛清江折南入象州為象江穿山水從之東新興西樟木有鎮東振柳東南白沙西北洛滿塘南穿山西南三都墟雞公山有汛穿山三都二巡司驛二雷塘穿山雒容衝難府東北六十里光緒三十二年劃長盛坳以北地屬中渡廳西橫瀨山西北八角嶺西南獨靜山南有柳江緣界東流入象州洛清江自永福流入縣東北西南流左受山道江經治南屈曲東南流注柳江柳慶鎮左營分防汛駐城西洛垢墟西南高嶺南豐軌鄉有汛東南有江口鎮巡司因明舊置羅城難府西北百四十里東北覆鐘北青陵磨盤山東大小蒙山西九萬山武陽江舊名歸順水有二源一出西北平西里一出東北高懸里合於寺門墟東南入融江大仁江一曰通道江源出西北大仁岡東流經三防司北東入融縣曰背江融懷營分防汛駐城北通道汛通道舊有鎮當萬山中多瘴癘明置巡司乾隆五十一年改為三防塘主簿又武陽鎮巡司因明舊置柳城簡府北七十里南烏鸞西南青鳳東伏虎山北融江自融縣流入縣北曰柳江東南流沙鋪水出融縣思管鎮西南流注之洛澰河出中渡黃泥村西流注之經治西會龍江南入馬平柳慶鎮右營分防汛駐城東北山嘴汛西北古寨鎮二巡司因明舊置驛三馬頭東江羅江懷遠衝難府北三百十里北白雲龍頂九曲東北林溪西北朝萬山西溶江上源曰黔江自貴州永從入縣西北曰福祿江東流合蔡江大年河南江又東左受腮江孟團江折南受潯江經治北歧為二繞至治南復合入融縣潯江即貝子溪下流也自龍勝入西南流左受斗江右受石眼江西南注福祿江融懷營駐城西北石牌塘沈口有汛東北潯江西北萬石有鎮梅寨巡司古宜甲主簿驛一在城來賓衝難府南百八十五里明屬府雍正三年改屬直隸賓州十二年還屬北龍鎮山瑞象東北鵝頭東南金峰山城南大江即紅水江一曰都泥江西江幹流也自遷江入東北流左受北三江至城南白馬溪出白牛峒北流注之又東北右受觀音山水左受定清水復折東南與象江會曰潭江入武宣東蓬萊鎮賓州營分防汛駐城東南平安汛有界牌巡司因明舊置驛一在城融衝難府西北二百五十里西南真仙巖一曰老君洞西北攬口山東北老鴉山福祿江自懷遠入左受寶江曰融江西南流浪溪江自永寧來合南江西流注之又西南背江上承三源其一即羅城通道江也合於三江門東南流注之經治東西南流左受清流江右受高橋江合羅城之武陽江南入柳城南清流鎮融懷營分防汛駐城東南思管鎮東北長安鎮二巡司因明舊置象州衝府東南百五十里西象山又西西山南獨傲東雷山東北聖塘山北象江即柳江自馬平入州北運江上承仁義下里二江西流注之折西而南經治西又南古城江自武宣來西流注之南入武宣甕嶺城東南熱水江所出一曰十里江溉田其廣西北入象江柳慶鎮左營分防汛駐城東北大樂汛龍門寨巡司因明舊置驛一象臺慶遠府繁難隸右江道慶遠協左營駐防副將駐明洪武三年復為府領州四縣五長官司三順治初因明舊雍正七年劃分東蘭土州同升東蘭土州為州設流官十年改河池州屬之荔波縣隸貴州都勻府光緒三十一年置安化廳東北距省治五百八十里廣四百七十里袤二百九十里北極高二十四度三十分京師偏西七度四十二分領廳一州二縣三土州二土縣一長官司三宜山繁難倚北北山一曰宜山下臨龍江南大號南山西羊角東小曹大曹西北龍江上源曰勞村江柳江西系也自河池入合東江東南流折北右受馬鬃河左受中洲小河又東南經府治北合洛蒙江思吾溪經永順副土司南受永順水東至柳城合於融江東大曹西懷遠東江有鎮有白土德勝龍門三巡司縣丞駐楞村水驛二大曹宜陽馬驛德勝天河難府北八十五里東東山北獨俊山西北高寨山東小江源