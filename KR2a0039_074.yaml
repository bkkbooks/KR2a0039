body:
  text: 清史稿卷七十四志四十九地理二十一雲南雲南禹貢梁州徼外地清初沿明制置承宣布政使司為雲南省設巡撫治雲南府並設雲貴總督兩省互駐康熙元年改雲南總督駐曲靖三年裁貴州總督併雲南駐貴陽二十二年移駐雲南雍正五年定雲貴總督兼轄廣西十二年停兼轄廣西乾隆元年設雲南總督十二年改雲貴總督光緒中裁巡撫領府二十直隸州一康熙五年降北勝直隸州為州隸大理八年降尋甸府為州隸曲靖三十七年升北勝州為永北府省永寧雍正三年改威遠土州為直隸廳四年割四川之東川府來隸五年以四川烏蒙鎮雄二府來隸六年降鎮雄為州屬烏蒙東川鎮雄元屬雲南明屬四川烏蒙元屬四川明初屬雲南後改屬四川七年置普洱八年置開化二府九年改烏蒙為昭通府乾隆三十一年永北降直隸廳三十五年廣西武定元江鎮沅四府降直隸州景東蒙化二府皆降直隸廳省姚安屬楚雄改鶴慶府為州屬麗江嘉慶二十四年升騰越州為直隸廳道光二年改分防同知又改鎮沅直隸州為直隸廳光緒十三年置鎮邊撫夷直隸廳二十四年升鎮雄州為直隸廳東至廣西泗城七百五十里南至交址界七百五十里北至四川會理四百里西至天馬關接緬甸界二千三百一十里西南英領緬甸光緒中曾紀澤謀與英勘界索八募復我太平江以南漢龍天馬虎踞鐵壁四關侵地議未決薛福成繼之力持前畫騰越西以伊洛瓦諦江源流為界江東野人山地概歸中國尚可由大盈江之新街入伊洛瓦諦經阿瓦至仰光海口行輪又索還故壤二千餘里及中東事起俄法德居間後贈法以紅江甌脫及孟俄地英藉口改薛約割科干復許以滇緬鐵路而邊事日棘片馬不守矣廣二千五百一十里袤一千一百五十里北極高二十九度三十分至二十一度四十分京師偏西十度二十九分至十九度十分宣統三年編戶一百五十四萬八千一十四口六百四十萬三千九百三共領府十四直隸廳六直隸州三廳十二州二十六縣四十一又土府一土州三土司十八驛路東達貴州普安東南達廣西百色西達緬甸八募西南達緬甸景東鐵路滇越電線東北通重慶西通八募東南通南寧雲南府衝繁疲難雲武分巡糧儲道治所總督巡撫布政提學提法三使鹽法巡警勸業各道駐東北距京師八千二百里廣三百七十里袤二百九十八里北極高二十五度六分京師偏西十三度三十七分領州四縣七昆明衝繁疲難倚城內五華山螺山山有潮音洞山側有翠湖東鸚鵡山西太華聚仙南萬德北商山東北龍泉山西南碧雞山盤龍江自嵩明入西南流徑城東合銀稜河至縣南匯為滇池滇池一名昆明池長百二十餘里縣東諸水入焉下流折入昆陽州曰海口即螳螂川上遊金稜河自城東北松華壩分盤龍口水入滇池寶象河自嵩明入西南流徑城南亦入滇池西碧雞關高嶢關東金馬關同知一駐南關驛二板橋滇陽汛二昆明板橋富民簡府西北七十里東天馬山西臥雲玉屏南靈芝北法華山螳螂川自安寧入納城西北農納水入武定州祿勸為普渡河大營河出昆明西北山西流入境洞溪水來會西至城北入螳螂川清水河從之宜良衝繁府東百二十里北萬壽南雉山東客爭容山縣鎮山也西石燕東南駱駝山西南鳳凰山西大城江自河陽之楊宗海流入徑城西北折東南分二支同入大池江大池江即八達河為南盤江上流西北有湯池嵩明州衝難府東北百三十里城內黃龍山東馬頭西靈雲登花西北東葛勒山元梁王結寨地南鳳溪石華山龍巨河一曰龍濟溪自尋甸入南流匯為嘉利澤一名楊林海徑城東南納楊梅河對龍河諸水匯為澤周百餘里東南出河口折北流入尋甸為車洪河寬郎河邵甸河合九十九泉西南流會牧養河又西南入昆明為盤龍江即滇池上源也西南兔兒關驛一楊林晉寧州繁難府南九十里城內螺髻山東梅溪五龍西石美山與百花山相望南石壁東南玉案西南石魚山西有天女城滇池在州西北大堡河自新興來會又西北徑城西分數道流入滇池盤龍河源出五龍山分二派一西北流入大壩河一東北流分為二一入澄江撫仙湖一入昆池呈貢衝繁府南四十里明與歸化同隸晉寧康熙八年省歸化入焉北三台山東軍營南龍翔東南象兔羅藏山滇池在縣西南東撈魚河南淤泥河東南梁王河皆匯焉洛龍河源出城東白龍潭西流會黑龍潭貫城注滇池南衝河偕清水河從之南太平關臨澄孔道安寧州衝繁府西七十里康熙六年省三泊入昆陽雍正三年又改其地來隸城內太極白華西北蔥山東印山龍馬西羅青南天馬山螳螂川一名安寧河自昆陽入北流入富民鳴蟻河源出龍洞北流望洋河又北資利河同來會折東北至州東南入螳螂川有煎鹽水出岈峻山有大井石井河中大界連然等鹽井驛二祿表安寧羅次簡府西北百三十里西金鳳北百花南崛嵕山九戌山易江出焉東北有苴麼崱裒山綿亙縣西兩峰相望易江北流入祿豐金水河東北流納青龍山南北二溪水又折西北匯碧城河水東渠河水折西亦入祿豐名星宿江北煉象關祿豐簡府西北二百十里西三次和山舊名蒙答縛山北象頭馬頭山東姚陵山星宿江自羅次入納南河九渡河諸水南入易門易江亦自羅次入縣東境繞安寧復折入境東南入易門東老鴉關驛一祿豐昆陽州疲難府南百二十里東龍泉山西月山珊蒙果山南金龜山北望州東南御屏西北蔥蒙山滇池在城東北隅螳螂川自滇池分三支西北入安寧渠濫川徑城東南入滇池南鐵爐關易門簡府西南二百五十里城內龜山東屏山左右旗山鼓山西象山東南虎頭山星宿江自祿豐入南流納太和川水又南匯大小緑汁河入丁癸江南流易江亦自祿豐入南流匯上下渠江水廟兒山水自