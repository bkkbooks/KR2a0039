body:
  text: 清史稿卷七十五志五十地理二十二貴州貴州禹貢荊梁二州徼外之域清初沿明制設貴州布政使司為貴州省順治十六年設巡撫治貴陽並設雲貴總督分駐兩省康熙元年改貴州總督四年仍為雲貴總督駐貴州二十一年移駐雲南舊領府十康熙三年增置黔西平遠大定威寧四府二十二年大定平遠黔西降州隸威寧府雍正五年增置南籠府六年割四川遵義來屬七年復升大定降威寧乾隆四十一年升仁懷嘉慶二年升松桃均為直隸廳改南籠為興義府三年降平越府為直隸州十四年升普安為直隸州十六年改廳東至湖南晃州五百四十里西至雲南霑益五百五十里南至廣西南丹二百二十里北至四川綦江五百五十里東北距京師七千六百四十里廣一千九十里袤七百七十里北極高二十五度四分至二十八度三十三分京師偏西七度三十三分至十度五十五分宣統三年編戶一百七十七萬一千五百三十三口八百五十萬三千九百五十四共領府十二直隸廳三直隸州一廳十一州十三縣三十四土司五十三驛道一東出鎮雄關達湖南晃州一西逾關索嶺達雲南平彝一西北渡六廣河達四川永寧電線北通重慶畢節又分達威寧至雲南貴陽府衝繁難巡撫布政使提學使按察使糧儲道同駐光緒三十四年裁糧儲道設巡警道勸業道宣統元年改按察使為提法使順治初因明為軍民府領州三縣一康熙十一年增置龍里縣二十六年裁軍民字增置貴築修文二縣又改平越府之貴定來隸三十四年省新貴入貴築雍正四年置長寨廳光緒七年以羅斛州判地置廳移長寨同知駐降長寨為鎮併入定番廣一百五十里袤三百七十里北極高九度五十二分京師偏西九度五十二分領廳一州三縣四南青巖土千總一東虎墜司長官一雍正八年裁貴築衝繁難倚明貴州貴前二衛康熙二十六年改置與新貴同城三十四年省新貴入之城內翠屏山東銅鼓棲霞石門北貴山府以此名南斗巖板橋最高西北黔靈山又木閣山延袤百里亙修文境內通黔西南明河自廣順入合濟番河四方河阿江河折東龍洞河北流注之又北入開州雞公河自清鎮北流入境又北仍入清鎮貫城河出崆巃山合城北擇溪水入城中南流注南明河東南圖安關東北鴉關驛一皇華南白納司正副長官一中曹司土千總一西北養龍司長官一順治初承明屬府康熙間改屬縣順治十五年設中曹司正副長官一雍正七年裁又喇平司康熙二十三年裁貴定衝繁府東百十里順治初因明隸平越康熙二十六年改隸南文筆天馬松牌連珠山西金星銀盤北陽寶西華東北蔡苗山甕首河出縣西平伐土司東北錯入都勻復徑縣南加牙河自龍里來注之又北八字河注之北流與博奇河會折西北流至巴香汛合南明河十萬溪在縣北苗衆每恃險為亂東玉杵關谷滿關西馬桑關甕城關驛一新添有汛南新添司長官一又平伐大平伐小平伐司長官一西牌土舍一東丹平北把平二司均裁龍里衝繁府東五十里明龍里衛康熙十一年改置南龍駕西長衝北雲臺西南回龍山東門水出縣東南老羅水新安水西南分流徑城北合為博奇河東龍洞河西北來注之入貴定加牙河出谷者巖東流入甕首河東隴聳關西黎兒關驛一龍里北大谷龍土千總一小谷龍土把總一南羊腸土千總一又西北龍里司裁修文衝府北五十里明敷勇衛康熙二十六年改置城內屏山西寶峰北鳳凰將軍東西望山綿亙百餘里東南龍岡烏江自黔西入即黔江徑城西北合雞公河北流為六廣河入開州雞公河自清鎮入石洞水合孟沖水西注之又北注烏江東北底寨司正副長官一開州難府東百二十里東魯郎西南南望山陰陽山南明河自貴築入徑城東洗泥河東北注之又北流落旺河東北注之又東為清水江合烏江烏江自修文入為六廣河徑城西北納沙溪水養龍水徑城北洋水河橫水河合流注之東南會清水江緣遵義境入甕安可渡河出城東南伏流復出為落旺河東注清水江東北西司正副長官一裁定番州難府南百里定廣協副將駐東琴山南三寶筆架西旗山東南松岐西北屏風山濛江出即連江一曰牂牁江一曰都泥江出城西北山中徑廣順再入境崇水潮井水注之又西南入羅斛豐寧河自都勻入注巴盤江錯入羅斛合北盤江東流入廣西那地土州上馬橋河出西北廢上馬橋司東東北流入貴築注南明河南石門關克度關東北程番關大塘長寨州判二附郭程番司長官一東南大龍番小龍番司長官一南韋番羅番司長官一西南木瓜司正副長官一麻嚮司長官一東北盧番司長官一西牛路木官土舍一又東金石番司南方番盧山洪番臥龍番西大華西北上馬橋小程番七司裁廣順州難府西南百十里西真武東螺擁白雲南天台山南明河出城東北折東入貴築雞公河自普定入麻線河注之折北入安平尤愛河在城東從仁里東流注濟番河東白崖關翁桂關西文馬關北燕溪關長寨州判一有宗角長寨同筍三汛有金築司裁羅斛廳府西南四百二十里順治初因明隸廣西泗城土州尋改隸泗城府雍正三年割置永豐州設州判隸南籠府乾隆十四年改隸定番光緒七年置廳東南老人峯西南六合山濛江自定番入剋孟河自普定猛渡河自歸化合流注之又南流注北盤江北盤江合南盤江自貞豐東流入受濛江水入那地土州又巴盤江在城東北上流曰豐寧河自都勻入合藤茶河東南入廣西泗城扎佐巡司一有羅斛汛羅斛打拱土千戶一何往土外委一安順府衝繁難舊隸貴西道提督駐順治初沿明制為軍民府康熙二十六年裁軍民字東北距省治百八十里廣三百十里袤百六十里北極高三十六度十二分京師偏西二十度二十四分領廳二州二縣三西北西堡司副長官一