body:
  text: 清史稿卷七十七志五十二地理二十四內蒙古內蒙古古雍冀幽並營五州北境周獫狁山戎秦漢胸奴盡有其地漢末烏桓鮮卑薦居元魏蠕蠕及庫莫奚為大隋唐屬突厥後入回紇薛延陀遼金建都邑城郭同內地元故蒙古起西北有天下明阿裕實哩達喇遁歸朔漠復改號遺踵曼衍北陲多故清興蒙古科爾沁部首內附既滅察哈爾諸部踵降正其疆界悉遵約束有大征伐並帥師以從定鼎後祿爵世及歲時朝貢置理藩院統之部落二十有五旗五十有一並同內八旗乾隆間改歸化城土默特入山西仍有部落二十四旗四十九其貢道由山海關者科爾沁郭爾羅斯杜爾伯特札賚特四部旗十由喜峰口者阿嚕科爾沁札嚕特土默特喀喇沁喀爾喀左翼奈曼翁牛特敖漢八部旗十三由獨石口者阿巴噶左翼阿巴哈納爾左翼浩齊特烏珠穆沁巴林克什克騰六部旗九由張家口者阿巴噶右翼阿巴哈納爾右翼蘇尼特四子部落喀爾喀右翼茂明安六部旗七由殺虎口者歸化城土默特烏喇特鄂爾多斯三部旗十二是為內札薩克蒙古袤延萬餘里東界吉林黑龍江西界厄魯特南界盛京直隸山西陝西甘肅五省並以長城為限北外蒙古面積百四十八萬一千七百六十方里北極三十七度三十分至四十七度十五分經線京師偏東九度至偏西九度三十分科爾沁部旗六旗在喜峰口東北八百七十里西南距京師一千二百八十里秦漢遼東郡北境後漢為扶餘鮮卑地隋唐為契丹靺鞨地遼為上京東境東京北境金分屬上京北京及咸平路元開元路北境明置三衛自黃泥窪踰鐵嶺至開原曰福餘衛以元後烏梁海酋領為都指揮後自立國號曰科爾沁清初以接壤聯姻其後台吉奧巴為察哈爾所侵率先來降太祖賜以土謝圖汗之號後封親王四郡王三貝勒三貝子一鎮國公一輔國公五掌旗世襲所部廣八百七十里袤二千一百里東界札賚特西界札魯特南界盛京邊牆北界索倫貢道由山海關科爾沁右翼中旗札薩克駐巴音和碩南曰塔克禪在喜峰口東北一千二百里西南距京師一千六百十里本靺鞨地遼為黃龍府北境金屬上京路元廢牧地當哈古勒河阿魯坤都倫河合流之北岸東界那哈太山南界察罕莽哈西界塔勒布拉克北界巴音和碩廣一百五十里袤四百五十里北極高四十六度十七分京師偏東四度三十分其山東曰烏蘭峰那哈太山南阿達金察漢陀羅海坡漢惠圖坡西鮮卑山土名蒙格北溫山蒙名哈祿納東南巴朗濟喇坡西南烏爾圖岡其水西北郭特爾河上承哈爾古勒河自札魯特東南流入界徑科爾沁左翼中旗南阿魯坤都倫河鄂布爾坤都倫河並自札魯特東來合流注之又東南徑右翼中旗南左翼中旗北屈曲流至翁袞山東南匯為察罕泊北阿爾達河源出溫山徑榆木山東南流入右翼前旗海拉蘇台河一名榆河源出興安山徑火山東南流皆與貴勒爾河會鶴午河源出伊克呼巴海山徑磨爾託山東南流入右翼前旗入榆河科爾沁左翼中旗札薩克駐西遼河之北伊克唐噶里克坡在喜峰口東北一千六十五里西南距京師一千四百七十五里本契丹地遼為黃龍府北境金屬上京路元廢牧地當吉林赫爾蘇邊門外昌圖廳界跨東西二遼河東界鄂拉達干南界小陀果勒濟山西界唐海北界博羅霍吉爾山廣一百八十里袤五百五十里北極高四十三度四十分京師偏東六度四十分其山東南曰伊克圖虎爾几山一名牛頭山巴漢圖虎爾几山巴漢哈爾巴爾山西北巴顏朔龍山吉爾巴爾山一名水精山巴漢查克朵爾山一名小房山北五峰山蒙名他奔拖羅海伊克查克朵爾山一名大房山東北大石山蒙名葛倫齊老太保山蒙名圖斯哈爾圖西南吉里岡東南遼河自永吉州入徑額爾金山西北流入左翼後旗又西南會潢河入邊潢河自札魯特左翼入徑噶爾岡東南來注之卓索河源出邊內西北流入左翼後旗會尹几哈台河入遼河西北和爾河一名合河自札魯特左翼入東徑右翼中旗前旗後旗地入因沁插漢池阿祿崑都倫河自札魯特左翼入徑葛勒圖溫都爾山東流會額伯爾崑都倫河入右翼中旗西北經魁屯山東南流會於合河西北中天河蒙名都穆達圖騰葛里東天河蒙名準騰葛里源均出吉爾巴爾山東南流會几伯圖泉入佟噶喇克插漢池几伯圖泉他拉泉從之科爾沁左翼後旗札薩克駐雙和爾山在喜峰口東北一千四十里西南距京師一千四百五十里本契丹地遼置鳳州金廢牧地當法庫邊門北東西二遼河於此合流東界碩勒和碩南界柳條邊西界伊柯鄂爾多北界格爾莽噶廣二百里袤一百五十里北極高四十二度京師偏東六度二十分其山東得石山西界曰巴漢巴虎山東北得石拖羅海山東奚王嶺土名蒙古爾拖羅海東南羊城濼蒙名尹兀哈台源出邊內流入境北流會卓索河入邊河科爾沁右翼前旗札薩克駐錫喇布爾哈蘇在喜峰口東北一千三百五十里西南距京師一千七百六十里本靺鞨地金置肇州隸會寧府海陵改屬濟州承安三年升鎮元遼王乃顏分地牧地當索嶽爾濟山南洮爾河歸喇里河於是合流注嫩江東界嶽索圖濟喇南界達什伊哈克西界那哈太山北界索嶽爾濟山廣一百二十里袤三百八十里北極高四十六度京師偏東五度三十分其山西北曰喀喇阿几爾漢山魁勒庫山北神山火山東北羊山蒙名衣馬圖駱駝山蒙名特門南插漢碧老岱坡西洮兒河源出西北興安山東南流合貴勒爾河又東北折徑右翼後旗南又東徑札賚特南匯為納藍撒藍池入嫩江北貴勒爾河自右翼鶴五河東北流會榆河為貴勒爾河徑魁勒庫山東南流會阿爾達爾入洮兒河駱駝河蒙名特門河源出葛爾濟隆山東流會戳兒河東入嫩江科爾沁右翼後旗札薩克駐額木圖坡在喜峰口東北一千四百五十里西南距京師一千八百六十里本靺鞨地遼置衍州安廣軍金州廢元為乃顏分地牧地跨洮兒河即陀喇河東界查巴爾太山南界拜格台陀博西界博達爾罕山北界慶哈山廣一百二十里袤三百七十里北極高四十六度京師偏東五度三十分其山東北曰西伯圖山納几山北朱爾噶岱山卓索台山西南鼐滿烏里堵坡東南因沁插漢池科爾沁左翼前旗札薩克駐伊克嶽里泊在喜峰口東北八百七十里西南距京師一千二百八十里本契丹地遼置長青州金降為縣隸泰州元廢牧地當法庫邊門外養息牧牧場東東界霍雅斯南界柳條邊西界伊拉木圖北界阿木塔克廣一百里袤一百二十里北極高四十三度京師偏東六度四十分東南龍門山蒙名阿會圖東南布敦山寬山朔龍峰南鴨子河蒙名沖古爾其地有二泉並名沖古爾西南流入養息牧河東南有巴漢嶽里泊扎賚特部一旗附科爾沁右翼扎薩克駐圖卜新察汗坡在喜峰口東北一千六百里西南距京師二千十里本契丹地遼長春州金泰州北境元為遼王分地明為科爾沁所據後分與其弟阿敏是為札賚特天命中台吉蒙袞來降後封貝勒世襲掌旗牧地在齊齊哈爾城西東界嫩江南界鍾奇西界烏蘭陀博北界鄂魯起達巴哈山廣六十里袤四百里北極高四十六度三十分京師偏東七度四十五分貢道由山海關東北阿敏山蓋以所部之祖名其山也西北赤房山蒙名烏蘭格爾雕窠山蒙名嶽樂北朵雲山塞肯山西南阿揚噶爾坡東嫩江自黑龍江入又南入郭爾羅斯前旗北綽爾河源出西北興安山東南流至旗西分數歧又東南折入嫩江西北他新河自右翼後旗入徑托額貴山東南流會綽爾河西南洮兒河自右翼後旗入東南流匯為日月池同入嫩江以上統盟於哲里木盟地在科爾沁右翼中旗境內杜爾伯特部一旗附科爾沁右翼札薩克駐多克多爾坡在喜峰口東北一千六百四十里西南距京師二千五十里本契丹地遼長春州金泰州北境元遼王分地明為科爾沁所據後分與弟愛納噶是為杜爾伯特天聰中台吉阿都齊來降後封其子賽冷貝子世襲掌旗牧地當嫩江東岸齊齊哈爾城東南東界哈他伯齊坡南界阿蘇台札噶西界嫩江北界布台格爾池烏柯爾鄂克達廣一百七十里袤二百四十里北極高四十七度十五分京師偏東七度十分貢道由山海關東富峪蒙名巴雅鼐東南哈他伯齊坡西南和几蒙克坡東北阿拉克阿几爾漢坡北疊翠巖蒙名磨朵圖西嫩江自黑龍江境南流入西與札賚特分界又南入郭爾羅斯後旗東烏葉爾河源出黑龍江境西南入徑黨納坡又南入郭爾羅斯後旗郭爾羅斯部二旗附科爾沁左翼在喜峰口東北本契丹地遼置泰州昌德軍屬上京金大定中廢移州於長春縣以故地為金安縣隸之元為遼王分地明為科爾沁所據後分與其弟烏巴什是為郭爾羅斯天聰七年台吉古木及布木巴來降後封古木弟桑阿爾賽輔國公世襲掌前旗布木巴鎮國公世襲掌後旗其所部東界盛京永吉州南界盛京邊牆西及北界科爾沁貢道由山海關郭爾羅斯前旗札薩克駐固爾班察漢在喜峰口東北一千四百八十七里西南距京師一千八百九十七里牧地當嫩江與松花江合流之西岸在吉林伊通邊門外長春廳之西東界烏拉河南界柳條邊西界博果圖北界拜格台和碩廣二百三十里袤四百里北極高四十五度三十分京師偏東八度十分其山西南曰巴顏朱爾克山一名牛心山東南衣馬圖峰北他奔拖羅海坡東北巴吉岱坡西巴顏布他岡東混同江土名吉林江自奉天永吉州西北入東北流會嫩江又東折入後旗地東北流會黑龍江東入海南一禿河源出奉天永吉州境北流出邊徑龍安城又東北流會伊爾們河入混同江東南伊爾們河源出永吉州境北流出邊受南來之烏蘇土烏海河會一禿河入混同江郭爾羅斯後旗札薩克駐榛子嶺在喜峰口東北一千五百七十里西南至京師一千九百八十里牧地當混同江北岸嫩江東岸東界阿勒克巴魯南界嫩江西界嫩江北界烏魯勒圖廣二百二十里袤二百六十里北極高四十六度十分京師偏東八度二十分其山東曰常峽坡東南阿祿布克色坡阿拉克碧老坡西北拜拉喇齊坡東北布拉克台坡西烏葉爾河自杜爾伯特入分流為西訥河西南流同入嫩江嫩江分流為牛川蒙名烏庫爾東南流會烏葉爾河喀喇沁部二旗新增一旗曰中旗在喜峰口東北秦漢遼西郡境唐饒樂都督府後入契丹遼置中京大定府金北京元大寧路明洪武中封子權寧王永樂初盡以大寧地賜顏泰寧福餘三衛𩽆顏時陰附韃靼為邊患後為察哈爾所滅以其地豫其塔布囊是為喀喇沁天聰七年部長蘇布地率昆弟塞冷等來降後封蘇布地之子古魯思起布為貝子主右翼塞冷為鎮國公主左翼並世襲康熙中增設一旗授喀寧阿一等塔布囊加公銜襲封所部東界土默特及敖漢西界察哈爾正藍旗牧場南界盛京邊牆外北界翁牛特廣五百里袤四百五十里貢道由喜峰口喀喇沁右翼札薩克駐錫伯河北在喜峰口北三百九十里西南距京師八百里牧地在圍場東跨老哈河東界鄂博噶圖南界霍落蘇泰西界察罕鄂博北界霍爾哈嶺廣三百里袤二百八十里北極高四十一度五十分京師偏東二度四十分其山東曰和爾坤都倫喀喇山烏爾圖納蘇圖波羅山伊瑪岱山七金山蒙名和爾博勒津大紅螺山蒙名巴顏烏蘭東南大斧山蒙名喀喇和邵柞山蒙名巴圖插漢大青山蒙名巴顏喀喇南和爾和克阿惠山常吉爾岱山拉克拉哈爾山西南崑都倫喀喇山西崑都爾圖山北鄂通台和羅圖山綽和羅漠林嶺南老河蒙名老哈源出明安山東北流會諸小水徑敖漢北翁牛特左翼南又經奈曼喀爾喀二部納奇札帶河北流與潢河會南