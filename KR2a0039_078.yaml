body:
  text: 清史稿卷七十八志五十三地理二十五外蒙古外蒙古喀爾喀古北狄地唐虞山戎夏獯鬻周玁狁秦漢曰胸奴漢初冒頓並有漠南旋復北徙後漢仍為北胸奴地元魏曰蠕蠕後入突厥唐初入回紇貞觀四年來朝以其地為瀚海燕然金微幽陵龜林盧山六都督府又置皋蘭高闕雞田榆溪雞鹿蹛林置顏等七州皆隸燕然都護府其後並有九姓諸部盡得胸奴故地五代至宋回紇漸衰與室韋嫗厥律諸部散居其地羈屬於遼金大安初蒙古始盛元太宗七年建都和林初立元昌路後改轉運和林使司前後五朝都焉世祖遷都大興於和林置都元帥府大德十一年立和林等處行中書省統和林總管府皇慶元年改和林路為和寧路順帝太子阿裕錫哩達賴汗依王保保於此明兵破之順帝孫特古斯特穆爾汗遁於土喇河七傳至本雅失里又為明所敗後諸部共立託克託布哈之子號小王子又數傳徙幕東方其留漠北部落曰喀爾喀清崇德三年遣使朝貢康熙二十八年厄魯特噶爾丹興兵攻破喀爾喀七旗舉族款塞內附安置喀倫邊內噶爾丹遂並其地三十五年聖祖親征噶爾丹竄死朔漠平喀爾喀諸部復還舊牧為部三一曰土謝圖汗一曰車臣汗一曰札薩克圖汗又善巴自為一部曰賽音諾顏共部四為旗八十有六東至黑龍江呼倫貝爾城南至瀚海西至阿爾台山北至俄羅斯廣五千里袤三千里北極高四十二度至五十一度三十分京師偏東三度至偏西二十六度人約七十萬口土謝圖汗部駐土拉河直大同邊外漠北至京師二千八百餘里南界瀚海西界翁金河北界楚庫河東南界蘇尼特四子部落諸部西北界唐努烏梁海所部佐領積三十七旗以分設賽音諾顏部析二十一旗隸之後增四旗凡二十旗乾隆四十六年詔世襲北極高四十五度三十三分京師偏西十一度二十四分土謝圖汗本旗其汗為噶爾丹所破來降康熙三十年許仍舊號世襲佐領一牧地在杭愛山東喀里雅爾山南跨鄂爾坤喀魯哈二河西杭愛山在鄂爾坤河源之北其山最高大山脈自西北阿爾泰山來東趨踰鄂爾坤杜喇諸水為大興安肯特諸山又自山西庫庫嶺北折環繞色楞格河上流諸水發源之處杭愛譯言橐駝也山形似之當即古之燕然山有鄂爾坤河自附牧賽音諾顏之額魯特旗界東北經章鄂山東麓又經西爾哈阿濟爾罕山西麓又東北出山折而西北流有濟爾瑪台河自南來會喀魯哈河源出翁金河北土喇鄂爾坤二河間平地西北流轉東北入土喇河鄂爾坤河又東北經吉拉哈吉圖布拉克地南有西拉索博太河北自布龍山南支阜合三水南流來注之又東經喀里雅拉山西南麓中有大洲又北流有伊奔河自西北布龍山東南支阜合三水來注之又東北循山會哈拉河衣魯河又正北流至布龍山東北支阜入色楞格河右翼左旗土謝圖汗之從子康熙三十年授札薩克一等台吉傳至乾隆二十一年其孫纍以功晉和碩親王世襲佐領七有半牧地跨色楞格河土喇河之合流南至達什爾嶺北至罕台山色楞格河自賽音諾顏部東北入有厄赫河自西北大山東南流合翁佳河諸水來會水勢始盛稍東有市呼圖河自南合三水來注之又東北受北來一水又東北有一河自西南沙昆沙拉之北東北流合東南一水北來注之又東受西南一小水又東徑布龍山北麓山脈西南自巴顏濟魯克山賽堪山綿亙而東北為厄魯墨得依山又東為西拉克山布昆沙拉山又東北為此山蜿蜒至兩河合處為色楞格鄂爾坤界色楞格河自山北麓又東北鄂爾坤河自南合土喇諸河東北流來會土喇河東南來納喀魯哈河東北折而北流又合鄂爾坤河當西十度北極出地四十九度處東有布噶勒台河中右旗土謝圖汗之弟康熙二十五年授札薩克三十年封多羅貝勒雍正元年晉其子郡王世襲佐領三牧地當土喇河曲處東北達什隆山土喇河循都蘭喀拉折而西北流曲曲四百餘里有喀魯哈河自西南來會左翼中旗土謝圖汗裔康熙三十年封多羅郡王兼札薩克世襲佐領十四牧地當阿爾泰軍臺所經北緯四十四度二十分西經七度五十分東北有札爾噶山中旗土謝圖汗裔康熙三十年封多羅郡王乾隆二十二年改為札薩克固山貝子世襲佐領四牧地在肯特山西南當土喇河源西北哈麻爾嶺西南達什隆山東北肯特山山高大為漠北羣山東至大海之祖山西阜曰即龍嶺又西曰特勒爾濟嶺凡諸嶺以南水皆流入克魯倫河以北水皆流入敖嫩河敖嫩河源在克魯倫河源西北小肯特山土人呼為阿即格肯特山山南為喀爾喀地山北為俄邊嶺北麓水即楚庫河源北流入色楞格河者嶺南幹山西南麓水即土喇河源西南流折而西北會鄂爾坤河入色楞格河者此嶺為漠北一大分水嶺也自小肯特山東北行為大興安山包絡黑龍江諸水之北而東入海一支折而南分為二幹一東南為大肯特山起頂又東南為必爾喀嶺諸山為北黑龍南喀魯倫諸水之界綿亙千餘里至會合處一西南為圖拉源山又南為噶拉泰嶺折而西南為興安嶺為東克魯倫西土喇諸水又西南而西北至土喇會鄂爾坤河處自此而西北羣山皆以阿爾泰山為祖若論漠北大分水之處一東至東海一北至北海則莫高肯特山矣汗山在興安嶺北土喇河南岸元祕史謂之不兒罕山天山在圖拉河之西約出長城三千里山不甚高藩名汗河嶺汗山之北為庫倫即苦另山山甚峻土喇河即圖拉河發源敖嫩河源之西南數十里許特勒爾濟嶺之西曰土喇色欽色欽蒙古語河源也西南流與北源喀拉圖魯河會西南流哈溪河自西北合東來喀拉鄂模水西北來空烏魯河東南流來會又南噶爾泰河自東南大山西流來會又西南徑啓拉薩山西又西南阿拉克他河自北來注之又西特勒爾濟河合東占河二水東南流會奎羅河左翼後旗土謝圖汗裔康熙三十二年授札薩克一等台吉乾隆十九年封輔國公尋晉貝子貝勒郡王五十七年降鎮國公世襲佐領四牧地當阿爾泰軍臺所經翁金河至是瀦於胡爾哈鄂倫諾爾諾爾直漠南河套八百里許舊作呼拉喀五郎鄂模周二十餘里諾爾東北有哈喇哈達山徹徹山上凱山皆沙海中孤嶼也翁金水源西十三度三分極四十六度九分諾爾西九度四分極四十五度二分自西北而東南行大漠中近千里也中右末旗土謝圖汗裔康熙五十八年授札薩克一等台吉乾隆二十四年封輔國公世襲佐領一牧地跨土喇河西北達什隆山土喇河自中旗汗山北麓會色勒弼河又西至色勒弼嶺南曲曲西南至杜蘭喀喇山之北山南即大漠西十度極四十七度五分南經寧夏九度經套北陰山六度河隨山折西北流入中右旗境南岸即度蘭支阜綿亙北岸即色勒弼嶺支阜又北行為查木勒山左翼左中末旗土謝圖汗裔康熙五十年封札薩克輔國公世襲佐領一牧地當喀魯哈河源喀魯哈河流出平地在翁金河之北二百里鄂爾坤河北折之東四百里西十二度極四十六度七分有二泉西北流而合又西北有一水西南自科洛爾昆山東北流來會山在額爾德尼昭之東南又北流徑昆庫勒山西折東北經科克內山西又北流折而東北曲曲數百里與土喇河會水口東即查木勒山西麓也水源流長七百餘里右翼右旗土謝圖汗裔康熙三十年授札薩克一等台吉乾隆二十年封輔國公世襲佐領一牧地東至錫伯格圖南至諾昆陀羅海西至烏遜珠爾東山北至齊克達噶圖嶺左翼前旗土謝圖汗裔康熙三十年授札薩克一等台吉乾隆三年封輔國公世襲佐領三牧地跨喀魯哈河西北烏噶勒札山右翼右末旗土謝圖汗裔雍正九年以功授札薩克一等台吉十年封輔國公世襲佐領一牧地當哈拉河源東恰克圖山南烏里雅呼嶺北諾不圖布拉克山東南達喇勒濟山西南哈瑪爾嶺哈拉河源出土喇河北與汗山相對之色勒弼嶺北有那林河布勒哈太二河阿達海河松納拉河均來會又北通勒河東北至阿即格肯特山西麓合三源西南流又折西北有一河自東北合數水來注之又西徑陀羅什山北哈達圖爾山南納博羅河查克都勒河西北折徑都拉遜那拉酥查克丹地之東大松林也又北徑喀里雅喇山東麓又北入鄂爾坤河源委六百餘里中左旗土謝圖汗裔初授一等台吉乾隆三年晉輔國公貝子品級二十三年授札薩克後遂以功品級一等台吉世襲佐領一牧地東至察奇爾哈喇南至善達勒西至阿爾噶稜北至阿魯哈朗左翼右末旗土謝圖汗裔康熙三十六年授札薩克一等台吉世襲佐領五牧地當阿爾泰軍臺之東達庫倫之驛於是分道左翼末旗土謝圖汗裔康熙三十年授札薩克一等台吉世襲佐領一牧地當阿爾泰軍臺之東左翼中左旗土謝圖汗裔雍正十年授札薩克一等台吉世襲罔替佐領一牧地當阿爾泰軍臺之西中次旗土謝圖汗裔康熙五十八年授札薩克一等台吉世襲佐領一牧地當左翼中旗之東右翼右末次旗土謝圖汗裔康熙三十五年授札薩克一等台吉世襲佐領一有半牧地跨鄂爾坤河色楞格河東薩爾金河西塔里雅那台河北札勒圖爾河東北桑喀勒圖河東南札克圖勒河右翼左後旗土謝圖汗裔雍正八年授札薩克一等台吉世襲佐領一牧地當土喇河喀魯哈河之合流南達什隆山西珠格楞嶺中左翼末旗土謝圖汗裔康熙三十三年授車稜札布一等台吉兼札薩克世襲佐領四牧地當鄂爾坤河色楞格河之合流鄂爾坤河自東南向西流入色楞格河色楞格河自西南來環繞山北東北流過俄羅斯之楚庫柏興又北流入柏海兒湖東烏雅勒噶河西薩爾金河北察罕烏蘇河東北博拉河右翼左末旗土謝圖汗裔康熙三十年封札薩克輔國公後降一等台吉兼札薩克世襲佐領一牧地當哈拉河伊遜河東南哈台山北二百里有哈拉河南流受南來揆河折西北徑右翼右末旗東北左得博羅河查克杜兒河又北注鄂爾坤河土喇河北岸諸山有色爾畢谷口三處及松吉納山嶺三處皆自各山發源流入土喇鄂爾坤又東北衣魯河自東南合三水來注之又正北流至布龍山支阜與色楞格河會東北敏吉河西北札克都勒河以上統盟於汗阿林滿語山在庫倫南賽音諾顏部直甘肅涼州邊外西套之北至京師三千餘里格埒森札之孫圖蒙肯護持黃教唐古特達賴喇嘛賢之授賽音諾顏號康熙中其孫善巴來歸旋以善巴從弟策凌從征有功始自為一部乾隆中以善巴曾孫諾爾布札布襲賽音諾顏號世襲與三汗同所部東界博羅布爾哈蘇多歡南界齊齊爾里克西界庫勒薩雅孛郭圖額金嶺北界齊老圖河轄旗二十二北極高四十五度四十四分京師偏西十二度五十分賽音諾顏本旗初信順額爾克岱青諾顏善巴率屬來歸康熙三十五年封和碩親王乾隆三十一年許仍其賽音諾顏舊號世襲佐領四有半牧地當鄂爾坤河源在北緯四十七度西經十四度五十分處西北庫爾布拉克灰圖山鄂爾坤河出旗境二水合東流北納一水入土謝圖汗部西塔楚河源出都蘭喀喇山東南大幹南麓二水南流而合會東北來三水折流徑塔奇驛西南至阿勒察圖山中左末旗善巴再從弟策凌康熙六十年授札薩克雍正元年封多羅郡王九年晉和碩親王世襲佐領四牧地當塔米爾哈綏齊老圖三河源北伊克沙巴爾山東北綽嚨山西北鞥克嶺西南庫克嶺塔米爾河亦曰他米勒有南北兩源南源出杭愛山北麓在鄂爾坤河之西者曰阿索郭特河西北流合三澗而東北流有西北來二水皆會又東北始曰塔米爾河又北而會阿索郭特河皆杭愛以北水也又東北會東南來一水其東即蘇巴勒干山又東北受朝木多河齊齊爾里克河並