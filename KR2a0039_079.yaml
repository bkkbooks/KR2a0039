body:
  text: 清史稿卷七十九志五十四地理二十六青海青海禹貢西戎之域袤延二千餘里至京師五千七十里東及北界甘肅西界西藏南界四川三代屬西羌漢為張掖武威金城隴西四郡之西塞外蜀郡之北徼外屬先零燒當等諸羌地王莽時置西海郡歷後漢魏晉皆諸羌所居東晉後又為吐谷渾所據隋平吐谷渾置西海河源等郡隋末吐谷渾復據之唐龍朔三年吐蕃滅吐谷渾盡有其地宋亦為吐蕃地元為貴德州及吐蕃朵甘思等處屬吐蕃等處宣慰司明為西番地正德四年始為蒙古部酋所據清初有元太祖弟哈布圖哈薩爾之裔號顧實汗自西北侵有其地遣使通貢自分部衆為左右二境左境東自西寧邊外棟科爾廟西至嘉峪關邊外洮賚河南自西寧邊外博羅充克克河北岸北至涼州邊外西喇塔拉右境東自棟科爾廟西至噶斯池南自松潘邊外漳臘嶺北至博羅充克克河南岸康熙三十七年悉衆內附雍正元年台吉札什巴圖爾子羅卜藏丹津誘衆犯邊大軍討平之越歲而定三年一貢分三班九年一周置互市於西寧日月山開拓新邊增設安西鎮於布隆吉爾闢地千餘里三年編其部落為四旗二十九後又增置土司四十設西寧辦事大臣以統轄之廣千餘里袤千餘里面積二百四十萬方里人十五萬口北極高三十一度四十五分至三十八度三十分京師偏西十四度三十分至十七度東阿木尼末倫山東南阿木尼塞爾泰山西南阿木尼那淩通布山西北阿木尼巴延尊崔山阿木尼洞舒山阿木尼天沁察罕山其峯甚峻無雪而白故名阿木尼兀善通布山西阿木尼巴爾布安山其峯高險色黑故名西北二百餘里有阿木尼厄枯山東北近甘涼二州之邊有阿木尼岡噶爾山又名龍壽山涼州邊外有阿木尼巴延哈拉山又名大荒山又阿木尼扣肯古爾板山在黃河東岸哈爾吉山東山有二峯獨高積雪不消其一為阿木尼麻禪母孫山即大雪山也番語稱祖為阿木尼西海十三山番俗皆分祭之而以大雪山為最凡環繞青海之濱者亦有十三山土人皆名烏爾圖謂之十三角云又南曠野中有漢陀羅海山西索克圖山西南索克圖山地多瘴氣西南烏克陀羅海山高峯壁立黃河西岸青海西南有固爾班伊瑪圖山三山相接皆名伊瑪圖繞獨羅池有蘇羅巴顏喀喇山在伊瑪圖山東北石崖色黑多冷瘴故名南黃河北岸有巴爾陀羅海岡近青海南岸有巴漢哈圖嶺巴漢哈圖嶺東伊克哈圖嶺其西南察察嶺察察嶺東納布楚爾嶺南少西蘇羅嶺即蘇羅巴顏喀喇山之東支黃河西岸蘇羅嶺東登諾爾台嶺拖孫池東南忒伯呼圖嶺有海努克嶺東北布呼圖嶺西烏蘇圖搜吉嶺青海西南殷德爾碧柳圖嶺相近有好來嶺青海西南二百餘里烏蘭布拉克嶺西寧邊外納拉薩拉嶺其西齊布秦爾嶺相近有哈拉嶺即拉喇山也洮州衛邊外有達爾濟嶺即託禮嶺也洮河發源西傾山之脊嶺最高大其上平坦草木茂盛東南有和爾河源出納拉薩拉嶺西北流入青海北少東哈爾濟河源出青海北岸哈爾濟山東南流入青海北伊克烏蘭和碩河源出巴顏山南流入青海其西巴漢烏蘭和碩河南流入青海東南巴顏池周四十餘里西南多羅池周一百五十餘里洮賚河亦作滔來陶賴討來在肅州南下流合張掖河即古呼蠶水也漢書地理志祿福縣呼蠶水出南羌中東北至會水入羌谷寰宇記呼蠶水一名潛水俗謂之祿福河西南自吐谷渾界流入一統志按今討來河發源州西南五百餘里番界中有三派最西曰討來河其西又有輝土巴爾呼河北流與討來河合又東北百餘里南有巴哈額濟納二河分流而合又北與討來河會為一又東北流入邊繞州南至州東北合西來之水又東北出邊過金塔寺稍折而北又轉東與張掖河合又北入居延海布隆吉爾河在今安西州北即南籍端水也一統志按輿圖及新志今有蘇賴河亦名布隆吉爾河發源靖逆衛南山曰昌馬河北流轉而西徑舊柳溝衛北會十道溝水為蘇賴河又西徑安西衛北又西徑沙州衛西北黨河自南來注之又西北流瀦為合拉池其流長七百餘里池方數十里即古南籍端水也今三衛屯田俱藉此水灌溉塞爾騰海在舊沙州衛西南水出雪山之陰西北流瀦為澤為青海要道西爾噶拉金河即黨河在沙州衛西古氐置水也漢書地理志龍勒縣有氐置水出南羌中東北入澤溉民田一統志按輿圖今有黨河在西會南來一水又折北流繞沙州舊城之東新城之西入蘇賴河溉田甚廣當即古氐置水穆魯烏蘇河又作胡胡烏蘇河在黃河西大雪山北源出索諾木達什嶺北流四十餘里折東北合南來之密喇河北來之薩爾哈卜齊海阿爾昂諸水東流入黃河噶斯池在黃河上流鄂靈海東北固爾班蒙滾陀羅海山東南有三池一名鄂博圖噶斯池周二十五里一名多木達噶斯池周十五里一名察罕噶斯池周十餘里俱在黃河鄂博池之東番名固爾班噶斯池青海和碩特部二十一旗元太祖弟哈布圖哈薩爾七傳至阿克薩噶勒泰生子二長阿魯克特魯爾今內札薩克科爾沁杜爾伯特郭爾羅斯札賚特阿魯科爾沁四子部落茂明安烏喇特八部之祖也次烏魯克特穆爾十傳至哈尼諾顏洪果爾生六子其第四子圖魯拜琥號顧實汗後裔繁衍遊牧青海者十九旗又有遊牧西套之阿拉善旗遊牧察哈爾之和碩特旗顧實汗長兄哈納克土謝圖其裔為青海和碩特部所屬之西右翼中旗顧實汗季弟色樓哈坦巴圖爾其裔為青海和碩特部所屬之西右翼後旗此二旗合顧實汗裔為二十一旗顧實汗第三兄昆都倫烏巴什其裔為遊牧珠勒都斯之中路和碩特旗遊牧科布多之新和碩特旗青海和碩特部在西寧邊外北極高三十四度三十三分京師偏西十五度十四分西前旗顧實汗之子康熙四十二年封多羅郡王雍正三年授札薩克世襲佐領八牧地在布喀河南岸東至烏圖起爾沙陀羅海南至西拉庫圖爾果庫圖爾西至察罕烏蘇呼魯恭納北至布喀河濱納令布楞班禪商上堪布喇嘛牧場在旗境額勒池水南前頭旗顧實汗之孫康熙四十年封多羅貝勒五十六年晉封郡王雍正三年授札薩克世襲佐領十一牧地南當黃河之曲有小哈柳圖河入於黃河東至拉布楞希拉得布沙南至和託果爾希里克西至巴爾鄂博巴顏烏拉北至額爾德尼布烏魯勒卜達巴黃河重源再顯於巴顏喀喇山之東麓二泉流數里合而東南流曰阿爾坦河阿爾坦蒙古言金也水色微黃似之東北流三百餘里至鄂屯塔拉為古星宿海元史所謂火惇腦兒也直西寧邊外西南一千一百餘里星宿海於羣山環繞中有地平曠可三百里有泉千百隨地涌出大小錯列望若列星阿爾坦河自西南來皆匯入焉東北流百餘里又東南注札凌海海周三百餘里東西長南北狹河亙其中而流番語謂白為札長為凌以其水色白也又東南注鄂凌海海在札凌東五十餘里周亦三百餘里形如匏瓜西南廣東北狹番語謂青為鄂言水色青也即元史所謂匯二巨澤名阿剌腦兒者也由海東北流出折東南南抵巴顏渾嶺下復正南流百五十里水色始變緑而黃又東南流曲曲七百餘里繞大雪山南古積石山也番名阿木尼麻禪母遜阿林阿木尼謂祖麻禪謂險惡母遜謂冰猶言大冰山也山自巴顏喀喇東來當黃河北岸綿亙三百餘里上有九峯甚高冬夏積雪在西寧邊外西南五百三十餘里元史謂之亦耳麻不莫剌黃河依山南麓東流折而東北有三坤都倫河前後自東南來注之三坤都倫者一曰德特坤都倫出賴楚山西北流三百餘里入黃河即元史納鄰哈喇河自白狗嶺北流者一曰都爾達都坤都倫出納克多木精山西北流屈曲三百數十里入黃河當河流自南轉東北處即元史乞里馬出河自威茂州西北岷山之北北流者一曰多拉坤都倫源出岡山西北流六百數十里入黃河正當大河於烏蘭莽鼐山麓折而西北流之處即元史鵬拶山西北七百里過札塞塔失地與河合者黃河既納此三水勢甚盛至烏蘭莽鼐山下始折而西北流二百里小哈柳圖河自東北來入之小哈柳圖源出東北魯察布拉山二源西南流百里合又西入河當遊牧西土爾扈特南前旗東前左翼頭旗顧實汗之孫康熙四十三年封多羅貝勒雍正元年晉郡王三年授札薩克世襲佐領九牧地在大通河南岸東至阿木達賴台南至固爾班塔拉之北沙克圖西至齊擦擦呢布楚勒北至巴顏布拉克大通河源出青海西北阿木尼尼庫山南諾爾東南流曰烏蘭木倫河又東哈爾渾河自北來注之又東北曲曲流南受一水又東北滿楚喀河自西北來注之東徑甘州邊外番大山東南流八百里北受小水六南受小水五至西大通堡南又東南會湟水又東南入黃河即古浩亹水也河北為西右翼前旗遊牧地西後旗顧實汗之裔康熙五十五年封多羅貝勒雍正三年授札薩克世襲佐領九牧地跨柴集河其水北注鹽池東至錫喇鹽海子察罕託羅海南至合約爾巴爾克西至布隆吉爾河源北至果庫圖爾希拉庫圖爾鹽池在青海西南周百餘里産青鹽蒙古名達布遜淖爾其水自錫喇庫特爾山之莫和爾河與布拉克地之察罕烏蘇河西來匯為此池又自池東南流出會西來之巴爾虎河又七十餘里柴集河自東南來入之名曰鹽河復東南流淪於功額池凡青海蒙古與西寧一郡軍民並各種番回食鹽皆取給於此北右翼旗顧實汗之孫康熙四十四年封輔國公雍正元年晉貝勒後降固山貝子三年授札薩克世襲佐領六牧地在青海北岸東至沙拉哈吉爾南至庫庫諾爾齊津西至吹吉烏立圖阿拉爾北至烏蘭和碩有伊克烏蘭和碩巴哈烏蘭和碩二河在旗境西西北自庫德里山南流百餘里入庫庫諾爾北左翼旗顧實汗之孫康熙四十四年封輔國公雍正元年晉固山貝子三年授札薩克世襲佐領三牧地在布隆吉爾河南岸東至哈喇諾爾南至科爾魯克西至窩果圖爾北至伊克柴達木烏蘭烏蘇河出東南沙磧中西北行五百餘里入達布遜諾爾南左翼後旗顧實汗之裔康熙五十年封輔國公雍正三年授札薩克世襲佐領一牧地在大通河南岸青海正北東至吉噶素台鄂蘭布拉克南至和洛海西至布都克圖烏蘭和碩北至青海北前旗顧實汗之裔康熙五十年封輔國公雍正三年授札薩克世襲佐領二牧地在青海西岸東至科依特陀羅海南至柴吉希巴立台西至車吉北至哈達圖南右翼後旗顧實汗之裔康熙五十年封輔國公雍正三年授札薩克世襲佐領四牧地在青海東岸東至賀爾南至哈沙圖西至哈拉素布魯漢北至庫庫諾爾坤都倫河自察罕鄂博圖山兩源合而南入西寧河有世宗聖製碑在旗界西右翼中旗顧實汗伯兄之裔雍正三年領公中札薩克授一等台吉世襲佐領一牧地跨柴達木河東至諾木罕河南至諾木罕木魯西至滔賚北至希勒沿舒哈河自旗西無名海子流出西北入於沙柴達木河出河源北托遜淖爾西流至西拉珠爾格塔拉阿拉克淖爾水東來入之合而西北流格德爾古河烏蘭烏蘇河布隆吉爾河俱自其東注之又西入於沙西右翼前旗顧實汗之裔雍正三年授札薩克一等台吉世襲佐領二牧地在大通河北岸東至察罕阿爾吉永安南至約呼賚口西至柴達木察罕巴彥託羅海北至希立永安南右翼中旗顧實汗之裔康熙五十九年封輔國公雍正三年授札薩克乾隆四十年降一等台吉世襲佐領五牧地當魯察布拉山之西東至庫克烏松南至齊克特尼諾爾西至僧克圖木齊北至庫克烏松西山魯察布拉山舊作羅插普拉即禹貢之西傾山也一名西強山亦名嵹臺山在洮州廳西南三百三十餘里史記夏本紀道九山索隱九山古分三條馬