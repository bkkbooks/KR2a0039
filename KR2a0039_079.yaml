至烏拉斯台北至柴達木西左翼後旗顧實汗弟之裔雍正三年授札薩克一等台吉世襲佐領一牧地跨柴達木河東至巴彥陀羅海南至桑陀羅海西至烏爾圖北至瑪尼圖沙納圖青海綽羅斯部二旗本準噶爾族乾隆十九年準噶爾平其族遂微附牧賽音諾顏部者曰額魯特附牧青海者曰綽羅斯轄旗二南右翼頭旗北中旗北極高三十六度十八分京師偏西十五度四十二分南右翼頭旗準噶爾族康熙四十二年封多羅貝勒雍正元年晉郡王三年授札薩克乾隆三十年降貝勒世襲佐領四牧地當青海東南岸東至博爾巴齊他爾察罕鄂博哈拉烏素南至固爾班他拉貢諾爾西至窩爾登諾爾伊克察罕哈達北至青海察罕陀羅海南有巴顏淖爾東北有蒙古圖布拉克會東來二水又東北有烏蘭布拉克二水合流而西會南來之巴顏淖爾水為和爾必拉北入青海北中旗準噶爾族康熙五十五年授公品級一等台吉兼札薩克雍正三年晉輔國公乾隆十五年晉固山貝子世襲佐領二有半牧地在青海西北岸東至濟爾瑪爾台南至布喀沿西至西爾哈落薩北至濟爾瑪爾台西爾哈河西北出槐滿阿林東南流又有羅色河西北出庫得里阿林西南流來合南入布喀河又西北濟爾瑪爾台河屈曲南入布喀河其南岸即和碩特北前旗也青海輝特部南一旗姓伊克明安有卓哩克圖和碩齊者其子號青諾顏遊牧青海雍正元年來降三年授札薩克一等台吉九年晉輔國公世襲佐領一牧地當巴彥諾爾之南東至巴彥諾爾東山木魯南至窩蘭布拉克僧里鄂博哈立噶圖西至博爾楚爾哈立噶圖河北至納蘭薩蘭北極高三十六度十八分京師偏西十五度四十二分巴彥諾爾在青海東南周四十餘里水西北流出屈曲三百數十里入和爾必拉青海土爾扈特部四旗元臣翁罕數傳至博第蘇克自稱青海土爾扈特台吉順治八年始通貢雍正三年編轄旗四北極高三十五度十五分京師偏西十七度十五分南中旗翁罕之裔雍正三年授札薩克一等台吉世襲佐領四牧地當登努爾特達巴罕之陽東至果庫圖爾南至果庫圖爾山木庫爾西至庫克烏松北至袞阿爾台西旗翁罕之裔雍正三年授札薩克一等台吉世襲佐領四牧地在阿屯齊老圖有阿勒淖爾泊東至袞阿爾台南至黃河西至哈爾古爾希立北至庫克烏蘇唐素楞南前旗翁罕之裔雍正元年授札薩克一等台吉世襲佐領一牧地當大哈柳圖河之南小哈柳圖河之北東至古魯半博爾齊沙拉圖南至黃河西至宗科爾北至恰克圖大哈柳圖河蒙古曰伊克哈柳圖在洮州廳西六百餘里黃河北岸源出納莫哈山烏蘭俄爾吉嶺當布庫吉爾地三源東流百餘里折而西南合流又西北流入黃河小哈柳圖河源出魯察布拉山二源西南流百里合又西入河當旗境東察漢諾們罕喇嘛遊牧在旗境東北南後旗翁罕之裔雍正三年授札薩克一等台吉世襲佐領三牧地當碩羅巴顏哈拉山之陽曰鄂博圖東至莫古立源南至袞阿爾台西至庫克烏松木魯北至登納吉爾尼薩爾哈布齊海河自西來屈曲而南有哈爾渾舍里小河舊以為阿爾坦河自北來會合而南入黃河呼呼烏蘇河在阿爾坦河之西北源出蘇羅達巴罕南入黃河青海喀爾喀部一旗南右一旗元太祖之裔徙牧青海隸和碩特族雍正元年來歸編旗一乾隆三年授公中札薩克一等台吉佐領一牧地在青海南岸東至察罕哈達南至南山木魯西至烏蘭布拉克北至青海北極高三十六度三十五分京師偏西十六度三十二分自東而西有阿木尼塞爾沁阿林伊克哈圖達巴罕巴哈哈圖達巴罕巴哈察罕哈達伊克察罕哈達諸山東有和爾河西札哈蘇太河中無名河六俱北流入青海達賴商上堪布喇嘛牧場在柴積河南以上各部共二十九旗及察罕諾門為一盟不設盟長歸西寧辦事大臣統轄土司青海所屬凡四十玉樹四司一司二司在木魯烏蘇河東三司四司在河西阿拉克碩二司白利阿薩克阿永在河南尼牙木錯固察拉布在河北札武三司在河東隆布吹冷多爾多在布壘布楚兩河間上格爾吉在布楚河西中格爾吉下格爾吉哈爾受隆壩二司隆東綽火爾覺巴拉蘇爾莽葉爾吉列旺安圖興巴拉爾吉俱在河北桑色爾巴顏囊謙在河南洞巴在河西蘇魯克在索克河南稱多在瑪楚河西蒙古爾津永河普在黃河西二阿里克在齊普河東西北境有阿克達木山巴薩通拉木山皆長數百里極西北二十里有錫津烏藍拖羅海山託克託乃烏藍木倫河出其西南為勒科爾烏藍達布遜山喀齊烏藍木倫河東流八百餘里會烏蘇河以下通稱木魯烏蘇河有阿克達木河出阿克達木山屈曲流七八百里北注之折北流會託克託乃烏藍木倫河又轉東受南來之布輝伯河又東受南來大水二入玉樹司界折西南有那木齊圖烏蘭木倫河出瀚海地東流千餘里折南注之又南折東徑拉瑪察喀山北受齊齊爾納河又東南為布壘河入四川雅州所屬土司界是為金沙江上源阿克河出巴薩通拉木山南流折東入喀喇烏蘇河河自前藏東流入境行三百餘里折南流有索克河出阿克達木山西屈曲東流八百里而南注之仍南入前藏界布楚河上源曰格爾吉河出上格爾司境東南流徑各司南至洞巴司西折南入前藏界是為瀾滄江上源瑪楚河出固察司東東南流入雅州土司界是為雅龍江上源黃河發源巴顏喀喇山東麓名阿爾坦河東北流匯為大澤名鄂端諾爾即星宿海也又東貫查靈海南入鄂靈海會西來烏蘭河至永河普司東又折東入額魯特界齊普河上源有二曰圖聲圖河曰得爾多河北流而合環阿里克境西北入黃河以上納賦於西寧辦事大臣
