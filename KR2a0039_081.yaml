body:
  text: 清史稿卷八十一志五十六地理二十八察哈爾察哈爾八旗東南距京師四百三十里當直隸宣化山西大同邊外明插漢本元裔小王子後嘉靖間布希駐牧察哈爾之地因以名部天聰六年征林丹汗走死其子孔果爾額哲來降即其部編旗駐義州康熙十四年其子布爾呢兄弟叛討誅之遷部衆駐牧宣化大同邊外又以來降之喀爾喀厄魯特編為佐領隸焉乾隆二十六年設都統駐張家口其地東界克什克騰西界歸化城土默特南界直隸獨石張家二口及山西大同朔平北界蘇尼特及四子部落袤延千里北極高四十二度二十分京師偏西十分鑲黃旗察哈爾駐蘇明峰在張家口北三百四十里東南距京師七百五十里明萬全右衞邊外漢上谷郡牧地當張家口之北東界正白旗察哈爾西界正黃旗察哈爾南界鑲黃旗牧廠北界蘇尼特右翼廣一百六十里袤一百九十里其山東曰漠爾圖山南哈石郎山北青羊山蒙名博羅虎插紅羊山蒙名烏蘭虎插東南阿哈魯虎山駱駝山西南額類山東北白鹿山蒙名布虎圖西北衣爾哈圖山東南大紅泉蒙名伊克烏蘭西南滾布拉克泉北小紅泉正黃旗察哈爾駐木孫忒克山在張家口西北三百二十里東南距京師七百六十里漢且如縣地牧地當張家口廳之西北喀喇烏納根山南東界鑲黃旗察哈爾西界正紅旗察哈爾南界陸軍部右翼牧廠北界四子部落廣一百一十里袤二百八十里其山東曰額爾吉納克山南烏爾虎拖羅海山北大鮮卑山蒙名伊克阿勒特興安山西南插漢和邵山東北榆樹山蒙名烏里雅蘇台西七金河蒙名賀爾博金源出賀爾博金山南流入希爾池東南兆哈河源出平地南流會烏爾古河又南蒙古几河自西來注之又南蘇爾扎河自東北來注之又南流從大同天鎮入邊逕柴溝堡西北入懷安為東洋河蒙古几河源出平地東流會兆哈河南入邊城弩里河南流從之鑲紅旗察哈爾駐布林泉在張家口西北四百二十里東南距京師八百三十里漢雁門郡北境牧地當山西陶林廳之東北代哈泊東界正紅旗察哈爾西界鑲藍旗察哈爾南界豐鎮北界四子部落廣五十里袤二百里其山南曰鴨兒山北阿爾達布色山東南格爾白山西南烏爾姑蘇台山北漠惠圖河源出敖托海泉西流入鑲藍旗察哈爾會安達河東南莽喀圖河源出正紅旗察哈爾西北流會阿拉齊河入黛哈池即奄遏下水海正紅旗察哈爾駐古爾板拖羅海山在張家口西北三百七十里東南距京師八百里漢雁門郡北境牧地當山西陶林廳之東北豐鎮廳之北奇爾泊東界正黃旗察哈爾西界鑲紅旗察哈爾南界陸軍部右翼牧廠北界四子部落廣五十五里袤二百八十里其山東曰阿拍撻蘭台山北伊克和洛圖山東北哈撤克圖山西北插漢峰南崑都倫泉葫蘆蘇台泉北諾爾孫泉東南流入正黃旗察哈爾為納林河又東南注希爾池鑲白旗察哈爾駐布雅阿海蘇默在獨石口西北二百四十五里東南距京師七百七十里明開平衞西北邊漢上谷郡北境牧地當獨石口廳治西北東及南界陸軍部牧廠西界正白旗察哈爾北界正藍旗察哈爾廣五十六里袤一百九十七里其山南曰巴漢得兒山西北鐵柱山蒙名阿爾坦噶達蘇其北西爾哈池西北紅鹽池蒙名烏蘭池魁素池正白旗察哈爾駐布爾噶台在獨石口西北二百九十里東南距京師八百二十里明龍門衞邊外漢上谷郡北境牧地當獨石口廳治之西北東及北界鑲白旗察哈爾西及南界鑲黃旗察哈爾廣七十八里袤二百九十五里其山南曰清涼黑山蒙名魁屯喀喇西喀喇峨博圖山一名黑山東南伊克得兒山一名大馬鬣山西北翁翁泊黑水灤蒙名喀喇烏蘇鑲藍旗察哈爾駐阿巴漢喀喇山在殺虎口東北九十里東南距京師一千里明大同府西北邊外漢雁門郡沃陽縣地牧地當山西寧遠廳之北東界鑲紅旗察哈爾西界山西歸化南界山西大同北界四子部落廣一百一十五里袤一百六十里其山東曰克醜山西烏蘭插伯山東北衣馬圖山東南朔隆峯其水南曰察哈音圖河源出阿爾站嶺西南流會弩衡格爾虎虎烏蘇二河入烏蘭木倫河東南阿拉齊河源出朔隆峰東流至鑲紅旗察哈爾納巴爾哈孫河入黛哈池東北朱喇馬台河源出席喇峰西南流會喀喇烏蘇河納札海河為土爾根河即黑河之上源黑河源出海拉蘇台坡與鑲紅旗察哈爾接界西北流有納札海朱喇馬台等河皆自東北來與黑水河會又西流受德布色黑河折西南合哲爾德河始名伊克土爾根河又西入歸化正藍旗察哈爾駐札哈蘇台泊在獨石口東北三百六十里東南距京師八百九十里明開平衞北境金桓州地牧地當直隸獨石口廳治之北東界克什克騰西界鑲白旗察哈爾南界內務府正白旗羊羣牧廠北界阿巴噶左翼廣二百六十五里袤九十五里其水東曰戈賀蘇台河源出額默黑特站西北流會察察爾台戈賀蘇台奴黑特等河入阿霸垓右翼
