body:
  text: 清史稿卷八十二志五十七禮一吉禮一自虞廷修五禮兵休刑措天秩雖簡鴻儀實容沿及漢唐訖乎有明救敝興雅咸依為的煌煌乎上下隆殺以節之吉凶哀樂以文之莊恭誠敬以贊之縱其間淳澆世殊要莫不弘亮天功雕刻人理隨時以樹之範故羣氓蒸蒸必以得此而後足於憑依洵品彙之璣衡也斟之酌之損之益之修明而講貫之安見不可與三代同風世祖入關順命創制規模閎遠順治三年詔禮臣參酌往制勒成禮書為民軌則聖祖歲御經筵纂成日講禮記解義敷陳雖出羣工闡繹悉遵聖訓高宗御定三禮義疏網羅議禮家言折衷至當雅號巨製若皇朝三通大清會典其經緯禮律尤見本原至於專書之最著者一曰大清通禮乾隆中撰成道光年增修一曰皇朝禮器圖式曰祭器曰儀器曰冠服曰樂器曰鹵簿曰武備一曰滿洲祭神祭天典禮其始關外啓蓽崇祭天神暨羣祀祖禰意示從儉凡所紀録悉用國語國書入關後有舉莫廢逮高宗時依據清文譯成四卷祭期祭品儀注祝辭與夫口耳相傳或小有異同者並加釐訂此國俗特殊之祀典也德宗季葉設禮學館博選耆儒將有所綴述大例主用通禮仿江永禮書例增曲禮一目又仿宋太常因革禮例增廢禮新禮二目附後簡未及編訂而政變作矣其祀典之可稽者初循明舊稍稍褒益之堂子之祭雖於古無徵然昭假天神實近類祀康熙間以禁中祭上帝大享殿合祀天地日月及羣神太廟階下合祭五祀非古制詔除之又罷禘祭專行祫祭高宗修雩祀廢八蠟建兩郊壇宇定壇廟祭器舉廢一惟其宜宣宗遺命罷郊配祔廟文宗限以五祖三宗慮至深遠穆宗登遐禮臣援奉先殿增龕座例主升祔議者病簡略然亦迫於勢之不容已耳光緒間依高宗濮說辨稱醇親王為本生考立廟別邸祀以天子禮恩義兼盡度越唐明遠矣若夫郊廟大祀無故不攝誠敬仁孝永垂家法尤舉世所推今為考諸成憲循五禮序條附支引凡因襲變創所以因時而制宜者悉臚其要於編壇壝之制神位祭器祭品玉帛牲牢之數祀期齊戒祝版祭服祭告習儀陪祀五禮一曰吉禮凡國家諸祀皆屬於太常光祿鴻臚三寺而綜於禮部惟堂子元日謁拜立杆致祭與內廷諸祀並內務府司之清初定制凡祭三等圜丘方澤祈穀太廟社稷為大祀天神地祇太歲朝日夕月歷代帝王先師先農為中祀先醫等廟賢良昭忠等祠為羣祀乾隆時改常雩為大祀先蠶為中祀咸豐時改關聖文昌為中祀光緒末改先師孔子為大祀殊典也天子祭天地宗廟社稷有故遣官告祭中祀或親祭或遣官羣祀則皆遣官大祀十有三正月上辛祈穀孟夏常雩冬至圜丘皆祭昊天上帝夏至方澤祭皇地祇四孟享太廟歲暮祫祭春秋二仲上戊祭社稷上丁祭先師中祀十有二春分朝日秋分夕月孟春歲除前一日祭太歲月將春仲祭先農季祭先蠶春秋仲月祭歷代帝王關聖文昌羣祀五十有三季夏祭火神秋仲祭都城隍季祭炮神春冬仲月祭先醫春秋仲月祭黑龍白龍二潭暨各龍神玉泉山昆明湖河神廟惠濟祠暨賢良昭忠雙忠奬忠褒忠顯忠表忠旌勇睿忠親王定南武壯王二恪僖弘毅文襄勤襄諸公等祠其北極佑聖真君東嶽都城隍萬壽節祭之亦有因時特舉者視學釋奠先師獻功釋奠太學御經筵祗告傳心殿其嶽鎮海瀆帝王陵廟先師闕里元聖周公廟巡幸所蒞或親祭或否遇大慶典遣官致祭而已各省所祀如社稷先農風雷境內山川城隍厲壇帝王陵寢先師關帝文昌名宦賢良等祠名臣忠節專祠以及為民禦災捍患者悉頒於有司春秋歲薦至親王以下家廟祭始封祖並高曾祖禰五世品官逮士庶人祭高曾祖禰四世其餘或因事或從俗第無悖於祀典亦在所不禁此其概也若夫壇壝神位祭獻品物齊戒告虔及一切度數節文詳其異同識其顛末無遺無復庶覽者可考而知已壇壝之制天聰十年度地盛京建圜丘方澤壇祭告天地改元崇德天壇制圓三成上成九重周一丈八尺二成七重周三丈六尺三成五重周五丈四尺俱高三尺垣周百十有三丈地壇制方二成上成方六丈高二尺下成方八丈高二尺四寸垣周百三十有三丈制甚簡也世祖奠鼎燕京建圜丘正陽門外南郊方澤安定門外北郊規制始拓圜丘南嚮三成上成廣五丈九尺高九尺二成廣九丈高八尺一寸三成廣十有二丈高如二成甃磚合一九七五陽數陛四出各九級欄楯柱覆青琉璃內壝圓周九十七丈七尺五寸高八尺一寸四面門各三門柱各二燔柴爐瘞坎各一外壝方周二百四丈八尺五寸高九尺一寸四門如內壝北門後為皇穹宇南嚮制圓八柱環轉重檐金頂基周十三丈七寸高九尺陛三出級十有四左右廡各五楹陛一出七級殿廡覆瓦俱青琉璃圍垣周五十六丈六尺八寸高丈有八寸南設三門外壝門外北神庫神廚各五楹南嚮井亭一其東為祭器樂器棕薦諸庫又東為井亭宰牲亭壇內垣北圓餘皆方門四東泰元南昭亨西廣利北成貞成貞北為大享殿壇圓南嚮內外柱各十有二中龍井柱四金頂檐三重覆青黃緑三色琉璃基三成南北陛三出東西陛一出上二成各九級三成十級東西廡二重前各九楹後各七楹前為大享門上覆緑琉璃前後三出陛各十有一級東南燔柴爐瘞坎制如圜丘內壝周百九十丈七尺二寸門四北門後為皇乾殿南嚮五楹覆青琉璃陛五出各九級東甎門外長廊七十二聯檐通脊北至神庫井亭又東北宰牲亭薦俎時避雨雪處也壝外圍垣東西北各有門南接成貞又西北曰齊宮東嚮正殿五楹陛三出中級十有三左右各十五左設齊戒銅人右設時辰牌後殿五楹左右配殿各三楹內宮牆方百三十三丈九尺四寸中三門左右各一環以池跨石梁三東北鐘樓一外宮牆方百九十八丈二尺二寸池梁如內制廣利門外西北為神樂觀東嚮中凝禧殿五楹後顯佑殿七楹西為犧牲所南嚮又西為鐘樓其大享殿圍垣南接圜丘東西轉北為圓形內垣高一丈一尺址厚九尺頂厚七尺周千二百八十六丈一尺五寸外垣高一丈一尺五寸址厚八尺頂厚六尺周千九百八十七丈五尺西嚮門二南北並列焉乾隆八年修齊宮改神樂觀為所十二年修內外垣改築圜丘規制益拓上成徑九丈二成十五丈三成二十一丈一九三五三七皆天數也通三成丈四十有五符九五義量度準古尺當營造尺八寸一分又與九九數合壇面甃甎九重上成中心圓面外環九重甎數一九纍至九九二三成以次遞加上成每面各十有八二成各二十七三成各四十五並積九為數四乘之綜三百有六十以應周天之度其高上成五尺七寸二成五尺二寸三成五尺欄柱階級並準今尺古今尺度嬴縮稍差用九則一復改壇面為艾葉青石皇穹宇臺面墁青白石大享殿外壇面墁金甎壇內殿宇門垣俱青琉璃十六年更名大享殿曰祈年覆檐門廡壇內外壝垣並改青琉璃距壇遠者如故尋增天壇外垣南門一內垣鐘鼓樓一嗣是祭天壇自新南門入祭祈年殿仍自北門入二十年改神樂所為署五十年重建祈穀壇配殿光緒十五年祈年殿災營度仍循往制云方澤北嚮周四十九丈四尺四寸深八尺六寸寬六尺祭日中貯水二成上成方六丈二成方十丈六尺合六八陰數壇面甃黃琉璃每成陛四出俱八級二成南列嶽鎮五陵山石座鏤山形北列海瀆石座鏤水形俱東西嚮內壝方二十七丈二尺高六尺厚二尺正北門三石柱六東西南門各一石柱二北門外西北瘞坎一外壝方四十二丈高八尺厚二尺四寸門制視內壝南門後皇祇室五楹北嚮垣周四十四丈八尺高一丈一尺正門一外壝西門外神庫神廚祭器樂器諸庫井亭宰牲亭在焉西北曰齊宮東嚮正殿七楹陛五出中九級左右俱七級南北陛一出各七級左右配殿各七楹宮牆周百有十丈二尺門三東嚮東北鐘樓一壇內垣周五百四十九丈四尺北西門各三東南門各一外垣周七百六十五丈西嚮門三雍正八年重建齊宮制如舊乾隆十四年以皇祇室用緑瓦乖黃中制諭北郊壇甎壝瓦改用黃明年改築方澤墁石壇面制視圜丘上成石循前用六六陰數縱橫各六為三十六其外四正四隅均以八八積成縱橫各二十四二成倍上成八方八八之數半徑各八為六八陰數與地耦義符尋建東西南壝門外南北瘞坎各二又天地二壇立陪祀官拜石如其等闕右社稷壇制方北嚮二成高四尺上成方五丈二成方五丈三尺陛四出各四級上成土五色隨其方覆之內壝方七十六丈四尺高四尺厚二尺飾色如其方門四柱各二壝西北瘞坎二北拜殿又北戟門楹各五陛三出外列戟七十二其西南神庫神廚在焉壇垣周百五十三丈四尺覆黃琉璃北三門東西南各一門西門外宰牲亭一井一西南為奉祀署壇東北正門一左右門各一俱東嚮直闕右門乘輿躬祭所出入也東南為社稷街乾隆二十一年徙瘞坎壇外西北隅舊制壝垣用五色土至是改四色琉璃甎瓦及省社稷壇高二尺一寸方廣二丈五尺制殺京師十之五云朝日壇在朝陽門外東郊夕月壇在阜成門外西郊俱順治八年建制方一成陛四出日壇各九級方五丈高五尺九寸圓壝周七十六丈五尺高八尺一寸厚二尺三寸壇垣前方後圓周二百九十丈五尺月壇各六級方四丈高四尺六寸方壝周九十四丈七尺高八尺厚二尺二寸壇垣周二百三十五丈九尺五寸兩壇具服殿制同燎爐瘞坎井亭宰牲亭神庫神廚祭器樂器諸庫咸備其牌坊曰禮神街雍正初更名日壇街曰景升月壇街曰光恆乾隆二十年修建壇工依天壇式改內垣土牆甃以甎其外垣增舊制三尺光緒中改日壇面紅琉璃月壇面白琉璃並覆金甎天神地祇先農三壇制方一成陛皆四出在正陽門外先農壇位西南周四丈七尺高四尺五寸東南為觀耕臺耕藉時設之前藉田後具服殿東北神倉中廩制圓前收穀亭後祭器庫內垣南門外神祇壇在焉神壇位東方五丈高四尺五寸五分北石龕四鏤雲形分祀雲雨風雷祇壇位西廣十丈縱六丈高四尺南石龕五鏤山水形分祀嶽鎮海瀆二壇方壝俱周二十四丈高五尺五寸正門分南北餘如日月壇又內垣東門外北齊宮五楹後殿配殿茶膳房具焉乾隆時更命齊宮曰慶成宮壇外垣周千三百六十八丈南北門二東嚮南入先農壇北入太歲殿殿七楹東西廡各十有一其前曰拜殿燎爐一先蠶壇乾隆九年建西苑東北隅制視先農徑四丈高四尺陛四出殿三楹西嚮東采桑臺廣三丈二尺高四尺陛三出前為桑園臺中為具服殿為繭館後為織室有配殿環以宮牆牆東浴蠶河跨橋二橋東蠶署三蠶室二十七俱西嚮外垣周百六十丈各省先農壇高廣視社稷餘如制神位祭器祭品玉帛牲牢之數神位圜丘第一成正位昊天上帝南嚮配位八首太祖訖宣宗東西嚮凡位皆施幄第二成從位東大明次星辰西夜明次雲雨風雷常雩如冬至大祀大雩有從無配祈穀位次視圜丘第一成無幄方澤第一成正位皇地祇北嚮配列祖列宗東西嚮第二成從位東五嶽啓運隆業永寧三山次四海西五鎮天柱昌瑞二山次四瀆因事祗告天地不設配從位順治十七年合祀大享殿其正位左天帝右地祇南嚮東太祖西太宗配之從祀十二壇大明位東星辰五嶽啓運四海太歲名山大川次之夜明位西雲雨風雷五鎮天柱隆業四瀆帝王天下神祇次之社稷壇中植石主別設神牌正位東大社西大稷北嚮東配后土句龍氏西后稷氏無幄壇下龕用木日壇東大明無幄月壇正位夜明配北斗二十八宿周天星辰共一幄天神壇正中左雲師次風伯右雨師次雷師南嚮地祇壇正中五嶽右五鎮次四海左五陵次四瀆北嚮右旁京師山川左旁