body:
  text: 清史稿卷八十四志五十九禮三吉禮三歷代帝王陵廟傳心殿先師孔子元聖周公關聖帝君文昌帝君祭纛祀炮京師羣祀附五祀八蠟直省祭厲歷代帝王廟順治初建都城西阜成門內南嚮正中景德崇聖殿九楹東西二廡各七楹燎爐各一後為祭器庫前景德門門外神庫神廚宰牲亭井亭鐘樓齊所咸備初明祀歷代帝王元世祖入廟遼金諸帝不與焉至是用禮臣言以遼金分統宋時天下其太祖應廟祀元啓疆宇功始太祖禮合追崇從祀諸臣若遼耶律赫嚕金尼瑪哈斡里雅布元穆呼哩巴延明徐達劉基並入之屆日大臣一人祭正殿殿祀伏羲神農黃帝少昊顓頊帝嚳唐堯虞舜夏禹商湯周武王漢高祖光武唐太宗宋遼金太祖世宗元太祖世祖明太祖凡草一帝祀以太牢分獻官四人祭兩廡廡祀風后力牧皋陶夔龍伯益伯夷伊尹傅說周公旦召公奭太公望召虎方叔張良蕭何曹參陳平周勃鄧禹馮異諸葛亮房玄齡杜如晦李靖郭子儀李晟張巡許遠耶律赫嚕曹彬潘美張浚韓世忠嶽飛尼瑪哈斡里雅布穆呼哩巴延徐達劉基凡功臣四十一祀以少牢十四年聖祖躬祭屆時致齊畢翼日昧爽駕出西華門至廟降入幄次盥訖入直殿就位上香三皇位前二跪六拜奠帛爵讀祝俱初獻時行凡三獻分獻官祀兩廡如儀遣官則衣朝服王公承祭入景德左門升左階位階上餘入右門位階下俱三跪九拜不飲酒受胙不陪祀十七年禮臣議言廟祀帝王止及開創應增守成令辟並罷宋臣潘美張浚祀從之於是增祀商中宗高宗周成王康王漢文帝宋仁宗明孝宗而遼金元太祖皆罷祀聖祖嗣服以開創功復之六十一年諭帝王崇祀代止一二君或廟饗其臣子而不及其君父是偏也凡為天下主除亡國暨無道被弒悉當廟祀有明國事壞自萬曆泰昌天啓三朝神宗光宗喜宗不應崇祀咎不在愍帝也於是廷臣議正殿增祀夏啓仲康少康杼槐芒泄不降扃厪孔甲皋發商太甲沃丁太庚小甲雍己太戊仲丁外壬河亶甲祖乙祖辛沃甲祖丁南庚陽甲盤庚小辛小乙武丁祖庚祖甲釰辛庚丁太丁帝乙周成王康王昭王穆王共王懿王孝王夷王宣王平王桓王莊王僖王惠王襄王頃王匡王定王簡王靈王景王悼王敬王元王貞定王考王威烈王安王烈王顯王慎靚王漢惠帝文帝景帝武帝昭帝宣帝元帝成帝哀帝明帝章帝和帝殤帝安帝順帝沖帝桓帝靈帝昭烈帝唐高祖高宗睿宗玄宗肅宗代宗德宗順宗穆宗文宗武宗宣宗懿宗僖宗遼太宗景宗聖宗興宗道宗宋太宗真宗仁宗英宗神宗哲宗高宗孝宗光宗寧宗理宗度宗端宗金太宗章宗宣宗元太宗定宗憲宗成宗武宗仁宗泰定帝文宗寧宗明成祖仁宗宣宗英宗景帝憲宗孝宗武宗世宗穆宗愍帝凡百四十三位其從祀功臣增黃帝臣倉頡商仲虺周畢公高呂侯仲山甫尹吉甫漢劉章魏相丙吉耿弇馬援趙雲唐狄仁傑宋璟姚崇李泌陸贄裴度宋呂蒙正李沆寇準王曾范仲淹富弼韓琦文彥博司馬光李綱趙鼎文天祥金呼嚕元博果密托克托明常遇春李文忠楊士奇楊榮于謙李賢劉大夏凡四十人是歲世宗御極依議行增置神主為文鑱之石乾隆元年諡明建文帝曰恭閔惠皇帝廟祀之位次太祖復定帝王廟鹿脯鹿醢增鹿一兩廡易醓醢增豕一十四年以唐虞五臣唯契未祀乃建殿成湯廟後有司致饗如孔廟崇聖祠制初帝王廟正殿用青緑琉璃瓦至十八年重修改覆黃瓦四十九年諭廷臣曩時皇祖敕議增祀聖訓至公而陳議者未能曲體乃列遼金二朝而遺東西晉元魏前後五代謂南北朝偏安則遼金亦未奄有中夏即兩晉諸代因篡而斥不知三國正統本在昭烈至司馬氏以還南朝神器數易宋武帝手移晉祚篡奪無所逃罪其他祖宗得國不正子孫但能守成即為中主且蜀漢至初唐不乏賢君安可闕略洎朱溫以下或起寇竊或為叛臣五十餘年國統不絶如線周世宗藉餘業擴疆宇卓然可稱而斥擯弗列此數百年間祀典闃如又豈千秋公論他若元魏雄據河北太武道武胥勤治理並宜表章昔楊維楨著正統辨謂正統在宋不在遼金元其說甚當今通禮祀遼金黜兩晉諸代使後世疑本朝區分南北非禮意也明神喜二宗法紀墜失愍帝嗣統事無可為雖國覆身殉未可以荒淫例皇祖徹神喜祀愍帝具見大公乃議者因復推祀桓靈亦思漢之所由亡乎其再詳議尋議增祀兩晉元魏前後五代各帝王並以唐憲宗平亂金哀宗殉國亦宜列祀允行同治四年以散宜生配饗位次畢公高高允配饗位次趙雲陵寢之祭太宗征明至燕京即遣貝勒阿巴泰等赴金太祖世宗陵致祭順治建元禮葬明崇禎帝后復詔明十二陵潔禋祀禁樵牧給地畝置司香官及陵戶歲時祭品戶部設之明年定春秋仲日致祭遣官行六年定明陵仍設太監並置房山金陵陵戶八年定帝王陵寢祀典淮寧伏羲滑縣顓頊帝嚳內黃商中宗西華商高宗孟津漢光武鄭周世宗鞏宋太祖太宗真宗仁宗趙城女媧榮河商湯曲阜少昊東平唐堯中都軒轅咸陽周文武成康涇陽漢高祖唐宣宗咸寧漢文帝長安宣帝富平後魏孝文帝三原唐高祖醴泉太宗蒲城憲宗酃神農寧遠虞舜會稽夏禹江寧明太祖廣寧遼太祖房山金太祖世宗宛平元太祖世祖昌平明宣宗孝宗世宗各就地饗殿行之或因陵寢築壇惟元陵望祭十六年幸畿輔親酹崇禎帝陵諡曰莊烈愍皇帝凡巡幸所蒞皆祭陵廟有大慶典祭告亦如之康熙二十一年滇亂平遣官致祭頒冊文香帛給黃傘一御仗龍纛各二凡成武功皆祭如典二十三年南巡道江寧詣明太祖陵拜奠諭有司巡察守陵人防護越五年巡會稽祭禹陵祝文書御名行三跪九拜禮蹕江寧祭明太祖陵如祀禹儀凡時巡祭帝王陵寢儀同祭廟率二跪六拜茲蓋殊典云三十八年復南巡見明太祖陵圮剝詔依周封嵵宋例授明裔一官俾世守弗替四十二年西巡遣祭女媧氏陵幸陝遣祭所經諸陵惟祀周文武祝文書御名尊聖也六十一年遺諭言明太祖起布衣統方夏駕軼漢唐宋諸君末葉災荒臣工內訌寇盜外起以致社稷顛覆考其嗣主未有荒墜顯跡蓋亦曆數使然且其制度規模我朝多所依據允宜甄訪支派量授爵秩俾奉春秋饗祀世宗纘緒遂授朱之璉一等侯世襲往江寧昌平致祭自是歲舉以為常帝堯陵向有二一在平陽一在濮州濮州東南穀林古雷澤也乾隆元年修葺釐正定穀林為舊址平陽時奠如故並修神農虞舜陵廟置陵戶典守十一年以陝西古建都地帝王陵墓多命疆吏考其不載會典者所在令有司防護十三年車駕幸曲阜奠少昊陵嗣是東巡皆躬祭十六年選姒氏子姓一人授世襲八品官奉祀禹陵趙城女媧陵廟中故有塑像帝斥其黷慢徹之改立神位禁私禱十八年謁泰陵禮畢詣房山祭金太祖陵賚其裔完顏氏官爵幣帛二十六年定帝王陵寢與嶽鎮海瀆先師闕里皆遣官行四十一年禮臣言堯陵見正史者兩漢地理志云濟陰郡成陽有堯冢靈臺劉向傳稱葬濟陰晉地理志成陽舜所漁堯冢在西宋史禮志在濮州雷澤東穀林山呂氏春秋帝王世紀水經注所引述征記括地志太平寰宇記路史集古録諸說皆與正史符後漢元和以來祀典並於其地行明洪武雖改祀東平而隸魯境則一乾隆初定穀林為堯陵稽古正訛萬世可守嗣後祭告率由舊章其平陽一陵有司祀之如東平例已大理寺卿尹嘉銓請罷明宣宗世宗二陵祭告廷議以為宣宗有善政不應以一二事生訾議唯世宗戮忠親佞實與史合應停饗祀從之四十九年南巡至江寧祭明太祖陵禮臣具儀上三奠酒每奠一拜帝命用祀少昊陵例二跪六拜不必奠酒著為令五十年幸湯山道昌平親酹明成祖陵繕葺之仍建定陵饗殿並復世宗祀事嘉慶元年罷遣官敕各省副都統總兵官舉行九年謁東陵道盤山閲明陵故事往長陵奠醊遣王大臣致奠餘陵是日仁宗躬詣三奠畢乃三拜望祭元太祖世祖陵向在德勝門外位暢春園圓明園南帝以為乖制命嗣後行慶典改於清河以北昌平以南擇地行禮道光十六年定明陵春秋致祭由襲侯往行餘以其族官品峻者攝之或遣散秩大臣為永制光緒七年諭禁開墾明陵旁近地畝傳心殿順治十四年沿明制舉經筵祭先師孔子弘德殿康熙十年續舉遣官告祭二十四年規建傳心殿位文華殿東正中祀皇師伏羲神農軒轅帝師堯舜王師禹湯文武南嚮東周公西孔子祭器視帝王廟歲御經筵前期遣大學士祗告祭傳心殿自此始明年帝將御經筵詔言先聖先師傳道垂統炳若日星朕遠承心學效法不已漸近自然施之政教庶不與聖賢相悖其躬詣行禮祀日具香燭鉶一籩豆各二奠帛爵讀祝以祭帝御袞服行二跪六拜禮太子春秋會講亦先祭告焉月朔望遣太常卿供酒果上香雍正四年定本日行祗告禮自是以為常乾隆六年親祭傳心殿六十年歸政再行之歷仁宗宣宗文宗並親詣祗告後不復行經筵儀制別詳嘉禮至聖先師孔子崇德元年建廟盛京遣大學士范文程致祭奉顏子曾子子思孟子配定春秋二仲上丁行釋奠禮世祖定大原以京師國子監為大學立文廟制方南嚮西持敬門西嚮前大成門內列戟二十四石鼓十東西舍各十一楹北嚮大成殿七楹陛三出兩廡各十九楹東西列舍如門內南嚮啓聖祠正殿五楹兩廡各三楹燎爐瘞坎神庫神廚宰牲亭井亭皆如制順治二年定稱大成至聖文宣先師孔子春秋上丁遣大學士一人行祭翰林官二人分獻祭酒祭啓聖祠以先賢先儒配饗從祀有故改用次丁或下丁月朔祭酒釋菜設酒芹棗栗先師四配三獻十哲兩廡監丞等分獻望日司業上香正中祀先師孔子南嚮四配復聖顏子宗聖曾子述聖子思子亞聖孟子十哲閔子損冉子雍端木子賜仲子由卜子商冉子耕宰子豫冉子求言子偃顓孫子師俱東西嚮西廡從祀先賢淡臺滅明宓不齊原憲公冶長南宮適公哀商瞿高柴漆雕開樊須司馬耕商澤有若梁鱣巫馬施冉孺顏辛伯虔曹冉季公孫龍漆雕徒文秦商漆雕哆顏高公西赤壤駟赤任不齊石作蜀公良孺公夏首公肩定后處鄡單奚容蒧罕父黑顏祖榮旗句井疆左人郢秦祖鄭國縣成原亢公祖句茲廉潔燕伋叔仲會樂咳公西輿如狄黑邽巽孔忠陳亢公西蒧琴張顏之僕步叔乘施之常秦非申棖顏噲左丘明周敦頤張載程皓程頤邵雍朱熹凡六十九人先儒公羊高穀梁赤伏勝孔安國毛萇后蒼高堂生董仲舒王通杜子春韓愈司馬光歐陽修胡安國楊時呂祖謙羅從彥蔡沈李侗陸九淵張栻許衡真德秀王守仁陳獻章薛瑄胡居仁凡二十八人啓聖祠啓聖公位正中南嚮配位先賢顏無繇曾點孔鯉孟孫氏東西嚮兩廡從祀先儒周輔成程珦蔡元定朱松九年世祖視學釋奠先師王公百官齊戒陪祀前期衍聖公率孔顏曾孟仲五氏世襲五經博士孔氏族五人顏曾孟仲族各二人赴都暨五氏子孫居京秩者咸與祭是歲授孔氏南宗博士一人奉西安祀十四年給事中張文光言追王固誣聖而大成文宣四字亦不足以盡聖宜改題至聖先師從之康熙六年頒太學中和韶樂二十二年御書萬世師表額懸大成殿並頒直省學宮二十六年御製孔子贊序顏曾思孟四贊鑱之石揭其文頒直省五十一年以朱子昌明聖學升躋十哲位次卜子尋命宋儒范仲淹從祀雍正元年詔追封孔子五代王爵於是錫木金父公曰肇聖祈父公曰裕聖防叔公曰詒聖伯夏公曰昌聖叔梁公曰啓聖更啓聖祠曰崇聖肇聖位中裕聖左詒聖右昌聖次左啓聖次右俱南嚮配饗從祀如故二年視學釋奠世宗以祔饗廟庭諸賢有先罷宜復或舊闕宜增與孰應祔祀崇聖祠者命廷臣考議議上帝曰戴聖何休非純儒鄭衆盧植服虔范寧守一家言視鄭康成淳質深通者有間其他諸儒是否允協應再確議復議上於是復祀者六人曰林放蘧瑗秦冉顏何鄭康成范寧增祀者二十人曰孔子弟子縣亶牧皮孟子弟子樂正子公都子萬章公孫丑漢諸葛亮宋尹焞魏了翁黃幹陳淳何基王柏趙復元金履祥許謙陳澔明羅欽順蔡清國朝陸隴其入崇聖祠者一人宋橫渠張子迪尋命避先師諱加邑為邱地名讀如期音惟圜丘字不改四年八月仲丁世宗親詣釋奠初春秋二祀無親祭制至是始定犧牲籩豆視丁祭行禮二跪六拜奠帛獻爵改立為跪仍讀祝不飲福受胙尚書分獻四配侍郎分獻十一哲兩廡明年定八月二十七日先師誕辰官民軍士致齊一日以為常又明年御書生民未有額頒懸如故事十一年定親祭儀香案前三上香乾隆二年諭易大成殿及門黃瓦崇聖祠緑瓦復元儒吳澄祀三年升有子若為十二哲位次卜子商移朱子次顓孫子師是歲上丁帝親視學釋奠嚴駕出至廟門外降輿入中門俟大次出盥訖入大成中門升階三上香行二跪六拜禮有司以次奠獻正殿分獻官升東西階入左右門詣四配十二哲位前兩廡分獻官分詣先賢先儒位前上香奠獻畢帝三拜亞獻終獻如初釋奠用三獻始此其祭崇聖祠拜位在階下承祭官升東階入左門詣肇聖王位前上香畢分獻官升東西階入左右門分詣配位及兩廡從位前上香三跪九拜奠帛讀祝初獻時行凡三獻禮畢自是為恆式十八年改正太學丁祭牲品依闕里例用少牢十二哲東西各一案兩廡各三案崇聖祠四配兩廡東西各一案十二哲位各一帛東西共二篚其分獻正殿東西翰林官各奠三爵西廡國子監四人共奠三爵十二哲兩廡奉爵用肄業諸生定兩廡位序按史傳年代先後之三十三年葺文廟成增大門先師廟額正殿及門曰大成帝親書榜製碑記選內府尊彝中十器凡犧尊雷文壺子爵內言卣康侯爵鼎盟簋雷紋觚召仲簋素洗犧首罍各一頒之成均五十年新建辟雍成親臨講學釋奠如故嘉慶中兩舉臨雍儀道光二年詔劉宗周三年湯斌五年黃道周六年陸贄呂坤八年孫奇逢從祀先儒八年湖北學政王贈芳請祀陳良帝以言行無可考寢其議未幾御史牛鑑以李顒請部議謂然帝斥之十六年詔祀孔子不得與佛老同廟是後復以宋臣文天祥宋儒謝良佐侑饗云咸豐初增先賢公明儀宋臣李綱韓琦侑饗三年二月上丁行釋菜禮越六日臨雍講學自聖賢後裔以至太學諸生圜橋而聽者雲集七年增聖兄孟皮從祀崇聖祠先賢公孫僑從祀聖廟宋臣陸秀夫明儒曹端並入之十年用禮臣言從祀盛典以闡聖學傳道統為斷餘各視其所行分入忠義名宦鄉賢至名臣碩輔已配饗帝王廟者毋再滋議同治二年御史劉育楠以祔祀新章過嚴如宋儒黃震輩均不得預恐釀人心風俗之憂帝責其迂謬是歲魯人毛亨明呂方孝孺並侑饗於是更訂增祀位次各按時代為序乃定公羊高伏勝毛亨孔安國后蒼鄭康成范寧陸贄范仲淹歐陽修司馬光謝良佐羅從彥李綱張栻陸九淵陳淳真德秀何基文天祥趙復金履祥陳澔方孝孺薛瑄胡居仁羅欽順呂劉宗周孫奇逢陸隴其列東廡穀梁赤高堂生董仲舒毛萇杜子春諸葛亮王通韓愈胡瑗韓琦楊時尹焞胡安國李侗呂祖謙黃幹蔡沈魏了翁王柏陸秀夫許衡吳澄許謙曹端陳獻章蔡清王守仁呂坤黃道周湯斌列西廡並繪圖頒各省七年以宋臣袁燮先儒張履祥從祀光緒初元增入先儒陸世儀自是漢儒許慎河間獻王劉德先儒張伯行宋儒輔廣游酢呂大臨並祀焉二十年仲秋上丁親詣釋奠仍用飲福受胙儀三十二年冬十二月升為大祀先師祀典自明成化弘治間已定八佾十二籩豆嘉靖九年用張璁議始釐為中祀康熙時祭酒王士禛嘗請酌采成弘制議久未行至是命禮臣具儀上奏言孔子德參兩大道冠百王自漢至明典多缺略我聖祖釋奠闕里三跪九拜曲柄黃蓋留供廟庭世宗臨雍止稱詣學案前上香奠帛獻爵跪而不立黃瓦飾廟五代封王聖誕致齊聖諱敬避高宗釋奠均法聖祖躬行三獻垂為常儀崇德報功遠軼前代已隱寓升大祀至意世宗諭言堯舜禹湯文武之道賴孔子以不墜魯論一書尤切日用能使萬世倫紀明名分辨人心正風俗端此所以為生民未有也聖訓煌煌後先一揆近雖學派紛歧而顯示欽崇自足收經正民興巨效疏上於是文廟改覆黃瓦樂用八佾增武舞釋奠躬詣有事遣親王代分獻四配用大學士十二哲兩廡用尚書祀日入大成左門升階入殿左門行三跪九拜禮上香奠帛爵俱跪三獻俱親行出亦如之遣代則四配用尚書餘用侍郎出入自右門不飲福受胙崇聖祠本改親王承祭若代釋奠則以大學士為之分獻配位用侍郎西廡用內閣學士餘如故三十四年定文廟九楹三階五陛制御史趙啓霖請以王夫之黃宗羲顧炎武從祀下部議先是署禮部侍郎郭嵩燾湖北學政孔祥霖請夫之從祀江西學政陳寶琛請宗羲炎武從祀並被駁至是部議謂三人生當明季毅然以窮經為天下倡德性問學尊道并行第夫之黃書原極諸篇託旨春秋宗羲明夷待訪録原君原臣諸篇取義孟子似近偏激惟炎武醇乎其醇應允炎武從祀夫之宗羲候裁定帝命並祀之闕里文廟有事祭告具前祭告篇春秋致祭同太學康熙中聖祖東巡親祭禮部具儀駐蹕次日帝服龍袞行在儀仗具陳行禮二跪六拜配位十哲兩廡啓聖祠皆遣官分獻扈從諸臣文官知府武官副將以上衍聖公暨各氏子孫在職者咸陪祀聖心猶未安命更議尋定迎神送神俱三跪九拜惟樂章與國學小異可令太常司樂及樂舞生先往肄習帝親製祝文祀日詣廟至奎文閣前降輦如齊所小憩自大次出入大成門登殿釋奠畢御詩禮堂講書禮成周視廟庭車服禮器更常服駕如孔林