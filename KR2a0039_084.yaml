祭如漢軍祀炮儀其後定滿洲祀炮依漢軍例季秋赴盧溝橋演炮即以其日祭焉三十年祀炮始用祝版並專設祭器羣祀先醫初沿明舊致祭太醫院景惠殿歲仲春上甲遣官行禮祀三皇中伏羲左神農右黃帝四配句芒風后祝融力牧東廡僦貸季岐伯伯高少師雷公伊尹淳于意華陀皇甫謐巢元方韋慈藏錢乙劉完素李果十四人西則鬼臾區俞跗少俞桐君馬師皇扁鵲張機王叔和葛洪孫思邈王氷朱肱張元素朱彥修十四人禮部尚書承祭兩廡分獻以太醫院官禮用三跪九拜三獻雍正中命太醫院官咸致齊陪祀都城隍廟有二舊瀋陽城隍廟自元訖明祀典勿替清初建都後升為都城隍廟有司以時致祭其在燕京者建廟宣武門內順治八年仲秋遣太常卿致祭歲以為常用太牢禮獻如祀先醫萬壽節遣祭加果品雍正中改遣大臣嗣復命親王行禮禁城城隍廟建城西北隅皇城城隍廟建西安門內曰永佑宮萬壽節或季秋遣內府大臣承祭用少牢北極佑聖真君廟建地安門外日中坊橋東曰靈明顯佑宮順治中定制萬壽節遣官祭後改遣大臣設果盤五餅餌盤十五茶盞三行禮三跪九拜火神廟建日中橋西康熙初定歲六月二十三日遣太常卿祭後改遣大臣用少牢雍正中改太牢帛初用白乾隆中改用赤餘如祀北極儀東嶽廟在朝陽門外歲祭以萬壽節龍神之祭黑龍潭廟建西北金山巔聖祖世宗親製碑記乾隆五年錫號昭靈沛澤玉泉山廟九年錫號惠濟慈佑昆明湖祠舊曰廣潤靈雨祠錫號安佑普濟嘉慶中加沛澤廣生京畿旱帝親禱黑龍潭廟乾隆四十六年錫號昭靈廣濟嘉慶間始列祀典遣散秩大臣往祭惠濟祠河神廟建綺春園內祀天后龍神河神並春秋致祭遣圓明園大臣將事儀品俱視都城隍廟其祀之無定時定所及有司以時專祭者后土司工之神順治初制凡大興作因其方築左右壇建綵棚遣官往祭用少牢餅果若大工迎吻祭琉璃窰神暨各門神如祭司工禮咸豐間錫號圓明園春雨軒司工神曰昭休敷禧真君土母曰夫人命內府大臣春秋奉祀司機神順治季年設織造局始行祭告禮部長官主之司倉神通州三倉舊惟西倉有祠京內七倉惟右翼興平倉有祠雍正間重葺繇是左翼置廟海運倉京外五倉置廟儲濟倉並立神位倉場侍郎承祭用少牢果品倉監督陪祀二跪六拜諸祭將事以黎明與祭者咸朝服此其大凡也至特旨建祠京師者具見後簡若夫直省禦災捍患有功德於民者則錫封號建專祠所在有司秩祀如典世祖朝宿遷祀河神宋謝緒聖祖朝成都祀諸葛亮福建暨各省祀天后宋林氏女世宗朝各省祀猛將軍元劉承忠先是直隸總督李維鈞奏蝗災土人禱猛將軍廟患輒除於是下各省立廟祀已兩江總督查弼納亦言猛將軍廟祀所在無蝗害無廟處皆為災被訶責詔言水旱蝗災疆吏當修省勿專事祈禱錢塘祀伍員封英衛公臨安祀錢鏐封誠應王蕭山祀宋張夏封靜安公紹興祀明知府湯紹忠封寧江伯後司事莫龍附焉汶上祀明尚書宋禮封寧漕公老人白英封永濟神附焉灌縣祀秦蜀守李冰封敷澤興濟通裕王子二郎為承績廣惠英顯王德清祀元戴繼元封保濟顯佑侯徐聞祀故水師副將江啓龍封英佑驍騎將軍後附祀張瑜錫號襄靖普佑江南山陽祀唐許遠封威靈顯佑王浮梁祀張巡錫號顯佑安瀾高宗朝陳留祀河神守才後建廟江南曰靈佑觀清河祀明張襄封彰靈衛漕將軍廣西祀蜀將武當封顯佑英濟廣福王濱河各縣祀故河督朱之錫封助順永寧侯仁宗朝追封天后父積慶公母曰夫人永綏鎮筸祀宋楊灝封宣威助順靖遠侯蕪湖祀蜀漢孫夫人曹縣祀張桓侯飛趙將軍雲江南山陽祀湖神談氏封昭靈顯佑水府都君南昌祀旌陽令許遜封靈感普濟神直省祀純陽演正警化孚佑帝君唐呂岩仁和祀孚順侯宋蔣崇仁弟孚惠侯崇義孚佑侯崇信會稽祀漢曹娥封福應夫人慈溪祀天井潭神宋劉揚祖義烏祀明漕運總管陳道興都昌左蠡鎮祀元將軍長興湖州蘇州祀太湖神明王天英高郵祀露筋祠神淮揚運河廳祀康澤靈應侯宋耿裕德漢城祀竇孝婦錢塘祀金華將軍五代曹杲宣宗朝翁源祀元詹姓三神並封侯建德祀故知府王光鼎浙江新城祀宣靈王周雄黔陽祀殉難知縣周文煜鄞縣祀濱江靈廟神宋朝說之封孚惠侯白鶴山廟神唐任侗茅山廟神張仁皓長沙祀元李育萬封廣濟李真人莆田祀宋長樂錢氏室女蕭山祀江塘神元楊伯遠妻王氏又祀唐董戈管張實張耀張聖宋盧萬故知縣賈國楨姚文熊浙江祀太湖神晉張賁鄒溪廟神宋裴肅仁和祀宋施全為興福廟神奉化祀元馬稱德為進林廟神滕縣祀明馮克利為三界廟神慈溪祀漢張竟暨子齊芳杭州祀靈感廣大觀音大士加封慈濟郫縣祀古蜀王杜宇開明綿州祀漢蔣琬新寧祀宋陳仲真欽州祀故副將景懋永定河張秋鎮並祀九龍陳將軍福建歸化祀福順夫人莘氏文宗朝臨清東昌河南正陽關並祀金龍四大王靖遠鎮遠綏遠三侯俱晉王爵永城祀觀音大士孚佑帝君潮陽及江南高堰祀顯佑安南神潮陽祀威顯靈佑王廣東祀明石康令羅神長沙祀晉陶淡暨姪烜並號陶真人桂平祀孚應惠濟王宋甘佃連江祀崇福昭惠慈濟夫人唐陳昌女孚濟將軍黃助暨弟昭遠將軍會稽祀回向廟神漢陳德道杭州嘉興湯陰武昌並祀宋嶽飛三水祀玄壇正一真神靈山祀明朱將軍統鑒潮州祀安濟王漢王伉奉化祀漢陳鴻歸善祀明王守仁後唐何澤元談道歙縣祀唐汪華陳程靈洗暨子文季嚴州祀孚惠王唐邵仁祥鎮洋祀元忠正王李祿宋忠惠侯楊滋壽寧祀懿政天仙馬氏女全州祀無量壽佛唐周全真威信侯柴崇攸縣祀唐杉仙真人陳皎淳安祀吳山陰侯賀齊宜章祀唐武陵侯黃師浩四會祀宋阮大師子郁梁化師慈能南雄祀聖