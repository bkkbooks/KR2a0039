body:
  text: 清史稿卷八十五志六十禮四吉禮四堂子祭天坤寧宮祀神令節設供求福祀神奉先殿壽皇殿安佑宮綏成殿附滿洲跳神儀堂子祭天清初起自遼瀋有設杆祭天禮又於靜室總祀社稷諸神祇名曰堂子建築城東內治門外即古明堂會祀羣神之義世祖既定鼎燕京沿國俗度地長安左門外仍建堂子正中為饗殿五楹南嚮彙祀羣神上覆黃琉璃前為拜天圜殿北嚮中設神杆石座稍後兩翼分設各六行行各六重皇子列第一重次親王郡王貝勒貝子公各按行序均北嚮東南為上神殿三楹南嚮祭禮不一而以元旦拜天出征凱旋為重皆帝所躬祭其餘月祭杆祭浴佛祭馬祭則率遣所司崇德建元定制歲元旦帝率親王藩王迄副都統行禮尋限貝勒止已復限郡王止並遣護衛往挂紙帛凡親祭前期十二月二十六日內府官赴坤寧宮請朝祭夕祭神位安奉神輿內監舁行前引御仗八鐙四司俎官六人掌儀司一人侍衛十人導至饗殿供奉朝夕獻香如儀故事神位所懸紙帛月終積貯盛以囊除夕送堂子與淨紙神杆等同焚時內府大臣率長史護衛挂新紙帛各二十有七昧爽帝乘輿出宮陪祀王公等隨行至堂子內門降入中門詣圜殿就拜位南嚮率羣臣行三跪九叩禮畢回鑾翼日奉神位還宮康熙十一年詔元旦拜堂子禮宜明備用鳴贊官明年罷漢官與祭二十九年諭令皇子隨行禮內府大臣圜殿進楮帛畢次進皇太子楮帛月祭歲正月初旬諏吉餘月朔日司俎二人就杉柱上挂紙帛數等元旦案陳時食盤一醴酒盞一司香上香內監執三絃琵琶坐甬道西守堂子人持拍板坐其東司祝進跪司香授盞司祝受之獻酒奏神絃鳴拍板拊掌應節凡六獻皆贊歌鄂囉羅守堂子人亦歌獻畢一叩興合掌致敬絃板止司祝執神刀進奏絃拍板如初司祝一叩興司俎贊歌鄂囉羅衆和歌司祝舉神刀誦神歌曰上天之子紐歡台吉武篤本貝子某年生小子某年生小子今敬祝者豐於首而仔於肩衛於後而護於前畀以嘉祥兮齒其兒而髮其黃兮偕老而成雙兮年其增而歲其長兮根其固而神其康兮神兮貺我神兮佑我永我年而壽我兮凡三禱如前儀誦贊者九司祝跪一叩興誦贊三絃板止復跪一叩興合掌退立杆大祭歲春秋二季月朔或二四八十月上旬諏吉行杆木以松長三丈圍徑五寸先一月所司往延慶州屬採樹梢留枝葉九層架為杆齎至堂子前期一日樹之石座崇德初定親王郡王貝勒祭三杆貝子鎮國輔國公二鎮國輔國將軍一月朔大內致祭初二日後依次祭凡祭三杆者定期內祭其一過旬祭其二祀日有數家同者仍按位為等差違例多祭與爭先越祭並處罰後改定大內至入八分公俱祭一杆將軍不祭屆日司香豫懸神幔炕上置漆案陳碟三前置案黃磁碗二圜殿置二案高者陳爐卑者陳碗前設綵氈司俎二人赴坤寧宮請佛亭及菩薩關帝像舁至堂子安佛亭於座像懸幔以三繩繫兩殿神杆間懸黃幡挂紙帛圜殿挂帛亦如之饗殿北炕案上陳打糕搓條餑餑盤九酒盞三圜殿高案則盤三盞一每獻司祝挹碗酒注盞兩殿祭獻歌禱如前儀祝辭曰上天之子佛及菩薩大君先師三軍之師關聖帝君某年生小子某年生小子今敬祝者貫九以盈具八以呈九期屆滿立杆禮行爰繫索繩爰備粢盛以祭於神靈餘辭同月祭卒事司香捲幔徹像奉入宮若帝親祭殿內敷綵席覆紅氈甬道布棕薦屆時乘輿出宮滿大臣隨扈至堂子街王公跽俟興從之帝降輿入中門詣饗殿前東嚮坐司祝獻酒舉神刀禱祝奏絃拍板拊掌歌鄂囉羅帝入一跪三叩圜殿同畢升座賜王公等炕前坐尚膳正司俎官進胙糕尚茶正獻福酒帝受胙分賜各王公禮成還宮遇壇廟齋期或清明節再涓吉以祀月朔祀東南隅尚錫神亭即堂子上神殿也神曰田苗神案上盤一盞一分陳時食醴酒司香上香司俎挂淨紙杉柱上諸王護衛依次挂之內管領一人入除冠服解帶跪叩祝辭曰上天之子尚錫之神月巳更矣建始維新某年生小子敬備粢盛兮潔楮並陳惠我某年生小子貺以嘉祥兮畀以康寧畢退或謂祀明副總兵鄧子龍也以與太祖有舊誼故附祀之四月八日佛誕祭祀前期饗殿懸神幔選覺羅妻正副贊祀二人為司祝祭日不祈報不宰牲不理刑名屆時赴坤寧宮請佛亭及菩薩關聖像司俎內監置椴葉餑餑釀酒紅蜜於盒以從至則陳香鐙獻糕酒取紅蜜暨諸王供蜜各少許注黃磁浴池司祝請佛浴畢以新棉承座還奉佛亭陳椴葉餑餑九盤酒盞香碟各三並諸王所供餑餑酒圜殿亦如之司香上香司祝獻酒九巡餘略如月祭杆祭崇德元年定八旗王貝勒各一人依次供獻厥後唯親王郡王行之馬祭歲春秋季月為所乘馬祀圜殿正日司俎挂紙帛如常數陳打糕一盤醴酒一盞縛馬尾緑紬二十對司香上香牧牽十馬色皆白立甬道下司祝六獻酒奏樂如儀所禱之神同月祭唯祝辭則易為所乘馬敬祝者撫脊以起兮引鬣以興兮嘶風以奮兮噓霧以行兮食草以壯兮齧艾以騰兮溝穴其弗踰兮盜賊其無擾兮神其貺我神其佑我禱訖取紬條就香爐薰禱司俎以授牧長繫之馬尾是日馬神室並奉朝祭夕祭神位遣內府大臣行禮朝祭豫懸幔舁供佛小亭奉炕上案陳香酒食品司俎進二豕熟而薦之司香上香舉盞授司祝司祝進跪三獻歌奏如前訖授盞司香一叩興合掌致敬復跪祝一叩興取縛馬尾紅紬條七十對就香碟薰禱授司俎官轉授上駟院侍衛分給各廠院卿侍衛長入隨食肉其夕祭儀略如朝祭候肉熟分陳案上進跪叩祝同司祝坐杌置夕祭定處設小案小腰鈴別置神鈴案東展背鐙布幕振鈴杆搖腰鈴誦神歌前後所禱所祝之神詳下背鐙祭其辭禱同朝祭祈請者四禱後跪祝辭供肉祝辭亦如之畢取縛馬尾青紬條三十對仍就香碟薰禱授如初翼日為牧羣滋息復行朝夕祭如初禮唯祝辭易今為牧羣繁息六字溝穴二句易為如萌芽之發育兮如根本之滋榮兮餘辭並同又司香取縛馬尾紬條二百八十對皆青色崇德初制為馬羣致祭唯親王至輔國公得行乾隆三十六年定春秋騸馬致祭薩滿叩頭薩滿者贊祀也訖取所送青色十馬繫緑紬條如數又定朝祭御馬拴紅紬條大淩河騾馬拴青紬條為恆制凡出師凱旋皆有事堂子崇德元年太宗征明及朝鮮明年班師並告祭世祖定中原建堂子嗣是聖祖平吳三桂察哈爾迄歷朝靖亂皆以禮祗告凡親征告祭命下涓吉屆期兵部建大纛具祀纛篇帝御戎服出宮乘騎前後翊衛午門鳴鐘鼓法駕鹵簿為導饒歌大樂備而不作至玉河橋軍士鳴角螺帝入堂子街門降騎角螺止入中門詣圜殿就拜位南嚮立率羣臣行三跪九叩禮角螺齊鳴出內門致禮纛神禮成樂作車駕啓行凱旋日率大將軍及從征將士詣堂子告成若命重臣經略軍務以討不庭禮亦如之乾隆十四年詔言堂子致祭所祭即天神也列祖御宇稽古郊禋燔柴巨典舉必以時堂子則舊俗相承凡遇大事及春秋季月上旬必祭天祈報歲首尤先展禮定鼎以來恪遵舊制考經訓祭天有郊有類有祈穀祈年禮本不一兵戎國之大事命將先禮堂子正類祭遺意禮纛即禡也或在行營別有征討不及祭告堂子則行望祭其誠敬如此夫出師告遣凱旋即當告至乃天地宗社皆已祝册致虔且受成太學而堂子則弗及禮官疏略如神貺何其詳議以聞尋奏凱旋告祭之禮報可坤寧宮祀神昉自盛京既建堂子祀天復設神位清寧宮正寢世祖定燕京率循舊制定坤寧宮祀神禮宮廣九楹東暖閣懸高宗御製銘略言首在盛京清寧正寢建極熙鴻貞符義審思媚嗣徽松茂竹苞神罔時恫執豕酌匏其眷眷祀神如此宮西供朝祭神位北夕祭神位廷樹杆以祀天朝祭神為佛為關聖夕祭神為穆哩罕諸神祝辭所稱納丹岱琿為七星之祀喀屯諾延為蒙古神並以先世有功而祀者餘如年錫安春阿雅喇諸號納爾琿安哲鄂囉羅諸字雖訓義未詳而流傳有自綜其所祀曰元旦行禮曰日祭曰月祭及翼日祭曰報祭曰大祭曰背鐙祭及翼日祭曰四季獻神其儀節大率類堂子茲略舉其小異者元旦子刻司香上香帝后行禮日祭順治初定大內日祭朝以丑寅夕以未申朝祭司香豫懸黃幔奉菩薩關帝像東嚮左右炕上置低桌二陳爐盞各三時果九糕十炕前置獻案黃磁碗二虛其一以一實酒案下列樽酒前設采氈昧爽司俎等進二豕司香獻香執絃板內監暨司俎官帥屬進奏神絃拍板拊掌應節司祝跪六獻酒灌虛碗中一叩興合掌致敬餘如堂子朝祭儀司祝復跪一叩興又誦贊三絃板止侍側帝親詣入門立神位前司祝先跪帝跪司祝致辭帝行禮興司祝叩興合掌致敬后隨行禮將事者俱退留司俎司祝司香婦人侍行禮時帝南后北帝不與祭司祝叩興後徹盞奉神像納黃筒位西楹大亭中徙幔稍南安關帝像正中執絃板者進跪坐司香斂氈三折之奏絃拍板如初司祝跽氈上致辭獻香酒司祝酌酒執豕耳灌之一叩絃板止司祝舉豕於俎復奏拍灌如初一叩興退司俎如法刲牲熟而薦之司香獻香司俎進跪凡三獻俱奏絃拍板拊掌畢徹饌列胙長案上或帝率后受胙或率王公等食肉否則大臣侍衛進食之夕祭司香豫懸青幔西樹杆懸大小神鈴七幔內奉穆哩罕神畫像神蒙古神南嚮前低桌二陳爐盞各五別懸菩薩像西楹大亭鋪油紙設案如朝祭既上香司祝繫裙束腰鈴擊手鼓坐杌上誦神歌祈請曰自天而降阿琿年錫之神與日分精年錫之神年錫唯靈安春阿雅喇穆哩穆哩哈納丹岱琿納爾琿軒初恩都哩僧固拜滿章京納丹威瑚哩恩都蒙鄂樂喀屯諾延某年生小子今為所乘馬敬祝者云云辭同馬祭擊鼓拍板和之初禱曰納丹岱琿納爾琿軒初二禱曰恩都哩僧固三禱曰拜滿章京納丹威瑚哩恩都蒙鄂樂喀屯諾延三禱並為馬祝云云皆擊鼓為節內監亦擊拍板以和止退釋手鼓腰鈴司香設采氈帝親行禮如朝祭儀后隨行則帝東后西刲牲薦俎暨叩跪致辭如初畢遇齋期國忌不宰牲並十二月二十六日請神送堂子後宮內均停祭乾隆十二年制定坤寧宮祭神背鐙供獻其儀夕祭薦肉後司香斂氈展青綢幕掩鐙火衆出闔戶留司祝及執板鼓內監侍司祝坐杌上振杆鈴初向神鈴致祈請辭曰哲伊埒呼哲納爾琿掩戶牖以迓神兮納爾琿息甑竈以迓神兮納爾琿來將迎兮侑坐以俟納爾琿祕以俟兮几筵具陳納爾琿納丹岱琿藹然降兮納爾琿卓爾歡鐘依惠然臨兮納爾琿感於神靈兮來格蒞於神鈴兮來歇納爾琿二次搖神鈴致禱辭曰納丹岱琿納爾琿軒初卓爾歡鐘依珠嚕珠克特亨某年生小子今為所乘馬祝者云云餘辭同馬祭三次向腰鈴致祈請辭曰哲伊埒呼哲古伊雙寬列几筵以敬迓古伊雙寬潔粢盛兮以恭延古伊雙寬來將迎兮盡敬古伊雙寬祕以俟兮申虔古伊雙寬乘羽葆兮陟於位古伊雙寬應鈴響兮降於壇古伊雙寬四次搖腰鈴復致禱辭曰籲者唯神迓者斐孫犧牲既陳奔走臣鄰仍為所乘馬敬祝者云云每次並擊鼓拍板以和畢啓扉明鐙司俎徹俎司香捲幔奉神像納朱匱月祭略同日祭唯食品因月而殊灌豕耳以酒不以水如為皇子祭祀則司祝禱祝皇子叩拜翼日祭天安佛菩薩像西楹大亭神杆東北置案一西嚮奉杆倚柱座前杆首嚮東仰案陳銀盤三一實米居中西北置幔架覆紅罽東北置牲案昧爽司俎進一豕司香設采氈閾內帝行禮嚮神杆南面跪司俎進舉盤中米灑之祝禱畢興不親祭則司祝奉御衣叩拜后隨行帝居中后傍西刲牲熟薦陳頸膽左右銀盤縷肉為膾列碗二佐以筯炊稗為飯列碗二佐以匙相間以獻帝復行禮灑米如初禮成司俎奉頸骨杆端膽膾及米置杆碗杆遂立以所獻肉飯進帝后受胙退如為皇子祭天則皇子叩拜不親祭則司祝奉皇子衣服叩拜報祭歲春秋二季立杆大祭前期四旬釀酒西炕上祭前一日漉之司香染布為神冠製楮帛大祭日司俎婦人打糕作穆丹條子餘如前儀其翼日祭天與月祭翼日同四孟月大祭亦曰四季獻神懸朝祭夕祭神幔並同日祭儀涓吉具馬二牛一金銀錠各二蟒緞龍緞片金倭緞閃緞各色緞十毛青布十置案掌儀官等前引內府大臣上駟院卿同行自乾清右門舁入徑交泰殿至坤寧宮門外陳馬於西列牛於東司俎等奉金銀緞布入司香陳案上奉朝祭神位前加金銀其上司祝跪致辭一叩興復舉案夕祭神位前如上儀帝親祭禮同月朔陳獻畢司香舉金銀緞布貯案下侍衛等牽牛馬出越三日宮殿監諸神位前以金銀緞布及牛馬授會計司發售計直購豕以祭故事帝獵南苑或他所射得鹿如尾蹄腑臟無傷者雖小創必整潔之備供獻傷多體缺者舍之至四時進獻按時以奉春雛雞二夏子鵝一秋魚一冬雉二選肥且澤者以將誠焉令節設供萬壽節元旦節宮殿監率各首領設供案天香亭內北嚮奉安神牌香爥鐙爐斗香拜褥各具陳祭品七十有五屆時帝拈香行禮畢送燎還宮冬至夏至或未親行郊禮則設供宮中宮殿監設供案冬至北嚮夏至南嚮奉安神牌祭品同拈香送燎亦如之立春立夏立秋立冬設案如前儀春東嚮夏南嚮秋西嚮冬北嚮陳祭品三十有六羊豕各一儀如初仲春朔祭日仲秋望祭月七月七夕祭牛女陳祭品四十有九帝行禮畢宮殿監奏請皇后皇貴妃貴妃妃嬪行禮畢帝送燎還宮求福祀神所稱佛立佛多鄂謨錫瑪瑪者知為保嬰而祀也亦名換索其儀諏吉有期豫釀醴酒前期數日選無事故滿洲九家攢取棉線綢片捻線索二紐小方戒綢三先一日司俎官偕奉宸苑官赴西苑斫取柳條全株高九尺圍徑三寸屆期赴坤寧宮廊下樹柳枝於石懸淨紙戒綢幔懸神像炕上設低案一陳香碟醴酒各三豆糕煤糕打糕各九西炕設求福高案陳鯉魚稗米飯水子各二醴酒豆糕等皆九數稍北植神箭懸線索其上用三色綢片夾繫之令穿出戶繫之柳枝司香展采氈帝后親詣行禮如朝祭儀內監司俎官率屬進奏神絃鳴拍板司祝執神刀進誦神歌禱辭曰聚九家之綵線樹柳枝以牽繩舉揚神箭以祈福佑以致敬誠某年生小子綏以多福承之於首介以繁祉服之於膺千祥薈集九阜盈亦既孔皆福祿來成神兮貺我神兮佑我豐於首而仔於肩衛於後而護於前畀以嘉祥兮偕老而成雙兮富厚而成雙兮富厚而豐穰兮如葉之茂兮如木之榮兮食則體腴兮飲則滋營兮甘旨其獻兮朱顏其鮮兮歲其增而根其固兮年其永而壽其延兮如是者三衆歌鄂囉羅和之禱畢司香舉線索神箭授司祝司香舁高案出戶外列柳枝前司祝左執神刀右執神箭立案前帝立正中后立檻內東次皆跪司祝對柳枝舉揚神箭以練麻拭其枝初次誦禱畢舉箭奉練麻進帝三埒而懷之歌如前帝后一叩興柳枝上灑以酒夾以糕司祝揚箭歌禱如式凡三帝詣神位前跪司祝以箭上線索二分奉帝后致辭叩興合掌致敬帝后同一叩興司祝進神胙帝后受之還宮祀肉與糕不出門則分給諸人令戶內盡食之其夕祭求福帝后行禮如夕祭儀柳枝所繫線索貯於囊懸西壁上其枝司俎官齎送堂子至除夕與神杆紙帛爇化之奉先殿順治十三年詔建景運門東北前後各九楹如太廟寢制中為堂左神庫右神廚明年殿成世祖躬妥神位讀祝大饗定制元旦冬至歲除萬壽册封月朔望奉神位前殿帝親行禮供獻如太廟大饗儀唯立春上元四月八日端陽重陽皆尋常節國忌清明霜降十月朔屬哀慕期親祭不贊禮作樂七夕如常供四月八日七月望日陳素果月薦新帝親獻凡常例供獻後殿行之饗太廟畢行躬告禮上香燭又定日供湯飯果肉各五盤元旦萬壽請太廟後殿四祖四后神位至奉先殿與列聖列后合饗其後罷奉請就太廟後殿祀之是歲冬御經筵上親祭焉十七年以併夾室乖制諭令夾室行廊外中通為敞殿九楹乃改建如旨明年聖祖嗣服用禮臣言依明洪武三年例朝夕焚香朔望瞻拜時節獻新生忌致祭具常饌行家人禮其冬世祖升祔奉神位至前殿行大饗禮成還奉後殿神龕厥後祔饗倣此康熙十三年罷日供食早晚燃香燭十五年罷册封大饗遣官祗告後殿凡上徽號册立御經筵耕藉謁陵巡狩回鑾亦如之雍正十三年準太廟時饗例增上香儀乾隆二年修殿徙神位暫安太廟其秋會值太祖太宗忌辰帝擬親饗羣臣言故事無素服入廟乃止道光元年增修後殿龕座中室列龕三奉太祖太宗世祖左一室龕二奉聖祖高宗右一室龕二奉世宗仁宗昭穆仍舊制餘四室分列八龕焉凡親饗先三日致齋先一日掌儀司進祝版割牲瘞毛血潔治祭品屆日昧爽內監啓寢室神龕執事官各事咸備內府官省畢分詣寢室前跪上香三叩興奉列聖列后神位以次行皇后祔饗同至前殿安於座位南嚮祔后西嚮詣各香案前跪三叩興屆時帝袞服出宮至誠肅門降輿入左門盥訖就拜位北面立迓神奏貽平章導詣太祖香案前跪上炷香一瓣香三旋位行三跪九叩禮導詣皇后香案前立上香旋位行初獻禮奏敉平章舞干戚有司揭尊羃勺挹實爵司帛司爵以次至各案前獻訖司祝詣祝案前跪三叩興跪案左奉祝版帝跪司祝讀祝興安於篚叩如初帝三叩興行亞獻禮奏敷平章舞羽籥獻爵儀如初行終獻禮奏紹平章餘並同初獻徹饌奏光平章畢請神還寢室三叩退贊舉還宮樂奏乂平章帝復行三跪九叩司祝司帛以次送燎所帝轉立東旁禮成仍出左門餘如來儀或遣皇子代祭前諸儀同殿門外正中設拜位入右門至西階下盥手升階詣拜位行禮祝帛送燎避立西旁仍自西階退其月朔薦新正月鯉魚青韭鴨卵二月萵苣菠菜小蔥芹菜鱖魚三月王瓜蔞萵蕓薹茼蒿蘿蔔四月櫻桃茄子雛雞五月桃杏李桑椹蕨香瓜子鵝六月杜梨西瓜葡萄蘋果七月梨蓮子菱藕榛仁野雞八月山藥栗實野鴨九月柿雁十月松仁軟棗蘑菰木耳十一月銀魚鹿肉十二月蓼芽緑豆芽兔蟫蝗魚其豌豆大麥文官果諸鮮品或廷旨特薦者隨時內監獻之順治十四年定月薦鮮獻粢盛牲品康熙十三年定薦新日掌儀司詣後殿行禮獻帛爵用侍衛壽皇殿舊制三室在景山東北太祖太宗世祖及列后聖容向奉體仁閣雍正元年命御史莽鵠立繪聖祖御容供奉壽皇殿中殿遇聖誕忌辰元旦令節率皇子近支王公展謁奠獻凡奉安山陵升祔太廟禮成皆親詣致祭蓋月必瞻禮或至三詣焉乾隆元年奉世宗聖容東一室嗣後列朝聖容依次奉東西室為恆例三年定謁陵省方啓蹕回鑾均詣壽皇殿行禮尋定萬壽節行禮如諸令節儀十三年徙建景山正中如安佑宮制大殿九室左右殿各三楹東西配殿各五楹其冬成高宗親製碑記其頌曰唯堯巍巍唯舜重華祖考則之不競不絿仁漸義摩祖考式之弘仁皇仁明憲帝憲小子職之是繼是繩曰明曰旦小子忽之天遊雲殂春露秋霜豫心惻惻考奉祖御於是壽皇豫仍即之制廣而正爰經爰營工勿亟之陟降依憑居歆攸室羹牆得之佑我後嗣綿𥜥於萬匪萬億之觀德於茲無然畔援承欽識之十五年諭前代安奉神御率在寺中別殿淨宇本無定所敬念列祖創垂顯承斯在永懷先澤瞻仰長新式衷廟祫之儀斯協家庭之制應迎列祖列后聖容奉壽皇殿歲朝合請懸供肅將祼獻於是奉聖祖世宗御容並自體仁閣迎太祖太宗世祖御容乃定除夕敬懸供鮮果肉醬元旦大饗獻磁器籩豆供品並上香行禮初二日如除夕供禮畢尊藏又元旦帝有事堂子奉先殿訖詣壽皇殿行禮除夕初二日命皇子番行上元節供餅餌秋季展聖容宮殿監敬謹將事是歲繪列朝聖容成親詣奉安行大饗嘉慶四年詔壽皇殿供奉神御始自聖祖凡遇忌辰誕辰皆應躬親展敬示子孫遵行安佑宮亦如之安佑宮在圓明園西北隅建工始乾隆五年迄八年蕆事大殿九室朱扉黃甍如寢廟制中龕懸聖祖御容左世宗右高宗龕前陳器書册佩用服物合設中和韶樂一列帝臨御園中遇列聖誕辰忌辰令節朔望並拈香行禮謁陵省方啓鑾回蹕皆躬詣祗告焉高宗親製碑記略言朔酌望獻西漢原廟遺制宋時神御殿亦本斯義蓋奉安列朝御容所也上元結鐙樓寒食設秋千視漢已備而崇建遍郡國奉祀在禪院識者譏之我皇祖聖祖恩澤旁覃僻邑窮谷飲其德而不知子孫臣庶躬被教育者宜其謳歌慨慕而未有已也是以皇考世宗謹就壽皇殿奉安御容朔望瞻禮而於皇祖所幸暢春園亦陳薦如儀有漢宋備物備禮之誠無宋代祀繁致褻之弊豫小子心懍紹庭念茲圓明園為我皇考囿沼地築室九楹敬奉皇祖其中奉皇考配東一室所謂禮緣義起有其舉之莫敢廢也永佑寺在熱河避暑山莊萬樹園旁乾隆十六年建有樓五楹奉聖祖世宗高宗御容雲山勝地樓奉仁宗御容陳設一如安佑宮車駕蒞至輒懸奉回蹕後庋藏丹墀列高宗御製碑文略言創立精藍爰名永佑固不特鐘魚梵唄足令三十六景借證聲聞而皇祖聖日所照千秋萬歲後子孫臣庶莫不永如在之思是即釋迦之耆闍崛山金剛法座天龍擁護而所以繩武寧親祝釐養志亦於是託焉云爾仁宗御製永佑寺瞻禮敬紀亦頗惓惓祖若父焉道光時移供聖御繼德堂更題曰綏成殿中室聖祖左世宗右高宗左次室仁宗以後列朝御容仍依次懸左右室云滿洲俗尚跳神其儀內室供神牌或用木龕室正中西北龕各一凡室南嚮北嚮以西方為上東嚮西嚮以南方為上頗與禮經合南龕下懸簾幕黃雲緞為之北龕上置杌杌下陳香盤三木為之春秋擇日致祭謂為跳神前一月造酒神房前三日朝暮獻牲各二名曰烏雲即引祀也前一日神前供打糕各九盤以為散獻大祀日五鼓獻糕主人吉服嚮西跪設神幄嚮東中設如來觀音神位女巫舞刀祝曰敬獻糕餌以祈康年主人跪擊神版諸護衛亦擊並彈絃箏月琴和之其聲嗚嗚然巫歌畢主人一叩興司香婦請神出戶牖西設龕南嚮奉之司俎者呼進牲牲入主人跪家人皆跪巫者前致辭以酒灌牲耳牲耳司俎高聲曰神已領牲主人叩謝庖人刲牲熟而薦之主人再拜謁巫致辭主人叩畢巫以繫馬吉帛進祝如儀主人跪領帛以授司牧一叩興乃集宗人食胙肉令毋出戶庭其夕供七仙女長白山神遠祖始祖位西南嚮以神幕蔽窗牖舞刀進牲致祝如朝儀唯伐銅鼓作淵淵聲主家亦擊手鼓架鼓以銅鼓聲為應誦益急跳益甚禮成衆受福次早設位庭院前位北嚮主人吉服如儀用男巫致辭畢灑以米趨退主人叩拜牲肉皆刲為葅醢和稻米以進名曰祭天還願又明日神位前祈福供餅餌綴五色縷祝辭畢以縷繫主人胸謂之受福三日祭乃畢長白滿洲舊族近興京城者祀典禮儀皆同唯舒穆祿氏供昊天上帝如來菩薩諸像又供貂神其側納蘭氏則供羊雞魚鴨諸品巫者身繫銅鈴跳舞以鈴墜為宜男兆蒙古跳神用羊酒輝和跳神以一人介胄持弓矢坐牆堵蓋先世有劫祀者故豫使人防之因沿為制跳神之舉清初盛行其誦祝辭者曰薩嗎迄嘉慶時罕用薩嗎跳神者然其祭固未嘗廢也
