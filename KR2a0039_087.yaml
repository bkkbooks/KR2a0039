body:
  text: 清史稿卷八十七志六十二禮六吉禮六昭忠祠賢良祠功臣專祠宗室家廟品官士庶家祭昭忠祠雍正二年諭曰周禮有司勳之官凡有功者書名太常祭於大蒸祭法以死勤事則祀之於以崇德報功風厲忠節自太祖創業後將帥之臣守土之官沒身捍國良可嘉憫允宜立祠京邑世世血食其偏裨士卒殉難者亦附祀左右褒崇表闡俾遠近觀聽勃然可生忠義之心並為立傳垂永久於是建祠崇文門內歲春秋仲月諏吉遣官致祭王公大臣位正殿陳案七羊一豕一左三案共羊豕各一右如之每案素帛一爵三果盤五諸臣位兩配樓暨後正室各設案五兩廡各設案三皆羊豕各一為通數兵士附祀案三十有六案設豕肉一盤爵三果品二太常卿承祭配樓後室司官分獻六年祠成命曰昭忠頒御書額曰表奬忠勳明年循序定位前殿正中祀敬謹莊親王尼堪英誠武勳王揚古利定南武壯王孔有德贈忠勇王黃芳度武襄公巴爾堪凡五人東次龕祀安北將軍佟國綱一等公佟養正達福西哈一等侯馬得功一等伯巴什太都統宜理布巴都里議政大臣程尼穆和琳大學士張泰議政大臣羅沙三等伯王之鼎總督范承謨額駙托柏大學士龍西色思泰總督額倫特尚書查弼納圖捫太子太保佟濟倉場侍郎王秉仁巡撫傅弘烈都統博波圖議政大臣雅賚道禪名蓋參贊內大臣馬爾薩凡二十八人西次龕祀續順公沈瑞輔國公巴賽大學士莫洛尚書布顏岱十六大臣綽和諾巡撫柯永升都統沙里布巡撫馬雄鎮總督甘文焜佟養甲侍郎朝哈爾鹽運使高天爵參領費揚古統領圖魯錫喀爾他拉喀爾護吉副都統海蘭蘇圖統領胡里布哈克三佐領葉喜侍郎永國統領阿爾岱提督孫定遼凡二十有四人東又次龕統領劉哈副都統盧錫科布蘇阿喀倪納爾特錫密賚科爾坤多頗洛戴豪渾錦魏正羅濟阿什圖覺羅阿克善常祿阿爾護吉三巴雅思虎朗凡十有八人西又次龕提督段應舉副都統穆舒孟魁白原任巡撫賈維鑰副都統邁圖參領葛思特巡撫朱國治張文衡侍郎馬如璧糧道葉映榴巡道陳啓泰通政使莫洛渾一等子穆克覃阿納達代音布巡道陳丹赤一等子覺羅莫洛渾數亦如之東末龕總兵吳萬福徐勇費雅達朱天貴張存福都督僉事洪徵總兵阿爾泰歐陽凱兵備道李懋祖總兵楊佐統領張廷輔遊擊楊光祖統領定壽總兵王承業侍衛錫喇巴布政使遲變龍凡十有六人西末龕參領郭色統領新泰提督康泰二等子覺羅顧納岱總兵司九經二等子拜蘭總兵郝效忠劉良臣三等子巴郎都爾莽鼐副將楊虎參將趙登舉守備紀法參將甘應龍副將蔡隆二等子拜三一等男路什總兵康海凡十有七人後室配樓左右次龕又次龕兩廡暨各次龕祀官千五百餘人東西房附祀兵士萬三百有奇八年定制以滿尚書都統一人承祭後室兩廡太常官分獻十一年令子孫居京秩者隨祭乾隆十三年諭祀陳亡總兵任舉侍衛丹泰旋令征金川陳沒將士并入之十五年祀都統傅清左都御史拉布敦十八年追封巴爾堪巴賽並為簡親王移巴爾堪位揚古利上巴賽位孔有德上初前室左右各三龕止序爵秩不繫時代至是定議自天命以來按代序官同代同官序年月依賢良祠例按時班爵為序其兵士設位分前後廡以橫板隔別之中葉以後入祀者將軍班第明瑞溫福都統滿福扎拉豐阿參贊大臣鄂容安統領觀音保烏三太台斐音阿提督許世亨副都統呼爾起阿第木保覺羅明善總兵王玉廷李全德福貴林張朝龍而海蘭察以病沒端濟布以傷亦並入之至典史溫模死守通渭從容就義特豫入祠且有取義舍生賞延於世褒諭流外微官獲邀廕茂典也嘉慶朝祀大學士福康安將軍德楞泰提督花連布總兵多爾濟札普知縣強克捷先是康熙間巡撫曹申吉已入祠至是以阿附吳三桂按實奪之時各省言沒王事者奏報猥雜龕位不給於是詔建各省昭忠祠其京祠定文三品武二品以上及八旗官辨為限已祀者如故嗣是卑官預祀視特旨行故事承祭官循例朝服今改蟒袍補服示別壇廟也道光初元以國初殉難副將楊祖光等入祀厥後賡入者都統巴彥巴圖烏淩阿印登額參贊大臣慶祥總督裕謙提督海淩阿關天培陳化成副都統海齡長喜總兵萬建功祥福葛雲飛鄭國鴻王錫朋謝朝恩江繼藝慶和吳喜副將烏大魁馬韜周承恩劉大忠陳連升朱貴瑪隆阿伊克坦布等其卑秩中如知縣楊延亮縣丞方振聲守備馬步衢把總陳玉威亦足多者咸豐三年更定典文四品武三品官得再入京祠并獲祀陳亡所在地其文五品武四品以下凡贈職銜及當例者並祀之是時軍興死事揚烈者踵起略舉其所入者都統烏蘭泰霍隆武將軍佟鑑祥厚蘇布通阿扎拉芬和春總督吳文鎔陸建瀛提督長瑞長壽董光甲邵鶴齡恩長福珠洪阿陳勝元雙福王錦繡常祿雙來瞿騰龍佟攀梅鄧紹良德安周天培史榮椿張國梁周天受王浚樂善褚克昌一等男阿爾精阿一等子左炘侍郎呂賢基戴熙巡撫常大淳江忠源陶思培鄒鳴鶴吉爾杭阿徐有壬學政孫銘恩張錫庚副都統伊勒東阿哲克東阿達洪阿貴升綳闊博奇常壽西林布多隆武托克通阿格綳額伊興額舒明安頭等侍衛達崇阿布政使嶽興阿劉裕鉁塗文鈞李續賓李孟羣王友端按察使李卿穀周玉衡贊善趙振祚郎中宋蔚謙總兵博春福諴馬濟美玉山程三光劉開泰桂林王國才蔣福長虎坤元羅玉斌邱聯恩田興奇承惠陳大富滕家勝郭啓元王之敬道員羅澤南朱鎮金光筯帥遠燡溫紹原何桂珍王訓趙印川郭沛霖黃淳熙繆梓知府謝子澄劉騰鶴江炳琳副將謝升恩膺保李成虎彭三元周雲耀龍汝元同治朝則親王僧格林沁大學士曾國藩都統海全舒通額將軍多隆阿統領舒保參贊大臣錫霖武隆額領隊大臣色普詩惠慶達春泰穆克登額辦事大臣扎克當阿頭等侍衛隆春奇克塔善內閣學士金順提督占泰李臣典向榮塔齊布林文察蕭河清周顯承羅朝雲蕭德揚楊得勝曹仁美毛福益張仁泗劉松山談玉龍羅雨春張紹武胡良作姚連升饒得勝劉長槐榮維善楊春祥張萬美魯光明閻定邦劉祥發曹德喜巡撫王有齡羅遵殿鄧爾恆副都統錫齡阿蘇倫保恆齡按察使黃運昌總兵郝上庠雷升熊建益林向榮余際昌郎桂芳江福山何建鼇羅應貴毛芳恆張樹珊唐殿魁周兆麒李大櫆陳清彥鄧鴻超江登雲傅先宗道員福咸俞焜趙景賢張同登趙國澍瑞春周縉秦聚奎彭育橘葛承霖鄧子垣知府朱鈞薑錫恩竇天灝于醇儒副將劉神山黃金友周學貴羅春鵬王夢齡張起鳳劉勝龍光緒間則大學士左宗棠總督恆春曾國荃將軍明緒領隊大臣崇熙烏勒德春托克托布博勒果素托克托奈喀爾莽阿參贊大臣額騰額覺羅奎棟辦事大臣奎英薩淩阿提督朱南英李秀山湛其英楊世俊王子龍文德盛陳忠德滕學義何明海魏金闕文德昌李登第王慶福楊萬義楊必耀李大洪鍾興發張宗久楊玉科劉思河李其森梁善明鹽運使陶士霖總兵石紹文陳登雲鄧仁和黃應斗周友山朱希廣王茂連王春和談聲俊達年剛安泰向集梧鄧承恩韋和禮劉節高陳嘉左寶貴周康祿黃鼎葉維藩侯雲登戶部主事玉潤知府龔秉琳侯學雲馬椿齡張瀚中副將王世晉李天和章茂張定邦尤正廷楊隆輝張玉秋王碧庭徐安邦李啓榮裕廉王宗高二十六年尚書崇綺將軍延茂總督李秉衡並入祀尋罷秉衡凡祠祭諸臣大都效命戎行守陴徇義或積勞沒身褒忠節勸來者會典綦詳茲録什一以見例焉雍正初各省立忠義祠凡已旌表者設位祠中春秋展祀乾隆四十一年定明代殉國諸臣既邀諡典並許入祠又諸生韋布山樵市隱者流遂志成仁亦如前例嘉慶七年始令各省府城建昭忠祠或附祀關帝及城隍廟凡陳亡文武官暨兵士鄉勇按籍入祀八旗二品以上官已祀京祠者仍許陳亡所在地祠祀合五十人一龕位祀正中兵勇則百人或數十人一位分列兩旁駐防位緑營上春秋二奠有司親蒞用少牢果品上香薦帛三獻如儀同治二年允曾國藩請江寧建昭忠祠祀湖南水陸師陳亡員辨已復抗節官紳亦許崇祀並建專祠婦女殉難者亦別立貞烈祠云賢良祠雍正八年詔曰古者大蒸之祭凡法施於民以勞定國者皆列祀典受明禋我朝開國以後名臣碩輔先後相望或勳垂節鉞或節厲冰霜既樹羽儀宜隆俎豆俾世世為臣者觀感奮發知所慕效庶明良喜起副豫厚期京師宜擇地建祠命曰賢良春秋展祀永光盛典乃營廟宇在地安門外西偏正殿後室各五楹東西廡歲春秋仲月諏吉遣官致祭前殿案各素帛一羊一豕一果五盤後室果品同唯牲帛共案而具一承祭官蟒服二跪六叩三獻餘如常儀於是僉議怡賢親王允祥宗功元祀宜居首大學士公圖海公賴塔大學士張英尚書顧八代馬爾漢趙申喬河道總督靳輔齊蘇勒總督楊宗仁巡撫陳璸咸列其選自是先後賡續入祠者大學士范文程巴克什達海阿蘭泰李之芳吳琠張玉書李光地富寧安張鵬翮寧完我魏裔介額色黑王熙領侍衛內大臣福善費揚古尹德尚書勵杜訥徐潮姚文然魏象樞湯斌提督張勇王進寶孫思克施琅總督趙良棟于成龍傅臘塔孟喬芳李國英都統馮國相李國翰根特統領莽依圖將軍阿爾納愛星阿佛尼埒副都統褚庫巴圖魯明年祠成頒御書額曰崇忠念舊設位為祭前殿內大臣或散秩大臣尚書都統主之後殿用太常寺長官入祠日子孫咸與行禮春秋遣官陪祀同十二年祀大學士田從典高其位乾隆元年命入祀諸臣未豫諡者悉追豫是歲祀尚書銜兼祭酒楊名時大學士朱軾內大臣哈世屯尚書米思翰五年祀總督李衛明年祀尚書徐元夢巡撫徐士林十年釐定祠位前殿正中祀怡賢親王後室諸臣合一龕首世次最先者餘分左右行按世序爵大學士居前次領侍衛內大臣尚書都統將軍總督前鋒護軍統領提督侍郎巡撫副都統以次分列至世爵有子男授尚書都統者有侯伯為侍郎副都統者仍視官秩為差嗣是入祀則超勇親王策凌列怡賢親王左次龕名臣則大學士馬齊伊桑阿福敏黃廷桂蔣溥史貽直梁詩正來保傅恆尹繼善陳宏謀劉綸劉統勳舒赫德高晉英廉徐本高斌協辦大學士兆惠左都御史拉布敦尚書汪由敦李元亮阿里袞尚書銜錢陳羣都統傅清將軍和起伊勒圖奎林總督那蘇圖陳大受喀爾吉善鶴年吳達善何煟袁守侗方觀承薩載提督許世亨巡撫潘思矩鄂弼李湖傅弘烈弘烈自雍正時拉布敦傅清自乾隆時並入昭忠祠今再祀賢良者也嘉慶朝則祀大學士福康安阿桂劉墉王杰朱圭戴衢亨董誥尚書董邦達彭元瑞奉寬總督鄂輝道光朝則祀大學士富俊曹振鏞托津長齡盧蔭溥文孚王鼎協辦大學士汪廷珍陳官俊尚書黃鉞隆文將軍玉麟總督楊遇春陶澍河道總督黎世序咸豐朝則祀大學士潘世恩文慶裕誠協辦大學士杜受田侍郎杜堮巡撫胡林翼同治朝則祀大學士桂良祁寯藻官文倭仁曾國藩瑞常賈楨大學士銜翁心存協辦大學士駱秉章總督沈兆霖馬新貽其光緒朝入祀者恭忠親王奕欣名臣大學士文祥英桂全慶載齡左宗棠靈桂寶鋆恩承福錕張之萬麟書額勒和布李鴻章榮祿裕德崑岡崇禮敬信協辦大學士沈桂芬李鴻藻將軍長順總督沈葆楨丁寶楨岑育英曾國荃劉坤一提督宋慶巡撫張曜也宣統初入祀者止大學士王文韶張之洞孫家鼐鹿傳霖協辦大學士戴鴻慈五人而已各省賢良祠雍正十年詔各省會地建祠宇凡外任文武大臣忠勇威愛公論允翕者俾膺祀典用勸在官如將軍蔡良提督張起雲總兵蘇大有魏翥國足稱斯選定制春秋祭日視