body:
  text: 清史稿卷八十九志六十四禮八嘉禮二大婚儀皇子婚儀王公婚禮附公主下嫁儀郡主以下于歸禮附品官士庶婚禮視學儀臨雍附經筵儀日講附策士儀頒詔儀迎接詔書附進書儀進表箋儀巡狩儀鄉飲酒禮大婚儀清初太祖戊子年葉赫國貝勒納林布祿送妹來歸帝率貝勒等迎之大宴禮成時猶未定儀注也太宗即位後行册立禮至順治八年世祖大婚始定納后儀先期諏吉行納采禮前一日遣官祭告郊社太廟屆日質明設節案太和殿禮物具丹陛上陳文馬其下正副使俟丹墀東鳴贊官口贊使臣三跪九拜訖升東階立陛上宣制官傳制使臣跪制曰茲納某氏某女為后命卿等持節行納采禮大學士入奉節出授正使正使受偕副使興前行降中階左執事官納儀物綵亭中儀仗前導衛士牽馬從出太和中門詣后邸后父朝服跪迎門外道右既入使臣陳節中案執事陳儀物左右案陳馬於庭使臣傳制納采以次奉儀物授后父后父跪受興率子弟望闕行禮使臣出跪送如初前期一日行納徵禮所司具大徵儀物遣使傳制如納采儀大婚前一日復遣官祭告屆期鹵簿樂懸具帝御太和殿閲册寶制辭曰皇帝欽奉皇太后懿旨納某氏為皇后茲當吉月令辰備物典册命卿等以禮奉迎遣使如册后儀使臣隨册寶亭出自協和門駕還宮時皇后儀仗陳邸第封使至后父率親屬朝服迎門外后禮服迎庭中后母率諸婦咸朝服跪使臣奉册寶入陳案上后就案南北面跪內院官西嚮立讀册寶文次第授左女官女官跪接獻皇后后祗受轉授右女官亦跪接陳案上盝內后興六肅三跪三叩禮畢升輦女官奉盝置綵亭鼓樂導前次儀仗次鳳輦后父母跪送如跪迎儀輦至協和門儀駕止女官奉盝前行置中宮輦入自中門至太和殿階下降輦入宮帝御中和殿率諸王詣皇太后前行禮畢諸王退帝御太和殿賜后父及親屬宴王公百官咸與皇太后御位育宮即保和殿賜后母及親屬宴公主福晉命婦咸與越三日帝復御太和殿王公百官上表慶賀頒詔如制賜后父母兄弟服物有差十一年大婚越三日后謁皇太后禮畢始宴康熙四年大婚就后邸設納采宴公主輔臣命婦各三人內大臣侍衛及公以下羣臣二品以上咸與大徵亦如之賜后祖父母父母衣服謝恩如儀至日使臣奉册寶至后祗受畢欽天監報時后升輦命婦四人導前七人隨後皆騎內大臣侍衛從至太和殿階下退后降輦內監奉册寶導至中和殿命婦退執事命婦迎侍入宮奉册寶內監授守寶內監退帝詣太皇太后皇太后前行禮御殿賜宴如初皇太后率輔臣命婦入宮賜后母及親屬宴公主福晉不與時加酉宮中設宴行合巹禮翼日后詣兩宮朝見三日受賀頒詔如常儀同治十一年納采大徵發册奉迎悉準成式惟屆時后升輦使臣乘馬先內監扶左右內大臣等騎從至午門外九鳳曲蓋前導行及乾清門龍亭止使臣等退禮部官奉册寶陳交泰殿左右案退輦入乾清宮執事者俱退侍衛合隔扇福晉命婦侍輦入宮宮中開合卺宴禮成光緒十五年大婚越六日后始朝見皇太后又越二日帝受賀餘儀同皇子婚儀先指婚簡大臣命婦偕老者襄事福晉父蟒服詣乾清門北面跪大臣西面傳旨今以某氏女作配皇子某為福晉福晉父三跪九拜退擇吉簡內大臣侍衛隨皇子詣福晉家行文定禮福晉父綵服迎門外皇子升堂拜福晉父答拜三拜興見福晉母亦如之辭出福晉父送大門外行納采禮所司具儀幣並備賜福晉父母服飾鞍馬以內府大臣宮殿監督領侍充使及門福晉父迎入中堂謝恩畢與宴大臣陪福晉父宴中堂命婦女官陪女眷宴內室畢使者還朝復命婚前一日福晉家齎妝具陳皇子宮至日皇子詣帝后前行禮若為妃嬪出則並詣焉吉時屆鑾儀衛備綵輿內府大臣率屬二十護軍四十詣福晉第奉迎綵輿陳堂中女官告升輿福晉升父母家人咸送內校舁行女官從出大門乘馬至禁城門外衆步行隨輿入至皇子宮門降女官導入宮屆合巹時皇子西嚮福晉東嚮行兩拜禮各就坐女官酌酒合和以進皆飲酒饌三行起仍行兩拜禮於時宮所張幕結綵設宴福晉父母親族暨大臣命婦咸與禮成翌日皇子福晉夙興朝見帝后女官引皇子居左稍前三跪九拜福晉居右稍後六肅三跪三拜見所出妃嬪皇子二跪六拜福晉四肅二跪二拜越九日歸寧巳宴偕還不踰午王公婚禮崇德間定制凡親王聘朝臣女為婚納采日府屬官充使是日設宴牲酒盛陳婚日宴亦如之給女父母服物鞍馬符例若外藩親郡王貝勒台吉女儀物視爵次為差婚日宴牲多少異宜世子郡王貝勒貝子鎮輔國公聘娶儀物暨宴日牲酒其數遞降皆有差等順治間更婚制限貝勒以下罷用珠緞賜婚王公詣中和殿或位育宮謝恩其子未受封者婚禮視其父已受封則從其爵康熙初始令王公納采易布為緞餘如故公主下嫁儀指婚日額駙蟒服詣乾清門東階下北面跪襄事大臣西面立宣制以某公主擇配某額駙祗受命謝恩退初定諏日詣午門進一九禮即納采也駝馬筵席羊酒如數得旨分納所司次日燕饗額駙率族中人朝服謁皇太后宮禮訖集保和殿帝升座額駙等三跪九拜御筵既陳進爵大臣跪進酒帝受飲還賜大臣酒跪飲之時額駙等行禮惟一拜徹宴謝恩一跪三拜出至內右門外三跪九拜退凡帝前謝恩皆贊后宮前不贊是日額駙眷屬詣皇太后皇后宮筵宴如儀釐降前一日額駙詣宮門謝恩內府官率鑾儀校送妝奩詣額駙第內管領命婦偕女侍鋪陳至日額駙家備九九禮物如鞍馬甲胄詣午門恭納燕饗如初定禮吉時屆公主吉服詣皇太后帝后暨所生妃嬪前行禮命婦翊升輿下簾內校舁出宮儀仗具列燈炬前引福晉夫人命婦乘輿陪從詣額駙第行合巹禮其日設宴九十席如下嫁外藩但用牲酒成婚後九日歸宮謝恩公主入宮行禮額駙詣慈寧門外乾清門外內右門外行禮天命八年太祖御八角殿訓公主以婦道毋陵侮其夫恣意驕縱違者罪之時議謂王化所由始厥後定制額駙及其父母見公主俱屈膝叩安有賚賜必叩首尋遠古轍已逮道光二十一年宣宗以為非禮所宜稍更儀注額駙見公主植立申敬公主立答之舅姑見公主正立致敬公主亦如之如餽物俱植立免屈膝以重倫紀著為令又定下嫁時停進九九禮並罷筵宴自後罷宴以為常明年改初定進羊九繼此踵行同治時定公主歸寧免額駙內右門行禮餘如前儀郡主于歸禮崇德間定親王嫁女聘儀鞍馬甲胄十有五如嫁外藩親王以下納采用駝馬羊準七九數媵婢八男婦五戶順治時朝臣聘儀鞍馬甲胄各七乾隆時定郡王媵婢六男婦四戶嫁朝臣聘用鞍馬七外藩納采視崇德時為減郡主以下縣主郡君縣君鄉君于歸禮以次遞殺康熙八年定郡主縣主歸寧禁母家給滿洲人口限用蒙漢人八名郡君至鄉君蒙漢人六名將軍至宗室女四名乾隆三十五年罷朝臣進納采禮外藩如故不設宴品官士庶婚禮凡品官論婚先使媒妁通書乃諏吉納采自公侯伯訖九品官儀物以官品為降殺主婚者吉服命子弟為使從者齎儀物至女氏第主婚者吉服迎從者陳儀物於庭奉書致命主婚者受書告廟醴賓賓退送之門使者還復命是日設宴具牲酒公侯以下數各有差婚前一日女氏使人奉箕帚往壻家陳衾帷茵褥器用具屆日壻家豫設合巹宴壻吉服俟備儀從壻承父命親迎以綵輿如女氏第女氏主婚者告廟辭曰某第幾女某將以今日歸某氏乃筓而命之還醮女內室父東母西女盛服出北面再拜侍者斟酒醴女父訓以宜家之道母施襟結帨申父命女識之不唯壻既至入門再拜奠雁出姆為女加景蓋首出壻揖降女從姆導升輿儀衛前導送者隨輿後壻先還輿至門壻導升西階入室踰閾媵布壻席東旁御布婦席西旁交拜訖對筵坐饌入卒食媵御取盞實酒分酳壻婦三酌用巹卒酳壻出媵御施衾枕壻入燭出是日具宴與納采同品官子未任職禮視其父受職者各從其品士婚禮視九品官庶民納采首飾數以四為限輿不飾綵餘與士同婚三日主人主婦率新婦廟見無廟見祖禰於寢如常告儀雍正初定制漢人納采成婚四品以上綢緞首飾限八數食物限十品五品以下減二八品以下又減二軍民紬絹果盒亦以四為限品官婚嫁日用本官執事燈六鼓樂十二人不及品者燈四鼓樂八人禁糜費凡官民皆不得用財禮云視學儀順治建元帝幸太學釋奠先期衍聖公五經博士至聖裔五人元聖及配哲諸裔各二人乘傳赴京各氏子孫現列朝官者各官學師生暨進士舉貢咸與觀禮內閣擬經書祭酒司業撰講章進御屆日大成門東張大次彝倫堂設黃幄御座幄前置御案左右講案二祭酒等奉講章及進講副本書左經右陳於案帝禮服乘輿詣學祭酒司業率官屬諸生跪迎成賢街右駕入幄詣大成殿釋奠禮畢出易袞服幸彝倫堂御講幄升座王公立階上百官立階下衍聖公率博士各氏裔祭酒等率官生就拜位行三跪九叩禮畢自王公訖九卿以次賜坐尋詣堂內跪一叩鴻臚官贊進講祭酒司業入北嚮立所司舉經案進御前賜講官座祭酒等一叩坐依次宣講翰詹四品以下官監官師儒博士聖賢後裔肄業諸生圜聽講畢退聽講者咸退復位序立跪聆傳制辭曰聖人之道如日中天講貫服膺用資治理爾師生勉之祭酒等三跪九叩退賜茶羣臣受飲一叩禮成駕出咸跪送翼日監官博士暨諸生表謝帝御太和殿禮賜如常儀並賜衍聖公各官宴禮部越三日頒敕太學詔諸生策勵賚衍聖公冠服監官博士等衣一襲助教諸生白金有差康熙八年聖祖釋奠太學講經悉準成式雍正二年諭視學大典稱幸非宜嗣後更幸為詣乾隆二年命閔冉言卜顓孫端木六氏博士陪祀觀禮準五氏例行明年帝親視學聖賢各裔暨東野氏來觀禮者三十二人送監求學即召衍聖公等面諭之謂既為聖賢後當心聖賢心非徒讀其書而已必躬行實踐事求無愧方為不負所學其務勤思勉勵克紹心傳三年三月上丁帝親詣太學行釋菜禮越六日臨雍講學王公大臣聖賢後裔以至太學諸生環集橋門璧水間者以萬數臨雍命下既諏吉所司設御幄大成門外其辟雍殿階陳中和韶樂太學門內陳丹陛大樂清樂殿內經書案講案備具如前帝釋奠畢御彝倫堂易袞服臨辟雍太學鳴鐘鼓升座樂奏止有節贊齊班講官侍班糾儀各官就拜位贊跪叩興行二跪六叩禮興若衍聖公入覲先進講大學士以至諸生分班立行禮訖滿滿講官入一叩就坐講四書帝闡發書義宣示臣工圜橋各官生跪聆畢興祭酒講經帝闡經義如初禮餘同視學儀先是御史曹學閔上言宜考古制建辟雍於國子監格部議至四十九年新建國學成明年將臨雍命大臣規濬圜水禮樂備舉特旨奬學閔並令朝鮮使臣隨班觀禮禮成賞賚有差翼日加賚聖賢各氏裔及諸生綢帛道光三年臨雍命廕生豫聽宣講諭監官曰化民成俗基於學校興賢育德責在師儒士先器識漸摩濡染厥有由來爾監臣式茲多士尚其端教術正典型毋即於華毋鄰於固入孝出弟擇友親師庶幾成風紹休聖緒令甲車駕幸魯展禮先師講學闕里豫選聖賢裔二人直講翰林官撰講章前一日張大次奎文閣設御座詩禮堂前置案講案列西簷下屆日陳講章及副本於案帝出行宮衍聖公綵服率五經博士暨各氏跪迎廟門右帝入詣大成殿祭孔子如上丁儀駕出御詩禮堂升座衍聖公以下官隨至序立庭中行三跪九叩禮訖進講直講者一跪三叩興講經書訖俱退駕謁孔林翼日賜衍聖公等帛金書籍有差簡各氏弟子有文行者貢太學凡登仕版並進一階經筵儀初沿明制閣臣例不兼經筵順治九年春秋仲月一舉始令大學士知經筵事尚書左都御史通政使大理卿學士侍班翰林二人進講豫設御案講官案列講章及進講副本左書右經屆時帝常服御文華殿記注官立柱西東面講官等二跪六叩興序立左右侍班官分立其後糾儀官立東西隅鳴贊官贊進講直講官詣案前跪三叩興分就左右案先後講四書與經復位帝宣示清漢文御論各官跪聆畢大學士奏辭感悅興降階行二跪六叩禮畢帝臨文淵閣賜坐賜茶禮成還宮賜宴本仁殿宴畢謝恩康熙十年舉經筵命大學士熊賜履為講官知經筵事頃之聖祖以春秋兩講為期闊疏遂諭日進講弘德殿二十四年定制以大學士左都御史侍郎詹事充經筵講官二月文華殿成舉行典禮世宗踐阼居亮陰未舉雍正三年八月吉日詔言帝王御宇咸資典學朕承庭訓時習簡編味道研經實敷政寧人之本茲當釋服亟宜舉行於是進講如儀乾隆五年諭曰經筵之設藉獻針規近進講章辭多頌美殊失咨警古意人君敷政正賴以古證今獻可替否其務剴切敷陳期裨政學庶有當稽古典學實義七年經筵日雨禮臣依例請改期諭曰魏文侯出獵遇雨尚不失信虞人矧茲大典復經祭告詎宜改期執事諸臣可衣雨服列班暫罷階下行禮殿內賜茶諸儀嗣後遇雨倣此翰林院專司日講冬夏至前一日乃輟十四年以進呈經史漸等具文諭令停止五十一年御經筵賜宴禮臣隨侍者分東西班特命歌抑戒詩嘉慶中張鵬展疏請翰林科道日進經義奏議詔責其迂文宗登極曾國藩請復日講舊典格部議次年咸豐紀元正月遂奉特旨令翰詹諸臣番直並躬製題目俾撰講義分日呈覽迄光宣之際猶依此例云策士儀天聰間始開科取士順治初會試中式舉人集天安門考試十五年改試太和殿丹墀定臨軒策士制先期一日丹陛上正中太和殿內東偏分設黃案東西閣簷下備試桌屆日質明內閣官朝服捧策題置殿內案上帝御太和殿王公百官侍立鴻臚寺官引貢士詣丹陛下立大學士取題授禮部官跪受置丹陛案上三叩舉案降左階陳御道正中讀卷官執事官各三跪九叩諸貢士亦如之畢駕還宮徙試桌丹墀左右北嚮禮部官散題貢士跪受三叩就桌對策訖受卷彌封諸官俟左廡簷下收封盛入卷箱收掌官送讀卷官校閲不御殿王以下官不會集不陳鹵簿閲卷三日畢翼辰前列十卷簽擬名次緘封呈御覽帝御養心殿西暖閣閣畢召讀卷官入親定甲乙授之出拆彌封依次繕寫緑頭籤引十人進乾清門祗俟西階下帝御宮讀卷官捧籤入跪呈引班官引十人跪丹陛中依次奏名籍興退帝親定一甲三人二甲七人授籤讀卷官跪受興退率十人侍立西階下駕還便殿十人先出讀卷官捧卷詣紅本房填寫名次畢交內閣題金榜傳臚日設鹵簿陳樂懸王公百官列侍貢士皆公服冠三枝九葉頂冠立班末帝御太和殿讀卷等官行禮如初奉榜授受如奉策題儀鴻臚寺官引貢士就位跪聽傳制曰某年月日策試天下貢士第一甲賜進士及第第二甲賜進士出身第三甲賜同進士出身贊一甲一名某令出班前跪贊二三名亦然贊二甲一名某等若干名三甲某等若干名不出班同行三跪九叩禮退立禮部官舉榜出中路一甲進士從諸進士出左右掖門置榜龍亭復行三叩禮校尉舁亭鼓樂前導至東長安門外張之三日後繳內閣於是順天府備傘蓋儀從送狀元歸第越五日狀元偕諸進士上表謝恩如常儀乾隆五十四年殿試改保和殿舉行自後為恆例頒詔儀清初詔書用滿蒙漢三體文順治間定制用滿漢二體頒詔日太和殿前具鹵簿丹墀內植黃蓋雲盤殿東設詔案丹陛中設黃案午門外備龍亭香亭天安門樓雉口中豫置𩽆雲金鳳其東築宣詔臺王公百官朝服集午門內閣學士奉詔書至乾清門用訖鋪黃案帝御殿王公以下行禮畢大學士奉詔書詣殿簷下授禮部尚書尚書跪受訖陳丹陛案上行禮畢置詔書雲盤內覆黃蓋禮部官奉盤自中路出太和門百官從至午門外置龍亭至天安門外橋南奉詔書置高臺黃案上各官按序北嚮立宣讀官臺上西嚮立衆跪聽宣先宣滿文次漢文衆行三跪九叩禮奉詔官取朵雲承詔書繫以綵繩自金鳳口中銜下禮部官接受仍置龍亭出大清門赴禮部望闕列香案尚書率屬行禮詔書謄黃刊頒各省駕不御殿百官祗俟天安門外橋南餘儀同乾隆間定制凡詔書到日有司備龍亭旗仗郊迎朝使降騎奉詔書置龍亭南嚮守土官北嚮行禮鼓樂前導朝使騎以從及公廨衆官先入序立龍亭至庭中朝使東立俟行禮訖奉詔書授展讀官跪受衆官皆跪宣讀畢授詔朝使復置龍亭跪叩如初禮退長吏謄黃分頒各屬詔書所過凡屬五里內府州縣衛各官咸出郭門迎送進書儀定制纂修實録聖訓擇吉進呈帝御殿受書王公百官表賀玉牒本紀次之康熙十一年世祖實録成前期一日太和殿陛東設表案階下列實録案至日具鹵簿陳樂懸監修官奉表陳表亭纂修官奉實録陳綵亭王公百官齊集行禮如儀校尉分舁香亭綵亭出中道表亭由左監修各官從至太和殿丹墀監修等奉實録與表分陳案上帝御殿鴻臚官奏進實録樂作禮部官舉實録案自中道升至殿門外帝興座樂止舉案入乃坐設案保和殿正中監修等立階下齊班贊跪則皆跪贊進表宣表官跪宣畢樂作衆官三跪九叩退立樂止衆復跪宣表官代奏致詞云某親王臣某等暨文武羣臣奏言惟世祖皇帝神功聖德纂述成書光華萬世羣臣歡忭禮當慶賀鴻臚卿宣制答云世祖皇帝功德配天實録纂成朕心歡慶與卿等同之宣訖行禮如初賜茶俱一叩駕還監修等奉實録至乾清門交送大內退雍正中聖祖實録與聖訓同進後以為常乾隆間定實録聖訓歸皇史宬遣監修等奉藏金匱副本存內閣嘉慶十二年更定舉案奉書選貝子以下宗室官將事自仁宗以來帝仍詣皇史宬拈香如往制進玉牒不上表不傳制監修等隨綵亭入中和殿置案上展正中四篋帝立閲俟進全書覽畢送皇史宬十年一纂或不御殿則於宮中覽之凡實録聖訓玉牒並送盛京尊藏自乾隆年始進本紀第諏吉藏皇史宬方略則進二部一藏史宬一交禮部刊發時憲書成欽天監官歲以十月朔日進並頒賜王公百官午門行頒朔禮頒到直省督撫受朔如常儀進表箋儀凡萬壽節及元日長至在京王公百官各進表文在外將軍都統副都統督撫提鎮各進賀表箋彙齊驛遞送部屆日設表案太和殿左楹表文列綵亭舁至午門外奉陳於案帝御殿宣表行禮訖並表箋送內閣收儲皇太后聖壽皇后千秋王公暨內外文武表箋俱陳午門外禮訖亦送內閣表文初用三體字式後專用漢文惟滿洲駐防用清文先期內閣撰擬定式頒發臨期恭進慶賀三大節表式在京稱某親王臣某等諸王貝勒文武官等在外稱某官臣某等誠歡誠忭稽首頓首上言末云臣等無任瞻天仰聖歡忭之至謹奉表稱賀以聞進太皇太后皇太后同皇太子箋式首具官同末云臣等無任歡忭踊躍之至謹奉箋稱賀以聞初元旦冬至直省文武五品以上各進賀表箋萬壽節祗進皇帝表文並由長官彙進督撫不進表箋凡遇大典具本慶賀尋令各省表箋通省用總火牌一專遣齎奉乾隆時以布政使副將不能專達章疏停附進表箋例又定皇后千秋節暨元旦冬至永停箋賀皇太子慶典京朝官集賀不具箋外吏亦免箋賀六十年高宗內禪稱太上皇帝具賀表式云子臣某率王公大臣等謹奏某歲元旦太上皇帝親授大寶子臣敬承慈命謹率同王公文武大臣等奉表賀者末云子臣及諸臣等曷勝欽悅慶忭之至謹奉表稱賀以聞賀皇帝登極表式惟頓首下云恭逢皇上受寶禮成登極紀元謹奉表慶賀者餘如前式巡狩儀皇帝省方觀民特舉時巡盛典既諏吉帝御征衣乘輿出宮領侍衛內大臣等率禁旅翊衛扈蹕諸臣征衣乘騎以次發鑾輅所經禁隨駕官辨擾吏民踐禾稼辦治糧芻悉用公帑將入境督撫提鎮率屬迎道右紳耆量遠近𢔛迎已駐蹕疆吏等朝行營門外翼日望秩方嶽祭昔帝王先師咸親詣至名賢祠墓則遣官官吏入覲詢風土人情臨視河防指授方略召試獻詞賦者拔尤授官閲方鎮兵藉辨材武經過州縣賜復蠲租存問高年差給恩賚順治八年定制駕出巡幸別造香寶攜行並鑄扈從各印加行在字部院章奏內閣彙齊三日一送行在所過禁獻方物又定乘輿所經百里內守土官道右迎送康熙二十三年聖祖南巡定扈從王公大臣及部院員限駕發按次隨行厥後南巡江浙者五至泰安躬祀岱嶽渡河祠河神詣江寧謁明太祖陵四幸五臺一幸西安大率禁奢尚實亟勤民事乾隆間數奉太后南巡若河南若五臺若山東天津翠華所蒞百姓蒙庥六巡江浙揆示工要大建堤堰雖糜巨萬帑金不恤也嘉慶時幸五臺清涼山行慶施澤如康熙故事鄉飲酒禮順治初元沿明舊制令京府暨直省府州縣歲以孟春望日孟冬朔日舉行學宮前一日執事敷坐講堂習禮以致仕官為大賓位西北齒德兼優為僎賓位東北次為介位西南賓之次為三賓位賓主介僎後府州縣官為主人位東南若順天府則府尹為主人司正一人主揚觶教官任之贊引讀律各二人生員任之屆日執事牽牲具饌主人率屬詣學乃速賓賓至迓門外主東賓西三揖讓乃升相嚮再拜賓即席延僎介入如賓禮就位贊揚觶司正升自西階北嚮立賓主皆起立贊揖司正揖賓介以下答揖執事舉冪酌酒於觶授司正司正揚觶而語曰恭惟朝廷率由舊章敦崇禮教舉行鄉飲非為飲食凡我長幼各相勸勉為臣盡忠為子盡孝長幼有序兄友弟恭內睦宗族外和鄉黨毋或廢墜以忝所生讀畢贊飲酒司正立飲贊揖則皆揖司正復位賓介皆坐贊讀律令生員就案北面立咸起立旅揖讀曰律令凡鄉飲酒序長幼論賢良別姦頑年高德劭者上列純謹者肩隨差以齒悖法規者毋俾參席否以違制論敢有譁譟失儀揚觶者糾之讀畢復位贊供饌有司設饌贊獻賓則授主以爵主受之置賓席少退再拜賓答拜於僎亦如之皆坐有司遍酌贊飲酒酒三五行湯三品畢徹饌僎主僚屬居東賓介居西皆再拜贊送賓各三揖出退雍正初元諭鄉飲酒禮所以敬老尊賢厥制甚古順天府行禮日禮部長官監視以為常乾隆八年以各省鄉飲制不畫一或頻年闕略不行舊儀載圖有大賓介賓一賓二賓三賓與一僎二僎三僎名號紛歧按古儀禮賓若有遵者諸公大夫注云今文讀為僎此鄉之人仕至大夫來助主人樂賓主人所榮而遵法者戴記坐僎於西北以輔主人其言主人親速賓及介拜至獻酬辭讓之節甚繁無一言及僎所謂不干主人正禮者也嗣後鄉飲賓介有司當料簡耆紳碩德者任之或鄉居顯宦有來觀禮者依古禮坐東北無則寧闕而不立僎名五十年命歲時舉鄉飲毋曠每行禮奏御製補笙詩六章其制獻賓賓酢主人後酒數行工升鼓瑟歌鹿鳴賓主以下酒三行司饌供羹笙磬作奏南陔間歌魚麗笙由庚司爵以次酌酒司饌供羹者三乃合樂歌關睢工告樂備徹饌賓主咸起立再拜賓介出主人送門外如初迓儀初鄉飲諸費取給公家自道光末葉移充軍餉始改歸地方指辦餘準故事行然行之亦僅矣
