body:
  text: 清史稿卷九十志六十五禮九軍禮親征凱旋命將出征奏凱受降獻俘受俘大閲會閲暨京師訓練附秋獮日食救護三曰軍禮國之大事在祀與戎周官制六軍司九伐權屬司馬而大軍旅大田役其禮則宗伯掌之是因治兵振旅茇舍大閲之教而寓搜苗獮狩之儀以為社礿祊蒸之祭如是則講武為有名而殺獸為有禮有清武功燀赫凡師征受成講肄行圍諸禮節厥制綦備爰古誼分録事要著之於篇古者日食救護太僕贊鼓亦屬夏官今亦類附云親征天命三年太祖頒訓練兵法書躬統步騎征明謁堂子書七恨告天是親征所由始崇德初元太宗伐朝鮮前期誓天告廟頒行軍律令分兵為左右翼至日駕出撫近門陳鹵簿吹螺奏樂祗謁堂子三跪九拜外建八纛致祭如初禮畢啓行康熙三十五年討噶爾丹躬率六師出中道前三日祭告郊廟太歲屆期遣祭道路炮火諸神帝御征衣佩刀乘騎出宮內大臣等翊衛午門鳴鐘鼓軍士鳴角螺祭堂子纛神如儀導迎樂作奏祐平章駕出都門詣陳兵所聲炮二旗軍繼發王公百官𢔛送軍士整伍以次扈蹕每舍周視地勢御營建正中各營環向繚以幔城南設旌門遠斥堠嚴刁斗置巡警二十一所內大臣等率親軍宿衛外設網城東西南三門巡警八所護軍統領率羽林軍徼循禁語譁稽出入又外布幕為重營設四門重各置十人嚴守其從征各官列幕重營外大軍分翼牧馬禁越次駕駐行營諸軍皆止從官奏事如常夜漏初下嚴更鼓斷行人內外禁旅番巡五漏交御營鳴鐘前營角聲起初嚴外營蓐食治裝再嚴前軍拔營三嚴左右軍後軍發輜重從征官俟旌門外辨色舉炮警蹕六師所過守土官迎本境大吏則出境以迎外藩王公暨所部紳耆跪接悉同時巡儀軍行隨時遣祭風雨山川諸神軍中堠望聖祖躬巡整軍伍御旌門簡閲將士至西巴臺使者奉敕諭噶爾丹敵望見大軍棄甲走帝率前軍長驅拖諾分遣將軍進躡乃還噶爾丹未悛是歲秋駕巡北邊聲出塞試鷹減從十月抵白塔駐南關蒙古王以下貢獻駱驛帝賜戰勝兵士食引近御坐遍賚之次日益徹御膳犒軍踰月至呼坦和碩渡河降者踵至噶爾丹就撫乃班師明年帝三駕北征啓行如初禮至橫城止令守土大臣臨河迎蹕時哈密俘噶爾丹子送軍所額魯特部多納發者噶爾丹仰藥死駕自黃河泛舟還凱旋崇德二年太宗征服朝鮮班師日其君臣出城十里外送駕三跪九拜如禮歸則遣大臣二人送之啓蹕即軍前祭纛守土官道迎俟駕過隨軍次承命遙坐賜酒將至盛京二十里會鄭親王等齎奉賀表遂先除道張黃幄俟駕至伏迎道左帝入幄坐王等跪進表大學士受之宣讀畢王等三跪九拜乃大宴宴罷啓行至盛京禮謁堂子還宮康熙三十五年聖祖征噶爾丹破之還蹕拖諾捷入焚香謝天入行營大學士等進賀表王公百官畢賀留牧蒙古王等迎駕行禮喀爾喀札薩克等集營東門請瞻覲皆稽首呼萬歲賜茶及宴賚銀物有差沿途迎獻羅拜者繈至輻湊至清河皇子王公暨羣臣跪迎郊外五里八旗軍校近畿士民亦焚香懸綵扶攜俯伏命前驅毋警蹕環集至數百萬人歡聲雷動帝謁堂子如儀明年朔漠平班師亦如之還宮後遣祭郊社宗廟遍羣神謁陵寢御殿受賀直省官咸進表文頒詔如制帝自勒銘鑱石並建碑太學云命將出征崇德初元太宗命睿王多爾袞等出師征明躬自臨送祭堂子纛神如親征儀遂至演武場諭誡將士順治元年命英王阿濟格為靖遠大將軍征流寇賜敕印其儀午門外具鹵簿陛上張黃幄設御座陳敕印簷東案王公百官會集帝升座大將軍率出征官詣拜位跪內院大臣奉宣滿蒙漢三體敕書授大將軍敕印畢啓行十三年定出師前一日午門前例頒衣馬弓刀並傳集出征各官面授方略賜筵宴行日咸戎服俟午門外頒敕印如初禮康熙十三年命將分出湖廣四川禮畢駕出長安右門送行出征王率各官行至陳兵所禮部設祖帳光祿寺備茶酒內大臣等奉引謝恩首途如故或帝不親送則令親王內大臣往噶爾丹之役先自歸化驛召費揚古為撫遠大將軍至日賞宴聖祖御太和門大臣隅坐其出征運糧大臣分坐金水橋北左右作樂陳百戲命大將軍進御前親賜卮酒跪受叩飲訖都統副都統繼進則令侍衛授酒參領以下十人一列跪飲階上而已復命大臣等遍視衆軍飲宴畢賜與宴者御用蟒幣餘賜幣兵賜布同謝恩出大學士始以敕印授大將軍雍正七年定命將前一日告廟行日告奉先殿並遣官若先出師疆埸即軍前命為大將軍者則命正副使齎敕印往大將軍率屬俟教場廳事設黃案陳敕印大將軍跪宣敕文正使授敕宣印文副使授印大將軍以次祗受轉授左右從官行三跪九叩禮禮成奉入大營乾隆十四年定命將儀三一曰授敕印經略大將軍出師皇帝臨軒頒給二曰祓社凡出師前期告奉先殿禮堂子祭纛三曰祖道經略啓行皇帝親餞賜酒命大臣送郊外具祖帳暨宴儀並詳前徂征儀二一曰整旅經略前隊列御賜軍械次令箭次敕印次標旗大隊軍旅殿令箭標旗數皆十二二曰守土官相見經略過境將軍督撫蟒服出郭迎候文自司道武自總兵以下跽道右及廳事經略正坐將軍督撫側坐文司道武提督以下行庭參禮啓行候送如前儀若頒敕印不御殿即除鹵簿樂懸百官無職事者不會集三十四年命大學士傅恆經略雲南軍務高宗不升殿不禮堂子不祭纛不親送內閣學士奉敕印至太和殿經略等先俟陛階大學士二人立殿外屆時經略升陛印官從大閣學士入奉敕印出經略跪受禮畢奉敕印官前經略後及階下置敕印綵亭內前張黃蓋列御仗從征侍衛前引餘俱後隨至經略第止敕印陳廳案上屆日肅隊行奏凱天聰初元朝鮮奏捷班師車駕出城頓武靖營野次設行幄御營一里外率諸貝勒踰行幄數武立馬以待凱旋既至遂依次排列立纛拜天入覲帝出位迎之諸貝勒行跪拜禮賜筵宴崇德元年征明凱旋太宗率羣臣出城十里迎勞王貝勒等依次成列建纛鳴螺帝率同拜天三跪九叩畢升座王貝勒進獻捷表大學士接受奉御前讀訖跪叩如儀頒旨行抱見禮於是王貝勒進御前一跪三叩賜坐設宴同順治二年南京平豫王班師還世祖赴南苑迎勞樹十餘大纛如初禮十三年定制出征王大臣凱旋遣王公一人偕大臣郊勞康熙元年定凱旋次日帝御殿禮成免將軍等行禮筵宴免桌席止宰牲二十一年大將軍貝子章泰等自雲南奏凱駕至盧溝橋迎勞駐蹕有司治具翼日駕蒞至齊衆拜天以為故事乾隆十四年定奏凱功成祭告天地廟社陵寢釋奠先師勒碑太學命儒臣輯平定方略垂奕𥜥經略大將軍師旋將入城遣廷臣郊勞帝臨軒經略率有功諸臣謝恩繳印敕儀同受敕宴禮既畢兵部核勳績頒爵賞有差厥後定邊將軍兆惠等定西將軍阿桂等奏凱高宗均駐蹕黃新莊行宮築臺郊勞百官咸會設黃幄正中南嚮兩翼青幕各八東西嚮臺在幄南其上建左右纛中設帝拜褥東西下馬紅柱各一帝御龍袞詣臺鳴螺奏鐃歌樂將軍暨從征大臣將士皆擐甲胄跪紅柱外俟駕帝就拜位立將軍暨羣臣班分東西鴻臚官贊跪則皆跪贊叩興帝拜天三跪九叩將軍等如之畢帝御幄升座王公百官立東班幕下禮成帝出幄乘騎凱歌作奏鬯皇威章駕還行宮餘依康熙間故事咸豐五年科爾沁親王僧格林沁平高唐亂還朝日文宗御養心殿行抱見禮慰勞備至先是出師頒參贊大臣關防賜訥庫尼素光刀至是同時獻納受降崇德二年春朝鮮王服罪請降乃築壇漢江東岸設黃幄駕出營樂作濟江登壇鹵簿具朝鮮王率陪臣步行來朝遣官出迎一里外引入帝率同拜天升座國王等伏地請罪贊行三跪九拜禮賜坐位列親王上諸子列貝勒子錫筵宴還其俘並賜王以下貂服六年蒙古貝勒等投誠朝見已命較射選力士角抵賜宴俾盡歡殊典也所貢方物悉卻之乾隆十四年議制凡軍前受降飛章入告報可乃大書露布示中外築壇大營左南嚮壇南百步外樹表建大旗書奉詔納降字降者立其下經略大將軍戎服出鼓吹聲炮參贊大臣等騎從將至壇降者北面匍伏經略登壇正坐參贊僉坐諸將旁立餘皆肅班行降者膝行詣壇下俯首乞命經略宣上德意量加賞賚營門鼓吹殷然降者泥首謝興退獻俘受俘清初太祖太宗以武功征服邊陲俘虜甚衆其時獻受猶無定制也雍正二年討平青海俘至京始定諏吉先獻廟社俘白組繫頸行及太廟街門外北嚮立承祭官朝服至俘伏儀同時饗至社稷街亦如之承祭官入壇致祭儀同春秋祈報監俘者以俘出翼日帝御午門樓受俘正中設御座檐下張黃蓋鹵簿陳闕門南北仗馬次之輦輅陳金水橋南馴象次之王公百官咸集解俘將校立金鼓外俘後隨班位既序帝御龍袞乘輿出宮至太和門大樂鐃吹金鼓振作登樓升座贊進俘丹陛大樂作奏慶平章鴻臚寺官引將校入北面立贊行禮俘入匍伏兵部官跪奏平定某地所獲俘囚謹獻闕下請旨制曰所獻俘交刑部刑部長官跪領旨訖械繫出丹陛大樂作王公百官行禮如常儀若恩赦不誅則宣旨釋縛俘叩首將校引出是日賜將校宴兵部次日賜冠履銀幣有差凡平定疆宇受俘儀並同乾隆時版圖日廓二十年剿平準噶爾獲達瓦齊暨青海羅卜藏丹津先後檻入一歲中兩行斯典越五年底定回疆討平攢拉促浸皆遞舉盛儀先後六歲凱歌四奏時論稱極盛云大閲天聰七年太宗率貝勒等督厲衆軍練習行陳是為大閲之始順治十三年定三歲一舉著為令尋幸南苑命內大臣等擐甲胄閲騎射並演圍獵示羣臣康熙十二年閲兵南苑聖祖擐甲登晾鷹臺御黃幄內大臣都統等各束部曲王貝勒等各率旗屬並自西而東既成列槍鳴號發自東結陳馳以西按翼分植閲畢命樹侯臺上親發五矢皆中的復騎而射一發即中釋甲賜宴乃還厥後行閲或盧溝橋或玉泉山或多倫諾爾地無一定時亦不以三年限也三十四年復幸南苑行閲分八旗為三隊帝率皇子擐甲內大臣等扈從後建龍纛三上三旗侍衛隨行遍閲驍騎護軍前鋒火器諸營立馬軍前角螺鳴伐鼓行陳舁鹿角進甲士麾紅旗槍炮齊發鳴金止再伐鼓發槍炮如初如是者九初進率五丈再進亦如之至十進槍炮環發無間開鹿角成八門首隊出二隊三隊從既成列門闔角鳴呼譟進兩翼隊皆雁綴進鳴金收軍立本陳結隊徐旋首隊殿罷閲還行宮申敕明賞罰未閲前賜軍士食既閲賜酒雍正七年世宗幸南苑閲車騎營兵諭曰此第訓練一端耳遇敵決勝在相機度勢神而明之存乎其人豈區區陳伍間遂足以制敵耶是日操演各依方位旗色為陳式後北征屢以車戰勝乾隆二年大閲幸南苑御帳殿軍隊既齊步軍整列進以十丈為率餘儀同令甲大閲日行宮外陳鹵簿駕出作鐃歌大樂奏壯軍容章及還作清樂奏鬯皇威章凡操時鳴炮三駕出及還同即日賜各旗饌筵羊豕薪炭迄嘉慶間皆如故事行會閲為康熙三十年創典時喀爾喀新附聖祖思訓以法度特命會閲上都七溪乃集其部衆並四十九旗藩王台吉豫屯百里外駕出都上三旗兵從下五旗兵自獨石來會布營設哨三旗護軍為一營居中八旗前鋒為二營五旗護軍為十營火器營兵為四營環御營而屯前鋒為四哨護軍為二十四哨各設廬帳繞營而居蒙古喀爾喀諸屯徙近五十里禁入哨釐賞九等序坐七列網城設宸幄正中御牀左右行帳各二儀仗樂懸具依次置宴蒙古王等居左喀爾喀居右順序習舞衆技畢陳乃命喀爾喀汗濟農諾顏等進御前賜卮酒餘令侍衛分送禮成翼日各營就列陳巨炮帝擐甲閲畢宣敕去其汗號以王貝勒貝子公名爵分錫之台吉分四等比四十九旗依等賜賚恩禮有加餘如儀京營訓練歲以春秋季月合操四次春貫甲秋常服營陳規制如大閲仲春孟秋則按旗登城習鳴螺兵部遣官稽閲歲為常制護軍驍騎營一歲三校騎射前鋒護軍營三歲一較騎射內大臣本旗都統等臨視之至直省講武則以督撫提鎮為閫帥歲季秋霜降日校閲演武場先期立軍幕屆日黎明將士擐甲列陳中建大纛閫帥率將士行禮軍門鼓吹節鉞前導遍閲行陳還登將臺升帳中軍上行陳圖式請令合操遂麾旗聲炮三鳴角擊鼓軍中聞鼓聲前進鳴金則止行陳發槍如京營制閲畢試材官將士騎射申明賞罰犒勞軍士漕河訓練同八旗水師操防出洋信候各省不同歲春秋季月或夏季遇潮平風正則乘戰艦列陳張帆馭風鳴角聲炮具如軍律緑營水師同秋獮清自太祖奮跡東陲率臣下講武校獵習兵太宗踵行之世祖統一區夏數幸南苑令禁旅行圍始立大狩扈從例康熙初元定車駕行圍駐所置護軍統領營總各一人率將校先往度地勢武備院設行營建帳殿繚以黃髹木城立旌門覆以黃幕其外為網城宿衛屯置不越其所十年罷木城改黃幔康熙二十年幸塞外獵南山尋出山海關次烏拉皆御弓矢校獵越二年六月幸古北口外行圍木蘭搜獵始此木蘭在承德府北四百里屬翁牛特先是藩王進獻為搜獵所周千三百餘里林木鬱水草茂群獸聚以孳畜焉至是舉行秋獮典間有冬令再出者三十三年設虎槍營分隸上三旗置總統總領大狩行田遇有猛獸列槍以從並命各省駐防兵歲番獵以為常六十一年復幸塞外行圍賞蒙古王公等衣物定為恆制雍正八年令八旗人習步圍旗各行圍二三次乾隆初元置綜理行營王公大臣一人凡啓行校獵駐蹕守衛諸事皆屬之六年御史叢洞奏請暫停行圍諭曰古者搜苗獮狩因田獵講武事皇祖行圍既裨戎伍復舉政綱至按歷蒙藩曲加恩意尤為懷遠宏略且時方用兵數有徵發行圍偶輟旋即興舉況今承平日久人習宴安弓馬漸不如舊豈可不加振厲是秋木蘭行圍所過州縣寬免額賦十之三永為例圍場凡六十餘所每歲大獮或十八九圍或二十圍踰年一易設圍所在必豫戒期首某所徑某所訖某所收圍並編定其處屆日官兵赴場布列祗俟御蹕臨圍自放圍處作重圍令虎槍營士卒及諸部射生手專射自圍內逸出諸獸高宗每行獵自舊藩四十九旗暨喀爾喀青海諸部分班從圍綏輯備至洎平西域遠藩如左右哈薩克東西布魯特安集延布哈爾朝謁踵集唯恐後時土爾扈特亦皆挈部衆越數萬里來庭帝嘗御布固圖昌阿撫慰之旋賜名曰伊綿國語會極歸極也二十年更定網城植連帳百七十五設旌門三分樹軍纛曰金龍去網城連帳外十許丈為外城植連帳二百五十四設旌門四分樹軍纛曰飛虎去外連帳六十丈周圍警蹕立帳房四十各建旗幟八旗護軍專司之其規制詳密如此凡秋獮先期各駐防長官選材官赴京肄習年例蒙藩選千二百五十人為虞卒謂之圍牆以供合圍役屆期帝戎服乘騎出宮扈引如巡幸儀既駐行營禁兵士踐禾稼擾吏民訶止夜行違者論如律統圍大臣蒞場所按旗整隊中建黃纛為中軍兩翼斜行建紅白二纛為表兩翼末國語曰烏圖哩各建藍纛為表皆受中軍節度管圍大臣以王公大臣領之蒙古王公台吉為副兩烏圖哩則各以巴圖魯侍衛三人率領馳行蟬聯環匝自遠而近蓋圍制有二馳入山林圍而不合曰行圍國語曰阿達密合圍者則於五鼓前管圍大臣率從獵各士旅往視山川大小遠近紆道出場外或三五十里或七八十里齊至看城是為合圍國語曰烏圖哩阿察密看城者即黃幔城也圍既合烏圖哩處虞卒脫帽以鞭擎之高聲傳呼瑪爾噶蒙語謂帽也聲傳遞至中軍凡三次中軍知圍合乃擁纛徐行日出前帝自行營乘騎先至看城少憩俟藍纛至駕出御櫜鞬入中軍周覽圍內形勢凡疾徐進止口敕指麾獸突圍發矢殪之御前大臣侍衛皆射其逸圍外者從官追射或遇猛獸虎槍官兵從之或值場內獸過多則開一面使逸仍禁圍外諸人逐射獲獸已比其類以獻駕還行宮謂之散圍頒所獲於扈從者大獮禮成宴賚有差哨鹿者凡鹿始鳴恆在白露後效其聲呼之可引至厥制與常日不同侍衛等分隊為三約出營十餘里俟旨停第三隊又四五里停第二隊又二三里將至哨鹿所則停第一隊時扈從諸臣止十餘騎而已帝命鎗獲鹿群引領俟旨而三隊以次至御前高宗搜獵木蘭時親御名駿命侍衛等導入深山中望見鹿群命一侍衛舉假鹿頭作呦呦聲引牝鹿至亟發矢殪之取其血以飲不唯益壯亦以習勞也嘉慶時秋獮倣此日食救護順治元年定制遇日食京朝文武百官俱赴禮部救護康熙十四年改由欽天監推算時刻分秒禮部會同驗準行知各省官司其儀凡遇日食八旗滿蒙漢軍都統副都統率屬在所部警備行救護禮順天府則飭役赴部潔淨堂署內外設香案露臺上爐檠具後布百官拜席鑾儀衛官陳金鼓儀門兩旁樂部署史奉鼓俟臺下俱嚮日欽天監官報日初虧鳴贊贊齊班百官素服分五列每班以禮部長官一人領之贊進贊跪叩興樂作俱三跪九叩興班首詣案前三上香復位贊跪則皆跪贊伐鼓署史奉鼓進跪左旁班首擊鼓三聲金鼓齊鳴更番上香祗跪候復圓鼓止百官易吉服行禮如初畢俱退是日禮部祠祭司官欽天監博士各二人赴觀象臺測驗嚮日設香案初虧復圓行禮如儀若月食則在中軍都督府救護尋改太常寺如救日儀直省遇日月食各按欽天監推定時刻分秒隨地救護省會行之督撫署府廳州縣行之各公署並以教職糾儀學弟子員贊引陰陽官報時至領班行禮則以督撫及正官一人主之上香伐鼓祗跪與京師救護同
