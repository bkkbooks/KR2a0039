body:
  text: 清史稿卷九十一志六十六禮十賓禮藩國通禮山海諸國朝貢禮敕封藩服禮外國公使覲見禮內外王公相見禮京官相見禮直省官相見禮士庶相見禮四曰賓禮清初藩服有二類分隸理藩院主客司隸院者蒙古喀爾喀西藏青海廓爾喀是也隸司者曰朝鮮曰越南曰南掌曰緬甸曰蘇祿曰荷蘭曰暹羅曰琉球親疏略判於禮同為屬也西洋諸國始亦屬於藩部逮咸同以降歐風亞雨咄咄逼人覲聘往來締結齊等而於禮則又為敵夫詩歌有客傳載交鄰無論屬國與國要之來者皆賓也我為主人凡所以將事皆賓禮也茲編分著其儀節而王公百官相見禮與士庶相見禮亦附識焉藩國通禮清初蒙古北部喀爾喀三汗同時納貢朔漠蕩平懷柔漸遠北踰瀚海西絶羌荒青海厄魯特西藏準噶爾悉隸版圖荷蘭亦受朝敕稱王名列藩服厥後至者彌衆乃令各守疆圉修職貢設理藩院統之崇德間定制外藩諸部貝勒等有大勳績封和碩親王或多羅郡王次多羅貝勒遣使持信約往封既入境貝勒出迎五里外跽俟制冊過騎以從抵府設香案正中使臣奉冊其上退立左旁貝勒一叩三跪畢興復跪使臣授冊宣讀官宣畢置原案三叩興受冊如初禮貝勒與使臣對行六叩禮使臣坐左貝勒坐右事訖躬送如前凡有詔敕賞賚至亦如之內外札薩克會盟三年一舉使臣齎制往迎送禮同自王以降歲時朝貢者分年番代列班末行禮坐次視內親王貝勒貝子公降一等宴賚有差康熙五十九年定朝覲年例蒙古二十四部為兩班喀爾喀札薩克等為四班雍正四年帝念四十九旗王公台吉遠至勤勞詔改三班二歲一朝咸豐八年以蒙古汗王等遠道輸將諭令停止年班御前行走者番上如故其貢獻儀文按季各旗遣一人來將事年時貢馬匹羊酒交理藩院轉納禮部朝貢賞賚諸典柔遠清吏司掌之山海諸國朝貢禮凡諸國以時修貢遣陪臣來朝延納燕賜典之禮部將入境所在長吏給郵符遴文武官數人伴送有司供館餼遣兵護之按途更代以達京畿既至延入賓館以時稽其人衆均其飲食翼日具表文方物暨從官各服其服詣部俟階下儀制司官設表案堂中質明會同四譯館卿率貢使至禮部侍郎一人出立案左儀制司官二人分立左右楹館卿先升立左楹西通事序班各二人引貢使等升階跪正使舉表館卿祗受以授侍郎陳案上復位使臣等行三跪九叩禮興退館卿率之出禮部官送表內閣俟命貢物納所司如值大朝常朝序班引貢使等列西班末聽贊行禮如儀非朝期則禮部先奏若召見館卿豫戒習儀屆日帝御殿禮部尚書引貢使入通事隨行至丹墀西行禮畢升自西階通事復從之及殿門外跪帝慰問尚書承傳通事轉諭貢使對辭通事譯言尚書代奏畢乃退如示優異則丹墀行禮畢即引入殿右門立右翼大臣末通事立少後賜坐賜茶均隨大臣跪叩飲畢慰問傳答如初出朝所賜尚方飲食退翼日赴午門外謝恩禮部疏請頒賜國王並燕賚貢使既得旨所司陳賜物午門道左館卿率貢使等東面立侍郎西面立有司咸序貢使詣西墀三跪九叩主客司官頒賜物授貢使貢使跪受以次頒賜貢使暨從官從人咸跪受贊興叩如儀退賜宴禮部貢使將歸國光祿寺備牲酒果蔬侍郎就賓館筵燕伴送供偫如前所經省會皆饗之司道一人主其事館餼日給概從周渥焉順治初定制諸國朝貢齎表及方物限船三艘艘百人貢役二十人十三年俄國察罕汗遣使入貢以不諳朝儀却其貢遣之歸明年復表貢途經三載表文仍不合體制世祖以外邦從化宜豫涵容量加恩賞諭令毋入覲康熙三十二年俄復遣使義茲柏阿朗迭義迭來朝帝始召見賜坐賜食五十九年葡萄牙使臣斐拉理入覲帝御九經三事殿使者入殿左門升左陛進表御座則膝行帝受表使者興出凡出入皆三跪九叩賜坐賜茶謝恩如儀初琉球安南暹羅諸使來議政大臣咸會集賜坐及茶乾隆初元諭停止時屬國陪臣增擴敕所司給皇清職貢圖以詔方來四十七年正月紫光閣錫燕朝鮮琉球南掌陪臣與焉燕罷賜珍物五十年舉千叟宴特命朝鮮賀正陪臣齒踰六十者充正副使預宴賦詩越五年安南國王阮光平來京祝壽定行禮班序列親王郡王間其陪臣仍附班末五十八年英吉利入貢使臣瑪戛爾等覲見自陳不習拜跪及至御前而跽伏自若嘉慶初元再舉千叟宴朝鮮安南暹羅廓爾喀額爾德尼王吉爾巴納足塔畢噶爾瑪薩九叩跪奉大皇帝前竊小臣聞湖南教匪滋事致天威震怒遣兵剿除今已平定聞之欣慰小臣受恩深重虔修土産微物表文叩賀天喜小臣屬蒙天恩視如子民唯有一心歸順和睦鄰封小臣陽布離京遠年尚幼伏懇當作奴輩曲施教導霑恩不淺云云其貢物計十二事語質意恭如此二十一年英復遣使來貢執事者告以須行拜跪禮司當冬等遂稱疾不入覲帝怒諭遣歸國罷筵宴賜物嗣是英使不復來庭道光九年回疆敉定上太后徽號緬甸國王遣使進金葉表創舉也故事琉球間歲一貢至十九年詔改四年為期時國王尚育咨達閩撫吳文鎔謂琉球瀕海地患多風朝貢以時風雨和順歲則大熟貢舶出入閩疆歲頒時憲書獲以因時趨事地不産藥賴舶載回應用至航海針法非隨時練習不為功若改四年則恐豐歉不齊人時莫授藥品既缺針盤益疏請復舊制便報可並令陪臣子弟得隨貢使入監讀書光緒三十四年廓爾喀入貢賞正使噶箕二品服副使四品服其將事時服色即各從其品亦前此所未有者凡貢期朝鮮歲至琉球間歲一至安南六歲再至暹羅三歲荷蘭蘇祿五歲南掌十歲均各一至餘道遠貢無常期凡貢物各將其土實非土産者勿進朝鮮安南琉球緬甸蘇祿南掌皆有常物餘唯其所獻敕封藩服禮清自太宗征服朝鮮鑱石三田渡厥後安南琉球諸國先後請封皆遣使往其他回首內嚮者航海匪敻梯山忘阻則璽書褒奬授來使齎還而已崇德間定制凡外邦效順俱頒冊錫爵進奏書牘署大清紀年若朝貢諸國無子嗣位則遣陪臣請朝命禮部奏遣正副使各一人持節往封特賜一品麒麟服以重其行行日工部給旗仗兵部給乘傳封使詣禮部儀制司官一人奉節一人奉詔敕授本部長官以授正副使跪受興出易征衣乘傳往將入境其國邊吏備館傳夫馬緣途所經有司跪接及國嗣封王遣陪臣郊迎三跪九叩勞使者一跪三叩延入館陳詔節龍亭內行禮如儀謁使者三叩不答諏日王率陪臣詣館禮畢王先歸龍亭舁行仗樂前導封使後隨入門陳正中使者及階下馬正使奉節副使奉詔敕入殿陳案上退立東旁王率衆官北面立三跪九叩興詣封位前跪副使奉詔書付宣讀官宣訖王行禮如初出俟門外使者出跪送有間適館勞之使者還朝乃修表文具方物遣陪臣詣闕謝恩如諭祭兼冊封先於其祖廟將事諭祭文陳案上使者左右立世子跪叩如前退立神位左乃宣讀衆俯伏宣畢興送燎行禮使者退次行冊封禮儀與前同至以詔敕授使齎還則禮部設案午門位正中尚書立案左儀制司官從館卿率來使入授詔敕序班引詣案前跪授受如制退詣丹墀西三跪九叩禮成歸授國王謝恩同外國公使覲見禮康熙初外洋始入貢中朝款接稍異藩服南懷仁官欽天監贈工部侍郎凡內廷召見並許侍立不行拜跪禮雍正間羅馬教皇遣使來京世宗許行西禮且與握手乾隆季葉英使馬格里入覲禮臣與議儀式彼以覲見英王為言特旨允用西禮筵宴日且親賜卮酒商約既締將命頻繁咸同間外國使臣嘗求入覲時以禮制乖異力拒之同治時英法使臣固請再四我猶繩以華制莫之應彼且曰宜亟修好阻其入覲是靳以客禮也十二年穆宗親政泰西使臣環請瞻覲呈國書先自言用西禮折腰者三廷臣力言其不便直隸總督李鴻章建議略言先朝召見西使時各國未立和約各使未駐京師國勢雖強不逮今日猶得律以升殿受表常儀然嘉慶中英使來朝已不行三跪九叩禮厥後成約儼然均敵未便以屬禮相繩拒而不見似於情未洽糾以跪拜又似所見不廣第取其敬有餘當恕其禮不足惟宜議立規條俾相遵守各使之來許一見毋再見許一時同見毋單班求見當可杜其覬覦且禮與時變通我朝待屬國有定制待與國無定禮近今商約實數千年變局國家無此禮例往聖亦未豫定禮經是在酌時勢權宜以樹之準時總理各國事務恭親王以拜跪儀節往復申辨而各使堅執如初勢難終拂其意乃為奏請明諭允行其年夏日本使臣副島種臣俄使臣倭良哩美使臣鏤斐迪英使臣威妥瑪法使臣熱福理和蘭使臣費果蓀瞻覲紫光閣呈國書依商訂例行事接見時帝坐立唯意賜茗酒恩自上出使臣訊安否謹致賀辭未垂問毋先言事西例臣見君鞠躬三今改五鞠躬使臣初至始覲見餘則否嗣後親奉國書者仿此其禮式先期繪圖試習覲見某處所某月日時並候旨行其大略也光緒十六年駐英使臣薛福成奏陳各使覲見須定明例凡使臣初至一國其君莫不延見慰勞使臣謁畢鞠躬退語不及公此通例也頃聞駐京公使以未蒙晝接不無私議昔年英使威妥瑪藉詞不令入覲致烟臺條款多要挾靳虛文而受實損非計之得今宜循同治十二年成案援據以行若論禮節可於召見先敕下所司中禮西禮假以便宜如是彼雖行西禮仍於體制無損云云自是遂為定例二十七年聯軍平拳匪各國挾求更改禮節謂各使臣會同覲見必在太和殿一國使臣單行覲見者必在乾清宮呈遞國書必遣乘輿往迓至宮殿前降輿禮成送歸齎奏國書必自中門入帝必躬親接受設宴乾清宮帝必躬親入座嗣復允會同覲見改在乾清宮而轎用黃色於是慶親王奕劻等以天澤堂廉之辨不能每事曲從遂與各使磋商歷時數月始將乘坐黃轎太和殿覲見暨宮殿階前降輿三事酌議改易而爭議始息各國親王覲見儀始光緒二十四年德國親王亨利入覲帝幸頤和園御仁壽殿亨利公服入遞國書帝慰勞之既亨利欲覲皇太后帝奉懿旨代見是日巳刻御玉瀾堂亨利偕德使海靖等入外部司官引殿東便門外入布幄少憩駕至扈從如儀鳴鞭三升座慶親王等侍左右外部長官率亨利等自中門入北嚮一鞠躬行數武又一鞠躬至龍柱前又一鞠躬然後奉國書進慶親王降左階接受陳玉案亨利等又一鞠躬帝頷首答之操國語慰勞慶親王跪案左聆玉音降階操漢語傳宣德翻譯官譯畢亨利等又一鞠躬帝仍頷首答之亨利等退數武又一鞠躬退至堂左又一鞠躬禮成內外王公相見禮崇德初元定宗室外藩親王郡王貝勒貝子相見儀賓及門王府屬官入告主人降階迎賓辭主人升賓從自中門入賓趨左主人趨右行相見禮二跪六叩即席序立從官升東階行禮亦如之興入右門坐賓後執事獻茶賓受茶叩主人答叩飲茶語畢從官趨前楹跪叩興趨出賓離席跪叩主人答叩並興賓出主人降階送屬官送門外若外藩郡王見則主人迎送殿外不降階相見賓二跪六叩主人答半賓辭退跪叩主人答跪不叩餘如親王儀外藩貝勒見主人離坐迎不出殿賓北面跪叩如初主人立受即席正坐賓侍坐辭退跪叩主人立受不送餘如郡王儀外藩貝子公見府屬官引賓入殿跪叩同辭退仍跪叩主人皆坐受餘如貝勒儀外藩親王見郡王主人迎送大門內餘與親王相見同郡王見郡王亦如之其外藩貝勒見郡王如郡王見親王禮以下賓主相見降殺遞差外藩親王見貝勒主人迎送門外賓入主人從相見各一跪三叩外藩郡王暨貝勒見貝勒同外藩貝子公見貝勒賓一跪三叩主人跪拱手受外藩王貝勒見貝子賓主一跪一叩坐此其異者也京官相見禮順治元年定制京朝官敵體相見賓及門主人迎大門內揖賓入及階讓升賓西主東及廳事讓入皆北面再拜興主人為賓正坐西面賓辭主人固請卒正坐賓還正主人坐東面亦如之賓就坐受茶揖主人答揖飲茶語畢告辭相揖賓降階主人送及門復相揖賓辭主人固請送賓大門外視賓升輿馬乃退尚書左都御史見大學士同賓降一品者主人趨正賓坐辭亦如之餘儀同二品以下京堂官翰詹科道見大學士主人迎儀門內送大門外不視升輿馬科道見左都御史副都御史尚書儀同五品至八品官見大學士主人迎堂階下賓就東階主人導入賓北面拜辭乃三揖主人東面答揖賓趨正主人坐辭固請卒正坐相揖賓西面主人東北面坐賓啓事畢辭退三揖如初主人送二門外翰詹科道見二三品官如賓降一等禮見四五品官如同官禮閣部寺監屬官見其長官初見公服詣署升自東階具履行陳坐案依次向坐三揖長官避席答揖退若燕見如五品官見大學士儀國學生見國子師儀初見具名柬公服詣學自東階升堂北面三揖師立受侍立左旁西面受教畢三揖退若燕見通名俟召乃入師迎階上弟子升揖師入門從之北面再拜師西面答揖趨正師坐師命坐北面揖師位東北面弟子西面茶至揖請問揖辭退北面三揖師皆答出送師前行弟子後隨及二門外弟子三揖俟師入始退翰林院庶吉士見大學士與見教習庶吉士同凡京朝官途遇回避爵秩均等分道行次讓道行次勒馬俟其過又次下馬唯欽使即遇應回避者分道行可也又武職民公侯伯以下男以上文職大學士以下九卿以上得用引馬一騎途遇並下馬回避云直省文武官相見禮順治間定督撫學政河漕總督鹽政巡視御史相見坐次平行餘各按品秩行禮雍正八年定直省官相見位均等者賓至署吏入白啓門自中門入至外堂檐下降輿馬主人迎檐前揖賓入及廳事各再拜其正坐就位進茶辭退如京朝官儀屬官見長官轅門外降輿馬自左門入初見具名柬呈履行文官司道見督撫迎堂後屏內及廳事庭參則扶免三揖皆答揖督撫正坐司道旁坐命坐揖茶至揖均答如儀辭出三揖如初送至屏門外司道三揖俟督撫入復三揖趨出督撫次日用名柬答拜若公事謁見常服通銜名三揖就坐餘同前府廳州縣見庭參拜則免府廳揖答揖州縣揖立受俱不送不答拜佐二等官見一跪三叩不揖不坐府廳州縣見司道與司道見督撫同佐二等官見司道與見督撫同同知通判見知府柬題晚生入自中門用賓主禮州縣教職見督撫儀如佐二見司道不迎送見知府迎送屏門外見府倅迎送堂檐下餘同見州縣如同通見知府儀司道府廳見學政入中門禮如賓主迎送並出堂檐學政品秩崇者如見督撫儀州縣見庭參旁坐主人答揖不答拜運使見督撫鹽院與司道同運判以次遞降武官副將以下見提督初見具銜名履行披執則傳免易公服佩刀都司守備不免跪宣名席地坐不進茶餘儀按品遞降與文職同順治十三年定直省文武官相見禮提督見總督入中門至儀門下馬升堂三揖總督正坐提督僉坐迎送不出堂檐若提督兼世職者總督西面提督東面辭出送至堂檐下視乘馬總兵見儀門外下馬坐則侍坐迎送止階上與巡撫見視賓主禮唯均以下按品差降至滿漢官相見將軍副都統與督撫提鎮以敵體見司道以下見將軍如總督見副都統如總兵協領參領見督撫同司道佐領防禦同知府驍騎校同州縣不相統屬者一以賓主禮行之其儒學弟子員見學師與國子生見國學師同士庶相見禮賓及門從者通名主人出迎大門外揖入及門及階揖如初登堂各北面再拜興主賓互正坐即席賓東主西飲茶語畢賓退揖及階及門揖辭主人皆答揖送大門外揖如初卑幼見尊長禮及門通名俟外次尊長召入見升階北面再拜尊長西面答揖命坐視尊長坐次侍坐荼至揖語畢禀辭三揖凡揖皆答出不送若尊長來見卑幼迎送大門外餘如前儀見父執友與見尊長儀同受業弟子見師長禮初見師未出先入設席正位俟堂下師出召見乃奉贄入奠贄於席北面再拜師立答揖興謹問起居命坐乃侍坐有問起而對辭出三揖不送常見侍坐請業則起請益則起師有教立聽命坐乃坐師問更對仍起而對朝入暮出均一揖與同學弟子以齒序之
