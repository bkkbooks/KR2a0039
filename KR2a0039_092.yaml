body:
  text: 清史稿卷九十二志六十七禮十一凶禮一皇帝喪儀皇后喪儀貴妃等喪儀五曰凶禮三年之喪自天子以至於庶人無貴賤一也有清孝治光昭上自帝后喪儀下逮士庶喪制稱情立文詳載會典與通禮茲依次類編纍朝損益皎然若鑒焉皇帝喪儀天命十年太祖崩遠近臣民號慟如喪考妣越五日奉龍輿出宮安梓宮瀋陽城中西北隅國制除夕元旦備陳樂舞至是悉罷時東邦甫建制闕未詳崇德八年太宗崩男自親王訖牛彔章京朝鮮世子女自公主訖奉國將軍妻集清寧宮前詣几筵焚香跪奠酒三起立舉哀固山額真昂邦章京承政以下官及命婦集大清門外序立舉哀次日奉梓宮崇政殿王公百官朝夕哭臨三日其齊所王貝勒貝子公歸第部院官宿署閒散諸臣赴篤恭殿固山額真等官及命婦翌日暮還家世祖登極年甫六齡會天大寒侍臣進貂裘卻弗御帝曰若黃𩹉朕自衣之唯紅故不服耳是日不設鹵簿不作樂王大臣等謂已即位冠宜綴纓於是軍民皆綴纓服官者暫停婚嫁宴會民間不禁乃頒哀詔朝鮮蒙古制曰我皇考盛德弘業侯服愛戴本年某月日龍馭上賓中外臣民罔弗哀悼屬在藩服咸使聞知祭葬禮儀悉從儉朴仍遵古制以日易月二十七日釋服詔到國王以下舉行喪禮如故時猶在關外也順治十八年世祖崩聖祖截髮辮成服王公百官公主福晉以下宗女佐領三等侍衛命婦以上男摘冠纓截髮女去葬飾翦髮既大斂奉梓宮乾清宮設几筵朝晡日中三設奠帝親詣尚食祭酒三拜立舉哀王公大臣公主福晉縣君宗室公夫人詣几筵前副都統以上序立乾清門外漢文官赴景運門外武職赴隆宗門外咸縞素朝夕哭臨凡三日外藩陪臣給白布制服至四日王公百官齊宿凡二十七日過此則日哭臨一次軍民服除音樂嫁娶官停百日軍民一月百日內票本用藍筆文移藍印禁屠宰四十九日京城自大喪日始寺觀各聲鐘三萬杵越日頒遺詔天安門羣臣素服三跪九拜宣畢舉哀禮部謄黃頒行各省聽選官監生吏典僧道咸素服赴順天府署朝夕哭臨三日詔至各省長官帥屬素服出郊跪迎入公廨行禮聽宣舉哀同服二十七日除命婦亦如之軍民男女十三日除餘俱如京師殷奠列饌筵二十一酒尊十一羊九楮幣九萬讀文帝詣几筵哭內外傳哭奠酒率衆三拜舉哀焚燎設啓奠如殷奠儀屆日奉梓宮登大升輿三祭酒並祭所過門橋帝號泣從羣臣依次隨行將至景山內外集序俟靈駕至跪舉哀奉安壽皇殿訖設几筵帝三祭酒每祭一拜哀慟無已皇太后再三撫慰始還宮明日行初祭帝釋服又明日行繹祭周月行月奠自是百日內月奠期年內月奠儀並視殷奠唯所陳品幣有差期年滿月致祭不讀文上尊諡廟號祗告郊廟社稷屆日殯宮外陳鹵簿作樂大學士奉冊寶陳案上三叩退帝素服御太和門閲訖一跪三拜退立東旁大學士詣案前復三叩奉冊寶列綵亭內如初禮校尉舁行御仗前導車駕從王公百官先集協和門外跪迎隨行壽皇殿大門外冊寶亭入至檐前帝入自左門禮部長官先奉絹冊寶陳中案退大學士詣亭前三叩奉香冊寶陳左案帝就位率衆三跪九拜大學士從左案奉冊跪進帝獻冊授右旁大學士跪受陳中案上進寶亦如之乃宣冊宣冊官奉絹冊宣訖三叩退宣寶儀同帝率衆行禮如初復詣几筵前致祭奠帛讀文三獻爵如儀焚絹冊寶禮成翌日頒詔如制百日內外集序讀文哭奠如初祭是日題神主大學士一人進觀德殿詣祔廟神主前上香奉主至壽皇殿外陳案上並三叩滿漢大學士各一人詣香案前復三叩填青訖行禮如初奉主登黃輿至觀德殿前止大學士進殿詣祔奉先殿神主前三叩奉主登安輿隨黃輿後出景山東門入東華門帝素服跪迎景運門內從至乾清門輿止帝詣兩神主前各三叩先後陳案上三獻九拜禮成諏吉升祔祥吉禮大祭如初祭儀畢帝升殿延見羣臣清明中元冬至歲除並以時致奠既卜葬吉將奉移山陵前三日遣告天地宗社前一日設祖奠儀如啓奠先是王大臣援引古禮止駕遠送不許至是奉太后懿旨不獲已勉遵慈命屆日內外齊集帝詣梓宮奠酒盡禮盡哀輔臣率執事官奉梓宮登輿啓行鹵簿前導冊寶後隨帝攀號俟過步至東安門外泣奠羣臣從之所過門橋皆致祭途中宿次朝夕奠獻親王行禮羣臣舉哀百里內守土官素服跪迎道右至陵奠獻如在途大葬前期遣輔臣及三品以上官詣陵陳祭先三日祗告如常告儀屆日輔臣詣梓宮告遷三奠酒奉梓宮登輿羣臣序立跪舉哀俟輿過哭從至地宮王大臣奉梓宮入冊寶陳左右掩石門輔臣率衆三奠酒舉哀鹵簿儀仗焚饗殿成奉安世祖神位致祭如時饗屆二十七月詣太廟祫祭如歲暮祫祭禮康熙六十一年聖祖崩大斂命王公大臣入乾清門瞻仰梓宮並命皇子皇孫行禮丹墀上公主福晉等咸集几筵殿前帝及諸皇子成服以東廡為倚廬頒遺詔諭禮臣增訂儀節屆時帝立乾清宮外西嚮大學士奉遺詔自中道出帝跪俟過還苫次大學士出乾清門禮部尚書三拜跪受餘如故時遺詔二十七日釋服帝曰持服乃人子之道二十七日服制斷難遵從羣臣以萬幾至重請遵遺詔除服不允復疏云從來天子之孝與士庶不同孝經曰天子以德教加於百姓施於四海為孝書稱高宗諒陰晉杜預謂釋服後心喪之文蓋人君主宗廟社稷祭為吉禮必除服後舉行若二十七日不除祀典未免有闕復叩首固請始俞允既釋服仍移御養心殿齊居素服三年靈駕奉安壽皇殿日三尚食退觀德殿席地坐有事此進奏晡奠畢始還倚廬羣臣議進尊諡帝親刺指血圈用聖祖字禮臣進儀注未愜意更定前期並祗告奉先殿至日閲冊寶訖帝行一跪三拜禮東次西嚮立俟冊寶亭行始還宮豫至殯殿倚廬恭俟會朝鮮貢祭品設几筵前羣臣咸集鴻臚寺官引來使入立儀仗南北嚮三跪九拜遣官讀文三祭酒每祭一拜衆及來使咸舉哀行禮來使復行二跪六拜禮焚燎退外藩敖漢王請謁梓宮報可自是蒙藩使者皆得入謁以為常雍正初元將奉移景陵饗殿廷臣援宋明二代禮謂嗣皇帝不親送梓宮帝不允禮臣議奉安地宮後題太廟神主令親王敬奉還京帝曰明季帝王不親送梓宮故令王大臣代行朕既親往自宜親奉以還焉先奉移二日並遣告后土昌瑞山神屆日帝詣梓宮祭酒率衆三拜舉哀畢趨立大門東旁梓宮出跪舉哀登大升輿帝跪左禮臣祭輿三叩靈駕發帝步隨至景山東門俟宿次至景陵帝跪迎紅門外舉哀徒步從抵三洞橋跪俟降大升輿登小輿安奉饗殿設几筵列冊寶三祭酒三拜禮成帝不忍別羣臣以皇太后為言無已翌日還蹕王大臣請御門聽政帝以梓宮未永安命暫緩固請之始行既卜葬屆日晨帝詣景陵奠獻踊哀慟祭酒三拜趨陵寢門外跪哭以俟龍輴入地宮復祭酒三拜出俟幄次題主虞祭如常儀歸奉主升祔太廟二十七月將屆滿允吏部尚書朱軾請祫祭太廟頒示臣民世宗崩喪禮悉依景陵故事越日朝奠特簡王貝子公數人入內瞻仰餘集乾清宮廊下行禮嗣後王公大臣額駙暨台吉初至者均得請旨瞻仰又命宗室三十人覺羅二十人番上奠獻申哀慕頒遺詔大學士奉至乾清宮檐下帝親受之陳案上三拜大學士詣黃案前亦三拜詔出中門帝跪迎俟過始還苫次詔至直省軍民男女改素服二十七日梓宮奉移雍和宮帝徒步隨行羣臣諫阻不獲遂留居是宮至二十七日後始還月內日叩謁月外間日一次二月外三日一次時帝欲行三年之喪廷臣請以日易月不許命詳稽典禮尋議上一祭祀按禮記王制喪三年不祭唯祭天地社稷越紼行事注謂不敢以卑廢尊是知三年內本應親行明呂坤謂祖宗不輕於父母奉祭不緩於居喪何可久廢誠以天親一理宗廟之祭亦當並舉謹議凡遇郊廟社稷奉先殿大祀皇帝躬詣行禮或遣官恭代皆作樂先期齊戒素服冠綴纓緯視祝版御禮服朝日夕月饗帝王先師先農遣官行禮咸禮服作樂屆日冠服如齊期宮內祭神百日後舉行經筵耕藉釋服後舉行一朝會典禮攸關元旦朝正萬國瞻仰朝儀最重謹議二十七月內遇元旦朝賀吉服升太和殿不宣表不作樂常朝亦然一御門聽政典制至巨昔宋仁宗行三年喪臨朝改服孝宗時二十七日後百官請聽政援書被冕服出應門語固請乃許稽之史冊自古為然謹議常事及引見俱在便殿百日後乃御門一冠服按諒陰之制先儒謂古無可考史載魏孝文帝唐德宗釋服後仍素服練巾聽政宋仁宗雖用以日易月制改服臨朝宮中實行三年之喪蓋縞素不可以臨朝前代行三年喪者亦唯宮中素服而已謹議百日內服縞素百日外易素服詣几筵仍服縞素御門蒞官聽政或詣皇太后宮俱素服冠綴纓緯升殿受朝則易吉祭祀及一切典禮俱禮服二十七月服滿如百日禮致祭釋服一宮中服制帝后齊體服制不容有異二十七日後后素服遇典禮易禮服詣几筵仍縞素妃嬪亦如之皇子與諸王同一在京王公百官二十七日除服遇典禮及朝會坐班吉服在署治事入朝奏事俱素服冠綴纓緯詣几筵去冠纓各署進本章用硃印制可乾隆元年正旦以御極初元御太和殿常朝次年仍罷著為例將移泰陵帝詣梓宮行禮畢皇太后亦三祭酒餘如故向例清明中元歲暮國忌皆朝服行禮畢素服舉哀唯冬至不更素服帝以梓宮未葬且在服內允禮臣請承祭執事各官不綴冠纓仍用素服嘉慶四年居高宗喪如泰陵故事唯遺詔到直省文武官率紳耆摘纓素服出郊跪迎入公署行禮聽宣畢舉哀始成服哭臨三日官吏軍民自大事日始百日不剃髮大葬帝躬引梓宮御龍輴入地宮復以朝正大禮元年已行二十七月內不再舉仁宗崩熱河越六日梓宮至京始大斂奉安淡泊敬誠殿又四日頒遺詔禮官奉安龍亭驛送入都舊制自太后以下二十七日後俱素服孝和睿皇后改服縞素百日後始易喪將至羣臣出郊哭迎帝先返至安定門東華門並祗俟哭迎步隨入大內奉安乾清宮允禮臣議喪服已屆二十七日改大祭後除服又几筵前奠獻陳法駕鹵簿百官會集暨各署用藍印俱大祭後停罷宣宗崩梓宮奉移圓明園安正大光明殿會衍聖公至京遇二周月致祭命赴園隨行禮文宗崩熱河依宣宗故事梓宮移東陵穆宗年尚幼羣臣援康熙二年例止帝遠送同治二年釋服奉兩宮皇太后懿旨諸慶典及筵宴俟山陵事畢再行穆宗德宗崩並循斯例自世宗親營泰陵吉壤工需動用內帑並諭毋建石像惜人力宣宗葬慕陵規制簡約至同治時侍郎宋晉言定陵工程宜法慕陵雖廷臣囿於成憲而制度毋稍踰侈時稱其儉宣統初為德宗營崇陵頒帑數百萬親貴主其事移以營私第致踰三年未成遜國後當道撥款營治及葬工甫半故較舊制為略云皇后喪儀太祖癸卯年九月皇后葉赫納喇氏崩越三載葬尼雅滿山天聰三年與太祖合葬福陵制甚簡也入關後凡遇列后大事特簡大臣典喪儀會禮臣詳議順治六年四月太宗皇后博爾濟吉特氏崩梓宮奉安宮中正殿設几筵建丹旐門外右旁首親王訖騎都尉公主福晉命婦咸集世祖率衆成服初祭大祭繹祭月祭百日等祭與大喪禮同七年上尊諡曰孝端文皇后葬昭陵聖祖母慈和皇太后佟佳氏康熙二年二月崩初違豫帝時年十一朝夕侍及大漸廢餐輟寐至是截髮成服踊哀號水漿不入近侍感泣日尚三食王公大臣二次番哭停嫁娶輟音樂軍民摘冠纓命婦去裝飾二十七日餘凡七日四日後入直官摘冠纓服縞素五日頒詔文武官素服泣迎入公署三跪九拜聽宣舉哀行禮如初朝夕哭臨三日服白布軍民男女素服如京師上尊諡曰孝康章皇后梓宮移壩上帝祭酒行禮攀號太皇太后皇太后念帝沖齡止親送與世祖合葬孝陵升祔太廟十二年五月皇后赫舍里氏崩輟朝五日服縞素日三奠內外會集服布素朝夕哭臨三日移北沙河鞏奉城殯宮帝親送自初喪至百日亦躬親致祭時用兵三藩慮直省舉哀制服易惑觀聽免治喪餘如故冊諡仁孝三周後致祭如陵寢後葬昌瑞山世宗登極諡曰孝誠仁皇后十七年二月皇后鈕祜祿氏崩喪葬視仁孝后冊諡孝昭世宗加諡曰仁二十六年世祖母博爾濟吉特氏崩先是太皇太后違豫帝躬侍步禱南郊願減算益慈壽親製祝文詞義懇篤太常宣讀涕泗交頤既遭大喪悲號無間居廬席地毀瘠過甚至昏暈嘔血自是日始內外咸集日三哭臨四日後日二哭臨官民齊宿凡二十七日寺觀各聲鐘三萬杵文移藍印題本硃印詔旨藍批答值除夕元旦羣臣請帝暫還宮不許唯令元旦輟哭一日禮臣議上尊諡曰孝莊文皇后帝以升遐未久遽易徽號為尊諡心實不忍諭俟奉安寢園稱諡以祭及梓宮啓攢夕攀慕不勝左右固請升輦堅不就駕斷去車靷慟哭步送遇舁校番上輒長跽伏泣直至殯宮顏悴足疲悽感衢陌又傳旨還宮日仍居乾清門外幕次並定志服三年喪不忍以日易月羣臣交章數請除服國子生五百餘人咸以節哀順禮為請帝骨立長號勉釋衰絰而有觸輒痛閲三年不改初太皇太后病篤時諭帝曰太宗梓宮奉安已久卑不動尊未便合葬若別營塋域不免勞費我心戀汝父子不忍遠去必安厝遵化為宜帝遂相孝陵南建饗殿奉安梓宮稱暫安奉殿設官奉祀如孝陵制至世宗改建地宮號昭西陵始大葬聖祖仁皇后佟佳氏二十八年七月崩時由妃立后第二日也帝輟朝親臨製四詩悼之諡曰孝懿喪儀如孝昭世祖皇后博爾濟吉特氏五十六年十二月崩先是疾大漸禮臣請如孝康后喪禮帝言孝康升遐朕甫十歲輔臣治喪禮恐未備後見仁孝后喪儀條理頗晰如遇大事其悉議以行及崩會帝病足舁近几筵就榻成服哭而暈有間蘇羣臣環跽叩勸乃勉舁側殿將移殯宮設啓奠禮臣請遣皇子代帝曰此初祭朕必親奠寧壽宮中豈能復行此禮耶至日遣代奠爵仍舁几筵旁榻上行禮梓宮啓行舁榻哭送出寧壽宮西門仰望不見靈駕乃止哀還苫次大祭足疾少愈即親詣殯宮行禮諡曰孝惠章皇后葬孝東陵雍正元年世宗母仁壽皇太后烏雅氏崩喪禮如孝惠諡曰孝恭仁皇后與聖祖合葬景陵時帝遭聖祖喪齊居養心殿服竟仍終太后喪輔臣援聖祖喪禮請服闋行祫祭帝曰父母之喪人子之心則一帝后之禮國家之制䄄殊今屆皇妣釋服期諏日祭告奉先殿無頒諭中外為也九年九月世宗皇后那拉氏崩帝服縞素十三日除奉移田村三周年後殯宮時奠與沙河殯宮禮同唯承祭各官改補服高宗立上尊諡曰孝敬憲皇后乾隆二年與世宗合葬泰陵十三年三月帝奉皇太后東巡皇后富察氏從還至德州崩親製悼亡篇喪將至王公大臣詣通州蘆殿會集皇子祭酒舉哀行禮既至羣臣素服跪迎朝陽門公主近支王福晉集儲秀宮諸王福晉及命婦集東華門外咸喪服跪迎梓宮奉安長壽宮帝親臨成服輟朝六日中宮之喪自孝誠仁皇后後直省治喪儀制久未舉行至是王大臣言周禮為王后服衰注謂諸臣皆齊衰是內外臣工無異也明會典載后喪儀十三布政使司暨直隸禮部請敕差官訃告外省官吏軍民服制與京師同今大行皇后崩逝正四海同哀之日應令外省文武官持服如制從之冊諡孝賢五月廷臣奏言后雖儷體禮統所尊升殿視朝事關典制孝賢皇后喪儀應遵祖制百日後皇帝升殿文武百官及外藩使臣朝服行禮如常儀帝兩月除沐禮御門聽政羣臣朝服不掛珠禮畢仍素服百日後如御門羣臣常服掛珠庶協禮制分義帝曰孝賢皇后喪儀朕皆斟酌古今不參私意考明嘉靖七年孝潔陳皇后之喪張璁援引古禮謂喪服自期以下諸侯絶特為旁期言若妻喪本三年報服殺為期年固未嘗絶上宜為后服期喪云云今據議奏如升殿作樂凡大朝祀典自當如例唯常日視朝但鳴鐘鼓樂懸而不作至明年正月將屆期年一切典禮如常儀時沂州營都司姜興漢錦州知府金文醇國恤期內剃髮所司以聞下部逮治並申明祖制禁百日內剃髮違者處斬諭載入會典三十一年皇后那拉氏薨時帝幸熱河留京王大臣以聞詔言后自冊立以來尚無失德去年侍太后南巡性忽改常未盡孝道理應廢黜今仍存其名號喪儀依貴妃例內務府大臣承辦仁宗母魏佳氏四十年正月在貴妃位崩詔稱令懿皇貴妃命皇八子十二子十五子皇孫綿德等穿孝葬勝水峪嗣立仁宗為皇太子遂贈諡孝儀皇后升祔奉先殿後復上廟諡為純皇后乃升祔太廟高宗母崇慶皇太后鈕祜祿氏四十二年正月崩帝衰服百日如世宗喪餘仍素服親擬尊諡曰孝聖憲皇后禮臣上喪儀援雍正九年例二十七日內遇郊廟大事素服致祭樂設不作帝曰郊廟典重不應因大喪而稍略復下軍機大臣議旋議上遇郊廟大祀遣官致祭仍作樂朝服行禮常祀素服致祭樂設不作制可頒遺詔自到省會日始停嫁娶王公百官百日軍民一月輟音樂王公百官一年軍民百日餘如故先是歷代喪禮百日後服色禮制未載會典至是命軍機大臣會典喪儀王大臣詳議議上御殿視朝儀注得旨元正朝會二十七月內不必舉行其常日視朝百日後行之又議定御用服色一百日內縞素百日釋服後二十七月內素服詣几筵冠摘纓一百日內遇祭郊社日壇遣官將事齊戒日素服冠綴纓百日外親詣行禮又齊期常服不掛珠閲祝版先期宿壇常服掛珠祭日朝服作樂還宮樂設不作一百日外祭事御龍袍褂百日內祭奉先殿冠綴纓青袍褂百日外珠頂冠藍袍金龍褂一二十七月內祭月壇帝王先師先農俱遣官行禮一宮中祀大神百日後親詣行禮龍袍藍褂掛珠一二十七日外遇元旦前後七日貂褂掛珠百日外御門聽政常服不掛珠一二十七日外百日內召見及引見俱在便殿服縞素遇萬壽節七日常服一閲視大行皇太后冊寶素服冠綴纓先期齊戒帶牌一閲視玉牒朝服一十二月封寶正月開寶御龍褂一文武傳臚不升殿一經筵耕藉二十七月後舉行一山陵禮制二十七月內謁陵青袍褂冠摘纓其往返在途冠並綴纓一內廷主位二十七日釋縞素後二十七月內常服遇元旦萬壽俱七日吉服百日內遇親蠶遣王福晉恭代朝服百日外二十七月內依舊行禮吉服其文武百官二十七日縞素百日內素服冠綴纓夏用雨纓冠詣几筵仍摘纓一百日內祭郊廟社稷日壇遣官恭代先期省牲視牲咸素服祭日承祭執事各官咸朝服作樂百日外二十七月內親詣行禮齊戒日常服掛珠閲祝版省視牲宿壇並補褂冬貂褂掛珠祭日朝服作樂一百日外祭堂子俱蟒袍補褂掛珠百日內祭奉先殿青袍褂冠綴纓百日外補褂掛珠一百日外祭月壇帝王先師先農遣官行禮皆素服齊戒祭日朝服作樂百日內素服行禮樂設不作一二十七月內遇元旦謁堂子百官皆蟒袍補褂掛珠其前後三日及萬壽前後七日皆常服掛珠一二十七日外百日內引見官青袍褂百日外青褂一百日外二十七月內遇升殿常朝坐班俱朝服遇朔望常服掛珠一奉移山陵隨從官在途青袍褂冠摘纓禮成後神主還京並百日後隨從謁陵在途俱青袍褂冠綴纓謁陵日如之還京時仍短襟袍馬褂一百日內雨衣雨冠均青色百日外雨冠按品級雨衣仍青色皇子以下同制可四月葬泰東陵梓宮徑泰陵命暫停道旁帝代向陵寢行禮著為令至陵翼日行饗奠禮初帝以會典舊稱遣奠稱名未當命儒臣稽所自昉大學士言遣奠之稱禮經並無明文唯見諸孔穎達士喪禮疏唐以後相沿用之蓋穎達第用儀禮葬日將行苞牲體之車名為遣車遂取遣字為奠名牽合無當復考儀禮將行之祭徹巾苞牲鄭康成注象既饗而歸賓俎也又禮記雜記大饗既饗卷三牲之俎歸於賓館所以為哀也鄭注既饗歸賓俎言孝子哀親之去也是將行之祭本用饗禮舊稱遣奠似不若作饗奠為長敕下部更正從之四十四年四月帝詣陵釋服諭曰朕昔遭皇考大故思持服三年因遵聖母慈諭斷以百日然縞素雖釋其服仍存嗣值聖母大喪百日後即不存非厚前薄後也蓋彼時年力正壯可終三年喪制今春秋望七設存之而弗克盡禮於心轉不安也仁宗皇后喜塔臘氏嘉慶二年二月崩奉太上皇敕旨喪儀如皇后改為輟朝五日素服七日奠醊時皇子等成服如制官民俱素服七日不摘纓不蓄髮尋諭輟朝期內仍進章疏毋廢引見諸事其奏事官暨引見官俱常服不掛珠凡停嫁娶輟音樂官二十七日軍民七日餘如儀冊諡孝淑嗣葬太平峪十三年正月宣宗皇后鈕祜祿氏崩時在福晉位暫安王佐村園寢二十五年帝即位追封孝穆皇后擬改園寢為陵寢禮部言園寢規制未備忌辰大祭朔望小祭請如孝淑后殯宮例舉行制可遂命大學士戴均元等勘定寶華峪嗣以地宮滲水道光十一年改葬龍泉峪越二年宣宗皇后佟佳氏崩帝輟朝九日素服十三日冊諡孝慎又越二年卜葬與孝穆后同吉壤二十年正月皇后鈕祜祿氏崩帝服青袍褂十三日除臨奠仍素服諡孝全亦葬龍泉峪二十九年十二月仁宗皇合鈕祜祿氏崩諡曰孝和睿皇后時帝年七十二十七日釋縞素數日而崩咸豐三年葬昌西陵方孝和后崩次日文宗后薩克達氏崩福晉位內府治喪殯田村次年正月帝即位追封孝德皇后其喪儀先期豫改如大喪禮同治四年與文宗合葬定陵康慈皇貴太妃宣宗皇貴妃也咸豐五年七月尊為皇太后俄崩帝持服百日如制加諡孝靜升祔奉先殿改慕陵妃園為慕東陵同治初元加廟諡曰成升祔太廟光緒元年二月嘉順皇后蒙古阿魯特氏崩去穆宗喪未百日帝釋縞素後率羣臣服喪二十七日儀如故事諡曰孝哲毅皇后五年與穆宗合葬惠陵慈安皇太后鈕祜祿氏文宗后也七年二月崩諡曰孝貞顯皇后葬定東陵三十四年十月慈禧太皇太后後德宗一日崩詔禮部從優具議尋議百日內上諭用藍筆章疏十五日後具奏王公百官公主福晉命婦二十七日內日三哭臨官停嫁娶期年輟音樂二十七月京師軍民二十七日罷祭祀餘如大喪禮諡曰孝欽顯皇后葬定東陵貴妃等喪儀順治初定制妃殯之喪內務府掌行臨時請旨康熙四年壽康太妃博爾濟吉特氏薨帝輟朝三日大內及宗室咸素服王公大臣公主福晉命婦畢集初祭陳楮幣十四萬畫緞萬饌筵三十有一牛一羊十八酒九尊讀文致祭次日繹陳楮幣萬饌筵五羊三酒三尊大祭同初祭奉移豫祭陳楮幣二萬饌筵十三羊五酒五尊歲時致祭如例九年慧妃博爾濟吉特氏薨輟朝三日大內宗室咸素服三日不祀神妃宮中女子翦髮內監截髮辮成服二十七日除又定金棺至殯宮初祭陳楮幣十四萬畫緞千帛九千饌筵二十一羊十九酒十九尊設綵仗行禮奉移則陳楮幣三萬饌筵十三羊酒各五不直班官員跪迎十里外俟過隨行次日行奉安禮如奉移儀十三年太宗懿靜太貴妃博爾濟吉特氏薨帝摘冠纓躬詣致祭餘同太妃儀三十五年溫僖貴妃鈕祜祿氏薨輟朝五日命所生皇子成服大祭日除百日剃髮餘如制雍正三年敦肅皇貴妃年氏薨輟朝五日特簡王公大臣典喪儀遣近支王公七內務府總管一散秩大臣二侍衛九十內府三旗佐領官民男女咸成服大祭日除剃髮日三設奠內外齊集百日後至未葬前日中一設奠朔望仍三奠命內管領妻祭酒三爵奉移日禮部長官祭輿金棺啓行王公百官從禮部長官祭所過門橋初祭陳楮幣十八萬帛九千畫緞千饌筵三十五羊酒各二十一大祭同又定貴妃晉封皇貴妃未受冊封前薨罷製金冊寶以絹冊寶書諡號遣正副使讀文致祭先期遣告太廟後殿奉先殿屆日內外會集正副使赴內閣詣冊寶案前一跪三叩奉冊寶出至午門外陳綵輿內復三叩校尉舁至殯宮大門外正副使行禮如初奉冊寶入中門陳案上正使詣香案前三上香宣訖讀文致祭如儀乾隆二年奉移金棺從孝敬后葬泰陵八年壽祺皇貴太妃佟佳氏薨禮部以輟朝五日請詔改十日摘冠纓親詣行禮諡賣心惠餘同貴妃儀二十九年欣妃戴佳氏薨詔加恩如貴妃例治喪先是晉封時金冊寶已鐫字未授受至是陳設金棺前其絹冊寶增書貴妃字焚之又諭嗣後貴妃以上薨逝王公大臣俱步送暫安處妃嬪豫往滿大臣年老艱步履者如之故事皇貴妃金棺至園寢始製神牌甚稽時日三十三年諭嗣後遇大祭即往園寢製造俟金棺至刻字填青大學士等監視奉安後陵寢官朝服行禮奉設饗殿著為令四十年奏定皇貴妃以下五等喪凡請輟朝素服日期傳行內外齊集請遣承祭大臣奉安地宮前期祭告陵寢及金棺前並所過門橋奠酒諸事均禮部掌行其追封贈諡製牌會同二部奏辦餘歸內府掌儀司牒禮工二部襄治之四十九年裕皇貴太妃耿氏薨詔罷朝仍親詣奠酒行禮諡純懿餘如故嘉慶四年慶貴妃陸氏薨帝念其撫育如生母特追封慶恭皇貴妃下所司議贈諡典禮尋議上豫期工部製絹冊寶寢陵官製神牌遣告太廟奉先殿暨高宗几筵俟高宗梓宮移山陵次日遣正副使詣園寢配殿致祭九年議定皇貴妃喪罷坤寧宮致祭酌減為五日貴妃二日妃嬪不停止道光十三年仁宗諴僖皇貴妃劉氏薨不輟朝不素服命僧格林沁穿孝諡和裕同治五年十一月初七日琳皇貴太妃烏雅氏薨會初十日慈禧太后萬壽命大內宗室王公百官展期十二日素服一日
