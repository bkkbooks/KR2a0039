body:
  text: 清史稿卷九十三志六十八禮十二凶禮二皇太子皇子等喪儀親王以下及公主以下喪儀醇賢親王及福晉喪儀忌辰賜祭葬賜諡外藩賜恤品官喪禮士庶人喪禮服制皇太子皇子及皇子福晉喪儀皇太子喪儀有清家法不立儲二至乾隆三年皇次子永璉薨高宗諭曰永璉為朕嫡子雖未册立已定建儲大計其典禮應視皇太子行禮臣奏言皇太子喪禮會典未載舊制沖齡薨不成服今議皇帝素服輟朝七日若親臨奠醊冠摘纓典喪大臣奏遣之王公暨皇太子侍從官咸成服內務府佐領內管領下護軍驍騎校等成服以六百人為率並初祭日除直省官奉文日咸摘冠纓素服三日停嫁娶輟音樂京師四十日外省半之幼殤例無引幡今請依雍正時懷親王喪儀引幡仍用外藩額駙王公台吉公主福晉郡主服內來京男摘冠纓女去首飾朝鮮使臣素服七日金棺用桐木啓奠帝親祭酒奉移親視送禮部長官祭輿初祭內外會集帝至殯殿奠酒三爵每奠衆一拜是日除服剃髮將册諡先期遣告太廟後殿奉先殿諡曰端慧禮成禮部頒行各省並牒朝鮮國王文到率百官素服軍民罷嫁娶音樂各三日八年葬朱華山園寢皇子喪儀順治十五年榮親王薨治喪視親王加厚葬黃花山園寢康熙中定制凡皇子殤備小式朱棺祔葬黃花山唯開墓穴平葬不封不樹雍正六年皇八子福惠卒帝輟朝大內素服各三日不祭神詔用親王禮葬十三年追封親王諡曰懷乾隆十三年皇子永琮甫二周薨帝言建儲之意朕雖默定然未若端慧太子旨已封貯喪儀應視皇子為優大祭親臨奠醊諡悼敏後追封哲親王越二年皇長子永璜薨金棺用杉木其福晉及皇孫綿德等翦髮去首飾成服百日而除素服二十七月成服王公大祭日除禮部以第三日移殯請輟朝三日詔改五日追封定親王諡曰安初祭大祭並親臨奠醊二十五年皇三子永璋薨詔用郡王例治喪輟朝二日大內宗室素服咸五日不祭神追封循郡王四十一年皇十二子永璂薨詔用宗室公例治喪嘉慶四年追封貝勒道光十一年皇長子奕緯薨命依皇子例治喪罷公主福晉命婦會集園寢不建碑追封貝勒諡曰隱志三十年晉封郡王皇子福晉喪定制親王世子多羅郡王下及奉恩將軍固倫公主和碩福晉下及固山格格奉恩將軍妻咸會集朝供饌筵午果筵初祭引幡一楮幣十二萬饌筵二十五羊十五酒七尊讀文致祭繹則陳楮幣三千饌筵十二羊酒各七百日周年四時致奠禮同嘉慶十三年宣宗時為皇次子其福晉鈕祜祿氏薨帝命即日成服初祭後除未分府皇子福晉依親王福晉例金棺座罩皆紅色以無儀仗特賞金黃色座罩儀仗仍視親王福晉例用旗色用鑲白著為令道光七年皇長子奕緯福晉瓜爾佳氏薨罷內外齊集及豫往暫安處接迎十一年追封貝勒夫人諏吉遣官奉紙册往殯所讀文致祭親王暨福晉等喪儀順治九年定親王喪聞輟朝三日世子郡王二日後改貝勒以下罷輟朝斂具親王至貝勒采棺藉五層貝子至輔國公棺同藉三層鎮國將軍以下朱棺藉一層初薨陳儀衛鞍馬散馬親王十五世子郡王各十四貝勒各十三貝子各十二鎮國公各十輔國公各八鎮國將軍鞭馬七輔國將軍五奉國將軍四奉恩將軍三府屬內外咸成服大祭日除內外去冠飾素服會集各如其例鎮國將軍以下不會喪公主福晉命婦會喪臨時請旨行凡親王至輔國公御祭二遣官至墳讀文致祭宗人府請賜諡撰給碑文工部樹碑建亭貝勒以下碑自建給葬費有差鎮國將軍至奉國將軍賜祭二文一立碑豫諡臨時請旨奉恩將軍賜祭無文不立碑不豫諡王至公婚娶之子卒許陳鞍馬祭品各如其父母例唯不遣官致祭未婚娶幼子不造墳凡葬期親王期年郡王七月貝子以下五月又定親王福晉以下喪內外會集如制陳儀衛從其封爵親王福晉側福晉世子福晉御祭一十二年定下嫁外藩公主喪御祭一遣官至塋所讀文致祭康熙四年定貝勒至入八分公豫諡請旨行九年定親王至輔國公喪本府官屬具喪服其禮親王肅親王承澤親王敬謹親王饒餘親王鄭親王克勤郡王恪僖貝勒靖寧貝勒顧爾馬洪貝子福勒黑公十二支凡為本支所分者本身暨府屬官命婦咸具喪服非本支會喪者摘冠纓從官如其主尊屬無服五十二年定貝勒生母薨治喪如嫡夫人遣官讀文致祭五十四年定固倫公主有子孫者獲請建碑豫諡雍正四年遵旨議定嗣後皇帝子孫依五等服制遇期服伯叔兄弟喪依例具奏臨喪其諸王以下不論爵次遇小功以上喪會喪成服期六十日大功一月小功七日除乾隆三年更定期服大祭日大功初祭日小功送殯日除二十一年諭諸王側福晉豫諡請旨行豫祭不踰一次罷給祭文三十六年定貝勒貝子公兼一品職獲請豫諡鎮國暨輔國將軍兼一品職獲請賜恤四十年定凡側福晉為王等生母獲請賜祭降嫡福晉一等五十六年鎮國公晉昌夫人卒詔罷賜祭後倣此嘉慶十七年貝勒綿勤子奕綬卒命封為未入八分輔國公嗣後宗室如追封公俱作為未入八分著為令公主以下喪儀順治九年定固倫公主喪視親王福晉和碩公主視世子福晉郡主視郡王福晉縣主視貝勒夫人郡君視貝子夫人縣君視鎮國公夫人十二年定下嫁外藩公主至縣主並給諭祭文遣官赴墳讀奠郡君以下致祭無文道光二十四年定公主薨內務府請旨如命官為治喪一切典禮即會禮部具奏得旨再牒各署治辦額駙自行治喪禮部應將會集處奏聞公主以下喪會集臨時請旨如獲請牒宗人府五旗傳行未釐降受封者內務府治喪不會集醇賢親王及福晉喪儀光緒十六年醇親王奕薨定稱號曰皇帝本生考帝持服期年縞素十有一日輟朝如之期年內御便殿仍素服元旦謁堂子詣慈寧宮太和殿受朝並禮服唯升殿不宣表樂設不作罷宗親廷臣筵宴祭文碑文書皇帝名初祭大祭暨奉移園寢並御青袍褂冠摘纓親詣行禮又定廟制及祭葬廟中殿宇及正門瓦色中用黃琉璃殿脊及正門四圍用緑琉璃祀以天子禮歲時饗四仲月朔舉行忌辰躬親致祭葬以親王禮帝親製碑文諡曰賢三十二年其福晉葉赫那拉氏薨稱皇帝本生妣喪儀如醇賢親王例忌辰順治十年定盛京興京三陵忌辰遣守陵官行禮獻酒果不讀祝不奠帛十二年改定忌辰遣官禮部具題請旨康熙三年復定三陵忌辰在隆恩殿神牌前揭幔致祭雍正四年帝以聖祖喪滿哀慕無窮思依三年內祭禮舉行下禮臣議尋議上依周年祭祀例遣在京或陵寢王公大臣一人承祭在京王公百官遣三之一陪祭著為令十三年高宗嗣服議定聖祖忌辰依陵寢四時大祭用太牢獻帛爵讀祝文遣官承祭陵寢官悉陪祀罷遣京官往嗣後列聖列后忌辰永如例行定制帝后忌辰內外俱素服停宴會輟音樂不理刑名帝詣奉先殿後殿上香行禮如祀南郊帝閲祝版遇忌辰御龍袍龍褂挂數珠執事官蟒服補褂挂數珠閲北郊廟社暨各中祀祝版則俱御龍褂挂數珠執事官咸補服挂數珠大祀齋期內御常服挂數珠陪祀執事官亦如之凡祭日遇忌辰行禮時祭服作樂禮畢仍素服賜祭葬世祖初入關沿崇德間例超品公一二三等公卒遣官祭三次子副都統二次參領佐領一次陳亡與有勳勞者遣官治喪出自上裁順治三年定制民公侯伯子兼任內大臣都統大學士尚書鎮守將軍卒候旨立碑致祭一次襲公侯伯子在任不踰三年止給祭品無祭文不立碑二三品官卒給祭品滿任三年給祭文有戰功者獲請立碑十三年定佐領員外郎主事任滿三年給祭品祭文未滿者無祭文致仕同十五年定部院長官加秩至一二品致祭立碑三品滿三年者如之未滿但致祭而已護軍統領副都統前鋒統領步軍總尉考滿視三品如為男爵得致祭立碑參領前鋒參領滿三年致祭不立碑四品卿少卿考滿者同否則不給祭文陳亡不論品級獲請恩恤內大臣都統大學士尚書護軍統領副都統前鋒統領侍郎學士步軍總尉原品休致者致祭立碑同現任輕車都尉佐領騎都尉郎中員外郎主事致祭無碑文承襲公侯伯有職任者依職任豫恤否則止給祭品十七年定本身所得民公侯伯子及都統有職任內大臣鎮守將軍給全葬大學士尚書左右都御史加級及宮保者視一品給全葬無加銜加級視二品給全葬侍郎無兼銜加級而考滿者視三品給全葬未滿者半之四品卿少卿或兼少卿銜視四品止給祭品護軍統領前鋒統領副都統步軍總尉任滿給全葬未滿者半之並致祭一次武職自參領文職自郎中以下俱不給祭品陳亡者如故十八年定本身所得民公侯伯造葬致祭一次加祭出特恩都統內大臣大學士尚書右都御史子鎮守將軍及加銜加級至一二品官俱依品級造葬致祭一次三品侍郎學士通政使大理寺卿考滿者給全葬未滿者半之俱致祭一次參領協領郎中佐領及三等侍衛護衛官陳亡者致祭一次漢文職一二品或三品考滿俱致祭造葬未滿者半之致祭一次在外布按以上依京秩例行武職加銜副將以上造葬致祭一次無兼銜而考滿者同未滿者半之致祭一次知縣守備以上陳亡者各依加贈品級造葬致祭一次凡滿漢文武原官致仕者恤典同現任康熙九年定本身所得及承襲公侯伯給全葬遣官讀文致祭一次內大臣都統子品級散秩大臣大學士尚書左都御史子世襲子鎮守將軍提督各依品級給全葬遣官讀文致祭一次男品級散秩大臣護軍統領前鋒統領副都統侍郎本身所得男學士副都御史總督總兵官加級至二品巡撫各依所加品級給全葬遣官讀文致祭一次三品侍郎學士副都御史巡撫通政使大理寺卿任滿給全葬未滿者半之俱遣官讀文致祭一次布政使給全葬致祭一次雲騎尉三等侍衛以上文職知縣武職守備以上陳亡者各依加贈品級給全葬致祭一次道光二十四年定賜祭王公以下儀祭日堂中陳儀衛靈座前置供案陳賜祭物品左右分陳自備祭品案前設遣官奠位東設祝案北嚮南設燎位具楮帛遣官至喪主率宗親及屬官跪迎大門外禮部官奉祭文入自中門陳東案遣官隨入就位立喪主以下皆就位跪讀祝官讀文訖遣官跪奠三爵每奠一叩鎮國將軍以下立奠喪主率衆隨行禮畢興舉哀燎祭文喪主率衆望闕謝恩三跪九叩遣官出跪送大門外賜諡親王例用一字貝勒以下及文武大臣二字郡王諡號尚沿明制用二字間有用一字者聖祖時追諡郡王滿漢文俱用一字遂為定制順治九年定親王以下喪聞宗人府請諡內院撰擬碑文康熙四年定諸王賜諡封號上加一字貝勒以下入八分公以上豫否請旨行乾隆三十六年遵旨議定貝勒至輔國公兼一品職者豫諡仍請旨其兼二品以下職暨不兼職者罷豫諡定制一品官以上豫否請上裁二品官以下不獲請其得諡者率出自特旨或以勤勞或以節義或以文學或以武功破格崇褒用示激勸嘉道以前諡典從嚴往往有階至一品例可得而未得者世宗朝一等公福善大學士魏裔介將軍佛尼勒莽依圖都統馮國相尚書湯斌徐潮瑪爾罕輩望實素高入祀賢良逮至高宗初元始獲追諡易名盛典殊不易得令甲得諡者禮部取旨行知內閣典籍撰擬至穆宗朝大學士卓秉恬改歸漢票籤唯侍讀司之大學士及翰林授職者始得諡文亦有出自特恩而獲諡文者侍讀擬八字大學士選四字餘則擬十六字大學士選八字並請上裁定武臣有諡文者如領侍衛內大臣索尼獲諡文忠異數也唯文正則不敢擬出自特恩文職內自三品卿外自布政使以下例不豫諡唯御史陸隴其諡清獻侍講學士秦承業諡文賣心太常卿唐鑑諡恪慎則以崇尚儒臣篤念師傅不為恆式咸豐三年禮臣奏定文職二品官殉難視一品豫諡如按察使優恤禮部亦得援例以請軍興而後道府州縣等官死綏不少疆臣疏請不拘常格矣其武職死事參將以下視副將議恤協領以下視副都統議恤皆得援新章奏請唯武功未成者不得擬用襄字至十二年諭嗣後文武各官其官階例不豫諡者不得率行奏請至是限制稍嚴光緒四年貴州巡撫黎培敬為已革總督賀長齡請諡詔以易名之典不容冒濫嚴切申警且下培敬吏議亦有得諡而被奪者若沈德潛卞三元或追論其生平或敗露於身後削秩仆碑以示誡也至朝鮮國王諡號嚮亦內閣撰擬嗣以所擬之字有觸其國王先代名諱則改由其國自擬八字以進請帝裁定云外藩賜恤順治十三年定蒙藩親王等喪遣官賫祭文至塋所宣讀致祭喪主率屬跪迎禮畢望闕謝恩行三跪九拜禮自王以下致祭如前儀唯牲醴物品則依其爵為隆殺著有勛勞者建碑優恤特遣大臣侍衛出自恩旨親王郡王福晉喪遣祭如儀貝勒至公夫人並遣祭無祭文其朝鮮國王母妃王妃世子喪訃至禮臣請賜恤遣正副使賫祭品香鈔諭祭乾隆五十一年國王世子李喪禮部奏聞詔以朝鮮世守藩封最稱恭順命倍給祭品示優恤嘉慶十年國王李玜曾祖母莊順王妃訃至賜祭一次琉球越南國王卒告哀遣使諭祭並給銀絹母妃世子喪俱不告哀不賜恤使臣來京病歿則題請恤典賜棺及祭歸葬者聽品官喪禮定制有疾遷正寢疾革書遺言三品以上官具遺疏既終乃哭立喪主主婦護喪諸執事人治棺民公采板侯伯一品官以下朱棺訃告設尸牀帷堂陳沐具乃含三品以上用小珠玉七品以上用金木屑五襲衣常服一稱朝衣冠帶各以其等明日小斂陳斂牀堂東加斂衣三品以上五稱復三襌二五品以上三稱復二襌一六品以下二稱復襌各一皆以繒復衾一又明日大斂蓋棺設靈牀柩東柩前設靈座陳奠几喪主及諸子居苫次族人各服其服朝夕奠肴饌午餅餌遇朔望則朝奠具殷奠肴核加盛初祭陳饌筵羊酒具楮幣公筵十五席羊七楮四萬侯筵十二楮三萬六千伯筵十二楮三萬二千羊俱六一品官筵十羊五楮二萬八千二品筵八羊四楮二萬四千三品筵六楮二萬四品筵五楮萬六千羊俱三五品筵四楮萬二千六七品筵三楮萬羊俱二族人齊集喪主以下再拜哭奠如禮卒奠大功者易素服大祭同初祭期服者易素服百日致奠剃髮三月而葬一品塋地九十步封丈有六尺遞殺至二十步封二尺止繚以垣公侯伯周四十丈守塋四戶二品以上周三十五丈二戶五品以上周三十丈一戶六品以下周十二丈止二人守之公至二品用石人望柱暨虎羊馬各二三品無石人四品無石羊五品無石虎其墓門勒碑公侯伯螭首高三尺二寸碑身高九尺廣三尺六寸龜趺高三尺八寸一品螭首二品麒麟首三品天祿辟邪首四至七品圓首方趺首視公侯伯遞殺二尺至尺八寸止碑身遞殺五寸至五尺五寸止廣遞殺二寸至二尺二寸止趺遞殺二寸至二尺四寸止刻壙志用石二片一為蓋書某官之墓一為底書姓名鄉里三代生年卒葬月日及子孫葬地婦人則隨夫與子孫封贈二石相嚮鐵束埋墓中製柩輿上用竹格結以綵旁施帷幔四角垂流蘇繒荒繒幃並青藍色公侯伯織五采一二品用銷金五品以上畫雲氣六七品素繒無飾承以槓五品以上朱六七品飾紅堊障柩畫翣五品以上四六七品二引布二功布一靈車一明器則從俗諏日發引前夕祖奠翌日遣奠會葬者畢集公鞍馬八遞殺至二數儀從前導引以丹旐銘旌滿用丹旐漢用銘旌至墓所乃窆祀后土題主奉安升車反哭乃虞羊酒楮帛各視其等祭畢柔日再虞剛日三虞百日卒哭次日祔家廟期年小祥再期大祥遷主入廟祝讀告辭主人俯伏五拜訖改題神主詣廟設東室奉祧主藏夾室乃徹靈座後一月禫喪至此計二十有七月喪主詣廟祗薦禫事其在外聞喪者訃至易服哭奔喪至家憑殯哭翌日成服喪期自聞訃日始餘同期以下聞喪易服為位而哭奔喪則至家成服官在職非本生父母喪雖期猶從政不奔喪聞訃易服為位而哭私居持服入公門治事仍常服期喪者期年不與朝祭服滿則於私居為位哭除之順治九年定百官親喪祭禮以其子品級子視父母命婦視夫同康熙二十六年禁居喪演戲飲博凡官卒任所或父母與妻喪許入城治事乾隆間諭京旗文武官遇親喪百日後即入署治事持服如故罷與祭祀朝會道光二十四年定民公以下軍民以上居喪二十七月不宴會作樂不娶妻納妾門戶不換舊符宣統元年禮部議畫一滿漢喪制自是滿官親喪去職與漢官一例矣士庶人喪禮順治初年定制士庶卒用朱棺櫬一層鞍馬一初祭用引幡金銀楮幣各一千祭筵三羊一大祭同百日期年祭視初祭半之一月殯三月葬墓祭紙幣酒肴有定數通禮士斂衣復襌各一復衾一襲常服一稱含用金銀屑三用銘旌庶人復衾一含銀屑三立魂帛士塋地圍二十步封高六尺墓門石碣圓首方趺壙志二如官儀柩輿上竹格垂流蘇槓飾紅堊無翣引布二功布一靈車一明器從俗庶人塋地九步封四尺有志無碣輿以布衾覆棺不施幃蓋槓兩端飾黑中飾紅堊餘略仿品官制從殺雍正初元定軍民故者前後斂衣五襲鞍馬一初祭祭筵二羊一大祭同常祭減半棺罩生監用青絹軍民春布十三年詔曰朕聞外省百姓喪葬侈靡甚至招集親鄰開筵劇飲名曰鬧喪且於喪所殯時雜陳百戲匪唯背理抑亦忍情敕督撫嚴禁陋習違者治罪又諭吉凶異道不得相干故娶在三年外而聘在三年內者春秋猶以為非三年之喪創深痛巨乃愚民不知禮教慮服喪後不獲嫁娶遂乘父母疾篤或殯斂未終而貿然為之者朕甚憫焉自今伊始齒朝之士下逮生監毋違此制其皂隸編氓窮而無告父母臥疾賴子婦治饔赧者任其迎娶盥饋俟疾瘳或服竟再成婚禮古者禮不下庶人其斯之謂歟曾子問親迎在途而壻之父母死女改服布深衣縞總以趨喪亦此義也服制順治三年定喪服制列圖於律頒行中外道光四年增輯大清通禮所載冠服絰屨多沿前代舊制制服五曰斬衰服生麻布旁及下際不緝麻冠絰菅屨竹杖婦人麻屨不杖曰齊衰服熟麻布旁及下際緝麻冠絰草屨桐杖婦人仍麻屨曰大功服粗白布冠絰如之繭布緣屨曰小功服稍細白布冠屨如前曰緦麻服細白布絰帶同素屨無飾服八曰斬衰三年子為父母為繼母慈母養母嫡母生母為人後者為所後父母子之妻同女在室為父母及已嫁被出而反者同嫡孫為祖父母或高曾祖父母承重妻為夫妾為家長同曰齊衰杖期嫡子衆子為庶母子之妻同子為嫁母出母夫為妻嫡孫祖在為祖母承重曰齊衰不杖期為伯叔父母為親兄弟為親兄弟之子及女在室者為同居繼父兩無大功以上親者祖為嫡孫父母為鏑長子及衆子為嫡長子妻為女在室者為子之為人後者繼母為長子衆子孫為祖父母孫女在室出嫁同女出嫁為父母為人後者為其本生父母女在室或出嫁而無夫與子者為其兄弟姊妹及姪與姪女在室者女適人為兄弟之為父後者婦為夫兄弟之子及女在室者妾為家長之父母與妻及長子衆子與其所生子曰齊衰五月為曾祖父母女雖適人不降曰齊衰三月為高祖父母女雖適人不降為繼父昔同居者為同居繼父兩有大功以上親者曰大功九月祖為孫及孫女在室者祖母為諸孫父母為諸子婦及女已嫁者伯叔父母為姪婦及姪女已嫁者為人後者為其兄弟及姑姊妹在室者既為人後於本生親屬皆降一等為人後者之妻為夫本生父母為己之同堂兄弟及同堂姊妹在室者為姑姊妹已嫁者為兄弟之子為人後者女出嫁為本宗伯叔父母為本宗兄弟及其子為本宗姑姊妹及兄弟之女在室者妻為夫之祖父母及伯叔父母曰小功五月為伯叔祖父母為同堂伯叔父母及同堂姊妹已嫁者為再從兄弟及再從姊妹在室者為同堂兄弟之子及女在室者為從祖姑及堂姑在室者祖為嫡孫婦為兄弟之孫及孫女在室者為外祖父母為母之兄弟姊妹及姊妹之子為人後者為其姑姊妹已嫁者婦為夫兄弟之孫及孫女在室者為夫之姑姊妹兄弟及夫兄弟之妻為夫同堂兄弟之子及女在室者女出嫁為本宗堂兄弟及姊妹在室者曰緦麻三月祖為衆孫婦祖母為嫡孫衆孫婦高曾祖父母為曾玄孫為乳母為族曾祖父母族伯叔父母為族兄弟及族姊妹在室者為族曾祖姑及族祖姑族姑在室者為兄弟之曾孫及曾孫女在室者為再從兄弟之子及女在室者為祖姑堂姑及再從姊妹出嫁者為姑之子舅之子為兩姨兄弟為妻之父母為壻為外孫及外孫女為兄弟孫之妻為同堂兄弟之妻為同堂兄弟子之妻婦為夫高曾祖父母為夫伯叔祖父母及夫祖姑在室者為夫堂伯叔父母及堂姑在室者為夫同堂兄弟及同堂兄弟之妻為夫同堂姊妹為夫再從兄弟之子及女在室者為夫同堂兄弟之女已嫁者為夫同堂兄弟子之妻與孫及孫女在室者為夫兄弟孫之妻及兄弟之孫女已嫁者為夫兄弟之曾孫及曾孫女在室者女已嫁為本宗伯叔祖父母及祖姑在室者為本宗從伯叔父母及堂姑在室者為本宗堂兄弟之子及女在室者乾隆四十年高宗特旨允以獨子兼祧於是始定兼祧例兼祧者從權以濟經足補古禮之闕會典服制別大宗小宗以大宗為重大宗依服制本條持服兼祧依降服持服道光九年禮臣增議兩祧服制以獨子之子分承兩房宗祧者各為父母服斬衰三年為祖父母服齊衰不杖期父故嫡孫承重俱服斬衰三年其本身為本生親屬俱從正服降一等子孫為本生親屬祗論所後宗支親屬服制同治十年允禮臣請兼祧庶母服制依定制為兼祧父母服期為兼祧庶母服小功其以大宗子兼祧小宗與以小宗兼祧大宗者以大宗為重為大宗庶母服期年小宗庶母服小功其以小宗兼祧小宗者以所生為重為本生庶母服期年為兼祧庶母服小功至出嗣而非兼祧者以所後為重為所後庶母服期年為本生庶母服小功既降期而服小功其兼祧庶母為兼祧子持服亦如之
