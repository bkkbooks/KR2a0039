body:
  text: 清史稿卷九十四志六十九樂一記曰安上治民莫善於禮移風易俗莫善於樂樂也者考神納賓類物表庸以其德馨殷薦上帝者也聖道四達聲與政通於是有綴兆之容簫籥之音被服其光輝膏潤其猷烈以與民康之民無瘁揫傷之嗟放僻嫚蕩之志夫然後雅頌作焉蓋三苗格而韶舞十一稅而頌謳玄鳥歌而商祚興靈臺奏而周道昌王官失守神不降祉移及春秋脊脊大亂仲尼序詩列黍離於國風齊王德於邦君明其不能復雅中更暴秦樂經埃滅音之鄭衛自此而階郊廟登歌聲不逮下擾民齊教無聞焉爾然而歷代創興莫不鋪陳南雅自制郊辭繩祖業之維艱頌帝功之有赫考較鐘懸裁定縟典雖渾灝三五炳焉同風而寤想聞韶跂之彌卲是則前誥所譏鄰於夜誦者也清起僻遠迎神祭天初沿邊俗及太祖受命始習華風天命崇德中征瓦爾喀臣朝鮮平定察哈爾得其宮懸以備四裔燕樂世祖入關修明之舊有中和韶樂郊廟朝會用之有丹陛大樂王公百僚慶賀用之有中和清樂丹陛清樂宮中筵宴用之有鹵簿導迎樂巡蹕用之又製鐃歌法曲奮武敵愾宣鬯八風以儷漢世短簫而滿洲舊舞是曰莽式率以蘭錡世裔充選所陳皆遼瀋故事作麾旄韜矢躍馬涖陳之容屈伸進反輕蹻俯仰之節歌辭異漢不頒太常所謂纘業垂統前王不忘者歟聖祖高宗制作自任臣匪師曠之聰君逾姬旦之美考音諧金石昭德摛天漢帝秩皇造於斯為盛但觀其命伶倫使協律召咸黑以賡歌非不陶英鑄莖四隅率同而繼體再傳頌聲寖廢魏文聽之而思臥季札觀之而無譏是知樂之為懿覘國隆汙謳歌在民匪所自致而三古承流曾靡先覺可為惋欷者也稽清之樂式遵明故六間七始實紹古亡布咫禾譣氣灰琯斯乃神瞽以之塞瑬隸首由其踠步將欲起元音之廢復淳朴之真弘我夏聲粃西奏淡欲繕性一綖庶幾有庇經誥其或在此必監前憲我則優矣國宬所書聲容器數之次第管律絃度之討論煥乎秩秩可謂有文今掇其要以備簡籍太祖肇啓東陲戡亂用武聲物弇朴率緣遼舊天命元年即尊位瀋陽諸貝勒羣臣廷賀上壽始制鹵簿用樂八年定凱旋拜天行禮筵宴樂制太宗天聰八年又定出師謁堂子拜天行禮樂制元旦朝賀樂制九年停止元旦雜劇先是梅勒章京張存仁上言元旦朝賀大體所關雜劇戲謔不宜陳殿陛故事八旗設宴惟用雅樂從之十年建國號曰清改元崇德其明年遂有事太廟追尊列祖四孟時享歲暮祫祭並奏樂皇帝冬至萬壽二節與元旦同御前儀仗樂器鑼二鼓二畫角四簫二笙二架鼓四橫笛二龍頭橫笛二檀板二大鼓二小銅鈸四小銅鑼二大銅鑼四雲鑼二嗩訥四樂人緑衣黃褂紅帶六瓣紅絨帽銅頂上綴黃翎從內院官奏請也又詔公主冊封諸王家祭受降獻馘皆用樂世祖順治元年攝政睿親王多爾袞既定燕都將於十月告祭天地宗廟社稷大學士馮銓洪承疇等言郊廟及社稷樂章前代各取嘉名以昭一代之制梁用雅北齊及隋用夏唐用和宋用安金用寧元宗廟用寧郊社用咸前明用和我朝削平寇亂以有天下宜改用平郊社九奏宗廟六奏社稷七奏從之於是定圜丘大祀皇帝出宮午門聲鐘不作樂致祭燔柴迎神奏始平奠玉帛奏景平進俎奏咸平初獻奏壽平亞獻奏嘉平終獻奏雍平徹饌奏熙平送神奏太平望燎奏安平禮成教坊司導迎樂奏祐平午門鐘作還宮方澤大祀皇帝出宮午門聲鐘不作樂致祭瘞毛血迎神奏中平奠玉帛奏廣平進俎奏咸平初獻奏壽平亞獻奏安平終獻奏時平徹饌奏貞平送神望瘞奏寧平禮成教坊司導迎樂奏祐平午門鐘作還宮祈穀皇帝出宮午門聲鐘不作樂燔柴迎神奏中平奠玉帛奏肅平進俎奏咸平初獻奏壽平亞獻奏景平終獻奏永平徹饌奏凝平送神奏清平望燎奏太平餘與圜丘方澤同太廟時享皇帝出宮鐘止不作樂致祭迎神奏開平奠帛初獻奏壽平亞獻奏嘉平終獻奏雍平徹饌奏熙平送神望燎奏成平禮成教坊司導迎奏禧平聲鐘還宮社稷壇皇帝出宮聲鐘不作樂致祭瘞毛血迎神奏廣平奠玉帛初獻奏壽平亞獻奏嘉平終獻奏雍平徹饌奏熙平送神望瘞奏成平禮成教坊司導迎奏祐平聲鐘還宮舞皆八佾初獻武舞亞獻終獻文舞文武舞生各六十四人執干戚羽籥於樂懸之次引舞旌節四舞生四人司之祭之日初獻樂作司樂執旌節引武舞生執干戚進奏武功之舞亞獻終獻樂作司樂執旌節引文舞生執羽籥進奏文德之舞惟先師廟祗文舞六佾其三大節常朝及皇帝升殿還宮俱奏中和韶樂羣臣行禮奏丹陛大樂親祭壇廟乘輿出入用導迎樂樂章均用平字宴享清樂則以樂詞之首為章名是年世祖至京行受寶禮先期錦衣衛設鹵簿儀仗旗手衛設金鼓旗幟教坊司設大樂於行殿西前導時龜鼎初奠官懸備物未遑潤色沿明舊制雜用之教坊司置奉鑾一人左右韶舞各一人協同官十有五人俳長二十人色長十七人歌工九十八人宮內宴禮領樂官妻四人領教坊女樂二十四人祠祭諸樂則太常寺神樂觀司之以協律郎教習樂生月三六九日演於凝禧殿二年從有司言春秋上丁釋奠先師樂六奏迎神奏咸平奠帛初獻奏寧平亞獻奏安平終獻奏景平徹饌送神奏咸平祭歷代帝王樂六奏迎神奏雍平奠帛初獻奏安平亞獻奏中平終獻奏肅平徹饌奏凝平送神望燎奏壽平八年制朝日七奏樂章用曦迎神奏寅曦奠玉帛奏朝曦初獻奏清曦亞獻奏咸曦終獻奏純曦徹饌奏延曦送神奏歸曦夕月六奏樂章用光迎神奏迎光奠玉帛初獻奏升光亞獻奏瑤光終獻奏瑞光徹饌奏涵光送神奏保光皆中和韶樂皇太后皇后三大節慶賀皇帝大婚行禮皆丹陛大樂祭真武東嶽城隍廟教坊司作樂如羣祀是年又允禮部請更定樂舞樂章樂器之數享廟大樂於殿內奏之文武佾舞備列樂章卒歌樂器俱設補舞生舊額五百七十人其後又定常朝升殿中和韶樂奏隆平王公百官行禮丹陛大樂奏慶平外藩行禮丹陛大樂奏治平還宮中和韶樂奏顯平藉田饗先農樂章七奏用豐迎神奏永豐奠帛初獻奏時豐亞獻奏咸豐終獻奏大豐徹饌奏屢豐送神奏報豐望瘞奏慶豐禮成御齊宮導迎大樂奏天下樂升座奏萬歲樂羣臣行禮丹陛大樂奏朝天子筵宴上壽奏三月韶光進饌清樂奏太清歌太廟祫祭迎神奏貞平奠帛初獻奏壽平亞獻奏嘉平終獻奏雍平徹饌奏熙平送神奏清平大享殿合祀天地百神樂章九奏用和迎神奏元和奠玉帛奏景和進俎奏肅和初獻奏壽和亞獻奏安和終獻奏永和徹饌奏協和送神奏泰和望燎瘞奏清和其上皇太后徽號冊寶尊封太妃冊立中宮太和殿策士諸慶典皆特詔用樂自後幸盛京謁陵進實録玉牒亦如之康熙初聖祖踐阼幼沖率承舊憲無所改作八年惟詔定皇帝太皇太后皇太后皇后三大節朝賀樂皇帝元旦升座中和韶樂奏元平還宮奏和平冬至升座奏遂平還宮奏允平萬壽節升座奏乾平還宮奏太平羣臣行禮丹陛大樂奏慶平外藩奏治平太皇太后升座奏升平還宮奏恆平行禮奏晉平皇太后升座奏豫平還宮奏履平行禮奏益平皇后升座奏淑平還宮奏順平行禮奏正平而有司肄習日久樂句律度凌厲失所伶倫應官比於制氏但紀鏗鏘鼓舞而已自世祖時已屢飭典樂官演習樂舞聲容儀節嘗諭大學士等曰各處祭祀太常寺所奏樂俱未和諧樂乃祭祀之大典必聲容儀節盡合歌章始臻美善其召太常寺官嚴飭之至十一年聖祖亦諭禮臣慎重禋祀勤加習練勿仍前怠褻越明典二十一年三藩削平天下無事左副都御史余國柱首請釐正郊廟朝賀宴享樂章上曰享祀樂章一代制作所繫禮部翰林院其集議以聞尋奏自古廟樂原以頌述祖宗功德本朝郊壇廟祀樂章曲名曰平遵奉已久太祖太宗世祖同於太廟致祭宜如舊惟朝會宴享等樂曲調風雅未備宜敕所司酌古準今求聲律之原定雅奏之節從之因命大學士陳廷敬重撰燕樂諸章然猶襲明故雖務典蔚有似徒歌五聲二變踵訛奪倫黃鍾為萬事根本臣工無能言之者帝方謙讓亦未暇革也二十三年東巡謁闕里躬祭孔林陳鹵簿奏導迎大樂樂章樂舞先期命太常寺遣司樂官前往肄習與太學先師廟同二十九年以喀爾喀新附特行會閲禮陳鹵簿奏鐃歌大樂於是帝感禮樂崩隤始有志制作之事三十一年御乾清宮召大學士九卿前指五聲八風圖示之曰古人謂十二律定而後被之八音則八音和奏之天地則八風和諸福之物可致之祥無不畢至言樂律所關者大也而十二律之所從出其義不可知律呂新書所言算數專用徑一圍三之法此法若合則所算皆合若舛則無所不舛矣朕觀徑一圍三之法必不能合蓋徑一尺則圍當三尺一寸四分一釐有奇若積纍至於百丈所差當十四丈有奇等而上之舛錯可勝言耶因取方圓諸圖謂羣臣曰所言徑一圍三但可算六角之數若圍圓必有奇零朕觀八線表中半徑句股之法極精微凡圓者可以方算開方之術即從此出若黃鍾之管九寸空圍九分積八百一十分是為律本此舊說也其分寸若以尺言則古今尺制不同當以天地之度數為準惟隔八相生之說聲音高下循環相生復還本音必須隔八乃一定之理也隨命樂人取笛和瑟次第審音至第八聲仍還本音上曰此非隔八相生之義耶羣臣皆曰誠如聖訓非臣等聞見所及三十四年定大閲鳴角擊鼓聲金之制四十九年正月孝惠章皇后七十萬壽又諭禮部曰瑪克式舞乃滿洲筵宴大禮典至隆重故事皆王大臣行之今歲皇太后七旬大慶朕亦五十有七欲親舞稱觴是日皇太后宮進宴奏樂上前舞蹈奉爵極歡乃罷帝既妙研鍾律時李光地為文淵閣大學士以耆碩被顧問會進所纂大司樂釋義及樂律論辨因上言曰禮樂不可斯臾去身亦不可以一日不行於天下自漢以來禮樂崩壞不合於三代之意者二千餘年而樂尤甚蓋自諸經所載節奏篇章器數律呂之昭然者而紛紛之說終不能以相一又況乎精微之旨與天地同其和者哉今四海靡靡風聲頽敝等威無辨而奢僭不可止聯屬無法而鬬爭不可禁記曰無本不立無文不行神而明之者本也舉而措之者文也謂宜搜召名儒以至淹洽古今之士上監於夏商近稽自漢唐以降考定斟酌成一代大典以淑天下而範萬世大學士張玉書亦言樂律算數之學失傳已久承訛襲舛莫摘其非奧義微機莫探其蘊臣等躬聆訓誨猶且一時省寤而覆算迷蒙中外臣民何由共喻宜特賜裁定編次成書頒示四方共相傳習正歷來積算之差訛垂萬世和聲之善法學術政事均有裨益帝重違臣下請五十二年遂詔修律呂諸書於蒙養齊立館求海內暢曉樂律者光地薦景州魏廷珍寧國梅瑴成交河王蘭生任編纂蘭生故光地所拔士樂律有神契朱子琴律圖說字多訛謬蘭生以意是正瞭然可曉及被詔入直所與編校者皆淹雅士而蘭生學獨深亦時時折中於帝遇有疑義親臨決焉其法首明黃鍾為十二律呂根源以縱黍橫黍定古今尺度今尺八寸一分當古尺十寸橫黍百粒當縱黍八十一粒漢志黃鍾之長以子穀秬黍中者一黍之廣度之九十分黃鍾之長一為一分廣者橫也九十分為黃鍾之長則黃鍾為九十橫黍所纍明矣即以橫黍之度比縱黍為古尺之比今尺以古尺為一率今尺為二率黃鍾古尺九寸為三率推得四率七寸二分九釐即黃鍾今尺之度律呂新書黃鍾九寸空圍九分積八百一十分再置古尺積八百一十分以九十分歸之得面羃九方分用比例相求面線相等面積不同定數圓面積一十萬為一率方面積一十二萬七千三百二十四為二率今面羃九方分為三率推得四率一十一分四十五釐九十豪開平方得三分三釐八豪五絲一忽為黃鍾古尺徑數求周得十分六釐三豪四絲六忽即以古尺之積比今尺之積古尺一百分自乘再乘得一百萬分為一率今尺八十一分自乘再乘得五十三萬一千四十一分為二率黃鍾積八百一十分為三率推得四率四百三十分四百六十七釐二百十一豪即黃鍾今尺之積以今尺長七寸二分九釐歸之得面羃五分九十釐四十九豪求徑得二分七釐四豪一絲九忽而黃鍾管之縱長體積面徑定矣黃鍾既定於是制律呂同徑之法以積實容黍為數三分損益以核之黃鍾三分損一下生林鍾林鍾三分益一上生太簇太簇三分損一下生南呂南呂三分益一上生姑洗姑洗三分損一下生應鍾應鍾三分益一上生蕤賓蕤賓三分益一上生大呂大呂三分損一下生夷則夷則三分益一上生夾鍾夾鍾三分損一下生無射無射三分益一上生仲呂又倍之自蕤賓以下至應鍾半之自黃鍾以下至仲呂皆六不用京房變律之說定宮聲在黃鍾大呂之間黃鍾為宮次太簇以商應次姑洗以角應次蕤賓以變徵應次夷則以徵應次無射以羽應次半黃鍾以變宮應所謂陽律五聲二變也至半太簇為清宮仍應黃鍾焉大呂為宮次夾鍾以商應次仲呂以角應次林鍾以變徵應次南呂以徵應次應鍾以羽應次半大呂以變宮應所謂陰呂五聲二變也至半夾鍾為清宮仍應大呂焉旋相為宮折中取聲類而不雜驗之簫笛工為宮則凡應商六應角五應變徵乙應徵上應羽尺應變宮黃鍾為低工大呂為高工而分清濁太簇為低凡夾鍾為高凡而分清濁姑洗為低六仲呂為高六而分清濁蕤賓為低五林鍾為高五而分清濁夷則為低乙南呂為高乙而分清濁無射為低上應鍾為高上而分清濁倍之則倍無射倍應鍾為宮聲之右變宮尺字而分清濁倍夷則倍南呂為變宮之右下羽上字而分清濁倍蕤賓倍林鍾為下羽之右下徵乙字而分清濁半之則半黃鍾半大呂為羽聲之左變宮尺字而分清濁半太簇半夾鍾為變宮之左少宮工字而分清濁半姑洗半仲呂為少宮之左少商凡字而分清濁古樂所以起下徵而終清商也黃鍾一徑別其長短為十二律呂復助以倍半而得五聲二變之全由是制以樂器以黃鍾之積為本加分減分皆用黃鍾之長與徑相比大加至八倍則長與徑亦加一倍小減至八分之一則長與徑亦減其半正律呂管十二倍管六半管六黃鍾同形管五十六亦倍管六半管六同形管又生同徑管十一凡一千三百六十八管依數立制以考其度以審其音八倍黃鍾之管聲應正黃鍾之律濁宮低工七倍黃鍾之管應大呂之呂清宮高工六倍黃鍾之管應太簇之律濁商低凡五倍黃鍾之管應夾鍾之呂清商高凡四倍黃鍾之管應姑洗之律濁角低六三倍半黃鍾之管應仲呂之呂清角高六三倍黃鍾之管應蕤賓之律濁變徵低五三倍宜應仲呂今高半音而應蕤賓蓋管體漸小聲音易別必於三倍之積復加正黃鍾之半積始應仲呂之呂清角高六半積之理由此生也二倍半黃鍾之管應林鍾之呂清變徵高五二倍加四分之一黃鍾之管應夷則之律濁徵低乙二倍黃鍾之管不應夷則而二倍半二倍之間始應之必以半積復半之為四分之一加於二倍之內其分乃合四分之一之理由此生焉二倍黃鍾之管應南呂之呂清徵高乙正加四分之三黃鍾之管應無射之律濁羽低上正加四分之二黃鍾之管應應鍾之呂清羽高上正加四分之一黃鍾之管應半黃鍾之律濁變宮低尺正加八分之一黃鍾之管應半大呂之呂清變宮高尺此管與正黃鍾最近欲取合清宮之分則以四分之一復半之為八分之一加於正黃鍾之分其聲始應八分之一之理由此生焉繼此則正黃鍾管聲應半太簇之律濁宮低工乃與八倍黃鍾之管相和同聲矣遞減之黃鍾正積八分之七之管應大呂之呂八分之六之管應太簇之律八分之五之管應夾鍾之呂八分之四之管應姑洗之律八分之三分有半之管應仲呂之呂八分之三之管應蕤賓之律八分之二分有半之管應林鍾之呂八分之二又加一分之四分之一之管應夷則之律此一分之四分之一乃正黃鍾三十二分之一至此三十二分之理生焉八分之二之管應南呂之呂八分之一又加一分之四分之三之管應無射之律八分之一又加一分之四分之二之管應應鍾之呂八分之一又加一分之四分之一之管應半黃鍾之律八分之一又加一分之八分之一之管應半大呂之呂此一分之八分之一乃正黃鍾六十四分之一至此六十四分之理生焉而八分之一之管又應正黃鍾而為正黃鍾長與徑之半自八倍黃鍾至黃鍾八分之一皆具同徑之十二律呂皆成一調之五聲二變推而演之加黃鍾之積至六十四倍則同形管長徑皆四倍於正黃鍾減黃鍾之積至六十四分之一則同形管長徑皆得正黃鍾四分之一六十四倍積同形管應正黃鍾五十六倍積同形管與六十四分之七同形管應大呂四十八倍積同形管與六十四分之六同形管應太簇四十倍積同形管與六十四分之五同形管應夾鍾三十二倍積同形管與六十四分之四同形管應姑洗二十八倍積同形管與六十四分之三加半同形管應仲呂二十四倍積同形管與六十四分之三同形管應蕤賓二十倍積同形管與六十四分之二加半同形管應林鍾十八倍積同形管與六十四分之二加一分四之一同形管應夷則十六倍積同形管與六十四分之二同形管應南呂十四倍積同形管與六十四分之一加一分四之三同形管應無射十二倍積同形管與六十四分之一加一分四之二同形管應應鍾十倍積同形管與六十四分之一加一分四之一同形管應半黃鍾九倍積同形管與六十四分之一加一分八之一同形管應半大呂六十四分之一同形管仍應正黃鍾於是十二律呂之同徑異形者合長短倍半以成旋宮之用而黃鍾之同形異徑者因加減實積亦成旋宮之用制器求聲齊於此矣雖然五聲二變管律與絃度又各不同漢唐以後皆宗司馬淮南之說以三分損益之術誤為管音五聲二變之次復執管子絃音五聲度分而牽合於十二律呂之中試截竹為管吹之黃鍾半律不與黃鍾合而合黃鍾者為太簇之半律則倍半相應之說在絃音而非管音也又黃鍾為宮其徵聲不應於林鍾而應於夷則則三分損益宮下生徵之說在絃度而非管律也以絃度取聲全絃與半絃之音相應而半律較全律則下一音蓋絃之體實藉人力鼓動而生聲全絃長故得音緩半絃短故得音急長短緩急之間全半相應之理寓焉管之體虛假人氣入之以生聲故管之徑同者其全半不相應求其相應必徑減半始得所以正黃鍾與黃鍾八分之一之管相應同聲也因全半之不同於是管律絃度首音至八音其間所生五聲二變之度分亦異管律黃鍾之全為宮聲首音則太簇之半為少宮八音其間太簇之全為商聲二音姑洗為角聲三音蕤賓為變徵四音夷則為徵聲五音無射為羽聲六音黃鍾之半為變宮七音自首音至第八音得七全分若絃度假借黃鍾全分為宮聲首音則黃鍾之半為少宮八音其間太簇之分為商聲二音姑洗之分為角聲三音蕤賓之分為變徵四音而林鍾之分乃為徵聲五音南呂之分為羽聲六音應鍾之分為變宮七音各絃之分宮至商商至角角至變徵徵至羽羽至變宮皆得全分而變徵至徵變宮至少宮祗得半分自首音至八音合為六全分故絃音不可以十二律呂之度取分如以倍無射變宮尺字定絃則得下徵之分倍無射變宮尺字即今笛與頭管之合字也凡品樂居首一絃必得下徵之分而五音之位始正故世以頭管合字定琴之一絃為黃鍾之宮者蓋一絃不得不定以合字正為取下徵之分也黃鍾宮聲工字定絃得下羽之分太簇商聲凡字定絃得變宮之分姑洗角聲六字定絃得宮絃之分蕤賓變徵五字定絃得商絃之分夷則徵聲乙字定絃得角絃之分無射羽聲上字定絃得變徵之分而半黃鍾變宮尺字定絃仍得徵絃之分焉今借黃鍾之分為宮絃全分其首音仍定以黃鍾之律則二音限於太簇之分而聲亦應太簇之律三音則變為夾鍾之分而聲始應姑洗之律如仍取姑洗之分則聲必變而應於仲呂之呂四音復變為仲呂之分而聲應蕤賓之律如仍取蕤賓之分則聲必變而應於林鍾之呂五音則為林鍾之分而應夷則之律六音則為南呂之分而應無射之律七音又變為無射之分而聲始應半黃鍾之律如仍取應鍾之分則聲必變而應於半大呂之呂此宮絃之分因全絃首音定黃鍾之律而變為羽絃之分者也或以黃鍾之分為宮絃全分而本絃七音欲各限以宮絃內七音之分則首音必定以姑洗之律以次分之此宮絃之分因全絃首音定姑洗之律而得宮絃之分者也又或以笛與頭管合字為今所定倍無射之律為宮絃全分首音依次分之得下徵絃之分此宮絃之分因全絃首音定以笛之合字而變為徵絃之分者也依律呂而定絃音則絃度之分隨之潛移依絃度之分命為七音之次則聲音宮調不與律呂相協此由管律絃度全半生聲取分之不同於是絲樂絃音之旋宮轉調與竹樂管音亦異清濁二均各七調中與管樂有同者有可同者有不可同者同者惟宮調一調五聲二變皆正應可同者商調徵調五聲正應二變借用不可同者角調變徵調羽調變宮調五聲之內清濁相淆如但以絃音奏之而不和以管音祗有四調餘三調皆轉入絃音宮調故周禮大司樂三宮漢志三統皆以三調為準所謂三統其一天統黃鍾為宮乃黃鍾宮聲位羽起調姑洗角聲立宮主調是為宮調也其一人統太簇為宮乃太簇商聲位羽起調蕤賓變徵立宮主調是為商調也其一地統林鍾為宮乃絃音徵分位羽實管音夷則徵聲位羽起調半黃鍾變宮立宮主調是為徵調也隋志鄭譯云考尋律呂七聲之內三聲乖應當時考較聲律或以管音考核絃音或以絃音考核管音故得四調相和三調乖應即二變調與角調也變徵調與羽調五正聲內祗一聲乖應然羽調猶能自立一調變徵調則轉入宮調聲字至角調變宮調五聲之內二三聲乖應與宮調聲字雷同皆不能成一調也唐志載四宮二十八調率以絃音之分定為十二律呂之度故有正宮大食高大食之名今即絃音管音之和不和以辨陽律陰呂之分用合用乃知唐書之二十八調獨取絃音不在管律而古人所用三統實取管音絃音之相和者用之也是以絃音諸樂其要有四一定絃音應某律呂之聲字即得某絃之度分一絃音轉調不能依次遞遷故以宮調為準有幾絃不移而他絃或緊一音或慢半音遂成一調而各絃七聲之分因之而變一絃音諸調雖無二變而定絃取音必審二變之聲必計二變之分始能得其條貫不然宮調無所取準一絃音宮調惟宮與商徵得與律呂相和為用餘四調陰陽乖應或淆入宮調聲字不得自成一調即此四者條分縷析則絃音旋宮轉調之法備矣樂之學既微自古言者又歧說繁滋莫衷一是子長孟堅時已異同隋唐登歌雜蘇祗婆龜茲樂以律呂文之神瞽弗世等於詩亡宋人李照和峴范鎮蔡元定之徒稍有志於復古然但資肊驗或且飾以陰陽郛廓之說明鄭世子載堉始以勾股談律度帝本長疇人術加之以密率基之以實測管音絃分千載之襲繆至是乃定明年書成分三編曰正律審音發明黃鍾起數及縱長體積面羃周徑律呂損益之理管絃律度旋宮之法曰和聲定樂明八音制器之要詳考古今之同異曰協均度曲取波爾都哈兒國人徐日升及意大里亞國人德里格所講聲律節度證以經史所載律呂宮調諸法分配陰陽二均字譜賜名曰律呂正義蘭生廷珍等皆賜及第進官有差既又諭改訂中和樂章聲調曰殿陛所奏中和樂章皆沿明代句有長短體制類詞曾因不雅命大學士陳廷敬等改撰章法皆以四字為句而樂人未嫻聲調仍以長短句湊拍歌之今考舊調已得宮商節奏甚為和平必使歌章字句亦隨韵逗則章明而宮聲諧其著南書房翰林同大學士詳定以聞是年十一月冬至躬祀圜丘遂用新定樂律五十四年改造圜丘壇金鐘玉磬各十有六五十五年頒中和韶樂於直省文廟初樂章既改用平而直省仍沿用和至是從禮部請始頒行焉世宗雍正二年定耕藉三十六禾詞耕藉筵宴樂制進筵丹陛樂奏雨暘時若之章進酒管絃樂奏五穀豐登之章進饌清樂奏家給人足之章其辭皆大學士蔣廷撰後又定祭時應宮祭風伯廟教坊司作樂祭雷師雲師廟和聲署作樂官民婚嫁品官鼓樂人不得過十二生監軍民不得過八人著為令高宗即位鋭意制作莊親王允祿自聖祖時監修律算三書至是仍典樂事乾隆六年殿陛奏中和韶樂帝覺音律節奏與樂章不協因命和親王弘晝同允祿奏試允祿因言明代舊制樂章以五六七字為句而音律之節奏隨之樂章音律俱八句故長短相協今殿陛樂若定以四字為句則與壇廟無殊惟樂章更定大典攸關謂宜會同大學士禮部將樂章十二成詳議令翰林改擬進覽尋大學士鄂爾泰等議樂章十二成內惟淑平順平二成每章八句其十成樂章每章各十句句四字而按之音律則每章八句每句六七八字以十句四字樂章和以八句六七八字之音律長短抑揚宜不盡協應將樂章字句按音律之節奏以調和之章酌從八句句無拘四言奏可舊中和樂編鐘內倍夷則四鐘在黃鍾正律之前帝疑其舛兼詢編鐘倍律及設而不作之故於臣工時張照以刑部侍郎副允祿管部名知樂奏言編鐘之制以十六鐘為一架陽律八為一懸在上陰律八為一懸在下陽自陽陰自陰律呂之法必有倍半然後高低清濁具備以成旋宮之用故陽律有倍蕤賓倍夷則倍無射在黃鍾之前有半黃鍾半太簇半姑洗在無射之後陰律則有倍林鍾倍南呂倍應鍾在大呂之前有半大呂半夾鍾半仲呂在應鍾之後倍蕤賓以還則聲過低而啞半仲呂以還則聲過高而促故不用編鐘無倍蕤賓倍林鍾亦無六半律以編鐘具八其音中和已足於用低不至倍蕤賓倍林鍾高不至六半律其序以從低至高濁至清排列為次倍夷則倍無射當在黃鍾之前倍南呂倍應鍾當在大呂之前與簫管之長短琴絃之巨細為一例排簫倍夷則倍無射二管在黃鍾之前倍南呂倍應鍾二管在大呂之前琴之倍徵倍羽二絃在宮絃之前若琴絃簫管易位則音不可諧是以編鐘之次第同於絃管又奏編鐘一架上八下八上陽律下陰呂考擊之節南郊廟祀及臨朝大典皆用黃鍾為宮北郊月壇則用大呂為宮用黃鍾為宮則擊上鐘用大呂為宮則擊下鐘臨朝以下鐘易置於上而擊之非下八鐘不擊也又八鐘原祗七音姑洗為宮黃鍾起調為工字倍夷則無射為變徵太簇為變宮三鐘不入調是以不擊工字調外則惟二鐘不擊如以太簇為宮倍無射起調為尺字則倍夷則無射太簇三鐘皆擊而黃鍾為變宮夷則為變徵二鐘又當不擊矣因相沿俱以黃鍾調為黃鍾宮儒生不知音律謂黃鍾為聲氣之元萬物之母郊廟朝廷用之吉否則凶不知黃鍾為宮其第一聲便是下羽除變宮變徵不入調商角徵羽必須迭用若聲聲皆是黃鍾晏子所謂琴瑟專一誰能聽之況大武之樂即是無射為宮載之國語無射乃陽律之窮而武王用之則十二月各以其律為宮無所不可亦明矣上是之命如故當是時清興百餘年矣古學萌芽儒者毛奇齡李塨胡彥升江永輩多著書言樂事考證益邃密帝亦慕簫韶九成之盛剬詩緝頌勇於改為欲以文致太平聖祖時雖編定樂書大抵稽於音律而樂章句逗無譜不與音相應有協律高萬霖者耆年審音改定宮譜然祗壇廟之樂朝會清歌仍踵前繆照遂請續纂律呂書謂前代墜典宜見刊正許之開館纂修仍命允祿監其事未幾館臣上議壇廟樂章字譜天壇太廟朝日壇俱黃鍾為宮地壇夕月壇大呂為宮近於南齊祗用黃鍾之說而兼清濁二均及於大呂雖義有可取但編鐘器內必有設而不作者同於隋以前啞鐘之誚我皇上制作定世繼述休明允宜博考詳稽以襄盛典夫言禮樂必宗成周顧周代遙邈文不足徵所可考者莫如周禮而周禮所載圜鐘為宮祭天函鐘為宮祭地黃鍾為宮祭宗廟之說圜鐘函鐘不知何律鄭康成以圜鐘為夾鍾函鐘為林鍾祭地用林鍾義則善矣然林鍾何以又稱函鐘則亦無所據也惟準六樂次第論之有函鐘而無林鍾則知函鐘即林鍾然六樂又有夾鍾無圜鐘其以圜鐘為夾鍾謂夾鍾生於房心之間房心大辰天帝之明堂則用甘公石申戰代星家之言以解七百年前周公之制度誠非篤詁李光地謂祭天以黃鍾為宮祭宗廟以圜鐘為宮圜黃互錯諸儒相承而不知改揆以春禘之文則夾鍾之月也雖若近理然亦出於肊見周禮本言祭天以圜鐘為宮其下即云黃鍾為角一章之樂斷無黃鍾既為宮而又為角之理六樂次第清濁各一均黃鍾與大呂配祀天神太簇與應鍾配祭地祗姑洗與南呂配祀四望蕤賓與函鐘配祭山川夷則與仲呂配享姜嫄無射與夾鍾配享先祖以律之次第分神之尊卑顧律呂同用而清濁之間有同均者有不同均者見諸實用難於施行是以歷代皆欲仰法周制而苦無所憑惟唐貞觀時祖孝孫定為祭圜丘以黃鍾為宮方澤以林鍾為宮宗廟以太簇為宮朝賀宴饗則隨月用呂為宮最為通論蓋黃鍾子位天之統也乾位在亥亥前為子十二辰之始黃鍾下生林鍾林鐘未位地之統也坤位在申陽順陰逆申前為未自子至午七律而天之道備自未至丑七律而地之道備故黃鍾屬天林鍾屬地林鍾上生太簇太簇寅位人之統也故以祀宗廟先儒所謂萬物本乎天人本乎祖之義也光地亦稱祖孝孫特有遠識而歷代用樂此最近古臣等愚見謂宜遵聖祖律呂正義所定旋宮轉調之法將地壇樂章改林鍾為宮太廟樂章改太簇為宮社稷壇亦地也亦宜改用林鍾為宮月生於西酉西方正位也又秋分夕月建酉之月也夕月壇宜改用南呂為宮朝日壇若以日東月西日卯月酉論應用夾鍾為宮但夾鍾陰而日陽衷以人心屬日之義宜改用太簇為宮其朝會宴享並應依唐祖孝孫之說各以其月之律為宮先農壇農事也宜以姑洗為宮歷代帝王廟孔子廟祭以春秋春夾鍾秋南呂為宮太歲壇宜以歲始之律太簇為宮奏上而皇太后皇后升座還宮樂章律呂未定因命禮臣集議允祿議曰皇太后皇后樂章應用律呂博考前典並無明文惟十二律呂皆生於黃鍾故黃鍾為聲氣之元但既專用於南郊以尊上帝自不便擬用且律協於乾呂協於坤坤元允宜用呂大呂為黃鍾之呂擬皇太后樂以大呂為宮禮記天子日也日月東西相從而不已天道也酉為月之正位援后月之義擬皇后樂以南呂為宮履親王允祹議曰館臣擬皇太后樂以大呂為宮皇后樂以南呂為宮臣愚以為大呂南呂並是陰呂皇上曾有凡慶賀大典皇太后宮應用陽律之旨舊制一切大典俱以黃鍾為宮請仍循舊制皇上冬至元旦萬壽三大節皇太后皇后三大節並以黃鍾為宮帝以大呂者黃鍾之呂也既用黃鍾尊上帝林鍾尊后土太簇尊宗廟而議皇太后樂用大呂大呂之序乃在南呂後皇后樂已用南呂是先於皇太后也又方澤壇用蕤賓之呂林鍾為宮而社稷亦宜有別因命重議於是館臣請定皇太后樂用南呂為宮社稷壇祭以春秋二仲月上戊宜以夾鍾南呂為宮從之七年允祿等又奏太皇太后升座還宮用中和韶樂行禮用丹陛樂與皇帝同而皇太后皇后俱用丹陛樂考諸掌儀司自來升座還宮並用中和韶樂緣陳廷敬撰擬樂章之時以皇太后皇后不敢同於太皇太后便以丹陛名之請仍復舊各為樂章尋定皇太后御慈寧宮升座中和韶樂奏豫平皇帝率諸王羣臣行禮丹陛大樂奏益平還宮中和韶樂奏履平皇后率皇貴妃貴妃妃嬪及公主福晋命婦至宮行禮並同皇帝三大節臨軒還宮御內殿升座中和韶樂奏元平皇后率皇貴妃貴妃妃嬪行禮丹陛大樂奏雍平降座中和韶樂奏和平皇后三大節升座中和韶樂奏淑平行禮丹陛大樂奏正平降座中和韶樂奏順平皇帝筵宴進茶賜茶丹陛清樂奏海宇升平日進酒賜酒奏玉殿雲開進饌賜食中和清樂奏萬象清寧皇太后三大節升座還宮行禮與慶賀同筵宴進茶進酒進饌所奏歌詞與皇帝同時山東道監察御史徐以升奏言古有雩祭之典所以為百穀祈膏雨也其制則為壇於南郊之旁我朝禮制具備惟雩祭未有壇壝乞敕下禮臣博求典故詳考制度倣古龍見而雩之禮擇地立壇帝下其章大學士鄂爾泰等議曰孟夏之月蒼龍宿見東方為百穀祈膏雨故龍見而雩晉永和中依郊壇制為雩壇祈上帝百辟旱則祈雨唐時雩祀於南郊後行雩禮於圜丘歷代京師孟夏後旱雩之禮皆七日一祈唐制斟酌最善臣等酌議宜倣其制古大雩用舞童二佾衣玄衣各執羽翳歌雲漢之詩今皇上倣雲漢體御製詩歌八章聖念懇誠宸章剴切應用舞童十六人玄衣八列執羽翳終獻樂止贊者贊舞童歌詩歌畢乃望燎令掌儀司選聲音清亮者充之羽翳依周禮皇舞之式禮儀與孟夏常雩同上帝社稷宗廟太歲壇俱舊有樂章惟神祗壇闕應敕律呂館撰進乃定雩祀天神從圜丘以黃鍾為宮地祇從方澤以林鍾為宮樂用七成迎神奏祈豐奠帛奏華豐初獻奏安豐亞獻奏興豐終獻奏儀豐徹饌奏和豐送神奏錫豐是年始專設樂部凡太常寺神樂觀所司祭祀之樂和聲署掌儀司所司朝會宴饗之樂鑾儀衛所司鹵簿諸樂均隸焉以禮部內務府大臣及各部院大臣諳曉音律者總理之設署正署丞侍從待詔供奉供用官鼓手樂工總曰署吏而以所司樂器別其目鐘曰司鐘磬曰司磬琴瑟笙簫亦如之又禁道士充太常寺樂員初明樂舞生多選道童世祖定都沿而用之羽流慢褻識者慨焉至是其弊始革既又從館臣言定耕藉之樂耕藉前期進種導迎樂前導至日和聲署率屬鵠立綵棚南綵棚之制後二十三年裁歌禾辭者十四人司鑼司鼓司版司笛笙簫者各六人搴綵旗者五十人祭畢行耕藉禮禮成導迎樂作駕涖齊宮內門樂止中和韶樂作皇帝御後殿樂止報終畝中和韶樂作皇帝御齊宮升座樂止羣臣慶賀行禮丹陛大樂作進茶賜茶中和韶樂作皇帝乘輦出宮和聲署鹵簿大樂並作筵宴進茶賜茶改雨暘時若為喜春光進酒賜酒改五穀豐登為雲和迭奏進饌賜饌改家給人足為風和日麗升座還宮樂章與三月常朝同羣臣行禮丹陛樂章與元旦同又定祀先蠶樂章器用方響十有六雲鑼瑟杖鼓拍版各二琴四簫笛笙各六建鼓一皇后採桑歌器用金鼓拍版二簫笛笙六遣官致祭樂章與羣祀同又定賜衍聖公宴樂章奏洙泗發源長正一真人宴奏上清碧落文進士宴奏啓天門武進士奏和氣洽鄉飲酒禮歌鹿鳴四牡皇皇者華三章笙御製補南陔白華華黍三章閒歌魚麗南有嘉魚南山有臺三章笙御製補由庚崇丘由儀三章合樂周南關雎葛覃卷耳三章召南鵲巢采蘩采蘋三章八年九月高宗東巡狩至盛京儀仗具馬上鼓吹導引翼日設丹陛大樂於兩樂亭禮部設龍亭置慶賀表用導迎樂上御崇政殿升座中和韶樂奏元平諸王大臣行禮宣表丹陛大樂奏慶平朝鮮陪臣朝賀丹陛大樂奏治平頒詔賜茶中和韶樂奏和平是日崇政殿筵宴所奏中和丹陛清樂與太和殿筵宴同改瑪克式舞為慶隆之舞又增世德之舞旋定樂舞內大小馬護為揚烈舞舞人所騎竹馬為禺馬馬護為面具大臣起舞上壽為喜起舞歌章者曰司章騎竹馬曰司舞搊琵琶曰司琵琶彈絃子曰司三絃彈箏曰司箏劃節曰司節拍版曰司拍拍掌曰司抃九年親幸翰林院詔樂部設樂升座奏隆平掌院大學士率百官行禮奏慶平進茶賜茶奏文物京華盛進御筵宴奏玉署延英進酒賜酒奏延閣雲濃百官謝恩奏慶平還官奏顯平是年裁太常寺司樂人六增設天神地祇壇樂器諭禮臣除夕保和殿筵宴蒙古王等先進蒙古樂曲次慶隆舞元旦太和殿筵宴王大臣互易用之著為令帝自御宇樂制屢易因革損益悉出睿裁羣臣希旨務為補苴非有張乾龜萬寶常之識也帝思隆巍煥遂特詔釐定朝會宴饗諸樂章自七年定郊廟祭祀諸樂章至十一年始成朝會皇帝元旦中和樂升座元平還宮和平冬至中和樂升座遂平還宮允平萬壽中和樂升座乾平還宮泰平上元中和樂升座怡平還宮升平常朝中和樂升座隆平還宮顯平內廷行禮丹陛樂雍平諸王百官行禮丹陛樂慶平外藩丹陛樂治平皇太后三大節中和樂升座豫平還宮履平丹陛樂益平皇后三大節中和樂升座淑平還宮順平丹陛樂正平郊廟圜丘迎神始平奠玉帛景平進俎咸平初獻壽平亞獻嘉平終獻永平徹饌熙平送神清平望燎太平方澤迎神中平奠玉帛廣平進俎含平初獻大平亞獻安平終獻時平徹饌貞平送神望瘞寧平祈穀迎神祈平奠玉帛綏平進俎萬平初獻寶平亞獻穰平終獻瑞平徹饌渥平送神滋平望燎穀平雩祭迎神靄平奠玉帛雲平進俎需平初獻霖平亞獻露平終獻霑平徹饌靈平送神霮平望燎霈平太廟時饗迎神貽平奠帛初獻敉平亞獻敷平終獻紹平徹饌光平送神還宮望燎乂平祫祭迎神開平奠帛初獻肅平亞獻協平終獻裕平徹饌諴平送神還宮望燎成平社稷迎神登平奠帛初獻茂平亞獻育平終獻敦平徹饌博平送神樂平望瘞徵平社稷壇祈雨報祀迎神延豐奠帛初獻介豐亞獻滋豐終獻霈豐徹饌綏豐送神貽豐望瘞博豐朝日迎神寅曦奠玉帛朝曦初獻清曦亞獻咸曦終獻純曦徹饌延曦送神歸曦夕月迎神迎光奠帛初獻升光亞獻瑤光終獻瑞光徹饌涵光送神保光歷代帝王迎神肇平奠帛初獻興平亞獻崇平終獻恬平徹饌淳平送神望燎匡平先師迎神昭平奠帛初獻宣平亞獻秩平終獻平徹饌懿平送神德平先農迎神永豐奠帛初獻時豐亞獻咸豐終獻大豐徹饌屢豐送神報豐望瘞慶豐先蠶迎神庥平奠帛初獻承平亞獻均平終獻齊平徹饌柔平送神洽平天神地祇迎神祈豐奠帛初獻華豐亞獻興豐終獻儀豐徹饌和豐送神錫豐太歲迎神保平奠帛初獻定平亞獻嘏平終獻富平徹饌盈平送神豐平太歲壇祈雨報祀迎神需豐奠帛初獻宜豐亞獻晉豐終獻協豐徹饌應豐送神洽豐皇帝祭壇廟還宮導迎樂祐平慶典導迎樂禧平其詞皆命儒臣重撰天子親裁之分刌而節比合則仍其故不合則易其辭更其調視舊章增損有加而律呂正義後編亦於是年書成曰祭祀樂曰朝會樂曰宴饗樂曰導迎樂曰行幸樂更參稽前代因革損益之異為樂器考樂制考樂章考度量權衡考復推闡聖祖所以審音定樂制器協均者為樂問三十五篇大抵詳於宮譜而於律呂之原管音絃度之分合一遵聖祖無所創也帝自製序以冠之十三年二月東巡山左祭岱嶽大學士等上言泰山向不用樂考周禮大司樂奏蕤賓歌函鐘舞大夏以祭山川今特舉盛典秩於岱宗請遵古用樂樂章飭部撰擬於是詔樂章六奏用豐十月張廣泗訥親討金川久無功上特命大學士傅恆為經略出師行授鉞禮是日御太和殿陳法駕鹵簿樂器如常儀升座中和韶樂奏隆平經略跪受敕印行禮丹陛大樂奏慶平經略隨奉敕印大臣由東階下樂止上還宮中和韶樂奏顯平禡日建八旗大纛於堂子內門外之南軍士執螺角列竣上輿出宮樂陳而不作至紅樁聲螺角上入自街門降輿螺止行禮復聲螺纛前行禮畢出至紅樁螺止導迎樂作駕至東長安門外御武帳升座賜經略酒從征官皆櫜軖辭啓行還宮導迎樂作明年凱旋賜宴豐澤園駕御帳殿進茶賜茶奏景運乾坤泰掌儀捧臺盞卮壺奏聖德誕敷進饌奏日耀中天其後兆惠平定西域阿桂再克金川凱旋皆用此禮改景運乾坤泰為聖武光昭世聖德誕敷為禹甸遐通日耀中天為聖治遐昌改德隆舞為德勝之舞中和樂章皆增武成慶語以夸膚績上又自作凱歌三十章增鐃歌十六章郊勞時奏之聲容矞厖邁隆古矣二十六年江西撫臣奏得古鐘十一圖以進上示廷臣定為鎛鐘命依鍾律尺度鑄造十二律鎛鐘備中和特懸既成帝自製銘允祿等又請造特磬十二虡與鎛鐘配鑿和闐玉為之三十三年定關帝廟樂章迎神送神三獻章各一四十五年八月高宗七旬萬壽增喜起舞樂九章自是凡有大慶典則增製樂章以為常五十二年命皇子永瑢與鄒奕孝莊存與重定詩經樂譜糾鄭世子載堉之謬五十八年又命樂部肄演安南廓爾喀粗緬甸細緬甸諸樂故清之樂終帝之世凡數變仁宗嘉慶元年增製太上皇帝三大節御殿中和韶樂二章丹陛大樂一章宮中行禮丹陛大樂一章筵宴中和清樂一章丹陛清樂二章慶隆舞樂九章又增皇極殿千叟宴太上皇帝御殿中和韶樂二章自後臨雍幸翰林院文昌廟祀社稷壇祈晴及萬壽節皆增製樂章八年命筵宴停止安南樂十四年元旦太和殿筵宴命演朝鮮回部金川緬甸樂舞等項遇慶隆舞喜起舞即以承應又增隊舞大臣四人歲如故事宣文之世垂衣而治宮懸徒為具文雖有增創無關宏典德宗光緒末年倣歐羅巴美利堅諸邦製軍樂又升先師大祀增佾舞之數及更定國歌制作屢載不定以訖於遜國多未施行
