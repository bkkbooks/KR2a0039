body:
  text: 清史稿卷九十六志七十一樂三樂章一郊廟羣祀圜丘九章郊廟樂順治元年定乾隆十一年用舊辭重改今以順治所製分載句中中和韶樂黃鍾宮立宮倍夷則下羽主調迎神始平欽原敬承純祜原祐兮於昭有融時維永清兮四海攸同輸忱元祀兮從律調風穆將景福兮乃眷微躬淵思高厚兮期亮天工原恐負鴻則聿章彝序兮夙夜宣通雲軿延佇原鸞輅兮鸞輅空濛原忽降中壇翠旗紛裊兮列缺豐隆肅始和暢兮恭仰蒼穹原慶洽陶匏百靈祗衛兮齊明辟公神來燕娭兮惟帝時聰原恭仰皓穹兮神來燕喜協昭慈惠兮逖鑒臣原豫衷奠玉帛景平靈旗爰止兮樂在懸原奉玉筵執事有恪兮奉玉筵原駿奔前聿昭誠敬兮駿奔前原有美圭璧兮薦縞纖嘉玉量幣兮相後先原經緯獲理兮耀瑚璉來格洋洋兮思儼然臣原孔忱翼翼兮告中虔進俎咸平吉蠲為饎兮肅豆籩原升肴珍錯兮列豆籩升肴列俎兮敢弗虔原吉蠲為饎兮格乾圜毛炮繭栗原九州美味兮薦膏鮮致潔陶匏兮香水泉原特牲潔敬兮苾芳筵願隨原垂降鑒兮駐雲軿錫嘉福兮億萬斯年初獻壽平玉斝肅陳兮明光桂漿初醞兮信芳臣心迪惠兮捧觴醴齊載德兮馨香靈慈徽眷兮矞皇勤仰止兮斯徜徉亞獻嘉平考鐘拂舞兮再進瑤觴翼翼昭事兮次第肅將睟顏容與兮蒼几輝煌穆穆居歆兮和氣洋洋生民望澤兮仰睨玉房榮泉瑞露兮慶無疆終獻永平原雍平終獻兮玉斝清肅秬鬯兮薦和羹原微誠磬管鏘鏘兮祀孔明原協氣升旨酒盈盈原盈盈旨酒兮勿替思成明命顧諟原尚其醉止兮羣福生原懷嘉生八龍蜿蜒兮苞羽和鳴徹饌熙平一陽復兮協氣升原盥薦畢兮精白申盥薦畢兮精白陳原虞燕娭分勞帝神旋廢徹兮敢逡巡原百辟肅雍兮傾罍尊禮將成兮樂欣欣瞻九閶兮轉洪鈞原無二句福施下逮兮佑此原宜佑人民送神清平原太平升中告成原嘉德夙成兮暗靄壇場穆思回盼兮靈駕洋洋原有山河日月兮朗耀崇深青龍按節兮白虎低昂洪鈞滌蕩兮妖孽潛消三句臣原我求時惠兮感思馨香原有鳴玉鏘金兮肅若有望紫壇截嶪兮赫赫皇皇臣乘寶曆兮載須我輔三句願蒙博産兮多士思皇原作山嶽鍾良天施地育兮百穀蕃昌原不可殫究殖我嘉師兮正直平康原沐浴休光望燎太平原安平隆儀告備兮誠既將原雷車電邁兮飛遠揚有虔秉火兮焫越芳雷車電邁兮九龍驤原繁會賁鏞兮奮龍旗紫氛四塞兮雲旗揚原俾爾昌兮降蕭光蒸民蒙福兮順五常原富壽康惟豫小子兮敬戒永臧原豫獲疇祉兮萬億斯皇方澤八章中和韶樂林鍾清變徵立宮夾鍾清商主調迎神中平吉蠲兮玉宇開薰風兮自南來鳳馭紛兮後先嶽瀆藹兮徘徊肅展禮兮報功沛靈澤兮九垓奠玉帛廣平式時原神州吉土兮中壇毖我郊兆原畤兮孔安原嚴辟公趨蹌兮就列原吉蠲考鐘伐鼓兮舞般原肆筵黃琮纖縞兮既奠原陳列靈光下燭兮誠丹原誠悃宣進俎含平原咸平禮行樂奏原玉俎金奏兮未央嘉肴有踐兮大房牲牷告歆兮惟恪民力普存兮肅將厚載資生兮無外几筵來格原俯鑒兮洋洋初獻太平原壽平醴齊融冶兮信芳原匏尊泛齊兮朝踐揚博碩升庖兮鼎方清風穆穆兮休氣翔原靈旗張神明和樂兮舉初觴洽百禮兮禋祀罄九土兮豐穰亞獻安平一茅三脊兮縮漿原江茅兮縮漿山罍雲羃兮馨香介黍稷兮芳旨再滌犧尊兮敬將原再展微誠兮趨蹌樂成八變兮綴兆原樂只儼皇祇兮悅康終獻時平紫壇兮嘉氣盈原方壇兮豐薦盈旨酒思柔兮和且平原中和平懍茲陟降兮心屏營原陟降從容兮駐雲軿禮成三獻兮薦玉觥含宏光大兮德厚靈佑丕基兮永清徹饌貞平玉俎列兮庶品該原尊俎畢兮誠未虧黃琮告徹兮雲翔徊原儀景暉晏陰定兮曦景回原邀靈錫南訛秩兮日恢台原奏薰時肅惟昭明兮孔邇覃博厚奠兮九垓原載群黎送神望瘞寧平靈旗兮雲路遵原雲際屯飛龍蜿兮高旻原飛龍兮逝駸駸陰儀粹兮德純眷四海兮無塵配皇穹兮兩大原化宣綏下土原綏百祿兮蒸民祈穀九章中和韶樂黃鍾宮立宮倍夷則下羽主調迎神祈平原中平帝篤祜民原惟帝勤民兮求莫匪舒小民何依兮飲食惟需原黍稷與與莫嘉於穀兮萬事權輿原元日有事兮百辟趨為民請命兮豈非在豫原食咸需日用辛兮百辟趨原遙瞻龍駕兮歷紫虛暾將出兮東風徐原日臨黃道兮東風徐惟豫小子兮敬盥陳孚原臣昭事兮遑深寧居皇皇龍駕兮穆將愈原願垂嘉惠兮大有書奠玉帛綏平原肅平念茲稼穡兮惟民天原民天惟食兮農事先農用八政兮食為先原粒我蒸民兮有大田雨暘時若兮玉燭全原風霆流形兮雨澤霑粒我蒸民兮迄用康年原實穎實栗兮氣化全仰三無私兮昭事虔原玉帛祗奉兮禋祀虔奉璋承帛兮栗若臨淵原仰祈寰宇兮享豐年進俎萬平原咸平鼎烹兮苾芬嘉薦兮無文升繭栗兮惟犉原奉雕俎兮大武羶薌達兮干雲原氣干雲昭民力兮普存原昭普存兮民力惟明德兮馨聞初獻寶平原壽平初獻兮元原旨酒盈致純潔兮儲精誠原著誠致潔兮犧尊盛瑟黃流兮罍承原儼對越兮在上酌其中兮外清明原惟昭明兮有融儼對越兮維清原瑟黃流兮玉瓚帝心歆假兮綏我思成原賚嘉禎亞獻穰平原景平犧原著尊啓兮告虔清酤既馨原次第兮陳原舉前禮再獻兮祠筵原肅拜光煜爚兮非煙原列瑤觴兮秩斯筵神悅懌兮僾然原如在惠我嘉生兮大有年原福便便終獻瑞平原永平終獻兮奉明粢原泰尊移苾芬嘉旨兮清醴既釃原圭瓚交馳神其衎原神其醉止兮錫祉禮成於三兮陳詞願灑餘瀝兮沐群黎臣拜手兮青墀原望雲霓徹饌渥平原凝平俎豆具陳兮庶品宜原齊肸蠁昭鑒兮荷帝慈原舉荷昭鑒兮靡或遺饌告備原徹兮玉几登歌洋溢兮廢徹不遲原式禮無違肅微忱兮告終事上帝居歆兮錫純禧送神滋平原清平祗奉天威兮弗敢康小心翼翼兮昭穹蒼雲垂九天兮露瀼瀼翠旗羽節兮上翱翔原歸何鄉臣拜下風兮肅原意倣徨願沛汪澤兮民多蓋藏原時其雨暘望燎穀平原太平卬原翹首兮天閶混茫一氣兮浩無方原足蘭彼雲海兮何蒼茫焫蕭束帛兮薦馨香精誠感格兮降福穰穰四時順序兮百穀以昌臣周兆姓兮咸荷恩光社稷壇七章中和韶樂春夾鍾清商立宮倍應鍾清變宮主調秋南呂清徵立宮仲呂清角主調迎神登平原廣平媼神蕃釐兮厚德隆原猗歟土穀兮功化隆嘉生繁祉兮功化同原蒸民立命兮九域同壇壝儼肅兮風露融原通我稷翼翼兮黍芃芃原俎豆豐望雲駕兮驂鸞龍植璧秉圭兮冀感通原秉圭植璧兮豫親躬奠玉帛初獻茂平原壽平恪恭禋祀兮肅且雍原禋祀黝牲兮北郊同清醑原酤既載兮臨齋宮朝踐初舉兮玉帛共原鑒豫衷洋洋在上兮鑒豫衷原錫福洪亞獻育平原嘉平樂具入奏兮聲喤喤鬱鬯再升兮賓八鄉原兕觥其觩兮恭再揚厚德配地兮佑家邦綏我豐年原屢豐年兮兆庶康終獻敦平原雍平方壇北宇兮神中央盈庭萬原帗舞兮帗原時低昂酌酒原酳三爵兮桂原緑醑香清雖舊邦原新舊邦兮命溥將徹饌博平原熙平大房籩豆原籩豆大房兮儼成行歆此吉蠲兮神迪嘗原猶回翔廢徹不遲原椒漿瑤席兮餘芬芳桐生茂豫兮百穀昌原黍稷非馨兮悅且康送神樂平原成平孔蓋翠旌兮隨風揚龍輈容與兮指天閶咫尺神靈兮隔穹蒼願流景祚兮貺皇章原流景祚兮卜世昌望瘞徵平原成平玉既陳原牲玉陳兮延景光禮既洽原百禮既洽兮終瘞藏願神聽兮時豫匡垂神佑兮永無疆原四海攸同兮惠無疆社稷壇祈雨報祀七章乾隆十八年定中和韶樂仲呂清角立宮大呂清宮主調初祈用夾鍾清商立宮報南呂清徵立宮旋改隨月用律宮譜舉四月為例祈晴報祀同迎神延豐九土博厚兮阜嘉生方壇五色兮祀孔明氓力穡兮服耕仰甘膏兮百穀用成熙雲路兮瞻翠旌殷闓澤兮展精誠奠玉帛初獻介豐神來格兮宜我黍稷兩主有邸兮馨明德罍尊湛湛兮干羽飭油雲澍雨兮溥下國亞獻滋豐奏明兮申載觴龍出泉兮靈安翔周寰宇兮滂洋載神庥兮悅康終獻霈豐帗容與兮奮皇舞聲遠姚兮震靈鼓爵三奏兮縮桂醑號屏來御兮德施普徹饌綏豐協笙磬兮告吉蠲神迪嘗兮禮莫愆心齋肅兮增惕乾咨田畯兮其樂有年送神貽豐撫懷心兮神聿歸蓋郅偈兮驂虬騑洪釐渥兮雨祁祁公私霑足兮孰知所為望瘞溥豐宣祝嘏兮列瘞繒貺允答兮時欽承高原下隰兮以莫不興歌率育兮慶三登社稷壇祈晴報祀七章嘉慶十一年重定中和韶樂仲呂清角立宮大呂清宮主調迎神延和庶彙涵育兮陽德亨句萌茁達兮物向榮方壇潔兮展誠迓休和兮寰宇鏡清祈昭格兮瞻翠旌沐日月兮百寶生奠玉帛初獻兆和瑟圭瓚兮通微合漠神歆明德兮鑒誠恪昭回雲漢兮噓橐籥曜靈司晷兮時暘若亞獻布和申獻侑兮奉明薦馨香兮和氣隨神介福兮孔綏耀光明兮九逵終獻協和帗羽舞兮一風敞爵三奏兮告成享順年祝兮泰階朗元冥收陰兮日掌賞徹饌雍和籩俎徹兮受福多笙磬同兮六律和庶徵協兮時無頗熙樂利兮東作南訛送神豐和神聿歸兮華蓋揚羲和整馭兮虬螭翔遍臨照兮協農祥天清地寧兮黍稷豐穰常雩九章乾隆七年定中和韶樂黃鍾宮立宮倍夷則下羽主調迎神靄平粒我蒸民兮神降嘉生雨暘時若兮百穀用成龍見而雩兮先民有程臣膺天祚兮敢不承念我農兮心靡寧肅明禋兮殫精誠靈皇皇兮穆以清金支五色兮罨靄霓旌奠玉帛雲平玉帛載陳兮磬管鏘鏘為民請命兮惕弗敢康令清和兮遂百昌麥秀歧兮禾茀稂日照九兮時雨滂俾萬寶兮千斯倉進俎需平越十雨兮越五風三光昭明兮嘉氣蒙天所與兮眇躬豫小子兮懍降豐紛總總兮賴皇穹犉牡鬺亨兮達臣衷初獻霖平酌彼兮罍洗飶芬兮椒香愧明德兮維馨假黍稷兮誠將願大父兮念茲衆子穆將愈兮綏以豐穰亞獻露平再酌兮醑清仰在上兮明明庶來格兮鑒誠曷敢必兮屏營合萬國兮形神精承神至尊兮思成終獻霑平三酌兮成純備物致志兮敬陳多士兮駿奔靈承無斁兮明禋維蕃釐兮媼神雨留甘兮良苗懷新徹饌靈平禮將成兮舞已終徹弗遲兮畏神恫願留福兮惠吾農神之貺兮協氣融遂及私兮越我公五者來備兮錫用豐送神霮平祥風瑞靄兮彌靈壇上帝居歆兮風肅然左蒼龍兮右白虎般裔裔兮糾縵縵仰九閶兮返御介祉釐兮康年望燎霈平碧翏翏兮不可度思九奏終兮爟火而神光四燭兮休氣夥頤安匪舒兮抑抑威儀帝求民莫兮日鑒在茲錫福繁祉兮庶徵曰時大雩雲漢詩八章高宗御製中和韶樂黃鍾宮立宮倍夷則下羽主調瞻彼朱鳥爰居實沈協紀辨律羽蟲徵音萬物藝生有壬有林有事南郊陟降維欽瞻仰昊天生物為心一章維國有本匪民伊何維民有天匪食則那螻蟈鳴矣平秩南訛我祀敢後我樂維和鼉鼓淵淵童舞娑娑二章自古在昔春郊夏雩曰維龍見田燭朝趨盛禮既陳神留以愈雷師闐闐飛廉衙衙曰時雨暘利我新畬三章於穆穹宇在郊之南對越嚴恭上帝是臨繭栗量幣用將悃忱惴惴我躬肅肅我心六事自責仰彼桑林四章權輿粒食實維后稷百王承之永奠邦極惟豫小子臨民無德敢解祈年潔衷翼翼命彼秩宗古禮是式五章古禮是式值茲吉辰玉磬金鐘太羹維醇玄衣八列舞羽繽紛既侑上帝亦右從神尚鑒我衷錫我康年六章惟天可感曰維誠恪惟農可稔曰維力作恃天慢人弗刈弗穫尚勸農哉服田孔樂咨爾保介庤乃錢鎛七章我禮既畢我誠已將風馬電車旋駕九閶山川出雲為霖澤滂雨公及私興鋤利氓億萬斯年農夫之慶八章朝日七章順治八年定乾隆七