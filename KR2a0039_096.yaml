三十三年又重定關帝廟迎神三獻送神各一章咸豐三年升入中祀特製樂章列後先醫精氣緣乎理調劑觀所頤曰惟古聖嘗草定醫似鐵隨磁沴除吉至化工出自於指萬姓永荷恩施顯佑宮居所躔星軫象緯環拱辰貞元運轉藏用顯仁宥密基命育和葆順潔粢醴以昭信日襄哉贊大鈞東嶽廟維嶽嵩高五泰岱常祀殊纍朝玉檢柴望始虞木德條風吹萬畢煦宅東隅以生物仰天齊鑒有孚都城隍廟佳麗皇都勝保障神力宏萬方輻輳尨夜不驚正直聰明疸彰如影荷靈貺篤其慶固金甌護玉京火神廟離正南方位燭照光九圍粒民火食功用不違瓘斝明粢我民祈慰覆祥靄戢鶉尾息融風降福禧龍神祠興雨祁祁應歷歲恩屢覃湫幽神御農扈具瞻寸合崇朝十千有淹黍膏溥牟麥湛賽神庥以作甘門神和氣嘉祥應聖日華耀明仰方泰紫俯奠泰寧遼廓紘瀛此惟表正食神德蒙神慶享明禋億萬齡司工之神仰眺銀河上閣道如駕梁儼神宅只愈矣穆將揆日鳴櫜翳神斯掌奠椒酒以禋享荷神庥澤未央關帝廟扶植綱常正浩氣昭日星絶倫獨立英爽若生俎豆常馨夏彝胥敬仰神德莫疇並助邦家永太平乾隆三十三年重定關帝廟樂五章迎神青湛湛玉霄門神來下綵旄紛宮牆輪奐籩豆芳芬光景動人民丹心照日浩氣扶輪奠帛初獻調蘭醑酌桂尊神來饗房俎陳忠貫金石義炳乾坤純臣戴一君力扶王室不願三分亞獻泛盎齊觴再進簫鼓諧聲歌韻武節絶倫不辭利鈍神勇天威震方知舊史未符公論終獻禮秩秩樂欣欣儼威靈至今存惟靈惟佑佑國佑民典禮極隆文式揚顯號時薦明禋徹饌送神司儀告徹靈風來洎神聿歸嘉徵萃大濟群生善良胥得意邪慝無伸喙皇化所及咸尊廟食東西朔南靡弗暨咸豐三年關帝廟樂七章中和韶樂迎神格平懿鑠兮焜煌神威靈兮赫八方偉烈昭兮纍祀祀事明兮永光達精誠兮黍稷馨香儼如在兮洋洋奠帛初獻翊平英風颯兮神格思紛綺蓋兮龍旗桂醑兮盈卮香始升兮明粢惟降鑒兮在茲流景祚兮翊昌時亞獻恢平觴再酌兮告虔舞干戚兮合宮懸歆苾芬兮潔蠲扇巍顯翼兮神功宣終獻靖平鬱鬯兮三申羅籩簋兮畢陳儀卒度兮肅明禋神降福兮宜民宜人徹饌彝平物惟備兮咸有明德惟馨兮神其受告徹兮禮終罔咎佑我家邦兮孔厚送神康平幢葆葳蕤兮神聿歸馭鳳軫兮驂虬騑降煙熅兮餘芬菲願回靈盼兮德洽明威望燎同焄蒿烈兮燎有輝神光遙矚兮祥雲霏祭受福兮茂典無違庶揚駿烈兮永奠疆畿文昌帝君廟七章咸豐六年升入中祀重定樂章中和韶樂迎神丕平秉氣兮靈躔文運兮赫中天霓旌兮戾止雕俎兮告虔迓神庥兮於萬斯年奠帛初獻俶平神之來兮籩簋式陳神之格兮几筵式親極昭彰兮靈貺致蠲潔兮明禋升香兮伊始居歆兮佑我人民亞獻煥平再酌兮瑤觴燦爛兮庭燎之光申虔禱兮神座儼陟降兮帝旁粢醴潔兮齋遫將綏景運兮靈長終獻煜平禮成三獻兮樂奏三終覃敷元化兮繄神功馨香達兮肸蠁通歆明德兮昭察寅衷徹饌懿平備物兮惟時告徹兮終禮儀神悅懌兮監在茲垂鴻佑兮纍洽重熙送神蔚平雲軿駕兮風旗招神之歸兮天路遙瞻翠葆兮企丹霄願回靈眷兮福我朝望燎同煙熅降兮元氣和神光爥兮梓潼之阿化成耆定兮櫜弓戢戈文治光兮受福則那順治元年皇帝祭祀回鑾二章導迎樂天地羣祀祜平皇天有命列聖承之我后配德文匡武綏海隅寧謐神靈燕娭於萬斯年流慶降釐太廟禧平於皇紹烈纍熙重光銷鑠羣慝我武奮揚肅肅清廟奉璋奠鬯斯馨祚命無疆乾隆十七年重定祭祀回鑾祐平十三章樂章乾隆七年製十七年始定凡祭祀回鑾樂皆曰祐平而以慶典所奏者為禧平導迎樂圜丘崇德殷薦升燎告虔惟聖能饗至諴天眷駕六龍臨紫煙佑命申圖籙綿方澤隤爾而靜持載廣生長至修祀聿來光景富媼愈元德升嶽瀆安民物亨祈穀民者邦本食乃民天爰卜辛日大君殷薦龍角明祈有年耒耜親天下先雩祭炎夏初屆憫我穡夫為民請命法駕載塗明德馨誠意孚禾稼登斯樂胥太廟儀若先典追孝在天鴻慶遐鬯烈光丕顯祝事明神貺宣福庶民千萬年社稷壇分職三大康乂國家平土蕃穀降休中夏薦吉蠲神不遐遍九垓鴹祉嘉堂子禋祀隆永維統百靈延福儲祉奠安神鼎修祀祠通紫庭降福祥昭德馨出師凱旋告祭堂子維文武略勳業攸崇欽承睿算往征不恭扇仁風在師中月三捷奏膚功日壇雍肅音送暾出自東兼燭垂曜與天用同秩典修皇敬通表瑞輝揚至公月壇殷仲嘗酎華黍若油興穀繁祉受符天後湧桂華凝彩斿玉燭調千萬秋歷代帝王廟時序羣品端在一欽衣德凝命荷天之任景軌儀誠既歆肅駿奔顒若臨先師廟先聖垂軌千載是祗虔奉師表景行行止奠兩楹神降之啓後人文在茲先農壇翩彼桑扈仁氣布和千畝親御百祥膺荷保介歆穜稑多帝手推民樂歌
