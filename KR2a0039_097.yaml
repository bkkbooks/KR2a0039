body:
  text: 清史稿卷九十七志七十二樂四樂章二御殿慶賀禾辭桑歌皇帝元旦御殿二章康熙八年定乾隆七年重撰樂章初製附載中和韶樂黃鍾宮立宮倍夷則下羽主調升座元平維天眷我皇四海昇平泰運昌歲首肇三陽萬國朝正拜帝閶雲物奏嘉祥乘鸞輅建太常時和化日長重九譯盡梯航原於穆元后敬授人時四始和令三陽肇基鸞路蒼龍載青其旂迎氣布德百工允釐行慶施惠及我烝黎還宮和平聖人延俊英鈞天樂奏繞彤廷華夷一統寧士庶歡忻樂太平寶鼎御香盈祥煙裊瑞靄生簫韶喜九成齊慶祝萬千齡原有奕元會天子穆穆鏘鏘羣公至自九服正朔所加海外臣僕率土懷惠萬民子育千齡億祀永綏茀祿皇帝長至御殿二章康熙八年定乾隆七年重撰樂章初製附載中和韶樂黃鍾宮立宮倍夷則下羽主調升座遂平陽回黍谷春萬國衣冠拜紫宸旭日耀龍鱗雲物呈祥福祿臻堯階蓂莢新熙庶績撫五辰九服共來賓調元化轉鴻鈞原乾符在握道轉鴻鈞天心見復物始資元景長舜日紀協堯春玉琯應瑞寶曆肇新眾正在位輔翼一人還宮允平皇心克配天玉琯葭灰得氣先彤廷臚唱宣四海共球奏御筵珠斗應璣璿金鏡朗麟鳳騫人間景福全咨屢省懋乾乾原萬國在宥一陽斯溥淵默臨朝天職修舉君子道長駢珪聯組瞻日書雲產祥降嘏宜暘而暘宜雨而雨乾隆二十四年平定回部長至御殿增撰武成慶語二章中和韶樂黃鍾宮立宮倍夷則下羽主調升座遂平陽回玉琯春華闕晴暉映紫宸聲教訖無垠烽燧長清玉塞塵絕域盡王臣安作息荷陶甄奉贄獻靈珍超三古懋經綸還宮允平淑氣轉瑤閶緹幕葭飛啟百昌恩威亙八荒雪嶺天山道里長納發嚮明堂三足鳥暨鳳凰乾珍普降祥彌顧禔敕幾康乾隆二十四年平定回部御殿羣臣慶賀一章丹陛大樂慶平紫霧氤氳浮彩仗丹階虎隊鵷行敷文德虞徽接響靖邊徼來享來王皇帝萬壽節御殿二章康熙八年定乾隆七年重撰樂章初製附載中和韶樂黃鍾宮立宮倍夷則下羽主調升座乾平祥雲扈紫冥四海臣民祝聖齡淑氣轉階蓂堯籙羲圖燦御屏嵩呼徧在廷天呈瑞地效靈南極拱台星億萬載頌康寧原二儀清寧三辰順則維帝凝命函冒區域仁恩廣覃至於動植久道化成隆功駿德聖人多壽年世萬億還宮泰平皇躬福祿宜永紹鴻圖丕丕基彤陛長仙芝樂奏簫韶丹鳳儀南山獻壽卮人心悅天意隨為德徧羣黎歌樂愷萬年斯原鑒觀惟德丕命惟皇肇茲壽域薄海要荒物性茂育民俗樂康冠帶之國望斗辨方曰惟萬年同於昊蒼萬壽元旦長至三大節朝賀三章常朝同順治九年定康熙年製樂章乾隆七年重撰又增宮中行禮雝平一章初製附載丹陛大樂羣臣行禮慶平鳳凰在藪麒麟在郊坰不如國士充陛廷野無遺賢宗有英夙夜在公在公明明原皇覆萬宇品物咸亨九賓在列百譯輸誠濟濟卿士式造在廷帝仁如天帝明如日親賢任能愛民育物禮備樂成聲教四訖外藩行禮治平我清世德作求若天行天盡所覆畀我清萬方悅喜來享庭曰予一人業業兢兢原天盡所覆以畀我清我德配命涵濡羣生萬國蹈舞來享來庭俁俁蹲蹲視彼干戚天威式臨其儀不忒宮中行禮雝平關雎四教家邦作孚先黃裳元吉地承天六宮仁順化穆宣麟之趾兮萬福之原皇帝上元御殿二章乾隆七年定中和韶樂太簇商立宮倍無射變宮主調升座怡平皇心保泰和海𧜛昇平樂事多瓊樹長新柯冰泮春風漲玉河晴雲展細羅擎堯酒泛天波花舞鳥能歌齊拜手賦卷阿還宮昇平時雍頌帝堯玉佩鏗鏘慶早朝紫禁瑞煙飄春意淩寒上柳條和風禁苑饒陳仙樂奏簫韶三五正良宵宮漏永月輪高皇帝常朝二章康熙年定中和韶樂升座隆平赫矣天鑒眷求惟聖保佑我清既集有命假樂大君天位以正蒞下有容監於萬方念茲崇功駿命孔常還宮顯平於昭四后誕降世德亹亹我皇克艱袞職治定功成中和建極龍飛在天鳳儀於廷式奏王夏垂億萬齡乾隆七年重定皇帝常朝正月二章中和韶樂太簇商立宮倍無射變宮主調升座隆平敷天協氣鮮新又蒼龍正晨萬國歡心仰紫宸皇天錫嘏懿純陳充庭華瑵金根扇春風風兆人澤如春睿周萬品化洽無垠還宮顯平淵然至道游神協天行地文照𧜛騰華若早輪清明廣大和誾恩滂洋葭葦霑仁念民生生此辰酌於民瑞惟大有寶則賢臣二月二章中和韶樂夾鍾清商立宮倍應鍾變宮二調升座隆平所無逸恭己巖廊萬𧜛協嘉祥吹律圜鐘諧舜琯負扆當陽柳風初轉芽黃翠甸輕雷蘇百昌發生心皇奉若寬大詔播天常還宮顯平肅羣后鳴佩鏘鏘拜手仰龍光初日曈曨奎壁麗明庶風翔普天和氣休穰浹化鷹成鳩眼良躬清明基宥密恩溥洽達要荒三月二章中和韶樂姑洗角立宮黃鍾宮主調升座隆平日麗風和徧寰區新榆改火龍旂荏苒晃鸞坡赫如曦皇升座羣辟奏瑤珂拂花茵垂佩多天門蕩蕩無偏頗純嘏詠卷阿還宮顯平瑞靄祥飆映彤墀紅雲繚繞一人淵默德光昭百花中千門曉銅鶴篆煙飄奏仙音駕退朝促耕布穀飛靈沼盈耳說農勞四月二章中和韶樂仲呂清角立宮大呂清宮主調升座隆平玉宸旦婺中天王御法宮乘朱路曳長虹六六泠簫諧女鳳萬物被薰風阜財解慍福祿來同還宮顯平麥秋滿野登桑穠繭已成玉衡正泰階平上下交孚寰海靖婦子樂盈寧罄天亙地茂豫桐生乾隆四十一年平定兩金川四月御殿二章中和韶樂中呂清角立宮大呂清宮主調升座隆平玉衡紀正陽昇平景運昌豐功著威稜揚險闢蠶叢歸指掌決勝廟謨長凱聲競奏喜起賡颺還宮顯平功成愷澤滂兵消喜氣揚櫜弓矢掃欃槍紫閣酬庸膺懋賞虎拜沐恩光萬年受祜慶衍無疆乾隆四十一年平定兩金川御殿羣臣慶賀一章丹陛大樂慶平遠播皇威鯨鯢掃瘴雨蠻煙盡消看振旅歡聲載道瞻天處樂奏簫韶五月二章中和韶樂蕤賓變徵立宮太簇商主調升座隆平禁林清反舌無聲登進忠良佞不行南風假大而宣平坐明堂賞五德法乘離以持衡還宮顯平槿初榮旉與朱明天稷星邊漢影萌紅輪照九神嘉生念農芸夏暑雨穆皇心以靡寧乾隆四十一年平定兩金川五月御殿二章中和韶樂蕤賓變徵立宮太簇商主調升座隆平扇薰風六幕祥融共解征衣拜舞同雲開玉壘昭膚功頌聲靈赫以濯喜韜戈績銘鐘還宮顯平慶天中凱奏勳隆笮徼煙消化雨濃磨崖紀勒銘重重壯皇猷沛帝澤聽歡聲徧堯封六月二章中和韶樂林鍾清變徵立宮夾鍾清商主調升座隆平鼓含少黃宮諧鳳伏庚光赤帝騎龍日丰丰彼三星正昏中茂對乘時穆聖衷陳金奏宣景風明光覲辟公還宮顯平彌六合黎元祝頌奉三無帝念淵沖蓊鬱元雲渰宸楓大雨時行黍稷芃虞琴奏皇在宮勤思劇月農七月二章中和韶樂夷則徵立宮姑洗角主調升座隆平金井桐飄大火流夷則聲清律應秋天行轉蓐收黃茂滿田疇曉光閶闔浮搏拊戛鳴球玉殿千官咸拜手仰宸斿還宮顯平鷹祭蟬鳴屆白藏御廩初登穀始嘗秋回禁陛涼皇居奠總章恩膏正溥將零露浥瀼瀼六合熙熙齊所卬潔珠囊八月二章中和韶樂南呂清徵立宮仲呂清角主調升座隆平乾坤爽氣澄序宮殿清光靜安設九賓而法見叶九和於天端晻靄揚雲玲瓏動玉鑾烈徽猷兮萬世肅纓冕兮千官還宮顯平雲高漢迥參見露白飆清洌寒汔告成夫萬寶祗祝釐於三壇瑞穀歧而秀玉粢好且完喜盈寧兮百室國安泰兮民歡九月二章中和韶樂無射羽立宮蕤賓變徵主調升座隆平鴻依銀渚菊有黃華隴雲飛木葉下百穀登塲罷芳辰逢令嘉黃麾列正衙豹竿移龍鱗射日上朱霞天錫吾皇多稼還宮顯平鞭鳴鐘動簾捲烟斜漾金風香衣駕天屣言還暇黃雲香滿車邨邨晝響耞處深宮心區夏重恤民家黼扆豳風圖畫十月二章中和韶樂應鍾清羽立宮林鍾清變徵主調升座隆平時合黃純熙修司職顓皇執坎持權聽彤廷佩響玉琯風宣懷黃綰白趨丹陛皇儀展於穆同天光華聖日罘罳煥彩暄到齊編還宮顯平寰海豐穰農夫之慶深宮理化揮絃念艱難稼穡不敢游畋琳瑯萬卷環天祿三餘愛清晏探研時幾敕命明良喜起所寶惟賢十一月二章中和韶樂黃鍾宮立宮倍夷則下羽主調升座隆平七日陽來天地仁萬象一中分人從心上起經綸綱紀三才屬大君答陽臨玉宸無私學化鈞包元履德日勞勤品類盛荷陶甄還宮顯平順氣祥風翺九垠太史正書雲沈幾先物福生人淵默雷聲秉道真八風依序均天根月窟循昭乎若日正三辰不遠復以修身十二月二章中和韶樂大呂清宮立宮倍南呂清下羽主調升座隆平斗柄將東四序周佳氣滿皇州嘉平吉日諏翠輅充廷立九斿吾皇御大裘法座侍王侯服舊德布新猷穆若天儀福祿遒還宮顯平太室黃雲紫氣蒙時雪報年豐天關橐籥充臘鼓催春天地通皇家寶緒隆契合動昭融月西朓日生東萬載回環不息同閏月節前用上月宮調節後用下月宮調詞同前除夕升座還宮與十二月常朝同耕耤禮成慶成宮宴與三月同文進士傳臚御殿二章乾隆七年定中和韶樂蕤賓變徵立宮太簇商主調升座隆平啟文明五色雲呈珊網宏開羅俊英梧岡彩鳳雝喈鳴氣如珠河似鏡集賢才於蓬瀛還宮顯平海榴舒木槿初榮宣賜宮衣最有名薰來殿角微涼生鳳棲梧麟在囿致皇風於昇平文進士傳臚羣臣慶賀一章丹陛大樂慶平賢關大啟五緯麗霄光九苞彩鳳鳴高岡日華五色舜衣裳濟濟蹌蹌多士思皇武進土傳臚御殿二章乾隆七年定中和韶樂應鍾清羽立宮林鍾清變徵主調升座隆平寶殿雲開朱檐日近甲袍金瑣玲瓏看敦詩說禮國士之風王朝楨幹資英俊參帷幄克詰兵戎雲臺繪畫勳名偉績媲美前蹤還宮顯平玉燭光調金甌綏靖兩階干羽雍容念求賢渭水兆協非熊中林罝兔多賢士資心腹雲起風從龍韜豹略後先疏附鵬翼摶風武進士傳臚羣臣慶賀一章丹陛大樂慶平鷹揚鶚薦厲翮九霄清兔罝在野維干城龍韜豹略蜚英聲肅肅赳赳王國克生乾隆四十八年乾清宮普宴宗親御殿二章中和韶樂太簇商立宮倍無射變宮主調升座隆平中天鳳紀開新列堯階繡茵聖德重華九族親垂光惇家人敷仙蓂十葉宜春扇雍和和氣誾郁祥芬瓊蕤奉日寶鄂承雲還宮慶平璇霄氣應韶鈞仰重熙令辰行葦恩華衎燕申歡承麟趾振振霑椒觴芳酎含醇荷龍光光被均瑞璘彬萬年聖壽一本天倫乾隆五十年乾清宮千叟宴御殿二章中和韶樂太簇商立宮倍無射變宮主調升座隆平乾隆五十年春月王正日辰帝世重熙盛典陳高年高會楓宸有盈廷鶴髮臣民望鑪香開扇輪共尊親年逾書亥福迓重申還宮慶平雲開黼座氤氳望天迴紫宸九拜龍光舞蹈申仙韶聲遠偏聞退朝班仙仗繽紛到蓬萊攜紫雲散仙羣九重曼壽千叟長春乾隆十三年大學士忠勇公傅恆征金川授敕御殿二章中和韶樂黃鍾宮立宮倍夷則下羽主調升座隆平臨軒策將聖武恢仙仗挾風雷龍驤虎賁羣英來專閫正藉勒銘才神機翊上台恩隆轂是推揚威邊徼圖雲臺承廟略往欽哉還宮顯平絳霄瑞靄六龍迴寰𧜛靖氛埃天戈遙指閶闔開敦忠秉信閫外裁風雲列陣該崇墉計日摧鋒車電掣天馬徠軍聲歡騰九垓乾隆十三年征金川羣臣慶賀一章丹陛大樂慶平金殿晨開銅龍啟推轂恩隆典儀九重上爭歌喜起敷聲教盡仰天威乾隆十四年金川凱旋慶賀御殿二章中和韶樂姑洗角立宮黃鍾宮主調升進隆平慶溢朝端靄祥雲河山清晏鈴旂迢遞送歸鞍赫元戎繄良翰靖獻寸誠丹載干戈和佩鸞功成萬里勒銘還遐邇共騰歡還宮顯平雉扇徐迴徧堯封齊銷熢燧依依楊柳六師歸逮