月光天語懍煌煌慶典欣成錫祚長休徵應雨暘顏有喜頌無疆盛治贊垂裳夔虎拜鳳鸞鏘乾隆十七年重定慶典所奏禧平十五章導迎樂臨雍崇聖尊道乾德下交思樂多士化流芹藻鼓篋徵經術昭聽講環宏育陶巡狩方嶽棽麗六飛入蹕出警省方觀民施惠行慶一人行萬人幸載道歡瞻天聖元日進表元正朝享臨御萬方閶闔通啟太平呈象旅貢陳軒樂張徧海隅瞻帝光長至進表黃鍾應律玉琯迴陽書雲薦瑞迎日履長共球集韶濩張奉金函來萬方萬壽節進表神聖文武提絜六符綏以眉壽罄宜多祜邁斗維呈瑞圖萬歲聲山應呼皇太后萬壽節進表昭受天貺鍾慶發祥文母禔祉福隆尊養錫類蕃慈訓彰億萬年臨壽康皇后千秋節進表坤德柔靜陰教順承螽斯麟角允維嘉應寶冊鐫天慶膺求嗣徽如月恆進實錄昭示無坱謨烈聿皇垂布方策日星輝朗配典墳揚耿光永繹思綏萬邦進玉牒瓜瓞滋長椒實衍昌公姓千億福疇維嚮定角仁朱芾皇錫類洪咸樂康頒時憲欽若誠亶皇正朔頒分秒無忒玉衡齊貫敬授時宜暑寒穡事明民庶歡頒詔申命重巽綸下九閽句出萌達百昌咸振象魏懸鞀鐸巡德意宣天地春殿試送牓賢網寬整才俊畢登疏附先後一人維聖教澤長多士盈景運開龍虎蒸迎吻皇作宮殿因地順天如竹苞矣美哉輪奐鳥翼飛松桷梴芋且寧居萬年皇帝親耕進穜稑晨作農正鸞輅勸耕穜稑嘉種降康延慶帝耤開農政行我稼同明賜成皇后親蠶進筐鉤戴勝告時西陵肇典爰舉懿筐爰臨柘館御鞠衣登瑞繭金鉤陳嘉義展皇帝耕耤三十六禾詞一章雍正二年定光華日月開青陽房星晨正呈農祥帝念民依重耕桑肇新千耤考典章告蠲元辰時日良蒼龍鸞輅臨天閶青壇峙立西南方犧牲簠簋升芬芳皇心祗敬天容莊黃幕致禮虔誠將禮成移蹕天田旁土膏沃洽春洋洋黛犂行地牛服韁司農穜稑盛青箱洪縻在手絲鞭揚率先稼穡為民倡三推一撥制有常五推九推數遞詳王公卿尹咸贊襄甸人千耦列雁行耰耡既畢恩澤滂自天集福多豐穰來牟蕎蘥森紫芒華薌赤甲秈稈秬秠三種黎白黃稷粟堅好碩且香艹巳大穗盈尺長五菽五豆充壠塲穄粢九色糧蜀秫玉黍兼東廧烏未同收除童粱雙歧合穎徧理疆千箱萬斛收神倉四時順序百穀昌八區九有富蓋藏歡騰億兆感聖皇皇后采桑歌一章乾隆七年定躬耕禮成詔井桑蠶月吉巳迎辰祥金華紫罽五翟光瑞雲彩映椒塗黃壇南宿戒惟宮張西陵展事搖珩璜齋肅恭敬柔雍彰金鉤綠籧懿筥筐尚功尚製奉以將柔條在東涵露香鞠衣三摘鳴鳩翔月靈臨賁龍精昌黼黻五色質且良昭事上帝祠烝嘗儀型宇宙帥妃嬙衣食滋殖被萬方
