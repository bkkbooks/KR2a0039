body:
  text: 清史稿卷九十八志七十三樂五樂章三筵宴鄉飲酒太和殿閲皇太后徽號冊寶海上蟠桃一章乾隆七年定中和清樂海上蟠桃乍熟日邊紅杏初芳慈幃履慶承天貺景福正綿長一解啓蓬萊排仙仗露漙漙凝仙掌褘衣翟服爛明璫耀金鋪日擁扶桑喜風和駘蕩爐熏百和香太平有象孝德光昌二解殿當中雲光漾駕臨軒金閨敞孝思不匱重天常展瑤函寶冊輝煌喜風和駘蕩爐熏百和香太平有象孝德光昌三解紫霞杯葡萄釀九華鐙芙蓉桁流霞紺雪酌天漿頌期頤地久天長喜風和駘蕩爐熏百和香太平有象孝德光昌四解玉衡平金波朗湛露融階蓂長雲璈法曲奏清商奉慈徽長信傳芳喜風和駘蕩爐熏百和香太平有象孝德光昌五解萬方玉食尊親養孝治蒸蒸天下仰敬歌萬壽無疆趨辭嘉慶元年太上皇帝三大節筵宴三章進饌中和清樂進茶進酒丹陛清樂進饌莢衍箕疇之章莢衍箕疇春滿瀛洲六甲慶重周功德誰儔位祿兼名壽並包帝道王猷十全建極八徵念五福居長百祿遒駕蒼周軼赤劉共臚萬萬添籌一解敬維作所酬高厚圜壇冬至齊宮就方壇夏至明禋奏祈年雩祭均循候加玉表精忱縮鬯通聲臭珠囊氣協神祇祐二解遵守寶籙朝朝誦大猷萬乘謁珠丘冠服貽謀弓矢貽謀盛京賦賦鴻庥霞綳燃處明如晝紀恩堂堂構綢繆習騎射御驊騮歲歲木蘭搜狩三解宵衣問夜傳清漏瑤殿上勤政名留不待雞人報曉籌燃絳蠟答詞頭四解睿慮充周後樂先憂茅檐蔀屋蓋藏謀不惜金鏐蠲租賜復登仁壽茨梁在野羅漿酒吉亥親耕勤早耰雨暘驛遞馳封奏沃壤年年報有秋五解包羅星宿御丹毫文成萬首味腴餐秀有數萬餘篇摛錦繡丹黃四庫皆經奏更臨雍宣講璧水環橋欣覯禮成釋菜又看典茂鴻都石經鐫就六解二十矢天弧彀廣運南朔東西威棱處處周拓疆二萬亥步全收遐陬襁負投歸降歸順更兼廓喀鯤番一候七解仁壽貞符同輻輳十一世金枝秀聯珠合璧月將日就二千里黃河清仙蝶呈祥晴雪後慶昌期中天候重逢重遘八解玉燭金甌天行一日一周孜孜惟日耄期猶自強不息符乾九膺篤祜璿莢珠籌子帝承歡千萬壽趨辭進茶玉燭調元之章玉燭調元日彩旭曈曨正聯珠合璧慶重逢星輝雲爛藹和風角亢吐三耀辰居拱春意盎瑞光融看萬年枝更動萬年觴奉添籌積算乾綱總一家堯舜貞符共繞陛雲烟擁壽介衢尊恩流寶甕一解主敬宸衷後天而奉紀元周甲蘿圖鞏隆授受養尊崇積京垓臣民頌萬祀慶延洪如日方中麗桐軒輝松棟二解瓜瓞綿綿椒衍金枝重五福名堂萬福同瑤牒書石衆瑞徵麟趾慶恆鍾繩繩繼繼見祥雲擁祝來晜奕祀荷蒼穹三解武於鑠十全同頌文丕煥四德俱隆箕疇錫福福來崇皇極慶道泰時雍四解恩榜制科先中慶遭逢杏花春雨桂秋風澤龐洪年逾耆耋觀光踊遠超五老首曹松首曹松七旬以外成均貢五解會耆英三千衆奏鈞天廣樂同雲夢甘膏渥湛露濃十年方舉燕方瞳鳩飾許攜筇六解藏富三農八蠲常貢偏隅薄歉停輸供問暘雨罷租庸樂京坻勤耕種鼓腹共融融寰宇綏豐舞康衢賡豳頌七解就日瞻雲九宇同占風協律集球共嶽修川效朝正衆拓輿圖河玉山蔥里逾二萬入堯封奉車書玉帛重重八解昌辰嘉會隆儀重聽雅樂九成鳴鳳八極盡承風九瀛齊獻頌趨辭進酒日麗瓊霄之章日麗瓊霄春風先盎蓬萊島樂奏蕭韶天賜徵難老一解祗承皇道歡心萬國會三朝正籌添玉莢更斗轉珠糾縵縵兗衣依黼座爛輝輝瑤斝奉瓊膏慶昌辰重光重潤仰景運稽舜稽堯養隆山海美軼祁姚二解奕葉臚歡衍慶饒詠振振瑞牒標瑤林琪樹萬尋高蘭芽馥郁彤墀繞幔亭仙樂元音妙祥光絢鳳條祥飆暖鳳巢集雲礽獻壽和風劭欣舞綵燦螭坳三解列清班鵷鸞翮高鹽梅一氣調看肅肅衣冠拜絳旓北闕開催曉箭西山爽靜鳴梢斟沆瀣酌葡萄四解欣邇英日轉槐龍清影搖更集賢風緩梅花雜絮飄喜華纓共彯爐烟暖未消鳳池頭仙翰染鸞掖外珮聲敲齊祝頌聖壽天高五解更皤皤黃髮飄玉杖初扶來聽雲璈祝萬八昌期鎬燕列三千吉語衢謠六解皇州暖淑氣調千門萬戶歡聲早九衢初旭笸光繞東華紅軟雲烟裊黃圖紫陌總臚歡萬年枝上鳴春鳥七解聯三殿達四郊綿區匝宇茅檐表綺塍繡罫農功早提壺布穀春聲好兕觥共願獻公堂衢尊衢室歌鴻造八解威棱震德化遙王會冠裳海角山椒長股僬僥瑤階上干羽功昭趨閶闔拜舞兼歡蹈匝爻閭赤帟飄颻紈牛露犬輸奇寶兜離僸昧盡入咸韶九解玉河縹眇星海迢遙占城馴擾撣國招邀南掌山高荷蘭帆飄卻值元正齊到慶中天仰碧霄路繞銅標韻叶鸞鑣占青雲來重譯趨黃道共上輕軺會嘉慶舞雲翹南詣北燮祥輝耀鳧趨魚藻式燕翔翱十解軼黃農超羲昊進長生水玉膏金鑑常懸帝範高羣欽帝德煥珠弧上瑞先昭泰策乾符上下交頌兼容並包積京垓億兆霞觴重酌種蟠桃趨辭皇帝三大節上元除夕筵宴三章進茶進酒丹陛清樂進饌中和清樂進茶海宇升平日之章海宇升平日景物雍熙偏乾坤草木樂清時河清海晏麥雙歧麟游鳳集枝連理風淡淡日依依正蓬壺乍啓天顏有喜金門嶰竹傳仙吹金猊篆裊香烟細合殿歡聲殷地一統山河萬年天子一解佳氣佳瑞滿皇畿天門詄蕩御筵披千峯嶂排晴翠動龍蛇日暖旌旗青蔥玉樹萬年枝燕溫溫玉戺金墀二解天工四序平分歲皇心惟念小民依一自農功始祁寒暑雨遍疇咨崇墉櫛比豐樂成民瑞真民瑞茅檐外蕭鼓樂豳詩三解溯當年深仁厚澤到於今纍洽重熙皇心繼述踵前徽勤宵旰敕惟時惟幾四解孝饗吉蠲修祀事奉明粢于豆于登祝繁禧為民祈聖心無逸天庥至天心錫福聖無為聖無為太平恭己垂裳治五解得賢臣襄上理賁干旌連茹彙征至蟬有緌鷺在墀九苞揚彩映朝曦來集上林枝六解民俗恬熙盈寧婦子康衢黃髮偕兒齒食舊德服新菑想中天堯舜世鼓腹共游嬉亦越於茲戴堯天遵舜軌七解重譯來時梯航萬里冠裳玉帛圖王會於萬載太平基想中天堯舜世鼓腹共游嬉亦越於茲戴堯天遵舜軌八解皇心和豫陽春似自萬類光輝盛美四海共傾葵五雲齊獻瑞趨辭進酒玉殿雲開之章玉殿雲開金門春在蓬壺界日月昭回景福齊天大一解乾坤清泰五雲深處是三台看句陳北指更閣道南回明朗朗左樞兼上相爛熒熒龍角枕河魁際中天珠聯璧合仰紫極麕至鳧來一人有慶萬國春臺二解府事修和籲俊才扇仁風遍九垓萬方樂育仰栽培一人宵旰符真宰幾康劼毖天工代民生亦快哉饔𧹞廑聖懷勵憂勤保大持盈泰歌帝力望堯階三解香馥馥葡萄潑醅天漿泛玉杯光灔灔露從仙掌開北斗傾萬壽觴南山獻延壽杯慶玉食萬方來四解看蓬瀛春暖林巒間早梅喜風和日麗年華入睿裁況山巔水隈玲瓏萬卉開緑芊芊蘚似茵紅灼灼花如海雨過也隱隱輕雷五解到清和暑風來茂對乘時長景恢台敞水殿紅紛緑駭曳暄颸楊柳毰毸六解金飆至商序回清秋皓月揚光彩芙蓉初日舒蓓蕾平疇黃雲藹歲登大有萬民歡皇仁優渥敷天戴七解寒雲沍四序垓一陽來復天心泰兕觥釃酒公堂介豐年蠟饗吹豳賽乾資美利本無言帝恩廣運真無外八解天呈瑞愜睿懷金鏡光輝玉燭和諧鳴鳳雍喈堯棟上雲影徘徊舜琴中慍為吾民解奏南薰還阜民財冠裳玉帛圖王會皇風蕩蕩聖德巍巍九解淵思往代茅茨土階不圖不繪黃屋心齊不築崔嵬不重玫瑰不貴腥羶葅醢卻猩脣減豹胎惟寶賢才亦有鹽梅和舟楫九棘三槐念民依饑渴殷懷願時和田不汙萊神倉御廩藏精稗五風十雨無僭無差十解日晶熒雲靉靆蓂葉芳生玉階紺露丹霞接上台帝居深在蓬萊泛瑤觴玉斝雲罍宮漏銅壺緩緩催頌元首明哉喜君賡臣拜太平時節萬年杯趨辭進饌萬象清寧之章萬象清寧海𧜛承平瑞日麗彤廷乾主大生坤職資生四序不言而成宸居端拱敷皇極帝道無為法健行五緯明百度貞萬邦額手歡慶一解軒圖麗日懸金鏡堯階蓂莢舒長景陽回黍谷開春令帝車運轉杓攜柄天道本無言主德惟居敬萬邦咸頌吾皇聖二解歡幸纍洽重熙際太平萬國獻葵誠簪紱盈廷筐篚充庭圖王會奏咸英微颸不動珠簾卷露漙漙仙掌高擎酒初馨薦瑤觥共祝一人有慶三解彤墀上花甎布影瑤階上爐烟細生鳳凰鳷鵲敞雲屏宮漏悄玉壺清四解泰階久平大有屢登上林草木瑞光凝卿雲景星梯航萬國冠裳整香烟盎盎排蓮井宮殿風微仙樂盈九成韶簫來儀鳳穆肅天容睟以清五解庭燎初炳仰垂裳一人有慶明離午正又千道彩霞籠瑞景西山分翠黛共南山獻壽北斗天漿溟涬天長地久永茲九野盈寧萬方綏定六解念世德承天命況復寶籙鴻圖嘉祥歲歲呈五風十雨九穗雙歧紫芝朱草榮木華連理更兼之屈軼階前指佞七解欣慶際昌期觀聖政億萬載培周鼎宵衣旰食日邁月征殫厥心為民求瘼菖葉抽時花綻杏寫豳風又思省春省秋省八解玉振金聲皇朝功德慶成從此年年獻兕觥佳節良辰喜交並傾堯酒堯棟雲生壽籙綿綿天共永趨辭除夕上元上燈火樹星橋一章乾隆七年定中和清樂火樹星橋爛煌煌鐙月連宵夜如晝春風料峭鈞天奏徹簫韶烟雲中瑞靄交籠著鮫綃錦繡叢萬花繚繞魚龍夭矯嵩祝聲高一解分明是洞天是絳霄分明是靈臺靈囿靈沼更春光乍到景物暄妍雨露饒又黃上柳條漏泄春陽在野橋二解賀聖朝世德遙鬱曈曨日麗霄聖嗣聖重明繼照萬民歡樂萬方熙皡升平節瑞應昭瓊蕊飄蕭寶殿開法曲雲璈魚龍夭矯嵩祝聲高三解金枝麝氣飄西吠琉璃四照影娥池鳳燭燒百子池涎爇龍膏九華鐙篆烟消寒星纍纍綴銀霄蟻穿九曲珠光耀好良宵是皇家景福滔滔四解滿山椒花簇百枝嬌月輪正高鐙和月一片冰霄是皇家景福滔滔五解殿當中黼座高春悄銅壺漫敲笙歌千萬里而遙是皇家景福滔滔六解良宵正好正好良宵看皇都萬井多娛樂良宵正好正好良宵蓬壺清窈銀海光搖百和香霏瑤島紫羅囊繡綵飄花匼匝東風吹飽同慶清朝七解小梅梢暗香浮動淡烟籠罩月上柔枝露滴輕苞今宵𩹉巷舞衢歌遍寰瀛同慶清朝八解願春光年年好三五迢迢不夜城燈月交奉宸歡暮暮朝朝成矞成卿萬𩽆祥雲護帝霄趨辭雍正二年耕藉禮成筵宴三章進茶雨暘時若之章祥開黼座兮布瓊筵笙歌迭奏兮天樂宣三推既舉兮賜豐年五風十雨兮時不愆優渥霑足兮溉大田皇心悅豫兮福祿綿進酒五穀豐登之章龍犁轉兮春風生帝勤稼穡兮供粢盛戒農用兮勸服耕富教化行兮百穀成禾九穗兮麥兩莖黍稷重穋兮充棟楹歲登大有兮怡聖情堯樽特進兮玉醴盈勞酒禮飲兮邁鎬京進饌家給人足之章嘉禾炊饌兮雲子芳仙廚瓊粒兮匕箸香吾皇重農兮禮肅將明昭感格兮錫嘉祥千倉萬箱兮百穀穰崇墉比櫛兮遙相望豐亨樂利兮遍八方家多充積兮野餘糧含哺鼓腹兮化日長朝饔夕𧹞兮壽而康萬邦同慶兮璿圖昌乾隆七年重定耕藉筵宴三章進茶進酒丹陛清樂進饌中和清樂進茶喜春光之章喜春光將瑞靄集斗杓運農祥正土脉融平野水泉滋景風至農夫塗脛長隄柳繭館條桑映簑共笠村謳相永頌元后眉壽萬年育我民四方歡慶一解看風烏翔玉樹外帝座臨瑤階影百辟趨搢笏共朝天摳衣拜田夫瞻望簫韶奏磬管聲依永寢園內朱櫻初迸玉井藕十丈移根安期棗似瓜晶瑩二解是瑤池來閬苑薦世間物如何並吅雪甜王母遠相將笑留核冰桃還勝吾皇念菽粟真民命異物捐芳甘俱屏富方穀在歲有秋勞則思若時恆性三解辨土宜頌月令遍紫陌野人望杏玉盤待賜