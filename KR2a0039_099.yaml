body:
  text: 清史稿卷九十九志七十四樂六樂章四筵宴舞曲大宴笳吹樂番部合奏元旦冬至萬壽三大節慶隆舞樂九章於鑠皇清受命於天光延鴻祚億萬斯年天開令節瑞啟階蓂共球萬國聖壽千齡粵自我先肇基俄𩽆長白之山鵲銜朱果綿綿瓜瓞長發其祥篤生列祖積慶重光式廓舊疆東訖海表聖聖相承永世克紹一章赫赫神功龍飛崛起戎甲十三奮迹伊始復讎靖難首克圖倫天戈一指震懾強鄰九姓潛侵滅迹如埽蒙古五部來奉大號明師四路五日而殲定鼎遼瀋都城巖巖陣雲五色江冰夜凝天助有德應運而興二章天亶聰明覆幬下國遠服邇歸誕敷文德四方來附雲集景從建長命官庶職是綜爰創國書頡文羲畫聲協元音萬古不易爰定軍制綵旐央央或純或間永奠八方締造鴻謨創成大業錫福無疆慶鍾千葉三章佑啟哲嗣光闡前猷昭崇駿德誕迓天庥攜貳綏懷朝鮮歸款世奉東藩釐爾圭瓚三十五郡厥角稱臣西被佛土重譯來賓濯征有明耀師齊魯電埽郊圻有而弗取略地松杏屢殪敵軍百戰百克用集大勳四章帝德廣運昭受鴻名建國紀元永定大清敦睦九族彝倫式尚德親賢股肱心膂三館是闢鑑古崇儒郊社禘嘗式賁皇圖爵秩以班六曹承政百工允釐萬邦表正威鑠函夏德配蒼穹敬承無斁駿烈豐功五章帝授神器統一寰瀛翦滅巨寇乾坤載清一著戎衣若雨甘雨大告武成作神人主躬親大政飭紀整綱制禮作樂昭示典常納諫任賢慎微慮遠定律省刑萬世垂憲克勤克儉忠厚開基景命維新兢業自持六章聖神建極道冠百王六十一年福祚久長天縱聰明沖齡御宇孝奉兩宮德隆千古三孽蠢動一舉蕩平海氛永靖浪息長鯨親御六師三征沙漠威肅惠懷鋤頑扶弱禹功底績虞典時巡敷天率土莫不尊親七章惟天行健神聖則之典學勤政作君作師無逸為箴宵衣旰食一人憂勞綏此萬國文經武緯地平天成中和立極玉振金聲億萬斯年覲光揚烈敬天勤民體元作哲天鑒孔彰翼翼後王儀型皇祖帝祚遐昌八章瑤圖炳煥六合雍熙星輝雲爛風雨以時翕受嘉祥調和玉燭治靄皇風道光帝籙東漸西被北燮南諧梯航琛賮畢致堯階日升月恆萬拜蒙福擊壤歌衢嵩呼華祝秩秩盛儀洋洋頌聲紹休列祖永慶昇平九章嘉慶元年太上皇筵宴慶隆舞樂九章洪惟太上景福自天紀元周甲席瑞循環丙辰肇歲寶命躬膺昊慈默籲祖武敬繩初願克符弗踰前紀誕畀元良丕承宗祀孟陬朔旦端啟重光大廷授受申錫無疆精一執中心傳欽守媲美勳華世躋仁壽一章維聖握符祗嚴昭事肅肅泰壇惇稱殷禮兆南就位有舉必躬祈辛卜稼祭雩占龍陟降靈祗精禋肸蠁四序鈞調百神歆享雨暘寒燠曰風曰時八徵敬念九𧜛醇熙壽增上耋弗懈益虔茂膺多祜翕應蕃駢二章謨烈顯承福基萬億對越在天升馨昭格羹牆申慕彝訓式欽晨興惕若寶籙披尋四蒞陪都珠丘展謁締構艱難緬維開國威宣弧矢化肅冠裳祗循前典曰篤不忘繼繼繩繩昭哉嗣服於萬斯年錫茲祉福三章聖人敕政綜攬萬幾至誠悠久維日孜孜恭乃壽徵健為乾體洞照八埏勵精十晷丹毫批奏彤陛延英劭農履耤展義巡行相度塘隄於河於海肄武習勤賚藩宣愷純一不已用介大年貞恆保泰往牒孰肩四章民應如草聖澤如春大鈞默運宙合同仁五免丁糧三蠲庾米豁欠寬徵恩覃肌髓爰諮稼穡普及封圻偏隅有告大賚龐施民隱燭微吏猷選最岸獄平反拊循攸賴乾坤幬載日月照臨莫名帝力允享天心五章聖謨廣運文德誕敷道隆金鏡象麗瑤樞禮正圖編詩釐樂府四庫分排七閣崇庋講筵著論史鑒宣評圜橋集鼓泐石橫經文薈三千詩裒五萬雲漢倬章日星炳煥作人敷教恩牓駢聯楩柟嵵梓良材蔚然六章皇猷赫濯載纘武功殊方奉朔逖裔從風準部回疆天戈疊指二萬輿圖宅畋斯啟金川再定卭僰犂庭樓船震懾海嶠敉寧緬孟敂關交南羾闕衞藏安禪徼夷向日鴻勳十告馳驟禹湯苗頑率服纘繼紫光七章範九五福惟帝時承億齡瑞啟奕葉祥凝寶篆十全堂顏四得甲子稽撓貞元衍易洪開壽𧜛疊舉耆筵珍府闡繹景緯昭宣惟德之基惟福之積芝檢文輝蘿圖慶溢九如曼羨八表蕃釐重輪繼照光我皇儀八章太上立德咸五登三崇稱卻讓湛澤均覃動植蕃昌裨瀛照洽子帝承顏來昆引牒祥源益溥慶祚洪延瑤圖汁紀珠斗輝躔純嘏緝熙康強逢吉光啟帝期永綏皇極會元章蔀正載經畡願齊聖算長頌臺萊九章乾隆二十六年皇太后七旬萬壽慶隆舞樂二十章皇太后萬壽彌增皇帝至孝以承洪福同山海歡聲率土騰一章歲當辛巳建壽屆七旬隆怡愉太平日舞蹈徧寰中二章太后宏溥慈仁宮闈式維均綿延百世澤長此樂長春三章盛際集禎祥祈年日正長臣民敬申輿頌慶覃恩敷八方四章聖節開嘉燕雍容舞疊獻允茲祺壽綏神人共歡忭五章金鑰曈曨曉開成行彩仗先排臣工大小陪位會朝稱慶無涯六章皇帝仁孝兼至聖母福壽同綿載考古史所紀罕得於斯盛焉七章皞皞熙熙盛世氤氤氳氳元氣皇太后聖壽無疆皇帝孝思不匱八章如日之升如月之恆慈壽綿綿如南山是徵九章皇帝聖治臻隆庶彙被澤胥濃以茲悅懌聖母允宜福壽攸崇十章大孝章矣茀祿長矣敷天啿啿樂時康矣十一章聖時文教昌萬彙欣解阜多福允受茲清寧並悠久十二章異域輸誠稱臣奉琛屬國以萬數雲集合歡心十三章殊方一以平德威既遐布長治而久安慈懷同增豫十四章回部偕來賀德化漸以深戴恩永無極送喜承皇心十五章迺陟金陛兮慶筵載陳迺展舞綵兮至德洽於無垠十六章鐘鼓既宿懸和聲娛愷樂九重進版圖王會式增廓十七章曰雨曰暘時若省歲實維屢豐泰宇既安既阜嬉游何幸風同十八章浹兮淪兮沐湛恩兮九州萬國戴逾殷兮十九章聖母延洪康且頤行慶施惠人無遺願集多祜綏維祺勿替引之億萬斯二十章乾隆三十六年皇太后八旬萬壽慶隆舞樂十八章聖母萬萬歲既壽而康皇帝逾六旬孝治彌光絪縕化宇兮太和翔洽諸福畢至兮純嘏爾常一章重光冒卯歲序新萬壽八秩啟今辰景祜自茲以永慶日引而月升二章皇帝舞綵聖母燕喜協氣充周福祿萃止三章璇宮丹雘新增卿雲糺縵交凝瑞符翕集如松柏之茂承四章奉安輿以時邁迺東至於岱宗陟喬嶽而行禮百神衞祐咸來從五章普陀肇靈刹宗乘宣祝延慈釐羣藩諸部長咸來膜拜瞻威儀六章敷天合歡忭共球萬邦獻玉冊揚徽稱煇煌晉萱殿七章慶筵樂備孫曾效舞成文協節嘏辭疊舉八章壽如南山崇福如瀛海廣運會超郅隆亙古實無兩九章振振繩繩樂含飴撙撙總總福履綏奉進如意肩相隨同祝聖壽徵攸宜十章金門詄蕩開彩仗棽麗陳羣工忭賀莫不尊親十一章八方太平日負戴來紛闐僉曰盛哉乎斯世維申慶於萬年十二章湛恩汪濊中外禔福臣庶戴德久而彌篤十三章鴻化迪矣昭舄奕矣羣黎百姓洽教澤矣十四章慈訓式於九圉維聖母之貽醲膏浹無外勿替引令祺十五章歲功屢告豐穰五風十雨兆祥荷昊穹兮錫佑協皇心兮降康十六章遠藩內面誠殷土爾扈特願歸我幅員率戶口以數萬計呼嵩鞠來如雲十七章慈顏有喜安以愉德洋恩普周寰區純休永永慶那居億萬斯年樂于胥十八章道光二十五年皇太后七旬萬壽慶隆舞樂九章日升月恆兮天行不息惟聖母之壽與天無極一章淵渟岳峙兮地道有常惟聖母之壽應地無疆二章辰維良月維吉玉觴陳金奏列動六琯之春陽七旬之慶節三章皇帝奉爵龍袞以侑左撫舜琴右酌堯酒合薄海臣庶為聖母壽四章聖母燕喜悅豫且康乃稽慶典載考彝章覃恩闓澤用錫祉於萬方五章萬方有慶四海同春凡我髦士以逮蒸民仰思齊之盛化咸蹈德而咏仁六章和風習習甘雨祁祁嘉穀六穗瑞麥雙歧祥源福緒惟聖母之貽七章萬姓香花千衢歌舞敬祝聖母誕膺多祜樂意徧八埏歡聲騰九土八章皇帝聖德惟聖母是承龍池春麗鳳液祥凝永介慈福延億萬齡九章同治十三年皇太后四旬萬壽喜起舞樂二十章皇太后萬壽無疆孝思共仰當陽多福符三祝維天降百祥一章歲逢甲戌恭遇四旬普天祝嘏二章延洪綿寶籙佳節慶長春敬獻升恆頌歡聲徧九垠三章九垠溥被崇釐大化式於璇帷萬姓瞻依切千秋統緒垂四章垂簾十一年夾輔任親賢長治久安歌永賴武功懋兮文治宣五章皇躬資撫育訓政昭嗣服燕翼荷貽謀鴻庥多景福六章生民遂元化濡遏朘削寬租逋普樂利醉醍醐熙熙皞皞懌懌愉愉七章殊方如砥平聲教既遐布建此丕丕基慈懷信增豫八章皇帝仁孝兼隆聖母萬福攸同盛世人民樂愷清時景物照融九章閶闔千門啟安輿駕鳳來德暉欣普照歡喜上春臺十章鬱鬱蔥蔥氣佳行行綵仗齊排鷺序鵷班陪位會朝稱慶無涯十一章萱室開嘉燕萬年觴疊獻良辰壽而康神人共歡忭十二章我皇舞綵聖母情怡太和翔洽福祿來為十三章奏五英親九族麟定歌鴻恩沐本支百世感深仁天潢一派益敦睦十四章藩王部長咸來賓重譯殊方職貢陳赤子之慕抑何深凡有血氣同尊親十五章奔走偕來趨闕廷鞠忭舞祝遐齡錫之冠帶列藩屏小懷大畏懍威靈十六章皇帝治洽重熙垂裳恭己無為以茲怡悅壽母允宜福履綏之十七章大孝章矣茀祿康矣勿替引之純嘏長矣十八章五風十雨兆嘉祥頻書大有告豐穰盛哉斯世泰而昌神功炳焯煥珠囊十九章同游化宇戴高厚躋金陛兮介眉壽慈顏有喜安以愉與天地兮同悠久二十章光緒十年皇太后五旬萬壽喜起舞樂二十章至哉坤極悠久無疆猗歟令德合撰含章堯門疊瑞姒幄披祥一人有懌萬壽彌臧一章星麗南弧日躔北陸緹室葭飛彤階蓂續太史占雲伶倫候玉上下和同受天百福二章天心復旦聖節長春罄壤齊慶亙霄奉珍月儀外宙雲瑞中宸運隆禮樂感極天人三章其禮伊何璗冊璆章鸞回寶勢鳳欱奇香金支景聚璇衞雲張肅雍長樂艾熾耆昌四章其樂伊何韶韺亮希天歌抗律雲舞蹌儀重華縵縵八風回回玉節金和嗣音之徽五章福以德昌慶因善積齊莊有臨幾康無斁訓流繭觀風光椒掖畢管書儀傾璜奉式六章助隆庶政啟佑我皇櫜威弓矢輯瑞梯航氈鄉即島譯賓王慈和徧服保畏彌光七章於維廣運上媲昊穹春育夏養內帡外幪薰琴解慍嘉玉祈豐萬年翔洽百室熙隆八章鄧林翹秀崑岫搜奇旁求俊乂分職官師四聰明達三宅周咨卷耳進賢如歌風詩九章聖人在上席鬯綏和慈雲蔭遠愛日暉多仁獸歸藪靈禽在柯士朝而忭民野而歌十章帝隆孝治躬奉天經凝旒沖幄鳴玉慈庭文容屬屬舜慕蒸蒸百禮既至四海其承十一章丕顯宗親蕆時嘉會遡月瞻星編珠貫琲璇源益濬玉葉知芘訓儉示恭行慶施惠十二章濟濟卿士將將會朝人瞻丹扆天臨慶宵縟文炳藻睿孝圖瑤呼嵩祝華頌魯歌姚十三章亦有藩長綴於朝儀酎珍溢阼貢嘏駢墀來賓璋馬往賚金犀既畣皇祉咸歡壼彝十四章帝命重申如綸如綍劭農賜租勸位詔祿熙熙春臺渠渠夏屋慶賞雲興歡聲雷速十五章昭禮告秩慈顏愷康旋輝玉墄鳴豫瑤觴矞皇聖孝菴藹休昌鉤鈐既朗延嘉亦芳十六章黃屋長今彤箴自古媯汭嬪虞塗山贊禹徽德孔明重規襲矩以祉元吉宜延遐緒十七章甲子章蔀循環無端易圖大衍羲畫先天箕疇演福軒策調元維天佑聖於斯萬年十八章嶟嶟五岳而岱之宗濊濊百川而海斯容兩儀清穆八表熙雍湛恩波沛峻算山崇十九章靈貺便蕃昌期綏茂帝暉緝熙母儀純佑遐邇壹體小大稽首壽考維祺克昌厥後二十章光緒二十年皇太后六旬萬壽喜起舞樂二十章皇太后福壽同綿皇帝仁孝兼全天佑聖母錫之大年一章閼逢歲之陽其陰在敦牂其日維吉其月曰良二章王會大同星紀五復萬國萬年以介景福三章猗歟母儀翼我聖主曰仁曰智允文允武四章其武維何謐謀璇幄龕靖神州威讋殊俗五章其文維何崇儒禮賢奎章藻耀雲漢在天六章其智維何明燭萬里中外一家宮府一體七章其仁維何如湯如堯蠲租發帑以恤民勞八章民勞休止庶優游止雖休勿休民瘼求止九章自普天而率土兮咸浹髓而淪肌聖皇之德兮聖母之慈十章茂矣美矣薦嘉祉兮唐矣皇矣純嘏爾常矣十一章纍印若綬颺拜稽首壤歌衢謳逮及童叟十二章累譯而至屬國以萬計咸含和而吐氣頌曰盛哉乎斯世十三章大矣孝熙聖皇之思以天下養永奠此丕丕基十四章行慶施惠湛恩汪濊而熾而昌眉壽無有害十五章迺鏤璆冊兮瑑瑤章迺展瓊筵兮奉玉觴迺瞻金陛兮穆穆皇皇迺奏雅樂兮喈喈將將十六章琴瑟在御鐘罄在簴鼚乎而鼓軒乎而舞十七章蕩蕩八荒惠問所翔願聖母壽應地無疆十八章圜穹戴笠徽音四塞願聖母壽與天無極十九章荷天衢提地釐迄於期頤萬有千歲福履綏之二十章乾隆四十五年高宗七旬萬壽慶隆舞樂九章皇帝萬萬壽福如大海源浩元氣兮春和溫澤洋溢兮彌乾坤一章歲維庚子恭遇七旬太平有象鴻禧日新二章班禪覲後藏十方皈依舉延企瑞靄集豐年廣法輪宗風被三章麗正門開詄蕩王公大臣拜舞瞻天仗旗罨靄芬芒芒五雲朗鑪烟上四章敬天勤民久純德四海敷皇帝壽萬萬年孔固南山如五章蒙古衆台吉青海衞拉特愛之如赤子傾心世歸德六章土爾扈特歸順武義金川威震如天大德曰生蹈舞揚休入覲七章曼壽多福臚歡無疆如松柏茂萬葉純常八章皇子及孫曾稱觴介眉壽祝鴻禧兮歲其有與天地兮同悠久九章乾隆五十五年高宗八旬萬壽慶隆舞樂十八章皇帝萬萬壽福如大海源亭育德恩普休和暢八埏一章歲維庚戌恭遇八旬神人祝嘏景福益臻二章洞開九重辟公呼嵩祥光罨靄歌舞攸同三章敬天勤民歲書大有萬壽無疆山岳悠久四章文光炳二曜武烈宣萬方義正以仁育遐邇胥來王五章燕千叟兮嘉龐眉賜筇帛兮拜鴻施臚歡介祉兮叩彤墀羣登壽𧜛兮祝蕃釐六章篤天潢賜章服燦五采親九族本支百世感殊恩歡洽羣情益敦睦七章臨雍釋菜文教振興人材樂育為國之楨八章輯四庫書譽髦鼓舞惠茲藝林上下今古九章修藏兮譯金經廣善緣兮福羣生慈雲布濩兮光晶瑩和風甘雨兮彌八紘十章藩王部長咸來賓遐荒重譯職貢陳依光慕化同尊親赤子之慕中外均十一章安南國王趨闕廷鞠忭舞祝億齡寵以冠帶列翰屏聲教遠暨海國寧十二章緬甸來庭寵膺綸詔頒印錫封永綏炎徼十三章生番嚮化傾心太平恩浹肌髓威畏惟誠十四章聖明四照福綏綿綿吉祥屢臻億萬斯年十五章永承天庥祥徵滋至載頌九如祚延萬世十六章子孫曾玄戲綵舞壽而康兮祝純嘏歲歲年年福履增天地合德同博溥十七章中和舞樂邁韶韺普天率土歡同聲慶萬壽兮茀祿膺受天佑兮莫不承十八章嘉慶十四年仁宗五旬萬壽慶隆舞樂九章皇帝萬萬壽壽與天無疆秉德貞恆篤鴻祜珍符曼羨恩滂洋一章歲維己巳聖節五旬六合昌阜啿啿陽春二章我皇功德冒八極埽除羣慝登袵席磑磑即即師象山永綏生民偃兵革三章民生遂元化濡遏朘削寬惸逋饜餐粥襲裾襦樂皞皞安愉愉四章作之君作之師孔容保誕教思厚莫厚訓宗支仁莫仁箴八旗五章繼統恭勤兮儉德先有孚惠心兮靡回延泉府充羨兮軫民艱馮蠵輯和兮功濬川六章重民耕織雨暘寒燠圖輯授衣纂志祖考大孝備矣養民為寶七章辟公卿士俊髦龐蒙雲施山應降福屢豐綿綿瓜瓞上怡皇衷八章承昊佑兮撫八紘洪景命兮方升恆率土臚歡兮重譯職貢於萬斯年兮福祿永膺九章嘉慶二十四年仁宗六旬萬壽慶隆舞樂九章九有嘉吉萬彙昌貞冬嫗煦日載陽帝承昊貺錫兆庶聖壽曼羨長無疆一章十幹十二枝紀歲周復始皇帝壽齊天循環萬甲子二章北暨窮髮南雕題耕桑直過崑崙西黃河安恬日東注波澄鏡海騰朝曦三章景風翔兮卿雲升民游壽宇兮化日恆世龐鴻兮多耉耋生逢太平兮由高曾四章厚民生省厥慝立嘉禾稂莠茀崇正教恥且格惠元元徧帝德五章繼皇統兮承祖澤王業艱難兮孝思靡極眷遼瀋兮夙法駕式考訓兮永無斁六章帝廑烝民拯之德政曰雨曰暘天心協應熙熙春臺豐年屢慶七章日月方升恆川嶽咸效順祝嘏萬方同梯航集琛賮八章歲己巳兮恩普錫今茲己卯兮六旬聖節帝澤汪濊兮海𧜛樂康願逢旬慶兮萬有千億九章乾隆四十八年乾清宮普宴宗親世德舞樂九章天開聖清覺羅肇興列祖繼緒統一寰瀛一章溯祥長白垂統發跡幅員廣大景附悅懌二章聖皇立極與天比崇純常茀祿昌後隆宗三章篤親九族錫恩單厚金黃帶垂峨冠品授四章枝蕃萼榮皇情則怡嘉承天和方春載熙五章璇宮肆筵宗人爰集黼繡盈庭班行辨級六章皇睠有喜便蕃賚予侍衞賜茶恩涵露湑七章肫仁溥澤大府頒金皇慈既渥以洽壬林八章宗人拜舞臚歡忭祝億萬斯年永綏多福九章乾隆初巡幸盛京筵宴慶隆舞樂一章皇天明命篤生太祖錫之聖智奄有東土於聖太祖開基創業始制國書同文六合曰若太宗嗣承天命肇造區夏仁育義正太宗如天丕冒純德於鑠大清懋建皇極興京聿興盛京斯盛惟其至仁九有託命欽惟聖皇追慕深思率祖攸行惠我嘉師敬觀實錄日星為昭祖業艱難中心忉忉乃頒明詔播告臣氓恭謁祖陵旋軫陪京皇帝篤誠珠丘展覲文武從臣駿奔效藎我皇聖哉細大不遺從臣文武體恤周知乃出邊關乃經蒙古閱七愛曼蕃部悅舞御光遠臨旃裘畢來宸衷軫念錫賚恩恢受我皇恩祝我聖皇合十膜拜恩膏溥將蒞克爾素駕言行狩手格虎殪馬射熊仆英哉我皇舍矢如破獲獸孔多萬人腹果爰蒞舊邦爰謁三陵既躬既親我心則平豈敢憚遠豈敢畏險至止禮成心猶繾綣皇帝大孝承祭至敬肅將明禋萬邦為鏡皇仁懋哉重齒敬老清問殷勤德施浩浩盛京蒞止臨朝閱武御崇政殿恩敷率土乾隆八年巡幸盛京大宴高宗御製世德舞樂十章粵昔造清匪人伊天天女降思長白闥門是生我祖我弗敢名乃繼乃承逮我玄孫一章玄孫累葉維祖之思我西云來我心東依歷茲故土仰溯始謀皇澗過澗締此丕基二章於赫太祖肇命興京哈達輝發數渝厥盟如龍田見有虎風生戎甲十三王業以興三章爰度爰遷拓此瀋陽方城周池太室明堂不寧不靈匪居匪康事異放桀何心底商四章丕承太宗允揚前烈倬彼松山明戈耀雪以寡敵衆杵漂流血惜無故老為余詳說五章余來故邦瞻仰橋山慰我追思夢寐之間崇政清寧載啟南軒華而不侈鞏哉孔安六章維我祖宗欽天敬神執豕酌匏咸秩無文帷幔再張尊俎重陳弗渝弗替遵我先民七章先民宅茲載色載笑今我來思聖日俯照爵我周親藎臣並召亦有嘉賓歡言同樂八章懿茲東土允維天府土厚水深周原膴膴南陽父老於是道古有登其歌有升其舞九章我歌既奏我舞亦陳故家遺俗曷敢弗因渾灝淳休被於無垠勿替引之告我後人十章乾隆十四年金川凱旋筵宴慶隆舞樂一章乾隆聖世瀛𧜛乂康元首惟明股肱惟良景運鴻昌休德茂著統馭八埏惠液遐布金川小醜蠢爾冥頑惟時弗率跳梁窮邊用申天討聲罪執言長驅驛駕油雲斯屯聖謨廣運決機萬里聿簡賢臣良弼是倚曰忠曰勇經略戎功心堅金石誠格蒼穹身先烝徒跋履巖阻晨夕盡瘁均勞共苦姦宄是殛逆諜是攘國憲孔昭我武孔揚窟穴梨止喦巢圮止堅卡隳止峻碉毀止爰褫其魄爰喪其膽震懾股栗潛伏於坎如鼠竄穴如鱗游釜號呼哀籲再三求撫元臣執義憤欲蕩除帝德好生曰免駢誅六條攸約虔慄遵循恩綸祗奉解網施仁丕革厥心匍匐奔赴除道築壇香雲擁路帝仁覃敷六合滂洋蘇其枯朽賜以再生展也滿兵彌月功成云何其速皇猷是憑神功炳焯乾坤軒豁九重勝算明並日月勒諸瓊玖昭諸汗青禮成鉅典樂奏昇平膚功克奏慶筵是侑太和氤氳翔洽宇宙卿雲糺縵景緯珠聯梯航琛賮億萬斯年乾隆二十五年西域平定筵宴德勝舞樂一章祖志繼成翦滅遠叛籌畫從容疆闢二萬川原式廓乃經土田廟算宏深天心契焉車楞內訌丐恩臣服爵錫王公周恤其屬鬼蜮阿酋匍匐帝庭寵以藩服秉鉞專征俘達瓦齊再生曲宥念彼軍勞崇封晉授阿酋狡獪將伏天誅妄冀非分叛於中途反覆二心棄厥妻子役屬離散巨惡宜爾汲水萬里欲息燎原似彼狂酋徒然自燔竄俄羅斯疫戕其命遐方尊王爰獻於境滿洲索倫淩波飛渡奮勇莫當峻嶺爰度俘厥逋逃收彼牲畜取彼子女如摧朽木弓矢所加賊壘莫禦急思兔脫震駭無措蠢爾賊衆作亂變更帝德涵濡惸獨遂生豈曰窮兵豈曰黷武乘時遘會忍弗遠撫回首在囚解其禁錮甫還庫車流言煽布惟彼兇渠負君莫比罔念聖恩能弗切齒伊犁既戢諸部賓服豫策久長悉收回族二賊潰逸命將追遏踰其穴巢直抵巴達爰遣侍衞乃得其情回長搏顙獻馘輸誠邃古莫稽列史具在殲寇如斯未有儗類欃槍淨掃寰宇昇平師出以正中外永清睿謨惟誠宵旰無逸宏奏膚功聖心斯懌順我者昌逆我者亡旌別恐遺天語孔彰酬庸封爵表勇錫名昭茲懋賞章釆聿明誅鋤元惡大功告成如春育物德合清寧道光八年重靖回疆筵宴德勝舞樂二十章道光聖世德洽紘埏獻琛奉賮有翼有虔一章蠢茲逆回逋誅小醜喙伏荒裔敢為戎首二章麌麌其羣驛驛其氛涉卡潛煽不戢自焚三章皇赫斯怒爰命揚威汝往討亂執訊以歸四章渾巴什河先聲克振進殲柯坪靡有遺燼五章沙崗我兵既攻三莊埽穴十日奏功六章奏功一月四城迅復伯克跪迎額頌神速七章莫赤匪狐莫黑匪烏星弧所指並伏其辜八章帝軫八城蠲厥租賦耄齡歡慶九天甘澍九章於鑠宸謨十條誕敷罪人務得勿俾稽誅十章稽誅勿俾征師勿俟次第凱還以息勞勩十一章蒼莽四山偵騎周環妖鳥攸投庭弓攸彎十二章歲既宴矣烝徒驤驤制梃撻賊阿圖什莊十三章我追彼竄自昏徂旦抵鐵蓋山去路倏斷十四章爰喪其馬爰曳其兵奪彼短刃縶以長纓十五章城柳初荑驛騎載馳都人夾道遙望紅旗十六章櫜弓錫組告於天祖歸善慈闈孔曼受祜十七章勒碑誌事御門受俘聿啟喜宴露湛雲需十八章旨酒既嘉隊舞入侑小大稽首我皇萬壽十九章聖武維揚聖恩維長饜仁飫義萬壽無疆二十章大宴笳吹樂六十七章乾隆七年定牧馬歌人君之樂恃此紀綱兆民之樂恃我君王室家孔宜夫君之力朋友有成和輯之德古歌八種成壞兮實人世之常墮迷網中兮慾鎖與情韁愚人無識兮樂茲殊未央執空為有兮謬語其奚當如意寶不澡心於羣經具本性而無明不服膺於佛乘說妙行而聽熒佳兆一人首出萬國尊親湛恩汪濊普被生民百花敷榮一日悅目灌頂寶光萬衆所伏誠感辭良胡畏哉襄以至誠良胡過哉竭己所能良胡偽哉語無文飾良胡怠哉罔敢休息吉慶篇有君聖明逾戴天有臣靖共勝後嗣健婦持家過丈夫如意寶珠惟孝子肖者吟滅除己罪仗佛真言如欲療病惟良藥存菩提鐙兮出衆生於黑暗智慧梳兮櫛六慾之糾君馬黃大海之水不可量天府寶藏奚渠央良朋和睦益無方聖有謨訓垂無疆懿德吟人君能仁烝黎之父君子和平羣相肺附懿厥哲人實維師傅匿智懷私乃民之蠹善哉行惟安惟和心意所欲無貳無虞朋友式穀樂土謠分人以財惠莫大焉施人以慧寧不踰旃踏搖娘日將出兮明星煌煌壽斯徵兮秀眉其龐三十維壯五十遲暮莫親祖母莫尊祖父頌禱辭我馬蹀躞行如流水雋英滿座交親悅喜族黨婣婭咸富且貴酌酒為歡既多且旨慢歌十五歡娛八十衰壯容華茂遲暮悲祖妣最親祖尊哉唐公主遵王之路兮愆尤希素位而行兮夫奚疑丹誠曲罔有敗事兮遵道而行長無離析兮順親之情明光曲瞻彼日月虛空發光聖君聖母焜燿萬拜吉祥師日月之明兮容光必照聖君之明兮烝黎咸造聖明時際聖明時良我福只橫被恩澤良我祿只微言倏忽變遷順其自然如彼蜃樓余生渺焉際嘉平諸惡莫作菩提薩多暝曚妄行用墮三塗善政歌經何本本於宗身何本媼與翁罪何本嗔爞爞福何本和雍雍長命辭靡言不適於道兮水萬派而朝宗夫惟外道之妄語兮井自畫而不通窈窕娘惴惴原獸思全其身兢兢庶士思庇後昆湛露維彼愚人惟知己身維此哲人心周萬民四賢吟六欲相牽微生是戀歎彼駒光如夢如電賀聖朝慈悲方便永斷疑情極樂淨土不滅不生英流行知之而作兮明哲所由不知而作兮庸愚之儔慮而後動兮卓彼先覺率而妄動兮是乃下流堅固子馬蹀躞兮身不獲康念此身兮本自無常馬騰驤兮生不獲寧念此生兮本自無生月圓良馬之德於田可徵良朋之行相交乃明緩歌良馬云何乘者所思良朋云何久而敬之至純辭惟帝力兮勞來父母力兮免懷乘騏驥兮馳驟仗巨擘兮弓開美封君貢高專美曰惟不仁擁貲自厚不久四分惟不惺惺乃不戒懼凶心常萌誰與共處少年行嗟棄捐於巖穴兮盍遠播夫芳聲嗟終老於草莽兮盍永垂夫令名四天王吟悲哉北邙令聞宣揚北邙悲矣青史不渝宛轉辭瞻彼中林芃芃萬木旃檀有香生是使獨萬類咸若攘攘芸芸民之父母首出一人鐵驪載飛載翔惟翮是憑為聲為律惟心是經射之能中惟指是憑交之能善惟和斯恆木珠鷇之成雛兮孚化之功羽用為儀兮賦命之隆迪彼愚蒙兮惟聖之功明厥本性兮實在己躬好合曲維勤斯哲安不可懷溺茲小樂至樂難期章阜乾照無私聖教無類謨訓洋洋鑒茲不昧天馬吟騏驥不羣蹇驢鴻鵠不偕斥鷃騶虞不邇狐狸聖哲不昵愚賤大龍馬吟疇知幻軀祕此佛性疇不退轉佛恩來證上德墮落疇其知病下士頓起疇其知競始條理福慧天亶誠哉難覯通人達士豈奚易逅追風赭馬葱兮蒨兮山有芳蘭僮兮祁兮首有妙鬘迴波辭元首明哉首出股肱良哉罕匹賢夾輔兮王室莫執左道兮蟊賊長豫景行行止下民堪憐宜汎愛衆毋逆忠言平調騏驥適我體櫜鞬衞我身嘉言資我道經史沃我心遊子吟升彼高阜兮思我故鄉有懷二人兮莫出戶堂陟彼崔嵬兮思我故鄉有懷二人兮莫出垣牆平調曲帝王無逸天地和寧辟公膚敏兆民阜成高士吟日之升天為經民之行君為程水之流隨坎盈牝之游駒之情哉生明非冒於貨賄也感兄弟之敬心非貪於飲食也感父老之誠忱高哉行云何致太平睪然望皇衢人生夫何常善保千金軀民之不能忘令名照神區子孫振繩繩百千萬億餘三章敬尊佛敕如滋甘雨莫行邪惡種茲罪苦圓音身無常花到秋名無常雷不留財無常蜂釀蜜水無常海發漚欄杆賢者斯賢賢不賢不賢賢蜜蜂見花駐蜻蜒去翩翩思哉行千金寶馬不如先人之畀遺嘗盡諸果不如母乳之甘兮法座引電可畏兮時屆朱明霜可畏兮五穀將登禍可畏兮歡樂所成罔不畏兮憶神魂之初降生接引辭火宅無凊涼苦塗無安樂鳥路誰能攜閻浮難駐脚化導辭閻浮提界如彼高山越之維艱盡卻今時大海漫漫欲渡良難七寶鞍瞻彼隄岸水則不濫有君牧民當無畔散飛鳥雖疲寧甘墮地君子固窮之死不二短歌嗟余生之歡樂兮似黃離之盈昃感韶光之荏苒兮似葉上之青色及芳華之當齒兮且喜樂以永日夕照時乎時乎時外無時時其逝矣奚與樂為黃離既昃定少溫暾天光既暮曀曀其陰歸國謠皇矣聖世藹如仁君懷哉懷哉日遠日分亦有良朋如兄如弟日遠日離不能遙跂僧寶吟投誠皈命既安且吉如佛塔廟云胡遠別和樂且耽手足提攜如姊如娣云胡遠離婆羅門引酪必成醐父將成祖沙必成丘母將成嫗三部落試觀三界漚起漚滅如彼秋雲乍興乍沒五部落流水何湯湯吾生如是游雖有聖賢人誰能少滯留乾隆二十五年西域平定筵宴笳吹樂一章閶闔煌煌鐘鏞鏘鏘鳴鞭祗肅帝用燕康荷天純嘏祖德凝庥從容底定允升大猷聖德宏敷光被遐邇如拱北辰諸部歸止慈恩覆幬滄海無量爭先效順奔走來王憲章斯備勝算克成跳梁羣醜魚貫輸誠天威震小腆惕厲大君惟仁莫不臣隸聖教宏敷額手格心月竁同風越邁古今遠謨是協絕徼安康撫綏之德徧於遐荒乾元功懋滂洽垓埏巍巍盛德億萬斯年道光八年重靖回疆筵宴笳吹樂九章於赫皇威式於九圍回疆耆定飲至勞歸一章有截回疆純皇所綏畏神服教鞏我藩籬二章蠢茲逆裔逋誅再世燎原自焚法不可貰三章戎車爰西如雲如霓一月三捷四城其徯四章四城既治醜黨既夷彀弣張妖鳥安之五章回莊歲邇有鴞萃止躡迹窮追鐵蓋孔巋六章縶以白組報以紅旗新春送喜皇心載怡七章昔賦出車今歌采薇受釐天祖歸善慈闈八章嘉獻允儀溥哉恩施奉觴稽首萬壽維祺九章大宴番部合奏三十一章乾隆七年定惟大合曲染絲曲公莫雅政辭鳳凰鳴乘驛使六章有辭無辭者有宮譜曰兔置曰西鰈曲曰政治辭曰千秋辭曰鴻鵠辭曰慶君侯曰慶夫人曰羨江南曰救度辭曰大番曲曰小番辭曰遊逸辭曰興盛辭曰艷冶曲曰慶聖師曰白鹿辭曰合歡曲曰白駝歌曰流鶯曲曰君侯辭曰夫人辭曰賢士辭曰舞辭曰鼗鼓曲曰調和曲不載大合曲元縡是依明神是祗一心至誠昭事勤只巍巍大君永底蒸民中心愛戴稽首來臣念人生之無常兮合勤修夫善行信百行之咸善兮終和平而神聽染絲曲大君至聖教敷率土敉寧萬邦拜跪奉主公莫丕顯元后惠懷萬方國彥棐恭協贊邦常率土之濱誠意溥將咸拜稽首依戴聖皇雅政辭皇皇聖明無遠弗燭林林衆庶無思不服元化惠心為善去惡聖人之邦長生永樂鳳凰鳴承乾體元惟我聖君光開草昧惟我聖君綱紀庶政惟我聖君父母萬國惟我聖君惟我聖君兮覆幬如天惟我聖君兮自新新民惟我聖君兮中外乂安惟我聖君兮羣慝消淪拜手稽首兮頌溢兆民乘驛使大地茫茫大海滄滄豈伊無寶求之奚方自古在昔為君為王膺圖御宇命不于常實心實政惠此萬邦聖御大寶繄惟我皇繄惟我皇兮疇可與之頡頏回部樂曲一章律呂後編回部樂曲國書用漢對音而旁注宮譜今以漢對音載其辭思那滿塞勒喀思察罕珠魯塞勒喀思
