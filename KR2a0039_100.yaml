飲堯尊歌舜壤七解以豫以休引恬引養黃童白叟欣瞻仰聲教訖被遐方亶馨香紛肸蠁八駿盡調良雲錦鋪張統車書同衡量統車書同衡量八解宸游睿藻來天上覃闓澤恩波演漾喜起遘明良雍喈相協響九解昊天命第二十七昊天有成命受此丕基武烈文謨式穀是貽亹亹我皇克纘鴻規敷天裒對罄無不宜一解欽若昊天敷時繹思求民之莫夙夜其咨迄用康年維星協畢與箕既富且穀迪彼秉彝聖敬日躋帝命式于九圍二解憲憲令德抑抑令儀綱紀四方涵泳聖涯率由前模惠澤勤施民之攸塈如取如攜如塤如篪迪教不違皇帝聖神天錫英姿聽聰視明法式生知並包蓄養解慍絃揮仁滂施厚元氣淋漓千秋萬歲復覯姒與姬三解百姓昭明五典慎徽浣濯甄陶沁骨浹肌如彼田矣亦既敷菑如彼室矣亦塗塈茨皇心統天品物咸資維嘉維時樂矣魚麗四解翩翩之鴻言漸於逵皓皓之鷺言集于湄藹藹王多吉士赤芾祁祁束修其躬慎乃樞機左右天子盍簪勿疑五解然雙闕晏然三陲端拱明堂默運璿璣禮陶樂淑俗易風移金儀測象玉律定時四野八荒洵不遐遺淀有蘺隰有葹對時育物萬邦是綏省方設教用致雍熙無封靡于爾邦惟日孜孜六解咨我三公及爾庶司豈敢怠安無平不陂建國親侯王者無私卜云襲吉昆命元龜農事告成秋以為期倬彼雲漢奎畢井觜揆文奮武營壘車騎象緯昭回聖人法之以補以助上繼姚媯億萬斯年壽考維祺整法駕揚華旗六軍雷動萬馬星飛白山嵃嵃緑水澌澌騶虞至鳳凰儀于疆于理皇心則怡七解渺渺川原坦然逶迆遺秉滯穗如京如坻各峙乃粻以饗我師鳥獸充牣碩大蕃茲莫不振永藉保釐七騶既馭萬衆咸隨鍧鍧鼓鐸幡然旌麾逐獸追禽大戟長鉟為鐃為鐲載常載旗左律右鉞平於有司瞻彼翠華朱英蕤蕤星旗月鈒錦韉珠戣禮百神奠四維王用三驅勿競厥威我求懿德允王保之八解張皇六師如虎如羆天休震動周道驅馳策勳在廟莫不寅威戢干韜矢說禮敦詩天子是毗九解灼灼芙蓉花毿毿楊柳枝旜旐婀娜畫龍與螭干盾騰拏逐豹與麋湛湛甘露酌以玉卮陛下千萬歲撫御萬國歸銜羈十解王會有圖天葩芬奇爻閭赤帟元繚碧基文蜃大蟹孔鳥皋雞隃冠尊耳露犬星施白鹿黃騏獻其貔皮在彼澤宮璧水瀰瀰樹爾侯矣射熊與貍槐宸高聳棘路明熹鳴葭駐罕麗日和颸四牡騤騤以車伾伾飲至言歸十一解驂四鸞駕六螭彤雲分五老珠露浥三峗訪姑射拜希夷執衡與規循理因資昭假遲遲恭己無為十二解誕敷文德懷柔神祇天命靡諶念茲在茲周原稼穡小民之依蠲租賜復王言如絲裁成輔相於鑠純禧首山之陽毋釆爾薇商山之顏毋釆爾芝三老五更惠和宣慈有馮有翼爾性爾彌袒而割牲謙謙是撝示我周行瑟鼓笙吹十三解矗矗恆山幽冀之治絳雲紫霞岐岐嶷嶷青書緑笈神所護持包王孕帝駕軒鑠羲元泉神草瑞勒豐碑爰命太常爰詔后夔式祀上帝饗以騂犧獻琮璧奏咸池奎聯璧合星斗陸離洞簫玉琯鳳羽麟差十四解中澤有葵南山有桋豈弟君子佩玉履綦遭逢明盛文煥功巍三墳五典煌煌麗辭願續雅頌永鎮厜十五解乾隆二十五年平定西陲凱歌四十章睿謨獨運武功成天柱西頭奏永清候月占風傳自昔試聽今日凱歌聲其一往歲伊犂振旅回名王尺組就俘來天西月竁咸星拱戎索遙從昧谷開其二狼狽相兼弟與昆虜廷久縶兩花門九天忽遇王師下破械先施再造恩其三賜歸舊部寵榮多俾撫殘戎釋網羅但使祁連山作礪不教蒲類海揚波其四何期鷹眼終違化翻肆梟音煽逆塵朔草並霑天上露黃沙偏負塞垣春其五恢恢天網本來寬稔惡誅鋤務欲殫宵旰從容宏廟略偏師重進取凶殘其六梯衝烈烈庫車垣逋寇倉黃竟返奔那識降人爭獻款亡巢徼幸漏游魂其七虎符申命下丹霄壁壘旌旗煥一朝頓覺三門新氣象元戎更拜霍嫖姚其八一軍早定沙雅爾百堵旋收阿克蘇萬里風馳還電掃大兵直壓賊城孤其九蟻結蜂屯三閲月熊蹲虎踞一當千如山軍勢原難撼醜類空教倒戟旋其十櫜囊不待裹糧行早喜因糧在敵城奇應何須驚雨粟地留火米待神兵其十一天漿那挹斗杓盈陸海茫茫疏勒城忽報靈泉隨井泄滿營歌舞拜王明其十二鼯鼠從知技已窮著林飛炮響隨風鉛丸拾得還殲寇翻為天朝助火攻其十三天飛騰萬騎來追風已過拂雲堆更番士卒符神算恰作奇兵拔壘回其十四六城脣齒扼和闐一夕降旗因壘傳五里何妨迷涿野轉乘霿霧靖狼煙其十五羣番秉令盡從風聯部扶攜厥角同重譯獻來回字表喜為臣僕象胥通其十六繡旗乍卷鋭師分戈壁風沙結暮雲半夜賊營齊破膽驚從天上下將軍其十七腹背交攻攻並力爪牙盡挫挫安逃天風吹蕩蚍蜉陳伏穴潛藏似犴牢其十八葉爾奇木門洞達哈什哈爾城崔巍此間風景古未識祗今惟有天兵來其十九頭夾道拜旌旗涸澤揚沙久赫曦最是神奇回造化雨師今亦迓王師其二十久傳婦子望雲霓今聽歡呼應鼓鼙跪奉雕盤爭獻果葡萄蒟醬比難齊其二十一殊方何幸戴堯天從此坤城列市㕓薄賦但教供苜蓿同文先為易金錢其二十二徑師分道襲刀環轉戰經時草木殷入夜窮追聲影絶山頭明月一弓彎其二十三萬衆爭先虜氣銷呼聲天半落盤雕至今人過伊西洱猶覺轟霆撼碧霄其二十四舊聞天宇原知向今讋神鋒不可攖一一顤盡泥首夜來刁斗靜無聲其二十五陳合將軍飛羽箭戰酣勇士掣雕戈降戎奉檄皆鷹犬走山前得脫麼其二十六殘生暫保齊那爾狡窟難尋布孩白鵲旗高函逆首都丸親奉凱書來其二十七蟣肺蜣肱自不支親離衆叛欲何之輕刀砍陳蹂輕騎又報分張二負尸其二十八奏捷星馳絶域書御園雲物小陽初葭灰未動春先到應瑞花爭四照舒其二十九送喜璇闈晝正長共邀慈福樂時康武成敬頌無疆壽錫類同瞻日月光其三十山川競說方輿記風土爭傳王會圖此日西維逾二萬崑崙猶自在東隅其三十一默伽樂國舊曾誇豈謂還成井底蛙自此天方增喜色真教土宇屬天家其三十二旭日曈曨元象開八紘七政在璇臺嚕斯納默知欽若同向蓂階奉朔來其三十三萬古冰山雪巘閒盡教職貢附朝班落梅何處春風笛一路筠沖接玉關其三十四獻馘膚功紀泮林天章更勒遠山岑祗看雲漢昭中外字字唐虞二典心其三十五功成始仰廟謨神測海捫盤見未真崇論昭宣聾昧覺共欽至理析天人其三十六泰壇琮璧陳天貺清廟圭璋告大猷盛典輝煌羣祝嘏皇心肅穆自凝庥其三十七日麗風暄敞鳳樓九霄丹詔瑞雲浮敷天湛露恩施溥奏凱聲中愷澤流其三十八駿烈都從睿斷成登三咸五總難名祗今尺箠收天外歲籥才看第五更其三十九舞羽櫜弓偃六師策勳飲至拜丹墀小臣願譜鳴笳曲珥筆慚無朱鷺詞其四十乾隆四十一年平定金川高宗御製凱歌三十章草四中秋夜丑時木蘭營𩹉遞紅旗本來不寐問軍報孰謂今宵宛見之其一七千里外路迢遙向十餘朝茲八朝可識衆心同一志嘉哉行賞自宜昭其二賊巢最是勒烏圍甲雜小連噶喇依破竹勢成應不日速傳捷信願無違其三行營半夜那來喧卻是紅旗到門五載勤勞同上下鴻勳集總沐天恩其四紅鐙一點引紅旗頃刻行營人盡知舊部新藩同賀喜古來報捷可如斯其五成言原有付兒行一見紅旗即奏將雖是慈心早知喜更馳侍衛報山莊其六一破賊巢飛騎馳未遑詳細盡陳之將軍宣力應優賜先示端倪加勉宜其七前次受降惟戢斧今番報捷乃犂庭敬承天眷能無慰未至武成心未寧其八宵衣惟吾理合然喜而不寐那能眠乃知屐齒事誠有較彼殊猶高下懸其九三捷盼來一月間此時軍務正相關執渠掃穴歌耆定佇待郊臺奏凱還其十甲午桃花寺蹕停軍書正此俯窗櫺幸哉今日仍憑處緑柳中飛一點星其十一勒圍報捷夜行營重值上陵晝返程一刻萬人齊色喜光明日月永銷兵其十二三穴猶延一月餘六軍奮勇豈饒渠周遭火器熾攻處早爛區區釜底魚其十三旬餘棧驛八朝至一片紅旗萬馬飛夾路羣番喜且懼國之慶也國之威其十四險惡山川靖梟獍邪深機阱絶根株從今番部都安堵強食姦欺自此無其十五蠶叢絶險隱妖氛百戰功成古未聞鼜鼓冬冬聲凱獻羌兒稽首送將軍其十六堅碉林立萬重山破險衝鋒歷盡艱奏績都資軍將力紅旗一道入桃關其十七姜維征處號維州豔羡戎人謠語留今日勒圍為內地無憂城果是無憂其十八盼捷經冬復入春垂成偏覺意厪頻今宵料得方安枕明告慎哉用武人其十九流離此日穴巢傾耆定從茲可罷兵歌凱莫教容易聽五年功幸一朝成其二十郊臺仍是此郊臺何幸重修盛事來漫謂數年經契闊精神注似日相陪其二十一勳臣率拜列靈旗軍士鳴螺赫武儀樂奏鐃歌行抱見詰戎家法萬年垂其二十二己巳班師本受降庚辰郊勞典鴻龐放牛歸馬豫素志凱獻何期此見雙其二十三準部回城定五年金川小寇亦如前嘉豫將士久敵愾不覺對之增惻焉其二十四地險加之衆志堅林碉步步戰而前小於昔事難過倍慰意恆因意然其二十五鑿穴而居避火器終於面縛出蕃城貪生螻蟻固如此聚族將焚語豈誠其二十六經于役五春秋棧道崎嶇似坦郵夾路花紅復柳緑阿誰致悔覔封侯其二十七脫卻戎衣換吉衣龍章示奬特恩稀同心戮力還掄最便解天間賜六飛其二十八兵洗金川永不波潢池跋扈竟如何良鄉近遠多黎庶歡喜都來聽凱歌其二十九凱歌亦豈易為聞五歲辛勤勞衆軍我實未曾安午夜幾多憂慮與平分其三十乾隆五十五年高宗八旬吏部尚書彭元瑞集御詩為萬壽衢歌三百章帝自圓明園回宮奏以前導而內戡外攘治定功成羣臣亦屢有奏御之篇康熙二十年葉方藹上皇雅曰涇丘十二章美受降也曰關隴十二章平隴右也曰南紀十一章平閩也曰巨浸十一章平海寇也徐嘉炎上鐃歌鼓吹曲曰聖皇出皇帝受命也遼水奠平察哈爾之亂也安隴右平王輔臣也豫章翻定江西賊也掃七閩平耿精忠也海波平驅鄭錦也平五羊討尚之信也桂水深定廣西也殲渠魁吳三桂死逆黨解散也洞庭湖平湖南也收成都平全蜀也克黔陽定貴州也定昆明誅吳世璠平全滇也文德舞告成功也凡一十四章袁佑亦上平滇鐃歌曰聖同天曰出師初曰皇矣曰於鑠曰氏畝曰昔夜郎曰萬方平曰於都曰審天心曰山石凡十章康熙二十三年聖祖巡幸闕里徐元文上東巡雅十三章李振裕上親祠闕里雅一篇顧汧上述聖政雅東山十章南勳十章金居敬上駕幸闕里樂府十二章康熙二十八年聖祖南巡趙執信上南巡樂府凡四章曰東南春道路無擾也曰歲星謠蠲租稅也曰江水清吏知法廉也曰桃花然變民俗也彭會淇亦上南巡風謠十章康熙三十六年親征沙漠厄魯特遁陳廷敬上聖武雅三篇惟天十有一章言初臨沙漠安邊破敵武功盛也皇矣十有一章言撫降人民也武成十有一章言擒孽殲凶武功大成也王士禛上平北雅一篇杜臻上平漠北鐃歌鼓吹曲曰揚聖武神幾捷峙金湯踣猘獸天駟蝗天行健穽孤雛伏天誅衢歌繁武功成光芝檢陳王會凡十二章陳論上聖武功成鐃歌鼓吹曲曰聖武昭行天討虔祭告命將帥嘉祥應三出塞廣招徠大無外凱歌還辭尊號凡十章宋駿業上平北雅成命九章言天子自將出塞靖邊塵安萬民也皇祐九章言天子再出塞料軍實決機宜也天監九章言天子三出塞凶醜窮蹙服天誅集大功也沈涵上聖駕北巡鐃歌四章撫萬國言天威北指厄魯特遠遁也乘法駕言大駕巡邊喀爾喀懇切輸誠也紫壇高言德合天人甘霖屢沛也六龍旋言還宮齊祓親詣北郊也姜宸英上平沙漠還宮凱歌七章皇矣頌宸斷也有山崔嵬述貞符也從軍樂將士也絶大漠頌神武也二儀樂好生也雄狐美諸將能禀神算成大功也歌凱旋樂寇平大駕早旋也雍正二年錢陳羣上青海平定鐃歌曰麋之窮賊母俘屈羣醜三章乾隆八年沈德潛上謁陵慶成樂府曰聖大孝發鑾輅盛京樂謁三陵懷祖烈禮成宴羣蕃朝大狩閲永錫類六龍回十章萬承蒼亦上帝鑒十章乾隆十四年梁詩正上平定金川雅有繹五章美出師也戎車四章翦二豎也繁雲五章番酋降也鸞鑣五章告成功也夢麟亦上聖武遠揚雅一篇乾隆四十二年程景伊上平定兩金川雅四篇曰苞蘖十章纘拉肇釁按旅徂征遂平之也寅威七章索諾木納我叛人守險拒命簡師濟師審戎機以摧堅鋭也周陸十章師武臣力克承睿策悉俘羣醜武功成也凱懌十章聖武既昭行慶秩典申無疆也雍容揄揚第羣臣之嘉頌雖未頒樂官而掌固有可紀者附見於末云
