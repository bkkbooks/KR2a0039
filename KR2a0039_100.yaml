body:
  text: 清史稿卷一百志七十五樂七樂章五鐃歌大樂鐃歌清樂凱歌辭巡幸鐃歌大樂二十八章乾隆七年定大清朝第一大清朝景運隆肇興俄𩽆奄有大東鵲銜果神靈首出一戎衣龍起雲從一解雷動奏膚功舉松山拔杏山如捲秋蓬天開長白雲地蹙凌河凍混車書山河一統聲靈四訖萬國來修貢二解皇宅中垂統瓜瓞唪唪聖繼聖功德兼隆升平頌怙冒如天恩澤濃三解人壽年豐時雍風動荷天之寵慶宸遊六龍早駕一𩽆紅雲奉扈宸遊六師從幸萬里歡聲共四解四時仗第二御句芒春載陽震位峙東方順時令駕蒼龍驂吉良見垂虹青蓱漸芳行慶施惠恩波浩蕩一解御祝融晷正長南極星輝朗駕朱輅萬騎騰驤贊俊傑遂賢良二解蓐收節露華初降金風乍涼兌列西方載白旗乘戎輅移天仗萬寶告成一人有慶天垂貺三解顓帝司方水泉始涸天際彩虹藏乘元輅駕鐵驪雲衢滉漾萬疊明霞奉太陽四時節物邀歡賞四解皇謨聖德欽無兩舜日光天壤花明綵仗齊雲暖龍旗揚際昌時咸翹企仙輿降際昌時咸翹企仙輿降五解承天眷第三承天眷際風雲萬國車書奉一人衣冠快睹唐虞盛九域抒丹悃殊荒重譯盡來庭和氣召嘉禎一解稽古訓溯昌辰元首明哉勵股肱一心敬怠丹書警宵旰不遑寧日新又日憲湯銘翼翼更欽欽二解端不為繁華麗錦繡春端不為玉樹菁蔥太液澄喜今日調和玉燭烽烟靖不敢忘百年有備軍容整那辭得陳師鞠旅擁旄旌皇衷切憂盛更危明三解泰階奕奕璣衡正功業麟兮炳千春清晏歌億載登豐慶喜金支紛旖旎蓬山境喜金支紛旖旎蓬山境四解貢琛球第四琛球輸貢外藩歸化隸版圖正朔咸尊奉樂浪郡在海東安南國粵嶠闢蠶叢日本國畏威震悚琉球國奉朝請與內臣同一解萬邦虎拜咸修貢干羽何須用東風入律吹干呂青雲涌海安瀾更上獻河清頌海安瀾更上獻河清頌二解錦繡乾坤第五錦繡乾坤佳麗御世立綱陳紀四朝輯瑞徵師濟盼皇畿雲開雉扇移黎民引領鑾輿至安堵村村揚酒旗恬熙御爐中靉靆瑞烟霏恬熙御爐中靉靆瑞烟霏一解鸞聲嘒嘒來雲際九奏韶鈞沸觀光仰赤球扈從盈朱芾奉皇歡晝三接天顏喜奉皇歡晝三接天顏喜二解中天盛世第六中天盛世鬯安寧瑞麥嘉禾表歲成騶虞白象出郊坰共祝吾皇聖嵩嶽欣傳萬歲聲蔥蘢佳氣滿都城萬里皇圖鞏帝京衣冠文物際時亨海隅寧謐無邊警巷舞衢歌樂太平喜今日金甌一統萬年清遍閭閻操縵歌風絃誦興更郊原野蠶成繭柘陰輕一解時和歲稔調金鼎鳳扆花相映青疇麥兩歧黃隴禾同穎屬車臨喜萬歲聲遙應屬車臨喜萬歲聲遙應二解奉宸歡第七奉宸歡天單厚風光輦路浮遐阡邇陌都是黃雲覆羽蓋春旗斒似繡正田家作苦勸耕時休馳驟金鐙鞭敲豹尾懸車後藏富於民於民藏富晴開五雲第八晴開五雲移翠輦臣庶咸歡忭載見兮載見懷遠復懷遠聖人朝縵雲歌復旦一解際中天一氣鴻鈞轉習習和風扇龍津燕影低柳陌鶯聲囀望龍旌迢遞過晴巘望龍旌迢遞過晴巘二解瑞雲籠第九綵仗瑞雲籠度晴巒幾重金爐高擁香烟浮動杳靄大夫松和鸞到處和鸞到處百靈從玉檢金泥編珠育貺不數漢家封駕六龍第十駕六龍御翠華帝德光天下薄海內總一家四徼外正朔加者聲靈赫濯被四表暨荒遐扈翠華第十一扈翠華兮載馳御帝車兮載脂命風伯兮叱雲師灑道兮如絲清飈兮應時四時念第十二仲春時司馬教振旅喜韶和緑荑芳草滋平楚執鐃執鐸兼賁鼓盤旋處如組還如舞一解念春日萬彙初榮膴況田家負耒牽牛方作苦解罝去絡仍弛罟天心祐應節彌甘二解仲夏時司馬教茇舍暢恢台銛蘆茂草披平野名州名邑驅征馬行圍罷落日征袍卸三解念夏日赤輪炎似炙況我民體足霑塗泥沒踝櫛風沐雨無晨夜休嚴駕沖默居臺榭四解仲秋時司馬教治兵喜颯爽金風初徑角弓鳴載旗載旐孑旜旌戢軍營萬寶正秋成五解念秋日氣爽又風清況郊原農事方終稼既成用遵周禮詰戎兵望龍旌壺漿父老迎六解仲冬時司馬教大閲正平郊獸肥草淺寒威冽建旗樹表疏行列多歡悅誰道裘如鐵七解念冬日一陽初動脈況南郊陶匏明水將誠潔草甲方萌芽未茁居金闕萬國來朝謁八解壯軍容第十三壯軍容威四方礪戈矛森甲仗剖文犀七屬爛如銀帶鮫函璀璨難名狀者的是金城保障一解有純鉤巨闕和盤郢魚腸更有湛盧紫電承影含光又豪曹似水素質如霜賽莫邪干將二解官笴最精良象弭魚服竹箭弧桑更紅翎白鏃飲羽危梁控弦徹札有猿臂軍中飛將三解潤銛鋒鵜初瑩鎔堇錫龍雀成雙文似靈龜象侔白虎是靈寶亦曰含章比昆吾切玉百鍊純鋼四解垂氏弦木檿弧斯創冬幹春膠烏號繁弱明月當堋朗九合既成二弓交韔五解振金鐃鳴金鐲畫角悠揚月明時風靜夜清吹還三唱踴躍軍心壯似鳳鳴又如鶴唳更籌響刁斗傳千帳六解表和門旌旆揚象七星建九斿置九章錯翡翠鸞鳳煒煌曳招搖韜素錦黃龍大纛在中央七解鏤衢鞍翠羽蹙金梁珊瑚鞭瑪瑙勒靡麗非常啓譁囂盛朝不尚但推轂求良將雲行雷動正正堂堂八解日初升第十四日初升雲光曉旌旗暖龍鱗耀望雲山紫翠千重度耕隴桑麻隱約黎民歡樂道餘糧棲畝又長嘉苗一解不讀書知忠孝作與息耕和鑿玉泉流膏雨千塍晴雲斂炊烟萬竈黎民歡樂道餘糧棲畝又長嘉苗二解景融怡風料峭太和會豐年兆嗿其饁士女媚依鎛斯趙曾孫迎勞黎民歡樂道餘糧棲畝又長嘉苗三解食君恩深難報願聖壽如山嶽稼既同跂腳高眠戶不閉官清訟少黎民歡樂道餘糧棲畝又長嘉苗四解翠華臨霓旌導遵平陸登山嶠但只見蔀屋衡茅一個個體溫腹飽不知不識日上眠方覺惟祝君王真有道厪痌薄賦輕徭敷教澤愛親敬老黎民歡樂道餘糧棲畝又長嘉苗道餘糧棲畝又長嘉苗五解嘉祥曲第十五溯嘉祥華平朱草育中唐龍圖授龜書畀擾澤馬駕騰黃延喜玉從天貺屈軼草階前長一解睹榮光白麟赤雁與芝房游河渚赤文緑字舒蘭葉五色成章仙蓂葉葉滋春圃瑞羽鏘鏘鳴女牀亦有祥麟一角和鳴鳳在高岡二解日重光戴冠抱珥出扶桑月重輝星重潤玉繩轉南極熒煌竹葦露甘如釀蒲風如秋爽三解舞鸞凰非烟樓閣繡衣裳寶鼎見騶虞出浮沆瀣泛天漿稽往牒探珊網陳瑞物難名狀四解惟我皇不矜異物與殊祥闢四門明四目求俊乂顯賢良愛稼穡垂旒纊措吾民春臺上五解練吉日第十六練吉日兮撰佳辰百僚具兮輿衛陳屏翳弭節兮玉宇無塵煌煌兮斗車奕奕兮天輪一解命太常兮奉牲用昭告兮百神潔粢盛兮肅明禋將展軨兮效駕行下觀兮勤民二解甸師清畿兮縟草如茵野廬歸路兮香霧承輪封人設枑兮左槭右平掌舍具儀兮爰象太宸玉輦兮鏘鏘屬車兮隱轔三解扇微颸兮清幰扈細靄兮朱輪備天官兮周衛盛輿服兮時巡虎賁兮肅肅徒旅兮侁侁四解前驅兮按部後隊兮如鱗徵萬玉兮警途詔弭策兮入神五解軼浮景兮騰青霄駟蒼螭兮驂絶塵陵高衍兮嵱嵷陟巒阜兮輪囷六解仰皇輿兮肅震嶽獻圖兮川貢珍若湛露之晞朝陽兮儼列宿之拱北辰七解蔭華蓋兮翊勾陳綃紈綷兮旟旐逡巡配帝居之元圃兮象太乙之威神八解旖旎兮霓旌八方兮列陳表朱兮離位植皂兮元冥飛縞兮象兌峙青兮直震九解流星旄而電屬兮盼坱圠以無垠九旗紛而揚旆兮五輅委蛇以接軫盛天下之壯觀兮將豐鎬之是遵頌高山之荒作兮仰一人之饗親十解謁珠丘第十七謁珠丘杳靄松楸展几筵敬仰先猷國家積纍惟忠厚篤公劉一解緬音容霜露春秋設綴衣大貝天球愾聞僾見如親覯溯前庥二解奉犧尊旨酒思柔覲羹牆蘋藻初羞萬方玉食尊親久無須效漢代衣冠月出游三解寢園展祀尊堂構文謨武烈光前後蔥蘢佳氣浮縹眇祥雲繡億萬載升恆景福從天祐四解高山天作扶輿秀遼海環其右鍾祥瑞氣蟠翊運靈光茂萬斯年永奠定天同壽萬斯年永奠定天同壽五解御黼座第十八御黼座肅朝儀沛宮法駕陳元會雲深處天門詄蕩太極崔巍一解九賓設彤闈啓扶桑初擁曈曨日傳臚句羣僚濟濟百辟師師盡呼嵩冠帶委蛇二解獻琛球圖王會呼韓稽顙瞻雲日無中外雕題鑿齒烏弋黃支慶躬逢盛世威儀三解中天華闕浮佳氣締造經營萬載基世德念豳岐天澤陳冠履看到處祥颸暗靄羽蓋葳蕤看到處祥颸暗靄羽蓋葳蕤四解長白山第十九長白山遠峙開原冠高峯峻極于天巉巖兮插漢千里兮巑岏一解考山經曾傳不咸稽地志亦號商堅唐名兮太白有潭兮在顛二解闥門潭萬頃回湍鼓天風灩文瀾源深兮流廣三江兮出焉三解鴨緑江流自山南混同江北海之源愛滹兮東注萬折兮千盤四解醫無閭縹眇雲端桃花洞下有飛泉嚴冬兮不冰常燠兮無寒五解木葉山石磴盤桓華表山鶴影蹁躚乳峰兮懸溜井冽兮寒泉六解石門溪屹立巖前儼雙扉雲壑連綿回合兮諸峯窈窕兮羣巒七解松花江波影澄鮮北流兮並海西旋混同兮合流自古兮長川八解遼河兮泙湃狂瀾遼澤兮泥淖蹣跚布土兮為橋既成兮孔安九解飛瀑巖瀑布常懸翠雲屏雲影連蜷聖水兮傾盆萬松兮晝寒十解平壤城箕子名藩大寧城漢曰新安演範兮陳疇帶礪兮河山十一解鍾扶輿虎踞龍蟠植靈基天作高山拱衛兮陪京永奠兮萬年十二解布爾湖第二十布爾湖明如鏡庫里山秀列雲屏風來千頃碧雨過數峯青萃扶輿淑氣是天地鍾靈一解有天女兮降生池畔吞朱果兮玉質晶瑩珍符吻合爰生聖二解神靈始生即能言睿知聰明不待學徇齊敦敏至德莫能名三解日角珠庭稽古帝握褒履己更龍顏戴干荷勝岐嶷總天生四解當是時厥有三姓角雌雄亂靡有定蠻觸互相爭五解汲清泉言至河濱見真人如日如雲稽首共來迎六解睹堯眉衆姓咸驚是非常天不虛生葵藿早輸誠七解念吾曹原非好爭今有主得荷生成從此戢戎兵八解定三姓尊為貝勒似岐州虞芮質成荒度始經營九解溯從來誕聖厥多瑞徵華胥履迹青雲繞身樞星照野虹流太清瑤光貫月玄鳥承罌載稽典籍辭難罄肆皇清至人首出乾坤篤生自羲昊軒農瑞籙祥經莫與京十解建遼陽第二十一建遼陽爰築崇墉矗金城兮萬雉控列辟兮朝宗遠邇兮歸懷庶邦兮是同一解懾天威爭執鞭弭歌孔邇願受帡幪興朝正朔咸尊奉遂荒大東二解有哈達首鼠兩端數渝盟自外陶鎔天兵一舉咸驚悚似草從風三解有輝發反覆不常外生成夜郎自雄六師迅發如雷動棄甲投弓四解有烏拉包藏禍心逞螳臂欲試車衝戈鋋一指雕弧控似掃蚍蠓五解有葉赫憑陵負嵎似游鱗翔洋釜中狡焉潛結朝鮮衆朝夕羽書通六解有朝鮮僻處海濱與葉赫狼狽交通蛩蛩甘草相承奉結壘似屯蜂七解閔明季陽九方丁如懸磬杼柚其空朝鮮葉赫相愚弄勢蹙不知窮八解四路兵犄角來侵無紀律誰適為雄一時烏合無拳勇號令馬牛風九解五十萬封豕長蛇肆貪狼非不恟恟止緣逐利非心奉臨事各西東十解恣侵陵師出無名我天朝用詰兵戎堂堂八陳天威聳落葉掃秋風十一解一戎衣為救黎元曾不費蒿矢桃弓遼陽建後金湯鞏王業首岐豐十二解瀋陽城第二十二瀋陽城王氣所鍾氤氳五彩縹渺如龍信佳哉鬱鬱蔥蔥一解析木津箕尾之東上連天辨右抱神宮濟津梁霄漢垂虹二解近北極象逼穹窿玄菟置郡都護安東越金元頻建畿封三解我皇朝氣運方隆此惟與宅用恢厥功相陰陽宅土之中四解維廣寧屹屹崇墉石梯連磴香水春溶十八盤萬樹青松五解若旅順臨海居衝番彝麕集估舶雲從轉南漕天庾斯充六解取廣寧脣