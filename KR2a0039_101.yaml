body:
  text: 清史稿卷一百一志七十六樂八清代樂制有中和韶樂丹陛大樂中和清樂丹陛清樂導迎樂鐃歌樂禾辭桑歌樂慶神歡樂宴樂賜宴樂鄉樂器則隨所用而各異悉依樂部次第臚列而備舉之所獲藩屬樂器列於宴樂古所未詳尤不可略然第志其名稱形制而已若夫尺度聲律則有司存中和韶樂用於壇廟者鎛鐘一特磬一編鐘十六編磬十六建鼓一箎六排簫二塤二簫十笛十琴十瑟四笙十搏拊二柷一敔一麾一先師廟琴簫笛笙各六箎四餘同巡幸祭方嶽不用鎛鐘特磬琴簫笛笙各四瑟箎各二餘同用於殿陛者簫四笛四箎二琴四瑟二笙八餘同鎛鐘笵金為之凡十二應十二律其制皆上徑小下徑大縱徑大橫徑小乳三十六兩角下垂十二鐘各虡大小異制黃鍾之鐘兩欒高一尺八寸二分二釐甬長一尺零八分以次遞減至應鍾之鐘兩欒高九寸六分甬長五寸六分八釐黃鍾之鐘十一月用之大呂之鐘十二月用之太簇之鐘正月用之夾鍾之鐘二月用之姑洗之鐘三月用之仲呂之鐘四月用之蕤賓之鐘五月用之林鍾之鐘六月用之夷則之鐘七月用之南呂之鐘八月用之無射之鐘九月用之應鍾之鐘十月用之鐘之簨虡凡四皆塗金上簨左右刻龍首脊樹金鸞咮銜五采流蘇龍口亦如之下垂至趺中簨有業鏤雲龍附簨結黃絨紃以懸鐘左右兩虡承以五采伏獅下為趺趺上有垣鏤山水形黃鍾大呂太簇三虡尺度同夾鍾姑洗仲呂三虡尺度同蕤賓林鍾夷則三虡尺度同南呂無射應鍾三虡尺度同用時不並陳如以黃鍾為宮則祗懸黃鍾之鐘餘月倣此特磬以和闐玉為之凡十二應十二律其制為鈍角矩形長股謂之鼓短股謂之股皆兩面為雲龍形穿孔繫紃而懸之十二磬各虡大小異制黃鍾之磬股長一尺四寸五分八釐鼓長二尺一寸八分七釐以次遞減至應鍾之磬股長七寸六分八釐鼓長一尺一寸五分二釐愈小者質愈厚黃鍾之磬厚七分二釐九豪遞增至應鍾之磬厚一寸二分九釐六豪黃鍾之磬十一月用之大呂之磬十二月用之太簇之磬正月用之夾鍾之磬二月用之姑洗之磬三月用之仲呂之磬四月用之蕤賓之磬五月用之林鍾之磬六月用之夷則之磬七月用之南呂之磬八月用之無射之磬九月用之應鍾之磬十月用之磬之簨虡亦四惟上簨左右刻鳳首趺飾臥鳧白羽朱喙十二磬不並陳當月則懸其一與鎛鐘同編鐘笵金為之十六鐘同虡應十二正律四倍律夷則南呂無射應鍾各有倍律陰陽各八外形橢圓大小同制惟內高內徑容積各不同實體之薄厚以次遞增第一倍夷則之鐘體厚一分三釐三豪至第十六應鍾之鐘體厚二分八釐四豪簨虡塗金上簨左右刻龍首中下二簨俱刻𩽆雲繫金鉤懸鐘兩虡承以五采伏獅下為趺鏤山水形編磬以靈壁石或碧玉為之十六磬同虡應十二正律四倍律與編鐘同陰陽各八皆為鈍角矩形大小同制股長七寸二分九釐鼓長一尺九分三釐五豪惟實體之薄厚以次遞增第一倍夷則之磬厚六分六豪八絲至第十六應鍾之磬厚一寸二分九釐六豪簨虡制同編鐘惟上簨左右刻鳳首趺飾臥鳧白羽朱喙建鼓木匡冒革貫以柱而樹之面徑二尺三寸四釐匡長三尺四寸五分七釐匡半穿方孔貫柱上出擎蓋下植至趺蓋上穹下方頂塗金上植金鸞為飾承鼓以曲木四歧抱匡趺四足各飾臥獅擊以雙桴直柄圓首凡鼓桴皆如之箎二皆截竹為質間纏以絲橫吹之一孔上出為吹口五孔外出一孔內出又二孔並間下出為出音孔管末有底中開一孔吹孔上留竹節以閉音一姑洗箎徑八分七釐自吹口至管末九寸九分五釐九豪陽月用之一仲呂箎徑八分三釐二豪自吹口至管末九寸五分二釐五豪陰月用之排簫比竹為之其形參差象鳳翼十六管陰陽各八同徑殊長上開山口單吹之無旁出孔自左而右列二倍律夷則無射六正律以協陽均自右而左列二倍呂南呂應鍾六正呂以協陰均管面各鐫律呂名納於一櫝而齊其吹口櫝用木形如几虛其中以受管塤有二燒土為之形皆橢圓如鵝子上鋭下平前四孔後二孔頂上一孔以手捧而吹之一黃鍾塤內高二寸二分三釐腹徑一寸七分一釐七豪底徑一寸一分六釐八豪陽月用之一大呂塤內高二寸一分三釐三豪腹徑一寸六分四釐二豪底徑一寸一分一釐七豪陰月用之簫二截竹為之皆上開山口五孔前出一孔後出出音孔二相對旁出一姑洗簫徑四分三釐五豪自山口至出音孔長一尺五寸八分四釐二豪陽月用之一仲呂簫徑四分一釐六豪自山口至出音孔長一尺五寸一分五釐二豪陰月用之笛二截竹為之皆間纏以絲兩端加龍首龍尾左一孔另吹孔次孔加竹膜右六孔皆上出出音孔二相對旁出末二孔亦上出一姑洗笛徑四分三釐五豪自吹孔右盡通長一尺二寸五分一釐七豪陽月用之一仲呂笛徑四分一釐六豪自吹孔右盡通長一尺一寸九分七釐二豪陰月用之琴面用桐底用梓以漆前廣後狹上圓下方中虛通長三尺一寸五分九釐底孔二上曰龍池下曰鳳池腹內有天地二柱天柱圓當肩下地柱方當腰上凡七絃皆朱第一絃一百八綸第二絃九十六綸第三絃八十一綸第四絃七十二綸第五絃六十四綸第六絃五十四綸第七絃四十八綸軫七徽十三其飾嶽山焦尾用紫檀徽用螺蚌軫結黃絨紃承以漆几瑟體用桐以漆前廣後狹面圓底平中高兩端俯通長六尺五寸六分一釐底孔二是為越前越四出後越上圓下平凡二十五絃絃皆二百四十三綸中一絃黃兩旁皆朱設柱和絃柱無定位各隨宮調絃孔飾螺蚌承以金几二笙二截紫竹為管環植匏中匏或以木代之管皆十七束以竹本豐末斂管本近底削半露竅以薄銅葉為簧點以蠟珠其上各按律呂分開出音孔匏之半施橢圓短嘴昂其末中為方孔別為長嘴如鳳頸置於短嘴方孔中末為吹口氣從吹口入鼓簧成音小笙制如大笙而小亦十七管惟第一第九第十六第十七管不設簧有簧者凡十三管餘均與大笙同搏拊如鼓而小面徑七寸二分九釐匡長一尺四寸五分八釐匡上施金盤龍二銜小金鐶以黃絨紃繫之橫置趺上用時懸於項擊以左右手每建鼓一擊則搏拊兩擊以為節柷以木為之形如方斗上廣下狹三面正中各隆起為圓形以受擊一面中為圓孔以出音以趺承之擊具曰止敔以木為之形如伏虎背上有二十七齟齬刻以趺承之鼓之以籈以竹為之析其半為二十四莖於齟齬上橫轢之麾黃帛為之繡九曲雲龍上飾藍帛繡紅日日中繡中和字上繡三台星左北斗右南斗帛上下施橫木上鏤雙龍下為山水形皆金朱杠上曲為龍首以懸麾麾舉樂作麾偃樂止丹陛大樂凡御殿受賀及宮中行禮皆用之其器戲竹二大鼓二方響二雲鑼二簫二管四笛四笙四杖鼓一拍板一簫笛笙同中和韶樂戲竹析竹為之凡二各五十莖朱承以塗金壺盧下有柄亦朱人各執其一立丹陛上合則樂作分則樂止戲音與麾同其用亦與麾同大鼓木匡冒革面徑三尺六寸四分五釐匡高三尺二寸四分腹施銅膽面黃繪五采雲龍匡朱繪交龍匡半金鐶四承以朱架架有鉤以鉤鐶平懸之架高六尺鼓者藉蹈以擊之方響以鋼為之形長方十六枚同虡應十二正律四倍律與編鐘磬同形質皆同惟以薄厚為次倍夷則之厚三分三豪四絲遞增至應鍾之厚六分四釐八豪後面近上三分之一皆為橫脊竅其上端繫以黃絨紃懸於虡而斜倚之擊以小鋼槌各部樂皆同惟馬上凱歌樂分用其八人各一枚擎而擊之雲鑼笵銅為之十枚同架應四正律六半律姑洗蕤賓夷則無射四正律半黃鍾至半無射六半律皆四旁穿竅以黃絨紃繫於架中四左右各三合三行為九宮形其一上出以薄厚為次下右應姑洗之律厚二釐五豪二絲遞增至最上應半無射之律厚五釐九豪八絲管即頭管以堅木或骨角為之大小各一皆前七孔後一孔管端設蘆哨入管吹之大管以姑洗律管為體徑二分七釐四豪哨下口至末長五寸七分六釐小管以黃鍾半積同形管為體徑二分一釐七豪哨下口至末長五寸六分二豪皆間束以絲兩端以象牙為飾杖鼓上下二面鐵圈冒革復楦以木匡細腰匡高一尺九寸四分四釐腰徑二寸八分八釐兩端徑各八寸一分上下面徑各一尺二寸九分六釐面匡俱黃繪五采雲龍緣以緑皮掩錢上下邊綴金鉤各六以黃絨紃交絡之腰加束焉腰飾緑皮焦葉文以朱竹片擊之拍板以堅木為之左右各三片近上橫穿二孔以黃絨紃聯之合擊以為節中和清樂用於册尊典禮宴饗進饌除夕元夕張燈亦用之其器雲鑼二笛二管二笙二杖鼓一手鼓一拍板一笛笙同中和韶樂雲鑼管板同丹陛大樂杖鼓同丹陛大樂而小或半之或為三之二手鼓木匡冒革面徑九寸一分二豪腰徑一尺二分四釐以柄貫匡持而擊之丹陛清樂用於宴饗進茶進酒臨雍賜茶亦用之樂器均與中和清樂同導迎樂鐃歌樂用於乘輿出入鑾駕鹵簿則奏導迎樂騎駕鹵簿則奏鐃歌之行幸樂法駕鹵簿大駕鹵簿則導迎樂間以鐃歌樂惟大祀詣壇廟則導迎樂鐃歌樂設而不作凡三大節進表及進實録聖訓玉牒又親耕親蠶授時頒詔殿試送榜迎吻凡前導以御仗出入者皆奏導迎樂鐃歌之樂有鹵簿樂其部一曰鐃歌鼓吹有前部樂其部一曰前部大樂亦曰大罕波有行幸樂其部三曰鳴角曰鐃歌大樂曰鐃歌清樂有凱旋樂其部二曰鐃歌曰凱歌鹵簿樂與前部大樂並列亦曰金鼓鐃歌大樂凡圜丘祈穀常雩用大駕鹵簿則前部大樂鐃歌鼓吹行幸樂三部並陳方澤用法駕鹵簿則陳前部大樂鐃歌鼓吹太廟社稷及各中祀用法駕鹵簿則陳鐃歌鼓吹朝會用法駕鹵簿同御樓受俘用法駕鹵簿則陳金鼓鐃歌大樂巡幸及大閲用騎駕鹵簿則陳鳴角鐃歌大樂鐃歌清樂凱旋郊勞則奏鐃歌回鑾振旅則奏凱歌導迎樂用戲竹二管六笛四笙二雲鑼二導迎鼓一拍板一笙笛同中和韶樂戲竹雲鑼管板同丹陛大樂導迎鼓制如大鼓而小面徑二尺四分八釐匡高一尺六寸二分繪五采雲龍腹施銅膽旁施金鐶四繫黃絨紃二人舁行擊以朱槌鐃歌鼓吹用龍鼓四十八畫角二十四大銅角八小銅角八金二鉦四笛十二杖鼓四拍板四笛同中和韶樂板同丹陛大樂龍鼓木匡冒革面徑一尺五寸三分六釐匡高六寸四分八釐面匡繪飾金鐶俱如導迎鼓鐶繫黃絨紃行則懸於項陳則置於架架攢竹三貫以樞而搘之畫角木質中虛腹廣兩端鋭長五尺四寸六分一釐二豪上下束以銅中束以藤五就以漆以木哨入角端吹之哨長七寸二分九釐大銅角一名大號笵銅為之上下二截形如竹筒本細末大中為圓球納上截於下截用則引而伸之通長三尺六寸七分二釐小銅角一名二號笵銅為之上下二截上截直下截哆各有圓球相銜引納如大銅角通長四尺一寸四釐大角體巨聲下小角體細聲高不以長短論金笵銅為之面平徑一尺四寸五分八釐深二寸二分七釐五豪旁穿二孔結黃絨紃貫於木柄提而擊之鉦笵銅為之形如槃面平口徑八寸六分四釐深一寸二分九釐八豪邊闊八分六釐四豪穿六孔兩兩相比周以木匡亦穿孔以黃絨紃聯屬之左右銅鐶二繫黃絨紃懸於項而擊之杖鼓同丹陛大樂惟面繪流雲中為太極前部大樂用大銅角四小銅角四金口角四大銅角小銅角制同鐃歌鼓吹金口角舊名瑣木管兩端金口上弇下哆管長九寸八分九釐管上金口長二寸一分六釐為壺盧形加小銅槃二管下金口長四寸八分六釐刻管如竹節相間前七孔後一孔以蘆哨入管端吹之鐃歌大樂用金口角八銅鼓二銅點一金一鈸一行鼓一金口角同前部大