鑿空納絃四軸綰之俱在右絃自山口至柱長一尺七寸七分四釐拍板紫檀三片束其二以一拍之高宗平定回部獲其樂列於宴樂之末是為回部樂技用達卜一那噶喇一哈爾札克一喀爾奈一塞他爾一喇巴卜一巴拉滿一蘇爾奈一達卜木匡冒革形如手鼓而無柄有大小二制一面徑一尺三寸六分五釐二豪一面徑一尺二寸二分四釐皆黃面繪綵獅以手指擊之那噶喇鐵匡冒革上大下小形如行鼓旁有小鐶繫黃絨紃兩鼓相聯左右各以杖擊之哈爾札克形如胡琴椰槽冒以馬革上木柄下鐵柄槽底中開一孔側開三小孔以馬尾二縷為絃上自山口穿於後以兩軸綰之左右各一下繫鐵柄馬尾絃下設鋼絲絃十上繫木柄下擊鐵柄左右各五軸另以木桿為弓繫馬尾八十餘莖軋馬尾絃應鋼絃取聲喀爾奈狀如世俗洋琴鋼絲絃十八刳木中虛左直右曲左設梁如琴之嶽山以繫鋼絃之本鋼絃之末施木軸似琴之軫入於右端高下相間作兩層轉其軸以定絃之緩急以手冒撥指或木撥彈之通體雙弦惟第一獨絃塞他爾形如匕絲絃二綱絃七木柄通槽下冒以革面平背圓柄有線箍二十三道如琵琶之品以九軸綰絃柄端二軸綰絲絃二面三軸左側四軸綰鋼質雙絃一獨絃六以手冒撥指或木撥彈絲絃應鋼絃取聲喇巴卜絲絃五鋼絃二木柄通槽槽形如半瓶下冒以革曲首鑿空納絲絃以五軸綰之左二右三曲首右側以兩軸綰綱絃用手冒撥指或木撥彈絲絃應綱絃取聲巴拉滿木管上斂下哆飾以銅形如頭管而有底開小孔以出音管通長九寸四分七孔前出一孔後出管上設蘆哨吹之蘇爾奈一名瑣木管兩端飾銅上斂下哆形如金口角而小七孔前出一孔後出一孔左出銅管上設蘆哨吹之高宗平定金川獲其樂及後藏班禪額爾德尼來朝獻其樂均列於宴樂之末是為番子樂金川之樂曰阿爾薩蘭曰大郭莊曰四角魯用得梨一柏且爾一得勒窩一得梨似蘇爾奈而小柏且爾笵銅二片圓徑六寸中隆起穿孔貫紃左右合擊得勒窩形似達卜班禪之樂曰札什倫布用得梨二巴汪一蒼清一龍思馬爾得勒窩四得梨同金川樂形制略大巴汪似喇巴卜七絃蒼清制同雲鑼龍思馬爾得勒窩似那噶喇而制以銅面徑一尺三寸底鋭匡高一尺高宗平定廓爾喀獲其樂列於宴樂之末是為廓爾喀樂舞用達布拉一薩朗濟三丹布拉一達拉一公古哩二達布拉似那噶喇一面冒革有二制其一面豐底鋭其一底微豐而漸削四圍俱繫韋縧聯以綵縷懸之腰間以左右手合擊之薩朗濟刻木為質韋絃四鐵絃九項長三寸刳其中面以魚牙刻佛為飾柄長五寸二分槽面闊三寸自上刳之冒以革中腰削如缺月束以黃韋底橢鑿空於項以納韋絃左右各二軸柄面穿孔九自右至左鱗次斜列各納鐵絃軸九俱在右上五下四槽面設柱中為九孔納鐵絃上承韋絃以柔木繫馬尾軋韋絃應鐵絃取聲丹布拉刻桐為質以大匏為槽直柄面平背圓鐵絃四綰以四軸上二左右各一柄上以鐵片二為山口一穿孔納絃一承絃達拉笵銅二片圓徑二寸一分中隆起穿孔繫以綵縷左右合擊公古哩笵銅為鈴以綵縷聯之五十枚為一串凡四串歌時二人各繫於股雙足騰躍以出聲乾隆五十三年緬甸國內附獻其樂列於宴樂之末是為緬甸國樂有粗細二制粗緬甸樂用接內搭兜呼一稽灣斜枯一聶兜薑一聶聶兜薑一結莽聶兜布一接內搭兜呼木匡冒革匡上有紐繫以帛橫懸於項以手擊之稽灣斜枯制似雲鑼其數八上下各四同懸於架架後搘以二木斜倚而擊之聶兜薑木管銅口近下漸哆前七孔後一孔管端設銅哨加蘆哨於上管與銅口相接處以銅簽掩之聶聶兜薑形如金口角而小木管木口餘與聶兜薑同結莽聶兜布笵銅二片圓徑三寸五分中隆起穿孔貫以韋左右合擊細緬甸樂用巴打拉一蚌札一總稿機一密穹總一得約總一不壘一接足一巴打拉以木為槽形如船通長二尺七寸五分前後兩端各為山峯形兩峯之尖絡以絲繩排穿竹板二十二片皆闊一寸第一片長五寸二分厚三分五釐以次則長遞加而厚遞減至末片則長一尺一寸五分厚一分以竹裹綿為槌擊之蚌札木匡冒革上大下小面徑六寸一分底徑四寸匡高一尺四圍俱繫韋縧以手擊之總稿機十三絃曲柄通槽柄上曲如蝎尾槽面冒革為四圓孔以出音順槽腹設覆手穿孔十三繫絃各斜引至柄束之彈以手密穹總三絃木質為魚形體長方腹下通長刳槽無底兩旁鐫鱗甲面設品五為小圓孔九以出音前四中四後一首形鋭而上出鐫鬚角巨齒圓睛尾形亦鋭項上以銅為山口繫朱絃三尾有鐶納絃旁穿孔設軸左二右一以手彈之得約總三絃木質中虛如扇形中腰兩旁灣曲向內頸半穿孔納絃綰以三軸左二右一槽末施木以繫絃扣用木弓繫馬尾八十餘莖軋之不壘以竹為管上端以木塞其半為吹口七孔前出一孔後出最上一孔前出加竹膜接足笵銅二片口徑一寸八分中隆起穿孔貫紃左右合擊乾隆五十四年獲安南國樂列於宴樂之末是為安南樂舞用丐鼓一丐拍一丐哨一丐彈絃子一丐彈胡琴一丐彈雙韻一丐彈琵琶一丐三音鑼一安南土語凡樂器之名俱以丐字建首丐鼓木匡冒革空其下徑八寸四分承以架用竹桴二或左手承鼓右手以桴擊之丐拍用檀板三其一上端綴以連錢其一背刻雁齒其一右為鋸牙左手執二板相擊連錢激響右手執鋸牙者引擊雁齒錯落成聲丐哨即橫笛截竹為筒漆飾二十一節左第一孔為吹口次加竹膜右六孔末二孔俱上出旁二孔對出兩端飾以角丐彈絃子三絃檀為質槽方而橢兩面冒虺皮匙頭鑿空納絃以三軸綰之左二右一丐彈胡琴二絃竹柄槽形如筒底微豐面冒虺皮曲首鑿空兩軸俱自後穿前綰絃絃自山口至柱長一尺八寸餘如番部合樂胡琴之制丐彈雙韻如月琴四絃檀為質槽面以桐形如滿月徑一尺一寸六分厚一寸八分曲項鑿空納絃綰以四軸左右各二槽面覆手山口下七品俱以檀為之丐彈琵琶四絃刳桐為質通長三尺項上鑿空納絃綰以四軸左右各二上設四象下布十品絃自山口至覆手長二尺一寸四分丐三音鑼笵銅三面綰以鐵圈聯如品字上一徑二寸四分五釐右一徑二寸三分八釐左一徑二寸三分承以檀柄槌用角賜宴樂凡經筵禮畢賜宴文武鄉會試賜宴宴衍聖公宴正一真人皆用之其器雲鑼二笛二管二笙二鼓一拍板一笛笙鼓同中和韶樂雲鑼管板同丹陛大樂鄉樂凡府州縣學春秋釋奠皆用之其器麾一編鐘十六編磬十六琴六瑟二排簫二簫四笛六箎二笙六塤二建鼓一搏拊二柷一敔一制皆同中和韶樂鄉飲酒用雲鑼一方響一琴二瑟一簫四笛四笙四手鼓一拍板一琴瑟簫笛笙同中和韶樂雲鑼方響板同丹陛大樂手鼓同清樂節中和韶樂用結旄九重蓋以金葉束以緑皮朱杠上曲為龍首以銜旄植架於東西各一每架二節司樂者執之以節舞導文舞曰節導武舞曰旌旌亦曰節制與節同千中和韶樂用木質圭首上半繪五采雲龍下繪交龍緣以五色羽文中為粉地朱書雨暘時若四海永清倉箱大有八方敉寧奉三永奠得一為正百神受職萬國來庭凡八語佾各一語干背朱有橫帶二中施曲木武舞生左手執之戚中和韶樂用木質斧形背黑刃白柄朱武舞生右手執之羽中和韶樂用木柄植雉羽銜以塗金龍首柄朱文舞生右手執之籥中和韶樂用六孔竹管朱文舞生左手執之舞有二用於祀神者曰佾舞用於宴饗者曰隊舞凡佾舞武用干戚文用羽籥干戚曰武功之舞羽籥曰文德之舞祭祀初獻以武舞亞獻終獻以文舞惟先師廟文昌廟初獻亞獻終獻皆以文舞焉若大雩則童子十六人衣皂衣持羽翳歌而舞皇舞凡此皆隸於佾舞者也隸於隊舞者初名蟒式舞亦曰瑪克式舞乾隆八年更名慶隆舞內分大小馬護為揚烈舞是為武舞大臣起舞上壽為喜起舞是為文舞是年巡幸盛京筵宴宗室增世德舞十四年平定金川凱旋筵宴又增德勝舞三舞同制各有樂章揚烈舞用戴面具三十二人衣黃畫布者半衣黑羊皮者半跳躍倒擲象異獸騎禺馬者八人介胄弓矢分兩翼上北面一叩興周旋馳逐象八旗一獸受矢羣獸懾伏象武成喜起舞大臣二十二人朝服儀刀入三叩興退東位西嚮立以兩而進舞畢三叩退次隊繼進如前儀此隊舞之大較也外此則有四裔樂舞東曰瓦爾喀曰朝鮮北曰蒙古西曰回曰番曰廓爾喀南曰緬甸曰安南皆同列於宴樂之末瓦爾喀部樂舞司舞八人均服紅雲緞鑲緞花補袍狐皮大帽豫立丹陛之西將作樂進前三叩退司樂八人分兩翼上跪一膝奏瓦爾喀樂曲司舞進舞以兩為隊每隊舞畢三叩退朝鮮國俳笛技管技鼓技各一人均戴氈帽鏤金頂服藍雲緞袍棕色雲緞背心藍綢帶俳長一人戴面具青緞帽紅纓服紅雲緞袍白綢長袖緑雲緞虎補背心十字藍綢帶倒擲技十四人服短紅衣立丹陛兩旁俳長從右翼上北面立以高麗語致辭笛管鼓技從右翼上東北面立倒擲技從左翼上自東向西各呈其藝蒙古樂笳吹司樂器四人司章四人均蟒服立丹陛旁番部合奏司樂器十五人亦均蟒服立丹陛旁與笳吹一班同入一叩跪一膝奏蒙古樂曲回部樂司樂器八人均錦衣絹𩹉雜色紡絲接袖衣錦面布𩹉倭緞緣回回帽青緞鞾緑綢膊司舞二人舞盤二人皆衣靠子錦腰襴紡絲接袖衣倒擲大回子四人皆衣靠子雜色紡絲接袖衣戴五色綢回回小帽小回子二人雜色綢衣絹𩹉皆豫立丹陛下俟朝鮮國俳呈技後上丹陛作樂司舞起舞舞盤人隨舞畢倒擲小回子繼進呈技番子樂金川之阿爾薩蘭司樂器三人司舞三人為戲獅身長七尺披五色毛番名僧格乙引獅者衣雜綵手執繩繫耍球一五色番名僧格乙阿拉喀大郭莊番名大拉噶地司舞十人每兩人相攜而舞一服蟒服戴翎挂珠斜披黃藍二帶交如十字一服藍袍挂珠斜披黃紫二帶交如十字四角魯番名得勒布司舞六人戴舞盔番名達帽插雞翎各六番名達莫乙背縛藤牌番名賽斯丹帶繫腰刀番名江格乙左執弓番名得木尼也右執箭壺番名柏拉盛箭五枝番名格必乙相對而舞班禪之札什倫布番名柏拉噶司樂器六人司舞番童十人各披長帶手執斧一番名沙勒鱉舞而歌梵曲廓爾喀樂舞司樂器六人均衣回子衣著紅羊皮鞾內二人纏頭以洋錦餘皆以紅緑布司歌五人均以紅緑布纏頭內一人衣緑綢衣著紅綵履餘皆回子衣紅羊皮鞾司舞二人均衣紅緑綢衣戴猩紅氈帽金銀絲巾著紅綵履束腰皆用雜色布舞者每足各繫銅鈴一串曰公古哩騰躍出聲歌舞並奏粗緬甸樂司樂器五人司歌六人均拖髮扎紅用緬甸衣冠細緬甸樂司樂器七人均拖髮扎紅衣藍緞短衣司舞四人衣閃緞短衣皆雜色裙以洋錦束腰戴扎巾歌合以粗樂舞合以細樂安南國樂司樂器九人均戴道巾衣黃鸝補服道袍藍緞帶司舞四人衣蟒衣冠帶與司器同執綵扇而舞
