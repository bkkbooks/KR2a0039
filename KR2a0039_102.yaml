body:
  text: 清史稿卷一百二志七十七輿服一皇帝五輅皇帝輦輿皇后輿車皇太后輿車附皇貴妃以下輿車親王以下輿車親王福晉以下輿車京外職官輿車庶民附命婦輿車自虞廷𧃡繢制創垂衣車服之朌式昭庸典夏絻殷輅文質異觀迄乎有周監於二代巾車典路司服司常各隸專官禮明物備秦漢以降代有異同品數彌繁曩篇具載明初木輅乃用於郊崇朴去雕亦有足尚清之太祖肇起東陲遠略是勤戎衣在御太宗纘服遂定遼都天聰六年已命禮官考定儀衛並因易服蔑祖之弊鑒及金元國俗衣冠一沿舊式勿忘數典昭示雲礽世祖入關撫有中夏武功耆定文物寖昌康雍兩朝續有制作朝章國采斯已粲然亦越高宗衣聞克紹治承熙洽嚮用儒臣館闢三通籀文緝五輅之數改符周官參古準今圖詳禮器遂於乘御增定已多一代儀文於斯為盛自時厥後上下相承率蹈前規尚無侈改載稽諸制爰志斯篇鹵簿一門迾從附著光宣之際海陸軍興旗式服章舊觀頓改已見兵志茲不復書璽寶印符所以昭信龍龜蟲鳥紐篆各殊列代相沿皆資法守備詳定式悉按等差又自海通國交最重往來酬贈仿製寶星名級攸分以榮佩戴逮乎末季新制漸繁兼有爵章行之未久若斯之類檃略云爾清初仍明舊有玉輅大輅大馬輦小馬輦之制與香步輦並稱五輦大朝日設於太和門東又涼步輦大儀轎大轎明轎折合明轎均左所掌之冬至大祀夏至祀方澤並乘涼步輦升殿日亦設於太和門東乾隆七年定大祀親詣行禮均乘輿出宮至太和門乘輦祀畢還宮仍備輿八年改大輅為金輅大馬輦為象輅小馬輦為革輅香步輦為木輅玉輅仍舊是為五輅鑾儀衛掌之遇大朝會則陳於午門外十三年諭定乘用五輅自今歲南郊始更造玉輦改涼步輦為金輦是為二輦又定大儀轎為禮輿改折合明轎為輕步輿定大轎為步輿是為三輿南郊乘玉輦北郊太廟社禝壇乘金輦朝日夕月耕藉以下諸祀均乘禮輿遇大朝會則並陳於太和門外行幸御輕步輿駕出入則御步輿皇子輿車俟分封後始製茲撮集禮器圖所載其乾隆以前所定者為初制依類附見用備參稽皇帝玉輅木質朱圓蓋方軫高一丈二尺一寸蓋高三尺一分青飾銜玉圓版四冠金圓頂一尺二寸九分承以鏤金垂雲簷八尺一寸貼鏤金雲版三層青緞垂幨亦三層繡金雲龍羽文相間繫帶四繡金青緞為之屬於軫四柱高六尺七寸九分相距各五尺六寸繪金雲龍門垂朱簾四面各三座縱八尺五寸橫八尺四寸環以朱闌飾間金彩闌內周布花毯雲龍寶座在中高一尺三寸闊二尺九寸兩輪各十有八輻鏤花飾金貫以軸轅二長二丈二尺九寸五分金龍首尾飾兩端軫長一丈一尺一寸五分徑八尺四寸後建太常十二斿亦青緞為之繅繡日月五星斿繡二十八宿𩹉俱繡金龍下垂五彩流蘇用攢竹朱竿左加闟戟右飾龍首並綴朱旄五垂青緌升用納陛五級左右闌皆朱金彩駕象一靷以朱絨紃陳設時行馬二承轅亦朱直竿兩端俱鉆銅初制玉輅尺寸與大輅同輅上平盤滴珠板輪輻輪輞車心軸首及駕轅諸索制並同惟無平盤下十有二槅及左右八槅之飾輅亭前二柱飾瀝粉貼金升龍亭柱檻座尺寸及門槅明栨裝飾與亭內軟座下諸制悉同大輅惟屏風上雕沈香色描金雲龍五屏後下三槅雕木沈香色描金雲龍三下雕雲板如其數較大輅之制少異焉輅頂圓盤天輪輅亭前諸制及太常旗踏梯行馬之類皆與大輅同金輅亦駕象一圓蓋方軫黃飾銜金圓版四黃緞垂幨三層繫帶四亦黃緞為之屬於軫後建大旗十有二斿各繡金龍餘如玉輅之制按金輅之名改由大輅初制大輅高一丈三尺九寸五分廣八尺二寸五分輅上平盤前後車櫺並雁翅及四垂如意滴珠板下二轅各長二丈二尺九寸有奇俱朱鍍金銅龍首尾鱗葉片裝釘平盤下方箱四周朱匡前後十二槅內青地繪五彩雲鶴左右八槅內上青下緑地繪獸鳥各六輪二貫以軸每輪十八輻輞皆朱抹金銅鈒花葉片裝釘輪內車心各一抹金銅鈒蓮花瓣輪盤裝釘軸首左右鐵插貫之抹金銅鈒龍頂管心裝釘軸中纏紅絨駕轅諸索輅亭高六尺七寸九分四柱各長五尺八寸四分檻座高九寸五分前後柱創金雲龍文下山水門高五尺一寸九分廣二尺四寸九分左右門各廣二尺二寸五分上四周裝雕木沈香色描金香草板十二片前左右各有槅二扇明栨全皆朱抹金銅鈒花葉片裝釘槅編黃線縧後朱屏風屏前上三槅雕沈香色描金雲龍五上朱板創金雲龍一中三槅沈香色描金雲龍三下三槅描金雲板如其數屏後上三槅朱創金龍三其次創金雲板如其數中三槅朱創金龍四其次沈香色描金雲板如其數下三槅沈香色雲板亦如之俱抹金銅鈒花葉片裝釘亭內黃線縧編朱匡軟座黃絨墜座大索四下垂蓮花墜石上施花毯草席並大紅織金綺褥朱坐椅一上靠背雕沈香色描金雲龍一下雕雲板一朱福壽板一並衣黃織金椅靠坐褥四圍椅裙全周圍施黃綾帷幔或用黃線羅亭外青綺緣邊紅簾十扇各用拽簾黃線縧二黃銅圈全輅頂並圓盤高三尺一分鍍金銅蹲龍頂帶仰覆蓮座高一尺二寸九分垂攀頂黃絨索四盤高二寸上加朱其下外四面沈香色地描金雲青飾輅蓋亭內貼金斗拱承朱匡寶蓋鬬以八頂黃綺冒之名曰黃屋中並四周繡五彩雲龍九天輪三層朱上安雕木貼金龍耀葉板八十一片三層間繪五彩雲襯板數亦如之盤下四周黃銅裝釘上施金黃綺瀝水三層每層摺片八十有一間繡五彩雲龍文四角垂青綺絡帶各繡五彩雲升龍三圓盤四角連輅座板用攀頂黃線圓縧並貼金木魚輅亭前有左右轉角闌干二扇後一字帶左右轉角闌干一扇皆朱內嵌雕木貼金龍間以五彩雲三扇凡十二柱各柱首雕木貼金蹲龍一及描金五彩裝蓮花抱柱闌內四周施花毯草席其後樹太常旗二黃雲緞為之皆十有二斿每斿內外各繡升龍一朱攢竹竿二左竿旗腰繡日月北斗竿首用鍍金銅龍頭右竿旗腰繡黻字竿首用鍍金銅戟各綴抹金銅鈴二垂紅纓十有二上施抹金銅寶蓋下垂青線踏梯一木質朱抹金銅鈒花葉片裝釘行馬架二木質朱抹金銅葉片裝釘上穿黃絨匾縧黃布面絹𩹉夾幰衣油綢雨衣各一紅油合扇梯紅油拓叉各一貼金銅寶瓶並木雕貼金仰覆蓮座雕花番草貼金象鞍鞦轡氈籠各二副象輅服馬四驂馬六設游環和鈴圓蓋方軫高一丈一尺三寸蓋高二尺六寸五分紅飾銜象牙圓版四紅緞垂幨三層繫帶四亦紅緞為之屬於軫四柱高六尺四寸九分相距各五尺八寸座縱一丈五分橫九尺一寸環以朱闌轅三各長二丈二尺三寸軫長一丈五分徑九尺一寸後建大赤十有二斿各繡金鳳餘制與玉輅同按象輅為大馬輦之改定初制大馬輦高一丈二尺五寸九分廣八尺九寸五分轅二各長二丈五寸九分輦上平盤滴珠板輪輻輪輞車心軸首及駕轅諸索制並如大輅亦無平盤下前後十二槅及左右八槅之飾輦亭高六尺四寸九分朱四柱長五尺五寸四分檻座高如輦亭上四周雕木沈香色描金雲板十二片下亦如之門高五尺九分廣二尺四寸五分左右門廣較減二寸前及左右各有槅二扇後槅三扇明栨全皆朱抹金銅鈒花葉片裝釘槅心編黃線縧亭內軟座上施素毯餘制與大輅同輦頂並圓盤高二尺六寸五分上下皆朱輦蓋青飾銅龍蓮座寶蓋黃屋諸制悉如大輅天輪三層亦如之輦亭前一字闌干一扇後一字帶轉角闌干一扇左右闌干二扇內嵌縧環板亦皆朱四扇凡十有二柱各柱首雕飾同大輅闌內周布素毯草席太常旗踏梯行馬幰衣雨衣之類亦如之惟輅以象駕輦以馬駕故鞍韉鞦轡鈴纓之飾均備焉木輅服馬二驂馬四設游環和鈴圓蓋方軫高一丈一尺六寸五分蓋高三尺六寸一分黑飾銜花梨圓版四黑緞垂幨三層繫帶四亦黑緞為之屬於軫四柱高六尺五分相距各五尺一寸座縱九尺橫八尺八寸環以朱闌轅三各長二丈一尺軫長九尺徑八尺八寸後建大麾十有二斿各繡神武餘俱如玉輅之制按木輅為香步輦之改製初制香步輦高一丈二尺五寸座高三尺方廣八尺二寸五分輦座朱四周雕木五彩雲渾貼金龍板十二片間以渾貼金仰覆蓮座下雕木線金五彩雲板二十片座下四轅中二轅長三丈五尺九寸左右轅長二丈九尺五寸有奇皆朱鍍金銅龍首尾裝釘攀轅黃線圓縧八輦亭高六尺五分四柱各長五尺八寸檻高二寸五分亦皆朱上四周雕木沈香色描金香草板十二片抹金銅輅鈒花葉片裝釘門較大馬輦高逾二寸廣與之同左右門廣二尺二寸前左右各朱十字槅二扇雕沈香色描金雲龍板八片下雲板如其數俱抹金銅鈒花葉片裝釘亭內布花毯草席大紅織金綺褥朱創金龍坐椅一靠背以下諸制與大小馬輦並同輦頂並圓盤高二尺六寸有奇鍍金銅蹲龍頂餘制同大小馬輦天輪制亦如之輦亭前左右轉角闌干二扇後一字帶左右轉角闌干一扇皆朱嵌雕木貼金龍間以五彩雲三扇凡十有二柱各柱首雕飾與大輅同闌內四周布花毯草席亭內木雕渾貼金劍山一朱腳踏一黃緞衣全踏梯一木質朱雕貼金行龍五彩雲縧環板六片描金五彩水板十有二片蹲龍四皆抹金銅鈒花葉片裝釘其幰衣雨衣類悉同大小馬輦制革輅服馬一驂馬三亦設游環和鈴圓蓋方軫高一丈一尺三寸蓋高二尺五寸五分泥銀飾銜圓黃革四白緞垂幨三層繫帶四亦白緞為之屬於軫四柱高五尺五寸九分座縱一丈六尺橫八尺三寸五分環以朱闌轅二各長一丈九尺五分軫長一丈六寸徑八尺三寸五分後建大白十有二斿各繡金虎餘制均與玉輅同按改小馬輦為革輅始於乾隆八年初制小馬輦視大馬輦高廣皆減一尺下二轅長一丈九尺五分平盤滴珠板輪輻輪輞諸制悉與大馬輦同輦亭高五尺五寸九分朱四柱長五尺四寸五分檻高一寸四分上四周雕沈香色描金雲板十二片下亦如之門高五尺廣二尺二寸五分左右門廣較減一寸有奇前左右各有槅二扇明栨全皆朱抹金銅鈒花葉片裝釘槅心編黃線縧後朱屏風雕沈香色描金雲龍五及沈香色描金雲龍縧環板三雲板數亦如之周圍亦抹金銅鈒花葉片裝釘亭座朱板上施素毯草席紅織金綺褥外紅簾四扇其坐椅靠背以下諸制悉同大馬輦輦頂並圓盤高視大馬輦減一寸上飾鍍金銅寶珠頂蓮座寶蓋等飾及天輪輦亭前諸制亦與大馬輦同焉玉輦木質朱圓蓋方座高一丈一尺一寸蓋高二尺青飾銜玉圓版四冠金圓頂承以鏤金垂雲曲梁四垂端為金雲葉青緞垂幨二層周為襞積繫紃四黃絨為之屬於座隅四柱高五尺三寸相距各五尺繪雲龍門高四尺八寸冬施青氈門幃夏易以朱簾黑緞緣四面各三座高二尺四寸上方七尺六寸下方七尺七寸綴版二層上繪彩雲下繪金雲環以朱闌高一尺六寸八分飾間金彩闌內周布花毯雲龍寶座在中高一尺三寸左列銅鼎右植服劍轅四內二轅長三丈八寸五分外二轅長二丈九尺金龍首尾銜兩端升用納陛五級左右闌皆朱亦飾金彩舁以三十六人金輦圓蓋方軫高一丈五尺蓋高一尺九寸飾蓋用泥金銜金圓版四冠金圓頂簷徑七尺一寸黃緞垂幨二層柱高五尺相距各四尺九寸門高四尺七寸五分冬垂黃氈門幃夏易以朱簾黑緞緣四面各三座上方七尺三寸下方七尺五寸環以朱闌高一尺三寸轅四內二轅長二丈八尺一寸外二轅長二丈六尺一寸舁以二十八人餘如玉輦之制按乾隆十三年改涼步輦為金輦初制涼步輦高一丈一尺二寸座高二尺五寸輦座朱座板並四面朱匡雕木渾貼金雲板二十片上貼金地雕五彩