body:
  text: 清史稿卷一百三志七十八輿服二皇帝冠服皇后冠服太皇太后皇太后附皇貴妃以下冠服皇子親王以下冠服皇子親王福晉以下冠服文武官冠服命婦冠服士庶冠服崇德二年諭諸王貝勒曰昔金熙宗及金主亮廢其祖宗時冠服改服漢人衣冠逮至世宗始復舊制我國家以騎射為業今若輕循漢人之俗不親弓矢則武備何由而習乎射獵者演武之法服制者立國之經嗣後凡出師田獵許服便服其餘悉令遵照國初定制仍服朝衣並欲使後世子孫勿輕變棄祖制乾隆三十七年三通館進呈所嘉禮考於遼金元各代冠服之制載未能明晰奉諭遼金元衣冠初未嘗不循其國俗後乃改用漢唐儀式其因革次第原非出於一時即如金代朝祭之服其先雖加文飾未至盡棄其舊至章宗乃概為更制是應詳考以徵蔑棄舊典之由衣冠為一代昭度夏收殷冔不相沿襲凡一朝所用原各自有法程所謂禮不忘其本也自北魏始有易服之説至遼金元諸君浮慕好名一再世輒改衣冠盡去其純朴素風傳之未久國勢寖弱況揆其議改者不過云袞冕備章文物足觀耳殊不知潤色章身即取其文亦何必僅沿其式如本朝所定朝祀之服山龍藻火粲然具列皆義本禮經而又何通天絳紗之足云耶蓋清自崇德初元已釐定上下冠服諸制高宗一代法式加詳而猶於變本忘先諄諄訓誡亦深維乎根本至計未可輕革舊俗祖宗成憲具在所宜永守勿愆也茲就乾隆朝增改之制以類次而仍以初定者附見於篇皇帝朝冠冬用薰貂十一月朔至上元用黑狐上綴朱緯頂三層貫東珠各一皆承以金龍四餘東珠如其數上銜大珍珠一夏織玉草或藤竹絲為之緣石青片金二層𩹉用紅片金或紅紗上綴朱緯前綴金佛飾東珠十五後綴舍林飾東珠七頂如冬制吉服冠冬用海龍薰貂紫貂惟其時上綴朱緯頂滿花金座上銜大珍珠一夏織玉草或藤竹絲為之紅紗綢𩹉石青片金緣上綴朱緯頂如冬吉服冠常服冠紅絨結頂不加梁餘如吉服冠行冠冬用黑狐或黑羊皮青絨餘俱如常服冠夏織藤竹絲為之紅紗𩹉緣上綴朱氂頂及梁皆黃色前綴珍珠一端罩紫貂為之十一月朔至上元用黑狐明黃緞𩹉左右垂帶各二下廣而鋭色與𩹉同袞服色用石青繡五爪正面金龍四團兩肩前後各一其章左日右月萬壽篆文間以五色雲春秋棉夾冬裘夏紗惟其時朝服色用明黃惟祀天用藍朝日用紅夕月用月白披領及袖皆石青緣用片金冬加海龍緣繡文兩肩前後正龍各一腰帷行龍五衽正龍一襞積前後團龍各九裳正龍二行龍四披領行龍二袖端正龍各一列十二章日月星辰山龍華蟲黼黻在衣宗彝藻火粉米在裳間以五色雲下幅八寶平水十一月朔至上元披領及裳俱表以紫貂袖端薰貂繡文兩肩前後正龍各一襞積行龍六列十二章俱在衣間以五色雲龍袍色用明黃領袖俱石青片金緣繡文金龍九列十二章間以五色雲領前後正龍各一左右及交襟處行龍各一袖端正龍各一下幅八寶立水襟左右開棉夾紗裘各惟其時常服褂色用石青花文隨所御裾左右開行褂色用石青長與坐齊袖長及肘常服袍色及花文隨所御裾四開行袍同行裳色隨所御左右各一前平後中豐上下斂橫幅石青布為之氈夾惟時冬用鹿皮或黑狐為𩹉雨冠之制二冬頂崇前簷深夏頂平前簷敞皆明黃色月白緞𩹉氈及油綢羽緞惟其時雨衣之制六皆明黃色一如常服褂而長與袍稱自衽以下加博上襲重衣領下為襞積無袖斜帷相比上斂下遞豐兩重俱加掩襟領及鈕約皆青色一以氈及羽緞為之月白緞𩹉不襲重衣餘制同領及鈕約如衣色油綢為之不加𩹉鈕約青色一如常服褂而加領長與袍稱氈羽緞為之月白緞𩹉領及鈕約如衣色一如常服袍而袖端平前施掩襠油綢不加𩹉領用青羽緞鈕約青色外加袍袖如衣色一如常服褂長與坐齊氈羽緞為之月白緞𩹉領及鈕約如衣色一如常服袍而加領長與坐齊油綢為之不加𩹉袖端平前加掩襠領用青羽緞鈕約青色雨裳之制二皆明黃色一左右幅相交上斂下遞博上前加淺帷為襞積兩旁綴以紐約青色腰為橫幅用石青布兩末削為帶繫之一前為完幅不加淺帷餘制同朝珠用東珠一百有八佛頭記念背雲大小墜雜飾各惟其宜大典禮御之惟祀天以青金石為飾祀地珠用蜜珀朝日用珊瑚夕月用緑松石雜飾惟宜縧皆明黃色朝帶之制二皆明黃色一用龍文金圓版四飾紅藍寶石或緑松石每具銜東珠五圍珍珠二十左右佩淺藍及白各一下廣而鋭中約鏤金圓結飾寶如版圍珠各三十佩囊文繡燧觿刀削結佩惟宜縧皆明黃色大典禮御之一用龍文金方版四其飾祀天用青金石祀地用黃玉朝日用珊瑚夕月用白玉每具銜東珠五佩及縧惟祀天用純青餘如圓版朝帶之制中約圓結如版飾銜東珠四佩囊純石青左觿右削並從版色吉服帶用明黃色鏤金版四方圓惟便銜珠玉雜寶各從其宜左右佩純白下直而齊中約金結如版飾餘如朝帶制常服帶同行帶色用明黃左右佩繫以紅香牛皮為之飾金花文銀鐶各三佩以高麗布視常服帶微闊而短中約以香牛皮束綴銀花文佩囊明黃縧飾珊瑚結削燧雜佩各惟其宜初制皇帝冠用東珠寶石鑲頂束金鑲玉版嵌東珠帶康熙二十三年定凡大典禮祭壇廟冠用大珍珠東珠鑲頂禮服用黃色秋香色藍色五爪三爪龍緞雍正元年定禮服用石青明黃大紅月白四色緞花樣三色圓金龍九龍口珠各一顆腰襴小團金龍九周身五彩雲下八寶平水萬代江山皇后朝冠冬用薰貂夏以青絨為之上綴朱緯頂三層貫東珠各一皆承以金鳳飾東珠各三珍珠各十七上銜大東珠一朱緯上周綴金鳳七飾東珠九貓睛石一珍珠二十一後金翟一飾貓睛石一珍珠十六翟尾垂珠凡珍珠三