body:
  text: 清史稿卷一百五志八十輿服四鹵簿附皇帝鹵簿太上皇鹵簿皇太子儀衛皇后儀駕太皇太后儀駕皇太后儀駕皇貴妃以下儀仗采仗親王以下儀衛固倫公主以下儀衛額駙儀衛職官儀衛清自太宗天聰六年定儀仗之制凡國中往來御前旗三對傘二柄校尉六人其制甚簡自天聰十年改元崇德始定御仗數目及品官儀從逮世祖入關定鼎參稽往制量加增飾原定皇帝儀衛有大駕鹵簿行駕儀仗行幸儀仗之別乾隆十三年復就原定器數增改釐訂遂更大駕鹵簿為法駕鹵簿行駕儀仗為鑾駕鹵簿行幸儀仗為騎駕鹵簿三者合則為大駕鹵簿而凡皇后儀駕妃嬪儀仗采仗以及親王以下儀衛均視原定加詳茲依乾隆朝所定者標目而以原定器數及崇德初年所定者附見於後又太上皇鹵簿皇太子儀衛皆一時之制非同常設亦并著於篇庶考因革者得以沿流溯源詳稽一代之制焉皇帝大駕鹵簿圜丘祈穀常雩三大祀用之大閲時詣行宮禮成還宮亦用之其制前列導象四次寶象五次靜鞭四次前部大樂其器大銅角四小銅角四金口角四次革輅駕馬四木輅駕馬六象輅駕馬八金輅駕象一玉輅駕象一次鐃歌樂鐃歌鼓吹與行幸樂並設名鐃歌樂其器金二銅鼓四銅鈸二扁鼓二銅點二龍笛二平笛二雲鑼二管二笙二金口角八大銅角十六小銅角十六蒙古角二金鉦四畫角二十四龍鼓二十四龍笛十二拍板四仗鼓四金四龍鼓二十四間以紅鐙六次引仗六御仗十六吾仗十六立瓜臥瓜各十六星鉞各十六出警入蹕旗各一五色金龍小旗四十次翠華旗二金鼓旗二門旗八日月旗各一五雲旗五五雷旗五八風旗八甘雨旗四列宿旗二十八五星旗五五嶽旗五四瀆旗四神武朱雀青龍白虎旗各一天馬天鹿辟邪犀牛赤熊黃羆白澤角端遊麟彩獅振鷺鳴鳶赤烏華蟲黃鵠白雉雲鶴孔雀儀鳳翔鸞旗各一五色龍纛四十前鋒纛八護軍纛八驍騎纛二十四次黃麾四儀鍠氅四金節四進善納言敷文振武褒功懷遠行慶施惠明刑弼教教孝表節旌各二龍頭幡四豹尾幡四絳引幡四信幡四羽葆幢四霓幢四紫幢四長壽幢四次鸞鳳赤方扇八雉尾扇八孔雀扇八單龍赤團扇八單龍黃團扇八雙龍赤團扇八雙龍黃團扇八赤滿單龍團扇六黃滿雙龍團扇六壽字黃扇八次赤素方傘四紫素方傘四五色花傘十五色緞傘十間以五色九龍團傘十次九龍黃蓋二十紫芝蓋二翠華蓋二九龍曲柄黃蓋四次戟四殳四豹尾槍三十弓矢三十儀刀三十次仗馬十次金方几一金交椅一金瓶二金盥盤一金盂一金盒二金爐二拂二次九龍曲柄黃蓋一前引佩刀大臣十人提爐二玉輦在中後扈佩刀大臣二人豹尾班執槍佩儀刀侍衛各十人佩弓矢侍衛二十人領侍衛內大臣一人侍衛班領二人後管宗人府王公二人散秩大臣一人前鋒護軍統領一人給事中御史二人各部郎中員外郎四人侍衛班領一人署侍衛班領一人侍衛什長二人次黃龍大纛二領侍衛內大臣一人司纛侍衛什長二人建纛親軍四人鳴佩螺親軍六人太宗崇德元年備大駕鹵簿玉璽四顆黃傘五團扇二纛十旗十大刀六戟六立瓜臥瓜骨朵各二吾仗六馬十金椅金杌香盒香爐金水盆金唾壺金瓶樂器全設嗣復定儀仗數目用金漆椅一金漆杌一蠅拂四金唾盂一金壺一金瓶金盆各一香爐香盒各二曲柄傘一直柄傘四扇二節四骨朵二立瓜臥瓜各二吾仗六紅仗四鑼二鼓二畫角四簫二笙二架鼓四橫笛二龍頭橫笛二檀板二小銅鈸四小銅鑼二大銅鑼四雲鑼二鎖訥四世祖入關一仍舊制逮順治三年以後更定皇帝鹵簿有大駕鹵簿行駕儀仗行幸儀仗之別大駕鹵簿之制曲柄九龍傘四直柄九龍傘十六直柄瑞草傘六直柄花傘六方傘八大刀二十弓矢二十豹尾槍二十龍頭方天戟四黃麾二絳引幡四信幡傳教幡告止幡政平訟理幡各四儀鍠氅八羽葆幢四青龍白虎朱雀神武幢各一豹尾幡龍頭竿幡各四金節四銷金龍纛銷金龍小旗各二十金鉞六馬十鸞鳳扇八單龍扇十二雙龍扇二十拂子二紅鐙六金香爐金瓶金香盒各二金唾壺金盆金杌金交椅金腳踏各一御仗六星六篦頭八棕薦三十靜鞭三十品級山七十二肅靜旗金鼓旗白澤旗各二門旗八日月風雲雷雨旗各一五緯旗五二十八宿旗各一北斗旗一五嶽旗五四瀆旗四青龍白虎朱雀神武天鹿天馬鸞麟熊羆旗各一立瓜臥瓜吾仗各六畫角二十四鼓四十八大銅號小銅號各八金金鉦仗鼓各四龍頭笛十二板四串凡郊祀大典萬壽元旦冬至三大朝會及諸典禮皆用之法駕鹵簿與大駕鹵簿同惟彼用鐃歌樂此則用鐃歌鼓吹其器大銅角八小銅角八金鉦四畫角二十四龍鼓二十四龍笛十二拍板四仗鼓四金二龍鼓二十四間以紅鐙六視鐃歌樂為減又御仗吾仗立瓜臥瓜星鉞皆各六五色金龍小旗二十五色龍纛二十九龍黃蓋十豹尾槍二十弓矢二十儀刀二十佩弓矢侍衛十人其赤滿單龍團扇黃滿雙龍團扇及五色緞傘皆不設亦均較大駕為減又玉輦改設金輦餘均與大駕鹵簿同凡祭方澤太廟社稷日月先農各壇歷代帝王先師各廟則陳之若遇慶典朝賀則陳於太和殿庭其制九龍曲柄黃華蓋設於太和殿門外正中次拂爐盒盂盤瓶椅几在殿簷東西次儀刀弓矢豹尾槍親軍護軍相間為十班暨殳戟均在丹陛東西次九龍曲柄黃蓋翠華蓋紫芝蓋九龍黃蓋五色九龍傘五色花傘自丹陛三成相間達於兩階階下靜鞭仗馬列甬道東西紫赤方傘扇幢幡旌節氅麾纛旗鉞星瓜仗列丹墀東西玉輦金輦在太和門外五輅在午門外寶象在五輅之南鹵簿樂即鐃歌鼓吹在寶象之南朝象即導象在天安門外若於圓明園行慶賀禮則陳於正大光明殿階下至大宮門外惟輦輅儀象不設若御