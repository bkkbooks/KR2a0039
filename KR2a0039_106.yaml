body:
  text: 清史稿卷一百六志八十一選舉一古者取士之法莫備於成周而得人之盛亦以成周為最自唐以後廢選舉之制改用科目歷代相沿而明則專取四子書及易書詩春秋禮記五經命題試士謂之制義有清一沿明制二百餘年雖有以他途進者終不得與科第出身者相比康乾兩朝特開制科博學鴻詞號稱得人然所試者亦僅詩賦策論而已洎乎末造世變日亟論者謂科目人才不足應時務毅然罷科舉興學校採東西各國教育之新制變唐宋以來選舉之成規前後學制判然兩事焉今綜其章制沿革新舊異同之故著於篇學校一有清學校向沿明制京師曰國學並設八旗宗室等官學直省曰府州縣學世祖定鼎燕京修明北監為太學順治元年置祭酒司業及監丞博士助教學正學録典籍典簿等官設六堂為講肄之所曰率性修道誠心正義崇志廣業一仍明舊少詹事李若琳首為祭酒請仿明初制廣收生徒官生除恩廕外七品以上官子弟勤敏好學者民生除貢生外廩增附生員文義優長者並許提學考選送監又言學以國子名所謂國之貴遊子弟學焉前朝公侯伯駙馬初襲授者皆入國學讀書滿洲勳臣子弟有志向學者並請送監肄業詔允增設滿洲司業助教等官是為八旗子弟入監之始厥後定為限制條例屢更益臻詳備肄業生徒有貢有監貢生凡六曰歲貢恩貢拔貢優貢副貢例貢監生凡四曰恩監廕監優監例監廕監有二曰恩廕難廕通謂之國子監生六堂肄業分內外班初內班百五十名堂各二十五名外班百二十名堂各二十名戶部歲發帑銀給膏火獎勵有差餘備賙恤乾隆初改內班堂各三十名內外共三百名既而裁外班百二十名加內班膏火撥內班二十四名為外班嘉慶初以八旗及大宛兩縣肄業生距家近不住舍不許補內班補班之始赴監應試曰考到列一二等者再試曰考驗貢生一二等監生一等乃許肄業假滿回監曰復班內班生願依親處館滿蒙漢軍恩監生習翻譯或騎射不能竟月在學者改外班曠大課一次無故離學至三次以上例罰改外置集愆册治諸不帥教者出入必記於簿監丞掌之省親完姻丁憂告病及同伯叔兄長喪而無子者豫假歸里限期回監遲誤懲罰私歸黜革冒替除名課士之法月朔望釋奠畢博士廳集諸生講解經書上旬助教講義既望學正學録講書各一次會講覆講上書覆背月三回周而復始所習四書五經性理通鑑諸書其兼通十三經二十一史博極羣書者隨資學所詣日摹晉唐名帖數百字立日課册旬日呈助教等批晰朔望呈堂查驗祭酒司業月望輪課四書文一詩一曰大課祭酒季考司業月課皆用四書五經文並詔誥表策論判月朔博士廳課經文經解及策論月三日助教課十八日學正學録課各試四書文一詩一經文或策一積分歷事之法國初行之監生坐監期滿撥歷部院練習政體三月考勤一年期滿送廷試其免坐監或免歷一月二月者恩詔有之非常例也順治三年祭酒薛所蘊奏定漢監生積分法常課外月試經義策論各一合式者拔置一等歲考一等十二次為及格免撥歷送廷試超選十五年祭酒固爾嘉渾議令監生考到日拔其尤者許積分不與者期滿咨部歷事積分法一年為限常課外月試一等與一分二等半分二等以下無分有五經兼通全史精熟或善摹鍾王諸帖雖文不及格亦與一分積滿八分為及格歲不逾十餘人恩拔歲副咨部歷滿考職照教習貢生例上上卷用通判上卷用知縣例監歷滿考職與不積分貢生一體廷試每百名取正印八名餘用州縣佐二積分不滿數願分部者咨部不得優選願再肄業滿分者聽從之是年科臣王命嶽以貢途壅塞請暫停恩拔歲貢於是坐監人少難較分數十七年固爾嘉渾奏停積分法後遂不復行康熙初並停撥歷期滿咨部考試用州同州判縣丞主簿吏目自是部院諸司無監生惟考選通文理能楷書者送修書各館較年勞議照應得職銜選用優者或加等焉監生坐監期恩貢六月歲貢八月副貢廩膳六月增附八月拔貢廩膳十四月增附十六月恩廕二十四月難廕六月例貢廩膳十四月增附十六月俊秀二十四月例監計捐監月分三十六月雍正五年定除監期計算各監生肄業率以連閏扣滿三年為期告假丁憂考劣記過則扣除月日告假依限到監或逾限而本籍有司官具牘者仍前後通算舊制祭酒司業總理監務雍正三年始設管理監事大臣乾隆二年孫嘉淦以刑部尚書管監事初嘉淦在世宗朝官司業奏言學校之教宜先經術請敕天下學臣選拔諸生貢太學九卿舉經明行修之士為助教一以經術造士三年考成舉以待用議未及行遷祭酒申前請世宗韙之先是太學生名為坐監肄業率假館散處遇釋奠堂期季考月課暫一齊集監內舊有號房五百餘間修圮不時且資斧不給無以宿諸生嘉淦言各省拔貢雲集京師需住監者三百餘人六堂祗可誦讀不能棲止乞給監南官房令助教等官及肄業生居住歲給銀六千兩為講課桌飯衣服賑助之費允之是為南學至是請仿宋儒胡瑗經義治事分齋遺法明經者或治一經或兼他經務取御纂折中傳説諸書探其原本講明人倫日用之理治事者如歷代典禮賦役律令邊防水利天官河渠算法之類或專治一事或兼治數事務窮究其源流利弊考試時必以經術湛深通達事理驗稽古愛民之識三年期滿分別等第以示勸懲從之令諸生有心得或疑義逐條劄記呈助教批判按期呈堂季考月課改四書題一五經講義題各一治事策問一時高宗加意太學嘉淦嚴立課程獎誘備至六堂講師極一時之選舉人吳鼎梁錫璵皆以薦舉經學授司業進士莊亨陽舉人潘永季蔡德峻秦蕙田吳鼐貢生官獻瑤王文震監生夏宗瀾皆以潛心經學先後被薦為本監屬官分長六堂各占一經時有四賢五君子之稱師徒濟濟皆奮自鏃礪研求實學而祭酒趙國麟又以經義治事外應講習時藝請頒六堂欽定四書文資誦習並報可清代臨雍視學典禮綦重順治九年世祖首視學先期行取衍聖公五經博士率孔氏暨先賢各氏族裔赴京觀禮帝釋奠畢詣彝倫堂御講幄祭酒講四書司業講經宣制勉太學諸生越日賜衍聖公冠服國子監官賞賚有差各氏後裔送監讀書嗣是歷代舉行以為常乾隆四十八年諭曰稽古國學之制天子曰辟雍所以行禮樂宣德化昭文明而流教澤典至巨也國學為人文薈萃之地規制宜隆辟雍之立元明以來典尚闕如應增建以臻美備命尚書德保尚書兼管國子監事劉墉侍郎德成仿禮經舊制於彝倫堂南營建明年落成又明年高宗駕臨辟雍行講學禮命大學士伯伍彌泰大學士管監事蔡新進講四書祭酒覺羅吉善鄒奕孝進講周易頒御論二篇宣示義蘊王公衍聖公大學士以下官暨肄業觀禮諸生三千八十八人圜橋聽講禮成賜燕禮部恩賚有加是時天子右文羣臣躬遇休明翊贊文化彬彬稱極盛矣嘉慶以後視學典禮率循不廢咸豐初猶一舉行焉道光末詔整飭南學住學者百餘人監規頽廢已久迄難振作咸豐軍興歲費折發章程亦屢更同治初元以國學專課文藝無裨實學令兼課論策用經史性理諸書命題奬勵留心時務者明年增發歲費三千兩九年乃復舊額選文行優者四十人住南學厚給廩餼文風稍稍興起光緒二年增二十名十一年許各省舉人入監曰舉監其後無論舉人貢監生凡非正印官未投供舉貢未傳到教習均得入監以廣裁成貢監生諸色目多沿明制歲貢取府州縣學食廩年深者挨次升貢順治二年命直省歲貢士京師府學歲一人州學三歲二人縣學二歲一人一正二陪學政嚴加遴選濫充發回原學五名以上學政罰俸十五年令到部時詳查年力強壯者乃許送監康熙元年減貢額府三歲二人州二歲一人縣三歲一人八年復照順治二年例二十六年罷歲貢廷試其後但由學政挨序考準咨部選授本省訓導得缺後巡撫一加考驗願入監者益鮮矣恩貢因明制國家有慶典或登極詔書以當貢者充之順治元年詔直省府州縣學以本年正貢作恩貢次貢作歲貢歷代恩詔皆如之九年五氏子孫觀禮生員十五人送監讀書準作恩貢乾隆後恩賜臨雍觀禮聖賢後裔廩增附生入監以為常至康乾間天子東巡親詣闕里拔取五氏十三氏子孫生員貢成均則加恩聖裔非制也拔貢因明選貢遺制順治元年舉行順天六人直省府學二人州縣學各一人康熙十年令學臣於考取一二等生員內遴選文行兼優者貢太學從祭酒查祿請也明年始選拔八旗生員滿洲蒙古二人漢軍一人時各省選貢多冒濫三十七八年間祭酒特默德孫嶽頒面試山西選拔張漢翀等六名陝西呂爾等四名廣東陳其瑋等三名均文理不堪字畫舛謬原卷駁回學臣參處遂停選拔雍正元年禮部尚書陳元龍疏請嚴成均肄業之規部議太學監生皆由捐納能文之士稀少應令學臣照舊例選拔送監從之五年世宗以歲貢較食廩淺深多年力衰憊之人欲得英才必須選拔命嗣後六年選拔一次明年又諭學政選拔不拘一二等生員酌試時務策論果有識見才幹再訪平日品行即未列優等亦許選拔故雍乾間充貢國學以選拔為最盛乾隆初定朝考制列一二等者揀選引見録用三等劄監肄業尋停揀選例三年期滿祭酒等分別等第核實保薦用知縣教職七年帝以拔六年一舉人多缺少妨舉人銓選之路且生員優者應科舉時自可脫穎而出不專藉選拔為進身改十二年一舉遂為永制十六年以天下教官多昏耄濫竽戀棧雖定例六年甄別長官每以間曹多方寬假諭詳加澄汰廷臣議督撫三年澄汰教職員缺以朝考揀選拔貢充補未入揀選者劄監肄業如舊四十一年定朝考優等兼用七品小京官五十五年朝考始用覆試學政選拔分二場試四書文經文策論乾隆十七年經文改經解二十三年增五言八韻詩會同督撫覆試朝考試書藝一詩一副榜入監順治二年令順天鄉試中式副榜增附準作貢監廩生及恩拔歲貢免坐監與廷試十五年他貢停惟副榜照舊解送康熙元年停副貢額十一年以查祿奏復舊制優貢之選與拔貢並重順治二年令直省不拘廩增附生選文行兼優者大學二人小學一人送監康熙二十四年以監生止輸納一途貧窶之士無由觀光令照順治二年例選送雍正間始析貢監名色廩增準作優貢附生準作優監乾隆四年限大省無過五六名中省三四名小省一二名任缺無濫學政三年會同督撫保題分試兩場略同選拔試四書文經解經文策論後增詩二十三年定優生到部如拔貢朝考例試書藝一詩一文理明通者升太學荒疏者發回學政議處二十九年學臣有以拔貢年分暫停舉優為請者部議拔貢十二年一舉而學臣三年任滿宜舉優黜劣通省不過數名應仍舊例嘉慶十九年御史黃中傑條奏請與拔貢一體廷試録用禮部議駁請免來京朝考示體恤帝以優生經朝考準作貢生斯合貢於王廷之義停朝考名實不符弗許然卒以無録用之條多不赴京報考同治二年議定甲子科始廷試優生仿順天鄉試例分南北中卷八旗奉天直隸山東山西河南陝西甘肅為北卷江蘇江西浙江安徽福建湖北湖南為南卷四川廣東廣西雲南貴州為中卷考列一二等用知縣教職三等用訓導恩拔副歲優時稱五貢科目之外由此者謂之正途所以別於雜流也恩監由八旗漢文官學生算學滿漢肄業生考取又臨雍觀禮聖賢後裔由武生奉祀生俊秀入監者皆為恩監例貢與例監相仿由廩增附生或俊秀監生援例報捐貢生者曰例貢由俊秀報捐監生者曰例監凡捐納入官必由之或在監肄業或在籍均為監生恩廕凡滿漢子弟奉敕送監讀書恩詔分別內外文武品級廕子入監順治二年定文官京四品外三品以上武官二品以上俱送一子入監十一年覺羅廕生照各官廕生例一體送監包衣佐領下官子弟向例不得為廕監康熙九年例除宗室給廕入監自康熙五十二年始也難廕始順治四年以殉難陝西固原道副使呂鳴夏子入監讀書九年定內外滿漢三品以上官三年任滿勤事以死者廕一子入監後廣其例凡三司首領州縣佐二官死難者亦得廕子矣外國肄業生康熙二十七年琉球國王始遣陪臣子弟梁成楫等隨貢使至入貢肄業雍正六年鄂羅斯遣官生魯喀等留學中國以滿漢助教等教之月給銀米器物學成遣歸先後絡繹至同治間琉球官生猶有至者他如順治二年於隨征入關奉天十五學取三十人入監為天下勸十一年定隨征廩生準作貢監生員有軍功二等準作生監更有軍功二等準作貢生謂之功貢未幾例停則開國時權宜之制也考送校録始於乾隆三年令國子監選正途貢生年力少壯字畫端楷者十人送武英殿備謄録年滿議三十四年例停歸吏部謄録貢生內選取嗣以吏部無合例者仍由在監拔副優貢生考選嘉慶間增十名後不復行五貢就職學政會同巡撫驗看咨部依科分名次年分先後恩拔副貢以教諭選用歲貢以訓導選用康熙中捐納歲貢並用訓導雍正初捐納貢生教諭改縣丞訓導改主簿既仍許廩生捐歲貢者用訓導恩拔副貢年力富強者得就職直隸州州判嘉慶以後凡朝考未録之拔貢及恩副歲優貢生遇鄉試年得具呈就職就教優貢就教附歲貢末用訓導道光初許滿蒙正途貢生就職與滿員通較年分先後選用貢監考職定例必監期已滿乃許送考惟特恩考職不論監期滿否凡正途捐納各項貢監生及候補謄録教習校録一體送考其已就教就職及捐職襲世職者不許初制考職歲一舉貢監一例以州同州判縣丞主簿吏目録用乾隆元年定考職以鄉試年恩科不考恩拔副貢考列一等以州同二等以州判三等以縣丞選用歲貢一等以主簿二等以吏目選用願就教者聽捐納貢監考取如歲貢例五十六年停考職嘉慶五年僅一行之光緒三十一年直隸總督袁世凱等奏停科舉摺寬籌舉貢生員出路一條請十年三科內優貢加額録取己酉選拔如舊朝考用京官知縣督撫學政三科內考選學貢通算學地理財政兵事交涉鐵路礦務警察外國政法之一者三年一次保送若干名略視會試中額兩三倍赴京試取者用主事中書知縣詔議行明年政務處詳議己酉拔貢照向額倍取本年丙午考優以後三年一考視例額加四倍廩生出貢許倍額部院考用謄録分舉人五貢生員三等二年期滿獎舉人優拔擇尤改用七品小京官又為廣就職之例五貢一體以直隸州州判按察鹽運經歷散州州判經歷縣丞分別注選或分發試用蓋五貢終清之世未嘗廢棄也算學隸國子監稱國子監算學乾隆四年額設學生滿漢各十二蒙古漢軍各六續設漢肄業生二十四遵御製數理精蘊分線面體三部部限一年通曉七政限二年有季考歲考五年期滿考取者滿蒙漢軍學生咨部以本旗天文生序補漢學生舉人用博士貢監生童用天文生此外隸國學者為八旗官學順治元年若琳奏臣監僻在城東北隅滿員子弟就學不便議於滿洲八固山地方各立書院以國學二廳六堂教官分教之以時赴監考課下部議行於是八旗各建學舍每佐領下取官學生一名以十名習漢書餘習滿書二年從所蘊言合兩旗為一學每學教習十人教習酌取京省生員其後學額屢有增減教習於國學肄業生考選止用恩拔副歲貢生如無其人準例監生亦得考取舉人願就一例考選雍正元年於八旗蒙古護軍領催驍騎內選熟練國語蒙古語者十六人充蒙古教習向例官學生分佐領選送五年定每旗額設百名滿洲六十習清漢書各半蒙古漢軍各二十通一旗選擇不拘佐領年幼者習清書稍長者習漢文撥八旗教養兵額滿洲三十蒙古漢軍各十名錢糧分給學生定漢教習每旗五人乾隆初定官學生肄業以十年為率三年內講誦經書監臣考驗擇材資聰穎有志力學者歸漢文班年長願學翻譯者歸滿文班三年欽派大臣考取漢文明通者拔為監生升太學與漢貢監究心明經治事期滿擇尤保薦考選録用八年定漢教習三年期滿分等引見一等用知縣二等用知縣或教職銓選一等再教習三年果實心訓課者知縣即用蒙古教習五年期滿實心訓課者用護軍校驍騎校滿助教每旗二人以八旗文進士舉人翻譯進士舉人恩拔副歲貢生文生員翻譯生員廢員筆帖式考取三十三年下五旗包衣每旗增設學生十名滿洲六蒙古漢軍各二不給錢糧五十四年於每旗百名內裁十名選取經書熟文理優者二十人加給膏火資鼓勵嘉道以後官學積漸廢弛八旗子弟僅恃此進身教習停年期滿豫録用例月課虛應故事雖明諭屢督責迄難振刷光緒初力籌整頓每學以滿漢科甲官一人為管學官專司考核學生課程教習勤惰簡派滿漢進士出身大員二人為管理八旗官學大臣每學添設翰林編檢一員月課季考分司考校春秋赴監會考如舊同光間國學及官學造就科舉之才亦頗稱盛然囿於帖括舊制鮮變通三十一年監臣奏於南學添設科學未幾裁國子監併設學部文廟祀典設國子丞一人掌之八旗官學改併學堂算學亦改稱欽天監天文算學隸欽天監而太學遂與科舉並廢云宗學肇自虞廷命夔典樂教胄子三代無宗學名而義已備唐宋後有其名而制弗詳清順治十年八旗各設宗學選滿洲生員為師凡未封宗室子弟十歲以上俱入學習清書雍正二年定制左右兩翼設滿漢學各一王公將軍及間散宗室子弟十八歲以下入學分習清漢書兼騎射以王公一人總其事設總副管以宗室分尊齒長者充之清書教習二人選罷間旗員及進士舉人貢生生員善翻譯者充之騎射教習二人選罷間旗員及護軍校善射者充之每學生十人設漢書教習一人禮部考取舉貢充之三年期滿分別等第録用十一年兩學各以翰林官二人董率課程分日講授經義文法乾隆初以滿漢京堂各一人總稽學課月試經義翻譯及射藝九年定每屆五年簡大臣合試兩翼學生欽定名次以會試中式注册俟會試年習翻譯者與八旗翻譯貢生同引見賜進士用府屬額外主事習漢文者與天下貢士同殿試賜進士甲第用翰林部屬等官十年考試漢文翻譯無佳作諭曰我朝崇尚本務宗室子弟俱講究清文精通騎射誠恐學習漢文流於漢人浮靡之習世祖諭停習漢書所以敦本實黜浮華也嗣後宗室子弟不能習漢文者其各羔天習武藝儲為國家有用之器明年定學額左翼七十右翼六十二十一年裁漢教習九人改翻譯教習增騎射教習翼各一人嘉慶初畫一兩翼學額增右翼十名定每學教習滿三人漢四人十三年兩翼各增學額三十足百名為永制覺羅學雍正七年詔八旗於衙署旁設滿漢學各一覺羅子弟八歲至十八歲入學讀書習射規制略同宗學總管王公春秋考驗三年欽派大臣會同宗人府考試分別獎懲學成與旗人同應歲科試及鄉會試並考用中書筆帖式學額鑲黃旗六十一正黃旗三十六正白旗正紅旗各四十鑲白旗十五鑲紅旗六十四正藍旗三十九鑲藍旗四十五滿漢教習旗各二人惟鑲白旗各一景山官學康熙二十四年令於北上門兩旁官房設官學選內府三旗佐領管領下幼童三百六十名清書三房各設教習三人漢書三房各設教習四人初滿教習用內府官老成者漢教習禮部考取生員文理優通者尋改選內閣善書射之中書充滿教習新進士老成者充漢教習雍正後漢教習以舉人貢生考取三年期滿咨部用學生肄業三年考列一等用筆帖式二等用庫使庫守乾隆四十四年許回子佐領下選補學生四名嘉慶間定額鑲黃旗正白旗均百二十四正黃旗百四十回童四咸安宮官學雍正六年詔選內府三旗佐領管領下幼童及八旗俊秀者九十名以翰林官居住咸安宮教之漢書十二房清書三房各設教習一人教射教國語各三人如景山官學考取例五年欽派大臣考試一二等用七八品筆帖式漢教習三年清語騎射教習五年分別議乾隆初定漢教習選取新進士不足於明通榜舉人考充期滿進士用主事知縣舉人用知縣教職二十三年以後不論年分許學生考翻譯中書筆帖式庫使定教習漢九人滿六人宗學覺羅學隸宗人府景山學咸安宮學隸內務府諸學總管教習等類乏通才經費徒糜甚者黌舍空虛期滿時例報成就學生若干名而已光緒二十八年翰林院侍讀寶熙奏請援同文館歸併大學堂例將宗室覺羅八旗等官學改併中小學堂均歸管學大臣辦理從之他如世職官學八旗及禮部義學健鋭營外火器營圓明園護軍營等學皆清代特設習滿蒙語言文字府州縣衛儒學明制具備清因之世祖勘定天下命賑助貧生優免在學生員官給廩餼順治七年改南京國子監為江寧府學尋頒臥碑文刊石立直省學宮諭禮部曰帝王敷治文教為先臣子致君經術為本自明末擾亂日尋干戈學問之道闕焉未講今天下漸定朕將興文教崇經術以開太平爾部傳諭直省學臣訓督士子凡理學道德經濟典故諸書務研求淹貫明體則為真儒達用則為良吏果有實學朕必不次簡拔重加任用初各省設督學道以各部郎中進士出身者充之惟順天江南浙江為提督學政用翰林官宣大蘇松江安淮揚肇高先皆分設既乃裁併上下江湖南北則裁併後仍分設雍正中一體改稱學院省設一人奉天以府丞臺灣以臺灣道兼之甘肅自分闈後始設學政各學教官府設教授州設學正縣設教諭各一皆設訓導佐之員額時有裁併生員色目曰廩膳生增廣生附生初入學曰附學生員廩增有定額以歲科兩試等第高者補充生員額初視人文多寡分大中小學大學四十名中學三十名小學二十名嗣改府視大學大州縣視中學減半小學四名或五名康熙九年大府州縣仍舊額更定中學十二名小學七名或八名後屢有增廣滿洲蒙古漢軍子弟初歸順天考試取進滿洲漢軍各百二十名蒙古六十名康熙中減定滿蒙四十名漢軍二十名旋復增為滿蒙六十漢軍三十學政三年任滿歲科兩試順治十五年停直省科試康熙十二年復之儒童入學考試初用四書文孝經論各一孝經題少又以性理太極圖説通書西銘正蒙命題嗣定正試四書文二覆試四書文小學論各一雍正初科試加經文冬月晷短書一經一尋定科試四書經文外增策論題仍用孝經乾隆初覆試兼用小學論中葉以後試書藝經藝各一增五言六韻詩聖祖先後頒聖諭廣訓及訓飭士子文於直省儒學雍正間學士張照奏令儒童縣府覆試背録聖諭廣訓一條著為令凡新進生員如國子監坐監例令在學肄業以次期新生入學為滿教官考校之法有月課季考四書文外兼試策論翌日講大清律刑名錢穀要者若干條月集諸生明倫堂誦訓飭士子文及臥碑諸條諸生環聽除丁憂患病遊學有事故外不應月課三次者戒飭無故終年不應者黜革試卷申送學政查覆訖於嘉慶月課漸不舉行御史辛從益以為言詔令整頓嗣是教官多闒茸不稱職有師生之名無訓誨之實矣學政考核教官按其文行及訓士勤惰隨時薦黜康熙中令撫臣考試嗣教職部選後赴撫院試四等以上給憑赴任五等學習三年再試六等褫職雍正初定四五等俱解任學習六年考成俸滿盡心訓導士無過犯者督撫學政保題擢用知縣學臣按臨謁先師升明倫堂官生以次揖見生員掣籤講書各講大清律三條西嚮立講畢東嚮立俟行賞罰考試生員舊例歲科試俱四書文二經文一自有給燭之禁例不出經題雍正元年科試增經文冬月一書一經六年更定歲試兩書一經冬月一書一經科試書一經一策一冬月減經文乾隆二十三年改歲試書一經一科試書一策一詩一冬月亦如之欠考勒限補行三次黜革後寬其例五次以上乃黜駐防考試清初定制各省駐防辨兵子弟能讀書者詣京應試乾隆時參領金珩請許歲科試將軍先試騎射就近送府院取進嚴旨切責嘉慶四年湖南布政使通恩奏如金珩言詔議行應試童生五六名取進一名佐領約束之訓習清語騎射府學課文藝明年諭曰我滿洲根本騎射為先若八旗子弟專以讀書應試為能輕視弓馬怠荒武備殊失國家設立駐防之意嗣後各省駐防官辨子弟不得因有就近考試之例遂荒本業漢軍設廩增自順治九年始康熙十年滿蒙亦設廩增初制各二十名嗣減漢軍十名雍正間定額滿蒙六十漢軍三十直省廩增額府四十州三十縣二十衛十其新設者府學視州學州學視縣學其一學分兩學則均分其額或差分之六等黜陟法視明為繁密考列一等增附青社俱補廩無廩缺附青社補增無增缺青社復附各候廩原廩增停降者收復二等增補廩附青社補增無增缺青社復附停廩降增者復廩增降附者復增不許補廩三等停廩者收復候廩丁憂起復病痊考復緣事辨復增降附者許收復青衣發社者復附廩降增者不許復四等廩免責停餼不作缺限讀書六月送考停降者不許限考增附青社俱撲責五等廩停作缺原停廩者降增增降附附降青衣青衣發社原發社者黜為民六等廩膳十年以上發社六年以上與增十年以上者發本處充吏餘黜為民入學未及六年者發社科試一二等送鄉試幫補廩增如歲試大率祗列三等八旗生員給錢糧考列四等以下停給次屆列一二三等給還優等補廩增劣等降青社如漢生員八旗故重騎射往往不苛求文藝但置後等凡優恤諸生例免差徭廩生貧生給學租養贍違犯禁令小者府州縣行教官責懲大者申學政黜革後治罪地方官不得擅責學政校文外賞黜優劣以為勸懲如教官徇庇劣生不揭報或經揭報學政不嚴加懲處分別罰俸鐫級褫職其大較也光緒末科舉廢丙午並停歲科試天下生員無所託業乃議廣用途許考各部院謄録並於考優年令州縣官教官會保申送督撫學政考取文理暢達事理明晰者大省百名中省七十名小省五十名咨部以巡檢典史分別注選或分發試用各省學政改司考校學堂未幾學政裁教官停選在職者凡生員考職孝廉方正各事屬之俸滿用知縣或以直州同鹽庫大使用儒學雖不廢名存實亡非一日矣武生附儒學通稱武生順治初京衛武生童考試隸兵部康熙三年改隸學院直省府州縣衛武生儒學教官兼轄之騎射外教以武經七書百將傳及孝經四書學政三年一考順天舊設武學自八旗設儒學教官兼轄滿洲蒙古漢軍武生裁武學官大宛兩縣武生順天教官轄之學額如文生童例分大中小學自二十名遞減至七八名考試分內外場先外場騎射次內場策論歲試列一二等準作科舉故武生有歲試無科試各省書院之設輔學校所不及初於省會設之世祖頒給帑金風勵天下厥後府州縣次第建立延聘經明行修之士為之長秀異多出其中高宗明詔奬勸比於古者侯國之學儒學寖衰教官不舉其職所賴以造士者獨在書院其裨益育才非淺鮮也又有義學社學社學鄉置一區擇文行優者充社師免其差徭量給廩餼凡近鄉子弟十二歲以上令入學義學初由京師五城各立一所後各省府州縣多設立教孤寒生童或苗蠻黎瑤子弟秀異者規制簡略可無述也
