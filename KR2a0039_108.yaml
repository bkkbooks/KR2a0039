body:
  text: 清史稿卷一百八志八十三選舉三文科武科有清科目取士承明制用八股文取四子書及易書詩春秋禮記五經命題謂之制義三年大比試諸生於直省曰鄉試中式者為舉人次年試舉人於京師曰會試中式者為貢士天子親策於廷曰殿試名第分一二三甲一甲三人曰狀元榜眼探花賜進士及第二甲若干人賜進士出身三甲若干人賜同進士出身鄉試第一曰解元會試第一曰會元二甲第一曰傳臚悉仍明舊稱也世祖統一區夏順治元年定以子午卯酉年鄉試辰戌丑未年會試鄉試以八月會試以二月均初九日首場十二日二場十五日三場殿試以三月二年頒科場條例禮部議覆給事中龔鼎孳疏言故明舊制首場試時文七篇二場論表各一篇判五條三場策五道應如各科臣請減時文二篇於論表判外增詩去策改奏疏帝不允命仍舊例首場四書三題五經各四題士子各占一經四書主朱子集注易主程傳朱子本義書主蔡傳詩主朱子集傳春秋主胡安國傳禮記主陳澔集說其後春秋不用胡傳以左傳本事為文參用公羊穀梁二場論一道判五道詔誥表內科一道三場經史時務策五道鄉會試同乾隆間改會試三月殿試四月遂為永制鄉試先期提學考試精通三場生儒録送禁冒濫在監肄業貢監生本監官考送倡優隸皂之家與居父母喪者不得與試卷首書姓名籍貫年貌出身三代所習本經試卷題字錯落真草不全越幅曳白塗抹污染太甚及首場七藝起訖虛字相同二場表失年號三場策題訛寫暨行文不避廟諱御名至聖諱以違式論貼出士子用墨曰墨卷謄録用硃曰硃卷主考墨筆同考藍筆乾隆間同考改用紫筆未幾仍用藍試士之所曰貢院士子席舍曰號房撥軍守之曰號軍試官入闈封鑰內外門隔以簾在外提調監試等曰外簾官在內主考同考曰內簾官亦有內監試司糾察不與衡文事以大員總攝場務鄉試曰監臨順天以府尹各省初以巡按御史巡按裁巡撫為之會試曰知貢舉禮部侍郎為之順天提調以府丞監試以御史初各省提調以布政使監試以按察使各副以道員雍正間以藩臬兩司為一省錢穀刑名之總匯入闈月餘恐致曠滯提調監試專責二道員會試監試以御史殿試臨軒發策以朝臣進士出身者為讀卷官擬名第進呈或如所擬或有更定一甲狀元授修撰榜眼探花授編修二三甲進士授庶吉士主事中書行人評事博士推官知州知縣等官有差有清以科舉為掄才大典雖初制多沿明舊而慎重科名嚴防弊竇立法之周得人之盛遠軼前代其間條例之損益風會之變遷繫乎人才之盛衰朝政之得失述其大者不可闕也鄉會試首場試八股文康熙二年廢制義以三場策五道移第一場二場增論一篇表判如故行止兩科而罷四年禮部侍郎黃機言制科向係三場先用經書使闡發聖賢之微旨以觀其心術次用策論使通達古今之事變以察其才猷今止用策論減去一場似太簡易且不用經書為文人將置聖賢之學於不講請復三場舊制報可七年復初制仍用八股文二十四年用給事中楊爾淑請禮闈及順天試四書題俱欽命時詔誥題士子例不作文論表判策率多雷同剿襲名為三場並試實則首場為重首場又四書藝為重二十六年廢詔誥既而令五經卷兼作論題舊出孝經康熙二十九年兼用性理太極圖說通書西銘正蒙五十七年論題專用性理世宗初元詔孝經與五經並重為化民成俗之本宋儒書雖足羽翼經傳未若聖言之廣大論題仍用孝經乾隆三年兵部侍郎舒赫德言科舉之制憑文而取按格而官已非良法況積弊日深僥幸日衆古人詢事考言其所言者即其居官所當為之職事也時文徒空言不適於用墨卷房行輾轉抄襲膚詞詭說蔓衍支離苟可以取科第而止士子各占一經每經擬題多者百餘少者數十古人畢生治之而不足今則數月為之而有餘表判可預擬而得答策隨題敷衍無所發明實不足以得人應將考試條發改移更張別思所以遴拔真才實學之道章下禮部覆奏取士之法三代以上出於學漢以後出於郡縣吏魏晉以後出於九品中正隋唐至今出於科舉科舉之法不同自明至今皆出於時藝科舉之弊詩賦祗尚浮華而全無實用明經徒事記誦而文義不通唐趙匡所謂習非所用用非所習是也時藝之弊今該侍郎所陳奏是也聖人不能使立法之無弊在因時而補救之蘇軾有言得人之道在於知人知人之道在於責實能責實雖由今之道而振作鼓舞人才自可奮興若惟務徇名雖高言復古法立弊生於造士終無所益今謂時文經義及表判策論皆空言剿襲而無用者此正不責實之過凡宣之於口筆之於書皆空言也何獨今之時藝為然時藝所論皆孔孟之緒言精微之奧旨參之經史子集以發其光華範之規矩準繩以密其法律雖曰小技而文武幹濟英偉特達之才未嘗不出乎其中不思力挽末流之失而轉咎作法之涼不已過乎即經義表判論策苟求其實亦豈易副經文雖與四書並重積習相沿士子不專心學習若著為令甲非工不録表判論策皆加覆核必淹洽詞章通曉律令而後可為表判有論古之識斷制之才通達古今明習時務而後可為論策何一不可見之施為切於實用必變今之法行古之制將治宮室養遊士百里之內置官立師訟獄聽於是軍旅謀於是又將簡不率教者屏之遠方終身不齒毋乃紛擾而不可行況人心不古上以實求下以名應興孝則有割股廬墓以邀名者矣興廉則有惡衣菲食敝車羸馬以飾節者矣相率為僞借虛名以干進取及蒞官後盡反所為至庸人之不若此尤近日所舉孝廉方正中所可指數又何益乎司文衡職課士者誠能仰體諭旨循名責實力除積習杜絶僥幸文風日盛真才自出無事更張定制為也遂寢其議時大學士鄂爾泰當國力持議駁科舉制義得以不廢二十二年詔剔舊習求實效移經文於二場罷論表判增五言八韻律詩明年首場復增性理論御史楊方立疏請鄉會試增周禮儀禮二經命題帝以二禮義蘊已具於戴記不從四十七年移置律詩於首場試藝後性理論於二場經文後五十二年高宗以分經閲卷易滋弊竇且士子專治一經於他經不旁通博涉非敦崇實學之道命自明歲戊申鄉試始鄉會五科內分年輪試一經畢再於鄉會二場廢論題以五經出題並試永著為令科場擬題最重康熙五十二年以主司擬題多取四書五經冠冕吉祥語致多宿搆幸獲詔此後不拘忌諱向例禁考官擬出本身中式題至是弛其禁歷科試官多有以出題錯誤獲譴者先是康熙五十六年從詹事王奕清言場中七藝破承開講虛字概不謄寫以防關節乾隆四十七年令考官預擬破承開講虛字隨題紙發給士子遵用嘉慶四年以無關弊竇廢止制藝篇末用大結有明中葉每以此為關節康熙末年懸之禁令乾隆十二年編修楊述曾有復用大結之請大學士張廷玉等以為無益而弊竇愈起奏駁之初場文原定每篇限五百五十字康熙二十年增百字五十四年會元尚居易以首藝字逾千二百黜革乾隆四十三年始定鄉會試每篇以七百字為率違者不録自是遵行不易三場策題原定不得逾三百字乾隆元年禁士子空舉名目草率塞責其後考官擬題每問或多至五六百字空疏者輒就題移易點竄成篇三十六年左都御史張若溎以為言詔申明定例五十一年定答策不滿三百字照紕繆例罰停科然考官士子重首場輕三場相沿積習難移制義體裁以詞達理醇為尚順治九年壬辰會試第一程可則以悖戾經旨除名考官學士胡統虞等並治罪世宗屢以清真雅正誥誡試官乾隆元年高宗詔曰國家以經義取士將以覘士子學力之淺深器識之淳薄風會所趨有關氣運人心士習之端倪呈露者甚微而徵應者甚巨當明示以準的使士子曉然知所別擇於是學士方苞奉敕選録明清諸大家時文四十一卷曰欽定四書文頒為程式行之既久攻制義者或剽竊浮詞罔知根柢楊述曾至請廢制義以救其弊四十五年會試三名鄧朝縉首藝語意粗雜江南解元顧問四書文全用排偶考官並獲譴嘉慶中士子撏扯僻書字句為文競炫新奇御史辛從益論其失詔曰近日士子獵取詭異之詞以艱深文其淺陋大乖文體考官務各別裁僞體支離怪誕之文不得録取歷代輒以釐正文體責考官而迄無實效議者謂文風關乎氣運清代名臣多由科目出身無不工制義者開國之初若熊伯龍劉子壯張玉書為文雄渾博大起衰式靡康熙後益軌於正李光地韓菼為之宗桐城方苞以古文為時文允稱極則雍乾間作者輩出律日精而法益備陵夷至嘉道而後國運漸替士習日漓而文體亦益衰薄至末世而勦襲庸濫制義遂為人詬病矣光緒二十四年湖廣總督張之洞有變通科舉之奏二十七年鄉會試首場改試中國政治史事論五篇二場各國政治藝學策五道三場四書義二篇五經義一篇其他考試例此用之洞議也行之至廢科舉止鄉會考官初制順天江南正副主考浙江江西湖廣福建正主考差翰林官八員他省用給事中光祿寺少卿六部司官行人中書評事某官差往某省皆有一定康熙三年除其例順天初同各省簡正副二人乾隆中葉增為三用協辦大學士尚書以下副都御史以上官編檢不復與矣道光中簡三四人同治後額簡四人初考官不限出身康熙初主事蔡騶曹首望俱以拔貢典試十年從御史何元英請考官專用進士出身人員然舉人出身者間亦與焉雍正三年頒考試令始限翰林及進士出身部院官仍參用保舉例乾隆九年御史李清芳言大臣保舉應差主考四十九人滿洲四各直省十六餘均江浙人保薦者大都平日往來相知饒於財而憑於勢至守正不阿者不肯伺候公卿之門邊隅之士聲氣不通交游不廣無人薦舉請將合例人員通行考試帝疑清芳未列保薦激為是語不允所請仍考試保舉並行三十六年後考試遂著為令初御試録取名單皆發出其後密定名次不復揭曉嘉慶以後更別試侍郎閣學及三品京堂等官曰大考差會試總裁初用閣部大員四人或六人多至七人嗣簡二三人或四五人咸豐後簡四人以為常同考官初順天試京員推知並用各省用甲科屬官及鄰省甲科推知或鄉科教官房數無定會試初用二十人翰林官十二六科四吏禮兵部官各一戶刑工部官每科輪用一嗣額定十八人順天試同康熙五十四年令不同省房官二人同閲互相覺察用三十六人未幾即罷康雍間順天房考停用京員止用直隸科甲知縣各省停用本省現任知縣專調用鄰省在籍候選進士舉人大省十八中省十四小省十二至十均分經校閲厥後增減不一小省減至八人乾隆間禮闈及順天同考始欽簡京員各省復用本省科甲屬官四十二年停五經分房之例至順天房考南北省人回避南北皿卷邊省人回避中皿卷會房則同省相回避云考官綜司衡之責房考膺分校之任歷代極重其選康熙間順天同考官庶吉士鄭江以校閲允當授職檢討雍正元年會試總裁朱軾張廷玉持擇公允帝嘉之加太傅太保有差其衡鑒不公草率將事者罰不貸而交通關節賄賂厥辜尤重順治十四年丁酉順天同考官李振鄴張我朴受科臣陸貽吉博士蔡元禧進士項紹芳賄中田耜塢作霖舉人給事中任克溥奏劾鞫實詔駢戮七人於市家産籍沒戍其父母兄弟妻子於邊考官庶子曹本榮中允宋之繩失察降官江南主考侍講方猶檢討錢開宗賄通關節江寧書肆刊萬金傳奇記詆之言官交章論劾刑部審實世祖大怒猶開宗及同考葉楚槐等十七人俱棄市妻子家産籍沒一時人心大震科場弊端為之廓清者數十年康熙五十年辛卯江南士子吳泌程光奎賂副考官編修趙晉獲中二人素不能文輿論譁然事聞命尚書張鵬翮會江南督撫嚴鞫蘇撫張伯行劾總督噶禮賄賣徇庇噶禮亦劾伯行他罪詔俱解任令鵬翮會總漕赫壽確訊覆奏請鐫噶禮級罷伯行職帝怒二人掩飾和解復遣尚書穆和倫張廷樞往鞫奏略如鵬翮等指部議互訐乖大臣體應並褫職帝卒奪噶禮職以伯行清名素著褫職仍留任處晉及同考王曰俞方名大辟以失察奪正考官左必蕃官是年福建房考吳肇中亦以賄伏法考官檢討介孝主事劉儼失察削職咸豐八年戊午順天舉人平齡硃墨卷不符物議沸騰御史孟傳金揭之王大臣載垣等訊得正考官大學士柏葰徇家人靳祥請中同考編修浦安房羅鴻繹卷比照交通囑託賄買關節例柏葰浦安棄市餘軍流降革至數十人副考官左副都御史程庭桂子郎中炳采坐接收關節伏法庭桂遣戍蓋載垣端華及會審尚書肅順素惡科目與柏葰有隙因搆興大獄擬柏葰極刑論者謂靳祥已死未為信讞也然自嘉道以來公卿子弟視巍科為故物斯獄起北闈積習為之一變光緒十九年編修丁維禔典陝試同年友饒士騰先期為之輾轉囑託事覺俱逮問士騰自殺尋並削職有無與關節賄賂而獲咎者康熙三十八年己卯御史鹿佑劾順天闈考試不公正考官修撰李蟠遣戍副主考編修姜宸英牽連下吏未置對死獄中宸英浙江名士善屬古文舉朝知其無罪莫不歎惜四十四年乙酉順天主考侍郎汪霦贊善姚士藟校閲草率落卷多不加圈點下第者束草如人至其門戮之事聞奪職六十年辛丑會試副總裁左副都御史李紱用唐人通榜法拔取知名之士下第者喧鬨於其門被劾落職發永定河效力然是闈一時名宿網羅殆盡頗為時論所許其他賄通關節未經敗露與因微眚獲譴者例尤不一鄉試解額順治初定額從寬順天江南皆百六十餘名浙江江西湖廣福建皆逾百名河南山東廣東四川山西陝西廣西雲南自九十餘名遞殺至貴州四十名為最少俱分經取中順天試直隸生員貝字號約占額十之七北監生皿字號十之三宣化旦字奉天夾字僅二三名江南試南監生皿字號約十之二餘為江安併闈生員額南雍罷南監中額併入北監十四年監生分南北卷直隸八府延慶保安二州遼東宣府山東山西河南陝西四川廣西為北皿江南浙江江西福建湖廣廣東為南皿視人數多寡定中額十七年減各直省中額之半康熙間先後廣直省中額五十年又各增五之一雍正元年湖南北分闈照舊額分中各省略有增減乾隆元年順天皿字分南北中卷奉天直隸山東河南山西陝西為北皿江南江西福建浙江湖廣廣東為南皿各中額三十九四川廣西雲南貴州另編中皿十五取一江南分上下江取中下江江蘇十之六上江安徽十之四九年嚴定搜檢之法北闈以夾帶敗露者四十餘人臨時散去者三千八百數十人曳白與不終篇文不切題者又數百人帝既治學政祭酒濫送之罪詔減各直省中額十之一於是定順天南北皿各三十六中皿改二十取一貝字百二夾旦各四江南上江四十五下江六十九浙江江西皆九十四福建八十五廣東七十二河南七十一山東六十九陝西六十一山西四川皆六十雲南五十四湖北四十八湖南廣西皆四十五貴州三十六自是率行罔越光緒元年陝甘分闈取中陝西四十一甘肅三十咸同間各省輸餉輒數百萬先後廣中額四川二十江蘇十八廣東十四福建及臺灣十三浙江湖南湖北江西山西安徽甘肅雲南貴州各十陝西九河南廣西各八直隸山東各二視初定中額尚或過之會試無定額順治三年九年俱四百名分南北中卷浙江江西福建湖廣廣東五省江寧蘇松常鎮淮揚徽寧池太十一府廣德一州為南卷中二百三十三名山東山西河南陝西四省順天永平保定河間真定順德廣平大名八府延慶保安二州奉天遼東大寧萬全諸處為北卷中百五十三名四川廣西雲南貴州四省安廬鳳滁徐和等府州為中卷中十四名十二年中卷併入南北卷厥後中卷屢分屢併或更於南北中卷分為左右或專取川廣雲貴四省各編字號分別中一二三名五十一年以各省取中人數多少不均邊省或致遺漏因廢南北官民等字號分省取中按應試人數多寡欽定中額歷科大率三百數十名少或百數十名而以雍正庚戌四百六名為最多乾隆己酉九十六名為最少五經中式仿自明代以初場試書藝三篇經義四篇其合作五經卷見長者因有二十三篇之目順治乙酉山東鄉試法若真以全作五經文賜內閣中書一體會試康熙丁卯順天鄉試浙江監生查士韓福建貢生林文英壬午順天南皿監生莊令輿俞長策皆以兼作四書五經文二十三篇違式奏聞俱授舉人詔嗣後不必禁止旋著為令鄉會試五經卷於額外取中三名二場添詔誥各一於是習者益衆直隸陝西等省至有以五經卷掄元者五十年增各省鄉試一名順天二名會試三名五十六年停五經應試雍正初復其制順天皿字號中四名各省每額九名加中一名大省人多文佳額外量取副榜三四名四年丙午詔是科以五經中副榜者准作舉人一體會試尤為特異乾隆十六年始停五經中式之例至歷代臨雍增北闈監生中額恩詔廣鄉會試中額均屬於常額外也鄉會試正榜外取中副榜會試副榜免廷試咨吏部授職康熙三年罷之鄉試副榜原定順天二十名江南十二江西十一浙江福建湖廣各十山東河南各九山西陝西四川廣東各八廣西六取文理優者不拘經房康熙元年停取十一年取中如舊例增雲南五貴州四嗣是各直省率正榜五名中一名惟恩科廣額不與焉雍正四年准是科由副榜復中副榜者作舉人非常例也雍正五年命各省督撫學政甄別衰老教職休致之缺以是年會試落卷文理明順之舉人補授乾隆間屢行選取如例大中小省各數十名明通別為一榜二十六年廷議於明通榜外選取中書四十名其餘年力老成宜課士者另選用學正學録數名報可五十五年悉罷此後下第者於正榜外挑取謄録北闈數百名或百數十名會試額定四十名備各館繕寫積資得邀議此則旁搜博採俾寒畯多獲進身之階也八旗以騎射為本右武左文世祖御極詔開科舉八旗人士不與順治八年吏部疏言八旗子弟多英才可備循良之選宜遵成例開科於鄉會試拔其優者除官報可八旗鄉會試自是年始其時八旗子弟每牛彔下讀滿漢書者有定額應試及各衙門任用悉於此取給額外者不得習往往不敷取中故自十四年至康熙十五年八旗考試時舉時停先是鄉會試殿試均滿洲蒙古為一榜漢軍漢人為一榜康熙二十六年詔同漢人一體應試尋定制鄉會場先試馬步箭騎射合格乃應制舉庶文事不妨武備遂為永制初八旗鄉試僅試清文或蒙古文一篇會試倍之漢軍試書藝二篇經藝一篇不通經者增書藝一篇二三闈試論策各一逐科遞加自與漢人合試非復前之簡易矣鄉試中額順治八年定滿洲漢軍各五十蒙古二十嗣減滿洲漢軍各五之一蒙古四之一康熙八年編滿蒙為滿字號漢軍為合字號各取十名二十六年再減漢軍五名後復遞增乾隆九年詔各減十之一定為滿蒙二十七漢軍十二同治間以輸餉增滿蒙六名漢軍四名各省駐防初亦應順天試嘉慶十八年始於駐防省分試之十人中一多不逾三名副榜如例會試初制滿洲漢軍進士各二十五蒙古十康熙九年編滿合字號如鄉試例各中四名嗣亦臨時請旨無定額宗室不應鄉會試聖祖世宗降有明諭乾隆八年宗人府試宗學拔其尤者玉鼎柱等為進士一體殿試是為宗室會試之始未久即停嘉慶六年宗室應鄉會試始著為令先期宗人府或奉天宗學考試騎射如例試期於文闈鄉會試場前或場後或同日試制藝律詩各一一日而畢鄉試九人中一人會試考官酌取數卷候親裁別為一榜殿試朝考滿漢一體除庶吉士等官有差順治十五年帝以順天江南考官俱以賄敗親覆試兩闈舉人是為鄉試覆試之始取順天米漢雯等百八十二名准會試江南汪溥勳等九十八名准作舉人罰停會試除名者二十二名惟吳珂鳴以三次試卷文理獨優特許一體殿試異數也康熙三十八年帝以北闈取士不公命集內廷覆試列三等以上者許會試四等黜之五十一年壬辰順天解元查為仁以傳遞事覺而逸帝疑新進士有代倩中式者親覆試暢春園黜五人會試覆試自是始乾隆間或命各省督撫學政於鄉試榜後覆試或專覆試江蘇安徽江西浙江廣東山西六省丙午前三科俊秀貢監中式者或止覆試中式進士或北闈舉人臨期降旨無定例五十四年貢士單可虹覆試詩失調訛舛不符中卷除名詔旨嚴切謂禮闈非嚴行覆試不足拔真才懲幸進至嘉慶初遂著為令道光二十三年定制各省舉人一體至京覆試非經覆試不許會試以事延誤於下三科補行除丁憂展限外託故不到以規避論永停會試與赴部銓選覆試期以會試年二月咸同間因軍興道路梗阻光緒季年以辛丑條約京師停試假闈河南俱得先會試後覆試非恆制也覆試詩文疵謬詩失粘撎寫錯誤不避御名廟諱至聖諱罰停會試殿試一科或一科以上文理不通或文理筆跡不符中卷者黜乾隆五十八年中式舉人鄧棻春等八名補覆試停科者五斥革者二監臨俱獲譴歷科因是黜罰者有之洎末造益趨寬大光緒十九年北闈倩作頂替中式者至數十人言官劾舉人周學熙湯寶霖蔡學淵陳步鑾黃樹聲萬航六人下所司舉出録科中卷不符者學淵樹聲航三人俱斥革餘覆試無一黜者監臨各官均免議而僥幸者接跡矣定例各省鄉試揭曉後依程限解卷至部磨勘遲延者罪之蓋防考官闈後修改試卷避吏議也磨勘首嚴弊幸次檢瑕疵字句偶疵者貸之字句可疑文體不正舉人除名若干卷以上考官及同考革職或逮問不及若干卷奪俸或降調其校閲草率雷同濫惡雜然並登及試卷不諳禁例字句疵蒙謬纇題字錯落真草不全謄録錯誤內外簾官舉子議罰有差禁令之密前所未有也磨勘官初禮部及禮科主之康熙間始欽派大臣專司其事解額漸廣試卷日多於是令九卿公同磨勘六部官牽於職事以其餘暇勘校往往虛應故事乾隆初改任都察院科道五品以上科甲京堂中贊以上翰詹官集朝房磨勘嗣復增編檢額定四十人以專責成先是磨勘試卷不署名亦無功過之條與斯役者每託名寬厚不欲窮究乾隆二十一年始令磨勘官填注銜名二十五年復增大臣覆勘例分別議議處功令始嚴是年特派秦蕙田觀保錢汝誠為覆勘大臣事竟原勘官御史朱丕烈劾其瞻徇下軍機大臣核覆蕙田等實有誤駁及疏漏之處丕烈亦以彈劾不實俱下部議其時磨勘諸臣慎重將事不稍假借一變因循敷衍之習太僕寺卿宮煥文御史閻循琦朱稽朱丕烈嘉慶初御史辛從益俱以抉摘精審聞於時歷科考官舉子因是譴黜者不乏人而藉端報復蓋亦有之乾隆六十年乙卯會元為浙江王以鋙第二名即其弟以銜帝心異之正總裁侍郎竇光鼐素與和珅不協且以詆訶後進忤同列均欲藉以傾之因摘兩人闈墨中並有王道本乎人情語以為關節抑置以鋙榜末停其殿試降光鼐四品休致鐫副總裁侍郎劉躍雲祭酒瑚圖禮四級及廷試傳唱以銜第一上意釋然諭廷臣曰此亦豈朕之關節耶以鋙後亦入詞館嘉慶五年磨勘官辛從益戴璐於北闈策題試卷指摘不遺餘力從益江西籍向以嚴於磨勘稱是科江西僅中一人璐子下第人謂因是多所吹求上聞命二人退出磨勘班同治間鴻臚寺少卿梁僧寶復以磨勘過嚴為人所憚蓋自磨勘例行足以糾正文體抉剔弊竇裨益科目非淺鮮也庶吉士之選無定額順治三年世祖始策貢士於廷賜一甲三人傅以漸等及第簡梁清寬等四十六人為庶吉士四年六年復選用九年以給事中高辛允言按直省大小選庶吉士直隸江南浙江各五人江西福建湖廣山東河南各四人山西陝西各二人廣東一人漢軍四人另榜授滿洲蒙古修撰編修庶吉士九人自是考選如例惟滿蒙漢軍選否無常康熙間新進士得奏請讀書中祕輒以家世多任館閣或邊隅素少詞臣為言間邀俞允故自四十五年至六十七年科中各省皆有館選世宗令大臣舉所知參用廷對後親試文藝雍正元二年間漢軍蒙古山西河南陝西湖南及諸邊省每不入選三年太常寺少卿李鍾峨疏請分省簡選廣儲材之路廷議駁之五年詔內閣會議簡選庶常之法尋議照雍正癸卯科例殿試後集諸進士保和殿考試仍令九卿確行保舉考試用論詔奏議詩四題是為朝考之始乾隆元年御史程盛修言翰林地居清要欲得通材務端始進自保舉例行而呈身識面廣開請託之門額手彈冠最便空疏之輩宜亟停止報可高宗諭禁向來新進士請託奔競呈送四六頌聯之陋習既慎校文藝復令大臣察其儀止年歲分為三等欽加簡選三年罷大臣揀選例依省分甲第引見臨時甄別録用後世踵行其制嘉慶以來每科庶常率倍舊額各省無不入選者矣凡用庶吉士曰館選初制分習清漢書隸內院以學士或侍讀教習之自康熙九年專設翰林院歷科皆以掌院學士領其事內閣學士間亦參用三十三年命選講讀以下官資深學優者數人分司訓課曰小教習六十年以禮部尚書陳元龍領教習事厥後尚書侍郎閣學之不兼掌院事者並得為教習大臣滿漢各一雍正十一年特設教習館頒內府經史詩文戶部月給廩餼工部供張什物俾庶吉士肄業其中尤為優異三年考試散館優者留翰林為編修檢討次者改給事中御史主事中書推官知縣教職其例先後不一間有未散館而授職編檢者或供奉內廷或宣諭外省或校書議或召試詞科皆得免其考試凡留館者遷調異他官有清一代宰輔多由此選其餘列卿尹膺疆寄者不可勝數士子咸以預選為榮而鼎甲尤所企望康熙間庶吉士張逸少散館改知縣遷秦州知州其父大學士玉書奏乞內用復得授編修三十年辛未上以鼎甲久無北人親擢黃叔琳一甲三名叔琳大興人雍正間大學士張廷玉子若靄廷對列一甲第三廷玉執不可上為抑置二甲第一誠重之也先是順治九年選庶常四十人擇年青貌秀者二十人習清書嗣每科派習十數人不等散館試之乾隆十三年修撰錢維城考列清書三等命再試漢書始留館其專精國書者漢文或日就荒落十六年高宗以清書應用殊少而邊省館選無多命雲南貴州四川廣東廣西等省庶吉士不必派習清書他省視人數酌派年力少壯者一二員或二三員但循舉舊章備國朝典制已足其因告假丁憂年齒已長者例准改習漢書於是習者日少道光間例停穆宗初元令以治經治史治事及濂洛關閩諸儒之書課諸庶常光緒季年設進士館課鼎甲庶吉士及閣部官以法政諸科學或資遣游學異國業成而試優者授職奬擢俱未久即罷達官世族子弟初制一體應試而中式獨多其以交通關節敗者順治十四年少詹事方拱乾子章鉞應江南試以與正主考方猶聯族獲中事覺遣戍康熙二十三年都御史徐元文子樹聲侍講學士徐乾學子樹屏同中順天試上以是科南皿悉中江浙籍命嚴勘斥革五人樹聲樹屏俱黜三十九年帝以搢紳之家多占中額有妨寒畯進身之路殿試時諭讀卷諸臣是科大臣子弟置三甲以裁抑之尋詔定官民分卷之法鄉試滿合字號二十卷中一直省視舉額十分中一副榜如之會試除雲南貴州四川廣西四省外編官卷二十人中一未幾罷會試官卷乾隆十五年廷臣有以官生過優為言者部議仍舊詔責其回護並及吏禮二部司官編官卷之不當令再議始議中額二十五中官卷一吏禮部司員及內閣侍讀子弟停編官卷明年再議以京官文四品外官文三品武二品以上及翰詹科道等官為限並減中額順天十四浙江六餘省五至一名二十三年大學士蔣溥學士莊存與復以為言令官生大省二十卷中一中省十五卷小省十卷中一滿蒙漢軍如小省例南北皿如中省例中皿額中一名不足一名入民卷永以為例鄉會試考官房考監臨知貢舉監試提調之子孫及宗族例應回避雍乾間或另試或題由欽命另簡大臣校閲乾隆九年停其例並受卷彌封謄録對讀等官子弟戚族亦一體回避矣有清重科目不容幸獲惟恩遇大臣嘉惠儒臣耆年邊方士子不惜逾格歷代優禮豫告或在職大臣與夫奬飾終之典賜其子孫舉人進士有成例者無論已至如雍正七年廷臣遵旨舉出入闈未中式之大學士蔣廷錫子溥尚書嵇曾筠子璜等十二人俱賜舉人侍郎劉聲芳子俊邦以疾未與試賜舉人尤為特典康熙間浙江舉人查慎行江蘇舉人錢名世監生何焯安徽監生汪灝以能文受上知召試南書房賜焯灝舉人四十二年賜焯灝蔣廷錫進士六十年以內廷行走舉人王蘭生留保學問素優禮闈不第俱賜進士雍正八年賜江南舉人顧天成廣東舉人盧伯蕃殿試乾隆十八年賜內廷行走監生徐揚楊瑞蓮舉人四十三年助教吳省蘭助教銜張羲年以校四庫書賜殿試俱非常例乾隆以來凡年七十以上會試落第者豫司業編檢學正等銜鄉試年老諸生賜舉人副榜雍正十一年詔於雲貴廣東西四川福建會試落卷擇文理可觀人材可用者拔取時餘等十人一體殿試趙繩其等四十人揀選録用乾隆初揀選如例則邊省士子猶沐殊恩也歷科情形略異者順治三年從大學士剛林請以天下初定廣收人才再舉鄉會試十六年以雲貴新附綏輯需人再舉禮部試均不循子丑之舊康熙十六年鄉試順天專遣官山東山西陝西併河南省湖廣江西併江南省福建併浙江省考試試期九月十五人中一不取副榜亦無會試江南榜江西無中式者咸同間軍興各直省或數科不試或數科併試倍額取中或一省止試數府州縣減額取中試期或遲至十月十一月不拘成例順天正主考初制均差翰林官康熙初沿明制以前一科一甲一名為之士子希詭遇者得預通聲氣二十年修撰歸允肅主順天闈撰文自誓力除積弊不通關節榜後下第者譁然冀興大獄刑部尚書魏象樞暴其事浮議始息制亦尋廢二年順天春秋題邾子訛邾人罷考官白乃貞等職士子因書子字貼出者弘文院官覆試優者准作舉人無中式者雍正元年順天榜後命大學士王頊齡等同南書房翰林檢閲落卷中二人是年會試覆檢如前中落卷七十八人二年中七十七人乾隆元年中三十八人後不復行雍正四年以浙人查嗣庭汪景祺著書悖逆既按治因停浙江鄉會試未幾以李衛等請弛其禁七年廣東連州知州朱振基私祀呂留良生員陳錫首告上嘉之令是科連州應試完場舉子由學政遴取優通者四人賞舉人乾隆四十六年辛丑會試江南解元錢棨領是科會狀嘉慶二十五年庚辰會試廣西解元陳繼昌亦領是科會狀士子豔稱三元有清一代二人而已八旗與漢人一體考試康乾以來無用鼎甲者同治四年蒙古崇綺以一甲一名及第光緒九年宗室壽耆以一甲二名及第漢軍鼎甲尤多至歷代捐輸軍餉賑發園庭工程賞舉人拏獲叛匪及殺賊立功有貢監給舉人舉人給進士之例則又一時權宜之制也初太宗於蒙古文字外製為清書天聰八年命禮部試士取中剛林等二人習蒙古書者俄博特等三人俱賜舉人嗣再試之順治八年舉行八旗鄉試不能漢文者試清文一篇再舉而罷康熙初復行翻譯鄉試自滿漢合試制舉文罷翻譯科雍正元年詔八旗滿洲於考試漢字生員舉人進士外另試翻譯廷議三場並試滿漢正副考官各二滿同考官四詔鄉試止試一場或章奏一道或四書五經量出一題省漢考官增謄録餘如文場例嗣後翻譯諭旨或於性理精義及小學限三百字命題乾隆三年令於翻譯題外作清文一篇七年定會試首場試清字四書文孝經性理論各一篇二場試翻譯凡滿洲漢軍滿漢字貢監生員筆帖式皆與鄉試文舉人及武職能翻譯者准與會試先試騎射如例蒙古翻譯科雍正九年詔試蒙古主考官一同考倍之初令鄉會試題俱以蒙字譯清字四書章奏各一道乾隆元年改譯清文性理小學與滿洲翻譯同場試別為一榜時應清文鄉試者率五六百人額中三十三名應蒙文鄉試者率五六十人額中六名原定翻譯鄉會試三年一次然會試訖未舉行乾隆四年以鄉試已歷六科八月始行會試中滿洲二十名蒙古二名因人數無多詔免殿試俱賜進士出身優者用六部主事二十二年以翻譯科大率尋章摘句無關翻譯本義詔停四十三年復行鄉試罷謄録對讀明年會試向例須滿六十人是科僅四十七人特准會議免廷試如四年例自是每屆三年試否請旨定奪五十二年更定鄉會試五年一次然會闈自五十三年訖嘉慶八年僅一行之猶不足定例六十名之數且槍冒頂替弊端不可究詰蒙文嘗以不足七八人停試雖詔旨諄諄勉以國語騎射為旗人根本而應試者終屬寥寥八年從侍郎賡音請復舊制三年一舉以為常二十四年定鄉覆試如文闈例道光八年罷翻譯同考官末年始有用庶吉士者各省八旗駐防初但應漢文鄉會試道光二十三年改試翻譯十人中一三名為額宗室應翻譯試自乾隆時始別為一題中額欽定武科自世祖初元下詔舉行子午卯酉年鄉試辰戌丑未年會試如文科制鄉試以十月直隸奉天於順天府各省於布政司中式者曰武舉人次年九月會試於京師中式者曰武進士凡鄉會試俱分試內外三場首場馬射二場步射技勇為外場三場策二問論一篇為內場外場考官順天及會闈以內大臣大學士都統四人為之內場考官順天以翰林官二人會闈以閣部都察院翰詹堂官二人為之同考官順天以科甲出身京員四人會闈以科甲出身閣科部員四人為之會試知武舉兵部侍郎為之各直省以總督巡撫為監臨主考官科甲出身同知知縣四人為同考官外場佐以提鎮大員其餘提調監射監試受卷彌封監門巡綽搜檢供給俱有定員大率視文闈減殺殿試簡朝臣四人為讀卷官欽閲騎射技勇乃試策文臨軒傳唱狀元榜眼探花之名一如文科初制一甲進士或授副將參將遊擊都司二三甲進士授守備署守備其後一甲一名授一等侍衛二三名授二等侍衛二三甲進士授三等及藍翎侍衛營衛守備有差凡各省武生緑營兵丁皆得應鄉試武舉及現任營千把總門衛所千總年滿千總通曉文義者皆得應會試惟年逾六十者不許應試其後武職會試以武舉出身者為限康熙間欲收文武兼備之材嘗許文生員應武鄉試文舉人應武會試頗滋場屋之弊乾隆七年以御史陳大玠言停文武互試例考試初制首場馬箭射氈毬二場步箭射布侯均發九矢馬射中二步射中三為合式再開弓舞刀掇石試技勇順治十七年停試技勇康熙十三年復之更定馬射樹的距三十五步中三矢為合式不合式不得試二場步射距八十步中二矢為合式再試以八力十力十二力之弓八十斤百斤百二十斤之刀二百斤二百五十斤三百斤之石弓開滿刀舞花掇石去地尺三項能一二者為合式不合式不得試三場合式者印記於頰嗣改印小臂以杜頂冒三十二年步射改樹的距五十步中二矢為合式乾隆間復改三十步射六矢中二為合式馬射增地毬而弓刀石三項技勇必有一項係頭號二號者方准合式遂為永制內場論題向用武經七書聖祖以其文義駁雜詔增論語孟子於是改論題二首題用論語孟子次題用孫子吳子司馬法鄉試中額康熙二十六年制定略視各省文闈之半雍正間小有增減惟陝甘以人材壯健弓馬嫻熟自康熙訖乾隆先後各增中額三十名咸同間各省輸餉廣額如文闈例綜計順天中額百十漢軍四十奉錦三江南八十一福建六十三浙江四川各六十陝西五十九河南五十五江西廣東甘肅各五十四山西五十山東四十八雲南四十二廣西三十六湖北三十五湖南三十四貴州二十五會試中額多或三百名少亦百名康熙間內場分南北卷各中五十名五十二年始分省取中臨期以外場合式人數請旨裁定嘉慶六年仁宗以科目文武並重文闈條例綦嚴防弊周密武闈考官面定去取尤易滋弊命比照文闈磨勘例鄉試題名録將中式武生馬步射技勇一一詳注進呈各省交兵部順天另簡磨勘官核對濫中及浮報者懲不貸覆試始乾隆時初制從嚴僅會闈行之不符者罰停科考官議處三次覆試不合式除名道光十五年始覆試順天武舉如會試例咸豐七年覆試各省武舉如順天例然稍從寬典矣初制外場但有合式一格其中弓馬優劣技勇強弱無所軒輊內場但憑文取中致羔天騎射習場藝者或遭遺棄康熙五十二年令會試外場擇馬步射技勇人材可觀者編好字號密送內簾內場試官先於好字卷內擇文理通曉者取中不足始於合式卷內選取雍正二年從侍郎史貽直言各省鄉試外場一體別編好字號嗣於好字號再分雙好單好內場先中雙好次中單好而合式卷往往千餘人僅中數人因之內場槍冒頂替諸弊並作乾隆二十四年御史戈濤奏革其弊於是外場嚴合式之格內場罷四書論文理但取粗通者而文字漸輕嘉慶十二年鄉會試內場策論改默寫武經百餘字無錯誤者為合式罷同考官遂專重騎射技勇內場為虛設矣歷代踵行莫之或易光緒二十四年內外臣工請變更武科舊制廢弓矢刀石試鎗炮未許二十七年卒以武科所習硬弓刀石馬步射無與兵事廢之滿洲應武科始雍正元年鄉試中二十名會試中四名十二年詔停數十年無復行者嘉慶十八年復舊制滿蒙鄉試中十三名各省駐防就該省應試率十人中一多者十名少或一名會試無定額凡驍騎校城門吏藍翎長拜唐阿恩騎尉親軍前鋒護軍領催馬甲巡捕營千總把總及文員中書七八品筆帖式廕生俱准與武生同應鄉試鄉會試內外場與漢軍漢人一例考試
