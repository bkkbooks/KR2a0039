body:
  text: 清史稿卷一百十志八十五選舉五封廕推選封贈之制文職隸吏部八旗緑營武職隸兵部順治間覃恩及三年考滿均給封贈康熙初廢文武職考滿封贈文職封贈之階初正一品特進光祿大夫尋改光祿大夫從一品光祿大夫後改榮祿大夫正二品資政大夫從二品通奉大夫正三品通議大夫從三品中議大夫正四品中憲大夫從四品朝議大夫正五品奉政大夫從五品奉直大夫正六品承德郎從六品儒林郎吏員出身者宣德郎正七品文林郎吏員出身者宣議郎從七品徵仕郎正八品修職郎從八品修職佐郎正九品登仕郎從九品登仕佐郎武職封贈之階初分三系一曰滿漢公侯伯封光祿大夫後改建威將軍二曰八旗一光祿大夫二品資政大夫三品通議大夫四品中憲大夫五品奉政大夫六品承德郎後改武信郎七品文林郎後改奮武郎八品修職郎九品登仕郎乾隆三十二年改同緑旗三曰緑旗營封贈官階屢變初制正從一品榮祿大夫正二品驃騎將軍從二品驍騎將軍正三品昭勇將軍從三品懷遠將軍正四品明威將軍從四品宣武將軍正五品武德將軍從五品武略將軍正六品昭信校尉從六品忠顯校尉後增正七品奮勇校尉乾隆二十年改正二品武顯大夫從二品武功大夫正三品武義大夫從三品武翼大夫正四品昭武大夫從四品宣武大夫正五品武德郎從五品武略郎正六品武信郎從六品武信佐郎正七品奮武郎三十二年改正一品建威大夫從一品振威大夫增從七品奮武佐郎正八品修武郎從八品修武佐郎八旗與緑營制度始畫一五十一年改正一品建威將軍從一品振威將軍正二品武顯將軍從二品武功將軍正三品武義都尉從三品武翼都尉正四品昭武都尉從四品宣武都尉正五品武德騎尉從五品武德佐騎尉正六品武略騎尉從六品武略佐騎尉正七品武信騎尉從七品武信佐騎尉正八品奮武校尉從八品奮武佐校尉增正九品修武校尉從九品修武佐校尉於是文武官階等級相侔矣文武正從一品妻封一品夫人滿漢公妻為公妻一品夫人侯妻為侯妻一品夫人伯妻為伯妻一品夫人正從二品夫人正從三品淑人正從四品恭人正從五品宜人正從六品安人正從七品孺人正從八品八品孺人正從九品九品孺人武職八旗八品以下緑旗營七品以下妻無封後改緑營正七品妻封孺人順治五年定制凡遇恩詔一品封贈三代誥命四軸二三品封贈二代誥命三軸四五品封贈一代誥命二軸六七品封贈一代敕命二軸八九品止封本身敕命一軸凡軸端一品用玉二品用犀三四品用裹金五品以下用角凡推封之例順治初制父祖現任者不得受子孫封致仕及已故者許給願棄職就封者聽兩子均仕其父母受封從其品大者婦人因子封贈而夫與子兩有官亦從其品大者父官高於子者嫡母從父官生母從子官為人後者已封贈祖父母父母請以本身妻室封典貤封本生祖父母父母者許貤封康熙五年定父職高於子者依父原品封贈官卑於子者從子官封贈武職子現任文職封贈依文官例雍正三年定四品至七品官願將本身妻室封典貤封祖父母者八九品官願貤封父母者皆許貤封三品以上貤封曾祖父母者請旨定奪乾隆間折中禮制頗有更定二十七年諭曰子孫官品不及祖父之崇則父為大夫子為士記有明文舊例依祖父原階封贈殊未允協其議改之吏部議定文武官子孫職大祖父職小依子孫官階封贈祖父職大子孫職小不得依祖父原品封贈父官高於子者生母從子官封贈嫡母繼母不得依父官請封願依子官受封者聽武職子任文職者亦如之五十年定一品至三品官不得貤封高祖父母四品至七品官不得貤封曾祖父母八品官以下不得貤封祖父母道光以後捐封例開二十三年許三品以上官欲捐請本生曾祖父母封贈者得依貤封曾祖父母例報捐二十八年許四品至七品官捐請貤封曾祖父母八品官以下捐請貤封祖父母均依常例加倍報捐而限制始廢矣舊例八九品官許封父母不封本身妻室應封妻者止封正妻一人正妻未封已歿繼室當封者正妻亦得追贈其再繼者不得給封道光二十三年許八品以下捐封人員欲捐請及妻室者加倍報捐咸豐二年許京外文職及捐職人員得先封本身及原配繼配妻室再依本身品級為第三繼妻捐封四年並從部議第三繼妻以後誼同敵體亦許依次遞捐矣舊例仕宦至三品幼為外祖父母撫養其外祖父母歿無嗣者許依其官階貤贈其餘外姻不許貤封道光二十三年許捐封人員為其受恩撫養之母舅舅母姑夫姑母姨夫姨母妻父妻母依貤封外祖父母例捐請貤封咸豐三年並許貤封曾祖父母伯叔祖父母伯叔父母庶母兄嫂並嫡堂伯叔祖父母嫡堂伯叔父母嫡堂兄嫂從堂再從堂尊長及外曾祖父母外祖父母妻祖父母按例定品級一體捐請又許為人婦者為其已故夫之祖若父捐職請封為人後者為祖若父貤封其先人展轉推衍而經制蕩然矣加級請封之制其初限制亦嚴順治初凡恩詔加級者以新加之級給封康熙五十二年定例七品以下加級請封不得逾五品五六品不得逾四品三四品不得逾二品捐級不得計算乾隆間外官加級不論新舊不得依加級請封五十年部議京官八品以下得依加級請五品封不惟逾分亦覺太優嗣後八品以下不得逾七品在外未入流不得給封願捐納榮親者許其捐封從之嘉慶後限制漸寬京外官恭遇覃恩許報捐新級請封議三四品職銜人員加級捐請二品封典許加倍納銀按現任及候補候選例給封咸豐初撫廣捐例京外各官及捐職人員由加級及捐加之級捐封者現任及候補候選三四品官許捐至二品其五六品加等捐請三品封者依常例加倍報捐加等捐請至二品者依四品職銜得捐二品封例加倍半報捐其七品加等捐請三四品封八品以下加等捐請五六品封均依常例分別加倍報捐十年定三品人員加級捐封按一品人員銀數加倍許給從一品封二三品虛銜人員捐從一品封應按二三品實職銀數加成或加倍報捐其有為外姻捐從一品封者許各按二三品實職虛銜銀數再行分別加成報捐陵夷至光緒中御史李慈銘疏曰治國之要惟賞與罰罰固不可稍踰賞亦豈可或濫康熙乾隆兩朝享國久長慶典武功僂指難盡其時內外臣工屢逢恩詔論功行賞班序秩然未有越等者今則外官道員多至二品其封皆至一品矣知府同知多加三品其封皆至二品矣牧令大半四品簿尉大半五六品其封率至三四品矣夫爵賞者人君所以進退賢愚中臣所以奔走吏士得之太易則人不知恩豫之太驟則士無由勸尊卑不別等級不明長僞士之浮囂惑小民之觀聽非所以尊朝廷清流品也奏上亦未殺減厥後外患頻仍人才缺乏二十六年詔停報捐實官而虛銜封典報捐如故宣統元年吏部議定條例京官依加級外官依本任請封頗欲規復舊制格不得行明年改定京官依加級外官依加銜五品人員許請至三品封贈八品人員許請至六品封贈欲稍事補救而積重難返矣廕之制曰恩廕曰難廕曰特廕恩廕始順治十八年恩詔滿漢文官在京四品在外三品以上武官在京在外二品以上各送一子入監護軍統領副都統阿思哈尼哈番侍郎學士以上之子為廕生餘為監生初制公侯伯豫一品廕子男分別授廕雍正二年改世職俱依三品豫廕乾隆三十四年定公侯伯依一品子依二品男依三品豫廕雍正初定例廕生廕監生通達文義者交吏部分各部院試驗行走其十五歲以上送監讀書者年滿學成咨部奏聞分部院學習又令文武廕監生通達文理者遵例考試以文職録用其幼習武藝人材壯健願改武職者呈明吏部移兵部改廕考試之法雍正三年令廕生到部年二十以上者奏請考試引見乾隆十一年定考試以古論及時務策欽派大臣閲卷評定甲乙進呈御覽文理優通者交部引見荒謬者發回原籍讀書三年再試歷代遵例行光緒三十一年免漢廕生考試如滿員例録用之法漢廕生有內用外用改武職用三途內用者雍正元年定制尚書一品用員外郎侍郎二品用主事總督同尚書巡撫同侍郎七年改定正一品用員外郎治中從一品用主事正二品用主事都察院經歷京府通判從二品用光祿寺署正大理寺寺副正三品用通政使司經歷太常寺典簿中行評博從三品用光祿寺典簿鑾儀衛經歷詹事府主簿京府經歷四品廕生與捐納貢監考職者一例輪班選用乾隆七年定左都御史廕同尚書同治十年定河道總督廕用員外郎主事宣統間改革官制裁撤各官以相當品級改用外用者乾隆間定制正一品用府同知從一品用知州二品用通判三品用知縣漢世職子爵用知縣終清世無變更改武職用者雍正間定制在京一品尚書等官在外總督將軍廕生用都司銜管都司二品侍郎等官巡撫提督用署都司銜管都司三品副都御史等官布政使總兵官用守備銜管守備按察使加一品銜副將用署守備銜管守備二品銜副將用守禦所千總乾隆間定漢子爵三品用千總男爵四品用把總漢軍録用康熙十二年原定一品用員外郎二品用大理寺寺正知州雍正七年用知州者以主事改補乾隆五年定三品用七品筆帖式四品用八品筆帖式宣統元年吏部奏言漢文武官廕生按品級正從授職滿廕生不分正從漢廕生引見以內用外用擬旨滿廕生以文職侍衛旗員擬旨惟光緒三十二年以後漢員一體簡授旗職若現任都統副都統廕生依滿例給廕不無窒礙擬請原係尚書侍郎改授升授者都統依漢尚書例副都統依漢侍郎例三品以下京堂監司升授之副都統依漢正二品例仍以內用外用擬旨允之初制非現任官不得廕內務府佐領以下官不給廕康熙六年定各官不論級銜均依實俸廕子是年始許內務府佐領以下官子弟給廕十二年並許原品解任食俸者給廕先是康熙三年定廕監生已得官及科目中式者不得補廕乾隆四十五年改定嫡長子孫有科名尚未選用及有職銜願承廕者許補廕道光以後捐例宏開既得官職仍許補廕銓選混淆幸進滋多光緒二十二年御史熙麟奏言吏部銓選以奉特旨人員統壓各班然如廕生暨及歲引見之員曾捐道府引見奉諭仍以道府選用者本係捐班部章竟歸特旨班銓選比年以來率皆營私取巧預捐道府為他日例邀特旨統壓各班之地致使同一廕生暨及歲人員而廉吏兒孫興嗟力薄紈袴子弟逞志夤緣於世道人心大有關係請以此等人員加捐道府者與捐納人員同班銓選下部議行難廕順治三年定制官員歿於王事者依應升品級贈銜並廕一子入監讀書期滿候銓康熙十八年定殉難官依本銜廕子不依贈銜雍正十二年奏定官員因公差委在大洋大江黃河洞庭洪澤等湖遭風漂歿者依應升品級廕贈在內洋內河漂歿者減等廕贈八品以下贈銜不給廕乾隆六十年定官員隨營任事催餉盡力因病身故者依內洋內河漂歿例廕贈道光二十三年許八品以下官因公漂歿及軍營病故者贈銜廕一子監生許應試不得銓選光緒二年奏定現任官遇賊殉難及軍營病故如係以何種官階升用補用即用並捐保升銜者依升階升銜贈銜依實官給廕候補候選者依現任官廕贈休致告病者依原官廕贈降調者依所降官廕贈已揀選之舉人就職就教之恩拔副歲優貢生並考有職銜之捐納貢監生各按品級依現任官廕贈未經揀選舉人依七品例恩拔副歲優貢生依八品例廩增附文生員依九品例廕贈虛銜頂戴人員止豫贈銜不給廕乾隆以前旗員效力行間懋著勞績及臨陳捐軀者其子孫例得世職年未及歲已承襲未任職者給半俸緑營員辨陳亡議恤僅得難廕而已乾隆四十九年詔曰旗員及緑營人員效命疆埸同一抒忠死事何忍稍存歧視嗣後緑營員辨軍功議恤賞仍依舊例陳亡人員無論漢人及旗人用於緑營者一體給豫世職襲次完時依例酌給恩騎尉俾賞延於世自是漢員死難者亦多得世職矣凡殉難贈銜總督加尚書銜者贈太子少保銜巡撫加副都御史銜者贈左都御史銜布政使贈內閣學士銜按察鹽運使贈太常寺卿銜道員贈光祿寺卿銜知府贈太僕寺卿銜同知知州通判贈道銜知縣贈知府銜教諭訓導贈國子監助教學録銜其餘各官按品級比例加贈光緒二年定內洋內河漂歿及軍營病故者減等贈銜惟總督巡撫布政使無庸議減仍減等給廕凡給廕康熙間定制三品以上廕知州四品以下至通判廕知縣布政按察都轉鹽運三司首領官及州縣佐二六品七品官廕縣丞八品九品官廕縣主簿未入流廕州吏目光緒二年定遇賊殉難官給廕如康熙舊制惟知縣廕州判軍營病故及因公漂歿者減等廕子武職難廕有都司守備千總把總與恩廕改用武職同凡給世職陳亡提督依參贊都統例給騎都尉兼一雲騎尉總兵官依副都統例給騎都尉副將以下把總經制外委以上依參領以下及有頂戴官以上例俱給雲騎尉應襲人員年十八歲者送部引見發標學習未及歲者給半俸及歲補送引見光緒間部章恩廕許分發難廕不得援例二十二年熙麟奏言恩廕既分部並外用待之已優又豫分發難廕專外用待之已絀又不豫分發殊失其平今時事多艱需人孔亟正賴鼓天下忠義之氣俾臨難毋苟顧於恩廕則為顯宦兒孫擴功名之路於難廕不為忠臣後裔開一線生機是使國殤飲恨於重泉忠義灰心於臨事請飭部臣援恩廕外用例一體分發補用下部議行特廕乾隆三年詔曰皇考酬庸念舊立賢良祠於京師凡我朝宣勞輔治完全名節之臣永享禋祀垂譽無窮其子孫登仕籍者固多或有不能自振漸就零落者朕甚憫焉其旁求賢良子孫無仕宦者或品級卑微者各都統督撫擇其嫡裔品行材質可造就者送部引見加恩四十七年原任廣西巡撫滅寇將軍傅弘烈曾孫世海等降旨録用嘉慶四年追贈已故御史曹錫寶副都御史依贈銜給豫其子廕生歷代眷念功臣後嗣恩旨屢頒光緒季年海內多故因思將帥有功之臣詔曰咸同以來髮捻回匪次第戡定文武大員勳績卓著懋賞酬庸閲時五十餘年各勳臣子孫名位顯達者固不乏人而浮沉下位伏處鄉里者亦復不少令各督撫都統詳察勳臣後裔有無官職彙列上聞軍機大臣繕單呈覽前西安將軍多隆阿次孫壽慶曾孫奎弼湖北提督向榮曾孫楷乃全安徽巡撫江忠源孫慎勳曾孫勤培布政使銜浙江寧紹台道羅澤南孫長耿曾孫延祚協辦大學士四川總督駱秉章孫懋勳曾孫育樞江南提督張國梁孫繩祖繼祖巡撫銜浙江布政使李續賓孫前普曾孫正繩兵部尚書彭玉麟次孫見綏曾孫萬澄陝甘總督楊嶽斌子正儀孫道澄四川提督鮑超次子祖恩孫世爵署安徽巡撫布政使李孟羣孫興仁興孝江西南贛鎮總兵程學啓嗣子建勳廣東提督劉松山孫國安曾孫家琨貴州提督馮子材次子相華孫承鳳等命各按官級升用湖南提督塔齊布令訪明立嗣奏請施恩其明年又詔開列勳績最著之臣前雲貴總督劉長佑臺灣巡撫一等男劉銘傳贈布政使道員王錱綏遠城將軍福興福建陸路提督一等男蕭孚泗記名提督一等子河南歸德鎮總兵李臣典浙江提督鄧紹良都統銜廣東副都統烏蘭泰署廣西提督甘肅肅州鎮總兵張玉良工部左侍郎呂賢基漕運總督袁甲三都察院副都御史江西巡撫張芾署貴州巡撫韓超布政使銜福建督糧道趙景賢雲南鶴麗鎮總兵朱洪章直隸總督郭松林廣東等省巡撫蔣益澧布政使銜江南道員溫紹原署安徽廬鳳潁道金光筯護軍統領恆齡新疆巡撫一等男劉錦棠記名提督廣西右江鎮總兵張樹珊贈布政使銜升用知府天津知縣謝子澄令各都統督撫訪明有無後嗣有何官職請旨施恩若夫乾隆四十八年録用明臣經略熊廷弼五世孫世先督師袁崇煥五世孫炳則推恩特廕勝代忠臣後裔尤曠典也任官之法文選吏部主之武選兵部主之吏部四司選司掌推選職尤要凡滿漢入仕有科甲貢生監生廕生議雜流捐納官學生俊秀定制由科甲及恩拔副歲優貢生廕生出身者為正途餘為異途異途經保舉亦同正途但不得考選科道非科甲正途不為翰詹及吏禮二部官惟旗員不拘此例官吏俱限身家清白八旗戶下人漢人家奴長隨不得濫入仕籍其由各途入官者內則修撰編檢庶吉士主事中書行人評事博士外則知州推官州縣教授由進士除授內閣中書國子監學正學録知縣學正由舉人考授及大挑揀選小京官知縣教職州判由優拔貢生録用員外郎主事治中知州通判由一二品廕生考用此外貢監生考職用州判州同縣丞主簿吏目京通倉書內閣六部等衙門書吏供事五年役滿用從九品未入流禮部儒士食糧三年用府檢校典史吏員考職一等用正八品經歷二等用正九品主簿三四等用從九品未入流官學生考試用從九品筆帖式庫使外郎俊秀識滿漢字者考翻譯優者用八品筆帖式厥後官制變更略有出入其由異途出身者漢人非經保舉漢軍非經考試不授京官及正印官所以別流品嚴登進也凡內外官分滿洲缺蒙古缺漢軍缺漢缺滿洲又有宗室內務府包衣缺其專屬者奉天府府尹奉錦山海吉林熱河口北山西歸綏等道缺各直省駐防官理事同知通判為滿洲缺唐古特司業助教中書游牧員外郎主事為蒙古缺欽天監從六品秋官正為漢軍缺宗人府官為宗室缺內務府官為內務府包衣缺此外京師各衙門陵寢衙門盛京五部各直省地方俱設額缺滿洲京堂以上缺宗室漢軍得互補漢司官以上缺漢軍得互補外官蒙古得補滿缺滿蒙包衣皆得補漢缺惟順天府府尹府丞奉天府府丞京府京縣官司坊官不授滿洲刑部司官不授漢軍外官從六品首領佐二以下官不授滿洲蒙古道員以下不授宗室其大凡也官吏論俸序遷曰推升不俟俸滿遷秩曰即升內而大學士至京堂外而督撫藩臬初因明制由廷臣會推嗣停會推開列題請太常鴻臚滿洲少卿開列引見不開列以應升員擬正陪引見授官曰揀授論俸推取二十人引見授官曰推授京司官小京官筆帖式分留授調授揀授考授皆引見候旨餘則選外官布政使按察使開列運使請旨道府缺有請旨揀授題授調授留授餘則選廳州縣缺同道府無請旨者佐雜教職鹽官要缺則留餘或咨或選初京司官缺題選無定例長官以意為進退久之員缺率由題補而應升應補應選者多致沈滯乾隆九年詔以各司題缺咨部注冊餘缺則選不得混淆於是定各部各司漢郎中員外郎主事各幾缺題授餘若干缺則選道光間更定題補缺額嗣各部時有增益順治十二年詔吏部詳察舊例參酌時宜析州縣缺為三等選人考其身言書判亦分三等授缺以是為差厥後以衝繁疲難四者定員缺緊要與否四項兼者為最要三項次之二項一項又次之於是知府同通州縣等缺有請旨調補部選之不同凡選缺分即選正選插選併選抵選坐選各辨其積缺不積缺到班者選之選班有服滿假滿俸滿開復應補降補散館庶吉士進士舉貢廕生議捐納推升大選雙月急選單月滿蒙漢軍上旬漢官下旬筆帖式中旬初制選人均到部投供點卯已而例停令各回籍部查年月先後掣選寄憑赴任康熙二年給事中于可託言寄憑既慮頂冒遠省選人往返輒經年遇有事故繳憑更選亦復需時懸缺遲久劾署員肆貪催新任速赴者連章見告宜仍令人文到部按次銓選八年御史戈英復以為言議行自是應選者悉赴部投供點卯為永制聖祖念選人一時不能得官往往飢寒旅邸令吏部截留一年選人留京餘聽回籍御史田六善言半載以來截留推官八十選一人知縣三百選三十一人餘須守候三四年陪掣空籤選期難料當按名挨掣實籤臨選前兩月投供下部議罷按月點卯及掣空籤詔減半截留人數選人投供初於應選前月十五日距選期近出缺美惡易滋弊後改每月初一日投供間一選期銓補著為令選人得缺初試以八股時文尋罷改書履歷三百字條列治民厚俗催科撫字讞獄聽訟諸方法謂之條陳補任升任並須敷陳舊任地方利弊然條陳多倩作或但作頌聖語其制未久亦廢選人例由吏部會九卿驗看後增科道詹事康熙二十七年從御史荊元實言令州縣同通等官掣缺後俱隨本引見後世踵行焉故事大臣驗看月官查有行止不端出身不正祖父有錢糧虧空或人缺不相當者以聞乾隆時月官有人缺不稱引見時帝輒為移易頗足劑銓法之窮十年引見月官帝以知縣周仲等四人衰頽特降教職十二年復親汰衰庸不勝知縣四人而切責驗看諸臣之不糾舉厥後分發候補試用之州縣同通且一體引見不限實官久之州縣同通在外補官及雜職分發並得援例捐免引見驗看益視為具文無足輕重矣內外官互用本有成例初行內升外轉制在內翰詹科道四衙門品望最清升轉特異他官編檢遷中允贊善曰開坊他若翰詹坊局國子監堂官京堂俱得升調大考上第擢尤不次外轉例始順治十年詔定少詹事以下二十一員用司道治行優者內擢京堂尋更定正少詹事用布政侍讀學士用按察中允用參政編檢用副使十八年復定侍讀以下每年春秋外轉各一員讀講用參政修撰用副使編檢用參議未幾例停康熙二十五年甄別翰林官平常者外用同知運副提舉通判二十八年編修李濤外簡知府翰林官授知府自濤始三十七年左都御史吳涵言編檢升轉遲滯請破格外用照編修李濤檢討汪楫例補知府一二人若破格改授請照少詹王士禎徐潮侍讀顧藻編修王九齡例用副都御史通政使帝納其言為授檢討劉涵知府雍正初以編檢庶吉士人多內用科道吏部外用道府州縣以疏通之嗣是編檢率內升坊缺用科道外授道府以為常吏部六官之長初定司官內升外轉歲各一人已罷其制康熙八年用御史余縉言復之四十年例復停與他部司員一體較俸給事中升轉歲一次御史倍之外簡道府內擢京堂五十九年詔定歷俸制由編檢郎中授者限二年員外郎或主事授者遞增一年乾隆十六年定科道三年升轉一次五十五年停其例內官外用京察外有截取保送皆俟俸滿保送分發截取則選繁簡由長官定之府牧令丞倅皆得以其班次改外外官內升初定司道歲三人漢人以科目出身且膺卓異俸薦俱優者為限知縣行取蓋仿明制初有薦推知皆得考選科道康熙間屢詔部臣行取賢能內用科道吳江知縣郭琇清苑知縣邵嗣堯三河知縣彭鵬靈壽知縣陸隴其麻城知縣趙蒼璧皆以大臣薦舉行取授御史得人稱最四十三年川撫能泰請罷督撫保題例帝韙之詔嗣後知縣無錢糧盜案者省行取三四員明年御史黃秉中言知縣考選科道殊覺太驟廷議停止尋定行取三年一次直隸江南湖廣陝西各五員餘省三員一員不等以主事補用雍正間刑部尚書徐本請復行取御史舊制格於部議行取官用主事者初選補猶易後與捐納間補遂病壅滯乾隆元年令視武官保舉注冊例仍留本任已赴京者許外補同知時各省視行取為具文例以無參罰之次等州縣應選十六年罷之洎光緒季年令州縣以上實官及曾署缺者一體考試御史非復行取遺意亦行之未久而罷銓選按格擬注憑籤掣缺拘於成例歷代間行保薦制以補銓法之不逮順治初定保舉連坐之法十二年以直隸保定河間江南江寧淮揚蘇松常鎮浙江杭嘉湖紹等三十府地方緊要詔京外堂官督撫各舉一人備簡不次擢用已有以貪庸敗者給事中任克溥言皇上對天下知府中權其繁劇難治者三十許二品以上官薦舉破格任用為時未久以貪劣劾罷者數人諸臣不能仰承聖意秉公慎選乞下吏議從之康熙七年詔部院滿漢官才能出衆者許不計資補用明年吏部請罷保薦仍循俸次升轉以杜鑽營賄賂報可四十年令總督郭琇張鵬翮巡撫彭鵬李光地等各舉道府州縣惠愛清廉者以聞世宗御極屢詔京外大臣薦舉道府同通州縣所舉非人輒遭嚴譴戶部尚書史貽直言遷擢宜循資格資格雖不足以致奇士而可以造中材捐棄階資幸進者不以為奬勵之公而陰喜進取之獨巧沈滯者不自咎才智之拙而徒怨進身之無階請照舊例循階按級以次銓除果才猷出衆治行卓越仍許破格薦擢從之乾隆間厲行保薦之法司道郡守多由此選宣宗初元郎中鄭裕知府阿麟唐仲冕皆以大臣推舉陟方面擢疆圻歷代相沿率以薦賢舉能責諸臣工間亦破格任用初京職簡道府疆吏察其才不勝任疏請調京任用多邀俞允乾隆初廷臣有以衰廢之人不宜復玷曹司為言者詔切止之嗣是外官才力不及者但有休致降補無內用矣官吏升轉論俸惟外官視年勞為差異於京秩在外有邊俸有腹俸腹俸之道府州縣佐二首領官五年無過失例得遷擢邊俸異是廣東崖州感恩昌化陵水等縣廣西百色太平寧明明江鎮安泗城凌雲西隆西林等府廳州縣及忠州河池等數十雜職為煙瘴缺雲南元江鶴慶廣南普洱昭通鎮邊等府通判同知鎮雄恩樂恩安永善寧洱寶寧等州縣貴州古州兵備道黎平鎮遠都勻銅仁等府同知清江都江丹江通判永豐知州荔波知縣四川馬邊越巂同知為苗疆缺俱三年俸滿有政績無差忒者例即升用江蘇太倉上海等十縣浙江仁和海寧等十七縣山東諸城膠州等七州縣廣東東莞香山等十三縣福建閩侯等九縣為沿海缺直隸良鄉通州等十二州縣河南祥符鄭州等十一州縣山東德州東平等十三州縣江南山陽邳州等十三州縣為沿河缺歷俸升擢與邊俸同邊疆水土惡毒或不俟三年即升其水土非甚惡劣苗疆非甚緊要者升遷或同腹俸乾隆間定邊缺夷疆海疆久任之制升用有須滿八年或六年者則為地擇人不拘牽常例也選班首重科目正途初制進士知縣惟雙月銓五人選官有遲至十餘年者雍正二年侍郎沈近思請單月復銓用四人於是需次二三年即可得官舉貢與進士雖並稱正途而軒輊殊甚順治間貢生考取通判終身無望得官乾隆間舉人知縣銓補有遲至三十年者廷臣屢言舉班壅滯然每科中額千二百餘人綜十年計之且五千餘人銓官不過十之一謀疏通之法始定大挑制大挑六年一舉行三科以上舉人與焉欽派王大臣司其事十取其五一等二人用知縣二等三人用學正教諭用知縣者得借補府徑歷直隸州州同州判縣丞鹽庫大使用學正教諭者得借補訓導視前為疏通矣異途人員初與正途不相妨康熙初生員例監吏員出身官須經堂官督撫保舉始升京官及正印官無保舉者郎中員外郎主事以運同府同知分別補用漢軍捐納官朝考後方得授官十八年復令捐納官蒞任三年稱職者題請升轉否則參劾以示限制自二十六年以宣大運輸許貢監指捐京官正印官者捐免保舉尋復許道府以下納資者三年後免其具題一例升轉於是正途異途始無差異乾嘉以後納資之例大開洎咸同而冗濫始甚捐納外復有勞績一途捐納有遇缺儘先花樣勞績有無論題選咨留遇缺即補花樣而正途轉相形見絀甲榜到部往往十餘年不能補官知縣遲滯尤甚光緒二年御史張觀準條上疏通部員之法一捐納部員勿庸減成一主事俸滿即准截取一散館主事儘數先選一進士主事准以知縣改歸原班銓選報可順天府府尹蔣琦齡亦言各省即用知縣不但無補缺之望幾無委署之期至有以得科名為悔者廷臣多以進士知縣壅滯紛請變更成例帝輒下所司核議十六年御史劉綸襄言近日諸臣條奏選補章程吏部議核日不暇給朝廷設官惟期任用得人以資治理非能胥天下仕者使盡償所願也國家缺額有定士子登進無窮安得如許美官以待縈情膴仕之人徒滋紛擾無濟於事帝為下詔切止之是時異途競進疆吏多請停分發吏部以仕途幸濫申多用科甲之請勢已積重不能返也滿人入官或以科目或以任子或以捐納議亦同漢人其獨異者惟筆帖式京師各部院盛京五部外省將軍都統副都統各署俱設筆帖式額缺其名目有翻譯繕本貼寫其階級自七品至九品其出身有任子捐納議考試凡文武翻譯舉人貢監生文武翻譯生員官義學生驍騎間散親軍領催庫使皆得與試入選者舉貢用七品生監用八品官義學生驍騎閒散等用九品六部主事額設百四十缺滿蒙缺八十五補官較易筆帖式擢補主事或不數年輒致通顯其由科甲進者編檢科僅數人有甫釋褐即遷擢者翰林坊缺編檢不敷補用得以部院科甲司員充之謂之外班翰林外官東三省新疆各城各省駐防文武大員俱用滿人甘肅新疆等邊地道府同通州縣各省理事同知通判皆設滿洲專缺滿缺外漢缺亦得補用其有終養回旗得授京秩內外文職選補一時不能得官及降調咨回各員許改授武職尤特例也保舉為國家酬庸之典所以勵勞勩待有功也歷朝纂辦實録各館奉敕修書及各省軍營河工徵賦緝盜有功者奬康熙十一年世祖實録成四十九平定朔漠方略成副總裁以下官但奬加級六十一年算法成書始議以三等功奬應升加等即用有差康雍兩朝實録成從總裁請無議嘉慶間修書館臣請超一二等優奬帝不許尋定非特旨專設之官不得議升用歷代踵行其軍營河工等奬案始不過加級或不俟俸滿即升名器非可幸邀逮季世以保舉為捷徑京外奬案率冒濫不遵成例光緒元年御史王榮琯請下越階保升之禁帝韙之三年以纂修穆宗實録過半與事諸臣俱保升並加銜備極優異十年部議限制保舉五六品京堂翰詹坊缺及遇缺題奏俱不得擅保未幾仍有以候補郎中保京堂編檢保四五品坊缺及應升缺並開列在前者咸同軍興保案踵起吏部於文選司設專處司稽核事之繁重與一司埒同治十二年閩撫王凱泰言軍興以來保案層迭開捐以後花樣紛繁軍營保案藉花樣以爭先恐後各項保舉又襲軍營名目以紛至沓來名器之濫至今已極盈千纍百徒形冗雜請敕部察核京外各班人員酌留二三成餘令回籍候咨取下所司核議軍功外號稱冗濫者為河工保光緒二十年御史張仲炘言山東河工保案近年多至五六百人部定決口一處奬異常尋常者六人該省所報決口多寡輒以所保人數為衡圖保者以山東為捷徑捐一縣丞佐雜不數月即正印矣請飭所司嚴定章程帝俞其請三十二年御史劉汝驥復言史治之蠹莫如保舉一途其罔上營私者一曰河工國家歲糜數十萬帑金以慎重河防封疆大吏乃以此為調劑屬員之舉幸而無事丞倅保州縣矣同通保府道矣一曰軍功工廠之鼓噪飢民之嘯聚輒浮夸其詞曰大張撻伐耳未聞鼙鼓足未履沙場而謬稱殺敵致果身經百戰者比比然也一曰勸捐順天賑捐一案保至千三百餘人山東工賑保至五百餘人他省歲計亦不下千人請嚴禁徇情濫保以杜幸進下所司核議限制之法其時吏部投供月多至四五百人分發亦三四百人選司原設派辦處司其事者十餘人猶虞不給季年乃毅然廢捐納停部選為疏通仕途慎選州縣之計然捐例雖停而舊捐移奬層出不窮加以科舉罷後學堂卒業立奬實官舉貢生員考職大逾常額且勳臣後裔悉豫官階新署人員虛銜奏調紛然錯雜益難紀極宣統三年裁吏部設銓局雖有刷新政治之機而一代銓政終不復能廓清也武職隸兵部八旗及營衛官之選授武選司掌之內而驍騎前鋒護軍步軍火器健鋭虎槍各營外而陵寢圍場熱河烏里雅蘇台科布多阿爾泰烏梁海西寧西藏塔爾巴哈台游牧察哈爾綏遠城各省駐防皆旗缺屬八旗門千總為門缺屬漢軍河營陸路水師皆營缺滿漢分焉漕運為衛缺漢軍漢人得兼補旗缺副都統以上開列餘則揀選五品以上題補六品以下咨補緑旗總兵以上初用會推嗣罷其例開列具題副將投供引見亦有開列者其次要缺則題簡則推把總拔補其大略也凡滿漢入仕有世職廕生武科八旗世職公侯伯子男補副都統輕車都尉騎都尉補佐領雲騎尉補防禦恩騎尉補驍騎校漢伯子男用副將輕車都尉用參將騎都尉用遊擊或都司雲騎尉用守備尚書至副都御史等官總督將軍至二品銜副將廕生改武者用都司守備守禦所千總衛千總武科進士一甲一名授頭等侍衛二三名授二等侍衛二三甲揀選十名授三等侍衛十六名授藍翎侍衛餘以營衛守備補用漢軍漢人武舉揀選一二等用門千總及營千總三等用衛千總其以資勞進用者營伍差官提塘隨幫隨營差操經制及外委千把總無責任效用官因功加都督至副將等銜者用遊擊加參將遊擊銜者用都司加都司守備銜者用守備加千總銜者拔補把總武進士武舉充提塘差官滿三年由部考驗弓馬優者用營衛守備次者武舉用防禦所千總武舉隨營差操滿三年以營千總拔補隨幫三運報滿用衛千總凡部推之缺歲二月參將遊擊缺用漢一二等侍衛一人四六八月遊擊都司缺用漢三等侍衛三人正三五七九月都司缺用藍翎侍衛五人正月七月營守衛缺以門衛千總升用其餘單月缺輪補之班七雙月缺輪補之班十二衛守備單月缺輪補之班十一雙月缺輪補之班六守禦所千總衛千總缺俱不論雙單月推選惟門千總專於雙月銓補焉滿人入官以門閥進者多自侍衛拜唐阿始故事內外滿大臣子弟五年一次挑取侍衛拜唐阿以是閒散人員勳舊世族一經揀選入侍宿衛外膺簡擢不數年輒致顯職者比比也緑旗武職占缺尤多向例山海關至殺虎口保德州副參遊都守缺緑旗補十之三滿洲補十之七馬蘭泰寧二鎮直隸山西沿邊副參遊都守缺滿漢各補其一雍正六年副都統宗室滿珠錫禮言京營參將以下千總以上不宜專用漢人得旨滿洲人數本少補用中外要缺已足若京營參將以下悉用滿洲則人數不敷勢必有員缺而無補授之人乾隆間揀發各省武職率以滿人應選帝曰緑營將領滿漢參用必須員缺多寡適均方合體制若概將滿員揀發行之日久緑營盡成滿缺非所以廣掄選而勵人材飭所司議滿漢間用之法兵部議上凡行走滿二年之漢侍衛與巡捕營八旗滿蒙人員由該管大臣保送記名揀發時與在部候補候推者按滿漢分派引見如所議行三十八年兵部復疏言直隸山西陝西甘肅四川五省自副將至守備滿缺六百四十七各省自副將至守備千一百七十九缺向以緑營人員選補現滿蒙在緑營者逾原額兩倍實緣各省請員時多用滿員揀選請嗣後除原用滿員省分外其河南山東江南江西湖廣腹地及閩浙兩廣海濱煙瘴等省需員請揀應於緑營候補候選及保卓薦人員並行走年滿之頭二三等侍衛藍翎侍衛一併揀選從之自是緑營滿漢員缺始稍劑其平非復從前漫無限制矣武職以行伍出身為正途科目次之故事考驗部推人員衰老病廢者勒令休致惟軍功帶傷者雖年老仍行推用副參例以俸深參遊題補若有軍功保舉雖俸淺亦得與焉科目自康熙初即病壅滯御史朱斐疏請定科目行伍分缺選用之制外委效力等與武進士武舉較人數多寡倣二八分缺之例先選科目人員其外委各辨須有戰功及捕盜實績不得止憑咨送選補下所司議行雍正初廷臣有請改併衛所各州縣者部議科甲人員專選衛所守備千總若盡裁衛所必致選法壅滯事不可行帝不許為定榜下進士增用營守備以調劑之乾隆十五年給事中楊二酉言各省衛守備歸部選者三十九缺現武進士以衛用者積至數百人提塘差官效力報滿歸班選用者亦數十人加以新例飛班壓銓缺少班多選用無期請照乾隆元年例將三等武進士再行揀選一二等以營用三等仍以衛用報可向例揀選武進士以營用者選缺猶易衛用往往濡滯不能得官洎道光間衛用武進士得捐改營用而裁缺衛守備衛千總守禦所千總均准改歸緑營營守備以上官並得報捐分發由是部推外補同一沈滯不僅科目為然矣凡不屬於部推之缺皆題補豫保注冊者最先授定例邊疆內河外海水師員缺及陸路緊要者得豫保康熙九年兵部疏言總督提鎮遇標營員缺不論地方緩急銜缺相當輒將標員坐名題補使俸深應補人員致多壅滯請定副將以下守備以上缺出實係近海沿邊巖疆人地相宜者酌量題補餘不得率行題請從之雍正五年詔部推缺由各督撫提鎮保題備用乾隆初罷陸路近省豫保例十年江督尹繼善言武職豫保咨部注冊遇缺掣補誠慎重要缺之良法乃或豫保之初年力本強數年後漸已衰老騎射生疏營伍廢弛請將豫保滿三年未得缺者各提督再行甄別果堪升用出具考語咨部否則注銷報可其時保薦別以三等限以五年於副將堪勝總兵參將堪勝副將者尤慎選一經保薦輒豫升擢洎咸同軍興十餘年保題舊例不復行所恃以鼓勵人材者惟軍功保舉奬之案層出不窮以兵丁積功保至提鎮記名者殆難數計同治五年詔以記名提鎮無標營可歸者發往各省各營差遣各省投標候補者提鎮多至數十副參以下數百本職補官終身無望於是定借補之法提鎮准借補副參遊缺副參遊准借補都守缺都守准借補千把總缺雖內停部推外停儘先仍不足疏通冗滯光緒季年詔裁緑營練新軍罷武科設武備學校一時新軍將辨與學成授官者特為優異歷朝武職尊重行伍之意蕩無復存雖緑營武職未盡廢除然無銓法可言云
