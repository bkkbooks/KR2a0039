body:
  text: 清史稿卷一百十一志八十六選舉六考績三載考績之法昉自唐虞清沿明制而品式略殊京官曰京察外官曰大計吏部考功司掌之京察以子卯午酉歲部院司員由長官考核校以四格懸才守政年為鵠分稱職勤職供職三等列一等者加級記名則加考引見備外用糾以六法不謹罷軟者革職浮躁才力不及者降調年老有疾者休致注考送部自翰詹科道外依次過堂三品京堂由部開列事實四五品由王大臣分別等第具奏引見取上裁大計以寅已申亥歲先期藩臬道府遞察其屬賢否申之督撫督撫核其事狀注考繕册送部覆核才守俱優者舉以卓異劣者劾以六法不入舉劾者為平等卓異官自知縣而上皆引見候旨六法處分如京察貪酷者特參凡京察一等大計卓異有定額京官七而一筆帖式八而一道府廳州縣十五而一佐雜教官百三十而一以是為率非歷俸滿者未及年限者革職留任或錢糧未完者滿官不射布靶不諳清語者均不得膺上考其大較也順治八年京察始著為令以六年為期十三年吏部奏定則例三品以上自陳四品等官吏部都察院察考議奏親定去留筆帖式照有職官例一體考察遇京察時各官暫停升轉尋復定考滿議例三年考滿與六年察典並行十七年從左都御史魏裔介請行糾拾之法以補甄別所未及唐熙元年罷京察專用三年考滿例三品以上仍自陳餘官分五等一等稱職者紀録二等稱職者賞賚平常者留任不及者降調不稱職者革職三年御史季振宜請停考滿三疏極言徇情鑽營章奏繁擾無裨勸懲因停考滿自陳例六年復行京察明年甄別不及官三十七員嗣以各部院甄別司員類多末職二十三年嚴諭指名題參復甄汰王三省等三十六人明年京察又停雍正元年復舉行改為三年自是為定制初京察一等無定額康熙三年御史張沖翼疏請以部院員數之多寡定一二等名數以息奔競從之乾隆間部院保送一等或浮濫溢舊額詔停兼部行走仍歸本衙門另班聲暨到任未滿半年仍由原衙門注考等例又罷未授職庶吉士保列一等之例以示限制四十二年命部院保送一等人數毋庸過泥上屆成例遞行裁減以防溢額應將上兩次數目比較酌中定制既無慮濫膺保薦亦不至屈抑人才五十年定例保送一等人數以不溢四十八年原額為準後世踵行間有增損無甚懸殊也向例部院司官由吏部都察院考核雍正四年命內閣大學士同閲乾隆九年帝慮部院堂官有瞻徇情面濫列一等者敕大學士驗看慎重甄別不稱一等者裁去十一年諭曰前命大學士分別去留亦權宜辦理之道察核司員惟堂官最為親切要在平日留心體察臨時舉措公平如上次定一等者三年中行走平常當改為二三等上次原列二三等者三年中知所奮勉即改為一等庶察典肅而人知勸懲厥後考察權責悉屬吏部驗看特奉行故事而已大臣循例自陳求斥罷候旨照舊供職國初以來行之乾隆八年曾諭大臣自陳罷斥者舉賢自代嗣以所舉不得其人或樹黨營私行不久即罷十七年帝以內外大臣親自簡擢隨時黜陟奚待三年自陳繁文相率為偽甚無謂也詔罷其例先是京堂官無甄例乾隆十五年帝以三品以上堂官具本自陳部院司員皆令引見而四五品京堂不在自陳之列亦無引見之例吏部都察院考語無實龍鍾庸劣者得姑容才具優長者無由見特派王大臣分別等第奏聞引見十八年敕吏部開列三品京堂事實親為裁奪四十八年以三品京堂不便派大臣驗看令吏部帶額引見嘉慶十二年以三四品京堂向來京察但有降黜無甄既與內外大臣辦理兩歧並不得與部院司員同邀加級於是豫太常少卿色克精額等議而豫陳鍾琛等休致自後三品以下京堂始有甄之例矣年老休致例有明文乾隆二十二年定部院屬官五十五歲以上堂官詳加甄別三十三年改定京察二三等留任各官六十五歲以上引見嘉慶三年命京察二三等官引見以年逾七十為限尋復舊例六法處分綦嚴長官往往博寬大之名每屆京察祗黜退數人虛應故事餘概優容而被劾者又不免屈抑雍正中汪景祺查嗣庭輩論列時政以部員壅滯為言有十年不調白首為郎等語帝責以怨望誹謗而事實不得謂誣蓋部員冗濫康雍時已然矣乾隆三年鴻臚少卿查斯海疏言京官被劾不無以嫌隙入吏議者京察六法官應援大計例送部引見從之乾隆末士夫習為諂諛堂官拔識司員率以逢迎巧捷為曉事察典懈弛仁宗初鋭意求治頗思以崇實黜華奬勵氣節風示天下嘉慶五年詔部院堂官慎重選舉猷守兼優者膺首薦餘寧取資格較久謹願朴實之員其少年浮薄才華發越者應令深其經練下屆保列尚書侍郎各備册密識賢否公議同覽十一年大學士尚書等議奏京察事宜捐納人員限以年資軍機處司員能兼部務者方列上考不許濫保充數報可道光四年候際清贖罪舞弊一案刑部司員恩德等朋謀撞騙堂官以謬登薦牘保列一等下部議處諭嗣後京察有冒濫徇私者連坐七年給事中吳傑奏大計軍政皆有舉有劾近年六部辦理京察除保舉一等外不問賢否概列二等間有三等數人仍豫留任六法不施有勸無懲應申明舊章舉劾並用帝韙其言降諭飭行十五年令於京察外隨時糾參以為補救咸豐十年刑部堂官濫保不諳例案之員朝廷務循寬大輒以相習成風不獨刑部為然多為原宥僅豫大學士桂良等鐫級留任出考堂官罰俸而已穆宗即位大難未平厲精澄同治五年詔部院堂官謹遵嘉慶五年備册密識賢否公議同覽之諭並常川進署與司員講求公事藉覘其屬賢否八年又諭京察不得有舉無劾冀湔滌舊習一新庶政然積重之勢不能復返光緒七年禮部侍郎寶廷疏陳京察積弊言之痛切謂瞻徇情面之弊不專在部院堂官當責樞臣考察必公必嚴樞臣果精白乃心破除情面不特能考察部院司員之賢否並能考察內外大臣之賢否而考察樞臣功過在聖明獨斷若朝廷先以京察為故事具文何責乎樞臣更何責乎部院堂官論雖切中而難實行徒託空言而已宣統二年吏部設立憲政籌備處改考功司為考績科主文職功過應行變通事宜其時浮議紛紜新舊雜糅吏部等於贅疣矣大計始順治二年御史張濩疏請有司殿最宜以守己端潔實心愛民為上考部覆如議明年定朝覲考察頒五花册令督撫以四格注考故事計參外臺省例有拾遺是歲計羣吏止據撫按所揭為黜陟臺省擬循故事內大臣不喜大學士陳名夏力主之給事中魏象樞亦以為請得旨糾拾官照大計處分挾私妄糾者論自後臺省意存瞻顧糾拾者鮮已罷不行而督撫權乃日重矣四年定大計三年一舉計處官不許還職諭朝覲官曰貪酷重懲闒茸罔貰爾等姑許留任當思祓濯前愆勉圖後效嗣是每屆入覲之年必嚴切誡飭以為常舊例朝覲計典藩臬府州縣正官皆入覲順治九年止令藩臬各一員各府佐一員代覲十八年給事中雷一龍疏言三年大計勿得遺大吏而摘微員懲去位而寬現在請令藩臬赴部面同指實按册詳察下部議行康熙元年停藩臬入覲以參政副使等官代十二年復令藩臬入覲二十五年以朝覲藉端苛派姦弊滋生藩臬府佐入覲例悉罷官吏賢否去留憑督撫文册布按二司册籍悉停止國初大計與考滿並行康熙元年罷大計止行考滿司道歷腹俸二年邊俸一年半有司歷邊俸二年腹俸三年錢糧全完者許考滿分別地方荒殘衝疲充實簡易四者開注以政績多寡酌定等第四年考滿停復行大計為永制大計舉劾注考例由州縣正官申送本府道考核教官由學道鹽政官由該正官考核轉呈布按覆考督撫核定咨達部院河官兼有刑名錢糧之責者總河督撫各行考核專管河務者總河自行考核具題康熙二十三年以藩臬與督撫親近停其卓異凡卓異官紀録即升不次擢用歷朝最重其選徇私濫保者罪之康熙初御史張沖翼請申嚴卓異定額以詳核事迹使名實相副為言下部議六年從御史田六善請卓異官以清廉為本司道等官必注明不派節禮索餽送州縣等官必注明不派雜差重火耗虧損行戶強貸富民以清吏之有無定督撫之賢否其時廉吏輩出靈壽令陸隴其等擢隸憲府吏治蒸蒸稱極盛焉四十四年詔舉卓異務期無加派無濫刑無盜案無錢糧拖久倉庫虧空民生得所地方日有起色其他虛文不必開載乾隆八年命督撫以務農本計察核屬員論者謂以勸農為勸吏之要深得治本與漢詔同風先是雍正六年定卓異薦舉失實處分自行奏參者免卓異官有貪酷不法或錢糧盜案未清發覺者原薦督撫處分較司道府為輕乾隆四十八年改定卓異官犯贓核其年月在原薦上司離任前後分別議處臬司道府減督撫一等藩司照督撫例以道府按例轉詳督撫藩司親為核定也五十年帝以保薦卓異向分正附未明定限制易開徼幸之漸敕部詳核各省大小缺分多寡酌中定制裁去附薦名目於是各省卓異官有定額終清世無大變更也八法處分行之既久長吏或視為具文每將微員細故填注塞責歷朝訓諭諄諄力戒瞻徇猶防寃抑雍正元年詔大計降級罰俸官例不許卓異果有居官廉幹因公詿誤者淮與卓異又以卓異八法舉劾不過數十人其不列舉劾之平等官自知縣以上令督撫注考報部察核四年諭參劾人員或有寃抑及避重就輕等弊除貪酷官無庸引見外其不謹浮躁不及等被劾官督撫給咨送部引見乾隆二十四年帝以八法參本內不謹浮躁官未將何事不謹何事浮躁一一聲或有公事無誤而節目闊疏才具有為而氣質粗率上司以意見不洽概登白簡不無可惜其或敗檢踰間僅與避重就輕均非整飭官方之意命詳注實迹不得籠統參劾嘉慶八年定督撫隨時參劾闒冗平庸等事未列寶迹被劾官情願赴部引見者得援大計六法例此則考核不厭詳密冀搜求遺才輔計典之不及也嘉道以後計典一循舊例督撫奉行故事鮮克振刷道光八年山東大計卓異護撫賀長齡原注新城令容昺悃愊慈祥等語詔以寬厚難膺上考令各省薦舉體用兼備熟明治理者咸同軍興或地方甫收復有待撫綏或疆圉逼寇氛亟籌保衛敕各督撫留心存記廉能之員列上考備擢用時督撫權宜行事用人不拘資格隨時舉措固不能以大計常例繩其後也光緒間言者每條奏計典積弊請飭疆臣認真考察屢詔戒飭然人才既衰吏治日壞徒法終不能行二十八年詔各省設立課吏館限半年具奏一次三十一年定考核州縣事實分最優等優等平等次等四級顧課吏祗憑一日文字考核僅據一年事實責以公當蓋亦難矣宣統二年憲政編查館疏請考核州縣分別學堂巡警工藝種植命盜詞訟監押錢漕以為殿最由主管衙門另訂考核章程名目繁多表册虛偽徒飾耳目於勸懲無當也至若舊例翰詹大考分別優劣升調降革有差為特別考績之法外省司道年終有密考州縣一年期滿教佐六年俸滿皆有甄別則又隨時考核之法不屬於察計二典者武之軍政猶文之考察兵部職方司掌之內外衛所分屬於武選司在京武職由管旗及部院核奏各省由統兵大員注考京營千總以上外省緑營守備以上各由長官考核分操守才能騎射年歲四格舉劾與文職同三品以上自陳由部疏聞候旨八旗世爵則校其藝進退之緑營舉劾每於軍政後一年半舉行題升一二人入薦舉班升用劾者照軍政處分此其大略也國初未立限制順治九年定六年一舉是為軍政考核之始十一年改定五年為期十三年從給事中張文光請軍政卓異照文官賜服旌勸後改為加一級康熙元年停軍政專行考滿既而兵部疏請直省武職應依文官例按年限由總督提督會同舉劾御史季振宜疏言武職考滿營謀優等剋扣軍餉貽誤封疆請按歷俸功次升轉於是六年定舉行軍政事宜京外武職長官注以四格並詳列履行軍功分別去留咨部必注明行止端方弓馬嫻熟管轄嚴肅供職勤慎不擾害地方等考語方許薦舉必有八法等款實迹始行糾參復令提督總兵官自陳提督由總督注考總兵官由總督提督注考無總督省分巡撫注考嗣以滇省用兵海內騷動羽書倥偬軍政曠不舉行者十年至二十一年滇逆蕩平從給事中碩穆科請舉行軍政大典各官事實履行自康熙十一年軍政後開起九門千總等由九門提督注考候補總兵官亦令自陳副將以下候缺者照舊例考察六十一年命在京武職領侍衛內大臣八旗都統前鋒護軍步軍統領副都統等毋庸自陳考選軍政時屬員注考照外省舉劾例各省駐防將軍副都統等照提鎮例自陳屬員照京城例德州等處城守尉協領派大臣往考會同察核其屬注考以聞雍正元年命平等官守備以上督撫提鎮注考其冬詔曰初次考選軍政有出兵效力年老俸深尚能坐理者留任不宜留任者另奏加恩或雖未效力行間而供職年久者亦留心驗看此則垂念資勞特頒寬典非常例也二年諭各省所保副參遊擊輪流引見察其人材弓馬督撫提鎮以其操守訓練分別等第密陳六年山西太原總兵官袁立松疏陳平垣營守備梁玉廉潔敏練以年老入參劾帝以諳練才不可多得命酌量以遊擊題補尤殊恩也是年定卓異官原任有貪酷不法或升調他省別犯贓罪原舉長官分別處分乾隆二年部議出兵效力人員年老休致令子弟一人入伍食糧無子弟亦給守糧養贍從之時直省保題員辨類以明白勤敏才堪辦事列上選十一年諭嗣後保題務重弓馬漢仗十五年以各省所保總兵官鮮當意諭曰年滿千總一項類多猥瑣國家擢用武職營伍為正途拔補將辨必選之若輩緣次而升皆自年滿千總始折衝禦侮之用豫籌於升平無事之日不可視為緩圖二十四年以大臣自陳例既罷敕兵部於軍政年將在京都統副都統在外駐防將軍都統副都統各省提督總兵官分別三本條舉事實候鑒裁以重考績四十二年定衛所緑營武職薦舉卓異尚未升轉再遇軍政列平等者將上次卓異注銷嘉慶四年定侍衛軍政考試向例軍政年不許告病乞休以杜規避八年申諭查閲營伍年分事關考核照軍政例不得告病乞休咸同軍興百度稍弛軍政大典相沿不廢咸豐二年黑龍江將軍英隆以俄兵窺伺派將辨扼守要隘疏請本年軍政展限舉行不允嗣湖廣總督程矞采等以軍務未竣疏請展限令凱撤後再行補考並諭年老力衰者隨時參辦沿及德宗雖加意振飭勢成弩末展限之舉史不絶書光緒十四年編定北洋海軍由海軍衙門司黜陟甲午以後力鑒覆轍裁緑營練新軍別訂考核章程三十二年改兵部為陸軍部其考核隸軍衡司宣統二年設海軍部其考核隸軍制司朝廷鋭意革新軍紀宜可少振無如積習已深時艱日棘卒歸罔濟云
