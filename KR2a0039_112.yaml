body:
  text: 清史稿卷一百十二志八十七選舉七捐納清制入官重正途自捐例開官吏乃以資進其始固以搜羅異途人才補科目所不及中葉而後名器不尊登進乃濫仕途因之殽雜矣捐例不外拯荒河工軍需三者曰暫行事例期滿或事竣即停而現行事例則否捐途文職小京官至郎中未入流至道員武職千把總至參將而職官並得捐升改捐降捐捐選補各項班次分發指省翎銜封典加級紀録此外降革留任離任原銜原資原翎得捐復坐補原缺試俸歷俸實授保舉試用離任引見投供驗看回避得捐免平民得捐貢監封典職銜大抵貢監銜封加級紀録無關銓政者屬現行事例餘屬暫行事例歷代捐例時有變更惟捐納官不得分吏禮部道府非由曾任實缺正印官捐納僅授簡缺則著為令銓補則新捐班次視舊班為優此通例也捐事戶部捐納房主之收捐或由外省或由部庫或省部均得報捐咸豐後並由京銅局凡報捐者曰官生部豫以據曰執照貢監並給國子監照俊秀納貢監或職銜貢監納職銜由原籍地方官查具身家清白册季報或歲報納職官者查明有無違礙取具族鄰甘結依限造報逾限或查報不實罪之其大略也文官捐始康熙十三年以用兵三藩軍需孔亟暫開事例十六年左都御史宋德宜言開例三載知縣捐至五百餘人始因缺多易得踴躍爭趨今見非數年不克選授徘徊觀望宜限期停止俾輸捐恐後既有濟軍需亦慎重名器帝納其言滇南收復捐例停嗣以西安大同飢又永定河工復開事例五十一年增置通州倉厫科臣有請開捐者廷議如所請侍郎王掞抗疏言鄉里童騃一旦捐資儼然民上或分一縣之符或擁一道之節不惟濫傷名器抑且為纍地方宜禁止以塞僥幸之路杜言利之門帝韙之為飭九卿再議青海用兵饋餉不繼內大臣議停各途守選及遷補專用捐資助餉者刑部尚書張廷樞言惟捐納所分員缺可用捐員正途及遷補者宜仍舊從之雍正二年開阿爾台運米事例五年直隸水災議興營田從大學士朱軾請開營田事例雲貴總督鄂爾泰以滇黔墾荒經費無著請開捐如營田例帝曰墾田事例於地方有裨益向因各捐例人多難於銓選降旨停止年來捐納應用之人將次用完越數年必致無捐納之人而專用科目矣應酌添捐納事款除道府同知不許捐納其通判知州知縣及州同縣丞等酌議準捐下九卿議行十二年開豫籌糧運例先是俊秀淮貢得輸資為教職已慮異途人員不勝訓迪表率之責康熙三十三年令俊秀準貢捐學正教諭者改縣丞訓導改主簿雍正元年諭捐納教職多不通文理少年以之為學問優長年高齒長者之師可乎詔改用如前例高宗初元詔停京外捐例乾隆七年上下江水災命刑部侍郎周學健直督高斌往同督撫辦理尋合疏言賑務水利需費浩繁請仿樂善好施例出資效力者量多寡職官詔以京官中行評博以下外官同知通判以下無礙正途如所請行嗣是上下江直隸山東河南屢告災輒徇臣工請許開捐例十三年進剿大金川四川巡撫紀山奏行運米事例部議運米石抵捐銀二十五兩納官以是為差川陝總督張廣泗言軍前口糧領折色石發銀五六兩事例既開各員以存米納捐計貢監納即用同知不過千餘金即用小京官不過數百金請令如數交銀以杜弊端報可三十九年再征金川復開川運例惟四庫館謄録議等職多靳不令捐納餘得一體報捐貢監納道府例自雍正五年後數十年無行者至是復行五十八年詔曰前因軍需河工支用浩繁暫開事例原屬一時權宜迄今二十餘年府庫充盈並不因停捐稍形支絀可見捐例竟當不必舉行不特慎重名器亦以嘉惠士林我子孫當永以為法倘有以開捐請者即為言利之臣當斥而勿用嘉慶三年從戶部侍郎蔣賜棨請開川楚善後事例帝慮正途因之壅滯飭妥議條欸尋議京官郎中員外郎外官道府有理事親民之責未便濫豫登進進士舉人恩拔副優歲貢始許捐納非正途候補候選正印人員亦得遞捐現任應補候選小京官佐二止準以應升之項捐納從之嗣以河屢決續開衡工豫東武陟等例十一年定捐納道府係曾任知府同知直隸州知州並州縣正印等官加捐及現任京職堪勝繁缺者許以繁簡各缺選用其貢監初捐及現任京職僅堪簡缺並外任佐雜等官遞捐者專以簡缺選用宣宗文宗御極之初首停捐例一時以為美談自道光七年開酌增常例而籌備經費豫工遵捐順天兩廣及三省新捐次第議行其時捐例多沿舊制惟於推廣捐例中準貢生捐中書豫工例中準增附捐教職而已咸豐元年以給事中汪元方言罷增附捐教職其已選補者不許濫膺保薦是年特開籌餉事例明年續頒寬籌軍餉章程九年復推廣捐例時軍興餉絀捐例繁多無復限制仕途蕪雜日益甚同治元年御史裘德俊請令商賈不得納正印實官以虛銜雜職為限下部議行尋部臣言捐生觀望有礙餉需詔仍舊制四年山東巡撫閻敬銘言各省捐輸減成按之籌餉定例不及十成之三彼輩以官為貿易略一侵吞錢糧已逾原捐之數明效輸將暗虧帑項請將道府州縣照籌餉例減二成專於京銅局報捐從之時內則京捐局外則甘捐皖捐黔捐設局遍各行省侵蝕勒派私行減折諸弊並作光緒初議者謂乾隆間常例每歲貢監封典雜職捐收約三百萬今捐例折減歲入轉不及百五十萬名器重雖虛銜亦覺其榮多費而有所不惜名器輕則實職不難驟獲減數而未必樂輸所得無幾所傷實多停捐為便時復有言捐官宜考試花翎及在任候選等捐宜停者輒下部議五年帝以捐例無補餉需實傷吏道明詔停止未幾海疆多故十年開海防捐如籌餉例減二成核收常例捐數並核減是時臺灣甫開實官捐他如四川按糧津貼捐順天直隸河南浙江安徽湖北各賑捐戶部廣東軍火捐福建洋藥茶捐雲南米捐自海防例行惟川捐如舊餘或併或罷十三年河南武陟鄭州沁黃兩河漫決御史周天霖李士錕先後請開鄭工例以濟要工部議停海防捐開鄭工捐十五年籌辦海軍復罷鄭工開海防新捐新捐屢展限行之十餘年二十六七年間江寧籌餉秦晉實官捐順直善後賑捐次第舉辦江寧順直捐視新海防例秦晉捐但奬五品以下實官庚子變後帝鋭意圖治言者多謂捐納非善政詔即停止然報效官舊捐移奬且繼續行之但有停捐之名而已武職捐雍正初惟納千把總乾隆九年直賑捐有納衛守備者三十九年川運例參遊都守始得遞捐但武生監生捐止都司嘉慶三年川楚善後例武營捐納略如川運同治五年閩浙總督左宗棠言閩省武營捐班太多應嚴加區別以肅軍政並請罷武職捐從之光緒二十一年新海防例展限議增武職捐於揀發外別立一班俾捐輸踴躍三十一年兵部奏開捐十年入發僅十餘萬無裨國帑有礙營伍請將實官虛銜捐復翎銜封典一切停罷報可捐例初開慮其弊也嘗設為限制往往不久而其法壞康熙十八年定捐納官到任三年稱職者具題升轉不稱職者題參然疆吏罕有以不職上聞者已令道府以下捐銀者免具題照常升轉左都御史徐元文言國家大體所關惟賢不肖之辨三年具題所以使賢者勸不肖者懼輸銀免具題是金多者與稱職同科此曹以現任之官營輸入之計何所不至急宜停止順治間準貢例監出身官不得升補正印康熙六年定為保舉之法各途出身官經該堂官及督撫保舉稱職者升京官及正印無保舉者升佐二雜職三十年大軍征噶爾丹戶部奏行輸送草豆例準異途人員捐免保舉御史陸隴其言捐納一事不得已而暫開許捐免保舉則與正途無異且督撫保舉之人必清廉方為合例保舉可捐免是清廉可納資得也又言督撫於捐納人員有遲至數年不保舉亦不糾劾乞敕部通稽捐納官到任三年無保舉者開缺休致疏下九卿議捐免保舉無礙正途若三年無保舉即休致則營求保舉益甚應毋庸議隴其持之益堅廷議隴其不計緩急輕重浮詞粉飾致捐生觀望遲誤軍機擬奪職帝特宥之自是吏員例監出身者欲升補或捐納京外正印官必先捐免保舉惟準貢獨否初納歲貢者同正途故捐免保舉例開貢監雖同一捐納而軒輊殊甚乾隆二十六年部議御史王啓緒奏豫工例內捐貢納京外正印官捐免保舉如例監例先納官者補行捐免不願者以佐二改補成例為一變矣漢軍捐納官非經考試不得銓選如漢官保舉例康熙間並準捐免六十一年帝以捐納部員補主事未久即升員郎外官道府亦然飭議試俸之法尋議郎中道府以下小京官佐雜以上於現任內試俸三年題咨實授方許升轉從之乾隆間試俸復得捐免四十一年戶部奏請保舉考試試俸捐免例列入常捐限制之法至是悉弛官吏緣事罷譴降革留任非數年無過不得開復康熙間大同賑飢部議京察大計罷黜者悉豫捐復徐元文力言不可議遂寢三十三年河道總督于成龍以黃運兩河工費繁巨請仿陝西賑飢例開捐革職年老患疾休致人員得捐復帝面諭捐納稱貸者多非朘削無以償逋負事不可行尚書薩穆哈等議成龍懷私妄奏擬褫職得旨從寬留任乾隆九年直賑捐部議捐復條款京察大計及犯私罪者降調人員無論是否因公及比照六法條例武職軍政糾參及貪婪者不準捐復因公罣誤無餘罪悉得捐復三十五年帝念降革留任人員因公處分輒停升轉詔許捐復三十九年川運例增進士舉人捐復原資例四十八年定革職降調官分段承修南運河工程捐復例嘉慶三年川楚善後推廣其例凡常捐不準捐復人員酌核情節得酌加報捐奉旨降革除犯六法外因公情節尚輕人員得加倍捐復大計劾參有疾休致調治就痊及特旨降革留任限年開復人員加十分之五捐復十年部臣疏請於常例捐復外增文武大員捐復革職留任例帝曰大員身罣吏議應罷斥經改革職留任開復有一定年限若甫罹重譴即可捐復此例一開亳無畏忌有資者脫然為無過之人無資者日久不能開復殊失政體不允行咸豐二年王大臣等議寬籌軍餉凡降革不準捐復人員除實犯贓私外餘準加倍半捐復降革一二品文武官向不在捐復之列者許捐復原官頂帶允行但飭一二品大員捐復原銜須請旨嗣復推廣文職京察大計六法武職軍政被劾無姦贓情罪亦許捐復原銜終清世踵行不復更也捐納官或非捐納官於本班上輸資若干俾班次較優銓補加速謂之花樣康熙十三年知縣得納先用即用班工部侍郎田六善極言其弊謂宜停止三十三年戶部議行輸送草豆例臺臣請增應升先用捐御史陸機言前此有納先用一例正途為之壅滯皇上灼見其弊久經停止納先用者大都奔兢躁進多一先用之人即多一害民之人不待辨而知其不可乾隆年事例屢開惟雙月單月不論雙月選用及雙月先用不論雙單月即用等尋常班次蓋是時正途銓補未病雍滯無庸加捐花樣納資者亦至是而止七年部議鼓勵江省賑捐各班選用特優道光年增插班間選抽班間選遇缺遇缺前等名目咸豐元年省遇缺遇缺前而增分缺先本班儘先三年復增分缺間不積班九年先後奏設新班遇缺新班儘先分缺先前分缺間前本班儘先前不論班儘遇缺選補等班推廣捐例又有保舉捐入候補班候補捐本班先用例花樣繁多至斯已極自籌餉例開既多立班次以廣捐輸復減折捐例以期踴躍時納捐率以餉票成數或不及定額之半同治三年另訂加成新章於是有銀捐新班儘先遇缺等項輸銀不過六成有奇而選用之優他途莫及八年吏部以銀班遇缺占缺太多擬改分班輪用刪不積班於新班遇缺上別設十成實銀一班曰新班遇缺先是謂大八成花樣維時分缺先前分缺間前本班儘先前新班遇缺新班遇缺先統曰銀捐而新班遇缺先最稱優異新班遇缺次之序補五缺一周先用新班遇缺先三人然後新班遇缺及各項輪補班各得其一光緒二年江蘇巡撫吳元炳言新班遇缺先新班遇缺等班序補過速有見缺指捐之弊請停捐免試用例以救其失格於部議四年實官及各項花樣一律停捐七年御史葉蔭昉復言近年大八成各項銀捐班次無論選補得缺最易統壓正途勞績各班今捐例已停請改訂章程銀捐人員祗列捐班之前疏下部議然積重難返進士即用知縣非加捐花樣則補缺綦難他無論已十年臺灣海防相繼例開三班分先分間儘先復得一體報捐而知縣並增海防新班十三年鄭工新例增遇缺先班捐例等大八成班次亦相埒海防新例因之至二十七年各項花樣隨實官捐並停初捐納官但歸部選乾隆間為疏通選途許加捐分發二十六年豫工例京職郎中以下得捐分各部院外官道府以下得捐分各省三十九年川運例知州同知通判捐分發如舊知縣有礙正途補用靳不與四十年兵部侍郎高朴言捐班知縣不許分發恐有礙舉班查壬辰科會試後揀選分發已閲四年湖北福建均因差委乏人奏請揀選可見舉班漸已補完請變通事例川運捐不論雙單月即用者許一體報捐分發部議如所奏行惟大省分發不得逾十二人中省不得逾十人小省不得逾八人雲貴兩省需員解送銅鉛雲南得分發二十人貴州如大省額從之是年兵部奏請候補候選衛守備衛千總如文職例加捐分發隨漕學習明年浙江巡撫三寶奏請教職捐不論雙單月即用者設加捐分發到省委用均報可川運例停分發歸入常例報捐為永例四十二年以山東布政使陸耀言東省分發佐雜漸多停布政司經歷理問州同以下佐雜官分發例四十六年候補布政司經歷鄭肇芳等候選州同張衍齡等具呈戶部以投供日久部選無期各省佐雜班已疏通請準報捐分發為奏行如舊例嘉慶四年給事中廣興請將俊秀附生報捐道府州縣者停銓實缺準加捐分發責成督撫試看三年酌量題補帝以停選示人不信令加捐分發有礙政體不允行道咸間增加捐指省例光緒四年捐例停而分發指省以常例得報捐如故五年御史孔憲瑴以指省分發流弊不可勝言請罷之格部議不果行八年復申前請部覆如議未幾海防例開仍準報捐時分發人員擁擠殊甚疆吏輒奏停分發期滿復請展限各直省比比然也定例捐納官分發各部院學習三年外省試用一年期滿各堂官督撫實行甄別奏留乃得補官嘉慶十六年諭捐納員籤分部院學習行走年滿當詳加甄別近來該堂官於行走報滿人員無不保留市恩邀譽不顧登進之濫可為寒心道光八年諭酌增常例報捐分發人員為數更多著各督撫鹽政留心察看不必拘定年限認真甄核然奉行日久長官循例奏留徒有甄別之名不盡遵上指也咸豐七年從御史何兆瀛請詔各部院考試捐納司員察其能否辦理案牘尋兵部試以論題御史朱文江以為言詔切責之命嗣後毋得以考試虛文徒飾觀聽外官分發到省例由督撫考試分別等第黜陟有差光緒初各省遵例考試顧雲南有咨回降調者五年詔各省考試捐納人員府廳州縣試論一佐雜試告示判語八年閩浙總督何璟言閩省應試府廳州縣百五十四員鹽大使五十五員佐雜五百九十六員知府直隸州知州鹽大使取留十之五同通佐雜留十之四報聞三十三年憲政編查館議覆御史趙炳麟疏捐納道府同通州縣佐雜未到省者入吏部學治館肄業半年已到省入法政學堂肄業長期三年速成一年有半尋議上考驗外官章程各省遵章考試間亦罷黜數人以應明詔而於澄清吏治之道無補也貢監捐清初已行監捐沿明納粟例順治十二年開廩生捐銀準貢例從御史楊義請也十七年禮部以亢旱日久請暫開準貢令士民納銀賑濟允之貢監例得考職康熙六年御史李棠言進士舉人遲至十年始得一官今例監考補中書三年後即升部屬應停罷部覆如議自是貢監考職祗以州同州判縣丞主簿吏目用初考職例行各省監生或憚遠道跋涉或因文理不通多倩代頂冒者宗深知其弊特遣大臣司考試雍正五年令與考者千一百餘人悉引見時以頂冒避匿者九百餘人帝於引見員中揀選七十餘人授內外官有差乾隆元年停考職三年令捐納貢監如歲貢例分別等第以主簿吏目考取捐監未滿三年者不與道光後考職例罷雍正間帝以積貯宜裕允廣東江浙湖廣以本色納監乾隆元年罷一切捐例廷議捐監為士子應試之階請於戶部收捐備各省賑濟從之三年詔復行常平捐監例各省得一體納本色原定各省捐穀三千餘萬石數年僅得二百五十餘萬石復令戶部兼收折色十年湖廣總督鄂彌達言捐監事例穀不如銀銀有定數穀無成價易捐穀為捐銀倘遇荒歉亦可動支採買允行大學士等復言各省納本色有名無實請停止專由部收折色得旨各省收捐不必停在部捐折色者聽三十一年以陝甘監捐積弊最甚詔停罷尋並罷安徽直隸山西河南湖南北惟雲南福建廣東收本色如舊三十九年陝西巡撫畢沅陝總督勒爾謹請如例收納監糧允之是年甘省奏報六個月內捐監萬九千十七名監糧八十餘萬石帝疑之布政使王亶望主其事私收折色減成包辦更虛報賑災侵冒巨發繼任布政使王廷贊知其弊不能革事覺置亶望勒爾謹廷贊於法官吏緣是罷黜者數十人報捐監生或加捐職官者分別停科罰俸停選其後監捐無復納粟遺意矣貢捐屬常例向於部庫報捐嘉慶間疆吏屢以為請輒阻部議十二年部臣言庫帑充裕請變通常例各省一體收捐報可此外尚有捐馬百匹豫紀録運丁三年多交米三百石給頂帶之例其樂善好施例內凡捐資修葺文廟城垣書院義學考棚義倉橋梁道路或捐輸穀米銀兩分別議頂帶職銜加級紀録有差餘如各省鹽商士紳捐輸巨發酌豫奬皆出自急公好義與捐納相似而實不同也
