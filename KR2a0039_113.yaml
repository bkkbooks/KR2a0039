body:
  text: 清史稿卷一百十三志八十八選舉八新選舉新選舉制別於歷代取士官人之法清季豫備憲政倣各國代議制度選舉議員博採輿論議員選舉有二曰資政院議員選舉曰各省咨議局議員選舉自辛丑回鑾朝廷鋭意求治派大臣赴各國考察政治設考察政治館命甄擇各國政法斟酌損益候旨裁定光緒三十二年七月詔曰考察政治大臣載澤等回國陳奏國勢不振由於上下相暌內外隔閡而各國所以富強在實行憲法取決公論今日惟有仿行憲政大權統於朝廷庶政公諸輿論廓清積弊明定責成以豫備立憲基礎俟規模初具妥議立憲實行期限各省將軍督撫曉諭士庶人等各明忠君愛國之義合羣進化之理尊崇秩序保守和平豫備立憲國民之資格九月慶親王奕劻等遵旨核議釐定官制以立憲國官制立法行政司法三權並峙各有專屬相輔而行立法當屬議院今日尚難實行請暫設資政院以為豫備詔如所議三十三年改考察政治館為憲政編查館八月諭曰立憲政體取決公論中國上下議院未能成立亟宜設資政院以立議院基礎派溥倫孫家鼐為資政院總裁妥擬院章請旨施行尋諭各省應有採取輿論之所俾指陳通省利病籌計地方治安並為資政院儲才之階各省督撫於省會速設咨議局慎選公正明達官紳創辦其事由各屬合格紳民公舉賢能為議員斷不可使品行悖謬營私武斷之人濫厠其間凡地方應興應革事宜議員公同集議候本省大吏裁奪施行將來資政院選舉議員由該局公推遞升三十四年六月資政院奏言立憲國之有議院所以代表民情議員多由人民公舉凡立法及豫算決算必經議院協贊方足啓國人信服之心大學云民之所好好之民之所惡惡之孟子云所欲與聚所惡勿施又云樂以天下憂以天下皆此理也昔先哲王致萬民於外朝而詢國危國遷實開各國議院之先聲日本豫備立憲於明治四年設左右院七年開地方會議八年立元老院二十三年遂頒憲法而開國會所以籌立議院之基者至詳且備謹旁考各國成規揆以中國情勢酌擬院章目次凡十章先擬就總綱選舉二章呈覽報可是月憲政編查館會同資政院擬訂各省咨議局章程並議員選舉章程奏言立憲政體之要義在豫人民以與聞政事之權而使為行政官吏之監察東西立憲各國雖國體不同法制各異無不設立議院使人民選舉議員代表輿論是以上下之情通暌隔之弊少中國向無議院之説今議倡設人多視為創舉不知虞廷之明目達聰大禹之建鞀設鐸洪範之謀及庶人周官之詢於外朝古昔盛時無不廣採與論以為行政之準則特未有議院之制度耳今將創設議院若不嚴定規則事為之制曲為之防流弊不可勝言中國地大民衆分省而治各省之政主於督撫與各國地方之治直接國都者不同而郡縣之制異於封建督撫事事受命於朝廷亦與各國聯邦之各為法制者不同咨議局為地方自治與中央集權之樞紐必使下足裒集一省之輿論上仍無妨國家統一之大權此日各省咨議局辦法必須與異日京師議院辦法有相成而無相悖謹仰體聖訓博考各國立法之意兼採外省所擬章程參伍折衷擬訂各省咨議局章程別為選舉章程一百十五條候欽定頒行詔飭各督撫迅速舉辦實力奉行限一年內一律辦齊並諭曰朝廷軫念民依使國民與聞政事先於各省設咨議局以資歷練凡我士庶當共體時艱同攄忠愛於地方應興應革之利弊切實指陳於國民應盡之義務應循之秩序竭誠踐守各督撫當本集思廣益之懷行好惡同民之政虛衷審察惟善是從至選舉議員尤宜督率有司認真監督精擇慎選憲政編查館資政院迅將君主立憲大綱暨議院選舉各法擇要編輯並將議院未開以前應籌備各事分期擬議具奏俟親裁後即將開設議院年限欽定宣布八月憲政編查館資政院會奏遵擬憲法議院選舉法綱要暨議院未開以前逐年籌備事宜自本年起分九年籌備其關於選舉議員者第一年各省籌辦咨議局第二年舉行咨議局選舉各省一律成立頒布資政院章程舉行資政院選舉第三年召集資政院議員舉行開院第九年始宣布憲法頒布議院法暨上下議院議員選舉法舉行上下議員議員選舉諭令京外各衙門依限舉辦先是資政院奏擬院章目次第二章為選舉宣統元年七月資政院奏續擬院章改訂第二章目次為議員專詳議員資格額數分類任期而另定選舉詳細章程以免混淆從之院章規定資政院議員資格由下列各項人員年滿三十歲以上者選充一宗室王公世爵二滿漢世爵三外藩王公世爵四宗室覺羅五各部院四品以下七品以上官惟審判檢察巡警官不與六碩學通儒七納稅多額人八各省咨議局議員定額宗室王公世爵十六人滿漢世爵十二人外藩王公世爵十四人宗室覺羅六人各部官三十二人碩學通儒十人納稅多額者十人各省咨議局議員一百人類別為欽選互選宗室王公世爵滿漢世爵外藩王公世爵宗室覺羅各部院官碩學通儒納稅多額者欽選各省咨議局議員互選任期三年任滿一律改選九月資政院會奏資政院議員選舉章程疏言資政院議員選任之法大別為欽選互選二者各有取義而欽選議員名位有崇卑人數有多寡當因宜定制取便推行宗室王公世爵滿漢世爵及外藩王公世爵階級既高計數較少應開列全單恭候簡命宗室覺羅各部院官及納稅多額者合格人數與議員定額比例多少懸殊考外國上院制敕任議員多經互選擬略師其意於欽選之前舉行互選各照定額增列多名好惡既卜諸輿情用舍仍歸於宸斷其碩學通儒資格確定較難人數調查不易互選勢所難行擬略仿從前保薦鴻博之例寬取嚴用以搜訪之任寄諸庶官抉擇之權授諸學部仍寬定開列名數冀不失欽選之本旨以上各項略採各國上院辦法為建設上議院之基礎而資政院兼有下院性質不能無民選議員與欽選相對待特以咨議局為資政院半數議員之互選機關咨議局議員本由各省合格紳民復選而來則咨議局公推遞升之資政院議員即不啻人民間接所選舉公推遞升之標準不能不以得票多寡為衡但監督權屬於督撫非經覆定不令遽膺是選既與欽選大權示有區別自與下院要義不相背馳詔如所議行資政院議員選舉章程之規定宗室王公世爵列爵凡十二一和碩親王二多羅郡王三多羅貝勒四固山貝子五奉恩鎮國公六奉恩輔國公七不入八分鎮國公八不入八分輔國公九鎮國將軍十輔國將軍十一奉國將軍十二奉恩將軍按院章定額分配自和碩親王至奉恩輔國公十人自不入八分鎮國公至奉恩將軍六人滿漢世爵以滿洲蒙古漢軍旗員及漢員三等男以上以之爵級為限按定額分配三等侯以上八人一等伯至三等男四人外藩王公世爵凡下列蒙古回部西藏各爵一汗二親王三郡王四貝勒五貝子六鎮國公七輔國公按定額分配內蒙古六盟盟各一人外蒙古四盟盟各一人科布多及新疆所屬蒙古各旗一人青海所屬蒙古各旗一人回部一人西藏一人凡各項世爵年滿三十歲以上未奉特旨停止差俸及因疾病或事故自請開去一切差使者均得選充資政院議員每屆選舉資政院於前一年九月行知宗人府各該管衙門理藩部分別查明合格者造具清册於選舉年分二月以前咨送資政院由院分別開單於三月以前奏請按額欽選其宗室王公滿漢世爵現任軍機大臣參豫政務大臣及資政院總裁副總裁者無庸選充有缺額時資政院隨時行知各該衙門修正清册按爵級或部落應選充者奏請欽選補足之宗室覺羅凡男子年滿三十歲以上無下列情事者得選充資政院議員一曾處圈禁或發遣者二失財産上信用被人控實未清結者三吸食鴉片者四有心疾者五不識文義者其現任三品以上職官審判檢察巡警官及現充海陸軍軍人者無庸選充按定額分配宗室四人覺羅二人由各該合格人先行互選於選舉年分二月初一日在京師及奉天府行之京師以宗人府堂官為監督奉天以東三省總督為監督每屆互選資政院於前一年九月行知互選監督照章舉行設互選管理員掌調查互選人管理投票開票檢票等事宜由互選管理員查明合格人員造具互選人名册先期呈由互選監督宣示公衆如本人認為錯誤遺漏得於宣示期內呈請互選監督更正補入經批駁者不得瀆請互選選舉人及被選舉人均以列名互選人名册者為限屆期互選監督應親蒞投票所或派員監察之互選人應親赴投票所自行投票用記名單記法互選人有因職務或因疾病事故不能親赴投票者得就互選人內委託一人代行投票應由本人親書密封署名畫押連同委託憑證送致受託人該受託人應將密封及委託憑證臨時向互選監督呈驗方許代投以得票較多數者為當選互選當選人額數各以議員定額之十倍為準互選告竣互選監督即日將當選人名榜示投票所不願應選者得於三日內呈明互選監督撤銷將得票次多數者補入互選管理員造具當選人名册連同票紙呈由互選監督咨送資政院由院將當選人名及得票數目於選舉年分三月以前奏請按額欽選有缺額時資政院隨時將本屆當選人開單奏請欽選補足之本屆當選人數不足議員缺額之三倍時應舉行臨時互選一切照尋常互選辦理各部院官以下列各官為限一內閣侍讀學士以下中書以上二翰林院侍讀學士以下庶吉士以上三各部左右參議以下七品小京官以上四掌印給事中給事中及監察御史各官以年滿三十歲以上具下列資格之一得選充資政院議員一現任實缺者二曾任實缺未休致革職者三奉特旨署理或奏署者四奉特旨候補補用選用或學習行走者五其餘候補滿三年以上者由合格人先行互選於選舉年分二月初一日在京師行之以都察院堂官為監督互選當選人額數以議員定額之五倍為率各部院官選充資政院議員者於院內職權本衙門長官不得干涉其因升轉降調致失原定資格者即同時失資政院議員之資格所有舉行互選奏請欽選補足缺額各辦法與宗室覺羅選舉同碩學通儒資格凡四一不由考試特旨賞授清秩者二著書有裨政治或學術者三有入通儒院之資格者四充高等及專門學堂主要科目教習五年以上著有成績者凡年滿三十歲以上具前列資格之一均得選充資政院議員每屆選舉資政院於前一年九月行知學部由部通行京堂以上官翰林給事中御史各省督撫提學使出使各國大臣各搜訪一人或二人開具事實保送學部審查擇定合格得保多者三十人作為碩學通儒議員之被選人於選舉年分二月以前咨送資政院由院將被選人姓名及原保人姓名官職開單於三月以前奏請按額欽選有缺額時資政院隨時將本屆被選人照章奏請欽選補足之本屆被選人數不足議員缺額之三倍時應另行保送納稅多額人以下列資格為限一男子照地方自治章程有選民權者二年納正稅或地方公益捐在所居省分占額較多者凡具此資格年滿三十歲以上得選充資政院議員由合格人先行互選於選舉年分二月初一日在各省城行之以布政使或民政使為監督每屆互選資政院於前一年九月行知各省督撫照章舉行互選監督會同商務總會總理協理遴派互選管理員互選辦法與普通互選同互選人額數每省以二十人為限投票用記名連記法以得票過互選人數三分之一者為當選互選當選人額數以互選人額數十分之一為率如當選人不足定額就得票較多者令互選人再行投票以足額為止其得票及格額滿見遺者作為候補當選人當選人不願應選得呈明互選監督撤銷以候補當選人依次遞補互選管理員造具當選人及候補當選人名册連同票紙呈由互選督申送本省督撫各督撫將當選人姓名及得票數目咨送資政院由院開單於三月以前奏請按額欽選有缺額時資政院隨時將本屆當選人開單奏請欽選補足之本屆當選人不足議員缺額之三倍時以候補當選人遞補候補當選人數不敷時舉行臨時互選各省咨議局互選咨政院議員按定額分配奉天三人吉林二人黑龍江二人順直九人江蘇七人安徽五人江西六人浙江七人福建四人湖北五人湖南五人山東六人河南五人山西五人陝西四人甘肅三人新疆二人四川六人廣東五人廣西三人雲南四人貴州二人互選於選舉年分前一年十月十一日在各省咨議局行之以督撫為監督每屆互選資政院於前一年九月行知各互選監督照章舉行屆期互選監督親蒞監察之投票開票檢票等事由咨議局辦事處管理適用普通互選規則互選選舉人及被選舉人均以該省咨議局議員為限投票用記名連記法以得票過互選人半數者為當選互選當選人額數以各該省議員額數之二倍為率如當選人不足定額就得票較多者令互選人再行投票以足額為止其投票及格額滿見遺者作為候補當選人咨議局辦事處造具當選人及候補當選人名册連同票紙呈送互選監督覆加選定為資政院議員不願應選者得呈明互選監督辭退依次將本屆當選人及候補當選人覆加選定補充不敷選充者舉行臨時互選選定後由互選監督造具名册連同當選人及候補當選人原册咨送資政院凡選充資政院議員者不得兼充本省咨議局議員有缺額時由院行知該省督撫覆加選定補充或舉行臨時互選此資政院議員欽選互選辦法之概要也各省咨議局議員選舉章程之規定議員之選任用復選舉法復選之別於單選者單選徑由選舉人投票選出議員復選則先由選舉人選出若干選舉議員人更令選舉議員人投票選出議員是也咨議局議員定額因各省戶口尚無確實統計參酌各省取進學額及漕糧多寡以定準則奉天五十名吉林三十名黑龍江三十名順直百四十名江寧五十五名江蘇六十六名安徽八十三名江西九十七名浙江百十四名福建七十二名湖北八十名湖南八十二名山東百名河南九十六名山西八十六名陝西六十三名甘肅四十三名新疆三十名四川百零五名廣東九十一名廣西五十七名雲南六十八名貴州三十九名京旗及各省駐防以所住地方為本籍但旗制未改以前京旗得於順直議員定額外暫設專額十名各省駐防得於該省議員定額外每省暫設專額一名至三名選舉權之規定用限制選舉法凡屬本省籍貫之男子年滿二十五歲以上具下列資格之一者有選舉咨議局議員之權一在本省地方辦理學務及公益事務滿三年以上著有成績者二在本國或外國中學堂及與中學同等或中學以上之學堂畢業者三有舉貢生員以上之出身者四曾任實缺職官文七品武五品以上未被參革者五在本省地方有五千元以上之營業資本或不動産者凡非本籍之男子年滿二十五歲寄居本省滿十年以上有萬元以上之營業資本或不動産者亦得有選舉權被選舉權之規定及其限制凡屬本省籍貫或寄居本省滿十年以上之男子年滿三十歲以上者得被選舉為咨議局議員凡有下列情事之一者不得有選舉權及被選舉權一品行悖謬營私武斷者二曾處監禁以上之刑者三營業不正者四失財産上信用被人控實未清結者五吸食鴉片者六有心疾者七身家不清白者八不識文義者其有所處地位不適於選舉議員及被選舉為議員者一本省官吏或幕友二軍人三巡警官吏四僧道及宗教師五學堂肄業生均停其選舉權及被選舉權其現充小學教員者停其被選舉權咨議局設議長一副議長二用單記投票法分次互選設常駐議員以議員額數十分之二為額用連記投票法一次互選凡議員三年一改選議長副議長任期同常駐議員任期限一年議長因事出缺以副議長遞補副議長出缺由議員互選充補議員出缺以復選候補當選人依次遞補議員改選再被選者得連任以一次為限議員非因下列事由不得辭職一確有疾病不能擔任職務者二確有職業不能常駐本省境內者三其餘事由經咨議局允許者凡選舉區域初選舉以廳州縣為選舉區復選舉以府直隸廳州為選舉區直隸廳州及府之本管地方均作為初選區直隸廳無屬縣者以附近之府為復選區初選區廳以同知通判州縣以知州知縣為初選監督復選區府以知府直隸廳州以同知通判知州為復選監督府直隸廳州作為初選區者得遴派教佐員為初選監督初選復選均設投票開票管理員監察員若干名管理員不拘官紳監察員以本地紳士為限初選區選舉人名册及當選人姓名票數由初選監督申報復監督復選當選人姓名票數由復選監督申報督撫分別咨報資政院民政部立案選舉年限三年一次以正月十五日為初選日期三月十五日為復選日期凡初選舉初選監督按地方廣狹人口多寡分劃本管區域為若干投票區分設選舉調查員按照選舉資格詳細調查將合格選舉人造具名册於選舉期六個月以前呈由復選監督申報督撫並宣示公衆如本人認為錯誤遺漏得於宣示期內呈請初選監督更正初選當選人額數按照議員定額加多十倍各初選區應出當選人若干名由復選監督分配投票用無名單記法其有寫不依式者夾寫他事者字迹模糊者不用頒發票紙者選出之人不合被選資格者作為廢票以本區應出當選人額數除選舉人總數所得半數為當選票額得票不滿當選票額以上者不得為初選當選人復選由初選當選人齊集復選監督所在地行之復選當選人即為咨議局議員各復選區應得議員若干名由督撫按全省議員定額分配投票當選一切與初選同關於選舉之變更如選舉人名册有舞弊作偽情事或辦理不遵定章被控判定確實者初選復選均無效當選議員有辭任或疾病不能應選或身故或被選資格不符當選票數不實被控判定確實者其當選無效各以候補當選人遞補如選舉人確認辦理人員不遵定章有舞弊作偽證據或當選人被選資格不符當選票數不實及落選人確信得票可當選而不與選候補當選人名次錯誤遺漏者均得向該管衙門呈控限自選舉日起三十日凡選舉訴訟初選向府直隸廳州衙門復選向按察使衙門呈控各省已設審判廳者分別向地方高等審判廳呈控不服判定者初選得向按察使衙門復選得向大理院上控限判定日起三個月已設審判廳者照審判廳上控章程辦理選舉人及辦理選舉人選舉關係人有違法行為分別輕重處以監禁罰金有差二年以上十年以下不得為選舉人及被選舉人專額議員選舉人及被選舉人以京旗及駐防人員為限選舉及被選舉資格與咨議局普通議員資格同各省駐防專額議員之數視該省駐防取進學額全數在十名以內者設議員一名二十名以內設二名二十名以外設三名初選當選人額數以議員定額十倍之數為準復選當選人額數以議員定額為準調查選舉人名册由督撫會同將軍都統於京旗及駐防人員內各酌派選舉調查員當選改選補選及訴訟罰則各事均照咨議局選舉章程辦理此各省咨議局議員初選復選辦法之概略也各省咨議局選舉宣統元年各督撫次第奏報舉行於九月初一日召集開會舉行互選資政咨議員二年四月資政院奏請欽選各項議員奉敕選定以八月二十日為召集期九月初一日資政院舉行第一次開院禮監國攝政王代行蒞選頒諭嘉勉議員三年九月遵章第二次召集開會資政院咨議局議員選舉外尚有地方自治團體之選舉地方自治為立憲基礎列於籌備事宜清單光緒三十四年宣統元年憲政編查館先後核議民政部奏城鎮鄉府廳州縣及京師地方自治暨選舉各章程各省次第籌辦其選舉辦法與咨議局議員選舉略有出入以繁瑣不備載
