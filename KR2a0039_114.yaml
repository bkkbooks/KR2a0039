body:
  text: 清史稿卷一百十四志八十九職官一太祖肇基東土國俗淳壹事簡職專置八旗總管大臣佐管大臣董統軍旅置議政五大臣理事十大臣釐治政刑任用者止親貴數臣官稱職立人稱官置興也勃焉太宗厲精為治設三館置八承政論功料勤翕斯郅治世祖入關因明遺制內自閣部以迄庶司損益有物藩部創建名竝七卿外臺督撫杜其紛更著為令甲綠營提鎮以下悉易差遣為官旗營御前領衞年宿位重意任隆密都統旗長軍民合治職視專圻駐防分翰外畿規撫京制西北邊陲守以重臣綏靖蒙番方軌都護斯皆因俗而治得其宜已世宗綜覈罷尚寶行人僉都諸目高宗明哲損參政參議副使僉事諸銜沙汰虛冗奉職肅然嘉道以降整釐如舊日久頹弛精意浸失日革月易百職相侵光緒變法宣統議制品目張皇掌寄紛雜將以靖國不益囂乎夫一國事權操自樞垣匯於六曹分寄於疆吏自改內三院為內閣台輔拱袂迨軍機設題本廢內閣益類閒曹六部長官數四各無專事甚或朝握銓衡夕兼支計甫主戎政復領容臺一職數官一官數職曲存禀仰建樹寧論時軍機之權獨峙於其上國家興大兵役特簡經略大臣參贊大臣親寄軍要吏部助之用人戶部協以巨饟用能藉此雄職奏厥膚功自是權復移於經略督撫儀品雖與相埒然不過承號令備策應而已厥後海疆衅起經略才望稍爽權力漸微粵難糾紛首相督師屢僨厥事朝廷間用督撫董戎多不辱命猶復不制以文法故能霈施魄力自是權又移於督撫同治中興光緒還都皆其力也洎乎末造親貴用事權削四旁厚集中央疆事遂致不支焉初制內外羣僚滿漢參用蒙古漢軍次第分布康雍兩朝西北督撫權定滿缺領隊辦事大臣專任滿員累朝膺閫外重寄者滿臣為多逮文宗兼用漢人勳業遂著大抵中葉以前開疆拓宇功多成於滿人中葉以後撥劇整亂功多成於漢人季世釐定官制始未嘗不欲混齊畛域以固厥根本也而弊風相仍一物自為鴻乙徒致疑駴雖危亡之政無關典要亦必輯而列之以著一時故實治亂之跡庶皎然若覽焉宗人府師傅保內閣稽查欽奉上諭事件處中書科軍機處內繙書房方略館吏部戶部三庫倉場關稅各差禮部會同四譯館樂部兵部刑部工部火藥局河道溝渠盛京五部宗人府宗令左右宗正左右宗人俱各一人宗室王公為之府丞漢一人正三品其屬堂主事漢主事經歷司經歷並正六品左右二司理事官正五品副理事官從五品主事委署主事俱各二人筆帖式効力筆帖式各二十有四人俱宗室為之宗令掌皇族屬籍顯祖宣皇帝本支為宗室繫金黃帶旁支曰覺羅繫紅帶革字者繫紫帶以時修輯玉牒奠昭穆序爵祿宗室封爵十有二曰和碩親王曰多羅郡王曰多羅貝勒曰固山貝子曰奉恩鎮國公曰奉恩輔國公曰不入八分鎮國公曰不入八分輔國公曰鎮國將軍曰輔國將軍曰奉國將軍曰奉恩將軍嫡子受封者二等曰世子曰長子福晉夫人之號各視夫爵以為差公主之等二曰固倫公主曰和碩公主格格之等五曰郡主曰縣主曰郡君曰縣君曰鄉君不入五等曰宗女額駙品級各視公主格格等級以為差麗派別申教誡議賞罰承陵廟祀事宗正宗人佐之府丞掌校漢文冊籍左右二司分掌左右翼宗室覺羅譜牒序錄子女嫡庶生卒婚嫁官爵名諡並覈承襲次序秩俸等差及養給優卹諸事堂主事掌清文奏稿漢主事掌漢文典籍經歷掌出納文移筆帖式掌繙譯文書各部同筆帖式為滿員進身之階國初大學士達海額爾德尼索尼諸人並起家武臣以諳練國書特恩賜號巴克什即後之筆帖式也厥後各署候補者紛不可紀矣其兼領者左右翼宗學總理學務王二人稽察京堂官三人並請旨簡派總管四人食七品俸副管十有六人食八品俸並以宗室中分尊年長者引見補授清書教習騎射教習各六人漢書教習八人所轄銀庫以本府堂官及滿洲大臣各一人領之請旨簡派司官二人由府引見補授筆帖式四人空房司官筆帖式亦如之黃檔房司官筆帖式無員限初制列署篤恭殿前置八和碩貝勒共議國政各置官屬順治九年設宗人府置宗令一人親王郡王為之左右宗正貝勒貝子兼攝宗人鎮國公輔國公及將軍兼攝後擇賢不以爵限俱各二人啟心郎覺羅一人漢軍二人初制秩視理事官九年改視侍郎始以滿臣不諳漢語議事令坐其中後多緣以為奸康熙十二年省與府丞並為正官其郎中六人康熙三十八年省二人員外郎四人主事三人以覺羅為之嗣改覺羅滿洲參用堂主事二人經歷三人宗室滿洲二人漢一人康熙三十八年省漢缺乾隆二十九年改用宗室筆帖式二十有四人後增减無恆初為他赤哈哈番筆帖式哈番尋改六七八品及無頂戴筆帖式各部同康熙十二年省啟心郎增滿洲主事一人分隸左右二司雍正元年增漢主事二人用進士出身者明年改郎中為理事官員外郎為副理事官並定為宗室滿洲參用乾隆二十九年允府丞儲麟趾奏始專用宗室人員五十三年增置委署主事四人筆帖式改太師太傅太保為三公正一品少師少傅少保為三孤從一品太子太師太子太傅太子太保從一品太子少師太子少傅太子少保正二品俱東宮大臣無員限無專授初沿明制大臣有授公孤者嗣定為兼官加官及贈官內閣大學士滿漢各二人初制滿員一品漢員二品順治十五年改與漢同雍正八年幷定正一品協辦大學士滿漢各一人尚書內特簡正一品學士漢洲六人漢四人初制滿員二品漢員三品順治十五年並改正五品兼禮部侍郎者正三品雍正八年定從二品後皆兼禮部侍郎銜典籍廳典籍滿漢漢軍各二人正七品侍讀學士滿洲四人蒙漢各二人初兼太常寺卿銜尋罷雍正三年定從四品中書正七品滿洲七十人蒙古十有六人漢軍八人貼寫中書滿洲四十人蒙古六人大學士掌鈞國政贊詔命釐憲典議大禮大政裁酌可否入告協辦佐之修實錄史志充監修總裁官經筵領講官會試充考試官殿試充讀卷官春秋釋奠攝行祭事學士掌敷奏侍讀學士掌典校侍讀掌勘對典籍掌出納文移內閣為典掌絲綸之地自大學士以下皆不置印惟典籍置之以鈐往來文牒中書掌撰擬繙譯分辦本章處凡五曰滿本房漢本房蒙古本房滿籤票處漢籤票處又誥敕房稽察房收發紅本副本處飯銀庫俱由大學士委侍讀以下官司之惟批本處額置滿洲翰林官一人請旨簡派中書七人滿中書內補授初天聰二年建文館命儒臣分直十年更名內三院曰國史曰秘書曰弘文始亦沿承政名後各置大學士一人順治元年置滿漢大學士不備官兼各部尚書銜學士滿洲康熙九年改置二人十年增四人通舊為六人漢軍康熙十年改置二人十二年併入漢缺各三人漢學士無員限康熙十年改置二人明年增二人十二年省軍入漢缺通舊為四人典籍滿漢漢軍各三人康熙九年改置二人侍讀滿洲十有一人清文五人清漢文六人康熙三十八年省清文一人清漢文二人尋復增二人通舊為十人蒙古漢軍康熙九年各置二人漢康熙九年省雍正四年置二人各三人中書滿洲七十有五人蒙古十有九人漢軍十有三人漢三十有六人康熙三十八年省滿洲漢軍各五人蒙古三人漢四人乾隆十三年復省漢三人二年定為正二品衙門以翰林官分隸之三院上並繫內翰林字八年置侍讀學士滿蒙漢軍各三人十八年增滿洲二人蒙古三人康熙九年增滿洲四人餘改置二人乾隆十七年省漢軍入漢缺十年置三院漢大學士各二人十五年更名內閣別置翰林院官以大學士分兼殿閣曰中和殿保和殿文華殿武英殿文淵閣東閣諸大學士仍兼尚書學士亦如之十八年復三院舊制康熙九年仍別置翰林院改三院為內閣置滿漢大學士四人雍正九年禮部尚書陳元龍左都御史尹泰特授額外大學士置協辦自此始厥後多至六人少或一二人乾隆十三年始定大學士協辦大學士員限省中和殿增體仁閣以三殿三閣為定制唯保和殿不常置嗣後授保和者止傅恆一人凡遇歲時慶節朝會漢員列滿員下自光緒間李鴻章繫文華殿銜而寶鋆時繫武英殿班轉居其右五十八年停兼尚書銜宣統三年改組內閣別令大學士序次翰林院先是世祖親政日至票本房大學士司票擬意任隆密康熙時改內閣分其職設翰林院雍正時青海告警復分其職設軍機處議者謂與內三院無異顧南書房翰林雖典內廷書詔而軍國機要綜歸內閣猶為重寄至本章歸內閣大政由樞臣承旨權任漸輕矣稽察欽奉上諭事件處兼理大臣無員限滿漢大學士尚書左都御史內特簡掌察諸司諭旨特交事件督以例限委署主事滿洲一人行走司官漢四人並於吏兵刑工四部選補筆帖式四十人額外筆帖式八人中書科稽察科事內閣學士滿漢各一人由內閣學士內特簡掌稽頒冊軸掌印中書滿洲一人掌科中書漢一人中書並從七品滿洲一人漢三人掌繕書誥敕筆帖式十人初制置滿洲中書舍人一人乾隆十四年增一人漢中書舍人八人雍正十三年派兼內閣行走乾隆十三年省四人順治九年置滿洲記事官同掌科事康熙九年改記事官為中書舍人乾隆三十六年置管中書科事漢內閣學士一人明年改管科事為稽察科事增置滿洲內閣學士一人改中書舍人為中書科置掌印中書滿漢各一人宣統三年省軍機處軍機大臣無定員由大學士尚書侍郎內特旨召入區其名曰大臣曰大臣上行走其初入者加學習二字掌軍國大政以贊機務常日侍直應對獻替巡幸亦如之明降諭旨述交內閣諭本處行者封寄所司並冊藏存記人員屆時題奏其屬曰章京滿洲十有六人漢二十人名曰行走分頭班二班初無定額嘉慶四年定每班八人後增减無恆光緒三十二年定三十有六人復定領班秩視三品幫領班秩視四品餘並以原官充補三十四年改領班為從三品幫領班為從四品分掌清文漢字初設議政處令鞏阿岱等為議政大臣參畫軍要雍正十年用兵西北慮儤直者洩機密始設軍機房後改軍機處而滿洲大學士尚有兼議政銜者乾隆五十六年停高宗涖政更名總理處尋復如初時入直者皆重臣故事親王不假事權至嘉慶四年始命成親王入直旋出之咸豐間復命恭親王入直歷三朝領班如故嗣是醇賢親王禮親王慶親王等踵相躡光緒二十七年設政務處以軍機大臣領督辦事參預大臣無定員提調幫提調總辦幫總辦俱各二人章京八人並以本處員司兼充二十八年附設財政處尋罷三十二年更名會議政務處隸內閣宣統三年省三十一年定署名制越二年設憲政編查館復命軍機大臣領之先是設考察政治館命度支部尚書載澤等考察各國政治至是更名置提調四總核參議各二庶務處總辦一一二等諮議官無恆額設編制統計官報三局局長副局長各一科員視事酌置又考核科總辦一幫辦正科員各二副科員八調京外官兼充宣統三年省宣統三年改責任內閣以軍機大臣為總協理大臣內繙書房管理大臣滿洲軍機大臣兼充掌繙諭旨御論冊祝文字提調協辦提調各二人收掌官掌檔官俱各四人並於本房行走官內酌派繙譯四十人宣統初改隸翰林院方略館總裁軍機大臣兼充掌修方略提調收掌俱滿漢二人纂修滿洲三人漢六人俱由軍機章京內派充漢纂修缺內由翰林院咨送充補一人校對無員限六部司員內閣中書兼充有事權置畢迺省吏部尚書初制滿洲一品漢人二品順治十六年改滿尚書二品康熙六年復故九年仍改正二品雍正八年俱定從一品各部同左右侍郎初制滿洲漢軍二品漢