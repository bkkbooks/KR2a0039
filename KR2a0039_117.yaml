body:
  text: 清史稿卷一百十七志九十二職官四武職藩部土司各官公侯伯子男額駙侍衞處鑾輿衞驍騎營八旗都統前鋒營護軍營統領景運門直班八旗內務府三旗護軍營總統三旗包衣驍騎營三旗包衣護軍營步軍統領火器健銳神機虎鎗諸營嚮導處上虞備用處善撲營王公府屬各官公主府長史陵寢駐防各官各省駐防將軍等官提督等官各處駐劄大臣回部各官藩屬各官土司各官番部僧官公侯伯超品子正一品男正二品輕車都尉正三品以上俱分三等騎都尉正四品雲騎尉正五品恩騎尉正七品凡九等以封功臣及外戚初天命五年論功序列五爵分總兵為三等副將參將游擊亦如之牛彔額真稱備禦天聰八年始設一等公即五備禦之總兵及一二三等昂邦章京即總兵梅勒章京即副將扎蘭章京一二等即參將三等游擊牛彔章京即備禦順治元年加封功臣公侯伯世爵錫之誥券時公侯伯下無子男副參即其爵也四年改昂邦章京為精奇尼哈番梅勒章京為阿思哈尼哈番扎蘭章京為阿達哈哈番牛彔章京為拜他喇布勒哈番授爵自拖沙喇哈番始舊為半個前程漢稱外所千總正五品遞上為拜他喇布勒哈番漢稱外衞指揮副僉事從四品再一拖沙喇哈番稱外衞指揮僉事正四品阿達哈哈番三等稱外衞副同知二等稱外衞指揮同知俱從三品一等稱外衞指揮副使再一拖沙喇哈番稱外衞指揮使正三品阿思哈尼哈番三等稱外衞都指揮副同知二等稱外衞都指揮同知俱從二品一等稱外衞都指揮副使再一拖沙喇哈番稱外衞都指揮使俱正二品精奇尼哈番二等稱鑾儀衞都指揮同知從一品一等稱鑾儀衞都指揮使正一品積拖沙喇哈番二十六為一等公八年定世襲罔替制十八年定合併承襲制康熙元年以世爵合併至公侯伯者仍與分襲雍正二年錫明裔朱之璉一等侯乾隆十四年錫名延恩八年嘉大學士張廷玉等輔弼勤勞賜一等阿達哈哈番世襲漢世職自此始明年錫公爵嘉名如褒績忠達類外戚命為承恩公往制為一等公乾隆四十三年改三等乾隆元年定精奇尼哈番漢字為子阿思哈尼哈番為男阿達哈哈番為輕車都尉拜他喇布勒哈番為騎都尉拖沙喇哈番為雲騎尉滿文如故十三年定公侯伯以次封爵表一等公襲二十六次一等侯兼一雲騎尉襲二十三次一等伯兼一雲騎尉十九次一等男兼一雲騎尉十一次自公至男一二三等依次遞降十四年追錫侯伯嘉名如奉義侯敦惠伯類自是垂為永制十六年定世襲七品官為恩騎尉是為九等三十二年嘉黃芳度功予襲公爵十二世並依八旗例復給恩騎尉優卹於無窮時將軍張勇等提督孫思克等並緣此推恩繇是漢官亦有世襲罔替例同治中興剖符析圭者漢官為多猶古武功爵也光緒三十三年制定創興大業者予子男號曰商爵則頒爵之制少異已公主額駙位在侯伯上尚固倫公主中宮所生女曰固倫額駙秩視固山貝子尚和碩公主妃所生女及中宮撫養者曰和碩額駙秩視超品公親王女曰郡主額駙秩視武職一品世子郡王女曰縣主額駙視二品貝勒女曰郡君額駙視三品貝子女曰縣君額駙視四品入八分鎮國公輔國公女曰鄉君額駙視五品近支格格予歲祿遠支止予虛銜下嫁蒙藩亦如之所生之子各予其父品級初太祖時額駙何和禮授都統達爾漢繼之太宗時巴雅思祜朗授都統拉哈繼之自是御前侍衞大臣護軍前鋒統領皆為專職亦有僅受歲祿而護從隨征受命一充其任者至出鎮西北則自定邊左副將軍策淩始踵其後者世宗時觀音保為領隊大臣高宗時色布騰巴勒珠爾為參贊大臣其授文職者止天命間蘇鼐乾隆間福隆安二尚書而已侍衞處領侍衞內大臣正一品內大臣初制正一品後改從一品各六人鑲黃正黃正白旗各二人散秩大臣都統護軍前鋒統領滿大學士尚書內特簡散秩大臣無員限從二品食三品俸主事一人署主事三人筆帖式二十有七人內委署十五人協理事務侍衞班領正三品侍衞班領正四品各十有二人署班領二十有四人侍衞什長七十有九人宗室九人侍衞一等正三品六十人旗各二十人宗室九人旗各三人二等正四品百五十人旗各五十人三等正五品二百七十人旗各九十人宗室六十有三人旗各二十一人藍翎侍衞九十人旗各三十人三旗通為五百七十人內隸黏竿處三十四人上駟院二十四人上虞備用處三十六人善撲營武備院無常額四等侍衞漢侍衞分一二三等及藍翎俱無員限親軍校正六品署親軍校初無品級乾隆五十一年定從八品各七十有七人領侍衞掌董帥侍衞親軍偕內大臣散秩大臣翊衞扈從協理主事筆帖式分掌章奏文移侍衞掌營衞周廬更番侍直分兩翼宿衞乾清門內右門神武門寧壽門為內班太和門為外班行幸駐蹕如宮禁制朝會祭祀出入則衞官填街騎士塞路領侍衞內大臣侍衞班領帥豹尾班侍衞散秩大臣侍衞什長執纛親軍以供導從大閱則按隊環衞親軍校掌分轄營衆其常日侍直者御前大臣王大臣兼任御前侍衞御前行走乾清門行走俱侍衞內特簡無常員故事凡宿衞之臣惟滿員授乾清門侍衞其重以貴戚或異材乃擢入御前漢籍輒除大門上侍衞領侍衞內大臣轄之其以材勇擢侍乾清門者班崇極矣惟嘉慶問楊芳特授國什哈轄漢國什哈內大臣歎為未有其出入扈從者後扈大臣二人御前大臣領侍衞內大臣兼任前引大臣十人內大臣散秩大臣前鋒統領護軍統領副都統兼任所轄奏事處御前大臣兼管侍衞一人御前侍衞乾清門侍衞內特簡章京六人內府司員四人各部院司員二人筆帖式二人內府筆帖式兼充奏蒙古事侍衞六人乾清門或大門侍衞兼充初太祖以八旗禁旅戡定區夏鑲黃正黃正白三旗皆自將爰遴其子弟命曰侍衞亦間及宗室秀彥外藩侍子統以勳戚備環直焉順治元年定侍衞處員數如前所列時漢廕生亦與選尋罷康熙二十九年擢武進士嫻騎射者為侍衞附三旗三十七年增宗室侍衞無常員雍正七年定九十人雍正三年選藍翎侍衞材力魁健者置四等後復如故明年定武進士一甲一名授一等侍衞二三名授二等二甲選三等三甲選藍翎置滿洲主事一人乾隆三十六年以隨印協理事務侍衞班領為一等侍衞班領為二等凡十人置一長三旗什長六十人宗室九人四十年增委署親軍校七十有七人嘉慶十九年以散秩大臣無辦事責諭凡擢都統者停兼職鑾輿衞掌衞事大臣一人正一品無專員以滿蒙王公大臣兼授鑾輿使初制正二品康熙二年改正三品七年復故滿洲二人凡滿缺並以蒙古人兼授漢軍一人凡漢軍缺並以漢人兼授其屬堂主事滿洲一人經歷廳經歷漢一人筆帖式滿洲七人漢軍三人又六所一衞曰左所曰右所曰中所曰前所曰後所日馴象所曰旗手衞冠軍使初制正三品康熙二年改正四品七年復故宗室一人滿洲漢軍七人雲麾使初制正四品康熙二年改正五品七年復故宗室二人滿洲漢軍十有八人治宜正初制正五品康熙二年改正六品七年復故宗室三人滿洲漢軍二十有九人整宜尉初制正六品康熙二年改從七年復故雍正十年陞正五品後復改從六品宗室三人滿洲漢軍二十有三人鳴贊鞭官由太常鴻臚二寺贊禮郎鳴贊官咨補滿洲四人學習二人鑾輿使掌供奉乘輿秩序鹵簿辨其名物與其班列凡祭祀朝會時巡大閱帥所司供厥事左所掌輿乘輦路右所掌傘蓋刀戟弓矢殳槍中所掌麾氅旛幢纛幟節鉞仗馬前所掌扇罏瓶盂杌椅星拂御仗椶薦靜鞭品級山後所掌旗爪吾仗馴象所掌儀象騎駕鹵簿前部大樂旗手衞掌金鉦鼓角鐃歌大樂兼午門司鐘神武門鐘鼓樓直更主事掌章奏經歷掌文移其別設者往制步輦雲麾使一人治宜正三人駕庫管理整宜尉二人俱漢軍為之後分金玉象革木五輅並拜褥椶毯篦頭亭座駕衣諸管理派冠軍使以次各官兼攝則參用滿員順治元年設錦衣衞置指揮等官明年更名鑾儀衞定各官品秩時共五所所止存一司四年省指揮使置鑾儀使以次各官明年省副官及衞官百十有四人六年增攝政王下漢二品鑾儀使三品冠軍使四品雲麾使五品治儀正各二人整儀尉三人後俱省九年始以內大臣掌衞事乾隆九年置兼理衞事一人十四年省二十六年復置總理衞事內大臣一人三十年又省十一年定鑾儀使滿漢各二人康熙三十一年省漢一人乾隆五十年分滿使為左右五十七年復舊制陪祀冠軍使漢二人康熙二十三年掌步輦事三十七年以一人掌庫事四十八年俱停設左右中前後五所鑾輿馴馬擎蓋弓矢旌節旛幢扇手斧鉞戈戟班劍十司設馴象一所分東西二司設旗手一衞分左右二司定冠軍使十人宗室一人滿洲七人漢軍二人雲麾使二十有二人宗室二人滿洲十二人漢軍八人閒散六人滿缺治儀正二十有四人宗室四人漢軍二十人閒散十有八人滿缺整儀尉二十有九人宗室四人滿洲十有五人漢軍十人十五年省滿洲經歷一人康熙十六年改經歷為漢缺增置滿洲主事一人乾隆三十七年增置鳴贊鞭官四人嘉慶十三年增學習二人四十八年置總辦協辦堂務冠軍使各一人所衞冠軍使兼充嘉慶六年更名綜理七所事務冠軍使派雲麾使二人協理光緒三十三年省冠軍使二人雲麾使八人治儀正十人整儀尉四人定宗室員限如前所列餘並滿漢參用宣統元年避帝諱改鑾儀使為鑾輿使治儀正整儀尉並易儀為宜驍騎營八旗都統初制正一品後改從一品滿蒙漢軍旗各一人副都統正二品旗各二人參領正三品副參領正四品俱九十有六人滿洲漢軍各四十人蒙古十有六人佐領正四品驍騎校正六品俱千一百五十有一人滿洲各六百八十有一人蒙古各二百有四人漢軍各二百六十有六人協理事務參領四十人滿洲漢軍各十有六人蒙古八人本旗參領內選充章京筆帖式俱百四十有四人滿洲各六十有四人蒙古各三十有二人漢軍各四十有八人隨印房行走散秩官無定員都統副都統掌八旗政令宣布教養釐詰戎兵以贊旗務參領副參領掌受事付事以達佐領佐領掌稽所治戶口田宅兵籍歲時頒其教戒協理各官掌章奏文移計會出納各營同其特派者直年旗大臣八人其屬有參領章京筆帖式旗員內派委管理舊營房大臣滿蒙各一人其屬有營總章京驍騎校新營房大臣官房大臣滿蒙漢軍各八人其屬與舊營房同左右翼鐵匠局副都統其屬有參領散秩官驍騎校稽察寶坻等處駐防大臣各二人左右翼世職官學總理大臣十人其屬有參領章京清語騎射教習十五善射處管理大臣翼各一人漢軍清文義學稽察學務參領八人其分攝者俸饟處馬冊房管理馬圈籐牌營參領各官漢軍鳥槍營領催各官城門偏吉章京驍騎校俱於旗員內選充初太祖辛丑年始編三百人為一牛彔置一額真先是出兵校獵人取一矢一長領之稱牛彔至是遂以名官天命元年編制滿洲牛彔八年增編蒙古牛彔天聰四年漢軍牛彔成先分四旗尋增為八旗乙卯年定五牛彔置一扎蘭額真五扎蘭置一固山額真左右梅勒額真佐之太宗御極置總管旗務八大臣主政事即固山額真兼議政大臣佐管十六大臣主理事聽訟即梅勒額真兼理事大臣天聰八年改額真為章京固山額真如故管梅勒曰梅勒章京管扎蘭曰扎蘭章京管牛彔曰牛彔章京其隨營馬兵曰阿禮哈超哈是為驍騎營之始然猶統滿蒙漢軍為一也九年始分設蒙古八旗崇德七年復分設漢軍八旗先是二年設二旗四年分為四二十四旗之制始備順治八年定扎