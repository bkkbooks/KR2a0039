等書記官及全協書記長督練公所督辦一人督撫將軍都統領之掌整飭全省新舊營伍軍事參議官一人協都統正參領充掌綜領科局一等副官一人協參領充二等副官二人正軍校充分掌文移衆務一二三等書記官五人五六七品文官充司書生十有六人八九品文官充籌備糧餉二科科長各一人分掌編練新軍裁汰舊營會計出納服裝物品軍械局局長一人掌新舊軍槍炮彈藥以上俱副軍校充一等科員五人籌備糧餉科各二人軍械一人協參領充二等十有一人籌備四人糧餉五人軍械二人正軍校充三等十有二人籌備五人糧餉四人軍械三人協軍校充測地分局員闕光緒三十年各省設督練公所分兵備參謀教練三處置總辦幫辦提調諸目宣統三年改設科局仿陸軍新制任官授職如前所列軍制總統一人正都統充掌全軍政令總參謀官協都統充一等參謀官正參領充二等參謀官協參領充掌協贊號令參畫機宜一二等各員佐之工程隊參領官掌佐本隊事務護軍官掌理庶務轄辨兵炮隊協領官職掌如工程隊總軍械官總執法官總軍需官總軍醫官詳禁衛軍自工程隊以下俱正參領充總馬醫官副參領充俱各一人司書生十有五人副協軍校充初軍鎮協標並置司事後省鎮制統制官一人副都統充掌統帥全鎮正參謀官正參領充二三等參謀官所司同軍制執事官俱正軍校充中軍官副協參領充掌理庶務正軍械官正執法官正軍需官正軍醫官俱副協參領充正馬醫官協參領充司號長副軍校充俱各一人司書生十有五人其協標營制如禁衛軍光緒三十年改練新軍區為三十六鎮定鎮協標營官制宣統元年各省先後編混成等協暫置執法官司事生各一人尋省三年報成鎮者二十有六置總統一人總參謀以下員闕餘或成二協或一協一標鎮數未全陸軍鎮監監長協參領正軍校充監副正副軍校充各一人司書生二人光緒三十四年定監獄人員編制巡防隊分路統領官事簡緩置幫統官書記官會計官執事官各一人馬步隊管帶官一人哨官哨長各三人書記長一人以上各員俱緑營將辨兼充光緒三十三年以防練舊營雜項隊伍章制不一仿新軍成法置統領以次各職海軍艦制巡洋長江艦隊統制一人副都統加正都統銜統領二人協都統海圻巡洋艦管帶總管輪正參領一等參謀官海籌海琛海容巡洋艦南琛鏡清通濟練船江元江利楚同楚泰楚有江員炮船保民運船諸管帶副參領飛鷹魚雷獵船建威建安魚雷炮船江亨楚謙楚豫聯鯨楚觀舞鳳炮船諸管帶協參領駐英威克斯阿摩士莊各船廠監造員正參領俱各一人餘皆未補官同治十三年朝議防海購置兵輪都二十艘光緒十年法兵搆釁盡殲焉越三年編海軍經制分為四軍置提督一人為左翼總兵二人為右翼並置副將五人參將四人游擊九人都司二十有七人守備六十人千總六十有五人把總九十有九人至是又復成軍甲午一役又殲焉宣統元年設籌備處復置海軍提督仿陸軍等級訂海軍官制三年部成先後除授如上制
