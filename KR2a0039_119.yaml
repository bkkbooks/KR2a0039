body:
  text: 清史稿卷一百十九志九十四職官六新官制內閣外務部出使大臣稅務處民政部內外巡警總廳度支部清理財政處大清銀行造幣總廠學部國子監大學堂陸軍部海軍部法部修訂法律館大理院京師各級審檢廳農工商部郵傳部軍咨府弼德院資政院鹽政院典禮院禮學館提學使提法使外省各級審檢廳東三省各司禁衛軍督練公所軍制鎮制陸軍鎮監巡防隊海軍艦制清初釐定官制職儀粗具中更六七作存改洄沿世不同矣延及德宗外患躡迹譯署始立繼改專部商警學部接踵而設並省府寺乃分十部嗣議立憲理藩改部軍咨設處復更巡警為民政戶為度支商為農工商兵為陸軍附立海軍處刑為法別立大理院又取工部所司輪路郵電專設郵傳部以今況往洵稱多制宣統紹述合樞於閣增海軍部省吏部改禮部為典禮院鹽政處為鹽政院猶慮閣權過重設弼德院以相維繫資政院以為監督增埤前事取臬殊方因事創名官冗職雜階資官品肇域未區簡奏咨補故實斯在輯而存之具載後簡亦得失之林也內閣總理大臣協理大臣各一人特簡國務大臣十人各部大臣兼充丞一人承宣廳廳長副廳長各一人制咨官統計印鑄四局局長各一人丞以下俱請簡其屬有僉事印鑄藝師俱奏補藝士録事俱咨補各員所轄法制院院長副院長各一人參議四人俱請簡參事奏補僉事録事視事繁簡酌置總理掌參畫機要締綸時務法律詔令會國務大臣尾署名銜事涉一部或數部會所司大臣署之會議時充議長協理佐之丞掌主閣務綜領衆局方軌諸長承宣掌布絲綸守法典司文書圖籍制誥掌詔旨制敕璽書冊命起草進畫稽頒寶星勳章典領藩封勳級官掌考功定課彙核履行統計掌統一計表刊行年鑑印鑄掌編輯官報餘依往制詳禮部法制院掌編纂法規修明法令擬上候裁光緒三十二年改組內閣設會議政務處以各部尚書為內閣政務大臣宣統三年改責任內閣以軍機大臣為總協理大臣並定內閣屬官制如前所列外務部外務大臣副大臣各一人特簡承政廳左右丞參議廳左右參議各一人俱請簡參事四人奏補其屬司務廳司務二人咨補和會考工榷算庶務四司郎中員外郎主事各二人俱奏補以上各部同大臣掌主交涉昭布德信保護僑人傭客以慎邦交副大臣二之丞掌機密文移綜領衆務參議掌審議法令參事佐之各部同和會掌使臣覲見盟約賞賚兼司領事更替司員遷考工掌司鐵軌礦産電線船政凡製造軍火聘用客卿招工遊學諸事各擅其職榷算掌蕃貨海舶征榷貿易綜典國債郵政勾檢本部暨出使度支度務掌江海防務疆域界址凡傳教遊歷賞恤禁令裁判獄訟並按約以待有丞參上行走額外司員七品小京官民政郵傳法部小京官定額缺所轄儲材館提調幫提調各一人本部司員內遴派文案支應庶務俱派員分治其事雍正五年定恰克圖市約置辦理俄事大臣見第五款不為恆職咸豐元年改歸理藩院十年文宗北狩特置專官辦理撫局其冬設總理各國事務衙門命恭親王奕欣領之司員統稱章京置滿漢各八人時行分署治事制戶部司員核關稅理藩部司員典文移兵部司員治臺站驛遞內閣人員主機密俱隸總辦幫辦三年改為英法俄美四股九年增設海防股後改俄德英法日本五股宣統元年合俄德為一增設祕書機要二股明年置總辦四人曰總辦章京同治元年增置額外章京滿漢各二人二年各增六人光緒九年各增四人十年各減四人二十三年各增二人三年設司務廳置司務二人光緒二十七年辛丑和約成更名外務部班列各部上置總理親王會辦尚書兼會辦左右侍郎各一人改總辦為左右丞左右參議各一人並置郎中以次各官不分滿漢三十二年改訂官制意合滿漢而翰林都察兩院仍依往制是歲增置翻譯官十有五人七八九品各五人分股治事宣統三年新內閣成省總理會辦兼職改尚書為大臣侍郎為副大臣省侍郎一缺各部同管部之制至是遂廢頭等出使大臣正一品特簡參贊正三品通譯官正五品俱奏補無定員有事權置畢乃省二等出使大臣正二品特簡參贊官初制四品後改從四品奏補各一人英俄德日本奧義和比各一人法日葡各一人美墨祕古各一人分館代使二等參贊官二人日斯巴尼亞一人葡萄牙一人二等參贊兼總領事三人墨西哥一人祕魯一人古巴一人三等參贊八人初制五品後改正五品奏補英法德俄各一人美日本各二人二三等通譯官二等從五品三等從六品奏補一二等書記官一等從五品二等從六品奏補商務委員正五品奏補武隨員各使館俱一人唯奧義和比不置三等通譯官武隨員分館二等通譯官書記官俱一人總領事從四品奏補十有三人新嘉坡澳洲南斐洲坎拿大各一人隸英使海參葳一人隸俄使墨西哥古巴金山小呂宋美利濱巴拿馬各一人隸美使橫濱朝鮮各一人隸日本使爪哇一人隸和使領事正五品奏補十有四人檳榔嶼紐絲綸仰光溫哥埠各一人隸英使檀香山嘉里約各一人隸美使薩摩島一人隸德使神戶長崎仁川釜山新義州各一人隸日本使泗水巴東各一人隸和使副領事從五品奏補二人元山甑南浦各一人隸日本使又有外國人兼代領事者法馬賽義米朗納婆爾士美波士頓費城諸處使臣掌國際交涉參贊佐之領事掌保護華僑康熙初俄國通使未垂為制同治六年始遣使辦理交涉以道員志剛等及美使蒲安臣膺其選光緒元年定出使制命侍郎郭嵩燾使英翰林院侍講何如璋使日本京卿陳蘭彬使美日祕國俱置副使別設祕日分館置金山嘉里約古巴各總領事後為自主國改遣公使二年定使館參贊二人翻譯四人十四年復定翻譯隨員二人或三人分館參贊兼領事一人翻譯隨員各一人參贊如故三十二年定參贊以次各員額如前所列厥後聯翩四出英使兼領義比俄使兼駐德以奧和隸之四年置新嘉坡領事後改總領事日本各口岸理事官後改領事明年省副使置檀香山領事八年置紐約領事十三年置小呂宋總領事仰光領事檳榔嶼副領事後改領事十七年置南洋各島領事二十一年簡法國專使二十三年簡德國專使和改隸之並增置韓使三十三年撤回改總領事二十六年置韓國各口岸領事及海參葳商務委員後改總領事二十八年改駐法使臣兼使日國駐美使臣兼使古巴別設分館並簡奧義比三國專使明年設墨分館三十年置南斐洲總領事三十一年簡和國專使兼理保和會事並以法日使臣兼領葡使尋設葡分館三十四年定使臣為二品專官並參贊等官品秩宣統元年置美利濱坎拿大巴拿馬總領事嗣是澳洲溫哥埠薩摩島紐絲綸諸領事踵相躡三年置爪哇總領事泗水巴東領事其秋置朝鮮新義州領事三等出使大臣正三品特簡參贊臣通譯官無定員不恆置保和會專使大臣一人正二品特簡陸軍議員一人武官諳西文者充之光緒三十三年罷和使兼職改置督辦稅務大臣幫辦大臣各一人以大學士尚書侍郎充後改大臣副大臣充掌主關稅督率關吏提調幫提調分股總辦幫辦俱各一人外務部度支部丞參兼充所轄總稅務司副總稅務司各一人稅務司四人副稅務司六人各關稅務司五十有九人潮海五人粵海嶽州北海各三人膠海鎮江東海閩海津海金陵蘇州吉林各二人江海梧州拱北哈爾濱山海浙海厦門九龍九江亞東長沙大連甌海福海三水龍州杭州安東沙市重慶江門南寧瓊海宜昌奉天騰越思茅蒙自各一人副稅務司三十有七人江漢粵海江海三水津海琿春各三人大連潮海瓊海九龍各二人蘇州南寧龍州重慶奉天杭州厦門閩海哈爾濱蕪湖大通釐局各一人以上俱外國人為之初海關置監督各部俸深司員充之旋改歸督撫監督名焉耳自道光以來海疆日闢於是始置北洋南洋通商大臣關道及監督隸之亦有將軍兼理者津海歸直隸津海道管理山海歸奉天奉錦山海道管理東海歸山東登萊青道管理俱隸北洋鎮江歸江蘇常鎮通道管理江海歸江蘇蘇松太道管理蕪湖歸安徽皖南道管理浙海歸浙江寧紹台道管理甌海歸浙江溫處道管理江漢歸湖北漢黃德道管理宜昌歸湖北荊宜施道管理重慶歸四川川東道管理俱隸南洋閩海歸福州將軍管理粵海潮海北海瓊海九龍拱北監督各一人嘉峪歸甘肅安肅道管理龍州歸廣西太平思順道管理蒙自歸雲南臨安開廣道管理隸本省督撫咸豐以後聘用英人威妥瑪美人斯密斯氏襄辦稅務李泰國繼之派為總稅務司凡海關俱置稅務司副稅務司後沿江各埠及內地陸路增開口岸並屬海關是為海關募用客卿之始時管轄之權屬總理衙門光緒二十三年始設稅務處總稅務司以次各官並受其節度先是戶關工關分隸戶工兩部至是始以常關標名嗣外部與本處定常關分設稅局五十里外者歸監督五十里內者歸稅務司此內外常關名稱所由昉也民政部民政大臣副大臣左右丞左右參議各一人承政廳員外郎主事小京官各四人參議廳參事二人民治警政疆里營繕衛生五司郎中八人民治警政疆里各二人餘各一人員外郎十有六人民治警政營繕各四人餘各二人主事十有八人民治警政各五人營繕四人餘各二人小京官各一人習藝所員外郎一人兼充消防隊總理主事二人五品警官五人消防隊三人習藝所二人六七品警官各九人消防隊各六人習藝所各三人八九品警官各十有二人消防隊各八人習藝所各四人以上俱隸警政司六七品藝師各一人隸營繕司六七品醫官各一人隸衛生司自警官以下俱奏補八品録事二十人九品録事三十有二人俱咨補大臣掌主版籍整飭風教綏靖黎物以奠邦治副大臣二之民治掌編審戶口兼司保息鄉政警政掌巡察禁令分稽行政司法疆里掌經界圖志審驗官民土地營繕掌陵寢工程修治道路並保守古蹟祠廟衛生掌檢醫防疫建置病院所轄豫審所後隸大理院路工局教養局俱遴員分治之光緒三十年設巡警部置尚書左右侍郎左右丞參議各一人警政警法警保警學警務五司郎中五人三十二年增二人員外郎主事各十有六人三十二年增員外郎二人主事四人三十四年增營繕司一人小京官四人三十二年增五人一二三等書記官各十人仿七八九品筆帖式舊制三十二年改為八九品録事習藝所員外郎一人主事二人三十二年更名民政部設承政參議兩廳置參事二人改設民治疆里營繕衛生諸司警政如故宣統元年定習藝所及消防隊員額如前所列三年改尚書為大臣侍郎為副大臣內外城巡警總廳廳丞各一人初制正四品光緒三十三年升從三品請簡掌徼循坊境並典蹕路警衛總務處總僉事各一人從四品奏補行政司法衛生三處各僉事三人正五品俱奏補五品警官各四人六品警官十有九人內城十人外城九人七品警官二十人內城十有一人外城九人八品警官二十有七人內城十有四人外城十有三人九品警官二十有八人內城十有五人外城十有三人七品以上奏補八品以下咨補八九品録事各四人委用光緒三十年設京師內外城巡警總廳置廳丞各一人設總務警務衛生三處置參事各一人正五品三十三年改僉事內城五分廳外城四分廳知事九人正五品三十二年增司法處改警務曰行政升總務處僉事品秩為屬官首領置五品以下各警官無定員八九品録事各四人併內五分廳為中左右三廳外四分廳為左右二廳省知事四人設內城二十六區外城二十區置區官六七品警官充尋改區長區副八九品警官充尋改