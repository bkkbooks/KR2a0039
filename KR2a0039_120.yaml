body:
  text: 清史稿卷一百二十志九十五食貨一明末苛政紛起籌捐增餉民窮財困有清入主中國概豫蠲除與民更始逮康乾之世國富民殷凡滋生人丁永不加賦又普免天下租稅至再至三嗚呼古未有也道咸以降海禁大開國家多故耗財之途廣而生財之道滯當軸者昧於中外大勢召禍興戎天府太倉之蓄一旦蕩然賠償兵費至四百餘兆以中國所有財産抵借外債積數十年不能清償攤派加捐上下交困乃改海運以節漕費變圜法以行國幣講鹽政以增歲入開礦産以擴財源以及創鐵路改郵傳設電局通海舶新政繁興孳孳謀利而於古先聖王生衆食寡為疾用舒之道昧焉不講夫以唐虞治平之世而其告舜禹也諄諄以四海困窮天祿永終為戒有國者其可忽哉茲取清代理財始末條著於篇戶口田制戶口清之民數惟外藩扎薩克所屬編審丁檔掌於理藩院其各省諸色人戶由其地長官以十月造册限次年八月咨送戶部浙江清吏司司之而滿洲蒙古漢軍丁檔則司於戶部八旗俸餉處年終將民數彙繕黃册以聞其戶之別曰軍曰民曰匠曰此外若回番羌苗瑤黎夷等戶皆隸於所在府廳州縣凡民男曰丁女曰口男年十六為成丁未成丁亦曰口丁口繫於戶凡腹民計以丁口邊民計以戶蓋番回黎苗瑤夷人等久經向化皆按丁口編入民數其以戶計者如三姓所屬赫哲費雅喀奇勒爾庫葉鄂倫春哈克拉五十六姓甘肅各土司及莊浪廳所屬番子西藏各土司所屬三十九族烏里雅蘇台所屬唐努烏梁海貢貂戶科布多所屬阿爾泰烏梁海貢貂戶貢狐皮戶阿爾泰諾爾烏梁海貢貂戶貢灰鼠皮戶皆是至土司所屬番夷人等但報明寨數族數不計戶者不與其數凡民之著籍其別有四曰民籍曰軍籍亦稱衛籍曰商籍曰竈籍其經理之也必察其祖籍如人戶於寄居之地置有墳廬逾二十年者準入籍出仕令聲明祖籍回避倘本身已故子孫於他省有田土丁糧願附入籍者聽軍流人等子孫隨配入籍者準其考試之類是也又必辨其宗系如民人無子許立同宗昭穆相當者為後其有女壻義男及收養三歲以下小兒酌給財産不得遂以為嗣之類是也且必區其良賤如四民為良奴僕及倡優為賤凡衙署應役之皂隸馬快步快小馬禁卒門子弓兵仵作糧差及巡捕營番役皆為賤役長隨與奴僕等其有冒籍跨籍跨邊僑籍皆禁之世祖入關有編置戶口牌甲之令其法州縣城鄉十戶立一牌長十牌立一甲長十甲立一保長戶給印牌書其姓名丁口出則注所往入則稽所來其寺觀亦一律頒給以稽僧道之出入其客店令各立一簿書寓客姓名行李以便稽察及乾隆二十二年更定十五條一直省所屬每戶歲給門牌牌長甲長三年更代保長一年更代凡甲內有盜竊邪教賭博賭具窩逃姦拐私鑄私銷私鹽跴麥曲販賣硝磺並私立名色斂財聚會等事及面生可疑之徒責令專司查報戶口遷移登耗隨時報明門牌內改換填給一紳襟之家與齊民一體編列一旗民雜處村莊一體編列旗人民人有犯地方官會同理事同知辦理至各省駐防營內商民貿易居住及官兵雇用人役均另編牌册報明理事廳查核一邊外蒙古地方種地民人設立牌頭總甲及十家長等如有偷竊為匪及隱匿逃人者責令查報一凡客民在內地貿易或置有産業者與土著一律順編一鹽場井竈另編排甲所雇工人隨竈戶填注一礦廠丁戶廠員督率廠商課長及洞長爐頭等編查各處煤窰雇主將傭工人等册報地方查核一各省山居棚民按戶編册地主並保甲結報廣東寮民每寮給牌互相保結一沿海等省商漁船隻取具澳甲族鄰保結報官給照商船將船主舵工水手年貌籍貫並填照內出洋時取具各船互結至汛口照驗放行漁船止填船主年貌籍貫其內洋採捕小艇責令澳甲稽查至內河船隻於船尾設立粉牌責令埠頭查察其漁船網戶水次搭棚趁食之民均歸就近保甲管束一苗人寄籍內地久經編入民甲者照民人一例編查其餘各處苗瑤千百戶及頭人洞長等稽查約束一雲南有夷民錯處者一體編入保甲其依山傍水自成村落者令管事頭目造册稽查一川省客民同土著一例編查一甘肅番子土民責成土司查察係地方官管轄者令所管頭目編查地方官給牌册報其四川改土歸流各番寨令鄉約甲長等稽查均聽撫夷掌堡管束一寺觀僧道令僧綱道紀按季册報其各省回民令禮拜寺掌教稽查一外來流丐保正督率丐頭稽查少壯者遞回原籍安插其餘歸入棲流等所管束自是立法益密時各省番苗與內地民人言語不通常有肇釁之事二十四年定番界苗疆禁例凡臺灣民番不許結親違者離異各省民人無故擅入苗地及苗人無故擅入民地均照例治罪若往來貿易必取具行戶鄰右保結報官給照令塘汛驗放始往棚民之稱起於江西浙江福建三省各山縣內向有民人搭棚居住藝麻種箐開爐煽鐵造紙製菰為業而廣東窮民入山搭寮取香木舂粉析薪燒炭為業者謂之寮民雍正四年定例照保甲法一體編查乾隆二十八年定各省棚民單身賃墾者令於原籍州縣領給印票並有親族保領方準租種安插倘有來歷不明責重保人糾察報究五十五年諭廣東總督奏稱撤燬雷廉交界海面之潿洲及迤東之斜陽地方寮房遞回原籍免與洋盜串通滋事並毀校椅灣等三十二處寮房共百六十二戶另行撫恤安插沿海各省所屬島嶼多有內地民人安居樂業若遽飭令遷移使數十萬生民流離失所於心何忍且恐辦理不善轉使良民變而為匪所有各省海島除例應封禁者外餘均仍舊居住至零星散處皆係貧民尤不可獨令向隅而漁戶出洋探捕暫在海島搭寮棲止亦不可概行禁絶且人民既少稽察無難惟在各督撫嚴飭文武員辨編立保甲如有盜匪混入及窩藏為匪者一經查出將所居寮房概行燒毀俾知警懼其漁船出入口岸務期取結給照登記姓名倘進口時藏有貨物形迹可疑嚴行盤詰自不難立時拏獲也五十七年諭據福寧所奏山東一省海島居民二萬餘名口各省海島想亦不少當遵照前言不準添建房屋以至日聚日衆仍應留心訪察勿任勾結匪徒滋生事端咸豐元年浙江巡撫常大淳奏言浙江棚民開山過多以致沙淤土壅有礙水道田廬請設法編查安插分別去留如所議行四川經張獻忠之亂孑遺者百無一二耕種皆三江湖廣流寓之人雍正五年因逃荒而至者益衆諭令四川州縣將人戶逐一稽查姓名籍貫果係無力窮民即量人力多寡給荒地五六十畝或三四十畝令其開墾其吉林寧古塔伯都訥阿勒楚喀拉林等地方乾隆二十七年定例不準無籍流民居住及三十四年吉林將軍傅良奏阿勒楚喀拉林地方流民二百四十二戶請限一年盡行驅逐上曰流寓既在定例之前應準入籍墾種一例安插俾無失所嘉慶中郭爾羅斯復有內地新來流民二千三百三十戶吉林廳有千四百五十九戶長春廳有六千九百五十三戶均經將軍奏令入册安置其山東民人徙居口外者在康熙五十一年已有十萬餘人聖祖諭嗣後山東民人有到口外及由口外回山東者應查明年貌籍貫造册稽查互相對核其後直隸山西民人亦多有出口者雍正初因陸續設古北口張家口歸化城三同知管理旋移萬全縣縣丞於張家口其古北口增設巡檢一歸化城增設通判四巡檢一各按所屬民人照保甲法將姓名籍貫注册逐年咨部查核凡民人出入關口由原籍州縣給印票驗明放行所有放過票張造册報部其福建廣東民人徙居臺灣者尤衆嘉慶十五年浙閩總督方維甸奏噶瑪蘭田土膏腴內地民人流寓者多現檢查戶口漳州人四萬二千五百餘丁泉州人二百五十餘丁粵東人百四十餘丁與生熟各番雜處必須有所鈐制於是議增噶瑪蘭通判一此外如江蘇銅沛兩縣自黃河退涸變為荒田山東曹濟等屬民人陸續前往創立湖團相率墾種銅沛土民因客民占墾日相控鬬同治五年戶部奏查明容留捻匪之刁王兩團驅回原籍安分良團即令各安生業凡此夷漢之雜處土客之相猜慮其滋事則嚴為之防憫其無歸則寬為之所要皆以保甲為要圖顧保甲行於平時而編審則丁賦之所由出也編審之制州縣官造册上之府府別造一總册上之布政司凡軍民匠竈四籍各分上中下三等丁有民丁站丁土軍丁衛丁屯丁總其丁之數而登黃册督撫據布政司册報達之戶部彙疏以聞順治十四年命州縣官編審戶口增丁至二千名以上各豫紀録康熙五十一年有新增人丁永不加賦之諭自是聖祖仁政遂與一代相終始顧丁有開除即不能不有抵補故康熙五十五年戶部請以編審新增人丁補足舊缺額數如有餘丁歸入滋生册內造報從之高宗諭內閣曰朕查上年各省奏報民數較之康熙年間計增十餘倍承平日久生齒日繁蓋藏自不能如前充裕且廬舍所占田土亦不啻倍蓰生之者寡食之者衆朕甚憂之猶幸朕臨御以來闢土開疆幅員日廓小民皆得開墾邊外地土藉以暫謀衣食然為之計及久遠非野無曠土家有贏糧未易享升平之福各省督撫及有牧民之責者務當隨時勸諭俾皆儉朴成風惜物力而盡地利慎勿以奢靡相競習於怠惰也是時編審之制已停直省所報民數大率以歲造之煙戶册為據行之日久有司視為具文所報多不詳核其何以體朕欲周知天下民數之心乎又諭據鄭輝祖稱從前所辦民數册歲歲滋生之數一律雷同似此簡率相沿成何事體所有各省本年應進民册均展至明年年底倘再疏舛定當豫以處分當時民册恐不免任意填造之弊然自聖祖以來休養生息百有餘年民生其間自少至老不知有兵革之患而又年豐人樂無有夭札疵癘轉徙顛踣以至於凋耗者其戶口繁庶究不可謂盡出子虛也至編審之停始於雍正四年直隸總督李紱改編審行保甲一疏略云編審五年一舉雖意在清戶口不如保甲更為詳密既可稽察遊民且不必另查戶口請自後嚴飭編排人丁自十六歲以上無許一名遺漏歲底造册布政司彙齊另造總册進呈册內止開里戶人丁實數免列花戶則簿籍不煩而丁數大備矣乾隆五年戶部又請令各督撫於每年十一月將戶口數與穀數一併造報番疆苗界不入編審者不在此例從之三十七年從李瀚請永停編審自是惟有運漕軍丁四年一編審而已蓋清承明季喪亂戶口凋殘經纍朝休養生息故戶口之數歲有加增約而舉之順治十八年會計天下民數千有九百二十萬三千二百三十三口康熙五十年二千四百六十二萬一千三百二十四口六十年二千九百一十四萬八千三百五十九口又滋生丁四十六萬七千八百五十口雍正十二年二千六百四十一萬七千九百三十二口又滋生丁九十三萬七千五百三十口乾隆二十九年二萬五百五十九萬一千一十七口六十年二萬九千六百九十六萬五百四十五口嘉慶二十四年三萬一百二十六萬五百四十五口道光二十九年四萬一千二百九十八萬六千六百四十九口咸同之際兵革四起册報每缺數省其可稽者只二萬數千萬口不等光緒元年三萬二千二百六十五萬五千七百八十一口三十二年釐定官制以戶部為度支部而改前所設之巡警部為民政部調查戶口歸其職掌各省則以巡警道專司其事明年諭直省造報民數務須確查實數以為庶政根本民政部奏稱伏查三十二年黑龍江安徽江蘇福建甘肅廣西雲南丁册並三十一年丁册均未補造在各督撫明知逾限例當查參而積習挽回不易臣部於接收伊始籌一切實辦法擬請敕下各督撫責成府廳州縣分鄉分區自行調查丁口確數統以每年十二月底截算以清界限仍限次年十月送部彙奏制可宣統元年復頒行填造戶口格式令先查戶口數限明年十月報齊續查口數限宣統四年十月報齊至三年十月據京師內外城順天府各直省各旗營各駐防各蒙旗所報除新疆湖北廣東廣西各省江寧青州西安涼州伊犁貴州西寧各駐防泰寧鎮熱河各蒙旗川滇邊務均未册報到部外凡正戶五千四百六十六萬八千有四附戶千四百五十七萬八千三百七十共六千九百二十四萬六千三百七十四戶凡口數男一萬三千九百六十六萬二千四百一十女九千九百九十三萬二千二百有八共二萬三千九百五十九萬四千六百六十八口自雍正十三年戶部題準福建臺灣府生番百九十九名彙入彰化籍廣西慶遠府歸流土民百七十九名彙入宜山籍嗣後臺灣生番四川生番嶺夷歸化者甚衆定例令專管官編立保甲查緝匪類逢望日宣講上諭以興教化自是番民衣冠言語悉與其地民人無異亦有讀書應考者及同治光緒間交通日廣我國之民耕種貿遷遍於重瀛亦有改入他國版籍之事宣統元年外務部會同修訂法律大臣擬定國籍條例因各國國籍法有地脈系血脈系即屬地屬人兩義兩義相持必生抵觸於是採折衷制分為固有籍入籍出籍復籍四章注重血脈系辦法憲政編查館就所定四章釐為二十四條其固有籍章第一凡不論是否生於中國均屬中國國籍者其疑有三一生而父為中國人者二生於父死以後而父死時為中國人者三母為中國人而父無可考或無國籍者第二若父母均無所考或均無國籍而生於中國地方者亦屬中國國籍其生地並無可考而在中國地方發見之棄兒同其入籍章第三凡外國人願入中國國籍者準其呈請入籍其必具備之發五一寄居中國接續至十年以上者二年滿二十歲以上照其國法律為有能力者三品行端正者四有相當之資財或藝能足以自立者五照其國法律於入籍後即應消除本國國籍者其本無國籍人願入中國國籍者以年滿二十歲以上並具備前項第一第三第四發者為合格第四凡外國人或無國籍人有殊勳於中國者雖不備一至四各發得由外務部民政部會奏請旨特準入籍第五凡外國人或無國籍人婦人嫁與中國人者以中國人為繼父而同居者私生子父為中國人經其父認領者私生子母為中國人父不願認領經其母認領者如有此等情事之一均作為入籍惟婦女嫁與中國人須以正式結婚呈報有案者為限餘發以照其國法律尚未成年及未為人妻者為限第六凡男子入籍者其妻及未成年之子應隨同入籍其照其國法律並不隨同銷除本國國籍者不在此限若其妻自願入籍或入籍人自願使未成年之子入籍者雖不備第三條一至四各發準其呈請入籍第七入籍人成年之子現住中國者唯不備第三條一至四各發亦準呈請入籍第八凡入籍人不得就之官職一軍機處內務府各官及京外四品以上文官二各項武官及軍人三上下議院及各省咨議局議員此等限制特準入籍人十年以後餘入籍人二十年以後得由民政部請旨豁免第九凡呈請入籍者應聲明入籍後遵守中國法律及棄其本國權利出具甘結並由寄居地方公正紳士二人各出具保結第十凡呈請入籍者應具呈所在地方官詳請所管長官咨請民政部批準牌示給豫執照為憑其在外國者應具呈領事申由出使大臣或徑呈出使大臣咨部存案其出籍章第十一凡中國人願入外國國籍者應先呈請出籍第十二凡中國人準出籍其發有四一無未結之刑民訴訟案件二無兵役之義務三無應納未繳之租稅四無官階及出身第十三凡中國人婦女嫁與外國人者以外國人為繼父而同居者私生子父為外國人其父認領者私生子母為外國人其父不願認領經其母認領者如有此等事情之一均作為出籍惟婦女嫁與外國人以正式結婚呈報有案者為限餘發以照中國法律尚未成年及未為人妻者為限第十四凡男子出籍者其妻及未成年之子一併作為出籍若妻自願留籍或出籍人願使其未成年之子留籍準其呈明仍屬中國國籍第十五凡婦女有夫者不得獨自呈請出籍其照中國法律尚未成年及無能力者亦不準自行呈請出籍第十六凡中國人出籍者所有在內地特有之利益一律不得享受第十七凡呈請出籍者應自行出具甘結聲明並無第十二條所列各發及犯罪未經發覺情事第十八凡呈請出籍者應具呈本籍地方官詳請該管長官咨請民政部批準牌示其在外國者應具呈領事申由出使大臣或徑呈出使大臣咨部其未經呈請批準不問情形如何仍屬中國國籍其復籍章第十九凡因嫁外國人而出籍者若離婚或夫死後準其呈請復籍第二十凡出籍人之妻於離婚或夫死後及未成丁之子已達成年後均準呈請復籍第二十一凡呈準出籍後如仍寄居中國接續至三年以上合第三條三四發者準其呈請復籍其外國人入籍後又出籍者不在此限第二十二凡呈請復籍應由原籍同省公正紳商二人出具保結並具呈所在地方官詳請所管長官咨請民政部批準牌示第二十三凡復籍者非經過五年後不得就第八條所列各發之官職第二十四本條例自奏準奉旨後即時施行此外改籍為良亦有清善政山西等省有樂戶先世因明建文末不附燕兵編為樂籍雍正元年令各屬禁革改業為良並諭浙江之惰民蘇州之丐戶操業與樂籍無異亦削除其籍五年以江南徽州有伴儅寧國有世僕本地呼為細民甚有兩姓丁口村莊相等而此姓為彼姓執役有如奴隸亦諭開除七年以廣東蛋戶以船捕魚粵民不容登岸特諭禁止準於近水村莊居住與齊民一體編入保甲乾隆三十六年陝西學政劉嶟奏請山陝樂戶丐戶應定禁例部議凡報官改業後必及四世本族親支皆清白自守方準報捐應試廣東之蛋戶浙江之九姓漁船諸似此者均照此辦理嘉慶十四年又以徽州寧國池州三府世僕捐監應考常為地方所訐控上諭此等名分總以現在是否服役為斷如年遠文契無考著即開豁八旗人丁定例三年編審一次令各佐領稽查已成丁者增入丁册有隱匿壯丁入官伊主及佐領領催各罰責有差凡壯丁三百名為一佐領後改定為二百名康熙四年令滿洲蒙古佐領內餘丁多至百名以上願分兩佐領者聽雍正四年諭八旗都統及直省駐防都統將軍等交與佐領驍騎校領催將新舊壯丁逐戶開明並編審各官姓名保結送部其未成丁及非正身良家子弟並應除人丁驗實開除五年令凡編審丁册每戶書另戶某人某官無官則曰間散某上書父兄官職名氏傍書子弟及兄弟之子及戶下若干人或在籍或他往皆備書之其各省駐防旗員兵丁及外任文武各官子弟家屬令各將軍督撫造册咨送該旗乾隆六年令八旗編審各佐領下已成丁及未成丁已食餉之人皆造入丁册分別正身開戶戶下於各名下開寫三代履歷其戶下人祖父或係契買或係盛京帶來或係帶地投充分別注明正戶之子弟均作正身分造七年諭八旗漢軍其初本係漢人有從龍入關者有定鼎後投誠者有緣罪入旗與夫三藩戶下歸入者有內務府王公包衣撥出者以及招募之炮手過繼之異姓並隨母因親等類先後歸旗情節不一中惟從龍人員子孫皆係舊有功勳無庸另議更張其餘各項人民等朕欲廣其謀生之路倘願改歸原籍準其一例編入保甲有願外省居住者亦準前往此內如有世職仍許承襲不願出旗者聽八年又諭前降諭旨原指未經出仕及微末之員而言至於服官既久世受國恩之人其本身及子弟均不得呈請出旗十二年又諭八旗別載册籍之人原係開戶家奴冒入正戶後經自行首明及旗人抱養民人為子有願出旗為民者其入籍何處均聽其便本身田産並許帶往二十六年定漢軍凡現任外省自同知守備以上京員自主事以上旗員自五品以上俱不許改歸民籍其餘在京報明該旗咨部轉行各省在外呈明督撫咨報部旗編入民籍並準一體考試大抵清於八旗皆以國力豢養之及後孳生藩衍雖歲糜數百萬金猶苦不給而逃人之禁復嚴旗民坐是日形困敝及乾隆初御史舒赫德范咸赫泰戶部侍郎梁詩正等先後奏請清查東三省曠地俾移住開墾以圖自養雖疊奉諭旨議行然終未能切實舉辦至八旗戶下人開戶必有軍功勞績或藝能出衆亦有本主念其服勤數世準其另戶或放出為民者亦有不準放出為民但準開戶者其例又各不同云田制曰官田初設官莊以近畿民來歸者為莊頭給繩地一繩四十二畝其後編第各莊頭田土分四等十年一編定設糧莊莊給地三百晌晌約地六畝莊地坐落順保永宣各屬奉天山海關古北口喜峰口亦立之皆領於內務府此外有部寺官莊分隸禮部光祿寺又設園地植瓜果蔬菜選壯丁為園頭世宗初設總理專官司口外報糧編審南苑本肄武地例禁開田宣宗嘗諭前已開者並須荒棄而咸同間嵩齡德奎劉有銘鐵祺先後疏陳開放均嚴旨詰斥然至光緒季年仍賦豫民自後承地者乃接踵矣考各旗王公宗室莊田都萬三千三百餘頃分撥各旗官兵都十四萬九百餘頃凡王公近屬分別畀地大莊給地畝四百二十至七百二十半莊二百四十至三百六十園給地畝六十至百二十或百八十王府管領及官屬壯丁人三十六畝不支糧凡撥地以現在為程嗣雖丁增不加丁減不退順治元年定近京荒地及前明莊田無主者撥給東來官兵圈地議自此始於是巡按御史柳寅東上滿漢分居五便部議施行二年令民地被指圈者速籌補給美惡維均四年圈順直各州縣地百萬九千餘晌給滿洲為莊屯八年帝以圈地妨民諭令前圈占者悉數退還十年又令停圈撥然旗退荒地與遊牧投來人丁仍復圈補又有因圈補而並圈接壤民地者康熙初鼇拜專柄欲以正白旗屯莊豫鑲黃旗而別圈民地圈補戶部尚書蘇納海總督朱昌祚巡撫王登聯咸以不如指罪至死聖祖親政諭停止圈地本年所圈房地俱退還又以張家口山海關等處曠土換撥各地並令新滿洲以官莊餘地撥給其指圈之地歸民是為旗退地畝凡官地例禁與民交易然旗人不習耕種生齒日繁不免私有質鬻雍正初清理旗地令頒帑贖回凡不自首與私授受者胥入官為公産旗地令宗人府內務府八旗具各種地畝坐落四至編製清册是為紅册以備審勘旗民田土之爭乾隆初定回贖旗地仍歸原佃承種莊頭勢豪爭奪者罪之凡贖入官地並抵帑籍沒等田皆徵租曰旗租舊查交入官地定租由旗員主之三十四年以直督楊廷璋言停其例民租旗地本限三年或私行長租業戶租戶科以違禁律八旗地主久禁奪佃增租自和珅管大農奏改前章於是旗人及府莊頭率多撤地別佃貧民始多失業嘉慶五年部臣請復申前禁詔纂入定例通行咸豐初元又申令如額徵租主佃皆不得以意贏縮若典鬻旗地從盜賣官地律授受同懲顧日久法疏或指地稱貸或支用長租陽奉陰違胥役訛索句結弊遂叢生雖屢申明誡往往因他故禁弛靡常洎光緒中乃定此業無論舊圈自置概不準售與民人惟從前民購升科者仍豫執業盛京官莊於順治初即定八旗屯界旋令沙河以外錦州以內旗員家丁給地人三十六畝康熙中定以奉天所屬地畀新滿洲遷來者凡丈出地為頃三十二萬九千餘以二十七萬六千三百餘頃為旗地按旗分界又設各旗官員莊屯各城兵丁均酌給隨缺地畝旋令索倫達呼爾官兵耕種墨爾根地奉天官兵耕種黑龍江地乾隆初設黑龍江屯莊呼蘭立莊四十所選盛京旗丁攜家往官為資裝築屋庀具丁給地畝六十十丁一莊每六畝給籽種二斗莊給牛六頭口糧並給溫德亨都爾圖亦如之凡隨缺官地歸旗入册禁職官侵占嘉慶間令盛京入官地畝應招無地貧民領租職官子弟不得承種管界各官並不得於所管區以子弟之名置房地道光中寧古塔伯都訥三姓阿勒楚喀拉林各官莊共原額地萬二百晌吉林八旗與各處旗地暨烏拉旗地共三十六萬五千九十二晌而光緒初撥三姓荒為官兵隨缺地計晌二萬九千餘宣統時以奉省各旗地多盜典隱占之弊令通稽確核毋與清賦溷淆先城旗後外城依次釐定此官莊之屬東三省者直省各置駐防旗兵立莊田於所駐地給田人各三畝其全眷挈赴者前在京所得圈地撤還旗員分畀園地多則二百四十畝少則六十畝各省不盡同惟浙江駐防無田仍支俸餉乾隆時弛防兵置産之禁惟八旗官仍禁如故光緒之季諭所在檢旗丁名數儘舊有馬廠莊田畫地口分責以農作其本無廠田或有而弗備者所司於鄰近分購民地配發以為世業由漸推廣俾旗丁歸農受治州縣與齊民不異未及實施蒙古初分五等一二等備與莊屯園地三等以下祗與莊屯各守土疆毋得越境後漸有民人賤收蒙地者乾隆中定有質鬻者峻罰之著為永令分撥外藩官地其略如此故明內監莊田總領於戶部其宗室祿田散在各省者胥視民田起科先是以新城固安官地二百田十頃制井田選旗民百戶戶授百畝公百畝共力養公田嗣更於霸州永清仿行然成效卒鮮乾隆初改屯莊擇勤敏者充屯戶按畝科糧是為井田改屯地凡京師壇壝官地暨天下社稷山川厲壇文廟祠墓寺觀祭田公地一切免徵建國初賜聖賢裔祭田其孔林地四氏學學田墓田地墳地咸除租賦學田專資建學及贍恤貧士佃耕租而租率不齊舊無常額乾隆中都天下學田萬一千五百八十餘頃光緒變法直省遍興學堂需費無藝則又撥所在荒地劃留學田以補劑之藉田行於首都先農壇壇地凡千七百畝雍正間令疆吏飭所屬置藉田東西陵地紅樁以內例絶耕樵東陵白樁界外初聽民耕道光朝乃嚴其禁青樁以外遵薊密承諸界內兵民私墾至地萬餘區久益增廓光緒末定為計區勘丈將熟地分則升科儲學堂之用焉牧馬草場在畿輔者順治二年以近畿墾荒餘地斥為牧場於順天津保各屬分旗置之自御馬廠以下各按其旗地牧養親王方二里郡王一里亦圈地也曰屯墾康熙中招墾天津兩翼牧地計畝二萬一千五百餘乾隆時丈直隸馬廠地振業貧民命曰恩賞官地在盛京者奉天屯衛各地八旗分作牧廠自東迤西本禁民墾於定界所築封堆制限之然大凌河東廠西廠荒地三十一萬八百餘畝養息牧餘地萬四千六百晌乾嘉中陸續放墾後又綜各城旗馬廠可墾地三十八萬九千餘畝悉歸城旗承種並令八旗王公及間散宗室於所分牧地願墾者得自呈報惟松筠請於養息間壤移駐旗人以費絀而罷咸豐中以大凌西岸墾妨馬政申禁如前而同治二年變通錦州廣寧義州廠荒西廠留牧東廠招佃其東北隅之高山子地數萬畝義州教場間地萬餘畝並行租佃以為城兵伍田然是時西廠有旗領舊地久而越墾妨牧八年命剗棄之於是大凌河墾議遂沮而吉黑山荒多牧獵場益嚴杜姦民攬售矣養息牧地初放時判東西界置專官掌其租入彰武本官牧旋亦勸墾議科於是養息牧生熟地共放六十一萬八千八百餘畝其餘荒八萬九千六百餘畝餘地三萬五千三百餘畝即以為蒙漢雜居牧佃兼拊畜窮黎吉林之烏拉康熙時於五屯分莊丁地遂為五官牧場頗富零荒宣統時撥充學田放墾實地二千三百餘晌凡駐防營皆置馬廠其牧莊旁餘靡不放墾至荊防馬廠墾熟之地久畀諸民而石首監利光緒末釐出廠地二萬餘畝俱令招墾以租息濟警政小學宣統初寧夏滿營牧地餘界開渠墾地畝可二十一萬旗民各半之民領則納價為旗兵墾本三年安徽萬頃湖牧場改墾放田八萬二千七百餘畝其流民占耕及民間認荒者皆名曰佃民其留旗丁田二萬畝亦招民佃歲輸穀麥是為官佃至是以抗租膠葛定議民租田令公司補價承業資八旗生計焉口外牧場隸獨石者為御馬廠此外禮部太僕寺左右翼及八旗均有牧場在張家口外而殺虎口之議畝租察哈爾屬之戢私墾大青山之寬免民占奕興地之招商領耕列朝因時制宜不拘成例其後密雲熱河同時放荒熱河寬曠於留牧外得地千四五百頃更以三一留牧餘咸招墾地利闢而耕牧不相妨甚善政也明之設衛也以屯養軍以軍隸衛洎軍政廢而募民兵屯軍始專職漕運無漕者受役不息屯戶大困清因明之舊衛屯給軍分佃罷其雜徭順治元年遣御史巡視屯田三年定屯田官制衛設守備一兼管屯田又千總百總分理衛事改衛軍為屯丁六年定直隸屯地輸租例其時裁屯田御史繼裁巡按由巡撫主之十三年定屯軍貼運例浙江各衛有屯無運與無屯有運者均徵撥帖屯戶困始少蘇康熙十五年以各衛荒田在州縣轄境軍地民田多影射令檄所司清釐雍正二年從廷臣請併內地屯衛於州縣裁都司以下官惟帶運之屯與邊衛無州縣可歸者如故九年令屯衛田畝可典與軍戶不得私典與民乾隆元年豁免廣東屯田羡餘因除各省軍田額外加徵例先是屯丁鬻産官利其稅入給契允行至此又令運田歸船者並禁軍民復典實則各省典屯於民所在而有六年定屯田限一年無論在軍在民併清出歸丁贍運十二年漕督顧琮請田已典與民者令旗丁購贖然民執業久丁貧無以贖從阿思哈言釐江西丁田在軍歸軍在民增租給丁永為定制三十七年又以漕督嘉謨奏命清理湖廣江浙山東等省屯田明年裴宗錫因陳兩江向不歸運之裁衛屯田加徵津費帝以纍民不允四十年鄂撫陳輝祖奏武昌諸衛清出典鬻屯田請加津贍運部議如此則私相授受者知誡而仍不病失業庶典鬻之弊漸除五十年以長沙澧州原有辨田轉售紛紜令除辨田名準民産授受五十四年畢沅等奏各省屯丁四年一編審止稽戶口之數其田産或有漏匿以時核之百餘年來屯田利病與漕運終始及南漕改海運屯衛隱蔽難稽至是而一大變光緒二十四年太常卿袁昶奏理屯田因有改衛為屯之諭令天下核衛田畝數詳定租章而江西以租悉充餉與他省贍運者不同籲仍舊貫二十七年劉坤一張之洞條議屯衛宜裁略稱運軍久虛衛官復無事一衛所屬屯田或隔府或跨省一切操諸胥吏之手田餉弊竇不可勝窮明年諭各省勘實屯地檄屯戶稅契執業改屯餉為丁糧歸州縣徵解除屯丁運軍名目裁衛官是時綜計各省屯田約二十五萬餘頃顧多與民田殽雜又各丁私相質售久失其舊重以兵後册籍蕩然糧産無從鉤漕督陳夔龍陳大要三端一分丁業民業一現徵毋追原額一補繳田價宜輕而江皖兩浙俱折衷定規分別交價輸稅如淮揚徐四衛定有上則三兩中二兩下一兩屯稅每兩納三分餘互有同異惟山東以艱歉請免徵納鄂督張之洞則謂湖北衛田軍戶仰贍即民人冒替率非素封均難責其呈價僅有徵契稅而已其稅價視民田率洎三十一年宜城屯口搆釁以衛田例不便也之洞更籌簡易八法大旨刪除原則分年減稅豁派纍免雜課但學堂捐與民田同以備改屯為民如式者官豫文證嗣湘省亦仿此行焉宣統元年浙撫增韞更請令承田者但刻期報明統不納價部議即允占業屯價不妨量收蓋屯衛嬗變時勢然也清自開創初撥壯丁於曠土屯田又近邊屯處築城設兵以衛農人世祖始入關定墾荒興屯之令凡州縣衛無主荒地分給流民及官兵屯種如力不能墾官給牛具籽種或量假屯資次年納半三年全納大學士范文程上屯田四事一選舉得人一收穫適宜一轉運有方一賞罰必信上是之令凡自首投誠者授荒田為永業魏裔介亦請飢民轉徙得入籍占田罪徒當遣者限年屯墾已事釋還其願留占業者聽定直省屯田官助牛種者所收籽粒三分取一民自備者當年十分取一二年三年三分取一初定勸懲例限年之法甚嚴康熙初慮官吏虛報攤派停限年令尋御史徐旭林論墾荒三弊言甚切至然限年卒不可行旋令士民墾地二十頃試其文理優者以縣丞用百頃以知縣用凡新墾地初定三年起科嗣又寬至六年後尋令通計十年既仍用六年例亦有循三年舊制者雍正初元諭升科之限水田六年旱田十年著為例當順康間直省大吏以開拓為功其報墾田總額多者如河南至萬九千三百六十一頃少者如山東百二十頃有奇世宗末年以數多不實嚴誡審核其有浮飾論如律定議法凡官吏召佃資墾者按戶數多寡軍民自措工本者按畝數多寡行之乾隆時令官山官地無論土著流人以呈報之先後豫墾民地由業主先報或實力絀他人始得承之凡屯戶加墾者俱令改屯升科又令已墾之地宜慎防護凡官民地於水道蓄泄相關毋擅行墾儻帖己業私墾塘堰陂澤為田立豫懲艾今考歷朝屯墾之政首直省屯田次新疆屯田次東三省開墾次蒙古開墾及青海熱河等處墾務悉具於篇當順治初元令山西新墾田免租稅一歲而河南北荒地九萬四千五百餘頃允巡撫羅繡錦言俾兵課墾二年順天行計兵授田法每守兵豫可耕田十畝牛具籽種官資之又直隸山東江北山西凡駐滿兵給無主地令種四年給事中梁維本請開秦豫及廬鳳荒田六年令各省兼募流民編甲給照墾荒為業毋豫徵私派六年後按熟地徵糧十年定四川荒地聽民開墾陝荒則酌調步兵官給牛糧康熙六年定江浙等省分駐投誠官兵屯田人給荒田五十畝得支餉本其眷屬衆者畝數量口遞加福建無荒則分駐有屯諸省七年御史蕭震疏言國家歲費兵餉居其八而緑旗兵餉又居其八誠屯田黔蜀以駐郡縣之兵耕郡縣之地則費省而荒漸闢下部議行時直隸陝西粵閩先後定墾荒例而四川更立特例官吏準立功論於是湘鄂閩魯晉豫等省空荒任民播種限年墾齊雍正四年甘肅寧夏之插漢托輝地平衍可墾田六十萬餘畝招戶認領戶授百畝五年粵督阿克敦陳近年粵東墾弊四一豪強占奪一胥吏婪索一資本不充一土瘠懼為課纍勸導法五定疆界杜苛取貸籽種輕科額廣招徠其後惠潮貧民墾肇慶屬地高廉雷屬山荒墝埆皆給資招墾並免升科嗣瓊州亦如之又擴滇黔墾計烏蒙兵民並承戶勿逾二頃其各省入蜀民人戶給水田畝三十旱田畝五十甘肅安西久行兵墾移眷駐防以與涼肅二鎮屯兵多貧墾資悉出官貸並令邊省內地零星可墾者聽民夷墾種及山西新墾瘠地自十畝以下陝西畸零在五畝以下俱免升科凡隙地及水衝沙雜與田不及畝者及邊省山麓河壖曠土均永遠免科浙江新漲沙塗民竈皆承領百畝為號十號為甲十甲老農導耕後值漲地人咸利之嗣有侵墾西湖之禁乾隆五十九年巡撫吉慶言沿海沙地灘漲靡常約十三萬三千餘畝悉令入官交原佃耕作納租永著為例凡各省州縣每歲新墾荒田荒地以及蕩地湖淤督撫隨時疏報升科蓋雍乾以來各省軍屯民墾稱極盛焉福建各番鹿場曠土例許租與民耕然臺灣自歷任鎮臣創莊招佃往往侵據民番地乾隆時諭禁武辨墾荒旋禁土民私購番田五十三年福康安請撥餘地畀番民自種遴壯健作屯丁內山未墾及入官荒廢埔地八千八百餘甲每甲準民田十一畝零共屯丁四千分地任耕免賦而不給餉從之嘉慶中噶瑪蘭開闢田園七千五十甲有奇道光初定番社未墾荒埔分給民人徵租粵西設土兵俍兵均給軍田粵東有俍田瑤田仍按田充兵其田均禁民典臺灣番地亦然顧雲南永北大姚等處漢典夷地積隙數十年道光建元措理稍定十三年四川復有漢耕夷地之釁乃析界址令漢夷不得互占又用滇督阮元議禁流民私佃苗田並近苗客戶典售苗産十六年以開化廣南普洱地多曠間流民覆棚啓種因議論入戶甲御史陶士霖論其病農藏姦禁之先是江蘇漲灘冒墾日甚逮道光八年始定歸公而官産民業糾互繳繞於是江督陶澍建言聽民承售部議江河不以墾殖為利則沙洲不得以占鬻徇民仍一律入官處置尋耆英謂民間價購興築一旦奪還迹類爭利請寬其既往而閼其將來從之二十三年祁言修復虎門等炮臺須屯田防護明年程矞采募丁二千試行上曰以本地之民種本地之田守要隘即捍身家允為長算同治初元以軍儲亟檄鳳潁等屬戍兵墾鄰近廢田以漸推行諸郡山東遭教匪之亂鄒滕諸縣田里為墟三年決用移民策而東昌臨清兗曹各屬逆産及絶戶地盡沒入官五年乃有辦理湖團之諭湖團者曹濟客民種蘇齊界銅沛湖地聚族立團既而土著歸鄉控鬩無已然客墾由官招集不乏官荒所占土田不甚廣且訟者非實田戶也於是曾國藩研燭其情為之驅逐莠戶留其良團各安所業陝西叛絶荒産前一歲諭令籌設屯田巡撫劉蓉言軍事方殷不如招墾便部從其議乃定募墾新章四曰正經界立制限緩錢糧定租穀廣東沿海沙地定例水涸報勘承墾者人勿過一頃三年成熟照水田起科至後搢紳壟斷侵漁因命查文禁止當是時值東南兵火之餘農久失業光祿少卿鄭錫瀛言國家歲入金約四千數百萬餉糈支耗半之宜廣屯田養兵以節費尋御史汪朝棨稱各省新復土疆宜急墾闢徐景軾亦以修農利安流徙為言由是曾國藩於皖楊昌濬於浙皆分別土客部署開荒而馬新貽於蘇劉典於陝亦汲汲督勸曾璧光黎培敬前後於黔興屯田之政八月用蘇廷魁言籌墾蘭儀以下乾河灘地十一年諭陝西延榆各屬地瘠民貧宜亟墾闢嚴州縣考成時回衆初就撫也先是御史黃錫彤請設蘇皖屯營選湘淮散勇墾沿江地光緒二年朱以增亦言或謂屯政宜邊陲不宜腹地不知有荒可墾何兵不可農何地不可屯但抽調數營陸續興舉將來化兵為農裨國非細時津海防兵營墾有效故云然曾國藩嘗言必得千畝無主之田不與民田雜方可資兵立屯李鴻章亦謂兵民雜處不宜於內地議遂寢初貴州屯軍於古州八寨台拱丹江清江五廳分設百二十堡為屯八千九百三十九戶戶給上田六畝中八畝下十畝附近山地不限逮乾隆中禁止承佃屯軍私鬻嘉慶初銅仁石峴苗地建碉卡置屯軍每軍百名設百戶一總旗二每軍一名豫水田四畝百戶六畝總旗五畝皆免租洎同治初更定黎平屯章及是羅應旒言黔苗建屯已久虛名鮮實不如去兵之名收農之實時屯軍凡十衛尋奏定分為兩番與守兵同操防徵調各額屯設之百戶總旗等有不力者立時革替先是沈桂芬有疏陳安置旗人聽往各省之議御史黃元善亦稱山西暨江蘇等省開荒當仿雙城堡舊章令旗民移墾顧以事體艱巨未盡舉也十二年臺灣巡撫劉銘傳籌墾內山番荒伐木變價以資撫恤十六年湖南洞庭新漲淤洲建南洲廳治入官佃租共勘實民田十三萬餘畝官田八萬九千二百餘畝二十二年桂撫史念祖言粵西各屬官民荒田可墾令官力為倡酌簡屯兵督令開熟任民領耕量地厚薄定科計各屬總墾荒田萬四千三百餘畝時陝西清荒甚力巡撫張汝梅言陝地兵祲交乘百姓流散北山氣候夏寒霜早穡事無憑又人工少而穀價廉得不償失匪惟客民去留無定即土民亦作輟靡常欲求地不復荒惟紓首墾期限寬牧令責成則民少逃亡官不顧慮而公私兩益矣二十五年定新陽荒蕪額田約十萬畝無主者作官田招領分田地場三等繳價名曰繫腳錢有主限期報墾逾限入官從江督劉坤一請也二十八年陝撫升允言西安馬廠各荒地試開水旱田行屯墾營哨官賦地畝自六十以下屯勇人十畝每百畝貸官牛兩頭籽種三石官備農器一年還牛二年全交並擬令分年節餉開屯之初歲發全餉二歲裁半三歲盡裁嗣後地為水衝雹壞穡入弗豐因復上言驅無餉之兵使自食其力勢且壯志銷於畎畝精鋭蝕於農作有屯而實無兵有兵而實無用轉非創屯本意不如不裁其餉而悉以屯利歸公再頒歲穫之二三行賞此所謂兩利者也江西義寧新昌之交有黃岡山自明以還恆為盜藪二十九年從巡撫柯逢時請開地以益民直隸安州白洋淀淤地肥沃是歲弛禁招民佃作分四等收預租三十一年海洲贛榆間有雞心燕尾二灘利墾牧又徐州微山湖淤灘地均召民墾升科三十二年議定廣西墾荒丁壯既稀資本又絀乃仿外洋法招商領墾南寧則招商本立公司募裁兵充墾丁至宣統初共放山荒十六萬六千五百餘畝三十三年江督端方上言蘇屬兵後荒田不下二百餘萬畝請令歷年報荒者定為板荒餘新荒許各戶指報豁糧俱由局招墾則虛荒易查又定墾章區別官荒民荒分三等輸價受荒無問土客皆得領種三十四年清丈安徽沿江洲地計懷寧等州縣官荒應繳價者共三十萬餘畝廣東瓊崖從未開殖至是集商本創公司官行清丈分官荒民荒先正其經界宣統三年雲南清出荒地五十六萬畝安徽官民荒地四萬一千餘頃河南沙荒地三萬三千餘頃可墾者分三等曰輕沙曰平沙曰重沙各州縣試行招墾多則四百數十頃少亦二三十頃浙江仁和等屬墾熟甲地山隴百八十餘頃各府紳商領墾荒地萬五千餘畝甘肅自光緒季年設局墾荒達二十餘萬畝新疆屯田始康熙之季察罕諾爾地駐兵因於蘇勒厄圖喀喇烏蘇諸處創屯種令土默特兵千每旗一台吉遣監視大臣一人而哈密巴里坤都爾博勒及西吉木布隆吉爾等咸議立屯命傅爾丹蘇爾德梁世勳分職其事吐魯番亦駐屯兵雍正三年命喀爾喀駐兵墾鄂爾昆田乾隆初定一兵墾二十五畝凡兵二千五百種地三之駐守二之時回部如闢展各要衝多設屯厚兵力逮準噶爾平版圖益廓邊防與屯政相維七年川陝總督尹繼善請以蔡把什湖地租與回民假資耕種事得允行二十年以伊犂西境喀爾喀東陲多間壤悉遣滿漢蒙兵數千開屯視蒙古授田例又設額爾齊斯屯田巴里坤亦置屯遣甘涼肅屯地兵五百往種秋收後入城三年更迭塔勒納沁開田三千餘畝二十三年用雅爾哈善永貴等言於闢展魯克察克吐魯番烏魯木齊托克遜哈喇沙爾規度官墾是時饋餉猶亟誡巴里坤至伊犂循序增屯其願挾家者俾安業如內地村莊初人種十五畝令益五畝置新舊屯兵萬七千出帑三百萬備籽種諸用而特納格昌吉羅克倫均益兵廣屯大率烏魯木齊增墾以來歲穫悉供伊犂餉需伊犂墾成又資接續更移喀什噶爾等回衆二千五百戶屯阿克蘇其事則黃廷桂楊應琚兆惠等主之定章百兵一屯地畝人二十分小麥十一穀七青稞豌豆各一然吐魯番闢展魯克察克兵屯外皆兼回屯而庫車東哈喇沙爾西或分布多倫回人溉種二十五年伊犂屯議起於河南之海努克立回屯察罕烏蘇立兵屯翌年又於葉爾羌喀什噶爾阿克蘇烏什等城增回屯減兵額時戎事方息惟厄塞留兵餘齊赴伊犂屯殖穫粟贏裕即益屯兵兵不供屯則招集流人分土任業巴里坤饒賸壤穆壘土沃泉滋俱募人大開阡陌蓋舒赫德阿桂明瑞等所建為多三十七年陝督文綬以新疆餘地宜推廣募墾條列五事以聞四十一年令葉爾羌成丁餘回特畀耕地編戶凡千五百戶為一所三千戶為一衛初烏魯木齊屯地共緑旗兵三千二千操練一千屯耕番休三歲後令移眷官豫資裝及地日廓而兵不贍率遷甘肅貧民不靳煩費赤貧全給小康半之歲穰自願挈家則不給四十五年定眷兵分編戶籍其牛籽農具屋價口糧皆官措貸約升科時分三年繳納凡承種新疆熟地本年升科新墾三年後升科而商民承墾新地戶三十畝六年升科蓋自此楚呼楚穆壘瑪納斯庫爾哈喇烏蘇屯務駸駸日近矣新疆軍屯分數人穫細糧十五石至十八石官議兵丁賞一月鹽菜銀二十五石倍之十二石以上功過半不及官議處兵重責留屯次年收足豫復烏魯木齊但穫糧十一石以上即賞塔勒納沁尤磽瘠賞罰遞降殺之無鹽菜則給口糧其阿奇木伯克等則賞緞匹顧伊犂額多苦纍福康安嘗以為言最後將軍長庚請仿烏魯木齊例行然部議仍未及減也向例遣犯得留種新地哈密各屬截留伊烏遣犯墾耕年滿乃各致其所罪重勿留又以不敷農作僅限斷洋盜而已後令情輕者改防為眷用羈縻之遣犯穫額兵丁其賞諸事從原例嘉慶十三年撥塔爾巴哈台兵赴伊犂殖田以農隙簡練置武員領之三年一更迭而伊犂原定屯兵三千每歲耕種於中抽調如干藉習戎備其數歲有增減各視其時已耕之十八屯番休輪種以息地力尋定自二十年始每年加種兩屯云初伊犂多可耕田令惠遠惠寧兩滿城派間散旗人分地試種借給牛具成效昭然九年松筠因言照錫伯營屯種例分畀旗兵地畝各使自耕永為世産以有妨操務祗令轉交間散代耕二十五年令滿營兼種雜糧先後分田四萬四千餘畝授八旗間散自耕但不得違禁佃租私相典賣道光初既勘定張格爾令回兵試墾大河拐增額則募貧回於是烏什阿克蘇和闐每散布回戶行墾烏魯木齊屬阜康奇臺暨吐魯番均募民戶伊犂惠遠城迤東亦選土著阿卜勒斯荒俱撥回戶設五莊莊百戶戶得地畝二百喀喇沙爾則裁屯安戶庫車荒地亦豫無業回人葉爾羌屬巴爾楚喀多曠土則廣招眷民其霍爾罕新田散與回戶喀什噶爾初開地分處河東西東畀回人西招民戶或專屬或兼募冀相安而已凡民人赴回疆領地皆官給印券自齎以行其徵糧多至畝二斗四升次小麥八升次六升五合最少三升大率視壤肥瘠為斷阿卜勒斯入三色糧十六石滿營馬兵練餉於茲取贍自嘉道以來數十年中伊犂屯墾後先其事者將軍松筠那彥成布彥泰等而林則徐遣戍日履勘諸地又興水利於伊拉里克厥績尤偉焉同治二年都統平瑞上言烏魯木齊間曠孳生馬廠招商戶移墾並請於伊犂各城一律經畫分屯地畀屯兵命次第興舉三年飭哈密推廣原屯光緒三年侍讀張佩綸請抽旗丁屯新疆陝甘總督左宗棠謂有所窒礙疑阻凡六事議遂寢是時南路纏民富庶荒曠尚稀北路鎮迪各屬墾熟地不過十二三賦納既虧閭里窳敝已而建置新疆省治十三年巡撫劉錦棠更酌定新章戶給地六十畝官借籽糧二石農具銀六兩葺屋銀八兩牛兩頭二人即當一戶月給鹽菜口糧立限初年還半次年全繳繳訖按畝起徵第三年半徵次年足全額仍仿營田制十戶一屯長五十戶一屯正每屯正五設一管領專員正長領地貸本悉如戶民總計安納土客千九十戶以次推行而南路各屬新墾地萬九千餘畝分年起徵均不領墾費丈清南北兩路各則荒熟地千一百四十八萬畝有奇各城伯克向有養廉地自改郡縣裁伯克廉地一律入官佃租十七年魏光燾分劃伊犂各地歸旗屯民屯各六萬餘畝使各自力耕其後土客生息蕃庶歲屢有秋關內漢回挾眷承墾絡繹相屬宣統三年巡撫袁大化言新疆夙號農牧國今日貧瘠由地曠人疏自迪化以西精河以東遍地官荒草湖葦灘無慮千萬頃而南疆東路蕭曠亦同擬集華僑立公司速效非易今令在新各員有獨力或合資開荒灼著明效者分別奏奬以示鼓勵事得允行金川在乾隆四十年以武功底定初從定西將軍阿桂言於西川之攢拉就近屯田其美諾底木達等處令駐兵受地習耕別斯璊以次改土為屯各置屯辨處理又帛噶爾角堯諸降番悉視屯兵例概畀以牛具籽糧其番戶多者三四十少者一二十初墾免賦三年後輸糧旋令駐兵挈眷前赴而丁口日增又撥地戶三十畝俾加墾自給地利寖闢矣於是四川之懋功五屯安置降番亦戶給地畝三十選精壯千人半為屯練給餉半為餘丁無餉厥後釐出荒壤亦分等加賚巴塘𩹉塘沃區亦不乏至光緒三十三年川督趙爾豐疏籌墾計招內地農戶而官資遣之焉關外土曠人稀蒙古地尤廣袤利於屯墾清初分旗有定界繼因邊內壤瘠糧虧拓邊移墾天聰中令各牛彔就各屯近地擇種所宜以沈佩瑞言於廣寧東西閭陽驛選壯農充步卒屯田分八固山釐牛彔為二等備牛種農具令材敏者率屯兵往耕崇德五年官兵於義州築城開屯康熙二十五年以錦州鳳凰城等八處荒地分給旗民營墾又遣徒人屯種盛京間壤二十八年定奉天等處旗民各守田界不得互相侵越乾隆五年侍郎梁詩正請置八旗間散屯邊以廣生計命阿里袞往奉天相度地宜於時吉林寧古塔伯都訥阿勒楚喀三姓琿春及長春俱事墾殖貧無力者發官帑相貸四十年流人偷墾岫巖牧場地畝遂定例使入官納租四十二年以大凌河西北杏山松山地豐美徙間散宗室資地三頃半官墾半自墾築屋編屯助其籽具五十五年令奉天自英額至靉陽邊止丈荒分畀城旗之無田者除留圍場參山餘均量肥瘠配給禁流民出口私墾而積久仍豫編戶嘉慶十六年令各關隘詰禁之初以八旗口衆撥拉林地俾開田墾種十七年賽沖阿言拉林近地間荒可墾者二萬五千餘晌而三道卡薩里諸處地多未墾請移駐旗人尋富俊請揀屯丁千人撥荒三十晌給銀二十五兩籽糧二石墾二十晌留十晌試種三年後第四年起交糧俟移駐京旗分給以熟十五晌荒五晌餘荒熟各五晌即與原種屯丁為業而免兵糧已富俊建議更於拉林之西北雙城堡開屯移駐京旗間散為地九萬數千晌移戶三千年移二百戶依戶劃地一切費悉領於官區中左右三屯屯鑿井二選丁給地例同拉林京旗領地五年後徵糧二十石每大屯容四十屯每旗五屯置總副屯達各八人每屯屯丁京旗各三十戶二三人以上即準戶論三屯各建義孰課幼丁道光五年移駐戶七十七墾熟地三萬三千一百餘晌蓋富俊松筠始終其事故其效甚著自後當事寖懈又其地早霜氣寒願徙者少於是博啓圖改移駐戶為千因以所餘地戶益十五晌間散不任耕得買僕或賃傭以助英和嘗上言宜推廣成功而緒卒弗竟伯都訥空曠圍場二十餘萬晌荒久壤腴視雙城堡事半功倍富俊請令分屯畫界略仿前規命其地曰新成綴列戶號前後凡百二十屯章凡六七上廷議旋以雙城堡事未遑他及且用弗充事竟已二十八年令鳳凰城邊私墾地已熟及中墾者招佃徵租無幾旗民報墾至二十四萬畝咸豐四年開吉林五常堡荒田先是齊齊哈爾設官屯令罪徒及旗奴承種尋以遊惰遣退選壯丁補之嗣御史吳焯謂呼蘭蒙古爾山荒宜墾尋以參珠禁域兼妨邊務竟不行同治時廣寧南之盤蛇驛擬放地百萬畝民領及半厥後水患頻仍迄光緒末開放始竣是時金場流民失業用富明阿言以藏沙諸河暨樺皮甸子諸處官荒畀墾免交押價而法庫門靉江往往有遊民偷墾逮都興阿履查靉江西岸密邇朝鮮安置匪易惟嚴禁越渡以謹其防有沿江陰墾騷擾沿邊者立豫拘罰九年乃就靉陽門至鳳凰門邊荒九十一所分勘展界綏奠窮黎而私墾充塞邊境如故光緒七年吳大澄上言寧古塔之三岔口壤沃宜耕可募齊魯願農編屯一營以實邊塞十四年將軍希元始設局立制以邊瘠收薄限十年後升科尋設五社墾地萬三千四百晌有奇二十二年延茂覆陳吉林開墾始誤於旗民之不和繼誤於委員之自利開局十六年得不償失部議因定分別裁留於是方正泡藲梨場二道漂河頭二道江螞蜒河大沙吉洞等河亟亟以拓地殖民為務初吉林放有攬頭包領雖荒疃綿袤輒刻期集事而弊溢於利至是始懲革焉又腹地加荒附著各屯多寡不等皆甚饒沃領者麕至則探籌決之先是十二年黑龍江將軍恭鏜請開呼蘭屬通肯荒地疏陳十利已而決議實行至二十四年營通肯克音荒務畫屯安井招民代佃民納課糧旗供正賦官為之契不奪佃益租二十五年墾布特哈之納謨爾河間荒約四十萬晌旗民領佃入費免租從恩澤請也越八年訥河以南放墾三十七萬五千一百餘晌二十八年吉林設局清賦兼放零荒各屬旗戶原無糧額各地查報科徵顧其時經界既淆包套詭寄棼如亂絲旋日俄變生事益棘手將軍達桂巡撫陳昭常先後清核至宣統初元都吉林大租原地為晌百一十八萬三千一百有奇浮多二十八萬四千八百餘晌其明年通吉省民田旗地及夾段零荒勘放訖事又清出七十九萬三千三百餘晌浮多地者如地形方及東西長均以西為浮多南北長則以北西北有廬墓則以東南或一地兼二則次則即浮多也奉天大圍場分東西流二圍自國初撥留是荒有鮮圍十五以捕鮮大圍九十以講武日久防弛流人私墾歷年光緒初將軍岐元奏以二十圍增海龍治就地升科至三十年海龍兩翼升科者已達百二十九萬八百餘畝餘八十五圍西四十五圍於二十二年議墾至三十年放訖其正零山荒樹川草甸三百二萬二千餘畝其荒價畝納銀一兩二錢山場熟地六錢生三錢城鎮基地畝二十兩其久年私墾土地則倍納二兩四錢中下差減原戶領回不願則撤放東四十圍以安置金州遷戶開禁撥荒迄三十一年共放百十二萬七千二百餘畝城地上者畝二十五兩中二十兩下十五兩荒地畝收正課二分耗十分其始兩流圍荒地聽民擇所餘夾荒往往侵墾吏緣為姦自廷杰重勘一清積弊東流圍即東平全境隱併殆過西流訟鬩滋繁三十二年覆丈兩流山荒俱十畝作七畝至浮多地已先納價未及折合則限八年升科以平劑之大率熟地當年起科荒地四年為限時日俄搆兵奉省稅滯帑虛復查東邊海龍各屬私墾餘荒收價集資藉維新政又丈放錦州屬海退河淤及各滋生地畝共三十二處云黑龍江地當光緒十八年於綏化之北團林子設屯田旗戶千二百巴蘭蘇蘇之山林設戶六百有餘計戶授田戶四十五晌中以十五晌歸屯丁永業三十晌起科拳匪亂作流徙頻年續於鐵山包招戶又招撫璦琿各屯久乃稍還其舊然是時江省以東民戶日蕃樜萊攘剔十才二三富豪包攬居奇零戶無力分領放荒速而收價遲領地多而開地少三十三年乃議變通令間退兵願農者分年給墾寓殖於屯宣統元年又令廣招徠定奬章杜包承賞經費戶仍領地十五晌晌收公費四錢大都荒價量地為等差木蘭綏化晌收銀七錢通肯二兩一錢呼蘭墨爾根押租則一兩四錢贏朒不齊均加徵一五經費其大較也時又酌留嫩江迤西未放各荒為無地官兵生業撥兵助屯之策始自哈拉火燒試行而地鮮上腴兵惰不耐耕畝僅穫斗糧甚且無顆粒收入口食仍仰給於官因復議緩二年仍改招民佃初奉省厲行清賦凡浮多地限令民戶首實納價起科歷三歲餘僅得荒熟地八十餘萬畝已而議局建用分年免價法東督錫良上言清賦重升科不重收價其利久暫懸殊又東省為八旗根本旗民雜居皆土著異於各省駐防內外城旗隨缺伍田向有定額即計口授田遺意數百年來戶口增而地不給口分體大難舉墾種事便易行今長白新設治移殖最宜如以實邊之策資厚生之利所謂兩益者也夫必先去其待食於人之習然後漸為人自為養之謀給田則奮於力農徙地則除其依賴為八旗計無要於此三年奉天各屬大放民荒共得十二萬畝自順治時令各邊口內曠地聽兵治田不得往墾口外牧地顧其地豐博宜農雍正初遣京兵八百赴熱河之哈喇河屯三處創墾設總管各官旋置張家口同知十分其地歲人耕逾分豫不及五分處罰洎乾隆初熱河東西共畫旗地約二萬頃古北口至圍場舊無民地歷年民墾滋紛乃令分撥旗戶未幾高斌請還其舊從之熱河自改州縣後山場平原講求開殖悉向蒙古輸租沿襲已久其圍場周千餘里為圍七十二置總管一駐防旗兵千同治中用都統瑞麟言展墾間荒以濟兵食令招富戶承領禁占毗連民地於紅樁外定界立卡倫尋翼長貴山等以阻撓得罪時全圍已放其半領荒者漸侵正圍於是諭河東西佃墾及偷墾地一律封禁斥遣私墾諸戶其侵入山坡溝岔乃報領匿多為少者重按之其後庫克吉泰部署茲事將旗佃圍外隱地撥補圍內民佃俾得移徙安業以清圍界然委員措置失宜姦佃抗聚生釁經崇實再舉勘量更定照册永禁已騰之正圍瑞麟繼之仍無要領光緒初御史鄧慶麟臚列積弊已而定議舉辦京旗徙戶開屯其後確勘熱河五川荒地頃數都二千三百有奇平川地僅及其半旋即招墾以押荒抵餉季年都統錫良論開放圍荒十事大要留圍座編號目增荒價杜攬售事皆允行蒙古當康熙時喀喇沁等旗地以民種而利其息入輒廉募之致妨遊牧乾隆初亦令察哈爾蒙民易居但雜處積年戶衆墾蕃難歸徙而輕生釁議者數稱驅斥之便至嘉慶初土謝圖汗各旗地常有遊民棲息蒙人負民債不能償而貧民復苦無歸則為之明界設限不咎前失儻將來私開一壟增遷一人坐所管盟長等罪其租課官不之問各扎薩克自徵之時郭爾羅斯熟地畝二十六萬五千餘糧畝四升為定率至十一年墾者踵相屬因伸關禁並諭禁私與民授受違者台吉連坐之然流人私種成習莫能格也初令歸化種地人按編甲例歲上其籍而口外綏遠等地僅容孑身商販往來挈室者有禁其後科爾沁屬達爾汗賓圖二王旗卓哩克圖冰圖二旗所招墾戶亦均編甲社置鄉長焉道光十二年盛京將軍裕泰上科爾沁墾章八事凡寫地必以自名毋過五頃一地復寫者後戶與前戶相均村屯或典於民追契折償地主無力回贖任民再種限年抵還年滿第允自種或租與原佃不得復典及招人民戶交地後得自踏間荒白局承種其蒙種熟地毋許租人界外民開者亦毋許影射咸如擬行土默特牧場舊惟任意墾治嗣分餘地畀蒙人口率一頃而佃與民種者多至十七年令入蒙押租以其四佐官用其租息無業蒙人四之公家及本旗貝勒各三之同治七年徙喀喇沁越墾諸戶分歸各旗光緒七年創烏里雅蘇臺墾田十頃六十畝為一屯凡為屯七濬渠建居牛籽諸費亦官為補助八年選庫倫土著於圖什車臣西部落學試屯墾從喜昌請也當蒙古生息寖盛時於地之不妨牧者墾之曰牧地又有租地養贍地香火地皆自種自租九年山西巡撫張之洞言豐寧二廳歸綏五廳自招墾蒙荒而戶日蕃所在餘荒時亦畀無業佃民租種其租所入除例與蒙旗外凡開地基本薪公歲耗彌補一切皆取給其間為益匪細二十一年奉天將軍增祺請丈放各蒙荒副都統壽山亦以為言而國子司業黃思永請墾內蒙伊克昭烏蘭察布二盟牧地盟長有謂妨其生業者未克實施是時晉邊之豐鎮寧遠墾民積數萬戶而扎賚特杜爾伯特郭爾羅斯陸續報墾人爭趣之察哈爾旗牧及草地雖禁私開然自咸豐中馬廠弛禁至近歲越占紛紜客戶旗丁訟不勝詰二十四年都統祥麟因言欲蒙地無私墾必嚴科罪欲蒙員無私放必懲姦商二十八年命侍郎貽穀督墾務籌察哈爾事陳擴充變通數端大旨主清舊墾招新墾蒙旗生計在耕不在牧蒙古於地租或抵償或私肥或一地數主抑且數租黠商乘間包攬宜由各旗總管詳晰呈明交地開放悉汰從前地戶商總等名設墾務公司於兩翼各旗先後試辦各盟旗順令即奬抗延即罰於是伊克昭盟郡王等旗及準噶爾以次報地杭錦烏審頗反覆烏蘭察布亦懷疑已皆赴議綏遠已墾未墾地畝在乾隆初即無確數迄今八旗牧廠地雜沙石中墾者希民情觀望乃建議自將軍以下俱指認地畝為商民導旋以財用不足創牛捐並推廣屯捐繼之凡丈蒙地五尺為弓二百四十弓為畝百畝為頃頃編為號察哈爾兩翼則畝以三百六十弓編號以五頃札薩克圖畝則二百八十八弓十畝為晌四十五晌為方凡蒙旗荒價半歸國家半歸蒙旗其歸蒙者自王公台吉至于壯丁喇嘛釐其等差各有當得之數凡地額設者為排地向免押租生地畝收押租三錢三分滋生地倍之貽穀以恤蒙艱故畝收押荒二錢外僅加一錢局用取其六本旗取其四杭錦在後套近渠水地押荒上地畝八錢中七錢下六錢又言租數多則纍民少則纍蒙此旗與彼旗難強同外蒙與內蒙不一例因定烏審札薩克郡王三旗荒價上則三錢中二錢下一錢鄂托克準噶爾兩旗地區四等別立中下一則鄂旗上則四錢準旗上則六錢中四錢以下均差減烏蘭盟四子王達爾罕茂明安及烏拉特後旗皆旱地悉如向章三十四年文哲琿訐貽穀敗壞邊局查辦大臣鹿傳霖論其辦墾有二誤四罪因策善後四事謂荒價及繩丈從寬則丈放易欲多收地價則應先儘原佃承耕減歲租而加渠租以其租充渠費渠增即地增地增即租增久之斥鹵皆腴壤矣貽穀既逮繫信勤繼之減杭錦荒價上地頃九十兩其次遞減以五最下七十兩分烏拉特地為東西中三公旱地押荒分六等上地頃百四十兩次百中七十中次四十下二十下下十兩先提公費三成其餘半蒙半公胥如例其歸蒙地租亦四等渠地畝歲徵渠租四分五釐科布多及烏蘭古木試行屯墾肇自康熙末年時參贊連魁陳辦科屬新政謂烏蘭古木巴雅特均科屬杜爾伯特牧地宜廣營墾科布多屬雖積沙漠而札哈沁旗明阿特左右翼各旗及厄魯特旗各臨其所屬河泊沿河田陌可耕者多興墾實邊於是乎在廷議允行若烏梁海屬布倫托海蒙地自同治時開屯頒帑金十萬嗣李雲霖以操切激兵變墾事中停至是修渠告成以上渠屯兵併合下渠從其便也阿爾泰旗高寒稀雨澤僅成官屯四民屯一云札薩克圖王公旗荒每晌上等四兩四錢中二兩四下一兩四均收一五經費凡依次領地熟地百晌須兼生荒二百晌王旗至十一年放竣都六十二萬五千餘晌其明年續放旗界山餘各荒設洮南屬縣二公旗自招之戶曰紅戶台吉壯丁等私招者曰黑戶洮南沿荒段放齊後河北荒段至宣統元年共丈十九萬四千餘晌圖什業圖蒙荒亦仿札薩克圖成案熱河蒙荒喀喇沁東旗已成良沃敖漢半磽確巴林較富都統廷杰建言八事以漸興舉其蒙旗荒之隸奉屬者約放八萬九千餘晌而昭烏達盟阿魯科爾沁東西扎魯特三旗可耕地共八千頃上則頃收價七十兩中五十下三十扎賚特蒙旗新舊放荒綜六七萬晌置大賚廳捆出本旗蒙屯四十七所外旗五十九所近地餘荒晌收押租一兩四錢時復丈科爾沁公旗地二十四萬一千四百餘晌郭爾羅斯後旗沿江地荒而實腴晌加收公費三十兩蒙地及學務各半之及是開放無餘翌年城甸餘荒亦畢放長春本前旗蒙地凡四十一萬九千餘晌宣統二年復放新荒以公費資辦府屬審判拓荒務以裨新政更定巴林荒價上則頃七十兩中五十下三十達爾汗王旗釆哈新甸荒地分三則上則晌六兩中四兩下二兩二共放實荒六萬二百餘晌三年復放達爾罕洮遼站荒備置驛通道焉青海向為蒙番牧藪久禁漢回墾田而壤沃宜耕者不少曩年羹堯定議開屯發北五省徒人能種地往布隆吉爾興墾最後慶恕主其事以番族雜居與純全蒙地殊異極陳可慮者五端嗣又勸導蒙番各族交地以資拓殖無論遠近漢民皆得領惟杜絶回族以遏亂萌於是開局放荒黃河以南出荒萬餘畝迤北至五萬餘畝又慮其反覆也募實兵額分留以鎮讋之番地僻山峻且寒僅燕麥菜籽雖歲穰畝收不過升四五課務取輕以次推行近地始自光宣之際議墾荒尤亟以物力之不易而大舉之無時冀其地無棄利人靡餘力蓋猶有待焉清丈蘆洲田畝前允行之九江濱江蘆地原定下則起科是後蘆洲徵糧普令以一分以下為率奉天廣寧一帶蕩田墾殖舊矣嗣以將軍弘晌言開鷂鷹二河蕩田三十八萬二千餘頃令三年後升科五年後丈量而牛莊等處葦塘近年河徙荒出葦商大半匿墾往往召爭先後訂變通章程迥別於故荒舊例尋又丈放鳳凰岫巖安東葦塘約十餘萬畝按地編號具魚鱗圖册事在光緒末年江南葦營草地向由大河衛子領墾納租而江北則置樵兵備河務左右兩營當海州阜寧間共地八千五百餘頃而續涸新漲不與焉自河道改而樵兵虛設宣統時部議裁汰改為放荒任人入資承業云自光緒中葉御史曾忠彥疏請振興農學特立農工商部專其職司數詔天下長吏講求釐剔荒産以為振興之資宣統初部上農林推廣二十二事始於籌發辦荒而坦區宜闢田山隴畸零邊地宜林木責所司各於其境測驗氣候土性表之圖之荒價之免否升科之緩急分等釐別而以考核官吏編報成績以行其懲勸復訂種樹行水奬掖專例洎乎革命勢成事之未畢舉者正復不少也曰營田水利聖祖時墾天津荒地萬畝為水田世宗於灤薊創營田設營田水利府命怡親王董其事王與大學士朱軾彙上事例四端尋於天津等屬分立營田四局領以專官因地勢濬流築墟建閘開渠民人願耕者官給工本募江浙老農豫月餼教耕穫翌年得熟田百五十餘頃至雍正七年營成水田六千頃餘雖糜帑不資而行之有驗惜功未竟後漸廢弛獨磁州溝洫如故歲常豐稔高宗飭直督李衛修治水田復遣大理卿汪漋總江南水利工務南北並營已而高斌言桑乾河兩岸可開大渠引水治稻田從之嘉慶之季命方受疇經畫直省水利兼戒魯晉豫亦於其境各籌所施顧猶有言直隸難舉水田者百年以來李光地陸隴其朱軾等皆詳言直隸水田利益林則徐擬開近畿水田疏尤切至財絀議沮迄未暢行自後僧格林沁在大沽口屬捐興水利得稻田四千二百餘畝崇厚繼之頻年勸墾鹽水沽亦頗效其後周盛傳鎮天津修水利成稻田六萬餘頃土潤穫饒至今利之同治時陝西西安同州等屬設局釐荒産興營田洎光緒中次第招墾至三萬四千餘畝改局為所州縣領理之時直屬營田半荒棄三晉洊災臺臣夏獻馨唐樹楠彭世昌劉瑞祺等先後疏言水利華輝亦陳八事直督王文韶謂輕租價以恤民艱疏溝渠以利水道則樂墾者多因是天津營田徵租至四萬九百餘畝山東巡撫張汝梅亦請疏河道濬溝渠以興水利為農政本源陝甘總督升允則請於陝西募水利新軍左右兩旗將來撥歸屯所授地使耕藉廣屯政其後奉天以東西遼河大凌河諸川無涓滴水利亦奏定采內地引渠灌地諸法先就小河枝水鑿渠試辦焉
