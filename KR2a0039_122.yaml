body:
  text: 清史稿卷一百二十二志九十七食貨三漕運清初漕政仍明制用屯丁長運長運者令瓜淮兌運軍船往各州縣水次領兌民加過江耗視遠近為差而淮徐臨德四倉仍係民運交倉者並兌運軍船所謂改兌者也逮至中葉會通河塞而膠萊故道又難猝復借黃轉般諸法行之又不能無弊於是宣宗採英和陶澍賀長齡諸臣議復海運遴員集粟由上海雇商轉船漕京師民咸稱便河運自此遂廢夫河運剝淺有費過閘過淮有費催趲通倉又有費上既出百餘萬漕項下復出百餘萬幫費民生日蹙國計益貧海運則不由內地不歸衆飽無造船之煩無募丁之擾利國便民計無逾此洎乎海禁大開輪舶通行東南之粟源源而至不待官運於是漕運悉廢而改徵折漕遂為不易之經今次漕運首漕糧次白糧次督運次漕船次錢糧次考成次賞恤而以海運終焉漕運初悉仍明舊有正兌改兌改徵折徵此四者漕運本折之大綱也順治二年戶部奏定每歲額徵漕糧四百萬石其運京倉者為正兌米原額三百三十萬石江南百五十萬浙江六十萬江西四十萬湖廣二十五萬山東二十萬河南二十七萬其運通漕者為改兌米原額七十萬石江南二十九萬四千四百浙江三萬江西十七萬山東九萬五千六百河南十一萬其後頗有折改至乾隆十八年實徵正兌米二百七十五萬餘石改兌米五十萬石有奇其隨時截留蠲緩者不在其例山東河南漕糧外有小麥黑豆兩省通徵正兌改耗麥六萬九千五百六十一石八斗四升有奇豆二十萬八千一百九十九石三斗一升有奇皆運京倉黑豆係粟米改徵無定額凡改徵出特旨無常例折徵之目有四曰永折曰灰石米折曰減徵曰民折官辦永折漕糧山東河南各七萬石石折銀六錢八錢不等江蘇十萬六千四百九十二石有奇石折銀六錢不等安徽七萬五千九百六十一石有奇石折銀五錢至七錢不等湖北三萬二千五百二十石湖南五千二百十有二石各有奇石均折銀七錢其價銀統歸地丁報部灰石改折江蘇二萬九千四百二十四石浙江萬八千六百五十三石遇閏加折四千十有五石石折銀一兩六錢以供工部備置灰石之用自順治十七年始也次年飭江南浙江江西三省大吏凡改折止許照價徵收如藉兌漕為名濫行科索者即行參勘又以蘇松常鎮四府差賦重漕米每石折銀一兩其隨漕輕齎席木贈截等銀仍徵之耗米及給軍行月贈耗等米亦按時價折徵康熙八年定河南漕糧石折銀八錢九年浙江嘉湖二府被災每石折徵一兩五十八年覆准河南附近水次之州縣額徵漕糧每石八錢內節省銀一錢五分仍令民間上納餘六錢五分令徵本色起運至距水次較遠及不近水次之州縣額徵米石仍依舊例徵銀八錢以一錢五分解部餘交糧道採辦米石雍正元年以嘉湖二屬州縣災諭令收徵漕米本折各半其折價依康熙九年例六年議定河南去水次稍遠州縣均徵本色惟南陽汝寧二府屬河南府之盧氏嵩永寧三縣及光汝二州並屬縣又離水次最遠之靈寶閿鄉路遠運艱共酌減米萬五千六十二石有奇免其辦解分撥內黃濬滑儀封考城等五縣協辦於五縣地丁銀內扣除完漕照部價每石八錢以六錢五分辦運節省之一錢五分徵解糧道補項其南汝等府屬每石折銀八錢解司以抵濬滑等五縣地丁銀數所謂減徵是也乾隆二年以大濬運河江蘇淮安之山陽鹽城阜寧揚州之江都甘泉高郵寶應各縣漕糧每石徵折銀一兩其後海州贛榆兩邑亦然山東河南向所改徵黑豆不敷支給河南再改徵二萬石山東四萬石三年湖廣總督德霈言湖南平江距水次五百餘里請改折色分撥衡陽湘潭代買兌運從之七年江西瀘溪以折價八錢不敷採買定嗣後每年八月借司庫銀撥縣採買照買價徵銀歸還其後江蘇之嘉定寶山海州贛榆安徽之寧國旌德太平英山湖北之通山當陽諸州縣悉遵此例十一年定河南祥符等四十州縣額徵粟米內每年改小麥萬石與漕米黑豆並徵運通十六年以京師官兵向養馬駝需用黑豆豫東二省自雍正十年以來於漕糧粟米內節次改徵每年額解黑豆二十萬九千餘石每省酌量再改徵黑豆一二萬石尋定山東三萬石河南二萬石額徵粟米照數除抵其節省銀一錢五分為運之用者並徵之十八年倉場侍郎鶴年言現在京倉黑豆六十萬餘石足供三年支放請自明年始豫東二省應運黑豆酌半改徵粟米分貯京通各倉則豆無潮黰之虞粟價亦平從之二十六年以江蘇之清河桃源宿遷沭陽不產米粟命嗣後先動司庫銀兩按照時價採辦令民輸銀還欸是謂民折官辦其後阜寧旌德泰興寧國太平英山諸縣皆仿行之二十一年諭曰漕糧歲輸天庾例徵本色勒收折色向干嚴禁現值年豐穀賤若令小民以賤價糶穀交納折色是閭閻終歲勤劬所得升斗大半糶以輸官以有限之蓋藏供無窮之朘削病民實甚著通諭有漕省分大吏飭所屬徵收糧米概以本色交納無許勒折滋弊如有專利虐民者據實嚴參然州縣往往仍藉改折浮收雖有明令莫能禁也正兌改兌改折之外復有截漕及撥運各省截留漕船介於起運停運之間行月二糧應給應追向無定例自乾隆元年議定江蘇安徽浙江截留漕船應支本折月糧三修銀照數全給至行糧盤耗贈銀負重等項按站發給若幫船截留本次或旋兌旋卸或數月後清贈米亦按月計算江西船大載重每年三修銀不敷則取辦於行月二糧遇有截留將原領折耗行月贈銀贈米斛面米均免扣追嗣以運軍挂欠之項諭將雍正十二年以前各省截留漕船應追等項悉免之七年以各省截留漕船已兌開行例須扣追酌定加給視程途遠近船糧多寡為衡山東河南每船給銀五十兩江南浙江六十兩湖廣七十兩江西九十兩以充各軍在次修船置備器具及雇募舵工水手安家養贍之用其應給之銀即於行月折色銀內扣給十八年諭曰前命截留南漕二十萬分貯天津水次各倉備用但恐旗丁等於米色斛面任意攙和短少而州縣胥役又往往藉端勒索令方觀承飭天津道親往監看嗣後截漕之省俱派就近道員稽查不得委州縣著為令撥運者截留山東河南所運薊州糧撥充陵糈及駐防兵米者也康熙三十四年議定年需粟米三萬六百餘石將山東漕糧粟米照數截留以原船自天津運至新河口撥天津紅剝船百五十艘運至薊州五里橋船載百石每百里給價一兩三錢二分所需之銀於過閘入倉價內撥給四十五年定密雲駐防兵米在豫東二省每年徵存薊糧項下撥運令該縣於春夏之交赴通領運收倉平時由水運有故則陸運價由地糧銀內給發次年令豫東各添撥米百石備支銷折耗又撥運保定雄縣兩處駐防兵米截至西沽就船受兌以節耗費嘉慶初因東省輪免漕糧先令豫省兌運不敷之數許動支節年倉存薊米並動碾公穀其後河南被災亦准在薊倉存米存穀內碾動其各州縣派撥之數薊州五萬八千六百石易州三萬八千六百石各有奇密雲一萬一千五百餘石保定雄縣共三千一百餘石良鄉暨大興之采育三百餘石順義昌平二百餘石霸州東安固安寶坻三百餘石玉田及遷安之冷口各五百餘石滄州二千七百餘石又青州駐防兵米二千一百餘石亦於薊糧內截留運供德州駐防兵米不敷亦得動支此撥運之大略也各省之徵收漕糧也向係軍民交兌運軍往往勒索擾民順治九年始改為官收官兌酌定贈貼銀米隨漕徵收官為支給雍正六年以江浙應納漕糧為額甚巨若必拘定粳米恐價昂難於輸將以後但擇乾圓潔淨准紅白兼收秈竹敕並納著為令乾隆初奏定民納漕米隨到隨收嚴禁蠹書留難四年諭曰朕聞湖北糧米以十五萬一千餘石運赴通倉名曰北漕十二萬六千餘石為荊州官米名曰南漕二項原可合收分解乃有不肖州縣分設倉口令糧戶依兩處完納以圖多得贏餘重累吾民著行文該省將二項漕糧合收永遠遵行七年定直省有漕各屬於隔歲年終刊易知由單條悉開載按戶分給以杜濫科十年工部侍郎范燦奏江南下江徵收漕米向借漕費之名或九折或八折自巡撫尹繼善定每石收費六分諸弊盡革久之吏胥復乘緊兌之際多方刁難小民勢難久待不得不議扣折諭飭有漕省分大小官吏嚴行釐剔積弊嘉慶八年禁止各州縣漕糧私收折色及刁生劣監收攬包交凡漕糧皆隨以耗費耗皆以米正兌一石耗二斗五升至四斗改兌一石耗一斗七升至四斗皆隨正入倉以供京通各倉並漕運折耗之用其南糧又有隨船作耗米自五升至二升三升不等以途之遠近為差嘉慶間定江蘇漕糧耗米原備篩颺耗米四升有奇嗣後以二升餘劃付旗丁二升隨糧交倉浙江江西兩湖悉依此例逮漕務改章凡改徵折色各省耗米亦折價與正米並徵自是漕耗之名遂廢初各省漕糧改為官收官兌贈貼名稱山東河南謂之潤耗江蘇安徽謂之漕貼浙江謂之漕截江西兩湖謂之貼運其數多寡不一隨糧徵給均刊列易知由單私派挪移者罪之其後江南每糧百石竟私截至百餘兩浙江至三十餘兩糧道劉朝俊以貪婪漕貼萬二千餘兩被劾給事中徐旭齡亦疏陳贈耗之弊然貪官污吏積習相沿莫能禁也康熙十年議定江寧等府起運耗米及正糧一體貼贈蘇松常三府改折灰石幫貼漕折等銀悉免之二十四年令各省隨漕截銀免解道庫徑令州縣給發乾隆七年定江南漕米贈耗永免停支例各省收漕州縣除隨正耗米及運軍行月糧本折漕贈等項外別收漕耗銀米其數亦多寡不一此項耗外之米皆供官軍兌漕雜費及州縣辦公之用者也輕齎銀者始於有明中葉以諸倉兌運須給路費徵耗米兌運米一平一銳其銳米量取隨船作耗餘皆折銀名曰輕齎清因之每年正兌米一石江西兩湖諸省加耗四斗六升或六斗六升銳米皆一斗加耗四斗六升者則以三斗隨船作耗而以連銳二斗六升折銀一錢三分加耗六斗六升者則以四斗隨船作耗而以連銳三斗六升折銀一錢八分謂之三六輕齎江蘇安徽每石加耗五斗六升銳米一斗除四斗隨船作耗而以餘米二斗六升折銀一錢三分謂之二六輕齎山東河南每石加耗三升銳米一斗除二斗五升隨船作耗餘米一斗六升折銀八分謂之一六輕齎其改兌止有耗米或三斗二升至一斗七升不等止給本色隨船作耗而以存米二升易銀一分謂之折易輕齎均每升折徵銀五釐解倉場通濟庫康熙四十七年令每年江南等省額解輕齎銀三十八萬四千兩內除山東河南湖廣江西浙江江南等省額解銀二十四萬六千九百餘兩仍留通濟庫應用其蘇松糧道所屬額解銀十三萬七千餘兩徑解戶部如倉場不敷得咨行戶部支發尋分撥蘇松糧道所屬額解輕齎銀五萬分解通濟庫備用用此項輕齎銀例應兌漕通以濟運務外此有席木竹板等存皆隨漕交納其尺寸長短廣狹均有定制道光二十九年兩江總督李星沅奏南漕改折戶部定價太輕開不肖州縣浮勒之端江蘇巡撫陸建瀛亦言其不便遂罷改徵折色同治四年曾國藩李鴻章請將江蘇鎮洋太倉二州縣漕糧改徵折色不許光緒十年翰林院侍讀王邦璽疏陳丁漕有五弊三難五宜三不可是時直省丁漕積欠頻仍故邦璽以為言二十三年侍講學士瑞洵言南漕改折有益無損先是江浙漕米除河運十二三萬石外歲約海運百二十餘萬二十年辦理海防江浙各省各折十之五六翌年兩江總督張之洞擬令蘇省州縣收折收本仍其舊而由官全行折解部令仍運本色張之洞復奏蘇漕全折歲可省運費八十萬浙江全折兩湖採買全停剝船挑河各費漕職衞官各項均可酌減歲可省百五十萬嗣戶部以庫儲支絀請將江蘇海運漕糧暫減運三十萬石得銀九十八萬餘兩奕劻等奏言南漕歲有定額兵民生計攸關京師根本重地尤須寬為儲備言者動稱折漕歲五六百萬實則不過百餘萬有奇似不宜輕議更張從之漕糧之外江蘇蘇松常三府太倉一州浙江嘉湖兩府歲輸糯米於內務府以供上用及百官廩祿之需謂之白糧原額正米二十一萬七千四百七十二石有奇耗米蘇松常三府太倉一州每石加耗三斗以五升或三升隨正米起交餘隨船作耗共二萬七百七石有奇嘉湖二府每石加耗四斗以五升或三升隨正米起交餘隨船作耗共萬三千四百八十八石有奇康熙初定白糧概徵本色惟光祿寺改折三萬石石徵銀一兩五錢十四年議定江南白糧仿浙省例抽選漕船裝運每船給行月糧米六十九石三斗銀五十六兩七錢六分經費銀浙江舊例四百五十七兩一錢一釐議減去銀百二十六兩二錢四分米二十八石嗣以運漕運白事同一體裁江浙白糧經費仿漕糧之例支給行贈銀兩至白糧悉係包米運送並無折耗俟抵通照例交收先是江浙輸將白糧二十二萬餘石太常寺光祿寺各賓館需用二千餘石王公官員俸約需十五六萬石內務府紫禁城兵卒及內監食用需一萬石尚餘五萬石乾隆二年高宗謂光祿寺等處收支原以供祭祀及賓館之用在所必需其王公百官俸米應用白糧酌減其半以粳米抵充至賚賞禁城兵卒及內監米石應將白糧易以粳米以紓民力自是實徵白糯不過十萬石有奇矣又准松江太倉額徵白糯改徵漕糧即在派運白米十萬石內通融盈縮以均應減應運之數浙江向不產糯白糧中糯米一項隨漕統徵糙粳官為易糯兌運兩省白糧經費前已議裁至是復照舊例徵收江蘇徵銀十八萬六千九百八十五兩有奇米萬八千八百八十九石有奇舂辦米二萬一千三百九十九石有奇浙江徵銀四萬五千七十五兩有奇米三千九百六十九石舂辦米萬三千二百九十石有奇共實徵銀二十三萬二千六十一兩米五萬五千七百四十八石有奇除給運弁運軍並解通濟庫為運送京通各倉脚價之用餘銀及米折均造冊送部酌撥逮嘉慶中白糧經費江蘇徵銀六萬餘兩米及舂辦米各萬餘石浙江徵銀五萬餘兩米三千餘石舂辦米萬餘石共實徵銀十一萬四千五百十八兩有奇米五萬三千七百二十九石有奇較之乾隆時經費銀所減又逾半矣江浙之運白糧也初沿明代民運之制嗣以臨期雇募民船時日稽遲改行官運仍不便民乃令漕船分帶以省官民之累康熙三年定浙江行漕帶法需船百二十六艘於漕幫內抽出六十二艘裝運增造六十四艘併入僉運後江蘇亦踵行之每船裝運五百石擇軍船殷實堅固者裝運五年一易制定每年未兌之前責令糧道赴次查驗如運軍力疲船不堅固者別選殷軍補運十六年漕運總督瑚寶奏江蘇運白糧船向例五年更調但為時過久請依漕船三年抽調例定運白三年即行另選從之江浙兩省運白糧船原定蘇州太倉為一幫松江常州各為一幫嘉興湖州各一幫領運千總每幫二隨幫武舉一改行官運後以府通判為總部縣丞典史為協部吏典為押運旋裁押運後白糧改令漕船帶運復裁總協二部蘇松常每府增設千總二更番領運每幫設隨幫百總一押趲回空浙江增設千總四隨幫二蘇州太倉倉運白糧船原定百十八艘船多軍衆分為前後兩幫增設千總二隨幫一白糧減徵後併兩幫為一其千總隨幫悉予裁減清初都運漕糧官吏參酌明制總理漕事者為漕運總督分轄則有糧儲道監兌押運則有同知通判趲運則有沿河鎮道將領等官漕運總督駐淮南掌僉選運弁修造漕船派撥全單兌運開幫過淮盤掣催趲重運查驗回空覈勘漂流督催漕欠諸務其直隸山東河南江西江南浙江湖廣七省文武官吏經理漕務者皆屬焉糧道山東江安蘇松江西浙江湖北湖南各一河南以開歸鹽驛道兼理糧道掌通省糧儲統轄有司軍衞遴委領運隨幫各官責令各府清軍官會同運弁僉選運軍兌竣親督到淮不得委丞倅代押如有軍需緊要事件須詳明督撫漕臣方許委員代行其職務監兌舊以推官任之推官裁改委同知通判山東以武定同知東昌清軍同知濟南兗州泰安曹州四通判濟寧臨清兩直隸州同河南以歸德衞輝懷慶三通判江南以江寧蘇州督糧同知松江董漕同知鳳陽同知蘇州揚州廬州太平池州寧國安慶常州八管糧通判太倉州臨時添委丞倅一浙江以湖州同知杭州局糧通判嘉興通判江西以南昌吉安臨江三通判淮北湘南每年於通省同知通判內詳委三員監兌江西湖廣安徽監兌押淮之員尋裁凡開兌監兌官須坐守水次將正耗行月搭運等米逐船兌足驗明米色純潔面交押運官糧船開行仍親督到淮聽總漕盤驗糧數不足米色不純者罪之道府廳不揭報照失察例議處意存袒護照徇庇例議處押運本糧道之職但糧道在南董理運務無暇兼顧江浙各糧道止令督押到淮盤驗即回任所總漕會同巡撫遴委管糧通判一專司督押約束運軍防範侵盜攙和等弊山東河南通判各一江南七浙江三江西二湖北湖南各一後因通判官卑職微復令糧道押運其漕船回空仍令通判管押過淮必依定限如有遲誤照重運違限例議處江南浙江江西尋復通判押運之制押運同知通判抵通後出具糧米無虧印結由倉場侍郎送部引見糧道押運三次亦准督撫咨倉場侍郎送部引見其員弁紳董隨同押運到通並准擇尤保獎以昭激勸其後各省大吏往往藉漕運保舉私人朝廷亦無由究詰也淮北淮南沿河鎮道將領遇漕船入境各按汛地驅行如催趲不力聽所在督撫糾彈江南京口瓜洲渡江相對處令鎮江道督率文武官吏催促並令總兵官巡視河干協催過江總兵裁改由副將管理雍正三年巡漕御史張坦麟條上北漕事宜一自通抵津沿河舊汛窵遠請照旱汛五里之例漕船到汛催漕官弁坐視阻抵不行申報者依催趲不力例參處一沿途疏淺約十三四處坐糧廳難以兼顧請交各汛弁率役疏通應銷錢糧仍令坐糧廳管理從之巡漕御史伊喇齊疏劾河南糧道提催之弊巡撫尹繼善亦疏請革除各州縣呈送監兌押運官役陋規凡漕船回空到省未開兌之前責成本省巡撫及糧道既開兌出境則責成漕督及沿途文武官吏抵津後責成倉場侍郎坐糧廳及天津總兵通州副將嚴行稽查有違犯者捕獲懲治四十八年漕督毓奇言各省督押惟山東糧道抵通餘祗押抵淮安嗣後各省重運俱令糧道督押本幫至臨清出具糧米無虧印結即行回任其自臨清抵通概令山東糧道往來催趲山東運河每年十一月朔煞壩挑淺開壩之日以南省漕船行抵臺莊為準微山等湖收蓄衆泉為東省濟運水櫝不許民間私截水源牐河遇春夏水微務遵漕規啟閉漕船到牐須上下會牌俱到始行啟板如河水充足相機啟閉以速漕運不得兩牐齊啟過洩水勢其在江中偶遇大風原可停泊守候而催漕官吏惟知促迫軍船冒險進行恆有漂沒之虞回空之船管運員及運丁等恆意存怠玩或吝惜雇價將熟習舟子遣散留不諳駕馭之人而押運員弁每先行回署並不在船督率往往有運船失風之事上諭飭沿途各員催趲應察風色水勢毋得過於急迫至涉險失事亦不得因此旨遂任意逗留致逾定限初運河中銅鉛船及木排往往肆意橫行民船多畏而讓之糧船北上亦為所阻至是令巡漕御史轉飭沿途文武員弁將運漕船催趲先行餘船尾隨循次前進恃強爭先不遵約束者罪之領運員弁各省糧船分幫每幫以衞所千總一人或二人領運武舉一人隨幫効力順治六年奏定就漕運各衞中擇其才幹優長者授職千總責其押運量功升轉挂欠者治罪追償其後裁衞所外委百總改為隨幫官康熙五十一年揀候選千三十員發南漕標効力如有領運千總員缺聽總漕委署押運果能抵通全完倉場總督咨送兵部准其即用揀選武舉候推守衞所千總有願補隨幫者可在總署處呈明遇缺准其頂補三年無誤以衞千總推用雍正二年漕運總督張大有奏稱山東河南輪運薊州遵化豐潤官兵米石沿途管押及回空催趲例責成押運通判請添設薊糧千總二更番領運從之各衞既有千總領運而漕臣每歲另委押運幫官分為押重押空一重運費二三千金一空運費浮於千金幫丁之脂膏竭而浮收之弊日滋矣嘉慶十二年諭漕督不得多派委員並禁止運弁等收受餽贈十四年巡漕御史又請大加減省自咸豐三年河運停歇船隻無存領運之名亦廢巡漕御史本明官順治初省雍正七年以糧船過淮陋規甚多並夾帶禁物遣御史二赴淮安專司稽察糧船抵通亦御史二稽察之乾隆二年設巡漕御史四一駐淮安巡察江南江口至山東交境一駐濟寧巡察山東臺莊至北直交境一駐天津巡察至山東交境一駐通州巡察至天津凡徵收漕糧定限十月開倉十二月兌畢惟山東臨清牐內之船改於次年二月兌開依限抵通牐外之船仍冬兌冬開乾隆間令牐內牐外一律春兌春開從漕督楊錫紱請也嘉慶四年諭曰冬兌冬開時期促迫嗣後東省漕糧仍照舊例起徵運赴水次立春後兌竣開幫翌年改為冬兌春開十五年令牐河內外幫船照春兌春開例辦理江北冬漕定於十二月朔開兌限次年二月兌竣開行凡漕兌首重米色如有倉蠹作奸攙和滋弊及潮濕黴變未受兌前責成州縣既受兌後責在弁軍覈驗之責監兌官任之如縣衞因米色爭持即將現兌米面同封固送總漕巡撫查驗果係潮濕攙雜都令賠換篩颺乃將米樣封送總漕俟過淮後盤查比較分別糾劾然運軍勒索州縣即借米色為由州縣開倉旬日米多厫少勢須先兌運軍逐船挑剔不肯受兌致糧戶無厫輸納因之滋事運軍乘機恣索或所索未遂船竟開行累州縣以隨幫交兌之苦及漕米兌竣運弁應給通關通關出自尖丁尖丁者積年辦事運丁也他運丁及運弁皆聽其指揮尖丁索費州縣不遂其欲則靳通關不與使州縣枉罹遲延處分運軍運弁沆瀣一氣州縣惟恐誤兌勢不得不浮收勒折以供其求上官雖明知其弊而憚於改作且慮運軍裁革遺誤漕運於是含容隱忍莫之禁詰州縣既多浮收則米色難於精擇運軍既有貼費受兌亦不復深求及至通州賄賣倉書經紀通挪交卸米色潮濕不純之弊率由於此積重難返而漕政日壞矣乾隆間漕運總督顧琮條上籌辦漕運七事一州縣親收漕糧以免役胥藉端累民一杜匿富僉貧包丁代運之弊一受未開之幫船催令速行一糧船過淮後分員催趲以速運漕一河道舊有橫淺豫為疏濬以免阻滯一各閘俱照漕規隨時啟閉江廣漕船攜帶竹木限地解卸一回空三升五合餘米速給副丁以濟回時食用詔從其議各省漕糧過淮順治初定限江北各府州縣十二月以內江南江寧蘇松等處限正月以內江西浙江限二月以內山東河南限正月儘數開行如過淮違誤以違限時日之多寡定督撫糧道監兌推官降罰處分領運等官捆打革職帶罪督押其到通例限山東河南限三月朔江北四月朔江南五月朔江西浙江湖廣六月朔各省糧船抵通均限三月內完糧十日內回空倉場定立限單責成押幫官依限到淮逾限不能到次照章糾劾承平日久漕弊日滋東南辦漕之民苦於運弁旗丁肌髓已盡控告無門而運弁旗丁亦有所迫而然如漕船到通倉院糧廳戶部雲南司等處投文每船需費十金由保家包送保家另索三金又有走部代之聚歛至于過壩則有委員舊規伍長常例上斛下盪等費每船又須十餘金交倉則有倉官常例並收糧衙署官辦書吏種種需索又費數十金此抵通之苦也逮漕船過淮又有積歇攤派吏書陋規投文過堂種種費用總計每幫漕須費五六百金或千金不等此過淮之苦也從前運道深通督漕諸臣只求重運如期抵通一切不加苛察各丁於開運時多帶南物至通售賣藉博微利乾隆五十年後黃河屢經開灌運道日淤漕臣慮船重難行嚴禁運丁多帶貨物於是各丁謀生之計絀矣運道既淺反增添夫撥淺之費每過緊要閘壩牽挽動須數百人道路既長限期復迫丁力之敝實由於此雖經督撫大吏悉心調劑無如積弊已深迄未能收實效也各省漕船原數萬四百五十五號嘉慶十四年除改折分帶坍荒裁減實存六千二百四十二艘每屆修造十一謂之歲造其升科積缺漂沒者謂之補修改造限以十年至給價之多寡視時之久暫地之遠近為等差造船之費初於民地徵十之七軍地徵十之三備給料價不足則徵軍衞丁田以貼造漕船十年限滿由總漕親驗實係不堪出運方得改造有可加修再運者量給加修銀仍令再運按年計算舊船可用不驗明駕運督撫查實糾劾司修造漕船各官或詐朽壞或修造未竣詐稱已完或將朽壞船冊報掩飾或承造推諉不依限竣工或該管官督催不力及朽壞船不估價申報均降罰有差直隸山東鳳陽地不產木於清江關設廠由船政同知督造江寧各幫共船千二百餘亦於清江成造自儀徵逆流抵淮四百餘里沿途需用人夫挽曳船成後復渡大江道經千里到次遲延縣官急於考成旗丁利於詐索船未到即行交兌名曰轉厫於是贈耗使費賠補苛索諸弊日滋運軍苦之嗣裁船政同知統歸糧道管理令運軍支領料價赴廠成造不敷即於道庫減存漕項銀內動支徐州衞河南後幫漕船向亦在清江船廠成造駕赴河南水次兌糧程途遼遠易誤兌限尋改在山東臨清設廠成造遇滿號之年令各軍於江安道庫銀內領價成造其濟南前幫則在江南夏成鎮成造嗣又改於臨清胡家灣設廠船成查驗之法九一驗木二驗板三驗底四驗樑五驗棧六驗釘七驗縫八驗艙九艙頭梢山東各幫於額運漕船外向設量存船三十江蘇揚州亦有量存船二十四先後議裁並將揚州衞應裁之船抵補江興二衞貧疲軍船乾隆八年漕運總督顧琮上漕船變通事宜一漕船當大造之年遇有減歇即停造一年與先運之船年限參差將來無須同時配造一賠造之船已出運多次恆欠堅固嗣後將賠造接算原船已滿十年尚能出運者准其將船在通售賣一滿號之船向俱分年抽造其中堅固者交總漕擇令加修出運一次許其流通變賣從之二十九年漕督楊錫紱言各省漕船當十運屆滿應行成造之年如運糧抵通准在通變價再買補之船未經滿運或中途猝遇風火請准就地折變詔從其議大河淮安等幫漕船恆有遭風沈溺之事阿桂奏稱因船過高大掉挽維艱所致請較原定尺寸酌量減小嘉慶十五年復酌減江廣兩省漕船尺寸運丁利於攬載客貨船身務為廣大不知載重則行遲行遲則壅塞民船被阻甚有相去數丈守候經旬者兼之強拏剝運捶撻交加怨聲載道不僅失風之虞也十七年以浙省成造漕船賠累日甚每船除例給二百八兩外復給銀五百九十餘兩以紓丁力漕船建造修葺其費有經常有額外年糜國帑數十百萬及其出運勒索於州縣者又數十百萬催趲迎提終歲勞攘夾帶愈多雖蘇松內河亦無歲不剝運剝運仍責舟於沿途甚至攔江索費奪船毀器患苦商民抗違官長以天庾為口實援漕督為護符文武吏士畏其勢燄莫或究詰凡漕船載米毋得過五百石正耗米外例帶土宜六十石雍正七年加增四十共為百石永著為例旋准各船頭工舵工人帶土宜三石水手每船帶土宜二十石嘉慶四年定每船多帶土宜二十四石屯軍領運漕糧冬出冬歸備極勞苦日用亦倍蓰家居於是有夾帶私貨之弊漕船到水次即有牙儈關說引載客貨又於城市貨物輻輳之處逗留遲延冀多攬載以博微利運官利其餽獻奸商竄入糧船藉免國課其始運道通順督漕諸臣不事苛察逮黃屢倒灌運道淤淺漕臣嚴申夾帶之禁丁力益困當商力充裕時軍船回空過淮往往私帶鹽斤漕運總督張大有條上六事一長蘆兩淮產鹽之處奸民勾串竈丁私賣私販伺回空糧船經過即運載船中請嚴行禁止違者俱依私鹽例治罪一糧船回空時請於瓜洲江口派瓜洲營協同廳員搜查一運司等官拏獲私鹽請依專管兼轄官例議一隨幫官專司回空有能拏獲私鹽三次及幫船三次回空無私鹽事者以千總推用一每船量帶食鹽四十斤多帶者以私鹽例治罪一例帶土宜之外包攬商船木筏者照漏稅例治罪貨物入官自是禁網益密矣幫丁困苦爰有津貼之議江蘇漕船以松江幫丁力為最疲定例松太等屬每船津貼銀三百兩旋加為五百兩幫丁視為額給之項仍欲另議津貼開船遲延州縣恐貽誤獲譴恆私餽之以致津貼日增流弊無已漕運抵通及遇淺皆須用剝船清初設紅剝船六百艘每船給田四十頃收租贍船免其徵科近畿州縣距河甚遠恆雇覓民船河干游民藉之邀利及接運漕糧往往有盜賣攙和之弊甚有盜賣將盡故傾覆其船逮運官查明仍責地戶賠償傾家蕩業又領船船戶例受天津鈔關部差管轄每歲河冰未泮之日部差催促過堂守候莫不有費苦累實甚三十九年裁紅剝船依原收租數分派各省於漕糧項下編徵解糧道庫支發乾隆二年定每船給紅剝銀二兩由隨幫千總領發漕船遇淺由運軍自雇民船坐糧廳酌定雇價十三年增設船六十艘造船及用具夫役工食均於紅剝銀內支用餘仍分給運軍南糧入北河後官為雇船剝運糧艘未到剝船先期預備守候累日且有妨商鹽挽運五十年諭令另造剝船南糧抵北河即剝運赴通嗣後毋得封固民船致滋擾累違者罪之尋議定官備剝船千二百艘發交附近沿河天津等十八州縣收管如有商貨鹽斤許其攬載四月以後調赴水次毋得遠離翌年復添造三百隻交江西湖廣成造運送天津與原設剝船在楊村更番備剝豫東二省因水淺阻滯定造剝船三百艘交德州恩武城夏津臨清五州縣分管清初沿明衞所之制以屯田給軍分佃罷其雜徭尋改衞軍為屯丁毋得竄入民籍五年一編審糧道掌之康熙初定各省衞所額設運丁十名三十五年定漕船出運每船僉丁一名餘九名以諳練駕馭之水手充之凡僉選運丁僉責在糧道舉報責衞守備用舍責運弁保結責通幫各丁尋僉本軍子弟一人為副軍雍正初免文學生員僉運先是江蘇按察使胡文伯以江安十衞去蘇松水次遙遠遇有應更換之丁運官赴衞查僉往返須時請預僉備丁造冊送糧道轉送總漕備案經戶部議准漕督楊錫紱上疏爭之略言預僉閒丁其不必者有二不便者有二各省衞幫貧富不等殷富之幫本無俟閒丁預備貧乏之幫遇有應換之丁百計搜查求一二殷丁且不可得安有數十閒丁可以預備其不必一也又殷實軍丁生計粗裕猝遇收成歉薄一二年或即轉為貧乏今既僉選註冊矣設需用之時已經貧乏是仍以疲丁應選其不必二也至送糧道點驗僕僕道途廢時失業不便一也衞所州縣書吏喜於有事富者賄脫貧者受僉不便二也請停止預選閒丁註冊從之舊制漕船旗丁十名丁地五頃其後丁地半歸民戶運丁生計貧乏經戶部行文清查不許民間侵占乾隆初巡漕御史王興吾奏屯田籍冊年久散失無可稽考亦有冊籍僅存而界址難於徵實或軍丁典佃於民而展轉相售屢易其主者清田歸運徒滋擾累蓋津貼之舉已成通例民出費以贍丁丁得項以承運相沿既久無礙於漕況丁得田不能自耕勢必召佃收租是與未贖時之津貼同一得項承運未見有益也二十五年錫紱奏漕運之有疲幫實緣運丁債負為累浙江之金衢嚴溫處紹台嘉等幫江南之江淮興武鳳陽大河等幫債欠尤多幫疲益甚欲除私負之累莫若出借官帑請於浙江江安道庫各提銀六萬兩專備疲幫領借每歲督運道員查按沿途及抵通需用銀數提交押運至期散給於次年新運應領項下扣還俟疲幫漸起奏明停止各省州縣衞幫承僉運丁均以奉文派僉日起限兩月僉解並查明田地房產造冊送總漕存案設有虧短挂欠令其賠補若僉派後實係賣富差貧或棄船脫逃或重僉已革之丁以及徇情出結將軍丁改入民籍者承僉之員降二級調用不准抵銷其上司照失察例議處從漕督毓奇請也道光十三年給事中金應麟奏江浙內河一帶漕船訛詐商民有買渡排幫等名目州縣以兌米畏其挑剔置若罔聞滯運擾民為害甚大詔林則徐富呢揚阿嚴行查禁運軍往來淮通終歲勤苦屯田所入有限於是別給行月錢糧資用其數各省不一江南運軍每名支行糧二石四斗至二石八斗月糧八石至十二石浙江江西湖廣行糧三石月糧九石六斗山東行糧二石四斗月糧九石六斗其通津等衞協運河南漕船運丁行月之數與山東同各省領運千總等官於廩俸外多有兼支行糧者行月二糧舊時本少折多且折價每石不過三四五錢各處官丁常有偏枯之控詔令漕督議定查照歲支行月舊額本折各半折色照漕欠每石銀一兩四錢永著為令康熙二十九年行月錢糧設立易知由單列明應給各項錢糧丁各一紙照發支給如官役剋扣婪索許本丁將事由載單內於過淮時陳控雍正元年覆准運船到次先將本色行月錢糧於三日內給發折色銀由衞守備出具印領受領運千總鈐章解道驗明以半給軍半封固糧道賫淮由總漕監發愆期遲延者罪之乾隆五年議定運丁於解淮驗給一半錢糧內酌留回空費用數多者扣留三之一少者酌扣八兩令糧道另行封兌於過淮時交隨運官弁收領俟抵通交糧後給發各丁緣各省漕船回空每因資斧缺乏不能及時抵次也十年漕督顧琮上言糧道所押幫船多少不同兌開復有遲早必俟最後之幫開竣方得赴幫督察而首進之幫又不免守候領銀之累請仍令糧道兌准封給領運千總解淮呈驗散給從之凡漕船停歇月糧減半給發民船停運給月糧原額四之一三十年車駕南巡截留江浙二省冬兌漕糧各十萬石減歇之船於應給月糧外加恩再給十之二以示體恤運軍月糧遇閏按月本折均平支給尋罷嗣以閏月錢糧乃計日授食各軍春出冬歸停支一月不免枵腹山東河南浙江江寧鳳陽等衞閏月有糧仍照原額支給山東浙江及蘇太等衞遇閏各有額編加徵銀江興等衞無之遇閏於道庫減存銀內支用江西湖北湖南係按出運船米之數支給河南遇閏亦無加徵銀向准山東等省一例支給經部駁追尋准其照支各省運軍名數參差不齊江浙每船十一二名不等嗣議定每船概以十軍配運按名支給行月安慶衞舊係按漕用軍按名派行月二糧自畫一裁減後每船祗用十軍而所載漕糧則倍於他船應仍按糧支給行月山東德州等衞有自雇民船裝運漕糧者一體支給行月錢糧江寧省衞無贍運屯田遇有減存同出運之船支給安家月糧江淮興武二衞原減駕軍二名准其復設派給行月二糧例由布政司行文各府州縣支領每船餽遺書吏六七金不等否則派撥遠年難支錢糧及極遠州縣而州縣糧書又有需索每船約二三金不等十金之糧運丁所得實不及半也漕糧為天庾正供司運官吏考成綦嚴順治十二年定漕糧二道考成則例經徵州縣衞所各官漕糧逾期未完分別罰俸住俸降級革職責令戴罪督催完日開復康熙二年議定隨漕行月輕齎各項錢糧總作十分計算原參各官限一年接徵而接徵之員止限半年殊未平允嗣後接徵官限一年糧道知府直隸州一年半巡撫二年如仍不完照原參分數議處其經徵督催白糧各官考成條例悉與漕糧同白糧項下減存經費銀不得擅用違者題參並勒令賠繳糧道完儲錢糧春秋造冊達部候撥解京餉年終及離任日藩司盤查出如有侵虧揭報巡撫題參凡漕欠無論多寡均發各糧道嚴追承追官吏嚴查本弁本軍產業估計變售償補如運軍侵糧逃逸報明戶部行文總督提究挂欠米石追完補運與本幫原欠米不符者將過淮不駁換之總漕及督漕承運各官並採買搭運之員一併糾劾其運到之米按數收用以免累及運軍承平日久法令日弛糧道及監兌押運官既不親臨水次糧船抵淮漕總復不嚴行稽查於是弁軍任意折銀沿途盜賣抵關時遂多挂欠矣四十五年令嗣後耗贈漕截等銀米暫存糧道倉庫俟回空時倉場查明按其挂欠數扣抵不足以行糧抵補旋議定挂欠漕糧不及一分至六分之弁軍治罪總漕糧道按所欠分數議處並將所欠漕糧由總漕糧道及監兌押運僉丁衞所各官至運丁分別担任均限定期內償還不完總漕糧道交部議運官運軍分別治罪仍責成總漕糧道賠償全完者優糧船抵通起卸漕米例買別幫餘米抵補雍正三年奏准嗣後漕米如有不足即分別參處償還不得以別幫餘米買補其運軍日用餘米許其售賣餘並禁阻漕船經涉江湖偶遇風濤漂沒沿途催趲各官及汛地文武官親臨勘驗出結總漕及巡撫覆勘奏免若軍弁詐報漂沒及漂沒而損失不多乘機侵盜至六百石者擬斬不及六百石充發極邊漕米按數賠繳文武官遇漕船沈溺不將情由申報押運官弁巡查不謹致失火焚燬者俱降一級調用地方官不協救延燒他船者罰俸一年雍正初奏准漕船在內河失風漂沈者不許豁免押運官弁照失於防範例罰俸一年如有假捏嚴加治罪出結官弁從重議處凡海洋江河遭風漂沒領運弁軍幸獲生全者照軍功保守在事有功例晉級賜金其漂沒身故者官弁照軍功陣亡例分別准廕加贈運軍給予祭葬銀乾隆七年議定漕船失風火災船未沉沒無論已未過淮即令修固復載抵通如已被沈難戽者雇民船載運隨幫過淮盤驗抵通如失事在過淮以後黃河中流民船難募令先分通幫帶運開行沿途仍雇覓民船裝載通幫各丁出具互結稍有虧欠責令償補江廣漕船失風沈溺如果不堪戽修無論已未滿號地方官驗明申報總漕就近變價令運弁賫交糧道發給回空漕船失事亦如之嗣議准江蘇浙江山東河南等省買補船艘如已滿號遇失風事故就近折變價銀封交員弁攜回由糧道驗給各軍以補新漕漕船遇冰凌迅下致被損壞及雷火焚燬沈失米糧免其償補各省漕糧歲有定額凡荒地無徵者督撫勘實報免隨漕銀米一例蠲免災傷之區應徵漕糧及折改漕價酌量各被災輕重分別緩徵帶徵遇帶徵之年復又被災傷分年壓徵帶補沿江沿海田地坍沒水中者保題豁免水旱偏災民地例得蠲免惟應船役即被災甚重仍須供修船雇募等事不得同邀寬典康熙三十七年議定京畿通州武清寶坻香河東安永清六州縣紅剝船戶所領地水旱一體蠲免水淹田畝例於歲終確勘涸前起徵淹則停免雍正十年定淹田漕米照壓徵例俟冬勘後涸則帶徵淹則豁免蘇松太三屬為東南財賦之區賦額最重世宗以來屢議蠲緩然較之同省諸府縣尚多四五倍或十數倍道光時兩遭大水各州縣每歲歉蠲減遂成年例嗣是徵收之數除官墊民欠每年僅得正額之七八或五六而已軍興以後兩府一州受害尤酷同治二年諭江督蘇撫查明折衷議減期與舊額本輕之常鎮二府通融覈計著為定額其紳戶把持州縣浮收諸弊永遠禁革四年戶部遵議江蘇常鎮太五屬編徵米係會同漕贈行月南恤局糧等款徵收應如李鴻章等所奏無分起運留支一體並減酌科則之重輕視減成之多寡計原額編徵米豆二百二萬餘石減五十四萬餘石民困稍舒曾國藩又請將蘇松地漕錢糧一體酌減部覆漕項為辦運要需若議覈減費必不敷勢須另加津貼於民生仍無裨益詔令國藩鴻章仿浙省成例覈實刪減浮收並嚴禁大戶包攬短交等弊是年減浙江杭嘉湖三屬米二十六萬餘石海運始於元代至明永樂間會通河成乃罷之清沿明代長運之制嘉慶中洪澤湖洩水過多運河淺涸令江浙大吏兼籌海運兩江總督勒保等會奏不可行者十二事略謂海運既興河運仍不能廢徒增海運之費且大洋中沙礁叢雜險阻難行天庾正供非可嘗試於不測之地旗丁不諳海道船戶又皆散漫無稽設有延誤關係匪細上謂海運既多窒礙惟有謹守前人成法將河道盡心修治萬一嬴絀不齊惟有起剝盤壩或酌量截留為暫時權宜之計斷不可輕議更張所謂利不百不變法也自是終仁宗之世無敢言海運者道光四年南河黃水驟漲高堰漫口自高郵寶應至清江浦河道淺阻輸輓維艱吏部尚書文孚等請引黃河入運添築閘壩鉗束盛漲可無泛溢然黃水挾沙日久淤墊為患滋深上亦知借黃濟運非計於是海運之議復興詔魏元煜顏檢張師誠黃鴻傑各就轄境情形籌議諸臣憚於更張以窒礙難行入奏會孫玉庭因渡黃艱滯軍船四十幫須盤壩接運請帑至百二十萬金未幾因水勢短絀難於挽運復請截留米一百萬石上令琦善往查覆稱玉庭所奏渡黃之船有一月後尚未開行者有淤阻禦黃各壩之間者其應行剝運軍船皆膠柱不能移動上震怒元煜玉庭檢均得罪協辦大學士戶部尚書英和建言治道久則窮窮則必變河道既阻重運中停河漕不能兼顧惟有暫停河運以治河雇募海船以利運雖一時之權宜實目前之急務蓋滯漕全行盤壩剝運則民力勞而帑費不省暫雇海船分運則民力逸而生氣益舒國家承平日久航東吳至遼海者往來無異內地今以商運決海運則風颶不足疑盜賊不足慮黴濕侵耗不足患以商運代官運則舟不待造丁不待募價不待籌至於屯軍之安置倉胥之稽察河務之張弛胥存乎人矧借黃既病盤壩亦病不變通將何策之從臣以為無如海運便詔仍下有漕各省大吏議時琦善督兩江陶澍撫安徽咸請以蘇松常鎮太倉四府一州之粟全由海運乃使布政使賀長齡親赴海口督同地方官吏招徠商船並籌議剝運兌裝等事嗣澍言現雇沙船千艘三不像船數十分兩次裝載計可運米百五六十萬石其安徽江西湖廣離海口較遠浙江乍浦寧波海口或不能停泊或盤剝費鉅仍由河運上乃命設海運總局於上海並設局天津復命理藩院尚書穆彰阿會同倉場侍郎駐津驗收監兌以杜經紀人需索留難諸弊六年正月各州縣剝運之米以次抵上海受兌分批開行計海運水程四千餘里踰旬而至米石抵通後轉運京倉派步軍統領衙門文武員弁沿稽查沙船耗米於例給旗丁十八萬餘石內動放所節省耗米六萬石仍隨同起運承運漕糧每石給耗米八升白糧耗米一斗以補正米之不足仍將漕運商耗覈出二成白糧覈出三成由津局給價收買隨正交運漕糧無故短少黴變於備帶耗米內補足不敷勒令買補如有斫桅鬆艙傷人等事則免之船戶脚價飯米折色並津貼等銀先於受兌後發七成餘三成交押運員弁到壩後查無弊端始行全發沙船餘米不下十萬石初照南糧例聽天津人照市價收買嗣以商人希圖賤價售買改由官為收買其價銀由江南委員轉發船戶後仍令商船自行售賣每屆海運期沿海水師提鎮各按汛地派撥哨船兵丁巡防護送並派武職大員二隨船赴津上海交兌時先期咨照浙江提鎮水師營出哨招寶陳錢一帶地方江南提鎮水師營出哨大小洋山會於馬蹟山山東總鎮出哨成山石島會於鷹游門以資彈壓山東洋面責成游擊守備搜查島嶼防護迎送後以邵燦言停派護送武職大員責成沿海水師逐程遞護嗣寧滬商人各置火輪船一遇新漕兌開行時分別扼要巡防剝船直隸舊設二千五百艘二百艘分撥故城等處八百艘留楊村餘千五百艘集天津備用後雇覔堪裝漕糧二百五十石民船五百艘以備裝載商船首次抵津先僅府縣倉厫廟宇撥卸三十萬石餘令剝船徑運通倉隨將天津倉厫廟宇所儲漕米運通無庸轉卸北倉致多周折至商船二次抵津如剝船不敷裝載即將米先儲府縣倉厫廟宇不敷再剝儲北倉隨令原剝將所儲米石儘數運通剝船足敷裝載即按首次商船辦法不必分儲北倉以歸簡便剝船百六十隻為一起由經紀自派人分起押運交倉押運員役禀報倉場復馳回續押後起米船經紀等止須帶領斛手到船起卸如有藉端刁難需索交地方官從嚴治罪各州縣經管剝船每年例給修艌銀五兩三年小修一次給費二十兩歲終漕竣逐一挑驗船身堅固者酌量修艌如損壞較甚即核賞估價所需經費於道庫油艌銀項下動撥封河守凍期內每船工食銀十五兩運米百石給脚價八兩四錢食米一石一斗五升嗣每百石加脚費五兩李鴻章因官剝船戶貧困滋弊例定工食銀十五兩僅領一半不敷贍家請每船由蘇浙漕項內酌貼五兩部格不行鴻章上疏爭之詔從其議商船領運漕糧迅速無誤萬石以下給匾額五萬石奬職銜每次奏保以百二三十人為限七年蔣攸銛請新漕仍行海運上以近年河湖漸臻順軌軍船可以暢行不許其後各省歲運額漕逐漸短少太倉積粟動放無存二十六年詔復行海運二十七年議准蘇松太二府一州漕白糧米自明歲始改由海運三十年復令蘇松太二府一州白糧正耗米援照成案由海運津咸豐元年戶部尚書孫瑞珍請河海並運御史張祥晉請將江蘇新漕援案推廣常鎮各屬及浙江一體海運下江督陸建瀛蘇撫楊文定浙撫常大淳妥議覆稱明年蘇松常鎮太四府一州漕白糧米請一律改由海運浙漕礙難海運請仍循舊章從之二年建瀛上籌辦海運十事下部議行是年以浙江漕船開兌過遲回空不能依期歸次詔來歲新漕改為海運從巡撫黃宗漢請也五年河決銅瓦廂由張秋入大清河挾汶東趨運道益梗六年截留江蘇應運漕糧二十萬石供支兵餉實運漕白正耗及支賸給丁餘耗米七十五萬五千餘石其歉緩南漕令各州縣依限催徵運通同治七年議試用夾板船裝運採買米石水脚銀數悉仍沙船例給銀五錢五分挽至天津紫竹林由商董就近寄棧聽驗米大臣會同通商大臣驗收過剝所需小船剝價棧租挑力每石給銀七分由商董承領經理又每石給保險銀三分設有遭風拋失責令貼補至每米千石隨耗八十石備帶餘米二十石剝船食耗米十一石五斗又每百石給津通剝價銀八兩一錢四釐通倉箇兒錢折銀二兩均照海運正漕採買各案辦理是年以津沽河面狹隘常有沈船失米之虞於大沽增設海運外局九年浙江巡撫楊昌濬奏浙省來歲新漕酌擬海運章程十四條一委員分辦以專責成一新漕仍由上海受兌放洋白糧仍循案裝盛麻袋首先運滬一寬備海運商船並由蘇省多撥沙船移浙濟用一經耗等米仍照數支給商耗飭帶本色並餘耗申糙等米搭交倉一增給天津剝船耗米以彌虧欠一津通經費照案備帶羨等款仍按數抵解一商船准帶礮械並由商捐輪船護送仍責成沿海水師實力巡防一天津交米後循舊責成經紀續到之船仍由天津道驗收一循案加增海運經費一米船到津應多添排數寬備剝船一商船水脚等項照案核給並二成免稅酌定賞罰一商船二成免私之貨仍以米石計斤所帶竹木照案免稅一商船回空載貨照向章免稅一米船抵津交卸嚴禁經紀斗斛剝船需索浮費下部議行十年鴻章言剝船守候苦累每載米百石請加給脚價銀五兩並另籌運白糧民船守候口糧銀萬二千兩由蘇浙糧道庫漕項內撥解不敷則由司庫通融借撥十一年昌濬請以輪船運漕從之輪船招商由商人借領二十萬串為設局資本盈虧悉由商任之購堅捷輪船三艘每年撥海運漕米二十萬石由招商輪船運津其水脚耗米等項仍照向章辦理輪船到津命直督籌備剝船轉運並會同倉場侍郎臨棧查驗仍仿照白糧例由江浙撫道運通交納以杜折耗偷漏輪船協運江浙漕糧籤明某省漕白糧米字樣於米袋之上糧米上棧時由滬局派員監兌兌竣即由輪船商局給收米回文以後裝船起運俱由商局覈辦滬局不再與聞其棧費夫力亦由商局任之凡漕糧派裝輪船輪船商局酌委執事會同滬局詳驗米色乾潔方行收兌交輪局押赴浦江東棧斛收抵津飭津局各員董提前驗收以免壅滯輪船每艘載米三千石填發連單由津局稽核一切領銀領米等結悉罷之輪船運米由上海道填給免稅執照並援例得酌帶二成貨物其洋藥及二成之外另帶貨物仍須納稅喬松年奏山東境內黃水日益汎濫運河淤塞擬因勢利導俾黃水先驅張秋其張秋南北普行挑濬修建牐壩以利漕丁寶楨文彬奏請挽復淮徐故道事下廷臣會議復稱銅瓦廂決後舊河身淤墊過高勢不能挽復淮徐故道至借黃濟運築堤束水與導衞濟運之法同一難行鴻章奏請仍由海道轉運令各省酌提本色若干運滬由海船解津餘照章折解以節運費並隨時指撥漕折銀兩採買接濟並請停止河運採買糧石推廣海運仍下部議先是江北漕糧由河運通至是亦試辦海運十三年奏准江西在滬採買漕糧八萬石交招商局由海運津每石脚價銀二兩七錢光緒元年湖南漕糧採辦正耗米二萬三百四十五石湖北採辦三萬石均交招商局由海運津江西湖南尋停寶楨奏運河廢壞莫非黃水之害治運必先治黃應先將微山湖之湖口雙閘及各減閘迅速修砌及時收蓄以保湖瀦運河正身亦須量為疏濬嗣桂清畢道遠廣壽賀壽慈等亦以籌款修復運河為請黃元善復稱自黃河北徙運河阻滯改由海運原屬權宜之計當時奏定江蘇漕額以河運經費作為海運支銷每石不得過七錢嗣以經費不敷迭次請增江蘇所加距一兩不遠浙江已加至一兩較道光二十八年咸豐二年海運經費尚有節省歸公者大相逕庭且海運歷涉重洋風波靡定萬有不測所關匪細河運雖迂滯而沿途安定經費維均自各省以達京倉民之食其力者不可數計裕國利民計無善於此者現停運未久及時修復尚屬未晚再遲數年河道日淤需費更鉅臣以為河運迂而安海運便而險計出萬全非復河運不可上命河督漕督及沿河各督撫籌畫具奏沈葆楨疏駁桂清畢道遠等請將有漕省分酌提漕項及將海運糧石分出十數萬石改辦河運之議並力言河運決不能復運河旋濬旋淤運方定章河忽改道河流不時遷徙漕路亦隨為轉移而借黃濟運為害尤烈前淤未盡下屆之運已連檣接尾而至高下懸殊勢難飛渡於是百計逆水之性強令就我範圍致前修之款皆空本屆之淤復積設令因濟運而奪溜北趨則畿輔受其害南趨則淮徐受其害億萬生靈將有其魚之歎又不僅徒糜巨帑無裨漕運已也七年令直督飭招商局有協運漕糧時酌分道員駐津驗兌並責成糧道嚴督治漕事人員兌米時加意查察因招商局協運江浙漕糧有攙雜破碎諸弊故也十年法人搆衅海運梗阻太常卿徐樹銘言漕糧宜全歸河運請於運道經行處疏濬河流修治閘壩並選雇民船以濟運明年曾國荃言來年河運酌添江蘇漕糧五萬石並將邳宿河道淤淺處酌估挑濬從之盧士杰言鄭州黃河漫口奪溜山東運河十里堡門外積淤日寬回空漕船不能挽抵口門現寧蘇新漕待船裝載邳宿挑淤築壩必待空船過竣方可興工上命迅飭疏濬積淤俾漕船早日南下十五年從山東巡撫張曜請改撥海運漕米二十萬石仍歸河運曾國荃黃彭年奏江安河運米石業經截留充賑蘇屬河運漕米十萬前已改歸海運各州縣起運均已抵滬驟改河運窒礙難行且雇船將近千艘亦非旦夕可致請俟本年冬漕再行遵旨提前河運以期規復舊章制可十九年北運河上游潮白等河狂漲水勢高於隄顛數尺原築上堰俱沒水中運河水旱大小決口七十餘處由津運京米麥雜糧千數百艘在楊村阻淺命鴻章將各口門堵合並疏濬河身停蓄水勢以利舟行二十二年王文韶奏南漕改行海運惟江北漕糧仍由河運復於蘇松項下提撥米十萬石併入河運船多道遠自黃入運自運入衞節節阻滯船戶窮無復之竊米攙水諸弊叢生本年漕船到津較昔已遲二三月誠恐有誤回空已飭併程催趲剋日兌收但此次截留江北漕米五萬石米色尚佳江蘇五萬石米色參差甚或蒸變剔除晾曬幾費周章蓋運受黃病已非人力所能挽救擬請自本年始改撥蘇漕之十萬石統歸海運其江蘇冬漕仍辦河運以保運道下部議行御史秦夔揚以江北河運勞費太甚疏請停辦改折解部部議漕糧關係京倉儲積未便遽更舊制二十六年以戰端既開從陳璧請於清江浦設漕運總局車駕西幸轉運局移漢口清江改設分局是年南漕改用火車由津運京二十七年以財用匱乏諭自本年始直省河運海運一律改徵折色責成各省大吏清釐整頓節省局費運費並查明各州縣徵收浮費勒令繳出歸公以期彙成巨款奕劻請於應辦白糧外每年採辦漕糧百萬石純用粳米並不得率請截留從之二十八年部議本年江浙漕糧純歸招商局輪船承運費應力從減省盛宣懷奏近年滬局輪船因事起運太遲棧耗既鉅及運至塘沽又值聯軍未退費用倍於常時二十六二十七兩年招商局所領水脚實不敷所出本年太古洋行願減價攬載英日議定商約均欲漕運列入約章臣等力拒之蓋招商局為中國公司前李鴻章奏准漕米軍米悉歸招商局承運實寓有深意也此次詳察中外情形擬請自二十八年冬漕始於向章每石輪船水脚保險等項漕米銀三錢八分八釐一毫內減去五分永為定制從之江浙漕糧由海運津向用剝船運至通倉每石支耗米一升一合五勺名曰津剝食耗自南漕改用火車運京此項耗米改令隨正交倉嗣因運米事竣每有虧耗許仍舊支給以抵車運虧耗云
