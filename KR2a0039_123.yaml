body:
  text: 清史稿卷一百二十三志九十八食貨四鹽法清之鹽法大率因明制而損益之蒙古新疆多産鹽地而內地十一區尤有裨國計十一區者曰長蘆曰奉天曰山東曰兩淮曰浙江曰福建曰廣東曰四川曰雲南曰河東曰陝甘長蘆舊有二十場後裁為八行銷直隸河南兩省奉天舊有二十場後分為九及日本據金川灘地乃存八場行銷奉天吉林黑龍江三省山東舊有十九場後裁為八行銷山東河南江蘇安徽四省兩淮舊有三十場後裁為二十三行銷江蘇安徽江西湖北湖南河南六省浙江三十二場其地分隸浙江江蘇行銷浙江江蘇安徽江西四省福建十六場行銷福建浙江兩省其在臺灣者尚有五場行銷本府後入於日本廣東二十七場行銷廣東廣西福建江西湖南雲南貴州七省四川鹽井産旺者凡州縣二十四行銷西藏及四川湖南湖北貴州雲南甘肅六省雲南鹽井最著者二十六行銷本省河東鹽池分東中西三場行銷山西河南陝西三省陝甘鹽池最著者曰花馬大池在甘肅靈州行銷陝西甘肅兩省長蘆奉天山東兩淮浙江福建廣東之鹽出於海四川雲南出於井河東陝甘出於池其製法海鹽有煎有曬池鹽皆曬井鹽皆煎論質味則海鹽為佳池鹽井鹽次之海鹽之中灘曬為佳板曬次之煎又次之論成本則曬為輕煎之用蕩草者次之煤火又次之木則工本愈重此其大較也初鹽政屬戶部山東司宣統二年乃命戶部尚書兼任督辦鹽政大臣外遣御史巡視後裁歸總督巡撫管理其專司曰都轉運使司無運司各省或以鹽法道鹽糧道驛鹽道茶鹽道兼理其行鹽法有七曰官督商銷曰官運商銷曰商運商銷曰商運民銷曰民運民銷曰官督民銷惟官督商銷行之為廣且久凡商有二曰場商主收鹽曰運商主行鹽其總攬之者曰總商主散商納課後多剝削侵蝕之弊康熙乾隆間革之而未能去惟兩淮以道光時陶澍變法奏除引目由戶部寶泉局鑄銅板印刷順治三年以淮浙領引距京遠設都理引務官駐揚州至七年裁十五年發引於運司尋命運司仍委員赴部關領票亦領於部商人之購鹽也必請運司支單亦曰照單曰限單曰皮票持此購於場得鹽則貯之官地奉天謂之倉長蘆謂之坨未檢查者曰生鹽已檢查者為熟鹽熟鹽乃可發售兩淮總棧始由商主後改官棧四川以行銷黔滇者為邊岸本省及湖北為計岸潼川州為潼岸河東總岸立於咸豐初其行陝西者以三河口為之匯行河南者以會興鎮為之匯山西則蒲解於安邑運城立岸而澤潞等處亦分立焉大抵暢岸外有滯地或展限或減引或停運或用併引附銷統銷融銷諸法併引附銷者將積鹽附入三引銷一引又納引半之課行一引之鹽納三引之課行二引之鹽是也統銷者將積引統燬其正雜錢糧令商人分年完繳融銷者以暢岸濟滯地是也凡引有大引沿於明多者二千數百斤小引者就明所行引剖一為二或至十有正引改引餘引綱引食引陸引水引浙江於綱引外又有肩引住引其引與票之分引商有專賣域謂之引地當始認時費不資故承為世業謂之引窩後或售與承運者買單謂之窩單價謂之窩價道光十年陶澍在兩淮以其撎價奏請每引限給一錢二分旋禁止票無定域而亦有價當道光咸豐間兩淮每張僅銀五百兩後官商競買逮光緒間至萬金以上又引因引地廣狹大小而定售額票則同一行鹽地售額亦同嘉慶以前引多票少後乃引少票多蓋法以時變如此若夫歲入道光以前惟有鹽課及咸豐軍興復創鹽釐鹽課分二類曰場課曰引課場課有灘課竈課鍋課井課之分長蘆有邊布福建有丘折邊布者明時竈戶按丁徵鹽商人納粟於邊給銀報支是謂邊鹽其有場遠鹽無商支令八百斤折交布三丈二尺後改徵銀三錢是謂布鹽竈課向分地丁為二但丁不盡有地雍正間用長蘆巡鹽御史鄭禪寶言將丁銀攤入於地徵收由是各省如所奏行然長蘆邊布之名猶仍舊丘折者鹽田所納錢糧謂之折價程所納錢糧謂之鹽丘其供應內府及京師盛京各衙門之鹽康熙中悉裁祗供內府光祿寺二十萬斤折銀解部充納引課有正課包課雜課鹽釐分出境稅入境稅落地稅逮乎末造加價之法興於是鹽稅所入與田賦國稅相埒是以順治初行鹽百七十萬引徵課銀五十六萬兩有奇其後統一區夏引日加而課亦日盛乾隆十八年計七百一萬四千九百四十一兩有奇嘉慶五年六百八萬一千五百一十七兩有奇道光二十七年七百五十萬二千五百七十九兩有奇光緒末合課釐計共二千四百萬有奇宣統三年度支部豫算鹽課歲入約四千五百萬有奇蓋稅以時增又如此順治二年諭各運司鹽自六月一日起俱照前朝會計録原額徵收旋蠲免明末新餉練餉及雜項加派等銀十六年戶部議准各商鹽船用火烙記船頭不許濫行封捉其過關祗納船料如借端苛求以枉法論十七年用兩淮巡鹽御史李贊元言回空糧艘禁緝夾帶私鹽康熙九年兩淮巡鹽御史席特納徐旭齡言兩淮積弊六大苦一輸納之苦一過橋之苦一過所之苦一開江之苦一關津之苦一口岸之苦總計六者歲費各數萬斤應請革除又掣摯三大弊一加匜之弊一坐斤之弊一做斤改斤之弊此三弊者惟有嚴禁斤重一法乞交部酌議定例凡橋所掣摯溢斤割沒少者三四斤多者七八斤不得逾額如夾帶過多掣官虛填太重者商則計引科罪官則計斤坐贓庶掣摯公而國法信上命勒石嚴禁立於橋所及經過關津口岸席特納又陳自康熙七年鹽臣差遣稍遲前任鹽差於徵完本年課銀外又重徵新鹽鹽尚未賣一引而課已徵至二十餘萬此種金錢追呼無措非重利借債即典鬻赴比應請停止如所請行十六年用戶科給事中余國柱言命將商鹽掣驗每引加二十五斤加課二錢五分永遠革除著為例二十年命革除三藩橫徵鹽課自滇黔告變所在揭竿𧔧起鹽無行銷地商皆裹足不前至亦榛墟彌望無所得售計臣以軍需所恃督餉之檄急如星火商於是大困時天下鹽課兩淮最多困亦最甚賴巡鹽御史劉錫魏雙鳳多方撫恤輸納忘疲至是海內殷富淮南寧國太平池州等府及兩浙山東廣東福建先後增引利獲三倍不特額外照舊行銷且願先呈課銀請將以前停引補還四川經明季之亂江楚人民遷移其地食鹽日多請引數倍於昔所開之井為滇黔資水陸無滯而福建廣東兩浙招徠竈丁墾復鹽地鹽丘報部升課者不絶又兩浙各場漲墾蕩地二萬二千七百餘畝廣東各埠每斤加七十斤江西南贛二府鹽引至三十六年加斤配課亦如之上以寰宇升平免浙江加斤銀之半共三萬一千三百八十餘萬三十八年南巡復諭各鹽差向因軍需於正額外更納所私得贏餘著將此項停罷其兩淮鹽課前曾加四十萬著減其半四十三年用江南總督阿山言革除兩淮浮費數十萬勒石永禁五十六年長廬巡鹽御史田文鏡請將山東所裁鹽引補足辦課經部議准上以加引增課無益不許先是順治二年世祖定巡視長蘆兩淮兩浙河東鹽政差監察御史各一歲一更代其山東鹽務歸長蘆兼管陝西歸河東兼管十年停鹽務專責成運司尋因運司權輕仍命御史巡察康熙十一年復停巡鹽明年巡撫金世德以直隸事繁請仍差御史於是兩淮兩浙河東皆復舊制既而兩廣福建並設巡鹽御史五十九年仍交督撫管理時鹽課惟廣東雲南常缺額因康熙初粵商由里下報充三年一換名為排商故弊端百出嗣將排商費萬餘兩入正課舉報殷戶以充場埠各長商而場商資薄不能盡數收買致場多賣私五十七年裁場商由運庫籌帑本三十六萬分交場員收買且置艚船給水腳運向東關潮橋存倉候配埠商配鹽按包納價獲有盈餘名為場羡其滷耗餘賸鹽斤乃配引外多收餘鹽發商行運又有子鹽京羡餘鹽羡銀等名後餘鹽改引將餘羡歸入正額而粵鹽遂有辦羡之事後粵商倒歇至五十餘埠滇鹽由商認票辦運而地無舟車全恃人力煎無煤草全恃木柴故運費工本皆重而鹽課率以一分又重於他省富商棄之弗顧強簽鄉人承充及倒罷末由追繳乃責里中按戶攤納逮乾隆時一蹶不振遂令歷年督撫分償世宗初年裁福建浙江巡鹽御史時上於鹽政頗加意河東鹽池形低屢為山水灌入向例修牆築堰皆派蒲解十三州縣之民應役從巡鹽御史碩色言歲撥銀六千兩以三千作歲修三千貯運庫備大修民纍始紓又以鹽法莫急於緝私但有場私有商私有梟私而鄰私官私為害尤巨欲緝場私必恤竈而嚴其禁故於雍正二年兩淮范隄決沿海二十九場為潮淹特發帑金以賑五年以淮商捐銀建鹽義倉積穀諭更立數倉於近竈地以備竈戶緩急之需此政之在於恤竈者六年江南總督范時繹言兩淮竈戶燒鹽應令商人舉幹練者數人並設竈長巡役查核鹽數輸入商垣以杜私賣兩淮巡鹽御史戴音保言場竈燒鹽之具深者盤淺者設有定數而煎鹽以一晝夜為火伏並巡查息火後私燒近有竈戶私置鹽火伏又不稽查故多溢出之數請飭鹽官申嚴舊法至淮南曬掃惟有商人收買配運酌加引課均命著為例此所以嚴其禁也欲緝商私必恤商而嚴其禁故二年兩淮各場因災竈鹽不繼商本倍增從巡鹽御史噶爾泰言令將本年成本之輕重合遠近腳價酌量時值買賣至食鹽難銷處值有綱地行銷不敷亦准改撥兵部尚書盧詢請加引免課以期減價敵私命長蘆兩淮每引加五十斤免納課銀此政之在於恤商者十一年從江南總督尹繼善言改設淮南巡道督理揚州通州等處鹽務並於儀徵之青山頭立專營緝私其稽官私也自明以來膺鹽差者回京例有呈獻及上嚴禁始各將所得報繳獨福建八萬餘兩為總督滿保查出於是裁撤鹽官鹽商命各場由州縣監管嗣廣東總督楊琳言地方官辦課必委之家丁衙役非設鋪分賣中飽即發地里勒派且恐資本不足挪動地丁錢糧應將場商停設發帑委官監收埠商仍留運銷納課從之是時上於鹽官量重李衛衛在浙江可稱者莫如辦帑鹽帑鹽者由松江台州溫州三府場鹽産旺竈多漏私衛請發帑銀八萬交場員收買復奏設玉環同知使經理收鹽事而舟山內港內洋岱山附近之秀山長塗平陽縣界之肥艚均委官管理收發崇明場鹽令知縣主之所收帑鹽儘銷本處魚戶蜇戶漁鹽亦准引商帑商運往他處銷售各照科則納課外輸經費銀一二三錢不等除歸帑本經費餘銀作為盈餘由是私淨官暢每年引不敷運加領餘引十五萬凡商運餘引引輸租銀四分所完課銀與帑鹽盈餘併案題報年約銀十萬餘自上清釐鹽政積弊如洗然自裁革陋規歸入正項上又有耗羡入正額恐正額外復有耗羡商何以堪之諭蓋已知其弊矣十三年署副都御史陳世倌言鹽課引有定額斤有定數按引辦課未必果有奇贏即獲微利何妨留與商人裕其資本乃近年多有以隨利歸公者考其實乃陰勒商重出故在官多一分之歸公在商添一分之誅求此商受其弊者也又有以捐助題請者為急公亦陰勒商總公派及項無所出非拖缺引綱即暗增引斤或高撎鹽價此國與民並受其弊者也請嗣後祗按引辦課一切歸公捐助等名應永遠停止上命莊親王議尋覆如所請行時江西驛鹽道沈起元與江南總督趙宏恩書亦言昔年陋規非皆收納今以墨吏私贓作報部正發在大員自無再收之理而僚佐豈能別無交際其為商纍實甚後有聞於高宗者乃將兩淮鹽政公費運使薪水及雲南黑白琅井規體銀蠲除初世宗從宏恩言命給貧民循環號籌聽於四十斤內負販度日至乾隆初元戶部題准六十歲以上十五歲以下及少壯有殘疾婦女老而無依者許於本縣報明給印烙腰牌木籌日赴場買鹽一次既兩淮巡鹽御史尹會一兩廣總督鄂彌達先後奏言奸民藉口貧苦結黨販私兩查兵役未便概撤後以貧民過多停牌鹽每名日給錢十文至二十四文尋改浙江巡撫為總督兼管鹽政諭酌定增斤改引法將杭嘉紹三所引鹽照兩淮舊額每引加五十斤松所照溫台例改票引九萬餘道引給四百斤均不加課以期復舊又諭裁雲南贏餘其價減至三兩以下廣西仍減二釐免徵兩廣鹽課每千斤餘平銀二十五兩三年改浙督仍為巡撫兼管鹽政六年以淮南竈鹽暑月多耗命五六月每引加耗十五斤七八月遞減五斤至十三年淮北亦仿行又命兩淮於定額外每引加給十斤十六年以省方所至諭兩淮綱鹽食鹽於定額外每引加十斤先是雍正初因長蘆積缺甚多每引加五十斤嗣經部覆按所加斤折中核算年應增課銀八萬六千餘兩高宗念商力艱難命減半納課二十八年裁運商支應以雲南巡撫劉藻言加給黑白兩井薪本銀四十二年以河東鹽斤陸運虧折命每斤加耗五斤時價平銷速兩淮請豫提下綱之引歲入至五六百萬惟乘輿屢次遊巡天津為首駐蹕地蘆商供億浩繁兩淮無論矣或遇軍需各商報效之例肇於雍正年蘆商捐銀十萬兩嗣乾隆中金川兩次用兵西域蕩平伊犂屯田平定臺匪後藏用兵及嘉慶初川楚之亂淮浙蘆東各商所捐自數十萬百萬以至八百萬通計不下三千萬其因他事捐輸迄於光緒宣統間不可勝舉鹽商時邀眷顧或召對或賜宴賞賚渥厚擬於大僚而奢侈之習亦由此而深或有緩急內府亦嘗貸出數百萬以資周轉帑本外更取息銀謂之帑利年或百數十萬數十萬十數萬不等商力因之疲乏兩淮河東尤甚五十一年以兩淮歷四年未豫提命江督查奏尋請嗣後每間一綱豫提一次上諭以正引暢銷為主無庸拘定年限厥後惟五十七年及嘉慶五年各行一次且自三十三年因商人未繳提引餘息銀數逾十萬命江蘇巡撫彰寶查辦鹽政高恆普福運使盧見曾皆置重典其發勒商追賠至四十七四十九兩年乃先後豁免三百六十三萬二千七百兩有奇後遇大經費商人但藉輸將之數分限完納一二限後率皆拖缺五十六年江西巡撫姚棻奏建昌府界連閩省路徑較多必添設緝私卡巡始收實效上曰行鹽分界必使民食不至舍近求遠去賤就貴乃善建昌既距福建為近其價必輕何以不就近行銷若酌改鹽徵鹽課移彼地輸納非惟便民即私販亦將不禁自止旋兩江總督覺羅長麟湖廣總督畢沅等奏稱小民惟利是圖往往得寸思尺如建昌劃歸閩省則私販即可越至撫州於全局所關不細乃命仍舊既長麟奏請建昌設總店屬縣設子店分銷課引依閩省時價斤減二文以敵私更於各要隘分巡嚴緝得旨速行河東自十年衆神保就現行賤價定為長額而商始困後池鹽收歉借配蘆蒙花馬池各鹽又開運城西六十里之小池時民食缺少商倒無人承充乃令退商舉報短商五年更換富戶因受纍多規避四十七年巡撫農起奏准仍定為長商引地分三等配勻復請加價二釐試行三年再核定嗣經部議駁得旨允行久之力仍竭蹶五十六年命馮光熊巡撫山西調甘肅布政使蔣兆奎為山西布政使初兆奎以河東運使入覲帝問辦潞鹽之策以課歸地丁對及光熊入京命與軍機大臣議之未定而山西署巡撫布政使鄭源璹疏至力言不便上曰課歸地丁朕早慮及地方官曾受鹽規必持異議今鄭源璹果然伊調任河南河南亦有行銷河東引地倘從中阻撓從重治罪八月光熊言河東鹽務積疲惟有課歸地丁聽民自運既無官課雜費又無兵役盤詰及關津阻留未有不前者請自乾隆五十七年始凡山西陝西河南課額在於三省引地百七十二屬地丁項下攤徵於是山西攤二十八萬一千一百二兩陝西攤十四萬六千三十七兩河南攤八萬六千六百三十三兩各有奇並議章程十一課銀各解本省藩庫雖遇蠲免地丁之年不得蠲免一部引停領免納紙硃銀一無許地方官私收稅錢一鹽政運使以下各官俱裁汰一移河東道駐運城總管三場一鹽池照舊歲修一三場仍立官稱牙行一課項內有併餘積餘等銀應分別攤免一運阜運儲二倉穀石應分別歸併存借一鹽政應支各款各就近省藩庫動支從之五十七年上幸五臺光熊兆奎奏言自弛鹽禁民無攤課之苦有食賤之利而陝西巡撫秦宗恩河南巡撫穆和藺亦以鹽充價減聞上甚悅甘肅鹽課雍正元年嘗攤入地丁九年復招商至是仍行前法而陝西漢中延安二府及鄜州各屬之食花馬池鹽者亦一併攤入地丁焉嘉慶四年命停各省鹽政中秋節貢物五年以雲南課額常虧從巡撫初彭齡言改為竈煎竈賣民運民銷其法無論商民皆許領票運鹽不拘何井銷鹽不拘何地完課後聽其所之就諸井現煎實數將定額勻算攤徵有餘作為溢課儘徵儘解所有放票收課事宜即歸井員經理至八年著為定章十年諭兩淮鹽每引加十斤不入成本以補虧折先是蒙古阿拉善王有吉蘭泰鹽池向聽民販於托克托城辦鹽分銷山西食土鹽各地不准運赴下游其後稽察漸懈竟順流而下不獨池鹽為所占且侵及長蘆兩淮十四年陝甘總督那彥成奏辦奸民出販請飭阿拉善王將所留漢回奸民獻出王懼獻鹽池命將其歲入銀八千兩如數賞給尋戶部侍郎英和同山西陝甘督撫會奏潞商賠纍緣以賤價定為常額請照乾隆十年以前例按本科價其吉蘭泰池潞商力難兼顧請另招他商十五年以新商虧課改官運工部侍郎阮元言官運不難難於官銷若虧課額勢必委之州縣非虧挪倉庫即勒派閭閻是能銷之弊更甚於不銷於是部議吉蘭泰引請飭還阿拉善王賞項停給原定額引改為潞鹽餘引名吉蘭泰活引兩廣自康熙時發帑收鹽運銷後乃收課乾隆五十三年總督孫士毅以商缺積至六十九萬八千餘兩請停發帑本令各出己資在省河設局經理五十四年新任總督福康安會同士毅籌定章程併兩粵百五十埠為一局舉十人為局商外分子匱六責成局商按定額參以銷地難易運配各匱所有原設埠地悉募運商聽各就近赴局及各匱領銷交課後發鹽二十九埠如舊所謂改埠歸綱也行之二十餘年局商以無應銷之埠歧視埠商其始准局商捆運餘鹽彌補帑息嗣乃不問正引完否貪銷餘鹽反礙正引疲埠缺餉輒用鹽本墊解久之虧益巨雖局商認完後埠商仍按引捐輸而此十人者已物故家産蕩然矣嘉慶十一年總督蔣攸銛以聞乃裁局商改公局為公所擇埠商六人經理六匱事各有埠地自顧己資不至濫用且定三年更換以免把持謂之改綱歸所二十五年命停兩淮玉貢折價銀道光元年兩江總督孫玉庭言淮鹽至楚岸本無封輪之例鹽政全德始行之請散賣為便湖廣總督陳若霖奏稱積鹽尚多若全開售恐疏銷不及鹽行水販壓價賒缺諭俟積鹽售畢再隨到隨賣二年兩淮巡鹽御史曾燠奏稱輪規散後爭先跌價搶售有虧商本玉庭奏無其事若霖言本年較前實溢銷二十六萬餘引於是定議開輪既湖廣總督李鴻寶又言搶售難免八年復封輪時兩淮私梟日衆鹽務亦日壞其在兩淮歲應行綱鹽百六十餘萬引及十年淮南僅銷五十萬引虧歷年課銀五千七百萬淮北銷二萬引虧銀六百萬上召攸銛還京以江蘇巡撫陶澍代之尋遣戶部尚書王鼎侍郎寶興往查澍奏言其弊一由成本積漸成多一由藉官行私過甚惟有大減浮費節止流攤聽商散售庶銷暢價平私鹽自靖命裁巡鹽御史歸總督管理自九年後御史王贈芳侍講學士顧蓴光祿卿梁中靖皆請就場定稅太僕少卿卓秉恬又請仿王守仁贛關立廠抽稅法下澍議澍商於運使俞德淵以為難行遂覆稱課歸場竈有三難一由竈丁起課淮南煎鹽以淮北曬鹽以池約徵銀百餘兩竈皆貧民若先課後鹽則力未逮先鹽後課設遇産歉必課宕丁逃此竈丁起課之難行也一由垣商納課寓散於整較為扼要惟竈以己業而聽命商人情必不願況商惟利是視稱收則勒以重斤借貸則要以重息竈不樂以鹽歸垣商亦必無資完課此垣商納課之亦難行也一由場官收買就各場産鹽引額攤定課額照納似亦核實無如淮課為數甚巨豈微員所能任若聽其儘收儘解難保不匿報侵欺此場官收稅之亦難行也又言鹽在場竈每斤僅值錢一二文若就而收稅則價隨課長爭其利者必多海濱民竈雜處掃煎至易將比戶皆私課且更絀至設場抽稅或可試行一隅若各省豈皆有隘可守漏私必比場竈為甚總之無官無私必須無課無稅業經有課有稅即屬有官有私如謂歸場竈或設鹽廠即可化梟為良恐未能也上韙之明年澍周歷各場擬行票鹽法於淮北奏定章程十條一由運司刷印三聯票一留為票根一存分司一給民販行運立限到岸不准票鹽相離及侵越到岸二每鹽四百斤為一引合銀六錢四分加以諸雜費為一兩八錢八分三各州縣民販由州縣給照赴場買鹽其附近海州者即在海州請領四於各場適中地立局廠以便竈戶交鹽民販納稅五民販買鹽出場由卡員查驗然後分赴指銷口岸六委員駐扎青口七嚴飭文武查拏匪棍八防河九定運商認銷法以保暢岸十裁陋規時窟穴鹽利之官胥吏舉囂然議其不便澍不為動委員領運倡導既而人知其利遠近輻輳鹽船銜尾抵岸為數十年中所未有未及四月請運之鹽已逾三十萬引是歲海州大災飢民賴此轉移傭值全活無算是法成本既輕鹽質純淨而售價又賤私販無利皆改領票鹽但所試行者僅在湖運滯岸皖之鳳陽懷遠鳳臺靈壁阜陽潁上颶州太和蒙城英山泗洲盱眙五河豫之汝陽正陽上蔡新蔡西平遂平息縣確山與食岸在江蘇境之山陽清河桃源邳州睢寧宿遷贛榆沭陽安東海州三十一州縣而皖之壽州定遠霍山霍丘六安豫之信陽羅山光州光山固始商城十一州縣皆昔所定為暢岸尚仍舊法也十三年乃一律改票惟前議科則較原額為減復依原額引徵一兩五分一釐益以各費定銀二兩五分一釐永不議加於是所未改者惟例由江運之桐城舒城無為合肥廬江巢縣滁州來安及由高郵湖運之天長九州縣以地與淮南相錯未宜招販啓浸灌之端故也其立法在改道不改捆蓋淮北舊額未嘗不輕而由暢運至口岸每引成本已達十餘兩價不償本故官不敵私今票鹽不由槓壩淮所舊道而改從王營減壩渡河入湖且每包百斤出場更不改捆直抵口岸除鹽價錢糧外止加運費一兩河湖船價一兩每引五兩有奇減於綱鹽大半其江運數萬引亦倣此自改章後非特完課有贏無絀兼疏場河捐義廠修考院百廢俱興蓋惟以輕課敵私以暢銷溢額故以一綱行兩綱之鹽即以一綱收兩綱之課時頗欲推行於淮南不果及二十九年湖北武昌塘角大火燒鹽船四百餘號損錢糧銀本五百餘萬羣商請退於是總督陸建瀛從護理運使童濂言請淮南改票法較淮北為詳如運司書吏積弊則改為領引納課設揚州總局辦理漢口匣費雖裁而應酬仍多則改為票鹽運至九江驗票發販鹽船經過橋關有掣驗規費則改為壩掣後不過所掣在龍江一關驗票截角餘皆停免鹽包出場至江口其駁運船價及槓鹽各人工勒索則改為商自雇覓凡省陋規歲數百萬又減去滯引三十萬年祗行百零九萬引每引正課一兩七錢五分雜課一兩九錢二分經費六錢五分八釐食岸正課同雜費減半其要尤在以帶連之乙鹽為新引之加斤乙鹽者乙巳綱鹽船遭火而商已納課例得補運故定為每運新鹽一引帶乙鹽二百斤每引六百斤出場至儀徵改為六十斤子包一引十包既裁浮費又多運鹽二百斤成本輕減過半故開辦數月即全運一綱之引楚西各岸鹽價驟賤農民歡聲雷動是年兩淮實收銀五百萬兩雖兩綱後復引滯課虧則以起票自十引至千引不等大販為小販跌價搶運所誤始澍行於淮北亦自十引起然淮北地隘淮南則廣故利弊殊又值粵亂起鹺務全廢非無補救之方也其在長蘆乾隆以來正雜課共徵七十餘萬自嘉慶十四年南河大工每斤加價二文謂之河工加價五年又因高堰大工加價三年後半歸商半歸公八年復將充公一文歸商然歷年缺項已積至千數百萬矣時銀價翔貴商虧彌巨於是又加價以調劑之或一文或二文旋議行減引並包法蓋蘆鹽三百斤成引連加耗包索重三百四十斤搬運築包等費歷年加增亦足病商今以十引改築九包減引一成二十一年再減引二成照前改築二十四年又奏停額引十五萬減去課銀六萬餘兩而困仍莫蘇蓋本因浮費重而缺課因缺課多而增價官鹽價貴私鹽乘之薊遵六屬梟販與官為敵而永平七屬尤甚不得已改為官辦二十八年商倒引懸河南二十州縣直隸二十四州縣未運積引至百餘萬未完積缺至二千餘萬命定郡王載銓倉場總督季芝昌會同直隸總督訥爾經額查究每引因費重需成本五兩有奇乃就正課帑利雜發積缺釐為四類其鹽價每斤減制錢二文以敵私斤重則每引加百五十斤以恤商州縣陋規則嚴行裁汰引地懸岸則直隸招商河南改票皆先課後鹽至停引原限五年再酌展約每引攤算僅二兩有奇其在山東乾隆以來引票正課徵銀十八萬九千八百八十餘兩雜發共十萬一千八百餘兩自嘉慶初帑息遞增至二十一萬餘兩較正課增倍十四年南河大工加價二文每年應缺二十九萬兩較正雜課又增一倍十七年復議加價一文以半歸商半彌補商缺而當年課項不能完乃歸次年帶徵帶徵又未完乃按年分限或十二限或二十限遞年推展至道光元年將河工加價停徵而積缺已五百三十餘萬然尚完課額五年因高堰大工又議加價二文奏明三年後半歸商半歸公然所完僅及半正課反因之拖缺至七年全綱傾敗於是設法調劑以積缺並為一案俟堰工加價歸商後彌補帑本酌留百二十九萬生息餘銀二十七萬至十二年起限分二十限拔繳南運每引加二十五斤北運加二十斤其歸補舊缺之半文加價並歸商以輕成本免徵南運十三州縣與票地臨朐等六縣堰工加價以敵私而舊缺暨現年應交帑息猶不能完於是將報撥之一文堰工加價悉數歸商並將一分帑息減三釐此道光十五年也時銀價日昂虧折彌甚逮臨朐等九州縣票商倒乏因改官運十七年命鹽務歸巡撫管理尋又議加二文二十三年停引票二成以八成作總額並停餘引二十七年又議引地加價二文票地加一文逾年各岸竟倒懸二十餘處時新舊積缺計八百餘萬而十五年後所缺正雜課又九十餘萬十九年後積缺八十餘萬二十七八年皆未奏銷於是定郡王等會同山東巡撫徐澤醇奏准將兩年奏銷免其造報積引停運積缺停徵自二十九年始改為先課後鹽除有商運州縣外皆改官運無論官商每引加七十斤帑息每引減一錢十八年二文加價亦減一文以便民食其在浙江自道光元年裁巡鹽御史以巡撫帥承瀛兼管鹽政承瀛疏言嘉慶十五年前撫臣蔣攸銛清查浙江運庫墊缺銀數僅五十五萬餘兩甫十載乃至百七十三萬三百兩緣邇來引壅舊綱未畢新綱即開套搭行銷不能以一綱之課歸一綱之用而每年奏銷有定限但完正課即報全完其帶輸之款及外用銀並未徵足歷次河餉又須撥解是以不得不於徵存銀內挪墊而商捐用發每遇交辦公事奸商復借名浮支臣今飭運司遇支解銀兩如本發無銀即停給或不得已亦止以外發墊發內發不准以內發墊給外款嗣後至六年銷數皆及額運庫存銀百二十八萬自七年至十年復短銷僅存十一萬蓋因巡撫程含章請加增餘價鹽貴引壅所致逮十一年停止銷數遂至九成二十九年命芝昌往查時又短銷僅至五六成乃請將停歇各地招商承辦並酌加鹽斤其在廣東所辦羡銀頗多蓋粵鹽至西省每包申出鹽十餘斤嗣又添買餘鹽萬包發埠運銷按九折較羡是為稱頭鹽羡約二萬七千餘兩慶遠等五府苗疆食鹽無引額皆捆運餘鹽交近埠帶銷為土司鹽羡約五千餘兩海船運鹽竈戶補船戶耗官為收買發商運銷是為花紅鹽羡約四千餘兩粵省鼓鑄歲資滇銅十餘萬斤滇省廣南府屬歲資粵鹽九萬餘包每年兩省委員辦運至百色交換謂之銅鹽互易又廣州駐防食鹽育英堂鹽各數十包皆取之餘鹽按包計羡藉此充外支經費故無雜課正餉有部飯平頭紙硃等銀又東省鹽船所過抽稅約四千餘西省約四萬餘其帑息則八萬餘各項歷年拖缺初省河因損發多致奏銷遲緩道光二十四年後潮橋疲滯甚於省河然軍興糜爛廣西淮鹽全棄於地而粵課猶十得八九焉其在四川始以潼川府之射洪蓬溪産鹽為旺嘉定府之犍為樂山榮縣川府富順次之不數年射洪蓬溪廠反不如犍樂富榮方乾隆四十九年各處鹽井衰歇有林俊者官鹽茶道聽民穿井不加課蜀鹽始盛惟潼川難如初且産鹽花多巴少又煎鹽用草工費致缺課七萬始議與犍商合行以十二年為限期滿歸清積缺因請續合十二年及期滿自辦甫一載即缺二萬餘於是復請續合至道光八年三次期滿而其廠産鹽愈少每年僅完正課不完羡截羡即羡餘截者於繳課截角時交納也時漢州茂州巴州劍州蓬州什邡射洪鹽亭平武江油彰明石泉營山儀隴新寧閬中通江安嶽羅江安縣綿竹德陽梓潼南江西充井研銅梁大足定遠榮昌隆昌三十一州縣因滷衰銷滯商倒岸懸民在近廠買鹽以食正雜課銀歸入地丁攤徵蓋鹽商奢侈家産日衰乃覓殷戶出租於引商名曰號商所完課羡須交引商封納引商往往挪用且官復有與為弊者至三十年全綱頽廢會徐澤醇為總督查積缺羡截銀共二十三萬七千餘兩未繳殘引二十二萬八千五百八十一張於是酌撥代銷將號商姓名入冊責其自行封匭時惟犍富邊商及成都華陽計商稍殷實銷岸亦暢餘皆疲滯而潼商尤甚乃撤出黔邊所行水引交犍富兩商承辦其在雲南自改章後私鹽尤多而諸井或常缺額又在迤西迤南其東北隅食川鹽東南隅食粵鹽至難如期道光六年總督趙慎畛疏請就井稽鹽多寡定地行銷御史廖敦行又言分地行鹽不若廣覔子井上命新任總督阮元試行其後諸大井淹廢猶賴子井挹注乃復振云長蘆於咸豐八年經蒙古親王僧格林沁防津奏准將道光二十八年減價二文起徵名鹽斤復價得銀十八萬餘時粵匪北犯運道多阻鹽集濬縣之道口鎮自道口南皆以販運運商省岸費有餘利而坐地引商借官行私所獲尤厚故同治五年河南巡撫因河防又議行銷河南引鹽每斤再加二文得八萬兩撤防以七年滎陽大工耗帑百數十萬改為滎工加價於是較道光末增發二十六萬山東因捻匪不能南運同治三年積引百三十餘萬分八年帶銷雖部議提撥道光十八年一文加價解充京餉每年約加銀七萬而正課未能全完河東自嘉慶十四年南河大工每斤加價一文較乾隆課額已增至十六萬餘十七年加入吉蘭泰活引又六萬餘兩河東鹽向侵淮岸至道光十一年淮北改票反灌河東而商力益困乃將活引減半河工加價減二成既由招商變為舉報又變為簽商破産者衆咸豐二年命戶部侍郎王慶雲往查尋奏定留商行票分立總岸商運鹽至發販行銷裁革州縣陋規銀二十七萬餘兩運城商廳所攤公費七萬餘兩並知池價踊貴由坐商銷乏將畦地出租坐食銷價夥租者按年輪曬先曬者盜挖鹽根囤私肥己故每名價至百二三十兩於是嚴禁定白鹽不得過六十兩青鹽不得過四十兩澤潞節省等銀攤入通省引內每引九分另籌經費辦公每引七分並酌加鹽斤計成本引僅一兩六錢商情悅服願將活引之半及加價二成完納未幾殷商九十餘家以急軍需共捐銀三百萬給永免充商執照改為民運民銷山西陝西河南為官運官銷刪除河工活引節費名目定每斤徵課銀三釐五毫每名合銀百五兩較前增七萬餘此咸豐四年也時長江梗阻河東以侵淮綱大暢先後加河南靈寶口岸引三百名山西岢嵐等食土鹽十三州縣引二千四百九十四道惟陝甘鹽池舊轄於河東康熙二十八年改令花馬小池歸甘肅疆臣管理而大池如故自咸豐五年陝西巡撫王慶雲議改課歸地丁慶雲旋調山西吳振棫之奏言陝民貧乏若徵鹽課力實不遑小民納無鹽之課駔儈賣無課之鹽事殊缺允請飭豫省改招為便諭與慶雲會商尋改為官民並運時庫發支絀部議令河東抽釐濟餉巡撫以難行第於額引加引每名各取羡餘約加銀五萬直隸總督因海防亦請加斤加價庚申綱遂加引六百名辛酉綱加五百名共加銀四十八萬然惟辛酉綱全完旋值陝回亂捻匪竄河南陝西銷路驟塞乃酌停加引兩淮於咸豐三年以江路不通南鹽無商收賣私販肆行部議令就場徵稅四年復令撥鹽引運赴琦善向榮大營抵餉怡良旋奏易引為斤每百斤抽稅錢三百以二百四十文報撥以六十文作外銷經費時湖廣總督江西巡撫皆以淮引不至請借運川粵鹽分售於太湖南北江西則食閩浙粵之鹽部議由官借運不若化私為官奏准川粵鹽入楚商民均許販鬻惟擇堵私隘口抽稅一稅後給照放行北鹽自軍營提鹽抵餉遂為武人壟斷提督李世忠部下赴壩領鹽棧鹽不足輒下場自捆夾私之弊不可究詰同治三年御史劉育槐疏請整頓事下江督曾國藩國藩疏論淮南鹽務運道難通籌辦有二難一在鄰鹽侵灌太久西岸食浙私粵私而兼閩私楚岸食川私而兼潞私引地被占十年民藉以濟食官亦藉以抽釐勢不能驟絶一在釐卡設立太多淮鹽出江自儀徵以達楚西層層設卡報稅諸軍仰食性命相依不能概撤臣思辦法不外疏銷輕本保價杜私四者自鄰鹽侵占淮界本輕利厚淮鹽難與之敵查之既煩堵且生變計惟重稅鄰私俾鄰本重而淮本輕庶鄰鹽化私為官淮鹽亦得進步現已咨湖廣江西各督撫將鄰私釐金加抽待至淮運日多銷路日暢然後逐之而申其禁此疏銷之略也近年楚西之鹽每引完釐在十五兩以上今改逢卡抽收為到岸銷售後彙總完釐前收十五兩有奇今楚岸祗十一兩九錢八分西岸九兩四錢四分皖省四兩四錢既減釐以便商人先售而後納此輕本之略也商販求利皆願價昂然往往跌價搶售其始一二奸商零販但求卸物先銷不肯守日賠利其後彼此爭先愈跌愈賤雖欲挽回以保成本不可得也現於楚西各岸設督銷局鹽運到岸令商販投局挂號懸牌定價挨次輪銷時而鹽少民無食貴之虞時而銷滯商無虧本之慮此保價之略也鹽法首重緝私大夥私梟不難捕拏最易偷漏者包內之重斤船戶之夾帶現改復道光三十年舊章每引六百斤分八包每包給滷耗七斤半包索二斤半共重八十六斤刊發大票隨時添給並於大盛關大通安慶等處驗票截角如有重斤夾帶即提鹽充公其各岸之兼行鄰鹽者亦另給稅單苟無單販私即按律治罪此杜私之略也又論淮北鹽務有必須停止者三急宜整理者四漕臣以清淮設防令場商每包捐鹽五斤每引共二十斤旋因逐包捐繳不便改每運鹽百包帶繳五包其應完鹽課及售出鹽價雖經吳棠奏明作為清淮軍需但錙銖而取之瑣屑而派之殊非政體所宜此須停止者一也徐州本山東引地前因捻氛引未到岸經督辦徐宿軍務田在田奏准散運北鹽畫收東課日久弊多採買則私自赴場售銷則旁侵皖界今東引業已通行不能再託借運虛名貽侵銷實患此須停止者二也北鹽已改捆為淨鹽未改為毛鹽皆須納課方准出湖近來私梟句串營辨朋販毛鹽堵之嚴則營員出而包庇緝之疏則官引盡被占銷此須停止者三也夫榷鹽之法革其弊而利自興臣所謂整理之方蓋亦就諸弊既去因勢利導耳淮北綱引前奏至戊午為止今於五月接開己未新綱惟兵燹後戶口大減斷不能銷四十六萬引請先辦正額二十九萬六千九百八十二引引收正課一兩五分一釐雜課二錢又外辦經費四錢倉穀河費鹽捕營各一分他發一概刪除此現籌整理者一也近來軍餉賴鹽釐接濟而處處設卡商販視為畏途從前每包約完釐錢二千餘今擬自西壩出湖先在五河設卡每包收五百文運赴上海再於正陽關收五百文他卡只准驗票不准重收蓋非減釐不足以輕本非裁卡不足以恤商此現籌整理者二也淮北解餉向以十成分攤臨淮軍營四成滁州四成安徽撫營二成今臨滁兩營已裁而漕臣應量豫撥濟嗣後仍應以十成分派臣營五成撫營四成漕營一成論兵數則小有裒益論舊制則無甚更張此現籌整理者三也北鹽每引例定四百斤捆四包每包連滷耗重百十斤近來棧鹽出湖皆在西壩改捆大包重百三十斤鹽票不符臣已嚴禁並於例給大票外將每船裝鹽包數亦填明艙口清單庶可杜避重就輕不致以多報少此現籌整理者四也均如所請行國藩更張鹽法與陶澍不同者澍意在散輪與玉庭若霖同國藩意在整輪與全德曾燠同然玉庭若霖籌辦散輪必前兩月之輪賣畢再開後兩月續到之輪未嘗不以散寓整澍實師其意故國藩鑑於搶售之弊而主整輪爰有總棧督銷之設一以保場價一以保岸價總棧初以儀徵未易修復設於瓜洲後岸為水齧而圮復移儀徵督銷局鄂岸於漢口湘岸於長沙西岸於南昌皖岸於大通未幾國藩移督直隸李鴻章繼之其所增捐莫要於循環給運其法以認引之事併歸督銷俾商販售出前檔之鹽即接請後檔之引初行之淮南後及於淮北蓋參綱法於票法之中以舊商為主而不易新商商有世業則官有責成視以前驗資掣簽流弊為少自是歷任循之至光緒五年而增引之說起增引者部咨淮北增額八萬時總督沈葆楨疏言近年鹽商以票價昂覬覦增引歷任鹽臣精鹽政者無過曾國藩每審定一法必舉數十年之利病如身入其中而通盤計之然淮北引額僅定為二十九萬有奇豈置國計商情於不顧哉鹽政之壞首由額浮於銷其始尚勉符奏銷之限久乃不可收拾於是新陳套搭未幾而統銷融銷矣又未幾而帶徵停運矣惟額少則商少商少則剔弊易疏銷亦易也八年左宗棠督兩江乃請增引淮北十六萬淮南鄂岸十一萬湘岸四萬皖岸四萬二千餘部議淮北照行其鄂岸僅增三萬湘岸一萬皖岸一萬七千餘及曾國荃涖任復將淮北加引奏免蓋兩淮正課初合織造河工銅斤等發祗百八十餘萬每引徵銀一兩餘織造河工銅斤者因鹽政運司養廉厚陋規亦多每年解送織造銀二十二萬捐助河工五萬三藩之變滇銅阻隔派各鹽差採買捐辦水腳又五萬及雍正中裁減養廉規費以為正發嗣及他項於是正雜內外支發遂巨每引增至六七兩自改票後始輕同治中引地未復而以釐補課實過之正無庸增引也至南鹽銷數向以鄂岸為多及為川鹽所據同治七年國藩請規復引地部議令川鹽停止行楚湖廣總督李瀚章疏言未可停惟於沙市設局以川八成淮二成配銷後以包計淮鹽較川鹽每包斤少名二成實不及一成十年國藩復言川侵淮地當使淮八成而川二成或淮七川三今楚督以鄂餉數巨恐川鹽不暢入發驟減臣所求者淮鹽得銷行楚岸則商氣蘇願將應得釐銀多撥數成或全數歸鄂命川楚督撫會議國藩等疏言以武昌漢陽黃州德安四府還淮南安陸襄陽鄖陽荊州宜昌五府荊門州仍准川鹽借銷湖南祗嶽常澧三屬行銷川鹽嶽州常德亦應歸淮澧州暫銷川鹽經部議准光緒二年貴州肅清御史周聲澍疏陳川鹽引地已復請將湖南北各府州全歸淮南部議如所請於是葆楨奏稱湖北川釐每年報部百五十餘萬串計合銀不足九十萬請令淮商包完然湖廣督撫以川釐有定慮包餉難憑合辭袒川拒淮至八年宗棠復移文商榷迄不果行長蘆自順治初祗徵課二十萬二千有奇十二年按明制查出寧餉酬商滴珠缺額等發照舊徵解康熙中復增課增引遂至四十二萬六千有奇乾隆季年以逐年誤課參革者衆於是衆商公議完課外每引捐銀二錢以備彌補名為參課逮道光末課額愈重岸懸愈多於是又添懸岸課每引交銀四分而仍不足至是國藩督直疏言認商既交寄庫銀千餘兩宜與保商以三年定限凡缺在限內於本商追繳二成其一成綱總與出結之散商分賠過限即無涉以免畏避從之是時鹽臣自國藩鴻章葆楨外惟宗棠及丁寶楨以能名同治初宗棠撫浙疏言自金陵陷淮鹽侵灌杭嘉松三所惟紹所勉力搘柱後行鹽地多不守浙省亦陷及浙東克復始飭紹興暫辦票鹽省城及嘉湖繼定而舊商力難運銷請將四所通改票鹽並設局稽查銷數經部議准十年御史奇臣奏言浙東府局於商販鹽至輒低其價以便鹽行收買旋復高其價以便轉售利歸中飽應請裁撤部議敕下巡撫楊昌濬查覆尋覆稱兩浙本先課後鹽自改票運因商力薄僅完半課其半課俟銷後補完擬撤鹽行仍留府局督催後半課銀報可福建當乾隆時西路延平建寧邵武三府屬十五州縣東路福寧府屬五州縣南路閩侯二縣歸商辦號商幫南路福州興化漳州泉州四府屬二十一廳州縣由官辦號官幫亦謂之縣澳官幫包與商辦名朴戶嗣後勻配西路各商代銷於是有代額之名商幫以課輕樂於承運而本課轉拖缺嘉慶初乃行帶徵與減引法旋革除代額久之倒罷相繼道光元年乃改簽商時舊缺皆價新商加以場務廢弛官居省城聽海船裝鹽私相買賣謂之便海流弊滋多至二十九年復倒罷乃改官運而承辦者以運本半入囊橐蓋閩省行鹽乾隆時用團稱每百斤折申砝稱百六十斤以三十斤抵償折耗嘉慶中改用部砝稱又不給耗鹽其擔引折篷引每百斤僅給四十二斤令作百斤售賣而完代額百斤之課是以虧折日甚其後法愈變愈壞同治四年宗棠為閩督乃請改票運飭各場官住場西路以引商為票商縣澳以朴戶為販戶用鹽道票代引名曰販單西路以三十引起票東南兩路及縣澳以百引起票蓋西路每引六百七十五斤東南路並縣澳每引百斤故也裁雜課令正課一兩加耗一錢於領票時交納外抽釐五錢於行鹽各地設局抽收計西路每引徵銀四兩五錢零東南路及縣澳四錢四分零後以西路課重奏減每課一兩隨徵釐四錢凡舊缺各發豁免帑息既免帑本則責令陸續歸還是年徵課耗釐銀四十萬餘帶收舊缺課十九萬餘即以四十萬定為正額行之數年商情大歡私販斂迹陝西花馬池鹽課向由布政使收納及同治十二年宗棠為陝甘總督因西陲用兵改課為釐在定邊設局抽收名曰花定鹽釐於是陝西鹽利歸於甘省初川鹽以滇黔為邊岸而黔岸又分四路由永寧往曰永岸由合江往抵黔之仁懷曰仁岸由涪州往曰涪岸由綦江往曰綦岸至是運商困敝所恃以暢銷者惟濟楚一策及淮南規復引地滯引積至八萬有奇積缺羡截百數十萬金光緒初寶楨督川定官運商銷先從事黔岸籌章程十五條曰裁減浮費曰清釐積引曰酌核代銷曰局運商銷曰兼辦計岸曰引歸局配曰展限奏銷曰嚴定交盤曰慎重出納曰認真黔釐曰實給船價曰刪減引底引底者運商向於坐商租引配鹽引給銀二十餘兩由商總租收作為課稅羡截領繳引費及官吏委員提課規費商局公費餘數二兩分交各坐商至是歷年羡截運商已繳本應全革惟因年久姑准存一兩曰添置辦票曰酌留津貼曰酌給奬設總局於瀘州四岸各設分局檄道員唐炯為督辦其後接辦滇岸川鹽行滇祗昭通東川兩府有張窩南廣兩局謂之大滇邊小滇邊其辦理較黔岸為難者滇自有鹽侵越最易寶楨籌堵遏法至五年乃開運自官運商銷計本年邊計各額引全數銷清外復帶銷積引萬餘所收稅羡截釐及各雜發又百餘萬而奸民不便會上遣恩承童華查辦他岸至川富順富紳王余照假竈戶具詞呈控請改官督商銷有旨垂詢寶楨奏言官督商銷利歸官與商官運官銷權全歸官流弊皆大惟官運商銷官商可相箝制既而控案訊明奏請拏辦逮光緒末各計岸亦多改官運焉此外如奉天由納稅改行引自康熙中停止無課者百七十餘年同治六年將軍都興阿奏准行榷釐法每鹽一榷東錢千為本地軍需光緒三年將軍崇厚請加作二千四百文八年將軍崇綺再請加二千四百文名四八鹽釐是為練兵之發十七年戶部籌餉加二千四百文名二四鹽釐是為解部之發二十四年將軍依克唐阿加千二百文名一二鹽釐是為興學之發此三項總稱八四鹽釐二十八年將軍增祺又奏設督銷局每斤加榷制錢四謂之加價以為官本然原議由官設局收買置倉運售名為督銷實則官運也值日俄戰起亦未實行三十二年將軍趙爾巽請裁督銷之名在奉天立官鹽總局吉林黑龍江立分局聽商就灘納稅運銷三十三年東三省設行省總督徐世昌又改官鹽總局為東三省鹽務總局於是吉林黑龍江始實行官運初歲徵課銀二十四萬或四十萬及爾巽至滿百萬其後至百四十萬蒙古鹽向歸藩部經理其行銷陝甘者以阿拉善旗吉蘭泰池鹽為大宗俗謂之紅鹽道光以前聽民運銷咸豐八年始招商承運每百斤收銀八兩同治間遭回亂商困課逋經宗棠改課為釐斤加制錢五其在山西者亦紅鹽最多嘉慶初阿拉善王獻吉蘭泰池由官招商辦運將口外各廳大同朔平二府及太原汾州等屬向食土鹽州縣劃為吉岸引地至十七年廢除凡入口者由殺虎口徵稅每斤一分五釐其外尚有三種曰鄂爾多斯旗鹽曰蘇尼特旗鹽俗謂之白鹽曰烏珠穆沁旗鹽謂之青鹽初照老少鹽例於口內行銷嘉慶末納稅至光緒時皆改用抽釐法其在直隸者則青鹽白鹽光緒二十八年察哈爾都統奏請抽釐每斤制錢四約年得銀十二萬有奇明年熱河都統亦照抽每斤五文是年直督又請在張家口設督銷局在口外設廠收鹽招商承辦每千斤包納課銀二兩約年得三萬有奇三十三年熱河亦設局每百斤徵銀四錢宣統元年減為二錢五分約年得六萬有奇新疆向聽民掣銷光緒三十四年後始於精河鹽池徵稅萬四千四百兩迪化徵五千一百兩鄯善徵二千四百兩餘仍無稅初鹽釐創於兩淮南北數皆重自國藩整頓乃稍減繼以規復淮綱又議重抽川釐咸豐五年定花鹽每引萬斤抽釐八兩嗣因商販私加至萬七千斤川督駱秉章請就所加斤按引加抽十七兩共正釐二十五兩後各省皆加及光緒時行銅圓鹽價已暗增而釐金外更議加價其事起雍正時蓋長蘆鹽價自康熙二十七年定每斤銀一分四毫至一分二釐六毫不等雍正六年巡鹽御史鄭禪寶疏稱商課用銀民間買鹽用錢康熙時銀一兩換制錢千四五百每鹽一斤錢十六文今每兩合錢二千而鹽價如故亦有減至十三四文者以錢易銀不敷原數應請部臣會同督臣詳議至十年題准每斤加銀一釐乾隆後推行他省然其意在恤商而已嘉慶五年長蘆巡鹽御史觀豫因川楚未靖奏請加價濟用仁宗諭曰以餉需擾及閭閻朕不為也今計食鹽者每日止一二文若增價則人人受纍且私販必因鹽價過昂而起已而以河工需費道光後猶多至光緒二年辦西徵糧臺戶部侍郎袁保恆奏請各省一體加二文以兩江總督沈葆楨力爭乃寢嗣是新政舉行罔不取諸鹽利如二十年因日本搆釁設防部咨各省每斤加收二文二十七年因籌還賠發加四文三十四年因抵補藥稅又加四文半抵補練兵經費半歸産鹽省分撥用其最著者也時疆吏集商會議僉以滯銷為憂而勢不能已自是所入較道光前又增數倍然長蘆經拳匪之擾商本損失至借洋發山東引票各地自同治六年酌歸官辦弊竇殊多河東仍歸官民並運而不能暢銷福建之票運四川之官運皆然廣東潮橋舊由官運至時與六匱統歸商辦成效亦寡雲南子井存者寥寥而淮浙衰敝尤甚宣統元年度支部尚書載澤疏言淮南因海勢東遷滷氣漸淡石港劉莊等場産鹽既少金沙場且不出鹽若淮北三場離海近滷氣尚厚惟曬鹽出於磚池例須按池定引近則磚池以外廣開池基甚至新基已增舊灘未剗致産額益無限制而南商同德昌在淮北鋪池北商尤以為不便兩浙産鹽之旺首推餘姚岱山次則松江之袁浦青村橫浦等場皆板曬之鹽也而杭嘉寧紹所屬煎鹽各場滷料亦購自餘姚近年滷貴薪昂成本加重商家既舍煎而取曬竈戶亦廢竈而停煎煎數日微故龍頭長亭長林等場久缺而注重轉在餘岱餘姚海灘距場遠岱山孤懸海外向不設場雖經立局建厫而官收有限私曬無窮此産鹽各處之情形也淮浙行鹽各有引地而豫之西平遂平久成廢岸湘之衡永寶三府及靖州本淮界而銷粵鹽鄂之安襄鄖荊宜五府及荊門州本淮界而銷川鹽浙之溫台寧處等處祗抽釐尚未行引就目前情形論之淮北以三販轉運於岸情每多隔膜故票販不問關銷豫販又多歸怨湖販此其病在商情之不相聯而各省抽稅勢亦足以病商淮南有四岸督銷權等運司故運司不能制督銷分銷亦不盡受轄於督銷此其病在官權之不相統而商情渙散勢亦足以自病浙場距場近者有肩引住引之分距場遠者有綱地引地之別加以官辦商包其法不一紛紜破碎節節補苴至捆鹽出場沿途局卡之留難船戶之夾帶則皆不免此銷鹽各處之情形也淮鹽行於蘇皖與浙鹽東鹽引界鄰行於豫岸與東鹽蘆鹽引界鄰行於西岸與浙閩粵鹽引界鄰行於湘鄂兩岸與川鹽鄂鹽引界鄰而鄂之襄樊又為蘆私潞私所灌湘之衡永寶又為粵私所占兩浙引地蘇皖西三岸皆與淮鄰即本省之溫台等處亦為閩私所侵此皆犬牙相錯時起爭端近年京漢鐵路通車貫豫省而下淮蘆之爭更烈將來津浦粵漢等路告成淮界且四面皆敵然此猶言鄰私也尤甚者皖豫同為淮界而皖之潁州與汝光界壤則以加價輕而及豫岸台處同為浙境而處之縉雲為台商承辦則又以包釐微而侵及處郡江西建昌久為廢岸近設官運局以圖規復而貶價敵私撫州已虞倒灌上海租界向為私藪近設事務所以籌官銷而越界行運蘇屬時有責言是以淮侵淮以浙侵浙也大抵利之所在人爭趨之固未易遏所恃惟緝私嚴耳然辨勇窳敗不能制梟販而轉擾平民地方官亦以綱法久廢不負責成意存膜視此又引界毗連各處之情形也近來籌發以鹽為大宗而淮浙居天下中心關於全局尤重為整頓計非事權統一不可擬請將鹽務歸臣部總理其産鹽省分督撫作為會辦鹽政大臣行鹽省分均兼會辦鹽政大臣銜制曰可其言南商鋪池者蓋光緒三十三年淮南因鹽不敷銷於淮北埒子口葦蕩左營增鋪新池謂之濟南鹽池三十四年北商稱有礙舊池銷路經江督張人駿令按淮南缺額以十萬引為率三販轉運者淮北票鹽舊由票販自垣運至西壩售於湖販再由湖販運至正陽關按輪售於岸販也載澤既受督辦鹽政大臣之命乃設鹽政處按各區分為八廳先籌淮北章程四曰規復西遂廢岸曰撤退淮邊蘆店曰體恤路捐商纍曰包繳豫省釐價咨商河南巡撫吳重熹惟末條堅持仍舊載澤又奏定於西壩設鹽釐總局臨淮關設掣驗局餘局卡悉裁三販統改岸販准自赴總局完納釐金加價定每引為銀幣二元二角折收庫平銀一兩六錢零均一次收清至土銷引地酌減銀幣四角折收一兩二錢較原額少三成此二年七月事也直隸張家口外收蒙鹽各場向由商包辦宣統元年改為公司至是復改設官棧以各廳州縣為引岸由商包引每年二萬徵銀十五萬七千四川歸丁各地票運咸豐後增至六十八廳州縣官運常為所礙至是奏查井竈就現有者為額嚴禁偷賣以杜票私三年以大清銀行發七百萬直隸銀行發六十萬為蘆商償外債收引地三十六歸官辦設局天津其永平七屬道光間由州縣辦課光緒二十九年改設官運局至是與新河平鄉二縣無商認辦者統歸津局經理初與各國通商違禁貨物不許出入口鹽其一也乃奉天之大連旅順吉林之長春有日本鹽吉林之琿春延吉有朝鮮鹽黑龍江之滿洲里黑河吉林之東寧有俄羅斯鹽廣西之鎮南關雲南之蒙自有法蘭西鹽香港澳門所在侵灌至山東膠州灣租借於德而侵即墨鹽場奉天遼東半島租借於俄又轉於日而占金州鹽灘與復州之交流鳳鳴兩島有包購餘鹽派員緝私兩議後緝私策行購鹽不果廣東廣州灣租借於法吳川之茂琿場為所占每運鹽至香港及越南銷售以入內地實皆敗亂鹽法治鹺政者當有以善其後云
