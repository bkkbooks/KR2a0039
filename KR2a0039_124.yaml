body:
  text: 清史稿卷一百二十四志九十九食貨五錢法茶法礦政錢法太祖初鑄天命通寶錢別以滿漢文為二品滿文一品錢質較漢文一品為大天聰因之世祖定鼎燕京大開鑄局始定一品於戶部置寶泉局工部置寶源局順治通寶錢定制以紅銅七成白銅三成搭配鼓鑄錢千為萬二千串為一卯年鑄三十卯每錢重一錢二年增重二分定錢七枚準銀一分舊錢倍之民間頗病錢貴已更定十枚準一分各省鎮遵式開鑄先後開山西陝西密雲薊宣大同延綏臨清盛京江西河南浙江福建山東湖廣及荊州常德江寧三府鑄局五年停盛京延綏二局六年移大同局於陽和七年開襄陽鄖陽二府鑄局八年停各府鎮鑄十年復開密雲薊宣陽和臨清鑄局初戶部以新鑄錢足用前代惟崇禎錢仍暫行餘準廢銅輸官償以直並禁私鑄及小錢僞錢更申舊錢禁嗣以輸官久不盡通令天下限三月期畢輸逾限行使罪之是年廷議疏通錢法以八年增重一錢二分五釐為定式幕左漢文一釐二字右寶泉鑄一字曰戶寶源曰工各省鎮並鑄開局地名一字如太原增原字宣府增宣字之類錢千準銀一兩定為畫一通行之制禁私局犯者以枉法贓論時官錢壅滯通以斂散法酌定京外局錢配搭俸餉錢糧舊制徵銀七錢三皆著為令而直省局錢不精私鑄乘之卒壅不行悉罷鑄專任寶泉寶源精造一錢四分重錢幕用滿文俾私鑄艱於作僞現行錢限三月銷燬更定私鑄律為首及匠人罪斬決財産沒官為從及知情買使總甲十家長知情不首地方官知情分別坐斬絞告奸賞銀五十兩十七年復直省鑄令準重錢式幕兼用滿漢文康熙元年鑄紀元錢後凡嗣位改元皆鑄如例高宗內禪鑄乾隆錢十二嘉慶錢十八非常例也自改鑄一錢四分錢奸民輒私銷乃定律罪之比私鑄遂禁造銅器為私銷也十八年申嚴其禁軍器樂器之屬許造用五斤以下者時重錢銷益少直苦昂二十三年允錢法侍郎陳廷敬糾復一錢舊制久之錢貴如故乃申定錢直禁銀一兩易錢毋得不足一千然錢直終不能平季年銀一兩易錢八百八十至七百七十乃發五城平糶錢易銀以平其價自舊錢申禁而閩地僻遠猶雜制錢行之二十四年巡撫金鋐以為言學士徐乾學疏稱自古皆古今錢相兼行使聽從民便因歷數歷代舊事謂自漢五銖以來未嘗廢古而專用今隋銷古錢明天啓後盡括古錢充鑄錢之變也且錢法敝可資古錢以澄汰故易代仍聽流通矧閩處嶺外宜聽民行使上韙其言盡寬舊錢廢錢之禁是年定旗籍私鑄私銷罪如律四十一年以循舊制改輕錢私鑄復起廷臣請罷小制錢仍鑄一錢四分重錢新舊錢暫兼行新錢千準銀一兩舊錢準七錢詔從之然私鑄竟不能止四十五年山東請鑄大錢會獲得常山私鑄上以私鑄不盡大錢必多私銷宜先收後禁乃令錢糧銀一兩折收二千文錢盡折收銅器戶部以新錢不敷請展至五年後燬舊鑄越二年襄陽私鑄錢潛貯漕艘入京大理卿塔進泰奉命會查疏請嚴禁收燬再犯私鑄私販罪如律船戶運辨罪同私鑄地方官知情斬決沒其家失察奪職法益加嚴官局用銅自四十四年兼採滇産雍正元年巡撫楊名時請歲運滇銅入京廷議即山鑄錢為便因開雲南大理霑益四局鑄運京錢幕文曰雲泉上以錢為國寶更名寶雲並令直省局錢幕首寶字次省名純滿文其後運京錢時鑄時罷乾隆二年以錢價久不平飭大興宛平置錢行官牙以平錢價上念私銷害尤甚益厲行銅器禁官非三品以上不聽用舊有銅器限三年內輸官逾限以私藏禁物論已禁仍造罪比盜鑄為從遂通令禁造銅器尋益嚴限制惟一品始聽用餘悉禁之藏匿私用皆以違禁論十二年上以錢重則私銷輕則私鑄令復一錢二分舊制十三年定翦錢邊律罪為絞監候先是尚書海望以銅禁病民疏陳四弊高宗然之遂罷禁銅收銅令復以京師錢價昂銀一兩僅易八百文詔發工部節慎庫錢平價御史陶正靖疏陳錢價不平弊由經紀蠹害錢法遽命革除之浙江布政使張若震言錢貴弊在私燬如使配合銅鉛參入點錫鑄成青錢則銷者無利試之驗因採其議鑄與黃錢兼行定私鑄鉛錢禁為首及匠人絞監候為從及知情買使減一等申嚴販運及囤積制錢之禁凡積錢至百千以上以違例論上諭廷臣曰今之言禁者亦第補偏救弊非能正本清源也物之定直以銀不以錢而官民乃皆便錢不便銀趨利之徒以使低昂為得計何輕重之倒置也嗣是宜重用銀凡直省官修工程民間總置貨物皆以銀二十二年兩廣總督李侍堯請禁舊錢僞錢上以民間雜用吳三桂利用洪化昭武諸僞錢第聽自檢出官為易之以充鑄舊錢仍聽行使二十四年回部平頒式於葉爾羌鑄乾隆通寶枚重二錢幕鑄葉爾羌名左滿文右回文用紅銅並燬舊普爾錢充鑄越二年阿克蘇請鑄如葉爾羌例復允西藏開鑄銀錢重一錢與五分二種文曰乾隆寶藏幕用唐古忒字邊郭識年分以上二類錢第行之回藏內地不用二十九年令回部鑄錢永用乾隆年號時至中葉錢直昂直省皆增爐廣鑄價暫趨於平會銅運遲滯市儈居奇增直害錢法通飭督撫毋得輕請停爐減卯季年私鑄益多四川雲貴為淵藪流布及江浙雲貴官錢亦以不善罷鑄又自律嚴私鑄常寬之以收燬莠民恃以行詐私錢日出不窮五十七年湖廣總督畢沅請收買毋立限上謂湖北乃私鑄總匯不圖禁絶而預思所以卸過命嚴稽私販仍豫寬限二年五十九年以官私錢錯出錢賤乃暫罷直省鑄私錢通限一年收繳而吏胥緣為奸嘉慶元年復直省鑄至十年直省未盡復卯錢復貴通飭各督撫按卯鼓鑄然嗣是局私私鑄相踵起京局錢至輪郭肉好糢糊脆薄寶蘇鑄中雜沙子擲地即碎而貴州湖廣私鑄盛行江蘇官局私局祕匿至道光間閩廣雜行光中景中景興嘉隆諸夷錢奸民利之輒從仿造貴陽大定官局亦別鑄底大錢錢法自是益壞時華洋互市以貨易銀番船冒禁歲漏出以千萬計御史黃中模章沅咸以為言而大髻小髻蓬頭蝙蝠雙柱馬劍各種番銀亦潛輸內地以規利自閩廣通行至黃河以南而洋商復挾至各省海口陽置貨而陰市銀至洋銀日多紋銀日少而貴上患之命粵督申嚴禁約然所禁不及洋銀仿鑄之廣板福板杭板吳莊行莊耗華銀如故御史黃爵滋請並禁使出洋更立專條議從重科十七年詔沿江沿海督撫海關監督飭屬嚴稽偷漏定功過行賞罰而海內銀卒耗竭每兩易錢常至二千廷臣謀所以重錢以殺銀之勢而議格不行先是道光中葉銀外泄而貴朝野皆欲行大錢以救之廣西巡撫梁章巨疏言其利文宗即位四川學政何紹基力請行大錢以復古救時上意初不謂然卒與官票寶鈔行焉鈔嘗行於順治八年歲造十二萬八千有奇十年而罷嘉慶間侍講學士蔡之定請行鈔咸豐二年福建巡撫王懿德亦以為請廷議以窒礙難行卻之是時銀虧錢匱重而軍需河餉糜帑二千數百萬籌國計者率以行官票請次年命戶部集議惠親等請飭部製造錢鈔與銀票相輔並行票鈔製以皮紙額題戶部官票左滿右漢皆雙行中標二兩平足色銀若干兩下曰戶部奏行官票凡願將官票兌換銀錢者與銀一律並準按部定章程搭交官項僞造者依律治罪邊文龍鈔額題大清寶鈔漢字平列中標準足制錢若干文旁八字為天下通寶平準出入下曰此鈔即代制錢行用並準按成交納地丁錢糧一切稅課捐項京外各庫一概收解邊文如票大錢當千至當十凡五等重自二兩遞減至四錢四分當千當五百淨銅鑄造色紫當百當五十當十銅鉛配鑄色黃百以上文曰咸豐元寶以下曰重寶幕滿文局名四年以乏銅兼鑄當五鐵錢及制錢已而更鑄鉛制錢乾隆間京局用銅滇洋兼資後專行滇運時以道梗銅滯故權宜出此定議票銀一兩抵制錢二千鈔二千抵銀一兩票鈔亦準是互相抵民間完納丁糧稅課及一切官發亦準五成京外應放庫發如之大錢上下通行如票鈔抵銀如制錢之數輸官以三成鐵錢通用如大錢阻撓罪以違制僞造鈔票斬監候私鑄加嚴通飭京外設置官錢局尋以直省延不奉行嗣後議於各府置鈔局發大錢於行店俾錢鈔通融互易以便民丁糧搭收票鈔零星小戶銀鈔尾零搭交銅鐵大錢皆先從直隸山東實行官吏折勒骫法商民交易不平價從嚴處治七年令順天直隸各屬錢糧自本年上忙始以實銀四成寶鈔三成當十銅鐵大錢三成搭交一切用項亦按成搭放尋從戶部議自本年下忙始直隸照銀七票三徵收大錢三成即納在鈔票三成內交票交錢聽便然鈔法初行始而軍餉繼而河工搭放皆稱不便民情疑阻直省搭收五成以發多抵撥既艱搭放遂不復肯搭收民間得鈔積為無用京師持鈔入市非故增直即匿貨持向官號商鋪所得皆四項大錢不便用故鈔行而中外兵民病之其後京師以官號七折錢發鈔直益低落至減發亦窮應付鈔遂不能行矣大錢當千當五百以折當過重最先廢當百當五十繼廢鐵錢以私票梗之而亦廢乃專行當十錢盜鑄叢起死罪日報而不為止局錢亦漸惡雜私鑄中不復辨奸商因之折減挑剔任意低昂商販患得大錢皆裹足三成搭收徒張文告屢禁罔效法弊而撓法者多固未有濟也當十錢行獨久然一錢當制錢二出國門即不通行咸豐之季銅苦乏申禁銅收銅令同治初鑄錢所資惟商銅廢銅當十錢減從三錢二分光緒九年復減為二錢六分時孝欽顯皇后鋭意欲復制下廷臣議以滇銅運不如額姑市洋銅交機器局試鑄戶部奏稱機器局鑄錢並京局開爐之不便懿旨罪其委卸卒命直隸總督李鴻章於天津行之重準一錢遂賞唐炯巡撫銜專督雲南銅政十四年廣東試鑄機器錢以重庫平七分識於幕二十四年命直省鑄八分錢而京師以制錢少行當十錢如故三十二年鑄銅幣當十錢民不樂用於是創鑄銀銅圓設置銀行思劃一幣制與東西洋各國相抗衡初洋商麕集粵東西班牙英吉利銀錢大輸入總督林則徐謀自鑄圖抵制以不適用而罷嗣是墨西哥日本以國幣相灌輸光緒十四年張之洞督粵始用機器如式試鑄李鴻章繼任續成之文曰光緒元寶庫平七錢二分廣東省造幕絞龍並鑄三錢六分一錢四分四釐七分二釐三分六釐四種小銀圓中國自行銀錢自此始湖北江西直隸浙江安徽奉天吉林以次開鑄尋以廣東湖北江西所鑄最稱便用許以應解京餉撥充鑄本直省未開鑄者飭從附鑄京外收放庫發準搭三成因命劉坤一張之洞陶模籌議三局造鑄事宜已復由戶部核定七省所鑄規模成色苦參差不利通行會造幣總廠成擬撤其三而留江南直隸廣東為分廠初鑄準重墨圓議者頗非之之洞始於湖北試行一兩銀幣戶部亦以中國立算夙準兩錢分釐因定主幣為庫平一兩而以五錢一錢小銀幣暨銅圓制錢輔助之令總分廠如式造行銅元鑄始閩廣江蘇繼之時京局停鑄命各運數十萬入京由戶部發行備用沿江沿海省分並飭籌發附鑄而直省陸續開鑄造幣總廠反後成總廠擬鑄之幣凡三品曰金曰銀曰銅最先鑄銅幣自當制錢二十降至當二自重四錢降而四分凡四種文視直省小異大同直省曰光緒元寶總廠初同直省嗣定曰大清銅幣皆識某所造幕皆龍文紫銅鑄直省間亦用黃銅凡私造銅幣僞造紙幣罪視制錢加等初鑄銅元為補制錢之不足旋艷其餘利新政餉需皆取給焉競鑄爭售乃至不能敷鑄本兩江總督周馥首疏其弊戶部為立法限制之繼與政務處上補救八事旋以開鑄者多至十七省省至二三局恐終難言畫一乃令山東歸併直隸湖北歸併湖南江南安徽歸併江寧浙江歸併福建廣西歸併廣東合奉天河南四川雲貴為九廠由部派員會辦遣大臣周歷察核與戶部籌定會辦事宜顧銅元以積賤當十錢僅能及半數民私局私頗叢奸弊應準銀者銅元折合類致虧損物價翔貴民生日益凋敝省與省復相軋至不相流通山東巡撫袁樹勛繼陳十害時總廠初鑄銅幣尚留寶泉鑄六分制錢廣東請改鑄一文錢由總廠頒式通行三十四年命各銅元廠加鑄一文新錢如銅圓式蓋存一文舊制藉為銅圓補救也自大理少卿盛宣懷奏設通商銀行議者以東西洋各國皆有國立銀行能持國內外財政二十九年允戶部請設置官銀行以部專其名糾合官商資本四百萬通用國幣發行紙幣官發公債皆主之尋為發行紙幣並開紙印刷二廠會戶部改度支更銀行名曰大清設正副監督各一造幣總廠亦如之銀行內並附設儲蓄銀行畫一幣制載入各國新定商約部議宜先審定銀幣試行效則積金鑄幣三品之制可使同條共貫第計元計兩尚持兩端德宗下其事於督撫適有以實行商約速定幣制請者下政務處核議各督撫亦先後議上主兩者至十一省主圓者僅八省度支部前亦頒布用兩遂定一兩為主幣復由部設幣制調查局而審慎於鑄造推行畫一成色分量之間至宣統二年仍前定名曰圓銀幣一圓為主幣五角二角五一角三種鎳幣五分一種銅幣二分一分五釐一釐四種為輔幣銀幣重七錢二分餘遞降並撤直隸銀銅造幣廠而留漢口廣東成都雲南四廠前所鑄大小銀元暫照市價行使將來由總廠銀行收換改鑄三品之制首金次銀光緒中葉英金磅歲騰長每磅自華銀四兩一錢六分五釐增至八兩有奇御史王鵬運通政司參議楊宜治嘗建議積金仿鑄三十年戶部疏請備造幣之用納官者皆準金出使大臣汪大燮極言用金之利孫寶琦則請對內用銀對外必預計用金廷臣之論國幣者亦以不臻至用金幣制不為完善皆請速定用本位金卒未能實行云茶法我國産茶之地惟江蘇安徽江西浙江福建四川兩湖雲貴為最明時茶法有三曰官茶儲邊易馬曰商茶給引徵課曰貢茶則上用也清因之於陝甘易番馬他省則召商發引納課間有商人赴部領銷者亦有小販領於本籍州縣者又有州縣承引無商可給發種茶園戶經紀者戶部寶泉局鑄刷引由備書例發直省預期請領年辦年銷茶百斤為一引不及百斤謂之畸零另給護帖行過殘引皆繳部凡僞造茶引或作假茶興販及私與外國人買賣者皆按律科罪司茶之官初沿明制陝西設巡視茶馬御史五西寧司駐西寧洮州司駐岷州河州司駐河州莊浪司駐平番甘州司駐蘭州尋改差部員又令甘肅巡撫兼轄後歸陝甘總督管理四川設鹽茶道江西設茶引批驗大使隸江寧府歲徵之課江蘇發引江寧批發所及荊溪縣屬張渚湖汊兩巡檢司安徽發引潛山太湖歙休寧黟宣城寧國太平貴池青陽銅陵建德蕪湖六安霍山廣德建平十七州縣江西發引徽商及各州縣小販此三省稅課均於經過各關按則徵收浙江由布政使委員給商每引徵銀一錢北新關徵稅銀二分九釐二毫八絲彙入關稅報解又每歲辦上用及陵寢內廷黃茶共百一十餘簍由辦引委員於所收茶引買價內辦解湖北由咸寧嘉魚蒲圻崇陽通城興國通山七州縣領引發種茶園戶經紀坐銷建始縣給商行銷坐銷者每引徵銀一兩行銷者徵稅二錢五分課一錢二分五釐共額徵稅課銀二百三十兩有奇行茶到關仍行報稅湖南發善化湘陰瀏陽湘潭益陽攸安化邵陽新化武岡巴陵平江臨湘武陵桃源龍陽沅江十七州縣行戶共徵稅銀二百四十兩陝甘發西寧甘州莊浪三茶司而西安鳳翔漢中同州榆林延安寧夏七府及神木廳亦分銷焉每引納官茶五十斤餘五十斤由商運售作本每百斤為十篦每篦二封共徵本色茶十三萬六千四百八十篦改折之年每封徵折銀三錢其原不交茶者則徵價銀共五千七百三十兩有奇亦有不設引止於本地行銷者由各園戶納課共徵銀五百三十兩有奇四川有腹引邊引土引之分腹引行內地邊引行邊地土引行土司而邊引又分三道其行銷打箭爐者曰南路邊引行銷松潘廳者曰西路邊引行銷邛州者曰邛州邊引皆納課稅共課銀萬四千三百四十兩稅銀四萬九千一百七十兩各有奇雲南徵稅銀九百六十兩貴州課稅銀六十餘兩凡請引於部例收紙價每道以三釐三毫為率盛京直隸河南山東山西福建廣東廣西均不頒引故無課惟茶商到境由經過關口輸稅或略收落地稅附關稅造銷或彙入雜稅報部此嘉慶前行茶事例也厥後泰西諸國通商茶務因之一變其市場大者有三曰漢口曰上海曰福州漢口之茶來自湖南江西安徽合本省所産溯漢水以運於河南陝西青海新疆其輸至俄羅斯者皆磚茶也上海之茶尤盛自本省所産外多有湖廣江西安徽浙江福建諸茶江西安徽紅緑茶多售於歐美各國浙江紹興茶輸至美利堅寧波茶輸至日本福州紅茶多輸至美洲及南洋羣島此三市場外又有廣州天津芝罘三所洋商亦麕集焉蓋茶之性喜燠惡寒喜濕惡燥又必避慓烈之風最適於中國泰西商務雖盛然非其土所宜不能不仰給於我國用此駸駸遍及全球矣其業此者有總商有散商領引後行銷各有定域亦有兼行票法者如四川自乾隆五十二年開辦堰工茶票後名目甚繁然第行於産多或銷暢之區非遍及各州縣也惟甘商舊分東西二匱東匱多籍隸山西陝西西匱則回民充之自咸豐中回匪滋事繼以盜賊充斥兩匱均無人承課總督左宗棠勘定全省乃奏定章程以票代引遴選新商採運湖茶是曰南匱時領票止八百餘張嗣定為三年一案領票准加不准減計自光緒十三年至二十七年逐案加增三十年又於湖票外更行銷伊塔之晉票迄於宣統二年茶務日盛茶之與鹽辦法略相似惟鹽為歲入大宗故掌國計者第附於鹽而總核之其始但有課稅除江浙額引由各關徵收無定額外他省每歲多者千餘兩少祗數百兩或數十兩即陝甘四川號為邊引亦不滿十萬金咸豐以來各省次第行釐光緒十二年福建冊報至十九萬餘兩他省發亦漸多未幾收數復絀宣統三年豫算表所載茶稅特百三十餘萬而已順治初元定茶馬事例上馬給茶篦十二中馬給九下馬給七二年差御史轄五茶馬司時商人多越境私販番族利其值賤趨之若鶩兼番僧馳驛往來夾帶私茶出關吏不能詰戶部奏言陝西以茶易馬明有照給金牌勘合之例今可勿用但定價值至番僧所至如官吏縱容收買私茶聽巡按御史參究茶馬御史廖攀龍又言茶馬舊額萬一千八十八匹崇禎三年增解二千匹請永行蠲免並從之四年命巡視茶馬滿漢御史各一直隸河寶營地當張家口之西明時鄂爾多斯部落曾於此交易茶馬旋封閉至是戶部差理事官履勘以狀聞諭仍准互市七年以甘肅舊例大引篦茶官商均分小引納稅三分入官七分給商諭嗣後各引均由部發照大引例以為中馬之用又舊例大引附六十篦小引附六十七斤定為每茶千斤概准附百四十斤聽商自賣十三年以甘肅所中之馬既足命陳茶變價充餉十四年復以廣寧開成黑水安定清安萬安武安七監馬蕃命私馬私茶沒入變價原留中馬支用者悉改折充餉十八年從達賴喇嘛及根都台吉請於雲南北勝州以馬易茶康熙四年遂裁陝西苑馬各監開茶馬市於北勝州七年裁茶馬御史歸甘肅巡撫管理十九年以軍需急加福建茶課銀三百五十九兩至二十六年豁免並除湖廣新增茶稅銀時四川産茶多其用漸廣戶部議增引迄康熙末天全土司雅州邛榮經名山新繁大邑灌縣並有所增二十四年刑科給事中裘元佩言洮岷諸處額茶三十餘萬篦可中馬萬匹陳茶每年帶銷又可中數萬匹請遣員專管三十六年遂差部員督理茶馬事務四十年以陝西私茶充斥令嚴查往來民人凡攜帶私茶十斤以下勿問其馱載十斤以上無官引者論罪四十四年以奸商恃有前例皆分帶零運私販轉多飭照舊緝捕停差部員仍歸甘肅巡撫兼理自康熙三十二年因西寧五司所存茶篦年久浥爛經部議准變賣後又以蘭州無馬可中將甘州舊積之茶在五鎮俸餉內銀七茶三按成搭放尋又定西寧等處停止易馬每新茶一篦折銀四錢陳茶折六錢充餉至六十一年復增西寧莊浪岷州河州茶引各處所存舊茶悉令變賣雍正三年遂議自康熙六十一年始五年內全徵本色五年後即將舊茶變賣嗣是出陳易新總以五年為率四年定陝西行茶改令産茶地方官給發船票照商人引目茶數開明如於部引外搭行印票及附茶不遵定額者照私鹽律論查驗失察故縱均加處分八年命陝西商運官茶於舊例每百斤准附帶十四斤外再加耗茶十四斤又諭四川茶稅皆論園論樹夫樹有大小園有寬狹豈能一致若據以為額未得其平應照斤兩收納著該撫詳議尋議舊例每斤徵課二釐五毫今但徵四絲九忽有奇前後懸絶應酌減其半無論邊土腹引俱納銀一釐二毫五絲時川茶行銷引尚不敷於是復增各府州縣再行給發九年命西寧五司復行中馬法十年又命中馬應見發茶時安徽亦增引照四川例以餘引暫存司庫遇不敷時配給行運十三年復停甘肅中馬始定雲南茶法以七斤為一筒三十二筒為一引照例收稅乾隆元年令甘肅官茶改徵折色每篦輸銀五錢時西寧五司陳茶充牣令每封減價二錢刻期變賣二年以江西南昌等三十二州縣地不産茶四川成都彭灌等縣滯銷其引或停或減並豁除課銀七年免甘肅地震處之課乃命西寧五司徵本色八年免四川天全所缺乾隆七年前之羡餘截角成都彭灌等縣之未完銀兩十一年甘肅巡撫黃廷桂奏言西寧河州莊浪三司番民錯處惟茶是賴邇年以糧易茶計用茶六萬五千五百餘封易雜糧三萬八千一百餘石請著為例報可十三年定甘肅應徵茶封每年收二成本色八成折色並申明水陸各路運商驗引截角法推行安徽浙江四川雲南貴州二十四年從甘肅巡撫吳達善言命西寧五司茶封照康熙三十七年例搭放各營俸餉二十五年吳達善又言甘省茶課向為中馬設今其制已停在甘莊二司地處衝衢西河二司附近青海猶有銷路惟洮司偏僻商銷茶斤歷年俱改別司售賣而交官茶封仍歸洮庫往往積至數十萬封始請疏銷應將洮司額頒茶引改歸甘莊二司給商徵課俟洮司庫貯搭餉完日即行裁汰二十七年陝甘總督楊應琚復條上疏銷事宜四一官茶應改徵折價也查甘肅庫貯官茶向例如存積過多改徵折色今五司庫內自乾隆七年至二十四年已存百五十餘萬封經前撫臣吳達善奏准每封作價三錢搭放兵餉已搭放四十餘萬封在市肆官茶日多非十年之久不能全數疏銷且每年商人又增配二十四萬封商茶既多官茶益滯莫若將商交二成官茶五萬四千餘封照例每封徵折價三錢俟陳茶銷售將完再徵本色一商茶應准減配也查甘肅茶法商人每引交茶五十斤無論本折即係額課外有充公銀三萬九千餘兩亦係按年交納無殊正供至商人自賣茶封每引止應配正茶五十斤連附茶共配售三十餘萬封商人即以配售之茶納課經吳達善奏准增配以紓商力並無課項第茶封既增又有搭放兵餉之官茶勢致愈積愈多難免停本虧折今商人願每引止五封內應減無課茶十五萬八千三百十六封共止配茶四十萬九千四百四十封二成本色茶封既議改徵折價無庸配運一陳積茶封應召商減售也查各司俱有陳茶而洮司為多現每封四錢發售商民裹足請仍照原議每封定價三錢召商變賣一內地新疆應一體搭放也查乾隆二十四年吳達善奏准滿漢各營以茶封搭餉至新疆茶斤向資內地今官茶以沿途站車挽運無庸腳費其自肅州運至各處將腳價攤入茶本之內較之買自商賈尚多減省疏入議行二十九年裁甘肅巡撫茶務歸陝甘總督兼理三十四年以甘省庫貯官茶漸少復徵本色一成三十六年又以伊犁等處安插投誠土爾扈特等衆賞給茶封仍議照舊徵收二成三十八年四川總督劉秉恬奏准三雜谷等處土司買茶以千斤為率使僅敷自食不能私行轉售四川設邊引商人納稅領運於松潘等處銷售無論土司蠻商俱准赴邊起票販運嘉慶七年以陝西神木官銷茶引久經撥歸甘省商銷令豁除舊存羡餘名目四川教匪滋擾蠲除大寧廣元太平通江南江五州縣茶稅十年復免大寧太平通江巫山四縣廳稅課十七年以甘肅庫茶充羡定商納官茶全徵折色二十二年諭閩皖浙商人販運武夷松羅茶赴粵銷售向由內河行走近多由海道販運夾帶違禁貨物私賣飭令茶商仍由內河行走永禁出洋販運違者治罪茶入官道光三年諭那彥成奏定新疆行茶章程經戶部議覆烏里雅蘇台科布多磚茶不得侵越新疆各城售賣茲將軍果勒豐阿等奏此項磚茶由歸化城張家口請領部票納稅而來已六十餘年未便遽行禁止惟新疆既為官茶引地商茶究有礙官引令嗣後商民每年馱載磚茶一千餘箱前赴古城仍照例給票無許往他處售賣六年諭前因新疆各城運茶前將軍等請給引招商納課茲據慶祥等奏稱各城無殷實之戶若遽令承充官商必致運課兩誤著北路商民專運售雜茶並在古城設局抽稅即以所收銀抵蘭州茶商課俟試行三年再行定額至附茶仍由甘商運銷八年欽差大臣那彥成言甘肅官茶年例應出關二十餘萬封近來行銷至四五十萬封皆以無引私茶影射價復遞加每附茶一封售銀七八兩至十餘兩不等請嗣後每封定價阿克蘇不得過四兩喀什噶爾不得過五兩並於嘉峪關外及阿克蘇等處設局稽查詔如所請九年命甘肅茶務責成鎮迪道總司稽查奇臺縣就近經管咸豐三年閩浙總督王懿德奏請閩省商茶設關徵稅五年福建巡撫呂佺孫復言閩茶向不頒給執照徵收課稅自道光二十九年直隸督臣訥爾經額以閩商販運官私莫辨議由産茶之崇安縣給照經過關隘驗稅放行嗣因産茶不止一處商人散赴各縣購買繞道出販復經撫臣王懿德奏請自咸豐三年為始凡出茶之沙邵武建安甌寧建陽浦城崇安等縣一概就地徵收茶稅由各縣給照販運先後下部議准前歲因粵匪竄擾江楚茶販不前暫弛海禁各路茶販遂運茶至省不從各關經過不特本省減稅即浙粵江西亦形短絀臣履任後遍詢茶商獲利較前不啻倍蓰商利益厚正賦轉虧現粵匪未平軍需孔急衆商身擁厚資什一取盈初無所損且徵諸販客不致擾纍貧民完自華商無慮糾纏洋稅以天地自然之利為國家維正之供迥非加增田賦者比但閩茶不止數縣必在附省扼要處所設關增卡給印照以憑查核連界各省亦應一體設立俾免趨避請自咸豐五年始凡販運茶斤概行徵稅所收專發留支本省兵餉惟創行伊始多寡未能預定俟行一二年後再行比較定額自此閩稅始密然至十年猶未報部經部飭催乃按期奏報六年允伊犂將軍扎拉芬泰請伊犂産茶設局徵稅充伊犂兵餉之用十一年廣東巡撫覺羅耆齡奏請抽收落地茶稅同治元年飭下湖南湖北江蘇安徽江西浙江福建各督撫詳查本省産茶及設茶莊處所妥議章程具奏二年兩江總督曾國藩疏略言江西自咸豐九年定章分別茶釐茶捐每百斤除境內抽釐銀二錢出境又抽一錢五分有零外向於産茶及設立茶莊處所勸辦茶捐每百斤捐銀一兩四錢或一兩二錢不等填給收單准照籌餉事例彙齊請奬臣仍照舊章辦理本年據九江關署監督蔡錦青詳請遵照戶部奏准飭將鹽茶竹木四項統徵關稅已於三月起徵江西茶葉運至九江有華商洋商之分洋商既完子口半稅固不抽釐華商既納潯關正稅亦未便再令完釐臣即照部章於義寧州開辦落地稅惟原奏內大箱淨茶科則稍重分別核減參酌茶捐向章每百斤義寧州等處徵一兩四錢河口鎮徵一兩二錢五分概充臣營軍餉由臣刊發稅單護票委員經收或業戶自行完納或茶莊代為完稅領單至發販時統由茶莊繳銷稅單華商換給護票洋商即憑運照販至各處銷售除華商完納九江關稅洋商完納子口半稅外經過江西安徽各釐卡驗明放行如此辦理與戶部原奏總理衙門條約一一符合稅單雖係茶莊經手稅銀實為業戶所出洋商不得藉口於子口半稅而禁中國之業戶不完中國之地稅華商既免逢卡抽釐亦不至紛紛私買運照冒充洋商得旨允行五年戶部奏准甘省引滯課懸暫於陝西省城設官茶總店潼關商州漢中設分店商販無引之茶到陝呈報上色茶百斤收課銀一兩中色六錢下色四錢所收解甘彌補缺課七年議准歸化城商人販茶至恰克圖假道俄邊前赴西洋各國通商請領部照比照張家口減半令交銀二十五兩每票不得過萬二千斤十一年議准甘省積缺舊課仍追舊商召募之新商試新課其雜課養廉充公官禮四項緩徵十三年議准甘省仿淮鹽之例以票代引不分各省商販均令先納正課始准給票其雜課歸併釐稅項下徵收各項名色概豫刪除行銷內地者照納正課三兩外於行銷地各完釐稅每引以一兩數錢為度多不過二兩出口之茶則另於邊境局卡加完釐一次以示區別光緒十年戶部統籌財政於茶法略言據總理衙門單開光緒八九等年出口茶數多至萬九千餘萬斤查道光年間英國所收茶稅約每百斤收銀五十兩而我之出口稅僅納二兩五錢不及十一擬照甘肅茶封之例每五十斤就園戶徵銀三錢增課既多洋人無所藉口或照寧夏延榆綏等處茶引每道徵銀三兩九錢之例於産茶處所設局驗茶發給部頒茶照每照百斤徵銀三兩九錢經過內地關卡另納釐稅驗照蓋戳放行不准重復影射所有茶照按年豫行赴督請領原照一年後作廢或於産茶處所驗茶發給部照既完課三兩再倍收銀三兩九錢前後共徵七兩八錢一切雜費均豫豁除惟於各海關及邊卡凡應納洋稅仍照向章完納若在內地行銷販運無論經過何省何處釐卡關榷均免再徵則改釐為課改散為總既便稽查復免侵漁惟園戶及販商若何防其走漏應令各省參酌定章覆奏辦理十二年以山西商人在理藩院領票詭稱運銷蒙古地方實私販湖茶侵銷新疆南北兩路一票數年循環轉運往往逃釐漏稅經部奏准嗣後領票注明不准販運私茶字樣如欲辦官茶即赴甘肅領票繳課完釐倘復運銷私茶查出沒官是時泰西諸國嗜茶者衆日本印度意大利豔其利厚雖天時地質遜於我國然精心講求種植之法所産遂多蓋印度種茶在道光十四年至光緒三年乃大盛錫蘭意大利其繼起者也法蘭西既得越南亦令種茶有東山建吉富華諸園美利堅於咸豐八年購吾國茶秧萬株發給農民其後愈購愈多歲發茶秧至十二萬株足供其國之用故我國光緒十年以前輸出之數甚巨未幾漸為所奪印度茶往英國者歲約七十三萬二千石價約二千四萬兩吾國茶往者八十九萬八千石價約千八百六十八萬兩印度茶少於華而價反多逮二十二年我國運往乃止二十一萬九千四百餘石而已日本之茶多售於美國亦有運至我國者光緒十三年我茶往日本者萬二千餘石而彼茶進口萬六千餘石其專尚華茶取用宏多者惟俄蓋自哈薩克浩罕諸部新屬於彼地加廣人加衆需物加多而茶尤為所賴光緒七年定約允以嘉峪關為通商口岸而往來益盛十年後我國運往之茶居全數三之一十三年併雜貨計出口價九百二萬兩有奇而進口價僅十一萬八千餘兩凡輸自我者八百九十萬兩然十二年茶少價多十三年茶多價少華商已有受困之勢厥後亦兼購於他國用此華茶之利驟減蓋我國自昔視茶為農家餘事惟以隙地營之又採摘不時焙製無術其為他人所傾勢所必至三十三年茶葉公會以狀陳於度支部稅務司亦以茶稅減少為言於是命籌整理之策宣統初農工商部遂有酌免稅釐之議漢口福州皆自外國購入制茶機器且由印度聘熟練教師江西巡撫又籌發貸與茶戶自是銷入歐洲及北阿非利加洲者乃稍暢旺夫吾國茶質本勝諸國往往澀味中含有香氣能使舌本回甘泰西人名曰膽念他國所産鮮能及此故日本雖有茶必購於我荷蘭使臣克羅伯亦言爪哇印度錫蘭茶皆不如華茶遠甚然則奬勵保護無使天然物産為彼族人力所奪是不能不有望於今之言商務者礦政清初鑒於明代競言礦利中使四出暴斂病民於是聽民採取輸稅於官皆有常率若有礙禁山風水民田廬墓及聚衆擾民或歲歉穀踊輒用封禁世祖初開山東臨朐招遠銀礦順治八年罷之十四年開古北喜峯等口鐵礦康熙間遣官監採山西應州陝西臨潼山東萊陽銀礦二十二年悉行停止並諭開礦無益地方嗣後有請開採者均不准行世宗即位羣臣多言礦利粵督孔育珣粵撫楊文乾湘撫布蘭泰廣西提督田畯廣東布政使王士俊四川提督黃廷桂相繼疏請開礦均不准行或嚴旨切責十三年粵督鄂彌達請開惠潮韶肇等府礦下九卿議行上以妨本務停止蓋粵東山多田少而礦産最繁土民習於攻採礦峒所在千百為羣往往聚衆私掘嘯聚剽掠故其時粵東開礦較他省尤為厲禁乾隆二年諭凡産銅山場實有裨鼓鑄准報開採其金銀礦悉行封閉先是五年允魯撫朱定元請開章丘淄川泰安新泰萊蕪肥城寧陽滕嶧泗水蘭山剡城費莒蒙陰益都臨朐博山萊陽海陽各州縣煤礦而藁城知縣高崶請自備資開嶧滕費淄沂平陰泰安銀銅鉛礦則禁之然貴州思安之天慶寺鎮遠之中峯嶺陝西之哈布塔海哈拉山甘肅之扎馬圖敦煌沙洲南北山伊犂之皮𩹉沁山古內雙樹子烏魯木齊之迪化奎騰河呼圖壁瑪納斯庫爾喀喇烏蘇條金溝各金礦貴州法都平遠達摩山雲南三嘉麗江之回龍昭通之樂馬各銀礦相繼開採嘉慶四年給事中明繩奏言民人潘世恩蘇廷祿請開直隸邢臺銀礦上謂國家經費自有正供潘世恩蘇廷祿覬覦礦利敢藉納課為詞實屬不安本分命押遞回籍明繩下部議六年保寧以請開塔爾巴哈台金礦明安以請開平泉州銅礦均奉旨申飭道光初年封禁甘肅金廠直隸銀廠蓋其時歲入有常不輕言利惟雲南之南安石羊臨安箇舊銀廠歲課銀五萬八千餘兩其餘金礦歲至數十兩銀礦歲至數千兩而止又旋開旋停興廢不常賦入亦鮮銅鉛利關鼓鑄開採者多邀允准間有蠲除課稅者廣東自康熙五十四年封禁礦山至乾隆初年英德陽春歸善永安曲江大埔博羅等縣廣州肇慶兩府銅鉛礦均行開採百餘年來雲貴兩湖兩粵四川陝西江西直隸報開銅鉛礦以百數十計而雲南銅礦尤甲各行省蓋鼓鑄鉛銅並重而銅尤重秦鄂蜀桂黔贛皆産銅而滇最饒滇銅自康熙四十四年官為經理嗣由官給工本雍正初歲出銅八九十萬不數年且二三百萬歲供本路鼓鑄及運湖廣江西僅百萬有奇乾隆初歲發銅本銀百萬兩四五年間歲出六七百萬或八九百萬最多乃至千二三百萬戶工兩局暨江南江西浙江福建陝西湖北廣東廣西貴州九路歲需九百餘萬悉取給焉礦廠以湯丹碌碌大水茂麓獅子山大功為最寧臺金叉義都發古山九度萬象次之大廠礦丁六七萬次亦萬餘近則土民遠及黔粵仰食礦利者奔走相屬正廠峒老砂竭輒開子廠以補其額故滇省銅政纍葉程功非他項礦産可比道光二十四年詔雲南貴州四川廣東等省除現在開採外如尚有他礦願開採者准照現開各廠一律辦理二十八年復詔四川雲貴兩廣江西各督撫於所屬境內確切查勘廣為曉諭其餘各省督撫亦著留心訪查酌量開採不准託詞觀望至官辦民辦商辦應如何統轄彈壓稽查之處朝廷不為遙制一時礦禁大弛咸豐二年以寬籌軍餉招商開採熱河新疆及各省金銀諸礦三年詔曰開採礦産以天地自然之利還之天地較之一切權宜弊政無傷體制有裨民生當此軍餉浩繁左藏支絀各督撫務當權衡緩急於礦苗豐旺之區奏明試辦時軍興餉乏當時開採者僅新疆噶爾蒙古達拉圖噶順紅花溝之金礦直隸珠窩山遍山線室溝土槽子錫蠟片牛圈子溝蒙古哈勒津羅圈溝庫察山長杭溝之銀礦新疆迪化羅布淖爾三個山之銅錫礦數處同治七年吉林請開火石嶺子等處煤礦以伏莽未靖格部議不果行十三年以滇礦經兵燹久廢諭飭開辦從滇督岑育英請也是年海防議起直隸總督李鴻章船政大臣沈葆楨請開採煤鐵以濟軍需上允其請命於直隸磁州福建臺灣試辦光緒八年兩江總督左宗棠亦言北洋籌辦防務製造船炮及各省機器輪船所需煤鐵最為大宗請開辦江蘇利國驛煤鐵報聞嗣是以次修築鐵路煤鐵益為當務之急於是煤礦則吉林大石頭頂子亂泥溝半拉窩雞溝二道河陶家屯石牌嶺黑龍江太平山察漢敖拉卡倫直隸開平唐山內丘縣之上坪永固磁窰溝南陽寨臨城縣之岡頭石固膠泥溝楊家溝新莊竹壁牟村焦村宣化府之雞鳴玉帶八寶寺山阜平縣灰鋪村曲陽縣白石溝野北村張家口廳海拉坎山馬連圪達宛平縣青龍澗碑碣子承德府榆樹溝奉天海龍府遠來義和進寶玉盛永順永益萬利人和同德順發錦州府大窰溝錦西廳碭石溝本溪縣王干溝興京廳蜜蜂溝遼陽州窰子峪江西萍鄉永新餘干山東嶧縣安徽貴池廣德繁昌東流涇縣湖北荊門河南禹州山西平定鳳台浙江桐廬餘杭江蘇上元句容湖南湘鄉祁陽廣西富川賀縣奉議恩陽南寧那坡陝西白水澄城同官宜君邠州隴州淳化鐵礦則直隸遷安縣灤州湖北大冶廣西永寧州江西永新縣雲南開廣兩府貴州青溪皆先後開採而秦晉商民零星開採尤難悉數二十二年詔開辦各省金銀礦廠自光緒初年開直隸窯溝銀礦甘肅西寧甘涼黑龍江漠河觀音山奇乾河各金礦外無聞焉自明令頒行而後金礦則直隸之平泉州屬轉山子建昌縣屬金廠溝撫寧縣屬雙山子濼平縣屬寬溝豐寧縣大營子西碾子溝翁牛特旗之紅花溝水泉溝拐棒溝而遷安縣所産尤旺奉天之鳳凰安東遼陽通化寬甸懷仁鐵嶺開原通化海城錦縣蒙古之賀連溝大小槽碾溝除虎溝朱家溝板橋子珠爾琥珠克勒司布恭特勒基哈拉格囊圖奎騰河圖什業圖汗四川之冕溝湖南之平江浙江之諸暨黑龍江之黑河新疆之和闐焉耆銀礦則四川之天全盧山大穴山頭皆報明開採而銅錫鉛銻石油硫磺雄黃等礦亦接踵而起銅則雲南迤東湯丹茂麓正廠六子廠十一迤西回龍得寶正廠八子廠九楚雄永北及雲武所屬萬寶雙龍又永安順寧臨安開化曲靖各廠均招商承採而江西贛州陝西鎮安湖南綏寧新疆拜城庫車亦有銅廠錫則廣東儋州廣西南丹土州富川賀縣鉛則湖南常寧湘鄉臨武四川會理浙江鎮海奉化象山寧海太平銻則湖南益陽邵陽新化沅陵慈利湘鄉祁陽新安蝄浦貴州銅仁四川秀山廣東曲江防城乳源廣西南太泗鎮陵陽都石油則陝西延長甘肅玉門新疆庫爾喀喇烏蘇硫磺則山西陽曲奉天遼陽錦州雄黃則湖南慈利或官辦或商辦或官商合辦或用土法或用西法九年詔各省煤礦招商集股舉辦自是雲南四川均設招商及礦務局貴州設礦務公商局山西設礦務公司粵東瓊州之銅礦浙江寧波之鉛礦皆率招商集股開辦開辦歷數十年惟開平萍鄉之煤大冶之鐵規模宏遠次則平江之金益陽之銻常寧之鉛猶為民利漠河金礦所産雖富歲解部銀僅二十萬兩滇銅自十三年命唐炯督辦歲運京銅不過百餘萬各省鼓鑄猶以重直購洋銅鐵産為漢陽廠鍊鋼造軌略供輪路之需粵桂晉出鐵雖饒以提鍊不精國內製造仍多購自英廠二十四年詔設礦務鐵路總局於京師以王文韶張蔭桓主之奏定章程二十二准華商辦礦假貸洋發及華洋合股設立公司自是江西萍鄉煤礦則借德發湖北大冶鐵礦則借日本發浙江寶昌公司則借義發直隸臨城煤礦則借比發當其議定合同於抵押息金外輒須延聘礦師甚者涉及用人管理至直隸井陘安徽宣城煤礦山西盂平澤潞平陽四川江北煤鐵礦新疆塔城直隸霍家地廠子溝金礦廣西上思貴州正安鉛鐵福建邵武建寧汀州直隸八道河奉天尾明山及吉林新舊礦均華洋合辦一經訂約時生轇轕若福公司之於晉礦其尤甚者也二十四年河南豫豐公司以其專辦懷慶左右黃河以北各礦之權山西商務局以其專辦盂平澤潞平陽煤鐵各礦之權同時讓與辦理一公司壟斷兩省礦務更議修鐵道自晉訖汴因礦及路利權損失爭持三年始允合辦汴既侵攘華官主權晉復干涉人民開採全晉紳民堅持廢約遲之又久始以銀二百七十餘萬贖回他如陝西延長四川富順巴萬石油礦湖南常寧龍王山湖北興國龍角山礦均因商民私相授受釀成交涉自議訂膠濟東清路約附路十三里內華人無開礦權而開平煤礦漠河觀音山金礦復因內亂為外人所侵占開平煤礦自光緒元年直隸總督李鴻章集官商之力經營二十年效力大著二十六年拳匪亂後洋員德璀琳因督辦張翼委其保護與礦師胡華私立賣約而張翼亦即簽押移交轉以加招洋股中外合辦奏聞由是而唐山西山半壁店馬家溝無水莊趙各莊林西各礦秦皇島口岸地畝附屬之承平建平永平金銀礦悉操於英公司嚴詔責令收回赴英控訴卒未就緒三十四年籌辦灤州煤礦英公司阻撓之乃劫為營業聯合之法合設開灤總局觀音山金礦亦因拳亂為俄人占據三十二年始以俄銀萬二千盧布贖回二十八年外務部改定礦章凡華洋商人得一體承辦礦務惟必稟部批准乃為允行之據是年皖撫聶緝規許英人凱約翰承辦歙銅陵大通寧國廣德潛山礦産嗣以專辦銅陵之銅官山訂約定期百年占地三十八萬四千餘畝皖中紳民合力爭之始以銀四十萬兩贖回自辦法人彌樂石亦於是年以勘辦全滇礦務請於滇督及外務部皆拒之仍獲澄江臨安開化雲南楚雄元江永北等府廳州礦權以去繼是英商立樂德以合辦東昭兩府金銀礦不獲遂援彌樂石例索廣南曲靖麗江大理順寧普洱永昌七府礦亦堅拒未允一時舉國上下咸以保全礦産為言由是蜀設保富公司華洋承辦川省礦務購地轉租事宜屬之閩設商政局旋奏設礦務總公司凡請辦各礦場查核准駁之權屬之山西保晉公司安徽礦務總局類能集合殷富鳩資開辦湘鄂則於所屬礦地勘明圈購以杜私售二十五年江南籌辦農工礦路各學堂兩湖復籌設高等礦業學堂三十一年商部以洋商私占礦地礦山疏請申明約章以維權限尋奏設各省礦政調查局以勘明全國礦産嚴禁私賣為先務鄂督張之洞條上礦務正章七十四附章七十三蓋自二十四年以來礦章屢易每因礦務齟齬洋商輒引為口實二十九年商約大臣呂海寰與各國議訂商約許以開採礦産之利但必須遵守中國礦章而中國礦章則比較各國通行者為之準則特詔張之洞擬定乃取英美德法比利時西班牙礦章參互考證區別地面地腹釐定礦界礦稅分晰地股銀股暨華洋商限制至周尤注重於中國主權華民生計地方治理閲數年乃成下部議行中國礦章始具云
