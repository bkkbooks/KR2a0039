彼關者三十六月內不再徵如轉入各口另納正稅土貨在此關納稅復轉彼關只徵復進口稅如轉入各口另徵正稅入內地仍納子口稅一進出口貨到關逾十八時不報驗日罰五十兩惟不得過二百兩報有漏捏貨並沒官餘同前約十三年允法人於廣西之龍州雲南之蒙自及蠻耗開埠通商並減洋貨進口稅十之三出口稅十之四尋改蠻耗為河內並添雲南之思茅口岸由通商各口運土貨前往四口時徵出口十成正稅到四口照十分減四徵復進口半稅又定葡約其稅鈔及罰例均視上年法約是年設拱北關於澳門九龍關於香港由粵海關監督改臺南淡水兩稅歸臺灣巡撫監督十五年設鎮南蒙自二關十六年設重慶關二十年開西藏之亞東關允英通商除禁運貨物外自開關日始免進口稅五年限滿再定稅章照納又允由蠻允盞西兩路販運各貨限六年內減進口稅十之四二十一年設思茅關及猛烈易武二分關歸思茅同知兼理二十二年定日本商約一進出口貨視各國例只輸進口或出口稅一已進口貨再運各口不論貨主及運貨係何國人及何國船所有鈔稅釐金雜派各項一概豁免一運貨入內地再納子口稅係免稅者按值百抽二五一出口土貨完正稅子稅後限十二月運往外國如係禁運出外洋之物出口時只完正稅一洋貨已完進口稅三年內復運出口不再徵一船鈔視各國例是年設杭州蘇州及沙市三關明年設梧州三水二關並甘竹江門二分關改定英人長江通商章程一在長江貿易輪船由上海稅務司給專照年換一次或在漢口及宜昌換領亦可船鈔在給照之關交納違者照罰再犯繳銷專照一撤銷出口正稅復進口半稅同時完納之例有專照江輪出口及復進口稅照各口例在裝貨起貨之口分次完納至裝貨撥貨卸貨亦如各口例二十四年設嶽州關及江海之吳淞分關明年設膠州關與德會定徵稅辦法一青海設關應揀派德人充稅務司一海運進口之貨不徵稅若膠州界口運赴內地徵進口稅惟無海關准單不准出膠州界一土貨陸運入租界再水運他口徵出口稅惟租界內産土貨並土産及海運入口之物料製成各貨出口時不徵一土貨進口復運內地照約納稅一土貨納出口稅復運他口納半稅又定韓暨墨國稅鈔及各費悉視海關例是年設金陵關又設福海關於三澳二十六年設騰越關及蠻允弄璋二分關二十七年定常關距口岸在五十里內稅由洋關兼徵二十八年設秦皇島分關先是商約大臣盛宣懷聶緝規等言稅務司赫德籌擬洋貨進口稅援照洋藥稅釐並徵之法核估時值按正稅子口稅七二五統加釐金一倍為值百抽十五由海關並徵以免各處釐局留難紛雜貨可暢銷洋商或可允從並擬出口土貨向完半稅者改完釐金以抵洋貨釐捐改歸海關並徵之數於各省釐金亦無所損上以此事利害出入關係甚大下南北洋大臣各督撫參酌各省情形妥議具陳至是始與英定裁釐加稅之約一約發照行時中國允除現有各常關外向設各釐卡及抽類似釐捐之關概行裁撤一英國允於進口洋貨增至切實值百抽五加一額外倍半之稅以抵撤釐金子口稅及各項稅捐至土貨出口稅總數不得逾值百抽七五之數一現有常關仍舊存留其有海關而無常關及沿海沿邊非通商口岸處均可添設常關如新開口岸應設海關者可併設常關一民帆各船運貨所納出入口稅不得少於輪船進口正稅及添加稅之總數土貨運出至第一常關照海關例徵出口加稅給照單限一年內無論經何關出口不再徵如運出各租界外銷售應納銷場稅一土貨運出除正稅外加徵半稅以為裁撤釐捐之抵補至絲斤出口正稅不得逾值百抽五之數一向不出洋之貨於銷售處徵銷場稅凡民船運至口岸之土貨將銷售本地者無論貨主何國均徵銷場稅惟不在租界內徵收一華洋各商在內地用機器紡織之紗布只納出場稅餘概豁免凡機器織成類似之洋貨視此惟漢陽大冶鐵廠及國有免稅各廠與後設之製造局船澳等廠所出物件不在此例尋與美日大西洋各國均定此約卒以事費調查迄未能實行也二十九年與俄協定北滿稅關試辦章程一鐵路運貨減三之一納稅指定界限按車站大小四面各距十里或五里三里不等如運出指定界限外應補足正稅並照運貨入內地章程辦理一鐵路運貨減價此中俄特約除俄貨外各國貨經東省鐵路運入者准此一章程稅項有應更改者俟一年再商定又定通商進口善後章程一進口洋貨稅則不載者照值百抽五例按市價估貨以市平合足關平並扣除使費方為貨物實價一貨未報關已售於華商即視合同價值之總數為市價一由海關估定之價與該商不合即由海關與該商本國領事並領袖領事各派一人公同斷定若查出該商所報每百少至二十四兩按估定價值徵正稅並按所報應完之正稅罰繳四倍一洋船專載免稅之米糧等仍稅鈔是年設澳門分關三十年與德會定青島設關徵稅辦法附件一無論華洋輪船行駛內港應領關牌一年而易初次納牌費十兩換領只納二兩每四年納鈔一次明年與德修改青島徵稅辦法一改青島口岸概行免稅惟擇定稅界內一區為無稅地餘均起徵一無稅區外製成各貨出口納稅不得逾運原料應完之稅數改三水之江門為正關三十三年設南寧大連二關又設安東關及大東溝分關三十四年設濱江關及滿洲里綏芬河二分關宣統元年設璦琿三姓二分關二年設琿春關及延吉分關三年更定東海關各口稅則為值百抽二五再收一二五內地捐所有規費概行裁免自光緒二十二年裁撤臺南淡水漢城各關外為關二十七宣統三年續增南寧梧州三水嶽州福海吳淞金陵膠海騰越江門安東大東溝大連濱江滿洲里綏芬河璦琿三姓琿春延吉等為關四十七先是土藥各稅列入進口同治十二年始列專發合計洋關歲徵各稅咸豐末年只四百九十餘萬同治末年增至千一百四十餘萬光緒十三年兼徵洋藥釐金增為二千五十餘萬三十四年增至三千二百九十餘萬宣統末年都三千六百十七萬有奇為歲入大宗云釐金抽捐創始揚州一隅後遂推行全國咸豐三年刑部右侍郎雷以諴治軍揚州始於仙女廟等鎮創辦釐捐是年蘇常疊陷丁漕無收乃設釐局於上海藉資接濟又設江北釐捐歸大營糧臺經理五年江西設六十五局卡湖北設四百八十餘局卡湖南亦設城內外總分各局江蘇揚常鎮各府屬添設小河口普安新港三江營荷花池五局御史宗稷辰言大江南北設卡過多收捐太雜刑部左侍郎羅惇衍亦言泰州仙女廟釐局官紳辨兵刁難勒索上令酌量裁併嚴禁查辦六年盛京抽收商貨及糧石捐值百取一吉林亦如之烏魯木齊之吐魯番亦抽收棉花釐金七年設湖北釐金總局八年定豫省釐捐除水煙藥材茶葉外餘概不抽收並裁撤陝州荊子關及沿河各局卡是年福建廣西均設局卡抽收貨釐九年登萊青三府屬海口設局抽釐山西設籌餉局收行商藥稅及百貨釐捐於各隘口設七總卡及各分卡十年以張家口辦理釐金不善激成事變文武各員俱獲嚴譴兩江總督曾國藩以湘軍援鄂請於長沙設東征局克復一處即酌添局卡以濟軍儲凡貨物皆於本省釐金外加抽半釐允之是時江北八里鋪及廣東韶關肇慶府俱設局卡抽釐十一年改山西行商藥釐為稅安徽抽收釐金設立正卡省局所屬四皖南及淮北局屬各三並設分卡分巡五十九貴州亦設貨釐局於川楚鄰近之區時各省釐局過多上恐有纍商民命除各省通衢要口外其餘局卡概行裁撤同治元年以廣東官紳辦理釐捐營私病民特命三品京堂晏端書駐扎韶關督辦廣東釐金四川總督駱秉章亦以粵省釐捐積弊為言上誡端書以釐捐原出於不得已總期有益軍餉無戾民情御史丁紹周言釐捐各委員徒事中飽民怨沸騰命裁革各委員統歸地方官管理其通都大邑釐捐事繁著派道府等官辦理並照部章分晰開載榜示通衢是年設江寧大勝關釐卡河南禹州陝州暨河內縣清化鎮均設藥材釐金分局禹州並抽收百貨移設衢州府牙釐總局於浙江省城除杭州金華嚴州三府外餘八府均設分局分卡設周口三河尖兩釐稅局二年幫辦揚州軍務漢軍統領富明阿言𩹉下河一帶南北糧臺設立捐卡百餘處有一處而設數卡一卡而分數局每月局用少者二百金多者至千餘金委員既繁局費尤濫上以江北如此他省可知嚴飭各督撫歸併裁革遴委賢能地方官經理尋湖北巡撫嚴樹森言胡林翼創辦湖北釐金倣劉晏用士類不用吏胥之法歷久著有成效若改歸地方官諸多窒礙並臚陳八弊請仍舊章又言湖北釐金年收百三十四萬全賴分設小局稽查偷漏大局之徵收始旺零卡勢難議裁且以一省之財力協濟數省軍餉多藉資釐金輕議更張恐入款頓減均允之是年江北設釐捐總局裁併各卡留存大勝關等二十六卡江蘇亦設牙釐捐總局裁併各卡留存蘇城等十四卡浙江定百貨釐捐值百抽九浙東兩起兩驗間卡抽收貨值千文起卡抽三十驗卡減半捐足兩起兩驗不重徵浙西則一起一驗由第一卡併徵餘皆驗放三年直隸設天津雙廟卡淮南亦設卡抽收鄰私釐金浙江定絲斤捐河南以捻匪肆擾停止禹州釐捐尋復之時湖廣總督官文言直隸山東山西河南陝甘雲貴廣西等省釐金不多軍務告竣即可議撤其餘東南各省釐金不可驟裁留作善後之費曾國藩則以江寧克復請停廣東釐金上恐餉項不繼未之許也四年撤湖南東征局改江北總局為金陵釐捐總局福建設稅釐總局徵收百貨及茶釐六年湖北裁存釐局分卡八十六湖南合併分局統名釐金鹽茶總局七年定釐金報部照兩淮鹽釐排式年分兩次時軍務漸平督撫臺諫屢以裁撤釐金為言上飭各省酌留大宗裁去零星分局於是湖北又裁去五十四局卡浙江裁併十六卡八年甘肅開百貨及鹽茶釐捐定廣東省城及佛山江門陳村各繁盛處所補抽百貨坐釐由商承辦九年廣西減釐改徵西稅十年用御史黃槐森言禁革廣東釐局幫費名目並裁汰吏胥直隸改天津府捐輸義館為百貨釐捐局設東河西河南河海河四分卡並於東關設洋藥釐捐局十三年停止山海關之臨榆縣釐局雲南省城設牙釐總局各府屬設分局二十三及各井鹽釐局光緒元年浙江復裁併十四卡存留六十五卡免湖北米穀釐金二年安徽規復蕪湖鳳陽兩關分別裁撤釐卡永免湖南境內運售米穀釐金販運出境者仍於首卡完釐一次三年山西大祲商貨滯銷裁併各路添設之分卡吉林於雙城堡農安城抽收七釐貨捐四年貴州貨釐減收二成五七年給事中劉瑞祺言釐捐無裨國計飭各督撫酌量截留山西以釐金減收復設各分卡八年江揚裁撤分卡一巡卡二滬釐局裁併布貨捐局閩廣三幫雜貨捐局暨東溝四釐卡並撤古山水橋巡卡明年滬局又裁東溝大涇兩巡卡十年陝西裁留二十八卡十三年貴州增設二十五分局先是各省局卡林立擾民病商屢經奉飭裁併而江西一省尚多至七十餘局御史鄭思賀又以為言核實刪減二十三年戶部疏言各省釐局中飽弊在承辦之員不肯和盤托出各省例不應支而非得已者輒於釐稅收發提留濟用所謂外銷者也院司類有存案原非自謀肥己然既有外銷之事即有匿報之款否則從何羅掘無惑乎人言藉藉僉謂各省實收之數竟數倍報部之數現在中飽之弊已諭飭各將軍督撫認真整頓自不至仍前泄沓惟外銷之數若不和盤托出臣部總握度支歲入歲出終於無可句稽即外銷發目不能驟議全裁亦宜咨報臣部權衡緩急內外一氣共濟時艱擬准將外銷最要之發切實聲明量豫留支使無窘公用此後再有隱匿甚或巧立名目謬稱入不敷出則典守之官不能辭咎上下大學士及廷臣議越二年上從諸臣議飭各將軍督撫詳細稽核究竟裁去陋規中飽之數若干酌量提歸公用之數若干勒限奏明其外銷發項應准臚列報部以昭核實所有水陸總分各局卡應如何因地制宜官紳並委著體察情形辦理二十九年江西巡撫柯逢時言江西釐局積弊過深改辦統捐凡納捐貨物黏貼印花概不重徵報聞宣統元年四川以實行禁煙籌抵土藥各稅釐加倍徵收肉釐允之二年貴州三江釐局改辦木植統捐局陝西百貨釐捐亦改照統稅辦法減為二十七局洋藥道光初英吉利大舶終歲停泊零丁洋大嶼山等處名曰躉船凡販鴉片煙至粵者先剝赴躉船然後入口省城包買戶謂之窰口議定價值同至夷船兌價給單即雇快艇至躉船憑單取土其快艇名快蟹械炮畢具行駛如飛兵船追捕不及灌輸內地愈禁愈多各項貨物亦多從躉船私售紋銀之出洋關稅之偷漏率由於此疊經諭飭驅逐嚴拿而躉船停泊快蟹遞私如故十八年鴻臚卿黃爵滋言自煙土入中國粵奸商句通巡海辨兵運銀出洋運土入口查道光初年歲漏銀數百萬十四年以前歲漏二千餘萬近年歲漏三千餘萬此外各海口合之亦數千萬年復一年伊於胡底耗銀之多由於販煙之盛販煙之盛由於食煙之衆實力查禁宜加重罪名上韙其言特命林則徐為欽差大臣赴粵查辦明年截獲躉船煙土二萬八百八十餘箱焚之時定禁煙章程凡開設窰口及煙館與興販吸食無論華洋均擬極刑咸豐七年閩浙總督王懿德等始有軍需緊要暫時從權量豫抽捐之請朝旨允行八年與法定約向來洋藥不准通商現稍寬其禁聽商貿易每百斤納稅銀三十兩只在口銷售離口即屬中國貨物准華商運往內地法商不得護送嗣與各國定約皆如之九年上以洋藥未定稅前地方官多有私收情弊現既議定稅章自應一律遵辦上海為各商薈萃之區尤宜及早奉行不得以多報少藉肥私囊兩江總督何桂清請減輕洋藥稅下廷議尋議洋藥稅則各省關均照辦江蘇何得獨異所徵稅銀每三月報解不准留支至洋藥釐捐與關稅有別原定銀二十兩毋庸再加十兩惟不得以洋稅抵作釐捐允之雲貴總督張亮基言滇省向無洋藥上命先將所産土藥分別徵收稅釐不得以洋藥混土藥十一年上海新行洋藥稅章程而普魯斯領事密迪樂以洋商既定進口稅重徵華商有礙洋商貿易上曰洋商進口華商出口兩稅各不相礙不允其請時稅務司赫德言洋藥抽稅今昔情形不同收稅愈重則走漏愈甚上以其言可采下所司酌議施行光緒初元廣東招商包收洋藥捐年認交四十二萬元五年限滿每年遞增二萬元二年與英定約洋藥入口由官稽查封存棧房或躉船俟售賣時照則納稅並令購者輸納例稅以防偷漏其數由各省酌定六年廣東新商接辦洋藥捐年認交九十萬元仍五年為限七年大學士左宗棠言禁食鴉片宜先增稅洋藥百斤擬徵稅釐百五十兩土藥價低准依洋藥推算上命將軍督撫及海關監督各就情形妥議以聞尋直隸總督李鴻章言洋藥既難驟禁只可先加稅釐煙價增則吸者漸減未始非徐禁示罰之意惟釐稅太重恐偷漏愈多亦須通盤籌計查洋藥由印度先到香港然後分運各口奸商即於該港私相授受檢閲貿易總冊同治十三年至光緒四年到港洋藥每年八萬四千至九萬六千餘箱運銷各口有稅者只六萬五千至七萬一千餘箱五年到港十萬七千餘箱運銷各口有稅者只八萬六千餘箱年計私銷二萬數千箱加捐易辦偷漏難防擬於洋藥每百斤正稅三十兩外加徵八十兩統計釐稅百一十兩土藥不論價之高下每百斤徵四十兩帝用其議又以洋藥來自英商命出使大臣曾紀澤與英確商至九年始如前議定約併在進口時輸納十年定不分洋土藥給華商行坐部票例其行票每限十斤斤捐銀二錢經過關卡另納稅釐無票貨沒官其行店坐票無論資本大小年捐二十兩換票一次無票不得售賣十一年定洋藥入口由官驗明封存俟每箱百斤完納正稅三十兩釐金八十兩方允出運十三年與葡定議在澳門協助中國徵收運往各口之洋藥稅釐一如英香港辦法二十八年定洋藥稅釐並徵仍照現行約章嗣後應以釐金作為加稅又定英商莫啡鴉之禁其為醫藥用者進口仍照則納稅俟領海關專單方准起岸違者沒官是年裁浙江洋藥釐金局歸海關釐稅併徵三十二年德宗鋭意圖強命限十年將洋藥一律革除淨盡又以鴉片為生民之害禁吸尤必禁種為清源辦法務令遞年減種統限十年將洋土藥盡絶根株是年開廣西巡撫柯逢時缺賞侍郎銜督辦各省土藥統稅設總局於湖北各省並設分局逾年以洋土兩藥稅釐為歲入巨發既嚴行禁斷應預籌的款以資抵補初定莫啡鴉進口每兩徵稅三兩至是以既准醫藥需用減輕照百貨例值百徵五宣統二年度支部奏言各省土藥減收業將浙江福建江蘇安徽山東山西土藥統稅分局先後裁撤其兩湖陝甘兩粵略有收數自應及時收束惟稅局之應否裁撤以有無稅項為斷而統稅之應否停徵以有無産土為衡於是分遣司員派赴各省調查明年又奏言現在擬裁土藥統稅分局尚未據各省議定辦法派員接收而洋藥進口已與英定約稅釐並徵每百兩增收二百五十兩土藥亦須同時比例加稅查土藥價值不及洋藥三分之二以徵為禁稅則無妨略重即照洋藥稅推算定土藥百斤加徵二百三十兩凡未禁運及本産本銷地方即按新章徵收從之時與英議定禁煙遞減已滿三年如於未滿之七年期內土藥禁絶則洋藥亦禁進口以洋藥加稅實行停止各項捐收會計順治初既除明季三餉南服諸省尚未底定歲入本少而頻年用兵經營四方供億不資歲出尤巨至九年海宇粗定歲入則地丁等款徵銀二千一百二十六萬兩有奇鹽課徵銀二百一十二萬兩有奇關稅等銀一百餘萬兩米麥豆之徵本色者五百六十二萬石有奇歲出則諸路兵餉需千三百餘萬兩王公官俸各費需二百餘萬兩各省留支驛站等款三百餘萬兩其後兵餉增至二千四百萬兩地丁亦至二千五百餘萬兩康熙之初三藩叛逆歲入地丁等款自二千六百餘萬減至二千一百餘萬二十一年三藩削平歲入地丁等銀復至二千六百三十四萬兩有奇鹽課銀亦至二百七十六萬兩有奇關稅等銀二百餘萬兩米麥豆之徵本色者為六百三十四萬石有奇雍正初年整理度支收入頗增至乾隆三十一年歲入地丁為二千九百九十一萬兩有奇耗羡為三百萬兩有奇鹽課為五百七十四萬兩有奇關稅為五百四十餘萬兩有奇蘆課魚課為十四萬兩有奇茶課為七萬兩有奇落地雜稅為八十五萬兩有奇契稅為十九萬兩有奇牙當等稅為十六萬兩有奇礦課有定額者八萬兩有奇常例捐輸三百餘萬是為歲入四千數百餘萬之大數而外銷之生息攤捐諸款不與焉歲出為滿漢兵餉一千七百餘萬兩王公百官俸九十餘萬兩外藩王公俸十二萬兩有奇文職養廉三百四十七萬兩有奇武職養廉八十萬兩有奇京官各衙門公費飯食十四萬兩有奇內務府工部太常寺光祿寺理藩院祭祀賓客備用銀五十六萬兩採辦顏料木銅布銀十二萬兩有奇織造銀十四萬兩有奇寶泉寶源局工料銀十萬兩有奇京師各衙門胥役工食銀八萬兩有奇京師官牧馬牛羊象芻秣銀八萬兩有奇東河南河歲修銀三百八十餘萬兩各省留支驛站祭祀儀憲官俸役食科場廩膳等銀六百餘萬兩歲不全支更定漕船歲約需銀一百二十萬兩是為歲出三千數百餘萬之大數而宗室年俸津貼漕運旗丁諸費之無定額者各省之外銷者不與焉自是至道光之季軍需河工賑務賠款之用及歷次事例之開鹽商等報效修河工料之攤徵凡為不時之入與供不時之出者為數均巨然例定之歲入歲出仍守乾隆之舊是以乾隆五十六年歲入銀四千三百五十九萬兩歲出銀三千一百七十七萬兩嘉慶十七年歲入銀四千十三萬兩歲出銀三千五百十萬兩道光二十二年歲入銀三千七百十四萬兩歲出銀三千一百五十萬兩均有奇咸豐初年粵匪驟起捻回繼之國用大絀迄於同治歲入之項轉以釐金洋稅大宗歲出之項又以善後籌防為巨發光緒五年八月翰林院侍讀王先謙奏舊入之發如地丁雜稅鹽務雜款等共四千萬今止入二千七八百萬新入之發如洋稅一千二百萬鹽釐三百萬舊出款如兵餉河工京餉各省留支四千萬今止支二千四五百萬新有出款如西征津防兩軍約一千萬各省防軍約一千萬十七年戶部奏更定歲出歲入以光緒七年一年歲出入詳細冊底為據言臣部為錢糧總匯之區從前出入均有定額入發不過地丁關稅鹽課耗羡數端出款不過京餉兵餉存留協撥數事最為簡括乃自軍興以來出入難依定制入款如扣成減平提解退回等項皆係入自出款之中出款如撥補籌還移解留備等項又皆出歸入款之內彙核良非易易此次所辦冊籍以地丁雜賦地租糧折漕折漕項耗羡鹽課常稅生息等十項為常例徵收以釐金洋稅新關稅按糧津貼等四項為新增徵收以續完捐輸完繳節扣等四項為本年收款除去蠲緩未完各數通計實入共收銀八千二百三十四萬九千一百九十八兩是為銀收以陵寢供應交進銀祭祀儀憲俸食科場餉乾驛站廩膳賞恤修繕河工採辦辦漕織造公廉雜支等十七項為常例開支以營勇餉需關局洋款還借息款等四項為新增開支以補發舊缺豫行支給兩項為補支豫支以批解在京各衙門銀兩一項為批解支款除去缺發未報各數通計實出共支銀七千八百十七萬一千四百五十一兩是為銀支原奏並及錢收糧收錢支糧支實為明核今按十七年歲入歲出之籍入項為地丁二千三百六十六萬六千九百一十一兩雜賦二百八十一萬有一百四十四兩租息十四萬一千六百七十二兩糧折四百二十六萬二千九百二十八兩耗羡三百萬四千八百八十七兩鹽課七百四十二萬七千六百有五兩常稅二百五十五萬八千四百一十兩釐金一千六百三十一萬六千八百二十一兩洋稅一千八百二十萬六千七百七十七兩節扣二百九十六萬四千九百四十四兩續完七百十二萬八千七百四十四兩捐繳一百八十七萬五千五百七十六兩均有奇統為歲入八千九百六十八萬四千八百兩有奇出項為陵寢供應等發十三萬五百五十九兩交進十八萬兩祭祀三十三萬六千七百三十三兩儀憲七萬四千八百七十九兩俸食三百八十四萬一千四百二十四兩科場十萬五千二百七十兩餉乾二千三十五萬六千一百五十九兩驛站一百七十三萬四千七百有九兩廩膳十一萬二千有二十九兩賞恤五十二萬五千二百十六兩修繕二百二十萬九千七百四十八兩採辦四百有三萬三千九百有三兩織造一百有三萬四千九百十五兩公廉四百五十七萬五千七百八十三兩雜支三十萬三千二百七十八兩勇餉一千八百二十六萬八千三百十三兩關局經費三百十四萬四千六百十六兩洋發三百八十六萬一千五十一兩補支一千二百七十七萬五千五百二十五兩豫支一百七十四萬二千七十三兩解京各衙門飯食經費各項支發三百四十七萬二千五百三十三兩統為歲出七千九百三十五萬五千二百四十一兩再三年為甲午朝鮮役起軍用浩繁息借洋款商款及和議既定又借俄法英德之款付日本賠款增攤各省關銀一千二百萬兩益以匯豐克薩華商各款本息及新增宋慶等軍餉共八百萬蓋歲出之增於前者二千萬逮於庚子復釀兵禍辛丑約成遂有四萬五千萬之巨派之各省者一千八百萬兩有奇二十九年以練新軍復攤各省練兵經費而各省以創練新軍辦巡警教育又有就地自籌之款奉天一省警費至三百餘萬兩湖北一省撥提地丁錢價充學費者六十萬兩捐例停於二十七年以練兵復開至三十二年復停庚子以後新增之徵收者大端為糧捐如按糧加捐規復徵收丁漕錢價規復差徭加收耗羡之類鹽捐如鹽斤加價鹽引加課土鹽加稅行鹽口捐之類官捐如官員報效酌提丁漕盈餘酌提優缺盈餘之類加釐加稅如烟酒土藥之加釐稅百貨稅之改統捐稅契加徵之類雜捐如彩票捐房鋪捐漁戶捐樂戶捐之類節省如裁節緑營俸餉節省河工經費核扣驛站經費節省各署局經費之類實業如鐵路電局郵政收入及銀行銀銅元局官辦工廠商局餘利之類出款自賠款練兵費學警司法諸費外各官署新增費亦為大端宣統二年度支部奏試辦宣統三年預算歲入為類八曰田賦經常四千六百十六萬四千七百有九兩臨時一百九十三萬六千六百三十六兩皆有奇曰鹽茶課稅經常四千六百三十一萬二千三百五十五兩曰洋關稅經常三千五百十三萬九千九百十七兩曰常關稅經常六百九十九萬一千一百四十五兩臨時八千五百二十四兩曰正雜各稅經常二千六百十六萬三千八百四十二兩曰釐捐經常四千三百十八萬七千九百七兩曰官業收入經常四千六百六十萬八百九十九兩曰雜收入經常一千九百十九萬四千一百有一兩臨時一千六百有五萬六百四十八兩附列者為類二曰捐輸五百六十五萬二千三百三十三兩曰公債三百五十六萬兩皆臨時歲入歲出為類十八曰行政經常二千六百六萬九千六百六十六兩臨時一百二十五萬八千一百八十四兩曰交涉經常三百三十七萬五千一百有三十兩臨時六十二萬六千一百七十七兩曰民政經常四百四十一萬六千三百三十八兩臨時一百三十二萬四千五百三十一兩曰財政經常一千七百九十萬三千五百四十五兩臨時二百八十七萬七千九百有四兩曰洋關經費經常五百七十四萬八千二百三十七兩臨時九千一百六十三兩曰常關經費經常一百四十六萬三千三百三十二兩曰典禮經常七十四萬五千七百五十九兩臨時五萬四千有三十七兩曰教育經常二百五十五萬三千四百十六兩臨時一百四萬一千八百九十二兩曰司法經常六百六十一萬六千五百七十九兩臨時二十一萬八千七百四十六兩曰軍政經常八千三百四十九萬八千一百十一兩臨時一千四百萬有五百四十六兩曰實業經常一百六十萬三千八百三十五兩曰交通經常四千七百二十二萬一千八百四十一兩臨時七百有八十萬四千九百有八兩曰工程經常二百四十九萬三千二四百兩臨時二百有二萬二千有六十四兩曰官業支出經常五百六十萬四百三十五兩曰各省應解賠款洋款三千九百有十二萬九百二十二兩曰洋關應解賠款洋款一千一百二十六萬三千五百四十七兩曰常關應解賠款洋款一百二十五萬六千四百九十兩曰邊防經費一百二十三萬九千九百有八兩附列者為類一曰歸還公債四百七十七萬二千六百十三兩統為歲入二萬九千六百九十六萬二千七百兩有奇歲出三萬三千八百六十五萬兩有奇十二月資政院核覆於歲入有增加於歲出有減削次年即值變更國體故有預算而無決算蓋自光緒三十三年度支部即奏准令京師各衙署及各省實報歲入歲出又於各省設財政監理官以督之凡昔日外銷之款項與夫雜捐陋規之類及新定之教育司法實業軍政外債諸費皆列於簿書期會故較順治康熙之出入多至十倍茲録之以見一代財政之盈虧焉其軍需河工賑務賠款之巨者乾隆初次金川之役二千餘萬兩準回之役三千三百餘萬兩緬甸之役九百餘萬兩二次金川之役七千餘萬兩廓爾喀之役一千有五十二萬兩臺灣之役八百餘萬兩嘉慶川湖陝教匪之役二萬萬兩紅苗之役湖南一省請銷一千有九十萬洋匪之役廣東一省請銷三百萬兩道光初次回疆之役一千一百餘萬兩二次回疆之役七百三十萬兩英人之役一千數百萬兩咸豐初年粵匪之役二千七百萬其後江南大營月需五十萬兩徽寧防營月需三十萬兩則一年亦千萬湖北供東征之需者歲四百餘萬湖南亦不資而北路及西南各省用兵之費不與焉同治中曾國藩奏湘軍四案五案合之剿捻軍需共請銷三千餘萬兩李鴻章奏蘇滬一案二案合之淮軍西征兩案共請銷一千七百餘萬兩左宗棠奏西征兩案共請銷四千八百二十餘萬兩此外若福建援浙軍需合之本省及臺灣軍需截至三年六月已逾六百萬兩四川湖南援黔軍需歲約四百萬兩積五年二千萬兩雲南自同治二年至同治十二年請銷軍需一千四百六十餘萬兩而甘肅官紳商民集捐銀糧供軍需者五千餘萬兩再加各省廣中額學額計之當不下數萬萬光緒中惟中法之役用三千餘萬兩若西征之餉海防之餉則已入年例歲出不復列河工自康熙中即趨重南河十六年大修之工用銀二百五十萬兩原估六百萬兩逮蕭家渡之工用銀一百二十萬兩自乾隆十八年以南河高郵邵伯車邏壩之決撥銀二百萬兩四十四年儀封決河之塞撥銀五百六十萬兩四十七年蘭陽決河之塞自例需工料外加價至九百四十五萬三千兩浙江海塘之修則撥銀六百餘萬兩荊州江隄之修則撥銀二百萬兩大率興一次大工多者千餘萬少亦數百萬嘉慶中如衡工加價至七百三十萬兩十年至十五年南河年例歲修搶修及另案專案各工共用銀四千有九十九萬兩而馬家港大工不與二十年睢工之成加價至三百餘萬兩道光中東河南河於年例歲修外另案工程東河率撥一百五十餘萬兩南河率撥二百七十餘萬兩逾十年則四千餘萬六年撥南河王營開壩及堰盱大隄銀合為五百一十七萬兩二十一年東河祥工撥銀五百五十萬兩二十二年南河揚工撥六百萬兩二十三年東河牟工撥五百十八萬兩後又有加咸豐初豐工亦撥四百萬兩以上同治中山東有侯工賈莊各工用發二百餘萬兩光緒十三年河南鄭州大工請撥一千二百萬兩其後山東時有河溢然用發不及道光之什一賑務康熙中賑陝西之災用銀至五百餘萬兩乾隆七年江蘇安徽夏秋大水撫恤正賑加賑江蘇給被災軍民等米共一百五十六萬石有奇銀五百五萬兩有奇安徽給被災軍民等米八十三萬石有奇銀二百三十三萬兩有奇十八年以高郵運河之決撥米穀一百十萬石銀四百萬兩賑江蘇災此其最巨者其後直隸山東江蘇河南湖北甘肅諸省之災發帑截漕及資於捐輸者不可勝舉嘉慶初山東曹單等縣災賑銀米合計三四百萬兩六年以直隸水災撥賑銀一百萬兩截漕米六十萬石江蘇安徽山東河南諸省之因災賑恤者節次糜帑均不下數十百萬資於捐輸者如十九年江蘇安徽之災至二三百萬兩道光十一年撥江蘇賑需銀一百餘萬兩二十七年賑河南災銀一百餘萬兩二十八年賑河北災銀一百三十八萬兩二十九年撥江蘇等四省賑災銀一百萬兩而安徽浙江之截留辦賑者皆近百萬江蘇一省則一百四十餘萬此外尚多而官紳商民捐輸者尚不與光緒初山西河南陝西之災撥帑截漕為數均巨合官賑義賑及捐輸等銀不下千數百萬兩鄭州河決賑需河南用銀二百五十餘萬兩時各省有水旱之災輒請開賑捐直隸自十六年之水至二十一年海嘯之災用銀七百餘萬兩山東自十一年後頻年河溢至二十五年用銀七百餘萬兩江蘇自十五年之水至二十四年淮徐海之災用銀五百餘萬兩二十七年秦晉之災則開實官捐以濟之為數至七百六十萬兩有奇賠款始于道光壬寅江寧之約二千一百萬兩咸豐庚申之約一千六百萬兩光緒辛巳伊犂之約六百餘萬兩乙未中日之約併遼南歸地二萬三千萬兩至辛丑公約賠款四萬五千萬兩而極以息金計之實九萬萬餘兩清代田賦徵糧之數乾隆三十一年為八百三十一萬七千七百石有奇江蘇安徽山東河南浙江江西湖北湖南八省自歲漕京師外留充本省經費直隸奉天山西陝西甘肅福建四川廣東廣西雲南貴州則全充本省經費光緒十年新疆改行省歲徵糧二十七萬一千石有奇亦全充本省經費吉林黑龍江之徵米者亦如之各省駐防旗營官兵緑營兵丁皆支月米凡留充本省經費者大率供旗緑營月支米豆之需有餘則報糶易銀候撥云
