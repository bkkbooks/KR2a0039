body:
  text: 清史稿卷一百二十五志一百食貨六征榷會計征榷清興首除煩苛設關處所多仍明制自海禁開常關外始建洋關而釐局之設洋藥之徵亦相繼而起三者皆前代所無茲列著於篇至印花稅煙酒加徵均試行旋罷不具載常關順治初定各省關稅專差戶部司員督徵左右兩翼張家口稅差滿官督徵時京師初定免各關徵稅一年並豁免明季稅課虧缺嗣浙閩以次蕩平復禁革明末加增稅額及各州縣零星落地稅三年革明末加增太平府姑溪橋米稅金柱山商稅四年定戶工各關兼差滿洲漢軍漢官八年減定關差員數並停止關差議九年併西新關江寧倉為一差停獨石口差嚴關差留用保家委官之禁凡額設巡攔各製號衣腰牌十年令各關刊示定則設匱收稅不得勒扣火耗需索陋規並禁關役包攬報單十一年用給事中杜篤祜言清釐關弊四事一裁吏役一查稅纍一關差回避本藉一批文核對限期十六年移潘桃口於永平移古北口於密雲並設關徵木植稅十分取二十七年裁永平密雲新關歸併古北口兼督管理十八年定各口木植什一而稅停臨清甎差其板閘稅交北河分司徵收康熙元年移設河西務於天津更名天津關更定各關兼差滿漢官筆帖式各一由六部咨送輪掣停蒙古漢軍差其張家殺虎二口專差滿蒙官二年定盤詰漕船止於儀真瓜州淮安濟寧天津五關免外國貨物入崇文門稅四年嚴禁各關違例徵收永免溢額議之例五年命各關稅均交地方官管理於是崇文門歸治中天津歸天津道龍泉等歸井陘道紫荊歸直隸守道臨清歸東昌道穵運廳歸通薊道居庸歸昌密道西新歸鎮江道蕪湖歸池太道揚州歸驛傳道滸墅歸蘇昌道淮安歸淮海道北新歸浙江布政使荊歸荊州同知九江歸九江道贛歸吉南贛道太平橋歸南雄知府遇仙橋光廠歸韶州知府各稽徵稅課又裁古北口差歸密雲縣管理惟兩翼張家口殺虎口如故只差戶部司員申令直省關刊示稅則罷崇文門出京貨物稅八年臨清倉歸併臨清關以給事中蘇拜言地方官兼關稅事務繁多且恐畏懼上司希圖足額派纍商民復定稅額較多之滸墅蕪湖北新九江淮安太平橋揚州贛西新臨清天津鳳陽倉仍差部員督徵餘如故是年定關差缺出以六部俸深司員輪掣其差過之員不准重差又定關差考核法缺稅不足半分者罰俸半分至四分分別降調五分以上革職旋又定不及半分者降留全完者紀録凡部差官員不令督撫管轄九年定淮安關兼轄淮安倉及工部清江廠兩翼專差滿官筆帖式十年裁西新戶關歸併龍江工關裁蕪湖工關歸併蕪湖戶關各兼理既而改鳳陽倉歸鳳陽知府正陽歸通判臨淮交大使徵收停差部員十七年裁北河分司臨清閘稅歸濟寧道兼管十九年開山東海禁令查船戶匿稅差滿部員督收潼關山海關稅課潼關兼轄大慶關龍駒寨稅務二十一年移九江關駐湖口停潼關山海關部員差仍歸地方官管理鳳陽仍差六部滿員二十三年更定各關輪差各部院司員例是時始開江浙閩廣海禁於雲山寧波漳州澳門設四海關關設監督滿漢各一筆帖式期年而代定海稅則例免海口內橋津地方抽稅分設西新龍江二關課稅專官二十四年西新仍歸戶部免外國貢船稅減洋船丈抽例十之三二十五年定州縣海船隱匿處分時海禁初開沿海漁船州縣既徵漁課海關復稅梁頭民甚苦之上用福建巡撫張仲舉言定漁船五尺以上梁頭稅統歸地方官徵收先是康熙四年罷抽稅溢額議例至十四年又定溢額多寡分別加級升用及是上以苛取纍商復停止溢額議二十六年滸墅監督桑額徵收溢額二萬一千有奇上以擾纍閭閻罪之永減閩海稅額六千四百兩有奇二十八年蠲沿海魚蝦船及民間日用物糊口貿易之稅著為令先是沙溝於二十六年歸併淮關其朦朧軋東岔河等處悉免稽查至是以沙溝係朦朧軋東總匯不宜再增一稅將朦朧歸海關軋東歸淮關沙溝免稅復歸併西新戶關於龍江工關三十三年仍差部員督收山海關稅張家口稅歸宣化府兼收三十四年分設浙海關署於寧波定海令監督往來巡視三十五年定洋海商船往天津運米至奉天者但收貨物正稅三十六年嚴關差官自京私帶年滿舊役謀占總科庫頭之禁三十七年永減粵海關額稅三萬二百兩有奇三十八年上恐各關差苛取瘠商停罷額外盈餘銀設河寶營差滿官督收大青山木稅四十年裁陝西三原縣商稅歸潼關龍駒寨大慶關兼收裁通會河分司通州木廠歸通永道管理四十一年大青木稅歸併殺虎口兼轄四十六年以金州牛莊交山海關監督巡察越關漏稅設渝關於重慶歸川東道徵收木稅四十七年仍差工部司員督收荊關稅五十三年以臨清關稅缺額改歸巡撫監收未幾鳳陽天津杭州荊州江海浙海淮安板閘及淮關先後改交各巡撫監收停瓜州稅裁稅課大使定臺灣收泊江浙等省商船經過廈門就驗者不重徵福建糖船至廈門者赴關納稅其往江浙貿易者免徵設橫城稅口歸山海關監督監收增稅千兩作為定額六十一年禁各番部落夾帶硝磺軍器出邊其進口稅許從輕減雍正元年移湖口關於九江並設大孤塘分口裁淮安北新鳳陽天津臨清江海浙海荊州各關加增贏餘銀嚴禁各省關及崇文門胥役分外苛求是年定各關稅務俱交地方官管理惟崇文門仍差內務府官山海關兩翼古北潘桃殺虎三口暨打箭爐仍差部員盛京呼爾哈河木稅亦交將軍府尹委沿河官徵收明年淮安仍差部員滸墅改歸蘇州織造鳳凰城中江稅派盛京部員各督收河西務運糧船料改於通州徵收三年以暹羅進獻稻種果樹等物免回空壓載貨物稅禁邊關城門索取蒙古貢物稅其假名匿稅者罪之五年宿遷關歸併淮關徵收由閘稅交地方官管理河寶營木稅由殺虎口監督徵收奉天牛馬稅改差部院司員六年更定臨清關米麥雜糧船稅定各關稅則龍江西新二關交江寧織造兼管永免暹羅米稅七年夔州關改委專員督收南北二新關交杭州織造兼收移荊州之徐關於田家洲更名田關江蘇廟灣稅歸淮關兼管定閩海關減折船稅丈尺例裁古北口監督交密雲縣徵收以潼關商稅浮於部例相安已久照現徵之數著為令移潘桃口正關於潘家桃林二分口徵收八年減各關餘平銀之半革除天津戥耗例外徵收定落地稅搜求溢額議處例嚴黃金出洋之禁十年設交城縣水泉灘木廠武元城設立稅口徵收十一年改天津關歸長蘆鹽政管理十三年設居庸關稅課大使定潘桃古北殺虎三口給商印票兼滿漢蒙三體文字山東海口各州縣衛設兩聯印票填注客商年貌籍貫船隻字號梁頭丈尺豆石數目出口年月分給商船回日查銷乾隆元年革除龍江西新二關衙規票銀初外洋夾板船到粵起其炮位候交易事畢給還其稅法每船按梁頭徵銀二千兩左右貨稅照則徵收革除額稅外另徵置貨銀加一繳送稅定閩省漁船稅分上中下三則起科除額外重徵定各省稅課則例頒行定九江贛州二關三聯稅單例一給商人一交撫署一存稅署准張家口居庸關收取車馱貨物過稅飯錢以資養贍禁偷運米穀接濟外洋分別擬罪有差免沿海採捕魚蝦單桅船稅二年定米穀稅凡遇地方旱潦米穀船到即放行俟成熟後照舊徵收永停徵廣東開建恩平二縣米船稅三年裁滸墅關之轉水柏瀆二口改瓜州由閘稅歸兩淮鹽政九江差內務府司員蕪湖鳳陽派部員各管理監督四年定歸化城木稅額歸殺虎口徵收五年復差部員監督荊關用御史陸尹耀言嚴捏名討關之禁六年復定考核關稅贏餘例清查外省私增口岸免領帑採銅錫鉛及米穀稅仍徵船料惟黃豆非麥秫比雖歉歲照常徵收改宿遷之豐沛蕭碭四縣陸稅仍交各縣分徵永禁龍江關木稅飛量法定各關贏餘比較上年數目考核著為令七年永免直省關豆米額稅復設通州分司之黃村臨清關之德州魏家灣尖冢樊口等口岸免徵臨清關船料以揚州關歸兩江總督遴員徵收停止閩海關之南山邊口徵稅專司稽查八年定官運米穀免徵船料九年嚴蒙古來京漏稅及為奸商私運貨物之禁十年交址亂平復開徵雲南馬臼稅禁止宿遷關通船一載收稅例改按擔數徵收定一官兼管兩關其徵額有此贏彼絀者准其抵補再有短歉仍著追賠移福建詔安之雅溪稅館於懸鐘以閩省舊有子頭船包攬走私永禁製造十三年復徵米豆稅十四年定各關贏餘以雍正十三年為准短少者按分數分別議處罰俸降調有差十五年移福建寧德縣稅口於酒嶼十七年改渝關木稅歸併夔關徵收十八年移廈門查稅之玉洲館駐石美鳳陽關查稅之濉陽口駐虹縣改虹縣徵稅之青陽鎮駐濉河口二十年移淮南關之流均口駐涇河二十二年增定浙閩二海關稅則照粵海關例尋又申禁洋船不准收泊浙海有駛至者乃令回粵貿易納稅二十四年定葉爾羌喀什噶爾牲畜稅二十取一緞布皮張稅十之一自外番販入者倍徵嚴絲斤出洋之禁二十五年始派員徵收多倫諾爾皮張等稅並設盛京拉林阿勒楚喀稅局派員徵收如寧古塔伯都訥例革除粵海關陋規銀歸公造報二十六年設淮安關石稅口又設歸化城總稅局並綏遠歸化和林格爾托克托薩拉齊西包頭崑都崙八十家子等口差蒙古筆帖式二員分督徵收牲畜稅二十七年以龍江淮安二關歸兩江總督滸墅歸江蘇巡撫各稽查嚴禁榷關漏稅積弊並定漏稅罰數江蘇巡撫陳宏謀條上滸墅關四弊一鋪戶代客完稅包攬居奇仍令商人自行完納按簿親填一貨船抵關籤驗納稅給票後始准過關以杜偷越一官員遴委佐雜官半年而代一督撫與監督原相助為理所徵數目應令監督按月知會督撫再於年滿奏報時統咨知會從之是年弛絲斤出洋之禁仍示限制定崇文門兩翼稅差期滿由部開列滿蒙大學士尚書都統侍郎副都統等職名請簡更代遂為永制二十八年畫一天津各口稅則定商販山東豆石由海運浙照運赴江南例輸稅張家口出口鐵器照殺虎口例納稅革除蕪湖關之戶工幫貼飯費江海關之駁票給單挂號油燭飯費看驗艙錢文揚關由閘之給串錢二十九年更定臨清關船隻補稅例定外番商貨至回部貿易者三十抽一皮貨二十抽一回商往外番貿易二十抽一皮貨十之一其牲畜貨物不及抽分之數視所值折算三十年更定吉林等處稅額裁潘桃口監督稅歸張家口徵收所屬六小口改歸通永道管理明年復改潘桃口稅歸多倫諾爾同知徵收設局大河口差理藩院司員督收歸化城稅既而改歸山西巡撫遴員徵收岫巖城屬之鮑家馬頭等七口岸海船商稅歸山海關監督設局徵收三十三年定山海關張家口八溝塔子溝三座塔烏蘭哈達多倫諾爾交直隸總督殺虎口歸化城交山西巡撫盛京牛馬稅中江稅交盛京戶部侍郎坐糧廳交倉場侍郎打箭爐交四川總督荊關交湖廣總督均兼管稽差各監督有侵蝕情弊參處後不能完項者即令兼管之員代賠三十四年准九江關正稅一兩加平餘一分以供飯食費需之用停洋船入口夾帶硫磺之禁著為令三十五年裁潯梧二廠公費歸入正稅三十八年裁多倫諾爾監督歸多倫諾爾同知管理移由閘南壩稅口於中閘四十年封閉廣西由村溢口禁內地商民越關交易四十一年改通州分司及河西務計價科稅為計數科稅並革除張家灣油麥丏等出店進店稅改定打箭爐商貨按數徵稅例明年定打箭爐稅差照山海關例於宗人府及部院司員內選派四十五年停荊關打箭爐司員差交各督撫遴員管理四十六年裁荊關監督養廉銀於荊宜施