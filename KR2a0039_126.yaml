body:
  text: 清史稿卷一百二十六志一百一河渠一黃河中國河患歷代詳矣有清首重治河探河源以窮水患聖祖初命侍衛拉錫往窮河源至鄂敦塔拉即星宿海高宗復遣侍衛阿彌達往西踰星宿更三百里乃得之阿勒坦噶達蘇老山自古窮河源無如是之詳且確者然此猶重源也若其初源則出葱嶺與漢書合東行為喀什噶爾河又東會葉爾羌和闐諸水為塔里木河而匯於羅布淖爾東南潛行沙磧千五百里再出為阿勒坦河伏流初見輒作黃金色蒙人謂金阿勒坦因以名之是為河之重源東北會星宿海水行二千七百里至河州積石關入中國經行山間不能為大患一出龍門至滎陽以東地皆平衍惟賴隄防為之限而治之者往往違水之性逆水之勢以與水爭地甚且因緣為利致潰決時聞勞費無等患有不可勝言者自明崇禎末李自成決河灌汴梁其後屢塞屢決順治元年夏黃河自復故道由開封經蘭儀商虞迄曹單碭山豐沛蕭徐州靈壁睢寧邳宿遷桃源東徑清河與淮合歷雲梯關入海秋決溫縣命內祕書院學士楊方興總督河道駐濟寧二年夏決考城又決王家園方興言自遭闖亂官竄夫逃無人防守伏秋汛漲北岸小宋曹家口悉衝決濟寧以南田廬多淹沒宜乘水勢稍涸鳩工急築上命工部遴員勘議協修七月決流通集一趨曹單及南陽入運一趨塔兒灣魏家灣侵淤運道下流徐邳淮陽亦多衝決是年孟縣海子村至渡口村河清二日詔封河神為顯佑通濟金龍四大王命河臣致祭明年流通集塞全河下注勢湍激由汶上決入蜀山湖五年決蘭陽七年八月決荊隆朱源寨直往沙灣潰運隄挾汶由大清河入海方興用河道方大猷言先築上游長縷隄遏其來勢再築小長隄八年塞之九年決封丘大王廟衝圮縣城水由長垣趨東昌壞平安隄北入海大為漕渠梗發丁夫數萬治之旋築旋決給事中許作梅御史楊世學陳斐交章請勘九河故道使河北流入海方興言黃河古今同患而治河古今異宜宋以前治河但令入海有路可南亦可北元明以迄我朝東南漕運由清口至董口二百餘里必藉黃為轉輸是治河即所以治漕可以南不可以北若順水北行無論漕運不通轉恐決出之水東西奔蕩不可收拾今乃欲尋禹舊蹟重加疏導勢必別築長隄較之增卑培薄難易曉然且河流挾沙束之一則水急沙流播之九則水緩沙積數年之後河仍他徙何以濟運上然其言乃於丁家寨鑿渠引流以殺水勢是年復決邳州又決祥符朱源寨戶部左侍郎王永吉御史楊世學均言治河必先治淮導淮必先導海口蓋淮為河之下流而濱海諸州縣又為淮之下流乞下河漕重臣凡海口有為姦民堵塞者盡行疏濬其漕隄閘口因時啓閉然後循流而上至於河身剔淺去淤使河身愈深足以容水議皆不果行十一年復決大王廟給事中林起龍劾方興侵冒上解方興任遣大理卿吳庫禮工科左給事中許作梅往按起龍坐誣復方興任十三年塞大王廟費銀八十萬十四年方興乞休以吏部左侍郎朱之錫代之是年決祥符槐疙疸隨塞十五年決陽柴溝姚家灣旋塞復決陽武慕家樓十六年決歸仁隄先是御史孫可化疏陳淮黃隄工事下總河之錫言桃源費家嘴及安東五口淤澱久工繁費巨且黃河諺稱神河難保不旋濬旋淤惟有加意修防補偏救弊而已之錫陳兩河利害條上工程器具夫役物料八弊又言因材器使用人所亟獨治河之事非淡泊無以耐風雨之勞非精細無以察防護之理非慈斷兼行無以盡羣夫之力非勇往直前無以應倉猝之機故非預選河員不可因陳預選之法二曰薦用曰儲才諳習之法二曰久任曰交代又條上河政十事曰議增河南夫役曰均派淮工夫役曰察議通惠河工曰建柳園曰嚴剔弊端曰釐核曠盡銀兩曰慎重職守曰明定河工專職曰申明激勸大典曰酌議撥補夫役均允行十七年決陳州郭家埠虞城羅家口隨塞康熙元年五月決曹縣石香爐武陟大村睢寧孟家灣六月決開封黃練集灌祥符中牟陽武杞通許尉氏扶溝七縣七月再決歸仁隄河勢既逆入清口又挾睢湖諸水自決口入與洪澤湖連直趨高堰衝決翟家壩流成大澗九淮陽自是歲以災告二年決睢寧武官營及朱家營三年決杞縣及祥符閻家寨再決朱家營旋塞四年四月河決上游灌虞城永城夏邑又決安東茆良口五年之錫卒以貴州總督楊茂勳為河道總督六年決桃源煙墩蕭縣石將軍廟逾年塞之又決桃源黃家嘴已塞復決沿河州縣悉受水患清河衝沒尤甚三汊河以下水不沒骭黃河下流既阻水勢盡注洪澤湖高郵水高幾二丈城門堵塞鄉民溺斃數萬遣官蠲賑冬命明珠等相視海口開天妃石闥白駒等閘毀白駒姦民閉閘碑八年決清河三汊口又決清水潭副都御史馬紹曾巡鹽御史李棠交章劾茂勳不職罷之以羅多為河道總督九年決曹縣牛市屯又決單縣譙樓寺灌清河縣治是歲五月暴風雨淮黃並溢撞卸高堰石工六十餘段衝決五丈餘高寶等湖受淮黃合力之漲高堰幾塌淮陽岌岌可虞工科給事中李宗孔疏言水之合從諸決口以注於湖也江都高寶無歲不防隄增隄與水俱高以數千里奔悍之水攻一線孤高之隄值西風鼓浪一瀉萬頃而江高寶泰以東無田地興化以北無城郭室廬他如淥陽平望諸湖淺狹不能受水各河港疏濬不時范公隄下諸閘久廢入海港口盡塞雖經大臣會閲嚴飭開閘出水而年深工大所費不資兼為傍海奸竈所格竟不果行水迂回至東北廟灣口入海七邑田舍沈沒動經歲時比宿水方消而新歲橫流又已踵至矣御史徐越亦言高堰宜乘冬水落時大加修築於是起桃源東至龍王廟因舊址加築大隄三千三百三十丈有奇臘後冰解水溢沿河村舍林木剷刷殆盡十年春河溢蕭縣六月決清河五堡桃源陳家樓八月又決七里溝以王光裕總督河道光裕請復明潘季馴所建崔壩鎮等三壩而移季太壩於黃家嘴舊河地以分殺水勢是歲茆良口塞十一年秋決蕭縣兩河口邳州塘池舊城又溢虞城遣學士郭廷祚等履勘十二年桃源七里溝塞十三年決桃源新莊口及王家營又自新河鄭家口北決十四年決徐州潘家塘宿遷蔡家樓又決睢寧花山壩復灌清河治民多流亡十五年夏久雨河倒灌洪澤湖高堰不能支決口三十四漕隄崩潰高郵之清水潭陸漫溝之大澤灣共決三百餘丈揚屬皆被水漂溺無算上遣工部尚書冀如錫戶部侍郎伊桑阿訪究利病是歲又決宿遷白洋河于家岡清河張家莊王家營安東邢家口二鋪口山陽羅家口塞桃源新莊十六年如錫等覆陳河工壞潰情形光裕解任勘問以安徽巡撫靳輔為河督輔言治河當審全局必合河道運道為一體而後治可無弊河道之變遷總由議治河者多盡力於漕艘經行之處其他決口則以為無關運道而緩視之以致河道日壞運道因之日梗河水裹沙而行全賴各處清水併力助刷始能奔趨歸海今河身所以日淺皆由從前歸仁隄等決口不即堵塞之所致查自清江浦至海口約長三百里向日河面在清江浦石工之下今則石工與地平矣向日河身深二三四丈不等今則深者不過八九尺淺者僅二三尺矣河淤運亦淤今淮安城堞卑於河底矣運淤清江與爛泥淺盡淤今洪澤湖底漸成平陸矣河身既墊高若此而黃流裹沙之水自西北來晝夜不息一至徐邳宿桃即緩弱散漫臣目見河沙無日不積河身無日不加高若不大修治不特洪澤湖漸成陸地將南而運河東而清江浦以下淤沙日甚行見三面壅遏而河無去路勢必衝突內潰河南山東俱有淪胥沈溺之憂彼時雖費千萬金錢亦難剋期補救因分列大修事宜八曰取土築隄使河寬深曰開清口及爛泥淺引河使得引淮刷黃曰加築高家堰隄岸曰周橋閘至翟家壩決口三十四須次第堵塞曰深挑清口至清水潭運道增培東西兩隄曰淮揚田及商船貨物酌納修河銀曰裁併河員以專責成曰按里設兵畫隄分守廷議以軍務未竣大修募夫多宜暫停疏再上惟改運土用夫為車運餘悉如所請於是各工並舉大挑清口爛泥淺引河四及清口至雲梯關河道創築關外束水隄萬八千餘丈塞于家岡武家墩大決口十六又築蘭陽中牟儀封商丘月隄及虞城周家隄明年創建王家營張家莊減水壩二築周橋翟壩隄二十五里加培高家堰長隄山清安三縣黃河兩岸及湖堰大小決口盡塞優詔褒美十八年建南岸碭山毛城鋪北岸大谷山減水石壩各一以殺上流水勢二十年塞楊家莊蓋決五年矣是歲增建高郵南北滾水壩八徐州長樊大壩外月隄千六百八十九丈大修至是已三年河未盡復故道輔自劾部議褫職上命留任二十一年決宿遷徐家灣隨塞又決蕭家渡先是河身僅一線輔盡堵楊家莊欲束水刷之而引河淺窄淤刷鼎沸遇徐家灣隄卑則決蕭家渡土鬆則又決會候補布政使崔維雅上河防芻議條列二十四事請盡變輔前法上遣尚書伊桑阿侍郎宋文運履勘命維雅隨往維雅欲盡毀減水壩別圖挑築伊桑阿等言輔所建工程固多不堅改築亦未必成功輔亦申辨工將次第告竣不宜有所更張並下廷議因召輔至京輔言蕭家口明正可塞維雅議不可行上是之命還工二十二年春蕭家渡塞河歸故道明年上南巡閲河賜詩褒美二十四年秋輔以河南地在上游河南有失則江南河道淤澱不旋踵乃築考城儀封隄七千九百八十九丈封丘荊隆口大月隄三百三十丈滎陽掃工三百十丈又鑿睢寧南岸龍虎山減水閘四上念高郵諸州湖溢淹民田命安徽按察使于成龍修治海口及下河聽輔節制旋召輔成龍至京集議成龍力主開濬海口輔言下河海口高內地五尺應築長隄高丈六尺束水趨海所見不合下廷臣議亦各持一說上以講官喬萊江北人召問萊言輔議非是因遣尚書薩穆哈等勘議還言開海口無益會江寧巡撫湯斌入為尚書詢之斌言海口開則積水可泄惟高郵興化民慮毀廬墓為不便耳乃黜薩穆哈頒內帑二十萬命侍郎孫在豐董其役時又有督修下河宜先塞減水壩之議上不許召輔入對輔言南壩永塞恐淮弱不敵黃強宜於高家堰外增築重隄截水出清口不入下河停丁溪等處工程成龍時任直撫示以輔疏仍言下河宜濬修重隄勞費無益議不決復遣尚書佛倫等勘議佛倫主輔議二十七年御史郭琇劾輔治河無績內外臣工亦交章論之乃停築重隄免輔官以閩浙總督王新命代之仍督修下河鐫在豐級以學士凱音布代之明年上南巡閲高家堰謂諸臣曰此隄頗堅固然亦不可無減水壩以防水大衝決但靳輔欲於舊隄外更築重隄實屬無益並以輔於險工修挑水壩令水勢回緩甚善車駕還京復其官三十一年新命罷仍令輔為河督輔以衰疾辭命順天府丞徐廷璽副之輔請於黃河兩岸值柳種草多設涵洞俱報可是冬輔卒上聞歎悼豫騎都尉世職以于成龍為河督越二年召詢成龍曰減水壩果可塞否對曰不宜塞仍照輔所修而行上曰如此何不早陳爾排陷他人則易身任總河則難非明驗耶三十四年成龍遭父憂以漕督董安國代之明年大水決張家莊河會丹沁逼滎澤徙治高埠又決安東童家營水入射陽湖是歲築攔黃大壩於雲梯關挑引河千二百餘丈於關外馬家港導黃由南潮河東注入海去路不暢上游易潰而河患日亟三十六年決時家馬頭明年仍以成龍為河督三十八年春上南巡臨視高家堰等隄謂諸臣曰治河上策惟以深浚河身為要河底浚深則洪澤湖水直達黃河興化鹽城等七州縣無泛濫之患田産自然涸出若不治源治流終無裨益今黃淮交會之口過於徑直應將河淮之隄各迤東灣曲拓築使之斜行會流則黃不致倒灌矣明年成龍卒以兩江總督張鵬翮為河督是歲塞時家馬頭從鵬翮先疏海口之請盡拆雲梯關外攔黃壩賜名大清口建宿遷北岸臨黃外口石閘徐州南岸楊家樓至段家莊月隄四十一年上謂永定河石隄甚有益欲推行黃河兩岸自徐州至清口皆修石隄鵬翮言建築石工必地基堅實惟河性靡常沙土鬆浮石隄工繁費巨告成難以預料遂作罷四十二年上南巡閲視河工製河臣針以賜鵬翮秋移建中河出水口於楊家樓逼溜南趨清水暢流敵黃海口大通河底日深黃水不虞倒灌上嘉鵬翮績加太子太保四十六年八月決豐縣吳家莊隨塞明年鵬翮入為刑部尚為以趙世顯代之四十八年六月決蘭陽雷家集儀封洪邵灣及水驛張家莊各隄六十年八月決武陟詹家店馬營口魏家口大溜北趨注滑縣長垣東明奪運河至張秋由五空橋入鹽河歸海自河工告成黃流順軌安瀾十餘年矣至是遣鵬翮等往勘九月塞詹家店魏家口十一月塞馬營口世顯罷以陳鵬年署河道總督六十一年正月馬營口復決灌張秋奔注大清河六月沁水暴漲衝塌秦家廠南北壩臺及釘船幫大壩時王家溝引河成引溜由東南會滎澤入正河馬營隄因無恙鵬年復於廣武山官莊峪挑引河百四十餘丈以分水勢九月秦家廠南壩甫塞北壩又決馬營亦漫開十二月塞之雍正元年六月決中牟十里店婁家莊由劉家寨南入賈魯河會鵬年卒齊蘇勒為總河慮賈魯河下注之水山盱高堰臨湖隄工不能容納亟宜相機堵閉上命兵部侍郎嵇曾筠馳往協議七月決梁家營詹家店復遣大學士張鵬翮往協修是月塞九月決鄭州來童寨民隄鄭民挖陽武故隄泄水並衝決中牟楊橋官隄尋塞是歲建清口東西束水壩以禦黃蓄清二年以嵇曾筠為副總河駐武陟轄河南河務東河分治自此始六月決儀封大寨蘭陽板橋逾月塞之三年六月決睢寧朱家海東注洪澤湖明年四月塞未竣河水陡漲衝塌東岸壩臺睢寧虹泗桃源宿遷悉被淹命兩廣總督孔育珣馳勘協防十二月塞是月河清起陝西府谷訖江南桃源五年齊蘇勒以朱家海素稱險要增築夾壩月隄防風掃並於大溜頂衝處削陡岸為斜坡懸密葉大柳於坡上以抵溜之汕刷久之大溜歸中泓柳枝沾掛泥滓悉成沙灘易險為平工不勞而費甚省因請凡河崖陡峻處俱仿此行六年曾筠內遷禮部尚書副總河如故命署廣東按察使尹繼善協理江南河務七年改河道總督為江南河道總督駐清江以孔育珣任省副總河以曾筠為山東河道總督駐濟寧上以明臣潘季馴有每歲派夫加高隄身五寸之議前靳輔亦以為言計歲費不過三四萬下兩河總督議育珣等請酌緩急分年輪流加倍約歲需二萬餘金下部議行八年育珣卒曾筠調督南河田文鏡兼署東河總督五月敕建河州口外河源神廟成加封號是月河清起積石關訖撒喇城查漢斯是歲決宿遷及桃源沈家莊旋塞以封丘荊隆口大溜頂衝開黑缸口至柳園口引河三千三百五十丈十年增修高堰石隄成十一年揀派部院司員赴南河學習期以三年授曾筠文華殿大學士兼吏部尚書督南河如故命兩淮鹽政高斌就習河務曾筠旋遭母憂斌署南河總督乾隆元年四月河水大漲由碭山毛城鋪閘口洶湧南下隄多衝塌潘家道口平地水深三五尺上以下流多在蕭宿靈虹睢寧五河等州縣今止議濬上源而無疏通下游之策則水無歸宿下江南河南各督撫暨兩總河委勘會議並移南副總河駐徐州以專督率旋高斌請濬毛城鋪迤下河道經徐蕭睢宿靈虹至泗州安河陡門紆直六百餘里以達洪澤出清口會黃而淮揚京員夏之芳等言其不便明年召斌詢問斌繪圖呈覽乃知之芳等所言失實令同總督慶復確估定議並將開濬有利無害曉喻淮揚士民初斌疏濬毛城鋪水道別開新口塞舊口以免黃河倒灌至三年秋河漲灌運論者多歸咎新開運口斌言十月後黃水平退湖水暢流新淤隨溜刷去可無虞淺澀四年斌又言上年清水微弱時值黃水異漲並非開新口所致而南人言者不已上遣大學士鄂爾泰馳勘亦言新口宜開明年黃溜仍南逼清口仿宋陳堯佐法製設木龍二挑溜北行六年斌以宿遷至桃源清河二百餘里河流湍激北岸只縷隄六並無遙隄又內逼運河將運河南岸縷隄通築高厚作黃河北岸遙隄更於縷隄內擇要增築格隄九未成斌調督直隸完顏偉繼之先是上以河溜逼清口倒漾為患詔循康熙間舊迹開陶莊引河導黃使北遣鄂爾泰會勘議甫定以汛水驟漲停工斌亦去任至是完顏偉慮引河不就於清口迤西黃河南岸設木龍挑溜北走引河之議遂寢厥後四十一年上決意開之踰年工竣新河直抵周家莊會清東下倒漾之患永絶七年決豐縣石林黃村奪溜東趨又決沛縣縷隄旋塞完顏偉調督東河改白鍾山南河總督初豐沛決時大學士陳世倌往勘添建滾水石壩二於天然南北二壩處以分泄水勢十年決阜寧陳家浦時淮黃交漲沿河州縣被淹漕督顧琮言陳家浦逼近海口以下十餘里向無隄工每遇水漲任其散溢若仍於此堵塞是與水爭地費多益少應於上流築遙隄以束水勢事下訥親高斌仍議塞舊決口十一年鍾山罷顧琮署南總河建木龍三於安東西門逼溜南趨自木龍以上皆淤灘化險為平十三年琮調督東河詔大學士高斌管南河事斌以雲梯關下二套漲出沙灘大溜南趨直逼天妃宮辛家蕩隄工開分水引河並修補徐州東門外蟄裂石隄琮亦以祥符十九堡南岸日淤大溜北趨逼隄根建南北壩臺並於壩外捲掃籤樁十六年六月決陽武命斌赴工會琮堵築十一月塞十七年上以豫省河岸大隄外有大行隄一連接直東年久殘缺在直隸者令方觀承勘修其山東界內有無汕刷殘缺令鄂容安查修鄂容安言曹單二縣大行隄大小殘缺三千四百三十丈並加幫卑薄補築缺口三百三十餘丈疏濬隄南泄水河以宣坡水十八年秋決陽武十三堡九月決銅山張家馬路衝塌內隄縷越隄二百餘丈南注靈虹諸邑入洪澤湖奪淮而下以尹繼善督南河遣尚書舒赫德偕白鍾山馳赴協理同知李焞守備張賓侵帑誤工為學習河務布政使富勒赫所劾勘實置之法高斌及協理張師載坐失察縛視行刑是冬河塞方銅山之始決也下廷議吏部尚書孫嘉淦獨主開減河引水入大清河略言自順康以來河決北岸十之九北岸決潰運者半不潰者半凡其潰道皆由大清河入海者也蓋大清河東南皆泰山基腳其道亙古不壞亦不遷移前南北分流時已受河之半及張秋潰決且受河之全未聞有衝城郭淹人民之事則此河之有利無害已足徵矣今銅山決口不能收功上下兩江二三十州縣之積水不能消涸故臣言開減河也上游減則下游微決口易塞積水早消但河流湍急設開減河而奪溜以出不可不防故臣言減入大清河也現減河數處皆距大清河不遠計大清河所經只東阿濟陽濱州利津四五州縣即有漫溢不過偏災忍四五州縣之偏災可減兩江二三十州縣之積水並解淮揚兩府之急難此其利害輕重不待智者而後知也減河開後經兩三州縣境或有漫溢築土埂以禦之一入大清河則河身深廣兩岸堵築處甚少計費不過一二十萬而所省下游決口之工費賑濟之錢米至少一二百萬此其得失多寡亦不待智者而後知也計無便於此者上慮形勢隔礙不能用自銅山塞後月隄內積水尚深七八尺至丈八九尺上命於引河兜水壩南再開引河分溜使新工不受衝激二十一年決孫家集隨塞明年二月上南巡至天妃閘閲木龍時鍾山調總南河偕東河總督張師載言徐州南北岸相距甚迫一遇盛漲時有潰決請挑濬淤淺增築隄工並堵築北岸支河為南北分籌之計制可二十三年命安徽巡撫高晉協理南河秋七月決竇家寨新築土壩直注毛城鋪漫開金門土壩晉言土壩過高阻遏水勢以致壅決不須再築上不許並令開蔣家營傅家窪引河仍導入黃二十六年七月沁黃並漲武陟滎澤陽武祥符蘭陽同時決十五口中牟之楊橋決數百丈大溜直趨賈魯河遣大學士劉統勳公兆惠馳勘巡撫常鈞請先築南岸上謂河流奪溜宜亟堵楊橋鈞言大謬調撫江西以胡寶瑔為河南巡撫並令高晉赴豫協理十一月塞上聞大喜命於工所立河神廟三十年上南巡祭河神閲清口東壩木龍惠濟閘三十一年決銅沛廳之韓家堂旋塞三十三年豫撫阿思哈請以豫工節省銀加築隄岸總河吳嗣爵言豫省河面寬溜勢去來無定旋險旋平若將土掃劃為成數恐各工員視為年例額支轉啓興工冒銷之弊議遂寢明年嗣爵言銅瓦廂溜勢上隄楊橋大工自四五掃至二十一掃俱頂衝迎溜請於桃汛未屆拆修加鑲層土層柴鑲壓堅實兩岸大隄外多支河積水汛發時引溜注隄宜多築土壩攔截上俱可其奏三十七年東河總督姚立德言前築土壩保固隄根頻歲安瀾已著成效請俟冬春閒曠培築土壩密栽柳株俾數年後溝槽淤平可永固隄根上嘉奬之三十八年五月河溢朝邑漲至二丈五尺民居多漂沒三十九年八月決南河老壩口大溜由山子湖下注馬家蕩射陽湖入海板閘淮安俱被淹沒尋塞四十一年嗣爵言黃水倒灌洪湖運河清口挑挖引河恐於事無濟會內遷薩載署南總河上命偕江南總督高晉勘議晉等言臣晉在工二十餘年歷經倒灌惟有將清口通湖引河挑挖使得暢流匯黃東注併力刷沙則黃河不濬自深海口不疏自治補偏救弊惟此一法又言清口西所建木龍原冀排溜北趨刷陶莊積土使黃不逼清但驟難盡刷宜於陶莊積土之北開一引河使黃離清口較遠至周家莊會清東注不惟可免倒灌淤沙漸可攻刷即墟堰亦資穩固所謂治淮即以治黃也明年二月引河成上喜成此巨工一勞永逸可廢數百年藉清敵黃之說飭建河神廟於新口石壩自製文記之四十三年決祥符旬日塞之閏六月決儀封十六堡寬七十餘丈地在諸口上掣溜湍急由睢州寧陵永城直達亳州之渦河入淮命高晉率熟諳河務員辨赴豫協堵撥兩淮鹽課銀五十萬江西漕糧三十萬賑恤災民並遣尚書袁守侗勘辦八月上游迭漲續塌二百二十餘丈十六堡已塞復決十二月再塞之越日時和驛東西壩相繼蟄陷遣大學士公阿桂馳勘明年四月北壩復陷二十餘丈上念儀工綦切以古有沈璧禮河事特頒白璧祭文命阿桂等詣工所致祭四十五年二月塞是役也歷時二載費帑五百餘萬堵築五次始合命於陶莊河神廟建碑記之六月決睢寧郭家渡又決考城曹縣未幾俱塞十一月張家油房塞而復開四十六年五月決睢寧魏家莊大溜注洪澤湖七月決儀封漫口二十餘北岸水勢全注青龍岡十二月將塞復蟄塌大溜全掣由漫口下注四十七年兩次堵塞皆復蟄塌阿桂等請自蘭陽三堡大壩外增築南隄開引河百七十餘里導水下注由商丘七堡出隄歸入正河掣溜使全歸故道曲家樓漫口自可堵閉上從其言明年二月引河成三月塞四十九年八月決睢州二堡仍遣阿桂赴工督率十一月塞先是上念豫工連歲漫溢隄防外無宣泄之路欲就勢建減水壩俾大汛時有所分泄下阿桂及河撫諸臣勘議至是阿桂等言豫省隄工滎澤鄭州土性高堅距廣武山近毋庸設減壩中牟以下沙土夾雜或係純沙建壩不能保固至隄南泄水各河惟賈魯河係泄水要路經鄭州中牟祥符尉氏扶溝西華至周家口入沙河又惠濟係賈魯支河二河窄狹淤墊如須減黃應大加挑浚需費浩繁非一時所能集事惟蘭儀高家寨河勢坐灣若挑濬取直引溜北注河道可以暢行上然之五十一年秋決桃源司家莊烟墩十月塞明年夏復決睢州十月塞十二月山西河清二旬自永寧以下長千三百里五十四年夏決睢寧周家樓十月塞五十九年決豐北曲家莊尋塞嘉慶元年六月決豐汛六堡刷開運河余家莊隄水由豐沛北注山東金鄉魚臺漾入昭陽微山各湖穿入運河漫溢兩岸江蘇山陽清河多被淹南河總督蘭錫第導水入藺家山壩引河由荊山橋分達宿遷諸湖又啓放宿遷十家河竹絡壩桃源顧家莊隄泄水仍入河下注並於漫口西南挑穵舊河引溜東趨入正河繪圖以聞上令取直向南而東展寬開穵俾溜勢直注正河較為得力命兩江總督蘇淩阿山東布政使康基田會勘籌辦十一月復因淩汛蟄塌壩身二十餘丈時蘇淩阿按事江西改命東河總督李奉翰赴工會辦明年二月塞加奉翰太子太保調督兩江兼管南河事是年七月河溢曹汛二十五堡三年春壩工再蟄奉翰自劾遣大學士劉墉尚書慶桂履勘並責問奉翰等因循墉等言漫口已跌成塘眴屆凌汛請展至秋後興工八月溢睢州水入洪澤湖上游水勢既分曹工遂以十月塞明年正月睢工亦塞三月以河南布政使吳璥署東河總督璥言豫東兩岸隄工丈尺加增而淤墊如故病在豐曹睢疊經漫溢雖塞後順軌安瀾然引河不能寬暢且徐城河狹旁泄過多遂成中梗去淤之法惟在束水攻沙以隄束水聞江南河臣康基田培築隄工極為認真應令酌看堤掃情形守護閘壩宣泄有度自可日見深通上命與基田商辦八月決碭汛邵家壩十二月已塞復滲漏又料船不戒延燒殆盡基田奪職留工調璥督南河以河南布政使王秉韜為東河總督移東河料物迅濟南河五年冬邵家壩塞六年九月溢蕭南唐家灣十一月塞八年九月決封丘衡家樓大溜奔注東北由范縣達張秋穿運河東趨鹽河經利津入海直隸長垣東平開州均被水成災上飭布政使瞻住撫恤復遣鴻臚卿通恩等治賑兵部侍郎那彥寶赴工會同東河總督嵇承志堵築明年二月塞十年閏六月兩江總督鐵保言河防之病有謂海口不利者有謂洪湖淤墊者有謂河身高仰者此三說皆可勿論惟宜專力於清口大修各閘壩借湖水刷沙而河治湖水有路入黃不虞壅滯而湖亦治上嘉其言明晰扼要至謂清水敵黃所爭在高下不在深淺所論固是但湖不深焉能多蓄是必蓄深然後力能敵黃俟大汛後會商南河總督徐端迅將高堰五壩及各閘壩支河酌量施工時有議由王營減壩改河經六塘河入海者鐵保偕南河總督戴均元上言新河隄長四百里中段漫水甚廣急難施工必須二三年之久約費三四百萬堵築減壩不過二三月費只二百餘萬且舊河有故道可尋施工較易上從之十一年四月兵部侍郎吳璥再督東河六月復置南副總河降徐端為之七月決宿遷周家樓八月決郭家房先後塞之十二年六月漫山安馬港口張家莊分流由灌口入海旋塞七月決雲梯關外陳家浦分流強半由五辛港入射陽湖注海十三年二月陳家浦塞鐵保等請復毛城鋪石壩王營減壩培兩岸大隄接築雲梯關外長堤及培高堰山盱隄後土坡遣大學士長麟等馳勘太僕寺卿莫瞻菉言河入江南惟資淮以為抵禦淮萃七十二河之水匯於洪澤以堰盱石隄五壩束之令出清口匯黃入海此即束水攻沙之道今治南河宜先治清口保守五壩五壩不輕啓泄則湖水可並力刷黃黃不倒灌運河自可疏通今河臣請接築雲梯關外長隄二百餘里則於坐灣取直處必須添築掃段以為防護既設修防必添建廳營多設官兵是徒多糜費之煩未必收束刷之效至謂修復毛城滾壩挑穵洪濉為減黃流異漲以保徐城則可若恃此助清濟運則不可自黃水入湖淤停水勢奔注堰盱五壩且難防守又何能使之暢出清口故加培五壩使湖水暢出悉力敵黃順流直下即可淘刷河身以入海御史徐亮言鐵保等條陳修防各事惟於原議高堰石坦坡未曾籌及蓄清刷黃專在固守高堰實得全河關鍵以柔制剛其法最善風浪衝擊至坡則平然全堰俱得坦坡外護則五壩可永閉不開清水可全力刷黃淮陽可長登袵席此萬世永圖而目前急務也海口尾閭也清口咽喉也高堰則心腹也要害之地宜先著力璥亦以為言長麟等覆稱毛城壩易致衝決應無庸議王營減霸積水太深難以施工請改建滾壩於其西並添築石壩至碎石坦坡工段綿長時難猝辦先築土坡餘如鐵保言均元病免端復督南河初陳家浦漫溢由射陽湖旁趨入海鐵保等以挑河費巨徑由射陽湖入海較正河為近因有改河道之議至是命璥等履勘璥等言前明及康熙間所有灌河入海之路覆轍俱在現北潮河匯流馬港口張家莊漫水尚在壅積可見去路不暢又不能刷出河槽此外更無可另闢海口之路仍請修復故道接築雲梯關外大隄束水東注上如其言是年六月決堂子對岸千根棋杆及荷花塘掣通臨湖甎百餘丈堂子對岸及千根棋杆隨塞荷花塘既堵復蟄端再降副總河以璥總南河明年正月塞是年冬築高堰碎石坦坡十五年八月端復督南河省副總河十一月大風激浪決山盱屬仁義智三壩甎石堤三千餘丈及高堰屬甎石堤千七百餘丈端啓高郵車邏大壩及下游歸江各閘壩並先堵仁智壩以泄水勢時璥養病家居上垂詢辦法璥言義壩應一律堵築高堰石工尤須於明年大汛前修竣上嘉所論切要未幾仁義智三壩及馬港俱塞河歸正道入海明年四月馬港復決五月王營減壩蟄陷七月決邳北綿拐山及蕭南李家樓十二月王營減壩塞十七年二月李家樓亦塞十八年九月決睢州及睢南薛家樓桃北丁家莊褫東河總督李亨特職以均元代之明年正月均元內召起璥再督東河董理睢工二十年二月塞二十三年六月溢虞城二十四年七月溢儀封及蘭陽再溢祥符陳留中牟奪葉觀潮職以李鴻賓督東河璥時為刑部尚書偕往會籌未幾陳留祥符中牟俱塞而武陟縷隄決觀潮連堵溝槽五又決馬營壩奪溜東趨穿運注大清河分二道入海儀封缺口尋涸上命枷示觀潮河干均元以大學士偕侍郎那彥寶履勘那彥寶留督馬營壩工久之壩基不定鴻賓被斥責遂以不諳河務辭上怒奪其職觀潮復督東河二十五年三月馬營口塞加河神金龍四大王黃大王朱大王封號是月儀封又漫塌削觀潮及豫撫琦善職宣宗立仍命璥及那彥寶赴工會辦十二月塞道光元年禮部右侍郎吳烜言據御史王雲錦函稱去冬回籍過河審視原武陽武一帶隄高如嶺堤內甚卑向來堤高於灘約丈八尺自馬營壩漫決灘淤堤高於灘不過八九尺若不急於增隄恐至夏盛漲不免有出隄之患上命河督張文浩偕豫撫姚祖同履勘三年江督孫玉庭河督黎世序加培南河兩岸大隄令高出盛漲水痕四五尺除有工及險要處堤頂另估加寬餘悉以丈五尺及二丈為度五月工竣四年十一月大風決高堰十三堡山盱周橋之息浪菴壞石堤萬一千餘丈奪文浩職以嚴烺督南河遣尚書文孚汪廷珍馳勘侍講學士潘錫恩言蓄清敵黃相傳成法大汛將至則急堵禦黃壩使黃水全力東趨今文浩遲堵此壩致黃河倒灌釀成如此巨患且欲籌減泄當在下游乃輒開祥符閘減黃入湖壩口既灌於下閘口復灌於上黃無出路湖墊極高為患不可勝言尋文孚等亦以為言文浩遣戍玉庭褫職留任十二月十三堡息浪菴均塞五年十月東河總督張井言自來當伏秋大汛河員皆倉皇奔走救護不遑及至水落則以現在可保無虞不復求疏刷河身之策漸至清水不能暢出河底日高堤身遞增城郭居民盡在水底之下惟仗歲積金錢撎河於最高之處上嘉所言切中時弊初琦善等有改移海口以減黃拋護石坡以蓄清之議至是井言灌河海口屢改屢決自不可輕易更張即碎石坦坡亦有議及流弊者尤不可不從長計議是月增培河南十三廳山東漕河糧河二廳堤堰壩創各工皆從井請也六年春河復漲命井偕琦善烺會勘海口琦善烺知海口不能改乃條上五事皆一時補苴之計井言履勘下游河病中滿淤灘梗塞難疏海口無可移改請由安東東門工下北岸別築新隄改北隄為南隄相距八里十里中挑引河導河由北傍舊河行至絲網濱入海河水高隄內灘丈五六尺引河挑深一丈則水勢高下幾三丈形勢順利自東門工至禦黃壩六十里去路既暢上游可落水四五尺黃落則禦壩可啓束清壩挑清水外出刷黃底淤攻盡黃可落至丈餘湖水蓄七八尺已為建瓴石工易保上善其策於是烺坐堰盱新工掣卸降三品調署東河而以井督南河淮揚道潘錫恩副之使經畫其事而琦善以改河非策請啓王家營減壩將正河挑穵深通放清水刷滌再堵壩挽黃歸正河已允行矣給事中楊煊言嘉慶中王家營減壩開上下游州縣俱災如止減黃不奪溜何必奏籌撫恤今奏啓減壩至預及撫恤堵口事宜即與從前情形無異下壅上潰不可不防事下江督河督會議井初議安東改河時撓之者謂東門工掃外有舊拋碎石正當咽喉恐有阻遏井謂有石處可啓除其吳工碎石千餘方但上下掣通亦斷不致礙全河然議者終以為疑及井見煊奏復言嘉慶間減壩遇水後次年黃仍倒灌今河底淤高丈四五尺豈如當時深通兼以洪湖石工隱患甚多本年二月存水丈二尺八寸遇風已多掣卸秋後湖水止能蓄至三丈冬令有耗無增來年重運經行必黃水止存二丈八九尺清方高於黃一尺若黃加高即成倒灌禦黃壩外河底墊高淤運淤湖為害不小且海州積水未消鹽河遙堤地高去路不暢啓壩後河必撎高徒深四邑之災無補全河之病請於減壩迤下安東門工上山安廳李工遙隄外築北隄斜向趨東仍與前議改河隄工相連增長七千餘丈挑河至八套即入正河李工至八套舊隄長四萬一千丈取直築隄僅長三萬二千餘丈可避東門碎石之阻河減清高漕行自利督臣意以開放減壩已經奏定不得以旁觀一言輒思變計並臚列七難駁臣所議臣已逐條致覆疏入上終以改河為創舉從琦善議十一年七月決楊河廳十四堡及馬棚灣十二月塞十二年八月決祥符九月桃源姦民陳瑞因河水盛漲糾衆盜穵于家灣大隄放淤肥田致決口寬大掣全溜入湖桃南通判田鋭等褫職遣戍是月祥符塞明年正月于家灣塞十五年以栗育美為東河總督時原武汛串溝受水寬三百餘丈行四十餘里至陽武汛溝尾復入大河又合沁河及武陟滎澤諸灘水畢注隄下兩汛素無工故無秸料隄南北皆水不能取土築隄育美試用拋磚法於受衝處拋磚成壩六十餘壩甫成風雨大至支河首尾決而壩如故屢試皆效遂請減秸石銀兼備磚價令沿河民設窯燒磚每方石可購二方磚行之數年省帑百三十餘萬而工益堅會有不便其事者持異議於是御史李蓴請停燒磚上遣蓴隨尚書敬徵履勘卒以溜深急則磚不可恃停之十九年育美復以磚工得力省費為言乃允於北岸之馬營滎原兩堤南岸之祥符下汛陳留汛各購磚五千方備用二十一年六月決祥符大溜全掣水圍省城河督文沖請照睢工漫口暫緩堵築遣大學士王鼎通政使慧成勘議文沖又請遷省治上命同豫撫牛鑑勘議時河溜由歸德陳州折入渦會淮注洪澤湖拆展禦黃束清各壩尚不足資宣泄並展放禮智仁壩義河亦啓放八月鑑言節逾白露水勢漸落城垣可無虞自未便輕議遷移鼎等言河流隨時變遷自古迄無上策然斷無決而不塞塞而不速之理如文沖言俟一二年再塞且引睢工為證查黃水經安徽匯洪澤宣泄不及則高堰危淮揚盡成巨浸況新河所經須更築新堤工費均難數計即幸而集事而此一二年之久數十州縣億萬生靈流離豈堪設想且睢工漫口與此不同河臣所奏斷不可行疏入解文沖任枷示河干以朱襄繼之二十二年祥符塞用帑六百餘萬加鼎太子太師七月決桃源十五堡蕭家莊溜穿運由六塘河下注未幾十五堡掛淤蕭家莊口刷寬百九十餘丈掣動大溜正河斷流河督麟慶意欲改道遣尚書敬徵廖鴻荃履勘敬徵等言改河有礙運道惟有汛堵漫口挽歸故道俟明年軍船回空後築壩合龍從之十一月以吏部侍郎潘錫恩總督南河二十三年御史雷以諴言決口無庸堵塞請改舊為支以通運道下錫恩勘議錫恩言灌口非可行河之地北岸無可改河之理不敢輕議更張漕船仍由中河灌塘上然之更命侍郎成剛順天府尹李德會勘六月決中牟水趨朱仙鎮歷通許扶溝太康入渦會淮復遣敬徵等赴勘以鍾祥為東河總督鴻荃督工旋以尚書麟魁代敬徵二十四年正月大風壩工蟄動旋東壩連失五占麟魁等降黜有差仍留工督辦七月上以頻年軍餉河工一時並集經費支絀意欲緩至明秋興築鍾祥等力陳不可十二月塞用帑千一百九十餘萬二十九年六月決吳城十月命侍郎福濟履勘會同堵合咸豐元年閏八月決豐北下汛三堡大溜全掣正河斷流時侍郎瑞常典試江南命試竣便道往勘又命福建按察使查文經馳赴會辦三年正月豐北三堡塞敕建河神廟從河督楊以增請也五月大雨水長溜急豐北大壩復蟄塌三十餘丈上責以增及承修各員加倍罰賠五年六月決蘭陽銅瓦廂奪溜由長垣東明至張秋穿運注大清河入海正河斷流上念軍務未平餉糈不繼若能因勢利導使黃流通暢入海則蘭陽決口即可暫緩堵築事下河督李鈞察奏鈞旋陳三事曰順河築埝東西千餘里築隄所費不資何敢輕議除河近城垣不能不築堤壩以資抵禦餘擬就漫水所及酌定埝基勸民接築高不過三尺水小藉以攔阻水大聽其漫過散水無力隨漫隨淤地面漸高且變沙磧為沃壤矣曰遇灣切灘河性喜坐灣每至漲水遇灣則怒而橫決惟於坐灣之對面勸令切除灘嘴以寬河勢水漲即可刷直就下愈暢並可免兜灘沖決之虞曰堵截支流現在黃流漫溢既不能築堅隄以束其流又不能挑引河以殺其勢宜乘冬令水弱溜平勸民築壩斷流再於以下溝槽跨築土格高出數尺漫水再入上無來源下無去路冀漸淤成平陸東撫崇恩亦以為言上令直隸山東河南各督撫妥為勸辦十一年御史薛書堂言南河自黃水改道下游已無工可修請省南河總督及廳員下廷臣議侍郎沈兆霖言導河始自神禹九河故道皆在山東入海處在今滄州是禹貢之河固由東北入海自漢王莽時河徙千乘入海而禹之故道失歷東漢迄隋唐從無變異宋神宗時河分南北兩派並行北派由北清河入海即今大清河至元至元間會通河成懼河北行礙運而北流塞歷今五六百年河屢北決無不挽之使南說者謂河一入運必挾泥沙以入海而運道亦淤故順河之性北行為宜乾隆朝孫嘉淦請開減河入大清河一疏言之甚詳足破北行礙運之疑夫河入大清由利津入海正今黃河所改之道現在張秋以東自魚山至利津海口皆築民堰惟蘭儀之北張秋之南河自決口而出奪趙王河及舊引河泛濫平原田廬久被淹浸張秋高家林舊堰殘缺過多工程最巨如東明長垣菏澤鄆城其培築較張秋為易宜乘此時順水之性聽其由大清河入海諭令紳民力籌措辦或應開減河或應築堤堰統於水落興工河慶順軌民樂力田缺額之地丁可復歷年之賑濟可停就此裁去南河總督及廳員可省歲帑數十萬而歸德徐淮一帶地幾千里均可變為沃壤逐漸播種升科似亦一舉而兼數善者矣下直督恆福東撫文煜豫撫慶廉東河總督黃贊湯勘議六月省南河總督及淮揚淮海豐北蕭南宿南宿北桃南桃北各道廳改置淮揚徐海兵備道兼轄河務同治二年復省蘭儀儀睢睢寧商虞曹考五廳六月漫上南各廳屬水由蘭陽下注直東境內涸出村莊復被淹沒菏澤東明濮范齊河利津等州縣水皆逼城下署河督談廷襄上言河已北行攔水惟恃民埝從未議疏導恐漸次淤墊海口稍有扞格阻滯事更為難查濮范一帶舊有金堤前臣任東撫時設法修築未久復被沖缺上游毗連直隸開州處亦有沖缺開州不修濮范築亦無益東長之埝開濮之堤須設法集資督民修築庶可以衛城池而保廬墓此外既未專設河員要在沿河地方官督率修理並勸助裒集以助民力之不逮請飭下直督東撫迅將蘭陽下游漫溢地方揀員會同該州縣妥辦從之十二月又言今年夏秋陰雨來源之盛迥異尋常一股直下開州一股旁趨定陶曹單豫省以有堤壩幸獲保全直東則無不能不聽其泛濫迄今半載直隸未聞如何經畫開州缺口亦未興工至山東被害尤深或欲培築堤埝或欲疏濬支河議無一定濮州金堤亦因開未動工不能興辦瞬屆春汛何以禦之臣遣運河道宗稷辰履勘直至利津之鐵門關測量水勢深至六七丈去路不為不暢而上游仍到處旁溢則大清河身太狹不能容納之故如蒲臺齊東濟陽長清平陰肥城民埝缺口寬數丈或數十丈不下三四十處不加修築則來歲依然漫淹是欲求下游永奠必先開支渠以減漲水而後功有可施必將附近徒駭馬頰二河設法疏濬庶水有分泄再堵各缺口並築壩以護近水各城垣此大清河下游之當先料理者也至開濮金堤及毗連菏澤之史家隄當先堵築並加培舊堰擇要接修此大清河上游之當先經畫者也復下直督劉長佑東撫閻敬銘會籌明年三月以濮州當河衝允敬銘請移治舊城並築堤捍禦五年七月決上南廳胡家屯長佑言溜勢趨重西北新修金隄概被沖刷開州沖開支河數道自開滑之杜家寨至開濮界之陳家莊險工五段長九千六百餘丈均須加厚培高方資捍禦惟上游在豫下游在東非直隸一省所能辦理應會同三省統籌全修再行設汛撥款備料庶可一勞永逸自河流改道直隸隄工應並歸河督管轄作豫直東三省河督以專責成疏入命河督蘇廷魁履勘會同三省督撫籌議七年六月決滎澤十堡又漫武陟趙樊村水勢下注潁壽入洪澤湖侍郎胡家玉言不宜專塞滎澤新口疏蘭陽舊口宜仿古人發卒治河成法飭各將領督率分段挑濬舊河一律深通然後決上游之水掣溜東行庶河南之患不移於河北治河即所以治漕下直督曾國藩鄂督李瀚章江督馬新貽漕督張之萬及河督江蘇河南山東安徽各巡撫妥議國藩等言以今日時勢計之河有不能驟行規復者三蘭陽漫決已十四年自銅瓦廂至雲梯關以下兩岸堤長千餘里歲久停修堤塌河淤今欲照舊時挑深培高恐非數千萬金不能蕆事且廳營久裁兵夫星散一一復設仍應分儲料物廂辦掃壩並預籌防險之費又歲須數百萬金當此軍務初平庫藏空虛安從籌此巨款一也滎澤地處上游論形勢自應先堵滎澤蘭工勢難並舉使滎口掣動全黃則蘭工可以乾涸今滎口分溜無多大溜仍由蘭口直注利津入海其水面之寬跌塘之深施工之難較之滎工自增數倍滎工堵合無期蘭工更無把握原奏決放舊河掣溜東行似言之太易且瞬交春令興工已難二也漢決酸棗再決瓠子為發卒治河之始元明發丁夫供役亦以十數萬計現在直東江豫捻氛甫靖而土匪游勇在在須防所留勇營斷難盡赴河干亦斷不敷分挑之用若再添募數十萬丁夫聚集沿黃數千里間駕馭失宜滋生事端尤為可慮三也應俟國庫充盈再議大舉因時制宜惟有趕堵滎工為保全豫皖淮揚下游之計上然之八年正月滎澤塞十年八月決鄆城侯家林東注南旺湖又由汶上嘉祥濟寧之趙王牛朗等河直趨東南入南陽湖時廷魁內召命新河督喬松年會同東撫丁寶楨勘辦寶楨方以病在告乃偕護撫文彬至工相度文彬言河臣遠在豫省若往返咨商恐誤要工一面飛咨河臣遴派掌壩並管理正雜料廠員辨及諳習工程之辨兵工匠帶同器具於年內來東一面由臣籌購應需料物以期應手上責松年剋期興工松年言已飭原估委員並熟習工程人員赴東聽遣並飭購備竹纜及覓雇捆鑲船隻備提用惟已交立春春水瞬生辦工殊無把握並移書文彬主持其事文彬不能決寶楨力疾視事上言河臣職司河道疆臣身任地方均責無旁貸乃松年一概諉之地方不知用意所在現在已過立春若再候其的信以定行止恐誤要工且此口不堵必漫淹曹兗濟十餘州縣若再向南奔注則清淮𩹉下河更形喫重松年既立意諉卸臣若避越俎之嫌展轉遷延實有萬趕不及之勢惟有力疾銷假親赴工次擇日開工俟松年所遣員辨到工即責成該工員等一手經理剋期完工保全大局應請破格保奬以昭激勸倘敢陽奉陰違有心貽誤一經驗實應請便宜行事即將該員辨正法工次以為罔上殃民者戒上嘉其勇於任事並諭松年當和衷共濟不遽加責也十一年二月侯家林塞豫寶楨優先是同知蔣作錦條上河運事宜朝廷頗韙其議下河漕撫臣議奏未幾侯家林決松年寶楨意見齟齬及寶楨塞侯家林松年上言作錦所陳卓然有見可以采取並稱東境黃水日愈泛濫運道日愈淤塞宜築隄束黃先堵霍家橋諸口並修南北岸長隄俾黃趨張秋以濟運挑濬張秋迤南北淤塞修建閘壩以利漕行上以松年意在因勢利導不為無見令寶楨文彬詳議毋固執己見旋覆稱目前治黃之法不外堵銅瓦廂以復淮徐故道與東省築隄即由利津入海兩策顧謂二者之中以築堤束黃為優而上下游均歸緩辦臣實未見其可自銅瓦廂至牡蠣嘴計千三百餘里創建南北兩隄相距牽計約須十里除現在淹沒不計外尚須棄地數千萬頃其中居民不知幾億萬作何安插是有損於財賦者一也東省沿河州縣自二三里至七八里者不下十餘若齊河齊東蒲台利津皆近在臨水築堤必須遷避是有難於建置者二也大清河近接泰山麓山陰水悉北注除小清溜瀰諸河均可自行入海餘悉以大清河為尾閭置堤束黃以後水勢撎高向所泄水之處留閘則虞倒灌堵遏則水無所歸是有妨於水利者三也東綱鹽場坐落利津霑化壽光樂安等縣濱臨大清河兩岸自黃由大清入海鹽船重載溯行於湍流甚形阻滯而灘地間被漫溢産鹽日絀海灘被黃淤遠納潮甚難東綱必至隳廢私梟亦因而𧔧起是有礙於鹺綱者四也臣寶楨身任地方於通省大局所關固宜直陳無隱然使於治運漕果有把握則京倉為根本至計猶當權利害之輕重而量為變通臣等熟思審計實未見其可恃而深覺其可慮似仍以堵合銅瓦廂使復淮徐故道為正辦並陳四便御史游百川亦言河運並治宜詳籌妥辦疏入廷議不能決下直督李鴻章鴻章因遣員周歷齊豫徐海訪察測量期得要領十二年六月上言治河之策原不外恭親王等審地勢識水性酌工程權利害四語而尤以水勢順逆為要現在銅瓦廂決口寬約十里跌塘過深水涸時猶逾一二丈舊河身高決口以下水面二三丈不等如欲挽河復故必挑深引河三丈餘方能吸溜東趨查乾隆間蘭陽青龍岡之役費帑至二千餘萬阿桂言引河深至丈六尺人力無可再施今豈能挑深至三丈餘乎十里口門進占合龍亦屬創見國初以來黃河決口寬不過三四百丈且屢堵屢潰常閲數年而不成今豈能合龍而保固乎且由蘭陽下抵淮徐之舊河身高於平地三四丈年來避水之民移住其中村落漸多禾苗無際若挽地中三丈之水跨行於地上三丈之河其停淤待潰危險莫保情形有目者無不知之歲久隄乾即加修治必有受病不易見之處萬一上游放溜下游旋決收拾更難議者或以河北行則穿運為運道計終不能不強之使南以會清口臣查嘉慶以後清口淤墊夏令黃高於清已不能啓壩送運道光以後禦黃壩竟至終歲不啓遂改用灌塘之法自黃浦泄黃入湖湖身頓高運河水少灌塘又不便遂改行海運今即能復故道亦不能驟復河運非河一南行即可僥幸無事此淮徐故道勢難挽復且於漕運無益之實在情形也至河臣所請就東境束黃濟運一節查清口淤墊即借黃濟運之病今張秋運河寬僅數丈兩岸廢土如山若引重濁之黃以閘壩節宣用之水勢撎高其淤倍速人力幾何安能挑此日進之沙且所挑之沙仍堆積於積年廢土之上兩淋風蕩河底日高閘亦壅塞久之黃必難引明弘治中荊龍口銅瓦廂屢次大決皆因引黃濟張秋之運遂致導隙濫觴臨清地勢低於張秋數丈而必以後無掣溜奪河之害臣亦不敢信也至霍家橋堵口築隄工尤不易該處本非決口乃大溜經行之地兩頭無岸一望浮沙並無真土可取勉強堆築節節逼溜下注恐浮沙易塌實足攖河之怒而所耗實多一遭潰決水仍別穿運道而不專會張秋豈非全功盡棄至作錦擬導衛濟運原因張秋以北無清水灌運故為此議查元村集迤南有黃河故道地多積沙施工不易且以全淮之水不能敵黃尚致倒灌停淤豈一清淺之衛遂能禦黃濟運耶其意蓋襲取山東諸水濟運之法不知泰山之陽水皆西流因勢利導十六州縣百八十泉之水源旺派多自足濟運衛水來源甚弱最順今必屈曲使之南行勢多不便此借黃濟運及築隄束水均無把握與導衛濟運之實在情形也惟河既不能挽復故道則東境財賦有傷水利有礙城池難以移置鹽場間被漫淹如寶楨所陳誠屬可慮臣查大清河原寬不過十餘丈今已刷寬半里餘冬春水涸尚深二三丈岸高水面又二三丈是不汛時河槽能容五六丈奔騰迅疾水行地中此人力莫可挽回之事亦祀禱以求而不可得之事目下北岸自齊河至利津南岸齊東蒲台皆接築民埝雖高僅丈許詢之土人遇盛漲出槽不過數尺尚可抵禦岱陰繡江諸河亦經擇耍築隄汛至則漲汛過則消受災不重至齊河濟陽齊東蒲臺利津各城近臨河岸十九年來幸防守無患以後相勢設施若驟議遷徙經費無籌民情難喻無此辦法東省鹽場在海口者雖受黃淤産鹽不旺經撫臣南運膠濟之鹽時為接濟引地無虞淡食惟價值稍昂耳河在東省固不能無害但得設法維持尚不至為大患昔乾隆中銅山決口不能成功孫嘉淦曾有分河入大清之疏其後蘭陽大工屢敗垂成嵇璜又有改河大清之請此外裘曰修錢大昕胡宗緒孫星衍魏源諸臣議者更多其時河未北流尚欲挽之使北今河自北流乃欲挽使南流豈非拂逆水性大抵南河堵築一次通牽約七八百萬歲修約七百餘萬實為無底之壑今河北徙近二十年未有大變亦未多費巨款比之往代已屬幸事且環拱神京尤得形勝自銅瓦廂東決粵捻諸逆竄擾曹濟幾無虛日未能過河一步而北岸防守有所憑依更為畿輔百世之利此兩相比較河在東雖不亟治而後患稍輕河回南即能大治而後患甚重之實在情形也近世治河兼言治運遂致兩難卒無長策臣愚以為天庾正賦以蘇浙為大宗國家治安之道尤以海防為重今沿海洋舶駢集為千古創局已不能閉關自治正不妨借海運轉輸之便逐漸推廣以擴商路而實軍儲蘇浙漕糧現既統由海運臣前招致華商購造輪船搭運漸有成效由海船解津較為便速至海道雖不暢通河務未可全廢此時治河之法不外古人因水所在增立隄防一語查北岸張秋以上有古大金堤可恃以為固張秋以下岸高水深應由東撫隨時飭將民埝保護加培至侯家林上下民埝應倣照官堤辦法一律加高培厚更為久遠之計又銅瓦廂決口水勢日向東坍刷久必泛濫南趨請飭松年察看形勢量築堤埝與曹州之堤相接俾資周防而期順軌至南河故道千餘里居民占種豐收並請查明升科以免私墾爭奪之患疏入議乃定是年夏秋決開州焦丘濮州蘭莊又決東明之嶽新莊石莊戶民埝分溜趨金鄉嘉祥宿遷沭陽入六塘河寶楨勘由鄆城張家支門築隄堵塞旋乞假展墓十三年春溜益南趨潰漫不可收拾江督纍章告災九月寶楨回任改由菏澤賈莊建壩十二月興工光緒元年三月東明決塞並築李連莊以下南隄二百五十里時河督曾國荃請設南岸七廳部議俟直東豫籌有防汛的款再定二年春署東撫李元華言黃河南隄自賈莊至東平二百餘里均完固惟上游毗連直豫自東明謝寨至考城七十餘里並無隄岸此工刻不可緩昔年侯家林塞後怵於費多未暇顧問遂至賈莊決口此次賈莊以下堤雖完固上游若不修築設有漫決豈惟前功盡棄河南安徽江蘇仍然受害山東首當其衝無論已臣擬調營勇兼雇民夫築此七十餘里長隄深恐呼應不靈已商直督豫撫協力襄辦至濮范之民自黃河改道昏墊十有餘年賈莊決後稍有生機及賈莊塞受災如故查南隄距北面金隄六七十里以屏蔽京師則可於濮范村莊田畝則不能保衛該處紳民願修北隄惟力有未支請酌加津貼既成以後派辨勇一律修防濮范陽穀壽張東阿五縣地畝可涸出千餘頃又查濮范以上有黃水二道擬於壽張東阿境內新河尾閭抽挑引河二冀歸併一渠於南隄之北黃河之南再立小隄以束水又可涸出地畝千餘頃至北隄上游內有八里係開州轄若不一律修築不惟北堤徒勞無功即畿輔亦難保不受其患已商直督遣員協助妥速蕆功惟所壓直豫地畝該處居民無甚大益而山東百姓受益無窮自應由山東折償地價上游收束既窄下游水溜勢急不可不防自東平至利津海口九百餘里已飭沿河州縣就民堤加培酌給津貼以工代賑各項通計需費二千餘萬此黃河大段擬辦情形也事下所司五年決歷城溞溝明年復決八年決歷城桃園十一月塞九年東撫陳士杰創建張秋以下兩岸大隄時山東數遭河患朝士屢以為言上遣侍郎游百川馳往會勘百川言自來論河者分持南行北行二說臣詳察形勢將來遇伏秋盛漲復折而東自尋故道亦未可知若挽以人力則勢有萬難一則北隄決後已沖刷淨盡築隄進占工已甚巨且全河正流北行中流堵禦以圖合龍必震駭非常辦理殊無把握一則故道旁沙嶺勢難挑動且徐海一帶河身涸出淤地千餘里民盡墾種一旦驅而之他民豈甘心失業此南行之說應無庸議也至大清河本汶濟交會自黃流灌入初猶水行地中今則河身淤墊既患水不能泄自濟河上下北則濟陽惠民濱州利津南則青城章丘歷城至鄒長高博漫決十一處竊惟河入濟瀆已二十八年其始誤於山東無辦河成案誘民自為堤埝縱屢開決未肯形諸奏牘貽患至斯今則泛濫數百里漂沒數百村遍歷災區傷心慘目謹擬辦法三一疏通河道黃初入濟尚能容納淤墊日高至海口尤日形淤塞沙淤水底人力難施計惟多用船隻各帶鐵篦混江龍上下拖刷使不能停蓄日漸刮深疏導之方似無踰此一分減黃流濟一受黃其勢岌岌不可終日查大清河北徒駭最近馬頰較遠鬲津尤在其北大清河與徒駭最近處在惠民白龍灣相距十許里若由此開築減壩分入徒駭河其勢較便再設法疏通其間之沙河寬河屯民等河引入馬頰鬲津分疏入海當不復虞其滿溢一亟築縷堤民間自築縷隄近臨河干多不合法且大率單薄又斷續相間屢經塌陷一築再築民力困竭今擬自長清抵利津南北岸先築縷隄其頂衝處再築重隄約長六百餘里仍借民力加以津貼可計日成功為民捍患民自樂從至謂治水不與水爭地其法無過普築遙隄然濟武兩郡地狹民稠多占田畝小民失業正非所願且其間村鎮廬墓不可數計兼之齊河濟陽齊東蒲台利津皆城臨河干使之實逼處此民情未免震駭價買民田需款不下四五百萬工艱費巨可作緩圖臣所以請築縷隄以濟急而不敢輕持遙隄之議者此也士杰持異議會海豐人御史吳峋言徒駭馬頰二引河不可輕開命直督李鴻章偕士杰會勘亦如峋言乃定議築兩岸長隄是年決利津十四戶十年三月塞閏五月決歷城河套圈霍家溜齊河李家岸陳家林蕭家莊利津張家莊十四戶先後塞之是年兩岸大堤成各距河流數百丈即縷隄也而東民仍守臨河埝有司亦諭令先守民埝如埝決再守大隄而隄內村廬未議遷徙大漲出槽田廬悉淹居民遂決隄泄水官亦不能禁嗣是只守埝不守大隄矣十一年蕭家莊溞溝再決又決齊河趙莊十二月溞溝趙莊塞明年二月蕭家莊塞六月再決河套圈又決濟陽王家圈惠民姚家口章丘河王莊壽張徐家沙窩惟王家圈工緩辦餘皆年內塞東境河雖屢決然皆分溜少奪溜每堵築一次費數萬或數十萬多亦不過一二百萬較南河時所省正多被淹地畝亦較少地平水緩故也十三年六月決開州大辛莊水灌東境濮范壽張陽穀東阿平陰禹城均以災告八月決鄭州奪溜由賈魯河入淮直注洪澤湖正河斷流王家圈旱口乃塞鄭州既決議者多言不必塞宜乘此復故道戶部尚書翁同和工部尚書潘祖蔭同上言河自大禹以後行北地者三千六百餘年南行不過五百餘年是河由雲梯關入海本不得謂故道即指為故道而現在溜注洪澤湖形北高南下不能導之使出清口去故道尚百餘里其勢斷不能復或謂山東數被水害遂以河南行為幸不知河性利北行自金章宗後河雖分流有明一代北決者十四南決者五我朝順康以來北決者十九南決者十一況淮無經行之渠黃入淮安有歸宿之地下流不得宣泄上游必將復決決則仍入東境山東之患仍未能弭至黃水南注有二大患五可慮黃注洪澤而淮口淤墊久不通水僅張福口引河闊不過數丈大溜東注以運河為尾閭僅恃東隄為護已岌岌可危今忽加一黃河必不能保大患一洪澤淤墊高家堰久不可恃黃河勢悍入湖後難保不立時塌卸不東衝𩹉下河即南灌揚州江淮河漢併而為一東南大局何堪設想大患二𩹉下河為産米之區萬一被淹漕米何從措辦可慮一即令漕米如故或因黃挾沙墊運不能浮送或因積水漫溢縴道無存漕艘停滯且山東本借黃濟運黃既遠去沂汶微弱水從何出河運必廢可慮二兩淮鹽場胥在范公隄東范隄不保鹽場淹沒國課何從徵納可慮三潁壽徐海好勇鬬狠小民蕩析難保不生事端可慮四黃汛合淮勢不能局於湖瀦必別尋入海之道橫流猝至江鄉居民莫保旦夕可慮五至入湖之水亦須早籌宣泄𩹉下河地勢西北俯東南仰宜順其就下之勢由興化以北歷朦朧傅家塢入舊河避雲梯關淤沙北濬大通口入潮河以達淮河海口則取徑直形勢便經費亦不過巨上命江督曾國荃漕督盧士杰籌議適國荃士杰亦言捍河匯淮東下其危險百倍尋常查治水不外宣防二策而宣之用尤多洪湖出路二皆由運入江今大患特至不能不於湖之上游多籌出路分支宣泄博採羣議桃源有成子河南接洪湖北至舊河又北為中運河若加挑成子河使通舊河直達中運河兩岸築隄即可引漫水由楊莊舊河至雲梯關入海此洪湖上面新闢一去路也清河有碎石河西接張福口引河東達舊河大加挑挖亦可引漫水由楊莊舊河至雲梯關入海此洪湖下面新闢一去路也詢之耆舊僉謂舍此別無良法是以臣等議定即勘估興工不敢拘泥成規往返遷延致誤事機上韙之並遣前山西布政使紹諴降調浙江按察使陳寶針前山東按察使潘駿文迅赴鄭工隨同河督成孚豫撫倪文蔚襄理河務時工賑需款巨且急戶部條上籌款六事一裁防營長夫一停購軍械船隻機器一停止京員兵丁米折銀一酌調附近防軍協同工作一令鹽商捐輸給奬一預徵當商匯號稅銀議上詔裁長夫捐鹽商及預徵稅銀餘不允九月命禮部尚書李鴻藻偕刑部侍郎薛允升馳勘鴻藻留督工時黃流漫溢河南州縣如中牟尉氏扶溝鄢陵通許太康西華淮寧祥符沈丘鹿邑多被淹浸水深四五尺至一二丈特頒內帑十萬並截留京餉三十萬賑撫而河工需款急允御史周天霖李世琨請特開鄭工新捐例奪成孚職以李鶴年署河督十月東撫張曜言山東河淤潮高黃流實難容納請乘勢規復南河故道下鴻藻鶴年議鴻藻等遂請飭迅籌合辦上以黃河籌復故道迭經臣工條奏但費巨工繁斷難於決口未堵之先同時並舉此奏於故道宜復止空論其理語簡意疏一切利害之輕重地勢之高下工用之浩大時日之迫促並未全局通籌縷晰奏覆如此大事朝廷安能據此寥寥數語定計決疑故道一議可暫從緩至所稱一切工作先自下游開辦南河舊道現在情形如何工程能否速辦經費能否立籌有無滯礙著國荃士杰嵩駿迅速估奏國荃言黃流東注淮南北地處下游宜籌分泄之策請就楊莊以下舊河二百餘里挑濬以分沂泗之水騰出中運河預備洪河盛漲挾黃北行堪以容納是上游籌有去路而淮由三河壩直趨而東則運堤極為喫重勢不能不開壩宣泄𩹉下河如臨釜底而枝河頗多若預先疏導使水能順軌則田廬民命亦可保全同和祖蔭所言洵得水性就下之勢業經遣員履勘並請調熟悉河工之江蘇臬司張富年督理制可先是侍郎徐郙有通籌黃河全局之疏文蔚言郙所陳口門北岸上游酌開引河上南廳以下河內挑川字河及築排水壩三者皆河南必辦之事即前人著效之法臣前請於河身闊處切灘疏淤即郙酌開引河及川字河之意河員以近日河勢略變須更籌辦法且有引河不可挑之說而此項土夫皆係應賑之人無論何工皆係應辦之事將來或幫挑運河或幫築河身應就商河臣隨時調度報聞十二月國荃士杰言同和等所陳二患五慮不啻身歷其境將臣等所欲言者代達宸聰當經派員分投履勘自傅家塢入舊黃河過雲梯關至大通口測量地勢北高丈五七尺揆諸就下之性殊未相宜不敢不恪遵聖訓於興化境內別籌疏淤查下河入海河道以新陽射陽兩河為最鬬龍港次之祗以支河阻塞未能通暢查興化屬之大圍閘丁溪場屬之古河口小海均極淤淺疏濬以後如果高郵開壩可冀水皆順軌由新陽等河宣暢歸海其閘門窄狹過水不暢者另於左右開挖越河俾得滔滔直注此外幹支各河再接續擇要興挑以期逐節通暢核與同和祖蔭之奏事異功同十四年正月國荃等又言徐郙通籌河局疏稱淮揚實無處位置黃河宜先籌宣泄之方再求堵合之法洵屬確中肯綮至請挑天然及張福口引河本係由淮入黃咽喉昔人建導淮之議皆從引河入手祗以張福淤墊太高挑不得法且恐沂泗倒灌又順清河為清江三閘來源曩時堵築以資自衛自河北徙此壩久廢今既引淮入黃仍須堵築順清壩庶三閘可保無虞經臣等派員審度河底雖北高南低加工挑深尚可配平順清河雖水深溜急多備料土亦可設法堵築又經臣士杰履勘陳家窰可開引河上接張福口下達吳城七堡與碎石河功用相同已於十月分段興挑自張福口內窰河起至順清河止開深丈四尺至二丈冀上游多泄一分之水下河即少受一分之災其工段亦間調哨勇幫同挑濬以補民夫之不足以上辦法與該侍郎所陳江南數條不謀而合先是上以將來河仍北趨有趁湍流驟減挑濬東明長隄開州河身加培堤埝之諭至是鴻章言直境黃河長八九十里一律挑濬工巨費煩即酌挑北面數處亦需二三十萬兩岸河灘高於中洪一二丈河身尚可容水惟東明南隄歷年衝刷亟應擇要修築已調派大名練軍春融赴工並募民夫同時力作開州全隄殘缺已甚亦經派員估修至長垣南岸小堤離河較遠尚可緩辦北岸民埝飭勸民間修培不得逼束河流致礙大局六月小楊莊塞是月鴻藻言鄭工兩壩共進占六百一十四丈尚餘口門三十餘丈因伏秋暴漲人力難施請緩俟秋汛稍平接續舉辦上嚴旨切責褫鶴年職與成孚並戍軍台鴻藻文蔚均降三級留任以廣東巡撫吳大澄署河道總督大澄言醫者治病必考其致病之由病者服藥必求其對症之方臣日在河干與鄉村父老咨詢舊事證以前人紀載知豫省河患非不能治病在不治築隄無善策鑲掃非久計要在建壩以挑溜逼溜以攻沙溜入中洪河不著隄則堤身自固河患自輕廳員中年久者僉言咸豐初滎澤尚有磚石壩二十餘道隄外皆灘河溜離隄甚遠就壩築掃以防險而堤根之掃工甚少自舊壩失修不數年廢棄殆盡河勢愈逼愈近掃數愈添愈多廳員救過不遑顧此失彼每遇險工輒成大患河員以鑲掃為能事至大溜圈注不移旋鑲旋蟄幾至束手臣親督道廳趕拋石垛三四丈深之大溜投石不過一二尺溜即外移始知水深溜激惟拋石足以救急其效十倍掃工以石護溜溜緩而掃穩歷朝河臣如潘季馴靳輔栗育美皆主建壩挑溜良不誣也現以數十年久廢之要工數十道應修之大壩非一旦所能補築竣工惟有於鄭工款內核實撙節省得一萬即多購一萬之石垛省得十萬即多做十萬之壩工雖係善後事宜趁此乾河修築人力易施否則鄭工合龍後明年春夏出險必至措手不及雖不敢謂一治而病即愈特愈於不治而病日增果能對症發藥一年而小效三五年後必有大效上嘉勉之大澄又言向來修築壩垛皆用條磚碎石每遇大汛急溜壩根淘刷日深不但磚易衝散重大石塊亦即隨流坍塌聞西洋有塞門德土拌沙黏合不患水侵趁此引河未放各處須築挑壩正在河身乾涸之時擬於磚面石縫試用塞門德土塗灌斂散為整可使壩基做成一片足以抵當河溜用石少而工必堅似亦一勞永逸之法報聞十二月鄭工塞用帑千二百萬實授大澄河督詔於工次立河神廟並建黃大王祠賜扁額與黨將軍俱加封號是年七月決長垣范莊未幾塞十五年六月決章丘大寨莊金王莊分溜由小清河入海又決長清張村齊河西紙坊山東濱河州縣多被淹浸是冬塞十六年二月東撫張曜言前南總河轄河工九百餘里東總河轄五百餘里自決銅瓦廂河入山東遂裁南總河而東河所轄河工僅二百餘里今東河縣長九百里日淤日高全恃隄防為保衛本年臣駐工二百餘日督率修防日不暇給請將自菏澤至運河口河道二百餘里歸河督轄與原轄之河道里數相等部議以此段工程向由巡撫督率地方官兼管河督恐呼應不靈曜又言向來沿河州縣本歸河臣兼轄員缺仍會河臣題補遇有功過河臣亦應舉劾尚無呼應不靈之患請並下河督籌議先是大澄遣員測繪直東豫全河至是圖成上之五月決齊河高家套旋塞十八年六月決惠民白茅墳奪溜北行直趨徒駭入海又決利津張家屋濟陽桑家渡及南關灰壩俱匯白茅墳漫水歸徒駭河七月決章丘胡家岸夾河以內一片汪洋遷出歷城章丘濟陽齊東青城濱州蒲臺利津八縣災民三萬三千二百餘戶初河督許振禕請於歲額六十萬內提十二萬歸河防局籌添料石先事預防由河督主之至是部令分案題銷振禕言河工大險恃法不如用人如以恃法論則從來報銷例案工部知之河工亦知之故自每年添款及鄭工報銷之千數百萬未聞其不合例也如以用人論則臣近此改章從事比年大險橫生亦均次第搶補幸奏安瀾至添料添石固有不盡合例者矣原臣立河防局意有二端一則恐廳員遇險推諉藉口無錢無料故提此巨款先事預防之資一則恐廳員不實不盡故添委官紳臨時匡救之用而限十二萬纖悉到工不准絲毫入局並不准開支薪水河南官紳吏民罔不知之即如今歲之得保巨險就買石一款已用過十一萬數千兩餘則補鄭工金門沈裂之隄此不能分案題銷者也又多方買石隨處搶堵險未平必加拋險已過即停止此不能繪圖貼說者也上如所請行是年白茅墳各口塞二十一年六月決壽張高家大廟齊東趙家大隄未幾決濟陽高家紙坊利津呂家窪趙家園十六戶是冬次第塞明年六月決利津西韓家陳家御史宋伯魯條上東河積弊一冒領矇銷宜嚴定處分一收發各料宜設法稽查一申明賠修舊例以防隨意改名一武辨宜認真巡察詔東撫嚴除積弊並令有河務各督撫查察遇有劣員嚴參懲辦二十三年正月決歷城小沙灘章丘胡家岸隨塞十一月淩汛決利津姜家莊扈家灘水由霑化降河入海二十四年六月決山東黑虎廟穿運東泄仍入正河又決歷城楊史道口壽張楊家井濟陽桑家渡東阿王家廟分注徒駭小清二河入海遣鴻章偕河督任道鎔東撫張汝梅會勘未幾省東河總督尋復置二十五年二月鴻章等言山東黃河自銅瓦廂改道大清河以來時當軍興未遑修治同治季年漸有潰溢始築上游南隄光緒八年後潰溢屢見遂普築兩岸大隄乃民間先就河涯築有小埝緊逼黃流大隄成後復勸民守埝且有改為官守者於是隄久失修每遇泛漲埝決水遂建瓴而下隄亦隨決此歷來失事病根也上游曹兗屬南北隄湊長四百餘里兩隄相距二十里至四十里民埝偶決水由隄內歸入正河大決則隄亦不保計南北埝工二十四同治以來決僅四五見此上游情形也中游濟泰屬兩岸隄埝各半湊長五百里南岸上段傍山無隄下段守埝北岸上守堤下守埝參差不一無非為隄內村莊難遷權為保守計下游武定屬南岸全守隄北岸全守埝湊長五百餘里地勢愈平水勢愈大險工七十餘處二十五年來已決二十三次此中下游情形也東省修防事本草創間有興作皆因費絀未按治河成法前撫臣李秉衡歷陳山東受河之害治河之難謂近幾無歲不決無歲不數決朝廷屢糜巨金閭閻終無安歲若不按成規大加修治何以仰答愛養元元之意臣等詳考古來治河之法惟漢賈讓徙當水衝之民讓地於水實為上策前撫臣陳士杰建築中下游兩岸大隄湊長千里兩堤相距五六里至八九里就此加培修守似不失為中策惟先有棄隄守埝處如南岸濼口上下守埝者百一十里上段近省六十里商賈輻輳近險工稍平暫緩推展下段要險極多十餘年來已決九次擬遷出埝外二十餘村棄埝守隄離水稍遠防守易固此南岸酌擬遷民廢埝辦法也至北岸隄工自長清至利津四百六十里埝外堤內數百村莊長埝逼近湍流河面太狹無處不灣無灣不險河脣淤高埝外地如釜底各村斷不能久安室家且埝破隄必破欲保埝外數百村併隄外數千村同一被災尤覺非計但小民安土重遷屢被沈災不肯遠去非可旦夕議定今擬北岸自長清官莊至齊河六十餘里河面尚寬利津至鹽窩七十餘里地皆斥鹵不便徙民均以埝作隄埝外之民無庸遷徙其齊河至利津尚有三百二十里民埝緊逼河干竟有不及一里者勢不得不廢埝守堤但北隄殘缺多半無可退守且需款過巨遷民更難應暫守舊埝此北岸分別守埝作隄及將來再議廢埝守隄辦法也至南北大隄為河工第一重大關係既處處卑薄擬並改埝之隄及暫定之民埝照河工舊式一律修培總期足禦汛漲至下口入海尾閭尤關全河大局查鐵門關故道尚有八十餘里愈下愈寬深直通海口形勢較絲網口韓家垣為順工費亦較省然建攔河大壩挑引河築兩岸大隄需費頗巨下口不治全河皆病不得不核實勘估此又加培兩岸隄工改正下口辦法也約估工費需九百三十萬有奇分五六年可告竣朝議如所請先發帑百萬交東撫育賢督修育賢言黃河治法誠如部臣所云展寬河面盤築隄身疏通尾閭三事為扼要查尾閭之害以鐵板河為最全河挾沙帶泥到此無所歸束散漫無力經以風潮膠結如鐵流不暢則出路塞而橫流多故無十年不病之河擬建長隄直至淤灘防護風潮縱不能徑達入海而多進一步即多一步之益至隄埝卑薄擬修培時土方必足夯硪必堅尤加意保守其坐灣處一灣一險如上游賈莊孫家樓中流坰家岸霍家溜桑家渡下游白龍潭北鎮家集鹽窩均著名巨險餘險尤多固非裁灣取直不可然亦須相度形勢必引河上口能迎溜勢下口直入河心方得蒲臺迤西魏家口至迤東宋莊約長四十里河水分流納正河之溜三分之若就勢修隄建壩挑溜使歸北河正河如淤蒲臺城垣永免水患此裁灣取直之最有益者擬即勘估興辦報聞二十六年拳匪亂作未續請款嗣時局日艱無暇議及河防矣是年淩汛決濱州張肖堂家明年三月塞六月決章丘陳家窰惠民楊家大堤隨塞黃河之初北徙也忠親王僧格林沁有裁總河之請嗣東河改歸巡撫兼轄河督喬松年復以為請至是河督錫良言直東河工久歸督撫管轄豫撫本有兼理河道之責請仿山東成案改歸兼理而省東河總督制可二十八年夏決利津馮家莊秋決惠民劉旺莊逾年二月劉旺莊塞六月決利津寧海莊十二月塞三十年正月淩汛決利津王莊扈家灘姜莊馬莊隨塞六月河溢甘肅皋蘭淹沒沿灘村莊二十餘又決山東利津薄莊淹村莊鹽窩各二十餘先是山東屢遭河患當事者皆就水立隄隨灣就曲水不暢行張秋以下隄卑河窄又無石工幫護利津以下尾閭改向南形勢益不順巡撫周馥請帑三百萬略事修培部臣靳不豫不得已自籌二十萬添購石料又給資遷利津下民之當水衝者而民徙未盡又於隄南增建大堤以備舊隄壞民有新居可歸至薄莊決水東北由徒駭河入海馥言舊河淤成平陸若依舊堵合估須九十萬有奇巨款難籌且堵合之後防守毫無把握漫口以下水深丈餘至二三丈奔騰浩瀚就下行疾入徒駭後勢益寬深較鐵門關韓家垣絲網口尤暢達與其逆水之性耗無益之財救民而終莫能救不如遷民避水不與水爭地而使水與民各得其所依此而行其益有三尾閭通順流暢消速益一舟楫便利商貨流通益二河流順直險輕費省益三所省堵築費猶不計也然補救之策費財亦有三一遷民之費二築埝之費三移設鹽垣之費約需五十萬金較堵築費省四之三而受益過之制可遂不堵嗣是東河安瀾數年未嘗一決宣統元年決開州孟民莊明年塞三年東撫孫寶琦言自黃入東省河道深通初無修防積久淤溢始築民埝緊逼黃流嗣經普築大隄而復令民守埝埝有漫決官無處分直東兩省定例皆然元年開州決水循東省上游埝外隄內下注至中游始歸正河濮范壽張受災甚重臣會商直督遣員協款堵築上年始告成功如能通籌分別勘治改歸官守上游橫決為患何堪設想臣昔隨李鴻章來東勘河時比工程司建議築隄伸入海深處為最要辦法卒以費巨不果如由主治者統籌經費分年築隄藉束水為攻沙之計再酌購外洋挖泥輪機往來疏濬尾閭可望深通全局皆受其益河工為專門之學非久於閲歷不能得其奧竅亟宜仿照豫省定章改定文武額缺為終身官三省互相遷調臣上年設立河工研究所招集學員講求河務原為養成治河人材如設廳汛此項人員畢業即可分別試用於工程大有裨益以上四端必應興辦臣愚以為宜設總河大員歷勘會商將三省常年經費百數十萬統歸應用俟議定大治辦法隨時請撥俾免掣肘而竟事功疏入詔會商直督豫撫通籌未及議覆而武昌變作遂置不行
