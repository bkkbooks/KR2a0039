果工程永固可保民生即費帑千萬不必惜尋請於尖塔兩山間建石壩堵水並改建草塘及條石塊石各塘為大石塘更於舊塘內添築上備塘十二年因堵尖山水口開中小亹引河久未施工責浙督程元章等督辦不力命杭州副都統隆升總理御史偏武佐之五月工竣十三年命南河督嵇曾筠總理塘工曾筠言海寧南門外俯臨江海請先築魚鱗石塘五百餘丈保衛城池下廷臣議行乾隆元年署蘇撫顧琮請設海防道專司海塘歲修事曾筠請於仁寧等處酌建魚鱗大石塘六千餘丈均從之明年建海寧浦兒兜至尖山頭魚鱗大石塘五千九百餘丈四年允浙撫盧焯請築尖山大壩次年秋工竣御製文記之六年左都御史劉統勳言前據閩浙總督德沛請改老鹽倉至章家菴柴塘為石塘廷議準行臣意以為草塘改建不必過急南北岸塘工實不宜緩蓋通塘形勢海寧之潮猶屬往來滌蕩而海鹽之潮則對面直衝其大石塘歲久罅漏尤宜及早補苴臣以大概計之動發七十萬金而通塘可有苞桑之固疏入命統勳會同浙督德沛浙撫常安察勘尋覆稱改建石工誠經久之圖但須寬以時日年以三百丈為率七年總督那蘇圖請先於最險處間段排築石簍俟根腳堅實再建石塘越二年遣尚書訥親勘視疏言仁寧二邑柴塘穩固若慮護沙坍漲無常第將中小亹故道開濬俾潮水循規出入上下塘俱可安堵於是改建石工之議遂寢七月蘇撫陳大受言寶山地濱大海月浦土塘被潮衝刷請建單石壩外加樁石坦坡各百七十丈並接築沙塘使與土塘聯屬中設涵洞宣泄下部議行十一年常安言蜀山迤北有積沙四五百丈橫亙中間先就沙嘴開溝四以引潮水攻刷今伏汛已過南沙坍卸殆盡蜀山已在水中潮汐漸向南趨倘秋汛不復涌沙則大溜竟行中小亹矣報聞十二年常安委員疏濬蜀山一帶用切沙法疏刷十一月朔中小亹引河一夕沖開大溜經由故道南北岸水遠沙長皆成坦途十三年大學士高斌訥親先後奉命查勘塘工斌請於東西柴石各塘後身加築土堰攩護潮頭四月訥親疏陳善後事宜命巡撫方觀承酌議觀承請於北塘北大亹故道及三里橋掇轉廟等處設竹簍滾壩堵禦潮溝大小山墟改建塊石塘南塘各工預籌防護並將右營員辨兵丁調派分汛防駐下廷議允行十六年允巡撫永貴請改建山陰宋家漊土塘為石塘加築坦水十七年巡撫雅爾哈善言中亹山勢僅寬六里浮沙易淤且南岸文堂山腳有沙嘴百三十餘丈挑溜北趨北岸河莊山外亦有沙嘴五十餘丈頗礙中亹大溜現將兩處漲沙挑切疏通俾免阻滯得旨嘉勉十九年因浙省塘工無險省海防道二十一年喀爾吉善言水勢南趨北塘穩固而險工在紹興一帶擬於宋家漊楊柳港照海寧魚鱗大條石塘式建四百丈從之二十三年增築鎮海縣海塘二十六年蘇撫陳宏謀言常熟昭文濱海地方從太倉州境接築土塘嗣開白茆河徐六涇二口建閘啓閉本年潮漲石牆傾圮請改為滾壩得旨允行二十七年帝南巡閲海寧海塘工諭曰朕念海塘為越中第一保障比歲潮勢漸趨北大亹實關海寧錢塘諸邑利害計改老鹽倉一帶柴塘為石而議者紛歧及昨臨勘則柴塘沙性澀汕石工斷難措手惟有力繕柴塘得補偏救弊之一策其悉心經理定歲修以固塘根增坦水石簍以資擁護又諭曰尖山塔山之間舊有石塘朕今見其橫截海中直逼大溜實海塘扼要關鍵就目下形勢論或多用竹簍加鑲或改用木匱排砌如將來沙漲漸遠宜即改築條石壩工俾屹然如砥柱庶北岸海塘永資保障該督撫等其善體朕意動帑儹辦並勒石塔山以志永久二十八年蘇撫莊有恭言江南松太海壖土性善坍華亭寶山向築坦坡皆不足恃應仿浙江老鹽倉改建塊石簍塘詔如所請三十年春帝南巡閲視海寧海塘諭曰繞城石塘實為全城保障塘下坦水祗建兩層潮勢似覺頂衝若補築三層尤資裨益著將應建之四百六十餘丈一律添建三月工竣三十五年巡撫熊學鵬請於蕭山山陰會稽改建魚鱗大石塘帝以潮勢正趨北亹與南岸渺不相涉斥之三十七年巡撫富勒渾疏報中亹引河情形略言潮頭大溜一由蜀山直趨引河一由巖峰山西斜入引河至河莊山中段會合互相撞擊仍分兩路西行隨令員辨於引河中段挑堰溝二十餘道導引潮溜俾復中亹故道諭曰潮汛遷移乃噓吸自然之勢若開穵引河恐徒勞無益止宜實力保衛隄塘以待其自循舊軌不必執意開溝引溜欲以人力勝海潮也四十三年浙撫王亶望疏陳海塘情形命江督高晉會同相度尋疏言章家菴一帶柴工五百丈潮神廟前柴塘三百丈應添建竹簍並排列兩層樁木以防動搖從之四十五年帝南巡幸海寧尖山閲海塘十二月命大學士阿桂南河督陳輝祖赴浙履勘疏言海塘工程應建石塘二千二百丈若改為條石施工易而成事速約計三年可以蕆工又言辦理魚鱗石塘仿東塘之例量地勢高下用十六層至十八層約需三十萬帝命工部侍郎楊魁駐工協辦次年八月竣工四十九年帝幸杭州閲視海塘諭曰老鹽倉舊有柴塘一律添建石塘四千二百餘丈於上年告竣自應砌築坦水保護乃該督撫並未慮及設遇異漲豈能抵禦著將柴塘後之土順坡斜做並於其上種柳俾根株盤結則石柴連為一勢即以柴塘為石塘之坦水至范公塘一帶亦必接建石工方於省城足資鞏護著撥帑五百萬交該督撫核算分限分年修築五十二年工竣嘉慶四年浙撫玉德請改山陰土塘為柴塘十三年浙撫阮元請改蕭山土岸為柴塘十六年浙撫蔣攸銛請將山陰各土塘隄一律建築柴塘蘇撫章煦請將華亭土塘加築單壩二層均從之道光十三年五月巡撫富呢揚阿疏言東西兩防塘工先擇尤險者修築需銀五十一萬二千餘兩十一月又言限內限外各工俱掣坍需銀十九萬四千餘兩十二月又言東塘界內應於前後兩塘中間另建鱗塘二千六百餘丈需銀九十二萬二千兩均下部議行十四年命刑部侍郎趙盛奎前東河督嚴烺會同富呢揚阿查勘應修各工尋疏言外護塘根無如坦水擬自念里亭汛至鎮海汛添建盤頭三座改建柴塘三千三百餘丈其西塘烏龍廟以東應接築魚鱗石塊海寧繞城石塘應加高條石兩層俟明年大汛時續辦遣左都御史吳椿往勘留浙會辦十六年三月工竣計修築各工萬七千餘丈用銀一百五十七萬有奇三十年巡撫吳文鎔陳海塘石工衝缺令速搶辦十月工竣咸豐七年八月海塘掃各工猝被風潮衝坍十二月次第堵合同治三年御史洪燕昌言浙江海塘潰決請速籌款修理部議將浙海關等稅撥用五年內閣侍讀學士鍾佩賢疏陳海塘關繫東南大局有四害三可慮命巡撫馬新貽詳勘修海寧魚鱗石工二百六十餘丈六年以浙江海塘工巨費多議分最要次要修築期以十年告竣七年兩江總督曾國藩等請修華亭石塘護壩嗣是塘工歲有修築光緒三年修寶山北石塘護土建護塘攔水各壩及仁和海寧魚鱗石塘千三百餘丈十年修昭文華亭寶山等處塘壩及石坦坡十二年浙江巡撫劉秉璋言海鹽原建石塘四千六百餘丈積年坍損過半擬擇要興辦埋砌者五百丈建復者四百六十丈需銀二十萬允之十八年浙撫劉樹棠疏言海寧繞城石塘坍塌日甚請添築坦水以塘工加抽絲捐積存餘發先行開辦隨籌款次第興修從之十九年修太倉茜涇口樁石坦坡百五十一丈鎮洋楊林口樁石二百丈昭文施家橋至老人濱雙樁夾石護壩二百丈華亭外塘純石斜壩四十六丈綜計兩省塘工自道光中葉大修後經兵燹半就頽圮迄同治初興辦大工庫款支絀遂開辦海塘捐輸並勸令兩省絲商於正捐外加抽塘工絲捐給票請奬旋即停止光緒三十年浙江巡撫聶緝規請復捐輸舊章以濟要工因二十七年以後潮汐猛烈次險者變為極險擬將柴掃各工清底拆築非籌集巨款不能歷久鞏固云
