body:
  text: 清史稿卷一百二十八志一百三河渠三淮河永定河海塘淮水源出桐柏山東南經隨州復北折過桐柏東歷信陽確山羅山正陽息光山固始阜陽霍丘潁上所挾支水合而東注達正陽關其下有沙河東西淝河洛河洱河芡河天河俱入於淮過鳳陽又有渦河澥河東西濠及漴澮沱潼諸水俱匯淮而注洪澤湖又東北徑清河山陽安東由雲梯關入海徑行湖北河南安徽江蘇四省千有七百餘里淮固不為害也自北宋黃河南徙奪淮瀆下遊而入海於是淮受其病淮病而入淮諸水泛溢四出江安兩省無不病夫下壅則上潰水性實然故治河即所以治淮而治淮莫先於治河有清一代經營於淮黃交匯之區致力綦勤糜帑尤巨逮咸豐中銅瓦廂決黃流北徙宋元來河道為之一變然河徙淤留導淮之舉又烏容已今於淮流之源委分合及清口之蓄泄洪澤湖之堰壩工築皆備列焉順治六年夏淮溢息縣壞民田舍康熙元年盱泗民由古溝鎮南及谷家橋北盜決小渠八淮水強半分泄高寶諸湖而清口淮弱無力敵黃六七年間淮大漲沖潰古溝翟家墩由高寶諸湖直射運河決清水潭又溢武家墩高良澗清口湮而黃流上潰十五年淮又大漲合睢湖諸水並力東激高良澗板工決口二十六高堰石工決口七涓滴不出清口黃又乘高四潰一入洪澤湖由高堰決口會淮並歸清水潭下流益淤墊總河靳輔言洪澤下流自高堰西至清口約二十里原係汪洋巨浸為全淮會黃之所自淮東決黃內灌一帶湖身漸成平陸止存寬十餘丈深五六尺至一二尺之小河淤沙萬頃挑濬甚難惟有於兩旁離水二十丈許各挑引河一俾分頭沖刷庶淮河下注可以沖闢淤泥徑奔清口會黃刷沙而無阻滯散漫之虞輔又言下流既治淮可直行會黃刷沙但臨湖一帶隄岸除決口外無不殘缺單薄危險堪虞板工固易壞即石工之傾圮亦不可勝數惟堤下係土坦坡雖遇大水不易沖今求費省工堅惟有於隄外近湖處挑土幫築坦坡每隄一丈築坦坡寬五尺密布草根草子其上俟其長茂則土益堅至高堰石工亦宜幫築坦坡埋石工於內更為堅穩較之用板用石用掃可省二十一萬有奇且免沖激頽卸之患又言自周家閘歷古溝唐埂至翟家壩南估計築三十二里之隄並堵此原沖成之九河及高良澗高家堰武家墩大小決口三十四需費七十萬五千有奇皆係用掃不過三年悉皆朽壞臣斟酌變通除鑲邊裹頭必須用掃餘俱宜密下排樁多加板纜用蒲包裹土繩扎而填之費可省半而堅久過之今擬改下掃為包土仍築坦坡制可十八年大濬清口爛泥淺裴家場帥家莊引河使淮水全出清口會黃東下三十五年總河董安國因泗州知州莫之翰議請開盱眙聖人山禹王河導淮注江略言禹王古河自盱眙聖人山歷黑林橋桐城鎮楊村天長縣迄六合之八里橋各有河形溪澗岡不等若開引入江則天長楊村桐城各汊澗大水時可不入高郵湖湖水不致泛溢而下河之水可減至古河之口現與淮不通流必立閘座水小閉閘以濟漕漲則開閘以泄水庶淮水洶湧之勢可減格廷議不行明年上有宜堵塞高堰壩之諭逾二年總河于成龍申塞六壩之請會病卒未底厥績其年水復大至已堵三壩旋委洪流三十九年張鵬翮為總河盡塞之使淮無所漏悉歸清口又開張福裴家場張家莊爛泥淺三岔及天然天賜引河七導淮以刷清口又以清口引河寬僅三十餘丈不足暢泄全湖之水加開寬闊於是十餘年斷絶之清流一旦奮湧而出淮高於黃者尺餘四十年築高堰大隄四十四年聖祖南巡閲高堰隄工詔於三壩下濬河築隄束水入高郵邵伯諸湖又洪湖水漲泗盱均被水災應於受水處酌量築隄束水四十五年兩江總督阿山等請於泗州溜淮套別開河道直達張福口以分淮勢計費三百十餘萬部議靳之廷臣亦以河工重大請上親臨指示逾年上南巡閲河諭曰詳勘溜淮套地勢甚高雖開鑿成河亦不能直達清口且所立標杆多在墳上若依此開河不獨壞田廬甚至毀墳冢何必多此一事今欲開溜淮套必鑿山穿嶺不獨斷難成功且恐汛水泛溢不浸入洪湖必衝決運河命撤去標杆並譴阿山鵬翮等有差上又謂明代淮黃與今迥異明代淮弱故有倒灌之虞今則淮強黃弱與其開溜淮套無益之河不若於洪湖出水處再行挑濬寬深使清水愈加暢流為利不淺四十九年加長禦黃西壩工程從河督趙世顯請也雍正元年重建清口東西束水壩於風神廟前以蓄清各長二十餘丈三年總河齊蘇勒因朱家海衝決湖底沙淤恐高堰難保改低三壩門檻一尺五寸以泄湖水而救一時之急不知水愈落淮愈不得出致力微不能敵黃連年倒灌分溜直趨李衛頗非之先是高堰石工未能一律堅厚至七年冬發帑百萬命總河孔繼珣總督尹繼善將隄身卑薄傾圮處拆砌務令一律堅實十年秋高堰石工成乾隆二年用總河高斌言飭疏濬毛城鋪迤下河道經徐蕭睢宿靈虹各州縣至泗州之安門陡河紆曲六百餘里以達洪湖出清口而淮揚京員夏之芳等言其不便下各督撫及河漕督會議並召詢斌斌至進圖陳説乃知芳等所言非現在情形卒從斌議明年毛城鋪河道工竣四年高宗以高堰三壩既改低過岸之水足泄用大學士鄂爾泰言永禁開放天然二壩五年秋西風大暴湖浪洶湧高堰汛第八堡舊隄撞擊倒卸十四段旋修補之六年斌言江都三汊河乃瓜儀二河口門瓜河地勢低淮水入瓜河分數少故溜緩不能刷深河道致日漸淤墊應築壩堵閉瓜河舊口門於洋子橋營房迤下別挑越河減淮水入瓜河之分數則儀河可分流刷淤並堵閉瓜洲廣惠閘之舊越河於閘下別開越河使閘越二河水勢均平既緩淮水直下入江之勢於運道更為便利七年河湖並漲議者又謂淮河上遊諸水俱匯入洪湖邵伯以下宜多開入江之路斌亦以為言於是開濬石羊溝舊河直達於江築滾壩四十丈並開通芒稻閘下之董家油房白塔河之孔家涵三處河流增建滾壩使淮水暢流無阻八年淮暴漲丈餘逼臨淮城改治於周梁橋十六年上以天然壩乃高堰尾閭盛漲輒開下遊州縣悉被其患命立石永禁開放並用斌言於三壩外增建智信二壩以資宣泄十八年七月淮溢高郵壞車邏壩邵伯二閘下河田廬多沒二十二年以湖水出清口賴東西二壩堵束併力刷黃湖水過大奔溢五壩亦恐為下河患因定制五壩過水一寸東壩開寬二丈以此遞增泐石東壩嗣是遇湖水增長即展寬東壩以泄盛漲有展寬至六七十丈者二十七年上言江南濱湖之區每遇大汛霖潦堪虞洪澤一湖尤為橐籥關鍵為澤國計安全莫如廣疏清口為及今第一要義現在高堰五壩高於水面七尺有奇清口口門見寬三十丈當即依此酌定成算將來兩壩水增長至一尺拆寬清口十丈水遞長口遞寬以此為率是年六月五壩水志逾一尺河督高晉遵旨拆寬清口十丈宣泄甚暢三十二年南河總督李宏言正陽關三官廟舊立水志考驗水痕本年所報消長與下遊不符請於荊山塗山間及臨淮鎮各增設水志一以驗諸水消長允之三十四年上恐高堰五壩頂封土障水不足當風浪命酌加石工高晉等言其不便乃增用柴柳四十年大修堰盱各壩及臨河甎石工先是上以清口倒灌詔循康熙中張鵬翮所開陶莊引河舊迹挑穵導黃使北遣鄂爾泰偕斌往勘以汛水驟至而止旋完顏偉繼斌為河督慮引河不易就乃用斌議自清口迤西設木龍挑溜北趨而陶莊終不敢議次年南河督吳嗣爵內召極言倒灌為害薩載繼任亦主改口議上乃決意開之於是清口東西壩基移下百六十丈之平成臺築攔黃壩百三十丈並於陶莊迤北開引河使黃離清口較遠清水暢流有力攻刷淤沙明年二月引河成黃流直注周家莊會清東下清口免倒灌之患者近十年五十年洪湖旱涸黃流淤及清口命河南巡撫畢沅祭淮瀆疏賈魯惠濟諸河流以助清湖水仍不出黃復內灌上欲開毛城鋪王家營減壩下大學士阿桂等議阿桂言欲治清口之病必去老壩工以下之淤尤當掣低黃水使清水暢出攻沙不勞自治於是閉張福口四引河浚通湖支河蓄清水至七尺以上治開王營壩減泄黃水盡啓諸河出清口滌沙修清口兜水壩易名束清壩復移下惠濟祠前之東西束水壩三百丈於福神巷前加長東壩以禦黃縮短西壩以出清易名禦黃壩嘉慶元年湖水弱清低於黃者丈餘淮遏不出淮漲則開山盱五壩吳城七堡黃漲或減水入湖以救清口之倒灌五年用江督費淳河督吳璥言開吳城七堡引渠使泄湖水入黃以減盛漲八年黃流入海不暢直注洪澤湖璥赴海口相度請力收運口各壩止留口門清雖力弱難出黃亦不能再入七月淮漲高堰危甚開信義兩壩泄水西風大作壞仁智兩壩淮南奔清口上責璥遂罷免九年春湖水稍發伏汛黃仍倒灌河督徐端以束清壩在運口北分溜入運致不敵黃請移建湖口迤南從之十一年江督鐵保言潘季馴靳輔治河專力清口誠以清口暢出則河腹刷深海口亦順洪澤亦不致泛濫為今之計大修閘壩借清刷沙不能不多蓄湖水即不能不保護石隄尤不能不急籌去路又偕徐端陳河工數事一外河廳之方家馬頭及三老壩為淮揚保障宜填護碎石一義壩宜堵築一仁智禮信四壩殘損宜拆修廷議如所請上恐四壩同修清水過泄命次第舉行十五年十月大風激浪義壩決堰盱兩工掣坍千餘丈議者謂宜築碎石坦坡以費巨不果璥與端請加培大隄外靳輔所築二隄以為重門保障亦為廷議所駁及陳鳳翔督南河復申二隄之請下江督百齡議百齡言不若培修大隄十七年遣協辦大學士松筠履勘亦主百齡議於是築大隄子堰自束清壩尾至信壩迤南止鳳翔以不知蓄清於湖未漲之先即啓智禮兩壩致禮壩潰下遊淹清水消耗貽誤全河為百齡所劾奪職遣戍十八年百齡及南河督黎世序以仁義禮三壩屢經開放壞基跌塘請移建三壩於蔣家壩南近山岡處各挑引河先建仁義壩因禮壩基改築草壩備本年宣泄上命先建義壩如節宣得宜再分年遞修二十三年增建束清二壩於束清壩北收蓄湖水道光二年增修高堰石工四年冬河漲洪澤湖蓄水至丈七尺尚低於黃尺許高堰十三堡隄頂被大水掣動山盱周橋之息浪菴亦過水八九尺各壩均有坍損上遣尚書文孚汪廷珍履勘而褫河督張文浩職十三堡缺口旋塞侍郎朱士彥言高堰石工在事諸臣惟務節省辦理草率又因搶築大隄就近二隄取土事後亦不培補至山盱五壩宣泄洪湖盛漲未能謹守舊章相機開放致石工掣卸並下文孚等勘核明年春從文孚等議改湖隄土坦坡為碎石於仁義禮舊壩處所各增建石滾壩以防異漲八年上以禦黃壩上下積淤丈餘清水不能多蓄禦黃壩終不可開下南總河張井等籌議井等言乾隆間湖高於河七八尺或丈餘入夏拆展禦黃壩泄清刷淤至冬始閉嘉慶間因河淤改夏閉秋啓而黃水偶漲即行倒灌今積淤日久縱清水能出止高於黃數寸及尺餘暫開即閉僅免倒灌未能收刷淤之效上不懌曰以昔證今已成不可救藥之勢為河督者祗知泄清水以保堰閉禦壩以免倒灌增工請帑但顧目前不思經久如國計何如民生何如後日何十年井言淮水歸海之路不暢請於揚糧廳之八塔鋪商家溝各斜挑一河匯流入江分減漲水並拆除芒稻河東西閘挑穵淤灘可抵新闢一河之用從之十二年移建信壩於夏家橋十四年以義字引河跌深三四丈堵閉不易允河督麟慶請改挑義字河頭二十一年河決祥符奪溜注洪澤湖而江潮盛漲又復頂托因拆展禦黃束清及禮智仁各壩並啓放車邏等壩以泄湖水二十三年河決中牟全溜下注洪澤湖高堰石工掣卸四千餘丈先後拆展束清禦黃智信各壩並啓放順清禮義等河金灣舊壩及東西灣壩同時並啓減水入江咸豐五年河復決銅瓦廂東注大清河入海黃河自北宋時一決滑州再決澶州分趨東南合泗入淮蓋淮下遊為河所奪者七百七十餘年河病而淮亦病至是北徙江南之患息士民請復淮水故道者歲有所聞同治八年江督馬新貽濬張福口引河淮遂由清口達運嗣又挑楊莊以下之淤黃河以泄中運河盛漲九年新貽等言測量雲梯關以下河身及成子河張福口高良澗一帶湖心始知黃河底高於洪湖底一丈至丈五六尺不等必先大濬淤黃使淮得暢流入海繼闢清口導之入舊黃河再堵三河以杜旁泄而資撎蓄然非修復堰盱石工堅築運河兩隄不敢遽堵三河闢清口統籌各工非數百萬金不能集事擬分別緩急次第籌辦不求利多但求患減為得寸得尺之計收循序漸進之功光緒七年江督劉坤一言臣此次周歷河湖知淮揚水利有關國計民生前議導淮未可中輟自楊莊以下舊黃河淤平則山東昭陽微山等湖之水由中運河直趨南運河夏秋之間三閘甚形喫重自洪澤湖淤淺淮水不能合溜北高於南水之分入張福引河者無多大溜由禮河徑趨高寶等湖上年挑濬舊黃河後山東蛟水屢次暴發由此分瀉入海築禮壩後湖水瀦深且由張福河入運口者頗旺此挑舊河築禮壩之不無微效也惟是張福河淺湖水仍趨重禮河越壩終為可慮倘遇湖水泛濫禮河即無越壩亦難分消必開信智兩壩由高寶湖入南運河亦必開車邏南關等壩由𩹉下河入海沿途淹沒田廬所損匪細今擬就張福河開穵寬深以引洪澤湖之水復穵碎石河以分張福河之水由吳城七堡匯順清河水小則由順清入運途紆而勢稍舒水大則由舊黃河入海途直而勢自順約三四年間便可告竣所費尚不過巨議者或謂導淮入海當盡瀉洪湖之水有妨官運民田臣以為別開引河或不免有此患今循張福河碎石河故道以歸順清河自非淮漲一二丈則順清河之水何能高過中運河溢出舊黃河如使淮水暴漲方有潰決之虞惟恐水無去路此正導淮之本意也議者或謂多引湖水入運恐三閘不能支持不思洪湖未淤以前湖水四平蓄水深廣張福以外有四引河以濟漕運維時黃未北徙每遇漕船過閘方且蓄清敵黃以五引河全注運口而三閘屹然今特張福一河決無致損三閘之理且上年挑通舊黃河已分減中運河水其入南運河者不過三四成湖水雖增與前略等即遇大水有舊黃河可以分減亦不至專出三閘也議者又謂如此導淮無弊亦屬無利何必虛費帑藏其説亦不盡然夫治水之道必須通盤規畫並須預防變遷洪湖南有禮河北有張福河均為分泄淮水而水勢就下禮河常苦水大築禮河壩所以蓄張福之水濬張福口所以顧禮河之隄彼此互相維繫如使禮河受全湖之沖新壩恐不能保續修則所費彌巨不修則為害滋深下者益下高者益高張福河漸形壅塞矣且導淮之舉原防盛漲肆虐如引湖由張福出順清以舊黃河為出海之路偶有泛溢該處土曠人稀趨避尚易若張福不暢全湖之水折而南趨則淮揚繁盛之區億萬生靈將有其魚之歎導淮之利見於目前者猶小見於日後者乃大也疏入下部知之八年江督左宗棠言濬沂泗為導淮先路洵為確論惟雲梯關以下二百餘里河身高仰且有遠年沙灘昔以全黃之力所不能通者今欲以沂泗分流通之其勢良難大通在雲梯關下十餘里舊黃河北岸係嘉慶中漫口東北流四十餘里至響水口接連潮河至灌河口入海就此加挑寬深出海較便沂泗來源當大為分減淮未復而運道亦可稍安淮既復而歸海無虞阻滯此疏濬下遊宣泄沂泗實導淮先路不可不亟籌者也淮挾衆流匯為洪澤本江皖巨浸自道光間為黃所淤北高南下由禮河趨高寶湖以入運者垂三十年今欲導之復故不啻挽之逆流自張福口過大通響水口入海三百五十餘里節節窒礙非下遊暢其去路上遊塞其漏卮其不能舍下就高入黃歸海也明甚查張福口及天然引河皆北趨陳家集之大沖至碎石河以達吳城七堡又北至順清河口接楊莊舊黃河張福河面六十餘丈宜加寬深天然河更須疏瀹吳城七堡一帶高於張福河底丈六七尺尤必大加挑濬使湖水果能入黃然後可堵禮河以截旁趨之出路堵順清河以杜運河之奪河此引淮入海工程當以次接辦者也湖水不高不能入黃太高不特堰盱石工可慮運口閘壩難支且於盱眙五河近湖民田有礙擬修復智信等壩以泄湖漲更建閘大沖俾湖水操縱由人多入淮而少入運此又預籌以善其後者也三十四年江督端方會勘淮河故道力陳導淮四難因於清江浦設局遴紳籌議久之無端緒乃撤局宣統元年江蘇咨議局開總督張人駿以導淮事列案交議決定設江淮水利公司先行測量務使導淮復故專趨入海二年侍讀學士惲育鼎以濱淮水患日深上言自魏晉以降瀕淮田畝類皆引水開渠灌溉悉成膏腴近則沿淮州縣年報水災浸灌城邑漂沒田廬自正陽至高寶盡為澤國實緣近百年間河身淤塞下遊不通水無所歸浸成泛濫是則高堰壩之為害也異時黃淮合流有南下之勢治河者欲束淮以敵黃故特堅築高堰壩頭逼淮由天妃閘以濟運今黃久北徙堰壩無所用之當別籌入海之途其道有二以由清口西壩鹽河至北潮河為便尾閭既暢水有所歸不獨潁壽鳳泗永淡沈災即高寶興泰亦百年高枕矣事下江督張人駿蘇撫程德全皖撫朱家寶勘議人駿等言正事測量俟測勘竣即遴員開辦報聞三年御史石長信言導淮一舉詢謀僉同美國紅十字會亦擬遣工程師來華查勘則我之思患預防尤不可緩江蘇水利公司既允部撥費用安徽亦應設局測量以為消弭巨災之圖下部議允之導淮之舉經始於同治六年時曾國藩督兩江嘗謂復瀆之大利不敢謂其遽興淮揚之大害不可不思稍減逮黃流北徙言者益多大要不出兩策一謂宜堵三河闢清口濬舊河排雲梯關使由故道入海一謂導淮當自上流始洪澤湖乃淮之委非淮之源宜於上遊闢新道循睢汴北行使淮未注湖中途已泄其半再由桃源之成子河穿舊黃河經中河雙金閘入鹽河至安東入海使全淮分南北二道納少瀉多淮患從此可減二説所持各異然同光以來濬成子碎石沂泗等河疏楊莊以下至雲梯關故道固已小試其端卒之淮為黃淤積數百年已無經行之渠由運入江勢難盡挽迄於國變終鮮成功永定河亦名無定河即桑乾下遊源出山西太原之天池伏流至朔州馬邑復出匯衆流經直隸宣化之西寧懷來東南入順天宛平界徑盧師臺下始名盧溝河下匯鳳河入海以其經大同合渾水東北流故又名渾河元史名曰小黃河從古未曾設官營治其曰永定則康熙間所錫名也永定河匯邊外諸水挾泥沙建瓴而下重巒夾峙故鮮潰決至京西四十里石景山而南徑盧溝橋地勢陡而土性疏縱橫蕩漾遷徙弗常為害頗巨於是建隄壩疏引河宣防之工亟焉順治八年河由永清徙固安與白溝合明年決口始塞十一年由固安西宮村與清水合經霸州東出清河又決九花臺南里諸口霸州西南遂成巨浸康熙七年決盧溝橋隄命侍郎羅多等築之三十一年以河道漸次北移永清霸州固安文安時被水災用直隸巡撫郭世隆議疏永清東北故道使順流歸淀三十七年以保定以南諸水與渾水匯流勢不能容時有泛濫聖祖臨視巡撫于成龍疏築兼施自良鄉老君堂舊河口起徑固安北十里鋪永清東南朱家莊會東安狼城河出霸州柳岔口三角淀達西沽入海濬河百四十五里築南北隄百八十餘里賜名永定自是渾流改注東北無遷徙者垂四十年三十九年郎城淀河淤且平上遊壅塞命河督王新命開新河改南岸為北岸南岸接築西隄自郭家務起北岸接築東隄自何麻子營起均至柳岔口止四十年加築南岸排樁遙隄修金門閘四十八年決永清王虎莊旋塞五十六年修兩岸沙隄大隄決賀堯營六十一年復決賀堯營隨塞雍正二年修郭家務大隄築清涼寺月隄修金門閘築霸州堂二鋪南隄決口三年因郭家務以下兩岸頓狹永清受害特重命怡親王允祥大學士朱軾引渾水別由一道入海毋使入淀遂於柳岔口少北改為下口開新河自郭家務至長河凡七十里經三角淀達津歸海築三角淀圍隄以防北軼又築南隄自武家莊至王慶坨北隄自何麻子營至范甕口其冰窖至柳岔口隄工遂廢十二年決梁各莊四聖口等處三百餘丈黃家灣河溜全奪水穿永清縣郭下注霸州之津水窪歸淀總河顧琮督兵夫塞之十三年決南岸朱家莊北岸趙家樓水由六道口小隄仍歸三角淀乾隆二年總河劉勷勘修南北隄開黃家灣求賢莊曹家新莊各引河濬雙口下口黃花套六月漲漫南岸鐵狗北岸張客等村四十餘處奪溜由張客決口下歸鳳河命吏部尚書顧琮察勘請倣黃河築遙隄之法大學士鄂爾泰持不可議於北截河隄北改挑新河以北隄為南隄沿之東下下遊作泄潮埝數段復於南北岸分建滾水石壩四各開引河一於北岸張家水口建壩即以所衝水道為引河東匯鳳河一於南岸寺臺建壩以民間泄水舊渠入小清河者為引河一於南岸金門閘建壩以渾河故道接牛河者為引河一於南岸郭家務建壩即以舊河身為引河合清隔濁條理自明詔從其請四年直督孫嘉淦請移寺臺壩於曹家務張客壩於求賢莊又於金門閘長安城添築草壩定以四分過水顧琮言金門閘長安城兩壩水勢僅一河宣泄恐汛發難容擬分引河為兩股一由南窪入中亭河一由楊青口入津水窪又言郭家務小梁村等處舊有遙河千七百丈年久淤塞請發帑興修均從之五年孫嘉淦請開金門閘重隄濬西引河開南隄放水復行故道六年凌汛漫溢固良新涿雄霸各境多淹從鄂爾泰議堵閉新引河展寬雙口等河挑葛漁城河槽築張客曹家務月隄改築郭家務等壩八年濬新河下口及董家河三道河口修新河南岸及鳳河以東隄埝又疏穆家口以下至東蕭莊鳳河邊二十里有奇九年以范甕口下統以沙葉兩淀為歸宿兩汛水多歸葉淀遂疏注沙淀路並將南北舊減河濬歸鳳河十五年五月河水驟漲由南岸第四溝奪溜出徑固安城下至牛坨循黃家河入津水窪一由牛河入中亭河命侍郎三和同直督堵禦於口門下另挑引河截溜築壩遏水南溢使歸故道十六年淩汛水發全河奔注冰窖隄口即於王慶坨南開引河導經流入葉淀以順水性十九年南埝水漫隄頂決下口東西老隄奪溜南行漫勝芳舊淀徑永清之武家廠三聖口霸州之信安入口明年高宗臨視改下遊由調河頭入海挑引河二十餘里加培埝身二千二百餘丈二十一年直督方觀承請於北埝外更作遙隄預為行水地鳳河東隄亦接築至遙埝尾從之二十四年大雨直隸各河並漲下遊悉歸淀內大清河不能宣泄轉由鳳河倒漾阻遏渾流南岸四工隄決命御前侍衛赫爾景額協同直督剋日堵築三十五年三十六年兩岸屢決三十七年命尚書高晉裘曰修偕直督周元理履勘疏言永定河自康熙間築隄以來凡六改道救弊之法惟有疏中洪挑下口以暢奔流築岸隄以防衝突濬減河以分盛漲遂興大工用帑十四萬有奇自是水由調河頭徑毛家窪沙家淀達津入海三十八年調河頭受淤其澄清之水散漫而下別由東安響水村直趨沙家淀四十年堵北三工南頭工漫口四十四年展築新北隄加培舊越隄廢去瀕河舊隄使河身寬展四十五年盧溝橋西岸漫溢北頭工衝決由良鄉之前官營散溢求賢村減河歸黃花店爰開引溝八百丈引溜歸