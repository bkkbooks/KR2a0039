body:
  text: 清史稿卷一百二十九志一百四河渠四直省水利清代軫恤民艱亟修水政黃淮運永定諸河海塘而外舉凡直省水利亦皆經營不遺餘力其事可備列焉順治四年給事中梁維請開荒田興水利章下所司十一年詔曰東南財賦之地素稱沃壤近年水旱為災民生重困皆因水利失修致誤農工該督撫責成地方官悉心講求疏通水道修築隄防以時蓄泄俾水旱無虞民安樂利康熙元年重修夾江龍興堰又鑿大渠以廣灌溉二年修和州銅成堰龍首通濟二渠交城磁瓦河漲水侵城築隄障之三年修嘉定楠木堰九年修郿縣金渠寧曲水利十二年重修城固五門堰十九年濬常熟白茆港武進孟瀆河二十三年修五河南湖隄壩二十七年修徽州魚梁壩三十七年命河督王新命修畿輔水利三十八年聖祖南巡至東光命直隸巡撫李光地察勘漳河滹沱河故道覆疏言大名廣平真定河間所屬凡兩河經行之處宜開濬疏通由館陶入運老漳河與單家橋支流合至鮑家嘴歸運可分子牙河之勢三十九年帝巡視子牙河隄命於閻留二莊間建石閘隨時啓閉御史劉珩言永平真定近河地應令引水入田耕種諭曰水田之利不可太驟若剋期齊舉必致難行惟於興作之後百姓知其有益自然鼓勵效法事必有成四十年李光地言漳河分四支三支歸運皆弱一支歸淀獨強遇水大時當用挑水壩等法使水分流北不至挾滹沱以浸田南不至合衛河以害運如所請行四十三年挑楊村舊引河先是子牙河廣福樓開引河時文安大城民謂有益青縣民謂不便各集河干互控至是河成三縣民皆稱便天津總兵官藍理請於豐潤寶坻天津開墾水田下部議旋諭曰昔李光地有此請朕以為不可輕舉者蓋北方水土之性迥異南方當時水大以為可種水田不知驟漲之水其涸甚易觀琉璃河莽牛河易河之水入夏皆涸可知次年部臣仍以開墾為請諭以此事暫宜存置可令藍理於天津試開水田俟冬後踏勘四十八年濬鄭州賈魯河故道自東趙訖黃河涯口新莊於東趙建閘一黃河涯口築草壩石閘各一甘肅巡撫舒圖言唐渠口高於身水勢不暢應引黃河之水匯入宋澄堡如水不足用更於上遊近黃處開河引水酌建閘壩以資蓄泄從之江蘇巡撫于準言丹陽練湖冬春泄水濟運夏秋分灌民田自姦民圖利將下湖之地佃種升科民田悉成荒瘠請復令蓄水為湖得資灌溉從之五十七年以沛縣連年被水命河督趙世顯察勘世顯言金鄉魚臺之水由沛之昭陽湖歷微山湖從荊山口出貓兒窩入運近因荊山口十字河淤墊致低田被淹應將沙淤濬通再於十字河上築草壩若遇運河水淺即令堵塞俾水全歸微山湖出湖口閘以濟運則民田漕運兩有裨益從之世宗時於畿輔水利尤多區畫雍正三年直隸大水命怡親王允祥大學士朱軾相度修治因疏請濬治衛河淀池子牙永定諸河更於京東之灤薊京南之文霸設營田專官經畫疆理召募老農謀導耕種四年定營田四局設水利營田府命怡親王總理其事置觀察使一自五年分局至七年營成水田六千頃有奇後因水力贏縮靡常半就湮廢是年命侍郎通智單疇書會同川督嶽鍾琪開惠農渠於查漢托護以益屯守復建昌潤渠於惠農渠東北六年浚文水近汾河渠引灌民田開嵩明州楊林海以泄水成田八年帝以寧夏水利在大清漢唐三渠日久頽壞命通智同光祿卿史在甲勘修是年修廣西興安靈渠以利農田通行舟濬陳許二州溝洫十年雲貴總督鄂爾泰言滇省水利全在昆明海口現經修濬膏腴田地漸次涸出惟盤龍江金稜銀稜寶象等河俱與海口近亟宜建築壩臺又言楊林海水勢暢流周圍草塘均可招民開墾宜良江頭村舊河地形稍高宜另開河道以資灌溉尋甸河整石難鑿宜另濬沙河俾得暢流東川城北漫海水消田出亦可招墾均從之十二年營田觀察使陳時夏言文安大城界內修橫隄千五百餘丈營田四十八頃俱獲豐收但恐水涸即成旱田請於大隄東南開建石閘北岸多設涵洞以資宣泄從之乾隆元年大學士嵇曾筠請疏濬杭湖水利兩廣總督鄂彌達言廣肇二屬沿江一帶基圍關繫民田廬舍常致衝坍請於險要處改土為石陸續興建下部議行江南大雨水淮陽被淹命濬宿遷桃源清河安東及高郵寶應各水道二年命總督尹繼善籌畫雲南水利無論通粵通川及本省河海凡有關民食者及時興修陝西巡撫崔紀陳鑿井灌田以佐水利之議諭令詳籌勿擾閭閻三年大學士管川陝總督事查郎阿言瓜州地多水少民田資以灌溉者惟疏勒河之水河流微細查靖逆衛北有川北鞏昌兩湖西流合一名蘑菰溝其西有三道柳條溝北流歸擺帶湖請從中腰建閘下濬一渠截兩溝之水盡入渠中為回民灌田之利貴州總督張廣泗請開鑿黔省河道自都勻經舊施秉通清水江至湖南黔陽直達常德又由獨山三腳坉達古州抵廣西懷遠直達廣東興天地自然之利均下部議行四年安徽布政使晏斯盛言江北鳳潁以睢水為經廬州以巢湖為緯他如六安舊有堤堰滁泗亦多溪壑概應動帑及時修濬從之川陝總督鄂彌達等言寧夏新渠寶豐前因地震水湧二縣治俱沉沒請裁其可耕之田將漢渠尾展長以資灌溉惟查漢渠百九十餘里渠尾餘水無多若將惠農廢渠口修整引水使漢渠尾接長可灌新寶良田數千頃上嘉勉之五年河督顧琮言前經總河白鍾山奏稱漳河復歸故道則衛河不致泛溢為一勞永逸之計臣等確勘自和兒寨東起至青縣鮑家嘴入運之處止計程六百餘里河身淤淺兩岸居民稠密若益以全漳之水勢難容納則改由故道於直隸不能無患然不由故道又於山東不能無患惟有分泄防禦使兩省均無所害庶為經久之圖總辦江南水利大理卿汪漋言鹽城東塘河及阜寧山陽各河道高郵寶應下遊及串場河溱潼河俱淤淺應挑濬其串場河之范堤及拼茶角二場隄工俱逼海濱應加寬厚揚州各閘壩應疏築限三年告成均如所請行安徽巡撫陳大受言江北水利關繫田功原任藩司晏斯盛奏定興修估銀四十餘萬竊思水利固為旱潦有備而緩急輕重必須熟籌各州縣所報如河墟湖澤及大溝長渠工程浩繁民力不能獨舉自應官為經理其餘零星塘壋現有管業之人原皆自行疏濬朝廷豈能以有限錢糧為小民代謀畚鍤上韙之河南巡撫雅爾圖言豫省水利工程惟上蔡估建隄壩係防蔡河異漲之水其餘汝河滍河隄堰應令地主自行修補至開濬汝河潁河等工請停罷以節糜費報聞六年春雅爾圖言永城地窪積潦城南舊有渠身長三萬一千餘丈通澮河年久淤淺現乘農隙勸諭紳民挑濬俾水有歸又言前奉諭旨開濬省城乾涯河復於中牟創開新河一分賈魯河水勢由沙河會乾涯河以達江南之渦河而匯於淮長六萬五千餘丈今已竣工賜名惠濟九年御史柴潮生言北方地勢平衍原有河渠淀泊水道可尋如聽其自盈自涸則有水無利而獨受其害請遣大臣齎帑興修命吏部尚書劉於義往保定會同總督高斌督率辦理尋請將宛平良鄉涿州新城雄縣大城舊有淀渠與擬開河道並隄埝涵洞橋閘次第興工下廷議如所請行先是御史張漢疏陳湖廣水利命總督鄂彌達查勘至是疏言治水之法有不可與水爭地者有不能棄地就水者三楚之水百派千條其江邊湖岸未開之隙地須嚴禁私築小垸俾水有所匯以緩其流所謂不可爭者也其倚江傍湖已闢之沃壤須加謹防護隄塍俾民有所依以資其生所謂不能棄者也其各屬迎溜頂衝處長隄連接責令每歲增高培厚寓疏濬於壅築之中報聞十一年大學士署河督劉於義等疏陳慶雲鹽山續勘疏濬事宜下部議行青州瀰河水漲衝開百餘丈決口旋堵博興樂安積水挑引河導入溜河十二年夏宿遷桃源清河安東之六塘河及沭陽海州之沭河山水漲發地方被淹命大學士高斌總督尹繼善會同河臣周學健往勘議於險處加寬挑直建石橋開引河官民協力防護從之十三年湖北巡撫彭樹葵言荊襄一帶江湖袤延千餘里一遇異漲必借餘地容納宋孟珙知江陵時曾修三海八匱以瀦水無如水濁易淤小民趨利者因於岸腳湖心多方截流以成淤隨借水糧魚課四圍築隄以成垸人與水爭地為利以致水與人爭地為殃惟有杜其將來將現垸若干著為定數此外不許私自增加報聞十四年雲南巡撫圖爾炳阿以疏鑿金沙江底績纂進金沙江志十七年江蘇巡撫莊有恭言蘇州之福山塘河太倉之劉河乃常熟等八州縣水利攸關歲久不修旱潦無備請於附河兩岸霑及水利各區按畝酌捐興工修建得旨嘉奬十八年陝甘總督黃廷桂言巴里坤之尖山子至奎素百餘里內地畝皆取用南山之水自山口以外多滲入沙磧必用木槽接引方可暢流請於甘涼肅三處撥種地官兵千名前往疏濬如所請行以江南山東河南積年被水而山東之水匯於淮徐河南之水達於鳳潁須會三省全局以治之命侍郎裘曰修夢麟往來察閲會江蘇安徽河南各巡撫計議尋曰修言包澮二河在宿永連界處為泄水通商之要道入安徽境內有石橋六應加寬展洪河睢河與虹縣之柏家河下江之林子河羅家河應補修子堰鳳臺之裔溝黑濠涇泥三河應挑深使暢達入淮夢麟言碭山蕭縣宿遷桃源山陽阜寧沭陽共有支河二十餘應分晰疏濬均從之二十三年豫省開濬河道工竣允紳民請於永城建萬歲亭並御製文志之山東巡撫阿爾泰言濟寧汶上嘉祥毗連蜀山湖地畝湮沒約千餘頃擬將金線利運二閘啓閉使湖水濟運坡水歸湖可以盡數涸出得旨嘉奬二十四年濬京師護城河及圓明園一帶河御史李宜青請疏濬畿輔水源命直隸總督方觀承條議以聞觀承言東西二淀千里長隄即宋臣何承矩興堰遺迹今昔情形有異倘泥往迹害將莫救如就淀言利則三百餘里中水村物産視昔加饒惟遇旱而求通雨澤於水土之氣則人事有當盡者耳四川總督開泰言灌縣都江大堰引灌成都各屬及眉邛二州田畝寧遠南有大渡河自冕寧抵會理三口與金沙江合支河雜出堰壩最多俱應相機修濬部議從之初御史吳鵬南請責成興修水土之政命各督撫經畫浙江巡撫莊有恭言水之大利五江湖海渠泉他省得其二三而浙實兼數利金衢嚴三郡各有山泉溪澗灌注成渠堰壩塘蕩無不具備惟仁和錢塘之上中市三河垸區塘苕溪塘海鹽之白洋河湯家鋪廟涇河長興之東西南漊港永嘉之七都新洲陡門九都水湫三十四都黃田浦陡門實應修舉以收已然之利至杭州臨平湖紹興夏蓋湖有關田疇大利應設法疏挑或召佃墾種再體勘辦理允之二十五年阿爾泰疏言東省水利以濟運為關鍵以入海為歸宿濟東泰武之老黃河馬頰徒駭等河兗沂曹之洸涑等河共六十餘道皆挑濬通暢運河民埝計長七百餘里亦修整完固青萊所屬樂安平度昌邑濰縣高密等州縣應挑支河三十餘俱節次挑竣萊州之膠萊河納上遊諸水高密有膠河亦趨膠萊易致漫溢應導入百脈湖以分水勢沂州屬蘭郯境內應開之武城等溝河二十五道又續挑之響水等溝河二十五道引窪地之水由江南邳州入運並已工竣帝嘉之二十六年河東鹽政薩哈岱言鹽池地窪全恃姚暹渠為宣泄近因渠身日高漲漫南北隄堰禁牆內黑河實産鹽之本年久淺溢涑水河西地勢北高南下倘汛漲南趨則鹽池益難保護五姓湖為衆水所匯恐下遊阻滯逆行為患均應及時疏通從之明年帝南巡諭曰江南濱河阻洳之區霖潦堪虞而下遊蓄泄機宜尤以洪澤湖為關鍵自邵伯以下金灣及東西灣滾壩節節措置特為三湖旁疏曲引起見若溯源潔要莫如廣疏