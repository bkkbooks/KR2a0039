益命刑部尚書陳若霖等往勘覆言京山決口三百二十餘丈鍾祥潰口百七十餘丈正河經行二百餘年不應舍此別尋故道惟有挑除胡李灣沙塊先暢下遊去路將京山口門挽築月隄展寬水道鍾祥口門於堵閉後添築石壩二護隄攻沙帝韙之命嵩孚駐工督辦八年河南巡撫楊國楨言湯河伏道河並廣潤陂上遊之羑河新惠等河向皆朝宗於衛因故道久湮頻年漫溢現為一勞永逸之計因勢利導悉令暢流又南陽白河淅川丹江水勢浩瀚俱切近城根亟應築碎石磨盤等壩二十餘道分別挑溜抵禦均如所請行挑濬冀州東海子淤塞溝身以工代賑九年修宿遷各河隄岸丹陽下練湖閘壩濬宿州奎河築喀什噶爾新城沿河隄岸兩江總督蔣攸銛言徐州河道如蕭縣龍山河邳州睢寧界之白塘河邳州舊城民便河碭山利民永定二河又沛縣隄工邳州沂河民埝豐縣太行隄皆最要之工請次第估辦興挑從之十年修湖北省會江岸並添建石壩挑濬漳河故道修保定南關外河道及徐河石橋河間陳家門隄濬東平小清河及安流龍拱二河修公安監利隄十一年修南昌新建進賢墟隄及河間獻縣河隄天門漢水南岸隄工桐梓被水開濬戴家溝河道命工部尚書朱士彥察勘江南水患疏請修築無為及銅陵江壩給事中邵正笏言江湖漲灘占墾日甚諭兩江總督陶澍湖廣總督盧坤等飭屬詳勘其沙洲地畝無礙水道者聽民認墾否則設法嚴禁十二年挑除星子蓼花池淤沙疏通溝道並築避沙塹壩修築南昌新建墟隄又改豐城土隄為石十三年湖廣總督訥爾經額請修襄陽老龍及漢陽護城石隄武昌荊州沿江隄岸兩江總督陶澍請修六合雙城果盒二墟隄埂濬孟瀆得勝灣港三河並建閘座均如議行戶部請興修直隸水利城工命總督琦善確察附近民田之溝渠陂塘擇要興修以工代賑御史朱逵吉言湖北連年被水請疏江水支河使南匯洞庭湖疏漢水支河使北匯三臺等湖並疏江漢支河使分匯雲夢七澤間隄防可固水患可息御史陳誼言安陸濱江隄塍衝決為害請建五閘壩挑濬河道以泄水勢疏入先後命訥爾經額尹濟源吳榮光等遴員詳勘十四年修良鄉河道橋座濬沔陽天門牛蹄支河漢陽通順支河並修築濱臨江漢各隄濬石首潛江漢川支河修荊州萬城大隄華容等縣水衝官民各垸濬碭山利民永定二河築南昌新建進賢建昌鄱陽德安星子德化八縣水淹墟隄修潛江鍾祥京山天門沔陽漢陽六州縣臨江潰隄以工代賑修邳宿二州縣沂河隄埝及王翻湖等工濬太倉七浦及太湖以下泖澱並修元和南塘寶帶橋十六年濬河東姚暹渠修庫車沿河隄壩濬海鹽河道又貸江蘇司庫銀濬鹽城皮大河豐縣順隄河並修築隄工從兩江總督林則徐等請也命大學士穆彰阿步軍統領耆英工部尚書載銓勘估京城內外應修河道溝渠十七年修武昌沿江石岸鍾祥劉公菴何家潭老隄潛江城外土隄及豐城土石隄工並建小港口石閘石掃十八年修黃梅隄濬豐潤玉田黑龍河十九年修武昌保安門外江隄蘄州衛軍堤漢陽臨江石隄葉爾羌參贊大臣恩特亨額覆陳巴爾楚克開墾屯田情形先是帝允伊犁將軍特依順保之請命於巴爾楚克開墾屯田嗣署參贊大臣金和疏陳不便復命恩特亨額詳籌至是疏言該處渠身僅三百二十八里有奇沿隄兩岸培修水勢甚旺足資灌溉並派屯丁分段看守遇水漲時有渠旁草湖可泄不致淹漫要路諭照舊妥辦務於屯務邊防實有裨益伊犁將軍關福疏報額魯特愛曼所屬界內塔什畢圖開正渠二萬五千七百餘丈計百四十餘里得地十六萬四千餘畝實屬肥腴引水足資灌溉詔褒勉之是歲漢水盛漲漢川沔陽天門京山隄垸潰決二十年總督周天爵疏報江漢情形擬疏堵章程六一沙灘上遊作一引壩攔入湖口再作沙隄障其外面以堵旁泄一江之南岸改虎渡口東支隄為西隄別添新東堤留寬水路四里餘下達黃金口歸於洞庭再於石首調弦口留三四十里沮洳之地瀉入洞庭一江之北岸舊有閘門應改為滾壩冬啓夏閉一襄陽上遊多作挑壩水外出再於險要處所加築護隄護灘一襄陽河四面隄畔應用磚石多砌陡門夏令相機啓閉一襄河水勢浩大應添造滾壩冬啓夏閉於兩岸低窪處所引渠納水下所司議行是年修華容武陵龍陽沅江四縣官民隄垸又修荊州大隄及公安監利江陵潛江四縣隄工二十二年堵鹿邑渦河決口先是黃水決口大溜直趨渦河將南岸觀武集鄭橋劉窪莊古家橋及淮寧之閻家口吳家橋徐家灘婁家林季家樓隄頂漫塌太和民田悉成巨浸阜陽以次州縣亦被漫淹至是安徽巡撫程楙采言豫工將次合龍渦河決口若不及時興修下遊受害益深請敕河南撫臣迅籌堵築從之湖廣總督裕泰等疏報江水盛漲衝陷萬城隄以上之吳家橋水閘並決下遊上漁埠頭大堤直灌荊州郡城倉庫監獄均被淹漫水消退後而埠頭漫口較寬勢難對口接築擬修挽月隄一並先於上下遊各築橫隄一如所請行修築庫倫隄壩及鄒縣橫河口李家河口民堰二十三年直隸總督訥爾經額疏陳直隸難以興舉屯政水利略云天津至山海關戶口殷繁地無遺利其無人開墾之處乃沿海灘潮水鹹澀不足以資灌溉至全省水利歷經試墾水田屢興屢廢總由南北水土異宜民多未便而開源疏泊建閘修塘皆需重帑未敢輕議試行但宜於各境溝洫及時疏通以期旱潦有備或開鑿井泉以車戽水亦足裨益田功如所議行修海陽寮哥宮涸溪竹崎頭隄工二十四年修江夏江隄濬海州沭河七月荊州江勢泛漲李家埠內隄決口水灌城內江陵虎渡口汛江支各隄亦多漫溢諭總督裕泰籌款修築九月萬城大隄合龍伊犁將軍布彥泰等言惠遠城東阿齊烏蘇廢地可墾復良田十餘萬畝擬引哈什河水以資灌注將塔什鄂斯坦田莊舊有渠道展寬接開新渠引入阿齊烏蘇東界並間段酌挑支河又言伊拉里克地畝與喀喇沙爾屬蒙古遊牧地以山為界該處河水一道由山之東面流出距遊牧地尚隔一山於蒙古生計無礙堪以開墾請濬大渠支渠並泄水渠引用伊拉里克河水又言奎屯地方寬廣有河一道係由庫爾喀喇烏蘇南山積雪融化匯流成河近水地畝早有營屯戶民承種又蘇沁荒地有萬餘畝土脈肥潤祗須挑渠引水可以俱成沃壤均如所請行二十五年濬賈魯河修汶上馬踏湖民堰命喀喇沙爾辦事大臣全慶查勘和爾罕水利疏言和爾罕地本膏腴宜將西北哈拉木扎什水渠並東南和色熱瓦特大渠接引可資耕種中隔大小沙梁業已挑通宜於衝要處砌石釘樁使沙土不致坍卸渠道日深足以灌溉良田又言伊拉里克地居吐魯番所轄托克遜軍臺之西土脈腴潤謂之板土戈壁其西為沙石戈壁二百餘里至山口出泉處有大阿拉渾小阿拉渾兩水匯成一河從前渠道未開水無收束一至沙石戈壁散漫沙中而板土戈壁水流不到轉成荒灘今將極西之水導引而東在沙石戈壁鑿成大渠三段復於板土戈壁多開支渠即遇大汛水有所歸又吐魯番地畝多係掘井取泉名曰卡井連環導引其利甚溥惟高埠難引水逆流而上應聽戶民自行穵井冬春水微時可補不足下廷臣議行二十六年烏魯木齊都統惟勤請修理喀喇沙爾渠道壩隄並陳章程四命伊犁將軍薩迎阿覆核尚無流弊詔如所請行六塘河隄衝潰各州縣連年被水命兩江總督璧昌等核辦覆言海州境內六塘河及薔薇河淤墊衝決田廬受淹於運道宣防大有關繫應從速借款挑築允之修溫榆河果渠村壩掃二十七年扎薩克郡王伯錫爾呈獻私墾地畝內有生地四千八百三十餘畝接濬新渠二添開支渠二以資分灌二十八年兩江總督李星沅請修沛縣民埝掃壩裕泰請修江夏隄工鍾祥廖家店外灘岸直隸總督訥爾經額請修築萬全護城石壩均如所請御史楊彤如劾河南撫臣三次挑穵賈魯河決口費幾百萬迄無成功請敕查辦詔褫鄂順安以下職新任巡撫潘鐸疏言賈魯河工程應以復朱仙鎮為修河關鍵惟朱仙鎮內及街南北河道淤墊最甚今議添辦柴秸掃工以防兩岸淤沙其淤沙最深處挑濬較難另擇乾土十數里改道以通舊河責成各員賠修限四十五日工竣從之二十九年江蘇巡撫傅繩勛言陰雨連綿積水無從宣泄以致江淮揚等屬隄墟多被衝破請仿農政全書匱田之法以土護田堅築高峻內水易於車涸勸民舉行以工代賑並查勘海口開穵閘洞泄水帝嘉勉之三十年修襄陽老龍石隄及漢陽隄壩武昌沿江石岸潛江土堤鍾祥高家隄御史汪元方以浙江水災多由棚民開山水道淤阻所致疏請禁止諭巡撫吳文鎔嚴查並命江蘇安徽江西湖廣各督撫一體稽查妥辦咸豐元年浙江巡撫常大淳疏陳清理種山棚民情形略言浙西水利餘杭南湖驟難濬復應先開支河修石閘以資蓄泄上遊治而下遊之患亦可稍平浙東則紹興之三閘口外鄞縣象山等河溪現經籌挑報聞三年太常卿唐鑑進畿輔水利備覽命給直隸總督桂良閲看並著於軍務告竣時酌度情形妥辦同治元年御史朱潮請開畿輔水利並以田地之治否定府縣考績之殿最命直隸總督文煜等將所轄境內山泉河梁淀湖及可開渠引水地方詳查並妥議章程尋覆疏言有可舉行之處或礙於地界或限於力量或當掘井製車或須抽溝築墟均設法催勸推行盡利三年江蘇士民殷自芳等以山陽鹽城境內市河十字河小市河蜿蜒百里東注馬家蕩沿河民田數千頃旱則資其灌溉潦則資其宣泄自乾隆六年大挑以後迄今百餘年河淤田廢水旱均易成災墾請挑濬築墟引運河水入市河以蘇民困命兩江總督江蘇巡撫核辦五年御史王書瑞言浙江水利海塘而外又有漊港烏程有三十九漊長興有三十四漊自逆匪竄擾後泥沙堆積漊口淤阻請設法開濬又言蘇松諸郡與杭嘉湖異派同歸湖州處上遊之最要蘇松等郡處下遊之最要上遊阻塞則害在湖州下遊阻塞則害在蘇松並害及杭嘉湖請飭江蘇一併勘治從之六年濬清河張福口引河八年安徽巡撫吳坤修言永城與宿州接壤之南股河久經淤塞下接靈壁低窪如釜早成巨浸水無出路擬查勘籌辦從之九年濬白茆河道改建近海石閘江蘇紳民請濬復淮水故道命兩江總督江蘇巡撫漕運總督會籌覆疏言挽淮歸故必先大濬淤黃河以暢其入海之路繼開清口以導其入黃繼堵成子河張福口高良澗三河以杜旁泄應分別緩急興工期以數年有效下部議從之是年內閣侍讀學士鍾佩賢亦以疏濬海港為請於是浙撫楊昌濬言漊港年久淤塞查明最要次要各工分別估修擬趁冬隙時先將寺橋等九港及諸沈二漊趕辦其餘各工及碧浪湖工程次第籌畫應與吳江長橋及太湖出水各口同時修濬得旨允行十年修龍洞舊渠並開新渠以引涇水江蘇巡撫張之萬請設水利局興修三吳水利於是重修元和吳縣吳江震澤橋竇各工最大者為吳淞江下遊至新閘百四十丈別以機器船疏之凡太倉七浦河昭文徐六涇河常熟福山港河常州河武進孟瀆超瓢港江陰黃田港河道塘閘徒陽河丹徒口支河丹陽小城河鎮江京口河均以次分年疏導幾及十年始克竣事先是侯家林決口河督喬松年以為時較晚請來年冬舉辦至是巡撫丁寶楨言此處決口不堵必致浸淹曹兗濟十餘州縣若再向東南奔注則清津𩹉下河一帶更形吃重請親往督工堵築詔奬勉之十二年以直隸河患頻仍命總督李鴻章仿雍正間成法籌修畿輔水利旋議定直隸諸河皆以淀池為宣蓄西淀數百里河道為民生一大關鍵先堵趙村決口築磁河瀦龍河南隄以禦外水挑濬盧僧中亭兩河分減大清河水勢以免倒灌並疏通趙王河道將苟各莊以上巨隄及下口鷹嘴壩各建閘座是年秋直隸運河隄決內閣學士宋晉請擇修各河渠以工代賑從之十三年挑濬天津陳家溝至塌河淀邊減河三千七百餘丈又自塌河淀循金鐘河故道斜趨入薊運河開新河萬四千一百餘丈俾通省河流分溜由北塘歸海石莊戶決口奪溜南趨命寶楨速籌堵築旋以決口驟難施工請在迤下之賈莊建壩堵合即於南北岸普築長隄而北岸濮州之上遊為開州並飭直督合力籌辦光緒元年濬文安勝芳河修菏澤賈莊南岸長隄及北岸金隄二年濬張家橋新舊泗河三年濬濟寧夏鎮迤南十字河給事中夏獻馨請修水利以裕民食諭各督撫酌奪情形悉心區畫四年修補濱江黃柏山至樊口四十里老隄並於樊口內建石閘五年修都江堰隄灌縣溫江崇慶舊淹田地涸復八萬二千餘畝七年挑濬大清河下遊使水暢入東淀並於獻縣朱家口古羊河東岸另闢滹沱減河使水歸子牙河故道達津入海濬寶坻武清境內北運減河大學士左宗棠請興辦順直水利以陝甘應餉之軍助直隸治河之役總督李鴻章言近畿水利受病過深凡永定大清滹沱北運南運五大河及附麗之六十餘支河原有閘壩堤埝無一不壞減河引河無一不塞而節宣諸水之南泊北泊東淀西淀早被濁流填淤僅恃天津三岔口一線海河迤邐出口平時既不能暢消秋冬海潮頂托倒灌節節皆病修治之法須先從此入手五大河中以永定之害為最深其大清北運南運須分別挑濬築隄修復減河滹沱趨向無定自來未設隄防同治七年由䤝城北徙以文安大窪為壑其故道之難復上遊之難分下遊之難泄曾國藩與臣詳陳有案東西淀寬廣數百里淤泥厚積人力難施頻年以來修復永定河金門閘壩裁灣切灘加築隄段大清河則於新雄境內開盧僧減河霸州文安境內接開中亭勝芳等河分泄上遊盛漲於任丘開趙王減河分泄西淀盛漲又於文安左各莊至臺頭挑河身二十餘里以暢下遊去路滹沱河則於河間及文安穵開引河二又於獻縣朱家口另闢減河三十餘里均歸子牙河達津北運河則於通州築壩挽潮白河歸槽於香河王家務武清筐兒港修復石壩以泄漲水於天津霍家嘴疏濬引河以通下口又於武清寶坻挑挖王家務筐兒港兩減河以資暢泄南運河則於青滄靜海修隄二百餘里於靜海新官屯另闢減河六十餘里使別途出海又於天津城東永定大清滹沱北運交會之陳家灣開河百餘里分泄四大河之水徑達北塘入海其無極蠡博高陽一帶則堅築珠龍河隄以防滹沱北越任丘至天津一帶則加築千里隄格淀隄使河自河而淀自淀又於廣平開洺河順德挑澧河趙州濬泲槐午諸河此外河道受害較深者均酌量疏築今宗棠請以隨帶各營移治上遊正可輔直隸之不逮此後應修何處當隨時會商實力襄助疏入命恭親王奕欣醇親王奕會同辦理是年加修子牙河隄萬七千四百餘丈文安西隄二千九百餘丈展寬靜海東堤二千四百餘丈九年安徽學政徐郙言江皖兩省水患頻仍亟須挑泗沂為導淮先路仿抽溝法循序疏治由大通口引河入海泄水較易命宗棠昌濬會商籌辦尋疏覆言天下無有利無害之水疏舊黃河分減泗沂近年已著成效自當加挑寬深兼疏大通口以暢出海之途設復淮局於清江派員提調估計分年分段興辦去其太甚之害留其本然之利江北於皖省為下遊下遊利上遊自無不利矣報聞十年河南巡撫鹿傳霖言豫省地勢平衍衛淇沁潭襟帶西北淮汝渦潁交匯東南如果一律疏通加以溝渠引灌農田大可受益今河道半皆壅滯溝渠亦多荒廢擬借人力以補天災派員分赴各州縣履勘籌畫或疏或濬志在必成使民間曉然於有利農田自能踴躍用命詔如所請行宗棠言興修江南水利各工最大者為朱家山赤山湖朱家山自浦口至張家堡接通滁河綿亙百二十餘里赤山湖自道士壩蟹子壩至三汊河下遊亦綿亙百二十里兩年工竣不惟沿江墟田均受其利而糧艘貨船亦可由內河行尤屬農商兩便下部知之十一年七月以張曜所部十營馮南斌二營蔣東才四營濬京師內外護城河十一月竣工十三年河決鄭州全溜注淮因濬張福口引河及興化之大周閘河丁溪場之古河口小海三河俾由新陽射陽等河入海十四年鑿廣西江面險灘由蒼梧迄陽朔七百餘里共開險灘三十五十六年江蘇巡撫剛毅以寶山蘊藻河道失修迤西大壩壅遏水脈請興工挑築給事中金壽松言利少害多命總督曾國荃妥籌覆疏言擬拆去同治間所築土壩以通嘉定寶山之水道仍規復咸豐間所建舊閘以還嘉定之水利另開引河以通河流俾得隨時宣泄下部知之挑濬餘杭南湖並疏濬苕溪華州羅紋河下遊各村連年遭水沿河數百頃良田盡成澤國巡撫鹿傳霖請由吳家橋北大荔之胡村開渠引水注渭則其流舒暢被淹民田即可涸復耕作從之給事中洪良品以直隸頻年水災請籌疏濬以興水利事下總督籌議鴻章言原奏大致以開溝渠營稻田為急大都沿襲舊聞信為確論而於古今地勢之異致南北天時之異宜尚未深考夫以太行左轉西北萬峰矗天伏秋大雨口外數千里千溪萬派之水奔騰而下畿南一帶地平土疏頃刻輒漲數尺或一二丈衝蕩泛溢勢所必然聖祖慮清濁河流之不可制也乃築千里隄格淀隄使淀與子牙河各行一路世宗慮永定河南行之淤淀也令引渾河別由一道改移下口其餘官隄民隄今昔增築綜計不下三四千里沙土雜半險工林立每當伏秋盛漲兵民日夜防守甚於防寇豈有放水灌入平地之理今若語沿河居民開渠引水鮮不錯愕駭怪者且水田之利不獨地勢難行即天時亦南北迥異春夏之交布秧宜雨而直隸彼時則苦雨少泉涸今釜陽各河出山處土人頗知鑿渠藝稻節屆芒種上遊水入渠則下遊舟行苦淺屢起訟端東西淀左近窪地鄉民亦散布稻種私冀旱年一穫每當伏秋漲發輒遭漂沒此實限於天時斷非人力所能補救者也以近代事考之明徐貞明僅營田三百九十餘頃汪應蛟僅營田五十頃董應舉營田最多亦僅千八百餘頃然皆黍粟兼收非皆水稻且其志在墾荒殖穀並非藉減水患今訪其遺迹所營之田非導山泉即傍海潮絶不引大河無節制之水以資灌溉安能藉減河水之患又安能廣營多穫以抵恃大之入雍正間怡賢親王等興修直隸水利四年之間營治稻田六千餘頃然不旋踵而其利頓減九年大學士朱軾河道總督劉於義即將距水較遠地勢稍高之田聽民隨便種植可見直隸水田之不能盡營而踵行擴充之不易也恭讀乾隆二十七年上諭物土宜者南北燥溼不能不從其性儻將窪地盡改作秧田雨水多時自可藉以儲用雨澤一歉又將何以救旱從前近京議修水利營田始終未收實濟可見地利不能強同謨訓昭垂永宜遵守即如天津地方康熙間總兵藍理在城南墾水田二百餘頃未久淤廢咸豐九年親王僧格林沁督師海口墾水田四十餘頃嗣以旱潦不時迄未能一律種稻而所費已屬不資光緒初臣以海防緊要不可不講求屯政曾飭提督周盛傳在天津東南開挖引河墾水田千三百餘頃用淮勇民夫數萬人經營六七年之久始獲成熟此在潮汐可恃之地役南方習農之人尚且勞費若此若於五大河經流多分支派穿穴隄防濬溝遂於平原易黍粟以粳稻水不應時土非澤埴竊恐欲富民而適以擾民欲減水患而適以增水患也十七年剛毅言吳淞江為農田水利所資自道光六年浚治後又經六十餘年淤墊日甚前年秋雨連旬河湖泛濫積潦竟無消路去年十月派員開辦並調營勇協同民夫分段合作約三月內可告竣報聞鴻章又言寶坻青龍灣減河自香河之王家務經寶坻至寧河入海去歲霪雨兼旬河流狂漲橫隄決岸寶坻受害獨深廣安橋以下河身淺窄大寶莊以上並無河槽應與昔年所開之普濟河黃莊新河一律挑深添建石閘沈秉成松椿言淮南堰墟廳所管之洪澤湖關繫水道利病鹽漕諸務今全湖之水下趨毫無節制現勘得應行先辦之工曰修復三壩曰修整束水隄曰展挑三福口計三項工程不過數萬兩可以集事或有議於禮河迤西蔡家莊建滾水石壩使水可蓄泄較有把握惟巨款難籌應暫緩辦均詔如所請堵築吳橋宣惠河缺口二河陝汝道鐵珊以閿鄉北濱黃河城垣屢被衝坍因於城外築大石壩挑溜護城十八年疏鑿福山港徐六涇二河及高浦耿涇海洋塘西洋港四河山東巡撫福潤言小清河為民田水利所關年久淤塞前撫臣張曜籌議疏通因工漲款絀僅修下遊博興之金家橋至壽光海道長百餘里其上遊工程應接續興挑庶使歷城等縣所受各水悉可入海今擬規復小清河正軌而不拘牽故道由金家橋而西取直擇窪區接開正河歷博興高苑新城長山鄒平至齊東曹家坡長九十七里又於金家橋迤下開支河二十四里至柳橋以承濟麻大湖上遊各河之水引入新河計長四千二百餘丈詔從之二十年崇明海岸被潮衝嚙逼近城牆於青龍港東西兩面設立敵水壩四加建木橋疊砌石塊以禦風潮二十一年署兩江總督張之洞言黃河支流之減水河洪河自虞城夏邑永城經碭山蕭縣達宿州靈壁泗州之睢河而注於洪湖其間湖港紛歧皆下注睢河乾隆年間以睢河不能容導水為三曰北股中股南股中股為睢河正流咸豐初黃河日益淤墊漸及改徙豫江皖各河亦逐段淤阻水潦泛溢為害尤以永蕭碭為甚同治間建議疏河恆以工程過大屢議屢輟今擬改道辦法導北股河之水以達靈壁嶽河導中股南股河之水合流入宿州運糧溝以達澮河而運糧一溝恐不能容納應治沱河梁溝以復其舊使各河之水皆順軌下注洪湖不致橫溢則各屬水患永息矣詔如所請行二十二年御史華輝疏陳興修水利八事曰引泉曰築塘曰開渠曰通湖曰開井曰蓄水曰用車曰填石下所司議二十四年濬太倉劉河自殷港門至浦家港口四千一百餘丈二十八年江西巡撫李興鋭言近年水患頻仍皆由鄱陽湖日見淤淺而長江昔寬今狹驟遭大雨疏泄不及遂至四溢為災請於冬晴水淺時購製挖泥機器輪船數艘將全湖分別挑挖其上遊河道亦一律擇要疏治既為防水患起見亦為興商務張本從之修湖北省城北路隄紅關至春山八段南路隄白沙洲至金口十段以禦外江之泛漲建石閘數座以備內湖之宣泄又於附郭沿江十餘里一律增修石剝岸濬小清河開徒陽河百二十餘里宣統元年署直隸總督那桐言通州鮎魚溝隄岸自光緒九年決口流入港溝而歸鳳河嗣後屢堵屢潰至二十四年大汛復決迄今未能堵閉以致武清百數十村頻年潰沒今擬於鮎魚溝暫建滾水壩俾全溜不致旁趨倘遇盛漲即將土埝挑除俾資分泄一面將上遊堤壩挑補整齊疏濬青龍灣等處引河以減盛漲築攔水埝以禦渾流修估龍鳳河以疏積潦滾水壩工程應即興辦其修隄及疏引河應於本年秋後部署來年二月興工攔水埝及龍鳳河應於來年秋後部署次年二月興工均限伏汛前報竣下部議行湖廣總督陳夔龍請修復江襄潰口略謂江襄各隄以潛江之袁家月隄為最要此次潰口隄身沖刷頓落四百餘丈回流湍急附近悉成澤國應及時築合此外郭家嘴禹王廟潰隄及天門黑牛渡沔陽呂蒙營公安高李公松滋楊家腦監利河龍廟各隄工均擬派員督辦籌修以期鞏固從之寧夏滿營開墾馬廠荒地先治唐渠以裕瀦停之地挑濬百二十餘里曰正渠自靖益堡開支口引水西北行四十餘里而入之溝曰新渠沿渠列小口四十挾水以歸諸田曰支渠唐渠以西淪為澤國非溝以宣之不為功自杏子湖起穿溝二百八十餘里建大小石閘木閘四十二石橋木橋三十三經始上年九月至本年八月告成名曰湛恩渠約成腴田二十萬畝是年東三省總督奉天巡撫合詞請修遼河先從雙臺子河隄入手次年續修鴨島冷家口工程並挑挖海口攔江沙與遼河工程同時舉辦下部知之
