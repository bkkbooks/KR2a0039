body:
  text: 清史稿卷一百三十志一百五兵一有清以武功定天下太祖高皇帝崛起東方初定旗兵制八旗子弟人盡為兵不啻舉國皆兵焉太宗征藩部世祖定中原八旗兵力最強聖祖平南服世宗征青海高宗定西疆以旗兵為主而輔之以緑營仁宗勦教匪宣宗禦外寇兼用防軍而以鄉兵助之文宗穆宗先後平粵捻湘軍初起淮軍繼之而練勇之功始著至是兵制蓋數變矣道咸以後海禁大開德宗復立海軍內江外海與水師並行而練軍陸軍又相繼以起擾攘數年卒釀新軍之變以兵興者終以兵敗嗚呼豈非天哉今作兵志一曰八旗二曰緑營三曰防軍附陸軍四曰鄉兵五曰土兵六曰水師七曰海軍八曰邊防九曰海防十曰訓練十一曰製造十二曰馬政並分著於篇八旗清初太祖以遺甲十三副起歸附日衆設四旗曰正黃正白正紅正藍復增四旗曰鑲黃鑲白鑲紅鑲藍統滿洲蒙古漢軍之衆八旗之制自此始每旗三百人為一牛彔以牛彔額真領之五牛彔領以札蘭額真五札蘭領以固山額真每固山設左右梅勒額真天命五年改牛彔額真俱為備禦官天聰八年定八旗官名總兵為昂邦章京副將為梅勒章京參將為甲喇章京各分三等備禦為牛彔章京什長為專達又定固山額真行營馬兵為阿禮哈超哈其後曰驍騎營巴雅喇營前哨兵為噶布什賢超哈其後曰護軍及前鋒營駐防盛京兵為守兵預備兵為援兵各城寨兵為守邊兵舊蒙古左右營為左右翼兵舊漢兵為烏真超哈孔有德之天祐兵尚可喜之天助兵並入漢軍九年以所獲察哈爾部衆及喀喇沁壯丁分為蒙古八旗制與滿洲八旗同崇德二年分漢軍為二旗置左右翼四年分為四旗曰純皂曰皂鑲黃曰皂鑲白曰皂鑲紅七年設漢軍八旗制與滿洲同世祖定鼎燕京分置滿蒙漢八旗於京城以次釐定兵制禁衛兵大類有二曰郎衛曰兵衛郎衛之制領侍衛內大臣六人鑲黃正黃正白旗各二人內大臣六人散秩大臣無定員侍衛分四等更有藍翎侍衛凡御前侍衛乾清門侍衛由三旗簡用漢侍衛由武進士簡用皆無定員初鑲黃正黃正白三旗天子自將選其子弟曰侍衛凡值殿廷以領侍衛內大臣統之宿衛乾清門內右門神武門寧壽門為內班宿衛太和門為外班行幸駐蹕咸從其扈從後扈二人前引十人豹尾班侍衛六十人凡佐領親軍鑲黃旗滿洲八十五佐領蒙古二十八佐領每佐領親軍二人正黃旗滿洲九十三佐領蒙古二十四佐領正白旗滿洲八十六佐領蒙古二十九佐領三旗親軍選六十人隨侍衛行走餘皆值宿巡幸則御前大臣侍衛乾清門侍衛咸從行營則列兩廂餘於幔城之隅環拱宿衛康熙二十九年以武進士技優者拔置侍衛偕三旗值宿雍正十一年以親軍未滿十年者挑選前鋒滿漢八旗左右翼各設前鋒統領一人備警蹕宿衛侍衛班內有上駟院侍衛司轡司鞍其兼尚虞鷹鷂房鶻房十五善射射鵠善撲等侍衛統在三旗額內俱無定員鑾儀衛亦侍從武職設掌衛司內大臣一人鑾儀使三人冠軍使十人雲麾使治儀正整儀尉各有差專司乘輿鹵簿校尉由內府選者為旗尉由五城選者為民尉此八旗郎衛制也兵衛之制定鼎初即以上三旗守衛紫禁宮闕以護軍統領參領前鋒統領率之噶布什賢超哈滿洲蒙古八旗分左右翼備宿衛內務府三旗各設佐領三人旗鼓佐領四人正黃旗設朝鮮佐領一人每二丁設馬甲一每佐領各設領催六護軍十五以領侍衛內大臣率之內務府官兵守護行宮者分東西北三路設千總等官兵額不等熱河行宮亦如之其守護陵寢者順治初永陵福陵昭陵各設雲騎尉騎都尉嗣後盛京三陵增設總管防禦驍騎校京師東西陵制亦如之所屬各旗驍騎有差八年制定親王至輔國公等以次設長史護衛等官十七年定八旗漢字官名固山額真曰都統梅勒章京曰副都統甲喇章京曰參領牛彔章京曰佐領昂邦章京曰總管烏真超哈曰漢軍凡滿蒙漢各旗共選四千八百人為養育兵訓練技藝嗣後兵額屢增乾隆中滿蒙養育兵至二萬三百餘人盛京打牲烏拉設總管協領佐領等員轄打牲兵丁吉林之參戶蜜戶漁戶獵戶鷹狐獺鸛諸戶咸隸內府三旗其巡捕營汛守外七城門上設步兵汛二十五所城外分中南北三營馬步兵汛額各有差統以參將遊擊等暢春圓明靜明等園守兵統以守備康熙初定駐蹕之地八旗護軍分左右翼巡宿啓蹕則三旗營總護軍參領隨行十三年定八旗步兵二萬一千餘名鳥槍步兵凡千七百三十七名又定內九門外七門設城門校轄十六門門軍其步軍營汛守皇城內各汛專用滿洲城外各汛兼用蒙古漢軍尋定上駐園則八旗兩翼翼分七汛更番宿衛每日當值之前鋒鳥槍護軍共七百二十人二十一年定田獵每年三舉八旗各簡前鋒軍校以從二十二年定車駕巡幸期八旗驍騎營於內外城並增汛所二十三年以黑龍江所進精騎射善殺虎者編虎槍營三十年設火器營雍正元年設巡捕營馬兵汛十五步兵汛五十二凡朝會期協尉副尉率步軍巡警二年諭各旗共選四千八百教養兵習長槍挑刀各藝四年令八旗前鋒習射月六次其專司防火者曰防範兵九年令五旗門汛護軍馬甲均歸本營操演令三旗增訓練兵二千編為二營十三年額定馬甲五千二百五十春秋二季合操乾隆十四年設雲梯兵一營又於昆明湖設趕繒船以前鋒軍習水戰二十五年令來京回人編一佐領以和卓為佐領統轄之後皆準此三十九年定大閲頭隊前鋒八旗分為八隊每隊小旗八海螺四為殿後兵四十一年以來京之番子視回人例編一佐領統於內務府正白旗四十六年增京師步軍左右二營合南北中為五營分二十三汛領兵一萬於八旗漢軍鄂爾布步甲閒散內擇壯丁充補嘉慶四年令巡捕五營以中營作提標管圓明園五汛參將四人分管南北左右四營共十八汛兩翼總兵分轄之十七年以增設之健鋭營歸左翼外火器營歸右翼合八旗前鋒內火器營驍騎營凡三十六營咸豐三年諭京師各旗營兵十四萬九千有奇統兵大臣分班親閲馬步火器務令精整不得以臨時召募濫充十年從勝保請令八旗兵加練槍炮撎槍同治四年諭醇親王訓練神機營旗緑各營亦隨時校閲光緒二十四年選練神機營馬步隊以萬人為先鋒隊習槍炮及行陳戰法此八旗兵衛制也八旗駐防之兵大類有四曰畿輔駐防兵其藩部內附之衆及在京內務府理藩院所轄悉附焉曰東三省駐防兵曰各直省駐防兵新疆駐防兵附焉曰藩部兵畿輔駐防兵制順治初獨石口張家口山海關喜峯口古北口並設防禦一人或二人釆育里固安縣設防守尉防禦有差康熙十四年察哈爾八旗每旗設總管一人副總管一人參領三人佐領驍騎校護軍校各有差捕盜官每旗二人親軍前鋒各二護軍十七領催四驍騎二十五在京蒙古都統兼轄之山海關總管一人防禦八人滿蒙漢兵七百有奇尋設張家口總管一防禦七兵百三十有奇獨石口古北口增防禦各二喜峰口防禦二冷口羅文峪防禦各一兵多則六十八少則十二人雍正三年設天津水師營都統一協領六佐領防禦驍騎校各三十二旗兵千六百人蒙古兵四百人分左右兩翼乾隆三年增熱河駐防兵二千人委前鋒校前鋒領催鳥槍領催馬甲鳥槍馬甲炮甲弓矢匠各有差以千四百人駐熱河四百駐喀喇河屯二百駐樺榆溝八年改山海關總管為副都統增協領佐領諸屬滿蒙漢兵共八百人分左右翼二十六年設察哈爾都統一人駐張家口理八旗游牧兼轄防兵副都統二人駐左右翼游牧邊界四十五年設駐防密雲滿蒙兵二千嘉慶三年增熱河圍場副都統九年改總管十五年改設都統一人以厄魯特達什達瓦降衆徙居科布多旋分其屬為三旗設總管副總管佐領驍騎校等尋移至熱河作為官兵先是康熙中建避暑山莊於熱河設總管守備千總分守各行宮乾隆間增建行宮設千總委署千總一二人兵自六人至九十八人不等木蘭圍場總管一人康熙季年設有防禦八及滿蒙兵百餘逮乾隆中年增左右翼長二驍騎校八駐兵共八百人每一兵給地一頃二十畝或地不宜耕種則改給牛羊木蘭之地周遭樹柵為界設營房八卡倫四十八旗各分五卡倫各以旗兵守之道光四年諭駐京旗兵遇閏月賞給甲米他省不得援例此畿輔駐防制也東三省駐防兵制共駐四十四所兵三萬五千三百餘人凡前鋒領催馬甲守門庫等兵步甲夜捕手匠役養育兵鳥槍馬甲領催水手之屬或設或否名額多寡各視駐地所宜損益區置之初無定限其在盛京天聰間始設駐防於牛莊蓋州兵九十六人順治元年世祖將遷燕京設盛京八旗駐防兵以正黃旗內大臣和洛會總統之以鑲黃旗梅勒章京統左翼正紅旗梅勒章京統右翼每旗設滿洲協領一佐領四蒙古漢軍佐領各一設熊嶽城守官其下滿洲佐領三漢軍佐領一錦州鳳凰城寧遠城守官其下各設滿洲佐領各二漢軍佐領一興京遼陽牛莊岫巖義州城守官滿洲佐領各一人蓋州海州滿漢佐領各一統駐防兵康熙元年改盛京昂邦章京為鎮守遼東等處將軍梅勒章京二人為副都統統轄協領佐領驍騎校四年改遼東將軍為奉天將軍十四年設錦州義州城守尉各一佐領驍騎校各有差各邊門皆置防禦一尋設開原防禦三金州防禦一兵辨各有差五十五年設金州駐防水師營船十號兵五百水手一百雍正五年設熊嶽副都統一人廣寧義州錦州寧遠至山海關設副都統一復州南金州鳳凰城岫巖旅順等處設副都統一分轄旗兵乾隆十二年改奉天將軍為鎮守盛京將軍盛京各額兵都一萬五千有奇其在吉林順治十年設寧古塔昂邦章京一梅勒章京二佐領驍騎校各八十八年設吉林水師營康熙元年改寧古塔昂邦章京為將軍梅勒章京為副都統三年設水師營總管各員七年增寧古塔協領二十年以寧古塔副都統一佐領驍騎校各十一兵七百移駐吉林又增吉林協領八佐領防禦驍騎校各十二兵六百人尋增防禦十五人十五年移寧古塔將軍駐吉林留副都統於寧古塔增吉林副都統一人三十一年設伯都訥協領二人佐領驍騎校各三十防禦八五十三年設三姓琿春協領一佐領驍騎校防禦有差雍正三年設阿勒楚喀協領一人佐領驍騎校防禦各五十年設三姓副都統一人尋設吉林鳥槍營參領一人佐領驍騎校各八鳥槍兵千乾隆十三年令打牲烏拉兵歸吉林將軍兼轄先是順治時設打牲烏拉協領二又設總管一人統轄珠軒頭目及參蜜漁獵諸戶專司採捕諸役後遞增佐領防禦八驍騎校十或八額兵千至是以在吉林境命兼統於吉林將軍二十一年設阿勒楚喀副都統一人道光六年以雙城堡移駐京旗分左右翼各設總副屯達二人嗣又分一旗五屯增總副屯達各六人其在黑龍江當康熙初年自吉林移水師營來駐齊齊哈爾等處水手一千有奇盛京壯丁散處者隨時編入八旗巴爾呼人錫伯人居近吉林卦勒察人居近伯都訥庫爾喀人居近琿春並設佐領驍騎校等分駐其東北最遠者索倫達呼爾二部天命天聰間相率內附其後分充各城額兵至鄂倫春所居益遠使馬使鹿部分處山林業捕貂皆審戶比丁列於軍伍二十二年初置黑龍江將軍原水師營總管等並屬之設副都統二協領四佐領驍騎校各二十四防禦八滿洲兵千索倫達呼爾兵五百駐愛琿城二十三年設打牲處總管一副總管二以索倫達呼爾壯丁編設佐領驍騎校尋於墨爾根城設駐防兵二十九年移將軍駐墨爾根又增協領四佐領驍騎校各七索倫達呼爾兵四百餘以副都統一人統兵駐愛琿尋設兵千餘駐