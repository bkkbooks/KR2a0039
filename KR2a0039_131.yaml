body:
  text: 清史稿卷一百三十一志一百六兵二緑營緑營規制始自前明清順治初天下已定始建各省營制緑營之制有馬兵守兵戰兵戰守皆步兵額外外委皆馬兵綜天下制兵都六十六萬人安徽最少閩廣以有水師故最多甘肅次之緑營隸禁旅者惟京師五城巡捕營步兵將軍兼統緑營者惟四川有屯兵者惟湖南貴州其新疆之緑營屯防始乾隆二十五年由陝甘陸續移往駐防各省標兵規制督撫得隨時疏定緑營戰功自康熙征三藩時用旗緑兵至四十萬雲貴多山地緑營步兵居前旗兵繼之所向輒捷其後平定準部回疆金川咸有勛績乾隆四十六年增兵而川楚教匪之役英法通商之役兵力反遜於前逮粵寇起廣西緑營額兵二萬三千土兵一萬四千遇敵輒靡承平日久暮氣乘之自同治迄光緒疊經裁汰緑營之制僅存而已京師巡捕五營設步軍統領一人統左右翼總兵官以及十六門門千總海淀暢春園樹村汛靜宜園樂善園設副將或守備各官不等置兵共三千人京城內九門外七門每門設千總二門甲十或二十門軍四十人左翼總兵統步軍營巡捕南左二營各汛官凡兵三千六百有奇右翼總兵統步軍營巡捕北右二營各汛官凡兵二千五百有奇各直省營制順治元年定直隸官兵經制設直隸巡撫標兵分左右二營遊擊以下八人設宣府真定薊州通州天津山海關六鎮總兵官及鎮標守備遊擊等設紫荊關等七協副將及協標官兵設拱極城等十七處參將山永等營遊擊鞏華城等處守備都司分領各營兵定山東官兵經制設河道總督標兵分中左右三營設副將或遊擊以下將領八兵凡三千備河防護運山東巡撫標兵分左右二營設遊擊以下將領八兵凡二千設臨清沂州二鎮總兵官及將領八兵共二千四百有奇設德州青州武定三營參將或守備將領八或六兵共二千二百有奇設登州水師營守備登州萊州臨清濟南各營遊擊或守備四兵共一千二百有奇初山東與直隸河南共一總督康熙元年設山東提督尋並裁去以巡撫兼任山西江南陝西官兵經制並於順治二年定之山西設宣大總督及巡撫督標分中左右三營撫標分左右營各設將領八兵凡二千設太原平陽二協副將及協標官兵設汾州等營參將遊擊守備分領營兵十三年裁宣大總督康熙元年設山西提督迭裁迭復雍正九年仍裁之以巡撫兼任江南設漕運總督江蘇鳳廬二巡撫標兵及左右營如制將領九或八人兵共四千有奇並設奇兵營遊兵營設江南漢兵提督分中左右前後五營分設將領八兵凡四千設蘇州鎮江浦口安慶池太東山廣德八鎮總兵官鎮標兵及將領設狼山等七協副將金山常州各營參將遊擊守備分領營兵國初設江南江西河南總督其後分合不常康熙間定為兩江總督又裁鳳廬巡撫歸併江蘇設蘇松提督尋定為江寧提督增安徽提督分轄營務又裁安徽提督改江南水陸提督統全省官兵先是設操江巡撫轄安慶等五府滁和等三州兵後改安徽巡撫以鳳廬兵並屬之陝西初設川陝總督並轄四川兵標兵分五營別設西安延綏甘肅寧夏四巡撫標兵各分左右營將領略如諸省設延綏固原臨鞏鳳翔漢羌甘肅六鎮總兵官鎮標兵亦分五營將領如之延綏又分設東西二協設西安慶陽等八處副將宜君階州等各營參將遊擊都司及守備分領營兵康熙時迭改川陝總督並轄山陝甘尋改川陝甘總督乾隆間甘肅分設總督以四川總督兼轄陝西兵為川陝總督復改陝甘總督國初設甘肅巡撫其寧夏延綏巡撫先後裁撤寧夏歸甘肅延綏歸陝西後又裁甘肅巡撫陝甘總督兼統撫標兵甘州置甘肅總兵官尋改設甘肅提督初設陝西漢兵提督及寧夏提督分五營皆設將領八兵凡四千人後改西安提督又移駐固原改固原提督云順治三年定河南江西湖廣官兵經制河南設巡撫標兵分左右營將領八兵二千制同上設河南提督標兵分中左右三營設將領分統設河北南陽開歸三鎮總兵官標兵各分左右營將領兵數如撫標制設開封副將守備以下將領七兵一千人河南衛輝汝寧歸德各營各參將等兵各一千設磁州營都司兵五百人後屬直隸嵩縣等二營守備兵三百或二百先是河南與直隸山東共一總督兼轄河南官兵其後或專設河南總督或裁改之至雍正十三年仍為河南巡撫江西初設巡撫及南贛巡撫標兵分左右營設將領五人兵凡千五百人設江西提督標兵分五營營設將領八兵凡五千人設南贛九江二鎮總兵官標兵分五營各設遊擊以下將領官兵如提標之數設袁州等四協副將分左右營將領各八兵凡二千人設廣德各營參將撫州各水師營守備兵六百人南康等營守備兵三百人康熙初年裁南贛巡撫以標兵屬江西巡撫七年裁提督十三年復設嗣增設撫建提督旋裁之並裁江西提督以巡撫兼任湖廣設總督標兵分中左右營將領各八兵凡三千人設湖北巡撫鄖陽巡撫偏沅巡撫撫標兵分左右營將領官兵如江西撫標例設湖廣提督標兵分五營將領官兵如江西提標例設荊州鄖陽長沙三鎮總兵官辰州協副將標兵各分中左右營各設將領八兵凡三千人設黃州承天常德三協副將協標兵各設將領七兵凡千二百人承天協後改安陸營設漢陽等營參將將領各四兵六百人夷陵等營遊擊各設將領三兵四百人設三江口等營守備把總兵各二百人康熙初並湖廣總督為川湖總督其後四川總督不轄湖廣復設湖廣總督裁鄖陽巡撫以湖北巡撫統轄標兵順治四年定四川官兵經制設四川巡撫標兵分左右營各設將領八兵凡千三百人設建昌保寧永寧夔州四鎮總兵官鎮標分三營設將領八兵凡二千人設松潘成都重慶三協副將協標兵分二營設遊擊以下將領官兵設威茂等各營參將遊擊守備分領營兵四川初僅設巡撫駐成都府川陝總督駐陝西兼轄四川十四年嗣設四川總督駐重慶府其間或並為川湖總督駐荊州九年移駐重慶十九年或云川陝甘或云川陝遷改靡常至乾隆間定為四川總督順治五年定浙江官兵經制設總督標兵分三營設副將或遊擊將領各八兵共三千設浙江巡撫標兵二營將領各八兵共二千浙江提督標兵三營營設將領八兵共三千設定海衢州二鎮總兵官標兵皆三營營設將領八共兵各三千錢塘水師二營台州水師三營營設將領八共兵各三千衢州設水師左右路總兵官標兵三營遊擊以下將領分統營兵設衢州湖州嘉興等七協副將標兵皆三營營皆設將領八每協共兵二千五六百設金華嚴州處州三協副將標兵二營將領各八共兵皆千六百設吉安等各營守備參將分統營兵先是設浙江總督其後改稱閩浙兼轄福建裁改不常雍正間定為閩浙總督順治七年定福建官兵經制設福建巡撫標兵二營將領八兵凡二千設福建水陸提督標兵三營營設將領八兵凡三千設汀州泉州銅山三鎮總兵官及援剿總兵官中路總兵官標兵各二營各設將領八兵二千設福州漳州建寧三協副將標兵三營各設將領八兵凡三千設福州水師及汀州興化邵武延平閩安同安七協副將標兵各設將領八兵凡二千設福寧協副將二營將領七兵凡千八百人設泉州等營參將長樂等營遊擊將領各八共兵各一千順治八年定兩廣官兵經制廣東設巡撫標兵二營將領八兵凡二千設廣東提督標兵五營將領八兵凡五千設廣東水師總兵官標兵六千分左右二協中左右三營二協設副將復分二營設將領八兵一千五百三營水師各設將領八兵各一千設肇慶潮州瓊州三鎮總兵官標兵二營將領八兵凡二千設韶州惠州高州南雄四協副將協標兵皆二營將領各八共兵各二千惟南雄為一千六百設肇慶高州水師及吳川等營參將柘林鎮各營遊擊將領各七共兵各一千設東莞始興等州縣守備以下將領兵二百至五百有差廣西設巡撫標兵二營將領八兵凡千五百廣西提督標兵分五營將領八兵凡四千有奇設左右翼總兵官並桂林暨南寧城守營九年增設潯梧柳慶思南三協副將以下將領兵各千二百鬱林新太河池三營參將以下將領兵各六百永寧昭平二營參將以下將領兵各四百上思三里二營守備以下將領兵各二百賀縣營守備兵百人十年定兩廣總督標兵分五營中營設將領八左右前後營共將領八兵凡五千國初置兩廣總督康熙二年專轄廣東四年兼轄兩廣雍正元年復專轄廣東十三年仍兼轄兩廣順治十六年定雲貴官兵經制設雲貴總督標兵分中左右前四營中營設將領八餘三營將領八兵凡四千設雲南巡撫標兵二營將領八兵一千五百先一年貴州設巡撫營制亦同及是設貴州提督標兵分左右前後四營左營設將領八餘三營將領八兵凡三千設大定黔西鎮遠威寧四鎮總兵官標兵三營將領八兵各二千有奇設貴陽城守協及平遠定廣銅仁平越安南五協副將標兵二營遊擊以下將領設思南營等處參將遊擊守備分統官兵國初雲貴總督兩省互駐康熙元年分置兩省總督自後或改或併逮乾隆中仍定為雲貴總督此直省緑營初制也雍正四年靖逆將軍富寧安於哈密置大小卡路八西安總兵潘之善於沙州西南諸隘設哨探置臺站防夷五年以浙江緑營積弱選山陝甘兵壯健者移駐之十年以苗疆遼闊貴州改設總兵遊擊統轄丹江台拱等營及銅仁鎮遠石阡各協並新設上江下江諸營協隸古州以鎮攝之十一年諭各總兵官巡察營伍乾隆五年用湖廣總督那蘇圖言裁虛設戰船除私立提塘及字識占冒口糧之弊十六年定哈密駐防兵制於安甘涼肅四提鎮營分遣將辨草餘兵二千往駐二年一受代四月八月迭更半數新舊相間以資教練回營時鎮臣核其勤惰分別擢用之十八年陝甘總督尹繼善疏陳西陲防務宜慎選安西將材多備槍彈預蓄資糧築城垣擇畜牧允行二十四年改安西提督為巴里坤提督設哈密副將以下將領八兵八百餘裁改有差尋改設烏魯木齊總兵官分中左右營及城守營隸巴里坤提督凡巴里坤烏魯木齊將領官兵歸陝甘總督統屬乾隆四十一年大小金川平新入版圖屯兵駐守制同內地設懋功綏靖崇化撫邊慶寧等營置遊擊守備等官兵共二千六百有奇四十九年以陝甘總督福康安言甘肅原設額兵五萬六千六百人陝西額兵三萬四千五百九十人迭經移駐裁併存兵五萬五千九百餘減原額過半嗣增兵萬二千七百餘合舊存兵額凡七萬人而州縣墩戍兵力猶單請於平涼等府州縣各增兵額墩堡四十四座於各標兵內酌選移駐從之旋議再增兵三千又議陝甘各營兵習弓矢鳥槍馬上槍箭每日在本營習技五日小合操十日大合操演九進十連環陳法練徑旅三萬人五十三年諭提鎮不得私立旗牌伴當等名致侵兵額嘉慶四年以剿辦教匪各省額兵徵調四出令各省召募補充五年陝西設寧陝鎮總兵副將以下官咸如昔制十年諭各督撫提鎮以練習鄉勇法練習緑旗兵道光五年諭直隸備戰兵萬五千三百有奇演習車炮陳式旋即議裁十六年諭直隸營兵以四成習弓矢二成習步槍兼馬槍其刀矛二技令藤牌軍盡習之二十二年直隸蘆台增設通永鎮總兵官以北塘海口等十五營均歸統屬分三營設遊擊守備等將領新鎮標兵凡五千四百餘專操水陸技藝咸豐八年河南歸德營升為鎮設總兵官左右營都司遊擊等馬兵五百八十步兵千一百有奇同治元年諭專設總督之直隸江南四川甘肅及督撫同城之福建廣東湖北由總督會同提督節制其江蘇浙江安徽江西陝西湖南廣西貴州各鎮兵就近由巡撫節制四年增安徽皖南鎮總兵