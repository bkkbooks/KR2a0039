處王大臣以山東省武衛先鋒隊二十營分防散漫令擇地屯駐增募成鎮是年命鐵良校閲江蘇安徽江西湖北各省防軍練軍陸軍旗兵巡警兵鐵良遍閲各軍大都軍械不一操法亦未盡羔天舊營改練進步甚遲惟安徽練軍二隊九江常備五營湖北二鎮較為生色三十三年張之洞以沿江督捕營下游緝匪營改編為水陸巡緝隊王士珍以江北巡防隊改為步隊六營馬隊二營其餘淮海水師練軍衛隊悉仍其舊錫良以雲南防軍二十七營鐵路巡防十一營土勇一營凡三十九營次第改編新軍以全省防軍每營二百五十人為定額分南防西防普防江防鐵路巡防為五路凡四十七營宣統元年以熱河巡防強勝營改編常備軍以察哈爾原有之精壯精健等營改編為巡防馬隊一營步隊二營徐世昌以奉天巡防隊分駐五路勦匪旋合編為步隊一標其河防營亦一律改編王士珍因江南防軍步隊六營炮隊二營改隸江北乃合原有之巡防隊及留防各營編為巡防第七營共巡防步隊八營以備練成一鎮原有衛隊增募一哨編為一營尚有練軍三百人水師十棚均改為巡防隊沈秉坤以雲南防軍內有各屬之保衛隊係舊日團營名為營隊實即鄉團未能遽改為巡防隊廣福以伊犂軍標漢隊係金順西征營勇之舊其營制餉章均仿湘軍乃遵新章以步隊一營馬隊二旗為左路巡防隊馬隊二旗為右路巡防隊分駐惠遠惠寧各城袁樹勛以山東省原駐淮軍於光緒二十四年移防長江新增防兵二營駐兗沂二府及德州均當南北要道未能遽裁聯魁以新疆籌餉維艱就原有防營改編為步隊三營馬隊二營又增編工程兵一隊馬隊一營勉成一協寶棻以山西省軍隊向分太原大同口外三大支巡防隊乃歸併分編為中前後三路各以統領節制之凡馬步二十二隊吳重熹以河南省巡防營不合部章就通省巡防步隊二十八營馬隊十二營分為五路豫正左軍為中路南陽鎮為前路歸德鎮為左路河州鎮為右路豫正右軍為後路趙爾巽以四川省防軍二十九營編為六軍每軍六營分中前後左右副中為六路分駐防境其防守寧遠之靖字二營遊擊步隊二營增募寧遠之靖字後營改為巡防副左路副右路兩軍每三營為一軍成都駐防滿營亦改編巡防隊三營俾臻一律瑞澄以江蘇省各營練成一協外尚有太湖水師巡防隊陸師左右巡防隊係陸路三旗及蘇捕營衛隊等先後改編者乃次第換防調操以免弛懈二年岑春蓂改編湖南省巡防隊酌定餉章即日成軍其餘緝私三旗改為南路巡防隊孫寶琦改編山東省巡防隊所有中前後左右五路各就坐營之中哨改編其炮隊以快炮六尊為一隊各府州縣巡勇悉改為巡防隊兗沂曹三府原有之巡防營亦遵新章編練恩壽以陝西省巡警軍悉改為巡防隊楊文鼎以湖南省巡防隊分為中東西南四路駐防各府崑源以察哈爾八旗壯丁編練巡防馬隊松壽以裁撤福建全省之緑營兵改為巡防隊十六營分五路駐防各府張人駿以兩江巡緝隊及師船十艘改為探訪隊其沿江巡防隊深資得力以協解北洋之淮軍餉為巡防軍餉並以江防軍分駐江寧省城錫良以奉天原有之協巡隊備補隊炮隊衛隊各防營遵章改編為陸軍步隊一標炮隊一營是年山東山西撫臣咸擬緩裁巡防軍以靖地方三年張人駿以兩江巡防軍關係重要其屬於江寧者馬步三十二營屬於江蘇者步隊六營屬於江北者步隊八營一哨馬隊一營江南北地勢扼要未可議裁並擬以新兵中副二營留防三隊改為第一二三巡防隊以一哨為提督衛隊丁寶銓以山西太原滿營於光緒二十八年已改練新操乃遵章改編為巡防隊恩壽以陝西省巡警軍已改編巡防隊並設馬步巡防營務處慶恕以青海墾荒已開墾六萬餘畝原有巡防隊不敷分布增練防軍一旗誠勳以熱河雖有直隸練軍八營僅防朝建一帶其先後所練巡防隊十三營分防各屬未能遽改陸軍張勳以長江巡防馬步炮隊十三營分駐浦口六合江寧蘇州懷遠各府縣並在沿江一帶廣布偵探以靖盜源瑞澄以湖南六營已裁所有撫標之兵選精壯編巡防一營此改設防練軍之大略也自咸豐軍興由緑營改為勇營為留防營為練軍為巡防隊為陸軍兵制變而益新至宣統年非特緑營盡汰即湘淮營勇駐防南北洋者所存亦無幾矣陸軍新制始於甲午戰後步軍統領榮祿疏保溫處道袁世凱練新軍是曰新建陸軍復練兵小站名曰定武軍兩江總督張之洞聘德人教練新軍名曰江南自強軍其後榮祿以兵部尚書協辦大學士節制北洋海陸各軍益練新軍是為武衛軍庚子亂後各省皆起練新軍或就防軍改編或用新式招練至光緒三十年畫定軍制京師設練兵處各省設督練公所改定新軍區為三十六鎮新軍制始畫一三十三年京外新練陸軍除禁衛軍外統計近畿第一鎮駐京北仰山窪官七百四十八員兵一萬一千七百六十四名第六鎮駐南苑官七百四十七員兵一萬一千八百四十六名直隸第二鎮駐保定永平等府官七百三十七員兵一萬一千七百三十一名第四鎮駐馬廠官七百四十八員兵一萬一千七百五十六名山東第五鎮駐省城濰縣昌邑等處官七百四十八員兵一萬一千七百六十四名江蘇第二十三混成協駐蘇州等處官二百七十四員兵四千三百四十五名江北第十三混成協駐清江浦官三百七十六員兵二千四百八十一名安徽步隊二標馬隊一營炮隊一隊駐省城官二百五十三員兵四千一百五十五名江南第九鎮步隊一營馬隊二隊駐省城官七百八十九員兵八千二百五十五名江西步隊一協馬隊二隊駐省城官二百三十一員兵四千二百八十七名河南第二十九混成協駐省城官三百三十八員兵五千六百十八名步隊一協馬炮隊各一營調駐京城官一百六十