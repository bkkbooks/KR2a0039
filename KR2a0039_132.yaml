body:
  text: 清史稿卷一百三十二志一百七兵三防軍陸軍防軍初皆召募於八旗緑營以外別自成營兵數多寡不定分布郡縣遇寇警則隸於專征將帥二百年間調發徵戍咸出於此若乾隆年臺灣之役乾嘉間黔楚征苗之役嘉慶間川陝教匪之役道光年洋艘征撫之役皆暫募勇營事平旋撤故嘉慶七年楚北初設提督即以勇丁充補標兵道光十七年以練勇隸於鎮筸鎮標二十三年以防守海疆之水陸義勇三萬六千人仍遣回本籍無防練軍之名也道咸間粵匪事起各省多募勇自衛張國梁募潮州勇丁最多咸豐二年命曾國藩治湖南練勇定湘軍營哨之制為防軍營制所昉逮國藩奉命東征湘勇外益以淮勇多至二百營左宗棠平西陲所部楚軍亦百數十營軍事甫定各省險要悉以勇營留防舊日緑營遂同虛設緑營兵月餉不及防勇四分之一升擢擁滯咸辭兵就勇粵捻既平左宗棠諸臣建議防營誠為徑旅有事則兵不如勇無事則分汛巡守宜以制兵為練兵而於直隸江淮南北扼要之處留勇營屯駐遂有防軍之稱練軍始自咸豐間以勇營日多屢令統兵大臣以勇補兵額而以餘勇備緩急尚無別練之師至同治元年始令各疆吏以練勇人數口糧悉數報部稽核是年於天津創練洋槍隊二年以直隸額兵酌改練軍四年兵部戶部諸臣會議選練直隸六軍始定練軍之名各省練軍乃踵行之練軍雖在額設制兵內選擇而營哨餉章悉準湘淮軍制與防軍同其緑營制兵分布列郡汛地練軍則屯聚於通都重鎮簡器械勤訓練以散為整重在屯防要地其用亦與防軍同故練軍亦防軍也同治光緒間各省所增編防練軍兵部戶部於光緒二十四年核其總數直隸練軍一萬一千人留防淮軍三萬一千人新軍一萬一千四百人毅軍一萬人奉天練軍一萬一千四百人吉林防軍八千五百九十八人練軍四千四百三十八人黑龍江練軍七千九百七十一人山西練軍四千九百人河南防軍九千一百九十人陝西防練軍一萬四千四百五十人甘肅防軍一萬二千五百人新疆防軍二萬七千八百四十五人塔爾巴哈臺勇營二千四百三十二人四川勇營一萬五千六百九十八人雲南防軍一萬五千三十三人貴州練軍九千四百八十六人廣東勇營一萬一千八百人廣西勇營一萬六千九百四十人湖南練軍一萬二千九百七十人湖北勇營一萬二千六百九十人新軍一千九十三人江西防軍九千三百六十三人安徽防練軍一萬一千二百九十人江蘇防軍二萬三千七百九十人自強軍三千一百七十人得勝軍三千人浙江防軍二萬一千三百人山東防軍一萬三千九百五十人福建防軍一萬五百四十人各省防軍練勇凡三十六萬餘人歲需餉銀二千餘萬兩其後緑營兵屢加裁汰各省衛戍之責遂專屬於防練軍光緒中葉後防練軍改為巡防隊光宣之間又改為陸軍至宣統三年各省巡防隊猶未裁盡也茲列同光宣三朝改設防練軍規畫於篇而以陸軍新制附焉防軍同治元年直隸省於大沽協標六營內選練五百人復增至二千五百人分為五營營分十隊設總統一人翼長二人各營管帶一人副管帶二人正副令官二人帶隊官十人分隊官二十人沈葆楨於江西省額兵一萬二千人內嚴汰老弱增補精鋭分為二班一班調至省城操練一班留防汛地半年換班其赴操者酌加練費較募勇之費不及其半練成即調赴前敵助戰二年劉長佑以直隸省營務積年廢弛各營兵數多寡懸殊號令不一乃改仿湘軍成規以五百人為一營設營官哨隊官及親兵分別隊伍旗幟申明號令改設六軍凡築營結陳諸法一律講求其步隊營制設營官一人哨官四人哨長五人什長四十人正兵三百六十人營官親兵五十人哨官護兵四十人營官自率中哨凡五百人其馬隊營制設營官一人幫辦二人督隊官五人每哨五棚每棚什長一人正兵九人營官自率中哨合伙兵馬夫凡三百十六人保定練軍馬步守兵一千九百五十人為一軍宣化練軍一千四百八十人為一軍古北口練軍二千四百十人為一軍大名練軍一千二百三十四人為一軍正定練軍一千四百八十人為一軍通永練軍一千七百五十四人為一軍共編為六軍五年令遵化等處各駐防軍每軍定為步隊二千人馬隊五百人在督標提標內選取凡一萬五千人分為六軍頒練兵章程十七條隸總督節制以防畿輔又於六軍外續練防勇二軍以奉天留防隊伍調補直隸練軍缺額其訓練京營由神機營量增兵額是年左宗棠以福建省緑營額冘餉薄乃裁兵十成之四即以裁餉加留營之兵並營操練六年丁寶楨於山東省增練馬隊三千人七年以各省緑營日益孱弱令各省以壯健練勇易之令曾國藩經理直隸省練兵事宜就全省緑營內抽練六千人仿勇營規制分地巡防海防議起調駐天津分中左右前後五營與勇營相犄角八年曾國藩以軍事既竣宜練兵不宜練勇而勇營良法為練軍所當參用者一文法宜簡一事權宜專一情意宜洽減兵增餉汰弱留強嚴杜頂替之弊於原有練軍四千人外古北口正定保定各練千人統以東南戰將練成之後分為四軍以二軍駐京北二軍駐京南俟功效既著增練五千人全省防營於未撤之九營外以劉銘傳全部淮軍駐防張秋以督標親軍炮隊營及前營副營駐天津以親軍炮隊營駐大沽炮臺以盛字中軍六營左軍三營仁軍二營馬隊五營駐馬廠青縣於運河西岸築炮臺五座駐盛字前軍三營右軍三營老左軍一營於滄洲駐樂字中左各一營其盛字營兼辦屯田以衛畿輔是年丁日昌以江蘇省自淮軍全部撤防以後江蘇撫標兵僅有一千六百餘人乃裁汰老弱補以勇丁分左右二營練習洋槍及開花炮諸技馬新貽以江南全省額兵一萬二千七百餘人分防各處徒有其名必須化散為整始能轉弱為強乃於督標內選千人為左右營浦口瓜洲營內選五百人為中營揚州泰州營內選五百人為前營駐省城訓練於徐州鎮標內選千人為徐防新兵左右營以地方之輕重定練兵之多寡劉錦棠以新疆全境自回民亂後旗營零落殆盡乃於烏魯木齊創設標兵於天山南北路各置額兵新疆所有駐防旗兵歸並伊犂整頓別以精騎重兵居中屯駐為南北各路策應之師崇實以四川省軍事漸定酌裁防軍選練旗緑各營九年曾國藩於直隸省增募馬勇千人分為四營原有額兵增足萬人分練馬隊步隊奏定各營哨之制及底餉練餉出征加餉之制為北方重鎮十年鮑源深以山西省撫標兵仿曾國藩直隸練兵之法選練馬隊一營步隊二營以次推行各鎮吳棠以四川全省額兵類多疲弱乃歸並訓練得精壯萬人王文韶以苗疆戡定所有湖南省留防軍三十營分布於湖南貴州接壤之區又於撫標提標內各選練精壯一營十二年令陝甘督臣左宗棠雲貴督臣岑育英各選所部勇丁以補營兵之額是時中外臣工皆注意練兵李宗羲謂勇與兵有主客聚散勤惰之異未可易勇為兵王凱泰謂各省練兵宜令更番換防雲貴蕩平以後兩省制兵亦宜換防調操以杜久駐疲惰之漸兵部諸臣會議以同治初年創議練兵京師神機營及直隸省六軍別籌練餉特立營制福建浙江廣東江蘇等省皆就所減之餉加於練軍河南山西山東湖南等省則按直隸之法於額兵內抽練於正餉外略加練費甘肅省則因軍事初定先練千五百人但各省所抽撥之兵不過原額十之二三若其餘之兵置之不問終成疲弱應令各省統兵大臣已練之兵以時休息其未練者次第調操期通省額兵咸成徑旅十三年都興阿於奉天各城額兵內選練馬隊二千人於各城八旗內選蘇拉千人為餘兵俟客兵裁撤再行增練光緒二年崇實因奉天換防旗兵日久弊生乃於岫巖熊嶽大孤山青堆子等處改設練軍三年允李慶翺之議於河南省增設練軍步隊六年令各疆臣酌量裁兵各省防軍自裁撤後為數尚多直隸陝甘須辦邊防雲南貴州則防軍較少此外各省均應大加裁汰水師自設兵輪船後舊式戰船水師亦分別去留旋廣西撫臣慶裕以廣西省兵單餉薄乃酌裁防軍以所節之餉仿直隸練兵章程在省標提標內各選練二營左右江兩鎮各選練一營岐元以奉天省自同治間馬賊四出肆擾先後商調客軍增練旗緑各營而營制餉章未能畫一光緒五年乃以直隸客軍歸並奉天省合槍炮馬步各隊釐定營制編為奉字中左右前後馬步隊五營中軍增步隊一營丁寶楨因四川省自軍興以後川勇而外益以湖南貴州各軍多至六萬餘人事定次第裁並至光緒三年實存防軍一萬餘人須分守要隘未可再裁貴州防軍較他省為少李明墀於光緒五年後陸續裁汰四千餘人李瀚章以湖北省防軍若升字三營忠義八營武毅七營水師七營皆扼要駐守不宜裁汰就湖北通省額兵酌量裁去三千餘人裕祿以安徽省自捻寇平後駐防皖南皖北各軍凡一萬八千餘人次第歸並訓練實存水陸防軍萬人七年岑育英因苗亂已平貴州之屯軍防勇量為裁並屯軍裁去九千人以裁軍補額兵酌改練軍旋移撫福建乃率貴州練軍二千人赴閩教練閩省制兵談鍾麟以浙江省防軍於光緒六年募足三十營旋裁去四營以練軍十營駐溫州海門省垣各一營餘皆歸守汛地是年以各省防軍歲餉甚巨令統兵大臣一律嚴核不得有吞蝕空額諸弊八年崇綺裁並奉天各軍於八旗捷勝營及東邊道標兵蒙古練勇外所有馬步營中之南方防勇遷地勿良乃裁並為一營餘悉遣歸原省任道鎔於山東省撫標及兗曹鎮標內抽調步兵千二百人分為三營加餉訓練張曜劉錦棠以伊犂收復就關外營勇選練制兵改行餉為坐糧略更舊制增馬隊重火器設遊擊之師復參用屯田法以足軍食九年張之洞練山西省軍隊由省標先練掃除積習為全省軍營模範李鴻章裁撤直隸省防軍除裁撤外實存直字榮字義勝各營數千人與淮軍之親兵及仁軍盛軍銘軍楚軍等馬步水師三十九營分防各地岑育英以貴州苗疆多事原設重兵數逾三萬積久廢弛專恃防軍定亂事定後以防軍歸入制兵雲南省制兵凡戰兵九千餘人守兵七千餘人塘汛堆卡零星散布而巡防緝捕專任練軍乃以戰兵屯聚於統將駐所隨時整飭潘霨裁並江西省防軍實存七千八百餘人每哨續裁十餘人量為省並曾國荃綜核廣東省募兵之數於光緒六年張之洞曾募沙民千人守虎門楊玉科增募千人及惠清營五百人鄭紹忠募安勇二千人八年募徑勇千人駐欽州鄧安邦續募千人散布廣州各屬其廣東額兵實存九千餘人十年奎斌裁汰山西省兩鎮兵三千餘人挑練大同鎮馬步隊各一營太原鎮步隊一營十一年卞寶第裁湖南省緑營選精壯為練軍給以雙餉其未足之額以營勇補之希元等抽撥吉林防軍左右路馬步營千五百人又於未練之兵及八旗臺站西丹內選三千人編為吉字營分左右二翼修築壁壘歸營訓練岑育英以雲南省沿邊之防軍一萬六千人分編三十營於每年瘴消之際親歷邊疆巡視防務卞寶第分湖南全額兵之半加以訓練編為巡防營十二年劉秉璋以四川省防營漸染習氣所有壽字武字等十營巡鹽五營一律選練整飭十三年穆圖善整理東三省練兵事宜每省挑練馬隊二起步隊八營奉天吉林黑龍江各足成四千五百人以克魯伯炮六十尊分配三省防營剛毅裁並山西省額兵六千人就餉練兵撫標馬隊一旗步隊三營太原鎮馬隊二旗步隊四營大同鎮馬隊七旗步隊二營編列成軍其北路則以樹字各營分地巡防十四年岑育英就雲南省內地防軍及邊關勇營內共選練九千六百餘人以符通省戰兵五成之數而邊境