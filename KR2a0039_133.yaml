body:
  text: 清史稿卷一百三十三志一百八兵四鄉兵鄉兵始自雍乾旋募旋散初非經制之師嘉慶間平川楚教匪鄉兵之功始著道光之季粵西寇起各省舉辦團練有駐守地方者有隨營征勦者侍郎曾國藩以衡湘團練討寇練鄉兵為勇營以兵制部勒之卒平巨憝其始皆鄉兵也而邊徼之地剿有鄉兵其在東三省者則寧古塔以東之赫哲部克雅克部混同江東北之鄂倫春部不設佐領惟設鄉兵姓長其在黑龍江者有打牲人在江以南之錫伯卦勒察江以北之索倫達瑚爾則附屬於滿營在蒙古者蒙兵而外有奇古民勇在山陝邊外者有番兵有僧俗兵在四川雲南貴州邊境者有夷兵有土司兵有黑倮勇丁在西藏者有藏番兵皆與內地鄉兵不同故不詳其各直省之鄉兵曰屯練曰民壯曰鄉團曰獵戶曰漁團曰沙民額數之多寡不齊器械之良窳不一餉章之增減不定良以聚散無恆故與額兵迥異無編制之可紀茲特志其始末於後焉雍正八年鄂爾泰平西南夷烏蒙之亂調官兵萬餘人鄉兵半之遂定東川是為鄉兵之始乾隆三十八年用兵小金川定邊將軍溫福定西將軍阿桂疏言調滿洲兵道遠費重不如多用鄉兵人地相宜四川鄉兵以金川屯練為強自平定金川以後設屯練鄉兵其糧餉倍於額兵分屯大小金川兩路春夏訓練秋冬蒐獵有戰事則搜剿山路退兵則為殿後之用嘉慶初苗疆事起傅鼐以鄉兵平苗功冠諸將詔以鼐總理邊務令各省督撫以鼐練鄉兵之法練官兵川楚教匪之役官兵征討而鄉兵之功為多其勛績最著者文臣則四川按察使劉清武臣則四川提督桂涵湖北提督羅思舉各統鄉兵分路勦寇大小數百戰遂奏膚功嘉慶十七年以雲南邊外野夷倮匪肆擾而緬寧騰越各隘皆瘴癘之地難駐官兵乃練鄉兵一千六百人以八百人駐守緬寧之丙野山梁等處以八百人駐守騰越蠻章山等處省官兵征調之勞其時苗疆底定亦增設鄉兵凡屯丁七千人訓練之暇開墾屯防田數十萬頃道光二年令直隸疆臣招集團練修築土堡互為策應十五年令各州縣額設民壯一律充補訓練復令各省民壯每月隨營操演範以紀律是年調大小金川鄉兵千名給以千人之糧隨營征戰歸屯則仍食五百人之糧二十一年令山東巡撫於蓬萊黃縣榮成寧海掖縣膠州即墨所屬之十三梟編練鄉兵互相防衞又令沿海疆臣仿浙江定海縣土堡之法凡近海村落招募鄉兵興築土堡以聯聲勢二十三年令廣東省以團練助防海口旋疆吏疏言廣東民風宜於鄉團招集已得十萬人以升平學社為團練總匯之區推及韶州廉州等處一律舉行二十六年令各州縣民壯隨營考察技藝是年甘肅沿邊番賊肆擾令疆臣召募獵戶千人編為一軍供遠探近防之用及道光季年張國樑募廣東潮州鄉兵追逐粵寇轉戰東下卒以獷悍不馴遂至潰散咸豐二年令在籍侍郎曾國藩辦理湖南鄉團旋國藩疏言先行練勇一千人所辦者乃官勇非團丁是為鄉團改勇營之始三年令山東登萊青三府舉辦聯莊團練給以兵械四年令甘肅沿邊增募獵戶三千人以防番騎八年安徽巡撫翁同書疏言皖省定遠壽州合肥等縣舉辦團練旬日之間遠近響應和州踞賊屢出焚掠多被鄉團擊回以其深明大義踴躍同仇凡董事團總人等傳諭嘉勉九年河南巡撫恆福疏言皖寇進偪豫境令道府大員於接近皖寇之地舉辦鄉團睢州等州縣興築堡寨已數十處旋諭河南官紳訓練鄉勇聯村築寨迅速舉行十年諭勝保等督辦鄉團以資統率酌定章程凡辦團州縣一律遵行惟鄉團更番調營所領糧餉易滋流弊毋得冒濫又諭江蘇等省在籍紳士除已經辦理團練外其明曉大義律身公正者自不乏人所有在京直隸江蘇安徽浙江河南等省之大小官員將如何舉行鄉團隨同官兵勦賊及防守等一切事宜各陳所見各舉所知迅即上聞尋侍郎沈兆霖疏陳自咸豐三年以後迭奉朝旨舉行鄉團已至再至三各省官紳士民未嘗不遵旨辦理而賊勢披猖卒無成效良由苟且塗飾未經實力講求或募勇以充數徒取外觀或藉端以營私轉成欲壑無事則恃為威脅擾害鄉閭有警則首先遁逃流為盜賊議者幾謂鄉團之無益而有損矣不知名為民團即當以民為團而不可以募勇塞責也民統於紳則紳之邪正宜慎擇也紳倚於官則官之賢否宜嚴辨也不歸幷於一路則督察無人必不能一律堅固不專力於四鄉則城守雖嚴已難免四面受敵官與紳宜兩相孚不宜兩相阨兵與民宜兩相顧不宜兩相仇任封疆者當知民本吾民用兵數少何如用民數多任將帥者當知兵本衞民我能救民自然民能救我現在賊氛猖獗非實辦民團更無安全之法乃擬上事宜十二條一民團須招本地有業之民不可招市井無賴也一宜分別地段以近賊一二百里為最要距賊稍遠中隔一二縣者為次要其遠在三四百里外者則從緩辦團也一各州縣要地宜一律辦團無使一處疏漏俾寇得乘隙而入也一辦團宜四鄉加密有警則互相應援無事則嚴詰奸宄庶城守完固也一牧令宜擇賢能與辦團之紳不得各存意見亦不得任用劣紳也一宜簡道府大員分路辦團俾各縣聯為一氣也一民團有急官兵速往救援不得觀望也一宜擇要設卡盤查也一民團祗可就地助戰不宜調遣變為練勇失其恆業也一立功宜即奬勵視官兵稍優也一團費宜自捐自辦不得藉端漁利也一民團辦成則分防之兵可省集合成軍攻勦更為得力也同時應詔陳言者有載垣等所議團練章程十條賈楨等所擬辦理章程八條旋命順天府府丞毛昶熙為督辦河南團練大臣南汝光道鄭元善幫辦團練事宜按照怡親王載垣等所擬章程辦理命戶部右侍郎杜為督辦山東團練大臣登萊青道貢璜登州府知府盧朝安幫辦團練事宜按照大學士賈楨等所擬條發並參酌河南章程體察情形辦理又以皖南地方緊要應一律辦團令兩江總督曾國藩察看情形擇其諳練軍務素有人望者酌保一人即令督辦皖南團練事宜旋曾國藩覆陳鄉團本是良法然奉行不善縣官徒借以斂費局紳亦從而分肥賊至則先行潰逃賊退則重加苛派轉為地方之弊所經過各省從未見有鄉團能專打一股專克一城者不過隨官兵之後勝則貪財敗則先奔常藉口於工食之太少而辦理歧異者每多給錢文團丁所領之餉與官勇例價相同且有過之其取之民間無非勸捐抽釐之類是於團練已失其本義於軍餉又大有妨礙今奉諭舉行皖南團練皖南嶺隘紛歧若築碉設卡有險可憑徽寧各要隘宜擇地築碉以資防守有在籍翰林院編修宋夢蘭當賊由太平縣竄擾徽州宋夢蘭督帶練丁協力嚴守衆論翕然請即以該員辦理皖南團練事宜會同委員董勸各屬紳民興築碉塞其未經克復者官兵攻勦概不令團丁隨往其已經克復者紳耆修碉團丁守之庶幾軍民兩利名實相符矣又以四川地屬巖疆毗連雲貴滇匪滋擾未能肅清嘉慶間四川舉辦鄉團行堅壁清野之法著有成效自應仿辦所有應行事宜諭四川在京各員就地方情形各抒所見官紳中有練達時務者各舉所知以俟後命同時尚書陳孚恩等以江西毗連安徽浙江廣東等省疏請辦理團練酌保辦事人員並擬團練事宜八條疏入允行命在籍翰林院修撰劉繹為江西督辦團練大臣吉南贛寧道沈葆楨甘肅安肅道劉于潯幫辦團練事宜按照陳孚恩等所擬章程妥為辦理同時督辦河南團練大臣順天府府丞毛昶熙疏陳團練辦法並酌擬規條一添築堡寨以扼要隘一講求險要以便堵禦一慎擇首事以資統率一分選團丁以備訓練一攤派練費以備公用一互為聲援以資聯絡一申明號令以壹衆志一嚴定約束以禁頑暴一秉公賞罰以示勸懲一嚴察奸宄以防內應一旌表忠義以作民氣一事貴實力以冀成功疏入允行毛昶熙又疏陳河南團練以歸陳二府為先前統兵大臣勝保因調團不齊勒派百姓出資雇丁統計勇糧運費較正供多至倍蓰百姓苦累紛紛稟請以抽丁一項民力已竭鄉團勢難再辦其開封等府百姓聞歸陳雇勇之苦亦復觀望不肯實辦團練之事仍恐有名無實尋奉諭用民之法總宜深得民心勝保等所辦章程既與民心不洽自應改絃更張以期得力慶廉即體察情形將此項雇勇酌量裁撤毛昶熙按照載垣等會議章程速即集團練勇以輔兵力又以甘肅控制西陲地方遼闊且與陝西四川毗連匪患未靖自應一律舉辦團練以靖邊陲所有甘肅省團練事宜即命陝甘總督樂斌督辦並命甘涼道蕭浚蘭刑部員外郎吳可讀江西候補道楊昇幫辦團練十一年以歸化之番衆僧俗兵四千餘人馬四千餘匹防禦抱罕羌人是年奉諭鄉團之設原以濟兵力所不逮必須官紳一體兵勇同心協力內靖土匪外禦賊氛於地方庶有裨益若如清盛疏劾山東章丘縣之水賽街新城之南婁里等莊以及博山萊蕪等縣鄉團遇有經過客商往來差役輒敢擅行殺戮害及無辜撫署之差弁馬匹亦被劫奪是團練禦賊尚無成效而抗官滋事竟有滋蔓之勢巡撫譚廷襄速將清盛所奏各情嚴密查訪如有藉團為名肆行不法及私立黑團聚衆抗官立即嚴懲又諭浙江巡撫前以浙省軍務未平籌辦團練勸諭捐輸原以保衞民生若如王履謙疏劾辦團情形雜亂無章勸捐委員令捐戶加捐至數十倍之多並於捐戶加以威逼今賊氛逼近浙東若因勸捐辦理不善致失人心必致激成內訌巡撫王有齡速即會同王履謙妥為勸辦議定章程不得徇私委派貪劣之員是年左副都御史潘祖蔭疏言各省設立團練大臣辦理年餘曾無一效請奬請紛紛效尤並未克復一城其為無益已可概見應將團練大臣分別裁撤以一事機而節糜費翰林院侍講學士顏宗儀疏言鄉團之設原以百姓之財力衞百姓之身家果能衆志成城同仇敵愾即一舉貢生監足以統領之無俟大員為之督率若必以大僚綜任之幫辦司員分理之是督撫之外又設督撫僚屬之外又增僚屬徒滋紛擾上年豫省辦團各省團練大臣亦紛紛四出旋因浙江四川陝西甘肅等省情形不同旋即裁撤而直隸山東江南江北等處則仍歸由團練大臣辦理於是幫辦人員假公濟私百端紛擾或偪勒州縣供應或苛派民間銀錢或於官設捐局之外團練再設捐局或於官抽釐金之外團練再抽釐金或查閱各處團防支應紛煩地方告乏或任令家人奴僕勒索規費約束不嚴幫辦人員或十餘人或數十人薪水所出皆刻剝民間刁生劣監因以把持地方狡吏貪夫藉以希圖名利流弊實多各省團練大臣直隸桑春榮操守尚嚴山東杜已嘖有煩言至於江北江南所辦鄉團自上年至今未聞有團練大臣收復一州一縣者徒以騷動天下無益有損今山東杜已經撤回河南毛昶熙較有成效其直隸江南江北等處團練大臣宜一幷撤回其各省州縣距賊較遠者停止辦團以安民業其距賊較近之處仍責地方官切實辦團而以本省督撫總其成庶事權不至紛歧商民可免滋擾旋奉諭直隸團練大臣桑春榮回京供職直隸團練事宜責成文煜辦理江西團練大臣劉繹來京任用江西團練事宜責成毓科督同官紳辦理其二省京官如有回籍辦團者各部院查取職名飭令來京供職江北團練大臣晏端書江西團練大臣龐鍾璐其辦理團練是否仍須該員經理抑或即可裁撤令曾國藩薛煥速議以聞王履謙幫辦浙江團練兼辦浙東捐務今浙江軍務方殷自難遽撤令王有齡會同王履謙切實籌辦以固疆圉毛昶熙在河南歸德著有成效應否仍令毛昶熙督辦團練及有無把握之處令嚴樹森速議以聞旋兩江總督曾國藩覆陳團練之設只能防小支千餘之游匪不能勦大股數萬之悍賊其練丁口糧若太多則與募勇之價相等不必僅以團名若太少則與官勇之餉迥殊不能得其死力其團防經費若取諸丁漕釐捐四者之中則有礙督撫籌發之途若設法四者之外則更無措手之處事權既無專屬剛柔實覺兩難晏端書在江北不設餉局但勸各邑築圩自保龐鍾璐在江南激勸鄉民俾知同仇敵愾之義辦理極有斟酌今之賊勢決非鄉團所能奏功應俟賊氛稍衰大功將成然後辦團練以善其後晏端書龐鍾璐二員清操雅望內任最宜應請裁去團練差使回京供職疏入允之同治元年諭鄉團之設原以使民自衞身家藉可保全地方以輔官兵前因各路辦理團練大臣隨帶多員任意騷擾有害無利是以陸續裁撤仍責令地方官切實經理乃邇來統兵大員守土牧令或恐其分餉而輕為裁撤或疑其無益而視為具文於是民心不固盜賊橫行所過州縣村莊動遭劫掠是又地方官不能因地制宜舉行團練之所致因噎廢食貽誤殊多嗣後各省團練仍由督撫臣通飭各州縣選公正紳士實力興辦務使官不掣肘民悉同心城市鄉村聲勢聯絡其有認真辦理保全地方者將其實在勞績聲明保奬二年以都察院代遞山東貢生朱德秀條陳團練事宜語多可采命朱德秀回籍隨同英桂趙德轍辦理團練並命英桂督飭官紳就地方情形認真辦團毋得有名無實是年統兵大臣僧格林沁疏言各省練團築寨本以助守望而禦寇盜為權宜補救之法乃各團每以有寨可據輒藐視官長擅理詞訟或聚衆抗糧或挾仇械鬬甚至謀為不軌踞城戕官如山東之劉德培河南之李瞻先後倡亂而安徽之苗沛霖尤為梟桀反復勞師糜餉始得次第翦除辦團之舉始則合一鄉為一團繼則聯衆團為一練地廣人多良莠不齊不肖團長有跋扈情形承辦團練紳士又不能杜漸防微隨時舉發致有尾大不掉之勢況捻匪屢經竄擾之區亦未見各團堵禦得力其河南團練均由侍郎毛昶熙管理毛昶熙於通省地方勢難周歷兼顧而各練既有專管大員地方官轉至呼應不靈今賊氛漸平請命毛昶熙回京供職所有團練視直隸山東之例歸地方官經理以一事權並請飭河南巡撫嚴查各團如有增置軍械等事均責令禀請地方官允准置備如不肖團長借修圍製械種種斂錢以致苦累鄉民即從嚴懲辦庶幾權歸於上免滋流弊御史裘德俊疏言團練之舉本屬有治人無治法今直隸善後章程有抽撥鄉團訓練之議但抽撥鄉兵必得賢明牧令駕馭有方乃能權不下移民無擾累若遇不肖州縣借端苛斂抽丁派費吏胥因緣為奸上下咸思中飽小民已不聊生加以每縣聚衆數百人游手無著以強淩弱甚或恃衆把持一有亂萌尤易響應不可不遠慮及之旋奉諭山東鄉團已由官為經理所有河南省團練事宜亦統歸官辦以一事權其直隸抽練團丁督臣劉長佑權其利害是否可行如有窒礙之處即據實以聞六年李雲麟招募奇古民勇駐八里岡與科布多塔爾巴哈台蒙兵為犄角七年諭各疆臣捻寇蕩平勇丁亦各還鄉里誠恐江南安徽河南山東從前被兵處所不免伏莽潛匿乘隙為害江皖等省督撫於徐海潁亳歸汝曹沂等處飭各地方官勸諭民間照舊修理圩寨整頓鄉團互相保衞此外各處民團亦應一律整飭慎選牧令安良除暴以靖地方十二年因四川峨邊廳蠻族投誠擇充千百戶等職編制夷兵建修碉堡光緒六年兩廣總督張之洞募沙民千人助守虎門楊玉科增募千人及惠清營五百人鄭紹忠募安勇二千人所募鄉兵以防勇規制編之是年命黑龍江將軍於增練馬隊外秋冬之季招集打牲人等加以訓練八年兩江總督左宗棠以江蘇沿江海州縣捕魚為業者甚多於內江外海風濤沙線無不熟諳而崇明尤為各海口漁戶爭趨之所其中有技勇而悉洋務者所在不乏外洋船駛入內江者每用漁戶為導江蘇自川沙迄贛榆二十二州縣濱臨江海漁戶約數萬人乃令蘇松太道員為沿海漁團督辦於漁戶每百人中選壯健三十人練漁團五千名設總局於吳淞口設分局於濱海各縣每月操練二次習水勇技藝用以捕盜緝私兼備水師之選十一年雲貴總督岑毓英釐定雲南通省營制倮黑勇丁編為六營西南土防編為二十五營又因雲南沿邊由西而東南皆野人山寨布列於九隘之外乃調兵二千人與原有防軍及鄉團土司協力警備督辦廣東軍務大臣彭玉麟以欽州廉州地廣兵單招募鄉團協守是年吉林將軍增練防軍佐以烏拉牲丁凡萬五千人二十四年都察院代陳湖南舉人何鎮圭條陳團練事宜命兵部議奏又諭侍郎張蔭桓疏請實行團練同時臣工屢有仿西法練民兵之請若各省實行團練即以鄉團為民兵用更番替換之法較諸遽練民兵為有把握廣西會匪滋事尤宜速辦以收捍禦之功各省督撫一律切實籌辦各省於三月內廣東廣西於一月內將辦理情形具疏以聞三十年廣西巡撫柯逢時令廣西各州縣增募鄉勇八千人給以毛瑟後膛槍並令民間多築碉堡共禦外侮三十一年兩廣總督李經羲增練防營並募土著鄉兵備廣西邊境新疆巡撫潘效蘇以新疆兵費太重改募土著仿勇營訓練次第遣散客軍三十四年雲南防軍裁并於騰越臨安兩路創設團練藉資捍衞宣統元年各省改防營為巡防隊雲貴總督沈秉堃以雲南防軍內有各屬之保衞團係昔日之鄉團名為營隊實即鄉兵未能遽改為巡防隊乃仍其舊此鄉兵舉廢之概略也
