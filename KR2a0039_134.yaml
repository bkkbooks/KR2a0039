body:
  text: 清史稿卷一百三十四志一百九兵五土兵土兵惟川甘湖廣雲貴有之調征西南常得其用康熙間莽依圖戰馬寶於韶嶺瑤兵為後援傅弘烈平廣西亦藉土兵義勇之力乾隆征廓爾喀調金川土兵五千討安南以土兵隨征傅恆征金川疏言奮勇摧敵固仗八旗嚮導必用土兵小金川土兵尤驍勇善戰嶽鍾琪平西藏咸同間討黔蜀髮匪其明效也古西南夷多槃瓠遺種曰僚曰伶曰曰僮曰瑤曰苗其後蕃衍有西番人擺夷𡋉些佫咱哩倮俍瑤等目苗蠻種類尤多如花苗紅苗花仡佬紅仡佬白倮儸黑倮儸皆是土兵多出其中故驍強可用土兵之制甘肅四川兩廣湖南雲貴或隸土司或屬土辨或歸營汛甘肅土兵附番部四川土兵附屯辨屯蕃湖南土兵附練兵屯兵別有番民七十九族分隸西寧西藏茲並述于篇甘肅土兵狄道州臨洮衛指揮僉事轄十五族河州指揮僉事轄四十八戶韓家集指揮使轄二族岷州宕昌城指揮使轄十六族攢都溝外委百戶轄四十一莊麻里外委土官轄二族閭井外委百戶轄十一莊歸安里副千戶轄土民四十八族番民四十三族洮州廳卓泥堡指揮使兼護國禪師轄五百二十族馬兵五百步兵千五百土守備一千總把總四外委七資卜指揮使轄七十六族土守備一千總把總外委各二馬兵五十步兵百著遜百戶轄七族兵十人西寧縣寄彥才溝指揮使轄八族土千總一把總二馬兵五十步兵百陳家臺指揮使轄一百十二戶土千總把總各一馬兵五步兵二十乞塔城指揮使轄四十八族土千總把總各一馬步兵各五十納家莊指揮僉事轄百二十戶土千總把總各一兵二十五人西川海子溝指揮僉事轄番民十八戶土民三十戶土千總把總兵額同上癿迭溝指揮僉事轄九十戶土千總把總兵額同上循化廳土千戶轄西鄉上四工韓姓撒拉保安堡土千戶轄東鄉下四工馬姓撒拉撒拉不同番回似羌而奉回教舊十三工今隸循化八工餘隸巴燕戎格癿藏土百戶轄五族大通縣大通川土千戶轄五族碾伯縣勝番溝指揮同知轄七百戶土千總二把總四馬步兵百上川口指揮同知轄四千戶土千戶一百戶二土千總四把總六馬步兵三百趙家灣指揮同知轄百二十戶土千總把總各一馬兵五步兵二白崖子指揮同知轄百五十戶兵二十五美都川指揮僉事轄三百戶土千總把總各一兵二十五朱家堡指揮僉事轄六十二戶兵二十五米拉溝指揮僉事轄七十戶土千總把總各一馬步兵二十五九家巷百戶轄百餘戶兵二十五王家堡百戶轄百餘戶兵二十喇守莊指揮僉事轄七十二戶莊浪掌印土司指揮使轄指揮僉事指揮使指揮同知正副千戶各一百戶二土民十旗番民八旗文職隸甘涼道武職隸西寧鎮紅山堡掌土司印指揮僉事兵五十古城及大營灣指揮使大通峽口指揮同知古城正千戶馬軍堡副千戶西坪正千戶西六渠百戶均率親丁效力不轄土民永昌縣流水溝寺千戶轄番民五旗甘肅番部狄道州三族河州十八族皆康熙時舊族雜處二十四關內洮州廳八族大小九十餘處亦曰南番土司楊積慶屬番民五百二十族咱天錫屬番民七十六族楊永隆屬番民七族著洛寺僧綱楊溯洛旺秀轄番民二十三族麻儞寺僧綱馬昂旺丹主轄番民二十一族圓成寺僧正侯洛扎旦主轄番民四族岷州熟番四十三族舊屬土司後為歸安里惟白水江以南南山內外皆黑番所在亦稱若瓦南山以東馬土司轄以西楊土司轄凡番寺三十五所轄番民古喇哈等二十四族文縣番族五百族番地二十二處馬百戶番地二十八處雍正八年改番歸流曰新民西寧縣番民十三族番寺三十八族貴德廳熟番舊五十四族存五族生番舊十九族存五族野番十九族俱插帳河濱番寺大者六所循化廳口內熟番十二族口外西番四十九寨口外南番二十一寨丹噶爾廳南鄉熟番一族河南西番八族武威縣峽溝番民三族沙溝一族上下大水寺五族南山八族鎮番縣八力曼插漢番民一族永昌縣番民五族古浪縣東山圍場溝番民四族黃羊川五族柏林溝二族平番縣熟番三十六族舊十餘萬丁同治間存千餘人番寺十四所洛洛城十三堡番民八族二千三百餘丁張掖縣唐烏忒黑番三族康熙間給首領劄銜撫彝通判轄西喇古兒黃番五族唐烏忒黑番三族八族設正副頭目給守備千總職銜番民俱充兵伍高臺縣唐烏忒黑番一族每壯丁一納馬一匹入營西喇古兒黃番二族隸紅崖營四川土兵松潘廳中營所屬土司七寨土百戶二千戶五左營所屬土司二寨土千戶百戶各一右營所屬土司一寨土百戶一漳臘營所屬土司五十二寨土千戶十四百戶二十五土目十三平番營所屬土司二寨一寺土千戶三南坪營所屬土司二寨寨首二人茂州疊溪營所屬土司六寨土千戶百戶各一龍安府龍安營所屬土司隘口一堡一長官司一土通判知事各一雜谷廳維州協左營所屬土司宣慰司一轄大小二十八寨右營所屬土司宣慰司一轄十九寨長官司三轄四十五寨茂州營所屬土司長官司一副長官司一安撫司土巡檢各一懋功廳懋功協所屬土司安撫司宣撫司各一轄大小四十六寨建昌鎮中營所屬土司河東長官司一土百戶三土目十一民戶皆倮儸部落阿都正長官司一轄土目四人阿都副長官司一轄土目十一民戶皆苗夷沙罵宣撫司所轄土目五十民戶皆蠻夷右所屬河西土千總一土目四民戶皆平夷越雋廳越雋營所屬土司卭部宣撫司一土目十一寧越營所屬暖帶密土千戶一轄鄉總七土目一暖帶田壩土千戶一松林地土千戶一轄土百戶五以上民戶皆番夷鹽源縣會鹽營所屬土司木里安撫司一瓜別安撫司一馬喇副長官司一古柏樹土戶一轄土目二中所左所轄土目一右所土千戶各一前所後所土百戶各一以上