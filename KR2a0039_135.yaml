河設遊擊屬漢陽鎮右營分防自團風以下江面黃州蘭溪至道士洑兼樊口以內之梁子湖田家鎮設副將屬漢陽鎮前營分防自道士洑以下江面湋源口蘄州武穴至陸家嘴兼防湋源口及隆平以內之湖湖口設總兵官置中軍中營遊擊分防自陸家嘴以下江面至九江老洲頭吳城設參將屬湖口鎮左營分防自湖口以內姑塘南唐渚磯一帶饒州設參將屬湖口鎮後營分防都昌鄱陽康山一帶其彭蠡湖東境各湖南達省城贛江由江西省別行設防華陽鎮設遊擊屬湖口鎮右營分防自老洲頭以下江面彭澤縣香口至東流等處兼防吉水溝以內各湖安慶府設副將屬湖口鎮前營分防自東流以下江面黃石磯李陽河至樅陽兼防北岸鹽河及樅陽以下南岸通殷家匯之河太平府設長江水師提督衙署置中軍中營副將分防金柱關以下江面至烏江大通設參將屬提標後營分防自樅陽以下江面池州土橋至荻港蕪湖設遊擊屬提標右營分防自荻港以下江面至裕溪口並灣沚青弋江等處裕溪口設參將屬提標左營分防東西梁山江面至金柱關兼防運漕無為州各內河及巢湖百餘里水汛金陵草鞋夾設參將屬提標前營分防烏江以下江面至通江集兼防江浦六合內河瓜洲設總兵官置中軍中營遊擊分防通江集以下江面至焦山兼防內河至揚州自揚州以上高郵等湖由淮揚鎮別行設防孟河營設遊擊屬瓜洲鎮右營分防南岸各夾江自焦山至江陰口其南岸內河由松江提標別行設防三江營設遊擊屬瓜洲鎮左營分防北岸各夾江自焦山至靖江口其北岸內河由淮揚鎮別行設防江陰設副將屬瓜洲鎮前營分防自江陰以下江面而至鹿苑港及壽興等河其鹿苑港以下由福山鎮標接防狼山鎮總兵循舊日之制增水師二營兼隸長江提督原統中左右三營鹽捕揚州三江泰州泰興掘港各營悉仍其舊惟通州設綏通營置遊擊各官分防自靖江八團港以下江面至通州凡長龍戰船二艘督陣舢板一艘舢板十艘大舢板十艘仍酌增紅單拖罟等船海門廳設綏海營置副將各官分防自狼山至海門北岸江口海汊凡長龍戰船二艘督陣舢板二艘大舢板二十艘仍酌增兵輪船及紅單拖罟等船其崇明南岸海汊由江南提督別行設防綜長江經制水師副將六營參將七營遊擊十一營凡二十四營
