body:
  text: 清史稿卷一百三十五志一百十兵六水師水師有內河外海之分初沿海各省水師僅為防守海口緝捕海盜之用轄境雖在海疆官制同於內地至光緒間南北洋鐵艦製成始別設專官以統率之其內河水師天聰十年自寧古塔征瓦爾喀以地多島嶼初造戰船天命元年以水師循烏勒簡河征東海薩哈連部落順治初以京口杭州水師分防海口八年始於沿江沿海各省循明代舊制設提督總兵副將遊擊以下各武員如陸營之制各省設造船廠定師船修造年限三年小修五年大修十年拆造十年以水師克舟山增造戰艦擴充兵額十四年增設崇明水師總兵官調撥江寧江蘇安徽各省標兵萬人分防吳淞江及崇明諸口十六年增設京口左右兩路綠旗水師總兵官十八年設吉林水師營造斛船及划子船康熙八年增設福建水師總兵官十四年改崇明總兵官為水師提督十七年設福建水師提督及參將以下各官二十四年裁京口右路水師改左路水師為京口總兵官二十六年增設南臺水師營置參將以下各官二十九年更定修造戰船之制外海戰船哨船自新造之年為始三年後以次小修大修更閱三年或大修或改造內江戰船哨船則小修大修後更閱三年仍修治用之三十四年令督撫提鎮凡修理戰船銀兩不得浮冒核減致船料薄弱五十二年令趕繒等船於船之首尾刊捕盜各營鎮船名以次編列五十三年增設金州水師營於海島內選諳習水性者充之五十六年設松江水師營雍正二年令沿海各督撫出洋巡視其戰船向由地方官修造者改歸營員修造是年設乍浦水師營三年以滿洲兵丁未習水戰增設天津水師營以滿洲蒙古兵二千人隸之四年以福建水師常駐內地不耐風浪浙江水師尤甚乃更改舊制於本省洋面巡哨外每年選派船弁在閩浙外洋更番巡歷會哨以靖海氛五年以杭州駐防旗兵抽練水師江寧駐防旗兵即以鎮江原有戰船隸江寧將軍督率旗兵習水戰尋令旗兵四千人悉習水營事務令江南江西各水師營於弓矢鳥槍外增練籐牌大刀鈎鐮槍過船槍鉞斧標彈等武器戰船分大中小三等增練排槍湖廣水師每兵千人增鳥槍四百桿六年令水師船廠附近省城者凡戰船造成在城之督撫提鎮會同驗看是年因浙江水師技藝生疏乃於福建水師中擇精練之兵赴浙江教練尋定浙江戰船用木之丈尺及船身深廣之制奉天水師亦如之七年以旅順水師不諳戰務撥福建水師營精卒赴奉天教練是年增浙江乍浦水師營八年撥江寧駐防兵八百人隸乍浦營旋因各省水師營承修造船之員逐層需索迨交收後復盜賣損毀各營皆然京口標兵尤甚令督撫嚴懲之九年以文武各員承修戰船每多貽誤弊竇叢生乃嚴治各員限期修竣以除巧脫中飽之弊十年令天津水師大小趕繒船所用梗木舵牙及籐篾等具收存備用各省戰船設承修官以董造船之役由督撫提鎮委副將參將會同文職道府領價督修委都司會同文職府佐辦料修造隸將軍標者委參領等官辦理大修小修之年各營呈報有司題咨承修官具冊領價江南江西湖廣福建浙江廣東等省於屆修兩月前領銀備料臺灣瓊州於四月前備料天津山東於八月前備料各營駕船赴廠承修官即於次月興工如期修竣違則懲之其船名號各殊大小異式皆因地制宜山東登州膠州南北二汛海口趕繒船雙篷船福建大號趕繒船及二三號船雙篷船江西南湖營沙唬船天津大小趕繒船京口水師船蘇州狼山川沙吳淞水師船湖北湖南廣東各水師船之船身大小木板厚薄咸遵定制令道員會同副將等監視督造廣東外海內河戰船亦如之十一年定修造戰船限期直隸限四月福建臺灣限十月山東限六月江西大修拆造限三月小修限兩月江南限四月湖廣大修拆造限六月小修限四月浙江限四月廣東瓊州限六月其餘各廠均限四月十二年裁江蘇太湖營參將改設太湖協副將兼轄浙江太湖營遊擊各官定為內河水師營十三年議定天津福建浙江廣東各戰船所需物料或按年更新或越年更新乾隆元年議准江南各廠拆造及修理沙唬船繒船兩淮廠拆造沙唬船修造趕繒船於部價外加津貼銀兩有差各廠同之二年令山東登膠南北二汛額設雙篷船趕繒船屆修之年亦增津貼銀三年撥湖北武昌水師駐漢口為漢陽水師營中軍議准廣東各標營外海戰船拆造視修工大小加津貼有差四年因沿海各省戰船報部有缺少至十之二三者或侵蝕修船帑銀或賃與商人謀利令督撫嚴懲又諭浙江繒船拆修視江蘇省之例艄船視江蘇省沙唬船之例量加津貼五年復申禁沿海戰船缺少賃用之弊六年以臺灣遠隔重洋修造戰船仍循舊制其福建各船廠興泉道之泉廠與興泉永三府協辦汀漳龍道之漳廠與汀漳龍三府協辦鹽法道承修之福建廠與延邵建三府協辦七年裁江蘇黃浦營弁兵改為提標水師右營八年加福建三船廠津貼銀十二年加臺灣船廠運費十四年令外海內河水師戰船哨船修竣後承修官以船身丈尺及器具報有司毋損十五年以閩浙海洋緜亙數千里遠達異域所有外海商船內洋賈舶藉水師為巡護尤恃兩省總巡大員督飭弁兵保商靖盜而舊法未盡周詳自二月出巡至九月撤巡為時太久乃令各鎮總兵官每閱兩月會哨一次其會哨之月上汛則先巡北洋後巡南洋下汛則先巡南洋後巡北洋定海崇明黃巖溫州海壇金門南澳各水師總兵官南北會巡指定地方蟬遞相聯後先上下由督撫派員稽察至臺澎水師仍循曩例十六年令福建三江口營大小戰船按季整洗十七年令各省水師除江南省沙唬船巡快船福建省船輕便易使廣東虎門協營沙礁迂曲外其沿海各省戰船一律製備頭巾插花借助風力以資巡哨巡船則仿民船隨時修整五十四年以外海內河戰船舊例酌留一半為捕盜之用其餘各船次第屆期改造咸令展期三月福建浙江江南山東各省咸展期半年五十五年以搜捕海盜戰船拙滯允水師將弁之請仿民船改製戰船以期迅捷五十八年因廣東海盜充斥自南澳至瓊崖千有餘里水師戰船雖有大小百數十號僅能分防本營洋面不敷追捕致商船報劫頻聞歷年捕盜俱賃用東莞米艇而船隻不多民間苦累乃籌發十五萬兩製造二千五百石大米艇四十七艘二千石中米艇二十六艘一千五百石小米艇二十艘限三月造竣按通省水師營視海道遠近分布上下洋面配兵巡緝以佐舊船所不及五十九年以浙江定海縣之舟山外有五奎山外洋船隻皆於此寄泊實為海濱要區於定海鎮標內酌撥弁兵更番戍守六十年以沿海戰船過於累重不便捕盜每屆修造需費尤多通飭各督撫屆修造之年俱仿商船之式改造以所節浮費為外洋緝捕之用嘉慶二年浙江戰船俱仿民船改造山東戰船亦仿浙省行之其餘沿海戰船於應行拆造之年一律改小仿民船改造以利操防五年諭各省水師向設統巡總巡分巡及專汛各員出洋巡哨奉行日久有以千總等代巡之弊嗣後令總兵官為統巡副將參將遊擊為總巡都司守備為分巡遇有事故以次代巡不得以微員擅代山東水師向未有統巡等職名亦一律行之九年因各省師船向遵部頒定式僅能就近海巡查不能放洋遠出多改雇商船出洋捕盜廷臣建議戰船改商船制度以收實用旋諭江蘇省濱海之區屢有盜劫所有舊式戰船令疆臣仿廣東福建浙江之例即行改製十一年諭沿海疆吏當乾隆五十五年曾嚴飭統兵官實力訓練舟師乃日久玩生弁兵於操駕事宜全不練習遇放洋之時雇用舵工名為舟師不諳水務嗣後通飭所轄各營勒期訓練一切帆舵各技務皆羔天習其最優者不次擢用惰者懲之二十一年規復天津水師營汛以閩浙兩廣兩江各省所裁水師遵舊制募足額數改隸天津水師分營管轄二十二年增設天津水師總兵官以專責成道光四年諭福建疆臣前以閩省戰船遲重駕駛不便曾裁汰十五船其餘俟拆修之年令承修官仿同安梭船式一律改造嗣後閩洋米艇緝捕仍不得力其已改造之勝字六號米艇八艘無須裁汰外所有屆修之捷字六號十二艘存營之勝字一號十號兩艘修竣之勝字三號一艘悉行裁撤十年令直隸浙江福建統兵官增撥哨船梭巡南北洋面是年定水師人員一年試驗之制各統兵官隨帶出洋親加考驗又嚴定改用外海水師人員之制其外省世職及陸路呈改人員有才具可用或曾立功績者由督撫保題十三年整頓浙江省水師增造闊船舢板船十五年以各省水師廢弛憚於出巡致盜案出嚴飭水師提鎮實力訓練緝捕十八年以各省戰船每屆修造之年承辦各員冒領中飽不能如式製造或以舊代新或操駕不勤馴至朽腐令統兵大臣核實辦理十九年令督撫提鎮禁將弁扣索之弊並甄汰劣員如有呈改召募不得瞻徇二十年以各省戰船修造草率並有遲延積壓各弊福建船廠所修成字四號大船甫經拆造即致破壞自道光六年至二十年積壓各船至三十艘之多承修各員悉予懲處各廠應修之船一律嚴催其水師各船巡洋之餘各提鎮大員飭將弁操練燂洗毋任久泊海壖又因廣東虎門海口為海防中路要區以西境之香山東境之大鵬為左右兩翼嘉慶十五年設水師提督節制各路香山副將所轄水師兵力稍厚大鵬參將所轄弁兵僅九百餘人道光十年又分為二營其所轄大嶼山及尖沙嘴洋面為夷船聚泊之所乃擇要建砲臺二座與水師相依護以澄海副將改為大鵬協副將移駐九龍山增額設水師兼守砲臺增造大號中號米艇四艘快船二艘在水師各協營抽配弁兵巡緝洋面二十一年以外夷船堅炮利舊設外海水師強弱不敵等於虛設擬改水師為陸師專防內地尋以海盜滋擾全恃水師緝捕廣東之虎門為外海藩籬尤藉舟師之力乃定議緩裁二十二年以海上用兵專恃炮火令各疆臣訓練弁兵一律以施放炮位有準為弁兵去取又以海上用兵二載閩粵江浙水師迭致挫敗令四川湖廣等省采購巨木速製堅船駛往閩浙等省防守海疆尋因各省戰船如快蟹拖風撈繒八槳等船僅能用於江湖港汊新造之船亦止備內河巡緝難於海上衝鋒惟潘仕成捐資新製之船堅固適用炮亦得力並仿美利堅國兵船製造船樣一艘又仿英吉利國中等兵船之式調取各省工匠改造大船其例修師船一律停造以資挹注並以船炮圖說飭江蘇福建浙江三省督撫詳勘何者利用由廣東省製成分運各省又因湖北省所轄長江千餘里舊設宜昌鎮標荊州漢陽各水師營戰船不能載炮廣東匠役何禮貴曾為外洋造船能造火輪及各式戰船飭赴湖北擇何項戰船利於長江駕駛即就海船之式量為變通裕泰擬造之開浪船於海戰未宜罷之二十三年飭沿海各提鎮於每歲出洋及巡洋事畢所經歷情形悉以上聞三十年因浙江省水師廢弛飭有司整治船炮嚴禁奸民接濟海盜並令沿海將領按時出洋會哨又令山東疆臣以三汛師船四縣水勇合而為一統以專員往來策應並於扼要島嶼設置大炮咸豐元年以長江轄境緜長令張亮基等購置船炮擇要駐守三年調廣東外海水師拖罟戰船及快蟹大扒等船百艘統以大員由海道駛赴江寧助勦粵寇是年江忠源疏請廣製戰船以靖江面旋令兩廣督臣以廣東拖罟船式咨行四川湖廣各督撫或在本省或在湖北宜昌一帶迅簡工匠造水師船百餘艘每船載兵五十人於三月內竣事兼飭湖南湖北二省購船募兵與長江下游艇船協力防江旋以所購民船不合用乃收買江船之巨者仿廣東船式安置炮位與廣東所募紅單船及賃用拖罟船駛赴江南勦寇又以廣東內河及濱海各廳縣均有捐造緝捕快蟹船道光間江海捕盜悉藉其力船頭藏巨炮旁列子母炮勇丁咸技藝精練洵水戰最長令各船由海道至長江會師是年曾國藩試造師船於湖南以規模過小乃就廣東之拖罟船快蟹船二種參酌其製先造十艘續增二三十艘以能載千斤之炮為度至拖罟船則由兩湖督撫如式製造四年令廣東賃用之紅單船二十三艘並修治十九艘凡四十二艘統一武員駛入長江是年以粵寇竄擾東南水師不敷勦堵下游惟廣東紅單拖罟等船漸集瓜洲上游惟曾國藩新造戰船自湖南順流而下已達武昌其九江安慶等處尚無戰艦令張亮基駱秉章購置江船及釣鈎等船裕瑞夏廷樾在四川采購材料與駱秉章商辦旋駱秉章以四川造船江險而途遠水程不便仍在湖南購料製造兩湖紳士丁善慶遵曾國藩所定之式已成大板艇五十號長龍等船亦次第告成長江勦寇在江南取勝者以紅單船拖罟船二種為最體勢雄壯置炮最多而能順風不能逆風宜江面寬闊不宜港汊在湖南取勝者以舢板船長龍船快蟹船三種為最往來輕便搜捕尤宜而風急水溜一下難於遽上勢散而力單令湖南水師沿江攻勦與江南水師會合各用其所長以期制勝六年以曾國藩在江西所造戰船最為得力令福濟選擇將弁率工匠赴廬州仿造所需洋炮在上海撥發辦解六年胡林翼以長江水師自五年春間回駐武漢以後戰艦無多乃與駱秉章協商督率船炮局各員盡力籌謀水師復振湖南紳局所製船械交至營中者大小戰船凡三百餘艘火藥四十餘萬斤炮子一百四十萬斤其餘各械咸備請優詔奬之水師重在炮位廣東運到洋炮二百尊續運六百尊配置各師船自武漢至九江所向克捷惟長江水戰上下游形勢不同武漢以上利用輕便戰船潯皖以下江面漸廣利用巨艦秋冬風勁宜巨艦春夏宜小艇船炮之大小宜因時因地而損益之請令兩廣督臣續購大小洋炮自四百斤至一千五百斤凡八百尊盡易舊式炮位以利東征八年以天津原設水師道光間先後裁撤乃籌復設以重海防令福建廣東疆吏各抽調大號戰艦備齊炮械由海道駛赴天津設水師三千人十年令清淮籌防局籌發為防湖水師常年經費增設淮揚水師營以保兩淮鹽場兼佐陸軍蕪湖孤懸水中令曾國藩籌設寧國水師以攻蕪湖為克金陵之本增設太湖水師為克蘇州之本同治二年諭沿海督臣舉水師將才又令曾國藩所部內江水師都興阿所部揚防水師有勝外海水師之任者各舉以聞四年在山東省仿長江戰船之式造長龍舢板船於黃河水性駕駛合宜以水師泊黃運二河防堵逸寇必須分段扼守而地勢緜長不敷調遣復由山東增造長龍船並增舢板船十艘以武職大員督領巡防五年改造江南海口之紅單廣艇三十艘合原有廣艇凡四十艘分防海口六年整頓福建臺灣海防增置龍艚等船七年曾國藩議改水師之制以江南水師向分外海內河二支外海水師六千七百七十六名武員一百十八人內河水師八千二十一名武員一百三十三人船數則近稽道光二十四年江南舊例水師船二百七十五艘朽壞居多別造舢板船一百三十五艘大船十二艘約計各船不過載兵二千數百人而額定之兵數尚有萬餘人徒費餉項有水師之名無舟楫之實宜大為變通講求實際江蘇水師其營制餉章悉仿長江水師之例外海之紅單廣艇亦略增其餉與李鴻章丁日昌諸臣協力籌辦期於外防與內盜並謀舊制與新章兼顧俟章程既定沿海福建廣東各省水師均可酌改行之八年部臣定議從曾國藩所陳改江蘇水師為內洋外海𩹉河三大支以資控禦𩹉河水師以原設提標右營太湖左營右營及增設淞北淞南二營為五營隸提督統轄舢板船每營船數不等一律興修不得缺額所有太湖七營改為𩹉河五營其裁員歸幷提標序補馬新貽等續議九江水師營改城守營設陸汛四處鄱陽營改陸汛二處洞庭水師營改龍陽城守營岳州水師營酌留水兵隸陸路管轄荊州水師營酌留弁兵有差九年諭定安等以寧靈各軍運餉艱難增造炮船由黃河運送所有大小戰船三十二艘編為一營設統帶等官十年沈葆楨以外海兵船製成應簡知兵大員督率操練尋以福建水師提督李成謀為兵船統領是年曾國藩以江南水師章程初議十四條嗣由馬新貽等增為二十五條乃刪減歸幷定為二十一條外海六營以次巡哨內洋五營分定汛界𩹉河五營分定汛界淞南營淞北營太湖左營太湖右營酌增戰船水師營所遺陸汛移幷留防京口三營陸汛炮隄分別管轄改定轄營及留設守備要汛多留陸兵定將弁處分則例規定各營船數酌定外委員數酌定裁缺薪糧營官建衙署地方各營座船之數官兵額定數目書吏名數雨蓬旗幟等費官兵糧額各船酌用槍炮數目各船酌用火藥鎗炮彈綜計餉項之數下所司核議行之十一年丁寶楨調撥福建省所製安瀾兵輪赴山東洋面巡緝瑞麟調撥福建省小號兵輪赴奉天海口巡緝光緒四年裁去廣東輪拖巡船水勇二千三百餘人五年以各省舉辦水師奉天直隸山東江蘇浙江福建廣東次第駐泊兵輪編制水師而沿海各省形勢不同操法未能一律吳淞口為南北海疆適中之地乃命江南提督李朝斌為外海兵輪統領督率各省大小兵輪定期在吳淞口會操六年以新置蚊炮船便利合用續向外洋購置數十艘募福建廣東沿海精壯之民為水師分屯北洋各海口七年以奉天旅順口原有旗營艇船朽壞弁兵疲弱悉行裁汰歸陸師巡防別以快炮防海時丁汝昌由英國率戰艦回國為中國水軍航外海之始乃擢丁汝昌為水師提督八年以江南形勢先海後江朝議擬以長江水師提督駐吳淞口狼山福山崇明三鎮標隸之以江南提督移駐淮徐改福建水師提督為閩浙水師提督尋左宗棠彭玉麟議覆以海防不外戰守二端戰宜厚集兵力守宜因勢設險仍循舊制為宜福建水師自裁兵加餉後實存水師六千九百餘人旗營水師三百餘人各營拖罾龍艚快艇等大小戰船實存四十艘臺灣澎湖戰船六艘大小兵輪十艘宜聯合浙江省水師會操官制則仍循其舊九年以廣東內河之肇慶河面縣長六百餘里僅有小巡船二十餘艘不敷分布九龍洋面水淺大船難於行駛乃於二處各增設淺水兵輪船十年試造尖底舢板船分布海口旋以船質弱小罷之十一年彭玉麟以海防日亟議設水師總統於吳淞分設二鎮一駐直隸大沽凡盛京直隸山東江南各海口戰船隸之一駐福建廈門凡浙江福建臺灣廣東各海口戰船隸之兩鎮每年周巡海口會哨於吳淞是為南北洋水師建議之始十二年議裁減浙江沿海水師旋浙撫劉秉璋以舊額戰船二百五十餘艘粵寇亂後購造不及半數光緒八年裁水師船十三艘停修舊船三艘已符裁兵三成之數惟巡洋之紅單船十一艘不在額設裁減之例十四年因臺灣疆土日闢改安平水師副將為臺東陸路副將改鹿港遊擊為安平水師遊擊任新設地方鎮守之職十五年以福建內河水師炮船舊額共九十八艘頻年裁撤實存三十艘每船配置水師六人專任巡緝內洋十六年調撥福建海壇水師駐防福清縣屬以靖海盜十七年於湖南選鋒水師中前後左右營內撥一千六百餘人分防省城及岳州等處撥長勝毅安水師四百餘人分防辰州沅州常德等處撥澄湘水師三百餘人分防衡州等處以專責成是年因奉天遼河下游舊有巡船上游則僅有陸隊兼巡未有水師乃增置長龍炮船一艘舢板船八艘於練軍內選撥弁勇梭巡遼河上下及省南之洋河十九年令提督黃翼升校閱長江提標五營上江十三營下江四營定訓誡之規禁陸居戒嗜好勤練藝屏虛文不得蹈綠營之習日久玩生閩浙疆臣會議以浙江省有元凱超武二兵輪福建省有伏波琛航靖遠三兵輪與沿海水師協力緝捕而浙省水師船自裁減後僅存五十餘艘閩省自馬江戰後僅存艇船二十九艘乃在寧波海口賃用紅單等船八艘酌撥弁兵以靖海盜二十四年令江蘇省之外海內洋𩹉河太湖四支水師一律酌裁水勇二十五年以安徽省江防在下游者為東西梁山建有炮隄炮臺在上游者為闌江磯前江口及省城之江心洲咸有炮臺而缺乏水師乃撥澄清營炮船二十五艘及長江水師之蕪湖裕溪大通安慶華陽各營聯絡防守又令長江五省督撫各派將領不分畛域嚴密設防二十六年以奉天鳳凰廳沿海一帶素稱盜藪曾由北洋撥兵輪巡洋其支港各處宜屯泊水師乃於大孤山太平溝沙河三口岸各造兵船三艘酌配水師巡緝三十四年因浙江杭嘉湖三府捕匪兵單於原有水師中抽練遊擊一隊駐嘉興府增練遊擊三隊分布嘉興湖州各河港以遊擊小隊駐杭州省城賃用上海商人之小輪船十艘曳帶兵梭船巡水道以期迅捷在南洋船塢造淺水兵輪船四艘配快炮八尊江蘇亦製淺水兵輪船四艘協同內河水師仿歐西各國章程編為聯隊以資防勦此整治水師之概略也其兵額之增減船械之配置各省隨時編定外海水師北自盛京南訖閩廣凡拖繒紅單等船隸焉內河水師各省巡哨舢板等船隸焉奉天直隸山東福建水師船均屬外海江西湖廣水師船均屬內河江南浙江廣東水師船分屬外海內河其別練之師有巡湖水師巡鹽水師親兵營練軍營同治以後增定長江水師太湖水師之制視舊制加詳矣其巡防之規外海水師巡防盛京以協領為總巡佐領防禦驍騎校為分巡直隸等沿海各省以總兵官為總巡副將以下為分巡各於所治界內率水師沿海上下更番往來詰姦禁暴兩界相交之處戒期會哨以巡緝情形申報所屬將軍總督提督委員稽察若因風阻滯各廠到界之日具報其每歲定期以二月四月五月為始至九月事竣回營有引避不巡或巡而不周遍者論如軍律其內河水師巡防之制長江自四川巫山而東出三江口至湖廣界經岳州武昌興國至江西界經九江江寧京口等處東至於海各省將軍總督提鎮分委旗標弁兵沿江游巡及界而還自康熙以後以外海利用巨艦內河利用輕舟故船制屢改而轄境遼闊水師兵額時有增加遇有戰事增艦尤多征吳三桂之役命尚善率舟師入洞庭湖取岳州及鄂鼐統水師增造鳥船百艘沙船四百三十八艘置水師三萬人征臺灣之役命萬正色督率湖南浙江戰船二百艘由海道赴福建姚啟聖亦修戰船三百艘水師二萬人施琅之克澎湖用戰船三百艘水師二萬人施世驃之平朱一貴用大小戰船六百餘艘乾隆間征緬甸之役命湖廣船匠造船於蠻暮取道金沙江以攻緬甸兼調福建廣東水師助之李長庚之勦海寇在福建造大船三十艘名曰霆船配置大炮四百尊合閩浙水師全力轉戰重洋遂平蔡牽道光以後海警狎至木質舊船不敵外洋鐵艦之堅利同治五年始仿歐洲兵輪船式於福建省開廠製造輪船江蘇初設輪船四艘十一年廣東山東各設輪船一艘奉天設小輪船一艘咸配置水師其後沿海各省購置兵輪歲有增益舊式水師戰船分別裁汰至光緒中葉綜各省外海內河實存師船之數奉天外海繒船十艘直隸外海長龍船二艘先鋒舢板船四十八艘山東外海拖罾船十四艘內河哨船六艘江蘇外海輪船二艘艇船八艘內洋輪船二艘舢板船六十艘內河舢板船艇船三百八十五艘長江舢板船七十六艘督陣舢板船七艘長龍船十艘巡哨舢板船一百二十八艘安徽舢板船二百八十二艘長龍船十五艘八團船一艘槍划十艘護卡巡船十五艘督陣舢板船七艘輪船二艘江西長龍船十五艘舢板船二百六