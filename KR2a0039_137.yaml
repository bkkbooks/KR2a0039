body:
  text: 青史稿卷一百三十七志一百十二兵八邊防中國邊防東則三省北則蒙邊西則新甘川藏南則粵湘滇黔而沿邊臺卡亦內外兼顧蓋邊防與國防並重焉茲分述之曰東三省曰甘肅曰四川曰雲南曰廣東曰廣西曰蒙古附直隸山西蒙邊防務曰新疆曰西藏曰苗疆曰沿邊墩臺卡倫鄂博碉堡東三省為陪都重地曰奉天曰吉林曰黑龍江東連日韓北連俄羅斯邊防尤要奉天當康熙元年廷臣建議自興京至山海關東西千餘里自開原至金州南北千餘里有河東西之分河東自開原至牛莊河西自山海關歷松杏山大凌河為明季邊防之地戶口寥落請預籌實邊嗣後休養生聚城鎮日繁凡大城十四邊門二十餘至同治間邊界漸廣將軍都興阿以鳳靉二邊門外之地自靉陽門外八里甸子東至兩江匯口轉西南至海沿而下直至貢道北老邊牆南路經孤頂子等岡由西南至舊邊小黑山均展拓為邊界此外若大東溝江海相連之處一律查勘以綏藩服尋以地方遼闊增調防軍其防軍之外尤以練軍為重光緒二年崇實以金州大東溝等處旗兵不足增練步隊分防十一年王大臣等會議奉天界接朝鮮舊以遼陽迤東鳳凰城等四城為要地今則水路趨重大連灣旅順口陸路自同治間開墾荒地以後耕廛比櫛直抵鴨緑江西岸額設防兵二萬二千餘人新設練軍及緝捕勇丁一萬三千餘人而練習新式槍炮者不及半數宜加練大支徑旅扼要屯駐宣統元年以延吉廳一帶為交涉要地令奉省疆吏調遣軍隊分配憲兵建築營房新設之長白廳開山通道駐兵建署鴨緑江上遊之防務亦次第籌備蓋自日據朝鮮與奉吉接壤東邊防務日益亟矣吉林凡大城八邊門四其防務至重者一為琿春與俄羅斯逼壤兼接朝鮮曠無障阻一為三姓乃松花江之上遊伯都訥腹地之屏蔽其三岔口可由蒙古草地達奉天法庫邊門光緒初年就未練之兵及八旗臺站西丹內選精壯者練馬步四營七年吳大澄始於吉林創設機器局製造軍械並於扼要處建築炮臺以陸路轉運維艱協商直隸督臣李鴻章派員及熟手工匠至吉林開廠俟廠局告成再於寧古塔琿春等處增築炮臺十一年增練馬隊步隊共六營足四千五百人之數隸左右翼統率訓練吉林額設防兵及烏拉牲丁凡一萬五千餘人內靖萑苻外支強敵時虞不給云黑龍江凡大城六新舊卡倫七十一中俄接界向以尼布楚與恰克圖為重地故斥堠之設多在北徼舊制於歲之五六月間齊齊哈爾墨爾根黑龍江三處疆吏各遣協領佐領等官率兵分三路至格爾畢齊額爾古訥墨里勒克楚爾海圖等處巡視歲終具疏以聞康熙二十三年始設將軍以下各官以鎮守之凡前鋒領催馬甲匠役養育兵咸歸統率額設之兵一萬三千餘人光緒元年以正兵六千人西丹四千人合練步隊萬人時俄騎東略沿邊自北而東列戍防秋遂無寧歲六年加練西丹五千人分布愛琿呼倫貝爾布特哈墨爾根呼蘭齊齊哈爾等處原有馬隊二千人加練千人秋冬之際招集打牲人等加以訓練以佐兵力八年籌備黑龍江邊防在奉天調教習在天津運炮械共練馬隊五千人分駐各城裁舊設卡倫二十六處以新練之隊伍巡防十一年命奉天吉林黑龍江三省疆吏各練徑兵為東西策應之師並墾闢荒地開采礦山為實邊之計黑龍江復增練馬步各營蓋自俄人侵食黑龍江以北及烏蘇里江興凱湖以東各地處處與我連界邊防日重及俄築東清鐵道日占南滿於是防不勝防云甘肅北達蒙部南雜番回西接新疆寧夏以河套為屏藩西寧與撒喇相錯處為西陲奧區康熙三十三年增戍兵五百於大馬營控扼雪山要路增馬步兵三千人於定羌廟以守硤口咸隸於肅州總兵官雍正二年青海蕩平於西寧之北川邊之外自巴爾託海至扁都口一帶創築邊牆城堡於青海巴爾虎鹽池等處設副將以下各官於大通河南北設參將以下各官以西陲重要全省馬步戰守兵凡五萬七千餘人關外換防兵凡九千餘人兵額獨多於他省三年以布隆吉爾為安西鎮設總兵等官額兵五千人因莊浪西之仙米寺地方山深林密設守備等官移涼州高古城額兵駐守五年於大通鎮設馬步兵二千人以白塔川側爾吐二處逼近邊境各設兵八百人以插漢地方遼闊設寶豐新渠二縣設文武各官並增戍兵控制賀蘭山一帶八年嶽鍾琪於吐魯番通伊犂之要路嚴設卡倫巴爾庫庫等處多駐防兵闊舍圖地方為南北二山鎖合處屯駐重兵分防南北山口十一年因西路之布隆吉爾北連哈密西接沙州為關外重地乃建築城垣屯兵防守乾隆四十九年福康安阿桂籌備邊防自蘭州迤東至涇州一千餘里北達邊城外則番族環居內則回民錯處戍寥落乃擇要增設營戍凡將辨二十三人兵丁二千人嗣又增兵三千人北路靖遠南路秦階大河東西各處互為捍衛道光二年以察罕諾門汗投誠其所轄二十族分為左右二翼視蒙古例每翼統以專員嚴稽關卡以孤河北野番之勢三年因青海蒙古向未有受事盟長乃就青海二十旗內設正副盟長各一人隨同官兵習武以防番衆渡河十一年楊遇春於察罕託洛地方增設蒙古兵分作二班布守各卡以佐官兵二十三年富尼揚阿於將軍臺會亭子二處各建城垣防禦西番二十六年布彥泰以番賊擾邊規復防河舊制增兵千人分布沿河渡口又哈喇庫圖爾營所屬之南山根及南川營所屬之青石坡二處為野番出入總路各以汛兵駐守永安營紅崖營永昌協所屬之扁都口石灰關各要口三十八處均撥兵巡守自數十人至百餘人不等沿邊小口各備坑塹以遏賊騎時番賊恃其槍馬便利頻年竄擾亦斯門沁地方為番騎來往要區募獵戶千人編為一軍供遠探近防之用旋以亦斯門沁設兵僅可防甘涼二州之扁都口等隘二十七處兵力尚嫌不足復於沙金城設兵千人以防涼州所屬之一顆樹等三十處隘口於野牛溝設兵千人以防甘州所屬之大磁窰等十八處隘口提鎮大員復督率沿邊將辨先事預防自粵寇披猖回匪乘之玉關雪嶺間騷然不靖咸豐元年以番賊復出令琦善等撥兵設卡嚴密巡防二年令舒興阿等督率邊卡文武修濠壘增馬探各營定期會哨分途堵截四年因西寧一帶番族窺伺增募獵戶三千人分防隘口八年以青海迤西戈壁給番民暫居令西寧總兵道員定立界址九年令甘肅省疆臣督辦團練事宜同治十年豫師等於甘涼各處邊隘自平番至威遠各口及巴燕戎格山後與西寧番地通連者一律加意嚴防張曜因甘肅之金塔一帶邊牆損壞平番之裴家營古浪之大靖土門甘涼之南山各口時有土番竄擾分遣員辨偵探防堵十一年左宗棠于河州迤西之西南北三面毗連番界及槐樹關老鴉關土門關三隘口與抱罕羌人接境之處以歸化之番衆僧俗四千人馬四千餘匹防守各關是時平定關隴皆客軍之力數萬額兵幾同虛設左宗棠懲前毖後乃減兵加餉繕器械簡軍實以重邊防惟新設之靈武化平硝海三營兵數無多逼近蒙番之永昌莊浪松山三營仍循舊額云四川西連衛藏北接青海南盡蠻夷自雍正乾隆間青海大小金川次第綏定沿邊之防以打箭爐為尤重康熙三十九年移化林營於打箭爐以防爐番雍正元年年羹堯於川陝各處邊隘擇要增兵一為中渡河口乃通西藏要路修築土城以守備移駐一為保縣在大河之南乃土番出沒之所一為越嶲地多蠻倮一為松潘外之阿樹及黃勝岡察木多均撥兵駐守設遊擊千總等官二年青海蕩平於邊外單葛耳斯地方設參將等官暗門拉科恆鈴子三處設守備等官河州保安堡設遊擊等官打箭爐外之木雅吉達鴉龍江中渡𩹉塘巴塘鄂洛五處設總兵副將等官率兵駐守六年嶽鍾琪因河東西苗民改土歸流以後建昌遂為沿邊重鎮乃於柏香坪冕山寧番寧越鹽井波沙托木熱水等處增設將備營汛合原有之辨兵咸隸於建昌鎮標十年黃廷桂以建昌之竹核及涼山西南之魚紅地方當諸蠻出入門戶谷堆格落二處大赤口小河壩勒必鐵阿都四處皆係邊要乃於竹核設將備兵丁共三千人阿都設兵千人乾隆十七年嶽鍾琪因番衆投誠以威茂副將移駐雜谷腦設兵千二百人西南境與梭卓接壤之處均設汛駐兵四十一年金川平定於雅州建城命提督移駐增兵六千五百人分守沿邊四十四年設懋功綏靖崇化撫邊慶寧五營制同內地隸松潘鎮總兵以控番徼四十五年特成額因川邊外之察木多曾設遊擊等辨兵控制西藏今藏事敉平乃抽撥營兵移防江卡增築碉房並於三暗巴一帶設守備等官道光十三年以副將率兵二千人駐大樹堡濬濠建碉兼防河道以松潘屯千九百人歸並峨邊十九年因川邊防兵僅四千餘人不敷防守於馬邊雷波越嶲峨邊屏山各廳縣增兵二千人增練兵千六百人改營制修碉堡並飭鎮道各員於秋冬分巡邊界尋以馬邊等廳夷匪不靖命大臣齊慎親往籌防同治十二年因峨邊廳蠻族投誠擇充千百戶等職編制夷兵建修碉堡光緒二十三年鹿傳霖以三瞻地接𩹉塘為入藏北界擬設定瞻直隸廳而移建昌道於打箭爐仿金川五屯之制設立屯官及將辨汛兵並接展電線至前藏其事議而未行三十三年部臣議裁並邊防軍趙爾豐以川邊原有巡防五營已屬不敷調遣遂定議緩裁宣統初年趙爾巽以打箭爐外所有改土歸流屬地擬悉隸於邊務大臣並增設官吏寬籌經費協濟兵食以固邊圉三年趙爾豐收回三瞻土司之梗化者遂自請歸流云雲南沿邊環接外夷南境之蒙自當越南國西南境之騰越當緬甸國尤為南維鎖鑰騰越界連野番舊設八關九隘以土練駐防緬甸國入貢之道向由虎踞關入經孟卯隴川等處以達南甸設南營都司以備之自外海輪舶南來直抵新街商賈咸趨北道由騰城西南行經南甸千崖盞達三宣撫司歷四程而至蠻允過此即野人境其間有三路下為河邊路中為石梯路上為炎山路下路較近上路則柴草咸便行四日至蠻暮入緬甸界舟行一日可達新街又印度東境之野山係珞瑜番族英吉利人由印度侵入闢地種茶桑其地可通孟養而達騰越邊外強鄰野俗錯處可虞明代舊置銅壁巨石萬仞諸關以固邊圉水道則海珀江自千崖以下水勢漸寬與大金沙江合流元代征緬甸以舟師制勝取建瓴之勢也其永昌順寧大理三府及蒙化一廳楚雄府之姚州皆迤西邊界山深箐密漢夷雜處清初原設永順鎮總兵逮改鎮為協僅於永昌城駐兵沿邊一帶有鞭長莫及之虞雍正二年青海平定於鴉龍江各處設副將等官宗鄱地方當雲南孔道設參將等官以靖邊服三年因威遠大山為苗倮盤踞之所乃於普茶山各處設參將等官兵丁千二百人並於九龍江口設立防汛四年以四川阿墩子地方當中甸門戶移其防汛歸雲南省管轄與𩹉塘打箭爐相為犄角五年以中甸延袤千里為滇省西南藩籬維西乃通西藏要隘增設參將營於中甸守備營於維西六年因烏蒙鎮雄二處地方遼闊於烏蒙設總兵等官鎮雄設參將等官分隘駐防所有舊設之貴州威寧營雲南鎮雄營東川營咸隸烏蒙鎮總兵調遣建築城垣旋增兵千五百人設尋甸州參將等官七年設普洱府及普洱鎮將標兵三千二百人分防各路乾隆三十二年以木邦為通緬甸要路並九龍江隴川黑山門各隘咸以兵駐守四十三年李侍堯因永昌普洱等府向以鎮協標千五百人在三台山龍江一帶駐營防緬冬去春回頗形煩纍雲南省控制全邊重在騰越其南甸之東南為杉木籠距虎踞關百餘里當騰越左臂南甸之西南為千崖距銅壁萬仞神護巨石諸關均一二百里實為各路咽喉乃於杉木籠千崖二處各增將辨營汛龍陵地方道通木邦原駐兵千五百人其南三台山尤為扼要亦增設辨兵以順寧一路舊有之額兵分駐緬寧與永順右營協同防守總督提鎮大員每年酌赴騰越邊外巡閲一周以期嚴密嘉慶十七年以雲南邊外野夷倮匪肆擾而緬寧騰越各隘皆瘴癘之地難駐官兵復設土練兵一千六百人以八百人駐守緬寧之丙野山梁等處八百人駐守騰越之蠻章山等處省官兵征調之勞道光間林則徐於迤西移改協營增設辨兵其扼要之處為永平縣永昌府龍街汛永定汛漾濞汛姚關汛等凡二十一汛咸增兵駐防而瀾滄江橋尤為扼險順寧府毗連夷地以龍陵協與順寧參將對調緬寧廳錫臘右甸阿魯史塘等處防軍或分汛多而存城少或分汛少而存城多地之夷險與兵之多少不均咸酌量增調大理府原駐提督而上下二關及太和縣城彌渡紅岩趙州等處尚屬空虛均增兵填防姚州蒙化二處亦改汛增兵同治間雲南平定岑育英因迤西麗江府城地處極邊界連西藏麗江劍川交界之喇雞鳴地方係江邊要隘江外即野人境向未設兵乃以麗鶴鎮都司移駐麗江府劍川營都司移駐喇雞鳴此外楚雄府屬之八哨地方三四百里間倮夷雜居亦係要地令楚雄協副將設汛駐兵十三年以昭通標兵之半赴金沙江外駐守光緒七年劉長佑因劍川城地當孔道為迤西要區以喇井營移駐劍川喇井亦瀾滄江要地以吉尾汛移駐互相會哨十一年岑育英因滇省入越南之路以白馬關為要法蘭西人通商之路以蒙自縣為衝沿邊千里處處錯壤留防之兵一萬六千人編為三十營以白馬關隸開化鎮總兵蒙自隸臨元鎮總兵每年瘴消之際親赴邊陲簡閲營伍箇舊錫廠規制宏大廠丁數萬人漢夷雜處且通三猛蠻耗各路乃增設同知一員移臨元之都司營兵駐防箇舊調原駐開化遊擊移守白馬關以右營都司分防古林移右營守備駐長岡嶺以臨元遊擊駐蒙自縣右營都司分防水田右營守備分防嵩田為因地制宜之計自雲南入緬甸共有六途以蠻允一途為捷徑沿邊由西而南而東皆野人山寨布列於九隘之外兵團守望時虞不足乃調關外徑旅二千餘人與原有防軍及鄉團土司協力警備十四年岑育英以邊境倮黑夷匪頻年滋事分別勦撫倮黑所屯踞之地分上下改心在瀾滄江畔界接土司其東西大路與緬甸逼處為順寧普洱兩府屏蔽其下改心地方尤為扼要乃增設鎮邊撫夷廳擇地建築城垣並設參將等官駐防兵丁一千一百五十八人二十二年鹿傳霖以維西協所屬阿墩子汛地界接川邊之巴塘左臨瀾滄江右挹金沙江地勢至要英緬鐵路所經相距漸近僅四五日程乃協商四川疆臣酌設重鎮並於川滇交界處兩省各設文武員辨協力防邊雲南自英據緬甸法奪越南防守兩難光緒之季西南騰越臨安兩路創設團練稍資捍衛而餉絀兵單邊防漸弛矣廣東邊防海重於陸同治十三年越南不靖督臣瑞麟慮其越界以防勇二千人扼守欽州光緒八年曾國荃因欽州之東興街地接越南撥徑兵二營駐守續撥老勇三營助之十年法蘭西侵奪越南彭玉麟督辦粵防以欽州與廉州並重增調營勇赴欽廉恐地廣兵單以團練協守至省內防務則有三江口之排瑤瓊崖之黎匪時或出巢滋事排瑤山境四百餘里康熙四十一年於瑤境適中之三江口設立寨城置副將等官兵丁千餘人道光十二年增三江口戍兵二千人建築碉臺以控制悍瑤光緒十三年張之洞剿平瓊州黎匪山路開通收撫黎衆十萬人定撫黎章程十二條粵省負山帶海西來歐舶首及粵洋陸路僅欽廉一路當敵防戍較易於海疆也廣西南邊綿亙千餘里原設隘所百有九處分卡六十六處與越南之諒山高平宣光等處接壤叢山密箐中小徑咸通鎮南關至龍州一路地較寬平為中越商旅通衢東出太平南寧西出歸順鎮安之總匯自龍州以東下水直達梧潯有建瓴之勢歷朝南藩向化自清初至道光咸豐間惟於龍憑營所轄水陸各隘口以戍兵及沿邊土司協力防守同治十一年令馮子材等就戍所之鎮揀選各營分布各隘是為防軍守邊之始逮法越戰事起邊氛日亟征調頻煩兵無久駐之地光緒十二年中法款議既成兩廣總督張之洞以鎮南一關鈐轄中外固屬極衝之地即鎮南關之中後左右各路亦須分兵設防關以內之關南隘及憑祥土州為中路自關以東明江廳轄之由隘寧明州轄之羅隘思陵土州轄之愛店隘上思州轄之百崙隘剝機隘為東路自關以西龍州廳轄之平西關水口關下凍土州轄之布局隘梗花隘歸順州轄之頻洞隘龍邦隘鎮安廳轄之猛洞隘剝淰隘百懷大隘等為西路以上各隘咸增兵屯守以十二營防鎮南關中路以四營防東路六營防西路其道路寬者築臺置炮路窄者設卡浚濠甚僻者則掘斷徑路禁阻往來豫造地營無事則操練有警則徵調赴援廣西提督由柳州移駐龍州以控制邊夷而邊境過長貴能扼要關前隘為諒山來路羅隘為間道所通歸順之龍邦隘鎮安之那坡隘分扼牧馬保樂夷寇來路由隘當文淵之衝即龍州後路下凍土州通鎮邊聲息令駐邊各將領宜加嚴防旋督臣張之洞以沿邊之新太協上思營鎮安協各營兵或改勇補兵或裁兵留勇各就所宜即分防之舉為並省之謀十三年復移駐鎮道各員以資分任二十三年談鍾麟因邊境迤長凡千七百里僅恃營汛終嫌單薄乃扼要建築炮臺原有防軍二十營以分防見少每營止能抽撥二棚駐守炮臺二十六年蘇元春因南太泗鎮及上思歸順四府二廳州皆為邊地勇丁數僅萬人凡三關百隘沿邊炮臺皆須防守乃以新募調赴江南之五營並抽調邊軍五營合成十營為勦辦沿邊遊勇土匪之用三十年柯逢時令各州縣增募勇丁八千餘人給以毛瑟後膛槍以佐防軍並令各屬勸民間多築碉堡藉禦外侮三十一年李經羲以廣西沿邊全恃防軍近年邊防大軍專駐龍州訓練而南太鎮等郡以迄滇邊無復邊營蹤迹客軍又撤回過半乃酌增防營募土著親兵就地防禦蓋廣西制兵舊額六萬二千餘人自同治四年以後屢加裁汰由制兵而趨重防軍法越事起於邊地防軍尤為注重至光緒季年改練新軍非復防營規制矣蒙古以瀚海為界畫其部落之大類有四曰漠南內蒙古曰漠北外蒙古曰漠西厄魯特蒙古曰青海蒙古清初漠南蒙古臣服最先至康熙初年而漠北喀爾喀三部內發及親征準噶爾而青海諸部來庭惟漠西厄魯特部至乾隆間始征定焉漠北外四盟蒙古康熙間初定增為五十五旗雍正間增三音諾顏部共前三部為四部乾隆中增至八十二旗其會盟分四路土謝圖汗為中路車臣汗為東路札薩克圖汗為西路三音諾顏為北路乾隆間築城於烏里雅蘇臺及科布多二處以鎮撫之其統率蒙兵之制內札薩克之兵統於盟長外札薩克之兵統於定邊左副將軍杜爾伯特及新土耳扈特和碩特之兵統於科布多辦事大臣土耳扈特之兵統於伊犂將軍青海各部落之兵統於西寧辦事大臣雍正間西陲未靖阿爾泰及河套以北迤西直達巴里坤平原沙磧數千里間無險可扼乃於四臺至三十五臺每臺選精兵駐守互為聲援於烏里雅蘇臺城外山顛扼要處復各建炮臺屯重兵於特斯台錫里旋增設卡路八處於鹽口戈壁二口遣兵更番巡探以期嚴密其時防在西徼而北鄙無驚自乾隆間蕩平準部而衛拉特來歸內外各盟長從征回準屢奏邊勳新舊土耳扈特同膺茅土北境俄羅斯亦方輯睦陰山瀚海間百有餘年無事矣逮咸豐同治間中原多故蒙邊亦多不靖同治四年增熱河馬隊三百人五年以包頭鎮為綏遠要區原有防兵積年疲乏調吉林馬隊協同駐守六年李雲麟以三音諾顏蒙兵專防烏城而招募奇古民勇駐八里岡與科布多塔爾巴哈臺二城蒙兵為犄角八年以布倫託海各領隊大臣所有旗兵改隸科布多大臣分防熱河等處令烏梁海總管自卜果蘇克霸至沙賓達巴哈與俄羅斯接界處新立鄂博界牌八處嚴密巡察徙厄魯特僧衆於阿爾泰山徙俗衆於青格里河九年調大同宣化練軍二千人駐防庫倫修復推河以北至烏城十五臺站並牧馬三千匹熱河增練洋槍隊三百人以固庫倫西路之防十年以濟斯洪果爾臺站為察哈爾及歸化綏遠運糧要區撥兵駐守令蒙古各臺自張家口至八臺以察哈爾都統管理自九臺至科布多及庫倫歸化二路以各盟長管理每臺增設駝馬百五十匹凡軍械糧食接護轉運以利軍行十一年改建烏里雅蘇臺石城並整頓沿邊臺務庫倫西接俄疆向未設兵乃於圖車兩盟蒙兵內輪派四百人分駐庫倫四境十二年調察哈爾馬隊協防烏里雅蘇臺旋以軍臺四十四站地勢綿長分防散漫乃分為四路於中二路擇要駐營調綏遠城馬隊移防哈爾尼敦以原有之兵守塞爾烏蘇至光緒間新疆大定西顧無虞而北境俄患漸逼光緒六年調宣化練軍直隸步隊赴庫倫防俄七年因烏城三面鄰俄邊防重要而原有防軍技藝生疏烏城共駐蒙古練軍及黑龍江察哈爾馬隊二千五百人由京營派教習前往教練俾成徑旅十八年李鴻章以熱河東境山谷叢雜毗連奉天撥直隸練軍馬步隊各一營擇要駐防二十四年以熱河察哈爾為蒙邊要地令各都統等選練兵丁整備軍實三十二年以熱河馬步隊三營改編為常備軍其兵額均次第補足時內外蒙古兵日益孱弱俄人遂駸駸闌入烏梁海以南受其牢籠喀魯倫河以東恣其墾牧鄂博卡倫遂同虛設矣直隸沿蒙邊防務雍正九年令直隸疆臣修治邊牆其古北宣化大同三處咸募兵增防自獨石口以西至殺虎口一帶要隘亦酌增辨兵十年於獨石口改設副將以下各官增額兵八百人邊牆衝要處增設鹿柵木柵以備堵禦自清初至乾隆嘉慶朝蒙邊綏輯咸同之間西陲用兵蒙匪亦漸滋事同治四年以直隸北境沿邊關口五十餘處兵數甚單調撥京師火器營威遠隊提標馬步隊分駐喜峰口鐵門關灤陽灑河橋遵化羅文峪迤北迤西等處光緒七年李鴻章以北邊多倫廳地兼蒙旗僅有新舊防軍七百餘人不敷分布增調宣化練軍馬隊一營分段梭巡十八年以直隸防軍五營駐古北口十九年李鴻章因古北口防營調回內地而熱河地廣兵單乃別練馬隊三哨與原有之朝陽馬隊一營圍場馬隊百人互為援應直隸邊務重在海疆東之山海關為遼瀋門戶南之天津大沽為京師屏蔽其北境惟緝捕蒙匪無事重兵屯戍也山西邊界之歸化綏遠包頭鎮控扼草地毗連大青山南抵殺虎口西逾金東接得勝口與蒙古回部錯壤咸豐軍興以後官兵四出征討邊備空虛寇盜乘機竊發同治六年左宗棠督師秦晉以山西省辨兵團勇均不可恃乃分撥營勇駐守黃河西南兩岸別募三千人赴禹門保德間防守並造炮船四十艘酌配水師駐垣曲三門一帶軍事定後防軍旋撤光緒間曾國荃調撥湘軍擇要屯守而兵數僅一千二百人九年張之洞以雁門關為晉邊要口止有練軍千人令各營以次抽練以固邊防十年增練大同太原二鎮馬步營衛榮光增練馬隊五旗以三旗駐口外二旗駐口內以佐湘軍之不逮由山西省迤西為陝西之北境惟榆林神木一隅地接蒙疆而障以長城環以河套民情馴朴防務更簡於燕晉也新疆為西域三十六國故壤歷代籌邊列戍近在玉門遠亦僅龍堆而外自乾隆年準部平道光朝回疆定至光緒間再定天山開省治於迪化城設五府三十六縣而俄羅斯邊境由北而西綿延錯亙自奪取霍罕三部後伊犂及南路喀什噶爾皆與俄屬相接全境中界天山分南北二路北路為準噶爾部落西北以伊犂為重鎮烏魯木齊當往來孔道塔爾巴哈台為北境屏藩南路悉回族所居烏什當適中之地葉爾羌喀什噶爾雄冠諸城英吉薩爾西達外藩乾隆十八年以準噶爾逼處邊境哈密及西藏北路雖已設防而選將備具駝馬簡軍實勘水草儲糧餉修城垣諸端待理命疆吏先事籌備次第施行哈密已駐重兵而防所全恃卡倫天山冰雪嚴寒加意撫循士卒南路各城以滿洲營緑旗營協同防守和闐庫車闢展諸城則但設緑旗營兵其卡倫臺站自哈密西至闢展北至巴里坤自闢展西至庫車北至烏魯木齊自庫車西至烏什又西至葉爾羌又西至喀什噶爾其南至和闐視卡倫之大小定戍兵之多寡各臺站設駝馬車輛毋缺前行阻水則造舟以濟之二十四年戡定準部北路重地咸分兵設防山川隘口悉置卡倫臺站各卡倫設索倫錫伯厄魯特兵丁自十名至三十餘名有差各臺站設滿洲緑旗察哈爾兵丁各十五名南路各城設辦事大臣其理事回官阿奇木伯克以下各有所司分統回兵隸駐防大臣調遣二十六年設伊犂馬步兵二千五百人二十七年設伊犂將軍及參贊領隊大臣三十一年設烏魯木齊辦事大臣嘉慶二年於惠遠城之北關增調戍兵道光六年以新疆防軍已增至萬餘人令疆吏調兵四千人赴回疆二千人赴阿克蘇協力防堵又因喀什噶爾防兵較少於城北要隘增兵三營城南增兵二營八年分遣喀什噶爾防兵四千三百人防守各路選精壯二千人分十班教練那彥成因阿克蘇為南路要地增兵千人合原有防兵凡二千餘人以控制南北二路其冰嶺一路北通伊犂西南卡倫外通烏什之捷徑一律封禁喀什噶爾葉爾羌英吉薩爾各卡倫向僅駐兵十餘名乃於各卡倫適中處凡通霍罕巴達克山克什米爾外夷之路增築土堡以都司等官率兵駐守兵數自數十人至二百人不等九年於喀什噶爾邊界增卡倫八處十一年回疆大定命參贊大臣駐葉爾羌總理八城回務節制巴里坤伊犂兩路滿漢兵一萬四千餘人分防各路喀什噶爾之八卡倫道通霍罕築土堡三座增建兵房葉爾羌所屬卡倫通克什米爾外夷要隘英吉薩爾通布魯特要隘各修土堡駐兵於烏克蘇烏什二處各駐八旗兵一千三百人於喀什噶爾駐緑營兵三千人為前鋒兼守邊卡英吉薩爾駐馬隊五百人緑營兵千人為前後二城中權接應之師巴爾楚克緑營兵三千人築堡屯守和闐增足防兵五百人所餘滿漢兵六千餘人悉數駐葉爾羌隸參贊大臣統轄遇警援勦其喀什噶爾葉爾羌舊額回兵仍挑補訓練以替防兵十四年以索倫錫伯察哈爾額魯特四處營兵守衛伊犂沿邊大小卡倫七十餘座按期會哨統兵將領不得輕出邀功咸豐二年廷臣會議以新疆南北路駐兵益多數踰三萬頻年由內地換防殊苦煩費乃於伊犂等處緑營兵內調撥換班其不足者就地募之咸同間中原用兵關外南北各城邊氛四起同治二年調察哈爾蒙兵悉數由科布多赴烏魯木齊屯守五年調烏里雅蘇臺蒙兵六千人赴伊犂九年調黑龍江兵二千人察哈爾兵千人馬隊二百餘人馳赴烏城並令喀爾喀各盟長隨時整頓蒙兵十年在烏梁海一帶安設臺站迤西亦一律設臺直抵塔爾巴哈臺十一年因庫爾喀喇烏蘇等處為晶河要地招募勇丁協同馬隊防守調宣化古北口營兵分赴烏城十二年調大同宣化兵千人赴防塔爾巴哈臺十三年以塔城為西路防務扼要之區調伊犂迤北之察哈爾兵二千人及蒙古兵益之尋命左宗棠由關隴西征天山內外次第戡平而俄羅斯亦歸我伊犂光緒三年左宗棠於伊犂增築炮臺多駐徑旅劉錦棠就關外營勇之精壯者編為制兵改行餉為坐糧參用屯田之法以足軍實張曜更定新疆營制三事一增騎兵佐步兵之不逮一重火器減養兵之費為購器之資一設遊擊之師駐南北路之間預防俄患六年恭鏜因烏魯木齊之鞏寧城接壤精河旁達烏城間道而舊城已圮乃於迪化城外高原別建新城以駐防兵而資控扼十二年劉錦棠以巴里坤滿營歸並古城伊犂共駐馬步防軍二十八營酌裁新募之勇編留精壯為馬隊九旗步隊十三旗自伊犂至大河沿及精河以東分路駐防十四年額爾慶額因塔爾巴哈臺駐防漢隊久役思歸就甘肅額兵及察哈爾部內選二千六百人調防十五年復於塔城增募防兵凡步隊三營馬隊四旗辨勇二千人十六年以伊犂滿洲營經兵亂後額數久虛酌量挑補定為二千人再挑留錫伯新滿洲千人以備不足伊犂漢隊改立標營凡步隊一營馬隊二營格林炮隊一哨惠遠城北關設炮隊一哨定遠城設馬隊三旗十七年楊昌濬因塔城境內漢蒙回哈雜居東接烏梁海西接伊犂地既險要路復分歧共增將辨三十一員步隊三旗馬隊四旗以備巡防彈壓十九年以總兵官駐防綏定統漢隊三千人策應四境若廣仁城果子溝三台瞻德城三道河霍爾果斯拱宸城寧遠城以馬步炮隊分防三十一年潘效蘇因新疆兵費過重改練土著遣散客軍回民性各殊以二三成攙入漢軍訓練漢軍則各營旗皆減為哨節餉防邊始能兼顧宣統二年札拉豐阿因塔爾巴哈臺屏蔽西北以原有馬步炮隊及左右旗蒙滿隊悉改新式操法時中朝方議減餉裁兵未遑遠略俄羅斯正經營東陲遂暫安無事云西藏初設駐藏大臣而番衆仍統屬於喇嘛當崇德七年達賴班禪與厄魯特同時入貢順治康熙間朝請不絶康熙之季準噶爾侵藏由西寧進兵平之雍正五年弭噶隆之爭以頗羅鼐有定亂功進封郡王十年留雲南兵於察木多以防番衆乾隆十五年除頗羅鼐王爵始設駐藏大臣與達賴班禪參互制之其西南之廓爾喀時窺藏境中朝以兵力佐之收復巴勒布所侵占藏地增設塘汛守兵十三處以寨落之多寡為衡前藏增唐古特兵八百人後藏增四百人五十四年始於前後藏各設番兵千人其通內地之定日江孜二處要隘各設番兵五百人就近選補設戴琫三人以二人駐後藏一人駐定日增江孜戴琫一人前藏番兵隸駐防遊擊後藏番兵隸駐防都司令四川督臣以頭等將備為駐藏之選統以大臣其駐藏之兵令駐藏大臣親為校閲嗣因定日江孜為各部落來藏必經之路各增防汛設守備等官打箭爐之外擇地設遊擊等官五十八年和琳等會勘後藏邊界及鄂博情形江孜番漢兵已敷防守惟定日地方遼闊為聶拉木宗喀絨轄三處總匯之區其捷徑如轄爾多古利噶等處均為要隘增設番兵統以戴琫修寨落以備棲止立鄂博以守界畫道光二年懲治聶拉木絨轄各營官私釋喇嘛之罪別遣番兵補營兵之額二十一年令番兵習弓矢者改習鳥槍二十二年令後藏大臣督率將辨教練堆葛爾本穵金番民武技咸豐五年以廓爾喀不靖駐防兵單令喇嘛等聯絡防範調前藏僧俗土兵二千人赴策墊地方防範同治四年駐藏大臣滿慶等調派土兵及統兵番員防備披楞八年因披楞侵占哲孟雄與唐古特相持令恩麟等整頓後藏番漢營伍十一年命德泰赴藏校閲江孜定日後藏三汛防營以固哲孟雄及聶拉木門戶光緒二十四年駐藏大臣文海因後藏定日地方營伍及靖西設防駐藏大臣久未巡視乃率兵親往各處校閲光緒季年駐藏大臣聯豫仿內地制設武備學堂擇營辨衛隊及達木三十九族中之優秀者習速成科俟畢業後先練一營以開風氣宣統二年聯豫因工布平定以馬步炮隊工程隊分地駐守旋疏請裁去幫辦大臣設左右參贊分駐前後藏三年波密野番滋事即以工布之兵勦辦並以步隊擇地駐防為各營後援至川軍入藏之舉始於雍正初年準噶爾窺邊詔以川陝兵二千人駐防設正副大臣分駐前後藏其時雲南省軍隊亦分途入藏事定仍撤歸原省歷朝鎮撫藏地多用漢軍番卒至光緒三十一年四川督臣錫良奏調川軍出打箭爐並招募土勇為向導以勦竄回是年八月巴塘喇嘛戕害大臣全藏震動四川提督馬維祺建昌道趙爾豐合兵進克巴塘𩹉塘勘平邊亂三十二年𩹉塘逆番桑披復率衆倡亂錫良命趙爾豐等以川軍討平之其時番僧與北部回民日就衰弱全藏邊境為英吉利俄羅斯遠勢所包藏事遂不可問云苗疆當貴州湖南之境叛服靡常歷朝皆勦撫兼施康熙三十八年以鎮筸居苗疆衝要改沅州鎮為鎮筸鎮設總兵以下各官增額兵千人合原有之兵凡二千一百人以防紅苗雍正九年復增兵二千人是年鄂爾泰因都江與清水江形勢劃分增設清江鎮標以新設之丹江台拱等營及原有之銅仁鎮遠等營咸隸清江鎮而以都勻黎平並上江下江各協營隸於古州鎮總兵乾隆元年楊名時鋭意治苗以貴州省苗衆分生熟二苗生苗在南熟苗在北乃屯駐重兵於內地而擇鄰苗之要道增修壁壘使民有所歸兵有可守遇苗衆出巢滋事則互相援勦戰勝勿事窮追兼撫熟苗俾漸知向化五年那蘇圖因永順所屬緊接苗疆且與湖北省之容美土司四川省之酉陽土司連界乃以永順協標兵改隸鎮筸鎮總兵聯絡楚南聲勢合力防苗嘉慶初年戡定苗疆以後於鳳凰乾州永綏古丈坪保靖各廳縣沿邊次第建修屯堡碉臺築邊牆以嚴界畫築土堡以資守禦築哨臺以憑瞭望碉卡則戰守咸資炮臺則堵截尤利設練勇千餘人屯丁七千人墾闢屯防田十三萬一千餘畝悉以屯兵耕種其地皆附近碉堡以便駐守且節餉糈歷嘉道兩朝沿邊寧謐咸豐軍興以後苗衆乘機肆擾至同治年席寶田等大舉平苗雖間有剽掠之事以防勇隨時勦撫光緒十二年談鈞培因苗民馴擾無常乃仿傅鼐防苗之法增修石碉土堡由附郭而漸及山林險阻之處互為守望以備苗民出入於舊日之苗疆營制無所變更也沿邊墩臺卡倫鄂博碉堡清初於各省邊境扼要處設立墩臺營房有警則守兵舉煙為號寇至百人者挂一席鳴一炮至三百人者挂二席鳴二炮至五百人者挂三席鳴三炮至千人者挂五席鳴五炮至萬人者挂七席連炮傳遞康熙七年諭各省將領凡水陸孔道之旁均設墩臺營房駐宿兵丁傳報緊急軍機稽察匪類護衛行人乾隆三年兵部議定汛兵缺少處按地方衛僻情形酌量撥補器械務令整備隨時察驗有離汛誤防者革責官吏嚴懲之其軍臺之制始於順治四年自張家口迤西黃河迤東設臺三百四十四座臺軍七百三十二名自張家口迄山海關迤西設臺四百十七座臺車一千二百五十一名蒙古各旗臺卡鄂博之制以大漠一望無垠凡內外札薩克之遊牧各限以界或以鄂博或以卡倫盛京吉林則以柳條邊為界依內興安嶺而設其內蒙古通驛要口凡五道曰喜峯口古北口獨石口張家口殺虎口以達於各旗內蒙路近商旅通行水草無艱其外蒙古之驛則由阿爾泰軍臺以達於邊境各卡倫康熙朝征準噶爾時設定邊左副將軍而外蒙古軍臺之設由內而外其制始密自察哈爾而北而西北而又西迄烏里雅蘇臺共置四十八臺康熙三十一年自古北口至烏珠木秦置臺九自獨石口至浩齊忒置臺六自張家口至四子部落置臺五自張家口至歸化城置臺六自殺虎口至吳喇忒置臺九自歸化城至鄂爾多斯置臺八自喜峯口至扎賴特置臺十六乾隆三十四年自喜峯口路扎賴特盡處起置臺十四自古北口路烏珠木秦盡處起置臺六自殺虎口路吳喇忒大路外起置臺七自張家口路四子部落盡處起置臺十六喀爾喀則自備郵站其東路首站曰尼爾得尼拖羅海西路首站曰哈拉尼敦後路首站曰肯特山迤邐而北直抵三音諾顏境其首站曰博羅布爾哈蘇凡汗王貝勒過境警晨夜飼牲畜商旅出其途亦資捍衛焉圍場卡倫之制規取高地為之或於岡或於阪或於山川之隙隨宜設置其柳條邊境之設立卡倫者東為崖口西為濟爾哈朗圖北為色堪達巴漢色欽等處又西為庫爾圖羅海等處又南為木壘喀喇沁等處又南而西為珠爾噶岱等處又南為海拉蘇台等處又南而東為巴倫克得依等處老柳邊在外卡倫在內其故地在周阹之中者為翁牛特為哈喇沁為敖漢為奈曼為喀爾喀左翼等故地咸在焉其恰克圖及沿邊鄂博卡倫之制因山河以表鄂博無山河則表以卡倫鄂博者華言石堆也其制有二以壘為鄂博以山河為鄂博蒙古二十五部落察哈爾牧廠八旗各如其境以鄂博為防其與俄羅斯接界中間隙地蒙古語曰薩布凡薩布皆立鄂博以申畫之恰克圖之中俄邊界凡俄國卡倫房屋在鄂爾懷圖山頂中國鄂博卡倫適中而平分之如有山河即橫斷山河為界由沙畢納依嶺至額爾古訥河岸向陽為中國背陰為俄國蓋沿邊之地自黑龍江庫倫烏里雅蘇臺科布多四屬迤邐而西凡八十二卡倫科布多所屬極西之卡倫曰和尼邁拉呼由此渡額爾齊斯河至輝邁拉呼一帶卡倫均與俄羅斯接壤其在黑龍江境內之卡倫以將軍轄之在蒙古喀爾喀等部落之卡倫按其遊牧遠近每卡倫設章京一員率兵攜眷戍守遇森林叢雜難立鄂博卡倫之處則削大樹而刊識之自同治七年裁撤科布多境內卡倫以後各項哈薩克人赴界強據光緒初年乃於烏克克等處由沁達蓋圖烏爾魯向西南至馬尼嘎圖勒幹止與塔爾巴哈臺卡倫相接一千數百里之要隘與俄羅斯接壤者均設卡倫所有協理台吉等員咸復舊制其新疆全境之卡倫分南北二路北路之塔爾巴哈臺與科布多毗連以額爾齊斯河為界河東卡倫隸科布多河西卡倫隸塔爾巴哈臺自輝邁拉呼至塔城夏季設大小卡倫十三處冬季設卡倫八處此外皆哈薩克遊牧之地塔城西南一帶卡倫八處界連伊犂卡倫以外為哈薩克遊牧伊犂東北七百餘里與塔城接界之處由哈布塔海達闌一帶而南設大小卡倫二十三處此外亦哈薩克遊牧又西而南至伊犂河北岸設大小卡倫八處乃索倫領隊大臣專轄自伊犂河南而西設大小卡倫十六處乃錫伯領隊大臣專轄卡倫之外與哈薩克接壤其錫伯屯牧西南因有回子屯所每年夏秋設卡倫於達耳達木圖以資巡察由錫伯卡倫迤西轉南而東設大小卡倫十七處乃厄魯特領隊大臣專轄西南為布魯特遊牧西北為哈薩克遊牧又厄魯特遊牧東南界連喀喇沙爾之土爾扈特和碩特遊牧設大小卡倫八處亦厄魯特領隊大臣專轄其伊犂城北塔耳奇一帶及伊犂河渡口設卡倫七處專為哈薩克貿易交通並稽察逃人而設乃惠寧領隊大臣專轄此伊犂及塔爾巴哈臺大小卡倫之方向也其南路自伊犂南經木蘇耳達巴罕至回疆烏什城西北一帶設卡倫六處外通布魯特乃烏什辦事大臣專轄自烏什而西經草地及布魯特遊牧地樹窩子等處七百餘里直達喀什噶爾城由城東北而西轉南設卡倫十七處外通布魯特西達霍罕安集延乃喀什噶爾領隊大臣專轄自喀什噶爾東南行二百餘里至英吉沙爾城由城西北而南設卡倫十二處外通布魯特西南行千數百里至巴達克山乃英吉沙爾領隊大臣專轄自英吉沙爾東行三百餘里至葉爾羌城由城西南轉而東北設卡倫七處西南一帶外通布魯特東北一帶專為稽查逃人乃葉爾羌辦事大臣專轄又東南行七百餘里至和闐城城外之東西河共設卡倫十二處為稽查采玉回民又札馬耳路通阿克蘇專設卡倫一處均和闐領隊大臣專轄自葉爾羌東北行一千四百里至阿克蘇城其東北路通著勒士斯專設卡倫一處稽查喀喇沙爾所屬之土耳扈特遊牧乃阿克蘇辦事大臣專轄又東北行七百餘里至庫車城由城西北而南設卡倫五處又東北行八百餘里至喀喇沙爾城城之東北設卡倫二處又東北行九百餘里至吐魯番城由城西南而東設卡倫六處又東北行一千七百餘里至哈密城城東北設卡倫四處均由駐扎各城大臣專轄此回疆各城所屬大小卡倫之方向也自咸同朝回逆鴟張俄羅斯復乘機蠶食邊堠盡廢逮新疆定後至光緒五年收回伊犂與俄羅斯畫定邊界規復舊日卡倫之制卡倫之例有三其在內者曰常設卡倫在外者曰移設卡倫最在外者曰添設卡倫三者惟常設卡倫為永遠駐守之地餘皆值氣候和暖則外展寒則內遷進退盈縮或千里或數百里不等沙漠浩蕩漫無定準皆在常設卡倫之外自西域亂作凡移設添設之卡倫悉為俄人所攘奪左宗棠平定新疆乃與俄羅斯重定界約凡常設卡倫以外均作為甌脫之地中俄邊境之民彼此不居以免逼處其常設卡倫嚴申舊制邊烽少息矣其黔楚苗疆碉堡之制始於嘉慶朝征苗之役傅鼐精練鄉兵遍設碉堡師苗技以制苗遂平邊患自湖南乾州界之木林坪起至中營之四路口築圍牆百數十里以杜竄擾其險隘處增設屯堡聯以碉卡鳳凰廳境內設堡卡碉臺八百八十七座永綏廳境內設堡卡碉臺一百三十二座乾州廳境內設汛碉一百二十一處古丈坪及保縣境內設汛碉六十九處環苗疆數百里烽燧相望聲息相聞關牆則沿山澗建之炮臺則擇衝要處築之哨臺則於關牆之隙修之卡碉屯堡則因地制宜或品字式或一字式或梅花式其修建之制關牆則土石兼施炮臺則以石砌而築土以實中心哨臺亦石砌環鑿槍孔高峻堅實碉樓之制亦然關牆以嚴邊界炮臺以備堵截戰守哨臺為巡邏瞭望之用屯堡為邊民聚衛之所卡碉則戰守兼資其防守兵丁有警則荷戈無事則秉耒進攻退守為持久計以待敵之可勝遂以底定蠻荒云
