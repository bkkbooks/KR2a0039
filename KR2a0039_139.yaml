body:
  text: 清史稿卷一百三十九志一百十四兵十訓練清代訓練軍士綜京外水陸各營咸有成規而歷朝整軍經武之諭則隨時訓練因地制宜茲分述之其定期訓練者為領侍衛府三旗親軍訓練之制鑲黃旗正黃旗正白旗每月分期習騎射二次習步射四次八旗驍騎營訓練之制每月分期習射六次都統以下各官親督之春秋二季擐甲習步射由本旗定期擐甲習騎射由部臣定期春月分操二次合操一次秋月合操二次預奏操期仲春孟秋登城操習兵部稽察之歲以為常八旗漢兵訓練之制於春秋月試炮於盧溝穚各旗咸出炮十位演放五日而畢越三年鳥槍營兵與炮兵合演槍炮藤牌於盧溝橋其春秋季常操四旗合操四次八旗合操二次初冬則分遣各旗演習步圍前鋒營訓練之制月習步射六次春秋擐甲習騎射二次左右翼各分前鋒之半兼習鳥槍月習十次均由統領督率每年秋季前鋒統領會同護軍統領奏聞率所屬兵演習步圍二三次護軍營訓練之制月習步射六次春秋擐甲習騎射二次與前鋒同圓明園八旗護軍營訓練之制月習步射六次春秋習騎射兼習鳥槍步軍營及巡捕營訓練之制八旗步軍習步射城門驍騎習鳥槍均以春秋操演內九門外七門咸設炮位每屆三年隨同八旗兵運炮至盧溝橋演放巡捕營參將遊擊月考其屬之弓矢守備等各練其汛兵春秋兼習鳥槍與城門驍騎同內府三旗訓練之制月習步射六次春秋擐甲習射二次立冬後內府護軍及尚虞處執事等演習步圍別選三旗護軍習馬射各技火器營訓練之制月習步射六次騎射六次馬上技藝六次統轄鳥槍炮兵護軍驍騎各官按日於本旗考驗至合操之日八旗分左右翼列陳環施槍炮秋季至盧溝橋演炮五日健鋭營訓練之制月習雲梯鳥槍各藝六次騎射步射鞭刀等藝六次餘日於本期習槍箭值駐蹕圓明園左右翼各以舟演習水戰旗營校閲之時自七月開操至次年四月設教場於九門外將軍都統副都統掌校閲騎射槍炮之事第其優劣以為賞罰春秋合操與京營同陸路緑旗營訓練之制總督所屬為督標兵巡撫所屬為撫標兵提督所屬為提標兵總兵所屬為鎮標兵每歲秋季霜降日先期各營將辨肅伍赴教場設軍幕屆時軍士擐甲列陳中軍建大纛於場中統兵大臣於將臺上傳令合操中軍揚旗麾衆臺下舉炮三軍中鳴角伐鼓步騎甲士列隊行陳施放火槍連環無間如京營之制若長矛藤牌扁刀短刀之屬各因其地之宜以教士卒咸有成法閲竟試材官將士騎射技勇申明賞罰犒軍釋甲歸伍漕運總督標河道總督標訓練之制咸與京營同各營將辨率其所屬按日督練八旗水師營訓練之制每年春秋二季將軍都統副都統督率官兵分駕戰艦奉天福建浙江廣東水師各赴海口齊齊哈爾墨爾根江寧省水師各赴江面天津水師赴海口洋面每年自四月至八月於潮平風順時張帆起碇列陳出洋以次鳴炮操演餘日各率所屬講習水務其緑旗水師營有內河水師江海水師出洋會哨信候各省不同每歲春秋之季乘艦列陳揚帆駛風鳴角發炮操演咸如軍律其隨時訓練者天聰七年太宗始舉大閲之典八旗護軍漢軍馬步滿洲步軍咸集分八旗為左右翼漢軍滿洲步兵為二營四方環立前設紅衣炮三十位上擐甲乘馬諸貝勒率護軍如對嚴敵親軍為後盾傳令聞炮而進聞蒙古角聲而退次漢軍馬步次滿洲步軍進攻炮軍大閲禮成嚴申退後之令崇德八年大閲於瀋陽北郊前列漢軍炮手次滿洲步兵蒙古步兵次騎兵次守城應援兵次守城炮兵綿亙二十里聞炮合戰上親臨簡閲步伐止齊軍容整肅順治七年誡各將領勿以太平而忘武備弓馬務造精良十一年定每年閲操賞銀之制定騎射各兵分期演習之制定督撫提鎮奬賞優等辨兵之制康熙十一年令各省營伍須武職大員巡察嗣後各鎮臣以巡察之期上聞不得擾纍各營十二年以漢軍不能騎射者甚多每旗宜增練火器尋議八旗漢軍驍騎每佐領下增鳥槍兵十八名十六年令各營於安營駐宿之道馳騁奔走之勞皆須習練不得僅拘操演成法直省提鎮每歲督選標兵行圍以習勞苦十九年定每年演放紅衣大炮之期二十八年定演炮之制每年九月朔八旗各運大炮十位至盧溝橋西設槍營炮營各一都統率參領佐領散秩官驍騎炮手咸往工部修炮車治火藥日演百出及進步連環槍炮越十日開操太常寺奏簡都統承祭兵部奏簡兵部大臣驗操各旗演炮十出記中的之數即於炮場合隊操演嚴鼓而進鳴金而止槍炮均演九進十連環鳴螺收陳還營三十年定春操之制每旗出炮十位火器營兵千五百名漢軍每旗出炮十位鳥槍兵千五百名每佐領下之護軍鳥槍兵護軍驍騎每參領下之散秩官驍騎校及前鋒參領護軍參領侍衛等更番以從既成列演放鳥槍鳴螺進兵至所指處分兵殿後而歸五十年定火器營合操陳式八旗炮兵鳥槍兵護軍驍騎分立十六營中列鑲黃正黃二旗次六旗按左右翼列隊將臺在中兩翼各建令纛為表每旗鳥槍護軍在前次炮兵次鳥槍兵次驍騎臺下鳴海螺者三以次整械結隊出營施號槍三臺下及陳內海螺遞鳴乃開陳演槍炮九次至十次炮與鳥槍連環無間雍正四年改定盧溝橋演槍炮為三年一次均演一月兵校等火藥器用由工部預儲五年以滿洲夙重騎射不可專習鳥槍而廢弓矢有馬上槍箭熟習者勉以優等七年以直隸營汛多演空槍通飭直省將帥令各營以鉛子演準八年劉汝麟建議漢軍應習步圍尋諭各旗兵於初冬行步圍每旗行二三次統以各旗大臣步行較獵侍衛打牲人等一律學習九年以八旗官兵未能精整統兵各官擇不堪騎射者立為一營稍優者別立一營每營千人勤加操練化弱為強又以兵丁重在步行凡八旗兵給限一年習步以日行百四十里為率優者賞之十年以邊陲用兵操演加勤免各旗輪班值日專習騎射長槍十二年定八旗漢軍驍騎演習鳥槍之制春季二月為始秋季八月為始各習槍四十五日本旗四翼仍合操二次乾隆四年定旗兵合操之制每年春季本旗各營官兵於本旗教場分操二次八旗各營官兵於鑲黃正黃二旗教場合操一次至秋季合各營大操其隊伍號令旗纛器械均遵大閲之制六年議准八旗驍騎營步射由本旗定期騎射由兵部定期八年令八旗漢軍至盧溝橋演放槍炮於九月朔為始演放一月簡都統大臣監視日演十出兵部閲操之日每旗各演百出演畢合操槍炮其金鼓號令悉如大閲之制十年以沿海水師經大臣察閲其操演多屬具文未諳水務通飭將軍督撫提鎮實心訓練甄別十四年以旗兵習練雲梯隨征金川有功凱旋後別立健鋭營雲梯兵千名為一營統以大臣專練雲梯鳥槍馬步射及鞭刀等藝並隨侍行圍又於昆明湖設趕繒船以前鋒軍習水戰駕船駛風之技是年莽阿納上言整頓邊省營伍章程一步弓均改五力以上一馬射與步射一式一馬兵騎射宜槍箭二技一鳥槍專練准頭一槍兵兼習弓矢一定優劣賞罰一預儲軍械以固邊陲十七年定八旗漢軍藤牌兵之制春季與旗兵一律操演遇大閲及諸營合操則守護炮位入隊演習三十六年令鳥槍兵宜遵定例於演槍時檢回鉛子以勵勤能三十八年定各營增演馬上四箭四槍之制三十九年以金川用兵京城之健鋭火器二營功績最多令各省緑營習鳥槍兵辨悉仿火器營進步連環之法操練不得虛演陳式尋定各營槍兵升補之序以資鼓勵四十年令健鋭營兵月習槍十二日定三等為賞罰四十三年令各省習槍兵辨仿京營火器操練之法各總兵於巡閲時有進步連環精熟者紀功四十四年令各省緑營兵習射以五矢中三為一等五十年以緑營陳法向習兩儀四象方圓等舊式無裨實用改仿京營陳式由提督頒發各標鎮如式教演各營每月定期合操并演九進十連環之陳其堆撥應差兵丁暇日一律練習又以各省巡撫標兵向供給使訓練甚稀飭各撫臣實力整理其舊式之藤牌兵均兼習鳥槍五十五年令軍機大臣會同兵部審定演放炮位步數及懲勸之例嘉慶二年罷水師冬令鳧水習藝以恤兵艱四年令水營兵丁一律兼習陸戰又令新疆屯田之兵每營分半屯種餘悉回營操練令各省督撫修理營汛墩臺督操將備加力振奮九年令各統兵官習射以六力弓為度習槍以迅速命中為度申明教誡力挽積習不得養尊處優十一年令德楞泰等兵丁以十成之一兼習長矛其製不得逾丈道光元年令各軍均習長矛步槍不得專精馬槍是年楊芳上言兵丁於練騎射槍矛之外加以車騎合步連環三項融結參合日操一隊以五隊更番演習六日合操為一陳直隸額兵抽練四成得一萬五千三百餘人成二百四十隊按圖操演以齊勇怯而節進退允之二年以廣東營伍廢弛嚴飭撫臣實力練習不得多立章程四年罷撤梅花車炮陳式專習部頒九進連環陳式五年允英和之請以八旗圈馬四百匹改撥巡捕營令滿洲蒙古馬兵演習騎射春秋二季步軍統領會同左右翼總兵簡閲三年後親臨大閲八年令那彥成等回疆增設防兵籌給餉糈議定操兵章程並於喀什噶爾防兵內抽練二千名伊犁滿兵亦勤習騎射由參贊大臣及總兵督操十五年以山西滿漢營伍廢弛嚴飭閲兵大臣嚴明甄別是年常大淳上言新疆湖南廣東四川各營伍日久生玩滿營則奢靡自逸漢營則糧額多虛由於拔補之循私操演之不實以國家養兵之資為衆人雇役之用請飭將軍督撫力除積習遇勦匪保案不得冒濫以勵戎行允之並令各州縣額設民壯一律充補訓練十七年令各省民壯每月隨營操演授以紀律以輔兵力所不及十八年令盛京滿洲兵各勤操務遇行圍之時不得有雇役情弊十九年以四川各營技疏膽怯致夷匪日張特簡大臣督率鎮道親往校閲二十二年令天津增兵六千餘人飭各將備率新舊兵丁悉加練習首火炮次鳥槍刀矛輔以馬隊遇警則各營聯合南北炮臺命精能武員專司稽察講求方略二十六年令各州縣民壯隨營調考刀矛雜技三十年令各督撫提鎮汰老弱冗濫之兵抽練精壯俾各營皆有選鋒徑旅不得以工匠僕役虛占兵糧咸豐元年奕山等以伊犁及烏魯木齊二處滿洲營增練鳥槍擬定考驗章程並緑營一律辦理三年綜各省緑營額兵共六十餘萬人除征調之兵所餘存營者汰弱留強定期分練各省駐防旗兵亦如之五年令健鋭火器圓明園八旗營及前鋒護軍八旗漢軍營飭閲兵大臣核實校令分別勸懲又令僧格林沁等增滿洲火器營操演陳式十一年以盛京吉林黑龍江馬隊官兵日就疲弱飭將軍副都統無論在城在屯一體挑練可造者多方鼓勵貧苦者酌量周恤遇行圍兵數不足以餘丁隨同操演同治元年以上海寧波等海口官兵延歐洲人訓練令曾國藩李鴻章左宗棠等酌選武員數十人在上海寧波習外國兵法以副參大員統之學成之後自行教練中國兵丁又以廣東福建營伍久弛飭耆齡劉長佑等於旗緑營營內擇驍勇員辨習外國兵法天津練軍亦如之其內地營兵仍遵舊章隨時訓練是年令文煜等定京營緑旗兵槍隊炮車合陳之制四年醇郡王等訓練神機營兵及練兵三萬餘人操演漸著成效緑營亦就整肅令仍隸醇郡王節制督操閲兵大臣一并閲看是年令崇厚率洋槍隊千五百人赴畿南飭天津鎮蘆臺鎮選擇標兵增練新式洋槍六年以丁寶楨所擬訓練馬隊章程十四條飭特普欽於黑龍江所屬富明阿於吉林所屬打牲人內招募壯丁三千人遵章速練馬隊以勦捻匪曾經出師回旗之員分起訓練入關候調十年曾國藩建議用兵十餘年緑營幾同虛設查閲江南營伍約有四宗曰經制緑營曰新設水師曰挑練新兵曰留防勇營凡陸兵四十一營水師十一營新兵十一營防勇十二營兵數實存二萬四千餘人舊習宜改者約有四端一兵丁應差與操演分為二事應差以分塘分汛為額操演以分營分哨為額一緑營餉薄兵疲宜仿新軍練軍之制裁兵加餉一舊用鳥槍土藥不利戰陳各營宜以次悉改洋槍一水師不得仍沿馬兵戰兵守兵之名各省水師皆應籌造船之費以船為家但兼陸操不得居陸外海內洋𩹉河水師器械船隻力求精整凡此皆事關全局請特旨通行內外臣工合議遵行是年令長江水師及外海內洋𩹉河水師均應專習槍炮不得藉口演習弓矢致開陸居之漸沿海兵輪水師亦免習弓矢十二年沈葆楨以各兵輪雖分駐各省而操演徵調必應聲勢聯絡請飭兵輪統領躬歷各海口隨時調操十三年李鴻章以八旗緑營兵用弓矢刀矛撎槍鳥槍舊法訓練固難制勝即新練各軍用洋槍者已少用後膛槍及炸炮者更少可靖內匪而不可禦外侮曾國藩曾擬以新械練兵沿海七省共練陸兵九萬人沿江三省共練三萬人計年餉八百萬兩總理衙門議以制勝之洋槍隊練習水戰丁日昌議合各省練精兵十萬人皆以費重未能遽行陸軍與水師規制各殊訓練亦異水師猶可陸戰陸軍不能操舟請以現有陸營一律選練洋槍裁緑營疲弱之額加新軍之餉沿海防營悉改後膛槍於海岸要口屯大支徑旅專講操練及築壘諸事各海口修洋式沙土炮臺置十餘寸口大炮擇良將徑兵練習以命中及遠為度以固海疆光緒五年李鴻章以德國陸軍步隊尤精得力在每日林操熟演料敵應變之法夏秋大操熟演露宿野戰攻守之法其法備於一哨擴而充之可營可軍前於海防營內選遊擊等七員赴德國學習林操及迎敵設伏布陳繪圖各法三年餘學成回國乃於親軍營內挑選哨隊仿德國一哨之制依法教練漸次擴充九年李鴻章始創設水師學堂於天津習駕駛等藝十一年張之洞酌定海防各營操練章程舊式刀叉弓矢已無實用改用新操一練臥槍一練過山炮隊一練掘造地營一練安放水雷一練修築炮臺一練臨敵散隊一練洋式火箭一練安設行軍電線一練疾步踰濠越嶺一練夜戰一練堅守地營及濬濠築牆一切工程是年李鴻章以外洋留學生回華於操法陳法電學水雷旱雷均有心得飭分赴各營教練辨兵並設武備學堂十二年張之洞以廣東省駐防營於光緒六年選甲兵千五百人改練洋槍洋炮及陳法乃裁汰旗營水師附入步軍編為兩翼合陳操演飭製造局移解新式槍炮增練炮隊十三年李鴻章以北洋武備學堂學生於炮臺營壘馬隊步隊炮隊諸新法咸有成就飭令回營轉相傳授是年張之洞始於廣東設水師陸師學堂水師分管輪及駕駛攻戰二種陸師分馬步槍炮營造三種兼采各國之長二十年張之洞之南洋水師學堂著有成效加以奬勵又於江寧省設陸軍學堂講求地理測量營壘諸術馬步炮隊諸法二十一年張之洞建議舊營積弊太深人皆烏合來去無恆一弊也兵皆缺額且充雜差二弊也里居不確良莠不分三弊也攤派刻扣四弊也新式槍炮拋棄損壞五弊也營壘工程不知講求六弊也營辨習尚奢華七弊也若以洋將統之期其額必足人必壯餉必裕軍火必精技藝必羔天勇丁不供雜差將領不得濫充此七者練兵之必要所聘德國武將三十五人已來華即仿德國營制設步隊八營二百五十人分為五哨馬隊二營一百八十騎分為三哨炮隊二營二百人分為四哨工程隊一營百人醫官槍匠等咸備凡勇丁二千八百六十人餉四十四萬兩俟操練有效推廣加練增至萬人以此軍洋將移練第二軍俾次第以成徑旅是年胡燏芬建議新練各軍宜用一律槍炮北洋先練五萬人為大軍南洋練三萬人廣東湖北練二萬人餘省萬人操法軍械務歸一律以便徵調各省應一律設立武備學堂二十二年始以新法訓練海陸各軍各省設立學堂同時舉辦是年張之洞始裁撤湖北武防等三旗改練洋操二營工程隊一營仿直隸武毅軍新練洋操章程參用德國軍制聘德國武員為教習以開風氣是年盛宣懷建議全國緑營兵歲餉千餘萬練勇歲餉亦千餘萬凡八十餘萬人徒耗財力無裨實用宜悉行裁撤共練新軍三十萬人就各省情形輕重定兵數多寡徵募訓練悉仿西法旋總理衙門以各省營伍驟難盡裁先就北洋新練兩軍及江南自強軍湖北洋操隊切實教練俟裁兵節餉次第推廣飭兩江兩湖督臣較準製造局槍炮畫一辦理又於武昌城設武備學堂聘洋員教習二十四年令各省稽察缺額攤派之弊嚴行革除至操練之法宜不拘成格盡力變通飭督辦軍務王大臣議之尋以神機營火器營健鋭營武勝新隊操演羔天熟賞統兵大臣有差令滿蒙漢各軍驍騎營兩翼前鋒護軍營五成改習洋操五成改用洋槍八旗漢軍炮隊營藤牌營一并改練神機營汰弱留強共練馬步兵萬人其陳法器械營制餉章酌仿泰西兵制是年秋上親詣團河及天津大閲新操又令各省增水師學堂學額增造練船習駕駛諸術二十五年以北洋各軍訓練三年飭統兵大臣取各種操法繪圖貼說以聞步隊以起伏分合為主炮隊以攻堅挫鋭為期馬隊以出奇馳驟為能工程隊以擴地利備軍資為事以平時操練之法備異日戰陳之需二十六年鄧華熙於安徽省城設立武備學堂習槍炮戰陳諸學二十七年以各省制兵防勇積弊甚深飭將軍督撫就原有各營嚴行裁汰精選若干營分為常備續備巡警等軍更定餉章一律操習新式槍炮又令南北洋湖北之武備學堂山東之隨營學堂酌量擴充認真訓練是年劉坤一張之洞等以二十年來各省練習洋操屢經整頓而舊日將領於新操多未諳習東西各國教將練兵要旨約有十二一曰教士以禮使知有恥自重一曰調護士卒起處飲食一曰講明槍炮彈藥質性源流之法一曰槍炮線路取准之法一曰掘濠築壘避槍炮之法一曰馬步炮各隊擇地借勢之法一曰測量繪圖之法一曰隊伍分合轉變之法一曰守衛偵探之法一曰行軍工程製造之法一曰籌備行軍衣糧輜重之法一曰行軍醫藥之法各疆臣均應選擇統領營哨各官均切實研究練兵固亟練將尤要數年以後非武備學堂出身者不得充將辨更請仿英法之總營務處日本之參謀部於都城專設衙門掌全國水陸兵制餉章地理繪圖操練法式儲備糧餉轉運舟車外交偵探等事平日之預籌臨時之調度悉以此官掌之兼采衆長務求實用令內外臣工合議二十八年設北洋行營將辨學堂實演戰擊諸法此歷朝訓練之規也
