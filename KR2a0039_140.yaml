從趕辦前所請加撥宜昌關稅銀五萬兩仍請照撥俾購機建廠製造等事徐底於成上海製造局新增鋼藥三廠每年加撥經費銀二十萬兩鄂廠事同一律舊設各廠經費本屬不敷新廠所需更無從出若從部議不得動用關稅則製造將無可措手綜計新廠需發共二十餘萬兩但能加撥宜昌稅銀五萬當設法周轉不使廠務停滯也吉林將軍延茂於吉林省機器局增置機器並代造黑龍江鎮邊軍及靖邊新軍各營軍火山東巡撫育賢擴充東省機器局增建製造新槍大廠造槍子廠熟鐵廠軋銅廠化銅廠泥工廠軍火庫房水龍廠房法藍爐房儲器房又造大小磚鐵煙筒鐵柵等件黑龍江將軍恩澤上言黑龍江鎮邊軍每年由練餉內提銀三萬兩充軍火經費歸吉林機器局兼造近年物料昂貴實不敷用以新編之師操練宜勤軍火尤為繁巨應仿照奉天吉林二省設局自造軍火成案於黑龍江省城擇地設立專局悉心製造此項購買機器建築廠房各費約用銀十萬餘兩在鎮邊新軍歲需軍火經費內分年籌撥是年令各省疆臣製造槍炮為邊防第一要著惟各省財力不齊自應就原有局廠切實擴充以備鄰近各省就近購用又令各疆臣天津上海江寧湖北等處均有製造槍炮局廠曾令督撫臣切實會商務將所製槍炮膛口子彈大小各局統歸一律以期通用並將每年所造槍件子藥若干據實上聞並按季咨報戶部神機營查核乃為時已久並未據報有案槍炮為行軍要需豈容因循延宕令裕祿劉坤一張之洞詳析查明各廠局所造槍炮究係何項名目是否業已會商造成一律迅即切實復陳嗣後仍遵前旨按年按季分別奏咨毋得延緩各督撫督率承辦各員認真經理精益求精並將槍炮膛口子彈彼此比較畫一務令不差纍黍庶各省互相接濟臨時不致缺誤倘管理局員草率從事虛糜經費或演放時有炸裂等事治以重罪旋經兩江總督劉坤一覆陳當飭滬寧二處製造局員將出入發項核實勾稽製造軍械詳細考究並令與天津機器局湖北槍炮廠隨時知照互相講求復由上海製造局員馳赴湖北比較數次兩局所製成槍炮子彈格式分量口徑大小一律合膛並無歧異惟江寧製造局所造後膛抬槍係出新創各省槍械均無此式其兩磅子一磅子後膛快炮亦與上海局中所造一律此外炮架炮彈各種槍子拉火等件分解南北洋各軍應用以經費有限未能加撥擴充該局在江寧城外粗具規模且居腹地形勝之區一旦海上有事在內地製造接濟軍需庶幾緩急足恃至上海製造局並能造各項快炮除炮臺所用之大炮外其所造四十磅一種即北洋之十二生的快炮其十二磅一種即北洋之七生的半快炮其六磅子一種即北洋之五十七米里快炮其兩磅子一種即湖北三生的七快炮洋廠名稱雖殊其尺寸大小則不差纍黍今由上海製造局派員與天津湖北二局逐一比試均無參差其快利新槍係以舊機參用人工所造亦頗便利究嫌費用多而出槍少去年飭各軍改用小口徑毛瑟快槍本擬訂造此種槍枝及造槍彈機器專一仿製以歸一律訪之上海各洋行需發數十萬為期且甚久一時無此財力遂仍用舊機更易機簧添配車座訂購改造七米里之毛瑟槍枝槍彈等件按照合同每日可出槍十枝俟安裝全備即日開工嚴定章程按年按季上聞以期核實各局兼造各項快炮均係新式尚敷應用至仿造小口徑毛瑟槍僅有湖北上海二廠其機器一係新購專門一係舊式更改能力所限每年造槍不多各路軍營恐難遍給曾與直隸湖廣督臣商酌添購造槍新機無論在津鄂寧滬何廠承造均以發絀未能即行擴充南洋軍火經費但期洋稅暢收並竭力撙節另發存儲以備添置仿造小口徑毛瑟槍機器一部能數年之內機器購全與湖北槍炮廠分途仿造以期器械日精又擬請設立工藝學堂學習船械槍炮汽雷等各種製造以廣人才是年浙江巡撫劉樹堂向金陵軍械所撥用德國老毛瑟槍三千枝子彈一百五十萬顆供浙省防軍之用二十六年直隸總督裕祿上言北洋機器局經費每年用銀二十五萬餘兩所造軍火向供北洋海軍及淮練各營操防之用近年經費減收而向例撥解軍火之外又加以新練武衛等五大軍而京師神機虎槍等營復時有調撥每虞缺乏況增募各軍皆以快槍快炮為利器各項槍炮子彈必須自行製造始能不誤操防因於光緒二十四年始陸續購辦製造快炮快槍子彈及造無烟槍炮火藥等項機器今始由外洋次第運至天津安設入廠並派員赴上海江寧等處將各局所造快槍快炮格式及槍子炮彈分量互相討論取到江南湖北二局所造槍炮各種子彈詳加比較以求畫一所有北洋增造快槍子廠無烟火藥廠快炮子廠並整頓煉鋼廠等項經費每年至少須增用銀十五萬兩應由部臣在各海關洋稅內加撥以濟軍用二十八年兩江總督劉坤一以上海製造局自製之新式無烟快槍車輪快炮協濟廣西軍營四川總督奎俊以四川省機器局自光緒三年創建廠房製造槍炮五年停辦六年奉旨復開局製造並增修熟鐵鍋爐碾火藥各廠房各洋火藥局迄今二十餘年所造軍械成績頗多而屋宇年久漸多朽壞一律修造以濟要工上年因擴充製造已增設繪圖委員既經培修各廠乃增繪圖房白火藥房各一所四川人心浮動調撥威遠軍一營常年駐守局旁以資巡察並建修表碼廠一所為演試槍炮之地閩浙總督許應騤以上年防務戒嚴福建機器局製造槍子所需用魚子火藥及海口炮臺所用炮位藥餅因外洋禁售軍火乃采購土硝硫磺以備製造復飭機器局按照洋式自造車輪快炮並快槍共采買土硝七萬斤硫磺一萬斤自製成魚子洋式火藥五萬磅各大炮藥餅六百九十三出三磅子車輪快炮十二尊十二磅子快炮二尊後膛新式抬槍一百枝修改後膛子輪快炮六尊在海防經費內開支二十九年兩江總督張之洞以滬上之製造局所有機器七年以前所造係林明登槍乃外洋陳舊不用之式兩年以前所造係快利槍乃製造局臆造之式亦不甚合用故槍械新舊湊配出數無多炮機亦未能完備而歲費巨款頗為可惜當整頓武備之時軍營所用槍械宜歸一律乃定議上海廠仿照湖北廠改造小口徑新式毛瑟快槍惟上海廠槍機不能全備必須兼以人工費工多而出槍少近年雖增機整頓每日止能出槍七枝一年出二千餘枝於武備大局無裨其炮廠所造車輪炮亦不甚合用必須購新式造槍機器每年能造五萬枝快槍者添配新式造炮機器每年能造大臺炮十尊七生的半口徑快炮二百尊者庶數年之後足以應各省之求而歸畫一江西巡撫夏以江西省製造局規模狹小擬先造快槍向外洋定購小口徑毛瑟槍新式機器全副每日約能出槍十五枝彈殼機器全副每日約能造槍彈三千顆並向洋商酌配購機件俾一機能造數器以期價省而用宏另備公用機器一副為添配修理各廠機器之用閩浙總督崇善以福建省於光緒二十五年將前所移附馬尾船廠之機器仍移設省城水部門內專製各炮台炮子炸釘等項旋於二十六年在機器局旁擴充地基增建槍子廠屋一座又於二十八年在省城西關外另設製造局專造無煙快槍其機器槍子二廠自開辦至二十八年止共用經費銀一十七萬八千餘兩製成三磅子快炮二十四尊與上海局所造炮同式福字一號二號陸軍後膛快炮二尊洋式十二磅半快炮二尊而機簧標準均不甚靈捷尚有修改船廠舊式陸路快炮四尊福強軍後膛車炮六尊製造新式後膛抬槍一百枝改造短柄洋槍一百枝製造各項後膛槍子三百二十餘萬顆其餘修理各項洋槍製造前膛炮子彈等件為費甚多其機器槍子二廠建設在水部門內人烟稠密之處存儲軍火大非所宜不如西關外製造局地面寬大不近民居蓋製造槍炮與製造子彈本係一事與其分廠而費大不如合廠而費省乃飭二廠一律暫行停造歸並製造一局將製成槍炮子彈及機件材料妥為存儲其員役工匠大加裁減每年只造各式抬槍及各式子彈以備操防所用山東巡撫周馥以山東省為海防要地而軍隊器械不足請向金陵製造局購新製三十七米里小快炮湖北槍炮廠購格魯森五生的七過山快炮並開花子彈兩江總督張之洞以東西洋各國章程於槍炮等件每得新式一律通行其舊式軍械概行作廢今湖北上海二局一律專造小口徑毛瑟快槍乃將上海製造局所存快利槍枝悉行報廢期軍火日精河南巡撫張人駿以河南省機器局製造軍械規模未備亟應增購槍炮子彈需用銅鐵各料並自造毛瑟快槍無烟火藥山東巡撫周馥以山東省機器局歷年造成各種西式槍枝火藥槍丸今復采買外洋銅鐵各料增造各廠機器爐房箱盒是年以湖北漢陽廠仿格魯森新式所造五生的三及五生的七之開花炮彈二種又曼利亞槍彈黎意槍彈各槍拉火撥毅軍備用福建機器局增造無烟火藥機器三十年河南巡撫陳夔龍以河南省原有機器局因陋就簡未能講求新法請增購機器十部及一切應用物件並購兩磅銅炮胚二十尊四磅銅炮胚十尊以備自行製造逐漸開拓兩江總督魏光燾擴充金陵機器局仿照外洋製造各式炮位架具炸彈銅火及炮台需用各件分設機器翻沙鐵木火箭各廠三十一年兵部議江南天津山東各處機器局並金陵洋火藥局所有運送軍裝軍火等運費一律報部四川總督錫良因奉部臣議自光緒三十年以後所有修整廠房機器並造成機器火藥洋槍等件遵新章呈報戶部山東巡撫楊士驤以山東省機器局自創設以來所造西式各種火藥大銅帽火各種後膛槍來福槍各式洋鉛丸並增各廠機器爐房尚不敷用又采買外洋銅鐵物料擴充製造河南巡撫陳夔龍擴充河南機器局即開工製造槍炮子彈以供軍實是年戶部定議通飭各省所有機器製造局以後如采購物料必報部核銷三十二年四川總督錫良綜核機器局成績續造機器槍械蜀利抬槍利川手槍等一百有四起火藥二萬餘斤馬梯尼槍彈毛瑟槍彈三十餘萬顆湖廣總督張之洞以湖北省新增鋼藥各廠所有經費由兵工總局兌收兩江總督周馥上言上海製造局各項軍火悉仿西式造成分給各省共經費二百三十八萬兩有奇所用材料多係洋産工資物價均無定例難以常例相繩陝西巡撫曹鴻勛以陝西省製造局陸續製給各營火藥三萬餘斤鉛丸七千餘斤為滿緑各營操防之用直隸總督袁世凱兩江總督端方會議令金陵機器局仿照外洋製造各式炮位車輛架具炸彈銅火以及修配炮台等處需用物件分設機器翻沙鐵木槍子捲銅火藥各廠雇募工匠常川製造四川總督錫良擴充川省製造槍炮所造毛瑟槍彈一切改良仿造外洋九響毛瑟等槍子彈亦能如式命中修造機件日益加多是年命政務處大臣會同部臣嚴核各省機器槍炮局廠五年保獎一次三十三年陸軍部議建四大兵工廠使所出軍械日精日多以備緩急之用護理四川總督趙爾豐綜核機器局成績於光緒三十二年內共修理機器五十九起舊式洋槍一千餘枝新造法藍單響毛瑟槍一千四百餘枝標刀帽火針簧一千四百二十餘起洗把一百四十餘箇九響毛瑟槍藥彈一百零四萬二千餘顆毛瑟槍藥殼三十三萬餘顆單響毛瑟槍藥彈三十三萬六千顆銅擊火八百顆十三響馬槍彈一千二百顆碰火二千顆紅銅小火四十六萬顆黃銅釘五十二萬顆火槍八枝洋鼓二百十二箇各項機件一萬五千十一起已成洋火藥二萬八千一百八十五斤均經試放合用分別存儲湖廣總督張之洞創建湖北兵工廠始於光緒十六年經營籌度至是年而規模始具初辦時每日所出七米里九口徑毛瑟快槍不過十餘枝復經設法擴充增置機器以後每日可造成五十餘枝槍彈一項僅日造數千顆逐漸加造至五萬餘顆所造三生的七格魯森快炮自開機至二十五年止共造成六十餘尊嗣於二十五年改造五生的七過山快炮每年可造成六十餘尊至九十尊開花炮彈由五萬餘顆遞加至每年七萬餘顆所造各項槍炮子彈與來自外洋者無所區別至鋼藥二種逐年次第增設煉鋼拉鋼各廠所煉出鋼質亦頗精良合用火藥廠所造成無烟火藥足能源源接濟使兵工廠無誤製造子彈之用所造軍械至三十二年年底止共造成馬步快槍十萬一千六百九十枝槍彈四千三百四十三萬七千九百三十一顆各種快炮七百三十尊前膛車炮一百三十五尊各種開花炮彈六十三萬一千七百顆前膛炮彈六萬零八百六十顆辦事各員不辭勞瘁寒暑無間乃能有此成績光緒二十四年曾加獎勵今又及十年之久仍彙案給獎安徽巡撫馮煦以安徽省所用槍彈向年購自他省乃以原有之造幣廠改為製造局為自造子彈及修理槍械之用遂購機募匠開局興辦四川總督錫良以上年曾派員出洋考察製造軍械事宜即在德國名廠訂購製造小口徑毛瑟快槍及造子彈造無烟火藥各種機器分運到川因舊日製造局無可展拓乃另擇相宜之地建築造槍廠造槍彈廠造無烟火藥廠仿德國蜀赫廠新式自造三十四年直隸總督楊士驤在保定省城內軍械局增建火藥庫及兵房東三省總督徐世昌以近年東省新軍日增乃於省城設立軍械總局吉林黑龍江二省各設分局以修械司附屬之宣統元年陸軍部建議泰西各國軍械製造局廠內首領以次各官多與我國副協都統參領軍校諸秩相埒我國製造軍械設立學堂將來製造人才造就日多應仿各國成規於各製造廠設工官以供驅使湖廣總督陳夔龍以湖北省兵工鋼藥廠自成立以來為軍械要需每年經費增銀至八十萬兩以維局務二年東三省總督錫良在奉天省垣設立軍裝製造局選集木材鐵革各工師分科製造以供奉吉黑三省軍隊巡警之用三年吉林巡撫陳昭常以吉林省陸軍改編成鎮設立軍械專局附設修械司備軍警之需綜舉各省製造軍械之事同治元年天津初造槍炮二三年間江蘇分設機器局於江寧上海共設三局四年並三局於上海定名機器製造局六年天津擴充製造設軍火機器局九年改名天津機器局十三年福建設機器局自造開花炮上海製造局仿造林明登槍天津上海二局均仿造水雷廣東設機器局軍火局上海江寧二局增槍炮子彈機光緒二年派學生藝徒出洋分赴各國學習製造湖南山東二省均設機器局自造軍械不用洋匠三年四川設局專造馬梯尼後膛槍四年津局造後膛炮六年江寧局造來福槍馬梯尼槍林明登槍七年上海局造炮臺鋼炮吉林設機器局江寧增設洋火藥局十一年廣東設製造局及水雷局十三年江寧局造田雞炮廣東設槍彈廠十六年湖北設兵工廠所造新式槍炮為南北洋川廣各製造局所無並籌備煉鐵廠及開煤礦為製造之基十八年貴州設爐煉鐵十九年天津上海二局均設爐煉鐵上海局增造新式槍炮湖北設煉鐵廠二十年湖北增設炮架炮彈槍彈三廠陝西運取甘肅舊存機器以備造械二十一年天津機器局改名總理北洋機器局廣東造抬槍線槍湖北江南二省均增設煉鋼廠栗色火藥廠無烟火藥廠陝西設機器局二十二年江南新廠造快利新槍天津局購機造新式炮子四川局造後膛毛瑟抬槍天津局造中機邊機前門抬槍湖北廠以舊日之抬槍線槍抬炮劈山炮均改造後膛山東增熟鐵廠軋銅廠槍子廠大槍廠河南局增造槍彈火藥及造抬槍機器二十三年湖北廠增造罐子鋼及造無烟火藥機器二十四年山西設製造槍炮廠上海天津二局均增造快炮機器二十五年山東增建造槍造彈化銅軋銅各廠黑龍江設機器局二十六年福建增建槍子廠天津增建快炮子廠快槍子廠無烟火藥廠二十八年江西局增造槍炮機器二十九年福建並造槍造藥二廠為一廠三十年河南局增造槍炮機器三十三年陸軍部議建四大兵工廠四川設造槍廠造彈廠造無烟火藥廠安徽建槍彈廠宣統二年奉天建軍裝製造局三年吉林設軍械局各省機器局廠之設歷時垂五十餘年開局遍十七行省幾經增改漸就精良此製造軍械之大概也
