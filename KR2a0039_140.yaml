body:
  text: 清史稿卷一百四十志一百十五兵十一製造清代以弧矢定天下而威遠攻堅亦資火器故京營有火器營鳥槍兵之制屢命各省防軍參用槍炮初皆前膛舊制繼購歐洲新器其後始命各省設局製造製造之事實始天津當咸同間中原未靖李鴻章疏請在天津設機器局自造槍炮以供北方軍隊之用同時江蘇亦創立機器局同治四年江蘇巡撫李鴻章疏言統軍在江南剿賊習見西洋火器之精乃棄習用之抬槍鳥槍而改為洋槍隊留防各軍五萬餘人約有洋槍四萬枝銅帽月須千餘萬顆粗細洋火藥十數萬斤均在香港上海購買又開花炮四營每炮一具重者千餘斤輕亦數百斤炮具精堅藥彈繁重惟器械子彈皆係洋式所用銅鐵木煤各項均來自外洋必須就近設局自造以省繁費江蘇先設三局嗣因丁日昌在上海購得機器鐵廠一座將丁日昌韓殿甲二局移并上海鐵廠以後能移設金陵附近濱江僻地最為久遠之謀五年閩浙總督左宗棠疏言外洋開花炮近日督飭工匠仿造已成三十餘尊用尺測量施放與西洋同其功用十三年船政大臣沈葆楨疏請飭沿江海各省仿津滬二廠自設槍炮子藥廠局光緒二年李鴻章沈葆楨丁日昌疏請選派製造學生十四人製造藝徒四人由出洋監督帶赴法國學習製造此項學生既宜另延學堂教習課讀以培植根本又宜赴廠習藝以明理法俾兼程並進以收速效備他日監工之選其藝徒學成後可備分廠監工之選凡所習之藝均須新巧勿循舊式如有他廠新式機器及炮臺兵船營壘礦廠應行考訂之處由監督酌帶生徒前往學習山東巡撫丁寶楨疏言今在山東省城創立機器製造局不用外洋工匠一人局基設在濼口自春及秋將機器廠生鐵廠熟鐵廠木樣廠繪圖房及物料庫工料庫大小十餘座一律告成其火藥各廠如提硝房蒸硫房煏炭房碾炭房碾硫房碾硝房合藥房碾藥房碎藥房壓藥房成粒房篩藥房光藥房烘藥房裝箱房亦次第告竣其各廠煙筒高自四十尺至九十尺不等凡大小十餘座所買外洋機器次第運取俟機件煤炭各種備全廠局告成不逾一年即可開工將來如格林炮克魯伯炮林明登槍馬梯尼槍均可自造不至受制於人並可接濟各省由水路轉運即使洋商閉關不虞坐困也直隸總督李鴻章兩江總督沈葆楨江蘇巡撫吳元炳疏言上海製造局自同治四年開辦閲七年曾請奬一次今又閲七年先後增造機器二百三十三座大小銅鐵炮三百四十八尊炮架七百八十餘座開花實心炮彈十萬一千餘顆各式洋槍一萬八千六百餘枝槍彈八十餘萬顆火藥十七萬磅其他零件關係軍事者甚多在事諸人寢饋於刀鋸湯火之側出入於硝磺毒物之間積數年之辛苦乃克有此成績請優奬以資鼓勵三年湖南巡撫王文韶疏言近年上海天津江寧均有製造局濱海固宜籌備而內地亦應講求湘省一年以來先建廠次製器仿造洋式規模粗具後膛槍及開花炮子試演均能如法與購自外洋者並無區別以後隨時添造自數千斤以至萬斤大炮或鋼或銅均可自造湘省向産煤鐵攸縣安化各處所産之鐵與洋鐵一律受鑽火藥一項督匠精造與洋火藥不相上下自光緒元年五月開辦至二年十月共用二萬二千餘兩以後每月以三千兩為度請援津滬二局成案專摺奏銷四川總督丁寶楨疏言川省已設機器局今外洋機件運到即行開局自造洋槍子彈等項四年總理衙門王大臣疏言前陳海防事宜有簡器一條巨炮應如何購辦各軍洋槍應如何一律以後應如何自行仿造請飭疆臣切實詳議以聞嗣據各將軍督撫覆陳有言前膛槍穩實者有言後膛槍靈捷者有言線槍勝於洋槍者有言宜勤加操練磨洗者有言不宜多購防新出更勝者有言宜派人赴外洋學習者有言宜內地設局以防後患者臣等查外洋槍炮近時皆用後膛名目甚多必須擇其至精之品一律切實辦理庶在彼不敢售其欺在我得以適其用外洋軍械價值本無成案可考故承辦之員視為利藪查上海為各洋商聚集之地多在該處交易請以精明廉正之員總理其事各省有委辦軍火者責成該員核定如有浮冒等事嚴行治罪至仿造外洋軍火李鴻章先後奏在上海天津設局製造丁寶楨王文韶亦在山東湖南二省各設局廠不用洋人其費最省丁寶楨復於四川設局以上三局均設在內地滬局製造槍藥歲用銀四五十萬兩津局歲用銀二十餘萬兩近據李鴻章沈葆楨奏報津局造後膛炮滬局則前膛後膛洋槍並造既非通力合作未必易地皆宜請飭兩局派得力人員隨時酌核畫一辦理時廷臣有議以上海機器局發充固本餉及賑捐者兩江總督沈葆楨疏陳謂機器局締造十餘年僅恃二成洋稅入不敷出而南北洋所用槍炮子藥咸取給於此海防重要未可停工五年丁寶楨疏言四川機器局近以恩承童華疏請停辦奉諭令酌度辦理仍請設法興辦毋令廢墮遂復開局製造七年兩江總督劉坤一疏言金陵製造局於光緒六年即飭工匠加工製造各軍撥用洋槍先後已及萬枝今軍械所尚存來福前膛槍一萬三千餘枝馬梯尼後膛槍七千餘枝林明登後膛槍八千餘枝細洋火藥六十五萬餘磅洋炮火藥四十餘萬磅棉花火藥九萬九千餘磅銅火一千萬磅各項銅管火十七餘萬件又水雷應用之電線七十五車所儲尚不為少而上海製造局現造之洋藥及林明登槍可隨時接濟金陵復定購機器增設洋火藥局並定購前後膛槍一萬五千枝尚不在此數內至各處明暗炮臺所用之炮位有上海製造局現造之一百二十磅子之鋼炮年內可成金陵局中所造陸營之炮亦多可用是年督辦寧古塔等處事宜吳大澄疏請吉林創辦機器局十一年直隸總督李鴻章疏言上海江寧天津廣東各機器局大都分造炮械子藥以供各軍操練戰守之用尚未能仿造後膛大炮至若三四寸口徑後膛小炮後膛連珠炮為水陸軍必需之利器應就內地已開煤鐵礦近水之處分設造槍造炮專廠至克魯伯鋼炮近來德奧義各國恐純鋼不盡合用均改造硬銅後膛小炮融煉別有新法日本已聘洋匠仿造中國亦宜踵行各國後膛槍式樣不一新式改用連珠或六七響精利無匹日本已設廠自造中國亦宜專造以應各省之用約計造槍及小炮機器皆不過數十萬金尚不甚巨水師所用之魚雷伏雷與炮並重各種伏雷中國機器局多能自造至魚雷則理法精奧別有不傳之祕只可向西洋訂購天津機器局已購備試雷修雷之具仿造則未易言也兩廣總督張之洞疏言粵省請募發開設槍雷各局其大炮仍歸滬閩二廠製造又疏言省城有機器局城西增步地方有軍火局以器具未備僅能製小鋼炮開花子尋常洋火藥白藥水雷殼洋火箭修理船炮尋常機器除火藥火箭尚可用其餘能成而不能精設局十餘年用銀數十萬迥非津滬閩各局之比今重加整頓以機器軍火二局并入城西增步一局以就水運之便名曰製造局仍製槍炮彈火藥等物其修理魚雷歸黃埔雷局就製械而言以槍彈與行營炮為尤要蓋購槍可用數年購彈不能支三月一舉而購槍數千則易一舉而購炮數十則難自宜分條並舉循序圖功期以一年半而鑄槍炮廠成兩年而炮臺備庶足以禦強敵大學士左宗棠疏言各省製造局廠宜合并籌辦以專責成前曾疏請開徐州穆源各礦為鐵甲鋼炮材料茲奉諭飭議設廠處所若論常格自應由兩江閩浙籌發試辦或委公正富紳集股創辦並招通曉化學之人研求煉法俾速出鋼鐵應用其實礦政船炮相為表𩹉應設海防全政大臣所有製造船炮礦廠軍火事宜皆宜一手經理以歸畫一十二年兩江總督曾國荃疏報金陵洋火藥局竣工四川總督丁寶楨疏言川省建設製造局已及五年仿造洋槍為數不下一萬五千餘枝除接濟廣西雲南軍營外局中尚存後膛洋槍三千五百枝前膛洋槍四千枝恐不敷用向上海洋商訂購克虜伯開花炮格林炮各十尊另造得用之劈山炮七十餘尊撎槍五百枝備用其火器彈丸銅帽等除撥用外尚存九萬餘斤今加工製造每月可得火藥七千餘斤以資接濟十三年四川總督劉秉璋疏言川省機器委員曾照吉等能用巧思不招洋匠自教工徒仿造外洋槍炮創用水輪機器以省煤力又於省城外設局以水機製造火藥數年以來成機三部機器一千五百九十件洋槍一萬四千九百枝火藥二十八萬餘斤銅火帽一千三百七十五顆後膛藥彈六十八萬五千五百顆鉛子六十萬五千顆洋炮三具成績甚優兩廣總督張之洞疏言前以籌辦海防購運軍火並濟雲南廣西軍營而後膛槍彈需用尤多必須購置機器自行仿製乃在上海洋行購運製造槍彈機器來粵正擬設廠開辦適廣西撫臣李秉衡以廣西所購槍彈機器一部運解到粵而廣西撤防且無力設局請留在廣東備用當即在省城之北石井墟地方創立製造槍彈廠一所所有機器大廠一座打鐵烘銅殼鍋爐造木箱裝子藥房共五處儲料發料庫各一處又有裝蠟餅紙餅火藥及工匠等房共安設機器二副能造毛瑟馬梯尼士乃得雲者士得四種槍彈試辦之初每日約造二千顆熟習之後每日可造八千顆目前即可開造尚有需用鎔銅碾銅等機器并增建廠屋俟次第到齊即可舉辦十五年張之洞疏言廣東籌建水師陸師學堂並於堂外建機器廠一座鑄鐵廠一座烟筒一座及儲料所打鐵廠工匠房操場演武廳石隄馬頭等約用銀六萬兩機器廠內有十二匹馬力汽鍋機爐全座大小旋鐵床削鐵床鑽鐵機剪鐵機共一十七架手用器具銅鐵鋼料約用英金二千五百鎊其機器在英國廠訂購之又疏言前曾由文武官紳及鹽埠各商分年捐銀八十萬造小兵輪十號今接續捐募三年專為購買製造機器並建築廠屋經費乃電詢德國柏林地方力拂機器廠訂購新式製造連珠毛瑟槍及造克魯伯炮過山炮各項機器全副其汽機馬力加大以便槍炮兼造鍋爐并為一廠較為節省旋由出使德國大臣與該廠訂造槍機器一分每日能造新式連珠十響槍五十枝汽機馬力一百二十匹又造炮機器一分每年能成克魯伯炮口徑七生的半至十二生的之過山炮五十具又購槍尾尖刀機器全分價共一百八十一萬七千兩今擇定省城西北石門地方依山臨江輸運便利於建廠相宜乃即日開工起築其槍管鋼料及煉鋼罐等均向德國名廠購備以期精良他日鐵礦各山開采得法則鋼鐵材料取給內地次第擴充並可接濟各省軍營也十六年湖廣總督張之洞於湖北省城初建兵工廠是年總理海軍事務大臣與戶部會議以廣東槍炮廠改移湖北省開廠後常年經費由湖北籌辦旋由湖廣總督張之洞覆陳鄂省開廠後督飭洋匠悉心考求原定造槍機器一副每年能造新式連珠十響毛瑟槍一萬五千枝造炮機器每年能成克魯伯七生的半至十二生的行營炮及臺炮共一百具又應添購造槍炮藥造白藥造彈造炮車造炮架各機器每槍一枝隨彈五百顆每年須成槍彈七百五十萬顆每炮一尊外洋向例隨帶炮彈三百顆茲就最少之數亦須隨彈二百顆每年須成實心彈開花彈各種彈共三萬顆統計一切經費約需銀七十五萬兩計一年所造槍炮全分比外洋買價所省甚多特是巨發難籌此次開廠試辦所有槍炮藥彈每年各造一半約需銀四十萬兩機器今已到鄂置閒必至鏽壞工匠亦必練習方能精熟就鄂省財力自行籌措查四川機器製造局係奏明支用土藥稅釐今湖北槍炮廠乃奉旨特辦較四川製造局大小懸殊關繫尤重請將湖北省歲入土藥稅銀二十萬兩川鹽加價銀十萬兩共三十萬兩撥充槍炮廠常年經費將來各省需用撥發由鄂廠代造則隨時收回價本即可推廣多造此次鄂省新設槍炮廠所造各械皆係南北洋廣東山東四川等省製造局所無者至鄂廠所造克魯伯各種車炮尤為邊防海防及陸道戰守必不可少之利器前大學士左宗棠曾言購械外洋以銀易鐵實為非計一旦有警敵船封口受制於人運購均無從下手況陸續遠購之器種式既殊彈碼亦異每至誤事懲前毖後則建廠自造乃未雨綢繆之計也是年兵工廠成十九年直隸總督李鴻章兩江總督劉坤一疏言上海機器局於光緒十五年令道員劉麒祥辦理局務專心創造新式槍炮及自煉鋼料外洋新出利器不肯以祕法示人其機括靈巧猝難臆測開辦之始幾無端緒可尋乃精選洋匠博訪窮探考索成式參以心得造成試驗之有稍不如法者拆改重造於二年之內盡羣才之力竟造成新式槍炮並煉就鋼料迭次考驗與西洋所造一律精堅湖廣總督張之洞疏言湖北新建煉鐵廠告成開煉生鐵爐一座已煉成生熟鐵具銅碾鐵軌鐵條均有成效其煉西門士鋼廠開煉時極險北洋上海各爐迭有炸裂堵塞之患鄂省此項鋼爐飭洋匠詳考火候向來至速須六點餘鐘出鋼今止三點餘鐘已能煉就鋼料成色無異洋製足以為造炮之用炮廠亦即開工即以煉出之鋼試造六生的半及七八生的克魯伯陸路車炮若能鋼料精堅演放有準即可造十二生的大炮以軍需孔急飭工匠多煉西門士鋼及貝色麻鋼為製造槍炮之用外洋陸戰全恃連珠快炮僅有後膛槍炮不足以盡之鄂廠添購製快炮機器尤為利用也煉鐵廠之鐵路運道及洋匠華工原為二爐之用今止一爐每年只能出鐵一萬五千餘頓折虧甚巨馬鞍山煤井焦炭爐完工在即擬以湖南省所出白煤和攙焦炭冶鍊勉供二爐之用始足以資周轉二十年總理衙門王大臣疏言軍務緊急以趕造軍火為先務而經費有限以之購買外洋軍火則不足且多須時日以之就各省現有局廠加工製造則軍火可倍而出之前由戶部撥發在吉林設立機器局專供吉林黑龍江二省常年操防之用請飭吉林機器局加添工料增造軍火以應急需湖廣總督張之洞疏言湖北新設之漢陽鐵廠先開生鐵大爐一座日夜出鐵八次共五十餘頓以後日見進步有每日出六七十頓者其次乃煉熟鐵煉貝色麻鋼碾鐵條製鋼軌以及錘煉烘壓各法一時並舉所出之鐵雖係初煉已與外洋相較無甚軒輊現在江夏馬鞍山煤井所出之煤可作焦炭合於煉鐵之用已開橫穴煤巷現擬進掘三層橫穴外洋之大洗煤機及運煤之鐵掛線路均已次第竣工洋式焦炭爐十座年內當可一律告成足敷生鐵一爐及各廠煉鋼之用參以湖南所産白煤油煤即可二爐齊開此製造鋼鐵已有成效之情形也又疏言鐵廠之設實兼采鐵煉鋼采煤三大端為一事而開煤所費幾與煉鐵相等本難并入造廠煉鐵計算開平煤礦費至二百萬始克成功今鐵廠自經始至觀成用發繁巨所有奏明撥用之發早經用罄雖以槍炮經費勻撥不敷仍多非原估續估之多疏漏實因開煉以後經費與造廠工程本係二事必須先行籌墊一年且事皆創舉機局變更無常隨時補救增出用發多在洋匠原擬之外非預料所及其增出之發除零星雜費數十項不計外舉其重大者數端一增購機爐工料如增置十五頓大汽錘一具增貝色麻大壓汽機一副增造西門士爐底火泥管及造火磚機器增改生鐵大爐架一座爐內用磚令與礦煤之性相合增生鐵廠內之鐵瓦敞棚增中西兩式洗煤機增內地火磚焦炭爐增鋪地鐵板增廠內運物鐵路增運礦煤鐵車增爐上鐵蓋爐外水池水溝及四周之保險門增銅鐵管及水箱增化驗煤鐵大小各項器具材料以及汽表風表水表皆為精細貴重之件一增募開煉洋匠原擬雇用八人其餘雇用熟手之華匠百餘人應用開煉之事以生鐵大爐為重中國向未煉過若欲選用華匠非有極聰明之人在廠精練多年難與此選即煉鋼各廠亦非得專門名家之洋匠領首作工不可若手法稍不中程度即致變生意外危險之至現募到洋匠二十八人均萬不可少較原估八人多出二倍餘一添補不全機器外洋運到之機件沿途損缺頗多其簡便者由漢陽本廠自行修補二千餘件外其重大精細機器必須由外洋或上海洋行重行購補或此種不甚靈動則洋匠必另購一機以救之或此式之爐試煉焦炭不淨或舊法所采之礦不多則洋匠又思一法以損益之曠日加工致多糜費一外洋金鎊值價日昂比初定機器時價高過半而改換機器訪訂洋匠等事日積月纍亦成巨發一多用煤斤凡鐵山煤礦開采轉運以及鐵廠起重運料試鑽開井抽水壓氣無在不需機器即無日不用煤斤為數甚巨又生鐵大爐購用外洋焦炭試煉兩月費亦不資各發皆原估所難周悉加以煤井開至數十丈已費盡人工機器之力而煤層忽脫節中斷外洋辦法必仍就原處追尋另行開井而重開一井非巨發不辦現實無此財力若非馬鞍山煤井有成則全恃湘煤所費更巨此則時局變遷多費用發初非意料所及前曾督飭局員及洋匠礦師續估用發以為能銷貨周轉不致再有增加之發乃移步換形層折過多加工遂致加料費日因以費工不特非局員所能限定并非洋匠所能預知多方補救繁費滋多今撥借各發所餘無幾若行銷挹注必俟兩爐齊開一年以後始能流通周轉尤須鋼鐵各料胥臻精美合於製造之用方可期流通無滯至暢銷後尤防洋鐵有減價奪售之患此開煉之初必須寬籌經費庶不致停爐待發原擬就槍炮廠經費挹注無如槍炮廠增設炮彈槍彈炮架三廠計機器運費等已需銀三十萬兩建廠之費尚不在內勢不能全行撥用值此廠工已竣煉鐵已成之際所缺者僅此籌墊之發若鎔鋼煉鐵因此停工則製造槍炮何所取資當海防緊急之秋而軍械缺乏貽誤戎機關係匪淺今各省財力自顧不遑豈能協助惟有就湖北本省各發竭力勻撥周轉機爐勿使停工軍實得資接濟庶不致功虧一簣也又疏言前因開煉鋼鐵為造械之本以槍炮廠經費勻撥濟用而槍炮廠更形支絀前辦海防所購軍械每槍式參差彈碼互異及舊槍攙雜藥彈潮濕流弊滋多故炮架炮彈槍彈三廠之設萬不可緩今竭力籌發先將炮架炮彈機器於十八年夏間在德國力拂廠購定製造水陸行營各種炮架機器全副每年能成六七生的至十二生的炮架炮車一百副購定製造克魯伯炮彈機器一副每日能成六七生的至十二生的炮彈一百顆其他開花彈實心彈羣子彈子母彈均能自造又購定小口徑槍彈機器一副每日可成槍彈二萬五千顆造銅板造鉛條裝藥入彈修理器具俱全共用銀三十萬兩有奇又添廠屋大小鐵梁鐵地板水泥火磚各種建築工程三廠合計共用銀十五萬八千兩近日外洋快炮益精即兵船八十磅至百磅之大炮亦用機器造成鄂廠本係製造新式連珠槍若能兼造快炮於軍事尤多裨益已電詢洋廠增購新式快炮機器及炮管各件共價銀三萬兩有奇其廠仍舊俟機器到齊即可改製較之另起廠屋所省經費實多此種快炮六生的者每分鐘可放三十出九生的者每分鐘可放二十餘出洵為制勝之具也是年陝西巡撫鹿傳霖疏請以甘肅省舊存製造軍火機器全具運至陝西省城試造槍炮子藥二十一年奉天增練新軍將軍依克唐阿遣員在山東吉林奉天遼陽等處製造銅鐵等各項炮位華洋各式步槍以及炮車炮架並購製造子彈碾火藥造地雷器具暨刀矛等件在正餉動支山東巡撫李秉衡以山東省自設立槍炮機器局後供給各路軍火逐年增加製造請增常年經費兩江總督張之洞以前年任湖廣總督創辦湖北漢陽煉鐵廠及興國州馬鞍山二處采煤以供煉鐵之用著有成效請優奬在事人員陝西巡撫張汝梅以陝西省各軍所用里明毛瑟中針後膛各式洋槍皆由他省協撥不盡合用咨商甘肅省撥舊存製造軍火之機器等件運至陝西即在省城設立機器局試造槍炮子藥隨時修理舊械兩江總督張之洞上言天津江南廣東山東四川原有製造局所造軍需水陸應用各件頗多而所成槍炮甚少或止能造槍炮彈而不能造槍炮或能造槍而汽機局廠尚小均宜量加擴充福建船政局現有大鍋爐機器及打鐵各廠并多諳悉機器員司工匠若增置造槍炮機器費省而工亦易集如奉天為根本重地而道遠難於接濟宜專設一廠陝西為中原奧區且可以接濟西路亦宜專設一廠至各廠製造大率皆宜以小口徑快槍及行營快炮為主或槍炮並造或槍炮分造宜每項擇定一式各廠統歸一律以免參差腹省各局只須陸路過山小炮即足供陸戰之用若沿江沿海數局並宜造船臺大快炮每廠每年至少須出快槍五六千枝陸路過山二種小快炮一百餘尊方能濟用一面雇用洋匠一面選派工匠赴外洋名廠學習冀他日能擴充製造廠數處惟各省局廠上海金陵二處雖各有製造局而金陵局規模頗小機器未備所出槍炮無多其設局之處限於地勢不能展拓僅能擇行軍要需者酌增機器究不能多上海製造局雖較宏大惟所造槍彈炮彈水雷火藥及修理輪船等門類頗多而不專一並非專造快槍之機器每月成槍不過百餘枝亦無造陸路過山二種快炮之機器至大炮則一年或出一二尊不等且該局軍械須運出吳淞江後再轉入長江若有兵事敵人以戰船封口一切轉運立即束手前此開局滬上只圖取材便利未能盡善故沿江內地必須添設局廠湖北槍炮廠因上年槍廠被火後改造鐵料廠屋修補機器甚費經營快炮所增新機以工匠初試未熟線路猝難較準今甫造快槍式樣數十枝快炮式樣一尊車炮二尊均尚合用以後所出自可日多惟槍機曾經火灼敏速之力稍減一年以內人器相習每年約計可造成快槍七八千枝陸路過山二種快炮百尊局廠地踞上游最為穩固上可接濟川湘陝豫下可接濟江皖轉運甚便若在江南另行擇地建造所費至巨不如就湖北廠添購機器廣為擴充其鋼鐵即用鄂省鐵廠所煉除鄂廠原造之數外今每年能加出快槍一萬枝無煙藥槍彈一千萬顆陸路過山二種快炮二百尊炮彈二十萬顆湖北向無新式藥廠擬并造無煙藥棕色藥黑藥令足敷各種槍炮之用合計槍炮架藥彈各項機器與外洋名廠考較諸從節省凡運費造廠約需銀二百萬兩又因湖北省鐵廠開煤井煉焦炭煉各種精鋼熟銅熟鐵正在緊要之際槍炮廠則趕造五處廠屋試造槍炮此二廠皆經費支絀所造軍械非專供湖北之用請就江南籌防局撥發協濟又以江南省製造局自光緒十七八年沿江各省教案會匪紛起深恐海上有警當將製造局應行增製快槍快炮新式火藥各件籌議購機試造逮光緒二十年日本軍事起各省徵調頻繁處處調撥軍火局中積年所造之槍炮藥彈幾至撥發一空自應及時擴充機器加緊製造近年軍械以槍炮藥彈為先而槍炮尤以新出快式為利是以鄂省設廠自煉鋼料為炮筒槍管之用又因新式巨炮皆用栗色火藥餅快炮快槍皆用無煙火藥局中自造者無多應增置各項機器擇要先辦將煉鋼製藥及造快槍快炮各機器數十座向洋商定購又購買基地增建煉鋼廠造栗色火藥餅廠無煙火藥廠及添購製造鋼料與造火藥物料合計用銀四十餘萬兩其在外洋訂購之器件與洋商籌議令其暫行墊辦不致稽延時日先將各項機器運到即可開廠製造自光緒二十年海防戒嚴各省防軍需用軍火甚急而火藥子彈尤為大宗外洋守局外之例不肯代購即使設法運購而價值驟增數倍遠涉重洋敵船又不時邀截至為困難今江南製造局購機設廠自能仿造不待外求自為當務之急但局中常年經費僅有二成洋稅數十萬兩只能製造各項子藥分濟南北兩洋操練防守之需若加造新式槍炮接濟各軍則機廠既增工料自倍加於昔擬於江海關常年洋稅或洋藥稅釐每年加撥銀二十萬兩為擴充製造後常年工作之需二十二年成都將軍恭壽因四川省軍實不充而防務重要乃與駐防川省之八旗協領等量力捐廉製造抬槍九十六枝鳥槍四百八十枝均用煅煉純鐵絲製造堅實可恃其舊存槍枝一律修整為操練之需直隸總督王文韶以北洋機器局所造各種炮子名目雖不同而十生的半之子彈居多皆係舊式不盡合用乃向洋商訂購洋式翻沙泥及造彈各機器自行仿歐西新式製造兩江總督劉坤一考核機器局成績於常年製造之外煉鋼廠每年可出快炮快槍筒及槍炮槍件炮架器具等鋼料共二千二百餘頓栗色火藥廠每年可出栗色火藥二十餘萬磅無煙火藥廠每年可出無煙火藥六萬餘磅所創立造槍炮新廠購機已備加工製造每年可出快利新式槍一千五百枝一百磅子之快炮六尊四十磅子之快炮十二尊快利新槍子一百三十餘萬顆快炮子彈一千五百顆大小鐵彈一萬餘顆漸著成績四川總督鹿傳霖以四川省機器局自光緒十二年至十七年前督臣劉秉璋曾將在局出力人員奬勵今又屆五年所陸續造成機器藥彈等項皆精良合用增造後膛毛瑟抬槍亦頗快利在局各員仍行奬勵之直隸總督王文韶因京師練兵處王大臣以京營訓練需用打帽抬槍一千五百枝令北洋製造局如式製造以應要需乃造成邊機抬槍中機抬槍各一枝試放均屬靈捷合用惟邊機抬槍分兩太重不便施放若用中機抬槍改造邊機其尺寸斤兩仍與中機抬槍一致即令製造局按照此式製造邊機前門大式抬槍五百枝隨槍物件共五百分以中機抬槍改造邊機前門小式抬槍一千枝隨槍物件共一千分其製造發項由北洋作正開支北洋製造局向有歲造荷炮子彈經費銀四萬兩本年以此項荷彈歲費改造後門抬槍今練兵處需槍孔急擬即以此發移用湖廣總督談繼洵以湖北省製造軍火向年所造舊式抬槍線槍抬炮劈山炮等項均係前膛不及後膛新槍炮之敏捷擬向外洋購置機器改造各項後膛槍炮並製造炮彈槍彈銅殼等項今因部臣允從奉天府丞李培元之議令各省製造局兼造抬槍並造內地火藥籌度辦理因抬槍抬炮本中國向日制勝之具將辨兵丁素所習練今若改用後膛操演易於精熟用發不多而日後可收大效雖漢陽槍炮廠規模宏遠而機器種類各有不同若抬槍抬炮等器他日能製造精純亦可為漢廠之助也山東巡撫李秉衡考核機器局成績於光緒二十一年所造成各種火藥十五萬六千九百六十斤大銅帽火七十二萬顆開花炸子一千六百顆炸子銅螺絲引門一千六百副克雷力伯銅炮拉火銅管四萬四千枝帶活架瓶炮九尊大炮子一千四百九十顆洋鉛彈丸一百三十九萬四百五十粒添造各廠應用機器及熟鐵大鍋爐一具修理各營損壞洋槍洋炮製成各項軍火箱盒修理槍子廠軋銅廠房屋及大鍋爐爐台烘銅爐大煙筒生鐵廠保險爐提硝房工務廠之屋宇等又采買硝磺銅鐵鋼鉛及華洋各種物料暨員匠工役薪工運腳雜費等共支用銀六萬四千七百餘兩有奇是年戶部從吉林將軍長順之議增吉林機器局製造軍火常年經費除黑龍江軍隊領用外其餘分給奉天防軍二十三年大學士榮祿上言製造軍火以煤鐵為根本外洋購價日昂中國各省煤鐵礦産以山西河南四川湖南為最應令山西等疆吏籌發從速開采設立製造局廠漸次擴充以重軍需廷議允之令督撫臣就地方情形認真籌辦總期有備無患庶足倉卒應變是年湖北巡撫談繼洵以湖北省製造軍火增置炮架槍彈炮彈三廠所有機器工料之價並改換新式快炮機器尚需銀十四萬餘兩即在籌捐項下撥給山東巡撫李秉衡上言山東機器局於光緒二十二年間所造軍火共造成各種洋火藥十九萬六千餘斤堅利遠後膛大抬槍二百十六枝步槍六枝大銅帽火四百四十二萬顆粗細銅管拉火六萬二千枝銅炮炸子二千一百顆炸子引門二千一百副炮子一千一百九十個各種羣子八萬四千八百個各種後膛自來火帶藥槍子一百十六萬八千四百顆洋鉛丸一百七十二萬一千五百粒抬槍抬炮來福槍鳥槍及裝配毛瑟槍哈乞開司槍各種大小鉛丸一百五十九萬粒捲筒鉛子二萬一千二百斤並修成各營抬槍抬炮洋槍洋炮添買車牀鑽牀及各項雜費均歸戶部核銷原有機器局設法擴充製造添造槍械采購應用材料增建廠屋購買機器乃於機器廠後建設洋式大槍廠一所造槍需用銅鐵零件甚多則熟鐵廠必須擴充乃於舊鐵廠之後另建洋式熟鐵大廠一所造槍則用槍子倍多乃於舊槍子廠之東另建洋式槍子廠一所槍子需銅最多乃另建軋銅大廠一所外洋製造廠視鍋爐之大小以定烟筒之高下今造成九十五尺高之烟筒一座七十五尺高之煙筒一座五十五尺高之煙筒一座鐵煙筒一座廠基深掘五尺煙筒基深掘八尺均密釘排樁上築三合土蓋以大石板再砌條石牆腳則扁磚實砌純灌灰漿梁棟皆用外洋木之方而巨者屋柱則生鐵鑄成即機器常年震動不致有鼓裂之虞此外所增建者軍械日富則有存儲之區工匠日多則有休息之所乃建軍火庫二十間工匠房四十間又建水龍房以備不虞泥工廠以資修葺皆不可少之工共增廠四座羣屋八十餘間較原廠擴充三分之二至製造抬槍機器外洋本無抬槍名目故無此專用機器嗣選通曉製造之員與洋商參酌定造抬槍機器並可兼造毛瑟洋槍機器共六十餘種此外地軸皮帶鎚鉗軸枕螺絲各種輪模刀鑽共一百七十餘件已