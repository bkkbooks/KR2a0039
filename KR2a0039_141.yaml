body:
  text: 清史稿卷一百四十一志一百十六兵十二馬政清初沿明制設御馬監康熙間改為上駟院掌御馬以備上乘畜以備御者曰內馬供儀仗者曰仗馬御馬選入以印烙之設蒙古馬醫官療馬病上巡幸及行圍扈從官辨各給官馬以副都統或侍衛為放馬大臣主其事上謁祖陵需馬二萬三千餘匹東西陵需馬四千三百餘匹悉取察哈爾牧廠馬應之逮乾隆時每扈從用馬匹輒二萬餘嘉慶中物力漸耗停木蘭秋獮十二年減額馬之半道光九年如盛京謁陵額馬視乾隆時約略相等計取給廠馬暨各盟長所進蓋二萬六千餘匹云順治十五年定軍馬親王出征馬四百匹郡王三百貝勒二百貝子百五十鎮國公百匹輔國公八十不入八分鎮國公七十輔國公六十五將軍八十副將軍七十護軍統領前鋒統領副都統皆六十其下各有差最少者護軍領催各六匹康熙三十五年敕出征兵一人馬四匹四人為伍一伍主從騎八匹馱器糧用具亦八匹是歲征噶爾丹以兵丁馬瘦褫兵部尚書索諾和職五十一年核定軍中職官馬數大學士尚書左都御史十六匹侍郎以下遞減經略大將軍各二十五匹副將軍以下遞減乾隆十六年八旗牧官馬二萬七千七百餘匹以萬匹於都城外牧養熱河千匹各莊頭二千匹餘者分畀直隸標營圈馬之設始乾隆二十八年從都統舒赫德請也滿洲八旗旗養馬二百匹蒙古八旗旗百匹洎五十九年撤圈分給各兵拴養嘉慶十二年諭成親王永瑆議復圈馬大學士戴衢亨等會議立章程十條圈馬仍舊道光末軍興遂廢後亦不復籌矣同治元年諭曰馬政廢弛積弊已深以致軍馬罷瘠牧廠大臣等應妥實整頓差功罪以挽頽風著為令溯自世祖入關迄於康乾之際盛京吉林黑龍江直隸江南浙江廣東福建湖北四川陝甘山東山西諸省設駐防滿洲營馬凡十萬六千四百餘匹惟福建水師駐防僅數十匹乾隆季年定西藏兵制前藏供差營馬六十匹後藏二十匹舊塘四十三共塘馬二百二十匹新設番塘二十四共番馬九十八匹黑龍江兵向無額馬道光十六年從哈豐阿請始設置之天聰時征服察哈爾其地宜牧馬蕃息順治初大庫口外設種馬廠隸兵部康熙九年改牧廠屬太僕寺分左翼右翼二廠均在口外是時大凌河設牧廠一邊牆設廠二曰商都達布遜諾爾曰達里岡愛隸上駟院尋分設牧廠五曰大凌河牧羣馬營曰養息牧哈達牧羣馬營曰養息所邊外蘇魯克牧牛羊羣及黑牛羣牧營曰養息牧邊外牧羣牛營並在盛京境凡馬牡曰兒牝曰騍不及三歲曰駒及壯擇割其牡曰騸別其騍騸以為羣率騍馬五配兒馬一羣無過四百匹騍馬及羊三年一平羣牛六年騍馬羣三歲以息補耗三馬而取一駒騸馬羣歲耗其十一置牧長牧副牧丁任其事轄以協領翼長總管官兵皆察哈爾蒙古人充之飼秣所需木槽鏇杓每羣各二五年一給之總管三年番代二十四年定牧羣牲畜歲終彙報增減數目視其贏絀以第賞罰二十六年令八旗豢馬春夏驅赴察哈爾牧放曰出青秋冬回圈曰回青四十四年將軍楊福請市馬給兵丁上不許諭曰朝廷屢以太僕寺廠馬並茶馬給各兵丁故無賠馬之苦歷觀宋明議馬政皆無善策牧馬惟口外最善水草肥美不糜餉而孳生甚多如驅入內地牧之即日費萬金不足矣雍正三年定在廠馬以四萬匹為率至乾隆五年足額外溢七千餘匹兩翼牧廠共騍馬百六十羣騸馬十六羣令分在兩翼廠牧放八年敕牧界毋許侵越先是甘涼肅三州及西寧各設馬廠分五羣羣儲牝馬二百匹牡四十尋改甘州廠屬巴里坤二十五年伊犂設孳生馬駝廠畀錫伯察哈爾索倫厄魯特四營牧之三十二年定牧廠官屬所需馬視內地驛傳例按官品給之不得逾額嘉慶中從都統慶溥言撤回厄魯特人牧廠初富俊建言撤大淩河牧廠分歸東三省仁宗嚴諭斥之逮道光七年上經杏山東閲馬廠見河岸馬羣壯整因諭是間牧廠寬闊水草蕃滋馬恃以生息若輕議裁則散之甚易聚之甚難再有率為此請者以違制論咸豐四年科爾沁親王僧格林沁剿捻檄取察哈爾戰馬六百匹不堪乘用奏聞上大怒嚴諭都統慶昀整頓蓋馬政漸衰弛矣光緒九年太僕寺言兩翼騍馬騸馬一百十四羣並孳生馬五羣駝亦五羣較乾隆時羣數大減嗣是穆圖善練兵至黑龍江求馬無良愀然曰地氣其盡乎逮於末葉厲行新法舊時牧政益廢不講豈非時勢使然歟順治初陝西設洮岷河州西寧莊浪甘州茶馬司及開成安定廣寧黑水清平萬安武安七監歲遣御史一人專理之七年喀爾喀額魯特來市馬諭令自章京監察之販客及賈人與不係披甲者概不許購違者鞭一百馬入官蒙古攜馬來京不許商販私買胥役私購者罪之康熙七年裁茶馬御史以馬政歸甘肅巡撫三十四年諭遣師中等往蒙古諸旗購馬歸化城科爾沁各二千匹餘定額有差乾隆十二年禁朝鮮買馬二十五年敕烏魯木齊市易哈薩克馬百三十餘匹歸巴里坤旋以五吉等言選哈薩克所易馬撥往巴里坤遂停購買阿桂言伊犂易來哈薩克馬漸成大羣敕書嘉豫二十八年定江寧浙江福建駐防馬匹出口採買例三十二年以伊犂易哈薩克馬纍積至多擇巴里坤善地牧放尋烏里雅蘇臺馬缺亦以哈薩克馬換易之陝甘營馬例調自伊犂轉補道遠耗時咸豐四年用賡福請由伊犂塔爾巴哈臺隨地變價令各營自購七年並敕山東缺額馬亦就近買補云貢馬昉於國初歸化城土默特二旗每歲四時貢馬百匹順治十三年吐魯番貢三百二十四匹嗣減令貢西馬四匹蒙古馬十匹康熙八年以邊外蒙古貢馬沿途抑買諭嚴禁之三十年諭土謝圖車臣俱留汗號貢白駝一白馬八如初自餘毋以九白進三十五年喀爾喀蒙古獻駝馬多不可計感聖祖破噶爾丹得歸原牧地也四川各土司例貢及折徵馬各營少者一二匹最多十二匹甘肅唐古特七族西喇古兒例貢馬匹各營最多者八十二匹少者遞減至二三匹乾隆元年諭四川土司折價馬每匹納銀十二兩通省營馬改從驛馬例納銀八兩永著為令三十年哈薩克沁德穆爾等獻馬敕其餘馬赴伊犂毋於喀什噶爾諸地貿易尋令沙拉伯爾遊牧之哈薩克與沙拉伯爾一體貢馬嘉慶元年停葉爾羌進馬十六年諭烏里雅蘇臺將軍等貢馬及備用馬選取之又諭伊犂進馬材具佶間足供御用令正備貢各五匹有私帶者以違制論道光二年從那彥成奏青海屬玉樹番族歲納貢馬據丁口數依二十壯丁貢馬一匹例按數遞裁涼州屬番族歲仍納馬一匹初內外蒙部多貴戚每征伐爭先輸馬駝漢唐以來所未有也康熙初察哈爾親王郡王貝勒等聞三藩叛各獻馬匹佐軍道光九年章佳胡圖克圖捐馬百匹收其半二十三年察哈爾蒙旗捐馬千九百七十匹咸豐初哲布尊丹巴等捐馬千匹喀爾喀土謝圖等二千匹錫林果勒盟長等三千匹帝以其多卻之嗣聞已在途中令擇善地牧以待用自是三音諾顏部等以軍事輸馬駝旋捐馬二千一百錫林果勒盟等千二百或留或否七年各部落蒙古王等捐馬六千四百匹詔納之時粵捻擾畿東利於用騎也同治間黑龍江將軍德英於呼倫貝爾各城勸捐軍馬光緒初豐紳托克湍辦海防時昭烏達盟郡王捐馬六百匹因請踵行推廣勸諭以助軍實云驛置肇自前漢歷代因之清沿明制設驛馬為額四萬三千三百有奇各省驛制定於康熙二年凡齎奏官驛馬之數各藩馬五匹公將軍提督督撫三匹總兵巡鹽御史二匹從兵部侍郎石麟請也邊外之驛定於九年凡明詔特遣及理藩院飭赴蒙古諸部宣諭公務得乘邊外驛馬三十五年征噶爾丹設邊外五處驛站用便車糧運輸又從理藩院言自張家口外設蒙古驛其大略也驛傳在僻地者僅供本州縣所需亦曰遞馬額不過數匹衝繁州縣置驛或二或三額馬至六七十匹驛差大者皇華使臣朝貢蕃客餘如大臣入覲蒞官視鹺監稅皆是若齎奏員役呈奉表册其小者也要者如星馳飛遞刻期立赴之屬若閔勞恤死允給郵傳其散者也驛政弊壞張汧嘗極言之越數誅求橫索滋擾蠹國病民勢所必至已定例諸驛額馬每年十踣其三循例買補咸豐中粵氛孔熾湖湘境為賊據劫失驛騎焚毀號舍往往有之各州縣或買馬填補或賃馬應差其有失驛未設即雇夫代馬甘肅舊設馬額六千餘亦以軍興廢弛光緒九年軍務既平驛遞漸簡所留馬視前減三分二而驛政亦無所妨十一年新疆南路設驛是時綜通國驛站歲費約三百萬餘金二十九年劉坤一張之洞條陳新法謂驛站耗財不如仿外人之郵政郵政遞信速驛政文報遲弊由有驛州縣馬缺額又復疲瘦驛丁或倚為利藪因致稽延請設驛政局推行郵政俾驛鋪經費專取給郵資即三百萬歲耗可以省出矣時韙其言已而驛馬漸裁嗣是驛遂廢不用順治初建常盈庫凡車駕司朋樁站銀武庫司馬值太僕寺馬價皆儲之康熙初改常盈庫儲歸戶部乾隆十六年敕雲南營馬除十踣其三按例應賠外其逾額踣斃者免賠樁銀二十七年定給留圈馬乾每匹視緑營稍優異三十八年又令雲南買補馬價每匹減銀三兩初馬乾歲費約四十四萬有奇道光中從載銓等言裁八旗官拴馬半額以節出之費補兵餉焉清初定現任官得養馬餘悉禁之尋許武進士武舉兵丁捕役養馬康熙元年禁民人養馬有私販馬匹為人首告者馬給首告之人其主有官職豫重罰平民荷校鞭責十年令民人仍得養馬二十六年定出廠馬駝或踐食田禾或縱逸侵擾兵鞭責官罰俸有差其兵丁強人代牧乃勒索擾纍者兵發刑部官降調凡牧馬斃則驗其皮踣斃例須賠抵有一九一七之罰應取駒千匹者以百匹為一分百匹者以十匹為一分雍正十三年定馬駝出廠時毛齒皆有册回日核驗如疲瘠十不及三免議否則兵鞭責官罰俸有差乾隆初禁牧丁等盜馬私售及與人乘峻其科罰十六年嚴牧馬減克寸料草之罪二十八年官馬出青每百匹準倒十匹逾額勒其買補嘉慶十一年行圍木蘭查獲私販馬匹諸犯重懲之因諭我朝講武時巡扈從均給官馬大臣祿入較優給馬較少官員兵丁視差務之繁簡定馬數之多寡少者一二匹多至五匹事竣原馬還官如踣斃呈驗耳尾仍按價折交收放時命王大臣督察乃官兵等竟私鬻官單察哈爾官兵收馬利其折銀易於買補積弊日深大妨馬政自後設有賣單及折收者一體科罰私買之馬販從嚴問擬大臣等其妥議定章以聞凡營馬或走脫竊失責令賠補謂之賠樁年遞減十之一至十年悉免之應敵傷損者免賠騎至三年踣斃者亦免其餘一年或二三年內踣斃賠額視其省而異以十金為最多同治二年定古北口盤獲私馬逾三十匹者送京不及三十匹賞與兵丁著為令
