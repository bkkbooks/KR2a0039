body:
  text: 清史稿卷一百四十二志一百十七刑法一中國自書契以來以禮教治天下勞之來之而政出焉匡之直之而刑生焉政也刑也凡皆以維持禮教於勿替故尚書曰明于五刑以弼五教又曰士制百姓于刑之中以教祗德古先哲王其制刑之精義如此周衰禮廢典籍散失魏李悝著法經六篇流衍至於漢初蕭何加為九章歷代頗有增損分合至唐永徽律出始集其成雖沿宋迄元明而面目一變然科條所布於扶翼世教之意未嘗不兢兢焉君子上下數千年間觀其教化之昏明與夫刑罰之中不中而盛衰治亂之故綦可覩矣有清起自遼左不三四十年混一區宇聖祖沖年踐阼與天下休養六十餘稔寬恤之詔歲不絕書高宗運際昌明一代法制多所裁定仁宗以降事多因循未遑改作綜其終始列朝刑政雖不盡清明然如明代之廠衞廷杖專意戮辱士大夫無有也治獄者雖不盡仁恕然如漢唐之張湯趙禹周興來俊臣輩深文慘刻無有也德宗末葉庚子拳匪之變創巨痛深朝野上下爭言變法於是新律萌芽迨宣統遜位而中國數千年相傳之刑典俱廢是故論有清一代之刑法亦古今絕續之交也爰備志之俾後有考焉清太祖嗣服之初始定國政禁悖亂戢盜賊法制以立太宗繼武於天聰七年遣國舅阿什達爾漢等往外藩蒙古諸國宣布欽定法令時所謂盛京定例是也嗣復陸續著有治罪條文然皆因時立制不盡垂諸久遠世祖順治元年攝政睿親王入關定亂六月即令問刑衙門准依明律治罪八月刑科給事中孫襄陳刑法四事一曰定刑書刑之有律猶物之有規矩準繩也今法司所遵及故明律令科條繁簡情法輕重當稽往憲合時宜斟酌損益刊定成書布告中外俾知畫一遵守庶奸慝不形風俗移易疏上攝政王諭令法司會同廷臣詳繹明律參酌時宜集議允當以便裁定成書頒行天下十月世祖入京即皇帝位刑部左侍郎党崇雅奏在外官吏乘茲新制未定不無憑臆舞文之弊並乞暫用明律候國制畫一永垂令甲得旨在外仍照明律行如有恣意輕重等弊指參重處二年命修律官參稽滿漢條例分輕重等差從刑科都給事中李士焜請也三年五月大清律成世祖御製序文曰朕惟太祖太宗創業東方民淳法簡大辟之外惟有鞭笞朕仰荷天休撫臨中夏人民既衆情偽多端每遇奏讞輕重出入頗煩擬議律例未定有司無所禀承爰敕法司官廣集廷議詳譯明律參以國制增損劑量期於平允書成奏進朕再三覆閱仍命內院諸臣校訂妥確乃允刊布名曰大清律集解附例爾內外有司官吏敬此成憲勿得任意低昂務使百官萬民畏名義而重犯法冀幾刑措之風以昭我祖宗好生之德子孫臣民其世世守之十三年復頒滿文大清律康熙九年聖祖命大學士管理刑部尚書事對喀納等將律文復行校正十八年特諭刑部定律之外所有條例應去應存著九卿詹事科道會同詳加酌定確議具奏嗣經九卿等遵旨會同更改條例別自為書名為現行則例二十八年臺臣盛符升以律例須歸一貫乞重加考定以垂法守特交九卿議准將現行則例附入大清律條隨命大學士圖納張玉書等為總裁諸臣以律文昉自唐律辭簡義賅易致舛訛於每篇正文後增用總注疏解律義次第酌定名例四十六條三十四年先行繕呈三十六年發回刑部命將奏聞後更改之處補入至四十六年六月輯進四十二本留覽未發雍正元年巡視東城御史湯之旭奏律例最關緊要今六部見行則例或有從重改輕從輕擬重有先行而今停事同而法異者未經畫一乞簡諳練律例大臣專掌律例館總裁將康熙六十一年以前之例並大清會典逐條互訂庶免參差世宗允之命大學士朱軾等為總裁諭令於應增應減之處再行詳加分晰作速修完三年書成五年頒布蓋明律以名例居首其次則分隸於六部合計三十門都凡四百六十條順治初釐定律書將公式門之信牌移入職制漏洩軍情移入軍政於公式門刪漏用鈔印於倉庫門刪鈔法於詐偽門刪偽造寶鈔後又於名例增入邊遠充軍一條雍正三年之律其刪除者名例律之吏卒犯死罪殺害軍人在京犯罪軍民共三條職制門選用軍職官吏給由二條婚姻門之蒙古色目人婚姻一條宮衞門之懸帶關防牌面一條其併入者名例之邊遠充軍併於充軍地方公式門之毀棄制書印信併二條為一課程門之鹽法併十二條為一宮衞門之衝突儀仗併三條為一郵驛門之遞送公文併三條為一其改易者名例之軍官軍人免發遣更為犯罪免發遣軍官有犯更為軍籍有犯儀制門之收藏禁書及私習天文生節為收藏禁書其增入者名例之天文生有犯充軍地方二條總計名例律四十六條吏律曰職制十四條曰公式十四條戶律曰戶役十五條曰田宅十一條曰婚姻十七條曰倉庫二十三條曰課程八條曰市廛五條禮律曰祭祀六條曰儀制二十條兵律曰宮衞十六條曰軍政二十一條曰關津七條曰牧十一條曰郵驛十六條刑律曰賊盜二十八條曰人命二十條曰鬬毆二十二條曰罵詈八條曰訴訟十二條曰受贓十一條曰詐偽十一條曰犯姦十條曰雜犯十一條曰捕亡八條曰斷獄二十九條工律曰營造九條曰河防四條蓋仍明律三十門而總為四百三十六條律首六贓圖五刑圖獄具圖喪服圖大都沿明之舊納贖諸例圖徒限內老疾收贖圖誣輕為重收贖圖銀數皆從現制其律文及律注頗有增損改易律後總注則康熙年間所創造律末並附比引律三十條此其大較也自時厥後雖屢經纂修然僅續增附律之條例而律文未之或改惟乾隆五年館修奏准芟除總注並補入過失殺傷收贖一圖而已例文自康熙初年僅存三百二十一條末年增一百一十五條雍正三年分別訂定曰原例累朝舊例凡三百二十一條曰增例康熙間現行例凡二百九十條曰欽定例上諭及臣工條奏凡二百有四條總計八百十有五條其立法之善者如犯罪存留養親推及孀婦獨子若毆兄致死幷得准其承祀恤孤嫠且教孝也犯死罪非常赦所不原察有祖父子孫陣亡准其優免一次勸忠也枉法贓有祿人八十兩無祿人及不枉法贓有祿人一百二十兩俱實絞嚴貪墨之誅也衙蠹索詐驗贓加等治罪懲胥役所以保良懦也強盜分別法無可貸情有可原殲渠魁赦脅從之義也復讐以國法得伸與否為斷杜兇殘之路也凡此諸端或隱合古義或矯正前失皆良法也而要皆定制於康雍時又國初以來凡纂修律例類必欽命二三大臣為總裁特開專館維時各部院則例陸續成書苟與刑律相涉館員俱一一釐正故鮮乖牾自乾隆元年刑部奏准三年修例一次十一年內閣等衙門議改五年一修由是刑部專司其事不復簡派總裁律例館亦遂附屬於刑曹與他部往往不相關會高宗臨御六十年性矜明察每閱讞牘必求其情罪曲當以萬變不齊之情欲御以萬變不齊之例故乾隆一朝纂修八九次刪原例增例諸名目而改變舊例及因案增設者為獨多嘉慶以降按期開館沿道光咸豐以迄同治而條例乃增至一千八百九十有二蓋清代定例一如宋時之編敕有例不用律律既多成虛文而例遂愈滋繁碎其間前後牴觸或律外加重或因例破律或一事設一例或一省一地方專一例甚且因此例而生彼例不惟與他部則例參差即一例分載各門者亦不無歧異輾轉糾紛易滋高下雍正十三年世宗遺詔有曰國家刑罰禁令之設所以詰奸除暴懲貪黜邪以端風俗以肅官方者也然寬嚴之用又必因乎其時從前朕見人情淺薄官吏營私相習成風罔知省改不得不懲治整理以戒將來今人心共知警惕矣凡各衙門條例有前嚴而改寬者此乃從前部臣定議未協朕與廷臣悉心酌核而後更定自可垂諸永久若前寬而改嚴者此乃整飭人心風俗之計原欲暫行於一時俟諸弊革除仍可酌復舊章此朕本意也向後遇事斟酌如有應從舊例者仍照舊例行惜後世議法諸臣未盡明世輕世重之故每屆修例第將歷奉諭旨及議准臣工條奏節次編入從未統合全書逐條釐正穆宗號稱中興母后柄政削平髮捻回疆之亂百端待理尚於同治九年纂修一次德宗幼沖繼統未遑興作兼之時勢多故章程叢積刑部既憚其繁猥不敢議修羣臣亦未有言及者因循久之逮光緒二十六年聯軍入京兩宮西狩憂時之士咸謂非取法歐美不足以圖強於是條陳時事者頗稍稍議及刑律二十八年直隸總督袁世凱兩江總督劉坤一湖廣總督張之洞會保刑部左侍郎沈家本出使美國大臣伍廷芳修訂法律兼取中西旨如所請並諭將一切現行律例按照通商交涉情形參酌各國法律妥為擬議務期中外通行有裨治理自此而議律者乃羣措意於領事裁判權是年刑部亦奏請開館修例三十一年先將例內今昔情形不同及例文無關引用或兩例重複或舊例停止者奏准刪除三百四十四條三十三年更命侍郎俞廉三與沈家本俱充修訂法律大臣沈家本等乃徵集館員分科纂輯並延聘東西各國之博士律師藉備顧問其前數年編纂未竣之舊律亦特設編案處歸併分修十二月遵旨議定滿漢通行刑律又刪併舊例四十九條宣統元年全書纂成繕進諭交憲政編查館核議二年覆奏訂定名為現行刑律時官制改變立憲詔下東西洋學說朋興律雖仍舊分三十門而芟削六部之目其因時事推移及新章遞嬗而刪者如名例之犯罪免發遣軍籍有犯流囚家屬流犯在道會赦天文生有犯工樂戶及婦人犯罪充軍地方職制之大臣專擅選官文官不許封公侯官員赴任過限無故不朝參公座姦黨公式之照刷文卷磨勘卷宗封掌印信戶役之丁夫差遣不平隱蔽差役逃避差役田宅之任所置買田宅婚姻之同姓為婚良賤為婚姻課程之監臨勢要中鹽阻壞鹽法私礬舶商匿貨禮制之朝見留難宮衞之內府工作人匠替役軍政之邊境申索軍需公侯私役官軍夜禁關津之私越冒度關津詐冒給路引遞送逃軍妻女出城私出外境及違禁下海私役弓兵牧之公使人等索借馬匹郵驛之占宿驛舍上房賊盜之起除刺字鬬毆之良賤相毆訴訟之軍民約會詞訟誣告充軍及遷徙受贓之私受公侯財物犯姦之良賤相姦雜犯之搬做雜劇捕亡之徒流人逃斷獄之徒囚不應役營造之有司官吏不住公廨是也其緣政體及刑制遷變而改者如名例之化外人有犯改為蒙古及入國籍人有犯徒流遷徙地方改為五徒三流二遣地方婚姻之娶樂人為妻妾改娶娼妓為妻人命之殺子孫及奴婢圖賴人節去及奴婢字鬬毆之奴婢毆家長改為雇工人毆家長罵詈之奴婢罵家長改為雇工人罵家長犯姦之奴婢姦家長妻改為雇工人姦家長妻是也綜計全律仍存三百八十有九條而比引律則刪存及半依類散入各門不列比附之目舊例除刪併外合續纂之新例統一千六十六條其督捕則例一書順治朝命臣工纂進原為旗下逃奴而設康熙十五年重加酌定乾隆以後續有增入計條文一百一十亦經分別去留附入刑律而全書悉廢律首仍載服制全圖以重禮教是年冬頒行焉若蒙古治罪各條載諸理藩院則例及西寧番子治罪條例別行諸岷洮等處者以其習俗既殊刑制亦異未敢輕議更張新律則光緒三十二年法律館撰上刑民訴訟律酌取英美陪審制度各督撫多議其窒礙遂寢三十三年復先後奏上新刑律草案總則十七章曰法例曰不論罪曰未遂罪曰累犯罪曰俱發罪曰共犯罪曰刑名曰宥恕減輕曰自首減免曰酌量減輕曰加減例曰緩刑曰暫釋曰恩赦曰時效曰時期計算曰文例分則三十六章曰關於帝室之罪曰關於內亂之罪曰關於國交之罪曰關於外患之罪曰關於漏洩機務之罪曰關於瀆職之罪曰關於妨害公務之罪曰關於選舉之罪曰關於騷擾之罪曰關於逮捕監禁者脫逃之罪曰關於藏匿罪人及湮滅證據之罪曰關於偽證及誣告之罪曰關於放火決水及水利之罪曰關於危險物之罪曰關於往來通信之罪曰關於秩序之罪曰關於偽造貨幣之罪曰關於偽造文書及印文之罪曰關於偽造度量衡之罪曰關於祀典及墳墓之罪曰關於鴉片煙之罪曰關於賭博彩票之罪曰關於姦非及重婚之罪曰關於飲料水之罪曰關於衞生之罪曰關於殺傷之罪曰關於墮胎之罪曰關於遺棄之罪曰關於逮捕監禁之罪曰關於略誘及和誘之罪曰關於安全信用名譽及秘密之罪曰關於竊盜及強盜之罪曰關於詐欺取財之罪曰關於侵占之罪曰關於贓物之罪曰關於毀棄損壞之罪兩編合共三百八十七條經憲政編查館奏交部院及疆臣覈議簽駁者夥宣統元年沈家本等彙集各說復奏進修正草案時江蘇提學使勞乃宣上書憲政編查館論之曰法律大臣會同法部奏進修改刑律義關倫常諸條未依舊律修入但於附則稱中國宗教遵孔以綱常禮教為重如律中十惡親屬容隱干名犯義存留養親及親屬相姦相盜相毆發犯姦各條未便蔑棄中國人有犯以上各罪應仍依舊律別輯單行法以昭懲創竊維修訂新律本為籌備立憲統一法權凡中國人及在中國居住之外國人皆應服從同一法律是此法律本當以治中國人為主今乃依舊律別輯中國人單行法是視此新刑律專為外國人設矣本末倒置莫此為甚草案案語謂修訂刑律所以收回領事裁判權刑律內有一二條為外國人所不遵奉即無收回裁判權之實故所修刑律專以摹仿外國為事此說實不盡然泰西各國凡外國人居其國中無不服從其國法律不得執本國無此律以相爭亦不得恃本國有此律以相抗今中國修訂刑律乃謂為收回領事裁判權必盡舍固有之禮教風俗一一摹仿外國則同乎此國者彼國有違言同乎彼國者此國又相反是必窮之道也總之一國之律必與各國之律相同然後乃能令國內居住之外國人遵奉萬萬無此理亦萬萬無此事以此為收回領事裁判權之策是終古無收回之望也且夫國之有刑所以弼教一國之民有不遵禮教者以刑齊之所謂禮防未然刑禁已然相輔而行不可缺一者也故各省簽駁草案每以維持風化立論而案語乃指為渾道德法律為一其論無夫姦曰國家立法期於令行禁止有法而不能行轉使民玩法而肆無忌憚和姦之事幾於禁之無可禁誅之不勝誅即刑章具在亦祗具文必教育普及家庭嚴正輿論之力盛廉恥之心生然後淫靡之風可少衰又曰防遏此等醜行不在法律而在教化即列為專條亦無實際其立論在離法律與道德教化而二之視法律為全無關於道德教化故一意摹仿外國而於舊律義關倫常諸條棄之如遺焉用此法為乎謂宜將舊律有關禮教倫紀各節逐一修入正文並擬補干名犯義犯罪存留養親親屬相姦相毆無夫姦子孫違犯教令各條法律館爭之明年資政院開憲政編查館奏交院議將總則通過時勞乃宣充議員與同院內閣學士陳寶琛等於無夫姦及違犯教令二條尤力持不少怠而分則遂未議決餘如民律商律刑事訴訟律民事訴訟律國籍法俱編纂告竣未經核議惟法院編制法違警律禁煙條例均經宣統二年頒布與現行刑律僅行之一年而遜位之詔下矣
