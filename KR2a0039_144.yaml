body:
  text: 清史稿卷一百四十四志一百十九刑法三太祖始創八旗每旗設總管大臣一佐管大臣二又置理政聽訟大臣五人號為議政五大臣扎爾固齊十人號為理事十大臣凡聽斷之事先經扎爾固齊十人審問然後言於五臣五臣再加審問然後言於諸貝勒衆議既定猶恐冤抑親加鞫問天命元年諭貝勒大臣曰國人有事當訴於公所毋得訴於諸臣之家茲播告國中自貝勒大臣以下有罪當靜聽公斷執拗不服者加等治罪凡事俱五日一聽斷於公所其私訴於家不執送而私斷者治罪不貸十一年太宗以議政五大臣理事十大臣不皆分授或即以總管佐管兼之於是集諸貝勒定議裁撤每旗由佐管大臣審斷詞訟不令出兵駐防其每旗別設調遣大臣二員遇有駐防調遣所屬詞訟仍令審理天聰七年設刑部承政參政啟心郎等官聽訟始有專責世祖入主中夏仍明舊制凡訴訟在外由州縣層遞至於督撫在內歸總於三法司然明制三法司刑部受天下刑名都察院糾察大理寺駮正清則外省刑案統由刑部核覆不會法者院寺無由過問應會法者亦由刑部主稿在京訟獄無論奏咨俱由刑部審理而部權特重刑部初設十四司雍正元年添置現審左右二司審理八旗命盜及各衙門欽發事件後復改併定為十八清吏司曰直隸曰奉天曰江蘇曰安徽曰江西曰福建曰浙江曰湖廣曰山東曰山西曰陝西曰四川曰廣東曰廣西曰雲南曰貴州凡各省刑名咨揭到部各司具稿呈堂以定准駮吉林黑龍江附諸奉天甘肅新疆附諸陝西京曹各署關涉文件亦分隸於十七司現審則輪流籤分順治十年設督捕衙門置侍郎滿漢各一員其屬有前司後司初隸兵部專理緝捕逃旗事宜康熙三十八年裁撤將前後司改隸刑部嗣復併為督捕一司不掌外省刑名亦不分現審刑部收受訟案已結未結每月彙奏設督催所而督以例限審結尋常徒流軍遣等罪按季彙題案係奏交情雖輕專案奏結死罪既取供大理寺委寺丞或評事都察院委御史赴本司會審謂之會小法獄成呈堂都察院左都御史或左副都御史大理寺卿或少卿挈同屬員赴刑部會審謂之會大法如有翻異發司覆審否則會稿分別題奏罪干立決旨下本司派員監刑監候則入朝審各省戶婚田土及笞杖輕罪由州縣完結例稱自理詞訟每月設立循環簿申送督撫司道查考巡道巡歷所至提簿查核如有未完勒限催審徒以上解府道臬司審轉徒罪由督撫彙案咨結有關人命及流以上專咨由部彙題死罪係謀反大逆惡逆不道劫獄反獄戕官並洋盜會匪強盜拒殺官差罪干淩遲斬梟者專摺具奏交部速議殺一家二命之案交部速題其餘斬絞俱專本具題分送揭帖於法司科道內閣票擬交三法司核議如情罪不符及引律錯誤者或駮令覆審或徑行改正合則如擬核定議上立決命下釘封飛遞各州縣正印官或佐貳會同武職行刑監候則入秋審朝審原於明天順三年令每歲霜降後但有該決重囚三法司會同公侯伯從實審錄秋審亦原於明之奏決單冬至前會審決之順治元年刑部左侍郎党崇雅奏言舊制凡刑獄重犯自大逆大盜決不待時外餘俱監候處決在京有熱審朝審之例每至霜降後方請旨處決在外直省亦有三司秋審之例未嘗一麗死刑輒棄於市望照例區別以昭欽恤此有清言秋朝審之始嗣後逐漸舉行而法益加密初制分情實緩決矜疑然疑獄不經見雍正以後加入留養承祀區為五類截止日期雲南貴州四川廣東廣西以年前封印日福建以正月三十日奉天吉林黑龍江陝西甘肅湖北湖南浙江江西安徽江蘇以月初十日河南山東山西以三月初十日直隸以三月三十日然遇情重之案雖後期有聲明趕入秋審者刑部各司自歲首將各省截止期前題准之案分類編冊發交司員看詳初看藍筆句改覆看用紫輪遞至秋審處坐辦律例館提調墨書粘籤一一詳加斟酌而後呈堂核閱朝審本刑部問擬之案刑部自定實緩秋審則直省各督撫於應勘時將人犯提解省城率同在省司道公同會勘定擬具題刑部俟定限五月中旬以前各省後尾到齊查閱外勘與部擬不符者別列一冊始則司議提調坐辦主之繼則堂議六堂主之司議各員與焉議定刑部將原案及法司督撫各勘語刊刷招冊送九卿詹事科道各一分八月內定期在金水橋西會同詳核先日朝審三法司九卿詹事科道入座刑部將監內應死人犯提至當堂命吏朗誦罪狀及定擬實緩節略事畢回禁次日秋審憑招冊審核如俱無異議會同將原擬陸續具題有異前期簽商若各執不相下持異之人奏上類由刑部回奏聽裁苟攻及原審則徑行扣除再訊二百餘年來刑部歷辦秋朝審句稽講貫備極周密長官每以此校司員之優劣究之人命至重死者不可復生其所矜慎尤在實緩乾隆以前各司隨意定擬每不畫一三十二年始酌定比對條款四十則刊分各司並頒諸各省以為勘擬之準繩四十九年復行增輯嗣刑部侍郎阮葵生別輯秋讞志略而後規矩略備中外言秋勘者依之並比附歷年成案故秋朝審會議其持異特奏者每不勝焉秋審本上入緩決者得旨後刑部將戲殺誤殺擅殺之犯奏減杖一百流三千里竊贓滿貫三犯竊贓至五十兩以上之犯奏減雲貴兩廣極邊煙瘴充軍其餘仍舊監固俟秋審三次後查辦間有初次入緩後復改實者權操自上非常例也入可矜者或減流或減徒留養承祀者將該犯枷號兩月責四十板釋放案係鬬殺追銀二十兩給死者家屬養贍情實則大別有三服制官犯常犯是也本下內閣隨命欽天監分期擇日句到刑部按期進呈黃冊至日素服御殿大學士三法司侍上秉硃筆或命大學士按單予句服制冊大都殺傷期功尊長之案既以情輕而改監候類不句決情實二次大學士會同刑部奏請改緩官犯則情重者刑部從嚴聲未容倖免輕則一律免句十次改緩常犯之入情實固罪無可逭者其或一線可原刑部粘籤聲類多邀恩不句十次亦改緩向例句決重囚刑科三覆奏自乾隆十四年簡去二覆第於句到前五日覆奏一次句到時將原本進呈覆閱一俟批發在京例由刑科給事中刑部侍郎各一人赴西市監視官犯無論句否俱綁赴行刑場候決在外則刑部各司將句單連同榜示釘封送兵部發驛文到之日行刑如恭逢慶典或國家有故則下旨停句順治十三年諭刑部朝審秋決係刑獄重典朕必詳閱招案始末情形允協令死者無冤今決期伊邇朝審甫竣招冊繁多尚未及詳細簡閱驟行正法朕心不忍今年姑著暫停秋決昭朕矜恤至意自是列朝於秋讞俱勤慎校閱康熙二十二年聖袓御懋勤殿召大學士學士等入酌定在京秋審情實重犯聖袓取罪案逐一親閱再三詳審其斷無可恕者始定情實因諭曰人命事關重大故召爾等共相商酌情有可原即開生路雍正十一年世宗御洞明堂閱秋審情實招冊諭刑部曰諸臣所進招冊俱經細加斟酌擬定情實但此內有一綫可生之機爾等亦當陳奏在前日定擬情實自是執法在此刻句到商酌又當原情斷不可因前奏難更遂爾隱默也高宗尤垂意刑名秋審冊上每干飭責乾隆三十一年湖南官犯饒佺以其迴護己過予句迨閱浙省招冊知府高象震亦以承審迴護原題僅擬軍臺効力急諭湖南巡撫將饒佺暫停處決令刑部查明兩案情節不同始行明諭處分其慎重讞典如此仁宗亦嫻習法律嘉慶七年御史廣興會議秋審奏請將鬬殺擬緩之廣東姚得輝改入情實援引乾隆十八年一命必有一抵之旨仁宗謂一命一抵原指械鬬等案而言至尋常鬬毆各斃各命自當酌情理之平分別實緩若拘泥一命必有一抵之語則是秋讞囚徒凡殺傷斃命之案將盡行問擬情實可不必有緩決一項有是理乎命仍照原擬入緩其剖析法意致為明允自後宣宗文宗遵循前軌罕可紀述穆宗德宗兩經垂簾每逢句到命大學士一人捧單入內閣恭代後遂沿為故事而前行之秋審條款因光緒季年死刑遞有減降法律館重加釐定奏頒內外焉熱審之制順治初賡續舉行康熙十年定每年小滿後十日起至立秋前一日止非實犯死罪及軍流俱量予減等四十三年諭刑部停止雍正初復行乾隆以後第准免笞杖則遞行八折決放枷號漸釋餘不之及且惟京師行之外省笞杖自理無從考核具文而已列朝無寒審而有軍流遣犯隆冬停遣之例未起解者十月至正月終及六月俱停遣若已至中途至十一月初一日准停倘抵配不遠並發往東南省分人犯有情願前進者一體起解又有停審之例每年正月六月十月及元旦令節七日上元令節三日端午中秋重陽各一日萬壽聖節七日各壇廟祭享齋戒以及忌辰素服等日並封印日期四月初八日每月初一初二日皆不理刑名然中外問刑衙門於正月六月十月及封印日期每月初一二等日不盡如例行也其農忙停審則自四月初一日至七月三十日一應戶婚田土細故不准受理刑事不在此限又有停刑之例每年正月六月及冬至以前十日夏至以前五日一應立決人犯及秋朝審處決重囚皆停止行刑凡審級直省以州縣正印官為初審不服控府控道控司控院越訴者笞其有冤抑赴都察院通政司或步軍統領衙門呈訴者名曰京控登聞鼓順治初立諸都察院十三年改設右長安門外每日科道官一員輪值後移入通政司別置鼓廳其投廳擊鼓或遇乘輿出郊迎駕申訴者名曰叩閽從前有擅入午門長安門堂子跪告及打長安門內正陽門外石獅鳴寃者嚴禁始絕即迎車駕而衝突儀仗亦罪至充軍京控及叩閽之案或發回該省督撫或奏交刑部提訊如情罪重大以及事涉各省大吏抑經言官督撫彈劾往往欽命大臣蒞審發回及駮審之案責成督撫率同司道親鞫不准復發原問官名為欽部事件文武官犯罪題參革職道府副將以上遴委道員審理同知遊擊以下遴委知府審理巡按御史順治初猶常設四年從大理寺卿王永吉奏差官往直省卹刑然皆不久停罷外省刑名遂總匯於按察使司而督撫受成焉京師笞杖及無關罪名詞訟內城由步軍統領外城由五城巡城御史完結徒以上送部重則奏交如非常大獄或命王大臣大學士九卿會訊自順治迄乾隆間有御廷親鞫者律稱八議者犯罪實封奏聞請旨不許擅自句問在京大小官員亦如之若宗室有犯宗人府會刑部審理覺羅刑部會宗人府審理所犯笞杖枷號照例折罰責打犯徒宗人府拘禁軍流鎖禁俱照旗人折枷日期滿日開釋屢犯軍流發盛京吉林黑龍江等處圈禁死刑宗人府進黃冊閹寺犯輕罪內務府慎刑司訊決徒以上亦送部八旗地畝之訟屬諸戶部現審處刑事統歸刑部清初有都統會審之制有高牆拘禁之條至乾隆時俱廢旗營駐防省分額設理事同知旗人獄訟同知會同州縣審理熱河都統衙門特設理刑司刑部派員聽訟三年一任同治三年以吉林獄訟繁多詔依熱河設立刑司例令刑部揀派滿漢郎中員外主事各一員分別掌印主稿統歸將軍管轄嗣吉林建省裁撤而熱河如故蒙古刑獄內外扎薩克王公台吉塔布囊及協理台吉等承審康熙三十七年曾遣內地官員教導蒙古王等聽斷盜案後不常設沿邊與民人交涉案件會同地方官審理死罪由盟長核報理藩院會同三法司奏當在京犯斬絞刑部審訖會理藩院法司亦如之盛京刑部掌讞盛京旗人及邊外蒙古之獄秋審會同四部侍郎奉天府尹酌定實緩彙題蓋皆特別之制凡檢驗以宋宋慈所撰之洗冤錄為準刑部題定驗屍圖格頒行各省人命呈報到官地方正印官隨帶刑書仵作立即親往相驗仵作據傷喝報部位之分寸行兇之器物傷痕之長短淺深一一填入屍圖若屍親控告傷痕互異許再行覆檢不得違例三檢如自縊溺水事主被殺等案屍屬呈請免驗者聽京師內城正身旗人及香山等處各營房命案由刑部當月司員往驗街道及外城人命無論旗民歸五城兵馬司指揮相驗檢驗不以實者有刑凡訊囚用杖每日不得過三十熱審得用掌嘴跪鍊等刑強盜人命酌用夾棍婦人指通不得過二次其餘一切非刑有禁斷罪必取輸服供詞律雖有衆證明白即同獄成之文然非共犯有逃亡并罪在軍流以下不輕用也凡審限直省尋常命案限六閱月盜劫及情重命案欽部事件並搶奪掘墳一切雜案俱定限四閱月其限六月者州縣三月解府州府州一月解司司一月解督撫督撫一月咨題其限四月者州縣兩月解府州府州二十日解司司二十日解督撫督撫二十日咨題如案內正犯及要證未獲或在監患病准其展限或扣限若隔屬提人及行查者以人文到日起限限滿不結督撫咨部即於限滿之日起算再限二三四月各級分限如前如仍遲逾照例參處按察司自理事件限一月完結州縣自理事件限二十日審結上司批發事件限一月審報刑部現審笞杖限十日遣軍流徒二十日命盜等案應會三法司者三十日每月奏報聲明曾否逾限如有患病及查傳等情亦得依例扣展速議速題均限五日覆死罪會核自科鈔到部之日立決限七十日監候限八十日會同題覆院寺各分限八日由咨改題之案展限十日係清文加譯漢十日或二十日逾限附參盜賊逾月不獲捕役汛兵予笞官罰俸吏兵兩部處分則例尚有疏防及初二三四參之分命案兇犯在逃承緝接緝亦按限開參然例雖嚴而巧於規避者蓋自若也凡解犯有三一定案時之解審徒犯解至府州轉報軍流遣及死罪自府州遞省逐級訊問無異督撫然後咨題一秋審時之解勘死罪非立決發回本州縣監禁逮秋審徑行解司審勘官犯自定案即拘禁司監待決常犯緩決者二次秋審即不復解其直省各邊地離督撫駐處窵遠有由該管巡道審勘加結轉報者非通例也一發遣時之解配徒囚問發隔縣軍流起解省分預行咨明應發省分督撫查照道里表酌量州縣大小遠近在配軍流多寡先期定地飭知入境首站州縣隨到隨發遣犯解至例定地方安插犯籍州縣僉差名曰長解沿途州縣派撥兵役護送名為短解罪囚視罪名輕重定用鐵鎖杻鐐道數若中途不覺失囚訊明有無賄縱分別治罪隔屬關提及發交各地方官管束者視此為差京師現審徒犯發順天府充徒流囚由刑部定地劄行順天府起送五軍咨由兵部定地提發外遣亦咨兵部差役起解綜計訴訟所歷自始審迄終結其程序各有定規毋或踰越迨光緒變法三十二年改刑部為法部統一司法行政改大理寺為大理院配置總檢察廳專司審判於是法部不掌現審各省刑名畫歸大理院覆判並不會都察院而三法司之制廢題本改為摺奏內閣無所事事秋朝審專屬法部其例緩者隨案聲明不更加勘而九卿科道會審之制廢京師暨各省設高等審檢廳都城省會及商埠各設地方及初級審檢廳改按察使為提法司三十二年法部奏定各級廳試辦章程宣統二年法律館奏頒法院編制法由初級起訴之案不服可控由地方而至高等由地方起訴之案不服可控由高等而至大理院名為四級三審從前審級審限解審解勘之制州縣行之而不行於法院審判分民事刑事民律艱於成書所據者第舊律戶役田宅錢債婚姻各條而法未備司法事務有年度判斷有評議刑事有檢察官蒞審人命由檢察官相驗法院行之而不能行於州縣刑訴制度蓋雜糅矣然爾時所以急於改革者亦曰取法東西列強藉以收回領事裁判權也考領事裁判行諸上海會審公堂其源肇自咸豐朝與英法等國締結通商條約約載中外商民交涉詞訟各赴被告所屬之國官員處控告各按本國律例審斷嗣遇他國締約俱援利益均霑之說羣相仿效同治八年定有洋涇浜設官章程遴委同知一員會同各國領事審理華洋訴訟其外人應否科刑讞員例不過問華人第限於錢債鬬毆竊盜等罪在枷杖以下准其決責後各領擴張權限公堂有逕定監禁數年者外人不受中國之刑章而華人反就外國之裁判清季士大夫習知國際法者每咎彼時議約諸臣不明外情致使法權坐失光緒庚子以後各國重立和約我國齗齗爭令撤銷而各使藉口中國法制未善靳不之許迨爭之既亟始聲明異日如審判改良允將領事裁判權廢棄載在約章存為左券故二十八年設立法律館有按照交涉情形參酌各國法律務期中外通行之旨蓋亦欲修明法律俾外國就範也夫外交視國勢之強弱權利既失豈口舌所能爭故終日言變法逮至國本已傷而收效卒鮮豈法制之咎與然其中有變之稍善而未竟其功者曰監獄有政體所關而未之變者曰赦典監獄與刑制相消息從前監羈罪犯並無已決未決之分其囚禁在獄大都未決犯為多既定罪則笞杖折責釋放徒流軍遣即日發配久禁者斬絞監候而已州縣監獄以吏目典史為管獄官知州知縣為有獄官司監則設按司獄各監有內監以禁死囚有外監以禁徒流以下婦人別置一室曰女監徒以上鎖收杖以下散禁囚犯日給倉米一升寒給絮衣一件鎖杻常洗滌蓆薦常鋪置夏備涼漿冬設煖牀疾病給醫藥然外省監獄多湫隘故例有輕罪人犯及干連證佐准取保候審之文無如州縣懼其延誤每有班館差帶諸名目胥役藉端虐詐弊竇叢滋雖屢經內外臣工參奏不能革也刑部有南北兩監額設司獄八員提牢二員掌管獄卒稽查罪囚輪流分值每月派御史查監有瘐斃者亦報御史相驗年終並由部彙奏一次防閑致為周備自光緒三十二年審判畫歸大理院院設看守所以羈犯罪之待訊者各級審檢廳亦然於是法部犴狴空虛別設已決監於外城以容徒流之工作並令各省設置新監其制大都採自日本監房有定式工廠有定程法律館特派員赴東調查又開監獄學堂以備京外新監之用然斯時新法初行措置未備外省又限於財力未能徧設也赦典有恩赦恩旨之別歷朝登極升祔冊立皇后皇上五旬以上萬壽皇太后六旬以上萬壽及武功克捷之類例有恩赦其詔書內開一官吏軍民人等有犯除謀反大逆子孫謀殺祖父母父母內亂妻妾殺夫奴婢殺家長殺一家非死罪三人採生折割人謀殺故殺真正人命蠱毒魘魅毒藥殺人強盜妖言十惡等真正死罪不赦外軍務獲罪隱匿逃人及侵貪入己亦不赦外其餘已發覺未發覺已結未結者咸赦除之若尋常萬壽及喜慶等事則傳旨行赦恩赦死罪以下俱免恩旨則死罪已下遞減詔書既頒刑部檢查成案分別准免不准免開單奏定名為恩赦條款恩旨則分別准減不准減名為減等條款部設減等處專司核駮其巡幸所經赦及一方及水旱兵災清理庶獄者則視詔旨從事焉明制徒流已至配不復援赦清自康熙九年准在配徒犯會赦放免乾隆二年恩詔軍流在配三年安靜悔過情願回籍查明准釋迨嘉慶二十五年始將到配未及三年人犯一體查辦尤為曠典昔人有言赦者小人之幸君子之不幸意第謂赦恩之不可濫耳若夫非常慶典特頒汗號使之蕩滌瑕穢洒然自新未始非仁政之一端有清一代赦典屢頒然條款頗嚴毋虞濫及且行慶施惠王者馭世之大權非苟然也故光緒三十四年宣統登極猶循例大赦云
