body:
  text: 清史稿卷一百四十五志一百二十藝文一清起東陲太宗設文館命達海等翻譯經史復改國史祕書弘文三院編纂國史收藏書籍文教始興世祖入定中原命馮銓等議修明史復詔求遺書聖祖繼統詔舉博學鴻儒修經史纂圖書稽古右文潤色鴻業海內彬彬向風焉高宗繼試鴻詞博采遺籍特命輯修四庫全書以皇子永瑢大學士于敏中等為總裁紀昀陸錫熊等為總纂與其事者三百餘人皆極一時之選歷二十年始告成全書三萬六千册繕寫七部分藏大內文淵閣圓明園文源閣盛京文溯閣熱河文津閣揚州文匯閣鎮江文宗閣杭州文瀾閣命紀昀等撰全書總目著録三千四百五十八種存目六千七百八十八種都一萬二百四十六種復命于敏中王際華擷其精華別為四庫薈要凡一萬二千册分繕二部藏之大內摛藻堂及御園味腴書屋又別輯永樂大典三百八十五種交武英殿以聚珍版印行時大典儲翰林院者尚存二萬四百七十三卷合九千八百八十一册其宋元精槧多儲內府天祿琳琅備詳宮史經籍既盛學術斯昌文治之隆漢唐以來所未逮也各省先後進書約及萬種阮元既補四庫未收書四百五十四種復刊經解一千四百十二卷王先謙又刊續經解一千三百十五卷而各省督撫廣修方志郡邑典章粲然大備其後曾國藩倡設金陵蘇州揚州杭州武昌官書局張之洞設廣雅書局延聘儒雅校刊羣籍私家亦輯刻日多叢書之富曩代莫京及至晚近歐風東漸競譯西書道藝並重而敦煌寫經殷墟龜甲奇書祕寶考古所資其有裨於學術者尤多實集古今未有之盛焉藝文舊例胥列古籍茲仿明史為志凡所著録斷自清代唯清人輯古佚書甚夥不可略之則附載各類之後經部十類一曰易類二曰書類三曰詩類四曰禮類五曰樂類六曰春秋類七曰孝經類八曰四書類九曰經總義類十曰小學類易類易經通注九卷順治十三年傅以漸等奉敕撰日講易經解義十八卷康熙二十二年牛鈕等奉敕撰周易折中二十二卷康熙五十四年李光地等奉敕撰周易述義十卷乾隆二十年傅恆等奉敕撰易圖解一卷周易補注十一卷簡親王德沛撰易翼二卷孫承澤撰讀易大旨五卷孫奇逢撰周易稗疏四卷考異一卷周易內傳六卷發例一卷周易大象解一卷周易外傳七卷王夫之撰易學象數論六卷黃宗羲撰周易象辭二十一卷尋門餘論二卷圖書辨惑一卷黃宗炎撰讀易筆記一卷張履祥撰周易説略四卷張爾岐撰易酌十四卷刁包撰易聞十二卷歸起先撰田間易學十二卷錢澄之撰大易則通十五卷閏一卷易史一卷胡世安撰周易疏略四卷張沐撰易學闡十卷黃與堅撰讀易緒言二卷謝文洊撰易經衷論二卷張英撰讀易日鈔六卷張烈撰周易通論四卷周易觀彖大指二卷周易觀彖十二卷李光地撰周易淺述八卷陳夢雷撰周易定本一卷邵嗣堯撰易經識解五卷徐秉義撰易經筮貞四卷趙世對撰周易明善録二卷徐繼發撰易原就正十二卷包儀撰周易通十卷周易辨正二十四卷浦龍淵撰合訂刪補大易集義粹言八十卷納喇性德撰周易筮述八卷王弘撰撰周易應氏集解十三卷應撝謙撰仲氏易三十卷推易始末四卷春秋占筮書三卷易小帖五卷太極圖説遺議一卷河圖洛書原舛編一卷毛奇齡撰喬氏易俟十八卷喬萊撰大易通解十卷魏彤撰周易本義蘊四卷周易蘊義圖考二卷薑兆錫撰周易傳注七卷周易筮考一卷李塨撰學易初津二卷易翼宗六卷易翼説八卷晏斯盛撰周易劄記二卷楊名時撰易經詳説不分卷冉覲祖撰易經辨疑七卷張問達撰周易傳義合訂十二卷朱軾撰易宮三十六卷讀易管窺五卷吳隆元撰讀易觀象惺惺録十六卷讀易觀象圖説二卷太極圖説二卷周易原始一卷天水答問一卷羲皇易象二卷羲皇易象新補二卷李南暉撰孔門易緒十六卷張德純撰易圖明辨十卷胡渭撰身易實義五卷沈廷勱撰先天易貫五卷劉元龍撰易互六卷楊陸榮撰周易玩辭集解十卷易説一卷查慎行撰易説六卷惠士奇撰周易函書約存十八卷約注十八卷別集十六卷胡煦撰易箋八卷陳法撰周易觀象補義略不分卷諸錦撰索易臆説二卷吳啓昆撰周易孔義集説二十卷沈起元撰陸堂易學十卷陸奎勳撰易經揆一十一卷易學啓蒙補二卷梁錫璵撰易經詮義十五卷易經如話十五卷汪紱撰周易本義爻徵二卷吳日慎撰周易圖説正編六卷萬年茂撰易翼述信十二卷王又朴撰周易原始六卷范咸撰周易淺釋四卷潘思矩撰易學大象要參四卷林贊龍撰周易解翼十卷上官章撰東易問八卷魏樞撰周易洗心九卷任啓運撰空山易解四卷牛運震撰周易剩義二卷童能靈撰周易彙解衷翼十五卷許體元撰易象援古不分卷申爾宣撰豐川易説十卷王心敬撰周易粹義五卷薛雪撰周易圖説六卷蔡新撰讀易別録三卷全祖望撰周易經言拾遺十四卷徐文靖撰易象大意存解一卷任陳晉撰周易集解纂疏三十六卷李道平撰周易圖書質疑二十四卷趙繼序撰易象通義六卷秦篤輝撰易深八卷許伯政撰易説存悔二卷汪憲撰卦氣解一卷八卦觀象解二卷彖傳論一卷彖象論一卷繫辭傳論二卷莊存與撰易例舉要五卷十家易象集説九十卷吳鼎撰周易大衍辨一卷吳鼐撰周易井觀十二卷周大樞撰周易注疏校正一卷盧文弨撰易守三十二卷葉佩蓀撰周易二閭記三卷周易小義二卷茹敦和撰周易輯要五卷朱瓚撰易卦私箋二卷蔣衡撰易經明洛義六卷孫慎行撰易卦圖説一卷崔述撰周易章句證異十一卷翟均廉撰周易考占一卷金榜撰易經貫一二十二卷金誠撰周易辨畫四十卷連斗山撰大易擇言三十六卷程氏易通十四卷易説辨正四卷程廷祚撰周易懸象八卷黃元御撰周易本義注六