body:
  text: 清史稿卷一百四十九志一百二十四交通一有清之世歐洲諸國以製器相競致強富路船郵電因利乘權道光朝五口通商各國踵迹至中外棣通外舟侵入我江海置郵通商地大北大東兩公司海底電線貫太平洋大西洋而來亦駢集我海上駸駸有返客為主之勢焉李鴻章郭嵩燾諸臣以國權商務戎機所關甚巨抗疏論列其始也阻於衆咻其繼也卒排羣議而次第建設之開我國數千年未有之奇局於時鴻章總督直隸領北洋通商大臣忍詬負重卒觀厥成長江招商輪船局始於同治十三年逮光緒三年有唐山胥各莊鐵路之築四年設郵政局五年設電線於大沽北塘海口炮臺西達天津自時厥後歲展月拓分途並進輪船則有官輪商輪之別鐵路則有官辦商辦之別電線則有部辦省辦之別郵政則有總局分局之別宣統初郵傳部計路之通車者逾萬里線之通電者九萬餘里局之通郵者四千餘處歲之所入路約銀二千萬電約一千萬郵六百餘萬而歲支外所盈無幾無乃分其利者衆歟昔者車行日不過百里舟則視風勢水流為遲疾廷寄軍書驛人介馬俟盡日夕行不過六七百里已耳今則京漢之車津滬之舟計程各二三千里而遙不出三日郵之附舟車以達者如之若以電線達者數萬里外瞬息立至民情慮始難觀成易故船電路皆有商辦名顧言利之臣胥欲籠為國有以加諸電商者加之川漢自辦之路操之過激商股抗議者輒罪之淫刑而逞以犯衆怒黨人乘之國本遂搖孔子論治以書同文車同軌行同倫為極盛清之天下可謂同文同軌矣惟行殊焉而理亂頓異則知伏羲氏所謂通天下之志者有形下之器尤貴有形上之道以維繫之未可重器而遺道也撰交通志鐵路鐵路創始於英吉利各國踵而行之同治季年海防議起直督李鴻章數為執政者陳鐵路之利不果行光緒初英人擅築上海鐵路達吳淞命鴻章禁止因偕江督沈葆楨檄盛宣懷等與英人議卒以銀二十八萬兩購回廢置不用識者惜之三年有商人築唐山至胥各莊鐵路八十里是為中國自築鐵路之始六年劉銘傳入覲疏言自古敵國外患未有如今日之多且強也一國有事各國環窺而俄地橫亙東西北與我壤界交錯尤為心腹之憂俄自歐洲起造鐵路漸近浩罕又將由海參崴開路以達琿春此時之持滿不發者以鐵路未成故也不出十年禍且不測日本一彈丸國耳師西人之長技恃有鐵路亦遇事與我為難舍此不圖自強恐無及矣自強之道練兵造器固宜次第舉行然其機括則在於急造鐵路鐵路之利於漕務賑務商務礦務釐捐行旅者不可殫述而於用兵尤不可緩中國幅員遼闊北邊綿亙萬里毗連俄界通商各海口又與各國共之畫疆而守則防不勝防馳逐往來則鞭長莫及惟鐵路一開則東西南北呼吸相通視敵所趨相機策應雖萬里之遙數日可至百萬之衆一呼而集且兵合則強分則弱以中國十八省計之兵非不多餉非不足然此疆彼界各具一心遇有兵端自顧不暇徵餉調兵無力承應若鐵路告成則聲勢聯絡血脈貫通裁兵節餉併成徑旅防邊防海轉運鎗炮朝發夕至駐防之兵即可為遊擊之旅十八省合為一氣一兵可抵十數兵之用將來兵權餉權俱在朝廷內重外輕不為疆臣所牽制矣方今國計絀於邊防民生困於釐卡各國通商爭奪利權財賦日竭後患方殷如有鐵路收費足以養兵則釐卡可以酌裁裕國便民無踰於此今欲乘時立辦莫如籌借洋債中國要路有二南路一由清江經山東一由漢口經河南俱達京師北路由京師東通盛京西達甘肅若未能同時併舉可先修清江至京一路與本年擬修之電線相為表𩹉事下直督李鴻章江督劉坤一議覆鴻章言鐵路之設關於國計軍政京畿民生轉運郵政礦務招商輪船行旅者其利甚溥而借用洋債外人於鐵路把持侵占與妨害國用諸端亦不可不防坤一以妨礙民生釐稅為言學士張家驤言興修鐵路有三大弊復下其疏於鴻章鴻章力主銘傳言會臺官合疏力爭侍講張楷言九不利御史洪良品言五害語尤激切以廷臣諫止者多詔罷其議嗣是無復有言之者矣十一年既與法國議和朝廷念海防不可弛詔各臣工切籌善後李鴻章言法事起後借洋債纍二千萬十年分起籌還更無力籌水師之歲需開源之道當效西法採煤鐵造鐵路興商政礦藏固為美富鐵路實有遠利但招商集股難遽踴躍官又無可資助若輕息假洋發為之雖各國所恆有乃羣情所駭詫非聖明主持於上誰敢破衆議以冒不韙大學士左宗棠條上七事一言宜仿造鐵路外國以經商為本因商造路因路治兵轉運靈通無往不利其未建以前阻撓固甚一經告成民因而富國因而強人物因而倍盛有利無害固有明徵電報輪船中國所無一旦有之則為不可少之物倘鐵路造成其利尤溥清江至通州宜先設立鐵路以通南北之樞一便於轉漕而商務必有起色一便於徵調而額兵即可多裁且為費僅數百萬由官招商股試辦即可舉行且與地方民生並無妨礙逮辦有成效再添設分支至推廣西北一路尤為日後必然之勢疏下王大臣議雖善其言而不能用也是年冬鴻章復言陶城臨清間二百餘里運道淤墊請試辦鐵道為南北大道樞紐上用漕督嵩駿等言格不行初法越事起以運輸不便軍事幾敗事平執政者始知鐵路關係軍事至要十三年春海軍衙門王大臣奕等言鐵路之議歷有年所毀譽紛紜莫衷一是自經前歲戰事始悉局外空談與局中實際判然兩途臣奕總理事務見聞較切臣曾紀澤出使八年親見西洋各國輪車鐵路之益現公同酌核調兵運械貴在便捷自當擇要而圖據天津司道營員等稟直隸海岸綿長防守不易轉運尤艱請將開平至閻莊商辦鐵路南接大沽北岸八十餘里先行接造再由大沽至天津百餘里逐漸興修津沽鐵路告成續辦開平迤北至山海關則提督周盛波所部萬人馳騁援應不啻數萬人之用此項海防要工集資不易應以官發興辦調兵勇協同工作以期速成如蒙俞允即派員督率開平公司經理從之明年路成總理衙門奏言新造津沽鐵路自天津府城經塘沽蘆台以至閻莊長一百七十五里其自閻莊至灤州之唐山長八十里為各商舊造鐵路新舊鐵路首尾銜接輪車通行快利為輪船所不及通塞之權操之自我斷無利器假人之慮由此經營推廣一遇徵兵運械挽粟飛芻咄嗟可致商民貿遷無遠弗屆榛莽之地可變通衢洵為今日自強之急務會粵商陳承德請接造天津至通州鐵路略言現造鐵路其所入不敷養路之用如接造此路既可抽還造路借本並可報效海軍經費直督李鴻章以聞已如所請矣於時舉朝駭然尚書翁同和奎潤閣學文治學士徐會灃御史余聯沅洪良品屠仁守交章諫阻其大端不外資敵擾民失業三者亦有言宜於邊地及設於德州濟寧以通河運者命俱下海軍衙門尋議上略言原奏所慮各節一在資敵不知敵至而車已收回豈有資敵之慮一在擾民建設鐵路首在繞避民間廬舍丘墓其萬難繞避者亦給重價諭令遷徙可無擾民之事一在失業鐵路興而商業盛謀生之途益廣更鮮失業之虞津通之路非為富國亦非利商外助海軍相輔之需內備徵兵入衛之用乃議者不察底蘊不相匡助或竟道聽途説或竟憑空結撰連章論列上瀆天聽方今環球諸國各治甲兵其往也非干羽所能格其來也非牛餼所能退全視中華之強弱為相安相擾之樞機臣等創修鐵路本意不在效外洋之到處皆設而專主利於用兵不僅修津通之路而志期應援全局誠能於江南趙北關東隴西各設重兵各安鐵路則軍行萬里無胼胝之勞糧運千倉有瞬息之效零星隊伍可撤可併浮濫餉乾或裁或節此外如海防河運裨益實多而通貨物銷礦産利行旅便工役速郵遞利之所興難以枚舉而事屬創辦不厭求詳請下沿江沿海各將軍督撫各抒所見遂如所請命各詳議以聞臺灣巡撫劉銘傳議由津沽造路至京師護蘇撫黃彭年議先辦邊防漕路緩辦腹地及沿江沿海各省而試行於津通粵督張之洞請緩辦津通改建腹省幹路疏言今日鐵路之用以開通土貨為急進口外貨歲逾出口土貨二千萬兩若聽其耗漏以後萬不可支惟有設法多出土貨多銷土貨以濟之有鐵路則機器可入笨貨可出山鄉邊郡之産悉可致諸江岸海壖流行於九洲四瀛之外矣而沿江沿海遼東三省秦隴沿邊強鄰窺伺防不勝防若無鐵路應援赴敵以靜待動安得無數良將精兵利炮巨餉而守之宜先擇四達之衢首建幹路為經營全局之計至津通鐵路則關係甚巨不便尤多設此路創造之時稍有紛擾則習常蹈故者益將執為口實視為畏途以後他處續造集股之官商必裹足疑沮之愚民必有辭則鐵路之功終無由成而鐵路之效終無由見矣翁同和請試行於邊地以便運兵徐會灃等請改設於德州濟寧以便運漕均擬緩辦津通為另闢一路之計但邊地偏遠無裨全局效亦難見且非商賈輻輳之所鐵路費無所出不足以自存德濟一路黃河岸闊沙鬆工費太巨臣以為宜自京城外之盧溝橋起經河南達於湖北漢口鎮豫鄂居天下之腹中原綰轂胥出其塗鐵路取道宜自保定正定磁州歷彰衛懷等府北岸在清化鎮以南南岸在滎澤口以上擇黃河上遊灘窄岸堅經流不改之處作橋以渡河則三晉之轍下於井陘關隴之驂交於洛口西北聲息刻期可通自河以南則由鄭許信陽驛路以抵漢口東引淮吳南通湘蜀語其便利約有數事內處腹地不近海口無引敵之慮利一南北三千餘里原野廣漠編戶散處不似近郊之稠密一屋一墳易於勘避利二幹路袤遠廠盛站多經路生理既繁緯路枝流必旺執鞭之徒列肆之賈生計甚寬舍舊謀新決無失所利三以一路控八九省之衝人貨輻輳貿易必旺將來汴洛荊襄濟東淮泗經緯縱橫各省旁通四達不悖豈惟有養路之資費實可裕無窮之餉源利四近畿有事三楚舊部兩淮精兵電檄一傳不崇朝而雲集都下或內地偶有土寇竊發發兵征討旬日立可蕩平徵兵之道莫此為便利五中國礦利惟煤鐵最有把握太行以北煤鐵最旺而最精而質最重路最艱既有鐵路則輦機器以開採用西法以煎鎔礦産日多大開三晉之利源永塞中華之漏卮利六海上用兵首慮梗漕東南漕米百餘萬石由鎮江輪船溯江而上三日而抵漢口又二日而達京城由盧溝橋運赴京倉道里與通縣相等足以備河海之不虞闢飛挽之坦道而又省挑河剝運之浮糜較之東道王家營一路礙於黃河下流者辦理轉有把握利七若慮費巨難成則分北京至正定為首段次至黃河北岸又次至信陽州為二三段次至漢口為末段每里不過五六千金每段不過四百萬內外合計四段之工須八年造成發亦八年分籌中國之大每年籌二百萬之發似尚不至無策籌款之法除由鐵路公司照常招股外應酌擇各省口岸較盛鹽課較旺之地由藩運兩司關道轉發印票股單設法勸集鐵料運自晉省置爐鍊冶以供取用庶施工有序而藏富在民奏上仍下海軍衙門尋復議上各國興辦鐵路以幹路為經以枝路為緯有事則以路徵兵無事則以商養路就五大洲言之宜於西洋宜於東洋豈其獨不宜於中國就中國言之或云宜於邊防或云宜於腹地豈其獨不宜於臣衙門所奏準之津通津通畿東南一正幹也水路受沿海七省之委輸陸路通關東三省之命脈豫鄂則畿西南一正幹也控荊襄達關隴以一道扼七八省之衝初意徐議中原而先以津沽便海防繼以津通擴商利區區二百里其關係與豫鄂之千里略同今張之洞亦設為津通五宜審之説其中所慮各節前奏固已剖析無遺惟事關創始擇善而從津通鐵路應即暫從緩辦而盧漢必以漢口至信陽為首段層遞而北並改為盧溝漢口兩路分投試辦綜計需銀三千萬兩以商股官帑洋債三者為集發之法議上詔旨允之初鴻章倡津通鐵路之議舉朝以為不可鴻章持之甚力之洞特創盧漢幹路之説調停其間而醇親王奕復贊之於內其事始定然其時廷臣尚多不以盧漢造路為然但無敢昌言者故通政黃體芳謂鐵路不可借洋債以自纍而臺臣亦有言黃河橋工難成者以執政者堅持舉辦久之浮議始息鴻章與之洞書謂局外議論紛歧宜速開辦免生枝節之洞深然之未幾之洞總督湖廣之洞既移鄂益鋭意興辦盧漢鐵路其所經畫曰儲材宜急勘路宜緩興工宜遲竣工宜速以商股難恃請歲撥帑金二百萬兩以備路用上如所請十六年以東三省邊事亟從海軍衙門王大臣及直督李鴻章言命移盧漢路款先辦關東鐵路擬由林西造幹路出山海關至瀋陽達吉林另由瀋陽造枝路以至牛莊營口計二千三百二十三里年撥銀二百萬兩為關東造路專發命李鴻章為督辦大臣裕祿為會辦大臣而盧漢路工因之延緩蓋自光緒初年內外臣工往往條陳鐵路當國者亦欲試行以開風氣而疆吏畏難因循顧慮清議莫敢為天下先盧漢鐵路已定議矣尋復中輟至是年國內鐵路僅有唐山至閻莊八十五里閻莊至林西鎮二百三十五里又基隆至淡水六十里而已二十一年命張之洞遴保人才及籌議清江至京路事之洞言鐵路以盧漢為要江寧蘇杭次之清江築路非宜上韙其言時之洞方督兩江特命移鄂綜其事以盧漢路長發巨諭有招股千萬者許設公司自辦粵人許應鏘方培垚等咸言集資如額遵旨承辦直督王文韶與之洞言承辦各商舉不足恃請以津海關道盛宣懷為督辦允之命以四品京堂督路事宣懷條上四事一請特設鐵路總公司撥官發募商股借洋債先辦盧漢次第及於蘇滬粵漢上如所請是年設總公司於上海而盧漢之始基以立自中日戰後外人窺伺中國益亟侵略之策以攬辦鐵路為先俄索接造西伯利亞幹路橫貫黑吉兩省修枝路以達旅順大連灣英則請修五路一蘇杭甬自蘇州經杭州以達寧波一廣九自廣州以達九龍一津鎮自天津以達鎮江一浦信自浦口以達信陽一自山西河南以達長江法自越南築路以達雲南省自龍州築路以達鎮南關德踞膠州灣築路以達濟南葡據澳門築路以達廣州日本擅於新民廳築路達奉天更獲有奉天至安東鐵道之權此各國以鐵路侵略中國之大略也先是俄人陰結朝鮮窺奉天建言者請急建關內外路以相鈐制乃命順天府尹胡燏棻督辦津榆路事後以續造吉林一路款絀中輟二十四年俄事急燏棻請息借英款為之疏言關外一路初擬徑達吉林以無發又落後著逮歸併津盧俄即起而爭執近允其由俄邊直接大連灣奉吉兩省東北之利盡為所占計惟有由大凌河趕造至新民廳鐵路以備聯絡瀋陽之路並可兼護蒙古熱河礦務一面由營口至廣寧庶中國海關不致為俄侵占尚可保全奉省西北之利現東三省全局已在俄人掌握幸留此一線之路堪以設法抵禦若坐失機宜後悔何及從之初英人圖粵路甚亟王文韶張之洞盛宣懷合疏言粵漢南幹路原擬稍緩續籌無如時局日亟刻不及待羣雄環伺輒以交涉細故兵輪互相馳騁海洋通塞靡有定期今海軍既無力能興設有外變隔若異域必內地造有鐵路方可聯絡貫通廣東財賦之區南戒山河未可遐棄此粵漢南路當與北路並舉者也又疏言德國無理肇釁占踞膠墨要害並獲承辦山東鐵路俄已造路於黑龍江吉林為通奉天旅順之謀法已造路於廣西以為割滇之計獨英人窺伺最久尚無所得今年春英商屢來攬辦粵路堅持未允其所擬急行者在趕營中國中部或廣東建築軌道蓋英所欲者一借發一修路一擬索香港對岸之深水埠其為覬覦鐵路無疑現在德已踞膠俄已留旅法已窺瓊英有圖扼長江吳淞之謀是中國各海口幾盡為外國所占僅有內地尚可南北往來若粵漢一線再假手英人將來俄路南引英軌北趨惟有盧漢一路局蹐其中何能展布甚或為英俄之路所併惟有趕將粵漢一路占定自辦尚足補救萬一嘉納之初粵漢路議由鄂入贛達粵嗣病其迂遠改道湘之郴永衡長至是定議三省紳商自辦總公司綜其綱領蓋各省幹路以關東肇其端盧漢粵漢次之此外則建天津至盧溝橋之津盧路正定至太原之正太路鄭州東至開封西歷滎陽汜水達洛陽之汴洛路廣州至九龍之廣九路上海至江寧之滬寧路萍鄉至昭山之萍昭路道口至清化鎮之道清路京師至張家口之京張路天津至浦口之津浦路吉林長春之吉長路齊齊哈爾卜魁城至昂昂溪之齊昂路此屬於官辦者也若潮汕新寧川漢同蒲洛潼西潼廣廈歸包歸新桂全滇桂滇蜀騰越以及浙蘇皖贛滇蜀諸省咸請自修幹枝等路悉如所請至是建造鐵路之説風行全國自朝廷以逮士庶咸以鐵路為當務之急趨嚮既定籌款與辦法最關緊要籌發有官帑有洋債有民股修路有官辦有商辦有官督商辦自劉銘傳倡借債築路之議為衆論所尼借款修路遂為當時所諱言故盧漢建議之初猶以部帑為請未敢昌言借洋債也借洋債自津盧關內外鐵路始逮盛宣懷督辦路事首以三路分三國借發之策進曰盧漢借比發滬寧借英發粵漢借美發上俞其請由是正太則借俄發汴洛則借比發廣九蘇杭甬則借英發津浦則借英德發貸之者大率資金什豫其九息金二什而取其一以路為質或併及附路之産物付息還本贖路咸有定程而還本贖路未及其時且勿許購料勘路興工多假外人為之故外人多以發為餌冀獲承辦之利盧漢路近三千里費逾四千萬黃河橋工糜發尤巨官帑僅資開辦而已借發始擬美以所望奢改與比議英德法諸國接踵而至卒借比款一百十二兆五十萬佛郎比小國饒鋼鐵羔天工事於中國無大志三十一年續借一百二十五萬佛郎逾年路成北端直抵京師因易名京漢京漢之枝路曰正太曰汴洛正太借款始二十三年俄璞科第與晉官紳議定而中止二十八年盛宣懷與議借款四千萬佛郎約成而俄人挨士巴尼忽索太原至榆次至成都至太谷至西安石莊至東光微水橫澗四岔道及同蒲諸路均格部議而岔道卒如所請三十三年秋工竣自容閎倡辦津鎮盛宣懷恐奪盧漢之利因議辦汴洛開濟以相鈐制汴洛借款始於二十五年至二十八年而約成借比款二千五百萬佛郎比人盧法爾主工事嗣續借千六百萬佛郎三十四年路成津沽用款百三十萬官帑商股兼備以洋債補其不足津盧假英金四十萬鎊關內外路借英金二百三十萬鎊本由商辦逮胡燏棻為督辦始官為之拳匪亂起關外路為俄踞關內路為英踞命袁世凱等與英使立約收回英人遂攫有百里內不準他人承修之權三十一年全路告竣是為京奉路道清路為英商福公司所造長九十里利微費巨初英商索澤襄懷浦俱不獲遂以借款收回道清為言內外臣工咸持不可終借英金六十一萬四千六百鎊贖回津浦路因津鎮之議不果行改議北起天津南訖浦口借英德款五百萬鎊尚書呂海寰主其事宣統三年工竣其促成各省鐵路自辦與拒絶債之機者則滬寧蘇杭甬粵漢借款所致也滬寧築路倡於盛宣懷南北洋大臣據以入告得請方從事淞滬工作而英聲請承辦宣懷與訂草約二十九年正約成借英金三百二十五萬鎊五十年為期商部以借款幾倍於原估之數詰之而工未及半款已告罄復議續借百萬鎊蘇人羣起責難並疏聞於上命唐紹儀督辦滬寧京漢罷鐵路總公司紹儀既任事徇英工程司之請復議售小票六十五萬鎊疏言盛宣懷移交合同文卷及購地工程帳册支款浮濫當經駁回滬寧合同喫虧比京漢幹路為甚其最棘手者在設立總管理處華員二人洋員三人每會議時彼衆我寡已占低著議者有添舉監督之説豈知權在總管理處合同早已訂明雖有監督實不濟事其尤棘手者財政之權操於洋人掌握用款雖由華員簽字而司帳者為洋員也分段司帳其支發權仍在工程司也購料事宜向由怡和洋行經手行車總管材料總管皆洋員專司也本彼衆我寡之因以成事事掣肘之果挽回補救之術惟有改訂總管理處章程加派華員司帳並分任各總管現已分別辦理至路款不敷尚擬續售小票六十五萬鎊以資接濟下所司議行方紹儀擬續借英款也侍郎吳郁生上疏力爭略言滬寧鐵路由英國銀公司要求承造盛宣懷與之訂立合同以長不逾六百里之路工借款至三百五十萬鎊之巨估價多必至浮濫自合同宣布後遠近駭然上年奉嚴旨改派唐紹儀妥籌辦理近聞滬寧工程司來京又以工款不敷有議續售小票七十萬鎊之説此項路工即就業經借定之三百五十萬鎊儘數開支每里合銀三萬兩以上視他路浮逾兩倍公家受虧已多今若再借巨債是唐紹儀接辦以來於盛宣懷失算之處並無補救之方請飭按照合同嚴核用款一面自行籌款接濟不可再令銀公司出售小票致以九折虛數受人盤剝疏上下所司知之而滬寧鐵路終以本息過巨收贖無期也蘇杭甬鐵路自二十四年許英商承辦是年盛宣懷與訂草約大要悉本滬寧約成而英人置之三十一年浙路自辦之局定御史朱錫恩請廢前約上命宣懷偕浙撫主其事英人恃有前約堅欲承辦往復辨難要挾久之不決侍郎汪大燮與議分修路借款為二事浙人以路股集有成數一意拒款聞之大譁詆大燮甚力大燮旋使英以梁敦彥繼之浙推孫廷翰蘇推王同愈等議於京終以成約難廢由部借英款貸之兩省而事息粵漢借用美款倡於盛宣懷駐美使伍廷芳與合興公司議借美金四千萬期以五年工竣美以畢來斯司路事起粵之三水築路十五里糜款逾二百萬畢來斯歿工事亦輟而美股多售之比人鄂督張之洞以比已承修盧漢粵漢再假之比兩路相合非國之利力倡廢美約之議湘人助之上用御史黃昌年言命之洞妥籌辦理之洞主廢約益力宣懷不願陰撓其事詔宣懷不得干預之洞復屬駐美使梁誠與合興公司議年餘始定借英金百十萬鎊贖回焉方之洞議借英款也英人乘間請改訂廣九路約廣九為英人請辦五路之一二十五年簽訂草約懸而未定者也三十年滬寧約成英人索議未果逮蘇杭甬事起相持方急部許英人先議廣九以緩其事而正約以成至是議粵漢借款英人復索合辦廣九全路粵督持不可旋索以粵鹽及路質借款粵人亦不之許終假英金百五十萬鎊而約成之洞既借英款贖美約一時議者以為以英易美其害相埒相與詬病昌年復言路權至重贖款難擔亟宜興修嚴杜干涉詔以借款修路流弊滋多應由三省集股興修以保利權自明詔嚴禁借債修路而商部復有限制借款之條各省人士亦以外人謀我之亟咸謀鐵路自辦以杜外患鑒外債受虧之巨爭欲招集股款自保路權此由官辦改為商辦之所由來也商辦鐵路始於唐山至閻莊更自天津大沽以達林西鎮皆開平公司為之嗣是武舉李福明請修京至西沽路粵人許應鏘等請辦盧漢路俱不獲自此無復有言商辦者二十九年粵人張煜南請設公司承辦潮汕鐵路既得請而川漢繼之川督錫良以英美商人競涎川路而美商班士復索灌縣富順枝路奏準由川人籌款自辦明年贛人以李有棻總理江西鐵路以南潯為幹路第一段三十一年編修陳榮昌等以法人已修滇越路滇省內地應自行推廣以杜口實請辦滇蜀鐵路滇督丁振鐸據以入告報可黔撫林紹年言黔路不通滇亦少利因併及黔榮昌嗣請展修騰越以編修吳琨總理其事皖以李經方為總理經始於蕪湖以期北接盧漢南通贛浙閩以陳寶琛為總理築路廈門浙以湯壽潛為總理幹路一自杭達蘇一歷富陽達江西枝路則南道江山以通閩西道湖長以通皖新寧廣廈鐵路粵人陳宜禧張振勳經辦西潼路近聯汴洛遠達甘新為西北緯幹之樞紐陝撫曹鴻勛奏準三十二年蘇人以王清穆為總理規畫江蘇全路江南自上海經松江以達浙江北自海州入徐以達豫桂以于式枚為總理擬自桂林築路至全州以達湘經梧州以達粵粵漢自美約廢後三省公設路局於鄂籌款築路各自為之不相攙越先幹後枝以為要約湘以袁樹勛為總理粵人內閣侍讀梁慶桂道員黎國廉與粵督岑春煊爭粵路商辦被劾奪官上命往查旋起二人原官路由官督商辦旬日集股數達四千萬元以鄭官應為總理當其時以鐵路為救時要圖凡有奏請立豫俞允請辦幹枝各路經緯相屬幾遍全國其籌款於招集民股外大率不外開辦米穀鹽茶房屋彩券土藥等捐及銅元餘利隨糧認股數者而程功之速事權之一首推新寧陳宜禧者籍新寧羔天鐵路學衆相推戴始終其事故二年而路竣次則潮汕雖勘路招股事變屢起而卒底於成總理張煜南奬擢三品京堂此外以粵漢路粵人集股為最多傾軋亦最劇總理屢易路工停滯川省以租股為大宗數達千餘萬元浙閩皖贛亦均次第興工其餘各省大都集股無多有名鮮實西潼一路以商股難成奏歸官辦其見端也三十四年上用蘇撫陳啓泰言以大學士張之洞督辦粵漢冀以統一事權亦無所濟是年詔以鐵路為交通大政紳商集股各設公司奏辦有年多無起色命所司遴員分往查勘尋奏上勘路查款辦法時川漢已派員往查其餘以洛潼西潼同蒲江蘇浙江最要為一起粵漢潮汕新寧惠潮廣西福建次要為一起滇蜀安徽江西再次為一起擬先查洛潼西潼同蒲三路報聞宣統二年川路司出納者虧倒路股百九十餘萬川人宦京者甘大璋等聞於上查明飭追徒託空言而已三年給事中石長信言我國興造各省鐵路事前並未謀定後動今宜明定幹路枝路辦法使天下咸知國家鐵路政策之所在此後有所遵循不再如從前之羣議龐雜茫無主宰當此時事日亟邊防最要國家若不趕將東西南北諸大幹路迅速次第興築則強鄰四逼無所措手人民不足責其如大局何此中利害間不容髮惟有仰懇乾綱獨斷不再遊移在德奧法日本墨西哥諸國其鐵路均歸國有而我分枝路與民已為優異況幹枝相輔上下相維於理尚順於事稍易此路政之大綱亟宜明定辦法者一也又東南幹路以粵漢議辦為最早光緒二十六年督辦大臣會同湖廣總督等奏準借美款興造當時訂定合同後業已築成粵省之佛山三水鐵路一百餘里廣州至英德幹路亦已購地開工乃三十年春間張之洞忽信王先謙等之言不惜巨資經向美公司廢約堅持固執卒至停罷廢約後原欲集鄂湘粵三省之力以成此路詎悠忽數年粵則有款而紳士爭權辦路甚少湘鄂則集款無著徒糜局費張之洞翻然悔悟不護前非仍擬借款築造乃向英德法三國銀行訂定借款草合同簽押後正欲入告因美國援案插入暫緩陳奏張之洞旋即病故此事遂一擱至今計自廢約以來已閲七載倘若無此翻覆粵漢早已告成亦如京漢已屆十年還本之期矣至川漢集款皆屬取諸田間其款確有一千餘萬紳士樹黨各懷意見上年始由宜昌開工至歸州以東此五百里工程尚不及十分之二三不知何年方能告竣而施典章擅將川路租股之所入倒帳竟至數百萬之多此又川粵漢幹路之潰敗延誤亟宜查辦者又一也近來雲貴督臣李經羲議造滇桂邊路於國防尤有關係然不有粵漢幹路自湖南之永興與廣西之全州相接則滇桂路何能自守今我粵漢直貫桂滇川漢遠控西藏實為國家應有兩大幹路萬一有事緩急可恃故無論袤延數千里之幹路斷非民間零星湊集之款所能圖成即使遲以十年或二十年造成之後而各分畛域倘於有事之際命令不行仍必如東西洋之議歸國家收買此幹路之必歸國有者又一也國家成法待民寬厚雖當財賦極困難之時不肯加賦四川湖南現因興造鐵路創為租股名目每畝帶徵以充路款聞兩省農民正深訾怨偶遇荒年追呼尤覺難堪但路局以路亡地亡之説驚嚇愚民遂不得不從川省民力較紓尚能勉強擔負湘民本非饒足若數年之間強逼百姓出此數千巨萬之重資而路工一日不完路利一日無著深恐民窮財盡欲圖富強而轉滋貧弱是以幹路收歸國有命下之日薄海百姓必無阻撓之慮況留此民力以造枝路其工易成其資易集其利易收使其土貨得以暢行民間漸資饒富此枝路之可歸民有者又一也疏上下所司議行詔曰中國幅員遼闊邊疆袤延數萬里程途動需數閲月之久朝廷每念邊防輒勞宵旰欲資控禦惟有速造鐵路之一策況憲政之咨謀軍務之徵調土産之運輸胥賴交通便利大局始有轉機熟籌再四國家必有縱橫四境諸大幹路方足以資行政而握中央之樞紐從前規畫未善並無一定辦法以致全國鐵路錯亂紛歧不分枝幹不量民力一紙呈請輒行批準商辦乃數年以來粵則收股及半造路無多川則倒帳甚巨參追無著湘鄂則開局多年徒資坐耗竭萬民之脂膏或以虛糜或以侵蝕恐曠時愈久民纍愈深上下交受其害貽誤何堪設想用特明白曉諭昭示天下幹路均歸國有定為政策所有宣統三年以前各省分設公司集股商辦之幹路延誤已久應即由國家收回趕緊興築除枝路仍準商民量力酌行外其從前批準幹路各案一律取消至應如何收回之詳細辦法著度支部郵傳部悉心籌畫迅速請旨辦理度支部奏粵川湘鄂四省所抽所招之公司股票盡數收回由度支郵傳兩部特出國家鐵路股票常年六釐給息嗣後如有餘利按股分給倘願抽本五年後亦可分十五年抽本其不願換國家鐵路股票者均準分別辦理以昭平允粵路全係商股因路工停頓糜費太甚票價不及五成現每股從優發給六成其虧耗之四成發給國家無利股票路成獲利之日準在本路餘利項下分十年攤給湘路商本照本發還其米捐租股等款準發給國家保利股本鄂路商股並準一律照本發還其因路動用賑糶捐款準照湖南米捐辦理川路宜昌實用工料之款四百數十萬兩準給國家保利股票其現存七百餘萬兩願否入股或歸本省興辦實業仍聽其便從之詔停川湘兩省租股起端方以侍郎督辦粵漢川漢鐵路其粵漢川漢英德法三國借款亦即簽訂方幹路收歸國有之詔既頒湘粵人士羣起譁譟力謀抗拒顧未久即定護川督王人文代陳川咨議局請緩接收川路詔旨斥之川人羅綸等言部臣對待川民均以威力從事毫不持平人文復據以上聞仍嚴斥之未幾以趙爾豐署四川總督川人因路事持久不決始以罷市罷課抗糧抗捐發布自保商榷書繼則集衆圍攻督署再攻省垣遂命端方率軍入川又以川事日棘命前粵督岑春煊赴川辦理剿撫春煊既受命請以現金償川省路股桂撫沈秉坤亦以為言部議借英金三百萬鎊不能決也春煊至鄂會成都圍解稱疾不往御史陳善同上章請罷斥郵傳大臣盛宣懷以弭巨變疏言竊維國以民為本自古未有得民心而國不興者即未有失民心而不危者傳曰衆怒難犯書曰民可近不可下此中消息至微此次以鐵路幹線歸國有政策本極相宜比者屢詔蠲除各項雜捐所以恤民者固已仁至義盡而湘粵等省人心惶駭擾擾不靖川患且日以加劇者則以郵傳大臣盛宣懷於此事之辦理實有未善也各路商辦之局其始皆歷奉先皇帝諭旨根據大清商律如欲改歸官辦自應統籌全局劃定年限分期分段量力遞收於國於民方為兩利今盛宣懷事前毫無預備徒仰仗借款突然將批準各案奏請一律取消各路以十餘年之經營千數百萬之籌集一旦盡取諸其懷而奪之而所訂借款合同利率之高虛折之多抵押之巨債權之重又著著失敗豫人口實各省人民痛念前勞怵心後禍宜其奔走駭告岌岌若不終日也查給事中石長信之請定幹路枝路辦法在四月初七日郵傳部之覆奏宣布國有政策在十一日而借款合同之簽押在二十二日似政策之改定實緣借款而發生也者舉辦此等大事乃平時漫無布置出以猝遽如此反使朝廷減輕民纍之恉晦沒不彰而復不能審慎臨機強令宜歸工程每月工項仍由川款開支實與五月二十一日上諭川路仍存七百餘萬願否入股或辦實業並聽其便等語大相違背必欲使我皇上體恤商民之恩壅遏之不使下逮陷朝廷以不信示天下以可疑羣起抵抗何怪其然幸以國家三百年來深仁厚澤淪浹人心故雖衆怨交集於盛宣懷終無敢有歸怨朝廷者比聞川省風潮日烈皆以盛宣懷喪權誤國欲得而甘心月餘以來屢開全省股東大會每次到者近萬人誓與路為存亡在場之人無不為之泣下合十餘州縣地方並相約不納錢糧不上捐輸學堂停課商民罷市各戶恭設先皇帝靈位朝夕痛哭人無樂生之心士懷必死之志愁慘蕭條如經大劫至可憐念夫今日皇皇失所之窮民皆國家瞏瞏在疚之赤子情形狼狽至此我皇上聞之必有惻然動念者若不亟為拯救萬一相持不解稍延時日或有不軌之徒從中鼓煽強者併命於尋仇弱者絶望於逃死衆志一睽全體瓦解終非國家福也現在湘鄂爭路餘波尚未大熄而雨水為災幾近十省盜匪成羣流亡遍野若川省小有風鶴之警恐由滇藏以至沿江沿海必有起而應之者其為患又豈止於路不能收而已頃者我皇上諭派鄂粵川湘等省督撫令於所轄境內鐵路事宜各得會同辦理盛宣懷剛愎自用不洽輿情已可概見應如何懲處以警將來至川民爭議久懸不斷終慮釀成巨變應責成督辦會辦各大臣酌度情形妥速維持以息衆喙時宣懷入為郵傳大臣幹路收歸國有及息借外債築路處分四省路股實主其事故善同及之語至切直疏入不省而川省溫江等十餘州縣民團每起數千或萬人所至焚掠勢極猖獗大軍擊退之旋據崇慶新津彭山而嘉定灌縣相繼失陷邛州軍隊譁變汶川縣署被毀命湘鄂陝諸軍赴援會鄂事起川亂愈亟以岑春煊為川督而川省旋為民軍所據端方趙爾豐均及於難乃罷盛宣懷以謝川人而國事已不可為矣蓋論辦路之優劣官辦則籌款易竣工速自非商辦可及而外債之虧耗大權之旁落弊害孔多亦遠過於商路惟京張鐵路以京奉餘利舉辦詹天佑躬親其役絲毫不假外人允為中國自辦之路而鄂之鐵廠製鋼軌以應全國造路之需挽回大利尤為不鮮統計官辦之路京漢長二千六百三十里資本金一萬萬零五百六十二萬八千餘元京奉長二千二百四十六里資本金五千零八十八萬四千餘元津浦長一千八百六十三里資本金八千零四十九萬餘元京張長五百四十六里資本金一千零三十二萬餘元滬寧長七百二十五里資本金三千六百五十三萬餘元正太長六百二十三里資本金二千三百十二萬六千餘元汴洛長四百零二里資本金二千零五十萬元道清長三百三十里資本金九百五十四萬九千餘元廣九長三百零三里資本金一千一百六十六萬二千餘元吉長長一百四十里資本金一百二十萬三千七百零四元萍株長二百零五里資本金四百六十一萬六千餘元齊昂長五十六里資本金四十八萬八千餘元商辦之路浙江長三百四十二里資本金一千二百七十八萬八千餘元新寧長二百六十里資本金四百零八萬九千餘元南潯長七十七里資本金三百五十萬六千餘元福建長二