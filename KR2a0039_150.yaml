body:
  text: 清史稿卷一百五十志一百二十五交通二輪船自西人輪船之制興有兵輪有商輪其始僅往來東西洋各國口岸而已中國自開埠通商而後與英吉利訂江寧條約而外輪得行駛海上矣續與訂天津條約而外輪得行駛長江矣商旅樂其利便趨之若鶩於時內江外海之利盡為所占同治十一年直隸總督李鴻章建議設輪船招商局論者謂妨河船生計鴻章謂當咸豐間河船三千餘艘今僅存四百艘及今不圖將利權盡失請破羣議力行之十三年鴻章又疏言同治間曾國藩丁日昌在江蘇督撫任迭據道員許道身同知容閎創議華商造船章程分運漕米兼攬客貨曾經寄請總理衙門核準飭由江海關道曉諭各口商人試辦日久因循未有成局同治七年僅借用夾板船運米一次旋又中止本年夏間臣於驗收海運之暇遵照總理衙門函示商令浙局總辦海運委員知府朱其昂酌擬輪船章程嗣以現在官造輪船內並無商船可領各省在滬殷商或自置輪船行駛各埠或挾資本依附西商之籍若中國自立招商局則各商所有輪船股本必漸歸官局似足順商情而強國體擬請先行試辦招商為官商浹洽地步俟商船造成即可隨時添補推廣通行又海運米石本屆江浙沙寧船不敷應請以商船分運以補沙寧之不足將來米數愈增可無缺船之患請照戶部核準練餉制錢借給蘇浙典章準商等借領二十萬緡以作設局商本仍預繳息錢助賑所有盈虧全歸商認與官無涉當令朱其昂回滬設局招商商人爭先入股現已購集堅捷輪船三艘經臣咨商浙江督撫臣飭撥明年漕米二十萬石由招商輪船運津其水腳耗米等項悉照沙寧船定章至攬載貨物報關納稅仍照新關章程以免藉口若從此輪船暢行庶使我內江外海之利不致為洋人占盡其關於國計民生者實非淺鮮疏入報可先是閩廠專為製造兵輪而設學士宋晉言糜款過巨議請罷之事下鴻章力持不可略言歐洲諸國闖入中國邊界腹地無不款關而求互市海外之險有兵船巡防而我與彼可共分之長江及各海口之利有輪船轉運而我與彼亦共分之或不至讓洋人獨擅其利與險而浸至反客為主也又言沿江沿海各省不準另行購雇西洋輪船若有所需令其自向閩滬兩廠商撥訂製至載貨輪船與兵船規制迥異閩廠現造之船商船皆不合用曾國藩前飭滬廠造兵船外另造商船四五艘閩廠似亦可間造商船以資華商雇領現與曾國藩籌議中國殷商每不願與官交涉且各口岸生意已被洋商占盡華商領官船另樹一幟洋人勢必挾重資以傾奪則須華商自立公司自建行棧自籌保險本巨用繁初辦恐亦無利可圖若行之既久添造與租領稍多乃有利益聞華商願領者必準其兼運漕糧方有專門生意不至為洋商排擠將來各廠商船造有成數再請敕下總理衙門商飭各省籌辦疏上下所司議行是年冬招商局成立以知府朱其昂主其事道員盛宣懷佐之其昂以道員胡光墉李振玉等招徠商股入資者極為踴躍宣懷亦援粵人唐廷樞徐潤董局事購船設械立埠次第經營悉屬商本規模粗具光緒元年鴻章奏奬其昂等有差三年增購旗昌船艦始假用直隸江蘇江西湖北東海關官款百九十萬兩有奇初擬購旗昌輪船宣懷持之最力需銀二百數十萬兩商本無幾不足以應宣懷以國防大計江海利源之説力陳於江督沈葆楨葆楨為所動撥銀百萬以濟論者咸謂是舉為失計至以旗昌棄垂敝之裘得值另製新衣期於適體為喻事後募集商股應者寥寥僅得銀四萬者以此也御史董俊翰言招商局每月虧至五六萬兩致虧之由因置船過多輪車行駛經費過巨必須一船得一船之用方可無虞折耗聞商局各船攬載之資不敷經費船多貨少刻下既未能遽赴外洋各國以廣收貿易之利祗宜量為變置使所出之數不至浮於所入也六年祭酒王先謙請整頓招商局務語涉宣懷疏下江督劉坤一言宣懷於購旗昌輪船時聲言有商款百餘萬實無所有有意欺謾冀獲酬金請奪宣懷職復請以官款概作官股以其贏餘作海防經費疏入均不報招商局所假官帑至光緒六年應分期拔還乃償已逾半復假洋債鴻章言兼籌並顧招商局力有未逮請先償洋債後及官帑格於部議嗣以遞年清還而商股尚達四百萬兩焉當招商開辦之初僅輪船三艘嗣承領閩滬兩廠購之英國增至十二艘逮購入旗昌輪船十八艘遂與英商太古怡和並稱三公司資本過巨收入轉微是年以言官劾奏招商局辦理毫無實濟請飭認真整頓諭李鴻章及江督吳元炳徹查鴻章等奏言輪船招商局之設乃各商集股自行經理已於創辦之初奏明盈虧全歸商認與官無涉輪船商務牽涉洋務更不便由官任之與他項設立官局開支公款者迥不相同惟此舉為收回中國利權事體重大故須官為扶持並酌借官帑以助商力之不足光緒三年冬曾將商局事宜籌畫整頓復奏並飭江海津海兩關道於每年結帳就近分赴滬洋各局清查帳目如有隱冒據實奏請參賠數年以來雖有英商太古怡和洋行極力傾擠而局事尚足相持官帑漸可拔還復先承運京倉漕米各省賑糧不下數百萬石徵兵調餉解送官物軍械者源源不絶豈得謂於國事毫無實濟其攬載客貨以及出入款目責成素習商業之道員唐廷樞徐潤總理其事每年結帳後分晰開列清册悉聽入本各商閲看稽查若局中稍有弊端則衆商不待官查必已相率追控而自開辦至今並無入股商人控告者現值漕運攬載喫緊之時若紛紛調簿清查不特市面徒滋搖惑生意難以招徠且洋商嫉忌方深更必乘機傾擠冀遂其把持專利之謀殊於中國商務大局有礙總之商局關係國課最重而各關各納稅課絲毫無虧所借官款由商局運漕水腳分年扣還公款已歸有著其各商股本盈虧應如前奏全歸商認與官無涉應俟每年結帳時照案由滬津兩關道就近清查以符定章疏入報聞十一月學士梅啓照言招商局自歸併旗昌輪船各國輪船之利漸減然祗在香港福州寧波上海天津牛莊長江等處碼頭不如推廣竟令其赴東西洋各國請飭南北洋大臣督令局員酌派豐順保大等船先赴東洋試行行之有效漸及於西洋則貿遷有無之利中外分之明年祭酒王先謙亦以為言均下所司核議先是招商局船駛往新嘉坡小呂宋日本等處不足與外輪競利尋即停罷嗣遣和衆船往夏威仁國之檀香山美之舊金山兩埠華人麕集航業頗振因復遣美富船往而各國商業英為巨擘七年粵人梁雲漢等設肇興公司於倫敦船政大臣黎兆棠實倡斯議鴻章疏言西洋富強之策商務與船政互相表𩹉以兵船之力衛商船必先以商船之稅養兵船則整頓尤為急務邇者各國商船爭赴中國計每年進出口貨價約銀二萬萬兩以外洋商所逐什一之利已不下數千萬兩以十年計之則數萬萬兩此皆中國之利有往無來者也故當商務未興之前各國原可閉關自治逮風氣大開既不能拒之使不來惟有自擴利源勸令華商出洋貿易庶土貨可暢銷洋商可少至而中國利權亦可逐漸收回前此招商局輪船嘗駛往新嘉坡小呂宋越南等埠攬載近年和衆美富等船分駛夏威仁國之檀香山美國之舊金山載運客貨究止小試其端尚未厚集其力英國倫敦為通商第一都會並無華商前往黎兆棠志在匡時久有創立公司之議盡心提倡力為其難現既粗定規模自當因勢利導期於必成報聞十年法人來擾海疆不靖股商洶懼局船慮為劫奪以銀五百二十五萬兩暫售之旗昌行主事平收回復增置江新新昌新康新銘各艦而沈沒朽敝者不一而足其後共達二十九艘云十二年鄂督張之洞遣總兵王榮和至南洋籌辦捐船護商事項宣統三年設商船學校於吳淞凡此皆為擴充航業之張本而局船行駛外洋之利終不能與各國爭衡也招商局之設本為挽回江海已失航利開辦之始即知為洋商所嫉而彌補之策首在分運蘇浙漕米嗣更推之鄂贛江安而滇之銅斤蜀之燈木江浙之採辦官物直晉之賑糧胥由局船經營其事光緒十一年道員葉廷眷復條上扶持商局運鄂茶鄂鹽增加運漕水腳諸策事下直督李鴻章先是局船運漕石銀五錢有奇嗣英美人攬運故廉其值商局運費因之減少勢益不支鴻章請稍增益之格部議不果行蓋招商局自開辦以來局中之侵蝕與局外之傾擠所有資力頗虞虧耗商股不足貸及官款繼以洋債當事者日言維持補救之策裨益實鮮而以用款浮濫復屢為言官所劾至是部臣疏言三代之治法貴本而抑末重農而賤商從古商務未嘗議於朝廷海上互市以來論者乃競言商政竊謂商者逐什一之利以厚居積權子母為事者也厚居積必月計之有餘權子母必求倍入之息若計存本則日虧問子母則無著甚且稱貸乞假以補不足猶號於衆曰此吾致富之術也有是理乎嘗見富商大賈必擇忠信之人以主會計其入有經其出有節守餘一餘三之法核實厚積乃能久遠若主計不得其人生之者寡食之者衆取之無度用之無節不旋踵而終窶用人理財之道與政通矣前者李鴻章沈葆楨創立此局謀深慮遠實為經國宏謀固為收江海之利與洋商爭衡轉貧為富轉弱為強之機盡在此舉乃招商局十餘年來不特本息不增而官款洋債欠負纍纍豈謀之不臧哉稽之案牘證之人言知所謂利權上不在國下不在商盡歸於中飽之員紳如唐廷樞朱其昂之被參於前徐潤張鴻祿之敗露於後皆其明證主計之不得其人出入之經不能講求撙節又安得以局本虧折諉之於海上用兵耶商局既撥有官款又津貼以漕運水燧減免於貨稅其歲入歲出之款即應官為稽察請飭下南北洋大臣將局中現存江海輪若干隻碼頭幾處委員商董銜名及運燧支銷分別造報此後總辦如非其人原保大臣應即議處報可然管理招商局之權始終屬之直隸總督部臣無從過問逮三十三年商局與英商怡和太古訂利益均享之約始免互相傾擠而其利漸著此招商局辦理之大略情形也招商輪船航行各埠悉自滬始駛行長江者曰江輪駛行海洋者曰海輪停泊口岸大小不一惟商務殷闐之所設貨棧焉以故上海設總棧而蘇之鎮江南京皖之蕪湖贛之九江鄂之漢口浙之寧波溫州閩之福州汕頭粵之廣州香港魯之煙台奉之營口直之塘沽天津皆設行棧而通州以漕運所關亦設棧焉江輪海輪時統名之為大輪其與大輪並行於內江外海或駛行大輪所不能達之處則有小輪光緒初商置小輪之行駛僅限於通商口岸十年明申禁令小輪不得擅入內河官商雇用須江海關給照乃可然祗限於蘇杭之間其輸運客貨駛入江北內河者皆在所禁十六年詹事志鋭疏請各省試行小輪總署王大臣議以為不可護湘撫沈晉祥言湘民沿河居住操舟為業者實繁有徒自上海通商以後僅有淮鹽一項尚可往來裝運其餘貨物多由輪船載送湘省民船祗能行抵江漢而止舵工水手失業者多今再加以小輪行駛內河誠如總理衙門原奏所云必至奪民船之利有礙小民生計江督劉坤一亦言小輪行駛內河流弊滋多礙民生妨國課病地方請嚴禁之俱如所請初外輪行駛長江由滬至漢口而止二十一年馬關約成許日輪一自漢口達宜昌更溯江上至重慶一自上海入運河以抵蘇杭於時朝旨始許華商小輪於蘇杭間行駛而江督張之洞更推廣其航行之路於鎮江江寧清江浦及贛之鄱陽二十四年長江通商約成而通州蘆涇港泰興天星橋湖北荊河口悉定為洋輪上下搭客處而桂之西江直之白河瀋之遼河松花江亦先後許外輪行駛逮中英馬凱約成更及於粵之北江東江與英日訂內港行輪章程凡內地水道外輪悉攫得行駛之權於是向之華商小輪不得行駛各地始一律弛禁焉江浙閩粵輪船公司次第設立轉輸客貨人稱便捷特以洋商創始於前華商瞪乎其後而跌價傾擠時有所聞欲求贏利蓋綦難矣三十年商部參議王清穆言植商業之基礎莫如內河航政一事凡鐵路之尚未通者可藉航路控接之凡軌路所不能達者可由航路轉輸之江鄂諸省若漢湘若九南若鎮揚鎮浦蘇杭蘇滬常鎮各航路四通八達往往為外人所經營其公司多不過數萬金視軌路之動需千百萬者難易迥殊華商之力尚能興辦洵為今日切要之舉請飭各省有航路處所於華商輪船公司亟豫保護未設者提倡籌辦報可自是小輪公司漸推漸廣閩粵濱海之區輪檣如織隨處可通直則有往來安東天津大連營口牛莊煙台龍口義馬島威海衛海參崴之小輪蘇則有往來鎮江清江浦通州海門上海蘇杭江寧揚州六合之小輪皖則有往來蕪湖廬州安慶寧國巢縣之小輪贛則有往來南昌九江吳城湖口豐城樟樹鎮吉安饒州之小輪湘鄂則有往來漢口黃州沙市宜昌武昌嘉魚長沙株州常德咸寧嶽州湘潭益陽仙桃鎮老河口之小輪桂則有往來梧州南寧貴縣柳州之小輪浙則有往來寧波溫州穿山定海象山寧海台州海門沈家門普陀山餘姚西塢瑞安平望震澤南潯之小輪川則有往來宜昌重慶嘉定府之小輪各公司盈虧不一而航路四達商旅便之實與江海大輪有相輔而行之利此外則有各省官用小輪暨專用小輪是又於商輪之外特設者也三十一年修撰張謇醵銀五十萬設大達輪步公司於上海宣統三年吉林巡撫陳昭常創辦吉林圖長航業公司自滬越日本長崎達圖們江以滬商朱江募資為之此皆於招商局外別樹一幟者也
