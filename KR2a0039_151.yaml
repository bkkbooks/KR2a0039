body:
  text: 清史稿卷一百五十一志一百二十六交通三電報電報之法自英吉利人初設於其國都推及於印度再及於上海同治十三年日本犯臺灣兩江總督沈葆楨疏言電報之利詔旨飭辦不果行光緒五年直隸總督李鴻章始於大沽北塘海口炮臺設線達天津試行之而利明年因有安設南北洋電報之請先是同治間英使阿禮國請設電線於中國境內力拒之乃已九年其使臣威妥瑪復申前議易陸線為水線自廣州經閩浙以達上海爭之數月卒如所請嗣是香港海線循廣州達天津陸線達九龍而丹國陸線亦由吳淞至滬上駸駸有闌入內地之勢天津道盛宣懷言於鴻章宜仿輪船招商之例醵集商股速設津滬陸線以通南北兩洋之郵遏外線潛侵之患並設電報學堂育人才備任使鴻章韙之明年疏言用兵之道神速為貴泰東西各國於講求鎗炮之外水路則有快輪船陸路則有火輪車而數萬里海洋欲通軍信則又有電報之法近來俄羅斯日本均效而行之故由各國以至上海莫不設立電報瞬息之間可以互相問答獨中國文書尚恃驛遞雖日行六百里加緊亦已遲速懸殊查俄國海線可達上海旱線可達恰克圖欽使曾紀澤由俄國電報到上海祗須一日而由上海至京城輪船附寄尚須六七日到京如遇海道不通由驛必以十日為期是上海至京僅二千數百里較之俄國至上海數萬里消息反遲十倍倘遇用兵之際彼等外國軍信速於中國利害已判若徑庭且其鐵甲兵船在海洋日行千餘里勢必聲東擊西莫可測度全賴軍報神速相機調援是電報實為防務所必需現自北洋以至南洋調兵饋餉在在俱關緊要亟宜設立電報以通氣脈如由天津陸路循運河以至江北越長江以達上海安置旱線即與外國通中國之電線相接需費不過十餘萬兩一半年可以告成約計正線支線橫亙三千餘里沿路分設局棧常年用費先於軍餉內墊辦辦成後仿照輪船招商章程擇公正商董招股集資俾令分年繳還本銀嗣後即由官督商辦並設電報學堂雇用洋人教習中國學生自行經理庶幾權自我操歷久不敝疏入報可踰年工竣以宣懷董其事未幾英法德美各使擬設萬國電報公司於上海增滬至香港各口海線英使格維納並援案請增上海至寧波溫州福州廈門汕頭海線鴻章言宜令華商速設沿海陸線以爭先著使彼無利可圖庶幾中止且從此海疆各省與京外脈絡貫注實與洋務海防有裨即商民轉輸貿易消息靈通為利更大從之而蘇州至浙閩粵陸線因之告成其時香港英商方欲設水線至廣州粵督曾國荃亟造陸線以遏之於是港線不得侵入粵境英線不獲造至福州而上海丹線九龍英線先後毀去或資購之沿海電線其權悉操於中國之手此因外線之侵入而次第創設者也當沿海陸線未設之先海疆萬里消息阻絶緩急無以為備御史陳啓泰上防海六策其一言洋面既派兵輪分駐即不可不設電線以通消息議者必以不急之務虛糜巨款為疑不知非常之原斷非省嗇所能集事即以目前而論越南情形每藉各國新聞紙以為耳目今年朝鮮之變非由日本發來電信中國尚不得知軍情緊急日夕萬狀郵傳迂緩既恐有誤機宜藉助外人事體更多窒礙自不如招雇洋匠自行安設之為愈中國電報似宜推廣各省海口凡兵船寄碇之處一律開辦廣東瓊州之線徑達越南奉天旅順之線徑達朝鮮總期脈絡聯貫呼應靈通遇有警報瞬息可至下所司議行十年法越事起海防急設線北塘以訖山海關遞及於營口旅順江督左宗棠則設長江線以通武漢粵督張樹聲則設廣西線以達龍州二十一年中日戰事亟慮直東一線有阻接設老河口至西安線是役江蘇增上海至獅子林金山衛乍浦清江至青口板浦揚州至通州泰州鎮江至圌山關天都廟崇明至吳淞等線而奉天至仁川電線先成於十一年臺灣以瀕海要區十四年亦水陸線並設焉此因海防緊要而次第安設者也滇桂密邇越南緬甸邊備為急滇省電線其始僅通鄂通蜀與南寧接線之議光緒十一年得請而未果行十三年滇督岑育英復言由緬入滇以騰越為入境門戶猶蒙自之於越南也今英國有開辦通商之請自當先事籌維擬就粵西工匠到滇之便即將省城至騰越一路安設電線以通英緬聲息時粵督張之洞亦言廣西南界接壤滇邊桂滇皆西鄰越南滇則西接緬甸若僅恃由鄂入滇一線傳達電音設有雷雨折斷電桿阻滯堪虞且遇有軍務之時由滇川滬鄂展轉至粵恐有交會壅滯之患已商之滇督自剝隘至蒙自由粵接造並增騰越之線疏入報聞蓋剝蒙設線所以備越南騰越設線所以備緬甸也吉林黑龍江逼處俄疆邊防尤要十五年自吉林省城設線至松花江南岸歷茂興站齊齊哈爾布特哈墨爾根興安嶺黑龍江以達黑河鎮從練兵大臣穆圖善之言也十八年陝甘總督楊昌濬言新疆西北鄰俄西南與英屬部接壤文報濡滯貽誤必多宜由肅州設線至新疆省城及於伊犂喀什噶爾宣統元年桂撫張鳴岐疏陳設柳雍電線二千三百餘里俱得請此因邊備而增設者也初奏設南北洋陸線北端僅至天津法事將起出使大臣曾紀澤請接營近畿電線謂可壯聲威以保和局靈呼應以利戰事事下所司與鴻章議展拓之法鴻章言神京為中外所歸嚮發號施令需用倍切前於創辦電報之初頗慮士大夫見聞未熟或滋口舌是以暫從天津設起漸開風氣其於軍國要務裨益實多今總理衙門與曾紀澤皆以近畿展線為善策擬暫設至通州逐漸接展至京允行踰年津線遂踰通州達京師自時厥後各省咸知電報之利或本無而創設或已有而引伸其尤要之區則陸線水線兼營正線支線並設縱橫全國經緯相維直蘇粵桂滇魯鄂諸省設局多至二十餘所餘省亦十餘局或數局有差其互相銜接者京師之線所達曰庫倫濟南太原天津之線所達曰奉天奉天之線所達曰天津旅順吉林吉林之線所達曰海參崴齊齊哈爾奉天黑龍江之線所達曰吉林海蘭泡江蘇之線所達曰京師蕪湖安徽之線所達曰江寧九江山西之線所達曰京師西安山東之線所達曰京師開封清江浦河南之線所達曰京師濟南西安陝西之線所達曰開封太原蘭州漢口甘肅之線所達曰迪化西安新疆之線所達曰蘭州浙江之線所達曰上海福州江西之線所達曰廣州蕪湖河口湖北之線所達曰九江成都長沙鄭州湖南之線所達曰漢口桂林四川之線所達曰漢口福建之線所達曰杭州廣州廣東之線所達曰福州梧州九江廣西之線所達曰長沙廣州雲南之線所達曰漢口重慶八莫南寧貴州之線所達曰重慶外蒙則達京師張家口焉瀕海之區則設海線直隸自大沽以通之罘江蘇自上海東通長崎北通之罘大沽南通廈門香港廣東自香港通海防新嘉坡廈門上海馬尼喇山東自之罘通大沽旅順威海衛青島上海福建自川石山通臺灣淡水自廈門通上海香港蓋總計陸線之設不下四萬里有奇而水線不與焉電報設局亦如輪船招商之例商力舉辦而官董其成謂官督商辦也津滬一線其始倡以官帑未幾即歸商局醵資至二百餘萬而各省電線不盡由商辦者良以商人重利入資則權子母計盈虧其於海防邊備情勢緩急國內交通利便與否不以措意往往一線官辦商辦參互錯綜大率以官辦補商辦之不足兩粵電線廣州至龍州則屬之官至梧州則屬之商欽廉雷瓊及鎮南關虎門則官商協力而滇線一自鄂入一自蜀入一自桂入西安迄嘉峪關甘新奉吉黑等省通州至承德陸線俱官為之此類是也然由滬達粵之線本為防止外線而設需費四十餘萬兩咸由商力措備其時香港英人並欲引線達廣州亦賴華合公司預設線至九龍其謀始戢方華合公司設線九龍也華民抗拒英商撓阻其勢洶洶公司商人何獻墀等排衆難而為之不為所屈卒底於成中日戰事棘引襄陽線千餘里直達西安俾京滬軍報不至梗阻而張家口至恰克圖一線以俄使援約相促亦由商局集金六十餘萬兩接線二千七百餘里經營至二三年之久工巨費繁為全國最此外造成之線不能里數其所裨殆非淺鮮矣二十五年大學士徐桐言電報局獲利不資並無裨益公家之實廷臣亦有以招商電報各局假公濟私為言者俱下協辦大學士剛毅查復剛毅時以事銜命赴蘇尋疏陳電局自恰線成後所虧至巨俟有贏餘歲輸南北洋學款十二萬四千兩報可明年廷臣復言電局利權太重宜遴員接辦詔飭宣懷按年冊報收支款目官電應免收費宣懷上疏略言電局本係集華商合衆之力以與洋商爭衡旁觀每驚為大利所叢其實析分千百股商仍皆寸寸銖銖之微利近年電線開拓日廣則局用及修線養線之費亦日增上年因中俄條約接造恰克圖之線用費六十餘萬兩未請官款悉係電商集資辦成沙漠荒僻之區絶少報費而常年用數尤巨至本年應辦之工因辦理鐵路盧溝橋至保定線已造成又須造保定至漢口幹線因辦理海防乃須造寧波至溫州之線總理衙門因洋人之請則須造山東泰安沂州之線此外各路加線要工絡繹不絶官款並無可籌皆借股商之力以赴公家之急總局收支各帳均係按年刊布各局詳細坐簿亦任股商隨時查閲一出一入衆見衆聞非如官中所辦報銷出於一二人之手者可比原奏所疑各節似屬不知此中原委至官報之費前定章程擬一半報效一半給資期於官商兼顧持久不廢仍宜照舊辦理以維大局報聞宣懷時綜司輪電兩局疊被指摘二十八年言於直督袁世凱電報宜歸官有輪船純係商業可易督辦不可歸官世凱謀諸執政者以為然聞於上尋命世凱督辦電局候補侍郎吳和喜副之明詔發還商股不遽豫行衆商洶懼爭欲持券售之外人宣懷力遏之乃已尋詔原有商股一仍其舊蓋其時僅易一商股官辦之局而已三十四年郵傳設部已二年將以全國電局為實行部轄之計郵傳部尚書陳璧疏言電報為交通全國機關各國電報之權皆操諸國家中國電報創始原歸商辦而光緒初年商股微薄仍賴官力以為補助非完全商辦也歷年獲利約計五六百萬果使全國交通推行無阻則富商即可富國亦何必別議更張乃觀商線所至之處皆屬市鎮都會而邊遠省分如雲貴廣西甘肅新疆商人以無利可圖均推歸官辦雖商力實有未逮而顧私利忘遠略實悖朝廷立部之初心衡以中國近狀自非改為官辦無以定區畫之方即末由收擴充之效東西各國電線如織策應靈通故伏莽方生旋就撲滅中國電報無論要荒即腹地稍僻者亦多缺而未舉一旦有事道途修阻聲息不通實於軍務有礙況當百度維新外交內政關係非輕稍滯交通輒形扞格近來科布多川藏蒙古閩浙江西蘇松紛紛請設電線本年四月奉旨迅設貴陽至義興電線又陸軍部以秋間江鄂各軍在安徽會操請設安慶至太湖電線外務部請設川藏通印度電線以為收贖英人江孜線路張本湖北官電局以賠纍不堪請改歸部辦紛來沓至均為不可稍緩之圖核計各省請設各線不下萬有餘里工程當在一百餘萬以上且此萬餘里半皆荒村僻壤報務不多增一線即賠一線之本修一里即虧一里之費前此添設雲貴一二邊省電線各股商尚慮虧損今統籌荒瘠之區更難著手至利則歸己損則歸公恐亦無此情理此展線之宜歸官辦者也各省線路待修者衆朽敗難支而陝豫閩三省尤甚設遇軍興倉猝何堪設想現在遴員調查通盤籌畫尚有應移近鐵路者有關係交涉亟須先占者有文報日多應行添線者次第修舉工費浩繁需銀約五六十萬兩此項巨費即盡括商股餘利息項亦難支抵此大修之宜歸官辦者也中國報費昂貴甲於全球遠省一二字之費幾與各國二十字相等近據寧夏副都統志鋭請核減報費以利交通又據赴葡部員周萬鵬稱葡國公會亦以中國報費太昂為詞自當酌減使價目與各國略同為入萬國電政會之預備惟核減電費以歲入三百餘萬元計算若減一二成即在五六十萬以上若遞減至四五成或減至與東西洋相等為數尤多此事一行則商股年息恐不可保餘利更不待言此減費之宜歸官辦者也凡此三事實為電政今日最要之圖即為商股今日最損之策與其苟且因循日積月纍致官商之兩病曷若平價收贖期上下之交益實見夫今日電報有必須擴充之勢即有不免折閲之時在商人祗課贏餘在國家必求利便事實不同斷難強合臣等擬恪遵光緒二十八年諭旨改為官辦籌還商股即由部備價收贖於每股股本外特豫加價以示國家恤商之意奏入允行八月電股收贖完竣陳璧疏言臣部收贖商電酌核市值贖之每百圓電股給豫一百七十圓旋復從衆商之請加價十圓作為優待費計共二十二萬圓自頒發收贖章程後旬月之間共收回商股二萬一千四百餘股其未到之五百餘股委係外埠及內地僻處遞寄維艱擬請寬豫限期照章給價提存現款以便續領仍給優待費以示體恤此後即全歸國有與商無涉收贖之款三百九十六萬臣部暫由路款借撥仍須另行設法歸還以清款目又言電政為交通樞機圖擴充方期發達今既改歸國有應將減費展線修線諸事次第整頓而減價為中外衆目所睹非實行籌辦尤不足以饜人望而廣招徠擬自光緒三十五年正月始酌減電費二成以所收商報約三百萬圓之額計之即少收約六十萬圓不敷在二十萬圓以上減費之後報費必增可供挹注而一時添線修線並擴充電話在在需款所增之數必須抵撥逐漸推廣工程之用預算短額擬暫由臣部各路餘利項下每年分撥二十萬圓以三年為限自第四年起至六年止每年勻還二十萬圓一律還清一轉移間路款均歸有著電政亦可漸興不煩續借他款實收財政統籌之益報可自時厥後事權統一呼應靈通每歲展拓電線三四千里以為常而取值之廉迥異疇昔此則非商辦之所及也中國幅員遼闊文報稽延至於變起倉猝往往因消息遲滯坐誤機宜釀成巨患歷朝變亂之起大率以此自有電報舉向來音信隔絶之弊一掃而空若朝陽教匪之倡亂雲南猛喇游匪魏名高之滋事均因電報之告警與軍事布置之迅速得以立即剿平而外則朝鮮之二次內訌越南事變之先事防禦亦惟電報是賴此其明效大驗也而然當創辦之初鄉僻囿於見聞外人多所撓阻艱難曲折乃克成功設線之處若係邊疆瘴癘塞外荒涼之地措手之艱什伯內地以故在事人員得邀奬而近省不得援例以請者此也至於意外之損壞其事尤夥貴州畢節鄉民之拆線山西霍山鄉民之毀桿湘省澧州民誤以電線為外人所設集衆毀棄陝之長武乾州醴泉邠州永壽甘之涇州平涼等處人民謂旱疫為電線所致拆毀殆盡俱由地方官出資修復首犯有論重辟者二十六年拳匪之變京師至保定電線先為所毀京津京德繼之山西河南又繼之馴至晉豫直隸山東四省境內蕩然無一線之遺南北隔閡中外阻塞消息不通者數月而外兵盤踞京津初設行軍電線嗣擬設大沽至上海水線以大東大北兩公司主其事宣懷密行作價購其機器料物屬於中國商局其謀竟不得逞宣懷尋請修復已毀各線其經戰事損壞者商局任之晉豫未有戰事地方官保護不力甚且指使拆壞者援畢節霍山之例分別賠修報可三十年東三省線再毀於日俄之戰逮三十四年總督徐世昌修復之此已毀復修各線之大略情形也電報之利於交通與鐵路相輔而行缺一不可然鐵路需費過巨每有興築擬假外資集事非如電報工省費輕商力已足舉辦其借外債而成者僅滬煙沽正副水線而已光緒二十六年外兵方據京津謀設大沽至滬水線宣懷以其侵我主權密向承辦之大東大北公司購歸商局辦理方是時兩公司因利乘便故昂其值中國官商交困復絀於力於是以購價作為息借分三十年償還殆迫於勢之不得已也前外人在中國設線由商股購回者如丹國所設之淞滬旱線德國所設之京沽幹線鐵路至天津支線是也電報非僅達於國內已也必行馳域外而其用益宏於是與外國通線若法若英若俄既訂通線費之約並分訂聯合其價攤分之約以相約束焉電局既日漸擴充尤以培養人才為要電報學堂創於光緒六年嗣分設按報測量高等諸孰以宏造就二十五年並設電話學科以附益之電話初名曰德律風二十五年宣懷疏言德律風創自歐美入手而能用著耳而得聲坐一室而可對百朋隔顏色而可親謦咳此亙古未有之便宜故創行未三十年遍於各國其始止達數十里現已可通數千里新機既闢不可禁遏日本電報德律風統歸遞信省學生教於一堂機器出於一廠中國之有德律風也自英人設於上海租界始近年各處通商口岸洋人紛紛謀設吳淞漢口則請借桿掛線矣厦門則請自行設線矣電報公司竭力堅拒但恐各國使臣將赴總理衙門要求又滋口舌一經應允為患甚巨況西人耽耽逐逐欲攘我電報之權利而未得其間沿江沿海通商各埠若令皆設有德律風他日由短線而達長路由傳聲而兼傳字勢必一縱而不可收拾不特中國電報權利必為所奪而彼之消息更速於我防備不早補救何從現在官款恐難籌措臣與電報各商董再四熟籌惟有勸集華商資本自辦德律風與電報相輔而行自通商各口岸次第開辦再以次及於省會各郡縣庶可預杜彼族覬覦之謀保全電報已成之局報可自是京師天津上海奉天福州廣州江寧漢口長沙太原皆設之此則連類而及者也
