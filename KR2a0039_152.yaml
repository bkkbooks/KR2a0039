body:
  text: 清史稿卷一百五十二志一百二十七交通四郵政海國大通以來異域僑民恆自設信局咸豐十一年訂約駐京公使郵件初與總理衙門交驛代寄同治五年改由總稅務司彙各駐京公使文件遞天津寄上海光緒五年增設封河後由天津至牛莊煙臺鎮江三路郵差迄十一年郵務愈繁總稅務司乃於天津鎮江上海各稅務司處專員理之此總稅務兼理郵遞之權輿也初光緒二年總稅務司英人赫德建議創辦郵政四年始設送信官局於北京天津煙臺牛莊以赫德主其事九江鎮江亦繼設局是為中國試辦郵政之始十六年命通商口岸推廣舉辦十九年北洋大臣李鴻章南洋大臣劉坤一以各國增設各地信局妨推廣之路請速籌善策總署付赫德議二十一年十二月署南洋大臣張之洞疏請舉辦郵政略言泰西各國視郵政重同鐵路特設郵政大臣綜理取資甚微獲利甚巨即以英國而論一歲所收之費當中銀三四千萬兩各國通行莫不視為巨帑且權操於上有所統一利商利民而即以利國近來英法美德日本先後在上海設立彼國郵局其餘各口岸亦於領事署內兼設郵局侵我大權攘我大利實背萬國通例光緒十一年間前浙江寧紹台道薛福成據委員李奎條陳請中國自行設局以挽利權並經稅務司葛顯禮前往香港日本向彼國商議收回上海所設英日兩國郵局已有端倪南洋大臣曾國荃曾據咨總理衙門飭總稅務司赫德議復辦法赫德亦謂此舉為裕國便民大政陳有要端七事並稱須有奏準飭辦之明文使各國皆知係中國國家所設即可商令各國將在中國所設之郵局撤回並可商入萬國信會之舉查各關試辦郵遞有年未能推行及遠外國所設信局並未裁撤良由稅關所辦郵遞與國家所設體制不同故推廣每多窒礙現復與葛顯禮面加籌議知其情形熟悉各關稅務司熟諳辦法者當不乏人請飭總理衙門轉飭赫德妥議章程開辦即推行沿江沿海各省兼及內地水陸各路務令各國將所設信局全撤並與各國聯會彼此傳遞文函互相聯絡如果認真舉行各國在華所設信局必肯裁撤此各國通行之辦法有利無弊誠理財之大端便民之要政也總理衙門疏言光緒二年間赫德因議滇案請設送信官局為郵政發端之始四年擬開設京城天津煙臺牛莊上海五處略仿泰西郵政辦法交赫德管理嗣因各國紛紛在上海暨各口設立郵局慮占華民生計九年德國使臣巴蘭德來請派員赴會十一年曾國荃咨稱州同李圭條陳郵政利益並據寧海關稅務司葛顯禮申稱香港英監督有願將上海英局改歸華關自辦之議十六年三月劄行赫德以所擬辦法無損民局即就通商各口推廣辦理擬俟辦有規模再行請旨定設此各稅關試辦郵遞之始也十八年冬赫德以數年來創辦艱難若再不奏請設立郵政局恐將另生枝節十九年五月李鴻章劉坤一稱江海關道聶緝規稟稱上海英美工部局現議增設各口信局異日中國再議推廣必更維艱考泰西郵政自乾隆初年普國始議代民經理統以大臣位齊卿二各國以為上下交通爭相仿效葛顯禮呈送萬國郵政條例聯約者六十餘國大端以先購圖記紙黏貼信面送局以抵信資其費每封口信重五錢者取銀四分道遠酌加其取資既微又有定期百貨騰跌萬里起居隨時徑達如有事時並可查禁敵國私函誠如張之洞所稱權有統一為利商利民即以利國之要政也溯自十八年以來美國一國郵局清單一紙所收銀圓至六十四兆二十萬九千四百九十圓之多張之洞所舉英國收數當中銀三四千萬兩尚係約略之辭利侔鐵路誠為不虛且西國郵政與電局相輔以火車輪船為遞送近來法國設立公司輪船十艘通名信船遇口停泊信包未到不能開碇其鄭重如此中國工商旅居新舊金山檀香山新嘉坡檳榔嶼古巴祕魯者不下數百萬人往往有一紙家書十年不達者緣郵會有扣阻無約國文函之例也中國郵政若行即以獲資置備輪船出洋藉遞信以流通商貨其挽回利權所關尤巨臣等博訪周咨知為當務之急爰於十九年劄飭赫德詳加討論上年六月至十二月復與總稅務司面商屢次先後據其遞到四項章程計四十四款臣等詳加披閲大致釐然自應及時開辦應請旨敕下臣衙門轉飭總稅務司赫德專司其事仍由臣衙門總其成即照赫德所擬章程定期開辦應製單紙亦由赫德一手經理遇有應行酌改增添之處隨時呈由臣衙門核定務期有利無弊至赫德呈內稱萬國聯約郵政公會係在瑞士國應備照會寄由出使大臣轉交其國執政大臣為入會之據自可援萬國通例轉告各國將所設信局一律撤回以上所議如蒙俞允即由臣衙門欽遵分別咨照劄飭辦理俟辦有頭緒即推行內地水陸各路剋期興辦並咨行沿江沿海及內地各直省將軍督撫知照屆期即將簡要辦法飭地方州縣曉諭商民咸知利便凡有民局仍舊開設不奪小民之利並準赴官局報明領單照章幫同遞送期與各電局相為表𩹉其江海輪船及將來鐵路所通處所應如何交寄文信由總稅務司與各局員會商辦理官郵政局歲入暨開支款目由總稅務司按結申報臣衙門彙核奏報奉旨如所議行此開辦郵政之始末也自是遍通全國上下交受其利其郵政區域北部東起朝鮮渤海西訖新疆青海北起西比利亞蒙古南訖江蘇湖北四川而盛京吉林黑龍江直隸山東山西河南陝西甘肅括焉中部東起浙江福建西訖西藏雲南北起安徽陝西河南甘肅南訖廣東廣西雲南而江西湖北湖南四川貴州括焉東部即長江下遊東起黃海西訖湖北江西北起山東河南南訖福建而江蘇安徽浙江括焉南部東起臺灣西訖緬甸北起江西貴州湖南四川南訖越南而福建浙江廣東廣西雲南括焉其郵局則總局副總局分局支局代辦處總計六千二百又一其郵路里數則郵差郵路民船郵路輪船郵路火車郵路總計三十八萬一千里每面積百里通郵線路七里又四九其郵件則通常特種總計三萬萬六千二百二十一萬六千二百三十九其包裹則通常特種總計件數三百零二萬二千八百七十二重量一千零六萬零四百三十三啓羅其匯兌則旱匯局火匯局總計七百五十八匯入銀數三百九十三萬六千兩兌出銀數三百九十八萬四千二百兩總計銀數七百九十二萬零二百兩歲入經常二百五十二萬八千五百餘兩臨時六百八十三萬五千八百餘兩歲出經常二百八十二萬七千八百餘兩臨時六百四十六萬六千五百餘兩出入兩抵實盈六萬九千九百餘兩此據宣統三年統計也其各國郵局設於中國各口岸者英國則上海天津漢口煙臺福州厦門廣州汕頭寧波九處德國則上海北京天津漢口煙臺福州厦門廣州汕頭南京濟南青島宜昌鎮江十四處法國則上海北京天津漢口煙臺福州厦門廣州寧波重慶瓊州北海龍州蒙自十四處日本國則上海北京天津漢口煙臺福州厦門廣州汕頭重慶南京牛莊唐沽沙市蘇州杭州十六處美國則上海一處俄國則上海北京天津漢口煙臺五處此其大略也
