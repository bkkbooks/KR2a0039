body:
  text: 清史稿卷一百五十三志一百二十八邦交一中國古重邦交有清盛時諸國朝聘皆與以禮自海道大通而後局勢乃一變其始葡萄牙和蘭諸國假一席之地遷居貿易來往粵東英法美德諸大國連袂偕來鱗萃羽集其意亦僅求通市而已洎乎道光己亥禁煙釁起倉猝受盟於是畀英以香港開五口通商嗣後法蘭西美利堅瑞典那威相繼立約而德意志和蘭日斯巴尼亞義大里奧斯馬加葡萄牙比利時均援英法之例訂約通商海疆自此多事矣俄羅斯訂約在康熙二十八年較諸國最先日本訂約在同治九年較諸國最後中國逼處強鄰受禍尤烈其他若祕魯巴西剛果墨西哥諸小邦不過尾隨大國之後無他志也咸豐庚申之役聯軍入都乘輿出狩其時英法互起要求當事諸臣不敢易其一字講成增約其患日深至光緒甲午馬關之約喪師割地忍辱行成而列強據利益均霑之例乘機攘索險要盡失其尤甚者則定有某地不得讓與他國之條直以中國土疆視為己有辱莫大焉庚子一役兩宮播遷八國連師勢益不支其不亡者幸耳夫中國幅員之廣遠軼前古幽陵交址之衆流沙蟠木之屬莫不款關奉贄同我版圖乃康乾以來所力征而經營者任人蠶食置之不顧西則浩罕巴達克山諸部失之於俄南則越南緬甸失之英法東則琉球朝鮮失之日本而朔邊分界喪地幾近萬里守夷守境之謂何此則尤令人痛心而疾首者也爰志各國邦交始末以備後人之考鏡焉俄羅斯俄羅斯地跨亞細亞歐羅巴兩洲北境清初俄東部有羅剎者由東洋海岸收毳礦之貢抵黑龍江北岸據雅克薩尼布楚二地樹木城居之侵擾諸部嗣又越興安嶺南向侵掠布拉特烏梁海四佐領崇德四年大兵再定黑龍江毀其城兵退而羅剎復城之順治中屢遣兵驅逐以餉不繼而返十二年及十七年俄察罕汗兩附貿易人至京奏書然不言邊界事康熙十五年帝召見其商人尼果賚貽書察罕汗令管束羅剎毋擾邊陲既而羅剎復肆擾帝命黑龍江將軍薩布素圍雅克薩城會荷蘭貢使至乃賜書付荷蘭轉達其汗二十五年九月其新察罕汗復書至言中國前屢賜書本國無能通解者今已知邊人搆釁之罪自當嚴治即遣使臣詣邊定界請先釋雅克薩之圍許之遂詔薩布素退師二十八年冬十二月與俄定黑龍江界立約七條先是俄使臣費嶽多羅額里克謝等由陸路至喀爾喀土謝圖汗境文移往復至是始與領侍衛內大臣索額圖等會議於黑龍江一循烏倫穆河相近格爾必齊河上游之石大興安嶺以至於海凡山南流入黑龍江之溪河盡屬中國山北溪河盡屬俄一循流入黑龍江之額爾古訥河為界南岸盡屬中國北岸盡屬俄乃歸中國雅克薩尼布楚二城定市於喀爾喀東部之庫倫立石於黑龍江兩岸刊泐會議條款用滿漢拉提諾蒙古俄羅斯五體文字是為尼布楚條約自後貿易之使每歲間歲一至未嘗稍違節制三十三年遣使入貢時有二犯逃入俄俄遣人送回理藩院行文奬之遂復遣使入貢帝閲其章奏諭大學士曰外藩朝貢雖屬盛事恐傳至後世未必不因此反生事端總之中國安寧則外釁不作故當以培養元氣為根本要務三十九年遣使齎表至雍正五年秋九月與俄訂恰克圖互市界約十一條俄察罕汗卒後其妃代臨朝為叩肯汗遣使臣薩瓦暨俄官伊立禮與理藩院尚書圖禮善喀爾喀親王策淩在恰克圖議定喀爾喀北界自楚庫河以西沿布爾固特山至博移沙嶺為兩國邊境而互市於恰克圖議定陳兵鳴炮謝天立誓是月定俄人來京就學額數俄國界近大西洋者崇天主教其南境近哈薩克者崇回教其東境近蒙古者崇佛教康熙間嘗遣人至中國學喇嘛經典並遣子弟入國子監習滿漢語言文字居舊會同館以滿漢助教各一人教習之至是定俄人來學喇嘛者額數六人學生額數四人十年更代為例乾隆二十三年春正月俄人獻叛人阿睦爾撒納尸初厄魯特輝特部阿睦爾撒納背準噶爾來附帝封為親王命副定北將軍班第征準噶爾降其部衆已復叛歸逃入俄索之以渡河溺死聞既而患痘死遂移尸至恰克圖來獻未幾厄魯特台吉舍楞戕中國都統唐喀祿叛逃入俄索之又不與絶其恰克圖貿易三十年秋八月俄綽爾濟喇嘛丹巴達爾扎等請附又恐俄人追索中國擒送遣人來探瑚圖靈阿以聞帝命納之三十三年秋八月復俄恰克圖互市理藩院設庫倫辦事大臣掌之四十四年再停互市次年復之五十四年又以納叛人閉市嚴禁大黃茶葉出口俄人復以為請五十七年乃與訂恰克圖市約五條嘉慶七年秋七月喀爾喀親王蘊端多爾濟請巡查恰克圖兩國邊界帝命逾十年與庫倫辦事大臣輪次往查十年冬十二月俄商船來粵請互市不許道光二十五年俄進呈書籍三百餘種二十八年俄商船來上海求互市不許初嘉道間俄由黑海沿𩹉海南侵游牧各回部英吉利既據東南兩印度漸拓及溫都斯坦而北於是嶺西自布哈爾浩罕諸部皆併於俄夾恆河城郭回國半屬於英英俄邊界僅隔印度歌士一大山連年爭戰俄思結援中國遣使約中國以兵二萬由緬甸西藏夾攻印度事未行英旋助土耳其與俄戰始講和而罷逮江寧撫議定法美未與議者亦照英例並在五口通商而俄人自嘉慶十一年商船來粵駮回後至是有一船亦來上海求市經疆臣奏駮後遂有四國聯盟合從稱兵之事咸豐元年俄人請增伊犂塔爾巴哈台喀什噶爾互市經理藩院議允伊塔而拒喀什噶爾文宗即位命伊犂將軍奕山等與之定約成通商章程十七條三年俄人請在上海通商不許又請立格爾畢齊河界牌許之至五年俄帝尼哥拉斯一世始命木喇福嶽福等來畫界先是木喇福嶽福至莫斯科議新任地諸事以為欲開西伯利亞富源必利用黑龍江航路欲得黑龍江航路則江口及附近海岸必使為俄領而以海軍協力助之俄帝遂遣海軍中將尼伯爾斯克為貝加爾號艦長使視察堪察加鄂霍次克海兼黑龍江探險之任與木喇福嶽福偕乘船入黑龍江由松花江下駛即請在松花江會議八月開議以三款要求既指地圖語我謂格爾畢齊河起至興安嶺陽面各河止俱屬俄界而請將黑龍江松花江左岸及海口分給俄又以防備英法為辭且登岸設炮逼遷屯戶迭由奕山景淳與之爭議迄不能決六年四月俄人復率艦隊入黑龍江七年木喇福嶽福歸伊爾庫次克時英法聯軍與中國開釁俄人乘英國請求遣布恬廷為公使來議國境及通商事宜中國拒之布恬廷遂下黑龍江由海道進廣東與英法美公使合致書大學士裕誠請中國派全權大臣至上海議事答以英法美三國交涉事由廣東總督辦理俄國交涉事由黑龍江辦事大臣辦理布恬廷乃與三國公使進上海木喇福嶽福乘機擴地於黑龍江左岸並廣築營舍遣使詰責則答以與俄公使在上海協商尋遣使告黑龍江將軍奕山在愛琿議界奕山遂迎木喇福嶽福至愛琿會議木喇福嶽福要求以黑龍江為兩國國境提出條件明年四月遂定愛琿條約先劃分中俄東界將黑龍江松花江左岸由額爾古訥河至松花江海口為俄界右岸順江流至烏蘇里河為中國界由烏蘇里河至海之地有接連兩國界者兩國共管之於是繪圖作記以滿漢俄三體字刊立界碑時英法聯軍已陷大沽炮臺俄與美藉口調停因欽差大臣桂良與英法締約遂援例增通商七海口初中俄交涉向由理藩院行文至是往來交接用與國禮前限制條款悉除焉是年議結五年塔爾巴哈臺焚俄貨圈案俄屢索償至是以茶箱貼補之九年五月俄遣伊格那提業福為駐北京公使十年秋中國與英法再開戰聯軍陷北京帝狩熱河命恭親王議和伊格那提業福出任調停恭親王乃與英法訂北京和約伊格那提業福要中國政府將兩國共管之烏蘇里河以東至海之地域讓與俄以為報十月與訂北京續約其重要者一兩國沿烏蘇里河松阿察河興凱湖白琳河瑚布圖河琿春河圖們江為界以東為俄領以西為中國領二西疆未勘定之界此後應順山嶺大河及中國常駐卡倫等處立標為界自雍正五年所立沙賓達巴哈之界碑末處起往西直至齊桑淖爾湖自此往西南順天山之特穆爾圖淖爾南至浩罕邊境為界三俄商由恰克圖到北京經過庫倫張家口地方准零星貿易庫倫設領事官一員四中國許喀什噶爾試行貿易十一年夏五月倉場侍郎成琦與俄人勘分黑龍江東界秋七月俄設領事於漢陽八月俄人進槍炮是年俄人請進京貿易不許後援英法例改至天津同治元年春二月與俄訂陸路通商章程俄人初意欲納稅從輕商蒙古不加限制張家口立行棧經關隘免稽查總署以俄人向在恰克圖等處以貨易華茶出口今許其進口貿易宜照洋關重稅免礙華商生計又庫倫為蒙古錯居之地其為庫倫大臣所屬者向止車臣汗圖什業圖汗等地此外各游牧處所地曠族繁不盡為庫倫大臣所轄若許俄隨地貿易稽查難周又張家口距京伊邇嚴拒俄商設立行棧久之始定章程二十一款於天津續增稅則一冊三月俄人以喀什噶爾不靖請暫移阿克蘇通商不許時俄人在伊犂屬瑪呢圖一帶私設卡倫阻中國赴勒布什之路復於沙拉托羅海境率兵攔阻查邊人聲稱哈薩克布魯特為其屬國又於各卡倫外壘立鄂博烏里雅蘇台將軍明誼等詰責之不聽八月明誼等與俄人會議地界俄使以續約第二條載有西疆尚在未定之界此後應順山嶺大河之流及現在中國常駐卡倫之語執為定論並出設色地圖欲將卡外地盡屬俄國明誼等以為條約內載自沙賓達巴哈界牌末處起至浩罕邊為界袤延萬里其中僅有三處地名未詳逐段立界之處況條約內載現在中國常駐卡倫等處並無為界之語自不當執以為詞屢與辨論不省忽遣兵隊數百人執持器械炮車於伊犂卡倫附近伐木滋擾是月俄人請派兵船至滬助剿粵賊許之十月俄人復進槍炮是年俄人越界盜耕黑龍江右岸地畝詰之二年四月俄官布色依由海蘭泡遣人到齊齊哈爾省城借用驛馬並求通商請假道前往吉林自松花江回國黑龍江將軍特普欽以非條約所載不許是月俄人復遣兵隊數百人至塔爾巴哈台巴克圖卡倫住牧中國諭令撤回不聽又遣隊往伊犂科布多又派兵數千分赴齊桑淖爾等地耕種建屋遣兵四出潛立石壘為將來議界地步明誼等議籌防並與交涉不省五月俄人以哈薩克兵犯伊犂博羅胡吉爾卡倫擊之始退六月復來犯沿邊卡倫復擊之七月俄使進議單仍執條約第二款為辭又以條約所載西直字為西南字誤必欲照議單所指地名分界不許更易乃許照議單換約於是烏里雅蘇台將軍明誼上言照議單換約實與烏梁海蒙古及內服之哈薩克布魯特並伊犂距近邊卡居住之索倫四愛曼人等生計有妨請籌安插各項人衆及所有生計廷諭令與俄人議須使俄人讓地安插及中國人照舊游牧俄人仍不許三年秋八月俄人復遣兵進逼伊犂卡倫九月俄使雜哈勞至塔爾巴哈台與明誼會仍執議單為詞時新疆回氛甚熾朝廷重開邊釁遂照議單換約綜計界約分數段一為烏里雅蘇台所屬地即烏城界約所立為八界牌者自沙賓達巴哈起往西南順薩彥山嶺至唐努額拉達巴哈西邊末處轉往西南至賽留格木山嶺之柏郭蘇克山為止嶺右歸俄嶺左歸中國二為科布多所屬地即科城界約所立牌博二十處者自柏郭蘇克山起向西南順賽留格木山嶺至奎屯鄂拉即往西行沿大阿勒台山至海留圖河中間之山轉往西南順此山直至察奇勒莫斯鄂拉轉往東南沿齊桑淖爾邊順喀喇額爾齊斯河岸至瑪呢圖噶圖勒幹卡倫三為塔