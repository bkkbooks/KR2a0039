初分界在伊犁迤西並無西湖之名西湖係烏魯木齊所屬軍隊原由總署與俄使議有大略何可阻止拒之時榮全將帶兵由塔赴伊安設台站俄人以越俄國兵所占地不許又阻榮全接濟錫伯銀兩十月俄商赴瑪納斯貿易中途被殺傷五十餘人十二年夏四月俄人忽帶兵及哈薩克漢回等衆入晶河土爾扈特遊牧索哈薩克所失馬並執貝子及固山達保來綽囉木等又修治伊犁迤東果子溝大路更換錫伯各官圖東犯又於塔爾巴哈台所屬察罕鄂博山口駐兵盤詰往來行旅十三年八月俄人自庫倫貿易入烏里雅蘇台建房詰以非條約所載不省旋命陝甘總督左宗棠督辦新疆軍務光緒元年夏五月俄游歷官索思諾等來蘭州言奉國主之命欲與中國永敦和好俟中國克復烏魯木齊瑪納斯即便交還左宗棠以聞既而左宗棠以新疆與俄境毗連交涉事繁請旨定奪帝命左宗棠主辦三年議修陸路通商章程俄使布策欲於伊犁未交之先通各路貿易中國不允僅允西路通商而仍以交收伊犁與商辦各事並行為言俄人又以榮全張示激伊犁人民不遵俄令烏里雅蘇台官吏擅責俄人江海關道扣留俄船英廉擅殺哈薩克車隆及徵收俄稅指為違約謂非先議各事不可會新疆南路大捷各城收復回匪白彥虎等竄入俄中國援俄約第八款請其執送屢與理論未決四年五月命吏部左侍郎崇厚使俄議還伊犁及交白彥虎諸事十二月抵俄五年二月與俄外部尚書格爾斯開議格爾斯提議三端一通商一分界一償款而通商分界又各區分為三通商之條一由嘉峪關達漢口稱為中國西邊省分聽其貿易一烏魯木齊塔爾巴哈台伊犁喀什噶爾等處稱為天山南北各路妥議貿易章程一烏里雅蘇台科布多等處稱為蒙古地方及上所舉西邊省分均設立領事分界之條展伊犁界以便控制回部一更定塔爾巴哈台界以便哈薩克冬夏游牧一新定天山迤南界以便俄屬浩罕得清界線崇厚皆允之惟償款數目未定崇厚以聞命塔爾巴哈台參贊大臣錫綸接收伊犁及分界各事既議償款盧布五百萬圓俄亦遣高復滿等為交還伊犁專使崇厚將赴黑海畫押回國而恭親王奕欣等以崇厚所定條發損失甚大請飭下李鴻章左宗棠沈葆楨金順錫綸等將各條分別酌核密陳於是李鴻章等及一時言事之臣交章彈劾而洗馬張之洞抗爭尤力略謂新約十八條其最謬妄者如陸路通商由嘉峪關西安漢中直達漢口秦隴要害荊楚上游盡為所窺不可許者一東三省國家根本伯都訥吉林精華若許其乘船至此即與東三省任其游行無異是於綏芬河之西無故自蹙地二千里且內河行舟乃各國歷年所求而不得者一許俄人效尤踵至不可許者二朝廷不爭稅課當恤商民若準回兩部蒙古各盟一任俄人貿易概免納稅華商日困且張家口等處內地開設行棧以後逐漸推廣設啓戎心萬里之內首尾銜接不可許者三中國屏藩全在內外蒙古沙漠萬里天所以限夷狄如蒙古全站供其役使一旦有事音信易通必撤藩屏為彼先導不可許者四條約所載俄人准建卡三十六延袤廣大無事而商往則譏不勝譏有事而兵來則禦不勝禦不可許者五各國商賈從無許帶軍器之例今無故聲明人帶一鎗其意何居不可許者六俄人商稅種種取巧若各國希冀均霑洋關稅課必至歲絀數百萬不可許者七同治三年新疆已經議定之界又欲內侵斷我入城之路新疆形勢北路荒涼南城富庶爭磽瘠棄膏腴務虛名受實禍不可許者八伊犁塔爾巴哈台科布多烏里雅蘇台喀什噶爾烏魯木齊古城哈密嘉峪關等處准設領事官是西域全疆盡由出入且各國通例惟沿海口岸准設外邦領事若烏里雅蘇台等乃我邊境今日俄人作俑設各國援例又將何以處之不可許者九名還伊犁而三省山嶺內卡倫以外盤踞如故割霍爾果斯河以西格爾海島以北金頂寺又為俄人市廛約定俄人産業不更交還地利盡失不可許者十又言改議之道一在治崇厚以違訓越權之罪一在請諭旨將俄人不公平臣民公議不願之故布告中外行文各國使評曲直一在據理力爭使知使臣畫押未奉御批示覆不足為據一在設新疆吉林天津之防以作戰備疏入命與修撰王仁堪等及庶吉士盛昱所奏併交大學士等議並治崇厚罪六年正月命大理寺少卿曾紀澤為使俄大臣續議各款時廷臣多主廢約曾紀澤以為廢約須權輕重因上疏曰伊犁一案大端有三曰分界曰通商曰償款三端之中償款固其小焉者也即通商一端亦較分界為稍輕查西洋定約之例有二一則長守不渝一可隨時修改長守不渝者分界是也分界不能兩全此有所益則彼有所損是以定約之際其慎其難隨時修改者通商是也通商之損益不可逆睹或開辦乃見端倪或久辦乃分利弊是以定約之時必商定年限修改所以保其利而去其弊也俄約經崇厚議定中國誠為受損然必欲一時全數更張而不別豫一途以為轉圜之路似亦難降心以相從也臣以為分界既屬永定自宜持以定力百折不回至於通商各條惟當即其太甚者酌加更易餘者宜從權應允時俄人以中國治崇厚罪增兵設防為有意尋釁欲拒紀澤不與議事英法二使各奉本國命亦以因定約治使臣罪為不然代請寬免中國不得已允減崇厚罪詔仍監禁已又與俄使凱陽德先議結邊界各案六年七月紀澤抵俄侍郎郭嵩燾疏請準萬國公法寬免崇厚罪名紀澤亦請釋崇厚許之初紀澤至俄俄吉爾斯布策諸人咸以非頭等全權大臣欲不與議遣布策如北京議約已成行而朝旨以在俄定議為要命紀澤向俄再請始追回布策紀澤與議主廢約俄人挾崇約成見屢與忤紀澤不得已乃遵總署電謂可緩索伊犂全廢舊約尋接俄牒允還帖克斯川餘不容議布策又欲俄商在通州租房存貨及天津運貨用小輪船拖帶紀澤以非條約所有拒之而改約事仍相持不決十一月俄牒中國允改各條其要有七一交還伊犂二喀什噶爾界務三塔爾巴哈台界務四嘉峪關通商允許俄商由西安漢中行走直達漢口五松花江行船至伯都訥六增設領事七天山南北路貿易納稅曾紀澤得牒以俄既許讓則緩索之說自可不議於是按約辨論於伊犁得爭回南境喀什噶爾得照兩國現管之地派員再勘塔爾巴哈台得於崇厚明誼所訂兩界之間酌中勘定嘉峪關通商得仿照天津辦理西安漢中兩路及漢口字均刪去松花江行船因愛琿條約誤指混同江為松花江又無畫押之漢文可據致俄人歷年藉口久之始允將專條廢去聲明愛琿舊約如何辦法再行商定增設領事俄人請設烏魯木齊一處總署命再商改始將烏魯木齊改為吐魯番餘俟商務興盛時再議增設天山南北路貿易納稅將原約均不納稅字改為暫不納稅俟商務興盛再訂稅章此外償發崇厚原約償五百萬盧布俄人以伊犁南境既已讓還欲倍原數久之始允減定為盧布九百萬紀澤又以此次改約並未用兵兵費之名絶不能認於是將歷年邊疆腹地與俄人未結之案有應賠應恤者一百九案併入其中作為全結又於崇厚原訂俄章字句有所增減如條約第三條刪去伊犁已入俄籍之民入華貿易游歷許照俄民利益一段第四條俄民在伊犁置有田地照舊管業聲明伊犁遷出之民不得援例且聲明俄民管業既在貿易圈外應照中國民人一體完納稅餉並於第七條伊犁西境安置遷民之處聲明係安置因入俄籍而棄田地之民第六條寫明所有前此各案第十條吐魯番非通商口岸而設領事暨第十三條張家口無領事而設行棧均聲明他處不得援以為例第十五條修約期限改五年為十年章程第二條貨色包件下添注牲畜字樣其無執照商民照例懲辦改為從嚴罰辦第八條車腳運夫繞越捷徑以避關卡查驗貨主不知情分別罰辦之下聲明海口通商及內地不得援以為例是為收回伊犂條約又同時與俄訂陸路通商章程七年正月與俄外部尚書吉爾斯及前駐京使臣布策在俄都畫押鈐印旋批准換約七月賀俄君即位遞國書索逆犯白彥虎等俄以白彥虎等犯係屬公罪不在條約所載之列不允交還允嚴禁尋命伊犂將軍金順參贊大臣升泰接收伊犂八年二月接收訖金順進駐綏定城升泰會同俄官勘分地界並以哈密幫辦大臣長順會辦西北界務巴里坤領隊大臣沙克都林扎布會辦西南界務四月俄人帶兵潛入科布多所屬哈巴河清安等以聞因言圖內奎峒山黑伊爾特什河薩烏爾嶺等處形勢與積年新舊圖說不符朝旨命就原圖應勘之處力與指辨酌定新界十一月分界大臣長順等與俄官佛哩德勘分伊犂中段邊界先是距那林東北百餘里之格登山有高宗平準噶爾銘勳碑同治三年已畫歸俄至是爭回立界約三條九年督辦新疆軍務大臣劉錦棠以新疆南界烏什之貢古魯克地為南北要津請按約索還先是舊約所載伊犂南界係指貢古魯克山頂而言上年沙克都林扎布與俄使勘分南界由貢古魯克等處卡倫繞貢古魯克山麓至別里達坂設立界牌侵占至畢底爾河源故錦棠以為言朝旨命長順等據理辨論既而沙克都林扎布又與俄官咩登斯格勘伊犂南界俄人必欲以薩瓦巴齊為界沙克都林扎布以為薩瓦巴齊在天山之陽距天山中梁尚遠不許乃以天山中梁為界又立牌博於別里達坂是為喀什噶爾界約七月分界大臣升泰等與俄官巴布闊福等勘分科塔界務巴布闊福等欲照圖中直線以哈巴河為界升泰等以哈巴河地居上游為科境之門戶塔城之藩籬若劃分歸俄不惟原住之哈薩克蒙民等無地安插即科屬之烏梁海塔屬之土爾扈特等處游牧之所亦俱受逼界址既近釁端必多拒之俄使乃允退離哈巴河迤西約八十餘里之畢里克河劃分升泰等以畢里克係小河原圖並未繪刊若以此劃界則哈巴河上游仍為俄所占復與力爭俄使乃允復退出五十里議定在於阿拉喀別克河為界計距哈巴河至直線共一百三十餘里即原圖黃線之旁所開之小河也餘均照黃線所指方位劃分至兩國所屬之哈薩克願歸俄者歸俄願歸中國者歸中國如有人歸中國而産業在俄或人居俄而産業在中國均照伊犁辦法以此次議定新界換約日為始限一年遷移約定又與俄官斐里德勘塔城西南未分之界俄使意欲多分升泰以此段界務新約第七條內業經指明係順同治三年塔城界約所定舊界即原約第二條內所指依額爾格圖巴爾魯克莫多巴爾魯克等處卡倫之路辦理是原有圖線條約可循非若他處尚須勘酌議分可比不許俄使乃以巴爾魯克山界內住牧之哈薩克久已投俄一經定界不免遷移請借讓安插許之仍援舊約第十條所開塔屬原住小水地方居民之例限十年外遷隨立牌博九月分界大臣額爾慶額等與俄官撇斐索富勘分科布多界自阿拉克別克河口之喀拉素畢業格庫瑪小山梁起至塔木塔克薩斯止共立牌博四又立牌博於阿克哈巴河源先是喀什噶爾西邊界務已經長順與俄人劃分以依爾克池他木為界而幫辦軍務廣東陸路提督張曜以為有誤請飭覆查長順以勘界係依紅線依爾克池他木雖舊圖不載而新圖正在紅線界限不容有誤尋總署以約內有現管為界一語意曾紀澤定約時必因新圖不無縮入又知左宗棠咨報克復喀城有占得安集延遺地邊界展寬之說故約內添此一語既以現管為界即可不拘紅線仍命長順與爭俄人以喀拉多拜帖列克達灣屯木倫三處雖現為中國所管然均在線外百數十里執不允仍依紅線履勘自喀克善山起至烏斯別山止共立牌博二十二指山為界者七遂定議是為續勘喀什噶爾界約是年塔爾巴哈台參贊大臣錫綸與俄人會議俄商在塔貿易新圈地址十年三月塔爾巴哈台參贊大臣錫綸與俄人會定哈薩克歸附條約凡在塔城境內混居之哈薩克提爾賽哷克部拜吉格特部賽波拉特部托勒圖勒部滿必特部柯勒依部圖瑪台部各大小鄂拓克約五千餘戶除願遷回俄境外其自願歸中國者一千八百戶均由中國管轄並訂管轄條發七月法因越南與中國開釁法人請俄國保護在華之旅人教士及一切利益俄使允保護牒中國十一年三月總署以吉林東界牌博中多舛錯年久未修請簡大員會勘據約立界先是俄人侵占琿春邊界將圖們江東岸沿江百餘里誤為俄國轄地並於黑頂子安設俄卡招致朝鮮流民墾地前督辦寧古塔等處事宜吳大澄請飭查令俄人交還朝廷乃命吳大澄等為欽差大臣與俄人訂期會勘大澄等以咸豐十年北京條約中俄東界順黑龍江至烏蘇里河及圖們江口所立界牌有俄國阿巴瓦噶達耶熱皆伊亦喀拉瑪那倭怕啦薩土烏十二字頭十一年成琦勘界圖內尚有伊亦喀拉瑪那倭怕啦薩土烏十二字頭何以官界記文內僅止耶亦喀拉那倭怕土八字頭圖約不符又界牌用木難經久應請易石及補立界牌又以俄人所占黑頂子地即在土字界牌以內尤為重要又以自琿春河源至圖們江口五百餘里處處與俄接壤無一界牌又成琦所立界牌八處惟土字一牌之外尚有烏字一牌以交界記文而論圖們江左邊距海不過二十里立界牌一上寫俄國土字頭是土字一牌已在交界盡處更無補立烏字界牌之地二者必有一誤又補立界牌無論烏字土字總以圖們江左邊距海二十里之地為斷十二年夏吳大澄等赴俄境岩杵河與俄勘界大員巴啦諾伏等商議界務大澄等首議補立土字界牌因咸豐十一年所立土字界牌之地未照條約記文江口相距二十里之說大澄等與之辨論俄員以為海灘二十里俄人謂之海河除去海河二十里方是江口大澄等以為江口即海口中國二十里即俄國十里沙草峰原立土字界牌既與條約記文不符此時即應更正巴啦諾伏仍以舊圖紅線為詞久之始允於沙草峰南越嶺而下至平岡盡處立土字牌又於舊圖內拉字那字兩牌之間補立瑪字界牌條約內怕字土字兩牌之間補立啦薩二字界牌悉易以石又於界牌相去甚遠之處多立封堆或掘濠為記至俄人所占黑頂子地亦允交還大澄等又以寧古塔境內倭字那字二界牌與記文條約不符請更正緣倭字界牌本在瑚布圖河口因當時河口水漲木牌易於衝失權設小孤山頂離河較遠大澄等以為若以立牌之地即為交界之所則小孤山以東至瑚布圖河口一段又將割為俄地乃與巴啦諾伏議定將倭字石界牌改置瑚布圖河口山坡高處那字界牌原在橫山會處距瑚布圖河口百餘里僅存朽爛木牌二尺餘因易以石仍立橫山會處迤西即係小綏芬河源水向南流處又於交界處增立銅柱是為中俄琿春東界約是年俄莫斯克瓦商人欲攜貨赴科布多哈密肅州甘州涼州蘭州等處貿易中國以科布多哈密肅州皆係條約訂明通商處所自可前往甘州涼州蘭州係屬內地非條約所載不許十四年俄人在烏梁海所屬掘金開地建房阻之不聽十五年俄人越界入黑龍江所屬以刈草為名搭棚占地總署以詢北洋大臣李鴻章鴻章請但許刈草不許搭棚切與要約以示限制從之十六年俄商請照約由科布多運貨回國許之初俄商由陸路運貨回國舊章祗有恰克圖一路光緒七年改訂新約許由尼布楚科布多兩路往來運貨至是許由科布多行走其收繳執照諸辦法由科布多參贊大臣派員查驗是年出使大臣洪鈞以俄人在恰克圖境穴地取金請自設廠掘金不果俄人又勾結藏番私相餽贈十七年俄遣兵至海參崴開辦鐵路是年俄太子來華游歷命李鴻章往煙台發接初俄欲中國簡親藩接待未允乃遣鴻章往有加禮十八年與俄人議接琿春海蘭泡陸路電線先是中國陸路電線創自光緒六年惟丹國大北公司海線先於同治十年由香港廈門迤邐至上海一通新加坡檳榔嶼以達歐洲名為南線一通海參崴由俄國亞洲旱線以達歐洲名為北線俄丹早有連線之約嗣丹復與英合辦水線逮各省自設陸線併拆去英丹在滬粵已成之陸線逮中國吉林黑龍江線成與俄之東海濱境內近接大北公司等深慮中俄線接分奪其利屢起爭議至是命鴻章與俄使喀希呢議約酌擬滬福廈港公司有水線處不與爭減此外各口電價亦不允水線公司爭減遂定議是為中俄邊界陸路電線相接條約是年俄入帕米爾帕米爾高原在中國回疆邊外舊為中國所屬自俄英分爭而迤北迤西稍稍歸屬於俄迤南小部則附於英屬之阿富汗惟東路中路久服中國迄今未變俄欲取帕米爾以通印度英人防之以劃清阿富汗邊界為辭欲使中國收轄帕境中間之地勘明界址俄人亦欲會同中國勘界分疆不使英與聞至是俄兵入帕英領事璧利南以從前英俄立約喀什噶爾阿富汗之間並無俄地願出作證又據所繪圖力闢俄圖俄人不顧欲以郎庫郎里湖為界移軍而南將據色勒庫爾色勒庫爾乃莎車境益逼近新疆南境陝甘總督楊昌濬請設防許之既因出使大臣洪鈞所繪地圖有誤李鴻章據薛福成所寄圖謂喀約既稱烏斯別里南向係中國地界自應認定南向二字方合若無端插入轉東二字所謂謬以千里況烏斯別里為蔥嶺支脈如順山梁為自然界以變一直往南之說不特兩帕盡棄喀什噶爾頓失屏蔽葉爾羌西藏等全撤藩籬且恐後此藉口於交界本循山脊而行語更寬混尤難分劃此固萬難允也如彼以喀約語太寬混為辭擬仿照北亞墨利加英美用經緯度分界之法以烏斯別里山口之經線為界北自烏斯別里山口一直往南至阿富汗界之薩雷庫里湖為止方與經線相合如此則大帕米爾可得大半小帕米爾全境俱在線內其簡當精確更勝於自然界而與原議之約亦相符合則阿里楚爾山環三面惟東一面與喀境毗連界亦自然何彼竟舍外之山梁而專用內之山梁以求多占地界耶議久不決是年俄茶在戈壁被焚索償允由攬運俄茶之人分償俄使欲公家代償不允十九年四月議收俄國借地初俄借塔爾巴哈台所屬之巴爾魯克山給所屬哈薩克游牧限十年遷回至是限滿伊犂將軍長庚請遣員商辦俄人請再展十年不許久之俄始允還地遷民遂立交山文約聲明限滿不遷即照人隨地歸之約又續立收山未盡事宜文約以清釐兩屬哈薩克缺債及盜牲畜等事二十年與俄復議帕界俄初欲據郎庫里阿克塔什出使大臣許景澄以此為中國地力爭不許既而俄允於色勒庫爾山嶺之西請中國指實何地相讓中國仍以自烏仔別里至薩雷庫里湖為言俄人不允總署欲改循水為界擬循阿克拜塔爾河南踰阿克蘇河東南循河至阿克塔什平地轉向西南循伊西提克河直至薩雷庫里湖各將分界水名詳仍未決是年俄嗣皇即位遣布政使王之春為專使往賀明年春與日本講成割臺灣及遼河以南地俄聯法德勸阻遼南割地日本不允俄忽調戰艦赴煙台日本允還遼惟欲於二萬萬外加償費俄皇特命戶部大臣威特見出使大臣許景澄云欲為中國代借巨款俾早日退兵許景澄以聞總署命與俄商辦遂訂借法銀四萬萬佛郎以海關作保年息四釐分年償還是為中俄四釐借款合同九月俄人分赴東三省勘路初俄興造悉畢爾鐵路欲在滿洲地方借地接修總署議自俄境入華境以後由中國自造十月俄水師輪船請暫借山東膠澳過冬許之山東巡撫李秉衡上言煙台芝罘島並非不可泊船膠州向非通商口岸應請飭俄使進泊後退出須定期限報可十二月賞俄使喀希呢及法德二使頭等第三寶星二十二年四月俄皇尼哥拉斯二世加冕命李鴻章為專使王之春為副使贈俄皇頭等第一寶星九月與俄訂新約時李鴻章尚未回國俄使喀希呢特密約求總署奏請批准約成俄使貴族塢多穆斯契以報謝加冕使來北京議立華俄銀行遂命許景澄與俄結華俄道勝銀行契約中國出股本銀五百萬兩與俄合辦別立中國東省鐵路公司又立條例九章其第二章銀行業務之第十項規定對於中國之業務一領收中國內之諸稅二經營地方及國庫有關係之事業三鑄造中國政府允許之貨幣四代還中國政府募集公債之利息五布設中國內之鐵道電線並訂結東清鐵道會社條約以建造鐵路與經理事宜悉委銀行二十三年十一月俄以德占膠州灣為口實命西伯利亞艦隊入旅順口要求租借旅順大連二港且求築造自哈爾濱至旅順之鐵道權十二月俄以兵入金州城徵收錢糧阻之不省鄉民聚衆抗拒俄人遂於貔口槍斃華民數十奉天將軍依克唐阿以聞命出使大臣楊儒迅與俄人商辦議久不決俄皇謂許景澄曰俄船借泊一為膠事二為度冬三為助華防護他國占據景澄再與商不應二十四年二月命許景澄專論旅大俄船借泊及黃海鐵路事俄以德既占膠州各國均有所索俄未便不租旅大又鐵路請中國許東省公司自鴨緑江至牛莊一帶水口擇宜通接限三月初六日訂約過期俄即自行辦理詞甚決絶既而俄提督率兵登岸張接管旅大示限中國官吏交金州城中國再與交涉俄始允兵屯城外遂訂約將旅順口及大連灣暨附近水面租與俄已畫押遣員分勘將軍伊克唐阿以附近二字太寬泛電總署力爭謂金西金東各島離岸一二十里三四十里不等謂之附近尚可至索山以南廟兒七島近者三四十里遠者二百餘里在山東登萊海面非遼東所屬不得謂之附近爭之再三俄請將廟羣島作為隙地免他國占據總署告以中國但可允認不讓與他國享用並通商等利益不能允作隙地致損主權俄人又請允許立字不設炮臺不駐兵總署仍與力駁不省久之始允照中國議刪去作為隙地及不設炮臺等語復於專條廟羣島下增繕不歸租界之內字而金州東海海陽五蟒二島仍租俄七月出使大臣許景澄楊儒與東省鐵路公司續訂合同初中俄會訂條約原許東省鐵路公司由某站起至大連灣或酌量至遼東半島營口鴨緑江中間沿海較便地方築一枝路未行至是與議許景澄與俄外部商明枝路末處在大連灣海口不在遼東半島沿海別處列入專條訂合同俄人嗣以造路首重運料擬照原合同所許各陸路轉運之事訂定暫築通海口枝路暨行船辦法並自行開採煤礦木植等事許景澄等以原合同第一款載明中國在鐵路交界設關照通商稅則減三分之一此係指陸路而言今大連灣海口開作商埠貨物來往內地竟援減徵稅恐牛莊津海兩關必致掣礙至內地與租地交界視中俄兩國交界有別設關處所亦須變通擬改定專發俄人尚欲並開各礦産拒之並議限制轉運開採各事又商加全路工竣年限俾暫築枝路屆期照拆凡七發一枝路名東省鐵路南滿洲枝路二造路需用料件許公司用輪船及別船樹公司旗駛行遼河並枝河及營口並隙地各海口運卸料件三公司為運載料件糧草便捷起見許由南路暫築枝路至營口及隙地海口惟造路工竣全路通行貿易後應將枝路拆去不得逾八年四許公司採伐在官樹株每株由總監工與地方官酌定繳費惟盛京御用産物暨關係風水不得損動並許公司所過開採煤礦亦由總監工與地方官酌定計斤納稅五俄可在租地內自酌稅則中國可在交界徵收貨物從租界運入內地或由內地運往租地之稅照海關進出口稅則無增減並允俄在大連灣設關委公司代徵別遣文官駐扎為稅關委員六許公司自備行海商船照各國通商例如有虧折與中國無涉應照原合同十二條價買及歸還期限辦理七造路方向所過地方應俟總監工勘定由公司或北京代辦人與鐵路總辦公司商定復定鐵路經過奉天應繞避陵寢俄允繞距三十里遂畫押二十五年盛京將軍文興等遣知府福培同知涂景濤與俄員倭高格伊林思齊等勘分旅大租界俄員擬先從租地北界西岸亞當灣起勘福培等以中國輿圖無亞當灣地名應照總署電亞當即普蘭店之文為憑當從普蘭店西海灣之馬虎島起俄員以續約明言西從亞當灣北起無普蘭店字堅不允改遂從北界西岸起次第立碑至大海濱凡三十有一碑北刻漢文南鐫俄國字母復立小碑八以數目為號界線由西至東長九十八里餘九十四弓界既定與俄員會議分界專條又將所繪界圖用華俄文注明畫押蓋印互換後分呈俄使及總署批定完結初由李鴻章張蔭桓與俄使巴布羅福訂此約於北京至是命王文韶許景澄加押時中國欲自造山海關至營口枝路英欲投資俄使牒總署謂借用外國資本與續約相背俄人又以東省鐵路將興工擬在北京設東省鐵路俄文學堂招中國學生學習俄國語言文字以備鐵路調遣之用許之是年俄以遼東租借地為關東省二十六年拳匪亂各國聯軍入北京俄乘勢以兵占東三省藉口防馬賊保鐵路初奉天土匪先攻俄鐵道警衛兵亂兵燒天主教堂破毀鐵嶺鐵道掠洋庫旋攻遼陽鐵道俄鐵道員咸退去同時黑龍江亦炮擊俄船俄聞警遣軍分道進攻由璦琿三姓寧古塔琿春進據奉天乃迫將軍增祺訂奉天交地約擬在東三省駐兵政賦官兵均歸俄管轄時朝廷以慶親王李鴻章為全權與各國議發並命駐俄欽使楊儒為全權大臣與俄商辦接收東三省事楊儒與爭論久始允作廢而俄人別出約稿相要張之洞等連電力爭遂暫停議二十七年七月各國和議成李鴻章乃手擬四事一歸地二撤兵三俄國在東三省除指定鐵路公司地段不再增兵四交還鐵路償以費用與俄使開議於北京講未成而鴻章卒王文韶繼之二十八年三月訂約四條四月俄人強占科布多所屬阿拉克別克河參贊大臣瑞洵以聞命外務部商辦不得要領七月鐵路公司與華俄道勝銀行訂立正太鐵路借款及行車合同又與俄續訂接線展限合同九月交還關外鐵路及撤退錦州遼河西南部之俄軍是為第一期撤兵至翌年三月第二期金州牛莊遼陽奉天鐵嶺開原長春吉林寧古塔琿春阿拉楚喀哈爾濱駐扎之俄兵仍不如期撤退俄代理北京公使布拉穆損向外務部新要求七款拒之俄使撤回要求案會俄使雷薩爾復任復提新議五款宣言東省撤兵斷不能無條件縱因此事與日本開戰亦所不顧三十年日俄開戰中國守中立是年俄造東三省鐵路成又改定中俄接線續約議照倫敦萬國公會所訂條例各減價三十一年日本戰勝旅順大連租借權移歸日本俄專力於東清鐵道於是有哈爾濱行政權之交涉哈爾濱為東清鐵道中心地初祗俄人住居自三十一年開放為通商口岸各國次第置領事按中國各商埠辦法中國有行政權乃俄人謂哈爾濱行政權當歸諸東清鐵道會社中國拒之既而俄領事霍爾哇拖忽布東清鐵道市制凡居住哈爾濱市內中外人民悉課租稅命東三省總督徐世昌與俄人交涉不洽宣統元年俄領事赴北京與外務部議外務部尚書梁敦彥與霍爾哇拖議設自治會於東清鐵道界內以保中國主權亦不違反東清鐵道會社諸條約遂議結而松花江航權之議又起初中俄條約所指之松花江係指黑龍江下流而言未許在內地松花江通航也俄謂咸豐八年光緒七年所結條約係指松花江全部而言至是命濱江關道施肇基與俄領事開議俄人仍執舊約為詞中國以日俄訂立朴資茅斯約已將中俄在松花江獨得行船之權利讓出舊約不適用相與辨論不決既而俄人又欲干預中國管理船舶之權及防疫並給發專照等事復嚴拒之俄人仍執全江貿易自由不認商埠內地之區別又以江路與陸路為一類不與海路並論久之始就範明年締約一滿洲界內之松花江許各國自由航行二船泊稅依所載貨物重量收納三兩國國境各百里之消費貨各免稅四穀物稅比從來減三分之一五內地輸出貨在松花江稅關照例納稅此約成於是各國得航行於松花江內而北滿之局勢一變時中國與俄訂東省鐵路公議會大綱俄人以中國放商埠與東清鐵路地段性質不同東清鐵路地段內有完全行政之權意在於東清鐵路界內施行其行政權政府以俄侵越主權嚴拒之並通告各國曰東清鐵路合同首段即載明中政府與華俄道勝銀行合夥開設生意曰合夥開設生意明係商務之性質與行政上之權限絲毫不得侵越乃俄引此合同第六條為據謂有由公司一手經理字樣為完全行政之權不知其一手經理即合同所指鐵路工程實在必需之地段而公司經理之權限不得越出鐵路應辦之事絶無可推移到行政地位又宣統元年中俄兩國所訂東省鐵路界內公議會大綱條款自第一條以至第五條均係聲明鐵路界內中國主權不得稍有損失又光緒三十一年俄日在美國議定條約第三條載明俄日兩國政府統行歸還中國全滿洲完全專主治理之權又俄政府聲明俄國在滿洲並無地方上利益或優先及獨得讓與之件致侵害中國主權或違背機會均等主義豈能強解商務合同並以未經中國明認宣布之言為依據而轉將兩國之約廢棄不論耶俄人屈於詞乃定議宣統二年屆中俄通商條約期滿應改訂因與駐京俄使交涉俄使堅執舊約正爭議間俄使奉本國政府電旨轉向中國提出要求案一兩國國境各百里內俄制定之國境稅率不受限制兩國領土內之産物及工商品皆無稅貿易二旅中國俄人訟案全歸俄官審理兩國人民訟案歸兩國會審三蒙古及天山南北兩路俄人得自由居住為無稅貿易四俄國於伊犂塔爾巴哈台庫倫烏里雅蘇台喀什噶爾烏魯木齊科布多哈密古城張家口等處得設置領事官並有購置土地建築房屋之權久之始復俄使云一國境百里內中國確遵自由貿易之約並不限制俄國之國境稅率二兩國人民訟案應照舊約辦理三蒙古新疆地方貿易原定俟商務興盛即設定稅率四科布多哈密古城三處既認為貿易隆盛中國依俄國設領事之要求俄國亦應依原約允中國制定關稅俄使以告本國政府俄以制定關稅不應與增設領事並提更向中國質問並命土耳其斯坦駐軍進伊犂邊境遂允之俄人又遣兵駐庫倫向外務部邀求開礦優先權拒之會革命軍興庫倫獨立事益不可問矣
