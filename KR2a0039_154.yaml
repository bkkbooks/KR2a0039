body:
  text: 清史稿卷一百五十四志一百二十九邦交二英吉利英吉利在歐羅巴西北清康熙三十七年置定海關英人始來互市然不能每歲至雍正三年來粵東所載皆黑鉛番錢羽緞哆囉嗶嘰諸物未幾去七年始通市不絶乾隆七年冬十一月英巡船遭風飄至廣東澳門總督策楞令地方官給資糧修船舶遣之二十年來寧波互市時英商船收定海港運貨寧波踰年遂增數舶旋禁不許入浙並禁絲斤出洋二十四年英商喀喇生通事洪任輝欲赴寧波開港既不得請自海道入天津仍乞通市寧波並訐粵海關陋弊七月命福州將軍來粵按驗得其與徽商汪聖儀交結狀治聖儀罪而下洪任輝於獄旋釋之二十七年夏五月英商啖囒等以禁止絲斤其貨艱於成造仍求通市粵督蘇昌以聞許之然仍限每船只許配買土絲五千斤二蠶湖絲三千斤至頭蠶湖絲及綢緞綾匹仍禁五十八年英國王雅治遣使臣馬戛爾尼等來朝貢表請派人駐京及通市浙江寧波珠山天津廣東等地並求減關稅不許六十年復入貢表陳天朝大將軍前年督兵至的密英國曾發兵應援的密即廓爾喀也奏入敕書賜賚如例嘉慶七年春三月英人窺澳門以兵船六泊雞頸洋粵督吉慶宣諭回國至六月始去十年春三月英王雅治復遣其臣多林文附商船來粵獻方物十三年秋九月復謀襲澳門以兵船護貨為詞總督吳熊光屢諭使去不聽遂據澳復以兵船闖入虎門進泊黃埔命剿辦絶市褫熊光職英人始於十月退師明年春二月增築澳門炮臺夏五月定廣東互市章程十九年冬十一月禁英人傳教二十年春三月申鴉片煙禁二十一年夏六月英國遣其臣加拉威禮來粵東投書言英太子攝政已歷四年感念純皇帝聖恩遣使來獻方物循乾隆五十八年貢道由海洋舟山至天津赴都懇總督先奏時總督蔣攸銛方入朝巡撫董教增權督篆許其晉見援督撫大吏見暹邏諸國貢使禮加拉威禮不受再三議相見儀教增不得已許之其日總督及將軍兩副都統海關監督畢坐節堂陳儀衛加拉威禮上謁免冠致敬通事為達意教增離坐起立相問答允為入告加拉威禮徑出比教增奏入而貢使羅爾美都副貢使馬禮遜乘貢舟五已達天津帝命戶部尚書和世泰工部尚書蘇楞額往天津率長蘆鹽政廣惠伴貢使來京一日夜馳至圓明園車路顛簸又衣裝皆落後詰朝帝升殿受朝會時正使已病副使言衣車未至無朝服不能成禮和世泰懼獲譴詭奏二貢使皆病遂却其貢不納遣廣惠伴押使臣回粵初英貢使齎表帝覽表文抗若敵體又理藩院迓接不如儀帝故疑其慢絶不與通羅爾美都等既出都有以實入告者帝始知非貢使罪復降諭錫賚追及良鄉酌收貢物仍賜國王珍玩數事並敕諭國王歸咎使臣不遵禮節謝宴英使怏怏去七月降革蘇楞額和世泰廣惠等有差道光元年復申鴉片煙禁七年廣東巡撫朱桂楨毀英商公局以其侵占民地也十三年英罷商公司西洋市廣東者十餘國皆散商惟英有公司公司與散商交惡是年遂散公司聽商自運而第征其稅明年粵督盧坤誤聽洋商言以英公司雖散而粵中不可無理洋務之人遂奏請飭英仍派遣公司大班來粵管理貿易英王乃遣領事律勞卑來粵尋代以義律義律議在粵設審判署理各洋交涉訟事其貿易仍聽散商自理十六年定食鴉片煙罪初英自道光元年以後私設貯煙大舶十餘隻謂之躉船又省城包買戶謂之窰口由窰口兌價銀於英館由英館給票單至躉船取貨有來往護艇名曰快蟹炮械畢具太常寺卿許乃濟見銀輸出歲千餘萬奏請弛煙禁令英商仍照藥材納稅入關交行後只許以貨易貨不得用銀購買以示限制已報可旋因疆臣奏請嚴販賣吸食罪名加重至死而私販私吸如故十八年鴻臚寺卿黃爵滋請嚴吸食罪行保甲連坐之法且謂其禍烈於洪水猛獸疏上下各督撫議於是請禁者紛起湖廣總督林則徐奏尤剴切言鴉片不禁絶則國日貧民日弱十餘年後豈惟無可籌之餉抑且無可用之兵帝深然其言詔至京面授方略以兵部尚書頒欽差大臣關防赴粵東查辦明年春正月至粵東與總督鄧廷楨會申煙禁頒新律以一年又六月為限吸煙罪絞販煙罪斬時嚴捕煙犯洋人泊零丁洋諸躉船將徙避則徐咨水師提督各營分路扼守令在洋躉船先繳煙方許開艙又傳集十三行商人等令諭各商估煙土存儲實數並索歷年販煙之查頓顛地二人查頓遁走義律託故回澳門及事亟斷水陸餉道義律乃使各商繳所存煙土凡二萬二百八十三箱則徐命悉焚之而每箱償以茶葉五斤復令各商具永不售賣煙土結於是煙商失利遂生觖望義律恥見挫辱乃鼓動國人冀國王出干預國王謀於上下議院僉以此類貿易本干中國例禁其曲在我遂有律土丹者上書求禁並請禁印度栽種又有地爾窪作鴉片罪過論以為既壞中國風俗又使中國猜忌英人反礙商務然自燒煙之信傳入外洋茶絲日見翔踊銀利日長義律遂以為鴉片興衰實關民生國計時林則徐令各洋船先停洋面候查必無攜帶鴉片者始許入口開艙各國商俱如命獨義律抗不遵命謂必俟其國王命定章程方許貨船入口而遞書請許其國貨船泊近澳門不入黃埔則徐嚴駁不許又禁絶薪蔬食物入澳義律率妻子去澳寄居尖沙嘴貨船乃潛招其國兵船二又取貨船配以炮械假索食突攻九龍山參將賴恩爵炮沈其雙桅船一餘船留漢仔者亦為水師攻燬義律求澳人轉圜願遵新例惟不肯即交毆斃村民之犯又上書請毋逐尖沙嘴貨船且俟其國王之命水師提督關天培以不交犯擲還其書冬十月天培擊敗英人義律遁十一月罷英人互市英貨船三十餘艘皆不得入又搜捕偵探船日數起英商人人怨義律義律不得已復遣人投書乞恩請仍回居澳門林則徐以新奉旨難驟更復嚴斥與之絶而英貨船皆泊老萬山外洋不肯去惟以厚利啖島濱亡命漁舟蛋艇致薪蔬且以鴉片與之市是月廣東增嚴海防二十年春正月廣東遊擊馬辰焚運煙濟英匪船二十餘夏五月林則徐復遣兵逐英人於磨刀洋時義律先回國請益兵其國遂命伯麥率兵船十餘及印度兵船二十餘來粵泊金星門則徐以火艘乘風潮往攻英船避去英人見粵防嚴謀擾閩敗於厦門六月攻定海殺知縣姚懷祥等事聞特旨命兩江總督伊里布為欽差大臣赴浙督師七月則徐遣副將陳連升遊擊馬辰率船五艘攻英帥士密於磨刀洋馬辰一艘先至乘風攻之炮破其船八月義律來天津要撫時大學士琦善任直隸總督義律以其國巴里滿衙門照會中國宰相書遣人詣大沽口上之多所要索一索貨價二索廣州厦門福州定海各港口為市埠三欲敵體平行四索犒軍費五不得以外洋販煙之船貽纍岸商六欲盡裁洋商浮費琦善力持撫議旋宴其酋目二十餘人許陳奏遂入都面陳撫事乃頒欽差大臣關防命琦善赴粵東查辦是月免浙江巡撫烏爾恭額以失守海疆又英人投書不受故也義律既起碇過山東巡撫託渾布具犒迎送代義律奏事謂義律恭順且感皇上派欽差赴粵查辦恩罷兩廣總督林則徐上諭切責以怡良暫署總督事會義律南行過蘇復潛赴鎮海時伊里布駐浙接琦善議撫咨遣家丁張喜赴英船犒師英水師統領伯麥踞定海數月聞撫事定聽洋艘四出遊奕至餘姚有土人誘其五桅船入攔淺灘獲黑白洋人數十伊里布聞之飛檄餘姚縣設供張委員護入粵冬十月琦善抵廣州尋授兩廣總督義律請撤沿海諸防虎門為廣州水道咽喉水師提督駐焉其外大角沙角二炮臺燒煙後益增戍守師船火船及蛋艇扒龍快蟹悉列口門內外密布橫檔暗樁至是裁撤殆盡義律遂日夜增船櫓造攻具首索煙價繼求香港且行文趣琦善速覆十二月五日突攻沙角炮臺副將陳連升等兵不能支遂陷皆死之英人又以火輪三板赴三門口焚我戰船十數艘水師亦潰英人乘勝攻大角炮臺千總黎志安受傷推炮落水潰圍出炮臺陷英人悉取水中炮分兵戍守於是虎門危急水師提督關天培總兵李廷鈺遊擊馬辰等守靖遠威遠炮臺僅兵數百遣辨告急不應廷鈺至省泣求增兵以固省城門戶琦善恐妨撫議不許文武僚屬皆力請始允遣兵五百義律仍挾兵力索煙價及香港二十一年春正月琦善以香港許英而未敢入奏乃歸浙江英俘易定海義律先遣人赴浙繳還定海續請獻沙角大角炮臺以易之琦善與訂期會於蓮花城義律出所定貿易章程並給豫香港全島如澳門故事皆私許之既而琦善以義律來文入奏帝怒不許罷琦善並伊里布命宗室奕山為靖逆將軍尚書隆文湖南提督楊芳為參贊大臣赴粵剿辦時義律以香港已經琦善允給遍諭居民以香港為英屬埠又牒大鵬營副將令撤營汛粵撫怡良聞之大駭奏聞帝大怒合籍琦善家遂下詔暴英人罪促奕山等兼程進會各路官兵進剿尋以兩江總督裕謙為欽差大臣赴浙視師時定海鎮海等處英船四出遊奕裕謙遣兵節次焚剿並誅其酋目一人二月英人犯虎門水師提督關天培死之乘勝薄烏涌省城大震十三日參贊楊芳抵粵各路官兵未集而虎門內外舟師悉被燬楊芳議以堵為剿使總兵段永福率千兵扼守東勝寺陸路總兵長春率千兵扼鳳凰岡水路英人率師近逼雖經鳳凰岡官兵擊退仍乘潮深入飛炮火箭並力注攻會美領事以戰事礙各國商船進口赴營請進埔開艙兼為英人説和謂英人繳還定海惟求通商如舊並出義律書有惟求照常貿易如帶違禁物即將貨船入官之文時定海師船亦至粵楊芳欲藉此緩兵退敵遂與怡良聯銜奏請帝以其復踵請撫故轍嚴旨切責不許三月詔林則徐會辦浙江軍務尋復遣戍新疆四月奕山以楊芳隆文等軍分路夜襲英人不克英人遂犯廣州城不得已仍議款義律索煙價千二百萬美商居間許其半議既定奕山奏稱義律乞撫求許照舊通商永不售賣鴉片將所償費六百萬改為追交商欠撫議既定英人以撤四方炮臺兵將擾佛山鎮取道泥城經蕭關三元里里民憤起號召各鄉壯勇四面邀截英兵死者二百餘殪其渠帥伯麥等義律馳援復被圍亟遣人突出告急於廣州知府余葆純葆純馳往解散翼義律出圍登舟免時三山村民亦擊殺英兵百餘佛山義勇圍攻英民於龜岡炮臺殲英兵數十又擊破應援之杉板船新安亦以火攻燬其大兵船一餘船遁義律牒總督示諭衆始解散義律受挫久之始變計入閩攻厦門再陷復統兵攻定海總兵葛雲飛等戰沒裕謙以所部兵赴鎮海方至而英人自蛟門島來攻時鎮海防兵僅四千提督余步雲與總兵謝朝恩各領其半步雲違裕謙節制不戰先走英遂據招寶山俯攻鎮海陷之裕謙赴水死謝朝恩亦戰歿英人乘勝據寧波八月英人攻雞籠為臺灣道姚瑩所敗九月命大學士宗室奕經為揚威將軍侍郎文蔚副都統特依順為參贊大臣赴浙以怡良為欽差大臣赴閩會辦軍務二十二年春正月大兵進次紹興將軍參贊定議同日分襲寧波鎮海豫泄師期及戰官軍多損失是月姚瑩復敗英人於大安二月英人攻慈溪營金華協副將朱貴及其子武生昭南督糧官即用知縣顏履敬死之是月起用伊里布先是伊里布解任並逮其家人張喜入都遣戍至是浙撫劉韻琦請起用報可旋以耆英為杭州將軍命臺灣設防夏四月英人犯乍浦副都統長喜同知韋逢甲等戰死時伊里布已來浙即命家人張喜見英酋告以撫事有成令先退至大洋即還所俘英人英人如約遂以收復乍浦奏聞英人連陷寶山上海江南提督陳化成等死之遂犯松江陷鎮江殺副都統海齡淮揚鹽商懼甚賂英師乞免秋七月犯江寧英火輪兵船八十餘艘溯江上自觀音門至下關時耆英方自浙啓行伊里布亦奉詔自浙馳至遣張喜詣英船道意英人要求各發一索煙價商欠兵費銀二千一百萬一索香港為市埠並通商廣州福州廈門寧波上海五口一英官與中國官用敵體禮餘則劃抵關稅釋放漢姦等發末請鈐用國寶會耆英至按發稍駮詰英突張紅旗揚言今日如不定議詰朝攻城遂即夜覆書一如所言翼日遣侍衛咸齡布政司黃恩彤寧紹台道鹿澤長往告各發已代請俟批回即定約奏上許之時耆英伊里布牛鑑以將修好遣張喜等約期相見馬利遜請以本國平行禮見耆英等遂詣英舟與璞鼎查等用舉手加額禮訂約復親具牛酒犒師畫諾於靜海寺是為白門條約自此煙禁遂大開矣而猶以臺灣殺英俘為總兵達洪阿兵備道姚瑩罪來詰不得已罷之十二月以伊里布為欽差大臣赴廣東督辦通商事二十三年夏伊里布卒詔耆英往代先許英廣州通市初英粵東互市章程各國皆就彼挂號始輸稅法人美人皆言我非英屬不肯從遂許法美二國互市皆如英例二十四年英人築福州烏石山英領事官見浙閩總督劉韻珂請立商埠欲於會城內外自南臺至烏石山造洋樓阻之值交還欠發照江寧約已付甲辰年銀二百五十萬應將舟山鼓浪嶼退還中國英公使藉不許福州城內建樓事不與交還屢經辨論始允退還鼓浪嶼然執在彼建屋如故福州既得請遂冀入居廣州城廣州民憤阻揭帖議劫十三洋行英酋逸去入城之議遂不行二十六年秋七月英人還舟山十二月請與西藏定界通商以非條約所載不許二十八年英酋文翰復請入廣州城互市總督徐廣縉拒之越日英舟闖入省河廣縉單舸往諭省河兩岸義勇呼聲震天文翰請仍修舊好不復言入城事咸豐元年文宗嗣位英人以火輪船駛赴天津稱來弔大行皇帝喪直隸總督以聞命却之三年洪秀全陷江寧英以輪船駛至江寧迎入城與通發英人言不助官亦不助洪四年劉麗川據上海作亂初英人阻官軍進兵江督怡良等詰之既而英人欲變通貿易章程聯法美二國請於粵督葉名琛不許遂赴上海見蘇撫吉爾杭阿九月赴天津帝命長蘆鹽政崇綸等與相見拒其遣使駐京諸條久之始去六年秋九月英人巴夏里致書葉名琛請循江寧舊約入城不省英人攻粵城不克逞復請釋甲入見亦不許冬十月攻虎門橫檔各炮臺又為廣州義勇所却乃馳告其國於是簡其伯爵額爾金來華擬由粵入都先將火輪兵船分泊澳門香港以俟額爾金至粵初謀入城不可與水師提督領事等議發牒粵中官吏俟其復書定進止名琛置不答七年冬十二月英人遂合法美俄攻城城陷執名琛去因歸罪粵中官吏上書大學士裕誠求達裕誠覆書令赴粵與新命粵督黃宗漢商辦不省八年夏四月聯兵犯大沽連陷前路炮臺帝命科爾沁親王僧格林沁率師赴天津防剿京師戒嚴帝命大學士桂良吏部尚書花沙納赴天津查辦復起用耆英偕往耆英至往謁英使不得見擅自回京賜自盡英有里國太者嘉應州人也世仰食外洋隨英公使額爾金為行營參贊聞桂良至即持所定新議五十六條要桂良允許桂良辭之津民憤與英人鬬擒里國太將殺之桂良談廷襄恐誤撫局亟遣人釋里國太送回舟時廷臣交章請罷撫議以疆事棘不得已始命桂良等與定和約五十六款六月遣桂良花沙納巡視江蘇籌議諸國通商稅則冬十月定通商稅則時英人以條約許增設長江海口商埠欲先察看沿江形勢定約後即遣水師領事以輪船入江溯流至漢口踰月而返是年議通商善後事時各國來天津換約均因桂良原議改由北塘海口入獨英船先抵天津海口俄人繼之突背前約闖入大沽口直隸總督恆福遣人持約往令改道不聽九年夏五月英船十餘艘駛至灘心越日豎紅旗挑戰拽倒港口鐵宀元攴鐵樁遂逼炮臺開炮轟擊時僧格林沁防海口開炮應之沈燬其數船英人復以步隊接戰又敗之十年夏六月復犯天津海口直隸提督樂善守北岸炮臺拒戰中炮死時僧格林沁尚守南岸炮臺詔罷兵議撫乃自天津退軍張家灣英遂乘勢陷天津尋復遣僧格林沁進軍通州帝仍命大學士桂良往天津議撫桂良抵津牒洋人商和局英公使額爾金參贊巴夏里請增軍費及在天津通商並請各國公使帶兵入京換約桂良以聞嚴旨拒絶仍命僧格林沁等守通州八月英人犯通州帝命怡親王載垣赴通議發時桂良及軍機大臣穆蔭皆在英使額爾金遣其參贊巴夏里入城議和請循天津原議並約法使會商翼日宴於東獄廟巴夏里起曰今日之約須面見大皇帝以昭誠信又曰遠方慕義欲觀光上國久矣請以軍容入王憤其語不遜密商僧格林沁擒送京師兵端復作時帝適秋獮自行在詔以恭親王奕欣為全權大臣守京師並詔南軍入援時團防大臣大學士周祖培尚書陳孚恩等議籌辦團練城守事恭親王桂良駐城外而英師已薄城下焚圓明園英人請開安定門入與恭親王面議和乃約以次日定和議而釋巴夏里於獄遣恆祺送歸九月和議成增償兵費八百萬並開天津商埠復以廣東九龍司地與英人是年用里國太幫辦稅務十一年春二月英人始立漢口九江市埠均設洋關九月總署因與英使卜魯士議暫訂長江通商章程十二發納稅章程五款是月交還廣東省城卜魯士始駐京同治元年粵賊陷蘇松常太各城各國懼擾上海商務謀自衛英水師提督何伯隨法美攻剿復青浦寧波諸處捷聞嘉奬九月與英人續訂長江通商章程二年春以英將戈登統常勝軍權授江蘇總兵四年秋七月英交還大沽炮臺五年春正月與英人議立招工章程七年十二月臺灣英領事吉必勳因運樟腦被阻牽及教堂洋將茄當踞營署殺傷兵勇焚燒軍火局庫索取兵費事聞詰英使久之始將吉必勳撤任未幾英兵船在潮州又有毀燒民房殺死民人事幾釀變八年九月與英換新約英使阿禮國請朝覲不許九年請辦電線鐵路不許既而請設水底電線於中國通商各口許之十年請開瓊州商埠先是同治七年修新約英使阿禮國允將瓊州停止通商以易溫州至是英使威妥瑪與法俄美布各國咸以為請允仍開瓊州十二年穆宗親政始覲見初因覲見禮節中外不同各國議數月不決英持尤力至是始以鞠躬代拜跪惟易三鞠躬為五號為加禮光緒元年正月乙卯英翻譯官馬嘉理被戕於雲南先是馬嘉理奉其使臣威妥瑪命以總署護照赴緬甸迎探路員副將柏郎等偕行至雲南騰越廳屬蠻允土司地被戕時岑育英以巡撫兼署總督威妥瑪疑之聲言將派兵自辦帝派湖廣總督李瀚章赴滇查辦威妥瑪遂出京赴上海於是有命李鴻章丁日昌會同商議之舉威妥瑪至津見李鴻章以六事相要鴻章拒之政府派前兵部侍郎郭嵩燾使英威妥瑪亦欲拒議又駐滬英商租上海吳淞間地敷設鐵軌行駛火車總督沈葆楨以英人築路租界外違約飭停工至是威妥瑪遣其漢文正使梅輝立赴滬商辦鴻章乃與約令英商停工而中國以原價購回自辦初上海既通商租界內仍有釐捐局專收華商未完半稅之貨至是威妥瑪欲盡去釐捐局界內中國不得設局徵收釐稅鴻章請政府勿許二年五月諭馬嘉理案疊經王大臣與英使威妥瑪辨論未洽命李鴻章商辦早結六月命鴻章為全權大臣赴煙台與威妥瑪會商相持者逾月議始定七月鴻章奏稱臣抵煙台威妥瑪堅求將全案人證解京覆訊其注意尤在岑育英主使臣與反復駁辨適俄德美法日奧六國使臣及英德水師提督均集煙台往來談宴因於萬壽聖節邀請列國公使提督至公所燕飲慶賀情誼聯洽翌日威使始允另議辦法將條發送臣查核其昭雪滇案六條皆總理衙門已經應允惟償發銀數未定其優待使臣三條一京外兩國官員會晤禮節儀制互異欲訂以免爭端一通商各口會審案件一中外辦案觀審兩條可合併參看觀審一節亦經總署於八條內允行至通商事務原議七條一通商各口請定不應抽收洋貨釐金之界並欲在沿海沿江沿湖地面添設口岸一請添口岸分作三項以重慶宜昌溫州蕪湖北海五處為領事官駐扎湖口沙市水東三處為稅務司分駐安慶大通武穴陸溪口嶽州瑪斯六處為輪船上下客商貨物一洋藥準在新關併納稅釐一洋貨半稅單請定劃一發式華洋商人均準領單洋商運土貨出口商定防弊章程一洋貨運回外國訂明存票年限一香港會定巡船收稅章程一各口未定租界請再議訂以上如洋藥釐稅由新關併徵既免偷漏亦可隨時加增土貨報單嚴定章程冀免影射冒騙諸弊香港妥議收稅辦法均尚於中國課餉有益其餘亦與條約不背英使又擬明年派員赴西藏探路請給護照因不便附入滇案優待通商三端之內故列為專條免定口界添設口岸兩事反覆爭論乃允免定口界僅於租界免抽洋貨釐金且指明洋貨土貨仍可抽收將來洋藥加徵稍資撥補似於大局無甚妨礙至添口岸一節總署已允宜昌溫州北海三處赫德續請添蕪湖口亦經奏準今仍堅持前議準添四口作為領事官駐扎處所其重慶派英員駐寓總署已於八條內議準未便即作口岸聲明俟輪船能上駛時再行議辦至沿江不通商口岸上下客商貨物一節自長江開碼頭後輪船隨處停泊載人運物因未明定章程礙難禁阻英使既必欲議準似不在停泊處所之多寡要在口岸內地之分明臣今與訂上下貨物皆用民船起卸仍照內地定章除洋貨稅單查驗免釐外有報單之土貨只準上船不準卸賣其餘應完稅釐由地方官一律妥辦等語是與民船載貨查收釐金者一律只須各地方關卡員役查察嚴密耳英使先請湖口等九處臣與釐定廣東之水東係沿海地方不準驟開此禁嶽州距江稍遠不準繞越行走姑允沿江之大通安慶湖口武穴陸溪口沙市六處輪船可暫停泊悉照內地抽徵章程臣復與德國使臣巴蘭德議及德國修約添口即照英國議定辦理威妥瑪請半年後開辦口岸租界免洋貨釐洋藥並納釐稅須與各國會商再行開辦因準另為一條至派員赴西藏探路一節條約既準遊歷亦無阻止之理臣於原議內由總理衙門駐藏大臣查度情形字樣屆時應由總理衙門妥慎籌酌逮至諸議就緒商及滇案償款英使謂去冬專為此事調來飛遊幫大兵船四隻保護商民計船費已近百萬臣謂兩國並未失和無認償兵費之例囑其定數英使謂吳淞鐵路正滋口舌如臣能調停主持彼即擔代仍照原議作二十萬遂定議因於二十六日將所繕會議條發華洋文四分彼此畫押蓋印互換至滇邊通商威使面稱擬暫緩開辦求於結案諭旨之末豫為聲明疏入報聞鴻章仍回直督本任約成互換是為煙台條約約分三端一曰昭雪滇案二曰優待往來三曰通商事務又另議專案一條是年遣候補五品京堂劉錫鴻持璽書往英為踐約惋惜滇案也三年英窺喀什噶爾以護持安集延為詞陝甘總督左宗棠拒之英人欲中國與喀什噶爾劃地界又請入西藏探路皆不行是年始於英屬地星嘉坡設領事四年秋八月福建民燬英烏石山教堂英人要求償所失乃已五年英欲與中國定釐稅併徵確數總署擬仍照煙台原議條發稅照舊則釐照舊章七年十月李鴻章復與威妥瑪議洋藥加徵稅釐初洋藥稅釐併徵之議始發於左宗棠原議每箱徵銀一百五十兩其後各督撫往來商議訖無成説滇案起鴻章乃與威妥瑪議商洋藥加徵稅釐威妥瑪謂須將進出口稅同商定議進口稅值百抽十而出口稅以英商不願加稅為辭並主張在各口新關釐稅並加通免內地釐金鴻章以欲通免釐金當於海關抽稅百二十兩須加正稅三倍如不免釐金則須增加一倍至六十兩既威妥瑪接到本國擬定鴉片加稅章程數條一釐稅併徵增至九十兩二增正稅至五十兩各口釐金仍照舊收三擬由中國通收印度鴉片而印度政府或約於每年減種鴉片或由兩國商定當減年限至限滿日停種至每石定價或按年交還或另立付價時候亦由兩國訂明其價或在香港撥還或在印度交兌其事則官辦商辦均可四擬立專辦洋藥英商公司每箱應償印度政府一定價值應納中國國家一定釐稅至繳清此項釐稅後其洋藥在中國即不重徵印度政府約明年限將鴉片逐漸裁止初威妥瑪於進口已允值百抽十至是因洋藥稅釐未定又翻又欲於各口租界外酌定二三十里之界免收洋貨釐鴻章以租界免釐載在條約業經開辦有年何得復議推廣拒之威妥瑪又請由香港設電線達粵省其上岸祗準在黃埔輪船停泊附近之處由粵省大吏酌定九年三月上諭洋藥稅釐併徵載在煙台條約總理衙門歷次與英使威妥瑪商議終以咨報本國為詞藉作延宕威妥瑪現已回國著派出使大臣曾紀澤妥為商辦如李鴻章前議一百一十兩之數併在進口時輸納即可就此定議洋藥流毒多年自應設法禁止英國現有戒煙會頗以洋藥害人為恥如能乘機利導與英外部酌議洋藥進口分年遞減專條逐漸禁止尤屬正本清源之計並著酌量籌辦紀澤奉旨與英外部議三年始定十一年六月奏曰臣遵旨與英外部尚書伯爵葛蘭斐爾侍郎龐斯茀德克雷等商論力爭數目最後乃得照一百一十兩之數今年二月準彼外部允照臣議開具節略咨送臣署且欲另定專條聲明中國如不能令有約諸國一體遵照英國即有立廢專約之權臣復力爭不允載入專條彼乃改用照會詳勘所送節略即係商定約稿其首段限制約束等語緣逐年遞減之説印度部尚書堅執不允其侍郎配德爾密告臣署參贊官馬格里云照專條辦法印度每年已減收英金七十萬餘鎊中國欲陸續禁減洋藥入口惟有將來陸續議加稅金以減吸食之人而不能與英廷豫定遞減之法遂未堅執固爭而請外部於專案首段加入於行銷洋藥之事須有限制約束一語以聲明此次議約加稅之意而暗伏將來修約議加之根至如何酌定防弊章程設立稽徵總口煙台條約第三端第五節固已明定要約臣此次所定專條第九款又復聲明前説將來派員商定自不難妥立章程嚴防偷漏其餘各條核與疊準總理衙門函電吻合旋承總署覆電照議畫押時適英外部尚書葛蘭斐爾退位前尚書侯爵沙力斯伯里推為首相仍兼外部六月三日始據來文定期七日畫押臣屆期帶同參隨等員前往外部與沙力斯伯里將續增條約專條漢文英文各二分互相蓋印畫押按此次所訂條約除第二條稅釐併徵數目恪遵諭旨議得百一十兩外又於第五條議得洋藥於內地拆包零售仍可抽釐是內地並未全免稅捐將來若於土煙加重稅釐以期禁減則洋藥亦可相較均算另加稅釐臣於專條中並未提及土煙加稅之説以期保我主權疏入得旨允行旋兩國派員互換是為煙台續約秋八月英人議通商西藏是歲英窺緬甸踞其都滇督岑育英奏請設防旋遣總兵丁槐率師往騰越備之中國以緬甸久為我屬電曾紀澤向英外部力爭令存緬祀立孟氏英外部不認緬為我藩屬而允立孟氏支屬為緬甸教王不得與聞政令紀澤未允外部尚書更易教王之説亦置諸不議矣既英署使歐格訥以煙台約有派員入藏之文堅求立見施行總署王大臣方以藏衆不許西人入境力拒所請會歐格訥以緬約事自詣總署言緬甸前與法私立盟約是以興師問罪令若重立緬王則法約不能作廢故難從命今欲依緬甸舊例每屆十年由緬甸長官派員赴京而勘定滇緬邊界設關通商以踐前約王大臣等以但言派員赴京並未明言貢獻辨爭再四始改為呈進方物循例舉行而勘界通商則皆如所請歐格訥始允停止派員入藏藏印通商仍請中國體察情形再行商議議既定總署因與歐格訥商訂草約四條得旨允行十二年九月請英退朝鮮巨文島不聽十月議瓊州口岸英領事以條約有牛莊登州臺灣潮州瓊州府城口字樣謂城與口皆口岸中國以英約十一款雖有瓊州等府城口字樣而煙台續約第三端聲明新舊各口岸除已定有各國租界應無庸議云云英約天津郡城海口作通商埠紫竹林已定有各國租界城內亦不作為口岸以此例之則瓊州海口係口岸瓊州府城非口岸也十三年秋七月與英換緬約於倫敦十四年春英人麻葛藟督兵入藏藏人築卡禦之為英屬印兵所逐藏人旋又攻哲孟雄境之日納宗又敗先是藏地國初歸附自英侵入印度後藏遂與英鄰乾隆年英印度總督曾通使班禪求互市班禪謂當請諸中國議未協而罷哲孟雄者藏印間之部落也道光間英收為印屬及煙臺訂約有派員入藏之説而藏人未知遂築炮臺於邊外之隆吐山冀阻英兵使不得前英人以為言帝諭四川總督劉秉璋飛咨駐藏大臣文碩幫辦大臣升泰傳各番官嚴切宣示迅撤卡兵於時升泰尚未抵任文碩未諳交涉輒以拒英護藏覆奏於是嚴旨切責以長庚代之仍有旨催令升泰赴藏傳齊番官諭以上年與英人訂議緩辦通商正朝廷護持黃教覆庇藏番代籌一永保安全之至計但令迅速撤卡印督已言明彼決不越藏中定界熱勒巴拉山嶺一步彼此未經開戰無論此地屬藏屬哲將來尚可從容辨論時十四年正月也寄諭未至英兵已進攻隆吐毀其壘藏番悉潰乃欲藉通商以緩師文碩復左右之竟以藏人與英自行立約入奏四月丁亥諭曰印藏通商一事英人約定並不催辦此次開釁與通商絶無干涉文碩始終不明機要乃欲藉通商為轉圜不思藏為中國屬地豈有聽其自行與人立約之理升泰文碩接奉此旨即傳集番官諭以事須稟明駐藏大臣具奏由總理衙門核定候旨遵辦五月庚申又諭曰使英大臣劉瑞芬電稱印督近又函達藏官但令藏衆退回原界便可仍舊和好絶不欲侵入藏地致礙兩國睦誼向來藏務專歸商上第穆呼圖克圖人尚和平曉事現在掌辦商上責有專歸升泰接奉此旨即傳諭第穆令其妥為了結未幾升泰抵任受事九月奏言藏番自作不靖肇起兵戈所有隆吐山南北本皆哲孟雄地英人雖視為保護境內實則哲孟雄布魯克巴皆西藏屬藩每屆年終兩部長必與駐藏大臣呈遞賀稟駐藏大臣循例優加賞犒唐古特自達賴喇嘛以下均有額定禮物商上亦回賞緞匹銀茶與兩部復書草稿必呈送駐藏大臣批準始行繕覆哲布兩部遇有爭訟亦稟由藏官酌派漢番官辦理此哲布本為藏地屬藩之實在情形也兩部長於光緒二年曾各遞番字稟以英人有窺伺藏地之心請早為設法辦理雖經前西藏糧員四望關通判周溱帶同戴琫札喜達結往辦祗取哲孟雄空結一紙敷衍了事並不妥籌善後貽誤邊疆其禍實自此始嗣後哲夷知藏番並無遠慮始一意與英人交接又復貪利取租聽英人修路直至捻納迄今仍稱租界又藏中自失藩籬之始末也藏人不知優待屬藩哲部偶受欺凌不為申理此時漸覺英人有逼己之心忽又攘奪哲地以為己有更揚言哲夷私結英人屢議起兵攻伐哲夷內不自安則益句結英人以圖自保此又藏印交兵之所由來也藏人自四月十三日戰敗之後不思設法弭患又復添調各路土兵分由小道至帕克里沿途騷擾良民大受荼毒番官管餉又多減刻人有怨言軍無鬬志除向隸戴琫之兵三千及工布兵數百人差可用命餘則悉係烏合現劄帕隘以外者一萬餘人分布各口又數千人一旦敗北譁潰則數千里臺站伏莽增多此內患之堪虞者也近時開導之難實因曩時初與外人交涉商上辦事諸員邀三大寺僧衆以護教為名共立誓詞云藏地男女不願與洋人共生於天地此後藏中男女老弱有違此誓即有背黃教人人得而誅之此本不肖之徒為聚衆抗官之謀三大寺僧衆亦藉此干預政事今事機危迫特旨到藏第穆亦知凜畏無如遽違初議即禍在目前雖掌辦商務之尊恐亦不免自危其噶布倫以次更不待言窺其情形似非背城一戰難望轉機此臣探其隱衷而言非藏番等自有此語也此時兵尚未撤委員不便前往且委員至彼辦理界務應與英國何人會議應請飭詢英使由總署知照藏中庶免隔閡近年藏番異常刁悍今自開兵釁尚不自知悔悟實難姑容第藏衛距川過遠餉絀兵單無事不形掣肘臣萬不敢不出之審慎籌慮萬全相機駕馭冀紓朝廷西顧之憂是月丁卯又奏臣於五月二十六日抵藏第穆與大小番官僧俗公同遞稟譯其情詞總以隆吐之南日納宗為藏界藏人設卡係在境內英人無端恃強動兵侵地為言臣以經界為地方要政從前豈無案牘乃派員將新舊各案卷概行檢閲始尋出乾隆五十九年前大臣尚書和琳內閣學士和瑛任內奏設鄂博原案一卷注明藏內界址係在距帕克里三站之雅拉支木兩山設有鄂博又有春丕日納宗兩處上年雖係藏界乾隆五十三年廓番用兵哲孟雄被廓夷追過藏曲大河哲部窮蹙達賴喇嘛始將日納宗地賞給哲部管理原派委員西藏遊擊張志林原稟即聲日納宗不應作為藏界只在雅拉支木兩山設立鄂博稟詞甚為明晰此圖惜已佚又覓得舊圖一張並注明納蕩一地乃哲孟雄邊境藏圖南面極邊界線之上亦繪有雅拉山是雅拉山確屬藏地南界至藏人設卡之隆吐山考之舊圖實無此名以英人所云日納宗在隆吐北數十里而藏番新圖則日納宗又在隆吐之南顯係藏人多繪此一段飾稱藏界臣既考察明確即以原卷舊圖發交開導委員轉給藏番閲看番人雖有愧色然終以日納宗本屬藏地從前雖賞給哲夷今哲夷已歸英屬應即收回自管旋奉電傳寄諭臣即面授第穆臣深慮第穆使將屯兵先行撤入帕克里並札飭哲布兩部長親赴英軍告以藏人畏逼故兵難先撤印兵亦宜克踐前言彼此約期同日撤退仍由臣致信英官促其速撤忽又得報英人於六月二十八日添兵九百餘名又益以大炮六門第穆旋亦稟英人屢次攻撲我營且廓爾喀前王子果爾雜捻曾出奔印度今亦由印帶兵五百名前來助戰聞已過大吉嶺是以未敢撤兵伏乞飭下總署詳告英使轉電印督約期撤兵並飭印兵毋得再動疏入奉上諭升泰所陳頗中肯綮劉瑞芬八月二十八日電稱印兵在熱勒巴拉山近處與藏兵攻戰藏兵傷亡數百印兵追入徵畢山岔九月十五日電稱英外部照覆云來攻納蕩之英軍統領拉哈瑪已遵印度政府之諭不可占據藏地故追入徵畢後立即退回印督又報告其政府謂駐藏大臣將以西曆十月三日由拉薩前赴邊界已派政事官保爾前往會晤目前升泰想已接晤保爾藏哲界址當已查明印督又有甚望速了之語著即熟商妥辦升泰先使江孜守備蕭占先馳往開導又以知縣秀蔭繼之藏兵之敗也英兵追至仁進岡將盡焚山上下民舍會占先至見英將力爭乃退屯對邦而促升泰前往會議數日復進據姑布升泰十一月至與英員保爾相見於對邦議經月未就乃奏言英人戰勝而驕必欲諸事議妥始允撤兵現議哲孟雄事不下十次保爾必欲將哲為英屬注明條約而畫咱利拉山為界即歷次奏牘所謂熱勒巴拉山也臣議以印督前言藏衆退回原界仍守二年以前情形不在隆吐山駐兵便可照舊辦理絶不侵入藏界等語折之保爾則謂此語當在未開戰前戰釁既開自當另議通商一事英人開來條款直欲到藏貿易臣百端辨説始允退至江孜又答以萬不能行則又意在帕克哩帕隘乃藏南門戶其險要在山腰之格林卡若至帕克哩則已在高原為廓爾喀哲孟雄布魯克巴三部通衢目前開導藏番通商必在界外始可期其遵從是以臣堅未允許保爾意甚怫然臣惟有平心靜氣婉與商榷冀紓目前之急是年英定華工往澳大利亞例限英君主維多利亞登位五十年中國遣使致賀十五年升泰復與英人接議通商分界久不決十六年二月朝旨派總稅務司赫德之弟赫政赴藏協商藏印約事升泰奏言撤兵藏番已願遵旨所難者分界通商兩大端耳臣自到邊哲部長之母率其親族頭目來營具稟云英人昔年立約曾經議明無論如何不得逾日喜曲河一步哲部租地與英每年應收租費洋銀十二千圓英人分毫未給此次印藏搆兵以致殃及實不願再歸英屬臣維哲孟雄本屬小邦僻在極邊本年印藏用兵被英人掠取全土復遷其部長安置印度噶倫綳之地而以重兵駐守扛多即部長平時治所也流離轉徙情實可矜是以此次會議但許其保護而必爭照舊兩字使藏人不至咎臣辦理邊事失去屬藩並可藉此羈縻布魯克巴至布魯克巴地大物博民俗強悍其地數倍哲孟雄實為前藏屏蔽西人呼為布丹國上年曾經入貢其部長向無印信亦無封號臣此次到邊其部長派兵千七百人來營效力臣方飭藏兵遣撤豈可留此多人致貽口實是以優給賞賚勉以大義飭令速回許事後為之代懇天恩該部人歡欣鼓舞而去赫政既抵藏升泰與英官開議保爾雖奉命印督為議約專員然不得自主事事仍請命印督藏番不願與英接壤必間哲孟雄於中乃可定界英既幽哲酋於噶倫綳直欲收入印度幅員之內藏人聞之益憤升泰嚴飭番官僧俗毋率行干預哲事而亟使赫政勸阻英官勿遽更易哲酋使藏人有所藉口藏哲舊界本在雅納支木兩山間其後商販往來另闢捷徑於是有所謂咱利孔道者即熱勒巴拉嶺之支麓也升泰議即咱利山立石畫分藏哲之界其印哲舊界在日喜河者亦擬仍舊而於條約注明藏番不願通商初指對邦附近地為商埠後始議定後藏之亞東於其地修建關卡設漢官治之藏番甫首肯而英官又遷延不遽決升泰亟奏請飭總署促英使迅速議約總署王大臣旋擬四條與英使華爾身籌商久之始議定八發總署乃上奏謂第一發藏哲以咱利山一帶山顛為界第二發哲地歸英保護第三款兩邊各無犯越其餘緩議各條善後應辦事宜儘可徐與商榷彼此派員定議請簡派升泰為全權大臣與英員先行畫押奉旨俞允是歲秋七月出使大臣薛福成與英外部互換於倫敦是為中會議藏印條約是年德宗大婚英派使臣華爾身齎英主維多利亞國書致賀並自鳴鐘一座上刻祝辭云日月同明報十二時吉祥如意天地合德慶億萬年富貴壽康旋命駐使薛福成赴英外部傳旨致謝並遞國書是年英開重慶商埠十七年春正月換約限滿前駐藏大臣升泰遣員黃紹勳張昉及總務司赫政與英印督蘭士丹所派之保爾在大吉嶺會議各擬辦法保爾欲在仁進岡入藏一百五十餘里之法利城即帕克里設關通商並俟十年後再定入口貨稅升泰執定十二年條發藏印邊界通商由中國體察情形之語辨駮久不決十八年夏六月復與保爾商議辦法九發續發二條定於交界之咱利山下亞東境內為英商貿易所商上等復懷疑慮堅請於二發內注明不得擅入關內字樣又請禁印茶運藏一再與英使華爾身辨論仍不決至十九年五月總理衙門奏現據赫德稱印度已將辦法九發更改商訂最緊要之第二發內注明英商在亞東貿易自交界至亞東而止第四發內注明進出口稅俟五年期滿酌定稅則至印茶一項現議開辦時不即運藏俟五年限滿方可入藏銷售應納之稅不得過華茶入英納稅之數此外各發均照升泰所擬辦理臣等查中英通商稅則茶葉每百斤徵銀二兩五錢而洋商運華茶至英每百斤徵銀十兩現在先與議定如印茶入藏應照華茶入英每百斤稅銀十兩磋議經年始克就範竊思藏約未結三端自十七年開議至今已屆三年之久始得印藏兩情翕然允協即可就此收束以綏邊圉是為續議中英會議藏印條發是年十月在大吉嶺互換既又與英議滇緬界務初曾紀澤與英議約英許中國稍展邊界擬豫以潞江以東南掌撣人之地既紀澤又向英外部要求八募之地不允英外部侍郎克蕾謂英廷已飭駐緬之英官勘驗一地允中國立埠設關收稅有另指舊八募之説在八募東二三十里紀澤因與外部互書節略存卷暫停不議旋受代回華至是出使大臣薛福成見英人與暹羅勘界並有創築鐵路通接滇邊之訊恐分界通商事宜不早籌議臨時必受虧損於是上書請與英人提議及福成往促踐前議英以公法為解謂西洋公法議在立約之後不可不遵議在立約以前不能共守蓋不認讓中國展邊界及以大金沙江為公共江八募近處勘地中國立埠設關三端薛福成以英既翻前議因思野人山地綿亙數千里不在緬甸轄境之內復照外務部請以大金沙江為界江東之境歸滇而印度總督不允出師盞達邊外之昔馬攻擊野人以示不願分地之意又欲借端停商全約福成仍促速議久之英始允將久淪於緬之漢龍天馬兩關還中國又久之始允讓所據之鐵壁關惟虎踞關英人以深入彼境七八十里與八募相近不允讓至於設關拒尤力福成以英既不允我地則英所得於我之權利亦應作廢相持甚久始就滇境東南商定於孟定橄欖壩西南邊外讓一地曰科干又自猛卯土司邊外包括漢龍關在內作一直線東抵潞江麻栗壩之對岸止劃歸中國約計八百英方里又車里孟連土司所屬鎮邊廳係為兩屬亦允全讓並野人山毗連之昔馬亦允讓至此界務告一結束而商務大金沙江行船八募立埠設關英仍不允福成久與爭論始於行船一事於約中另立一條不許他國援例而設關仍不肯通融惟約中於英人所得權利如緬鹽不準運入滇境英關暫不徵收貨稅領事僅設一員限一定駐所商貨僅由二路不準開埠英亦無詞遂於二十年正月二十四日在倫敦定約共二十條一二三四劃定各段界線五中國不再索問永昌騰越邊界外隙地英國於北丹泥及科干照所劃邊界讓與中國孟連江洪之地亦歸中國惟未定議前不得讓與他國八各貨物分別應稅不應稅十十一分別各貨物準販運不準販運十三中國派領事駐仰光英國派領事駐蠻允十五定交逃犯例十七定中英民在兩國界內相待最優例又專條內各條發僅用於兩國所指屬地不能用於別處是為中英續議滇緬界務商務條發是年又與英議接滇緬邊界陸路電線條約尋又議藏印條發二十一年夏中日和議既成法索雲南普洱徼外猛烏烏得兩地英使歐格訥以兩地屬緬江洪指為違約欲中國將八募北野人山地由薩伯坪起東南到盞達西南順南碗河折向瑞麗江循江至猛卯向南至工隆八關科干皆在內讓歸英不許英忽請允西江通商再議野人山地許之復要求在肇慶梧州桂林潯州南寧五府設立領事佛山高要封川南新墟等處停泊輪船由廣州澳門出入中國以野人山地減索無幾而通商口岸太多且桂林在北江之北潯州南寧在藤江龔江上遊並非西江豈能強索阻止之英外部又以北丹尼科干兩地原屬緬為前薛福成定界時誤畫入華求索回又請於騰越順寧思茅三處設領事及緬甸現有及將來續開之鐵路接入中國又請援照俄法條約利益於新疆設領事再三駮論始允將新疆設埠及援照俄法利益一節刪去滇緬接路一節改為俟中國鐵路展至緬界時彼此相接滇界領事一節改為將已設之蠻允領事改駐或順寧或騰越一處其思茅領事係援利益均霑之例非英獨創其野人山界線改為南坎一處作為永租餘俟兩國派員勘定惟西江通商一節允至梧州而止梧州之東祗開三水縣城江根墟兩地商船由磨刀門進口其由香港至廣州省城本係舊約所許仍限江門甘竹肇慶德慶四處遂定議立中緬條約附款時二十三年正月也是年英主維多利亞在位六十年命張蔭桓前往致賀二十四年四月議展香港界址至九龍城租期九十九年五月英租威海衛初威海為日本軍占領英人致書日相伊藤博文願代繳償發要求早撤兵會我償款繳清北洋大臣派員收回英使竇納樂遂請租借政府派慶親王奕劻尚書廖壽恆與立約文云以劉公島並在威海灣之羣島及威海全灣沿岸以內十英里之地租與英國威海衛城牆以內仍由中國自行管理又所租於英國之水面中國兵船無論在局內局外仍可享用並另備照會謂中國重整海軍船舶可泊港內請英人代為訓練是月英領事因沙市教案照請開辦湖南通商口岸張之洞以嶽州係奉準開埠尚須體察詳商辦理致總署請商緩總署擬推展兩年英使不允總署以湖南係我自開口岸與他口不同不許亦不許牽入沙案久不決二十五年五月駐漢英領事牒鄂督張之洞云本國巴管帶欲乘威拉小兵輪往洞庭湖上下遊先至嶽州再往湘陰長沙後往沅江龍陽常德安鄉等處張之洞以條約並無兵輪準往內地之説阻之十二月英參贊璧閣銜欲由湖南長沙取道常德永順入川過酉陽州抵重慶張之洞復阻之尋允改由宜昌入川二十六年拳匪起五月漢口英領事法磊斯見張之洞面述沙侯電云如長江一帶布置彈壓英願以水師相助張之洞答以當與江督劉坤一力任保護不須外助力阻之時英以保全東南商務為辭已派水師提督西摩入長江七月二十日聯軍入京英軍從廣渠門入各據地段八月英與德結保護中國商務土地條款又欲代中國理財練兵却之西摩欲派小輪入襄河探水道張之洞阻之既復議浙衢教案時湘案未結英又欲派兵輪往屢阻之是年英君主逝國書致唁皇太后復專電弔唁之二十七年既與各國議定和約大綱十二條四月英人請直隸山西停考張之洞以所請與大綱條約第十條不符辨駮久之七月始定議八月英商立德欲在川河行駛輪船沿江購地七處請地方官注册英領事照會到鄂以條約非通商口岸無準洋商置買地基産業之條拒之十一月英使馬凱赴江鄂與劉坤一張之洞商議免釐答以去年在京與赫德籌議洋貨稅釐併徵必須稅至值百抽二五方能免釐馬凱允加進口稅而不欲多加於是朝命尚書呂海寰為辦理商約大臣侍郎盛宣懷副之並命劉坤一張之洞皆與議研商數月海寰等乃會奏臣等奉命會辦商約英使馬凱開送約稿二十四款聚議六十餘次加稅免釐一款業經奏明允如所請此外各款均經臣等隨時會奏惟第十款內港行輪續經妥定章程第十一款通商口岸權利共議列三條馬凱自請刪除統核所索二十四款駮拒未允者七曰洋鹽進口曰內地僑居貿易曰郵政電報曰設海上律例曰整頓上海會審衙門曰口岸免釐界限曰貨物同在一河免復進口稅議定後而又刪除者一曰通商口岸利權歸入加稅免釐款內併議藉為抵制者五曰新開口岸曰減出口稅曰三聯單曰子口單曰常關歸新關管理商允改妥者十一曰存票曰國幣曰廣東民船輪船稅則一律曰華洋合股曰整頓珠江川江曰推廣關棧曰保護牌號曰加稅免釐曰礦務章程曰內港行輪曰米穀禁令此就馬凱原議發目分別刪改歸併者也臣之洞等復向馬凱索議彼允入約者三款曰治外法權曰籌議教案曰禁止嗎啡皆我補救國計民生要圖幸就範圍實有裨益馬凱於定議後補請入約者二款曰修改稅則年限曰約文以英文為憑查係照舊約辦理為約中應有之義共計十六款臣等按馬凱所請加稅之款意在不得抵原撥釐金五百萬以外之洋債賠款及挪作別用恐各省再將貨物收捐業已先後奏明本定八月初二日畫押馬凱又接英廷來電必欲增詳明以慰加稅洋商之意駐英使臣張德彝亦稱英外部謂擬加之稅務須降旨歸督撫提用否則不能畫押似英廷用意總慮稅加而釐不能撤臣等詳細審度彼雖請全數撥還各省而內各省向解北京及應還洋債仍如數照撥我復照會聲明應撥各項即留存海關聽候戶部與各省商定抵解將來戶部如何商定派撥劃抵由我自主彼亦無從過問且現議償款易金還銀正以我財力竭蹶為言則加稅聲明祗抵裁釐不涉賠款可見毫無盈餘藉可杜列國之口實畫押已延多日即於八月初四日亥刻會同英使馬凱在上海畫押蓋印疏入報聞同時又續改內港行輪章程十款自滬蘇滬杭蘇杭三線外江蘇則有海門線自上海東北至海門蘇鎮線自蘇州至鎮江鎮寧線自鎮江至江寧鎮清線自鎮江至清江浙江則有餘姚線自寧波至餘姚舟山線自寧波至舟山海門線自寧波至台州之海門安徽則有廬州線自蕪湖至廬州江西則有南昌線自九江至南昌湖北則有武穴線自漢口至武穴襄河線自漢口至仙桃鎮嶽州線自漢口至湖南嶽州湖南則有湘潭線自嶽州至湘潭常德線自嶽州至常德而福建亦有水口梅花兩線皆發自福州又議湖南辰州府斃英教士案是月英交還關內外鐵路是年英皇愛惠將加冕特命貝子載振為專使往賀先期遞國書向例須候各國專使齊集同見英皇特定單班先見屆期行鞠躬禮英主答禮各述頌詞答詞二十九年春二月與英訂滬寧鐵路借款合同初英於光緒二十四年欲攬自滬至寧鐵路令英商怡和承辦已議草約旋以拳匪亂延緩久之始定議以年息五釐借英金三百二十五萬鎊張之洞乃上奏言借英金三百二十五萬鎊虛數九扣年息五釐五十年為期準其分次印售金鎊小票如中國國家有款撥給或中國紳富集資願購借款總數便應照減撥還淞滬鐵路工價後即將已成車路暨備造滬寧全路作為借款抵押所獲餘利銀公司得五分之一即照售票應分之數另給餘利憑票十二年半後每百鎊加給二鎊半隨時可將小票贖還二十五年後便照一百鎊原價取贖毋庸加給至餘利憑票年期屆滿分給餘利即時作廢毋庸取贖造路期內就本付息路成以後贖票撥本悉在鐵路進款支給全路訂定五年全竣設無事故逾此期限銀公司五年內應得餘利全行扣罰上海設立總管理處一所本省督撫與督辦大臣會派總辦兩員會同英員專理工程另由南洋大臣加派一員職銜相當隨時查閲帳目稟報督撫稽核洋工司祗管工程不能干預地方公事凡所建築悉應順洽華人意見尊敬中國官員借款期內不收專稅如日後中國推設各項稅捐如印花稅之類別項商稅一律徵收則滬寧鐵路亦應照準全路雙軌地畝總公司自備仍由銀公司墊款另須購地於標界之外預備日後推展商務所必需一併加售小票綜計不得逾英金二十五萬鎊年息六釐在中國應得餘利項下支給不能仍由鐵路進款支付此項加售購地小票並無年限隨時可以取贖造路購用中外材料按照西例每百給五此外別無絲毫加用漢陽鐵廠自造料件訂明儘先購用凡遇調兵運械賑飢各事照核定車價減半給發儘先載運侵礙中國主權概不得經由此路正約簽定草約作廢十二個月不興工即將正約注銷中國祗認英國銀公司不準轉與他國及他國之人民報可十月又與英訂滬寧路電交接辦法合同三十年四月英新任水師提督率大小兵船十艘抵滬欲進長江張之洞聞之電阻英提督僅以四艘入江至江寧而止是年與英訂保工條約時英於南斐洲新屬欲招華工開礦政府援咸豐十年約與訂專章至是約成遣領事於華工駐在地善視之三十一年四月與英續訂滇緬電線約款英派委印度電務司貝林登為議約專員電政大臣袁世凱委道員朱寶奎與議貝林登又請添造江通至思茅副線一條不許遂定議簽押又與英訂道清鐵路借款行車合同初英使向總署索英商承造鐵路五條不許英復援礦務合同許有修築鐵路由礦山運送礦産至河口以達長江欲修澤襄鐵路嗣以襄陽至漢口水道不能通暢請改道澤鐵路欲在河南懷慶府與盧漢銜接渡河後折入安徽正陽關以達江蘇江浦縣之浦口改名懷浦鐵路總署以懷浦遠跨豫皖名為緯路實已斜亙南北隱然增一幹路以為有妨盧漢仍不許英使乃請修由澤州至道口鐵路許之鐵路大臣盛宣懷等與議借款為目二十一行車款十英金七十萬鎊五釐行息九扣交付折實六十三萬鎊又同時訂擬設山西鎔化廠及合辦礦務合同並請修廣州九龍鐵路英使復請借款合同須由外務部將上諭照會立案方允畫押許之三十二年四月與英訂藏印條約初中國於光緒十六十九兩年與英訂藏印條約然藏哲界牌既未建立英人入藏細則又久未定二十九年印督遣兵入藏次年春度大吉嶺據江孜其夏遂入拉薩及達賴私與英訂約駐藏大臣有泰始入告而英藏約已成政府命有泰與英議廢約無效復命外務部左侍郎唐紹儀為議約全權大臣赴印度與英外部專使費利夏會議費利夏欲我認印藏新約方允改訂紹儀不可英遂欲停議紹儀不得已與商訂約稿六條外務部王大臣以約內第一款有英國國家允認中國為西藏之上國一語最有關係電紹儀使改上國為主國費利夏持不可約久未定九月召紹儀回京而以參贊張蔭棠為大臣接辦約事外務部商諸英使薩道義刪約稿第一條英政府允諾而其他條款則不容再改然費利夏仍堅持初議數促蔭棠畫諾即第一條亦不能增減一字蔭棠力拒之會英廷新易政府繼任者乃飭薩道義在京續商久之始議訂正約五條未幾片馬交涉又起片馬處滇緬交界之間屬於騰越英併緬甸至是兩國會勘境界至片馬附近各執為本國土地久不決時英又欲遣工程師勘騰越至大理中間道路請中國保護滇督丁振鐸照會英領事以滇現奏設公司自行修造與前會勘時情形不同請勿派往英使朱爾典旋照會外務部云據光緒二十八年二月初七日照會英得有承造新街至騰越鐵路之權而承辦此段較短之鐵路英政府不能視為足抵光緒二十四年三月準法政府或法政府所指之法商修造勞開至雲南府鐵路之利益外務部覆引中緬附約謂第十二條載明中國答允將來審量在雲南修建鐵路與貿易有無裨益如果修建即允與緬甸鐵路相接是該處中國境內鐵路應由中國自行審量逮光緒二十七年九月十九十月十六等日本部先後復薩前大臣照會均一再守此旨並聲明法國鐵路由雲南邊界修至雲南本為條約所準與滇緬約意不同緣兩國交涉各有約章可據固不能相提並論也逮二十八年二月初三日準薩前大臣照稱本國署理騰越烈領事不日將往雲南府與滇督面商鐵路邊界各事宜滇緬鐵路相接為振興商務之舉凡在滇省允給法商之利益應一體允給英商本部當以原照所稱面商鐵路邊界各事宜又稱滇緬鐵路相接曰邊界曰相接均係按照原約立論故於是月初七日以據咨滇督也嗣於本年正月準滇督文稱準英務領事照會接烈領事來電奉緬政府電擬由新街達騰越修造一鐵路以便商人運貨先派公司勘明可否能修再議商辦當復以派員會勘各修各路各出各費等語是滇與英領事所迭次議商者亦均扼定約章鐵路相接之一語毫無刺謬本年五月滇督奏請修理騰越小鐵路籌款自辦奉旨允準原期中國雲南境內次第修建以符與緬路相接之權乃貴大臣來照以為英政府得有承造新街至騰越鐵路之權並引二十八年二月初七日之文為據而以允給法商之利益相比例實與中緬附約暨本部迭次照會之意不符蓋不認英有造騰越鐵路之權也三十三年正月與英訂九廣鐵路借款正合同初英既得九龍即請承修由廣州至九龍鐵路總署令督辦鐵路大臣盛宣懷與英商怡和洋行議辦已簽草合同五條旋因事未行至是又以為請外務部電知粵督岑春煊以此項草約雖云仿照滬寧辦法而滬寧路長費巨九廣路短費少情形不同應查酌第二款熟權利弊派員與中英公司研商以符原議四月與英公司代理人羅士濮蘭德議岑春煊欲照津榆鐵路辦法濮蘭德以成議在先不允由粵到京與唐紹儀等接議久之約成議借英金一百五十萬鎊照虛九四折納年息五釐以本路作抵押三十年為期滿十二年半後按照列表分期還本二十五年以前如欲於表額外多還股本每英金一百鎊加還兩鎊半中英公司代售此項股票其股票填明價值若干鎊由中國駐英大臣與英公司商定所有建路及一切工需均由粵督督辦其重要職司應用中國人允當開工時即於廣州設立總局一所總理造路行車各事由總督派中國總辦一人管理佐以英國總工程司及總管帳各一人均由總督核準英公司辦事出力給豫酬金三萬五千鎊兩期交付其一切用錢暨酬勞費均在內並聲明此路確係中國産業倘自本合同簽定之日起八個月並未興工即作廢紙所載權利均不得讓給他國中國亦不得另建一路以奪本路利益旋簽押六月政府命湖南巡撫岑春蓂查辦雲南與英畫界失地案先是雲貴總督丁振鐸委候補知府石鴻韶與英領事烈敦會勘騰越北段尖高山以北界從尖高山起向北勘越高黎共雪山直抵麗江府所管地烈敦執定以大啞口為界石鴻韶執定以小江邊為界貴州提學使陳榮昌奏參石鴻韶定界有失地事政府命岑春蓂查辦春蓂派候補道沈祖燕往勘旋覆稟云卷查烈領事此次所勘之界係從尖高山起東至膽札山過狼牙山磨石河頭搬瓦丫口姊妹山大啞口茨竹丫口片馬丫口直上高黎共雪山北往西藏所云大啞口即為恩買卡河與潞江中間之分水嶺其照會石道有云由明光河頭直上高黎共雪山頂由山頂北往西藏凡水入金沙江者概歸緬甸管理等語若不幸照此定界則是由滇而蜀而藏邊界之地所被其割去者當以數千里計外務部所謂直是分割華境是斷不能允從可無庸置議者也若石道所擬以小江邊為界係從尖高山起由磨石河頭直上歪頭山過之非河經張家坡登高良共山又抵九角塘河順小江邊復另行橫出上至小江源又至板廠山為止查其所勘之界於騰越保山雲龍龍陵各屬土司素所管轄之地數百年來向化中國者一旦棄去不少又言北段界務自以外務部所言之界線由尖高山起至石我獨木二河之間循恩買卡河至小江西恩買卡河之東之分水嶺為界按此嶺當是他戛甲大山最為持平且英使本有以小江即恩買卡河以東之分水嶺作為定界又云天然界線係自東流入恩買卡河即小江諸江之分水嶺等語與此正合則此次勘界即於恩買卡河循流而行至小江止已足滿意且所勘滇緬北段本祗為騰越與野人山之界則必執定騰越諸土司之屬地及野人山之分界處以畫界自是一定不易之理而與小江即恩買卡河以東之分水嶺又自東流入恩買卡河即小江諸江之分水嶺並與譯出薛星使福成二十年簽押英文圖內之恩買卡分水嶺其部位亦均相符合石道併不先自詳審界限而惟處處曲徇以致失誤此真為人意料所不及者也查此次勘界英使既言以小江即恩買卡河以東之分水嶺為界又言自東流入恩買卡河即小江諸河之分水嶺既明曰以東又明曰自東流入何以任烈領事之混為西流竟勘至狼牙山迤北至大啞口而止此其誤者一又外務部覆稱明有各守邊界之文此為甘稗地茨竹派賴燒殺之役而起各守之地自即在此何以不實守此小江邊界之説至小江順流而下而反另向東行指鹿為馬再直上別尋一小江源至板廠山為界此其誤者二又英使所言天然界線乃自東流入恩買卡河即小江諸水之分水嶺而烈領事所勘乃指恩買卡河與龍江之分水嶺謂嶺之東所有溪河均入明光龍江嶺之西所有溪河均入恩買卡金沙江以此嶺之東西為中緬之分界石道不能明據小江東流力為駮斥而乃以山形水勢則然一語含混答覆而竟任烈領事之隨意所指東西自便此其誤者三且即如英使照會恩買卡河與潞江之分水嶺之説此嶺即為大啞口亦祗西勘至片馬丫口為止何以任烈領事直上高黎共雪山竟偕測繪王生勘至麗江府屬蘭州邊界始回也此其誤者四又小江外如噬戛等寨係騰越屬之茨竹大塘土司所轄籠榜係保山屬之登埂土司所轄確鑿可據乃烈領事照會言貴道來示謂已拼諸化外而石道覆稱又言業經聲明久在化外石道責在勘界並不援據力爭而反先自認久在化外實所不解此其誤者五又茅貢等寨原係滇灘屬土司所轄本中國舊有之地不過英兵曾經至此並強收門戶稅而已並非英人實已占為屬地而中國有允認之明文也乃石道照會謂早經貴國辦過案件不復管理竟絶不置辨此其誤者六至於大啞口外如甘稗地等各處烈領事欲仿三角地成案作為永租既欲議租則已明認為中國之地正可趁此力駮使之無辭可遁計大啞口外共有一十八寨其地甚廣豈可輕棄且既認租則茨竹派賴燒殺一百十四命之案明是入我中國之界正可提議使之不能諉卸何以絶不辨論此其誤者七又狼速之地甚為遼闊一名狼宋大理府志莪昌散處於狼宋曹澗趕馬撒之間道光十八年準兵部議以趕馬撒曹澗等寨歸雲龍州管轄則狼速乃大理府屬境若如石道所勘另尋一小江源至板廠山為界則不特噬戛等一十八寨拼諸化外且並將狼速地一帶地方亦概棄之不問矣此其誤者八然此八者甚害尚祗在滇省也更有大誤足以為將來之後患者一則小江外之狼速地一旦棄去再北而為怒夷其地踞龍潞兩江之上流東接維西中甸直通麗江北與四川之巴塘𩹉塘諸土司相接西北即可以通至西藏一則高黎共雪山之地任其節外生枝自往履勘將來若果曲從則即可從此高黎共雪山之頂沿潞江金沙江之上流由北直進不特球夷怒夷之地去其大半即維西屬之鋪拉籠西藏屬之擦瓦龍一帶皆將被其所侵占所失之土地豈尚可以數計岑春蓂得覆即據以入奏上諭革石鴻韶等職仍不允時因津鎮鐵路借款直隸山東江蘇三省商民欲廢約英不允允改章德與英同英又因鄂境修造粵漢川漢兩路需款欲借款於中國却之是年山西商務局與英福公司議定贖回開礦製鐵轉運合同初晉省礦由晉商與福公司商人羅沙第訂立合同旋於光緒二十四年復由商務局紳商與福公司改訂借款章程二十條三十一年又經盛宣懷續立合同四條案久未結至是商務局員紳並全省代表各員在京開議訂定贖回自辦合同十二條贖款行平化寶銀二百七十五萬兩由山西商務局擔任按期交清三十四年二月與英訂滬杭甬鐵路借款合同先是滬杭甬鐵路已立有草合同四條一訂草約章程與滬寧鐵路章程一樣二將來訂正約仍與嗣後商定核準之滬寧正約一樣三從速測勘四如有地方窒礙之處即行更正俟訂正約即會同入奏至是浙江紳士籌辦全省鐵路欲廢前約收回自辦英使不允因命侍郎汪大燮等與英公司改商借款辦法久未決於是政府再命侍郎梁敦彥接議分辦路借款為兩事路由中國自造除華商原有股本儘數備用外約仍需英金一百五十萬鎊即向英公司籌借按九三折扣交納年五釐息以三十年為期並聲明如所收此路進項不足由關內外鐵路餘利撥付凡提用款項均由郵傳部或其所派之人經理此鐵路建造工程以及管理一切之權全歸中國國家英公司代購外洋材料機器以三萬五千鎊作為酬勞一切用銀均在內選用英總工程司一人仍須聽命於總辦等語遂定議九月與英訂藏印通商章程是年借英匯豐及法匯理銀行款收回京漢鐵路宣統元年四月督辦鐵道大臣張之洞與英及德法美四國銀行訂粵漢川漢鐵道借款草約豫定六百萬鎊會之洞卒復與盛宣懷立約續成之又與英及德兩公司續訂津浦鐵路借款合同共二十四款借英金五百萬鎊年息五釐路工四年造竣二年英人以兵力據片馬設炮台於高黎貢山侵踞小江以北茶山土司地滇人大憤各省人亦起應之遂電政府請力爭滇督李經羲亦請外務部與英使交涉英卒不退兵三年復派員與英劃境不省是年度支部尚書載澤與英及德法美締結一千萬鎊借款契約以改革幣制及東三省興業為詞是為四國借款契約又與英訂禁煙條件原議十年遞減至是中國以為國內栽種吸食漸已減少欲縮短年限禁絶與英特訂專條期印藥不入中國而第三條又言廣州上海二口為最後之結束不能驟禁於是煙卒不能禁矣
