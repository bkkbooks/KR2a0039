body:
  text: 清史稿卷一百五十五志一百三十邦交三法蘭西法蘭西一名佛郎機在歐羅巴之西清順治四年來廣東互巿廣東總督佟養甲疏言佛郎機國人寓居濠境澳門與粵商互巿仍禁深入省會法人素崇天主教康熙以來屢禁漢人入教道光二十五年法商赴粵詣總督署請弛漢人習教之禁總督耆英據以入告許之開堂傳教仍限於海口禁入內地咸豐三年十二月有法輪船一駛入長江未幾解纜去而法與英美又欲變通成約廣東總督葉名琛以換約未屆期拒之遂偕英美逕赴天津要求如英美幷請釋陝西傳教人長蘆鹽政崇綸等以聞上以定例五口通商外不許外人擅入內地何以陝西盩厔縣有法人傳教飭令詳查並嚴詞拒之乃去時粵賊踞上海築礮隄防禦吉爾杭阿因向法提督辣厄爾告以賊築礮隄爾國領事署首當其衝應速遷以免受傷辣厄爾立毀其隄并礮擊賊事聞奬之六年六月英美各國求換約法公使顧思照會兩廣總督葉名琛援約與英美一體力阻不從七年十二月二十一日英人結法公使噶歷為援襲入廣東省城擄名琛以去先是法人謂有人殺其說書老人向名琛索犯限三日交出並要求五事一入城二索河南地三求改章程四索補兵費五求通商限日答覆名琛回牒許通商餘皆不許而又不設備遂至被擄英法連檣赴天津美俄亦相繼至各有所求法人又欲推廣商埠任意傳教遣公使駐京入內地買絲茶並請查辦廣西西林縣殺馬神父案皆不許八年三月法與英人攻踞海口礮臺進逼天津於是命大學士桂良吏部尚書花沙納往議徇所請遂於五月定約法得通商傳教及兵費幾與英等九年五月法公使布爾布隆以進京換約為名隨英公使普魯斯赴天津拒不納致傷敗數百人折回上海聲言調兵復仇未幾法人復北駛分擾登青等處十年六月隨英來攻連陷新河唐兒沽北岸礮臺遂入天津先是遣西寧辦事大臣文俊武備院卿恆祺往議不報至是又遣桂良恆福為欽差大臣往津會議冀緩師而法與英益恣要求初津約原許補法軍費二百萬英四百萬至是英索倍加法欲照英數復要求天津通商京師長駐朝旨不許乃隨英督兵北上進逼通州京師戒嚴怡親王載垣等再議和不就進薄京師八月恭親王奕訢留守再議和九月和議成所得通商軍費權利與英等而傳教建堂初無限制十月始定傳教之人須薙鬚服中國衣冠其入內地預領中法合同護照向所過地方官鈐印以為信據法人以江南為新許商埠欲早通商請助勦粵賊不許十一年二月法公使布爾布隆偕英使普魯斯由津如京此為各國公使駐京之始先是條約有還清軍費始行退出廣東省城之議至是法人哥士耆來言願先撤兵退出粵城並求廣東藩署賃作領事署又索還京城及各省天主堂舊基均許之九月交還廣東省城同治元年正月粵賊陷蘇松常太等郡朝議募洋將助勦法人與焉是年貴州提督田興恕殺教民毀天主堂法使哥士耆以為言朝廷命崇實駱秉章勞崇光及張亮基入黔查辦久不決會哥士耆回國新公使柏爾德密至始允照中律擬結同治四年法請開江寧商埠五年議招工章程七年冬四川酉陽州有殺傷教士案又有貴州遵義民教仇殺事法使羅淑亞上書稱遠臣歸咎於中國官吏且言當離京往津候本國水師提督到後偕行以為要挾命湖廣總督李鴻章查辦久之始結十二月始遣欽使總理各國事務衙門章京志剛孫家穀偕美前使蒲安臣至法遞國書見其國主那波侖第三復見其后各致頌詞成禮而退九年夏五月天津民擊殺法領事豐大業初天津喧傳天主教堂迷拐幼孩抉眼割心為藥料人情洶洶三口通商大臣崇厚等詣法領事豐大業赴堂同訊觀者麕集偶與教堂人違言磚石相拋擊豐大業怒徑至崇厚署忿詈至擬以洋槍出遇劉傑復以槍擊傷某僕遂羣起毆斃豐大業鳴鑼集眾焚燬教堂洋房數處教民及洋人死者數十人事聞命大學士直隸總督曾國藩赴津查辦國藩至津示諭士民宣布懷柔外國息事安民之意法公使羅淑亞來見以四事相要曰賠修教堂曰埋葬豐大業曰查辦地方官曰懲究凶手尋牒請將府縣官及提督陳國瑞抵罪國藩拒之與崇厚會奏稱仁慈堂查出男女訊無被拐情事懇降諭各省俾士民咸知謠傳多係虛誣請將道府縣三員均撤任查辦奏入報可遂於八月擬結辦為首十數人天津府縣減戍黑龍江十一年法遣全權大臣熱福里如京換約並進書籍十二年穆宗親政各國請覲見法與焉是年法人侵越南入河內省城光緒四年始遣兵部左侍郎郭嵩燾以英使兼法使明年代以太常寺少卿曾紀澤越南向隸藩屬自法據西貢脅越人訂約許於紅江通舟曾紀澤與法外部言法越私立之約中國不能認不省八年二月法兵船由西貢駛至海防進口三月陷河內省朝議始遣提督黃桂蘭等軍出關既而法公使寶海向北洋大臣李鴻章要求中國退兵及通商保勝驅逐盜賊畫紅江南北為界朝廷下各督撫議法人見不允所求遂欲增軍撤使以相恫喝九年三月戰事起法據南定旋為劉永福所敗會越王薨法以兵脅嗣王立新約二十七條盡攘其兵權利權政權並申明越境全歸保護中國不得干預中國聞之乃命唐炯徐延旭出關彭玉麟辦粵防張佩綸會辦軍務會山西北寧連陷官軍退守太原法乘勢擾浙閩陷基隆澎湖至是始宣戰十年二月諒山大捷法忽請和帝命吳大澂陳寶琛張佩綸會辦海防以議和全權任李鴻章先是福祿諾所擬五條僅允不索兵費不入滇境而要挾中國不再與聞越事議久不決五月法兵以巡防為名忽攻諒山敗走藉口中國不能如約退師責賠費不允法使巴德諾出京六月攻台北基隆為劉銘傳所敗秋七月法水師提督孤拔等率兵船入閩泊馬尾等處迫交船廠欲據為質時張佩綸以會辦海防兼船政大臣漫不設備法遂開礮毀船廠復分兵擾東京臺灣陷基隆窺諒山十一年春正月犯鎮南關楊玉科戰沒旋收復大創之並砲斃孤拔於南洋法人乃請和願照天津原約不索償款李鴻章與議新約十條一法自行弭亂華不派兵赴北圻二法與越自立約或已定或續立中越往來不礙中國威望體面亦不違此次約三六箇月會勘界北圻界處或稍改正以期兩益四法保護人民欲過界入中國邊員給照華人入越請法給照五保勝以西諒山以北通商華設關法設領事北圻亦可駐華領事六三個月內會定商款法運越貨稅照他處較減七法在北圻造鐵路中國若造鐵路雇法工八此約十年再修九法即退基隆二月內臺灣澎湖全退中法前約照舊等語旋法派戈可當代為駐華公使欲改前約出所擬二十四條鴻章以與原約不符不許戈使又欲辦滇粵礦務及製造土貨運越南食鹽復拒之又欲於雲南省城及廣西內地設領事時正遣鄧承修周德潤與法勘界鴻章謂宜俟邊界勘明方能指定通商碼頭戈使又要求稅則減半鴻章祗允五分減一又另擬通商章程十八款並將互交逃犯洋藥進出口各條亦擬在內法使復援咸豐八年約內第七發有工作二字仍要求增入在口製造許之時雲南界務周德潤會商岑毓英後出關與法使狄隆晤商擬先勘保勝上游一二段並同擬全局辦法八條一中法兩國勘界大臣等說明所應勘之界俱是現在之界一勘現界後或有改正之處兩國勘界大臣公同商酌如彼此意見不合各請旨商辦一續開勘雲越交界中國大臣等意欲一律勘完所以照會法國請旨一各大臣等商議先由老街勘到龍膊河及龍膊河鄰近地方復回老街再勘老街鄰近地方一勘老街至龍膊河之界中法繪圖各官從紅江南岸歸一路同走中國繪圖官歸法國保護自老街起至龍膊河止兩國勘界大臣等各走雲越邊界一紅河自北河岸之老鏊至南岸之龍膊以河中為界一雲越之界遇有以河為界均以河中為界如有全河現在歸中國界者仍歸中國現在歸越南界者仍歸越南一勘界時隨處開節略圖說均由兩國大臣等畫押以上節略彼此畫押遵守德潤與狄隆各按地圖校改互有爭執而於大小賭呪河猛援猛賴兩段爭執尤力會法勘路弁兵在者蘭被越游勇所戕法指為雲南提督散勇中國不承狄隆欲緩勘但就圖定界粵東粵西界務鄧承修與張之洞李秉衡等會商其與法使浦理燮在關門文淵會議承修執約內北圻邊界必要更正以期兩國有益之語欲以諒山迤西自艽葑高平省至保樂州東自祿平那陽先妥州至海寧府劃歸中界浦使以據約不過於兩邊界址略為更改不能及諒山及東西地旋允請示本國卒不行十二年復議界會浦理燮病僅由鎮南起勘至平關而止東西不過三百餘里餘未履勘浦理燮旋回國法改派狄隆由滇赴粵與鄧承修等議界先是鴻章欲先議界後議商約法使不從乃復議商約至是議成十九款一保勝以上某處諒山以北某處中國設關通商許法設立領事二中國可在河內海防二處設立領事並可商酌在北圻他處設領事惟須後日三兩國領事駐紮及商民通商均須優待四中國人在越置地建屋及官商往來公文書信電報法允保護遞送五兩國游歷人過界各發給護照六七出口貨照稅則三分減一進口貨照稅則五分減一估價之貨為稅則所未載者進出口仍照值百抽五徵收至洋土各貨赴內地買賣應完子口稅不在減徵之列八九載明洋土各貨在邊關已完稅復轉運通商各海關者均照海關稅則另收正稅不以邊關單作抵其在邊關所領存票亦只准在邊關抵稅概不發還現銀十至十二嚴防詐偽偷漏之法十三定洋人自用雜物免稅之法十四定洋土各藥不准販運買賣十五米穀等糧不准販運出中國邊關進關准免稅違禁物各禁十六中國商民僑居越南所有命案賦稅詞訟等件法國應優待十七中國人犯罪照中律法領事宜拘送不得庇匿十八十九定條約續修期限及互換遵守各事是為滇粵邊界通商約商約既定鄧承修即赴欽州之東興與狄隆議勘東界狄隆以中國所屬江平黃竹白龍尾為越境鄧承修以數地皆內地有圖可據不許辯論不洽狄隆又約履勘承修欲照雲南分途履勘辦法並請先撤江平法兵越日復議請旨立約三條一大段相合二較圖不合作為未定各請示本國三勒其去江平之兵及辦事官員又令以後未定界內不得再派兵及官員前往狄隆不允轉要承修不得於未定界內駐兵時張之洞所派道員王之春李興銳亦與會議議界將及一年中國屢請撤兵法兵分屯江平黃竹石角句冬白龍尾等處如故會總署允承修所定三條承修命王之春往議狄隆執不允而法人突以兵踞白龍尾驅害汛兵華民築營壘承修詰令撤退狄隆諉之時桂界已校竣欽界南自嘉隆河北抵北崙十萬山分茅嶺西至峒中墟北亦允歸中國而白龍江平狄隆謂須以商務抵換又以九頭山未議及之春與議亦無效狄隆又欲議海界以津約所無未奉旨議海界卻之法又欲以白龍江平抵換龍州通商初恭思當來華也即有求改商約之請總署以界務方殷且商約既經畫押何能議改拒之至是復以為請並以商務苟可通融界務亦可稍讓稱已奉本國訓准令在京商辦總署以狄隆與鄧承修議界久不決允與商辦恭思當始允中國廣東邊界除現在勘界大臣劃定外所有白龍尾及江平黃竹一帶地方並雲南邊界前歸另議之南丹山以北西至狗頭寨東至清水河一帶地方均歸中國管轄又議減稅總署以俄國通商章程辦有成案滇桂邊界皆為陸路不得不酌議減稅以歸平允於是議進口稅減十分之三出口稅減十分之四滇土藥每百觔定稅釐各二十兩必完釐者方准法商完稅接買並不准法越商人往入內地販運高平諒山往來之船隻免徵稅仍納船錢惟運販食鹽接辦鐵路及越南與滇粵通商進出口稅則均請減半運中國土貨往中國各海口稅則減三分之一各節均拒絕刪節計訂商務續約十條界務續約四條又照會緩設領事及法在龍蒙等處之領事等官不得設立租界二端是為與法勘界通商續約十四年法領事藉口華船常到海防向廉州請示諭船戶須向領事領照無照即將船扣留張之洞以條約向章所無海防各國船隻均可往何獨華船不許嗣聞法領事張貼告白收取船規每船輸銀自數元至數十元不等云係法使所定之洞致總署請其停止收規是年法人請接中國兩粵電綫許之又芒街法兵越界焚劫那沙之洞致總署請向法使責賠償十五年法船駛進瓊州所屬崖州東百里之榆林港測探水道上岸釘樁插標阻之法領事又在北海徵收漁船照費政府以有侵中國主權不許十月定界委員李受彤與法官勘東興一帶河界定議此後河中淤有沙洲近華者歸華近越者歸越河道即有更改無論河在何境兩國均許行船是年法使以華兵駐越南之板邦為言又稱那沙墟不在中國界內實在北圻橫模社對面先安河北岸與板邦相近又稱去冬官兵迎收被剿敗匪係指離芒街八里之寧陽大廟對面大河北岸而言並命查復嗣李受彤復電謂州西分界自八莊歷板興板山冷峒止前有溝離越南峒中三里即以此溝為界冷峒係丑艮寅向峒中係未坤申向那沙在西北戌乾亥向峒中墟居中兩旁有溝水向西合流入先安河以方向論溝西南概為越地溝西北概為華地以社論那沙與板峒為建延社地與峒中為橫模社地無涉以交界論那沙北歷那懷約二十五里即北岩係廣西上思州地以欽差所定界圖論那懷屬我那沙即附連那懷相離僅三里前並無墟去年正月峒中墟華民始由峒中遷此去年十一月以前法未踰溝到此十二月始有焚殺那沙墟事擄去婦女隨即給銀放回其法官自向婦女言係踰界誤拏再查界圖西北有板邦隘係廣西地又土人言橫模西南離六十里有板邦屬越地峒中之東並無板邦只有板奔離峒中約九里係內地去年秋萃軍防營駐此因疫退駐板興今板奔並無防勇又查寧陽離芒街十餘里在東興西南中隔河必船乃渡即有勇亦難迎庇且並無勇等語又馮子材電亦云然張之洞以兩說歧異由於華民以溝水為界法以先安河北岸為界溝即河也原圖均未指明那沙係去年正月新立之墟距界甚近故致彼此爭執既悉板邦隘另是一地實屬廣西十六年九月歸逃人魏名高等十八人十七年八月法使林椿改擬新咖雷多尼招工合同第十四條緣第十四條中國原擬派員作理事官林使不允改作為華工統領所得權利僅止赴訴公堂及請狀師理論李鴻章以所改仍與工頭無異焉得有權保護不許時湖南民攻詆洋教法領事欲赴長沙開馬頭設教堂阻之十九年四月請東興芒街接修電綫粵督以前辦界案尚有數十里至今未定遽與接綫界未劃定之處歸何人保護必致多生轇轕仍促先速定界二十年法使日海遞國書又議寓越華人減身稅事並論暹羅邊界李鴻章據英與法議暹羅交界有甌脫地應歸中國日海不允三月與法會勘欽越界初法派巴拉第法蘭亭均以約內載明屬我之板興嶺懷等處爭為己有政府不允至是法改派柯麻暨其總辦釐接辦粵督李瀚章派李受彤與會勘始知巴拉第法蘭亭所爭險要與越南皆隔深溝峻嶺而溝尤多因與約定按界綫有水處以水為界有山處以山為界計長四百里陸界僅五十里皆峻嶺餘悉溝界惟披勞縱橫約三里各分一半餘如原勘圖約所載分茅嶺板興板典嶺懷等處及峒中十里均歸中國時滇越亦議界滇督王文韶不允爭已定界祗就黃樹皮箐門及猛岡各處向駐有華兵處緩撤兵以待法防之至界約遂定二十一年中日約成法求換商約界約遂許開龍州蒙自等埠並與越界綫內猛烏烏得二地初中國認此二地為寧洱縣屬車里土司之地法使謂舊屬越遂歸法有二十三年法要求瓊州不割讓租借於他國許之二十四年法乘廣東雷州人殺其士民二人以兵艦據廣州灣來商租借言為停船屯煤之所無損中國主權而所租借跨高雷二府之間由海岸以入內地所得東海洲各島及赤坎志滿新墟等處均歸入租界又得吳川之半島及通明港是年又以兵強佔上海寧波四明公所義地寧人罷巿幾激變久之始定時廣西永安有殺斃法教民之事方議辦犯劾官賠償建堂四條適值北海鐵路造至南寧援龍州鐵路案中法合辦法使遂要求將鐵路歸併教案議久始允就案議結不及他事又施南宜昌長沙均因教堂教民啟衅未結二十六年春拳匪亂法人調兵與德英俄美日本聯軍入京復督兵西進至廣昌屢阻之二十七年展漢口租界是年法遣鮑渥為駐華公使二十八年外務部與法隆興公司總辦彌樂石訂雲南礦務章程先是彌樂石到滇與礦務大臣唐炯議欲設中西礦務公司唐炯入告奉旨交雲貴總督魏光燾等與彌樂石議歷七閱月始竣乃入奏略謂一初議限制中國公司延聘礦師貸用洋款後亦不入別國洋股專用英法礦師定議一運礦自修鐵路接通滇越幹路訂明俟幹路成時再議並禁售票搭載客貨預存限制一公司收買山地按民間租價公平租賃地由滇官指交價由公司照給逾限三年不辦原地歸還業主一完納礦稅議定按出井出爐礦質每百抽五抵納稅課並派員分礦監收適彌樂石由滇入京向外務部催訂合同外務部告以礦地未定未便先議章程並不准攬辦全省彌樂石允指澂江臨安開化雲南楚雄等府及元江州永北廳凡七處載入章程第一發內將原議嗣後別國公司概不准來滇辦礦改為嗣後別國公司概不准在公司所指之地勘采以清界限彌樂石以原議包辦全省礦利故願歲給京銅一百五十萬斤並津貼員弁兵勇護廠銀二萬兩今既改為七處應請減議定繳京銅一百萬斤護廠費由公司給發不拘定數招募土勇改為禀請地方官招募遴選武官一員管帶遂定議惟第一發內載有公司尋出之金銀煤鐵五金白銅錫及火油寶石硃沙礦允給公司承辦等語滇督魏光燾以礦類白金白銅錫三項為原章所無因咨外務部請照滇中前定原章照會英法公使轉令彌樂石仍將三項刪除二十九年總理外務部慶親王奕劻與法使呂班訂滇越鐵路條約三十四條一鐵路自河口抵蒙自或由蒙自附近至雲南省城日後擬改須彼此商准二至四勘路繪圖及交地購地各事五各項廠棧同時開工六鐵軌寬一邁當七鐵路經過地方不得損壞城垣公署八九購料及挖取沙石採伐林木各事十運路及暫時興工各地用竣後即交還十一幹路造成商接支路十二各執事凡須專門學者可用外國人十三四工匠之招募管理及賞卹傷亡懲辦犯罪各辦法十五巡丁可募土民不得請派西兵十六洋員請給護照事十八租賃房屋事十九不得損及民人產業有則賠償二十火藥炸藥之運製及防險二十一二運貨納稅免稅各例二十三收費減費免費各例二十四鐵路不准載運交鹽及西國兵械如中國有戰事悉聽調度二十八設專門學堂二十九設電綫電話三十一滇省派員襄助公司三十二定公司補償中國查看費各員來往照料費三十四此路十八年期滿中國可與法國商議收回是年法人因吉林教案索賠償三十年秋七月法使館交還欽天監觀象臺儀器二十八件三十一年春法商欲自上海至紹興行輪阻之是年與各國定值百抽五稅則法有違言久之始允三十二年春正月二十九日南昌縣知縣江召棠被殺於天主堂先是召棠辦教案頗持正法教士王安之因上年荏港教案有二教民鄧貴和葛洪泰在南昌縣監禁強請釋放召棠向索縱囚其一匿法教堂中王安之不交函約召棠會飲被殺民情大憤集衆毀法教堂傷斃王安之及教習等數名並波及英教堂久之始定法人欲坐召棠自刎及派兵船來贛責償命鄂督張之洞查辦屢執仵傷單及醫憑單與爭終徇其請賠以法銀二十餘萬三十三年法遣領事入滇商辦事六月蒙自法郵局設代收遞人役詰之九月索還法人所佔塘沽碼頭宣統三年與四國銀行定粵漢川漢鐵路借款合同原借五百五十萬金鎊五釐行息專為築造粵漢川漢兩路法與英德美均與焉
