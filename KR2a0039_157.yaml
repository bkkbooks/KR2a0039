body:
  text: 清史稿卷一百五十七志一百三十二邦交五德意志德意志者日耳曼列國總部名也舊名邪馬尼居歐洲中原同盟三十六國而中惟布路斯最強咸豐十一年布路斯及德意志諸國請照英法等國換約江蘇巡撫薛煥不可其使臣艾林波赴天津呈三口通商大臣請立條約王大臣以聞命總理各國事務倉場總督崇綸充全權大臣赴天津會崇厚酌辦布使呈條約四十二款附款一條通商章程十款另款一條稅則一册其代呈德意志公會各國部名均照布國條約辦理既又稱日耳曼通商諸國欲在臺灣之雞籠浙江之溫州通商並照各國駐京辦事崇綸覆以日耳曼各國通商均歸布路斯統轄約束只辦通商不得涉別事並諭以京師非貿易之區不能派員常駐至雞籠溫州二處為英法兩國條約所無不能增益時當四國換約法使哥士耆言日耳曼各國其最大者為布路斯此外尚有邦晏等二十餘國一切章程歸布國議定崇綸等以所言告總署總署令哥士耆代阻之忽有布國人入京直入輔國將軍奕權宅強住總理各國事務戶部左侍郎文祥赴英館晤英使普魯斯言布國既不以禮來我國即不能以禮往並告以艾林波如或來京亦當拒之不得謂中國無禮也普魯斯請牒知艾林波令迅速調回未幾布人相率回津而艾林波牒總署猶要求如故遂定議以五年後許派秉權大臣一員駐京兼辦各國事餘與法國條約略同是為德意志與中國立約之始約既定總署又恐五年後布國派員來京仿照英法國住居府第復函屬崇綸等令其將不住府第一層載明約內艾林波允遞牒聲明將來不住府第由中國給一空間地基聽其自行修蓋許之艾林波隨來京詣總署謁見未幾回津同治元年冬布使列斐士牒辦理通商事務大臣薛煥江蘇巡撫李鴻章謂換約一事德意志公會內除本國外尚有二十二國曰拜晏曰撤遜曰漢諾威曰威而顛白而額曰巴敦曰黑辛加習利曰黑星達而未司大曰布倫帥額曰阿爾敦布爾額曰魯生布而額曰撤遜外抹艾生納曰撤遜麥寧恩曰撤遜阿里廷部而額曰撤遜各部而額大曰拏掃曰宜得克比而孟地曰安阿而得疊掃郭定曰安阿而得比爾你布而額曰立貝曰實瓦字部而魯德司答曰實瓦字部而孫德而士好遜曰大支派之各洛以斯曰小支派之各洛以斯曰郎格缶而德曰昂布而士曰模令布而額水林曰模令布而額錫特利子曰律百克曰伯磊門昂布爾請將和約照録二十二册鈐印分送各國薛煥等不許久之始議會同互換和約列舉德意志拜晏以下各國不再分送明年列斐士復遣隨員韋根思敦來京要求分送各國條約鈐用江蘇藩司印並請收各國國書許之三年春三月布國遣使臣李福斯來京欲見總署王大臣呈遞國書三口通商大臣崇厚以聞並稱布國坐來兵船在大沽攔江沙外扣留丹國商船三艘總署以布使不應在中國洋面扣留敵船詰之李福斯接牒即將丹船放回二艘並遣譯官謝罪總署始允會晤七年夏四月布路斯君主維利恩復以李福斯為秉權大臣來華呈遞國書八年咸伯國商人美利士私在臺灣大南澳境伐木墾荒閩浙總督以聞總署以美利士違約妄為牒布使詰問請其查辦十年春李福斯遞國書言德意志各國共推戴布國君主為德意志國大皇帝中國覆書致賀是年李福斯回國以領事安訥克為署使十一年安訥克以條約十年期滿牒中國請換約未果李福斯復來十二月復遞國書明年正月穆宗親政請覲見許之屆時李福斯因病回國署使和立本特備文慶賀因聲明將來本國使臣朝覲應按此次所定節略辦理許之光緒元年九月德國安訥船在福建洋面遭水賊殺斃船主大夥並毀其船閩撫丁日昌當將犯拏獲斬梟並追贓一萬三千餘元德使責中國賠償總署以德約三十三款明言不能賠償贓物不許二年德以巴蘭德為駐華公使春三月直隸總督李鴻章始遣遊擊卞長勝等五辨赴德武學院學習陸軍鎗炮操法巴蘭德牒總督催請換約十月巴蘭德復牒總署索三事一洋商在租界內售賣洋貨不再抽釐金二發給存票不立期限並準其以存票支取現銀三德商入內地採買土貨準攜現銀又請於年內開辦上海一口又求在大孤山添開口岸鄱陽湖拖帶輪船吳淞口上下貨物三端總署拒之屢辨駮不省明年五月遂偕翻譯官阿恩德出京既抵天津往晤李鴻章鴻章曉以兩國意見即有不合應往返商辦力勸之巴使乃回京總署促與開議忽言俟十月間再議是年德使館定居東交民巷仍納租價四年以光祿寺少卿劉錫鴻為出使德國大臣並遞國書劉錫鴻尋奏聞德外務大臣促巴蘭德速立新約而巴蘭德於吳淞起卸貨物鄱陽拖帶輪船內地租住店房三條仍力爭至是竟回國明年閏三月巴使復來華議約仍著重前三條時德丕里約夾板船至山東榮成縣所屬海面觸礁巴使要求賠償拒之巴使又以天津紫竹林無德國租界要求在法界以上另添租界不許是年閏五月以候選道李鳳苞為出使德國大臣六年春二月朝廷因德約議久未成特派總理各國事務協辦大學士兵部尚書沈桂芬戶部尚書景廉為全權大臣復與巴使開議久之巴使始允將大孤山鄱陽湖及洋商入內地刪去並照英國新約辦法彼此條款略相抵惟江蘇吳淞口一處允德船隻暫停泊上下客商貨物章程仍由中國江海關道自訂遂於二月二十一日畫押並聲明二事一德國夾板在中國口岸停泊十四日以外者則自第十五日起即於應交正數船鈔減半先行試辦一第六款內德國允德國人等條內有遊歷二字德譯與華文不符應將德文字意更正遂約自畫押之日起限一年內互換已巴使於六月三十日又來牒稱德國國法凡議立條約必須先問國會國會允許方能批準本國國會約在明年所議光緒七年三月初二日互換約章一款請將期限改為光緒七年十月初十日七年秋七月巴使請定期互換條約政府命景廉與巴使在北京總署畫押互換是為中德續約十款並善後章程九條八年夏六月德始與朝鮮議約中國派員蒞盟聲明為中國屬邦九年冬十月議結德魯麟洋行地畝案初廣東汕頭新開附地有海坪官地中國欲填築作為商埠忽有德魯麟洋行買辦華民郭繼宗謂係伊地陰結德駐汕頭領事沙博哈及德水師兵船豎旗強占中國聞之牒向德使詰問並命出使大臣李鳳苞與德外部辨論時德相為畢士馬克電致巴使命速令師船退出並撤領事任已德使歸咎中國地方官屢請派員查辦議久不決至是總署從李鴻章議令赫德派洋員會同粵員議辦遂辦結十年贈德皇景泰窰器答歷次派員監造鐵艦撥借魚雷及兵船教習等事修好也十二年春二月出使英國大臣曾紀澤將回華德駐英公使伯爵哈子斐爾德遣參贊官伯爵美塔尼克來言德皇暨德相畢斯馬克欲與晤談邀臨其國遂遊各製造局廠十四年秋七月德皇薨命出使大臣洪鈞弔唁德命駐華公使巴蘭德致謝二十年夏四月德人阿爾和欲在漢口建火油池初德商在上海創設火油池棧許之既又欲於漢口購地踵建不許德使爭辨旋議將火油照巿價收買及償造油製器各費德使仍不從明年又請增開天津漢口租界許之二十二年春正月德外部馬沙爾求在中國借地泊船出使大臣許景澄以告時李鴻章使德將還留稅務司德璀琳與德外部商辦加稅事德廷謂須中國讓給兵船埠地始允加稅德璀琳阻之不省二十三年十月山東曹州府巨野縣有暴徒殺德教士二人德以兵艦入膠州灣逼守將章高元退出炮台占領之德使海靖向總署要求六款一革巡撫李秉衡職永不用二給天主堂建築費六萬六千兩賠償盜竊物品銀三千兩三巨野菏澤鄆城單縣曹縣魚台武涉七處各建教師住房共給工費二萬四千兩四保以後永無此等事件五以兩國人資本設立德華公司築造山東全省鐵道並許開採鐵道附近之礦山六德國辦理此案費用均由中國賠償總署屢與折衝始將第一款永不用四字刪去二三兩款全允四六兩款全削除五款許以膠州灣至濟南府一段鐵道由德築造議漸就緒忽曹州有驅逐教師殺害洋人之説德使復要求租借膠州灣二十四年二月總署與德使海靖另訂專條三章一章膠州灣租界一灣內各島嶼及灣口與口外海面之羣島又灣東北岸自陰島東北角起劃一線東南行至勞山灣止灣西南岸自齊伯山島對岸劃一線西南行至笛羅山島止又灣內全水面以最高潮為標之地皆為租借區域二租借區域德國得行使主權建築炮台等事但不得轉租與他國中國軍艦商船來往均照德國所定各國往來船舶章程一例待遇三租借期限以九十九年為期如限內還中國則德國在膠州灣所用款項由中國償還另以相當地域讓與德國四自膠州灣水面潮平點起周圍中里一百里之陸地為中立地主權雖歸中國然中國若備屯軍隊須先得德國許可但德國軍隊有自由通過之權二章鐵道礦務辦法一中國準德國在山東築造自膠州灣經濰縣青州等處至濟南及山東界又自膠州灣至沂州經萊蕪至濟南之二鐵道二鐵道附近左右各三十里中國里內之礦産德商有開採之權三章山東全省開辦各項事務一以後山東省內開辦何項事務或須外資或須外料或聘外人德國有儘先承辦之權是為中德膠澳租界條約二十四年山東日照教案起德人進兵據城案結仍不退又中國擬修天津至鎮江鐵路德人阻之並欲自修濟南至沂州一段總署不許又要求中國借德款用德工程師二十五年山東高密民人阻德人修鐵路山東巡撫袁世凱諭解之因立鐵路章程設華商德商膠濟鐵路公司立交涉局招股購地丈量建築又立膠澳交涉章程十一款一兩國交涉案件須兩國會辦二德人遊歷須發護照三兩國交涉事統由交涉官商辦四青島租界內華洋案件歸交涉官提訊審斷五租界內華人牽涉德人案件須德官會同山東交涉官審問六德雇用華民之案須由德官審訊七華人案件仍由華審斷八租界外罪犯逃入青島華民及德人住處者分別由華官德官提拏解交九華德人在租界內外行凶華德兵均可拿禁解交十華德官商辦案件須和衷十一重大案件本省不能結者由總署及駐京德使商辦又與德議立礦務章程未定二十六年五月駐京德使克林德為拳匪所戕七月德與英法俄美日本荷蘭意比奧瑞十一國聯軍入北京推德將瓦德西為總司令瓦德西入居禁城儀鑾殿時命李鴻章為全權大臣入京議和各國提出條款一中國政府為被戕德公使克林德置立石碑一中國政府應派親王前往德國謝罪一將總理衙門撤去一嚴辦禍首一廢去大沽口及直隸各處炮台一禁止軍裝炮火入口一各省有曾經殺戮西人停止鄉試小考五年一有事直達中國皇上一駐華各使館永遠設兵保護一由京至海電報郵政設兵保護一國家公司以及私産均照賠久之始定議共十二款而為克林德立碑京城及遣醇王載灃入德謝罪均如所請行十月獲戕德使克林德犯恩海交德駐京提督誅之明年醇親王載灃至德見德皇遞書時帶廕昌一人俱行鞠躬禮二十八年秋七月德商在漢口華界逼近襄河口請設立躉船駮之時政府要求德及英法日本撤兵德使聞他國有在揚子江獨享中國特豫權利者請定明長江上下遊進兵要隘不得讓與他國以定撤兵日期拒之三十年與德會訂小清河岔路合同初膠濟鐵路章程原不許擅行另造枝路今為商務便利計特委膠濟鐵路公司代辦是年德水艦隊擬入長江及各內河遊巡演炮阻之三十一年德撤退膠州高密兩處兵隊初德人在山東修造膠濟鐵路因高密民聚衆阻工先後由青島派兵赴膠高保護鐵路山東巡撫袁世凱派員查辦議結駐膠德兵旋即撤回青島既拳匪滋事德人又派兵分駐膠州並於城北車站旁價購民地十四畝修造兵房二十九年秋又於附近沈家河續租民地七畝安設水管以便取汲高密兵隊先駐城內後又在城外古城地方議租民地九十餘畝修造兵房議定以六個月為限尋又修築由古城至小王莊火車站馬路一道時六個月限期已滿東撫商令退兵屢延展至是始訂撤兵善後事宜五款遂議結又議商約朝廷派呂海寰盛宣懷為商約大臣德人提出十四款袁世凱張之洞往返電商海寰等與德使穆默總領事克納俱迭次會議彼此堅持至三十三年始議定條約十三款在北京互換第一款釐金中國政府與諸國立約裁撤現有之釐金加增進出口之關稅以抵裁釐此約須立約各國派員議決德國政府亦允派員議結此事惟中國須當擔保釐金定必全行裁撤方可第二款住居德國人民及德國保護之人民準在中國已開及日後所開為外國人民通商各口岸或通商地方往來居住辦理商工各業製造等事以及他項合例事業且準租買房屋地基經商之地及他項實産並可在租買之地內建造房屋第三款關棧中國政府允準在通商口岸設法屯積洋貨及拆包改裝等事中國政府一經由德領事請將某德商或德國保護人民之棧得享關棧之利益則中國政府須準如所請惟須遵照海關所訂之專章辦理以保餉源海關官員又須與各國領事議定關棧專章以及規費若干須按照該棧離關遠近屯何貨物並工作早晚酌量核定凡在通商地方所設之關棧德國人民及德國保人民均準用之第四款礦務中國政府振興礦務並招徠外洋資本興辦礦業故允自簽押此約之日起於一年內倣照德國及他國現行礦務章程頒發礦務新章以期一面振興中國人民之利益於中國主權毫無妨礙一面於招致外洋資財無礙且比較諸國通行章程於礦商亦不致有虧是以中國政府須準德國人民及德國保護人民在中國地方開辦礦務及礦務內所應辦之事凡所辦礦業不得因稅項之故致其財源有所虧損除徵抽淨利之稅及礦産之地稅外不得另抽他項之稅第五款貨稅還稅之存票須自商人稟請之日起如查係應領者限於二十一日內由海關發給此等存票可用在各處海關按所載銀數除子口稅一項外以抵各項出入口貨稅至洋貨入口後三年之內轉運外洋凡執持此等存票者即準任便在發給之港向海關銀號按全數領取現銀倘請發存票之人意圖走漏關稅一經查出則須罰銀照其所圖騙之數不得逾五倍或將其貨入官第六款保護商標凡中國商標一經呈出在中國各領事所給之據證明此項商標已在中國認可且實屬於稟請之人者均可在德國享保護之利益與德國之商標相同華商之姓名牌號必須在德國保護以免倣冒德國商標亦須在中國保護以防假冒惟須呈出德國官員並領事所給之據證明該商標實已在德國注册德商之姓名商標以及中國行名均須保護凡德商包裹貨物之特法在中國之同業曾已認為某行用以區別某項貨物者亦須一律保護德國保護之人民亦能享以上所言之利益商標注册局一經成立保護商標章程亦已刊布則中德兩國必須開議特約以便彼此保護商標至此約未議之前以上之款必須施行第七款營業中國人民購買他國營業及公司之股票是否合例尚未明定又因華民如此購買為數頗巨故中國現將華民或已購買或將來購買他國公司股票均認為合例凡同一合資公司願入股購票者彼此一律不得稍有歧異遇有華民購買德公司股份者應將該人民購買股份之舉即作為已允遵守該公司訂定法律章程並願按德國公堂解釋該法律章程辦法之據倘不遵辦致被公司控告中國公堂應即飭令買股份之華民遵守該章程當與德國公堂飭令買股份之德國人民相等無異不得另有苛求德國人民如購中國公司股票其當守本分與華民之有股份者相同凡尋常合資股東及一人或數人有無限之責任與一人或數人有有限之責任為合資股東在德屬經商之有限合資公司注册合辦會社有限公司及各項商業公司等均須按照以上二節辦理茲並訂明本約告成之時凡曾經呈控公堂而由公堂判定及不豫準理之案均與是款無涉第八款開埠凡各國代其本國人民船舶索開之口岸地方德國商人與德國保護之人民及德國船舶均可共享此益第九款行船中國本知宜昌至重慶一帶水道宜加整頓以便輪船行駛所以彼此訂定未能整頓以前應準輪船業主聽候海關核準自行出資安設拖拉過灘利便之件其所安設利便之件無論民船輪船均須遵照海關與創辦利便之人商議後所定章程辦理其標示記號之台塔及指示水槽之標記由海關酌度何地相宜備設將來整頓水道及利於行船而無害於地方百姓且不費中國國家之款中國不宜拒阻第十款內港行船章程前已特準在通商口岸行駛貿易因是年七月二十八號及九月先後所訂此項章程間有未便是以彼此訂明從新修改第十一款圜法中國允願設法定為合例之國幣將來德國商人及德國保護人民並中國人民應遵照以完納各項稅課及付一切用款第十二款禁令一千八百八十一年九月二號中德條約附載之通商章程第五款第三節內開凡米穀等糧德商欲運往中國通商別口照銅錢一律辦理等因茲彼此應允若在某處無論因何事故如有飢荒之虞中國政府先於二十一日前出示禁止米穀等糧由該處出口各商自當遵辦倘船隻為專租載運穀米若在奉禁期前或甫屆禁期到埠尚未裝完已買定之米穀者仍可準於禁期七日內一律裝完出口惟米穀禁期之內應於示內聲明漕米軍米有無出口如運出口者應於海關册簿詳細登記進出若干其餘他項米穀中國政府必須設法一概不準轉運出口其禁止米穀以及禁期內應運之漕米軍米數目各告示均須由中國政府頒發以期共見二十一日之期限必須自京報登刊之日起計限滿弛禁之告示亦須載於京報使衆得聞至米穀等糧仍不準運出外國第十三款中德兩國於本約以前所立各條約除因立本約有所更改外均仍舊施行嗣後如有文詞辨論之處應以德文作為正義是年與德訂互寄郵件暫行章程訂後德使穆默牒總稅務司聲明三事一高密所設之德國郵局應俟德軍撤屯方能裁撤二山東一帶涉及德人之處所有華局酌用德文人員三山東鐵路允中國郵政得有任藉此路運送郵袋之權總稅務司得牒均照允惟酌用德文人員謂須視有無人才方能照辦會德人收中國商報電政大臣袁世凱請外務部嚴禁既而德允停收商報並允中國電報局設在山東鐵路車站已復又請由煙台至上海線及北京至大沽行軍陸線求借用拒之又拒德商禮和洋行私購湖南礦産又德定濟南漢口江寧等處領事兼管各處交涉事宜照會外務部略謂山東省除登州府仍歸煙台本國領事辦理本國交涉事宜並膠澳租地歸駐青島德國總督外其餘所有東省本國交涉事統歸駐濟南商辦事件委員經理其煙台本國領事官僅有登州府本國交涉事歸其經理又定明漢口本國領事應辦本國交涉事宜係湖南陝西甘肅三省湖北除歸宜昌領事辦理各府外並江西省之袁州府等處悉歸漢口本國領事經理至駐江寧府領事應辦本國交涉事宜係安徽江西二省除歸漢口領事之袁州府外又江蘇省之江寧府等處云云是年德福親王來京覲見德皇子婚禮命出使德國大臣廕昌往賀並派學生往柏林留學三十二年二月德人始在津關請領聯單赴新疆採買土貨三月德使穆默牒中國請派員往柏林商議無線電會約章政府約二次開會再行核辦閏四月德交還天津馬隊營盤等處房地並炮隊機器槍隊屠牲場養病院各房屋是月德在營口改設正領事德使穆默回國署使葛爾士牒中國復以通商口岸限制洋人置地辦法與條約不符請除限制並謂德人地産收回公用可會商六月德人李卜克在北京設立學堂德使請中國攤出經費不許三十三年四月以孫寶琦為出使德國大臣遞國書是月外務部咨改訂青島租界製成貨物徵稅新章初青島設關徵稅一事已於光緒二十五年與德使海靖議定辦法嗣於三十一年又與德使穆默修改其大意即係德國允在海邊劃一地界作為停泊船隻起下貨物之定所凡出口貨在未下船以前即完出口稅進口貨除軍用各物暨租地內所用機器並建修物料免稅外其餘百貨於起岸後未出新定之界以前即完進口稅關員在彼辦理德國相助無阻又由中國允每於結底將本結所收進口稅提出二成撥交青島德國官憲應用既因續訂章程德租界內製成貨物徵稅一條語義未盡因與德使葛爾士再訂徵稅新章初中國欲修天津至鎮江鐵路與德英借款已立合同至是直隸江蘇山東三省京官請攬歸自修命張之洞袁世凱商辦議改合同德英執不允乃又增派外務部右侍郎梁敦彥會同張之洞等籌議初津鎮鐵路借款之開議也德使增索接造支路二道一由德州至正定一由兗州至開封為原議所無不允德使乃始變計一允由膠澳至沂州府一段仍作為津鎮支路歸入官路二允由濟南府往山東界之一道包入津鎮官路中國亦允由德州至正定府及由兗州府或幹路中之他處過濟寧州至開封府兩支路於十五年內由中國自行籌辦並聲明儻用洋款須向德華公司商借至是遂由梁敦彥與德英銀行等改訂借款合同二十四款名為中國國家天津浦口鐵路五釐利息借款既定議即由外務部牒德使聲明膠沂濟東路線應作為津鎮支路其由德州至正定兗州至開封支路均由中國自造已復與德議訂電政合同即青煙滬水線交接辦法並購回京沽軍線條款及山東鐵路附設電線辦法章程共十四款是年德柏林賽衛生民學會及萬國玩耍排列館請中國派員入會許之宣統元年山東巡撫孫寶琦與德立山東收回五礦合同先是光緒三十三年山東巡撫楊士驤與德商採礦公司議定合同八條所指之沂州沂水諸城濰縣四處已次第查勘惟第五處礦界內寧海州屬之茅山金礦查勘未竟會山東士民倡立保礦會德公司遂欲將茅山轉售向中國索價二百二十五萬馬克並聲言此外四處一並歸還中國官紳亦以收回為然籌議久之始以庫平銀三十四萬兩分四年清還作結三年山東巡撫孫寶琦與德訂收回各路礦權合同初德商礦務公司照約在坊子馬莊開礦屢禁華人在附近開礦爭執有年逮津浦借款合同簽定又要索膠沂津浦路內礦權並請封禁大汶口華礦政府不許於是德使照會始有劃清礦權之語孫寶琦即派道員蕭應椿等與德公司總辦畢象賢領事貝斯商議收回而畢象賢等則以中國欲收回三路礦權須以相當之利益互換否則不允初議淄博礦界公司第一次繪送礦界圖係淄川全境並毗連博山蕭應椿等以淄博窮黎向以採煤為衣食若兩境全為公司所有勢必至華民無以為生因議博境全留淄境各半以天台崑崙兩山為界山北歸公司山南歸華人公司未允蕭應椿因親赴淄川會畢象賢查勘並邀集紳董礦商旋議定淄川東南境由大奎山起斜經龍口鎮西北至淄川東境為界界南礦産歸華商辦理博山亦全讓還次議淄川華礦次議濰縣礦界次議金嶺鎮鐵礦次議償給勘礦購地費自是公司已成之膠濟鐵路未成之津浦鐵路甫勘之膠沂路及曹州教案條約許與公司之三十里礦權均允取消
