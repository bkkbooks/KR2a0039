body:
  text: 清史稿卷一百五十八志一百三十三邦交六日本日本久通中國明季以寇邊禁互市清興始復故康熙十二年平南王尚可喜致書於長崎奉行請通商舶閩粵商人往者益衆雜居長崎市初有船百八十艘後由七十艘迭減至二十餘艘貨運中國歲限八千貫置奉行三人譏察之榷其稅然日本方嚴通海之禁其國人或潛來臺灣及各口貿易事發輒罪之三十二年廣東廣西總督石琳奏日本船避風至陽江縣詔資以衣食送浙江具舟遣歸雍正六年浙江總督李衛以日本招集內地人教習弓矢技藝制造戰船慮為邊患奏明密飭沿海文武營縣及各口稅關員役嚴行稽查水師兵船不時哨巡以為有備無患之計上覽奏諭曰昔聖祖遣織造烏林達麥爾森陽為商人往覘其國比復命盛言國小民巽開洋之舉繼此而起朕數諭閩廣督撫留意考察聞日本近與朝鮮交親往來無間夫安內攘外之策以固本防患為先其體朕前諭無怠並頒諭沿海諸省防海兩廣總督孔育珣疏請沿海練舟師置火器增炮臺並自赴廈門虎門諸口巡察上不欲啓外人疑懼但令飭備而已李衛復奏稱日本貿易不能遽絶請於洋商中擇殷富老成者立八人為商總責其分處稽察互相繩舉庶免日久弊生之慮報可乾隆四十六年戶部奏請頒江海關則例定東洋商船出口貨稅律嘉慶元年上諭日本商人每遇風暴漂至沿海情殊可憫其令有司送乍浦附商船歸國著為令初日本專主鎖港通華商而禁西洋諸國及明治維新始與各國開港通商後以各國咸在中華互市同治元年長崎奉行乃遣人至上海請設領事理其國商稅事通商大臣薛煥不許三年日本商船介英領事巴夏禮以求通七年長崎奉行河津又致書江海關道應寶時言其國人往來歐洲時附西舶經行海上或赴內地傳習學術經營商業皆有本國符乞念鄰誼保護許之九年日本遣外務權大丞柳原前光齎外務卿書致總理各國事務署略曰方今文化大開交際日盛我近與泰西十四國訂盟鄰如貴國宜先通情好結和親而內國多故遷延至今信誼未修深以為憾茲令前光等詣臺下豫商通信以為他日遣使修約之地幸取裁焉前光至天津三口通商大臣成林直隸總督李鴻章達其書總署議允通商而拒其立約前光謁鴻章曰西人脅我立約彼此相距十萬里尚遣公使領事遠來保其僑民中日唇齒相依商賈往還以無約故反託外人代理聽其約束喪失國權莫此為甚今特使人遠輸誠意而其來也西人或交尼之若不得請是重吾恥也前光雖死不敢奉命鴻章復為請於朝下廷議兩江總督曾國藩等疏言日本二百年來與我無嫌今援西國之例詣闕陳辭其理甚順自宜一視同仁請與明定規約分條詳列不載比照泰西總例一語致啓利益均霑之心上韙其議允前光請命總署答書詔鴻章豫籌通商事十年日本以大藏卿藤原宗臣為專使來聘命授李鴻章欽差大臣應寶時陳欽副之與議條款日使初請照西約辦理久之始訂條約十八款通商章程三十三款互遣使臣設領事以上海等十五口與日本橫濱等八口通商而禁其私入內地微異西國諸約既成宗臣來獻儀物期來年換約十一年日本罷宗臣官遣柳原前光詣北洋大臣李鴻章交日本外務卿副島照會謂來歲與歐西諸國改修條約欲酌改所議事件與歐西一律豫擬條款請商鴻章答以去秋甫經立約尚未互換此時遽行改議殊非信守特令津海關道陳欽等與商均俟換約後照約商辦十二年四月日本使臣副島種臣來京換約遣其隨員柳原前光翻譯官鄭永寧詣總署詢三事一詢澳門是否中國管轄抑由大西洋主張一詢朝鮮諸凡政令是否由朝鮮自主中國向不過問一詢臺灣生番戕害琉球人民擬遣人赴生番處詰問等語王大臣等當與辨正尋命李鴻章為換約大臣與之互換副島種臣並致國書慶賀大婚及親政大典時各國因請覲報可副島種臣亦請面遞國書許之尋進賀儀方物答以禮並給璽書副島種臣照會使事畢回國李鴻章以日本換約時其上諭內僅蓋用太政官印未用國璽駮令換用翻譯官鄭永寧謂本國向與西洋各邦換約均鈐用太政官印鴻章謂見爾國副本聲明鈐用國璽又上海道抄送總領事井田讓等敕書亦用國璽鄭永寧允回國換寄時日本未設駐京公使交涉事託俄使倭良嘎哩代辦十三年三月日本兵船至廈門聲稱赴臺灣查辦生番李鴻章致書總署謂各國興兵必先有文函知會因何起釁臺灣生番一節並未先行商辦豈得遽爾稱兵既聞美人李讓禮帶領陸軍又雇美國水師官領兵船欲圖臺灣李鴻章復致總署謂此事如果屬實不獨日本悖義失好即美人幫助帶兵雇商船裝載辨兵軍械均屬違背萬國公法且與美約相助調處之意不符應請美使遵照公法撤回李讓禮等嚴禁商船應雇裝載辨兵日本既無文函知會僅將電信抄送上海道云派員往臺灣查問難保不乘我不備闖然直入閩省應先派兵輪水師往臺灣各港口盤查瞭望另調得力陸軍數千即用輪船載往鳳山琅𤩝附近一帶擇要屯扎為先發計乃日本兵船忽犯臺灣番社以兵船三路進攻路各五六百人生番驚竄牡丹高士佛加芝來竹仔各社咸被焚其時尚有兵輪船泊厦門於是臺灣戒嚴命船政大臣沈葆楨渡臺設防葆楨密疏聯外交儲利器儲人才通消息四事閩浙總督李鶴年亦陳臺灣地利併遣水路各營分往鳳山澎湖等處屯扎是月日本攻生番網索加芝來等社移兵脅龜仔角社社番誓不降帝命福建布政使潘霨赴臺灣會商設防五月沈葆楨潘霨率洋將日意格斯恭塞格至臺灣奏陳理諭設防開禁等事皆報可初八日潘霨偕臺灣兵備道夏獻綸及洋將日意格斯恭塞格等乘輪船由安平出海抵琅𤩝詣日營晤中將西鄉從道示以葆楨照會略云生番土地隸中國者二百餘年殺人者死律有明條雖生番豈能輕縱然此中國分內應辦之事不當轉煩他國勞師糜餉乃聞貴中將忽然以船載兵由不通商之琅𤩝登岸臺民惶恐謂不知開罪何端使貴國置和約於不顧及觀貴中將照會閩浙總督公文方知為牡丹社生番戕害琉球難民而起無論琉球雖弱儘可自鳴不平即貴國專意恤鄰亦何妨照會總理衙門商辦乃積纍年之舊案而不能候數日之回文此中曲直是非想亦難逃洞鑒今牡丹社已殘毀矣而又波及於無辜之高士佛等社來文所稱殛其凶首者謂何也所稱往攻其心者謂何也幫辦潘布政使自上海面晤貴國柳原公使已商允退兵以為必非虛語乃聞貴中將仍扎營牡丹社且有將攻卑南社之謠夫牡丹社戕琉球難民者也卑南社救貴國難民者也以德為怨想貴中將必不其然第貴中將知會閩浙總督公文有佐藤利八至卑南番地亦被劫掠之語誠恐謠傳未必無因夫鳧水逃生者有餘資可劫天下有劫人之財肯養其人數月不受值者耶即謂地方官所報難民口供不足據貴國謝函俱在並未涉及劫掠一言貴國所賞之陳安生即卑南社生番頭目也所賞之人即所誅之人貴國未必有此政體兩國和誼載在盟府永矢弗諼本大臣敢不開誠布公以效愚者之一得惟高明裁察見覆霨復造其營從道辭以病霨及獻綸遂遣人傳各社番目至者凡十五社譯傳大意皆求保護因諭令具狀願遵約束不敢劫殺霨等宣示國家德意加以犒賞番目等咸求設官經理永隸編氓霨等因從道不出將還從道復來謁堅以生番非中國版圖為詞及示以臺灣府志所載生番歲輸番餉之數與各社所具結狀日將始婉謝請遣人附我輪船一至上海致書柳原前光一請廈門電報本國暫止添兵霨等遂返初日本逐牡丹社番踞其地旋有輪船二先後至一徑往後山射草寮港一載兵二百婦人十餘泊射草寮港攜食物什具農器及花果草木各種分植龜潭後灣為久居計窺我兵力不厚仍肆要求沈葆楨請派水師提督彭楚漢率師來臺灣日旋增兵駐風港沈葆楨急飭營將王開俊由東港進駐枋草寮以戴德一營由鳳山駐東港為後應日人水野遵入豬朥索高士佛諸社又自後灣開道達龜山巔其風港之營將分駐平埔為援應因遣其通事彭城中平至琅𤩝謁委員周有基訊中國四處布兵何意有基以巡察應之葆楨照會日將勸令回兵時李鴻章亦深慮臺地兵單及沈葆楨請借撥洋槍隊即奏以提督唐定奎統軍赴臺灣助防葆楨亦奏稱澎湖為臺厦命脈所關守備單弱非大枝徑旅仍無以壯民氣而戢戎心請催迅速前來庶臺澎氣脈藉以靈通金厦諸防亦資鞏固奉旨俞允潘霨又偕前署鎮曾元福等赴鳳山舊城募土勇並勵鄉團因親履海口之打鼓山等處踏勘要隘建立兵柵以待淮軍分駐是月柳原前光入京先謁李鴻章鴻章遣道員孫士達往答拜屬以到京後勿言兵費及請覲兩事日本又遣大久保利通入京美領事畢德格復出任調停説鴻章仍允照柳原原議三條並加撫恤賠命初日人劉穆齋在花蓮港遭風破船失銀稱社番盜劫沈葆楨命夏獻綸集訊其地居人及船戶查無劫掠失銀之事惟日人欲從生番租地給有洋銀番目來益不受而止並繳出日本前給旗物葆楨因奏言日本和約第三條禁商民不準誘惑土人第十四條約沿海未經指定口岸不準駛入第二十七條船隻如到不準通商口岸私作買賣準地方官查拿今臺後歧萊地方中國所轄並非通商口岸此次前赴歧萊之成富清風等攜遊歷執照勾引土番均違和約現已確查歧萊各社並無竊盜銀物其繳出旗扇各件當即發交蘇松太道轉給駐滬日本領事收回將遊歷執照追銷其違約妄為之處應由彼國自行查辦並録民番供結咨呈總署牒其外務省轉飭日本領事照章辦理以弭釁端從之命速修安平炮台及籌辦鐵甲船續諭日本雖未啓兵端然日久相持終非了局現淮軍續抵鳳山羅大春業抵蘇澳滬尾雞籠等口調兵扼扎葆楨於是設防益嚴日人乃謀撤兵而西鄉從道仍遷延不即退欲牡丹社賠給兵費柳原前光既至京先遞照會有臺灣生番為無主野蠻本不必問之中國之語先請覲見總署責以臺灣生番係中國地不應稱為無主野蠻迭次來京並未與中國商明何以捏稱中國允許日本自行辦理柳原前光答辨久之始議定三條給撫恤銀十萬再給修道建房費四十萬兩定期撤兵付銀互換條約於是大久保往琅𤩝命領事福島九成謁沈葆楨陳五事一請派人受代一請撤銷兩國大臣來往公文一請被害遺骸於收埋處建碑表墓並許日人以後登岸掃祭一請以後臺灣交涉事件由中國官交厦門領事葆楨以撫局已成允之惟於登岸掃祭一節覆以須有領事官鈐印執照祭畢即歸遂各遣員交代事訖西鄉從道率兵去光緒元年八月日本署公使鄭永寧牒中國請補正前約李鴻章令津滬兩道詳議復將各條逐加查核因致總署云通商章程第二十八款進出口稅未便一例及日本進口稅則第八十三條𡵭布類又日入至日出不準開封鎖艙應行更正補載等事可以照準但換定之約不便改寫祗可由總署另給照覆附刊章程之後至鴉片嚴定罰款一條彼國既有各國貿易通例或可權宜照辦無須補列查曾國藩預籌日本議約奏內亦云彼國嚴禁傳教與鴉片中國犯者即由中國駐員懲辦或解回本省審辦而鄭署使照會末段華民歸彼地方官照料是中國遣理事官一端實有難再從緩之勢查橫濱長崎神戶三處華民最多總理事官駐最要之口各口即選各幫公正司事俾為副理事官遇事妥商辦理實與中外大局有裨應主持早辦總署亦以為然會日使議改章欲於鴉片進口照西例加倍嚴罰李鴻章亦援西例與爭議久不決是秋日本派使臣帶兵