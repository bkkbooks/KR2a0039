辨刪去者三事一請運米穀出口一口岸城鎮任便居住一常德府等九處口岸以要索為抵制者一事各國護路護館兵隊全撤後北京方能開埠因有益於中國商民可除積弊而許其入約者度量權衡一款照滬議原文增改字句者改定國幣一款內港行輪一款川江設施拖攬一款因英已有而許其入約定議者長沙通商一款餘皆仍照滬議原文又致外務部及呂海寰等謂日約東三省開埠言明悉照美約文法惟安東縣改大東溝緣大東溝係日本原議所索嗣增索安東縣再三商駮內田始允仍將安東縣刪去遂定議於二十九年八月十八日在滬畫押是為日本商約是年與日使議索還前借漢口大阪馬頭仍未還又盛宣懷與日本立漢冶礦石借款合同數三百萬元息六釐預定三十年還清不還現銀以礦價扣還三十年日商三井在漢廠購生鐵一萬六千頓值日俄戰起中國慮於局外中立有礙擬阻止會日本領事永瀧來函謂訂運生鐵不在戰時禁貨之列日使亦來函聲明作為商工製造之用不得以禁貨論遂許運三十一年日戰勝俄兩國議和政府令外務部照會日俄謂關涉中國之事若中國不與聞者中國將來斷不承認是年十一月二十六日外務部慶親王奕劻與日本大使小村壽太郎公使內田康哉訂新約正約三款一凡俄國允讓之利益中政府悉承諾之二凡中俄所訂借地造路等項日本悉照約履行三此約簽字即便施行附約十二款一中國將東三省自行開闢商埠二三撤兵事宜四日本允將所占公私産業在撤兵前後交還六七八安奉南滿鐵道建築事宜九另訂奉天日本租界辦法十鴨緑江右岸設中日木植公司十一十二中日彼此以最優國相待遇三十二年日人設立南滿洲鐵道株式會社並於關東州置都督府另設領事五人總領事駐奉天安奉鐵道外有間島領土權撫順炭坑新法鐵道營口支線新奉吉長兩鐵道借款諸事經東三省總督趙爾巽徐世昌及外務部尚書袁世凱先後與日使爭議久不決三十三年三月外務部大臣那桐與日本駐京公使林權助訂中日新奉吉長鐵路協約七條一二中國以日金一百六十六萬元收買日本所已造之新奉鐵路其續造遼河以東一段及自造吉長鐵路需款均向南滿洲公司籌借半款三除還清期限外均照山海關內外鐵路借款合同辦理其主要事務又開列六條甲借款還清期限遼河以東十六年吉長二十五年限前不得還清乙借款以鐵路産業及進款作保未還清以前不得以此作他項借款之抵保物中國自行籌款建築他路與南滿洲公司無涉丙借款本息由中國政府作保到期爽約應由政府代還或將産業交公司暫管丁在借款期內總工程師應用日本人並添派鐵路日帳房一員戊如遇軍務賑務政府在各路運送兵食均不給價己各路進款應存日本國銀行四與南滿洲鐵路公司訂立關於遼河以東之借款合同及吉長鐵路借款合同五中國奉新吉長鐵路均應與南滿洲鐵路聯絡派員會訂章程六借款實收價值照中國最近與他國借款酌定此約結後日人又要求吉長鐵路延長至延吉廳南境以與韓國會寧鐵道相聯且照吉長鐵道例於南滿鐵道會社借資本之半數築之政府不允遂成懸案三十四年日使忽提出安奉鐵道案要求解決先是滿洲善後協約之附約允安奉鐵道仍歸日本經營改為工商業鐵道規定自此路竣工日起以十五年為限至是復提議郵傳部乃派委員與日本委員會勘改良之新路線日政府又要求勘定路線即行收買地基東三省總督錫良祗許按舊線改築要求日本撤退鐵道守備兵與警察等事日本不允令鐵道會社自由起工海陸皆作警備乃命錫良會同奉天巡撫程德全與日本奉天總領事締結安奉鐵道協約此宣統元年七月事也協約要目如左一中國確認前次兩國委員勘定之路線陳相屯至奉天一段由兩國再協議決定二軌道與京奉鐵道同樣三此約調印之當日即協議購買土地及一切細目四此約調印之翌日即行急進工事五沿鐵道之中國地方官關於施行工事應妥為照料未幾間島之爭議又起先是康熙年間政府與朝鮮劃定國境於鴨緑江圖們江水源之長白山上樹立界碑規定西以鴨緑江東以圖們江為兩國國境因圖們江中有江通灘地面不及二千畝因地居江間四面環水故以間島呼之此島向屬吉林惟皇室以長白山一帶為發祥之地不許人民移居因之吉林東部所在人煙稀少間島愈形荒僻同治間朝鮮鐘城歲飢其民多渡圖們江移居間島按年納地租於我國光霽峪經歷署光緒初年朝鮮人忽請免納地租政府以主權攸關令朝鮮人退出間島不果乃置延吉廳以治之間島仍準朝鮮人民居住按納地租日俄戰後日本伊藤統監命齋藤中佐率兵據之政府與日使交涉日使謂光霽峪以東為東間島和龍峪一帶為西間島係兩國未定之界且謂長白山上界碑載土門江為界朝鮮人稱海蘭河為土門河圖們江係豆滿江非土門江中韓國境實為海蘭河中國以土門豆滿圖們均係一音之轉圖們江北岸界碑矻立鑿鑿可據且光緒十三年朝鮮王致北洋大臣書聲明鴨緑江豆滿江為兩國境界是豆滿江即土門江無疑執不許至是日使伊集院彥吉與外務部尚書梁敦彥重提舊案締間島條約一中日兩國協約以圖們江為中韓兩國國境其江源地方以界碑為起點依石乙水為界二中國準外國人居住龍井村局子街頭道溝百草溝等處貿易日本於此等地方得設置領事館三中國準韓國人民在圖們江北之墾地居住四圖們江墾地之韓人服從中國法權歸中國地方官管轄及裁判中國官吏於此等韓人與中國人一律待遇所有納稅及其他一切行政上處分亦同於中國人五韓人訴訟事件由中國官吏按中國法律秉公辦理日本領事或委員可任便到堂聽審惟人命重案則須先行知日領事到堂如中國有不按法律判斷之處日領事可請覆審六圖們江雜居區域內韓人之財産中國地方官視同中國人民財産一律保護該江沿岸彼此人民得任便往來惟無護照公文不得持械過境七中國將吉長鐵道延長至延吉南邊界與朝鮮會寧鐵道聯絡一切辦理與吉長鐵道同八本協約調印後日本統監府派出所及文武人員於兩月內完全撤退是約既成政府以吳祿貞為延吉邊務大臣嗣議五案協約即新法鐵道營口支線撫順煙台炭礦安奉鐵道沿線及南滿鐵道幹路沿線之礦務是也新法鐵道者新民屯至法庫門之鐵道政府欲借英款築造此路以分南滿鐵道之勢力日本謂係南滿鐵道競爭線極力抗議營口支線者光緒二十五年東清鐵道會社規定築造旅順哈爾濱間之鐵道得設營口支線以運送材料俟鐵道落成後拆去日俄戰爭後南滿鐵道歸日本政府要求日本拆此支線日本不允撫順炭礦距奉天城東六十里日公使以此地炭礦為東清鐵道附屬品利權應歸日本政府以炭山在東清鐵道三十里外不認為附屬財産日使不允並煙台炭礦均成懸案因安奉鐵道交涉定約如下一中國如築新法鐵道時當先與日本商議二中國允日本營口支路俟南滿鐵道期限滿同時交還並允將該支線延長至營口新市街三中國承認日本有開採撫順煙台兩處炭礦之權日本承認該兩處開採之煤斤納稅與中國惟稅率應按照中國他處最輕煤稅之例另行協定其礦界及一切章程亦另委員定之四安奉鐵道沿線及南滿洲鐵道幹路沿線之礦務除撫順煙台外應按照光緒三十三年東三省督撫與奉天日本總領事議定之大綱歸中日合辦五京奉鐵道沿長至奉天城根一節日本無異議自此南滿洲大勢遂一變矣吉長新奉兩路借款細目旋亦議定其後錦齊鐵道渤海漁權與領海鴨緑江架橋南滿鐵道附屬電線收買日本遼東方面軍用電線及旅順芝罘間海底電線諸交涉次第起焉錦齊鐵道者即自錦州經洮南至齊齊哈爾之鐵道也日本原允中國自修惟要求昌圖洮南間之鐵道歸日本築造及滿洲諸協約成英美爭錦齊鐵道借款迭與中國交涉事皆中阻渤海漁業與領海交涉自光緒三十二年中國課關東漁業團漁稅迭經日本領事要求住關東之日本人有滿洲沿岸漁業權日本漁團因避稅全出距海岸三海里外海面東督錫良通告日本領事謂三海里外之海面係中國領海應準中國漁業規則課稅日本領事以三海里外為公海反抗之鴨緑江駕橋聯絡滿韓議定依安奉鐵道契約十五年後賣還中國南滿鐵道附屬電線原中國所設日本占有之後取供公用中國抗爭無效又日俄戰爭時日本在南滿洲所設軍用電線戰局終應歸中國收買日本初起反抗後始歸中國收買旅順芝罘之海底電線係俄國布設戰時皆斷絶至此日本要求依該海底電線直通芝罘之日本電線局為中國所拒卒以距芝罘海岸七里半以內之一部歸中國餘盡屬諸日本其後復有日俄協約之議於是東三省大勢又一變矣
