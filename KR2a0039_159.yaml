body:
  text: 清史稿卷一百五十九志一百三十四邦交七瑞典那威丹墨和蘭日斯巴尼亞比利時義大利瑞典即瑞丁在歐羅巴西北境與那威同一區雍正十年始來華互市道光二十七年春二月與瑞典及那威國訂通商約時法美諸國通商俱仿英和約條款瑞本小國亦求照英法美三國成案議通商條約時瑞鋼鐵等項價甚賤並求酌減稅則兩廣總督兼五口通商善後事宜耆英以各項稅鈔甫經議定通行未便因瑞鋼鐵率議輕減不許惟通商條約奏請許之遂與瑞公使李利華訂約三十三條同治六年政府派出使大臣志剛等遊歷各國至瑞遞國書光緒三年八月瑞典開整理萬國刑罰監牢會使臣愛達華達擺柏照會駐英使臣郭嵩燾請中國派員入會嵩燾以聞許之十八年五月瑞典國教士梅寶善樂傳道二人往麻城縣宋埠傳教被毆致斃上海瑞典總領事柏固聞赴鄂見張之洞要求四事一辦犯一撫恤一參麻城縣知縣一宋埠設教堂時犯已緝獲張之洞允辦犯撫恤而參麻城縣則不許謂麻城縣事前力阻事後即獲正犯未便參劾至開教堂宋埠民情正憤改在漢口武穴覓一地建堂柏固亦不允久之始議定絞犯二名給兩教士各一萬五千元失物諸項一萬五千元期二十月後再往傳教三十四年六月與瑞修改通商條約先是瑞使倭倫白來京請覲見呈遞國書並照稱奉本國君主諭請修改通商條約並録其君主所給議約全權文憑送外務部外務部以道光二十七年所訂瑞典那威條約係兩國聯合所立近兩國已各獨立前訂之約距今六十年通商情形今昔不同當重訂約以資遵守許之於是瑞使擬具約稿三十九款大致多採各國與中國所訂約款外務部以所擬款目繁多另擬約稿併為十七款研商久之始定議外務部因上奏言臣部另擬約稿歸併為十七款查向來與各國所訂條約我多允許與各國利益而各國鮮允許與我利益按諸彼此優待之例實非平允惟光緒七年巴西條約暨二十五年墨西哥條約多持平之處此次擬議約稿注重此意不使各項利益偏歸一面更於各約中採用較為優勝之條取益防損如第三款領事官應照公例發給認許文憑第十款訂明俟各國允棄其治外法權瑞典亦必照辦第十三款聲明給與他國利益立有專條者須一體遵守方準同霑俱係參照巴西墨西哥二約第十二款入教者犯法不得免究捐稅不得免納教士不得干預華官治理華民之權俱係參照中美商約又瑞使原擬約稿有數款照録英美日各商約今皆刪去如商標礦務之類則以第十三款內載所有商業工藝應享各利益均一體享受等語括之如加稅免釐之類則以第十四款內載中國與各國商允通行照辦遵守等語括之以免挂一漏萬於第五款內又載進出口稅悉照中國與各國現在及將來所訂之各稅則辦理等語亦可為將來加稅不得異議之根據此外各款如派駐使設領事及通商行船一切事宜始終不離彼此均照最優待國相待之意以扼要領而示持平雖瑞典遠在歐洲北境現尚無前往貿易之華商其所許我利益未能遽霑實惠然際此中外交通風氣日開不可不預為地步數旬以來與瑞使往返磋磨間有字句刪改無關出入之處亦輒允其請而大旨已臻妥協謹録全約款文恭呈御覽如蒙俞允應請簡派全權大臣一員會同瑞使署名畫押仍候批準互換疏入報可宣統元年四月在北京互換丹墨即嗹馬在歐羅巴洲西北其來市粵東也以雍正時粵人稱為黃旗國同治二年三月丹馬遣其使臣拉斯勒福來華抵天津徑赴京師署三口通商大臣董恂以丹使並未知照無故來京亟函知總署飭城門阻之而英使言丹國來人乃本館賓客請勿阻總署遂置不問英威妥瑪復代請立約恭親王告以丹使擅越天津來京議約萬難允其立約威妥瑪乃言丹與英為姻婭之國並援法使為布路斯葡萄牙代請換約之例固請王大臣等因語以丹使如欲中國允行宜循中國定章仍回天津照會三口通商大臣方可立約威妥瑪乃請嗣後外國使臣到津應令天津領事告知中國常例又為函致三口大臣代為之謝大臣等以聞朝旨交總署核議旋派工部左侍郎恆祺會同三口通商大臣兵部左侍郎崇厚辦理五月約成大致以英約為本初恆祺等議約擬仿照大西洋成案威妥瑪謂丹係英國姻婭應從英文義辨論久之各有增減定和約五十五款通商條約九款稅則一册明年五月丹遣水師副提督璧勒來滬派提督銜李恆嵩及江蘇布政使劉郇膏與換約屆時李恆嵩等向璧勒索觀應換條約而原定印約未攜只另書英字條約璧勒謂此約係照英文原定條約繕寫工整以示尊崇中國之意並無別故又以本國軍務方殷不能久待遂將條約核對與英文相符允互換屬將原定用印和約補訂照繕和約之內補鈐丹副提督印信並簽押遂互換收執九年十月丹遣使來華呈遞國書報中國簡派使臣蒲安臣志剛孫家穀使丹之聘也十年復呈遞國書光緒七年十月督辦中國電報事宜盛宣懷與丹總辦大北電報公司恆寧生會訂收遞電報合同先是同治十年丹國大北公司海線由香港廈門迤邐至上海一通新嘉坡檳榔嶼以達歐洲名為南線一通海參崴由俄國亞洲旱線以達歐洲名為北線此皆水線也至同治十二年又擅在上海至吳淞設有旱線至是中國甫設電局因先與訂合同十四條一中國電報寄往外國之線路二電局與大北互定通電之價三四由中國寄外國外國寄中國內地之報其報價應先行收清後再劃還並在上海立册每月互對六電價概由自定惟寄外國報須按照萬國電報定章又傳報可自編新碼七電局與大北往來用英文惟合同以華文為主八大北願竭力幫助中國設電惟中國自主之事不得干預十大北海線中國旱線如有斷絶停滯互相通知十一中國電政歸北洋大臣主持有向大北購料者應稟明北洋核奪十二大北應繳回中國電報之費每三月一結時法英美德四國以大北公司僅有單股海線又沿途祗通廈門口岸其餘如汕頭福州溫州寧波各口皆距較遠請添設海線就便通至各口拒之仍專與大北公司合辦方議立合同大北公司恆寧生欲載明中國不再租陸線與他人且須永租大北議遂中止九年李鴻章致總署及盛宣懷擬中英丹三公司合約英丹海線均至吳淞為止將丹自淞至滬旱線購回由我代遞議久之始收回初大北公司原稟六條內有不準他國及他處公司於中國地界另立海線又中國欲造海線旱線與大北有礙者不便設立二條為大北公司獨得之利益因之中國亦取得總署南北洋及出使大臣往來電報凡從大北電線寄發者不取報費為中國獨得之利益當時鴻章已批準咨行英美法德各使聞之合詞照會總署威妥瑪復援同治九年允英人設海線之案必欲大東公司添設政府不能阻因之大北公司恆寧生請將中國官報照常給費旋復來電謂自十月初三日為始所有中國頭等官報由大北電線寄發者須照章付足電資方為發報等語十六年薛福成議與大北及大東公司訂立合同初大北與大東慮我與俄接陸線奪其水線之利故願訂明滬福厦有水線處貼中國十分之一其餘各口出洋報費悉歸華局續議並允報效海線官電之費嗣因各國並俄使牽制以致久擱至是由福成另議祗讓官電費不要貼價歲銀十萬圓和蘭明史作荷蘭歐羅巴濱海之國清順治十年廣東巡撫請於朝願備外藩修職貢十三年齎表請朝貢部議五年一貢詔改八年一貢以示柔遠十八年鄭成功攻臺灣逐和蘭而取其地詔徙沿海居民嚴海禁康熙二年夏六月和人始由廣東入貢刀劍八皆可屈伸馬四鳳膺鶴脛能迅走二十二年和蘭以助剿鄭氏功首請開海禁通市許之乾隆元年冬十月裁減和蘭稅額初和蘭通商粵省納稅甚輕後另抽加一稅至是諭曰朕聞外洋紅毛夾板船到廣泊於黃埔起所帶炮位然後交易俟交易事竣再行給還至輸稅之法每船按梁頭徵銀二千兩左右再照則抽貨物之稅此向例也近來炮位聽其安置船中而於額稅之外將伊所帶置貨現銀另抽加一之稅名曰繳送殊與舊例不符朕思從前洋船到廣既有起炮之例仍當遵守至加添繳送銀兩尤非嘉惠遠人之意命照舊例裁減並諭各洋人知之同治二年秋八月與和蘭立約和蘭與中國通商最早至是見西洋諸國踵至亦來天津援請立約三口通商大臣崇厚以聞朝議許之即命崇厚在津與其使臣訂和約十六款初和蘭使送來約稿皆照英法各國及參用續立之布西丹國等條約章程分別各款請議三口通商大臣崇厚答以現在各口通商均有定章不必多列條款和使亦允刪減惟前往京師南京通商並內地傳教減稅暨在京互換條約各節以和文為正義爭論久之始允刪去而於稅則一層許另立一款議明各國稅則屆重修之年和國亦許重修並與照會言將來重修稅則時亦應按照價值秉公增減遂定議一通使二海舶通商三遊歷四傳教六八至十二關稅六七交涉案件十三交際議文十四行移文書各用本國文字十五利益均霑十六批準一年內換約此與和蘭立約之始三年五月和公使礬大何文以換約期將屆遣員伯飛鯉詣天津三口通商大臣請在廣東省城換約崇厚以所請符原議奏請簡員往朝廷命廣東巡撫郭嵩燾為換約大臣屆期和使僅以鈔録副本上嵩燾駮令取原本再定換約期逾年始換十年四月出使各國大臣志剛孫家穀詣和蘭呈遞國書十二年四月和蘭公使費果蓀來華呈遞國書總署允與各國使臣同覲見禮節亦如之光緒七年和使牒中國稱本國將於光緒九年夏在都城亞摩斯德爾登等處設立衒奇公會請中國與各國同入會許之是年以候補道三品卿銜李鳳苞充德義和奧四國出使大臣此為和蘭遣使之始八年二月和使費果蓀復將衒奇會章程及增擬華商赴會章程並開中國物産及工藝奇巧製造等件請其會集運往總署飭各海關照辦十一年出使大臣許景澄如和蘭遞國書十三年許景澄出使期滿以內閣學士洪鈞代之是年兩廣總督張之洞特派副將王榮和知府余瓗先往和蘭所屬南洋各島調查和蘭不允前出使大臣許景澄與和外部辨論以遊歷為名和始允行既返張之洞上疏請設領事略謂日里有華工萬餘衆噶羅巴華民七萬餘衆其附近之波哥內埠文丁內埠以及三寶壠與疏羅及麥里芬及泗里末及惹加皆和屬地華人二十餘萬衆宜設總副領事以資保護旋議從緩二十年出使大臣許景澄請禁機器進口牒和蘭外部略謂外洋各項機器除中國自購並託洋商代購外其洋商自行販運機器查係無礙華民生計性命之物酌照稅則不載之貨估價值百抽五準其進口若洋商販運機器有礙華民生計性命者皆不準進口二十一年命許景澄遞萬壽致謝國書二十四年以候補四品京堂呂海寰充出使德國大臣兼充和奧兩國公使二十五年各國在和都海牙設保和公會和使牒中國請入會許之旋派前駐俄使臣楊儒赴會又推廣紅十字會水戰條約請用御寶由駐俄使臣胡惟德轉送和政府二十七年呂海寰以和屬南洋各島虐待華民乃上言和屬南洋各島開埠最早華民往彼謀生者亦最多噶羅巴一島尤為薈萃之區寄居華民不下六十萬人初尚優待後因迫令入籍率多殘虐其故以中國未經設立領事保衛之也各島有所謂瑪腰甲必丹雷珍蘭者管理華人以生長其島者充之擅作威福華人初到概入供堂問供注册赴各鄉營生須經批準方許前往嗣下不準華民居鄉之例限二十四點鐘立將生意産業賤售而去逾限罰銀逐出産業消歸無有此其一又華人到和屬地向須憑照方準登岸嗣又變立新例無論有無憑照登岸後帶至官衙繩圈一處俟查老客有原日出口憑照放行新客則馳入繩圈之內候帶入瑪腰公館照像俟有人擔保始放否則輒上鐐杻刑具遇有輪船驅逐出境此其二又華人來往本島貿易必領路票使費外仍繳印花銀若干到一處又須挂號再繳銀若干如一日到三五處則兩處繳費亦須三五次挂漏查出重罰此其三又華人詞訟審費照西人最多之例科罰則照土番最重之例縱令理直追回銀數已不敷狀師之費以至沉寃莫訴此其四再如華人家資産業身故後權歸和官雖妻子兒女執遺囑照章領取亦必多方挑剔反復延宕若無遺囑則産業概沒入官此其五華人在日𩹉承種煙葉者往往係由姦販誘惑拐騙出洋身價五六十元八九十元三四十元不等立據三年為期入園後不準自由出入雖父兄子弟不能晤面加以剋扣工資盤剝重利華人吞聲忍氣呼籲無門且各國人民皆得購地自業種煙華人獨否此其六以上苛虐各節慘不忍聞正擬設法向和廷理論忽英文報紙載有班喀地方華人在錫礦各廠作工突遇水患飢寒潮溼病死相仍又經廠主勒購廠物物劣價昂支借工資則一兩納息五錢以致積憤肇事為廠主鎗擊死傷無算和官拿獲逃散華民窮詰再三始知為廠主苛刻所致按華工素循規矩若非相待太苛必不至於啓釁等語竊思華民作工各島受此任意凌虐與古巴之夏灣拿同一殘忍領事之設斷難再緩迭與和外部大臣朴福爾再三爭論並譯録商稟及報紙所載苛待情形詳為申述復備文照會請其允設領事保我僑民生計彼外部以事屬藩部為詞支梧未決臣復照會彼外部以新嘉坡小呂宋等處中國早設有領事即以荷屬之噶羅巴而論歐美各國無不設有領事何獨於中國而靳之反覆辨論稍有轉機查和屬島嶼林立應設領事之處有七即如噶羅巴三寶壟泗里歪望加錫勿里洞日里文島等處均關緊要今一時萬難遍設惟噶羅巴一島設立總領事一員萬不可緩奏入交外務部議二十八年外部議準在噶羅巴等處設立領事未實行三十年各國議免紅十字會施醫船稅鈔請中國派員赴和蘭會議許之是年熱河都統松壽奏稱蒙古喀喇沁王貢桑諾爾布擬與和商白克耳合辦本旗右翼地方巴達爾胡川金礦作為華洋合辦股本各居其半一切遵章辦理外務部以喀喇沁王原將右翼全旗指給逸信公司開辦五金各礦業經飭令畫清界限不得包占全旗若今又遽允和蘭商人難保不滋轇轕應請暫緩報可三十一年和使照稱本國南洋屬地蘇門答臘以北名撒般者遇有外國兵船進口施放敬炮請外務部知照南北洋大臣三月外務部奏萬國保和會和解公斷條約業經批準各國欲在和蘭都城設立萬國公所作為公斷衙門請中國派員入會作為議員許之尋以伍廷芳充選保和會即弭兵會也是月和使照稱本國屬地茫咖薩巴東二處遇有外國兵船進口不再施放敬炮仍請外部知照南北洋大臣八月萬國弭兵會舉和人男爵米何離斯為判斷公堂總辦十月簡知府陸徵祥充出使荷國大臣並兼辦保和公會事宜三十二年派駐美使署顧問洋員福士達充和蘭保和會公斷議員宣統二年和京設萬國禁煙會請中國派員入會尋遣外務部右丞劉玉麟往嗣因禁煙會展期劉玉麟簡充英使別遣出使德國大臣梁誠赴會三年四月與和定設立領事約初和送交領約全稿十七條政府命陸徵祥與議顧約文外另有附則一條謂施行本約不得以所稱和蘭臣民之人視為中國臣民徵祥議加以亦不得以中國臣民視為和蘭臣民一句和外部不允乃命徵祥回京由外務部照請和使來署接議和使初仍持前議繼允將附則改為公文不入約又久之始允將生長和屬之人遇有國籍紛爭在彼屬地可照和律解決等語備文互換又一面將此項人民回至中國如歸中國籍亦無不可等語由彼備文明存案議遂定外務部於是上言臣部查和屬設領係積年懸案屢議屢擱垂二十年此次重提前議以來一年有奇始克開議旋因附則一條致生枝節彼此研商又更兩稔蓋近世各國國籍法多偏重出生地主義生長其地之人大率隸屬其籍而我國新定之國籍法則採用血脈主義根本解釋迥然不同彼之欲加附則者以此我之堅持刪去亦以此至回國僑民沿用外籍誠多流弊茲定明和屬人民回至中國可歸華籍藉資補救其非出生於和屬之僑民仍可認為華籍與我國國籍法亦不致相背就此結束俾可迅派領事以慰僑民喁喁之望又奏和屬苛例修改情形略謂華人流寓和屬所最難堪者如種種苛例臣部迭據華商來稟電駐和使陸徵祥向和政府交涉彼初以為治理屬地數百年成例未易更張強詞拒駁經我大臣極力磋商據稱警察裁判祗允將改良之法從事調查未能即時遽改其入境居留旅行三項允先修改現入境新章雖尚未見頒布而居留及旅行二者先已從爪哇馬渡拉兩島改有新章較之舊例已多寬大奏入派陸徵祥為全權大臣與和使貝拉斯署名畫押條約用法文日斯巴尼亞一名西班牙即大呂宋也明嘉靖初據南洋之蠻里喇是為小呂宋檣帆遂達粵東及清咸豐八年見英法俄美立五口通商之約遂與葡萄牙同請立約不許同治三年五月西班牙使臣瑪斯復來請並呈所奉全權憑據三口通商大臣崇厚令瑪斯在天津候旨朝廷復命候補京堂薛煥蒞津會同崇厚與瑪斯議約瑪斯援丹馬西洋各國進京議約之案薛煥等以丹馬等國雖在京議約仍赴天津填寫定約日期不得謂之在京立約瑪使始允在津商辦久之出所擬條款有為各國條約所無者而于駐京一節立意尤堅久之始議定共定條約五十二款專條一款六年四月崇厚與瑪斯始公立文憑互換十年穆宗親政各國請覲見呈遞國書日使與焉自是歲沿為例光緒三年日國因索伯拉那船遭風案聲稱欲派兵船來臺灣福建巡撫丁日昌上奏言西班牙屬島小呂宋之北即連臺灣之南海中山勢斷續相接較之日本尤為迫近本年五六月間用兵蘇祿攻破其城故有狡焉思逞之意非亟加整備速辦礦務墾務水雷鐵甲船輪路電線諸舉無以圖自強已而兵船不果來是年日屬地古巴因招華工請訂專約時日使為伊巴理政府派總理各國事務大臣沈桂芬毛昶熙董恂夏家鎬成林為全權大臣與議約先是光緒元年總署奏派陳蘭彬出使美國及日斯巴尼亞祕魯三國辦理交涉事件日與祕魯均有應議華人出洋承工事宜祕魯已經李鴻章議有條款日則自陳蘭彬查復後復由總署議定保護華工條款與各國使臣定期晤論日使丁美霞及各國使臣亦議具條款復將此條款參酌合而為一正在會議適滇省有戕斃英國翻譯官馬加理事英使威妥瑪來言事遂中止自滇案議結伊巴理時已來京晤議訖未就緒至是始議出章程凡十六款一維持同治三年天津條約不得收留中國逃人二既除去前約承工出洋未能盡善之情所有賠償一層作罷論三華人出洋須出情願不得勉強及施詭譎之計四聽華民前往不得禁阻五出洋報名領蓋印執照六派遣領事七豫華人隨便往來準單須與各國人一律八訴訟事件九查驗華民多寡之數十載華民出洋應守之船規十一十二資送華工回國事件十三限制華人前往居住事件十四執照準單一切事宜新到之華人與期滿之華人享同等利益十五此次條約未載之利益中國若與他國則日國應一體均霑十六換約事件及期限是為重訂華工條款畫押蓋印明年換約復公立文憑六年小呂宋華民請設領事不果十三年四月張蔭桓由美赴日都馬得利呈遞國書屆期君后臨朝張蔭桓恭捧國書敬遞君后親接後即付外部謨烈起立與蔭桓為英語翻繹代答禮成君后回宮蔭桓立送君后回顧三曲膝為禮時中國議在小呂宋設領事日外部已允發準照而商務總辦米阿斯以條約未載為言張蔭桓商之律師科士達謂若必挾條約為言約內第四十七款中國商民至小呂宋貿易應與最優之國一律相待此明文也而日官所收身稅路稅自丁卯換約起至甲申共十八年小呂宋刊發新例止共徵華人銀七百七萬八千一百六十一元二角四仙專徵華人每人歲納九元六仙甲申後乃兼徵西人每人一元五角華人則四元五角計至丁亥共四年又長徵銀五十二萬八百三十六元又路照一項西人每徵四角五華人每徵則一元二五又須預納一年身路稅無理之甚即與西人比較將四角五除去實長徵華人八角自丁卯至丁亥草一年共銀七十二萬九千一百七十元四角預納之身路稅猶在外也又每華人歲徵醫院費二角五仙甚微自丁卯換約至本年草一年共徵銀二十二萬七千八百六十五元七角五仙此項與甲申以前之身路稅均係獨徵華商甚違一律優待之約此中人數就去年正月至九月數目共計華人四萬三千四百零三人逐年清計尚不止此數也苛待華人如此應索償已往禁遏將來方合辦法旋得外部文言日后將議新例為各領事而設而于小呂宋設官一事仍不能決尋見日后並見兩公主及君姊問答如禮蔭桓旋去日赴美議久無效十五年張蔭桓受代以崔國因出使美日祕大臣駐美別遣楊慕璿為駐日參贊十六年四月崔國因自美赴日遞國書屆期日接引大臣以宮車來迎是日大君主未御殿后著公服南面坐國因奉國書入門行三鞠躬禮各問君主起居退十九年崔國因受代以四品京堂楊儒為出使美日祕大臣二十六年七月聯軍入京八月二日日使葛絡幹函留京辦事大臣稱各國統兵各員及公使人等定於四日辰刻入大內瞻仰許之二十七年各國要求使臣會同覲見必在太和殿一國使臣單行入覲必在乾清宮及遞國書用御輿入中門皇帝親陪宴等以日使葛絡幹領銜政府準駁有差明年日君主阿肅豐第十三行加冕禮駐京日使賈思理照會總署欲中國遣專使往賀出使美日祕大臣伍廷芳亦以為請政府乃以張德彝為賀日加冕專使比利時舊名彌爾尼壬清初其國商船曾來粵東道光季年法人復為請通市而貨舟不至及五口通商比遣使臣包禮士赴上海呈請照各國立約通商時薛煥撫江蘇答以應與無約諸邦同一通市無須另立條約包禮士謂須入都定議阻之允暫留上海先是咸豐九年比遣使臣怡性要求蘇撫何桂清三條一比官商眷屬船隻貨物與中國相待最優國同視二定約後以十二年為度三和約議定須請用寶至是復以為請薛煥亦開三條一各口均設領事二禁商民赴內地遊歷通商三使臣不得赴京比使堅不允更易辨論久之始議定初比使稱本國主為大皇帝煥援英稱君主例稱君主遂定約四條時同治元年六月也四年七月比遣使臣金德來華牒三口通商大臣兵部左侍郎崇厚謂前包禮士與薛煥所訂約未將兩國通商章程並各等事宜詳請再議不允迭牒要求於是派董恂崇厚為全權大臣辦理比通商事務金德旋擬約五十款大致皆采各國條約董恂併去三款共存四十七款旋畫押鈐印五年九月在滬與蘇撫郭柏蔭換約並致君主第二禮波勒德國書郭柏蔭以西洋通商各國從無恭進國書之事金德稱係新君嗣立應當入告乃許呈進九年六月比復進國書請使臣駐京許之十一年冬使臣許景澄如比都伯魯色遞國書君主及其妃並邀宴宮內參贊隨員均預焉又是年剛果國立為自主之邦奉比國君主為君比侍從大臣伯施葛辣照會中國比主復致國書自稱大比利時國主留波德第二謹上書大清國仁聖威武大皇帝陛下竊查剛果地方設有商會開闢疆土曾與各國訂約立為自主之邦又推不佞為該處之主現經議院核準自應統馭此邦理合報明大皇帝陛下惟此新國乃專歸不佞兼轄並非比國統屬闢地之始允宜宣教布化治政養民聯與國之誼以敦和睦興通商之利以固邦基盡心圖維升平同慶仰副各國期望之意尚祈大皇帝眷顧優隆俾免隕越云云十三年正月比使以本國彙印各國稅則請中國入會許景澄以聞政府旋致比外部謂中國現行稅則即各國議定通行稅則各國條約均經載明此外別無通商稅則與西洋諸國各約各訂者情形不同未便入會五月比遣謝惠施為駐京公使呈遞國書並覲見光緒十五年三月以江蘇按察使陳欽明為英法義比大臣十七年八月請中國派員入第四次鐵路公會考求鐵路新法許之十八年正月湖廣總督張之洞遣翻譯俞忠沅帶工匠十人赴比國工廠學煉鋼鐵二十三年議借外債修盧漢鐵路比領事法蘭吉詣張之洞言其國家願借比他國尤為公道尋與比商定議共十七款二借四百五十萬金鎊九扣實付銀四百零五萬鎊分四期交到三按周年四釐起息四前十年還利不還本十年後分二十年還清五以路業作保六五年工竣八由比派工程師名曰監察但督辦大臣一人節制九外國路員由監察遴薦督辦定派公司所用工路人員除監察外均歸督辦所派之大員節制中西員如有意見聽督辦核定但準監察在旁聽斷十比員如有不職由督辦勒退十一材料儘中國本有者購買如購外料將一半投標其餘由比公司照辦十二所購外料比公司應扣五釐之用十四此合同期內比公司無論何事均不得託他國商民管理並不能將此合同轉與他國及他國之人十五如中國未到合同之限願將此款一概還清利息即以清還之日停止已又增訂合同又續訂詳細合同於原利四釐之外加收四毫又辦事銀行按所付照酬以二毫半各股票提前還本者亦酬以二毫半二十五年比使請增漢口租界謂沿江日本租界旁地除設鐵路站外中間尚餘一萬尺本國請用一千尺不允已而駐漢比國總領事復見張之洞援同治四年中比條約第十二款仍請在漢口日本界下給比租界百丈張之洞告以各國專界皆須有專約同治四年之約祗言比人在通商各口宜居住宜建造之處可聽其租地建造並無圈畫租界歸比國管轄之語因與約三條比人在漢口如欲租地居住上有英俄法德日本各界下有自日本界至鐵路中國之地均宜居住可聽各與業主議租在他國租界則遵守各界巡捕納捐各章程在租界外中國之地則遵守中國巡捕納捐章程不準自修道路自設巡捕亦不準抗違拏犯一也比商欲買何處可向業主商議彼此情願公平議價照條約不得強壓迫受租值二也有比商一家即議地一段不能預圈空地一片歸比管轄以致暗中作成租界三也二十八年四月比使詣外務部謂漢口租界早經購妥地畝即將圈築圍牆外務部命張之洞查復之洞致外務部謂比人在漢口鐵路總站附近夾鐵路兩旁購地一大片請劃為租界當告以鐵路為中國之路總站處不能為他國所占萬難照辦囑其沿江一段後至距鐵路三十丈左至距鐵路總站六十丈止作為租界其餘路線以後沿路之三十丈六十丈各地段必須全數讓還中國此係格外通融辦法比使來鄂時亦已當面切實辨論逮飭關道備文照會比領事比領事照復將給與租界照收而未提及其餘應還中國地段務望囑其早日照鄂定界址定界將餘地歸還若再延宕即已準之界亦不能作為租界請堅持駮之久不決是年八月比商赴信陽辦貨運至漢口並未請領聯單又抗不完釐張之洞飭關道暨稅司詰之二十九年八月與比公司訂汴洛鐵路借款合同暨行車合同附鐵路管理材料廠章程土木合同購地章程先是光緒二十五年鐵路大臣盛宣懷奏請將開封河南兩府枝路統歸總公司籌款接造奉旨報可旋因拳匪事起停議至是比公司代理人盧法爾重申前議於是盛宣懷乃與盧法爾商議借款因上奏言盧漢幹路在滎澤左近渡河東至開封約一百七十里西至河南府約二百五十里現由盧法爾估計應借工款一百萬鎊約合法金二千五百萬佛郎克議明利息期限悉照盧漢章程俟合同簽定後九個月內開辦所有議訂合同各條飭由總公司法文參贊候選道柯鴻年等與盧法爾數月研商並經臣盛宣懷與河南巡撫陳夔龍逐條斟審刪汰商榷並經外部增改定細目二十九條又行車合同十條奉旨交外務部核議具奏外務部奏言臣等查盧漢分枝開封河南兩府既經奏蒙俞允自應準其展造本年六月盛宣懷函造合同到部臣詳加復核其還本付息用人購器一切辦法均與盧漢合同相符而意義較為周密惟合同第二十三款內載倘日後中國國家準由河南府接長至西安府督辦大臣可以應允先儘比公司按照本合同章程妥商議辦等語查二十五年十月盛宣懷原奏雖經申明自洛以通秦隴應歸總公司籌款接造而此段枝路地勢綿長將來如議用華款自辦亦不可不預留地步當令添倘中國國家自行籌款或招集華商股本接展此路比國公司不能爭執又令於行車合同第九款內添中國郵政局由此鐵路寄送各郵件應特備專車沿途各站皆須備給房屋以設郵局均照中國各鐵路通行章程辦理沿途並不得由承辦之國另設郵局等語以保權利硃批依議宣懷遂與盧法爾定議借金款二千五百萬佛郎克合英金一百萬鎊年息五釐歸還之期由賣票之第十年起分二十年均還三十年二月張之洞聞比國欲在湘造湘陰過常德至辰州一路特電致湘撫趙爾巽以紳商稟請承辦拒之三十四年始議收回漢口比國租界張之洞上奏言比國乘鐵路購地之際在漢口私購民地三萬六千餘方以預備鐵路比國工人賃住為辭自光緒二十四年向總署索訂比國路界經臣力拒自光緒二十四年起議相持至二十八年比使復迭向外務部催咨臣思比國原購地段緊倚京漢鐵路南端江邊馬頭之劉家廟火車站包過鐵路實扼南北鐵路咽喉於中國管理鐵路主權及京漢粵漢兩路交接之馬頭大有妨礙堅不允許僅就濱江一邊劃地一萬六千餘方擬作比界東北兩面皆與鐵路相離數十丈比使復求加寬駮以查明窒礙咨復外務部酌復自是又相持數年比駐漢領事將所買地契送交關道稅印要挾甚力臣思此地跨越鐵路橫當要衝雖一再駮令減讓究於附近鐵路地權地利有損不如議價收回留作擴充華商貿易以永保權利惟自鐵路告成後地價數十倍於前經臣磋議經年始將全數基地議定價銀八十一萬八千餘兩暫行息借華洋商款墊付奏入報可義大利即意大利亞後漢書所稱大秦國也在歐羅巴洲南境康熙九年夏六月義國王遣使奉表貢金剛石飾金劍金珀書箱珊瑚樹琥珀珠伽南香哆囉絨象牙犀角乳香蘇合香丁香金銀花露花幔花氈大玻璃鏡等物使臣留京九年始遣歸國召見於太和殿賜宴聖祖以其遠泛重洋傾誠慕義錫賚之典視他國有加同治五年秋八月義國使臣阿爾明雍介駐京法國領事德微亞詣三口通商大臣兵部左侍郎崇厚請立通商條約許之旋派戶部左侍郎談廷襄為全權大臣會同崇厚辦理通商條約九月阿爾明雍偕法國翻譯官李梅親齎所擬條約五十五款請核並遞國書其約大致本丹國和約而參用法布等國條約獨禁用夷字一條本之英約而中國於義向未稱夷與英事實不同政府以無關緊要亦不豫駮遂定議其目之要者為二附稅則一與法布二國同與英美丹奧日本各國權度名略異通商章程善後九款與丹奧比等國大致同約定後阿使回國旋由法使伯洛內致送我國訂約大臣圓形金牌上印本國君主容儀以為紀念受之六年九月義使駱通恩抵滬請換約朝命江蘇布政使丁日昌與互換法領事狄隆赴日昌行館聲稱此次義國換約派伊為翻譯官請日昌先往駱通恩處致候日昌告以義國公使奉其國差遣出使中華應先見中國使臣致其君命方為盡禮狄隆又言前在天津照會聲明於九月在滬換約今已十月日昌告以上年比利時國訂于九月換約先于五月通知今義國訂於九月換約遲至九月中旬始行通知由三口通商大臣咨呈總署王大臣奏請派使用寶委員齎送來蘇現于十月換約已極迅速其遲延不在中國也屆期駱通恩偕法總領事白來尼副領事狄隆等齊集日昌行館公服帶劍恭請聖安日昌偕蘇松太道應寶時等按章禮待駱通恩索觀憑據日昌恭捧諭旨給與開讀並將條約公同展對駱通恩出視條約一匣綴有義國君主用印之銀盒蠟餅裝飾整齊惟係用洋字另書並無上年在京所定原本日昌不允互換駱通恩免冠懇求自認錯誤謂值新舊使臣交換之際誤以為有其國君主用印之條約即可為憑致將原約漏未攜帶此次蒙恩準豫換約各國皆知今屆期不換實覺無顏對人等語白來尼等亦為之代求願代為翻譯並謂現帶用洋字條約儻與漢文原約文義不符惟法國領事是問懇為通融辦理日昌與應寶時商明先飭洋務委員督同熟諳意大里亞國文義之監生沈鼎鐘並白來尼等將駱通恩所齎洋字條約與奉頒條約詳校無訛仍不允與換駱通恩一再情懇日昌乃與變通告以貴使祗齎有君主用印之洋字條約一分則中國使臣亦祗能先將我皇上用寶之漢文條約一分與之互換所附洋文條約暫為拆下留在上海道署限駱使于四個月內取上年原定條約來換此約並聲明彼時祗能由蘇松太道就近與換不再遣使駱使允照辦惟四個月限期改為六個月十年三月義遣使臣費三多來華並遞國書兼考求浙江養蠶事光緒十一年夏義國擬開養生會請中國入會十五年命江蘇按察使陳欽銘為出使英法義比大臣旋代以大理寺卿薛福成十七年春二月薛福成呈遞國書義王出見慰勞備至立談甚久大旨謂義與中國數百年來交誼最先極為企慕我觀地圖始知中國之大義國之地不及中國十分之一云云旋辭退禮三鞠躬復握手次日謁見王后亦鞠躬遵西例也二十二年以四品卿銜羅豐祿為出使英法義比國欽差大臣二十五年義國索三門灣不許先是各國皆於中國索有海軍根據地至是義命駐京公使瑪爾七諾向總署要求租借三門灣向總署發最後通牒要求四日內答復未幾義政府命取消最後通牒調馬爾七諾回國二十八年義請派專使駐京許之政府亦以許王玉為出使義國專使十一月呈遞國書義主躬親接授向例公使見義主無座至是賜坐逾月又見義后及義太后義主設宴宮中請各國公使義主義后均入座席散義后詳詢中華文字書籍二十九年三月義國開農學會請中國入會王玉派員往四月許王玉譯送義國財政考于外務部謂義國幅員廣袤不及中國十分之一而歲入之款較中國多至五倍歲出之款較中國亦多四倍有餘十月又譯送義國關卡稅則于外務部謂徵稅章程二十條應稅之物分十七類共三百六十八種又包皮稅及去包皮章程十六條注册費章程十一條其中綜核至悉分析至精較之中國通商稅則疏密懸殊冀中國取則是月許王玉請商部派員赴義考察商務謂義國在華商務無多間有他國商人運華貨來義者除蠶繭茶葉二宗外他物絶鮮至華商從未到義國及其屬地貿易應即派員考察云云二十九年日俄開戰十二月義與英美德法公同照會俄日云除滿洲外不得在北洋水陸境內開戰三十年許王玉又譯義國榷煙志及銀行章程三十一年許王玉譯送義國國債册律章程彙編及官售煙價表三十二年夏駐滬義領事面遞約稿十一條於商約大臣呂海寰盛宣懷海寰等即將歷次與外務部電商之加稅傳教嗎啡鴉片國幣治外法權等五款照交因致外務部及鄂督張之洞直督袁世凱謂查義約前四條係新款一欲絲貨出口興旺索開紹興無錫兩處口岸一願襄助中國詳細考求養蠶學堂及設立局所代為經理一於未加稅以前改訂蘇杭鐵路運貨釐金推廣義商辦繭稅單期限後七條為英美各約所有均略變其詞一內地行輪一治外法權一華洋合股一礦務一國幣一優待利益一條約期限及以義文為正義等外部得電即逐款指駮海寰等因告義領義領一再爭辨遂議口岸援日約長沙例照辦蠶學用兼聘教員字樣大致已就已忽翻異欲廢議約海寰等恐于加稅有礙欲照所擬允準令稅司為轉圜焉是年義國密拉諾賽會牒請中國派員入會並送到章程各册及會場總圖許王玉得牒當將總章全譯分章九門祗譯子目因致外務部謂此會原起係為慶賀義大利瑞士兩國交界地方所鑿新潑龍山洞鐵道告成而設歐洲山洞鐵道向以法義交界之蒙斯尼山洞工程為最巨計長一萬二千二百三十三邁當現開之新潑龍山洞計長一萬八千七百四十三邁當實為歐洲山洞第一深長鐵道從前輪船商貨運往北歐者必由法國馬賽起岸陸運今此路告成以後可改由義境之折努阿起程陸運此為義國新得商利之大端故會中章程以陸運海運河運三項居首中國各省現議開鐵道如派員前來考察似于講求路政有裨政府得電許之義又設農業會意在聯絡地球諸國崇本勸農請中國入會計此次入會者四十國會員共一百十人前後會議者十分議者五許王玉僅于開會及簽押日一到而已
