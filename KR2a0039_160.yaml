body:
  text: 清史稿卷一百六十志一百三十五邦交八奧斯馬加秘魯巴西葡萄牙墨西哥剛果奧斯馬加即奧地利亞久互市廣東粵人以其旗識之稱雙鷹國同治八年遣使臣畢慈來華介英使阿禮國請立約幷呈其君主敕諭欲在京議約總署以在京議約與歷來各國成案不符應先照會三口通商大臣由三口通商大臣請旨奧使遞照會三口通商大臣崇厚以聞朝議許之命總理各國事務衙門大臣兵部尚書董恂會同崇厚辦理奧使呈所遞條約四十九款大致均從各國內採集而成董恂等於應刪應添各節逐一改定而奧使於恂所添商人不准充領事官一語不願列入約於恂所刪傳教一條仍列入約迭議不決久之奧使始允刪傳教一條而於商人不准充領事官一節仍欲另備照會於畫押日一同呈遞許之遂訂定和約四十五款通商章程九款稅則一冊是年奧夾板船名伊來撤各利亞用英國旗號私運外國鹽一百餘包計重二萬餘斤進口天津稅務司函致總署總署以奧船運鹽進口顯違條約應查拏並知照英領事前往查起十年九月奧換約屆期使臣嘉理治照會總署請換約特旨派江蘇布政使恩錫赴上海互換嗣因約本內漢文所載善後章程第五第八兩款均有引用條約第八條字樣其奧文內皆誤寫作第一條又稅則進口項下呀囒治木漢文載明長不過三十五幅地奧文誤寫作五十五幅地又羽綾羽紗羽綢小呢等類漢文載明每丈奧文誤寫作每疋須更改至十一年六月始竣事十一年奧使照會總署以接奉本國文稱去歲本國出有政令自同治十年七月十七日起凡量奧斯馬加各樣海船噸數之法皆與英國丈量噸數之法相同請劄知總稅務司轉知各口海關遵行十二年穆宗親政奧隨各國公使覲見光緒六年使臣李鳳苞函致李鴻章稱奧君長子明年正月十六日婚期中國雖未派駐使宜令鄰邦駐使往賀以盡友誼總署即電飭李鳳苞屆期往賀十年夏四月以翰林院侍講許景澄充出使德美和奧大臣駐德十三年代以內閣學士洪鈞十四年四月洪鈞赴奧呈遞國書見奧主於馬加行宮頌答如禮冬十月奧爾而伯納親王來京欲瞻仰天壇許之十六年秋七月復以許景澄充出使俄德奧和大臣十七年夏四月景澄赴奧通問覲見奧主奧主為述前歲有兵艦抵華承中國官員以禮相待屬為陳謝九月奧使畢格哩本覲見上於承光殿十八年奧主以西曆六十七年即馬加王位距今滿二十五年西俗以為慶事先期由奧外部通知各國公使詣馬加都城申賀許景澄備文傳賀旋即親赴伯達彼斯馬加都城覲見奧主申謝悃奧亦發電至京答謝二十年四月許景澄照會奧與俄德和等外部申明總署現章酌定洋機進口稅文十月皇太后六旬壽奧使隨各使呈遞國書致賀上見之於文華殿二十一年奧主叔父病故許景澄請旨致唁許之二十二年十月以都察院左都御史楊儒充出使俄奧和大臣十一月駐德奧使送節略稱奧廷擬派瓦耳布倫為駐京專使請中國國家允認中國派使駐奧亦如之二十三年四月奧使齊幹覲見上於文華殿二十六年春三月命內閣學士桂春使俄兼使奧七月拳匪之變奧兵隨德美法英意日俄聯軍入京師二十八年四月三品卿吳德章充出使奧國大臣二十九年代以山東道員楊晟三十年十月奧使齊幹覲見上於皇極殿三十一年八月以三品京堂李經邁充出使駐奧大臣三十二年三月奧使顧新斯基覲見上於乾清宮三十三年七月以外務部參議雷補同充出使駐奧大臣秘魯在南亞美利加洲同治十一年秘魯國瑪也西船私在澳門拐華民二百餘人行抵日本橫濱經日本截留訊辦知會中國派員前往時通商大臣何璟派補用同知知縣陳福勳偕英美兩領事派員前往旋各運回並謝日本十二年秘魯遣使來華議立約已而秘使葛爾西耶到津謁李鴻章鴻章詰以虐待華工等事不允相商秘使旋以本國新立雇工章程實無凌虐情事牒鴻章鴻章覆牒謂貴國新立雇工章程雖尚公道但查同治八年十年間華民公禀內所稱苛求打罵枷鎖飢寒雖立合同而章程虛設雖曰送回而限滿無歸等語是即保護華工未能照辦之證據也又來文所載一千八百五十五年八月十四日議立搭客船規不准載大幫之人查同治十一年日本國扣留秘魯瑪也西船載有拐買華民二百三十人之多據各國領事公同訊問船主苛酷相待飲食不繼並有割去辮髮鞭打囚禁等事又據粵海關稅務司報稱同治九年秘魯船一隻在澳門販載華工三百十三人同治十年秘魯船十三隻在澳門販載華工五千九百八十七人同治十一年秘魯船十九隻在澳門販載華工九千三百八十一人此皆係大幫秘國並不查禁近又據粵海關稅務司報稱本年七月間廣東省城黃埔河面有秘魯船七隻前來招工因其違背通行章程諭令驅逐出口以上各節是又帆船禁載大幫華人未能照辦之證據也查上年中國通行各國照會內載凡係無約各國一概不准設局招工其船隻不准搭載華工出洋即有約各國亦不准在澳門招工均經各國知照在案秘國向係無約之國照章不准裝載華人出口乃昨據貴大臣面稱現載往秘魯華人已有十萬餘人明係違背公法況華民在秘魯重受凌虐曾兩次公禀美國欽差轉達總理衙門是以日前疊據英美法各大臣述知貴大臣欲來華議約即經總理衙門王大臣照覆各國以秘魯向來專以拐販華工為事華工受盡痛苦其相待中國情形與別國不同必須與伊國說明先將所招華工全數送回中國並聲明不准招工方能商議立約否則實難辦理等語想貴大臣必已與聞無煩贅述旋據函稱遵照總署原議先將所招華工全數送回中國自可妥商鴻章訂期會議屆時不至鴻章責之復請期鴻章因再約期至日秘使偕愛勒謨爾秘妥士來適同知容閎由美國回津鴻章令閎與議秘使將鴻章原函取出逐條剖辨謂無苛待情事又謂中國既令無約之國不准招工是以本國亟派使前來議約以後自必照約互相稽查保護幷稱華工送回可於約內聲明除華人在秘魯設肆寓居自不願歸無庸送回其餘工人等合同限滿即令原主送回分別辦理容閎因言美國向例無立合同年限雇工之事華民在金山等處傭工去留自便美官不能勉強勒掯即有先立合同者若不願當隨時將合同繳銷作為廢紙秘國亦應照辦秘使允商辦鴻章仍以拐去華民為言秘使怫然謂即回國屢議不決十三年三月復與秘使接議秘使自交所擬條約鴻章不受久之始定查辦華工專條其文曰現因秘國地方有華民多名且有稱華民有受委屈之處茲會同商訂先立通商條款和好往來庶幾彼此同心由中國派員往秘將華民情形澈查並示諭華工以便周知一切秘國無不力助以禮接待如查得實有受苦華工合同年限未滿不拘人數多寡均議由委員知照地方官雇主倘不承認即由地方官傳案訊斷若華工仍抱不平立許上告秘國各大員再為覆查凡僑寓秘國無論何國人民呈禀式樣最優者華工應一體均霑其益自秘國核定此項章程之日起凡華工合同已經期滿若合同內有雇主應出回國船脚之議該工人有願回國者即當嚴令雇主出資送回又各華工合同若無送回字樣合同已滿期該工人無力自出船資有願回國者秘國應將該工人等附華船送回船資無須工人自備秘國自行料理云云復將通商條約十九款及已訂查辦專條改定因致總署謂在秘使之意及各國公論彼既允定查辦資遣華工專條是秘魯已予中國以便宜我亦當照各國和約允以一律現訂通商十九款大致亦與西約詞意略同然均經鴻章逐條酌改如各約篇首所稱互相較閱俱屬妥當或妥善字樣轉覺不妥茲將俱屬妥協四字刪去各約欽差駐京往來有彼國而無我國茲先載明中國欽差各約領事官無商人不准兼充明文茲添不得委商人代理各約游歷通商執照秘使不肯刪通商貨物字樣茲特添入貨物應照報單章程辦理各約多以英法文為憑茲改彼此各用本國文字亦可兼看英文其餘凡通商納稅兵船商船控告詞訟各節均將中國一面入所最要者招工流弊無窮澳門販運已久華工既在秘國受苦以前雖允查辦以後若仍開招害將何所底止茲會訂第六款上半節照美國續約云別有招致之法均非所准下復添不准在澳門及各口岸勉強誘騙中國人運載出洋違者其人嚴懲船隻罰辦等語嗣後中國但能照約嚴禁不獨秘魯不敢違犯即各國招工之舉亦得援引辨證又前訂查辦華工專條商令派員前往秘使允即遵照旋派容閎往查辦容閎查辦訖報告華工到彼被賣開山種蔗及糖寮鳥糞島等處虐待情形合同限內打死及自盡投火爐糖鍋死者甚多實可慘憫會屆換約之期秘魯遣使臣愛勒謨爾來華求換約光緒元年派巡撫丁日昌為換約大臣日昌謂去年中國所以與秘國立約者因秘國葛使照會內言秘國設有新章新例保護華民盡除弊端乃立約之後派員前往秘國確查始知華工受屈顯與條約內保護優待之例相背甫經立約而秘國即種種違約是不能不加一照會聲明換約後即當遵約辦理再不能仍照從前之凌虐秘使聞之不待辭畢即怫然去日昌以秘使無禮因致總署請暫緩換約四年秘魯因澳門停止招工香港英總督又申嚴禁秘魯乃赴廣東省城與美商同孚洋行私立運載華工合同五年為期每年得船費洋銀十六萬圓設局招誘粵督聞之即予查禁秘使詣天津謁鴻章拒之時出使大臣為陳蘭彬雖由美使兼日秘並未赴秘七年以津海關道鄭藻如為出使美日秘大臣十年五月始由美赴秘謁總統遞國書開辦使署於利馬都城奏派參贊一員代辦使事又於嘉理約海口設領事一員管理華民事宜仍禁絕招工並咨請查拿廣州城外私設招工行棧十二年鄭藻如歸迭以傅雲龍張蔭桓崔國因楊儒充公使又增設代理領事十就秘籍中之廉正者充之遇事報使署由參贊區處公使仍不駐秘二十一年秘總統即位各國均有國書致賀介由美使請總署代達二十二年始頒國書二十三年六月駐秘代辦李經行抵嘉理約因疫疾盛行恐傳染阻止入口從秘制也久之始聽入時公使楊儒赴秘遞國書秘外部先派護衞大臣一員在嘉理約迎伺隨派火車接至利馬又派副外部在車站迎伺遞書日又用宮車迎接公使遞國書他國均用軍裝佩劍中國以秘係民主沿例用行裝行鞠躬禮致頌詞秘主答頌如禮二十四年利馬華人在香港辦貨秘駐港領事照驗加戳向例戳費值百抽一至是增加又改用金鎊比前增逾倍華商以秘違例請秘外部飭知港領事照向例核收又籲請于駐秘代辦謝希傅於是照會秘外部謂貨單戳費向有定章值百抽一又為萬國通例貨本用金用銀各國不一而抽費皆按此為衡即就利馬論麥麵一項由智利販運者抽費俱按智洋洋貨各項由英倫販運者抽費俱按金錢載在秘國稅則衆所共知乃同一抽費於智於英皆就地照抽獨至香港一處忽示歧異於理不解或謂香港為英屬口岸應改金鎊則粵商貨本亦應升算金錢方與通商各國一律應請批示秘外部不允批示旋稱港銀成色太低換兌金鎊虧損過多謝希傅告以一律改從金鎊華商亦所甚願秘外部始允收費按照貨本一律改從金鎊宣統元年五月秘工黨仇視駐秘利馬華人暴動秘政府特頒苛例令進口華人每名須有英金五百鎊呈驗始得入口時出使美日秘大臣伍廷芳赴秘與交涉先謁總統遞國書即照會秘外部謂秘所設苛例違反兩國所立條約旋復見秘總統辨論請廢止飭諭總統不允已復由秘外部覆文秘外部大臣玻立士謂廷芳請先妥議限制中國工人出口來秘善法附入條約廷芳答以章程不應附入條約玻立士又欲使秘領事有察驗華官所給護照是否合例之權及到秘時仍由地方官查驗方准登岸廷芳駁之執不允廷芳閱草案又請加寓智利厄瓜多巴拿馬等處華商欲來秘者可由代理中國領事等官發給護照以為入境憑據等語玻立士允諾時留秘華人多吸食鴉片廷芳請秘贊助設法限制秘總統許之旋復定議廷芳與秘外部立廢除苛例證明書九條一中國允自限工人來秘二至六定非作工之華人往秘護照辦法七定非作工者概不限制八定免請護照者之資格九發照驗照祗須繳費五圓幷停止秘國五月十四號頒發飭諭之效力時宣統元年七月十三日即西曆一千九百零九年八月二十號署押蓋印巴西國南亞美利加洲共和民主新國也光緒六年始遣使臣喀拉多來天津請議立和約總署請飭南北洋大臣就近商辦旋派李鴻章為全權大臣與議約六月一日喀使抵天津照會鴻章請立約並擬先送約稿呈閱遂訂期接議研商至再始定約鴻章因上奏言此次巴西議約數易其稿嗣以秘魯條約為底本刪去招工各條並參用別國條約定為十六款其關係中國權利者皆力為辯論變通酌定如第一款兩國人彼此皆可前往僑居句下添入須由本人自願一語即寓禁阻設法招致之弊第三款設立領事官必須奉到駐紮之國批准文憑方得視事如辦事不合可將批准文憑追回本係西國通例其立法之善有二一則其人或非平素公正或與我國向不浹洽我皆可以不准一則通商口岸或係新設人情未安不欲領事驟至我亦可以不准至辦事不合追回文憑是予奪之權我亦得而操之第四款游歷執照一節洋人游歷各處多有由領事自填執照送請關道用印幾若內地往來全憑領事作主今改為領事照會關道請領印照可稍助地方官之權第五款遵守專章一節即是德國新約第一款之義查均霑二字利在洋人害在中土設法防弊實為要圖特聲明嗣後如有優待他國利益彼此須將互相酬報之專條或互訂之專章一體遵守方准同霑優待他國之利益似較周妥第六款本擬照德國新約酌用漏報報辦法惟巴約係仿秘魯約本並無通商詳細章程若僅添漏報報一層轉恐掛一漏萬今定為兩國商人商船凡在此國通商口岸即應遵從此國與各國原議續議通行商務章程辦理第九第十第十一第十二等款皆指問案之事查西國案件俱由地方官訊斷領事不得干預惟中西法律懸殊各國不能聽地方官審辦於是領事遂有其權此次定為被告所屬之官員專司訊斷各依本國律例定罪蓋被告多係華民前因會審掣肘受虧不少茲由被告所屬之官訊斷當可持平辦理又第十一款內將來另議中西交涉公律巴西亦應照辦一節雖公律驟難定議究為洋務緊要關鍵特倡其說以作權輿以上各節皆按照各國約章酌議變通期歸妥善至洋藥一項雖非巴西出產惟中土受害滋深今議令巴使知會巴國外部查酌禁止巴商販賣先由巴使另備照會存案臣亦給予照覆約既訂遂於八月初一日會同畫押鈐印明年三月喀拉多忽詣李鴻章謂接本國電報復請商改於是增刪巴西原約共十七款前約正副本作廢八年四月換約於上海八月巴西贈鴻章寶星旋答之宣統元年巴西使臣貝雷拉請與中國立公斷專約先是巴使詣外務部援照保和會公約請與中國商訂一公斷條約並呈所擬洋文約稿遂派外務部左侍郎聯芳為全權大臣與貝雷拉議約四條一兩國外交官不能和平了結之案可向海牙所設之常川公斷衙門投控並請審斷但須無礙兩國利益及國權榮譽亦不得干涉第三國之利益二公斷員之權限及細則須臨時由中國皇帝及巴西總統斟酌合宜辦法三次約以五年為限限滿六閱月未聲明作廢者作為續訂五年嗣後期限照此計算四本約批准後在巴西京城換約用華文葡文法文三體而遇礙難解釋之處則以法文為憑此約畫押後因事羈延未及互換三年十月駐法代辦使事戴陳霖與巴西駐法代辦達旒格芬始在巴黎互換葡萄牙在歐羅巴極西明正德年初至中國舟山寧波泉州隆慶初至廣東香山縣濠鏡請隙地建屋歲納租銀五百兩實為歐羅巴通市粵東之始清雍正五年夏四月葡國遣使臣麥德樂表貢方物抵粵巡撫楊文乾遣員伴送至京召見賜宴於賞賚外特賜人葠緞匹瓷漆器紙墨字畫絹鐙扇香囊諸珍加賞使臣命御史常保住伴送至澳遣歸國麥德樂在澳天主堂率洋商誦經行禮恭祝聖壽乾隆十八年夏四月葡國遣使巴哲格伯里多瑪諾入貢奉表言臣父昔年仰奉聖主聖祖皇帝世宗皇帝備極誠敬臣父即世臣嗣服以來纘承父志敬效虔恭臣聞寓居中國西洋人等仰蒙聖主施恩優眷積有年所臣不勝感激歡忭謹遣一介使臣以申誠敬因遣使巴哲格等代臣恭請聖主萬安並行慶賀伏乞聖主自天施降諸福以惠小邦至寓居中國西洋人等更乞鴻慈優待再所遣使臣明白自愛臣國諸務俱令料理臣遣其至京必能慰悅聖懷凡所陳奏伏祈採納道光二十九年其酋啞嗎為澳民所殺藉端尋釁釘關逐役抗不交租又屯兵建台編牌勒稅於是澳地關閘以內悉被侵佔粵省大吏置之不問咸豐八年冬十月葡萄牙遣人來上海請立約時欽差大臣大學士桂良駐滬初拒之旋為奏聞未許光緒七年葡人欲在澳門設立領事粵督張樹森不允欲令駐香港領事兼辦出使大臣曾紀澤謂葡人之於澳門儼然據為己有唯租住之名尚存若忽令香港領事兼理將借香港領事之名引為澳門領事之據查澳門本有縣丞等官似宜倣上海租界之例設立官職較崇委員並令督同縣丞辦理交涉事件庶幾可圖補救十二年政府因開辦洋藥稅釐併徵新章總署奏請飭派邵友濂會同總稅務司赫德前往香港會商辦法查知洋藥自印度來華香港為總匯之區必須英葡兩國一律會辦始能得力因與澳門總督商緝私辦法又恐葡為無約之國遽與商辦或多要求於是遣赫德與之電商擬設稅務司澳督亦允乃訂草約四條一兩國在京互換通商條約一中國准葡國永駐管理澳門一葡國允非中國則澳地不讓與他國一洋藥稅徵香港如何會同澳門即類推辦理當派稅務司金登幹在葡國畫押並允其派使來華擬議詳細條約粵督張之洞上疏言澳門為香山縣管轄距省城二百餘里陸路可通實為廣東濱海門戶非如瓊州之孤懸海外亦非如香港之矗立海中葡人今因事要求曲徇其請遷就立約實多可慮挽回補救之策約有五條一曰細訂詳約查簡約雖經金登幹畫押而詳細條約應刪應增仍須俟葡使到華會同總署核議請旨辦理其永駐澳門一條原因協辦藥徵格外見讓租銀非畫地歸葡者可比且約有不得轉讓他國之文可見澳門係中國疆土讓與葡國居住應聲明葡國居住免其租銀不得視為葡國屬地其不讓於他國一條應聲明澳門係中國疆土葡國不得讓于他國如此則我有讓地之名而無損權之實仍與原約之義毫不相背一曰畫清界限有陸界有水界何謂陸界東北枕山西南濱海是為澳門其原立之三巴門水坑門新開門舊址具在志乘可徵所築礮台馬路兵房均屬格外侵佔應於立約時堅持圍牆為界不使尺寸有踰何謂水界公法載地主有管轄水界之權以礮子能及之處為止兩國土地毗連中隔小河則以中流為界此係指各國自有之地及征伐所得者而言澳門本係中國之地不過准其永遠居住葡人只能管轄所住之地宜明立條款所有水道准其船隻往來不得援引公法兼管水界一曰界由外定准葡住澳免其租銀水界仍是中國所有自無水界之可分陸界至舊有圍牆為止葡人于同治初年將圍牆拆卸希圖滅跡然牆可拆而舊址終不可沒將來約有成議似應由粵省督撫臣就近派員會同葡使親往勘驗詳查舊址公同立界俾免影射踰越一曰核對洋文查赫德申稱所訂草約四條與澳門洋報所載者文義輕重懸殊第一條派使來華擬議通商條約洋文內加須有利益均霑字樣第二條葡國永駐澳門管理一切洋文內加悉與葡國別處屬地無異字樣草約內澳門字樣凡三見洋文皆作澳門及澳門附地查附地二字意極含糊不惟將圍牆外至望厦村陰括在內即附近小島毗連村落皆可作附地觀至謂與葡國別處屬地無異一語措詞亦謬雖洋報所載未盡可信傳說必非無因既與總署奏案不符亦非奉旨准其永駐之本意應請飭下總署先將草約漢洋文詳細核對以防侵越一曰暫緩批准立約雖有成議批准權在朝廷此各國之通例美國煙臺條約光緒二年所立有未經批准三條直至上年始行議定成案可據自應明與之約定約後須俟稅釐款項大增拐騙逃亡隨捉隨解諸事皆有明效可徵兩國始行批准互換庶彼不得終售其欺疏入報可葡使羅沙旋來華詣總署呈節略及地圖總署王大臣閱圖與現在葡人所居之地界址不清多所辯駁復致北洋大臣李鴻章派員赴澳確查張之洞復上疏請先清界址緩議條約略謂澳門水陸一帶大抵有葡人原租之界有久佔之界有新佔之界有圖佔未得之界除原租之圍牆以內仍舊聽其居住外已佔者明示限制未佔者力為劃清又謂洋藥來華皆徑到香港分運各口從無徑運澳門之船是稽察之關鍵在香港不在澳門等語總署因界址一時難清仍主先議約後劃界久之始定於是總署上言曰向者總署兩次商辦此事一議通商訂約一議給價收回迄無成說今因洋藥緝私一事允其重申前議並以澳門地方界址一層從先久經含混因與葡使羅沙迭商於約內言明澳門界址俟勘明再定並聲明未經定界以前不得有增減改變之事仍將不得讓與他國一層專立一條永昭信守葡使允即電達本國照此定議正籌辦間續接李鴻章函稱粵省督撫臣分別原租久佔新佔未佔四層辦法所謂久佔者不知何年新佔者亦在咸豐同治以後委員程佐衡回津面與討論查圍牆以內為原租關閘以內皆所久佔譚仔過路環則為新佔此皆已佔者也關閘以北直達前山澳西對岸灣子銀坑各處遠及東南各島皆欲佔而未佔者也應俟將來派員勘界時隨時斟酌辦理尋報可嗣因交犯一條葡使欲照英約載明華人犯罪逃至澳門者查明實係罪犯交出總署不允磋商久之始允添改華民犯案逃往澳門官員仍照向來辦法查獲交出又稽查洋藥一事復于專約內添寫所有澳門出口前往中國各海口之洋藥必須由督理洋藥之洋員給發准照一面由該洋員立將轉運出口之准照轉致拱北關稅務司辦理遂定議共計條約五十四款及緝私專約三款當即劃押是年葡人散鈔單于望廈不納明年三月命李鴻章與葡使在天津換約復公立換約文憑華洋文各一畫押蓋印蕆事是月葡人出關閘外設一路燈又修復前山營廠卡張之洞責令撤去旋據澳酋照稱關閘外至北山嶺中間一帶向為局外之區建廠須兩國會商非一國所能擅主已照會鈞署云云張之洞即致總署謂條約載未定界以前俱照依現時情形勿動自係指澳境關閘以內彼所已占者而言同治元年葡使來京議約亦言關閘以外係華官把守未敢侵及從無局外之說此次來文實堪詫異請折辯五月葡人又欲爭執舵尾山管轄權張之洞致總署謂舵尾山在十字門小橫琴島上為香山縣屬向無葡人居此此處瘋人得葡人養濟不過尋常善舉何得視為管治證據如各省常有洋人施醫院豈能即為洋界乎請嚴切駁復二十七年與各國修改稅則各國皆會同簽押葡不派員特與照會葡使仍不至久之始派參贊阿梅達來仍不主改稅則既又請求澳門對面各島開商埠復拒絕之二十八年正月葡使白朗穀來言本國商民願在澳門振興商務修濬河道前定和約已認澳門附近屬地為葡國永居管理應將此地之界址廣闊等項丈量妥訂按對面山一島居澳門之西小橫琴大橫琴二島居澳門西南各島係澳門生成屬地又經和約認明請會商妥定外務部王大臣等復以中國邊海島嶼向隸府廳州縣從無此島屬於彼島之事祗能就澳門現管界址照約勘定不得于界之外另有屬地二月初葡使復來照會以上年各國公約第六款所載進出口稅則改為切實值百抽五葡未與議表明本國人民所運各項貨物應仍照光緒十三年兩國條約所訂稅則辦理王大臣等嚴詞駁拒葡仍請求不已初葡使面稱願將界務暫置不提但求擴充商務開具條款大要照分兩端如應允改定稅則稽徵洋藥稅餉在澳門設立分關為有益中國之款在澳門附近任便工程由澳至廣東省城修造鐵路為有益葡國之款王大臣等以澳門附近任便修造工程仍慮暗侵界址駁令先行刪除設關一款札飭總稅務司赫德核辦鐵路一款電咨前兩廣總督陶模督辦鐵路大臣盛宣懷分別核復旋據赫德復稱澳門設關有裨稅收但章程必須妥定陶模復稱由澳至省修造鐵路於地方情形尚無妨礙盛宣懷復稱造路於稅務有益必須由總公司與之定立合同不必列入約款王大臣等得復復與葡使一再研商將允造鐵路另用照會聲明不入約內葡使亦允從遂與定議乃上言曰此次葡使來京意在展拓澳界磋商十餘次始將勘界之議商允停辦現與議訂條款第一款聲明舊約照舊遵守第二款聲明上年各國公約加增稅則大西洋國均允遵照並與訂明該國人民所納稅項不得較別國稍有增減以預留日後加稅地步第三第四款在澳門設分關一道以稽查出入澳門洋藥並徵收各項稅項該關須在澳門界內但使稅司稽徵得力似於餉項不無裨益第五第六兩款均申論設關事宜章程由兩國酌定第七款訂約文字第八第九款批准互換各節皆向來訂約應之款應請簡派大臣與葡使定期畫押再將約本進呈請用御寶以憑互換至設立中葡公司修造由澳門至廣東省城鐵路地僅二百餘里現辦粵漢九廣兩路已議定通至省城再添一路亦藉以擴充商務既與葡使訂明另用照會為憑擬俟命下即將照會互換仍咨行督辦鐵路大臣盛宣懷與葡詳定合同以期周妥報可慶親王奕劻旋畫押三十年二月葡駐京使臣白朗穀照稱奉本國諭改修稅則一事派使前赴上海畫押並將光緒二十八年九月新訂增改條款暨是年十二月會訂分關章程條款內之意同語異之處改為一律其修改稅則及新定增改條款並會訂分關章程條款合訂一本以歸畫一葡使赴滬與商約大臣呂海寰等會晤海寰等面詢照會內所稱各節將何者為意同語異及如何改歸一律之處詳為解明以便會同辦理葡使答以光緒二十八年新定增改條款及會訂分關章程條款本國議院未經核准不克互換是以此次修改商約另行擬送條款即將前此條款章程意同語異之處包括在內海寰等以葡使晤對之詞與照會外務部文意不符駁之並照會詰問葡使令其明晰照復葡使旋復以本國訓諭業在外務部聲明一本政府准議院所議給權於駐華公使新立商約即照近日各國與中國所立之商約無異二現欲請立新約包括光緒二十八年九月所立之條款暨是年十二月會訂之專條但內有更改者俾中葡兩國主權免有視為關礙之處三至於葡國協助中國防緝走私洋藥一事奉本國政府訓諭可將此項緝私之法整頓以便全免走私四因今欲立之新約應包括光緒二十八年九月所立條款並十二月所訂專條內之宗旨或係更改或係推廣悉行包括在內所以本國之意毋庸將前約核准海寰等電詢外務部復云葡使並未向部聲明前約作廢當日議約原以分關鐵路為彼此互換利益儻不將光緒二十八年之約核准藉包括為詞以廢分關之議則中國亦必將鐵路互換之照會聲明作廢海寰等即照部電直告葡使拒不與議葡使迭來商懇以澳門設立分關實有礙于本國主權故議院未能核准欲明言前約作廢又有礙于本國體制故以包括宗旨毋庸核准為詞海寰等遂與議訂新約初葡使送來商約款文二十條海寰等就中摘其不能允者往返磋商葡使又請為寓澳華民每年准運米六百萬石免納稅課以資食用海寰等以澳門華民不過十萬人何至歲需六百萬石拒之旋外務部據粵督調查每年只准運三十萬石又購米地方限以廣東一省葡使不允久之始將各款議定海寰乃入奏曰綜計釐訂條約二十款第一款聲明舊約照舊遵守第二款聲明和議所定加增稅則葡國允遵照辦第三款聲明入澳門洋藥均囤于官棧每年澳門食用洋藥定數以外不得再有搬出凡報運中國各處亦應設法以防私行運往所有應定各項章程應由彼此兩國商訂又葡國迅定律例如有犯此約章應分別懲處第四款澳門水陸地方如何防緝走私彼此派員會訂查緝之地位並可行之辦法第五款照英約推廣西江各口及廣州府屬各埠行輪惟須遵守現行一切章程如不遵守仍不准照辦葡國並定律例分別懲辦第六款葡萄牙酒無葡國執照不得照本約所附稅則納稅第七款通商口岸地方居住貿易第八款華人入葡國版籍須專定律例杜其在內地所享利益及藉葡國籍以脫卸在華所立有合同責任第九款加稅免釐第十款發還海關存票第十一款釐定國幣第十二款禁止嗎啡鴉片第十三款振興礦務第十四款合股經營第十五款保護貨牌及創蓺執照第十六款整頓律例第十七款籌安民教第十八款條約年限第十九款本約以英文為准第二十款在北京互換以上各款為我所側重者在洋藥緝私一事葡使立意約文以渾括為准免致議院再有疑阻商酌至再將詳細辦法另立專章計釐定第三款專章五條大旨在洋藥運至澳門必須囤入官棧其由棧報運中國則由彼此會同稽查必須完清海關稅釐始准搬出如不進官棧私自登岸按葡律核辦其由原船私運中國由拱北關緝辦並嗣後有應行商酌加添由澳官與稅務司商訂第五款專章十五條在澳門專設躉船以便由拱北關查驗由澳門來往各處貨物為要義其一切限制辦法悉照英約內港行輪章程核議迭經臣世凱臣之洞往復籌度公同斟酌妥善電請外務部核准然後與之定議至陸路稽徵稅項訂明設在總車站載入鐵路合同之內又第三款澳門食用洋藥定數恐將來澳督與稅司多少爭執意見不同特用照會聲明可由彼此在北京之代表人細查會定又籌安民教一款葡使奉其政府訓條另備照會聲明凡有天主教堂在華之他國已經允許者葡國始可照辦此會訂約款章程及另備照會之情形也伏念葡萄牙國以和約未經與議不認各國修改稅則而要索澳門分設鐵路與粵漢鐵路相接是以外務部原議在澳門設關以為互換利益今葡國以議院未能核准前約已不廢而廢故此次詳訂中國海關在澳門水陸地方查緝洋藥走私辦法權限以為補救葡使欲以新約包括前約誠心相助妥訂條款章程雖無設關之名可收緝私之實並由臣宣懷與葡使將粵澳鐵路合同同兩國商董妥議已將車站徵稅一條列入合同之內已請外務部核准忽接來電謂廣東紳商不允葡運粵米不能不俯順輿情令再研商適葡使急于返國不能再候擬將米事留後再議先將商約暨章程先行畫押報可三十四年正月日本船辰丸號密運鎗礮彈藥向中國輸入假泊澳門附近之過路環島東方二海里地為中國礮艦所捕獲日本政府以係葡萄牙領海為詞葡國政府亦言辰丸碇泊地係葡國領海於是復議中葡畫境一事宣統二年葡政府派海軍提督瑪喀多中政府派雲南交涉使高而謙為畫境全權大臣會議于香港葡使初要求澳門半島及拱北小橫琴大橫琴譚仔過路環諸島與附近海面均為葡領謙不允又要求譚仔過路環二島澳門半島及拱北大小橫琴諸島之一部及附近海面為葡領謙仍不允只允譚仔過路環二島承認為葡領餘皆不承認相持四閱月不決葡使請付萬國和平會議解決謙又拒之旋停止會議移議于北京甫開議會葡萄牙革命起遂輟議成為懸案墨西哥在北亞美利加洲光緒甲申乙酉年間墨以立約招工來請中國駐美公使楊儒派員赴墨察看情形擬定約款電請總署籌辦久未定二十三年駐美公使伍廷芳與墨駐美使臣盧美路重提前議會盧美路卒繼使臣阿斯芘羅斯復議此事久之始定為二十款初廷芳與盧美路議也已允將前議永行墨圓一節刪除交犯一款允照總署來函辦法至是定議廷芳乃上奏言查泰西通例領事初到須領駐劄之國認准文憑方得視事大小各國無不皆然中國除巴西約外各國約內皆無此款今於第三款內訂明領事得有認准文憑方能視事如辦事不合違背地方條約可將認准文憑收回將來各國修訂條約亦可視此為衡第五款不准誘拐華人出洋一節是查照日斯巴尼亞約辦理墨約之訂實前任使臣鄭藻如首倡其議蓋謂出洋不必禁誘拐則不可不防與其受凌虐之後始行設官不若乘未往之先妥為設法現定必須本人情願不准誘令出洋則包攬誘拐之風不禁自絕第六款中國人民與列國人民一律同霑利益一節我國人民往來貿易與別國一律無異將來開荒種植之事均可援照各國章程辦理第八款原稿彼此土產稅則未載者暫時免稅承准總理衙門電示遵即改為彼此進出口稅均照相待最優之國一律辦理此是仿照法墨商約改訂第十款遇有軍務不准勒令僑民充當兵勇不得強令捐輸一節此是仿照英墨約辦理第十五款中國將來議立交涉公律一節歐美通例凡僑居他國人民遇有控告案件均歸地方官訊斷惟中國與各國定約各歸本國領事訊斷墨國以利益均霑為詞不得不暫行照辦惟於約內聲明若中國將來與各國議立交涉公律以治僑居中國之外國人民墨民亦應照辦第十六款凡船到口岸船上諸色人等如有上岸在二十四點鐘內滋事者准由地方官訊斷罰鍰監禁此是創給中國官訊問外國人之權如地方官辦理得宜他日各國修約即可循此而推第十七款中國人民有事在墨國控告得享權利與墨國或相待最優之國人民無異一節查本年五月間墨國覃壁古埠華民數百人被工頭凌虐剋扣工資具詞呈訴經臣備文由墨使轉達彼國政府派員嚴切查辦惟條約未立保護莫及今約內聲明控告事件得享權利則遇有不平隨時赴官剖白於僑居商民不無裨益以上各款均經悉心酌定並將漢文與英墨文字句一一校對皆相符合查墨西哥國地分二十九部其南部一歲三穫尤為沃壤民惰耕作地利未興近年新定招人開荒章程一經開墾即為永業內地人稠時虞艱食託足海外謀生日難有此邦為消納之區既可廣開利源又可隱消患氣歷任使臣均以訂墨約為要務職此之由向例草約定後議約之員即須會同簽押臣隨將約本繕就訂期十一月十二日率同參贊隨員將會訂條約漢文墨文英文各二分覆校無訛與墨國全權大臣阿斯芘羅斯互相畫押蓋印咨送總理衙門請旨批行報可二十八年伍廷芳據粵商禀咨外務部謂自上年中墨訂約後華人由香港搭船赴墨者日多惟華人由香港附輪先須假道美國舊金山埠方能赴墨殊非便商之道因美正禁止華工入境故也擬商明輪船公司特派數艘由香港逕赴墨國口岸俾僑民任便往來現在中國業已換約華人附搭輪船來往庶不致有所窒礙外務部照會英公使轉行香港總督飭知英輪公司照辦二十九年出使美日秘古國大臣梁誠咨外務部請援古巴成案設總領事官一兼充參贊駐墨國薩理那古盧司海口遇有與外部商辦事件即可馳赴墨都並以美使兼攝日秘古三國使事外務部奏請允行是年墨派員充駐廣州等處領事官尋又派領事分駐上海福州廈門是年墨因防疫禁止華人前往梁誠與交涉旋弛禁墨訂立中國及東方諸國移民入境章程六條俾共遵守三十年梁誠赴墨都遞國書開辦使署分館墨亦派使臣酈華來華遞國書並邀覲見請頒給墨總統暨其國各執政大臣寶星許之三十一年墨前總統由國民公舉續任六年墨致國書由其國駐京公使烏海慕呈遞尋由外務部擬覆國書是年墨開萬國地理會請中國派員入會許之剛果在亞非利加洲剛果河左右光緒二十四年六月遣其使臣余式爾來華請訂和好通商之約許之先是光緒十一年十一月剛果國外部大臣伊特倭照會中國謂奉命充外部大臣願與中國開通往來遇有交涉事件必當妥善辦理尚望貴王大臣推誠相待以敦睦誼至是乃訂簡明條約二條一中國與各國所立約內凡載身家財產與審案之權其如何待遇各國者今亦可施諸剛果自主之國二議定中國民人可隨意遷往剛果自主之國境內僑寓居住凡一切動產不動產皆可購買執業並可更易業主至行船經商工藝各事其待華民與待最優國之民人相同各大臣先為親筆畫押蓋用關防以昭信守
