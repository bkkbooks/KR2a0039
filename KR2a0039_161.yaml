body:
  text: 清史稿卷一百六十一表一皇子世表一自周室衆建同姓穆屬維城炎漢以降帝王之子靡不錫以王爵考帝繫者於以見親親之誼焉清初封爵之制未嘗釐定武功慧哲宣獻諸王皆以功績而獲崇封崇德元年定九等爵順治六年復定為親郡王至奉恩將軍凡十二等有功封有恩封有考封惟睿禮鄭豫肅莊克勤順承八王以佐命殊勳世襲罔替其他親郡王則世降一等有至鎮國公輔國公而仍延世賞者若以旁支分封則降至奉恩將軍逮世次已盡不復承襲蓋自景祖以上子孫謂之覺羅與顯祖以下子孫謂之宗室者親疏攸別爵秩亦殊數傳而後僅得子男原夫錫爵之本意酬庸為上展親次之故有皇子而僅封貝勒貝子公者揆諸前祀至謹極嚴雍正後惟怡賢親王以公忠體國恭忠親王以贊襄大政醇賢親王以德宗本生考皆世襲罔替至末年而慶親王奕劻乃亦膺茲懋賞矣自餘宗潢繁衍非國有大慶不得恩封非嫻習騎射不得考封而入關二百餘年習尚文勝無復開國勇健之風每屆歲終與於選者益鮮此盛衰強弱之原歟今自肇祖以下子孫列為世表本諸瑤牒支別派分其不列於十二等之封者謂之閒散宗室則從略焉作皇子世表肇祖系充善妥羅肇祖第充善第一子一子無嗣妥義謨充善第二子無嗣錫寶齊篇古充善第三子褚晏肇祖第二子早卒巴雅拜音喇圖顯祖第巴雅喇五子以第二子軍功賜順治二號篤義年封一天命八等鎮國年卒順將軍四治十年年晉鎮追封貝國公五勒諡曰年晉貝剛果子六年晉貝勒九年以罪削爵黜宗室嘉慶四年復入宗室
