body:
  text: 清史稿卷一百六十六表六公主表按關內本與關外一次本均有公主表序關外二次本無今附録序文於後以資參考天命八年六月戊辰太祖御八角殿集諸公主郡主訓之曰朕仰體天心勸善懲惡雖貝勒大臣有罪必治汝曹苟犯吾法詎可徇縱朕擇賢而有功之人以汝曹妻焉汝曹當敬謹柔順苟陵侮其夫恣為驕縱惡莫大焉法不汝容譬如萬物依日光以生汝曹亦依朕之光以安其生可也復語皇妹曰汝其以婦道訓諸女有犯朕必罪之越數日又諭歸附蒙古諸貝勒曰有娶我諸女者苟見陵侮必以告太祖初起諸女但號格格公主郡主亦史臣緣飾云爾厥後始定中宮出者為固倫公主自妃嬪出者及諸王女育宮中者為和碩公主然開國初有皇女僅得縣君鄉君者康熙以後有妃嬪若諸王女封固倫公主者則恩澤有隆殺也終清之世為主壻者前有何和禮後有策稜賢而有功斯為最著他若拉多爾濟宮門殄逆承祖澤索特納木多爾澤親臣受遺勳集於其子與國同休戚稱肺腑之誼餘則奉朝請參宿衛皆克由禮而諸主亦皆循循孝謹太祖之教遠矣後漢書以公主附后妃後南齊檀超議為帝女立傳王儉駁之乃寢新唐書始用其例明史仍之而遼元二史則改次為表詳略得中今效為之主壻無傳者附見其事迹焉
