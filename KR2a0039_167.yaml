body:
  text: 清史稿卷一百六十七表七外戚表班書始立外戚恩澤侯表遼明二史因之遼外戚不皆有封爵然世選北府宰相預政事明則揚徐二王僅假虛號自後皆封侯伯嘉靖間詔不得與汗馬餘勳並列惟分封大邑帶礪相承未嘗區以別也清初太祖娶於葉赫草昧干戈制度未備太宗世祖娶於蒙古追進崇封外戚恩澤自此始雍正八年世宗詔定外戚為承恩公乾隆四十三年高宗又詔后族承恩與佐命功臣櫛風沐雨拓土開疆者實難並論俱改為三等公名既專屬等復攸殊裁抑制防視明尤肅用是終清世外家皆謹守法度無預政事者不可謂非詒謀之善也明史用班氏例兼及宦官恩幸之得封者尤清所未有茲次第諸后族為外戚表凡以外戚封及其家初有爵以外戚進者皆入焉后族別以功封仍列功臣世爵表孝和和世崇恩維慶信恪官針睿皇泰和世泰崇恩長維慶長信恪子后父恭阿拉子道光孫同治子光緒恭阿子嘉慶三十年元年十十四年拉十八年改襲一二月癸十二月姓鈕祜三月癸等承恩巳襲官甲午襲祿氏隸巳襲侯寧夏將滿洲鑲軍卒諡黃旗嘉恪勤慶四年四月丙午晉封三等承恩公官禮部尚書卒諡勤恪父恭保官筆帖式追封三等承恩公孝穆熙敏克興恩慶英俊成皇布彥達額克興額恩慶嗣后父賚子道熙敏嗣子同治子光緒布彥光元年子道光七年十二十七達賚九月乙九年十二月乙年十二姓鈕祜丑襲二月丙未襲月戊申祿氏隸子襲襲滿洲鑲黃旗官戶部尚書道光元年八月辛亥追封三等承恩公卒諡恭勤孝慎裕寬廣林克勤偉功成皇舒明阿裕寬子廣林子克勤子后父子道光道光十咸豐光緒十舒明二年十六年三一年十八年十阿月戊申月甲辰二月壬二月壬姓佟佳襲一等襲戌襲寅襲氏隸滿承恩侯洲鑲黃旗佟圖賴之後已襲一等公道光元年十月丁未晉封舒明阿子裕寬一等承恩侯舒明阿卒諡勤敏舒明阿祖都統納穆圖父散秩大臣嗣存並追諡已見佟圖賴封爵孝全胡圖文壽慶麟成皇哩胡圖哩文壽嗣后父頤齡子長子道子光緒頤齡道光二光三十十三年姓鈕祜十四年年七月十二月祿氏隸十二月甲辰改戊戌襲滿洲鑲庚戌襲襲三等黃旗官承恩公乾清門二等侍衛道光十四年十月庚戌追封一等承恩侯諡榮僖孝靜吉拉承廕成皇敏恩齡孫后父恩齡子恩齡早卒姓博爾濟吉特氏隸滿洲正黃旗道光三十年五月戊申晉封一等子咸豐間加封一等承恩侯官兵部左侍郎追封恩齡曾祖刑部員外郎昆山三等承恩公諡簡勤祖浙江烏鎮同知興德三等承恩公諡榮僖父刑部員外郎花良阿三等承恩公諡敦敏孝德德懋鍾秀璞玉顯皇富泰嗣德懋子鍾秀嗣后父子同治同治十子光緒富泰元年三一年十三十一姓薩克月乙酉二月丁年甲戌達氏隸襲卯襲襲滿洲鑲黃旗官太僕寺卿道光三十年十一月戊辰追封三等承恩公諡肅慎同治元年八月戊辰追封富泰祖刑部尚書明山三等承恩公諡端賣心父兵部員外郎祺昌三等承恩公諡端和孝貞廣科恩燾榮泉顯皇穆揚阿廣科子恩燾子后父子咸豐光緒六光緒三穆揚十一年年八月十年十阿十二月丁酉襲二月辛姓鈕祜辛未襲酉襲祿氏隸官杭州滿洲鑲將軍卒黃旗官諡勤賣心廣西右江道同治元年八月戊辰追封三等承恩公諡榮敬同日追封穆揚阿祖陝西延綏鎮總兵官策普坦三等承恩公諡端勤父西寧辦事大臣福克精阿三等承恩公諡端敏孝欽照祥德善顯皇惠徵長照祥子后父子咸豐光緒七惠徵十一年年六月姓葉赫十二月壬辰襲那拉氏辛巳襲隸滿洲官護軍鑲黃旗統領卒官安徽諡恭賣心徽寧太池廣道同治元年八月戊辰追封三等承恩公諡端恪同日追封惠徵祖戶部員外郎吉朗阿三等承恩公諡端勤父刑部員外郎景瑞三等承恩公諡莊勤孝哲葆初法亮毅皇崇綺子葆初嗣后父官散秩孫光緒崇綺大臣光二十七姓阿魯緒十六年十二忒氏原年十二月甲辰隸蒙古月壬子襲正藍旗襲改隸滿洲鑲黃旗同治四年一甲第一名進士官吏部尚書卒諡文節後追削同治十一年六月丙辰晉封三等承恩公孝定德恆景皇桂祥子后父桂祥惠徵子官都統光緒十四年十月己亥晉封三等承恩公
