body:
  text: 清史稿卷一百六十八表八諸臣封爵世表一史記漢書皆表列侯明史世表亦及功臣清於封爵皆仿古制世及為禮視漢特優非罔替者甲令按等皆有襲次不容稍紊開國所封沐雨櫛風攀鱗附翼與漢元功實無差異其後蕩定邊徼開拓疆宇儋爵酬庸赫奕當代內地征討役稍巨者胙茅傳胤亦等邊功惟福康安非有殊勳竟贈真王襲降之制一視天潢亦云濫矣子男以次得世職者往往併襲今並為表最初封者恆越十代除爵既鮮延世莫廢非漢列侯所敢望也外戚封者附書於後作諸臣封爵世表定孔南有王德正紅旗漢軍崇德元年四月以來歸封恭順王順治六年五月以軍功改封定南王鎮廣西九年七月殉節桂林諡武壯無嗣靖耿耿耿南仲繼精王明茂忠正藍耿仲耿繼旗漢明子茂子軍崇順治康熙德元八年十年年四四月五月月以襲鎮襲鎮來歸廣西福建封懷移鎮十三順王福建年三順治康熙月叛六年十年二十五月五月一年以軍薨諡正月功改忠敏伏誅封靖南王征廣東十一月自殺加贈開國輔運推誠宣力武臣平尚尚尚南可之之王喜孝信鑲藍尚可尚可旗漢喜次喜子軍崇子康康熙德元熙十十五年四三年年十月以三月二月來歸襲旋幽父封智辭命可喜順王仍父叛十順治可喜六年六年管藩六月五月務反正以軍詔襲功改親王封平十九南王年八與靖月伏南王誅無同征襲廣東留鎮康熙十四年正月晉封平南親王十五年二月為子之信所幽十月薨諡曰敬平吳西三王桂遼東人隸漢軍旗順治元年五月以迎降封平西王鎮雲南康熙元年五月晉平西親王十二年十二月叛革爵義孫孫孫孫王可徵徵徵望淇淳灝正白孫可孫徵襲義旗漢望子淇弟王孫軍順順治順治徵淳治十十七十八弟康四年年十年十熙十十二一月月襲一年月以襲尋康熙八月來歸卒十一降襲封義年薨慕義王十諡順公二七年愍十年十一正月月薨撤銷諡恪五十順康四年熙十六月一年卒諡追降清端慕義子孫公弘相降襲入世職表忠福德慶文海海鋭康麟敏謙淩年嘉安福康德麟慶敏文謙光緒勇鑲黃安子子嘉子咸子光七年貝旗滿嘉慶慶二豐五緒四襲子洲自元年十三年四年襲三等襲貝年降月襲嘉勇勒子襲貝不入男纍降襲子子八分封至貝子降襲鎮國一等鎮國公光忠鋭公緒四嘉勇年卒公乾諡誠隆六靖十年九月以勦湖南等處苗匪屢著勞勛特恩照宗室之例晉封貝子爵銜嘉慶元年五月卒贈郡王諡文襄配享太廟子襲貝勒表格尚無資料海鄭澄克公塽正紅旗漢軍鄭成功孫初順治十年五月封成功為海澄公不受十一月復封仍不受康熙二十二年克塽歸順仍封海澄公四十六年病故無襲承白白恩文繪公選文選正白子降旗漢襲三軍康等精熙元奇尼年十哈番一月無襲以歸順封承恩公十四年卒公陳福陝西定邊堡人二等阿思哈尼哈番加三等精奇尼哈番康熙十四年以陝西提督被戕贈三等公諡忠愍
