body:
  text: 清史稿卷一百六十九表九諸臣封爵世表二三明聯恩恩奎存等亮慶昌崇璧興襄鑲黃明亮聯慶恩昌恩崇光緒勇旗滿孫道子道弟道姪同二十侯洲乾光二光九光十治四七年隆四年襲年襲五年年襲襲十一襲年正月以功封一等襄勇伯四十八年七月革嘉慶元年十二月復以苗境肅清封原爵三年正月再革七年十二月封一等男十年五月晉封一等子十四年正月再晉三等伯二十四年十一月晉封三等襄勇侯道光二年七月卒諡文襄三和和和圖穆希秀等隆雙英麟輅蘭綸果武額額和英圖麟穆輅希蘭勇正黃和隆和雙額子子咸子同孫光侯旗滿武弟額弟道光豐三治八緒三洲乾乾隆元年年襲年襲十二隆二四十襲年襲十二七年年六十二月追月襲贈其父和起為一等伯並給一等子令其承襲四十一年正月以平定金川功晉封三等果勇侯世襲罔替四十七年八月卒諡壯毅三勒英文廷廷琦等保惠厚鈞楨瑤威鑲黃勒保英惠文厚廷鈞廷楨勤旗滿子嘉子道子同弟光嗣子侯洲嘉慶二光十治四緒四光緒慶二十四二年年襲年襲十八年九年襲襲年襲月以封三功封等侯一等威勤侯三年八月晉封威勤公四年七月革六年八月封三等男七年十二月晉封一等威勤伯二十四年八月卒晉贈一等威勤侯諡文襄恭吳順惟侯華明侯順治二年迎順功封九年坐罪削爵同鄭安芝侯龍正紅旗漢軍順治五年八月以歸順授一等精奇尼哈番十年五月晉封同安侯後戍遼東十八年十月殺慕談義洪侯順治十六年以來降封康熙十三年叛革建林義興侯珠鑲黃旗漢軍無襲
