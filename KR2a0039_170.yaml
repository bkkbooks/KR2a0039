body:
  text: 清史稿卷一百七十表十諸臣封爵世表三表格尚無資料三鄂鄂鄂鄂保福趙等爾容津岳倫謙王玉襄泰安鄂容鄂津鄂岳保倫福謙勤鑲藍鄂爾安子之兄子嘉子道子同伯旗滿泰子乾隆乾隆慶十光六治八洲雍乾隆二十三十四年年襲年襲正五十年一年四年十二年十十二四月十二月壬二月月襲襲月襲寅襲以軍十四功授年八為一月改等輕襲襄車都勤伯尉七二十年正年八月萬月殉壽恩節伊詔晉犂諡三等剛烈男十年二月以平苗積功晉一等伯十三年七月諸苗叛降三等男八月加賜一等輕車都尉併作一等子乾隆二年十二月復給一騎都尉併為三等伯十年四月卒諡文端配享太廟十四年八月贈號三等襄勤伯三張等廷勤玉宣江南伯桐城人雍正八年十月以勞賜世職十三年八月併其世職封三等子乾隆二年十二月晉封三等伯十四年八月賜號三等勤宣伯十四年十二月革後卒諡文和配享太廟三黃黃黃瑞松黃廣等廷嘉文保山永俊忠桂黃廷燝黃文瑞保安黃永勤鑲紅桂長黃嘉燝子子道松山安子伯旗漢孫乾子乾嘉慶光五子光宣統軍乾隆二隆三九年年襲緒元元年隆二十四十三襲年襲襲十三年六年十年十月襲二月二月襲以軍功由騎都尉晉封三等忠勤伯二十四年正月卒諡文襄三鄂徹徹伊敦等爾靈靈昌珠敬奇達達阿布勤達史史徹靈拉伯遜鄂爾鄂爾達史史正黃奇達奇達子乾伊昌旗滿遜子遜子隆五阿叔洲原乾隆乾隆十三父乾額魯四十四十年襲隆五特台六年六年十五吉乾十二十二年襲隆二月襲月襲五十十七五十五十七年年五一年一年故無月移入嗣停功封本旗襲三等蒙古敬勤伯三溫永等福保伯鑲紅溫福旗滿子乾洲乾隆三隆三十八十八年襲年六旋停月以征金川陣亡追封一等伯七月革三李李等長廷壯庚鈺烈嘉慶長庚伯十三嗣子年自福建水師提督以勦海寇蔡牽陣亡追封諡忠毅三許許許許許等世文琳保承伯亨謨文謨瑞鼇四川世亨子道文謨世亨人官子乾光年次子曾孫廣西隆五襲道光同治提督十四二十十二乾隆年襲六年年八五十襲月襲三年以平安南功封一等子五十四年以陣亡富良江贈三等伯慕鄭鄭恩纘修伯緒典正白鄭纘旗漢緒子軍康康熙熙二六年年八六月月以襲後投誠無襲封二等伯十二月改慕恩伯承周周周恩全公鳴伯斌仁岐正黃周全周全旗漢斌子斌孫軍康康熙康熙熙三十一五十年四年七九年月以月襲因伯投誠爵襲封三次已等伯完特十二旨賜月改襲三承恩等阿伯食達哈三等哈番伯俸今漢准襲文改一次為三卒諡等輕恪順車都尉伯馬承廕康熙十八年以來降封後反誅忠馮誠希伯范正白旗漢軍康熙二十一年以自臺灣歸順封無襲
