body:
  text: 清史稿卷一百七十一表十一諸臣封爵世表四表格尚無資料三朱博柯富等瑪通三寧子喇鄂博通柯三鑲白朱瑪鄂子子康旗滿喇子康熙熙六洲順康熙十五十年治二元年年五十二年以三月月襲月降軍功併本襲一授牛身之等阿彔章拜他思哈京九喇布尼哈年正勒哈番今月恩番襲漢文詔加為一改為為三等精一等等阿奇尼男乾達哈哈番隆十哈番今漢七年又以文改改輕軍功為一車都加為等子尉二等又加至三等阿思哈尼哈番十三年閏五月又以軍功加至三等精奇尼哈番今漢文改為三等子卒諡襄敏三李等本子深甘肅西寧人順治二年以明提督率高傑所部兵降封三等子康熙十二年叛革三吳等應子熊平西親王吳三桂子順治九年以額駙封三等子康熙十三年以三桂反誅三綽納等爾馬子濟札正白爾旗蒙綽爾古順濟子治五康熙年以二十來歸年十授拜一月他喇襲後布勒降襲哈番恩詔加至二等阿達哈哈番康熙六年正月襲叔父鄂齊禮之一等阿達哈哈番又一拖沙喇哈番併為三等精奇尼哈番今漢文改為三等子三曹曹曹等恭熙秉子誠麟桓正白曹恭曹熙旗漢誠子麟子軍崇順治康熙德元十四五年年六年五七月月以月襲襲子投誠降襲授二等阿思哈尼哈番順治九年恩詔加至三等精奇尼哈番今漢文改為三等子三丹夸等代哈子一等丹代男噶子順爾哈治十圖弟五年原係襲康拜他熙元喇布年降勒哈襲番順治十二年三月襲兄職併為三等精奇尼哈番今漢文改為三等子三呂呂等應雲子學翔二等呂應男呂學國寶康熙子崇十一德七年襲年正月襲順治十四年八月軍功加至三等精奇尼哈番今漢文改為三等子三班等惕子思希布一等男色稜子崇德八年五月襲順治年恩詔准世襲罔替十四年九月軍功加為三等精奇尼哈番今漢文改為三等子三敬等桑子正黃旗滿洲噶爾瑪索諾木額駙子康熙三年因係固倫端順長公主所生授三等精奇尼哈番今漢文改為三等子三王等輔子臣山西大同人康熙九年官陝西提督十三年以首吳三桂逆書封三等子十四年以叛革十五年降復爵二十年卒停襲三陳陳陳陳陳等世世益大述子怡琳陳世用祖陳福陳福琳子陳益道光從子子康雍正子乾年襲康熙熙二八年隆二十五十一襲十八年襲年襲年襲三等子三明等寶子一等男又一雲騎尉法色子康熙三十年五月襲雍正二年十二月軍功加為三等精奇尼哈番今漢文改為三等子三布等納子海一等男路什子康熙二十七年七月襲三十六年七月軍功加為三等精奇尼哈番今漢文改為三等子三額哈哈伊德額揚等森金豐爾山勒桑子特泰阿綳伊爾精阿正白額森哈金阿綳阿額額勒旗滿特子泰子額森子嘉德山精額洲乾乾隆乾隆特嗣慶元從子子道隆四四十五十繼子年襲嘉慶光七十一八年四年乾隆七年年襲年正十二襲五十襲月以月襲七年軍功襲封一等男四十六年六月以軍功晉封三等子三三佛瑞純吉宜阿等泰住齡綬和麟霖子正白三泰佛住瑞齡純綬吉和宜麟旗漢子乾子嘉子道子子弟光軍姓隆二慶二光十緒二石原十四年襲二年十五西路年四襲年銷參贊月襲去佛大臣在四住所奉命川陳得仍前赴亡優襲三軍營給騎等子遇賊都尉加一被害加一恩騎乾隆雲騎尉二十尉併四年原襲四月三等加恩子為追封一等三等子加子世一雲襲罔騎尉替諡果勇三那容容鄂鄂等彥安照素禮子成那彥容安容照鄂素正白成子弟道孫咸伯祖旗滿嘉慶光十豐二之孫洲嘉二十年十年襲同治慶十一年月襲二年八年襲道襲十二光十月以年十擊滅月革天理教匪功封三等子二十一年六月革旋卒諡文毅三王王王等文開鳳子雄雲翥貴州文雄文雄玉屏子嘉孫道人官慶五光二陝西年襲十年固原官山襲提督東鹽嘉慶運使五年陳亡西鄉縣法寶山豫三等子諡壯節
