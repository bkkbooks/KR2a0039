body:
  text: 清史稿卷一百七十二表十二諸臣封爵世表五上初一二三四五六七次次次次次次次封襲襲襲襲襲襲襲一孫馬吳德達等塔錫爾彝桑男鑲藍泰希吳爾阿旗滿孫塔馬錫希子德彝洲天子康泰子康熙子乾聰八熙五康熙六十隆五年以年正三十年八年十辦事月襲年五月降二月有能二十月襲襲一襲坐授牛五年一等等阿事革彔章六月子思哈子扎京順積軍尼哈勒杭治二功加番今阿降年軍至一漢文襲功加等精改為至三奇尼一等等甲哈番男喇章今漢京五文改年考為一績加等子為二等順治九年正月恩詔加至三等阿思哈尼哈番十五年三月以監造勤慎加為二等康熙三年十一月以軍功加至一等阿思哈尼哈番今漢文改為一等男四年十二月卒諡襄忠表格尚無資料一黑尼等東馬男格禪正黃黑東旗滿格弟洲太緣事祖時革率五十五人來歸以功授一等副將今漢文改為一等男一碩達法等詹色色男正紅碩詹達色旗滿孫康伯父洲初熙三之子以勤年分康熙慎授襲二二十備禦等阿二年積軍達哈十月功加哈番以本至一陳亡身之等甲今漢二等喇章文改阿達京順為二哈哈治九等輕番襲年正車都達色月恩尉職併詔加為一至一等阿等阿思哈思哈尼哈尼哈番因番緣達色事降陳亡十年又加正月一拖事白沙喇復授哈番一等今漢阿思文改哈尼為一哈番等男今漢又一文改雲騎為一尉等男一席塞生蘇楚等特爾格丹庫男庫古特生格蘇丹鑲藍德塞爾特子子康旗滿席特古德康熙熙三洲天庫子子康二十十八聰八康熙熙十八年年閏年以五年四年二月七月辦事六月閏五襲襲子有能襲月襲降襲授牛彔章京順治四年積軍功加至一等甲喇章京九年正月恩詔加至一等阿思哈尼哈番今漢文改為一等男一慕艾等克音男談塔鑲藍睦旗滿慕克洲國談子初以天聰軍功八年授三五月等梅襲順勒章治九京陳年正亡加月恩贈為詔加一等至二今漢等精文改奇尼為一哈番等男軍功追諡至一忠勇等今漢文一等子一恩克鄂關伍廣慶等格什爾保十福亮男圖圖濟鄂爾關保伍十廣福正紅恩格圖濟圖子康承繼子乾旗蒙圖兄恩格子康熙四子乾隆五古原之子圖子熙三十六隆八十一係備順治順治十一年二年十年十禦天七年十八年正月降二月二月聰八三月年五月襲襲二襲襲年以襲九月仍等阿軍功年正襲一思哈加至月恩等阿尼哈三等詔加思哈番今甲喇至三尼哈漢文章京等精番今改為課績奇尼漢文二等加為哈番改為男二等十八一等積軍年將男功加原襲至二之一等阿等阿思哈思哈尼哈尼哈番順番襲治七於恩年十格圖二月子鄂恩詔爾濟加為圖止一等留本今漢身所文改得之為一拜他等男喇布勒哈番今漢文改為騎都尉一綽齊常巴等拜墨保圖男鑲白格齊墨常保旗蒙圖格圖子康古天綽拜子康熙二聰八子順熙三十二年以治十年十年十辦事年正二月二月有能月襲襲襲乾授牛隆十彔章五年京順銷去治二恩詔年積所得軍功加一加至等輕一等車都甲喇尉兼章京一雲九年騎尉正月與伊恩詔子貢加至楚達一等襲阿思哈尼哈番今漢文改為一等男一張張張等仲應松男第慧齡正黃張仲張應旗漢第子慧子軍天康熙康熙聰八十六二十年襲年四二年父張月襲九月世爵襲子之三張英等甲降襲喇章一等京軍輕車功加都尉至一等恩詔加一拖沙喇哈番順治八年正月軍功加至三等阿思哈尼哈番九年正月恩詔加至一等今漢文改為一等男康熙十五年卒一朱伊滿滿等瑪瑪色丕男喇喇伊瑪滿色正白朱瑪喇子子乾旗滿喇弟康熙隆六洲天順治三十年銷聰八十年七年恩詔年以三月襲軍所加辦事襲功加襲三有能一拖等男授牛沙喇二十彔章哈番一年京章今漢銷滿功加文改色軍至二為一功所等甲等男加從喇章又一子清京課雲騎德降績加尉襲為一等恩詔加至一等阿恩哈尼哈番今漢文改為一等男一集巴阿多崇富索等雅特穆爾林勒諾男漢瑪護濟多爾渾木瞻集雅朗阿穆濟子崇林扎正黃漢瞻巴特護朗康熙子乾史旗蒙子順瑪子子康四十隆十富勒古崇治元順治熙二七年二年渾子德元年六九年十年六月襲乾隆年五月襲五月十月襲四十月以襲襲六年來歸襲授一等梅勒章京今漢文改為一等男一鄧鄧鄧等長志其男春琳璋鑲黃鄧長鄧志旗漢春子琳子軍崇順治康熙德元十年二十年五八月七年月同襲六月祖大襲後壽投降襲誠授三等梅勒章京軍功加為二等緣事降為一等甲喇章京順治九年正月恩詔加至一等阿思哈尼哈番今漢文改為一等男一色等稜男鑲紅旗蒙古崇德元年五月自察哈爾率戶口來歸授一等梅勒章京今漢文改為一等男一阿尹等祿濟男哈納鑲黃阿祿旗滿哈孫洲原康熙係科二十爾沁年七扎魯月襲特貝後降子崇襲德五年以來歸授三等甲喇章京順治二年以定鼎燕京加為二等九年正月恩詔加至一等阿思哈尼哈番今漢文改為一等男卒諡勤僖一覺覺覺覺覺等羅羅羅羅羅男瓦蘇郎馬佛爾爾湯克寧馬馬覺羅蘇鑲藍覺羅蘇爾覺羅覺羅旗滿瓦爾馬子郎湯郎湯洲順馬子康熙叔祖弟康治元順治二十康熙熙三年襲十七二年二十十一父覺年七六月二年年二羅葉月襲襲坐九月月襲穆濟康熙事革襲三乾隆之半二十十年元年個前二年十二十二程四四月月罷月卒年特坐事爵子降恩加革襲為牛彔章京七年恩詔加一拖沙喇哈番尋併叔父之子覺羅馬克圖之二等阿達哈哈番襲為三等阿思哈尼哈番九年正月恩詔加至一等今漢文改為一等男一阿特等哈穆男泰爾正白阿哈旗蒙泰子古順康熙治二十八年以年六來歸月襲授牛後降彔章襲京恩詔加至二等阿達哈哈番康熙四年併伯父之子星南之二等阿達哈哈番襲為一等阿思哈尼哈番今漢文改為一等男一希商杜等爾世太男根泰商世正黃希爾泰子旗滿根孫康熙洲順康熙二十治三十八七年年四年十十一月積月襲月襲軍功子降授三襲等梅勒章京緣事降三等阿達哈哈番恩詔加為二等事白加為一等九年正月恩詔加至二等阿恩哈尼哈番緣事降為三等軍功仍加為二等事白加為一等今漢文改為一等男一白等爾男黑圖正白旗滿洲順治三年積軍功授牛彔章京恩詔加至一等阿達哈哈番康熙三年二月以軍功加至一等阿思哈尼哈番今漢文改為一等男卒諡忠勇一阿噶等哈爾男尼哈堪圖鑲黃阿哈旗滿尼堪洲順子原治四係三年積等阿軍功達哈授一哈番等甲順治喇章九年京九四月年正襲月恩詔加至一等阿思哈尼哈番今漢文改為一等男卒一吳胡朱朱等喇喇麻承男禪禪喇格鑲紅吳喇胡喇朱麻旗滿禪子禪叔喇子洲順康熙父康康熙治四六年熙二四十年襲十二十二三年父洪月襲年十銷恩尼牙一月詔所喀之襲得襲二等三等甲喇男乾章京隆七恩詔年又加為銷吳一等喇禪軍功所得加一兩雲拖沙騎尉喇哈降一番九等輕年正車都月恩尉詔加至二等阿恩哈尼哈番十四年九月軍功加至一等今漢文改為一等男表格尚無資料一札春福順蘇蘇永等拉寧勒慶勒勒祥男豐扎拉洪福勒芳當蘇勒阿豐阿阿洪阿阿阿當阿正黃子乾春寧弟之順慶蘇勒繼子旗滿隆三子乾子道子道芳阿光緒洲世十六隆四光九光二弟同十八襲二年六十八年襲十八治元年襲等輕月襲年九年襲年襲車都坐事月襲尉乾革隆二十七年閏五月以軍功加一雲騎尉三十三年在雲南陳亡特旨贈一等男世襲罔替諡昭節一奎崇博景麟等林倫敬成鈺男鑲黃奎林崇倫博敬光緒旗滿子乾姪道子咸二十洲本隆四光四豐十八年襲一十一年襲一年襲等承年襲襲恩公乾隆四十一年以軍功別封一男爵即以其子襲一書吉常久德續等麟郎善壽禧昌男鑲黃阿吉郎咸豐久壽宣統旗滿書麟阿子十年繼子元年洲本子嘉道光襲光緒襲漢軍慶六四年二十姓高年襲襲一年嘉慶襲六年四月卒於軍追封一等男世襲諡文勤一葉等名男琛湖北漢陽進士道光二十九年官廣東巡撫以粵民阻英人入城封咸豐八年以失守廣東省城為英人執去革一蕭蕭等孚有男泗名湖南孚泗湘鄉子光人同緒十治三年襲年由記名提督論克金陵功封一等男光緒十年卒諡壯肅一張張等國蔭男梁清廣東國梁高要子同人官治年福建襲漳州鎮總兵咸豐六年以克復鎮江豫騎都尉八年以收復揚州溧水晉三等輕車都尉十年陳亡丹陽贈騎都尉同治三年又追豫三等輕車都尉併為一等男一程程等學集男啓勳安徽學啓桐城嗣子人官同治江西年襲南贛鎮總兵同治二年以復蘇州省城功豫雲騎尉同治三年以攻嘉興中炮卒贈三等輕車都尉併為一等男爵一多雙壽等隆全長男阿多隆多隆正白阿子阿孫旗蒙同治古世年襲襲騎都尉官福州副都統咸豐十一年以復安徽桐城舒城功豫雲騎尉纍擢荊州將軍同治元年以克復廬州府豫騎都尉尋授欽差大臣督辦陝西軍務同治三年攻盩屋中槍卒于軍贈太子太保豫一等輕車都尉諡忠勇尋併為一等男一劉劉等銘朝男傳印安徽銘傳合肥長孫文童光緒官直二十隸提年襲督同治六年以平東捻等功豫三等輕車都尉七年以平西捻張總愚功封一等男光緒十一年官福建臺灣巡撫十五年加少保二十一年卒贈太子太保諡壯肅一劉劉劉等錦道家男棠謙璠湖南錦棠光緒湘鄉子光三十監生緒二二年官甘十三襲肅西年襲寧道光緒二年以克復烏魯木齊功豫騎都尉四年以新疆平功晉二等男纍擢甘肅新疆巡撫十五年加太子少保十六年晉太子太保二十年正月晉一等男是年七月卒諡襄勤一劉劉等坤能男一紀湖南劉坤寧鄉一嗣監生子光官兩緒三江總十二督光年襲緒二十八年卒追論庚子匡扶大局功封一等男諡忠誠一榮良等祿揆男正白榮祿旗滿繼子洲官光緒大學二十士光九年緒二襲十九年三月卒追封一等男世襲諡文忠二巴舒等山書男鑲黃巴山旗滿子康洲天熙十聰八二年年以七月勤慎襲二授牛十五彔章年七京順月軍治二功加年積為一軍功等阿加至思哈三等尼哈甲喇番今章京漢文九年改為正月一等加至男子三等降襲阿思哈尼哈番十一年二月以軍功加為二等今漢文改為二等男二喀等愷男正黃旗滿洲天聰八年以軍功授牛彔章京尋加至一等甲喇章京恩詔加至二等阿思哈尼哈番康熙五年卒以其子常岱阿庫禮舒淑三人分襲今漢文改為二等男二努陶江等山代瀰男正黃努山陶代旗滿子初弟之洲天以軍子康聰八功授熙二年以牛彔十二辦事章京年八勤慎順治月襲授三十六二等等甲年二阿思喇章月襲哈尼京軍父職哈番功加併為今漢至二一等文改等順阿思為二治九哈尼等男年正哈番後降月恩又一襲詔加拖沙至二喇哈等阿番緣思哈事革尼哈去本番今身所漢文得將改為父職二等以其男弟之子襲二薩郭阿豐等弼立哈鐘男圖薩弼納阿哈正白圖子郭立納弟旗滿康熙子康康熙洲天元年熙二二十聰八襲十年年十年以十二月襲辦事月襲子降有能襲授牛彔章京軍功加至一等甲喇章京順治年恩詔加至二等阿思哈尼哈番今漢文改為二等男二談等拜男正白旗滿洲天聰八年以辦事有能授牛彔章京軍功加至三等甲喇章京順治元年定鼎燕京加為二等課績加為一等五年六月軍功加至三等阿思哈尼哈番七年三月恩詔加為二等今漢文改為二等男二霸喇劉永等蘭布祥壽男正藍介喇布劉祥旗滿霸蘭介子