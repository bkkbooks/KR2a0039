body:
  text: 清史稿卷一百七十四表十四大學士年表一清大學士沿明舊名例稱政府實則國初有議政處以掣其柄雍正以後承旨寄信有軍機處內閣宰輔名存而已新唐元史表宰相者備列三公大學士滿漢兩途勳高位極乃以相授內閣實權遠不逮明然其品列皆首文班任軍機者自親王外其領袖者必大學士唐元三公尚不及也年分大學士協辦崇德元年剛林五月授內國史院大學士丙子范文程五月授內祕書院大學士希福五月授內弘文院大學士鮑承先五月授內祕書院大學士崇德二年剛林丁丑范文程希福鮑承先崇德三年剛林戊寅范文程希福鮑承先七月改吏部右參政崇德四年剛林己卯范文程希福崇德五年剛林庚辰范文程希福崇德六年剛林辛巳范文程希福崇德七年剛林壬午范文程希福崇德八年剛林癸未范文程希福順治元年范文程元年八月辛酉革甲申希福剛林寧完我馮銓五月辛丑以書徵洪承疇六月丁巳仍以太子太保兼副都御史同內院官佐理機務為內祕書院大學士謝升八月壬午召入內院順治二年范文程乙酉剛林寧完我馮銓洪承疇閏六月招撫南方總督軍務謝升正月癸卯卒祁充格二月己巳為內弘文院大學士李建泰故明文淵閣大學士三月庚子陛見慰諭之十二月丙午革順治三年范文程丙戌剛林寧完我馮銓洪承疇祁充格宋權正月戊辰為內翰林國史院大學士順治四年范文程丁亥剛林寧完我馮銓洪承疇十月命回內院祁充格宋權順治五年范文程戊子剛林寧完我馮銓洪承疇祁充格宋權順治六年范文程己丑剛林寧完我馮銓洪承疇加少傅兼太子太傅祁充格宋權順治七年范文程庚寅剛林寧完我馮銓洪承疇祁充格宋權順治八年范文程閏二月乙亥革留辛卯剛林閏二月乙亥坐與睿王謀逆棄市寧完我三月己丑轉內國史院大學士馮銓閏二月乙丑致仕洪承疇閏二月戊辰管左都御史事祁充格閏二月乙亥坐與睿王謀逆棄市宋權希福三月己丑為內弘文院大學士陳泰三月己丑為內國史院大學士七月戊子革雅泰七月戊子為內國史院大學士十月卒陳名夏七月己亥為內翰林弘文院大學士額色黑十月丁巳為內翰林國史院大學士順治九年范文程壬辰寧完我洪承疇五月母憂仍入直宋權致仕六月壬子卒希福十一月卒陳名夏額色黑陳之遴二月辛酉為內翰林弘文院大學士順治十年范文程癸巳寧完我洪承疇正月丁丑調內翰林弘文院大學士五月乙酉升太保兼太子太師內國史院經略湖廣廣東廣西雲南貴州陳名夏正月丁丑調內翰林祕書院大學士二月丁未署吏部尚書額色黑陳之遴二月丁未仍以太子太保調戶部尚書高爾儼仍以太子太保為內翰林弘文院大學士三月戊子疾假六月丁酉病休馮銓三月癸巳仍以弘文院大學士原官圖海四月丁未為內翰林弘文院大學士成克鞏閏六月丙寅為內翰林祕書院大學士張端閏六月丙寅為內翰林國史院大學士劉正宗閏六月丙寅為內翰林弘文院大學士十一月丙辰加太子太保管吏部尚書呂宮十二月為內翰林弘文院大學士順治十一年范文程八月壬午加少保兼太子太保甲午九月己丑太傅兼太子太師病解寧完我八月壬午加太子太保洪承疇陳名夏三月辛丑棄市額色黑八月壬午加太子太保馮銓五月乙巳降三級圖海成克鞏五月乙巳降二級張端豫告六月卒劉正宗呂宮五月乙巳降二級金之俊二月丙寅為內翰林國史院大學士蔣赫德三月庚寅為內翰林國史院大學士王永吉四月丁亥為內翰林祕書院大學士八月甲戌革調党崇雅五月丙午為內翰林國史院大學士傅以漸八月庚辰為內翰林祕書院大學士順治十二年寧完我二月辛酉加少保兼太子太保乙未洪承疇額色黑馮銓四月乙卯加少師兼太子太師圖海二月辛酉加太子太保成克鞏二月辛酉加太子太保劉正宗四月乙卯加少保兼太子太保金之俊四月乙卯加少傅兼太子太傅蔣赫德二月辛酉加太子太保党崇雅二月丁巳加太保兼太子太傅病免傅以漸二月辛酉加太子太保呂宮二月辛酉加太子太保二月壬戌以太子太保病解巴哈納二月辛酉加太保兼太子太保五月庚子為內翰林弘文院大學士車克二月辛酉加少保兼太子太保陳之遴二月庚辰為內翰林弘文院大學士四月乙卯加少保兼太子太保王永吉二月庚辰為內翰林國史院大學士順治十三年寧完我丙申洪承疇額色黑馮銓二月己卯加太保兼太子太師致仕圖海成克鞏劉正宗金之俊蔣赫德傅以漸車克六月辛巳兼管戶部尚書事陳之遴三月乙未革以原官發往盛京十月癸卯著回京入旗王永吉巴哈納順治十四年寧完我丁酉洪承疇額色黑圖海成克鞏劉正宗金之俊蔣赫德傅以漸車克王永吉巴哈納順治十五年寧完我九月己未以原銜少傅兼太子戊戌九月辛丑內三院改中太傅大學士致仕和保和文華武英東洪承疇九月甲寅改為武英殿大學士閣文淵大學士兼管兵部尚書額色黑九月甲寅改為保和殿大學士兼管戶部尚書圖海成克鞏九月甲寅改為保和殿大學士兼管戶部尚書劉正宗九月甲寅改為文華殿大學士兼管禮部尚書金之俊九月甲寅改為中和殿大學士兼管吏部尚書蔣赫德九月甲寅改為文華殿大學士兼管禮部尚書傅以漸九月甲寅改為武英殿大學士兼管兵部車克王永吉四月辛卯降五級調用巴哈納九月甲寅改為中和殿大學士兼管吏部尚書胡世安五月癸亥為內院大學士九月甲寅改為武英殿大學士兼管兵部尚書衛周祚五月癸亥為內院大學士九月甲寅改為文淵閣大學士兼管刑部尚書李霨五月癸亥為內院大學士九月甲寅改為東閣大學士兼管工部尚書順治十六年