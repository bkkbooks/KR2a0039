body:
  text: 清史稿卷一百七十六表十六軍機大臣年表一軍機處名不師古而絲綸出納職居密勿初祗秉廟謨商戎略而已厥後軍國大計罔不總攬自雍乾後百八十年威命所寄不於內閣而於軍機處蓋隱然執政之府矣今詳著其人庶後之考心腹股肱之佐而究其時政化隆樜消長之迹者以覽觀焉作軍機大臣表雍正七年己酉六月始設軍機房怡親王允祥六月癸未命密辦軍需一應事宜十月賜加儀仗一倍張廷玉六月癸未以太子太保保和殿大學士命密辦軍需一應事宜十月晉少保蔣廷錫六月癸未以文華殿大學士命密辦軍需事宜十月加太子太傅八年庚戌怡親王允祥三月病五月辛未薨張廷玉十月以贊襄機務周詳妥協賜一等阿達哈哈番世職蔣廷錫十月以贊襄機務周詳妥協賜一等阿達哈哈番世職馬爾賽五月丁卯以世襲一等公武英殿大學士命與張廷玉蔣廷錫詳議軍行事宜十月以贊襄機務周詳妥協賜一等阿達哈哈番世職九年辛亥馬爾賽三月晉襲一等忠達公七月甲戌授撫遠大將軍八月啓行出張廷玉蔣廷錫十年壬子三月改軍機房稱辦理軍機處張廷玉蔣廷錫閏五月病七月卒鄂爾泰二月以少保三等男保和殿大學士辦理軍機事務旋晉一等伯七月命往肅州經略西路軍務哈元生十月以召覲貴州提督在辦理軍機處行走旋命回籍省親十一月貴州苗叛命回任出十一年癸丑鄂爾泰正月轉命經略北路軍務六月還張廷玉十月給假還籍馬蘭泰二月己未以一等英誠侯領侍衛內大臣蒙古都統在辦理軍機處行走四月戊午仍命往軍前督兵操演出平郡王福彭四月以右宗正在辦理軍機處行走七月戊子授定邊大將軍出訥親十一月甲辰以三等果毅公御前大臣鑾儀使在辦理軍機處行走班第十一月以理藩院右侍郎在辦理軍機處行走十二年甲寅鄂爾泰張廷玉在假二月還訥親班第十三年乙卯十月罷辦理軍機處由總理事務處兼理鄂爾泰五月命兼值辦理苗疆事務處七月乙卯降三等男解職八月己丑起原官命總理事務十月晉一等子甲午裁辦理軍機處張廷玉五月命兼值辦理苗疆事務處八月命總理事務十月甲午裁辦理軍機處訥親八月授滿洲都統十月授領侍衛內大臣甲午裁辦理軍機處命協辦總理事務班第八月庚寅改在總理事務處差委辦事索柱以內閣學士辦理軍機事務八月庚寅命改在總理事務處差委辦事豐盛額以一等英誠公都統辦理軍機事務十月甲午裁辦理軍機處命回本任海望以內大臣戶部左侍郎辦理軍機事務九月遷戶部尚書十月甲午裁辦理軍機處命協辦總理事務莽鵠立以兼管理藩院侍郎滿洲都統辦理軍機事務十月甲午裁辦理軍機處命回本任納延泰以理藩院左侍郎辦理軍機事務十月甲午裁辦理軍機處命在總理事務處差委辦事徐本十月辛巳以協辦大學士刑部尚書在辦理軍機處行走甲午裁辦理軍機處命協辦總理事務乾隆元年丙辰總理事務處鄂爾泰張廷玉訥親班第二年丁巳十一月復辦理軍機處鄂爾泰十一月辛巳仍以少保一等子保和殿大學士為辦理軍機大臣十二月晉三等伯張廷玉十一月辛巳仍以少保三等子保和殿大學士為辦理軍機大臣十二月晉三等伯訥親十一月辛巳仍以一等果毅公兵部尚書為辦理軍機大臣海望十一月辛巳仍以戶部尚書為辦理軍機大臣納延泰十一月辛巳仍以刑部左侍郎為辦理軍機大臣班第十一月辛巳仍以理藩院左侍郎為辦理軍機大臣三年戊午鄂爾泰張廷玉訥親十二月轉吏部尚書海望納延泰四月遷理藩院尚書班第四月轉兵部右侍郎徐本是年仍以東閣大學士為辦理軍機大臣四年己未鄂爾泰五月晉太保張廷玉五月晉太保徐本五月加太子太保訥親五月加太子太保海望五月加太子少保納延泰班第七月丙寅授湖廣總督出五年庚申鄂爾泰張廷玉徐本訥親海望納延泰六年辛酉鄂爾泰張廷玉徐本訥親海望納延泰班第正月乙酉復以原任湖廣總督在軍機處行走三月授兵部尚書七年壬戌鄂爾泰張廷玉徐本訥親海望班第納延泰八年癸亥鄂爾泰張廷玉徐本訥親海望班第納延泰九年甲子鄂爾泰張廷玉徐本六月己酉致仕訥親正月差赴江浙魯豫勘事七月還海望班第納延泰十年乙丑鄂爾泰正月病三月晉太傅四月卒張廷玉訥親三月協辦大學士五月授保和殿大學士海望十二月乙卯以精力漸衰罷班第納延泰傅恆六月己酉以戶部右侍郎在軍機處行走汪由敦十月戊午以刑部尚書在軍機處行走高斌十二月乙卯以太子太保協辦大學士吏部尚書在軍機處行走蔣溥十二月乙卯以吏部右侍郎在軍機處行走十一年丙寅訥親張廷玉高斌二月差赴南河勘事十一月還班第三月差赴四川辦理軍務七月差赴鳳皇城勘界九月命署山西巡撫十二月召還汪由敦納延泰溥恆蔣傅十二年丁卯訥親四月差赴山西勘案六月還張廷玉高斌三月授文淵閣大學士四月差赴江南勘河九月差赴浙江鞫案班第汪由敦納延泰八月差赴蘇尼特給賑傅恆三月遷工部尚書蔣溥十三年戊辰訥親正月差赴浙江審案四月命往金川經略軍務九月庚辰革職張廷玉高斌三月命轉赴山東勘事閏七月丙辰授江南河道總督出班第正月己亥差赴金川辦理軍務出傅恆四月加太子太保協辦大學士九月命經略金川軍務十月授保和殿大學士十二月晉太保汪由敦納延泰蔣溥四月遷戶部尚書丁卯命專辦部務罷陳大受四月丁卯以太子少保兵部尚書在軍機處行走旋協辦大學士舒赫德九月己卯以戶部侍郎漢軍都統在軍機處行走十月遷兵部尚書十一月轉戶部尚書來保九月辛巳以太子太保武英殿大學士在軍機處行走尹繼善十一月己巳以太子少保協辦大學士戶部尚書在軍機處行走甲戌授陝甘總督出十四年己巳傅恆經略金川軍務正月封一等忠勇公三月還張廷玉八月晉三等勤宣伯十一月戊辰致仕來保二月晉太子太傅陳大受二月晉太子太保七月命署直隸總督十月還十一月病假汪由敦二月加太子少師十一月署協辦大學士十二月革署協辦大學士仍留刑部尚書納延泰二月加太子少保舒赫德正月授金川參贊大臣二月加太子太保十二月庚寅復轉兵部尚書以職務繁多命罷十五年庚午傅恆來保陳大受正月丁未授兩廣總督出汪由敦七月降兵部侍郎納延泰劉綸正月壬戌以工部右侍郎在軍機處行走兆惠四月庚辰以刑部侍郎在軍機處行走轉戶部侍郎十一月差赴西藏會辦善後事宜舒赫德十一月丙辰復以太子太保兵部尚書在軍機處行走十二月差往江南審案十六年辛未傅恆來保舒赫德納延泰汪由敦八月轉戶部右侍郎劉綸九月壬申以父憂免兆惠八月命署山東巡撫十七年壬申傅恆來保舒赫德正月差赴北路軍營納延泰汪由敦九月遷工部尚書兆惠班第九月辛巳復以都統銜在軍機處行走旋授漢軍都統劉統勳十一月甲子以刑部尚書在軍機處行走十八年癸酉傅恆來保舒赫德九月差勘南河十二月差往北路辦理軍務劉統勳七月差勘河工汪由敦納延泰班第正月命署兩廣總督兆惠二月差赴西藏會辦事件劉綸八月以服制將闋召來京補戶部右侍郎尋復入直十九年甲戌傅恆來保舒赫德在差七月甲辰以安置準部降人失策革職劉統勳正月差勘海口四月加太子太傅五月命馳往西安協辦總督事汪由敦四月晉太子太傅納延泰班第署兩廣總督四月內召七月甲辰授兵部尚書署定邊左副將軍出兆惠三月差往北路協辦軍務出劉綸覺羅雅爾哈善六月壬甲以署戶部左侍郎在軍機處行走十月補兵部右侍郎阿蘭泰八月戊申以召覲盛京將軍暫在軍機處行走壬子命赴軍營帶兵出二十年乙亥傅恆來保劉統勳協辦西安總督事九月丙申革職汪由敦九月轉刑部尚書納延泰劉綸十二月差赴浙江審案覺羅雅爾哈善十月命往北路參贊軍務二十一年丙子傅恆四月命往西路經理軍務旋止行來保汪由敦六月轉工部尚書納延泰八月癸卯差赴北路軍營出劉綸四月癸亥命回部辦事罷直覺羅雅爾哈善三月召還四月癸亥命回部辦事罷直阿里袞四月甲寅以戶部尚書暫在軍機處行走五月癸酉差往西路軍營領隊出裘曰修四月癸亥以吏部左侍郎在軍機處行走劉統勳六月癸丑起授原官仍入直九月差勘銅山漫工十月命署江南河道總督十一月內召夢麟八月癸卯以工部右侍郎在軍機處學習行走二十二年丁丑傅恆來保劉統勳四月差赴徐州督修石壩五月轉差雲南勘獄十一月差赴山西勘獄十二月加太子太保汪由敦正月轉吏部尚書裘曰修夢麟正月差赴江南山東勘事九月轉戶部右侍郎尋還直二十三年戊寅傅恆來保劉統勳正月轉吏部尚書五月內召汪由敦正月甲寅卒裘曰修十二月癸亥以事免夢麟四月仍轉工部右侍郎八月卒三泰正月己酉以吏部左侍郎在軍機處行走四月轉戶部左侍郎七月己巳授庫車參贊大臣出劉綸正月己酉復以戶部左侍郎在軍機處行走二十四年己卯傅恆來保劉統勳正月協辦大學士二月差赴西安勘獄六月差赴山西勘獄劉綸閏六月遷左都御史二十五年庚辰傅恆來保劉統勳八月差赴江南勘事十月轉赴江西勘事十二月內召劉綸富德二月乙巳以一等成勇靖遠侯領侍衛內大臣都統在軍機處行走三月授理藩院尚書兆惠二月仍以一等武毅謀勇公戶部尚書入直阿里袞七月甲寅仍以襲封一等果毅公兵部尚書入直于敏中八月己亥以戶部右侍郎在軍機處行走十一月轉左侍郎二十六年辛巳傅恆來保劉統勳五月授東閣大學士八月命督辦河南楊橋漫工十月內召兆惠七月協辦大學士阿里袞劉綸五月轉兵部尚書富德于敏中二十七年壬午傅恆來保劉統勳三月差勘高寶河入江水道四月轉勘德州運河兆惠阿里袞劉綸富德九月丁亥革職削爵于敏中二十八年癸未傅恆來保劉統勳兆惠十月加太子太保阿里袞六月命署陝西巡撫十月加太子太保劉綸五月轉戶部尚書六月協辦大學士十月加太子太保于敏中阿桂月正壬申以工部尚書在軍機處行走四月差赴歸化城西寧等處勘事十月加太子太保二十九年甲申傅恆來保三月卒劉統勳兆惠十一月卒劉綸阿里袞六月還直十一月轉戶部尚書協辦大學士阿桂三月署四川總督十二月還于敏中三十年乙酉傅恆劉統勳劉綸正月癸丑憂免阿里袞阿桂閏二月以烏什回亂命往伊犂辦事出于敏中正月遷戶部尚書尹繼善九月復以太子太保文華殿大學士入直三十一年丙戌傅恆尹繼善劉統勳阿里袞于敏中三十二年丁亥傅恆尹繼善劉統勳阿里袞于敏中劉綸三月服闋五月仍以太子太保協辦大學士入直三十三年戊子傅恆二月命往雲南經略征緬軍務未行尹繼善劉統勳四月差勘江南清口疏濬事宜阿里袞正月壬子命往雲南參贊軍務出劉綸于敏中八月加太子太保福隆安二月丙戌以和碩額駙兵部尚書在軍機處學習行走四月轉工部尚書索琳十一月癸卯以署戶部右侍郎在軍機處行走三十四年己丑傅恆二月往雲南經略軍務尹繼善劉統勳九月差勘挑濬運河事宜劉綸于敏中福隆安索琳二月補戶部右侍郎三十五年庚寅傅恆經略征緬軍務三月還七月卒尹繼善劉統勳劉綸于敏中福隆安七月穿孝給假十月襲封一等忠勇公索琳十二月差赴土默特鞫獄溫福閏五月己未以吏部侍郎在軍機處行走七月遷理藩院尚書豐升