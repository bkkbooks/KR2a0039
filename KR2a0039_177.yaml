body:
  text: 清史稿卷一百七十七表十七軍機大臣年表二道光元年辛巳曹振鏞三月晉太子太傅五月轉授武英殿大學士盧蔭溥十二月癸巳轉吏部尚書兼管順天府尹以事繁罷直黃鉞文孚正月轉禮部尚書松筠八月丁亥復以吏部尚書在軍機大臣上行走九月差赴浙江勘事二年壬午曹振鏞松筠正月命署直隸總督閏三月還六月壬午以事降級免直黃鉞文孚三月轉工部尚書閏三月差赴陝西勘獄六月轉吏部尚書三年癸未曹振鏞文孚二月差赴文安勘事黃鉞長齡正月乙未以太子少保文華殿大學士在軍機大臣上行走四年甲申長齡十二月己卯授雲貴總督出曹振鏞文孚四月加太子少保十一月差勘南河漫口尋還黃鉞玉麟十一月甲寅以兵部尚書在軍機大臣上行走五年乙酉曹振鏞文孚黃鉞五月丁酉乞老命專辦部務罷直玉麟王鼎五月丁酉以一品銜署戶部左侍郎服闋左都御史在軍機大臣上行走六月差主浙江鄉試十一月還直署工部左侍郎蔣攸銛十一月庚子以太子少保體仁閣大學士在軍機大臣上行走六年丙戌曹振鏞蔣攸銛文孚玉麟王鼎六月差赴山西勘事九月授戶部尚書七年丁亥曹振鏞七月晉太子太師蔣攸銛三月差赴江南勘河五月丙戌授兩江總督出文孚七月晉太子太保玉麟七月加太子少保王鼎七月加太子少保穆彰阿五月丁亥以工部尚書在軍機大臣上學習行走八年戊子曹振鏞正月晉太傅賜用紫韁文孚正月晉太子太傅賜用紫韁二月差赴黑龍江勘事玉麟正月晉太子太保王鼎正月賜戴花翎穆彰阿正月加太子少保去行走上學習字九年己丑曹振鏞文孚玉麟六月甲戌授伊犂將軍出王鼎穆彰阿十年庚寅曹振鏞文孚王鼎十月差赴江南勘事穆彰阿十一年辛卯曹振鏞文孚十二月協辦大學士王鼎二月命署直隸總督四月還穆彰阿七月差赴江南勘賑八月轉兵部尚書十月還十二月仍轉工部尚書十二年壬辰曹振鏞文孚王鼎穆彰阿九月差赴江南勘事十三年癸巳曹振鏞文孚王鼎穆彰阿四月還五月轉戶部尚書十四年甲午曹振鏞文孚十一月授東閣大學士王鼎穆彰阿十一月轉吏部尚書協辦大學士潘世恩正月丁亥以體仁閣大學士在軍機大臣上行走十五年乙未曹振鏞正月癸亥卒文孚二月轉授文淵閣大學士四月差勘東河七月甲辰以重聽自乞罷直潘世恩二月轉授東閣大學士穆彰阿王鼎二月協辦大學士趙盛奎七月甲辰以刑部右侍郎在軍機大臣上學習行走時差往湖北等處按獄八月轉戶部左侍郎賽尚阿七月甲辰以工部右侍郎在軍機大臣上學習行走十六年丙申潘世恩穆彰阿七月授武英殿大學士王鼎趙盛奎六月內召七月庚子以事降級免直賽尚阿十一月轉戶部右侍郎十七年丁酉穆彰阿三月命署直隸總督七月還潘世恩正月加太子太保王鼎賽尚阿七月壬午授察哈爾都統出奎照六月戊午以左都御史在軍機大臣上學習行走文慶六月戊午以戶部左侍郎在軍機大臣上學習行走十八年戊戌穆彰阿五月轉授文華殿大學士八月丁母憂給假尋仍入直潘世恩五月轉授武英殿大學士王鼎五月授東閣大學士奎照正月去行走上學習字七月轉禮部尚書文慶正月去行走上學習字十九年己亥穆彰阿潘世恩王鼎奎照正月壬戌以體弱罷直文慶十二月丙戌罷直隆文十二月癸未以刑部尚書在軍機大臣上行走二十年庚子穆彰阿潘世恩王鼎正月晉太子太保隆文正月轉戶部尚書何汝霖三月丙申以大理寺少卿加三品銜在軍機大臣上學習行走旋遷宗人府府丞二十一年辛丑穆彰阿潘世恩王鼎七月差赴東河督辦大工八月暫署河道總督隆文正月甲午命赴廣東參贊軍務出何汝霖十二月遷左副都御史賽尚阿正月乙未復以理藩院尚書在軍機大臣上行走旋差赴天津會勘防務五月轉工部尚書十月再差赴天津勘視海口防具十一月還祁寯藻九月己未以戶部尚書在軍機大臣上行走二十二年壬寅穆彰阿二月差赴天津會辦防務尋還直潘世恩王鼎二月河工竣晉太子太師三月還四月戊申卒祁寯藻賽尚阿五月授欽差大臣赴天津防堵七月撤防還直何汝霖五月遷兵部右侍郎去行走上學習字十一月轉戶部右侍郎二十三年癸卯穆彰阿潘世恩祁寯藻賽尚阿何汝霖六月差赴東河勘工九月還二十四年甲辰穆彰阿潘世恩祁寯藻賽尚阿何汝霖十二月轉戶部左侍郎二十五年乙巳穆彰阿潘世恩祁寯藻賽尚阿二月轉戶部尚書何汝霖四月遷兵部尚書二十六年丙午穆彰阿潘世恩賽尚阿正月差赴江南勘視江防六月還祁寯藻何汝霖二十七年丁未穆彰阿潘世恩賽尚阿祁寯藻何汝霖五月丙戌以母憂免文慶五月丁亥復以兵部尚書在軍機大臣上行走九月差赴河南勘賑陳孚恩五月丁亥以署兵部左侍郎在軍機大臣上行走尋差赴山東勘事十一月署山東巡撫旋轉刑部右侍郎十二月還二十八年戊申穆彰阿潘世恩正月晉太傅賜用紫韁賽尚阿祁寯藻文慶二月壬子轉吏部尚書兼總管內務府大臣命罷直陳孚恩二十九年己酉穆彰阿潘世恩十月甲申以年老罷直賽尚阿祁寯藻七月協辦大學士十月差赴蘭州勘事陳孚恩閏四月差赴山西勘事六月還七月轉工部左侍郎十二月遷刑部尚書何汝霖九月戊午復以一品銜署禮部左侍郎服闋兵部尚書在軍機大臣上行走十月署戶部尚書季芝昌九月戊申以原任山西巡撫署吏部右侍郎在軍機大臣上行走十二月授戶部左侍郎三十年庚戌穆彰阿十月丙戌革職祁寯藻二月還六月授體仁閣大學士賽尚阿十月協辦大學士何汝霖五月授禮部尚書陳孚恩五月庚戌乞養罷季芝昌六月遷左都御史咸豐元年辛亥祁寯藻賽尚阿正月授文華殿大學士三月加欽差大臣督辦廣西軍務何汝霖季芝昌五月乙巳授閩浙總督出穆蔭三月丙申以候補五品京堂內閣侍讀在軍機大臣上學習行走十二月授國子監祭酒舒興阿四月己未以戶部左侍郎在軍機大臣上行走閏八月辛亥署陝甘總督出彭蘊章五月壬子以工部右侍郎在軍機大臣上行走二年壬子賽尚阿督辦廣西軍務九月己酉革職祁寯藻三月加太子太保何汝霖正月以腿病乞假三月丁卯許罷直彭蘊章穆蔭二月遷光祿寺卿再遷內閣學士邵燦五月癸亥以吏部左侍郎在軍機大臣上行走麟魁五月癸亥以戶部右侍郎在軍機大臣上行走七月遷工部尚書三年癸丑祁寯藻麟魁九月轉禮部尚書十月戊寅授總管內務府大臣命罷直彭蘊章十二月轉兵部左侍郎邵燦十二月乙未授漕運總督出穆蔭四月署刑部左侍郎九月遷禮部左侍郎十月去行走上學習字恭親王奕訢十月戊寅命在軍機大臣上行走瑞麟十月戊寅以戶部右侍郎在軍機大臣上行走尋差赴天津幫辦防勦杜翰十二月丙申以工部左侍郎在軍機大臣上行走四年甲寅恭親王奕訢祁寯藻八月病假十一月庚寅致仕彭蘊章三月轉禮部左侍郎五月遷工部尚書瑞麟閏七月轉戶部左侍郎杜翰穆蔭十月轉吏部右侍郎五年乙卯恭親王奕訢七月壬午以辦理皇太后喪儀疏略免直彭蘊章十二月協辦大學士穆蔭瑞麟正月以勞賜勇號加都統銜二月還四月己未授西安將軍出杜翰文慶七月壬午復以戶部尚書在軍機大臣上行走九月協辦大學士十二月授文淵閣大學士六年丙辰文慶十一月授武英殿大學士旋卒彭蘊章十一月授文淵閣大學士穆蔭杜翰柏葰十一月壬申以戶部尚書在軍機大臣上行走十二月協辦大學士七年丁巳彭蘊章柏葰穆蔭杜翰八年戊午彭蘊章九月轉授武英殿大學士柏葰九月授文淵閣大學士十月戊辰以順天科場之獄革職杜翰九月甲午以降服憂罷直匡源五月戊戌以吏部左侍郎在軍機大臣上學習行走文祥五月戊戌以內閣學士署刑部左侍郎在軍機大臣上學習行走六月遷禮部右侍郎十二月轉吏部右侍郎九年己未彭蘊章穆蔭十二月轉兵部尚書匡源十月去行走上學習字文祥十月去行走上學習字轉工部右侍郎十一月轉戶部左侍郎杜翰十月癸卯復以署吏部右侍郎服闋工部左侍郎在軍機大臣上行走十年庚申彭蘊章六月壬申以精力漸衰罷直穆蔭七月與怡親王載垣同為欽差大臣赴通州籌辦撫局八月撤還旋扈從熱河行在九月丁父憂給假十四日仍入直匡源八月扈從熱河行在文祥八月命留京署步軍統領旋命兼辦軍機處鈔發各省摺奏要件十二月兼總理各國通商事務大臣杜翰八月扈從熱河行在九月署禮部右侍郎焦祐瀛十月戊子以太常寺少卿在軍機大臣上學習行走十一年辛酉穆蔭七月隨怡親王載垣等同稱贊襄政務大臣九月乙卯免直匡源四月給假回京仍赴行在七月隨稱贊襄政務大臣九月乙卯免直杜翰四月兼署吏部左侍郎七月隨稱贊襄政務大臣九月乙卯免直焦祐瀛七月隨稱贊襄政務大臣八月遷太僕寺卿九月乙卯免直恭親王奕訢十月丙辰復以管理總理各國通商事務衙門親王加授議政王在軍機處行走桂良十月丙辰以太子太保文華殿大學士兼總理各國通商事務大臣在軍機大臣上行走沈兆霖十月丙辰以戶部尚書在軍機大臣上行走旋差赴蘭州勘事寶鋆十月丙辰以戶部右侍郎在軍機大臣上行走旋兼總理各國通商事務大臣曹毓瑛十月丙辰以鴻臚寺少卿在軍機大臣上學習行走旋遷大理寺卿文祥十月丙辰仍以戶部左侍郎在軍機大臣上行走同治元年壬戌恭親王奕訢二月兼稽察弘德殿課程桂良六月壬申卒沈兆霖正月命署陝甘總督七月乙酉卒寶鋆正月轉戶部左侍郎二月遷戶部尚書文祥正月遷左都御史閏八月轉工部尚書曹毓瑛十月去行走上學習字李棠階閏八月癸巳以左都御史在軍機大臣上行走二年癸亥恭親王奕訢文祥寶鋆李棠階二月轉工部尚書曹毓瑛正月遷工部左侍郎二月轉兵部左侍郎三年甲子恭親王奕訢七月加賜其子一貝勒文祥七月加太子太保寶鋆七月加太子少保李棠階七月加太子少保轉禮部尚書曹毓瑛七月賜頭品頂帶四年乙丑恭親王奕訢三月壬寅被劾撤議政王號免直四月戊寅仍命在軍機大臣上行走文祥七月差赴薊州督勦馬賊八月還十月給假迎養命赴奉天督勦馬賊寶鋆李棠階十一月卒曹毓瑛二月遷左都御史十一月轉兵部尚書李鴻藻十一月壬申以弘德殿行走內閣學士在軍機大臣上學習行走仍兼弘德殿五年丙寅恭親王奕訢文祥二月轉吏部尚書五月還寶鋆曹毓瑛三月卒李鴻藻二月遷禮部右侍郎三月轉戶部右侍郎去行走上學習字七月丁母憂給假百日治喪十月辛丑乞病許罷直胡家玉三月戊子以左副都御史在軍機大臣上學習行走七月遷兵部左侍郎十二月辛卯被劾受總督官文餽金免直汪元方十月辛丑以左都御史在軍機大臣上行走六年丁卯恭親王奕訢文祥寶鋆汪元方十月卒沈桂芬十月甲午以前任山西巡撫署禮部右侍郎在軍機大臣上學習行走十二月補禮部右侍郎七年戊辰恭親王奕訢二月捻賊逼京師命節制入衞諸軍文祥寶鋆沈桂芬三月去行走上學習字轉戶部左侍郎七月轉吏部左侍郎李鴻藻六月戊午復以服闋戶部右侍郎在軍機大臣上行走仍直弘德殿並署禮部左侍郎八年己巳恭親王奕訢文祥九月病假十二月丁母憂給假穿孝百日假滿入直寶鋆沈桂芬六月遷左都御史十月兼在總理各國通商事務衙門行走李鴻藻八月補戶部右侍郎九年庚午恭親王奕訢文祥二月給假歸葬九月還仍