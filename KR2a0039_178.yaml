body:
  text: 清史稿卷一百七十八表十八部院大臣年表一上漢書年表徧及卿尹明史所表止於七卿清增理藩院蒙藏回諸部都凡要務於焉匯歸輯民綏邊所任殊重與七卿等侍郎之屬雖曰副貳然與尚書皆為敵體題奏之草有一不畫例不得上奬勩罰過皆所與同且內而樞輔外而督撫每由茲選材雋所萃未可闕也光緒之季增新汰舊並於名稱亦多更易依時為表期無舛漏管部管院權任亦重以非官制故概不書作部院大臣年表表格尚無資料
