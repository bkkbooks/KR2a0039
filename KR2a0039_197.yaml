body:
  text: 清史稿卷一百九十七表三十七疆臣年表一各省總督河督漕督附一國治亂君相尸之一方治亂嶽伯尸之清制疆帥之重幾埒宰輔選材特慎部院莫擬蓋以此也開國而後戡藩拓邊率資其用同治中興光緒還都皆非疆帥無與成功宣統改元始削其權則不國矣唐之方鎮元之行省史不表人識者病之今表疆臣先列督撫附以河漕東三省外北盡蒙疆西極回藏將軍都統參贊辦事大臣有專地者皆如疆帥今並著焉順天宣總治大元山年津西河甲申駱吳楊養孳方性昌興六七七月月月己壬甲未辰辰總總總督督督天宣河津大道軍山務西十月甲子罷順天淮宣陝浙湖總總治大西廣二山三四年津揚西邊閩川漕河乙酉王吳王張羅王楊文孳文存繡文方奎昌奎仁錦奎興五革四十十五月二月一一月庚月辛月月庚寅己酉壬壬寅未子子總總兼督李督總總督淮鑑陝督督漕揚總西浙湖運督江廣宣甲大戌福四建川九孟月喬由壬芳浙申代江降總督十遷月癸未馬國柱代順宣陝浙湖總淮治大西廣三山三四年西邊閩川河揚丙戌馬孟張羅王楊國喬存繡文方柱芳仁錦奎興順江宣陝浙湖四兩淮總治南四江大西年西丁河山三亥南西邊閩廣川廣揚河十一馬馬孟張羅佟王楊月國國喬存繡養文方戊柱柱芳仁錦甲奎興午七七十五正月月二月月增戊戊月癸庚四午午壬丑戌川調申罷總總病補督督申兩乙江朝免廣卯南紀總總陳督楊江督錦聲西宣總兼遠大督巡總河浙撫督南山閩廣淮西東揚十月庚辰罷癸未吳惟華代順江宣陝浙湖四兩淮總治南大西閩廣川廣揚河五江山三年西西邊戊河子南馬申孟陳羅佟吳楊國朝喬錦繡養惟方柱紀芳錦甲華興三月丙午卒辛酉耿焞總督宣大山西十二月乙未罷丁酉佟養量代順直江宣陝浙湖四兩淮總治隸南大西閩廣川廣揚河六山江山三年東西西邊己河丑南張馬佟孟陳羅佟吳楊存國養喬錦繡養惟方仁柱量芳錦甲華興八月辛亥總督直隸山東河南巡撫保定順直江宣陝浙湖四兩淮總治隸南大西閩廣川廣揚河七山江山三年東西西邊庚河寅南張馬佟孟陳羅佟吳楊存國養喬錦繡養惟方仁柱量芳錦甲華興順直江宣陝浙湖四兩總總治隸南大西閩廣川廣漕河八山江山三年東西西邊辛河卯南張馬佟孟陳羅佟吳楊存國養喬錦繡養惟方仁柱量芳錦甲華興九殉三十月難月月己庚庚丑子申免罷馬十四光月月輝壬辛總戌酉督留直任王隸文奎山總東督漕河運南順直江宣陝浙湖四兩總總治隸南大西閩廣川廣漕河九山江山三年東西西邊壬河辰南馬馬佟孟陳羅王楊光國養喬錦繡文方輝柱量芳七錦奎興月七丙月子己被丑刺卒九戊月戌甲申祖澤劉遠清總泰督總湖督廣浙閩四川順直江宣川浙湖兩總總湖治隸南大陝閩廣廣漕河廣十山江山三兩年東西西邊廣癸河雲巳南貴馬馬佟孟劉祖李王楊洪光國養喬清澤率文方承輝柱量芳泰遠泰奎興疇六六六五月月月月乙乙壬總巳巳子督軍兼專兩務督督廣四湖總川廣督順直江宣川浙湖兩總總湖治隸南大陝閩廣廣漕河廣十山江山三兩一東西西邊廣年河雲甲南貴午馬馬佟孟劉祖李王楊洪光國養喬清澤率文方承輝柱量芳泰遠泰奎興疇二九二正七九月月月月月月壬丁庚壬甲辛午未午辰辰亥病休免卒病降免免十壬甲庚月午寅丙寅辰馬馬金李鳴鳴礪屯蔭佩佩總泰祖總總督總總督督川督督江宣陝浙直南大閩隸三江山邊山西西東十河月南調馬之先代順直江宣川浙湖兩總總湖治隸南大陝閩廣廣漕河廣十山江山三兩二東西西邊廣年河雲乙南貴未李馬馬金屯祖李蔡楊洪蔭鳴之礪泰澤率士方承祖佩先遠泰英興疇總督漕運順直江宣川浙湖兩總總湖治隸南大陝閩廣廣漕河廣十山江山兩三東西西廣年河雲丙南貴申李馬馬金屯祖李蔡楊洪蔭鳴之礪泰澤率士方承祖佩先二二遠泰英興疇十閏三月月九二二五月己庚月月月月癸巳午己庚乙己巳休召巳午未酉調降調調病三李免五月率十王月癸泰月國己己巳總甲光未亥督午總馬浙督郎張之閩胡兩廷懸先全廣佐錫總才總總督總督督川督江宣陝湖南大廣江十西一月丙辰卒十二月乙未李蔭祖代順直江宣川浙湖兩總總湖治隸南大陝閩廣廣漕河廣十山江兩四東西廣年河雲丁南貴酉張郎張馬李李王蔡楊洪懸廷懸之率蔭國士方承錫佐錫先泰祖光英興疇正正八八五六月月月月月月乙乙丁戊癸辛卯卯丑戌亥丑調卒召卸召總督庚九九七直申月月月隸辛辛庚盧丑丑申山崇東峻李亢朱總國得之河督英時錫南宣總總總大督督督川漕河陝運道巡撫鳳陽順直江宣川浙湖兩總總治隸南大陝閩廣廣漕河十山江五東西年河戊南戌五張郎盧李李李王亢朱月懸廷崇國率蔭國得之錫佐峻英泰祖光時錫裁五七六直月月月隸丁甲丙總酉子子督降病改免七福月建辛總巳裁督宣李大趙棲總國鳳督祚總總督己督兩未浙廣江分設福建浙江總督順江川福浙湖兩雲總總治南陝建江廣廣貴漕河十江六西年己郎李李趙李李趙亢朱亥廷國率國蔭棲廷得之佐英泰祚祖鳳臣時錫正七假月月癸庚十丑辰二溺月總死丙督午雲八楊貴月茂癸勳巳署河蔡道士總英督總督漕運巡撫鳳陽順江川福浙湖兩雲總總治南陝建江廣廣貴漕河十江七西年庚郎李李趙李李趙蔡楊子廷國率國蔭棲廷士茂佐英泰祚祖鳳臣英勳二六月月壬戊辰子病調免癸四巳月白甲色午純署張河長道庚總總督督湖七廣月己未苗澄代署十二月朱之錫回任順直江山山河川陝福浙江湖四兩廣廣雲雲貴總總治隸南東西南陝西建江西廣川廣東西貴貴州漕河十八苗郎趙祖劉李白