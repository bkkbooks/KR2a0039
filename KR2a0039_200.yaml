body:
  text: 清史稿卷二百表四十疆臣年表四各省總督河督漕督附咸直兩陝四閩湖兩雲總江河豐南東元河河年隸江甘川浙廣廣貴漕道道辛亥訥陸琦徐裕程徐吳楊楊顏爾建善澤泰矞廣文殿以以經瀛醇五采縉鎔邦增燠額五月月乙甲巳辰遷薩季迎芝阿昌暫閩署浙總乙督巳九裕月泰乙陝丑甘病總督假閏裕八瑞月兼辛署亥閩浙薩總迎督阿召舒興阿署十月癸卯裕泰卒舒興阿補咸訥陸舒徐季程徐吳楊楊顏豐爾建興澤芝矞廣文殿以以二經瀛阿醇昌采縉鎔邦增燠年額七七九七十六壬月月月月月月子壬己己壬壬戊申酉酉申辰戍召假革赴遷降湘裕王徐會羅慧瑞懿廣剿繞成兼德縉典任署兼署葉雲署名貴陸十十琛總應二十二兩督穀月月月廣署辛壬辛總巳辰丑督十革二徐季逮月澤芝辛醇昌張巳遷免亮基慧慧吳成成文署遷署鎔湖四閩廣福川浙總濟總總督河督督東河道總督咸訥陸舒慧吳張葉羅楊楊福豐爾建興成文亮名繞殿以濟三經瀛阿八鎔基琛典邦增三年額正五月降三月癸九月月己二調五月辛丑月壬庚卯月月辛未八丙申申遷己月壬未遷午被差亥己子革革劾裕卯長易瑞王吳福臻桂祥棠四懿吳振濟河良厚署川德文棫任東直署陝總兼鎔署河隸甘督署湖雲查道總二總廣貴文總督月督六總總經督壬月督督護辰辛巳十江二寧有月失鳳甲守兼午署死福之八濟月遷怡己良卯邵兩燦江吳漕總文運督鎔總調督楊文慧楊定成以署閩增浙兼總署督有鳳仍署咸桂怡易裕慧吳葉羅邵楊長豐良良棠瑞成文名繞燦以臻四九正鎔琛典增年月月二十甲丁戊月一寅亥午辛月撤差巳戊陳子黃王亡卒宗懿漢德台恆四閩湧春川浙任雲總總貴六督督月總癸督樂未斌革兼署楊霈湖廣總督咸桂怡易黃王楊葉恆邵楊長豐良良棠宗懿霈名春燦以臻五漢德四琛增五年月月乙己庚卯未寅革卒官李文鈞湖河廣東總河督道總督蔣啓揚署咸桂怡易黃王官葉恆邵楊李豐良良棠宗懿文名春燦以鈞六十九漢德琛增年二月八正丙月壬月月辰己午戊庚酉病子申遷免召卒談樂吳庚廷斌振長襄陝棫江署甘四南直總川河隸督總道總督總督常督績樂護斌邵署燦兼署咸談怡樂吳王官葉恆邵庚李豐廷良斌振懿文名春燦長鈞七襄四棫德琛六年月六十月丁癸月二乙巳巳乙月亥病亥己自免遷未盡革何王吳桂慶黃振清雲宗棫兩四漢雲江川兩貴總總廣總督督總督督趙有桑德鳳柏春轍署貴榮署署署咸談何樂王王官黃吳邵庚李豐廷桂斌慶懿文宗振燦長鈞八襄清雲德漢棫年六六十戊月月一午己戊月未辰己革假亥慶慶病祺端免直署隸閩張總浙亮督總基督雲瑞貴麟總署督咸慶何樂王王官黃張邵庚李豐祺桂斌慶懿文宗亮燦長鈞九二清十雲德漢基四三年月一四四四月月己壬月月月月己己未戍丁壬壬壬未酉卒亥寅戌寅病卒陛遷病遷免恆見免黃福黃王袁贊直林宗慶慶甲湯隸揚漢端雲三河總祖四閩任漕東督署川浙運河陝總總柏總道文甘督督貴督總煜總署督署督有庚鳳九長瑛署月兼棨戊署署十寅月十庚慶月雲子病乙免卯曾望勞聯顏崇英四光署川兩總廣督總督咸恆何樂曾慶官勞張聯庚黃豐福桂斌望端文崇亮英長贊十清八顏光基閏五湯年四月六十三月庚月己月月月己申癸卯丁庚癸亥六未入亥辰亥革月革援革病病庚免免王辰曾林東夢國揚純劉王齡裁藩祖兼源夢兼江兩署署灝齡署南江陝雲署河總甘七貴漕六道督總月總運月總督丁督總裁督徐未督有九卒徐壬月之署辛崇銘亥實兼癸署署巳福四殉濟川庚署總辰薛督煥十亮暫月基署暫樂留斌回任咸恆曾樂崇慶官勞劉王黃豐福國斌實端文崇源夢贊十正藩光灝齡湯一月七十年丙月一辛午戊月酉病申庚免召戌來文福京煜濟直雲吳隸貴棠總總署督督漕運十總一督月壬寅革潘鐸署同直兩陝四閩湖兩雲漕河治隸江甘川浙廣廣貴運道元年文曾樂駱慶官勞潘吳黃壬煜國斌秉端文崇鐸棠贊戌十藩革章遷光湯二閏七月正七八月甲月月月乙辰丙甲甲巳罷申辰辰遷罷劉麟耆談長魁齡劉廷佑陝閩長襄直甘浙佑河隸總總兩東督督總戊廣河督戌總道卒督總崇督厚沈十署兆二霖月署甲辰七月遷庚晏子端卒書署熙麟任恩麟護同劉曾熙駱耆官晏潘吳談治長國麟秉齡文端鐸棠廷二佑藩章三書殉襄年月五癸甲月四亥子丙月遷寅丁罷酉左宗毛勞棠鴻崇閩賓光浙兩雲總廣貴總督總督督同劉曾熙駱左官毛勞吳談治長國麟秉宗文鴻崇棠廷三佑藩五章棠賓光襄年月七甲乙月子巳庚病戌免遷楊鄭嶽敦斌謹陝河甘東總河督道總都督興阿署恩麟護同劉曾楊駱左官毛勞吳鄭治長國嶽秉宗文鴻崇棠敦四佑藩斌章棠賓光二謹年赴假二月四乙山月丙月丑東八丙子己月督甲子遷巳師辰罷遷彭李崇吳玉張鴻實棠麟之章署署漕萬署四兩運河兩川廣總東江總總督河總督督道督四總駱瑞月督秉麟丁章署卯尋回吳任棠留同劉李楊駱左官瑞勞吳張治長鴻嶽秉宗文麟崇棠之五佑章斌章棠十光八萬年十八八一月八丙一月月月癸月寅月癸癸丁卯癸丙卯卯巳遷卯辰罷遷免遷剿張匪左吳談之蘇宗棠廷萬廷曾棠閩襄漕魁國陝浙署運河藩甘總湖總東回總督廣督河兩督總道英江穆桂督總總圖兼督督善署署同劉曾穆駱吳官瑞勞張蘇治長國圖秉棠文麟崇之廷六佑藩善章七正光萬魁年十十月月二丁一二庚丙月卯月月申寅癸癸丁差罷丑丑酉卒罷卒英李桂鴻張官吳兼章凱文棠署湖嵩署四十廣雲直川二總貴隸總月督總總督丁督督酉李崇瀚宋實吳章延署棠署春遷護十馬二新月貽庚閩子浙總瀚督章遷郭