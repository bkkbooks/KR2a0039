body:
  text: 清史稿卷七本紀七聖祖本紀二二十一年壬戌春正月壬戌上元節賜廷臣宴觀燈用柏梁體賦詩上首唱云麗日和風被萬方廷臣以次屬賦上為製昇平嘉宴詩序刊石於翰林院丙寅調蔡毓榮為雲貴總督戊辰王大臣奏曰耿精忠累世王封甘心叛逆分擾浙贛及於皖徽設非師武臣力蔓延曷極李本深劉進忠等多年提鎮高官厚祿不能革其鴞音俯首從賊抑有何益均宜從嚴懲治大為之防以為世道人心之範謹擬議請旨得旨耿精忠曾養性白顯中劉進忠李本深均磔死梟首耿精忠之子耿繼祚李本深之孫李象乾李象坤其姪李濟祥李濟民暨祖弘勳等俱處斬為賊絓誤之陳夢雷李學詩金境田起蛟均減死一等己巳特封安親王岳樂子岳希為僖郡王二月庚辰以達都為左都御史癸未以平滇遣官告祭嶽瀆古帝陵先師闕里甲申上御經筵丙戌以佟國維為領侍衞內大臣辛卯上齋居景山為太皇太后祝釐癸巳上東巡啟鑾皇太子胤礽從蒙古王貝勒等請上尊號不許以穆占為蒙古都統妖人朱方旦伏誅戊戌次山海關遣大臣祭伯夷叔齊廟三月壬子上謁福陵昭陵駐蹕盛京甲寅告祭於福陵丙辰告祭於昭陵大賚將軍以下至守陵官年老致仕官及甲兵廢閒者曲赦盛京寧古塔蠲蹕路所過租稅己未上謁永陵行告祭禮上具啟太皇太后皇太后進奉鰱魚魚庚申上由山道幸烏拉行圍辛酉望祭長白山乙亥泛舟松花江夏四月辛巳上回鑾賜寧古塔將軍副都統宴賚致仕官及甲士乙巳次中後所流人王廷試子德麟叩閽乞代父戍部議不准上諭王德麟所言情甚可憫遇朕來此亦難得之遭其父子俱讀書人可均釋回五月辛亥上還京壬子詔寧古塔地方苦寒流人改發遼陽己未大學士杜立德乞休溫旨允之丙寅免吉林貢鷹減省徭役戊辰以王熙為大學士六月乙酉以佟國瑤為福州將軍庚寅以公倭赫為蒙古都統甲辰大學士馮溥乞休溫旨允之差官護送馳驛回籍秋七月庚戌以杭艾為左都御史甲寅命刑部尚書魏象樞吏部侍郎科爾坤巡察畿輔豪強虐民者拘執以聞乙卯以三逆蕩平宣示蒙古八月丙子詔內閣學士參知政事癸卯譚弘之子譚天祕譚天倫伏誅九月戊申賜蔡升元等一百七十六人進士及第出身有差甲子詔每日御朝聽政春夏以辰初秋冬以辰正冬十月甲申定遠大將軍貝子彰泰征南大將軍都統賴塔凱旋上郊勞之己丑以黃機吳正治為大學士辛卯詔重修太祖實錄纂修三朝聖訓平定三逆方略十一月甲寅以李之芳為兵部尚書希福為西安將軍瓦岱為江寧將軍戊午詔廣西建雙忠祠祀巡撫馬雄鎮傅弘烈庚申以趙賴為漢軍都統戊辰以施維翰為浙江總督以噶爾漢為滿洲都統十二月己卯前廣西巡撫陳洪起從賊論死命流寧古塔癸未以許貞為廣東提督戊子錄達海之孫陳布祿為刑部郎中癸巳論行軍失律罪簡親王喇布奪爵餘遣戍降黜有差庚子郎談使黑龍江還上羅剎犯邊事狀命寧古塔將軍巴海副都統薩布素率師防之建木城於黑龍江呼馬爾分軍屯田是歲免直隸江南江西山東山西浙江湖廣等省七十八州縣衞被災額賦有差朝鮮安南入貢二十二年癸亥春正月乙卯宴賚廷臣己未上閱官校較射二月癸酉帥顏保罷以介山為禮部尚書喀爾圖為刑部尚書甲申上幸五臺山三月戊申還京戊午以噶爾漢為荊州將軍彭春為滿洲都統夏四月乙亥命提鎮諸臣以次入覲庚辰命巴海迴駐烏拉薩布素瓦禮祜帥師駐額蘇里備邊辛卯以公坡爾盆為蒙古都統五月丙午設漢軍火器營甲子命施琅征臺灣六月丁丑上閱內庫頒賚廷臣幣器戊寅以伊桑阿為吏部尚書杭艾為戶部尚書癸未上奉太皇太后避暑古北口閏六月戊午施琅克澎湖庚申諭飭刑官勘獄勿淹繫秋七月車駕次胡圖克圖賜隨圍蒙古王公冠服兵士銀幣甲午上奉太皇太后還宮八月庚子命經筵大典大學士以下侍班戊申以哈占為兵部尚書科爾坤為左都御史戊辰施琅疏報師入臺灣鄭克塽率其屬劉國軒等迎降臺灣平詔錫克塽國軒封爵封施琅靖海侯將士擢賚有差九月癸酉以丁思孔為偏沅巡撫己卯上奉太皇太后幸五臺山壬辰次長城嶺太皇太后以道險迴鑾上如五臺山限額魯特入貢人數冬十月上至五郎河行宮奉太皇太后還京丁未羣臣以臺灣平請上尊號不許癸亥以薩布素為新設黑龍江將軍乙丑詔沿海遷民歸復田里十一月癸未授羅刹降人宜番等官戊子上以海寇平祭告孝陵癸巳上巡幸邊界十二月甲辰上還京丁未從逆土司陸道清伏誅壬子以紀爾他布為蒙古都統乙卯易經日講成上製序頒行尚書朱之弼左都御史徐元文以薦舉非人免乙丑祫祭太廟是歲免山東山西甘肅江西湖廣廣西等省二十州縣災賦有差朝鮮琉球入貢二十三年甲子春正月辛巳上幸南苑行圍丙戌加封安親王岳樂子袁端為勤郡王壬辰命整肅朝會禮儀羅刹踞雅克薩尼布潮二城飭斷其貿易薩布素以兵臨之二月乙巳上御經筵癸丑上巡幸畿甸丙寅還駐南苑大學士黃機罷乙丑給事中王承祖疏請東巡命查典禮以聞三月壬申以劉國軒為天津總兵官陛辭賜白金二百緞匹三十內鞍馬一丁亥上製五臺山碑文召示廷臣諭之曰近人每一文出不樂人點竄此文之所以不工也夏四月己酉設臺灣府縣官隸福建行省壬子刑部左侍郎宋文運乞休命加太子少保致仕庚申諭凡一事經關兩部俱會同具奏乙丑諭講官講章以精切明晰為尚毋取繁衍朕閱張居正尚書四書直解義俱精實無泛設之詞可為法也江南江西總督于成龍卒予祭葬諡清端五月丁卯裁浙江總督以公瓦山為滿洲都統己巳修大清會典丙子以孫思克為甘肅提督辛巳命廷臣察舉清廉官九卿舉格爾古德蘇赫范承勳趙崙崔華張鵬翮陸隴其癸未起巴海為蒙古都統甲申上幸古北口詔蹕路所經勿踐田禾乙未惠郡王博翁果諾坐陪祀不謹削爵王大臣議奏侍郎宜昌阿巡撫金儁查看尚之信家產隱蝕銀八十九萬並害殺商人沈上達應斬郎中宋俄託員外郎卓爾圖及審讞不實之侍郎禪塔海應絞從之詔追銀勿入內務府交戶部充饟六月丁未琉球請遣子弟入國子監讀書許之甲寅暹羅國王森列拍臘照古龍拍臘馬呼陸坤司由提呀菩挨遣陪臣言貢船到虎跳門阻滯日久每致損壞乞諭粵省官吏准其放入河下早得登岸貿易採辦勿被攔阻從之諭一等侍衞阿南達曰朕視外旗蒙古與八旗一體今巡行之次見其衣食困苦深用惻然爾即傳諭所過地方蒙古無告者許其來見詢其生計於是蒙古扶老攜幼叩首行宮門上詳問年齒生計給與銀兩布疋乙卯上閱牧羣賜從臣馬刑部尚書魏象樞再疏乞休允之丁巳以湯斌為江蘇巡撫七月乙亥以宋德宜為大學士辛巳上駐蹕英尼湯泉以佟佳為蒙古都統八月戊申上還京甲寅大學士李霨卒遣官奠茶酒賜祭葬諡文勤甘肅提督靖逆侯張勇卒予祭葬諡襄壯九月甲子朔停本年秋決丙寅以張士甄為刑部尚書博濟為滿洲都統以錢貴更鑄錢減四分之一聽民採銅鉛勿稅丁卯改梁清標為兵部尚書余國柱為戶部尚書庚午以蒙古都統阿拉尼兼理藩院尚書癸酉以陳廷敬為左都御史莽奕祿為蒙古都統丁亥詔南巡車駕所過賜復一年辛卯上啟鑾冬十月壬寅上次泰安登泰山祀東嶽辛亥次桃源閱河工慰勞役夫戒河吏勿侵漁臨視天妃閘與河臣靳輔論治河方略壬子上渡淮甲寅次高郵湖登岸行十餘里詢耆老疾苦丙辰上幸焦山金山渡揚子江舟中顧侍臣曰此皆戰艦也今以供巡幸然艱難不可忘也丁巳弛海禁戊午上駐蘇州庚申幸惠山諭巡撫百姓遠道來觀其不能歸者資遣之十一月壬戌朔上駐江寧癸亥詣明陵致奠乙丑迴鑾泊舟燕子磯讀書至三鼓侍臣高士奇請曰聖躬過勞宜少節養上曰朕自五齡受書誦讀恆至夜分樂此不為疲也丁卯命伊桑阿薩穆哈視察海口諭曰海口沙淤年久遂至壅塞必將水道疏通始免昏墊即多用經費亦所不惜辛未臨閱高家堰次宿遷過白洋河賜老人白金戊寅上次曲阜己卯上詣先師廟入大成門行九叩禮至詩禮堂講易經上大成殿瞻先聖像觀禮器至聖蹟殿覽圖書至杏壇觀植檜入承聖門汲孔井水嘗之顧問魯壁遺迹博士孔毓圻占對甚詳賜官助教詣孔林墓前酹酒書萬世師表額留曲柄黃蓋賜衍聖公孔毓埏以次日講諸經各一免曲阜明年租賦庚寅上還京以馬哈達為滿洲都統十二月壬辰朔以石文炳為漢軍都統癸卯命公瓦山視師黑龍江佟寶佛可托副之備羅剎甲辰賜公鄭克塽伯劉國軒馮錫范田宅隸漢軍丙午命流人值冬令過嚴寒時乃遣丙辰上謁陵賜守陵官兵牛羊己未還宮是歲免直隸江南江西河南湖廣等省二十六州縣災賦有差朝鮮暹羅入貢二十四年乙丑春正月癸酉享太廟諭曰贊禮郎讀祝讀至朕名聲輒不揚失父前子名之義自今俱令宣讀癸未命公彭春赴黑龍江督察軍務命侯林興珠率福建籐牌兵從之以班達爾沙佟寶馬喇參軍事乙丑試翰詹官於保和殿上親定甲乙其不稱者改官戊子命蒙古科爾沁十旗所貢牛羊送黑龍江軍前二月庚子命周公後裔東野氏為五經博士予祀田以額赫納為滿洲都統癸卯上御經筵乙卯上巡幸畿甸庚申還京再賜劉國軒第宅以范承勳為廣西巡撫三月壬戌上撰孔子廟碑文成親書立碑重修賦役全書辛巳賜陸肯堂等一百二十一人進士及第出身有差夏四月辛卯予宋儒周敦頤裔孫五經博士丙申授李之芳輕車都尉世職戊戌馬喇以所俘羅剎上獻命軍前縱遣之辛丑詔以直隸連年旱災逋賦六十餘萬盡免之並免今年正賦三分之一詔醫官博採醫林載籍勒成一書庚戌設內務府官學五月癸未詔厄魯特濟農違離本部嚮化而來宜加愛養予之田宅修政治典訓甲申以原廣西巡撫郝浴歷官廉潔悉免應追帑金彭春等攻雅克薩城羅刹來援林興珠率籐牌兵迎擊於江中破之沈其船頭人額里克舍乞降六月庚寅朔上巡幸塞外啟鑾戊戌上還京癸卯詔曰鄂羅斯入我邊塞侵擾鄂倫春索倫赫哲飛牙喀等處人衆盤踞雅克薩四十年今克奏厥績在事人員咸與優應於何地永駐官兵即會議具奏上試漢軍筆帖式監生曳白八百人均斥革令其讀書再試乙巳上巡幸塞外秋七月壬申設吉林黑龍江驛路凡十九驛八月丙午上駐蹕拜巴哈昂阿賜朝行在蒙古王貝勒冠服銀幣九月戊午朔上聞太皇太后違豫回鑾己未上馳回京趨侍醫藥旋即康復辛巳陝西提督王進寶卒贈太子太保予祭葬諡忠勇甲申命副都統溫代納秦駐防黑龍江博定修築墨爾根城增給夫役兼令屯田乙酉以吳英為四川提督冬十月甲午上幸南苑戊戌厄魯特使人伊特木坐殺人棄市己亥以瓦代為滿洲都統庚子定外藩王以下歲貢羊一隻酒一瓶丙午慶雲見己酉靳輔請下河涸出田畝佃民收價償工費上曰如是則累民矣其勿取甲寅以博霽為江寧將軍十一月丁巳朔日有食之庚申以莽奕祿為滿洲都統塔爾岱為蒙古都統甲戌上大閱於盧溝橋丙子靳輔于成龍遵召至京會議治河方略靳輔議開六河建長隄于成龍請開濬海口故道大學士以聞上云二說俱有理可詢高寶七州縣京官孰利民侍讀喬萊奏從于成龍議則工易成而百姓有利上令于成龍興工旋以民情不便而止己卯上賜鄂內坤巴圖魯散秩大臣聽其家居二人皆太宗朝舊臣也乙酉詔曰日蝕於月朔越十六日月食一月之中薄蝕互見天象示儆宜亟修省廷臣集議以聞十二月庚寅以察尼為奉天將軍己亥謁孝陵癸卯上還宮甲寅祫祭太廟是歲免江南江西山東山西湖廣等省七十四州縣衞災賦有差朝鮮琉球噶爾丹入貢二十五年丙寅春正月丙申命馬喇督黑龍江屯田鄂羅斯復據雅克薩命薩布素率師逐之二月甲辰重修太祖實錄成丁未詔曰國家削平逆孽戡定遐荒惟宜宣布德意動其畏懷近見雲貴川廣大吏不善撫綏頗行苛虐貪黷生事假借邀功朕思土司苗蠻既歸王化有何杌格鬬靡寧其務推示誠信化導安輯以副朕撫馭遐荒至意停四川採運木植己酉文華殿成壬子告祭至聖先師於傳心殿癸丑上御經筵以津進為領侍衞內大臣三月戊午命修棲流所己未命纂修一統志甲戌以湯斌為禮部尚書兼管詹事府夏四月乙酉朔命阿拉尼往喀爾喀七旗蒞盟庚寅詔曰趙良棟前當逆賊盤踞漢中首先入川功績懋著復領兵直抵雲南攻克省城之後獨能恪守法紀廉潔自持深為可嘉今已衰老解任應復其勇略將軍兵部尚書總督以示眷注命郎談班達爾沙馬喇赴黑龍江參贊軍務贈陝西死事平逆將軍畢力克圖參贊阿爾瑚世職甲午詔求遺書戊申調萬正色雲南提督以張雲翼為福建陸路提督辛亥始令順天等屬旗莊屯丁編查保甲與民戶同閏四月辛未以范承勳為雲南貴州總督五月丁亥詔毀天下淫祠六月乙亥錄平南大將軍賴塔都統趙賴以次功各予世職有差戊寅以阿蘭泰為左都御史秋七月己酉錫荷蘭國王耀漢連氏甘勃氏文綺白金命其使臣賫書致鄂羅斯吏部奏定侍讀庶子以下各官學問不及者以同知運判外轉從之辛亥上巡幸塞外八月辛未上駐蹕烏爾格蘇台丙子上還京以索額圖為領侍衞內大臣丁丑詔薩布素圍雅克薩城遏其援師以博定參軍事戊辰詔天下學宮崇祀先儒庚辰詔增孔林地十一頃有奇從衍聖公孔毓埏請也除其賦九月己丑以班達爾沙為蒙古都統乙巳以圖納為四川陝西總督丁未以陳廷敬為工部尚書馬齊為山西巡撫己酉鄂羅斯察漢汗使來請解雅克薩之圍許之是月內大臣拉篤祜奉詔與羅卜藏濟農及噶爾丹定地而還冬十月丙辰調張士甄為禮部尚書以胡昇猷為刑部尚書十一月庚子上謁孝陵賞蒙古喀喇沁兵征浙江福建有功者十二月癸丑上還宮丙辰命侍郎薩海督察鳳凰城屯田癸亥諭糾儀御史糾察必以嚴設朕躬不敬亦當舉奏戊寅祫祭太廟是歲免直隸江南浙江湖廣甘肅等省二十七州縣被災額賦有差朝鮮安南荷蘭吐魯番入貢二十六年丁卯春正月戊子遣醫官往治雅克薩軍士疾羅刹願就醫者並醫之丙申蒙古土謝圖汗車臣汗及濟農合疏請上尊號不許乙巳大學士吳正治乞休允之二月癸丑上大閱於盧溝橋原任湖廣總督蔡毓榮隱藏吳三桂孫女為妾匿取逆財減死鞭一百枷號三月籍沒並其子發黑龍江原讞尚書禧佛等坐隱庇黜革有差甲寅以余國柱為大學士庚申命八旗都統副都統更番入值紫禁城丁卯以張玉書為刑部尚書壬申戶部奏滸墅關監督桑額溢徵銀二萬一千餘兩得旨設立榷關原為稽察奸宄桑額多收額銀乃私封便民橋以致擾害商民著嚴加議處嗣後司榷官有額外橫徵者該部其嚴飭之三月己丑以董訥為江南江西總督癸巳以王鴻緒為左都御史癸卯上御太和門視朝諭大學士等詳議政務闕失僉以無弊可陳對上曰堯舜之世府修事和然且兢兢業業不敢謂已治已安漢文帝亦古之賢主賈誼猶指陳得失直言切諫今但云主聖臣賢政治無闕豈國家果無一事可言耶大小臣工各宜盡心職業視國事如家事有所見聞入陳無隱以馬世濟為貴州巡撫夏四月己未上諭大學士曰纂修明史諸臣曾參看前明實錄否若不參看實錄虛實何由悉知明史成日應將實錄並存令後世有所考證丙寅以田雯為江蘇巡撫癸酉罷科道侍班五月己亥宗人府奏平郡王納爾都打死無罪屬人折傷手足請革爵圈禁得旨革爵免圈禁庚辰詔曰今茲仲夏久旱多風陰陽不調災孰大焉用是減膳撤樂齋居默禱雖降甘霖尚未霑足皆朕之涼德不能上格天心政令有不便於民者更之罪非常赦不原者咸赦除之戊子上召陳廷敬湯斌十二人各試以文諭曰朕閒與熊賜履講論經史有疑必問繼而張英陳廷敬以次進講大有裨益德格勒每好評論時人學問朕心以為不然故茲召試茲判然矣壬辰上製周公孔子孟子廟碑文御書勒石六月丁酉上素服步行祈雨於天壇是夜雨辛丑改祀北海於混同江以楊素蘊為安徽巡撫秋七月戊子鄂羅斯遣使議和命薩布素退兵丙午戶部請裁京員公費得旨勿裁八月己酉上巡幸塞外癸丑次博洛和屯行圍甲戌賜外藩銀幣九月己卯上還京辛巳于成龍進嘉禾上曰今夏乾旱幸而得雨未足為瑞也壬午以李之芳為大學士乙未調湯斌為工部尚書起徐元文為左都御史冬十月癸丑上巡幸畿甸甲子上還駐暢春園十一月甲申以李正宗為漢軍都統丙申太皇太后不豫上詣慈寧宮侍疾十二月乙巳朔上為太皇太后不豫親製祝文步行禱於天壇癸亥以王永譽為漢軍都統乙丑湖廣巡撫張為御史陳紫芝劾其貪婪侍郎色楞額初按不實至是命于成龍馬齊開音布馳往提拏究擬論死陳紫芝內升己巳太皇太后崩上哭踊視襝割辮服衰居慈寧宮廬次甲戌除夕羣臣請上還宮不允是歲免直隸山東山西江西等省四州縣災賦有差朝鮮入貢二十七年戊辰春正月戊子上居乾清門外左幕次乙未釋服丁酉聽政二月壬子大學士勒德洪明珠余國柱有罪免李之芳罷御史郭琇具疏論列也尚書科爾昆佛倫熊一瀟俱罷甲寅以梁清標伊桑阿為大學士李天馥為工部尚書張玉書為兵部尚書徐乾學為刑部尚書定宗室襲封年例三月乙亥以馬齊為左都御史辛巳上召廷臣及董訥靳輔于成龍佛倫熊一瀟等議河務次日亦如之乙酉色楞額以按張獄欺罔論死總督徐國相以徇庇侍郎王遵訓等以濫舉俱免官己丑以王新命為河道總督辛卯裁湖廣總督丁酉論河工在事互訐諸臣董訥熊一瀟靳輔慕天顏孫在豐俱削官幷趙吉士陳潢罪之己亥增遣督捕理事官張鵬翮兵科給事中陳世安會內大臣索額圖與鄂羅斯議約定界壬寅賜沈廷文等一百四十六人進士及第出身有差李光地坐妄舉德格勒議處得旨李光地前於臺灣一役有功仍以學士用夏四月癸卯朔日有食之戊申以傅拉塔為江南江西總督己酉上躬送太皇太后梓宮奉安暫安奉殿其後起陵是曰昭西陵迴蹕至薊州除髮甲寅以厄魯特侵喀爾喀使諭噶爾丹戊辰上還宮庚午命侍郎成其範徐廷璽查閱河工五月己卯吏部尚書陳廷敬刑部尚書徐乾學以疾罷甲午以紀爾他布為兵部尚書丙申上謁祭暫安奉殿六月甲辰湖廣督標裁兵夏逢龍作亂踞武昌巡撫柯永昇投井死署布政使糧道葉映榴罵賊遇害命瓦岱佩振武將軍印討之庚申阿喇尼奏噶爾丹侵厄爾德尼招哲卜尊丹巴土謝圖汗遁發兵防邊戊辰起熊賜履為禮部尚書徐元文為左都御史以翁叔元為工部尚書秋七月癸酉以輔國公化善為蒙古都統乙酉湖廣提督徐治都大敗夏逢龍於應城於鯉魚套焚賊舟賊遁黃岡丙戌上巡幸塞外戊子南陽總兵史孔華復漢陽庚寅瓦岱復黃州獲夏逢龍磔誅之賊平壬午雲南提督萬正色侵冒兵饟按律論死上念其前陷賊時抗志不屈行間血戰勞績甚多免死革提督仍留世職壬辰上駐喀爾必哈哈達有峰舊名納哈里高百數十丈上發數矢皆過峰頂賜今名八月癸卯上駐巴顏溝行圍葉映榴遺疏至贈工部侍郎下部優卹乙卯張玉書奏查閱河工多用靳輔舊議九月壬申遣彭春諾敏率師駐歸化城防邊是時喀爾喀為噶爾丹攻破徙近邊內遣阿喇尼往宣諭之並運米賑撫辛卯上還京癸巳復設湖廣總督以丁思孔為之冬十月癸卯移楊素蘊為湖廣巡撫庚戌以輔國公綽克託為奉天將軍乙卯上大行太皇太后尊諡曰孝莊文皇后辛酉升祔太廟頒詔中外十一月辛卯荊州將軍噶爾漢等坐討賊逗遛奪職鞭一百官吏從賊受官者逮治餘貸之十二月庚子以希福為蒙古都統甲辰建福陵昭陵聖德神功碑御製碑文上謁孝莊山陵乙巳以尼雅翰為西安將軍己酉進張玉書為禮部尚書徐元文刑部尚書再進戶部尚書丙寅上還京兵部工部會疏福建前造砲船核減工料銀二萬餘兩應著落故總督姚啟聖名下追賠上以姚啟聖經營平臺甚有功績毋庸著追是歲免江南江西湖廣雲南貴州等省三十三州縣災賦有差朝鮮琉球入貢二十八年己巳春正月庚午詔南巡臨閱河工丙子啟鑾詔所過勿令民治道獻縣民獻嘉禾壬午詔免山東地丁額賦甲申上駐濟南乙酉望祀泰山庚寅次剡城閱中河壬辰次清河癸巳詔免江南積欠二十餘萬乙未上駐揚州詔曰朕觀風問俗鹵薄不設扈從僅三百人頃駐揚州民間結綵盈衢雖出自愛敬之誠不無少損物力其前途經過郡邑宜悉停止二月辛丑上駐蘇州丁未駐杭州詔廣學額賚軍士復因公降謫官賜扈從王大臣以次銀幣賜駐防耆民金辛亥渡錢塘江至會稽山麓壬子祭禹陵親製祭文書名行九叩禮製頌刊石書額曰地平天成癸丑上還駐杭州閱騎射賜將軍以及官兵大酺丁巳次蘇州故湖廣糧道葉映榴之子敷迎鑾為其父請諡上書忠節二大字賜之松江百姓建碑祈壽獻進碑文江南百姓籲留停蹕獻土物為御食委積岸上令取米一撮果一枚為留一日浙江巡撫金鋐有罪削職遣戍以張鵬翮為浙江巡撫增設武昌荊州常德岳州水師癸亥上駐蹕江寧甲子祭明陵賜江寧京口駐防高年男婦白金乙丑上閱射賜酺上詣觀星臺與學士李光地咨論星象參宿在觜宿之先恆星隨天而動老人星合見江南非隱見也江寧士民籲留聖駕為留二日三月戊辰朔發江寧甲戌閱高家堰指授治河方略丙戌上還京聞安親王岳樂之喪先臨其第哭之乃還宮丁亥命八旗科舉先試騎射戊子詔靳輔治河勞績昭然可復原官丁酉增設八旗火器營副都統領之閏三月壬子予安親王岳樂祭葬立碑諡曰和己未上謁陵丙午謁孝莊皇后山陵謁孝陵辛酉上還京夏四月乙亥朔上製孔子贊序及顏曾思孟四贊頒於學宮壬辰復命索額圖等赴尼布楚與鄂羅斯定邊界喀爾喀外蒙古內附告饑命內大臣伯費揚古往賑撫之命臺灣鑄錢五月乙巳以阿蘭泰徐元文為大學士顧八代為禮部尚書郭琇為左都御史壬戌頒行孝經衍義癸亥命歸化城屯兵備邊六月乙亥以佟寶為寧古塔將軍兩廣總督吳興祚以鼓鑄不實黜官秋七月以石琳為兩廣總督癸卯冊立貴妃佟氏為皇后甲辰皇后崩諡曰孝懿八月癸酉上巡幸邊外戊寅駐博洛和屯賜居民銀米九月癸卯上還京戊午以倭赫為蒙古都統額駙穆赫為漢軍都統冬十月丙寅以郎談為滿洲都統辛未增設喀爾喀兩翼扎薩克招集流亡編置旗隊癸酉左都御史郭琇以致書本省巡撫請託降官甲戌葬孝懿皇后上臨送是月岷州生番內附十一月丙申上還宮辛酉孝懿皇后祔奉先殿十二月乙丑詔免雲南二十一年至二十三年民欠丙寅上朝皇太后於慈寧新宮戊辰以張英為工部尚書乙亥內大臣索額圖疏報與鄂羅斯立約定尼布楚為界立碑界上以五體文書碑是歲免直隸浙江湖北等省十一州縣災賦有差朝鮮入貢二十九年庚午春正月癸丑上幸南苑庚申遣官賑蒙古喀爾喀二月甲子以岳樂子馬爾渾嗣封安郡王乙丑遣大臣巡視直隸災區流民五城粥廠寬期倍發銀米增置處所己巳上謁孝莊山陵謁孝陵庚午大雨癸酉上還京甲戌上御經筵戊子起陳廷敬為左都御史三月壬辰朔除長蘆新增鹽課乙未詔修三朝國史癸卯命都統額赫納護軍統領馬賴前鋒統領碩鼐率師征厄魯特先是噶爾丹兵侵喀爾喀迭詔諭解不從兵近邊塞至是命額赫納等蒞邊禦之辛亥除雲南黑井加增鹽課以張思恭為京口將軍夏四月丁丑以旱赦殊死以下繫囚甲申建子思子廟於闕里大清會典成五月辛卯朔命九卿保舉行取州縣堪為科道者六月癸酉大學士徐元文免戊寅噶爾丹追喀爾喀侵入邊命內大臣蘇爾達赴科爾沁徵蒙古師備禦命康親王傑書恪慎郡王岳希師駐歸化城秋七月庚寅朔以張英為禮部尚書以董元卿為京口將軍辛卯噶爾丹入犯烏珠穆秦命裕親王福全為撫遠大將軍皇子胤禔副之出古北口恭親王常寧為安遠大將軍簡親王喇布信郡王鄂扎副之出喜峯口內大臣佟國綱索額圖明珠彭春等俱參軍事阿密達阿拉尼阿南達俱會軍前己亥以陳廷敬為工部尚書于成龍為左都御史癸卯上親征發京師己酉上駐博洛和屯有疾迴鑾八月乙未朔日有食之撫遠大將軍裕親王福全大敗噶爾丹於烏闌布通噶爾丹以喇嘛濟隆來請和福全未即進師上切責之乙丑上還京丙子噶爾丹以誓書來獻上曰此虜未足信也其整師待之九月癸巳先是烏闌布通之戰內大臣公佟國綱戰歿於陣至是喪還命皇子率大臣迎之凡陣亡官咸賜奠賜卹有差戊申停今年秋決壬子弛民間養馬之禁冬十月己未上疾少愈召大學士諸臣至乾清宮輪對乙亥以鄂倫岱為漢軍都統辛巳領翰林院學士張英失察編修楊瑄撰擬佟國綱祭文失當削禮部尚書楊瑄褫官戍邊入旗十一月己亥以熊賜履為禮部尚書甲辰達賴喇嘛請上尊號不許並卻其貢己酉裕親王福全等至京聽勘王大臣議上上薄其罪輕罰之將士仍功十二月丁丑上謁陵行孝莊文皇后三年致祭禮庚辰還京是歲免直隸江南浙江甘肅等省三十二州縣衞災賦有差朝鮮入貢三十年辛未春正月戊申封阿祿科爾沁貝勒楚依為郡王以與厄魯特力戰受傷被執不屈而脫歸也其十二旗陣亡台吉俱贈一等台吉賜號達爾漢子孫承襲噶爾丹復掠喀爾喀命瓦岱為定北將軍駐張家口郎談為安北將軍駐大同川陝總督會西安將軍駐兵寧夏備之命在籍勇略將軍趙良棟參軍事乙卯以馬齊為兵部尚書二月丁巳朔日有食之乙丑上御經筵命步軍統領領巡捕三營兼轄五城督捕戊午厄魯特策旺阿拉布坦使來噶爾丹之姪也厚賚其使比旋遣郎中桑額護其行三月戊子繙譯通鑑綱目成上製序文己酉賜戴有祺等一百四十八人進士及第出身有差夏四月戊午左都御史徐乾學致私書於山東巡撫錢鈺事發並褫職丁卯上以喀爾喀內附躬蒞邊外撫綏是日啟鑾五月丙戌上駐多羅諾爾喀爾喀來朝先是喀爾喀土謝圖汗聽哲卜尊丹巴唆殺其同族扎薩克圖汗得克得黑墨爾根阿海內亂迭興為厄魯特所乘至是遣大臣按其事土謝圖汗哲卜尊丹巴具疏請罪上赦之以扎薩克圖汗七旗之長飭其弟策旺扎布襲汗號封為親王丁亥上御行幄土謝圖汗哲卜尊丹巴入覲俯伏請罪大臣宣赦泣涕謝恩賜茶賜宴賜坐大合樂九叩首而退戊子復召土謝圖汗哲卜尊丹巴策旺扎布車臣汗及喀爾喀諸部濟農偉徵諾顏阿玉錫諸大台吉三十五人賜宴諭曰朕欲熟識爾等故復饗宴賜之冠服策旺扎布年幼以皇子衣帽數珠賜之以車臣汗之叔扎薩克濟農納穆扎爾前勸車臣汗領十萬衆歸順身為之倡請照四十九旗一例殊為可嘉許照舊扎薩克去其濟農之號封為郡王餘各封爵有差傳諭喀爾喀曰爾等困窮至極互相偷奪朕已拯救愛養今與四十九旗一體編設各處扎薩克管轄稽察其各遵守如再妄行則國法治之矣己丑上御甲冑乘馬徧閱各部下馬親射十矢九中次大閱滿洲兵漢軍兵古北口兵列陣鳴角鳥鎗齊發聲動山谷衆喀爾喀環矚駭歎曰真神威也科爾沁喀爾喀各蒙古王貝勒請上尊號不許庚寅上按閱喀爾喀營寨賚牛羊及其窮困者辛卯遣官往編喀爾喀佐領予之遊牧烏珠穆秦台吉車根等以降附厄魯特按實罪之壬辰上迴鑾癸卯還京辛亥分會試中卷南左南右北左北右中左中右從御史江蘩之言也壬子羣臣請上尊號不許六月乙卯以李天馥為吏部尚書陳廷敬為刑部尚書高爾位為工部尚書秋七月甲申西安將軍尼雅翰奉詔督兵遷巴圖爾額爾克濟農於察哈爾濟農憚行遁去尼雅翰追之不及按問論死命總督葛思泰追討之朝鮮使人以買一統志發其國論罪致仕大學士杜立德卒予祭葬諡文端閏七月丙辰葛思泰疏報濟農之弟博濟在昌寧湖經總兵柯彩派兵勦敗生擒博濟及前禁之格隆等均斬之乙亥上巡幸邊外九月辛酉上迴鑾道遵化謁孝莊山陵謁孝陵乙丑還京庚午以公阿靈阿為蒙古都統甲戌命侍郎博濟李光地徐廷璽偕靳輔視河冬十月庚寅謝爾素番盜殺參將朱震西寧總兵官李芳述擒盜首華木爾加誅之癸巳以巴德渾為滿洲都統杭奕祿為荊州將軍丁未甘肅提督孫思克討阿奇羅卜藏斬之先是使於厄魯特之侍讀學士達虎還及嘉峪關為阿奇羅卜藏所害命思克討之至是捷聞十一月丁巳以索諾和李振裕為工部尚書以伊勒慎為滿洲都統己未詔曰朕崇尚德教蠲滌煩苛大小諸臣咸被恩禮即因事罷退仍令曲全鄉里近來交爭私怨糾結不已頗有黨同伐異之習豈欲釀明季門戶之禍耶其各蠲私忿共矢公忠有怙終者朕必窮治之是時徐元文徐乾學王鴻緒既罷而傅臘塔等抉摘瑣隱鉤連興獄故特詔儆飭焉甲戌詔曰欽天監奏來歲正月朔日食天象示儆朕甚懼焉其罷元日筵宴諸禮諸臣宜精白供職助朕修省十二月甲申詔曰朕撫馭區宇惟以愛養蒼生俾臻安阜為念比歲地丁額賦迭經蠲免而歲運漕米尚在輸將時切軫念除河南已經蠲免外其湖廣江蘇浙江安徽山東漕米以次各免一年用紓民力丁亥移旗莊壯丁赴古北口外達爾河墾田遣侍郎阿山德珠等往陝西監賑壬辰諭督撫提鎮保舉武職堪任用及曾立功者在內八旗旗員令都統等舉之是歲免直隸江南江西河南山東陝西湖廣雲南等省一百八十八州縣災賦有差朝鮮安南琉球入貢三十一年壬申春正月辛亥朔日有食之免朝賀甲寅上御乾清門出示太極圖五音八聲八風圖因言律呂新書徑一圍三之法用之不合徑一尺圍當三尺一寸四分一釐積至百丈所差至十四丈外矣寧可用邪惟隔八相生之說試之悉合又論河道閘口流水晝夜多寡可以數計又出示測日晷表畫示正午日影至處驗之不差諸臣皆服庚午上幸南苑行圍二月辛巳以靳輔為河道總督乙酉以陝西旱災發山西帑銀襄陽米石賑之丁亥上巡幸畿甸辛卯陝西巡撫薩弼以賑災不實褫職戊戌上還京己亥上御經筵乙巳以馬齊為戶部尚書三月丙辰遣內大臣阿爾迪理藩院尚書班迪赴邊外設立蒙古驛站乙丑命府丞徐廷璽協理河工加甘肅提督孫思克太子少保予世職致仕大學士馮溥卒予祭葬諡文敏以阿席坦為滿洲都統置雲南永北鎮夏四月庚辰朔以希福為滿洲都統護巴為蒙古都統己丑發帑銀百萬賑陝西尚書王騭沙穆哈往視加賑戊戌上幸瀛臺召近臣觀稻田及種竹河道總督靳輔請建新莊仲家淺各一閘下部議行五月庚寅諭戶部山西平陽豐收可遣官購買備荒命王維珍董其事癸卯定喀爾喀部為三路土謝圖為北路車臣為東路扎薩克圖為西路屬部各從其分地畫為左右翼六月庚辰以宋犖為江寧巡撫乙未蒙古科爾沁進獻錫伯卦爾察打虎爾一萬餘戶給銀酬之秋七月乙亥上巡幸塞外八月己丑以翁叔元為刑部尚書以博濟為西安將軍李林隆為固原提督李芳述為貴州提督九月戊申噶爾丹屬人執我使臣馬迪戕之庚戌上還次湯泉己未還京丁卯上御經筵壬申上大閱於玉泉山冬十月己卯詔曰秦省比歲凶荒加以疾疫多方賑濟未甦積困所有明年地丁稅糧悉予蠲免從前逋欠一概豁除用稱朕子惠元元至意庚辰以李天馥為大學士壬午上謁陵曲赦陝西非十惡及軍前獲譴者皆免死減一等以佛倫為川陝總督宗室董額為滿洲都統庚寅上還京癸巳以熊賜履為吏部尚書張英為禮部尚書庚子停直省進鮮茶暨賫送表箋十一月庚戌以阿靈阿為滿洲都統甲寅命熊賜履勘察淮揚濱河涸田丙寅加孫思克振武將軍以覺羅席特庫為蒙古都統十二月壬午河道總督靳輔卒予祭葬諡文襄以于成龍為河道總督董訥為左都御史壬辰以郎化麟為漢軍都統辛丑以西安饑運襄陽米平糶加希福建威將軍移戍右衞召科爾沁蒙古王沙津入京面授機宜使誘噶爾丹是歲免陝西江南四川等省十三州縣災賦有差朝鮮入貢三十二年癸酉春正月甲子詔朝鮮歲貢黃金木棉永行停止二月乙亥朔發帑金招商販米西安平市價丙子遣內大臣坡爾盆等往督歸化城三路屯田詔修南河周橋隄工往年靳輔與陳潢所經度者至是閱河大臣繪圖進呈特詔修之策旺阿拉布坦遣使入貢報告使臣馬迪被害及噶爾丹密事以綵緞賚之癸未上御經筵改宣府六廳十衞為一府八縣戊子命郎談為昭武將軍偕阿南達碩鼐帥師赴寧夏將軍博濟孫思克參軍事庚寅上巡幸畿甸閱霸州苑家口隄工諭巡撫郭世隆修之庚子上還京貴州巡撫衞既齊疏報勦辦土司失實奪職戍黑龍江三月丙午遣皇子胤禔祭華山丁未移饒州府駐景德鎮乙卯置廣東運司潮州運同庚午詔趙良棟係舊臣可暫領寧夏總兵夏四月丙戌喀爾喀台吉車凌扎布自鄂羅斯來歸賚之袍服賜克魯倫游牧癸巳命檢直省解送物料共九十九項減去四十項免解丁酉以心裕為蒙古都統五月庚戌命內大臣伯費揚古為安北將軍駐歸化城六月乙亥廣八旗鄉會中額八月甲戌免廣西四川貴州雲南四省明年地丁稅糧癸未上巡幸塞外行圍蒙古科爾沁諸部朝行在賜冠服銀幣九月丁未修盛京城丙寅琉球來貢遣其質子還國丁卯上還京冬十月壬申詔曰給事中彭鵬奏劾順天考官請朕親訊是大臣皆不可信矣治天下當崇大體若朕事事躬親則庶務何由畢理乎壬辰上大閱於玉泉山丁酉鄂羅斯察漢汗來貢上諭大學士曰外藩朝貢固屬盛事傳至後世未必不因而生事惟中國安寧則外患不生當培養元氣為根本耳十一月辛丑上奉皇太后謁孝莊山陵孝陵庚申還宮甲子詔免順天河間保定永平四府明年糧十二月辛未以宗室公楊岱為蒙古都統丁亥上幸南苑行圍諭滿洲官兵近來不及從前之精銳故比年親加校閱間以行圍頃見諸士卒行列整齊進退嫻熟該軍校等賞給一箇月錢糧該管官賞給緞疋以激戎行丁酉祫祭太廟是歲免直隸江南江西浙江山西湖廣等省六十九州縣災賦有差朝鮮琉球入貢三十三年甲戌春正月乙卯盛京歉收命馬齊馳往以倉穀支給兵丁海運山東倉穀濟民食丙辰召見河道總督于成龍問曰爾前言減水壩不宜開靳輔糜費錢糧今竟何如成龍曰臣前誠妄言今所辦皆照靳輔而行上曰然則爾所言之非靳輔所行之是何以不明白陳奏尚留待排陷耶因諭大學士曰于成龍前奏靳輔未曾種柳河隄朕南巡時指河干之柳問之無辭以對又奏靳輔放水淹民田朕復至其地觀之斷不至淹害麥田而王騭董訥等亦附和于成龍言之下部議將于成龍革職枷責上曰伊經手之工未完應革職留任王騭休致董訥革職二月辛未上御經筵癸酉大學士請間三四日一御門聽政上曰昨諭六十以上大臣間日奏事乃優禮老臣耳若朕躬豈敢暇逸其每日聽政如常丁丑以諾穆圖為漢軍都統庚辰上巡幸畿甸敕修通州至西沽兩岸隄工三月辛丑上還京禮部尚書沙穆哈以議皇太子祀奉先殿儀注不敬免官辛酉賜胡任輿等一百六十八人進士及第出身有差以范承勳為左都御史夏四月庚午理藩院奏編審外藩蒙古四十九旗人丁二十二萬六千七百有奇辛巳以查木揚為杭州將軍五月戊寅步軍統領凱音布奏天壇新修之路勿令行人來往上曰修路以為民也若不許行修之何益後若毀壞令步兵隨時葺治順天學政李光地丁母憂令在京守制甲辰命翰林院詹事府國子監日輪四員入直南書房辛亥以紀爾他布為滿洲都統噶爾瑪為蒙古都統甲寅詔修類函丁巳上巡幸畿甸閱視河隄諭扈從衞士魚貫而行勿踐田禾戊午上閱龍潭口己未閱化家口黃須口八百戶口王家甫口筐兒港口白駒場口薄弱之處咸令增修庚申閱桃花口永安口李家口信艾口柳灘口等處新隄上曰觀新隄甚屬堅固百姓可免數年水患矣壬戌上還京閏五月庚午上試翰林出身官於豐澤園六月辛丑加湖廣提督徐治都鎮平將軍丙辰以范承勳為江南江西總督秋七月丁卯以蔣弘道為左都御史轉王士禛戶部左侍郎王掞戶部右侍郎巴圖爾額爾克濟農奏報降人祁齊克逃遁遣兵追斬之丁亥上求文學之臣大學士舉徐乾學王鴻緒高士奇及韓菼唐孫華以對上曰韓菼非謫降之人當以原官召補徐乾學王鴻緒高士奇可起用修書並召徐秉義來他日試唐孫華詩佳授禮部主事翰林院行走己丑江南江西總督傅拉塔卒贈太子太保予祭葬諡清端庚寅上巡幸塞外八月己未上駐蹕拜巴哈昂阿喀爾喀哲布尊丹巴來朝賜之冠服九月己巳廣八旗入學學額己卯上還京壬午以石文炳為漢軍都統以王繼文為雲南貴州總督冬十月丙申以吳赫為四川陝西總督乙巳以金世榮為福州將軍十一月丁卯溫僖貴妃鈕祜祿氏薨癸酉以張旺為江南提督戊寅起陳廷敬為戶部尚書十二月庚戌以覺羅席特庫為滿洲都統杜思噶爾為蒙古都統是歲免直隸山東等省十二州縣災賦有差朝鮮入貢三十四年乙亥春正月丁亥以護巴為滿洲都統二月己亥以郭世隆為浙江福建總督丁巳太和殿工成休致大學士李之芳卒予祭葬諡文襄三月丙戌以石文英為漢軍都統夏四月丁酉平陽府地震甲辰遣使冊立班禪胡土克圖己酉追趙良棟平蜀滇功授一等子世職其部將陞賞有差己未以李輝祖為河南巡撫五月壬寅朔遣尚書馬齊察賑地震災民巡撫噶世圖以玩災免辛未命在京八旗分地各造屋二千間住兵壬申上巡幸畿甸閱新隄及海口運道建海神廟戊子還京六月丁酉策封皇太子胤礽妃石氏庚子以久雨詔廷臣陳得失禮部祈晴庚申漕運總督王樑奏參衞千總楊奉漕船裝帶貨物諭曰商人裝帶貨物於運何妨王樑乃將貨物搜出棄置兩岸所行甚暴即解任秋七月己丑以覺羅舒恕為寧夏將軍鄂羅順為江寧將軍趙良棟告赴江南就醫命給與南巡舊船八月壬辰上巡幸塞外辛丑博濟奏報噶爾丹屬下回子五百人闌入三岔河汛界肅州總兵官潘育龍盡俘之拘於肅州丙午次克勒和洛命宗室公蘇努都統阿席坦護巴領兵備噶爾丹己酉次克勒烏理雅蘇台調董安國為河道總督桑額為漕運總督九月辛巳上還京癸未詔順天保定河間永平四府水潦傷稼免明年地丁錢糧仍運米四萬石前往平糶冬十月丁未命內大臣索額圖明珠視察噶爾丹十一月己未朔日有食之壬戌命大軍分三路備噶爾丹裹八十日糧其駝馬米糧令侍郎陳汝器前左都御史于成龍分督之丙寅停今年秋決庚午命李天馥復為大學士庚辰上大閱於南苑戊子命安北將軍伯費揚古為撫遠大將軍遣大臣如蒙古徵師示師期十二月己亥命將軍博濟孫思克師出鎮彝乙巳平陽地震命蠲本年糧額並免山西陝西江南浙江江西湖廣廣東福建等省逋賦赦殊死以下其政令有不便於民者令督撫以聞以齊世為滿洲都統是歲免直隸山西江西福建廣東等省十二州縣災賦有差朝鮮琉球入貢三十五年丙子春正月甲午下詔親征噶爾丹賚隨征大臣軍校宴甲申命公彭春參贊西路軍務二月丁亥朔上謁陵辛卯上還京壬辰以碩鼐為蒙古都統癸丑告祭郊廟社稷甲寅命皇太子胤礽留守丙辰上親統六師啟行三月戊辰上出行宮觀射辛未次滾諾大雨雪上露立俟軍士結營畢乃入行幄軍中畢炊乃進膳以行帳糧薪留待後至者庚辰予故巡撫王維珍祭葬諡敏売心夏四月辛卯上次格德爾庫壬辰上駐塔爾奇拉諭茲已抵邊界自明日始均列環營前哨報噶爾丹在克魯倫命蒙古兵先進據河五月丙辰朔上駐蹕拖陵布拉克辛酉次枯庫車爾壬戌偵知噶爾丹所在上率前鋒先發諸軍張兩翼而進至燕圖庫列圖駐營其地素乏水至是山泉涌出上親臨視癸亥次克魯倫河上顧大臣曰噶爾丹不知據河拒戰是無能為矣前哨中書阿必達探報噶爾丹不信六師猝至登孟納爾山望見黃幄網城大兵雲屯漫無涯際大驚曰何來之易耶棄其廬帳宵遁驗其馬矢似遁二日矣上率輕騎追之沿途什物駝馬婦孺委棄甚衆上顧謂科爾沁王沙津曰虜何倉皇至是沙津曰為逃生耳喀爾喀王納木扎爾曰臣等當日逃難即是如此上上書皇太后備陳軍況並約期回京追至拖納阿林而還令內大臣馬思喀追之戊辰上班師是日晨五色雲見癸酉次中拖陵撫遠大將軍伯費揚古大敗噶爾丹於昭莫多斬級三千陣斬其妻阿奴噶爾丹以數騎遁癸未次察罕諾爾召見蒙古諸王奬以修道鑿井監牧之勞各賜其人白金六月癸巳上還京是役也中路上自將走噶爾丹西路費揚古大敗噶爾丹唯東路薩布素以道遠後期無功甲午論喀爾喀郡王善巴盡以馬匹借軍功晉封親王貝子盆楚克偵敵有勞封為郡王諸臣行慶賀禮乙未賜察哈爾護軍月饟加一金喀爾喀人六金限給三年詔停本年秋審壬子以吳琠為左都御史調張旺為福建水師提督張雲翼為江南提督秋七月戊午以平定朔漠勒石太學以李輝祖為湖廣總督癸亥廣直省鄉試解額戊辰改吳英福建陸路提督岳昇龍為四川提督八月丁酉索諾和以乏軍需免以凱音布為兵部尚書九月甲寅朔回回國王阿卜都里什克奏臣仗天威得以出降遣臣回國葉爾欽請敕策旺阿拉布坦勿加虐害乙卯賜厄魯特降人官秩衣糧壬申上巡幸塞外丙子次沙城詔年來宣化所屬牧養軍馬供億甚繁深勞民力其悉蠲明年額賦丁丑副都統祖良璧敗噶爾丹部人丹濟拉於翁金冬十月甲申朔遣官齎賜西路軍士衣裘牛羊丁亥次昭哈賜右衞大同陣亡軍士白金庚寅大將軍費揚古獻俘至賜銀贖出令其完聚戊申上臨視右衞軍士賜食傳諭曰昭莫多之役爾等乏糧步行而能禦敵故特賜食悉免所借庫銀其傷病之人另頒賜之衆叩首歡謝庚戌上駐蹕麗蘇上皇太后書謝賜裘服十一月戊寅噶爾丹遣使乞降其使格壘沽英至蓋微探上旨也上告之曰俟爾七十日過此即進兵矣庚辰迴鑾十二月壬寅上還京以宗室費揚固為右衞將軍祁布為滿洲都統雷繼尊為漢軍都統庚戌詔陝甘沿邊州縣衞所當師行孔道供億繁多閭閻勞苦其明年地丁銀米悉行蠲免是歲免江南江西等省三十二州縣災賦有差朝鮮入貢三十六年丁丑春正月丙辰上幸南苑行圍戊辰哈密回部擒噶爾丹之子塞卜騰巴爾珠爾來獻己巳遣官存問勇略將軍趙良棟賜人葠鹿尾甲戌諭朕觀明史一代並無女后預政以臣陵君之事我朝事例因之者多朕不似前人輒譏亡國也現修明史其以此諭增入敕書二月丁亥上親征噶爾丹啟鑾是日次昌平阿必達奏哈密擒獲厄魯特人土克齊哈什哈係害使臣馬迪之首犯命誅之子女付馬迪之家為奴戊戌上駐大同丁未次李家溝戊申詔免師行所過岢嵐保德河曲等州縣今年額賦是日次輦鄢村山泉下湧人馬霑足庚戌遣官祭黃河之神三月丙辰上駐蹕屈野河厄魯特人多爾濟達拉什等先後來降賜哈密回王金幣冠服丁巳趙良棟卒上聞之嗟悼良久語近臣曰趙良棟偉男子也辛酉次榆林戊辰次安邊城寧夏總兵王化行請上獵於花馬池上曰何如休養馬力以獵噶爾丹乎辛未次花馬池丙子上自橫城渡河遣皇長子胤禔賜奠趙良棟及前提督陳福丁丑上駐蹕寧夏察卹昭莫多翁金陣亡弁兵己卯祭賀蘭山庚辰上閱兵命侍衞以御用食物均賜戰士閏三月辛巳朔日有食之庚寅康親王傑書薨寧夏百姓聞上將行懇留數日上曰邊地磽瘠多留一日即多一日之擾爾等誠意已知之矣夏四月辛亥上次狼居胥山甲寅迴鑾庚申命直省選文行兼優之士為拔貢生送國子監甲子費揚古疏報閏三月十三日噶爾丹仰藥死其女鍾齊海率三百戶來降上率百官行拜天禮敕諸路班師是日大雨厄魯特降人請慶賀止之先是上將探視寧夏黃河由橫城乘舟行至湖灘河朔登陸步行率侍衞行獵打魚射水鴨為糧至包頭鎮會車騎五月乙未上還京丁酉以傅拉塔為刑部尚書席爾達左都御史翁叔元罷以吳琠為刑部尚書張鵬翮左都御史癸卯禮部請上尊號不許六月甲寅禮部請於師行所過名山磨崖紀功從之予故勇略將軍一等子趙良棟祭葬諡襄忠秋七月癸未羣臣請上皇太后徽號三上不允乙未以朔漠平定遣官祭告郊廟陵寢先師賜李蟠等一百五十人進士及第出身有差晉封大將軍伯費揚古一等公參贊以下各授世職辛丑免旗兵借帑乙巳遣官賚外藩四十九旗兵丁未上巡幸塞外八月乙亥上駐巴圖舍里賜蒙古王公台吉銀幣九月癸未厄魯特丹濟拉來歸上獨御氈幄召見之丹濟拉出語人曰我罪人也上乃不疑真神人也甲午上還京庚子以都統凱音布兼步軍統領壬寅上御經筵乙巳振平將軍湖廣提督徐治都卒贈太子少保予祭葬諡襄毅賑黑龍江被水居民以席爾達為兵部尚書哈雅爾為左都御史冬十月己巳始令宗室應鄉會試壬戌詔曰比年師行出入皆經山西地方有行齎居送之勞其免山西明年額賦從征鎮國公蘇努功晉封貝子庚午上謁陵甲戌內監劉進朝以訛詐人論死十一月辛巳上還京丙戌和碩恪靖公主下嫁喀爾喀郡王敦多布多爾濟戊戌朝鮮告糶命運米三萬石往賑甲辰詔直省報災即察實以聞十二月丁卯改宗室董額為滿洲都統乙亥祫祭太廟是歲免直隸江南安徽江西等省五十九州縣災賦有差朝鮮琉球安南入貢三十七年戊寅春正月庚寅策旺阿拉布坦奏陳第巴匿達賴喇嘛圓寂之事斥班禪而自尊懇請睿鑒上答之曰朕曾敕責第巴具奏認罪若怙終不悛朕不輕恕也幷遣侍讀學士伊道等齎敕往癸卯上巡幸五臺山甲辰次涿州命皇長子胤禔大學士伊桑阿祭金太祖世宗陵二月辛亥詔免山西三十六年逋賦癸丑上駐蹕菩薩頂乙丑遣官賑山東戊辰上還京三月丙子朔上御經筵丁丑封皇長子胤禔為直郡王皇三子胤祉為誠郡王皇四子胤禛皇五子胤祺皇七子胤祐皇八子胤禩俱為貝勒戊子禁造燒酒辛卯直隸巡撫于成龍奏偕西洋人安多等履勘渾河幫修挑濬繪圖呈進得旨於六月內完工夏四月癸亥減廣東海關稅額己巳詔溫郡王延壽行止不端降為貝勒貝子袁端削爵壬申以貝子蘇努管盛京將軍癸酉上閱漕河五月甲戌武清民請築外隄上曰築外隄恐損民田民曰河決之害更甚於損田上曰水潦將降暫立木樁護隄開小河洩水俟明春雨水前為爾等成之癸未上還京壬寅裁上林苑以李林盛為陝西提督張旺為廣西提督是月策旺阿拉布坦上言與哈薩克搆兵及將丹津鄂木布拘禁各緣由命示議政大臣六月辛亥移吳英為福建水師提督丁巳改四川梁萬營為化林營設參將以下官己未雲南巡撫石文晟奏三藩屬人奉旨免緝者准其墾田應試從之秋七月癸酉朔張玉書丁母憂以吳琠為大學士王士禛為左都御史辛卯命吏部月選同通州縣官引見癸巳霸州新河成賜名永定河建河神廟己亥以盧崇耀為廣州將軍殷化行為廣東提督庚子以蘇爾發為滿洲都統辛丑上奉皇太后東巡取道塞外八月癸丑上奉皇太后臨幸喀拉沁端靜公主第賜金幣及其額駙噶爾臧甲子皇太后望祭父母於發庫山己巳賜端敏公主及其額駙達爾漢親王班第金幣湖南山賊黃明犯靖州陳丹書犯茶陵州官兵討平之九月壬申上次克爾蘇臨科爾沁故親王滿珠習禮墓前酹酒孝莊皇后之父也癸巳上駐扎星阿賜黑龍江將軍薩布素等金幣冠服庚子停盛京烏拉本年決囚冬十月癸卯上行圍射殪二虎其一虎隔澗射之穿其脇丁未上行圍槍殪二熊是日駐蹕輝發己酉裁雲南永寧府置永北府癸巳上駐蹕興京甲寅上謁永陵遣官賜奠武功郡王禮敦墓改貴州水西土司置大定平遠黔西三流官丁巳上謁福陵昭陵臨奠武勳王揚古利直義公費英東弘毅公額亦都墓免奉天今年米豆壬戌上奉皇太后迴鑾十一月癸未上奉皇太后還宮丙戌詔曰朕巡幸所經敖漢奈曼阿祿科爾沁扎魯特諸蒙部水草甚佳而生計窘迫蓋因牲畜被盜不敢夜牧耳朕即遣郎中李學聖等往為料理盜竊衰止其他處蒙古亦宜照此差遣旗員有願往蒙古教導者准其前往命盜各案同聽決之庚寅以張鵬翮為江南江西總督十二月辛丑朔命徐廷璽協理河務命尚書馬齊侍郎喻成龍常綬察視河工庚戌諭宗人府閒散宗室材力幹濟精於騎射及貧無生計者各察實以聞詔官民妻女緣事牽連勿拘訊著為令改四川東川土司為東川府設知府以下官戊午詔八旗察訪孝子節婦己未以巴錫為雲南貴州總督馬自德為京口將軍己巳祫祭太廟是歲免直隸江南福建浙江湖廣等省三十五州縣災賦有差朝鮮入貢三十八年己卯春正月辛卯詔朕將南巡察閱河工一切供億由京備辦預飭官吏勿累閭閻二月壬寅詹事尹泰以不職解任癸卯上奉皇太后南巡啟鑾戊申以天津總兵潘育龍訓練有方賜御服貂裘三月庚午上次清口奉皇太后渡河辛未上御小舟臨閱高家堰歸仁隄爛泥淺等工截漕糧十萬石發高郵寶應等十二州縣平糶壬申上閱黃河隄丙子車駕駐揚州諭隨從兵士勿踐麥禾壬午詔免山東河南逋賦曲赦死罪以下癸未車駕次蘇州辛卯車駕駐杭州丙申上閱兵較射戊戌上奉皇太后迴鑾夏四月庚子朔迴次蘇州詔免鹽課關稅加增銀兩特廣江浙二省學額乙巳以丹岱為杭州將軍己酉車駕次江寧上閱兵庚申次揚州辛酉以彭鵬為廣西巡撫丙寅渡黃河上乘小舟閱新埽五月辛未次仲家閘書聖門之哲額懸先賢子路祠乙酉上奉皇太后還宮丁亥以馬爾漢為左都御史王鴻緒為工部尚書六月戊戌朔起郭琇為湖廣總督以鎮國公英奇為蒙古都統秋七月甲申河決淮揚閏七月戊戌敏妃張佳氏薨誠郡王胤祉其所出也不及百日薙髮降貝勒癸丑先是苗賊黃明屢報獲報死仍報犯事至是遣官按鞫并其夥陳丹書吳思先等三十餘人誅之其奏報不實之督撫麻勒吉等降黜有差上巡幸塞外九月丙午上還京丙辰上御經筵改揚岱為滿洲都統魯伯赫拖倫崇古禮俱為蒙古都統戊午大學士阿蘭泰卒上悼惜之遣皇長子胤禔視疾賜奠加祭諡文清冬十月癸酉上巡視永定河工庚辰上還宮大學士李天馥卒予祭葬諡文定十一月乙巳上謁陵壬辰以馬齊佛倫熊賜履張英為大學士陳廷敬為吏部尚書李振裕為戶部尚書杜臻為禮部尚書馬爾漢范承勳為兵部尚書王士禛為刑部尚書壬寅命滿漢給事中各四員侍班丙午令寶源局收買廢錢十二月戊辰上還京癸巳祫祭太廟是歲免直隸江南江西浙江福建陝西湖廣等省七十三州縣災賦有差朝鮮琉球入貢三十九年庚辰春正月己未朝鮮國王李焞以遣回難民進方物上還之癸亥上閱永定河工二月甲戌上乘舟閱郎城柳岔諸水道水淺易艇而前指示修河方略壬午還京己丑命內大臣費揚古伊桑阿考試宗室子弟騎射三月甲午上御經筵吏部奏安徽巡撫李金丙被參一案請交將軍提督查按上曰將軍提督不與民事部議不合嚴飭之尚書庫勒納旋罷癸卯改張鵬翮為河道總督鵬翮請撤協理官及效力員部臣寬文法以責成功從之甲寅以宗室特克新為蒙古都統丙辰賜汪繹等三百一人進士及第出身有差四川巡撫于養志提督岳昇龍互訐遣官按鞫俱削職夏四月庚辰上閱永定河命八旗兵丁協助開河以直郡王胤禔領之僖郡王岳希等五人偕往壬午上閱子牙河壬辰還京五月丁未以阿山為江南江西總督甲寅以阿靈阿為蒙古都統六月癸亥張鵬翮報修浚海口工成河流暢遂改攔黃壩為大通口建海神廟杜臻罷以王澤弘為禮部尚書李柟為左都御史丁亥停宗室科舉秋七月甲午理藩院議覆喇嘛商南多爾濟所奏策旺阿拉布坦遣兵往青海一事毋庸議上曰此事目前甚小將來關繫甚大該部擬以勿庸議倘青海問商南多爾濟何以答之策旺阿拉布坦為人狡猾素行奸惡鄰近諸部俱與仇讎其稱往征第巴道遠險多或虛張聲勢以恫嚇青海未可知也要使不敢搆衅為是乙巳定翰林官編檢庶吉士月給銀三兩例學道缺出較俸派出壬子故振武將軍孫思克卒命皇長子胤禔奠酒賜鞍馬二匹銀一千兩諡襄武丁巳上巡幸塞外命李光地張鵬翮郭琇彭鵬詳議科場事宜八月辛未上次齊老圖九月癸巳停今年秋決詔張鵬翮專理河工范成勳等九人撤回給事中穆和倫請禁服用奢侈閣臣票擬申飭上曰言官耳目之職若因言而罪之誰復言者惟其言奢侈在康熙十年後則非乃在輔臣時耳今少息矣冬十月辛酉皇太后六旬萬壽節上製萬壽無疆賦親書圍屏進獻癸酉上巡閱永定河戊寅上還京己卯命本年行取科道未補官者作為額外御史隨班議事十一月庚寅命青海鄂爾布圖哈灘巴圖爾移駐寧夏詔侍郎溫達查視陝甘驛站王澤弘免以韓菼為禮部尚書命大臣及清要官子弟應試者編為官號限額取中辛亥上巡幸邊外命卓異官如行取例引見戊午四川打箭爐土蠻作亂遣侍郎滿丕偕提督唐希順討之十二月己未朔上駐蹕煖泉賜外藩王以下至官兵白金戊辰上還京癸酉移蕭永藻為廣西巡撫彭鵬為廣東巡撫壬午故安親王岳樂坐前審擬貝勒諾尼一案失入追降郡王子僖郡王岳希貝子吳爾占俱降鎮國公丁亥祫祭太廟是歲免直隸江南安徽陝西浙江等省五十七州縣災賦有差朝鮮入貢四十年辛巳春正月辛亥以河伯效靈封金龍四大王甲寅以心裕為滿洲都統二月己未朔上巡閱永定河諭李光地曰河水涸必致淤塞此甚難治當徐議之乙丑滿丕唐希順討打箭爐土蠻平之蠻民萬二千戶內附庚辰上還宮三月戊子上御經筵丁酉張鵬翮請以治河方略纂集成書上斥之曰朕於河務之書罔不披閱大約坐言則易實行則難河性無定豈可執一法以繩之編輯成書非但後人難以倣行即揆之己心亦難自信張鵬翮試編輯之給事中馬士芳劾湖北布政使任風厚年老調來引見年尚未衰上因諭曰坐而辦事必得老成練達者方能得當州縣官則不可耳夏四月己未調李林盛為甘肅提督擢潘育龍為固原提督移藍理為天津總兵官以曹秉桓為漢軍都統丙子刑部尚書王士禛請假回籍上諭大學士曰山東人性多偏執好勝尋仇惟王士禛無之其詩甚佳居家惟讀書若令回籍殊為可惜給假五月不必開缺丁丑上閱永定河諭李光地隆冬冰結可照常開洩清水流於冰下為冰所逼衝刷河底愈深閱大灣口諭石隄尚未興工可以南來杉木排樁爾等勿忽閱子牙河乙酉上還京五月癸巳黑龍江管水手官員缺部臣擬補遣戍道員周昌上曰周昌既遣戍矣又補官烏拉是終身不得歸也可令八旗官願效力者為之戊申御史張瑗請毀前明內監魏忠賢墓從之丙辰上巡幸塞外六月庚辰授宋儒邵雍後裔五經博士秋七月丁亥領侍衞內大臣公費揚古隨扈患病上為停鑾一日親往視疾隨以不起聞賜鞍馬三匹散馬四匹銀五千兩遣大臣護送還京予祭葬諡襄壯八月乙丑上幸索岳爾濟山曰此山形勢崇隆允稱名勝嗣後此處禁斷行圍甲申上次馬尼圖行圍一矢穿兩黃羊並斷拉哈里木蒙古皆驚九月辛丑簡親王雅布隨扈薨命大臣送還京皇長子胤禔皇三子胤祉出迎遣官治喪賜銀四千兩皇子合助銀三千兩發引時皇子侍衞往送予祭葬立碑諡曰修乙巳上還京庚戌上御經筵大學士王熙以衰疾乞休溫旨慰諭加少傅致仕噶爾丹之女鍾齊海到京命與其兄一等侍衞色卜騰巴爾珠爾同居配二等侍衞蒙古沙克都爾冬十月戊午以宗室特克新為滿洲都統迓圖佈爾塞為蒙古都統己未召大學士張玉書還朝詔免甘肅來年額賦庚申以梁鼐為福建陸路提督辛酉免江蘇明年額賦起岳昇龍為四川提督辛未改普奇為滿洲都統孫渣齊為蒙古都統以華顯為四川陝西總督癸酉大學士張英乞休溫旨慰諭令致仕御史靳讓疏言為州縣者須令家給人足方為良吏命改靳讓通州知州詔總督郭琇張鵬翮桑額華顯巡撫李光地彭鵬徐潮各舉賢能平悼郡王訥爾福薨子訥爾素襲爵十一月甲午詔朕詳閱秋審重案字句多誤廷臣竟未察出一二刑部尤為不慎其議罰之十二月壬申廣東連山瑤匪作亂命都統嵩祝討之辛巳祫祭太廟是歲免直隸江南河南陝西廣東等省四十二州縣災賦有差朝鮮琉球入貢
