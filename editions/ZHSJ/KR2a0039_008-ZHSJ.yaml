死拘禁已而上徐察其誣釋之丙申上幸南苑己亥命侍郎赫壽駐藏協辦藏事初拉藏汗與青海爭立達賴喇嘛不決特命大臣往監臨之王鴻緒李振裕免二月己酉上巡幸畿甸以宗室楊福為黑龍江將軍覺羅孟俄洛為寧古塔將軍王文義為貴州提督戊午以嵩祝署奉天將軍戊辰上還宮庚午以張鵬翮為戶部尚書張廷樞為刑部尚書三月辛巳復立胤礽為皇太子昭告宗廟頒詔天下甲午賜趙熊詔等二百九十二人進士及第出身有差夏四月甲辰以富寧安為吏部尚書穆和倫為禮部尚書穆丹為左都御史移禁胤禔於公所遣官率兵監守丁卯上巡幸塞外五月甲戌上駐蹕熱河六月戊午康親王椿泰薨諡曰悼子崇安襲封秋七月庚寅以殷泰為四川陝西總督噶禮為江南江西總督江琦為甘肅提督師懿德為江南提督戊戌上行圍八月己亥朔日有食之加陝西提督潘育龍鎮綏將軍九月庚寅上還京以年羹堯為四川巡撫冬十月壬寅詔福建廣東督撫保舉深諳水性熟知水師者戊午冊封皇三子胤祉誠親王皇四子胤禛雍親王皇五子胤祺恆親王皇七子胤祐淳郡王皇十子胤敦郡王皇九子胤禟皇十二子胤祹皇十四子胤禵俱為貝勒壬戌詔免江蘇被災之淮揚徐山東之兗州河南之歸德明年地丁額賦十一月丙子詔各省解部之款過多可酌量截留以備急需安郡王馬爾渾薨諡曰売心子華襲己卯加漕運總督桑額太子太保庚寅上與大學士李光地論水脉水源泰岱諸山自長白山來泲水伏流黃河未到積石亦是伏流蒙古人有書言之甚詳江源亦自崑崙來至於岷山乃不伏流耳遣張鵬翮噶敏圖按江南宜思恭虧帑獄十二月己亥上謁陵己未上還宮命馬齊管鄂羅斯貿易事刑部尚書巢可託免是歲免直隸江蘇安徽山東河南湖廣等省五十三州縣災賦有差朝鮮琉球入貢四十九年庚寅春正月庚寅命修滿蒙合璧清文鑑二月丁酉上巡幸五臺山吏部尚書徐潮乞休允之三月己巳上還京乙亥命編纂字典詔以故大學士李霨嫡孫主事李敏啟擢補太常寺少卿戊寅敕封西藏胡必爾汗波克塔為六世達賴喇嘛辛巳詔免浙江杭湖二府未完漕米三萬九千餘石夏四月乙巳調蕭永藻為吏部尚書王掞為兵部尚書五月己酉朔上巡幸塞外癸酉次花峪溝閱吉林黑龍江官兵丁丑上駐蹕熱河六月己亥命諸皇子恭迎皇太后至熱河避暑戊午刑部尚書張廷樞免秋七月壬午按事湖南尚書蕭永藻等疏報巡撫提督互訐案查審俱實得旨俞益謨休致趙申喬革職留任閏七月甲寅上行圍八月乙亥詔福建漳泉二府旱運江浙漕糧三十萬石賑之並免本年未完額賦丙戌上還駐熱河庚寅以范時崇為福建浙江總督額倫特為湖南提督九月辛丑上奉皇太后還宮辛亥希福納免時戶部虧蝕購辦草豆銀兩事覺積十餘年歷任尚書侍郎凡百二十人虧蝕至四十餘萬上寬免逮問責限償完希福納現任尚書特斥之以穆和倫為戶部尚書貝和諾為禮部尚書冬十月甲子詔曰朕臨御天下垂五十年誠念民為邦本政在養民迭次蠲租數萬萬以節儉之所餘為渙解之弘澤惟體察民生未盡康阜良由生齒日繁地不加益宜沛鴻施藉培民力自康熙五十年始普免天下錢糧三年而徧直隸奉天浙江福建廣東廣西四川雲南貴州九省地丁錢糧察明全免歷年逋賦一體豁除其五十一年五十二年應蠲省分屆時候旨地方大吏以及守令當體朕保乂之懷實心愛養庶幾昇平樂利有可徵矣文到其刊刻頒布咸使聞知丁卯諭外藩已朝行在勿庸朝正丙子以郭瑮為雲南貴州總督以郭世隆為刑部尚書鄂海為湖廣總督癸未諭大學士江南虧空錢糧多至數十萬兩此或朕數次南巡地方挪用張鵬翮謂俸工可以抵補牧令無俸仍以累民莫若免之為善其會議以聞十一月辛卯朔詔凡遇蠲賦之年免業主七分佃戶三分著為令大學士陳廷敬以老乞休溫旨慰諭命致仕乙巳上謁陵以蕭永藻為大學士王掞為禮部尚書徐元正為工部尚書丁未以孫徵灝為兵部尚書乙卯以桑額為吏部尚書十二月癸酉以赫壽為漕運總督戊寅上還京辛巳詔曰朕因朝列舊臣漸次衰謝順治年間進士去職在籍者已無多人王士禛江皋周敏政葉矯然徐淑嘉皆以公過屏廢俱復還原官以趙申喬為左都御史是歲免直隸江南等省七州縣災賦有差朝鮮安南入貢五十年辛卯春正月癸丑上巡畿甸視通州河堤二月辛酉以班迪為滿洲都統善丹為蒙古都統丁卯閱筐兒港命建挑水壩次河西務上登岸步行二里許親置儀器定方向釘樁木以紀丈量之處諭曰用此法可以測量天地日月交食算法原於易用七九之奇數不能盡者用十二二十四之偶數乃能盡之即取象十二時二十四氣也庚午上還京辛巳上御經筵三月庚寅王大臣以萬壽節請上尊號自平滇以來至是凡四請矣上謙挹有素終不之許夏四月庚申徐元正養親回籍以陳詵為工部尚書庚辰上奉皇太后避暑熱河乙未命禮部祈雨庚子大雨丙午留京大學士張玉書卒上悼惜賦詩一篇遣官治喪賜銀一千兩加祭葬諡文貞己酉詔免江蘇無著銀十萬兩有奇丙辰召致仕大學士陳廷敬入閣辦事增鄉會試五經中額六月戊辰設廣西西隆州儒學訓導秋七月丙辰上行圍八月庚午高宗純皇帝生以王原祁為掌院學士設先賢子游後裔五經博士九月戊申上奉皇太后還宮藍理有罪免以楊琳為福建陸路提督馬際伯為四川提督停本年秋決冬十月丙辰詔免臺灣五十一年應徵稻穀貝和諾免以嵩祝為禮部尚書戊午詔前旨普免天下錢糧五十一年輪及山西河南陝西甘肅湖北湖南六省地丁錢糧及逋欠俱行蠲免庚午以碩鼐為滿洲都統瑚世巴馬爾賽為蒙古都統戊寅免朝鮮白金豹皮歲貢庚辰詔舉孝義辛巳命張鵬翮置獄揚州按江南科場案壬午鄂繕耿額齊世武悟禮等有罪褫職拘禁趙申喬疏劾新科編修戴名世恃才放蕩語多悖逆下部嚴審十一月丙戌以殷特布為漢軍都統隆科多為步軍統領張谷貞為雲南提督丁未上謁陵賜守陵官役馬匹白金十二月癸酉上還宮癸未祫祭太廟是歲免直隸安徽等省八州縣災賦有差朝鮮琉球入貢丁戶二千四百六十二萬一千三百二十四田地六百九十三萬三百四十四頃三十四畝徵銀二千九百九十萬四千六百五十二兩八錢鹽課銀三百七十二萬九千二百二十八兩鑄錢三萬七千四百九十三萬三千四百有奇五十一年壬辰春正月丙午擢編修張逸少為翰林院侍讀學士故大學士張玉書之子也壬子命內外大臣具摺陳事摺奏自此始癸丑上巡幸畿甸詔右衞將軍宗室費揚古辦事誠實供職年久且係王子可封為輔國公二月丁巳詔宋儒朱子配享孔廟在十哲之次江蘇巡撫張伯行與總督噶禮互訐俱解任交張鵬翮赫壽查審福建浙江總督范時崇疏陳沿海漁船只許單桅不許越省行走交地方文武鈐束上曰此事不可行漁戶併入水師營則兵弁侵欺之矣盜賊豈能盡除竊發何地無之只視有益於民者行之不當以文法為捕具也戊寅命卓異武官照文職引見庚辰上還京壬午詔曰承平日久生齒日繁嗣後滋生戶口勿庸更出丁錢即以本年丁數為定額著為令三月辛卯諭大學士繙譯本章甚有關繫昨見本內假官二字竟譯作偽官舛錯殊甚其嚴飭之丁酉上御經筵夏四月丁巳賜王世琛等百七十七人進士及第出身有差甲子以康泰為四川提督定會試分省取中例壬申諭故大學士熊賜履夙學舊臣身歿以後時軫於懷聞其子已長成可令來京錄用壬戌予故一等待衞海青副都統銜予祭葬諡果毅致仕大學士陳廷敬卒命皇三子奠茶酒御賦輓詩命南書房翰林勵廷儀張廷玉齎焚予治喪銀一千諡文貞詔明年六旬萬壽二月特行鄉試八月會試以嵩祝為大學士黑碩咨為禮部尚書滿篤為工部尚書以王掞為大學士陳詵為禮部尚書起張廷樞為工部尚書丙子上奉皇太后避暑熱河啟鑾壬午上駐蹕熱河五月壬寅命有司稽察流民徙邊種地者以穆丹為左都御史鄂代為蒙古都統六月癸丑朔日有食之丁巳命穆和倫張廷樞覆按江南督撫互訐案湖廣鎮筸紅苗吳老化率毛都塘等五十二寨內附辛酉以張朝午為廣西提督秋八月癸丑上行圍戊寅詔朝鮮遇有中國漁船違禁至界汛許拘執以聞鎮筸苗民續內附八十三寨九月庚戌上奉皇太后還宮皇太子胤礽復以罪廢錮於咸安宮冬十月壬戌穆和倫等覆按江南獄上上命奪噶禮職張伯行復任以揆為左都御史赫壽為江南江西總督十一月乙酉前福建提督藍理獄上應死上念征臺灣功特原之己亥羣臣以萬壽六旬請上尊號不許丁未以復廢皇太子胤礽告廟宣示天下己酉上謁陵賜守陵大臣白金十二月甲戌上還京是歲免直隸江南山東浙江等省二十三州縣災賦有差朝鮮入貢五十二年癸巳春正月戊申詔封後藏班禪胡土克圖喇嘛為班禪額爾得尼二月庚戌趙申喬疏言太子國本應行冊立上以建儲大事未可輕定宣諭廷臣以原疏還之乙卯上巡幸畿甸編修戴名世以著述狂悖棄市進士方苞以作序干連免死入旗旋赦出之乙亥上還駐暢春園三月戊寅朔諭王大臣朕昨還京見各處為朕保釐乞福者不計其數實覺愧汗萬國安即朕之安天下福即朕之福祝延者當以茲為先朕老矣臨深履薄之念與日俱增敢滿假乎又諭各省祝壽老人極多倘有一二有恙者可令太醫看治朕於十七日進宮經棚老人已得從容瞻覲十八日正陽門行禮不必再至龍棚各省漢官傳諭知悉甲午上還宮各省臣民夾道俯伏歡迎上駐輦慰勞之乙未萬壽節上朝慈寧宮御太和殿受賀頒詔覃恩錫高年舉隱逸旌孝義蠲逋負魚眾寡孤獨無告者官為養之罪非殊死咸赦除焉壬寅召直省官員士庶年六十五以上者賜宴於暢春園皇子視食宗室子執爵授飲扶掖八十以上老人至前親視飲酒諭之曰古來以養老尊賢為先使人人知孝知弟則風俗厚矣爾耆老當以此意告之鄉里昨日大雨田野霑足爾等速回無誤農時是日九十以上者三十三人八十以上者五百三十八人各賜白金加祝釐老臣宋犖太子少師田種玉太子少傅甲辰宴八旗官員兵丁閒散於暢春園視食授飲視飲賜金同前是日九十以上者七人八十以上者一百九十二人夏四月甲寅以鄂海為陝西四川總督額倫特為湖廣總督高其位為湖廣提督四川提督岳昇龍請入籍四川許之丁卯遣官告祭山川古陵闕里五月丙戌上奉皇太后避暑熱河調張廷樞為刑部尚書王頊齡為工部尚書頒賚蒙古老人白金辛丑詔停本年秋決閏五月乙卯賚熱河老人白金御史陳汝咸招撫海寇陳尚義入見詢海上情勢及洋船形質命於金州安置置水師營六月丁丑修律算書秋七月壬子詔宗人削屬籍者子孫分別繫紅帶紫帶載名玉牒丙寅上行圍八月丁丑蒙古鄂爾多斯王松阿拉布請於察罕託灰遊牧不許命遊牧以黃河為界從總兵范時捷請也九月甲子上奉皇太后還宮辛未以江南漕米十萬石分運廣東福建平糶冬十月丙子以張鵬翮為吏部尚書乙酉賜王敬銘等一百四十三人進士及第出身有差十一月己酉詔免廣東福建甘肅二十一州縣衞明年稅糧癸亥上謁陵十二月己卯以赫奕為工部尚書辛卯令文武科目願兼應者許改試一科壬辰上還京甲午以五鬲為蒙古都統辛丑祫祭太廟是歲免浙江十州縣災賦有差朝鮮琉球入貢五十三年甲午春正月己未命修壇廟殿廷樂器癸亥戶部請禁小錢上曰凡事必期便民若不便於民而惟言行法雖厲禁何益戊辰上巡幸畿甸丁卯以何天培為京口將軍二月甲戌詔停今年秋審矜疑人犯審理具奏配流以下減等發落乙酉上還京癸丑命侍郎常泰少卿陳汝咸赴甘肅賑撫災民丁巳前尚書王鴻緒進明史列傳二百八十卷命付史館夏四月戊子改師懿德為甘肅提督辛卯上奉皇太后避暑熱河六月乙亥詔拉藏汗年近六十二子在外宜防外患善自為謀癸未以炎暑免從臣晚朝秋七月辛卯詔以江南暵旱浙江米貴河南歉收截漕三十萬石分運三省平糶八月乙亥上行圍九月丙寅上奉皇太后還宮冬十月己巳朔命張鵬翮阿錫鼐往按江南牟欽元獄己丑命大學士南書房翰林考定樂章十一月敕戶部截漕三十餘萬石於江南浙江備賑戊申免甘肅靖邊二十八州縣衞明年額賦誠親王胤祉等以御製律呂正義進呈得旨律呂曆法算法三書共為一部名曰律曆淵源甲寅冬至祀天於圜丘奏新樂丙辰上巡幸塞外貝勒胤禩屬下人雅齊布有罪伏誅遣何國棟測量廣東雲南等省北極出地及日景十二月癸酉上駐特布克賜隨圍蒙古兵銀幣己丑上還京辛卯洮岷邊外生番喇子等一十九族內附是歲免江南河南甘肅浙江湖廣等省百二十二州縣災賦有差朝鮮入貢五十四年乙未春正月甲子停五經中式例封阿巴垓台吉德木楚克為輔國公詔貝勒胤禩延壽溺職停食俸二月戊辰朔張伯行緣事解任交張鵬翮審理己巳以施世綸為漕運總督辛未上巡幸畿甸諭巡撫趙弘燮曰去年臘雪豐盈今年春雨應節民田想早播種但慮起發太盛或有二疸之虞可示農民芸耨宜疏以防風霾又諭朕時巡畿甸見民生差勝於前但誦讀者少風俗攸關宜令窮僻鄉壤廣設義學勸令讀書爾有司其留意甲午以杜呈泗為江南提督穆廷栻為福建陸路提督三月己亥以蒙古吳拉忒等部十四旗雪災命尚書穆和倫運米往賑教之捕魚為食庚子以趙弘燮為直隸總督任巡撫事以睦森為寧古塔將軍夏四月庚午賜徐陶璋等一百九十人進士及第出身有差己卯師懿德奏策旺阿拉布坦兵掠哈密遊擊潘至善擊敗之命尚書富寧安將軍席柱率師援勦祁里德赴推河諭喀爾喀等備兵庚辰徵外藩兵集歸化城調打牲索倫兵赴推河己丑諭議政大臣朕曾出塞親征周知要害今討策旺阿拉布坦進兵之路有三一由噶斯直抵伊里河源趨其巢穴一越哈密吐魯番深略敵境一取道喀爾喀至博克達額倫哈必爾漢度嶺扼險三路並進大功必成壬午漕運總督郎廷極卒上稱其撫恤運丁歷運無阻予祭葬諡溫勤辛卯上奉皇太后避暑熱河乙未命富寧安分兵戍噶斯口總兵路振聲駐防哈密五月丙午黑龍江將軍宗室楊福卒賜銀一千兩命侍衞尚崇義傅森馳驛賜奠諡襄毅命其子三官保暫署父任戊午內閣侍讀圖理琛使於鄂羅斯使備兵六月壬申命都統圖斯海等赴湖灘河朔運糧甲戌富寧安席柱疏報進兵方略得旨明年進兵丁亥兵部尚書孫徵灝卒賜鞍馬二散馬二銀五百兩諡清端秋七月甲午朔命和托輝特公博貝招撫烏梁海辛酉命公傅爾丹往烏蘭古等處屯田八月辛未大學士李光地乞假歸上賦詩送之癸酉上行圍壬辰撤噶斯口戍兵還肅州九月己酉博貝招撫烏梁海部來歸冬十月丙寅上諭大學士朕右手病不能寫字用左手執筆批答奏摺期於不洩漏也辛巳上奉皇太后還宮詔順天保定河間永平宣化今歲雨溢穀耗不登所有五府應完五十五年稅糧悉蠲除之十一月甲午以范時崇為左都御史覺羅滿保為浙江福建總督宗室巴塞為蒙古都統庚子停京師決囚辛丑以宋臣范仲淹從祀孔廟己未冬至祀天於圜丘始用御定雅樂十二月己巳以塔拜為杭州將軍命護軍統領晏布帥師駐西寧甲申張伯行以疑贓誣參論罪應死上原之起為倉場侍郎是歲免江南湖南二省二十四州縣衞災賦有差朝鮮琉球入貢五十五年丙申春正月壬子上幸湯泉二月乙丑命副都統蘇爾德經理圖呼魯克等處屯田癸酉上還駐暢春園丙子詔免安南歲貢犀角象牙己卯上巡幸畿甸庚寅定丁隨地出例三月丁酉卹贈廣西右江勦瑤傷亡參將王啟雲官廕庚子上還宮乙巳召席柱還以晏布代之路振聲參軍事癸丑蒙古圖爾胡特貝子阿拉布珠爾請從軍命率蒙古兵戍噶斯口貴州巡撫劉蔭樞疏請罷兵命乘傳詣軍周閱議奏閏三月癸亥以額倫特署西安將軍滿丕署湖廣總督丁丑以左世永為廣西提督壬午發京倉米二十萬石賑順天永平五城粥廠展期至秋命禮部祈雨夏四月癸卯上奉皇太后避暑熱河五月庚申上駐熱河齋居祈雨起馬齊為大學士穆和倫為戶部尚書壬戌發倉米平糶預發八旗兵糧甲子雨上曰宋儒云求雨得雨旱豈無因此言可味也己巳京師遠近雨足上復常膳乙酉赫奕免以孫渣齊為工部尚書六月丙辰上幸湯泉秋七月辛未命移噶斯口防軍分戍察罕烏蘇噶順癸未上行圍八月乙卯前奉天府尹董弘毅坐將承德等九州縣米豆改徵銀兩致倉儲闕乏黜官九月庚午以蔣陳錫為雲南貴州總督甲申上奉皇太后還宮冬十月丁亥朔詔刑部積歲緩決長繫人犯分別減釋之停本年秋決戊子以托留為黑龍江將軍趙弘燦為兵部尚書癸巳詔近以策旺阿拉布坦侵入哈密徵兵備邊一切飛芻輓粟經過邊境不無借資民力所有山西陝西甘肅四十八州縣衞應徵明年銀米穀草及積年逋欠悉與蠲除丁酉詔肅州與布隆吉爾毗連迤北西吉木達里圖金塔寺等處招民墾種以楊琳為廣東廣西總督以宗室巴賽為滿洲都統晏布為蒙古都統丙午策旺阿拉布坦執青海台吉羅卜藏丹濟布犯噶斯口官兵擊走之命額倫特駐師西寧分兵戍噶斯口布隆吉爾散秩大臣阿喇衲赴巴爾庫爾參贊軍事十一月乙丑以傅爾丹額爾錦為領侍衞內大臣戊辰上謁陵甲申上巡行塞外盜發明陵命置之法十二月己酉上還京詔免順天永平三十五州縣明年地丁稅糧其積年逋賦併除之是歲免直隸江南山東浙江江西湖廣等省六十三州縣災賦有差朝鮮安南入貢五十六年丁酉春正月丁卯修周易折中成頒行學宮壬午以徐元夢為左都御史朱軾為浙江巡撫二月丙戌朔上巡幸畿甸乙未徵奉天吉林兵益祁里德軍癸卯上還駐暢春園丁未定盜案法無可寬情有可原例順承郡王諾羅布薨諡曰忠子錫保襲封左都御史揆卒予祭葬諡文端三月丁巳上御經筵戊寅以富寧安為靖逆將軍傅爾丹為振武將軍祁里德為協理將軍視師防邊壬午上巡視河西務隄夏四月乙酉上還駐暢春園乙未發通州倉米分貯直隸州縣備賑丙申碣石鎮總兵陳昂奏天主教堂各省林立宜行禁止從之以孫柱范時崇為兵部尚書辛丑上奉皇太后避暑熱河五月庚申九卿議王貝勒差人出外查無勘合即行參究六月壬子傅爾丹襲擊厄魯特博羅布爾哈蘇斬俘而還兵部尚書趙弘燦卒予祭葬諡清端秋七月丙辰策旺阿拉布坦遣其將策零敦多布侵掠拉藏癸亥富寧安襲擊厄魯特於通俄巴錫進及烏魯木齊毀其田禾還軍遇賊畢留圖擊敗之陣亡灰特台吉扎穆畢追封輔國公八月壬午朔上行圍九月辛未以路振揚署四川提督河南奸民亢珽滋事官兵捕之珽走死命尚書張廷樞學士勒什布往鞫得前巡撫李錫貪虐激變狀以聞李錫褫職論死賊黨伏誅冬十月乙酉命侍郎梁世勳海壽往督巴爾庫爾屯田庚子上奉皇太后還宮乙巳命內大臣公策旺諾爾布將軍額倫特侍衞阿齊圖等率師戍青海以宗室公吞珠為禮部尚書蔡升元為左都御史十一月壬子命停決囚乙丑皇太后不豫上省疾慈寧宮辛未詔曰帝王之治必以敬天法祖為本合天下之心以為心公四海之利以為利制治於未亂保邦於未危夙夜兢兢所以圖久遠也朕八齡踐祚在位五十餘年今年近七旬矣當二十年時不敢逆計至三十三十年時不敢逆計至四十賴宗社之靈今已五十七年矣非涼德所能致也齒登耆壽子孫衆多天下和樂四海乂安雖未敢謂家給人足俗易風移而欲使民安物阜之心始終如一殫竭思慮耗敝精力殆非勞苦二字所能盡也古帝王享年不永書生每致譏評不知天下事煩不勝其勞慮也人臣可仕則仕可止則止年老致仕而歸猶得抱子弄孫優游自適帝王仔肩無可旁委舜歿蒼梧禹殂會稽不遑寧處終鮮止息洪範五福終於考終命以壽考之難得也易遯六爻不及君主人君無退藏之地也豈當與臣民較安逸哉朕自幼讀書尋求治理年力勝時挽強決拾削平三藩綏輯漠北悉由一心運籌未嘗妄殺一人府庫帑金非出師賑饑未敢妄費巡狩行宮不施采繢少時即知聲色之當戒佞倖之宜遠幸得粗致謐安今春頗苦頭暈形漸羸瘦行圍塞外水土較佳體氣稍健每日騎射亦不疲乏復以皇太后違和頭暈復作步履艱難倘一時不諱不得悉朕衷曲死者人之常理要當於明爽之時舉平生心事一為吐露方為快耳昔人每云帝王當舉大綱不必兼綜細務朕不謂然一事不謹即貽四海之憂一念不謹即貽百年之患朕從來蒞事無論鉅細莫不慎之又慎惟年既衰暮祗懼五十七年憂勤惕勵之心隳於末路耳立儲大事豈不在念但天下大權當統於一神器至重為天下得人至難是以朕垂老而惓惓不息也大小臣工能體朕心則朕考終之事畢矣茲特召諸子諸卿士詳切言之他日遺詔備於此矣甲戌免八旗借支銀二百萬兩丙子詔免直隸安徽江蘇浙江湖廣陝西甘肅等省積年逋賦江蘇安徽並免漕項銀米十分之五十二月甲申皇太后病勢漸增上疾七十餘日矣脚面浮腫扶掖日朝寧壽宮丙戌皇太后崩頒遺誥上服衰割辮移居別宮己酉上還宮是歲朝鮮入貢五十七年戊戌春正月乙卯上有疾幸湯泉戊寅賜防邊軍士衣二萬襲二月庚寅拉藏乞師命侍衞色楞會青海兵往援癸卯以路振聲為甘肅提督檢討朱天保上疏請復立胤礽為皇太子上於行宮親訊之曰爾何知而違旨上奏朱天保曰臣聞之臣父臣父令臣言之上曰此不忠不孝之人也命誅之丁未上還宮碣石鎮陳昂疏請洋船入港先行查取大礮方許進口貿易部議不行三月癸丑減大興宛平門廠房稅辛酉上大行皇后諡曰孝惠仁憲端懿純德順天翊聖章皇后丙寅以顏壽為右衞將軍黃秉鉞為福州將軍戊辰裁起居注官甄別不職學政叢澍等七員俱褫職丁丑命浙江南北新關稅交同知管理戊寅浙江巡撫朱軾請修海寧石塘從之夏四月乙酉葬孝惠章皇后於孝東陵丁亥賜汪應銓等一百七十一人進士及第出身有差辛卯上幸熱河穆和倫免以孫渣齊為戶部尚書五月癸丑以徐元夢為工部尚書丁巳額倫特奏拉藏汗被陷身亡二子被殺達賴班禪均被拘己未浙江福建總督滿保疏臺灣一郡有極衝口岸九處次衝口岸十五處派人修築酌移員弁設淡水營守備從之六月壬辰遣使冊封琉球故王曾孫尚敬為中山王己丑大學士李光地卒命皇五子恆親王胤祺往奠茶酒賜銀一千兩徐元夢還京護其喪事諡文貞丁未賜哈密軍士衣四百襲秋七月己未打箭爐外墨𩹉喇嘛內附甲戌修省方盛典八月壬子索倫水災遣官賑之孟光祖伏誅戊子上行圍甲午禮部尚書吞珠卒予祭葬諡恪敏總兵官仇機有罪伏誅閏八月戊辰詔曰夷虜跳梁大兵遠駐西邊一切征繕秦民甚屬勞苦所有陝西甘肅明年地丁糧稅俱行蠲免歷年逋賦亦盡除之九月己卯命都統阿爾納總兵李耀率師赴噶斯口柴旦木駐防丙戌以王頊齡為大學士陳元龍為工部尚書甲辰上還京將軍額倫特侍衞色楞會師喀喇烏蘇屢敗賊賊愈進師無後繼矢竭力戰歿於陣冬十月甲寅停本年決囚丙辰命皇十四子貝子胤禵為撫遠大將軍視師青海命殉難總督甘文焜知府黃庭柏建祠列祀甲子詔四川巡撫年羹堯軍興以來辦事明敏即升為總督命翰林科道輪班入直戊辰上駐湯泉命皇七子胤祐皇十子胤皇十二子胤祹分理正黃正白正藍滿蒙漢三旗事務十一月丙子上還駐暢春園福建巡撫陳璸卒贈禮部尚書諡清端以宜兆熊為漢軍都統十二月丙辰上謁陵己未孝惠章皇后升祔太廟位於孝康章皇后之左頒詔天下雲南撒甸苗人歸順己巳上還宮是歲免江南福建甘肅湖廣等省二十六州縣衞災賦有差朝鮮琉球安南入貢五十八年己亥春正月甲戌朔日有食之詔曰日食三始垂象維昭宜修人事以儆天戒臣工其舉政事闕失以聞乙未上幸湯泉庚子上還駐暢春園辛丑詔立功之臣退閒世職准子弟承襲若無應襲之人給俸終其身壬寅命截漕米四十三萬石留江蘇安徽備荒二月己巳上巡幸畿甸己卯學士蔣廷錫表進皇輿全覽圖頒賜廷臣庚申上還駐暢春園辛未命都統法喇撫輯𩹉塘巴塘護軍統領噶爾弼同理軍事三月乙未侍郎色爾圖以運饟遲延罷命巡撫噶什圖接管夏四月乙巳命撫遠大將軍胤禵駐師西寧癸丑上巡幸熱河五月戊寅以麥大熟命民間及時收貯庚辰以揚都為蒙古都統浙江正考官索泰賄賣關節在籍學士陳恂說合陳鳳墀夤緣中式均論死並罪其保薦索泰為考官者南陽標兵執辱知府沈淵總兵高成革職游擊王洪道論死兵處斬六月甲辰以貝勒滿篤祜為滿洲都統丁未年羹堯噶爾弼法喇先後奏副將岳鍾琪招輯𩹉塘巴塘就撫命法喇進駐巴塘年羹堯撥兵接應丙寅以馬見伯為固原提督秋七月癸未以宗查木為西安將軍八月庚戌上行圍庚申振威將軍傅爾丹奏鄂爾齋圖二處築城設站命尚書范時崇往董其役九月乙未諭西寧現有新胡畢勒罕實係達賴後身令大將軍遣官帶兵前往西藏安禪戊戌安郡王華薨諡曰節冬十月丁未上還京壬子命蒙養齋舉人王蘭生修正音韻圖甲寅固原提督潘育龍卒贈太子少保予祭葬諡襄勇十一月丙子禮部尚書陳詵致仕庚寅增江西解額十二月壬寅以蔡升元為禮部尚書田從典為左都御史戊申西安將軍額倫特之喪至京命皇五子恆親王胤祺皇十二子貝子胤祹迎奠庚申命截湖廣漕糧十萬石留於本省備荒辛酉詔曰比年興兵西討遠歷邊陲居送行賫民力勞瘁所有沿邊六十六州縣衞所明年額徵銀米俱行蠲免是歲免江蘇安徽等省十三州縣災賦有差朝鮮琉球入貢五十九年庚子春正月丁酉命撫遠大將軍胤禵移師穆魯斯烏蘇以宗室延信為平逆將軍領兵進藏以公策旺諾爾布參贊軍務命西安將軍宗查木駐西寧平郡王訥爾素駐古木二月甲辰上巡幸畿甸癸丑命噶爾弼為定西將軍率四川雲南兵進藏冊封新胡畢勒罕為六世達賴喇嘛辛酉上還駐暢春園三月己丑命雲南提督張谷貞駐防麗江中甸丙申命靖逆將軍富寧安進師烏魯木齊散秩大臣阿喇衲進師吐魯番祁里德領七千兵從布婁爾傅爾丹領八千兵從布拉罕同時進擊準噶爾夏四月戊申上巡幸熱河五月辛巳以旱求言壬午雨六月己亥陝西饑運河南積穀往賑丙辰保安懷來地震遣官賑之秋七月丙寅朔日有食之癸酉富寧安擊賊於阿克塔斯伊爾布爾和韶敗之擒其台吉垂木拍爾阿喇衲師至齊克塔木遇賊擊破之盡虜其衆進擊皮禪城降之師至吐魯番番酋阿克蘇爾坦率衆迎降丙戌傅爾丹擊賊於格爾厄爾格斬獲六百陣擒寨桑貝肯焚其積聚而還貝肯送京祁里德敗賊於鏗額爾河降其寨桑色布騰等二千餘人八月戊戌上行圍庚子琉球請令其陪臣子弟入國子監讀書許之癸丑平逆將軍延信連敗賊衆於卜克河丁巳又敗賊衆於綽馬喇賊將策零敦多布遁定西將軍噶爾弼率副將岳鍾琪自拉里進兵戊午克西藏執附賊喇嘛百餘斬其渠五人撫諭唐古特土伯特西藏平以高其倬為廣西巡撫九月壬申平逆將軍延信以兵送達賴喇嘛入西藏坐富寧安兵入烏魯木齊哈西哈回人迎降軍迴至烏蘭烏蘇戊寅雲貴總督蔣陳錫巡撫甘國璧以饋饟後期褫職仍令運米入藏冬十月癸卯上還京詔再以河南積穀運往陝西放賑明年河南漕糧照數補還倉穀其餘漕糧留貯河南甲辰朝鮮國王李焞薨詔曰李焞襲封五十年奉藩恭謹撫民慈愛茲聞溘逝惻悼實深即令王子李昀襲封所進貢物悉數帶回仍查卹典具奏詔陝西甘肅兩省康熙六十年地丁銀一百八十八萬兩零通行蠲免沿邊歉收米價昂貴兵力拮据並豫發本年兵饟賚進藏官兵甲寅戶部尚書趙申喬卒予祭葬諡恭毅丁巳詔撫遠大將軍胤禵會議明年師期戊午以陝西甘肅歉收命銀糧兼賑以麥收為止十一月辛未遣官致祭朝鮮國王李焞特諡僖順冊封世子李昀為朝鮮國王戊寅以田從典為戶部尚書朱軾為左都御史以楊名時為雲南巡撫辛巳詔大兵入藏其地俱入版圖山川名號番漢異同應即考訂明覈傳信後世上因與大學士講論河源江源及於禹貢三危庚寅以隆科多為理藩院尚書仍兼步軍統領十二月甲辰廷臣再請行六十年慶賀禮不允壬子授先賢子夏後裔五經博士甲寅以誠親王胤祉子弘晟恆親王胤祺子弘昇為世子辛酉祫祭太廟是歲免直隸江蘇陝西浙江四川等省五十六州縣衞災賦有差朝鮮琉球入貢六十年辛丑春正月乙亥上以御極六十年遣皇四子胤禛皇十二子胤祹世子弘晟告祭永陵福陵昭陵二月乙未上謁孝莊山陵孝陵孝東陵行告祭禮遣官告祭郊廟社稷乙卯上還京山東鹽徒王美公等作亂捕斬之己未命公策旺諾爾布駐防西藏論取藏功封第巴阿爾布巴康濟鼐為貝子第巴隆布奈為輔國公三月乙丑羣臣請上萬壽節尊號上不許曰加上尊號乃相沿陋習不過將字面上下轉換以欺不學之君耳本朝家法惟以愛民為事不以景星慶雲芝草甘露為瑞亦無封禪改元之舉現今西陲用兵兵久暴露民苦轉輸朕方修省經營之不暇何賀之有庚午賜舉人王蘭生留保進士一體殿試甲戌先是大學士王掞密疏復儲至是御史陶彝任坪范長發鄒圖雲陳嘉猷王允晉李允符范允高玢高怡趙成孫紹曾疏請建儲上不悅並掞切責之命其子詹事王奕清及陶彝等十二人為額外章京軍前効力夏四月甲午以李麟為固原提督乙未賜鄧鍾岳等一百六十三人進士及第出身有差丙申詔釐定歷代帝王廟崇祀祀典丁酉命張鵬翮陳鵬年赴山東閱河以賴都為禮部尚書托賴為刑部尚書丙午上幸熱河戊午命定西將軍噶爾弼駐藏五月壬戌命撫遠大將軍胤禵移師甘州丙寅臺灣奸民朱一貴作亂戕總兵官歐陽凱癸酉以署參將管永寧協副將岳鍾琪為四川提督乙亥改思明土州歸廣西太平府戊寅詔停本年進兵以常授為理藩院額外侍郎辦事西寧乙酉以年羹堯為四川陝西總督賜弓矢發帑金五十萬賑山西陝西命朱軾盧詢董其事六月壬辰改高其位為江南提督魏經國為湖廣提督丙申詔曰平逆將軍延信朕之姪也統兵歷從古未到之烟瘴絕域殲滅巨虜平定藏地允稱不辱宗支可封為輔國公乙卯吐魯番回人拖克拖麻穆克等來歸命散秩大臣阿喇衲率兵護之福建水師提督施世驃平臺灣擒朱一貴解京詔奬淡水營守備陳策固守功超擢臺灣總兵閏六月庚申朔日有食之丙寅令刑部弛輕繫戊辰以噶爾弼為蒙古都統秋七月己酉上行圍八月甲戌命副都統莊圖率兵二千進駐吐魯番益阿喇衲軍丙戌河決武陟入沁水九月辛卯命副都統穆克登將兵二千赴吐魯番甲午噶爾弼以病罷命公策旺諾爾布署定西將軍駐藏以阿寶武格參軍事丙申策旺阿拉布坦犯吐魯番阿喇衲擊走之丙午賑河南山東直隸水災乙卯上還京丙辰命副都御史牛鈕侍講齊蘇勒員外郎馬泰築黃河決口引沁水入運河丁巳以阿喇衲為協理將軍上製平定西藏碑文冬十月壬戌置巡察臺灣御史詔本年秋審俱已詳覽其直省具題緩決之案九卿已加核定朕不忍覆閱恐審求之或致改重也丙寅召撫遠大將軍胤禵來京辛未詔大學士熊賜履服官清正學問博通朕久而弗忘常令周恤其家今其二子來京觀其氣質尚可讀書宜加造就可傳諭九卿知之以鍾世臣為浙江提督姚堂為福水師提督馮毅署廣東提督十一月辛卯以陳鵬年署河道總督戊戌以馬武伊爾哈岱為蒙古都統己酉上幸南苑詔將軍額倫特侍衞色楞副都統查禮渾提督康泰等殺敵殉國俱賜卹十二月壬申四川提督岳鍾琪征郭羅克番人平之丁丑上還駐暢春園遣鄂海永泰往視吐魯番屯田是歲免江南河南陝西甘肅福建浙江湖廣等省一百二十三州縣災賦有差朝鮮琉球安南入貢丁戶二千九百一十四萬八千三百五十九又永不加賦後滋生人丁四十六萬七千八百五十徵銀二千八百七十九萬零鹽課銀三百七十七萬二千三百六十三兩零鑄錢四萬三千七百三十二萬五千八百有奇六十一年壬寅春正月戊子召八旗文武大臣年六十五以上者六百八十人已退者咸與賜宴宗室授爵勸飲越三日宴漢官年六十五以上三百四十人亦如之上賦詩諸臣屬和題曰千叟宴詩戊申上巡幸畿甸二月庚午以高其倬署雲南貴州總督丙子上還駐暢春園三月丙戌以阿魯為荊州將軍夏四月甲子遣使封朝鮮國王李昀弟昑為世弟丁卯上巡幸熱河己巳撫遠大將軍胤禵復蒞軍癸未福州駐防兵譁將軍黃秉鉞不能約束褫職斬為首者五月戊戌施世綸卒以張大有署漕運總督六月以奉天連歲豐稔弛海禁暹羅米賤聽入內地免其稅辛未命直隸截漕二十萬石備賑丙子趙弘燮卒以其兄子郎中趙之垣加僉都御史銜署直隸巡撫秋七月丁酉征西將軍祁里德上言烏蘭古木屯田事宜請益兵防守命都統圖拉率兵赴之壬寅命色爾圖赴西藏統四川防兵戊申以蔡珽為四川巡撫予故直隸總督趙弘燮祭葬諡肅敏八月丙寅停今年決囚故提督藍理妻子先以有罪入旗至是上念平臺灣功貰還原籍交發免追己卯上駐蹕汗特木爾達巴漢昂阿賜來朝外藩銀幣鞍馬隨圍軍士銀幣九月甲申上駐熱河乙酉諭大學士曰有人謂朕塞外行圍勞苦軍士不知承平日久豈可遂忘武備軍旅數興師武臣力克底有功此皆勤於訓練之所致也甲午年羹堯噶什圖請量加火耗以補有司虧帑上曰火耗只可議減豈可加增此次虧空多由用兵官兵過境或有餽助其始挪用公款久之遂成虧空昔年曾有寬免之旨現在軍需正急即將戶部庫帑撥送西安備用戊戌上迴鑾丁未次密雲閱河隄庚戌上還京冬十月辛酉命雍親王胤禛弘昇延信孫渣齊隆科多查弼納吳爾占察視倉廒壬戌以覺羅德爾金為蒙古都統安鮐為杭州將軍辛未以查弼納為江南江西總督癸酉上幸南苑行圍以李樹德為福州將軍黃國材為福建巡撫十一月戊子上不豫還駐暢春園以貝子胤祹輔國公吳爾占為滿洲都統庚寅命皇四子胤禛恭代祀天甲午上大漸日加戌上崩年六十九即夕移入大內發喪雍正元年二月恭上尊諡九月丁丑葬景陵論曰聖祖仁孝性成智勇天錫早承大業勤政愛民經文緯武寰宇一統雖曰守成實同開創焉聖學高深崇儒重道幾暇格物豁貫天人尤為古今所未覯而久道化成風移俗易天下和樂克致太平其雍熙景象使後世想望流連至於今不能已傳曰為人君止於仁又曰道盛德至善民之不能忘於戲何其盛歟
