body:
  text: 清史稿卷八本紀八聖祖本紀三四十一年壬午春正月壬寅詔修國子監丙午詔繫囚經緩決者減一等以雅爾江阿襲封簡親王庚戌上巡幸五臺山二月庚申次射虎川士民請於菩薩頂建萬壽亭祝釐不許丁卯上巡視子牙河三月壬午上還京以瓦爾岱為滿洲都統吳達禪馬思哈滿丕為蒙古都統丁亥上御經筵夏四月甲戌賜致仕大學士王熙御書匾對傳旨曰卿先朝舊臣其強餐食慎醫藥以慰朕念五月癸巳定發配人犯歸籍僉遣流犯死配所妻子許還鄉里辛丑顯親王丹臻薨遣皇子及大臣治喪賜銀萬兩諡曰密子衍璜襲壬寅先是廉州府連山瑤人作亂御史參奏命都統嵩祝率禁旅會討並命尚書范承勳勘狀至是嵩祝奏官兵一到瑤人乞降先後投出瑤人一萬九千餘名獻出戕官黎貴等九人即於軍前正法降瑤安插交總督料理范承勳奏瑤人滋事副將杜芳傷死總兵劉虎先行退回應擬斬提督殷化行應革職得旨殷化行有戰功改原品致仕劉虎免死丙午召廷臣至保和殿頒賜御書六月壬子貴州葛彝寨苗人為亂官軍討平之戊午上製訓飭士子文頒發直省勒石學宮乙未上奉皇太后幸熱河乙丑四川提督岳昇龍疏報大涼山倮目馬比必率衆內附請授土千戶給印信閏六月辛丑木鴉番民萬九千餘戶內附請置安撫使副使土百戶等職均從之八月庚辰朔增順天浙江湖廣鄉試中額戊申上奉皇太后還宮九月辛亥以李正宗盧崇耀馮國相為漢軍都統壬子定五經中式例癸丑停本年秋決辛酉以齊世嵩祝為滿洲都統莽喀為漢軍都統車納福為蒙古都統甲子詔南巡閱河所過停供張禁科斂官吏無相餽遺百姓各守本業督撫布告使明知朕意己巳以席哈納為大學士敦拜為吏部尚書席爾達為禮部尚書溫達為左都御史管源忠為廣州將軍鎮筸諸生李豐等叩閽言紅苗殺人有司不問詔侍郎傅繼祖甘國樞巡撫趙申喬馳驛按問癸酉上南巡啟鑾冬十月壬午次德州皇太子胤礽有疾上迴鑾癸卯上還宮丙午以郭世隆為廣東廣西總督金世榮為浙江福建總督十一月丙辰詔免陝西安徽明年額賦甲子大學士伊桑阿乞休命致仕壬申廣西巡撫蕭永藻疏劾布政使教化新虧空倉穀應令賠補上曰米穀必有收貯之地乃可經久若無倉廒積於空野難免朽爛況南方卑溼之地乎其別定例以聞命修禹陵十二月壬辰廷臣以明年五旬萬壽請上尊號上不許戶部議駁奉天報災上曰晴雨原無一定始者雨水調和其後被災亦常事耳可准其奏乙未改趙申喬為偏沅巡撫以趙弘燦為廣東提督王世臣為浙江提督孫徵灝為漢軍都統壬寅厄魯特丹津阿拉布坦來朝厚賚之封為郡王賜地遊牧是歲免江南河南浙江湖廣甘肅等省十州縣災賦有差朝鮮琉球入貢四十二年癸未春正月壬子大學士諸臣賀祝五旬萬壽恭進萬壽無疆屏卻之收其寫冊壬戌上南巡閱河丁卯以俞益謨為湖廣提督庚午次濟南觀珍珠泉賦三渡齊河詩壬申次泰安登泰山詔免蹕路所經及歉收各屬去年逋賦二月丁丑運漕米四萬石賑濟寧泰安閱宿遷堤工己卯自桃源登舟徧閱河隄甲申渡江登金山丙戌次蘇州遣官奠大學士宋德宜墓庚寅上駐杭州閱射辛丑次江寧三月戊申上閱高家堰翟家壩隄工己酉上閱黃河南龍窩烟墩等隄庚申上還京癸亥萬壽節上朝皇太后宮免廷臣朝賀頒恩詔錫高年蠲額賦察孝義恤困窮舉遺逸罪非常赦所不原者咸赦除之頒賜親王郡王以下文武百官有差庚午以洞鄂襲封信郡王辛未上御經筵賜內廷修書舉人汪灝何焯蔣廷錫進士一體殿試夏四月辛巳賜王式丹等一百六十三人進士及第出身有差四川威州龍溪十八寨生番歸化納糧丁亥大學士熊賜履乞休命解官食俸留備顧問傅繼祖等察審湖廣紅苗搶掠一案得旨總督郭琇提督杜本植隱匿不報均革職巡撫金璽降官以喻成龍為湖廣總督癸巳致仕大學士王熙卒予祭葬諡文靖丙申以陳廷敬為大學士兼吏部尚書戊戌詔原任侍郎任克溥年逾九十洵為耆碩加尚書銜以李光地為吏部尚書仍巡撫直隸以莽喀為荊州將軍諾羅布為杭州將軍宗室愛音圖為漢軍都統孫渣齊翁俄里為蒙古都統己亥諭八旗人等朕不惜數百萬帑金為旗丁償逋贖地籌畫生計爾等能人人以孝弟為心勤儉為事則足仰慰朕心矣倘不知愛惜仍前游蕩飲博必以嚴法處之親書宣諭其尚欽遵五月壬子裕親王福全有疾上連日視之癸亥內大臣索額圖有罪拘禁於宗人府己巳上巡幸塞外六月辛巳恭親王常寧薨命皇子每日齊集賜銀一萬兩遣官造墳立碑壬寅裕親王福全薨上聞之兼程迴京秋七月乙巳朔上臨裕親王喪哭之慟自蒼震門入居景仁宮王大臣請還乾清宮上曰居便殿乃祗遵成憲也居五日命皇長子等持服命御史羅占造墳建碑諡曰憲子保泰嗣爵戊申以山東大雨遣官分賑庚戌上巡幸塞外己巳發帑金三十萬兩截漕五十萬石賑山東山東有司不理荒政停其升轉八月癸巳停本年秋審九月壬子予故侍郎高士奇勵杜訥祭葬己巳命尚書席爾達督辦紅苗冬十月癸未上西巡啟鑾命給事中滿普御史顧素在後行查僕從生事即時鎖拿庚寅喇嘛請廣洮州衞廟上曰取民地以廣廟宇有碍民生其永行禁止癸巳過井陘次柏井驛驛向乏泉至是井泉湧溢丁酉駐太原戊戌詔免山西逋賦百姓集行宮前籲留車駕上為再停一日十一月乙巳上次洪洞遣官祭女媧陵壬子渡黃河次潼關遣官祭西嶽賜迎駕百歲老人白金甲寅次渭南閱固原標兵射賜提督潘育龍以下加一級丙辰上駐西安丁巳閱駐防官兵射遣官祭周文王武王祭文書御名遣官奠提督張勇梁化鳳墓己未上大閱於西安賜將軍博濟御用弓矢賜官兵宴軍民集行宮前籲留上為留一日賜盩厔徵士李顒御書操志清潔匾額免陝甘逋賦癸亥上迴鑾己巳次陝州命皇三子胤祉往閱三門底柱十二月乙亥上次修武閱懷慶營伍不整逮總兵官王應統入京論死庚辰次磁州御書賢哲遺休額懸先賢子貢墓庚寅上還京辛卯定外任官在本籍五百里內者迴避封常寧子海善為貝勒是歲免直隸江南山東河南陝西浙江湖廣等省九十一州縣災賦有差朝鮮琉球安南入貢四十三年甲申春正月辛酉詔曰朕諮訪民瘼深悉力作艱難耕三十畝者輸租賦外約餘二十石衣食丁徭取給於此幸逢廉吏猶可有餘若誅求無藝則民無以為生是故察吏所以安民要在大吏實心體恤也戊辰詔漢軍一家俱外任者酌改京員己巳上謁陵二月甲戌封淮神為長源佑順大淮之神御書靈瀆安瀾額懸之癸巳上還宮以李基和為江西巡撫能泰為四川巡撫三月辛丑上御經筵已酉詔停熱審辛酉以吳洪為甘肅提督資送山東饑民回籍丙寅以溫達為工部尚書夏四月癸酉命侍衞拉錫察視河源己卯上幸髻山遂閱永定河子牙河丙申上還京五月辛酉以于準為貴州巡撫六月乙亥上巡幸塞外秋九月癸卯詔督撫調員違例者罪之侍郎常授招撫廣東海盜阿保位等二百三十七名就撫為兵戊午刑部尚書王士禛以失出降官癸亥上還宮丁卯侍衞拉錫察視河源還自星宿海繪圖以進冬十月戊辰朔濬楊村舊河甲戌詔免順天河間二府及山東浙江二省明年稅糧庚辰以李振裕為禮部尚書徐潮為戶部尚書屠粹忠為兵部尚書王掞為刑部尚書吳涵為左都御史癸未頒內製銅斗銅升於戶部命以鐵製頒行戊子以趙弘燮為河南巡撫己丑命濬汾渭賈魯諸河辛卯上閱永定河十一月丁酉朔日有食之上還宮上以儀器測驗與七政曆不符欽天監官請罪免之郎中費仰嘏以貪婪棄市辛亥定吏部行取知縣例停督撫保薦戊午湖廣巡撫劉殿衡建御書樓上斥其糜費並嚴禁藉修建侵帑累民者四川陝西總督博霽疏參涼州總兵官魏勳年老上曰魏勳前有軍功兵民愛戴與師帝賓麥良璽潘育龍俱係舊臣難得何可參耶壬戌誡修明史史臣覈公論明是非以成信史十二月乙酉天津總兵官藍理請沿海屯田從之甲午以御製詩集賜廷臣是歲免直隸江南山東湖廣廣東等省一百九州縣災賦有差朝鮮入貢四十四年乙酉春正月戊午古文淵鑑成頒賜廷臣及於官學癸亥上幸湯泉二月乙丑朔上還宮癸酉上南巡閱河詔曰朕留意河防屢行閱視獲告成功茲黃水暢流尚須察驗形勢即循河南下所至勿繕行宮其有科斂累民者以軍法治罪壬午次靜海遣官奠故侍郎勵杜訥墓予諡文恪三月己亥諭山東撫臣曰百姓歡迎道左者日數十萬人計日迴鑾正當麥秀其各務稼穡毋致妨農乙巳上駐揚州授河臣張鵬翮方略辛亥上駐蘇州命選江南浙江舉貢生監善書者入京修書賜公福善大學士張玉書陳廷敬在籍大學士張英都統愛音圖白金賜大學士馬齊等皇輿表己未次松江閱射上書聖迹遺徽額賜青浦孔氏賜故侍郎高士奇諡文恪夏四月丙寅上駐杭州閱射庚午詔赦山東江蘇浙江福建死罪減一等戊寅御書至德無名額懸吳太伯祠並書季札董仲舒焦先周敦頤范仲淹蘇軾歐陽修胡安國米芾宗澤陸秀夫各匾額懸其祠乙酉上駐江寧閏四月癸卯上閱高家堰隄工辛酉上還京五月戊寅上親鞫郎中陳汝弼一案原汝弼罪刑部尚書安布祿左都御史舒輅以失獄免職庚辰以貝和諾為雲南貴州總督丙戌上巡幸塞外六月甲午命行取知縣非再任者不得考選科道庚戌停廣東開礦丙辰上駐蹕熱河秋七月壬申河決清水溝韓莊命河臣察居民田舍以聞八月甲午免八旗借支兵饟銀七十萬兩戊午喻成龍免以石文晟為湖廣總督庚申上發博洛河屯閱牧羣九月己巳進張家口丙子還京甲申以希福納為左都御史達佳為江寧將軍冬十月辛卯朔重修華陰西嶽廟成上製碑文丙午以富寧安為漢軍都統十一月辛酉命蒙古公丹濟拉備兵推河察視策旺阿拉布坦己巳以李光地為大學士宋犖為吏部尚書調趙弘燮為直隸巡撫癸酉詔免湖廣明年額賦及以前逋賦甲戌國子監落成御書倫堂額庚辰以汪灝為河南巡撫乙酉上謁陵巡幸近塞戊子設雲南廣南麗江二府學官許土人應試十二月壬寅上臨裕親王福全葬以阿靈阿兼理藩院尚書己酉上還宮丙辰以祖良璧為福州將軍是歲免直隸江南湖廣廣東等省四十六州縣災賦有差朝鮮琉球入貢四十五年丙戌春正月乙酉命孫渣齊徐潮督濬淮揚引河順天考官戶部侍郎汪霦贊善姚士藟以取士不公褫職二月癸巳上巡幸畿甸丁未次靜海閱子牙河壬子還駐南苑以諸滿為江寧將軍以王然為浙江巡撫江南江西總督阿山劾江寧知府陳鵬年安奉聖訓不敬部議應斬先是乙酉年南巡陳鵬年遵旨不治行宮阿山故假他事劾之上命入京修書戊午上還宮三月庚申上御經筵辛巳賜施雲錦等二百八十九人進士及第出身有差詔直省建育嬰堂夏四月戊子朔日有食之加貴州提督李芳述鎮遠將軍乙未吳涵罷以梅鋗為左都御史五月己未以金世榮為兵部尚書甲戌詔免直隸山東逋賦丁丑以梁鼐為福建浙江總督戊寅上巡幸塞外六月丁亥朔詔修功臣傳癸巳命梅鋗二鬲按容美土司田舜年獄壬寅命凡部寺咨取錢糧非由奏請者戶部月會其數以聞以藍理為福建陸路提督辛亥四川巡撫能泰疏報安樂鐵索橋告成移化林營千總駐守秋七月庚申上駐蹕熱河甲子以德昭嗣封信郡王八月壬辰高家堰車邏壩澗河河隄告成九月己亥上還京冬十月乙酉朔敦拜罷以溫達為吏部尚書希福納為工部尚書庚寅武殿試諭曰今天下承平日久曾經戰陣大臣已少知海上用兵