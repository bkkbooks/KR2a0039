body:
  text: 清史稿卷十一本紀十一高宗本紀二十一年春正月庚午以紀年開袠命減刑癸未命慶復進勦瞻對為李質粹聲援辛卯賑江蘇銅山安徽宿州等州縣飢甲午朝鮮入貢李質粹進攻靈達班滾之母赴營乞命仍縱歸上飭其失機諭慶復督兵前進二月戊戌賑山西大同等十二州縣饑辛丑召北路軍營參贊大臣拉布敦烏勒來京以塔爾瑪善努登代之癸卯上幸南苑行圍丁未免廣東新寧等州縣雲南鶴慶府水災額賦辛亥以三月朔日食詔修省以實定皇后不行親蠶禮之年遣妃代行丙辰免河南永城等五縣水災額賦庚申西藏台吉冷宗鼐以攻瞻對擅徹兵論斬諭宥其死三月己巳免直隸鹽山等八州縣水災額賦甲戌賑雲南白鹽井水災乙亥準噶爾台吉策旺多爾濟那木札勒以新立遣使哈柳貢方物請派人往藏熬茶戊寅慶復至打箭鑪劾李質粹等老師翫寇請續調官兵進勦允之辛巳遣內大臣班第等赴瞻對軍營壬午賜哈柳等宴召見允其往藏熬茶頒如意賚之甲申賜準噶爾台吉策旺多爾濟那木札勒敕予故台吉噶爾丹策零布施丙申免湖北潛江等州縣上年水災額賦慶復奏進駐靈雀閏三月丁酉朔飭陝西修列代陵墓庚子召白鍾山來京命顧琮署江南河道總督高斌暫管之以劉統勳署漕運總督賑直隸宣化府饑賑甘肅隴西等十二州縣水旱雹霜災丙午命汪由敦署左都御史癸丑左都御史杭奕祿休致以阿克敦代之夏四月丁丑白鍾山褫職發南河効力戒軍機處漏洩機密以鄂昌署廣西巡撫丁亥免湖南湘陰等五縣水災額賦己丑免廣東新寧等四州縣水災額賦五月丙申朔以盛安為左都御史阿克敦為刑部尚書丁酉諭顧琮查明南河虛糜之款令白鍾山賠補壬寅免山西大同等十八州縣上年旱霜各災額賦丙午慶復奏進攻瞻對番酋班滾計日授首加慶復太子太保戊申免甘肅靖遠等三縣上年旱災額賦己酉永除直隸慶雲縣每年額賦十分之三乙卯達賴喇嘛等請宥班滾不許以傅清代奏嚴飭之六月丙寅慶復班第等會攻丫魯尼日寨克之班滾自焚死丁卯以打箭鑪口內外番從征効力再免貢賦二年丙子京城地震壬辰命送還俄羅斯逃人于恰克圖秋七月丙申加那蘇圖策楞太子少傅銜周學健太子少保銜丁酉命高斌赴江蘇察看黃運工程劉於義署直隸河道總督壬寅四川大乘教首劉奇以造作逆書磔於市庚戌周學健奏捕天主教二千餘人上以失綏遠之意宥之壬戌賑湖北漢川等七縣水災癸亥以雲南張保太傳邪教蔓延數省諭限被誘之人自首其仍立教堂者捕治之丁卯召吉林將軍巴靈阿來京命阿蘭泰代之賑直隸慶雲等七縣場旱災己巳以四川提督李質粹進勦瞻對欺飾罷之免廣寧等處旗地水災賦辛未賑湖南益陽等四州縣水災癸酉加賞江蘇安徽被水災民修葺房屋銀乙酉賑山東金鄉等十一州縣衞水災庚寅上御瀛臺賜宗室王公等宴改崇雅殿為敦殿辛卯上御瀛臺賜大學士九卿翰林科道等宴宣示七言律詩四章壬辰福建上杭縣民羅日光等糾眾請均佃租滋事捕治之癸巳允朝鮮國王請停奉天設牛哨汛兵九月甲午朔除浙江歸安等三縣沙積坍卸地賦戊戌訓督撫實心行政賑山東滕縣等三州縣兩淮板浦等六場水災己亥命高斌往奉天疏濬河道辛丑停今年秋決以周學健為江南河道總督調陳大受為福建巡撫以安寧署江蘇巡撫定欽差大臣巡閱各省營伍例賑河南鄭州等三州縣水災壬寅命訥親兼管戶部免甘肅隴西等九州縣水災額賦癸卯上奉皇太后啟蹕詣泰陵並巡幸五臺山丁未上謁泰陵己酉阿里袞患病以班第署山西巡撫庚戌賚經過直隸州縣耆民甲寅賑江蘇豐縣等三州縣雹災乙卯上駐蹕五臺山射虎以山西風俗醇樸諭疆吏教養兼施小民崇習禮讓丙辰免山西五臺縣明年額賦十分之三丁巳召馬爾泰來京以喀爾吉善為閩浙總督調塞楞額為山東巡撫陳宏謀為江西巡撫以徐杞為陝西巡撫庚申上奉皇太后回蹕壬戌召鄂彌達來京以塞楞額為湖廣總督調阿里袞為山東巡撫愛必達為山西巡撫賑河南鄢陵等二十六州縣水災冬十月甲子賑山西陽曲等二十二州縣水雹各災丁卯上閱滹沱河隄賑湖北漢川等九州縣衞水災庚午上奉皇太后駐蹕保定府壬申上閱兵賜銀幣有差甲戌以張廣泗發摘逆犯魏王氏劉奇等予定加山西歸綏道兵備銜稽查靖遠營戊寅上奉皇太后還京師調開泰為江西巡撫陳宏謀為湖北巡撫庚辰免張廷玉帶領引見並諭不必向早入朝及勉強進內壬午命汪由敦軍機處行走癸未御史萬年茂以劾學士陳邦彥等獻媚傅恆不實褫職戊子免安徽壽州等二十三州縣水災額賦辛卯撥賑江蘇淮揚徐海各屬災民銀糧二百二十萬兩石有奇十一月癸巳寢甄別科道之命御史李兆鈺下部議處乙未以河南學政汪士鍠考試瞻徇褫職免江蘇山陽等二十四州縣衞水災額賦並分別蠲緩漕糧有差乙巳除奉天錦縣等二縣衝壓地賦己酉予故內閣學士張若靄治喪銀並諭張廷玉節哀自愛辛亥李質粹發軍前効力戊午慶復奏大金川土司莎羅奔擾小金川倘不遵剖斷惟有用番力以收功上是之十二月癸亥召班第來京以陶正中護山西巡撫甲子賑湖北潛江等七州縣衞水災乙丑以傅清奏達賴喇嘛看茶之綏綳喇嘛鎮壓郡王頗羅鼐賜手敕慰解之並諭以與達賴喇嘛同心協力保安地方戊辰以瑚寶為駐防哈密總兵甲戌免直隸靜海蟲災額賦並賑之丁丑以張廷玉年老命其子庶吉士張若澄在南書房行走俾資扶掖戊寅賑甘肅安定等州縣旱災免山東金鄉等八州縣水災額賦庚辰除廣西永福水衝地賦癸未準噶爾台吉策旺多爾濟那木札勒遣使瑪木特等入覲召見於太和齋己丑賑蘇尼特阿巴噶等旗災陳大受奏蘇祿國遣番官齎謝恩表番字漢字二道與例不符卻之仍優給番官令回國上嘉為得體十二年春正月壬辰命玉保辦理準噶爾使赴藏事務甲午免山西太原等六府八州及歸化城額征本色十分之三大同朔平二府全蠲之乙未賜瑪木特宴於豐澤園戊戌免江蘇海州等三州縣及板浦等六場民竈舊欠丁未賑山東壽光等十三州縣饑乙卯賜準噶爾台吉策旺多爾濟那木札勒敕允所遣西藏念經人在哈集爾得卜特爾過冬及貿易二月辛酉朔免吉林上年旱災應交租穀壬申上謁昭西陵孝陵孝東陵景陵紀山奏大金川土司侵革布什咱土司誘奪小金川土司澤旺印信諭飭修守禦毋輕舉動甲戌上幸盤山庚辰賑山東蘭山饑壬午除河南孟縣衝坍衞地額賦癸未上還京師戊子原任內務府大臣丁皂保年屆百齡賜御書扁額朝服綵幣免湖北棗陽上年水災額賦三月免山西陽曲等二縣上年水災額賦辛丑召慶復入閣辦事調張廣泗為川陝總督復設雲貴總督以張允隨為之命圖爾炳阿為雲南巡撫孫紹武為貴州巡撫賑河南水災以大金川土司掠革布什咱明正各土司擾及汛地命慶復留四川同張廣泗商進勦並飭張廣泗撫馭郭羅克曲曲烏瞻對巴塘諸番免江蘇淮安等四府州屬上年水災額賦大學士查郎阿乞休允之乙巳西藏郡王頗羅鼐卒以珠爾默特那木札勒襲封郡王丙午以高斌為文淵閣大學士來保為吏部尚書調海望為禮部尚書傅恆為戶部尚書命索拜駐藏協同傅清辦事免安徽壽州等二十三州縣衞上年水災額賦丁未命副都統羅山以原銜管阿爾泰軍臺並商都達布遜諾爾馬廠事務己酉命張廣泗進勦大金川土司莎羅奔西路軍營參贊大臣保德期滿以那蘭泰代之庚戌免直隸薊州等十四州縣廳上年水災額賦戊辰命高斌往江南會同周學健查勘河工並清理錢糧積弊己巳以那蘇圖署直隸河道總督壬午給訥親欽差大臣關防命往山西會同愛必達讞安邑等二縣聚眾之獄甲申召雅爾圖回京五月辛卯召準泰來京以策楞兼管廣東巡撫丙申賑山東安丘等二縣饑甲辰祭地於方澤以旱屏鹵簿乙巳命刑部清理庶獄減徒以下罪己酉上詣黑龍潭祈雨辛亥愛必達免調準泰為山西巡撫壬子以福建山東江南廣東山西迭出挾制官長之獄諭頑民聚眾干犯刑章不得不引為己過各督撫其諄切化導使愚民知敬畏官長服從教令六月庚申朔諭來春奉慈輿東巡親奠孔林命各衙門豫備事宜辛未命貴州巡撫節制通省軍務霍備以不查劾州縣虧空褫職發軍臺効力壬申賑山東益都等七州縣饑丙子小金川土司澤旺率眾降並歸沃日三寨官兵進勦大金川攻毛牛及馬桑等寨克之召慶復回京秋七月己丑朔撫恤山東歷城等二十州縣衞水雹各災命高斌等疏濬江蘇六塘等河丙申命納延泰賑蘇尼特等六旗旱災癸卯停劉於義兼管戶部以訥親代之丙午賑順直固安等七十五廳州縣水旱雹災戊申上奉皇太后幸避暑山莊癸丑張廣泗進駐小金川美諾寨分路攻勦受小金川降乙卯上奉皇太后駐避暑山莊戊午賑長蘆永利等三場旱災竈戶八月辛酉上奉皇太后幸木蘭行圍丙寅賑長蘆海豐等二縣竈戶戊辰上行圍溫都爾華賜蒙古王公台吉等宴辛未採買熱河八溝等處米賑蘇尼特六旗旱災癸酉賑江蘇蘇松等屬潮災丙子命賑蘇尼特六旗銀均用庫帑免扣王貝勒等俸辛巳慶復奏進攻刮耳厓連戰克捷諭小小破碉克寨何以慰朕壬午賑浙江壽昌等三縣水災乙酉賑順直霸州等十五州縣廳水災賑湖南耒陽等九縣陝西朝邑廣東順德等三縣水災九月戊子朔免經過地方額賦十分之三賑甘肅伏羌等十縣雲南安寧等三州縣旱災上奉皇太后回駐避暑山莊癸巳以江蘇崇明潮災淹斃人民一萬二千餘口免明年額賦仍賑之乙巳賑安徽歙縣等八州縣衞河南通許等二十七州縣山東齊河等八十七州縣水災丁酉上奉皇太后回蹕乙巳撥奉天糧十萬石賑山東丁未致仕大學士查郎阿卒戊申諭江蘇清查積欠以陳維新與侍郎陳惪華規避均褫職壬子賑河南許州水災甲寅以顧琮為浙江巡撫蘊著為漕運總督乙卯賑兩淮呂田等二十場水災丁巳以陳大受為兵部尚書調潘思榘為福建巡撫以納敏為安徽巡撫冬十月辛酉以蘇祿復遣番人至福建申理呂宋番目劫奪貢使事諭島夷互爭可聽其自辦不必有所袒護乙丑上以皇太后疾詣慈寧宮問安視藥是日宿慈寧宮每日視藥三次至辛未皆如之庚午賑江蘇阜寧等二十州縣衞水災丁丑免吉林被水地方額賦戊寅賑浙江海寧等十一縣水災己卯以準噶爾赴藏熬茶宰桑巴雅斯瑚朗等至得卜特爾交易召慶復回京壬午賑江蘇常熟等十九州縣衞潮災上元等十五州縣衞旱災命江蘇復截明歲漕糧四十萬石備賑癸未諭張廣泗勿受莎羅奔降十一月丁亥朔上詣皇太后視藥日三次至己丑皆如之召阿里袞來京以赫赫護山東巡撫癸巳賑浙江壽昌等三縣饑補豁被災額賦己酉額駙策淩陛見以塔爾瑪善暫署定邊副將軍庚戌賑江蘇崇明等縣災民有差癸丑賑山東東平等州縣衞災民辛酉賑安徽歙縣等州縣衞水災己巳召徐杞來京調陳宏謀為陝西巡撫以彭樹葵署湖北巡撫賑山東齊河等八十五州縣水災辛未予告大學士徐本卒乙亥以張廣泗進勦大金川命黃廷桂署陝甘總督賑直隸天津等六州縣水災張廣泗奏莎羅奔請降告以此次用兵不滅不已上以用卿得人勉之己卯以大學士慶復進勦瞻對奏報班滾自焚不實命褫職待罪以班第努三均奏班滾自焚罷御前行走庚辰以來保為武英殿大學士十三年春正月壬辰賑江蘇阜寧等縣安徽宿州等五州縣水災庚子命傅恆兼管兵部尚書事辛丑命訥親赴浙江同高