后渡江己亥朝鮮入貢閏二月丙午朔上奉皇太后臨幸蘇州府上謁文廟己酉免江寧蘇州杭州附郭諸縣本年丁銀免浙江經過州縣本年額賦之半辛亥丑達改葉爾羌辦事命索琳赴庫倫辦事以額爾景額為喀什噶爾參贊大臣壬子上奉皇太后臨幸杭州府乙卯烏什回人作亂戕辦事大臣素誠丁巳加沈德潛錢陳羣太子太傅命明瑞進勦烏什庚申命明瑞額爾景額總理烏什軍務明瑞節制各軍命阿桂明亮赴伊犂辦事辛酉舒赫德留京辦事以託恩多署工部尚書戊辰調明山為江西巡撫王檢為廣東巡撫李侍堯兼署以李因培為湖北巡撫己巳賜伊犂新築駐防城名曰惠遠哈什回城曰懷順乙亥免江蘇上元等五縣上年水旱災額賦三月丙子朔賑湖北漢陽等七州縣上年水災上幸焦山戊寅上奉皇太后駐江寧府壬午上詣明太祖陵奠酒幸尹繼善署觀音保勦烏什逆回失利甲申以馮鈐為湖南巡撫宋邦綏為廣西巡撫丙戌上奉皇太后渡江丁亥果郡王弘卒甲午以京察予大學士傅恆等乙未上閱高家堰堤奉皇太后渡河召尹繼善入閣辦事以高晉為兩江總督調李宏為江南河道總督以李清時為河東河道總督壬寅追論素誠貪淫激變罪籍產戍其子於伊犂以納世通卡塔海諱匿敗狀籍產治罪命永貴赴喀什噶爾辦事以託恩多署禮部尚書癸卯上渡河夏四月丙午朔賑甘肅河州等三十六廳州縣上年雹水旱霜災庚戌免湖北漢陽等十二州縣衞上年水災額賦辛亥追予故刑部尚書王士禎諡文簡丁巳上奉皇太后駐德州庚申裁江蘇淮徐海道丙寅上還京師庚午上迓皇太后居暢春園辛未哈薩克使臣鄂托爾濟等入覲五月乙亥晉封喀爾喀郡王羅布藏多爾濟為親王乙酉上臨果郡王弘殯所及簡勤親王奇通阿園寢賜奠以和闐辦事大臣和誠婪索回人奪職逮問命伊勒圖赴塔爾巴哈台辦事辛卯京師地震丁酉免安徽懷寧等十九州縣衞上年水災額賦甲辰納世通卡塔海貽誤軍務正法六月己酉以楊廷璋署兩廣總督明山暫署董邦達署工部尚書乙卯晉封令貴妃魏氏為皇貴妃己巳諭明瑞勿受烏什逆回降秋七月辛巳上奉皇太后秋獮木蘭戊子以官保為左都御史乙未前和闐辦事大臣和誠以貪婪鞫實正法丁酉奪喀爾喀親王桑齋多爾濟爵八月甲辰朔減朝審秋審緩決三次以上刑己未上幸木蘭行圍庚申賑甘肅靖遠等十一廳縣旱災甲子甘肅寧遠等州縣地震命賑恤並免本年額賦九月丙子賑山東章丘等二十一州縣水災戊寅命尹繼善管兵部劉統勳管刑部烏什叛回以城降乙酉以高恆為總管內務府大臣辛卯以明瑞等未將烏什叛人殄誅送往伊犂下部嚴議辛丑以李侍堯署工部尚書冬十月己酉明瑞阿桂以辦烏什事務錯繆褫職留任賑長蘆屬滄州等三場水災己巳楊應琚陛見命和其衷署陝甘總督湯聘署陝西巡撫十一月癸酉免江蘇海州等六州縣本年旱災額賦乙酉以吏部尚書傅森年老授內大臣調託恩多代之以託庸為兵部尚書調馮鈐為安徽巡撫庚寅丑達以扶同桑齋多爾濟私與俄羅斯貿易正法明瑞等以盡誅烏什附逆回衆奏聞辛卯賑山東章丘等十八州縣水災甘肅狄道等十二州縣雹霜災甲午以阿桂為塔爾巴哈台參贊大臣代安泰回京丁未解阿桂工部尚書以蘊著代之以嵩椿為綏遠城將軍戊申賑甘肅靖遠等十一廳縣旱災幷免額賦乙卯賑山東齊河等十五州縣水災丁卯命託恩多兼署兵部尚書壬辰封皇五子永祺為榮親王十二月戊午以陝西涇陽縣貢生張璘七世同居賜御製詩章緞匹
