body:
  text: 清史稿卷十二本紀十二高宗本紀三二十一年春正月庚午以額駙科爾沁親王色布騰巴勒珠爾貽悞軍機褫爵禁錮喀爾喀親王額琳沁多爾濟以疏縱阿睦爾撒納處斬己卯以準噶爾故總台吉達什達瓦之妻率衆來降封為車臣默爾根哈屯命尹繼善往浙江會審鄂樂舜丁亥阿巴噶斯得木齊哈丹等來降乙未命哈達哈由阿爾泰進兵協勦原任副將軍薩喇勒由珠勒都斯來歸命與鄂勒哲依同掌副將軍印命協辦大學士達勒黨阿由珠勒都斯進兵協勦丁酉致仕協辦大學士阿克敦卒二月癸卯授巴里坤辦事大臣和起欽差大臣關防戊申以楊廷璋為浙江巡撫辛亥上啟蹕謁孔林以策楞奏報獲阿睦爾撒納命改謁泰陵甲寅上謁泰陵免直隸山東經過州縣錢糧十分之三歉收地方免十分之五乙卯上幸山東詣孔林免山東海豐等三縣潮災額賦壬辰賑山東蘭山等州縣水災癸亥賑浙江仁和等十五州縣場水災甲子工部尚書衞哲治病免以趙弘恩代之策楞以誤傳獲阿睦爾撒納奏聞丁卯命薩喇勒以副將軍駐特訥格爾戊辰授碩色為湖廣總督郭一裕為雲南巡撫三月己巳朔上至曲阜謁先師孔子廟授清保為盛京將軍庚午釋奠禮成謁孔林少昊陵元聖周公廟免曲阜丁丑年額賦辛未賑山東鄒縣等十七州縣衞水災丙戌免江蘇宿遷被災河租湖北潛江等五州縣上年水災額賦丁亥命哈達哈進兵烏梁海布延圖以青滾雜卜車布登為參贊大臣策楞等奏復伊犁戊子免安徽宿州等二十一州縣衞江蘇阜寧等七十二州縣衞上年水災額賦壬辰上謁昭西陵孝陵景陵詣孝賢皇后陵奠酒丙申賜鄂樂舜自盡丁酉上還京師夏四月壬子免山東鄒縣等十九州縣衞上年潮災額賦命達勒黨阿由西路哈達哈由北路進征哈薩克以哈寧阿鄂實為參贊大臣癸丑命大學士傅恆赴額林哈畢爾噶整飭軍務策楞玉保逮問以烏勒登疏縱阿睦爾撒納處斬甲寅命尚書阿里袞在軍機處行走丁巳召傅恆回京富德奏敗哈薩克于塞伯蘇台壬戌免山西岢嵐州二十年霜災額賦癸亥軍機大臣雅爾哈善劉綸罷命裘曰修在軍機處行走乙丑召劉統勳回京五月戊辰朔玉保降領隊大臣以達勒黨阿為定邊右副將軍巴祿為參贊大臣乙亥免浙江仁和等十三州縣上年被災額賦庚辰上詣黑龍潭祈雨乙酉以莽阿納達什車凌為參贊大臣丁亥免甘肅甘州等三府本年民屯額賦賑甘肅臯蘭等二十廳州縣上年霜雹災辛丑噶勒雜特宰桑根敦等來降壬子以莽阿納為歸化城都統癸丑何國宗降調以趙弘恩為左都御史調汪由敦為工部尚書劉統勳為刑部尚書丙辰伯什阿噶什屬宰桑賽音伯克來降癸亥杜爾伯特台吉伯什阿噶什遣使來降命封親王乙丑封杜爾伯特台吉烏巴什為貝子秋七月戊辰免安徽無為等三十二州衞上年水災額賦壬申特楞古特宰桑敦多克及古爾班和卓等於濟爾瑪台詐降哈達哈等率兵殄之授哈達哈領侍衞內大臣車布登扎布郡王唐喀祿舒赫德副都統三都布多爾濟公爵餘議有差庚辰漕運總督瑚寶卒以張師載代之丁亥上幸清河至班第鄂容安喪次賜奠壬辰以青滾雜卜叛跡已著諭舒明成袞扎布等捕勦之癸巳庫車伯克鄂對等來降八月壬寅以綽爾多為黑龍江將軍乙巳命喀爾喀親王成袞扎布為定邊左副將軍舒明阿蘭泰桑齋多爾濟德沁扎布塔勒瑪善為參贊大臣辛亥命納木扎勒德木楚克為參贊大臣以保德署綏遠城將軍癸丑上奉皇太后秋獮木蘭磔阿巴噶斯等于市戊午賑車臣汗部落扎薩克輔國公成袞等六旗旱災額魯特達瑪琳來降庚申上奉皇太后巡幸木蘭行圍授瑚圖靈阿富昌保德哲庫納阿爾賓為參贊大臣隨成袞扎布辦事以保雲署綏遠城將軍壬戌台吉伯什阿噶什入覲召見行殿賜宴癸亥予成袞扎布等議甲子以喀爾喀貝勒品級車木楚克扎布接續台站封為貝勒乙丑哈達哈等征哈薩克大敗之授扎拉豐阿為貝子明瑞為副都統賑陝西長安等十三廳州縣雹災九月甲戌達瓦齊近族台吉巴里率人戶來降命附牧扎哈沁地方丁丑土爾扈特台吉敦多布達什遣使臣吹扎布入貢上召見於行幄賜宴戊子免甘肅乾隆元年至十五年積年欠賦及寧夏安西等二十二州縣衞本年額賦有差庚寅上奉皇太后回駐避暑山莊授杜爾伯特親王伯什阿噶什為盟長乙未暹羅國王遣使貢方物賑山東魚台等縣水災閏九月癸卯封羅卜藏車楞之子塔木楚克扎布為貝勒戊申上奉皇太后回蹕庚戌授阿桂為北路參贊大臣准借黑龍江被水人戶籽種口糧甲寅上奉皇太后還京師賑安徽宿州等十二州縣衞水災辛酉免江蘇清河十二州縣衞被災漕項冬十月戊辰命哈達哈以參贊大臣隨同成袞扎布辦事阿里袞富德回京壬申以富勒赫未能豫防河決召來京命愛必達為河道總督劉統勳署之調鶴年為山東巡撫授尹繼善兩江總督兼管河務癸酉以滿福為巴里坤都統丙子兆惠以回部霍集占叛狀聞遣阿敏道等進兵戊寅輝特台吉巴雅爾叛掠洪霍爾拜扎哈沁命寧夏將軍和起討之己卯賑直隸延慶等八州縣衞本年水災雹災乙酉致仕大學士福敏卒十一月丁未賑甘肅皐蘭等二十六廳州縣水雹災辛亥調陳宏謀為陝西巡撫圖勒炳阿為湖南巡撫甲寅命仍逮問策楞玉保降封扎拉豐阿公爵以達勒黨阿為定西將軍兆惠為定邊右副將軍永貴為參贊大臣庚申哈薩克錫喇巴瑪及回人莽噶里克率衆襲將軍和起于闢展和起力戰死之命如傅清拉布敦例卹己未黃廷桂奏備馬三萬匹增兵駐哈密等處上以明決擔當嘉之賞黃廷桂雙眼花翎騎都尉世職壬戌王安國病免以汪由敦署吏部尚書趙弘恩署工部尚書何國宗署左都御史十二月甲子朔策楞玉保逮京途次為額魯特人所害庚午賑山西汾陽等縣水災辛未諭哲布尊丹巴胡圖克圖加號敷教安衆喇嘛壬申以盧焯為湖北巡撫賑山東金鄉等二十一州縣衞水災甲戌免陝西盩厔等四縣本年水災民屯額賦馬廠地額賦之半戊寅獲青滾雜卜于杭噶奬噶斯賞成袞扎布黃帶封子一人為世子封納木扎勒一等伯己卯召瑚圖靈阿等回京以獲青滾雜卜功晉貝勒車木楚克扎布郡王品級賞貝勒旺布多爾濟等雙眼花翎丙戌達勒黨阿罷協辦大學士以鄂彌達代之二十二年春正月甲午以南巡免江蘇安徽浙江累年逋賦以成袞扎布為定邊將軍由巴里坤進勦車布登扎布署北路定邊左副將軍舒赫德富德鄂實為參贊大臣色布騰巴勒珠爾阿里袞明瑞等為領隊大臣乙未賑江蘇清河等十九州縣水災戊戌命嵩椿為荊州將軍以莽古賚為參贊大臣赴北路軍營己亥命哈達哈為參贊大臣駐科布多庚子以哈寧阿永貴為參贊大臣癸卯上奉皇太后南巡甲辰授汪由敦吏部尚書調何國宗為禮部尚書秦蕙田為工部尚書趙弘恩仍回左副都御史白鍾山為江南河道總督張師載為河東河道總督楊錫紱為漕運總督授愛必達江蘇巡撫丙午免直隸靜海等三州縣逋賦丁未免經過直隸山東地方本年錢糧十分之三被災地方十分之五壬子賑山東濟寧五州縣衞水災癸丑以阿思哈為北路參贊大臣己未以嵇璜為江南副總河命阿桂留烏里雅蘇台辦事壬戌噶勒藏多爾濟達什車淩等叛二月癸亥朔免經過江南浙江地方本年錢糧十分之三被災地方十分之五甲子賑江蘇清河十四州縣衞安徽宿州等四州縣衞災民丙寅兆惠全師至烏魯木齊封一等伯世襲丁卯上奉皇太后渡河至天妃閘閱木龍免江南乾隆十年以前漕項積欠免兩淮竈戶乾隆十七年至十九年未完折價銀兩乙亥上奉皇太后渡江癸未幸宋臣范仲淹高義園甲申上奉皇太后幸蘇州府乙酉上奉皇太后臨視織造機房調富森為吏部尚書以納木札勒為工部尚書降阿里袞為侍郎以兆惠為戶部尚書領侍衞內大臣舒赫德為兵部尚書命成袞扎布兆惠分路捕勦額魯特叛衆丙戌上閱兵於嘉興府後教場丁亥上閱兵於石門鎮己丑上奉皇太后幸杭州府庚寅上閱兵辛卯免山東齊河等三州縣民欠及山西汾陽等二縣江蘇清河等十二州縣水災額賦三月丁酉噶勒藏多爾濟陷伊犁命成袞扎布討之庚子上奉皇太后駐蹕蘇州府己酉上奉皇太后幸江寧府免江南之江寧蘇州浙江之杭州三府附郭諸縣本年額賦庚戌上奠明太祖陵輝特台吉車布登多爾濟叛哈達哈討獲之命盡誅丁壯以女口賞喀爾喀辛亥以哈達哈為兵部尚書癸丑上奉皇太后渡江甲寅召原任大學士史貽直入閣辦事黃廷桂仍以大學士兼管陝甘總督丙辰免陝西潼關等廳州縣上年水雹災額賦召劉統勳赴行在己未上奉皇太后渡河夏四月壬戌朔直隸總督方觀承劾奏巡檢張若瀛擅責內監僧人上斥為不識大體仍諭內監在外生事者聽人責懲乙丑免江蘇淮安等三府州地畝額賦命劉統勳督修徐州石工侍郎夢麟督修六塘以下河工副總河嵇璜督修昭關滾壩支河均會同督撫總河籌辦召成袞扎布兆惠舒赫德等來京以雅爾哈善為參贊大臣掌定邊右副將軍印命阿里袞駐巴里坤辦事丙寅上至孫家集閱隄工唐喀祿獲車布登多爾濟以普爾普部人賞烏梁海丁卯上渡河至荊山橋韓莊閘閱河工戊辰免直隸延慶等州縣衞二十一年雹災水災額賦庚午減山東海豐縣屬黎敬等五莊糧額並免十一年至二十年逋賦以松阿里為綏遠城將軍獲普爾普辛未上至闕里釋奠先師孔子上奉皇太后駐蹕靈巖命史貽直仍以文淵閣大學士兼吏部尚書乙亥改松阿里為涼州將軍以保德為綏遠城將軍戊寅免山東濟寧等五州縣逋賦己卯調蔣炳為河南巡撫以阿思哈為湖南巡撫庚辰免河南夏邑等四縣逋賦辛巳以夏邑生員段昌緒藏吳三桂偽檄命方觀承赴河南會同圖勒炳阿嚴鞫之乙酉何國宗罷丁亥上還京師命秦蕙田署禮部尚書戊子以前布政使彭家屏藏明末野史褫職逮問以歸宣光為禮部尚書庚寅福建厦門火丁酉上詣藍靛廠迎皇太后居暢春園乙巳賜蔡以臺等二百四十二人進士及第出身有差丁未霍集占叛副都統阿敏道死之六月辛酉朔以胡寶瑔為河南巡撫阿思哈署江西巡撫壬戌免甘肅及河南夏邑等四縣明年額賦癸亥以愛必達為雲貴總督調陳宏謀為江蘇巡撫明德為陝西巡撫定長為山西巡撫甲子賑河南鄢陵等州縣水災戊辰彭家屏論斬丁丑賞達什達瓦部落兩月口糧癸未喀爾喀達瑪琳叛命桑寨多爾濟討之己丑賑安徽宿州等十六州縣衞水災甘肅碾伯等三十八州縣廳水雹災秋七月辛卯朔賑山東館陶等州縣水災壬辰以劉藻為雲南巡撫癸卯賜彭家屏自盡命史貽直仍兼工部乙巳賑安徽宿州等十州縣水災雹災丙午賑山東東平州等五州縣水災以獲巴雅爾授富德內大臣封貝勒羅布藏多爾濟為郡王丁未以楊應琚為閩浙總督以鶴年為兩廣總督蔣洲為山東巡撫塔永寧為山西巡撫哈薩克汗阿布賚遣使入貢戊申上奉皇太后巡幸木蘭癸丑額魯特台吉渾齊等殺札那噶爾布以其首來降戊午賑山東濟寧等三十二州縣衞水災福建龍嚴等二州縣水災八月丙寅哈薩克霍集伯爾根等降丁卯以薩喇善為吉林將軍傅森署之戊辰賑甘肅柳溝等三衞旱災乙亥上奉皇太后巡幸木蘭行圍賑山西汾陽水災辛巳巴雅爾達什車淩伏誅九月癸巳克埒特烏嚕特各部俱平甲午上御行殿哈薩克阿布賚等使臣入覲賜宴戊戌以富勒渾為湖南巡撫琿齊等復叛庚子額魯特沙喇斯瑪呼斯二宰桑叛命都統滿福討之以雅爾哈善為兵部尚書辛丑上奉皇