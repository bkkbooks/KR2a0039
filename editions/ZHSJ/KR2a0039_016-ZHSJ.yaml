body:
  text: 清史稿卷十六本紀十六仁宗本紀仁宗受天興運敷化綏猷崇文經武孝恭勤儉端敏英哲睿皇帝諱顒琰高宗第十五子也母魏佳氏追尊孝儀皇后乾隆二十五年十月初六日生五十四年封嘉親王六十年九月策立為皇太子高宗將傳位焉以明年為嘉慶元年嘉慶元年丙辰春正月戊辰朔舉行內禪上侍高宗徧禮於堂子奉先殿壽皇殿高宗御太和殿授璽上即位尊高宗為太上皇帝訓政頒詔天下賜宴宗藩庚戌立皇后喜塔拉氏寧壽宮舉行千叟宴太上皇帝蒞焉九十以上者召至御座賜卮酒如故事辛酉祈穀於上帝癸亥上奉太上皇帝賜廷臣宴於正大光明殿凡賜宴皆如之辦理苗疆大學士福康安等奏攻克朗坡進攻平隴湖北枝江宜都教匪起二月丁丑朔釋奠先師孔子戊寅祭社稷庚辰初舉經筵辛巳敕甘肅貴德廳建文廟戊子春分朝日於東郊己丑上御乾清門聽政園居則御勤政殿以為常己亥湖北當陽教匪起戕官西安將軍恆瑞率兵二千勦之辛丑祭歷代帝王廟丙午湖北巡撫惠齡奏獲教匪聶傑人三月庚戌停四川續徵軍需銀兩辛亥上耕耤田四推壬子上奉太上皇帝謁陵丁卯車駕還京己巳皇后祀先蠶癸酉恆瑞奏收復湖北竹山壬申留保住免以烏爾圖納遜為理藩院尚書富銳為綏遠城將軍永慶為蒙古都統夏四月丙子朔時享太廟命宜綿永保恆瑞孫士毅等分勦湖北教匪辛巳常雩祀天於圜丘以勦來鳳功晉四川總督孫士毅三等男敕伊犁貢馬由草地行丁酉上侍太上皇帝祈雨黑龍潭是日雨庚子賜趙文楷等一百一人進士及第出身有差五月戊申詔額魯特來京有出痘者嗣後由草地赴熱河覲見辛酉祭地於方澤壬戌上奉太上皇帝避暑木蘭乙丑以富綱為漕運總督壬申大學士貝子福康安卒於軍六月乙亥朔日有食之以魁倫為閩浙總督朱珪為兩廣總督以紀昀為兵部尚書金士松為禮部尚書沈初為左都御史丙子調福昌為福州將軍以明亮署廣州將軍丁丑除山西代州三州縣水沖田賦戊寅和琳奏獲苗匪石三保解京誅之癸巳江南豐汛河決秋七月辛亥明亮奏勦平孝感縣教匪大學士四川總督三等男孫士毅卒於軍八月丙子以雨停秋獮壬寅和琳卒於軍命明亮鄂輝接統軍務九月乙巳車駕還京冬十月戊寅上萬壽節詣太上皇帝行禮禮成受廷臣賀己卯以董誥為大學士王杰以足疾疏辭軍機處南書房禮部事允之命沈初為軍機大臣辛巳贈征苗陣亡提督花連布太子少保予世職丙戌調沈初為兵部尚書以紀昀為左都御史十一月庚戌豐汛河工合龍復決予湖北死事巡檢王翼孫訓導甘杜典史浦寶光世職甲子冬至祀天於圜丘乙丑江西巡撫陳淮有罪逮問遣戍己巳以湖北教匪偷渡滾河入秦褫永保職逮問以惠齡統其軍十二月戊子湖南苗匪平封明亮伯爵額勒登保侯爵及德楞泰等世職有差庚子祫祭太廟辛丑上奉太上皇帝御太和殿賜宴朝正外藩是歲免順天江蘇山西湖南福建等省三十九廳州縣災賦逋各賦有差會計天下民數二萬七千五百六十六萬二千四十四名口穀數三千七百二十萬六千五百三十九石一升二合七勺朝鮮入貢二年丁巳春正月丁卯貴州南籠仲苗夷婦王囊仙作亂命總督勒保勦之庚午觀成奏四川教匪徐添德侵擾達州東鄉命總兵朱射斗等勦之二月癸酉上御經筵江南豐汛復報合龍戊寅皇后崩奉太上皇帝誥素服七日不摘纓廷臣如之近臣常服不掛珠辛巳景安勦擒教匪功晉三等伯戊戌冊諡大行皇后曰孝淑皇后惠齡奏獲匪首劉起等解京誅之三月戊申上謁西陵丁巳還京癸亥以劉墉為大學士調沈初為吏部尚書朱珪為兵部尚書以福長安慶桂為滿洲都統德楞泰為漢軍都統巴克坦布慶成奏由應山追賊入豫查明賊首李全王廷詔姚之富均在其內諭令擒捕夏四月壬申設湖南鎮筸鎮總兵官改保靖土縣為流官辛巳追贈侍郎奉寬太師禮部尚書上受書師也五月戊辰上奉太上皇帝避暑木蘭已巳惠齡奏教匪姚之富等由白馬石搶渡漢江入川詔罷總統慶成恆瑞等各降官以宜綿為總統明亮德楞泰為幫辦六月癸酉勒保奏勦辦南籠仲苗迭克水烟坪卡子河等處得旨亟將苗首仙姑等擒獲閏六月庚子吉慶奏克西隆州亞稿苗寨丙午勒保奏進克普坪搶斃匪首解南籠圍詔奬紳民堅守危城深明大義改南籠府為興義府勒保續報解黃草壩圍滇黔路通壬戌軍機章京吳熊光戴衢亨均加三品卿銜與侍郎傅森一體在軍機大臣上學習行走秋七月己巳永定河決己卯命喀什噶爾英吉沙爾二回城儲糧備荒癸未都統巴克坦布卒於軍乙酉免四川運送軍糈奉節六州縣明年額賦八月甲辰永定河合龍丙辰范宜恆卒調沈初為戶部尚書紀昀為禮部尚書己未大學士誠謀勇公阿桂卒丙寅上奉太上皇帝還京九月戊辰勒保奏攻克仲苗賊巢獲賊首王囊仙等解京誅之封勒保三等侯丁丑上臨奠故大學士阿桂甲申以蘇凌阿為大學士李奉翰為兩江總督庚寅詔宜綿勒保奉承恩景安等分募鄉勇入伍勦賊癸巳詔曰聞賊每逼平民入夥迎拒官軍官軍報捷所稱殺賊多係平民非真賊也故日久無功領兵大員尚其設法解散勿令玉石俱焚甲午以湖北恩施利川四川奉節士民奮勇殺賊再免一年錢糧冬十月戊戌明亮德楞泰請廣修民堡以削賊勢詔斥其迂緩丙辰乾清宮交泰殿災辛酉命勒保總統四川軍務十一月丙寅朔予陣亡散秩大臣佛住護軍統領阿爾薩朗世職十二月戊申以康基田為江南河道總督司馬騊為東河河道總督予陣亡總兵明安圖副將曾攀桂伊薩納等世職甲子祫祭太廟是歲免順天湖廣陝西雲南甘肅等省五十七州縣災賦有差朝鮮琉球暹羅入貢三年戊午春正月庚午以梁肯堂為兵部尚書胡季堂為直隸總督甲申調勒保為四川總督乙丑額勒登保奏獲賊首覃加耀上責其遲延奪額勒登保爵職並以疏防奪明亮德楞泰爵職奪舒亮穆克登阿職籍其家均隨軍自効二月丁未上釋奠文廟臨雍講學以鄂奇泰為黑龍江將軍慶霖為江寧將軍辛亥柯藩烏爾圖納遜坐縱陝賊漢入楚褫職壬子以吳省欽為左都御史乙卯命內閣學士那彥成在軍機處學習行走三月丁丑德楞泰奏追勦賊首齊王氏姚之富投崖死予明亮副都統銜己丑以勦賊遲延褫觀成劉君輔職以富成為成都將軍夏五月丙寅免福建全省遠年逋賦己巳截留江西漕糧接賑山東曹縣等十三州縣被水災民甲戌上奉太上皇帝避暑木蘭六月己酉以勦賊遲延盡奪德楞泰爵職予副都統銜自効甲寅雲貴總督三等男鄂輝卒秋七月庚午富楞泰卒以德勒格楞貴為寧夏將軍以雨停秋獮八月以獲教匪王三槐功晉勒保及和珅公爵福長安侯爵己酉張誠基奏江西西寧州教匪作亂勦平之九月癸亥上奉太上皇帝還京己卯祀明總制袁崇煥於賢良祠冬十月庚子新建乾清宮交泰殿成十一月丁亥左都御史舒常卒十二月乙巳惠齡奏獲賊首羅其清羅其書戊午祫祭太廟是歲免陝西貴州等省四十八廳州縣災賦有差朝鮮琉球暹羅入貢四年己未春正月壬戌太上皇帝崩上始親政丁卯大學士和珅有罪及尚書福長安俱下獄鞫訊晉儀郡王永璇親王貝勒永璘為慶郡王綿億封履郡王奕綸奕紳在上書房讀書綿志等各封賞有差詔中外陳奏直達朕前不許副封關會軍機處命成親王永瑆大學士董誥尚書慶桂在軍機處行走沈初免直成親王永瑆管戶部丁丑和珅賜死於獄福長安論斬己卯特詔申明軍紀命勒保為經略明亮額勒登保為參贊幷查詢劉清居官具實保奏吳省欽免以劉權之為左都御史以保寧為大學士仍管伊犁將軍慶桂協辦大學士書麟為吏部尚書松筠為戶部尚書斬賊首冉文儔功奬惠齡德楞泰丙戌宜綿解任以恆瑞為陝甘總督丁亥贈原任御史曹錫寶副都御史廕一子召前內閣學士尹壯圖來京二月己丑以松筠為陝甘總督布彥達賚為戶部尚書辛卯詔曰自教匪滋事以來迫脅良民焚毀田舍民非甘心從賊欲逃無歸歸亦無食亟宜招撫解散而非空言所能收效應如何綏輯安插令勒保詢之劉清及其他良吏籌議良法俾可施行速具以聞甲午弛私售和闐玉禁辛丑秦承恩以貽誤軍事褫職逮問李奉翰卒以費淳為兩江總督乙巳復宗室鄉會試例增部院郎官宗室額缺壬子釋回徐述夔王錫侯子孫緣坐發遣者丁巳錄用故大學士朱軾孫嘉淦子孫三月己未朔蘇凌阿免以慶桂為大學士成德為刑部尚書傅森為左都御史庚申戶部尚書沈初卒以范建中為戶部尚書癸亥以書麟為閩浙總督協辨大學士甲子調慶霖為福州將軍福昌為江寧將軍戊辰許直省道員密摺上奏庚午解景安任以倭什布為湖廣總督吳熊光為河南巡撫丙子額勒登保奏勦滅教匪蕭占國張長更上嘉之予二等男奬裨將朱射斗楊遇春等戊寅定侍衞軍政壬午追贈皇四兄履端郡王永珹為親王皇七兄悼敏皇子永琮為哲親王皇十二兄永璣為貝勒癸未勒保奏勦滅教匪冷天祿得旨旬日之內連翦三酋深為可嘉額勒登保晉一等男免河南被匪之鄧州二十州縣新舊額賦甘肅布政使廣厚奏勦斃賊目張世龍夏四月己丑朔欽天監言四月朔日日月合璧五星聯珠上曰躔度偶逢兵戈未息何足言瑞予尹壯圖給事中准回籍養親丙申恭上大行皇帝尊諡禮成頒詔覃恩丁酉免陝西被賊之孝義等三十五廳州縣新舊額賦己亥免四川被賊之奉節等三十六廳州縣新舊額賦辛酉詔遵奉皇考敕旨於庚申辛酉舉鄉會恩科癸丑賜姚文田等二百二十人進士及第出身有差丙辰以慶成為成都將軍五月戊午朔停本年秋決甲子免湖北被賊之孝感等四十七州縣衞新舊額賦庚午江蘭罷以初彭齡為雲南巡撫庚辰以傅森為兵部尚書阿迪斯為左都御史辛巳克勤郡王恆謹以不謹削爵甲申以董誥為大學士丁亥敕費淳訪劾貪吏詔免伯德爾格回民增金錢及葡萄折價六月己丑增設步軍統領左右翼總兵官庚寅詔曰朕聞湖北隨州未被賊擾因民人掘溝壘山足資捍禦民間邨堡儘可照辦勒保松筠吳熊光即曉諭百姓知之辛卯吳熊光吳琠請加徵河工稭料運費銀得旨申飭下部議處庚戌卹陝西陣亡總兵官保興等世職秋七月辛酉調山西兵三千赴湖北盛京兵二千額勒亨額統之赴四川勦賊癸亥勒保奏獲賊首包正洪予朱射斗騎都尉世職壬申經略勒保以玩誤軍務奪職逮問以明亮為經略魁倫為四川總督乙亥削景安伯爵遣戍伊犁免甘肅被賊隴西等四十八州縣新舊額賦辛巳停中秋貢八月己丑富俊免以興奎為烏魯木齊都統壬辰調盛京兵二千吉林黑龍江兵各一千赴湖北勦賊癸巳以長麟為雲貴總督乙未勒保奏德楞泰生擒賊目龔文玉給騎都尉世職癸卯罷明亮經略命額勒登保以都統銜為經略乙巳命修撰趙文楷中書李鼎元冊封琉球國王尚溫己酉慶成永保以督軍不力逮問命那彥成往陝西督辦癸丑編修洪亮吉致書成親王私論國政遣戍伊犁九月丙辰朔卹陣亡貴州副將孫大猷世職丙寅怡親王永琅薨庚午大行梓宮發引上恭送啟鑾庚午葬高宗純皇帝於裕陵癸酉還京甲戌高宗純皇帝孝賢純皇后孝儀純皇后升祔太廟頒詔覃恩辛巳故湖廣總督畢沅坐濫用軍需削世職奪廕官壬午明亮以勦賊不力罷參贊褫都統予副都統勦賊冬十月壬辰調朱珪為戶部尚書劉權之為吏部尚書范建中為左都御史丁酉明亮奏獲賊首張漢潮湖北道員胡齊崙以侵盜錢糧處斬壬寅德楞泰奏獲賊首高均德高二予德楞泰二等男丁未