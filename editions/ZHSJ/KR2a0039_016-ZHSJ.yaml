丙申廣西疏報壽民藍祥一百四十二歲特賜御製詩章御書匾額六品頂戴銀五十兩丁酉馬慧裕奏雲梯關大工合龍河歸正道入海得旨嘉奬己亥以陳鳳翔為江南河道總督壬寅調興肇察哈爾都統己酉祫祭太廟是歲免直隸七州縣災賦除江蘇丹徒上海坍田安徽無為州廢田田賦朝鮮暹羅入貢十六年辛未春正月戊午以雲梯關馬港新築長堤增設淮海道海安海阜二廳同知癸酉以百齡為刑部尚書松筠調兩廣總督勒保為兩江總督二月壬午上御經筵丁亥釋奠先師孔子詔曰朕因連年南河河工糜費至四千餘萬特命托津初彭齡前往查察茲據奏覆查勘工帳銀款出入尚屬相符而工程未盡堅固此實歷任河臣之咎吳璥徐端俱降革有差在工人員一併斥革其未發銀六十萬幷著停發三月丙寅上謁西陵壬午謁陵禮成西巡五臺山乙亥工部尚書費淳卒贈大學士以肅親王永錫為蒙古都統閏三月庚辰上駐蹕五臺山乙酉上迴鑾丙申上謁堯母陵帝堯廟行禮戊戌上閱直隸綠營兵幸蓮池書院遣官祭明臣楊繼盛祠癸卯上還京夏四月戊申大學士戴衢亨卒甲子上祈雨致仕協辦大學士長麟卒壬申賜蔣立鏞等二百三十七人進士及第出身有差以福慶為漢軍都統崇祿為蒙古都統五月辛巳以劉權之為大學士鄒炳泰協辦大學士劉鐶之兵部尚書丁亥上再詣天神壇祈雨庚寅雨六月壬午明亮以覆奏不實降副都統以松筠為協辦大學士癸丑祿康以覆奏不實降副都統以勒保為大學士管理吏部吉綸為工部尚書步軍統領乙丑湖南按察使傅鼐卒贈巡撫許建專祠秋七月戊寅命光祿寺少卿盧蔭溥入直軍機處加四品卿銜壬辰禁西洋人潛居內地丙申上巡幸木蘭癸丑江南李家樓河決乙巳興肇以老免起貢楚克扎布為察哈爾都統八月壬戌上行圍九月己卯建興安大嶺神祠春秋致祀戊子上迴鑾乙未以松筠為吏部尚書蔣攸銛為兩廣總督丁酉上謁陵庚子上還京辛丑四川十二支嶺夷向化改土歸流十一月庚子敕改運河邳宿工程復歸河員管理十二月癸丑以和寧為盛京將軍癸酉祫祭太廟是歲免順天江蘇河南等省八州縣災賦除甘肅逋賦又除喀什噶爾回莊田賦朝鮮琉球暹羅緬甸入貢十七年壬申春正月壬午時享太廟命皇次子行禮二月甲辰朔上御經筵三月丙子上謁東陵己丑上幸南苑行圍辛卯以明亮為西安將軍壬辰上御晾鷹臺大閱八旗官兵丙申上還京夏四月甲辰詔曰八旗生齒日繁亟宜廣籌生計朕聞吉林土膏沃衍地廣人稀柳條邊外葠場移遠其間空曠之地不下千有餘里多屬腴壤流民時有前往耕植應援乾隆年間拉林成案將閒散旗丁送往吉林撥給地畝或耕或佃以資養贍農暇仍可練習騎射以備當差教養兩得其益該將軍等盡心籌畫區分棲止詳度以聞丙辰上閱健銳營兵癸亥護軍統領扎克塔爾卒予銀三百兩五月戊子溫承惠奏灤州拏獲金丹八卦邪教董懷信等得旨從嚴懲辦六月乙巳移閑散宗室於盛京居住築室給田給銀秋七月戊子上巡幸木蘭八月壬子陳鳳翔以不職免以黎世序為江南河道總督甲寅以阮元為漕運總督丙辰上行圍九月戊子上還京甲午慶桂以年老罷以松筠為軍機大臣冬十月丁卯以恭阿拉為禮部尚書十一月辛未以景安為理藩院尚書兼漢軍都統十二月壬子以鐵保為禮部尚書潘世恩為工部尚書甲寅以興肇為江寧將軍是歲免順天奉天直隸河南安徽等省二十七州縣災賦逋賦旗租臺灣噶瑪蘭水沖田賦朝鮮暹羅入貢十八年癸酉春正月乙亥軍機大臣松筠罷為御前大臣以勒保為軍機大臣二月庚子上御經筵三月丁丑上幸南苑行圍丙戌上謁西陵丙申上還京夏四月己亥以明亮為蒙古都統甲寅上祈雨癸亥以富俊為黑龍江將軍五月庚辰上祈雨壬辰雨六月乙卯賜進書生員鮑廷博舉人庚申以松筠為伊犂將軍秋七月甲戌申嚴販運鴉片烟律食者幷罪之丁丑御史馮大中疏言中外臣工辦事遲延怠緩請旨稽覈上是之壬午上巡幸木蘭八月庚戌上行圍九月甲子上以陰雨減圍癸酉上迴鑾乙亥河南睢州河溢河南滑縣八卦教匪李文成糾衆謀逆知縣強克捷捕繫獄其黨馮克善牛亮臣陷縣城克捷死之直隸長垣山東曹縣賊黨咸應上命高嵵同興防堵溫承惠佩欽差大臣關防勦之召楊遇春統兵北上賊黨徐安幗陷長垣戕知縣趙綸金鄉知縣吳階捕賊崔士俊等戊寅上行次髻山是日奸人陳爽數十人突入紫禁城將逼內宮皇次子用槍殪其一人一賊登月華門牆執旗指揮皇次子再用槍擊之墜貝勒綿志續殪其一王大臣率健銳火器營兵入盡捕斬之己卯詔封皇次子為智親王綿志郡王銜論捕賊功各予奬奪吉綸職以英和為步軍統領庚辰詔曰朕紹承大統不敢暇逸不敢為虐民之事自川楚教匪平後方期與吾民共享承平之福乃昨九月十五日大內突有非常之事漢唐宋明之所未有朕實恧焉然變起一朝禍積有素當今大患惟在因循怠玩雖經再三誥誡舌敝筆禿終不足以動諸臣之聽朕惟返躬修省耳諸臣願為忠良即盡心力匡朕之咎正民之志切勿依前尸位益增朕失通諭知之命那彥成為欽差大臣勦賊河南以提督楊遇春副都統富僧德總兵楊芳帶兵協勦辛巳首逆林清就擒壬午上還京癸未以松筠曹振鏞為大學士托津百齡協辦大學士鐵保章煦為吏部尚書丙戌首逆林清通逆內監劉進亨等伏誅冬十月丙申祖之望免以韓崶為刑部尚書癸卯山東鹽運使劉清大破賊於扈家集侍衛蘇爾慎復定陶曹縣御史張鵬展疏陳百姓不敢出首邪匪由於地方官規避處分不為受理或反坐誣上是之己酉那彥成奏各路調兵再行進勦上嚴斥之甲寅命托津往督河南軍務桂芳入直軍機處丁巳卹禁城拒賊傷亡侍衞那倫等世職己未祿康裕瑞失察屬人從逆發盛京禁錮辛酉謫降漢軍籍直隸籍之科道官壬戌以明亮為兵部尚書十一月甲子朔那彥成奏攻克道口賊巢進圍滑城丙寅敕刪減公罪則例壬申通逆都司曹綸伏誅戊子那彥成奏楊芳等攻克司寨山賊寨殲斃首犯李文成十二月丙申命松筠長齡籌議新疆經費丙午那彥成奏攻克滑城賊渠宋元成等伏誅生擒牛亮臣等予那彥成三等男楊遇春等以次奬有差命托津留辦長垣賊匪是歲免直隸河南湖南等省二十六州縣災賦除江蘇河南湖南廢田田賦朝鮮琉球越南暹羅入貢十九年甲戌春正月壬午以吳璥為河東河道總督二月甲午上御經筵乙未以晉昌為盛京將軍壬寅成都將軍賽沖阿以勦陝西賊匪苗小一等予三等男長齡輕車都尉楊遇春晉一等男壬子以富俊為吉林將軍特依順保為黑龍江將軍丙辰鐵保免以英和為吏部尚書奕紹為漢軍都統以戴均元為左都御史閏二月甲子以和寧為禮部尚書己丑予死事滑縣知縣強克捷教諭呂秉鈞巡檢劉斌等世職四月乙亥上閱健銳營兵豫親王裕豐失察屬人祝現入教謀逆已發覺不入奏削爵以其弟裕興襲封以興肇為漢軍都統壬午漕運總督桂芳卒丙戌賜龍汝言等二百二十六人進士及第出身有差五月癸亥以和寧為熱河都統六月庚申朔日有食之庚辰以劉鐶之為戶部尚書初彭齡為兵部尚書署江蘇巡撫八月甲子上御經筵辛未大學士威勤伯勒保再乞致仕許之命食伯俸以托津為大學士明亮協辦大學士戊寅上謁陵甲申上還京九月乙未以景安為戶部尚書冬十月乙丑以慶溥為左都御史己巳江西巡撫阮元以擒捕土匪加太子少保十一月癸丑命開墾伊犂吉林荒地十二月癸未百齡罷協辦大學士以章煦為協辦大學士乙酉祫祭太廟是歲免直隸二縣河南二縣黑龍江各城災賦除奉天岫巖浙江西安四縣廢田田賦朝鮮琉球入貢二十年乙亥春正月甲午時享太廟命智親王行禮二月己未上御經筵三月庚寅上謁東陵戊申上還京甲午初彭齡以參劾百齡不實又代茅豫乞病降官旋經百齡查覆參奏奪職己酉兩廣總督蔣攸銛疏陳查禁鴉片烟章程得旨洋船到澳門時按船查驗杜絕來源官吏賣放及民人私販者分別治罪夏四月己巳上閱健銳營兵壬午上製官箴二十六章宣示臣工五月丁亥刑部疏審明知府王樹勳即僧明心矇混捐保職官得旨枷號兩個月遣戍黑龍江入教侍郎蔣予蒲褫職六月戊辰上製勤政愛民論宣示中外己卯常明奏中瞻對土番洛布七力滋事改委總兵羅思舉由下瞻對前往勦辦其勦辦不力之總兵羅聲皋及禀之都司圖棠阿均褫職逮問秋七月甲午總兵羅思舉勦辦瞻對土番洛布七力竣事下部議癸卯上巡幸木蘭八月戊辰上行圍百齡以捕獲編造逆詞首犯方榮升功晉三等男九月己亥上還京冬十月庚申召松筠來京以長齡為伊犂將軍癸亥命侍郎那彥寶往勘山西地震災十一月丁亥禮親王昭槤以刑比佃丁欠租削爵圈禁以麟趾襲十二月己卯祫祭太廟是歲免直隸寧晉二縣災賦除江蘇寶山靖江山西靜樂廢田田賦會計天下民數三萬二千六百五十七萬四千八百九十五名口存倉穀數三千八十萬二千八百六十九石九斗一升七合五勺朝鮮琉球暹羅入貢二十一年丙子春正月丙戌特詔諸親王郡王勿令內監代為奏事致開交結之端二月壬子上御經筵甲戌上謁東陵庚辰上還京三月庚寅上謁西陵辛丑上臨故大學士朱珪墓賜奠丁未上還宮夏四月丙子張師誠以父疾具奏不候旨即回籍罷以胡克家為江蘇巡撫五月辛卯以馬慧裕為左都御史孫玉庭為湖廣總督丁未以鄂勒哲依圖為御前大臣六月丁丑休致大學士慶桂卒戊寅那彥成緣事褫職逮問以方受疇為直隸總督閏六月戊戌釋昭槤於禁所壬寅以戴均元為吏部尚書秋七月乙卯和世泰穆克登額蘇楞額以帶領英吉利國使臣不諳事體不克入覲俱黜降以松筠為滿洲都統和寧為工部尚書乙丑上巡幸木蘭八月壬辰上行圍九月戊午上迴鑾閱古北口兵壬戌上還京冬十月戊子命松筠署兩江總督章煦為軍機大臣十一月壬子百齡卒調孫玉庭為兩江總督阮元為湖廣總督丙辰以綿志為領侍衞內大臣十二月癸卯祫祭太廟是歲免直隸河南浙江湖南等省五十六州縣災賦有差朝鮮琉球英吉利入貢二十二年丁丑春正月壬申上御經筵二月丁丑釋奠先師孔子癸未以長齡為陝甘總督晉昌為伊犂將軍富俊為盛京將軍三月甲辰朔以董教增為閩浙總督戊申增設天津水師營總兵官專轄水師兩營壬子上謁東陵己巳上還京辛未章煦免以戴均元協辦大學士盧蔭溥為兵部尚書汪廷珍為左都御史夏四月丁亥上閱健銳營兵庚寅停伊犂仲夏進馬辛卯雲南夷匪平加伯麟太子少保戊戌賜吳其濬等二百五十五人進士及第出身有差五月辛酉上祈雨壬戌雨以玉麟為駐藏大臣丁卯福建布政使李賡芸被誣自縊遣熙昌王引之鞫其事得實奉旨總督汪志伊巡撫王紹蘭俱奪職壬申上製望雨省愆說六月甲戌松筠疏請停止明年奉謁祖陵奉旨嚴斥罷大學士黜為察哈爾都統以明亮為大學士伯麟協辦大學士和寧為兵部尚書以賽沖阿為御前大臣德寧阿為成都將軍秋七月庚申上巡幸木蘭以蘇楞額為工部尚書和世泰為理藩院尚書八月丁亥上行圍壬辰積拉堪罷以毓秀為杭州將軍九月癸丑常明卒以蔣攸銛為四川總督阮元為兩廣總督慶保為湖廣總督庚申上還京庚午上製諫臣論頒都察院冬十月辛未朔日有食之十一月乙丑以伊沖阿為熱河都統十二月甲戌免雲南銅廠逋銀丁酉祫祭太廟是歲免直隸八縣黑龍江三城災賦除奉天承德直隸定州江蘇丹徒江陰江西豐城河南孟縣福建侯官等縣水沖河壓田賦朝鮮琉球越南入貢二十三年戊寅春正月戊申特詔松筠勿沽名市惠以保桑榆甲寅詔明亮年逾八旬宜節勞頤養勿庸常川入直並免帶領引見承旨二月庚午命戴均元和寧為軍機大臣大學士董誥致仕命食全俸庚辰上御經筵己丑上閱火器營兵三月庚子上謁西陵庚戌以章煦為大學士汪廷珍為禮部尚書吳芳培為左都御史戊午上還京四月戊辰朔日有食之乙亥風霾丙子詔曰昨日酉初三刻暴風自東南來塵霾四塞燃燭始能辨色其象甚異朕心震懼惕思上蒼示警之因稽諸洪範咎徵蒙恆風若之義皆朕蒞事不明用人不當之所致也有言責者體朕遇災而懼之心剴切論列無有所隱即下民有寃抑者亦可據事代為直陳以副朕修德弭災之意給事中盧浙疏言風沙示警請禁員弁貪功妄捕擾累平民得旨所奏甚是林清案內逸犯飭緝承緝員弁輒以他犯塞責番役兵丁乘機肆虐誣陷索擄無所不至比到官審明業已皮骨僅存貲產蕩盡甚有因而殞命者寃苦莫訴宜致斯災所有次要五十餘犯概令停緝即祝現等六犯亦只交刑部存記獲日辦理嗣後捕役有犯前情該管官嚴刑重懲以其家產付諸被誣之家庶可儆惡習而安良懦己卯欽天監疏言謹按天文正義天地四方昏濛若下塵雨名曰霾故曰天地霾君臣乖大旱又主米貴得旨初八日之事正與正義之象相同惟朕恪遵成憲日日召見臣工前席周諮似不致於乖離但此其迹也其實與朕同心望治有幾人哉不敢面諍退有後言貌合而情暌是即乖也其於同僚不為君子之和而為小人之同是亦乖也我君臣其交儆焉庚辰上祈雨戊子上再祈雨辛卯雨五月戊戌詔曰館臣呈進敕修明鑑於萬曆天啟載入先朝開創之事又加按語頌揚於體例均為未合副總裁侍郎秀寧降為侍衞前往新疆換班正總裁曹振鏞等各予薄罰另行纂輯六月壬申武陟沁河溢旋報合龍七月甲子上東巡啟鑾八月丁卯朔詔以取道民田免經過奉天承德四州縣額賦戊子頒行皇朝通禮壬午上祭北鎮辛卯謁永陵行大饗禮九月丙申朔謁福陵丁酉謁昭陵均行大饗禮詣寶冊前行禮上製再舉東巡慶成記臨奠克勤郡王岳託武勳王揚古利弘毅公額亦都直義公費英東墓加恩額亦都後裔五人費英東後裔一人庚子上詣天壇堂子行禮辛亥上迴鑾丁巳以富俊為吉林將軍賽沖阿為盛京將軍冬十月庚午上駐蹕興隆寺辛未萬壽節行宮受賀癸酉上謁東陵丙子上還京辛巳予告大學士董誥卒上臨第賜奠十一月戊申以奕灝為蒙古都統辛亥詔曰國家臨御年久宜加意於人心風俗而人心之正風俗之醇則繫於政教之得失其間消息甚微繫於國脉甚重未可視為迂圖也天下事有萬殊理歸一是從嚴從寬必準諸理施行所及乃能大畏民志民志定民心正矣凡我君臣當以憂盛危明之心不為苟且便安之計其於風俗之淳薄尤當時時體察潛移默化整綱飭紀正人心以正風俗亮工熙績莫重於斯期與內外臣工交勉之十二月戊辰上祈雪戊子以八十六為廣州將軍松筠為禮部尚書以劉鐶之為左都御史壬辰祫祭太廟是歲免順天直隸山東安徽甘肅雲南等省七十九州縣災賦有差朝鮮琉球入貢二十四年己卯春正月甲午朔上六旬萬壽頒詔覃恩賜廷臣宴封皇三子綿愷為惇親王皇四子綿忻為瑞親王皇長孫奕緯為貝勒晉封綿志奕紹等有差丁巳和寧免直軍機以侍郎文孚為軍機大臣二月甲子上御經筵三月己亥上謁東陵壬子上幸南苑行圍己未上謁西陵夏四月甲子上還京庚辰上閱健銳營兵丙戌賜陳沆等二百二十四人進士及第出身有差戊子罷鳳陽九江兩關監督由巡道兼理己巳上祈雨庚寅以松筠為內大臣閏四月己酉上詣天神壇祈雨是日雨五月乙酉成親王永瑆以告祭禮愆罷職削俸歸第以英和和世泰俱為滿洲都統六月癸卯調松筠為工部尚書秋七月壬戌以鄭親王烏爾恭阿為漢軍都統庚申上巡幸木蘭壬午永定河決命吳璥那彥寶勘築八月辛卯河南蘭陽北岸河溢予告大學士威勤伯勒保卒贈一等侯九月壬戌上還京癸酉罷松筠御前大臣為盛京將軍冬十月乙未萬壽節上御太和殿受賀侍郎周系英因參劾湖南客民焚殺兼致私書革職並斥革其子舉人十一月乙巳晉封明亮三等侯十二月庚子吳邦慶以奏覆湖南客民焚殺案不實降官丙午董教增疏請洋船准販茶葉得旨斥駁丙辰祫祭太廟是歲免直隸浙江湖南等省三十九州縣衛災賦旗租有差除江蘇川沙廳寶山縣廢地田賦朝鮮琉球越南暹羅南掌入貢二十五年庚辰春正月壬申詔優恤老臣明亮和寧等毋庸來園帶領引見二月己丑上御經筵癸卯章煦以疾致仕以戴均元為大學士吳璥協辦大學士戊申上閱火器營兵乙卯慶郡王永璘有疾上臨視晉封親王三月甲子上謁東陵兵部遺失行印事聞明亮以次罰降有差乙丑上詣明成祖宣宗孝宗陵奠酒己巳慶親王永璘薨戊寅上還京臨故慶親王第賜奠命其子綿慜襲郡王夏四月甲午上詣八里莊慶僖親王殯所賜奠庚戌賜陳繼昌等二百四十六人進士及第出身有差六月癸卯禁王公私設諳達及買民女為妾松筠黜為驍騎校秋七月壬申上巡幸木蘭方受疇等疏呈嘉禾戊寅駐蹕避暑山莊己卯上不豫嚮夕大漸宣詔立皇次子智親王為皇太子日加戌上崩於行宮年六十有一八月乙巳奉移梓宮還京十月甲辰恭上尊諡曰受天興運敷化綏猷崇文經武孝恭勤儉端敏英哲睿皇帝廟號仁宗道光元年三月癸酉葬昌陵論曰仁宗初逢訓政恭謹無違迨躬蒞萬幾鋤奸登善削平逋寇捕治海盜力握要樞崇儉勤事闢地移民皆為治之大原也詔令數下諄切求言而吁咈之風未遽睹焉是可口旡已
