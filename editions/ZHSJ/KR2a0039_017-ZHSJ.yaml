道總督甲辰以德英阿署伊犂將軍松筠署烏里雅蘇台將軍普恭署左都御史喀什噶爾幫辦大臣巴彥巴圖等率兵勦張格爾妄殺布魯特部人其酋汰列克糾衆圍巴彥巴圖等於喀什噶爾慶祥使穆克登布等援之命慶祥緩來京是月賑陝西綏德等四州縣雹災蠲直隸開州等十五州縣旱災雹災新舊額賦冬十月庚辰以長齡署伊犂將軍楊遇春署陝甘總督鄂山回陝西巡撫命德英阿赴烏里雅蘇台召松筠來京辛巳召蔣攸銛以那彥成為直隸總督是月賑陝西榆林等三縣雹災十一月壬辰以暹羅國貢船漂沒詔免其補貢封世子鄭福為暹羅國王庚子免托津管刑部以蔣攸銛代之並命為軍機大臣乙巳上詣大高殿祈雪丙午除直隸昌黎縣捍禦灤河地額賦丁未雪命慶祥以將軍銜署喀什噶爾參贊大臣壬子以慶祥為喀什噶爾參贊大臣兼鑲黃旗漢軍都統未任前以穆克登布署之授長齡伊犂將軍是月賑甘肅岷州等六州縣水災雹災十二月己巳免山東章丘鄒平二縣被水逋賦戊寅命科爾沁郡王僧格林沁御前行走是月賑奉天錦州府旱災蟲災是歲朝鮮琉球暹羅越南入貢六年春正月甲申以雙城堡屯田加富俊太子太保是月賑奉天錦州中前所等處旗戶水災給江蘇沛縣災民口糧貸奉天寧遠州旗民河南鄢陵等七縣甘肅岷州等十二州縣山西襄垣縣直隸寶坻等三縣水災旱災雹災籽種口糧倉穀二月戊午以謁陵命托津英和汪廷珍盧蔭溥留京辦事甲戌上謁西陵免經過地方額賦十分之三戊寅謁泰陵泰東陵昌陵辛巳上還圓明園三月癸巳調張井為江南河道總督庚戌賞潘錫恩三品頂戴為南河副總河是月貸山西靈丘縣湖北荊州等五營被災兵丁倉穀夏四月甲子上詣黑龍潭神祠祈雨甲戌以鄧廷楨為安徽巡撫丙子賜朱昌頤等二百六十五人進士及第出身有差是月給江蘇沛縣災民口糧貸江蘇徐州鎮三營湖北德安宜都二營災區兵丁錢穀五月乙未禮部尚書穆克登額免以松筠代之以那清安為左都御史以明山為熱河都統戊戌雲貴總督趙慎畛卒調阮元代之以嵩孚為湖廣總督明山為刑部尚書慶惠為熱河都統壬寅免直隸河間等五縣積水地畝逋賦是月給山東堂邑等十二縣旱災口糧貸直隸廣平等五縣山東堂邑等十二縣河南臨漳等十二縣山西隰州營口糧籽種倉穀六月賑湖北江陵當陽二縣水災給河南臨漳等七縣旱災口糧貸直隸大名鎮標等七營被旱兵餉秋七月癸巳張格爾糾安集延布魯特回衆入卡喀什噶爾回衆響應之命楊遇春為欽差大臣勦之鄂山署陝甘總督命武隆阿為欽差大臣赴臺灣己亥以德英阿為伊犂參贊大臣倫布多爾濟署烏里雅蘇台將軍庚子張格爾陷和闐城領隊大臣奕湄幫辦大臣桂斌等死之甲辰命長齡為揚威將軍以武隆阿為欽差大臣與楊遇春參贊軍務乙巳以德英阿署伊犁將軍是月賑江蘇高郵等六州縣水災給湖南醴陵等三州縣山西歸化城水災口糧貸陝西西鄉盩厔二縣水災籽種奉天錦州府屬各驛馬乾銀八月回酋巴布頂等陷英吉沙爾甲戌張格爾陷喀什噶爾城參贊大臣慶祥幫辦大臣舒爾哈善等死之進陷葉爾羌辦事大臣音登額幫辦大臣多隆武等死之是月賑江蘇海州等五州縣水災給薩拉齊廳水災口糧貸山西綏遠城渾津黑河水災口糧九月己卯朔黃鉞免以王鼎為戶部尚書辛巳幸南苑命固原提督楊芳甘肅提督齊慎赴阿克蘇軍營丁亥還圓明園戊子以博啟圖為察哈爾都統辛卯召穆彰阿來京以楊懋恬署漕運總督乙未以長清為阿克蘇辦事大臣己亥慶廉奏敗賊於阿察他克臺辛丑免阿克蘇附近回莊本年應交麥石癸卯調格布舍為烏里雅蘇台將軍是月給貴州松桃廳山西歸化廳江蘇山陽鹽城二縣江西蓮花等七廳縣水災口糧銀穀冬十月庚申贈喀什噶爾死事參贊大臣慶祥太子太保壬戌免兩淮富安等十四場水災竈課甲子撥江蘇藩關道庫銀一百四十五萬兩賑高郵等二十州縣水災是月給安徽宿州等八州縣衞被災口糧蠲緩江蘇高郵等四十七州廳縣衞災民新舊額賦十一月戊子長齡等奏敗賊于阿克蘇之柯爾坪己丑以臺灣平加孫爾準太子少保是月賑湖南茶陵等三州縣災民貸甘肅秦州等十三州縣災民口糧蠲緩盛京牛莊等處水災糧租湖南茶陵等五州縣水災新舊額賦十二月戊申朔以楊健為湖巡撫以訥爾經額為漕運總督丙辰四子部扎薩克親王伊什楚克魯布以僭妄削爵戊午調英和為理藩院尚書禧恩為戶部尚書穆彰阿為工部尚書是歲琉球朝鮮入貢七年春正月丁酉和闐回衆降命優賚之尋復為張格爾所陷庚子以惠顯為駐藏辦事大臣是月展賑江蘇高郵等二十三州縣衞軍民兩淮丁谿等九場竈戶水災給安徽泗州五河縣及屯坐各衞奉天白旗堡小黑山二處災歉口糧貸直隸開州等十州縣甘肅秦州等十七州廳縣河南原武等四縣兩淮富安等五場江西蓮花等五廳縣災歉口糧籽種河南修武封丘二縣山西薩拉齊廳災民倉穀江蘇川沙廳等三營青村等八營銀米二月甲戌上詣黑龍潭祈雨是月貸江蘇狼山等三營毗連災區兵餉三月己丑賑江蘇高郵等州縣水災丙申長齡等奏敗賊於洋阿爾巴特晋長齡太子太保丁酉上詣黑龍潭祈雨己亥長齡等敗賊于沙布都爾獲安集延回目色提巴爾第命蔣攸銛穆彰阿查勘南河以那清安署工部尚書癸卯以惠顯為駐藏大臣甲辰雨是月賑江蘇高郵等州縣災民貸甘肅張掖等三縣直隸開州等六州縣貧民口糧夏四月丙午朔日食戊申長齡等奏敗賊于阿克瓦巴特予長齡紫韁加楊遇春太子太傅武隆阿太子少保壬子長齡等克喀什噶爾張格爾遁辛酉進克英吉沙爾以張格爾未獲褫長齡紫韁楊遇春太子太傅武隆阿太子少保五月庚辰楊芳克和闐獲回目噶爾勒等誅之壬午陸以莊免以王引之為工部尚書癸未琦善張井潘錫恩嚴議琦善免兩江總督以蔣攸銛代之以托津管刑部丁亥命穆彰阿在軍機大臣上學習行走閏五月乙巳朔免回疆八城新舊額賦丙午命楊遇春回以楊芳為參贊大臣戊申調奕顥為盛京將軍晉昌為綏遠城將軍是月貸湖北黃州協道士洑營兵丁穀石六月壬午上詣黑龍潭祈雨丙戌雨秋七月壬子協辦大學士禮部尚書汪廷珍卒晉昌免正黃旗領侍衞內大臣以鄭親王烏爾恭阿代之丙辰以姚文田為禮部尚書湯金釗為左都御史丁巳命盧蔭溥協辦大學士己未英和以失察家丁褫協辦大學士理藩院尚書紫韁召富俊為理藩院尚書協辦大學士以博啟圖為吉林將軍以安福為察哈爾都統辛酉熱河都統昇寅免以那清安代之癸亥那清安仍為左都御史英和褫太子太保降二品頂戴為熱河都統乙丑以武隆阿為喀什噶爾參贊大臣以盧坤為山東巡撫戊辰免甘肅兵差過境之各州縣額賦協濟軍需之甘肅陝西各州縣額賦十分之六庚午論喀什噶爾等四城收復功復楊遇春太子太保加鄂山盧坤太子少保壬申以再定回疆晋曹振鏞太子太師蔣攸銛文孚太子太保加王鼎玉麟太子少保是月給奉天錦州等三府州縣水災旗民口糧八月癸未萬壽節停筵宴丙申調盧坤為山西巡撫以琦善為山東巡撫是月賑陝西略陽縣湖北江陵監利二縣水災給江淮等處被災幫丁月糧蠲緩江蘇高郵等四十七州縣衞廳被水新舊額賦九月癸丑以孝穆皇后梓宮移寶華峪命皇長子奕緯祖奠丙辰上詣孝穆皇后梓宮前奠酒授伊里布雲南巡撫戊午免兵差過境之陝西華州等二十二州廳縣額賦十分之六庚申上謁東陵免經過地方本年額賦十分之五癸亥謁昭西陵孝陵孝東陵景陵裕陵召長齡以德英阿為伊犂將軍晉戴均元太子太師是日回鑾庚午以楊國楨為河南巡撫免兵差過境之盛京省城及所屬開原等十四處旗民額賦十分之四是月加賑陝西略陽縣水災冬十月庚辰免嘉慶二十五年至道光五年各省民欠正雜錢糧壬午皇太后萬壽聖節奉懿旨停筵宴丙戌禮部尚書姚文田卒以湯金釗代之以潘世恩為都察院左都御史庚寅巴綳阿免以額勒津為科布多參贊大臣丁酉以綸布多爾濟為庫倫蒙古辦事大臣是月賑湖北江陵監利二縣及屯坐各衞水災給奉天廣寧縣被水站丁口糧貸山西定襄潞城二縣旱災雹災倉穀黑龍江墨爾根城歉收口糧十一月乙巳命長齡督同楊芳辦理回疆善後事宜丙午召那彥成庚戌授那彥成欽差大臣會同長齡籌辦回疆善後事宜以屠之申署直隸總督己巳免奉天遼陽等七州廳縣地丁銀十分之四是月賑甘肅岷州等六州縣水災雹災十二月以彥德為烏里雅蘇臺將軍是歲朝鮮琉球暹羅入貢八年春正月丙午以松筠署熱河都統那清安署禮部尚書戊申授劉彬士浙江巡撫壬戌長齡奏獲張格爾癸亥封長齡威勇公授御前大臣封楊芳果勇侯調果齊斯歡為綏遠城將軍乙丑晋曹振鏞太傅文孚太子太傅玉麟太子太保加穆彰阿太子少保並充軍機大臣授楊遇春陝甘總督丙寅晉將攸銛太子太傅復英和太子太保命那彥成仍以欽差大臣赴喀什噶爾偕楊芳辦善後丁卯加禧恩太子少保是月給江蘇沛縣貧民口糧貸直隸滄州等九州縣災歉口糧湖北江陵監利二縣及屯坐各衞籽種山西定襄等四縣倉穀江蘇江寧京口駐防修屋費二月乙亥羣臣以再定回疆上尊號卻之命議上皇太后徽號都察院左都御史史致光卒三月庚子朔日食乙巳上行圍至丁巳皆如之戊申上還宮是月貸直隸開州等六州縣貧民口糧夏四月調果齊斯歡為黑龍江將軍以特依順保為綏遠城將軍是月貸山西代州等二十四州縣歉收湖北駐兵災區荊州水師各營倉穀五月己酉以獲張格爾遣官告祭太廟社稷行獻俘禮庚戌御午門受俘晉長齡太保加楊芳太子太保壬子上廷訊張格爾罪磔於市丁巳命圖平定回疆四十功臣及軍機大臣曹振鏞文孚王鼎玉麟像於紫光閣是月貸湖北駐紮歉區黃州協兵丁倉穀六月癸酉揚威將軍大學士長齡凱旋命鄭親王烏爾恭阿等迎勞丙子命長齡管理藩院秋七月甲辰朝鮮國王李玜以回疆平定遣使表賀進方物丙午以昇寅為熱河都統以那清安署禮部尚書八月丁丑萬壽節停止筵宴己卯以成格為熱河都統調盧坤為廣東巡撫以徐炘為山西巡撫甲申命奕紹托津富俊陳若霖留京辦事是月給浙江淳安等四縣水災口糧貸長蘆被淹竈戶工本蠲緩浙江淳安等四縣新舊額賦九月戊戌朔日食丙午上謁東陵免經過地方額賦十分之三丁未以寶華峪工程不慎褫英和職降戴均元三品頂戴己酉謁昭西陵孝陵孝東陵景陵裕陵並祭孝穆皇后殯宮褫戴均元職庚戌謁裕陵行大饗禮辛亥下英和於獄籍其家癸丑上還圓明園甲寅上謁西陵免經過地方額賦十分之三丁巳謁泰陵泰東陵昌陵戊午謁昌陵行大饗禮庚申逮戴均元下獄籍其家辛酉上還圓明園調特依順保為黑龍江將軍以那彥寶為綏遠城將軍達凌阿為塔爾巴哈臺參贊大臣是月賑兩淮海州屬中正等三場竈戶水災貸回疆西四城兵丁茶價銀冬十月庚午英和遣戍黑龍江甲午復惇郡王綿愷為惇親王是月賑江蘇海州等三州縣衞浙江建德等五縣水災給江蘇高郵等九州縣安徽泗州等二十六縣水災旱災一月口糧貸奉天廣寧等處水災旗民口糧浙江富陽縣貧民穀石齊齊合爾等處旗營官莊銀糧蠲緩江蘇海州等三十六州廳縣衞安徽泗州等二十六州縣浙江海寧等十三州縣旱災水災新舊額賦十一月甲辰上皇太后徽號曰恭慈安豫康成皇太后乙巳以加上皇太后徽號禮成頒詔天下覃恩有差己未釋戴均元是月賑浙江富陽縣水災給盛京寧古塔等處水災口糧十二月辛巳那彥成奏招降附霍罕之額提格訥部落諭嘉之令妥為撫馭是歲琉球朝鮮入貢九年春正月丁未希皮察克愛曼布魯特阿仔和卓來降壬子楊芳加太子太傅是月給安徽泗州等五州縣並屯坐衞江蘇海州等十五州縣衞災民口糧賑兩淮板浦等三場被災貧丁貸山西代州解州水災籽種河南上蔡縣水災倉穀二月己巳御經筵庚午上奉皇太后幸圓明園霍罕西南達爾瓦斯部落遣使內附諭嘉奬卻之甲午命吉林將軍博啟圖為御前大臣以瑚松額代之三月丙午上幸南苑丁未上行圍至辛亥皆如之辛亥西藏徼外拉達克部長呈進奏表壬子上還圓明園甲寅上御閱武樓閱京營兵戊午召琦善以訥爾經額為山東巡撫朱桂楨為漕運總督夏四月癸酉召戴三錫以琦善為四川總督壬午屠之申以讞獄錯誤降松筠署直隸總督丙戌奉皇太后御含輝樓閱皇子及侍衞等騎射戊子賜李振鈞等二百二十一人進士及第出身有差是月貸湖南乾州等五廳州縣上年旱災口糧籽種山西朔州等二十三州廳縣歉收倉穀五月丁酉移孝穆皇后梓宮於寶華峪正殿神牌於東配殿是月貸湖北荊州城守水師二營及宜都營被水倉穀六月乙丑以福緜為科布多參贊大臣己巳免西藏喀喇烏蘇等處雪災番族貢馬銀並撫恤達木八旗被災官兵戶口甲戌伊犂將軍德英阿卒以玉麟代之調松筠為兵部尚書以博啟圖為禮部尚書丁丑召安福以福克精額署察哈爾都統是月貸三姓地方上年被水倉穀七月己亥申嚴粵海關官銀出洋私貨入口禁以扎隆阿為喀什噶爾參贊大臣丁巳越南國王以母老乞葠芪上嘉賚之是月賑廣西雒容永福二縣水災免安徽泗州五河縣鳳陽泗州二衞上年被水錢糧十分之一八月癸亥以謁盛京祖陵命奕紹托津湯金釗明山留京辦事庚辰上奉皇太后謁盛京祖陵九月壬辰朔日食免蹕路經過之承德等五廳州縣本年額賦及幫辦差務之岫巖等九廳州縣額賦十分之五壬寅朝鮮貢使李相璜等迎覲乙巳上親射並閱盛京官兵等騎射丁未上謁永陵戊申行大饗禮閱興京城己酉博啟圖降調以耆英為禮部尚書上謁福陵臨奠弘毅公額亦都墓加恩後裔博克順等癸丑行大饗禮上至盛京詣太廟寶冊前行禮乙卯上詣天壇堂子奉皇太后幸嘉蔭堂臨奠克勤郡王岳託墓朝鮮國王李玜遣使貢方物戊午詣地壇臨奠直義公費英東墓己未上御大政殿賜扈從王公大臣蒙古王貝勒貝子公及盛京文武官員宴賞有差十月以潘世恩署禮部尚書辛未皇太后聖壽節上率扈從王公大臣詣皇太后行宮行慶賀禮上奉皇太后幸澄海樓壬午謁裕陵甲申以吳光悅為江西巡撫乙酉上奉皇太后還宮是月給安徽泗州等五州縣衞一月口糧十一月丁巳召英惠調成格為烏魯木齊都統以裕恩為熱河都統是月賑奉天遼陽等五處被災旗民口糧十二月甲子緬甸國王孟既遣使表賀乙亥撫恤西藏三十九族成災番民是月賑山東益都臨朐二縣地震災蠲直隸隆平寧晉二縣窪地額賦之五十年春正月丁巳暹羅國王鄭福遣使表賀並貢方物是月賑江蘇沛縣安徽盱眙等六州縣衞旱災水災貸直隸滄州鹽山二州縣甘肅皐蘭等十四州縣旱災水災銀穀二月壬戌上御經筵丁卯命緝捕河南梟匪捻匪丁丑命緝捕江西上猶縣會匪三月庚寅以謁西陵命奕紹托津長齡盧蔭溥留京辦事己亥免湖南澧州濱湖淤田額賦並前借籽種銀壬寅上奉皇太后謁西陵以昇寅為綏遠城將軍甲辰調瑚松額為盛京將軍以福克精阿為吉林將軍武忠額為察哈爾都統丙午上謁泰陵泰東陵昌陵己酉上幸南苑庚戌上行圍至壬子如之壬子以哈薩克汗阿勒坦沙喇等請遣其子入覲命至熱河陛見四月辛未申禁外省才不勝任之員改京職五月辛酉河南直隸毗連十四州縣地震命加意撫恤六月辛卯蔣攸銛有疾以陶澍署兩江總督乙未以程祖洛為湖南巡撫七月丙子暹羅遣使賀萬壽貢方物免江蘇海州四州縣舊欠額賦八月乙未萬壽節停筵宴庚戌召蔣攸銛來京授陶澍兩江總督調盧坤為江蘇巡撫以朱桂楨為廣東巡撫命吳邦慶以三品銜署漕運總督是月加賑湖北監利等四縣水災九月戊午安集延回匪復入喀什噶爾幫辦大臣塔斯哈戰敗死之遂圍喀什噶爾城命玉麟等往勦命楊遇春駐肅州楊芳胡超率陝甘兵協勦以鄂山署陝甘總督徐炘署陝西巡撫阿勒精阿署山西巡撫己未以楊遇春為欽差大臣督辦軍務以英惠署黑龍江將軍丁卯命長齡為欽差大臣率桂輪阿勒罕保等赴新疆辛未以玉英署黑龍江將軍乙亥上閱火器營兵丁丑大學士蔣攸銛以讞獄誤降侍郎召徐炘來京以顏伯燾署陝西巡撫以盧蔭溥為大學士李鴻賓協辦大學士仍留兩廣總督任調湯金釗為吏部尚書王引之為禮部尚書潘世恩為工部尚書朱士彥為左都御史是月賑直隸磁州等三州縣地震災四川彭城等二縣水災十月以盧蔭溥為體仁閣大學士戊子以富呢揚阿為浙江巡撫乙未仍授長齡為揚威將軍命哈哴阿楊芳參贊軍務庚子以樂善為烏里雅蘇台將軍辛丑以軍事遲誤褫伊犁參贊大臣容安職並所襲子爵壬寅以恩銘為烏里雅蘇台參贊大臣癸卯回匪犯葉爾羌壁昌等擊敗之丁未逮容安壬子召富呢揚阿來京是月賑直隸大城文安二縣災民給安徽蕪湖等五州縣衞口糧貸黑龍江等三處旗民倉穀甘肅皐蘭等十一州縣貧民口糧十一月以楊懌曾為湖北巡撫乙亥申諭李鴻賓等查辦廣東會匪丁丑諭吳光悅查辦江西贛南會匪壬午嵩孚降調以盧坤為湖廣總督調程祖洛江蘇巡撫蘇成額湖南巡撫以祁為廣西巡撫以阿勒精阿為江西巡撫是月賑河南安陽等三縣地震災給江西廬陵縣水災修屋費十二月癸巳托津免管刑部以盧蔭溥代之丙申喀什噶爾英吉沙爾回匪平予死事喀什噶爾幫辦大臣塔斯哈都統銜是月賑雲南縣水災貸江蘇蘇州等四府州屬駐近災區兵丁銀米
