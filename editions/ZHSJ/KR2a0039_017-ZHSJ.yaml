body:
  text: 清史稿卷十七本紀十七宣宗本紀一宣宗效天符運立中體正至文聖武智勇仁慈儉勤孝敏寬定成皇帝諱旻寧仁宗次子母孝淑睿皇后乾隆四十七年八月初十日生上於擷芳殿幼好學從編修秦承業檢討萬承風先後受讀又與禮部右侍郎汪廷珍翰林侍讀學士徐頲朝夕講論乾隆五十六年八月高宗行圍威遜格爾上引弓獲鹿高宗大喜賜黃馬褂花翎嘉慶元年娶孝穆成皇后四年四月戊戌仁宗遵建儲家法親書上名緘藏鐍匣十三年正月孝穆成皇后薨繼娶孝慎成皇后十八年九月從幸秋獮木蘭上先還京師而教匪林清黨犯闕之變作是月戊寅賊入內右門至養心殿南欲北竄上御槍斃二賊餘賊潰散亂始平飛章上聞仁宗欣慰封上為智親王號所御槍曰威烈諭內閣曰忠孝兼備豈容稍靳恩施上謙沖不自滿假謝恩奏言事在倉猝又無禦賊之人勢不由己事後愈思愈恐其不矜不伐如此二十五年秋七年仁宗秋獮熱河上隨扈戊寅仁宗不豫己卯大漸御前大臣賽沖阿索特納木多布齋軍機大臣托津戴均元盧蔭溥文孚總管內務府禧恩和世泰公啟鐍匣宣示嘉慶四年御書立上為皇太子仁宗崩即日奉大行皇帝梓宮回京辛巳尊母后為皇太后晉封惇郡王緜愷為惇親王緜愉為惠郡王癸未奉皇太后懿旨大行皇帝龍馭上賓皇次子智親王仁孝聰睿英武端醇見隨行在自當上膺付託撫馭黎元但恐倉卒之中大行皇帝未及明諭而皇次子秉性謙沖予所深知為降諭旨傳諭留京王大臣馳寄皇次子即正尊位上奉懿旨恭摺覆奏並將御前大臣等啟鐍匣所藏嘉慶四年四月立皇太子硃諭進呈召在籍翰林院侍講秦承業來京八月乙酉命遵古制行三年之喪臣民仍照定例持服免直隸承德府屬及經過宛平等五州縣明年額賦癸巳允王大臣請持服百日乙未大行皇帝梓宮還京師御史袁銑疏陳定規模正好惡七事上優詔嘉納之加方受疇太子太保戊申大學士九卿等奏上大行皇帝廟號尊諡曰仁宗受天興運敷化綏猷崇文經武孝恭勤儉端敏英哲睿皇帝頒大行皇帝遺詔於朝鮮琉球暹羅越南緬甸諸國庚戌上即皇帝位於太和殿告祭天地太廟社稷頒詔天下以明年為道光元年加恩中外非常赦不原者咸赦除之加黃鉞劉鐶之賽沖阿孫玉庭蔣攸銛太子少保辛亥停本年秋決是月賑河南許州地震災貸盛京彰武臺邊門等處被淹兵丁一年錢糧並給修屋費貸巨流河等處一月口糧九月己未尊大行皇帝陵曰昌陵庚申切責軍機大臣以擬遺詔錯誤罷托津戴均元軍機大臣文孚盧蔭溥仍留軍機大臣均下部嚴議斌靜奏沖巴噶什愛曼布魯特比蘇蘭奇糾薩木薩克之子張格爾作亂命慶祥兼程赴喀什噶爾勦之命大學士曹振鏞尚書黃鉞英和在軍機大臣上行走壬戌以那彥成為理藩院尚書命吏部尚書協辦大學士吳璥督理河南儀封河工調劉鐶之為吏部尚書茹棻為兵部書盧蔭溥為工部尚書黃鉞為戶部尚書汪廷珍為禮部尚書顧德慶為左都御史起松筠為左副都御史戊辰以秦承業為翰林院侍講學士命在上書房行走庚午上始御西廠幄次引見廷臣詔開鄉會試恩科命臣工切實言事丁丑豫親王裕興以罪奪爵圈禁壬午加提督楊遇春太子少保賞雙眼花翎是月賑河南睢州等七州縣水災並給睢州等四州縣一月口糧冬十月戊子調英和為戶部尚書那彥成為吏部尚書穆克登額為工部尚書普恭為禮部尚書和世泰為理藩院尚書松筠為左都御史辛丑上大行皇帝尊諡廟號翌日頒詔天下覃恩有差甲辰賑江蘇被水江寧等八州縣安徽被水鳳陽等府所屬州縣戊申以德英阿為烏魯木齊都統是月賑江南海州安徽泗州等八州縣及屯衞水旱災給浙江蕭山等三十三縣貧民口糧十一月丙辰上奉皇太后居壽康宮戊辰以魏元煜為江蘇巡撫左輔為湖南巡撫庚午冬至祀天於圜丘自是每歲如之癸酉以誠安為左都御史松筠為熱河都統甲戌誠安改鑲黃旗漢軍都統以文孚為左都御史丁丑翰林院侍講學士顧蒓奏松筠宜置左右忤旨下部嚴議十二月甲申上皇太后徽號曰恭慈皇太后翌日頒詔天下覃恩有差諭奉皇太后懿旨立皇帝繼妃佟佳氏為皇后丙戌和世泰改福州將軍以晉昌為理藩院尚書調慶保為閩浙總督以史致光為雲貴總督韓克均為雲南巡撫顏檢為福建巡撫庚寅河南儀封決口合龍癸巳加上孝敬憲皇后孝聖憲皇后高宗純皇帝孝賢純皇后孝儀純皇后尊諡英和罷軍機大臣照舊供尚書等職丙申以汪廷珍湯金釗方受疇蔣攸銛言查陋規不便予議孫玉庭奏尤為剴切溫諭褒之起李鴻賓為安徽巡撫召張映漢來京以陳若霖為湖廣總督帥承瀛為浙江巡撫是歲朝鮮琉球來貢道光元年春正月癸丑御太和殿受朝樂設而不作不讀賀表丙辰賞刑部員外郎初彭齡禮部侍郎銜裁浙江鹽政以巡撫兼管己未以文孚為禮部尚書那清安為左都御史丁卯越南進香表賀貢方物詔止之丙子朝鮮國王李玜奉表慰唁廓爾喀王熱尊達爾畢噶爾瑪薩野奏仁宗升遐成服貢金緞賜敕嘉賚之二月壬午朔日食班禪額爾德尼進貢物賜敕褒嘉賚之戊戌協辦大學士吳璥予告庚子命孫玉庭為協辦大學士仍留兩江總督加陝甘總督長齡太子少保甲辰免江西豐城等六縣民借籽種口糧逋穀三月辛亥朔欽天監奏本年四月初一日日月合璧五星聯珠詔益勵寅恭與內外臣工共圖上理不必宣付史館壬子以送仁宗睿皇帝梓宮至山陵命莊親王綿課等留京辦事癸丑再免經過地方本年旗租並給麥田籽種辛酉仁宗睿皇帝發引上奉皇太后送至昌陵壬戌廓爾喀進登極表貢命與道光二年例貢同進丙寅上謁泰陵泰東陵昌陵隆恩殿上孝淑睿皇后尊諡曰孝淑端和仁莊慈懿光天佑聖睿皇后丁卯命成都將軍呢瑪善赴雲南幫辦軍務癸酉葬仁宗睿皇帝於昌陵加托津曹振鏞太子太傅丁丑上奉皇太后還京師戊寅仁宗睿皇帝孝淑睿皇后升祔太廟己卯以升祔禮成頒詔天下覃恩有差命貴州提督羅思舉赴雲南軍營協勦是月貸山西岢嵐等十州縣甘肅狄道等五州縣上年災民倉穀口糧夏四月丙戌常雩祀天於圜丘仁宗睿皇帝配享自是歲以為常庚寅授呢瑪善為欽差大臣督辦雲南永北軍務授那清安左都御史大學士三等侯明亮致仕命戴均元穆克登額阿克當阿相度萬年吉地甲辰雲南大姚拉古賊平丁未上詣大高殿祈雨戊午撥江蘇海州等州縣賑銀四十五萬六千兩命伯麟為大學士管兵部以長齡為協辦大學士仍留陝甘總督任癸亥詔停本年秋決甲子授伯麟體仁閣大學士曹振鏞武英殿大學士丙寅封阮福畑為越南國王以松筠為兵部尚書慶惠為熱河都統壬申夏至祭地於方澤仁宗睿皇帝配享自是歲以為常癸酉雲南永北大姚賊平六月辛巳以張師誠為廣東巡撫甲申安定門災庚寅上御太和門命鄭親王烏爾恭阿順承郡王倫柱齎冊寶詣孝穆皇后殯宮行冊諡禮戊戌召成齡來京以李鴻賓為漕運總督孫爾準為安徽巡撫除河南新鄉縣地賦以琦善為山東巡撫秋七月庚戌刑部尚書和瑛卒調那彥成為刑部尚書松筠為吏部尚書晉昌為兵部尚書以穆克登布為理藩院尚書己未嚴烺以三品頂戴署河東河道總督丁卯調毓岱為江西巡撫以楊懋恬為湖北巡撫庚午上奉皇太后謁西陵免經過地方額賦十分之三壬申上奉皇太后還京師是月賑甘肅寧夏等四縣水旱災並免上年額賦八月庚辰展順天鄉試於九月舉行丁亥命松筠在軍機大臣上行走以特依順保為烏里雅蘇台將軍癸巳兵部尚書茹棻卒以初彭齡代之乙未霍罕遣使請入覲卻之丙午調張師誠為安徽巡撫孫爾準為廣東巡撫九月戊辰暹羅國王鄭佛遣使進香貢方物溫諭止之己巳召長齡來京以朱勳署陝甘總督是月賑安徽宿州等三州縣水災冬十月己卯上御乾清門聽政自是歲以為常丁亥調孫爾準為安徽巡撫嵩孚為廣東巡撫十一月己未貴州巡撫陳若霖奏請歲減民苗佃租二萬二千石給苗疆會試舉人川費允之壬戌以河防功加黎世序太子太保銜十二月戊子以邱樹棠為山西巡撫癸巳吏部尚書劉鐶之卒調盧蔭溥為吏部尚書免軍機大臣調初彭齡為工部尚書以戴聯奎為兵部尚書是歲朝鮮越南琉球來貢二年春正月丁未朔方受疇病免以顏檢為直隸總督長齡署之以葉世倬為福建巡撫辛酉祈穀於上帝仁宗睿皇帝配享自是每歲如之庚午召特依順保來京調奕顥為烏里雅蘇台將軍松筠為黑龍江將軍以晉昌為盛京將軍那清安署兵部尚書辛未以三載考績予曹振鏞等議罷侍郎那彥寶善慶吳芳培降左都御史顧德慶以王鼎為左都御史命長齡回陝甘總督以松筠署直隸總督那彥成署吏部尚書二月丁亥以謁陵命莊親王緜課等留京辦事癸巳兵部尚書戴聯奎卒以王宗誠代之三月丙午撥江蘇上元等二十州縣賑銀五十四萬兩丁未上謁東陵免經過地方額賦十分之三庚戌上謁昭西陵孝東陵景陵裕陵詣端慧皇太子園寢奠酒調穆克登額為禮部尚書文孚為工部尚書癸丑上還京師甲寅上奉皇太后謁西陵免經過地方額賦十分之三乙卯以裕陵工程不慎降莊親王緜課為郡王解戴均元太子太保及管刑部褫蘇楞額職令在工次聽差仍分成賠繳有差戊午上謁泰陵泰東陵昌陵己未清明節上詣昌陵行敷土禮壬戌上詣孝穆皇后殯宮前奠酒奉皇太后還京師閏三月戊寅穆克登布免理藩院尚書乙酉以禧恩為理藩院尚書庚子賜戴蘭芬等二百二十二人進士及第出身有差是月蠲緩奉天寧遠等三州廳額賦夏四月辛未上孝敬憲皇后孝聖憲皇后高宗純皇帝孝賢純皇后孝儀純皇后尊諡藏冊寶於太廟盛京太廟並藏仁宗睿皇帝孝淑睿皇后冊寶於盛京太廟壬午青海番賊平以阿霖為江西巡撫乙酉以倉場侍郎莫晉奏事妄言硃批駁斥降內閣學士是月蠲緩河南睢州等十六州廳縣沙壓隄占水占地賦直隸滄州等五州縣並嚴鎮海豐二場被水賦課六月癸丑大學士伯麟原品休致命戴均元仍管刑部己未命那彥成署陝西巡撫調嵩孚為貴州巡撫以羅含章為廣東巡撫以那清安署刑部尚書壬戌褫松筠吏部尚書軍機大臣命以六部員外郎候補戊辰命長齡為大學士兼管理藩院以英和協辦大學士調文孚為吏部尚書禧恩為工部尚書以那清安為兵部尚書玉麟為左都御史己巳以富俊為理藩院尚書松箖為吉林將軍德英阿為黑龍江將軍英惠為烏魯木齊都統是月賑山西興縣水災秋七月以程祖洛為河南巡撫王鼎署之以程國仁為陝西巡撫是月賑直隸霸州等二十一州縣水災八月癸卯召雲貴總督史致光來京以明山代之河南新蔡縣教匪朱麻子作亂命程祖洛捕誅之戊申召慶保來京以趙慎畛為閩浙總督盧坤為廣西巡撫庚戌以盧坤署陝西巡撫戊辰賞廓爾喀國王寶石頂戴噶箕畢穆興塔巴三品頂戴辛未召長齡松廷來京以那彥成署陝甘總督是月給河南安陽等三縣直隸霸州等十二州縣山西歸化城薩拉齊二廳山東恩縣等三縣水災口糧貸土默特被水蒙古口糧蠲緩山東高唐等四十一州縣衞雲南鶴慶劍川二州災歉賦課九月壬申朔允暹羅進本年例貢甲戌撥通倉米十萬石賑直隸被水災民乙酉四川果洛克番賊平授嚴烺河東河道總督庚寅以蔣攸銛署刑部尚書調陳若霖為四川總督李鴻賓為湖廣總督以魏元煜為漕運總督韓文綺為江蘇巡撫庚子調盧坤為陝西巡撫以成格為廣西巡撫是月給江西瑞昌縣河南武陟原武二縣災