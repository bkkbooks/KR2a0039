body:
  text: 清史稿卷五十一志二十六時憲七雍正癸卯元法下月食用數朔策二十九日五三五九五三望策一十四日七六五二九五二六五太陰交周朔策一十一萬零四百一十三秒小餘九二四四一三三四太陰交周望策六宮一十五度二十分零六秒五十八微中距太陰地半徑差五十七分三十秒太陽最大地半徑差一十秒中距太陽距地心一千萬中距太陰距地心一千萬中距太陽視半徑一十六分六秒中距太陰視半徑一十五分四十秒三十微朔應一十五日一二六三三首朔太陰交周應六宮二十三度三十六分五十二秒四十九微餘見日躔月離推月食法求天正冬至求紀日求首朔求太陰入食限並同甲子元法視某月太陰平交周入可食之限即為有食之月交周自五宮十四度五十一分至六宮十五度九分自十一宮十四度五十一分至初宮十五度九分皆可食之限再於實時距正交詳之求平望同甲子元法求實望實時先求泛時用兩日實行較同甲子元求朔望法次設前後兩時各求日月黃道實行復用兩時實行較得實望實時又以實時各求日月黃道實行視本時月距正交入限為有食自五宮十七度四十三分至六宮十二度十七分自十一宮十七度四十三分至初宮十二度十七分皆有食之限求實望用時用實時太陽均數及升度求法同甲子元法比視日出入亦同求食甚時刻用平三角形以一小時太陰白道實行化秒為一邊本時次時二實行較一小時太陽黃道實行化秒為一邊實望黃白大距為所夾之角求得對小邊之角為斜距交角差以加實時黃白大距為斜距黃道交角又以斜距交角差之正弦為一率一小時太陽實行為二率實望黃白大距之正弦為三率求得四率為一小時兩經斜距又以半徑千萬為一率斜距黃道交角之餘弦正弦各為二率實望月離黃道實緯為三率各求得四率為食甚實緯南北與實望黃道實緯同及距弧又以一小時兩經斜距為一率一小時化秒為二率食甚距弧為三率求得四率為食甚距時以加減實望用時月距正交初宮六宮為減五宮十一宮為加得食甚時刻求太陽太陰實引置實望太陽引數加減本時太陽均數得太陽實引又置實望太陰引數加減本時太陰初均數得太陰實引求太陽太陰距地用平三角形以日躔倍兩心差為對正角之邊以太陽實引為又一角三宮內用本度過三宮與六宮相減過九宮與全周相減用其餘求得對太陽實引之邊為勾又求得對原不知角之邊為分股與二千萬相加減實引三宮內九宮外加三宮外九宮內減為股弦和與勾求得股與分股相加減實引三宮內九宮外減三宮外九宮內加得太陽距地又以實望月離倍兩心差如法求之得太陰距地求實影半徑以太陰距地為一率中距太陰距地為二率中距太陰最大地半徑差為三率求得四率為本時太陰最大地半徑差又以六十九除之為影差又以太陽距地為一率中距太陽距地為二率中距太陽視半徑為三率求得四率為太陽視半徑與本時太陰最大地半徑差相減又加太陽最大地半徑差為影半徑又加影差為實影半徑求太陰視半徑以太陰距地為一率中距太陰距地為二率中距太陰視半徑為三率求得四率為太陰視半徑求食分以太陰全徑為一率十分化作六百秒為二率併徑實影視太陰兩半徑併內減食甚實緯餘化秒為三率求得四率為秒以分收之即食分求初虧復圓時刻以併徑與食甚實緯相加化秒為首率相減化秒為末率求得中率為秒以分收之為初虧復圓距弧又以一小時兩經斜距為一率一小時化秒為二率初虧復圓距弧為三率求得四率為初虧復圓距時以加減食甚時刻得初虧復圓時刻減得初虧加得復圓求食既生光時刻以兩徑較實影視太陰兩半徑相減之餘與食甚實緯相加化秒為首率相減化秒為末率求得中率為秒以分收之為食既生光距弧求距時時刻與初虧復圓法同食在十分以內則無此二限求食限總時同甲子元法求食甚太陰黃道經緯宿度以一小時化秒為一率一小時太陰白道實行為二率食甚距時化秒為三率求得四率為距時月實行以加減實望太陰白道實行加減與食甚距時同得食甚太陰白道經度又置實望月距正交加減距時月實行得食甚月距正交再求黃道經緯宿度同月離求食甚太陰赤道經緯宿度以半徑千萬為一率食甚太陰距春秋分黃道經度正弦為二率食甚太陰黃道經度不及三宮者與三宮相減過三宮者減三宮過六宮者與九宮相減過九宮者減九宮食甚太陰黃道緯度餘切為三率求得四率為餘切檢表得太陰距二分弧與黃道交角以加減黃赤大距食甚太陰黃道經度九宮至三宮緯南加緯北減皆在赤道南反減則在北三宮至九宮加減反是為太陰距二分弧與赤道交角又以太陰距二分弧與黃道交角之餘弦為一率半徑千萬為二率食甚太陰距春秋分黃道經度之正切為三率求得四率為太陰距二分弧之正切又以半徑千萬為一率太陰距二分弧與赤道交角之餘弦為二率太陰距二分弧正切為三率求得四率為正切檢表為距春秋分赤道經度加減三宮九宮食甚太陰黃道經度不及三宮與三宮相減過三宮者加三宮過六宮者與九宮相減過九宮者加九宮得食甚太陰赤道經度求緯度宿度同甲子元法求初虧復圓黃道高弧交角以半徑千萬為一率黃赤大距正弦為二率影距春秋分黃道經度正弦為三率求得四率為正弦檢表得影距赤道度影距春秋分度數與太陽同太陽在赤道北影在南太陽在赤道南影在北又以影距春秋分黃道經度餘弦為一率黃赤大距餘切為二率半徑千萬為三率求得四率為正切檢表為黃道赤經交角乃用弧三角形以北極距天頂為一邊影距赤道與九十度相加減為一邊北則減南則加初虧復圓各子正時刻過十二時者與二十四時相減變赤道度各為所夾之角求得對北極距天頂之角各為赤經高弧交角以加減黃道赤經交角太陰在夏至前六宮食在子正後則減為限西食在子正前則加加過九十度與半周相減為限東不及九十度則不與半周相減變為限西在夏至後六宮反是各得黃道高弧交角若食在子正影在正午無赤經高弧交角則黃道赤經交角即黃道高弧交角太陰在夏至前為限西後為限東求初虧復圓併徑高弧交角以併徑為一率食甚實緯為二率半徑千萬為三率求得四率為餘弦檢表為併徑交實緯角如無食甚實緯即無此角亦無併徑黃道交角又置九十度加減斜距黃道交角得初虧復圓黃道交實緯角食甚月距正交初宮六宮初虧減復圓加五宮十一宮初虧加復圓減各與併徑交實緯角相減為初虧復圓併徑黃道交角併徑交實緯角小距緯南北與食甚同大則反是以加減黃道高弧交角初虧限東復圓限西緯南加緯北減初虧限西復圓限東加減反是各得併徑高弧交角如無併徑黃道交角則黃道高弧交角即併徑高弧交角求初虧復圓方位即以併徑高弧交角為定交角求法同甲子元但以併徑高弧交角初度初虧在限東為正下限西為正上復圓在限東為正上限西為正下據京師北極高度定與甲子元法同求帶食分秒用兩經斜距不用月距日實行餘與甲子元法同求帶食方位用帶食兩心相距不用併徑求諸交角如初虧復圓定方位食甚前與初虧同食甚後與復圓同求各省月食時刻方位理同甲子元法繪月食圖同甲子元法日食用數太陽光分一十五秒餘見日躔月離月食推日食法求天正冬至求紀日求首朔求太陰入食限並同月食惟不用望策即為逐月朔太陰交周視某月入可食之限即為有食之月交周自五宮八度四十二分至六宮九度一十四分又自十一宮二十度四十六分至初宮二十一度一十八分皆可食之限求平朔求實朔實時並同月食求望法惟不加望策視本時月距正交入食限為有食自五宮十一度三十四分至六宮六度二十二分又自十一宮二十三度三十八分至初宮十八度二十六分為有食之限求實朔用時與月食求實望用時同比視日出入同甲子元法求食甚用時與月食求食甚時刻法同求太陽太陰實引求太陽太陰距地並同月食求地平高下差先求本日太陰最大地半徑差法同月食乃減太陽最大地半徑差得地平高下差求太陽實半徑先求太陽視半徑法同月食內減太陽光分得太陽實半徑求太陰視半徑法同月食求食甚太陽黃道經度宿度求經度與月食求太陰白道法同求宿度同日躔求食甚太陰赤道經緯宿度用黃赤大距法同月食求太陰黃道求黃赤及黃白赤白二經交角以食甚太陽距春秋分黃道經度餘弦為一率黃赤大距餘切為二率半徑千萬為三率求得四率為餘切檢表得黃赤二經交角冬至後黃經在赤經西夏至後在赤經東如太陽在二至則無此角又以前所得斜距黃道交角即為黃白二經交角實朔月距正交初宮十一宮白經在黃經西五宮六宮在黃經東二交角相加減為赤白二經交角二交角同為東同為西者相加白經在赤經之東西仍之一為東一為西者相減東西從大角如減盡則無此角如無黃赤二經交角則黃白即赤白東西並同求用時太陽距午赤道度以食甚用時與十二時相減餘數變赤道度得用時太陽距午赤道度求用時赤經高弧交角用弧三角形以北極距天頂為一邊太陽距北極為一邊赤緯在南加九十度在北與九十度相減用時太陽距午赤道度為所夾之角求得對北極距天頂之角為用時赤經高弧交角午前赤經在高弧東午後赤經在高弧西若太陽在正午則無此角求用時太陽距天頂以用時赤經高弧交角正弦為一率北極距天頂之正弦為二率用時太陽距午赤道度之正弦為三率求得四率為正弦檢表得太陽距天頂求用時高下差以半徑千萬為一率地平高下差化秒為二率用時太陽距天頂之正弦為三率求得四率為秒以分收之為用時高下差求用時白經高弧交角以用時赤經高弧交角與赤白二經交角相加減得用時白經高弧交角東西同者相加白經在高弧之東西仍之一東一西者相減東西從大角如無赤白二經交角或無赤經高弧交角則即以所有一角命之東西並同如二角俱無或同度減盡則無此角食甚用時即真時用時高下差與食甚實緯南加北減即食甚兩心視相距求用時對兩心視相距角月在黃道北取用時白經高弧交角月在黃道南取用時白經高弧交角之外角實距在高弧之東西月在北則與白經同在南則相反皆為用時對兩心視相距角若自經高弧交角過九十度緯南如緯北緯北如緯南求用時對兩心實相距角用平三角形以食甚用時兩心實相距為一邊即食甚實緯用時高下差為一邊用時對兩心視相距角為所夾之角即求得用時對兩心實相距角求用時兩心視相距以用時對兩心實相距角之正弦為一率用時兩心實相距為二率用時對兩心視相距角之正弦為三率求得四率即用時兩心視相距白經在高弧西兩心視相距大於併徑者或無食或未及等者用時即初虧真時在高弧東為已過及復圓真時若小於併徑高弧西為初虧食甚之間東為復圓食甚之間求食甚設時用時白經高弧交角東向前取西向後取角大遠取角小近取遠不過九刻近或數分量距用時前後若干分為食甚設時求設時距分以食甚設時與食甚用時相減得設時距分求設時距弧以一小時化秒為一率一小時兩經斜距為二率設時距分化秒為三率求得四率為設時距弧求設時對距弧角以食甚實緯為一率設時距弧為二率半徑千萬為三率求得四率為正切檢表得設