自丹陽入逕雩山西洪山東折西環城北流所謂南運河糧艘渡江入伊婁河至溝為北運河並入於江橫越牐有牐官西高資河東西與新開河合河為乾隆四十五年巡撫吳壇濬出排灣西經高資入句容商埠縣北二里外國互市租界咸豐十年英法條約長江三口之一有新關常鎮道監督鎮五丹徒高資諫壁大港新豐朱家圩有汛二驛京口炭渚京口有驛丞裁高資安港丹徒巡司三有鐵路丹陽繁疲難府東南七十里東北有九齡山大江北自丹徒播為夾江逕姚家橋入東與江合運河東南逕七里橋漕河會之又西南播為香草河簡瀆河環城流入於江包港東北導運河水與夾江合北有練湖鎮二呂城延陵一驛雲陽呂城包港巡司二有鐵路金壇疲難府南一百六十里西茅山一曰三茅峯南長蕩湖與溧陽錯古洮湖也漕河環城為濠南會於白龍蕩又南受湖水入溧陽薛步水出薛步鎮東流分為二一入漕河一南與漕河遇入於湖東有錢資蕩湖溪巡司一裁溧陽繁疲府南二百四十里雍正八年來隸西曹姥山鐵冶山一曰鐵峴北涪山峙洮湖中湖與金壇錯三塔蕩西南溢為昇平蕩前馬蕩水出溧水廬山合高淳諸水東逕為蕩入中河東南流與漕河合古中江也五代楊行密築五堰江自是不復東禹蹟中湮矣鎮三舉善甓橋廣道
