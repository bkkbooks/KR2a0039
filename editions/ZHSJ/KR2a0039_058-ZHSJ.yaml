body:
  text: 清史稿卷五十八志三十三地理五江蘇江蘇禹貢揚及徐豫三州之域明為南京清順治二年改江南省設布政使司置兩江總督轄江南江西駐江寧又設淮揚總督尋裁及江寧巡撫治蘇州又設鳳廬安徽巡撫尋裁十八年分府九安慶徽州寧國池州太平廬州鳳陽淮安揚州直隸州四徐滁和廣德屬安徽江南左布政使領之康熙元年安徽設巡撫三年分江北按察使往治五年揚州淮安徐州復隸江南六年江南更今名改左布政使為安徽布政使司駐江寧右布政使為江蘇布政使司治蘇州統江寧蘇州常州松江鎮江揚州淮安府七徐州直隸州一雍正二年升太倉邳海通四州為直隸州十一年徐州升府邳還為州屬之乾隆二十五年移安徽布政使司安慶增設江寧布政使司析江寧淮安徐揚四府通海二直隸州屬之與江蘇布政使司對治三十二年增海門直隸廳屬江寧光緒三十年又設江淮巡撫駐清江浦尋復故廣九百五十里袤千一百三十里積三十七萬二千五十四方里北極高三十一度五分至三十五度十分京師偏東五分至五度三分宣統三年編戶三百二十一萬三千四百八十三口九百三十五萬六千七百五十五領府八直隸州三直隸廳一州三廳四縣六十江寧府衝繁難隸江寧道明應天府江寧布政交涉提學三使江安糧儲江南勸業巡警鹽法四道江寧將軍副都統織造兼督龍江西新稅關駐順治初因明制縣八雍正八年改溧陽屬鎮江北距京師二千四百四十五里廣二百里袤三百里北極高三十二度四分京師偏東二度二十八分領縣七上元衝繁難倚附郭有清涼山師子山富貴山北紫金山幕府山東烏龍山聖遊山有朱湖洞道書三十一洞天清江門內有小倉山石城門內冶城山南大江自安徽當塗入受秦淮河水為草鞋夾左與江浦分岸得觀音山水有燕子磯秦淮河上承句容赤山湖水合廬山水逕通濟門一入江寧一入城又西北流至下關入江新開河東北乾隆四十五年濬賜名便民有市曰石埠橋又東為黃天蕩鎮四淳化靖安土橋石步草鞋夾燕子磯栖霞街湖熟有汛一驛金陵淳化巡司有鐵路商埠下關光緒二十一年馬關條約四埠之一江寧衝繁難倚南聚寶山雨花台設礮台大江西逕下關鎮港七銅井烈山北曰河口綠新墅又北大勝關古新林浦也西北曰北河曰下關分受秦淮河水鎮三江寧秣陵金陵大勝秣陵有汛有驛江寧秣陵巡司二有鐵路句容衝難府東九十里縣有句容山以此名北華山東北銅山東南茅山大江西來港二羅絲溝下蜀港赤山湖出絳巖山秦淮水源於此亦曰絳巖湖匯亭水黃堰河蒲里溪曰南源與北源合於白米湖又西入上元鎮五白土常寧東陽下蜀龍潭龍潭巡司有驛溧水簡府東南一百四十里南芝山中山一曰獨山東廬山秦淮水別源所出石臼湖西南逕城北流入秦淮明故運道也今淤一驛孔家江浦衝府西北四十里東北十三公山九連山西龍洞山大江西南自安徽和州入右與江寧分岸為口四曰烏江曰老西江曰新河曰老河受浦子口河東北入六合滁水右瀆自安徽滁州入亦曰後河東與來安分岸復盡入境曰前河右出支津至東葛鎮又東北逕岔河集會沙河入六合鎮三高望香泉葛城二驛江淮東葛浦口巡司一江淮有驛丞裁有鐵路六合簡府北一百二十里南瓜步山西南晉王山大江西南自江浦入右與上元分岸折東南為通江集口支津北抵城隍湖有沙洲圩礮台又東划子口滁河西自江浦入逕皂河口北為汊河又南屈曲流入江稅課局大使駐鎮四瓜步長蘆宣化竹鎮有堂邑驛丞裁瓜步巡司一高淳簡府東南二百四十里東大游山東北荊山南固城湖又東播為胥河西丹陽湖北接石臼湖有水自蕪湖東入丹陽湖又東南入固城湖或云禹貢中江也鎮三廣通固城水陽廣通巡司一淮安府衝繁疲難隸淮揚海道順治初因明制州二縣九雍正二年升海邳為直隸州贛榆沭陽屬海宿遷睢寧屬邳九年析山陽鹽城地置阜寧南距省治五百里廣三百八十里袤二百七十里北極高三十三度三十二分京師偏東二度五十二分領縣六山陽衝繁疲難倚漕標副將駐北運河南流烏沙澗河諸水注之東六草蕩南白馬湖匯洪澤湖水與寶應錯東北會於運河北黃河故道咸豐三年徙今堰存河所經南北岸設同知管河縣丞主簿巡檢弁官廢置不常咸豐十年裁板牐鎮有鈔關巡司一鎮二北神廟灣菱陵高堰楊家廟有汛驛一淮陰驛丞裁阜寧繁疲難府東北一百六十里雍正九年置東北大海有堰曰范公堤射陽湖上承苔大縱湖水匯淮水為湖又東流會諸水入海運鹽河受射陽湖水逕城南流循范公堤入鹽城西有黃河故道鎮三馬邏北沙蒙龍草堰巡司一鹽城繁難府東南二百四十里東大海港二新洋鬬龍有新興五佑鹽場鹽課大使駐運鹽河自草堰口環城流至便倉鎮入興化苔大縱湖西南與興化錯縣西諸水所匯有天妃牐牐官裁小關劉莊新陽沙溝有汛鎮九上岡大岡沙溝岡門新河安豐清溝喻口新興上岡沙溝巡司二清河衝繁疲難淮揚道治所江北提督總兵駐舊置總河後省入總漕自府城徙此光緒三年裁𩹉河同知及河庫道均先後裁府西北三十五里北清江浦明陳瑄開宋沙河也運河西北自桃源入歧為鹽河又東為中河口水經謂之中瀆水出山陽白馬湖又東迤南至清口屈而東逕三牐與清江浦合東南入山陽是為淮南運河南六塘河自桃源入東北逕劉家莊入沭陽鹽河東北流逕西壩淮安分司運判駐乾隆二十八年移海州又東至周莊入安東西南洪澤湖西有黃河故道鎮十王家營洪澤老子西壩漁溝官亭大河口澗橋馬頭周橋王家營馬頭河北漁溝有汛一驛清口有驛丞裁澗橋巡司一安東繁疲難府東北六十里西南鹽河自清河入貫縣境入海州與六塘河合東北一帆河自海州入南至旗杆村水經淮水東左右各合一水至淮浦入海東北黃河故道淮海河務兵備道駐咸豐十年裁鎮三太平長樂魚場口五港佃湖有汛佃湖巡司一桃源衝繁難府西北一百二十里運河自宿遷南來逕古城驛入清河歧為六塘河一曰北鹽河東北流入沭陽洪澤湖西南與清河錯西北有黃河故道鎮七三義河北崔鎮眾興張泗沖白洋河赤鯉湖崔鎮洋河三義有汛二驛桃源古城驛丞裁有巡司揚州府衝繁疲難隸淮揚海道兩淮鹽運使駐順治初因明制州三縣七康熙十一年海門圮於海併通州雍正三年通州升直隸州以如皋泰興往屬九年析江都置甘泉乾隆三十二年析泰州置東臺西南距省治二百十里廣三百五十里袤二百三十里北極高三十二度二十七分京師偏東二度五十六分領州二縣六江都衝繁疲難倚大江西自六合歷揚子入東逕七濠口監製同知駐又東逕裕民洲為夾江歧為二又東為三江口東南流與江合三江口與天福洲對設礮台守備駐裁鹽務巡道又東逕揚子港入泰興運河北入環城南逕新河灣分流西入揚子又南流至瓜洲口有礮台總兵駐又東逕連城洲分入江鹽河導運河水東北入泰州白塔龍兒河水注之有榷關鎮三瓜洲萬壽宜陵瓜洲大橋馬橋沙洲有汛廣陵驛丞裁瓜洲萬壽巡司二甘泉衝繁疲難倚雍正九年置西北蜀岡甘泉山北邵伯湖與高郵錯運河合湖水南流至壁虎橋入江都綠洋湖喬墅蕩分流入之鎮三邵伯上官大儀一驛邵伯有汛上官邵伯二巡司揚子衝繁府西南七十里明為儀真雍正二年改真為徵宣統元年復曰揚子西北有銅山界墩山南濱大江西自六合入有里世洲沙漫洲二水自林家橋王家壩北來注之又西分流至泗源溝入江稅課大使駐新河出月塘集西南流亦入江一鎮新城有水驛驛丞清江芒稻河牐官裁青山舊港黃泥港有汛舊江口巡司一高郵州衝繁府北一百二十里西南神居山運河北逕稅務橋鹽河西流注之又逕車邏壩南澄子河注之南匯為綠洋湖馬霓河東南流入於清水潭受運河北洩諸水東積為草蕩三陽河南來注之高郵湖西北一曰甓社湖北接界首湖南赤岸湖與甘泉錯水高永南有汛二驛界首孟城界首時保巡司二興化疲難府東北一百六十五里東大海有堤鹽河幷堤流西受界河海溝橫涇諸水東出為大團河八竈七竈河東北會鬬龍港入於海有劉莊草堰丁溪三場鹽課大使駐北有吳公湖苔大蹤湖與鹽城寶應錯石白駒三牐有牐官鎮三安豐陵亭芙蓉安豐巡司一寶應衝繁府北二百四十里運河北自山陽入逕八口鋪東溢為瓦溝溪又南流逕汜水鎮至界首有界首湖入高郵其西寶應湖匯淮流下瀦之水苔大蹤湖東北周二百里分支入運河衡陽有汛一驛安平有驛丞裁衡陽槐樓巡司二泰州繁疲難府東一百二十里鹽河西自江都入夾城東流一曰𩹉下河有溱潼水注之至白米鎮左通串場河右出支津入泰興又東逕海安鎮左歧為界河東南入如皋鹽河東北自東臺入西南流逕淤溪達鰍魚港又西南與之合有泰壩泰州分司運判駐鮑湖東北鎮四海安安鄉斗門樊汊海安曲塘有汛海安安鄉巡司二東臺繁疲府東二百四十里乾隆三十二年置東大海有堤鹽場七東臺何垛梁𣛀安豐富安角斜拼茶鹽課大使駐又小海場大使裁𩹉下河自泰州環城北流又東溢為支河入海鹽河出縣西海道牐西南流錯出復入至淤溪入泰州水利同知駐東臺場草堰四牐有牐官一鎮西溪巡司裁王家港有汛徐州府要衝繁難隸淮徐道徐州鎮總兵駐順治初為直隸州領蕭碭山豐沛雍正十一年升府置銅山縣又以降直隸邳州來隸及所領宿遷睢寧東南距省治七百三十里廣三百二十里袤一百八十里北極高三十四度五分京師偏東五十八分領州一縣七銅山衝繁難倚雍正十一年置東北有銅山故名微山湖東北出為荊山河即引河一曰徐州河承湖水至卞塘入邳州與運河合資河一曰奎河東南流入蕭縣黃河故道西北一鎮卞塘鄭集三堡有汛利國東岸二驛驛丞裁雙溝利國巡司二蕭簡難府西五十里南丁公山西岱山西北為岱山湖又東南有龍山河資河自銅山入東南逕軸山西左出支津入靈壁正渠入宿州其西望川湖逕大海子東亦入宿鎮二白土永安一驛桃山張山店巡司一碭山衝繁疲難府西北一百六十里東北芒碭山利民溝一曰小神湖東南流屈而西入永城西沙河西南逕鼎新集入河南夏邑城北為黃河故道周家寨蟠龍集有汛豐簡府西北一百五十里東南華山新開河北流逕章固鎮又北入魚台舊濬以導黃河今堤存豐水一曰泡河班志泡水也入泗湮一鎮吳康沛衝府西北一百二十里西七山有棲山圩乾隆四十六年河決縣沒徙此四十七年建城咸豐元年河決城復沒遷夏鎮十一年仍還舊治東微山湖西有聶莊舖小河口運河自滕入屈曲流入湖泗水自山東魚臺入亦曰南清河受金溝水為金溝渡東合三河口水自此入運有彭口楊莊二牐牐官裁夏鎮棲山圩有汛夏陽巡司一邳州衝難府東北一百五十里舊治下邳康熙二十八年遷治艾山南七年河決移今治雍正三年升直隸州十一年來屬南葛嶧山即距山北艾山石埠山西北黃石山運河自嶧錯入逕泇口岔河東北注之至徐塘口合徐川河水又南合沂水入宿遷武河古武水一曰治水左通沂河右入武原水復出數支津與燕子柴溝等並入運武原水即泇河自蘭山入東會沂水達宿遷之黃墩湖入黃河城南有黃河故道鎮三直河新安泇口姚灣泇口有汛舊城巡司一宿遷衝繁難府東一百里北西非峿山馬陵山東五華峰南斗山運河自邳州入南合六塘河水入桃源西北駱馬湖匯沂河山澗諸水為巨浸北沭河自郯城入南得桃花澗水再錯