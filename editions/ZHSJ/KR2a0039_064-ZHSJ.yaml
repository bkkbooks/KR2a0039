body:
  text: 清史稿卷六十四志三十九地理十一甘肅甘肅禹貢雍州南兼梁州之域明陝西布政使司及陝西行都指揮使司地清順治初因明制設甘肅巡撫駐寧夏寧夏巡撫旋裁五年徙甘肅巡撫駐蘭州康熙三年分陝西為左右布政使司以右布政使司駐鞏昌領四府如故六年改陝西右布政使司為鞏昌布政使司七年又改甘肅布政使司徙治蘭州雍正三年裁行都指揮使司及諸衞所改置甘州涼州寧夏西寧升肅州及秦階二州為直隸州乾隆三年廢臨洮府徙蘭州因更名二十四年置安西府二十九年裁巡撫以陝甘總督治蘭州行巡撫事三十八年置鎮西府於巴里坤迪化直隸州於烏魯木齊三十九年降安西府為直隸州四十二年升涇州為直隸州同治十一年置化平川直隸廳十二年升固原州為直隸州光緒十二年新疆改建行省割迪化鎮西往屬東至陝西及鄜州邠州南至四川保寧龍安西南至青海北至阿拉善額濟納二旗及喀爾喀札薩克圖汗部廣二千一百二十里袤一千四百十里宣統三年編戶九十萬六千六百三十九口四百六十九萬一千六百二十領府八直隸州六直隸廳一州六廳八縣四十七其名山隴嶓冢崆峒西傾積石其大川黃河西漢渭涇洮湟其重險蕭關嘉峪玉門其驛道一東南逾六盤達陝西長武一西北渡河出嘉峪關達新疆哈密電綫西北通迪化東南通西安蘭州府衝繁難陝甘總督布政提學提法三使巡警勸業道駐明為州屬臨洮府領金渭源河州乾隆三年徙臨洮府來治更名以所隸河州狄道渭源三州縣改屬升狄道為州置皋蘭縣為府治兼割鞏昌府屬之靖遠隸之東北距京師四千四十里廣千二百二十五里袤八百里北極高三十六度八分京師偏西四十二度三十四分領州二縣四皋蘭衝繁疲難倚城南五里皋蘭山五泉出其下百四十里康狼山北九州臺山松山西沃干嶺馬銜山黃河西南自河州入西流至孔家寺折而東北復東流迤南逕城北至東坪與金縣分界又東北逕烏金峽入靖遠洮水南自狄道入西北流至毛龍峽入黃河邊牆西自平番來起縣西北毛牛圈東南迤至小蘆塘入靖遠鹽池邊牆外北與蒙古分界有界碑六鎮一納米驛三蘭泉沙井摩雲縣丞駐紅水堡金衝疲府東南八十里南龕山西南馬銜山東北北巒山車道嶺東駝項西北豬嘴黃河自皋蘭入南新營河自狄道入至大營川右合瓦家河左合清水河合龕峪徐家峽大峽諸水西北至皋蘭入於河黃河又東北過烏金峽入靖遠邊牆西自皋蘭來逾黃河南至索橋合舊邊牆東北入中衞驛二定遠清水狄道州繁疲難府南二百里南抹邦山煤山北馬銜山故關原西西平山西南十八盤山洮水南自洮州入合抹邦東峪三岔留川四水及諸小水屈曲北注逕沙泥州判境沙泥水出摩雲嶺西麓西流入之洮水又北入皋蘭州北河渠雍正三年濬引洮流溉田三百頃趙土司駐所州東南六盤山麓驛四沙泥洮陽窯店慶平州判駐沙泥堡渭源衝疲府南少東二百五十里西北七峰山南露骨西南五行西鳥鼠山渭水出其北麓東南流逕城北合清源鍬峪兩水東入隴西驛一慶平靖遠疲難府東北二百里明靖虜衞雍正二年省衞設同知屬鞏昌八年置縣裁同知乾隆三年來屬東紅山屈吳山南烏蘭北雪山黃河西南自金縣入至城北祖厲河南自會寧來會左關川水北流入之黃河又納縣境諸水北流迤西逾邊牆東北入中衞邊牆自皋蘭紅水堡來接中衞河州繁疲難府西南二百里陝西河州鎮總兵駐雍正四年省河水衞併入州屬北鳳林山西南石門山西北小積石山即水經注唐述山黃河西自循化入至積石關入州境右納樣卑吹麻銀川三水東逕城南又東至蓮花寺大夏河西南自循化來會州境諸小水屈曲北流入之黃河又東入皋蘭韓土司及土番老鴉端言紅巖牙党川撒諸族分居州西境驛五長安鳳林銀川和政定羌太子寺州判駐平涼府中衝繁平慶涇固化道治所明為府領州三縣七順治初因明制乾隆四十三年升涇州為直隸州同治十一年割平涼華亭固原隆德四州縣屬地置化平川直隸廳十二年升固原州為直隸州西北距省治七百六十里廣五百里袤五百八十里北極高三十五度三十五分京師偏西九度四十八分領州一縣三平涼衝疲難倚西北天壇東南石馬西南可藍西空同山其支麓為筓頭馬屯山彈箏峽涇水北源西自固原州來至沙溝門入境南源西自化平川廳來至味子溝入境合流城西右納大峽河左納小蘆大蘆潘陰澗諸水東南入涇州汭水西自崇信入逕縣東南王家寺東入涇州東利民渠明濬縣南諸水匯焉峽石安國二鎮驛一高平華亭疲府南九十里東義山西隴山北接大漠南抵隴西北美高朝那山汭水北源出縣西鍬頭津南源出縣西大關山東流夾城匯為一又東右納策底河左納五村川水東迤北入崇信盤口河出縣西南山中東流支津左出為五村川水入崇信惠民渠明濬遏汭流引入城制勝六盤關三鄉黃石河鎮驛一瓦亭靜寧州衝疲難府西二百三十里東隴山上峽東山南石門西西巖北橫山苦水河即長源河北自隆德入環城南注納甜水河及州境諸小水屈曲南入秦安西興隴渠明濬驛一涇陽隆德衝難府西北百四十里乾隆四十三年省莊浪縣以其地來屬東六盤山若水河北自固原入納馬蓮川濫泥河諸水南入靜寧其東支甜水河即隴水亦出六盤逕城北西合底堡川南源溝水並從之驛一隆城縣丞駐莊浪故城鞏昌府衝繁疲難隸平慶涇固化道明置府領州三縣十四順治初因明制雍正七年升秦階二州為直隸州降徽州為縣及清水秦安禮兩當隸秦州以文縣成縣隸階州八年增置岷州及靖遠縣乾隆三年割靖遠隸蘭州十三年改洮州衞為廳來屬旋幷漳縣入隴西隸鞏秦階道西北距省治