江源出四川石龍關東諸山一曰夷水又曰鹽水後漢書廩君乘土船從夷水至鹽陽即此經縣東有忠建河及麒麟金印諸溪水注之下流入於大江崔家壩巡司木貢縣丞駐宣恩簡府東南八十里明為施南宣撫司屬施州衞康熙時為施南土司雍正六年屬恩施縣十三年置縣屬府以忠峝高羅木冊東鄉忠建石虎七司地益之北墨達山南將軍山白水河出焉一曰車溪又曰酉溪入來鳳下流謂之漫水漊水出縣東北鶯嘴荒一曰九谿河澧之北源也忠建河在城東名玉帶溪自咸豐發源北入清江有獅子東門二關乾灞巡司東有東鄉鎮巡司後裁來鳳簡府南二百七十里明散毛宣撫司屬施州衞康熙時為散毛土司雍正六年屬恩施縣十三年置縣治司屬之桐子園隸以蠟壁大旺東流卯峝漫水五司地屬府東南翔鳳西北三尖西佛山與雀兒峰對峙高峝河水出焉東有佛塘崖下有佛塘河即宣恩之白水河也流合衆川逕峝東流入於辰河有卯峝巡司滴水老鴉二關咸豐簡府西南二百二十五里明為大田軍民千戶所屬施州衞康熙時改設巡司雍正六年屬恩施縣十三年置縣以唐崖龍潭金峝三司地益之城內角樓山東小關西北龍潭河一曰唐崖河自利川入西南入四川黔江謂之黔水西龍嘴河亦自利川入逕萬頃湖南入彭水西南張家坪巡司利川簡府西一百七十八里明施南司屬之官渡灞粗石地雍正十三年置縣以忠路忠孝沙溪三司及恩施屬之支羅南坪堡等處益之東金字西桂子七藥山前江出焉南與後江合流謂之龍嘴河即中清河上源也北有清江境內水多伏流有南坪建南二巡司建始簡府東北一百二十里初因明制屬四川夔州府乾隆元年改屬南文山西石乳東州基山西石乳山上有關馬水河出西南右合桐木溪木瓜河逕祿山右會廣潤河至撒毛入恩施南有清江入逕麻根壋口景陽河又東入巴東有龍駒河大岩嶺鎮縣丞駐荊門直隸州衝繁疲難隸安襄鄖荊道明屬承天府順治初沿明制為安陸府屬州乾隆五十六年升直隸州屬湖北布政司東南距省治六百里廣二百六十里袤三百二十五里北極高三十一度四分京師偏西四度十六分領縣二南三十里荊門山西北武陵東伯夷西象山東南章山即內方山漢水來逕城東亦曰沔水東南入潛江濱漢為隄亦自內方山達潛江為五邑保障西權水北象河東南有直江下流均入漢又建水一名建陽河上流古通漢今淤下流至江陵匯為湖有建陽鎮石橋鎮二巡司俱有驛又城有荊山驛舊設新城鎮仙居口二巡司及荊門所宜門所後均廢東南有沙洋鎮當陽簡州西南一百二十里明屬州隸承天府順治初屬安陸府乾隆五十六年還屬東南紫蓋東北綠林玉泉山玉泉水出焉北沮水自遠安來東南流合鞏河玉泉水至麥城南與漳水會下流入江有河溶鎮巡司北百寶砦東淯溪鎮有驛遠安簡州西一百四十里明屬夷陵州隸荊州府雍正十三年直屬府乾隆五十六年來屬西北鳴鳳北神馬沮水自南漳來逕縣東南流合福河溪通天樓河石洋河白龍溪泥水溪青溪諸水入當陽界西北黃柏河北南襄堡西北砦洋坪汛鶴峯直隸廳衝繁疲難光緒三十年析荊宜施道為施鶴道廳隸之順治初因明制為容美土司屬施州衞雍正六年屬恩施縣十三年置州以五星坪北佳坪益之屬宜昌府光緒三十年升直隸廳屬湖北布政司東距省治一千五百五十里廣一百九十五里袤三百四十五里北極高三十度京師偏西六度三十分東南柘雞東平山北印山南天星西北巴子山南八峰山有山河即漊水之上源東南流大典河入焉東北咸盈河逕巴東入於清江有奇峰鄔陽大崖諸關山羊隘舊屬湖南慈利雍正時來屬設巡司駐之後移白果坪
