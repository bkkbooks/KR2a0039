body:
  text: 清史稿卷六十七志四十二地理十四湖北湖北禹貢荊州之域明置湖廣等處承宣布政使司旋設湖廣巡撫及總督清康熙三年分置湖北布政司始領府八武昌漢陽黃州安陸德安荊州襄陽鄖陽並設湖北巡撫雍正六年升歸州為直隸州十三年升夷陵州為宜昌府降歸州直隸州為州屬焉以恩施縣治置施南府乾隆五十六年升荊門州為直隸州光緒三十年升鶴峯州為直隸廳東至安徽宿松五百五十里南至湖南臨湘四百里西至四川巫山千八百九十里北至河南羅山二百八十里廣二千四百四十里袤六百八十里面積凡五十八萬九千一百一十六方里北距京師三千一百五十五里宣統三年編戶五百五萬五千九十一口二千三百九十一萬七千二百二十八共領府十直隸州一直隸廳一縣六十驛道自武昌西北渡江漢達河南淅川自襄陽西渡江達湖南灃州電線漢口東通九江西通成都南通長沙北通鄭州鐵路京漢南段粵漢北段航路自漢口以下黃州黃口港蘄州武穴漢口以上金口寶塔州新城陵磯沙巿宜昌皆江輪艤泊處武昌府要衝難隸鹽法武昌道明為湖廣布政使司治康熙三年為湖北布政司治湖廣總督及湖北巡撫布政使按察使督糧道駐廣五百三十二里袤四百七十二里北極高三十度三十三分京師偏西二度十四分領州一縣九江夏要衝繁難倚其名山荊山內方大別城內黃鵠山亦名黃鶴山與城北隅鳳凰山俱置礮臺東有洪山一名東山百戰地也西臨大江雄據東南上游有險無蔽大江自嘉魚逕城西北入武昌光緒中沿江岸建紡紗織布繅絲製麻各局西南金水一曰塗水自咸寧來匯為斧頭湖北至金口入江有金口鎮巡司南南湖通大江今為軍屯重地西南鮎魚套南山坡二巡司東北滸黃洲廢司西長江關有將臺東湖山坡土橋四驛武昌難府東一百八十里南黃龍西樊山東石門有長港即樊港納縣南諸湖水逕樊口入江大江自江夏來東北流逕縣北入大冶西蘆洲東安樂磯西南金牛鎮縣東金子磯巡司移駐此西白湖鎮巡司後移葛仙鎮有華容驛嘉魚簡難府西南一百五十里城西魚嶽山東南陰山東北赤壁南白雲大江自湖南臨湘入右逕陸口入江夏陸水自南來會逕嘉魚口有太平岳公諸湖水流合焉簰洲石頭口二鎮有巡司有驛蒲圻衝難府西南三百六十里城內疊秀山西茅山東黃葛西北竹山茗山西南羊樓洞白鹿山荊港水出焉南陸水一曰蒲圻河東赤馬港與荊港俱入焉西南新店古大嶓水通黃蓋湖下流至嘉魚石頭港入江有港口巡司羊樓洞廢司港口官塘二驛鳳山廢驛鐵路咸寧衝府東南二百四十里東東高山西鈷鉧東南相山南桃花尖山涂水出其西桃花泉曰白枵港與西源浚水嶺減河會又西北逕城南金鐙山始為涂水西北合諸湖港水入江夏其北麓東水出下流入武昌之樊港又東楊埠橋水源出石川畈流合東水即東水別源也西有咸寧驛雍正六年徙入崇陽繁疲難府南三百六十里西巖頭北葛仙東雨山西南龍泉山陸水自通城縣流入曰崇陽河右合梓木港左合桂口港至莎塘鋪流逕花山至城南又東折西北逕仰蓮山又西北至壺頭山為崇陽洪入蒲圻有桂口巡司通城難府西南五百里九嶺西南白面東南幕府山陸水所出一曰雋水納秀水入崇陽南黃龍山新安港水出東有鯉港源出蓑荷洞流合新安港西入之興國州繁府東南三百八十里南闔閭東大坡西黃姑北大銀山西南龍山東北大江自大冶入又東入江西瑞昌境富水自西流入謂之富池口有富池鎮巡司西南龍港北與富水合移州東北黃顙口巡司駐之有驛大冶難府東南一百五十里順治二年自興國州改隸東圍鑪北鐵山西南銅綠北白雉山光緒間鑛政大興鐵冶之利甲於全省東北磁湖山產磁石東西塞山下有道士洑磯臨大江舊設巡司後移縣北大江西北自武昌入為黃石港東南流入興國州有驛通山難府南一百八十里順治二年自興國州改隸南九宮山順治初李自成為鄉人擊斃於此東沈水西南白羊古青湓山窩水出亦曰通羊港合湄港自南流入東南黃梨山寶石河出合桐港自西流入東北至興國州合流謂之富水東有黃泥壠舊司後裁漢陽府衝繁疲難隸漢黃德道順治初沿明制屬湖廣布政司康熙三年屬湖北布政司東北距省治十里廣二百七十里袤四百七十里北極高三十度三十三分京師偏西二度二十一分領州一廳一縣四漢陽繁疲難倚西南九真東北大別即魯山光緒間建鐵政局於山下漢水自漢川入逕北麓大江自嘉魚來環城而東合焉西南太白湖接沔陽界匯江漢支流及諸湖澤東洩於沌水出江即沌口也有沌口鎮巡司後移下蒲潭又西蔡店鎮西南新灘口鎮漢口鎮仁義禮智四巡司光緒二十四年移禮智司屬夏口廳縣及蔡甸二驛漢川衝繁府西北一百二十里東南小別俗名甑山西南陽臺山康熙間更名采芝漢水自沔陽天門來入漢陽東溳水自雲夢應城入淪河西河汊水皆注之下流至夏口廳入漢謂之溳口有劉家堛小里潭二巡司縣及田兒河二驛孝感衝繁疲難府北一百四十里雍正七年自德安府來屬北黃茅嶺東北大悟一名上界山又北有澴水自河南信陽州流入南淪河即澴水下流也上通溳水東會灄水入江太平雙橋二鎮縣丞駐東南馬溪河巡司後移東北楊店驛又北小河溪巡司嘉慶十一年改駐灄口有九里關一名黃峴關義陽三關之一也縣及小河溪楊店三驛鐵路黃陂衝繁難府北一百二十里雍正七年自黃州府來屬東北大陂山東魯台山宋二程夫子於此築臺望魯因名東南大江自漢陽入澴河注之又東入黃岡界縣河即灄水南合淪河又武湖即武口水也承灄水分流皆入焉灄口河口二鎮大成潭灄口鎮二巡司縣及雙廟灄口三驛沔陽州繁疲難府西南三百二十里明屬承天府順治間屬安陸乾隆二十八年來屬析州分置文泉縣三十年省入東南黃蓬山烏林磯大江自監利來入嘉魚境漢水南派自天門來入漢川境又南長夏河一曰夏水江水支流也又有襄水為漢水支流即沱潛也自襄河澤口分流逕監利縣入境右合夏水東匯於陽名太白諸湖西南漕河即玉帶河西北通順洛江恩江等河俱自潛水分流入沔今皆淤州判駐仙桃鎮鍋底灣沙鎮二巡司有驛夏口廳衝繁疲難府治北光緒二十四年析漢陽縣漢水以北地分置治漢口鎮自咸豐八年闢商埠設江漢關漢黃德道自黃州徙駐西北柏泉山城東大江自漢陽來至南岸嘴合漢水入黃岡界漢水自漢川緣界會溳水曰溳口又東南來會為漢口古夏口亦沔口其故道襄河口又東北入黃陂為灄口北有鐵路自大智門北經黃陂孝感應山等縣與河南信陽州路接為京漢鐵路南段新溝市汛禮智司巡司黃州府衝繁難隸漢黃德道順治初沿明制屬湖廣布政司康熙三年屬湖北布政司西北距省治一百八十里廣六百六十五里袤四百八十里北極高三十度二十六分京師偏西一度四十一分領州一縣七黃岡衝繁難倚故城西北黃岡山城東北大崎北淘金山西武磯大江自黃陂來入蘄水界東巴水西舉水自麻城入會道觀河沙河南入之謂之舉口亦謂三江口西北新生洲與武昌白鹿磯相對但店團風陽邏三鎮與倉子埠四巡司有齊安驛李坪陽邏廢驛黃安簡府西北三百二十里西北老山東北張家東南五雲西南似馬北雞公紫潭河源出白沙關合境內諸水南流至黃岡入江西灄水源出北仙居山下流入黃陂東南有中和鎮黃陂站二巡司西北有金局關一名金山關相近有大城關即麻城五關之一也蘄水衝繁難府東南一百十里東斗方北茶山東北張家東南仙女西南濱江大江自黃岡來入蘄州浠水巴河自羅田來注之有蘭溪鎮巴河鎮二巡司巴水浠川二驛羅田簡府東一百六十里南望江北雞籠桂家東北鹽堆山巴水所出一名平湖鄉河有尤河合湯河北峰河逕城東至蘄水界折西北合石源河來會東南有浠水源出安徽英山緣界右合樂秋王家觀音諸河入蘄水東北有多雲鎮巡司又北有栗子關東北有甕門關西北又有平湖同羅松子等關麻城繁難府東北一百八十里西大安西北羚羊東南白臬舉水出縣境龜峰黃蘖諸山受閻家柏塔麻溪白臬浮橋諸河下流至黃岡入江又木樨二里河與東義州河並南流亦至黃岡入巴水東北殷山畈上有陰山關相近有虎頭關巡司又北木陵山上有木陵關與黃土虎頭白沙暨黃安之大城為麻城五關又西鵝籠山巡司一名鐵壁關後移縣西南宋埠同知駐岐亭鎮有驛蘄州衝繁難府東一百八十里東北百家冶西北靈虬西南空石大江自蘄水來入廣濟蘄水源出大浮山西南流合三十六水及鈷鉧潭入赤東湖至州西入江謂之掛口一曰蘄陽口有茅山鎮大同鎮二巡司西河驛又蘄陽水驛廣濟衝繁府東二百五十里明隸蘄州領屬順治初改屬東大闔東南太平西南積布即古高山也大江自蘄州入東南流入黃梅東有梅川下流入午山湖西南有馬口湖通江有馬口巡司後移武穴鎮東南龍坪鎮巡司西南田家鎮水利同知駐鎮對半壁山束江流最狹處咸豐中置礮臺有廣濟雙城二驛黃梅衝繁府東三百五十里明隸蘄州領屬順治初改屬西北黃梅山縣以此名東南礦山東北馮茂西南蔡山大江在南自廣濟入東南流逕清江鎮入宿松縣河在縣東即隆斗河及縣西雙城河會諸湖港水至黃連嘴合流出急水溝入之東北縣丞駐清江廢鎮新開口亭前孔壠三鎮巡司均有驛安陸府衝繁隸安襄鄖荊道明承天府屬湖廣布政司順治三年更名康熙三年屬湖北布政司東南距省治五百三十五里廣五百二十里袤七百四十五里北極高三十一度十二分京師偏西三度五十九分領縣四鍾祥繁疲難倚城南樠木山東北純德北九華西北馬鞍西漢水自宜城來入荊門州又東聊屈山臼水出即左傳所謂成臼東北黃仙洞山敖水出下流曰直河西南權水北豐樂河皆入於漢豐樂有驛設巡司又麗陽驛乾隆三十二年自荊門州割隸移仙居口巡司於此又石城郢東二驛石牌鎮縣丞駐京山繁難府東一百五十里東京山西北大洪南子陵西南寶香西漢水自鍾祥入逕丁口潭又東南緣潛江界入之溾水俗名回河逕城南皆匯縣境諸水入之中源曰縣河南流入天門界又富水一曰撞河源出大洪山東南會小富水為雙河口合石板河入應城又聊屈山臼水出古成臼也與澨水小河會曰南河東南入天門其東楊水巾水並從之有宋河鎮巡司乾隆二十九年自荊門州新城移此有驛潛江難府南二百二十里漢水自京山來逕縣北分入天門沔陽界東有潛水一名蘆洑河自漢水別出南有沱水自江陵流入在縣西沱埠淵合流為江漢會通故道後淤東南縣河班灣河沙口河皆潛水下流亦淤西夜汊河上承漢水舊由大澤口分流亦謂策口咸豐時改由吳灘潰口即吳家改口西南高家場巡司有驛天門衝繁難府東南二百二十里明為景陵縣隸沔陽州屬承天府順治三年直屬今府雍正四年更名西北有天門山漢水北派自潛江西南逕縣南下流合南派入漢川界又澨水自京山流入合楊水巾水曰三汊河一曰汊水禹貢過三澨即此至城西分二派合於城東北通楊桑湖東通三台湖至漢川注於松湖分流入漢南岳口市縣丞駐乾灘鎮巡司有驛德安府衝隸漢黃德道順治初沿明制屬湖廣布政司康熙三年屬湖北布政司東南距省治三百二十里廣三百八十里袤三百八十里北極高三十一度十八分京師偏西二度五十五分領州一縣四安陸衝倚東章山即豫章山西太平西北壽山溳水亦曰府河即清發水