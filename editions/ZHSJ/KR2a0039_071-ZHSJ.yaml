body:
  text: 清史稿卷七十一志四十六地理十八臺灣臺灣古荒服之地不通中國名曰東番隋開皇中遣虎賁陳棱略澎湖三十六島明嘉靖四十二年海寇林道乾掠近海郡縣都督俞大猷征之追至澎湖道乾遁入臺灣天啟元年閩人顏思齊引日本國人據其地久之為荷蘭所奪清順治十八年海寇鄭成功逐荷蘭人據之偽置承天府名曰東都設二縣曰天興曰萬年其子鄭經改東都為東寧省升二縣為州康熙二十二年討平之改置臺灣府屬福建省領縣三雍正元年增置彰化縣領縣四光緒十三年改建行省光緒十三年九月庚午閩浙總督楊昌濬臺灣巡撫劉銘傳會奏略云臺灣疆域南北相距七百餘里東西近者二百餘里遠或三四百里崇山大溪鈎連高下從前所治不過山前迤南一綫故僅設三縣而有餘自後榛莽日開故屢增廳治而猶不足光緒元年沈葆楨請設臺北府縣以固北路又將同知移治卑南以顧後山全臺官制粗有規模然彼時局勢未聞擇要修舉非一勞永逸之計也臣等公同商酌竊謂建置之法恃險與勢分治之道貴持其平臺省治理視內地為難而各縣幅員反較多於內地如彰化嘉義鳳山新竹淡水等縣縱橫二百餘里三百里不等倉卒有事鞭長莫及且防務為治臺要領轄境太廣則耳目難周控制太寬則聲氣多阻至山後中北兩路延袤三四百里僅區段所設碉堡並無專駐治理之員前寄清虛亦難遙制現當改設伊始百廢俱興若不量予變通何以定責成而垂久遠臣銘傳於上年九月親赴中路督剿叛番沿途察看地勢並據各地方官將境內扼塞道里田園山溪繪圖貼說呈送前來又據撫番清賦各員弁將撫墾地所陸續稟報謹就山前後通局籌畫有應添設者有應改設者有應裁撤者查彰化橋孜圖地方山環水複中開平原氣象宏敞又當全臺適中之地擬照前撫臣岑毓英議就該處建立省城分彰化東北之境設首府曰臺灣府附郭首縣曰臺灣縣將原有之臺灣府縣改為臺南府安平縣嘉義之東彰化之南自濁水溪至姑石圭溪止截長補短方長四百餘里擬添設一縣曰雲林縣新竹苗栗街一帶扼內山之衝東連大湖沿山新墾荒地甚多擬於新竹西南各境添設一縣曰苗栗縣合原有之彰化及埔里社通判一廳四縣均隸臺灣府屬其鹿港同知一缺應即裁撤淡水之北東控三貂嶺番社歧出距縣太遠基隆為臺北第一門戶通商建埠交涉紛繁現值開採煤礦修造鐵路商民麕集尤賴撫綏擬分淡水東北四堡之地撤歸基隆廳管轄將原設通判改為撫民理番同知以重事權此前路添改之大略也後山形勢北以蘇溪為總隘南以卑南為要區控扼中權厥惟水尾其地與擬設之雲林縣東西相直現開路百九十餘里由丹社嶺集集街經達彰化將去省城建立中路前後脈絡呼吸相通實為臺東鎖鑰擬添設直隸州知州一員曰臺東直隸州左界宜蘭右界恆春計長五百餘里寬約四十里十餘里不等統歸該州管轄仍隸於臺灣兵備道其卑南廳舊治擬請改設直隸州同一員水尾迤南改為花蓮港廳其內已墾熟田約數千畝其外海口水深數丈稽查商舶彈壓民番擬請添設直隸州判一員常川駐紮均隸臺東直隸州屬此後路添設之大略也謹按臺灣疆土賦役日增月廣與舊時羈縻僑置情形䄄不相同因地制宜似難再緩況年來生番歸化狉榛之性初就範圍尤須分道拊循藉收實效輯遐牖邇在在需員臣等身在局中既不敢遇事紛更以紊典章之舊亦不敢因陋就簡以失富庶之基損益酌中期歸妥協二十一年割隸日本省在福建東南五百四十里西北距京師七千二百五十里東界海西界澎湖島南界磯頭海北界基隆城海廣五百里袤一千八百里一統志載戶口原額人丁一萬八千八百二十七滋生男婦大小口共一百七十八萬六千八百八十三戶二十二萬四千六百四十六領府三州一廳三縣十一臺灣屹峙海中為東南屏障四面環海崇山峻嶺橫截其中背負崇岡襟帶列島浪嶠南屏鷄籠北衞澎湖為門戶鹿耳為咽喉七鯤身毗連環護三茅港匯聚澄泓畜牧之饒無異中土誠東南一大都會也臺灣府衝繁疲難為臺灣省治巡撫布政使分巡兵備道兼按察使銜共駐其地東及東南界臺東州西及北界海南及西南界臺南府東北界臺北府廣袤里數闕北極高二十四度三十三分京師偏東四度二十分領縣四廳一臺灣衝繁疲難倚分彰化縣治葫蘆墩巡司駐彰化繁難府北百里鹿港縣丞駐雲林難林圮埔縣丞駐苗栗衝大甲巡司駐埔里社廳調府東南其山在府境者西北五鶴牛困山西史老榻山南蘆芝芎根郡坑松柏山土山東內山濁水出埔里社廳東南山西南流左合二水經雲林縣東北一水自南來注之曲北右納一水經縣北又西北一水自嘉義縣來北流注之又西經牛埔厝歧為三支一支曰石龜溪西為牛椆溪一支曰虎尾溪經汕頭厝為麥艹寮港並經縣西入於海一支為東螺溪又歧為三曰刺桐港即番穵港曰鹿港曰二林港並經彰化縣西入於海大肚溪上源曰合水溪出埔里社廳東南魚池仔西北流合南硿溪經廳西北北港溪北硿溪並西流注之又西珠子山二水合西北流注之經府治南左右各納一水經大肚街為大肚溪又西北入於海大甲溪出苗栗縣東南合數小水西南流右出支津注於吞霄溪正渠南流左納一水折西北經鐵砧山南又西北入於海吞霄溪出苗栗縣東南合大甲溪支津經縣南西北流入於海后壠溪出苗栗縣東南山合一水西北流經五鶴山南至鋼羅灣夾二洲又西北經縣治北右通中港溪左納一水入於海中港溪出縣東山緣界西北流經縣治左出支津合后壠港支水為烏眉溪與正渠並西北入於海臺南府衝繁難舊臺灣府改設東北距省治二百里東及東南界臺東州西及南界海北及東北界臺灣府廣袤里數闕北極高二十三度京師偏東三度三十一分領縣四廳一噶瑪蘭頭圍巡司駐安平衝繁難倚大武壠斗六門二巡司鳳山繁難府南八十里下淡水縣丞駐枋寮巡司駐嘉義繁難府北一百十七里笨港縣丞駐佳里興巡司駐恆春疲難澎湖廳簡府西水程二百四十里澎湖總兵駐澎湖八罩巡司其山在府境者北太湖白水木岡山東北大福興大利山東觀音枕頭山北華山東南武吉草山南虎頭龜山西鳳山鳳山縣以此得名鳳山北大岡滾水大武壠大木岡山縣東傀儡山俗曰加禮山澎湖廳懸居海中牛椆溪出嘉義縣東西北流經治北與布袋嘴港並西流入於海八掌溪出雲林縣界西北流經平鼻山北半月山南合瀵箕湖及一小水西流至鹽水港入於海急水溪二源並出雲林縣西界經嘉義縣東南合西流又經急水舖南左納十八重溪又經鐵綫橋街北又西入於海曾文溪出府治東北西北流經大武壠北右納茄拔溪左納一小水經府治北又西經倒風港入於海柴頭港出府治東北山西北流經治北又西合德慶港為安平港入於海二層行溪出府治東茄定港出雁門關嶺阿公店溪出鳳山縣東北並西流入於海淡水溪出府治東六張犂西南流右納一水左納二水經下淡水西鳳山縣治東至潮州厝汛北西冷水溝水出縣東芋匏山合二水西南流注之又西南匯為東港入於港海茄藤港在鳳山縣南西流入於海率芒溪出恆春縣北武吉山合一水西流入於海刺桐港楓港五重溪三重港射寮溪並在恆春縣北西流入於海龍鑾潭在恆春縣南西北流入於海猪束港在恆春縣東東流入於海臺北府衝繁西南距省治三百五十里東北西界海南界臺東州西南界臺灣府廣袤里數闕北極高二十五度十七分京師偏東五度十五分領縣三廳一淡水衝倚新竹疲難府西南宜蘭疲難府東南頭圍縣丞駐基隆廳衝繁府東北二百七十五里其山在府境者北大屯沙帽大武壠山東北雞籠山在基隆廳東府城東攀山南瓦窰山大覊尖山五指山西南橫山金面山虎頭山西南嵌山海環府東北西三面基隆口在基隆廳東北扈尾口在府治西北磺溪出府治南山合石頭溪東北流左右各納一小水至枋橋街紅仙水合擺接溪諸水西流注之又北經府治西艋舺十八重溪水北流折東注之至大稻埕大隆洞溪出基隆廳東雞籠山合一水西流注之又西北分流復合經扈尾港入於海南崁港上流為大過溪在府治西北中瀝溪土牛溝紅毛港鳳山崎溪舊港油車港香山港並在新竹縣西北入於海三貂溪在基隆廳東南草嶺大溪加禮遠港蘇澳門並在宜蘭縣南俱入於海臺東直隸州衝繁疲難卑南廳改設西北距省治五百里東及南界海西及西北界臺灣府北界臺北府西南界臺南府廣袤里數闕北極高二十二度二十五分京師偏東四度卑南州同駐花蓮港州判駐其山在州境者北岐來山能高山西秀姑巒山東丁象山西出八同關為秀姑巒山一帶番社係屬巒番所居西南一帶高山番社係屬昆番所居大港上源曰打馬㖿溪出秀姑巒山東流經治北右合網網溪左合一水經奇密社北入於海卑南大溪出州西南新武洛社合三水東南流入於海花蓮港二源並出州西北合數小水經太平廠南入於海東澳南澳大濁水溪大清水溪小清水溪得其黎溪三棧溪尤丹溪米崙港並在州東北入於海紅蝦港黎仔阬溪郎阿郎溪馬武窟溪八里芒溪呂家望溪知本溪大苗里溪虷子崙溪大足高溪干子壁溪大烏萬溪巴衞溪魯木鹿溪牡丹灣八磘灣並在州東南入於海
