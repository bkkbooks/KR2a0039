body:
  text: 清史稿卷七十六志五十一地理二十三新疆新疆古雍州域外西戎之地漢武帝設西域都護天山以南城郭三十六國皆屬焉天山以北東匈奴右部西烏孫未嘗服屬後漢山北如故山南分五十餘國于闐龜茲最著自建武迄延光三絕三通設都護及長史治之三國及晉北為烏孫及鮮卑西部南為于闐龜茲諸國北魏柔然烏孫悅般高車盡有山北地後周突厥鐵勒據之其南以鄯善為強唐於西州置北庭大都護府統沙陀突厥回鶻西突厥北部諸都督府於龜茲置安西大都護府統龜茲于闐疏勒碎葉四鎮濛池崑陵等都護中葉後為吐蕃所有五代幷於吐蕃回鶻宋時烏孫回鶻居山北于闐龜茲諸國入於遼元置三行尚書省蔥嶺以東屬巴什伯里行尚書省尋增天山南北宣慰司北則巴什伯里南則哈喇和卓後為都哩特穆爾地明四衞拉特居北部曰綽羅斯曰杜爾伯特曰和碩特曰輝特其南部則巴什伯里葉爾羌吐魯番諸國回部派噶木巴爾諸族居之順治四年哈密內屬吐魯番亦入貢惟四衞拉特仍據其地準噶爾即綽羅斯部數侵喀爾喀聖祖三臨朔漠征之噶爾丹走死其兄子策妄阿拉布坦遁伊犁傳子及孫從孫達瓦齊奪其位乾隆十九年杜爾伯特和碩特輝特先後來歸二十年執達瓦齊準噶爾平二十二年以阿睦爾撒納叛霍集占附之再出師二十三年克庫車沙雅爾阿克蘇烏什諸城明年收和闐喀什噶爾葉爾羌諸城二酋走死回部亦平二十七年設伊犂總統將軍及都統參贊辦事協辦領隊諸大臣分駐各城並設阿奇木伯克理回務秩三品至七品光緒十年裁改設頭目以六品為限同治三年安集延酋阿古柏作亂陝回白彥虎應之光緒八年全部盪平九年建行省置巡撫及布政使司以分巡鎮迪道兼理按察使銜改甘肅迪化州及鎮西哈密吐魯番三廳來隸迪化尋升府建省治又改阿克蘇為溫宿直隸州喀喇沙爾庫車烏什英吉沙爾並為廳置分巡阿克蘇道轄之喀什噶爾為疏勒葉爾羌為莎車直隸州英吉沙爾瑪喇巴什為廳及和闐直隸州置喀喇噶爾兵備道轄之庫爾喀喇烏蘇為直隸廳轄於鎮迪道又改伊犁為府精河塔爾巴哈臺為廳置分巡伊塔道轄之二十四年升喀喇沙爾為焉耆府二十八年改庫車廳為直隸州疏勒莎車溫宿三直隸州並為府又改瑪喇巴什廳為巴楚州隸莎車府凡領府六直隸廳八直隸州二廳一州一縣二十一宣統三年編戶四十五萬三千四百七十七口二百六萬九千一百六十五東界外蒙古喀爾喀扎薩克圖汗部西界俄羅斯南界西藏北界阿爾泰山東南界甘肅青海西南界帕米爾東北界科布多西北界俄羅斯廣七千四百里袤三千七百里東北距京師由南路八千六百八十九里由北路八千五百七十六里北極高三十四度至四十九度有奇京師偏西二十一度至四十三度其名山蔥嶺昆崙天山博克達其巨川塔里木葉爾羌和闐伊犁諸河其道路天山南北電綫由迪化東南通蘭州西北通伊犁西南通喀什噶爾迪化府要衝繁難巡撫布政使提學使鎮迪道兼提法司銜副將同駐漢卑陸等十三國地兼有匈奴屬地及烏孫東境後漢初郁立師單桓烏貪訾離為車師所滅後復立時稱車師六國三國時東西且彌單桓卑陸蒲類烏貪並屬車師後部晉屬鐵勒亦曰高車初屬蠕蠕北魏時大破蠕蠕後周屬突厥隋大業中西突厥始大鐵勒諸部皆臣之唐貞觀時內屬及滅高昌置庭州又置瑤池都督府及馮洛州各都督府統於安西大都護府武后時改隸北庭大都護府開元初置北庭節度使貞元後其地屬吐蕃又屬西州回鶻宋為高昌北庭臣服於遼南宋屬西遼元太祖時稱回鶻別失八里元末猛可鐵木兒據之為瓦剌國至明正統中為先嘉靖間分為四衞拉特為瓦剌之轉音居烏魯木齊者為和碩特部後為準噶爾台吉游牧地乾隆二十年平準噶爾始內屬改名烏魯木齊築土城二十五年設同知二十八年築新城於其北名迪化三十六年設參贊大臣理事通判明年於迪化西八里築滿城名曰鞏寧三十八年改參贊為都統設領隊大臣駐鞏寧三十八年升直隸州隸甘肅布政司光緒九年建行省十二年升府來隸廣一千四百里袤五百二十里北極高四十三度二十七分京師偏西二十七度五十六分領縣六光緒七年與俄立約定為商埠迪化衝繁難倚光緒十二年置天山自西來橫亙境南西南雅馬拉克山綿延二百里東北達坂城嶺東南哈拉巴爾噶遜山烏魯木齊河出南山二源東南曰庫爾齊勒河西曰阿拉塔濟河合北流經城西又北名老龍河頭屯河自昌吉入東北流入境瀦為八段馬廠二湖溢出北流與西支合為兩縣交界處三屯河自昌吉北來注之復東北流合老龍河北經沙漠入古爾班托羅海廟兒溝羊圈溝大東溝小東溝諸水均出縣東南分流南入吐魯番達坂城水源出阜康博克達山天馬峰入縣境南流合大銅溝華樹林方家溝白家溝諸水經達坂城卡倫入吐魯番東南鄂門泊達布遜泊北大戈璧廣五百里長三百里卡倫七臺八驛四鞏寧柴俄堡達坂城黑溝有回莊六十七阜康衝繁難府東北一百三十里漢郁立師車師後國魏蠕蠕地周隋突厥唐浮圖沙鉢憑洛耶勒俱六諸地貞觀中置金滿縣元別失八里地明敦剌城改名特訥格爾乾隆二十五年築堡置巡司尋改縣丞二十八年建城改州判隸安西道三十八年併入迪化州境四十一年裁州判置縣博克達山緜亙南境最高者曰福壽山迤北小黃山大黃山縣境諸水均發源博克達山西水磨河西北流分大西溝小西溝二水東有三工河北流疏為五渠又東有四工河北流疏為四渠又東為土墩子河北流疏為六渠又東有柏楊河北流疏為四渠又東曰東溝西溝北流入沙漠合流而北復分為東中西三渠卡倫四臺四驛三在城康樂柏楊縣境分區二十七孚遠衝繁難府東北三百六十里兩漢車師後國及其後城長國魏蠕蠕周突厥唐金滿縣元北庭都元帥府舊治乾隆三十七年築愷安城四十一年設濟木薩縣丞治愷安屬阜康光緒二十年重修城改名孚遠二十九年升置博克達山支脈蜿蜒起伏入境西南無量山東南冰山迤北千佛洞皆博克達山之麓城南小水均發源冰山曰太平公盛二渠由柏楊河分支曰長山三盛二渠出四道橋北曰濟木薩河分大有興隆二渠曰長勝渠曰大東溝北流入慶陽湖曰經二工河北流經老三台驛瀦為蔴菰湖泉水三東西曰大泉中曰上暖泉均北流入沙磧驛二保會三台卡倫二有回莊二十五奇臺衝繁難府東北五百五十里漢蒲類車師後城長國魏屬蠕蠕唐蒲類後置甘露州同光初入遼宋南渡後為別失八里東境元入畏吾兒明衞拉特地康熙中準噶爾內附乾隆二十四年建奇臺堡設管糧通判一東吉爾瑪泰管糧巡檢一四十年築靖遠城四十一年裁通判置縣隸鎮西咸豐三年改隸迪化州光緒十五年自靖遠徙今治天山支脈自西南更格爾入境至穆家地溝東出境綿亙四五百里土人謂之南山沙山自濟木薩至縣境舊城北迄鎮西廳袤延三四百里北拜達克山東北哈布塔克山縣境諸水皆自南山出曰奇臺水木壘河木楊河新戶梁水中葛根水西葛根水永豐渠水吉爾庫水達坂河更格爾水柳樹河自孚遠東流入境經縣北又東至三個莊子入沙磧驛十古城子平營木壘河阿克他斯烏蘭烏蘇色必口頭水溝北道橋黃草湖元湖縣境分區三十六卡倫十六臺七舊城巡司駐光緒七年俄約定古城為商埠昌吉衝繁府西九十里漢單桓東西且彌烏貪訾離地晉屬高車魏蠕蠕隋西突厥鐵勒地唐屬北庭元屬回鶻五城名昌都剌明屬衞拉特乾隆二十五年置廳設通判二十七年築寧邊城設管糧巡檢三十八年改州同四十二年置縣天山支脈綿亙縣境南騷呼達坂格柵圖山草達坂石梯子山塔拉盤山頭屯河出天山北麓分東西二支東支入迪化西支經縣治東復北流至縣境合流入迪化大西河亦出天山北麓至縣治西分二支東為三屯河東北流注頭屯河西為大西河即洛克倫河自焉耆東北流入境折西北流經呼圖壁緣綏來界呼圖壁河源出塔拉盤山西自焉耆府北流入棗溝水南來注之又北經草達坂東分頭工渠西分土古里渠又北至呼圖壁城復分二渠東曰梁渠西曰西河北經牛圈子三家梁至雙岔子合洛克倫河西北入綏來瀦於阿雅爾淖爾呼圖壁原名呼圖拜克乾隆二十二年設洛克倫巡司二十八年移駐呼圖壁二十九年築城名景化為巡司治所光緒二十九年升縣丞驛二寧邊景化卡倫五呼圖壁卡倫一臺四有大回莊四呼圖壁分區二十六綏來衝繁難副將駐府西北三百四十里漢烏貪訾離及烏孫東境三國烏孫魏高車周突厥隋西突厥鐵勒諸地唐西突厥處密部內屬隸北庭都護府宋元回鶻地明衞拉特乾隆二十八年築綏來堡三十三年設縣丞四十三年於舊陽巴勒噶遜城西建二城北康吉南綏來中靖遠關四十四年置縣治康吉城光緒十二年合兩城為一移治南城天山支脈蜿蜒南境西南額林哈畢山古爾班多博克達山博羅托山東南有甘溝山古爾多拜山南有大小衞和勒晶嶺瑪納斯河自焉耆府北流入亦名龍骨河經城西折西北瀦為各林各土淖爾東北流注阿雅爾淖爾洛克倫河自昌吉西北流入逕沙漠亦入阿雅爾淖爾和爾果斯河及安集海大小二水皆出額林哈畢山烏蘭烏蘇河出古爾班多博克達山金溝水出博羅托山塔西河出古爾多拜山驛十二在城靖遠樂土烏蘭烏蘇安集海撞田沙門新渠小三岔口唐朝渠黃羊有大回莊十一卡倫七臺五鎮西直隸廳衝繁難隸鎮迪道巴里坤總兵駐漢東蒲類國後漢屬伊吾盧北魏屬蠕蠕隋屬突厥後分屬西突厥唐沙陀部與處月雜居沙陀叛附吐蕃徙居北庭宋屬伊州後入於遼元為別失八里東境屬亦都護明為和碩特部地明末固始汗遷青海後為準噶爾台吉游牧地康熙三十六年平準噶爾阿爾泰山以東地內屬雍正七年建城於巴爾庫勒改名巴里坤九年設安西廳同知隸甘肅布政司乾隆三十七年於廳東南築會寧城設領隊大臣三十八年升鎮西府領宜禾奇臺二縣咸豐五年仍為廳移鎮迪道駐之裁宜禾光緒十二年來隸西南距省治一千三百三十里廣千里袤八百里北極高四十三度三十九分京師偏西二十三度三十六分天山支脈迤邐南部者為祁連山西北有妙雷努雷山鍋底山那梅州山東北有薩混子山東有松山千里格山巴爾庫勒淖爾即蒲類海在廳西北皇渠水磨河高家湖合諸小水均瀦入之北有鹽池東北察哈泉東南柳條河與昭莫多河合驛八曲底奎素松樹塘蘇吉下肋巴泉務塗水芨芨台上肋巴泉卡倫二廳境分區二十四吐魯番直隸廳衝繁難隸鎮迪道回部郡王台吉駐漢車師前王庭後置戊己二校尉晉治高昌後入涼北魏為高昌國併于蠕蠕後立闞伯周為高昌王傳至鞠嘉為唐所滅置西州升安西都護府貞元中陷吐蕃五代為回鶻所據稱西州回鶻宋建隆二年入貢元太祖平其地號畏吾兒設都護封察哈台于此明初為火州地嗣稱吐魯番順治三年吐魯番阿布勒阿哈默特入貢六年助河西逆回絕其使尋復通康熙二十四年回疆平雍正五年內徙安置瓜州建城闢展乾隆二十四年設建六城於闢展置辦事大臣管糧同知仍以吐魯番廣安城為回城回城四曰魯克沁曰色更木曰哈喇和卓曰托克遜合吐魯番為六城設阿奇木伯克理回務四十四年移同知駐吐魯番並設巡檢隸甘肅布政使司四十五年裁辦事大臣改設吐魯番領隊大臣歸烏魯木齊都統節制光緒十年裁領隊大臣十二年置直隸廳來隸西北距省治五