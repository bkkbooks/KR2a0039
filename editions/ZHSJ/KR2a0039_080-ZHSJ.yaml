body:
  text: 清史稿卷八十志五十五地理二十七西藏西藏禹貢三危之地在四川雲南徼外至京師萬有四千餘里周為西戎漢為西羌唐為吐蕃其君長號贊普至宋朝貢不絕元憲宗始於河州置吐蕃宣慰司都元帥府四川徼外置碉門魚通黎雅長河西寧等處宣撫司世祖時復置烏斯藏郡縣其地明為烏斯藏賜封號設指揮宣慰等司以示覊縻宣德成化間又累加封號其地有僧號達賴喇嘛居拉薩之布達拉廟號為前藏有班禪喇嘛居日喀則城之札什倫布廟號為後藏太宗崇德七年有達賴喇嘛及班禪重譯來貢未幾為蒙古顧實汗所據四傳至曾孫拉藏汗而準噶爾併之康熙五十九年官兵西討殲偽藏王以西藏地賜達賴喇嘛使蒙古舊臣頗羅鼐等五人分守乾隆四年敕封頗羅鼐為郡王領藏事至其子襲封以罪誅遂除西藏王爵所有輔國公三一等台吉一噶布倫四戴琫五碟巴三堪布一設駐藏辦事幫辦大臣分駐前後藏以轄之其俗稱國曰圖伯特又曰唐古忒近因藏民不遵光緒十六年與英所定條約辱其邊務大臣致英兵入拉薩要挾西藏立約十條主權盡失光緒三十一年特派員至印度與英協商其新改條約一西藏路鑛電綫由中英兩國妥議辦理他國不得干預二西藏用人權概歸英員與駐藏大臣會議辦理三西藏有亂中政府須與英協商後派兵彈壓四西藏增設商埠由中英兩國會同辦理五西藏土地非得中英兩國承辦不得租借轉賣據條約觀之西藏蓋為兩屬之國矣境內分四部曰衞曰康曰藏曰阿里東界四川東南界雲南西界西域回部大沙海北界青海及回部廣六千餘里袤五千餘里北極高三十度三十五分京師偏西二十四度十五分衞一曰前藏即古之危亦稱中藏即烏斯藏也乾隆十五年設大臣鎮守其城曰布達拉城有坐牀為達賴喇嘛所駐協理藏事東界喀木西界後藏南界不丹北界青海及新疆轄城二十八喇薩城即布達拉在打箭鑪西北三千四百八十里札什城在喇薩南七里德慶城在喇薩東南三十八里柰布東城在喇薩東南二百二十里桑里城在喇薩東南二百五十一里垂佳普郎城在喇薩東南二百六十里野而古城在喇薩東南三百一十里達克匝城在喇薩東南三百三十七里則庫城在喇薩東南三百四十里滿撮納城在喇薩東南四百四十里拉巴隨城在喇薩東南四百四十里札木達城在喇薩東南五百四十里達喇馬宗城在喇薩東南五百六十里古魯納木吉牙城在喇薩東南六百二十里碩噶城在喇薩東南六百四十里朱木宗城在喇薩東南七百五十里東順城在喇薩東南七百七十里則布拉岡城在喇薩東南八百七十里納城在喇薩東南九百六十里吉尼城在喇薩東南九百八十里日噶牛城在喇薩西南三十里楚舒爾城在喇薩西南百十五里日喀爾城在喇薩西南百二十里公喀爾城在喇薩西南百四十里為衞地最大之城岳吉牙來雜城在喇薩西南三百三十里多宗城在喇薩西南四百二十里僧格宗城在喇薩西南四百三十里董郭爾城在喇薩西二十五里第巴達克匝城在喇薩東北九十二里倫朱布宗城在喇薩東北一百二十里墨魯恭噶城在喇薩東北百五十里蓬多城在喇薩東北百七十里設大汛為護防藏地凡大汛四一在前藏城一在後藏又臺站二自打箭鑪至此有站五魚通即打箭鑪𩹉塘巴塘均屬四川有前藏者二曰察木多曰拉里城西南巴則山西招拉筆洞山又布達拉山高百餘丈又西東噶爾山高約四百餘丈為西藏要隘南牛魔山高二百餘丈東北郎路山薩木多嶺北布克沙克河源出噶爾占古察嶺南流西合沙克河又東南流西受庫蘭河北受布克河又東南入喀喇烏蘇雅魯藏布江即大金沙江古之跋布川也源出藏西界卓書特部西北達木楚克哈巴布山三源俱東北流而合折東流枯木岡前山水自西南來會又東北江加蘇木拉河自西北沙苦牙拉麻拉山東南流來會又東阿拉楚河北自沙拉木岡前山水會而南流又東稍北拉烏克藏布必拉自東北桑里池西南流合數水來會又東南郭永河自東南昂則嶺東北流合數水來會又東薩楚藏布河自東北合諸水來會又東甕出河式爾的河滿楚藏布河薩克藏布河合諸水來會又東南加木租池水北自章阿布林城合東一水南流來注之又東南受西南來一水又正北流折向西北受西北隆左池水又東北莽噶拉河南自那拉古董察山來注之又東北鐘里山水自東南來注之又東北經章拉則城北又東北鄂宜楚藏布河自西北札木楚克池合諸水東南流來注之又北流戒忒楚河札克北朋楚河自北來注之又東南會薩普楚河又東逕普冬廟前烏雨克河自拉公山來注之又東過薩喇朱噶鐵索橋逕林奔城北龍前河自南合二水來注之又東北捏木河自西北來注之折東南流逕拜的城北岸山北受西北來一小水東北過鐵索橋逕楚舒爾城南東南至日喀爾公喀爾城北噶爾招木倫江自東北合諸水西南流逕衞地喇薩來會疑即古吐蕃之臧河也雅魯藏布江既會噶爾招木倫江東南流至打格布衣那城北共八百里年褚河自北合諸水來會又東經叉母哈廟北受東北薩母龍拉嶺水南流入羅喀布占國穆楚河合柰楚河南流入哲孟雄滕格里池在境西北藏地日喀則城東北隔山即潞江源之布喀諸池其北隔山即大流沙也池廣六百餘里周一千餘里東西甚長南北稍狹蒙古呼天為滕格里言水色同天青其東有三水流入皆名查哈蘇太河西有二水流入北曰羅薩河南曰打爾古藏布河合西來數池水東流入此池次曰牙母魯克于木卒池中有三山水成五色曰馬品木達賴池郎噶池即狼楚河也次曰布喀池潞江源也東噶爾山上有關康一曰喀木要寨曰察木多在前藏東千二百五十里東界四川南界珞瑜境及英屬阿薩密西界衞地北界青海喀木今曰昌都亦稱前藏本屬呼圖克圖康熙五十八年始納發設臺站置糧員一有土城西南有羅隆宗舒班多達隆宗西北有類伍齊等部落其南有乍丫康熙五十八年招撫又南有江卡雍正元年招撫設有官寨東達蓋喇山沖得喇山南安靜大山與川滇分界西嘉松古木山東南奪布喇山鼎各喇山西南魚別喇山𩹉角大山冬春積雪又巴貢山蒙堡山擦瓦山雲山雪山白奪山納奪山黃雲山隱山喇貢山東有列木喇嶺羅隆宗東有得貢喇山山勢陡峻西得噶喇山舒班多東有章喇山西南吾抵喇山巴喇山西朔馬喇山即賽瓦合山達隆宗西有必達喇山沙貢喇山魯貢喇山兩山相連類伍齊西南有瓦合大山山大而峻冬春積雪又有擦噶喇山葉達喇山察木多左有昂楮河源出中壩因通雲南亦名雲河右有雜楮河源出九茹因通四川亦名川河二水合流入雲南瀾滄江二源一源發於帀坐里岡城西北格爾吉帀噶那山名帀楚河一源發於帀坐里岡城西北巴喇克拉丹蘇克山名鄂穆楚河俱東南流至帀坐里岡城東北察木多廟前二水合流名拉楚河南流至包敦入乍丫又南流至察瓦寺甲倉河東北來會又東南左受色爾恭河折南流至角占受左貢河又東南流逕茶利大雪山入雲南始名瀾滄江潞江在瀾滄西發源於衞地之布喀大澤淵澄黝黑又多伏流蒙古呼黑為喀喇水為烏蘇故名喀喇烏蘇逕拉薩北有池名布喀橢圜形廣六十里袤一百五十里從此池西北流出入額爾吉根池轉東北入衣達池又折東南流入喀喇池三池俱縱廣五六十里中有三山四池環抱復從喀喇池東南出納布倫河又東受北來二小水折南轉東至喀喇烏蘇為西寧進藏大道皮船為渡轉東北流逕蒙古三十九族地至伊庫山沙克河西北來會又東北流逕蘇圖克土司索克河自北來會折南流左右各受一小水轉西南會衞楚河折而東受雄楚河又東納沙隆錫河轉東南流類烏齊河自北來會又東南逕必蚌山至嘉玉橋為滇蜀入藏之大道又東南流江陽為巴克碩游牧江陰為波密野番又東南流逕桑昂曲宗入江卡江之外為怒夷故名怒江又東南入雲南維西廳折而南下逕雲龍州西徼右納江入保山乃名潞江南流逕潞江安撫司又南流少東左納沙河轉西南至遮放土司從此出滇境入緬甸羅隆宗西有偶楮河源出噶爾藏骨岔海子海合瀾滄江南峽隆喜楮河源出噶喇山東流合偶楮河舒班多有納碩布楚河源出中義溝北流逕舒班多城西合三溪東北流入喀喇烏蘇又柱嗎郎錯河源出噶喇山冑楮河源出吾抵山均流歸偶楮河達隆宗北有撒楮河源出朔馬喇山東南邊楮河流合冑楮河有俄楮河源出沙貢喇山流合葉楮河類烏齊東北有紮楮河即昂楮河下流乍丫有勒楮河源出昂喇山樂楮河源出作喇山又有甲倉河源出官角西南流逕草里工又西南至洛隆宗合洛楚河又西南至乍丫寺前與猛楚河合有色楮河源出上納奪流入察木多大河拉里一名喇里在前藏東五百九十里察木多西六百六十里達隆宗西北康熙五十五年其地有黑喇嘛附於準噶爾尋討平之以地屬前藏設臺站置糧員一無城西南有工布江達江達稱沃壤亦平西藏時就撫又其南有達克東北有西藏大臣所屬三十九土司亦有入甘肅西寧界者皆喀喇烏蘇番衆也拉里有拉里大山勢如龍上下險峻四時積雪西南有瓦子山番人呼為卓拉大山延亙數百里多積雪江達西有鹿馬嶺高約四十里為西藏要隘拉里東有同妥楮河源出魯貢喇山流合得楮河有熱水塘四時常溫番人呼為擦楮卡江達有岡布藏布河自衞地東納東北察拉嶺水又東南有危楚河自東北來會又東南有牛楚河自西北來會東流過打克拉崩橋又東受東北二水又南逕的牙爾山西入岡布部落至撇皮唐他拉東喀木境內有薄藏布河自東北來會土人曰喀克布必拉逕噶克布衣書里東城西又南逕塞母龍拉嶺東朵格拉岡里山西出岡布境逕公拉岡里山西又南入羅喀布占國下流入雅魯藏布江帀楚藏布江即年渚必拉江源出沙羽克岡拉山即喀爾靼廟東南山也有水東流曰馬木楚河與南來巴拉嶺之巴隆楚河會又東北與北來烏山之烏斯江會又東逕鹿馬嶺至順達有水曰佳囊河發源過拉松多東南流逕江達城東折而南流合東二小水來會又東南曲曲流至工布什噶城南有水東北自巴麻穆池南流合東一水來會又折而西南有西來齊布山之牛楚河合而南流至工布珠穆宗城東底穆宗城西又東南至布拉岡城東合於雅魯藏布江又桑楚河南流有雅隆布河出舒班多南境來注之是為薄藏布河又南入羅喀布占國注雅魯藏布江藏即後藏一曰喀齊在前藏西南五百餘里地曰札什倫布即古之藏也南界尼泊爾東界衞地西界阿里北界新疆乾隆十五年設大臣鎮守其城曰札什倫布城有坐牀為班禪額爾德尼所駐協理藏事有汛三在本城一外二曰江孜曰定日西境彭錯嶺北境那木嶺北有雅魯藏布江出阿里西南界山東流有郭永河東北流注之又受那烏克藏布河薩布楚河薩爾格藏布河又近城北會多克楚河至城西會南來之當出河又逕布克什里山南江至此已行二千五百餘里又東入前藏界北有打爾古藏布河流入前藏瀦為騰格里池廣六百餘里江孜在札什倫布城南二百里駐守備一南有帕里邊寨東連布魯克巴西通哲孟雄外接西洋部落噶里噶達東有千壩南有宗木小部落西南有定結北有拉孜皆有官寨東南珠布拉大雪山西南喀木巴拉山及薩木嶺定結之西有朋出藏布河源有三一西出書爾木藏拉山一東出西爾中馬山一東南出瓜查嶺合而東南流受西一小水又南曰朋必拉又南有一水南自綽爾猛通那岡里山來會折東流受南北水各一又東南流受西南涿失岡千山阿巴拉山之水二又東流受南一水又東北至羅西喀爾城南有一河即西北拉喀拉布山二水合東南流逕城北羅楚河自北納三水南流合焉又東北羅藏布河自西北來注之又東繞岡龍前山之北折南流受西來之牛藏布河又東南受帕里藏布河又西南牛楚河西自年爾木城合數水來會又東南流出藏南境過朱拉拉依部落入厄訥特克國界下流入雅魯藏布江汛西有年楚河源有二一出朱母拉母山東北一出其東順拉嶺下泉池十數匯為一水北流名章魯河又東北至娘娘廟東有八水從東北喀魯嶺諸山又南札木長山社山來合而西南流來會轉西北流過江孜城西又西北過白滿城西受四水來注又北始名年楚河經日喀則城東南過蘇木佳石橋長七十丈有十九洞為藏地橋梁之冠又北流入雅魯藏布江源長共八百餘里西有帕里藏布河有一水西南流匯為噶爾撮池南流而西又為查木蘇池又西南流折向東南合東北來一水又西南會西北來之噶拉嶺水又西逕帕里城西又西南受二水土人名藏曲大河西流入朋楚河定日在札什倫布城西南七百餘里駐守備一有汛城三面距邊南有絨轄西南有聶拉木西有濟嚨西北有宗喀絨轄之東南有喀達喀達之西南有陽布俱接廓爾喀界宗喀之南有布陵南近廓爾喀北接拉達克汗部落其西北有薩喀又西北極邊有阿里以上各地俱有營官東崇烏拉山甲錯山西南嘉汭大山西通拉山喀達之西有霞烏拉山宗喀之東有鞏塘拉山布陵境內有岡底斯山在阿里之達克喇城東北直陝西西寧府西南五千五百九十餘里其山高五百五十餘丈周一百四十餘里四面峰巒陡絕高出衆山百餘丈積雪如懸崖浩然潔白頂上有泉流注至山麓即伏流地下前後環繞諸山皆巉岩峭峻奇峰拱列按其地勢出西南徼外以漸而高至此而極山脈蜿蜒分幹向西北者為僧格喀巴布岡里木孫諸山繞阿里而北入西域之和闐南山及蔥嶺諸山向東北者為札布列斜而充角烏爾充年前唐拉薩木坦岡帀諾莫渾烏巴什巴顏哈喇諸山環衞地竟青海連延而下六千餘里至陝西西寧等處邊界向西南者為悶那克尼兒薩木泰岡諸山亙阿里之南入厄訥特克國向東南者為達木楚克喀巴布岡噶爾沙彌弩金岡蒼諸山歷藏衞達喀木至雲南四川之境康熙五十六年遣喇嘛楚兒沁藏布蘭木占巴理藩院主事勝住等繪畫西海西藏輿圖測量地形以此地為天下之脊衆山之脈皆由此起云水經注阿耨達山西南有水名遙奴山西南少東有水名薩罕少東有水名恆伽此三水同出一山俱入恆水今阿里為藏中極西南地近古天竺境此山西出狼楚拉楚麻楚三大水皆西流轉東而南合為岡噶江入南海疑此即阿耨達山也又有打母朱喀巴珀山山形似馬郎千喀巴珀山山形似象生格喀巴珀山山形似獅馬珀家喀巴珀山山形似孔雀皆與岡底斯山相連岡噶江即出郎千喀巴珀山北麓泉出匯為池西北流合東北來一水又西而東北公生池水伏而復出合北來三水西南流來會為馬品木達賴池自西流出為郎噶池受東北來一水從西流出折向西南曰狼楚河曲曲二百餘里有楚噶拉河自東北來注之又西折北而東北逕古格札什魯木布則城之西則布龍城之東折西北而西南流逕則布龍城西南又折而西北流拉楚河自西北來會三水既會始名曰岡噶江又東南流出阿里界逕馬木巴柞木郎部落至厄訥特克入南海朋出藏布河在定日北東南流納結楚河隆崗河入定結有牛楚河出喜拉岡參山東南流合東北岡布紇山水又東南逕濟嚨城南境受北來查母朱山一水始曰牛楚必拉又東流逕年爾母城北境折而東南又轉而東北流會朋出藏布河薩喀境內有鹽池阿里東北九百餘里有達魯克池隆布河與納鞠河皆入焉
