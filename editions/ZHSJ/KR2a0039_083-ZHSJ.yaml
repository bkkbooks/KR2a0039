body:
  text: 清史稿卷八十三志五十八禮二吉禮二郊社儀制郊社配饗祈穀雩祀天神太歲朝日夕月社稷先農先蠶地祇嶽鎮海瀆山川直省神祇郊祀之制太祖御極焚香告天建元天命天聰十年設圜丘德盛門外方澤內治門外壇壝始備會征服察哈爾獲元玉璽躬親告祭遂祀天南郊舊制祭饗用生牢頒百官胙肉帝曰以天胙而享於家是褻也諭改神前分享用熟薦尋征朝鮮祭告天地並祀北郊世祖入關宅帝位於是冬至祀圜丘奉日月星辰雲雨風雷配夏至祀方澤奉嶽鎮海瀆配南北分饗著為例四年定郊祀薦生牢如初惟躬祀南郊進胙牛一十四年詔言人君事天如父歲止一郊心有未盡惟營殿禁中歲時致祀配以太祖太宗庶昭誠敬禮臣乃援唐天寶四時孟月擇吉祭上帝故事謂構上帝殿奉先殿東元旦萬壽三節夏冬二至親詣致虔儀物如郊祀惟內祭初安神位時讀祝辭不用胙不進酒不燎牛從之至是始有禁中祀天禮十七年敕廷臣議合祭儀奏言仿明會典前期一日祭告各壇廟定從祀十二壇是歲四月禁中大饗殿遂合祀天地日月暨諸神聖祖嗣位詔罷之康熙二年定郊祀躬親行禮無故不攝四十六年冬至大祀會天寒羣臣以代請勿許四十八年帝違和始令李光地攝行郊壇大禮越二年祀圜丘如初嗣是帝年踰六十兼病足復令大臣攝之明年冬至齋戒猶力疾升壇省俎豆量力拜跽退處幄次竢攝事者禮訖始還宮臣工固請停躬詣猶勿許六十一年祀南郊始遣世宗恭代距賓天止五日也雍正八年冬至遇聖祖忌日禮臣援舊例請代下大學士九卿議奏言周禮春官稱大祭祀王不親則攝行唐宋制大祀與國忌同日樂備不作議者謂饗神不可無樂未若攝祀之當乎禮也遣代便可其奏乾隆七年定議周禮祀天用玉輅唐宋參用大輦今親祀南郊前期詣齋宮宜御玉輦是日帝乘禮輿易鑾輅自降輦至禮成如儀十四年展拓兩郊壇宇更新幄次越四載蕆事規制始大備仁宗中葉自製南北郊說祀典如故咸豐八年九年帝疾不能親猶宮內致齋屆日詣大高殿皇穹宇行禮穆宗德宗沖齡踐阼皆遣代定親政日躬行宣統纘緒監國攝政王行之郊社之儀天聰十年禮部進儀注迄順治間始定郊祀前期齋戒閱祝版玉帛香省牲祀日遲明禮部太常官詣皇穹宇行禮奉神牌置壇所司祝奉祝版帝出宮乘輦陪祀王公集午門金水橋從行餘序立橋南迎送駕至昭亨門降輦前引大臣十人次贊引官對引官導入更衣幄次更祭服出訖盥詣二成拜位前分獻官各就位典儀贊迎神燔柴司樂官贊舉迎神樂贊引奏升壇帝升一成上詣香案前跪上炷香又三上香復位行三跪九叩禮典儀贊奠玉帛司樂贊舉樂帝詣神位前跪搢玉帛奠案復位典儀贊進俎司樂贊舉樂詣神位前跪受俎拱舉復位典儀贊行初獻禮司樂贊舉初獻樂樂作舞干戚舞帝詣神位前跪奠爵俯伏讀祝官捧祝跪讀訖行三叩禮自上香至獻爵配位前儀同復位易文舞亞獻終獻舞羽籥儀如初獻不用祝分獻官陪祀官隨行禮三獻畢飲福受胙帝升壇至飲福位跪奉爵官酌福酒奉胙官奉胙跪進受爵胙三叩興復位率羣臣行三跪九叩禮徹饌送神司樂典儀贊訖率羣臣行禮如初有司奉祝次帛次饌次香各詣燎所唱望燎帝詣望燎位半燎禮成還大次解嚴太常官安設神牌如請神儀若遣代則行禮三成階下升降自西階讀祝跪二成階下罷飲福受胙禮送燎退立西偏餘如制雍正元年令陪祀官先莅壇祗候方澤前期但閱祝版上香畢奠玉帛用瘞貍餘與郊天同南郊詣壇齋宿自順治十一年著例無常儀乾隆七年定制前一日鑾儀衞嚴駕陳午門外太和門階下巳刻太常卿詣乾清門奏請詣齋宮帝御禮輿出太和門降輿乘輦警蹕鳴鐘鼓至昭亨門外降寺卿導入門左詣圜丘視壇位分獻官分詣神庫神廚視籩豆牲牢帝出內外壝南左門至神路西升輦如齋宮從祀官俟帝入退歸齋所翼日屆時寺卿導入大次更禮服出復導駕詣壇行禮畢還宮三十五年高宗六旬命禮臣酌減升級次數及降輦步行遠近議言郊前一日乘步輦如齋宮自此易禮輿至神路西降步詣皇穹宇上香遣親王視壇祀日自齋宮至神路西階下降輦步入禮成即於降輦處乘輿還宮行禮時初升至二成拜位即升壇上香復位迎神升階行奠玉帛禮以次進俎三獻暨飲福受胙並於此行之還拜位謝福胙送神乃卒事方澤亦如之允行猶慮子孫玩視大典復於三十九年諭誡年未六旬毋減小節著為令次年祀南郊命諸皇子旁侍觀禮越四年於是帝年七十矣諭迎神獻爵暨祖宗配位前上香悉如舊其獻帛爵諸禮自本年南郊始令諸皇子代陳五十一年帝以春秋高步履或遜敕壇上讀祝拜位增設小幄次然備而未用也五十九年祀方澤配位前獻帛爵仍皇子代行歷仁宗朝郊祀各儀節悉遵高宗舊制云嘉慶十八年林清變起計日敉平會長至祀圜丘諭先一日赴壇不升輦自宮至皇穹宇入齋宮並御肩輿用答嘉貺宣統嗣位監國攝行郊祀祀日詣壇不齋宿百官不迎送出入升降仍由右門在右階行禮拜位設第二成視帝位少後去黃幄即於行禮處受胙畢進福酒胙肉餘同親祀儀郊祀配饗順治五年冬至祀圜丘奉太祖配十四年諭曰太祖肇興帝業太宗繼述皇猷功德並隆咸宜崇祀以後大祀天地益奉太宗配饗於是上辛祈穀上帝位東奉太祖神位卜吉奉太宗位於其西夏至配方澤如初禮十七年行大饗殿合祀禮尋罷康熙六年冬至祀南郊用禮臣言奉世祖配饗上帝越九日配饗皇地祇詣方澤行禮九年祈穀亦如之雍正二年奉聖祖配大饗殿次太宗十三年冬高宗嗣服諭言皇考世宗德侔造化宜祀郊壇命議禮以聞議者謂宜乾隆二年冬至配圜丘三年孟春上辛配大饗殿夏至配方澤帝意以為祔廟後配饗去夏至近冬至遠先配方澤前後已歧若俟南郊時日又曠考之舊典世祖太宗配饗天地莫不先圜丘後方澤時或翼日或旬日禮儀粲然稽之經傳成周郊祀后稷以配天宗祀文王於明堂即月令所謂季秋大饗帝也召誥三日丁巳用牲于郊釋者謂非常祀而祭天以告即位也宋皇祐三年以大慶殿為明堂合祭天地三聖並侑古者因事而郊不必定在二至因諭來年世宗配天大禮準此行事踰歲遂諏吉夏至前奉世宗配圜丘餘如議先是部臣進升配儀未議及祗見上帝帝曰皇考祔廟先見祖宗然後升座今行配饗先見上帝於義始允已所司具儀上於是祀南郊奉世宗神位祗見上帝夏至祀方澤祗見皇地祇位並次世祖嗣是升配皆先祗見以為常嘉慶四年奉高宗配饗道光元年奉仁宗配饗並如儀三十年帝弗豫遺命罷郊配略謂禘郊祖宗伊古所重我朝首太祖訖仁宗厚澤深仁允宜配饗郊壇禮隆報本若世世率行無已益滋後人疵議此不能不示限制也文宗踐阼遂敕王大臣集議禮親王全齡等僉云大行皇帝功德懿爍郊配斷不可易請仍遵成憲禮部侍郎曾國藩疏言郊配之罷不敢從者二不敢違者三大行皇帝仁愛之德同符大造粒我烝民后稷所以配天也御宇卅載無一日暇逸無斯須不敬純亦不已文王所以配上帝也具合撰之實辭升配之文臣心何能自安不敢從者一大行皇帝德盛化神即無例可援猶應奏請矧有成憲曷敢稍踰傳曰君行意臣行制在上自懷謙德為下宜守成規不敢從者二壇壝規模尺寸有定一甎一石皆按九五陽數不能增改幄內止容豆籩幄外幾無餘地大行皇帝慮億萬年後或議廣壇壝或議狹幄製故定為限制以身作則嚴諭集議尚未裁決遵行則後人孰肯冒大不韙將來必至修改基址輕變舊章不敢違者一唐垂拱間郊祀奉高祖太宗高宗並配開元十一年從張說議而罷太宗高宗宋景祐間郊祀奉藝祖太宗真宗並配嘉祐七年從楊畋議而罷太宗真宗我朝順治間大饗殿合祀後亦罷其禮大行皇帝慮億萬年後或援唐宋舊例妄行罷祀因諭以非天子不議禮增配尚所不許罷祀何自而興不敢違者二我朝孝治天下遺命尤重聖祖不敢違孝莊文皇后遺命未敢竟安地宮仁宗不敢違高宗遺命故雖豐功偉烈廟號未獲祖稱此而可違家法何在且反覆申明處己卑屈處祖崇高大孝大讓亙古盛德不敢違者三默計皇上仁孝深心不升配歉在闕禮遽升配歉在違命且多將來之慮他日郊祀時上顧遺訓下顧萬世或悚然而難安禮臣益無所辭咎帝頗韙其言已復博諮廷議手降敕諭謂周人郊祀后稷唐宋及明或三祖並侑或數帝分配我朝歷聖相承靡不奉配第配位遞增壇制有定皇考德澤列祖同符應如所請俟祔禮成仍奉升配幷體遺訓昭示限制自後郊祀配位定為三祖五宗永為恆式於是咸豐二年夏大祀圜丘方澤三年春上辛祈穀並奉宣宗配位次高宗十一年帝崩穆宗以郊配大典遺命定三祖五宗聖心不自安乃集羣臣議並奉兩宮皇太后稽衆詢謀禮親王世鐸等先後疏言禮貴制宜孝當承志兩朝遺訓宜謹遵循帝勉從之遂停文宗郊配同治建元雲南學政張錫嶸援孝經明堂嚴父配天義謂宜以季秋祀上帝大饗殿奉顯皇帝配世鐸等益以欽定孝經衍義釋之謂迭饗並侑非禮所宜議遂寢祈穀順治間定歲正月上辛祭上帝大饗殿為民祈穀帝親詣行禮與冬至同惟不設從壇不燔柴十七年詔饗帝大典不宜有異自後祈穀燔柴以為常幷改大饗殿合祀上帝百神在圜丘舉行康熙二十九年聖祖親製祝文四十八年帝疾不能親遣官代會江浙魯豫水旱洊臻仍自製祝文祈之故事上辛在正月五日前改用次辛雍正八年上辛為正月二日部臣因元旦宴請展十日不許先期齋戒如故十三年正月十日上辛未立春帝曰此非乘陽義也命禮臣集議奏言禮月令立春日天子迎春東郊乃祈穀上帝此禮本在立春後請循例用次辛或立春後上辛從之乾隆十六年和親王等以大饗為季秋報祀義殊祈穀請更錫名羣臣亦言非明堂本制襲稱大饗名實未協得旨改曰祈年凡祈穀駕如南郊至西天門內神路西降輦入祈年左門詣皇乾宮上香禮成詣祈年壇視位畢仍出左門升輦至齋宮三十七年更定前一日輦入西天門自齋宮東乘禮輿訖西甎城左門止步詣皇乾殿上香畢還齋宮親王視壇位祀日出齋宮乘輦至甬道正中易禮輿至神路西降自甎城步就幄次入左門禮同圜丘四十七年正月四日上辛禮臣先期請改次辛便帝曰上辛在正月三日前為須隔年齋戒也在四日前為因聖母祝釐也茲非昔比奚改為其仍用上辛著為例又諭孟春祈穀所以迓陽氣兆農祥考諸經傳是立春後上辛非元旦後上辛也惟在月初舊臘即當齋戒然太廟祫祭大禮攸關宮中拜神國俗所在若以齋期行此似非專一致敬之道因下廷臣議尋奏上辛以立春後所得為準與其用十二月上辛不如用正月上辛以重歲首如值三日前則改次辛或四日前則應一日齋戒是日未入齋宮宮殿拜祭各不相妨毋庸改期允行咸豐四年祈穀帝患宿疾敕禮臣酌損儀文侍郎宋晉請仍舊貫遣代行帝曰是非輕改舊章也應天以實不以文此意宜共喻之雩祀關外未嘗行順治十四年夏旱世祖始禱雨圜丘前期齋三日冠服淺色禁屠宰罷刑名屆期帝素服步入壇不除道不陳鹵簿壇上設酒果香鐙祝帛暨熟牛脯醢祭時不奏樂不設配位不奠玉不飲福受胙餘如冬至祀儀其方澤社稷神祇諸壇則遣官蒞祭既得雨越三日遣官報祀定躬禱郊壇儀自此始越三年又旱卜吉致齋步至南郊躬親告祭於時天無片雲頃之乃大雨報祀如初康熙九年夏旱詔百官修省禮部祈雨明年帝親禱自後躬祀以為常二十六年親製祝文祈告雨立降又嘗設壇宮禁跽禱三晝夜日惟淡食越四日步禱天壇雨驟澍步還宮衣履霑溼云乾隆七年御史徐以升奏言春秋傳龍見而雩為百穀祈膏雨也祭法雩宗祭水旱也禮月令雩帝用盛樂命百縣雩祀祀百辟卿士有益於民者以祈穀實是為常雩周禮稻人旱暵共雩斂春秋書雩二十有一有一月再雩者旱甚也是又因旱而雩考雩義為吁嗟求雨其制為壇南郊旁故魯南門為雩門西漢始廢旱輒禱郊廟晉永和立壇南郊梁武帝始徙東改燔燎從坎瘞唐太宗復舊制宋時孟夏雩祀上帝明建壇泰元門東制一成旱則禱我朝雩祭無壇典制似闕應度地建立以符古義下禮臣議議言孟夏龍見擇日行常雩祀圜丘奉列祖配四從壇皆如禮孟夏後旱則仿唐制祭神祇社稷宗廟七日一祈不足仍分禱旱甚大雩令甲祈雨必望祭四海至是罷之又行大雩用舞童十六人衣玄衣分八列執羽翳三獻樂止乃按舞歌御製雲漢詩八章畢望燎餘同常雩至久雨祈晴宜仿春秋傳鼓用牲通考禜祭制伐鼓祀少牢禜祭國門雨不止則伐鼓用牲於社罷分禱停僧道官建壇諷經其直省州縣舊置耤田壇祀仍依雍正四年例孟夏行常雩患旱先祭境內山川次社稷患霪潦祈晴如京師式十七年增祈雨報祭樂章二十四年常雩不雨帝步禱社稷壇仍用玉六月大雩親製祝文定儀節前一日帝常服視祝版詣壇齋宿去鹵簿停樂出宮用騎扈駕大臣常服導從至南郊步入壇視位上香祀日帝雨冠素服步禱從臣亦如之不燔柴不晉俎不飲福受胙三獻畢舞童舞羽歌詩退皆如儀帝率羣臣三拜徹饌望燎禮成還宮三十七年帝以年老命酌損儀節視圜丘嘉慶十八年以欽天監雩祀擇日頻年恆在立夏節殊乖古義敕立夏後數日蠲吉行著為例道光十二年六月大雩親製祝文省躬思過是夕雨報謝如常儀御史陳焯請再申虔禱帝曰祭法有祈有報以報為祈非禮也其勿踰舊制天神順治初定雲雨風雷既配饗圜丘並建天神壇位先農壇南專祀之雍正六年諭建風神廟禮臣言周禮槱燎祀飌師鄭康成注風師為箕星即虞書六宗之一馬端臨謂周制立春丑日祭風師國城東北蓋東北箕星之次丑亦應箕位漢劉歆等議立風伯廟於東郊東漢縣邑常以丙戌日祀之戌地唐制就箕星位為壇宋仍之今卜地景山東適當箕位建廟為宜歲以立春後丑日祭允行規制仿時應宮錫號應時顯佑廟曰宣仁前殿祀風伯後殿祀八風神明年復以雲師雷師尚闕專祀諭言虞書六宗漢儒釋為乾坤六子震雷巽風並列禋祀易言雷動風散功實相等記曰天降時雨山川出雲周禮以雲物辨年歲是雲與雷皆運行造化者也並官建廟奉祀於是下所司議尋奏唐天寶五載增祀雷師位雨師次歲以立夏後申日致祭宋元因之明集禮次風師以雲師郡縣建雷雨風雲二壇秋分後三日合祭今擬西方建雷師廟祭以立夏後申日東方建雲師廟祭以秋分後三日從之乃錫號雲師曰順時普應廟曰凝和雷師曰資生發育廟曰昭顯並以時應宮龍神為雨師合祀之嘉慶二年旱禱雨既應仁宗蒞壇報祀入壇中門降輿至壝南門外盥畢入升壇以次詣雲雨風雷神位上香二跪六拜初獻即奠爵帛讀祝不晉俎不飲福胙餘如故太歲殿位先農壇東北正殿祀太歲兩廡祀十二月將順治初遣官祭太歲定孟春為迎歲暮為祖歲正月書神牌曰某干支太歲神如其年建歲除祭畢合祝版燎之凡祭樂六奏承祭官立中階下分獻官立甬道左右行三跪九拜禮初獻即奠帛讀祝錫福胙用樂舞生承事時猶無上香儀也乾隆十六年禮臣言同屬天神不宜有異自是二祭及分獻皆上香太歲月將神牌舊儲農壇神庫至是亦以殿廡具備移奉正屋臨祭龕前安神座畢復龕舊制祭太歲遣太常卿行禮兩廡用廳員分獻二十年改遣親王郡王承祭次年定太常卿為分獻官雍乾以來凡祈禱天神太歲暨地祇三壇並舉遣官將事陪祀者咸與焉前期邸齋一日承祭官拜位天神壇在南階下太歲與常祀同俱三跪九拜天神用燎太歲兩廡不分獻不飲福受胙朝日夕月初以大明夜明從祀圜丘罷春秋分祀順治八年建朝日壇東郊夕月壇西郊朝日用春分日卯刻值甲丙戊庚壬年帝親祭餘遣官樂六奏舞八佾凡親祭入自壇北門至甬道更衣大次盥畢升西階就位行三跪九拜禮奠獻遣有司行遣代則行禮階下惟讀祝時跽壇上初日壇用露祭雍正四年始援社稷例立龕壇下芘風雨乾隆十一年具服殿成罷更衣大次是歲春分翼日日食高宗蒞祭不乘輦不奏樂不陳鹵簿三十九年躬祭入櫺星左門如幄次行禮以年高酌減禮文非恆式也夕月用秋分日酉刻奉星辰配凡丑辰未戌年帝親祭餘遣官樂六奏儀視日壇稍殺親臨較少升壇行禮二跪六拜初獻奠玉帛讀祝餘如朝日儀遣官則拜壇下乾隆三年戊午例遣官帝因初舉祀典仍親祭如禮五十五年酌損節文如日壇例嘉慶五年庚申效高宗故事仍親祭不遣官十九年定親祭儀祀配位用親王郡王上香二十三年世宗忌日值月壇齋期諭陪祀執事官改常服餘如故社稷之祀自京師以至直省府州縣皆有之其在京師者建壇端門右世祖宅帝位祭告如儀定制歲春秋仲月上戊日祭大社大稷奉后土句龍氏后稷氏配祭日帝親蒞壇上敷五色土各如其方樂七奏舞八佾帝出闕右門降輦道北門出入祭時出拜殿至壝北門外就位自北階升壇上香詣正位奠獻有司分祭配位升北階降西階不晉俎三跪九拜餘儀如北郊舊例祭日逢國忌不改期易素服康熙三年遇太宗忌日始改中戊雍正二年平青海告祭行獻俘禮自是平定藩部獻俘以為常乾隆十七年改送燎為望瘞明年增望瘞樂章三十七年以年老更儀節幄次先設拜殿帝御輦至壇外門易禮輿入右門至拜殿東階下乃降升階行禮禮成升輿如初故事祭日遇風雨拜位香案徙殿中神位祭品露設如故帝曰社稷之制不立棟宇以承天陽今神牌藏神庫是在棟宇內也移奉殿中復何嫌忌四十一年定祭日遇風雨神牌安奉殿內祭器樂簴移設拜殿猝遇則用木龕覆神牌其拜殿別設香案嘉慶五年仁宗詣壇祈雨視春秋致祭儀惟祭品用脯醢果實不飲福前三日及祭日王公百官皆齋戒禁屠宰不理刑名餘悉如故並諭親詣祈禱報祀均步行以隆典禮其在府州縣者順治元年建歲祭亦用上戊府稱府社府稷州縣則云某州縣社稷世宗纘業制定祭品羊一豕一帛一籩豆四鉶簠簋各二有司齋二日届期朝服祭於壇乾隆八年始頒祝文各直省定例為民祈報會城布政使主之督若撫陪祀道官駐地府州縣主之道陪祀十六年以尊卑未協詔互易之督撫道官或出巡仍令布政使暨府州縣官攝祭武官自將軍以下皆陪祀社稷以次諸祭悉準此行先農天聰九年禁濫役妨農崇德元年禁屯積米穀令及時耕種重農貴粟自此始順治十一年定歲仲春亥日行耕耤禮先期戶禮二部尚書偕順天府尹進耒耜暨穜稑種屆期帝親饗祭獻如朝日儀畢詣耕耤所南嚮立從耤者就位戶部尚書執耒耜府尹執鞭北面跪以進帝秉耒三推府丞奉青箱戶部侍郎播種耆老隨覆畢尚書受耒耜府尹受鞭帝御觀耕臺南嚮坐王以下序立三王五推九卿九推府尹官屬執青箱播種耆老隨覆畢帝如齋宮府尹官屬衆耆老行禮農夫三十人執農器隨行禮畢從府縣官出至耕耤所帝賜王公坐俟農夫終畝鴻臚卿奏禮成百官行慶賀禮賜王公耆老宴賞農夫布各一匹作樂還宮其秋年穀登所司上聞擇日貯神倉備供粢盛尋定先農歲祭遣府尹行大興宛平縣官陪祀唐熙時聖祖嘗臨豐澤園勸相雍正二年祭先農行耕耤三推畢加一推頒新製三十六禾詞賞農夫布各四匹罷筵宴頒賜各省嘉禾圖乾隆三年帝初行耕耤禮先期六日幸豐澤園演耕屆日饗先農行四推二十三年諭曰吉亥耤畝所重劭農黛耜青箱畚鎛簑笠咸寓知民疾苦至意吾民雨犁日耘襏維艱炎溼遑避設棚懸彩義無所取且片時所用費中人數十戶產也其除之三十七年羣臣慮帝春秋高籲罷親耕不許命仍依古制三推嘉慶以降仍加一推如初直省祭先農清初未舉行雍正二年耤田產嘉禾一莖三四穗越二年乃至九穗諭言國以民為本民以食為天禮天子耤千畝諸侯百畝是耕耤可通臣下守土者允宜遵行俾知稼穡艱難察地力肥磽量天時晴雨養民務本道實由之於是定議順天府尹直省督撫及所屬府州縣衞各立農壇耤田自五年始歲仲春亥日率屬祭先農行九推十月朔頒時憲書豫定次年耕耤吉期下所司循用祭品禮數如社稷儀先蠶清初未列祀典康熙時立蠶舍豐澤園始興蠶績雍正十三年河東總督王士俊疏請祀先蠶略言周禮鄭注上引房星以馬神為蠶神蠶馬同出天駟然天駟可云馬祖實非蠶神淮南子引蠶經黃帝元妃西陵氏始蠶其制衣裳自此始漢祀菀窳婦人寓氏公主事本無稽先蠶之名禮經不載隋始有壇建宮北三里高四尺唐會要遣有司饗先蠶如先農宋景德三年命官攝祀有明釐正祀典百神各依本號如農始炎帝止稱先農神則蠶始黃帝亦宜止稱先蠶神按周制蠶於北郊今京師建壇亦北郊為宜部議然之侍郎圖理琛奏立先蠶祠安定門外歲季春吉巳遣太常卿祀以少牢未及行乾隆七年始敕議親蠶典禮議者以郊外道遠且水源不通無浴蠶所考唐宋時后妃親蠶多在宮苑中明亦改建西苑高宗鑒往制允其議命所司相度遂建壇苑東北隅三面樹桑柘壇東為觀桑臺前桑園後親蠶門其內親蠶殿後浴蠶池池北為後殿宮左為蠶婦浴蠶河南北木橋二南橋東即先蠶神殿也左曰蠶署北橋東曰蠶所皆符古制云是歲定皇后饗先蠶禮立蠶室豫奉先蠶西陵氏神位屆日辰初刻后禮服乘鳳輦出宮至內壝左門降入具服殿妃嬪從盥訖升中階就南階上拜位六肅三跪三拜謝福胙禮三減一不讀祝爵三獻凡拜跪妃嬪壇下皆行禮餘如饗先農儀禮成還宮越日行躬桑禮先是築臺桑田北置蠶母二人蠶婦二十七人蠶宮令丞各一人承其事后散齋一日從採桑妃嬪以下畢齋是日昧爽從桑侍班公主等祗候南門內巳初刻后出宮妃嬪從詣西苑入具服殿傳贊分引妃嬪公主等就採桑位典儀奏請后行禮出詣桑畦北正中相儀二人𢔛進筐鈎后右持鈎左提筐東行畦外內監揚綵旗鳴金鼓歌採桑辭后東西三採畢歌止相儀𢔛受筐鈎后御觀桑臺以次妃嬪公主等五採命婦九採訖蠶母北面跪典儀舉筐授之祗受退切之授蠶婦洒於箔后御繭館傳贊引妃嬪等行禮訖還宮蠶事畢蠶母蠶婦擇繭貯筐以獻卜吉行治繭禮后復詣壇臨織室繅三盆手遂布於蠶婦以終事尋侍郎三德疏言親蠶典禮為曠世鉅儀請將壇址宮殿規制興工告成日期宣付史館詔從之九年三月始親蠶如儀尋定后不親蒞遣妃代行行禮階下升降自東階不飲福受胙不陪祀十四年禮部請遣妃代祀時皇貴妃未正位中宮帝諭曰妃所代代后也位未正何代為因命內府大臣行禮洎皇后冊立始親饗嗣後或躬親或官攝或妃代並取旨行其行省所祭惟乾隆五十九年定浙江軒轅黃帝廟蠶神暨杭嘉湖屬蠶神祠歲祭列入祀典祭器視先農地祇順治初定嶽鎮海瀆既配饗方澤復建地祇壇位天壇西兼祀天下名山大川三年定北鎮北海合遣一人東嶽東鎮東海一人西嶽西鎮江瀆一人中嶽淮瀆濟瀆一人北嶽中鎮西海河瀆一人南鎮南海一人南嶽專遣一人將行先遣官致齋一日二跪六拜行三獻禮八年封興京永陵山曰啟運東京陵山曰積慶福陵山曰天柱昭陵山曰隆業並列祀地壇十六年徙東京陵祔興京罷積慶山祀明年用禮臣言改祀北嶽於渾源康熙二年賜號鳳臺山曰昌瑞並祀之六年遣祭如初制惟南鎮南海各分遣一人十六年詔封長白山神秩祀如五嶽自是歲時望祭無闕二十四年東巡祀泰嶽祝版不書御名先一日致齋太常齎祝版香帛爵有司備祭品牲薦屆日衣龍袞出行宮樂備不作至廟內降輿入中門竢幄次出盥畢詣殿中拜位二跪六拜奠獻如常儀不飲福受胙明年復改祀北嶽混同江逾二年始望祭三十五年正月為元元祈福始遣大臣分行祭告凡嶽五曰東嶽泰山南嶽衡山中嶽嵩山西嶽華山北嶽恆山鎮五曰東鎮沂山南鎮會稽山中鎮霍山西鎮吳山北鎮毉巫閭山海四曰東海南海西海北海瀆四曰江瀆淮瀆濟瀆河瀆又兀喇長白山翕河喬嶽自此始明年朔漠平遣祭嶽鎮海瀆如故雍正二年賜號江瀆曰涵和河瀆曰潤毓淮瀆曰通佑濟瀆曰永惠並賜東海為顯仁南為昭明西為正恆北為崇禮乾隆二年封泰寧山曰永寧附祀地壇如故事越十年以來歲奉太后秩岱宗敕羣臣議禮奏言古者因名山以升中有燔柴禮聖祖因儀文度數書缺有閒議封禪者多不經定以祀五嶽禮致祭允宜遵行明年蒞泰安前一日詣嶽廟三上香一跪三拜翼日祭如聖祖祀嶽儀又明年巡省中州祀中嶽如初十六年巡江浙遣祭江淮河神自是南巡凡六皆躬祭十九年巡吉林望祭北鎮長白山亦如之二十六年用禮臣議改嶽鎮海瀆遣官六人長白山北海北鎮一人西嶽西鎮江瀆一人東嶽東鎮東海南鎮一人中南二嶽濟淮二瀆一人北嶽中鎮西海河瀆一人南海一人當是時海神廟饗所在多有惟北海尚闕四十三年始建山海關北海神廟凡祈禱地壇行禮位北階下三跪九拜用瘞光緒初元加太白山神曰保民毉巫閭山神曰靈應二十七年兩宮幸西安遣官祭所過山川並告祭華嵩二嶽如禮其他山川之祀自聖祖北征朔漠駐蹕噶爾圖命大學士祭山川出卡倫命官祭域外山川自是浙江大沽大通海神皆建廟修祀雍正間建湘江神武昌江神廟並賜號廣東海陽山神曰安流襄績高宗纘業定星宿海西域山川伊犁阿布拉山諸神祀又以松花江導源長白依望祭北海制行大軍西征祭阿勒台珠爾庫博克達阿拉克四山復賜太白山洞庭山庫倫汗山金山諸神號川陝平建終南山神廟木蘭秋獮議定興安大嶺山祀典常祭用少牢告祭太牢歲仲春望祭行禮如祀五鎮儀帛尊羊豕各一簠簋各二爵三籩豆各十秋獮王大臣致祭豋一鉶二餘同春祭別建廟以祀錫號協義昭靈又封江西廬嶽神曰溥福廣濟自仁宗迄德宗封江南湖北山東臺灣安東江神漢神海神黃陂木蘭山西藏瓦合山四川眉山神皆以時肇封或崇祀綜稽一代祀典河神別見河渠篇其餘名山大川錫號尚多不悉舉云直省神祇順治初令各府川縣建壇歲春秋仲月有司致祭雍正三年定制有司齋二日朝服蒞事儀視社稷壇乾隆八年頒各省祀神祇祝文二十二年定各府州縣祭境內山川以春秋仲月戊日其風雷諸神特錫封廟號以祀自世宗至德宗末代有增錫凡列祀典者有司隨時致虔用羊一豬一果五盤帛一尊一爵三讀祝叩拜如故事
