body:
  text: 清史稿卷八十六志六十一禮五吉禮五宗廟之制時饗祫祭加上諡號東西廡配饗醇賢親王廟謁陵宗廟之制清初尊祀列祖神御崇德建元立太廟盛京撫近門東前殿五室奉太祖武皇帝孝慈武皇后後殿三室奉始祖澤王高祖慶王曾祖昌王祖福王考妣俱南嚮並設床榻衾枕楎椸帷幔如生事儀太宗受尊號躬率羣臣祭告其太牢少牢色尚黑復嗣考祭儀定祭品牛一羊一豕一簠簋各二籩豆各十有二鑪一鐙二各帛一豋鉶尊各一玉爵三金匕一金箸二帛共篚牲共俎尊實酒疏布冪勺具階前設樂部分左右懸祀日陳法駕鹵簿世祖定燕京建太廟端門左南嚮朱門丹壁上覆黃琉璃衞以崇垣周二百九十一丈凡殿三前殿十一楹階三成陛皆五出一成四級二成五級三成中十一左右各九中奉太祖太后神龕中殿九楹同堂異室奉列聖列后神龕後界朱垣中三門左右各一為後殿亦九楹奉祧廟神龕俱南嚮前殿兩廡各十五楹東諸王配饗西功臣配饗東廡前西廡南燎爐各一中後殿兩廡庋祭器東廡南燎爐一戟門五中三門內外列戟百二十左右門各三其外石梁五橋北井亭三南神庫神廚西南奉祀署東南宰牲亭其盛京太廟尊為四祖廟云順治四年定盛京守廟首領馬法秩視拖沙喇哈番餘馬法視護軍校五年冬追尊澤王為肇祖慶王為興祖昌王為景祖福王為顯祖與四后並奉後殿致祭如時饗儀八年孝端文皇后祔廟奉神主祗見太祖太后暨太宗代行三跪九拜禮位次太宗復一跪三拜畢遂行大饗祀後殿則遣官凡升祔先一日遣告至日祗見奉安大饗著為例十八年世祖祔廟位次太祖西旁東嚮康熙九年孝康章皇后祔廟位次世祖二十七年孝莊文皇后祔廟屆期世祖及章后神主避立於旁始行祗見禮位次文后凡祔廟主以卑避尊後倣此五十七年孝惠章皇后升祔議者以孝康祔廟久欲位其次大學士王掞議曰陛下聖孝格天曩時太皇太后祔廟不以躋孝端上今肯以孝康躋孝惠上乎議者不從帝果以為非是令改正焉雍正元年禮臣言古帝王升祔太廟必以皇后配饗周祀閟宮漢於別寢唐宋有坤儀奉慈殿以展孝思自是配廟者皇后字上一字與廟諡同祀別廟者但有諡無廟號其配位或一帝一后或一帝二后宋太宗徽宗則四后先後升祔禮制不同本朝太祖三后唯孝慈祔廟稱高后太宗二后孝端孝莊並稱文后世祖三后孝惠孝康並稱章后孝獻但祀孝陵饗殿定制然也今聖祖祔廟仁孝作配允宜同饗第廟諡曰仁與尊諡複改題孝誠與孝恭體備母儀並宜同祔其孝昭孝懿應集廷臣詳議尋議定夏商逮六朝皆一帝一后唐睿宗二后宋太祖三后太宗四后祔廟之制朱子諸儒咸無異說謹按前典孝昭孝懿應與孝誠孝恭並稱仁皇后同祔太廟從之案儀一元后一繼立一本生並列如序首孝誠次孝昭次孝懿次孝恭於此奉帝后神主以次安東旁西嚮位次太宗乾隆二年世宗暨孝敬后祔廟位西旁東嚮居世祖次四十二年孝聖后升祔次孝敬明年高宗詣盛京徙建四祖廟大清門東南北袤十一丈一尺五寸東西廣十丈三尺五寸正殿五楹東西配廡各三楹正門三東西門各一敕大臣監視落成嘉慶四年高宗暨孝賢孝儀二后祔廟位東旁西嚮次聖祖道光元年仁宗暨孝淑后祔廟位西序東嚮次世宗三十年宣宗遺諭及祔廟事略謂禮經天子七廟周禮小宗伯辨廟祧昭穆漢七廟六室唐九代十一室宋九世十二室議禮紛紛不一而足我朝首太祖訖仁宗巍然七室不參酌今古必至貽笑後嗣朕薄德承基何敢上擬祖考祔廟斷不可行其奉先殿壽皇殿安佑宮為古原廟制可仍舊迺下廷臣議於是禮親王全齡等主遵成憲侍郎曾國藩亦言萬難遵從古者祧廟為七廟親盡言有親盡不祧者則必世德作求不在七廟數若殷三宗周文武是也大行皇帝於皇上為禰廟非七廟親盡比而功德彌綸又當與列祖列宗同為百世不祧之室且諸侯大夫尚有廟祭況尊如天子敢廢祔典帝俞其請詔曰天子七廟特禮之常制非合不祧之室言也皇考祔廟稱宗於制為允遂於咸豐二年宣宗暨孝穆孝慎孝全三后祔廟位東序西嚮次高宗明年奉孝和睿皇后升祔次孝淑文宗少時為康慈太后撫育十一年帝崩穆宗體大行遺志上尊諡曰孝靜同治建元祔廟次孝全四年文宗暨孝德后祔廟位西序東嚮次仁宗於時太廟中殿九楹咸序洎穆宗崩御而祔次尚虛光緒三年惇親王奕誴等躬往相度集議所宜侍講張佩綸請倣殷周制立太宗世室百世不祧展後殿旁垣左右各建世室侍郎袁保恆謂周制世室在太祖廟旁居昭穆上後世同堂異室以近祖為尊請以中殿太祖左右為世室九楹東西各展兩楹別建昭穆六代親廟太祖居中兩旁各六楹為左右世室太祖至穆宗同為百世不祧不必俟親盡遞升其左右隙地更建兩廟各三楹為三昭三穆循次繼入藉省遷移鴻臚寺卿徐樹銘言古者廟前寢後廟以祭饗今前殿是寢以藏衣冠今中殿後殿是茲所當議者藏衣冠寢殿耳應就中殿左建寢殿祭饗仍在前殿列祖列宗百世不祧若建世室後殿旁反嫌居太祖上唯增寢室則昭穆序矣其他條議大率主世室者多有謂後殿宜增殿宇移四祖神主其中改為世室移太宗居中一室穆宗祔廟奉安中殿西第四室者通政使錫珍說也有謂中殿兩旁建世室東二西一中奉太祖主七廟東一廟奉太宗二廟奉聖祖西一廟奉世祖前殿兩旁建六親廟世宗以下奉之斯昭穆不紊少詹事文治說也有謂中殿兩旁建昭穆二世室但建方殿縱橫各五楹移太宗居昭世室世祖居穆世室皆北面中一楹聖祖居昭世室東面第一楹中殿仍奉太祖昭穆各四楹列聖神位依序上移穆宗升祔居昭第三楹司業寶廷說也已閣議以紛更廟制未可從禮親王世鐸等謂與其附會古典不如恪守成規太廟中殿九楹中楹仍舊東西各四楹請如道光初故事增修改飾東次楹又次楹為昭位太宗暨二后聖祖暨四后高宗暨二后宣宗暨四后神主序焉西次楹又次楹為穆位世祖暨二后世宗暨二后仁宗暨二后文宗孝德后神主序焉將來穆宗孝哲后升祔位居宣宗次議上醇親王奕韙之奏言寓尊崇於變通較諸說為當第廟楹有限國統無窮增修尚非至計祧廟為歷朝經制無可避忌請敕自今以往毋援百世不祧之文當循親盡則祧之禮庶鉅典與天地常存於時徐樹銘力主宣宗遺諭以漢唐增室為非今用奉先殿增龕成案億萬年後勢難再加宜遵祖訓豫定昭穆內閣學士鍾佩賢亦以為言鴻臚寺少卿文碩且請建穆宗寢廟而文治寶廷尤力爭並龕簡陋非永制兩宮太后不獲已再下王大臣議兼詢直隸總督李鴻章鴻章言周官匠人營國世室明堂皆止五室鄭注五室並在一堂據此則朱子所圖世室親廟以次而南未盡合制至建寢殿增方殿古制所無禮親王等所言未為無見我朝廟制祖宗神靈協會一室一旦遷改神明奚安太廟重垣庭墀殿陛各有恆式準古酌今改廟非便因時立制自以援奉先殿增龕例為宜議者或嫌簡略攷古禮祔廟迭遷亦止改塗易檐並不大更舊廟今之龕座猶晉宋時坎室晉華垣建議廟堂以容主為限無拘常數王導溫嶠往復商榷始增坎室宋增八室蔡襄為圖今之增龕何以異是又謂奉先殿即古原廟與太廟殊然雍正時奏定奉先殿神牌與太廟顜若畫一成憲可循不得謂增龕之制獨不可倣行太廟也至祧遷雖常典而藏主之室禮無明文鄭康成言周祧主藏於太廟及文武世室是已祧之主與不遷之祖同處一廟故廟亦名祧晉藏西儲夾室當時疑其非禮後世緣為故事儒家謂古祧夾室殆為肊辭廟既與古不同祧亦未容輕議唯醇親王所陳為能導皇上以大讓酌廟制以從宜自此議遂定五年穆宗暨孝哲后祔廟位東序西嚮次宣宗七年孝貞后升祔次孝德宣統元年孝欽后升祔次孝貞是歲考議德宗祔廟事禮臣言兄弟同昭穆但主穆位空一室其餘議禮諸臣重宗統者以為異昭穆不便重皇統者復以為同昭穆不合而大學士張之洞獨主古有祧遷之禮則兄弟昭穆宜同今無祧遷之禮則兄弟昭穆可異議迺定其秋詔曰我朝廟制前殿自太祖以下七世皆南嚮宣宗以下三世分東西嚮與古所謂穆北嚮昭南嚮不同穆德二廟同為百世不祧宜守朱子之說以昭穆分左右不以昭穆為尊卑禮緣義起毋因經說異同過事拘執德宗祔廟中殿奉西又次楹又五室穆位前殿位次西旁文宗坐西嚮東穆位體先朝兼祧之旨慰列聖在天之靈垂為定制奉先殿位序亦如之時饗太宗建國初遇清明除夕躬謁太祖陵即時饗所由始崇德元年建太廟成凡四孟時饗每月薦新聖誕忌辰清明中元歲暮俱致祭五月獻櫻桃命薦太廟凡新進果穀皆先薦迺進御著為令順治元年定時饗制孟春擇上旬日三孟用朔日樂章六奏二年命祭太廟如奉先殿儀讀祝致祭遣官祭福陵昭陵四祖廟止上香燭供酒果不讀祝七月朔秋祭太廟四祖廟中元祭陵並用牛羊尋定四祖廟祭例視京師牲用生又饗太廟用熟牛罷晉胙八年定親饗制飲福受胙如圜丘奏樂備文武佾舞康熙十二年從禮臣言祭太廟質明將事二十四年春親饗畢諭曰往見贊禮郎宣祝至朕名聲不揚禮稱父前子名子孫通名祖父豈可慢易嗣後垂為戒雍正十一年世宗以廟饗無上香奠帛爵無跪獻命大學士禮臣議增尋議言大祀莫重郊壇孝享莫大配天宗廟典禮宜視社稷祭社稷日皇帝親詣上香太廟自宜一例至帛爵俱不親獻皇帝立拜位前所以亞郊壇也仍舊儀便報可又定太廟神牌如奉先殿制供奉居中請牌用太常官獻帛爵用侍衞尋改用宗室官高宗嗣位定三年持服內饗廟御禮服作樂如故唯齋戒用素服冠綴纓乾隆二年用禮臣言祝版書列聖尊諡香帛送燎時行中路帝轉立東旁俟奉祝帛官出復位如祀郊壇式尋定每日上香守廟官行禮朔望用太常官嗣改宗室王公番行十二年諭太廟獻帛爵用宗室官俾習禮儀鎔氣質敕宗人府王公監視後復定後殿獻帛爵用覺羅官向例饗廟帝乘輿出宮至太和門外改乘輦入街門至神路右步入南門詣戟門幄次入升東階進前殿門就拜位禮成出如初凡入門皆左三十七年帝年漸高略減儀節入廟時改自闕左門輦入西北門至廟北門外輿入至戟門外東階下步入門升階進殿行禮畢出亦如之嘉慶四年定時饗前殿座次太祖太宗世祖皇考妣皆南嚮聖祖皇考妣東位西嚮世宗皇考妣西位東嚮高宗皇考妣東次西嚮以後帝后位次倣此八年孟春時饗禮臣卜吉初六日仁宗以前三日致齋會逢高宗忌辰服色未協命改初八日嗣是春饗皆擇正月初八九十等日行之道光四年諭廟饗謝福胙如祀社稷儀王公百官隨行三跪九拜禮穆宗德宗初立時饗祫祭遣親王代逮親政始躬蒞宣統朝攝政王攝行祫祭歷代禘祫分祭禮說繽紛罔衷古訓清制有祫無禘除夕饗廟實始太宗世祖本之著為祭典順治十六年左副都御史袁懋功請舉祫祭以彰孝治迺定歲除前一日大祫移後殿中殿神主奉前殿四祖太祖南嚮太宗東位西嚮先一日遣官告後殿中殿致齋視牲屆日世祖親詣禮如時饗自是歲以為常尋定祫祭樂舞陳殿外康熙時御史李時謙請行禘祭禮臣張玉書上言考禮制言禘不一有謂虞夏禘黃帝殷周禘嚳皆配祭圜丘者有謂祖所自出為感生帝而祭之南郊者有謂圜丘方澤宗廟為三禘者先儒皆辯其非而宗廟之禘說尤不一或謂禘止及毀廟或謂長發詩為殷禘雍詩為周禘而親廟毀廟兼祭者唯唐趙匡陸淳以為禘異於祫不兼羣廟王者立始祖廟推祖所自出之帝以始祖配之故名禘至三年一祫五年一禘說始漢儒後人宗之漢唐宋禘禮並未考始祖所自出止五歲中合羣廟之祖行祫禘於宗廟而已大抵夏商以前有禘祭而厥制莫詳漢唐以後有禘名而與祫無別周以后稷為始祖以帝嚳為所自出而太廟中無嚳位故祫祭不及至禘祭迺設嚳位以稷配焉行於後代不能盡合故宋神宗罷禘禮明洪武初或請舉行眾議不果嘉靖中迺立虛位祀皇初祖帝以太祖配事涉不經禮亦旋罷國家初定鼎追上四祖尊稱立廟崇祀自肇祖始太祖功德隆盛當為萬世廟祖而推所自出則締造大業肇祖最著今太廟祭禮四孟分祭前後殿以各伸其尊歲暮祫饗前殿以同將其敬一歲屢申祼獻仁孝誠敬已無不極五年一禘可不必行遂寢其議乾隆三十七年大祫帝親詣肇祖位前上香餘遣皇子親王分詣復位行禮如常儀詣廟節文減之如時饗六十年將屆歸政九廟俱親上香嘉慶四年定歲暮祫祭前殿座位視時饗咸豐八年文宗疾甫平親王代行祫祭然先祭時猶親詣拜跪焉其因時祫祭者古禮天子三年喪畢合先祖神饗之謂之吉祭雍正二年吏部尚書朱軾言皇上至仁大孝喪三年如一日今服制竟請祫祭太廟即吉釋哀制可明年二月帝詣廟行祫祭如歲暮大祫儀自後服竟行祫祭倣此加上諡號崇德元年太宗受尊號追封始祖為澤王高祖慶王曾祖昌王祖福王上太祖武皇帝孝慈皇后尊諡即日躬祀太廟翼日百官表賀順治元年進太祖孝慈后太宗玉冊玉寶奉安太廟冊長八寸八分廣三寸九分厚四分冊數十面底二頁鐫升降龍寶方四寸二分厚一寸五分紐高二寸七分長四寸二分廣三寸五分寶盝金質凡太廟冊寶皆用玉色青白冊文用驪體寶文如諡號曰某祖某宗某皇帝之寶后曰某皇后之寶五年追尊澤王肇祖原皇帝妣原皇后慶王興祖直皇帝妣直皇后昌王景祖翼皇帝妣翼皇后福王顯祖宣皇帝妣宣皇后奉安訖致禮如時饗越三日慶賀如儀七年上孝端文皇后尊諡九年進四祖帝后冊寶十八年上世祖尊諡前期齋戒遣官祭告天地宗廟社稷屆日帝素服御太和門閱冊寶訖大學士奉安綵亭校尉舁行導以御杖駕從之王公百官各於所立位跪俟隨行至壽皇殿大門外降輦入左門綵亭入右門大學士二人跪奉冊寶陳案上帝就位率羣臣行三跪九叩禮贊引奏跪奏進冊奉冊大學士跪左進帝跪獻畢授右跪大學士陳中案奏進寶如初奏宣冊宣冊官跪宣上尊諡曰體天隆運英睿欽文大德弘功至仁純孝章皇帝廟號世祖宣冊訖奏宣寶儀亦如之行禮三跪九叩致祭同時饗畢奉絹冊寶祝帛如燎所焚之大學士二人奉香冊寶導梓宮奉安一跪三叩翼日頒詔天下凡上大行帝后尊諡香冊香寶獻几筵後奉安山陵絹冊寶送燎玉冊玉寶卜吉藏之太廟後倣此初太祖尊諡曰承天廣運聖德神功肇紀立極仁孝武皇帝太宗曰應天興國弘德彰武寬溫仁聖睿孝文皇帝聖祖纘業加太祖睿武弘文定業六字更廟號高皇帝太宗隆道顯功四字廟號如故用禮臣言俟世祖祔饗後行禮明年上慈和皇太后尊諡二十七年上孝莊太皇太后尊諡五十七年上孝惠皇太后尊諡后聖祖嫡母也祔廟日命安神位慈和上六十一年冬世宗諭廷臣皇考繼統本應稱宗但經云祖有功宗有德皇考手定太平論繼統為守成論勳業為開創宜崇祖號以副豐功其確議之議言按禮經有虞氏禘黃帝而郊嚳祖顓頊而宗堯而舜典云舜格文祖注曰堯廟歸格藝祖復釋為堯之祖合之祖顓頊則有三祖矣宋陳祥道云凡配天者皆得稱祖國語展禽謂有虞氏祖高陽而郊堯堯所以稱文祖也顓頊至堯並黃帝子孫故皆稱祖又周禮大宗伯祫禘追享朝享解云古者朝廟合羣祖而祭焉故祫曰朝饗以合羣祖為不足復禘其所自出故禘曰追饗夫祖所自出始祖也其下曰羣祖則自始祖以下皆可稱祖矣又諡議帝王功業隆盛得援祖有功古義稱為祖竊謂唯聖可揚峻德唯祖可顯隆功議上稱旨雍正初元遂上尊諡廟號聖祖復諭太祖太宗世祖三聖相承功高德盛孝莊孝康孝惠翼運啟期懿徽流慶宜並加諡俾展孝思於是加諡太祖曰端毅太宗曰敬敏世祖曰定統建極而孝慈孝端及三后並尊諡焉於時工部奉神主廟室漆飾金中書翰林官各一人書新諡奏遣大學士二人行填青禮先期祗告天地社稷至日世宗禮服詣太廟行上尊諡禮畢還宮易袞服詣奉先殿致祭後倣此六年鐫造列聖列后玉寶玉冊暨聖祖皇考妣冊寶成奉之太廟其儀太廟潔室設黃案張綵幔兩旁中陳冊寶王大臣朝服將事帝御禮服恭閱一跪三拜安奉綵亭輿導如前儀供案訖帝入行禮如初冊寶集中殿分藏金匱帝以次上香一跪三拜禮成高宗踐阼加列聖列后尊諡諭言宗廟徽稱有制報本忱悃靡窮藉抒至情不為恆式乾隆四十五年以列朝冊寶玉色參差命選工琢和闐精璆越二年工竣祗閱訖奉太廟如禮其舊藏十六分命賫送盛京太廟尊藏玉檢金繩自是帝后祔廟皆別備冊寶送盛京永為制嘉慶四年仁宗守遺訓著制凡列聖尊諡已加至二十四字列后尊諡已加至十六字不復議加功臣配饗所以顯功宗親郡王配東廡文武大臣配西廡崇德元年追封皇伯祖禮敦巴圖魯為武功郡王巴圖魯其名也配東廡福晉與焉並以直義公費英東弘毅公額亦都配西廡順治元年西廡增祀武勳王揚古利位直義上九年復增祀忠義公圖爾格昭勳公圖賴昭勳為直義子忠義為弘毅子父子配侑世尤榮之十一年東廡增祀通達郡王雅爾哈齊慧哲郡王額爾袞宣獻郡王界堪通達位武功上而慧哲宣獻兩福晉亦並侑云康熙九年定祀東廡用太牢歲以為常雍正二年西廡增祀文襄公圖海定功臣配饗儀前期告太廟屆日陳綵亭列引仗奉主至廟西階拜位在階下三跪九拜奉主大臣攝行還納龕位一跪三拜八年怡親王允祥配東廡定王配饗儀奉主以郡王迎主用綵亭吾仗至廟東階拜位在階上代行禮畢降自東階餘如西廡九年進加費英東信勇公圖爾格果毅公圖賴雄勇公圖海忠達公乾隆中西廡增祀襄勤伯鄂爾泰超勇親王策淩大學士張廷玉蒙古王漢大臣侑食自此始四十三年詔祖宗創業艱難懿親藎臣佐命殊功從古未有當時崇封錫爵酬答從優以後有及身緣事降削者有子孫承襲易封者不為追復舊恩心實未愜於是睿親王多爾袞以元勳懿戚橫被流言特旨昭雪禮烈親王代善後人改封為巽已復改為康鄭獻親王濟爾哈朗改為簡豫通親王多鐸改為信肅裕親王豪格改為顯克勤郡王岳託改為衍禧又改為平均非初號悉命復舊並配祀東廡禮王位宣獻下睿王等以次列序位怡王上而徙策淩列怡王次嘉慶元年西廡增大學士傅恆福康安協辦大學士兆惠福康安即傅恆子並封郡王異姓世臣被恩最渥道光三年復增大學士阿桂功臣凡十有二人同治四年東廡增科爾沁親王僧格林沁功王凡十有三人凡時饗帝上香時分獻官上香配位前各分獻不拜三獻畢退祫祭同醇賢親王廟光緒十六年醇賢親王奕薨中旨引高宗濮議辨應稱所生曰本生父沒稱本生考立廟不祧祀以天子之禮合乎父為士子為大夫葬以士祭以大夫古義斯尊親兩全矣迺定稱號曰皇帝本生考復定廟祀典建廟新賜邸第額曰醇賢親王廟正殿七楹東西廡殿後寢室各五楹中門三門內焚帛亭祭器亭其外宰牲亭神庫神大門三殿宇正門中覆黃琉璃殿脊及門四周上覆綠琉璃其祀儀樂舞祭器祭品視天子禮凡時饗以四仲月朔襲王承祭帝親行則襲王陪祀誕辰忌日帝親詣行禮謁陵有清肇迹興京四祖陵並在京西北稱興京陵太祖定遼陽景祖顯祖二陵徙盛京東南稱東京陵嗣是太祖陵當盛京東北稱福陵太宗陵當盛京西北稱昭陵崇德間定歲暮清明祭興京陵用牛一遣守陵官行禮東京陵用牛二遣宗室覺羅大臣行禮福陵用牛一羊二遣大臣行禮國忌誕辰孟秋望日燃香燭獻酒果奠帛讀祝行禮朔望用牛一具香燭酒果遣守陵官致祭不讀祝奠帛順治八年封興京陵山曰啟運東京陵山曰積慶福陵山曰天柱昭陵山曰隆業並從祀方澤置陵官陵戶定祀儀冬至用牛一羊一豕一餘同前清明歲暮孟秋望日亦如之十三年詔立界碑禁樵採十五年移東京陵改祔興京罷積慶山祀明年尊稱為永陵饗殿暖閣如制康熙二年相度遵化鳳臺山建世祖陵曰孝陵先是世祖校獵於此停轡四顧曰此山王氣葱鬱可為朕壽宮因自取佩鞢擲之諭侍臣曰鞢落處定為穴至是陵成皆驚為吉壤歲以清明中元冬至歲暮為四大祭並改建福陵昭陵地宮工竣以奉安祗告致祭如大饗安神位隆恩殿製龕座寶牀帷幔衾褥楎椸如太廟式凡因公謁陵三品以上官羅城門外行禮遇祭日二品以上許入城隨守陵官陪祭歸謁辭凡謁陵東逕石門王貝勒在隆恩門外三跪九拜當直官啟門貝子以下三品官以上則否皆奉祀官為導遇祭日免是時三陵建功德碑嗣凡起陵皆立碑如故事八年定四時大祭遣多羅貝勒以下奉國將軍覺羅男以上行禮明年秋奉太皇太后皇太后率皇后謁孝陵前一日躬告太廟越日啟鑾陳鹵簿不作樂既達陵所太皇太后坐方城東旁奠酒舉哀皇太后率皇后等詣明樓前中立六肅三跪三拜隨舉哀奠酒復三拜還行宮凡皇太后謁陵倣此次日帝復謁隆恩殿行大饗禮又次日殿前設黃幄焚楮帛讀文致祭禮成還京仍告太廟越二日御太和殿百官表賀明年秋車駕至盛京謁福陵昭陵畢召將軍等賜以酒并諭守陵總管副總管曰爾等職司典祀凡祭品必親虔視務盡誠敬副朕孝思還御大清門受賀燕賚羣臣頒守陵官軍其永陵遣王大臣致祭復遣官分詣穎親王克勤郡王直義公費英東諸勳貴墓酹酒還京日仍告廟如儀二十一年滇平詣兩京謁陵如初禮還京祗告奉先殿自是靖寇難謁陵告祭以為常六十年御極週甲命世宗率皇子皇孫詣盛京皇子祭昭陵皇孫祭永陵帝親往福陵大祭雍正元年定聖祖陵曰景陵其明年清明謁祭如典八年冬至會聖祖忌辰禮臣言準陵寢大祭用太牢獻帛爵讀祝文遣官承祭具朝服十三年清明冬至大饗改遣公爵番行七月望日將軍侍郎等承祭其朔望忌辰則定總管掌關防承祭行三跪九叩禮乾隆元年命宗室輔國將軍等六人徙駐瀋陽給田廬歲時致祀二年諭改朔望承祭貝勒公大臣番行復慮儀節不齊增贊禮郎二人導引退仍不贊三年清明謁世宗泰陵六年定三陵四時大饗忌辰祭饗題派移駐將軍二人行禮七年增置三陵爵墊備禮儀八年定謁陵如太廟親祀儀載入儀注已奉皇太后謁祖陵禮節準康熙時例自後三謁皆如之四十三年秋先後謁永陵福陵因諭睠懷遼瀋舊疆再三周歷心儀舊緒蘄永勿諼夫奕𥜥昇平景運皆昔日艱難開創所貽後世子孫當覽原巘而興思拜松楸而感悟默念天眷何以久膺先澤何以善繼知守成之難兢業無墜庶熙洽之盛億萬斯年不然輕故都憚遠涉或偶詣祖陵漠不動心視同覽古是忘本也盛京根本重地發祥所自後世不可不躬親閱歷其毋負朕言嘉慶五年清明詣昌瑞山謁高宗裕陵先敷土次大饗陵寢官豫取潔土儲筐俟帝如更衣次易縞素執事從官素服冠去纓隨至方城有司進黃布護履帝納履從臣亦如之自東磴道升至寶城石欄東陵寢大臣合土以筐隨駕至敷土處跪進帝拱舉敷畢授筐降脫履於是更袍服冠綴纓執事官俱易禮臣請行大饗帝詣隆恩殿行禮讀祝三獻凡清明日謁陵敷土在喪服期帝親行十年帝初謁永陵御素服詣啟運殿後階三跪九拜有司進奠几三拜三奠爵訖舉哀翼日朝服行大饗謁福陵昭陵亦如之後復以祭器乖誤革盛京禮部侍郎世臣職因諭豐沛舊都大臣不應忘卻下其諭各公署其重祀如此道光八年謁裕陵昌陵軍機大臣隨入門命著為例九年奉皇太后詣盛京謁三陵如儀咸豐元年謁東陵五年謁西陵孝貞皇后謁泰陵陵寢女官為導入門皆由左至明樓前行禮六肅三跪三拜女官進奠几后三拜三奠爵西饗舉哀次謁昌陵慕陵如初禮同光間悉依此行凡孝陵景陵以下世宗曰泰陵高宗裕陵仁宗昌陵宣宗慕陵文宗定陵穆宗惠陵並在直隸易遵化二州稱東西陵東陵鳳臺山封昌山西陵太平峪封永寧山並祀方澤設奉祀官置莊園隆恩殿大饗用祝幣其日燃明鐙用牛一羊二尊四帝后同案位設奉先制幣一羹飯脯醢器十八餅果器六十五牲實俎帛實筐酒實尊承以舟疏布冪勺具皇貴妃祔祀則西旁東嚮素帛一減餅果十一器凡冬至暨慶典不舉哀遣官祭饗用朝服升降自西階出入皆門右皇子謁陵至下馬碑降騎至隆恩門外升左階三跪九拜不贊不奠酒妃園寢設官如制建饗殿設神位四時遣官尊酒二跪六拜不贊出人殿左門朔望則奉祀官行禮光緒間帝謁西陵詣莊順皇貴妃寢園一跪三拜三奠酒並諭禮臣祭品儀節從優是後清明中元冬至忌辰遣王公致祭餅果增至六十五器宣統初德宗葬興隆峪號崇陵皇太子園寢與妃園寢同嘉慶間帝親臨端慧皇太子園寢三奠三爵從臣隨行禮每奠一拜載其儀入會典云
