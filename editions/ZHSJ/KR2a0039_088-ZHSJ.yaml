齒逾六十者凡三千餘人其大臣七十以上餘九十以上者子孫得扶掖入宴年最高者如百五歲司業銜郭鍾岳等得隨一品大臣同趨黼座親與賜觴宴罷頒賞珍物有差嘉慶初元再舉設宴皇極殿與宴者三千五十六人邀賞者五千人上自榑槐下逮袀襏以至蒙回番部朝鮮安南暹羅廓爾喀陪价略其年甲咸集丹墀誠盛典也大婚宴順治八年大婚禮成設宴如元旦儀並進皇太后筵席牲酒嗣後倣此耕耤宴順治十一年舉行命曰勞酒凱旋宴自崇德七年始順治十三年定制凡凱旋陛見獲賜宴乾隆中定金川宴瀛臺定回部宴豐澤園及平兩金川錫宴紫光閣其時所俘番童有習鍋莊及甲斯魯者番神儺戲亦命陳宴次後以為常道光八年回疆奠定錫宴正大光明殿是日大將奉觴上壽帝親賜酒命侍衞頒從征大臣酒餘如常儀宗室宴乾隆十一年設宴瀛臺賜宗室王公遵旨長幼列坐行家人禮並引至淑清院流盃亭游覽賜酒果四十八年設宴乾清宮命皇子王公等暨三四品頂戴宗室千三百有八人入宴其因事未與宴者咸與賞都凡二千人嘉慶九年設筵惇殿略同瀛臺宴外藩宴歲除日設保和殿賜蒙古王公等凡就位進茶饌爵行酒樂舞謝恩並如元會儀其來朝進貢送親入覲或御賜恩宴或宴禮部取旨供備至諸國朝貢如朝鮮安南琉球荷蘭遣使來京亦有例宴乾隆間緬甸使臣陪宴萬樹園以其國樂器五種合奏厥後凡遇筵宴備陳準部回部安南緬甸廓爾喀樂又順治中定制鄉試宴順天府會試及進士傳臚宴禮部餘如臨雍經筵修書初舉日講臨幸翰林院繕寫神牌亦賜宴如例衍聖公正一真人來朝纂實錄會典皆於禮部設宴云上尊號徽號儀清初太祖太宗建元羣臣皆上尊號其禮即登極儀也康熙中臣民合辭擬上尊號至六旬聖壽復籲請聖祖諭言無裨治道皆不允行迄高宗敉定邊陲王大臣猶以上尊號請亦未俞納惟新君踐阼奉母后為皇太后皇太后為太皇太后則上尊號國家行大慶則上徽號或二字或四字遞進以致推崇順治八年上孝莊皇后尊號其徽號曰昭聖慈壽先期祭告帝躬上奏書屆期太和殿陳皇帝法駕慈寧宮陳皇太后儀駕供設咸備王公集太和門大臣集右翼門各官集午門分翼立帝升殿中和韶樂作奏海上蟠桃章帝閱冊寶畢執事官分置亭內鑾儀校舁行前冊亭後寶亭帝率羣臣從駕至慈寧門入宮立陛東禮部侍郎內閣學士奉冊寶入大學士奉宣讀冊寶文入侍立左旁帝就拜位王公百官依班位序立皇太后御宮中和韶樂作奏豫平章升座樂止贊跪帝率羣臣跪奏進冊大學士右旁跪進興退帝受冊恭獻大學士左旁跪接興陳中案奏進寶如前儀贊宣冊宣冊官至案前北面跪啟函宣讀訖仍納之興退贊宣寶同仍置原案女官四人舉案陳宮階上丹陛大樂作奏益平章帝率羣臣三跪九叩午門外各官承傳隨班行禮禮成皇太后起座中和韶樂作奏履平章還宮皇后率六宮公主以下詣宮慶賀翼日帝御太和殿王公百官上表慶賀頒詔如制是歲大婚禮成加上徽號禮亦如之康熙初元加上徽號時以諒陰不奏書不行禮不朝賀凡大婚親政冊立皇后武功告成皇太后大慶上徽號並如常儀乾隆四十一年金川平上徽號皇太后諭帝春秋高不宜過勞令豫陳冊寶至時行禮罷宣讀表文後倣此道光九年平回疆上皇太后徽號緬甸國王遣使進金葉賀表緬王進表自此始尊封太妃進冊寶如前儀唯內監舉案陳太妃座前帝行禮太妃起避立座旁次日御殿受賀同若遣官將事禮部尚書朝服詣內閣冊寶舁出偕大學士送之至宮門外內監入獻太妃太嬪受訖禮成冊寶初制用金康乾時兼用嘉玉道光後專以玉為之凡尊封皇貴妃貴太嬪並用冊寶太妃用冊印太嬪用冊冊立中宮儀崇德初元孝端文皇后以嫡妃正位中宮始行冊立禮是日設黃幄清寧宮前幄內陳黃案其東冊寶案王公百官集崇政殿皇帝御殿閱冊寶正副使二人持節執事官舉冊寶至黃幄前皇后出迎使者奉冊寶陳案上西嚮立宣讀冊文具滿蒙漢三體以次授右女官女官跪接獻皇后后以次跪受轉授左女官亦跪接陳黃案次宣寶受寶亦如之使者出復命皇后率公主福晉命婦至崇政殿御前六肅三跪三叩畢還宮升座妃率公主等行禮王公百官上表慶賀賜宴如常儀康熙十六年冊立孝昭仁皇后前期補行納采大徵如大婚禮親詣奉先殿告祭天地太廟後殿則遣官祭告至日設節案太和殿中東西肆左右各設案一南北肆帝御殿閱冊寶王公百官序立正副使立丹陛上北嚮宣制官立殿中門左宣制曰某年月日冊立妃某氏為皇后命卿等持節行禮於是正副使持節前行校尉舁冊寶亭出協和門至景運門以冊寶節授內監奉至宮門皇后迎受行禮畢內監出還節使者使者復命帝率羣臣詣太皇太后皇太后宮行禮翼日皇后禮服詣兩宮及帝座前行禮乾隆二年冊立孝賢純皇后如常儀命頒詔著為家法嘉慶元年立孝淑睿皇后冊命日會太上皇帝千秋宴訖還宮帝后詣前行禮帝御殿正副使持節禮成先詣太上皇宮門前復命餘如常儀冊封妃嬪亦自崇德初元始四妃同日受封屆時命使持節冊封如禮妃等率公主福晉命婦詣帝前六肅三跪三叩后前亦如之妃前則行四肅二跪二叩妃等相對各二肅一跪一叩康熙時貴妃七嬪與中宮同日封諸嬪有冊無寶乾隆十三年定皇妃攝六宮事體制宜崇祭告如冊中宮儀次日朝皇太后拜跪甬路左旁道光三年諭嗣後封嬪罷祭告即與妃同日受封亦然著為令冊立皇太子儀康熙十四年立嫡子允礽為皇太子先期祭告玉帛香版皆皇帝躬視屆日御殿傳制與冊立中宮同正使授冊副使授寶行禮畢正副使復命帝率皇太子祭告奉先殿皇太子拜褥敷檻外並詣帝后宮行禮翼日帝御殿受賀頒詔如常儀王公進箋皇太子前致慶皇太子詣武英殿與親郡王等行禮外省文武官並箋賀如儀遇太子千秋節太子先詣奉先殿致祭隨詣皇帝前行禮還毓慶宮旋御惇本殿受賀王公百官二跪六叩畢還宮羣臣退厥後允礽廢立迄晚年儲位未定五十年後大學士王掞七上密疏請建國本六十年復申前請觸聖怒至乾嘉後始明宣不立儲貳諭旨開國固未嘗有也冊封諸王儀崇德元年定冊封日王貝勒序立崇政殿前內院官奉制冊印陳於案竢旨授封諸王等皆跪宣冊官奉冊官並立案東次第宣畢奉冊印授諸王等王等祗受轉授從官復位禮畢隨奉冊官赴清寧宮詣帝后前行禮三跪九叩遂出大清門諸王等互賀俱二跪六叩還邸福晉夫人各行慶賀府僚致賀諸王二跪六叩貝勒僚屬一跪三叩康熙十二年定制凡冊封簡正副使二人前一日殿堂上設節案香案冊寶案堂前儀衞樂懸備陳屆期正副使詣太和殿奉節出校尉舁冊寶亭赴王府王率府僚跪迎門外正副使奉冊寶節分陳各案立節案東王立案西行禮畢王詣香案前跪聽宣制冊使者授冊寶王祗受復位行禮如初使者奉節復命王率府僚跪送迎送俱用樂封親王曰寶郡王曰印貝勒有制冊無印行禮謝恩並同初制封親王世子用金冊郡王鍍金銀冊貝勒授誥命旋改用紙制冊咸豐十年諭冊封親王用銀質鍍金以恭親王奕訢王爵世襲仍製金冊冊封公主封使至公主率侍女迎儀門右使者奉制冊入陳門前黃案上移置堂前幄內公主升西階六肅三跪三叩宣訖授侍女公主跪受行禮如初使者復命仍送儀門外是日帝陞殿公主至御前次入后宮並六肅三跪三叩又次詣諸妃前各四肅二跪二叩還府府屬慶賀餘如封親王儀凡固倫公主和碩公主同輩者封長公主長者封大長公主並給金冊云
