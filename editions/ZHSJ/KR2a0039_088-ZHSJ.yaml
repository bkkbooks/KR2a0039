body:
  text: 清史稿卷八十八志六十三禮七嘉禮一登極儀授受儀太后垂簾儀親政儀大朝儀常朝儀御門聽政附太上皇帝三大節朝賀儀太皇太后皇太后皇后三大節朝賀儀大宴儀上尊號徽號儀尊封太妃太嬪儀附冊立中宮儀冊紀嬪儀附冊皇太子儀太子千秋節附冊諸王儀冊公主附二曰嘉禮屬於天子者曰朝會燕饗冊命經筵諸典行於庶人者曰鄉飲酒禮而婚嫁之禮則上與下同也周官以嘉禮親萬民體國經野罔不繇此茲舉其大者附以儀之同者著於篇登極儀清初太祖創業建元天命正月朔即位貝勒羣臣集殿前按翼序立皇帝御殿皆跪八大臣出班跪進上尊號表侍臣受跪御前宣讀帝降座焚香告天率貝勒羣臣行禮三跪九叩畢復座貝勒等各率旗屬慶賀太宗踐阼亦如之天聰十年改元崇德建國號曰大清前期誓戒三日築壇備鹵簿屆日帝率羣臣詣天壇祗告禮成奉御寶官先行帝自中階登壇升座貝勒等三跪九叩畢衆跪貝勒分左右列奉寶官跪獻帝受寶轉授內院官羣臣行禮如初畢皆跪宣讀官奉滿蒙漢三體表文立壇東以次畢讀羣臣行禮訖復位奏樂駕還宮翼日帝御殿羣臣表賀三跪九叩次執事官行禮如前儀於是賜宴頒赦詔八年世祖嗣服遣官告壇廟如初禮唯不設鹵簿不作樂不賜宴順治元年十月朔定鼎燕京先期太常官除壇壝司禮監設座案届日遣官告廟社備大駕鹵簿帝御祭服出大清門詣南郊告天地禮成導入天壇東幄次易禮服御座羣臣跪禮部尚書引大學士一人升自東階正中北面跪學士一人自案上奉寶授大學士祗受致辭云皇帝君臨萬國諸王文武羣臣不勝歡忭訖轉授學士學士跪受陳於案復位羣臣禮畢駕還宮鴻臚寺官設御案皇極門中檐東設表案王貝勒等序立內金水橋北文武官序立橋南俱東西嚮樂作帝御座則止鳴鞭執事官階上行禮畢就位王率羣臣進表行禮畢鳴鞭駕還宮越九日甲子頒詔如制聖祖纘業分遣官祭告天地宗社帝衰服詣几筵行三跪九叩禮祗告受命御側殿易禮服詣太皇太后皇太后兩宮各行三跪九叩禮遂乘輿出乾清門御中和殿內大臣等執事官行禮復御太和殿王公百官上表行禮如儀不宣讀不作樂不設宴王公入賜茶畢還宮反喪服就苫次頒詔世宗承大統一如前儀惟罷賜茶高宗以後儲宮嗣立者並同授受儀古內禪儀初高宗享國日久嘗諭年至八十六歲即歸政逮乾隆六十年詔曰自古帝王內禪非其時怠荒即其時多故倉猝授受禮無可採今國家全盛其詳議典禮以聞於是諏吉定儲位以明年為嗣皇帝元年禮臣上儀注先期遣官祭告廟社屆日所司設御座太和殿左右几二正中寶案稍南東西肆東楹詔案西楹表案南北肆黃案居丹陛中檻內敷嗣皇帝拜褥殿前陳鹵簿門外步輦午門外五輅馴象仗馬黃蓋雲盤檐下設中和韶樂門外丹陛大樂內閣學士奉傳位詔陳東案禮部官陳賀表西案大學士等詣乾清門請寶陳左几大學士二人分立兩檐下王公百官序立朝鮮安南暹羅廓爾喀使臣列班末欽天監官詣乾清門報時嗣皇帝朝服出毓慶宮時後扈內大臣二人率侍衞二十人集乾清門外導引禮部長官二人立門階下前引大臣十人立殿後階下太上皇帝禮服乘輿出嗣皇帝從諸臣前引後扈午門鳴鐘鼓至殿後降輿太上皇帝御中和殿升座嗣皇帝殿內西嚮立鴻臚寺官引執事大臣按班不贊行九叩禮侍班者趨出就外朝位中和韶樂作奏元平章太上皇帝御太和殿嗣皇帝侍立如初樂止階下鳴鞭三丹陛大樂作奏慶平章嗣皇帝詣拜位立王公立丹陛上百官及陪臣立丹墀下鳴贊官贊跪嗣皇帝率羣臣跪贊宣表宣表官入奉表至檐下正中跪大學士二人左右跪展表樂止宣訖還奉原案退贊興嗣皇帝退立左旁西嚮大學士二人導近御前跪左大學士請寶跪奉太上皇帝太上皇帝親授嗣皇帝嗣皇帝跪受右大學士跪接陳右几嗣皇帝詣拜位樂作贊跪叩興率羣臣行九叩禮贊退樂止禮成鳴鞭如初中和韶樂作奏和平章太上皇帝還宮內監豫設樂懸太上皇帝御內殿公主福晉暨皇孫皇曾元孫未錫爵者行禮慶賀嗣皇帝易禮服祗竢保和殿暖閣內閣學士豫奉傳位詔及御寶陳太和殿中案禮部官奉登極賀表陳東案扈引者集保和殿外欽天監報時嗣皇帝御中和殿執事者按班行禮不贊禮畢嗣皇帝御太和殿登極作樂止樂宣表行禮悉準前式禮畢退復位大學士進奉詔出中門授禮部尚書尚書跪受興奉置黃案行三叩禮復奉詔陳雲盤儀制司一人跪受興自中道出禮成俱退嗣皇帝還宮大學士等詣乾清門送寶禮部恭鐫詔書頒行垂簾儀咸豐十一年文宗崩穆宗幼沖嗣位御史董元醇奏請皇太后暫權朝政稱旨命王大臣等議垂簾儀制議上懿旨猶謂垂簾非所樂為唯以時事多艱王大臣等不能無所禀承姑允所請云於是仲冬月朔帝奉兩宮皇太后御養心殿聽政王公大臣集殿門外行禮如儀凡召見內外臣工兩宮皇太后皇帝同御養心殿太后前垂簾或召某臣進見議政王御前大臣番頒之引見外官則御養心殿前殿議政王御前大臣率侍衞等按班分立太后前垂簾設案進各員銜名豫擬諭旨分別錄注皇帝前設案各長官依例進綠頭籤議政王等奉陳案上引見如常儀皇太后簡單內某名鈐印已授王大臣傳旨其臣工請安摺並具三分以進各省各路軍事摺報凡應降諭旨者議政王等請旨繕擬後次日呈閱頒行唯撰擬文句仍本帝意宣示臣工宜書曰朕同治十三年德宗入繼文宗王公大臣復請兩宮皇太后垂簾悉準同治初成式光緒六年慈安皇太后薨慈禧皇太后始專垂簾制十三年歸政德宗以時艱尚棘凡召見引見仍陞座訓政設紗屏以障焉親政儀同治十二年正月兩宮皇太后歸政穆宗行親政典禮先期遣告天地廟社屆日陳皇太后儀駕皇帝法駕鹵簿設表案慈寧宮門檻內敷皇帝拜褥太和殿內東旁設詔案東次表案丹陛中案各一午門外設龍亭香亭內閣學士奉皇帝慶賀表文納諸櫝捧出大學士從至永康左門外大學士接櫝至慈寧門升東階陳案上退內侍舉案入庋慈寧宮寶座東內閣學士奉詔陳殿中黃案禮部官奉王公百官賀表陳東次黃案凡將軍提鎮賀表置龍亭內鴻臚寺官引和碩親王以下入八分公以上暨蒙古王公等集隆宗門外不入八分公以下二品大臣以上集長信門外三品以下集午門外欽天監報時帝御禮服乘輿出隆宗門至永康左門外降王以下隨行至慈寧門帝升東階及門左西嚮立日講官四人在西階東嚮立前引大臣率侍衞在儀駕末分左右立皇太后出御慈寧宮中和樂作奏豫平章升座樂止帝就拜位丹陛樂作奏益平章王公大臣侍衞等循次嚮上立贊拜跪帝率羣臣三跪九拜時西楹下置御史二鳴贊官二儀駕末及午門外御史禮部官鳴贊官各二藉以侍儀永康左門及諸門內外並置鳴贊官接續外傳午門外各官隨同行禮鳴贊官贊禮成帝復位王大臣各復位立皇太后還宮禮部尚書奏禮成然後帝還宮俄復出御中和殿執事官行禮畢趨出就外朝立帝御太和殿樂作升座樂止鳴鞭三王公百官行禮其宣表頒詔並如前制光緒十三年德宗親政倣此大朝儀天命元年始行元旦慶賀制朝儀天聰六年行新定朝儀此班朝所繇始崇德改元定元旦進表箋及聖節慶賀儀順治八年定元旦冬至萬壽聖節為三大節康熙八年定正朝會樂章三大節並設大朝行禮致慶王以下各官外藩王子使臣咸列班次所司陳鹵簿樂懸如制太和殿東具黃案質明王貝勒貝子集太和門不入八分公以下官集午門外禮部奉表置亭內校尉舁行至午門外陳兩旁奉表入太和殿列案上鴻臚卿引王貝勒等立丹陛鳴贊官引羣臣暨進表官入兩掖門序立丹墀朝鮮蒙古諸臣自西掖門入立西班末糾儀御史立西檐下東嚮者二人丹陛丹墀東西相嚮者各四人東西班末八人鳴贊官立殿檐者四人陛墀皆如之丹陛南階三級鑾儀衞官六人司鳴鞭欽天監報時皇帝出御中和殿執事官行禮畢趨外朝視事駕出前導後扈如儀午門鳴鐘鼓中和樂作御太和殿樂止內大臣分立前後侍衞又次其後護守之起居注官四人立西旁金柱後大學士學士講讀學士正少詹事立東檐下御史副僉都御史立西檐下鑾儀衞官贊鳴鞭鳴贊官贊排班王公百官就拜位立跪宣表官奉表出至殿下正中北嚮跪大學士二人展表宣表官宣訖置原案丹陛樂作羣臣皆三跪九叩退就立原次鴻臚寺官引朝鮮等使臣理藩院官引蒙古使臣就拜次三跪九叩丹陛樂作禮畢樂止退立如初賜坐羣臣暨外臣皆就立處一跪三叩序坐賜茶畢復鳴鞭三中和樂作駕還宮樂止羣臣退初制外官元日朝覲集保和殿前行禮康熙二十六年後罷乾隆六年定行在聖節朝賀行禮二十四年定大朝百官班次設立紅漆木牌五十四年增置都察院長官二人科道三十六人分立品級山旁整朝序又高宗初年文三品武二品以上賜茶餘惟記注官外國使臣與焉嘉慶二年罷賜茶令甲元旦萬壽節午時設宴冬至節次日受賀萬壽節先謁太廟次詣皇太后宮行禮畢受賀直省文武官值三大節俱設香案朝服望闕行禮滿蒙漢軍分兩翼漢官分文東武西常朝儀太祖丙辰建元後益勤國政五日一視朝焚香告天宣讀古來嘉言懿行及成敗興廢所由訓誡臣民然未垂為定制也崇德初始定儀注設大駕鹵簿王以下各官朝服竢帝出宮樂作御殿陞座樂止賜坐諸臣各依班次一叩就座部院官出班奏事畢駕還宮順治九年給事中魏象樞言故事有朔望朝有早朝晚朝內朝外朝今縱不能如往制請一月三朝以副厲精圖治至意楊簧亦言舊例百官每月十一朝似太繁數今每日入朝奏事較十一朝不為少應定每月初五十五二十五日行朝參禮自是遂定逢五視朝制尋定見朝辭朝謝恩各官俱常朝日行禮帝御太和殿引見畢賜坐賜茶悉準常儀如是日不御殿各官行禮午門外外藩來朝貢使亦常朝日行禮如速返則不拘朝期即赴午門行禮外官應速赴任者亦然又定常朝御殿王公入殿中旁坐如次康熙八年定公侯伯以下各官為六班按次列坐後復改為九班九年諭都察院糾察王大臣失儀二十年置常朝糾儀御史及司員雍正二年遣侍衞四人監察朝班定視朝日天未明鴻臚寺官二人引左右翼官入西掖門依班坐鼓嚴起立聽贊自仗南引進整齊班列行禮如儀乾隆初敕大小各官依內廷官例黎明坐班十六年諭部院大臣董率庶僚常朝按期赴班毋曠闕光緒九年更定朝制凡新除授各官鴻臚寺列銜名交內閣屆日禮部尚書鴻臚卿請駕御殿導各官謝恩行禮王公百官侍鹵簿後不御殿文武官則坐班午門外其時刻春冬以辰正夏秋以卯正遇雨雪及國忌則免坐班日鴻臚寺官按翼定位王公集太和門外東西各二班百官集午門外東西各九班糾儀御史吏禮司員各四人分列班首末並西面北上屆時吏禮司員受職名糾儀官環班稽察復位坐有間以次出御門聽政儀清初定制每日聽政必御正門九卿科道齊集啟奏率以為常雍正初始定御門典禮凡部院所進本有未經奉旨者摺本下內閣積若干傳旨某日御門辦事是日乾清門正中設御榻黼扆本案一黎明部院奏事大臣暨陪奏官屬畢集庭內帝升座侍衞左右立記注官升西階部院官升東階各就列跪尚書前侍郎後陪奏官又後尚書一人奉本匣折旋而進詣本案前跪陳於案興少退趨東楹轉入班首跪口奏某事畢興少退率屬循階左降其奏事次序戶禮兵工四部輪班首上三法司直第三班吏部直第六班宗人府則列部院前