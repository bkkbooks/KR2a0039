body:
  text: 清史稿卷九十五志七十樂二十二律呂尺度黃鍾古尺徑三分三釐八豪五絲一忽長九寸積八百一十分今尺徑二分七釐四豪一絲九忽長七寸二分九釐積四百三十分四百六十七釐二百一十豪容黍一千二百粒大呂古尺徑三分三釐八豪五絲一忽長八寸四分二釐七豪二百四十三分豪之二百三十九積七百五十八分五百一十八釐五百一十八豪奇今尺徑二分七釐四豪一絲九忽長六寸八分二釐六豪三分豪之二積四百零三分一百零七釐八百四十豪容黍一千二十四粒太簇古尺徑三分三釐八亳五絲一忽長八寸積七百二十分今尺徑二分七釐四豪一絲九忽長六寸四分八釐積三百八十二分六百三十七釐五百二十豪容黍一千零六十七粒夾鍾古尺徑三分三釐八豪五絲一忽長七寸四分九釐一豪二千一百八十七分豪之一千一百八十三積六百七十四分二百三十八釐六百八十三豪奇今尺徑二分七釐四豪一絲九忽長六寸分六釐八豪二十七分豪之四積三百五十八分三百一十八釐零八十豪容黍九百九十九粒姑洗古尺徑三分三釐八豪五絲一忽長七寸一分一釐一豪九分豪之一積六百四十分今尺徑二分七釐四豪一絲九忽長五寸七分六釐積三百四十分一百二十二釐二百四十豪容黍九百四十八粒仲呂古尺徑三分三釐八豪五絲一忽長六寸六分五釐九豪一萬九千六百八十三分豪之二千九百零三積五百九十九分三百二十三釐二百七十三豪奇今尺徑二分七釐四豪一絲九忽長五寸三分九釐三豪二百四十三分豪之二百二十一積三百一十八分五百零四釐九百六十豪容黍八百八十八粒蕤賓古尺徑三分三釐八豪五絲一忽長六寸三分二釐豪之八十一分豪之八十積五百六十八分八百八十八釐八百八十八豪奇今尺徑二分七釐四豪一絲九忽長五寸一分二釐積三百零二分三百三十釐八百八十豪容黍八百四十三粒林鍾古尺徑三分三釐八豪五絲一忽長六寸積五百四十分今尺徑二分七釐四豪一絲九忽長四寸八分六釐積二百八十六分九百七十八釐一百四十豪容黍八百粒夷則古尺徑三分三釐八豪五絲一忽長五寸六分一釐八豪七百二十九分豪之四百七十八積五百零五分六百七十九釐零一十二豪奇今尺徑二分七釐四豪一絲九忽長四寸五分五釐一豪九分豪之一積二百六十八分七百三十八釐五百六十豪容黍七百四十九粒南呂古尺徑三分三釐八豪五絲一忽長五寸三分三釐三豪三分豪之一積四百八十分今尺徑二分七釐四豪一絲九忽長四寸三分二釐積二百五十五分零九十一釐六百八十豪容黍七百一十一粒無射古尺徑三分三釐八豪五絲一忽長四寸九分九釐四豪六千五百六十一分豪之二千二百六十六積四百四十九分四百九十二釐四百五十五豪奇今尺徑二分七釐四豪一絲九忽長四寸分四釐五豪八十一分豪之三十五積二百三十八分八百七十八釐七百二十豪容黍六百六十六粒應鍾古尺徑三分三釐八豪五絲一忽長四寸七分四釐豪二十七分豪之二十積四百二十六分六百六十六釐六百六十六豪奇今尺徑二分七釐四豪一絲九忽長三寸八分四釐積二百二十六分七百四十八釐一百六十豪容黍六百三十二粒七音清濁倍蕤賓下徵乙字倍林鍾清下徵高乙字倍夷則下羽上字倍南呂清下羽高上字倍無射變宮尺字倍應鍾清變宮高尺字黃鍾宮聲工字大呂清宮高工字太簇商聲凡字夾鍾清商高凡字姑洗角聲六字仲呂清角高六字蕤賓變徵五字林鍾清變徵高五字夷則徵聲乙字南呂清徵高乙字無射羽聲上字應鍾清羽高上字半黃鍾變宮尺字半大呂清變宮高尺字半太簇少宮工字半夾鍾清少宮高工字半姑洗少商凡字半仲呂清少商高凡字黃鍾同形管聲同形管周徑積分表繁詳正義不列八倍黃鍾之管黃鍾宮聲工字正黃鍾之管七倍黃鍾之管大呂清宮高工黃鍾八分之七之管六倍黃鍾之管太簇商聲凡字黃鍾八分之六之管五倍黃鍾之管夾鍾清商高凡黃鍾八分之五之管四倍黃鍾之管姑洗角聲六字黃鍾八分之四即二分之一之管三倍半黃鍾之管仲呂清角高六黃鍾八分之三分半之管三倍黃鍾之管蕤賓變徵五字黃鍾八分之三之管二倍半黃鍾之管林鍾清變徵高五黃鍾八分之二分半之管二倍加四分之一黃鍾之管夷則徵聲乙字黃鍾八分之二又加此一分之四分之一之管二倍黃鍾之管南呂清徵高乙黃鍾八分之二即四分之一之管正加四分之三黃鍾之管無射羽聲上字黃鍾八分之一又加此一分之四分之三之管正加半黃鍾之管應鍾清羽高上黃鍾八分之一又加此一分之四分之二之管正加四分之一黃鍾之管半黃鍾變宮尺字黃鍾八分之一又加此一分之四分之一之管正加八分之一黃鍾之管半大呂清變宮高尺黃鍾八分之一又加此一分之八分之一之管正黃鍾之管半太簇宮聲工字黃鍾八分之一之管樂之節奏成於聲調聲也者五聲二變之七音調也者所以調七音而互相為用者也聲調之原本自旋宮因管律絃度七音取分之不同而旋宮異古旋宮之法合竹與絲並著之自隋以來獨以絃音發明五聲之分律呂旋宮遂失其傳夫旋宮者十二律呂皆可為宮立一均之主各統七聲而十二律呂皆可為五聲二變也聲調者聲自為聲調自為調而調又有主調起調轉調之異故以轉調合旋宮言之名為宮調五聲二變旋於清濁二均之一十四聲則成九十八聲此全音也然調雖以宮為主而宮又自為宮調又自為調如宮立一均之主而下羽之聲又大於宮故為調之首古所謂宮逐羽音是也羽主調宮立宮一均七聲之位定則當二變者不起調而與調首音不合者亦不起調蓋以羽起調徵在其前變宮居其後二音與羽相近得聲淆雜而變徵為第六音亦與羽首音不合此所以當二變之位與五正聲當徵位者俱不得起調也至於止調亦取本調相合可以起調之聲終之當二變與徵位者亦不用焉其立羽位調首之音自本聲起者即為本調首音與五音為羽與角次相合首音與三音為羽與宮又次相合且均調相應首音與四音為羽與商轉相合可出入故本調為一調自宮位起者為一調自角位起者為一調自商位起者復為一調自羽位宮位角位起者為正自商位起者為假借故曰可出入如曲中所謂與某宮某調相出入者是也轉相合者下羽之調首至角為第五位商之第三音至正羽第八音亦五位也一均四調七均二十八調合清濁之一十四均則為五十六調樂工度曲七調相轉之法四字起四為正調樂工轉調皆用四字調為準以四乙上尺工凡六七列位視某字當四字位者名為某調一如五聲二變遞轉旋宮之法以四字當羽位為起調處也乙字起四為乙字調上字起四為上字調尺字起四為尺字調工字起四為工字調凡字起四為凡字調合字起四為合字調此指笛孔言四字調乙凡不用乙字調上六不用上字調尺五不用尺字調工乙不用工字調凡上不用凡字調合尺不用合字調五工不用即如羽聲主調當變宮變徵聲者不用也又四字調乙凡不得起調而六字亦不得起調即如羽聲當羽位主調二變不得起調而徵聲亦不得起調也此七調之七字相轉即五聲二變之旋相為宮宮調聲字實為一體析而言之則有四科一曰七聲定位以五聲二變立一定之位自下羽至正羽共列為八顯明隔八相生之理視下羽位聲字律呂知其為某宮之某調視宮位聲字律呂知其為某調之某宮視二變位知某聲字某律呂之當避二曰旋宮主調以五聲二變旋於七聲定位之下亦分八位如羽聲立下羽之下宮聲立宮位之下則為宮聲立宮而羽聲主調又如商聲立下羽之下變徵立宮位之下則為變徵立宮而商聲主調三曰和聲起調以十二律呂兼倍半以備用按所生之音各隨其均序於旋宮之下仍以調主相和之聲所起各調注本律本呂之下以正各調之名如黃鍾立宮則夷則立下羽之位以主調倍無射正蕤賓當二變不起調正夷則立徵位亦不起調故用倍夷則起調者為正羽調起黃鍾宮聲為正宮起太簇商聲為正商起姑洗角聲為正角此正宮之四調也大呂立宮則倍南呂立下羽之位主調用以起調者為清羽調起大呂宮聲為清宮起夾鍾商聲為清商起仲呂角聲為清角此清宮之四調也其餘立宮主調皆依此例四曰樂音字色以律呂簫笛所命字色隨聲調而序其次列於律呂之下如黃鍾為工字而簫應黃鍾者為工字笛應黃鍾者為五字皆注於黃鍾本律之下大呂為高工字而簫之高工笛之高五亦皆注於大呂本律之下其立羽位之字即為主調其立宮位之字即為立宮其當二變之位則不用當徵位者亦不以起調以此四科列為表旋宮轉聲主調起調之理犁然矣黃鍾宮聲立宮倍夷則下羽主調為上字調七聲定位旋宮主調律管簫笛起調下羽下羽倍夷則上凡正羽調變宮變宮倍無射尺合不起調宮宮黃鍾工四正宮商商太簇凡乙正商角角姑洗合上正角變徵變徵蕤賓四尺不起調徵徵夷則乙工不起調羽羽無射上凡同調首大呂清宮立宮倍南呂清下羽主調為高上調七聲定位旋宮主調呂管簫笛起調下羽清下羽倍南呂上凡清羽調變宮清變宮倍應鍾尺六不起調宮清宮大呂工五清宮商清商夾鍾凡乙清商角清角仲呂六上清角變徵清變徵林鍾五尺不起調徵清徵南呂乙工不起調羽清羽應鍾上凡同調首太簇商聲立宮倍無射變宮主調為尺字調七聲定位旋宮主調律管簫笛起調下羽變宮倍無射尺合變宮調變宮宮黃鍾工四不起調宮商太簇凡乙商宮商角姑洗合上姑洗商角變徵蕤賓四尺商角變徵徵夷則乙工不起調徵羽無射上凡不起調羽變宮倍無射半黃鍾尺六同調首夾鍾清商立宮倍應鍾清變宮主調為高尺調七聲定位旋宮主調呂管簫笛起調下羽清變宮倍應鍾尺六清變宮調變宮清宮大呂工五不起調宮清商夾鍾凡乙清商宮商清角仲呂六上仲呂商角清變徵林鍾五尺清商角變徵清徵南呂乙工不起調徵清羽應鍾上凡不起調羽清變宮倍應鍾半大呂尺六同調首姑洗角聲立宮黃鍾宮聲主調為工字調七聲定位旋宮主調律管簫笛起調下羽宮黃鍾工四宮調變宮商太簇凡乙不起調宮角姑洗合上角宮商變徵蕤賓四尺角商角徵夷則乙工夷則角變徵羽無射上凡不起調徵變宮倍無射半黃鍾尺六不起調羽宮黃鍾工五同調首仲呂清角立宮大呂清宮主調為高工調七聲定位旋宮主調呂管簫笛起調下羽清宮大呂工五清宮調變宮清商夾鍾凡乙不起調宮清角仲呂六上清角宮商清變徵林鍾五尺清角商角清徵南呂乙工南呂角變徵清羽應鍾上凡不起調徵清變宮倍應鍾半大呂尺六不起調羽清宮大呂工五同調首蕤賓變徵立宮太簇商聲主調為凡字調七聲定位旋宮主調律管簫笛起調下羽商太簇凡乙商調變宮角姑洗合上不起調宮變徵蕤賓四尺變徵宮商徵夷則乙工變徵商角羽無射上凡變徵角變徵變宮倍無射半黃鍾尺六不起調徵宮黃鍾工五不起調羽商太簇凡乙同調首林鍾清變徵立宮夾鍾清商主調為高凡調七聲定位旋宮主調呂管簫笛起調下羽清商夾鍾凡乙清商調變宮清角仲呂六上不起調宮清變徵林鍾五尺清變徵宮商清徵南呂乙工清變徵商角清羽應鍾上凡清變徵角變徵清變宮倍應鍾半大呂尺六不起調徵清宮大呂工五不起調羽清商夾鍾凡乙同調首夷則徵聲立宮姑洗角聲主調為合字調七聲定位旋宮主調律管簫笛起