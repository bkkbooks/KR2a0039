分而餘絃不移即轉為商調蓋正宮調一絃六絃定倍無射之律變宮合字得徵絃分者下為倍夷則之律羽聲凡字轉角絃之分三絃定姑洗之律角聲上字得宮絃分者下為太簇之律商聲乙字轉羽絃之分其二絃四絃五絃七絃不移者仍應本律但二絃七絃原得羽絃分者轉為徵絃之分四絃原得商絃分者轉為宮絃之分五絃原得角絃分者轉為商絃之分其倍無射之律變宮合字為徵絃分者轉變徵應於倍應鍾之呂清變宮高六應姑洗之律角聲上字為宮絃分者轉變宮應於仲呂之呂清角高上此二分當二變不用因三絃定太簇之律商聲乙字得羽絃之分以起調四絃原得商絃之分者轉為宮絃之分以立宮故曰商調如二絃四絃五絃七絃俱緊上管律半音在絃度亦為半分而餘絃不移即轉為角調蓋正宮調二絃七絃定黃鍾之律宮聲四字得羽絃分者上為大呂之呂清宮高五轉徵絃之分四絃定蕤賓之律變徵尺字得商絃分者上為林鍾之呂清變徵高尺轉宮絃之分五絃定夷則之律徵聲工字得角絃分者上為南呂之呂清徵高工轉商絃之分其一絃三絃六絃不移仍應本律但一絃六絃轉為角分三絃轉為羽分而轉變徵變宮者不用因三絃應姑洗之律角聲上字得羽絃之分以起調四絃原得商絃之分者上為角絃之分轉宮絃之分以立宮故曰角調如獨緊五絃管律半音在絃度亦為半分即轉為變徵調四絃應蕤賓之律變徵尺字得羽絃之分以起調五絃原得角絃之分者上為變徵之分轉為宮絃之分以立宮故曰變徵調如獨慢三絃管律一音在絃度為半分即轉為徵調因五絃應夷則之律徵聲工字得羽絃之分以起調一絃六絃原得徵絃之分者轉為宮絃之分以立宮故曰徵調如以一絃三絃六絃慢下管律一音四絃慢下管律半音在絃度俱為半分即轉為羽調因一絃六絃應倍夷則之律羽聲凡字得羽絃之分以起調二絃七絃原得羽絃分者上為變宮之分轉宮絃之分以立宮故曰變宮調也一絃音諸調雖無二變而定絃取音必審二變之聲必計二變之分如陽律一均即徵絃七聲之分言之散聲為全分首音其二音與羽絃應者為羽分三音與變宮絃應者為變宮分至七音與變徵絃應者為變徵分八音仍與全絃應故為旋於首音其各分與各絃相應亦自與各律相應計其分則首音徵至二音羽三音羽至三音變宮皆得全分三音變宮至四音宮祗得半分四音宮至五音商五音商至六音角六音角至七音變徵皆得全分七音變徵至八音徵亦得半分以宮絃七聲之分言之散聲為全半首音其二音與商絃應者為商分與角絃應者為角分三至七音與變宮絃應者為變宮分八音仍與全絃應而四音變徵至五音徵七音變宮至八音宮皆祗半分蓋太簇商聲乙字所應之絃分至姑洗角聲上字所應之絃分與無射羽聲凡字所應之絃分至半黃鍾變宮合字所應之絃分其間必為半分故各絃七聲之分不移而所應聲律有間雜之別各分全半之間宮調旋焉以宮調七絃為準據每調徵絃七聲言之商調之徵乃宮調之羽轉而為徵分者也宮絃之羽全絃首音為羽其變宮變徵在二音六音是二音至三音六音至七音為半分也今全絃轉為徵則變宮變徵在三音七音是三音至四音七音至八音為半分矣故全絃定黃鍾之律宮聲四字者不移二音即應太簇之律商聲乙字其間得全分三音若取姑洗之律角聲上字則二音至三音為半分仍與宮調之羽同是以必取仲呂之呂清角高上其間絃度始得全分其四音仍應蕤賓之律變徵尺字蓋太簇乙字至姑洗上字為半分加仲呂高上之半分得一全分而仲呂高上至蕤賓尺字為半分此所以二音至三音得全分為羽至變宮而三音至四音為半分乃變宮至宮分也五音仍應夷則之律徵聲工字六音仍應無射之律羽聲凡字此四音至五音五音至六音亦得全分至七音若取半黃鍾之律變宮合字則六音至七音為半分亦與宮調之羽同必取半大呂之呂清變宮高六其間絃度始得全分其八音仍與首音同應黃鍾之律宮聲四字蓋無射凡字至半黃鍾合字為半分加半大呂高六之半分得一全分而半大呂高六至黃鍾四字為半分此所以六音至七音得全分為角至變徵而七音至八音為半分乃變徵至徵分也角調之徵乃宮調之變宮與清宮調之羽相雜而為徵分者也宮調之變宮全絃首音即變宮而變徵在五音是首音至二音五音至六音為半分也清商調之羽全絃首音為清羽其清變宮清變徵在二音六音是又二音至三音六音至七音為半分也今全絃轉為徵則三音至四音七音至八音為半分矣首音若仍定太簇之律商聲乙字則首音徵至二音羽所得全分必當取於仲呂之呂清角高上其本調羽絃則亦應仲呂之呂清角高上是清角調非正角調矣因取姑洗之律角聲上字為正角調故起調於羽絃者必取姑洗正角聲而徵絃羽分亦當應姑洗之律是以角調徵絃散聲首音反比正宮調變宮絃之散聲首音下半音取清宮調之羽絃散聲大呂之呂清宮高五其分始合蓋因本調羽聲得正角之律故也二音應姑洗之律角聲上字為羽分三音應蕤賓之律變徵尺字為變宮分四音應林鍾之呂清變徵高尺為宮分五音應南呂之呂清徵高工為商分六音應半黃鍾之律正變宮六字為角分七音應黃鍾之律正宮四字為變徵分八音仍應大呂之呂清宮高五是則三音蕤賓至四音林鍾為半分七音黃鍾至八音大呂為半分正為本調徵絃之變宮至宮變徵至徵之二半分也變徵調之徵乃宮調之宮轉而徵分者也宮調之宮變徵變宮在四音七音是四音至五音七音至八音為半分也今全絃轉為徵則三音至四音七音至八音為半分移宮調之宮四音至五音半分為三音至四音半分則四音取南呂之呂清徵高工三音夷則至