body:
  text: 清史稿卷一百四志七十九輿服三皇帝御寶皇后金寶太皇太后皇太后金寶玉寶附皇貴妃以下寶印皇子親王以下寶印文武官印信關防條記清初設御寶於交泰殿立尚寶司其後以內監典守當用則內閣請而用之乾隆十一年考定寶譜藏之交泰殿者二十有五藏之盛京者十交泰殿所藏曰大清受命之寶以章皇序白玉方四寸四分厚一寸盤龍紐高二寸曰皇帝奉天之寶以章奉若碧玉方四寸四分厚一寸一分盤龍紐高三寸五分曰大清嗣天子寶以章繼繩金方二寸四分厚八分交龍紐高一寸七分曰皇帝之寶以布詔赦青玉方三寸九分厚一寸交龍紐高二寸一分曰皇帝之寶以肅法駕栴檀香木方四寸八分厚一寸八分盤龍紐高三寸五分曰天子之寶以祀百神白玉方二寸四分厚八分交龍紐高一寸三分曰皇帝尊親之寶以薦徽號白玉方二寸一分厚七分盤龍紐高一寸三分曰皇帝親親之寶以展宗盟白玉方二寸二分厚一寸二分交龍紐高一寸二分曰皇帝行寶以頒賜賚碧玉方四寸八分厚一寸九分蹲龍紐高二寸五分曰皇帝信寶以徵戎伍白玉方三寸三分厚六分交龍紐高一寸六分曰天子行寶以冊外蠻碧玉方四寸八分厚一寸九分蹲龍紐高二寸三分曰天子信寶以命殊方青玉方三寸八分厚一寸三分交龍紐高一寸七分曰敬天勤民之寶以飭覲吏白玉方三寸一分厚一寸五分交龍紐高一寸七分曰制誥之寶以諭臣僚青玉方四寸厚二寸交龍紐高二寸七分曰敕命之寶以鈐誥敕碧玉方三寸五分厚一寸三分交龍紐高一寸八分曰垂訓之寶以揚國憲碧玉方四寸厚一寸五分交龍紐高二寸曰命德之寶以奬忠良青玉方四寸厚一寸四分交龍紐高二寸一分曰欽文之璽以重文教墨玉方三寸六分厚一寸五分交龍紐高一寸六分曰表章經史之寶以崇古訓碧玉方四寸七分厚二寸一分交龍紐高二寸二分曰巡狩天下之寶以從省方青玉方四寸七分厚二寸交龍紐高二寸五分曰討罪安民之寶以張征伐青玉方四寸八分厚二寸交龍紐高二寸五分曰制馭六師之寶以整戎行墨玉方五寸三分厚一寸四分交龍紐高二寸二分曰敕正萬邦之寶以誥外國青玉方三寸八分厚一寸五分盤龍紐高二寸三分曰敕正萬民之寶以誥四方青玉方四寸一分厚一寸五分交龍紐高二寸曰廣運之寶以謹封識墨玉方六寸厚二寸一分交龍紐高二寸盛京所藏曰大清受命之寶碧玉方四寸八分厚一寸九分蹲龍紐高二寸四分曰皇帝之寶青玉方四寸八分厚一寸九分交龍紐高二寸七分曰皇帝之寶碧玉方五寸厚一寸八分盤龍紐高三寸曰皇帝之寶栴檀香木方三寸八分厚六分素龍紐高五分曰奉天之寶金方三寸七分厚九分交龍紐高二寸曰天子之寶金方三寸七分厚九分交龍紐高二寸曰奉天法祖親賢愛民碧玉方四寸九分厚一寸五分交龍紐高二寸曰丹符出驗四方青玉方四寸七分厚二寸交龍紐高二寸二分曰敕命之寶青玉方三寸七分厚一寸八分交龍紐高二寸五分曰廣運之寶金方二寸四分厚八分交龍紐高一寸五分高宗御製國朝傳寶記曰國朝受天命采古制為璽掌以宮殿監正襲以重盝承以几設交泰殿中以次左右列當用則內閣請而用之其質有玉有金有栴檀木玉之品有白有青有碧紐有交龍有盤龍有蹲龍其文自太宗文皇帝以前專用國書既乃兼用古篆其大小自方六寸至二寸一分不一嘗考大清會典載御寶二十有九今交泰殿所貯三十有九會典又云宮內收貯者六內庫收貯者二十有三今則皆貯交泰殿數與地皆失實至謂皇帝奉天之寶即傳國璽兩郊大祀及聖節宮中告天青詞用之此語尤誕謬大祀遵古禮用祝版署名而不用寶聖節宮中未嘗有告天事或道籙祝釐時一行之亦不過偶存其教耳未嘗命文人為青詞亦未嘗用寶且此璽孰非世之傳守而專以一寶為傳國璽亦不經蓋緣修會典諸臣無宿學卓識復未嘗請旨取裁僅沿明時內監所書冊檔承譌襲謬遂至於此甚矣紀載之難也且會典所不載者復有受命於天既壽永昌一璽不知何時附藏殿內反置之正中按其詞雖類古所傳秦璽而篆文拙俗非李斯蟲鳥之舊明甚獨玉質瑩潔如截肪方得黍尺四寸四分厚得方之三以為良玉不易得則信矣若論寶無論非秦璽即真秦璽亦何足貴乾隆三年高斌督河時奏進屬員濬寶應河所得玉璽古澤可愛又與輟耕錄載蔡仲平本頗合朕謂此好事者仿刻所為貯之別殿視為玩好舊器而已夫秦璽煨燼古人論之詳矣即使尚存政斯之物何得與本朝傳寶同貯於義未當又雍正年故大學士高其位進未刻碧玉寶一文未刻未成為寶而與諸寶同貯亦未當朕嘗論之君人者在德不在寶寶雖重一器耳明等威徵信守與車旗章服何異德之不足則山河之險土宇之富拱手而授之他人未有徒恃此區區尺璧足以自固者誠能勤修令德繫屬人心則言傳號渙萬里奔走珍非和璧制不龍螭篆不斯籀孰敢不敬信承奉尊為神明故寶器非寶寶於有德古有得前代符寶君臣動色矜耀侈為瑞貺者我太宗文皇帝時獲蒙古所傳元帝國寶容而納之初不藉以為受命之符由今思之文皇帝之臣服函夏垂統萬世在德耶在寶耶不待智者而知之矣善夫唐梁肅之言曰鼎之輕重璽之去來視德之高下位之安危然則人君承祖宗付畀思以永膺斯寶引而勿替其非什襲固守之謂謂夫日新厥德居安慮危凝受皇天大寶命則德足重寶而寶以愈重璽玉自古無定數今交泰殿所貯歷年既久紀載失真且有重複者爰加考正排次定為二十有五以符天數並著成譜而序其大恉如此又盛京尊藏寶譜序曰乾隆十一年春閱交泰殿所貯諸寶既詳定位置為文記之其應別貯者分別收貯至其文或複見及國初行用者為數凡十雖不同現用之寶而未可與古玩並列因念盛京為國家發祥地祖宗神爽實所式憑朕既重繕列祖實錄尊藏鳳凰樓上覲揚光烈傳示無疆想當開天之始凝受帝命寶符煥發六服承式璠璵孚尹手澤存焉記不云乎陳其宗器弘璧琬琰陳之西序崇世守也爰奉此十寶齎送盛京鐍而藏之而著其緣起如此乾隆十三年九月改鐫御寶始用清篆文左為清篆右為漢篆高宗御題交泰殿寶譜序後曰寶譜成於乾隆十一年丙寅越三年戊辰始指授儒臣為清文各篆體書因思向之國寶官印漢文用篆書而清文則用本字者以國書篆體未備也今既定為篆法當施之寶印以昭畫一按譜內青玉皇帝之寶本清字篆文傳自太宗文皇帝時自是而上四寶均先代相承傳為世守者不敢輕易其檀香皇帝之寶以下二十有一則朝儀綸綍所常用宜從新制因敕所司一律改鐫與漢篆文相配並記之寶譜序後云乾隆四十五年八月高宗七旬聖壽用杜甫句刻古稀天子之寶並御製古稀說兼繫以詩四十六年正月用乾清宮西暖閣貯敬天勤民寶之例貯古稀天子之寶於東暖閣皇后金寶清漢文玉筯篆交龍紐平臺方四寸四分厚一寸二分康熙四年製太皇太后金寶玉寶盤龍紐餘皆與皇后寶同玉寶臺高一寸八分餘同金寶皇太后金寶玉寶俱盤龍紐餘與皇后寶同皇貴妃金寶清漢文玉筯篆蹲龍紐平臺方四寸厚一寸二分貴妃金寶與皇貴妃同妃金印清漢文玉筯篆龜紐平臺方三寸六分厚一寸康熙十五年定皇太子金寶玉筯篆蹲龍紐平臺方四寸厚一寸二分和碩親王金寶龜紐平臺方三寸六分厚一寸親王世子金寶龜紐平臺方三寸五分厚一寸多羅郡王鍍金銀印麒麟紐平臺方三寸四分厚一寸俱清漢文芝英篆外國王鍍金銀印清漢文尚方大篆駝紐平臺方三寸五分厚一寸順治十年以朝鮮國王原領印文有清字無漢字命禮部改鑄清漢文金印頒給該王仍將舊印繳進宗人府衍聖公銀印直紐三臺方三寸三分厚一寸俱清漢文尚方大篆公侯伯銀印虎紐方三寸三分厚九分公三臺侯伯二臺經略大臣大將軍將軍領侍衞內大臣銀印虎紐二臺方三寸三分厚九分俱清漢文柳葉篆軍機事務處銀印直紐二臺方三寸二分厚八分宣統三年四月改軍機處為內閣舊內閣遂裁各部都察院銀印直紐三臺方三寸三分厚九分俱清漢文尚方大篆理藩院銀印直紐三臺方三寸三分厚九分兼清漢蒙古三體字清漢文尚方大篆蒙古字不用篆理藩院後改理藩部盛京五部銀印直紐二臺方三寸二分厚八分盛京五部後裁戶部總理三庫事務銀印直紐二臺方三寸二分厚八分戶部後改名度支部翰林院銀印二臺方三寸二分厚八分內務府銀印二臺方三寸二分厚八分景陵泰陵內務府總管東陵泰陵承辦事務銅關防凡關防皆直紐長三寸闊一寸九分鑾儀衞銀印直紐二臺方三寸二分厚八分宣統朝因避寫故名鑾輿衞俱清漢文尚方大篆通政使司大理寺太常寺順天府奉天府銀印直紐方二寸九分厚六分五釐通政司後裁大理寺後改大理院太常寺後歸併禮部俱清漢文尚方小篆詹事府銅印直紐方二寸七分厚九分光祿寺太僕寺武備院上駟院奉宸苑銅印直紐方二寸六分厚六分五釐詹事府後裁光祿寺後歸併禮部太僕寺後歸併陸軍部內繙書房銅關防長三寸闊一寸九分俱清漢文尚方小篆國子監銅印直紐方二寸五分厚六分太醫院銅印直紐方二寸四分厚五分各道監察御史稽察內務府御史稽察宗人府御史巡鹽御史銅印直紐有孔方一寸五分厚三分宗人府左右司太僕寺左右司鑾儀衞左右司各部理藩院各司銅印直紐方二寸四分厚五分內務府各司銅印直紐方二寸二分厚四分五釐崇文門稅務管理坐糧廳戶部分司工部木柴監督工部木廠監督工部管理街道各倉監督工部後改併為農工商部左右翼管稅戶部銀庫緞匹庫戶部辦理八旗俸餉戶部辦理八旗現審順天奉天府丞各關稅監督銅關防長三寸闊一寸九分巡視五城御史管理古北口驛務管理獨石口驛務銅關防長二寸八分闊一寸九分欽天監時憲書銅印直紐方二寸一分厚四分四釐暢春園圓明園清漪園官房稅庫銅條記凡條記皆直紐長二寸六分闊一寸九分俱清漢文鐘鼎篆大理寺左右司光祿寺四署五城兵馬司銅印直紐方二寸二分厚四分五釐中書科銅印直紐方二寸一分厚四分五釐內閣典籍廳銅關防長三寸闊一寸九分翰林院典簿禮部鑄印局宣統三年印鑄局改屬新內閣禮部亦改典禮院理藩院銀庫工部製造庫工部料估所各部院督催所銅關防長三寸闊一寸九分順天府府治中稽察盛京五部將軍衙門稽察黑龍江等處稽察寧古塔等處銅關防長二寸九分闊一寸九分兵馬司副指揮銅關防長二寸六分闊一寸六分宗人府經歷司銅印直紐方二寸四分厚五分都察院經歷司銅印直紐方二寸二分厚四分五釐鑾儀衞經歷司各部院寺司務廳銅印直紐方二寸一分厚四分四釐各壇廟祠祭署銅印直紐方二寸厚四分二釐太醫院藥庫銅印直紐方一寸九分厚四分二釐國子監典籍廳銅印直紐方一寸九分厚四分二釐禮部鑄印局大使銅條記長二寸六分闊一寸九分兵馬司吏目銅條記長二寸四分闊一寸四分俱清漢文垂露篆護軍統領前鋒統領火器營統領銀印虎紐方三寸三分厚九分提督九門步軍統領圓明園總管八旗內府三旗官兵銀印虎紐二臺方三寸三分厚九分總管雲梯健銳營八旗傳事銀關防直紐長三寸二分闊二寸俱清漢文柳葉篆護軍統領參領協領雲梯健銳營翼長各處總管銅關防長三寸闊一寸九分俱清漢文殳篆八旗佐領宗室覺羅族長銅圖記凡圖記皆直紐方一寸七分厚四分