不服信大兵可百年不用不可一日不備披斯譜也必將曰是印也是我朝某年殄某寇定某地所用也又將曰是印也鑄自某年某官既奉以集事傳至某年某官復奉以策勳者也想見一時受成廟算元老壯猷豐紐重臺焜燿耳目繼自今覲揚光烈思所以宏此遠謨弼我億萬世丕丕基將於是乎在以視銘績鼎鐘圖形臺閣者不尤深切著明也歟然則觀於寶譜而一人守器之重可知觀於印譜而羣才翊運之殷又可知詩曰王之藎臣無念爾祖記曰君子聽鼓鼙則思將帥之臣一再披閱其何能置大風猛士之懷哉裝潢蕆事並令守者什襲尊藏為部凡四一皇史宬一大內一內閣一盛京也
