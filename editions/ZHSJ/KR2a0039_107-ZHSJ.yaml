body:
  text: 清史稿卷一百七志八十二選舉二學校二學校新制之沿革略分二期同治初迄光緒辛丑以前為無系統教育時期辛丑以後迄宣統末為有系統教育時期自五口通商英法聯軍入京後朝廷鑒於外交挫衂非興學不足以圖強先是交涉重任率假手無識牟利之通事往往以小嫌釀大釁至是始悟通事之不可恃又震於列強之船堅礮利急須養成繙譯與製造船械及海陸軍之人才故其時首先設置之學校曰京師同文館曰上海廣方言館曰福建船政學堂及南北洋水師武備等學堂京師同文館之設從總理各國事務衙門之請始於同治元年初止教授各國語言文字六年議於同文館內添設算學館時京僚於時務謗讟繁興原疏排斥衆議言之剴切謂西人製器之法無不由度數而生中國欲講求製造輪船機器諸法苟不藉西士為先導師心自用無裨實際疆臣如左宗棠李鴻章等皆深明其理堅持其說詳於奏牘且西人之術聖祖深韙之矣當時列在臺官垂為時憲本朝掌故不宜數典而忘若以師法西人為恥其說尤謬中國狃於因循不思振作恥孰甚焉今不以不如人為恥獨以學其人為恥將安於不如而終不學遂可雪恥乎學期適用事貴因時物議雖多權衡宜定原議招取滿漢舉人恩拔副歲優貢生並由此出身之正途人員又擬推廣凡翰林院庶吉士編修檢討與五品以下進士出身之京外各官年在三十歲以內者均可送考三年考列高等者按升階優保班次以示鼓勵詔從其議上海廣方言館創設於同治二年江蘇巡撫李鴻章言京師同文館之設實為良法惟洋人總匯地以上海廣東兩口為最擬仿照同文館例於上海添設外國語言文字學館選近郡年十四歲以下資禀穎悟根器端靜之文童聘西人教習並聘內地品學兼優之舉貢生員課以經史文藝學成送本省督撫考驗作為該縣附學生其候補佐雜等官年少聰慧者許入館一體學習學成酌給升途三五年後有此一種讀書明理之人精通番語凡通商督撫衙署及海關監督應設繙譯官承辦洋務者即於館中遴選派充庶關稅軍需可期核實無賴通事亦稍斂迹且能盡閱西人未譯專書探賾索隱一切輪船火器等巧技由漸通曉於自強之道不無裨助上諭廣州將軍查照辦理福建船廠同治五年左宗棠督閩時奏設並設隨廠學堂分前後二堂前堂習法文練習造船之術後堂習英文練習駕駛之術課程除造船駕駛應習常課外兼習策論令讀聖諭廣訓孝經以明義理首總船政者為沈葆楨規畫閎遠尤重視學堂十二年奏陳船工善後事宜請選派前後堂生分赴英法學習製造駕駛之方及推陳出新練兵制勝之理學生有天資傑出能習礦學化學及交涉公法等事均可隨宜肄業尋葆楨任南洋大臣光緒二年奏派華洋監督訂定章程船政學堂成就之人材實為中國海軍人材之嚆矢學堂設於馬尾故清季海軍將領亦以閩人為最多天津水師學堂光緒八年北洋大臣李鴻章奏設次年招取學生入堂肄業分駕駛管輪兩科教授用英文兼習操法及讀經國文等科優者遣派出洋留學以資深造厥後海軍諸將帥由此畢業者甚夥鴻章又於光緒十一年奏設天津武備學堂規制略仿西國陸軍學堂挑選營中精健聰穎略通文義之弁目入堂肄業文員願習武事者一併錄取其課程一面研究西洋行軍新法如後膛各種鎗礮土木營壘及布陣分合攻守各術一面赴營實習演試鎗礮陣勢及造築臺壘惟學生係挑選弁目雖聘用德國教員不能直接聽講仍用繙譯展轉教授與水師學堂注重外國文者不同初制學習一年後考試及格學生發回各營由統領量材授事其後逐漸延長年限選募良家年幼子弟肄業迨庚子之變學堂適當戰區全校淪為灰燼矣此外廣東水陸師學堂則粵督張之洞於光緒十三年奏設之洞調任鄂督二十一年又奏設湖北武備學堂其辦法課程水師分管輪駕駛兩項陸師分馬步鎗礮營造等項大略參照北洋成法洎海軍成立新軍改建此類學堂南洋及各省增設日盛不具述至湖北自強學堂亦之洞創設初分方言格致算學商務四門惟方言一齋住堂肄業餘三齋按月考課其後算學改歸兩湖書院教授格致商務停課本堂專課方言以為西學梯階方言分英法德俄四門亦類似同文館之學堂也光緒丙申丁酉間各省學堂未能普設中外臣工多以變通整頓書院為請詔飭裁改禮部議准章程併課天算格致等學陝西等省創設格致實學書院以補學堂之不逮焉大抵此期設學之宗旨專注重實用蓋其動機緣於對外故外國語及海陸軍得此期教育之主要無學制系統之足言惟南洋公學雖亦承襲此期教育之宗旨而學制分為三等已寓普通學校及豫備教育之意旨先是光緒二十一年津海關道盛宣懷於天津創設頭二等學堂頭等學堂課程四年等一年習竣欲專習一門者得察學生資質酌定專門凡五一工程學二電學三鑛務學四機器學五律例學二等學堂課程四年按班次遞升習滿升入頭等意謂二等擬外國小學頭等擬外國大學因初設採通融求速辦法教員既苦乏才學生亦難精擇無甚成效二十三年宣懷又於上海創設南洋公學如津學制而損益之經費取給招商電報兩局捐助奏明辦理因名公學分四院曰師範院曰外院曰中院曰上院外院即附屬小學為師範生練習之所中上院即二等頭等學堂寓中學堂高等學堂之意課程大體分中文英文兩部而注重法政經濟上院畢業生擇尤異者咨送出洋就學於各國大學意謂內國大學猝難設置以公學為豫備學校而以外國大學為最高學府論者謂中國教育有系統之組織此其見端焉後改歸郵傳部管轄定名高等實業學堂其課程性質非復設立之初旨此第一期無系統教育之大略也自甲午一役喪師辱國列強羣起攘奪權利國勢益岌岌朝野志士恍然於嚮者變法之不得其本侍郎李端棻主事康有為等均條議推廣學堂光緒二十四年德宗諭曰邇者詔書數下開特科改武科制度立大小學堂惟風氣尚未大開論說莫衷一是國是不定則號令不行特明白宣示中外自王公至士庶各宜努力發憤以聖賢義理之學植其根本博採西學切於時務者實力講求以救空疏迂謬之弊京師大學為各省倡應首先舉辦凡翰林編檢部院司員各門侍衞候補候選道府州縣以下各官大員子弟八旗世職各省武職後裔均准入學肄業以期人材輩出共濟時艱下軍機大臣總理各國事務王大臣妥議奏聞尋議覆籌辦京師大學堂擬定章程要端凡四一寬籌經費二宏建學舍三慎選管學大臣四簡派總教習詔如所擬命孫家鼐管理大學堂事務經費由戶部籌撥五月又諭各直省督撫將各省府廳州縣大小書院一律改為兼習中西學之學校其階級以省會之大書院為高等學郡城之書院為中學州縣之書院為小學頒給京師大學章程令仿照辦理各書院經費儘數提作學堂經費紳民如能捐建學堂或廣為勸募准奏請給奬有獨立措捐鉅款者予以破格之賞民間祠廟不在祀典者一律改為學堂以節糜費而隆教育是時管學大臣之權限不專管理京師大學堂並節制各省所設之學堂實以大學校長兼全國教育部長之職權又以同文館及北洋學堂多以西人為總教習於中學不免偏枯且外國文不止一國學科各有專門非一西人所能勝任必擇學貫中西能見其大之中國學者為總教習破格錄用有選派分教習之權蓋以管學大臣必大學士或尚書充任而總教習則不拘資格可延攬新進之人才也學生分兩班已治普通學卒業者為頭班現治普通學者為二班猶是南洋公學之舊法課程分普通專門兩類普通學學生必須通習專門學人各占一門或二門普通學科目為經學理學掌故學諸子學初級算學初級格致學初級政治學初級地理學文學體操學語言文字學專門學科目為高等算學高等格致學高等政治學法律屬之高等地理學測繪屬之農學礦學工程學商學兵學衞生學醫學屬之考驗學生用積分法學生月給膏火銀兩有差上海設編譯局各學科除外國文外均讀編譯課本籌辦大學章程之概要如此未幾八月政變由舊黨把持朝局卒釀成庚子之禍逮二十七年學校漸有復興之議其首倡者則山東巡撫袁世凱也初世凱奏陳東省開辦大學堂章程有旨飭下各省仿辦令政務處會同禮部妥議選舉鼓勵章程尋議言東西各國學堂皆係小學中學大學以次遞升畢業後始予出身擬請按照辦理小學畢業生考試合格選入中學堂畢業考試合格再選入大學堂畢業考試合格發給憑照督撫學政按其功課嚴密扃試優者分別等第咨送京師大學堂覆試作為舉人貢生其貢生留下屆應考願應鄉試者聽舉人積有成數由京師大學堂嚴加考試優者分別等第咨送禮部簡派大臣考試候旨欽定作為進士一體殿試酌加擢用優予官階查世凱辦法以通省學堂一時未能徧舉先於省城建立學堂分齋督課其備齋正齋即隱寓小學中學之規制既經諭令各省仿辦應酌照將來選舉章程用資鼓勵報可所議混合科舉學制為一事謂之學堂選舉鼓勵章程各省多未及實行而罷辛丑兩宮回鑾以創痛鉅深力求改革十二月諭曰興學育才實為當今急務京師首善之區尤宜加意作育以樹風聲前建大學應切實舉辦派張百熙為管學大臣責成經理務期端正趨嚮造就通才其裁定章程妥議具奏旋諭將同文館併入大學堂毋庸隸外務部二十八年正月百熙奏籌辦大學堂情形豫定辦法一條言各國學制幼童於蒙學卒業後入小學三年卒業升中學又三年升高等學又三年升大學以中國準之小學即縣學堂中學即府學堂高等學即省學堂目前無應入大學肄業之學生通融辦法惟有暫時不設專門先設立一高等學為大學豫備科分政藝二科以經史政治法律通商理財等事隸政科以聲光電化農工醫算等事隸藝科查京外學堂辦有成效者以湖北自強學堂上海南洋公學為最此外如京師同文館上海廣方言館廣東時敏浙江求是等學堂開辦皆在數年以上不乏合格之才更由各省督撫學政考取府州縣高材生咨送來京覆試如格入堂肄業三年卒業及格者升大學正科不及格者分別留學撤退大學豫科與各省省學堂卒業生程度相同由管學大臣考驗合格請旨賞給舉人正科卒業考驗合格請旨賞給進士惟國家需材孔亟欲收急效而少棄才則有速成教員一法於預備科外設速成科分二門曰仕學館曰師範館凡京員五品以下八品以上外官道員以下教職以上皆許考入仕學館舉貢生監皆許考入師範館仕學三年卒業擇尤保奬師範三年卒業擇優異者帶領引見生准作貢生貢生准作舉人舉人准作進士分別給予准作小學中學教員文憑蓋豫科生必取年歲最富學術稍精者再加練習儲為真正合格之才速成生則取更事較多立志猛進者取其聽從速化之效至增建校舍附設譯局廣購書籍儀器尤以寬籌經費為根原經費分兩項一華俄道勝銀行存款之息金全數撥歸大學堂一請飭各省籌助經費每年大省二萬金中省一萬金小省五千金常年撥解京師從之七月百熙遵擬學堂章程疏言古今中外學術不同其所以致用則一歐美日本諸邦現行制度頗與中國古昔盛時良法相同禮記載家有塾黨有庠州有序國有學比之各國則國學即大學家塾黨庠州序即蒙學小學中學等級蓋甚分明周以前選舉學校合而為一漢以後專重選舉及隋設進士科以來士皆殫精神於詩賦策論所謂學校名存而巳今日而議振興教育必以真能復學校之舊為第一要