講現擬章程於中學尤為注重凡中國向有之經學史學文學理學無不包舉靡遺科舉所講習者學堂無不優為學堂所兼通者科舉皆所未備是取材於科舉不如取材於學堂彰彰明矣或又慮學堂雖重積分法分數定自教員保無以愛憎而意為增損不知功課優絀當堂考驗教員即欲違衆徇私而公論可憑萬難掩飾臣等尚恐偶有此弊故於中學考試歸學政主持督同道府辦理高等學畢業請簡放主考會同督撫學政考試大學畢業請簡放總裁會同學務大臣考試不專憑本學堂所定分數凡科舉掄才之法已括諸學堂奬勵之中實將科舉學堂合併為一就事理論必須科舉立時停罷學堂辦法方有起色經費方可設籌惟此時各省學堂未能徧設已設學堂辦理未盡合法不欲遽議停罷科舉然使一無舉動天下未見朝廷有遞減以至停罷之明文實不足風示海內士民收振興學堂之効請查照臣之洞會同袁世凱原奏分科遞減之法明降諭旨從下屆丙午科起每科遞減中額三分之一一面照現定各學堂章程從師範入手責成各省實力舉行至第三屆壬子科應減盡時尚有十年計京外開辦學堂已逾十年以外人才應已輩出天下士心專注學堂籌措經費必立見踴躍人人爭自濯磨相率入學堂求實在有用之學氣象一新人才自奮轉弱為強實基於此詔悉如所請是為頒布奏定章程之期時科舉未全廢止也迨三十一年世凱之洞會奏科舉一日不停士人有儌幸得第之心以分其砥礪實修之志民間相率觀望私立學堂絕少如再遲十年甫停科舉學堂有遷延之勢人才非急切可求必須二十餘年後始得多士之用擬請宸衷獨斷立罷科舉飭下各省督撫學政學堂未辦者從速提倡已辦者極力擴充學生之良莠辦學人員之功過認真考察不得稍辭其責遂詔自丙午科始停止各省鄉會試及歲科試尋諭各省學政專司考校學堂事務於是沿襲千餘年之科舉制度根本剗除嗣後學校日漸推廣學術思想因之變遷此其大關鍵也是時學務之組織尚有一重要之變更則專設總理學務大臣也二十九年之洞言管學大臣既管京城大學堂又管外省各學堂事務當此經營創始條緒萬端專任猶虞不給兼綜更恐難周請於京師專設總理學務大臣統轄全國學務另設總監督一員專管京師大學堂事務受總理學務大臣節制考核俾有專責詔允改管學大臣為學務大臣並加派孫家鼐為學務大臣命大理寺少卿張亨嘉充大學堂總監督奏定章程規定學校系統足補欽定章程所未備其分科及課目較舊章亦多有變更大學設通儒院及大學本科通儒院不講授無規定課目大學本科分科八曰經學科分十一門周易尚書毛詩春秋左傳春秋三傳周禮儀禮禮記論語孟子附理學曰政法科分二門政治法律曰文學科分九門中國史萬國史中外地理中國文學英國文學法國文學俄國文學德國文學日本國文學曰醫科分二門醫學藥學曰格致科分六門算學星學物理化學動植物地質曰農科分四門農學農藝化學林學獸醫曰工科分九門土木機器造船造兵器電氣建築應用化學火藥採鑛冶金曰商科分三門銀行及保險貿易及販運關稅各專一門經學願兼習一兩經者聽各學科分主課補助課三年畢業惟政治醫學四年畢業高等學與大學豫備科性質相同學科分三類第一類為豫備入經學政法文學商科等大學者治之第二類為豫備入格致農工等科大學者治之第三類為豫備入醫科大學者治之學科除人倫道德經學大義中國文學外國語體操各類共同外第一類課歷史地理辨學法學理財第二類課算學物理化學地質鑛物圖畫第三類課蠟丁語算學物理化學動物植物其有志入某科某門者得缺科目或加課他科目分通習主課三年畢業中學科目修身讀經講經中國文學外國語歷史地理算學博物物理及化學法制及理財圖畫體操五年畢業高等小學科目修身讀經講經中國文學算術中國歷史地理格致圖畫體操視地方情形可加授手工農商業等科目四年畢業初等小學科目修身讀經講經中國文學算術歷史地理格致體操為完全科視地方情形可加授圖畫手工之一二科目其鄉民貧瘠師儒缺少地方得量從簡略修身讀經合為一科中國文學科歷史地理格致合為一科算術體操為簡易科五年畢業中小學科目不外普通教育之學科其特殊者則讀經講經一科也學務綱要載中小學宜注意讀經以存聖教一節其言曰外國學堂有宗教一門中國之經書即是中國之宗教學堂不讀經則是堯舜禹湯文武周公孔子之道所謂三綱五常盡行廢絕中國必不能立國無論學生將來所執何業即由小學改業者必須曾誦經書之要言略聞聖教之要義以定其心性正其本源惟學堂科學較繁晷刻有限概令全讀十三經精力日力斷斷不給茲擇切要各經分配中小學堂若卷帙繁重之禮記周禮止選讀通儒節本儀禮止選讀最要一篇自初等小學第一年日讀約四十字起至中學日讀約二百字為止大率小學每日以一點鐘讀經一點鐘挑背淺解中學每星期以六點鐘讀經三點鐘挑背講解溫經每日半點鐘歸自習時督課學生並不過勞亦無礙講習西學之日力計中學畢業已讀過孝經四書易書詩左傳及禮記周禮儀禮節本十經並通大義較之向來書塾書院所讀所解已為加多不惟聖經不至廢墜且經學從此更可昌明其立論甚正可考見當時之風氣焉蒙養院意在合蒙養家教為一輔助家庭教育兼包括女學直系學堂外並詳訂師範及實業學堂專章其大異於舊章者為優級師範學堂學科分三節一曰公共科以補中學之不足為本科之豫備科目人倫道德羣經源流中國文學東語英語辨學算學體操一年畢業二曰分類科凡四類第一類以中國文