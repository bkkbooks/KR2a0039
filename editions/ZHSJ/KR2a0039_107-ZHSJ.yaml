院編修檢討優等中等均作為進士出身分別用翰林院庶吉士各部主事大學選科比照分科大學降等給奬大學豫備科及各省高等學畢業最優等作為舉人以內閣中書知州用優等中等均作為舉人以中書科中書部司務知縣通判用中學畢業分別奬以拔貢優貢歲貢高等小學畢業分別奬以廩增附生初等小學屬義務教育不給奬優級師範畢業最優等優等中等均作為舉人分別以國子監博士助教學正用初級師範畢業分別奬以拔貢優貢歲貢以教授教諭訓導用高等實業學堂畢業最優等優等中等均作為舉人分別以知州知縣州同用中等實業學堂畢業奬勵視中學奏定章程規定之概要如此三十一年詔以各省學堂次第興辦必須有總匯之區以資董率而專責成特設學部命榮慶為尚書熙瑛嚴修為侍郎裁國子監歸併學部明年學部奏請宣示教育宗旨略言今中國振興學務宜注重普通教育令全國之民無人不學尤以明定宗旨宣示天下為握要之圖中國政教所固有亟宜發明以距異說者有二曰忠君曰尊孔中國民質所最缺亟宜箴砭以圖振起者有三曰尚公曰尚武曰尚實上諭照所陳各節通飭遵行尋奏定學部官制於本部各司科分掌教育行政事務外設編譯圖書局調查學制局京師督學局又擬設高等教育會議所屬學部長官監督其議員選派部員及直轄學堂各省中等以上學堂監督暨京外官紳學識宏通於教育素有經驗者充任又擬設教育研究所延聘精通教育之員定期講演以訓練本部員司焉先是直督袁世凱奏陳學務未盡事宜以裁撤學政為言雲南學政吳魯奏請裁撤學政至是學部會同政務處復議言各省教育行政及擴張興學之經費督飭辦學之考成與地方行政在在皆有關係學政位分較尊事權不屬於督撫為敵體諸事不便於禀承於地方為客官一切不靈於呼應且地方寥闊官立公立私立學堂日新月盛勢不能如歲科試分棚調考之例而循例按臨更日不暇給勞費供張無裨實事擬請裁撤學政各省改設提學使司提學使一員統轄全省學務歸督撫節制於省會置學務公所分曹隸事選派官紳有學行者別設學務議紳四人延訪本省學望較崇之紳士充選議長一人學部慎選奏派從之嗣是各省學務始有確定之執行機關矣勸學所之設創始於直隸學務處時嚴修任學務處督辦提倡小學教育設勸學所為廳州縣行政機關仿警察分區辦法採日本地方教育行政及學校管理法訂定章程頗著成效三十二年學部奏定勸學所章程通行全國即修呈訂原章也勸學所由地方官監督設總董一員以縣視學兼充綜核各學區事務區設勸學員一人任一學區內勸學之責以勸募學生多寡定勸學員成績之優劣其章程內推廣學務一條規定辦法凡五曰勸學曰興學曰籌款曰開風氣曰去阻力又奏定各省教育會章程省會設立者為總會府州縣設立者為分會以補助教育行政與學務公所勸學所相輔而行皆普及教育切要之圖也學部設立後於各項學堂章程多所更正其要者如改訂考試辦法詳定師範奬勵義務變通中小學課程中學分文科實科之類然大致不外修正科目確定限制其宏綱細目不能出奏定章程之範圍所增定者則女學堂章程也先是學部官制已將女學列入職掌三十三年奏定女子師範女子小學章程以裨補家計有益家庭教育為要旨師範科目修身教育國文歷史地理算學格致圖畫家事裁縫手藝音樂體操四年畢業音樂得隨意學習小學分兩等高等科目修身國文算術中國歷史地理格致圖畫女紅體操得酌加音樂為隨意科初等科目修身國文算術女紅體操得酌加音樂圖畫二隨意科均四年畢業其授業鐘點較男子小學減少與男子小學分別設立不得混合宣統三年奏設中央教育會議以討論教育應行改進事宜及推行方法則根據學部原奏擬設高等教育會議所之規定行之此為第二期有系統之教育制度也至考驗遊學畢業生光緒二十九年鄂督張之洞奏准鼓勵遊學章程三十一年學務大臣考驗北洋學生金邦平等援照鄉會試覆試例奏請在保和殿考試給予出身分別錄用迨三十二年學部奏定自本年始每年八月舉行一次並為綜覈名實起見妥議考驗章程將學成試驗與入官試驗分為兩事酌照分科大學及高等學畢業章程會同欽派大臣按所習學科分門考試酌擬等第候欽定分別奬給進士舉人等出身仍將某科字樣加於進士等名目之上以為表識考試分兩場第一場就所習學科擇要命題第二場試中國文外國文罷廷試明年學部憲政編查館會奏遊學畢業廷試錄用章程仍暫照三十一年成案於欽派大臣會同學部考試請予出身後廷試一次分別授職廷試用經義科學論說各一其醫工格致農等科大學及各項高等實業學堂畢業者免試經義時遊學日本歐美畢業回國者絡繹不絕歲舉行考驗以為常終清世不廢
