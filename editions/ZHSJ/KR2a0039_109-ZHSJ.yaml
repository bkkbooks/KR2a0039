body:
  text: 清史稿卷一百九志八十四選舉四制科薦擢制科者天子親詔以待異等之才唐宋設科最多視為優選清代科目取士垂為定制其特詔舉行者曰博學鴻詞科經濟特科孝廉方正科若經學若巡幸召試雖未設科可附見也聖祖敦崇實學康熙甲辰丁未兩科改試策論既廷臣以古學不可猝辦請仍舊制十七年詔曰自古一代之興必有博學鴻儒備顧問著作之選我朝定鼎以來崇儒重道培養人才四海之廣豈無奇才碩彥學問淵通文藻瑰麗追蹤前哲者凡有學行兼優文詞卓越之人不論已仕未仕在京三品以上及科道官在外督撫布按各舉所知朕親試錄用其內外各官果有真知灼見在內開送吏部在外開報督撫代為題薦嗣膺薦人員至京詔戶部月給廩餼明年三月召試體仁閣凡百四十三人賜燕試賦一詩一帝親覽試卷取一等彭孫遹倪燦張烈汪霦喬萊王頊齡李因篤秦松齡周清原陳維崧徐嘉炎陸葇馮勗錢中諧汪楫袁佑朱彝尊湯斌汪琬邱象隨等二十人二等李來泰潘耒沈珩施閏章米漢雯黃與堅李鎧徐釚沈筠周慶曾尤侗范必英崔如岳張鴻烈方象瑛李澄中吳元龍龐塏毛奇齡錢金甫吳任臣陳鴻績曹宜溥毛升芳曹禾黎騫高詠龍燮邵吳遠嚴繩孫等三十人三四等俱報罷命閣臣取前代制科舊事查議授職尋議兩漢授無常職晉上第授尚書郎唐制策高等特授尊官次等予出身因有及第出身之目宋分五等一二等皆不次擢用三等為上等恩數視廷試第一人四等為中等視廷試第三人皆賜制科出身五等為下等賜進士出身得旨俱授為翰林官以光祿少卿邵吳遠為侍讀道員郎中湯斌等四人為侍講進士出身之主事中行評博內閣典籍知縣及未仕之進士彭孫遹等十八人為編修舉貢出身之推知教職革職之檢討知縣及未仕之舉貢廕監布衣倪燦等二十七人為檢討俱入史館纂修明史時富平李因篤長洲馮勗秀水朱彝尊吳江潘耒無錫嚴繩孫皆以布衣入選海內榮之其年老未與試之杜越傅山王方穀等文學素著俱授內閣中書許回籍雍正十一年詔曰博學鴻詞之科所以待卓越淹通之士康熙十七年特詔薦舉召試授職得人極盛數十年來未嘗廣為搜羅朕延攬維殷宜有枕經葄史殫見洽聞足稱鴻博之選者當特修曠典嘉予旁求在京滿漢三品以上在外督撫學政悉心體訪保題送部朕臨軒親試優加錄用詔書初下中外大吏以事關曠典相顧遲回逾年僅河東督臣舉一人直隸督臣舉二人他省未有應者詔責諸臣觀望高宗即位再詔督促期以一年內齊集闕下先至者月給廩餼乾隆元年御史吳元安言薦舉博學鴻詞原期得湛深經術敦崇實學之儒詩賦雖取兼長經史尤為根柢若徒駢綴儷偶推敲聲律縱有文藻可觀終覺名實未稱下吏部議定為兩場賦詩外增試論策九月召試百七十六人於保和殿賜燕如例試題首場賦詩論各一二場制策二取一等五人劉綸潘安禮諸錦于振杭世駿等授編修二等十人陳兆崙劉藻夏之蓉周長發程恂等授檢討楊度汪沈廷芳汪士鍠陳士璠齊召南等授庶吉士二年補試體仁閣首場制策二二場賦詩論各一取一等萬松齡授檢討二等張漢授檢討朱荃洪世澤授庶吉士自康乾兩朝再舉詞科與其選者山林隱逸之數多於縉紳右文之盛前古罕聞時承平累葉海內士夫多致力根柢之學天子又振拔淹滯以示風勵爰有保薦經學之制乾隆十四年詔曰崇尚經術有關世道人心今海宇昇平學士大夫精研本業窮年矻矻宗仰儒先者當不乏人大學士九卿督撫其公舉所知不限進士舉人諸生及退休閒廢人員能潛心經學者慎選毋濫尋中外疏薦者四十餘人帝為防倖進下廷臣覆覈得陳祖范吳鼎梁錫璵顧棟高四人命呈覽著述派翰林中書官在武英殿各繕一部尋授鼎錫璵國子監司業召對勤政殿祖范棟高以年老不能供職俱授司業銜後不復舉行至屬車臨幸宏奬士林康熙四十二年四十四年聖祖巡幸江浙召試士子中選者賜白金赴京錄用有差高宗六幸江浙三幸山東四幸天津凡士子進獻詩賦者召試行在優等予出身授內閣中書次者賜束帛仁宗東巡津淀西幸五臺召試之典亦如前例道光以後科舉偏重時文沿習既久庸濫浮偽寖失精意三十年候補京堂張錫庚請復開博學鴻詞科以儲人才禮部議以非當務之急遂止洎光緒中葉外侮孔𣗥海內皇皇昌言變法二十四年貴州學政嚴修請設經濟特科下總理各國事務衙門會禮部覈議八月慈禧皇太后臨朝訓政以經濟特科易滋流弊罷之庚子京師搆亂乘輿播遷兩宮怵於時局阽危亟思破格求才以資治理二十七年皇太后詔舉經濟特科命各部院堂官及各省督撫學政保薦有志慮忠純規模閎遠學問淹通洞達中外時務者悉心延攬並下政務大臣擬定考試事宜御史陳秉崧奏請力除夤緣積習詔飭諸臣務矢至公既三品以下京卿紛紛保送帝覺其冗濫適太僕少卿隆恩薦疏上竟報寢並命撤銷太常少卿李擢英前保諸人二十九年政務處議定考試之制如廷試例於保和殿天子親策之凡試二日首場入選者始許應覆試均試論一策一簡大臣考校取一等袁家穀張一麐方履中陶炯照徐沅胡玉縉秦錫鎮俞陛雲袁勵準等九人二等馮善徵羅良鑑秦樹聲魏家驊吳鍾善錢鑅蕭應椿梁煥奎蔡寶善張孝謙端緒麥鴻鈞許岳鍾張通謨楊道霖張祖廉吳烈陳曾壽等十八人迨授官命下京職外任僅就原階略予陞舉貢用知縣州佐以視康乾時詞科恩遇寖不如矣三十四年御史俾壽請特開制科政務處大臣議以孝廉方正直言極諫兩科皆無實際惟博學鴻詞科康熙乾隆間兩次舉行得人稱盛際茲文學漸微保存國粹實為今日急務應下學部籌議時方詔各省徵召耆儒碩彥湖南舉人王闓運被薦授翰林檢討兩江安徽相繼薦舉王耕心孫葆田程朝儀吳傳綺姚永樸姚永概馮澂等部議以諸人覃研經史合於詞科之選俟章程議定陳請舉行未幾德宗崩遂寢孝廉方正科始於康熙六十一年世宗登極詔直省府州縣衞各舉孝廉方正賜六品章服備召用雍正元年詔曰國家敦勵風俗首重賢良前詔舉孝廉方正距今數月未有疏聞恐有司怠於採訪雖有端方之品無由上達各督撫速遵前詔確訪舉奏尋浙江直隸福建廣西各薦舉二員用知縣年五十五以上者用知州其後歷朝御極皆恩詔薦舉以為常乾隆元年刑部侍郎勵宗萬言孝廉方正之舉稍有冒濫即有屈抑從前選舉各官鮮克公當非鄉井有力之富豪即宮牆有名之學霸迨服官後庸者或以劣黜黠者或以贓敗請慎選舉以重名器吏部議准府州縣衞保舉孝廉方正應由地方紳士里黨合辭公舉州縣官採訪公評詳稽事實所舉或係生員會學官考覈申送大吏覈實具題給六品章服榮身果有德行才識兼優者督撫逾格保薦赴部九卿翰詹科道公同驗看候旨擢用濫舉者罪之五年定考試例除樸實拘謹無他技能不能應試者例予頂戴不送部外其膺薦赴部者驗看後試以時務策牋奏各一於太和殿門內道光間改於保和殿如考試御史例同治初元明詔選舉又以知縣黎庶昌條陳諭令在京四品以上在外督撫學政各舉所知不限紳士布衣以躬行實踐為先毋得專取文詞藻麗者濫膺盛典其有年登耄耋或誠樸無華足為里閭矜式不願來京者州縣官歲時存問賜以酒米光緒六年定自恩詔日起予限八年人文到部每年二月八月各會驗奏考一次逾限者止許章服榮身不得與考初制授官用知州知縣厥後薦舉人衆乃推廣用途分別以知縣直隸州州同州判佐雜等官及教職用知縣得缺視拔貢教職視大挑二等舉人餘均分省試用序補歷朝以來有司奉行第應故事徇情冒濫之弊臺諫屢以上聞惟嘉慶朝湖南嚴如煜以對策第一召見授知縣咸豐朝湖南羅澤南以書生率湘勇越境勦賊皆以勳績見稱於時宣統初各省所舉多至百數十人少亦數十人詔飭嚴行甄覈選舉之風於斯濫矣清代科目取士外或徵之遺佚或擢之廉能或舉之文學或拔之戎行或辟之幕職薦擢一途得人稱盛有足述焉太祖肇興東土選拔英豪以輔大業委輅杖策之士咸與擢用或招直文館或留預帷幄乙卯十一月諭羣臣曰國務殷繁必得賢才衆多量能授職勇能攻戰者宜治軍才優經濟者宜理國博通典故者宜諮得失羔天習儀文者宜襄典禮當隨地旁求俾列庶位時削平諸國設八旗制需才亟太宗即位首任儒臣范文程領樞密重事天聰八年甲喇章京朱繼文子延慶上書言我朝攻城破敵斬將搴旗者不乏人守境治民安內攘外者未多見因疏舉漢人陳極新刑部啟心郎申朝紀足備任使帝召延慶等御前溫諭襃奬命延慶極新文館錄用朝紀仍任部事九年諭滿漢蒙古各官薦舉人才不限已仕未仕牒送吏禮二部具名以聞直文館寧完我言古者薦舉之條功罪連坐所以杜弊端防冒濫請自後所舉之人或功或罪舉者同之若其人砥行於厥初改節於末路許舉者隨時檢舉免連坐帝嘉納焉世祖定鼎中原順治初元遣官徵訪遺賢車軺絡繹吏部詳察履歷確覈才品促令來京並行撫按境內隱逸賢良逐一啟薦以憑徵擢順天巡撫宋權陳治平三策首廣羅賢才以佐上理並薦故明薊遼總督王永吉等詔廷臣各舉所知一時明季故臣如謝陞馮銓党崇雅等紛紛擢用中外臣工啟薦除授得官者不可勝數嗣以廷臣所舉類多明季舊吏廢員未有肥遯隱逸逃名之士詔自今嚴責舉主得人者優加進賢之賞舛謬者嚴行連坐之罰薦章止以履歷上聞才品所宜聽朝廷裁奪儻以貲郎雜流及黜革青衿投閒武弁妄充隱逸咎有所歸若畏避連坐緘默不舉治以蔽賢罪二年陝西江南平詔徵山林隱逸並故明文武進士舉人山東巡撫李之奇以保薦濫及貲郎詔旨切責十三年江南巡撫張中元薦故明進士陸貽吉于沚帝親試之是年復詔各省舉奏地方人才給事中梁鋐言皇上寤寐求才詔舉山林隱逸應聘之士自不乏人然采訪未確有負盛舉如江南舉呂陽授監司未幾以贓敗山東舉王運熙授科員未有建明以計典去呂陽等豈真抱匡濟之才不過為梯榮之藉耳山林者何謂遠於朝市也隱逸者何謂異於趨競也必得其人乃當其位請飭詳加采訪疏入報聞順康間海內大師宿儒以名節相高或廷臣交章論薦疆吏備禮敦促堅臥不起如孫奇逢李顒黃宗羲輩天子知不可致為歎息不置僅命督撫抄錄著書送京師康熙九年孝康皇后升祔禮成頒詔天下命有司舉才品優長山林隱逸之士自後歷朝推恩之典雖如例行實應者寡初制督撫陞遷離任時薦舉人才一次嗣令歲一薦舉部議大省限十人小省限三四人後復改二年薦舉一次自順治十八年停差巡按乃定各省巡撫應舉方面有司佐貳教官員額總漕總河應薦方面有司佐貳額亦著為例康熙二年御史張吉午奏三年考滿之法一二等稱職者即係薦舉請罷督撫二年薦舉例從之六年停考滿用給事中李宗孔言復薦舉與卓異並行先是漕河薦舉例停十二年漕督帥顏保請復舊例每年得舉劾屬吏示勸懲部議行因疏薦糧道范周遲日巽知縣吳興祚詔擢興祚福建按察使聖祖親政銳意整飭吏治屢詔羣臣薦舉天下廉能官十八年左都御史魏象樞疏薦清廉原任侍郎高珩達哈塔雷虎班迪大理卿瑚密色侍讀蕭維豫郎中宋文運布政使畢振姬知縣張沐陸隴其等十人得旨分別錄用並諭陸隴其廉能之員宜任繁劇如直隸清苑江蘇無錫等縣庶可表見其才十九年福建巡撫吳興祚薦按察使于成龍天下廉能第一遷布政使尋擢直隸巡撫二十年入覲帝溫諭襃美問屬吏中亦有清廉者否成龍以知縣謝錫袞同知何如玉羅京對未幾調成龍兩江總督瀕行疏薦直隸守道董秉忠通州知州于成龍南路通判陳大棟柏鄉知縣邵嗣堯阜城知縣王燮高陽知縣孫宏業霸州州判衞濟賢並堪大用會江寧知府缺詔即以通州知州于成龍擢補不數年擢直隸巡撫同時兩于成龍先後汲引並以清操特邀帝眷時論稱之二十三年諭部臣保舉應補關差僉以有才及謹慎者不乏人而操守實難知對帝曰清操如何可廢如郝浴居官甚好猶侵蝕錢糧魏象樞曾薦郝浴此事安能豫知朕信部院堂官清操而委任之堂官亦信司官而委任之但將有守之人舉出被舉者自能効力是年九卿詹事科道遵旨疏舉清廉直隸巡撫格爾古德吏部郎中蘇赫范承勳江南學道趙崙揚州知府崔華兗州知府張鵬翮靈壽知縣陸隴其等二十六年帝嘉直隸巡撫于成龍清廉命九卿各舉廉吏如成龍者大學士等薦雲貴總督范承勳山西巡撫馬齊四川巡撫姚締虞帝謂承勳等居官皆優但尚有勉強之意成龍則出自誠心毫無瞻顧命加成龍太子少保銜以勸廉能四十年敕總督郭琇張鵬翮桑額華顯巡撫彭鵬李光地徐潮薦道府以下知縣以上清廉愛民者勿計罣誤降罰勿拘本省隣屬具以名聞時天子廣厲風節羣士慕效吏治丕變循吏被薦膺顯擢者先後踵相接先是廷臣會推廣西按察使缺吏部侍郎胡簡敬淮安人以推舉淮揚道高成美違例獲譴至是申禁九卿毋得保舉同鄉及本省官復限每人歲舉毋逾十人五十三年尚書趙申喬舉潮州知府張應詔能耐清貧可為兩淮運使帝曰清官不係貧富張伯行家道甚饒任所日用皆取諸其家以為不清可乎一心為國即好官或操守雖清不能辦事亦何裨於國六十一年世宗嗣位諭曰知人則哲自古為難朕臨御之初簡用人才或品行端方或操守清廉或才具敏練諸大臣密奏所知勿避嫌徇私沽名市恩有負諮詢又以道府州縣親民要職敕總督舉三員巡撫舉二員布按各舉一員將軍提督亦得舉一員密封奏聞雍正四年以各省所舉未能稱旨詔切責之令各明舉一人不得雷同時薦賢詔屢下帝綜覈名實賞罰必行七年以督撫布按為全省表率命京官學士侍郎以上外官藩臬以上各密保一人不拘滿漢不限資格即府縣中有信其可任封疆大僚亦許列薦剡高宗重視親民之官乾隆二年諭仿雍正時例督撫布按各密舉一二人次年復命大學士九卿舉堪任道府人員露章啟奏八年詔大學士舉編檢能任知府者十四年命侍郎以上舉能任三品京堂者尚書以上舉能任侍郎者其時明揚密保並行不廢科道行取自康熙七年復舊制詔督撫舉親民之官賢能夙著者親加選用二十九年詔九卿各舉所知尚書王隲舉清苑知縣邵嗣堯李天馥舉三河知縣彭鵬靈壽知縣陸隴其徐元文舉麻城知縣趙蒼璧及廷推時帝復問左都御史陳廷敬廉者為誰廷敬亦以隴其嗣堯天下清官為言時同舉十二人俱用科道得人為最乾隆四年吏部奏請行取高宗命尚書都御史侍郎於各部屬州縣內秉公保舉如康熙二十九年例次年諭聖祖時如湯斌陸隴其學問純正言行相符陳璸彭鵬操守清廉治行卓越天下之大人材之衆豈無與數人頡頏者大學士九卿其公舉備采擇七年帝思骨鯁質樸之士如古馬周陽城起布衣為御史者詔大學士九卿及督撫勿論資格列名舉奏嗣諸臣奏到下吏部定期考試明年二月考選御史試以時務策帝親取中書胡寶瑔第一引見寶瑔涂逢震等十人用御史沈瀾發江南補用既而從御史李清芳奏選用御史令吏部將合例人員奏請考試於是保薦御史例罷清代未設直言極諫之科而選擇言官至為慎重裨益政治非淺尠也自康乾兩朝敦尚實學一時名儒碩彥膺薦擢者尤難悉數康熙十七年聖祖問閣臣在廷中博學能詩文者孰為最李霨馮溥陳廷敬張英交口薦戶部郎中王士禎召對懋勤殿賦詩稱旨授翰林院侍講部曹改詞臣自士禎始三十三年詔大學士舉長於文學者王熙張玉書疏薦在籍尚書徐乾學左都御史王鴻緒少詹事高士奇召來京修書乾學未聞命卒詔進呈遺書並召其弟秉義來京四十五年大學士李光地薦直隸生員王蘭生入直內廷尋賜舉人進士授編修洊躋卿貳歷康雍乾三朝凡天祿秘書靡不與校勘之役同時江南何焯亦以寒儒賜舉人進士直南書房授編修被劾解官仍直書局亦光地薦也雍正中侍郎兼祭酒孫嘉淦薦舉人雷鋐學行為國子監學正乾隆初尚書管監事楊名時薦進士莊亨陽舉人潘永季蔡德峻秦蕙田吳鼐貢生官獻瑤王文震監生夏宗瀾等潛心經學並為國子監屬官三十八年詔開四庫館延置儒臣以翰林官纂輯不敷大學士劉統勳薦進士邵晉涵周永年尚書裘曰修薦進士余集舉人戴震尚書王際華薦舉人楊昌霖同典秘籍後皆改入翰林時稱五徵君此其著者也嘉慶初和珅敗仁宗下詔求賢諭滿漢大臣密舉操守端潔才猷幹濟居官事蹟可據者降敕褎擢廉吏劉清風厲天下十九年御史卓秉恬請嚴禁濫保帝是之宣宗即位尚書劉鐶之薦起名儒唐鑑授廣西知府四川總督蔣攸銛薦川東道陶澍治行第一擢按察使澍好臧否人物開藩皖中入覲論奏侃侃多所舉劾宣宗疑之密諭巡撫孫爾準察其為人爾準條列善政密疏保薦遂獲大用擢兩江總督臨歿遺疏薦粵督林則徐繼己任澍以知人稱咸同中興諸名臣多為所識拔文宗嗣位詔求直言侍郎曾國藩疏陳本原至計尤在用人人材有轉移之道培養之方考察之法帝嘉納之詔中外大臣薦舉人才大學士穆彰阿奏保宗室文彩聶澐特旨用京堂大學士潘世恩疏薦前總督林則徐按察使姚瑩員外郎邵懿辰中允馮桂芬尚書杜受田首薦則徐及前漕督周天爵詔起則徐督師天爵巡撫廣西侍郎曾國藩薦太常少卿李棠階郎中吳廷棟通政副使王慶雲江蘇淮揚道嚴正基浙江知縣江忠源尚書周祖培亦薦棠階廷棟及郎中易棠等多蒙擢用雲貴總督吳文鎔貴州巡撫喬用遷薦知府胡林翼擢道員咸豐五年以各省用兵詔采訪才兼文武膽識出衆之士御史宗稷辰疏薦湖南左宗棠浙江姚承輿江蘇周騰虎管晏廣西唐啟華命各督撫訪察送京引見是時海內多故粵寇縱橫文慶以大學士直樞廷屢密請破除滿漢畛域用人不拘資地謂漢人來自田間知民疾苦熟諳情偽辦賊當重用漢人國藩起鄉兵擊賊戰失利謗議紛起文慶獨謂國藩忠誠負時望終當建非常功宜專任討賊又嘗奇林翼才略林翼以貴州道員留楚帶勇勦賊國藩薦其才堪大用勝己十倍一歲間擢湖北巡撫文慶實中主之袁甲三督師淮上駱秉章巡撫湖南文慶薦其才請勿他調以觀厥成時論稱之七年林翼奏興國處士萬斛泉及其弟子宋鼎鄒金粟砥礪廉隅不求仕進請予奬勵詔賞斛泉等七品冠服有差時軍事方殷迭飭疆吏及各路統兵大臣奏舉將才林翼舉左宗棠予四品京堂襄辦國藩軍務沈葆楨劉蓉張運蘭命國藩林翼調遣他如塔齊布羅澤南李續賓李續宜彭玉麟楊岳斌等俱以末弁或諸生拔自戎行聲績爛然曾胡知人善任薦賢滿天下卒奏中興之功穆宗踐阼以軍興後吏治廢弛特擢天津知府石贊清為順天府尹諭各省訪察循良有伏處山林德行醇備學問淵通之士督撫學政據實奏聞尋國藩疏稱常州士民尚節義城陷與賊相持其士子多讀書稽古如候選同知劉翰清監生趙烈文方駿謨華蘅芳從九品徐壽等若使閱歷戎行廓其聞見有裨軍謀詔譚廷襄嚴樹森左宗棠薛煥訪求遣送國藩軍營錄用同治元年諭廷臣曰上年屢降旨令保舉人才各督撫已將政績卓著人員登諸薦牘在京如大學士周祖培大學士銜祁寯藻翁心存協辦大學士倭仁侍郎宋晉王茂蔭科道高延祜薛春藜郭祥瑞等各有薦舉人臣以人事君不必俟有明詔始可敷陳其各臚列事實秉公保奏復屢諭國藩保薦督撫大員國藩言封疆將帥惟天子舉措之四方多故疆臣既有征伐之權不當更分黜陟之柄宜防外重內輕之漸兼杜植私樹黨之端帝優詔襃答二年河南學政景其濬奏副貢生蘇源生等學行授本省訓導命各學臣訪舉經明行修之士酌保數人不為恆制九年浙江學政徐樹銘以采訪儒修疏薦已革編修俞樾請賞還原銜送部引見秀水教諭譚廷獻舉人趙銘江西拔貢楊希閔等比照召試博學鴻詞例予廷試帝以樹銘私心自用下部嚴議鐫四級此因薦舉獲譴乃其變也光緒七年兩廣督臣張樹聲撫臣裕寬薦在籍紳士山西襄陵知縣南海進士朱次琦國子監典籍銜番禺舉人陳澧篤行詔予五品卿銜以勵績學十年以外釁迭啟時事日艱諭大學士六部九卿直省將軍督撫無論文武兩途有體用賅備謀勇俱優或諳習吏治兵事熟悉中外交涉或善製船械精通算術或饒有機智饒勇善戰或諳諫水師及沿海情形者廣為訪求具實陳奏二十一年訪求奇才異能精天文地輿算法格致製造學者二十四年翰林院侍讀學士徐致靖疏薦工部主事康有為刑部主事張元濟湖南鹽法長寶道黃遵憲江蘇知府譚嗣同廣東舉人梁啟超特予召見徵遵憲嗣同至京賞啟超六品銜任譯書局事時德宗親政激於外勢亟圖自彊詔求通達時務人才中外紛紛薦舉而草茅新進之臣刻勵求新昌言變法矣未幾黨禍起慈禧皇太后訓政有為竄海外其弟廣仁及御史楊深秀軍機章京譚嗣同林旭楊銳劉光第棄市致靖以黨附下獄禁錮復追論原保諸臣罪御史宋伯魯湖南巡撫陳寶箴開缺戶部尚書協辦大學士翁同龢俱削官永不用禮部尚書李端棻謫戍邊內閣學士張百熙下部議處其他言新政者斥逐殆盡迨庚子京師遘亂越年和議成兩宮西幸廻鑾時事日棘三十三年詔中外大臣訪求人才不拘官階大小有無官職確知才堪大用及擅專長者切實薦舉派王大臣察驗詢問出具考語召見於時被薦人員分起赴京除官錄用者至宣統間猶未已然自光緒之季改訂官制增衙署置官缺破格錄用人員輒以千數薦擢亦太濫矣宣統元年御史謝遠涵言變法至今長官但舉故舊士夫不諱鑽營請嚴定章程以貪劣聞者反坐薦主加以懲處疏下所司而已薦舉不拘流品清代才臣以佐雜洊躋開府者如雍正間之李衞田文鏡乾隆間之楊景素李世傑政績最著厥後捐納日廣起家雜流膺顯擢者無算其人大都饒有幹局以視科目循資遷轉以資格坐致高位蓋不侔也薦舉之尤異者康熙初陝西提督王進寶薦其子用予材武可勝副將後以功擢總兵父子同建節鉞雍正間雲南總兵趙坤擢貴州提督請以其子秉鐸為貴州提標參將帝允所請孫嘉淦為祭酒舉其弟揚淦為國子監學正湖南衡永郴桂道汪榯且薦其父原任刑部司官澐學問優裕政事練達授四川知府此則舉不避親其破除成例又如此徵辟幕僚雍正元年詔吏部嗣後督撫所延幕賓將姓名具奏稱職者題部議授之職位以示砥礪乾隆元年侍郎吳應棻以鼓勵賢才請立勸懲之法洎道光間幕友濫邀甄臺諫屢以為言詔督撫鹽政一切議不許保列幕友並嚴禁本省屬員濫充違者吏部查參議處然康熙時布衣陳潢佐靳輔治河特賜僉事道銜雍正時方觀承為定邊大將軍平郡王記室以布衣召見賜中書銜乾嘉間名臣如王杰嚴如煜林則徐輩皆先佐幕而後通籍迨咸同軍興左宗棠李鴻章劉蓉等多以幕僚佐績戎旃成中興之業曾國藩總制軍務幕府號多才賓從極一時人選尤卓卓可紀者也
