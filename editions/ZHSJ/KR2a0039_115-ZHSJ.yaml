body:
  text: 清史稿卷一百十五志九十職官二理藩院都察院五城兵馬司六科給事中通政使司大理寺翰林院文淵閣國史館經筵講官起居注詹事府太常寺太僕寺光祿寺鴻臚寺國子監衍聖公五經博士欽天監太醫院壇廟官陵寢官僧道錄司理藩院管理院務大臣滿洲一人特簡大學士為之尚書左右侍郎俱各滿洲一人間亦有蒙古人為之額外侍郎一人以蒙古貝勒貝子之賢能者任之其屬堂主事滿檔房滿洲二人蒙古三人漢檔房漢軍一人領辦處員外郎主事滿蒙各一人司務廳司務滿蒙各一人筆帖式滿洲三十有六人蒙古五十有五人漢軍六人旗籍王會柔遠典屬理刑徠遠六清吏司郎中宗室一人柔遠司置滿洲三人旗籍王會典屬司各一人蒙古八人旗籍王會理刑司各二人典屬徠遠司各一人員外郎宗室一人旗籍司置滿洲十人王會柔遠典屬理刑司各二人旗籍徠遠司各一人蒙古二十有四人旗籍二人王會三人柔遠五人典屬六人理刑徠遠司各一人主事滿洲二人旗籍典屬司各一人蒙古七人柔遠典屬理刑司各一人王會徠遠司各二人筆帖式滿洲三十有六人蒙古五十有五人漢軍六人銀庫司官二人司官內奏委司庫一人正七品庫使筆帖式各二人以上俱滿洲缺尚書掌內外藩蒙古回部及諸番部制爵祿定朝會正刑罰控馭撫綏以固邦翰侍郎貳之旗籍掌考內扎薩克疆里大漠以南曰內蒙古部二十有四曰科爾沁曰扎賚特曰杜爾伯特曰郭爾羅斯曰敖漢曰奈曼曰巴林曰扎魯特曰阿魯科爾沁曰翁牛特曰克什克騰曰喀爾喀左翼曰喀喇沁曰土默特曰烏珠穆沁曰浩齊特曰蘇尼特曰阿巴噶曰阿巴哈納爾曰四子部落曰茂明安曰烏喇特曰喀爾喀右翼曰鄂爾多斯為旗四十有九疇封爵凡六等一親王二郡王三貝勒四貝子五鎮國公六輔國公不入六等者曰台吉塔布囊亦分四等辨譜系凡官屬扎薩克之輔曰協理台吉其屬曰管旗章京曰副章京曰參領曰佐領曰驍騎校部衆會盟盟地六曰哲里木曰卓索圖曰昭烏達曰錫林郭勒曰烏爾察布曰伊克昭置盟長副盟長各一人由扎薩克請簡軍旅郵傳並隸治之兼稽游牧內屬者凡歸化城土默特黑龍江布特哈皆是王會掌內扎薩克賓禮典朝覲貢獻儀式凡饗賚館餼視等級以為差典屬掌外扎薩克部旗封爵大漠以北曰外蒙古部四曰土謝圖汗曰賽音諾顏曰車臣汗曰扎薩克圖汗為旗八十有六又有杜爾伯特部土爾扈特部和碩特部輝特部綽羅斯部額魯特部別於蒙古者曰和托輝特曰哈柳沁曰托斯曰奢集努特曰古羅格沁並屬以外扎薩克封爵有汗以列王貝勒貝子公之右無塔布囊有台吉治盟會喀爾喀四盟曰汗阿林曰齊齊爾里克曰克魯倫巴爾和屯曰扎克畢拉色欽畢都爾諾爾杜爾伯特二盟曰賽因濟雅哈圖左翼曰賽因濟雅哈圖右翼土爾扈特五盟曰南烏訥恩素珠克圖曰北烏訥恩素珠克圖曰東烏訥恩素珠克圖曰西烏訥恩素珠克圖曰青塞特奇勒圖和碩特一盟曰巴圖塞特奇勒盟置盟長副盟長各一人於同盟扎薩克內簡用惟青海之盟無長置郵驛頒屯田互市政令兼稽游牧內屬者一曰察哈爾二曰巴爾呼三曰額魯特四曰扎哈沁五曰明阿特六曰烏梁海七曰達木八曰哈薩克柔遠掌治外扎薩克衆部凡喇嘛番僧祿釰朝貢並司其儀制徠遠掌回部扎薩克伯克歲貢年班番子土司亦如之並典外裔職貢附牧回城卡倫外曰布魯特內附者各給以銜歲遣使輸馬他哈薩克若浩罕若博羅爾若巴達克山若愛烏罕並各効其職貢理刑掌蒙古番回刑獄諍訟領辦處掌綜領衆務銀庫掌帑金出納其兼領者蒙古繙譯房員外郎主事各一人司官內奏委校正漢文官二人滿蒙內閣侍讀學士侍讀翰林院侍讀侍講學士侍讀侍講內奏派主章奏文移內外館監督各一人六部司員內充補光緒三十三年省主賓館繕完滌除烏蘭哈達三座塔八溝司官各一人分駐塔子溝筆帖式一人嘉慶十五年撤回並四處司員俱改為理事官隸熱河都統仍由本院司員內簡放分主蒙古部落民人訟事察哈爾游牧處理事員外郎十有六人以在京蒙古各旗與察哈爾各旗官員內番選由護軍驍騎校選用者授員外郎由中書筆帖式選用者先授主事三年稱職陞員外郎分主游牧察哈爾民人訟事張家喜峰獨石殺虎古北諸口管理驛站員外郎司員內奏委筆帖式各一人主蒙古郵驛政令圍場總管一人康熙四十五年置乾隆十四年始來隸嘉慶七年後改隸熱河都統左右翼長各一人章京八人初制六品乾隆十八年陞五品驍騎校八人主守木蘭圍場專司巡察初崇德元年設蒙古衙門置承政參政各官三年更名理藩院定承政左右參政各一人副理事官八人啟心郎一人順治元年改承政為尚書參政為侍郎滿蒙參用副理事官為員外郎置二十有一人康熙二十年增滿蒙八人乾隆四十二年省蒙古一人四十九年改滿洲二人為蒙缺後滿蒙司官增減不一啟心郎三人滿洲一人漢軍二人十五年省堂主事二人康熙二十八年增漢文一人司務二人滿蒙各一人康熙三十八年省雍正十年復故漢副使一人從八品五年增置漢院判正六品知事正八品自副使以下俱康熙三十八年省各一人四年置唐古忒學教習一人給六品俸後改司業其助教以他官兼乾隆五年定為額缺尋省十六年定以禮部尚書銜掌院事侍郎銜協理院事越二年以隸禮部未合舊制停兼銜依六部例令入議政班居工部後並設錄勳賓客柔遠理刑四司置滿蒙郎中共十有一人乾隆四十二年增蒙古一人四十九年改滿洲二人為蒙缺員外郎二十有一人康熙二十年增滿蒙八人乾隆四十二年省蒙古一人四十九年改滿洲六人為蒙缺主事滿漢各四人康熙二十八年省漢缺乾隆四十九年改滿洲二人為蒙缺康熙二十年增蒙古文主事二人三十八年析柔遠司為二曰前司曰後司四十六年設銀庫初制蒙古王台吉等入朝由戶工二部及光祿寺庀器用具廩餼至是始創設置郎中員外郎各一人司員內奏派司庫一人庫使四人雍正元年始命王公大學士領院事省庫使二人乾隆二十二年改錄勳司為典屬賓客司為王會柔遠後司為旗籍前司仍曰柔遠二十六年合旗籍柔遠為一增設徠遠一司明年仍析旗籍柔遠為二二十九年改典屬司為旗籍舊旗籍為典屬嘉慶四年改滿洲郎中員外郎各一人為宗室員缺咸豐五年定伊犁塔爾巴哈台通商章程始司外交職務見第十七款十年定中俄續約以軍機處及本院典外交文移見第九款後歸外部光緒三十二年更院為部擬設殖產邊衞二司嗣先設編纂調查二局隸領辦處以漢檔房俸檔房督催所改併漢檔房主事缺未省尋置員外郎主事各一人蒙古房改俱蒙缺宣統三年改尚書為大臣侍郎為副大臣額外侍郎如故理藩一職歷古未有專官唯周官大行人差近之秦漢以降略存規制遐荒絕漠統治王官為有清創制自譯署設職權漸替已都察院左都御史初制滿員一品漢員二品順治十六年並改二品康熙六年仍陞滿員為一品九年並定正二品雍正八年陞從一品左副都御史正三品俱滿漢二人其屬經歷司經歷正六品都事廳都事正六品俱滿漢一人筆帖式四十有二人十五道掌印監察御史初制滿洲漢軍三品順治十六年改七品康熙六年陞四品九年復為七品雍正七年改由編檢郎員授者正五品由主事中行評博授者正六品乾隆十七年並定從五品滿漢各一人監察御史京畿江西浙江福建湖廣河南山西陝西八道滿漢各一人江南道滿漢各三人山東道滿漢各二人左都御史掌察覈官常參維綱紀率科道官矢言職率京畿道糾失檢姦並豫參朝廷大議凡重辟會刑部大理寺定讞祭祀朝會經筵臨雍執法糾不如儀者左副都御史佐之十五道掌彈舉官邪敷陳治道各覈本省刑名京畿道分理院事及直隸盛京刑名稽察內閣順天府大興宛平兩縣河南道照刷部院諸司卷宗稽察吏部詹事府步軍統領五城江南道稽察戶部寶泉局左右翼監督京倉總督漕運磨勘三庫奏銷浙江道稽察禮部及本院山西道稽察兵部翰林院六科中書科總督倉場坐糧廳大通橋監督通州二倉山東道稽察刑部太醫院總督河道催比五城命盜案牘緝捕之事陝西道稽察工部寶源局覆勘在京工程湖廣道稽察通政使司國子監江西道稽察光祿寺福建道稽察太常寺四川道稽察鑾儀衞廣東道稽察大理寺廣西道稽察太僕寺雲南道稽察理藩院欽天監貴州道稽察鴻臚寺其祭祀監禮侍班糾儀科道同之經歷掌董察吏胥都事掌繕寫章奏其分攝者巡視五城御史滿漢各一人科道中簡用一年更替掌綏靖地方釐剔姦弊兵馬司指揮正六品副指揮正七品吏目未入流自正指揮以下俱漢員五城各一人掌巡緝盜賊平治道路稽檢囚徒火禁區為十坊領之初沿明制設都察院天聰十年諭曰凡有政事背謬及貝勒大臣驕肆慢上者許直言無隱崇德元年置承政參政各官明年定承政一人左右參政滿蒙漢理事官各二人後省順治元年改左都御史掌院事滿漢各一人左副都御史協理院事各二人漢左僉都御史一人先用漢軍後參用漢人乾隆十三年省外省督撫並以右繫銜右都御史右副都御史右僉都御史為督撫坐銜乾隆十三年停右都御史銜司務後改經歷滿漢各一人都事滿洲二人乾隆十七年改滿漢各一人漢軍一人康熙三十九年省設十五道河南道參治院事置監察御史滿洲六人河南江南浙江山東山西陝西掌印各一人五年增十有七人康熙二十八年增一人後復省四人乾隆十四年定江南山東道各三人京畿河南浙江山西陝西湖廣福建道各二人四川廣東廣西雲南貴州道各一人漢軍八人協理河南道一人餘隸江南等五道康熙三十九年省入漢缺漢員江南道五人內掌印一人十八年省一人康熙七年省二人雍正四年增一人乾隆十四年增一人浙江道六人內掌印一人九年省一人十八年省二人康熙七年省一人雍正四年增一人乾隆十四年省一人江西道六人十六年省一人十八年省三人康熙七年省一人雍正四年增一人乾隆十四年省一人福建道五人十年省一人康熙七年省二人湖廣道六人八年九年十五年俱省一人康熙七年省一人雍正四年增一人乾隆十四年復省一人河南道六人內掌印一人十年十八年俱省一人康熙七年省二人乾隆六年增一人十四年復省一人山東道五人內掌印一人十八年省二人康熙七年省一人乾隆十四年增一人山西道五人內掌印一人十年省一人十八年省二人乾隆六年增一人十四年省一人陝西道四人內掌印一人十八年省二人雍正四年增一人乾隆十四年省一人四川道四人十八年省二人康熙七年省一人雍正四年增一人乾隆十四年省一人廣東道五人十八年省二人康熙七年省二人雍正四年增一人乾隆十四年省一人廣西道雲南道各四人十八年省二人康熙七年各省二人乾隆十四年各省二人貴州道四人十八年省二人康熙七年省一人雍正四年增一人乾隆十四年省一人京畿道無專員乾隆十四年定滿漢各一人啟心郎滿洲漢軍各一人十五年俱省蒙古章京二人康熙元年省筆帖式滿洲五十有一人康熙三十八年省十有六人漢軍七人康熙三十八年省二人雍正十二年置蒙古二人光緒三十三年滿蒙漢軍共酌留三十人中東西南北五城兵馬司指揮各一人副指揮各二人康熙十一年省五城各一人乾隆三十一年改東西南北四城副指揮分駐朝陽永定阜成德勝諸門外鈐轄