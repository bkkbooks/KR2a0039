宗厲精圖治諭各省甄別捐納軍功人員尋以招流亡墾地畝課第殿最同治七年復命設局刊牧令諸書猶存振厲至意光緒間督撫違例更調州縣官視同傳舍二十四年議復久任制三十一年定考覈州縣章程詳考績制亦少密焉計全國縣凡千三百五十有八儒學府教授正七品訓導從八品州學正正八品訓導縣教諭正八品訓導俱各一人教授學正教諭掌訓迪學校生徒課藝業勤惰評品行優劣以聽於學政訓導佐之例用本省人同府州者否江蘇安徽兩省通用初沿明制府廳州縣及各衞武學並置學官康熙三年府州及大縣省訓導小縣省教諭十五年復置自是教職分正復厥後開俊秀監生捐納教職例三十年允江南學政許汝霖請凡捐學正教諭者改為縣丞訓導改為主簿繇是唯生員始得入貲教授必由科目三十二年省各衞武學訓導三十九年頒學宮聖諭十六條月朔望命儒學官集諸生宣讀四十一年頒御製訓飭士子文命學宮鑱石四十二年定教職學各二人雍正元年允雲南土人四川建昌番夷湖南永綏等處建立義學嗣是改土歸流塞外荒區漸次俱設儒學明年置雲南井學訓導井學自此始又明年省都司儒學京衞武學教授滿洲生員並歸漢官月課十三年定府州縣儒學官品秩如前所列光緒三十年後科舉既罷各省教職缺出不補時議改置文廟官不果巡檢司巡檢從九品掌捕盜賊詰姦宄凡州縣關津險要則置隸州廳者專司河防驛驛丞未入流掌郵傳迎送凡舟車夫馬釰糗庖饌視使客品秩為差支直於府州縣籍其出入雍正六年定滿人不得為驛丞典史同庫大使一人隸布政使者正八品運使鹽法道各道從九品鹽茶道及各所俱未入流掌主庫藏倉大使一人隸布政使及各府從九品州縣未入流掌主倉庾稅課司大使一人隸道府者從九品州縣未入流掌主稅事凡商賈儈屠雜巿俱有常徵以時榷之輸直於道府若縣牐官一人未入流掌瀦洩啟閉河泊所大使一人未入流掌徵魚稅醫學府正科州典科縣訓科各一人俱未入流由所轄有司遴諳醫理者咨部給劄宣統元年奉天模範監獄成置醫務所所長省府正科陰陽學府正術州典術縣訓術各一人俱未入流由所轄有司遴行端者咨部給劄雍正七年令兼轄星學府僧綱司都綱副都綱州僧正司僧正縣僧會司僧會各一人府道紀司都紀副都紀州道正司道正縣道會司道會各一人俱未入流遴通曉經義恪守清規者給予度牒
