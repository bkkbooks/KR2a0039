body:
  text: 清史稿卷一百十六志九十一職官三外官順天府奉天府總督巡撫學政布政使按察使鹽運使道府州縣儒學巡檢驛丞庫倉稅課河泊各大使牐官醫學陰陽學僧綱司道紀司順天府兼管府尹事大臣漢大學士尚書侍郎內特簡尹正三品丞正四品俱各一人其屬治中正五品通判正六品經歷司經歷從七品照磨所照磨司獄司司獄並從九品俱各一人並漢員儒學教授正七品訓導從八品滿漢各一人所轄四路廳正五品二十州縣正七品各一人在京者大興宛平二縣知縣各一人正六品縣丞正七品四人大興一人宛平三人巡檢從九品七人大興三人宛平四人典史閘官崇文門副使俱未入流副使後隸監督各一人尹掌清肅邦畿布治四路帥京縣頒政令條教歲立春迎春東郊天子耕耤具耒耜絲鞭奉青箱播種禮畢率庶人終畝田賦出納以時勾稽上其要於戶部治鄉飲典禮鄉試充監臨官丞掌學校政令鄉試充提調官治中掌貳府事紀綱衆務兼鄉會試場務通判掌主牙稅平禁爭偽經歷照磨掌出納文書司獄掌罪囚籍錄儒學掌京畿黌序文武生月課其藝射不帥教者戒飭之三歲報優劣於學政大興宛平二縣各掌其縣之政令與五城兵馬司分壤而治品秩服章視外縣加一等初世祖奠鼎燕京建順天府置尹一人丞一人兼提督學政銜乾隆五十八年停別置學政丞止申送童生治中三人通判三人順治六年留管糧一人省馬政軍匠各一人經歷照磨司獄各一人推官知事並從六品檢校從九品以上三員俱康熙六年省遞運所大使康熙三十八年省庫大使康熙三十九年省張家灣宣課司大使康熙四十年省以上三員俱未入流各一人儒學漢教授一人訓導六人順治二年省四人康熙四年俱省五年復置一人京衞武學漢教授一人訓導二人順治二年省康熙十五年復置一人轄大興宛平二縣知縣各一人縣丞各一人雍正四年增宛平管河一人嘉慶十三年復增宛平管河一人巡檢七人主簿順治三年省典史閘官詳內務府各一人順治六年省治中二人康熙十五年始以昌平等十九州縣來隸二十七年置東西南北四路同知雍正元年特簡大臣領府事號兼尹三年改京衞武學為府武學明年省武學教授訓導官增府儒學教授訓導滿洲各一人乾隆八年定為二十四州縣隸府嘉慶十八年定所屬官吏歸尹考察光緒元年省治中別設驛巡道宣統二年罷兼尹奉天府兼管府事大臣一人盛京五部侍郎內特簡後歸將軍兼管尹滿洲一人丞漢一人其屬治中圍場通判庫大使經歷司獄巡檢兼司獄府學教授各一人所轄海防同知軍糧同知各一人承德縣知縣典史各一人尹掌留都治化與其禁令小事決之大事以聞丞掌主學校兼稽宗室覺羅官學義學治中以次各官所掌視順天府初建盛京順治十年設遼陽府十四年更名奉天府置尹一人經歷教授訓導康熙三年省各一人康熙二年置丞一人治中通判推官六年省各一人設承德縣附郭置知縣典史各一人巨流河巡檢一人乾隆四十二年省七年增府司獄一人二十八年定府丞主奉天考試事乾隆二十七年詔府尹受將軍節度明年增興京理事廳通判一人光緒二年省三十年始以侍郎為兼尹著為令光緒二年省治中別設驛巡道改命將軍兼管加兼尹總督銜府尹二品銜以兵部侍郎右副都御史行巡撫事三十一年改行省罷尹丞置知府宣統元年省教佐各官越明年省承德縣總督從一品掌釐治軍民綜制文武察舉官吏修飭封疆標下有副將參將等官巡撫從二品掌宣布德意撫安齊民修明政刑興革利弊考覈羣吏會總督以詔廢置標下有參將游擊等官其三年大比充監臨官武科充主試官督撫同初沿明制督撫繫右都御史右副都御史右僉都御史銜無定員順治十年諭會推督撫不拘品秩擇賢能者具題康熙元年停巡撫提督軍務加工部銜不置總督省分兼轄副將以下等官十二年復故並設撫標左右二營三十一年定總督加銜制由各部左右侍郎授者改兵部左右侍郎由巡撫授者陞兵部右侍郎兼都察院右副都御史乾隆十三年定大學士兼管總督者仍帶原銜明年改授右都御史銜其兵部尚書銜由吏部疏請定奪嘉慶十四年定以二品頂戴授者兼兵部侍郎銜俟陞品秩再加尚書銜光緒三十二年更名陸軍部尚書銜宣統二年停七年定山陝督撫專用滿員雍正元年定巡撫加銜制由侍郎授者改兵部右侍郎兼右副都御史銜由學士副都御史及卿員布政使等官授者俱為右副都御史由左僉都御史或四品京堂按察使等官授者俱為右僉都御史乾隆十四年定巡撫不由侍郎授者俱兼右副都御史其兵部侍郎銜疏請如總督光緒三十二年更名陸軍部侍郎銜宣統二年停時西安有同署巡撫者山東山西並有協辦巡撫之目非制也是歲諭山陝督撫參用蒙古漢軍漢人纂為令甲乾隆十八年以漕運河道總督無地方責授銜視巡撫嘉慶十二年定由尚書授者應否兼兵部尚書銜疏請如總督光緒二十四年加總理各國事務衙門大臣銜尋罷三十二年定辟除掾屬分曹治事制條為十科曰交涉曰吏曰民曰度支曰禮曰學曰軍政曰法曰農工商曰郵傳各置參事秘書是為幕職宣統二年充會辦鹽政大臣兼職尋亦罷初河南山東山西等省專置巡撫無統轄營伍權以提督為兼銜直隸四川甘肅等省專置總督吏治歸其考覈以巡撫為兼銜而巡撫例受總督節度寖至同城巡撫僅守虛名即分省者軍政民事亦聽總督主裁文宗蒞政命浙江安徽江西陝西湖南廣西貴州各巡撫節制鎮協武職總督兼轄省分由巡撫署考會題校閱防剿定為專責職權漸崇光緒季年裁同城巡撫其分省者權幾與總督埒所謂兼轄奉行文書已耳宣統間軍政鹽政厚集中央督撫權削矣總督東三省等處地方兼管三省將軍奉天巡撫事一人康熙元年置將軍詳武職光緒二年兼管兵刑二部及府尹以兵部尚書都察院右都御史銜行總督事三十二年建行省改將軍曰總督授為欽差大臣隨時分駐三省行臺宣統二年兼奉天巡撫事初建行省置巡撫一人至是省總督直隸等處地方提督軍務糧饟管理河道兼巡撫事一人順治五年置直隸山東河南三省總督駐大名十五年改為直隸巡撫十七年徙真定明年復置總督於大名康熙三年仍為三省總督八年省移巡撫還駐保定五十四年加巡撫以總督銜不為例雍正元年詔嘉李維鈞勤慎特授總督自是為永制四年以禮部右侍郎協理總督不為常目乾隆十四年令兼河道二十八年詔依四川例兼管巡撫事咸豐三年兼管長蘆鹽政同治九年加三口通商事務授為北洋通商大臣駐天津冬令封河還駐保定初置有宣大總督順天保定宣府三巡撫順治八年省宣府巡撫以宣大總督兼其事十三年省宣大總督令順天巡撫兼之十八年省順天巡撫歸保定巡撫兼管後亦省總督兩江等處地方提督軍務糧饟操江統轄南河事務一人順治二年以內閣大學士洪承疇總督軍務招撫江南各省尋改應天府為江寧罷南直隸省府尹四年置江南江西河南三省總督駐江寧九年徙南昌時號江西總督已復駐江寧十八年江南江西分置總督康熙元年加江南總督操江事務初置鳳廬巡撫駐淮安以操江管巡撫事領之六年省歸漕督至是始來隸四年復併為一十三年復分置二十一年仍合尋定名兩江總督雍正元年以綜治江蘇安徽江西三省加兵部尚書兼都察院右都御史銜道光十一年兼兩淮鹽政同治五年加五口通商事務授為南洋通商大臣與北洋遙峙焉總督陝甘等處地方提督軍務糧饟管理茶馬兼巡撫事一人順治元年置陝西總督駐固原兼轄四川十四年徙漢中康熙三年更名山陝總督兼轄山西還駐西安十四年改為陝甘總督時山西別置總督十九年仍改陝甘為山陝省山西總督入之轄四川如故雍正元年以綜治陝西甘肅四川三省加兵部尚書兼都察院右都御史銜三年授兵部尚書岳鍾琪為總督先是定為滿缺參用漢人自此始九年諭仍專轄陝甘十四年復轄四川更名川陝甘總督乾隆十三年西陲用兵仍置陝西總督十九年省甘肅巡撫移陝甘總督駐蘭州兼甘肅巡撫事二十四年別置甘肅總督兼轄陝西駐肅州移川陝總督駐四川尋復定名陝甘總督還駐蘭州仍兼巡撫事光緒八年新疆建行省復兼轄之總督閩浙等處地方提督軍務糧饟兼巡撫事一人順治二年置福建總督駐福州兼轄浙江五年更名浙閩總督徙衢州兼轄福建十五年兩省分置總督福建總督駐漳州浙江總督駐溫州康熙十一年移福建總督駐福州明年省浙江總督二十六年改福建總督為福建浙江總督雍正五年特授李衞總督浙江整飭軍政吏治並兼巡撫事郝玉麟以浙閩總督專轄福建十二年復省浙江總督仍合為一乾隆元年詔依李衞例特授嵇曾筠為浙江總督郝玉麟仍專轄福建三年嵇曾筠入閣郝玉麟仍總督閩浙如故閩浙或分或合至是始為永制光緒十一年省福建巡撫並兼巡撫事總督湖北湖南等處地方提督軍務糧饟兼巡撫事一人順治元年置湖廣總督駐武昌康熙七年省九年復置十九年改川湖總督復為湖廣總督還駐武昌二十六年更名湖北湖南總督光緒三十年兼湖北巡撫事總督四川等處地方提督軍務糧饟兼巡撫事一人順治元年置四川巡撫駐成都不置總督十年以川省兵馬錢糧皆從陝西調發詔陝西總督孟喬芳兼督四川十四年停陝督兼轄專置四川總督駐重慶康熙七年更名川湖總督徙荊州九年還駐重慶十三年四川省會別置總督一人十九年省隸陝甘總督其川湖總督省歸湖廣總督兼理雍正九年復置駐成都十三年又省乾隆十三年以金川用兵始定為專缺兼管巡撫事二十四年兼轄陝西尋停兼轄宣統元年以將軍所轄松潘建昌二鎮阜和協所屬各營建昌松茂二道府廳州縣改隸之總督兩廣等處地方提督軍務糧饟兼巡撫事一人順治元年置廣東總督駐廣州兼轄廣西十二年徙梧州康熙二年別置廣西總督移廣東總督駐廉州三年復併為一駐肇慶雍正元年復分置明年仍合七年以苗患令雲貴總督兼轄廣西十二年仍隸廣東光緒三十一年兼廣東巡撫事總督雲貴等處地方提督軍務糧饟兼巡撫事一人順治十六年置經略尋改總督兩省互駐康熙元年分置雲南總督駐曲靖貴州總督駐安順三年復併為一徙貴陽十二年仍分置尋復故二十六年徙雲南府雍正十年上嘉鄂爾泰才以雲貴總督兼制廣西給三省總督印十二年仍轄兩省以經略苗疆授張廣泗為貴州總督兼巡撫事尹繼善為雲南總督專轄雲南十二年復故光緒三十一年兼雲南巡撫事總督漕運一人掌治漕輓以時稽覈催趲綜其政令標下官同總督順治元年遣御史巡漕尋置總督駐淮安四年以滿洲侍郎一人襄治漕務八年省十三年復置十八年又省六年兼鳳廬巡撫事十六年停兼職康熙二十一年定糧艘過淮總漕隨運述職咸豐十年令節制江北鎮道各官光緒三十年以淮徐盜警改置巡撫明年省河道總督江南一人山東河南一人直隸河道以總督兼理掌治河渠以時疏濬隄防綜其政令營制視漕督順治元年置總河駐濟寧康熙十六年移駐清江浦二十七年還駐濟寧令協理侍郎開音布等駐其地三十一年總河並駐之三十九年省協理四十四年兼理山東河道雍正二年置副總河駐武陟專理北河七年改總河為總督江南河道駐清江浦副總河為總督河南山東河道駐濟寧分管南北兩河八年增置直隸正副總河為河道水利總督駐天津自是北河南