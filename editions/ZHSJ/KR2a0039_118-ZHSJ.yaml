body:
  text: 清史稿卷一百十八志九十三職官五內務府內務府行宮園囿御船處等官學武英殿修書處上駟院武備院奉宸苑盛京內務府宦官內務府總管大臣無員限滿洲大臣內特簡初制從二品乾隆十四年定正二品其屬堂郎中主事各一人筆帖式三十有六人廣儲司總管六庫郎中四人內二人由各部員司兼攝銀皮磁緞衣茶六庫郎中四人銀庫二人兼司皮磁二庫緞庫二人兼司衣茶二庫員外郎十有八人庫各二人兼攝各一人六品司庫六人庫各一人八品司匠六人銀磁衣三庫各二人副司庫十有二人庫使八十人俱無品級織造蘇州杭州各一人司員內奏簡六品司庫各一人庫使筆帖式各二人會稽掌禮都虞慎刑營造慶豐六司郎中十有二人司各二人員外郎三十有二人會稽都虞慶豐各五人掌禮營造各六人慎刑四人主事各一人催長二十有三人廣儲八人會稽五人都虞四人掌禮慎刑營造各二人自八品至無品級不等副催長十有三人廣儲都虞各四人會稽三人掌禮慎刑營造各二人自九品至無品級不等委署催長一人司匠二人俱無品級營造司置錢糧衙門亦曰管理三旗銀兩處郎中一人員外郎四人催長副催長各三人俱九品司俎官四人正六品讀祝官四人學習三人贊禮郎十有三人學習四人俱六品銜食七品俸八品催長一人果房掌果副掌果各二人果上人十有二人催長一人俱九品自司俎以下隸掌禮司木鐵房器薪炭六庫庫掌副庫掌各三人庫守五十有五人木房二庫各十有一人炭庫八人鐵庫四人器薪二庫圓明園薪炭庫各七人無品級鐵作漆作司匠八品銜委署司匠俱各一人爆作庫掌副庫掌各一人俱未入流隸營造司牛羊羣牧值年委署主事一人六品銜食筆帖式原俸隸慶豐司官房租庫庫掌一人庫守三人內管領掌關防一人郎中充協理二人員外郎充內管領初制正五品道光三十五年改從五品副內管領正六品各三十人庫掌十有五人菜庫六人車庫五人酒醋房器庫各二人倉長十有三人官三倉六人外餑餑房三人內餑餑房器倉糖倉米倉各一人俱無品級養心殿造辦處郎中員外郎各二人主事一人六品庫掌六人副庫掌十人八品催長十有四人其兼轄者圓明園活計處副庫掌四人副司匠九人俱無品級中正殿員外郎副內管領三十額內題補各二人無品級催長一人寧壽宮郎中員外郎各二人主事委署主事各一人武英殿修書處正監造員外郎副監造副內管領六品庫掌委署主事各一人七品銜庫掌二人御書處正監造司庫六品銜食七品俸一人副監造庫掌六品銜食八品俸二人七品銜副庫掌六人茶膳房一二三等侍衞一等三品二等四品三等五品尚膳正各三人四品尚茶正各二人四品尚膳副尚茶副俱五品主事俱各一人膳上侍衞十有三人茶上侍衞八人俱六品主事委署主事各一人承應長十有三人庖長八人庫掌五人庫守十有六人承應長以下給虛銜金頂御藥房初以總管首領太監管理康熙三十年始來隸主事一人七品銜庫掌二人委署主事催長各一人火藥庫庫掌二人各處筆帖式二百有七人自養心殿以下並簡大臣領之與內府大臣同為內廷右職其兼攝者昇平署官房租庫犧牲所司員各二人保和太和中和三殿司員內管領各一人壽康宮慈寧宮花園司員各二人御藥房內管領一人副內管領二人總理工程處司員無恆額查覈房督催房彙稿處並遴司員分涖其事總管大臣掌內府政令供御諸職靡所不綜堂郎中主事掌文職銓選章奏文移廣儲掌六庫出納織造織染局隸之會稽掌本府出納凡果園地畝戶口徭役歲終會覈以聞掌禮掌本府祭祀與其禮儀樂舞兼稽太監品級果園賦稅都虞掌武職銓選稽覈俸饟恩珠軒歲納佃漁歲輸並定其額以供慎刑掌本府刑名依律擬罪重讞移三法司會訊題結番役處隸之營造掌本府繕修庀材飭工帥六庫三作以供令慶豐掌牛羊羣牧嘉薦犧牲錢糧衙門掌三旗莊賦治其賞罰與其優內管領處掌承應中宮差務並稽官三倉物用恩豐倉餼米官房租庫掌收房稅養心殿造辦處掌製造器用中正殿各司員掌喇嘛唪經武英殿修書處掌監刊書籍雍和寧壽兩宮司員掌陳設氾埽兼稽宮監勤惰御書處掌鐫摹御書御茶膳房掌供飲食御藥房掌合丸散犧牲所掌牧養黝牛總理工程處掌行營工作凡遇工程簡勘估大臣承修大臣事畢簡查驗大臣初制設內務府以舊屬司其事入關後明三十二衞人附之設內管領處置內管領八人順治三年增四人十一年增八人分隸三旗康熙二十四年增四人三十年增三人三十四年增三人設茶飯處置總領各三人飯上人三十有五人茶上人十有七人康熙二十年置飯上人委署總領一人雍正元年定總領授二等侍衞飯上人授三等侍衞六人藍翎侍衞七人茶上人三等侍衞三人藍翎侍衞四人復置茶房侍衞內委署總領一人乾隆八年定三等侍衞內各授一等侍衞一人十五年改飯房為外膳房二十四年改總領為尚膳正尚茶正副總領為尚膳副尚茶副承應長十人康熙六十一年增一人雍正元年增一人庖長三人康熙五十六年增六人六十一年增一人雍正元年增二人及蘇州江寧杭州織造官光緒三十年省江寧一人順治十一年命工部立十三衙門設司禮御用御馬內官尚衣尚膳尚寶司設八監尚方惜薪鐘鼓三司兵仗織染二局幷三旗牛羊羣牧處置員外郎六人管理牛隻羊隻各三人康熙二十三年各增二人乾隆十四年省入寧壽宮一人咸豐三年省入慎刑司二人光緒三十年省一人明年改尚方司為院置郎中三人康熙三十一年省一人員外郎六人康熙三十八年省一人六十一年省一人光緒三十年省四人催總一人雍正二年增一人乾隆二十四年更名催