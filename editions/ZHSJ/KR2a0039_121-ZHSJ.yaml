body:
  text: 清史稿卷一百二十一志九十六食貨二賦役倉庫賦役一曰賦則清初入關首除明季加派三餉時賦稅圖籍多為流寇所毀順治三年諭戶部稽覈錢糧原額彙為賦役全書悉復明萬曆間之舊計天下財賦惟江南浙江江西為重三省中尤以蘇松嘉湖諸府為最六年戶科右給事中董篤行請頒行易知由單八年世祖親政分命御史巡行各省察民間利病蘇松巡按秦世楨條奏八事曰田地令業主自丈明註印冊曰額定錢糧俱填易知由單設有增減另給小單以免姦胥藉口曰由單詳開總散數目花戶姓名以便磨對曰設立滾單以次追比曰收糧聽里戶自納簿櫃加鈐司府印信曰解放先急後緩勒限掣銷曰民差查田均派與排門冊對驗曰備用銀兩不得額外透支徵解銀冊布政司按季提取年終報部自後錢糧積弊釐剔漸清十一年命右侍郎王宏祚訂正賦役全書先列地丁原額次荒亡次實徵次起運存留起運分別部寺倉口存留詳列發項細數其新墾地畝招徠人丁續入冊尾每州縣發二本一存有司一存學宮賦稅冊籍有丈量冊又稱魚鱗冊詳載上中下田則有黃冊歲記戶口登耗與賦役全書相表𩹉有赤曆令百姓自登納數上之布政司歲終磨對有會計冊備載州縣正項本折錢糧註明解部年月復採用明萬曆一條鞭法一條鞭者以府州縣一歲中夏稅秋糧存留起運之額均徭里甲土貢雇募加銀之額通為一條總徵而均支之至運輸給募皆官為支撥而民不與焉頒易知由單於各花戶由單之式每州縣開列上中下則正雜本折錢糧末綴總數於開徵一月前頒之又佐以截票印簿循環簿及糧冊奏銷冊截票者列地丁錢糧實數分為十限月完一分完則截之鈐印於票面就印字中分官民各執其半即所謂串票也印簿者由布政司頒發令州縣納戶親填入簿季冬繳司報部循環簿者照賦役全書發項以緩急判其先後按月循環徵收糧冊者造各區納戶花名細數與一甲總額相符奏銷冊者合通省錢糧完欠支解存留之發彙造清冊歲終報部核銷定制可謂周且悉矣十五年江西御史許之漸言財賦大害莫如蠹役官以參罰去而此蠹役盤踞如故請飭撫按清查甚者處以極刑庶積弊可冀廓清工科給事中史彪古請嚴禁正供外加派並將申飭私派之旨刊入易知由單俾民共曉帝以所奏皆切中時弊下所司詳議以聞聖祖即位嚴申州縣官隱匿地畝不納錢糧捏報新墾之禁更定州縣催徵議經徵督催各官處分其州縣官挪用正發捏稱民欠及加派私徵者罪之帝以由單發項繁多民不易曉命將上中下等則地每畝應徵銀米實數列單內由單報部違限八月者罪州縣衞所及轉報官給事中姚文然上言災荒蠲免有收完在前奉令在後者以本年應蠲錢糧抵次年應納正賦名曰流抵自應載入由單俾人沾實惠但部題定額由單於上年十一月頒發州縣磨算編造必在九十月間而各省題報災傷夏災以六月秋災以九月部中行查覆奏咨行撫臣飭知地方官吏輾轉需時計已在頒發由單之後其勢無由填入應請於流抵之下年填入由單以杜其弊下部議行直省徵收錢糧夏稅於五六月秋糧於九十月其報部之數責成各司於奏銷時詳加磨勘按年送京畿道刷卷自世祖定賦稅之制正雜發繁多咨題違錯駁令查覆印官即借部駁之名擅行私派其正賦錢糧本有定額地方官吏遇有別項需用輒令設法實與加派無二至是下令嚴禁罷州縣欠糧留任候代完全開復之制七年以夏稅秋糧定限稍遲恐誤協餉仍復舊制州縣開徵後隨收隨解凡各省地丁錢糧巡撫於歲終奏銷詳列通省錢糧起運存留撥充兵餉辦買顏料及餘賸之數造冊具報其黃冊會計冊繁費無益悉罷之十五年嚴定官民隱田罪例官吏查出隱田分別議人民舉首隱地逾十頃者即以其地與之十八年令州縣每歲將日收錢糧流水簿解司磨對罷赤曆自順治間訂正賦役全書至是二十餘年戶口土田視昔有加按戶增徭因地加賦條目紛繁易於淆混二十四年下令重修止載起運存留漕項河工等切要發目刪去絲秒以下尾數名曰簡明賦役全書二十六年書成廷議以舊書遵行已久歷年增減地丁銀米俱有奏銷冊籍可稽新書遂罷頒行是歲諭各省悉免刊刻由單以杜派費擾民之弊二十八年令各省巡撫於每年奏銷時盤查司庫錢糧先是各州縣催徵用二聯串票官民分執不肖有司句結姦胥以已完作未完多徵作少徵弊竇日滋至是議行三聯串票一存有司一付役應比一付民執照其後更刊四聯串票一送府一存根一給花戶一於完糧時令花戶別投一櫃以銷欠未幾仍復三聯串票之制各省紳衿本有優免丁銀之例而豪強土著往往詭寄濫免更有紳衿包攬錢糧耗羨盡入私橐官民交累有詔詭寄地畝悉退還業戶三十年以由單既停令直省州縣衞所照賦役全書科則輸納數目勒石署門外復諭民間隱匿地畝限兩年內自首尋又展限兩年諭福建清丈沿海地畝釐定疆界湖南幅員遼闊先飭民人自行丈量官府再事抽丈隱漏者罪之時徵收錢糧官吏往往私行科派其名不一闔邑通里共攤同出者名曰軟撎各里各甲輪流獨當者名曰硬駝於是設滾單以杜其弊其法於每里之中或五戶或十戶一單於某名下註明田地若干銀米若干春秋應各完若干分為十限發與甲首依次滾催自封投櫃一限既定二限又依次滾催其有停擱不完不繳者嚴懲民以為便浙江湖北山東諸省匠班銀均歸入地丁徵收四十五年九江府丈出濱江蘆洲地畝三千餘頃均按下則起科五十一年四川巡撫年羹堯上言四川錢糧原額百六十一萬兩有奇現僅徵及十分之一宜立勸懲法五年內增及原額之四五者准升不及二分停升不及一分降調無增者褫其職御史段曦上疏駁之略言川省自經明季兵燹地廣人稀我朝勘定之後雖次清查增報僅及原額十分之一近日撫臣加意催查增至二萬六千餘兩今欲五年內增及原額十之二或十之四五是增現糧三四倍也賢能之吏必罹不及分數之參處不肖者抑勒首報滋擾無窮請川省隱漏錢糧徹底清查不必另立勸懲之法從之五十九年諭嗣後各州縣錢糧隨徵隨解若州縣批解後而布政司抵充雜派扣批不發許州縣逕申督撫次年又令各督撫將倉糧虧空限三年補完聖祖在位六十年政事務為寬大不肖官吏恆恃包荒任意虧欠上官亦曲相容隱勒限追補視為故事世宗在儲宮時即深悉其弊即位後諭戶部工部嗣後奏銷錢糧米石物價工料必詳查覈實造冊具奏以少作多以賤作貴數目不符覈估不實者治罪並令各督撫嚴行稽查所屬虧空錢糧限三年補足毋得藉端掩飾苛派民間限滿不完從重治罪瀕江沿海地定例十年一清丈雍正元年諭令隨時清查坍者豁免漲者升科二年以山西巡撫諾敏布政使高成齡請提解火耗歸公分給官吏養廉及其他公用火耗者加於錢糧正額之外蓋因本色折銀鎔銷不無折耗而解送往返在在需費州縣徵收不得不稍取盈以補折耗之數重者數錢輕者錢餘行之既久州縣重歛於民上司苛索州縣一遇公事加派私徵名色繁多又不止於重耗而已康熙季年陝甘總督年羹堯請酌留秦省火耗充各官用度餘者捐出彌補虧空聖祖不許至是諾敏等復以為言詔從其請諾敏又請限定分數帝以酌定分數則將來竟成定例必致有增無減今耗羨與正項同解州縣皆知重耗無利於己孰肯加徵若將應得之數扣存勢必額外取盈浮於應得之數於是定為官給養廉之制河南巡撫石文焯請將捐穀耗羨充公帝曰耗羨存庫所以備地方公用也國家經費自有常額豈可以耗羨牽入正項致滋另取挪移諸弊乎又諭戶部曰州縣虧空錢糧有闔屬百姓代償者名曰樂捐實無異強派應飭禁止蘇松浮糧多於他省詔蠲免蘇州額徵銀三十萬松江十五萬永著為例江蘇巡撫張楷疏言江蘇每年額賦除蠲免浮糧外應實徵銀三百五十萬有奇歷年積欠八百八十一萬有奇計已達千二百餘萬竭小民一歲所獲勢難全完現籌徵收之法本年新糧責令全完舊欠勻作十分自明年始年徵其一十年而畢每歲奏銷時另冊造報嘉定一縣積欠至百四十餘萬請勻作十五分分徵上海崑山常熟華亭宜興吳江武進婁長洲九縣皆積至四十萬應勻作十二分分徵以紓民力帝深納之各省中賦稅繁重蘇松而外以浙江嘉湖二府為最五年詔減十之一共銀八萬餘兩又命浙省南秋等米每年額徵作十分覈算別為一本題銷如完解不全罪承督各官各省錢糧完欠細數官吏多不宣示胥吏因緣為奸虧空拖欠視為故常詔各督撫布政飭州縣官每年將各鄉里完欠之數呈送覆覈張貼本里俾民周知如有中飽許人民執串票具控其分年帶徵之項亦應將花戶每年應完之數詳列榜示俾不得額外溢徵七年蠲浙江額賦十之三共十萬兩其江蘇逋賦自壬子年始侵蝕包攬之項分十年帶徵實在民欠之項分二十年帶徵本年完納之項若干次年即依其數蠲免額徵之糧如額外多完次年亦按多完之數蠲免十一年安徽巡撫徐本條陳徵糧事宜一州縣徵收糧櫃請逕用州縣封條二花戶完糧宜仍用三聯串票三小民零星錢糧一錢以下者許其變通完納制錢許之十二年修賦役全書凡額徵地丁錢糧商牙課稅內應支官役俸工驛站料價以及應解本折絹布顏料銀硃銅錫茶蠟等項分晰原額新徵總散之數務為精覈自後十年修輯一次江南湖廣等省蘆洲坍漲靡定定制五年一清丈不肖官吏恆藉以納賄舞弊乾隆元年下詔清查又禁各省虛報開墾大學士朱軾請禁民間田地丈量首報御史蔣炳奏州縣徵糧三弊一田畝科則不同請每年照部頒定額覈明刊示一州縣拆封如有短平即於袋面註明數目令花戶自行補交一州縣設立官匠傾銷銀兩勒索包完侵漁重利嗣後准花戶隨處傾銷官匠永行禁革皆從之諭改減江南浙江白糧十二萬石免蘇松浮糧額銀二十萬石自山西提解火耗後各直省次第舉行其後又酌定分數各省文職養廉二百八十餘萬兩及各項公費悉取諸此及帝即位廷臣多言其不便帝亦慮多取累民臨軒試士即以此發問復令廷臣及督撫各抒所見大學士鄂爾泰刑部侍郎錢陳羣湖廣總督孫家淦皆言耗羨之制行之已久徵收有定官吏不敢多取計已定之數與未定以前相較尚不逮其半是迹近加賦而實減徵也且火耗歸公一切陋習悉皆革除上官無勒索之弊州縣無科派之端小民無重耗之累法良意美可以垂諸久遠御史趙青藜亦言耗羨歸公裒多益寡寬一分則受一分之賜且既存耗羨之名自不得求多於正額之外請無庸輕議變更惟御史柴潮生以為耗羨乃今日大弊詔從鄂爾泰諸臣議先是各省解京餉銀有隨平陋規雍正初曾有詔禁止嗣因清查部庫虧空二百五十餘萬怡親王議以京餉平餘彌補每餉銀千兩收平餘二十五兩俱於耗羨內動支起解較從前陋規減省已多尋以彌補足額減收其半至是停止解部存儲司庫以充本省賑濟荒災及裨益民生之舉自明以來江南歲額錢糧地丁漕項蘆課雜稅之外復有所謂雜辦者發目甚多彙入地丁分數奏銷逮編賦役全書止載應解之發未列雜辦原委至是乃妥定章程以杜浮收其實在缺額有累官民者豁免之禁州縣徵糧浮收零尾十二年大學士訥親等議江蘇錢糧拖欠至二百餘萬不免吏役侵蝕酌定自首減免之條復諭黃廷桂等釐剔江蘇催徵諸弊各省積欠錢糧歲終奏報然必待次歲五月奏銷方能定完欠實數諭嗣後各省每年完欠錢糧隨奏銷時覈實具奏毋庸循歲終奏聞之例二十二年免江南乾隆十年以前積欠漕項銀米地價耗羨江蘇巡撫陳宏謀奏江蘇錢糧積年未能歸款由於州縣案卷任書承攜貯私室以致殘缺無由查考應嚴飭各州縣將卷宗黏連蓋印妥存署中至江省用發繁多州縣不免借墊嗣後仍令隨時詳請抵兌逾四月不詳報數達五百兩以上者參處遲至一年並府州題參均如所議行三十年諭奏銷冊前列山地田蕩版荒新墾次列三門九則額徵本折地丁起解存留至為明晰令嗣後刊刻賦役全書以奏銷條發為式止將十年內新坍新墾者添註其瑣碎不經名目概刪除之戶部議定各省徵收錢糧及一切奏銷支放等事凡銀悉以釐為斷不及釐者折衷歸減米糧以勺為斷奇零在五秒以上者作為一勺不及五秒者刪除搭放俸餉制錢以一文為止而冊內有絲毫忽微虛數一併刪除至各州縣衞所應徵銀兩統令於由總單數下將奇零歸減其單內前列細數仍存其舊期與賦役全書魚鱗冊數相符三十三年諭直省勳田令民戶首報一體輸納三十六年以比歲蠲免天下錢糧民力饒裕令各督撫值輪免之年將緩帶款項務催徵完納毋致次年有新舊同徵之累四十七年御史鄭澂請令督撫清查倉庫如有虧缺本員治罪償補督撫從重議處並加倍分賠仍令各州縣將倉庫實貯之數三月彙報督撫隨時督覈山東州縣恆多虧挪倉庫之弊並有本無虧短於離任時假捏虧數私立欠約移交後任以為肥橐之計者請飭下各督撫查有前任虧缺後任有欠約可憑者除責成後任彌補外仍令前任照數追繳入官以杜短交濫接之弊帝嘉納之嘉慶初復令各督撫於地方官交代如限內未能交清應將該員截留俟款項交清方准赴任回籍並禁止私立議單自是以後禁網益密矣御史彭希洛奏各省錢糧多有浮收之弊諭嗣後各督撫務於開徵前按時價覈實換銀上庫之數榜示通衢納銀折錢聽民自便時各省地方官吏於應徵錢糧往往挪移新舊以徵作欠自三四年以來積欠至兩千餘萬有詔將各省歷年積欠在民在官一體清查或留貯或撥解違者罪之戶部奏近五年各省耗羨盈餘內借發請責成督撫查明補歸原發並將動支耗羨之發酌量刪減其各項存貯閒款並詳列以聞直隸清查各屬歷年虧短數達巨萬安徽倉庫虧缺各項銀百八十餘萬帝諭新虧各員自本年始限四年完繳舊虧未完者每年酌扣司道府州縣養廉九五成存庫歸款部奏直隸等十五省除緩徵帶徵其未完地丁餘尚有八百七十餘萬而十二年分又續增未完地丁銀二百九十餘萬帝以上官於經徵之員參限將滿即設法調署俾接署者另行起限州縣藉是規避令嗣後州縣調署須先查任內果無應徵未完錢糧咨部覈明毋得於參限屆滿時違例調署給事中趙佩湘奏各省虧空輾轉清查多致縣宕請嚴行飭禁先是直隸因州縣虧欠倉庫密令大吏清查分別追賠其後各省援例請立局清查挪新掩舊弊竇潛滋甚有借名彌補暗肆朘削者故佩湘以為言帝諭直隸三次清查案內未完各款分期勒令歸補逾限不完者即責成所管上司攤賠自後永罷清查有瀆請者罪之十七年戶部綜計各省積欠錢糧及耗羨雜之數安徽山東各四百餘萬江寧江蘇各二百餘萬福建直隸廣東浙江江西甘肅河南陝西湖南湖北積欠百餘萬數十萬數萬不等帝以大吏督徵不力切責之並令戶部於歲終將各省原欠已完未完各數詳列以聞各省逋賦以江蘇為最多巡撫朱理奏酌定追補之制分年補完杜絕新虧然屬員掩視拖延如故直隸自二年至十八年積欠銀三百四十餘萬米糧等項十四萬餘石總督那彥成疏請酌予蠲免詔嚴行申飭山東州縣虧欠新舊六百餘萬兩一縣有虧至六萬餘兩乃嚴定科條虧缺萬兩者斬監候二萬以上者斬決所虧之數勒限監追限內全完貸死仍永不用逾限不完斬無赦御史葉中萬請清釐藩庫借發胡承珙請整頓直隸虧空諸弊時各省藩庫因州縣有急需往往濫行借發日久未歸展轉挪抵弊混叢生而攤捐津貼名目日增州縣派累繁多辦事竭蹶虧欠正項勢所必然雖嚴刑峻法不能禁也當乾隆之季天下承平庶務充阜部庫帑項積至七千餘萬嘉慶中川楚用兵黃河泛濫大役頻興費用不貲而逋賦日增月積倉庫所儲亦漸耗矣道光二年御史羅宸條陳直省解徵錢糧請仿鹽引茶引法防官吏侵蝕帝以紛擾不許革州縣糧總庫總從御史余文銓請也乾隆初州縣徵收錢糧尚少浮收之弊其後諸弊叢生初猶不過就斛面浮收未幾遂有折扣之法每石折耗數升漸增至五折六折餘米竟收至二斗五升小民病之廷議八折徵收以為限制浮收之計大學士湯金釗疏駁之御史王家相亦言八折之議行之常鎮江淮揚徐等府或可嘗試蘇松糧重之地窒礙孔多議遂寢時東南財賦之區半遭蹂躪未被兵州縣又苦貪吏浮收勒折民怨沸騰聚衆戕官之事屢起州縣率以抗糧為詞藉掩其浮勒之咎江蘇蘇松等屬每遇蠲緩書吏等輒向業戶索錢名曰賣荒納錢者雖豐收仍得緩徵不納者縱荒歉不獲查辦詔並禁之湖北漕務積弊已久巡撫胡林翼疏請折漕革除規費民間減錢百四十餘萬千文國帑增銀四十餘萬兩節省提存銀三十餘萬兩詔襃美之軍興以後四川等省辦理借徵以充兵餉裕瑞奏請勸諭紳民按糧津貼罷借徵英桂奏交納錢糧半銀半錢之制而官取民仍以銀每錢二千作銀一兩耗銀無出請於應入撥之地丁准搭官票不入撥之耗羨仍徵實銀部臣以辦法兩歧請依原章正雜錢糧一體搭交官票然地方官吏仍收實銀而以賤值之票交納藩庫帝令嚴禁同治元年清查直省錢糧二年兩江總督曾國藩江蘇巡撫李鴻章疏言蘇松太浮賦上溯之則比元多三倍比宋多七倍旁證之則比毘連之常州多三倍比同省之鎮江等府多四五倍比他省多一二十倍不等其弊由於沿襲前代官田租額而賦額遂不平也國初以來承平日久海內殷富為曠古所罕有故乾隆中年以後辦全漕者數十年無他民富故也至道光癸未大水元氣頓耗然猶勉強枝梧者十年逮癸巳大水而後無歲不荒無縣不緩以國家蠲減曠典遂為年例部臣職在守法自宜堅持不減之名疆臣職在安民不得不為暗減之術始行之者前督臣陶澍前撫臣林則徐也又官墊民欠一發不過移雜墊正移緩墊急移新墊舊移銀墊米以官中之錢完官中之糧將來或豁免或攤賠同歸無着故歷年糧冊必除去墊欠虛數方得徵收實數蘇屬全漕百六十萬厥後遂積漸減損道光辛卯以後十年連除官墊民欠得正額之七八辛丑以後十年除墊欠得正額之五六咸豐辛亥十年除墊欠僅得正額之四成而已自粵逆竄陷蘇常焚燒殺掠慘不可言臣親歷新復州縣市鎮丘墟人煙寥落已復如此未復可知而欲責以數倍他處之重賦向來暴徵之吏亦無骨可敲無髓可吸矣細核歷年糧數咸豐十年中百萬以上者僅一年八十萬以上者六年皆以官墊民欠十餘萬在其中是最多之年民完實數不過九十萬也成案如是民力如是惟籲請准減蘇松太三屬糧額以咸豐中較多之七年為准折衷定數總期與舊額本經之常鎮二屬通融覈計著為定額即以此後開徵之年為始永遠遵行不准再有墊完民欠名目嗣後非水旱亦不准捏災俾去無益之空籍求有着之實徵至蘇松漕糧核減後必以革除大小戶名為清釐浮收之原以裁減陋規為禁止浮收之委制可先是太常卿潘祖蔭御史丁壽昌交章言減賦事皆下部議覆奏准蘇松減三之一常鎮減十之一大抵蘇松太一畝之稅最重者幾至二斗輕者猶及一斗列朝屢議覈減率為部議所格雍正間從怡親王請免蘇松兩府額徵銀乾隆間又減江蘇省浮糧皆減銀而不及米至是詔下百姓莫不稱慶三年從閩浙總督左宗棠請諭紹興屬八縣六場正雜錢糧統照銀數徵解革除一切攤捐及陋規計減浮收錢二十二萬有奇米三百六十餘石寧波屬一廳五縣六場減浮收錢十萬四千有奇米八百餘石四年浙江巡撫馬新貽請豁減金華浮收錢十五萬餘串米五百餘石衢州錢十萬餘串米六十餘石嚴州錢六萬餘串米六千餘石洋銀八十餘元米百餘石從之是年宗棠克湖州疏言南漕浮收過多請痛加裁汰事下部議覆奏杭嘉湖漕糧請仿江蘇例減原額三十分之八並確查賦則按輕重量為覈減所有浮收陋規悉予裁汰其南匠米石無庸議減計三府原額漕白行月等米百萬餘石按三十分之八共減米二十六萬六千餘石國藩請將蘇松等屬地丁漕項一體酌減不許自乾嘉以來州縣徵收錢糧多私行折價一石有折錢至二十千者咸豐中胡林翼始定核收漕糧每石不得過六千錢其後山東亦定每石收錢六千江蘇定每石年內完者收四千五百年外收五千江西收錢三千四百河南每石折銀三兩安徽二兩二錢漕糧浮收其來已久河運海運皆有津貼嘉興一郡徵漕一石有津貼至七錢以上者又徵收漕糧例有漕餘其數多寡不一大抵視缺分肥瘠為準歷來本折並收而折色浮收較本色更重自正額減折價定遂漸少浮收之弊直隸奉天多無糧之地名曰黑地或旗產日久迷失或山隅海涘新墾之田咸豐季年寶鋆等查出昌平黑地四百四十餘頃試辦升科詔直隸總督盛京將軍順天奉天各府尹一體辦理同治初令黑地業戶各赴所管官署呈報升科許永遠為業御史陳寯奏直隸奉天除昌平外呈報升科者寥寥蓋由地方官吏徵收入己延不具報甚有將報地人抑勒刑逼諸弊帝遣大臣分查大學士倭仁疏陳黑地升科州縣畏難苟安請申明賞罰尋定州縣查出隱地逾二十頃優升科地多者奬之有徇隱匿墾吏胥詐賕以溺職論其無賴假稱委員恐嚇得贓照例嚴懲德宗即位之初復新疆籌海防國用日增戶部條陳整頓錢糧之策略云溯自髮逆之平垂二十年正雜錢糧期可漸復原額乃考覈正雜賦稅額徵總數歲計三千四百餘萬兩實徵僅百四十五萬兩賦稅虧額如此財既不在國又不在民大率為貪官墨吏所侵蝕約而言之其弊有五一曰報荒不實二曰報災不確三曰捏作完欠四曰徵存不解五曰交代宕延覈計近年賦稅短徵以安徽及江蘇之江寧為最蘇州江西次之河南又次之多者所收不及五分少者亦虧一二分不等請飭各督撫藩司認真釐剔以裕度支詔從其請然終清之世諸弊卒未能盡革也二十年中日之戰賠兵費二萬萬二十六年拳匪肇禍復賠各國兵費四萬五千萬其後練新軍興教育創巡警需發尤多大都就地自籌四川因解賠發而按糧津貼捐輸之又有賠發新捐兩江閩浙湖北河南陝西新疆於丁漕例徵外曰賠發捐曰規復錢價曰規復差徭曰加收耗羨名稱雖殊實與加賦無大異也總計全國賦額其可稽者順治季年歲徵銀二千一百五十餘萬兩糧六百四十餘萬石康熙中歲徵銀二千四百四十餘萬兩糧四百三十餘萬石雍正初歲徵銀二千六百三十餘萬兩糧四百七十餘萬石高宗末年歲徵銀二千九百九十餘萬兩糧八百三十餘萬石為極盛云一曰役法初沿明舊制計丁授役三年一編審嗣改為五年凡里百有十戶推丁多者十人為長餘百戶為十甲甲十人歲除里長一管攝一里事城中曰坊近城曰廂鄉里曰里里長十人輪流應徵催辦錢糧句攝公事十年一周以丁數多寡為次令催納各戶錢糧不以差徭累之編審之法核實天下丁口具載版籍年六十以上開除十六以上添註丁增而賦隨之有市民鄉民富民佃民客民之分民丁外復有軍匠竈屯站土丁名直省丁徭有分三等九則者有一條鞭徵者有丁隨地派者有丁隨丁派者其後改隨地派十居其七都直省徭里銀三百餘萬兩間徵米豆其科則最輕者每丁科一分五釐重至一兩有餘山西有至四兩餘鞏昌有至八九兩者因地制宜不必盡同也三等九則之法沿自前明一條鞭亦同其法將均徭均費等銀不分銀力二差俱以一條鞭從事凡十甲丁糧總於一里各里丁糧總於一州縣而府而布政司通計一省丁糧均派一省徭役里甲與兩稅為一凡一州縣丁銀悉輸於官官為僉募以充一歲之役民不擾而事易集定內外各衙署額設吏役以良民充之吏典由各處僉撥後改為考取或由召募投充役以五年為滿不退者斥革其府州縣額設祗候禁子弓兵免雜派差役又有快手皂隸門卒庫子諸役皆按額召募額外濫充者謂之白役白役有禁然州縣事劇役繁必藉其力不能盡革也又定州縣鋪司及弓兵之制禁止私役禁人民私充牙行埠頭瀕河之地例有夫役守護順治四年以御史佟鳳彩言設直隸沿河隄夫九年河決封丘起大名東昌兗州及河南丁夫數萬塞之十二年增給河夫工食河工用民之例有二曰僉派曰召募僉派皆按田起夫召募則量給雇值其後額設之夫悉給工食由僉派而召募役民給值較古制為善矣十七年禁州縣私派里甲之弊康熙元年令江南蘇松兩府行均田均役法戶科給事中柯聳言任土作賦因田起差此古今不易常法但人戶消長不同田畝盈縮亦異所以定十年編審之法役隨田轉冊因時更富者無兔脫之弊貧者無蝱負之累臣每見官役之侵漁差徭之繁重其源皆由於僉點不公積弊未剔查一縣田額若干應審里長若干每里十甲每甲田若干田多者獨充一名田少者串充一名其最零星者附於甲尾名曰花戶此定例也各項差役俱由里長挨甲充當故力不勞而事易集獨蘇松兩府名為僉報殷實竟不稽查田畝有田已賣盡而報里役者有田連阡陌全不應差者年年小審挪移脫換叢弊多端田歸不役之家役累無田之戶以致貧民竭骨難支逃徙隔屬今當大造之年請飭撫臣通行兩府按田起役毋得憑空僉報以滋賣富差貧之弊其他花分子戶詭寄優免隔屬立戶買充冊書諸弊宜嚴加禁革下部議行六年嚴禁江西提甲累民提甲之說在明曰提編現年追比已完復提次甲責成備辦廣信諸府有連提數甲者實與加派無二以御史戈英言罷之七年定驛遞給夫例凡有驛處設夫役以供奔走其額視路之衝僻為衡日給工食皆入正賦編徵此項人夫大率募民充之差役稍繁莫不臨時添雇水驛亦然十二年停河南僉派河夫按畝徵銀以抵雇值十六年河道總督靳輔上言河工興舉向俱勒州縣派雇里民用一費十今兩河並舉日需夫十餘萬乃改僉派為雇募多方鼓舞數月而工成大工用雇募自輔始是年禁有司派罰百姓修築城𣛀二十九年以山東巡撫佛倫言令直省紳衿田地與人民一律差徭五十一年諭曰海宇承平日久戶口日增地未加廣應以現在丁冊定為常額自後所生人丁不徵收錢糧編審時止將實數查明造報廷議五十年以後謂之盛世滋生人丁永不加賦仍五歲一編審戶部議缺額人丁以本戶新添者抵補不足以親戚丁多者補之又不足以同甲糧多之丁補之雍正初令各省將丁口之賦攤入地畝輸納徵解統謂之地丁先是康熙季年四川廣東諸省已有行之者至是准直隸巡撫李維鈞請將丁銀隨地起徵每地賦一兩攤入丁銀二錢二釐嗣後直省一體仿行於是地賦一兩福建攤丁銀五分二釐七毫至三錢一分二釐不等山東攤一錢一分五釐河南攤一分一釐七毫至二錢七釐不等甘肅河東攤一錢五分九釐三毫河西攤一分六毫江西攤一錢五釐六毫廣西攤一錢三分六釐湖北攤一錢二分九釐六毫江蘇安徽畝攤一釐一毫至二分二釐九毫不等湖南地糧一石徵一毫至八錢六分一釐不等自後丁徭與地賦合而為一民納地丁之外別無徭役矣惟奉天貴州以戶籍未定仍丁地分徵又山西陽曲等四十二州縣亦另編丁銀二年江西巡撫裴度奏裁里長時廷臣有言大小衙署遇有公事需用物件恣行科派總甲串通奸胥從中漁利凡工作匠役皆設立總甲派定當官以次輪轉又設貼差名目不願赴官者勒令出銀大為民害詔並禁止然日久玩生滋擾益甚乾隆元年復有詔申禁又諭各處歲修工程如直隸山東運河江南海塘四川隄堰河南沁河孟縣小金隄等工向皆於民田按畝派捐經管里甲不無苛索嗣後永行停止凡有工作悉動用帑金十年川陝總督慶復奏興修各屬城垣請令州縣捐廉共襄其事帝曰各官養廉未必有餘名為幫修實派之百姓其弊更大不許乃定各省城工千兩以下者分年修補土方小工酌用民力餘於公項下支修二十二年更定江西修隄力役之法凡修築土隄闔邑共攤夫從糧徵聽官按隄攤分募夫修築從巡撫胡寶瑔請也二十五年御史丁田樹言自丁糧歸於地畝凡有差徭及軍需必按程給價無所謂力役之征近者州縣於上官迎送同僚往來輒封拏車船姦役藉票勒派所發官價不及時價之半而守候回空概置不問以致商旅裹足物價騰踊嗣後非承辨大差及委運官物毋得減發官價出票封拏違者從重參處得旨允行三十二年以用兵緬甸經過各地夫馬運送頗資民力特頒帑銀每省十萬分給人民田賦職役本有經制大率東南諸省賦重而役輕西北賦輕而役重直隸力役之征有按牛驢派者有按村莊派者有按牌甲戶口科者間亦有按地畝者然富者地多可以隱匿貧者分釐必科雜亂無章偏枯不公其尤甚者莫如紳民兩歧有紳辦三而民辦七者有紳不辦而民獨辦者小民困苦流離無可告訴時有議仿攤丁於地之例減差均徭每畝一分無論紳民按地均攤直隸總督顏檢力言其不可並謂如議者所言每地一畝攤徵差銀一分其意在藉賦以收減差之實效不知適藉差而添加賦之虛名累官病民弊仍不免疏入議遂寢咸豐時粵西役起征調不時不得不藉民力糧銀一兩派差銀數倍不等事定差徭繁重如故且錢糧或有蠲緩差銀則歉歲仍徵光緒四年山西巡撫曾國荃疏陳晉省瘡痍難復請均減差徭以舒民困其略曰晉省右輔畿疆西通秦蜀軍差餉差藏差絡繹於道州縣供億之煩幾於日不暇給車馬既資之民間役夫亦責之里甲而各屬辦理不同有闔邑里甲通年攤認者資衆力以應役法尚公允有分里分甲限年輪認者初年攤之一甲一里次年攤之二甲二里各年差徭多寡不等即里甲認派苦樂不均豪猾者恃有甲倒累甲戶倒累戶之弊將其地重價出售而以空言自認其糧三五年後乘間潛逃於是本甲既代賠無主之糧又代認無主之差貽害無窮計惟減差均徭尚堪略為補救除大差持傳單勘合循例支應其他概不得藉端苛派如有擅索車馬者治以應得之罪從之五年閻敬銘復條陳八事一裁減例差借差二由臬司發給車馬印票三喇嘛來往須有定班四奉使辦事大臣宜禁濫索五嚴除衙蠹地痞六令民間折交流差錢由衙門自辦七嚴查驛馬足額備用八本省征防各兵給予長車由營自辦下所司議行八年張之洞任山西巡撫復言晉省虐民之政不在賦斂而在差徭向例每縣所派差錢大縣制錢五六萬緡小縣亦萬緡不等按糧攤派官吏朋分衝途州縣設立車櫃追集四鄉牲畜拘留過客車馬或長年抽收或臨時勒價居者行者均受其患現擬籌發生息官設差局嚴定應差章程禁止差員濫支車櫃陋習遂革先是先代陵墓皆設陵戶司巡查灑掃例免差徭又各先賢祠宇凡有祭田皆免其丁糧軍民年七十以上者許一子侍養免其雜泛差役順治二年免直省京班匠價並除其匠籍定紳衿優免例內官一品免糧三十石丁三十二品免糧二十四石丁二十四其下以次遞減外任官減其半十四年部議優免丁徭本身為止雍正四年四川巡撫羅殷泰言川省各屬以糧載丁請將紳衿貢監優免之例禁革部議駁之復下九卿議定紳衿止免本身其子孫族戶冒濫及私立儒戶官戶者罪之乾隆元年申舉貢生監免派雜差之令三十七年停編審造冊時丁銀既攤入地糧而續生人丁又不加賦五年編審不過沿襲虛文無裨實政至是因李瀚言遂罷之翌年陳輝祖請將民屯新墾丁銀隨年攤徵帝以所奏與小民較及錙銖非惠下卹民之道諭嗣後各省辦理丁糧悉仍舊制毋得輕議更張一曰蠲免賦稅蠲免之制有二曰恩蠲曰災蠲恩蠲者遇國家慶典或巡幸或用兵輒蠲其田賦世祖入關首免都城居民被兵者賦役三年順治二年以山西初復免本年田租之半三年收江南免漕糧三之一八年世祖親政給還九省加派額外錢糧免山西荒地額糧一萬五千頃及直隸山東河南陝西荒殘額賦恩蠲災蠲之詔歲數四下康熙十年東巡免蹕路所經今年租十三年蠲免各省八九兩年本折錢糧積欠在民者時海內大定詔用兵以來積欠錢糧悉免之二十七年南巡免江南積欠地丁錢糧及屯糧蘆課米麥豆雜稅三十三年蠲免廣西四川貴州雲南四省應徵地丁銀米四十五年免直隸山東本年積欠錢糧其山西陝西甘肅江蘇浙江安徽江西湖北湖南福建廣東廣西各省自康熙四十三年以前未完地丁銀二百十二萬有奇糧十萬五千石有奇悉行蠲免承平日久戶口漸繁地不加增民生有不給之虞詔直省自五十年始分三年輪免錢糧一周三年中計免天下地丁糧賦三千八百餘萬五十六年免直隸安徽江蘇浙江江西湖廣西安甘肅帶徵地丁屯衞銀二百三十九萬餘兩其安徽江蘇所屬帶徵漕項銀四十九萬餘兩米麥豆十四萬餘石免徵各半五十七年以征策妄阿拉布坦免陝甘明年地丁百八十餘萬聖祖嘗讀漢文帝蠲民田租詔歎曰蠲租乃古今第一仁政窮谷荒陬皆沾實惠然非宮廷力崇節儉不能行此故在位六十年中屢頒恩詔有一年蠲及數省者一省連蠲數年者前後蠲除之數殆逾萬萬世宗即位蠲免江蘇各屬歷年未完民屯地丁蘆課等銀千二百十餘萬西藏苗疆平免甘肅四川廣西雲貴五省田租又諭國家經費已敷宜散富於民乃次第免直省額賦各四十萬乾隆元年詔免天下田租先後免雍正十三年以前各省逋賦及江南錢糧之官侵吏蝕者四年免直隸本年錢糧九十萬江蘇百萬安徽六十萬正耗一體蠲除十年普免天下錢糧二千八百二十四萬有奇援康熙五十一年之例將各省分為三年以次豁免三十一年詔次第蠲各省漕米五年而徧其例徵折色者亦免之三十五年值帝六旬明歲又際太后八旬照十年之例按各省額賦分三年輪免一周四十二年普免天下錢糧自明年始分三年輪免計二千七百五十九萬有奇各省漕糧自四十五年普免一次四十九年豁免甘肅壓欠起運糧銀百六十餘萬其存留項下民欠銀糧起運項下民欠草束悉免之五十五年高宗八旬詔按各省額徵銀數將所屬各府州縣次第搭配三次按年輪免三年而竣一省之中仍先儘上年災緩之區首先蠲免五十九年普免各省應徵漕糧六十年普免各省積欠及因災緩帶銀千五百五十餘萬兩糧三百八十餘萬石其奉天山西四川湖南廣西貴州六省向無積欠免下年正賦十之二又以明年將歸政免嘉慶元年各省應徵地丁錢糧其省方時巡蹕路所經輒減額賦十之三仁宗即位以湖北湖南教匪苗民蠢動免次年兩省錢糧並及川陝被兵之區四年以郊祀升配禮成普免各省積欠緩徵地丁耗羨及民欠籽種口糧漕糧銀並積欠緩徵民借米穀草束十年謁祖陵免蹕路所經州縣錢糧之半二十四年以六旬萬壽免天下正耗民欠及緩帶銀穀計銀二千一百二十九萬兩有奇米穀四百餘萬石四川貴州兩省無民欠免明年正賦十之二災蠲有免賦有緩徵有賑有貸有免一切逋欠清初定制凡遇災蠲起運存留均減存留不足即減起運順治初定被災八分至十分免十之三五分至七分免二四分免一康熙十七年改為六分免十之一七分以上免二九分以上免三雍正六年又改十分者免其七九分免六八分免四七分免二六分免一然災情重者率全行蠲免凡報災夏災以六月秋災以七月既報督撫親蒞災所率屬發倉先賑然後聞康熙三年戶部奏遇災之地先將額賦停徵十之三以待題免四年御史郝維訥請凡災地田賦免若干丁亦如之其後丁隨地起凡有災荒皆丁地並蠲旨下之日州縣不即出示或蠲不及數納不留抵者科以侵欺之罪乾隆元年安徽布政使晏斯盛請嗣後各省水旱應免錢糧之數於具題請賑日始限兩月造報並請將丁銀統入地糧銀內覈算蠲免從之聖祖高宗兩朝次普免天下錢糧其因偏災而頒蠲免之詔不能悉舉仁宗之世無普免而多災蠲有一災而免數省者有一災而免數年者文宗以後國用浩繁度支不給然遇疆臣奏報災荒莫不立予蠲免若災出非常或連年饑饉輒蠲賑兼施云倉庫京師及各直省皆有倉庫倉京師十有五在戶部及內務府者曰內倉曰恩豐此外曰祿米曰南新曰舊太曰富新曰興平曰海運曰北新曰太平曰本裕曰萬安曰儲積曰裕豐曰豐益在通州者曰西倉曰中倉各省漕運分貯於此直省則有水次倉七曰德州曰臨清曰淮安曰徐州曰江寧各一惟鳳陽設二為給發運軍月糧並駐防過往官兵糧餉之需其由省會至府州縣俱建常平倉或兼設裕備倉鄉村設社倉市鎮設義倉東三省設旗倉近邊設營倉瀕海設鹽義倉或以便民或以給軍大抵京通兩倉所放米曰官俸曰官糧亦名甲米二者去全漕十之六其一養工匠名匠米其一定鼎時宗臣封親王者六封郡王者二世宗之弟封親王者一此九王子孫自適裔外並有封爵以世降而隨之統名恩米二者去京倉百之一是以雍正以前太倉之粟常有餘乾隆二十八年戶部侍郎英廉疏言邇年因賑恤屢截留漕運間遇京師糧貴復發內倉米石平糶儲積漸減請於湖廣江西江南浙江產米之區開捐貢監均收本色收足別貯遇截漕之年即於次年照數補運京倉下九卿議准旋復停止及嘉慶中川楚盜起水旱間作工匠既倍於昔而九王之後亦愈衍愈衆咸豐後復有粵寇之亂運道不通倉儲益匱亂平稍復舊例向京師平糶有五城米局八旗米局五城米局始於康熙雍正四年於內城添廠並添五城通州廠各一乾隆二年增五城為十廠尋又添設八廠於四鄉九年於四路同知設四廠八旗米局凡二十四又通州左右翼兩局皆設於雍正六年乾隆元年併為八局旋仍舊十五年命二十四局分左右翼辦理不拘旗分十七年以米價未平且有勒買之弊諭併通州兩局停止其直省常平裕備等倉順治十一年命各道員專管每年造冊報部十七年戶部議定常平倉穀春夏出糶秋冬糴還平價生息凶歲則按數給散貧戶康熙六年甘肅巡撫劉斗疏言積米年久恐浥爛請變價糴新穀從之七年陝西巡撫賈漢復請將積穀變價生息帝諭出陳入新原以為民若將利息報部反為民累著停止生息十九年諭常平倉留本州縣備賑義倉社倉留本村鎮備賑三十年戶部議令直隸所捐米石大縣存五千石中縣四千小縣三千嗣又令再加貯一倍三十一年議定州縣積穀照正項錢糧交代短少以虧空論三十四年議定江南積穀每年以七分存倉三分發糶並著為通例四十三年議定州縣倉穀霉爛者革職留任限一年賠完復職逾年不完解任三年外不完定罪著落家產追賠時各省州縣貯穀之數山東山西大州縣二萬石中州縣萬六千石小州縣萬二千石江西大州縣一萬二千石江蘇四川率不過五六千石而福建現在捐穀二十七萬石常平又存五十六萬石臺灣捐穀及常平為最多共八十餘萬石令酌留三年兵需餘變價充餉四十七年議定州縣官於額貯外加買貯倉准其議若捐穀以少報多或將現貯米捏作捐輸後遇事發除本管知府分賠外原報督撫一併議處至官將倉穀私借於民計贓以監守自盜論穀石照數追賠五十四年議定紳民捐穀按數之多寡由督撫道府州縣分別給扁永免差役雍正三年以南方潮溼令改貯一米易二穀四年浙閩總督高其倬疏言閩省平糴有二大病一交盤之弊不清各官授受皆有價無穀而價又不敷買補一平糶之價太賤每石減價至一兩且有不及一兩者各屬雖欲買補緣價短束手而姦民乘此謀利往往借價貴煽惑窮民竟欲平糶之期一歲早於一歲平糶之價一年賤於一年請嗣後視米之程高下每石以一兩二錢或一兩三錢穀則定以六錢五分或六錢總以秋成後既平之價為準帝韙其言尋定州縣倉厫不修致米穀霉爛者照侵蝕科斷並將虧空各州縣解任其穀令自行催還限以一年逾限者治罪五年定各省常平倉每年底令本府州盤查如春借逾十月不完或捏造俱行參處照數追賠又因福建常平倉各屬有銀穀兩空者有無穀而僅存價者查實將虧空之州縣官更換十三年內閣學士方苞上平糶倉穀三事一倉穀每年存七糶三設遇價昂必待申詳定價窮民一時不得邀惠請令各州縣酌定官價一面開糶一面詳報一江淮以南地氣卑溼若通行存七糶三恐積至數年必有數百萬霉爛之穀有司懼罪往往以既壞之穀抑派鄉戶請飭南省各督撫驗察存倉各穀色因地分年酌定存糶分數河北五省倘遇歲歉亦不拘三七之例一穀之存倉有鼠耗盤糧有折減移動有脚價糶糴守局有人工食用春糶之價即稍有贏餘亦僅足充諸費請飭監司郡守歲終稽查但數不虧不得借端要挾倘逢秋糴價賤除諸費外果有贏餘詳明上司別貯以備歉歲之用下部議行乾隆三年兩江總督那蘇圖疏言平糶之事止須比市價酌減一二分兩廣總督鄂彌達亦言平糶之價不宜頓減蓋小民較量錙銖若平糶時官價與市價懸殊則市儈必有藏以待價而小民藉以舉火者必皆仰資官穀倉儲有限商販反得居奇是欲平糶而糶仍未平也從來貨積價落民間既有官穀可糴不全賴鋪戶之米鋪戶見官穀所減有限亦必稍低其價以冀流通請照市價止減十一以次遞減期年而止則鋪戶無所操其權而官穀不至虞其匱均報可七年諭從前張渠奏請減價糶穀成熟之年每石照巿價減五分米貴之年減一錢但思歉歲止減一錢窮民得米仍艱嗣後著督撫臨時酌量應減若干奏明請旨如有奸民賤糴貴糶嚴拏究治十三年高宗諭大學士戶部曰邇來常平倉額日增有礙民食嗣後應以雍正年間舊額為准尋議雲南不近水次陝甘兼備軍務向無定額請以現額為准雲南七十萬石西安二百七十萬石甘肅三百七十萬石各有奇又福建環山帶海商運不通廣東嶺海交錯產穀無幾貴州不通舟楫積貯均宜充裕以現額為准福建二百五十餘萬石廣東二百九十餘萬石貴州五十萬石其餘照雍正年間舊額直隸二百一十萬石奉天百二十萬石山東二百九十萬石山西百三十萬石河南二百三十萬石江蘇百五十萬石安徽百八十萬石江西百三十萬石浙江二百八十萬石湖北五十萬石湖南七十萬石四川百萬石廣西二十萬石各有奇通計十九省貯穀三千三百七十餘萬石較舊額四千四百餘萬石應減貯千四百餘萬石自是各省或額缺不補二十三年特諭採買還倉三十一年各省奏銷報實存穀數惟江西河南廣東與十三年定額相同其視舊額增多者湖南百四十三萬石山西二百三十萬石四川百八十五萬石廣西百八十三萬石雲南貴州皆八十餘萬石而浙江視舊額減少二百二十萬石奉天減少百萬甘肅減少百四十萬其直隸江蘇安徽福建湖北山東陝西或減二十萬或減五六十萬蓋聚之難而耗之易如此嘉慶初仁宗屢下買補之令四年諭曰國家設立常平倉若不照額存儲僅將穀價貯庫猝遇需米之時豈銀所能濟用命各省採買還倉十七年戶部浙江司所存常平倉穀數凡三千三百五十萬八千五百七十五石有奇去乾隆中定額猶不遠至道光十一年副都御史劉重麟御史卞士雲先後疏言各直省州縣於常平倉大率有價無穀其價又不免侵用帝命各督撫嚴覈究治然據十五年戶部奏查各省常平倉穀實數仍止二千四百餘萬石又非嘉慶時可比況咸豐間天下崩亂之日乎同治三年諭近來軍務繁興寇盜𧔧起所至地方輒以糧盡被陷其故由各州縣恣意侵挪遇變無所依賴嗣後各省常平倉責成督撫認真整頓迨光緒初直隸河南陝西山西迭遭旱災饑民死者日近萬人四年給事中崔穆之八年御史鄔純嘏復先後請籌辦倉穀於是各督撫始稍加意焉其社義各倉起於康熙十八年戶部題准鄉村立社倉市鎮立義倉公舉本鄉之人出陳易新春日借貸秋收償還每石取息一斗歲底州縣將數目呈詳上司報部六十年奉差山西左都御史朱軾奏請山西建立社倉諭曰從前李光地以社倉具奏朕諭言易行難行之數年果無成效張伯行亦奏稱社倉之益朕令伊暫行永平地方其有效與否至今未奏凡建設社倉務須選擇地方敦實之人董率其事此人並非官吏借出之米還補時遣何人催納即豐收之年尚難還補何況歉歲其初將衆人米穀扣出收貯無人看守及米石缺空勢必令司其事者賠償是空將衆人之米棄於無用而司事者無故為人破產賠償也社倉之法僅可小邑鄉村若由官吏施行於民無益今朱軾復以此為請即令伊久住山西鼓勵試行雍正二年諭湖廣總督楊宗仁湖北巡撫納齊喀湖南巡撫魏廷珍等前命建社倉本為民計勸捐須俟年豐如值歉歲即予展限一切條約有司勿預庶不使社倉頓成官倉今乃令各州縣應輸正賦一兩者加納社倉穀一石聞楚省穀石現價四五錢不等是何異於一兩正賦外加收四五錢火耗耶尋議定凡州縣官止任稽查其勸奬捐輸之法自花紅遞加扁額以至八品冠帶如正副社長管理十年無過亦以八品冠帶給之其收息之法凡借本穀一石冬間收息二斗小歉減半大歉全免祗收本穀至十年後息倍於本祗以加一行息三年從江蘇巡撫何天培請止頒行社倉五事一賑貸均預造排門冊存案一正副社長外再舉一殷實者總司其事一州縣官不許干預出納一所需紙筆必勸募樂輸或官撥罰項充用一積穀既多應於夏秋之交減價平糶秋收後照時價買補五年因湖廣社倉虧空諭邇年督撫辦社倉最力者惟湖廣總督楊宗仁今據福敏盤查始知原報甚多而現貯無幾朕思舉行此法實難我聖祖仁皇帝深知之是以李光地奏請而未允張伯行暫行而即罷蓋在富民無藉乎倉則輸納不前而貧者又無餘粟可納至於州縣官實心者豈可多得湖廣虧缺之數倘係州縣私用必嚴追賠補或民間原未交倉或交倉之數與原報多寡不符若令照數完納恐力未敷須斟酌辦理六年世宗諭曰前岳鍾琪請於通省加二火耗內應行裁減每兩五分之數且暫徵收發民買穀分貯社倉俟數足即行裁減是以暫收耗羨之中隱寓勸輸之法實則應行斟酌之耗羨即小民切己之貲財而代民買貯之倉儲即小民自捐之積貯乃陝省官員以為收貯在官即是官物而胥吏司其出納者遂有勒買勒借之弊今特曉示鐫石頒布儻地方官有如前者以撓擾國政貽誤民生治罪乾隆四年戶部議准陝西巡撫張楷奏定社倉事例一社長三年更換一春借時酌留一半以防秋歉一限每年清還一將借戶穀數姓名曉示一令地方官稽查交代分賠五年議定陝甘社穀凡係民間者聽自擇倉正副管理其係加二耗糧內留五分為社糧者責成地方官經理入於交代自是之後州縣官視同官物凡遇出借層遞具詳雖屬青黃不接而上司批行未到小民無由借領此後應請令州縣於每年封印後酌定借期一面通詳一面出借其期按耕種遲早以為先後得旨允行十八年直隸總督方觀承疏言義倉始於隋長孫平至宋朱子而規畫詳備雖以社為名實與義同例其要在地近其人人習其事官之為民計不若民之自為計故守以民而不守以官城之專為備不若鄉之多為備故貯於鄉而不貯於城今使諸有司於四鄉酌設粟黍從便並選擇倉正副管理不使胥吏干預現據報捐穀數共二十八萬五千三百餘石合百四十四州縣衞所共村莊三萬五千二百一十為倉千有五帝嘉之三十七年戶部議准社倉仍令官經理出納嘉慶四年又議准社義各倉出納由正副長經理止呈官立案道光五年安徽巡撫陶澍疏言義倉苟欲鮮弊惟有秋收後聽民間量力輸捐自擇老成者管理不減糶不出易不借貸專意存貯以待放賑如所議行其後軍興各省皆廢同治六年特諭興復光緒中惟陝西巡撫馮譽驥所籌建者千六百餘所為最多云其旗倉在東三省者初皆貯米二千萬石營倉自康熙二十二年始時山海關各口建倉達於黑龍江墨爾根三十年令江寧京口等處各截留漕米十萬石存貯三十六年諭沿邊衞堡如榆林等處均貯穀四十九年以湖南鎮筸改協為鎮撥借帑銀三千兩買穀貯倉五十四年命貯米密雲古北口雍正三年貯穀歸化城土拉庫四十七年先後命廣東提標各營暨諸鎮協均貯穀其後復推行貴州四川浙江福建河南十一年命喜峯口貯穀乾隆元年設河標營倉十一年又命山東河標設立鹽義倉自雍正四年始時兩淮衆商捐銀二十四萬為江南買穀建倉之用巡鹽御史噶爾泰以聞並繳公務銀八萬共三十二萬諭以三萬賞給噶爾泰餘照所請賜名鹽義既而浙江衆商亦捐銀十萬諭巡撫李衞於杭州建倉乾隆九年又准山東票商倣行庫之在京師屬內務府者設御用監掌之順治十六年改為廣儲司十八年分設緞庫銀庫皮庫衣庫康熙十八年增設茶庫磁庫合之為六其屬於戶部者曰銀庫曰緞庫曰顏料庫合之為三此外盛京戶部銀庫貯金銀幣帛顏料等物以供二陵祭祀及東三省官兵俸餉賞賚之用各省將軍副都統城守尉庫各貯官兵俸餉及雜稅官莊糶買糧價布政使司庫貯各州縣歲徵田賦雜賦銀按察司庫貯贓罰銀錢糧道庫貯漕賦銀驛站馬夫工料河道庫貯河餉兵備道庫貯兵餉鹽運使司鹽課各稅務由部差者有監督庫如道府廳州縣官兼理者有兼理官庫均貯關鈔地居衝要之分巡道庫府庫直隸州庫及分駐苗疆之同知通判庫均量地方大小距省遠近酌量撥司庫銀分貯州縣衞所庫貯本色正雜賦銀存留者照數坐支輸運者輸布政使司庫凡諸庫每歲出納之數皆造冊送戶部察覈惟贓罰例輸之刑部河工兵餉又兼達兵工兩部戶部於直省庫儲其別有五曰封儲如酌留各布政司銀兩督撫公同封儲有急需題奏動支擅用論斬是也此制定於雍正五年以直隸近京獨無留貯各省自三十萬至十萬析為三等其後直隸亦有之惟盛京戶部銀庫自乾隆四十二年由京撥給一千萬永遠存貯四十三年復命將軍兼管曰分儲如各省道庫府庫封貯銀兩遇州縣急需請領即行發給一面詳報藩司督撫仍令各州縣將支銷銀兩隨案具詳聽覈是也其後各繁劇州縣亦照京縣例撥貯而未有定額及雍正八年乃定各省道府州縣分貯之額自三十萬至十萬析為四等曰留儲如存留屬庫坐支銀兩撥款給發例免解司是也曰解儲如布政使司庫儲府州縣衞解送正雜賦銀按察司庫收贓罰銀及將軍副都統城守尉庫糧道庫收各處移解官兵俸餉漕項等銀是也曰撥儲如各省兵備道庫歲儲由布政司或鄰省撥解官兵銀河道庫歲儲本省及鄰省撥解官兵俸餉並歲修搶修銀及伊犁歲需俸餉銀塔爾巴哈台歲需新餉銀西藏歲需臺費銀雲南歲需銅本銀貴州歲需鉛本銀皆由各省撥解是也戶部總稽之俾慎其收發令各省解部地丁將足色紋銀傾鎔元寶合部頒法馬每枚五十兩勿加滴珠凡起解餉銀布政使親同解官兌封押字令庫官鈐印當堂裝鞘給發兵牌又州縣官錢糧交代由接任官造具接收冊結同監盤官印結上司加結送司詳請咨部不得逾限布政使升轉離任將庫儲錢糧並無虧挪之處附奏其新任接收亦具摺奏聞仍照例限詳題按察使交代由巡撫會同藩司查覈詳題且時其盤查令各督撫於布政使司庫錢糧奏銷交代時親赴盤查具結報題督撫新任亦然府州縣庫儲錢糧奏銷時所管道府親赴盤查結報不得委查取結及預示日期縱令掩飾至戶部銀庫康熙四十五年以貯銀多諭將每年新收銀別行收貯至用銀時將舊銀依次取用乾隆四十一年戶部奏准各直省解京銀兩無論元寶小錠必鏨鑿州縣年月及銀匠姓名嘉慶十九年命各省銀解部隨到隨交道光十二年又命官解官交蓋向來京餉及捐項皆由銀號交庫也然其弊不易革同治三年戶部奏准凡由銀號交庫者均收足色銀兩錠面鏨明某號字樣倘有弊端即照原數加十倍罰賠光緒四年又奏准嗣後各省督撫並各路統兵大臣赴部領餉須遵章遞印領蓋所以重庫儲而杜流弊也
