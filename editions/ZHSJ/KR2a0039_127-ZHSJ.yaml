body:
  text: 清史稿卷一百二十七志一百二河渠二運河運河自京師歷直沽山東下達揚子江口南北二千餘里又自京口抵杭州首尾八百餘里通謂之運河明代有白漕衞漕閘漕河漕湖漕江漕浙漕之別清自康熙中靳輔開中河避黃流之險糧艘經行黃河不過數里即入中河於是百八十里之河漕遂廢若白漕之藉資白河衞漕之導引衞水閘漕湖漕之分受山東江南諸湖水與明代無異嘉慶之季河流屢決運道被淤因而借黃濟運道光初試行海運二十八年復因節省幫費續運一次迨咸豐朝黃河北徙中原多故運道中梗終清之世海運遂以為常夫黃河南行淮先受病淮病而運亦病由是治河導淮濟運三策羣萃於淮安清口一隅施工之勤糜帑之鉅人民田廬之頻歲受災未有甚於此者蓋清口一隅意在蓄清敵黃然淮強固可刷黃而過盛則運隄莫保淮弱末由濟運黃流又有倒灌之虞非若白漕衞漕僅從事疏淤塞決閘漕湖漕但期蓄洩得宜而已至江漕浙漕號稱易治江漕自湖廣江西沿漢沔鄱陽而下同入儀河溯流上駛京口以南運河惟徒陽陽武等邑時勞疏濬無錫而下直抵蘇州與嘉杭之運河固皆清流順軌不煩人力今撮其受患最甚工程最鉅者著於篇順治四年夏久雨決江都運隄隨塞六年夏高郵運隄決數百丈七年運隄潰挾汶水由鹽河入海八年募民夫大挑運河十四年河督朱之錫言南旺南距台莊高百二十尺北距臨清高九十尺應遵定例非積六七尺不准啟閘以免瀉涸閉下閘啟上閘水凝亦深閉上閘啟下閘水旺亦淺重運板不輕啟回空板不輕閉從之十五年董口淤之錫於石牌口迤南開新河二百五十丈接連大河以通飛輓先是漳水於九年從丘縣北流逕青縣入海至十七年春夏之交衞水微弱糧運澀滯乃堰漳河分溉民田之水入衞濟運時河北累年亢旱部司姜天樞言昔僉事江良材欲導河注衞增一運道今獨不可借其議而反用之導衞以注河乎之錫從其言並置衞河主簿著為令康熙元年定運河修築工限三年內衝決參處修築官過三年參處防守官不行防護致有衝決一並參處四年秋高郵大水決運隄五年運河自儀徵至淮淤淺知縣何崇倫募民夫濬之漕督林起龍言糧艘北行處處阻閘阻淺請飭河臣履勘安山馬踏諸湖暨各櫃閘子隄斗門隄岸及東平汶上諸泉有無堵塞務期濬泉清湖以通運道六年決江都露筋廟明年塞之十年決高郵清水潭明年再決十三年始塞十四年決江都邵伯鎮十五年夏久雨漕隄崩潰高郵清水潭陸漫溝江都大潭灣共決三百餘丈十六年以靳輔為河督時東南水患益深漕道益淺輔言河運宜為一體運道之阻塞率由河道之變遷向來議治河者多盡力於漕艘經行之地其他決口以為無關運道而緩視之以致河道日壞運道因之日梗是以原委相關之處斷不容歧視也又運河自清口至清水潭長約二百三十里因黃內灌河底淤高居民日患沈溺運艘每苦阻梗請敕下各撫臣將本年應運漕糧務於明年三月內盡數過淮俟糧艘過完即封閉通濟閘壩督集人夫將運河大為挑濬面寬十一丈底寬三丈深丈二尺日役夫三萬四千七百有奇三百日竣工並堵塞清水潭大潭灣決口六及翟家壩至武家墩一帶決口需帑九十八萬有奇又言向因河身淤墊阻滯盤剝艱苦萬端若清口一律浚深則船可暢行省費甚多因令量輸所省之費作治河之用請俟運河浚深船艘通行凡過往貨物船分別徵納剝淺銀數分一年停止均允行十七年築江都漕隄塞清水潭決口清水潭逼近高郵湖頻年潰決隨築隨圮決口寬至三百餘丈大為漕艘患前年尚書冀如錫勘估工費五十七萬夫柳仍派及民間猶慮功不成輔周視決口就湖中離決口五六十丈為偃月形抱兩端築之成西隄一長六百五丈更挑繞西越河一長八百四十丈僅費帑九萬至次年工竣上嘉之名河曰永安新河隄曰永安隄是歲挑山清高寶江五州縣運河塞決口三十二輔又請按里設兵分駐運隄自清口至邵伯鎮南每兵管兩岸各九十丈責以栽柳蓄草密種菱荷蒲葦為永遠護岸之策又言運河既議挑深若不束淮入河濟運仍容黃流內灌不久復淤請於高堰隄工單薄處幫修坦坡為久遠衞隄計均如所議行十八年決山陽戚家橋隨塞明初江南各漕自瓜儀至清江浦由天妃閘入黃後黃水內灌潘季馴始移運口於新莊閘納清避黃仍以天妃名然口距黃淮交會處僅二百丈黃仍內灌運河墊高年年挑濬無已兼以黃淮會合瀠洄激蕩重運出口危險殊甚至是輔議移南運口於爛泥淺之上自新莊閘西南挑河一至太平壩又自文華寺永濟河頭起挑河一南經七里閘轉而西南亦接太平壩俱遠爛泥淺引河內兩渠並行互為月河以舒急溜而爛泥淺一河分十之二佐運仍挾十之八射黃黃不內灌並難抵運口由是重運過淮揚帆直上如履坦途是歲開滾水壩於江都鰍魚骨創建宿遷桃源清河安東減壩六十九年創建鳳陽廠減壩一碭山毛城鋪大谷山宿遷攔馬河歸仁隄邳州東岸馬家集減壩十一康熙初糧艘抵宿遷由董口北達後董口淤塞遂取道駱馬湖湖淺水面闊縴纜無所施舟泥濘不得前挑掘舁送宿邑騷然輔因創開皂河四十里上接泇河下達黃河漕運便之是歲霪兩淮黃並漲決興化漕隄水入高郵治壞泗州城郭特築滾壩於高郵南八里及寶應之子嬰溝二十年七月黃水大漲皂河淤澱不能通舟衆議欲仍由駱馬湖輔力持不可親督挑掘丈餘黃落清出仍刷成河隨閉皂河口攔黃壩於迤東龍岡岔路口至張家莊挑新河三千餘丈使出皂河石磡之清水盡由新河行至張家莊入黃河是為張莊運口是歲增築高郵南北滾水壩八對壩均開越河以防舟行之險凡舊隄險處皆更以石二十二年九月黃河由龍岡漫入新河又淤隨於石磡築攔黃壩復設法疏導旬餘新河仍暢行二十三年上南巡閱河至清口以運口水緊令添建石閘於清河運口二十五年輔以運道經黃河風濤險惡自駱馬湖鑿渠歷宿遷桃源至清河仲家莊出口名曰中河糧船北上出清口後行黃河數里即入中河直達張莊運口以避黃河百八十里之險議者多謂輔此功不在明陳瑄鑿清口下而按察使于成龍漕督慕天顏先後劾輔開中河累民上斥其阻撓二十七年復遣尚書張玉書圖納左都御史馬齊等往視亦稱中河安流舟楫甚便但逼近黃流不便展寬而𩹉運河及駱馬湖之水俱入此河窄恐難容應於蕭家渡楊家莊新莊各建減壩俾水大可宣洩仲家閘口大直恐倒灌應向東南斜挑以避黃流詔俟臨閱時定奪是歲大雨中河決淹清河民田數千頃明年春上南巡閱視河工至宿遷支河口謂諸臣曰河道關繫漕運民生地形水勢隨時權變今觀此河狹隘逼近黃岸萬一黃隄潰決失於防禦中河黃河將溷為一此河開後商民無不稱便安識日後若何圖納馬齊言臣等勘河時正值大水懼河隘不能容諸水故議於迤北遙隄修減壩三令由舊河形入海輔言臣意開此河可束水入海及濬畢觀之漕艘亦可行今若加增遙堤以保固黃河隄岸當可無慮河督王新命言支河口止一鎮口閘微山湖諸水甚大遇淫潦不能支必致潰決若於駱馬湖作減壩令漲水入黃再修築郯城禹王臺以禦流入駱馬湖之水令注沭河則中河無慮上謂可仍開支河其黃河運道並存不廢先是玉書等請閉攔馬河事下總河至是新命言攔馬河原以宣黃水異漲似應仍留水漲則開放水平則閉以免中河淤墊至駱馬湖三減壩玉書等議留二座於隄內減水入中河又恐中河不能容擬於迤東蕭家渡楊家莊新河口量建減壩宣洩臣謂既以中河不能容何必留此二壩之水減入中河復從蕭家渡等處建壩多此曲折不若將三壩俱留遙隄外令由舊河形入海於蕭家渡三處量留缺口二酌水勢以宣塞之為愈郯城沭水口舊有禹王臺障遏水勢會白馬河沂河之水入駱馬湖愈覺泛溢不可遏應於臺舊基迎水處堵塞斷流令仍由故道入海下扈從諸臣確議惟駱馬湖減壩用玉書等原議餘如新命言三十二年直隸運河決通州李家口等五口天津耍兒渡等八口衞河微弱惟恃漳為灌輸由館陶分流濟運明隆萬間漳北徙入滏陽河館陶之流遂絕至是三十六年忽分流仍由館陶入衞濟運三十八年廷議改高郵減壩及茆家園等六壩均為滾水壩增加高堰石工五尺三十九年上以清口日淤恐誤糧艘海道運津又極艱險擬以沙船載糧自江下海至黃河入海之口運入中河則海運不遠下河督張鵬翮籌議鵬翮言運河決口已塞清水又已引出糧船當可暢達若改載沙船僱募水手徒滋糜費且由江入海從黃河海口入中河風濤不測實屬難行從之初河督于成龍以中河南逼黃河難以築隄乃自桃源盛家道口至清河棄中河下段改鑿六十里名曰新中河至是鵬翮見新中河淺狹且盛家道口河頭灣曲輓運不順因於三義壩築攔河隄截用舊中河上段新中河下段合為一河重加修濬運道稱便四十年以湖口清水已出宜籌節宣之法允鵬翮請於張福口裴家場二引河間再開引河一合力敵黃若黃漲在糧艘已過堵攔黃壩使不得倒灌漲在行船時閉裴家場引河口引清水入三汊河至文華寺濟運是歲建中河口南岸石閘四十二年以仲莊牐清水出口逼溜南趨致礙運道詔移中河運口於楊家莊即大清水故道由是漕鹽兩利逾年又命建直隸運河楊村減壩以分水勢四十四年上言高堰及運河減壩不開放則危及堤堰開洩又潦傷隴畝宜於高堰三滾壩下挑河築隄束水入高郵邵伯諸湖其減壩下亦挑河築隄束水由串場溪注白駒丁溪草堰諸河入海令江漕河各督勘估遣官督修自是淮揚各郡悉免漫溢之患四十五年鵬翮於中河橫隄建草壩二鮑家營引河處建草壩一相機啟閉免中河淤墊又以運河水漲隄岸難容於文華寺建石閘閘下開引河自楊家廟單楊口迄白馬湖長萬四千八百丈有奇水漲開放入湖水涸堵閉是年濟寧道張伯行請引漳自成安柏寺營通漳之新河接館陶之沙河古所謂馬頰河者疏其淤塞使暢流入衞議未及行越二年全漳入館陶漳衞合而勢悍急恩德當衝受害乃於德州哨馬營恩縣四女寺建壩開支河以殺其勢六十年東撫李樹德請開彭口新河先是濟寧道某言彭口一帶有昭陽微山西湖噴沙積於三洞橋內屢開屢塞阻滯糧艘應挑新河避噴沙以疏運道至是樹德以為言上曰山東運河自西湖之水流入前此百姓以為宜開即開以為宜閉亦閉開者何意堵者何意務悉其故方可定其開否不然虛耗矣又曰山東運河全賴湖泉濟運今多開稻田截上流以資灌溉湖水自然無所蓄瀦安能濟運往年東民欲開新河朕恐下流泛濫禁而弗許今又請開新河此地一面為微山湖一面為嶧縣諸山更從何處開鑿耶張鵬翮到東將此旨詳諭巡撫申飭地方相度泉源蓄積湖水俾漕運無誤自易易耳雍正元年河督齊蘇勒偕漕督張大有言山東蓄水濟運有南旺馬踏蜀山安山馬場昭陽獨山微山郗山等湖水漲則引河水入湖涸則引湖水入槽隨時收蓄接應運河古人名曰水櫃歷年既久昭陽安山南旺多為居民占種私墾現除已成田不追外餘俟水落丈量樹立封界永禁侵佔設法收蓄至馬踏蜀山馬場南陽諸湖原有斗門閘座加以土壩可收蓄深廣備來年濟運之資惟獨山一湖濱臨運河一綫小堰且多缺口相度水勢河水盛漲聽其灌入湖中湖河平即築堰堵截河水稍落不使湖水走洩涓滴或遇運河淺塞則引湖水下注庶幾接濟便捷至諸湖閘座仍照舊例灌塘積水啟閉以時則湖水深廣運道疏通矣下所司議行二年齊蘇勒以駱馬湖東岸低窪易洩舊壩不足抵禦於湖東陸塘河通寧橋西高地築攔河滾壩再築攔水堤六百丈口門寬三十丈以便宣洩又幫築運河西岸地洞口堤身五百十丈高寶江東西岸隄工五千二十四丈寶應西堤七里閘迤南至柳園頭埽工五百七十丈四年齊蘇勒改种家渡南之舊彭口於十字河而彭口沙壅積如故先是侍郎蔣陳錫疏陳漕運事宜上命內閣學士何國宗等勘視豫東運道至是覆稱山東運河必賴湖水接濟請將安山湖開濬築隄南旺馬踏諸隄及關家壩俱加高培厚建石閘以時啟閉其分水口兩岸沙山下各築束水壩一汶水南戴村壩應加修築建坎河石壩於汶水北恩縣四女寺應建挑壩一塼平運河西岸修復進水關二東岸建滾壩一濮州沙河會趙王河處舊有土壩引河應修築開濬其河西州縣聽民開通水道匯入沙河於運道民生均有裨益武城及恩縣北岸各挑引河一河南運河自北泉而下歷仁義禮智信五閘遏水旁注愚民不無截流盜水之弊請拆去五閘於泉池南口建石堰一開口門三分為三渠築小隄使無旁洩東西各開一渠渠各建五閘分溉民田小丹河自清化鎮下應開濬築小隄河東一里開水塘一石閘三分為三渠以小丹河為官渠東西各一為民渠其洹河石壩皆已湮廢宜增修為挑壩諸泉源應各開深廣入衞濟運下所司議行五年東撫塞楞額以柳長河日見淤淺雖一帶相連而中有金錢嶺分隔特開引河二一從嶺北注安山入湖一從嶺南出閘口濟運八年河督嵇曾筠言宿遷駱馬湖舊有十字河口門引湖濟運兼以刷黃嗣湖水微弱恐黃倒灌堵閉河口又於西寧橋迤西建攔湖壩因是湖水不通專資黃濟運致中河之水挾沙淤墊今秋山水暴漲去路遏塞漫溢橫出請復十字河舊口門俾湖水入中河刷深運道攔湖壩酌量開寬俾上游之水由六塘河入海從之是年始設黃運兩岸守堤堡夫二里一堡堡設夫二住堤巡守遠近互為聲援九年兼總河田文鏡言汶南流濟運向有玲瓏及亂石滾水三壩伏秋盛漲水由滾壩入鹽河沙由玲瓏亂石洞隙隨水滾瀉自何國宗於三壩內增建石壩涓滴不通既無尾閭洩水又無罅隙通淤致汶挾沙入運淤積日高請改壩為牐建磯心五十六中留水門五十五安牐板以資宣洩又以不能啟閉別築土堤名春秋壩如所請行十一年東撫岳濬言東省水櫃舊有東平之安山湖廢閘四自國宗議復安山湖水櫃重築臨河及圈湖隄修通湖蛇溝二閘並於八里灣十里鋪兩廢閘間建石閘一曰安濟閘俱經修竣仍不能蓄水濟運緣湖底土疏非圈隄所能收蓄均宜修防其圈湖隄缺概停補築以免糜費從之十二年直督李衞以故城與山東德州武城毗連係河流東注轉灣處向無隄埝水漲漫溢勸諭民間儹修土埝量給食米以工代賑東撫岳濬以德州河溜頂衝於東岸挑新河建滾壩兩岸各築遙隄酌開涵洞以資宣洩乾隆二年御史馬起元言直東運河近多淤塞尚書來保言衞水濟運灌田請飭詳查地勢使漕運不阻民田亦資灌溉上命侍郎趙殿最侍衞安寧會同直漕河三督豫東兩撫勘奏經部議東省泉源四百三十九無不疏通閘壩亦完固惟戴廟七級柳林新店師莊棗林萬年頓莊各閘或雁翅潮蟄或面石裂縫兩岸斗門涵洞有滿家三空橋雁翅低陷石閘面太低應交河督興修又馬踏蜀山馬場獨山微山諸湖嚴禁佔種蘆葦南旺南陽昭陽諸湖水櫃僅堪洩水小清河久淤塞均宜次第修治至衞水濟運灌田宜於館陶臨清各立水則一測驗淺深以時啟閉起元又言通州至天津河路多淤淺糧艘不便命殿最偕顧琮勘議尋議天津溯流而上設有兵弁無官管轄應增置漕運通判一駐張家灣專司疏濬把總二外委四聽通判調遣又普濟寺等四閘屬通州增置吏目一慶豐等七閘屬大興增置主簿一遇應開挑處報坐糧廳覈實修濬用鄂爾泰言建獨流東岸滾壩並開引河注之中塘窪以免靜海有羨溢之虞並減天津三汊口爭流之勢是歲大挑淮揚運河自運口至瓜洲三百餘里三年河督白鍾山言衞河水勢惟在相機啟閉殿最前奏設館陶臨清二水閘可不必立嗣雨水調勻百泉各渠閘照舊官民分用儻值水淺澀即暫閉民渠民閘以利漕運或河水充暢漕艘早過官渠官閘亦酌量下板以灌民田是年修復三教堂減壩挑濬淤填支河使洩水入馬頰河又於三空橋舊址修減壩仍挑通支河使洩水入徒駭河增建裴家口東南涵洞二修築房家口上下堤岸馬家閘土隄及自嶧縣臺莊迄臨清板閘運隄八百里縴道亦資障護瀕河田廬先是疏濬毛城鋪河道時高斌以黃流倒灌移運口於上游七十餘丈與三汊河接次年黃仍灌運論者多謂新開運口所致特命大學士鄂爾泰相度旋言運口直對清口湖水由裴家場引河東北直趨清口入運之水仍係迴流平緩惟新口外挑水壩稍短清水盛旺或恐溜寬宜再築長壩不必仍舊開口惟舊河直捷新河紆曲今新建閘壩未開漕船應行舊河以利挽運新河於天妃閘下重建通濟福興二閘隨時啟閉每歲漕船過後河水充溢則開放新河以分水勢湖水漲溢則閉舊河及新河閘以待水消庶新舊兩河可以交用鄂爾泰又言詳勘漳河故道一自直隸魏縣北經山東丘縣城西至效口村會滏陽河入大陸澤下會子牙河由天津入海一由魏縣北老沙河自潘爾莊經丘縣城東歷清和武城景州阜城各地過千頃窪入運歸海丘縣城西故道去衞河較遠舊迹既淹開通匪易且滏陽河下會子牙河全漳之水亦難容納惟老沙河即古馬頰河河形寬闊於此挑復故道自和爾寨村東承漳河北折之勢開至漳洞村歸入舊河勢順工省即於新挑河頭下東流入衞處建閘如衞水微弱則啟以濟運衞水足用則閉閘使歸故道再於青縣下酌建閘壩臨清以北運道可免淤墊青縣以下田廬永無浸淹應飭直東兩省會勘估修五年改山東管河道為運河道專司蓄洩疏濬閘壩事仍管河庫從白鍾山請也二十二年添建高郵東隄石壩酌定水則視水勢大小以為啟閉巡漕給事中海明言江南運河惟桃源之古城砂礓溜灘灣沙積黃河以南惟揚州之灣頭閘至范公祠三千三百餘丈間段阻淺均應挑濬鎮江至丹徒常州水本無源恃江潮灌注冬春潮小則淺加以每日潮汐易淤兩岸土鬆易卸應六年大挑一次否則三年亦須擇段撈淺丹徒兩閘以下常州之武進等縣亦間段淺滯均應一律挑濬詔挑河易滋浮冒宜往來查察毋得屬之委員二十四年命海明及河督張師載東撫阿爾泰會勘直東運河初運河水漲漫溢德州等處景州一帶道路淤阻至是海明等言漳衞二河伏秋盛漲宜旁加疏洩自臨清至恩縣四女寺二百五十餘里河身盤曲臨清塔灣東岸原有沙河一即黃河遺迹由清平德州高唐入馬頰河歸海請開挑作滾水石壩使汶衞合流分洩水勢四女寺哨馬營兩支河原係旁洩汶衞歸海之路請將狹處展寬以免下游德州等處衝溢二十五年巡漕給事中耀海偕師載言南旺以北僅馬踏一湖水患不足獨山湖有金綫閘水祗南流利濟閘水可北注請移金綫閘於柳林閘北使獨山諸湖全注北運河制可二十七年以魚臺辛莊橋北舊有洩水口二口門刷深難以節制允師載等請改建滾壩一是歲挑德州西方菴對岸引河自魏家莊至新河頭長四十丈建築齊家莊挑溜埽壩接築清口東西壩修李家務石閘二十八年用阿爾泰言於臨清運河逼近村莊處開引河五以分水勢三十三年黃水入運命大學士劉統勳等往開臨黃壩以洩盛漲並疏濬運河淤淺三十七年河督姚立德言泗河下流董家口向建石壩分洩今泗水南趨轉為石壩所累請拆去並展寬孟家橋舊石橋如所請行五十年命大學士阿桂履勘河工阿桂言臣初到此間詢商薩載李奉翰及河上員弁多主引黃灌湖之說本年湖水極小不但黃絕清弱至六月以後竟至清水涓滴無出又值黃水盛漲倒灌入運直達淮揚計惟有借已灌之黃水以送回空蓄積弱之清水以濟重運查本年二進糧艘行入淮河全藉黃水浮送方能過淮渡黃則回空時雖值黃水消落而空船喫水無多設法調劑似可銜尾遄行借黃濟運自此始也五十一年運河盛漲致淮安迤下東岸涇河洩水石閘牆蟄底翻難資啟閉越五年山陽寶應士民修復之嘉慶元年河決豐汛刷開南運河佘家莊隄由豐沛北注金鄉魚臺漾入微山昭陽各湖穿入運河漫溢兩岸是冬漫口塞凌汛復蟄陷次年東西兩壩並蟄二月工始竣自豐工決後若曹工睢工衡工幾於無歲不決九年因山東運河淺塞大加濬治又預蓄微山諸湖水為利運資然自是以後黃高於清漕艘轉資黃水浮送淤沙日積利一而害百矣十二年倉場侍郎德文等請挑修張家灣正河堵築康家溝以復運道御史賈允升請挑濬減河均下直督溫承惠勘辦承惠請濬溫榆河上游上命侍郎托津英和偕德文等覆勘尋奏言頻年漕運皆藉溫榆下游倒漾之水以致泥沙淤積若從上游深挑直抵石壩實為因勢利導惟地勢高下須逐細測量俾全河毫無滯礙方善制可十三年通州大水康家溝壩衝決成河張家灣河道遂淤倉場侍郎達慶請來年糧艘由康家溝試行一年暫緩挑復張家灣河身上命尚書吳璥往勘與達慶議合遂允之明年御史史祜言康家溝河道難行請復張家灣正河下直督溫承惠承惠言康家溝溜勢奔騰漕船逆流而上大費縴輓該處地勢正高恐旱乾之歲河水一瀉無餘漕行更為棘手惟張家灣兩岸沙灘壩基難立而正河積淤日久挑濬亦甚不易上復遣工部尚書戴均元往勘亦言壩基難立且時日已迫恐河道未復漕運已來請仍由康家溝行再察看一年酌定如所請行時淮揚運河三百餘里淺阻兩淮鹽政阿克當阿請俟九月內漕船過竣堵閉清江三壩築壩斷流自清江至瓜洲分段挑濬下部議覆稱近年運河淺阻固由疊次漫口而漫口之故則由黃水倒灌倒灌之故則由河底墊高清水頂阻不能不借黃濟運以致積淤潰決百病叢生是運河為受病之地而非致病之原果使清得暢出敵黃並分流濟運則運口內新淤不得停留舊淤並可刷滌若不除倒灌之根而亟亟以挑濬運河為事恐旋挑旋淤運河之挑濬愈深倒灌之勢愈猛決隄吸溜為患滋多命尚書托津等偕河督勘辦十八年漕督阮元以邳宿運河閘少水淺沙停請於匯澤閘上下添建二閘下江督百齡核奏道光元年山東河湖山水並發戴村壩迤北隄埝漫決六十餘丈草工刷三十餘丈四女寺支河南岸汶水旁洩處三用巡撫姚祖同言於正河旁舊河形內抽溝導水濟運兼顧湖瀦三年漫直隸王家莊由各廳汛賠修是歲添築戴村壩北官堤碎石壩四四年侍講學士潘錫恩陳借黃濟運之弊略言蓄清敵黃為相傳成法今年張文浩遲堵禦黃壩致倒灌停淤釀患若更引黃入運河道淤滿處處壅溢恐有決口之患下尚書文孚等妥議自嘉慶之季黃河屢決致運河淤墊日甚而歷年借黃濟運議者亦知非計於是有籌及海運者五年上因漕督魏元煜等籌議海運羣以窒礙難行獨大學士英和有通籌漕河全局暫雇海船以分滯運酌折漕額以資治河之議下所司及督撫悉心籌畫卒以黃運兩河受病已深非旦夕所能疏治詔於明年暫行海運一次新授兩江總督琦善言臣抵清江即赴運河及濟運束清各壩逐加履勘自借黃濟運以來運河底高一丈數尺兩灘積淤寬厚中泓如綫向來河面寬三四十丈者今只寬十丈至五六丈不等河底深丈五六尺者今只存水三四尺並有深不及五寸者舟隻在在膠淺進退俱難濟運壩所蓄湖水雖漸滋長水頭下注不過三寸未能暢注淮安三十餘里皆然高寶以上之運河全賴湖水其情大可想見請飭河漕二臣將河面淤墊處展挑寬深再放湖水藉資輓送以期不誤北上期限上以借黃濟運原係權宜辦理孫玉庭察看漕艘挽運艱難不早陳奏變計魏元煜舊任漕督及與顏檢坐觀事機敗壞隱忍不言糜帑病民是誠何心令將運河淤墊一律挑深費由玉庭元煜檢分賠琦善又言自禦黃壩堵閉運河淤墊不復增高而洪湖清水蓄至丈餘各船可資浮送不敢冒昧挑濬工費至省在百萬外玉庭等罄其所有斷無如許家資更可慮者欲濬運河必先堵束清壩阻絕來源而後可以涸底挑辦現湖水下注湍急束清壩外跌塘甚深又係清水不能掛淤閉氣設正事興挑而束清壩臌開則工廢半途費歸虛擲請停止𩹉揚運河挑工以免草率而節糜費允之是年築溫榆河上游果渠村壩埽七年東河總督張井副總河潘錫恩請修復北運河劉老澗石滾壩中河廳南縴堤揚糧二廳東西縴隄及隄外石工移建昭關壩上遣英和等馳勘乃定移昭關壩於其北三元宮之南餘如所請行十一年高郵湖河漫馬棚灣及十四堡湖河連為一江督陶澍請依嘉慶間故事運河決口重空糧艘均繞湖行八月十四堡塞冬馬棚灣塞先是澍撫蘇時以鎮江運河並無水源祗恃江潮浮送下練湖湮塞已久移建黃泥閘於張官渡以當湖之下流俾得擎托湖流使之回漾稍濟江潮之不逮曾著成效至十四年遷江督復偕巡撫林則徐相度於湖頂沖之黃金壩及東岡築兩重蓄水壩培圩埂二千八百八十丈使水得入湖又建減水石壩二於湖之東堤俾可宣洩暴漲於入運處修復念七家古涵以作水門並建石閘以放水濟運是冬工竣由涵引水出竟能倒漾上行數十里軍船得銜尾而南越二年溜勢變遷河形灣曲復移建黃泥閘於迤上二百丈改為正越二閘中建磯心並改張官渡迤下六十里呂城閘為正越二閘以利漕行十五年移築囊沙引渠沙壩於西河漘外以資收蓄從東河總督吳邦慶請也十八年運河淺阻用河督栗毓美言暫閉臨清閘於閘外添築草壩九節節擎蓄於韓莊閘上朱姬莊迤南築攔河大壩一俾上游各泉及運河南注之水並攔入微山湖定收瀦濟運章程六十九年毓美以戴村壩卑矮致汶水多旁洩照舊制增高之初給事中成觀言淮揚芒稻閘人字河不宜堵壩阻水去路下陶澍等議至是覆稱此壩蓄水由來已久並不攔阻衆水歸江不得輕議更張從之時衞河淺澀難以濟運東撫經額布請變更三日濟運一日灌田例詔將百門泉小丹河各官渠官閘一律暢開暫避民渠民閘如有賣水阻運盜穵情弊即行嚴懲明年漕督朱澍復言衞河不能下注有妨運道命河督文沖豫撫牛鑑察勘文沖等言衞河需水之際正民田待溉之時民以食為天斷不能視田禾之枯槁置之不問嗣後如雨澤愆期衞河微弱船行稍遲毋庸變通舊章倘天時亢旱糧船阻滯日久是漕運尤重於民田應暫閉民渠民閘以利漕運從之咸豐元年甘泉閘河橕隄潰塌三十餘丈河決豐縣山東被淹運河漫水漕艘改由湖陂行先是戶部尚書孫瑞珍言十字河為全漕之害若於河西改寬新河以舊河為囊沙於彭口作滾壩納濁水而漾清流漕船無阻可省起剝費二十萬下東河總督顏以燠議至是以燠言改穵新河事無把握無庸輕議更張報聞二年決北運河北寺莊隄命尚書賈楨侍郎李鈞勘堵並改次年漕糧由海道運津自是遂以海運為常同治而後更以輪舶由海轉運費省而程速雖分江北漕糧試行河運然分者什一藉保運道而已五年銅瓦廂河決穿運而東隄埝衝潰時軍事正棘僅堵築張秋以北兩岸缺口民埝殘缺處先作裹頭護埽黃流倒漾處築壩收束未遑他顧也十年決淮揚馬棚灣同治五年決清水潭八年河決蘭陽漫水下注運河隄埝殘缺更甚自張秋以北別無來源歷年惟借黃濟運而已九年漕督張之萬請於黃流穿運處堅築南北兩隄酌留運口為漕船出入門戶並築草壩平時堵閉以免倒灌已下所司議之萬旋改撫江蘇繼任張兆棟以既築隄束水留口門又築壩堵閉恐過水稍滯而上游一氣奔注新築隄閘難當沖激設奪運北趨則東昌臨清暨天津河間淹沒在所必至北路衞河亦將廢壞惟有於鄆城沮河一帶遏黃東流即以保南路之運道於張秋八里廟等處疏運河之淤墊即以通北上之漕行較之築隄束水稍有實際制可十年侯家林河決直注南陽昭陽等湖鄆城幾為澤國漕督蘇鳳文言安山以北運河全賴汶水分流至臨清以上始得衞水之助今黃河橫亙於中挾汶東下安山以北毫無來源應於衞河入運及張秋清黃相接處各建一閘蓄高衞水使之南行俟漕船過齊即啟臨清新閘仍放衞北流以資浮送並於張秋淤高處挑深丈餘安山以南亦一律挑濬庶黃水未漲以前運河既深舟行自易江督曾國藩言河運處處艱阻如嶧縣大泛口沙淤停積水深不及二尺必須挑深四五尺並將近灘石堆剗除與河底配平方利行駛北則滕縣郗山口入湖要道淺而且窄微山湖之王家樓滿家口安家口獨山湖之利建閘南陽湖北之新店閘華家淺石佛閘南旺閘分水龍王廟北之劉老口袁口閘處處淤淺或數十丈至百餘丈須一律挑深此未渡黃以前阻滯之宜預為籌辦者至黃水穿運處漸徙而南自安山至八里廟五十五里運隄盡被黃水衝壞而十里鋪姜家莊道人橋均極淤淺宜一面疏濬一面於缺口排釘木樁貫以巨索俾船過有所依傍牽挽此渡黃時運道艱滯宜預為籌辦者渡黃以後自張秋至臨河二百餘里河身有高下須開挖相等於黃漲未落時閉閘蓄水以免消耗或就平水南閘迤東築挑壩引黃入運此渡黃後運道易涸宜預為籌辦者東平運河之西有鹽河為東省鹽船經行要道若漕船由安山左近入鹽河至八里廟仍歸運道計程百餘里較之徑渡黃流上有缺口大溜下有亂石樹樁者難易懸殊如行抵安山遇黃流過猛宜變通改道須先勘明立標為誌此又渡黃改道宜預為籌辦者下河漕督及東撫商籌十一年河督喬松年請在張秋立閘借黃濟運同知蔣作錦則議導衞濟運上詢之直督李鴻章鴻章言當年清口淤墊即借黃濟運之病今張秋河寬僅數丈若引重濁之黃以閘壩節宣用之水勢抬高其淤倍速至作錦導衞原因張秋北無清水灌運故為此議以全淮之強不能敵黃尚致倒灌停淤豈一清淺之衞遂能禦黃濟運耶其意蓋襲取山東諸水濟運之法不知泰山之陽水皆西流因勢利導百八十泉之水源旺派多自足濟運衞水微弱北流最順今必屈曲使之南行一水兩分勢多不便若分沁入衞以助其源沁水猛濁一發難收昔人已有明戒近世治河兼言利運遂致兩難卒無長策事窮則變變則通今沿海數千里洋舶駢集為千古以來創局正不妨借海道轉輸由滬解津較為便速疏入詔江安糧道漕米年約十萬石仍由河運餘仍由海運光緒三年東撫李元華條上運河上中下三等辦法並言量東省財力擬用中等將北運河一律疏通復還舊址並建築北閘時值年荒寓賑於工省而又省需費三十萬有奇下所司議五年有請復河運者江督沈葆楨言以大勢言之前人之於河運皆萬不得已而後出此者也漢唐都長安宋都汴梁舍河運無他策然屢經險阻官民交困卒以中道建倉伺便轉餽而後疏失差少元則專行海運故終元世無河患有明而後汲汲於河運遂不得不致力於河防運甫定章河忽改道河流不時遷徙漕政與為轉移我朝因之前督臣創為海運之說漕政於窮無復之之時藉以維持不敝議者謂運河貫通南北漕艘藉資轉達兼以保衞民田意謂運道存則水利亦存運道廢則水利亦廢臣以為舍運道而言水利易兼運道而籌水利難民田於運道勢不兩立兼旬不雨民欲啟涵洞以溉田官必閉涵洞以養船迨運河水溢官又開閘壩以保隄隄下民田立成巨浸農事益不可問議者又太息經費之無措舳艫之不備以致河運無成臣以為即使道光間歲修之銀與官造之船至今一一俱存以行漕於借黃濟運之河未見其可也近年江北所雇船隻不及從前糧艘之半然必俟黃流汛漲竭千百勇夫之力以挽之過數十船而淤復積今日所淤必甚於去日而今朝所費無益於明朝即使船大且多何所施其技乎近因西北連年亢旱黃河來源不旺遂乃狎而玩之物極必返設因濟運而奪溜北趨則畿輔受其害南趨則淮徐受其害如民生何如國計何八年伏秋大汛張家灣運河自蘇莊至姚辛莊沖開新河一段長七百餘丈上下口均與舊河接形勢順直大溜循之而下舊河上口至下口長六千四百餘丈業已斷流惟新河身係自行沖開不能一律深通明年直督李鴻章飭製新式鐵口刮泥大板在兩岸拖拉使一律通暢十二年通州潮白河之平家疃漫口東趨入箭杆河未幾堵復運河故道十三年六月復漫刷平家疃新工下之北市莊東小隄並老隄續塌百數十丈連成一口奪溜東趨十之八尋堵塞之是年河決鄭州山東黃水斷流漕船不能南下向之借黃濟運者至是束手無策旋將臨口積淤疏挑空船始得由黃入運十五年東撫張曜言河運未能久停請改海運漕米二十萬仍歸河運從之十六年用江督曾國荃言修揚屬南運河隄閘涵洞及附城附鎮塼工又用漕督松椿言濬邳宿運河十九年潮白河漲溢運隄兩岸決口七十餘上游務關廳決口七是冬均塞二十年濬濟寧汶上滕嶧茌平陽穀東平各屬運河明年濬陶城埠至臨清運河二百餘里二十四年侍讀學士瑞洵言南漕改折有益無損請每年提折價在津購米以實倉庾御史秦夔揚亦言河漕勞費太甚請停江北河運皆不許仍飭認真疏濬照常起運二十六年聯軍入京師各倉被占踞倉儲粒米無存江北河運行至德州改由陸路運送山陝二十七年慶親王奕劻大學士李鴻章言漕糧儲積關於運務者半因時制宜請詔各省漕糧全改折色其採買運解收放儲備各事分飭漕臣倉臣籌辦自是河運遂廢而運河水利亦由各省分籌矣
