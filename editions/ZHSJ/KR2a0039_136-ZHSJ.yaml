body:
  text: 清史稿卷一百三十六志一百十一兵七海軍中國初無海軍自道光年籌海防始有購艦外洋以輔水軍之議同治初曾國藩左宗棠諸臣建議設船廠鐵廠沈葆楨興船政於閩海李鴻章築船隖於旅順練北洋海軍是為有海軍之始而甲申馬江甲午東海師船盡燬嗣後兵艦歲有購置自光緒中葉迄宣統初南北洋海軍僅有船五十餘艘舊式居半其能出海任戰者止海籌海圻等巡洋艦四艘楚泰楚謙江元江亨等礮艦十餘艘而已爰紀開創之漸修繕之規廠隖之建築兵艦之購造咸列於篇道光二十二年文豐疏言購呂宋國船一艘駕駛靈便足以禦敵旋諭隸水師旗營操演並諭紳商多方購置是為海軍購艦之始咸豐六年怡良疏言允英國司稅李泰國之請置買火輪船以勦粵匪旋隸向榮調遣十一年曾國藩疏請購買外洋船炮奕訢等請以關稅發購外洋小兵輪十餘艘飭廣東江蘇各督撫募內地人學習駕駛以已租之美利堅輪船二艘一名土只坡一名可敷本為護運之用配以炮械駛赴安慶隸曾國藩調遣同治元年曾國藩於安慶設局自造小輪船一艘二年令容閎出洋購買機器四年曾國藩丁日昌於上海設鐵廠造槍炮五年左宗棠疏請於福建省擇地設廠購機器募洋匠自造火輪兵船聘洋員日意格等買築鐵廠船槽及中外公廨工匠住屋築基砌岸一切工程開設學堂招選生徒習英法語言文字算學圖畫采辦鋼鐵木料期五年內成大小輪船若干均仿外洋兵船之式需銀三百萬兩並陳船政事宜十則請簡重臣督理旋以沈葆楨為船政大臣六年李鴻章遷虹口製造局於高昌廟建船隖名曰江南製造局沈葆楨疏言福州馬尾山為省垣奧區天險設船隖於馬尾之中歧隖周四百五十丈有奇鐵船槽長三十丈寬十五丈可修造二千五百頓之船隖內濱江者為鐵廠輪廠木匠架木棧房隖東北為船政大臣駐所紳員公所及外國匠房其左為法文英文學堂及生徒住舍江干為煤廠山麓為中國匠房山之左駐楚軍一營山之右為洋員駐所傍江岸為官街以便貿易旋派洋員日意格回國采辦器具選用工匠是年瑞麟向英國訂購六兵船七年沈葆楨疏言於船隖之右創建船臺四座臺長二十餘丈船成入水順推而下其旁增五廠曰鐵廠曰水缸廠曰打鐵廠曰鑄鐵廠曰合攏鐵器廠規模既具次第興工尋疏陳外洋機器到閩復運煤運木於臺灣運塼於廈門廠內增設轉鋸廠木模廠銅廠風洞繪事廠廣儲廠儲材廠東西考工所先後告竣疏入諭英桂馬新貽李福泰卞寶第等籌給經費俾蕆要工是年曾國藩疏言上海設廠自造第一號輪船告成汽鑪船身皆考究圖說自出機杼長十八丈寬二丈餘命名恬吉請續造二十餘丈之大艦旋諭兩江總督馬新貽等從曾國藩李鴻章所請製器設廠增建譯舘諸端悉心講求是年福州船廠自造安瀾等小輪船十艘告成濟安永保海鏡等輪船亦告成八年沈葆楨疏言廠中自製第一號大輪船下水長二十三丈八尺寬二丈七尺八寸每小時行八十里以副將率弁兵水手管駕安置巨炮駛出大洋暫名曰萬年青第二號暫名曰湄雲俟駛赴天津再請錫名以光海宇是年購法國澄波兵船江南製測海操江兵船成又購建威海東雲二船九年沈葆楨疏言第三號福星船第四號伏波船告成本屬戰艦利於巡洋以學堂上等學生移處船中令洋員教其駕駛由近而遠以收實效是年江南威靖兵船成十年令學生十八人駕建威練船巡歷南北各海口是年曾國藩疏請仿英國小鐵船式令滬廠製造為守海口之用十一年船政製安瀾鎮海揚武飛雲靖遠五兵船成文煜宋晉等以造船費重疏請暫罷不許是年李鴻章疏言滬廠造成第五號船長三十丈鍋爐均在水綫之下置大炮二十六尊係仿外洋三枝桅兵船式英法人稱為中國最巨之船請飭沿江海各省不得自向外洋購船如有所需向閩滬二廠商撥訂製以節度支十二年江南製海安兵船成沈葆楨疏言閩廠七號揚武八號飛雲兵船下水揚武用英國前膛炮飛雲用布國後膛炮以後十三十四十五號兵船請兼仿外洋商舶之式運載貨物以裕經費九號靖遠十號振威十一號濟安十二號永保十三號海鏡兵船已告成以都司遊擊等管駕出洋其建威練船巡歷浙江上海天津牛莊及香港新加坡檳榔嶼等處在船學徒練習風濤成績甚優來年遣散洋匠以中國學徒自造然能守已成之法不能拓未竟之緒請選擇學生分赴英法二國深究造船駕駛之方練兵制勝之理十三年船政製濟安琛航大雅三運船成福建善後局購美國二炮船曰福勝建勝李鴻章疏言中國東南北三洋請各設大兵船六艘根鉢小兵船十艘合成四十八艘三洋各需大鐵船二艘北洋駐煙臺旅順等處東洋駐長江口外南洋駐廈門虎門等處鐵甲船每艘需銀百萬兩外分年向外洋購置餘船由閩滬二廠仿造以足四十八艘之數請飭沿江沿海各省裁幷新舊紅單拖罟艇船舢板等船以節省之發專練海軍是年沈葆楨疏言續辦船工尚有三端一挖土大機船一船土鐵脅一新式輪機鐵脅須購自法國以閩船皆法匠所造也臥機立機須購自英國以其製精無弊也光緒元年製造局製馭遠兵船成船政製元凱兵船成以揚武練船令學生游歷南洋各處至日本而還尋諭南北洋大臣籌辦海防令總稅務司赫德赴天津與李鴻章商訂購英國二十六頓半三十八頓半之炮船各二艘專備海防之用是年沈葆楨購法國威遠兵船二年沈葆楨會同李鴻章奏派學生分赴英法各國入大學堂製造局練習此為第一屆出洋學生是年船政製登瀛洲蓺新兩兵船成製造局製金甌小鐵甲船成三年四年泰安威遠超武兵船亦成沈葆楨疏請各省協發每年解南北洋各二百萬專儲為籌辦海軍之用期十年成南洋北洋粵洋海軍三大枝猶恐緩不濟急請以四百萬先解北洋俟成軍後再解南洋五年李鴻章疏言外洋訂購之四炮船來華以福建船政局員管駕名飛霆策電龍驤虎威炮射甚遠輪機亦精請再購四艘沈葆楨疏言續購蚊炮船四艘到華以留學英國畢業生管駕名鎮東鎮西鎮南鎮北分防吳淞江陰二口為夾護礮臺之用何璟疏言閩廠製造各兵船惟揚武威遠濟安較為得力其餘止供巡緝內洋之用旋諭沿江海各督撫整頓海軍沈葆楨旋卒海軍屬李鴻章設海軍營務處於天津六年江督劉坤一疏言蚊炮船購自外洋費鉅而炮位過重請由粵自造木殼船丈尺與包鐵者同炮位改用三萬餘斤之後膛炮先造二艘以備守口之用李鴻章疏請購外洋每半時行十五海里之快船及碰船蚊子船又疏言購辦鐵甲船之舉倡議已歷七年福建已定購蚊子船四艘碰船二艘請移二碰船之價一百三十萬兩先購鐵甲船一艘專歸臺灣防剿以原有之福勝建勝二蚊子船及船廠自造兵輪之堅利者合為一軍則臺防可固南洋擬購之快碰船二艘亦請抵購鐵甲船一艘當與南洋大臣會商合原有之各兵輪編練海軍互為應援旋以滬廠因鑄造槍炮經費過重停造輪船閩廠亦以財絀停造木質兵船專造快船與鐵甲船是年吉林將軍銘安請於三姓一帶造舢板戰船諭李鴻章籌度鴻章覆陳俄國於庫葉島設廠造兵輪輒由混同江駛入松花江等處非舢板所能敵請於三姓水深之處設廠造蚊子船可巡駛及黑龍江以佐陸軍鴻章尋向英訂造新式鐵甲船並飭閩廠仿造彭玉麟亦請飭閩廠分造十七八丈之小兵輪十艘以長江任戰之員為管帶巡緝洋面諭兩江福建廣東各省籌辦是年在英廠訂造之超勇揚威快碰船來華令提督丁汝昌管駕與鎮中鎮邊蚊炮船二艘同泊旅順又於閩廠訂造快船二艘專為朝鮮口岸之用李鴻章設水師學堂於天津旋以在德國船廠定購之定遠鎮遠二鐵艦濟遠穹甲艦將成令管輪學生赴德國練習令洋教習率鎮東等四兵船赴渤海一帶梭巡是年船政製澄慶兵船成七年李鴻章在大沽口建船隖九月超勇揚威二艦製成來華鴻章乘赴旅順察看形勢籌備建築船隖炮壘大沽設水雷營水雷學堂旅順設水雷魚雷營挖泥船威海設魚雷局機器廠並設屯煤所以丁汝昌統領北洋海軍定兵艦國旗質地章色之制會同福建船政派學生赴歐洲肄業八年北洋粵督各購德國雷艇數艘以英人琅威理司海軍訓練與各國兵艦相遇始有迎送交接之禮李鴻章疏言英法美德國近年所造船曰穹面鋼甲快船入水十五尺八寸馬力二千八百匹壓水力二千三百頓每時行十五海里合中國五十里機艙等鋼面厚三寸半炮臺周圍鋼面厚至十寸每艘需銀六十二萬兩與鐵艦相輔最為海軍利器閩廠自造快船不及其精已由出使大臣訂購一艘與鎮遠鐵艦同駛來華九年船政製開濟快碰船成南洋向德國購南琛南瑞二巡洋艦十年船政製鏡清快碰船橫海兵船成李鴻章疏言自光緒元年至六年經營北洋海防有龍驤等蚊炮船八艘水雷小艇一艘其龍虎霆電四船於六年撥赴南洋調遣七年以後先後購到超勇揚威快碰船二艘鎮中鎮邊蚊炮船二艘由閩廠調至北洋修改練船之威遠康濟兵輪二艘調赴朝鮮旅順等處海鏡一艘在滬製造之快馬小輪船一艘在津製造之利順小輪船一艘守雷下雷所用之暗輪包鋼小輪船二艘察看船隻之大小頓載之輕重機器炮位桅帆器械之繁簡配定人數餉章與水師統領教習洋員分別損益務使利器可得實用是年五月以長江水師提督李成謀總統南洋兵輪總督曾國荃疏言江南購買兵輪蚊快等船及自造者為數無多所有登瀛洲靖遠澄慶開濟龍驤虎威飛霆策電威靖測海馭遠金甌大小兵輪及新購之南琛南瑞上海機器局所造之鋼板保民兵輪各船大小不齊兵額不一以之海戰則不足以之扼守江海門戶與礮臺相輔藉固江防八月法國海軍犯福建駐防福州海口之揚武振威飛雲伏波濟安福星蓺新兵船七艘蚊炮船二艘琛航永保商輪二艘與法國兵船戰於馬江悉數沈燬存者惟伏波蓺新二船時李鴻章令德國武員率快船五艘與曾國荃所部開濟南琛南瑞澄慶馭遠五船援閩未至而閩師已覆澄慶馭遠二船亦沉於石浦是年總理衙門請設海軍專部出使大臣許景澄在德國訂購之定遠鎮遠鐵甲艦二艘濟遠鋼甲艦一艘均告成粵督向德國訂購雷艇八艘十一年曾國荃疏言於福建廣東浙江三省增設鐵艦快艦雷艇嗣後各兵船專事操練巡洋不得載勇拖船與北洋大臣會奏派第三屆學生出洋同時左宗棠疏請開采鐵鑛擇吳楚扼要處立船政炮廠專造鐵甲兵船後膛巨炮製造局製保兵鋼板船成九月海軍衙門成立以醇親王總理海軍慶郡王李鴻章為會辦曾紀澤善慶為幫辦十二年粵省造淺水兵輪曰廣元廣亨廣利廣貞防護海口向德國購福龍魚雷艇一艘三月南洋兵船赴北洋會操命醇親王李鴻章校閱海陸軍及沿海臺壘丁汝昌率兵船巡歷朝鮮船政大臣裴蔭森於福州增設練船造鐵甲船疏言江蘇之上海廣東之黃埔雖有船隖而港道狹淺福建羅星塔之下員山寨之上兩山間有天成巨港請建大船隖備定遠等鐵艦修理之處十三年閩廠寰泰快碰船廣甲兵船造成並造雙機鋼甲輪船及穹式快船淺水兵輪是年北洋向英國購左一出海魚雷大快艇一艘向德國購左二左三右一右二右三魚雷艇五艘挖泥船一艘北京設水師學堂於昆明湖廣東設水師學堂於黃埔十四年海軍衙門奏定官制設提督總兵副將參將遊擊都司守備千總把總經制外委等官是年在英德廠所造致遠靖遠經遠來遠四快船來華英百濟公司所造出海魚雷快艇亦告成六月臺灣番民叛命致遠