body:
  text: 清史稿卷一百三十八志一百十三兵九海防國初海防僅備海盜而已自道光中海禁大開形勢一變海防益重海防向分南北洋山東烟臺歸北洋兼轄閩浙粵三口歸南洋兼轄茲取沿海各省有海防者分述之曰東三省曰直隸曰山東曰江南附江防曰浙江曰福建曰廣東奉天沿海南自牛莊至金蓋各州轉東至鴨綠江口西則自山海關至錦州地皆濱海口岸凡三十九處康熙初廷議錦州一帶籌備沿邊旋定金州旅順口設水師戰船隸金州副都統督率訓練戰船皆木質舊式雍正四年將軍噶爾弼以自旅順海口至鳳凰城水程千里僅恃旅順水師一營議增二營聯絡巡哨道光二十一年耆英以奉省海防經營不易有移民內徙之議海防漸重咸豐之季歐艦北犯津沽奉天亦嚴海防同治四年崇厚調天津洋槍隊千人赴營口屯駐五年以奉天兵船拙重調天津輕利兵船十餘艘赴長島駐防復增新練洋槍隊五百人於營口十一年瑞麟以南洋自製兵艦告成礮械咸備乃商撥兵艦一艘巡防牛莊海口光緒初年以俄羅斯有窺北邊沿海亦有俄艦游弋乃於制兵外加餉練兵凡選練馬步隊四千二百餘人又增綠營兵四千人調撥吉林黑龍江蒙古馬隊各二百餘人駐營口與宋慶豫軍協同防守其東邊道之練軍馬步隊一千三百人則分駐鳳凰城大孤山北河長甸河口及安東等處額設正兵幾同虛設海上有警全恃客軍金州與海參威毗連之處尤為重要李鴻章遣鎮東等四礮艦巡防奉省海口八年鴻章以北洋迤東口岸惟奉天旅順口為首衝乃在旅順之黃金山頂仿築德國新式礮臺設巨礮多尊並建築兵房子藥庫近山要路復設行營礮壘海口內則布置水雷沿海岸可登陸處擇要埋藏地雷陸路則有護軍營八哨毅軍十一營水路則有快礮船蚊礮船各二艘表𩹉依護其次為營口海灘平衍敵易抄襲復調勁旅接應後路十年將軍定安於營口創設水雷營電綫火藥建雷庫十間存儲十七年李鴻章以大連灣為渤海門戶築老龍頭等處礮臺六座仿西洋曲折式兵房藥庫皆備二十六年將軍增祺以岫巖安東沿海雖有北洋兵艦巡防而海濱港汊紛歧乃增造大號水師船八艘布列於沙河大孤山太平溝等處至吉林黑龍江之海防以有松花黑龍二江貫省境而趨海舊制二省各設水師營巡防水師船止運船三十艘槳船二十艘每為運糧及采東珠取樺皮之用亦稱水手營非戰艦也吉林海防首重琿春松花江雖可行海舶而江水淺處為多同治四年以後屢有俄羅斯兵船乘江水漲時駛入至阿勒楚喀及伯都訥境內將軍岐元擬於三姓設水師營不果光緒六年府丞王家璧有整頓東省水師改造戰艦之議李鴻章以長江水師船不適用於松花黑龍二江宜於吉林三姓左近擇水深溜大之處設船廠造小號兵輪船如廣東蚊礮船之式入水不深上可行駛伯都訥省城附近下可巡行黑河口轉入黑龍江以佐陸軍備俄船侵入並撥開花礮新式馬槍快槍等為吉省練兵之用時將軍銘安及督辦寧古塔等處防務吳大澂喜昌以俄患未平於吉省沿江沿邊增練防軍馬步隊五千人各旗及西丹又募千五百人練成即赴琿春駐守並設護江關防範水路又慮俄國海軍船堅力猛水關不能阻其衝突乃擇要依山建築礮臺以禦俄艦黑龍江省於光緒三年始籌辦海防通省額兵及西丹共一萬人增鄂倫春兵五百人兼習新式槍礮黑省近俄俄人環黑龍江左岸盤踞達二千餘里每相間百餘里輒有俄兵屯駐之所刁斗相聞故黑省防務重在陸而不在海其江流入海之口在省境東北隅雖額設師船三十餘艘僅循例操演東三省海防奉天尤重自日占旅大遼東半島藩籬盡撤而吉黑二省向受俄患北海屢警防務益形棘手云直隸津沽口為南北運河永定大清子牙五河入海處北連遼東有旅順大連以為左翼南走登萊有威海衞以為右翼為北洋第一重鎮順治初天津巡撫雷興疏言大沽海口為神京門戶請置戰船以備海防下所司議行雍正四年於海口蘆家嘴創設天津水師營令滿洲兵丁駐紮學習水師特簡都統大員守禦海口復自天津城南門外起至慶雲縣止所有沿海各州縣設立海撥二十五處分置守兵扼要防範乾隆四年直隸總督高斌請拓天津水師營汛增駐滿兵一千合舊額為三千及道光六年那彥成奏請裁撤海口官兵改歸大名鎮十二年琦善奏天津地處海隅與山東登州奉天錦州遙相拱衞沙綫分歧非熟習海徑者無由曲折而至且海口二十里外有攔港沙一道融結天成儼若海口外衞總兵陸路營伍足資捍衞所有天津水師無庸復設於是水師營遂裁二十年又據琦善奏英艦到粵難保不分投竄擾天津密邇京畿尤宜慎重防堵遂復嚴旨派員駐紮要隘協同防禦二十一年天津海口增駐官兵建礮臺營房近海村落招集團練修築土堡互為策應二十二年令直隸沿海營兵善於鳧水及諳習風濤駕駛之技者飭統兵官訓練並增設巡哨兵船以蘆臺為北塘後路設通永鎮標十五營駐守二十三年令天津水師營每年撥戰船六艘分三路巡防與奉天山東師船定期會哨以登州岫巖城錦州三處為呈票考驗之地有畏避風浪巡哨貽誤者嚴懲之三十年令訥爾經額察視海防咸豐八年令僧格林沁在大沽口及雙港修築礮臺設水路木筏及沿岸營壘調宣化鎮兵會大沽協兵守護海口礮臺又令史榮椿等由天津赴山海關履勘海防要隘同治元年令曾國藩薛煥等購買外洋兵船巨礮統以鎮將酌分數艘駐泊天津海口九年山東巡撫丁寶楨以大沽北塘等處為京師門戶慮直隸兵力不足調山東舊部十八營赴直隸邊境候調十年直隸總督李鴻章增設大沽協海口六營酌定營制修築大沽口南北兩岸礮臺與北塘相犄角調遵化練軍千人移駐十三年又以北洋海防僅恃大沽北塘二海口礮臺後路尚恐單薄乃就運河北岸用三合土建築新城四圍設大小礮臺護以金剛牆引海河為城濠屯駐重兵與大沽防營相應光緒元年李鴻章復於大沽北塘新城各處增築洋式礮臺營壘購置鐵甲快船碰船水雷船以備攻守二年令總兵周盛傳率淮軍馬步二十餘營建築新城礮臺三年成之六年李鴻章以北塘迤東至山海關延長數百里調宋慶郭松林二軍分駐沿海蒲河口秦皇島等處並增建礮臺又以淮練各軍駐天津防守大沽北塘各口以鮑超全軍三十營駐昌黎樂亭防守大清河洋河各口以山海關防軍兼顧金山嘴秦皇島老龍頭各處時曾國荃建議直隸海防不宜遠守營口宜以重兵守山海關乃命曾國荃統率安徽湖北山西各軍赴山海關駐守八年李鴻章於大沽北塘礮臺下埋伏水雷大沽口內設攔河木筏山海關內外築三合土大礮臺一土礮臺二瀕海營牆均仿礮臺建築又寧海城臨海受敵於礮臺牆外悉以沙土掩護其時大沽南北岸礮臺大小共數十座輔以水雷鐵艦沿岸以陸軍駐守十一年因京東沿海空虛調練軍各營移駐灤州昌黎等處二十三年直隸總督王文韶以武毅軍訓練初成率前後二軍及馬隊一軍周歷山海關沿海一帶以重防務自歐艦來窺僧格林沁戰敗廷議始專津沽之防中日之役旅順威海相繼淪陷而津海未開戰事及拳匪肇釁聯軍北犯沽口礮臺毀於一旦北洋沿海防務遂日形懈弛云山東海岸緜亙自直隸界屈曲而南以達江蘇其間大小海口二百餘處東北境之登萊青三府地形突出三面臨海威海煙臺島嶼環羅與朝鮮海峽對峙為幽薊屏藩海禁既開各國商帆戰艦歷重洋而來至山東成山而折入渤海以達沽口故創練海軍以威海旅順為根據地欲守津沽先守威旅齊魯關山遂與畿疆並重矣順治十一年令蘇利為水軍都督駐軍碣石為山東防海之始乾隆五十五年以膠州文登即墨等營兼防海口以總兵駐登州統水師三營戰船十二艘修治各海口礮臺道光二十一年以芝罘島扼東海之口撥兵防守蓬萊黃縣榮城寧海掖縣膠州即墨所屬之十三島編練民團互為防衞三十年以瀕海之三汛師船四縣水勇合幷防守海口幷扼要安設大礮咸豐元年登州總兵陳世忠以海寇奪掠官船山東水師無多會閩粵大號師船合力截捕三年於登萊青三府舉辦聯莊團練給以兵械八年飭天津鎮總兵赴山東詳勘海豐一帶海口九年以海豐縣之大沽河有防營故址飭崇恩等撥兵防守十年文煜令青州等沿海各城滿綠營兵勤加訓練分守城官兵之半以守海口同治九年丁寶楨以東境海口紛歧惟有扼要防守其文登縣屬之馬頭石島福山縣屬之煙臺蓬萊縣屬之廟島掖縣屬之小石島為洋船北來所必經地居險要共撥兵六千餘人分守十一年撥大號兵船一艘駐泊登州洋面光緒元年丁寶楨以山東之東三府三面環海外寇隨處可登宜扼要屯守其要地有三一煙臺於通申岡設防營駐兵三千煙臺山下及八蜡廟芝罘島之西共建浮鐵礮臺三座芝罘島之東築沙土曲折礮臺一座一威海衞於劉公島之東口建浮鐵礮臺一座而於島口內築沙土曲折礮臺於口外海面密布水雷其北口內亦建沙土浮鐵礮臺可作兵輪船水寨之用一登州於城北建沙土高式礮臺城內建沙土圓式礮臺長山之西建沙土曲折礮臺與郡城相犄角礮臺用克魯伯後膛大礮參用阿姆司脫朗前膛大礮兵丁用格林礮克魯伯四磅礮亨利馬悌尼快槍請求行陣攻守之法六年以新購外洋蚊礮船駐防煙臺海面十二年許景澄建議山東膠州灣當南北洋之中東為浮山西為靈山口狹而水深宜規畫形勢為新練海軍屯港與旅順口東西相應是年李鴻章於威海衞南北岸築礮臺布水雷十七年於威海黃泥岩增築新式礮臺又於南岸龍廟嘴礮臺外增築趙北口礮臺劉公島新築地阱礮臺設後膛巨礮於隧道其西之黃島水中之日島亦設礮臺與南岸相應劉公島又設大鐵碼頭為海軍寄椗上煤之所防務益周密東省形勢以威海膠州為要口於海軍屯泊尤宜乃甲午一役威海水陸之防既毀於日本而德因教案曾以大隊鐵艦奪踞膠州灣闢商埠開鐵路寖窺腹地東省海防遂無所藉手云江南海防自海州南歷長江吳淞江二口稍折而西至松江奉賢縣境之海灣南接浙江洋面其間港口羅列惟江陰吳淞二處一為長江之筦鍵一為蘇松之門戶防務尤重至江陰以上以江流深廣外海兵艦商船溯流而上西達夔渝三千里流域雖皖贛楚蜀各有江防實以江南當下游之衝自狼福山以迄京口金陵礮壘防營星羅棋布上游防衞與下游繁簡迥殊而江蘇轄境長江千里兵艦礮臺無異海防水陸營汛亦與海疆聯絡故安徽省以上江防即隸於蘇省海防焉自海州南抵江口乃昔年黃河入海處泥沙積久凝結內海稱五條沙海潮甚急海舶北赴燕齊者必東行一晝夜以避其沙故淮海州郡得稍寬海防者以五條沙為之保障也自狼福山口南抵吳淞沙凝潮急略同北境惟長江吳淞二口水深溜大巨艦可直駛內江故海口防務視海濱倍重清初平定江南分八旗勁旅駐京口以鎮海大將軍統之設水師營造沙唬船以習水戰旋以沙唬船難涉大洋乃改造鳥船時鄭成功據臺灣以師船進窺江表由京口薄金陵梁化鳳擊敗之順治十四年命梁化鳳為水軍都督率軍萬人駐防崇明吳淞以松江府三面臨海設提督駐重兵康熙六年因崇明孤懸大海嚴出海之禁十四年以提督統八營駐崇明二十三年減存四營列汛六十有八太倉州為元代海運放洋之口明代置兵屯守清初設遊擊以劉河營移駐茜涇鎮雍正四年分設寶山縣列汛五十有七上海縣當黃浦江之衝原有墩臺十七座康熙二年以墩臺距海較