港三口其南為金州鎮又西經大登小登即厦門島島北為同安港口金厦二門遠控臺澎近衞泉漳為海防重地其外海之永寧定安烏潯諸島亦設汛置兵此泉州之防也漳州重在南澳鼓浪嶼為南境盡處尤擅形勢其沿海之境自九龍江口折而西南經六鼇港漳江二口循銅山而南為詔安港口其南隔海為南澳鎮南疆要地與粵海共之其外海島嶼首為烏丘最當衝要而鼓浪嶼當海門之口與鎮海城礮臺同為重地此漳州之防也中國沿海各省自浙洋而北海濱淤沙多而島嶼少其海岸徑直故防務重在江海總口而略於海岸自浙洋而南島嶼多而淤沙少其海岸紆曲故防務既重海口而巨島與海岸亦並重焉順治十七年王命岳以閩省之海門與廈門相望左為鎮海衞乃漳州府之門戶同安縣之高浦城等處地近廈門為泉州府屏衞乃屯兵於鎮海高浦二城而分營以防鄰近隘口雍正四年浙閩總督高其倬奏陳操練沿海水師並令閩洋水師巡視本省各口兼赴浙洋巡緝嘉慶四年令閩省水師仿商船式改造戰船八十艘編為兩列自泉州之崇武分南北犄角由崇武而南令南澳銅山金門及提標後營各鎮將率船巡緝崇武而北令海壇閩安及金門右營各鎮將率船巡緝道光二十年諭鄧廷楨招募練勇嚴守澎湖以扼閩省赴臺灣之路二十二年諭怡良等屯兵福州金牌各要口其距省二十里外之洪塘河及少岐均沈船布樁設防閩省門戶在外洋者為五虎芭蕉二口入口為壺江水勢稍狹無險可扼進至金牌長門有巨石橫亙中流扼守較易又進乃閩安之南北岸為水路總匯兩山夾峙可稱天險光緒六年於南岸建鐵門暗礮臺六明礮臺八北岸建鐵門暗礮臺七七年又於長門建暗礮臺四明礮臺六悉仿洋式二十四年增祺因閩省濱海屯戍空虛增練旗綠各營以厚兵力二十五年許應騤以漳州之鼓浪嶼設防尚未周備增建礮臺置新式礮綜閩省海防所注重者隨時異宜當康熙間以鄭氏由臺澎據海壇金廈故海防獨重泉漳其時水師以沙唬船不適於海戰改造鳥船施琅之平臺灣即藉鳥船之力及嘉慶間海盜蔡牽竄擾浙閩粵三省洋面而閩省當其中寧福興泉漳五郡皆剽掠經由之境故列郡咸重海防其時水師利用巨艦李長庚造霆船三十艘置大礮四百餘具屢敗牽於閩海卒合閩浙水師之力圍而殲之最後為光緒中法之戰法人以大隊鐵艦專攻福州故海防獨重閩江口而各郡無驚同治以後創船廠造鐵艦築礮臺製槍礮海防漸臻嚴密乃馬江失律盡隳前功良足慨耳臺灣西與福興泉漳四府相值距澎廈各數百里其山脈北起雞籠南盡沙馬碕東西沃野一歲三熟宋稱毗舍那國明季日本荷蘭人迭踞之順治間鄭成功占臺灣金厦時犯泉漳康熙初姚啟聖以閩省水師三百艘討之先克金厦二十二年施琅以水師二萬克臺灣乃置臺灣府設廳縣各官鑄鐵幣開學校築城垣逐生番戍兵萬有四千遂為海外重鎮康熙六十年朱一貴之叛施世驃由厦門率水師六百艘進攻七日而克之乃以總兵官鎮臺灣副將守澎湖乾隆間福康安平林爽文之亂臺灣北境乃漸展拓其山後之地至嘉慶間始闢之光緒十三年開臺灣為省治設巡撫以下各官為中國海南右臂及中日之戰割讓於日本而疆事益不可問云廣東南境皆瀕海自東而西歷潮惠廣肇高雷廉七郡而抵越南其東境始於南澳與閩海接界潮郡支山入海有廣澳赤澳諸島皆水師巡泊所在迤西為惠州民性剽悍與潮郡無異設碣石鎮總兵以鎮之又西為廣州境其海灣深廣自新安折而北又折而南至香山是為內海羣島環羅為廣州省治之外護又西為金州馬鞍諸山則肇郡陽江之屏障也又西為高州海多暗礁暗沙海防較簡又西為雷州其南幹突出三百餘里三面皆海渡海而南為瓊州又西為廉欽與越南錯壤廉州多沙欽州多島襟山帶海界接華夷瓊州孤懸海表其州縣環繞黎疆沿海多沈沙行舟至險水師可寄泊港口僅有六七處此全境海防之形勢也廣州海防自零丁洋過龍穴而北兩山斜峙東曰沙角西曰大角由此入內洋為第一重隘進口七里有山曰橫當前有小山曰下橫當左為武山亦曰南山為海船所必經乃第二重隘再進五里曰大虎山西曰小虎山又西曰獅子洋乃黃埔入省城之路為第三重隘歷朝於此雖築壘駐兵而設備未周歐艦東來粵東首當其衝道光禁煙之役英艦進薄廣州內海林則徐督粵屢戰卻之其時布防較密而壁塢皆循舊式至光緒間彭玉麟張之洞守粵始有曲折掩護之礮臺後膛連珠之槍礮防務益嚴矣清初規制設大小兵船一百數十艘僅能巡防內洋不能越境追捕遇有寇盜則賃用民船康熙五十六年始建廣州海濱橫當南山二處礮臺乾隆五年以廣東戰船年久失修諭疆吏加意整頓四十六年巴延三以各海口時有寇船出沒於石棋村總口設立專營與虎門營汛聯絡五十八年吳俊以東莞米艇堅固靈捷便於追捕海寇造二千五百石大米艇四十七艘二千石中米艇二十六艘一千五百石小米艇二十艘分布上下洋面配置水兵常年巡緝嘉慶五年於沙角建礮臺九年倭什布以粵海窮漁伺刦商船遇水師大隊出巡輒登陸肆擾遂無寧歲乃規畫水陸緝捕事宜十五年設水師提督駐虎門扼中路要區以二營駐香山一營駐大鵬為左右翼二十年就橫當礮臺加築月臺又於南山之西北增建鎮遠礮臺置礮多具二十二年建大虎山礮臺置礮三十二具道光十年於大角山增建礮臺一置礮十六具十五年在虎門礮臺置六千斤以上大礮四十具又於南山威遠礮臺前環築月臺亦置礮位於橫當之陰及對岸蘆灣山增建永安鞏固二礮臺沙角大角並增建瞭望臺十九年林則徐籌防粵海以零丁洋入口之要隘數重歷年雖增築礮臺而武山橫當海面較狹設大木排八千排分為二道大鐵練七百丈臨以礮臺輔以水兵以阻敵船來路時鄧廷楨因虎門當粵海中路亦於橫當山前海狹之處增設練排又於武山下威遠鎮遠二礮臺之間增大礮臺一座置礮六十具以護排練二十年林則徐以大鵬營所轄尖沙嘴一帶海門島嶼為海舶東赴惠潮北往閩浙所必經乃於尖沙嘴之石脚上官涌偏南之處皆建礮臺並藥庫兵房二十三年祁等以廣東民風宜於團練招集已得十萬人以升平社學為團練總匯之所推及韶州廉州等處二十七年增築高要縣屬琴沙礮臺並虎門廣濟墟兵卡同治十年瑞麟以欽州海面與越南接界調撥兵輪會同舟師巡洋時閩滬二廠兵輪次第告成粵省亦仿造兵輪以備巡防光緒六年劉坤一修整大黃窖及中流砥柱虎門各礮臺威遠及下橫當共築礮臺六十餘座沙角及浮舟山各礮臺亦依次建築八年曾國荃以瓊廉二郡洋面與越南沿海相通撥兵輪八艘拖船二艘赴北海駐防九年國荃以虎門為省城門戶而黃埔長洲白兔輪岡魚珠沙路尤為要區乃於南岸屯重兵為礮臺犄角兼顧後路十年彭玉麟辦理廣東軍務就粵省原有各礮臺修整改造並於礮臺後闢山開路以藏弁兵築緜亙牆濠聯絡各礮臺聲勢自虎門大角沙角以次各隘節節設防其新會香山順德等縣選練精壯漁團及新編靖海營兵防堵各口十一年玉麟以省城要口雖已嚴防而橫門磨刀門厓口皆可由海口互達窺伺後路淺水兵輪尚未造成先造舢板船百艘編為水師以散御整藉固內口十二年張之洞於廣州駐防兵內選千五百人習洋槍洋礮以旗營水師并入編為兩翼分防海疆十四年張之洞吳大澂以瓊州一島內綏黎族外通越南就瓊州原有制兵酌設練軍並加練餉一洗綠營積弊舊額四千九百餘人按七底營抽練共編練一千七百五十人崖州等處水師加以整頓原有拖船亦配撥練軍以二艘駐崖州二艘駐儋州二艘駐海口二艘駐海安其守兵二千人勻撥緊要塘汛三十三年以廣東民風不靖已裁之廣東水師提督復其舊制以資鎮懾此粵海防務之概略也歷朝海疆有警若大沽若吳淞若馬江迭遭挫敗惟林則徐彭玉麟先後守粵忠勇奮勵身當前敵將士用命敵艦逡巡而退云
