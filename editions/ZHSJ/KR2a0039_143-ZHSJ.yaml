body:
  text: 清史稿卷一百四十三志一百十八刑法二明律淵源唐代以笞杖徒流死為五刑自笞一十至五十為笞刑五自杖六十至一百為杖刑五徒自杖六十徒一年起每等加杖十刑期半年至杖一百徒三年為徒五等流以二千里二千五百里三千里為三等而皆加杖一百死刑二曰斬曰絞此正刑也其律例內之雜犯斬絞遷徙充軍枷號刺字論贖凌遲梟首戮屍等刑或取諸前代或明所自創要皆非刑之正清太祖太宗之治遼東刑制尚簡重則斬輕則鞭扑而已迨世祖入關沿襲明制初頒刑律笞杖以五折十注入本刑各條康熙朝現行則例改為四折除零雍正三年之律乃依例各於本律注明板數徒流加杖亦至配所照數折責蓋恐扑責過多致傷生命法外之仁也文武官犯笞杖則分別公私代以罰俸降級降調至革職而止徒者奴也蓋奴辱之明發鹽場鐵冶煎鹽炒鐵清則發本省驛遞其無驛縣分撥各衙門充水火夫各項雜役限滿釋放流犯初制由各縣解交巡撫衙門按照里數酌發各處荒蕪及瀕海州縣嗣以各省分撥失均不免趨避揀擇乾隆八年刑部始纂輯三流道里表將某省某府屬流犯應流二千里者發何省何府屬安置應流二千五百里者發何省何府屬安置應流三千里者發何省何府屬安置按計程途限定地址逐省逐府分別開載嗣於四十九年及嘉慶六年兩次修訂然第於州縣之增併道里之參差略有修改而大體不易律稱犯流妻妾從之父祖子孫欲隨者聽乾隆二十四年將僉妻之例停止其軍流遣犯情願隨帶家屬者不得官為資送律成虛設矣斬絞同是死刑然自漢以來有秋後決囚之制唐律除犯惡逆以上及奴婢部曲殺主者從立春至秋分不得奏決死刑明弘治十年奏定真犯死罪決不待時者淩遲十二條斬三十七條絞十二條真犯死罪秋後處決者斬一百條絞八十六條順治初定律乃於各條內分晰注明凡律不注監候者皆立決也凡例不言立決者皆監候也自此京外死罪多決於秋朝審遂為一代之大典雜犯斬絞准徒五年與雜犯三流總徒四年大都創自有明清律於官吏受贓枉法不枉法滿貫俱改為實絞餘多仍之名實混淆殊形轇轕遷徙原於唐之殺人移鄉而定罪則異律文沿用數條然皆改為比流減半徒二年幷不徙諸千里之外惟條例於土蠻瑤僮苗人讐殺劫擄及改土為流之土司有犯將家口實行遷徙然各有定地亦不限千里也明之充軍義主實邊不盡與流刑相比附清初裁撤邊衞而仍沿充軍之名後遂以附近近邊邊遠極邊煙瘴為五軍且於滿流以上為節級加等之用附近二千里近邊二千五百里邊遠三千里極邊煙瘴俱四千里在京兵部定地在外巡撫定地雍正三年之律第於十五布政司應發省分約略編定乾隆三十七年兵部根據邦政紀略輯為五軍道里表凡發配者視表所列然名為充軍至配幷不入營差操第於每月朔望檢點實與流犯無異而滿流加附近近邊道里反由遠而近司讞者每苦其紛歧而又有發遣名目初第發尚陽堡寧古塔或烏喇地方安插後幷發齊齊哈爾黑龍江三姓喀爾喀科布多或各省駐防為奴乾隆年間新疆開闢例又有發往伊犁烏魯木齊巴里坤各回城分別為奴種地者咸同之際新疆道梗又復改發內地充軍其制屢經變易然軍遣止及其身苟情節稍輕尚得更赦放還以視明之永遠軍戍數世後猶句及本籍子孫者大有間也若文武職官犯徒以上輕則軍臺効力重則新疆當差成案相沿遂為定例此又軍遣中之歧出者焉枷杻本以羈獄囚明代問刑條例於本罪外或加以枷號示戮辱也清律犯罪免發遣條凡旗人犯罪笞杖各照數鞭責軍流徒免發遣分別枷號徒一年者枷號二十日每等遞加五日流二千里者枷號五十日每等亦遞加五日充軍附近者枷號七十日近邊沿海邊外者八十日極邊煙瘴者九十日原立法之意亦以旗人生則入檔壯則充兵鞏衞本根未便離遠有犯徒流等罪直以枷號代刑強榦之義則然然犯係寡廉鮮恥則銷除旗檔一律實發不姑息也若竊盜再犯加枷初犯再犯計次加枷犯姦加枷賭博加枷逃軍逃流加枷暨一切敗檢踰閑不顧行止者酌量加枷則初無旗民之別康熙八年部議囚禁人犯止用細鍊不用長枷而枷號遂專為行刑之用其數初不過一月二月三月後竟有論年或永遠枷號者始制重者七十觔輕者六十觔乾隆五年改定應枷人犯俱重二十五觔然例尚有用百觔重枷者嘉慶以降重枷斷用三十五觔而於四川陝西湖北河南山東安徽廣東等省匪徒又有繫帶鐵桿石礅之例亦一時創刑也刺字古肉刑之一律第嚴於賊盜乃其後條例滋多刺緣坐刺兇犯刺逃軍逃流刺外遣改遣改發有刺事由者有刺地方者並有分刺滿漢文字者初刺右臂次刺左臂次刺右面左面大抵律多刺臂例多刺面若竊盜責充警跡二三年無過或緝獲強盜二名以上竊盜三名以上例又准其起除刺字復為良民蓋惡惡雖嚴而亦未嘗不予以自新之路焉贖刑有三一曰納贖無力照律決配有力照例納贖二曰收贖老幼廢疾天文生及婦人折杖照律收贖三曰贖罪官員正妻及例難的決並婦人有力者照例贖罪收贖名曰律贖原本唐律收贖贖罪名為例贖則明代所創行順治修律五刑不列贖銀數目雍正三年始將明律贖圖內應贖銀數斟酌修改定為納贖諸例圖然自康熙現行例定有承問官濫准納贖交部議處之條而前明納贖及贖罪諸舊例又節經刪改故律贖俱照舊援用而例贖則多成具文其捐贖一項順治十八年有官員犯流徒籍沒認工贖罪例康熙二十九年有死罪現監人犯輸米邊口贖罪例三十年有軍流人犯捐贖例三十四年有通倉運米捐贖例三十九年有永定河工捐贖例六十年有河工捐贖例然皆事竣停止其歷朝沿用者惟雍正十二年戶部會同刑部奏准預籌運糧事例不論旗民罪應斬絞非常赦所不原者三品以上官照西安駝捐例捐運糧銀一萬二千兩四品官照營田例捐運糧銀五千兩五六品官照營田例捐銀四千兩七品以下進士舉人二千五百兩貢監生二千兩平人一千二百兩軍流各減十分之四徒以下各減十分之六俱准免罪西安駝捐行自雍正元年營田例則五年所定也乾隆十七年西安布政使張若震奏請另定捐贖笞杖銀數經部議預籌運糧事例杖笞與徒罪不分輕重一例捐贖究未允協除犯枷號杖責者照徒罪捐贖外酌擬分杖為一等笞為一等其數杖視徒遞減笞視杖遞減二十三年諭將斬絞緩決各犯納贖之例永行停止遇有恩赦減等時其憚於遠行者再准收贖而贖鍰則仍視原擬罪名不得照減等之罪著為令嗣後官員贖罪者俱照運糧事例核奪刑部別設贖罪處專司其事此又律贖例贖而外別自為制者矣淩遲用之十惡中不道以上諸重罪號為極刑梟首則強盜居多戮屍所以待惡逆及強盜應梟諸犯之監故者凡此諸刑類皆承用明律略有通變行之二百餘年至過誤殺之賠人竊盜之割脚筋重辟減等之貫耳鼻強盜貪官及窩逃之籍家產或沿自盛京定例或順治朝偶行之峻令不久革除非所論也自光緒變法二十八年山西巡撫趙爾巽奏請各省通設罪犯習藝所經刑部議准徒犯毋庸發配按照年限於本地收所習藝軍流為常赦所不原者照定例發配到配一律收所習藝流二千里限工作六年二千五百里八年三千里者十年遣軍照滿流年限計算限滿釋放聽其自謀生計並准在配所入籍為民若為常赦所得原者無論軍流俱無庸發配即在本省收所習藝工作年限亦照前科算自此五徒並不發配即軍流之發配者數亦銳減矣二十九年刑部奏准刪除充軍名目將附近近邊邊遠併入三流極邊及煙瘴改為安置仍與當差並行自此五軍第留其二而刑名亦改變矣三十年劉坤一張之洞會奏變法第二摺內有恤刑獄九條其省刑責條內經法律館議准笞杖等罪仿照外國罰金之法改為罰銀凡律例內笞刑五以五錢為一等至笞五十罰銀二兩五錢杖六十者改為罰五兩每一等加二兩五錢以次遞加至杖一百改為罰十五兩而止如無力完納折為作工應罰一兩折作工四日以次遞加至十五兩折作工六十日而止然竊盜未便罰金議將犯竊應擬笞罪者改科工作一月杖六十者改科工作兩月杖七十至一百每等遞加兩月又附片請將軍流徒加杖概予寬免無庸決責自此而笞杖二刑廢棄矣三十一年修訂法律大臣沈家本等奏請刪除重法數端略稱見行律例款目極繁而最重之法亟應先議刪除者約有三事一曰淩遲梟首戮屍淩遲之刑唐以前無此名目遼史刑法志始列入正刑之內宋自熙寧以後漸亦沿用元明至今相仍未改梟首在秦漢時惟用諸夷族之誅六朝梁陳齊周諸律始於斬之外別立梟名自隋迄元復棄而不用今之斬梟仍明制也戮屍一事惟秦時成蟜軍反其軍吏皆斬戮屍見於始皇本紀此外歷代刑制俱無此法明自萬曆十六年定有戮屍條例專指謀殺祖父母父母而言國朝因之後更推及於強盜凡此酷重之刑固所以懲戒凶惡第刑至於斬身首分離已為至慘若命在頃忽葅醢必令備嘗氣久消亡刀鋸猶難倖免揆諸仁人之心當必慘然不樂謂將以懲本犯而被刑者魂魄何知謂將以警戒衆人而習見習聞轉感召其殘忍之性實非聖世所宜遵請將淩遲梟首戮屍三項一概刪除死罪至斬決而止凡律例內淩遲斬梟各條俱改斬決斬決而下依次遞減一曰緣坐緣坐之制起於秦之參夷及收司連坐法漢高后除三族令文帝除收孥相坐律當時以為盛德惜夷族之誅猶間用之晉以下仍有家屬從坐之法唐律惟反叛惡逆不道律有緣坐他無有也今律則姦黨交結近侍諸項俱緣坐矣反獄邪教諸項亦緣坐矣一案株連動輒數十人夫以一人之故而波及全家以無罪之人而科以重罪漢文帝以為不正之法反害於民北魏崔挺嘗曰一人有罪延及闔門則司馬牛受桓魋之罰柳下惠膺盜跖之誅不亦哀哉其言皆篤論也今世各國皆主持刑罰止及一身之義與罪人不孥之古訓實相符合請將律內緣坐各條除知情者仍坐罪外其不知情者悉予寬免餘條有科及家屬者准此一曰刺字刺字乃古墨刑漢之黥也文帝廢肉刑而黥亦廢魏晉六朝雖有逃奴劫盜之刺旋行旋廢隋唐皆無此法至石晉天福間始創刺配之制相沿至今其初不過竊盜逃人其後日加煩密在立法之意原欲使莠民知恥庶幾悔過而遷善詎知習於為非者適予以標識助其兇橫而偶罹法網者則黥刺一膺終身僇辱夫肉刑久廢而此法獨存漢文所謂刻肌膚痛而不德者未能收弼教之益而徒留此不德之名豈仁政所宜出此擬請將刺字款目概行刪除凡竊盜皆令收所習藝按罪名輕重定以年限俾一技能嫻得以餬口自少再犯三犯之人一切遞解人犯嚴令地方官僉差押解果能實力奉行逃亡者自少也奏上諭令淩遲梟首戮屍三項永遠刪除所有現行律例內淩遲斬梟各條俱改為斬決其斬決各條俱改為絞決絞決各條俱改為絞監候入於秋審情實斬監候各條俱改為絞監候與絞候人犯仍入於秋審分別實緩至緣坐各條除知情者仍治罪外餘悉寬免其刺字等項亦概行革除旨下中外稱頌焉三十二年法律館奏准將戲殺誤殺擅殺虛擬死罪各案分別減為徒流自此而死刑亦多輕減矣又是年法律館以婦女收贖銀數太微不足以資警戒議准婦女犯笞杖照新章罰金徒流軍遣除不孝及姦盜詐偽舊例應實發者改留本地習藝所工作以十年為限餘俱准其贖罪徒一年折銀二十兩每五兩為一等五徒准此遞加由徒入流每一等加十兩三流准此遞加遣軍照滿流科斷如無力完繳將應罰之數照新章按銀數折算時日改習工藝其犯該枷號不論日數多寡俱酌加五兩以示區別自此而收贖銀數亦稍變矣故宣統二年頒布之現行刑律第將近數年奏定之章程采獲修入於是刑制遂大有變更其五刑之目首罰刑十以代舊律之笞杖一等罰罰銀五錢至十等罰為銀十五兩據法律館議覆恤刑獄之奏也次徒刑五年限仍舊律次流刑三道里仍舊律然均不加杖以法律館業經附片奏刪也次遣刑二曰極邊足四千里及烟瘴地方安置曰新疆當差以閏刑加入正刑承用者廣不得不別自為制也次死刑二曰絞曰斬時雖有死刑唯一之議以舊制顯分等差且淩遲梟首等項甫經議減不敢徑行廢斬也徒流雖仍舊律然為制不同按照習藝章程五徒依限收入本地習藝所習藝流遣毋論發配與否俱應工作故於徒五等注明按限工作流二千里注工作六年二千五百里注工作八年三千里注工作十年遣刑俱注工作十二年收贖則根據婦女贖罪新章酌減銀數改為通例罰刑照應罰之數折半收贖徒一年贖銀十兩每等加銀二兩五錢至徒三年收贖銀二十兩流刑每等加銀五兩至三千里贖銀三十五兩遣刑與滿流同科絞斬則收贖銀四十兩亦分注於各刑條下然非例應收贖者不得濫及也捐贖據光緒二十九年刑部奏准照運糧事例減半銀數另輯為例其笞杖雖不入正刑仍留竹板以備刑訊之用外此各刑具盡行廢除枷號亦一概芟削刑制較為徑省矣惟就地正法一項始自咸豐三年時各省軍興地方大吏遇土匪竊發往往先行正法然後奏聞嗣軍務敉平疆吏樂其便己相沿不改光緒七八年間御史胡隆洵陳啟泰等屢以為言刑部聲請飭下各省體察情形仍照舊例解勘分別題奏嗣各督撫俱覆稱地方不靖礙難規復舊制刑部不得已乃酌量加以限制如實係土匪馬賊游勇會匪方准先行正法尋常強盜不得濫引自此章程行沿及國變而就地正法之制訖未之能革
