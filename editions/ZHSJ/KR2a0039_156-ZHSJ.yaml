body:
  text: 清史稿卷一百五十六志一百三十一邦交四美利堅美利堅在亞美利加洲初來華貨船常至粵東道光二十一年英因鴉片之役詔停貿易美為英人請准貨船入口不許二十二年與英和許寧波互巿美商船由定海駛至寧波請報稅通商浙撫劉韻珂以聞朝旨以美通商向在粵東不許已復請增商埠將軍伊里布以聞許之命與英併議稅則明年三月美商船駛至上海求通商拒以稅則未定既聞英通商章程已議定復請援英例開巿又稱進口洋參鉛斤二項稅則繁重請減輕以百斤取五為率江督耆英等以洋參鉛斤歲來無多允酌改美人福士又請入覲不許冬十月福士忽稱有使臣顧盛來粵仍求覲見並遞國書欲與中國商議定約並稱沒蘭的彎兵船欲赴天津諭令折回不省二十四年四月美兵船進黃浦阻之答以進口專為約束商民防範海盜無他意又責中國款待要求甚堅者十款耆英等屢與駮詰於是酌定條款如商船納鈔已畢因貨未全銷改往別口轉售免重徵又商船進口並未開艙即欲他往限二日出口不徵稅鈔又商船進口納清稅餉欲將已卸之貨運往別口售賣免重納稅鈔此外又許其於貿易港口租地建禮拜堂及殯葬處所又許延請中國士人教習方言佐理筆墨及採買中國各項書籍又增入商人擅赴五口外私行交易及走私漏稅攜帶鴉片及違禁貨物聽中國官自行辦理治罪一款遂定議尋進國書耆英請賜詔書褒美許之二十六年諭通商傳教祗許在五口不得覊留別地緣美人在定海傳教非條約所許故也十一月美使義華業來粵呈遞國書初欲入覲面呈耆英等以條約折之乃已咸豐三年七月美酋馬沙利來粵接辦本國公使事務齎有國書仍欲進京投遞中國持定約不許時賊氛未靖美兵船忽至滬揚言往鎮江等處察看賊情並整頓海口商務如督撫不與會晤當繕奏齎往天津投遞蘇撫許乃釗以聞命赴粵聽欽差大臣察辦同時美兵船又入琉球琉球王世子咨閩浙總督王懿德懿德以聞命粵督葉名琛曉諭使撤回兵船四年六月美人麥蓮至上海要求赴揚子江一帶貿易請代奏江督怡良諭令回粵候葉名琛察辦麥蓮返粵名琛不予接見乃復回上海與英法人往見蘇撫吉爾杭阿要求赴天津變通成約吉爾杭阿拒之不聽既而船至天津命長蘆鹽政文謙等復阻之仍以進京求覲為詞遞清摺要求十一款駮之惟華洋訴訟豁免積欠及廣東茶稅每擔加抽二錢允與商辦麥蓮等遂去六年美人伯駕來粵請換約時英人包令法人顧思同至亦請換約與伯駕同赴天津朝命葉名琛阻之旋駛至福建遞國書要求公使駐京中國遣大臣駐美京華盛頓朝命閩浙總督王懿德約回廣東嚴詞駮之伯駕不省八月偕本國水師提督奄師大郎乘火輪至上海云奉國主命必須入京覲見屢諭不從是年減免美在滬未繳關稅因粵賊滋擾美商受損失故也七年十月美遣新公使列衞廉來粵代伯駕會英人虜葉名琛省城被據美人來滬投遞牒大學士裕誠文願勸和裕誠覆以已命黃宗漢赴廣辦理外國事務可速赴廣東會晤八年二月美隨英法調兵船來津命直隸總督譚廷襄等接晤美使與俄使普提雅廷同見廷襄欲變通舊約未允五月命大學士桂良吏部尚書花沙納為欽差大臣與美使列衞廉定約初美條款要求添商埠保教民立塔表鑄銀元賠損失防凌害船隻駛揚子江及粵東珠江並各支流文移達內閣使臣駐北京丈量船身計噸納鈔法以各用法律治本國人民特援最惠國利益均霑之例載入約中迄未行至是復請冬十月定通商稅則桂良致書美與英法使臣議通商善後事極陳領事之弊美列衞廉覆書略謂美國商民進內地按天津條約利益均霑是則美進內地所有請執照等情應同英法一例俟國主及國會議允批准和約後必明立律例交領事禁止不請執照或強請執照等事致免國民違犯中國憲典又整理有約無約各國之法本大臣向知此事應變通今請將中國所能行者略為陳列按泰西各國公使凡此國領事奉遣至別國者若不得所往之國準信延接即不得赴任今凡有稱領事而中華國家或省憲地方官不肯明作準信延接者彼即無權辦事是則中國於此等兼攝領事即可推辭不接已延接者亦可聲明不與交往設有美國人兼攝無約領事藉作護身符以圖己益者地方官可却不與延款遇有事故令彼投明美國領事自應隨時辦理間或美國人兼攝領事而代無約商民討求地方官協助申理地方礙情代為辦理者亦可對彼說明並非職守當然祗由於情面而已又若此等自稱領事有與海關辦理船隻餉項事宜者地方官可却以必須按照條約遵行倘彼固執己見干犯則例者中國地方官應用強禁阻前在天津時本大臣照會桂中堂花冢宰以中國必須購造外國戰艦火輪船者特為此故足徵所言非謬也又領事不得干預貿易現美國定制凡干涉賣買者不得派作領事官又領事與地方官爭論前此動多牴牾本大臣深為恨憤業經設法將一切事宜妥為辨正嗣後果有仍前事款請照知本大臣定當修正若領事官不合之處地方官按理據實直斥其非不與共事此最善之法也總領事之設美國奉使駐紮中華者從無此制領事官亦無發給旗號之事本大臣復嚴諭領事嗣後不得有此以上據問直達猶有管見須照知者中國宜立國家旗號俾中國公私船盡行升用蓋美國制度凡本國人必用本國旗號泰西各國莫不皆然今中華貿易之盛而無旗號以保護何不亦仿他國之法使商船與盜賊有所區別而免商民之借用與假冒外國旗號哉桂良據奏厥後中國造輪船購戰艦用龍旗多采其議九年夏五月美使華若翰遵滬約改道北塘呈遞國書諭旨嘉奬七月換約還所擄前附和英人之蔣什坡美使回滬請照新章完納船鈔及在潮州臺灣先行開巿欽差大臣兩江總督何桂清以前大學士桂良等給與照會言明各口通商俟英法條約議定再照新章辦理不服乃允先開潮州臺灣兩口巿及照新章納船鈔餘仍從緩十年美船隨英法聯軍北駛是年美國書及原本條約稅則遺失特命蘇撫薛煥先與說明照俄國一律以通行刊本為憑美人許諾十一年四月始至漢口通商旋立九江巿埠先是三月美水師總領施碟烈倫以火輪船至九江尋去至是美商擇地勘定九江城西琵琶亭空地三十畝以地勢低窪興工建築居民以未給價阻之領事別列子始赴道署許照英國價例給發九江關監督以此地在大街繁盛之區與龍開河偏僻有水者不同駮詰之別列子去監督因牒駐漢口總領事始許依民間賣買又增索至五十畝是為美立九江巿埠之始秋七月美設領事於漢陽並代理俄國漢口通商事務又為美人在漢領事之始同治元年粵賊陷蘇太各城上海為各國通商之地蘇松太道吳煦招募壯勇雇洋人領隊有美人華爾者煦令管帶印度兵既印度兵遣撤煦令華爾管帶常勝軍協守松江屢出討賊有功奏給翎頂又白齊文者亦美人因華爾進命並在松江教習兵勇協同官軍勦賊屢立功華爾旋攻慈谿陣亡秋七月美伯理璽天德林肯亞伯剌罕遣使蒲玲堪安臣致皇帝書二年白齊文不遵調遣毆傷道員楊坊並劫餉四萬餘元事聞褫白齊文職命蘇撫李鴻章拿辦白齊文匿英兵艦美使蒲安臣以白齊文為美國人覆牒為代辨無罪總署以白齊文受中國官職應照中國法律懲辦辨駮久之美使始代白齊文認罪白齊文尋投賊被獲牒美使衞廉士述其罪狀請照前議亟予正法美使覆以請示本國白齊文尋溺死六年十月以美卸任使臣蒲安臣權充辦理中外交涉事務使臣時外洋諸國公使領事等先後來華於是特派蒲安臣以英人柏卓安法人德善為左右協理志剛孫家穀二員同往會辦緣蒲安臣充美公使最久中外交涉總署深相倚任故特派往特與議定條款凡事須咨總署覈定准駮試辦以一年為期又以中外儀節不同呈遞國書須存國體又慮各國因蒲安臣係西人以西例優待當告以中國體制使各國了解不致疑中國將來無報施之禮迭咨蒲安臣蒲安臣遂西是年美羅妹商船至臺灣之瑯𤩝洋面遭風船破被生番戕害又前有美商船羅發遭風飄至臺灣極南海島亦被害至是美住廈門領事李讓禮欲坐兵船赴臺住泊八月到瑯𤩝會臺灣鎮總兵劉明燈究詰此案而龜仔角生番糾集十七番社謀抗拒劉明燈招番目卓嵵篤往諭始知五十年前龜仔角一社之番悉被洋人殺害僅存樵者二人以致世世挾仇圖報因諭番人解散勸李讓禮無深究免再結仇李讓禮許諾遂議結既而李讓禮請在象鼻山設立礮臺未允七年春二月美使來言前年九月有本國商船兩隻在高麗擱淺被害尚餘四人請轉知高麗設法救護政府請高麗自行查明酌覈六月美人派兵船入高麗國王李熙奏聞中國查明並無覊留美人情事函致美使代為解釋美使乃無言其兵船亦啟椗去是月蒲安臣等至美遞國書並增定條約其要目有八一美國與他國失和不得在中國洋面奪貨劫人二除原定貿易章程外與美商另開貿易之路皆由中國作主三中國派領事駐美通商各口四中美奉教各異兩國不得稍有屈抑五兩國人民互相往來游歷不得用法勉強招致六兩國人民互相居住照相待最優之國利益均霑七兩國人民往來遊學照最優之國優待並指定外國所居之地互設學堂八美國聲明並無干預中國內治之權其時曾國藩等鑒於道咸間條約失利特建議遣使往訂此約於領海申明公法於租界爭管理權於出洋華工謀保護且預防干涉內治云九月美使勞文羅斯來華遞國書並呈書籍及五穀各種請換中國書籍穀種許之九年三月美遣鏤斐迪充出使中國大臣遞國書前使勞文羅斯回國四月中國出使大臣蒲安臣在俄病卒特予一品銜給卹銀萬兩十年正月美致朝鮮函請中國代達謂將以兵船前往商辦事務中政府以權宜許為轉達旋接朝鮮咨謂美使所投封函專為曩年美商船來韓一遭風遇救一人沒貨無以為一救一害相懸太甚欲請究治朝鮮以己國無殘害美船之事不允所請並請中國降旨開諭美使美使以降旨開諭是以屬國相待不受乃以兵船抵朝鮮脅之朝鮮人不服與力爭並報中國牒美使解之十二月美請援例開瓊州商埠十一年春二月許美國領事官代辦瑞士國商務瑞士國一名蘇益薩又稱綏沙蘭其商船至中國向以無約小國不設領事官至是請美領事官代辦商務美使牒稱遂次蘭國總署覆美使以瑞士事務祗可照料不能兼攝至通商納稅等事仍照向來無約各國祗許在海口通商其內地口岸及內地遊歷設局招工等事均不得一律均霑美使照覆更正遂次蘭為瑞士美領事雖得照料瑞士國商務不得稱瑞士國領事官十二年春穆宗親政美隨英法俄德請覲見十三年美使鏤斐迪回國以艾忭敏為駐華全權大臣覲見面遞國書光緒二年十一月美旗昌公司歸併中國招商局南洋大臣沈葆楨奏請給價銀二百二十萬兩報可四年出使大臣陳蘭彬等蒞美呈遞國書旋請設領事言華人僑美各邦約二十餘萬不設領事無以保護華民奏入許之五年美前統領格蘭忒來華值日本滅琉球政府因格蘭忒將遊日本託其轉圜格蘭忒至日本函勸中國與日本各設領事保護琉球中部其南部近臺灣為中國屬地割隸中國北部近薩摩島為日本屬地割隸日本兩國均不允又請派員會議卒不得要領六年七月美遣使臣安吉立及修約使臣帥腓德笛銳克來華請與中國大臣議事總署以聞並言同治七年中國與美續增條約其第五款內有兩國人民任便往來得以自由等語近來金山土人深嫉華人奪其工作不能相容上年美議院曾有限制華人之議經其總統據約批駮去年彼國開議又欲苛待華人經副使臣容閎牒外部言與約不符始將此例停止是華人在彼得有保護者惟恃續增條約之力居多今遣使來華恐有刪改續增條約之意請派員商議奏入命總署大臣寶鋆李鴻藻為全權大臣與美使議約初美續約第五款祗言兩國人民往來及遊歷貿易久居等人無華工字樣至是美使安吉立等遞修約節略內稱華工分住各口不下十萬人於本國平安有損請整理限制禁止總署以禁止一層與舊約不符惟限制一層尚可酌擬章程安吉立等以章程須由本國議院酌定此次來華祗求中國一言許其自行定限總署遂入奏與安吉立等議定四款凡傳教學習貿易遊歷人等仍往來自由其已在美華工亦仍舊保護惟續往承工之人定人數年數限制不得凌虐遂畫押蓋印期一年兩國御筆批准互換既而美金山於中國招商局和衆輪船進口有額外加徵船鈔貨稅之事出使美國大臣陳蘭彬等請乘美派人來華議約之際與交涉時美使安吉立亦牒總署詢中國徵收美國各船稅鈔與徵收中國及別國船稅鈔是否相同又中國在常關納稅鈔之船是否均與新關納稅鈔之船相同各等語又欲將兩國商民貿易有益之事及兩國商民爭訟申明觀審辦法加入約款總署以商民貿易一款原可隨時商辦觀審一款本煙台條約所載此次申明與原議亦無出入因與定議仍候兩國御筆批准互換明年六月鈐印八年三月美欲與朝鮮結約通商遣總兵蕭孚爾為全權大臣乘兵船往議約朝鮮遣余允植赴保定謁見李鴻章請代為主持與美使商議美使旋出所擬約稿其約稿未提明朝鮮為中國屬邦鴻章請刪改蕭孚爾執不允會美署使何天爵在京與總署議允增屬邦字樣而內治外交仍許朝鮮自主九年出使美國大臣鄭藻如請於美紐約設領事官略言美國西通太平洋以金山埠為首站東通大西洋以紐約埠為首站兩埠為往來必經之路金山業設領事近紐約華民往者日見增多土人不無嫉忌兼以古巴一島與紐約水路相通華民由古巴回籍者必假道紐約實為通行要路請仿金山例設領事以資保護報可是年美與朝鮮換約遣使駐朝鮮漢城朝鮮遣使報之仍咨中國禮部僅報聞而已十年中法因越南啟釁招商局輪船商人籌照西國通例暫售與美國旗昌洋商保管旋事定仍收回十二年春美舊金山華民被美西人虐害中國索賠總統却之粵人聞之大憤爭欲起抗粵督張之洞恐其滋事一面曉諭粵民一面致總署及駐美使臣與美交涉請其賠償懲辦因疏言出洋粵民所訴焚劫殺逐種種遭害臚列各案內如光緒十年十二月夭李架埠一案焚舖逐商劫財七萬餘元十年七月二十五日洛巿丙冷埠一案慘殺廖臣頌等二十八命傷十五人焚毀舖屋財物值十四萬餘元七月二十八日舍路埠一案慘殺莫月英等三命焚燒煤廠約值數萬旋將華人盡逐八月十一日倒路粉坑一案枉殺李駒南等五命九月二十八日喊罷埠一案焚逐失財數萬十二月初四日尾矢近地一案慘殺伍厚德等二命皆為無辜被害其餘密謀殺害不可勝紀以致卓忌埠禮靜埠則有被逐之事興當埠拓市埠喜路卜埠鈴近埠匿架巿埠洒巿埠鉢倫埠云乃埠坎下埠古魯姐埠粒卜綠埠亦皆有定期議逐之事其金山大埠華民住房則有十苦之訴洗衣裳館則有六不近情之訴統大小各埠工商人等則有七難之訴所謂十苦者金山大埠住房每人限地八尺不足八尺者查拏監禁謂之房房之苦計地少絀同居概捉一也監後寓財盡竊無追二也回華有期暫寓被禁三也到埠資乏借寓亦拏四也畏捉夜行臥街被打五也工藝出監無處傭食六也監房地狹疾癘益增七也入監勒銀始任贖出八也監鬱鬢亂被翦違制九也昏夜巡查破窗越屋十也所謂六不近情者洗衣館八九百間木樓木屋歷數十年乃借防火私擅勒令改建甎樓鐵門既非美廷所命別處又不一律一也拆改不獨勞費工衆無處容身二也甎鐵本重租貴主客兩受其害三也曬棚謬謂惹火別處樓棚更多四也任意拏人罰銀被擾至數百間五也洋館木樓曬棚何以不用此律六也所謂七難者一為欲守業之難二為欲拒匪之難三為求保護之難四為居散埠之難五為居大埠之難六為業工者之難七為業商者之難等語又言金山各埠始則利華民之工勤價省多方招徠開礦修路諸工美商藉華工以獲利者不知其幾千億萬乃因埃利士黨人嫉妬把持合謀驅逐殘毒焚掠以奪其資財勒逼行主辭用華工以斷其生路華工既無生計華商亦遂賠折窮蹙留不能留歸不能歸保護亦無從保護情形實為危慘假如將此十餘萬華民盡行驅歸中國沿海各省何處容之既屬可憫亦多隱憂此外南洋諸埠設皆踵事效尤何堪設想美與中國雖無嫌隙但此事係由美境土人專利而起其視華工究不免稍分畛域且美國官員近亦多有埃利士黨人在內多設苛政實有此情應請敕催美國嚴懲速辦初沙面燒洋房十四間償款至鉅至是出使美國大臣鄭藻如電張之洞請查案援例之洞以金山殺掠重情過之十倍應照本案華民所失之數賠足並須財命兩究電覆令與交涉先是美使田貝允電本國速辦時新任張蔭桓為美使仍留鄭藻如會同經理既而美調兵緝匪斃匪一名傷數名美總統及議院亦漸議護禁久之始允賠尋議寓美華工約定約六款首言中國以華工在美受虐申明續約禁止華工赴美次言華工在美有眷屬財產者仍准往來三言華工以外諸華人不在限禁之例並准假道美境四言華人在美除不入美籍外美國仍照約盡力保護五言華工人被害各案美國一律清償六言此約定期二十年互換議定畫押復命張蔭桓再與籌議蔭桓以三端要美一請酌減年限二請訂約以前回華之工如有眷產亦可禀報中國領事補給憑批回美三回華工人在美財產不及千元者作何辦法亦應商及議久不決十四年四月廣西桂平縣美教士富利淳醫舘被毀領事索賠五千餘元拒之時粵民憤華工見拒羣起抵制且歸咎張蔭桓會命翰林院侍講崔國因代為美日祕國出使大臣十六年國因到美美戶部忽訂新例於假道華民入境索質銀二百元出境發還下議院又議立限清查寓美華民戶口給照國因力與辯例旋廢初金山新例拘執華人令徙遷者限地界以華工居處不潔釀疾為言至是始廢例銷案時換約期將屆適楊儒出使總署又以商改新例事委之儒涖美值美迫行華工註冊新例當援條約駮詰美外部始商允議院展限半年被拘工人釋放而於註冊之例堅不改移華工以例專分別新舊工人舊工固有安居樂業之便而新工因限禁不能到美屢倩律師控訴察院欲除此例美外部以例經議院議定不能廢仍限華人註冊而總署電儒以先修約後註冊為關鍵儒當牒外部並就十四年約稿刪去賠償一款易為互交罪犯原約二十年之期改為十年旋又接總署電言美必欲先行註冊擬令寓華美民亦註冊以相抵制屢議不決既美外部謂交犯一款與限禁華工保護華民不相涉應另訂專約不列款內十年之期可以允從寓華美工亦聽中國註冊楊儒力爭寓華之美國教士亦須註冊遂擬除工人外寓華別項美民自換約日起美政府允每年造冊一次報知中國政府乃定議並於第五款中寓華別項美民下註包括教士在內二十年二月畫押蓋印是為重訂限禁華工保護華民約款又立互交罪犯約約既成楊儒復籌寓美華民善後事宜因上言華工在美始自咸豐年間光緒六年始有限制工人之約華人寓美洋人指為風俗之害者約有三端一曰鴉片一曰賭博一曰械鬬今惟有將此諸弊力圖革除一在申明律例治以各項應得之罪中國不為袒庇一在詳示教條使知目前限制之故皆與煙賭械鬬各弊有涉俾各愧奮改圖庶不至為人厭薄此治本之法也至於治標之法一在嚴禁冒商俾真商不至受累一在疏通工路使新來之工得以謀生海外如此不獨華民生計可紓即中外邦交從此愈固矣是年中日啟釁美代中國保護在日本華商明年四川福建教案相繼起而古田案尤劇美與英法均請中國償款辦犯議久不決既而美使田貝函總署稱有各國耶穌教人公舉在華辦理教務教士李提摩太惠志繕冊摺擬呈查閱請謁見允之二十三年美人在上海侵占租界外地初美所租同治初年止九百餘畝後美領事西華自畫界圈入未租民地萬餘畝光緒十九年十月兩江總督劉坤一飭將界綫內東北未租地收回二千六百畝而於西北界外所占之地未及清釐至是美領事在蘇州河邊自立界石而河內地起建樓房署兩江總督張之洞請與英法界外侵占同嚴禁疏入交議二十四年出使大臣伍廷芳見德與中國因膠州失和請聯美略謂美合衆為國其保邦制治國律以兼併他洲土地為戒溯自海上用兵以來美兵船皆由英軍牽率而至道光二十一年粵東議款美實居間排解遂得定盟咸豐九年英法闌入大沽毀我防具美守前約船由北塘駛入呈遞國書情詞謙遜先換約而歸是通商以來美視諸國最為恭順此次守約惟謹不肯附和雖因古巴議自主檀島議兼隸近在同洲大局未定不遑遠略亦因與我交誼素篤故不從合從之謀若能聯絡邦交深相結納似與大局不無裨益又因檀香山歸併於美請設領事保護華民略謂檀香山居太平洋之衝前本君主後改民主近因弱小求庇美邦設為行省美議院業經議行此島華民不下三萬人向由商董立中華會舘排難解紛光緒七年曾令商董陳國萬為領事後美禁華工抵埠華民出洋皆趨檀島請設領事報可是年中國議修盧漢粵漢寧滬寧漢四路借款各國美國願貸四百萬鎊於粵漢路旋聘美工師勘路二十六年拳匪作亂各國聯軍入京既各國會議條款美惟增教案被議人員不准復用之條餘未與附和會俄與中國訂退還東三省約中國復請美政府排解明年和議成議償款四百五十兆美所分得償金三十二兆九十三萬有奇合美金二十四兆四十四萬餘元除給商人損失及海陸軍費外尚有溢出數十二兆七十餘萬元美總統羅斯福向議院提議溢出金仍還中國助中國教育即以此款為格致學生留美之用議行牒中國中國特遣專使唐紹儀赴美申謝既而各國賠款欲改銀為金以金價算美為商勸各國並謂衆議合索四百五十兆兩由各國自行均派中國不管其易作何項金錢是此項賠款照約載金價核算即四百五十兆海關銀數照約銀數付還亦即與用金付給無異美旋允照約還銀二十八年春三月議各國商約美使不願加稅至十五免釐與否聽中國自便是年命呂海寰盛宣懷議美約與美使迭次磋商張之洞劉坤一通電參酌始定議因上言釐定約款十七條大致與英約相同而其中得失損益稍有區別第一款曰駐使體制美使原送約文聲明駐使可以行文各省將軍督撫駐紮大臣駮以美國向由外部轉行中國亦係由外務部咨轉不能兩歧駮令刪去改為中國駐使為美國優待是以美使駐京中國亦一律優待以昭平允第二款曰領事權限報施一如駐使而聲明美國領事按例妥派外務部按照公例認許如所派不妥或與公例不合我即可不認冀以挽回主權第三款曰口岸利益此係查照日本舊約不能不許因即比照日約核改妥協第四款曰加稅免釐此為全約主腦美使初祗允加至值百抽十並請我裁內地常關又不提明銷塲出廠等稅以為中國主權所係不欲有所干礙屢費磋商動至決裂臣等往復電酌彼始允加至十二五其所裁內地常關之稅任我改抽出產稅以為抵補竊思內地常關不過十餘處各省土貨未必悉所經由按照英約載明進出口貨加稅後均得全免重徵則內地常關亦祗能徵土貨運出第一道之二五半稅若非第一常關則並無稅可收至土貨未經第一常關徵過二五半稅者出口時仍須徵足七五之數是常關雖裁亦無大礙今既任我改抽出產稅則從源頭處抽收較無遺漏似更合算當時尚以與英約兩歧為慮美使自認將來勸英照辦祗得允裁至於銷塲稅出廠稅及議增之出產稅美使雖不願詳載名目而於專條中聲本款所載各節毫無干礙中國主權徵抽他等稅項之意以渾括銷塲等稅保我主權第五款曰稅則附表彼請美國人在中國輸納稅項較最優待之國不得加重另徵臣等索其增入中國人民在美國納稅亦如之一節第六款曰准設關棧係照英約酌辦第七款曰振興礦務前半悉照英約彼請准美國人遵章開辦礦務此本路礦衙門定章所許因訂明美國人民辦理礦務居住之事應彼此會定章程以資鈐束第八款曰存票抵稅第九款曰保護商標均與英約意義相等而於存票款中聲明除去船鈔一項以補英約所未及第十款曰創製專照此款深慮有礙中國工藝仿造駮論再三改為俟中國設立專管衙門定有創製專律後再予保護其權仍自我操第十一款曰保護版權即中國書籍翻刻必究之意與之訂明若係美文由中國自繙華文可聽刊印售賣並中美人民所著書籍報紙等件有礙中國治安者應各按律例懲辦為杜漸防微之計第十二款曰內港行輪前兩節照英約大意聲明嗣後無論何時修改應由我查看酌辦末節如奉天府安東縣開埠事扼定自開而辦法略有變通第十三款曰改定國幣將英約所附照會納稅仍照關平一節增入款末第十四款曰輯睦民教教民犯法不得因入教免究並應遵納例定捐稅教士不得干預中國官員治理華民之權詳晰列明冀資補救第十五款曰治外法權第十六款曰禁止嗎啡鴉片皆我索其增添與英約一律第十七款曰修約換約期限係照立約通例復於約款之外另行訂附件三端一為內地徵抽鴉片鹽觔稅捐之事及保全稅捐防範走漏之法均任由中國政府自行辦理二為所留通商口岸之常關設立分關保持稅餉三為申明第五款所載稅則附表即前定切實值百抽五之稅則至內地常關雖裁並不藉此以裁北京崇文門並各城門及左右翼等處之稅由美使備一照會存案又第四款不礙徵抽他等稅項一語尚涉籠統由我備一照會聲明他等稅項即係包括銷塲出廠及改抽之出產各稅應仍聽中國自行辦理彼亦復一照會言明彼此意見相同分別簽押蓋印是為中美商約一名通商行船條約三十年春美公司背約私售粵漢股票於比利時允比在湘造湘陰過常德至辰州一路張之洞致湖南巡撫趙爾巽請力阻並援合同第十七條專認美公司不得轉與他國人為主旨湘人議自承辦禀請廢約趙爾巽力主之時張之洞已奉廷寄廢約遂以三省紳民力持廢約電致盛宣懷宣懷旋電出使大臣梁誠牒美外部略謂美公司顯背合同必應作廢續約十七款不得轉售他國現查底股比法居多事權他屬正約四十款禁別人侵壞合同現派非美公司之錫度來華干預全路工程逾限廣州一節逾估甚鉅請牒外務部註銷正續合同美政府覆牒允註銷合同仍不允廢約既而美公司舉前兵部路提等代議路事中國亦延美前外部大臣福士達鐵路律師良信等與之辯始允再集股東議售股本購價及合同特權等費必須付現又索賠給工程司執事人等合同未滿撤退及註銷訂購物料合同之用二十五萬久不決至三十一年夏始簽字久之始以美金六百七十五萬元還美再加利息定議簽押時粵民因美禁華工並苛待留美商民私議抵拒美貨不果三十二年遣學生赴美留學三十三年美教士在河南信陽州所屬雞公山購地造房豫撫張人駿執條約公法教規與爭始允撤房退地停工卒延未撤銷三十四年八月與美訂立公斷專約初美使康格曾奉其總統命向中國提議與英法一律訂立公斷專約嗣以美總統與議院意見不合英法約作廢因罷議至是第二次和會和解紛爭之約又已畫押各國多互訂公斷專約美亦與英法日本訂約中國即電致出使美國大臣伍廷芳向美廷提議遂訂條約四款凡關於法律意義或條約解釋為外交法不能議結者皆屬之換約以五年為限是年美約請各國在滬會議禁鴉片事宜中國命南洋大臣端方等蒞會宣統元年春正月美使牒外務部請免收東三省新開各埠一切雜稅旋由外務部咨東三省覆稱不能免收因覆美使謂現所收各稅於各埠試辦章程並無妨礙若必欲使洋貨於抽釐一事毫無轇轕自非實行加稅免釐不可中國固甚願各國贊成斯舉也五月定留學生赴美名額因美退還庚子賠款為中國學生赴美游學費議自退還之年起初四年每年遣一百名以後每年至少須遣五十名遂訂辦法大綱是年美工商部新頒華人入美保護例凡十條大旨仍重在禁止限制華工影射赴美而於商賈教習學生等游歷則從寬牒外部立案並同時通咨南北洋施行二年九月度支部大臣載澤與美使喀爾霍商定借款一千萬鎊利息五釐美招英法德日結為借款團體是為四國借款
