body:
  text: 清史稿卷一百六十五表五皇子世表五世宗系弘暉世宗第一子康熙四十三年薨雍正十三年追封親王諡曰端無嗣弘昀世宗第二子早薨無嗣弘時世宗第三子早薨無嗣仁宗系穆郡王仁宗第一子未命名乾隆四十五年薨嘉慶二十五年追封綿愷奕纘仁宗第綿愷第三子嘉一子嘉慶二十慶二十四年封五年封惇郡王不入八二十五分輔國年晉惇公道光親王道元年卒光七年追封貝緣事降勒無嗣郡王八年復封親王十八年又降郡王尋薨復還親王諡曰恪以宣宗第五子奕誴為嗣綿忻奕誌載洵仁宗第綿忻子奕第四子嘉道光八六子奕慶二十年襲瑞誌嗣子四年封郡王三光緒十瑞親王十年薨三年封道光八諡曰敏不入八年薨諡分輔國曰懷公十五年晉輔國公十六年晉鎮國公二十八年襲貝勒三十四年加郡王銜綿愉奕詢載澤仁宗第綿愉第奕棖第五子嘉四子咸七子奕慶二十豐十年詢嗣子五年封封不入光緒三惠郡王八分輔年襲輔道光十國公同國公二九年晉治三年十年晉惠親王晉鎮國鎮國公同治三公十年三十四年薨諡卒年加貝曰端子銜奕詳載潤綿愉第奕詳第五子咸一子光豐十年緒十二封不入年襲貝八分輔勒國公同治三年晉鎮國公尋襲惠郡王十一年加親王銜光緒十二年薨諡曰敬奕謨載濟溥佶綿愉第奕詳第載光第六子咸二子奕二子載豐十年謨嗣子濟嗣子封不入光緒十光緒三八分鎮三年封十一年國公同三等鎮襲鎮國治三年國將軍公晉鎮國二十年公十一卒年加貝子銜光緒十年晉貝子十五年加貝勒銜三十一年卒宣宗系奕緯載治溥倫宣宗第奕紀子載治第一子嘉奕緯嗣四子光慶二十子咸豐緒七年四年封四年襲襲貝子貝勒道貝勒十二十年光十一年加郡加貝勒年薨諡王銜光銜曰隱志緒六年溥侗三十年卒諡曰載治第追封郡恭勤五子光王緒七年封二等鎮國將軍二十年晉一等三十四年加不入八分輔國公銜奕綱宣宗第二子道光七年薨三十年追封順郡王諡曰和無嗣奕繼宣宗第三子道光九年薨三十年追封慧郡王諡曰質無嗣奕誴載濂宣宗第奕誴第五子道一子同光二十治元年六年嗣封二等綿愷後鎮國將襲惇郡軍尋晉王咸豐不入八五年降分鎮國貝勒六公十一年復封年晉輔郡王十國公光年晉惇緒十五親王光年襲貝緒十五勒加郡年薨諡王銜二曰勤十六年以罪革爵載漪溥僎奕誴第載漪第二子奕一子光志嗣子緒二十咸豐十年封一年襲貝等鎮國勒光緒將軍十四年加郡王溥儁銜二十載漪第二子光年晉端緒二十郡王二五年立十六年為大阿以罪革哥二十爵發新七年因疆永遠載漪獲監禁二罪撤大十八年阿哥名命仍歸號賞入本支八分公銜俸載瀾奕誴第三子同治十二年封三等輔國將軍光緒十年晉二等鎮國將軍十五年晉不入八分輔國公二十六年以罪革爵發新疆永遠監禁載瀛奕誴第四子光緒十五年封二等鎮國將軍二十年加不入八分輔國公銜二十八年襲貝勒載津溥修奕誴第載濂子五子光載津嗣緒十五子光緒年封二二十二等鎮國年襲二將軍二等鎮國十年加將軍不入八分輔國公銜二十二年卒奕訢載澂溥偉宣宗第奕訢第載瀅第六子道一子咸一子載光三十豐十年澂嗣子年封恭封輔國光緒二親王同公同治十二年治十三元年晉封貝勒年降郡貝勒十二十四王尋復二年加年襲恭親王光郡王銜親王緒二十十三年四年薨革爵尋諡曰忠復封貝以有功勒加郡社稷配王銜光享太廟緒十一年卒諡曰果敏載瀅奕訢第二子奕詥嗣子同治三年封不入八分鎮國公七年襲貝勒光緒十五年加郡王銜二十六年以罪革爵仍歸本支載濬奕訢第三子同治三年封輔國公五年卒無嗣載潢奕訢第四子光緒七年封不入八分輔國公十一年卒無嗣奕載洸宣宗第奕第七子道四子光光三十緒七年年封醇封輔國郡王同公十年治三年卒無嗣加親王銜十一載灃年晉醇奕第親王光五子光緒十六緒十年年薨尊封不入八分輔為皇帝國公十本生考五年晉諡曰賢鎮國公十六年襲醇親王三十四年命為監國攝政王宣統三年罷去監國攝政王奕詥載濤宣宗第奕第八子道七子奕光三十詥嗣子年封鍾光緒十郡王同六年封治七年二等鎮薨諡曰國將軍端晉不入八分輔國公二十三年嗣貝子奕謨後二十八年改嗣奕詥後襲貝勒三十四年加郡王銜奕譓載沛溥伒宣宗第奕棟第載瀛子九子道六子奕奕譓嗣光三十譓嗣子孫光緒年封孚光緒三二十四郡王同年襲貝年封貝治十一勒四年子年加親卒王銜光緒三年載澍薨諡曰奕瞻子敬奕譓嗣子光緒四年襲貝勒二十三年緣事革爵文宗系憫郡王文宗第二子未命名早薨咸豐十一年追封
