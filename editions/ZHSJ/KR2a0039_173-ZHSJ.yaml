body:
  text: 清史稿卷一百七十三表十三諸臣封爵世表五下初一二三四五六七次次次次次次次襲襲襲襲襲襲襲封三布格朱殷等爾巴孔圖男杭庫額朱孔俄布爾布爾額子正紅杭俄杭俄襲父旗滿子初子分職康洲原襲父襲父熙二係葉職順三等十八赫西治年阿思年五城貝恩詔哈尼月緣勒天加至哈番事革命年一等今漢停襲間授阿恩文改為三哈尼為三等副哈番等男將今又一漢文拖沙改為喇哈三等番尋男將父職分與弟朱孔額襲止留本身所得拜他喇布勒哈番又一拖沙喇哈番今漢文改為騎都尉又一雲騎尉表格尚無資料三代花李等都色鑰男正黃代都花色旗漢子順弟康軍本治十熙十姓李七年七年崇德七月襲雍七年襲正七以軍年子功授李裕半個德降前程襲尋加至三等甲喇章京課績加為二等順治九年正月恩詔加至三等阿思哈尼哈番今漢文改為三等男三諾阿等木桑男奇諾木正黃奇子旗蒙順治古崇二年德七四月年九襲緣月以事降率戶為一口來等阿歸授達哈三等哈番梅勒恩詔章京加一今漢拖沙文改喇哈為三番今等男漢文改為一等輕車都尉又一雲騎尉三滿那等韜木男鑲白僧旗蒙格古崇第德七滿韜年以子康父綽熙十格圖六年率衆八月來歸襲四授三十年等甲子官喇章保降京恩襲詔加至一等又一拖沙喇哈番順治十三年五月以軍功加為三等阿思哈尼哈番今漢文改為三等男三額朱等對馬男鑲黃喇旗蒙額對古崇子康德八熙十年積年五軍功月襲授三五十等甲三年喇章子費京順揚古治二降襲年軍功加為二等九年正月恩詔加至三等阿思哈尼哈番今漢文改為三等男三賴蘇等達麻男哈喇鑲白賴達旗滿哈子洲崇康熙德八十八年以年襲登城四十功授年子二等馬德甲喇降襲章京順治年恩詔加至三等阿思哈尼哈番今漢文改為三等男三舒穆薩等理禮爾男渾宏禪正黃舒理穆禮旗滿渾子宏子洲崇順治康熙德八十八二十年襲年閏七年父扎七月六月福尼襲襲乾之牛隆五彔章年子京恩舒爾詔加金降至一襲等阿達哈哈番順治年軍功加至三等阿思哈尼哈番今漢文改為三等男三線線線等應應桂男琦藻線應正白線應藻孫旗漢琦叔康熙軍順父之二十治元子順三年年以治十六月投誠年五襲六授三月襲十年等甲子線喇章承烈京軍降襲功加為二等順治九年正月恩詔加至三等阿思哈尼哈番今漢文改為三等男三夏夏等景增男梅夏景正白梅弟旗漢之子軍順康熙治元十六年以年五投誠月襲授三四十等甲六年喇章子夏京恩長瀛詔加降襲至一等阿達哈哈番又一拖沙喇哈番順治十七年十月以軍功加為三等阿思哈尼哈番今漢文改為三等男三宜殷等爾達男格理德宜爾正黃格德旗滿子順洲順治十治二二年年以七月軍功襲授牛彔章京課績加半個前程恩詔加為三等阿達哈哈番又以軍功加為二等恩詔加至一等又一拖沙喇哈番陣亡順治十二年六月贈三等阿思哈尼哈番今漢文改為三等男三鮑鮑等敬鐸男山西敬孫應州康熙人順三十治九六年年以襲父承先功封三等男三李李李等朝人桂男雲龍蘭鑲白李朝李人旗漢雲子龍子軍順康熙康熙治五二年三十年八十月年十月以襲二月投誠襲四授三十五等梅年病勒章歿停京今襲漢文改為三等男三路等有男良鑲藍旗漢軍順治三年積軍功授三等甲喇章京恩詔加至一等又一拖沙喇哈番軍功加為三等阿思阿尼哈番今漢文改為三等男十五年緣事革無襲三韓韓等文佐男鑲藍周旗漢韓文軍順子康治五熙十年八二年月以十二投誠月襲授三三十等阿五年思哈坐事尼哈革停番今襲漢文改為三等男三許許等得國男功相鑲藍許得旗漢功孫軍順康熙治五十六年八年十月以二月率衆襲五投誠十四授三年特等阿旨停思哈襲尼哈番今漢文改為三等男三胡愛雅僧等申音岱保男布查愛音雅岱魯胡申查子子康正藍布魯康熙熙二旗滿子順十九十七洲順治十年八年七治三八年月襲月襲年積正月二十坐事軍功襲有五年革後授牛軍功因追降襲彔章傷發伊京恩卒晉父軍詔加贈二功加至二等阿為二等阿思哈等阿達哈尼哈思哈哈番番即尼哈又以二等番今軍功男漢文加至改為一等二等又一男拖沙喇哈番陣亡順治十八年正月加贈三等阿思哈尼哈番今漢文改為三等男三喀赫格等爾特爾男塔赫德喇喀爾赫特鑲白塔喇赫弟旗滿子順康熙洲順治十二年治三二年正月年以七月襲五軍功襲陣十一授半亡年子個前格爾程恩圖降詔加襲為拜他喇布勒哈番又以軍功加一拖沙喇哈番恩詔加至一等阿達哈哈番陣亡順治十二年六月加贈三等阿思哈尼哈番今漢文改為三等男三雅陽夸等喇壽喀男正白雅喇陽壽旗滿弟之子康洲順子康熙三治三熙十十一年積一年年六軍功閏七月襲授牛月襲四十彔章六年京兼子桓半個岱降前程襲恩詔加至一等阿達哈哈番順治十三年閏五月以軍功加至三等阿思哈尼哈番今漢文改為三等男三覺覺等羅羅男布額古訥鑲紅布旗滿覺羅洲順布古治四子康年特熙二恩授十五半個年四前程月襲恩詔雍正加至十三三等年四阿達月卒哈哈無襲番十八年襲父覺羅布三之三等阿達哈哈番倂為三等阿思哈尼哈番今漢文改為三等男康熙二十五年二月卒三蘇孫等魯塔男邁哈正藍蘇魯旗滿邁子洲積康熙軍功元年授二十二等甲月襲喇章四十京順六年治九子索年正柱降月恩襲詔加至三等阿思哈尼哈番今漢文改為三等男卒諡勤勇表格尚無資料三舒雅台常連勳等明滿興慶瑛光男正黃泰阿道光常慶光緒旗蒙舒明雅滿十三子光三十古乾子乾泰姪年襲緒七一年隆二隆二乾隆年襲襲十一十七五十年三年十七年月以二月襲軍功襲五加封十七三等年十男二月革三札常等克安男塔札克爾塔爾四川子嘉番目慶十內務七年府正襲黃旗滿洲官護軍統領嘉慶八年閏二月以捕獲逆犯陳德封三等男十七年四月卒三鄂鄂慶賽穆宜等輝彌寬崇都格男正白善鄂彌阿哩穆都旗滿鄂輝善子慶寬賽崇哩繼洲嘉子嘉子阿子子光慶元慶三緒三年十年襲十年二月襲以勦教匪功封三等男三年六月卒諡恪靖三百札玉文等齡拉年濤男漢軍芬玉年嘉慶百齡子同二十子治五年官年襲兩江總督以捕獲逆犯六榮升功封三等男二十一年卒三西托德等淩克蘭男阿通泰正白阿托克旗滿西淩通阿洲官阿子子光察哈緒十爾都二年統咸襲豐六年以北路肅清功封三德等成男三等子明寶承繼子乾隆十八年四月降襲三等男三黃黃黃等翼宗恆男升炎湖南翼升長沙子光人同緒年治二襲年由淮揚鎮總兵論克復蘇州功予雲騎尉三年論克金陵功予一等輕車都尉七年張總愚平再加一雲騎尉併為三等男爵光緒十年卒於長江水師提督諡武靖三宋宋等慶天男山東傑蓬萊慶子人同光緒治七三十年由年襲湖南提督論平張總愚功予一等輕車都尉二十八年卒封三等男爵三彭彭等毓秀男橘挺湖南毓橘湘鄉子同人記治年名布襲政使同治三年論克金陵功予一等輕車都尉尋補福建汀漳龍道同治六年二月以勦東捻陣亡湖北蘄水贈內閣學士諡忠壯予騎都尉尋併為三等男三胡胡等子祖男勳蔭湖南子勳益陽子光人原緒二任湖十三北巡年襲撫胡林翼嗣子以應襲一等輕車都尉及騎都尉併為三等男同治八年襲
