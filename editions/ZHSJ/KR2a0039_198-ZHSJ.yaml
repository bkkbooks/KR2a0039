body:
  text: 清史稿卷一百九十八表三十八疆臣年表二各省總督河督漕督附乾直兩川閩湖兩雲總直江河隆隸南東元河河河年道道道丙總總總辰隸江陝浙廣廣貴漕督督督裁李趙查郝史鄂尹顧劉高白四衞弘郎玉貽彌繼琮勷斌鍾川恩阿麟直達善正山總二六月督月月丙甲癸辰申酉遷以雲二閩南月浙總壬總督申督銜補專張熙管廣署福泗漕建貴運事州總總督督辛嵇卯曾筠程浙元江章總補督六月丙申程元章遷補熙補乾李趙查郝史鄂尹補劉高白隆衞弘郎玉貽彌繼熙勷斌鍾二恩阿麟直達善七山年正九四月丁月嵇月月癸巳庚曾甲乙丑子筠辰卯革召召陛見八慶德月復沛張丙兩湖允子江廣隨顧總總署琮督督署九直閏月隸九丁河月卯道丁總卯慶督復慶雲復南遷總督那蘇圖張兩廣江泗總仍督貴州乾李那查郝德鄂慶補顧高白隆衞蘇郎玉沛彌復熙琮斌鍾三十圖阿麟達改山年月七七張七協戊丁月月廣月理午酉丙丙泗丙免寅寅寅正裁遷遷月浙孫托癸江嘉鄂馬時酉總淦彌爾漕督署達泰運朱直川兩總藻隸陝廣督直隸總總總河督督督道總督九月甲子被劾顧琮管理總河印務十月丙午補乾孫那鄂郝德馬慶托顧高白隆嘉蘇彌玉沛爾復時琮斌鍾四淦圖達麟七泰山年十七月己一月丙張未月丙寅廣戊寅遷泗申遷班憂德第沛湖郝閩廣玉浙總麟總督署督兩江總督乾孫郝鄂德班馬張托顧高白隆嘉玉彌沛第爾廣時琮斌鍾五淦麟達十泰泗十山年五三一六月庚月月月月戊申甲庚己癸戌子戌巳酉遷免召憂召常楊尹那張安超繼蘇允漕曾善圖隨運署川署署總兩陝湖貴督江總廣州總督總總督督督慶復仍雲南乾孫楊尹德那馬慶常顧高白隆嘉超繼沛蘇爾復安琮斌鍾六淦曾善五圖泰四十八八山年八八月八四月二月月辛月月己月月遷月己己酉己己丑己戊辛酉酉酉酉召丑申張亥召遷遷召遷憂允遷策隨高完高那楞孫慶署顧斌顏斌蘇暫嘉復雲琮兼偉直圖署淦署南漕理江隸兩閩湖兩運直南總江浙廣廣總隸河督總總總總張督河道督督督督廣道總泗仍總督貴督州乾高那尹德孫慶張顧高完白隆斌蘇繼沛嘉復允琮斌顏鍾七六圖善四淦随偉山年月四九月十十壬癸月月癸張二二戌未癸丁巳廣月月差巳丑遷泗辛辛遷憂亥亥史那遷遷貽德馬蘇直沛爾圖白完署兩泰閩鍾顏直江署浙山偉隸總川總江河總督陝督南東督總河河督道道總總督督乾史德馬那孫慶張顧高白完隆貽沛爾蘇嘉復允琮斌鍾顏八直二泰圖淦正隨山偉年月五正月癸庚月月戊張亥子戊丁午廣召申巳陛泗遷召見尹繼慶阿策善復爾楞兩川賽署江陝湖兩總總廣廣督督總總督督五月戊申慶復遷馬爾泰兩廣總督乾史尹慶那阿馬張顧高白完隆貽繼復蘇爾爾允琮斌鍾顏九直善圖賽泰隨山偉年七二七甲月月月張子戊丁戊廣寅丑寅泗遷遷遷馬鄂那爾彌蘇泰達圖閩湖兩浙廣廣總總總督督督乾史尹慶馬鄂那張顧高白完隆貽繼復爾彌蘇允琮斌鍾顏十直善泰達圖隨山偉年四乙五月張丑月乙廣辛卯泗卯召那策蘇楞圖兩直隸廣總總督督乾那尹慶馬鄂策張顧高白完隆蘇繼復爾達楞允琮斌鍾顏十圖善泰彌随閏山偉一九九三閏年月月張月三丙丁壬廣己月寅巳戌泗亥己召召遷亥革喀塞劉爾楞統顧吉額勳琮善湖署署閩廣漕江浙總運南總督總河督督道總九督月庚九子月庚顧子琮回回原任任周學健江南河道總督乾那尹慶喀塞策張顧高周完隆蘇繼復爾楞楞允琮斌學顏十圖善三吉額隨九四健偉二月善三月月年辛月壬戊丁丑辛子辰卯召丑遷差裁張改蘊那貴廣雲著蘇州泗貴漕圖總川總運署督陝督總直總督隸督河道十總二督月乙亥進勦大金川黃廷桂署川陝總督乾那尹張喀塞策張蘊那周完隆蘇繼廣爾楞楞允著蘇學顏十圖善泗吉額九隨圖健偉三九九善閏月閏三年月月七戊七月戊戊辛月午月乙辰午酉己遷戊未遷召巳辰遷分尹設策傅召繼逮顧陝楞爾善琮西兩丹新高河總江暫柱兩斌東督總護署廣暫河督川湖總管道四陝廣督江總川十總總南督總一督督十河督月月道癸九乙總酉月酉督遷戊召寅雅碩爾張色哈廣兩廣善泗總兼革督署兩傅江恆總暫督管川十陝二總月督丁亥十一黃月廷癸桂酉兩策江楞總川督陝總督庚辰分設兩督尹繼善陝甘總督策楞四川總督乾那黃尹喀新碩張蘊那高顧隆蘇廷繼爾柱色允著蘇斌琮十圖桂善吉二隨四圖四七正善月月年月月庚戊己辛丁子戌巳亥巳差革卒差瑚瑚方瑚寶寶觀寶湖漕承陝廣運直甘總總隸總督督總督督十二策月楞辛仍卯四川新柱遷永興湖廣總督乾方黃尹喀永碩張瑚方高顧隆觀廷繼爾興色允寶觀斌琮十承桂善吉十正随承五善一月正年策月丁月庚楞乙未丁午丑遷未憂遷陳阿大碩里受色袞兩雲湖廣貴廣總總總督督督乾方黃尹喀阿陳碩瑚方高顧隆觀廷繼爾里大色寶觀斌琮十承桂善吉袞受承六閏閏善九九年五五月月辛月月庚庚未戊戊寅寅寅寅遷卒遷遷永阿尹黃常里繼廷湖袞善桂廣兩兩陝總廣江甘督總總總督督督未任策前楞仍高四斌川兼管乾方尹黃喀永阿碩瑚方高顧隆觀繼廷爾常里色寶觀斌琮十承善桂吉袞承七九善年月策壬丁楞申亥召莊有恭暫署兩江總督乾方尹策喀永阿碩瑚方高顧隆觀繼楞爾常里色寶觀斌琮十承善正吉三袞承八八正月善月正月年月戊己月己癸戊寅卯戊亥酉寅憂召寅議遷憂處黃開鄂廷泰班策容桂署第楞安遷湖署江署四廣兩南兩川總廣河江總督總道總督督總督未督尹任九繼前月九善壬月陝恆申壬甘文召申總署遷督策八楞尹九月兩繼月辛廣善壬丑總江申督南遷